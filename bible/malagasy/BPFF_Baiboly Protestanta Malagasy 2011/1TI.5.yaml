document_id: 1TI.5,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny amin’ny fianakaviam-be
  - type: text
    content: 'Aza mamely mafy loatra ny lehilahy efa zokiolona fa anaro toy ny ray izy, ny tovolahy dia toy ny rahalahy, '
  '10':
  - type: text
    content: 'Tsy maintsy tsara laza amin’ny asa tsara izy: Raha namelon-jaza, raha nampiantrano vahiny, raha nanasa ny tongotry ny olona masina, raha namonjy ny azom-pahoriana, raha nazoto nanatanteraka ny asa tsara rehetra. '
  '11':
  - type: text
    content: 'Fa mandava kosa ny mpitondratena mbola tanora; fa rehefa mampitodika azy hanalavitra an’i '
  - type: text
    content: Kristy
  - type: text
    content: ' ny faniriany dia ta hanambady indray izy izay. '
  '12':
  - type: text
    content: 'Koa meloka izy satria nandà ny fanekena nataony teo aloha. '
  '13':
  - type: text
    content: Ankoatra izay dia mianatra ho malaina miasa koa izy ka mandehandeha mitety trano; ary tsy malaina miasa ihany fa mitati-dresaka sy mpandehandeha miraharaha ny an’olona ka manao teny tsy tokony hotenenina.
  '14':
  - type: text
    content: 'Koa tiako raha hanambady indray ny mpitondratena mbola tanora ary hanan-janaka sy hitondra ny tokantranony ka tsy hanome vahana ny fahavalo hitenenany ratsy azy. '
  '15':
  - type: text
    content: 'Fa efa nivily sahady ny sasany nanaraka an’i Satana. '
  '16':
  - type: text
    content: Raha misy vehivavy mpino manana havana mpitondratena dia aoka izy no hikarakara azy, fa aza avela hahavaky tratra ny fiangonana
  - type: note
    content: 'Na: eklesia.'
  - type: text
    content: ' mba hikarakarany izay tena mpitondratena tokoa.'
  - type: heading
    content: Ny amin’ny loholona
  '17':
  - type: text
    content: Ny loholona
  - type: note
    content: 'Na: presbytera.'
  - type: text
    content: ' izay mahay mitarika dia mendrika ny hahazo fanajana roa heny, indrindra fa izay mikely aina amin’ny teny sy ny fampianarana. '
  '18':
  - type: text
    content: 'Fa hoy ny Soratra Masina: «Aza manakombona ny vavan’ny omby mively vary ianao» (Deo 25.4). Ary koa: «Ny mpiasa dia mendrika hahazo ny karamany» (Lio 10.7). '
  '19':
  - type: text
    content: 'Aza mandray teny hiampangana loholona raha tsy misy vavolombelona roa na telo. '
  '2':
  - type: text
    content: ny vehivavy efa zokiolona toy ny reny ary ny tovovavy dia toy ny anabavy, amin’ny fahadiovana rehetra.
  - type: heading
    content: Ny amin’ny mpitondratena
  '20':
  - type: text
    content: Izay manota dia anaro eo anatrehan’ny olona rehetra mba hatahotra koa ny sasany.
  '21':
  - type: text
    content: 'Mananatra mafy anao aho eo anatrehan’Andriamanitra sy '
  - type: text
    content: Kristy
  - type: text
    content: ' Jesosy ary ny anjely voafidy mba hotandremanao izany zavatra izany ka tsy hisy fizahan-tavan’olona na fanaovana na inona na inona amin’ny fiangarana. '
  '22':
  - type: text
    content: Aza malaky mametra-tanana amin’olona na iza na iza ary aza miombona ota amin’ny sasany; tahirizo madio ny tenanao.
  '23':
  - type: text
    content: 'Aza dia rano fotsiny no atao fisotro fa misotroa divay kely noho ny am-bavafonao sy ny fahosaosanao matetika. '
  '24':
  - type: text
    content: 'Miharihary ny fahotan’ny olona sasany ka mialoha azy ho amin’ny fitsarana, fa ny an’ny sasany kosa dia manaraka ato aoriana. '
  '25':
  - type: text
    content: Ary miharihary toy izany koa ny asa tsara; ary na ny ankoatra izany aza dia tsy ho azo afenina.
  '3':
  - type: text
    content: 'Omeo voninahitra ny mpitondratena izay tena mpitondratena tokoa. '
  '4':
  - type: text
    content: 'Fa raha misy mpitondratena manana zanaka na zafy dia aoka aloha ireo hianatra haneho izay toe-panahy araka an’Andriamanitra amin’ny ao an-tranony ka hamaly soa ny ray aman-dreniny, fa izany no ankasitrahina eo anatrehan’Andriamanitra. '
  '5':
  - type: text
    content: 'Fa izay tena mpitondratena tokoa ka mipetraka irery dia manantena an’Andriamanitra ka maharitra amin’ny fangatahana sy ny fivavahana andro aman’alina. '
  '6':
  - type: text
    content: 'Fa izay vehivavy manaram-po amin’ny fahafinaretana dia maty fahavelony. '
  '7':
  - type: text
    content: 'Izany zavatra izany no ambarao hentitra mba tsy hananany tsiny. '
  '8':
  - type: text
    content: Fa raha misy tsy mikarakara ny ao aminy, indrindra fa ny ankohonany, dia efa nandà ny finoana izy ka ratsy noho ny tsy mino aza.
  '9':
  - type: text
    content: 'Ny azo soratana ho isan’ny mpitondratena dia izay tsy latsaky ny enimpolo taona sady nanambady indray mandeha ihany. '
