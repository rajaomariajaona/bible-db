document_id: 1TI.5
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny amin’ny fianakaviam-be
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Aza mamely mafy loatra ny lehilahy efa zokiolona fa anaro toy ny ray izy, ny tovolahy dia toy ny rahalahy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ny vehivavy efa zokiolona toy ny reny ary ny tovovavy dia toy ny anabavy, amin’ny fahadiovana rehetra.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny amin’ny mpitondratena
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Omeo voninahitra ny mpitondratena izay tena mpitondratena tokoa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Fa raha misy mpitondratena manana zanaka na zafy dia aoka aloha ireo hianatra haneho izay toe-panahy araka an’Andriamanitra amin’ny ao an-tranony ka hamaly soa ny ray aman-dreniny, fa izany no ankasitrahina eo anatrehan’Andriamanitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Fa izay tena mpitondratena tokoa ka mipetraka irery dia manantena an’Andriamanitra ka maharitra amin’ny fangatahana sy ny fivavahana andro aman’alina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Fa izay vehivavy manaram-po amin’ny fahafinaretana dia maty fahavelony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Izany zavatra izany no ambarao hentitra mba tsy hananany tsiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Fa raha misy tsy mikarakara ny ao aminy, indrindra fa ny ankohonany, dia efa nandà ny finoana izy ka ratsy noho ny tsy mino aza.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ny azo soratana ho isan’ny mpitondratena dia izay tsy latsaky ny enimpolo taona sady nanambady indray mandeha ihany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Tsy maintsy tsara laza amin’ny asa tsara izy: Raha namelon-jaza, raha nampiantrano vahiny, raha nanasa ny tongotry ny olona masina, raha namonjy ny azom-pahoriana, raha nazoto nanatanteraka ny asa tsara rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Fa mandava kosa ny mpitondratena mbola tanora; fa rehefa mampitodika azy hanalavitra an’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' ny faniriany dia ta hanambady indray izy izay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Koa meloka izy satria nandà ny fanekena nataony teo aloha. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ankoatra izay dia mianatra ho malaina miasa koa izy ka mandehandeha mitety trano; ary tsy malaina miasa ihany fa mitati-dresaka sy mpandehandeha miraharaha ny an’olona ka manao teny tsy tokony hotenenina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Koa tiako raha hanambady indray ny mpitondratena mbola tanora ary hanan-janaka sy hitondra ny tokantranony ka tsy hanome vahana ny fahavalo hitenenany ratsy azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Fa efa nivily sahady ny sasany nanaraka an’i Satana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Raha misy vehivavy mpino manana havana mpitondratena dia aoka izy no hikarakara azy, fa aza avela hahavaky tratra ny fiangonana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.16 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: eklesia.
    marker-yv: yv-n
  - type: text
    text: ' mba hikarakarany izay tena mpitondratena tokoa.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny amin’ny loholona
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ny loholona
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.17 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: presbytera.
    marker-yv: yv-n
  - type: text
    text: ' izay mahay mitarika dia mendrika ny hahazo fanajana roa heny, indrindra fa izay mikely aina amin’ny teny sy ny fampianarana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Fa hoy ny Soratra Masina: «Aza manakombona ny vavan’ny omby mively vary ianao» (Deo 25.4). Ary koa: «Ny mpiasa dia mendrika hahazo ny karamany» (Lio 10.7). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Aza mandray teny hiampangana loholona raha tsy misy vavolombelona roa na telo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Izay manota dia anaro eo anatrehan’ny olona rehetra mba hatahotra koa ny sasany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Mananatra mafy anao aho eo anatrehan’Andriamanitra sy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' Jesosy ary ny anjely voafidy mba hotandremanao izany zavatra izany ka tsy hisy fizahan-tavan’olona na fanaovana na inona na inona amin’ny fiangarana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Aza malaky mametra-tanana amin’olona na iza na iza ary aza miombona ota amin’ny sasany; tahirizo madio ny tenanao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Aza dia rano fotsiny no atao fisotro fa misotroa divay kely noho ny am-bavafonao sy ny fahosaosanao matetika. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Miharihary ny fahotan’ny olona sasany ka mialoha azy ho amin’ny fitsarana, fa ny an’ny sasany kosa dia manaraka ato aoriana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Ary miharihary toy izany koa ny asa tsara; ary na ny ankoatra izany aza dia tsy ho azo afenina.
