document_id: ISA.39
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Noraisin’i Hezekia ireo iraka avy any Babilona
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 2Mpa 20.12-19
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Tamin’izany andro izany no nampitondran’i Merodaka-Baladana, zanak’i Baladana, mpanjakan’i Babilona, taratasy sy fanomezana ho an’i Hezekia; reny mantsy fa narary izy ka sitrana. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Faly noho izany i Hezekia ka nampiseho azy ny trano fitahirizany zava-tsoa, dia volafotsy, volamena, zavamanitra ary menaka tsara, sy ny trano fitahirizana ny fiadiany rehetra mbamin’izay rehetra tao amin’ny firaketany; tsy nisy zavatra tsy nasehon’i Hezekia azy, na ny tao an-tranony, na ny tao amin’ny fanjakany rehetra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dia nankany amin’i Hezekia mpanjaka Isaia mpaminany ka niteny taminy hoe: Inona no nolazain’ireo olona ireo ary avy taiza no niaviany hankaty aminao? Ary hoy i Hezekia: Nankaty amiko avy tany an-tany lavitra izy, avy tany Babilona. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dia hoy Isaia: Koa inona avy anefa no hitany tato an-tranonao? Ary hoy i Hezekia: Izay rehetra ato an-tranoko dia hitany avokoa; tsy nisy zavatra tsy nasehoko azy ny ao amin’ny trano fitahirizana rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia hoy Isaia tamin’i Hezekia: Henoy ary ny tenin’Andriamanitra, Tompon’izao rehetra izao! '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Indro, avy ny andro, koa hoentina any Babilona izay rehetra ao an-tranonao sy izay rehetra noharin’ny razanao ka voatahiry mandraka androany; eny, tsy hisy sisa hijanona na inona na inona, hoy NY TOMPO. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary na dia ny naterakao aza dia hisy hoentiny koa ka ho ionoka any amin’ny lapan’ny mpanjakan’i Babilona ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dia hoy i Hezekia tamin’Isaia: Tsara ny tenin’NY TOMPO izay nolazainao. Hoy koa izy: Eny, hisy fiadanana amin’ny androko ka handry fahalemana ny tany.'
