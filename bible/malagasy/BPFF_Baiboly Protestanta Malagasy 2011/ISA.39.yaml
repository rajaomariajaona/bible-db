document_id: ISA.39,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Noraisin’i Hezekia ireo iraka avy any Babilona
  - type: heading
    content: 2Mpa 20.12-19
  - type: text
    content: 'Tamin’izany andro izany no nampitondran’i Merodaka-Baladana, zanak’i Baladana, mpanjakan’i Babilona, taratasy sy fanomezana ho an’i Hezekia; reny mantsy fa narary izy ka sitrana. '
  '2':
  - type: text
    content: Faly noho izany i Hezekia ka nampiseho azy ny trano fitahirizany zava-tsoa, dia volafotsy, volamena, zavamanitra ary menaka tsara, sy ny trano fitahirizana ny fiadiany rehetra mbamin’izay rehetra tao amin’ny firaketany; tsy nisy zavatra tsy nasehon’i Hezekia azy, na ny tao an-tranony, na ny tao amin’ny fanjakany rehetra.
  '3':
  - type: text
    content: 'Dia nankany amin’i Hezekia mpanjaka Isaia mpaminany ka niteny taminy hoe: Inona no nolazain’ireo olona ireo ary avy taiza no niaviany hankaty aminao? Ary hoy i Hezekia: Nankaty amiko avy tany an-tany lavitra izy, avy tany Babilona. '
  '4':
  - type: text
    content: 'Dia hoy Isaia: Koa inona avy anefa no hitany tato an-tranonao? Ary hoy i Hezekia: Izay rehetra ato an-tranoko dia hitany avokoa; tsy nisy zavatra tsy nasehoko azy ny ao amin’ny trano fitahirizana rehetra. '
  '5':
  - type: text
    content: 'Dia hoy Isaia tamin’i Hezekia: Henoy ary ny tenin’Andriamanitra, Tompon’izao rehetra izao! '
  '6':
  - type: text
    content: 'Indro, avy ny andro, koa hoentina any Babilona izay rehetra ao an-tranonao sy izay rehetra noharin’ny razanao ka voatahiry mandraka androany; eny, tsy hisy sisa hijanona na inona na inona, hoy NY TOMPO. '
  '7':
  - type: text
    content: 'Ary na dia ny naterakao aza dia hisy hoentiny koa ka ho ionoka any amin’ny lapan’ny mpanjakan’i Babilona ireo. '
  '8':
  - type: text
    content: 'Dia hoy i Hezekia tamin’Isaia: Tsara ny tenin’NY TOMPO izay nolazainao. Hoy koa izy: Eny, hisy fiadanana amin’ny androko ka handry fahalemana ny tany.'
