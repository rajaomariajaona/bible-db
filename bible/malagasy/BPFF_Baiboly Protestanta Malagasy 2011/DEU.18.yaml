document_id: DEU.18,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny zon’ny levita
  - type: text
    content: 'Tsy mba hanana anjara na lova eo amin’ny Israely ny '
  - type: text
    content: levita
  - type: text
    content: ' mpisorona, dia ny fokon’i Levy rehetra; fa ny fanatitra levonina amin’ny afo ho an’NY TOMPO sy ny anjaran’NY TOMPO no ho fihinany. '
  '10':
  - type: text
    content: 'Aoka tsy hisy eo aminao izay mampandeha ny zanany lahy na ny zanany vavy hamakivaky afo, na mpisikidy, na mpanandro, na mpanao sikidy, na mpitahiry ody, '
  '11':
  - type: text
    content: 'na manao azy ho masim-bava, na mpanadina amin’ny olona izay mpiantso ny fanahin’ny maty, na mpisikidy, na mpila hevitra amin’ny maty. '
  '12':
  - type: text
    content: 'Fa fahavetavetana eo imason’NY TOMPO izay rehetra manao ireo zavatra ireo, ary izany fahavetavetana izany no androahan’NY TOMPO Andriamanitrao azy eo anoloanao. '
  '13':
  - type: text
    content: Aoka ianao ho tanteraka eo amin’NY TOMPO Andriamanitrao.
  '14':
  - type: text
    content: 'Fa ireo firenena izay efa horoahinao ireo dia mihaino ny mpanandro sy ny mpisikidy; fa ianao kosa dia tsy navelan’NY TOMPO Andriamanitrao hanao izany. '
  '15':
  - type: text
    content: 'Mpaminany avy eo aminao, dia avy amin’ny rahalahinao, tahaka ahy, no hatsangan’NY TOMPO Andriamanitrao ho anao: Izy no hohenoinareo. '
  '16':
  - type: text
    content: 'Araka izay rehetra nangatahinao tamin’NY TOMPO Andriamanitrao tao Horeba tamin’ny andro nivoriana hoe: Aoka tsy hihaino ny feon’NY TOMPO Andriamanitro intsony aho, ary aoka tsy hahita izany afo lehibe izany intsony aho, fandrao maty. '
  '17':
  - type: text
    content: 'Dia hoy NY TOMPO tamiko: Tsara ny teny izay nolazainy. '
  '18':
  - type: text
    content: 'Mpaminany no hatsangako ho azy avy amin’ny rahalahiny tahaka anao ka hataoko eo am-bavany ny teniko, ary holazainy aminy izay rehetra handidiako azy. '
  '19':
  - type: text
    content: 'Ary izay rehetra tsy mihaino ny teniko, izay holazain’io mpaminany io amin’ny anarako, dia Izaho no hitsara azy. '
  '2':
  - type: text
    content: 'Tsy hanan-dova eo amin’ny rahalahiny izy; NY TOMPO no lovany, araka izay nolazainy taminy. '
  '20':
  - type: text
    content: 'Fa ny mpaminany izay sahy hilaza teny amin’ny anarako, nefa tsy araka izay nasaiko nolazainy, na izay miteny amin’ny anaran’ny andriamanitra hafa, dia hovonoina. '
  '21':
  - type: text
    content: 'Ary raha hoy ianao anakampo: Hataontsika ahoana no fahafantatra ny teny izay tsy nolazain’NY TOMPO? '
  '22':
  - type: text
    content: Raha miteny amin’ny anaran’NY TOMPO ny mpaminany ka tsy mitranga na tsy tanteraka ilay zavatra nolazainy dia teny izay tsy nolazain’NY TOMPO izany, fa tamin’ny fahasahisahiana no nilazan’ny mpaminany izany, koa aza matahotra azy.
  '3':
  - type: text
    content: 'Ary izao no ho anjaran’ny mpisorona avy amin’ny olona, dia avy amin’izay mamono zavatra hatao fanatitra, na omby, na ondry, na osy: Homena ho an’ny mpisorona ny sorony sy ny valanoranony roa ary ny vavoniny. '
  '4':
  - type: text
    content: 'Homenareo azy koa ny voaloham-bokatry ny varinao, ny ranom-boalobokao, ny diloilonao ary ny voalohan’ny volon’ondrinao. '
  '5':
  - type: text
    content: Fa izy sy ny taranany no nofidin’NY TOMPO Andriamanitrao tamin’ny fokonao rehetra hitsangana hanao fanompoam-pivavahana amin’ny andro rehetra amin’ny anaran’NY TOMPO.
  '6':
  - type: text
    content: 'Raha misy levita miala amin’ny tanànanao iray, izay nivahiniany, tany amin’ny Israely rehetra ka mandeha araka ny fanirian’ny fony ho any amin’ny tany izay hofidin’NY TOMPO, '
  '7':
  - type: text
    content: 'ary manao fanompoam-pivavahana amin’ny anaran’NY TOMPO Andriamaniny, tahaka ny levita rahalahiny rehetra izay mitsangana eo anatrehan’NY TOMPO, '
  '8':
  - type: text
    content: dia anjara mitovy amin’ny anjaran’ireo ihany no ho fihinany, na dia misy aza izay azony tamin’ny nivarotany izay fananana avy tamin’ny rainy.
  - type: heading
    content: Ny amin’ny mpaminany sandoka sy ny tena mpaminany
  '9':
  - type: text
    content: 'Rehefa tonga any amin’ny tany izay omen’NY TOMPO Andriamanitrao anao ianao dia aza mianatra manao araka ny fahavetavetana ataon’ireo firenena ireo. '
