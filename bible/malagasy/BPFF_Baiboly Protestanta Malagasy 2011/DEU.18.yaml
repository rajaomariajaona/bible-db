document_id: DEU.18
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny zon’ny levita
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Tsy mba hanana anjara na lova eo amin’ny Israely ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: levita
  - type: text
    text: ' mpisorona, dia ny fokon’i Levy rehetra; fa ny fanatitra levonina amin’ny afo ho an’NY TOMPO sy ny anjaran’NY TOMPO no ho fihinany. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Tsy hanan-dova eo amin’ny rahalahiny izy; NY TOMPO no lovany, araka izay nolazainy taminy. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary izao no ho anjaran’ny mpisorona avy amin’ny olona, dia avy amin’izay mamono zavatra hatao fanatitra, na omby, na ondry, na osy: Homena ho an’ny mpisorona ny sorony sy ny valanoranony roa ary ny vavoniny. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Homenareo azy koa ny voaloham-bokatry ny varinao, ny ranom-boalobokao, ny diloilonao ary ny voalohan’ny volon’ondrinao. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Fa izy sy ny taranany no nofidin’NY TOMPO Andriamanitrao tamin’ny fokonao rehetra hitsangana hanao fanompoam-pivavahana amin’ny andro rehetra amin’ny anaran’NY TOMPO.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Raha misy levita miala amin’ny tanànanao iray, izay nivahiniany, tany amin’ny Israely rehetra ka mandeha araka ny fanirian’ny fony ho any amin’ny tany izay hofidin’NY TOMPO, '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'ary manao fanompoam-pivavahana amin’ny anaran’NY TOMPO Andriamaniny, tahaka ny levita rahalahiny rehetra izay mitsangana eo anatrehan’NY TOMPO, '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: dia anjara mitovy amin’ny anjaran’ireo ihany no ho fihinany, na dia misy aza izay azony tamin’ny nivarotany izay fananana avy tamin’ny rainy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny amin’ny mpaminany sandoka sy ny tena mpaminany
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Rehefa tonga any amin’ny tany izay omen’NY TOMPO Andriamanitrao anao ianao dia aza mianatra manao araka ny fahavetavetana ataon’ireo firenena ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Aoka tsy hisy eo aminao izay mampandeha ny zanany lahy na ny zanany vavy hamakivaky afo, na mpisikidy, na mpanandro, na mpanao sikidy, na mpitahiry ody, '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'na manao azy ho masim-bava, na mpanadina amin’ny olona izay mpiantso ny fanahin’ny maty, na mpisikidy, na mpila hevitra amin’ny maty. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Fa fahavetavetana eo imason’NY TOMPO izay rehetra manao ireo zavatra ireo, ary izany fahavetavetana izany no androahan’NY TOMPO Andriamanitrao azy eo anoloanao. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Aoka ianao ho tanteraka eo amin’NY TOMPO Andriamanitrao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Fa ireo firenena izay efa horoahinao ireo dia mihaino ny mpanandro sy ny mpisikidy; fa ianao kosa dia tsy navelan’NY TOMPO Andriamanitrao hanao izany. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Mpaminany avy eo aminao, dia avy amin’ny rahalahinao, tahaka ahy, no hatsangan’NY TOMPO Andriamanitrao ho anao: Izy no hohenoinareo. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Araka izay rehetra nangatahinao tamin’NY TOMPO Andriamanitrao tao Horeba tamin’ny andro nivoriana hoe: Aoka tsy hihaino ny feon’NY TOMPO Andriamanitro intsony aho, ary aoka tsy hahita izany afo lehibe izany intsony aho, fandrao maty. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Dia hoy NY TOMPO tamiko: Tsara ny teny izay nolazainy. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Mpaminany no hatsangako ho azy avy amin’ny rahalahiny tahaka anao ka hataoko eo am-bavany ny teniko, ary holazainy aminy izay rehetra handidiako azy. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary izay rehetra tsy mihaino ny teniko, izay holazain’io mpaminany io amin’ny anarako, dia Izaho no hitsara azy. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Fa ny mpaminany izay sahy hilaza teny amin’ny anarako, nefa tsy araka izay nasaiko nolazainy, na izay miteny amin’ny anaran’ny andriamanitra hafa, dia hovonoina. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary raha hoy ianao anakampo: Hataontsika ahoana no fahafantatra ny teny izay tsy nolazain’NY TOMPO? '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Raha miteny amin’ny anaran’NY TOMPO ny mpaminany ka tsy mitranga na tsy tanteraka ilay zavatra nolazainy dia teny izay tsy nolazain’NY TOMPO izany, fa tamin’ny fahasahisahiana no nilazan’ny mpaminany izany, koa aza matahotra azy.
