document_id: NEH.1,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Mandre ny vaovao avy any Jerosalema i Nehemia
  - type: text
    content: Ny tantaran’i Nehemia, zanak’i Hakalia.
  - type: text
    content: 'Tamin’ny volana '
  - type: text
    content: Kisleo
  - type: text
    content: ' tamin’ny taona faharoapolo, raha tany an-dapa any Sosana aho, '
  '10':
  - type: text
    content: 'Ary ireo dia mpanomponao sy olonao izay navotanao tamin’ny herinao lehibe sy ny tananao mahery. '
  '11':
  - type: text
    content: Koa mitaraina Aminao aho, Tompo ô, mihainoa ny vavaka ataon’ity mpanomponao ity sy ny vavaka ataon’ny mpanomponao rehetra izay faly amin’ny fahatahorana ny anaranao; hambinina anie ny mpanomponao anio ary aoka hahazo famindrampo eo imason’io lehilahy io aho.
  - type: text
    content: Mpitondra kapoaky ny mpanjaka anefa aho tamin’izany.
  '2':
  - type: text
    content: 'dia tonga i Hanany, iray amin’ny rahalahiko, mbamin’ny lehilahy sasany avy tany Joda. Nanontaniako azy ny amin’ny '
  - type: text
    content: Jiosy
  - type: text
    content: ' izay sisa afaka tamin’ny fahababoana sy ny amin’i Jerosalema, '
  '3':
  - type: text
    content: 'koa hoy ny navaliny ahy: Ny sisa tamin’ny fahababoana izay any amin’ny fari-piadidiana any dia mitondra fahoriana be sy latsa; ary voarodana ny mandan’i Jerosalema sady main’ny afo ny vavahadiny.'
  - type: heading
    content: Ny vavaka nataon’i Nehemia ho an’ny Jiosy
  '4':
  - type: text
    content: 'Rehefa nandre izany teny izany aho dia nipetraka nitomany sady niferinaina andro maro ary nifady hanina sy nivavaka teo anatrehan’Andriamanitry ny lanitra '
  '5':
  - type: text
    content: 'ka hoy aho hoe:'
  - type: text
    content: 'Indrisy! RY TOMPO, Andriamanitry ny lanitra, Andriamanitra lehibe sy mahatahotra, izay mitandrina ny fanekena sy famindrampo amin’izay tia Azy sy mitandrina ny didiny, '
  '6':
  - type: text
    content: 'aoka hihaino ny sofinao ary hihiratra ny masonao, mba hohenoinao ny vavaky ny mpanomponao, izay ataoko eto anatrehanao ankehitriny andro aman’alina ho an’ny Zanak’Israely mpanomponao sy izay anekeko ny fahotan’ny Zanak’Israely, izay efa nanotanay taminao; fa izaho sy ny ankohonan-draiko dia samy efa nanota avokoa. '
  '7':
  - type: text
    content: 'Efa nanao izay ratsy indrindra taminao izahay ka tsy nitandrina ny didy, na ny lalàna, na ny fitsipika, izay nandidianao an’i Mosesy mpanomponao. '
  '8':
  - type: text
    content: 'Hotsarovanao anie ilay teny nandidianao an’i Mosesy mpanomponao hoe: Raha manao izay mahadiso ianareo dia hampiely anareo any amin’ny firenena maro Aho; '
  '9':
  - type: text
    content: 'nefa raha miverina amiko kosa ianareo ka mitandrina ny didiko sy mankatò azy, na dia hisy voaroaka hatrany am-paravodilanitra aza ianareo, dia avy any no hanangonako anareo ka hoentiko ho eo amin’ny toerana izay nofidiko hampitoerako ny anarako ianareo. '
