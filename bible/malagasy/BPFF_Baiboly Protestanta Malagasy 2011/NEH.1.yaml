document_id: NEH.1
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mandre ny vaovao avy any Jerosalema i Nehemia
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ny tantaran’i Nehemia, zanak’i Hakalia.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Tamin’ny volana '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kisleo
  - type: text
    text: ' tamin’ny taona faharoapolo, raha tany an-dapa any Sosana aho, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'dia tonga i Hanany, iray amin’ny rahalahiko, mbamin’ny lehilahy sasany avy tany Joda. Nanontaniako azy ny amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jiosy
  - type: text
    text: ' izay sisa afaka tamin’ny fahababoana sy ny amin’i Jerosalema, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'koa hoy ny navaliny ahy: Ny sisa tamin’ny fahababoana izay any amin’ny fari-piadidiana any dia mitondra fahoriana be sy latsa; ary voarodana ny mandan’i Jerosalema sady main’ny afo ny vavahadiny.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny vavaka nataon’i Nehemia ho an’ny Jiosy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Rehefa nandre izany teny izany aho dia nipetraka nitomany sady niferinaina andro maro ary nifady hanina sy nivavaka teo anatrehan’Andriamanitry ny lanitra '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'ka hoy aho hoe:'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Indrisy! RY TOMPO, Andriamanitry ny lanitra, Andriamanitra lehibe sy mahatahotra, izay mitandrina ny fanekena sy famindrampo amin’izay tia Azy sy mitandrina ny didiny, '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'aoka hihaino ny sofinao ary hihiratra ny masonao, mba hohenoinao ny vavaky ny mpanomponao, izay ataoko eto anatrehanao ankehitriny andro aman’alina ho an’ny Zanak’Israely mpanomponao sy izay anekeko ny fahotan’ny Zanak’Israely, izay efa nanotanay taminao; fa izaho sy ny ankohonan-draiko dia samy efa nanota avokoa. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Efa nanao izay ratsy indrindra taminao izahay ka tsy nitandrina ny didy, na ny lalàna, na ny fitsipika, izay nandidianao an’i Mosesy mpanomponao. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Hotsarovanao anie ilay teny nandidianao an’i Mosesy mpanomponao hoe: Raha manao izay mahadiso ianareo dia hampiely anareo any amin’ny firenena maro Aho; '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'nefa raha miverina amiko kosa ianareo ka mitandrina ny didiko sy mankatò azy, na dia hisy voaroaka hatrany am-paravodilanitra aza ianareo, dia avy any no hanangonako anareo ka hoentiko ho eo amin’ny toerana izay nofidiko hampitoerako ny anarako ianareo. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary ireo dia mpanomponao sy olonao izay navotanao tamin’ny herinao lehibe sy ny tananao mahery. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Koa mitaraina Aminao aho, Tompo ô, mihainoa ny vavaka ataon’ity mpanomponao ity sy ny vavaka ataon’ny mpanomponao rehetra izay faly amin’ny fahatahorana ny anaranao; hambinina anie ny mpanomponao anio ary aoka hahazo famindrampo eo imason’io lehilahy io aho.
- type: usfm
  marker: p
  children:
  - type: text
    text: Mpitondra kapoaky ny mpanjaka anefa aho tamin’izany.
