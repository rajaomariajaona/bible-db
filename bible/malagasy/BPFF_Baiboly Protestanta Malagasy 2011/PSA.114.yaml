document_id: PSA.114,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Fony nivoaka avy tany Ejipta ny Israely
  - type: text
    content: Fony nivoaka avy tany Ejipta ny Israely,
  - type: text
    content: dia ny taranak’i Jakoba avy tany amin’ny firenena hafa fiteny,
  '2':
  - type: text
    content: 'dia tonga fitoerany masina i '
  - type: text
    content: Joda
  - type: text
    content: ary Israely no fanjakany.
  '3':
  - type: text
    content: Nahita azy ny ranomasina ka nandositra
  - type: text
    content: ary nihemotra i Jordana.
  '4':
  - type: text
    content: Ny tendrombohitra dia nifalihavanja tahaka ny ondrilahy
  - type: text
    content: ary ny havoana tahaka ny zanak’ondry.
  '5':
  - type: text
    content: Inona izato mahazo anao, ry ranomasina, no mandositra ianao?
  - type: text
    content: Ary ianao, ry Jordana, no mihemotra ianao?
  '6':
  - type: text
    content: Ary ianareo tendrombohitra, no mifalihavanja tahaka ny ondrilahy?
  - type: text
    content: Ary ianareo havoana, no tahaka ny zanak’ondry?
  '7':
  - type: text
    content: Mihorohoroa eo anatrehan’ny Tompo, ry tany,
  - type: text
    content: dia eo anatrehan’Andriamanitr’i Jakoba
  '8':
  - type: text
    content: izay mampody ny vatolampy ho farihy
  - type: text
    content: ary ny vatoafo ho loharano.
