    - type: text
      text: Fony nivoaka avy tany Ejipta ny Israely,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ny taranak’i Jakoba avy tany amin’ny firenena hafa fiteny,
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'dia tonga fitoerany masina i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Joda
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary Israely no fanjakany.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nahita azy ny ranomasina ka nandositra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary nihemotra i Jordana.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny tendrombohitra dia nifalihavanja tahaka ny ondrilahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny havoana tahaka ny zanak’ondry.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Inona izato mahazo anao, ry ranomasina, no mandositra ianao?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ianao, ry Jordana, no mihemotra ianao?
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ianareo tendrombohitra, no mifalihavanja tahaka ny ondrilahy?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ianareo havoana, no tahaka ny zanak’ondry?
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mihorohoroa eo anatrehan’ny Tompo, ry tany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia eo anatrehan’Andriamanitr’i Jakoba
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay mampody ny vatolampy ho farihy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny vatoafo ho loharano.
