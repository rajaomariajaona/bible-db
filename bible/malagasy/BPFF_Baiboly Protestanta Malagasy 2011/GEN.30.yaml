document_id: GEN.30
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Rehefa hitan’i Rahely fa tsy mba niteraka tamin’i Jakoba izy dia nialona ny rahavaviny izy ka hoy izy tamin’i Jakoba: Mba omeo zaza aho fa raha tsy izany dia ho faty! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Dia nirehitra tamin’i Rahely ny fahatezeran’i Jakoba ka hoy izy: Solon’Andriamanitra izay nahamomba anao tsy hiteraka va aho? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary hoy Rahely: Indro i Bila mpanompovaviko, vadio izy; dia hiteraka eo ampofoako izy, mba hahazoako zaza amin’ny alalany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dia nomeny azy i Bila mpanompovaviny ho vadiny dia novadin’i Jakoba koa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia nanana anaka i Bila ka niteraka zazalahy tamin’i Jakoba. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary hoy Rahely: Andriamanitra nanome rariny ahy sady nihaino ny feoko ka nomeny zazalahy aho. Izany no nanaovany ny anarany hoe Dana'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Dana: Mpanome rariny.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dia nanana anaka indray i Bila, mpanompovavin’i Rahely, ka niteraka zazalahy faharoa tamin’i Jakoba. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary hoy Rahely: Fitolomana faran’izay mafy no nitolomako tamin’ny rahavaviko ka nahery aho. Dia nataony hoe Naftaly'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Naftaly: Fitolomako.'
    marker-yv: yv-n
  - type: text
    text: ' ny anarany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Rehefa hitan’i Lea fa nitsaha-jaza izy tenany dia naka an’i Zilpa mpanompovaviny izy ka nomeny ho vadin’i Jakoba koa io. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary i Zilpa, mpanompovavin’i Lea, dia niteraka zazalahy tamin’i Jakoba. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary hoy i Lea: Manan-jara re aho! Dia nataony hoe Gada'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Gada: Zara.'
    marker-yv: yv-n
  - type: text
    text: ' ny anarany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary i Zilpa, mpanompovavin’i Lea, dia niteraka zazalahy faharoa tamin’i Jakoba. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary hoy i Lea: Sambatra aho, fa hataon’ny zanakavavin’ny olona hoe Sambatra aho. Dia nataony hoe Asera'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Asera: Sambatra.'
    marker-yv: yv-n
  - type: text
    text: ' ny anarany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ary nandeha nitsangantsangana i Robena tamin’ny fotoana fijinjam-barimbazaha dia nahita dodaima
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'dodaima: '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Karazan-javamaniry iray izay noheverina fa mampiteraka.
    marker-yv: yv-n
  - type: text
    text: ' tany an-tsaha ka nitondra azy ho any amin’i Lea reniny. Ary hoy Rahely tamin’i Lea: Mba anomezo amin’ny dodaiman’ny zanakao re aho! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Fa hoy i Lea taminy: Tsy ampy anao va ny nakanao ny vadiko no halainao koa ny dodaiman’ny zanako? Dia hoy Rahely: Aoka ary izy handry aminao ihany anio alina ho takalon’ny dodaiman’ny zanakao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Nony hariva, rehefa tonga avy tany an-tsaha i Jakoba, dia avy nitsena azy i Lea ka niteny hoe: Atỳ amiko no halehanao; fa karamako tamin’ny dodaiman’ny zanako tokoa ianao. Dia nandry taminy izy tamin’iny alina iny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary Andriamanitra nihaino an’i Lea ka nanana anaka izy ka niteraka zazalahy fahadimy tamin’i Jakoba. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Dia hoy i Lea: Efa nomen’Andriamanitra ny karamako, satria nomeko hovadin’ny vadiko ny mpanompovaviko. Dia nataony hoe Isakara'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Isakara: Misy karama, '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: mitondra karama.
    marker-yv: yv-n
  - type: text
    text: ' ny anarany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Dia nanana anaka indray i Lea ka niteraka zazalahy fahenina tamin’i Jakoba. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary hoy i Lea: Notoloran’Andriamanitra fanomezana soa aho; amin’izao vao hitoetra amiko ny vadiko fa niteraka enin-dahy taminy aho. Dia nataony hoe Zebolona'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Zebolona: Fitoerana '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: fonenana.
    marker-yv: yv-n
  - type: text
    text: ' ny anarany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Rehefa afaka izany dia niteraka zazavavy izy ka nataony hoe Dina ny anarany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary Andriamanitra nahatsiaro an’i Rahely ka nihaino azy ary nampanana anaka azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Nanana anaka izy ka niteraka zazalahy. Dia hoy izy: Nahafa-tondro-maso ahy Andriamanitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Dia nataony hoe Josefa
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Josefa: Hanampy.'
    marker-yv: yv-n
  - type: text
    text: ' ny anarany, fa hoy izy: NY TOMPO anie mbola hanampy zazalahy iray ho ahy koa.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mitombo harena i Jakoba
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Rehefa niteraka an’i Josefa Rahely dia hoy i Jakoba tamin’i Labana: Avelao aho handeha any amin’ny fonenako sy ny taniko. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Omeo ahy ny vady aman-janako izay nanompoako anao fa handeha aho; fantatrao ny fanompoana izay nefaiko ho anao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Dia hoy i Labana taminy: Miangavy anao re, aoka mba hahita fitia eo imasonao aho. Nitady famantarana aho ka fantatro fa avy taminao no nitahian’NY TOMPO ahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Hoy koa izy: Tonòny izay ho karamanao, dia homeko anao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Hoy i Jakoba taminy: Fantatrao ny nanompoako anao sy ny nitomboan’ny omby aman’ondrinao teo am-pelatanako, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'fa kely ny fanananao fony tsy mbola tonga aho, nefa nitombo be dia be izany; ary efa nitahy anao NY TOMPO tamin’ny diako rehetra. Koa ankehitriny, rahoviana kosa aho no mba hihary ho an’ny ao an-tranoko? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Hoy i Labana: Inona ary no homeko anao? Dia hoy i Jakoba: Aza manome ahy na inona na inona ianao. Raha ataonao amiko izao zavatra manaraka izao dia mbola hanohy hiandry sy hitandrina ny ondry aman’osinao ihany aho: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Handeha hitety ny ondry aman’osinao rehetra aho anio ka hanavaka ny mara sy ny sada rehetra, ary ny mainty rehetra eo amin’ny ondry kely ary ny sada sy ny mara amin’ny osy. Ireny no ho karamako. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ny fahamarinako no ho vavolombeloko amin’ny ho avy rehefa tonga ianao handinika ny karamako: Izay rehetra tsy mara sy tsy sada eo amin’ny osy, ary izay tsy mainty eo amin’ny zanak’ondry, dia ho nangalariko. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Dia hoy i Labana: Eny ary, aoka ho araka ny teninao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Dia navahany tamin’izany andro izany ny osilahy vandana sy sada, ary izay osivavy rehetra mara sy sada, dia izay rehetra nisy fotsy, ary ny mainty rehetra tamin’ny ondry, dia natolony teo an-tanan’ireo zanany lahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Ary nasiany lalan-kateloana teo anelanelan’izy sy i Jakoba izay mbola niandry ny ondry aman’osin’i Labana sisa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Ary naka tsorakazo maro tamin’ny hazo kesika mbola maitso sy tamin’ny hazo amanda sy tamin’ny hazo platana i Jakoba ka nataony ofy vandana ireny hisehoan’ny fotsy izay tamin’ny tsorakazo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Dia napetrany teo anoloan’ny ondry aman’osy, tao anatin’ny fampisotroan-drano, ireny tsorakazo voavaofiny ireny, tao anatin’ny fampisotroan-drano izay nalehan’ny ondry aman’osy hisotro; nikambana teo ny lahy sy ny vavy raha avy hisotro rano. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Nikambana tandrifin’ny tsorakazo ny ondry aman’osy ka niteraka vandana sy mara ary sada. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Dia navahan’i Jakoba ny zanak’ondry, fa ny ondry sisa dia nataony manatrika ny sadika sy ny mainty rehetra teo amin’ny ondry aman’osin’i Labana; avy eo natokany izay ondry aman’osy ho azy ka tsy navelany hiharo tamin’ny ondry aman’osin’i Labana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Isaky ny miray ny ondry aman’osy matanjaka dia napetrak’i Jakoba tao anatin’ny fampisotroan-drano teo anoloan’ny mason’ny ondry aman’osy ireny tsorakazo ireny mba hiraisany eo anilan’ny tsorakazo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: Fa raha osaosa kosa ny ondry aman’osy dia tsy mba napetrany teo ireny, koa ny osaosa no an’i Labana fa ny matanjaka kosa an’i Jakoba.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nandositra niala tany amin’i Labana i Jakoba
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: Nitombo harena aoka izany Ralehilahy ka nanana ondry aman’osy betsaka ary mpanompovavy sy mpanompolahy ary rameva sy boriky.
