document_id: GEN.30,3103
type_code: plt
verses:
  '1':
  - type: text
    content: 'Rehefa hitan’i Rahely fa tsy mba niteraka tamin’i Jakoba izy dia nialona ny rahavaviny izy ka hoy izy tamin’i Jakoba: Mba omeo zaza aho fa raha tsy izany dia ho faty! '
  '10':
  - type: text
    content: 'Ary i Zilpa, mpanompovavin’i Lea, dia niteraka zazalahy tamin’i Jakoba. '
  '11':
  - type: text
    content: 'Ary hoy i Lea: Manan-jara re aho! Dia nataony hoe Gada'
  - type: note
    content: 'Gada: Zara.'
  - type: text
    content: ' ny anarany. '
  '12':
  - type: text
    content: 'Ary i Zilpa, mpanompovavin’i Lea, dia niteraka zazalahy faharoa tamin’i Jakoba. '
  '13':
  - type: text
    content: 'Ary hoy i Lea: Sambatra aho, fa hataon’ny zanakavavin’ny olona hoe Sambatra aho. Dia nataony hoe Asera'
  - type: note
    content: 'Asera: Sambatra.'
  - type: text
    content: ' ny anarany.'
  '14':
  - type: text
    content: Ary nandeha nitsangantsangana i Robena tamin’ny fotoana fijinjam-barimbazaha dia nahita dodaima
  - type: note
    content: 'dodaima: Karazan-javamaniry iray izay noheverina fa mampiteraka.'
  - type: text
    content: ' tany an-tsaha ka nitondra azy ho any amin’i Lea reniny. Ary hoy Rahely tamin’i Lea: Mba anomezo amin’ny dodaiman’ny zanakao re aho! '
  '15':
  - type: text
    content: 'Fa hoy i Lea taminy: Tsy ampy anao va ny nakanao ny vadiko no halainao koa ny dodaiman’ny zanako? Dia hoy Rahely: Aoka ary izy handry aminao ihany anio alina ho takalon’ny dodaiman’ny zanakao. '
  '16':
  - type: text
    content: 'Nony hariva, rehefa tonga avy tany an-tsaha i Jakoba, dia avy nitsena azy i Lea ka niteny hoe: Atỳ amiko no halehanao; fa karamako tamin’ny dodaiman’ny zanako tokoa ianao. Dia nandry taminy izy tamin’iny alina iny. '
  '17':
  - type: text
    content: 'Ary Andriamanitra nihaino an’i Lea ka nanana anaka izy ka niteraka zazalahy fahadimy tamin’i Jakoba. '
  '18':
  - type: text
    content: 'Dia hoy i Lea: Efa nomen’Andriamanitra ny karamako, satria nomeko hovadin’ny vadiko ny mpanompovaviko. Dia nataony hoe Isakara'
  - type: note
    content: 'Isakara: Misy karama, na: mitondra karama.'
  - type: text
    content: ' ny anarany. '
  '19':
  - type: text
    content: 'Dia nanana anaka indray i Lea ka niteraka zazalahy fahenina tamin’i Jakoba. '
  '2':
  - type: text
    content: 'Dia nirehitra tamin’i Rahely ny fahatezeran’i Jakoba ka hoy izy: Solon’Andriamanitra izay nahamomba anao tsy hiteraka va aho? '
  '20':
  - type: text
    content: 'Ary hoy i Lea: Notoloran’Andriamanitra fanomezana soa aho; amin’izao vao hitoetra amiko ny vadiko fa niteraka enin-dahy taminy aho. Dia nataony hoe Zebolona'
  - type: note
    content: 'Zebolona: Fitoerana na: fonenana.'
  - type: text
    content: ' ny anarany. '
  '21':
  - type: text
    content: Rehefa afaka izany dia niteraka zazavavy izy ka nataony hoe Dina ny anarany.
  '22':
  - type: text
    content: 'Ary Andriamanitra nahatsiaro an’i Rahely ka nihaino azy ary nampanana anaka azy. '
  '23':
  - type: text
    content: 'Nanana anaka izy ka niteraka zazalahy. Dia hoy izy: Nahafa-tondro-maso ahy Andriamanitra. '
  '24':
  - type: text
    content: Dia nataony hoe Josefa
  - type: note
    content: 'Josefa: Hanampy.'
  - type: text
    content: ' ny anarany, fa hoy izy: NY TOMPO anie mbola hanampy zazalahy iray ho ahy koa.'
  - type: heading
    content: Mitombo harena i Jakoba
  '25':
  - type: text
    content: 'Rehefa niteraka an’i Josefa Rahely dia hoy i Jakoba tamin’i Labana: Avelao aho handeha any amin’ny fonenako sy ny taniko. '
  '26':
  - type: text
    content: 'Omeo ahy ny vady aman-janako izay nanompoako anao fa handeha aho; fantatrao ny fanompoana izay nefaiko ho anao. '
  '27':
  - type: text
    content: 'Dia hoy i Labana taminy: Miangavy anao re, aoka mba hahita fitia eo imasonao aho. Nitady famantarana aho ka fantatro fa avy taminao no nitahian’NY TOMPO ahy. '
  '28':
  - type: text
    content: 'Hoy koa izy: Tonòny izay ho karamanao, dia homeko anao. '
  '29':
  - type: text
    content: 'Hoy i Jakoba taminy: Fantatrao ny nanompoako anao sy ny nitomboan’ny omby aman’ondrinao teo am-pelatanako, '
  '3':
  - type: text
    content: 'Ary hoy Rahely: Indro i Bila mpanompovaviko, vadio izy; dia hiteraka eo ampofoako izy, mba hahazoako zaza amin’ny alalany. '
  '30':
  - type: text
    content: 'fa kely ny fanananao fony tsy mbola tonga aho, nefa nitombo be dia be izany; ary efa nitahy anao NY TOMPO tamin’ny diako rehetra. Koa ankehitriny, rahoviana kosa aho no mba hihary ho an’ny ao an-tranoko? '
  '31':
  - type: text
    content: 'Hoy i Labana: Inona ary no homeko anao? Dia hoy i Jakoba: Aza manome ahy na inona na inona ianao. Raha ataonao amiko izao zavatra manaraka izao dia mbola hanohy hiandry sy hitandrina ny ondry aman’osinao ihany aho: '
  '32':
  - type: text
    content: 'Handeha hitety ny ondry aman’osinao rehetra aho anio ka hanavaka ny mara sy ny sada rehetra, ary ny mainty rehetra eo amin’ny ondry kely ary ny sada sy ny mara amin’ny osy. Ireny no ho karamako. '
  '33':
  - type: text
    content: 'Ny fahamarinako no ho vavolombeloko amin’ny ho avy rehefa tonga ianao handinika ny karamako: Izay rehetra tsy mara sy tsy sada eo amin’ny osy, ary izay tsy mainty eo amin’ny zanak’ondry, dia ho nangalariko. '
  '34':
  - type: text
    content: 'Dia hoy i Labana: Eny ary, aoka ho araka ny teninao. '
  '35':
  - type: text
    content: 'Dia navahany tamin’izany andro izany ny osilahy vandana sy sada, ary izay osivavy rehetra mara sy sada, dia izay rehetra nisy fotsy, ary ny mainty rehetra tamin’ny ondry, dia natolony teo an-tanan’ireo zanany lahy. '
  '36':
  - type: text
    content: Ary nasiany lalan-kateloana teo anelanelan’izy sy i Jakoba izay mbola niandry ny ondry aman’osin’i Labana sisa.
  '37':
  - type: text
    content: 'Ary naka tsorakazo maro tamin’ny hazo kesika mbola maitso sy tamin’ny hazo amanda sy tamin’ny hazo platana i Jakoba ka nataony ofy vandana ireny hisehoan’ny fotsy izay tamin’ny tsorakazo. '
  '38':
  - type: text
    content: 'Dia napetrany teo anoloan’ny ondry aman’osy, tao anatin’ny fampisotroan-drano, ireny tsorakazo voavaofiny ireny, tao anatin’ny fampisotroan-drano izay nalehan’ny ondry aman’osy hisotro; nikambana teo ny lahy sy ny vavy raha avy hisotro rano. '
  '39':
  - type: text
    content: 'Nikambana tandrifin’ny tsorakazo ny ondry aman’osy ka niteraka vandana sy mara ary sada. '
  '4':
  - type: text
    content: 'Dia nomeny azy i Bila mpanompovaviny ho vadiny dia novadin’i Jakoba koa. '
  '40':
  - type: text
    content: 'Dia navahan’i Jakoba ny zanak’ondry, fa ny ondry sisa dia nataony manatrika ny sadika sy ny mainty rehetra teo amin’ny ondry aman’osin’i Labana; avy eo natokany izay ondry aman’osy ho azy ka tsy navelany hiharo tamin’ny ondry aman’osin’i Labana. '
  '41':
  - type: text
    content: 'Isaky ny miray ny ondry aman’osy matanjaka dia napetrak’i Jakoba tao anatin’ny fampisotroan-drano teo anoloan’ny mason’ny ondry aman’osy ireny tsorakazo ireny mba hiraisany eo anilan’ny tsorakazo. '
  '42':
  - type: text
    content: Fa raha osaosa kosa ny ondry aman’osy dia tsy mba napetrany teo ireny, koa ny osaosa no an’i Labana fa ny matanjaka kosa an’i Jakoba.
  - type: heading
    content: Nandositra niala tany amin’i Labana i Jakoba
  '43':
  - type: text
    content: Nitombo harena aoka izany Ralehilahy ka nanana ondry aman’osy betsaka ary mpanompovavy sy mpanompolahy ary rameva sy boriky.
  '5':
  - type: text
    content: 'Dia nanana anaka i Bila ka niteraka zazalahy tamin’i Jakoba. '
  '6':
  - type: text
    content: 'Ary hoy Rahely: Andriamanitra nanome rariny ahy sady nihaino ny feoko ka nomeny zazalahy aho. Izany no nanaovany ny anarany hoe Dana'
  - type: note
    content: 'Dana: Mpanome rariny.'
  - type: text
    content: '. '
  '7':
  - type: text
    content: 'Dia nanana anaka indray i Bila, mpanompovavin’i Rahely, ka niteraka zazalahy faharoa tamin’i Jakoba. '
  '8':
  - type: text
    content: 'Ary hoy Rahely: Fitolomana faran’izay mafy no nitolomako tamin’ny rahavaviko ka nahery aho. Dia nataony hoe Naftaly'
  - type: note
    content: 'Naftaly: Fitolomako.'
  - type: text
    content: ' ny anarany.'
  '9':
  - type: text
    content: 'Rehefa hitan’i Lea fa nitsaha-jaza izy tenany dia naka an’i Zilpa mpanompovaviny izy ka nomeny ho vadin’i Jakoba koa io. '
