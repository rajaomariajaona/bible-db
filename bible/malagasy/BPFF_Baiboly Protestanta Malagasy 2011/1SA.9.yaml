document_id: 1SA.9,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: I Saoly sy ireo borikivavy very
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Nisy lehilahy avy amin’ny Benjamina, antsoina hoe Kisy, zanak’i Abiela, zanak’i Zerora, zanak’i Bekorata, zanak’i Afia, benjaminita sady mpiady mahery fo. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Dia hoy i Saoly tamin’ny mpanompony: Tsara izany fa andeha isika hankany. Dia lasa izy roa lahy nankany amin’ny tanàna nitoeran’ilay lehilahin’Andriamanitra.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Raha mbola teo am-piakarana hiditra ao an-tanàna izy roa lahy dia nahita zazavavy nivoaka hantsaka ka hoy izy ireo taminy: Ao ihany va ny mpahita? '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Dia namaly azy izy ireo hoe: Ao ihany izy; indro, ao alohanao ao izy; mandehana haingana, fa efa tonga ao an-tanàna izy izay, satria misy fanatitra hataon’ny vahoaka any amin’ny toerana fanaovana sorona anio; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: koa raha vao miditra ao an-tanàna ianareo dia ho hitanareo izy raha tsy mbola miakatra hihinana ao amin’ny toerana fanaovana sorona; fa tsy hihinana ny vahoaka mandra-pahatongany, satria izy no manao fisaorana amin’ny fanatitra; koa rehefa afaka izany dia izay vao mihinana izay nasaina; koa miakara ianareo ankehitriny fa amin’izao no hahitanareo azy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mihaona amin’i Samoela i Saoly
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Dia niakatra tao an-tanàna izy roa lahy, ary nony tonga tao izy ireo dia indro, nifanena taminy teo am-piakarana ho any amin’ny toerana fanaovana sorona i Samoela.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Ary NY TOMPO efa nanambara tamin’i Samoela ny omalin’ny andro nahatongavan’i Saoly hoe: '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Rahampitso toy izao dia hirahiko ho atỳ aminao ny lehilahy iray avy amin’ny tanin’ny Benjamina, ary hohosoranao ho mpanapaka ny Israely oloko izy ka hamonjy azy amin’ny tanan’ny Filistina; fa efa nijery ny oloko Aho, satria efa tonga atỳ amiko ny fitarainany. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Nony hitan’i Samoela i Saoly dia hoy NY TOMPO taminy: Indro ny lehilahy voalazako taminao; io no hitondra ny oloko. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Dia nanatona an’i Samoela tao anatin’ny vavahady i Saoly ka niteny hoe: Miangavy anao aho, atoroy ahy ny tranon’ny mpahita. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Ary namaly an’i Saoly i Samoela hoe: Izaho no mpahita; miakara eo alohako ho any amin’ny toerana fanaovana sorona; fa hiara-misakafo amiko ianareo anio, ary raha maraina dia havelako handeha ianao ka holazaiko aminao izay rehetra manahirana anao. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Nanan-janakalahy atao hoe Saoly izy, izay mbola tanora sady tsara tarehy ka tsy nisy tsara tarehy noho izy teo amin’ny Zanak’Israely, ary nanan-tombo noho ny olona rehetra hatramin’ny sorony noho miakatra ny halavany.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Aza malahelo ny amin’ny borikinao izay efa very hateloana fa efa hita ireny; ary ho an’iza ny zava-tsoa rehetra eo amin’ny Israely? Tsy ho anao sy ny ankohonan-drainao va? '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Dia namaly i Saoly hoe: Tsy benjaminita va aho, avy amin’ilay kely indrindra amin’ny fokon’Israely? Ary tsy ny fianakaviako va no kely indrindra amin’ny fianakavian’ny fokon’i Benjamina rehetra? Koa nahoana no miteny amiko toy izany ianao?'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Ary nitondra an’i Saoly sy ny zatovony i Samoela ka nampiditra azy tao amin’ny efitrano iray sady nanome azy ireo ny toerana aloha teo amin’izay nasaina; olona telopolo eo ho eo izy ireo. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Hoy i Samoela tamin’ny mpahandro: Ento ilay anjara nomeko anao, izay efa nolazaiko taminao hoe: Tehirizo ity. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Dia nalain’ny mpahandro ny feny sy izay eo amboniny ka napetrany teo anoloan’i Saoly, ary hoy i Samoela: Indro, izay efa natokana dia voaroso eto anoloanao ka hano; fa ho amin’izao fotoana izao no nitahirizana izany ho anao hatramin’izay nanaovako hoe: Efa nanasa ny vahoaka aho. Niara-nihinana tamin’i Samoela i Saoly tamin’io andro io.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Nony nidina avy tao amin’ny toerana fanaovana sorona hankany an-tanàna izy roa lahy dia niresaka tamin’i Saoly teo an-
    - type: usfm
      marker: w
      children:
      - type: text
        text: tampon-trano
    - type: text
      text: ' i Samoela.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Manosotra an’i Saoly ho mpanjakan’ny Israely i Samoela
    marker-yv: yv-h
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Ary nifoha vao maraina izy ireo; koa nony nazava ratsy ny andro dia niantso an’i Saoly teo an-
    - type: usfm
      marker: w
      children:
      - type: text
        text: tampon-trano
    - type: text
      text: ' i Samoela sady niteny hoe: Mitsangàna fa hanatitra anao aho. Dia nitsangana i Saoly ka nivoaka ho any alatrano izy roa lahy, dia izy sy i Samoela. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Nony nidina teo amin’ny sisin’ny tanàna izy ireo dia hoy i Samoela tamin’i Saoly: Ampandehano eo alohantsika ny zatovo. Dia lasa nandeha izy. Fa mijanòna kely ianao mba hampihainoiko ny tenin’Andriamanitra.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Very ny borikivavin’i Kisy, rain’i Saoly ka hoy i Kisy tamin’i Saoly zanany: Mitondrà zatovo iray hanaraka anao, dia miaingà ka mandehana hitady ny boriky. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Dia nandeha namakivaky ny tany be havoana any Efraima izy ka namakivaky ny tany Salisa, nefa tsy nahita; nandeha namakivaky ny tany Salima indray izy avy eo, nefa tsy tany ireny; dia nandeha namakivaky ny tanin’ny Benjamina izy, nefa mbola tsy nahita ihany. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Nony tonga teo amin’ny tany Zofa izy ireo dia hoy i Saoly tamin’ny zatovony izay nanaraka azy: Andeha isika hiverina, fandrao isika indray no hampanahy an’Ikaky fa tsy ny boriky intsony. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Fa hoy ny mpanompony taminy: Indro, misy lehilahin’Andriamanitra amin’iroa tanàna iroa; lehilahy malaza izy, fa izay rehetra lazainy dia tanteraka tokoa; koa andeha isika hankany, fa angamba hatorony antsika izay lalana tokony halehantsika. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Dia hoy i Saoly tamin’ny zatovony: Indro, raha mankany isika, inona moa no hoentintsika ho an-dRalehilahy? Efa lany ny mofo rehetra tao amin’ny kitapontsika ary tsy misy zavatra hoentintsika ho an’ny lehilahin’Andriamanitra; koa inona moa no misy atỳ amintsika? '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Dia namaly an’i Saoly indray ilay zatovo hoe: Indro, atỳ an-tanako misy vola ampahefatry ny sekela; homeko ny lehilahin’Andriamanitra izany mba hanoroany antsika izay lalana tokony halehantsika. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Fahiny mantsy teo amin’ny Israely, rehefa nisy olona nandeha hanontany amin’Andriamanitra dia izao no fanaony: Andeha ho any amin’ny mpahita isika; izay atao hoe mpaminany ankehitriny no nantsoina hoe mpahita tany aloha. '
