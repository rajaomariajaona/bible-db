document_id: 2SA.1
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nandrenesan’i Davida ny fahafatesan’i Saoly
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Taorianan’ny nahafatesan’i Saoly, rehefa niverina avy nanafika ny Amalekita i Davida, dia nitoetra roa andro tao Ziklaga izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Tamin’ny andro fahatelo dia indro, nisy lehilahy iray tonga avy tany amin’ny miaramilan’i Saoly, rovidrovitra ny akanjony sady nihosin-tany ny lohany; rehefa tonga teo amin’i Davida izy dia niankohoka tamin’ny tany ka nitsaoka azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Hoy i Davida taminy: Avy taiza moa ianao? Dia hoy izy taminy: Afaka nandositra avy tany amin’ny tobin’ny Israely aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Hoy i Davida taminy: Inona no zava-nitranga tany? Miangavy anao aho, ambarao amiko. Dia hoy izy: Nandositra tamin’ny ady ny olona ary be koa ny miampatrampatra sy maty; maty koa i Saoly sy Jonatana zanany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary hoy i Davida tamin’ilay zatovo izay nanambara taminy: Ahoana no nahafantaranao fa maty i Saoly sy i Jonatana zanany? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia nanambara taminy ilay zatovo hoe: Sendra tao an-tendrombohitra Gilboa aho no indro i Saoly nitehina tamin’ny lefony; ary indreo, ny kalesy fitondra miady sy ny mpitaingin-tsoavaly nanenjika azy mafy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dia niherika izy ka nahita ahy; ary niantso ahy izy ka hoy aho: Inty aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dia hoy izy tamiko: Iza moa ianao? Dia hoy aho taminy: Amalekita aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Hoy indray izy tamiko: Miangavy anao aho, manatòna ka vonoy aho fa fanina, nefa mbola ato anatiko ihany ny aiko. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Dia nanatona azy aho ka namono azy, satria fantatro fa tsy ho velona intsony izy taorianan’ny nahavoa azy; dia nalaiko ny satroboninahiny teo an-dohany sy ny fehin-tanana teo amin’ny sandriny ka nentiko etỳ amin’ny tompoko izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Dia noraisin’i Davida ny fitafiany ka notriariny; dia mba nanao toy izany koa ny olona rehetra teo aminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Nisaona sy nitomany ary nifady hanina izy ireo mandra-paharivan’ny andro noho ny amin’i Saoly sy i Jonatana zanany sy ny olon’NY TOMPO ary ny taranak’Israely satria lavon-tsabatra ireny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Hoy i Davida tamin’ilay zatovo izay nanao tatitra taminy: Avy aiza ianao? Ary hoy izy: Zanaky ny vahiny amalekita aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dia hoy i Davida taminy: Nahoana ianao no tsy natahotra hanainga ny tananao hamono ny voahosotry NY TOMPO? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Dia niantso zatovo iray i Davida ka niteny hoe: Manatòna dia vonoy io; dia nasiany izy ka maty. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary hoy i Davida taminy: Aoka ho eo amin’ny lohanao ny ranao, satria ny vavanao ihany no efa niampanga anao hoe: Izaho no namono ny voahosotry NY TOMPO.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny alahelon’i Davida ny amin’i Saoly sy i Jonatana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Nisaona an’i Saoly sy i Jonatana zanany tamin’izao hira fisaonana izao i Davida, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'ary nasainy nampianarina ny taranak’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Joda
  - type: text
    text: ' ny hira atao hoe Tsipìka; indro, voasoratra ao amin’ny bokin’i Jasara'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Jasara: Ilay mahitsy.'
    marker-yv: yv-n
  - type: text
    text: ' izany:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ilay voninahitrao, ry Israely, no voalefona teo amin’ny havoananao!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Indrisy! Lavo ny mahery!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Aza ambaranareo any Gata izany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: aza torinareo ho fifaliana any an-dalamben’i Askelona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fandrao mifaly ny zanakavavin’ny Filistina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fandrao miravoravo ny zanakavavin’ny tsy mifora.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ianareo tendrombohitra Gilboa,
- type: usfm
  marker: q1
  children:
  - type: text
    text: aza misy ando aman’orana intsony eny aminareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: na saha mahavokatra!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Satria tany no nanariana ny ampingan’ny mahery,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ny ampingan’i Saoly ka tsy nohosorana diloilo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ny tsipìkan’i Jonatana dia tsy nihemotra
- type: usfm
  marker: q1
  children:
  - type: text
    text: raha tsy nahazo ny ran’ny maty
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny tavin’ny mahery;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny sabatr’i Saoly dia tsy mba niverina foana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: I Saoly sy i Jonatana izay tiana sady maha te ho tia fony fahavelony
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia tsy nosarahina na tamin’ny nahafatesany aza;
- type: usfm
  marker: q1
  children:
  - type: text
    text: haingam-pandeha noho ny voromahery izy ireo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mahery noho ny liona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Ry zanakavavin’Israely, mitomania an’i Saoly,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa nahafinaritra ny nampitafiany lamba jaky anareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady nasiany firavaka volamena ny fitafianareo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Indrisy! Lavo teo amin’ny ady ny mahery!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Voalefona teo amin’ny havoananao i Jonatana!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Ory noho ny aminao aho, ry Jonatana rahalahiko!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nahafinaritra ahy indrindra ianao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: nahagaga ny fitiavanao ahy mihoatra noho ny fitiavan’ny vehivavy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Indrisy! Lavo ny mahery!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Levona ny fiadiana!
