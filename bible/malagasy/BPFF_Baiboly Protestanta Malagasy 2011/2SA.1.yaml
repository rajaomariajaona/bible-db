document_id: 2SA.1,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nandrenesan’i Davida ny fahafatesan’i Saoly
  - type: text
    content: 'Taorianan’ny nahafatesan’i Saoly, rehefa niverina avy nanafika ny Amalekita i Davida, dia nitoetra roa andro tao Ziklaga izy. '
  '10':
  - type: text
    content: Dia nanatona azy aho ka namono azy, satria fantatro fa tsy ho velona intsony izy taorianan’ny nahavoa azy; dia nalaiko ny satroboninahiny teo an-dohany sy ny fehin-tanana teo amin’ny sandriny ka nentiko etỳ amin’ny tompoko izany.
  '11':
  - type: text
    content: 'Dia noraisin’i Davida ny fitafiany ka notriariny; dia mba nanao toy izany koa ny olona rehetra teo aminy. '
  '12':
  - type: text
    content: Nisaona sy nitomany ary nifady hanina izy ireo mandra-paharivan’ny andro noho ny amin’i Saoly sy i Jonatana zanany sy ny olon’NY TOMPO ary ny taranak’Israely satria lavon-tsabatra ireny.
  '13':
  - type: text
    content: 'Hoy i Davida tamin’ilay zatovo izay nanao tatitra taminy: Avy aiza ianao? Ary hoy izy: Zanaky ny vahiny amalekita aho. '
  '14':
  - type: text
    content: 'Dia hoy i Davida taminy: Nahoana ianao no tsy natahotra hanainga ny tananao hamono ny voahosotry NY TOMPO? '
  '15':
  - type: text
    content: 'Dia niantso zatovo iray i Davida ka niteny hoe: Manatòna dia vonoy io; dia nasiany izy ka maty. '
  '16':
  - type: text
    content: 'Ary hoy i Davida taminy: Aoka ho eo amin’ny lohanao ny ranao, satria ny vavanao ihany no efa niampanga anao hoe: Izaho no namono ny voahosotry NY TOMPO.'
  - type: heading
    content: Ny alahelon’i Davida ny amin’i Saoly sy i Jonatana
  '17':
  - type: text
    content: 'Nisaona an’i Saoly sy i Jonatana zanany tamin’izao hira fisaonana izao i Davida, '
  '18':
  - type: text
    content: 'ary nasainy nampianarina ny taranak’i '
  - type: text
    content: Joda
  - type: text
    content: ' ny hira atao hoe Tsipìka; indro, voasoratra ao amin’ny bokin’i Jasara'
  - type: note
    content: 'Jasara: Ilay mahitsy.'
  - type: text
    content: ' izany:'
  '19':
  - type: text
    content: Ilay voninahitrao, ry Israely, no voalefona teo amin’ny havoananao!
  - type: text
    content: Indrisy! Lavo ny mahery!
  '2':
  - type: text
    content: 'Tamin’ny andro fahatelo dia indro, nisy lehilahy iray tonga avy tany amin’ny miaramilan’i Saoly, rovidrovitra ny akanjony sady nihosin-tany ny lohany; rehefa tonga teo amin’i Davida izy dia niankohoka tamin’ny tany ka nitsaoka azy. '
  '20':
  - type: text
    content: Aza ambaranareo any Gata izany,
  - type: text
    content: aza torinareo ho fifaliana any an-dalamben’i Askelona,
  - type: text
    content: fandrao mifaly ny zanakavavin’ny Filistina,
  - type: text
    content: fandrao miravoravo ny zanakavavin’ny tsy mifora.
  '21':
  - type: text
    content: Ianareo tendrombohitra Gilboa,
  - type: text
    content: aza misy ando aman’orana intsony eny aminareo,
  - type: text
    content: na saha mahavokatra!
  - type: text
    content: Satria tany no nanariana ny ampingan’ny mahery,
  - type: text
    content: dia ny ampingan’i Saoly ka tsy nohosorana diloilo.
  '22':
  - type: text
    content: Ny tsipìkan’i Jonatana dia tsy nihemotra
  - type: text
    content: raha tsy nahazo ny ran’ny maty
  - type: text
    content: sy ny tavin’ny mahery;
  - type: text
    content: ary ny sabatr’i Saoly dia tsy mba niverina foana.
  '23':
  - type: text
    content: I Saoly sy i Jonatana izay tiana sady maha te ho tia fony fahavelony
  - type: text
    content: dia tsy nosarahina na tamin’ny nahafatesany aza;
  - type: text
    content: haingam-pandeha noho ny voromahery izy ireo
  - type: text
    content: ary mahery noho ny liona.
  '24':
  - type: text
    content: Ry zanakavavin’Israely, mitomania an’i Saoly,
  - type: text
    content: fa nahafinaritra ny nampitafiany lamba jaky anareo
  - type: text
    content: sady nasiany firavaka volamena ny fitafianareo.
  '25':
  - type: text
    content: Indrisy! Lavo teo amin’ny ady ny mahery!
  - type: text
    content: Voalefona teo amin’ny havoananao i Jonatana!
  '26':
  - type: text
    content: Ory noho ny aminao aho, ry Jonatana rahalahiko!
  - type: text
    content: Nahafinaritra ahy indrindra ianao;
  - type: text
    content: nahagaga ny fitiavanao ahy mihoatra noho ny fitiavan’ny vehivavy.
  '27':
  - type: text
    content: Indrisy! Lavo ny mahery!
  - type: text
    content: Levona ny fiadiana!
  '3':
  - type: text
    content: 'Hoy i Davida taminy: Avy taiza moa ianao? Dia hoy izy taminy: Afaka nandositra avy tany amin’ny tobin’ny Israely aho. '
  '4':
  - type: text
    content: 'Hoy i Davida taminy: Inona no zava-nitranga tany? Miangavy anao aho, ambarao amiko. Dia hoy izy: Nandositra tamin’ny ady ny olona ary be koa ny miampatrampatra sy maty; maty koa i Saoly sy Jonatana zanany. '
  '5':
  - type: text
    content: 'Ary hoy i Davida tamin’ilay zatovo izay nanambara taminy: Ahoana no nahafantaranao fa maty i Saoly sy i Jonatana zanany? '
  '6':
  - type: text
    content: 'Dia nanambara taminy ilay zatovo hoe: Sendra tao an-tendrombohitra Gilboa aho no indro i Saoly nitehina tamin’ny lefony; ary indreo, ny kalesy fitondra miady sy ny mpitaingin-tsoavaly nanenjika azy mafy. '
  '7':
  - type: text
    content: 'Dia niherika izy ka nahita ahy; ary niantso ahy izy ka hoy aho: Inty aho. '
  '8':
  - type: text
    content: 'Dia hoy izy tamiko: Iza moa ianao? Dia hoy aho taminy: Amalekita aho. '
  '9':
  - type: text
    content: 'Hoy indray izy tamiko: Miangavy anao aho, manatòna ka vonoy aho fa fanina, nefa mbola ato anatiko ihany ny aiko. '
