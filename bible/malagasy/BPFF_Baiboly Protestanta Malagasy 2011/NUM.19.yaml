document_id: NUM.19,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny lavenona avy amin’ny vantotra ombivavy mena
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Hoy NY TOMPO tamin’i Mosesy sy i Arona: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Ary ilay nanangona ny lavenon’ny vantotra ombivavy dia hanasa ny fitafiany, ary haloto mandra-paharivan’ny andro izy. Ho lalàna maharitra ho an’ny Zanak’Israely sy ny mpifindra monina eo aminy izany.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Lalàna ny amin’ny fanadiovana
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Izay mikasika fatin’olona dia haloto mandritra ny hafitoana. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Hanadio ny tenany amin’izany rano izany izy amin’ny andro fahatelo, ary amin’ny andro fahafito vao hadio; fa raha tsy manadio ny tenany amin’ny andro fahatelo kosa izy dia tsy hadio amin’ny andro fahafito. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Izay rehetra mikasika faty, olona maty izany, ka tsy manadio ny tenany, dia mandoto ny tabernakelin’NY TOMPO ka hofongorana tsy ho amin’ny Israely. Satria tsy nofafazana ny rano fanadiovana izy dia haloto; mbola eo aminy ihany ny fahalotoany.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Izao no lalàna, raha misy olona maty ao an-day: Izay rehetra miditra ao an-day sy izay rehetra ao anatin’ny tranolay dia haloto hafitoana. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Ny fanaka rehetra misokatra, izay tsy misy rakotra mifehy aminy, dia haloto. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Izay rehetra mikasika izay matin-tsabatra any an-tsaha, na fatin’olona na taolan’olona na fasana, dia haloto hafitoana. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Dia hakana ho an’ny voaloto ny lavenon’ilay nodorana ho fanatitra fanadiovana ary hatao eo amin’ny lovia nasiana rano nalaina tamin’ny rano mandeha. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Dia haka '
    - type: usfm
      marker: w
      children:
      - type: text
        text: hisopa
    - type: text
      text: ' ny lehilahy madio iray ka hanatsoboka azy ao amin’ilay rano ao anaty lovia, dia hafafiny amin’ny tranolay mbamin’ny fanaka rehetra izany, ary koa amin’ny olona izay eo sy amin’ilay nahakasika ny taolana, na amin’izay novonoina na amin’izay matin’aretina na amin’ny fasana. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Ary ilay madio dia hamafy rano an’ilay voaloto amin’ny andro fahatelo sy ny fahafito; dia hanadio ny tenany izy amin’ny andro fahafito ka hanasa ny fitafiany sy handro amin’ny rano, ary hadio rehefa hariva. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Izao no lalàna hotandremana, dia izay nandidian’NY TOMPO: Lazao amin’ny Zanak’Israely mba hitondra vantotra ombivavy mena iray, izay tsy misy kilema na tsiny sady mbola tsy nasiana zioga. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Fa ny olona izay voaloto kosa ka tsy nanadio ny tenany dia hofongorana tsy ho eo amin’ny fiangonana satria nandoto ny fitoerana masin’NY TOMPO izy; tsy nafafy taminy ny rano fanadiovana, koa maloto izy. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Ho lalàna maharitra ho anareo izany, fa izay mamafy ny rano fanadiovana dia hanasa ny fitafiany; ary izay mikasika ny rano fanadiovana koa dia haloto mandra-paharivan’ny andro. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Ny zavatra rehetra izay voakasiky ny maloto dia haloto; ny olona izay mikasika azy dia haloto mandra-paharivan’ny andro.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Omeo an’i Eleazara mpisorona iny, dia hasaina hoentina eny ivelan’ny toby ka hovonoina eo anatrehany. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Dia hanalan’i Eleazara mpisorona amin’ny fanondrony ny rany ka hafafiny impito manandrify ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: tranolay fihaonana
    - type: text
      text: '. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Hodorana eo imasony ilay vantotra ombivavy ka ny hodiny sy ny henany ary ny rany mbamin’ny tain-drorohany dia hodorana avokoa. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ary ny mpisorona dia haka hazo sedera sy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: hisopa
    - type: text
      text: ' ary jaky ka hanipy izany eo afovoan’ny afo andoroana ny vantotra ombivavy. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Dia hosasan’ny mpisorona ny fitafiany ary handro amin’ny rano izy; avy eo dia hankao amin’ny toby izy, nefa haloto mandra-paharivan’ny andro ilay mpisorona. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Izay mandoro ilay ombivavy dia hanasa ny fitafiany sady handro amin’ny rano ary haloto mandra-paharivan’ny andro koa. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Hangonin’ny lehilahy madio iray ny lavenon’ilay vantotra ombivavy ka hapetrany eo ivelan’ny toby, eo amin’izay toerana madio, dia hotahirizina ho an’ny fiangonan’ny Zanak’Israely izy io ho rano fanadiovana. Fanatitra fanadiovana izany. '
