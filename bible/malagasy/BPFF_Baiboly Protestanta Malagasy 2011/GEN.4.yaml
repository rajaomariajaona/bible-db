document_id: GEN.4
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: I Kaina sy i Abela
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary nahalala an’i Eva vadiny i Adama; dia nanana anaka i Eva ka niteraka an’i Kaina, ary hoy izy: Nahazo zazalahy tamin’NY TOMPO aho. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ary niteraka an’i Abela
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Abela: Fofonaina '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Zava-poana.
    marker-yv: yv-n
  - type: text
    text: ' rahalahiny koa izy. Ary i Abela dia mpiandry ondry fa i Kaina kosa dia mpiasa tany. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Rehefa afaka elaela dia nitondran’i Kaina ho fanatitra ho an’NY TOMPO ny vokatry ny tany. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ny an’i Abela kosa dia avy amin’izay matavy tamin’ny voalohan-teraky ny ondriny no nitondrany.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ary NY TOMPO nankasitraka an’i Abela mbamin’ny fanatiny; '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'fa i Kaina mbamin’ny fanatiny kosa dia tsy mba nankasitrahany. Dia tezitra indrindra i Kaina sady nanjombona ny tarehiny. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Hoy NY TOMPO tamin’i Kaina: Nahoana no tezitra ianao? Ary nahoana no manjombona ny tarehinao? '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Raha tsara ny ataonao, moa tsy ho miramirana va ianao? Fa raha tsy tsara kosa ny ataonao dia mamitsaka eo am-baravarana ny ota; ary ianao no kendren’ny faniriany, kanefa ianao no tokony hanapaka aminy! '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary niteny tamin’i Abela rahalahiny i Kaina hoe: Andeha isika ho any an-tsaha. Nony tany an-tsaha izy mirahalahy dia nitsangana nanatona an’i Abela rahalahiny i Kaina ka namono azy. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary hoy NY TOMPO tamin’i Kaina: Aiza i Abela rahalahinao? Fa hoy izy: Tsy fantatro! Moa mpitandrina ny rahalahiko va aho? '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Hoy NY TOMPO: Inona moa no nataonao? Ny feon’ny ran’ny rahalahinao dia mitaraina Amiko avy amin’ny tany. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ankehitriny dia voaozona ianao ka hiala amin’ny tany fonenana izay nisokatra hitelina ny ran’ny rahalahinao nalatsaky ny tananao. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Koa raha miasa ny tany ianao dia tsy hanome vokatra ho anao intsony izany ka ho mpanjenjena sy ho mpirenireny eny ambonin’ny tany ianao. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dia hoy i Kaina tamin’NY TOMPO: Lehibe mihoatra noho izay zakako ny valin’ny heloko. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Indro, noroahinao hiala amin’ny tany fonenana aho androany, ary ho takona amiko ny tavanao ka ho mpanjenjena sy mpirenireny eny ambonin’ny tany aho; koa na iza na iza hahita ahy dia hamono ahy. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Hoy NY TOMPO taminy: Raha izany, na iza na iza hamono an’i Kaina dia hovalina fito heny izy. Ary NY TOMPO nanisy famantarana tamin’i Kaina mba tsy hisy hamono azy izay rehetra hahita azy. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Dia niala teo anatrehan’NY TOMPO i Kaina ka nonina tany amin’ny tany Noda
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Noda: Firenirenena.'
    marker-yv: yv-n
  - type: text
    text: ', any atsinanan’i Edena.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ireo taranak’i Kaina
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary nahalala ny vadiny i Kaina dia nanana anaka Ravehivavy ka niteraka an’i Enoka. Ary nanorina tanàna i Kaina ka ny anaran’ilay tanàna dia nataony hoe Enoka, araka ny anaran’ny zanany lahy. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'I Enoka dia niteraka an’Irada; Irada dia niteraka an’i Mehojaela; i Mehojaela dia niteraka an’i Metosaela; ary i Metosaela dia niteraka an’i Lameka. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'I Lameka dia nampirafy roa: Ada no anaran’ny iray ary Zila kosa ny iray. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary i Ada dia niteraka an’i Jabala; izy no rain’ny mpitoetra an-tranolay, mpiandry omby aman’ondry. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ny anaran’ny rahalahiny dia Jobala; izy no rain’ny mpitendry lokanga sy ny mpitsoka sodina rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'I Zila dia niteraka an’i Tobala-Kaina, mpanefy fiasana maranitra, na varahina na vy. Ny anabavin’i Tobala-Kaina dia i Nama. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Hoy i Lameka tamin’ny vadiny:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ry Ada sy Zila ô, henoy ny feoko!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ry vadin’i Lameka, tandremo ny teniko!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nahafaty lehilahy iray aho noho ny feriko
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary zaza iray noho ny ratrako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Raha avo fito heny no amaliana an’izay mamono an’i Kaina
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia avo fito amby fitopolo heny kosa ny ho an’izay mamono an’i Lameka!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Ary nahalala ny vadiny indray i Adama ka niteraka zazalahy Ravehivavy, ary ny anarany dia nataony hoe Seta
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Seta: Nomena ho solony.'
    marker-yv: yv-n
  - type: text
    text: '; satria Andriamanitra, hoy izy, nanome ahy zanaka iray hafa ho solon’i Abela, izay novonoin’i Kaina. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: I Seta koa dia niteraka zazalahy, ary ny anarany dia nataony hoe Enosy. Tamin’izany fotoana izany no nanombohana niantsoana ny anaran’NY TOMPO.
