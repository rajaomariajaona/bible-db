document_id: GEN.4,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: I Kaina sy i Abela
  - type: text
    content: 'Ary nahalala an’i Eva vadiny i Adama; dia nanana anaka i Eva ka niteraka an’i Kaina, ary hoy izy: Nahazo zazalahy tamin’NY TOMPO aho. '
  '10':
  - type: text
    content: 'Hoy NY TOMPO: Inona moa no nataonao? Ny feon’ny ran’ny rahalahinao dia mitaraina Amiko avy amin’ny tany. '
  '11':
  - type: text
    content: 'Ankehitriny dia voaozona ianao ka hiala amin’ny tany fonenana izay nisokatra hitelina ny ran’ny rahalahinao nalatsaky ny tananao. '
  '12':
  - type: text
    content: 'Koa raha miasa ny tany ianao dia tsy hanome vokatra ho anao intsony izany ka ho mpanjenjena sy ho mpirenireny eny ambonin’ny tany ianao. '
  '13':
  - type: text
    content: 'Dia hoy i Kaina tamin’NY TOMPO: Lehibe mihoatra noho izay zakako ny valin’ny heloko. '
  '14':
  - type: text
    content: 'Indro, noroahinao hiala amin’ny tany fonenana aho androany, ary ho takona amiko ny tavanao ka ho mpanjenjena sy mpirenireny eny ambonin’ny tany aho; koa na iza na iza hahita ahy dia hamono ahy. '
  '15':
  - type: text
    content: 'Hoy NY TOMPO taminy: Raha izany, na iza na iza hamono an’i Kaina dia hovalina fito heny izy. Ary NY TOMPO nanisy famantarana tamin’i Kaina mba tsy hisy hamono azy izay rehetra hahita azy. '
  '16':
  - type: text
    content: Dia niala teo anatrehan’NY TOMPO i Kaina ka nonina tany amin’ny tany Noda
  - type: note
    content: 'Noda: Firenirenena.'
  - type: text
    content: ', any atsinanan’i Edena.'
  - type: heading
    content: Ireo taranak’i Kaina
  '17':
  - type: text
    content: 'Ary nahalala ny vadiny i Kaina dia nanana anaka Ravehivavy ka niteraka an’i Enoka. Ary nanorina tanàna i Kaina ka ny anaran’ilay tanàna dia nataony hoe Enoka, araka ny anaran’ny zanany lahy. '
  '18':
  - type: text
    content: 'I Enoka dia niteraka an’Irada; Irada dia niteraka an’i Mehojaela; i Mehojaela dia niteraka an’i Metosaela; ary i Metosaela dia niteraka an’i Lameka. '
  '19':
  - type: text
    content: 'I Lameka dia nampirafy roa: Ada no anaran’ny iray ary Zila kosa ny iray. '
  '2':
  - type: text
    content: Ary niteraka an’i Abela
  - type: note
    content: 'Abela: Fofonaina na: Zava-poana.'
  - type: text
    content: ' rahalahiny koa izy. Ary i Abela dia mpiandry ondry fa i Kaina kosa dia mpiasa tany. '
  '20':
  - type: text
    content: 'Ary i Ada dia niteraka an’i Jabala; izy no rain’ny mpitoetra an-tranolay, mpiandry omby aman’ondry. '
  '21':
  - type: text
    content: 'Ny anaran’ny rahalahiny dia Jobala; izy no rain’ny mpitendry lokanga sy ny mpitsoka sodina rehetra. '
  '22':
  - type: text
    content: 'I Zila dia niteraka an’i Tobala-Kaina, mpanefy fiasana maranitra, na varahina na vy. Ny anabavin’i Tobala-Kaina dia i Nama. '
  '23':
  - type: text
    content: 'Hoy i Lameka tamin’ny vadiny:'
  - type: text
    content: Ry Ada sy Zila ô, henoy ny feoko!
  - type: text
    content: Ry vadin’i Lameka, tandremo ny teniko!
  - type: text
    content: Nahafaty lehilahy iray aho noho ny feriko
  - type: text
    content: ary zaza iray noho ny ratrako.
  '24':
  - type: text
    content: Raha avo fito heny no amaliana an’izay mamono an’i Kaina
  - type: text
    content: dia avo fito amby fitopolo heny kosa ny ho an’izay mamono an’i Lameka!
  '25':
  - type: text
    content: Ary nahalala ny vadiny indray i Adama ka niteraka zazalahy Ravehivavy, ary ny anarany dia nataony hoe Seta
  - type: note
    content: 'Seta: Nomena ho solony.'
  - type: text
    content: '; satria Andriamanitra, hoy izy, nanome ahy zanaka iray hafa ho solon’i Abela, izay novonoin’i Kaina. '
  '26':
  - type: text
    content: I Seta koa dia niteraka zazalahy, ary ny anarany dia nataony hoe Enosy. Tamin’izany fotoana izany no nanombohana niantsoana ny anaran’NY TOMPO.
  '3':
  - type: text
    content: 'Rehefa afaka elaela dia nitondran’i Kaina ho fanatitra ho an’NY TOMPO ny vokatry ny tany. '
  '4':
  - type: text
    content: Ny an’i Abela kosa dia avy amin’izay matavy tamin’ny voalohan-teraky ny ondriny no nitondrany.
  - type: text
    content: 'Ary NY TOMPO nankasitraka an’i Abela mbamin’ny fanatiny; '
  '5':
  - type: text
    content: 'fa i Kaina mbamin’ny fanatiny kosa dia tsy mba nankasitrahany. Dia tezitra indrindra i Kaina sady nanjombona ny tarehiny. '
  '6':
  - type: text
    content: 'Hoy NY TOMPO tamin’i Kaina: Nahoana no tezitra ianao? Ary nahoana no manjombona ny tarehinao? '
  '7':
  - type: text
    content: 'Raha tsara ny ataonao, moa tsy ho miramirana va ianao? Fa raha tsy tsara kosa ny ataonao dia mamitsaka eo am-baravarana ny ota; ary ianao no kendren’ny faniriany, kanefa ianao no tokony hanapaka aminy! '
  '8':
  - type: text
    content: 'Ary niteny tamin’i Abela rahalahiny i Kaina hoe: Andeha isika ho any an-tsaha. Nony tany an-tsaha izy mirahalahy dia nitsangana nanatona an’i Abela rahalahiny i Kaina ka namono azy. '
  '9':
  - type: text
    content: 'Ary hoy NY TOMPO tamin’i Kaina: Aiza i Abela rahalahinao? Fa hoy izy: Tsy fantatro! Moa mpitandrina ny rahalahiko va aho? '
