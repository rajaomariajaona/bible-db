document_id: PSA.71,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Aza manary ahy amin’ny andron’ny fahanterako
  - type: text
    content: Ianao, TOMPO ô, no itokiako;
  - type: text
    content: aoka tsy ho menatra mandrakizay aho!
  '10':
  - type: text
    content: Fa miresaka ahy ny fahavaloko
  - type: text
    content: ary miara-mioko izay miambina hahazo ny aiko
  '11':
  - type: text
    content: 'ka miteny hoe: Andriamanitra efa nahafoy azy!'
  - type: text
    content: Enjeho izy ka sambory fa tsy misy hanafaka azy.
  '12':
  - type: text
    content: Andriamanitra ô, aza manalavitra ahy;
  - type: text
    content: Ry Andriamanitro ô, faingàna hamonjy ahy.
  '13':
  - type: text
    content: Aoka ho menatra sy ho levona
  - type: text
    content: ny mpanohitra ny fanahiko;
  - type: text
    content: aoka hitafy henatra sy fahafaham-baraka
  - type: text
    content: izay mitady hanisy ratsy ahy.
  '14':
  - type: text
    content: Fa izaho kosa dia hanantena mandrakariva
  - type: text
    content: ary hitombo lalandava ny fideràko Anao.
  '15':
  - type: text
    content: Ny vavako dia hitory ny fahamarinanao
  - type: text
    content: sy ny famonjenao mandrakariva,
  - type: text
    content: fa tsy fantatro intsony ny isany.
  '16':
  - type: text
    content: Ho avy amin’ny asa lehibe nataon’NY TOMPO Andriamanitra aho,
  - type: text
    content: hampahatsiaro ny fahamarinanao aho, dia ny Anao ihany.
  '17':
  - type: text
    content: Andriamanitra ô, Ianao no nampianatra ahy hatry ny fony aho mbola tanora,
  - type: text
    content: ary mandraka ankehitriny dia nitory ny fahagagana nataonao aho.
  '18':
  - type: text
    content: Koa na dia efa antitra sy fotsy volo aza aho dia aza mahafoy ahy, Andriamanitra ô,
  - type: text
    content: mba hahazoako manambara ny herinao amin’izao taranaka izao
  - type: text
    content: sy ny asanao lehibe amin’izay rehetra mbola ho avy;
  '19':
  - type: text
    content: mihatra amin’izay avo indrindra ny fahamarinanao, Andriamanitra ô,
  - type: text
    content: 'izay nanao zava-dehibe:'
  - type: text
    content: Andriamanitra ô, iza no tahaka Anao?
  '2':
  - type: text
    content: Vonjeo amin’ny fahamarinanao aho ka afaho!
  - type: text
    content: Atongilano amiko ny sofinao ka vonjeo aho!
  '20':
  - type: text
    content: Ianao izay nampahita anay fahoriana be sady mafy
  - type: text
    content: no hamelona anay indray
  - type: text
    content: ka hampiakatra anay indray hiala avy amin’ny toerana lalina amin’ny tany.
  '21':
  - type: text
    content: Ampitomboy ny voninahitro
  - type: text
    content: ary aoka hampionona ahy indray Ianao!
  '22':
  - type: text
    content: Izaho kosa dia hidera Anao amin’ny valiha,
  - type: text
    content: dia ny fahamarinanao, ry Andriamanitro ô,
  - type: text
    content: hankalaza Anao amin’ny lokanga aho,
  - type: text
    content: ry Iray Masin’ny Israely ô!
  '23':
  - type: text
    content: Hihoby ny molotro raha mankalaza Anao
  - type: text
    content: ary ny fanahiko koa, izay navotanao.
  '24':
  - type: text
    content: Ny lelako koa dia hitory ny fahamarinanao mandrakariva,
  - type: text
    content: fa menatra sy mangaihay izay mitady hanisy ratsy ahy.
  '3':
  - type: text
    content: Aoka ho vatolampy fonenana
  - type: text
    content: hohatoniko mandrakariva Ianao
  - type: text
    content: izay efa nandidy hamonjy ahy;
  - type: text
    content: fa harambatoko sy manda fiarovana ho ahy Ianao!
  '4':
  - type: text
    content: Ry Andriamanitro ô, afaho amin’ny tanan’ny ratsy fanahy aho,
  - type: text
    content: dia amin’ny tanan’ny mpanao meloka sy mpanao herisetra!
  '5':
  - type: text
    content: Fa Ianao no fanantenako, RY TOMPO Andriamanitra ô,
  - type: text
    content: ry tokiko hatry ny fony aho mbola tanora.
  '6':
  - type: text
    content: Ianao no nanankinana ahy hatrany am-bohoka;
  - type: text
    content: Ianao no namoaka ahy avy tany an-kibon’ny reniko;
  - type: text
    content: Ianao no deraiko mandrakariva.
  '7':
  - type: text
    content: Tonga toy ny zava-mahagaga eo imason’ny maro aho;
  - type: text
    content: nefa Ianao no fialofana azo antoka ho ahy.
  '8':
  - type: text
    content: Ny vavako dia ho feno ny fiderana Anao
  - type: text
    content: sy ny fankalazana Anao mandrakariva.
  '9':
  - type: text
    content: Aza manary ahy amin’ny andron’ny fahanterako;
  - type: text
    content: aza mahafoy ahy raha mihaketraka ny heriko.
