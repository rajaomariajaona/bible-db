document_id: PSA.71,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Aza manary ahy amin’ny andron’ny fahanterako
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ianao, TOMPO ô, no itokiako;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aoka tsy ho menatra mandrakizay aho!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa miresaka ahy ny fahavaloko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary miara-mioko izay miambina hahazo ny aiko
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ka miteny hoe: Andriamanitra efa nahafoy azy!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Enjeho izy ka sambory fa tsy misy hanafaka azy.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Andriamanitra ô, aza manalavitra ahy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ry Andriamanitro ô, faingàna hamonjy ahy.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka ho menatra sy ho levona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny mpanohitra ny fanahiko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aoka hitafy henatra sy fahafaham-baraka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay mitady hanisy ratsy ahy.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa izaho kosa dia hanantena mandrakariva
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hitombo lalandava ny fideràko Anao.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny vavako dia hitory ny fahamarinanao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny famonjenao mandrakariva,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa tsy fantatro intsony ny isany.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho avy amin’ny asa lehibe nataon’NY TOMPO Andriamanitra aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hampahatsiaro ny fahamarinanao aho, dia ny Anao ihany.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Andriamanitra ô, Ianao no nampianatra ahy hatry ny fony aho mbola tanora,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mandraka ankehitriny dia nitory ny fahagagana nataonao aho.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa na dia efa antitra sy fotsy volo aza aho dia aza mahafoy ahy, Andriamanitra ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hahazoako manambara ny herinao amin’izao taranaka izao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny asanao lehibe amin’izay rehetra mbola ho avy;
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mihatra amin’izay avo indrindra ny fahamarinanao, Andriamanitra ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'izay nanao zava-dehibe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Andriamanitra ô, iza no tahaka Anao?
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vonjeo amin’ny fahamarinanao aho ka afaho!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Atongilano amiko ny sofinao ka vonjeo aho!
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ianao izay nampahita anay fahoriana be sady mafy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no hamelona anay indray
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hampiakatra anay indray hiala avy amin’ny toerana lalina amin’ny tany.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ampitomboy ny voninahitro
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary aoka hampionona ahy indray Ianao!
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izaho kosa dia hidera Anao amin’ny valiha,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ny fahamarinanao, ry Andriamanitro ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hankalaza Anao amin’ny lokanga aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ry Iray Masin’ny Israely ô!
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hihoby ny molotro raha mankalaza Anao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny fanahiko koa, izay navotanao.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny lelako koa dia hitory ny fahamarinanao mandrakariva,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa menatra sy mangaihay izay mitady hanisy ratsy ahy.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka ho vatolampy fonenana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hohatoniko mandrakariva Ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay efa nandidy hamonjy ahy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa harambatoko sy manda fiarovana ho ahy Ianao!
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ry Andriamanitro ô, afaho amin’ny tanan’ny ratsy fanahy aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia amin’ny tanan’ny mpanao meloka sy mpanao herisetra!
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa Ianao no fanantenako, RY TOMPO Andriamanitra ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ry tokiko hatry ny fony aho mbola tanora.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ianao no nanankinana ahy hatrany am-bohoka;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ianao no namoaka ahy avy tany an-kibon’ny reniko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ianao no deraiko mandrakariva.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tonga toy ny zava-mahagaga eo imason’ny maro aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa Ianao no fialofana azo antoka ho ahy.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny vavako dia ho feno ny fiderana Anao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny fankalazana Anao mandrakariva.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aza manary ahy amin’ny andron’ny fahanterako;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aza mahafoy ahy raha mihaketraka ny heriko.
