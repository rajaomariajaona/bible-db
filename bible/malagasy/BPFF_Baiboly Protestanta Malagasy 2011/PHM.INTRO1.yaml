document_id: PHM.INTRO1
type_code: plt
segments:
- type: usfm
  marker: imt1
  children:
  - type: text
    text: INDRAY MIJERY
- type: usfm
  marker: ip
  children:
  - type: text
    text: Ity no epistily fohy indrindra amin’ireo epistily nosoratan’i Paoly. Manaitra ny fifandraisana am-po hita eo amin’ny mpanoratra sy ny anoratana, dia i Filemona sy ny Fiangonana mivory ao an-tranony.
- type: usfm
  marker: ip
  children:
  - type: text
    text: Iray amin’ireo mpitarika ao amin’ny Fiangonana i Filemona. Nandositra ny mpanompony iray, dia i Onesimosy, ka nankany Roma ary tafahaona tamin’i Paoly. Niova fo, nanjary Kristiana, i Onesimosy ka tonga rahalahy mahatoky sy malala tamin’i Paoly (Kol. 4.9).
- type: usfm
  marker: ip
  children:
  - type: text
    text: Niarakaraka tamin’ny epistily ho an’ny Kolosiana no nanoratan’i Paoly ity epistily ity, izany hoe raha mbola tany an-tranomaizina tany Roma izy. Nampitondrainy an’i Epafra ny taratasy.
- type: usfm
  marker: is1
  children:
  - type: text
    text: Ny votoatin’ny Epistily
- type: usfm
  marker: ip
  children:
  - type: text
    text: Manoratra ho an’i Filemona momba an’i Onesimosy i Paoly. Mamerina azy ho any amin’i Filemona izay tompony taloha izy ary mangataka azy mba horaisiny am-pitiavana i Onesimosy, tahaka ny nandraisany an’i Paoly ho namany. Ny mba hanaovan’i Filemona mihoatra noho izany aza no irin’i Paoly satria, ao amin’i Kristy, dia manjary fifandraisan’ny mpirahalahy ny fifandraisan’ny tompo sy ny andevony teo aloha. «Tsy misy intsony na andevo na olona afaka» (Gal 3.28).
- type: usfm
  marker: iot
  children:
  - type: text
    text: Ny firafitry ny Epistily
- type: usfm
  marker: io1
  children:
  - type: text
    text: 'Misaotra an’Andriamanitra noho ny fitiavana sy ny finoan’i Filemona i Paoly: And 1-7'
- type: usfm
  marker: io1
  children:
  - type: text
    text: 'Mangataka amin’i Filemona i Paoly mba handraisany an’i Onesimosy, rahalahy ao amin’ny Tompo: And 8-20'
