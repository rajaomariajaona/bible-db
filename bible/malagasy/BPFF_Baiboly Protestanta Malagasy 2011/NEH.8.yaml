document_id: NEH.8,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mandamina ny famakiana ampahibemaso ny lalàna i Ezra
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Dia nivory tahaka ny olona iray ho eo amin’ny toerana malalaka teo anoloan’ny vavahadin-drano izy rehetra; ary niteny tamin’i Ezra mpanoradalàna izy mba hoentiny ny bokin’ny lalànan’i Mosesy izay nandidian’NY TOMPO ny Israely. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Dia hoy izy taminy: Mandehana hano ny matavy ary sotroy ny mamy dia mba anatero anjara izay tsy manan-javatra voavoatra; fa masina ho an’ny Tompontsika ity andro ity; koa aza malahelo ianareo, fa ny fifaliana avy amin’NY TOMPO no fiarovana mafy ho anareo. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ary nampangina ny olona rehetra ny levita ka niteny hoe: Mangìna ianareo fa masina ity andro ity; koa aza malahelo ianareo. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Dia nandeha ny olona rehetra hihinana sy hisotro sy hanatitra anjara ho an’ny sasany ary nifaly tokoa ny olona rehetra, satria azony tsara ny teny izay notorina taminy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fankalazana ny fetin’ny trano rantsan-kazo
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Nony ampitson’iny dia vory teo amin’i Ezra mpanoradalàna ny lohan’ny fianakaviana tamin’ny olona rehetra sy ny mpisorona ary ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: levita
    - type: text
      text: ' mba handinika ny tenin’ny lalàna. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Dia hitany voasoratra teo amin’ny lalàna izay nampandidian’NY TOMPO an’i Mosesy, fa tokony hitoetra ao amin’ny trano rantsan-kazo ny Zanak’Israely amin’ny andro firavoravoana amin’ny volana fahafito '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'ary tokony hampandre ny olona sy handefa teny mitety ny tanànany rehetra sy Jerosalema ka hilaza hoe: Mandehana any an-tendrombohitra ka makà sampan’oliva tsotra, sampan’oliva maniry ho azy, sampana mirta sy sampana palma ary sampan-kazo be ravina hanaovana trano rantsan-kazo araka ny voasoratra. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Dia nandeha ny olona ka naka ary samy nanao trano rantsan-kazo ho azy teo amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: tampon-tranony
    - type: text
      text: ' avy sy teo anatin’ny tokotaniny avy ary teo anatin’ny kianjan’ny tranon’Andriamanitra sy teo amin’ny toerana malalaka teo akaikin’ny vavahadin-drano ary teo amin’ny toerana malalaka akaikin’ny vavahadin’i Efraima. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Eny, nanao trano rantsan-kazo avokoa ny fiangonana manontolo izay efa niverina avy tamin’ny fahababoana ka nipetraka tao anatiny izy; fa tsy mbola nanao toy izany ny Zanak’Israely hatramin’ny andron’i Josoa, zanak’i Nona, ka hatramin’izany andro izany. Dia nisy fifaliana lehibe tokoa.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Ary namaky ny teny tao amin’ny bokin’ny lalànan’Andriamanitra isanandro isanandro izy hatramin’ny andro voalohany ka hatramin’ny andro farany. Nanao andro firavoravoana hafitoana izy; ary tamin’ny andro fahavalo dia fivorian-dehibe araka ny fanao.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Dia noentin’i Ezra mpisorona ho eo anatrehan’ny fiangonana, na lahy na vavy, mbamin’izay rehetra afaka mihaino ny lalàna. Andro voalohany tamin’ny volana fahafito tamin’izay.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Dia novakiny teo amin’ny toerana malalaka teo anoloan’ny vavahadin-drano izany, hatramin’ny vao maraina ka ambara-pitataovovonan’ny andro, dia teo anatrehan’ny lehilahy sy ny vehivavy mbamin’izay afaka mihaino; ary ny olona rehetra dia nampandry sofina hihaino ny bokin’ny lalàna. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ary nitsangana teo ambonin’ny lampihazo fitoriana izay efa natao ho amin’izany i Ezra mpanoradalàna; nitsangana teo anilany havanana i Matitia, i Sema, i Anaia, i Oria, i Hilkia ary i Mahaseia; teo anilany havia kosa i Pedaia, i Misaela, i Malkia, i Hasoma, i Hasbadana, i Zakaria ary i Mesolama. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Dia nosokafan’i Ezra teo imason’ny olona rehetra ny boky satria ambony toerana noho ny olona rehetra izy; ary rehefa nosokafany izany dia nitsangana koa ny olona rehetra. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ary nisaotra NY TOMPO, Andriamanitra lehibe i Ezra; ary nanandra-tanana ny olona rehetra ka namaly hoe: '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Amena
    - type: text
      text: ', Amena! Dia niondrika izy sady niankohoka tamin’ny tany teo anatrehan’NY TOMPO. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'I Josoa, i Bany, i Serebia, i Jamina, i Akoba, i Sabetahy, i Hodia, i Mahaseia, i Kelita, i Azaria, i Jozabada, i Hanana, i Pelaia ary ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: levita
    - type: text
      text: ' dia nampianatra ny olona ny lalàna; ary ny olona dia teo amin’izay nitoerany ihany. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Dia novakiny mazava ny teny tao amin’ny bokin’ny lalànan’Andriamanitra sady nohazavainy tsara ny heviny ka azon’ny olona tsara ny teny novakina.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ary niteny tamin’ny olona rehetra i Nehemia governora sy i Ezra mpisorona, mpanoradalàna, ary ny levita izay nampianatra ny olona hoe: Masina ho an’NY TOMPO Andriamanitrareo ity andro ity; koa aza malahelo na mitomany. Fa nitomany ny olona rehetra raha nandre ny tenin’ny lalàna. '
