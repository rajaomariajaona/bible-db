document_id: JDG.9,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Tonga mpanjakan’i Sekema i Abimeleka
  - type: text
    content: 'Ary nandeha nankany Sekema tany amin’ny anadahin-dreniny i Abimeleka, zanak’i Jerobaala ka niresaka taminy sy tamin’ny fianakavian-dreniny rehetra hoe: '
  '10':
  - type: text
    content: 'Dia hoy ny hazo maniry tamin’ny aviavy:'
  - type: text
    content: Avia ianao ka manjakà aminay!
  '11':
  - type: text
    content: 'Fa hoy ny aviavy taminy:'
  - type: text
    content: Ho foiko va ny fahamamiako sy ny vokatro tsara
  - type: text
    content: ka handeha hitsingevingevina erỳ ambony hazo hafa aho?
  '12':
  - type: text
    content: 'Dia hoy ny hazo maniry tamin’ny voaloboka:'
  - type: text
    content: Avia ianao ka manjakà aminay!
  '13':
  - type: text
    content: 'Fa hoy ny voaloboka taminy:'
  - type: text
    content: Ho foiko va ny ranoko
  - type: text
    content: izay mahafaly ireo andriamanitra sy ny olona
  - type: text
    content: ka handeha hitsingevingevina erỳ ambony hazo hafa aho?
  '14':
  - type: text
    content: 'Ary hoy ny hazo maniry rehetra tamin’ny tsilo:'
  - type: text
    content: Avia ianao ka manjakà aminay!
  '15':
  - type: text
    content: 'Fa hoy ny tsilo tamin’ny hazo maniry:'
  - type: text
    content: Raha hosoranareo ho mpanjakanareo tokoa ary aho
  - type: text
    content: dia avia ianareo ka mialofa ato amin’ny alokaloko;
  - type: text
    content: fa raha tsy izany, aoka hisy afo hivoaka avy amin’ny tsilo
  - type: text
    content: ka handevona ny sederan’i Libanona!
  '16':
  - type: text
    content: 'Koa ankehitriny, raha marina sy mahitsy ny nataonareo tamin’ny nampanjakanareo an’i Abimeleka, ary raha soa no nataonareo tamin’i Jerobaala sy ny taranany ka novalìnareo araka izay nataon’ny tanany izy, '
  '17':
  - type: text
    content: 'fa ny raiko anie no niady ho anareo sady nanao ny ainy tsy ho zavatra ka nanafaka anareo tamin’ny tanan’ny Midianita, '
  '18':
  - type: text
    content: 'nefa ianareo kosa dia nikomy tamin’ny taranaky ny raiko androany ka namono ny zanany fitopolo lahy teo ambonin’ny vato iray, ary i Abimeleka, zanaky ny mpanompovaviny, no nampanjakainareo tamin’ny mponina ao Sekema, satria rahalahinareo izy; '
  '19':
  - type: text
    content: 'koa raha marina sy mahitsy ny nataonareo androany tamin’i Jerobaala sy ny zanany, dia mifalia amin’i Abimeleka ianareo, ary aoka hifaly aminareo kosa izy! '
  '2':
  - type: text
    content: 'Mba mitenena ianareo amin’ireo lehibe rehetra eto Sekema hoe: Iza no tsara ho anareo: Ny hiarahan’izy fitopolo lahy zanak’i Jerobaala hanapaka anareo va, sa ny hanapahan’ny lehilahy iray anareo? Tsarovy fa taolanareo sy nofonareo aho! '
  '20':
  - type: text
    content: 'Fa raha tsy izany kosa, dia aoka hisy afo hivoaka avy amin’i Abimeleka ka handevona ny mponina ao Sekema sy ny olona ao Milo; ary aoka koa hisy afo hivoaka avy amin’ny mponina ao Sekema sy ny olona ao Milo ka handevona an’i Abimeleka! '
  '21':
  - type: text
    content: Dia riatra nandositra i Jotama ka nankany Bera ary nitoetra tao mba hiery an’i Abimeleka rahalahiny.
  - type: heading
    content: Nikomy tamin’i Abimeleka ny tao Sekema
  '22':
  - type: text
    content: 'Nitondra ny Israely nandritra ny telo taona i Abimeleka. '
  '23':
  - type: text
    content: 'Ary Andriamanitra naniraka fanahy ratsy nampisara-tsaina an’i Abimeleka sy ireo lehibe tao Sekema ka nivadika tamin’i Abimeleka ireo lehibe tao Sekema, '
  '24':
  - type: text
    content: 'mba hitsingerenan’ny loza natao tamin’ny zanak’i Jerobaala fitopolo lahy ka hanody an’i Abimeleka rahalahiny ny rany tamin’ny namonoany azy, sy hanody an’ireo lehibe tao Sekema izay nanainga ny tanany hamono ny rahalahiny. '
  '25':
  - type: text
    content: Nametrahan’ny mponina tao Sekema vela-pandrika tany an-tampon-tendrombohitra izy dia nobaboin’ny vela-pandrika izay rehetra nandalo tamin’izany lalana izany. Nambara tamin’i Abimeleka izany.
  '26':
  - type: text
    content: 'Dia tonga tao i Gala, zanak’i Ebeda, sy ny rahalahiny, ka nankany Sekema, ary natoky azy ny mponina tao Sekema. '
  '27':
  - type: text
    content: 'Nivoaka ho any an-tsaha izy ireo ka nioty ny voalobony dia nanosihosy azy sady nikorana; avy eo ireo dia niditra tao amin’ny tempolin’ny andriamaniny ary nihinana sy nisotro sady nanozona an’i Abimeleka. '
  '28':
  - type: text
    content: 'Hoy i Gala, zanak’i Ebeda: Iza moa i Abimeleka, ary iza moa i Sekema, no hanompo an’i Abimeleka isika? Tsy zanak’i Jerobaala va izy io? Ary tsy i Zebola va no lefiny? Manompoa ny taranak’i Hamora, rain’i Sekema ianareo; fa nahoana isika no hanompo an’i Abimeleka? '
  '29':
  - type: text
    content: 'Enga anie ka ho eo ambanin’ny fahefako ireto olona ireto, dia hesoriko i Abimeleka! Dia hoy izy tamin’i Abimeleka: Hamaroy ny miaramilanao ka mivoaha hiady!'
  '3':
  - type: text
    content: 'Ary nilaza ny momba azy teo anatrehan’ireo lehibe rehetra tao Sekema ireo anadahin-dreniny ka nitondra izany teny rehetra izany, dia nirona tamin’i Abimeleka ny fony, fa hoy izy ireo: Rahalahintsika izy. '
  '30':
  - type: text
    content: 'Rehefa ren’i Zebola, governoran’ny tanàna, ny tenin’i Gala, zanak’i Ebeda, dia nirehitra ny fahatezerany. '
  '31':
  - type: text
    content: 'Nandefa iraka mangingina ho any amin’i Abimeleka izy hilaza hoe: Indro, tonga ato Sekema i Gala, zanak’i Ebeda, sy ny rahalahiny; ary indro, manainga ny ato an-tanàna hikomy aminao izy. '
  '32':
  - type: text
    content: 'Koa ankehitriny, miaingà amin’ny alina ianao sy ny vahoaka miaraka aminao ka manaova vela-pandrika any an-tsaha. '
  '33':
  - type: text
    content: Ary amin’ny maraina, raha vao miposaka ny masoandro, dia mifohaza ka miroata hamely ny tanàna. Rehefa mivoaka hiady aminao i Gala sy ny vahoaka miaraka aminy dia ataovy izay hanaovanao azy.
  '34':
  - type: text
    content: 'Dia niainga tamin’ny alina i Abimeleka sy ny vahoaka rehetra niaraka taminy ka nanao vela-pandrika efa-toko tandrifin’i Sekema. '
  '35':
  - type: text
    content: 'Dia nivoaka ny tanàna i Gala, zanak’i Ebeda, ka nijanona teo anoloan’ny vavahadin’ny tanàna; dia niroatra avy tao amin’ny vela-pandrika i Abimeleka sy ny vahoaka izay niaraka taminy. '
  '36':
  - type: text
    content: 'Rehefa hitan’i Gala ny olona dia hoy izy tamin’i Zebola: Indreo, misy olona midina avy eny an-tampon’ny tendrombohitra. Hoy i Zebola taminy: Ny aloky ny tendrombohitra no hitanao ka heverinao ho olona. '
  '37':
  - type: text
    content: 'Dia mbola niteny indray i Gala hoe: Indreo, misy olona midina avy ao afovoan’ny tany ary indreo, misy antokony hafa mandeha amin’ny lalana eo amin’ny hazo '
  - type: text
    content: terebintan’ny
  - type: text
    content: ' mpimasy. '
  '38':
  - type: text
    content: 'Dia hoy i Zebola taminy: Aiza ny vavanao izay niteny hoe: Iza moa i Abimeleka, no hotompointsika? Tsy ireo va no olona izay nohamavoinao? Mivoaha ankehitriny ka miadia aminy! '
  '39':
  - type: text
    content: 'Dia niainga i Gala ka nitarika ny mponina tao Sekema ary niady tamin’i Abimeleka. '
  '4':
  - type: text
    content: 'Dia nomeny volafotsy fitopolo sekela avy tao an-tranon’i Baala-Berita izy, ary nanambazan’i Abimeleka olom-poana sy maditra maromaro hanaraka azy izany volafotsy izany. '
  '40':
  - type: text
    content: 'Dia nanenjika azy i Abimeleka ka nandositra teo anoloany izy ary maro ny faty niampatrampatra hatreny anoloan’ny vavahady aza. '
  '41':
  - type: text
    content: Ary i Abimeleka dia nonina tany Aroma. Ary nandroaka an’i Gala sy ny rahalahiny i Zebola mba tsy honina any Sekema intsony ireo.
  '42':
  - type: text
    content: 'Nony ampitson’iny dia nivoaka ny tanàna ho any an-tsaha ny olona ary nisy nanambara izany tamin’i Abimeleka. '
  '43':
  - type: text
    content: 'Dia naka ny olony izy ka nizara azy ho telo toko ary nanao vela-pandrika tany an-tsaha. Rehefa hitany fa indreo, nivoaka avy tao an-tanàna ny olona, dia nitsangana hiady aminy izy ka namely azy. '
  '44':
  - type: text
    content: 'Ary i Abimeleka sy ny antokony niaraka taminy dia niroatra ka nitsangana teo anoloan’ny vavahadin’ny tanàna; ary ny roa toko hafa kosa dia nirohotra namely ny vahoaka rehetra tany an-tsaha ka namono azy. '
  '45':
  - type: text
    content: 'Ary namely ny tanàna mandritra izany andro izany i Abimeleka dia nahazo azy ka namono ny olona tao. Noravany ny tanàna sady nofafazany sira. '
  '46':
  - type: text
    content: 'Nony nandre izany ireo lehibe rehetra tao Migdala-Sekema dia niditra tao amin’ny efitrano fierena tao ambanin’ny tempolin’i Ely-Berita. '
  '47':
  - type: text
    content: 'Ary nisy nilaza tamin’i Abimeleka fa tafangona tao Migdala-Sekema ireo lehibe rehetra. '
  '48':
  - type: text
    content: 'Dia niakatra tany amin’ny tendrombohitra Zalmona i Abimeleka sy ny vahoaka niaraka taminy. Nandray famaky teny an-tanany i Abimeleka dia nikapa sampan-kazo; nobatainy izany dia nolanjainy teny an-tsorony, ary hoy izy tamin’ny vahoaka izay niaraka taminy: Izay hitanareo ataoko dia mba manaova haingana toy izany koa ianareo. '
  '49':
  - type: text
    content: Koa samy nikapa sampan-kazo avy ny vahoaka rehetra ka nanaraka an’i Abimeleka; napetrany teo amin’ilay efitrano fierena izany ary nodorany tamin’ny afo. Koa maty ny olona rehetra tao Migdala-Sekema, na lehilahy na vehivavy, tokony ho arivo ny isany.
  - type: heading
    content: Ny nahafatesan’i Abimeleka
  '5':
  - type: text
    content: 'Dia nankany an-tranon’ny rainy tany Ofra izy ka namono ireo rahalahiny fitopolo lahy, zanak’i Jerobaala, teo ambonin’ny vato iray. I Jotama, faralahin’i Jerobaala, no sisa velona satria niery izy. '
  '50':
  - type: text
    content: 'Dia nandeha nankany Tebeza i Abimeleka, ary nitoby tandrifin’i Tebeza ka nahazo azy. '
  '51':
  - type: text
    content: 'Fa nisy manda avo sady mafy teo afovoan’ny tanàna; nandositra tao ny lehilahy sy ny vehivavy rehetra ary ireo lehibe rehetra tao an-tanàna ka nihidy tao ary niakatra teo an-tampon’ny manda avo. '
  '52':
  - type: text
    content: 'Tonga teo amin’ilay manda avo i Abimeleka ka namely azy, ary nanatona ny varavaran’ny manda avo izy mba handoro azy amin’ny afo. '
  '53':
  - type: text
    content: 'Fa nisy vehivavy iray nanjera vato fikosoham-bary tamin’ny lohan’i Abimeleka ka nahavaky ny karandohany. '
  '54':
  - type: text
    content: 'Dia nantsoin’i Abimeleka haingana ny zatovo mpitondra ny fiadiany ka hoy izy taminy: Tsoahy ny sabatrao ka vonoy aho mba tsy hanaovan’ny olona ahy hoe: Vehivavy no nahafaty azy. Dia namely azy miboroaka ilay zatovo ka maty izy. '
  '55':
  - type: text
    content: Rehefa hitan’ny lehilahin’ny Israely fa maty i Abimeleka dia samy lasa nandeha ho any amin’ny fonenany avy izy.
  '56':
  - type: text
    content: 'Izany no namalian’Andriamanitra ny ratsy nataon’i Abimeleka, izay nataony tamin’ny rainy, tamin’ny namonoany ny rahalahiny fitopolo lahy. '
  '57':
  - type: text
    content: Ny ratsy rehetra nataon’ny mponina tao Sekema dia natsingerin’Andriamanitra tamin’ireo lehibeny avokoa ka nihatra taminy ilay ozona nataon’i Jotama, zanak’i Jerobaala.
  '6':
  - type: text
    content: 'Dia nivory ny lehibe rehetra tao Sekema sy ny olona rehetra tao Milo ka nandeha nampanjaka an’i Abimeleka teo anilan’ny hazo '
  - type: text
    content: terebinta
  - type: text
    content: ', akaikin’ny tsangambato any Sekema'
  - type: note
    content: 'Ny tsangambato any Sekema: Zahao Jos 24.26.'
  - type: text
    content: .
  - type: heading
    content: Ny angano nataon’i Jotama
  '7':
  - type: text
    content: 'Ary nisy nilaza izany tamin’i Jotama, dia nandeha izy ka nitsangana teo an-tampon’ny tendrombohitra Gerizima ary nanandratra ny feony ka niantso hoe:'
  - type: text
    content: Mihainoa ahy, ianareo lehibe ao Sekema,
  - type: text
    content: mba hihainoan’Andriamanitra anareo kosa!
  '8':
  - type: text
    content: Niainga, hono, ny hazo maniry, mba hanosotra mpanjaka hanjaka aminy
  - type: text
    content: 'ka hoy izy ireo tamin’ny hazo oliva:'
  - type: text
    content: Manjakà aminay ianao!
  '9':
  - type: text
    content: 'Fa hoy ny hazo oliva taminy:'
  - type: text
    content: Ho foiko va ny diloiloko
  - type: text
    content: izay ankalazan’ireny andriamanitra sy ny olona ireny ahy
  - type: text
    content: ka handeha hitsingevingevina erỳ ambony hazo hafa aho?
