document_id: JDG.9
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Tonga mpanjakan’i Sekema i Abimeleka
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary nandeha nankany Sekema tany amin’ny anadahin-dreniny i Abimeleka, zanak’i Jerobaala ka niresaka taminy sy tamin’ny fianakavian-dreniny rehetra hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Mba mitenena ianareo amin’ireo lehibe rehetra eto Sekema hoe: Iza no tsara ho anareo: Ny hiarahan’izy fitopolo lahy zanak’i Jerobaala hanapaka anareo va, sa ny hanapahan’ny lehilahy iray anareo? Tsarovy fa taolanareo sy nofonareo aho! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary nilaza ny momba azy teo anatrehan’ireo lehibe rehetra tao Sekema ireo anadahin-dreniny ka nitondra izany teny rehetra izany, dia nirona tamin’i Abimeleka ny fony, fa hoy izy ireo: Rahalahintsika izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dia nomeny volafotsy fitopolo sekela avy tao an-tranon’i Baala-Berita izy, ary nanambazan’i Abimeleka olom-poana sy maditra maromaro hanaraka azy izany volafotsy izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia nankany an-tranon’ny rainy tany Ofra izy ka namono ireo rahalahiny fitopolo lahy, zanak’i Jerobaala, teo ambonin’ny vato iray. I Jotama, faralahin’i Jerobaala, no sisa velona satria niery izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia nivory ny lehibe rehetra tao Sekema sy ny olona rehetra tao Milo ka nandeha nampanjaka an’i Abimeleka teo anilan’ny hazo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: terebinta
  - type: text
    text: ', akaikin’ny tsangambato any Sekema'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ny tsangambato any Sekema: '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Zahao '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jos 24.26.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny angano nataon’i Jotama
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary nisy nilaza izany tamin’i Jotama, dia nandeha izy ka nitsangana teo an-tampon’ny tendrombohitra Gerizima ary nanandratra ny feony ka niantso hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mihainoa ahy, ianareo lehibe ao Sekema,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hihainoan’Andriamanitra anareo kosa!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Niainga, hono, ny hazo maniry, mba hanosotra mpanjaka hanjaka aminy
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ka hoy izy ireo tamin’ny hazo oliva:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Manjakà aminay ianao!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Fa hoy ny hazo oliva taminy:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ho foiko va ny diloiloko
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay ankalazan’ireny andriamanitra sy ny olona ireny ahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka handeha hitsingevingevina erỳ ambony hazo hafa aho?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dia hoy ny hazo maniry tamin’ny aviavy:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Avia ianao ka manjakà aminay!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Fa hoy ny aviavy taminy:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ho foiko va ny fahamamiako sy ny vokatro tsara
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka handeha hitsingevingevina erỳ ambony hazo hafa aho?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Dia hoy ny hazo maniry tamin’ny voaloboka:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Avia ianao ka manjakà aminay!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Fa hoy ny voaloboka taminy:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ho foiko va ny ranoko
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay mahafaly ireo andriamanitra sy ny olona
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka handeha hitsingevingevina erỳ ambony hazo hafa aho?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary hoy ny hazo maniry rehetra tamin’ny tsilo:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Avia ianao ka manjakà aminay!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Fa hoy ny tsilo tamin’ny hazo maniry:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Raha hosoranareo ho mpanjakanareo tokoa ary aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia avia ianareo ka mialofa ato amin’ny alokaloko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa raha tsy izany, aoka hisy afo hivoaka avy amin’ny tsilo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka handevona ny sederan’i Libanona!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Koa ankehitriny, raha marina sy mahitsy ny nataonareo tamin’ny nampanjakanareo an’i Abimeleka, ary raha soa no nataonareo tamin’i Jerobaala sy ny taranany ka novalìnareo araka izay nataon’ny tanany izy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'fa ny raiko anie no niady ho anareo sady nanao ny ainy tsy ho zavatra ka nanafaka anareo tamin’ny tanan’ny Midianita, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'nefa ianareo kosa dia nikomy tamin’ny taranaky ny raiko androany ka namono ny zanany fitopolo lahy teo ambonin’ny vato iray, ary i Abimeleka, zanaky ny mpanompovaviny, no nampanjakainareo tamin’ny mponina ao Sekema, satria rahalahinareo izy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'koa raha marina sy mahitsy ny nataonareo androany tamin’i Jerobaala sy ny zanany, dia mifalia amin’i Abimeleka ianareo, ary aoka hifaly aminareo kosa izy! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Fa raha tsy izany kosa, dia aoka hisy afo hivoaka avy amin’i Abimeleka ka handevona ny mponina ao Sekema sy ny olona ao Milo; ary aoka koa hisy afo hivoaka avy amin’ny mponina ao Sekema sy ny olona ao Milo ka handevona an’i Abimeleka! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Dia riatra nandositra i Jotama ka nankany Bera ary nitoetra tao mba hiery an’i Abimeleka rahalahiny.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nikomy tamin’i Abimeleka ny tao Sekema
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Nitondra ny Israely nandritra ny telo taona i Abimeleka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary Andriamanitra naniraka fanahy ratsy nampisara-tsaina an’i Abimeleka sy ireo lehibe tao Sekema ka nivadika tamin’i Abimeleka ireo lehibe tao Sekema, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'mba hitsingerenan’ny loza natao tamin’ny zanak’i Jerobaala fitopolo lahy ka hanody an’i Abimeleka rahalahiny ny rany tamin’ny namonoany azy, sy hanody an’ireo lehibe tao Sekema izay nanainga ny tanany hamono ny rahalahiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Nametrahan’ny mponina tao Sekema vela-pandrika tany an-tampon-tendrombohitra izy dia nobaboin’ny vela-pandrika izay rehetra nandalo tamin’izany lalana izany. Nambara tamin’i Abimeleka izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Dia tonga tao i Gala, zanak’i Ebeda, sy ny rahalahiny, ka nankany Sekema, ary natoky azy ny mponina tao Sekema. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Nivoaka ho any an-tsaha izy ireo ka nioty ny voalobony dia nanosihosy azy sady nikorana; avy eo ireo dia niditra tao amin’ny tempolin’ny andriamaniny ary nihinana sy nisotro sady nanozona an’i Abimeleka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Hoy i Gala, zanak’i Ebeda: Iza moa i Abimeleka, ary iza moa i Sekema, no hanompo an’i Abimeleka isika? Tsy zanak’i Jerobaala va izy io? Ary tsy i Zebola va no lefiny? Manompoa ny taranak’i Hamora, rain’i Sekema ianareo; fa nahoana isika no hanompo an’i Abimeleka? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Enga anie ka ho eo ambanin’ny fahefako ireto olona ireto, dia hesoriko i Abimeleka! Dia hoy izy tamin’i Abimeleka: Hamaroy ny miaramilanao ka mivoaha hiady!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Rehefa ren’i Zebola, governoran’ny tanàna, ny tenin’i Gala, zanak’i Ebeda, dia nirehitra ny fahatezerany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Nandefa iraka mangingina ho any amin’i Abimeleka izy hilaza hoe: Indro, tonga ato Sekema i Gala, zanak’i Ebeda, sy ny rahalahiny; ary indro, manainga ny ato an-tanàna hikomy aminao izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Koa ankehitriny, miaingà amin’ny alina ianao sy ny vahoaka miaraka aminao ka manaova vela-pandrika any an-tsaha. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Ary amin’ny maraina, raha vao miposaka ny masoandro, dia mifohaza ka miroata hamely ny tanàna. Rehefa mivoaka hiady aminao i Gala sy ny vahoaka miaraka aminy dia ataovy izay hanaovanao azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Dia niainga tamin’ny alina i Abimeleka sy ny vahoaka rehetra niaraka taminy ka nanao vela-pandrika efa-toko tandrifin’i Sekema. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Dia nivoaka ny tanàna i Gala, zanak’i Ebeda, ka nijanona teo anoloan’ny vavahadin’ny tanàna; dia niroatra avy tao amin’ny vela-pandrika i Abimeleka sy ny vahoaka izay niaraka taminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Rehefa hitan’i Gala ny olona dia hoy izy tamin’i Zebola: Indreo, misy olona midina avy eny an-tampon’ny tendrombohitra. Hoy i Zebola taminy: Ny aloky ny tendrombohitra no hitanao ka heverinao ho olona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Dia mbola niteny indray i Gala hoe: Indreo, misy olona midina avy ao afovoan’ny tany ary indreo, misy antokony hafa mandeha amin’ny lalana eo amin’ny hazo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: terebintan’ny
  - type: text
    text: ' mpimasy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Dia hoy i Zebola taminy: Aiza ny vavanao izay niteny hoe: Iza moa i Abimeleka, no hotompointsika? Tsy ireo va no olona izay nohamavoinao? Mivoaha ankehitriny ka miadia aminy! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Dia niainga i Gala ka nitarika ny mponina tao Sekema ary niady tamin’i Abimeleka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Dia nanenjika azy i Abimeleka ka nandositra teo anoloany izy ary maro ny faty niampatrampatra hatreny anoloan’ny vavahady aza. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: Ary i Abimeleka dia nonina tany Aroma. Ary nandroaka an’i Gala sy ny rahalahiny i Zebola mba tsy honina any Sekema intsony ireo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Nony ampitson’iny dia nivoaka ny tanàna ho any an-tsaha ny olona ary nisy nanambara izany tamin’i Abimeleka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Dia naka ny olony izy ka nizara azy ho telo toko ary nanao vela-pandrika tany an-tsaha. Rehefa hitany fa indreo, nivoaka avy tao an-tanàna ny olona, dia nitsangana hiady aminy izy ka namely azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Ary i Abimeleka sy ny antokony niaraka taminy dia niroatra ka nitsangana teo anoloan’ny vavahadin’ny tanàna; ary ny roa toko hafa kosa dia nirohotra namely ny vahoaka rehetra tany an-tsaha ka namono azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Ary namely ny tanàna mandritra izany andro izany i Abimeleka dia nahazo azy ka namono ny olona tao. Noravany ny tanàna sady nofafazany sira. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Nony nandre izany ireo lehibe rehetra tao Migdala-Sekema dia niditra tao amin’ny efitrano fierena tao ambanin’ny tempolin’i Ely-Berita. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Ary nisy nilaza tamin’i Abimeleka fa tafangona tao Migdala-Sekema ireo lehibe rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Dia niakatra tany amin’ny tendrombohitra Zalmona i Abimeleka sy ny vahoaka niaraka taminy. Nandray famaky teny an-tanany i Abimeleka dia nikapa sampan-kazo; nobatainy izany dia nolanjainy teny an-tsorony, ary hoy izy tamin’ny vahoaka izay niaraka taminy: Izay hitanareo ataoko dia mba manaova haingana toy izany koa ianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: Koa samy nikapa sampan-kazo avy ny vahoaka rehetra ka nanaraka an’i Abimeleka; napetrany teo amin’ilay efitrano fierena izany ary nodorany tamin’ny afo. Koa maty ny olona rehetra tao Migdala-Sekema, na lehilahy na vehivavy, tokony ho arivo ny isany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nahafatesan’i Abimeleka
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Dia nandeha nankany Tebeza i Abimeleka, ary nitoby tandrifin’i Tebeza ka nahazo azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'Fa nisy manda avo sady mafy teo afovoan’ny tanàna; nandositra tao ny lehilahy sy ny vehivavy rehetra ary ireo lehibe rehetra tao an-tanàna ka nihidy tao ary niakatra teo an-tampon’ny manda avo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'Tonga teo amin’ilay manda avo i Abimeleka ka namely azy, ary nanatona ny varavaran’ny manda avo izy mba handoro azy amin’ny afo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'Fa nisy vehivavy iray nanjera vato fikosoham-bary tamin’ny lohan’i Abimeleka ka nahavaky ny karandohany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: 'Dia nantsoin’i Abimeleka haingana ny zatovo mpitondra ny fiadiany ka hoy izy taminy: Tsoahy ny sabatrao ka vonoy aho mba tsy hanaovan’ny olona ahy hoe: Vehivavy no nahafaty azy. Dia namely azy miboroaka ilay zatovo ka maty izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: Rehefa hitan’ny lehilahin’ny Israely fa maty i Abimeleka dia samy lasa nandeha ho any amin’ny fonenany avy izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: 'Izany no namalian’Andriamanitra ny ratsy nataon’i Abimeleka, izay nataony tamin’ny rainy, tamin’ny namonoany ny rahalahiny fitopolo lahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: Ny ratsy rehetra nataon’ny mponina tao Sekema dia natsingerin’Andriamanitra tamin’ireo lehibeny avokoa ka nihatra taminy ilay ozona nataon’i Jotama, zanak’i Jerobaala.
