document_id: PSA.60,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Andriamanitra mamaly vavaka ny olony resy
  - type: text
    content: Ho an’ny mpiventy hira. Al-shoshan edot. Miktama nataon’i Davida hampianarana, fony izy nanafika an’i Mezopotamia sy Arama-Zoba, tamin’ny niverenan’i Joaba ka namelezany ny Edomita roa arivo sy iray alin-dahy teo amin’ny Lohasahantsira.
  - type: text
    content: Andriamanitra ô, efa nanary sy nampihahaka anay Ianao,
  - type: text
    content: efa tezitra Ianao, velombelomy izahay!
  '10':
  - type: text
    content: Tsy Ianao va, Andriamanitra ô, izay nanary anay?
  - type: text
    content: Sady tsy nandeha niaraka tamin’ny antokon’ny miaramilanay, Andriamanitra ô?
  '11':
  - type: text
    content: Vonjeo amin’ny mpandrafy izahay!
  - type: text
    content: Fa zava-poana ny famonjena ataon’ny olona.
  '12':
  - type: text
    content: Amin’Andriamanitra no hahavitantsika fandresen-dehibe;
  - type: text
    content: fa Izy no hanitsakitsaka ny fahavalontsika.
  '2':
  - type: text
    content: Efa nampihorohoro ny tany Ianao ka nampitresaka azy.
  - type: text
    content: Amboary izay rava aminy fa mihozongozona izy!
  '3':
  - type: text
    content: Efa nampahita ny olonao zava-tsarotra Ianao
  - type: text
    content: ary efa nampisotro anay divay mampiraikiraiky.
  '4':
  - type: text
    content: Efa notoloranao faneva ny matahotra Anao
  - type: text
    content: 'mba hatsangany noho ny fahamarinana. '
  - type: text
    content: Fiatoana.
  '5':
  - type: text
    content: Mba hahafahan’ny malalanao
  - type: text
    content: dia vonjeo amin’ny tananao ankavanana aho ka valio!
  '6':
  - type: text
    content: 'Andriamanitra niteny tamin’ny fahamasinany hoe:'
  - type: text
    content: Handresy Aho ka hizara an’i Sekema
  - type: text
    content: ary ny lohasahan’i Sokota dia horefesiko.
  '7':
  - type: text
    content: Ahy i Gileada, Ahy koa i Manase;
  - type: text
    content: aron’ny lohako i Efraima;
  - type: text
    content: tehim-panjakako i Joda.
  '8':
  - type: text
    content: I Moaba dia fitoeran-drano fisasana ho Ahy;
  - type: text
    content: eo amin’i Edoma no anipazako ny kapako;
  - type: text
    content: mihorakoraha hiady Amiko, ry tanin’ny Filistina!
  '9':
  - type: text
    content: Iza no hitondra ahy ho any amin’ny tanàna mafy?
  - type: text
    content: Iza no hitarika ahy hatrany Edoma?
