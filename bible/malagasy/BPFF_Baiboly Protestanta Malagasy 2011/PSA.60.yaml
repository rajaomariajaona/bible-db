document_id: PSA.60
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Andriamanitra mamaly vavaka ny olony resy
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: Ho an’ny mpiventy hira. Al-shoshan edot. Miktama nataon’i Davida hampianarana, fony izy nanafika an’i Mezopotamia sy Arama-Zoba, tamin’ny niverenan’i Joaba ka namelezany ny Edomita roa arivo sy iray alin-dahy teo amin’ny Lohasahantsira.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Andriamanitra ô, efa nanary sy nampihahaka anay Ianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: efa tezitra Ianao, velombelomy izahay!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Efa nampihorohoro ny tany Ianao ka nampitresaka azy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Amboary izay rava aminy fa mihozongozona izy!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Efa nampahita ny olonao zava-tsarotra Ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary efa nampisotro anay divay mampiraikiraiky.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Efa notoloranao faneva ny matahotra Anao
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'mba hatsangany noho ny fahamarinana. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Fiatoana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Mba hahafahan’ny malalanao
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia vonjeo amin’ny tananao ankavanana aho ka valio!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Andriamanitra niteny tamin’ny fahamasinany hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Handresy Aho ka hizara an’i Sekema
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny lohasahan’i Sokota dia horefesiko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ahy i Gileada, Ahy koa i Manase;
- type: usfm
  marker: q1
  children:
  - type: text
    text: aron’ny lohako i Efraima;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tehim-panjakako i Joda.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: I Moaba dia fitoeran-drano fisasana ho Ahy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eo amin’i Edoma no anipazako ny kapako;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mihorakoraha hiady Amiko, ry tanin’ny Filistina!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Iza no hitondra ahy ho any amin’ny tanàna mafy?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Iza no hitarika ahy hatrany Edoma?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Tsy Ianao va, Andriamanitra ô, izay nanary anay?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady tsy nandeha niaraka tamin’ny antokon’ny miaramilanay, Andriamanitra ô?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Vonjeo amin’ny mpandrafy izahay!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa zava-poana ny famonjena ataon’ny olona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Amin’Andriamanitra no hahavitantsika fandresen-dehibe;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa Izy no hanitsakitsaka ny fahavalontsika.
