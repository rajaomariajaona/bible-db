document_id: LUK.15,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mandray ny mpanota Jesosy
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nanatona hihaino Azy ny mpamory hetra rehetra sy ny mpanota. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Lazaiko aminareo fa misy fifaliana toy izany eo anatrehan’ireo anjelin’Andriamanitra ny amin’ny mpanota iray izay mibebaka.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fanoharana ny amin’ilay zanaka very fa hita indray
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy Jesosy: Nisy olona iray nanana zanaka mirahalahy. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy ilay zandriny tamin’ny rainy: Raiko ô! Omeo ahy ny anjara fananana tokony ho ahy. Dia nozarainy tamin’izy mirahalahy ny fananany. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nony afaka andro vitsivitsy dia nangonin’ilay zandriny ny fananany rehetra ka lasa nankany an-tany lavitra izy, dia nandany ny fananany tamin’ny fiainana feno fanaranam-po amin’ny ratsy tany. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa laniny avokoa ny fananany rehetra, ka nisy mosary mafy tamin’izany faritra izany, dia nanomboka ho sahirana izy. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nandeha izy ka niankina tamin’ny tompon-tany iray tamin’izany faritra izany, ary nirahiny tany an-tsahany hiandry kisoa. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Satriny hamoky tena tamin’ny voankazo fihinan’ny kisoa, saingy tsy nisy nanome azy. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa nody ny sainy dia hoy izy: Indrisy! Maro ny olona karamain’ny raiko manana sakafo be dia be, fa izaho kosa maty mosary eto! '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hiainga aho dia hody any amin’ny raiko ka hiteny aminy hoe: Raiko ô, efa nanota tamin’ny lanitra sy teo anatrehanao aho '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ka tsy mendrika hatao hoe: zanakao intsony; fa ataovy tahaka ny iray amin’ny olona karamainao. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nimonomonona ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Fariseo
    - type: text
      text: ' sy ny mpanoradalàna ka niteny hoe: Mandray ny mpanota Ilehio ka miara-misakafo aminy.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fanoharana ny amin’ilay ondry very fa hita indray
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mat 18.12-14
    marker-yv: yv-h
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia niainga izy ka nankany amin’ny rainy.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa raha mbola lavitra izy dia tazan’ny rainy, ary onena azy izy ka nihazakazaka, dia namihina ny vozony sady nanoroka azy. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy ilay zanany taminy: Raiko ô, efa nanota tamin’ny lanitra sy teo anatrehanao aho ka tsy mendrika hatao hoe zanakao intsony. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa rainy kosa dia nilaza tamin’ny mpanompony hoe: Alao haingana ny akanjo tsara indrindra ka ampiakanjoy azy; asio peratra ny tanany ary kapa ny tongony; '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ento atỳ ny zanak’omby nafahy ka vonoy; ary aoka isika hisakafo sy hifaly; '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: fa ity zanako ity efa maty fa velona indray, ary efa very fa hita indray. Dia nanomboka niara-nifaly izy ireo.
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa tany an-tsaha ny zanany lahimatoa; ary nony nody izy ka nanakaiky ny trano dia nandre zavamaneno sy dihy. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia niantso mpanompo iray izy ary nanontany azy izay anton’izany zavatra izany. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy ilay mpanompo taminy: Tonga ny rahalahinao ka namono ny zanak’omby nafahy ny rainao satria efa tafaverina soa amantsara ato aminy izy. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia tezitra izy ka tsy nety niditra; ary nivoaka rainy ka nampandroso azy. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa namaly ny rainy izy hoe: Indro, izay ela izay aho no efa nanompo anao ka tsy mbola nandika ny didinao na dia indray mandeha akory aza; nefa izaho dia tsy mbola nomenao na dia zanak’osy aza mba hifaliako amin’ny sakaizako; '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa nilaza izao fanoharana izao tamin’izy ireo Izy hoe: '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fa raha vao tonga kosa io zanakao io, izay efa nandany ny fanananao tamin’ny vehivavy janga, dia novonoinao ho azy ny zanak’omby nafahy. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy rainy taminy: Anaka, ianao dia eto amiko mandrakariva ary anao avokoa izay rehetra ananako. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa mety ny mifaly sy miravoravo satria ity rahalahinao ity efa maty fa velona indray, ary efa very fa hita indray.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Iza moa no olona aminareo, izay manana ondry zato ka very ny iray no tsy mandao ny sivy amby sivifolo any an-tany efitra ka mandeha hitady ilay very mandra-pahitany azy? '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa hitany iny dia lanjainy eo an-tsorony ka faly izy; '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary rehefa tonga ao an-trano izy dia manasa ny namany sy ny mpiaramonina aminy ka milaza aminy hoe: Avia hiara-mifaly amiko; fa efa hitako ilay ondriko very. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Lazaiko aminareo fa hisy fifaliana toy izany any an-danitra ny amin’ny mpanota iray izay mibebaka mihoatra noho ny amin’ny olona marina sivy amby sivifolo izay tsy misy tokony hibebahany.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fanoharana ny amin’ilay drakma very fa hita indray
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary iza moa no vehivavy manana '
    - type: usfm
      marker: w
      children:
      - type: text
        text: drakma
    - type: text
      text: ' folo ka very ny iray no tsy mampirehitra jiro ka mamafa trano sy mitady fatratra mandra-pahitany azy? '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa hitany ilay izy dia mamory ny vehivavy namany sy ny mpiaramonina aminy izy ka miteny hoe: Avia hiara-mifaly amiko; fa efa hitako ilay drakma iray izay very. '
