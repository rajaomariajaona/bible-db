document_id: 1SA.14,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nanafihan’i Jonatana ny toby iray an’ny Filistina
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Indray andro dia hoy i Jonatana zanak’i Saoly tamin’ny zatovo, mpitondra ny fiadiany: Andeha isika hankeny amin’ny miaramilan’ny Filistina izay erỳ ampita erỳ. Tsy nilaza izany tamin’ny rainy anefa izy.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Fa raha hoy kosa izy ireo: Miakara etỳ aminay dia hiakatra isika, satria efa natolotry NY TOMPO eo an-tanantsika izy; ary izany no ho famantarana ho antsika.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Dia niseho tamin’ny miaramilan’ny Filistina izy roa lahy ka hoy ny Filistina: Indreo, misy Hebreo mifongatra avy any amin’ny lavaka niereny. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Ary hoy ny miaramila tamin’i Jonatana sy ny mpitondra ny fiadiany: Miakara etỳ aminay, dia hanehoanay zavatra ianareo. Ary hoy i Jonatana tamin’ny mpitondra ny fiadiany: Manaraha ahy, fa efa natolotry NY TOMPO eo an-tanan’ny Israely izy ireo. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Dia nananika, nandady tongotra aman-tanana i Jonatana, ary nanaraka azy ny mpitondra ny fiadiany. Dia lavo teo anatrehan’i Jonatana ny Filistina ary namono avy ao aorianany koa ny mpitondra ny fiadiany. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Tokony ho roapolo lahy no matiny aloha, dia ireo izay novonoin’i Jonatana sy ny mpitondra ny fiadiany tao anatin’ny velaran-tany tokony ho antsasaky ny vavaasa vita amin’ny angadinomby indray andro. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Koa nisy horohoro tao amin’ny toby sy tany an-tsaha sy tamin’ny vahoaka rehetra; ary ireo izay teo amin’ny miaramila sy ny holafitra mpandrava dia nangovitra koa; ary nihorohoro ny tany ka nisy fampangovitana avy tamin’Andriamanitra.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Resy ny Filistina
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Ny mpitilin’i Saoly tao Gibean’i Benjamina dia nitazana ka indro, niely ny vahoaka sady nifanaritaka be ihany. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Dia hoy i Saoly tamin’ny olona teo aminy: Alaharo ny olona ka jereo izay niala tamintsika. Nony voalahatra ny olona dia hita fa i Jonatana sy ny mpitondra ny fiadiany no tsy teo. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Hoy koa i Saoly tamin’i Ahia: Ento etỳ ny vata misy ny faneken’Andriamanitra; fa teo amin’ny Zanak’Israely ny vata misy ny faneken’Andriamanitra tamin’izany andro izany. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Ary raha mbola niresaka tamin’ny mpisorona i Saoly dia nandroso sy nitombo ny tabataba terỳ an-tobin’ny Filistina ka hoy i Saoly tamin’ny mpisorona: Esory ny tananao. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Ary nitoetra tany an-tsisin’i Gibea teo ambanin’ilay hazo ampongabendanitra any Migrona i Saoly; ny olona niaraka taminy dia tokony ho eninjato lahy. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Ary nivory i Saoly sy ny vahoaka rehetra izay niaraka taminy ka tonga tany amin’ny ady, ary indreo ny Filistina nifamely tamin’ny sabany, dia izy samy izy, koa nifanaritaka be ihany. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Ny Hebreo izay niaraka tamin’ny Filistina taloha ka niara-niakatra taminy avy tamin’ny tany manodidina ho any an-toby dia nikambana tamin’ny Israely izay teo amin’i Saoly sy i Jonatana koa. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Ary ny lehilahy rehetra teo amin’ny Israely izay niery tany amin’ny tany be havoana any Efraima, rehefa nandre ny nandosiran’ny Filistina, dia nanenjika azy fatratra tamin’ny ady koa. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Namonjy ny Israely NY TOMPO tamin’izany andro izany; ary niitatra hatrany ambadik’i Bety-Avena ny ady.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Novonjen’ny vahoaka i Jonatana
    marker-yv: yv-h
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Tao an-katerena tokoa ireo lehilahin’ny Israely tamin’iny andro iny, kanefa i Saoly dia efa nampianiana ny olona hoe: Ho voaozona izay olona homan-kanina anio tontolo andro mandra-pamaliko ny fahavaloko. Koa tsy nisy olona nanendry hanina na dia iray akory aza. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Dia niditra ny ala ny olona rehetra; ary nisy tantely teny rehetra teny. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Rehefa tonga tao anaty ala ny olona dia nahita fa nisy tantely nitsororoka; nefa tsy nisy olona sahy nanainga ny tanany ho amin’ny vavany satria natahotra ny fianianana. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'I Jonatana kosa dia tsy nandre ny nampianianan’ny rainy ny olona. Dia narosony ny lohatehiny teny an-tanany ka natsobony tamin’ny tantely ary nataony teo am-bavany ny tanany ka nazava ny masony. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Ary nisy olona iray niteny taminy hoe: Rainao anie ka nampianiana mafy ny olona hoe: Ho voaozona izay olona homan-kanina anio; efa reraka anefa ity ny olona. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Dia hoy i Jonatana: Ikaky efa nampiditra loza tamin’ny tany; koa miangavy anareo aho, jereo izato fahazavan’ny masoko satria nanandrana kely tamin’ity tantely ity aho teo. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Teo koa i Ahia izay nisalotra ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: efoda
    - type: text
      text: ; izy dia zanak’i Ahitoba, rahalahin’i Ikaboda, zanak’i Finehasa, zanak’i Ely, mpisoron’NY TOMPO tany Silo. Ary tsy fantatry ny olona fa lasa i Jonatana.
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Koa mainka raha navela hihinanan’ny olona ny babo azony tamin’ny fahavalony, tsy ho nahafatesana be lavitra va ny Filistina?
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Ary namely ny Filistina izy ireo tamin’iny andro iny, hatrany Mikmasy ka hatrany Aialona, ary tena reraka ny olona. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Dia nirohotra nankeo amin’ny babo ny olona ka naka ondry aman’osy sy omby ary zanak’omby, dia namono azy teo amin’ny tany ary nohanin’ny olona mbamin’ny rany izany. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Nisy nilaza tamin’i Saoly ary hoe: Indro, manota amin’NY TOMPO ny olona, fa mihinana zavatra mbamin’ny rany izy. Dia hoy i Saoly: Olona mpivadika ianareo! Manakodiava vato lehibe iray ho etỳ amiko izao dia izao. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Hoy koa izy: Mieleza eny amin’ny olona ianareo ka lazao aminy hoe: Samia mitondra ny ombiny etỳ amiko ary samia mitondra ny ondriny ka vonoy eto izany dia hano, ary aza manota amin’NY TOMPO amin’ny fihinanana zavatra mbamin’ny rany. Ary ny vahoaka rehetra dia samy nitondra ny ombiny tamin’izany alina izany ka namono azy teo. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: Ary nanorina alitara ho an’NY TOMPO i Saoly; io no alitara voalohany naoriny ho an’NY TOMPO.
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Hoy i Saoly: Andeha hidina hanenjika ny Filistina isika anio alina ka hambabo azy ambara-pahazavan’ny andro; tsy hasiantsika miangana izy. Dia hoy ny olona: Ataovy izay sitrakao. Fa hoy ny mpisorona: Andeha ary isika hanatona an’Andriamanitra eto. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Ary nanontany tamin’Andriamanitra i Saoly hoe: Hidina hanenjika ny Filistina va aho? Hatolotrao eo an-tanan’ny Israely va izy? Nefa tsy namaly azy akory Izy tamin’iny andro iny. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Dia hoy i Saoly: Manatòna etỳ ianareo loholona rehetra ary fantaro ka jereo izay nahatonga izao fahotana androany izao. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Fa raha velona koa NY TOMPO izay Mpamonjy ny Israely, na amin’i Jonatana zanako aza no hahitana izany, dia hovonoina ho faty tokoa izy. Nefa tsy nisy namaly azy ny vahoaka rehetra. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ary teo an-daniny roa, teo antenantenan’ny hadilanana izay nitadiavan’i Jonatana hankanesana any amin’ny miaramilan’ny Filistina, dia nisy harambato marani-doha. Ny anaran’ny iray dia Bozeza, ary ny anaran’ny iray kosa i Sene. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'Dia hoy izy tamin’ny Israely rehetra: Ianareo no aoka ho eo an-daniny ary izaho sy i Jonatana zanako kosa no ho eo an-kilany. Hoy ny vahoaka tamin’i Saoly: Ataovy izay sitrakao. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'Dia hoy i Saoly tamin’NY TOMPO, Andriamanitry ny Israely: Asehoy izay marina. Ary i Jonatana sy i Saoly no voatondro, fa afaka ny olona. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'Hoy i Saoly: Manaova antsapaka ny amiko sy i Jonatana zanako. Ary i Jonatana no voatondro. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'Dia hoy i Saoly tamin’i Jonatana: Ambarao amiko izay nataonao. Ary nambaran’i Jonatana taminy hoe: Nanandrana tantely kely monja tamin’ny tendron’ny tehina tetỳ an-tanako aho ary indro, tsy maintsy ho faty aho. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: 'Dia hoy i Saoly: Hataon’Andriamanitra toy izany anie; eny, mihoatra noho izany aza, raha tsy hovonoina ho faty tokoa ianao, ry Jonatana. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: 'Fa hoy ny vahoaka tamin’i Saoly: Ho faty va i Jonatana izay nanao izao famonjena lehibe izao tamin’ny Israely? Sanatria izany! Raha velona koa NY TOMPO, tsy hisy na dia singam-bolony iray akory aza ho latsaka amin’ny tany, fa niara-niasa tamin’Andriamanitra izy androany. Ary nanafaka an’i Jonatana ny vahoaka ka tsy maty izy. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: Rehefa avy nanenjika ny Filistina i Saoly dia niverina niakatra; ny Filistina kosa dia lasa nankany amin’ny taniny.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ireo fandresen’i Saoly; ny filazana ny amin’ny ankohonany
    marker-yv: yv-h
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: 'Nony azon’i Saoly ny fanjakan’Israely dia niady tamin’ny fahavalony rehetra manodidina izy, dia tamin’i Moaba sy ny taranak’i Amona ary ny Edomita sy ny mpanjakan’i Zoba ary ny Filistina; izay nalehany rehetra dia resiny avokoa. '
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: Ary namory miaramila izy dia namely ny Amalekita ka namonjy ny Israely tamin’ny tanan’izay nambabo azy.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 1Tan 8.33-40; 9.39-43
    marker-yv: yv-h
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: 'Ireto no zanakalahin’i Saoly: I Jonatana sy i Jisvy ary i Malky-Soa; izao kosa no anaran’ny zanany vavy roa: Meraba no anaran’ny vavimatoa, ary Mikala no anaran’ny faravavy. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Ny iray amin’ireo harambato ireo dia nanerinerina teo an-daniny avaratra manandrify an’i Mikmasy, ary ny iray kosa dia teo atsimo manandrify an’i Gibea.
  '50':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '50'
    - type: text
      text: 'Ny anaran’ny vadin’i Saoly dia Ahinoama, zanakavavin’i Ahimaza; ary ny anaran’ny komandin’ny miaramilany dia Abnera, zanak’i Nera, rahalahin-drain’i Saoly. '
  '51':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '51'
    - type: text
      text: 'I Kisy no rain’i Saoly; ary i Nera, rain’i Abnera dia zanak’i Abiela. '
  '52':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '52'
    - type: text
      text: Mafy ny ady tamin’ny Filistina tamin’ny andron’i Saoly rehetra; koa raha nisy olona matanjaka sy mahery hitan’i Saoly dia nalainy ho azy.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Hoy i Jonatana tamin’ny zatovo, mpitondra ny fiadiany: Andeha isika hankany amin’ny miaramilan’ireo tsy mifora ireo; angamba homba antsika NY TOMPO satria tsy misy mahasakana NY TOMPO tsy hamonjy, na amin’ny maro, na amin’ny vitsy. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Hoy ny mpitondra ny fiadiany taminy: Ataovy izay rehetra ao am-ponao; aza misalasala; indro, hanaraka anao aho araka izay sitraponao. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Hoy i Jonatana: Indro, handroso ho amin’ireo olona ireo isika ka hiseho aminy. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Raha hoy izy ireo: Andraso eo mandra-pahatonganay any aminareo, dia hijanona eo amin’izay itoerantsika ihany isika ka tsy hiakatra eny aminy. '
