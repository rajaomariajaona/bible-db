document_id: EXO.37,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny vata misy ny Vavolombelona
  - type: text
    content: 'Ary nanao ny vata tamin’ny hazo akasia i Bezalila; roa '
  - type: text
    content: hakiho
  - type: text
    content: ' sy sasany ny lavany, iray hakiho sy sasany ny sakany ary iray hakiho sy sasany ny haavony; '
  '10':
  - type: text
    content: 'Nanao ny latabatra tamin’ny hazo akasia koa izy; roa '
  - type: text
    content: hakiho
  - type: text
    content: ' ny lavany, iray hakiho ny sakany ary iray hakiho sy sasany ny haavony. '
  '11':
  - type: text
    content: 'Nopetahany takelaka volamena tsy miharo izy io sady nasiany sisiny volamena manodidina azy. '
  '12':
  - type: text
    content: 'Nasiany sisiny felatanana iray manodidina azy ary nasiany sisiny volamena ny manodidina. '
  '13':
  - type: text
    content: 'Nandrendrika mason-drojo volamena efatra hatao aminy izy ka nataony teo amin’ny zorony efatra eo amin’ny tongony efatra: '
  '14':
  - type: text
    content: 'Eo akaikin’ny sisiny no nisy ny mason-drojo ho fitoeran’ny bao hilanjana ny latabatra. '
  '15':
  - type: text
    content: 'Ary nanao ny bao tamin’ny hazo akasia izy hilanjana ny latabatra ka nopetahany takelaka volamena. '
  '16':
  - type: text
    content: Nanao ny fanaka izay eo ambonin’ny latabatra indray izy, dia ny loviany sy ny loviakeliny ary ny kapoakany sy ny fitoeran-divainy ho fandrarahana fanatitra; volamena tsy miharo no nanaovany ireo.
  - type: heading
    content: Ny fitoeran-jiro fito rantsana
  '17':
  - type: text
    content: 'Nanao ny fitoeran-jiro tamin’ny volamena tsy miharo indray koa izy; notefena ny fitoeran-jiro; vongana iray aminy ny faladiany, ny tahony, ny foto-boniny, ny bokony ary ny voniny. '
  '18':
  - type: text
    content: 'Nisy rantsany enina tamin’ny ilany roa, dia rantsany telo tamin’ny fitoeran-jiro amin’ny ilany iray, ary rantsana telo tamin’ny fitoeran-jiro amin’ny ilany iray hafa koa; '
  '19':
  - type: text
    content: 'teo amin’ny rantsany iray dia nisy foto-boniny telo natao tahaka ny vonin’ny amanda, mbamin’ny bokony sy ny voniny; teo amin’ny sampany iray koa dia nisy foto-boniny telo natao tahaka ny vonin’ny amanda, mbamin’ny bokony sy ny voniny; dia toy izany avokoa tamin’ny rantsany enina tamin’ny fitoeran-jiro. '
  '2':
  - type: text
    content: 'nopetahany takelaka volamena tsy miharo tao anatiny sy teo ivelany; ary nasiany sisiny volamena manodidina. '
  '20':
  - type: text
    content: 'Teo amin’ny fitoeran-jiro dia nisy foto-boniny efatra natao tahaka ny vonin’ny amanda, mbamin’ny bokony sy ny voniny, '
  '21':
  - type: text
    content: 'dia bokony iray no eo ambanin’ny rantsany roa sady miray aminy, ary bokony iray no eo ambanin’ny rantsany roa sady miray aminy, ary bokony iray no eo ambanin’ny rantsany roa koa sady miray aminy; amin’ny rantsany enina izay miray amin’ny fitoeran-jiro izany. '
  '22':
  - type: text
    content: 'Ny bokony sy ny rantsany dia niray taminy avokoa; izy rehetra dia natao vongana iray tamin’ny volamena iray tsy miharo. '
  '23':
  - type: text
    content: 'Nataony tamin’ny volamena tsy miharo ny jirony fito sy ny hetin-jirony sy ny fitoeran-davenon-jirony. '
  '24':
  - type: text
    content: 'Volamena tsy miharo, '
  - type: text
    content: talenta
  - type: text
    content: ' iray, no nanaovany azy io mbamin’ny fanaka rehetra momba azy.'
  - type: heading
    content: Ny alitara fandoroana ditin-kazo manitra
  '25':
  - type: text
    content: 'Ary nanao ny alitara fandoroana ditin-kazo manitra tamin’ny hazo akasia izy: Iray '
  - type: text
    content: hakiho
  - type: text
    content: ' avy ny lafiny efatra, dia efa-joro tsy mivadi-mandry izany; ary roa hakiho ny haavony; nataony miray aminy ny tandrony. '
  '26':
  - type: text
    content: 'Ary nopetahany takelaka volamena tsy miharo izany, dia ny tampony sy ny lafiny manodidina ary ny tandrony; nasiany sisiny volamena manodidina io. '
  '27':
  - type: text
    content: 'Nasiany mason-drojo volamena roa teo ambanin’ny sisiny ka nataony teo amin’ny zorony efatra ireo ho fitoeran’ny bao hilanjana azy. '
  '28':
  - type: text
    content: Hazo akasia no nanaovany ny bao ka nopetahany takelaka volamena.
  '29':
  - type: text
    content: Nanao ny diloilo fanosorana masina izy, mbamin’ny zava-manitra manentona tsy miharo, asan’ny mpanao haro manitra.
  '3':
  - type: text
    content: Nandrendrika mason-drojo volamena efatra hatao aminy koa izy ka nataony teo amin’ny tongony
  - type: note
    content: 'Na: zorony.'
  - type: text
    content: ' efatra, dia roa no teo amin’ny lafiny iray, ary mason-drojo roa no teo amin’ny lafiny iray koa. '
  '4':
  - type: text
    content: 'Ary nanao bao tamin’ny hazo akasia izy ka nopetahany takelaka volamena. '
  '5':
  - type: text
    content: Nampidiriny ho ao amin’ny mason-drojo izay eo amin’ny lafin’ny vata ny bao hilanjana azy.
  '6':
  - type: text
    content: 'Ary nanao rakotra fanaovam-panavotana tamin’ny volamena tsy miharo izy: Roa hakiho sy sasany ny lavany ary iray hakiho sy sasany ny sakany. '
  '7':
  - type: text
    content: 'Dia nanao '
  - type: text
    content: kerobima
  - type: text
    content: ' volamena roa izy; iray vongana amin’ny rakotra fanaovam-panavotana no nanaovany azy roa, '
  '8':
  - type: text
    content: 'koa ny kerobima iray dia nataony teo amin’ny sakany iray ary ny kerobima iray kosa dia teo amin’ny sakany iray hafa; iray vongana amin’ny rakotra fanaovam-panavotana no nanaovany ny kerobima roa, dia teo amin’ny sakany roa. '
  '9':
  - type: text
    content: Ary nivelatra teo ambony ny elatry ny kerobima ka nalofan’io elany io ny rakotra fanaovam-panavotana; nifanatrika ny tavany sady nanatrika ny rakotra fanaovam-panavotana koa.
  - type: heading
    content: Ny latabatra hasiana ny mofo atao fanatitra
