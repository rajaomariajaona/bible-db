document_id: EXO.37,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny vata misy ny Vavolombelona
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ary nanao ny vata tamin’ny hazo akasia i Bezalila; roa '
    - type: usfm
      marker: w
      children:
      - type: text
        text: hakiho
    - type: text
      text: ' sy sasany ny lavany, iray hakiho sy sasany ny sakany ary iray hakiho sy sasany ny haavony; '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Nanao ny latabatra tamin’ny hazo akasia koa izy; roa '
    - type: usfm
      marker: w
      children:
      - type: text
        text: hakiho
    - type: text
      text: ' ny lavany, iray hakiho ny sakany ary iray hakiho sy sasany ny haavony. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Nopetahany takelaka volamena tsy miharo izy io sady nasiany sisiny volamena manodidina azy. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Nasiany sisiny felatanana iray manodidina azy ary nasiany sisiny volamena ny manodidina. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Nandrendrika mason-drojo volamena efatra hatao aminy izy ka nataony teo amin’ny zorony efatra eo amin’ny tongony efatra: '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Eo akaikin’ny sisiny no nisy ny mason-drojo ho fitoeran’ny bao hilanjana ny latabatra. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Ary nanao ny bao tamin’ny hazo akasia izy hilanjana ny latabatra ka nopetahany takelaka volamena. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Nanao ny fanaka izay eo ambonin’ny latabatra indray izy, dia ny loviany sy ny loviakeliny ary ny kapoakany sy ny fitoeran-divainy ho fandrarahana fanatitra; volamena tsy miharo no nanaovany ireo.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fitoeran-jiro fito rantsana
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Nanao ny fitoeran-jiro tamin’ny volamena tsy miharo indray koa izy; notefena ny fitoeran-jiro; vongana iray aminy ny faladiany, ny tahony, ny foto-boniny, ny bokony ary ny voniny. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Nisy rantsany enina tamin’ny ilany roa, dia rantsany telo tamin’ny fitoeran-jiro amin’ny ilany iray, ary rantsana telo tamin’ny fitoeran-jiro amin’ny ilany iray hafa koa; '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'teo amin’ny rantsany iray dia nisy foto-boniny telo natao tahaka ny vonin’ny amanda, mbamin’ny bokony sy ny voniny; teo amin’ny sampany iray koa dia nisy foto-boniny telo natao tahaka ny vonin’ny amanda, mbamin’ny bokony sy ny voniny; dia toy izany avokoa tamin’ny rantsany enina tamin’ny fitoeran-jiro. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'nopetahany takelaka volamena tsy miharo tao anatiny sy teo ivelany; ary nasiany sisiny volamena manodidina. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Teo amin’ny fitoeran-jiro dia nisy foto-boniny efatra natao tahaka ny vonin’ny amanda, mbamin’ny bokony sy ny voniny, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'dia bokony iray no eo ambanin’ny rantsany roa sady miray aminy, ary bokony iray no eo ambanin’ny rantsany roa sady miray aminy, ary bokony iray no eo ambanin’ny rantsany roa koa sady miray aminy; amin’ny rantsany enina izay miray amin’ny fitoeran-jiro izany. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Ny bokony sy ny rantsany dia niray taminy avokoa; izy rehetra dia natao vongana iray tamin’ny volamena iray tsy miharo. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Nataony tamin’ny volamena tsy miharo ny jirony fito sy ny hetin-jirony sy ny fitoeran-davenon-jirony. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Volamena tsy miharo, '
    - type: usfm
      marker: w
      children:
      - type: text
        text: talenta
    - type: text
      text: ' iray, no nanaovany azy io mbamin’ny fanaka rehetra momba azy.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny alitara fandoroana ditin-kazo manitra
    marker-yv: yv-h
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Ary nanao ny alitara fandoroana ditin-kazo manitra tamin’ny hazo akasia izy: Iray '
    - type: usfm
      marker: w
      children:
      - type: text
        text: hakiho
    - type: text
      text: ' avy ny lafiny efatra, dia efa-joro tsy mivadi-mandry izany; ary roa hakiho ny haavony; nataony miray aminy ny tandrony. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Ary nopetahany takelaka volamena tsy miharo izany, dia ny tampony sy ny lafiny manodidina ary ny tandrony; nasiany sisiny volamena manodidina io. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Nasiany mason-drojo volamena roa teo ambanin’ny sisiny ka nataony teo amin’ny zorony efatra ireo ho fitoeran’ny bao hilanjana azy. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Hazo akasia no nanaovany ny bao ka nopetahany takelaka volamena.
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Nanao ny diloilo fanosorana masina izy, mbamin’ny zava-manitra manentona tsy miharo, asan’ny mpanao haro manitra.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Nandrendrika mason-drojo volamena efatra hatao aminy koa izy ka nataony teo amin’ny tongony
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37.3 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: zorony.
      marker-yv: yv-n
    - type: text
      text: ' efatra, dia roa no teo amin’ny lafiny iray, ary mason-drojo roa no teo amin’ny lafiny iray koa. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ary nanao bao tamin’ny hazo akasia izy ka nopetahany takelaka volamena. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Nampidiriny ho ao amin’ny mason-drojo izay eo amin’ny lafin’ny vata ny bao hilanjana azy.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ary nanao rakotra fanaovam-panavotana tamin’ny volamena tsy miharo izy: Roa hakiho sy sasany ny lavany ary iray hakiho sy sasany ny sakany. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Dia nanao '
    - type: usfm
      marker: w
      children:
      - type: text
        text: kerobima
    - type: text
      text: ' volamena roa izy; iray vongana amin’ny rakotra fanaovam-panavotana no nanaovany azy roa, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'koa ny kerobima iray dia nataony teo amin’ny sakany iray ary ny kerobima iray kosa dia teo amin’ny sakany iray hafa; iray vongana amin’ny rakotra fanaovam-panavotana no nanaovany ny kerobima roa, dia teo amin’ny sakany roa. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Ary nivelatra teo ambony ny elatry ny kerobima ka nalofan’io elany io ny rakotra fanaovam-panavotana; nifanatrika ny tavany sady nanatrika ny rakotra fanaovam-panavotana koa.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny latabatra hasiana ny mofo atao fanatitra
    marker-yv: yv-h
