document_id: MIC.5,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Betlehema, tanànan’ny mpanjaka mpamonjy
  - type: text
    content: Fa ianao, ry Betlehema Efrata,
  - type: text
    content: izay kely tsy tokony ho isan’ny arivon’i Joda akory,
  - type: text
    content: avy ao aminao no hivoahan’ny iray ho mpitondra ho Ahy ao amin’ny Israely;
  - type: text
    content: hatry ny fahagola no niaviany,
  - type: text
    content: dia hatrizay hatrizay.
  '10':
  - type: text
    content: hofoanako ny tanàna amin’ny taninao
  - type: text
    content: ary harodako ny tanànanao mimanda rehetra;
  '11':
  - type: text
    content: hofoanako tsy hisy amin’ny tananao ny fanandroanao
  - type: text
    content: ary tsy hanana mpanandro intsony ianao.
  '12':
  - type: text
    content: Hofoanako tsy hisy aminao koa ny sampinao voasokitra
  - type: text
    content: sy ny tsangambaton-tsampinao
  - type: text
    content: ka tsy hiankohoka eo anatrehan’ny asan’ny tananao intsony ianao.
  '13':
  - type: text
    content: Hongotako tsy ho eo aminao ny tsangankazon-tsampin’ny Aserahanao
  - type: text
    content: ary horavako koa ny tanànanao.
  '14':
  - type: text
    content: Ary amin’ny fahatezerana sy ny fahavinirana no hamaliako ny firenena
  - type: text
    content: izay tsy mihaino.
  '2':
  - type: text
    content: Koa hatolony ireny
  - type: text
    content: ambara-pahatongan’ny fotoana hiterahan’ny iray izay hiteraka;
  - type: text
    content: ary izay sisa amin’ny rahalahiny
  - type: text
    content: dia hiverina ho eo amin’ny Zanak’Israely.
  '3':
  - type: text
    content: Hitsangana Izy hiandry ny ondriny amin’ny herin’NY TOMPO
  - type: text
    content: sy amin’ny voninahitry ny anaran’NY TOMPO Andriamaniny
  - type: text
    content: ka handry fehizay ireny,
  - type: text
    content: fa hatramin’izao Izy dia ho lehibe hatrany amin’ny faran’ny tany.
  '4':
  - type: text
    content: Ary Izy no ho fiadanana.
  - type: text
    content: Raha tonga eto amin’ny tanintsika ny Asiriana
  - type: text
    content: ka miditra ao amin’ny tranobentsika
  - type: text
    content: dia hanangana mpiandry ondry fito sy mpanapaka valo hisakana azy isika.
  '5':
  - type: text
    content: Handany ny tany Asiria amin’ny sabatra
  - type: text
    content: sy ny tanin’i Nimroda ao an-tanànany ireo.
  - type: text
    content: Ary Izy hanafaka antsika amin’ny Asiriana,
  - type: text
    content: raha tonga amin’ny tanintsika ireny ka hanitsaka ato amin’ny faritanintsika.
  - type: heading
    content: Ny sisa amin’ny Israely any amin’ny firenena maro
  '6':
  - type: text
    content: Ary izay sisa amin’i Jakoba ao amin’ny firenena maro
  - type: text
    content: dia ho tahaka ny ando avy amin’NY TOMPO,
  - type: text
    content: tahaka ny ranonorana eny amin’ny ahitra,
  - type: text
    content: izay tsy manantena na inona na inona avy amin’ny olona,
  - type: text
    content: na miandry zavatra avy amin’ny zanak’olombelona.
  '7':
  - type: text
    content: 'Ary izay sisa amin’i Jakoba any amin’ny '
  - type: text
    content: Jentilisa
  - type: text
    content: ','
  - type: text
    content: any amin’ny firenena maro,
  - type: text
    content: dia ho tahaka ny liona amin’ny biby any an’ala
  - type: text
    content: 'sy ho tahaka ny liona tanora ao amin’ny andian’ondry aman’osy:'
  - type: text
    content: Raha mamakivaky ao izy dia manitsakitsaka sy mamiravira
  - type: text
    content: nefa tsy misy manafaka.
  '8':
  - type: text
    content: Aoka ny tananao hiainga hamely ny rafilahinao
  - type: text
    content: ary aoka ho ringana ny fahavalonao rehetra.
  - type: heading
    content: Hofoanan’NY TOMPO ny andry tsy izy rehetra
  '9':
  - type: text
    content: Amin’izany andro izany, hoy NY TOMPO,
  - type: text
    content: dia haringako tsy ho eo aminao intsony ny soavalinao
  - type: text
    content: ary hofonganiko ny kalesy fitondranao miady;
