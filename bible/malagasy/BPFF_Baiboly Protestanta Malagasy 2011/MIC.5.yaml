document_id: MIC.5
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Betlehema, tanànan’ny mpanjaka mpamonjy
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Fa ianao, ry Betlehema Efrata,
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay kely tsy tokony ho isan’ny arivon’i Joda akory,
- type: usfm
  marker: q1
  children:
  - type: text
    text: avy ao aminao no hivoahan’ny iray ho mpitondra ho Ahy ao amin’ny Israely;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hatry ny fahagola no niaviany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hatrizay hatrizay.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Koa hatolony ireny
- type: usfm
  marker: q1
  children:
  - type: text
    text: ambara-pahatongan’ny fotoana hiterahan’ny iray izay hiteraka;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary izay sisa amin’ny rahalahiny
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hiverina ho eo amin’ny Zanak’Israely.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Hitsangana Izy hiandry ny ondriny amin’ny herin’NY TOMPO
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy amin’ny voninahitry ny anaran’NY TOMPO Andriamaniny
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka handry fehizay ireny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa hatramin’izao Izy dia ho lehibe hatrany amin’ny faran’ny tany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ary Izy no ho fiadanana.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Raha tonga eto amin’ny tanintsika ny Asiriana
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka miditra ao amin’ny tranobentsika
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hanangana mpiandry ondry fito sy mpanapaka valo hisakana azy isika.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Handany ny tany Asiria amin’ny sabatra
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny tanin’i Nimroda ao an-tanànany ireo.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary Izy hanafaka antsika amin’ny Asiriana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: raha tonga amin’ny tanintsika ireny ka hanitsaka ato amin’ny faritanintsika.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny sisa amin’ny Israely any amin’ny firenena maro
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ary izay sisa amin’i Jakoba ao amin’ny firenena maro
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ho tahaka ny ando avy amin’NY TOMPO,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tahaka ny ranonorana eny amin’ny ahitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay tsy manantena na inona na inona avy amin’ny olona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: na miandry zavatra avy amin’ny zanak’olombelona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary izay sisa amin’i Jakoba any amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jentilisa
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: any amin’ny firenena maro,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ho tahaka ny liona amin’ny biby any an’ala
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'sy ho tahaka ny liona tanora ao amin’ny andian’ondry aman’osy:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Raha mamakivaky ao izy dia manitsakitsaka sy mamiravira
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa tsy misy manafaka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Aoka ny tananao hiainga hamely ny rafilahinao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary aoka ho ringana ny fahavalonao rehetra.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Hofoanan’NY TOMPO ny andry tsy izy rehetra
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Amin’izany andro izany, hoy NY TOMPO,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia haringako tsy ho eo aminao intsony ny soavalinao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hofonganiko ny kalesy fitondranao miady;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: hofoanako ny tanàna amin’ny taninao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary harodako ny tanànanao mimanda rehetra;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: hofoanako tsy hisy amin’ny tananao ny fanandroanao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy hanana mpanandro intsony ianao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Hofoanako tsy hisy aminao koa ny sampinao voasokitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny tsangambaton-tsampinao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy hiankohoka eo anatrehan’ny asan’ny tananao intsony ianao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Hongotako tsy ho eo aminao ny tsangankazon-tsampin’ny Aserahanao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary horavako koa ny tanànanao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ary amin’ny fahatezerana sy ny fahavinirana no hamaliako ny firenena
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay tsy mihaino.
