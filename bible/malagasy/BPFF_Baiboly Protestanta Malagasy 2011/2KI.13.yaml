document_id: 2KI.13,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: I Joahaza, mpanjakan’ny Israely
  - type: text
    content: 'Tamin’ny taona fahatelo amby roapolo nanjakan’i Joasy, zanak’i Ahazia, mpanjakan’ny Joda, no nanombohan’i Joahaza, zanak’i Jeho, nanjaka tamin’ny Israely tany Samaria, ary nanjaka fito amby folo taona izy. '
  '10':
  - type: text
    content: 'Tamin’ny taona fahafito amby telopolo nanjakan’i Joasy, mpanjakan’ny Joda, no nanombohan’i Joasy, zanak’i Joahaza, nanjaka tamin’ny Israely tany Samaria; nanjaka enina amby folo taona izy. '
  '11':
  - type: text
    content: 'Nanao izay ratsy teo imason’NY TOMPO izy fa tsy niala tamin’ny fahotana rehetra izay nataon’i Jeroboama, zanak’i Nebata, izay nampanotany ny Israely, fa nandeha tamin’izany ihany. '
  '12':
  - type: text
    content: 'Ny tantaran’i Joasy sisa mbamin’izay rehetra nataony sy ny heriny niadiany tamin’i Amazia, mpanjakan’ny Joda, tsy voasoratra ao amin’ny bokin’ny tantaran’ny mpanjakan’ny Israely va izany? '
  '13':
  - type: text
    content: Ary nodimandry any amin’ny razany i Joasy ka i Jeroboama no nipetraka tamin’ny sezafiandrianany. Ary i Joasy dia nalevina tany Samaria tao amin’ny mpanjakan’ny Israely.
  - type: heading
    content: Ny asa faminaniana farany nataon’i Elisa
  '14':
  - type: text
    content: 'Rehefa voan’ny aretina izay hahafaty azy i Elisa dia nidina nankany aminy i Joasy mpanjakan’ny Israely ka niondrika nitomany teo ambonin’ny tavany sady niteny hoe: Ry Ikaky ô! Ry Ikaky ô! E ny kalesy fitondra miady an’ny Israely sy ny mpitaingin-tsoavaliny! '
  '15':
  - type: text
    content: 'Hoy i Elisa taminy: Makà tsipìka sy zana-tsipìka! Dia naka tsipìka sy zana-tsipìka izy. '
  '16':
  - type: text
    content: 'Ary hoy izy tamin’ny mpanjakan’ny Israely: Henjano ny tsipìka! Dia nohenjaniny izany. Dia nametraka ny tanany teo amin’ny tanan’ny mpanjaka i Elisa '
  '17':
  - type: text
    content: 'ary hoy izy: Vohay ny varavarankely atsinanana! Dia novohany izany. Hoy i Elisa: Alefaso! Dia nalefany. Ary hoy izy: Zana-tsipìkan’ny famonjen’NY TOMPO, dia zana-tsipìkan’ny famonjena hahavoa ny Arameana! Fa hamely ny Arameana ao Afeka ianao mandra-pandringanao azy. '
  '18':
  - type: text
    content: 'Hoy koa izy: Raiso ny zana-tsipìka! Dia noraisiny. Ary hoy izy tamin’ny mpanjakan’ny Israely: Kapohy ny tany! Ary nokapohiny intelo, dia nitsahatra izy. '
  '19':
  - type: text
    content: 'Ary tezitra taminy ny lehilahin’Andriamanitra ka niteny hoe: Tokony ho nikapoka indimy na inenina ianao, dia ho nasianao ny Arameana mandra-pandringanao azy; fa izao dia intelo ihany no hamelezanao ny Arameana.'
  '2':
  - type: text
    content: 'Nanao izay ratsy teo imason’NY TOMPO izy; nanaraka ny fahotan’i Jeroboama, zanak’i Nebata, izay nampanotany ny Israely izy fa tsy niala tamin’izany. '
  '20':
  - type: text
    content: 'Dia maty i Elisa ka nalevina. Tamin’izany fotoana izany dia nananika ny tany isan-taona ny mpihantsy adin’ny Moabita. '
  '21':
  - type: text
    content: Ary nisy mpandevina nahita ireo mpihantsy ady ireo ka natsipiny tao am-pasan’i Elisa ny faty haleviny; nefa raha vao nitehika tamin’ny taolan’i Elisa ny fatin-dRalehilahy dia velona izy ka nijoro tamin’ny tongony.
  - type: heading
    content: Nalain’i Joasy tamin’ny Arameana indray ny tanàna maromaro
  '22':
  - type: text
    content: 'Ary i Hazaela, mpanjakan’i Arama, dia nampahory ny Israely tamin’ny andro rehetra nanjakan’i Joahaza. '
  '23':
  - type: text
    content: 'Fa NY TOMPO namindra fo tamin’ny Israely sy niantra azy ary nitsinjo azy noho ny fanekeny tamin’i Abrahama sy Isaka ary i Jakoba; tsy ta handringana azy na hanaisotra azy tsy ho eo anatrehany mandraka ankehitriny Izy. '
  '24':
  - type: text
    content: 'Ary maty i Hazaela, mpanjakan’i Arama, ka i Beny-Hadada zanany no nanjaka nandimby azy. '
  '25':
  - type: text
    content: Nalain’i Joasy, zanak’i Joahaza, teo an-tanan’i Beny-Hadada, zanak’i Hazaela, indray ireo tanàna izay efa nalain’i Hazaela teo an-tanan’i Joahaza, rain’i Joasy, tamin’ny ady. Intelo no nandresen’i Joasy azy ka azony indray ireo tanànan’ny Israely.
  '3':
  - type: text
    content: 'Koa nirehitra tamin’ny Israely ny fahatezeran’NY TOMPO ka nandritra ny andro dia natolony teo an-tanan’i Hazaela, mpanjakan’i Arama, sy teo an-tanan’i Beny-Hadada, zanak’i Hazaela, izy. '
  '4':
  - type: text
    content: 'Ary nifona tamin’NY TOMPO i Joahaza ka nohenoin’NY TOMPO, satria hitany ny fahorian’ny Israely, fa nampahory azy ny mpanjakan’i Arama. '
  '5':
  - type: text
    content: 'Ary NY TOMPO nanome mpamonjy ho amin’ny Israely ka afaka tamin’ny tanan’ny Arameana izy ary nonina tao an-dainy toy ny teo aloha ny Zanak’Israely. '
  '6':
  - type: text
    content: 'Kanefa tsy niala tamin’ny fahotan’ny taranak’i Jeroboama, izay nampanotany ny Israely, izy fa nandeha tamin’izany ihany, ary na dia ilay tsangankazon-tsampy ho an’ny '
  - type: text
    content: Aseraha
  - type: text
    content: ' aza dia mbola tao Samaria ihany. '
  '7':
  - type: text
    content: 'Tsy nisy sisa navelan’NY TOMPO ho an’i Joahaza afa-tsy mpitaingin-tsoavaly dimampolo sy kalesy fitondra miady folo ary miaramila an-tongotra iray alina fotsiny; fa ny mpanjakan’i Arama dia efa nandringana azy ka nanao azy ho toy ny vovoka hitsakitsahina. '
  '8':
  - type: text
    content: 'Ny tantaran’i Joahaza sisa mbamin’izay rehetra nataony sy ny heriny, tsy voasoratra ao amin’ny bokin’ny tantaran’ny mpanjakan’ny Israely va izany? '
  '9':
  - type: text
    content: Ary nodimandry any amin’ny razany i Joahaza dia nalevina tao Samaria ka i Joasy zanany no nanjaka nandimby azy.
  - type: heading
    content: I Joasy, mpanjakan’ny Israely
