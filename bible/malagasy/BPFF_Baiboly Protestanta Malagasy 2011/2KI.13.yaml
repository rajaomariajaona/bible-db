document_id: 2KI.13
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: I Joahaza, mpanjakan’ny Israely
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Tamin’ny taona fahatelo amby roapolo nanjakan’i Joasy, zanak’i Ahazia, mpanjakan’ny Joda, no nanombohan’i Joahaza, zanak’i Jeho, nanjaka tamin’ny Israely tany Samaria, ary nanjaka fito amby folo taona izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Nanao izay ratsy teo imason’NY TOMPO izy; nanaraka ny fahotan’i Jeroboama, zanak’i Nebata, izay nampanotany ny Israely izy fa tsy niala tamin’izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Koa nirehitra tamin’ny Israely ny fahatezeran’NY TOMPO ka nandritra ny andro dia natolony teo an-tanan’i Hazaela, mpanjakan’i Arama, sy teo an-tanan’i Beny-Hadada, zanak’i Hazaela, izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary nifona tamin’NY TOMPO i Joahaza ka nohenoin’NY TOMPO, satria hitany ny fahorian’ny Israely, fa nampahory azy ny mpanjakan’i Arama. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary NY TOMPO nanome mpamonjy ho amin’ny Israely ka afaka tamin’ny tanan’ny Arameana izy ary nonina tao an-dainy toy ny teo aloha ny Zanak’Israely. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Kanefa tsy niala tamin’ny fahotan’ny taranak’i Jeroboama, izay nampanotany ny Israely, izy fa nandeha tamin’izany ihany, ary na dia ilay tsangankazon-tsampy ho an’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Aseraha
  - type: text
    text: ' aza dia mbola tao Samaria ihany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Tsy nisy sisa navelan’NY TOMPO ho an’i Joahaza afa-tsy mpitaingin-tsoavaly dimampolo sy kalesy fitondra miady folo ary miaramila an-tongotra iray alina fotsiny; fa ny mpanjakan’i Arama dia efa nandringana azy ka nanao azy ho toy ny vovoka hitsakitsahina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ny tantaran’i Joahaza sisa mbamin’izay rehetra nataony sy ny heriny, tsy voasoratra ao amin’ny bokin’ny tantaran’ny mpanjakan’ny Israely va izany? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ary nodimandry any amin’ny razany i Joahaza dia nalevina tao Samaria ka i Joasy zanany no nanjaka nandimby azy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: I Joasy, mpanjakan’ny Israely
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Tamin’ny taona fahafito amby telopolo nanjakan’i Joasy, mpanjakan’ny Joda, no nanombohan’i Joasy, zanak’i Joahaza, nanjaka tamin’ny Israely tany Samaria; nanjaka enina amby folo taona izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Nanao izay ratsy teo imason’NY TOMPO izy fa tsy niala tamin’ny fahotana rehetra izay nataon’i Jeroboama, zanak’i Nebata, izay nampanotany ny Israely, fa nandeha tamin’izany ihany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ny tantaran’i Joasy sisa mbamin’izay rehetra nataony sy ny heriny niadiany tamin’i Amazia, mpanjakan’ny Joda, tsy voasoratra ao amin’ny bokin’ny tantaran’ny mpanjakan’ny Israely va izany? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ary nodimandry any amin’ny razany i Joasy ka i Jeroboama no nipetraka tamin’ny sezafiandrianany. Ary i Joasy dia nalevina tany Samaria tao amin’ny mpanjakan’ny Israely.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny asa faminaniana farany nataon’i Elisa
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Rehefa voan’ny aretina izay hahafaty azy i Elisa dia nidina nankany aminy i Joasy mpanjakan’ny Israely ka niondrika nitomany teo ambonin’ny tavany sady niteny hoe: Ry Ikaky ô! Ry Ikaky ô! E ny kalesy fitondra miady an’ny Israely sy ny mpitaingin-tsoavaliny! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Hoy i Elisa taminy: Makà tsipìka sy zana-tsipìka! Dia naka tsipìka sy zana-tsipìka izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary hoy izy tamin’ny mpanjakan’ny Israely: Henjano ny tsipìka! Dia nohenjaniny izany. Dia nametraka ny tanany teo amin’ny tanan’ny mpanjaka i Elisa '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'ary hoy izy: Vohay ny varavarankely atsinanana! Dia novohany izany. Hoy i Elisa: Alefaso! Dia nalefany. Ary hoy izy: Zana-tsipìkan’ny famonjen’NY TOMPO, dia zana-tsipìkan’ny famonjena hahavoa ny Arameana! Fa hamely ny Arameana ao Afeka ianao mandra-pandringanao azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Hoy koa izy: Raiso ny zana-tsipìka! Dia noraisiny. Ary hoy izy tamin’ny mpanjakan’ny Israely: Kapohy ny tany! Ary nokapohiny intelo, dia nitsahatra izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary tezitra taminy ny lehilahin’Andriamanitra ka niteny hoe: Tokony ho nikapoka indimy na inenina ianao, dia ho nasianao ny Arameana mandra-pandringanao azy; fa izao dia intelo ihany no hamelezanao ny Arameana.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Dia maty i Elisa ka nalevina. Tamin’izany fotoana izany dia nananika ny tany isan-taona ny mpihantsy adin’ny Moabita. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ary nisy mpandevina nahita ireo mpihantsy ady ireo ka natsipiny tao am-pasan’i Elisa ny faty haleviny; nefa raha vao nitehika tamin’ny taolan’i Elisa ny fatin-dRalehilahy dia velona izy ka nijoro tamin’ny tongony.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nalain’i Joasy tamin’ny Arameana indray ny tanàna maromaro
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary i Hazaela, mpanjakan’i Arama, dia nampahory ny Israely tamin’ny andro rehetra nanjakan’i Joahaza. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Fa NY TOMPO namindra fo tamin’ny Israely sy niantra azy ary nitsinjo azy noho ny fanekeny tamin’i Abrahama sy Isaka ary i Jakoba; tsy ta handringana azy na hanaisotra azy tsy ho eo anatrehany mandraka ankehitriny Izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary maty i Hazaela, mpanjakan’i Arama, ka i Beny-Hadada zanany no nanjaka nandimby azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Nalain’i Joasy, zanak’i Joahaza, teo an-tanan’i Beny-Hadada, zanak’i Hazaela, indray ireo tanàna izay efa nalain’i Hazaela teo an-tanan’i Joahaza, rain’i Joasy, tamin’ny ady. Intelo no nandresen’i Joasy azy ka azony indray ireo tanànan’ny Israely.
