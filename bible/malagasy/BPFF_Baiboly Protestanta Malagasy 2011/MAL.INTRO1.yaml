document_id: MAL.INTRO1
type_code: plt
segments:
- type: usfm
  marker: imt1
  children:
  - type: text
    text: INDRAY MIJERY
- type: usfm
  marker: ip
  children:
  - type: text
    text: Ny bokin’i Malakia dia isan’ny farany ara-potoana ao amin’ny Testamenta Taloha, ary isan’ny Mpaminany roa amby folo madinika. Ny anarana hoe Malakia dia midika hoe Ny irako, na Ny anjeliko. Taorianan’ny fiverenana avy any amin’ny fahababoana no niasany.
- type: usfm
  marker: is1
  children:
  - type: text
    text: Ny votoatin’ny Boky
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Efa tafatsangana indray ny tempoly, kanefa mila hanjaka ao amin’ny Fiangonana ny fahakiviana sy ny faharerahana ara-panahy. Izany dia miseho amin’ny fomba fanatanterahany ny fanompoana an’Andriamanitra, izay tsy misy fanajana akory: Raha manolotra fanatitra izy dia biby efa misy kilema no ateriny; ny mpisorona dia tsy manao tsara ny asany fa nivadika ny fanekena, tsy mitandrina ny lalànan’Andriamanitra ary mizaha tavan’olona; nahazo toerana ny fisaraham-panambadiana ary maro ny maka vady avy amin’ny Jentilisa mpanompo sampy. Izany rehetra izany no ambaran’ny mpaminany fa tsy fahaizana mamaly fitia an’Andriamanitra ary tsy mampisy ny fitahiana.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: Ambarany fa ho avy ny Andron’NY TOMPO izay ho andro famaliana ny mpiavonavona, fa hamirapiratan’ny marina kosa ka hiverina indray ny fanompoana marina an’Andriamanitra. Ambarany koa fa alohan’izany dia ho avy indray i Elia. Ao amin’ny Filazantsaran’i Matio dia ambara fa tanteraka amin’ny fisehoan’i Jaona Mpanao batisa izany (Mat 17.10-13).
- type: usfm
  marker: iot
  children:
  - type: text
    text: Ny firafitry ny Boky
- type: usfm
  marker: io1
  children:
  - type: text
    text: 'Lohateny amin’ny Boky: 1.1'
- type: usfm
  marker: io1
  children:
  - type: text
    text: 'Ny fitiavan’NY TOMPO ny Israely: 1.2-5'
- type: usfm
  marker: io1
  children:
  - type: text
    text: 'Ny fomba tsy mendrika anatanterahan’ny Fiangonana sy ny mpisorona ny fanompoana an’Andriamanitra: 1.6–2.9'
- type: usfm
  marker: io1
  children:
  - type: text
    text: 'Ny amin’ny fisaraham-panambadiana sy ny fakàna vady amin’ny Jentilisa: 2.10-16'
- type: usfm
  marker: io1
  children:
  - type: text
    text: 'Manakaiky ny Andron’NY TOMPO: 2.17–3.6'
- type: usfm
  marker: io1
  children:
  - type: text
    text: 'Mila mibebaka ny olona ka hanompo amin’ny fahatokiana: 3.7-12'
- type: usfm
  marker: io1
  children:
  - type: text
    text: 'Hamaly soa an’ireo izay matahotra Azy Andriamanitra: 3.13-21'
- type: usfm
  marker: io1
  children:
  - type: text
    text: 'Fampitandremana sy teny fikasana: 3.22-24'
