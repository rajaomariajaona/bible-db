document_id: 2KI.19
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mitady teny avy amin’Isaia mpaminany i Hezekia
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Isa 37.1-9
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Raha nandre izany i Hezekia mpanjaka dia nandriatra ny fitafiany sady nitafy lamba fisaonana ka lasa niditra tao amin’ny tranon’NY TOMPO. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary naniraka an’i Eliakima, lehiben’ny tao an-dapa, sy i Sebna mpitantsoratra ary ny lehiben’ny mpisorona, samy nitafy lamba fisaonana izy, hankany amin’Isaia mpaminany, zanak’i Amoza. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Hoy ireo taminy: Izao no lazain’i Hezekia: Andro fahoriana sy famaizana ary fahafaham-baraka ity andro ity; fa efa eo am-piterahana ny zaza kanefa tsy misy hery hiterahana azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Angamba ho ren’NY TOMPO Andriamanitrao ny teny rehetra nataon’i Rabsake, izay nirahin’ny mpanjakan’i Asiria tompony hihantsy an’Andriamanitra velona, ka mba hovaliany izy noho ny teniny izay efa ren’NY TOMPO Andriamanitrao. Koa akaro ny vavaka ataonao hamonjy izay mbola sisa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia nankany amin’Isaia ny mpanompon’i Hezekia mpanjaka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary hoy Isaia taminy: Ambarao amin’ny tomponareo hoe: Izao no lazain’NY TOMPO: Aza matahotra ny teny renao, dia izay nanompan’iretsy mpanompolahin’ny mpanjakan’i Asiria iretsy Ahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Fa indro, Izaho hanisy fanahy ao anatiny, ary hahare siosio izy ka hiverina ho any amin’ny taniny; dia hataoko lavon-tsabatra any amin’ny taniny izy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mbola mandrahona an’i Jerosalema ihany i Sankeriba
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Isa 37.8-13; 2Tan 32.16-19
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dia niverina i Rabsake ka nankany Libna, izay nataon’ny mpanjakan’i Asiria fahirano tamin’io, satria reny fa efa niala tany Lakisy ny mpanjaka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary i Sankeriba dia nandre filazana ny amin’i Tiraka, mpanjakan’i Kosy hoe: Indro, avy hiady aminao izy. Dia nandefa iraka indray ho any amin’i Hezekia izy ka hilaza hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Izao no holazainareo amin’i Hezekia, mpanjakan’ny Joda: Aza mety hofitahin’ny Andriamanitrao izay itokianao ianao, amin’ny teny hoe: Jerosalema dia tsy hatolotra eo an-tanan’ny mpanjakan’i Asiria. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Indro, efa nandre izay nataon’ireo mpanjakan’i Asiria tamin’ny tany rehetra ianao, dia ny nanaovany azy ho zavatra voaozona; dia ianao va no ho voavonjy? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Moa nahavonjy azy va ireo andriamanitry ny firenena noravan’ny razako, dia i Gozana, i Harana, i Rezefa ary ny taranak’i Edena, izay tao Telasara? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Aiza ny mpanjakan’i Hamata sy ny mpanjakan’i Arpada ary ny mpanjakan’ny tanàna Sefarvaima sy Henà ary Iva?
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny vavaka nataon’i Hezekia
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Isa 37.14-20
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dia noraisin’i Hezekia tamin’ny tanan’ny iraka ny taratasy ka novakiny, dia niakatra nankao amin’ny tranon’NY TOMPO izy ka namelatra iny teo anatrehan’NY TOMPO. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Dia nivavaka teo anatrehan’NY TOMPO i Hezekia hoe: Ry TOMPO, Andriamanitry ny Israely ô, izay mipetraka amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: kerobima
  - type: text
    text: ', Ianao dia Ianao irery ihany no Andriamanitry ny fanjakana rehetra ambonin’ny tany, fa Ianao no nanao ny lanitra sy ny tany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Atongilano ny sofinao, TOMPO ô, ka mihainoa! Ahirato ny masonao, TOMPO ô, ka mijere! Henoy ny tenin’i Sankeriba, izay nampitondrainy hihaika an’Andriamanitra velona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'TOMPO ô, marina ihany tokoa fa ireo mpanjakan’i Asiria dia efa nandrava ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jentilisa
  - type: text
    text: ' sy ny taniny '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'ary efa nanary ny andriamaniny tao anaty afo, satria tsy Andriamanitra ireny fa asan’ny tanan’olona ihany, eny, hazo sy vato ka azony nosimbana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Koa ankehitriny, ry TOMPO Andriamanitray ô, mitaraina Aminao aho, vonjeo amin’ny tanany izahay, mba hahafantaran’ny fanjakana rehetra ambonin’ny tany fa Ianao dia Ianao irery ihany, TOMPO ô, no Andriamanitra!
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ampitain’Isaia ny valim-bavaka avy amin’Andriamanitra
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Isa 37.21-29
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary Isaia, zanak’i Amoza, nandefa iraka hankany amin’i Hezekia, hilaza hoe: Izao no lazain’NY TOMPO, Andriamanitry ny Israely: Ilay fitarainana nataonao Tamiko ny amin’i Sankeriba, mpanjakan’i Asiria, dia efa nohenoiko. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Koa izao no teny nolazain’NY TOMPO ny amin’i Sankeriba.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Manao tsinontsinona sy mandatsalatsa anao i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Ziona
  - type: text
    text: ', zanakavavy virijiny;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: mihifikifi-doha i Jerosalema zanakavavy mahita anao mandositra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Fa iza no nohantsianao sy nompanao?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hanohitra an’iza no nanandratanao ny feonao?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nampiandrandra ny masonao any ambony ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: hanohitra ny Iray Masin’ny Israely!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Tamin’ny alalan’ny irakao no nihantsianao ny Tompo hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tamin’ny kalesiko fitondra miady maro no niakarako
- type: usfm
  marker: q1
  children:
  - type: text
    text: tany an-tampon’ny tendrombohitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tao afovoan’i Libanona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia nokapaiko ny sedera avo sy ny kipreso voafantina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia niditra tany amin’ny fialofana farany ao aminy aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy tany amin’ny alany midokadoka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Izaho no nihady ka nisotro ny ranon’ny firenen-kafa
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny faladiako no handriatako ny lakandranon’i Neily rehetra any Ejipta.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Tsy mbola renao va, hoy NY TOMPO, fa efa hatry ny ela no nanomanako izany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary efa hatramin’ny andro taloha no namolavolako izao?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ankehitriny kosa dia efa manatanteraka izany Aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka ny nandrava tanàna mimanda ho tonga korontam-bato no anjaranao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Tsy nahatohitra ny mponina tany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady raiki-tahotra no mangaihay izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: efa tahaka ny ahitra any an-tsaha izy ary tahaka ny ahi-maitso
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'sy ny ahitra eo amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tampon-trano
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, tahaka ny vary vao mitsiry dia maty.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Fa samy fantatro avokoa na mipetraka ianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: na mivoaka hiady, na miverina avy niady;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fantatro koa ny fihetsiketsehanao hanohitra Ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Satria mihetsiketsika manohitra Ahy ianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary efa tafakatra atỳ an-tsofiko ny fireharehanao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hasiako ny faraingoko ny oronao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hopetahiko ny lamboridiko ny molotrao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hampivereniko amin’ny lalana izay niavianao ianao.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny famantarana nomena an’i Hezekia
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Isa 37.30-32
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Izao kosa no famantarana ho anao:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hihinana ny maniry ho azy avy tamin’ny voa nihintsana ianareo amin’ity taona ity,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary amin’ny taona manaraka dia ny kolokolon’izany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa amin’ny taona fahatelo kosa,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mamafaza ianareo ka mijinjà ary manaova tanim-boaloboka ka mihinàna izay vokatra avy amin’izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Ary ny sisa izay afa-nandositra amin’ny taranak’i Joda
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia mbola hamahatra lalindalina kokoa sady hisondrotra ka hamoa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Fa hisy sisa hiseho avy any Jerosalema
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'sy sisa afaka avy any an-tendrombohitra '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Ziona
  - type: text
    text: ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny fahasaro-piaron’Andriamanitra, Tompon’izao rehetra izao, no hanao izany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny niafaran’i Sankeriba
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Isa 37.33-38; 2Tan 32.21-22
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Koa izao no lazain’NY TOMPO ny amin’ny mpanjakan’i Asiria:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy ho tafiditra amin’ity tanàna ity izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: na handefa zana-tsipìka ho ato,
- type: usfm
  marker: q1
  children:
  - type: text
    text: na hitondra ampinga eo anoloany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: na hanandratra tovon-tany hamelezany azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Ny lalana izay niaviany ihany no hiverenany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa tsy ho tafiditra amin’ity tanàna ity izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hoy NY TOMPO.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Fa hiaro ity tanàna ity Aho ka hamonjy azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: noho ny amin’ny tenako sy i Davida mpanompoko.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Tamin’ny alin’io dia avy ilay '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Anjelin’NY TOMPO
  - type: text
    text: ' ka namely olona dimy arivo sy valo alina sy iray hetsy tao amin’ny tobin’ny Asiriana, koa nony maraina vao nifoha olona dia hita fa indreo, fatin’olona avokoa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Dia niainga i Sankeriba, mpanjakan’i Asiria ka lasa nody ary nitoetra tany Ninive. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Ary raha niankohoka tao an-tranon’i Nisroka andriamaniny izy dia nasian’i Adrameleka sy i Sarezera zanany lahy ny sabatra; afa-nandositra nankany amin’ny tany Ararata izy mirahalahy. I Esara-Hadona zanany lahy no nanjaka nandimby azy.
