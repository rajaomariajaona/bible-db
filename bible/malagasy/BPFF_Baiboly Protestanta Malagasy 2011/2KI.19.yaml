document_id: 2KI.19,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Mitady teny avy amin’Isaia mpaminany i Hezekia
  - type: heading
    content: Isa 37.1-9
  - type: text
    content: 'Raha nandre izany i Hezekia mpanjaka dia nandriatra ny fitafiany sady nitafy lamba fisaonana ka lasa niditra tao amin’ny tranon’NY TOMPO. '
  '10':
  - type: text
    content: 'Izao no holazainareo amin’i Hezekia, mpanjakan’ny Joda: Aza mety hofitahin’ny Andriamanitrao izay itokianao ianao, amin’ny teny hoe: Jerosalema dia tsy hatolotra eo an-tanan’ny mpanjakan’i Asiria. '
  '11':
  - type: text
    content: 'Indro, efa nandre izay nataon’ireo mpanjakan’i Asiria tamin’ny tany rehetra ianao, dia ny nanaovany azy ho zavatra voaozona; dia ianao va no ho voavonjy? '
  '12':
  - type: text
    content: 'Moa nahavonjy azy va ireo andriamanitry ny firenena noravan’ny razako, dia i Gozana, i Harana, i Rezefa ary ny taranak’i Edena, izay tao Telasara? '
  '13':
  - type: text
    content: Aiza ny mpanjakan’i Hamata sy ny mpanjakan’i Arpada ary ny mpanjakan’ny tanàna Sefarvaima sy Henà ary Iva?
  - type: heading
    content: Ny vavaka nataon’i Hezekia
  - type: heading
    content: Isa 37.14-20
  '14':
  - type: text
    content: 'Dia noraisin’i Hezekia tamin’ny tanan’ny iraka ny taratasy ka novakiny, dia niakatra nankao amin’ny tranon’NY TOMPO izy ka namelatra iny teo anatrehan’NY TOMPO. '
  '15':
  - type: text
    content: 'Dia nivavaka teo anatrehan’NY TOMPO i Hezekia hoe: Ry TOMPO, Andriamanitry ny Israely ô, izay mipetraka amin’ny '
  - type: text
    content: kerobima
  - type: text
    content: ', Ianao dia Ianao irery ihany no Andriamanitry ny fanjakana rehetra ambonin’ny tany, fa Ianao no nanao ny lanitra sy ny tany. '
  '16':
  - type: text
    content: 'Atongilano ny sofinao, TOMPO ô, ka mihainoa! Ahirato ny masonao, TOMPO ô, ka mijere! Henoy ny tenin’i Sankeriba, izay nampitondrainy hihaika an’Andriamanitra velona. '
  '17':
  - type: text
    content: 'TOMPO ô, marina ihany tokoa fa ireo mpanjakan’i Asiria dia efa nandrava ny '
  - type: text
    content: Jentilisa
  - type: text
    content: ' sy ny taniny '
  '18':
  - type: text
    content: 'ary efa nanary ny andriamaniny tao anaty afo, satria tsy Andriamanitra ireny fa asan’ny tanan’olona ihany, eny, hazo sy vato ka azony nosimbana. '
  '19':
  - type: text
    content: Koa ankehitriny, ry TOMPO Andriamanitray ô, mitaraina Aminao aho, vonjeo amin’ny tanany izahay, mba hahafantaran’ny fanjakana rehetra ambonin’ny tany fa Ianao dia Ianao irery ihany, TOMPO ô, no Andriamanitra!
  - type: heading
    content: Ampitain’Isaia ny valim-bavaka avy amin’Andriamanitra
  - type: heading
    content: Isa 37.21-29
  '2':
  - type: text
    content: 'Ary naniraka an’i Eliakima, lehiben’ny tao an-dapa, sy i Sebna mpitantsoratra ary ny lehiben’ny mpisorona, samy nitafy lamba fisaonana izy, hankany amin’Isaia mpaminany, zanak’i Amoza. '
  '20':
  - type: text
    content: 'Ary Isaia, zanak’i Amoza, nandefa iraka hankany amin’i Hezekia, hilaza hoe: Izao no lazain’NY TOMPO, Andriamanitry ny Israely: Ilay fitarainana nataonao Tamiko ny amin’i Sankeriba, mpanjakan’i Asiria, dia efa nohenoiko. '
  '21':
  - type: text
    content: Koa izao no teny nolazain’NY TOMPO ny amin’i Sankeriba.
  - type: text
    content: 'Manao tsinontsinona sy mandatsalatsa anao i '
  - type: text
    content: Ziona
  - type: text
    content: ', zanakavavy virijiny;'
  - type: text
    content: mihifikifi-doha i Jerosalema zanakavavy mahita anao mandositra.
  '22':
  - type: text
    content: Fa iza no nohantsianao sy nompanao?
  - type: text
    content: Ary hanohitra an’iza no nanandratanao ny feonao?
  - type: text
    content: Nampiandrandra ny masonao any ambony ianao
  - type: text
    content: hanohitra ny Iray Masin’ny Israely!
  '23':
  - type: text
    content: 'Tamin’ny alalan’ny irakao no nihantsianao ny Tompo hoe:'
  - type: text
    content: Tamin’ny kalesiko fitondra miady maro no niakarako
  - type: text
    content: tany an-tampon’ny tendrombohitra,
  - type: text
    content: tao afovoan’i Libanona,
  - type: text
    content: dia nokapaiko ny sedera avo sy ny kipreso voafantina;
  - type: text
    content: dia niditra tany amin’ny fialofana farany ao aminy aho
  - type: text
    content: sy tany amin’ny alany midokadoka.
  '24':
  - type: text
    content: Izaho no nihady ka nisotro ny ranon’ny firenen-kafa
  - type: text
    content: ary ny faladiako no handriatako ny lakandranon’i Neily rehetra any Ejipta.
  '25':
  - type: text
    content: Tsy mbola renao va, hoy NY TOMPO, fa efa hatry ny ela no nanomanako izany,
  - type: text
    content: ary efa hatramin’ny andro taloha no namolavolako izao?
  - type: text
    content: Ankehitriny kosa dia efa manatanteraka izany Aho
  - type: text
    content: ka ny nandrava tanàna mimanda ho tonga korontam-bato no anjaranao.
  '26':
  - type: text
    content: Tsy nahatohitra ny mponina tany;
  - type: text
    content: sady raiki-tahotra no mangaihay izy;
  - type: text
    content: efa tahaka ny ahitra any an-tsaha izy ary tahaka ny ahi-maitso
  - type: text
    content: 'sy ny ahitra eo amin’ny '
  - type: text
    content: tampon-trano
  - type: text
    content: ','
  - type: text
    content: eny, tahaka ny vary vao mitsiry dia maty.
  '27':
  - type: text
    content: Fa samy fantatro avokoa na mipetraka ianao,
  - type: text
    content: na mivoaka hiady, na miverina avy niady;
  - type: text
    content: fantatro koa ny fihetsiketsehanao hanohitra Ahy.
  '28':
  - type: text
    content: Satria mihetsiketsika manohitra Ahy ianao,
  - type: text
    content: ary efa tafakatra atỳ an-tsofiko ny fireharehanao,
  - type: text
    content: dia hasiako ny faraingoko ny oronao
  - type: text
    content: ary hopetahiko ny lamboridiko ny molotrao,
  - type: text
    content: dia hampivereniko amin’ny lalana izay niavianao ianao.
  - type: heading
    content: Ny famantarana nomena an’i Hezekia
  - type: heading
    content: Isa 37.30-32
  '29':
  - type: text
    content: 'Izao kosa no famantarana ho anao:'
  - type: text
    content: Hihinana ny maniry ho azy avy tamin’ny voa nihintsana ianareo amin’ity taona ity,
  - type: text
    content: ary amin’ny taona manaraka dia ny kolokolon’izany,
  - type: text
    content: fa amin’ny taona fahatelo kosa,
  - type: text
    content: mamafaza ianareo ka mijinjà ary manaova tanim-boaloboka ka mihinàna izay vokatra avy amin’izany.
  '3':
  - type: text
    content: 'Hoy ireo taminy: Izao no lazain’i Hezekia: Andro fahoriana sy famaizana ary fahafaham-baraka ity andro ity; fa efa eo am-piterahana ny zaza kanefa tsy misy hery hiterahana azy. '
  '30':
  - type: text
    content: Ary ny sisa izay afa-nandositra amin’ny taranak’i Joda
  - type: text
    content: dia mbola hamahatra lalindalina kokoa sady hisondrotra ka hamoa.
  '31':
  - type: text
    content: Fa hisy sisa hiseho avy any Jerosalema
  - type: text
    content: 'sy sisa afaka avy any an-tendrombohitra '
  - type: text
    content: Ziona
  - type: text
    content: ;
  - type: text
    content: ny fahasaro-piaron’Andriamanitra, Tompon’izao rehetra izao, no hanao izany.
  - type: heading
    content: Ny niafaran’i Sankeriba
  - type: heading
    content: Isa 37.33-38; 2Tan 32.21-22
  '32':
  - type: text
    content: 'Koa izao no lazain’NY TOMPO ny amin’ny mpanjakan’i Asiria:'
  - type: text
    content: Tsy ho tafiditra amin’ity tanàna ity izy,
  - type: text
    content: na handefa zana-tsipìka ho ato,
  - type: text
    content: na hitondra ampinga eo anoloany,
  - type: text
    content: na hanandratra tovon-tany hamelezany azy.
  '33':
  - type: text
    content: Ny lalana izay niaviany ihany no hiverenany,
  - type: text
    content: fa tsy ho tafiditra amin’ity tanàna ity izy,
  - type: text
    content: hoy NY TOMPO.
  '34':
  - type: text
    content: Fa hiaro ity tanàna ity Aho ka hamonjy azy
  - type: text
    content: noho ny amin’ny tenako sy i Davida mpanompoko.
  '35':
  - type: text
    content: 'Tamin’ny alin’io dia avy ilay '
  - type: text
    content: Anjelin’NY TOMPO
  - type: text
    content: ' ka namely olona dimy arivo sy valo alina sy iray hetsy tao amin’ny tobin’ny Asiriana, koa nony maraina vao nifoha olona dia hita fa indreo, fatin’olona avokoa. '
  '36':
  - type: text
    content: 'Dia niainga i Sankeriba, mpanjakan’i Asiria ka lasa nody ary nitoetra tany Ninive. '
  '37':
  - type: text
    content: Ary raha niankohoka tao an-tranon’i Nisroka andriamaniny izy dia nasian’i Adrameleka sy i Sarezera zanany lahy ny sabatra; afa-nandositra nankany amin’ny tany Ararata izy mirahalahy. I Esara-Hadona zanany lahy no nanjaka nandimby azy.
  '4':
  - type: text
    content: Angamba ho ren’NY TOMPO Andriamanitrao ny teny rehetra nataon’i Rabsake, izay nirahin’ny mpanjakan’i Asiria tompony hihantsy an’Andriamanitra velona, ka mba hovaliany izy noho ny teniny izay efa ren’NY TOMPO Andriamanitrao. Koa akaro ny vavaka ataonao hamonjy izay mbola sisa.
  '5':
  - type: text
    content: 'Dia nankany amin’Isaia ny mpanompon’i Hezekia mpanjaka. '
  '6':
  - type: text
    content: 'Ary hoy Isaia taminy: Ambarao amin’ny tomponareo hoe: Izao no lazain’NY TOMPO: Aza matahotra ny teny renao, dia izay nanompan’iretsy mpanompolahin’ny mpanjakan’i Asiria iretsy Ahy. '
  '7':
  - type: text
    content: Fa indro, Izaho hanisy fanahy ao anatiny, ary hahare siosio izy ka hiverina ho any amin’ny taniny; dia hataoko lavon-tsabatra any amin’ny taniny izy.
  - type: heading
    content: Mbola mandrahona an’i Jerosalema ihany i Sankeriba
  - type: heading
    content: Isa 37.8-13; 2Tan 32.16-19
  '8':
  - type: text
    content: 'Dia niverina i Rabsake ka nankany Libna, izay nataon’ny mpanjakan’i Asiria fahirano tamin’io, satria reny fa efa niala tany Lakisy ny mpanjaka. '
  '9':
  - type: text
    content: 'Ary i Sankeriba dia nandre filazana ny amin’i Tiraka, mpanjakan’i Kosy hoe: Indro, avy hiady aminao izy. Dia nandefa iraka indray ho any amin’i Hezekia izy ka hilaza hoe: '
