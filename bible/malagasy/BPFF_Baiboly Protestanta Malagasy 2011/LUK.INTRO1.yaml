type_code: plt
verses:
  '1':
  - type: text
    content: INDRAY MIJERY
  - type: text
    content: Mpanoratra tantara i Lioka ary efa nanao fikarohana lalina sy fanadihadiana vao nametraka an-tsoratra ny tiany horaketina momba an’i Jesosy ao amin’ny Filazantsarany. Ity no boky voalohany nosoratany ary ny Asan’ny Apostoly no faharoa. Namana mpiara-miasa tamin’i Paoly izy ary mpitsabo. Tsy Jiosy izy fa Jentilisa satria Grika, ary mahafehy tsara ny teny grika, araka izany.
  - type: text
    content: Heverin’ny mpandinika fa manodidina, na taorianan’ny fotoana nigadran’i Paoly tany Roma, no nanoratan’i Lioka ny bokiny roa, izany hoe taorianan’ny taona 64.
  - type: text
    content: I Teofilo no voalazan’i Lioka eo amin’ny fiandohan’ny bokiny fa andefasany ny asa soratra nataony, na ato amin’ny Filazantsara mitondra ny anarany izany na ao amin’ny Asan’ny Apostoly. «Tia an’Andriamanitra» no hevitr’io anarana Teofilo io. Tsy ho an’i Teofilo ihany anefa ny Boky fa miantefa koa amin’ny olon-kafa, indrindra ny tsy Jiosy. Izany no mahatonga an’i Lioka hanome fanazavana ny amin’ny jeografian’i Palestina sy ny fomban’ny Jiosy.
  - type: text
    content: Ny votoatin’ny Boky
  - type: text
    content: 'Maromaro ihany ireo lohahevitra izay tsy hita afa-tsy ato amin’ny Filazantsara araka an’i Lioka ka mampiavaka azy, toy ny fijereny manokana ny olona voailikilika teo amin’ny fiarahamonina tamin’izany fotoana izany: Ny vehivavy, ny Samaritana, ny mahantra.'
  - type: text
    content: Anisan’ny fotokevi-dehibe mivohitra ato amin’ny Filazantsara araka an’i Lioka ny amin’ny Fanahy Masina, ny vavaka, ny famelan-keloka ary ny fibebahana.
  - type: text
    content: Manomboka ao Jerosalema ary mifarana ao Jerosalema ny fizotran’ny tantara.
  - type: text
    content: Ny firafitry ny Boky
  - type: text
    content: 'I Jaona Mpanao Batisa sy Jesosy: 1.5–4.13'
  - type: text
    content: 'Ny asan’i Jesosy tany Galilia: 4.14–9.50'
  - type: text
    content: 'Jesosy niakatra farany ho any Jerosalema: 9.51–19.27'
  - type: text
    content: 'Jesosy tao Jerosalema sy ny fahafatesany: 19.28–23.56'
  - type: text
    content: 'Jesosy tafatsangana tamin’ny maty: 24'
