document_id: MRK.8
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Any amin’ny tany tsy jiosy: Ny nampisakafoanan’i Jesosy ny olona efatra arivo'
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat 15.32-39; ampit. Mar 6.30-44
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Tamin’izany andro izany, nony betsaka indray ny vahoaka teo sady tsy nanan-kohanina ireo, dia nantsoin’i Jesosy hanatona Azy ny mpianany ka nilazany hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Mahonena Ahy ireto vahoaka ireto, fa hateloana izay no nitoerany teto Amiko ka tsy manan-kohanina intsony izy. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Koa raha hampodiko ho any an-tranony tsy misakafo izy dia ho reraka eny an-dalana sady avy lavitra ny sasany. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dia namaly Azy ny mpianatra hoe: Aiza no hahazoana mofo hahavoky ireto olona ireto atỳ an-tany efitra atỳ? '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Fa nanontany azy Izy hoe: Misy mofo firy ary any aminareo? Dia hoy ireo: Fito. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia nasainy nipetraka tamin’ny tany ny vahoaka. Ary nandray ny mofo fito Izy, koa rehefa nisaotra Izy dia novakiny ka natolony ny mpianany mba harosony; dia naroson’izy ireo ny vahoaka izany. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary nanana hazandrano madinika vitsy koa izy ireo, koa rehefa nanaovan’i Jesosy fisaorana ireo dia nasainy naroso teny koa. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dia nihinana ny olona ka voky; ary nangonina ny sombintsombiny sisa tsy lany ka nisy fito sobika. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Tokony ho efatra arivo ireo vahoaka ireo. Dia nasainy nody ireo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ary niaraka tamin’izay dia niondrana an-tsambokely Izy mbamin’ny mpianany ka tonga tany amin’ny faritanin’i Dalmanota.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Tsy hisy ny famantarana avy any an-danitra
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat 6.1-14; 12.38-39; Lio 11.16, 29
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary tonga teo ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Fariseo
  - type: text
    text: ' dia nanomboka niady hevitra Taminy ka nitady famantarana avy any an-danitra mba hakany fanahy Azy. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary nisento lalina am-panahy Jesosy ka niteny hoe: Nahoana ity taranaka ity no mitady famantarana? Lazaiko aminareo marina tokoa fa tsy homena famantarana akory ity taranaka ity. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ary nandao azy ireo Izy dia niondrana indray ka lasa nankeny ampita.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny masirasiran’ny Fariseo sy i Heroda
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat 16.5-12
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary nanadino nitondra mofo izy ireo ka tsy nisy afa-tsy mofo iray ihany tao an-tsambokely. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Dia nanafatrafatra azy Izy hoe: Diniho ka mitandrema ianareo mba tsy ho azon’ny masirasiran’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Fariseo
  - type: text
    text: ' sy ny masirasiran’i Heroda. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Dia nifampiresaka izy ireo satria tsy nanana mofo. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary fantatr’i Jesosy izany dia niteny taminy Izy hoe: Nahoana ianareo no mifampiresaka hoe tsy manana mofo? Tsy mbola azonareo an-tsaina na tsy fantatrareo ihany va? Efa mafy fo va ianareo?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Mana-maso nefa tsy mahita va ianareo?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary manan-tsofina nefa tsy mandre va ianareo?
- type: usfm
  marker: m
  children:
  - type: text
    text: 'Ary tsy mahatadidy va ianareo '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'fa tamin’ilay namakiako ny mofo dimy ho an’ny dimy arivo, firy harona moa ny sombintsombiny nangoninareo? Hoy ireo Taminy: Roa amby folo. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Tamin’ilay mofo fito ho an’ny efatra arivo, firy sobika moa ny sombintsombiny nangoninareo? Dia hoy ireo: Fito. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary hoy Izy taminy: Mbola tsy azonareo ihany va?'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nampahiratan’i Jesosy ny jamba iray
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary lasa nankany Betsaida izy ireo; ary nisy nitondra lehilahy jamba iray teo amin’i Jesosy ka niangaviany Izy mba hikasika ilay jamba. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary nitantana ilay jamba Izy ka nitondra azy teny ivelan’ny tanàna; ary rehefa nororany ny masony ka napetrany taminy ny tanany dia nanontaniany hoe: Mahita zavatra va ianao? '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Dia nanokatra ny masony ilay jamba ka niteny hoe: Hitako ny olona, nefa tahaka ny hazo mandehandeha no fijeriko azy. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Dia napetrak’i Jesosy tamin’ny masony indray ny tanany dia nahita tsara Ralehilahy ka sitrana ary hitany mazava tokoa ny zavatra rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ary Jesosy nampody azy ho any an-tranony ka niteny hoe: Aza mankao an-tanàna.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny naneken’i Petera fa Jesosy no Kristy
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat 16.13-20; Lio 9.18-21; ampit. Jao 6.67-71
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ary Jesosy sy ny mpianany dia lasa nankeny amin’ireo tanàna kely miankina amin’i Kaisarian’i Filipo. Nony teny an-dalana dia nanontany ny mpianany Izy hoe: Lazain’ny olona ho iza moa Aho? '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ary hoy ireo taminy: I Jaona Mpanao batisa; ary hoy ny sasany hoe: I Elia; hoy koa ny sasany hoe: Iray amin’ireo mpaminany. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ary Jesosy nanontany azy hoe: Fa ianareo kosa dia milaza Ahy ho iza? Dia namaly i Petera ka niteny taminy hoe: Ianao no '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Ary nandrara azy rehetra Izy mba tsy hiteny ny momba Azy na amin’iza na amin’iza.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ambaran’i Jesosy ny hahafatesany sy ny hitsanganany amin’ny maty
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat 16.21-23; Lio 9.22
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ary nanomboka nampianatra azy ireo Izy fa tsy maintsy hijaly mafy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Zanak’Olona
  - type: text
    text: ' ary holavin’ireo loholona sy ireo lehiben’ny mpisorona ary ireo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpanoradalàna
  - type: text
    text: ' ka hovonoiny, kanefa rehefa afaka hateloana dia hitsangana indray Izy. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Ary nambarany mazava tsara izany teny izany. Ary nitondra Azy nihataka kely i Petera dia nanomboka niteny mafy Azy. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Fa Izy nitodika dia nijery ny mpianany ka niteny mafy an’i Petera hoe: Mandehana any aorianako, ry Satana! Satria tsy misaina izay an’Andriamanitra ianao fa izay an’ny olona.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fomba fanarahana an’i Jesosy
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat 16.24-28; Lio 9.23-27
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ary nantsoiny hanatona Azy ny vahoaka mbamin’ny mpianany, dia hoy Izy taminy: Raha misy ta hanaraka Ahy dia aoka izy handa ny tenany sy hitondra ny hazofijaliany ka hanaraka Ahy. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Fa na iza na iza no ta hamonjy ny ainy dia hahavery izany; ary na iza na iza no hahavery ny ainy noho ny Amiko sy ny Filazantsara dia hahavonjy azy. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Fa inona moa no soa azon’ny olona raha mahazo izao tontolo izao izy kanefa very ny ainy? '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Ary inona no homen’ny olona ho takalon’ny ainy? '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Fa na iza na iza no ho menatra Ahy sy ny teniko amin’ity taranaka sady mijangajanga no manota ity dia ho menatra azy koa ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Zanak’Olona
  - type: text
    text: ', rehefa avy amin’ny voninahitry ny Rainy mbamin’ny anjely masina Izy.'
