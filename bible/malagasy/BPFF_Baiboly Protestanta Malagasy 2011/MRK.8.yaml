document_id: MRK.8,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: 'Any amin’ny tany tsy jiosy: Ny nampisakafoanan’i Jesosy ny olona efatra arivo'
  - type: heading
    content: Mat 15.32-39; ampit. Mar 6.30-44
  - type: text
    content: 'Tamin’izany andro izany, nony betsaka indray ny vahoaka teo sady tsy nanan-kohanina ireo, dia nantsoin’i Jesosy hanatona Azy ny mpianany ka nilazany hoe: '
  '10':
  - type: text
    content: Ary niaraka tamin’izay dia niondrana an-tsambokely Izy mbamin’ny mpianany ka tonga tany amin’ny faritanin’i Dalmanota.
  - type: heading
    content: Tsy hisy ny famantarana avy any an-danitra
  - type: heading
    content: Mat 6.1-14; 12.38-39; Lio 11.16, 29
  '11':
  - type: text
    content: 'Ary tonga teo ny '
  - type: text
    content: Fariseo
  - type: text
    content: ' dia nanomboka niady hevitra Taminy ka nitady famantarana avy any an-danitra mba hakany fanahy Azy. '
  '12':
  - type: text
    content: 'Ary nisento lalina am-panahy Jesosy ka niteny hoe: Nahoana ity taranaka ity no mitady famantarana? Lazaiko aminareo marina tokoa fa tsy homena famantarana akory ity taranaka ity. '
  '13':
  - type: text
    content: Ary nandao azy ireo Izy dia niondrana indray ka lasa nankeny ampita.
  - type: heading
    content: Ny masirasiran’ny Fariseo sy i Heroda
  - type: heading
    content: Mat 16.5-12
  '14':
  - type: text
    content: 'Ary nanadino nitondra mofo izy ireo ka tsy nisy afa-tsy mofo iray ihany tao an-tsambokely. '
  '15':
  - type: text
    content: 'Dia nanafatrafatra azy Izy hoe: Diniho ka mitandrema ianareo mba tsy ho azon’ny masirasiran’ny '
  - type: text
    content: Fariseo
  - type: text
    content: ' sy ny masirasiran’i Heroda. '
  '16':
  - type: text
    content: 'Dia nifampiresaka izy ireo satria tsy nanana mofo. '
  '17':
  - type: text
    content: 'Ary fantatr’i Jesosy izany dia niteny taminy Izy hoe: Nahoana ianareo no mifampiresaka hoe tsy manana mofo? Tsy mbola azonareo an-tsaina na tsy fantatrareo ihany va? Efa mafy fo va ianareo?'
  '18':
  - type: text
    content: Mana-maso nefa tsy mahita va ianareo?
  - type: text
    content: Ary manan-tsofina nefa tsy mandre va ianareo?
  - type: text
    content: 'Ary tsy mahatadidy va ianareo '
  '19':
  - type: text
    content: 'fa tamin’ilay namakiako ny mofo dimy ho an’ny dimy arivo, firy harona moa ny sombintsombiny nangoninareo? Hoy ireo Taminy: Roa amby folo. '
  '2':
  - type: text
    content: 'Mahonena Ahy ireto vahoaka ireto, fa hateloana izay no nitoerany teto Amiko ka tsy manan-kohanina intsony izy. '
  '20':
  - type: text
    content: 'Tamin’ilay mofo fito ho an’ny efatra arivo, firy sobika moa ny sombintsombiny nangoninareo? Dia hoy ireo: Fito. '
  '21':
  - type: text
    content: 'Ary hoy Izy taminy: Mbola tsy azonareo ihany va?'
  - type: heading
    content: Ny nampahiratan’i Jesosy ny jamba iray
  '22':
  - type: text
    content: 'Ary lasa nankany Betsaida izy ireo; ary nisy nitondra lehilahy jamba iray teo amin’i Jesosy ka niangaviany Izy mba hikasika ilay jamba. '
  '23':
  - type: text
    content: 'Ary nitantana ilay jamba Izy ka nitondra azy teny ivelan’ny tanàna; ary rehefa nororany ny masony ka napetrany taminy ny tanany dia nanontaniany hoe: Mahita zavatra va ianao? '
  '24':
  - type: text
    content: 'Dia nanokatra ny masony ilay jamba ka niteny hoe: Hitako ny olona, nefa tahaka ny hazo mandehandeha no fijeriko azy. '
  '25':
  - type: text
    content: 'Dia napetrak’i Jesosy tamin’ny masony indray ny tanany dia nahita tsara Ralehilahy ka sitrana ary hitany mazava tokoa ny zavatra rehetra. '
  '26':
  - type: text
    content: 'Ary Jesosy nampody azy ho any an-tranony ka niteny hoe: Aza mankao an-tanàna.'
  - type: heading
    content: Ny naneken’i Petera fa Jesosy no Kristy
  - type: heading
    content: Mat 16.13-20; Lio 9.18-21; ampit. Jao 6.67-71
  '27':
  - type: text
    content: 'Ary Jesosy sy ny mpianany dia lasa nankeny amin’ireo tanàna kely miankina amin’i Kaisarian’i Filipo. Nony teny an-dalana dia nanontany ny mpianany Izy hoe: Lazain’ny olona ho iza moa Aho? '
  '28':
  - type: text
    content: 'Ary hoy ireo taminy: I Jaona Mpanao batisa; ary hoy ny sasany hoe: I Elia; hoy koa ny sasany hoe: Iray amin’ireo mpaminany. '
  '29':
  - type: text
    content: 'Ary Jesosy nanontany azy hoe: Fa ianareo kosa dia milaza Ahy ho iza? Dia namaly i Petera ka niteny taminy hoe: Ianao no '
  - type: text
    content: Kristy
  - type: text
    content: '. '
  '3':
  - type: text
    content: 'Koa raha hampodiko ho any an-tranony tsy misakafo izy dia ho reraka eny an-dalana sady avy lavitra ny sasany. '
  '30':
  - type: text
    content: Ary nandrara azy rehetra Izy mba tsy hiteny ny momba Azy na amin’iza na amin’iza.
  - type: heading
    content: Ambaran’i Jesosy ny hahafatesany sy ny hitsanganany amin’ny maty
  - type: heading
    content: Mat 16.21-23; Lio 9.22
  '31':
  - type: text
    content: 'Ary nanomboka nampianatra azy ireo Izy fa tsy maintsy hijaly mafy ny '
  - type: text
    content: Zanak’Olona
  - type: text
    content: ' ary holavin’ireo loholona sy ireo lehiben’ny mpisorona ary ireo '
  - type: text
    content: mpanoradalàna
  - type: text
    content: ' ka hovonoiny, kanefa rehefa afaka hateloana dia hitsangana indray Izy. '
  '32':
  - type: text
    content: 'Ary nambarany mazava tsara izany teny izany. Ary nitondra Azy nihataka kely i Petera dia nanomboka niteny mafy Azy. '
  '33':
  - type: text
    content: 'Fa Izy nitodika dia nijery ny mpianany ka niteny mafy an’i Petera hoe: Mandehana any aorianako, ry Satana! Satria tsy misaina izay an’Andriamanitra ianao fa izay an’ny olona.'
  - type: heading
    content: Ny fomba fanarahana an’i Jesosy
  - type: heading
    content: Mat 16.24-28; Lio 9.23-27
  '34':
  - type: text
    content: 'Ary nantsoiny hanatona Azy ny vahoaka mbamin’ny mpianany, dia hoy Izy taminy: Raha misy ta hanaraka Ahy dia aoka izy handa ny tenany sy hitondra ny hazofijaliany ka hanaraka Ahy. '
  '35':
  - type: text
    content: 'Fa na iza na iza no ta hamonjy ny ainy dia hahavery izany; ary na iza na iza no hahavery ny ainy noho ny Amiko sy ny Filazantsara dia hahavonjy azy. '
  '36':
  - type: text
    content: 'Fa inona moa no soa azon’ny olona raha mahazo izao tontolo izao izy kanefa very ny ainy? '
  '37':
  - type: text
    content: 'Ary inona no homen’ny olona ho takalon’ny ainy? '
  '38':
  - type: text
    content: 'Fa na iza na iza no ho menatra Ahy sy ny teniko amin’ity taranaka sady mijangajanga no manota ity dia ho menatra azy koa ny '
  - type: text
    content: Zanak’Olona
  - type: text
    content: ', rehefa avy amin’ny voninahitry ny Rainy mbamin’ny anjely masina Izy.'
  '4':
  - type: text
    content: 'Dia namaly Azy ny mpianatra hoe: Aiza no hahazoana mofo hahavoky ireto olona ireto atỳ an-tany efitra atỳ? '
  '5':
  - type: text
    content: 'Fa nanontany azy Izy hoe: Misy mofo firy ary any aminareo? Dia hoy ireo: Fito. '
  '6':
  - type: text
    content: 'Dia nasainy nipetraka tamin’ny tany ny vahoaka. Ary nandray ny mofo fito Izy, koa rehefa nisaotra Izy dia novakiny ka natolony ny mpianany mba harosony; dia naroson’izy ireo ny vahoaka izany. '
  '7':
  - type: text
    content: 'Ary nanana hazandrano madinika vitsy koa izy ireo, koa rehefa nanaovan’i Jesosy fisaorana ireo dia nasainy naroso teny koa. '
  '8':
  - type: text
    content: 'Dia nihinana ny olona ka voky; ary nangonina ny sombintsombiny sisa tsy lany ka nisy fito sobika. '
  '9':
  - type: text
    content: Tokony ho efatra arivo ireo vahoaka ireo. Dia nasainy nody ireo.
