document_id: DEU.1,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: LAHATENY VOALOHANY NATAON’I MOSESY
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao no teny izay nolazain’i Mosesy tamin’ny Israely rehetra tany andafin’i Jordana, tany an-tany efitra, tany amin’ny tany ngazana tandrifin’i Sofa, teo anelanelan’i Parana, Tofela, Labana, Hazerota ary Di-Zahaba. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'NY TOMPO Andriamanitrareo, efa nahamaro anareo ary indro, efa betsaka toy ny kintana eny amin’ny lanitra izao ianareo. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'NY TOMPO, Andriamanitry ny razanareo, anie hampitombo anareo ho arivo toraka izao ary hitahy anareo, araka izay nolazainy taminareo! '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hataoko ahoana no fitondra irery ny fahasahirananareo sy ny entanareo ary ny adinareo? '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mifidiana izay lehilahy hendry sy mahira-tsaina ary hita toetra amin’ny fokonareo, fa hataoko ho lehibenareo izy. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia namaly ahy ianareo hoe: Tsara ny teny izay nolazainao ka tokony hankatoavina. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nalaiko ny lohan’ny fokonareo, izay olona hendry sady hita toetra, ka nataoko mpifehy anareo, dia mpifehy arivo, mpifehy zato, mpifehy dimampolo, mpifehy folo ary mpitondra vahoaka amin’ny fokonareo. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nandidy ny mpitsara anareo tamin’izany andro izany aho hoe: Henoy ny adin’ny rahalahinareo, dia tsarao marina ny olona, na ny tompon-tany na ny vahiny eo aminy. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aza mizaha tavan’olona amin’ny fitsarana fa henoy toy ny lehibe ny kely; aza matahotra olona akory, fa an’Andriamanitra ny fitsarana; ary raha misy raharaha sarotra loatra aminareo dia ento etỳ amiko mba hohenoiko. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nandidy anareo tamin’izany andro izany aho ny amin’ny zavatra rehetra izay hataonareo.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fikomiana nataon’ny Israely talohan’ny hidirany tao amin’ny tany nampanantenaina
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nony niala tany Horeba isika dia nandeha namakivaky ilay tany efitra lehibe sady mahatahotra izay hitanareo teny amin’ny lalana mankany amin’ny tany be havoana an’ny Amorita, araka izay nandidian’NY TOMPO Andriamanitsika isika; dia tonga tao Kadesy-Barnea isika. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lalana iraika amby folo andro miala avy ao Horeba i Kadesy-Barnea, raha ny lalana mahazo ny tendrombohitra Seìra no aleha. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy aho taminareo: Efa tonga eto amin’ny tany be havoana an’ny Amorita ianareo, tany izay omen’NY TOMPO Andriamanitsika ho antsika; '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'indro, efa natolotry NY TOMPO Andriamanitrao eo anoloanao ny tany; iakaro izy ka raiso ho lovanao, araka izay nolazain’NY TOMPO, Andriamanitry ny razanao, taminao; koa aza matahotra na mivadi-po ianao. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nanatona ahy ianareo rehetra ka niteny hoe: Aoka isika haniraka olona hialoha lalana antsika mba hisafo ny tany ka hitondra teny amintsika momba ny lalana izay halehantsika sy ny tanàna izay hiakarantsika. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Satria sitrako izany teny izany dia nifidy roa amby folo lahy teo aminareo aho, iray avy isam-poko. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia niainga ireo ka niakatra tany an-tendrombohitra, dia tonga tao amin’ny lohasaha Eskola ary nisafo ny tany. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nakany ny vokatry ny tany ka nitondrany ho antsika, dia nilaza tamintsika izy ireo hoe: Tsara ny tany izay omen’NY TOMPO Andriamanitsika ho antsika. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Kanefa tsy nety niakatra ianareo fa nandà ny tenin’NY TOMPO Andriamanitrareo. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nimonomonona tao an-dainareo ianareo hoe: Halan’NY TOMPO isika, ary izany no nitondrany antsika niala avy tany Ejipta mba hanolorany antsika eo an-tanan’ny Amorita ka handringanany antsika. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ho aiza no hiakarantsika? Efa nanaketraka ny fontsika ny rahalahintsika tamin’ny nilazany hoe: Lehibe sy lava noho isika ny olona; ny tanàna dia lehibe sady misy manda manakatra ny lanitra; ary efa hitanay tany aza ny Anakita. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy aho taminareo: Aza mangorohoro ary aza matahotra azy ireo; '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin’ny andro voalohany tamin’ny volana fahiraika amby folo tamin’ny taona fahefapolo dia niteny tamin’ny Zanak’Israely i Mosesy, araka izay rehetra nandidian’NY TOMPO azy holazainy aminy, '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'NY TOMPO Andriamanitrareo izay mandeha eo anoloanareo, Izy no hiady ho anareo, tahaka izay rehetra nataony ho anareo tany Ejipta teo imasonareo, '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary tany an-tany efitra, izay nahitanao ny fitondran’NY TOMPO Andriamanitrao anao tahaka ny fitondran’ny olona ny zanany, dia teny amin’ny lalana rehetra izay nalehanareo mandra-pahatonganareo teto amin’ity toerana ity. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Kanefa, na dia nolazaiko aza izany teny izany, mbola tsy ninoanareo ihany NY TOMPO Andriamanitrareo '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: izay nandeha tamin’ny lalana teo alohanareo hitady toerana hitobianareo, koa ny afo tamin’ny alina ary ny rahona rehefa antoandro no nisehoany hanoro izay lalana nety halehanareo.
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa nandre ny teninareo NY TOMPO dia tezitra ka nianiana hoe: '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsy hisy olona amin’izao taranaka ratsy fanahy izao mihitsy hahita ny tany soa izay nianianako homena ny razanareo, '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'afa-tsy i Kaleba, zanak’i Jefone; izy no hahita io tany io; ary izy sy ny zanany no homeko ny tany izay nodiaviny satria efa tanteraka tamin’ny fanarahana NY TOMPO izy. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary izaho koa dia notezeran’NY TOMPO noho ny aminareo ka nataony hoe: Ianao koa tsy hiditra any; '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fa i Josoa, zanak’i Nona, izay mitsangana eo anatrehanao, izy no hiditra any, koa izy no ampaherezo fa izy no hampandova ny Zanak’Israely ny tany. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny zanakareo madinika izay nolazainareo fa ho babo, ny zanakareo izay tsy mahalala ny tsara sy ny ratsy amin’izao andro izao, izy ireo no hiditra any, izy ireo no homeko ny tany ary izy ireo no handova azy. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'rehefa namono an’i Sihona, mpanjakan’ny Amorita, ilay nonina tao Hesbona, sy i Oga, mpanjakan’i Basana, ilay nonina tao Astarota tany Edrehy izy. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa ianareo kosa dia miverena ka mandehana any an-tany efitra, any amin’ny lalana mankany amin’ny Ranomasina Mena.
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia namaly ahy ianareo hoe: Efa nanota tamin’NY TOMPO izahay; hiakatra ihany izahay dia hiady, araka izay rehetra nandidian’NY TOMPO Andriamanitsika antsika. Dia samy nivonona tamin’ny fiadiany avy ianareo rehetra ka nataonareo ho tsinontsinona ny hiakatra any an-tendrombohitra. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy NY TOMPO tamiko: Lazao amin’izy ireo hoe: Aza miakatra ianareo, ary aza miady, fa tsy eo aminareo Aho; fandrao ho resy eo anoloan’ny fahavalonareo ianareo. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia niteny taminareo aho nefa tsy nihaino ianareo; ary nandà ny tenin’NY TOMPO ianareo ka sahisahy fahatany niakatra tany an-tendrombohitra ihany. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia tonga hiady aminareo ny Amorita, izay nonina tamin’io tendrombohitra io, ka nanenjika anareo tahaka ny fanenjiky ny renitantely, dia nandringana anareo tany Seìra ka hatrany Horma. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia niverina ianareo ka nitomany teo anatrehan’NY TOMPO; nefa tsy nihaino ny feonareo NY TOMPO na nanongilana ny sofiny taminareo. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nitoetra ela tao Kadesy ianareo, araka ny andro izay nitoeranareo tao.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tany andafin’i Jordana, tany amin’ny tany Moaba, no nanombohan’i Mosesy nanazava izao lalàna izao ka hoy izy:'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Nomen’Andriamanitra baiko handeha ny Israely
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'NY TOMPO Andriamanitsika niteny tamintsika tany Horeba hoe: Ela izay ny nitoeranareo teto amin’ity tendrombohitra ity; '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'miaingà ianareo dia mandehana ka mankanesa any amin’ny tendrombohitry ny Amorita sy any amin’izay rehetra ao akaikiny, dia any amin’ny tany ngazana, any amin’ny tendrombohitra, any Sefela, any Negeva sy ny moron’ny ranomasina, dia any amin’ny tanin’ny Kananita sy any Libanona ka hatrany amin’ny ony lehibe, dia ny ony Eofrata. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Indro, efa natolotro eo anoloanareo ny tany; idiro ka raiso ho lovanao ny tany izay efa nianianan’NY TOMPO tamin’ny razanareo, dia i Abrahama sy Isaka ary i Jakoba, homena azy sy ny taranany mandimby azy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Nanendry mpitsara i Mosesy
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin’izany andro izany aho dia niteny taminareo hoe: Tsy zakako irery ny hitondra anareo. '
