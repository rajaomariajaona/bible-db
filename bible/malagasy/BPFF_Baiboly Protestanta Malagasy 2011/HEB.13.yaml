document_id: HEB.13
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Aoka haharitra ny fitiavana ny rahalahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Aza manadino ny fampiantranoana vahiny; fa tamin’izany dia nampiantrano anjely ny sasany, nefa tsy fantany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Tsarovy izay mifatotra ka ho toy ny miara-mifatotra aminy ianareo, ary izay ampijalina satria manana vatana mety mijaly koa ianareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Aoka hanan-kaja amin’ny olona rehetra ny fanambadiana, ary aoka tsy ho voaloto ny fandriana; fa ny mpijangajanga sy ny mpaka vadin’olona dia hohelohin’Andriamanitra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Aoka tsy ho amin’ny fitiavam-bola ny toe-tsainareo, fa mianìna amin’izay anananareo; fa hoy Izy: «Izaho tsy handao anao mihitsy na hahafoy anao akory» (Jos 1.5). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Koa sahy miteny isika hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «NY TOMPO no Mpamonjy ahy ka tsy hatahotra aho.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Inona no azon’ny olona atao amiko?» (Sal 118.6)
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Tsarovy ny mpitondra anareo izay efa nitory ny tenin’Andriamanitra taminareo; hevero ny niafaran’ny fiainany ka araho ny finoany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Jesosy Kristy no tsy miova omaly sy anio ary mandrakizay.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Aza mety avilin’ny fampianarana maro hafahafa ianareo. Fa tsara raha ampiorenina amin’ny fahasoavana ny fo fa tsy amin’ny hanina izay tsy mahasoa akory ny mahavatra azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Isika manana alitara izay tsy ananan’ny mpanompo ny tabernakely fahefana hihinanana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Fa rehefa noentin’ny Mpisoronabe niditra ho ao amin’ny fitoerana masina ho fanatitra noho ny ota ny ran’ny biby dia nodorana teny ivelan’ny toby ny fatiny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Noho izany, Jesosy koa dia niaritra teny ivelan’ny vavahady mba hahamasina ny olona amin’ny rany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Koa aoka isika hivoaka hankeo Aminy eo ivelan’ny toby ka hitondra ny latsa izay noentiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Fa tsy manana tanàna maharitra isika etỳ fa mitady ny ho avy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Koa aoka isika hanolotra mandrakariva ny fanati-piderana ho an’Andriamanitra amin’ny alalany, dia ny vokatry ny molotra izay manaiky ny anarany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Fa aza manadino hanao soa sy hiantra fa fanatitra toy izany no sitrak’Andriamanitra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Maneke ny mpitondra anareo ka manajà azy; fa miambina ny fanahinareo izy, araka izay tokony hataon’ny olona mbola hampamoahina, mba hanaovany izany amin’ny fifaliana fa tsy amin’ny fisentoana; fa tsy hahasoa anareo izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Mivavaha ho anay; satria matoky izahay fa manana fieritreretana tsara ka te hitondra tena tsara amin’ny zavatra rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Nefa mainka mangataka anareo hanao izany aho mba hampidina ahy haingankaingana kokoa ho atỳ aminareo.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Teny farany
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary Andriamanitry ny fiadanana, izay nitondra an’i Jesosy Tompontsika, Mpiandry ondry lehibe, hiala amin’ny maty, mitondra ny ran’ny fanekena mandrakizay, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Izy anie hahatanteraka anareo amin’ny tsara rehetra hanao ny sitrapony ka hiasa ao anatinareo izay ankasitrahana eo imasony amin’ny alalan’i Jesosy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ; ho Azy anie ny voninahitra mandrakizay mandrakizay! Amena!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary mangataka aminareo aho, ry rahalahy, aoka ianareo hahazaka izao teny fananarana izao; fa efa nanoratra epistily fohifohy ho anareo ihany aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Aoka ho fantatrareo fa efa afaka i Timoty rahalahintsika; koa raha tonga haingana izy dia hiaraka aminy hamangy anareo aho.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Mampamangy any amin’izay rehetra mpitondra anareo sy ny olona masina rehetra. Izay any Italia dia manao veloma anareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Ho aminareo rehetra anie ny fahasoavana! Amena!
