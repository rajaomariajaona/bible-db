document_id: PRO.14,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fahendren’ny vehivavy dia manangana ny tranony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny fahadalana kosa mandrava ny tranony amin’ny tanany.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fo ihany no mahalala ny fangidian’ny alahelony
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy heverin’ny olon-kafa ny hafaliany.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ravana ny tranon’ny ratsy fanahy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ambinina ny tranolain’ny marina.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Misy lalana ataon’ny olona ho mahitsy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: kanjo ny iafarany dia lalana mivarina any amin’ny fahafatesana.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na dia mihomehy aza dia ory ihany ny fo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny iafaran’ny hafaliana dia alahelo.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay mpandeha ka nihemotra dia afa-po amin’izay alehany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny tsara fanahy kosa ho afa-po amin’izay azy ihany.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mino ny teny rehetra ny kely saina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny mahira-tsaina dia mandinika ny diany.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Matahotra ny hendry ka mivily tsy ho amin’ny ratsy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny adala dia fatra-pirehareha ka matokitoky foana.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay malaky tezitra dia manao hadalana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny olona mamoron-tsain-dratsy dia ankahalaina.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny kely saina dia handova fahadalana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny mahira-tsaina dia mahazo ny fahalalana ho satroboninahiny.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny ratsy fanahy dia miondrika eo anatrehan’ny tsara fanahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny meloka miondrika eo am-bavahadin’ny marina.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mandeha amin’ny fahitsiana izay matahotra NY TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa izay mivily lalana kosa dia maniratsira Azy.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na dia ny havan’ny mahantra aza dia mankahala azy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa maro ny tia ny manankarena.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay manao tsinontsinona ny namany dia manota,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa sambatra izay mamindra fo amin’ny ory!
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy mivily lalana va izay misaina hanao ratsy?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa famindrampo sy fahamarinana no ho an’izay misaina hanao ny tsara.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Misy valiny avokoa ny fisasarana rehetra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny molotra mibedibedy foana dia tsy miteraka afa-tsy ny tsy fahampian-kanina.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Satroboninahitry ny hendry ny hareny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny hadalan’ny adala dia hadalana ihany.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny vavolombelona marina mamonjy ain’olona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa izay milaza lainga dia tena mpamitaka.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fahatahorana NY TOMPO dia fiarovana mahatoky
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hahazo fialofana ny zanany.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fahatahorana NY TOMPO no loharanon’aina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hanalavirana ny fandriky ny fahafatesana.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny habetsahan’ny vahoaka no voninahitry ny mpanjaka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny fihenan’ny isan’ny mponina kosa no fahalevonan’ny mpitondra.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fahendrena no ao amin’izay mahatsindry fo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny malaky tezitra dia mampiharihary ny hadalany.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eo am-bavan’ny adala dia misy tsirin’ny fiavonavonana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny molotry ny hendry kosa miaro azy.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fahaveloman’ny vatana dia ny fo nofo tony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny fitezeram-poana dia maha lo ny taolana.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay mampahory ny madinika dia manala baraka ny Mpanao azy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny mamindra fo amin’ny mahantra kosa manome voninahitra Azy.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Roahina ny ratsy fanahy noho ny haratsiany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny marina kosa dia matoky na dia eo anoloan’ny fahafatesany aza.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mandry tsara ao am-pon’ny manan-tsaina ny fahendrena,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny ao am-pon’ny adala kosa dia miharihary.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manandratra ny firenena ny fahamarinana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny ota kosa dia henatra ho an’ny olona.
  '35':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fankasitrahan’ny mpanjaka dia amin’ny mpanompo hendry,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny fahatezerany kosa dia amin’izay manao ny mahamenatra.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha tsy misy omby dia foana ny fihinanam-bilona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa be ny fitomboan-karena azo avy amin’ny herin’ny omby.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy mba mandainga ny vavolombelona mahatoky,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa mamoaka lainga kosa ny vavolombelona tsy mahatoky.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mba mitady fahendrena ny mpaniratsira fa tsy mahita,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mora mahazo fahalalana kosa ny manan-tsaina.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manalavira ny olona adala,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa tsy ho hitanao aminy ny molotry ny fahalalana.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny mitandrina ny alehany no fahendren’ny mahira-tsaina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa fitaka ny hadalan’ny adala.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ihomehezan’ny adala ny heloka nataony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ao amin’ny olo-marina no misy ny fahatsaram-panahy.
