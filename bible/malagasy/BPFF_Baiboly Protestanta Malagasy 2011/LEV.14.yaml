document_id: LEV.14
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fanadiovana ny boka
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary NY TOMPO niteny tamin’i Mosesy hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Izao no lalàna ny amin’ny boka amin’ny andro fanadiovana azy: Hoentina any amin’ny mpisorona izy; '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'dia ho eny ivelan’ny toby ny mpisorona ka hizaha azy; ary raha hitany fa sitrana amin’ny habokany ny boka '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'dia vorona roa velona sady madio miaraka amin’ny hazo sedera sy lamba jaky ary rantsana '
  - type: usfm
    marker: w
    children:
    - type: text
      text: hisopa
  - type: text
    text: ' no hasain’ny mpisorona halaina ho an’ilay hodiovina, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'koa ny vorona iray dia hasainy hovonoina eo ambonin’ny vilany tany izay misy rano, eo ambonin’ny rano mandeha. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Halainy ny vorona velona, ny hazo sedera, ny lamba jaky ary ny rantsana hisopa miaraka amin’ilay vorona velona, dia hatsobony ao amin’ny ran’ny vorona izay novonoina teo ambonin’ny rano mandeha. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Dia hofafazany impito ilay hodiovina ho afaka amin’ny habokany ka hambarany fa madio izy ary halefany any an-tsaha ilay vorona velona.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary ilay hodiovina dia hanasa ny fitafiany sy hanaratra ny volony rehetra ary handro amin’ny rano ka hadio; ary rehefa afaka izany dia hankeo an-toby izy, kanefa hitoetra eo ivelan’ny tranolainy hafitoana. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Amin’ny andro fahafito dia hanaratra ny volony rehetra izy, na ny volon-dohany izany na ny volombavany na ny volomasony; eny ny volony rehetra dia hoharatany avokoa ary hanasa ny fitafiany izy sady handro amin’ny rano dia hadio. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary amin’ny andro fahavalo dia haka zanak’ondrilahy roa tsy misy kilema izy sy zanak’ondrivavy iray izay iray taona, tsy misy kilema, miampy koba tsara toto telo ampahafolon’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: efaha
  - type: text
    text: ' voaharo diloilo, ho fanatitra avy amin’ny zavamaniry ary diloilo iray '
  - type: usfm
    marker: w
    children:
    - type: text
      text: loga
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary ny mpisorona izay manadio ilay lehilahy hodiovina dia hametraka azy sy ireo zavatra ireo eo anatrehan’NY TOMPO, eo anoloan’ny varavaran’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tranolay fihaonana
  - type: text
    text: '; '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'dia haka ny zanak’ondrilahy iray ny mpisorona ka hanolotra azy ho fanati-panonerana miaraka amin’ny diloilo iray loga dia hataony fanatitra asandratra eo anatrehan’NY TOMPO izany. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary hamono ilay zanak’ondrilahy eo amin’ny famonoana ny fanatitra fanadiovana sy ny fanatitra dorana manontolo izy, dia eo amin’ny fitoerana masina; fa ho an’ny mpisorona ny fanatitra fanadiovana, toy ny fanati-panonerana. Zavatra tena masina izany. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dia hakan’ny mpisorona ny ran’ny fanati-panonerana ka hohosorany ny ravin-tsofina havanan’ilay hodiovina sy ny ankiben-tanany havanana ary ny ankiben-tongony havanana; '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'ary hakan’ny mpisorona ny diloilo iray loga ka haidiny eo amin’ny felatanany havia; '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'dia hatsoboky ny mpisorona ao amin’ny diloilo izay eo amin’ny felatanany havia ny fanondrony havanana ka hafafiny impito eo anatrehan’NY TOMPO izany; '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'ary ny diloilo sisa eo am-pelatanany dia hanosoran’ny mpisorona ny ravin-tsofina havanan’ilay hodiovina sy ny ankiben-tanany havanana ary ny ankiben-tongony havanana eo amin’ilay nasiana ny ran’ny fanati-panonerana; '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'ary ny diloilo mbola sisa eo am-pelatanan’ny mpisorona dia hataony amin’ny lohan’ilay hodiovina; ary hanao fanavotana ho azy eo anatrehan’NY TOMPO ny mpisorona. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ny mpisorona dia hanatitra ny fanatiny noho ny ota ka hanao fanavotana ho an’ilay hodiovina hahafahany amin’ny fahalotoany; ary rehefa afaka izany dia hamono ny fanatitra dorana manontolo izy; '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ary ny mpisorona dia hanolotra ny fanatitra dorana manontolo sy ny fanatitra avy amin’ny zavamaniry eo ambonin’ny alitara ka hanao fanavotana ho an’ilay olona hodiovina dia hadio izy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fanadiovana ny boka mahantra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Fa raha mahantra kosa ilay boka ka tsy tratry ny ananany izany dia hitondra zanak’ondry iray hatao fanati-panonerana asandratra izy hanaovana fanavotana ho azy; koba tsara toto ampahafolon’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: efaha
  - type: text
    text: ' voaharo diloilo hatao fanatitra avy amin’ny zavamaniry sy diloilo iray '
  - type: usfm
    marker: w
    children:
    - type: text
      text: loga
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'ary domohina roa na voromailala roa, araka izay tratry ny ananany, koa ny iray dia hatao fanatitra fanadiovana ary ny iray dia hatao fanatitra dorana manontolo. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Dia hoentiny eo amin’ny mpisorona ireo amin’ny andro fahavalo amin’ny fanadiovana azy, eo anoloan’ny varavaran’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tranolay fihaonana
  - type: text
    text: ', eo anatrehan’NY TOMPO. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Horaisin’ny mpisorona ny zanak’ondrilahy izay hatao fanati-panonerana sy ny diloilo iray loga ka hataony fanatitra asandratra eo anatrehan’NY TOMPO. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Dia hovonoina ny zanak’ondry izay hatao fanati-panonerana ary hakan’ny mpisorona ny ran’ny fanati-panonerana ka hohosorany ny ravin-tsofina havanan’ilay hodiovina sy ny ankiben-tanany havanana ary ny ankiben-tongony havanana. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Hakan’ny mpisorona ny diloilo ka hararany eo amin’ny felatanany havia; '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'dia hakan’ny mpisorona amin’ny fanondrony havanana ny diloilo izay eo amin’ny felatanany havia ka hafafiny impito eo anatrehan’NY TOMPO; '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'ary hohosoran’ny mpisorona amin’ny diloilo izay eo an-tanany ny ravin-tsofina havanan’ilay hodiovina sy ny ankiben-tanany havanana sy ny ankiben-tongony havanana, eo amin’ilay toerana nasiana ny ran’ny fanati-panonerana; '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'ary ny diloilo sisa eo am-pelatanan’ny mpisorona dia hataony amin’ny lohan’ilay hodiovina mba hanaovana fanavotana ho azy eo anatrehan’NY TOMPO. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Hateriny koa ny domohina iray, na ny voromailala iray, araka izay tratry ny ananany, '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: koa ny iray dia hatao fanatitra fanadiovana, ary ny iray kosa dia hatao fanatitra dorana manontolo, miaraka amin’ny fanatitra avy amin’ny zavamaniry; ary hanao fanavotana ho an’ilay hodiovina eo anatrehan’NY TOMPO ny mpisorona.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Izany no lalàna ny amin’ny boka raha tsy tratry ny ananany izay fanatitra hanadiovana azy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny lomotra amin’ny rindrin-trano
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ary NY TOMPO niteny tamin’i Mosesy sy i Arona hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Rehefa tonga any amin’ny tany Kanana izay omeko ho taninareo ianareo, raha misy trano hasiako lomotra amin’ny tany fanananareo, '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'dia handeha ny tompon-trano hilaza amin’ny mpisorona hoe: Toa misy aretina miseho ao amin’ny tranoko. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Dia hasain’ny mpisorona hesorina aloha ny entana ao an-trano mandra-piaviny hizaha ny aretina mba tsy hahalotoan’ny zavatra rehetra ao an-trano. Rehefa vita izany dia ho avy ny mpisorona hizaha ny trano.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Hozahany ny aretina, koa raha hitany fa mihady eo amin’ny rindrin’ny trano izany ka maitsomaitso na menamena, ary milentika eo amin’ny rindrin-trano no fijeriny azy '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'dia hivoaka ho eo am-baravarana ny mpisorona ka hidìna tsy hivoha hafitoana ny trano. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Amin’ny andro fahafito dia hiverina ny mpisorona ka hozahany ny aretina, ary raha hitany fa niitatra teo amin’ny rindrin’ny trano izany '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'dia hasain’ny mpisorona hesorina ireo vato izay misy ny aretina ka hariana amin’izay toerana maloto any ivelan’ny tanàna. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Hasainy ho kikisana koa ny aty trano rehetra ary ny kikiny dia hariana amin’izay toerana maloto any ivelan’ny tanàna. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: Dia haka vato hafa ny olona hasolo ny vato teo; haka feta koa izy ka handalotra ny trano.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Fa raha toa ka miseho indray ny aretina ka mifariparitra eo amin’ny trano rehefa nesorina ny vato sady voakiky sy voalalotra ny trano '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'dia ho tonga ny mpisorona hizaha, koa raha hitany fa niitatra teo amin’ny trano ny aretina dia tena toy ny habokana eo amin’ny trano izany ka maloto. '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Dia horavana ny trano, izany hoe ny vato sy ny hazo ary ny lalotra rehetra ka hoentina any amin’izay toerana maloto any ivelan’ny tanàna. '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Izay miditra ao amin’izany trano izany amin’ny andro rehetra izay hihidiany dia haloto mandra-paharivan’ny andro; '
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: izay mandry ao koa dia hanasa ny fitafiany ary izay misakafo ao dia hanasa ny fitafiany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Kanefa kosa raha tonga ny mpisorona ka mizaha azy ary hitany fa tsy niitatra teo amin’ny trano ny aretina rehefa voalalotra ny trano dia hambaran’ny mpisorona fa madio ny trano satria efa afaka ny aretina. '
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'Dia haka vorona roa sy hazo sedera ary lamba jaky sy rantsana '
  - type: usfm
    marker: w
    children:
    - type: text
      text: hisopa
  - type: text
    text: ' izy hanadiovana ny trano. '
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Hovonoiny eo ambonin’ny vilany tany eo ambonin’ny rano mandeha ilay vorona iray; '
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'horaisiny ny hazo sedera sy ny rantsana hisopa ary ny lamba jaky sy ny vorona velona ka hatsobony ao amin’ny ran’ilay vorona novonoina sy eo amin’ny rano nalaina tamin’ny rano mandeha, dia hamafazany ny trano impito izany. '
  - type: usfm
    marker: v
    metadata:
      v: '52'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'Dia hanadio ny trano amin’ny ran’ny vorona sy amin’ny rano mandeha sy amin’ny vorona velona sy amin’ny hazo sedera sy amin’ny rantsana hisopa ary amin’ny lamba jaky izy. '
  - type: usfm
    marker: v
    metadata:
      v: '53'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: Halefany any an-tsaha, any ivelan’ny tanàna, ny vorona velona; ary hanao fanavotana ho an’ny trano izy ka hadio izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '54'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: 'Izany no lalàna ny amin’ny habokana rehetra sy ny be hatina, '
  - type: usfm
    marker: v
    metadata:
      v: '55'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: 'ary ny amin’ny bobongolo amin’ny fitafiana sy amin’ny trano '
  - type: usfm
    marker: v
    metadata:
      v: '56'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: 'ary ny amin’ny mamontsina sy ny manakompery ary ny mifaritra fotsy mangirana, '
