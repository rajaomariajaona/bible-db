document_id: LEV.14,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fanadiovana ny boka
  - type: text
    content: 'Ary NY TOMPO niteny tamin’i Mosesy hoe: '
  '10':
  - type: text
    content: 'Ary amin’ny andro fahavalo dia haka zanak’ondrilahy roa tsy misy kilema izy sy zanak’ondrivavy iray izay iray taona, tsy misy kilema, miampy koba tsara toto telo ampahafolon’ny '
  - type: text
    content: efaha
  - type: text
    content: ' voaharo diloilo, ho fanatitra avy amin’ny zavamaniry ary diloilo iray '
  - type: text
    content: loga
  - type: text
    content: '. '
  '11':
  - type: text
    content: 'Ary ny mpisorona izay manadio ilay lehilahy hodiovina dia hametraka azy sy ireo zavatra ireo eo anatrehan’NY TOMPO, eo anoloan’ny varavaran’ny '
  - type: text
    content: tranolay fihaonana
  - type: text
    content: '; '
  '12':
  - type: text
    content: 'dia haka ny zanak’ondrilahy iray ny mpisorona ka hanolotra azy ho fanati-panonerana miaraka amin’ny diloilo iray loga dia hataony fanatitra asandratra eo anatrehan’NY TOMPO izany. '
  '13':
  - type: text
    content: 'Ary hamono ilay zanak’ondrilahy eo amin’ny famonoana ny fanatitra fanadiovana sy ny fanatitra dorana manontolo izy, dia eo amin’ny fitoerana masina; fa ho an’ny mpisorona ny fanatitra fanadiovana, toy ny fanati-panonerana. Zavatra tena masina izany. '
  '14':
  - type: text
    content: 'Dia hakan’ny mpisorona ny ran’ny fanati-panonerana ka hohosorany ny ravin-tsofina havanan’ilay hodiovina sy ny ankiben-tanany havanana ary ny ankiben-tongony havanana; '
  '15':
  - type: text
    content: 'ary hakan’ny mpisorona ny diloilo iray loga ka haidiny eo amin’ny felatanany havia; '
  '16':
  - type: text
    content: 'dia hatsoboky ny mpisorona ao amin’ny diloilo izay eo amin’ny felatanany havia ny fanondrony havanana ka hafafiny impito eo anatrehan’NY TOMPO izany; '
  '17':
  - type: text
    content: 'ary ny diloilo sisa eo am-pelatanany dia hanosoran’ny mpisorona ny ravin-tsofina havanan’ilay hodiovina sy ny ankiben-tanany havanana ary ny ankiben-tongony havanana eo amin’ilay nasiana ny ran’ny fanati-panonerana; '
  '18':
  - type: text
    content: 'ary ny diloilo mbola sisa eo am-pelatanan’ny mpisorona dia hataony amin’ny lohan’ilay hodiovina; ary hanao fanavotana ho azy eo anatrehan’NY TOMPO ny mpisorona. '
  '19':
  - type: text
    content: 'Ny mpisorona dia hanatitra ny fanatiny noho ny ota ka hanao fanavotana ho an’ilay hodiovina hahafahany amin’ny fahalotoany; ary rehefa afaka izany dia hamono ny fanatitra dorana manontolo izy; '
  '2':
  - type: text
    content: 'Izao no lalàna ny amin’ny boka amin’ny andro fanadiovana azy: Hoentina any amin’ny mpisorona izy; '
  '20':
  - type: text
    content: ary ny mpisorona dia hanolotra ny fanatitra dorana manontolo sy ny fanatitra avy amin’ny zavamaniry eo ambonin’ny alitara ka hanao fanavotana ho an’ilay olona hodiovina dia hadio izy.
  - type: heading
    content: Ny fanadiovana ny boka mahantra
  '21':
  - type: text
    content: 'Fa raha mahantra kosa ilay boka ka tsy tratry ny ananany izany dia hitondra zanak’ondry iray hatao fanati-panonerana asandratra izy hanaovana fanavotana ho azy; koba tsara toto ampahafolon’ny '
  - type: text
    content: efaha
  - type: text
    content: ' voaharo diloilo hatao fanatitra avy amin’ny zavamaniry sy diloilo iray '
  - type: text
    content: loga
  - type: text
    content: ' '
  '22':
  - type: text
    content: 'ary domohina roa na voromailala roa, araka izay tratry ny ananany, koa ny iray dia hatao fanatitra fanadiovana ary ny iray dia hatao fanatitra dorana manontolo. '
  '23':
  - type: text
    content: 'Dia hoentiny eo amin’ny mpisorona ireo amin’ny andro fahavalo amin’ny fanadiovana azy, eo anoloan’ny varavaran’ny '
  - type: text
    content: tranolay fihaonana
  - type: text
    content: ', eo anatrehan’NY TOMPO. '
  '24':
  - type: text
    content: 'Horaisin’ny mpisorona ny zanak’ondrilahy izay hatao fanati-panonerana sy ny diloilo iray loga ka hataony fanatitra asandratra eo anatrehan’NY TOMPO. '
  '25':
  - type: text
    content: 'Dia hovonoina ny zanak’ondry izay hatao fanati-panonerana ary hakan’ny mpisorona ny ran’ny fanati-panonerana ka hohosorany ny ravin-tsofina havanan’ilay hodiovina sy ny ankiben-tanany havanana ary ny ankiben-tongony havanana. '
  '26':
  - type: text
    content: 'Hakan’ny mpisorona ny diloilo ka hararany eo amin’ny felatanany havia; '
  '27':
  - type: text
    content: 'dia hakan’ny mpisorona amin’ny fanondrony havanana ny diloilo izay eo amin’ny felatanany havia ka hafafiny impito eo anatrehan’NY TOMPO; '
  '28':
  - type: text
    content: 'ary hohosoran’ny mpisorona amin’ny diloilo izay eo an-tanany ny ravin-tsofina havanan’ilay hodiovina sy ny ankiben-tanany havanana sy ny ankiben-tongony havanana, eo amin’ilay toerana nasiana ny ran’ny fanati-panonerana; '
  '29':
  - type: text
    content: 'ary ny diloilo sisa eo am-pelatanan’ny mpisorona dia hataony amin’ny lohan’ilay hodiovina mba hanaovana fanavotana ho azy eo anatrehan’NY TOMPO. '
  '3':
  - type: text
    content: 'dia ho eny ivelan’ny toby ny mpisorona ka hizaha azy; ary raha hitany fa sitrana amin’ny habokany ny boka '
  '30':
  - type: text
    content: 'Hateriny koa ny domohina iray, na ny voromailala iray, araka izay tratry ny ananany, '
  '31':
  - type: text
    content: koa ny iray dia hatao fanatitra fanadiovana, ary ny iray kosa dia hatao fanatitra dorana manontolo, miaraka amin’ny fanatitra avy amin’ny zavamaniry; ary hanao fanavotana ho an’ilay hodiovina eo anatrehan’NY TOMPO ny mpisorona.
  '32':
  - type: text
    content: Izany no lalàna ny amin’ny boka raha tsy tratry ny ananany izay fanatitra hanadiovana azy.
  - type: heading
    content: Ny lomotra amin’ny rindrin-trano
  '33':
  - type: text
    content: 'Ary NY TOMPO niteny tamin’i Mosesy sy i Arona hoe: '
  '34':
  - type: text
    content: 'Rehefa tonga any amin’ny tany Kanana izay omeko ho taninareo ianareo, raha misy trano hasiako lomotra amin’ny tany fanananareo, '
  '35':
  - type: text
    content: 'dia handeha ny tompon-trano hilaza amin’ny mpisorona hoe: Toa misy aretina miseho ao amin’ny tranoko. '
  '36':
  - type: text
    content: Dia hasain’ny mpisorona hesorina aloha ny entana ao an-trano mandra-piaviny hizaha ny aretina mba tsy hahalotoan’ny zavatra rehetra ao an-trano. Rehefa vita izany dia ho avy ny mpisorona hizaha ny trano.
  '37':
  - type: text
    content: 'Hozahany ny aretina, koa raha hitany fa mihady eo amin’ny rindrin’ny trano izany ka maitsomaitso na menamena, ary milentika eo amin’ny rindrin-trano no fijeriny azy '
  '38':
  - type: text
    content: 'dia hivoaka ho eo am-baravarana ny mpisorona ka hidìna tsy hivoha hafitoana ny trano. '
  '39':
  - type: text
    content: 'Amin’ny andro fahafito dia hiverina ny mpisorona ka hozahany ny aretina, ary raha hitany fa niitatra teo amin’ny rindrin’ny trano izany '
  '4':
  - type: text
    content: 'dia vorona roa velona sady madio miaraka amin’ny hazo sedera sy lamba jaky ary rantsana '
  - type: text
    content: hisopa
  - type: text
    content: ' no hasain’ny mpisorona halaina ho an’ilay hodiovina, '
  '40':
  - type: text
    content: 'dia hasain’ny mpisorona hesorina ireo vato izay misy ny aretina ka hariana amin’izay toerana maloto any ivelan’ny tanàna. '
  '41':
  - type: text
    content: 'Hasainy ho kikisana koa ny aty trano rehetra ary ny kikiny dia hariana amin’izay toerana maloto any ivelan’ny tanàna. '
  '42':
  - type: text
    content: Dia haka vato hafa ny olona hasolo ny vato teo; haka feta koa izy ka handalotra ny trano.
  '43':
  - type: text
    content: 'Fa raha toa ka miseho indray ny aretina ka mifariparitra eo amin’ny trano rehefa nesorina ny vato sady voakiky sy voalalotra ny trano '
  '44':
  - type: text
    content: 'dia ho tonga ny mpisorona hizaha, koa raha hitany fa niitatra teo amin’ny trano ny aretina dia tena toy ny habokana eo amin’ny trano izany ka maloto. '
  '45':
  - type: text
    content: 'Dia horavana ny trano, izany hoe ny vato sy ny hazo ary ny lalotra rehetra ka hoentina any amin’izay toerana maloto any ivelan’ny tanàna. '
  '46':
  - type: text
    content: 'Izay miditra ao amin’izany trano izany amin’ny andro rehetra izay hihidiany dia haloto mandra-paharivan’ny andro; '
  '47':
  - type: text
    content: izay mandry ao koa dia hanasa ny fitafiany ary izay misakafo ao dia hanasa ny fitafiany.
  '48':
  - type: text
    content: 'Kanefa kosa raha tonga ny mpisorona ka mizaha azy ary hitany fa tsy niitatra teo amin’ny trano ny aretina rehefa voalalotra ny trano dia hambaran’ny mpisorona fa madio ny trano satria efa afaka ny aretina. '
  '49':
  - type: text
    content: 'Dia haka vorona roa sy hazo sedera ary lamba jaky sy rantsana '
  - type: text
    content: hisopa
  - type: text
    content: ' izy hanadiovana ny trano. '
  '5':
  - type: text
    content: 'koa ny vorona iray dia hasainy hovonoina eo ambonin’ny vilany tany izay misy rano, eo ambonin’ny rano mandeha. '
  '50':
  - type: text
    content: 'Hovonoiny eo ambonin’ny vilany tany eo ambonin’ny rano mandeha ilay vorona iray; '
  '51':
  - type: text
    content: 'horaisiny ny hazo sedera sy ny rantsana hisopa ary ny lamba jaky sy ny vorona velona ka hatsobony ao amin’ny ran’ilay vorona novonoina sy eo amin’ny rano nalaina tamin’ny rano mandeha, dia hamafazany ny trano impito izany. '
  '52':
  - type: text
    content: 'Dia hanadio ny trano amin’ny ran’ny vorona sy amin’ny rano mandeha sy amin’ny vorona velona sy amin’ny hazo sedera sy amin’ny rantsana hisopa ary amin’ny lamba jaky izy. '
  '53':
  - type: text
    content: Halefany any an-tsaha, any ivelan’ny tanàna, ny vorona velona; ary hanao fanavotana ho an’ny trano izy ka hadio izany.
  '54':
  - type: text
    content: 'Izany no lalàna ny amin’ny habokana rehetra sy ny be hatina, '
  '55':
  - type: text
    content: 'ary ny amin’ny bobongolo amin’ny fitafiana sy amin’ny trano '
  '56':
  - type: text
    content: 'ary ny amin’ny mamontsina sy ny manakompery ary ny mifaritra fotsy mangirana, '
  '57':
  - type: text
    content: mba hampianarana ny hoe amin’ny fotoana toy inona no maloto ary amin’ny fotoana toy inona no madio. Izany no lalàna ny amin’ny habokana.
  '6':
  - type: text
    content: 'Halainy ny vorona velona, ny hazo sedera, ny lamba jaky ary ny rantsana hisopa miaraka amin’ilay vorona velona, dia hatsobony ao amin’ny ran’ny vorona izay novonoina teo ambonin’ny rano mandeha. '
  '7':
  - type: text
    content: Dia hofafazany impito ilay hodiovina ho afaka amin’ny habokany ka hambarany fa madio izy ary halefany any an-tsaha ilay vorona velona.
  '8':
  - type: text
    content: 'Ary ilay hodiovina dia hanasa ny fitafiany sy hanaratra ny volony rehetra ary handro amin’ny rano ka hadio; ary rehefa afaka izany dia hankeo an-toby izy, kanefa hitoetra eo ivelan’ny tranolainy hafitoana. '
  '9':
  - type: text
    content: 'Amin’ny andro fahafito dia hanaratra ny volony rehetra izy, na ny volon-dohany izany na ny volombavany na ny volomasony; eny ny volony rehetra dia hoharatany avokoa ary hanasa ny fitafiany izy sady handro amin’ny rano dia hadio. '
