document_id: 1CH.12,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ireo naman’i Davida tany Ziklaga
  - type: text
    content: 'Izao avy ny olona nankany amin’i Davida tany Ziklaga, fony izy mbola niery an’i Saoly, zanak’i Kisy; izy ireo dia isan’ny lehilahy mahery mpanampy amin’ny ady '
  '10':
  - type: text
    content: 'i Mismana no fahefatra, i Jeremia no fahadimy, '
  '11':
  - type: text
    content: 'i Atahy no fahenina, i Eliela no fahafito, '
  '12':
  - type: text
    content: 'i Johanana no fahavalo, i Elizabada no fahasivy, '
  '13':
  - type: text
    content: 'i Jeremia no fahafolo ary i Makbanay no fahiraika amby folo. '
  '14':
  - type: text
    content: 'Ireo no isan’ny taranak’i Gada sady samy mpifehy miaramila; ny kely indrindra dia naharesy olona zato, ary ny lehibe indrindra dia naharesy olona arivo. '
  '15':
  - type: text
    content: Ireo no nita an’i Jordana tamin’ny volana voalohany, fony nihoatra ny morony rehetra io; ary nampandositra izay rehetra teny amin’ny lohasaha na atsinanana na andrefana ireo.
  '16':
  - type: text
    content: 'Nisy tamin’ny taranak’i Benjamina sy Joda nankany amin’i Davida tany amin’ny fialofana. '
  '17':
  - type: text
    content: 'Nandeha hitsena azy i Davida ka niteny taminy hoe: Raha fihavanana no iavianareo atỳ amiko hanampy ahy dia hikambana isika; fa raha avy hamadika ahy ho azon’ny fahavaloko kosa ianareo, nefa tsy mba nanao an-keriny ny tanako, dia Andriamanitry ny razantsika no hijery sy hamaly izany. '
  '18':
  - type: text
    content: 'Dia nampitenenin’ny Fanahy i Amasay, lehiben’ny mpanafika malaza hoe:'
  - type: text
    content: Anao izahay, ry Davida ô! Miandany aminao izahay, ry zanak’i Jese;
  - type: text
    content: fiadanana, eny, fiadanana anie ho anao!
  - type: text
    content: Ary fiadanana anie ho an’ny manampy anao;
  - type: text
    content: fa Andriamanitrao no manampy anao.
  - type: text
    content: Dia noraisin’i Davida ireo ka notendreny ho mpifehy ny miaramila.
  '19':
  - type: text
    content: 'Ary nisy sasany tamin’ny Manase nifindra ka nanatona an’i Davida fony izy nomba ny Filistina hiady amin’i Saoly, kanefa tsy nanampy ny Filistina akory izy ireo; fa nifampila hevitra ireo andrianan’ny Filistina dia nampandehaniny i Davida ka nilaza hoe: Ny lohantsika no hoentiny mila sitraka hiverenany amin’i Saoly tompony. '
  '2':
  - type: text
    content: 'sady mpitondra tsipìka ka nahay nanavia sy nanavanana raha nitora-bato na nandefa tsipìka. Isan’ny Benjaminita, rahalahin’i Saoly, ireo. '
  '20':
  - type: text
    content: 'Rehefa nankany Ziklaga i Davida dia nisy tamin’ny Manase nanatona azy, dia i Adna, i Jozabada, i Jediaela, i Mikaela, i Jozabada, i Eliho ary i Ziletahy, mpifehy arivo tamin’ny Manase. '
  '21':
  - type: text
    content: Izy ireo dia nanampy an’i Davida hamely ny mpanafika; fa lehilahy mahery avokoa izy ireo sady mpitari-tafika.
  '22':
  - type: text
    content: Tamin’izany dia nisy nankany amin’i Davida isanandro isanandro hanampy azy mandra-pahatongany ho toby lehibe toy ny tobin’Andriamanitra.
  - type: heading
    content: Ny isan’ny mpomba an’i Davida avy any Hebrona
  '23':
  - type: text
    content: 'Izao no isan’ny miaramila efa voaomana hiady, izay tonga tao amin’i Davida tao Hebrona hamindra ny fanjakan’i Saoly ho eo am-pelatanany araka ny tenin’NY TOMPO:'
  '24':
  - type: text
    content: Tamin’ny taranak’i Joda dia valonjato sy enina arivo, mpitondra ampinga lehibe sy lefona sady efa voaomana hiady.
  '25':
  - type: text
    content: Tamin’ny taranak’i Simeona dia zato sy fito arivo, lehilahy mahery sady matanjaka amin’ny ady.
  '26':
  - type: text
    content: Tamin’ny taranak’i Levy dia eninjato sy efatra arivo.
  '27':
  - type: text
    content: I Jehoiada, lehiben’ny Aronita, dia nisy fitonjato sy telo arivo niaraka taminy;
  '28':
  - type: text
    content: i Zadoka, zatovo mahery, sy ny fianakaviany, dia mpifehy roa amby roapolo lahy.
  '29':
  - type: text
    content: Tamin’ny taranak’i Benjamina, havan’i Saoly, dia telo arivo; fa hatramin’izany ny ankamaroany dia mbola nanao fanompoana tao an-tranon’i Saoly ihany.
  '3':
  - type: text
    content: 'Ny lohany dia i Ahiezera, i Joasy, zanak’i Sema gibeatita; i Jeziela, i Peleta zanak’i Azmaveta; i Beraka, i Jeho anatotita, '
  '30':
  - type: text
    content: Tamin’ny taranak’i Efraima dia valonjato sy roa alina, lehilahy mahery avokoa sady samy nalaza tamin’ny fianakaviany avy.
  '31':
  - type: text
    content: Tamin’ny antsasaky ny fokon’i Manase dia valo arivo sy iray alina izay notononina anarana no avy hampanjaka an’i Davida.
  '32':
  - type: text
    content: Tamin’ny taranak’Isakara dia roanjato no lehibeny; samy nahay namantatra tsara izay fotoana mety ka nahafantatra izay tokony hataon’ny Israely, ary ny rahalahiny rehetra dia nanaraka ny teniny.
  '33':
  - type: text
    content: Tamin’ny Zebolona, izay azo nalefa hanafika ka nahay niady tamin’ny fiadiana samihafa rehetra, dia dimy alina, izay nahay niray hina nilahatra tsara.
  '34':
  - type: text
    content: Tamin’ny Naftaly dia nisy mpifehy arivo, ary manaraka azy dia nisy fito arivo sy telo alina amin’ampinga lehibe sy lefona.
  '35':
  - type: text
    content: Tamin’ny Danita dia eninjato sy valo arivo sy roa alina izay voalahatra hiady.
  '36':
  - type: text
    content: Tamin’ny Asera dia efatra alina izay azo nalefa hanafika sady vonona hiady.
  '37':
  - type: text
    content: Ary avy tany andafin’i Jordana, tamin’ny Robenita sy ny Gadita ary ny antsasaky ny fokon’i Manase, dia nisy roa alina sy iray hetsy nitana fiadiana isan-karazany.
  '38':
  - type: text
    content: 'Ireo miaramila rehetra ireo, izay nahay nilahatra tsara, dia niray fo nankany Hebrona hampanjaka an’i Davida amin’ny Israely rehetra; ary ny sisa rehetra tamin’ny Israely koa dia niray fo hampanjaka an’i Davida. '
  '39':
  - type: text
    content: Tao amin’i Davida hateloana izy ireo sady nihinana sy nisotro, fa efa nanomana nahandro ho azy ny rahalahiny.
  '4':
  - type: text
    content: 'i Jismaia gibeonita, lehilahy mahery isan’ny telopolo lahy sady mpifehy ny telopolo lahy; i Jeremia, i Jahaziela, i Johanana, i Jozabada gaderatita, '
  '40':
  - type: text
    content: Ary izay teo akaikiny koa hatramin’ny Isakara sy ny Zebolona ary ny Naftaly dia samy nampitondra hanina samihafa noentin’ny boriky sy rameva ary ampondra sy omby, dia koba, mofo aviavy, voaloboka maina, divay, diloilo ary omby sy ondry aman’osy betsaka koa, fa nisy fifaliana tamin’ny Israely.
  '5':
  - type: text
    content: 'i Elozay, i Jerimota, i Bealia, i Semaria, i Sefatia harofita, '
  '6':
  - type: text
    content: 'i Elkana, i Jisia, i Azarela, i Joezera, i Jasobeama koraìta, '
  '7':
  - type: text
    content: i Joela, i Zebadia, zanak’i Jerohama avy any Gedora.
  '8':
  - type: text
    content: 'Tamin’ny Gadita dia nisy lehilahy mahery nisintaka tamin’ny namany ka nanatona an’i Davida ho any amin’ny fialofana any an-tendrombohitra; miaramila nahay niady izy ireo ka nahatana ampinga lehibe sy lefona; ny tarehiny dia tahaka ny tarehin’ny liona, ary haingam-pandeha tahaka ny gazela eny an-tendrombohitra izy. '
  '9':
  - type: text
    content: 'I Ezera no voalohany, i Obadia no faharoa, i Eliaba no fahatelo, '
