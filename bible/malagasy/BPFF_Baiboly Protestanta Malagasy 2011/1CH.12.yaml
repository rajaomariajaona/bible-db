document_id: 1CH.12,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ireo naman’i Davida tany Ziklaga
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao avy ny olona nankany amin’i Davida tany Ziklaga, fony izy mbola niery an’i Saoly, zanak’i Kisy; izy ireo dia isan’ny lehilahy mahery mpanampy amin’ny ady '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'i Mismana no fahefatra, i Jeremia no fahadimy, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'i Atahy no fahenina, i Eliela no fahafito, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'i Johanana no fahavalo, i Elizabada no fahasivy, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'i Jeremia no fahafolo ary i Makbanay no fahiraika amby folo. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ireo no isan’ny taranak’i Gada sady samy mpifehy miaramila; ny kely indrindra dia naharesy olona zato, ary ny lehibe indrindra dia naharesy olona arivo. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ireo no nita an’i Jordana tamin’ny volana voalohany, fony nihoatra ny morony rehetra io; ary nampandositra izay rehetra teny amin’ny lohasaha na atsinanana na andrefana ireo.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nisy tamin’ny taranak’i Benjamina sy Joda nankany amin’i Davida tany amin’ny fialofana. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nandeha hitsena azy i Davida ka niteny taminy hoe: Raha fihavanana no iavianareo atỳ amiko hanampy ahy dia hikambana isika; fa raha avy hamadika ahy ho azon’ny fahavaloko kosa ianareo, nefa tsy mba nanao an-keriny ny tanako, dia Andriamanitry ny razantsika no hijery sy hamaly izany. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nampitenenin’ny Fanahy i Amasay, lehiben’ny mpanafika malaza hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Anao izahay, ry Davida ô! Miandany aminao izahay, ry zanak’i Jese;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fiadanana, eny, fiadanana anie ho anao!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary fiadanana anie ho an’ny manampy anao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa Andriamanitrao no manampy anao.
  - type: usfm
    marker: m
    children:
    - type: text
      text: Dia noraisin’i Davida ireo ka notendreny ho mpifehy ny miaramila.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nisy sasany tamin’ny Manase nifindra ka nanatona an’i Davida fony izy nomba ny Filistina hiady amin’i Saoly, kanefa tsy nanampy ny Filistina akory izy ireo; fa nifampila hevitra ireo andrianan’ny Filistina dia nampandehaniny i Davida ka nilaza hoe: Ny lohantsika no hoentiny mila sitraka hiverenany amin’i Saoly tompony. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'sady mpitondra tsipìka ka nahay nanavia sy nanavanana raha nitora-bato na nandefa tsipìka. Isan’ny Benjaminita, rahalahin’i Saoly, ireo. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa nankany Ziklaga i Davida dia nisy tamin’ny Manase nanatona azy, dia i Adna, i Jozabada, i Jediaela, i Mikaela, i Jozabada, i Eliho ary i Ziletahy, mpifehy arivo tamin’ny Manase. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izy ireo dia nanampy an’i Davida hamely ny mpanafika; fa lehilahy mahery avokoa izy ireo sady mpitari-tafika.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tamin’izany dia nisy nankany amin’i Davida isanandro isanandro hanampy azy mandra-pahatongany ho toby lehibe toy ny tobin’Andriamanitra.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny isan’ny mpomba an’i Davida avy any Hebrona
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao no isan’ny miaramila efa voaomana hiady, izay tonga tao amin’i Davida tao Hebrona hamindra ny fanjakan’i Saoly ho eo am-pelatanany araka ny tenin’NY TOMPO:'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tamin’ny taranak’i Joda dia valonjato sy enina arivo, mpitondra ampinga lehibe sy lefona sady efa voaomana hiady.
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tamin’ny taranak’i Simeona dia zato sy fito arivo, lehilahy mahery sady matanjaka amin’ny ady.
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tamin’ny taranak’i Levy dia eninjato sy efatra arivo.
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I Jehoiada, lehiben’ny Aronita, dia nisy fitonjato sy telo arivo niaraka taminy;
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: i Zadoka, zatovo mahery, sy ny fianakaviany, dia mpifehy roa amby roapolo lahy.
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tamin’ny taranak’i Benjamina, havan’i Saoly, dia telo arivo; fa hatramin’izany ny ankamaroany dia mbola nanao fanompoana tao an-tranon’i Saoly ihany.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny lohany dia i Ahiezera, i Joasy, zanak’i Sema gibeatita; i Jeziela, i Peleta zanak’i Azmaveta; i Beraka, i Jeho anatotita, '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tamin’ny taranak’i Efraima dia valonjato sy roa alina, lehilahy mahery avokoa sady samy nalaza tamin’ny fianakaviany avy.
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tamin’ny antsasaky ny fokon’i Manase dia valo arivo sy iray alina izay notononina anarana no avy hampanjaka an’i Davida.
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tamin’ny taranak’Isakara dia roanjato no lehibeny; samy nahay namantatra tsara izay fotoana mety ka nahafantatra izay tokony hataon’ny Israely, ary ny rahalahiny rehetra dia nanaraka ny teniny.
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tamin’ny Zebolona, izay azo nalefa hanafika ka nahay niady tamin’ny fiadiana samihafa rehetra, dia dimy alina, izay nahay niray hina nilahatra tsara.
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tamin’ny Naftaly dia nisy mpifehy arivo, ary manaraka azy dia nisy fito arivo sy telo alina amin’ampinga lehibe sy lefona.
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tamin’ny Danita dia eninjato sy valo arivo sy roa alina izay voalahatra hiady.
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tamin’ny Asera dia efatra alina izay azo nalefa hanafika sady vonona hiady.
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary avy tany andafin’i Jordana, tamin’ny Robenita sy ny Gadita ary ny antsasaky ny fokon’i Manase, dia nisy roa alina sy iray hetsy nitana fiadiana isan-karazany.
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ireo miaramila rehetra ireo, izay nahay nilahatra tsara, dia niray fo nankany Hebrona hampanjaka an’i Davida amin’ny Israely rehetra; ary ny sisa rehetra tamin’ny Israely koa dia niray fo hampanjaka an’i Davida. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tao amin’i Davida hateloana izy ireo sady nihinana sy nisotro, fa efa nanomana nahandro ho azy ny rahalahiny.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'i Jismaia gibeonita, lehilahy mahery isan’ny telopolo lahy sady mpifehy ny telopolo lahy; i Jeremia, i Jahaziela, i Johanana, i Jozabada gaderatita, '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary izay teo akaikiny koa hatramin’ny Isakara sy ny Zebolona ary ny Naftaly dia samy nampitondra hanina samihafa noentin’ny boriky sy rameva ary ampondra sy omby, dia koba, mofo aviavy, voaloboka maina, divay, diloilo ary omby sy ondry aman’osy betsaka koa, fa nisy fifaliana tamin’ny Israely.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'i Elozay, i Jerimota, i Bealia, i Semaria, i Sefatia harofita, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'i Elkana, i Jisia, i Azarela, i Joezera, i Jasobeama koraìta, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: i Joela, i Zebadia, zanak’i Jerohama avy any Gedora.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin’ny Gadita dia nisy lehilahy mahery nisintaka tamin’ny namany ka nanatona an’i Davida ho any amin’ny fialofana any an-tendrombohitra; miaramila nahay niady izy ireo ka nahatana ampinga lehibe sy lefona; ny tarehiny dia tahaka ny tarehin’ny liona, ary haingam-pandeha tahaka ny gazela eny an-tendrombohitra izy. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I Ezera no voalohany, i Obadia no faharoa, i Eliaba no fahatelo, '
