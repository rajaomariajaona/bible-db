document_id: DEU.33
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mitsodrano ny fokon’Israely roa amby folo i Mosesy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Toy izao ny tsodrano nataon’i Mosesy, lehilahin’Andriamanitra, tamin’ny Zanak’Israely, rehefa nadiva ho faty izy. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Hoy izy:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Avy tao Sinay NY TOMPO
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary niseho tamin’ireo avy tany Seìra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: niposaka namirapiratra avy tany an-tendrombohitra Parana Izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary avy tao amin’ny masiny tsy omby alinalina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: nisy afon’ny lalàna ho an’ireo teo ankavanany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Eny, tia ireo firenena Izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eo an-tananao avokoa ny masiny rehetra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: miankohoka eo an-tongotrao ireo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka samy mandray amin’ny teninao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Lalàna no nomen’i Mosesy antsika
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho lovan’ny fiangonan’i Jakoba.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ary tonga mpanjakan’i Jesoròna
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Deo 32.15.
    marker-yv: yv-n
  - type: text
    text: ' Izy,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: rehefa tafangona ny lehiben’ny vahoaka
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny fokon’Israely rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Aoka ho velona fa tsy ho faty i Robena,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa aoka ho vitsy olona izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ny amin’i Joda dia izao, hoy izy:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: TOMPO ô, mihainoa ny feon’i Joda
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka ento ho amin’ny olony izy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny tanany no hiadiany ho an’ny tenany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka manampia azy Ianao hamelezany ny mpandrafy azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ny amin’i Levy dia hoy izy:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Tomimanao sy ny Orimanao
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia amin’ny olonao mahatoky anao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay nozahanao toetra tao Masa
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy nifamalianao tao amin’ny ranon’i Meriba,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'izay nilaza ny rainy sy ny reniny hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy mahita azy aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady tsy nahafantatra izay rahalahiny izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary izay zanany aza dia tsy fantany koa;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa nitandrina ny teninao izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka nitana ny fanekenao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Hampianariny ny fitsipikao i Jakoba,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny lalànanao Israely;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hametraka ditin-kazo manitra eo am-bavoronao izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary fanatitra dorana manontolo eo ambonin’ny alitaranao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: TOMPO ô, tahio ny heriny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary aoka ho sitrakao ny asan’ny tanany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: asio mafy izay mitsangana hiady aminy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka aoka tsy hiarina intsony izay mankahala azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ny amin’i Benjamina dia hoy izy:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny malalan’NY TOMPO dia honina amim-piadanana eo aminy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia halofany mandrakariva
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hobabeny eo an-damosiny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ny amin’i Josefa dia hoy izy:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hotahìn’NY TOMPO anie ny taniny
- type: usfm
  marker: q1
  children:
  - type: text
    text: amin’ny fanomezan-tsoan’ny lanitra, dia amin’ny ando
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy amin’ny rano lalina mamitsaka any ambany,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: amin’ny zava-tsoa vokatry ny masoandro
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny voan-java-tsoa vokatry ny volana,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: amin’ny zava-malaza avy amin’ny tendrombohitra fahagola
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny zava-tsoa avy amin’ny havoana hatrizay
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: mbamin’ny zava-tsoan’ny tany
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy izay rehetra eo aminy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny fankasitrahan’Izay nitoetra tao amin’ilay roimemy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.16 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Zahao '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Eks 3.2.
    marker-yv: yv-n
  - type: text
    text: ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: aoka ho tonga ao an-dohan’i Josefa izany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia eo an-tampon-dohan’ilay nalaza tamin’ny rahalahiny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ny voalohan-teraky ny ombiny dia malaza,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tandrok’ombimanga ny tandrony;
- type: usfm
  marker: q1
  children:
  - type: text
    text: izany no hanotoany ny firenena rehetra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ny faran’ny tany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ireo no alinalin’i Efraima
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy arivoarivon’i Manase.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ny amin’i Zebolona dia hoy izy:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mifalia, ry Zebolona, amin’izay alehanao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ianao, ry Isakara ao an-dainao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Firenena no antsoiny hankao an-tendrombohitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ao no hamonoany zavatra ho fanatitra amim-pahamarinana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa hitsentsitra ny harenan’ny ranomasina izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny zava-tsoa miafina ao amin’ny fasika.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ny amin’i Gada dia hoy izy:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Isaorana anie izay manome malalaka ho an’i Gada;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mamitsaka tahaka ny liom-bavy izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka mamiravira ny sandry mbamin’ny tampon-doha.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Nizaha izay voaloham-bokatra ho an’ny tenany izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa teo ny anjaran’ny mpanao lalàna no efa voatokana.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Niaraka tamin’ny lohan’ny firenena izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary araka ny fahamarinan’NY TOMPO no nataony,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy araka ny fitsipiny izay iombonany amin’ny Israely.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ny amin’i Dana dia hoy izy:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: I Dana dia zanaka liona;
- type: usfm
  marker: q1
  children:
  - type: text
    text: miantsampy avy ao Basana izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ny amin’i Naftaly dia hoy izy:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ry Naftaly, voky fankasitrahana
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy feno ny fitahian’NY TOMPO,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mandovà ny andrefana sy ny atsimo ianao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ny amin’i Asera dia hoy izy:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aoka hotahìna mihoatra noho ny zaza maro i Asera,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hankasitrahana mihoatra noho ny rahalahiny izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hanatsoboka ny tongony amin’ny diloilo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Ho vy sy varahina ny hidinao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hifamatra amin’ny andronao ny fiadananao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Ry Jesoròna
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Deo 32.15.
    marker-yv: yv-n
  - type: text
    text: ', tsy misy tahaka an’Andriamanitra'
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay mitaingina ny lanitra hamonjy anao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady mandia ny rahona amin’ny voninahiny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Ny Andriamanitra hatrizay hatrizay no fonenana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny sandry mandrakizay no eto ambany.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mandroaka ny fahavalo eo anoloanao Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ka miteny hoe: Aringano.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Mandry fehizay Israely,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mitokana irery ny loharanon’i Jakoba
- type: usfm
  marker: q1
  children:
  - type: text
    text: ao amin’ny tany be vary sy ranom-boaloboka;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, mampilatsaka ando ny lanitra eo amboniny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Sambatra ianao, ry Israely;
- type: usfm
  marker: q1
  children:
  - type: text
    text: iza no tahaka anao, ry olona voavonjin’NY TOMPO,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ampingan’ny famonjena anao sy sabatry ny voninahitrao?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hikoy anao ny fahavalonao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hitsahinao ny havoanany.
