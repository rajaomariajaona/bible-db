document_id: DEU.33,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Mitsodrano ny fokon’Israely roa amby folo i Mosesy
  - type: text
    content: 'Toy izao ny tsodrano nataon’i Mosesy, lehilahin’Andriamanitra, tamin’ny Zanak’Israely, rehefa nadiva ho faty izy. '
  '10':
  - type: text
    content: Hampianariny ny fitsipikao i Jakoba,
  - type: text
    content: ary ny lalànanao Israely;
  - type: text
    content: hametraka ditin-kazo manitra eo am-bavoronao izy
  - type: text
    content: ary fanatitra dorana manontolo eo ambonin’ny alitaranao.
  '11':
  - type: text
    content: TOMPO ô, tahio ny heriny,
  - type: text
    content: ary aoka ho sitrakao ny asan’ny tanany;
  - type: text
    content: asio mafy izay mitsangana hiady aminy
  - type: text
    content: ka aoka tsy hiarina intsony izay mankahala azy.
  '12':
  - type: text
    content: 'Ny amin’i Benjamina dia hoy izy:'
  - type: text
    content: Ny malalan’NY TOMPO dia honina amim-piadanana eo aminy,
  - type: text
    content: dia halofany mandrakariva
  - type: text
    content: ary hobabeny eo an-damosiny.
  '13':
  - type: text
    content: 'Ny amin’i Josefa dia hoy izy:'
  - type: text
    content: Hotahìn’NY TOMPO anie ny taniny
  - type: text
    content: amin’ny fanomezan-tsoan’ny lanitra, dia amin’ny ando
  - type: text
    content: sy amin’ny rano lalina mamitsaka any ambany,
  '14':
  - type: text
    content: amin’ny zava-tsoa vokatry ny masoandro
  - type: text
    content: sy ny voan-java-tsoa vokatry ny volana,
  '15':
  - type: text
    content: amin’ny zava-malaza avy amin’ny tendrombohitra fahagola
  - type: text
    content: sy ny zava-tsoa avy amin’ny havoana hatrizay
  '16':
  - type: text
    content: mbamin’ny zava-tsoan’ny tany
  - type: text
    content: sy izay rehetra eo aminy
  - type: text
    content: ary ny fankasitrahan’Izay nitoetra tao amin’ilay roimemy
  - type: note
    content: Zahao Eks 3.2.
  - type: text
    content: ;
  - type: text
    content: aoka ho tonga ao an-dohan’i Josefa izany,
  - type: text
    content: dia eo an-tampon-dohan’ilay nalaza tamin’ny rahalahiny.
  '17':
  - type: text
    content: Ny voalohan-teraky ny ombiny dia malaza,
  - type: text
    content: tandrok’ombimanga ny tandrony;
  - type: text
    content: izany no hanotoany ny firenena rehetra,
  - type: text
    content: dia ny faran’ny tany;
  - type: text
    content: ireo no alinalin’i Efraima
  - type: text
    content: sy arivoarivon’i Manase.
  '18':
  - type: text
    content: 'Ny amin’i Zebolona dia hoy izy:'
  - type: text
    content: Mifalia, ry Zebolona, amin’izay alehanao,
  - type: text
    content: ary ianao, ry Isakara ao an-dainao.
  '19':
  - type: text
    content: Firenena no antsoiny hankao an-tendrombohitra,
  - type: text
    content: ary ao no hamonoany zavatra ho fanatitra amim-pahamarinana;
  - type: text
    content: fa hitsentsitra ny harenan’ny ranomasina izy
  - type: text
    content: ary ny zava-tsoa miafina ao amin’ny fasika.
  '2':
  - type: text
    content: 'Hoy izy:'
  - type: text
    content: Avy tao Sinay NY TOMPO
  - type: text
    content: ary niseho tamin’ireo avy tany Seìra;
  - type: text
    content: niposaka namirapiratra avy tany an-tendrombohitra Parana Izy;
  - type: text
    content: ary avy tao amin’ny masiny tsy omby alinalina;
  - type: text
    content: nisy afon’ny lalàna ho an’ireo teo ankavanany.
  '20':
  - type: text
    content: 'Ny amin’i Gada dia hoy izy:'
  - type: text
    content: Isaorana anie izay manome malalaka ho an’i Gada;
  - type: text
    content: mamitsaka tahaka ny liom-bavy izy
  - type: text
    content: ka mamiravira ny sandry mbamin’ny tampon-doha.
  '21':
  - type: text
    content: Nizaha izay voaloham-bokatra ho an’ny tenany izy,
  - type: text
    content: fa teo ny anjaran’ny mpanao lalàna no efa voatokana.
  - type: text
    content: Niaraka tamin’ny lohan’ny firenena izy,
  - type: text
    content: ary araka ny fahamarinan’NY TOMPO no nataony,
  - type: text
    content: sy araka ny fitsipiny izay iombonany amin’ny Israely.
  '22':
  - type: text
    content: 'Ny amin’i Dana dia hoy izy:'
  - type: text
    content: I Dana dia zanaka liona;
  - type: text
    content: miantsampy avy ao Basana izy.
  '23':
  - type: text
    content: 'Ny amin’i Naftaly dia hoy izy:'
  - type: text
    content: Ry Naftaly, voky fankasitrahana
  - type: text
    content: sy feno ny fitahian’NY TOMPO,
  - type: text
    content: mandovà ny andrefana sy ny atsimo ianao.
  '24':
  - type: text
    content: 'Ny amin’i Asera dia hoy izy:'
  - type: text
    content: Aoka hotahìna mihoatra noho ny zaza maro i Asera,
  - type: text
    content: ary hankasitrahana mihoatra noho ny rahalahiny izy
  - type: text
    content: ka hanatsoboka ny tongony amin’ny diloilo.
  '25':
  - type: text
    content: Ho vy sy varahina ny hidinao;
  - type: text
    content: ary hifamatra amin’ny andronao ny fiadananao.
  '26':
  - type: text
    content: Ry Jesoròna
  - type: note
    content: Jereo Deo 32.15.
  - type: text
    content: ', tsy misy tahaka an’Andriamanitra'
  - type: text
    content: izay mitaingina ny lanitra hamonjy anao,
  - type: text
    content: sady mandia ny rahona amin’ny voninahiny.
  '27':
  - type: text
    content: Ny Andriamanitra hatrizay hatrizay no fonenana,
  - type: text
    content: ary ny sandry mandrakizay no eto ambany.
  - type: text
    content: Mandroaka ny fahavalo eo anoloanao Izy
  - type: text
    content: 'ka miteny hoe: Aringano.'
  '28':
  - type: text
    content: Mandry fehizay Israely,
  - type: text
    content: mitokana irery ny loharanon’i Jakoba
  - type: text
    content: ao amin’ny tany be vary sy ranom-boaloboka;
  - type: text
    content: eny, mampilatsaka ando ny lanitra eo amboniny.
  '29':
  - type: text
    content: Sambatra ianao, ry Israely;
  - type: text
    content: iza no tahaka anao, ry olona voavonjin’NY TOMPO,
  - type: text
    content: ampingan’ny famonjena anao sy sabatry ny voninahitrao?
  - type: text
    content: Hikoy anao ny fahavalonao,
  - type: text
    content: ary hitsahinao ny havoanany.
  '3':
  - type: text
    content: Eny, tia ireo firenena Izy;
  - type: text
    content: eo an-tananao avokoa ny masiny rehetra;
  - type: text
    content: miankohoka eo an-tongotrao ireo
  - type: text
    content: ka samy mandray amin’ny teninao.
  '4':
  - type: text
    content: Lalàna no nomen’i Mosesy antsika
  - type: text
    content: ho lovan’ny fiangonan’i Jakoba.
  '5':
  - type: text
    content: Ary tonga mpanjakan’i Jesoròna
  - type: note
    content: Jereo Deo 32.15.
  - type: text
    content: ' Izy,'
  - type: text
    content: rehefa tafangona ny lehiben’ny vahoaka
  - type: text
    content: sy ny fokon’Israely rehetra.
  '6':
  - type: text
    content: Aoka ho velona fa tsy ho faty i Robena,
  - type: text
    content: nefa aoka ho vitsy olona izy.
  '7':
  - type: text
    content: 'Ny amin’i Joda dia izao, hoy izy:'
  - type: text
    content: TOMPO ô, mihainoa ny feon’i Joda
  - type: text
    content: ka ento ho amin’ny olony izy.
  - type: text
    content: Ny tanany no hiadiany ho an’ny tenany
  - type: text
    content: ka manampia azy Ianao hamelezany ny mpandrafy azy.
  '8':
  - type: text
    content: 'Ny amin’i Levy dia hoy izy:'
  - type: text
    content: 'Ny '
  - type: text
    content: Tomimanao sy ny Orimanao
  - type: text
    content: dia amin’ny olonao mahatoky anao,
  - type: text
    content: izay nozahanao toetra tao Masa
  - type: text
    content: sy nifamalianao tao amin’ny ranon’i Meriba,
  '9':
  - type: text
    content: 'izay nilaza ny rainy sy ny reniny hoe:'
  - type: text
    content: Tsy mahita azy aho,
  - type: text
    content: sady tsy nahafantatra izay rahalahiny izy,
  - type: text
    content: ary izay zanany aza dia tsy fantany koa;
  - type: text
    content: fa nitandrina ny teninao izy
  - type: text
    content: ka nitana ny fanekenao.
