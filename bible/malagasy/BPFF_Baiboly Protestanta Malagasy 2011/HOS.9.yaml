document_id: HOS.9,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Hihinana hanina tsy madio Israely
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aza mifaly ry Israely,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aza faly loatra toy ny firenena hafa,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa efa nijangajanga niala tamin’Andriamanitrao ianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady efa tia karama maloto teny am-pamoloana rehetra teny!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tahaka ny voaloboka any an-tany efitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no nahitako ny Israely.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toy ny aviavy malady masaka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no nahitako ny razanareo.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nefa ireny dia tonga tany Baala-Peora
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka nanolo-tena ho amin’ilay mampahamenatra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'mampahamenatra: teny maneso ilazana ny andriamanitra Baala.'
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tonga fahavetavetana tahaka an’ilay tiany ihany izy.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny amin’i Efraima, hihelina toy ny voromanidina ny voninahiny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy hisy hiteraka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na hanana anaka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na ho torontoronina.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na dia misy mitaiza aza ny zanany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hofoanako ihany ireny mialoha ny maha lehibe azy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, hahita loza tokoa izy amin’ny handaozako azy!
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I Efraima, raha ny nahitako azy, dia voavoly ao amin’ny tany mahafinaritra tahaka an’i Tiro,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa tsy maintsy mamoaka ny zanany ho amin’ny mpamono izy.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: TOMPO ô, omeo azy...
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Inona no homenao azy?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Omeo azy ny kibo tsy mahazo zaza sy ny nono ritra.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ao Gilgala ny fahotany rehetra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, tao no nankahalako azy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Noho ny faharatsian’ny asany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia horoahiko hiala ao an-tranoko izy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy ho tia azy intsony Aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa mpikomy avokoa ny mpanapaka azy.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voaratra i Efraima,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: maina ny fotony
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy hamoa intsony izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, na dia miteraka aza izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hovonoiko ny nateraky ny kibony izay mahafinaritra azy.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Harian’Andriamanitro izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria tsy nihaino Azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ho tonga mpirenireny any amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jentilisa
    - type: text
      text: ' izy.'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy hahavelona azy ny famoloana sy ny famiazam-boaloboka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary handiso fanantenana azy ny ranom-boaloboka.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy honina ao amin’ny tanin’NY TOMPO izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hiverina ho any Ejipta i Efraima
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hihinana zavatra tsy madio any Asiria.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy hampidina divay ho fanatitra ho an’NY TOMPO izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady tsy hankasitrahany izany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy hankasitrahany ny zavatra vonoiny hatao fanatitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ho toy ny fahan-kanina ho an’ny mpisaona;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho voaloto izay rehetra homana izany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny haniny dia ho an’ny tenany ihany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy ho tafiditra ao amin’ny tranon’NY TOMPO.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Inona ary no hataonareo raha tonga amin’ny fotoam-pivavahana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy amin’ny andro firavoravoana voatendrin’NY TOMPO?
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa e! Lasa nandositra ny fandringanana izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: i Ejipta no hanangona azy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: i Memfisa no handevina azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho rakotry ny songosongo mandady ny fanaka volafotsiny sarobidy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsilo no ho ao an-dainy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny mpaminany no mahazo tsiny
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tonga ireo andro famaliana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tonga ireo andro fampamoahana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho fantatr’Israely izany!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Adala ny mpaminany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary very saina ny olona mahazo tsindrimandry
  - type: usfm
    marker: q1
    children:
    - type: text
      text: noho ny halehiben’ny helokao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy habetsahan’ny fanoherana anao.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miaraka amin’Andriamanitro ny mpitilin’i Efraima, dia ny mpaminany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny amin’ny alehany rehetra ny haraton’ny mpamandri-borona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tonga hatrany amin’ny tranon’Andriamaniny ny fankahalana azy.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fatra-mpanao ratsy izy ireo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toy ny tany Gibea
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.9 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Zahao '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Mpits 19-21.
      marker-yv: yv-n
    - type: text
      text: ' fahiny.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho tsarovan’Andriamanitra ny helony
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hovaliany ny fahotany.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny vokatry ny fanompoan-tsampy efa hatry ny ela
    marker-yv: yv-h
