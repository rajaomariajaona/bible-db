document_id: HOS.9,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Hihinana hanina tsy madio Israely
  - type: text
    content: Aza mifaly ry Israely,
  - type: text
    content: aza faly loatra toy ny firenena hafa,
  - type: text
    content: fa efa nijangajanga niala tamin’Andriamanitrao ianao,
  - type: text
    content: sady efa tia karama maloto teny am-pamoloana rehetra teny!
  '10':
  - type: text
    content: Tahaka ny voaloboka any an-tany efitra
  - type: text
    content: no nahitako ny Israely.
  - type: text
    content: Toy ny aviavy malady masaka
  - type: text
    content: no nahitako ny razanareo.
  - type: text
    content: Nefa ireny dia tonga tany Baala-Peora
  - type: text
    content: ka nanolo-tena ho amin’ilay mampahamenatra
  - type: note
    content: 'mampahamenatra: teny maneso ilazana ny andriamanitra Baala.'
  - type: text
    content: ','
  - type: text
    content: ary tonga fahavetavetana tahaka an’ilay tiany ihany izy.
  '11':
  - type: text
    content: Ny amin’i Efraima, hihelina toy ny voromanidina ny voninahiny
  - type: text
    content: ka tsy hisy hiteraka,
  - type: text
    content: na hanana anaka,
  - type: text
    content: na ho torontoronina.
  '12':
  - type: text
    content: Na dia misy mitaiza aza ny zanany
  - type: text
    content: dia hofoanako ihany ireny mialoha ny maha lehibe azy.
  - type: text
    content: Eny, hahita loza tokoa izy amin’ny handaozako azy!
  '13':
  - type: text
    content: I Efraima, raha ny nahitako azy, dia voavoly ao amin’ny tany mahafinaritra tahaka an’i Tiro,
  - type: text
    content: nefa tsy maintsy mamoaka ny zanany ho amin’ny mpamono izy.
  '14':
  - type: text
    content: TOMPO ô, omeo azy...
  - type: text
    content: Inona no homenao azy?
  - type: text
    content: Omeo azy ny kibo tsy mahazo zaza sy ny nono ritra.
  '15':
  - type: text
    content: Ao Gilgala ny fahotany rehetra;
  - type: text
    content: eny, tao no nankahalako azy.
  - type: text
    content: Noho ny faharatsian’ny asany
  - type: text
    content: dia horoahiko hiala ao an-tranoko izy.
  - type: text
    content: Tsy ho tia azy intsony Aho
  - type: text
    content: fa mpikomy avokoa ny mpanapaka azy.
  '16':
  - type: text
    content: Voaratra i Efraima,
  - type: text
    content: maina ny fotony
  - type: text
    content: ka tsy hamoa intsony izy;
  - type: text
    content: eny, na dia miteraka aza izy,
  - type: text
    content: dia hovonoiko ny nateraky ny kibony izay mahafinaritra azy.
  '17':
  - type: text
    content: Harian’Andriamanitro izy
  - type: text
    content: satria tsy nihaino Azy;
  - type: text
    content: 'ho tonga mpirenireny any amin’ny '
  - type: text
    content: Jentilisa
  - type: text
    content: ' izy.'
  '2':
  - type: text
    content: Tsy hahavelona azy ny famoloana sy ny famiazam-boaloboka
  - type: text
    content: ary handiso fanantenana azy ny ranom-boaloboka.
  '3':
  - type: text
    content: Tsy honina ao amin’ny tanin’NY TOMPO izy;
  - type: text
    content: hiverina ho any Ejipta i Efraima
  - type: text
    content: ary hihinana zavatra tsy madio any Asiria.
  '4':
  - type: text
    content: Tsy hampidina divay ho fanatitra ho an’NY TOMPO izy
  - type: text
    content: sady tsy hankasitrahany izany;
  - type: text
    content: tsy hankasitrahany ny zavatra vonoiny hatao fanatitra
  - type: text
    content: fa ho toy ny fahan-kanina ho an’ny mpisaona;
  - type: text
    content: ho voaloto izay rehetra homana izany;
  - type: text
    content: fa ny haniny dia ho an’ny tenany ihany
  - type: text
    content: ka tsy ho tafiditra ao amin’ny tranon’NY TOMPO.
  '5':
  - type: text
    content: Inona ary no hataonareo raha tonga amin’ny fotoam-pivavahana
  - type: text
    content: sy amin’ny andro firavoravoana voatendrin’NY TOMPO?
  '6':
  - type: text
    content: Fa e! Lasa nandositra ny fandringanana izy;
  - type: text
    content: i Ejipta no hanangona azy,
  - type: text
    content: i Memfisa no handevina azy;
  - type: text
    content: ho rakotry ny songosongo mandady ny fanaka volafotsiny sarobidy;
  - type: text
    content: tsilo no ho ao an-dainy.
  - type: heading
    content: Ny mpaminany no mahazo tsiny
  '7':
  - type: text
    content: Tonga ireo andro famaliana,
  - type: text
    content: tonga ireo andro fampamoahana;
  - type: text
    content: ho fantatr’Israely izany!
  - type: text
    content: Adala ny mpaminany
  - type: text
    content: ary very saina ny olona mahazo tsindrimandry
  - type: text
    content: noho ny halehiben’ny helokao
  - type: text
    content: sy habetsahan’ny fanoherana anao.
  '8':
  - type: text
    content: Miaraka amin’Andriamanitro ny mpitilin’i Efraima, dia ny mpaminany;
  - type: text
    content: eny amin’ny alehany rehetra ny haraton’ny mpamandri-borona
  - type: text
    content: ary tonga hatrany amin’ny tranon’Andriamaniny ny fankahalana azy.
  '9':
  - type: text
    content: Fatra-mpanao ratsy izy ireo,
  - type: text
    content: toy ny tany Gibea
  - type: note
    content: Zahao Mpits 19-21.
  - type: text
    content: ' fahiny.'
  - type: text
    content: Ho tsarovan’Andriamanitra ny helony
  - type: text
    content: ary hovaliany ny fahotany.
  - type: heading
    content: Ny vokatry ny fanompoan-tsampy efa hatry ny ela
