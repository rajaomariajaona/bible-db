document_id: PSA.64,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Nafahana tamin’ny fiampangan’ny fahavalo
  - type: text
    content: Ho an’ny mpiventy hira. Salamo nataon’i Davida.
  - type: text
    content: Henoy ny feoko, raha mitaraina aho, Andriamanitra ô!
  - type: text
    content: Arovy ny aiko amin’ny tahotro ny fahavalo!
  '10':
  - type: text
    content: Mifaly amin’NY TOMPO ny marina ka mialoka Aminy;
  - type: text
    content: eny, hirehareha amin’izany ny mahitsy fo rehetra.
  '2':
  - type: text
    content: Afeno aho tsy ho azon’ny firaisan-tetiky ny ratsy fanahy
  - type: text
    content: sy ny fitabataban’ny mpanao ratsy
  '3':
  - type: text
    content: izay mandranitra ny lelany ho tahaka ny sabatra
  - type: text
    content: ka mikendry handefa ny zana-tsipìkany, dia teny mangidy,
  '4':
  - type: text
    content: mba hitifirany mangingina ny mahitsy fo;
  - type: text
    content: mitifitra azy tampoka izy ka tsy matahotra akory.
  '5':
  - type: text
    content: Mifampirisika amin’ny teti-dratsiny izy;
  - type: text
    content: mifampitaona hanao fandri-totofana izy
  - type: text
    content: 'ka miteny hoe: Iza no hahita izany?'
  '6':
  - type: text
    content: 'Mamorona teti-dratsy izy:'
  - type: text
    content: Efa vonona izao ny tetika!
  - type: text
    content: Hady lalina ny ao anatin’ny olombelona, dia ny fony.
  '7':
  - type: text
    content: Mitifitra azy amin’ny zana-tsipìka anefa Andriamanitra;
  - type: text
    content: tampoka toy ny fiantefan’ny zana-tsipìka no fahavoazany.
  '8':
  - type: text
    content: Apotrany izy ka ny lelany ihany no nahasingotra azy;
  - type: text
    content: mihifikifi-doha izay rehetra mahita azy.
  '9':
  - type: text
    content: Dia matahotra ny olona rehetra ka manambara ny asan’Andriamanitra
  - type: text
    content: sady mandinika tsara ny ataony.
