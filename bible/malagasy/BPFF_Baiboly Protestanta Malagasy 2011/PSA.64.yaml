document_id: PSA.64
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nafahana tamin’ny fiampangan’ny fahavalo
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: Ho an’ny mpiventy hira. Salamo nataon’i Davida.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Henoy ny feoko, raha mitaraina aho, Andriamanitra ô!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Arovy ny aiko amin’ny tahotro ny fahavalo!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Afeno aho tsy ho azon’ny firaisan-tetiky ny ratsy fanahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny fitabataban’ny mpanao ratsy
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: izay mandranitra ny lelany ho tahaka ny sabatra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka mikendry handefa ny zana-tsipìkany, dia teny mangidy,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: mba hitifirany mangingina ny mahitsy fo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mitifitra azy tampoka izy ka tsy matahotra akory.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Mifampirisika amin’ny teti-dratsiny izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mifampitaona hanao fandri-totofana izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ka miteny hoe: Iza no hahita izany?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Mamorona teti-dratsy izy:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Efa vonona izao ny tetika!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hady lalina ny ao anatin’ny olombelona, dia ny fony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Mitifitra azy amin’ny zana-tsipìka anefa Andriamanitra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tampoka toy ny fiantefan’ny zana-tsipìka no fahavoazany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Apotrany izy ka ny lelany ihany no nahasingotra azy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mihifikifi-doha izay rehetra mahita azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Dia matahotra ny olona rehetra ka manambara ny asan’Andriamanitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady mandinika tsara ny ataony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Mifaly amin’NY TOMPO ny marina ka mialoka Aminy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, hirehareha amin’izany ny mahitsy fo rehetra.
