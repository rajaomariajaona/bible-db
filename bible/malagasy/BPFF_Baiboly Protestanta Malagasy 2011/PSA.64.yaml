document_id: PSA.64,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Nafahana tamin’ny fiampangan’ny fahavalo
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: Ho an’ny mpiventy hira. Salamo nataon’i Davida.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Henoy ny feoko, raha mitaraina aho, Andriamanitra ô!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Arovy ny aiko amin’ny tahotro ny fahavalo!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mifaly amin’NY TOMPO ny marina ka mialoka Aminy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, hirehareha amin’izany ny mahitsy fo rehetra.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Afeno aho tsy ho azon’ny firaisan-tetiky ny ratsy fanahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny fitabataban’ny mpanao ratsy
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay mandranitra ny lelany ho tahaka ny sabatra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka mikendry handefa ny zana-tsipìkany, dia teny mangidy,
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hitifirany mangingina ny mahitsy fo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mitifitra azy tampoka izy ka tsy matahotra akory.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mifampirisika amin’ny teti-dratsiny izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mifampitaona hanao fandri-totofana izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ka miteny hoe: Iza no hahita izany?'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Mamorona teti-dratsy izy:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Efa vonona izao ny tetika!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hady lalina ny ao anatin’ny olombelona, dia ny fony.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mitifitra azy amin’ny zana-tsipìka anefa Andriamanitra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tampoka toy ny fiantefan’ny zana-tsipìka no fahavoazany.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Apotrany izy ka ny lelany ihany no nahasingotra azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mihifikifi-doha izay rehetra mahita azy.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia matahotra ny olona rehetra ka manambara ny asan’Andriamanitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady mandinika tsara ny ataony.
