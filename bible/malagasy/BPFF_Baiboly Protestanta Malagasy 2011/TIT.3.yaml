document_id: TIT.3,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny tokony ho fitondrantenan’ny Mpino
  - type: text
    content: 'Mampahatsiarova azy hanaiky izay mitondra sy manam-pahefana, hanoa tsara, ho vonona ho amin’ny asa tsara rehetra, '
  '10':
  - type: text
    content: 'Izay mpanao hevi-diso, rehefa nanarinao indray mandeha na indroa, dia ialao '
  '11':
  - type: text
    content: satria fantatrao fa efa mivadika izay manao izany ka sady manota izy no manamelo-tena koa.
  - type: heading
    content: Hafatrafatra farany sy fanaovam-beloma
  '12':
  - type: text
    content: 'Rehefa maniraka an’i Artema na i Tikiko ho atỳ aminao aho dia miezaha hankany amiko any Nikopolia ianao fa mikasa handany ny ririnina any aho. '
  '13':
  - type: text
    content: 'Vatsio tsara i Zena mpahay lalàna sy i Apolosy mba tsy hisy izay hanahirana azy. '
  '14':
  - type: text
    content: Aoka koa ny olontsika hianatra hazoto amin’ny asa tsara mba hahazoany izay zavatra tena ilainy fa tsy mba ho isan’izay tsy mamokatra izy.
  '15':
  - type: text
    content: Manao veloma anao izay rehetra atỳ amiko. Veloma any amin’izay rehetra tia antsika amin’ny finoana.
  - type: text
    content: Ho aminareo rehetra anie ny fahasoavana!
  '2':
  - type: text
    content: tsy hiteny ratsy olona, tsy ho mpila ady, fa ho mpandefitra, maneho ny halemem-panahy rehetra amin’ny olona rehetra.
  '3':
  - type: text
    content: Fa isika koa dia mba adala fahiny, tsy nanaiky, voafitaka; eny, andevon’ny filana sy ny fahafinaretana isan-karazany ary velona teo amin’ny lolompo sy ny fialonana sady nankahalaina no nifankahala.
  '4':
  - type: text
    content: Fa rehefa niseho ny fahamoram-panahin’Andriamanitra, Mpamonjy antsika,
  - type: text
    content: sy ny fitiavany ny olona,
  '5':
  - type: text
    content: dia tsy tamin’ny asa mety ho nataontsika tamin’ny fahamarinana,
  - type: text
    content: fa araka ny famindrampony kosa
  - type: text
    content: no namonjeny antsika, rehefa nosasana tamin’ny fahaterahana indray sy ny fanavaozana nataon’ny Fanahy Masina,
  '6':
  - type: text
    content: izay narotsany betsaka tamintsika
  - type: text
    content: 'tamin’ny alalan’i Jesosy '
  - type: text
    content: Kristy
  - type: text
    content: ', Mpamonjy antsika,'
  '7':
  - type: text
    content: mba hohamarinina amin’ny fahasoavany isika
  - type: text
    content: ka ho tonga mpandova araka ny fanantenana ny fiainana mandrakizay.
  '8':
  - type: text
    content: 'Mahatoky ireo teny ireo, ary izany zavatra izany dia tiako hitompoanao mafy, ho an’izay mino an’Andriamanitra ka mieritreritra hamirapiratra amin’ny asa tsara. Sady tsara no mahasoa ny olona izany zavatra izany. '
  '9':
  - type: text
    content: 'Fa halaviro kosa ny fanontaniana adaladala, ny tantaram-pirazanana, ny fifandirana, ny ady teny ny amin’ny lalàna; fa tsy mahasoa sady zava-poana izany. '
