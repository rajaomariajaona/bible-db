document_id: TIT.3,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny tokony ho fitondrantenan’ny Mpino
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mampahatsiarova azy hanaiky izay mitondra sy manam-pahefana, hanoa tsara, ho vonona ho amin’ny asa tsara rehetra, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izay mpanao hevi-diso, rehefa nanarinao indray mandeha na indroa, dia ialao '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: satria fantatrao fa efa mivadika izay manao izany ka sady manota izy no manamelo-tena koa.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Hafatrafatra farany sy fanaovam-beloma
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa maniraka an’i Artema na i Tikiko ho atỳ aminao aho dia miezaha hankany amiko any Nikopolia ianao fa mikasa handany ny ririnina any aho. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vatsio tsara i Zena mpahay lalàna sy i Apolosy mba tsy hisy izay hanahirana azy. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Aoka koa ny olontsika hianatra hazoto amin’ny asa tsara mba hahazoany izay zavatra tena ilainy fa tsy mba ho isan’izay tsy mamokatra izy.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Manao veloma anao izay rehetra atỳ amiko. Veloma any amin’izay rehetra tia antsika amin’ny finoana.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ho aminareo rehetra anie ny fahasoavana!
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: tsy hiteny ratsy olona, tsy ho mpila ady, fa ho mpandefitra, maneho ny halemem-panahy rehetra amin’ny olona rehetra.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa isika koa dia mba adala fahiny, tsy nanaiky, voafitaka; eny, andevon’ny filana sy ny fahafinaretana isan-karazany ary velona teo amin’ny lolompo sy ny fialonana sady nankahalaina no nifankahala.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa rehefa niseho ny fahamoram-panahin’Andriamanitra, Mpamonjy antsika,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny fitiavany ny olona,
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia tsy tamin’ny asa mety ho nataontsika tamin’ny fahamarinana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa araka ny famindrampony kosa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no namonjeny antsika, rehefa nosasana tamin’ny fahaterahana indray sy ny fanavaozana nataon’ny Fanahy Masina,
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay narotsany betsaka tamintsika
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'tamin’ny alalan’i Jesosy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ', Mpamonjy antsika,'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hohamarinina amin’ny fahasoavany isika
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka ho tonga mpandova araka ny fanantenana ny fiainana mandrakizay.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mahatoky ireo teny ireo, ary izany zavatra izany dia tiako hitompoanao mafy, ho an’izay mino an’Andriamanitra ka mieritreritra hamirapiratra amin’ny asa tsara. Sady tsara no mahasoa ny olona izany zavatra izany. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa halaviro kosa ny fanontaniana adaladala, ny tantaram-pirazanana, ny fifandirana, ny ady teny ny amin’ny lalàna; fa tsy mahasoa sady zava-poana izany. '
