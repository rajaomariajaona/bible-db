document_id: PRO.18,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Izay mitokantokana dia mitady ny mahafinaritra ny tenany ihany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: misafoaka manohitra izay hevitra mahasoa rehetra izy.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Ny anaran’NY TOMPO dia tilikambo mafy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny marina mihazakazaka mankao aminy ka tsy misy mahakasika azy.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Ny harenan’ny mpanankarena no tanànany mafy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary araka ny fiheviny dia toa manda avo erỳ izany.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Ny fireharehan’ny fon’ny olona dia mialoha ny faharavana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny fanetren-tena kosa mialoha ny voninahitra.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Izay mamaly teny mbola tsy re
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hadalana sy henatra ho an’ny tenany izany.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Ny fanahin’ny olona dia mampahery azy ao anatin’ny aretiny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa raha ny fanahy no kivy, iza indray no hanohana azy?
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Ny fon’ny manan-tsaina mikatsaka fahalalana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny sofin’ny hendry mitady izany.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Ny fanomezana ataon’ny olona dia manalalaka ny alehany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hahatonga azy eo anatrehan’ny lehibe.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Izay mandahatra aloha no toa marina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa nony avy kosa ny an-daniny dia mitaky porofo aminy.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Ny fanaovana antsapaka dia mampitsahatra ady
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mampisaraka ny samy mahery.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Ny manatona rahalahy voaisy ratsy dia sarotra noho ny mahazo vohitra mafy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny fifandirana dia tahaka ny hidin’ny lapan’ny mpanjaka.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Ny adala dia tsy mba finaritra amin’ny fahalalana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ta haneho izay ao am-pony.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Ny vokatry ny tenin’ny olona no mahavoky ny kibony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, ny vokatry ny molony no mahavoky azy.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Ny mahafaty sy ny mahavelona dia samy hain’ny lela,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: koa izay tia azy dia hihinana ny vokany.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Izay lehilahy mahazo vady dia mahazo hasambarana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady mahita sitraka amin’NY TOMPO.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Fitarainana no ataon’ny mahantra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny mpanankarena dia mamaly amin’ny teny mahery.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Misy sakaiza izay mitondra amin’ny fahoriana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa misy kosa sakaiza tia, izay mifikitra mafy noho ny rahalahy aza.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Raha avy ny ratsy fanahy dia avy ny fanamavoana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary miaraka amin’ny fahafaham-baraka ny henatra.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Rano lalina ny teny aloaky ny vavan’ny olona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary rano miboiboika ny loharanon’ny fahendrena.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Tsy mety ny manohana ny ratsy fanahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba handresena ny marina amin’ny fitsarana.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Ny molotry ny adala dia miteraka ny fifandirana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny teny ataony dia mihantsy fifamelezana.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Ny tenin’ny adala no fandringanana azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny molony ihany no fandriky ny tenany.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Ny tenin’ny mpifosafosa dia toy ny hanim-py
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka mikorotsaka hatrany anaty rehetra any.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Izay malaina amin’ny asany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia rahalahin’ny mpanimba zavatra.
