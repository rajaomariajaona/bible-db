document_id: PRO.18,3103
type_code: plt
verses:
  '1':
  - type: text
    content: Izay mitokantokana dia mitady ny mahafinaritra ny tenany ihany;
  - type: text
    content: misafoaka manohitra izay hevitra mahasoa rehetra izy.
  '10':
  - type: text
    content: Ny anaran’NY TOMPO dia tilikambo mafy;
  - type: text
    content: ny marina mihazakazaka mankao aminy ka tsy misy mahakasika azy.
  '11':
  - type: text
    content: Ny harenan’ny mpanankarena no tanànany mafy
  - type: text
    content: ary araka ny fiheviny dia toa manda avo erỳ izany.
  '12':
  - type: text
    content: Ny fireharehan’ny fon’ny olona dia mialoha ny faharavana,
  - type: text
    content: fa ny fanetren-tena kosa mialoha ny voninahitra.
  '13':
  - type: text
    content: Izay mamaly teny mbola tsy re
  - type: text
    content: dia hadalana sy henatra ho an’ny tenany izany.
  '14':
  - type: text
    content: Ny fanahin’ny olona dia mampahery azy ao anatin’ny aretiny,
  - type: text
    content: fa raha ny fanahy no kivy, iza indray no hanohana azy?
  '15':
  - type: text
    content: Ny fon’ny manan-tsaina mikatsaka fahalalana
  - type: text
    content: ary ny sofin’ny hendry mitady izany.
  '16':
  - type: text
    content: Ny fanomezana ataon’ny olona dia manalalaka ny alehany
  - type: text
    content: hahatonga azy eo anatrehan’ny lehibe.
  '17':
  - type: text
    content: Izay mandahatra aloha no toa marina,
  - type: text
    content: fa nony avy kosa ny an-daniny dia mitaky porofo aminy.
  '18':
  - type: text
    content: Ny fanaovana antsapaka dia mampitsahatra ady
  - type: text
    content: ary mampisaraka ny samy mahery.
  '19':
  - type: text
    content: Ny manatona rahalahy voaisy ratsy dia sarotra noho ny mahazo vohitra mafy
  - type: text
    content: ary ny fifandirana dia tahaka ny hidin’ny lapan’ny mpanjaka.
  '2':
  - type: text
    content: Ny adala dia tsy mba finaritra amin’ny fahalalana
  - type: text
    content: fa ta haneho izay ao am-pony.
  '20':
  - type: text
    content: Ny vokatry ny tenin’ny olona no mahavoky ny kibony,
  - type: text
    content: eny, ny vokatry ny molony no mahavoky azy.
  '21':
  - type: text
    content: Ny mahafaty sy ny mahavelona dia samy hain’ny lela,
  - type: text
    content: koa izay tia azy dia hihinana ny vokany.
  '22':
  - type: text
    content: Izay lehilahy mahazo vady dia mahazo hasambarana
  - type: text
    content: sady mahita sitraka amin’NY TOMPO.
  '23':
  - type: text
    content: Fitarainana no ataon’ny mahantra,
  - type: text
    content: fa ny mpanankarena dia mamaly amin’ny teny mahery.
  '24':
  - type: text
    content: Misy sakaiza izay mitondra amin’ny fahoriana,
  - type: text
    content: fa misy kosa sakaiza tia, izay mifikitra mafy noho ny rahalahy aza.
  '3':
  - type: text
    content: Raha avy ny ratsy fanahy dia avy ny fanamavoana,
  - type: text
    content: ary miaraka amin’ny fahafaham-baraka ny henatra.
  '4':
  - type: text
    content: Rano lalina ny teny aloaky ny vavan’ny olona
  - type: text
    content: ary rano miboiboika ny loharanon’ny fahendrena.
  '5':
  - type: text
    content: Tsy mety ny manohana ny ratsy fanahy
  - type: text
    content: mba handresena ny marina amin’ny fitsarana.
  '6':
  - type: text
    content: Ny molotry ny adala dia miteraka ny fifandirana
  - type: text
    content: ary ny teny ataony dia mihantsy fifamelezana.
  '7':
  - type: text
    content: Ny tenin’ny adala no fandringanana azy
  - type: text
    content: ary ny molony ihany no fandriky ny tenany.
  '8':
  - type: text
    content: Ny tenin’ny mpifosafosa dia toy ny hanim-py
  - type: text
    content: ka mikorotsaka hatrany anaty rehetra any.
  '9':
  - type: text
    content: Izay malaina amin’ny asany
  - type: text
    content: dia rahalahin’ny mpanimba zavatra.
