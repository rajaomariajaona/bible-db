document_id: PRO.18
type_code: plt
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Izay mitokantokana dia mitady ny mahafinaritra ny tenany ihany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: misafoaka manohitra izay hevitra mahasoa rehetra izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ny adala dia tsy mba finaritra amin’ny fahalalana
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ta haneho izay ao am-pony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Raha avy ny ratsy fanahy dia avy ny fanamavoana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary miaraka amin’ny fahafaham-baraka ny henatra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Rano lalina ny teny aloaky ny vavan’ny olona
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary rano miboiboika ny loharanon’ny fahendrena.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Tsy mety ny manohana ny ratsy fanahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba handresena ny marina amin’ny fitsarana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ny molotry ny adala dia miteraka ny fifandirana
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny teny ataony dia mihantsy fifamelezana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ny tenin’ny adala no fandringanana azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny molony ihany no fandriky ny tenany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ny tenin’ny mpifosafosa dia toy ny hanim-py
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka mikorotsaka hatrany anaty rehetra any.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Izay malaina amin’ny asany
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia rahalahin’ny mpanimba zavatra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ny anaran’NY TOMPO dia tilikambo mafy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny marina mihazakazaka mankao aminy ka tsy misy mahakasika azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ny harenan’ny mpanankarena no tanànany mafy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary araka ny fiheviny dia toa manda avo erỳ izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ny fireharehan’ny fon’ny olona dia mialoha ny faharavana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny fanetren-tena kosa mialoha ny voninahitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Izay mamaly teny mbola tsy re
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hadalana sy henatra ho an’ny tenany izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ny fanahin’ny olona dia mampahery azy ao anatin’ny aretiny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa raha ny fanahy no kivy, iza indray no hanohana azy?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ny fon’ny manan-tsaina mikatsaka fahalalana
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny sofin’ny hendry mitady izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ny fanomezana ataon’ny olona dia manalalaka ny alehany
- type: usfm
  marker: q1
  children:
  - type: text
    text: hahatonga azy eo anatrehan’ny lehibe.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Izay mandahatra aloha no toa marina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa nony avy kosa ny an-daniny dia mitaky porofo aminy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ny fanaovana antsapaka dia mampitsahatra ady
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mampisaraka ny samy mahery.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ny manatona rahalahy voaisy ratsy dia sarotra noho ny mahazo vohitra mafy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny fifandirana dia tahaka ny hidin’ny lapan’ny mpanjaka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ny vokatry ny tenin’ny olona no mahavoky ny kibony,
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, ny vokatry ny molony no mahavoky azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ny mahafaty sy ny mahavelona dia samy hain’ny lela,
- type: usfm
  marker: q1
  children:
  - type: text
    text: koa izay tia azy dia hihinana ny vokany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Izay lehilahy mahazo vady dia mahazo hasambarana
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady mahita sitraka amin’NY TOMPO.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Fitarainana no ataon’ny mahantra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny mpanankarena dia mamaly amin’ny teny mahery.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Misy sakaiza izay mitondra amin’ny fahoriana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa misy kosa sakaiza tia, izay mifikitra mafy noho ny rahalahy aza.
