type_code: plt
verses:
  '1':
  - type: text
    content: INDRAY MIJERY
  - type: text
    content: Ny ahafantarana an’i Jeremia indrindra dia ilay mpaminany nijaly noho ny fanambarany ny Teny avy amin’Andriamanitra. Mifamatotra amin’ny asany koa ny fandehan-javatra ara-politika, na ny tao anaty na ny tany ivelany, amin’ny fotoana izay iavian’ny Babiloniana sy anombohan’ny fahababoana.
  - type: text
    content: Ny votoatin’ny boky
  - type: text
    content: Mpanjaka maro no nifandimby tamin’ny andron’i Jeremia, dia i Josia, i Joahaza, i Joiakima, i Joiakina, i Zedekia ary i Gedalia. Tamin’izany ny firenen-dehibe matanjaka, i Ejipta sy ny Babiloniana, dia niezaka hamabo ny firenena rehetra manodidina azy, ka tonga ny Babiloniana ary namabo ny firenena Joda sy nanao fahirano an’i Jerosalema, dia noentiny ho babo ny olona ambony rehetra, ary i Jeremia dia noentin’ny Jiosy sasany niaraka taminy nandositra nankany Ejipta.
  - type: text
    content: Tamin’izany fotoana rehetra izany i Jeremia dia tsy nitsahatra nanambara fa ny hany hisakana ny loza dia ny fiverenan’ny olona amin’Andriamanitra, hanaiky ny sitrapony ka hitsahatra tsy hikomy amin’ny Babiloniana. Izany hafatra izany indrindra anefa no niampangana azy ho mpamadika tanindrazana. Naiditra am-ponja izy, nalatsaka tao an-dava-drano. Matetika izy no mitaraina amin’Andriamanitra noho izy voatery hilaza loza ho an’ny mpiray tanindrazana aminy.
  - type: text
    content: Tsy loza ihany anefa no nambaran’i Jeremia fa nanomboka nanambara ny fanavaozana izay hataon’Andriamanitra koa izy. Nanoratra taratasy ho an’ny babo izy, izay nilazany fa ny hevitr’Andriamanitra dia fiadanana fa tsy loza. Ary tao anatin’ny fahirano dia nividy ny sahan’ny fianakaviany sahirana izy, araka ny andraikitra mipetraka aminy. Izany dia anambaràna fa mbola hiverina ny babo. Ambaran’i Jeremia koa ny hanaovan’Andriamanitra fanekena vaovao amin’ny olony, izay hanoratany ny lalàna ao am-pony ary hamelany ny helony.
  - type: text
    content: Ny firafitry ny Boky
  - type: text
    content: 'Faminaniana maromaro sy fihetsika manaitra manambara hafatra, noentin’i Jeremia momba an’i Joda: 1–25.14'
  - type: text
    content: 'Faminaniana milaza famonjena ho an’ny Israely sy Joda, ary tranga samihafa niseho tamin’ny fiainan’i Jeremia: 26–45'
  - type: text
    content: 'Faminaniana mamely ny firenena jentilisa: 25.15-38, 46–51'
  - type: text
    content: 'Fanampiny amin’ny Boky, izay tantara mitovy amin’ny 2Mpa 24.18–25.30, milaza ny nandravana an’i Jerosalema: 52'
