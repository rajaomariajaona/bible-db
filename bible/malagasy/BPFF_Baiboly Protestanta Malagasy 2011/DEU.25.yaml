document_id: DEU.25,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fitsarana marina
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha misy olona manana ady ka mankeo amin’ny fitsarana mba ho tsarain’ny mpitsara dia aoka hohamarininy izay marina ary hohelohiny kosa izay meloka. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ny anaran-dRalehilahy dia hatao eo amin’ny Israely hoe Fianakavian’ilay nalana kapa.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fihetsika tsy azo atao amin’ny fifandirana
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha misy olona miady ka manatona hamonjy ny vadiny amin’ny tanan’izay mamely azy ny vadin’ny iray, ary manatsotra ny tanany ka mandray azy amin’ny ankasarotana, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: dia hotapahinao ny tanany; fa tsy hiantra azy ny masonao.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fahamarinana amin’ny varotra
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aoka tsy hisy vato roa samihafa, lehibe sy kely, ao anatin’ny kitaponao. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aoka tsy hisy famarana mihoatra sy latsaka ao an-tranonao. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vato feno lanja sady marina ary famarana tonga ohatra sady marina no aoka hotananao mba ho maro andro ianao any amin’ny tany izay omen’NY TOMPO Andriamanitrao anao. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa fahavetavetana eo imason’NY TOMPO Andriamanitrao izay rehetra mahavita ireo zavatra ireo, dia izay rehetra manao ny tsy marina.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny Amalekita, fahavalo amin’ny taranaka mifandimby
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsarovy izay nataon’ny Amalekita taminao teny an-dalana tamin’ny nivoahanareo avy tany Ejipta, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia ny nitsenany anao teny an-dalana sy ny namelezany ny vodilalanao, dia izay rehetra tsy afaka teo aoriananao, raha reraka sy sasatra ianao; fa tsy natahotra an’Andriamanitra izy. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Rehefa omen’NY TOMPO Andriamanitrao fitsaharana amin’ny fahavalonao rehetra manodidina ianao any amin’ny tany izay omen’NY TOMPO Andriamanitrao anao ho lovanao dia hovonoinao tsy ho eo ambanin’ny lanitra intsony ny fahatsiarovana ny Amalekita; aza hadinoinao izany.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha tokony hokapohina ny meloka dia aoka hampandrian’ny mpitsara izy ka hokapohina eo anatrehany, ary hatao araka ny helony ny isan’ny kapoka hatao aminy. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Hatramin’ny efapolo no kapoka azo atao aminy, fa tsy azo atao mihoatra; fandrao raha mihoatra noho izany dia ho toy ny tsinontsinona eo imasonao ny rahalahinao.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny omby miasa
    marker-yv: yv-h
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Aza manakombona ny vavan’ny omby manosihosy vary.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Lalàna ny amin’ny vady loloha
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha misy mpirahalahy miara-monina ka maty momba ny iray dia aoka tsy hanambady vahiny any ivelany ny vadin’ny maty; fa ny rahalahin’ny vadiny ihany no aoka hanambady azy ka hitondra loloha azy. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny lahimatoa izay haterany dia hitondra ny anaran’ilay rahalahiny izay efa maty mba tsy ho faty maso eo amin’ny Israely izy io. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary raha tsy ankasitrahin-dRalehilahy ny hitondra loloha ny vadin’ny rahalahiny dia aoka hankeo amin’ny vavahady ho eo amin’ny loholona Ravehivavy ka hiteny hoe: Ny rahalahin’ny vadiko dia tsy mety mamelo-maso ny rahalahiny, fa tsy mety mitondra loloha ahy. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia antsoin’ny loholona ao amin’ny tanàna Ralehilahy ka adininy; ary raha mikiry izy ka miteny hoe: Tsy sitrako ny hanambady azy, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia hanatona azy eo anatrehan’ny loholona ny vadin’ny rahalahiny ka hanala ny kapa amin’ny tongo-dRalehilahy, dia handrora amin’ny tavany ka hiteny hoe: Toy izany no hatao amin’izay olona tsy mety mamelo-maso ny rahalahiny. '
