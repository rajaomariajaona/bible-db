document_id: DEU.25,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Fitsarana marina
  - type: text
    content: 'Raha misy olona manana ady ka mankeo amin’ny fitsarana mba ho tsarain’ny mpitsara dia aoka hohamarininy izay marina ary hohelohiny kosa izay meloka. '
  '10':
  - type: text
    content: Ary ny anaran-dRalehilahy dia hatao eo amin’ny Israely hoe Fianakavian’ilay nalana kapa.
  - type: heading
    content: Fihetsika tsy azo atao amin’ny fifandirana
  '11':
  - type: text
    content: 'Raha misy olona miady ka manatona hamonjy ny vadiny amin’ny tanan’izay mamely azy ny vadin’ny iray, ary manatsotra ny tanany ka mandray azy amin’ny ankasarotana, '
  '12':
  - type: text
    content: dia hotapahinao ny tanany; fa tsy hiantra azy ny masonao.
  - type: heading
    content: Fahamarinana amin’ny varotra
  '13':
  - type: text
    content: 'Aoka tsy hisy vato roa samihafa, lehibe sy kely, ao anatin’ny kitaponao. '
  '14':
  - type: text
    content: 'Aoka tsy hisy famarana mihoatra sy latsaka ao an-tranonao. '
  '15':
  - type: text
    content: 'Vato feno lanja sady marina ary famarana tonga ohatra sady marina no aoka hotananao mba ho maro andro ianao any amin’ny tany izay omen’NY TOMPO Andriamanitrao anao. '
  '16':
  - type: text
    content: Fa fahavetavetana eo imason’NY TOMPO Andriamanitrao izay rehetra mahavita ireo zavatra ireo, dia izay rehetra manao ny tsy marina.
  - type: heading
    content: Ny Amalekita, fahavalo amin’ny taranaka mifandimby
  '17':
  - type: text
    content: 'Tsarovy izay nataon’ny Amalekita taminao teny an-dalana tamin’ny nivoahanareo avy tany Ejipta, '
  '18':
  - type: text
    content: 'dia ny nitsenany anao teny an-dalana sy ny namelezany ny vodilalanao, dia izay rehetra tsy afaka teo aoriananao, raha reraka sy sasatra ianao; fa tsy natahotra an’Andriamanitra izy. '
  '19':
  - type: text
    content: Rehefa omen’NY TOMPO Andriamanitrao fitsaharana amin’ny fahavalonao rehetra manodidina ianao any amin’ny tany izay omen’NY TOMPO Andriamanitrao anao ho lovanao dia hovonoinao tsy ho eo ambanin’ny lanitra intsony ny fahatsiarovana ny Amalekita; aza hadinoinao izany.
  '2':
  - type: text
    content: 'Raha tokony hokapohina ny meloka dia aoka hampandrian’ny mpitsara izy ka hokapohina eo anatrehany, ary hatao araka ny helony ny isan’ny kapoka hatao aminy. '
  '3':
  - type: text
    content: Hatramin’ny efapolo no kapoka azo atao aminy, fa tsy azo atao mihoatra; fandrao raha mihoatra noho izany dia ho toy ny tsinontsinona eo imasonao ny rahalahinao.
  - type: heading
    content: Ny omby miasa
  '4':
  - type: text
    content: Aza manakombona ny vavan’ny omby manosihosy vary.
  - type: heading
    content: Lalàna ny amin’ny vady loloha
  '5':
  - type: text
    content: 'Raha misy mpirahalahy miara-monina ka maty momba ny iray dia aoka tsy hanambady vahiny any ivelany ny vadin’ny maty; fa ny rahalahin’ny vadiny ihany no aoka hanambady azy ka hitondra loloha azy. '
  '6':
  - type: text
    content: 'Ny lahimatoa izay haterany dia hitondra ny anaran’ilay rahalahiny izay efa maty mba tsy ho faty maso eo amin’ny Israely izy io. '
  '7':
  - type: text
    content: 'Ary raha tsy ankasitrahin-dRalehilahy ny hitondra loloha ny vadin’ny rahalahiny dia aoka hankeo amin’ny vavahady ho eo amin’ny loholona Ravehivavy ka hiteny hoe: Ny rahalahin’ny vadiko dia tsy mety mamelo-maso ny rahalahiny, fa tsy mety mitondra loloha ahy. '
  '8':
  - type: text
    content: 'Dia antsoin’ny loholona ao amin’ny tanàna Ralehilahy ka adininy; ary raha mikiry izy ka miteny hoe: Tsy sitrako ny hanambady azy, '
  '9':
  - type: text
    content: 'dia hanatona azy eo anatrehan’ny loholona ny vadin’ny rahalahiny ka hanala ny kapa amin’ny tongo-dRalehilahy, dia handrora amin’ny tavany ka hiteny hoe: Toy izany no hatao amin’izay olona tsy mety mamelo-maso ny rahalahiny. '
