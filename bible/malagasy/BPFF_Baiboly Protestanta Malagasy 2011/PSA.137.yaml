document_id: PSA.137,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Teo amoron’ny onin’i Babilona
  - type: text
    content: Teo amoron’ny onin’i Babilona
  - type: text
    content: no nipetrahanay sady nitomanianay
  - type: text
    content: 'raha nahatsiaro an’i '
  - type: text
    content: Ziona
  - type: text
    content: ' izahay.'
  '2':
  - type: text
    content: Teo amin’ny hazomalahelo teo afovoan’i Babilona
  - type: text
    content: no nanantonanay ny lokanganay.
  '3':
  - type: text
    content: Fa teo dia nangataka anay hihira ny mpamabo anay
  - type: text
    content: 'ary ny mpampahory anay dia nangataka anay hanao fifaliana ka niteny hoe:'
  - type: text
    content: Manaova hiran’i Ziona eto anatrehanay.
  '4':
  - type: text
    content: Nefa ho nataontsika ahoana ny ho fihira ny hiran’NY TOMPO
  - type: text
    content: tany an-tany fivahinianana?
  '5':
  - type: text
    content: Raha manadino anao aho, ry Jerosalema ô,
  - type: text
    content: dia aoka ny tanako havanana mba hanadino.
  '6':
  - type: text
    content: Raha tsy mahatsiaro anao aho
  - type: text
    content: dia aoka ny lelako hiraikitra amin’ny lanilaniko,
  - type: text
    content: raha tsy Jerosalema no ataoko ambony
  - type: text
    content: indrindra amin’ny fifaliako rehetra.
  '7':
  - type: text
    content: TOMPO ô, tsarovy amin’ny taranak’i Edoma
  - type: text
    content: ny andron’i Jerosalema,
  - type: text
    content: 'dia ireo izay nilaza hoe: Ravao, ravao izy'
  - type: text
    content: hatramin’ny fanorenany.
  '8':
  - type: text
    content: Ry Babilona zanakavavy izay an-dalana ho rava,
  - type: text
    content: sambatra izay mamaly anao
  - type: text
    content: araka izay nataonao taminay.
  '9':
  - type: text
    content: Sambatra izay maka ny zanakao madinika
  - type: text
    content: ka manjera azy ho torotoro amin’ny harambato.
