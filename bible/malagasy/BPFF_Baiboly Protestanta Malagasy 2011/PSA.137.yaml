- type: usfm
  marker: s1
  children:
  - type: text
    text: Teo amoron’ny onin’i Babilona
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Teo amoron’ny onin’i Babilona
- type: usfm
  marker: q1
  children:
  - type: text
    text: no nipetrahanay sady nitomanianay
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'raha nahatsiaro an’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Ziona
  - type: text
    text: ' izahay.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Teo amin’ny hazomalahelo teo afovoan’i Babilona
- type: usfm
  marker: q1
  children:
  - type: text
    text: no nanantonanay ny lokanganay.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Fa teo dia nangataka anay hihira ny mpamabo anay
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ary ny mpampahory anay dia nangataka anay hanao fifaliana ka niteny hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Manaova hiran’i Ziona eto anatrehanay.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Nefa ho nataontsika ahoana ny ho fihira ny hiran’NY TOMPO
- type: usfm
  marker: q1
  children:
  - type: text
    text: tany an-tany fivahinianana?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Raha manadino anao aho, ry Jerosalema ô,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia aoka ny tanako havanana mba hanadino.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Raha tsy mahatsiaro anao aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia aoka ny lelako hiraikitra amin’ny lanilaniko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: raha tsy Jerosalema no ataoko ambony
- type: usfm
  marker: q1
  children:
  - type: text
    text: indrindra amin’ny fifaliako rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: TOMPO ô, tsarovy amin’ny taranak’i Edoma
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny andron’i Jerosalema,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'dia ireo izay nilaza hoe: Ravao, ravao izy'
- type: usfm
  marker: q1
  children:
  - type: text
    text: hatramin’ny fanorenany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ry Babilona zanakavavy izay an-dalana ho rava,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sambatra izay mamaly anao
- type: usfm
  marker: q1
  children:
  - type: text
    text: araka izay nataonao taminay.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Sambatra izay maka ny zanakao madinika
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka manjera azy ho torotoro amin’ny harambato.
