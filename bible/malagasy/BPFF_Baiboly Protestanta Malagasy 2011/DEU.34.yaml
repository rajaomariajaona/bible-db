document_id: DEU.34,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nahafatesan’i Mosesy
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia niakatra niala teo amin’ireo tany ngazana any Moaba i Mosesy ka nankany an-tendrombohitra Nebo, ao an-tampon’i Pisga, izay tandrifin’i Jeriko. Ary nasehon’NY TOMPO azy ny tany manontolo: Gileada hatrany Dana, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsy nisy mpaminany tahaka an’i Mosesy intsony niseho teo amin’ny Israely, izay fantatry NY TOMPO nifanatrika, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'tamin’ny famantarana rehetra sy ny fahagagana, izay nanirahan’NY TOMPO azy mba hataony tany Ejipta tamin’i Farao sy ny mpanompony rehetra ary ny taniny rehetra; '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ary tamin’ny tanana mahery sy ny asa lehibe sady mahatahotra, izay nasehon’i Mosesy teo imason’ny Israely rehetra.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'i Naftaly manontolo, ny tanin’i Efraima sy i Manase, ny tanin’i Joda manontolo hatramin’ny ranomasina andrefana '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary i Negeva sy ny ao amin’ny lohasahan’i Jeriko, tanàna be palma, hatrany Zoara. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy NY TOMPO taminy: Io no tany izay nianianako tamin’i Abrahama sy Isaka ary i Jakoba hoe: Homeko ny taranakao izy; nataoko mahita azy ny masonao, nefa tsy ho tafita ho tonga eny ianao.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary i Mosesy, mpanompon’NY TOMPO, dia maty teo amin’ny tany Moaba araka ny tenin’NY TOMPO. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Naleviny tao an-dohasaha tao amin’ny tany Moaba, tandrifin’i Bety-Peora, izy. Tsy misy olona mahafantatra ny fasany mandraka androany. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Efa roapolo amby zato taona i Mosesy vao maty; tsy pahina ny masony na nihena ny heriny. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nisaona an’i Mosesy nandritra ny telopolo andro teo amin’ny tany ngazana any Moaba ny Zanak’Israely; dia tapitra ny andro fitomaniana nisaonana an’i Mosesy.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary i Josoa, zanak’i Nona, dia feno ny fanahim-pahendrena, satria efa nametrahan’i Mosesy tanana izy; dia nihaino azy ny Zanak’Israely ka nanatanteraka izay nandidian’NY TOMPO an’i Mosesy.
