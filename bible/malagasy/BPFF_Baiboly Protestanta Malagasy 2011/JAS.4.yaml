document_id: JAS.4,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Misy olona manana fo miefitrefitra
  - type: text
    content: 'Avy aiza ny ady ary avy aiza ny fifandirana eo aminareo? Moa tsy ny filanareo izay miady ao anatin’ny tenanareo va no iavian’izany? '
  '10':
  - type: text
    content: Manetre tena eo anatrehan’ny Tompo dia hanandratra anareo Izy.
  - type: heading
    content: Iza moa ianao no mitsara ny rahalahinao?
  '11':
  - type: text
    content: 'Aza mifanaratsy, ry rahalahy. Izay manaratsy ny rahalahiny na mitsara ny rahalahiny dia manaratsy ny lalàna sy mitsara ny lalàna; fa raha mitsara ny lalàna ianao dia tsy mpankato ny lalàna fa mpitsara. '
  '12':
  - type: text
    content: Iray ihany no Mpanome lalàna sy Mpitsara, dia Ilay mahavonjy sy mahavery; fa iza moa ianao no mitsara ny namanao?
  - type: heading
    content: Ireo izay manam-pikasana feno fireharehana
  '13':
  - type: text
    content: 'E! Ianareo izay miteny hoe: Anio na ampitso dia hankany Ananona izahay ary hitoetra any herintaona ka hividy sy hivarotra dia hahazo tombom-barotra; '
  '14':
  - type: text
    content: 'kanefa tsy mahalala ny ho ampitso ianareo! Inona moa ny ainareo? Fa zavona ihany ianareo; miseho vetivety dia levona. '
  '15':
  - type: text
    content: 'Fa aleo miteny hoe: Raha sitrapon’ny Tompo ka velona izahay dia hataonay izao na izany. '
  '16':
  - type: text
    content: 'Fa izao, mirehareha amin’ny fahasahianareo ianareo. Ratsy ny fireharehana rehetra toy izany. '
  '17':
  - type: text
    content: Koa izay mahalala hanao soa nefa tsy manao soa dia heloka ho azy izany.
  '2':
  - type: text
    content: 'Maniry zavatra ianareo nefa tsy manana; mamono olona sy mialona ianareo nefa tsy mety mahazo ihany; mifandìtra sy miady ianareo nefa tsy manana satria tsy mangataka. '
  '3':
  - type: text
    content: 'Mangataka ianareo nefa tsy mahazo ihany satria diso fangataka fa mba holaninareo amin’ny filanareo fotsiny. '
  '4':
  - type: text
    content: 'Ry mpijangajanga! Tsy fantatrareo va fa fandrafiana an’Andriamanitra ny fisakaizana amin’izao tontolo izao? Koa na iza na iza te ho sakaizan’izao tontolo izao dia fahavalon’Andriamanitra izy. '
  '5':
  - type: text
    content: 'Heverinareo va fa miteniteny foana ny Soratra Masina hoe: Ny fanahy izay nampitoeriny ato anatintsika dia iriny amin’ny fahasaro-piaro. '
  '6':
  - type: text
    content: 'Nefa lehibe kokoa ny fahasoavana omeny, fa hoy izy hoe:'
  - type: text
    content: «Andriamanitra dia manohitra ny mpiavonavona
  - type: text
    content: fa manome fahasoavana ho an’ny manetry tena» (Oha 3.34).
  '7':
  - type: text
    content: 'Koa maneke an’Andriamanitra ianareo; ary manohera ny '
  - type: text
    content: devoly
  - type: text
    content: ' dia handositra anareo izy. '
  '8':
  - type: text
    content: 'Manatòna an’Andriamanitra dia hanatona anareo Izy. Diovy ny tananareo, ry mpanota, ary ataovy madio ny fonareo, ry mpiroa saina! '
  '9':
  - type: text
    content: 'Oria sy mitomania ary midradradradrà! Aoka hody fitomaniana ny fihomehezanareo ary hody fanjoretana ny fifalianareo! '
