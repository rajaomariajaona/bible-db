document_id: JAS.4,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Misy olona manana fo miefitrefitra
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Avy aiza ny ady ary avy aiza ny fifandirana eo aminareo? Moa tsy ny filanareo izay miady ao anatin’ny tenanareo va no iavian’izany? '
  '10':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Manetre tena eo anatrehan’ny Tompo dia hanandratra anareo Izy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Iza moa ianao no mitsara ny rahalahinao?
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Aza mifanaratsy, ry rahalahy. Izay manaratsy ny rahalahiny na mitsara ny rahalahiny dia manaratsy ny lalàna sy mitsara ny lalàna; fa raha mitsara ny lalàna ianao dia tsy mpankato ny lalàna fa mpitsara. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Iray ihany no Mpanome lalàna sy Mpitsara, dia Ilay mahavonjy sy mahavery; fa iza moa ianao no mitsara ny namanao?
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ireo izay manam-pikasana feno fireharehana
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'E! Ianareo izay miteny hoe: Anio na ampitso dia hankany Ananona izahay ary hitoetra any herintaona ka hividy sy hivarotra dia hahazo tombom-barotra; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'kanefa tsy mahalala ny ho ampitso ianareo! Inona moa ny ainareo? Fa zavona ihany ianareo; miseho vetivety dia levona. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Fa aleo miteny hoe: Raha sitrapon’ny Tompo ka velona izahay dia hataonay izao na izany. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Fa izao, mirehareha amin’ny fahasahianareo ianareo. Ratsy ny fireharehana rehetra toy izany. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Koa izay mahalala hanao soa nefa tsy manao soa dia heloka ho azy izany.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Maniry zavatra ianareo nefa tsy manana; mamono olona sy mialona ianareo nefa tsy mety mahazo ihany; mifandìtra sy miady ianareo nefa tsy manana satria tsy mangataka. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Mangataka ianareo nefa tsy mahazo ihany satria diso fangataka fa mba holaninareo amin’ny filanareo fotsiny. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ry mpijangajanga! Tsy fantatrareo va fa fandrafiana an’Andriamanitra ny fisakaizana amin’izao tontolo izao? Koa na iza na iza te ho sakaizan’izao tontolo izao dia fahavalon’Andriamanitra izy. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Heverinareo va fa miteniteny foana ny Soratra Masina hoe: Ny fanahy izay nampitoeriny ato anatintsika dia iriny amin’ny fahasaro-piaro. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Nefa lehibe kokoa ny fahasoavana omeny, fa hoy izy hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Andriamanitra dia manohitra ny mpiavonavona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa manome fahasoavana ho an’ny manetry tena» (Oha 3.34).
  '7':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Koa maneke an’Andriamanitra ianareo; ary manohera ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: devoly
    - type: text
      text: ' dia handositra anareo izy. '
  '8':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Manatòna an’Andriamanitra dia hanatona anareo Izy. Diovy ny tananareo, ry mpanota, ary ataovy madio ny fonareo, ry mpiroa saina! '
  '9':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Oria sy mitomania ary midradradradrà! Aoka hody fitomaniana ny fihomehezanareo ary hody fanjoretana ny fifalianareo! '
