document_id: 1CO.1,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fiarahabana
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'I Paoly, voaantso ho apostolin’i Jesosy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ' noho ny sitrapon’Andriamanitra, sy i Sostena rahalahy, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Mananatra anareo aho, ry rahalahy, amin’ny anaran’i Jesosy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ' Tompontsika, mba hiray teny ianareo rehetra ka tsy hisy fisarahana eo aminareo, fa mba ho tafakambana tsara ka hiray saina sy hevitra. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Efa nambaran’ny avy amin’ny ankohonan’i Kloa tamiko mantsy ny mombamomba anareo, ry rahalahiko, fa misy fifampiandaniana eo aminareo. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Miteny izany aho satria misy aminareo milaza hoe: Izaho dia an’i Paoly, izaho dia an’i Apolosy, izaho dia an’i Kefasy, izaho dia an’i Kristy. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Voazarazara va Kristy? I Paoly va no voahombo tamin’ny hazofijaliana hamonjy anareo, sa ho amin’ny anaran’i Paoly no nanaovana batisa anareo? '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Misaotra an’Andriamanitra aho fa tsy nisy nataoko batisa ianareo, afa-tsy i Krispo sy i Gaio, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'fandrao misy milaza fa efa natao batisa ho amin’ny anarako ianareo. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Mba efa nanao batisa ny ankohonan’i Stefanasy koa anefa aho; ankoatra ireo dia tsy hitako izay nataoko batisa. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Fa tsy naniraka ahy hanao batisa Kristy fa hitory ny Filazantsara, tsy tamin’ny teny fahendrena, fandrao ho foana ny hazofijalian’i Kristy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesosy Kristy, herin’Andriamanitra sy fahendren’Andrimanitra
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Fa ny teny ny amin’ny hazofijaliana dia fahadalana amin’izay ho very fa herin’Andriamanitra kosa amintsika izay hovonjena. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Fa voasoratra hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Horavako ny fahendren’ny hendry
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary holaviko ny fahalalan’ny mahalala» (Isa 29.14).
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'no mamangy ny fiangonan’Andriamanitra any Korinto, dia izay nohamasinina ao amin’i Kristy Jesosy, olona voaantso sady masina, mbamin’izay rehetra miantso ny anaran’i Jesosy Kristy Tompontsika eny amin’ny tany rehetra, dia izay sady Tompon’ireny no Tompontsika koa: '
  '20':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Aiza ny hendry? Aiza ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpanoradalàna
    - type: text
      text: '? Aiza ny mpiady hevitra avy amin’izao tontolo izao? Tsy nampodin’Andriamanitra ho fahadalana va ny fahendren’izao tontolo izao? '
  '21':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Satria, na dia naseho aza ny fahendren’Andriamanitra, ny fahendrena dia tsy nahatonga izao tontolo izao hahalala an’Andriamanitra, koa ny fahadalan’ny fitorian-teny no sitrak’Andriamanitra hamonjeny izay mino. '
  '22':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Fa mila famantarana ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jiosy
    - type: text
      text: ', ary mitady fahendrena ny Grika, '
  '23':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'fa izahay kosa dia mitory an’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ' voahombo tamin’ny hazofijaliana, dia fahatafintohinana amin’ny Jiosy ary fahadalana amin’ny Grika, '
  '24':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'fa amin’izay voaantso kosa, na Jiosy na Grika, dia Kristy izay herin’Andriamanitra sy fahendren’Andriamanitra. '
  '25':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Fa ny fahadalan’Andriamanitra dia hendry noho ny olona, ary ny fahalemen’Andriamanitra dia mahery noho ny olona.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ireo nofidin’Andriamanitra
    marker-yv: yv-h
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Mba hevero ny fiantsoana anareo, ry rahalahy, fa tsy firy ny olon-kendry araka ny nofo, tsy firy ny olona mahery, tsy firy ny avo razana; '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'fa ny adala amin’izao tontolo izao no nofidin’Andriamanitra hampahamenatra ny hendry; ary ny malemy amin’izao tontolo izao no nofidin’Andriamanitra hampahamenatra ny mahery; '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'ary ny iva razana amin’izao tontolo izao sy izay fanevateva no nofidin’Andriamanitra, dia ny atao ho tsy misy aza, mba hahafoana ny misy, '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'mba tsy hisy nofo hahazo hirehareha eo anatrehan’Andriamanitra. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Ho aminareo anie ny fahasoavana sy ny fiadanana avy amin’Andriamanitra Raintsika sy Jesosy Kristy Tompo.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fahasoavana raisina ao amin’i Kristy
    marker-yv: yv-h
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Fa avy aminy no nahatonga anareo ho ao amin’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ' Jesosy, izay natao fahendrena avy amin’Andriamanitra ho antsika, ary koa fahamarinana, fahamasinana ary fanavotana, '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'mba ho araka ny voasoratra hoe: «Izay mirehareha, aoka NY TOMPO no ho reharehany» (Jer 9.23).'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Misaotra an’Andriamanitro mandrakariva ny aminareo aho noho ny fahasoavan’Andriamanitra izay nomena anareo ao amin’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ' Jesosy, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'dia ny nampanankarena anareo ao Aminy amin’ny zavatra rehetra, na ny teny rehetra, na ny fahalalana rehetra, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'araka ny niorenan’ny filazana an’i Kristy teo aminareo, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'koa tsy misy tsy anananareo ny fanomezam-pahasoavana rehetra, eo am-piandrasana ny fisehoan’i Jesosy Kristy Tompontsika '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'izay hampiorina anareo koa hatramin’ny farany ka tsy hanan-tsiny ianareo amin’ny andron’i Jesosy Kristy Tompontsika. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Mahatoky Andriamanitra izay nahatonga anareo ho voaantso, hanananareo firaisana amin’ny Zanany, dia Jesosy Kristy Tompontsika.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fifampiandaniana tao amin’ny fiangonana tao Korinto
    marker-yv: yv-h
