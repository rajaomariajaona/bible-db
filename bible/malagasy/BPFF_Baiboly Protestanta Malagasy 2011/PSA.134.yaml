document_id: PSA.134,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Misaora NY TOMPO!
  - type: text
    content: Hira fanao amin’ny fiakarana.
  - type: text
    content: Andeha, misaora NY TOMPO, ianareo rehetra mpanompon’NY TOMPO,
  - type: text
    content: izay maharitra alina ao amin’ny tranon’NY TOMPO.
  '2':
  - type: text
    content: Manandrata ny tananareo mankany amin’ny fitoerana masina
  - type: text
    content: ka misaora NY TOMPO.
  '3':
  - type: text
    content: 'Hitahy anao avy ao '
  - type: text
    content: Ziona
  - type: text
    content: ' anie NY TOMPO,'
  - type: text
    content: Mpanao ny lanitra sy ny tany.
