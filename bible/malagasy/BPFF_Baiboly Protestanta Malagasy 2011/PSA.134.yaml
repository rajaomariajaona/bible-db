document_id: PSA.134,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Misaora NY TOMPO!
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: Hira fanao amin’ny fiakarana.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Andeha, misaora NY TOMPO, ianareo rehetra mpanompon’NY TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay maharitra alina ao amin’ny tranon’NY TOMPO.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manandrata ny tananareo mankany amin’ny fitoerana masina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka misaora NY TOMPO.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Hitahy anao avy ao '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Ziona
    - type: text
      text: ' anie NY TOMPO,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mpanao ny lanitra sy ny tany.
