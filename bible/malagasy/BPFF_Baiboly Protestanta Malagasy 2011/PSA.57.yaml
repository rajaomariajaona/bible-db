document_id: PSA.57,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Miantso an’Andriamanitra Avo Indrindra aho
  - type: text
    content: Ho an’ny mpiventy hira. Al-tashet. Miktama nataon’i Davida tamin’ny nandosirany an’i Saoly tao anaty zohy.
  - type: text
    content: Mamindrà fo amiko, Andriamanitra ô, mamindrà fo amiko!
  - type: text
    content: Fa Aminao no ialofako.
  - type: text
    content: Eny, ao amin’ny aloky ny elatrao no ialofako
  - type: text
    content: mandra-pahalasa ny loza.
  '10':
  - type: text
    content: Fa lehibe mihatra amin’ny lanitra ny famindramponao
  - type: text
    content: ary mihatra amin’ny rahona ny fahamarinanao.
  '11':
  - type: text
    content: Misandrata any ambonin’ny lanitra Ianao, Andriamanitra ô!
  - type: text
    content: Aoka ho ambonin’ny tany rehetra ny voninahitrao!
  '2':
  - type: text
    content: Hitaraina amin’Andriamanitra Avo Indrindra aho,
  - type: text
    content: dia amin’Andriamanitra izay manatanteraka ny asany ho ahy.
  '3':
  - type: text
    content: Haniraka famonjena ho ahy avy any an-danitra Izy
  - type: text
    content: 'raha mbola miteny ratsy ny olona izay misafoaka manenjika ahy. '
  - type: text
    content: Fiatoana.
  - type: text
    content: Eny, Andriamanitra haniraka ny famindrampony sy ny fahamarinany.
  '4':
  - type: text
    content: Eo afovoan’ny liona aho;
  - type: text
    content: mandry eo amin’ny mpihinana olona aho;
  - type: text
    content: lefona sy zana-tsipìka ny nifiny ary sabatra maranitra ny lelany.
  '5':
  - type: text
    content: Misandrata any ambonin’ny lanitra Ianao, Andriamanitra ô!
  - type: text
    content: Aoka ho ambonin’ny tany rehetra ny voninahitrao!
  '6':
  - type: text
    content: Namela fandrika harato haningotra ny diako izy
  - type: text
    content: ary nitanondrika aho;
  - type: text
    content: nihady lavaka teo anoloako izy,
  - type: text
    content: 'kanjo ny tenany ihany no latsaka ao anatiny. '
  - type: text
    content: Fiatoana.
  '7':
  - type: text
    content: Tafatoetra ny foko, Andriamanitra ô, eny, tafatoetra ny foko;
  - type: text
    content: hihira sy hankalaza aho.
  '8':
  - type: text
    content: Mifohaza, ry voninahitro!
  - type: text
    content: Mifohaza, ry valiha sy lokanga!
  - type: text
    content: Hampifoha ny maraina aho.
  '9':
  - type: text
    content: Hidera Anao eny amin’ny firenena aho, Tompo ô,
  - type: text
    content: hankalaza Anao eny amin’ny fokom-pirenena aho.
