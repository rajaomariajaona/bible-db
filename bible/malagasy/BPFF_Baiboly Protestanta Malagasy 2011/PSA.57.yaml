document_id: PSA.57,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Miantso an’Andriamanitra Avo Indrindra aho
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: Ho an’ny mpiventy hira. Al-tashet. Miktama nataon’i Davida tamin’ny nandosirany an’i Saoly tao anaty zohy.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Mamindrà fo amiko, Andriamanitra ô, mamindrà fo amiko!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa Aminao no ialofako.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, ao amin’ny aloky ny elatrao no ialofako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mandra-pahalasa ny loza.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Fa lehibe mihatra amin’ny lanitra ny famindramponao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mihatra amin’ny rahona ny fahamarinanao.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Misandrata any ambonin’ny lanitra Ianao, Andriamanitra ô!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka ho ambonin’ny tany rehetra ny voninahitrao!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Hitaraina amin’Andriamanitra Avo Indrindra aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia amin’Andriamanitra izay manatanteraka ny asany ho ahy.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Haniraka famonjena ho ahy avy any an-danitra Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'raha mbola miteny ratsy ny olona izay misafoaka manenjika ahy. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Fiatoana.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, Andriamanitra haniraka ny famindrampony sy ny fahamarinany.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Eo afovoan’ny liona aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mandry eo amin’ny mpihinana olona aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: lefona sy zana-tsipìka ny nifiny ary sabatra maranitra ny lelany.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Misandrata any ambonin’ny lanitra Ianao, Andriamanitra ô!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka ho ambonin’ny tany rehetra ny voninahitrao!
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Namela fandrika harato haningotra ny diako izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary nitanondrika aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nihady lavaka teo anoloako izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'kanjo ny tenany ihany no latsaka ao anatiny. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Fiatoana.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Tafatoetra ny foko, Andriamanitra ô, eny, tafatoetra ny foko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hihira sy hankalaza aho.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Mifohaza, ry voninahitro!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mifohaza, ry valiha sy lokanga!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hampifoha ny maraina aho.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Hidera Anao eny amin’ny firenena aho, Tompo ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hankalaza Anao eny amin’ny fokom-pirenena aho.
