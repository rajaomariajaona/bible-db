document_id: 1KI.3,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Manambady ny zanakavavin’i Farao i Solomona
  - type: text
    content: Tonga vinanton’i Farao, mpanjakan’i Ejipta, i Solomona. Nanambady ny zanakavavin’i Farao izy ary nitondra azy ho ao an-Tanànan’i Davida mandra-pahavitany ny tranony sy ny tranon’NY TOMPO ary ny manda manodidina an’i Jerosalema.
  '10':
  - type: text
    content: 'Sitraky NY TOMPO ny nangatahan’i Solomona izany zavatra izany '
  '11':
  - type: text
    content: 'ka hoy Andriamanitra taminy: Satria nangataka izany zavatra izany ianao fa tsy ny ho ela velona, na ny hanankarena, na ny ain’ny fahavalonao, fa satria fahaizana hitsara no nangatahinao, '
  '12':
  - type: text
    content: 'dia indro, efa nanatanteraka ny teninao Aho, dia efa nanome anao saina hendry sady mahiratra izao, koa tsy nisy tahaka anao ny talohanao, ary tsy hisy ho tahaka anao ny ao aoriananao. '
  '13':
  - type: text
    content: 'Ary na izay tsy nangatahinao aza dia efa nomeko anao koa, dia harena sy voninahitra, ka tsy hisy mpanjaka tahaka anao amin’ny andronao rehetra. '
  '14':
  - type: text
    content: Ary raha mandeha amin’ny lalako ianao ka hitandrina ny lalànako sy ny didiko, tahaka ny nandehanan’i Davida rainao, dia hataoko ela velona ianao.
  '15':
  - type: text
    content: Dia nahatsiaro i Solomona ka indro fa nofy izany. Ary nony tonga tany Jerosalema izy dia nitsangana teo anoloan’ny vata misy ny faneken’NY TOMPO ka nanolotra fanatitra dorana manontolo sy fanati-pihavanana, dia nanao fanasana ho an’ny mpanompony rehetra izy.
  - type: heading
    content: Mitsara amim-pahendrena i Solomona
  '16':
  - type: text
    content: 'Tamin’izay dia nisy vehivavy janga roa nankao amin’ny mpanjaka ka nitsangana teo anatrehany. '
  '17':
  - type: text
    content: 'Hoy ilay vehivavy iray: Trara antitra ianao, tompokolahy! Izaho sy ity vehivavy ity dia miray trano; niteraka tao an-trano aho sady tao koa izy. '
  '18':
  - type: text
    content: 'Nony efa niteraka hateloana aho dia mba niteraka koa Ravehivavy ity. Izahay roa vavy ihany no tao; tsy nisy olon-kafa tao aminay tao an-trano fa izahay roa vavy ihany. '
  '19':
  - type: text
    content: 'Ary maty tamin’ny alina ny zanak’ity Ravehivavy ity, fa voatsindriny. '
  '2':
  - type: text
    content: 'Mbola namono zavatra hatao fanatitra teny amin’ny toerana fanaovana sorona ihany anefa ny olona fa tsy mbola nisy trano vita ho an’ny anaran’NY TOMPO hatramin’izany andro izany. '
  '20':
  - type: text
    content: 'Dia nifoha mamatonalina izy ka naka ny zanako teo amiko tamin’ilay natory iny aho mpanompovavinao, dia nampandriany teo an-tratrany, fa ny azy maty no napetrany teo an-tratrako. '
  '21':
  - type: text
    content: 'Nony nifoha maraina hampinono ny zanako aho, dia indro fa maty. Kanjo rehefa nofantariko izy nony maraina dia hitako fa tsy ny zanako naterako! '
  '22':
  - type: text
    content: 'Hoy kosa anefa ilay iray: Tsia! Ny velona no zanako fa ny maty no zanakao. Nefa hoy indray ny iray: Tsia! Fa ny maty no zanakao ary ny velona no zanako. Izany no tenin’izy ireo teo anatrehan’ny mpanjaka.'
  '23':
  - type: text
    content: 'Hoy ny mpanjaka: Ny iray dia miteny hoe: Ity velona ity no zanako fa ny maty no zanakao! Ary hoy kosa ny iray: Tsia! Fa ny maty no zanakao ary ny velona no zanako! '
  '24':
  - type: text
    content: 'Koa itondray sabatra aho, hoy ny mpanjaka. Dia noentina ho eo anatrehan’ny mpanjaka ny sabatra. '
  '25':
  - type: text
    content: 'Ary hoy ny mpanjaka: Zarao roa ny zaza velona ka omeo ny iray ny antsasany ary ho an’ny iray kosa ny antsasany. '
  '26':
  - type: text
    content: 'Nefa niteny tamin’ny mpanjaka ilay vehivavy, renin’ny zaza velona, satria nandevilevy ny fony noho ny amin’ny zanany ka hoy izy hoe: Tompokolahy ô, trara antitra ianao! Omeo azy ihany ary ny zaza velona fa aza dia vonoina re! Fa hoy kosa ny iray: Aoka tsy ho ahy tsy ho anao fa zarao e! '
  '27':
  - type: text
    content: 'Dia hoy ny mpanjaka: Omeo an’itsy ny zaza velona fa aza vonoina. Io mihitsy no reniny.'
  '28':
  - type: text
    content: Rehefa ren’ny Israely rehetra izany fitsarana nataon’ny mpanjaka izany dia natahotra ny mpanjaka izy, satria hitany fa ao am-pony ny fahendren’Andriamanitra hoentiny mitsara.
  '3':
  - type: text
    content: Ary tia NY TOMPO i Solomona ka nizotra araka ny dian’i Davida rainy; nefa mbola namono zavatra hatao fanatitra sy nandoro ditin-kazo manitra teny amin’ny toerana fanaovana sorona ihany koa izy.
  - type: heading
    content: Mangataka fahendrena amin’Andriamanitra i Solomona mba hahaizany mitondra ny fanjakana
  - type: heading
    content: 2Tan 1.3-13
  '4':
  - type: text
    content: 'Nankany Gibeona mba hamono zavatra hatao fanatitra any ny mpanjaka, fa izany no toerana fanaovana sorona lehibe indrindra. Fanatitra dorana manontolo miisa arivo no naterin’i Solomona teo amin’izany alitara izany. '
  '5':
  - type: text
    content: 'Tao Gibeona no nisehoan’NY TOMPO tamin’i Solomona tamin’ny nofy nony alina. Hoy Andriamanitra: Angataho izay tianao homeko anao. '
  '6':
  - type: text
    content: 'Dia hoy i Solomona: Ianao efa naneho fahasoavana lehibe tamin’i Davida raiko mpanomponao, araka ny nandehanany teo anatrehanao tamin’ny tsy fivadihana sy ny fahamarinana ary ny fahitsian’ny fony taminao; ary Ianao efa nitahiry izao fahasoavana lehibe izao ho azy, dia ny nanomezanao azy zanakalahy hipetraka eo amin’ny sezafiandrianany tahaka ny amin’izao anio izao. '
  '7':
  - type: text
    content: 'Koa ankehitriny, ry TOMPO Andriamanitro ô, Ianao efa nampanjaka ahy mpanomponao handimby an’i Davida raiko; nefa izaho moa mbola zaza ihany ka tsy fantatro akory izay tokony hataoko. '
  '8':
  - type: text
    content: 'Ary izaho mpanomponao koa dia eo afovoan’ny olonao izay nofidinao, sady olona betsaka tsy tambo isaina ary tsy hita isa noho ny hamaroany. '
  '9':
  - type: text
    content: Koa omeo ahy mpanomponao ny saina mahiratra hoentiko mitsara ny olonao, mba hahaizako manavaka ny soa sy ny ratsy! Fa iza moa no mahay mitsara izao olona betsaka izao?
