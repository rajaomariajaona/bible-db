document_id: 1KI.3
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Manambady ny zanakavavin’i Farao i Solomona
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Tonga vinanton’i Farao, mpanjakan’i Ejipta, i Solomona. Nanambady ny zanakavavin’i Farao izy ary nitondra azy ho ao an-Tanànan’i Davida mandra-pahavitany ny tranony sy ny tranon’NY TOMPO ary ny manda manodidina an’i Jerosalema.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Mbola namono zavatra hatao fanatitra teny amin’ny toerana fanaovana sorona ihany anefa ny olona fa tsy mbola nisy trano vita ho an’ny anaran’NY TOMPO hatramin’izany andro izany. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ary tia NY TOMPO i Solomona ka nizotra araka ny dian’i Davida rainy; nefa mbola namono zavatra hatao fanatitra sy nandoro ditin-kazo manitra teny amin’ny toerana fanaovana sorona ihany koa izy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mangataka fahendrena amin’Andriamanitra i Solomona mba hahaizany mitondra ny fanjakana
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 2Tan 1.3-13
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Nankany Gibeona mba hamono zavatra hatao fanatitra any ny mpanjaka, fa izany no toerana fanaovana sorona lehibe indrindra. Fanatitra dorana manontolo miisa arivo no naterin’i Solomona teo amin’izany alitara izany. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Tao Gibeona no nisehoan’NY TOMPO tamin’i Solomona tamin’ny nofy nony alina. Hoy Andriamanitra: Angataho izay tianao homeko anao. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia hoy i Solomona: Ianao efa naneho fahasoavana lehibe tamin’i Davida raiko mpanomponao, araka ny nandehanany teo anatrehanao tamin’ny tsy fivadihana sy ny fahamarinana ary ny fahitsian’ny fony taminao; ary Ianao efa nitahiry izao fahasoavana lehibe izao ho azy, dia ny nanomezanao azy zanakalahy hipetraka eo amin’ny sezafiandrianany tahaka ny amin’izao anio izao. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Koa ankehitriny, ry TOMPO Andriamanitro ô, Ianao efa nampanjaka ahy mpanomponao handimby an’i Davida raiko; nefa izaho moa mbola zaza ihany ka tsy fantatro akory izay tokony hataoko. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary izaho mpanomponao koa dia eo afovoan’ny olonao izay nofidinao, sady olona betsaka tsy tambo isaina ary tsy hita isa noho ny hamaroany. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Koa omeo ahy mpanomponao ny saina mahiratra hoentiko mitsara ny olonao, mba hahaizako manavaka ny soa sy ny ratsy! Fa iza moa no mahay mitsara izao olona betsaka izao?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Sitraky NY TOMPO ny nangatahan’i Solomona izany zavatra izany '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'ka hoy Andriamanitra taminy: Satria nangataka izany zavatra izany ianao fa tsy ny ho ela velona, na ny hanankarena, na ny ain’ny fahavalonao, fa satria fahaizana hitsara no nangatahinao, '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'dia indro, efa nanatanteraka ny teninao Aho, dia efa nanome anao saina hendry sady mahiratra izao, koa tsy nisy tahaka anao ny talohanao, ary tsy hisy ho tahaka anao ny ao aoriananao. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary na izay tsy nangatahinao aza dia efa nomeko anao koa, dia harena sy voninahitra, ka tsy hisy mpanjaka tahaka anao amin’ny andronao rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ary raha mandeha amin’ny lalako ianao ka hitandrina ny lalànako sy ny didiko, tahaka ny nandehanan’i Davida rainao, dia hataoko ela velona ianao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Dia nahatsiaro i Solomona ka indro fa nofy izany. Ary nony tonga tany Jerosalema izy dia nitsangana teo anoloan’ny vata misy ny faneken’NY TOMPO ka nanolotra fanatitra dorana manontolo sy fanati-pihavanana, dia nanao fanasana ho an’ny mpanompony rehetra izy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mitsara amim-pahendrena i Solomona
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Tamin’izay dia nisy vehivavy janga roa nankao amin’ny mpanjaka ka nitsangana teo anatrehany. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Hoy ilay vehivavy iray: Trara antitra ianao, tompokolahy! Izaho sy ity vehivavy ity dia miray trano; niteraka tao an-trano aho sady tao koa izy. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Nony efa niteraka hateloana aho dia mba niteraka koa Ravehivavy ity. Izahay roa vavy ihany no tao; tsy nisy olon-kafa tao aminay tao an-trano fa izahay roa vavy ihany. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary maty tamin’ny alina ny zanak’ity Ravehivavy ity, fa voatsindriny. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Dia nifoha mamatonalina izy ka naka ny zanako teo amiko tamin’ilay natory iny aho mpanompovavinao, dia nampandriany teo an-tratrany, fa ny azy maty no napetrany teo an-tratrako. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Nony nifoha maraina hampinono ny zanako aho, dia indro fa maty. Kanjo rehefa nofantariko izy nony maraina dia hitako fa tsy ny zanako naterako! '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Hoy kosa anefa ilay iray: Tsia! Ny velona no zanako fa ny maty no zanakao. Nefa hoy indray ny iray: Tsia! Fa ny maty no zanakao ary ny velona no zanako. Izany no tenin’izy ireo teo anatrehan’ny mpanjaka.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Hoy ny mpanjaka: Ny iray dia miteny hoe: Ity velona ity no zanako fa ny maty no zanakao! Ary hoy kosa ny iray: Tsia! Fa ny maty no zanakao ary ny velona no zanako! '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Koa itondray sabatra aho, hoy ny mpanjaka. Dia noentina ho eo anatrehan’ny mpanjaka ny sabatra. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary hoy ny mpanjaka: Zarao roa ny zaza velona ka omeo ny iray ny antsasany ary ho an’ny iray kosa ny antsasany. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Nefa niteny tamin’ny mpanjaka ilay vehivavy, renin’ny zaza velona, satria nandevilevy ny fony noho ny amin’ny zanany ka hoy izy hoe: Tompokolahy ô, trara antitra ianao! Omeo azy ihany ary ny zaza velona fa aza dia vonoina re! Fa hoy kosa ny iray: Aoka tsy ho ahy tsy ho anao fa zarao e! '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Dia hoy ny mpanjaka: Omeo an’itsy ny zaza velona fa aza vonoina. Io mihitsy no reniny.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Rehefa ren’ny Israely rehetra izany fitsarana nataon’ny mpanjaka izany dia natahotra ny mpanjaka izy, satria hitany fa ao am-pony ny fahendren’Andriamanitra hoentiny mitsara.
