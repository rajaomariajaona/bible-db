document_id: PSA.2
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny mpanjaka voatendrin’NY TOMPO
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Nahoana no mitabataba ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jentilisa
  - type: text
    text: '?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nahoana no mimenomenom-poana ny firenena?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Mitsangana ireo mpanjakan’ny tany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary miara-mioko ny mpanapaka
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'mba hanohitra NY TOMPO sy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Mesiany
  - type: text
    text: ' ka miteny hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Aoka hotapahintsika ny gadrany ka hariantsika hiala amintsika ny famehezany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Mihomehy izay mipetraka any an-danitra.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Maneso azy ireo ny Tompo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Dia hiteny azy amin’ny fahavinirany Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ka hampangorohoro azy amin’ny fahatezerany hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Izaho anefa no nanendry ny Mpanjakako
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'teo ambonin’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Ziona
  - type: text
    text: ', tendrombohitro masina.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Hanambara didy navoakan’NY TOMPO Aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Izy no nilaza Tamiko hoe: Zanako Ianao!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izaho no niteraka Anao androany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Mangataha Amiko dia homeko ho lovanao ny Jentilisa
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ho fanananao ny tany rehetra;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: hotorotoroinao amin’ny tehim-by izy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Toy ny famaky vilany tany no hanamontsamontsananao azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ary ankehitriny dia aoka ho hendry ianareo ry mpanjaka!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Minoa anatra ianareo ry mpitsaran’ny tany!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Manompoa NY TOMPO amin’ny fahatahorana
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary miravoravoa amin’ny fangovitana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Orohy ny Zanaka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fandrao ho tezitra Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka ho levona eny an-dalana ianareo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa vetivety dia mirehitra ny hatezerany.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sambatra izay rehetra mialoka Aminy.
