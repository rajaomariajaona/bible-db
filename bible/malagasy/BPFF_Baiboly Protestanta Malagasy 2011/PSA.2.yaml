document_id: PSA.2,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny mpanjaka voatendrin’NY TOMPO
  - type: text
    content: 'Nahoana no mitabataba ny '
  - type: text
    content: Jentilisa
  - type: text
    content: '?'
  - type: text
    content: Nahoana no mimenomenom-poana ny firenena?
  '10':
  - type: text
    content: Ary ankehitriny dia aoka ho hendry ianareo ry mpanjaka!
  - type: text
    content: Minoa anatra ianareo ry mpitsaran’ny tany!
  '11':
  - type: text
    content: Manompoa NY TOMPO amin’ny fahatahorana
  - type: text
    content: ary miravoravoa amin’ny fangovitana.
  '12':
  - type: text
    content: Orohy ny Zanaka,
  - type: text
    content: fandrao ho tezitra Izy
  - type: text
    content: ka ho levona eny an-dalana ianareo;
  - type: text
    content: fa vetivety dia mirehitra ny hatezerany.
  - type: text
    content: Sambatra izay rehetra mialoka Aminy.
  '2':
  - type: text
    content: Mitsangana ireo mpanjakan’ny tany,
  - type: text
    content: ary miara-mioko ny mpanapaka
  - type: text
    content: 'mba hanohitra NY TOMPO sy ny '
  - type: text
    content: Mesiany
  - type: text
    content: ' ka miteny hoe:'
  '3':
  - type: text
    content: Aoka hotapahintsika ny gadrany ka hariantsika hiala amintsika ny famehezany.
  '4':
  - type: text
    content: Mihomehy izay mipetraka any an-danitra.
  - type: text
    content: Maneso azy ireo ny Tompo.
  '5':
  - type: text
    content: Dia hiteny azy amin’ny fahavinirany Izy
  - type: text
    content: 'ka hampangorohoro azy amin’ny fahatezerany hoe:'
  '6':
  - type: text
    content: Izaho anefa no nanendry ny Mpanjakako
  - type: text
    content: 'teo ambonin’i '
  - type: text
    content: Ziona
  - type: text
    content: ', tendrombohitro masina.'
  '7':
  - type: text
    content: Hanambara didy navoakan’NY TOMPO Aho;
  - type: text
    content: 'Izy no nilaza Tamiko hoe: Zanako Ianao!'
  - type: text
    content: Izaho no niteraka Anao androany.
  '8':
  - type: text
    content: Mangataha Amiko dia homeko ho lovanao ny Jentilisa
  - type: text
    content: ary ho fanananao ny tany rehetra;
  '9':
  - type: text
    content: hotorotoroinao amin’ny tehim-by izy.
  - type: text
    content: Toy ny famaky vilany tany no hanamontsamontsananao azy.
