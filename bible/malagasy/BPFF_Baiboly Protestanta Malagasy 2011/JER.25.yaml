document_id: JER.25,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Telo amby roapolo taona naminaniana
  - type: text
    content: 'Izao no teny tonga tamin’i Jeremia ny amin’ny Joda rehetra tamin’ny taona fahefatra nanjakan’i Joiakima, zanak’i Josia, mpanjakan’ny Joda, ny taona voalohany nanjakan’i Nebokadnezara, mpanjakan’i Babilona, '
  '10':
  - type: text
    content: 'Ary hatsahatro eo aminy ny feo mifaly sy ny feo miravoravo, dia ny feon’ny mpampakatra sy ny feon’ny ampakarina, ny feon’ny vato fikosoham-bary ary ny fahazavan’ny jiro. '
  '11':
  - type: text
    content: Ary ity tany manontolo ity dia ho foana sy ho lao, fa ireto firenena rehetra ireto dia hanompo ny mpanjakan’i Babilona fitopolo taona.
  '12':
  - type: text
    content: 'Rehefa tapitra ny fitopolo taona, hoy NY TOMPO, dia hovaliako kosa ny mpanjakan’i Babilona sy izany firenena izany noho ny helony, ary ny tanin’ny Kaldeana koa dia hataoko rava mandrakizay. '
  '13':
  - type: text
    content: 'Ary hotanterahiko amin’izany tany izany ny teniko rehetra izay efa nambarako hamelezana azy, dia izay rehetra voasoratra ato amin’ity boky ity, izay nambara tamin’i Jeremia mpaminany hoenti-mamely ny firenena rehetra. '
  '14':
  - type: text
    content: Fa ireo kosa indray dia hanompo firenena maro sy mpanjaka lehibe maro; ary hovaliako araka ny nataony sy araka ny asan’ny tanany avy izy.
  - type: heading
    content: Ny kapoakan-divay, sarin’ny fitsarana
  '15':
  - type: text
    content: 'Fa izao no nolazain’NY TOMPO, Andriamanitry ny Israely, tamiko: Raiso etỳ an-tanako ity kapoakan-divain’ny fahatezerana mirehitra ity ka ampisotroy ny firenena rehetra izay anirahako anao. '
  '16':
  - type: text
    content: 'Ary hisotro izy ka hirepirepy sy ho very saina noho ny sabatra izay hampameleziko azy. '
  '17':
  - type: text
    content: 'Dia noraisiko ny kapoaka teny an-tanan’NY TOMPO ka nampisotroiko ny firenena rehetra izay nanirahan’NY TOMPO ahy, '
  '18':
  - type: text
    content: 'dia Jerosalema, ny tanànan’ny Joda, ny mpanjakany ary ny mpanapaka, mba hahatonga azy ho tany lao sy ho figagana, ho zavatra mampisitrisitra ary fanozonana tahaka ny amin’izao anio izao; '
  '19':
  - type: text
    content: 'i Farao, mpanjakan’i Ejipta, ny mpanompony, ny mpanapaka mbamin’ny vahoakany rehetra; '
  '2':
  - type: text
    content: 'dia izay nolazain’i Jeremia mpaminany tamin’ny Joda rehetra sy tamin’ny mponina rehetra tany Jerosalema hoe:'
  '20':
  - type: text
    content: 'ny olona samihafa firenena rehetra, ny mpanjaka rehetra amin’ny tany Oza, ny mpanjaka rehetra amin’ny tanin’ny Filistina, Askelona, Gaza, Ekrona, ny sisa any Asdoda; '
  '21':
  - type: text
    content: 'Edoma, Moaba, ny taranak’i Amona, '
  '22':
  - type: text
    content: 'ny mpanjaka rehetra any Tiro, ny mpanjaka rehetra any Sidona, ny mpanjakan’ny nosy any andafin’ny ranomasina; '
  '23':
  - type: text
    content: 'Dedana, Tema, Boza ary izay rehetra voahety sisim-bolo; '
  '24':
  - type: text
    content: 'ny mpanjaka rehetra any Arabia, ny mpanjaka rehetra amin’ny firenena maro samihafa izay monina any an-tany efitra; '
  '25':
  - type: text
    content: 'ny mpanjaka rehetra any Zimry, ny mpanjaka rehetra any Elama, ny mpanjaka rehetra any Media, '
  '26':
  - type: text
    content: ny mpanjaka rehetra any avaratra, na ny lavitra na ny akaiky, na iza na iza, ary ny fanjakana rehetra amin’izao tontolo izao, izay etỳ ambonin’ny tany; ary ny mpanjakan’i Sesaka
  - type: note
    content: 'Sesaka: Babela.'
  - type: text
    content: ' koa dia hisotro rehefa avy misotro ireo. '
  '27':
  - type: text
    content: 'Koa lazao aminy hoe: Izao no lazain’Andriamanitra, Tompon’izao rehetra izao, Andriamanitry ny Israely: Misotroa ianareo ka mimamoa sy mandoava ary mianjerà, koa aza miarina intsony noho ny sabatra izay hampameleziko anareo. '
  '28':
  - type: text
    content: 'Ary raha tsy mety mandray ny kapoaka eny an-tananao hosotroiny izy dia lazao aminy hoe: Izao no lazain’Andriamanitra, Tompon’izao rehetra izao: Tsy maintsy misotro ianareo. '
  '29':
  - type: text
    content: Fa indro, tao amin’ny tanàna izay efa niantsoana ny anarako aza no nanombohako ny loza, koa ho afaka madiodio va ianareo? Tsy ho afaka madiodio ianareo; fa hiantso sabatra Aho hamelezana ny mponina rehetra amin’ny tany, hoy Andriamanitra, Tompon’izao rehetra izao.
  '3':
  - type: text
    content: 'Hatramin’ny taona fahatelo amby folo nanjakan’i Josia, zanak’i Amona, mpanjakan’ny Joda, ka mandraka androany, dia telo amby roapolo taona izao, no nahatongavan’ny tenin’NY TOMPO tamiko, ary nolazaiko taminareo, eny, nifoha vao maraina aho ka nilaza nefa tsy nihaino ianareo. '
  '30':
  - type: text
    content: 'Koa maminania aminy ianao araka izao teny rehetra izao ka teneno hoe:'
  - type: text
    content: NY TOMPO hierona any ambony
  - type: text
    content: ary hanandratra ny feony any amin’ny fitoerany masina,
  - type: text
    content: eny, hierona mafy amin’ny sahany Izy
  - type: text
    content: ka hanakora toy ny mpanosihosy voaloboka,
  - type: text
    content: hamelezana ny mponina rehetra amin’ny tany.
  '31':
  - type: text
    content: Mihatra amin’ny faran’ny tany ny fihorakorahana;
  - type: text
    content: fa NY TOMPO manana ady amin’ny firenena;
  - type: text
    content: mifandahatra amin’ny nofo rehetra Izy
  - type: text
    content: ka ny ratsy fanahy dia atolony ho an’ny sabatra,
  - type: text
    content: hoy NY TOMPO.
  '32':
  - type: text
    content: 'Izao no lazain’Andriamanitra, Tompon’izao rehetra izao:'
  - type: text
    content: Indro, hisy loza hivoaka hitety ny firenena samihafa,
  - type: text
    content: ary hisy tafio-drivotra mahery hiposaka avy any amin’ny faran’ny tany;
  '33':
  - type: text
    content: Amin’izany andro izany ny voavonon’NY TOMPO dia hiampatrampatra hatrany amin’ny faran’ny tany iray ka hatrany amin’ny farany iray hafa koa; tsy hisaonana, na hangonina, na halevina ireny, fa ho zezika eny ambonin’ny tany.
  '34':
  - type: text
    content: Midradradradrà ianareo mpitondra, ary miantsoantsoa mafy;
  - type: text
    content: eny, mihosinkosena ianareo mpiandry ny ondry!
  - type: text
    content: Fa tonga ny andro hamonoana anareo;
  - type: text
    content: ary hampieleziko ianareo
  - type: text
    content: ka hianjera toy ny fianjeran’ny fanaka sarobidy.
  '35':
  - type: text
    content: Tsy hisy toerana handosiran’ny mpitondra
  - type: text
    content: ary tsy hisy fahafahana ho an’ny mpiandry ny ondry.
  '36':
  - type: text
    content: Injany misy feo fitarainan’ny mpitondra
  - type: text
    content: sy fidradradradran’ny mpiandry ny ondry aminy!
  - type: text
    content: Satria efa nosimban’NY TOMPO ny saha fiandrasana azy;
  '37':
  - type: text
    content: ary efa tonga lao ny kijana niadanana
  - type: text
    content: noho ny firehetan’ny fahatezeran’NY TOMPO.
  '38':
  - type: text
    content: Nandao ny fiereny toy ny liona tanora Izy;
  - type: text
    content: fa efa lao ny taniny
  - type: text
    content: noho ny fahasiahan’ny mpampahory
  - type: text
    content: sy noho ny firehetan’ny fahatezerany.
  '4':
  - type: text
    content: 'Ary NY TOMPO naniraka ny mpaminany mpanompony rehetra ho any aminareo, eny, nifoha vao maraina Izy ka naniraka, nefa tsy nihaino ianareo, na nanongilan-tsofina hihaino hoe: '
  '5':
  - type: text
    content: 'Samia ianareo miala amin’ny lalan-dratsinareo avy sy amin’ny ratsy fanaonareo, dia honina any amin’ny tany izay nomen’NY TOMPO anareo sy ny razanareo hatrizay ka ho mandrakizay. '
  '6':
  - type: text
    content: 'Ary aza manaraka andriamanitra hafa hanompo azy sy hiankohoka eo anatrehany, ary aza mampahatezitra Ahy amin’ny asan’ny tananareo, fandrao hahatonga loza aminareo Aho. '
  '7':
  - type: text
    content: 'Nefa tsy nihaino Ahy ianareo, hoy NY TOMPO, ka nampahatezitra Ahy tamin’ny asan’ny tananareo ianareo dia nahita loza. '
  '8':
  - type: text
    content: 'Koa izao no lazain’Andriamanitra, Tompon’izao rehetra izao: Noho ny tsy nihainoanareo ny teniko '
  '9':
  - type: text
    content: 'dia indro, hampanalaiko ny firenena rehetra any avaratra sy i Nebokadnezara, mpanjakan’i Babilona, mpanompoko, hoy NY TOMPO, ary hoentiko hamely ity tany ity sy ny mponina eto mbamin’ireto firenena manodidina rehetra ireto izy, ary haringako toy ny zavatra voaozona tokoa ireo ka hataoko ho figagana sy zavatra mampisitrisitra sady ho rava mandrakizay. '
