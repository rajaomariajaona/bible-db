document_id: JER.25
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Telo amby roapolo taona naminaniana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Izao no teny tonga tamin’i Jeremia ny amin’ny Joda rehetra tamin’ny taona fahefatra nanjakan’i Joiakima, zanak’i Josia, mpanjakan’ny Joda, ny taona voalohany nanjakan’i Nebokadnezara, mpanjakan’i Babilona, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'dia izay nolazain’i Jeremia mpaminany tamin’ny Joda rehetra sy tamin’ny mponina rehetra tany Jerosalema hoe:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Hatramin’ny taona fahatelo amby folo nanjakan’i Josia, zanak’i Amona, mpanjakan’ny Joda, ka mandraka androany, dia telo amby roapolo taona izao, no nahatongavan’ny tenin’NY TOMPO tamiko, ary nolazaiko taminareo, eny, nifoha vao maraina aho ka nilaza nefa tsy nihaino ianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary NY TOMPO naniraka ny mpaminany mpanompony rehetra ho any aminareo, eny, nifoha vao maraina Izy ka naniraka, nefa tsy nihaino ianareo, na nanongilan-tsofina hihaino hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Samia ianareo miala amin’ny lalan-dratsinareo avy sy amin’ny ratsy fanaonareo, dia honina any amin’ny tany izay nomen’NY TOMPO anareo sy ny razanareo hatrizay ka ho mandrakizay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary aza manaraka andriamanitra hafa hanompo azy sy hiankohoka eo anatrehany, ary aza mampahatezitra Ahy amin’ny asan’ny tananareo, fandrao hahatonga loza aminareo Aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Nefa tsy nihaino Ahy ianareo, hoy NY TOMPO, ka nampahatezitra Ahy tamin’ny asan’ny tananareo ianareo dia nahita loza. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Koa izao no lazain’Andriamanitra, Tompon’izao rehetra izao: Noho ny tsy nihainoanareo ny teniko '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'dia indro, hampanalaiko ny firenena rehetra any avaratra sy i Nebokadnezara, mpanjakan’i Babilona, mpanompoko, hoy NY TOMPO, ary hoentiko hamely ity tany ity sy ny mponina eto mbamin’ireto firenena manodidina rehetra ireto izy, ary haringako toy ny zavatra voaozona tokoa ireo ka hataoko ho figagana sy zavatra mampisitrisitra sady ho rava mandrakizay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary hatsahatro eo aminy ny feo mifaly sy ny feo miravoravo, dia ny feon’ny mpampakatra sy ny feon’ny ampakarina, ny feon’ny vato fikosoham-bary ary ny fahazavan’ny jiro. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ary ity tany manontolo ity dia ho foana sy ho lao, fa ireto firenena rehetra ireto dia hanompo ny mpanjakan’i Babilona fitopolo taona.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Rehefa tapitra ny fitopolo taona, hoy NY TOMPO, dia hovaliako kosa ny mpanjakan’i Babilona sy izany firenena izany noho ny helony, ary ny tanin’ny Kaldeana koa dia hataoko rava mandrakizay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary hotanterahiko amin’izany tany izany ny teniko rehetra izay efa nambarako hamelezana azy, dia izay rehetra voasoratra ato amin’ity boky ity, izay nambara tamin’i Jeremia mpaminany hoenti-mamely ny firenena rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Fa ireo kosa indray dia hanompo firenena maro sy mpanjaka lehibe maro; ary hovaliako araka ny nataony sy araka ny asan’ny tanany avy izy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny kapoakan-divay, sarin’ny fitsarana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Fa izao no nolazain’NY TOMPO, Andriamanitry ny Israely, tamiko: Raiso etỳ an-tanako ity kapoakan-divain’ny fahatezerana mirehitra ity ka ampisotroy ny firenena rehetra izay anirahako anao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary hisotro izy ka hirepirepy sy ho very saina noho ny sabatra izay hampameleziko azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Dia noraisiko ny kapoaka teny an-tanan’NY TOMPO ka nampisotroiko ny firenena rehetra izay nanirahan’NY TOMPO ahy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'dia Jerosalema, ny tanànan’ny Joda, ny mpanjakany ary ny mpanapaka, mba hahatonga azy ho tany lao sy ho figagana, ho zavatra mampisitrisitra ary fanozonana tahaka ny amin’izao anio izao; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'i Farao, mpanjakan’i Ejipta, ny mpanompony, ny mpanapaka mbamin’ny vahoakany rehetra; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'ny olona samihafa firenena rehetra, ny mpanjaka rehetra amin’ny tany Oza, ny mpanjaka rehetra amin’ny tanin’ny Filistina, Askelona, Gaza, Ekrona, ny sisa any Asdoda; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Edoma, Moaba, ny taranak’i Amona, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'ny mpanjaka rehetra any Tiro, ny mpanjaka rehetra any Sidona, ny mpanjakan’ny nosy any andafin’ny ranomasina; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Dedana, Tema, Boza ary izay rehetra voahety sisim-bolo; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'ny mpanjaka rehetra any Arabia, ny mpanjaka rehetra amin’ny firenena maro samihafa izay monina any an-tany efitra; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'ny mpanjaka rehetra any Zimry, ny mpanjaka rehetra any Elama, ny mpanjaka rehetra any Media, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ny mpanjaka rehetra any avaratra, na ny lavitra na ny akaiky, na iza na iza, ary ny fanjakana rehetra amin’izao tontolo izao, izay etỳ ambonin’ny tany; ary ny mpanjakan’i Sesaka
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Sesaka: Babela.'
    marker-yv: yv-n
  - type: text
    text: ' koa dia hisotro rehefa avy misotro ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Koa lazao aminy hoe: Izao no lazain’Andriamanitra, Tompon’izao rehetra izao, Andriamanitry ny Israely: Misotroa ianareo ka mimamoa sy mandoava ary mianjerà, koa aza miarina intsony noho ny sabatra izay hampameleziko anareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ary raha tsy mety mandray ny kapoaka eny an-tananao hosotroiny izy dia lazao aminy hoe: Izao no lazain’Andriamanitra, Tompon’izao rehetra izao: Tsy maintsy misotro ianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Fa indro, tao amin’ny tanàna izay efa niantsoana ny anarako aza no nanombohako ny loza, koa ho afaka madiodio va ianareo? Tsy ho afaka madiodio ianareo; fa hiantso sabatra Aho hamelezana ny mponina rehetra amin’ny tany, hoy Andriamanitra, Tompon’izao rehetra izao.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Koa maminania aminy ianao araka izao teny rehetra izao ka teneno hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: NY TOMPO hierona any ambony
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hanandratra ny feony any amin’ny fitoerany masina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, hierona mafy amin’ny sahany Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hanakora toy ny mpanosihosy voaloboka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hamelezana ny mponina rehetra amin’ny tany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Mihatra amin’ny faran’ny tany ny fihorakorahana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa NY TOMPO manana ady amin’ny firenena;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mifandahatra amin’ny nofo rehetra Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka ny ratsy fanahy dia atolony ho an’ny sabatra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hoy NY TOMPO.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Izao no lazain’Andriamanitra, Tompon’izao rehetra izao:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Indro, hisy loza hivoaka hitety ny firenena samihafa,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hisy tafio-drivotra mahery hiposaka avy any amin’ny faran’ny tany;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Amin’izany andro izany ny voavonon’NY TOMPO dia hiampatrampatra hatrany amin’ny faran’ny tany iray ka hatrany amin’ny farany iray hafa koa; tsy hisaonana, na hangonina, na halevina ireny, fa ho zezika eny ambonin’ny tany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Midradradradrà ianareo mpitondra, ary miantsoantsoa mafy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, mihosinkosena ianareo mpiandry ny ondry!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa tonga ny andro hamonoana anareo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hampieleziko ianareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hianjera toy ny fianjeran’ny fanaka sarobidy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Tsy hisy toerana handosiran’ny mpitondra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy hisy fahafahana ho an’ny mpiandry ny ondry.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Injany misy feo fitarainan’ny mpitondra
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy fidradradradran’ny mpiandry ny ondry aminy!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Satria efa nosimban’NY TOMPO ny saha fiandrasana azy;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: ary efa tonga lao ny kijana niadanana
- type: usfm
  marker: q1
  children:
  - type: text
    text: noho ny firehetan’ny fahatezeran’NY TOMPO.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Nandao ny fiereny toy ny liona tanora Izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa efa lao ny taniny
- type: usfm
  marker: q1
  children:
  - type: text
    text: noho ny fahasiahan’ny mpampahory
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy noho ny firehetan’ny fahatezerany.
