verses:
  '1':
  - type: text
    content: INDRAY MIJERY
  - type: text
    content: Ao amin’ny Baiboly dikanteny grika Septanta, ny Bokin’i Daniela dia voakilasy ho isan’ny Mpaminany, fa ao amin’ny Baiboly hebreo kosa izy dia voasokajy ho isan’ny Soratra.
  - type: text
    content: Ny Bokin’i Daniela dia atao hoe boky apokaliptika, sahala amin’ny Boky Apokalipsy, izay mitovitovy fomba aminy. Ireo boky roa ireo dia mikendry indrindra ny hampahery ny Mpino amin’ny fotoana rehetra, mba haharitra amin’ny finoana, na inona na inona fizahan-toetra na fanenjehana mety hitranga
  - type: text
    content: Ny votoatin’ny Boky
  - type: text
    content: Ny Bokin’i Daniela dia misy fizarana roa, dia ny 1–6 ary ny 7–12. Ao amin’ny tapany voalohany dia tantaraina ny momba ny tanora Jiosy efa-dahy izay noentin’i Nebokadnerza ho babo tany Babilona. Izy ireo dia nijoro tsy azo nohozongozonina tamin’ny finoany an’Andriamanitra, na inona na inona natao taminy. Ao amin’ny 1–6 no misy tantara enina izay tsy tena mifampiankina, fa maneho ny fanerena sy fanenjehana mihatra amin’ny firenena jiosy. Isan’izany ny tantaran’i Daniela tao an-davaky ny liona sy izy telolahy natsipy tao anaty lafaoro mirehitra afo.
  - type: text
    content: Amin’ny tapany faharoa (7–12) dia misy fahitana efatra samihafa. Ireo fahitana ireo dia manambara ny tantaran’ny firenena jiosy izay tao ambany fitondran’ny firenena jentilisa maro nifandinby, koa amin’ny farany no hananganan’Andriamanitra azy indray ka hampiorenany ny fanjakany mandrakizay.
