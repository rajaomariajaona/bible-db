document_id: 1PE.3,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny mpivady kristiana
  - type: text
    content: 'Toy izany koa, ianareo vehivavy, maneke ny vadinareo; koa raha misy aza tsy manaiky ny teny dia ho voataonan’ny fitondrantenan’ny vavy izy, na dia tsy amin’ny teny aza, '
  '10':
  - type: text
    content: «Fa na iza na iza maniry fiainana
  - type: text
    content: sy ta hahita andro soa
  - type: text
    content: dia aoka izy hiaro ny lelany amin’ny ratsy
  - type: text
    content: ary ny molony mba tsy hiteny fitaka.
  '11':
  - type: text
    content: Ary aoka izy hiala amin’ny ratsy ka hanao soa;
  - type: text
    content: aoka izy hitady fihavanana sy hikatsaka azy.
  '12':
  - type: text
    content: Fa ny mason’ny Tompo dia mitsinjo ny marina
  - type: text
    content: ary ny sofiny dia mihaino ny fitarainany;
  - type: text
    content: fa ny tavan’ny Tompo dia tezitra amin’ny mpanao ratsy» (Sal 34.12-16).
  - type: heading
    content: Ny Kristiana, vonona hanambara ny fanantenany
  '13':
  - type: text
    content: 'Ary iza no hanisy ratsy anareo raha mazoto amin’izay tsara ianareo? '
  '14':
  - type: text
    content: 'Fa raha toa ka mitondra fahoriana noho ny fahamarinana ianareo dia sambatra! Aza matahotra tahaka azy ary aza mangorohoro ianareo. '
  '15':
  - type: text
    content: 'Fa manamasìna an’i '
  - type: text
    content: Kristy
  - type: text
    content: ' ho Tompo ao am-ponareo (Isa 8.12, 13); ary aoka ho vonona mandrakariva ianareo hamaly izay manontany anareo ny amin’ny anton’ny fanantenana ao anatinareo, '
  '16':
  - type: text
    content: 'nefa amin’ny fahalemem-panahy sy ny fanajana; koa manàna fieritreretana tsara. Amin’izany dia ho menatra izay manaratsy ny fitondrantenanareo tsara ao amin’i Kristy ka manendrikendrika anareo. '
  '17':
  - type: text
    content: Fa tsara kokoa ny mitondra fahoriana amin’ny fanaovan-tsoa, raha izany ny sitrapon’Andriamanitra, noho ny mitondra fahoriana amin’ny fanaovan-dratsy.
  - type: heading
    content: Avy amin’ny fahafatesan’i Kristy, ho amin’ny fandreseny
  '18':
  - type: text
    content: 'Fa '
  - type: text
    content: Kristy
  - type: text
    content: ' koa aza efa nijaly indray mandeha noho ny ota,'
  - type: text
    content: ny Marina hamonjy ny tsy marina
  - type: text
    content: mba hitondrany antsika ho amin’Andriamanitra
  - type: text
    content: ka novonoina araka ny nofo Izy,
  - type: text
    content: fa novelomina araka ny fanahy
  '19':
  - type: text
    content: izay nandehanany sy nitoriany teny tamin’ireo fanahy tao an-tranomaizina,
  '2':
  - type: text
    content: 'rehefa hitany ny fitondrantenanareo izay madio sy feno fanajana. '
  '20':
  - type: text
    content: 'dia izay tsy nanaiky fahiny, raha niandry tamin’ny fahari-po Andriamanitra, tamin’ny andron’i Noa ka mbola namboarina ny sambofiara izay nidiran’ny olona vitsy, dia izy valo mianaka, ary namonjena azy ny rano. '
  '21':
  - type: text
    content: 'Izany dia tandindon’ny batisa izay mamonjy anareo koa ankehitriny; tsy fanesorana ny fahalotoan’ny nofo anefa izany fa ny fitadiavana ny fieritreretana tsara eo anatrehan’Andriamanitra, amin’ny nitsanganan’i Jesosy Kristy tamin’ny maty, '
  '22':
  - type: text
    content: izay eo ankavanan’Andriamanitra; fa efa lasa ho any an-danitra Izy ka nampanekena Azy ny anjely, ny fahefana ary ny hery.
  '3':
  - type: text
    content: 'Ary aoka ny fihaingoanareo tsy ho ny zavatra ivelany, toy ny taovolo manaitra sy ny firavaka volamena na ny fitafiana marevaka, '
  '4':
  - type: text
    content: 'fa ny toetra miafina ao am-po, amin’ny fihaingoana tsy mety ho lo, dia ny fahalemem-panahy sy ny fiadanana, izay sarobidy indrindra eo imason’Andriamanitra. '
  '5':
  - type: text
    content: 'Fa tahaka izany no nihaingoan’ireo vehivavy masina fahiny izay nanantena an’Andriamanitra sady nanaiky ny vadiny; '
  '6':
  - type: text
    content: dia tahaka an’i Saraha izay nanaiky an’i Abrahama ka nilaza azy hoe tompoko. Koa ianareo no tonga zanany amin’ny fanaovana ny soa ka tsy hanahy na inona na inona fampitahorana.
  '7':
  - type: text
    content: Toy izany koa ianareo lehilahy, tandrovy tsara ny fiarahanareo amin’ny vavy, amin’ny fanajana azy araka ny maha fanaka malemy kokoa azy, sady mpiara-mandova ny fahasoavan’ny fiainana aminareo izy, mba tsy ho voasakana ny fivavahanareo.
  - type: heading
    content: Ny fitiavana kristiana
  '8':
  - type: text
    content: 'Farany, miraisa saina ianareo rehetra ka miaraha ory, mifankatiava tahaka ny mpirahalahy, mifamindrà fo, manetre tena. '
  '9':
  - type: text
    content: Aza mamaly ratsy ny ratsy, na fitenenan-dratsy ny fitenenan-dratsy; fa aoka hisaotra kosa satria ho amin’izany no niantsoana anareo mba handovanareo fitahiana.
