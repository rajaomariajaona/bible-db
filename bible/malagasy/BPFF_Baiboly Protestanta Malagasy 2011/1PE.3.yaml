document_id: 1PE.3,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny mpivady kristiana
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Toy izany koa, ianareo vehivavy, maneke ny vadinareo; koa raha misy aza tsy manaiky ny teny dia ho voataonan’ny fitondrantenan’ny vavy izy, na dia tsy amin’ny teny aza, '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: «Fa na iza na iza maniry fiainana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ta hahita andro soa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia aoka izy hiaro ny lelany amin’ny ratsy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny molony mba tsy hiteny fitaka.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Ary aoka izy hiala amin’ny ratsy ka hanao soa;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aoka izy hitady fihavanana sy hikatsaka azy.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Fa ny mason’ny Tompo dia mitsinjo ny marina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny sofiny dia mihaino ny fitarainany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny tavan’ny Tompo dia tezitra amin’ny mpanao ratsy» (Sal 34.12-16).
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny Kristiana, vonona hanambara ny fanantenany
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ary iza no hanisy ratsy anareo raha mazoto amin’izay tsara ianareo? '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Fa raha toa ka mitondra fahoriana noho ny fahamarinana ianareo dia sambatra! Aza matahotra tahaka azy ary aza mangorohoro ianareo. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Fa manamasìna an’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ' ho Tompo ao am-ponareo (Isa 8.12, 13); ary aoka ho vonona mandrakariva ianareo hamaly izay manontany anareo ny amin’ny anton’ny fanantenana ao anatinareo, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'nefa amin’ny fahalemem-panahy sy ny fanajana; koa manàna fieritreretana tsara. Amin’izany dia ho menatra izay manaratsy ny fitondrantenanareo tsara ao amin’i Kristy ka manendrikendrika anareo. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Fa tsara kokoa ny mitondra fahoriana amin’ny fanaovan-tsoa, raha izany ny sitrapon’Andriamanitra, noho ny mitondra fahoriana amin’ny fanaovan-dratsy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Avy amin’ny fahafatesan’i Kristy, ho amin’ny fandreseny
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Fa '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ' koa aza efa nijaly indray mandeha noho ny ota,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny Marina hamonjy ny tsy marina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hitondrany antsika ho amin’Andriamanitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka novonoina araka ny nofo Izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa novelomina araka ny fanahy
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: izay nandehanany sy nitoriany teny tamin’ireo fanahy tao an-tranomaizina,
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'rehefa hitany ny fitondrantenanareo izay madio sy feno fanajana. '
  '20':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'dia izay tsy nanaiky fahiny, raha niandry tamin’ny fahari-po Andriamanitra, tamin’ny andron’i Noa ka mbola namboarina ny sambofiara izay nidiran’ny olona vitsy, dia izy valo mianaka, ary namonjena azy ny rano. '
  '21':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Izany dia tandindon’ny batisa izay mamonjy anareo koa ankehitriny; tsy fanesorana ny fahalotoan’ny nofo anefa izany fa ny fitadiavana ny fieritreretana tsara eo anatrehan’Andriamanitra, amin’ny nitsanganan’i Jesosy Kristy tamin’ny maty, '
  '22':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: izay eo ankavanan’Andriamanitra; fa efa lasa ho any an-danitra Izy ka nampanekena Azy ny anjely, ny fahefana ary ny hery.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Ary aoka ny fihaingoanareo tsy ho ny zavatra ivelany, toy ny taovolo manaitra sy ny firavaka volamena na ny fitafiana marevaka, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'fa ny toetra miafina ao am-po, amin’ny fihaingoana tsy mety ho lo, dia ny fahalemem-panahy sy ny fiadanana, izay sarobidy indrindra eo imason’Andriamanitra. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Fa tahaka izany no nihaingoan’ireo vehivavy masina fahiny izay nanantena an’Andriamanitra sady nanaiky ny vadiny; '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: dia tahaka an’i Saraha izay nanaiky an’i Abrahama ka nilaza azy hoe tompoko. Koa ianareo no tonga zanany amin’ny fanaovana ny soa ka tsy hanahy na inona na inona fampitahorana.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Toy izany koa ianareo lehilahy, tandrovy tsara ny fiarahanareo amin’ny vavy, amin’ny fanajana azy araka ny maha fanaka malemy kokoa azy, sady mpiara-mandova ny fahasoavan’ny fiainana aminareo izy, mba tsy ho voasakana ny fivavahanareo.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fitiavana kristiana
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Farany, miraisa saina ianareo rehetra ka miaraha ory, mifankatiava tahaka ny mpirahalahy, mifamindrà fo, manetre tena. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Aza mamaly ratsy ny ratsy, na fitenenan-dratsy ny fitenenan-dratsy; fa aoka hisaotra kosa satria ho amin’izany no niantsoana anareo mba handovanareo fitahiana.
