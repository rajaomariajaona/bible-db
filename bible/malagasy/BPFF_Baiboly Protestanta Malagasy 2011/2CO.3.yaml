document_id: 2CO.3,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Mpanompon’ny fanekena vaovao
  - type: text
    content: 'Moa midera tena indray va izahay? Sa toy ny sasany ka mila epistily filazan-tsoa anay ho anareo, na avy aminareo? '
  '10':
  - type: text
    content: 'Ary izay nisy voninahitra teo aza dia tsy manana voninahitra fotsiny amin’izao raha ampitahaina amin’ny voninahitra tonga lafatra. '
  '11':
  - type: text
    content: Fa raha ny mandalo aza no nisy voninahitra, mainka fa ny mitoetra dia ho rakotra voninahitra kokoa.
  '12':
  - type: text
    content: 'Koa amin’izany, satria manana izany fanantenana izany izahay, dia feno fahasahiana tokoa; '
  '13':
  - type: text
    content: 'tsy tahaka an’i Mosesy izay nanarona ny tavany tamin’ny fisalobonana mba tsy hibanjinan’ny Zanak’Israely ny fiafaran’izany voninahitra nihalevona izany. '
  '14':
  - type: text
    content: 'Fa efa donto ny sainy; fa ambaraka androany dia mbola tsy nesorina ihany izany fisalobonana izany, raha vakina ny tenin’ny fanekena taloha, satria ao amin’i Kristy ihany no anesorana izany. '
  '15':
  - type: text
    content: 'Fa misy fisalobonana manarona ny fony ambaraka androany, rehefa vakina ny tenin’i Mosesy. '
  '16':
  - type: text
    content: 'Kanefa rehefa miverina amin’ny Tompo izy dia hesorina ihany ny fisalobonana. '
  '17':
  - type: text
    content: 'Ary ny Tompo izany Fanahy izany; ary izay itoeran’ny Fanahin’ny Tompo no itoeran’ny fahafahana. '
  '18':
  - type: text
    content: Fa isika rehetra kosa dia amin’ny tava tsy misarona no ibanjinantsika ny voninahitry ny Tompo, tahaka ny amin’ny fitaratra, ka ovany hitovy endrika Aminy, avy amin’ny voninahitra ho amin’ny voninahitra, toy ny avy amin’ny Tompo, dia ny Fanahy.
  '2':
  - type: text
    content: 'Ianareo no epistilinay voasoratra ato am-ponay sady fantatra sy vakin’ny olona rehetra; '
  '3':
  - type: text
    content: 'eny, aseho ho epistilin’i '
  - type: text
    content: Kristy
  - type: text
    content: ' izay entinay ianareo, tsy nosoratana tamin’ny ranomainty anefa fa tamin’ny Fanahin’Andriamanitra velona, tsy teo amin’izay tena vato fisaka anefa fa teo amin’izay vato fisaka nofo, dia ny fo.'
  '4':
  - type: text
    content: 'Ary manana izany fahatokiana izany eo anatrehan’Andriamanitra izahay amin’ny alalan’i Kristy. '
  '5':
  - type: text
    content: 'Kanefa tsy mihambo hanana fahafahana avy aminay izahay hihevitra na inona na inona avy amin’ny tenanay; fa ny fahafahanay dia avy amin’Andriamanitra '
  '6':
  - type: text
    content: izay efa nahafahanay koa ho tonga mpanompon’ny fanekena vaovao, tsy amin’ny soratra anefa fa amin’ny Fanahy; ny soratra dia mahafaty, fa ny Fanahy no mahavelona.
  '7':
  - type: text
    content: 'Fa raha ny asa fanompoan’ny fahafatesana aza, dia ilay voasoratra teo amin’ny vato, no nisy voninahitra ka tsy nahabanjina ny tavan’i Mosesy ny Zanak’Israely noho ny voninahitry ny tavany izay nandalo ihany, '
  '8':
  - type: text
    content: 'tsy mainka hisy voninahitra va ny fanompoan’ny Fanahy? '
  '9':
  - type: text
    content: 'Fa raha nisy voninahitra ny fanompoana nitondra ny fanamelohana dia vao mainka hanana tombom-boninahitra ny fanompoana mitondra ny fahamarinana. '
