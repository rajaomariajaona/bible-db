document_id: PRO.6,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fiantohana natao tsy amim-piheverana
  - type: text
    content: Anaka, raha niantoka ny namanao ianao,
  - type: text
    content: ary nandray tanana hiantoka vahiny,
  '10':
  - type: text
    content: Mbola hatory kely ihany, mbola ho renoka kely ihany
  - type: text
    content: ary mbola hanohon-tanana kely hatory.
  '11':
  - type: text
    content: Dia ho tonga toy ny mpirenireny hamely anao ny fahantranao,
  - type: text
    content: ary ny fahasahirananao dia ho toy ny jiolahy mirongo fiadiana.
  - type: heading
    content: Ny lehilahy mpamitaka
  '12':
  - type: text
    content: Ny olona tena ratsy fanahy sy mpanao ratsy,
  - type: text
    content: dia ilay mandehandeha manao teny misy fitaka
  '13':
  - type: text
    content: izay mipy maso sy manao famantarana amin’ny tongony,
  - type: text
    content: ary manao baiko amin’ny rantsantanany;
  '14':
  - type: text
    content: hafetsen-dratsy no ao am-pony,
  - type: text
    content: mihevi-dratsy mandrakariva izy sady mamafy adilahy.
  '15':
  - type: text
    content: Noho izany dia ho avy tampoka ny loza hanjo azy;
  - type: text
    content: indray mipy maso no haha torotoro azy ka tsy hisy fanafana.
  - type: heading
    content: Ny zavatra halan’NY TOMPO
  '16':
  - type: text
    content: Zavatra enina no halan’NY TOMPO,
  - type: text
    content: 'eny, fito no fahavetavetana eo anatrehany:'
  '17':
  - type: text
    content: Ny fijery mianjonanjona, ny lela fandainga,
  - type: text
    content: ny tanana mandatsaka ny ran’ny tsy manan-tsiny,
  '18':
  - type: text
    content: ny fo mamorona sain-dratsy,
  - type: text
    content: ny tongotra malaky mihazakazaka hanao ratsy,
  '19':
  - type: text
    content: ny vavolombelona mandainga izay milaza lainga
  - type: text
    content: ary ny mamafy ady eo amin’ny mpirahalahy.
  - type: heading
    content: Fampitandremana ny amin’ny fijangajangana
  '2':
  - type: text
    content: ka voafandriky ny teny nataonao,
  - type: text
    content: ary voasingotry ny teny noteneninao,
  '20':
  - type: text
    content: Anaka, tandremo ny didin’ny rainao
  - type: text
    content: ary aza mahafoy ny fampianaran’ny reninao.
  '21':
  - type: text
    content: Afatory amin’ny fonao mandrakariva ireo
  - type: text
    content: ary afehezo eo am-bozonao.
  '22':
  - type: text
    content: Raha mandeha ianao dia hitari-dalana anao ireo,
  - type: text
    content: raha mandry ianao dia hiambina anao izy,
  - type: text
    content: raha mifoha ianao dia hamelona eritreritra anao izy.
  '23':
  - type: text
    content: Fa jiro ny didy, ary fanazavana ny fampianarana,
  - type: text
    content: ary lalan’ny fiainana ny anatra ataon’ny fitaizana,
  '24':
  - type: text
    content: hiarovana anao amin’ny vehivavy ratsy fanahy
  - type: text
    content: sy amin’ny fandrobohan’ny lelan’ny vehivavy janga.
  '25':
  - type: text
    content: Aoka ny fonao tsy haniry ny hatsaran-tarehiny
  - type: text
    content: ary aoka tsy hahazo anao amin’ny hodimasony izy.
  '26':
  - type: text
    content: Fa sombi-mofo iray ihany dia ahazoana vehivavy janga iray,
  - type: text
    content: nefa ny vehivavy manambady kosa dia mamandrika aina sarobidy.
  '27':
  - type: text
    content: Mahatondra afo ao amin’ny paosin’akanjony va ny olona
  - type: text
    content: ka tsy ho may ny akanjony?
  '28':
  - type: text
    content: Misy mahadia vainafo va
  - type: text
    content: ka tsy ho may ny tongony?
  '29':
  - type: text
    content: Dia toy izany izay mankany amin’ny vadin’ny namany;
  - type: text
    content: tsy ho afa-tsiny izay mikasika azy.
  '3':
  - type: text
    content: dia izao no ataovy anaka mba hanafaka ny tenanao
  - type: text
    content: 'satria tonga eo am-pelatanan’ny namanao ianao:'
  - type: text
    content: Mandehana miankohoka sy mifona mafy amin’ny namanao;
  '30':
  - type: text
    content: Tsy manome tsiny ny mpangalatra ny olona
  - type: text
    content: raha maka zavatra hahavoky ny tenany izy satria noana;
  '31':
  - type: text
    content: fa raha tratra kosa izy dia hampanonerina avo fito heny
  - type: text
    content: ka hanome ny fananany rehetra izay ao an-tranony.
  '32':
  - type: text
    content: Izay mijangajanga amin’ny vehivavy dia tsy ampy saina;
  - type: text
    content: izay ta hanimba tena no manao izany.
  '33':
  - type: text
    content: Voadaroka sady afa-baraka izy
  - type: text
    content: ary tsy ho voafafa ny tondro molotra manjo azy.
  '34':
  - type: text
    content: Fa ny fahasaro-piaro dia mampirehitra ny fahatezeran’ny lehilahy,
  - type: text
    content: koa tsy hamindra fo izy amin’ny andro hamaliany;
  '35':
  - type: text
    content: tsy handray vola ho fanakona-maso akory izy;
  - type: text
    content: tsy hanaiky izy, na dia atao maro aza ny fanomezana.
  '4':
  - type: text
    content: aza avela hahita tory ny masonao
  - type: text
    content: ary aza avela hilondolondo ny hodimasonao;
  '5':
  - type: text
    content: afaho ny tenanao toy ny gazela miala amin’ny tanan’ny mpihaza,
  - type: text
    content: ary toy ny voronkely miala amin’ny tanan’ny mpamandrika.
  - type: heading
    content: Ny malaina sy ny vitsika
  '6':
  - type: text
    content: Mandehana any amin’ny vitsika, ry ilay malaina;
  - type: text
    content: diniho ny fanaony ka mba hendre.
  '7':
  - type: text
    content: Tsy manana komandy,
  - type: text
    content: na mpanara-maso, na mpanapaka izy,
  '8':
  - type: text
    content: nefa mamory ny haniny amin’ny fahavaratra,
  - type: text
    content: ary manangona ny fihinany amin’ny fararano.
  '9':
  - type: text
    content: Mandra-pahoviana no mbola handry ihany ianao, ry ilay malaina?
  - type: text
    content: Rahoviana no hifoha amin’ny torimasonao ianao?
