document_id: PRO.6
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fiantohana natao tsy amim-piheverana
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Anaka, raha niantoka ny namanao ianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary nandray tanana hiantoka vahiny,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ka voafandriky ny teny nataonao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary voasingotry ny teny noteneninao,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: dia izao no ataovy anaka mba hanafaka ny tenanao
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'satria tonga eo am-pelatanan’ny namanao ianao:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mandehana miankohoka sy mifona mafy amin’ny namanao;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: aza avela hahita tory ny masonao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary aza avela hilondolondo ny hodimasonao;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: afaho ny tenanao toy ny gazela miala amin’ny tanan’ny mpihaza,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary toy ny voronkely miala amin’ny tanan’ny mpamandrika.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny malaina sy ny vitsika
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Mandehana any amin’ny vitsika, ry ilay malaina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: diniho ny fanaony ka mba hendre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Tsy manana komandy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: na mpanara-maso, na mpanapaka izy,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: nefa mamory ny haniny amin’ny fahavaratra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary manangona ny fihinany amin’ny fararano.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Mandra-pahoviana no mbola handry ihany ianao, ry ilay malaina?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Rahoviana no hifoha amin’ny torimasonao ianao?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Mbola hatory kely ihany, mbola ho renoka kely ihany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mbola hanohon-tanana kely hatory.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Dia ho tonga toy ny mpirenireny hamely anao ny fahantranao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny fahasahirananao dia ho toy ny jiolahy mirongo fiadiana.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny lehilahy mpamitaka
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ny olona tena ratsy fanahy sy mpanao ratsy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ilay mandehandeha manao teny misy fitaka
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: izay mipy maso sy manao famantarana amin’ny tongony,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary manao baiko amin’ny rantsantanany;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: hafetsen-dratsy no ao am-pony,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mihevi-dratsy mandrakariva izy sady mamafy adilahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Noho izany dia ho avy tampoka ny loza hanjo azy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: indray mipy maso no haha torotoro azy ka tsy hisy fanafana.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny zavatra halan’NY TOMPO
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Zavatra enina no halan’NY TOMPO,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'eny, fito no fahavetavetana eo anatrehany:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ny fijery mianjonanjona, ny lela fandainga,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny tanana mandatsaka ny ran’ny tsy manan-tsiny,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ny fo mamorona sain-dratsy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny tongotra malaky mihazakazaka hanao ratsy,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ny vavolombelona mandainga izay milaza lainga
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny mamafy ady eo amin’ny mpirahalahy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fampitandremana ny amin’ny fijangajangana
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Anaka, tandremo ny didin’ny rainao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary aza mahafoy ny fampianaran’ny reninao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Afatory amin’ny fonao mandrakariva ireo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary afehezo eo am-bozonao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Raha mandeha ianao dia hitari-dalana anao ireo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: raha mandry ianao dia hiambina anao izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: raha mifoha ianao dia hamelona eritreritra anao izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Fa jiro ny didy, ary fanazavana ny fampianarana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary lalan’ny fiainana ny anatra ataon’ny fitaizana,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: hiarovana anao amin’ny vehivavy ratsy fanahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy amin’ny fandrobohan’ny lelan’ny vehivavy janga.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Aoka ny fonao tsy haniry ny hatsaran-tarehiny
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary aoka tsy hahazo anao amin’ny hodimasony izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Fa sombi-mofo iray ihany dia ahazoana vehivavy janga iray,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa ny vehivavy manambady kosa dia mamandrika aina sarobidy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Mahatondra afo ao amin’ny paosin’akanjony va ny olona
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy ho may ny akanjony?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Misy mahadia vainafo va
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy ho may ny tongony?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Dia toy izany izay mankany amin’ny vadin’ny namany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy ho afa-tsiny izay mikasika azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Tsy manome tsiny ny mpangalatra ny olona
- type: usfm
  marker: q1
  children:
  - type: text
    text: raha maka zavatra hahavoky ny tenany izy satria noana;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: fa raha tratra kosa izy dia hampanonerina avo fito heny
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hanome ny fananany rehetra izay ao an-tranony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Izay mijangajanga amin’ny vehivavy dia tsy ampy saina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay ta hanimba tena no manao izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Voadaroka sady afa-baraka izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy ho voafafa ny tondro molotra manjo azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Fa ny fahasaro-piaro dia mampirehitra ny fahatezeran’ny lehilahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: koa tsy hamindra fo izy amin’ny andro hamaliany;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: tsy handray vola ho fanakona-maso akory izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy hanaiky izy, na dia atao maro aza ny fanomezana.
