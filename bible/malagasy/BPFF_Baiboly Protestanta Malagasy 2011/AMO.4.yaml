document_id: AMO.4,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ireo vehivavy ambony ao Samaria
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mihainoa izao teny izao, ianareo ombivavin’i Basana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay eny amin’ny tendrombohitr’i Samaria,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ianareo izay mampahory ny mahantra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy manorotoro ny sahirana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ary miteny amin’ny vadinareo hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mitondrà hosotrointsika!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Efa nandefasako areti-mandringana tahaka ilay tany Ejipta ianareo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: novonoiko tamin’ny sabatra ny zatovonareo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady nobaboina koa ny soavalinareo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nampiakariko ho eo am-bavoronareo ny hamaimboan’ny tobinareo.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nefa tsy niverina tamiko ihany ianareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy NY TOMPO.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Efa nisy tanàna noravako teo aminareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tahaka ny nandravan’Andriamanitra an’i Sodoma sy i Gomora,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: koa efa tahaka ny forohana nosarihana tamin’ny afo ianareo.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nefa mbola tsy niverina tamiko ihany ianareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy NY TOMPO.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Koa izao no hataoko aminao, ry Israely ô!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Satria hahatonga izany aminao Aho dia miomàna hihaona amin’Andriamanitrao, ry Israely ô!
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa indro Ilay mamolavola ny tendrombohitra sy mahary ny rivotra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mampahafantatra ny olombelona izay heviny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia Ilay mahatonga ny maraina ho haizina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ary mandia ny havoana amin’ny tany:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: NY TOMPO, Andriamanitra Tompon’izao rehetra izao, no anarany.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'NY TOMPO Andriamanitra no efa nianiana tamin’ny fahamasinany hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro, ho avy aminareo ny andro
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay hitarihana anareo amin’ny farango
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy izay sisa aminareo amin’ny fintana;
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avy eo amin’ny banga no hivoahanareo samy amin’izay hitsiny avy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hatsipy any Hermona ianareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy NY TOMPO.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fanatitra alasafay
    marker-yv: yv-h
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mankanesa any Betela ka manotà!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary any Gilgala ka manotà fatratra!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ento isa-maraina ny fanatitrareo alatsa-dra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary isan-kateloana ny fahafolonkarenanareo!
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mandoroa fanati-pisaorana miaraka amin’ny mofo misy masirasira!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miantsoa fanatitra an-tsitrapo, eny, ambarao izany!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Satria ny toy izany no sitrakareo, ry Zanak’Israely,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy NY TOMPO Andriamanitra.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Tsy miverina amin’Andriamanitra ny Israely
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Izao kosa no efa nataoko anareo: Nataoko mitsako tsy misy ianareo tany an-tanànanareo rehetra'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary nasiako tsy fahampian-kanina tamin’ny fonenanareo rehetra.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nefa tsy niverina tamiko ihany ianareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy NY TOMPO.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izaho anefa no nampihantona ny ranonorana tsy ho aminareo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: raha telo volana sisa tsy ho fararano,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: koa tamin’ny tanàna iray no nampilatsahako ranonorana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tamin’ny tanàna iray hafa kosa tsy mba nampilatsahako;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny saha iray dia nilatsahan’ny ranonorana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny saha iray hafa kosa tsy mba nilatsahany dia maina.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia nivembena ny tanàna roa aman-telo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nitady rano tany amin’ny tanàna iray,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: kanjo tsy afaka hetaheta izy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Kanefa tsy niverina tamiko ihany ianareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy NY TOMPO.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Efa nasiako tamin’ny vary mainan’ny hafanana sy ny maty fotsy ianareo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny tanimbolinareo maro, ny tanim-boalobokareo, ny aviavinareo ary ny hazo olivanareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia nohanin’ny valala.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nefa tsy niverina tamiko ihany ianareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy NY TOMPO.
