document_id: AMO.4,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ireo vehivavy ambony ao Samaria
  - type: text
    content: Mihainoa izao teny izao, ianareo ombivavin’i Basana,
  - type: text
    content: izay eny amin’ny tendrombohitr’i Samaria,
  - type: text
    content: dia ianareo izay mampahory ny mahantra
  - type: text
    content: sy manorotoro ny sahirana
  - type: text
    content: 'ary miteny amin’ny vadinareo hoe:'
  - type: text
    content: Mitondrà hosotrointsika!
  '10':
  - type: text
    content: Efa nandefasako areti-mandringana tahaka ilay tany Ejipta ianareo;
  - type: text
    content: novonoiko tamin’ny sabatra ny zatovonareo
  - type: text
    content: sady nobaboina koa ny soavalinareo;
  - type: text
    content: nampiakariko ho eo am-bavoronareo ny hamaimboan’ny tobinareo.
  - type: text
    content: Nefa tsy niverina tamiko ihany ianareo,
  - type: text
    content: hoy NY TOMPO.
  '11':
  - type: text
    content: Efa nisy tanàna noravako teo aminareo,
  - type: text
    content: tahaka ny nandravan’Andriamanitra an’i Sodoma sy i Gomora,
  - type: text
    content: koa efa tahaka ny forohana nosarihana tamin’ny afo ianareo.
  - type: text
    content: Nefa mbola tsy niverina tamiko ihany ianareo,
  - type: text
    content: hoy NY TOMPO.
  '12':
  - type: text
    content: Koa izao no hataoko aminao, ry Israely ô!
  - type: text
    content: Satria hahatonga izany aminao Aho dia miomàna hihaona amin’Andriamanitrao, ry Israely ô!
  '13':
  - type: text
    content: Fa indro Ilay mamolavola ny tendrombohitra sy mahary ny rivotra
  - type: text
    content: ary mampahafantatra ny olombelona izay heviny,
  - type: text
    content: dia Ilay mahatonga ny maraina ho haizina
  - type: text
    content: 'ary mandia ny havoana amin’ny tany:'
  - type: text
    content: NY TOMPO, Andriamanitra Tompon’izao rehetra izao, no anarany.
  '2':
  - type: text
    content: 'NY TOMPO Andriamanitra no efa nianiana tamin’ny fahamasinany hoe:'
  - type: text
    content: Indro, ho avy aminareo ny andro
  - type: text
    content: izay hitarihana anareo amin’ny farango
  - type: text
    content: sy izay sisa aminareo amin’ny fintana;
  '3':
  - type: text
    content: avy eo amin’ny banga no hivoahanareo samy amin’izay hitsiny avy
  - type: text
    content: ary hatsipy any Hermona ianareo,
  - type: text
    content: hoy NY TOMPO.
  - type: heading
    content: Fanatitra alasafay
  '4':
  - type: text
    content: Mankanesa any Betela ka manotà!
  - type: text
    content: Ary any Gilgala ka manotà fatratra!
  - type: text
    content: Ento isa-maraina ny fanatitrareo alatsa-dra
  - type: text
    content: ary isan-kateloana ny fahafolonkarenanareo!
  '5':
  - type: text
    content: Mandoroa fanati-pisaorana miaraka amin’ny mofo misy masirasira!
  - type: text
    content: Miantsoa fanatitra an-tsitrapo, eny, ambarao izany!
  - type: text
    content: Satria ny toy izany no sitrakareo, ry Zanak’Israely,
  - type: text
    content: hoy NY TOMPO Andriamanitra.
  - type: heading
    content: Tsy miverina amin’Andriamanitra ny Israely
  '6':
  - type: text
    content: 'Izao kosa no efa nataoko anareo: Nataoko mitsako tsy misy ianareo tany an-tanànanareo rehetra'
  - type: text
    content: ary nasiako tsy fahampian-kanina tamin’ny fonenanareo rehetra.
  - type: text
    content: Nefa tsy niverina tamiko ihany ianareo,
  - type: text
    content: hoy NY TOMPO.
  '7':
  - type: text
    content: Izaho anefa no nampihantona ny ranonorana tsy ho aminareo
  - type: text
    content: raha telo volana sisa tsy ho fararano,
  - type: text
    content: koa tamin’ny tanàna iray no nampilatsahako ranonorana
  - type: text
    content: ary tamin’ny tanàna iray hafa kosa tsy mba nampilatsahako;
  - type: text
    content: ny saha iray dia nilatsahan’ny ranonorana,
  - type: text
    content: ary ny saha iray hafa kosa tsy mba nilatsahany dia maina.
  '8':
  - type: text
    content: Dia nivembena ny tanàna roa aman-telo
  - type: text
    content: nitady rano tany amin’ny tanàna iray,
  - type: text
    content: kanjo tsy afaka hetaheta izy.
  - type: text
    content: Kanefa tsy niverina tamiko ihany ianareo,
  - type: text
    content: hoy NY TOMPO.
  '9':
  - type: text
    content: Efa nasiako tamin’ny vary mainan’ny hafanana sy ny maty fotsy ianareo;
  - type: text
    content: ny tanimbolinareo maro, ny tanim-boalobokareo, ny aviavinareo ary ny hazo olivanareo,
  - type: text
    content: dia nohanin’ny valala.
  - type: text
    content: Nefa tsy niverina tamiko ihany ianareo,
  - type: text
    content: hoy NY TOMPO.
