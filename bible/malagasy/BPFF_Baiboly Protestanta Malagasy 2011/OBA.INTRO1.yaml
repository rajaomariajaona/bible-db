document_id: OBA.INTRO1,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: imt1
    children:
    - type: text
      text: INDRAY MIJERY
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Ity no boky fohy indrindra ao amin’ny Testamenta Taloha, fa toko iray monja misy andininy 21. Ny anarana hoe Obadia dia midika hoe Ny mpanompon’NY TOMPO. Heverina fa ny Boky dia voasoratra taorianan’ny nahazoan’ny Babiloniana an’i Jerosalema tamin’ny 587 tal JK.
  - type: usfm
    marker: is1
    children:
    - type: text
      text: Ny votoatin’ny Boky
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Ny Boky dia faminaniana ny amin’ny hamelezana an’i Edoma noho ny tsy namindrany fo tamin’i Jerosalema izay efa voatafika. Ny Edomita dia taranak’i Esao, rahalahin’i Jakoba na Israely. Hatramin’ny ela ny Edomita no efa nampijaly ny Israely, kanefa tamin’izao fandravan’ny Babiloniana an’i Jerosalema izao dia vao mainka nanampatra ny fampahoriana sy ny avonavona izy. Ambaran’ny mpaminany fa ho avy ny Andron’NY TOMPO izay handringanana an’i Edoma sy ireo fahavalon’ny Israely rehetra. Fampiononana ny Israely ny mandre izany.
  - type: usfm
    marker: iot
    children:
    - type: text
      text: Ny firafitry ny Boky
  - type: usfm
    marker: io1
    children:
    - type: text
      text: 'Fanambaràna ny handringanana an’i Edoma: And 1-9'
  - type: usfm
    marker: io1
    children:
    - type: text
      text: 'Ny hamaliana ny ratsy nataon’i Edoma tamin’Israely: And 10-16'
  - type: usfm
    marker: io1
    children:
    - type: text
      text: 'Ny Andron’NY TOMPO: Fandringanana ny firenena jentilisa fa famonjena an’i Ziona: And 17-21'
