document_id: 2CH.28
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nanombohan’ny fanjakan’i Ahaza; ady tamin’ny Israely
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 2Mpa 16.1-20
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Roapolo taona i Ahaza raha nanomboka nanjaka ary enina amby folo taona no nanjakany tany Jerosalema; tsy nanao izay mahitsy teo imason’NY TOMPO tahaka an’i Davida rainy izy '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'fa nandeha tamin’ny lalan’ireo mpanjakan’ny Israely sady nanao sarin-javatra voarendrika ho an’ireo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Baala
  - type: text
    text: ' koa. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Nandoro ditin-kazo manitra tao amin’ny lohasahan’ny taranak’i Hinoma koa izy ary ny zanany dia nodorany tamin’ny afo, araka ny fahavetavetan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jentilisa
  - type: text
    text: ' izay noroahin’NY TOMPO tsy ho eo anoloan’ny Zanak’Israely. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ary namono zavatra hatao fanatitra izy sady nandoro ditin-kazo manitra teny amin’ny toerana fanaovana sorona sy teny an-tampon’ny havoana ary teny ambanin’ny hazo maitso rehetra koa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Natolotry NY TOMPO Andriamaniny ho eo an-tanan’ny mpanjakan’i Arama izy; koa nasian’io izy ka nahalasany babo betsaka noentiny tany Damaskosy. Ary natolony ho eo an-tanan’ny mpanjakan’ny Israely koa izy; nasian’io mafy izy ka resiny koa. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Fa i Peka, zanak’i Remalia, dia nahafaty olona roa alina sy iray hetsy tamin’ny Joda tao anatin’ny indray andro, izay lehilahy mahery avokoa, noho ny nahafoizan’ireny NY TOMPO, Andriamanitry ny razany. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary i Zikry, lehilahy mahery tamin’ny Efraima, dia namono an’i Mahaseia, zanaky ny mpanjaka, sy i Azrikama, mpanapaka ny tao an-dapa, ary i Elkana, izay lefitry ny mpanjaka. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ary nahazo sambo-belona roa hetsy tamin’ireo havany ny Zanak’Israely, dia vehivavy sy zazalahy sy zazavavy, ary nahazo babo betsaka taminy koa, dia noentiny tany Samaria ireny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary nisy mpaminanin’NY TOMPO tao, Odeda no anarany, ary izy io dia nandeha hitsena ny miaramila raha nankany Samaria ireo ka niteny tamin’ireo hoe: E! Ny fahatezeran’NY TOMPO, Andriamanitry ny razanareo, tamin’ny Joda no nanolorany azy ho eo an-tanànareo, dia novonoinareo ireny tamin’ny fahatezerana manakatra ny lanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary ankehitriny, ny taranak’i Joda sy Jerosalema dia kasainareo handevozina ho andevolahinareo sy ho andevovavinareo; koa tsy mba manan-keloka amin’NY TOMPO Andriamanitrareo koa va ianareo? '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ankehitriny, mihainoa ahy ka avereno ny babo izay efa noentinareo avy tamin’ny rahalahinareo; fa mirehitra aminareo ny fahatezeran’NY TOMPO. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Dia nitsangana ny loholona sasany avy amin’ny taranak’i Efraima, dia i Azaria, zanak’i Johanana, i Berekia, zanak’i Mesilemota, i Jehizkia, zanak’i Saloma ary i Amasa, zanak’i Hadlay, ka niteny nanohitra azy ireo izay vao tany an-tafika hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Tsy mahazo mampiditra ny babo eto ianareo; fa mikasa hanampy ny fahotantsika sy ny fahadisoantsika ianareo mba hahameloka antsika amin’NY TOMPO; efa be ny fahadisoantsika ka iharan’ny fahatezerana mirehitra ny Israely. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dia navelan’ny miaramila ho eo anatrehan’ny mpanapaka sy ny fiangonana rehetra izay sambo-belona sy babo azony, '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: koa ireo olona voalaza anarana ireo dia nitsangana ka naka ny sambo-belona, ary izay rehetra tsy nitafy dia nampiakanjoiny tamin’ny zavatra azo babo; eny, nampiakanjoiny sy nokiraroiny izy ary nampihinaniny sy nampisotroiny ary nohosorany diloilo sady nampitaingeniny boriky izay rehetra osaosa ka noentiny tany Jeriko, tanàna be hazo palma, ho any amin’ny rahalahiny; dia niverina tany Samaria izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Tamin’izany andro izany i Ahaza mpanjaka dia nandefa iraka tany amin’ny mpanjakan’i Arama nangataka azy hanampy azy. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Fa ny Edomita dia tonga indray ka namely ny Joda ary namabo azy. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary ny Filistina koa dia nanafika ny tanàna tany Sefela sy tany Negeva izay momba an’i Joda, dia nahafaka an’i Bety-Semesy, i Aialona, i Gederota, i Soko sy ny vohitra miankina aminy, i Timna sy ny vohitra miankina aminy ary i Gimzo koa sy ny vohitra miankina aminy; ary nonina tao izy. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Fa NY TOMPO nampietry ny Joda noho i Ahaza, mpanjakan’ny Israely, satria efa nanaram-po nanao izay ratsy teo amin’i Joda i Ahaza ka nivadika tamin’NY TOMPO. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary tonga tao aminy i Tiglato-Pilesera, mpanjakan’i Arama, nefa nampahory azy fa tsy nampahery azy. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Fa efa nalain’i Ahaza ny zavatra tao amin’ny tranon’NY TOMPO sy ny tao an-tranon’ny mpanjaka sy ny an’ny mpanapaka, ary efa nomeny ny mpanjakan’i Arama, nefa tsy nahasoa azy akory izany. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Tamin’ny andro nampahoriana azy dia mbola nanao izay nahadiso tamin’NY TOMPO ihany io Ahaza mpanjaka io. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary namono zavatra hatao fanatitra ho an’ireo andriamanitr’i Damaskosy izay namely azy izy ka nilaza hoe: Ireo andriamanitry ny mpanjakan’i Arama, izay nanampy azy, no hamonoako zavatra hatao fanatitra mba hanampiany ahy. Kanjo tonga fandravana azy sy ny Israely rehetra ireo.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary nanangona ny fanaky ny tranon’Andriamanitra i Ahaza ka nanapotipotika azy ary nandrindrina ny varavaran’ny tranon’NY TOMPO sady nanorina alitara teny amin’ny zoron-dalana rehetra tany Jerosalema. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Ary teny amin’ny tanànan’i Joda rehetra dia nanaovany toerana fanaovana sorona handoroana ditin-kazo manitra ho an’ny andriamanitra hafa ka nahatezitra NY TOMPO, Andriamanitry ny razany, izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ary ny tantarany sisa sy izay nataony rehetra, hatramin’ny voalohany ka hatramin’ny farany, indreo, voasoratra ao amin’ny bokin’ny mpanjakan’ny Joda sy ny Israely izany. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Ary nodimandry any amin’ny razany i Ahaza, dia nalevina tao an-tanànan’i Jerosalema izy, fa tsy mba natao tao amin’ny fasan’ny mpanjakan’ny Israely. Ary i Hezekia zanany no nanjaka nandimby azy.
