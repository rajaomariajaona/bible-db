document_id: GEN.41,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ireo nofin’i Farao
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa feno roa taona taorianan’izany dia nanonofy i Farao ka indro, hono, nitsangana teo amoron’ny Neily izy. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tezitra tamin’ny mpanompony i Farao ka nampiditra ahy tao an-tranomaizina tao anatin’ny tranon’ny lehiben’ny mpiambina, dia izaho sy ilay lehiben’ny mpanao mofo. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Indray alina, nanonofy izahay, dia izaho sy izy; samy nanana nofy izay samy nanana ny heviny avy izahay. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary tao aminay dia nisy zatovo hebreo iray, mpanompon’ny lehiben’ny mpiambina. Nambaranay taminy ny nofinay ka nolazainy taminay ny heviny. Samy nilazany araka ny nofinay avy izahay. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tanteraka araka izay nolazainy taminay avy izany: Izaho dia nampodìny ho ao amin’ilay nipetrahako fa izy kosa dia nahantony.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Nanazava ny hevitr’ireo nofin’i Farao i Josefa
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nandefa iraka haka an’i Josefa i Farao ka nalaina haingana niala tao an-davaka izy. Nanaratra ny volombavany sy niova fitafiana izy ka nankany amin’i Farao. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy i Farao tamin’i Josefa: Nanonofy aho fa tsy misy mahalaza ny heviny; nahare nefa aho fa ianao, hono, raha mandre nofy, dia mahalaza ny heviny. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy ny navalin’i Josefa an’i Farao hoe: Tsy ahy izany! Andriamanitra no hilaza izay valiny hampiadana an’i Farao!'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy i Farao tamin’i Josefa: Nofiko fa indro, hono, nitsangana teo amoron’ny Neily aho. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa indreo, nisy ombivavy fito matavy sady tsara tarehy niakatra avy tao amin’ny Neily ary nihinana teny amin’ny bararata ireny. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary indreo, nisy ombivavy fito hafa indray kosa niakatra nanaraka azy ireny, mangozohozo sady tena ratsy tarehy no mahia, ka tsy mbola hitako izay ratsy toa azy teto amin’ny tany Ejipta rehetra. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa indreo, nisy ombivavy fito tsara tarehy sady matavy niakatra avy tao amin’ny Neily ka nihinana teny amin’ny bararata. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ireo ombivavy fito mahia sady ratsy tarehy dia nihinana ireo ombivavy fito matavy izay nialoha azy. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa nahahinana an’ireo matavy izy dia tsy fantatra akory fa ao an-kibony ireny, fa mbola ratsy tarehy tahaka ny taloha ihany ireo. Dia nahatsiaro aho. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hitako tamin’ny nofiko indray fa indreo, nisy salohim-bary fito niakatra tamin’ny tahony iray, sady feno no tsara. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary indreo, nisy salohim-bary fito kosa sady malazo no maivam-boa, mainan’ny rivotra avy any atsinanana, nitsimoka nanaraka ireny. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ny salohim-bary maivam-boa dia nitelina ny salohim-bary fito tsara. Nolazaiko tamin’ny ombiasy izany nefa tsy nisy nahalaza ny heviny tamiko ireny.
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy i Josefa tamin’i Farao: Iray ihany ny nofin’i Farao; izay hataon’Andriamanitra no nambarany tamin’i Farao. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny ombivavy fito tsara tarehy dia taona fito; ary ny salohim-bary fito vokatra koa dia taona fito; iray ihany ny nofy. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny ombivavy fito mahia sady ratsy tarehy, izay niakatra nanaraka ireny, dia taona fito; ary ny salohim-bary fito tsy nisy voa sady mainan’ny rivotra avy any atsinanana dia ho taona fito mosarena. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izany dia ilay nolazaiko tamin’i Farao teo hoe: Izay hataon’Andriamanitra no asehony amin’i Farao. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Indro, hisy fito taona tena zina manerana ny tany Ejipta rehetra. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary indreo, nisy ombivavy fito hafa kosa ratsy tarehy sady mahia niakatra avy tao amin’ny Neily nanaraka azy, dia nijanona teo anilan’ireo ombivavy teo amoron’ny Neily koa. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Manaraka izany kosa hisy fito taona hisy mosary ka ho hadino ny fahavokarana be rehetra teo amin’ny tany Ejipta fa ho ritran’ny mosary ny tany. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ilay fahavokarana teo amin’ny tany dia tsy ho fantatra noho izany mosary manaraka azy izany, fa ho mafy indrindra izany. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Naverina indroa ny nofin’i Farao satria voatendrin’Andriamanitra ireo zavatra ireo ka hotanterahin’Andriamanitra haingana. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa ankehitriny, aoka i Farao hizaha lehilahy manan-tsaina sady hendry ka hanendry azy hanapaka ny tany Ejipta. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aoka hanatanteraka izany i Farao, ary aoka izy hanendry mpanara-maso amin’ny tany ka hamory ny ampahadimin’ny vokatry ny tany Ejipta amin’ny taon-jina fito ireny. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia aoka izy ireo hanangona ny hanina rehetra amin’ireo taona tsara ho avy ireo ka hamory vary be amin’ny anaran’i Farao, hohanina any amin’ny tanàna maro, ary aoka izy hitahiry ireo. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary aoka ireo hanina ireo hotahirizina ao amin’ny tany ho amin’ny fito taona hisy mosary, izay ho tonga amin’ny tany Ejipta, mba tsy ho simban’ny mosary ny tany.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Nanjary tanan-kavanan’i Farao i Josefa
    marker-yv: yv-h
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nankasitrahan’i Farao sy ny mpanompony rehetra izany hevitra izany. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy i Farao tamin’ny mpanompony: Moa va isika hahita lehilahy manana ny Fanahin’Andriamanitra ao anatiny tahaka an’io? '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy i Farao tamin’i Josefa: Satria nampahafantarin’Andriamanitra anao izany rehetra izany dia tsy misy lehilahy manan-tsaina sady hendry tahaka anao. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ireo ombivavy ratsy tarehy sady mahia dia nihinana ireo ombivavy fito tsara tarehy sady matavy. Dia nahatsiaro i Farao. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa ianao no hanapaka ny ato an-tranoko, ary araka ny teninao no hitondrana ny oloko rehetra. Ny sezafiandrianana ihany no hahalehibe ahy noho ianao. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy koa i Farao tamin’i Josefa: Indro, manendry anao hanapaka amin’ny tany Ejipta rehetra aho. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nesorin’i Farao ny peratra fitombo-kase tamin’ny tanany ka nataony tamin’ny tanan’i Josefa, dia nampitafiny akanjo rongony fotsy madinika izy ary nasiany rojo volamena ny vozony. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Avy eo, nampitaingeniny tamin’ny kalesiny faharoa izy, ary niantso teo alohany ny vahoaka hoe: Abreka'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '41.43 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: Teny ejiptiana izay midika hoe Mandohaleha.
      marker-yv: yv-n
    - type: text
      text: '! Notendreny ho mpanapaka ny tany Ejipta rehetra izy. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy i Farao tamin’i Josefa: Izaho no Farao, kanefa raha tsy teninao dia tsy hisy olona hanetsika ny tanany na ny tongony eto amin’ny tany Ejipta manontolo. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nataon’i Farao hoe Zafenata-Panea ny anaran’i Josefa. Nomeny azy ho vadiny i Asenata, zanakavavin’i Poty-Fera, mpisorona tao Ona. Ary nandeha nitety ny tany Ejipta i Josefa. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Telopolo taona i Josefa raha niseho teo anatrehan’i Farao, mpanjakan’i Ejipta. Niala teo anatrehan’i Farao i Josefa ka nandeha nitety ny tany Ejipta manontolo.
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nahavokatra be dia be tokoa ny tany tamin’ny taon-jina fito. '
  '48':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia namory ny hanina rehetra tamin’izany fito taona izany teo amin’ny tany Ejipta i Josefa ka nitahiry ireo tany amin’ny tanàna rehetra. Notahiriziny tao anatin’ny tanàna ny vokatry ny saha manodidina ny isan-tanàna. '
  '49':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Namory vary tahaka ny fasika any an-dranomasina i Josefa; eny, be dia be izany ka tsy nanisa intsony izy satria tsy hita isa ireo.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Natory indray izy ka nanonofy fanindroany ka indro, hono, nisy salohim-bary fito niakatra tamin’ny tahony iray, sady matavy no tsara. '
  '50':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsy mbola tonga ny taonan’ny mosary fony i Josefa niteraka zazalahy roa tamin’i Asenata, zanakavavin’i Poty-Fera, mpisorona tao Ona. '
  '51':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny anaran’ny lahimatoa dia nataon’i Josefa hoe Manase
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '41.51 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Manase: Mampanadino.'
      marker-yv: yv-n
    - type: text
      text: ', fa Andriamanitra, hoy izy, efa nampanadino ahy ny fahoriako rehetra sy izay rehetra tao an-tranon’ny raiko. '
  '52':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny anaran’ny zandriny kosa dia nataony hoe Efraima
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '41.52 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Efraima: Vokatra be.'
      marker-yv: yv-n
    - type: text
      text: ; fa Andriamanitra, hoy izy, efa nahamaro ahy teto amin’ny tanin’ny fahoriako.
  '53':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary tapitra ny taon-jina fito teo amin’ny tany Ejipta, '
  '54':
  - type: usfm
    marker: p
    children:
    - type: text
      text: fa niandoha kosa ny fito taona nisy mosary, araka izay efa voalazan’i Josefa. Ary nisy mosary tany amin’ny tany rehetra; nefa nanerana ny tany Ejipta manontolo dia mbola nisy hanina ihany.
  '55':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa mosarena ny tany Ejipta manontolo dia nitaraina nangataka hanina tamin’i Farao ny olona. Dia hoy i Farao tamin’ny Ejiptiana rehetra: Mankanesa any amin’i Josefa, koa izay holazainy aminareo dia ataovy. '
  '56':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tany amin’ny tany rehetra ny mosary, nefa namoha ny trano fitahirizam-bary i Josefa ka nivaro-bary tamin’ny Ejiptiana. Tena mafy ny mosary nanerana ny tany Ejipta. '
  '57':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ny tany rehetra dia nankany Ejipta ho any amin’i Josefa mba hividy vary fa mafy ny mosary tany amin’ny tany rehetra.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary indreo, nisy salohim-bary fito maivam-boa kosa sady mainan’ny rivotra avy any atsinanana, nitsimoka nanaraka ireny. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ny salohim-bary maivam-boa dia nitelina ny salohim-bary fito matavy sy be voa. Dia nahatsiaro i Farao, koa indro fa nofy ihany izany.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nony maraina dia nitebiteby izy ka nandefa iraka haka ny ombiasy rehetra tany Ejipta sy ny olon-kendriny rehetra. Nambaran’i Farao azy ireo ny nofiny, nefa tsy nisy na dia iray aza nahalaza izay heviny tamin’i Farao. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia niteny tamin’i Farao ilay lehiben’ny mpitondra kapoaka hoe: Tsaroako izao ny hadisoako. '
