document_id: GEN.41,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ireo nofin’i Farao
  - type: text
    content: 'Rehefa feno roa taona taorianan’izany dia nanonofy i Farao ka indro, hono, nitsangana teo amoron’ny Neily izy. '
  '10':
  - type: text
    content: 'Tezitra tamin’ny mpanompony i Farao ka nampiditra ahy tao an-tranomaizina tao anatin’ny tranon’ny lehiben’ny mpiambina, dia izaho sy ilay lehiben’ny mpanao mofo. '
  '11':
  - type: text
    content: 'Indray alina, nanonofy izahay, dia izaho sy izy; samy nanana nofy izay samy nanana ny heviny avy izahay. '
  '12':
  - type: text
    content: 'Ary tao aminay dia nisy zatovo hebreo iray, mpanompon’ny lehiben’ny mpiambina. Nambaranay taminy ny nofinay ka nolazainy taminay ny heviny. Samy nilazany araka ny nofinay avy izahay. '
  '13':
  - type: text
    content: 'Tanteraka araka izay nolazainy taminay avy izany: Izaho dia nampodìny ho ao amin’ilay nipetrahako fa izy kosa dia nahantony.'
  - type: heading
    content: Nanazava ny hevitr’ireo nofin’i Farao i Josefa
  '14':
  - type: text
    content: 'Dia nandefa iraka haka an’i Josefa i Farao ka nalaina haingana niala tao an-davaka izy. Nanaratra ny volombavany sy niova fitafiana izy ka nankany amin’i Farao. '
  '15':
  - type: text
    content: 'Hoy i Farao tamin’i Josefa: Nanonofy aho fa tsy misy mahalaza ny heviny; nahare nefa aho fa ianao, hono, raha mandre nofy, dia mahalaza ny heviny. '
  '16':
  - type: text
    content: 'Hoy ny navalin’i Josefa an’i Farao hoe: Tsy ahy izany! Andriamanitra no hilaza izay valiny hampiadana an’i Farao!'
  '17':
  - type: text
    content: 'Dia hoy i Farao tamin’i Josefa: Nofiko fa indro, hono, nitsangana teo amoron’ny Neily aho. '
  '18':
  - type: text
    content: 'Koa indreo, nisy ombivavy fito matavy sady tsara tarehy niakatra avy tao amin’ny Neily ary nihinana teny amin’ny bararata ireny. '
  '19':
  - type: text
    content: 'Ary indreo, nisy ombivavy fito hafa indray kosa niakatra nanaraka azy ireny, mangozohozo sady tena ratsy tarehy no mahia, ka tsy mbola hitako izay ratsy toa azy teto amin’ny tany Ejipta rehetra. '
  '2':
  - type: text
    content: 'Koa indreo, nisy ombivavy fito tsara tarehy sady matavy niakatra avy tao amin’ny Neily ka nihinana teny amin’ny bararata. '
  '20':
  - type: text
    content: 'Ary ireo ombivavy fito mahia sady ratsy tarehy dia nihinana ireo ombivavy fito matavy izay nialoha azy. '
  '21':
  - type: text
    content: 'Rehefa nahahinana an’ireo matavy izy dia tsy fantatra akory fa ao an-kibony ireny, fa mbola ratsy tarehy tahaka ny taloha ihany ireo. Dia nahatsiaro aho. '
  '22':
  - type: text
    content: 'Hitako tamin’ny nofiko indray fa indreo, nisy salohim-bary fito niakatra tamin’ny tahony iray, sady feno no tsara. '
  '23':
  - type: text
    content: 'Ary indreo, nisy salohim-bary fito kosa sady malazo no maivam-boa, mainan’ny rivotra avy any atsinanana, nitsimoka nanaraka ireny. '
  '24':
  - type: text
    content: Ary ny salohim-bary maivam-boa dia nitelina ny salohim-bary fito tsara. Nolazaiko tamin’ny ombiasy izany nefa tsy nisy nahalaza ny heviny tamiko ireny.
  '25':
  - type: text
    content: 'Dia hoy i Josefa tamin’i Farao: Iray ihany ny nofin’i Farao; izay hataon’Andriamanitra no nambarany tamin’i Farao. '
  '26':
  - type: text
    content: 'Ny ombivavy fito tsara tarehy dia taona fito; ary ny salohim-bary fito vokatra koa dia taona fito; iray ihany ny nofy. '
  '27':
  - type: text
    content: 'Ny ombivavy fito mahia sady ratsy tarehy, izay niakatra nanaraka ireny, dia taona fito; ary ny salohim-bary fito tsy nisy voa sady mainan’ny rivotra avy any atsinanana dia ho taona fito mosarena. '
  '28':
  - type: text
    content: 'Izany dia ilay nolazaiko tamin’i Farao teo hoe: Izay hataon’Andriamanitra no asehony amin’i Farao. '
  '29':
  - type: text
    content: 'Indro, hisy fito taona tena zina manerana ny tany Ejipta rehetra. '
  '3':
  - type: text
    content: 'Ary indreo, nisy ombivavy fito hafa kosa ratsy tarehy sady mahia niakatra avy tao amin’ny Neily nanaraka azy, dia nijanona teo anilan’ireo ombivavy teo amoron’ny Neily koa. '
  '30':
  - type: text
    content: 'Manaraka izany kosa hisy fito taona hisy mosary ka ho hadino ny fahavokarana be rehetra teo amin’ny tany Ejipta fa ho ritran’ny mosary ny tany. '
  '31':
  - type: text
    content: 'Ilay fahavokarana teo amin’ny tany dia tsy ho fantatra noho izany mosary manaraka azy izany, fa ho mafy indrindra izany. '
  '32':
  - type: text
    content: 'Naverina indroa ny nofin’i Farao satria voatendrin’Andriamanitra ireo zavatra ireo ka hotanterahin’Andriamanitra haingana. '
  '33':
  - type: text
    content: 'Koa ankehitriny, aoka i Farao hizaha lehilahy manan-tsaina sady hendry ka hanendry azy hanapaka ny tany Ejipta. '
  '34':
  - type: text
    content: 'Aoka hanatanteraka izany i Farao, ary aoka izy hanendry mpanara-maso amin’ny tany ka hamory ny ampahadimin’ny vokatry ny tany Ejipta amin’ny taon-jina fito ireny. '
  '35':
  - type: text
    content: 'Dia aoka izy ireo hanangona ny hanina rehetra amin’ireo taona tsara ho avy ireo ka hamory vary be amin’ny anaran’i Farao, hohanina any amin’ny tanàna maro, ary aoka izy hitahiry ireo. '
  '36':
  - type: text
    content: Ary aoka ireo hanina ireo hotahirizina ao amin’ny tany ho amin’ny fito taona hisy mosary, izay ho tonga amin’ny tany Ejipta, mba tsy ho simban’ny mosary ny tany.
  - type: heading
    content: Nanjary tanan-kavanan’i Farao i Josefa
  '37':
  - type: text
    content: 'Nankasitrahan’i Farao sy ny mpanompony rehetra izany hevitra izany. '
  '38':
  - type: text
    content: 'Dia hoy i Farao tamin’ny mpanompony: Moa va isika hahita lehilahy manana ny Fanahin’Andriamanitra ao anatiny tahaka an’io? '
  '39':
  - type: text
    content: 'Ary hoy i Farao tamin’i Josefa: Satria nampahafantarin’Andriamanitra anao izany rehetra izany dia tsy misy lehilahy manan-tsaina sady hendry tahaka anao. '
  '4':
  - type: text
    content: 'Ary ireo ombivavy ratsy tarehy sady mahia dia nihinana ireo ombivavy fito tsara tarehy sady matavy. Dia nahatsiaro i Farao. '
  '40':
  - type: text
    content: 'Koa ianao no hanapaka ny ato an-tranoko, ary araka ny teninao no hitondrana ny oloko rehetra. Ny sezafiandrianana ihany no hahalehibe ahy noho ianao. '
  '41':
  - type: text
    content: 'Hoy koa i Farao tamin’i Josefa: Indro, manendry anao hanapaka amin’ny tany Ejipta rehetra aho. '
  '42':
  - type: text
    content: 'Dia nesorin’i Farao ny peratra fitombo-kase tamin’ny tanany ka nataony tamin’ny tanan’i Josefa, dia nampitafiny akanjo rongony fotsy madinika izy ary nasiany rojo volamena ny vozony. '
  '43':
  - type: text
    content: 'Avy eo, nampitaingeniny tamin’ny kalesiny faharoa izy, ary niantso teo alohany ny vahoaka hoe: Abreka'
  - type: note
    content: Teny ejiptiana izay midika hoe Mandohaleha.
  - type: text
    content: '! Notendreny ho mpanapaka ny tany Ejipta rehetra izy. '
  '44':
  - type: text
    content: 'Dia hoy i Farao tamin’i Josefa: Izaho no Farao, kanefa raha tsy teninao dia tsy hisy olona hanetsika ny tanany na ny tongony eto amin’ny tany Ejipta manontolo. '
  '45':
  - type: text
    content: 'Nataon’i Farao hoe Zafenata-Panea ny anaran’i Josefa. Nomeny azy ho vadiny i Asenata, zanakavavin’i Poty-Fera, mpisorona tao Ona. Ary nandeha nitety ny tany Ejipta i Josefa. '
  '46':
  - type: text
    content: Telopolo taona i Josefa raha niseho teo anatrehan’i Farao, mpanjakan’i Ejipta. Niala teo anatrehan’i Farao i Josefa ka nandeha nitety ny tany Ejipta manontolo.
  '47':
  - type: text
    content: 'Nahavokatra be dia be tokoa ny tany tamin’ny taon-jina fito. '
  '48':
  - type: text
    content: 'Dia namory ny hanina rehetra tamin’izany fito taona izany teo amin’ny tany Ejipta i Josefa ka nitahiry ireo tany amin’ny tanàna rehetra. Notahiriziny tao anatin’ny tanàna ny vokatry ny saha manodidina ny isan-tanàna. '
  '49':
  - type: text
    content: Namory vary tahaka ny fasika any an-dranomasina i Josefa; eny, be dia be izany ka tsy nanisa intsony izy satria tsy hita isa ireo.
  '5':
  - type: text
    content: 'Natory indray izy ka nanonofy fanindroany ka indro, hono, nisy salohim-bary fito niakatra tamin’ny tahony iray, sady matavy no tsara. '
  '50':
  - type: text
    content: 'Tsy mbola tonga ny taonan’ny mosary fony i Josefa niteraka zazalahy roa tamin’i Asenata, zanakavavin’i Poty-Fera, mpisorona tao Ona. '
  '51':
  - type: text
    content: Ny anaran’ny lahimatoa dia nataon’i Josefa hoe Manase
  - type: note
    content: 'Manase: Mampanadino.'
  - type: text
    content: ', fa Andriamanitra, hoy izy, efa nampanadino ahy ny fahoriako rehetra sy izay rehetra tao an-tranon’ny raiko. '
  '52':
  - type: text
    content: Ny anaran’ny zandriny kosa dia nataony hoe Efraima
  - type: note
    content: 'Efraima: Vokatra be.'
  - type: text
    content: ; fa Andriamanitra, hoy izy, efa nahamaro ahy teto amin’ny tanin’ny fahoriako.
  '53':
  - type: text
    content: 'Ary tapitra ny taon-jina fito teo amin’ny tany Ejipta, '
  '54':
  - type: text
    content: fa niandoha kosa ny fito taona nisy mosary, araka izay efa voalazan’i Josefa. Ary nisy mosary tany amin’ny tany rehetra; nefa nanerana ny tany Ejipta manontolo dia mbola nisy hanina ihany.
  '55':
  - type: text
    content: 'Rehefa mosarena ny tany Ejipta manontolo dia nitaraina nangataka hanina tamin’i Farao ny olona. Dia hoy i Farao tamin’ny Ejiptiana rehetra: Mankanesa any amin’i Josefa, koa izay holazainy aminareo dia ataovy. '
  '56':
  - type: text
    content: 'Tany amin’ny tany rehetra ny mosary, nefa namoha ny trano fitahirizam-bary i Josefa ka nivaro-bary tamin’ny Ejiptiana. Tena mafy ny mosary nanerana ny tany Ejipta. '
  '57':
  - type: text
    content: Ary ny tany rehetra dia nankany Ejipta ho any amin’i Josefa mba hividy vary fa mafy ny mosary tany amin’ny tany rehetra.
  '6':
  - type: text
    content: 'Ary indreo, nisy salohim-bary fito maivam-boa kosa sady mainan’ny rivotra avy any atsinanana, nitsimoka nanaraka ireny. '
  '7':
  - type: text
    content: Ary ny salohim-bary maivam-boa dia nitelina ny salohim-bary fito matavy sy be voa. Dia nahatsiaro i Farao, koa indro fa nofy ihany izany.
  '8':
  - type: text
    content: 'Nony maraina dia nitebiteby izy ka nandefa iraka haka ny ombiasy rehetra tany Ejipta sy ny olon-kendriny rehetra. Nambaran’i Farao azy ireo ny nofiny, nefa tsy nisy na dia iray aza nahalaza izay heviny tamin’i Farao. '
  '9':
  - type: text
    content: 'Dia niteny tamin’i Farao ilay lehiben’ny mpitondra kapoaka hoe: Tsaroako izao ny hadisoako. '
