document_id: 2CH.3
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fananganana ny tempoly
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 1Mpa 6
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Nanomboka nanorina ny tranon’NY TOMPO tany Jerosalema, tao an-tendrombohitra Moria, ilay nisehoan’NY TOMPO tamin’i Davida rainy, i Solomona, dia ilay namboarina teo amin’ny toerana nofidin’i Davida teo amin’ny famoloan’i Araona jebosita. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Nanomboka nanorina ny Trano izy tamin’ny andro faharoa tamin’ny volana faharoa tamin’ny taona fahefatra nanjakany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Toy izao no nanorenan’i Solomona ny tranon’Andriamanitra: Ny lavany, raha araka ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: hakiho
  - type: text
    text: ' taloha, dia enimpolo hakiho, ary ny sakany dia roapolo hakiho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ny amin’ny lalantsara fidirana izay eo anoloana dia roapolo hakiho ny lavany, mitovy amin’ny sakan’ny Trano ihany, ary ny haavony dia roapolo amby zato hakiho; ary nopetahany takelaka volamena tsara ny ao anatiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ny efitrano lehibe dia nopetahany hazo kipreso, izay vao nopetahany takelaka volamena tsara ireo ary noravahany hazo palma sy rojo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Noravahany vatosoa koa ny Trano; ny volamena dia volamena avy any Parvaima. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Nopetahany takelaka volamena ny Trano, dia ny rairainy, ny tokonany, ny rindriny ary ny lelam-baravarany; nasiany sarin’ny kerobima koa ny rindrina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Nanangana ny efitrano masina indrindra izy: Ny lavany dia roapolo hakiho mifanerana amin’ny sakan’ny trano, roapolo hakiho koa ny sakany; nopetahany takelaka volamena tsara milanja talenta eninjato izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ny lanjan’ny hombo volamena dia sekela dimampolo. Ny efitrano ambony dia nopetahany volamena koa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Nosokirany sarin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: kerobima
  - type: text
    text: ' roa tao amin’ny efitrano masina indrindra, avy eo dia nopetahany takelaka volamena. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ny halavan’ny elatry ny kerobima dia roapolo hakiho: Ny elatry ny iray dia dimy hakiho, mipaka amin’ny rindrina; ary ny elany iray koa dia dimy hakiho sady mifanendry amin’ny elatry ny kerobima iray; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'ny elatry ny kerobima iray koa dia dimy hakiho, mipaka amin’ny rindrina; ary ny elany iray koa dia dimy hakiho sady mifanendry amin’ny elatry ny kerobima iray. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Nivelatra ny elatr’ireo kerobima ireo ka roapolo hakiho ny halavany; nijoro tamin’ny tongony izy ary nanatrika ny trano ny tarehiny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Nanao ny efitra lamba tamin’ny kofehy manga sy volomparasy ary jaky sy rongony fotsy madinika izy; ary nataony sarin’ny kerobima ny sorany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ireo andry varahina sy ny alitara
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 1Mpa 7.15-22
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Nanangana andry roa teo anoloan’ny Trano izy; dimy amby telopolo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: hakiho
  - type: text
    text: ' ny haavony ary ny tendrony teo an-tampony dia dimy hakiho avy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Nanao rojo tao amin’ny efitra anatiny izy ka nataony teo an-tampon’ny andry ireo; ary nanao sarin’ampongabendanitra zato izy ka nataony teo amin’ny rojo ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ary natsangany teo anoloan’ny tempoly ny andry, ny iray dia teo amin’ny ankavanana, ary ny iray dia teo amin’ny ankavia; ary ny anaran’ilay teo amin’ny ankavanana dia nataony hoe Jakina
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Jakina: Hampiorina izy.'
    marker-yv: yv-n
  - type: text
    text: ' ary ny anaran’ny teo amin’ny ankavia kosa dia nataony hoe Boaza'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Boaza: Ao aminy no misy hery.'
    marker-yv: yv-n
  - type: text
    text: .
