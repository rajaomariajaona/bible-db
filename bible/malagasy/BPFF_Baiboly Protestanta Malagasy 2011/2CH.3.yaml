document_id: 2CH.3,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fananganana ny tempoly
  - type: heading
    content: 1Mpa 6
  - type: text
    content: 'Nanomboka nanorina ny tranon’NY TOMPO tany Jerosalema, tao an-tendrombohitra Moria, ilay nisehoan’NY TOMPO tamin’i Davida rainy, i Solomona, dia ilay namboarina teo amin’ny toerana nofidin’i Davida teo amin’ny famoloan’i Araona jebosita. '
  '10':
  - type: text
    content: 'Nosokirany sarin’ny '
  - type: text
    content: kerobima
  - type: text
    content: ' roa tao amin’ny efitrano masina indrindra, avy eo dia nopetahany takelaka volamena. '
  '11':
  - type: text
    content: 'Ny halavan’ny elatry ny kerobima dia roapolo hakiho: Ny elatry ny iray dia dimy hakiho, mipaka amin’ny rindrina; ary ny elany iray koa dia dimy hakiho sady mifanendry amin’ny elatry ny kerobima iray; '
  '12':
  - type: text
    content: 'ny elatry ny kerobima iray koa dia dimy hakiho, mipaka amin’ny rindrina; ary ny elany iray koa dia dimy hakiho sady mifanendry amin’ny elatry ny kerobima iray. '
  '13':
  - type: text
    content: Nivelatra ny elatr’ireo kerobima ireo ka roapolo hakiho ny halavany; nijoro tamin’ny tongony izy ary nanatrika ny trano ny tarehiny.
  '14':
  - type: text
    content: Nanao ny efitra lamba tamin’ny kofehy manga sy volomparasy ary jaky sy rongony fotsy madinika izy; ary nataony sarin’ny kerobima ny sorany.
  - type: heading
    content: Ireo andry varahina sy ny alitara
  - type: heading
    content: 1Mpa 7.15-22
  '15':
  - type: text
    content: 'Nanangana andry roa teo anoloan’ny Trano izy; dimy amby telopolo '
  - type: text
    content: hakiho
  - type: text
    content: ' ny haavony ary ny tendrony teo an-tampony dia dimy hakiho avy. '
  '16':
  - type: text
    content: 'Nanao rojo tao amin’ny efitra anatiny izy ka nataony teo an-tampon’ny andry ireo; ary nanao sarin’ampongabendanitra zato izy ka nataony teo amin’ny rojo ireo. '
  '17':
  - type: text
    content: Ary natsangany teo anoloan’ny tempoly ny andry, ny iray dia teo amin’ny ankavanana, ary ny iray dia teo amin’ny ankavia; ary ny anaran’ilay teo amin’ny ankavanana dia nataony hoe Jakina
  - type: note
    content: 'Jakina: Hampiorina izy.'
  - type: text
    content: ' ary ny anaran’ny teo amin’ny ankavia kosa dia nataony hoe Boaza'
  - type: note
    content: 'Boaza: Ao aminy no misy hery.'
  - type: text
    content: .
  '2':
  - type: text
    content: 'Nanomboka nanorina ny Trano izy tamin’ny andro faharoa tamin’ny volana faharoa tamin’ny taona fahefatra nanjakany. '
  '3':
  - type: text
    content: 'Toy izao no nanorenan’i Solomona ny tranon’Andriamanitra: Ny lavany, raha araka ny '
  - type: text
    content: hakiho
  - type: text
    content: ' taloha, dia enimpolo hakiho, ary ny sakany dia roapolo hakiho. '
  '4':
  - type: text
    content: 'Ny amin’ny lalantsara fidirana izay eo anoloana dia roapolo hakiho ny lavany, mitovy amin’ny sakan’ny Trano ihany, ary ny haavony dia roapolo amby zato hakiho; ary nopetahany takelaka volamena tsara ny ao anatiny. '
  '5':
  - type: text
    content: 'Ny efitrano lehibe dia nopetahany hazo kipreso, izay vao nopetahany takelaka volamena tsara ireo ary noravahany hazo palma sy rojo. '
  '6':
  - type: text
    content: 'Noravahany vatosoa koa ny Trano; ny volamena dia volamena avy any Parvaima. '
  '7':
  - type: text
    content: Nopetahany takelaka volamena ny Trano, dia ny rairainy, ny tokonany, ny rindriny ary ny lelam-baravarany; nasiany sarin’ny kerobima koa ny rindrina.
  '8':
  - type: text
    content: 'Nanangana ny efitrano masina indrindra izy: Ny lavany dia roapolo hakiho mifanerana amin’ny sakan’ny trano, roapolo hakiho koa ny sakany; nopetahany takelaka volamena tsara milanja talenta eninjato izany. '
  '9':
  - type: text
    content: Ny lanjan’ny hombo volamena dia sekela dimampolo. Ny efitrano ambony dia nopetahany volamena koa.
