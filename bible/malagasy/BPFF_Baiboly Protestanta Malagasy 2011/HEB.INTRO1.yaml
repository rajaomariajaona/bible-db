document_id: HEB.INTRO1,3103
type_code: plt
verses:
  '1':
  - type: text
    content: INDRAY MIJERY
  - type: text
    content: 'Antsoina hoe epistily ity soratra ity, kanefa tsy mitovy amin’ny epistily mahazatra: Hafa kely ny fanombohany fa tsy mba misy fiarahabana, tsy misy olona voalaza fa nandefa azy na anoratana azy. Soratra miendrika fampianarana, toriteny, famelabelarana lalina ny Epistily. Manana izay mampiavaka azy koa izy amin’ny fomba fandaharan-tenin’ny Grika manam-pahaizana, ary koa ny fampiasany andininy ao amin’ny Testamenta Taloha voadika ara-bakiteny avy amin’ny Baiboly dikanteny grika na ny Septanta.'
  - type: text
    content: Nantsoina hoe Hebreo ny olona nanoratana ka nahatonga ny fiheverana hoe Jiosy nonina tany Palestina izy ireo.
  - type: text
    content: Fantatra avy amin’ny rijan-teny fa nobeazina tao anatin’ny kolontsaina grika izy ireo ary Kristiana efa niorim-paka tamin’ny finoana sady nafana fo tamin’ny maha mpivavaka azy, saingy nandalo fizahan-toetra mahamay ka mila fampaherezana, tsy avela hihemotra.
  - type: text
    content: Voaresaka ato ny fanao tao amin’ny tempoly ka angamba talohan’ny naharavany tamin’ny taona 70 no nahavoasoratra ny Hebreo.
  - type: text
    content: Ny votoatin’ny Epistily
  - type: text
    content: Toa naniry hiverina amin’ny fivavahana jiosy izay fantany tsara ireo olona anoratana ireo ka nila nampahatsiarovina ny fahalehibeazan’i Kristy sy ny fihoarany an’i Mosesy sy ny mpisorona ary ny Mpisoronabe na dia i Melkizedeka aza.
  - type: text
    content: 'Jesosy no nahatanteraka izay rehetra niantomboka tany amin’ny Testamenta Taloha: Izy dia sady mpisorona no Mpisoronabe ary sorona mihitsy koa aza.'
  - type: text
    content: Ny firafitry ny Epistily
  - type: text
    content: 'Niteny tamintsika tamin’ny alalan’ny Zanany Andriamanitra: 1.1-4'
  - type: text
    content: 'Ny toerana misy an’i Kristy oharina amin’Andriamanitra sy oharina amin’ny olona: 1.5–2.18'
  - type: text
    content: 'Ny fisoronan’i Kristy neken’Andriamanitra ho an’ny olona sy ny fampaherezana ny mpivavaka haharitra amin’ny fivavahana: 3.1–5.10'
  - type: text
    content: 'Kristy no Mpisoronabe ary tanteraka ao Aminy ny fanekena taloha: 5.11–10.39'
  - type: text
    content: 'Ny ohatra navelan’ireo olo-malazan’ny finoana sy ny faharetana ilaina amin’ny Kristiana: 11.1–12.13'
  - type: text
    content: 'Fitaomana ny Mpino handeha amin’ny fahamasinana sy fahamendrehana eo amin’ny fifandraisana amin’ny olona rehetra: 12.14–13.19'
  - type: text
    content: 'Tsodrano sy fanaovam-beloma: 13.20-25'
