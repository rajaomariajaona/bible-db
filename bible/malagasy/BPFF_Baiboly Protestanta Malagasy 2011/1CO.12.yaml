document_id: 1CO.12
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fanomezana avy amin’ny Fanahy Masina
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ny amin’ny zavatra ara-panahy, ry rahalahy, dia tsy tiako tsy ho fantatrareo izany. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Fantatrareo fa fony '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jentilisa
  - type: text
    text: ' ianareo dia noentina tany amin’ny sampy moana, araka izay nitaomana anareo. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Koa mampahafantatra anareo aho fa tsy misy olona ampitenenin’ny Fanahin’Andriamanitra ka miteny hoe: Voaozona Jesosy; ary tsy misy mahay manaiky hoe: Jesosy no Tompo, raha tsy amin’ny Fanahy Masina.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Zarazaraina ho samihafa ny fanomezam-pahasoavana nefa ny Fanahy dia iray ihany. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Zarazaraina ho samihafa ny fanompoana nefa ny Tompo dia iray ihany. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Zarazaraina ho samihafa ny asa nefa iray ihany Andriamanitra izay miasa ny zavatra rehetra amin’ny olona rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary ny tsirairay dia samy nomen’ny Fanahy hahay mampiseho amin’ny olona rehetra ny fanomezam-pahasoavana. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Fa ny iray dia nomen’ny Fanahy teny fahendrena; ny iray dia teny fahalalana, araka izany Fanahy izany ihany; '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'ny iray dia finoana, amin’izany Fanahy izany ihany; ny iray dia fanomezam-pahasoavana hoenti-manasitrana, amin’izany Fanahy iray izany ihany; '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'ny iray dia ny manao fahagagana; ny iray dia ny maminany; ny iray dia ny mahafantatra fanahy samihafa; ny iray dia ny miteny amin’ny fiteny samihafa tsy fantatra; ary ny iray dia ny mandika fiteny tsy fantatra. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ireo rehetra ireo dia asan’ny Fanahy iray ihany, zarazarainy ho azy rehetra avy araka ny sitrapony.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Iray ny tena, kanefa maro ny momba ny tena
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Fa tahaka ny tena iray ihany kanefa maro ny momba azy, ary ireo rehetra momba ny tena ireo na dia maro aza dia tena iray ihany, dia tahaka izany koa '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Fa Fanahy iray ihany no nanaovana batisa antsika rehetra ho tena iray, na '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jiosy
  - type: text
    text: ', na Grika, na andevo, na olona afaka; ary isika rehetra dia efa nampisotroina ny Fanahy iray.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Nefa tsy iray ny momba ny tena fa maro. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Raha hilaza ny tongotra hoe: Satria tsy tanana aho dia tsy mba momba ny tena, amin’izany va dia tsy momba ny tena izy? '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Raha hilaza ny sofina hoe: Satria tsy maso aho dia tsy mba momba ny tena, koa amin’izany va dia tsy momba ny tena izy? '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Raha maso avokoa ny tena rehetra, aiza izay fandrenesana? Raha fandrenesana avokoa, aiza izay fanamboloana? '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Fa Andriamanitra efa nametraka izay rehetra momba ny tena samy ho eo amin’ny tena, araka ny sitrapony. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary raha izay rehetra momba ny tena no tonga iray monja, aiza intsony izay tena? '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Fa maro ny momba ny tena nefa ny tena dia iray ihany. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary tsy mahazo milaza amin’ny tanana ny maso hoe: Tsy mila anao aho; tsy mahazo milaza amin’ny tongotra ny loha hoe: Tsy mila anareo aho. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Fa vao mainka aza ilaintsika ny momba ny tena izay atao ho malemilemy kokoa noho ny sasany. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary ny momba ny tena izay ataontsika ho kely voninahitra kokoa dia tafiantsika voninahitra bebe kokoa; ary izay tsy misy haja amin’ny momba ny tenantsika no hajaintsika kokoa; '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'fa tsy mila izany ny efa misy haja rahateo amin’ny momba ny tenantsika. Fa tamin’ny nanamboaran’Andriamanitra ny tena dia izay kely voninahitra no nomeny voninahitra bebe kokoa, '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'mba tsy hisy fisarahana eo amin’ny tena, fa mba hifampiahy ny momba ny tena rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Ary raha mijaly ny iray amin’ny momba ny tena dia miara-mijaly avokoa izay rehetra momba ny tena; fa raha omem-boninahitra kosa ny iray amin’ny momba ny tena dia miara-mifaly avokoa izay rehetra momba ny tena.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ary ianareo no tenan’i Kristy ka samy momba ny tenany avokoa, araka ny anjaranareo avy. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Ary teo amin’ny fiangonana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.28 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: eklesia.
    marker-yv: yv-n
  - type: text
    text: ' dia izao no nanendren’Andriamanitra azy: Voalohany apostoly, faharoa mpaminany, fahatelo mpampianatra, manaraka izany dia fahagagana, fanomezam-pahasoavana hoenti-manasitrana, asa fanampiana, fitondrana ary fiteny samihafa tsy fantatra. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Apostoly va izy rehetra? Mpaminany va izy rehetra? Mpampianatra va izy rehetra? Manao fahagagana va izy rehetra? '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Manana fanomezam-pahasoavana hoenti-manasitrana va izy rehetra? Miteny amin’ny fiteny tsy fantatra va izy rehetra? Mandika teny va izy rehetra? '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Nefa maniria fatratra ny fanomezam-pahasoavana lehibe indrindra.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ary indro, izay lalana tsara indrindra no atoroko anareo:'
