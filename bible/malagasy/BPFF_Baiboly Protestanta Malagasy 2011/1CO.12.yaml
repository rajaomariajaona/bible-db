document_id: 1CO.12,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fanomezana avy amin’ny Fanahy Masina
  - type: text
    content: 'Ny amin’ny zavatra ara-panahy, ry rahalahy, dia tsy tiako tsy ho fantatrareo izany. '
  '10':
  - type: text
    content: 'ny iray dia ny manao fahagagana; ny iray dia ny maminany; ny iray dia ny mahafantatra fanahy samihafa; ny iray dia ny miteny amin’ny fiteny samihafa tsy fantatra; ary ny iray dia ny mandika fiteny tsy fantatra. '
  '11':
  - type: text
    content: Ireo rehetra ireo dia asan’ny Fanahy iray ihany, zarazarainy ho azy rehetra avy araka ny sitrapony.
  - type: heading
    content: Iray ny tena, kanefa maro ny momba ny tena
  '12':
  - type: text
    content: 'Fa tahaka ny tena iray ihany kanefa maro ny momba azy, ary ireo rehetra momba ny tena ireo na dia maro aza dia tena iray ihany, dia tahaka izany koa '
  - type: text
    content: Kristy
  - type: text
    content: '. '
  '13':
  - type: text
    content: 'Fa Fanahy iray ihany no nanaovana batisa antsika rehetra ho tena iray, na '
  - type: text
    content: Jiosy
  - type: text
    content: ', na Grika, na andevo, na olona afaka; ary isika rehetra dia efa nampisotroina ny Fanahy iray.'
  '14':
  - type: text
    content: 'Nefa tsy iray ny momba ny tena fa maro. '
  '15':
  - type: text
    content: 'Raha hilaza ny tongotra hoe: Satria tsy tanana aho dia tsy mba momba ny tena, amin’izany va dia tsy momba ny tena izy? '
  '16':
  - type: text
    content: 'Raha hilaza ny sofina hoe: Satria tsy maso aho dia tsy mba momba ny tena, koa amin’izany va dia tsy momba ny tena izy? '
  '17':
  - type: text
    content: 'Raha maso avokoa ny tena rehetra, aiza izay fandrenesana? Raha fandrenesana avokoa, aiza izay fanamboloana? '
  '18':
  - type: text
    content: 'Fa Andriamanitra efa nametraka izay rehetra momba ny tena samy ho eo amin’ny tena, araka ny sitrapony. '
  '19':
  - type: text
    content: 'Ary raha izay rehetra momba ny tena no tonga iray monja, aiza intsony izay tena? '
  '2':
  - type: text
    content: 'Fantatrareo fa fony '
  - type: text
    content: Jentilisa
  - type: text
    content: ' ianareo dia noentina tany amin’ny sampy moana, araka izay nitaomana anareo. '
  '20':
  - type: text
    content: 'Fa maro ny momba ny tena nefa ny tena dia iray ihany. '
  '21':
  - type: text
    content: 'Ary tsy mahazo milaza amin’ny tanana ny maso hoe: Tsy mila anao aho; tsy mahazo milaza amin’ny tongotra ny loha hoe: Tsy mila anareo aho. '
  '22':
  - type: text
    content: 'Fa vao mainka aza ilaintsika ny momba ny tena izay atao ho malemilemy kokoa noho ny sasany. '
  '23':
  - type: text
    content: 'Ary ny momba ny tena izay ataontsika ho kely voninahitra kokoa dia tafiantsika voninahitra bebe kokoa; ary izay tsy misy haja amin’ny momba ny tenantsika no hajaintsika kokoa; '
  '24':
  - type: text
    content: 'fa tsy mila izany ny efa misy haja rahateo amin’ny momba ny tenantsika. Fa tamin’ny nanamboaran’Andriamanitra ny tena dia izay kely voninahitra no nomeny voninahitra bebe kokoa, '
  '25':
  - type: text
    content: 'mba tsy hisy fisarahana eo amin’ny tena, fa mba hifampiahy ny momba ny tena rehetra. '
  '26':
  - type: text
    content: Ary raha mijaly ny iray amin’ny momba ny tena dia miara-mijaly avokoa izay rehetra momba ny tena; fa raha omem-boninahitra kosa ny iray amin’ny momba ny tena dia miara-mifaly avokoa izay rehetra momba ny tena.
  '27':
  - type: text
    content: 'Ary ianareo no tenan’i Kristy ka samy momba ny tenany avokoa, araka ny anjaranareo avy. '
  '28':
  - type: text
    content: Ary teo amin’ny fiangonana
  - type: note
    content: 'Na: eklesia.'
  - type: text
    content: ' dia izao no nanendren’Andriamanitra azy: Voalohany apostoly, faharoa mpaminany, fahatelo mpampianatra, manaraka izany dia fahagagana, fanomezam-pahasoavana hoenti-manasitrana, asa fanampiana, fitondrana ary fiteny samihafa tsy fantatra. '
  '29':
  - type: text
    content: 'Apostoly va izy rehetra? Mpaminany va izy rehetra? Mpampianatra va izy rehetra? Manao fahagagana va izy rehetra? '
  '3':
  - type: text
    content: 'Koa mampahafantatra anareo aho fa tsy misy olona ampitenenin’ny Fanahin’Andriamanitra ka miteny hoe: Voaozona Jesosy; ary tsy misy mahay manaiky hoe: Jesosy no Tompo, raha tsy amin’ny Fanahy Masina.'
  '30':
  - type: text
    content: 'Manana fanomezam-pahasoavana hoenti-manasitrana va izy rehetra? Miteny amin’ny fiteny tsy fantatra va izy rehetra? Mandika teny va izy rehetra? '
  '31':
  - type: text
    content: Nefa maniria fatratra ny fanomezam-pahasoavana lehibe indrindra.
  - type: text
    content: 'Ary indro, izay lalana tsara indrindra no atoroko anareo:'
  '4':
  - type: text
    content: 'Zarazaraina ho samihafa ny fanomezam-pahasoavana nefa ny Fanahy dia iray ihany. '
  '5':
  - type: text
    content: 'Zarazaraina ho samihafa ny fanompoana nefa ny Tompo dia iray ihany. '
  '6':
  - type: text
    content: 'Zarazaraina ho samihafa ny asa nefa iray ihany Andriamanitra izay miasa ny zavatra rehetra amin’ny olona rehetra. '
  '7':
  - type: text
    content: 'Ary ny tsirairay dia samy nomen’ny Fanahy hahay mampiseho amin’ny olona rehetra ny fanomezam-pahasoavana. '
  '8':
  - type: text
    content: 'Fa ny iray dia nomen’ny Fanahy teny fahendrena; ny iray dia teny fahalalana, araka izany Fanahy izany ihany; '
  '9':
  - type: text
    content: 'ny iray dia finoana, amin’izany Fanahy izany ihany; ny iray dia fanomezam-pahasoavana hoenti-manasitrana, amin’izany Fanahy iray izany ihany; '
