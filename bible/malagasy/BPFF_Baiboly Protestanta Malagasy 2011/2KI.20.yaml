document_id: 2KI.20,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny aretin’i Hezekia sy ny nahasitrana azy
  - type: heading
    content: Isa 38.1-8
  - type: text
    content: 'Tamin’izany andro izany dia narary saika maty i Hezekia. Nankao aminy Isaia mpaminany, zanak’i Amoza, ka nilaza taminy hoe: Izao no lazain’NY TOMPO: Hafaro ny ankohonanao, fa ho faty ianao fa tsy ho velona intsony. '
  '10':
  - type: text
    content: 'Ary namaly i Hezekia hoe: Mora foana ny handrosoan’ny aloka ambaratonga folo; koa tsy izany, fa aoka ny aloka hiverina ambaratonga folo! '
  '11':
  - type: text
    content: Nitaraina tamin’NY TOMPO Isaia mpaminany, ary NY TOMPO nampihemotra ny aloka ambaratonga folo tamin’ilay nidinany teo amin’ny famantaranandro aloka an’i Ahaza; nihemotra ambaratonga folo izany.
  - type: heading
    content: Mandray ireo iraka avy any Babilona i Hezekia
  - type: heading
    content: Isa 39.1-8
  '12':
  - type: text
    content: 'Tamin’izany andro izany no nampitondran’i Berodaka-Baladana, zanak’i Baladana, mpanjakan’i Babilona, taratasy sy fanomezana ho an’i Hezekia; fa reny hoe narary izy. '
  '13':
  - type: text
    content: 'Ary nandray ireo iraka i Hezekia ka naneho azy ny trano rehetra fitahirizany zava-tsoa, ny volafotsy, ny volamena, ny zavamanitra ary ny diloilo tsara, mbamin’ny trano fitahirizana ny fiadiany rehetra sy izay rehetra tao amin’ny trano fitahirizany: Tsy nisy zavatra tsy nasehon’i Hezekia azy, na ny tao an-tranony, na ny tao amin’ny fanjakany manontolo.'
  '14':
  - type: text
    content: 'Dia nankany amin’i Hezekia mpanjaka Isaia mpaminany ka niteny taminy hoe: Inona no nolazain’ireo olona nankaty aminao ireo, ary avy taiza moa izy? Hoy i Hezekia: Avy tany an-tany lavitra izy, dia avy tany Babilona. '
  '15':
  - type: text
    content: 'Hoy izy: Koa inona avy anefa no hitany tato an-tranonao? Ary hoy i Hezekia: Izay rehetra ato an-tranoko dia hitany avokoa; tsy misy zavatra tsy nasehoko azy ny ato amin’ny trano fitahirizako rehetra. '
  '16':
  - type: text
    content: 'Dia hoy Isaia tamin’i Hezekia: Henoy ary ny tenin’NY TOMPO: '
  '17':
  - type: text
    content: 'Indro, avy ny andro, koa hoentina any Babilona izay rehetra ao an-tranonao sy izay rehetra noharin’ny razanao ka voarakitra mandraka androany; eny, tsy hisy sisa hijanona na inona na inona, hoy NY TOMPO. '
  '18':
  - type: text
    content: 'Ary na dia ny naterakao koa aza dia hisy hoentiny ka ho '
  - type: text
    content: ionòka
  - type: text
    content: ' any amin’ny lapan’ny mpanjakan’i Babilona ireo. '
  '19':
  - type: text
    content: 'Dia hoy i Hezekia tamin’Isaia: Tsara ny tenin’NY TOMPO izay nolazainao. Hoy koa izy: Eny, tsy hisy fiadanana sy fandriampahalemana va amin’ny androko?'
  - type: heading
    content: 2Tan 32.32-33
  '2':
  - type: text
    content: 'Dia nitodika nankany amin’ny rindrina izy ka nivavaka tamin’NY TOMPO hoe: '
  '20':
  - type: text
    content: 'Ny tantaran’i Hezekia sisa sy ny heriny rehetra mbamin’ny nanaovany ny kamory sy ny lakandrano nitarihany rano ho ao an-tanàna, tsy voasoratra ao amin’ny bokin’ny tantaran’ny mpanjakan’ny Joda va izany? '
  '21':
  - type: text
    content: Dia nodimandry any amin’ny razany i Hezekia ka i Manase zanany no nanjaka nandimby azy.
  '3':
  - type: text
    content: TOMPO ô, enga anie ka hotsarovanao ny nandehanako teo anatrehanao tamin’ny fahamarinana sy tamin’ny foko manontolo ary ny nanaovako izay tsara teo imasonao! Dia nitomany mafy dia mafy izy.
  '4':
  - type: text
    content: 'Ary raha tsy mbola tafavoaka ny kianja afovoan’ny tanàna Isaia dia tonga taminy ny tenin’NY TOMPO hoe: '
  '5':
  - type: text
    content: 'Miverena ka lazao amin’i Hezekia, mpanapaka ny oloko hoe: Izao no lazain’NY TOMPO, Andriamanitr’i Davida rainao: Efa reko ny fitarainanao ary efa hitako ny ranomasonao. Indro, hanasitrana anao Aho ka raha afaka ampitso dia hiakatra ho ao amin’ny tranon’NY TOMPO ianao. '
  '6':
  - type: text
    content: Ary hampiako dimy amby folo taona ny andronao, sady hamonjy anao sy ity tanàna ity amin’ny tanan’ny mpanjakan’i Asiria Aho; hiaro ity tanàna ity Aho noho ny amin’ny tenako sy i Davida mpanompoko.
  '7':
  - type: text
    content: 'Ary hoy Isaia: Makà mofo aviavy. Dia nalainy izany ka napetany tamin’ny vay dia sitrana izy.'
  '8':
  - type: text
    content: 'Hoy mantsy i Hezekia tamin’Isaia: Inona no famantarana fa hositranin’NY TOMPO aho ka hiakatra any amin’ny tranon’NY TOMPO raha afaka ampitso? '
  '9':
  - type: text
    content: 'Hoy Isaia: Izao no famantarana ho anao avy amin’NY TOMPO hahalalanao fa NY TOMPO hanatanteraka izay zavatra nolazainy: Handroso ambaratonga folo va ny aloka, sa hiverina ambaratonga folo? '
