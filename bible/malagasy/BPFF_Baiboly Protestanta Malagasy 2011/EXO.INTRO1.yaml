type_code: plt
verses:
  '1':
  - type: text
    content: INDRAY MIJERY
  - type: text
    content: Ny votoatin’ny Boky
  - type: text
    content: Ny hoe Eksodosy dia midika hoe Lalana mivoaka. Milaza ny nivoahan’ny Zanak’Israely avy tany Ejipta izany. Rehefa nitoetra taonjato maro teny Ejipta ny Zanak’Israely dia nandevozin’ny mpanjakan’i Ejipta. Nitaraina tamin’Andriamanitra izy dia nohenoiny ny fitarainany ka niditra an-tsehatra Andriamanitra namonjy sy nanafaka azy tamin’ny alalan’ny fahagagana maro. Ny lehibe indrindra tamin’ireny dia ny Paska sy ny fitàna ny Ranomasina Mena. I Mosesy no fiasana teo am-pelatanan’Andriamanitra tamin’izany fanafahana izany.
  - type: text
    content: 'Notarihin’Andriamanitra namakivaky ny tany efitra ny Zanak’Israely mba hampianarana azy hiankina tanteraka Aminy. Tao an-tendrombohitra Sinay no nanomezany azy ny Didiny izay fepetran’ny fanekena: NY TOMPO no nanafaka azy tamin’ny fahandevozana; noho izany dia Izy no ho Andriamanitra tokana hotompoin’ny Israely, ary ny Israely kosa dia hanaraka ny didiny rehetra. Vetivety anefa dia nivadika ny Israely ka nanompo sarin-janak’omby volamena. Nirehitra taminy ny fahatezeran’Andriamanitra. Tatỳ aoriana dia nohavaozin’Andriamanitra ny fanekena.'
  - type: text
    content: Voalaza ato amin’ny Boky koa ny nananganana ny tabernakely na ny tranolay fihaonana, koa rehefa tafatsangana izany dia niseho ny voninahitr’Andriamanitra, izay maneho fa eo afovoan’ny olony Izy
  - type: text
    content: Ny firafitry ny Boky
  - type: text
    content: Ny fanandevozana sy ny fanafahana ny Zanak’Israely
  - type: text
    content: 'Ny Zanak’Israely tany Ejipta: 1'
  - type: text
    content: 'Ny fahatanoran’i Mosesy sy ny fiantsoan’Andriamanitra azy: 2–7.7'
  - type: text
    content: 'Ireo loza tany Ejipta sy ny Paska: 7.8–13.16'
  - type: text
    content: 'Ny fialana tany Ejipta: 13.17–15.21'
  - type: text
    content: 'Ny dia namakivaky ny tany efitra: 15.22–18.27'
  - type: text
    content: 'Ny fanekena tao Sinay: 19–24'
  - type: text
    content: Ny fanorenan’Andriamanitra ny fonenany eo anivon’ny Zanak’Israely
  - type: text
    content: 'Ny fanomanana ny fananganana ny tabernakely: 25–31'
  - type: text
    content: 'Ny zanak’omby volamena sy ny nanavaozana ny fanekena: 32–34'
  - type: text
    content: 'Ny fananganana ny tabernakely: 35–40'
