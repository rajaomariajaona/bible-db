document_id: EXO.INTRO1
type_code: plt
segments:
- type: usfm
  marker: imt1
  children:
  - type: text
    text: INDRAY MIJERY
- type: usfm
  marker: is1
  children:
  - type: text
    text: Ny votoatin’ny Boky
- type: usfm
  marker: ip
  children:
  - type: text
    text: Ny hoe Eksodosy dia midika hoe Lalana mivoaka. Milaza ny nivoahan’ny Zanak’Israely avy tany Ejipta izany. Rehefa nitoetra taonjato maro teny Ejipta ny Zanak’Israely dia nandevozin’ny mpanjakan’i Ejipta. Nitaraina tamin’Andriamanitra izy dia nohenoiny ny fitarainany ka niditra an-tsehatra Andriamanitra namonjy sy nanafaka azy tamin’ny alalan’ny fahagagana maro. Ny lehibe indrindra tamin’ireny dia ny Paska sy ny fitàna ny Ranomasina Mena. I Mosesy no fiasana teo am-pelatanan’Andriamanitra tamin’izany fanafahana izany.
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Notarihin’Andriamanitra namakivaky ny tany efitra ny Zanak’Israely mba hampianarana azy hiankina tanteraka Aminy. Tao an-tendrombohitra Sinay no nanomezany azy ny Didiny izay fepetran’ny fanekena: NY TOMPO no nanafaka azy tamin’ny fahandevozana; noho izany dia Izy no ho Andriamanitra tokana hotompoin’ny Israely, ary ny Israely kosa dia hanaraka ny didiny rehetra. Vetivety anefa dia nivadika ny Israely ka nanompo sarin-janak’omby volamena. Nirehitra taminy ny fahatezeran’Andriamanitra. Tatỳ aoriana dia nohavaozin’Andriamanitra ny fanekena.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: Voalaza ato amin’ny Boky koa ny nananganana ny tabernakely na ny tranolay fihaonana, koa rehefa tafatsangana izany dia niseho ny voninahitr’Andriamanitra, izay maneho fa eo afovoan’ny olony Izy
- type: usfm
  marker: iot
  children:
  - type: text
    text: Ny firafitry ny Boky
- type: usfm
  marker: io1
  children:
  - type: text
    text: Ny fanandevozana sy ny fanafahana ny Zanak’Israely
- type: usfm
  marker: io2
  children:
  - type: text
    text: 'Ny Zanak’Israely tany Ejipta: 1'
- type: usfm
  marker: io2
  children:
  - type: text
    text: 'Ny fahatanoran’i Mosesy sy ny fiantsoan’Andriamanitra azy: 2–7.7'
- type: usfm
  marker: io2
  children:
  - type: text
    text: 'Ireo loza tany Ejipta sy ny Paska: 7.8–13.16'
- type: usfm
  marker: io2
  children:
  - type: text
    text: 'Ny fialana tany Ejipta: 13.17–15.21'
- type: usfm
  marker: io2
  children:
  - type: text
    text: 'Ny dia namakivaky ny tany efitra: 15.22–18.27'
- type: usfm
  marker: io2
  children:
  - type: text
    text: 'Ny fanekena tao Sinay: 19–24'
- type: usfm
  marker: io1
  children:
  - type: text
    text: Ny fanorenan’Andriamanitra ny fonenany eo anivon’ny Zanak’Israely
- type: usfm
  marker: io2
  children:
  - type: text
    text: 'Ny fanomanana ny fananganana ny tabernakely: 25–31'
- type: usfm
  marker: io2
  children:
  - type: text
    text: 'Ny zanak’omby volamena sy ny nanavaozana ny fanekena: 32–34'
- type: usfm
  marker: io2
  children:
  - type: text
    text: 'Ny fananganana ny tabernakely: 35–40'
