document_id: EZK.37
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fahitana ny amin’ny taola-maina
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Tonga tamiko ny tanan’NY TOMPO, ary ny Fanahy no nitondran’NY TOMPO ahy nivoaka, dia napetrany teo amin’ny lohasaha iray feno taolana aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ary nitondra ahy nandehandeha teny amin’ireo Izy; ary indreo, marobe ireo tao amin’ny lohasaha, ary indreo, maina dia maina ireo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary hoy NY TOMPO tamiko: Ry '
  - type: usfm
    marker: w
    children:
    - type: text
      text: zanak’olona
  - type: text
    text: ', moa mety ho velona ihany va ireto taolana ireto? Ary hoy aho: TOMPO Andriamanitra ô, Ianao no mahalala! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dia hoy indray Izy tamiko: Maminania amin’ireto taolana ireto ka lazao aminy hoe: Ry taola-maina, mihainoa ny tenin’NY TOMPO! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Izao no lazain’NY TOMPO Andriamanitra amin’ireto taolana ireto: Indro, hasiako fofonaina ianareo dia ho velona; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: hasiako ozatra ianareo ka hampaniriako nofo; hosaronako hoditra ianareo; ary hasiako fofonaina ianareo ka ho velona; dia ho fantatrareo fa Izaho no TOMPO.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dia naminany aho araka izay efa nandidiana ahy, ary raha mbola naminany aho dia injany nisy feo! Ary indreo nihetsiketsika sady nifanatonatona ny taolana, samy nanatona ny taolana namany avy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ary hitako fa indro, nisy hozatra sy nofo teo aminy, ary nisarona hoditra izy nefa tsy mbola nisy fofonaina tao aminy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Dia hoy Izy tamiko: Maminania amin’ny fofonaina, eny, maminania, ry zanak’olona, koa lazao amin’ny fofonaina hoe: Izao no lazain’NY TOMPO Andriamanitra: Manatòna avy amin’ny rivotra efatra, ry fofonaina, ka tsotsofy ireo voavono ireo mba ho velona izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dia naminany araka izay efa nandidiany ahy aho ka nidiran’ny fofonaina ireo ary velona, dia nijoro tamin’ny tongony izy: Tafika lehibe dia lehibe tokoa.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Dia hoy Izy tamiko: Ry zanak’olona, ireto taolana ireto dia ny taranak’Israely rehetra; indreo izy miteny hoe: Maina ny taolanay, levona ny fanantenanay, fongotra izahay! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Koa maminania ka lazao aminy hoe: Izao no lazain’NY TOMPO Andriamanitra: Indro, ry oloko, Izaho no hanokatra ny fasanareo, ary hampiakariko avy amin’ny fasanareo ianareo ka ho entiko ho any amin’ny tanin’ny Israely; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'dia ho fantatrareo fa Izaho no TOMPO, rehefa manokatra ny fasanareo Aho, ry oloko, ka mampiakatra anareo hiala amin’ny fasanareo! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ary hataoko ao anatinareo ny Fanahiko dia ho velona ianareo, ary hamponeniko any amin’ny taninareo ianareo; dia ho fantatrareo fa Izaho TOMPO no efa niteny sady nanatanteraka izany, hoy NY TOMPO.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Haverin’NY TOMPO indray ny firaisan’ny olony
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary tonga tamiko ny tenin’NY TOMPO hoe:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary ianao, ry '
  - type: usfm
    marker: w
    children:
    - type: text
      text: zanak’olona
  - type: text
    text: ', makà tapa-kazo iray ka asio soratra hoe: Ho an’ny Joda sy ho an’ny Zanak’Israely namany. Dia makà tapa-kazo iray hafa koa ka asio soratra hoe: Ho an’i Josefa, dia tapa-kazon’i Efraima izany, sy ho an’ny taranak’Israely namany rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary ampifanatony izy roa ho tonga tapa-kazo iray ihany, dia ho tafaray eny an-tananao izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary raha miteny aminao ny zanaky ny firenenao hoe: Moa tsy hilaza izay hevitrao amin’izany va ianao? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Dia lazao aminy hoe: Izao no lazain’NY TOMPO Andriamanitra: Indro, Izaho haka ny tapa-kazon’i Josefa izay eny an-tanan’i Efraima, sy ny fokon’ny Israely namany, ary hakambako ho eo amin’ny tapa-kazon’i Joda izy, ary hataoko tapa-kazo iray ihany izy ka ho tonga iray eny an-tanako. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ary ny tapa-kazo izay hasianao soratra dia ho eny an-tananao, eo imasony.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Dia lazao aminy hoe: Izao no lazain’NY TOMPO Andriamanitra: Indro, Izaho no haka ny Zanak’Israely avy any amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jentilisa
  - type: text
    text: ' izay nalehany, eny, hangoniko avy any amin’ny manodidina any izy ka hoentiko any amin’ny taniny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Hataoko firenena tokana any amin’ny tany izy, dia any amin’ny tendrombohitry ny Israely, ary mpanjaka iray ihany no ho mpanjakan’izy rehetra, ka tsy ho firenena roa intsony izy ary tsy hisaraka ho fanjakana roa intsony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Tsy handoto tena amin’ny sampiny, na amin’ny fahavetavetany, na amin’ny fahadisoany intsony izy, fa hovonjeko ho afaka amin’ny fonenany rehetra izay nanotany izy, ary hodioviko izy ka ho oloko, ary Izaho ho Andriamaniny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary i Davida mpanompoko no ho mpanjakany; ary hiray mpiandry izy rehetra dia handeha araka ny fitsipiko izy sady hitandrina ny lalànako sy hankatò izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary honina any amin’ny tany izay nomeko an’i Jakoba mpanompoko izy, dia ilay efa nonenan’ny razanareo, ka honina any izy sy ny zanany mbamin’ny zafiny mandrakizay; ary i Davida mpanompoko no ho mpitarika azy mandrakizay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ary hanao fanekem-pihavanana ho azy Aho ka ho fanekena mandrakizay eo aminy izany, ary hampiorim-ponenana azy sy hahamaro azy Aho sady hampiorina ny fitoerako masina eo aminy mandrakizay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ary ny tabernakeliko dia ho eo aminy; Izaho ho Andriamaniny ary ho oloko izy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: dia ho fantatry ny Jentilisa fa Izaho TOMPO no manamasina ny Israely, rehefa eo aminy mandrakizay ny fitoerako masina.
