document_id: EZK.37,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fahitana ny amin’ny taola-maina
  - type: text
    content: 'Tonga tamiko ny tanan’NY TOMPO, ary ny Fanahy no nitondran’NY TOMPO ahy nivoaka, dia napetrany teo amin’ny lohasaha iray feno taolana aho. '
  '10':
  - type: text
    content: 'Dia naminany araka izay efa nandidiany ahy aho ka nidiran’ny fofonaina ireo ary velona, dia nijoro tamin’ny tongony izy: Tafika lehibe dia lehibe tokoa.'
  '11':
  - type: text
    content: 'Dia hoy Izy tamiko: Ry zanak’olona, ireto taolana ireto dia ny taranak’Israely rehetra; indreo izy miteny hoe: Maina ny taolanay, levona ny fanantenanay, fongotra izahay! '
  '12':
  - type: text
    content: 'Koa maminania ka lazao aminy hoe: Izao no lazain’NY TOMPO Andriamanitra: Indro, ry oloko, Izaho no hanokatra ny fasanareo, ary hampiakariko avy amin’ny fasanareo ianareo ka ho entiko ho any amin’ny tanin’ny Israely; '
  '13':
  - type: text
    content: 'dia ho fantatrareo fa Izaho no TOMPO, rehefa manokatra ny fasanareo Aho, ry oloko, ka mampiakatra anareo hiala amin’ny fasanareo! '
  '14':
  - type: text
    content: Ary hataoko ao anatinareo ny Fanahiko dia ho velona ianareo, ary hamponeniko any amin’ny taninareo ianareo; dia ho fantatrareo fa Izaho TOMPO no efa niteny sady nanatanteraka izany, hoy NY TOMPO.
  - type: heading
    content: Haverin’NY TOMPO indray ny firaisan’ny olony
  '15':
  - type: text
    content: 'Ary tonga tamiko ny tenin’NY TOMPO hoe:'
  '16':
  - type: text
    content: 'Ary ianao, ry '
  - type: text
    content: zanak’olona
  - type: text
    content: ', makà tapa-kazo iray ka asio soratra hoe: Ho an’ny Joda sy ho an’ny Zanak’Israely namany. Dia makà tapa-kazo iray hafa koa ka asio soratra hoe: Ho an’i Josefa, dia tapa-kazon’i Efraima izany, sy ho an’ny taranak’Israely namany rehetra. '
  '17':
  - type: text
    content: 'Ary ampifanatony izy roa ho tonga tapa-kazo iray ihany, dia ho tafaray eny an-tananao izy. '
  '18':
  - type: text
    content: 'Ary raha miteny aminao ny zanaky ny firenenao hoe: Moa tsy hilaza izay hevitrao amin’izany va ianao? '
  '19':
  - type: text
    content: 'Dia lazao aminy hoe: Izao no lazain’NY TOMPO Andriamanitra: Indro, Izaho haka ny tapa-kazon’i Josefa izay eny an-tanan’i Efraima, sy ny fokon’ny Israely namany, ary hakambako ho eo amin’ny tapa-kazon’i Joda izy, ary hataoko tapa-kazo iray ihany izy ka ho tonga iray eny an-tanako. '
  '2':
  - type: text
    content: Ary nitondra ahy nandehandeha teny amin’ireo Izy; ary indreo, marobe ireo tao amin’ny lohasaha, ary indreo, maina dia maina ireo.
  '20':
  - type: text
    content: Ary ny tapa-kazo izay hasianao soratra dia ho eny an-tananao, eo imasony.
  '21':
  - type: text
    content: 'Dia lazao aminy hoe: Izao no lazain’NY TOMPO Andriamanitra: Indro, Izaho no haka ny Zanak’Israely avy any amin’ny '
  - type: text
    content: Jentilisa
  - type: text
    content: ' izay nalehany, eny, hangoniko avy any amin’ny manodidina any izy ka hoentiko any amin’ny taniny. '
  '22':
  - type: text
    content: 'Hataoko firenena tokana any amin’ny tany izy, dia any amin’ny tendrombohitry ny Israely, ary mpanjaka iray ihany no ho mpanjakan’izy rehetra, ka tsy ho firenena roa intsony izy ary tsy hisaraka ho fanjakana roa intsony. '
  '23':
  - type: text
    content: 'Tsy handoto tena amin’ny sampiny, na amin’ny fahavetavetany, na amin’ny fahadisoany intsony izy, fa hovonjeko ho afaka amin’ny fonenany rehetra izay nanotany izy, ary hodioviko izy ka ho oloko, ary Izaho ho Andriamaniny. '
  '24':
  - type: text
    content: 'Ary i Davida mpanompoko no ho mpanjakany; ary hiray mpiandry izy rehetra dia handeha araka ny fitsipiko izy sady hitandrina ny lalànako sy hankatò izany. '
  '25':
  - type: text
    content: 'Ary honina any amin’ny tany izay nomeko an’i Jakoba mpanompoko izy, dia ilay efa nonenan’ny razanareo, ka honina any izy sy ny zanany mbamin’ny zafiny mandrakizay; ary i Davida mpanompoko no ho mpitarika azy mandrakizay. '
  '26':
  - type: text
    content: 'Ary hanao fanekem-pihavanana ho azy Aho ka ho fanekena mandrakizay eo aminy izany, ary hampiorim-ponenana azy sy hahamaro azy Aho sady hampiorina ny fitoerako masina eo aminy mandrakizay. '
  '27':
  - type: text
    content: 'Ary ny tabernakeliko dia ho eo aminy; Izaho ho Andriamaniny ary ho oloko izy; '
  '28':
  - type: text
    content: dia ho fantatry ny Jentilisa fa Izaho TOMPO no manamasina ny Israely, rehefa eo aminy mandrakizay ny fitoerako masina.
  '3':
  - type: text
    content: 'Ary hoy NY TOMPO tamiko: Ry '
  - type: text
    content: zanak’olona
  - type: text
    content: ', moa mety ho velona ihany va ireto taolana ireto? Ary hoy aho: TOMPO Andriamanitra ô, Ianao no mahalala! '
  '4':
  - type: text
    content: 'Dia hoy indray Izy tamiko: Maminania amin’ireto taolana ireto ka lazao aminy hoe: Ry taola-maina, mihainoa ny tenin’NY TOMPO! '
  '5':
  - type: text
    content: 'Izao no lazain’NY TOMPO Andriamanitra amin’ireto taolana ireto: Indro, hasiako fofonaina ianareo dia ho velona; '
  '6':
  - type: text
    content: hasiako ozatra ianareo ka hampaniriako nofo; hosaronako hoditra ianareo; ary hasiako fofonaina ianareo ka ho velona; dia ho fantatrareo fa Izaho no TOMPO.
  '7':
  - type: text
    content: 'Dia naminany aho araka izay efa nandidiana ahy, ary raha mbola naminany aho dia injany nisy feo! Ary indreo nihetsiketsika sady nifanatonatona ny taolana, samy nanatona ny taolana namany avy. '
  '8':
  - type: text
    content: Ary hitako fa indro, nisy hozatra sy nofo teo aminy, ary nisarona hoditra izy nefa tsy mbola nisy fofonaina tao aminy.
  '9':
  - type: text
    content: 'Dia hoy Izy tamiko: Maminania amin’ny fofonaina, eny, maminania, ry zanak’olona, koa lazao amin’ny fofonaina hoe: Izao no lazain’NY TOMPO Andriamanitra: Manatòna avy amin’ny rivotra efatra, ry fofonaina, ka tsotsofy ireo voavono ireo mba ho velona izy. '
