document_id: ROM.5,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fihavanana amin’Andriamanitra
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Koa satria efa nohamarinina tamin’ny finoana isika dia manana fihavanana amin’Andriamanitra amin’ny alalan’i Jesosy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ' Tompontsika. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Raha fony mbola fahavalo aza isika no nampihavanina tamin’Andriamanitra tamin’ny nahafatesan’ny Zanany, mainka ny hamonjena antsika amin’ny fahavelomany, rehefa nampihavanina. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Ary tsy izany ihany koa, fa mirehareha ao amin’Andriamanitra isika amin’ny alalan’i Jesosy Kristy Tompontsika, izay nahazoantsika ny fihavanana ankehitriny.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: I Adama sy Jesosy Kristy
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Noho izany dia tahaka ny nidiran’ny ota tamin’ny alalan’ny olona iray ho amin’izao tontolo izao, ary ny ota no nidiran’ny fahafatesana ka nahatonga ny olona rehetra ho tratry ny fahafatesana, satria samy efa nanota izy rehetra; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'fa talohan’ny lalàna aza dia nisy ota teto amin’izao tontolo izao, nefa tsy isaina ny ota raha tsy misy lalàna; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Nanjaka hatramin’i Adama ka hatramin’i Mosesy anefa ny fahafatesana; eny, fa na dia tamin’izay tsy nanota tahaka ny nanotan’i Adama aza, izay tandindon’Ilay ho avy.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Nefa tsy tahaka ny fahadisoana ny fanomezana ny fahasoavana. Satria raha ny fahadisoan’ny iray no nahatonga fahafatesana ho an’ny maro, manoatra noho izany kosa ny fahasoavan’Andriamanitra sy ny fanomezany be dia be, maimaimpoana, ho an’ny maro amin’ny alalan’ny Olona iray, dia Jesosy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: '. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Tsy tahaka ny avy amin’ny iray izay nanota ny fanomezana; fa noho ny nataon’ny iray no nisehoan’ny fitsarana ho fanamelohana, nefa noho ny fahadisoana maro kosa no nisehoan’ny fanomezana ny fahasoavana ho fanamarinana. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Fa raha ny fahadisoan’ny olona iray no nanjakan’ny fahafatesana noho ny nataon’ny iray, mainka izay mahazo ny haben’ny fahasoavana sy ny fanomezan’ny fahamarinana no hanjaka amin’ny fiainana noho ny nataon’ny Iray, dia Jesosy Kristy. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Koa tahaka ny nahatongavan’ny fanamelohana ho an’ny olona rehetra noho ny fahadisoana iray no nahatongavan’ny fanamarinana ho amin’ny fiainana kosa ho an’ny olona rehetra noho ny fahamarinana iray.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Fa tahaka ny nanaovana ny maro ho mpanota noho ny tsy fankatoavan’ny olona iray no hanaovana ny maro ho marina kosa noho ny fankatoavan’ny Iray. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Tamin’ny alalany koa no nahazoantsika ny fahafahana manatona izao fahasoavana itoerantsika izao, noho ny finoana; koa mirehareha amin’ny fanantenana ny voninahitr’Andriamanitra isika. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Ny lalàna koa dia niditra mba hampitombo ny fahadisoana. Nefa teo amin’izay nitomboan’ny ota no nihoaran’ny fahasoavana ho be lavitra, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: mba ho tahaka ny nanjakan’ny ota tao amin’ny fahafatesana no hanjakan’ny fahasoavana kosa amin’ny fahamarinana ho fiainana mandrakizay amin’ny alalan’i Jesosy Kristy Tompontsika.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Tsy izany ihany anefa, fa mirehareha koa isika na dia amin’ny fahoriana aza satria fantatsika fa ny fahoriana dia mahatonga faharetana; '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'ny faharetana dia mahatonga fahatsaram-panahy voazaha toetra; ny fahatsaram-panahy voazaha toetra dia mahatonga fanantenana. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Ary ny fanantenana dia tsy mba mahamenatra, satria ny fitiavan’Andriamanitra dia nampidinina ho ao am-pontsika tamin’ny alalan’ny Fanahy Masina izay nomena antsika.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Fa fony mbola tsy nanan-kery isika dia maty Kristy tamin’ny fotoanandro hamonjy ny ratsy fanahy. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Fa zara raha misy olona manaiky ho faty hamonjy ny marina; nefa angamba hisy ihany ny sasany sahy maty aza hamonjy ny manao soa. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Nefa Andriamanitra mampiseho ny fitiavany antsika satria fony mbola mpanota isika dia maty hamonjy antsika Kristy. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Koa manoatra noho izany ny hamonjeny antsika ho afaka amin’ny fahatezerana, rehefa nohamarinina tamin’ny rany isika ankehitriny! '
