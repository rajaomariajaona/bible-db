document_id: ROM.5,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fihavanana amin’Andriamanitra
  - type: text
    content: 'Koa satria efa nohamarinina tamin’ny finoana isika dia manana fihavanana amin’Andriamanitra amin’ny alalan’i Jesosy '
  - type: text
    content: Kristy
  - type: text
    content: ' Tompontsika. '
  '10':
  - type: text
    content: 'Raha fony mbola fahavalo aza isika no nampihavanina tamin’Andriamanitra tamin’ny nahafatesan’ny Zanany, mainka ny hamonjena antsika amin’ny fahavelomany, rehefa nampihavanina. '
  '11':
  - type: text
    content: Ary tsy izany ihany koa, fa mirehareha ao amin’Andriamanitra isika amin’ny alalan’i Jesosy Kristy Tompontsika, izay nahazoantsika ny fihavanana ankehitriny.
  - type: heading
    content: I Adama sy Jesosy Kristy
  '12':
  - type: text
    content: 'Noho izany dia tahaka ny nidiran’ny ota tamin’ny alalan’ny olona iray ho amin’izao tontolo izao, ary ny ota no nidiran’ny fahafatesana ka nahatonga ny olona rehetra ho tratry ny fahafatesana, satria samy efa nanota izy rehetra; '
  '13':
  - type: text
    content: 'fa talohan’ny lalàna aza dia nisy ota teto amin’izao tontolo izao, nefa tsy isaina ny ota raha tsy misy lalàna; '
  '14':
  - type: text
    content: Nanjaka hatramin’i Adama ka hatramin’i Mosesy anefa ny fahafatesana; eny, fa na dia tamin’izay tsy nanota tahaka ny nanotan’i Adama aza, izay tandindon’Ilay ho avy.
  '15':
  - type: text
    content: 'Nefa tsy tahaka ny fahadisoana ny fanomezana ny fahasoavana. Satria raha ny fahadisoan’ny iray no nahatonga fahafatesana ho an’ny maro, manoatra noho izany kosa ny fahasoavan’Andriamanitra sy ny fanomezany be dia be, maimaimpoana, ho an’ny maro amin’ny alalan’ny Olona iray, dia Jesosy '
  - type: text
    content: Kristy
  - type: text
    content: '. '
  '16':
  - type: text
    content: 'Tsy tahaka ny avy amin’ny iray izay nanota ny fanomezana; fa noho ny nataon’ny iray no nisehoan’ny fitsarana ho fanamelohana, nefa noho ny fahadisoana maro kosa no nisehoan’ny fanomezana ny fahasoavana ho fanamarinana. '
  '17':
  - type: text
    content: 'Fa raha ny fahadisoan’ny olona iray no nanjakan’ny fahafatesana noho ny nataon’ny iray, mainka izay mahazo ny haben’ny fahasoavana sy ny fanomezan’ny fahamarinana no hanjaka amin’ny fiainana noho ny nataon’ny Iray, dia Jesosy Kristy. '
  '18':
  - type: text
    content: Koa tahaka ny nahatongavan’ny fanamelohana ho an’ny olona rehetra noho ny fahadisoana iray no nahatongavan’ny fanamarinana ho amin’ny fiainana kosa ho an’ny olona rehetra noho ny fahamarinana iray.
  '19':
  - type: text
    content: 'Fa tahaka ny nanaovana ny maro ho mpanota noho ny tsy fankatoavan’ny olona iray no hanaovana ny maro ho marina kosa noho ny fankatoavan’ny Iray. '
  '2':
  - type: text
    content: 'Tamin’ny alalany koa no nahazoantsika ny fahafahana manatona izao fahasoavana itoerantsika izao, noho ny finoana; koa mirehareha amin’ny fanantenana ny voninahitr’Andriamanitra isika. '
  '20':
  - type: text
    content: 'Ny lalàna koa dia niditra mba hampitombo ny fahadisoana. Nefa teo amin’izay nitomboan’ny ota no nihoaran’ny fahasoavana ho be lavitra, '
  '21':
  - type: text
    content: mba ho tahaka ny nanjakan’ny ota tao amin’ny fahafatesana no hanjakan’ny fahasoavana kosa amin’ny fahamarinana ho fiainana mandrakizay amin’ny alalan’i Jesosy Kristy Tompontsika.
  '3':
  - type: text
    content: 'Tsy izany ihany anefa, fa mirehareha koa isika na dia amin’ny fahoriana aza satria fantatsika fa ny fahoriana dia mahatonga faharetana; '
  '4':
  - type: text
    content: 'ny faharetana dia mahatonga fahatsaram-panahy voazaha toetra; ny fahatsaram-panahy voazaha toetra dia mahatonga fanantenana. '
  '5':
  - type: text
    content: Ary ny fanantenana dia tsy mba mahamenatra, satria ny fitiavan’Andriamanitra dia nampidinina ho ao am-pontsika tamin’ny alalan’ny Fanahy Masina izay nomena antsika.
  '6':
  - type: text
    content: 'Fa fony mbola tsy nanan-kery isika dia maty Kristy tamin’ny fotoanandro hamonjy ny ratsy fanahy. '
  '7':
  - type: text
    content: 'Fa zara raha misy olona manaiky ho faty hamonjy ny marina; nefa angamba hisy ihany ny sasany sahy maty aza hamonjy ny manao soa. '
  '8':
  - type: text
    content: 'Nefa Andriamanitra mampiseho ny fitiavany antsika satria fony mbola mpanota isika dia maty hamonjy antsika Kristy. '
  '9':
  - type: text
    content: 'Koa manoatra noho izany ny hamonjeny antsika ho afaka amin’ny fahatezerana, rehefa nohamarinina tamin’ny rany isika ankehitriny! '
