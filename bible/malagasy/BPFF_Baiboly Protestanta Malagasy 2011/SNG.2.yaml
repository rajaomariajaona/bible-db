document_id: SNG.2
type_code: plt
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Izaho dia voahirana eny amin’ny tany lemaka ihany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary lisy eny an-dohasaha.
- type: usfm
  marker: sp
  children:
  - type: text
    text: (Ralehilahy)
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Toy ny lisy eo ampovoan’ny tsilo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia toy izany ianao, Rahavako, eo amin’ny zazavavy.
- type: usfm
  marker: sp
  children:
  - type: text
    text: (Ravehivavy)
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Toy ny hazo paoma iray eo anivon’ny hazo any an’ala,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia toy izany ny malalako eo amin’ny zanakalahy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mahafinaritra ahy indrindra ny mipetraka eo ambanin’ny alokalony,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady mamy ao am-bavako ny voankazony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Noentiny niditra ho ao an-trano fitoeran-divay aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny faneva napetrany eo amboniko dia fitiavana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Hatanjaho amin’ny mofo voaloboka aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary velombelomy amin’ny paoma
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa mararim-pitia aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Aoka ny tanany havia hiondanako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary aoka ny tanany havanana hamihina ahy.
- type: usfm
  marker: sp
  children:
  - type: text
    text: (Olon-kafa?)
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Mampianiana anareo aho ry zanakavavin’i Jerosalema,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'amin’ny gazela na amin’ny dieravavy any an-tsaha:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aza manaitra na mamoha ny fitiavana
- type: usfm
  marker: q1
  children:
  - type: text
    text: raha tsy efa sitrapony.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Indro, tamy Ralehilahy
  marker-yv: yv-h
- type: usfm
  marker: sp
  children:
  - type: text
    text: (Ravehivavy)
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Injay, ny feon’ilay malalako!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Indro, tamy izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka mitsambikimbikina eny an-tendrombohitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mitsamboamboatra eny amin’ny havoana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ny malalako dia tahaka ny gazela na ny diera tanora;
- type: usfm
  marker: q1
  children:
  - type: text
    text: indro, mijanona ao alatranonay izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mitsidika eo am-baravarankely,
- type: usfm
  marker: q1
  children:
  - type: text
    text: manarangarana eo amin’ny makarakara.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Niteny tamiko ny malalako hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mitsangàna, Rahavako, ry tsara tarehiko, ka andao!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Fa indro, lasa ny ririnina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy misy intsony sady efa lasa ny ranonorana;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: mamelana eny amin’ny tany ny voninkazo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tonga ny taona fanaovam-peo fifaliana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary re atỳ amin’ny tanintsika ny feon’ny domohina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Mahamanitra ny voany tanora ny aviavy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mamony ny voaloboka ka mamerovero tsara.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mitsangàna, Rahavako, ry tsara tarehiko, ka avia!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ry voromailalako ao an-tsefatsefaky ny harambato,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ao amin’ny fialokalofana amin’ny fiakarana mideza,
- type: usfm
  marker: q1
  children:
  - type: text
    text: aoka hahita ny endrikao
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy handre ny feonao aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa mamy ny feonao, ary mampaharavoravo ny endrikao.
- type: usfm
  marker: sp
  children:
  - type: text
    text: (Olon-kafa)
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Sambory ny amboahaolo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ireo amboahaolo madinika izay manimba ny tanim-boaloboka;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa efa mamony izao ny voalobotsika.
- type: usfm
  marker: sp
  children:
  - type: text
    text: (Ravehivavy)
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ahy ny malalako, ary azy aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ilay miandry ny ondriny eny amin’ny lisy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Mandra-pangatsiatsiaka ny andro,
- type: usfm
  marker: q1
  children:
  - type: text
    text: amin’ny milenti-masoandro,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mitodiha, ry ilay malalako, ary aoka ho tahaka ny gazela na ny diera tanora
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny an-tendrombohitra be hantsana ianao.
