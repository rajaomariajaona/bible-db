document_id: SNG.2,3103
type_code: plt
verses:
  '1':
  - type: text
    content: Izaho dia voahirana eny amin’ny tany lemaka ihany
  - type: text
    content: ary lisy eny an-dohasaha.
  - type: heading
    content: (Ralehilahy)
  '10':
  - type: text
    content: 'Niteny tamiko ny malalako hoe:'
  - type: text
    content: Mitsangàna, Rahavako, ry tsara tarehiko, ka andao!
  '11':
  - type: text
    content: Fa indro, lasa ny ririnina,
  - type: text
    content: tsy misy intsony sady efa lasa ny ranonorana;
  '12':
  - type: text
    content: mamelana eny amin’ny tany ny voninkazo;
  - type: text
    content: tonga ny taona fanaovam-peo fifaliana,
  - type: text
    content: ary re atỳ amin’ny tanintsika ny feon’ny domohina.
  '13':
  - type: text
    content: Mahamanitra ny voany tanora ny aviavy,
  - type: text
    content: mamony ny voaloboka ka mamerovero tsara.
  - type: text
    content: Mitsangàna, Rahavako, ry tsara tarehiko, ka avia!
  '14':
  - type: text
    content: Ry voromailalako ao an-tsefatsefaky ny harambato,
  - type: text
    content: dia ao amin’ny fialokalofana amin’ny fiakarana mideza,
  - type: text
    content: aoka hahita ny endrikao
  - type: text
    content: sy handre ny feonao aho,
  - type: text
    content: fa mamy ny feonao, ary mampaharavoravo ny endrikao.
  - type: heading
    content: (Olon-kafa)
  '15':
  - type: text
    content: Sambory ny amboahaolo,
  - type: text
    content: dia ireo amboahaolo madinika izay manimba ny tanim-boaloboka;
  - type: text
    content: fa efa mamony izao ny voalobotsika.
  - type: heading
    content: (Ravehivavy)
  '16':
  - type: text
    content: Ahy ny malalako, ary azy aho,
  - type: text
    content: dia ilay miandry ny ondriny eny amin’ny lisy.
  '17':
  - type: text
    content: Mandra-pangatsiatsiaka ny andro,
  - type: text
    content: amin’ny milenti-masoandro,
  - type: text
    content: mitodiha, ry ilay malalako, ary aoka ho tahaka ny gazela na ny diera tanora
  - type: text
    content: eny an-tendrombohitra be hantsana ianao.
  '2':
  - type: text
    content: Toy ny lisy eo ampovoan’ny tsilo,
  - type: text
    content: dia toy izany ianao, Rahavako, eo amin’ny zazavavy.
  - type: heading
    content: (Ravehivavy)
  '3':
  - type: text
    content: Toy ny hazo paoma iray eo anivon’ny hazo any an’ala,
  - type: text
    content: dia toy izany ny malalako eo amin’ny zanakalahy.
  - type: text
    content: Mahafinaritra ahy indrindra ny mipetraka eo ambanin’ny alokalony,
  - type: text
    content: sady mamy ao am-bavako ny voankazony.
  '4':
  - type: text
    content: Noentiny niditra ho ao an-trano fitoeran-divay aho,
  - type: text
    content: ary ny faneva napetrany eo amboniko dia fitiavana.
  '5':
  - type: text
    content: Hatanjaho amin’ny mofo voaloboka aho,
  - type: text
    content: ary velombelomy amin’ny paoma
  - type: text
    content: fa mararim-pitia aho.
  '6':
  - type: text
    content: Aoka ny tanany havia hiondanako,
  - type: text
    content: ary aoka ny tanany havanana hamihina ahy.
  - type: heading
    content: (Olon-kafa?)
  '7':
  - type: text
    content: Mampianiana anareo aho ry zanakavavin’i Jerosalema,
  - type: text
    content: 'amin’ny gazela na amin’ny dieravavy any an-tsaha:'
  - type: text
    content: Aza manaitra na mamoha ny fitiavana
  - type: text
    content: raha tsy efa sitrapony.
  - type: heading
    content: Indro, tamy Ralehilahy
  - type: heading
    content: (Ravehivavy)
  '8':
  - type: text
    content: Injay, ny feon’ilay malalako!
  - type: text
    content: Indro, tamy izy
  - type: text
    content: ka mitsambikimbikina eny an-tendrombohitra
  - type: text
    content: ary mitsamboamboatra eny amin’ny havoana.
  '9':
  - type: text
    content: Ny malalako dia tahaka ny gazela na ny diera tanora;
  - type: text
    content: indro, mijanona ao alatranonay izy,
  - type: text
    content: mitsidika eo am-baravarankely,
  - type: text
    content: manarangarana eo amin’ny makarakara.
