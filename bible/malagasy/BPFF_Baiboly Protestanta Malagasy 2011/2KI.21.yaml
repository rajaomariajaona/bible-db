document_id: 2KI.21,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: I Manase, mpanjakan’ny Joda
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 2Tan 33.1-10
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Roa amby folo taona i Manase raha nanomboka nanjaka, ary dimy amby dimampolo taona no nanjakany tany Jerosalema. Ny anaran’ny reniny dia Hefziba. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary NY TOMPO nampilaza ny mpaminany mpanompony hoe: '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Satria i Manase, mpanjakan’ny Joda, nanao izao fahavetavetana izao ka nanao ratsy mihoatra noho izay rehetra nataon’ny Amorita izay teo alohany sady nampanota ny Joda tamin’ny sampiny, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia izao kosa no lazain’NY TOMPO, Andriamanitry ny Israely: Indro, hahatonga loza amin’i Jerosalema sy i Joda Aho, koa izay rehetra mandre izany dia hangintsina ny sofiny roa. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hohenjaniko ato Jerosalema ny kofehy fandrefesan’i Samaria sy ny fandrefesana marindranon’ny taranak’i Ahaba; ary hamaoka an’i Jerosalema Aho, toy ny olona mamaoka lovia ka sady mamaoka azy no manohoka azy ambony ambany. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hafoiko ny lovako sisa ka hatolotro ho eo an-tanan’ny fahavalony; dia ho haza sy ho babon’ny fahavalony rehetra izy, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: satria efa nanao izay ratsy teo imasoko ka nahatezitra Ahy hatramin’ny andro nivoahan’ny razany avy tany Ejipta ka mandraka androany.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary na dia ny ran’ny tsy manan-tsiny aza dia nalatsak’i Manase be dia be ka nandrakotra an’i Jerosalema manontolo, ho fanampin’ny ota izay nampanotany ny Joda tamin’ny nanaovany izay ratsy teo imason’NY TOMPO.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 2Tan 33.18-20
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny tantaran’i Manase sisa mbamin’izay rehetra nataony sy ny fahotana izay nataony, tsy voasoratra ao amin’ny bokin’ny tantaran’ny mpanjakan’ny Joda va izany? '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary nodimandry any amin’ny razany i Manase dia nalevina tao an-tanimboly tao alatranony, ao amin’ny sahan’i Oza, ary i Amona zanany no nanjaka nandimby azy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: I Amona, mpanjakan’ny Joda
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 2Tan 33.21-25
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Roa amby roapolo taona i Amona raha nanomboka nanjaka, ary roa taona no nanjakany tany Jerosalema. Ny anaran’ny reniny dia Mesolemeta, zanakavavin’i Haroza, avy any Jotba. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nanao izay ratsy teo imason’NY TOMPO izy, tahaka ny fahavetavetan’ny firenena izay noroahin’NY TOMPO tsy ho eo anoloan’ny Zanak’Israely. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nanao izay ratsy teo imason’NY TOMPO koa izy, tahaka ny nataon’i Manase rainy; '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'nandeha tamin’ny lalana rehetra izay efa nalehan’ny rainy izy ka nanompo ny sampy izay notompoin’ny rainy sady niankohoka teo anatrehany. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nahafoy NY TOMPO, Andriamanitry ny razany, izy, fa tsy nandeha tamin’ny lalan’NY TOMPO. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nanao tetika fikomiana taminy ny mpanompon’i Amona mpanjaka ka namono azy tao an-tranony. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny vahoaka koa dia namono izay rehetra nanao tetika fikomiana tamin’i Amona mpanjaka dia nampanjaka an’i Josia zanany hisolo azy. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny tantaran’i Amona sisa, tsy voasoratra ao amin’ny bokin’ny tantaran’ny mpanjakan’ny Joda va izany? '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nalevina tao amin’ny fasany tao amin’ny sahan’i Oza izy ka i Josia zanany no nanjaka nandimby azy.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Namboariny indray ny toerana fanaovana sorona izay efa noravan’i Hezekia rainy ka nanangana alitara ho an’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Baala
    - type: text
      text: ' izy sady nanao tsangankazon-tsampy ho an’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Aseraha
    - type: text
      text: ', tahaka izay nataon’i Ahaba, mpanjakan’ny Israely; niankohoka teo anatrehan’izay rehetra eny amin’ny lanitra izy ka nanompo ireny. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nanorina alitara maromaro tao amin’ny tranon’NY TOMPO koa izy, dia tao amin’izay nolazain’NY TOMPO hoe: Ao Jerosalema no hasiako ny anarako. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nanorina alitara tao anatin’ny kianja roa tao amin’ny tranon’NY TOMPO ho an’izay rehetra eny amin’ny lanitra izy. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny zanany dia nampamakivakiny ny afo sady nanandro no nanao sikidy izy ary naka ny mpiantso ny fanahin’ny maty sy ny mpanandro; eny, tsy nitsahatra nanao izay ratsy teo imason’NY TOMPO izy ka nahatezitra Azy. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny sarivongan’ny Aseraha izay nataony dia napetrany tao amin’ny trano nolazain’NY TOMPO tamin’i Davida sy i Solomona zanany hoe: Ato amin’ity trano ity sy eto Jerosalema, izay nofidiko tamin’ny fokon’ny Israely rehetra, no hasiako ny anarako mandrakizay. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsy hampirenireny ny Israely any ivelan’ny tany izay nomeko ny razany intsony Aho raha mba hitandrina ka hanatanteraka izay rehetra nandidiako azy izy, araka ny lalàna rehetra izay nandidian’i Mosesy mpanompoko azy ihany. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nefa tsy nihaino izy; fa i Manase dia nitaona azy hanao ratsy mihoatra noho ny nataon’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jentilisa
    - type: text
      text: ' izay naringan’NY TOMPO tsy ho eo anoloan’ny Zanak’Israely.'
