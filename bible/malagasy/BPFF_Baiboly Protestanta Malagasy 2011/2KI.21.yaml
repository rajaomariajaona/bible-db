document_id: 2KI.21,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: I Manase, mpanjakan’ny Joda
  - type: heading
    content: 2Tan 33.1-10
  - type: text
    content: 'Roa amby folo taona i Manase raha nanomboka nanjaka, ary dimy amby dimampolo taona no nanjakany tany Jerosalema. Ny anaran’ny reniny dia Hefziba. '
  '10':
  - type: text
    content: 'Ary NY TOMPO nampilaza ny mpaminany mpanompony hoe: '
  '11':
  - type: text
    content: 'Satria i Manase, mpanjakan’ny Joda, nanao izao fahavetavetana izao ka nanao ratsy mihoatra noho izay rehetra nataon’ny Amorita izay teo alohany sady nampanota ny Joda tamin’ny sampiny, '
  '12':
  - type: text
    content: 'dia izao kosa no lazain’NY TOMPO, Andriamanitry ny Israely: Indro, hahatonga loza amin’i Jerosalema sy i Joda Aho, koa izay rehetra mandre izany dia hangintsina ny sofiny roa. '
  '13':
  - type: text
    content: 'Hohenjaniko ato Jerosalema ny kofehy fandrefesan’i Samaria sy ny fandrefesana marindranon’ny taranak’i Ahaba; ary hamaoka an’i Jerosalema Aho, toy ny olona mamaoka lovia ka sady mamaoka azy no manohoka azy ambony ambany. '
  '14':
  - type: text
    content: 'Hafoiko ny lovako sisa ka hatolotro ho eo an-tanan’ny fahavalony; dia ho haza sy ho babon’ny fahavalony rehetra izy, '
  '15':
  - type: text
    content: satria efa nanao izay ratsy teo imasoko ka nahatezitra Ahy hatramin’ny andro nivoahan’ny razany avy tany Ejipta ka mandraka androany.
  '16':
  - type: text
    content: Ary na dia ny ran’ny tsy manan-tsiny aza dia nalatsak’i Manase be dia be ka nandrakotra an’i Jerosalema manontolo, ho fanampin’ny ota izay nampanotany ny Joda tamin’ny nanaovany izay ratsy teo imason’NY TOMPO.
  - type: heading
    content: 2Tan 33.18-20
  '17':
  - type: text
    content: 'Ny tantaran’i Manase sisa mbamin’izay rehetra nataony sy ny fahotana izay nataony, tsy voasoratra ao amin’ny bokin’ny tantaran’ny mpanjakan’ny Joda va izany? '
  '18':
  - type: text
    content: Ary nodimandry any amin’ny razany i Manase dia nalevina tao an-tanimboly tao alatranony, ao amin’ny sahan’i Oza, ary i Amona zanany no nanjaka nandimby azy.
  - type: heading
    content: I Amona, mpanjakan’ny Joda
  - type: heading
    content: 2Tan 33.21-25
  '19':
  - type: text
    content: 'Roa amby roapolo taona i Amona raha nanomboka nanjaka, ary roa taona no nanjakany tany Jerosalema. Ny anaran’ny reniny dia Mesolemeta, zanakavavin’i Haroza, avy any Jotba. '
  '2':
  - type: text
    content: 'Nanao izay ratsy teo imason’NY TOMPO izy, tahaka ny fahavetavetan’ny firenena izay noroahin’NY TOMPO tsy ho eo anoloan’ny Zanak’Israely. '
  '20':
  - type: text
    content: 'Nanao izay ratsy teo imason’NY TOMPO koa izy, tahaka ny nataon’i Manase rainy; '
  '21':
  - type: text
    content: 'nandeha tamin’ny lalana rehetra izay efa nalehan’ny rainy izy ka nanompo ny sampy izay notompoin’ny rainy sady niankohoka teo anatrehany. '
  '22':
  - type: text
    content: 'Nahafoy NY TOMPO, Andriamanitry ny razany, izy, fa tsy nandeha tamin’ny lalan’NY TOMPO. '
  '23':
  - type: text
    content: 'Nanao tetika fikomiana taminy ny mpanompon’i Amona mpanjaka ka namono azy tao an-tranony. '
  '24':
  - type: text
    content: 'Ny vahoaka koa dia namono izay rehetra nanao tetika fikomiana tamin’i Amona mpanjaka dia nampanjaka an’i Josia zanany hisolo azy. '
  '25':
  - type: text
    content: 'Ny tantaran’i Amona sisa, tsy voasoratra ao amin’ny bokin’ny tantaran’ny mpanjakan’ny Joda va izany? '
  '26':
  - type: text
    content: Nalevina tao amin’ny fasany tao amin’ny sahan’i Oza izy ka i Josia zanany no nanjaka nandimby azy.
  '3':
  - type: text
    content: 'Namboariny indray ny toerana fanaovana sorona izay efa noravan’i Hezekia rainy ka nanangana alitara ho an’ny '
  - type: text
    content: Baala
  - type: text
    content: ' izy sady nanao tsangankazon-tsampy ho an’ny '
  - type: text
    content: Aseraha
  - type: text
    content: ', tahaka izay nataon’i Ahaba, mpanjakan’ny Israely; niankohoka teo anatrehan’izay rehetra eny amin’ny lanitra izy ka nanompo ireny. '
  '4':
  - type: text
    content: 'Nanorina alitara maromaro tao amin’ny tranon’NY TOMPO koa izy, dia tao amin’izay nolazain’NY TOMPO hoe: Ao Jerosalema no hasiako ny anarako. '
  '5':
  - type: text
    content: 'Nanorina alitara tao anatin’ny kianja roa tao amin’ny tranon’NY TOMPO ho an’izay rehetra eny amin’ny lanitra izy. '
  '6':
  - type: text
    content: 'Ary ny zanany dia nampamakivakiny ny afo sady nanandro no nanao sikidy izy ary naka ny mpiantso ny fanahin’ny maty sy ny mpanandro; eny, tsy nitsahatra nanao izay ratsy teo imason’NY TOMPO izy ka nahatezitra Azy. '
  '7':
  - type: text
    content: 'Ny sarivongan’ny Aseraha izay nataony dia napetrany tao amin’ny trano nolazain’NY TOMPO tamin’i Davida sy i Solomona zanany hoe: Ato amin’ity trano ity sy eto Jerosalema, izay nofidiko tamin’ny fokon’ny Israely rehetra, no hasiako ny anarako mandrakizay. '
  '8':
  - type: text
    content: 'Tsy hampirenireny ny Israely any ivelan’ny tany izay nomeko ny razany intsony Aho raha mba hitandrina ka hanatanteraka izay rehetra nandidiako azy izy, araka ny lalàna rehetra izay nandidian’i Mosesy mpanompoko azy ihany. '
  '9':
  - type: text
    content: 'Nefa tsy nihaino izy; fa i Manase dia nitaona azy hanao ratsy mihoatra noho ny nataon’ny '
  - type: text
    content: Jentilisa
  - type: text
    content: ' izay naringan’NY TOMPO tsy ho eo anoloan’ny Zanak’Israely.'
