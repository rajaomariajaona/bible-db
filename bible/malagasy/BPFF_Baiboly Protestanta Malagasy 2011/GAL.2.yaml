document_id: GAL.2
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fifanarahan’i Paoly sy ny apostoly hafa
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Nony afaka efatra amby folo taona dia niakatra tany Jerosalema indray izahay sy i Barnabasy; nentiko niaraka tamiko koa i Titosy. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Niakatra araka ny fanambaràna aho ka novelabelariko taminy ny Filazantsara izay toriko any amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jentilisa
  - type: text
    text: ', fa tamin’ny mangingina ihany teo amin’izay manan-daza, fandrao ho mihazakazaka foana aho, na efa nihazakazaka foana. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Kanefa i Titosy izay niaraka tamiko, na dia Grika aza, dia tsy mba noterena hoforana, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'noho ny rahalahy sandoka niditra an-tsokosoko, izay nisoko mangina hitsikilo ny fahafahantsika izay ananantsika ao amin’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' Jesosy, mba hanandevozany antsika; '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: tsy nety nanaiky ireo izahay na dia ora iray monja aza, mba hitoeran’ny fahamarinan’ny Filazantsara ho anareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Fa ny amin’ny olona izay heverina ho manan-daza indray, na nanao ahoana na nanao ahoana izy, dia tsy mampaninona ahy satria Andriamanitra tsy mizaha tavan’olona. Tsy nomen’ireo saina na tamin’inona na tamin’inona aho. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Hafa kosa no nataony nony hitany fa notolorana ny Filazantsara ho adidiko ho an’ny tsy voafora aho, tahaka an’i Petera ho an’ny voafora; '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'fa Izay niasa tao amin’i Petera ka nahatonga azy ho apostoly ho an’ny voafora no niasa tao amiko koa ho an’ny Jentilisa. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary nony fantatr’i Jakoba sy i Kefasy ary i Jaona, izay natao ho andry, ny fahasoavana nomena ahy, dia notolorany ny tanana havanana ho mariky ny fiombonana izahay sy i Barnabasy mba hankany amin’ny Jentilisa, fa izy kosa dia ho any amin’ny voafora. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Izao ihany no tokony hataonay: Hahatsiaro ny mahantra; nampahazoto ahy rahateo ny hanao izany.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Manohitra an’i Petera i Paoly
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Nony tonga tany Antiokia anefa i Kefasy dia nanohitra azy teo imasony aho satria hita fa nanan-tsiny izy. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Niara-nisakafo tamin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jentilisa
  - type: text
    text: ' ihany mantsy izy fony tsy mbola tonga ny sasany avy tany amin’i Jakoba. Raha vao tonga anefa ireo dia nihatakataka izy satria natahotra ireo voafora. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Niara-nihatsaravelatsihy taminy koa ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jiosy
  - type: text
    text: ' sasany ka i Barnabasy avy aza dia mba voataonan’ny fihatsarambelatsihiny. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Rehefa hitako anefa fa tsy nandeha mahitsy araka ny fahamarinan’ny Filazantsara ireo dia hoy aho tamin’i Kefasy, teo anatrehan’ny olona rehetra: Raha ianao izay tena Jiosy aza no manao tahaka ny fanaon’ny Jentilisa fa tsy tahaka ny fanaon’ny Jiosy, nahoana moa ny Jentilisa no terenao hanao tahaka ny fanaon’ny Jiosy?'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Samy vonjen’ny finoana na Jiosy na Jentilisa
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Taranaka '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jiosy
  - type: text
    text: ' isika, fa tsy mba avy amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jentilisa
  - type: text
    text: ' mpanota, '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'nefa nony fantatsika fa tsy hamarinina amin’ny asan’ny lalàna ny olona fa amin’ny finoana an’i Jesosy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ', dia nino an’i Kristy Jesosy koa isika. Amin’izany mantsy dia hohamarinina amin’ny finoana an’i Kristy isika fa tsy amin’ny asan’ny lalàna, satria tsy misy nofo hohamarinina amin’ny asan’ny lalàna. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Raha mitady hohamarinina ao amin’i Kristy isika, nefa isika koa aza dia hita fa mpanota, moa mpanompon’ny ota va Kristy? Sanatria izany! '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Raha ny zavatra efa noravako no atsangako indray dia mahatsiaro tena ho diso aho. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Tamin’ny lalàna no nahafatesako ny amin’ny lalàna, mba ho velona ho an’Andriamanitra aho. Voahombo niaraka tamin’i Kristy tamin’ny hazofijaliana aho, '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'koa tsy izaho intsony no velona fa Kristy no velona ato anatiko. Izay ivelomako ankehitriny ao amin’ny nofo dia ivelomako amin’ny finoana ny Zanak’Andriamanitra izay efa tia ahy ka nanolotra ny tenany ho ahy. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Tsy manafoana ny fahasoavan’Andriamanitra aho; fa raha avy amin’ny lalàna ny fahamarinana dia maty foana Kristy.
