document_id: GAL.2,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Fifanarahan’i Paoly sy ny apostoly hafa
  - type: text
    content: 'Nony afaka efatra amby folo taona dia niakatra tany Jerosalema indray izahay sy i Barnabasy; nentiko niaraka tamiko koa i Titosy. '
  '10':
  - type: text
    content: 'Izao ihany no tokony hataonay: Hahatsiaro ny mahantra; nampahazoto ahy rahateo ny hanao izany.'
  - type: heading
    content: Manohitra an’i Petera i Paoly
  '11':
  - type: text
    content: 'Nony tonga tany Antiokia anefa i Kefasy dia nanohitra azy teo imasony aho satria hita fa nanan-tsiny izy. '
  '12':
  - type: text
    content: 'Niara-nisakafo tamin’ny '
  - type: text
    content: Jentilisa
  - type: text
    content: ' ihany mantsy izy fony tsy mbola tonga ny sasany avy tany amin’i Jakoba. Raha vao tonga anefa ireo dia nihatakataka izy satria natahotra ireo voafora. '
  '13':
  - type: text
    content: 'Niara-nihatsaravelatsihy taminy koa ny '
  - type: text
    content: Jiosy
  - type: text
    content: ' sasany ka i Barnabasy avy aza dia mba voataonan’ny fihatsarambelatsihiny. '
  '14':
  - type: text
    content: 'Rehefa hitako anefa fa tsy nandeha mahitsy araka ny fahamarinan’ny Filazantsara ireo dia hoy aho tamin’i Kefasy, teo anatrehan’ny olona rehetra: Raha ianao izay tena Jiosy aza no manao tahaka ny fanaon’ny Jentilisa fa tsy tahaka ny fanaon’ny Jiosy, nahoana moa ny Jentilisa no terenao hanao tahaka ny fanaon’ny Jiosy?'
  - type: heading
    content: Samy vonjen’ny finoana na Jiosy na Jentilisa
  '15':
  - type: text
    content: 'Taranaka '
  - type: text
    content: Jiosy
  - type: text
    content: ' isika, fa tsy mba avy amin’ny '
  - type: text
    content: Jentilisa
  - type: text
    content: ' mpanota, '
  '16':
  - type: text
    content: 'nefa nony fantatsika fa tsy hamarinina amin’ny asan’ny lalàna ny olona fa amin’ny finoana an’i Jesosy '
  - type: text
    content: Kristy
  - type: text
    content: ', dia nino an’i Kristy Jesosy koa isika. Amin’izany mantsy dia hohamarinina amin’ny finoana an’i Kristy isika fa tsy amin’ny asan’ny lalàna, satria tsy misy nofo hohamarinina amin’ny asan’ny lalàna. '
  '17':
  - type: text
    content: 'Raha mitady hohamarinina ao amin’i Kristy isika, nefa isika koa aza dia hita fa mpanota, moa mpanompon’ny ota va Kristy? Sanatria izany! '
  '18':
  - type: text
    content: 'Raha ny zavatra efa noravako no atsangako indray dia mahatsiaro tena ho diso aho. '
  '19':
  - type: text
    content: 'Tamin’ny lalàna no nahafatesako ny amin’ny lalàna, mba ho velona ho an’Andriamanitra aho. Voahombo niaraka tamin’i Kristy tamin’ny hazofijaliana aho, '
  '2':
  - type: text
    content: 'Niakatra araka ny fanambaràna aho ka novelabelariko taminy ny Filazantsara izay toriko any amin’ny '
  - type: text
    content: Jentilisa
  - type: text
    content: ', fa tamin’ny mangingina ihany teo amin’izay manan-daza, fandrao ho mihazakazaka foana aho, na efa nihazakazaka foana. '
  '20':
  - type: text
    content: 'koa tsy izaho intsony no velona fa Kristy no velona ato anatiko. Izay ivelomako ankehitriny ao amin’ny nofo dia ivelomako amin’ny finoana ny Zanak’Andriamanitra izay efa tia ahy ka nanolotra ny tenany ho ahy. '
  '21':
  - type: text
    content: Tsy manafoana ny fahasoavan’Andriamanitra aho; fa raha avy amin’ny lalàna ny fahamarinana dia maty foana Kristy.
  '3':
  - type: text
    content: 'Kanefa i Titosy izay niaraka tamiko, na dia Grika aza, dia tsy mba noterena hoforana, '
  '4':
  - type: text
    content: 'noho ny rahalahy sandoka niditra an-tsokosoko, izay nisoko mangina hitsikilo ny fahafahantsika izay ananantsika ao amin’i '
  - type: text
    content: Kristy
  - type: text
    content: ' Jesosy, mba hanandevozany antsika; '
  '5':
  - type: text
    content: tsy nety nanaiky ireo izahay na dia ora iray monja aza, mba hitoeran’ny fahamarinan’ny Filazantsara ho anareo.
  '6':
  - type: text
    content: 'Fa ny amin’ny olona izay heverina ho manan-daza indray, na nanao ahoana na nanao ahoana izy, dia tsy mampaninona ahy satria Andriamanitra tsy mizaha tavan’olona. Tsy nomen’ireo saina na tamin’inona na tamin’inona aho. '
  '7':
  - type: text
    content: 'Hafa kosa no nataony nony hitany fa notolorana ny Filazantsara ho adidiko ho an’ny tsy voafora aho, tahaka an’i Petera ho an’ny voafora; '
  '8':
  - type: text
    content: 'fa Izay niasa tao amin’i Petera ka nahatonga azy ho apostoly ho an’ny voafora no niasa tao amiko koa ho an’ny Jentilisa. '
  '9':
  - type: text
    content: 'Ary nony fantatr’i Jakoba sy i Kefasy ary i Jaona, izay natao ho andry, ny fahasoavana nomena ahy, dia notolorany ny tanana havanana ho mariky ny fiombonana izahay sy i Barnabasy mba hankany amin’ny Jentilisa, fa izy kosa dia ho any amin’ny voafora. '
