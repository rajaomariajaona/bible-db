document_id: MAT.27,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Jesosy noentina teo anatrehan’i Pilato
  - type: heading
    content: Mar 15.1-2; Lio 22.66; 23.1; Jao 18.28
  - type: text
    content: 'Nony maraina ny andro dia nikaon-doha ny lehiben’ny mpisorona rehetra sy ny loholona hiampanga an’i Jesosy mba hamonoany Azy ho faty. '
  '10':
  - type: text
    content: ka nomeny hividianana ny sahan’ny mpanefy vilany izany, araka izay nandidian’NY TOMPO ahy» (Jer 18.2; Zak 11.13).
  - type: heading
    content: Nanadina an’i Jesosy i Pilato
  - type: heading
    content: Mar 15.2-5; Lio 23.2-5, 9-10; Jao 18.29-38
  '11':
  - type: text
    content: 'Ary Jesosy nitsangana teo anatrehan’ny governora; dia nanontany Azy ny governora hoe: Ianao va no Mpanjakan’ny '
  - type: text
    content: Jiosy
  - type: text
    content: '? Hoy Jesosy: Voalazanao. '
  '12':
  - type: text
    content: 'Ary rehefa nampangain’ny lehiben’ny mpisorona mbamin’ny loholona Izy dia tsy namaly akory. '
  '13':
  - type: text
    content: 'Hoy i Pilato Taminy: Tsy renao va izany zavatra maro iampangan’ireo Anao izany? '
  '14':
  - type: text
    content: Fa tsy namaly azy Izy na dia indraimbava aza ka gaga tokoa ny governora.
  - type: heading
    content: Ny nanamelohana an’i Jesosy ho faty
  - type: heading
    content: Mar 15.6-14; Lio 23.13-23; Jao 18.39-40
  '15':
  - type: text
    content: 'Isaky ny tonga ny andro firavoravoana dia fanaon’ny governora ny manafaka mpifatotra iray ho an’ny vahoaka, araka izay tiany. '
  '16':
  - type: text
    content: 'Ary tamin’izany nisy mpifatotra malaza iray antsoina hoe Barabasy. '
  '17':
  - type: text
    content: 'Koa nony tafangona teo ny olona dia hoy i Pilato: Iza moa no tianareo hafahako ho anareo, i Barabasy sa Jesosy izay lazaina hoe '
  - type: text
    content: Kristy
  - type: text
    content: '? '
  '18':
  - type: text
    content: Fantany mantsy fa fialonana no nanoloran’ireo Azy.
  '19':
  - type: text
    content: 'Ary rehefa nipetraka teo amin’ny fitsarana izy dia nandefa iraka hankeo aminy ny vadiny hilaza aminy hoe: Aza manao na inona na inona amin’izany Lehilahy marina izany fa nampahory be ahy androany ny nanofisako Azy.'
  '2':
  - type: text
    content: Ary rehefa nafatony Izy dia noentiny ka natolony an’i Pilato governora.
  - type: heading
    content: Namono tena i Jodasy
  '20':
  - type: text
    content: 'Ny lehiben’ny mpisorona mbamin’ny loholona anefa dia nitaona ny vahoaka mba hangataka an’i Barabasy ka hampamono an’i Jesosy. '
  '21':
  - type: text
    content: 'Fa hoy ny governora tamin’izy ireo: Iza amin’izy roa lahy moa no tianareo hafahako ho anareo? Dia hoy izy rehetra: I Barabasy. '
  '22':
  - type: text
    content: 'Ary hoy i Pilato: Ahoana kosa ary no hataoko amin’i Jesosy izay lazaina hoe Kristy? Dia hoy izy rehetra: Aoka hohomboana amin’ny hazofijaliana Izy. '
  '23':
  - type: text
    content: 'Fa hoy ny governora: Inona ary no ratsy nataony? Fa vao mainka niantsoantso izy rehetra hoe: Aoka hohomboana amin’ny hazofijaliana Izy!'
  - type: heading
    content: Mar 15.15; Lio 23.24-25; Jao 19.16
  '24':
  - type: text
    content: 'Ary rehefa hitan’i Pilato fa tsy nisy hevitra, fa vao mainka nitombo ihany ny tabataba, dia naka rano izy ka nanasa tanana teo anatrehan’ny vahoaka sady niteny hoe: Tsy manan-tsiny amin’ny ran’ity Lehilahy ity aho fa raharahanareo. '
  '25':
  - type: text
    content: 'Ary hoy ny olona rehetra hoe: Aoka ny rany ho aminay sy ny zanakay. '
  '26':
  - type: text
    content: Dia nanafaka an’i Barabasy ho an’ny olona izy; fa Jesosy kosa dia nasainy nokaravasina ary natolony mba hohomboina amin’ny hazofijaliana.
  - type: heading
    content: Nataon’ny miaramila ho fihomehezana Jesosy
  - type: heading
    content: Mar 15.16-20; Lio 23.11; Jao 19.2-3
  '27':
  - type: text
    content: 'Ary ny miaramilan’ny governora dia nitondra an’i Jesosy ho ao anaty lapa sady nanangona ny miaramila namany rehetra ho eo Aminy. '
  '28':
  - type: text
    content: 'Ary nanala ny akanjon’i Jesosy izy ireo dia nampitafy Azy lamba jaky. '
  '29':
  - type: text
    content: 'Dia nandrandrana satroka tsilo ho Azy izy ireo ka nasatrony ny lohany, ary nampitanany volotara ny tanany havanana dia nandohalika teo anatrehany izy ireo ka naneso Azy hoe: Arahaba, ry Mpanjakan’ny '
  - type: text
    content: Jiosy
  - type: text
    content: '! '
  '3':
  - type: text
    content: 'Fa i Jodasy, ilay namadika Azy, raha nahita fa nohelohina Jesosy, dia nanenina ka namerina ny sekela volafotsy telopolo tamin’ny lehiben’ny mpisorona sy ny loholona '
  '30':
  - type: text
    content: 'Dia nororany Izy, ary nalainy ny volotara ka nokapohiny ny lohany. '
  '31':
  - type: text
    content: Rehefa naneso Azy avy izy ireo dia nanala ilay lamba jaky Taminy ka nampiakanjo Azy indray, ary noentiny mba hohomboana amin’ny hazofijaliana Izy.
  - type: heading
    content: Nohomboina teo amin’ny hazofijaliana Jesosy
  - type: heading
    content: Mar 15.21-32; Lio 23.26-43; Jao 19.16-24
  '32':
  - type: text
    content: Ary raha nandeha izy ireo dia nahita lehilahy kireniana iray, Simona no anarany, izy io no notereny hitondra ny hazofijalian’i Jesosy.
  '33':
  - type: text
    content: 'Rehefa tonga teo amin’ny toerana antsoina hoe Golgota, izany hoe Ikarandoha, '
  '34':
  - type: text
    content: dia nomeny divay miharo ranon’afero Izy hosotroiny; nefa nony nanandrana izany Izy dia tsy nety nisotro.
  '35':
  - type: text
    content: 'Ary rehefa voahombony tamin’ny hazofijaliana Izy dia nataony antsapaka no fizara ny fitafiany. '
  '36':
  - type: text
    content: Ary nipetraka ry zareo ka niambina Azy teo.
  '37':
  - type: text
    content: 'Ary napetany teo ambonin’ny lohany ny soratra milaza ny nanamelohana Azy hoe:'
  - type: heading
    content: ity no jesosy, mpanjakan’ny jiosy.
  '38':
  - type: text
    content: Ary nisy jiolahy roa nohomboina niaraka Taminy, ny iray dia teo amin’ny ankavanany ary ny iray dia teo amin’ny ankaviany.
  '39':
  - type: text
    content: 'Ary izay nandalo dia niteny ratsy Azy sady nihifikifi-doha '
  '4':
  - type: text
    content: 'sady niteny hoe: Nanota aho satria namadika ny ran’ny tsy manan-tsiny. Fa hoy ireo: Ahoanay inona izany fa raharahanao! '
  '40':
  - type: text
    content: 'no niteny hoe: Ry Ilay mandrava ny tempoly sy manangana azy amin’ny hateloana, vonjeo ny tenanao. Raha Zanak’Andriamanitra Ianao, midìna hiala amin’ny hazofijaliana.'
  '41':
  - type: text
    content: 'Ary naneso toy izany koa ny lehiben’ny mpisorona mbamin’ny '
  - type: text
    content: mpanoradalàna
  - type: text
    content: ' sy ny loholona ka niteny hoe: '
  '42':
  - type: text
    content: 'Novonjeny ny sasany fa ny tenany dia tsy hainy vonjena. Mpanjakan’ny Israely Izy! Aoka hidina hiala amin’ny hazofijaliana Izy ankehitriny dia hino Azy izahay; '
  '43':
  - type: text
    content: 'natoky an’Andriamanitra Izy! Aoka Izy hamonjy Azy ankehitriny, raha ankasitrahany (Sal 22.8), satria hoy Izy: Zanak’Andriamanitra Aho.'
  '44':
  - type: text
    content: Ary nandatsa Azy toy izany koa ireo jiolahy niaraka nohomboina Taminy.
  - type: heading
    content: Ny nahafatesan’i Jesosy
  - type: heading
    content: Mar 15.33-39; Lio 23.44-48; Jao 19.28-30
  '45':
  - type: text
    content: 'Hatramin’ny ora fahenina ka hatramin’ny ora fahasivy dia maizina ny tany manontolo. '
  '46':
  - type: text
    content: 'Ary nony tokony ho tamin’ny ora fahasivy dia niantso tamin’ny feo mahery Jesosy hoe:'
  - type: text
    content: Elỳ, Elỳ, lamà sabaktàny?
  - type: text
    content: 'Izany hoe: Andriamanitro ô, Andriamanitro ô, nahoana no dia mahafoy Ahy Ianao (Sal 22.1)? '
  '47':
  - type: text
    content: 'Ary ny sasany tamin’izay nijanona teo, raha nandre izany, dia nilaza hoe: Miantso an’i Elia Ilehio. '
  '48':
  - type: text
    content: 'Ary niaraka tamin’izay dia nihazakazaka ny iray tamin’izy ireo ka nandray sipaonjy, ary rehefa natsobony tamin’ny vinaingitra izany dia notohiziny tamin’ny volotara ka natohony hotsentsefin’i Jesosy. '
  '49':
  - type: text
    content: 'Fa ny sasany kosa dia niteny hoe: Aoka hoe hojerentsika na ho avy hamonjy Azy i Elia na tsia. '
  '5':
  - type: text
    content: Ary rehefa avy nanipy ny vola teo amin’ny tempoly izy dia lasa nandeha ka nananton-tena.
  '50':
  - type: text
    content: Ary rehefa niantso tamin’ny feo mahery indray Jesosy dia nanolotra ny fanahiny.
  '51':
  - type: text
    content: 'Dia indro ny efitra lamba tao amin’ny tempoly fa triatra nizara roa hatrany ambony ka hatrany ambany; nihorohoro koa ny tany ka nitresaka ny vatolampy; '
  '52':
  - type: text
    content: 'ary nisokatra ny fasana ka maro ny fatin’ny olona masina izay efa nodimandry no natsangana, '
  '53':
  - type: text
    content: dia nivoaka avy tao amin’ny fasana ireny taorianan’ny nitsanganan’i Jesosy ka nankao amin’ny Tanàna Masina sady niseho tamin’ny olona maro.
  '54':
  - type: text
    content: 'Ary ny kapiteny sy ireo niaraka taminy niambina an’i Jesosy, raha nahita ny horohoron-tany mbamin’izay zava-niseho teo, dia raiki-tahotra indrindra ka niteny hoe: Marina tokoa fa Zanak’Andriamanitra io Lehilahy io.'
  - type: heading
    content: Ny nandevenana an’i Jesosy
  - type: heading
    content: Mar 15.40-47; Lio 23.49-56; Jao 19.25, 38-42
  '55':
  - type: text
    content: 'Ary nisy vehivavy maro nitsinjo teny lavitra teny, dia ireo izay nanaraka an’i Jesosy hatrany Galilia ka nanompo Azy. '
  '56':
  - type: text
    content: Isan’ireny i Maria Magdalena sy i Maria, renin’i Jakoba, ary i Josesy sy ny renin’ny zanak’i Zebedio.
  '57':
  - type: text
    content: 'Nony hariva ny andro dia tonga ny lehilahy mpanankarena iray, avy any Arimatia, Josefa no anarany, ary izy koa dia mpianatr’i Jesosy. '
  '58':
  - type: text
    content: 'Nankao amin’i Pilato izany lehilahy izany ka nangataka ny fatin’i Jesosy. Dia nasain’i Pilato nomena azy izany. '
  '59':
  - type: text
    content: 'Ary rehefa nalain’i Josefa ny faty ka nofonosiny lamba hariry madinika madio '
  '6':
  - type: text
    content: 'Ary ny lehiben’ny mpisorona dia nandray ny vola ka niteny hoe: Tsy mety raha alatsaka ao amin’ny rakitry ny tempoly ity fa vidin-dra. '
  '60':
  - type: text
    content: 'dia naleviny tao amin’ny fasany vaovao izay efa nolavahany tao amin’ny vatolampy; ary rehefa nanakodia vato lehibe ho eo amin’ny varavaran’ny fasana izy dia lasa nandeha. '
  '61':
  - type: text
    content: Ary teo i Maria Magdalena sy ilay Maria hafa ka nipetraka tandrifin’ny fasana.
  - type: heading
    content: Nasiana mpiambina ny fasana
  '62':
  - type: text
    content: 'Nony ampitson’ny andro fiomanana dia nivory teo amin’i Pilato ny lehiben’ny mpisorona sy ny '
  - type: text
    content: Fariseo
  - type: text
    content: ' '
  '63':
  - type: text
    content: 'ka niteny hoe: Tompoko, tsaroanay fa iny mpamitaka iny, fony Izy mbola velona, dia nilaza hoe: Raha afaka hateloana dia hitsangana Aho. '
  '64':
  - type: text
    content: 'Koa asaivo ambenana tsara ny fasana mandra-pahatongan’ny andro fahatelo, fandrao avy ny mpianany ka hangalatra Azy dia hilaza amin’ny olona hoe: Efa nitsangana tamin’ny maty Izy; koa ho ratsy ny fitaka farany noho ny voalohany. '
  '65':
  - type: text
    content: 'Hoy i Pilato: Makà ary mpiambina ka mandehana ary ataovy mafy araka izay hainareo ny fiambenana. '
  '66':
  - type: text
    content: Nony lasa ireo dia nasainy nambenan’ny mpiambina mafy ny fasana, rehefa avy nasiany tombo-kase ny vato.
  '7':
  - type: text
    content: 'Koa rehefa nikaon-doha izy ireo dia novidiny tamin’ilay vola ny sahan’ny mpanefy vilany mba ho fandevenam-bahiny. '
  '8':
  - type: text
    content: 'Ary izay no iantsoana izany saha izany mandraka androany hoe Sahan-dra. '
  '9':
  - type: text
    content: Ary tamin’izany dia tanteraka izay nampilazaina an’i Jeremia mpaminany
  - type: note
    content: 'Na: profeta.'
  - type: text
    content: ' hoe: «Dia nalainy ny volafotsy telopolo, vidin’ilay notombanan’ny Zanak’Israely, '
