document_id: MAT.27
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesosy noentina teo anatrehan’i Pilato
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mar 15.1-2; Lio 22.66; 23.1; Jao 18.28
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Nony maraina ny andro dia nikaon-doha ny lehiben’ny mpisorona rehetra sy ny loholona hiampanga an’i Jesosy mba hamonoany Azy ho faty. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ary rehefa nafatony Izy dia noentiny ka natolony an’i Pilato governora.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Namono tena i Jodasy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Fa i Jodasy, ilay namadika Azy, raha nahita fa nohelohina Jesosy, dia nanenina ka namerina ny sekela volafotsy telopolo tamin’ny lehiben’ny mpisorona sy ny loholona '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'sady niteny hoe: Nanota aho satria namadika ny ran’ny tsy manan-tsiny. Fa hoy ireo: Ahoanay inona izany fa raharahanao! '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ary rehefa avy nanipy ny vola teo amin’ny tempoly izy dia lasa nandeha ka nananton-tena.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary ny lehiben’ny mpisorona dia nandray ny vola ka niteny hoe: Tsy mety raha alatsaka ao amin’ny rakitry ny tempoly ity fa vidin-dra. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Koa rehefa nikaon-doha izy ireo dia novidiny tamin’ilay vola ny sahan’ny mpanefy vilany mba ho fandevenam-bahiny. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary izay no iantsoana izany saha izany mandraka androany hoe Sahan-dra. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ary tamin’izany dia tanteraka izay nampilazaina an’i Jeremia mpaminany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.9 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: profeta.
    marker-yv: yv-n
  - type: text
    text: ' hoe: «Dia nalainy ny volafotsy telopolo, vidin’ilay notombanan’ny Zanak’Israely, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ka nomeny hividianana ny sahan’ny mpanefy vilany izany, araka izay nandidian’NY TOMPO ahy» (Jer 18.2; Zak 11.13).
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nanadina an’i Jesosy i Pilato
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mar 15.2-5; Lio 23.2-5, 9-10; Jao 18.29-38
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary Jesosy nitsangana teo anatrehan’ny governora; dia nanontany Azy ny governora hoe: Ianao va no Mpanjakan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jiosy
  - type: text
    text: '? Hoy Jesosy: Voalazanao. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary rehefa nampangain’ny lehiben’ny mpisorona mbamin’ny loholona Izy dia tsy namaly akory. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Hoy i Pilato Taminy: Tsy renao va izany zavatra maro iampangan’ireo Anao izany? '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Fa tsy namaly azy Izy na dia indraimbava aza ka gaga tokoa ny governora.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nanamelohana an’i Jesosy ho faty
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mar 15.6-14; Lio 23.13-23; Jao 18.39-40
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Isaky ny tonga ny andro firavoravoana dia fanaon’ny governora ny manafaka mpifatotra iray ho an’ny vahoaka, araka izay tiany. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary tamin’izany nisy mpifatotra malaza iray antsoina hoe Barabasy. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Koa nony tafangona teo ny olona dia hoy i Pilato: Iza moa no tianareo hafahako ho anareo, i Barabasy sa Jesosy izay lazaina hoe '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: '? '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Fantany mantsy fa fialonana no nanoloran’ireo Azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary rehefa nipetraka teo amin’ny fitsarana izy dia nandefa iraka hankeo aminy ny vadiny hilaza aminy hoe: Aza manao na inona na inona amin’izany Lehilahy marina izany fa nampahory be ahy androany ny nanofisako Azy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ny lehiben’ny mpisorona mbamin’ny loholona anefa dia nitaona ny vahoaka mba hangataka an’i Barabasy ka hampamono an’i Jesosy. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Fa hoy ny governora tamin’izy ireo: Iza amin’izy roa lahy moa no tianareo hafahako ho anareo? Dia hoy izy rehetra: I Barabasy. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary hoy i Pilato: Ahoana kosa ary no hataoko amin’i Jesosy izay lazaina hoe Kristy? Dia hoy izy rehetra: Aoka hohomboana amin’ny hazofijaliana Izy. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Fa hoy ny governora: Inona ary no ratsy nataony? Fa vao mainka niantsoantso izy rehetra hoe: Aoka hohomboana amin’ny hazofijaliana Izy!'
- type: usfm
  marker: r
  children:
  - type: text
    text: Mar 15.15; Lio 23.24-25; Jao 19.16
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary rehefa hitan’i Pilato fa tsy nisy hevitra, fa vao mainka nitombo ihany ny tabataba, dia naka rano izy ka nanasa tanana teo anatrehan’ny vahoaka sady niteny hoe: Tsy manan-tsiny amin’ny ran’ity Lehilahy ity aho fa raharahanareo. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary hoy ny olona rehetra hoe: Aoka ny rany ho aminay sy ny zanakay. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Dia nanafaka an’i Barabasy ho an’ny olona izy; fa Jesosy kosa dia nasainy nokaravasina ary natolony mba hohomboina amin’ny hazofijaliana.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nataon’ny miaramila ho fihomehezana Jesosy
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mar 15.16-20; Lio 23.11; Jao 19.2-3
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ary ny miaramilan’ny governora dia nitondra an’i Jesosy ho ao anaty lapa sady nanangona ny miaramila namany rehetra ho eo Aminy. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ary nanala ny akanjon’i Jesosy izy ireo dia nampitafy Azy lamba jaky. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Dia nandrandrana satroka tsilo ho Azy izy ireo ka nasatrony ny lohany, ary nampitanany volotara ny tanany havanana dia nandohalika teo anatrehany izy ireo ka naneso Azy hoe: Arahaba, ry Mpanjakan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jiosy
  - type: text
    text: '! '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Dia nororany Izy, ary nalainy ny volotara ka nokapohiny ny lohany. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Rehefa naneso Azy avy izy ireo dia nanala ilay lamba jaky Taminy ka nampiakanjo Azy indray, ary noentiny mba hohomboana amin’ny hazofijaliana Izy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nohomboina teo amin’ny hazofijaliana Jesosy
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mar 15.21-32; Lio 23.26-43; Jao 19.16-24
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Ary raha nandeha izy ireo dia nahita lehilahy kireniana iray, Simona no anarany, izy io no notereny hitondra ny hazofijalian’i Jesosy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Rehefa tonga teo amin’ny toerana antsoina hoe Golgota, izany hoe Ikarandoha, '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: dia nomeny divay miharo ranon’afero Izy hosotroiny; nefa nony nanandrana izany Izy dia tsy nety nisotro.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Ary rehefa voahombony tamin’ny hazofijaliana Izy dia nataony antsapaka no fizara ny fitafiany. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Ary nipetraka ry zareo ka niambina Azy teo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Ary napetany teo ambonin’ny lohany ny soratra milaza ny nanamelohana Azy hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ity no jesosy, mpanjakan’ny jiosy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Ary nisy jiolahy roa nohomboina niaraka Taminy, ny iray dia teo amin’ny ankavanany ary ny iray dia teo amin’ny ankaviany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Ary izay nandalo dia niteny ratsy Azy sady nihifikifi-doha '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'no niteny hoe: Ry Ilay mandrava ny tempoly sy manangana azy amin’ny hateloana, vonjeo ny tenanao. Raha Zanak’Andriamanitra Ianao, midìna hiala amin’ny hazofijaliana.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Ary naneso toy izany koa ny lehiben’ny mpisorona mbamin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpanoradalàna
  - type: text
    text: ' sy ny loholona ka niteny hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Novonjeny ny sasany fa ny tenany dia tsy hainy vonjena. Mpanjakan’ny Israely Izy! Aoka hidina hiala amin’ny hazofijaliana Izy ankehitriny dia hino Azy izahay; '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'natoky an’Andriamanitra Izy! Aoka Izy hamonjy Azy ankehitriny, raha ankasitrahany (Sal 22.8), satria hoy Izy: Zanak’Andriamanitra Aho.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: Ary nandatsa Azy toy izany koa ireo jiolahy niaraka nohomboina Taminy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nahafatesan’i Jesosy
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mar 15.33-39; Lio 23.44-48; Jao 19.28-30
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Hatramin’ny ora fahenina ka hatramin’ny ora fahasivy dia maizina ny tany manontolo. '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Ary nony tokony ho tamin’ny ora fahasivy dia niantso tamin’ny feo mahery Jesosy hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elỳ, Elỳ, lamà sabaktàny?
- type: usfm
  marker: m
  children:
  - type: text
    text: 'Izany hoe: Andriamanitro ô, Andriamanitro ô, nahoana no dia mahafoy Ahy Ianao (Sal 22.1)? '
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Ary ny sasany tamin’izay nijanona teo, raha nandre izany, dia nilaza hoe: Miantso an’i Elia Ilehio. '
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Ary niaraka tamin’izay dia nihazakazaka ny iray tamin’izy ireo ka nandray sipaonjy, ary rehefa natsobony tamin’ny vinaingitra izany dia notohiziny tamin’ny volotara ka natohony hotsentsefin’i Jesosy. '
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'Fa ny sasany kosa dia niteny hoe: Aoka hoe hojerentsika na ho avy hamonjy Azy i Elia na tsia. '
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: Ary rehefa niantso tamin’ny feo mahery indray Jesosy dia nanolotra ny fanahiny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'Dia indro ny efitra lamba tao amin’ny tempoly fa triatra nizara roa hatrany ambony ka hatrany ambany; nihorohoro koa ny tany ka nitresaka ny vatolampy; '
  - type: usfm
    marker: v
    metadata:
      v: '52'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'ary nisokatra ny fasana ka maro ny fatin’ny olona masina izay efa nodimandry no natsangana, '
  - type: usfm
    marker: v
    metadata:
      v: '53'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: dia nivoaka avy tao amin’ny fasana ireny taorianan’ny nitsanganan’i Jesosy ka nankao amin’ny Tanàna Masina sady niseho tamin’ny olona maro.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '54'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: 'Ary ny kapiteny sy ireo niaraka taminy niambina an’i Jesosy, raha nahita ny horohoron-tany mbamin’izay zava-niseho teo, dia raiki-tahotra indrindra ka niteny hoe: Marina tokoa fa Zanak’Andriamanitra io Lehilahy io.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nandevenana an’i Jesosy
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mar 15.40-47; Lio 23.49-56; Jao 19.25, 38-42
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '55'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: 'Ary nisy vehivavy maro nitsinjo teny lavitra teny, dia ireo izay nanaraka an’i Jesosy hatrany Galilia ka nanompo Azy. '
  - type: usfm
    marker: v
    metadata:
      v: '56'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: Isan’ireny i Maria Magdalena sy i Maria, renin’i Jakoba, ary i Josesy sy ny renin’ny zanak’i Zebedio.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '57'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: 'Nony hariva ny andro dia tonga ny lehilahy mpanankarena iray, avy any Arimatia, Josefa no anarany, ary izy koa dia mpianatr’i Jesosy. '
  - type: usfm
    marker: v
    metadata:
      v: '58'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: 'Nankao amin’i Pilato izany lehilahy izany ka nangataka ny fatin’i Jesosy. Dia nasain’i Pilato nomena azy izany. '
  - type: usfm
    marker: v
    metadata:
      v: '59'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '59'
  - type: text
    text: 'Ary rehefa nalain’i Josefa ny faty ka nofonosiny lamba hariry madinika madio '
  - type: usfm
    marker: v
    metadata:
      v: '60'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '60'
  - type: text
    text: 'dia naleviny tao amin’ny fasany vaovao izay efa nolavahany tao amin’ny vatolampy; ary rehefa nanakodia vato lehibe ho eo amin’ny varavaran’ny fasana izy dia lasa nandeha. '
  - type: usfm
    marker: v
    metadata:
      v: '61'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '61'
  - type: text
    text: Ary teo i Maria Magdalena sy ilay Maria hafa ka nipetraka tandrifin’ny fasana.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nasiana mpiambina ny fasana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '62'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '62'
  - type: text
    text: 'Nony ampitson’ny andro fiomanana dia nivory teo amin’i Pilato ny lehiben’ny mpisorona sy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Fariseo
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '63'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '63'
  - type: text
    text: 'ka niteny hoe: Tompoko, tsaroanay fa iny mpamitaka iny, fony Izy mbola velona, dia nilaza hoe: Raha afaka hateloana dia hitsangana Aho. '
  - type: usfm
    marker: v
    metadata:
      v: '64'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '64'
  - type: text
    text: 'Koa asaivo ambenana tsara ny fasana mandra-pahatongan’ny andro fahatelo, fandrao avy ny mpianany ka hangalatra Azy dia hilaza amin’ny olona hoe: Efa nitsangana tamin’ny maty Izy; koa ho ratsy ny fitaka farany noho ny voalohany. '
  - type: usfm
    marker: v
    metadata:
      v: '65'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '65'
  - type: text
    text: 'Hoy i Pilato: Makà ary mpiambina ka mandehana ary ataovy mafy araka izay hainareo ny fiambenana. '
  - type: usfm
    marker: v
    metadata:
      v: '66'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '66'
  - type: text
    text: Nony lasa ireo dia nasainy nambenan’ny mpiambina mafy ny fasana, rehefa avy nasiany tombo-kase ny vato.
