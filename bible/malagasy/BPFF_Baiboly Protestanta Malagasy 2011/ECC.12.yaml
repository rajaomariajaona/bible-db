document_id: ECC.12
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mananontanona ny fahafatesana
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Tsarovy ny Mpanao anao amin’ny andron’ny fahatanoranao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dieny tsy mbola tonga ny andro mahory
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ary tsy mbola mihatra ny taona izay hilazanao hoe: Tsy sitrako izao;'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: dieny tsy mbola mihamaizina ny masoandro sy ny fahazavana
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny volana sy ny kintana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy mbola mitambatra indray ny rahona rehefa avy nilatsaka ny ranonorana;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: fa amin’izay dia hangovitra ny mpiandry trano
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hanjoko ny lehilahy matanjaka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hitsahatra ny mpanompovavy mikoso-bary, satria efa vitsy ireo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ho maizina ny vehivavy mitsirika eny am-baravarankely;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: hirindrina ny varavarana kopa-droa mankeny an-dalambe
- type: usfm
  marker: q1
  children:
  - type: text
    text: rehefa mihamalemy ny feon’ny fikosoham-bary;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho taitra ny olona raha vao maneno ny voronkely
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy hahaloa-peo ny zazavavy mpihira rehetra;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: hatahorana ny toerana avo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa toa misy zava-mahatahotra eny an-dalana; hamony ny hazo amanda,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny valala dia ho tonga mavesatra, ny voan-tsimperifery tsy hanan-kery intsony
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa mandroso ho any amin’ny tranony mandrakizay ny olona
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ireo mpitomany dia mandehandeha eny an-dalambe;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: dieny tsy mbola mivaha ny kofehy volafotsy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy mbola vaky ny vilia volamena fitoeran-diloilo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy mbola potika ny siny eo an-doharano,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy mbola tapaka ny kodia eo an-davaka fantsakana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Fa amin’izany ny vovoka dia hiverina amin’ny tany ho toy ny teo aloha
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny fanahy kosa dia hiverina amin’Andriamanitra izay nanome izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Tena zava-poana, hoy i Mpitoriteny, eny, zava-poana ny zavatra rehetra!
- type: usfm
  marker: s1
  children:
  - type: text
    text: Teny farany
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ary izao koa, satria hendry i Mpitoriteny
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia nampianatra ny olona fahalalana izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, nandinika sy nieritreritra ary nandahatra tenim-pahendrena maro izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Nikaroka i Mpitoriteny mba hahita teny mahafinaritra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary izay tena izy no voasorany, dia teny azo antoka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ny tenin’ny hendry dia toy ny fanindronana
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary toy ny tsatòka natsangan’ireo mpanangona tenim-pahendrena.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fanomezana avy amin’ny mpiandry tokana izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ankoatra izany, anaka, minoa anatra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa tsy misy farany ny manao boky maro
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary manasatra ny tena ny fianarana be.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Rehefa re izany rehetra izany dia izao no teny farany:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Andriamanitra no atahory ary ny didiny no tandremo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa izany no tokony hataon’ny olona rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Fa ny atao rehetra dia hoentin’Andriamanitra ho amin’ny fitsarana ny zavamiafina tsy an-kanavaka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: na soa na ratsy.
