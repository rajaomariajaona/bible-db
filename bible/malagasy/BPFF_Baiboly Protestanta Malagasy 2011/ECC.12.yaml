document_id: ECC.12,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Mananontanona ny fahafatesana
  - type: text
    content: Tsarovy ny Mpanao anao amin’ny andron’ny fahatanoranao,
  - type: text
    content: dieny tsy mbola tonga ny andro mahory
  - type: text
    content: 'ary tsy mbola mihatra ny taona izay hilazanao hoe: Tsy sitrako izao;'
  '10':
  - type: text
    content: Nikaroka i Mpitoriteny mba hahita teny mahafinaritra;
  - type: text
    content: ary izay tena izy no voasorany, dia teny azo antoka.
  '11':
  - type: text
    content: Ny tenin’ny hendry dia toy ny fanindronana
  - type: text
    content: ary toy ny tsatòka natsangan’ireo mpanangona tenim-pahendrena.
  - type: text
    content: Fanomezana avy amin’ny mpiandry tokana izany.
  '12':
  - type: text
    content: Ankoatra izany, anaka, minoa anatra;
  - type: text
    content: fa tsy misy farany ny manao boky maro
  - type: text
    content: ary manasatra ny tena ny fianarana be.
  '13':
  - type: text
    content: 'Rehefa re izany rehetra izany dia izao no teny farany:'
  - type: text
    content: Andriamanitra no atahory ary ny didiny no tandremo,
  - type: text
    content: fa izany no tokony hataon’ny olona rehetra.
  '14':
  - type: text
    content: Fa ny atao rehetra dia hoentin’Andriamanitra ho amin’ny fitsarana ny zavamiafina tsy an-kanavaka,
  - type: text
    content: na soa na ratsy.
  '2':
  - type: text
    content: dieny tsy mbola mihamaizina ny masoandro sy ny fahazavana
  - type: text
    content: ary ny volana sy ny kintana,
  - type: text
    content: ary tsy mbola mitambatra indray ny rahona rehefa avy nilatsaka ny ranonorana;
  '3':
  - type: text
    content: fa amin’izay dia hangovitra ny mpiandry trano
  - type: text
    content: ary hanjoko ny lehilahy matanjaka,
  - type: text
    content: hitsahatra ny mpanompovavy mikoso-bary, satria efa vitsy ireo
  - type: text
    content: ary ho maizina ny vehivavy mitsirika eny am-baravarankely;
  '4':
  - type: text
    content: hirindrina ny varavarana kopa-droa mankeny an-dalambe
  - type: text
    content: rehefa mihamalemy ny feon’ny fikosoham-bary;
  - type: text
    content: ho taitra ny olona raha vao maneno ny voronkely
  - type: text
    content: ary tsy hahaloa-peo ny zazavavy mpihira rehetra;
  '5':
  - type: text
    content: hatahorana ny toerana avo,
  - type: text
    content: fa toa misy zava-mahatahotra eny an-dalana; hamony ny hazo amanda,
  - type: text
    content: ny valala dia ho tonga mavesatra, ny voan-tsimperifery tsy hanan-kery intsony
  - type: text
    content: fa mandroso ho any amin’ny tranony mandrakizay ny olona
  - type: text
    content: ary ireo mpitomany dia mandehandeha eny an-dalambe;
  '6':
  - type: text
    content: dieny tsy mbola mivaha ny kofehy volafotsy,
  - type: text
    content: tsy mbola vaky ny vilia volamena fitoeran-diloilo,
  - type: text
    content: tsy mbola potika ny siny eo an-doharano,
  - type: text
    content: ary tsy mbola tapaka ny kodia eo an-davaka fantsakana.
  '7':
  - type: text
    content: Fa amin’izany ny vovoka dia hiverina amin’ny tany ho toy ny teo aloha
  - type: text
    content: fa ny fanahy kosa dia hiverina amin’Andriamanitra izay nanome izany.
  '8':
  - type: text
    content: Tena zava-poana, hoy i Mpitoriteny, eny, zava-poana ny zavatra rehetra!
  - type: heading
    content: Teny farany
  '9':
  - type: text
    content: Ary izao koa, satria hendry i Mpitoriteny
  - type: text
    content: dia nampianatra ny olona fahalalana izy;
  - type: text
    content: eny, nandinika sy nieritreritra ary nandahatra tenim-pahendrena maro izy.
