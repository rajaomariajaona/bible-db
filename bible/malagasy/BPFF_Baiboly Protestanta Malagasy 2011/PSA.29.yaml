document_id: PSA.29,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny feon’NY TOMPO
  - type: text
    content: Nataon’i Davida.
  - type: text
    content: Omeo NY TOMPO, ry zanak’Andriamanitra;
  - type: text
    content: eny, omeo voninahitra sy hery NY TOMPO!
  '10':
  - type: text
    content: NY TOMPO nipetraka teo ambonin’ny safodrano;
  - type: text
    content: eny, NY TOMPO mipetraka ho Mpanjaka mandrakizay.
  '11':
  - type: text
    content: NY TOMPO hanome hery ny olony;
  - type: text
    content: NY TOMPO hitahy ny olony amin’ny fiadanana.
  '2':
  - type: text
    content: Omeo NY TOMPO ny voninahitry ny anarany!
  - type: text
    content: Miankohofa eo anatrehan’NY TOMPO amin’ny fihaingoana masina!
  '3':
  - type: text
    content: Ny feon’NY TOMPO no eny ambonin’ny rano;
  - type: text
    content: Andriamanitry ny voninahitra no mampirefotra ny kotroka;
  - type: text
    content: NY TOMPO no eny ambonin’ny ranobe.
  '4':
  - type: text
    content: Ny feon’NY TOMPO dia be hery;
  - type: text
    content: ny feon’NY TOMPO dia be voninahitra;
  '5':
  - type: text
    content: ny feon’NY TOMPO dia manorotoro ny hazo sedera;
  - type: text
    content: eny, NY TOMPO manorotoro ny hazo sedera any Libanona;
  '6':
  - type: text
    content: mampitsambikina an’i Libanona tahaka ny zanak’omby Izy
  - type: text
    content: ary i Siriona tahaka ny zanaky ny ombimanga.
  '7':
  - type: text
    content: Ny feon’NY TOMPO dia mampisaraka ny lelafo;
  '8':
  - type: text
    content: ny feon’NY TOMPO dia mampihorohoro ny tany efitra;
  - type: text
    content: NY TOMPO mampihorohoro ny tany efitr’i Kadesy.
  '9':
  - type: text
    content: Ny feon’NY TOMPO dia mampiteraka ny dieravavy
  - type: text
    content: ary mivaofy ny ala be.
  - type: text
    content: Ary ny ao an-tempoliny
  - type: text
    content: 'dia samy miteny hoe: Voninahitra e!'
