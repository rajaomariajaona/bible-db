document_id: PSA.29,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny feon’NY TOMPO
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: Nataon’i Davida.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Omeo NY TOMPO, ry zanak’Andriamanitra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, omeo voninahitra sy hery NY TOMPO!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: NY TOMPO nipetraka teo ambonin’ny safodrano;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, NY TOMPO mipetraka ho Mpanjaka mandrakizay.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: NY TOMPO hanome hery ny olony;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: NY TOMPO hitahy ny olony amin’ny fiadanana.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Omeo NY TOMPO ny voninahitry ny anarany!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miankohofa eo anatrehan’NY TOMPO amin’ny fihaingoana masina!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny feon’NY TOMPO no eny ambonin’ny rano;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Andriamanitry ny voninahitra no mampirefotra ny kotroka;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: NY TOMPO no eny ambonin’ny ranobe.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny feon’NY TOMPO dia be hery;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny feon’NY TOMPO dia be voninahitra;
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny feon’NY TOMPO dia manorotoro ny hazo sedera;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, NY TOMPO manorotoro ny hazo sedera any Libanona;
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mampitsambikina an’i Libanona tahaka ny zanak’omby Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary i Siriona tahaka ny zanaky ny ombimanga.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny feon’NY TOMPO dia mampisaraka ny lelafo;
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny feon’NY TOMPO dia mampihorohoro ny tany efitra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: NY TOMPO mampihorohoro ny tany efitr’i Kadesy.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny feon’NY TOMPO dia mampiteraka ny dieravavy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mivaofy ny ala be.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny ao an-tempoliny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'dia samy miteny hoe: Voninahitra e!'
