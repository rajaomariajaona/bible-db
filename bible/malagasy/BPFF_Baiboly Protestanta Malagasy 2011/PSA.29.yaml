      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Omeo NY TOMPO, ry zanak’Andriamanitra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, omeo voninahitra sy hery NY TOMPO!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Omeo NY TOMPO ny voninahitry ny anarany!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Miankohofa eo anatrehan’NY TOMPO amin’ny fihaingoana masina!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ny feon’NY TOMPO no eny ambonin’ny rano;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Andriamanitry ny voninahitra no mampirefotra ny kotroka;
- type: usfm
  marker: q1
  children:
  - type: text
    text: NY TOMPO no eny ambonin’ny ranobe.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ny feon’NY TOMPO dia be hery;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny feon’NY TOMPO dia be voninahitra;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ny feon’NY TOMPO dia manorotoro ny hazo sedera;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, NY TOMPO manorotoro ny hazo sedera any Libanona;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: mampitsambikina an’i Libanona tahaka ny zanak’omby Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary i Siriona tahaka ny zanaky ny ombimanga.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ny feon’NY TOMPO dia mampisaraka ny lelafo;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ny feon’NY TOMPO dia mampihorohoro ny tany efitra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: NY TOMPO mampihorohoro ny tany efitr’i Kadesy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ny feon’NY TOMPO dia mampiteraka ny dieravavy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mivaofy ny ala be.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny ao an-tempoliny
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'dia samy miteny hoe: Voninahitra e!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: NY TOMPO nipetraka teo ambonin’ny safodrano;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, NY TOMPO mipetraka ho Mpanjaka mandrakizay.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: NY TOMPO hanome hery ny olony;
- type: usfm
  marker: q1
  children:
  - type: text
    text: NY TOMPO hitahy ny olony amin’ny fiadanana.
