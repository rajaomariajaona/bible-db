document_id: DEU.4
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fanatanterahana ny didin’Andriamanitra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary ankehitriny, ry Israely, mihainoa ny didy sy ny fitsipika izay ampianariko anareo harahinareo, mba ho velona ianareo ka hiditra sy handova ny tany izay omen’NY TOMPO, Andriamanitry ny razanareo anareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Aza ampianareo ny teny izay andidiako anareo ary aza anesoranareo, fa tandremo ny didin’NY TOMPO Andriamanitrareo izay andidiako anareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Efa nahita izay nataon’NY TOMPO noho ny tamin’i Baala-Peora ny masonareo; fa ny olona rehetra izay nanaraka an’i Baala-Peora dia naringan’NY TOMPO Andriamanitrao tsy ho eo aminao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Fa ianareo izay nifikitra tamin’NY TOMPO Andriamanitrareo kosa dia samy velona avokoa amin’izao anio izao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Indro, efa nampianariko didy sy fitsipika ianareo, araka izay nandidian’NY TOMPO Andriamanitro ahy, mba harahinareo any amin’ny tany izay hidiranareo holovana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Koa tandremo sy tanteraho izany fa izany no ho fahendrenareo sy ho fanananareo saina eny imason’ny firenen-tsamihafa; fa handre izany lalàna rehetra izany izy ireny ka hiteny hoe: Olona hendry sy mahira-tsaina tokoa io firenena lehibe io. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Fa iza no firenena, na dia lehibe aza, no mba manana andriamanitra akaiky azy tahaka NY TOMPO Andriamanitra amin’izay rehetra iantsoantsika Azy? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ary iza no firenena, na dia lehibe aza, no mba manana didy sy fitsipika marina tahaka izao lalàna rehetra ataoko eo anatrehanareo anio izao?
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fanambarana tao Horeba
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Kanefa kosa mitandrema ianao, tandremo tsara ny tenanao, fandrao hohadinoinao ny zavatra izay efa hitan’ny masonao, na andrao miala amin’ny fonao izany, amin’ny andro rehetra iainanao. Ampahafantaro ny zanakao sy ny zafinao izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Tsarovy izay hitanao tamin’ny andro nitsangananao teo anatrehan’NY TOMPO Andriamanitrao tany Horeba, fony NY TOMPO nilaza tamiko hoe: Angony etỳ Amiko ny olona dia hampandrenesiko azy ny teniko, izay hianarany mba hatahorany Ahy amin’ny andro rehetra hiainany ambonin’ny tany sady hampianariny ny zanany koa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Dia nanakaiky ianareo ka nitsangana teo am-pototry ny tendrombohitra; ary nirehitra afo nanakatra ny lanitra ny tendrombohitra, no sady nisy haizina sy rahona ary haizim-pito teo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Dia niteny taminareo avy teo afovoan’ny afo NY TOMPO; feon’ny teny ihany no renareo fa tsy nahita endrika akory ianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Nambarany taminareo ny fanekeny, izay nataony didy mba harahinareo, dia ny Teny Folo na ny Didy Folo izany; ary nosoratany teo amin’ny vato fisaka roa ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ary nomen’NY TOMPO didy aho tamin’izany andro izany mba hampianatra anareo didy sy fitsipika izay harahinareo any amin’ny tany izay hidiranareo holovana.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fampitandremana ny amin’ny sampy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Tandremo tsara ny tenanareo; fa tsy nahita endrika akory ianareo tamin’ny andro izay nitenenan’NY TOMPO taminareo avy tao afovoan’ny afo tany Horeba; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'tandremo manao ratsy ianareo ka manao sarin-javatra voasokitra ho anareo, araka izay endri-javatra na inona na inona, na sarin-dehilahy, na sarim-behivavy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'na sarim-biby izay etỳ ambonin’ny tany, na sarim-borona manana elatra izay manidina eny amin’ny habakabaka, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'na sarim-biby mandady na mikisaka amin’ny tany, na sarin’ny hazandrano any anaty rano ambanin’ny tany; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'ary tandremo sao miandrandra ny lanitra ianao ka mahita ny masoandro sy ny volana ary ny kintana, dia izay rehetra eny amin’ny lanitra, ka ho voataona hiankohoka eo anatrehany sy hanompo azy, kanefa nataon’NY TOMPO Andriamanitrao ho anjaran’ny firenena rehetra ambanin’ny lanitra ireny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Fa ianareo no nalain’NY TOMPO ka noentiny niala avy tao amin’ny memy fandrendreham-by, avy tany Ejipta, mba ho firenena ho Azy tahaka ny amin’izao anio izao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Dia tezitra tamiko NY TOMPO noho ny aminareo ka nianiana fa tsy hita an’i Jordana aho, na hiditra any amin’ny tany soa izay omen’NY TOMPO Andriamanitrao ho lovanao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Izaho dia ho faty eto amin’ity tany ity fa tsy hita an’i Jordana; fa ianareo kosa no hita ka handova izany tany soa izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Mitandrema ianareo, fandrao manadino ny faneken’NY TOMPO Andriamanitrareo izay nataony taminareo ka manao sarin-javatra voasokitra ho anareo, araka ny endriky ny zavatra rehetra izay nandraran’NY TOMPO Andriamanitrao anao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Fa NY TOMPO Andriamanitrao dia afo mandevona; eny, Andriamanitra saro-piaro Izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Raha hiteraka sy ho loa-jafy koa ianao ka nitoetra ela teo amin’ny tany ianareo ary manao ratsy sy manao sarin-javatra voasokitra, araka izay endriky ny zavatra rehetra na inona na inona izany sady manao ratsy eo imason’NY TOMPO Andriamanitrao ka mampahatezitra Azy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'dia miantso ny lanitra sy ny tany aho anio ho vavolombelona fa vetivety foana dia ho fongotra tsy ho ao amin’ny tany izay alehanareo hita an’i Jordana holovana tokoa ianareo; tsy ho maro andro eo ianareo fa haringana tokoa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ary hampiely anareo any amin’ny firenen-tsamihafa NY TOMPO ka ho tonga olom-bitsy izay sisa aminareo any amin’ny firenen-tsamihafa izay hitondran’NY TOMPO anareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Any no hanompoanareo andriamanitra izay asan-tanan’olona, dia vato aman-kazo tsy mahita, na mandre, na mihinana, na manimbolo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Any ianao no hitady NY TOMPO Andriamanitrao ka hahita Azy raha mitady Azy amin’ny fonao manontolo sy ny fanahinao manontolo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Raha azom-pahoriana ianao, fa manjo anao ireo zavatra rehetra ireo, dia hiverina amin’NY TOMPO Andriamanitrao ianao any am-parany ka hihaino ny feony; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: fa Andriamanitra mamindra fo NY TOMPO Andriamanitrao ka tsy hahafoy anao na handringana anao na hanadino ny fanekena tamin’ny razanao, izay efa nianianany taminy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny tombontsoan’ny Israely
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Fa anontanio anie ny andro lasa teo alohanao hatramin’ny andro namoronan’Andriamanitra ny olombelona tetỳ ambonin’ny tany ary hatramin’ny faravodilanitra manodidina, raha mba nisy zavatra lehibe tahaka izany, na mba efa nisy re tahaka izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Moa efa nisy firenena nandre ny feon’Andriamanitra niteny avy tao amin’ny afo, tahaka izay renao va, nefa velona ihany? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Moa va efa nisy andriamanitra izay nanandrana handeha haka firenena ho an’ny tenany, avy amin’ny firenena hafa, tamin’ny alalan’ny fizahan-toetra, ny famantarana, ny fahagagana, ny ady, ny tanana mahery, ny sandry natsotra ary ny asa lehibe sady mahatahotra, araka izay rehetra nataon’NY TOMPO Andriamanitrareo ho anareo teo imasonao tany Ejipta? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Ianao no nampahitany izany, mba hahafantaranao fa NY TOMPO no Andriamanitra ary tsy misy afa-tsy Izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Avy tany an-danitra no nampandrenesany anao ny feony hananarany anao ary tetỳ ambonin’ny tany no nanehoany anao ny afony lehibe; ary ny teniny dia efa renao avy tao afovoan’ny afo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Satria tia ny razanao Izy ka nifidy ny taranany mandimby azy, dia Izy tenany no nitondra anao nivoaka avy tany Ejipta tamin’ny heriny lehibe, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'handroahany eo anoloanao firenena maro izay lehibe sy mahery noho ianao, mba hampidirany anao sy hanomezany anao ny taniny ho lova, tahaka ny amin’izao anio izao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Koa aoka ho fantatrao anio, ary tsarovy ao am-ponao, fa NY TOMPO no Andriamanitra any amin’ny lanitra ambony sy etỳ amin’ny tany ambany, ary tsy misy afa-tsy Izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Dia tandremo ny lalànany sy ny didiny izay andidiako anao anio, mba hahita soa ianao sy ny taranakao mandimby anao, ary mba ho maro andro ianao any amin’ny tany izay omen’NY TOMPO Andriamanitrao ho anao mandrakizay.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Tanàna telo fialofana any andafy atsinanan’i Jordana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Tamin’izany dia nanokana tanàna telo tany andafy atsinanan’i Jordana i Mosesy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'mba handosiran’izay nahafaty tsy nahy ny namany sady tsy nankahala azy talohan’io. Ho velona io mpamono tsy nahy io raha mandositra any amin’iray amin’ireo tanàna ireo, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: dia i Bazera any an-tany efitra, amin’ny tany lemaka, ho an’ny Robenita; i Ramota-Gileada, ho an’ny Gadita; ary i Golana any Basana, ho an’ny Manasita.
- type: usfm
  marker: ms1
  children:
  - type: text
    text: LAHATENY FAHAROA NATAON’I MOSESY
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Toy izao ny lalàna izay nalahatr’i Mosesy teo anatrehan’ny Zanak’Israely. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Toy izao ny teny vavolombelona sy didy ary fitsipika izay nambaran’i Mosesy tamin’ny Zanak’Israely, rehefa niala avy tany Ejipta izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Tany andafin’i Jordana izany, tao an-dohasaha tandrifin’i Bety-Peora, tao amin’ny tanin’i Sihona, ilay mpanjakan’ny Amorita nonina tao Hesbona, dia ilay noresen’i Mosesy sy ny Zanak’Israely, rehefa niala avy tany Ejipta izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Nahazo ny tanin’i Sihona sy ny tanin’i Oga, mpanjakan’i Basana, dia ny mpanjaka roa tamin’ny Amorita, izay tany andafy atsinanan’i Jordana, izy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'hatrany Aroera, izay ao amoron’ny lohasahan-driaka Arnona ka hatrany amin’ny tendrombohitra Siona na Hermona, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: dia ny tany ngazana manontolo any andafy atsinanan’i Jordana ka hatrany amin’ny ranomasin’ny tany ngazana eo an-tsisin’i Pisga.
