document_id: ISA.46,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Entina ireo andriamanitra, fa mitondra kosa Ilay tena Andriamanitra
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mangozohozo i Bela,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: miraika i Nebo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '46.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Nebo: anaran’ny andriamanitra babiloniana iray izay zanak’i Bela hono.'
      marker-yv: yv-n
    - type: text
      text: ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny sampiny dia nampitondraina ny biby folahina sy ny biby fiompy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ianareo no tokony hitondra izany nefa novesaranareo azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tonga enta-mavesatra entin’ny biby reraka!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay manambara hatramin’ny voalohany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny zavatra ho avy any aoriana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary nanambara hatramin’ny ela
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay tsy mbola natao akory.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ilay miteny hoe: Ho to ny fikasako,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hefaiko ny sitrapoko rehetra.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miantso vorona mpihaza avy any atsinanana Aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia lehilahy avy any an-tany lavitra hahefa ny fikasako.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady niteny izany Aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no mahatanteraka azy koa,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady nikasa Aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no mahefa azy.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mihainoa Ahy, ianareo tsy laitra anarina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay lavitra ny fahamarinana!
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hampanatoniko ny fahamarinako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy ho lavitra intsony;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy hitaredretra ny famonjeko.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Fa hametraka famonjena ao '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Ziona
    - type: text
      text: ' Aho'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny voninahitro ho an’ny Israely.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miraika sy mangozohozo avokoa izy ireo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy mahavonjy ny entana akory;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa na dia ny tenany aza dia lasan-ko babo koa.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mihainoa Ahy, ry taranak’i Jakoba
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy izay sisa rehetra amin’ny taranak’Israely,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ianareo izay noentina hatrany an-kibo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'sy notrotroina hatramin’ny vao teraka:'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na dia mandra-pahantitrareo aza dia tsy miova Aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mandra-pahafotsy volo anareo dia Izaho ihany no hisahirana hitondra anareo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izaho no nanao ka Izaho ihany no hitrotro;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, Izaho no hitondra sy hanafaka.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hampitovianareo amin’iza moa Aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary amin’iza no hanoharanareo Ahy?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Iza no hataonareo ho tahaka Ahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hitahany Amiko?
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mandraraka volamena avy ao an-kitapo izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady mandanja volafotsy amin’ny mizana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia manakarama mpanefy volamena
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hanao izany ho andriamanitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hiankohofany sy hivavahany.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia batainy iny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka entiny eny an-tsorony
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary apetrany eo amin’ny fitoerany.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy mahay miala eo amin’ny fitoerany iny!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na dia misy mitaraina aminy aza
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia tsy mahay mamaly izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na mahavonjy azy amin’ny fahoriany.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsarovy izany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka misehoa ho lehilahy ianareo!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eritrereto tsara izany, ry mpikomy!
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsarovy ny zavatra taloha izay efa lasa ela;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa Izaho no Andriamanitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy misy hafa;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izaho no Andriamanitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy misy tahaka Ahy,
