document_id: ISA.46,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Entina ireo andriamanitra, fa mitondra kosa Ilay tena Andriamanitra
  - type: text
    content: Mangozohozo i Bela,
  - type: text
    content: miraika i Nebo
  - type: note
    content: 'Nebo: anaran’ny andriamanitra babiloniana iray izay zanak’i Bela hono.'
  - type: text
    content: ;
  - type: text
    content: ny sampiny dia nampitondraina ny biby folahina sy ny biby fiompy;
  - type: text
    content: ianareo no tokony hitondra izany nefa novesaranareo azy
  - type: text
    content: ka tonga enta-mavesatra entin’ny biby reraka!
  '10':
  - type: text
    content: izay manambara hatramin’ny voalohany
  - type: text
    content: ny zavatra ho avy any aoriana,
  - type: text
    content: ary nanambara hatramin’ny ela
  - type: text
    content: izay tsy mbola natao akory.
  - type: text
    content: 'Ilay miteny hoe: Ho to ny fikasako,'
  - type: text
    content: ary hefaiko ny sitrapoko rehetra.
  '11':
  - type: text
    content: Miantso vorona mpihaza avy any atsinanana Aho,
  - type: text
    content: dia lehilahy avy any an-tany lavitra hahefa ny fikasako.
  - type: text
    content: Sady niteny izany Aho
  - type: text
    content: no mahatanteraka azy koa,
  - type: text
    content: sady nikasa Aho
  - type: text
    content: no mahefa azy.
  '12':
  - type: text
    content: Mihainoa Ahy, ianareo tsy laitra anarina,
  - type: text
    content: izay lavitra ny fahamarinana!
  '13':
  - type: text
    content: Hampanatoniko ny fahamarinako
  - type: text
    content: ka tsy ho lavitra intsony;
  - type: text
    content: ary tsy hitaredretra ny famonjeko.
  - type: text
    content: 'Fa hametraka famonjena ao '
  - type: text
    content: Ziona
  - type: text
    content: ' Aho'
  - type: text
    content: ary ny voninahitro ho an’ny Israely.
  '2':
  - type: text
    content: Miraika sy mangozohozo avokoa izy ireo
  - type: text
    content: ka tsy mahavonjy ny entana akory;
  - type: text
    content: fa na dia ny tenany aza dia lasan-ko babo koa.
  '3':
  - type: text
    content: Mihainoa Ahy, ry taranak’i Jakoba
  - type: text
    content: sy izay sisa rehetra amin’ny taranak’Israely,
  - type: text
    content: ianareo izay noentina hatrany an-kibo
  - type: text
    content: 'sy notrotroina hatramin’ny vao teraka:'
  '4':
  - type: text
    content: Na dia mandra-pahantitrareo aza dia tsy miova Aho,
  - type: text
    content: ary mandra-pahafotsy volo anareo dia Izaho ihany no hisahirana hitondra anareo;
  - type: text
    content: Izaho no nanao ka Izaho ihany no hitrotro;
  - type: text
    content: eny, Izaho no hitondra sy hanafaka.
  '5':
  - type: text
    content: Hampitovianareo amin’iza moa Aho,
  - type: text
    content: ary amin’iza no hanoharanareo Ahy?
  - type: text
    content: Iza no hataonareo ho tahaka Ahy
  - type: text
    content: mba hitahany Amiko?
  '6':
  - type: text
    content: Mandraraka volamena avy ao an-kitapo izy
  - type: text
    content: sady mandanja volafotsy amin’ny mizana
  - type: text
    content: dia manakarama mpanefy volamena
  - type: text
    content: mba hanao izany ho andriamanitra
  - type: text
    content: hiankohofany sy hivavahany.
  '7':
  - type: text
    content: Dia batainy iny
  - type: text
    content: ka entiny eny an-tsorony
  - type: text
    content: ary apetrany eo amin’ny fitoerany.
  - type: text
    content: Tsy mahay miala eo amin’ny fitoerany iny!
  - type: text
    content: Na dia misy mitaraina aminy aza
  - type: text
    content: dia tsy mahay mamaly izy
  - type: text
    content: na mahavonjy azy amin’ny fahoriany.
  '8':
  - type: text
    content: Tsarovy izany
  - type: text
    content: ka misehoa ho lehilahy ianareo!
  - type: text
    content: Eritrereto tsara izany, ry mpikomy!
  '9':
  - type: text
    content: Tsarovy ny zavatra taloha izay efa lasa ela;
  - type: text
    content: fa Izaho no Andriamanitra
  - type: text
    content: ka tsy misy hafa;
  - type: text
    content: Izaho no Andriamanitra
  - type: text
    content: ka tsy misy tahaka Ahy,
