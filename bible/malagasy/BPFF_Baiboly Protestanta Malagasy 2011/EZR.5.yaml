document_id: EZR.5,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fanohizana ny asa fanarenana ny tempoly
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ny mpaminany Hagay sy ny mpaminany Zakaria, zanak’Ido, dia naminany tamin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jiosy
    - type: text
      text: ' tany Joda sy Jerosalema tamin’ny anaran’Andriamanitry ny Israely izay tao aminy. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Nanontany ny anaran’izy ireo avy koa izahay mba hampahafantarinay anao ary hosoratanay ny anaran’ny olona izay mitarika azy. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Koa izao no teny navaliny anay: Izahay dia mpanompon’Andriamanitry ny lanitra sy ny tany ka manamboatra ny trano izay efa vita ela, fa ny mpanjaka lehibe iray tamin’ny Israely no nanangana sy nahavita azy. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Noho ny razanay nanao izay nahatezitra an’Andriamanitry ny lanitra anefa dia natolony ho eo an-tanan’i Nebokadnezara kaldeana, mpanjakan’i Babilona, izy ireo; izy no nandrava io trano io ka nitondra ny olona ho babo tany Babilona. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Nefa tamin’ny taona voalohany nanjakan’i Kirosy mpanjakan’i Babilona kosa dia namoaka didy i Kirosy mpanjaka mba hananganana indray io tranon’Andriamanitra io. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Ary ny fanaka volamena sy volafotsy momba ny tranon’Andriamanitra izay efa nalain’i Nebokadnezara tao amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: tempoly
    - type: text
      text: ' tany Jerosalema ka noentiny ho any amin’ny tempoly any Babilona dia nalain’i Kirosy mpanjaka tao amin’ny tempolin’i Babilona ka natolotra tamin’ny olona iray antsoina hoe Sesbazara, izay efa notendreny ho governora; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'ary hoy izy taminy: Raiso ireo fanaka ireo ka andeha apetraho ao amin’ny tempoly izay any Jerosalema; ary aoka hatsangana eo amin’ilay efa niorenany ihany ny tranon’Andriamanitra. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Dia avy i Sesbazara ka nametraka ny fanorenan’ny tranon’Andriamanitra any Jerosalema; ary hatramin’izay andro izay ka mandraka ankehitriny dia efa natsangana ihany izy saingy tsy mbola vita. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Koa raha sitraky ny mpanjaka, aoka hojerena ny trano fitahirizan-drakitry ny mpanjaka, izay any Babilona, na misy didy nataon’i Kirosy mpanjaka hanaovana io tranon’Andriamanitra any Jerosalema io na tsia; ary aoka hambarany aminay izay sitrapon’ny mpanjaka ny amin’izany zavatra izany.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Dia nitsangana i Zerobabela zanak’i Sealtiela sy i Josoa zanak’i Jozadaka ka nanomboka nanao ny tranon’Andriamanitra any Jerosalema indray; ary ireo mpaminanin’Andriamanitra ireo dia teo aminy ka nanampy azy. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Tamin’izany andro izany koa dia nankany amin’izy ireo i Tatenay governoran’ny etỳ andafin’ny ony Eofrata sy i Setara-Bozenay mbamin’ny namany; koa izao no nolazainy taminy: Iza no nandidy anareo hanao io trano io sy hamita io manda io? '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Izao koa no nolazainay taminy: Iza avy no anaran’ireo lehilahy manao io trano io? '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Nefa nitsinjo ny loholon’ny Joda ny mason’Andriamaniny ka tsy nisy nahasakana azy ireo mandra-pahatongan’ny teny ho any amin’i Dariosy sy ny nahazoany ny valiny tamin’izany raharaha izany.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Notorìna tamin’i Dariosy mpanjaka ny Jiosy
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ny dikan’ny taratasy izay nampitondrain’i Tatenay governoran’ny etỳ andafin’ny ony Eofrata sy i Setara-Bozenay ary ny Afarsekita namany izay etỳ andafin’ny ony Eofrata, ho any amin’i Dariosy mpanjaka. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Nampitondrainy ho any aminy ny taratasy izay nisy teny toy izao: Ho an’i Dariosy mpanjaka anie ny fiadanana be! '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Aoka ho fantatry ny mpanjaka fa nankany amin’ny tany Joda, any amin’ny tranon’Andriamanitra lehibe izahay; trano izay atao amin’ny vato vaventy sady misy hazo alatsaka amin’ny rindrin-trano, ary mandroso tsara izany asa izany sady ambinina eo an-tanany. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Dia nanontany ireo loholona ireo izahay hoe: Iza no nandidy anareo hanao io trano io sy hanangana io manda io? '
