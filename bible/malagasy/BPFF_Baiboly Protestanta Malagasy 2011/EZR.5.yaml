document_id: EZR.5,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Fanohizana ny asa fanarenana ny tempoly
  - type: text
    content: 'Ny mpaminany Hagay sy ny mpaminany Zakaria, zanak’Ido, dia naminany tamin’ny '
  - type: text
    content: Jiosy
  - type: text
    content: ' tany Joda sy Jerosalema tamin’ny anaran’Andriamanitry ny Israely izay tao aminy. '
  '10':
  - type: text
    content: 'Nanontany ny anaran’izy ireo avy koa izahay mba hampahafantarinay anao ary hosoratanay ny anaran’ny olona izay mitarika azy. '
  '11':
  - type: text
    content: 'Koa izao no teny navaliny anay: Izahay dia mpanompon’Andriamanitry ny lanitra sy ny tany ka manamboatra ny trano izay efa vita ela, fa ny mpanjaka lehibe iray tamin’ny Israely no nanangana sy nahavita azy. '
  '12':
  - type: text
    content: 'Noho ny razanay nanao izay nahatezitra an’Andriamanitry ny lanitra anefa dia natolony ho eo an-tanan’i Nebokadnezara kaldeana, mpanjakan’i Babilona, izy ireo; izy no nandrava io trano io ka nitondra ny olona ho babo tany Babilona. '
  '13':
  - type: text
    content: 'Nefa tamin’ny taona voalohany nanjakan’i Kirosy mpanjakan’i Babilona kosa dia namoaka didy i Kirosy mpanjaka mba hananganana indray io tranon’Andriamanitra io. '
  '14':
  - type: text
    content: 'Ary ny fanaka volamena sy volafotsy momba ny tranon’Andriamanitra izay efa nalain’i Nebokadnezara tao amin’ny '
  - type: text
    content: tempoly
  - type: text
    content: ' tany Jerosalema ka noentiny ho any amin’ny tempoly any Babilona dia nalain’i Kirosy mpanjaka tao amin’ny tempolin’i Babilona ka natolotra tamin’ny olona iray antsoina hoe Sesbazara, izay efa notendreny ho governora; '
  '15':
  - type: text
    content: 'ary hoy izy taminy: Raiso ireo fanaka ireo ka andeha apetraho ao amin’ny tempoly izay any Jerosalema; ary aoka hatsangana eo amin’ilay efa niorenany ihany ny tranon’Andriamanitra. '
  '16':
  - type: text
    content: 'Dia avy i Sesbazara ka nametraka ny fanorenan’ny tranon’Andriamanitra any Jerosalema; ary hatramin’izay andro izay ka mandraka ankehitriny dia efa natsangana ihany izy saingy tsy mbola vita. '
  '17':
  - type: text
    content: Koa raha sitraky ny mpanjaka, aoka hojerena ny trano fitahirizan-drakitry ny mpanjaka, izay any Babilona, na misy didy nataon’i Kirosy mpanjaka hanaovana io tranon’Andriamanitra any Jerosalema io na tsia; ary aoka hambarany aminay izay sitrapon’ny mpanjaka ny amin’izany zavatra izany.
  '2':
  - type: text
    content: 'Dia nitsangana i Zerobabela zanak’i Sealtiela sy i Josoa zanak’i Jozadaka ka nanomboka nanao ny tranon’Andriamanitra any Jerosalema indray; ary ireo mpaminanin’Andriamanitra ireo dia teo aminy ka nanampy azy. '
  '3':
  - type: text
    content: 'Tamin’izany andro izany koa dia nankany amin’izy ireo i Tatenay governoran’ny etỳ andafin’ny ony Eofrata sy i Setara-Bozenay mbamin’ny namany; koa izao no nolazainy taminy: Iza no nandidy anareo hanao io trano io sy hamita io manda io? '
  '4':
  - type: text
    content: 'Izao koa no nolazainay taminy: Iza avy no anaran’ireo lehilahy manao io trano io? '
  '5':
  - type: text
    content: Nefa nitsinjo ny loholon’ny Joda ny mason’Andriamaniny ka tsy nisy nahasakana azy ireo mandra-pahatongan’ny teny ho any amin’i Dariosy sy ny nahazoany ny valiny tamin’izany raharaha izany.
  - type: heading
    content: Notorìna tamin’i Dariosy mpanjaka ny Jiosy
  '6':
  - type: text
    content: 'Ny dikan’ny taratasy izay nampitondrain’i Tatenay governoran’ny etỳ andafin’ny ony Eofrata sy i Setara-Bozenay ary ny Afarsekita namany izay etỳ andafin’ny ony Eofrata, ho any amin’i Dariosy mpanjaka. '
  '7':
  - type: text
    content: 'Nampitondrainy ho any aminy ny taratasy izay nisy teny toy izao: Ho an’i Dariosy mpanjaka anie ny fiadanana be! '
  '8':
  - type: text
    content: 'Aoka ho fantatry ny mpanjaka fa nankany amin’ny tany Joda, any amin’ny tranon’Andriamanitra lehibe izahay; trano izay atao amin’ny vato vaventy sady misy hazo alatsaka amin’ny rindrin-trano, ary mandroso tsara izany asa izany sady ambinina eo an-tanany. '
  '9':
  - type: text
    content: 'Dia nanontany ireo loholona ireo izahay hoe: Iza no nandidy anareo hanao io trano io sy hanangana io manda io? '
