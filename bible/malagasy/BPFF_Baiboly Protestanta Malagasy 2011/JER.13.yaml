document_id: JER.13,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: I Jeremia sy ilay fehikibo lamba rongony
  - type: text
    content: 'Izao no nolazain’NY TOMPO tamiko: Andeha mividy fehikibo lamba rongony ho anao ka afehezo amin’ny kibonao fa aza alona ao anaty rano. '
  '10':
  - type: text
    content: 'Ity firenena ratsy ity izay tsy mety mihaino ny teniko, fa mandeha amin’ny ditran’ny fony ka manaraka andriamanitra hafa mba hotompoiny sy hiankohofany, dia ho tahaka ity fehikibo ity ka tsy azo atao na inona na inona intsony. '
  '11':
  - type: text
    content: Fa toy ny firaikitry ny fehikibo amin’ny andilan’ny olona no nampiraiketako ny taranak’Israely sy ny taranak’i Joda rehetra tamiko, hoy NY TOMPO, mba ho oloko, ho laza sy fiderana ary voninahitra ho Ahy ireny, kanjo tsy nety nihaino izy.
  - type: heading
    content: Ny divain’ny fahatezeran’Andriamanitra
  '12':
  - type: text
    content: 'Ary lazao aminy izao teny izao: Izao no lazain’NY TOMPO, Andriamanitry ny Israely: Ny tavoara rehetra dia hofenoina divay; ary raha miteny aminao izy hoe: Moa tsy efa fantatray ihany va fa hofenoina divay ny tavoara rehetra? '
  '13':
  - type: text
    content: 'Dia holazainao aminy hoe: Izao no lazain’NY TOMPO: Indro, hataoko leo ny mponina rehetra amin’ity tany ity, dia ny mpanjaka izay mipetraka amin’ny sezafiandrianan’i Davida, ny mpisorona sy ny mpaminany ary ny mponina rehetra any Jerosalema. '
  '14':
  - type: text
    content: Ary hampifamotehiko izy, dia ny ray mbamin’ny zanany, hoy NY TOMPO; tsy hiantra Aho, na hitsitsy, na hamindra fo tsy handringana azy.
  - type: heading
    content: Mihainoa dieny mbola tsy tratra aoriana
  '15':
  - type: text
    content: Mandrenesa ka mihainoa,
  - type: text
    content: aza miavonavona;
  - type: text
    content: fa NY TOMPO no miteny.
  '16':
  - type: text
    content: Manomeza voninahitra NY TOMPO Andriamanitrareo,
  - type: text
    content: dieny tsy mbola mahatonga ny haizina Izy,
  - type: text
    content: ary dieny tsy mbola tafintohina amin’ny tendrombohitra maizimaizina ny tongotrareo;
  - type: text
    content: fa amin’izany, raha miandry ny mazava ianareo
  - type: text
    content: dia hataony tonga aloky ny fahafatesana izany
  - type: text
    content: ka hampodiny ho haizim-pito.
  '17':
  - type: text
    content: Fa raha tsy hihaino izany ianareo
  - type: text
    content: dia hitomany any amin’ny mangingina aho
  - type: text
    content: satria misy fiavonavonana;
  - type: text
    content: eny, ny masoko dia hamarin-dranomaso hijononoka be
  - type: text
    content: satria voababo ny ondrin’NY TOMPO.
  - type: heading
    content: Vahoaka mpivadika afa-baraka sady miely patrana
  '18':
  - type: text
    content: 'Lazao amin’ny andriamanjaka sy ny reniny hoe:'
  - type: text
    content: Mitombena amin’ny tany
  - type: text
    content: fa ho afaka ny firavaka eo an-dohanareo,
  - type: text
    content: dia ny satroboninahitrareo tsara tarehy.
  '19':
  - type: text
    content: Voarindrina ny tanàna any Negeva
  - type: text
    content: ka tsy misy mamoha;
  - type: text
    content: lasan-ko babo i Joda manontolo,
  - type: text
    content: eny, lasan-ko babo avokoa izy rehetra.
  '2':
  - type: text
    content: Dia nividy fehikibo aho araka ny tenin’NY TOMPO ka namehezako ny kiboko.
  '20':
  - type: text
    content: Atopazy ny masonareo ka tazano
  - type: text
    content: izay avy any avaratra;
  - type: text
    content: aiza ny andian’ondry izay nomena anao,
  - type: text
    content: dia ny ondrinao tsara tarehy?
  '21':
  - type: text
    content: Ahoana re no holazainao raha tendreny hanapaka anao ireny sakaizanao ireny,
  - type: text
    content: nefa ianao izao ihany no nampianatra azy
  - type: text
    content: handrafy anao?
  - type: text
    content: Tsy hahazo anao va ny fanaintainana
  - type: text
    content: toy ny an’ny vehivavy miteraka?
  '22':
  - type: text
    content: 'Ary raha miteny anakampo ianao hoe:'
  - type: text
    content: Ahoana no nahatonga izao tamiko?
  - type: text
    content: Noho ny haben’ny helokao
  - type: text
    content: no nampiaingana ny morontongotr’akanjonao
  - type: text
    content: sy nandratrana ny voditongotrao.
  '23':
  - type: text
    content: Moa mahova ny hodiny va ny Kosita?
  - type: text
    content: Ary mahova ny sorany va ny leoparda?
  - type: text
    content: Toy izany koa, moa mahay manao ny tsara va ianareo izay efa zatra nanao izay ratsy?
  '24':
  - type: text
    content: Koa dia haeliko
  - type: text
    content: toy ny vodivary indaosin’ny rivotra avy any an-tany efitra izy.
  '25':
  - type: text
    content: Izany no anjara azonao tamin’ny antsapaka, dia anjara voarefy ho anao, avy Amiko
  - type: text
    content: hoy NY TOMPO,
  - type: text
    content: satria nanadino Ahy ianao
  - type: text
    content: ka nitoky tamin’ny lainga.
  '26':
  - type: text
    content: Ary Izaho kosa dia hampiainga ny morontongotr’akanjonao ho eny amin’ny tavanao
  - type: text
    content: mba hisehoan’ny henatrao.
  '27':
  - type: text
    content: Ny fijangajanganao sy ny fanenonao
  - type: note
    content: Zahao 5. 8.
  - type: text
    content: ','
  - type: text
    content: ny fahavetavetan’ny fijejojejoanao
  - type: text
    content: any amin’ny havoana any an-tsaha,
  - type: text
    content: eny, samy efa hitako avokoa ireo fahavetavetanao ireo.
  - type: text
    content: Lozanao, ry Jerosalema!
  - type: text
    content: Mandra-pahoviana ianao
  - type: text
    content: no mbola tsy hanadio ny tenanao?
  '3':
  - type: text
    content: 'Ary tonga tamiko fanindroany ny tenin’NY TOMPO hoe: '
  '4':
  - type: text
    content: 'Ento ny fehikibo izay novidinao, dia ilay amehezanao ny kibonao, ka mitsangàna, mankanesa any ony amin’ny Eofrata ary afeno ao an-tsefatsefaky ny harambato izany. '
  '5':
  - type: text
    content: 'Dia nandeha aho ary nafeniko tao amoron’ny ony Eofrata izany, araka ny nandidian’NY TOMPO ahy. '
  '6':
  - type: text
    content: 'Nony afaka andro maro dia hoy NY TOMPO tamiko: Mitsangàna ka mankanesa any amin’ny ony Eofrata ary alao any ny fehikibo, dia ilay nasaiko nafeninao tany. '
  '7':
  - type: text
    content: Dia nankany amin’ny ony Eofrata aho ka nikaroka sy naka ilay fehikibo tao amin’ny toerana nanafenako azy; kanjo indro, simba ilay fehikibo ka tsy misy ilàna azy intsony.
  '8':
  - type: text
    content: 'Dia tonga tamiko ny tenin’NY TOMPO hoe: '
  '9':
  - type: text
    content: 'Izao no lazain’NY TOMPO: Tahaka izany no hanimbako ny avonavon’ny Joda sy ny haben’ny avonavon’ny Jerosalema. '
