document_id: JER.13,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: I Jeremia sy ilay fehikibo lamba rongony
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao no nolazain’NY TOMPO tamiko: Andeha mividy fehikibo lamba rongony ho anao ka afehezo amin’ny kibonao fa aza alona ao anaty rano. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ity firenena ratsy ity izay tsy mety mihaino ny teniko, fa mandeha amin’ny ditran’ny fony ka manaraka andriamanitra hafa mba hotompoiny sy hiankohofany, dia ho tahaka ity fehikibo ity ka tsy azo atao na inona na inona intsony. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa toy ny firaikitry ny fehikibo amin’ny andilan’ny olona no nampiraiketako ny taranak’Israely sy ny taranak’i Joda rehetra tamiko, hoy NY TOMPO, mba ho oloko, ho laza sy fiderana ary voninahitra ho Ahy ireny, kanjo tsy nety nihaino izy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny divain’ny fahatezeran’Andriamanitra
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary lazao aminy izao teny izao: Izao no lazain’NY TOMPO, Andriamanitry ny Israely: Ny tavoara rehetra dia hofenoina divay; ary raha miteny aminao izy hoe: Moa tsy efa fantatray ihany va fa hofenoina divay ny tavoara rehetra? '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia holazainao aminy hoe: Izao no lazain’NY TOMPO: Indro, hataoko leo ny mponina rehetra amin’ity tany ity, dia ny mpanjaka izay mipetraka amin’ny sezafiandrianan’i Davida, ny mpisorona sy ny mpaminany ary ny mponina rehetra any Jerosalema. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary hampifamotehiko izy, dia ny ray mbamin’ny zanany, hoy NY TOMPO; tsy hiantra Aho, na hitsitsy, na hamindra fo tsy handringana azy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mihainoa dieny mbola tsy tratra aoriana
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mandrenesa ka mihainoa,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aza miavonavona;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa NY TOMPO no miteny.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manomeza voninahitra NY TOMPO Andriamanitrareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dieny tsy mbola mahatonga ny haizina Izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary dieny tsy mbola tafintohina amin’ny tendrombohitra maizimaizina ny tongotrareo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa amin’izany, raha miandry ny mazava ianareo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hataony tonga aloky ny fahafatesana izany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hampodiny ho haizim-pito.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa raha tsy hihaino izany ianareo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hitomany any amin’ny mangingina aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria misy fiavonavonana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, ny masoko dia hamarin-dranomaso hijononoka be
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria voababo ny ondrin’NY TOMPO.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Vahoaka mpivadika afa-baraka sady miely patrana
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Lazao amin’ny andriamanjaka sy ny reniny hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mitombena amin’ny tany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ho afaka ny firavaka eo an-dohanareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ny satroboninahitrareo tsara tarehy.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voarindrina ny tanàna any Negeva
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy misy mamoha;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: lasan-ko babo i Joda manontolo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, lasan-ko babo avokoa izy rehetra.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nividy fehikibo aho araka ny tenin’NY TOMPO ka namehezako ny kiboko.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Atopazy ny masonareo ka tazano
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay avy any avaratra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aiza ny andian’ondry izay nomena anao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ny ondrinao tsara tarehy?
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ahoana re no holazainao raha tendreny hanapaka anao ireny sakaizanao ireny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa ianao izao ihany no nampianatra azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: handrafy anao?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy hahazo anao va ny fanaintainana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toy ny an’ny vehivavy miteraka?
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ary raha miteny anakampo ianao hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ahoana no nahatonga izao tamiko?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Noho ny haben’ny helokao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no nampiaingana ny morontongotr’akanjonao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy nandratrana ny voditongotrao.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moa mahova ny hodiny va ny Kosita?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary mahova ny sorany va ny leoparda?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toy izany koa, moa mahay manao ny tsara va ianareo izay efa zatra nanao izay ratsy?
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa dia haeliko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toy ny vodivary indaosin’ny rivotra avy any an-tany efitra izy.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izany no anjara azonao tamin’ny antsapaka, dia anjara voarefy ho anao, avy Amiko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy NY TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria nanadino Ahy ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka nitoky tamin’ny lainga.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary Izaho kosa dia hampiainga ny morontongotr’akanjonao ho eny amin’ny tavanao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hisehoan’ny henatrao.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fijangajanganao sy ny fanenonao
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.27 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Zahao '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 5. 8.
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny fahavetavetan’ny fijejojejoanao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: any amin’ny havoana any an-tsaha,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, samy efa hitako avokoa ireo fahavetavetanao ireo.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lozanao, ry Jerosalema!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mandra-pahoviana ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no mbola tsy hanadio ny tenanao?
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary tonga tamiko fanindroany ny tenin’NY TOMPO hoe: '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ento ny fehikibo izay novidinao, dia ilay amehezanao ny kibonao, ka mitsangàna, mankanesa any ony amin’ny Eofrata ary afeno ao an-tsefatsefaky ny harambato izany. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nandeha aho ary nafeniko tao amoron’ny ony Eofrata izany, araka ny nandidian’NY TOMPO ahy. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nony afaka andro maro dia hoy NY TOMPO tamiko: Mitsangàna ka mankanesa any amin’ny ony Eofrata ary alao any ny fehikibo, dia ilay nasaiko nafeninao tany. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nankany amin’ny ony Eofrata aho ka nikaroka sy naka ilay fehikibo tao amin’ny toerana nanafenako azy; kanjo indro, simba ilay fehikibo ka tsy misy ilàna azy intsony.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia tonga tamiko ny tenin’NY TOMPO hoe: '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao no lazain’NY TOMPO: Tahaka izany no hanimbako ny avonavon’ny Joda sy ny haben’ny avonavon’ny Jerosalema. '
