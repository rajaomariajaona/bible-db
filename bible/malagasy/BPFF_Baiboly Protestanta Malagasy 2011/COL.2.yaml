document_id: COL.2,3103
type_code: plt
verses:
  '1':
  - type: text
    content: 'Fa tiako ho fantatrareo ny hamafin’ny fiezahako ho anareo sy izay any Laodikia mbamin’izay rehetra tsy mbola nahita ny tavako amin’ny nofo, '
  '10':
  - type: text
    content: ary ianareo dia tanteraka ao Aminy sady Izy no lohan’ny fanapahana sy ny fahefana rehetra.
  '11':
  - type: text
    content: 'Tao Aminy koa no namorana anareo tamin’ny famorana tsy nataon-tanana, tamin’ny fanesorana ny tenan’ny nofo, dia tamin’ny famoran’i Kristy. '
  '12':
  - type: text
    content: 'Fa niara-nalevina Taminy ianareo tamin’ny batisa, ary tao Aminy koa no niara-natsangana Taminy noho ny finoana ny asan’Andriamanitra izay nanangana Azy tamin’ny maty. '
  '13':
  - type: text
    content: 'Ary ianareo, izay efa matin’ny fahadisoana sy ny tsy fiforan’ny nofonareo, dia novelominy niaraka tamin’i Kristy. Efa navelany avokoa ny fahadisoantsika rehetra; '
  '14':
  - type: text
    content: 'novonoiny ny didy voasora-tanana izay niampanga antsika; nesoriny izany ka nohomboany tamin’ny hazofijaliana; '
  '15':
  - type: text
    content: noreseny ny fiandrianana sy ny fahefana ary nasehony miharihary ny fitondrany ireo amin’ny fandresen’ny hazofijaliana.
  '16':
  - type: text
    content: 'Koa aza avela hisy hitsara anareo, na amin’ny fihinana, na amin’ny fisotro, na ny andro firavoravoana, na ny voaloham-bolana, na ny '
  - type: text
    content: Sabata
  - type: text
    content: '; '
  '17':
  - type: text
    content: 'aloky ny zavatra ho avy ireny, fa ny tena izy dia Kristy. '
  '18':
  - type: text
    content: 'Aza mety hofitahin’ny olona amin’ny fanetren-tena diso sy ny fivavahana amin’ny anjely ianareo; mitompo amin’ny zavatra hitany izy ireny sady feno fiavonavonana noho ny fisainany ara-nofo '
  '19':
  - type: text
    content: ka tsy mihazona ny loha izay Izy no itomboan’ny tena rehetra, izay velomina sy ampiraisina tsara amin’ny vanin-taolana sy ny hozatra, araka ny fampitomboana izay avy amin’Andriamanitra.
  - type: heading
    content: Miara-maty sy miara-belona amin’i Kristy
  '2':
  - type: text
    content: 'mba hampaherezina ny fony amin’ny ampiraisana azy amin’ny fitiavana ka ho feno fahatokiana be avy amin’ny fahazavan-tsaina izy, ary hahalala tsara ny zavamiafina izay an’Andriamanitra, dia Kristy, '
  '20':
  - type: text
    content: 'Ary raha niara-maty tamin’i '
  - type: text
    content: Kristy
  - type: text
    content: ' ianareo ka efa afaka tamin’ny abidim-pianaran’izao tontolo izao, nahoana no toa mbola velona amin’izao tontolo izao ihany ka mety hodidiana hoe: '
  '21':
  - type: text
    content: 'Aza mandray, aza manandrana, aza manendry. '
  '22':
  - type: text
    content: 'Levona izany rehetra izany rehefa ampiasaina, fa didy sy fampianarana avy amin’olona ihany. '
  '23':
  - type: text
    content: Izany rehetra izany dia ankalazaina ho fahendrena amin’ny fivavahana noterena sy ny fanetren-tena diso ary ny fampahoriana ny tena, nefa tsy manan-kery hahasakana ny fampanaranam-po ny nofo akory.
  '3':
  - type: text
    content: izay iafenan’ny rakitry ny fahendrena sy ny fahalalana rehetra.
  '4':
  - type: text
    content: 'Izany no lazaiko, fandrao hisy hampahadiso hevitra anareo amin’ny teny toa marina. '
  '5':
  - type: text
    content: Fa na dia tsy manatrika anareo amin’ny nofo aza aho dia miaraka aminareo ihany amin’ny fanahy ka mifaly sy mijery ny filaminanareo sy ny tsy fiovan’ny finoanareo an’i Kristy.
  - type: heading
    content: Manana ny zavatra rehetra ianareo ao amin’i Kristy
  '6':
  - type: text
    content: 'Koa tahaka ny nandraisanareo an’i '
  - type: text
    content: Kristy
  - type: text
    content: ' Jesosy Tompo dia mandehana koa ao Aminy araka izany; '
  '7':
  - type: text
    content: mifahatra tsara sy miorina mafy ao Aminy ary tafatoetra amin’ny finoana, toy ny efa nampianarana anareo ka feno fisaorana amin’izany.
  '8':
  - type: text
    content: 'Tandremo fandrao misy mahalasa anareo ho babony amin’ny filozofia sy ny famitahana foana, araka ny fampianarana voatolotry ny razana, araka ny abidim-pianaran’izao tontolo izao, fa tsy araka an’i Kristy. '
  '9':
  - type: text
    content: 'Fa ao amin’ny tenany no itoeran’ny fahafenoan’ny fomban’Andriamanitra rehetra; '
