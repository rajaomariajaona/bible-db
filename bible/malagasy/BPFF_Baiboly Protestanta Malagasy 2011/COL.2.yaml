document_id: COL.2
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Fa tiako ho fantatrareo ny hamafin’ny fiezahako ho anareo sy izay any Laodikia mbamin’izay rehetra tsy mbola nahita ny tavako amin’ny nofo, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'mba hampaherezina ny fony amin’ny ampiraisana azy amin’ny fitiavana ka ho feno fahatokiana be avy amin’ny fahazavan-tsaina izy, ary hahalala tsara ny zavamiafina izay an’Andriamanitra, dia Kristy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: izay iafenan’ny rakitry ny fahendrena sy ny fahalalana rehetra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Izany no lazaiko, fandrao hisy hampahadiso hevitra anareo amin’ny teny toa marina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Fa na dia tsy manatrika anareo amin’ny nofo aza aho dia miaraka aminareo ihany amin’ny fanahy ka mifaly sy mijery ny filaminanareo sy ny tsy fiovan’ny finoanareo an’i Kristy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Manana ny zavatra rehetra ianareo ao amin’i Kristy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Koa tahaka ny nandraisanareo an’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' Jesosy Tompo dia mandehana koa ao Aminy araka izany; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: mifahatra tsara sy miorina mafy ao Aminy ary tafatoetra amin’ny finoana, toy ny efa nampianarana anareo ka feno fisaorana amin’izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Tandremo fandrao misy mahalasa anareo ho babony amin’ny filozofia sy ny famitahana foana, araka ny fampianarana voatolotry ny razana, araka ny abidim-pianaran’izao tontolo izao, fa tsy araka an’i Kristy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Fa ao amin’ny tenany no itoeran’ny fahafenoan’ny fomban’Andriamanitra rehetra; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ary ianareo dia tanteraka ao Aminy sady Izy no lohan’ny fanapahana sy ny fahefana rehetra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Tao Aminy koa no namorana anareo tamin’ny famorana tsy nataon-tanana, tamin’ny fanesorana ny tenan’ny nofo, dia tamin’ny famoran’i Kristy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Fa niara-nalevina Taminy ianareo tamin’ny batisa, ary tao Aminy koa no niara-natsangana Taminy noho ny finoana ny asan’Andriamanitra izay nanangana Azy tamin’ny maty. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary ianareo, izay efa matin’ny fahadisoana sy ny tsy fiforan’ny nofonareo, dia novelominy niaraka tamin’i Kristy. Efa navelany avokoa ny fahadisoantsika rehetra; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'novonoiny ny didy voasora-tanana izay niampanga antsika; nesoriny izany ka nohomboany tamin’ny hazofijaliana; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: noreseny ny fiandrianana sy ny fahefana ary nasehony miharihary ny fitondrany ireo amin’ny fandresen’ny hazofijaliana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Koa aza avela hisy hitsara anareo, na amin’ny fihinana, na amin’ny fisotro, na ny andro firavoravoana, na ny voaloham-bolana, na ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Sabata
  - type: text
    text: '; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'aloky ny zavatra ho avy ireny, fa ny tena izy dia Kristy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Aza mety hofitahin’ny olona amin’ny fanetren-tena diso sy ny fivavahana amin’ny anjely ianareo; mitompo amin’ny zavatra hitany izy ireny sady feno fiavonavonana noho ny fisainany ara-nofo '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ka tsy mihazona ny loha izay Izy no itomboan’ny tena rehetra, izay velomina sy ampiraisina tsara amin’ny vanin-taolana sy ny hozatra, araka ny fampitomboana izay avy amin’Andriamanitra.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Miara-maty sy miara-belona amin’i Kristy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary raha niara-maty tamin’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' ianareo ka efa afaka tamin’ny abidim-pianaran’izao tontolo izao, nahoana no toa mbola velona amin’izao tontolo izao ihany ka mety hodidiana hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Aza mandray, aza manandrana, aza manendry. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Levona izany rehetra izany rehefa ampiasaina, fa didy sy fampianarana avy amin’olona ihany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Izany rehetra izany dia ankalazaina ho fahendrena amin’ny fivavahana noterena sy ny fanetren-tena diso ary ny fampahoriana ny tena, nefa tsy manan-kery hahasakana ny fampanaranam-po ny nofo akory.
