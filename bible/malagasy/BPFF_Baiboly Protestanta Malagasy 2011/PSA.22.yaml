document_id: PSA.22
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nahoana no dia nahafoy ahy ianao?
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: Ho an’ny mpiventy hira. Al-aielet-hashahar. Salamo nataon’i Davida.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Andriamanitro ô, Andriamanitro ô, nahoana no dia nahafoy ahy Ianao?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Lavitry ny famonjena ahy ny tenin’ny fitarainako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Andriamanitro ô, miantso aho nony andro nefa tsy mamaly Ianao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: miantso aho nony alina nefa tsy mahita fiononana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Kanefa masina Ianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ry mipetraka eo amin’ny fideràn’ny Israely.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ianao no nitokian’ny razanay;
- type: usfm
  marker: q1
  children:
  - type: text
    text: natoky izy ka nanafaka azy Ianao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ianao no nitarainany ka afa-nandositra izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ianao no nitokiany ka tsy nitsanga-menatra izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Fa izaho dia olitra fa tsy olona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fandatsan’olona sy fanevatevam-bahoaka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Izay rehetra mahita ahy dia manaraby ahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'manondro molotra izy sady mihifikifi-doha ka miteny hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Efa niankina tamin’NY TOMPO izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia aoka Izy hamonjy azy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, aoka Izy hanafaka azy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria mankasitraka azy Izy!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Fa Ianao no nampivoaka ahy avy tao an-kibo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: nampandry ahy fehizay Ianao, fony aho mbola nampinonoin’ny reniko;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: nankinina Taminao hatrany am-bohoka aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hatrany an-kibon-dreniko dia Andriamanitro Ianao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Aza manalavitra ahy Ianao fa akaiky ny fahoriana
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady tsy misy olona hamonjy ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Mitangorona amiko ireo ombilahy maro,
- type: usfm
  marker: q1
  children:
  - type: text
    text: manemitra ahy ny maherin’i Basana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Misanasana vava amiko izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, toy ny liona mamiravira sy mierona izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Efa toy ny rano aidina aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka mivaha ny taolako rehetra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tahaka ny savoka ny foko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: miempo ato anatiko izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Maina tahaka ny tanimanga vakivaky ny heriko
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary miraikitra amin’ny lanilaniko ny lelako;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ao amin’ny vovoky ny fahafatesana no ametrahanao ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Fa mitangorona amiko ny amboa,
- type: usfm
  marker: q1
  children:
  - type: text
    text: manemitra ahy ny andian’olon-dratsy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: manindrona ny tongotro aman-tanako izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Maha isa ny taolako rehetra aho.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mibanjina sady mangarika ahy ireo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Mizara ny fitafiako ho azy izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary anaovany antsapaka ny akanjoko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Fa Ianao TOMPO ô, aza manalavitra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ry heriko ô, faingàna hamonjy ahy!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Afaho amin’ny sabatra aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: vonjeo amin’ny herin’ny amboa ny aiko!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Afaho amin’ny vavan’ny liona
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy amin’ny tandroky ny ombimanga aho!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia namaly ahy Ianao!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Hitory ny anaranao amin’ny rahalahiko aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: eo afovoan’ny fiangonana no hiderako Anao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ianareo izay matahotra NY TOMPO, miderà Azy!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ry taranak’i Jakoba rehetra, omeo voninahitra Azy!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Matahora Azy, ry Zanak’Israely rehetra!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Fa tsy manao tsinontsinona na marikorikon’ny fahorian’ny ory Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy mba manafina ny tavany aminy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa raha mitaraina Aminy ireny dia mihaino Izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Avy Aminao no ahazoako manao fiderana eo amin’ny fiangonan-dehibe;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny voadiko dia hefaiko eo anatrehan’izay matahotra NY TOMPO.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Hihinana ny mpandefitra ka ho voky;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hidera NY TOMPO ireo izay mitady Azy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ho velona mandrakizay anie ny fonareo!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Hahatsiaro NY TOMPO ny any amin’ny faran’ny tany rehetra ka hiverina Aminy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hiankohoka eo anatrehany ny fokon’ny firenen-tsamihafa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Fa an’NY TOMPO ny fanjakana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: manapaka ny firenen-tsamihafa Izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Hihinana sy hiankohoka koa ny mpanefoefo rehetra ambonin’ny tany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eo anatrehany no hiondrehan’izay rehetra midina any amin’ny vovoka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ireo izay tsy mahavelona ny ainy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Hisy taranaka hanompo Azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny Tompo dia holazaina amin’ny taranaka ho avy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Hisy ho avy ka hanambara ny fahamarinany
- type: usfm
  marker: q1
  children:
  - type: text
    text: amin’ny olona izay mbola hateraka fa Izy no nanao izany.
