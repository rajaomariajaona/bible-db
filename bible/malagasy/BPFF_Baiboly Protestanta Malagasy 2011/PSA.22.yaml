document_id: PSA.22,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Nahoana no dia nahafoy ahy ianao?
  - type: text
    content: Ho an’ny mpiventy hira. Al-aielet-hashahar. Salamo nataon’i Davida.
  - type: text
    content: Andriamanitro ô, Andriamanitro ô, nahoana no dia nahafoy ahy Ianao?
  - type: text
    content: Lavitry ny famonjena ahy ny tenin’ny fitarainako.
  '10':
  - type: text
    content: nankinina Taminao hatrany am-bohoka aho;
  - type: text
    content: hatrany an-kibon-dreniko dia Andriamanitro Ianao.
  '11':
  - type: text
    content: Aza manalavitra ahy Ianao fa akaiky ny fahoriana
  - type: text
    content: sady tsy misy olona hamonjy ahy.
  '12':
  - type: text
    content: Mitangorona amiko ireo ombilahy maro,
  - type: text
    content: manemitra ahy ny maherin’i Basana.
  '13':
  - type: text
    content: Misanasana vava amiko izy;
  - type: text
    content: eny, toy ny liona mamiravira sy mierona izy.
  '14':
  - type: text
    content: Efa toy ny rano aidina aho
  - type: text
    content: ka mivaha ny taolako rehetra;
  - type: text
    content: tahaka ny savoka ny foko,
  - type: text
    content: miempo ato anatiko izy.
  '15':
  - type: text
    content: Maina tahaka ny tanimanga vakivaky ny heriko
  - type: text
    content: ary miraikitra amin’ny lanilaniko ny lelako;
  - type: text
    content: ao amin’ny vovoky ny fahafatesana no ametrahanao ahy.
  '16':
  - type: text
    content: Fa mitangorona amiko ny amboa,
  - type: text
    content: manemitra ahy ny andian’olon-dratsy,
  - type: text
    content: manindrona ny tongotro aman-tanako izy.
  '17':
  - type: text
    content: Maha isa ny taolako rehetra aho.
  - type: text
    content: Mibanjina sady mangarika ahy ireo.
  '18':
  - type: text
    content: Mizara ny fitafiako ho azy izy
  - type: text
    content: ary anaovany antsapaka ny akanjoko.
  '19':
  - type: text
    content: Fa Ianao TOMPO ô, aza manalavitra;
  - type: text
    content: ry heriko ô, faingàna hamonjy ahy!
  '2':
  - type: text
    content: Andriamanitro ô, miantso aho nony andro nefa tsy mamaly Ianao;
  - type: text
    content: miantso aho nony alina nefa tsy mahita fiononana.
  '20':
  - type: text
    content: Afaho amin’ny sabatra aho,
  - type: text
    content: vonjeo amin’ny herin’ny amboa ny aiko!
  '21':
  - type: text
    content: Afaho amin’ny vavan’ny liona
  - type: text
    content: sy amin’ny tandroky ny ombimanga aho!
  - type: text
    content: Dia namaly ahy Ianao!
  '22':
  - type: text
    content: Hitory ny anaranao amin’ny rahalahiko aho,
  - type: text
    content: eo afovoan’ny fiangonana no hiderako Anao.
  '23':
  - type: text
    content: Ianareo izay matahotra NY TOMPO, miderà Azy!
  - type: text
    content: Ry taranak’i Jakoba rehetra, omeo voninahitra Azy!
  - type: text
    content: Matahora Azy, ry Zanak’Israely rehetra!
  '24':
  - type: text
    content: Fa tsy manao tsinontsinona na marikorikon’ny fahorian’ny ory Izy
  - type: text
    content: ary tsy mba manafina ny tavany aminy;
  - type: text
    content: fa raha mitaraina Aminy ireny dia mihaino Izy.
  '25':
  - type: text
    content: Avy Aminao no ahazoako manao fiderana eo amin’ny fiangonan-dehibe;
  - type: text
    content: ny voadiko dia hefaiko eo anatrehan’izay matahotra NY TOMPO.
  '26':
  - type: text
    content: Hihinana ny mpandefitra ka ho voky;
  - type: text
    content: hidera NY TOMPO ireo izay mitady Azy.
  - type: text
    content: Ho velona mandrakizay anie ny fonareo!
  '27':
  - type: text
    content: Hahatsiaro NY TOMPO ny any amin’ny faran’ny tany rehetra ka hiverina Aminy;
  - type: text
    content: hiankohoka eo anatrehany ny fokon’ny firenen-tsamihafa.
  '28':
  - type: text
    content: Fa an’NY TOMPO ny fanjakana;
  - type: text
    content: manapaka ny firenen-tsamihafa Izy.
  '29':
  - type: text
    content: Hihinana sy hiankohoka koa ny mpanefoefo rehetra ambonin’ny tany;
  - type: text
    content: eo anatrehany no hiondrehan’izay rehetra midina any amin’ny vovoka,
  - type: text
    content: dia ireo izay tsy mahavelona ny ainy.
  '3':
  - type: text
    content: Kanefa masina Ianao,
  - type: text
    content: ry mipetraka eo amin’ny fideràn’ny Israely.
  '30':
  - type: text
    content: Hisy taranaka hanompo Azy
  - type: text
    content: ary ny Tompo dia holazaina amin’ny taranaka ho avy.
  '31':
  - type: text
    content: Hisy ho avy ka hanambara ny fahamarinany
  - type: text
    content: amin’ny olona izay mbola hateraka fa Izy no nanao izany.
  '4':
  - type: text
    content: Ianao no nitokian’ny razanay;
  - type: text
    content: natoky izy ka nanafaka azy Ianao.
  '5':
  - type: text
    content: Ianao no nitarainany ka afa-nandositra izy;
  - type: text
    content: Ianao no nitokiany ka tsy nitsanga-menatra izy.
  '6':
  - type: text
    content: Fa izaho dia olitra fa tsy olona,
  - type: text
    content: fandatsan’olona sy fanevatevam-bahoaka.
  '7':
  - type: text
    content: Izay rehetra mahita ahy dia manaraby ahy,
  - type: text
    content: 'manondro molotra izy sady mihifikifi-doha ka miteny hoe:'
  '8':
  - type: text
    content: Efa niankina tamin’NY TOMPO izy,
  - type: text
    content: dia aoka Izy hamonjy azy;
  - type: text
    content: eny, aoka Izy hanafaka azy,
  - type: text
    content: satria mankasitraka azy Izy!
  '9':
  - type: text
    content: Fa Ianao no nampivoaka ahy avy tao an-kibo;
  - type: text
    content: nampandry ahy fehizay Ianao, fony aho mbola nampinonoin’ny reniko;
