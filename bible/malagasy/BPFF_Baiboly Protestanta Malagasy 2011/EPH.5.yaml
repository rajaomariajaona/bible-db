document_id: EPH.5,3103
type_code: plt
verses:
  '1':
  - type: text
    content: 'Koa aoka hanahaka an’Andriamanitra ianareo, tahaka ny zanaka malala; '
  '10':
  - type: text
    content: 'Fantaro izay ankasitrahan’ny Tompo, '
  '11':
  - type: text
    content: 'ary aza miombona amin’ny asan’ny maizina tsy mahavoka-tsoa, fa aleo mampahafantatra izany. '
  '12':
  - type: text
    content: 'Izay ataony ao amin’ny miafina mantsy dia mahamenatra na dia ny milaza azy ihany aza. '
  '13':
  - type: text
    content: 'Fa ny zavatra rehetra, rehefa ampahafantarina, dia asehon’ny mazava; '
  '14':
  - type: text
    content: 'fa na inona na inona aseho dia mazava. Koa izany no ilazany hoe:'
  - type: text
    content: Mifohaza ianao izay matory
  - type: text
    content: ary mitsangàna amin’ny maty,
  - type: text
    content: 'dia hampahazava anao '
  - type: text
    content: Kristy
  - type: text
    content: .
  '15':
  - type: text
    content: 'Koa tandremo tsara izay fitondrantenanareo, mba tsy ho tahaka ny adala fa tahaka ny hendry. '
  '16':
  - type: text
    content: 'Araraoty ny fotoana azo anaovan-tsoa fa ratsy izao andro izao. '
  '17':
  - type: text
    content: 'Ary noho izany dia aza miadaladala fa fantaro izay sitrapon’ny Tompo. '
  '18':
  - type: text
    content: 'Aza ho mamon-divay ianareo fa misy fanaranam-po amin’ny ratsy amin’izany. Aoka ianareo ho feno ny Fanahy; '
  '19':
  - type: text
    content: 'mifampiresaha amin’ny salamo sy ny hira ary ny tononkiram-panahy, dia mihirà sy mikaloa ao am-ponareo ho an’ny Tompo. '
  '2':
  - type: text
    content: ary mandehana amin’ny fitiavana, toy ny nitiavan’i Kristy anareo ka nanolorany ny tenany ho an’Andriamanitra ho fanatitra sy ho fanavotana ary ho hanitra ankasitrahana.
  '20':
  - type: text
    content: Misaora mandrakariva an’Andriamanitra Ray noho ny zavatra rehetra, amin’ny anaran’i Jesosy Kristy Tompontsika.
  - type: heading
    content: Ny mpivady
  '21':
  - type: text
    content: 'Mifaneke amin’ny fahatahorana an’i '
  - type: text
    content: Kristy
  - type: text
    content: ' ianareo; '
  '22':
  - type: text
    content: 'ny vehivavy hanaiky ny vadiny, tahaka ny anekena ny Tompo '
  '23':
  - type: text
    content: satria ny lahy no lohan’ny vavy, tahaka an’i Kristy koa izay Lohan’ny fiangonana
  - type: note
    content: 'Na: eklesia.'
  - type: text
    content: '; ary Izy no mpamonjy ny tena. '
  '24':
  - type: text
    content: Tahaka ny aneken’ny fiangonana an’i Kristy koa no haneken’ny vavy ny lahy amin’ny zavatra rehetra.
  '25':
  - type: text
    content: 'Ianareo lehilahy, tiava ny vadinareo, tahaka ny nitiavan’i Kristy ny fiangonana ka nanolorany ny tenany hamonjy azy '
  '26':
  - type: text
    content: 'mba hahamasina azy amin’ny anadiovany azy amin’ny rano fanasana ao amin’ny teny; '
  '27':
  - type: text
    content: 'mba hasehony ho an’ny tenany izany ho fiangonana malaza, tsy misy pentimpentina, na fiketronana, na izay toy izany, fa mba ho masina sady tsy misy tsiny izy. '
  '28':
  - type: text
    content: Dia tahaka izany koa, ny lehilahy dia tokony ho tia ny vadiny tahaka ny tenany ihany. Izay tia ny vadiny dia tia ny tenany.
  '29':
  - type: text
    content: 'Fa tsy mbola nisy mihitsy olona tsy tia ny tenany, fa mamelona sy mitaiza azy izy tahaka izay ataon’i Kristy amin’ny fiangonana, '
  '3':
  - type: text
    content: 'Fa ny fijangajangana sy ny fahalotoana rehetra, na ny fitiavam-bola, dia aza avela hotononina eo aminareo akory, fa tsy mahamendrika ny olona masina, '
  '30':
  - type: text
    content: 'satria momba ny tenany isika. '
  '31':
  - type: text
    content: '«Ary noho izany ny lehilahy dia handao ny rainy sy ny reniny ka hiray amin’ny vadiny, dia ho nofo iray ihany izy roa» (Gen 2.24). '
  '32':
  - type: text
    content: 'Zavamiafina lehibe izany; milaza ny amin’i Kristy sy ny fiangonana mantsy aho. '
  '33':
  - type: text
    content: Na izany aza, samia tia ny vadiny tahaka ny tenany ianareo lehilahy, ary aoka kosa ny vavy hanaja ny lahy.
  '4':
  - type: text
    content: 'na fahavetavetana, na resaka adaladala, na teniteny foana. Samy tsy tokony hatao, fa aleo teny fisaorana. '
  '5':
  - type: text
    content: Aoka ho fantatrareo mihitsy fa samy tsy manana lova eo amin’ny fanjakan’i Kristy sy Andriamanitra na ny mpijangajanga rehetra, na ny olom-betaveta, na ny olona tia vola, fa fanompoan-tsampy izany.
  - type: heading
    content: Maizina fahiny fa mazava kosa ankehitriny
  '6':
  - type: text
    content: 'Aza mety fitahin’olona amin’ny teny foana ianareo fa izany zavatra izany no mahatonga ny fahatezeran’Andriamanitra amin’ny olona tsy mankatò. '
  '7':
  - type: text
    content: 'Aza mety ho mpiombona aminy ianareo. '
  '8':
  - type: text
    content: 'Fa maizina ianareo fahiny, nefa efa mazava ao amin’ny Tompo kosa ankehitriny. Mandehana tahaka ny zanaky ny mazava '
  '9':
  - type: text
    content: 'satria ny vokatry ny mazava dia ao amin’ny fahatsaram-panahy rehetra sy ny fahamarinana ary ny fahitsiana. '
