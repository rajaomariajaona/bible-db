document_id: EPH.5
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Koa aoka hanahaka an’Andriamanitra ianareo, tahaka ny zanaka malala; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ary mandehana amin’ny fitiavana, toy ny nitiavan’i Kristy anareo ka nanolorany ny tenany ho an’Andriamanitra ho fanatitra sy ho fanavotana ary ho hanitra ankasitrahana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Fa ny fijangajangana sy ny fahalotoana rehetra, na ny fitiavam-bola, dia aza avela hotononina eo aminareo akory, fa tsy mahamendrika ny olona masina, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'na fahavetavetana, na resaka adaladala, na teniteny foana. Samy tsy tokony hatao, fa aleo teny fisaorana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Aoka ho fantatrareo mihitsy fa samy tsy manana lova eo amin’ny fanjakan’i Kristy sy Andriamanitra na ny mpijangajanga rehetra, na ny olom-betaveta, na ny olona tia vola, fa fanompoan-tsampy izany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Maizina fahiny fa mazava kosa ankehitriny
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Aza mety fitahin’olona amin’ny teny foana ianareo fa izany zavatra izany no mahatonga ny fahatezeran’Andriamanitra amin’ny olona tsy mankatò. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Aza mety ho mpiombona aminy ianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Fa maizina ianareo fahiny, nefa efa mazava ao amin’ny Tompo kosa ankehitriny. Mandehana tahaka ny zanaky ny mazava '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'satria ny vokatry ny mazava dia ao amin’ny fahatsaram-panahy rehetra sy ny fahamarinana ary ny fahitsiana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Fantaro izay ankasitrahan’ny Tompo, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'ary aza miombona amin’ny asan’ny maizina tsy mahavoka-tsoa, fa aleo mampahafantatra izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Izay ataony ao amin’ny miafina mantsy dia mahamenatra na dia ny milaza azy ihany aza. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Fa ny zavatra rehetra, rehefa ampahafantarina, dia asehon’ny mazava; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'fa na inona na inona aseho dia mazava. Koa izany no ilazany hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mifohaza ianao izay matory
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mitsangàna amin’ny maty,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'dia hampahazava anao '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Koa tandremo tsara izay fitondrantenanareo, mba tsy ho tahaka ny adala fa tahaka ny hendry. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Araraoty ny fotoana azo anaovan-tsoa fa ratsy izao andro izao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary noho izany dia aza miadaladala fa fantaro izay sitrapon’ny Tompo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Aza ho mamon-divay ianareo fa misy fanaranam-po amin’ny ratsy amin’izany. Aoka ianareo ho feno ny Fanahy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'mifampiresaha amin’ny salamo sy ny hira ary ny tononkiram-panahy, dia mihirà sy mikaloa ao am-ponareo ho an’ny Tompo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Misaora mandrakariva an’Andriamanitra Ray noho ny zavatra rehetra, amin’ny anaran’i Jesosy Kristy Tompontsika.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny mpivady
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Mifaneke amin’ny fahatahorana an’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' ianareo; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'ny vehivavy hanaiky ny vadiny, tahaka ny anekena ny Tompo '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: satria ny lahy no lohan’ny vavy, tahaka an’i Kristy koa izay Lohan’ny fiangonana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.23 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: eklesia.
    marker-yv: yv-n
  - type: text
    text: '; ary Izy no mpamonjy ny tena. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Tahaka ny aneken’ny fiangonana an’i Kristy koa no haneken’ny vavy ny lahy amin’ny zavatra rehetra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ianareo lehilahy, tiava ny vadinareo, tahaka ny nitiavan’i Kristy ny fiangonana ka nanolorany ny tenany hamonjy azy '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'mba hahamasina azy amin’ny anadiovany azy amin’ny rano fanasana ao amin’ny teny; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'mba hasehony ho an’ny tenany izany ho fiangonana malaza, tsy misy pentimpentina, na fiketronana, na izay toy izany, fa mba ho masina sady tsy misy tsiny izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Dia tahaka izany koa, ny lehilahy dia tokony ho tia ny vadiny tahaka ny tenany ihany. Izay tia ny vadiny dia tia ny tenany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Fa tsy mbola nisy mihitsy olona tsy tia ny tenany, fa mamelona sy mitaiza azy izy tahaka izay ataon’i Kristy amin’ny fiangonana, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'satria momba ny tenany isika. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: '«Ary noho izany ny lehilahy dia handao ny rainy sy ny reniny ka hiray amin’ny vadiny, dia ho nofo iray ihany izy roa» (Gen 2.24). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Zavamiafina lehibe izany; milaza ny amin’i Kristy sy ny fiangonana mantsy aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Na izany aza, samia tia ny vadiny tahaka ny tenany ianareo lehilahy, ary aoka kosa ny vavy hanaja ny lahy.
