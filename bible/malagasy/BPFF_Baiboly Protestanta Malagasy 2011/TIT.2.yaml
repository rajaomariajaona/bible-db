      text: Ny zokiolona, ny tanora, ny mpanompo
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Fa ianao kosa dia milazà izay mendrika ny fampianarana tsy misy kilema.
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: tsy hangala-tety, fa haneho izay toe-panahy mahatoky indrindra mba hampahamendrika ny fampianaran’Andriamanitra, Mpamonjy antsika, amin’ny zavatra rehetra.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny olona an’i Jesosy Kristy
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Fa efa miseho ny fahasoavan’Andriamanitra izay famonjena ny olona rehetra. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Izany dia mampianatra antsika handa izay toe-panahy tsy araka an’Andriamanitra sy ny filan’izao tontolo izao fa ny mba ho velona amin’ny onony sy ny marina ary ny toe-panahy araka an’Andriamanitra amin’izao fiainana ankehitriny izao, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'eo am-piandrasana ny fanantenana mahafinaritra sy ny fisehoan’ny voninahitr’Andriamanitra lehibe sady Mpamonjy antsika, dia Jesosy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: '. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Nanolotra ny tenany hamonjy antsika Izy mba hanavotany antsika ho afaka amin’ny ota rehetra sy hanadiovany izay olona ho an’ny tenany sady ho mazoto indrindra amin’ny asa tsara.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Izany no lazao sy ananaro ary andrarao amin’ny fahefana rehetra. Aza avela hisy hanao tsinontsinona anao!
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Anaro hahonon-tena ny lehilahy zokiolona, ho maotina, ho hendry ary hatanjaka amin’ny finoana, amin’ny fitiavana, amin’ny faharetana.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Ny vehivavy zokiolona koa dia anaro hitondra tena toy izay mendrika ny olona masina, tsy ho mpanendrikendrika, tsy ho andevozin’ny divay be, ho mpampianatra ny zavatra tsara, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'mba hampianarany ny vehivavy tanora ho tia ny vadiny, ho tia ny zanany, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: hahonon-tena, ho madio toe-panahy, hiasa ao an-tranony, ho tsara fanahy, hanaiky ny vadiny, mba tsy hitenenana ratsy ny tenin’Andriamanitra.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Anaro hahonon-tena koa ny lehilahy tanora; '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'amin’ny zavatra rehetra dia asehoy ny tenanao ho fianarana ny asa tsara, amin’ny fampianaranao madio sy maotina, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ny teny tsy misy kilema, izay tsy azo kianina, mba ho menatra izay manohitra satria tsy hisy ratsy hitenenany anareo.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ny mpanompo koa dia anaro hanaiky ny tompony mba hanao izay ankasitrahany amin’ny zavatra rehetra fa tsy hamalivaly, '
