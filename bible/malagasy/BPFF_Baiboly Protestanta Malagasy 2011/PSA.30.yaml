document_id: PSA.30
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Namelona ahy Ianao TOMPO ô!
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: Salamo. Hira tamin’ny nitokanana ny trano. Nataon’i Davida.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Hanandratra Anao aho, TOMPO ô, fa nanintona ahy niakatra Ianao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy navelanao hifalian’ny fahavaloko aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: TOMPO Andriamanitro ô!
- type: usfm
  marker: q1
  children:
  - type: text
    text: nitaraina taminao aho dia nanasitrana ahy Ianao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'TOMPO ô, efa nampiakatra ahy avy tany amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: fitoeran’ny maty
  - type: text
    text: ' Ianao;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: nampody ny aiko Ianao mba tsy ho isan’izay midina any an-davaka aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Mankalazà NY TOMPO, ry olony masina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: miderà Azy ka ankalazao ny fahatsiarovana ny fahamasinany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Fa indray mipy maso ihany ny fahatezerany
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa mandritra ny andro iainana kosa ny fankasitrahany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: amin’ny hariva dia misy fitomaniana
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa nony maraina kosa dia misy fihobiana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Hoy aho raha mbola niadana:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy hangozohozo mandrakizay aho!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: TOMPO ô, noho ny fankasitrahanao dia nampitoerinao mafy ny tendrombohitro.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nanafina ny tavanao Ianao dia very hevitra aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ianao no nantsoiko, TOMPO ô!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Nifona tamin’NY TOMPO aho hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Inona no soa azo amin’ny rako
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny hidinako any an-davaka?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hidera Anao va ny vovoka?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hanambara ny fahamarinanao va izany?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Mihainoa, TOMPO ô, ka mamindrà fo amiko!
- type: usfm
  marker: q1
  children:
  - type: text
    text: TOMPO ô, aoka ho Mpamonjy ahy Ianao!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Efa nampody ny fisaonako ho fandihizana Ianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: efa nanaisotra ny akanjo fisaonako Ianao ka nampisikina ahy fifaliana,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: mba hankalazako ny voninahitrao ka tsy hangina aho.
- type: usfm
  marker: q1
  children:
  - type: text
    text: TOMPO Andriamanitro ô, hidera Anao mandrakariva aho.
