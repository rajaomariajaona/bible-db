document_id: PSA.30,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Namelona ahy Ianao TOMPO ô!
  - type: text
    content: Salamo. Hira tamin’ny nitokanana ny trano. Nataon’i Davida.
  - type: text
    content: Hanandratra Anao aho, TOMPO ô, fa nanintona ahy niakatra Ianao;
  - type: text
    content: tsy navelanao hifalian’ny fahavaloko aho.
  '10':
  - type: text
    content: Mihainoa, TOMPO ô, ka mamindrà fo amiko!
  - type: text
    content: TOMPO ô, aoka ho Mpamonjy ahy Ianao!
  '11':
  - type: text
    content: Efa nampody ny fisaonako ho fandihizana Ianao,
  - type: text
    content: efa nanaisotra ny akanjo fisaonako Ianao ka nampisikina ahy fifaliana,
  '12':
  - type: text
    content: mba hankalazako ny voninahitrao ka tsy hangina aho.
  - type: text
    content: TOMPO Andriamanitro ô, hidera Anao mandrakariva aho.
  '2':
  - type: text
    content: TOMPO Andriamanitro ô!
  - type: text
    content: nitaraina taminao aho dia nanasitrana ahy Ianao.
  '3':
  - type: text
    content: 'TOMPO ô, efa nampiakatra ahy avy tany amin’ny '
  - type: text
    content: fitoeran’ny maty
  - type: text
    content: ' Ianao;'
  - type: text
    content: nampody ny aiko Ianao mba tsy ho isan’izay midina any an-davaka aho.
  '4':
  - type: text
    content: Mankalazà NY TOMPO, ry olony masina,
  - type: text
    content: miderà Azy ka ankalazao ny fahatsiarovana ny fahamasinany.
  '5':
  - type: text
    content: Fa indray mipy maso ihany ny fahatezerany
  - type: text
    content: nefa mandritra ny andro iainana kosa ny fankasitrahany;
  - type: text
    content: amin’ny hariva dia misy fitomaniana
  - type: text
    content: fa nony maraina kosa dia misy fihobiana.
  '6':
  - type: text
    content: 'Hoy aho raha mbola niadana:'
  - type: text
    content: Tsy hangozohozo mandrakizay aho!
  '7':
  - type: text
    content: TOMPO ô, noho ny fankasitrahanao dia nampitoerinao mafy ny tendrombohitro.
  - type: text
    content: Nanafina ny tavanao Ianao dia very hevitra aho.
  '8':
  - type: text
    content: Ianao no nantsoiko, TOMPO ô!
  - type: text
    content: 'Nifona tamin’NY TOMPO aho hoe:'
  '9':
  - type: text
    content: Inona no soa azo amin’ny rako
  - type: text
    content: sy ny hidinako any an-davaka?
  - type: text
    content: Hidera Anao va ny vovoka?
  - type: text
    content: Hanambara ny fahamarinanao va izany?
