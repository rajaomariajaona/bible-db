document_id: JER.26,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Norahonana ho faty i Jeremia
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin’ny niandohan’ny nanjakan’i Joiakima, zanak’i Josia, mpanjakan’ny Joda, no nahatongavan’izao teny izao avy tamin’NY TOMPO hoe:'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa nony ren’ny mpanapaka ny Joda izany zavatra izany dia niakatra avy tany amin’ny tranon’ny mpanjaka izy ka nankany amin’ny tranon’NY TOMPO ary nipetraka teo anoloan’ny vavahady vaovaon’NY TOMPO. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny mpisorona sy ny mpaminany dia nilaza tamin’ny mpanapaka sy ny vahoaka rehetra hoe: Misy heloka tokony hahafaty ity lehilahy ity; fa naminany loza ho amin’ity tanàna ity izy araka izay efa ren’ny sofinareo. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nilaza tamin’ny mpanapaka rehetra sy ny vahoaka rehetra i Jeremia hoe: NY TOMPO no naniraka ahy haminany izay rehetra efa renareo ny amin’ity trano sy ity tanàna ity. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa ankehitriny hatsarao ny fandehanareo sy ny ataonareo, ary mihainoa ny feon’NY TOMPO Andriamanitrareo; fa hanenenan’NY TOMPO ny loza izay efa nolazainy hamelezana anareo. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ny amiko dia indro, eto an-tananareo aho; koa ataovy amiko izay heverinareo ho mety sy marina. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Kanefa mihevera tsara, fa raha mamono ahy anie ianareo dia ho meloka amin’ny ran’ny tsy manan-tsiny ianareo sy ity tanàna ity ary ny mponina eto satria NY TOMPO mihitsy no naniraka ahy teo aminareo hilaza ireo teny rehetra ireo eto anatrehanareo.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy ny mpanapaka sy ny vahoaka rehetra tamin’ny mpisorona sy ny mpaminany: Tsy misy heloka tokony hahafaty ity lehilahy ity satria tamin’ny anaran’NY TOMPO Andriamanitsika no nitenenany tamintsika. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nisy nitsangana ny loholona ka niteny tamin’ny vahoaka rehetra vory teo hoe: '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I Mika morastita dia naminany tamin’ny andron’i Hezekia, mpanjakan’ny Joda, ary niteny tamin’ny Joda rehetra hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Izao no lazain’Andriamanitra, Tompon’izao rehetra izao:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '«I '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Ziona
    - type: text
      text: ' dia hasaina toy ny tanimboly,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary i Jerosalema dia ho tonga korontam-bato,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny tendrombohitra misy ny Trano dia ho tonga toy ny havoana voarakotra ala» (Mik 3.12).
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Moa namono azy va i Hezekia, mpanjakan’ny Joda, sy ny Joda rehetra? Tsy natahotra NY TOMPO va izy ka nifona tamin’NY TOMPO, dia nanenenan’NY TOMPO ny loza izay efa nolazainy hamelezany azy? Fa isika kosa izao dia mila hampiditra loza lehibe amin’ny tenantsika.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Nasain’i Joiakima novonoina i Oria mpaminany
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao no lazain’NY TOMPO: Mijoroa eo an-kianjan’ny tranon’NY TOMPO ka lazao amin’ny tanànan’ny Joda rehetra izay avy hiankohoka ao amin’ny tranon’NY TOMPO, ny teny rehetra izay efa nasaiko hambaranao aminy ary aza amelana na dia teny iray akory aza. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nisy lehilahy iray izay koa naminany tamin’ny anaran’NY TOMPO, dia i Oria, zanak’i Semaia, avy any Kiriata-Jearima, izay naminany loza ho amin’ity tanàna sy ity tany ity araka ireo teny rehetra nataon’i Jeremia teo ireo koa. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nony ren’i Joiakima mpanjaka sy ny lehilahy maheriny rehetra ary ireo komandiny rehetra ny teniny dia nitady hahafaty azy ny mpanjaka. Nony nandre izany i Oria dia natahotra ka nandositra ary tonga tany Ejipta; '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'nefa nandefa iraka nankany Ejipta i Joiakima mpanjaka, dia i Elnatana, zanak’i Akbora, mbamin’ny olona sasany nanaraka azy hankany Ejipta. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary i Oria dia nalain’ireo niala avy tany Ejipta ka noentiny teo amin’i Joiakima mpanjaka; namono azy tamin’ny sabatra izy, dia nanary ny fatiny tany amin’ny fasam-bahoaka.
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa i Ahikama, zanak’i Safana, dia niaro an’i Jeremia mba tsy hanolorana azy hovonoina teo an-tanan’ny vahoaka.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa angamba hihaino ihany izy ka samy hiala amin’ny lalany ratsy, dia hanenenako ny loza izay kasaiko hamelezana azy noho ny ratsy ataony. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary lazao aminy hoe: Izao no lazain’NY TOMPO: Raha tsy mihaino Ahy ianareo ka tsy mandeha araka ny lalànako izay napetrako teo anoloanareo, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary tsy mihaino ny tenin’ny mpaminany mpanompoko izay irahiko aminareo, eny, nifoha vao maraina Aho ka naniraka, nefa tsy mba nihaino ianareo, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: dia hataoko tahaka an’i Silo ity trano ity, ary hataoko fanozonana ho an’ny firenena rehetra ambonin’ny tany ity tanàna ity.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny mpisorona sy ny mpaminany mbamin’ny vahoaka rehetra dia nandre an’i Jeremia nanambara ireo teny rehetra ireo tao amin’ny tranon’NY TOMPO. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa nony efa tapitra voalazan’i Jeremia izay rehetra nasain’NY TOMPO holazaina tamin’ny vahoaka rehetra dia nosamborin’ny mpisorona sy ny mpaminany mbamin’ny vahoaka rehetra izy ka nataony hoe: Ho faty tokoa ianao! '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nahoana ianao no naminany tamin’ny anaran’NY TOMPO hoe: Ho tahaka an’i Silo ity trano ity, ary ho lao ity tanàna ity ka tsy hisy mponina intsony? Ary ny vahoaka rehetra dia nitangorona tamin’i Jeremia tao amin’ny tranon’NY TOMPO. '
