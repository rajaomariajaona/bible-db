document_id: JER.26,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Norahonana ho faty i Jeremia
  - type: text
    content: 'Tamin’ny niandohan’ny nanjakan’i Joiakima, zanak’i Josia, mpanjakan’ny Joda, no nahatongavan’izao teny izao avy tamin’NY TOMPO hoe:'
  '10':
  - type: text
    content: 'Fa nony ren’ny mpanapaka ny Joda izany zavatra izany dia niakatra avy tany amin’ny tranon’ny mpanjaka izy ka nankany amin’ny tranon’NY TOMPO ary nipetraka teo anoloan’ny vavahady vaovaon’NY TOMPO. '
  '11':
  - type: text
    content: 'Ary ny mpisorona sy ny mpaminany dia nilaza tamin’ny mpanapaka sy ny vahoaka rehetra hoe: Misy heloka tokony hahafaty ity lehilahy ity; fa naminany loza ho amin’ity tanàna ity izy araka izay efa ren’ny sofinareo. '
  '12':
  - type: text
    content: 'Dia nilaza tamin’ny mpanapaka rehetra sy ny vahoaka rehetra i Jeremia hoe: NY TOMPO no naniraka ahy haminany izay rehetra efa renareo ny amin’ity trano sy ity tanàna ity. '
  '13':
  - type: text
    content: 'Koa ankehitriny hatsarao ny fandehanareo sy ny ataonareo, ary mihainoa ny feon’NY TOMPO Andriamanitrareo; fa hanenenan’NY TOMPO ny loza izay efa nolazainy hamelezana anareo. '
  '14':
  - type: text
    content: 'Fa ny amiko dia indro, eto an-tananareo aho; koa ataovy amiko izay heverinareo ho mety sy marina. '
  '15':
  - type: text
    content: Kanefa mihevera tsara, fa raha mamono ahy anie ianareo dia ho meloka amin’ny ran’ny tsy manan-tsiny ianareo sy ity tanàna ity ary ny mponina eto satria NY TOMPO mihitsy no naniraka ahy teo aminareo hilaza ireo teny rehetra ireo eto anatrehanareo.
  '16':
  - type: text
    content: 'Dia hoy ny mpanapaka sy ny vahoaka rehetra tamin’ny mpisorona sy ny mpaminany: Tsy misy heloka tokony hahafaty ity lehilahy ity satria tamin’ny anaran’NY TOMPO Andriamanitsika no nitenenany tamintsika. '
  '17':
  - type: text
    content: 'Dia nisy nitsangana ny loholona ka niteny tamin’ny vahoaka rehetra vory teo hoe: '
  '18':
  - type: text
    content: 'I Mika morastita dia naminany tamin’ny andron’i Hezekia, mpanjakan’ny Joda, ary niteny tamin’ny Joda rehetra hoe:'
  - type: text
    content: 'Izao no lazain’Andriamanitra, Tompon’izao rehetra izao:'
  - type: text
    content: '«I '
  - type: text
    content: Ziona
  - type: text
    content: ' dia hasaina toy ny tanimboly,'
  - type: text
    content: ary i Jerosalema dia ho tonga korontam-bato,
  - type: text
    content: ary ny tendrombohitra misy ny Trano dia ho tonga toy ny havoana voarakotra ala» (Mik 3.12).
  '19':
  - type: text
    content: Moa namono azy va i Hezekia, mpanjakan’ny Joda, sy ny Joda rehetra? Tsy natahotra NY TOMPO va izy ka nifona tamin’NY TOMPO, dia nanenenan’NY TOMPO ny loza izay efa nolazainy hamelezany azy? Fa isika kosa izao dia mila hampiditra loza lehibe amin’ny tenantsika.
  - type: heading
    content: Nasain’i Joiakima novonoina i Oria mpaminany
  '2':
  - type: text
    content: 'Izao no lazain’NY TOMPO: Mijoroa eo an-kianjan’ny tranon’NY TOMPO ka lazao amin’ny tanànan’ny Joda rehetra izay avy hiankohoka ao amin’ny tranon’NY TOMPO, ny teny rehetra izay efa nasaiko hambaranao aminy ary aza amelana na dia teny iray akory aza. '
  '20':
  - type: text
    content: 'Nisy lehilahy iray izay koa naminany tamin’ny anaran’NY TOMPO, dia i Oria, zanak’i Semaia, avy any Kiriata-Jearima, izay naminany loza ho amin’ity tanàna sy ity tany ity araka ireo teny rehetra nataon’i Jeremia teo ireo koa. '
  '21':
  - type: text
    content: 'Ary nony ren’i Joiakima mpanjaka sy ny lehilahy maheriny rehetra ary ireo komandiny rehetra ny teniny dia nitady hahafaty azy ny mpanjaka. Nony nandre izany i Oria dia natahotra ka nandositra ary tonga tany Ejipta; '
  '22':
  - type: text
    content: 'nefa nandefa iraka nankany Ejipta i Joiakima mpanjaka, dia i Elnatana, zanak’i Akbora, mbamin’ny olona sasany nanaraka azy hankany Ejipta. '
  '23':
  - type: text
    content: Ary i Oria dia nalain’ireo niala avy tany Ejipta ka noentiny teo amin’i Joiakima mpanjaka; namono azy tamin’ny sabatra izy, dia nanary ny fatiny tany amin’ny fasam-bahoaka.
  '24':
  - type: text
    content: Fa i Ahikama, zanak’i Safana, dia niaro an’i Jeremia mba tsy hanolorana azy hovonoina teo an-tanan’ny vahoaka.
  '3':
  - type: text
    content: 'Fa angamba hihaino ihany izy ka samy hiala amin’ny lalany ratsy, dia hanenenako ny loza izay kasaiko hamelezana azy noho ny ratsy ataony. '
  '4':
  - type: text
    content: 'Ary lazao aminy hoe: Izao no lazain’NY TOMPO: Raha tsy mihaino Ahy ianareo ka tsy mandeha araka ny lalànako izay napetrako teo anoloanareo, '
  '5':
  - type: text
    content: 'ary tsy mihaino ny tenin’ny mpaminany mpanompoko izay irahiko aminareo, eny, nifoha vao maraina Aho ka naniraka, nefa tsy mba nihaino ianareo, '
  '6':
  - type: text
    content: dia hataoko tahaka an’i Silo ity trano ity, ary hataoko fanozonana ho an’ny firenena rehetra ambonin’ny tany ity tanàna ity.
  '7':
  - type: text
    content: 'Ary ny mpisorona sy ny mpaminany mbamin’ny vahoaka rehetra dia nandre an’i Jeremia nanambara ireo teny rehetra ireo tao amin’ny tranon’NY TOMPO. '
  '8':
  - type: text
    content: 'Koa nony efa tapitra voalazan’i Jeremia izay rehetra nasain’NY TOMPO holazaina tamin’ny vahoaka rehetra dia nosamborin’ny mpisorona sy ny mpaminany mbamin’ny vahoaka rehetra izy ka nataony hoe: Ho faty tokoa ianao! '
  '9':
  - type: text
    content: 'Nahoana ianao no naminany tamin’ny anaran’NY TOMPO hoe: Ho tahaka an’i Silo ity trano ity, ary ho lao ity tanàna ity ka tsy hisy mponina intsony? Ary ny vahoaka rehetra dia nitangorona tamin’i Jeremia tao amin’ny tranon’NY TOMPO. '
