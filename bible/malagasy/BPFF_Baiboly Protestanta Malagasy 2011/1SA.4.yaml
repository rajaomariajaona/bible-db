document_id: 1SA.4
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Araka izany dia ho an’ny Israely rehetra ny tenin’i Samoela.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Resin’ny Filistina ny Israely
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia nandeha hiady tamin’ny Filistina ny Israely ka nitoby teo anilan’i Ebenezera; fa ny Filistina kosa dia nitoby tany Afeka. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary nilahatra hiady amin’ny Israely ny Filistina, koa nony raikitra ny ady dia resin’ny Filistina ny Israely ary nahafatesany tokony ho efatra arivo lahy ny miaramila nilahatra tany an-tsaha. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Rehefa tonga tany an-toby ny olona dia hoy ny loholon’ny Israely: Nahoana no namely antsika teo anoloan’ny Filistina NY TOMPO androany? Andeha halaintsika avy any Silo ho eto amintsika ny vata misy ny faneken’NY TOMPO, fa rehefa tonga eto amintsika izany dia hamonjy antsika amin’ny tanan’ny fahavalontsika. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dia nandefa iraka nankany Silo ny olona mba haka ny vata misy ny faneken’Andriamanitra, Tompon’izao rehetra izao, izay mipetraka amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: kerobima
  - type: text
    text: . Ary tao Silo, teo amin’ny vata misy ny faneken’Andriamanitra, izy mirahalahy zanak’i Ely, dia i Hofinia sy i Finehasa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Rehefa tonga teo an-toby ny vata misy ny faneken’NY TOMPO dia nihoby mafy ny Zanak’Israely rehetra ka nihorohoro ny tany. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Rehefa ren’ny Filistina ny hoby dia hoy izy: Inona re izany hoby mafy any an-tobin’ny Hebreo izany? Ary fantany fa tonga ao an-toby ny vata misy ny faneken’NY TOMPO. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dia raiki-tahotra ny Filistina ka niteny hoe: Andriamanitra no tonga ao an-toby. Ary hoy koa izy: Nahita loza isika! Tsy mbola nisy toy izao. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Nahita loza isika! Iza no hamonjy antsika amin’ny tanan’ireo andriamanitra mahery ireo? Ireo no andriamanitra izay namely ny Ejiptiana tamin’ny kapoka rehetra tany an-tany efitra. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Mahereza, ary aoka hitomban-dahy ianareo, ry Filistina, fandrao hanompo ny Hebreo tahaka ny nanompoany anareo ianareo; misehoa ho lehilahy ianareo ka miadia. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dia niady ny Filistina ka resy ny Israely; ary samy nandositra ho any an-dainy avy izy rehetra. Be dia be no maty ka lehilahy telo alina mpandeha an-tongotra tamin’ny Israely no niampatrampatra. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Dia lasan-ko babo ny vata misy ny faneken’Andriamanitra, ary maty izy mirahalahy zanak’i Ely, dia i Hofinia sy i Finehasa.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fahafatesan’i Ely mpisorona
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Nisy lehilahy benjaminita iray nihazakazaka avy tany amin’ny miaramila ka tonga tao Silo androtr’izay ihany; rovitra ny akanjony sady nihosin-tany ny lohany. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Rehefa tonga izy, indro nipetraka teo amin’ny sezany i Ely sady nitazana teo amoron-dalana, fa niemponempona ny fony noho ny amin’ny vata misy ny faneken’Andriamanitra. Nony tonga tao an-tanàna Ralehilahy dia nitantara ka nidradradradra ny tao an-tanàna rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Rehefa ren’i Ely ny feo midradradradra dia hoy izy: Inona izao tabataba izao? Ary nanatona haingana Ralehilahy ka nanambara tamin’i Ely. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Efa valo amby sivifolo taona i Ely tamin’izay sady efa pahina ny masony ka tsy nahita izy. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Hoy Ralehilahy tamin’i Ely: Izaho dia avy tany an-tafika; vao androany no nandosirako niala tamin’ny miaramila. Ary hoy i Ely: Nanao ahoana ny tany, anaka? '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Dia namaly ilay nitondra teny hoe: Nandositra teo anoloan’ny Filistina ny Israely ka be dia be no maty, ary izy mirahalahy zanakao, i Hofinia sy i Finehasa, dia maty koa, sady lasan-ko babo ny vata misy ny faneken’Andriamanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Nony nilaza ny amin’ny vata misy ny faneken’Andriamanitra izy dia lavo nitsilany niala tamin’ny sezany teo anilan’ny vavahady i Ely; folaka ny vozony ka maty izy, satria efa antitra sady mavesatra rahateo. Izy dia nitsara ny Israely nandritra ny efapolo taona.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary ny vinantovaviny, vadin’i Finehasa, dia nanana anaka ka efa ho teraka; koa nony reny fa lasan-ko babo ny vata misy ny faneken’Andriamanitra sady maty avokoa ny rafozany sy ny vadiny, dia nitanondrika izy ka narary nihetsi-jaza, fa efa ho teraka. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Rehefa nadiva hiala aina izy dia niteny taminy ireo vehivavy nitsangana teo anilany hoe: Aza matahotra, fa tera-dahy ianao. Nefa tsy namaly na nihaino izany izy. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Dia nataony hoe Ikaboda
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ikaboda: Tsy misy voninahitra.'
    marker-yv: yv-n
  - type: text
    text: ' ny anaran’ny zaza; fa hoy izy: Afaka ny voninahitry ny Israely, satria efa lasan-ko babo ny vata misy ny faneken’Andriamanitra sady efa maty koa ny rafozany sy ny vadiny. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary hoy izy: Afaka tamin’ny Israely ny voninahitra, fa lasan-ko babo ny vata misy ny faneken’Andriamanitra.'
