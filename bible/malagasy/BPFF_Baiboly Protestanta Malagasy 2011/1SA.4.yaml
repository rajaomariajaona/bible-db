document_id: 1SA.4,3103
type_code: plt
verses:
  '1':
  - type: text
    content: Araka izany dia ho an’ny Israely rehetra ny tenin’i Samoela.
  - type: heading
    content: Resin’ny Filistina ny Israely
  - type: text
    content: 'Dia nandeha hiady tamin’ny Filistina ny Israely ka nitoby teo anilan’i Ebenezera; fa ny Filistina kosa dia nitoby tany Afeka. '
  '10':
  - type: text
    content: 'Dia niady ny Filistina ka resy ny Israely; ary samy nandositra ho any an-dainy avy izy rehetra. Be dia be no maty ka lehilahy telo alina mpandeha an-tongotra tamin’ny Israely no niampatrampatra. '
  '11':
  - type: text
    content: Dia lasan-ko babo ny vata misy ny faneken’Andriamanitra, ary maty izy mirahalahy zanak’i Ely, dia i Hofinia sy i Finehasa.
  - type: heading
    content: Ny fahafatesan’i Ely mpisorona
  '12':
  - type: text
    content: 'Nisy lehilahy benjaminita iray nihazakazaka avy tany amin’ny miaramila ka tonga tao Silo androtr’izay ihany; rovitra ny akanjony sady nihosin-tany ny lohany. '
  '13':
  - type: text
    content: 'Rehefa tonga izy, indro nipetraka teo amin’ny sezany i Ely sady nitazana teo amoron-dalana, fa niemponempona ny fony noho ny amin’ny vata misy ny faneken’Andriamanitra. Nony tonga tao an-tanàna Ralehilahy dia nitantara ka nidradradradra ny tao an-tanàna rehetra. '
  '14':
  - type: text
    content: 'Rehefa ren’i Ely ny feo midradradradra dia hoy izy: Inona izao tabataba izao? Ary nanatona haingana Ralehilahy ka nanambara tamin’i Ely. '
  '15':
  - type: text
    content: 'Efa valo amby sivifolo taona i Ely tamin’izay sady efa pahina ny masony ka tsy nahita izy. '
  '16':
  - type: text
    content: 'Hoy Ralehilahy tamin’i Ely: Izaho dia avy tany an-tafika; vao androany no nandosirako niala tamin’ny miaramila. Ary hoy i Ely: Nanao ahoana ny tany, anaka? '
  '17':
  - type: text
    content: 'Dia namaly ilay nitondra teny hoe: Nandositra teo anoloan’ny Filistina ny Israely ka be dia be no maty, ary izy mirahalahy zanakao, i Hofinia sy i Finehasa, dia maty koa, sady lasan-ko babo ny vata misy ny faneken’Andriamanitra. '
  '18':
  - type: text
    content: Nony nilaza ny amin’ny vata misy ny faneken’Andriamanitra izy dia lavo nitsilany niala tamin’ny sezany teo anilan’ny vavahady i Ely; folaka ny vozony ka maty izy, satria efa antitra sady mavesatra rahateo. Izy dia nitsara ny Israely nandritra ny efapolo taona.
  '19':
  - type: text
    content: 'Ary ny vinantovaviny, vadin’i Finehasa, dia nanana anaka ka efa ho teraka; koa nony reny fa lasan-ko babo ny vata misy ny faneken’Andriamanitra sady maty avokoa ny rafozany sy ny vadiny, dia nitanondrika izy ka narary nihetsi-jaza, fa efa ho teraka. '
  '2':
  - type: text
    content: 'Ary nilahatra hiady amin’ny Israely ny Filistina, koa nony raikitra ny ady dia resin’ny Filistina ny Israely ary nahafatesany tokony ho efatra arivo lahy ny miaramila nilahatra tany an-tsaha. '
  '20':
  - type: text
    content: 'Rehefa nadiva hiala aina izy dia niteny taminy ireo vehivavy nitsangana teo anilany hoe: Aza matahotra, fa tera-dahy ianao. Nefa tsy namaly na nihaino izany izy. '
  '21':
  - type: text
    content: Dia nataony hoe Ikaboda
  - type: note
    content: 'Ikaboda: Tsy misy voninahitra.'
  - type: text
    content: ' ny anaran’ny zaza; fa hoy izy: Afaka ny voninahitry ny Israely, satria efa lasan-ko babo ny vata misy ny faneken’Andriamanitra sady efa maty koa ny rafozany sy ny vadiny. '
  '22':
  - type: text
    content: 'Ary hoy izy: Afaka tamin’ny Israely ny voninahitra, fa lasan-ko babo ny vata misy ny faneken’Andriamanitra.'
  '3':
  - type: text
    content: 'Rehefa tonga tany an-toby ny olona dia hoy ny loholon’ny Israely: Nahoana no namely antsika teo anoloan’ny Filistina NY TOMPO androany? Andeha halaintsika avy any Silo ho eto amintsika ny vata misy ny faneken’NY TOMPO, fa rehefa tonga eto amintsika izany dia hamonjy antsika amin’ny tanan’ny fahavalontsika. '
  '4':
  - type: text
    content: 'Dia nandefa iraka nankany Silo ny olona mba haka ny vata misy ny faneken’Andriamanitra, Tompon’izao rehetra izao, izay mipetraka amin’ny '
  - type: text
    content: kerobima
  - type: text
    content: . Ary tao Silo, teo amin’ny vata misy ny faneken’Andriamanitra, izy mirahalahy zanak’i Ely, dia i Hofinia sy i Finehasa.
  '5':
  - type: text
    content: 'Rehefa tonga teo an-toby ny vata misy ny faneken’NY TOMPO dia nihoby mafy ny Zanak’Israely rehetra ka nihorohoro ny tany. '
  '6':
  - type: text
    content: 'Rehefa ren’ny Filistina ny hoby dia hoy izy: Inona re izany hoby mafy any an-tobin’ny Hebreo izany? Ary fantany fa tonga ao an-toby ny vata misy ny faneken’NY TOMPO. '
  '7':
  - type: text
    content: 'Dia raiki-tahotra ny Filistina ka niteny hoe: Andriamanitra no tonga ao an-toby. Ary hoy koa izy: Nahita loza isika! Tsy mbola nisy toy izao. '
  '8':
  - type: text
    content: 'Nahita loza isika! Iza no hamonjy antsika amin’ny tanan’ireo andriamanitra mahery ireo? Ireo no andriamanitra izay namely ny Ejiptiana tamin’ny kapoka rehetra tany an-tany efitra. '
  '9':
  - type: text
    content: 'Mahereza, ary aoka hitomban-dahy ianareo, ry Filistina, fandrao hanompo ny Hebreo tahaka ny nanompoany anareo ianareo; misehoa ho lehilahy ianareo ka miadia. '
