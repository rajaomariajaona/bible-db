document_id: ISA.14,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Hamindra fo amin’i Jakoba NY TOMPO
  - type: text
    content: 'Fa NY TOMPO hamindra fo amin’i Jakoba ary mbola hifidy ny Israely indray ka hamponina azy ao amin’ny taniny; hikambana aminy ny vahiny ary hiombona amin’ny taranak’i Jakoba izy. '
  '10':
  - type: text
    content: 'Dia samy hiteny aminao izy rehetra hoe:'
  - type: text
    content: Hay ianao koa mba osa tahaka anay,
  - type: text
    content: efa tonga tahaka anay ianao!
  '11':
  - type: text
    content: Navarina ho atỳ amin’ny fitoeran’ny maty ny tabiha sy reharehanao
  - type: text
    content: mbamin’ny feon’ny valihanao;
  - type: text
    content: kankana no ilafihanao,
  - type: text
    content: ary olitra no mandrakotra anao.
  '12':
  - type: text
    content: Endre! Nilatsaka avy tany an-danitra ianao,
  - type: text
    content: ry kintana fitarikandro, zanaky ny maraina!
  - type: text
    content: Voakapa hianjera amin’ny tany ianao,
  - type: text
    content: ry ilay mpampanaiky firenena!
  '13':
  - type: text
    content: 'Niteny anakampo ianao hoe: Hiakatra any an-danitra aho,'
  - type: text
    content: ary hasandratro ho ambonin’ny kintan’Andriamanitra ny sezafiandrianako;
  - type: text
    content: dia hipetraka eo amin’ny tendrombohitra Fihaonana
  - type: text
    content: any amin’ny farany avaratra aho;
  '14':
  - type: text
    content: hiakatra ho any ambonin’ny rahona aho
  - type: text
    content: ka ho tahaka ny Avo Indrindra.
  '15':
  - type: text
    content: Kanjo hampidinina hatrany amin’ny fitoeran’ny maty ianao,
  - type: text
    content: ho any am-parany lalina amin’ny lavaka mangitsokitsoka.
  '16':
  - type: text
    content: Hibanjina anao izay mahita anao
  - type: text
    content: 'ka hihevitra anao hoe:'
  - type: text
    content: Moa ity va ilay lehilahy nampihorohoro ny tany
  - type: text
    content: sy nampihozongozona ny fanjakana
  '17':
  - type: text
    content: ary nanao izao tontolo izao ho tany efitra
  - type: text
    content: sy nandrava ny tanànany
  - type: text
    content: ary tsy nandefa ny mpifatotra hody?
  '18':
  - type: text
    content: Ny mpanjakan’ny firenena rehetra
  - type: text
    content: dia samy mandry amin’ny voninahitra avokoa, samy ao am-pasany avy.
  '19':
  - type: text
    content: Fa ianao kosa dia nariana niala lavitra ny fasanao,
  - type: text
    content: tahaka ny solofon-kazo ratsy izay ariana,
  - type: text
    content: sady voatsindrin’ny fatin’ny voavono,
  - type: text
    content: dia ireo voatrabaky ny sabatra
  - type: text
    content: ka nampidinina ho ao amin’ny vato ao an-davaka,
  - type: text
    content: tahaka ny faty hitsakitsahin’ny tongotra.
  '2':
  - type: text
    content: Hisy olona maro haka azy ka hanatitra azy hody, ary ny taranak’Israely dia hanana azy ho mpanompolahy sy mpanompovavy ao amin’ny tanin’NY TOMPO. Ho tonga mpamabo ireo izay namabo azy izy, ary hampanompo izay nampahory azy.
  - type: heading
    content: Ny hiafaran’ny mpanjakan’i Babilona
  '20':
  - type: text
    content: Tsy halevina miaraka amin’ireny ianao
  - type: text
    content: satria efa nanimba ny taninao
  - type: text
    content: sady efa namono ny olonao;
  - type: text
    content: tsy hotononina mandrakizay ny taranaky ny mpanao ratsy!
  '21':
  - type: text
    content: Omàny ny famonoana hamelezana ny zanany
  - type: text
    content: noho ny heloky ny razany!
  - type: text
    content: Aoka izy tsy hitsangana haka ny tany indray
  - type: text
    content: ka hanorina tanàna manerana an’izao tontolo izao.
  '22':
  - type: text
    content: Fa hitsangana hamely azy Aho,
  - type: text
    content: hoy Andriamanitra, Tompon’izao rehetra izao.
  - type: text
    content: Hofoanako ny anaran’i Babilona sy izay sisa ao
  - type: text
    content: mbamin’ny zanany sy ny taranany, hoy NY TOMPO.
  '23':
  - type: text
    content: Hataoko fonenan’ny sokina sy ho honahona izy
  - type: text
    content: ary hofafako amin’ny kifafa fandringanana,
  - type: text
    content: hoy Andriamanitra, Tompon’izao rehetra izao.
  - type: heading
    content: Handrava an’i Asiria NY TOMPO
  '24':
  - type: text
    content: 'Nianiana Andriamanitra, Tompon’izao rehetra izao, hoe:'
  - type: text
    content: Araka izay noheveriko no hatao aminy
  - type: text
    content: 'ary araka izay nokasaiko no hotovina aminy:'
  '25':
  - type: text
    content: Hanorotoro ny Asiriana ao amin’ny taniko Aho
  - type: text
    content: ary hanitsakitsaka azy eny amin’ny tendrombohitro;
  - type: text
    content: ny ziogany dia hesorina amin’ireo
  - type: text
    content: ary ny entany dia ho afaka amin’ny sorony.
  '26':
  - type: text
    content: Izany no fikasana ny amin’ny tany rehetra
  - type: text
    content: ary izany no tanana miainga hamely ny firenena rehetra.
  '27':
  - type: text
    content: Andriamanitra, Tompon’izao rehetra izao, no efa nikasa, koa iza indray no hahafoana izany?
  - type: text
    content: Miainga ny tanany ka iza no hampihemotra izany?
  - type: heading
    content: Ny loza hanjo ny Filistina
  '28':
  - type: text
    content: 'Tamin’ny taona nahafatesan’i Ahaza mpanjaka no nisy izao faminaniana ny loza hanjo izao:'
  '29':
  - type: text
    content: Aza mifaly, ry tanin’ny Filistina manontolo,
  - type: text
    content: satria hoe tapaka ny tsorakazo namely anao!
  - type: text
    content: Fa avy ao an-kibon’ny bibilava no hiavian’ny menarana,
  - type: text
    content: 'ary ny aterany dia ho tonga '
  - type: text
    content: dragona
  - type: text
    content: ' manidina.'
  '3':
  - type: text
    content: 'Koa amin’ny andro hanomezan’NY TOMPO fitsaharana anao ho afaka amin’ny fahorianao sy ny fitebitebin’ny fonao ary ny fanompoana mafy izay nampanompoana anao '
  '30':
  - type: text
    content: Dia mba hihinana ny fadiranovana indrindra,
  - type: text
    content: ary handry fehizay ny mahantra;
  - type: text
    content: fa hataoko maty mosary kosa izay sisa tavela aminao;
  - type: text
    content: eny, hovonoina ho faty izay tavela aminao.
  '31':
  - type: text
    content: 'Midradradradrà, ry '
  - type: text
    content: vavahady
  - type: text
    content: '!'
  - type: text
    content: Mitolokoa, ry tanàna!
  - type: text
    content: Aoka ho ketraka ianao ry tanin’ny Filistina manontolo!
  - type: text
    content: Fa misy setroka mitranga avy any avaratra
  - type: text
    content: ary tsy misy miala amin’ny laharany akory ny miaramilany.
  '32':
  - type: text
    content: Inona moa no havaly ny irak’io firenena io?
  - type: text
    content: 'Izao: NY TOMPO efa nanorina an’i '
  - type: text
    content: Ziona
  - type: text
    content: ','
  - type: text
    content: ary ao no hialofan’izay olony ory.
  '4':
  - type: text
    content: 'dia hambaranao izao oha-teny ny amin’ny mpanjakan’i Babilona izao hoe:'
  - type: text
    content: Akory izay! Nitsahatra ilay mpampahory!
  - type: text
    content: Tsy ao intsony ilay mpampijaly!
  '5':
  - type: text
    content: NY TOMPO efa nanapatapaka ny tehin’ny ratsy fanahy,
  - type: text
    content: dia ny tehim-pahefan’ny mpanapaka
  '6':
  - type: text
    content: izay namely firenena tamin-katezerana,
  - type: text
    content: tamin’ny kapoka tsy nanam-pitsaharana
  - type: text
    content: sady nampanompo firenena tamin’ny fahavinirana,
  - type: text
    content: tamin’ny fanenjehana tsy misy antra.
  '7':
  - type: text
    content: Miadana ka mandry fehizay ny tany manontolo;
  - type: text
    content: velominy ao ny hoby.
  '8':
  - type: text
    content: 'Eny, ny hazo kipreso sy ny sedera any Libanona dia hifaly ny aminao hoe:'
  - type: text
    content: Hatrizay nahalavo anao izay
  - type: text
    content: dia tsy misy mpikapa hazo miakatra atỳ aminay intsony.
  '9':
  - type: text
    content: 'Mihetsiketsika ny '
  - type: text
    content: fitoeran’ny maty
  - type: text
    content: ' any ambany'
  - type: text
    content: mba hitsena anao amin’ny fiavianao;
  - type: text
    content: mamoha ny matoatoa hitsena anao izy,
  - type: text
    content: dia ireny osilahy mpitarika
  - type: note
    content: 'osilahy mpitarika: osilahy no mialoha lalana ny andian’ondry aman’osy.'
  - type: text
    content: ' rehetra teo ambonin’ny tany ireny;'
  - type: text
    content: atsangany hiala amin’ny sezafiandrianany
  - type: text
    content: ny mpanjakan’ny firenena rehetra.
