document_id: ISA.14,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Hamindra fo amin’i Jakoba NY TOMPO
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Fa NY TOMPO hamindra fo amin’i Jakoba ary mbola hifidy ny Israely indray ka hamponina azy ao amin’ny taniny; hikambana aminy ny vahiny ary hiombona amin’ny taranak’i Jakoba izy. '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Dia samy hiteny aminao izy rehetra hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hay ianao koa mba osa tahaka anay,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: efa tonga tahaka anay ianao!
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Navarina ho atỳ amin’ny fitoeran’ny maty ny tabiha sy reharehanao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mbamin’ny feon’ny valihanao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: kankana no ilafihanao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary olitra no mandrakotra anao.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Endre! Nilatsaka avy tany an-danitra ianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ry kintana fitarikandro, zanaky ny maraina!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voakapa hianjera amin’ny tany ianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ry ilay mpampanaiky firenena!
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Niteny anakampo ianao hoe: Hiakatra any an-danitra aho,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hasandratro ho ambonin’ny kintan’Andriamanitra ny sezafiandrianako;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hipetraka eo amin’ny tendrombohitra Fihaonana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: any amin’ny farany avaratra aho;
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: hiakatra ho any ambonin’ny rahona aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka ho tahaka ny Avo Indrindra.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Kanjo hampidinina hatrany amin’ny fitoeran’ny maty ianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho any am-parany lalina amin’ny lavaka mangitsokitsoka.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Hibanjina anao izay mahita anao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ka hihevitra anao hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moa ity va ilay lehilahy nampihorohoro ny tany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy nampihozongozona ny fanjakana
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ary nanao izao tontolo izao ho tany efitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy nandrava ny tanànany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy nandefa ny mpifatotra hody?
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Ny mpanjakan’ny firenena rehetra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia samy mandry amin’ny voninahitra avokoa, samy ao am-pasany avy.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Fa ianao kosa dia nariana niala lavitra ny fasanao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tahaka ny solofon-kazo ratsy izay ariana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady voatsindrin’ny fatin’ny voavono,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ireo voatrabaky ny sabatra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka nampidinina ho ao amin’ny vato ao an-davaka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tahaka ny faty hitsakitsahin’ny tongotra.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Hisy olona maro haka azy ka hanatitra azy hody, ary ny taranak’Israely dia hanana azy ho mpanompolahy sy mpanompovavy ao amin’ny tanin’NY TOMPO. Ho tonga mpamabo ireo izay namabo azy izy, ary hampanompo izay nampahory azy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny hiafaran’ny mpanjakan’i Babilona
    marker-yv: yv-h
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Tsy halevina miaraka amin’ireny ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria efa nanimba ny taninao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady efa namono ny olonao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy hotononina mandrakizay ny taranaky ny mpanao ratsy!
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Omàny ny famonoana hamelezana ny zanany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: noho ny heloky ny razany!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka izy tsy hitsangana haka ny tany indray
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hanorina tanàna manerana an’izao tontolo izao.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Fa hitsangana hamely azy Aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy Andriamanitra, Tompon’izao rehetra izao.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hofoanako ny anaran’i Babilona sy izay sisa ao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mbamin’ny zanany sy ny taranany, hoy NY TOMPO.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Hataoko fonenan’ny sokina sy ho honahona izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hofafako amin’ny kifafa fandringanana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy Andriamanitra, Tompon’izao rehetra izao.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Handrava an’i Asiria NY TOMPO
    marker-yv: yv-h
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Nianiana Andriamanitra, Tompon’izao rehetra izao, hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Araka izay noheveriko no hatao aminy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ary araka izay nokasaiko no hotovina aminy:'
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Hanorotoro ny Asiriana ao amin’ny taniko Aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hanitsakitsaka azy eny amin’ny tendrombohitro;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny ziogany dia hesorina amin’ireo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny entany dia ho afaka amin’ny sorony.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Izany no fikasana ny amin’ny tany rehetra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary izany no tanana miainga hamely ny firenena rehetra.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Andriamanitra, Tompon’izao rehetra izao, no efa nikasa, koa iza indray no hahafoana izany?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miainga ny tanany ka iza no hampihemotra izany?
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny loza hanjo ny Filistina
    marker-yv: yv-h
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Tamin’ny taona nahafatesan’i Ahaza mpanjaka no nisy izao faminaniana ny loza hanjo izao:'
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Aza mifaly, ry tanin’ny Filistina manontolo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria hoe tapaka ny tsorakazo namely anao!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa avy ao an-kibon’ny bibilava no hiavian’ny menarana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ary ny aterany dia ho tonga '
    - type: usfm
      marker: w
      children:
      - type: text
        text: dragona
    - type: text
      text: ' manidina.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Koa amin’ny andro hanomezan’NY TOMPO fitsaharana anao ho afaka amin’ny fahorianao sy ny fitebitebin’ny fonao ary ny fanompoana mafy izay nampanompoana anao '
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Dia mba hihinana ny fadiranovana indrindra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary handry fehizay ny mahantra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa hataoko maty mosary kosa izay sisa tavela aminao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, hovonoina ho faty izay tavela aminao.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Midradradradrà, ry '
    - type: usfm
      marker: w
      children:
      - type: text
        text: vavahady
    - type: text
      text: '!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mitolokoa, ry tanàna!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka ho ketraka ianao ry tanin’ny Filistina manontolo!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa misy setroka mitranga avy any avaratra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy misy miala amin’ny laharany akory ny miaramilany.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Inona moa no havaly ny irak’io firenena io?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Izao: NY TOMPO efa nanorina an’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Ziona
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ao no hialofan’izay olony ory.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'dia hambaranao izao oha-teny ny amin’ny mpanjakan’i Babilona izao hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Akory izay! Nitsahatra ilay mpampahory!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy ao intsony ilay mpampijaly!
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: NY TOMPO efa nanapatapaka ny tehin’ny ratsy fanahy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ny tehim-pahefan’ny mpanapaka
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: izay namely firenena tamin-katezerana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tamin’ny kapoka tsy nanam-pitsaharana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady nampanompo firenena tamin’ny fahavinirana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tamin’ny fanenjehana tsy misy antra.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Miadana ka mandry fehizay ny tany manontolo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: velominy ao ny hoby.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Eny, ny hazo kipreso sy ny sedera any Libanona dia hifaly ny aminao hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hatrizay nahalavo anao izay
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia tsy misy mpikapa hazo miakatra atỳ aminay intsony.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Mihetsiketsika ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: fitoeran’ny maty
    - type: text
      text: ' any ambany'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hitsena anao amin’ny fiavianao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mamoha ny matoatoa hitsena anao izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ireny osilahy mpitarika
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'osilahy mpitarika: osilahy no mialoha lalana ny andian’ondry aman’osy.'
      marker-yv: yv-n
    - type: text
      text: ' rehetra teo ambonin’ny tany ireny;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: atsangany hiala amin’ny sezafiandrianany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny mpanjakan’ny firenena rehetra.
