document_id: JER.36
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ilay horonan-taratasy nodorana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Tamin’ny taona fahefatra nanjakan’i Joiakima, zanak’i Josia, mpanjakan’ny Joda, dia tonga tamin’i Jeremia avy tamin’NY TOMPO izao teny izao:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Makà horonan-taratasy ianao ka soraty amin’izany ny teny rehetra izay nolazaiko taminao ny amin’ny Israely sy ny Joda ary ny firenena rehetra hatramin’ny andro nilazako taminao, dia hatramin’ny andron’i Josia ka mandraka androany. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Angamba hohenoin’ny taranak’i Joda ny loza rehetra izay kasaiko hatao aminy ka samy hiala amin’ny lalany ratsy avy izy dia havelako ny helony sy ny fahotany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary niantso an’i Baroka, zanak’i Neria i Jeremia; dia nosoratan’i Baroka tamin’ny horonan-taratasy ny tenin’NY TOMPO rehetra avy tamin’ny vavan’i Jeremia, dia izay efa nolazain’NY TOMPO taminy. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia nandidy an’i Baroka i Jeremia hoe: Izaho ity voatazona ka tsy afaka mankany amin’ny tranon’NY TOMPO; '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'koa mandehana ianao ka vakio eo anatrehan’ny vahoaka ao amin’ny tranon’NY TOMPO amin’ny andro fifadian-kanina ny tenin’NY TOMPO, izay efa nosoratanao avy tamin’ny vavako; ary vakio eo anatrehan’ny Joda rehetra izay tonga avy any amin’ny tanànany koa. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Fa angamba hoborahina eo anatrehan’NY TOMPO ny fifonany, dia samy hiala amin’ny lalany ratsy avy izy; fa loza ny fahatezerana sy ny fahavinirana izay nolazain’NY TOMPO ny amin’ity firenena ity. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ary i Baroka, zanak’i Neria, dia nanatanteraka araka izay rehetra nandidian’i Jeremia mpaminany azy ka namaky ny tenin’NY TOMPO tamin’ny taratasy teo amin’ny tranon’NY TOMPO.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Fa tamin’ny volana fahasivy tamin’ny taona fahadimy nanjakan’i Joiakima, zanak’i Josia, mpanjakan’ny Joda, dia nisy fiantsoana fifadian-kanina teo anatrehan’NY TOMPO ho an’ny vahoaka rehetra tany Jerosalema sy tamin’ny olona rehetra izay efa tonga tany Jerosalema avy eny amin’ny tanànan’ny Joda. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dia novakin’i Baroka teo anatrehan’ny vahoaka rehetra tao amin’ny tranon’NY TOMPO ny tenin’i Jeremia tamin’ny taratasy; izany dia tao amin’ny efitranon’i Gemaria, zanak’i Safana mpitantsoratra, teo amin’ny kianja ambony, teo anoloan’ny vavahady vaovao amin’ny tranon’NY TOMPO. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Nony ren’i Mika, zanak’i Gemaria, zanak’i Safana, ny tenin’NY TOMPO rehetra tamin’ny boky, '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'dia nidina nankany amin’ny tranon’ny mpanjaka izy ka nankao amin’ny efitranon’ny mpitantsoratra; ary indreo ny mpanapaka rehetra nipetraka teo, dia i Elisama mpitantsoratra; i Delaia, zanak’i Semaia; i Elnatana, zanak’i Akbora; i Gemaria, zanak’i Safana; ary i Zedekia, zanak’i Hanania mbamin’ny mpanapaka rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Dia nambaran’i Mika azy ny teny rehetra izay efa reny tamin’ny namakian’i Baroka ny taratasy teo anatrehan’ny vahoaka.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dia nirahin’ny mpanapaka rehetra i Jehody, zanak’i Netania, zanak’i Selemia, zanak’i Kosy, ho any amin’i Baroka mba hiteny hoe: Ento eny an-tananao ny horonan-taratasy, ilay novakinao teo anatrehan’ny vahoaka, ka mankanesa atỳ. Dia noentin’i Baroka, zanak’i Neria, teny an-tanany ny horonan-taratasy, dia nankany aminy izy. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary hoy izy ireo taminy: Mipetraha ary ka vakio eto anatrehanay. Dia novakin’i Baroka teo anatrehany ilay izy. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Rehefa reny ny teny rehetra, dia nifampijerijery tamin-tahotra izy ireo, ary hoy izy tamin’i Baroka: Tsy maintsy holazainay amin’ny mpanjaka izany teny rehetra izany. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary i Baroka dia nadininy hoe: Lazao aminay ny fomba nanoratanao izao teny rehetra izao avy teo am-bavany. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Dia hoy i Baroka taminy: Izy no nanonona izany teny rehetra izany tamiko, dia nosoratako an-taratasy tamin’ny ranomainty. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Dia hoy ny mpanapaka tamin’i Baroka: Mandehana ka miere ianao sy i Jeremia ary aoka tsy hisy olona hahita izay itoeranareo.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Dia niditra tao amin’ny mpanjaka tao amin’ny kianja izy ireo, nefa ny horonan-taratasy efa napetrany tao amin’ny efitranon’i Elisama mpanoratra, ary nambarany teo anatrehan’ny mpanjaka ny teny rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary nirahin’ny mpanjaka i Jehody haka ilay horonan-taratasy, dia nalainy tao amin’ny efitranon’i Elisama mpanoratra iny. Dia novakin’i Jehody teo anatrehan’ny mpanjaka sy ny mpanapaka rehetra izay nitsangana teo anatrehan’ny mpanjaka izany. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Nipetraka tao amin’ny trano fitoerana amin’ny ririnina ny mpanjaka tamin’ny volana fahasivy, ary nisy afo nirehitra teo am-patana teo anoloany. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary nony efa namaky toko telo na efatra i Jehody dia notapatapahin’ny mpanjaka tamin’ny antsin’ny mpitantsoratra ny horonan-taratasy ka natsipitsipiny tao anaty afo teo am-patana, mandra-pahalevon’ny afo azy rehetra tao. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Tsy mba natahotra akory ireo na nandriatra ny fitafiany, na ny mpanjaka, na ny mpanompony rehetra, izay nandre izany teny rehetra izany. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary na dia efa nifona tamin’ny mpanjaka aza i Elnatana sy i Delaia ary i Gemaria, mba tsy handoroany ny horonan-taratasy, dia tsy nety nihaino azy izy. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Ary ny mpanjaka dia nandidy an’i Jeramela, zanak’andriana, sy i Seraia, zanak’i Azriela, ary i Selemia, zanak’i Abdela, hisambotra an’i Baroka mpanoratra sy i Jeremia mpaminany. Nefa nafenin’NY TOMPO izy roa lahy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Loza ho an’ny mpanjaka
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Dia tonga tamin’i Jeremia ny tenin’NY TOMPO, taorianan’ny nandoroan’ny mpanjaka ny horonan-taratasy sy ny teny izay nosoratan’i Baroka avy tamin’ny vavan’i Jeremia hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Makà indray horonan-taratasy hafa koa ianao ka soraty aminy ilay teny rehetra tamin’ny horonan-taratasy teo, dia ilay nodoran’i Joiakima, mpanjakan’ny Joda. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ary ny amin’i Joiakima, mpanjakan’ny Joda, dia holazainao hoe: Izao no lazain’NY TOMPO: Ianao dia efa nandoro iny horonan-taratasy iny ka niteny hoe: Ahoana no nanoratanao tamin’iny hoe: Ho avy tokoa ny mpanjakan’i Babilona ka handrava ity tany ity sy hahalany ritra ny olona mbamin’ny biby eto?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Koa izao no lazain’NY TOMPO ny amin’i Joiakima, mpanjakan’ny Joda: Tsy hanana fara handimby eo amin’ny sezafiandrianan’i Davida izy; ary ny fatiny dia hariana ka hasian’ny hainandro amin’ny antoandro ary ho azon’ny fanala amin’ny alina. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Ary hampijaliako noho ny helony izy mbamin’ny taranany sy ny mpanompony; hataoko mihatra aminy sy amin’ny mponina any Jerosalema ary amin’ny lehilahy amin’ny Joda ny loza rehetra izay efa nolazaiko hatao aminy, nefa tsy nohenoiny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Ary i Jeremia dia naka horonan-taratasy hafa koa ka natolony an’i Baroka mpitantsoratra, zanak’i Neria, ary nosoratany tao, avy tamin’ny vavan’i Jeremia, ny teny rehetra izay tao amin’ilay horonan-taratasy nodoran’i Joiakima, mpanjakan’ny Joda, tamin’ny afo; sady nampiany teny maro mitovitovy amin’ireny koa aza.
