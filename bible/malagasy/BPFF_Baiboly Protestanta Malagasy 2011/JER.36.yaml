document_id: JER.36,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ilay horonan-taratasy nodorana
  - type: text
    content: 'Tamin’ny taona fahefatra nanjakan’i Joiakima, zanak’i Josia, mpanjakan’ny Joda, dia tonga tamin’i Jeremia avy tamin’NY TOMPO izao teny izao:'
  '10':
  - type: text
    content: 'Dia novakin’i Baroka teo anatrehan’ny vahoaka rehetra tao amin’ny tranon’NY TOMPO ny tenin’i Jeremia tamin’ny taratasy; izany dia tao amin’ny efitranon’i Gemaria, zanak’i Safana mpitantsoratra, teo amin’ny kianja ambony, teo anoloan’ny vavahady vaovao amin’ny tranon’NY TOMPO. '
  '11':
  - type: text
    content: 'Nony ren’i Mika, zanak’i Gemaria, zanak’i Safana, ny tenin’NY TOMPO rehetra tamin’ny boky, '
  '12':
  - type: text
    content: 'dia nidina nankany amin’ny tranon’ny mpanjaka izy ka nankao amin’ny efitranon’ny mpitantsoratra; ary indreo ny mpanapaka rehetra nipetraka teo, dia i Elisama mpitantsoratra; i Delaia, zanak’i Semaia; i Elnatana, zanak’i Akbora; i Gemaria, zanak’i Safana; ary i Zedekia, zanak’i Hanania mbamin’ny mpanapaka rehetra. '
  '13':
  - type: text
    content: Dia nambaran’i Mika azy ny teny rehetra izay efa reny tamin’ny namakian’i Baroka ny taratasy teo anatrehan’ny vahoaka.
  '14':
  - type: text
    content: 'Dia nirahin’ny mpanapaka rehetra i Jehody, zanak’i Netania, zanak’i Selemia, zanak’i Kosy, ho any amin’i Baroka mba hiteny hoe: Ento eny an-tananao ny horonan-taratasy, ilay novakinao teo anatrehan’ny vahoaka, ka mankanesa atỳ. Dia noentin’i Baroka, zanak’i Neria, teny an-tanany ny horonan-taratasy, dia nankany aminy izy. '
  '15':
  - type: text
    content: 'Ary hoy izy ireo taminy: Mipetraha ary ka vakio eto anatrehanay. Dia novakin’i Baroka teo anatrehany ilay izy. '
  '16':
  - type: text
    content: 'Rehefa reny ny teny rehetra, dia nifampijerijery tamin-tahotra izy ireo, ary hoy izy tamin’i Baroka: Tsy maintsy holazainay amin’ny mpanjaka izany teny rehetra izany. '
  '17':
  - type: text
    content: 'Ary i Baroka dia nadininy hoe: Lazao aminay ny fomba nanoratanao izao teny rehetra izao avy teo am-bavany. '
  '18':
  - type: text
    content: 'Dia hoy i Baroka taminy: Izy no nanonona izany teny rehetra izany tamiko, dia nosoratako an-taratasy tamin’ny ranomainty. '
  '19':
  - type: text
    content: 'Dia hoy ny mpanapaka tamin’i Baroka: Mandehana ka miere ianao sy i Jeremia ary aoka tsy hisy olona hahita izay itoeranareo.'
  '2':
  - type: text
    content: 'Makà horonan-taratasy ianao ka soraty amin’izany ny teny rehetra izay nolazaiko taminao ny amin’ny Israely sy ny Joda ary ny firenena rehetra hatramin’ny andro nilazako taminao, dia hatramin’ny andron’i Josia ka mandraka androany. '
  '20':
  - type: text
    content: 'Dia niditra tao amin’ny mpanjaka tao amin’ny kianja izy ireo, nefa ny horonan-taratasy efa napetrany tao amin’ny efitranon’i Elisama mpanoratra, ary nambarany teo anatrehan’ny mpanjaka ny teny rehetra. '
  '21':
  - type: text
    content: 'Ary nirahin’ny mpanjaka i Jehody haka ilay horonan-taratasy, dia nalainy tao amin’ny efitranon’i Elisama mpanoratra iny. Dia novakin’i Jehody teo anatrehan’ny mpanjaka sy ny mpanapaka rehetra izay nitsangana teo anatrehan’ny mpanjaka izany. '
  '22':
  - type: text
    content: 'Nipetraka tao amin’ny trano fitoerana amin’ny ririnina ny mpanjaka tamin’ny volana fahasivy, ary nisy afo nirehitra teo am-patana teo anoloany. '
  '23':
  - type: text
    content: 'Ary nony efa namaky toko telo na efatra i Jehody dia notapatapahin’ny mpanjaka tamin’ny antsin’ny mpitantsoratra ny horonan-taratasy ka natsipitsipiny tao anaty afo teo am-patana, mandra-pahalevon’ny afo azy rehetra tao. '
  '24':
  - type: text
    content: 'Tsy mba natahotra akory ireo na nandriatra ny fitafiany, na ny mpanjaka, na ny mpanompony rehetra, izay nandre izany teny rehetra izany. '
  '25':
  - type: text
    content: 'Ary na dia efa nifona tamin’ny mpanjaka aza i Elnatana sy i Delaia ary i Gemaria, mba tsy handoroany ny horonan-taratasy, dia tsy nety nihaino azy izy. '
  '26':
  - type: text
    content: Ary ny mpanjaka dia nandidy an’i Jeramela, zanak’andriana, sy i Seraia, zanak’i Azriela, ary i Selemia, zanak’i Abdela, hisambotra an’i Baroka mpanoratra sy i Jeremia mpaminany. Nefa nafenin’NY TOMPO izy roa lahy.
  - type: heading
    content: Loza ho an’ny mpanjaka
  '27':
  - type: text
    content: 'Dia tonga tamin’i Jeremia ny tenin’NY TOMPO, taorianan’ny nandoroan’ny mpanjaka ny horonan-taratasy sy ny teny izay nosoratan’i Baroka avy tamin’ny vavan’i Jeremia hoe: '
  '28':
  - type: text
    content: 'Makà indray horonan-taratasy hafa koa ianao ka soraty aminy ilay teny rehetra tamin’ny horonan-taratasy teo, dia ilay nodoran’i Joiakima, mpanjakan’ny Joda. '
  '29':
  - type: text
    content: 'Ary ny amin’i Joiakima, mpanjakan’ny Joda, dia holazainao hoe: Izao no lazain’NY TOMPO: Ianao dia efa nandoro iny horonan-taratasy iny ka niteny hoe: Ahoana no nanoratanao tamin’iny hoe: Ho avy tokoa ny mpanjakan’i Babilona ka handrava ity tany ity sy hahalany ritra ny olona mbamin’ny biby eto?'
  '3':
  - type: text
    content: Angamba hohenoin’ny taranak’i Joda ny loza rehetra izay kasaiko hatao aminy ka samy hiala amin’ny lalany ratsy avy izy dia havelako ny helony sy ny fahotany.
  '30':
  - type: text
    content: 'Koa izao no lazain’NY TOMPO ny amin’i Joiakima, mpanjakan’ny Joda: Tsy hanana fara handimby eo amin’ny sezafiandrianan’i Davida izy; ary ny fatiny dia hariana ka hasian’ny hainandro amin’ny antoandro ary ho azon’ny fanala amin’ny alina. '
  '31':
  - type: text
    content: Ary hampijaliako noho ny helony izy mbamin’ny taranany sy ny mpanompony; hataoko mihatra aminy sy amin’ny mponina any Jerosalema ary amin’ny lehilahy amin’ny Joda ny loza rehetra izay efa nolazaiko hatao aminy, nefa tsy nohenoiny.
  '32':
  - type: text
    content: Ary i Jeremia dia naka horonan-taratasy hafa koa ka natolony an’i Baroka mpitantsoratra, zanak’i Neria, ary nosoratany tao, avy tamin’ny vavan’i Jeremia, ny teny rehetra izay tao amin’ilay horonan-taratasy nodoran’i Joiakima, mpanjakan’ny Joda, tamin’ny afo; sady nampiany teny maro mitovitovy amin’ireny koa aza.
  '4':
  - type: text
    content: 'Ary niantso an’i Baroka, zanak’i Neria i Jeremia; dia nosoratan’i Baroka tamin’ny horonan-taratasy ny tenin’NY TOMPO rehetra avy tamin’ny vavan’i Jeremia, dia izay efa nolazain’NY TOMPO taminy. '
  '5':
  - type: text
    content: 'Dia nandidy an’i Baroka i Jeremia hoe: Izaho ity voatazona ka tsy afaka mankany amin’ny tranon’NY TOMPO; '
  '6':
  - type: text
    content: 'koa mandehana ianao ka vakio eo anatrehan’ny vahoaka ao amin’ny tranon’NY TOMPO amin’ny andro fifadian-kanina ny tenin’NY TOMPO, izay efa nosoratanao avy tamin’ny vavako; ary vakio eo anatrehan’ny Joda rehetra izay tonga avy any amin’ny tanànany koa. '
  '7':
  - type: text
    content: 'Fa angamba hoborahina eo anatrehan’NY TOMPO ny fifonany, dia samy hiala amin’ny lalany ratsy avy izy; fa loza ny fahatezerana sy ny fahavinirana izay nolazain’NY TOMPO ny amin’ity firenena ity. '
  '8':
  - type: text
    content: Ary i Baroka, zanak’i Neria, dia nanatanteraka araka izay rehetra nandidian’i Jeremia mpaminany azy ka namaky ny tenin’NY TOMPO tamin’ny taratasy teo amin’ny tranon’NY TOMPO.
  '9':
  - type: text
    content: 'Fa tamin’ny volana fahasivy tamin’ny taona fahadimy nanjakan’i Joiakima, zanak’i Josia, mpanjakan’ny Joda, dia nisy fiantsoana fifadian-kanina teo anatrehan’NY TOMPO ho an’ny vahoaka rehetra tany Jerosalema sy tamin’ny olona rehetra izay efa tonga tany Jerosalema avy eny amin’ny tanànan’ny Joda. '
