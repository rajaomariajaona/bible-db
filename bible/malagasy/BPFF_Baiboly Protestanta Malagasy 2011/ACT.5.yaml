document_id: ACT.5,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: I Ananiasy sy i Safira
  - type: text
    content: 'Nisy kosa lehilahy iray antsoina hoe Ananiasy sy i Safira vadiny nivarotra tany, '
  '10':
  - type: text
    content: 'Dia niankarapoka teo anoloan’ny tongony niaraka tamin’izay koa izy ka afaka ny ainy; ary raha niditra ireo zatovo ka nahita fa maty izy dia noentiny nivoaka ny trano ka naleviny teo anilan’ny vadiny izy. '
  '11':
  - type: text
    content: Dia raiki-tahotra indrindra ny fiangonana rehetra sy izay rehetra nandre izany.
  - type: heading
    content: Fahagagana maro no nataon’ny Apostoly
  '12':
  - type: text
    content: 'Tamin’ny tanan’ny Apostoly no nanaovana famantarana sy fahagagana maro teo amin’ny vahoaka; ary izy rehetra dia niray saina teo amin’ny Fialofan’i Solomona. '
  '13':
  - type: text
    content: 'Tsy nisy sahy niaraka taminy ny olona sisa rehetra, nefa nankalaza azy ny vahoaka. '
  '14':
  - type: text
    content: 'Ary vao mainka nisy olona maro koa na lahy na vavy, izay nino ny Tompo, nanampy ho isany; '
  '15':
  - type: text
    content: 'noentiny teny an-dalambe koa aza ny marary ka napetrany teny ambony farafara sy fandriana, mba hisy ho azon’ny tandindon’i Petera ahay rehefa mandalo izy. '
  '16':
  - type: text
    content: Dia tonga koa ny olona maro avy tamin’ny vohitra manodidina an’i Jerosalema nitondra ny marary sy izay nampahorin’ny fanahy maloto; samy sitrana avokoa izy rehetra.
  - type: heading
    content: Nosamborina ny Apostoly dia nalefa indray
  '17':
  - type: text
    content: 'Ary nitsangana ny '
  - type: text
    content: Mpisoronabe
  - type: text
    content: ' mbamin’ny namany rehetra izay antokon’ny '
  - type: text
    content: Sadoseo
  - type: text
    content: ', fa feno fialonana izy, '
  '18':
  - type: text
    content: 'dia nisambotra ny Apostoly ka nampiditra azy tao an-tranomaizina. '
  '19':
  - type: text
    content: 'Nony alina anefa dia nisy anjelin’ny Tompo namoha ny varavaran’ny tranomaizina ka nitondra azy nivoaka avy tao sady niteny hoe: '
  '2':
  - type: text
    content: 'kanefa nanafenany ny vola vidin’ny tany ary nifanarahany tamin’ny vavy izany; dia noentiny ary ny ampahan’ny vola vidiny ka napetrany teo anoloan’ny tongotry ny Apostoly. '
  '20':
  - type: text
    content: 'Mandehana ka mitsangàna, ary torio amin’ny vahoaka eo amin’ny '
  - type: text
    content: tempoly
  - type: text
    content: ' ny teny rehetra milaza izany fiainana izany. '
  '21':
  - type: text
    content: Rehefa nandre izany izy ireo dia nandeha vao maraina nankany amin’ny tempoly ka nampianatra.
  - type: text
    content: 'Nony tonga ny Mpisoronabe sy ny namany dia namory ny Sinedriona sy ny loholona rehetra tamin’ny Zanak’Israely ka naniraka olona nankao amin’ny tranomaizina haka ny Apostoly. '
  '22':
  - type: text
    content: 'Rehefa tonga anefa ny mpiambina dia tsy nahita azy ireo tao an-tranomaizina ka niverina nilaza hoe: '
  '23':
  - type: text
    content: 'Ny tranomaizina dia hitanay mihidy tsara, ary ny mpiambina dia mitsangana eo am-baravarana; kanefa nony novohanay ny trano dia tsy nahita olona tao izahay. '
  '24':
  - type: text
    content: 'Rehefa nandre izany teny izany ny lehiben’ny mpiambina ny tempoly sy ireo lehiben’ny mpisorona dia sahiran-tsaina ny amin’izay ho vokatr’izany. '
  '25':
  - type: text
    content: 'Dia nisy olona tonga ka nilaza tamin’izy ireo hoe: Ireny lehilahy izay nataonareo tao an-tranomaizina ireny dia indreo, mitsangana eo amin’ny tempoly ka mampianatra ny olona. '
  '26':
  - type: text
    content: Dia lasa ny lehiben’ny mpiambina sy ny mpiandry raharaha ka nitondra azy ireo, nefa tsy nampiasa hery izy ireo, satria natahotra ny vahoaka izy, fandrao hotorahany vato.
  '27':
  - type: text
    content: 'Rehefa noentiny izy ireo dia nataony teo anatrehan’ny '
  - type: text
    content: Sinedriona
  - type: text
    content: ', ary nanontany azy ny Mpisoronabe '
  '28':
  - type: text
    content: 'hoe: Tsy efa noraranay mafy dia mafy va ianareo tsy hampianatra amin’izany anarana izany? Kanefa indro, efa nofenoinareo ny fampianaranareo indray Jerosalema ka tianareo hankinina aminay ny ran’izany Lehilahy izany.'
  '29':
  - type: text
    content: 'Namaly anefa i Petera sy ny Apostoly hoe: Andriamanitra no tokony hekena mihoatra noho ny olona. '
  '3':
  - type: text
    content: 'Hoy anefa i Petera: Ry Ananiasy, nahoana i Satana no nameno ny fonao handainga amin’ny Fanahy Masina ka hanafina ny ampahan’ny vola vidin’ny tany? '
  '30':
  - type: text
    content: 'Andriamanitry ny razantsika efa nanangana an’i Jesosy, izay novonoin’ny tananareo tamin’ny nanantonanareo Azy teo amin’ny hazo. '
  '31':
  - type: text
    content: 'Izy dia nasandratry ny tanana ankavanan’Andriamanitra ho Tompo sy Mpamonjy, mba hanome fibebahana sy famelan-keloka ho an’ny Israely. '
  '32':
  - type: text
    content: Vavolombelon’izany zavatra izany izahay, ary ny Fanahy Masina koa, izay efa nomen’Andriamanitra izay manaiky Azy.
  '33':
  - type: text
    content: 'Rehefa nandre izany ireo dia lotika ny fony ka nikasa hamono azy ireo izy. '
  '34':
  - type: text
    content: 'Dia nitsangana teo amin’ny Sinedriona ny '
  - type: text
    content: Fariseo
  - type: text
    content: ' iray antsoina hoe Gamaliela, mpampiana-dalàna, izay nalaza teo amin’ny olona rehetra, ka nasainy navoaka kely ireo olona ireo. '
  '35':
  - type: text
    content: 'Dia hoy izy tamin’ny namany: Ry lehilahy Israely, tandremo tsara izay ataonareo amin’ireo olona ireo. '
  '36':
  - type: text
    content: 'Fa fahiny dia nitsangana i Teodasy ka nanao ny tenany ho zavatra; tokony ho efajato no isan’ny lehilahy izay niandany taminy; nefa novonoina izy ka nihahaka izay rehetra nanaiky azy ary tonga tsinontsinona. '
  '37':
  - type: text
    content: 'Nanarakaraka azy indray, tamin’ny andro nanoratana ny vahoaka, dia nitsangana i Jodasy avy any Galilia; nitaona olona hikomy hanaraka azy izy; dia novonoina koa ka nihahaka izay rehetra nanaiky azy. '
  '38':
  - type: text
    content: 'Koa ankehitriny dia izao no lazaiko aminareo: Mandefera amin’ireo olona ireo ka avelao ihany izy; satria raha avy amin’olona izao saina na asa izao dia ho foana; '
  '39':
  - type: text
    content: 'fa raha avy amin’Andriamanitra kosa izao dia tsy ho azonareo foanana, sao dia hita ho mpiady amin’Andriamanitra ianareo. '
  '4':
  - type: text
    content: 'Moa tsy anao va ny tany? Ary rehefa lafo izy, moa tsy mbola eo ambany fahefanao va? Koa nahoana no nisaina izao zavatra izao tao am-ponao ianao? Tsy nandainga tamin’olona ianao fa tamin’Andriamanitra. '
  '40':
  - type: text
    content: Dia nanaiky an’i Gamaliela izy ireo; koa rehefa niantso ny Apostoly izy dia nikapoka azy ireo sady nandrara azy tsy hiteny amin’ny anaran’i Jesosy intsony sady namela azy handeha.
  '41':
  - type: text
    content: 'Dia niala tamim-pifaliana teo anatrehan’ny Sinedriona ny Apostoly, satria natao ho mendrika hitondra fahafaham-baraka ho voninahitr’izany anarana izany. '
  '42':
  - type: text
    content: 'Ary isanandro, teo amin’ny tempoly sy tany an-trano, dia tsy nitsahatra nampianatra sy nitory ny vaovao mahafaly momba an’i '
  - type: text
    content: Kristy
  - type: text
    content: ' Jesosy izy ireo.'
  '5':
  - type: text
    content: 'Nony nandre izany teny izany i Ananiasy dia niankarapoka ka afaka ny ainy; dia raiki-tahotra indrindra izay rehetra nandre izany. '
  '6':
  - type: text
    content: Ary nitsangana ireo zatovo dia nofonosiny ny faty ka noentiny nivoaka ny trano, dia naleviny.
  '7':
  - type: text
    content: 'Tokony ho adiny telo taorianan’izay dia niditra koa ny vadiny, tsy nahalala izay zava-nitranga. '
  '8':
  - type: text
    content: 'Hoy i Petera taminy: Lazao amiko raha toy izao no vola vidin’ny taninareo. Dia hoy izy: Eny, toy izao tokoa. '
  '9':
  - type: text
    content: 'Dia hoy i Petera taminy: Nahoana ianareo no niray tetika haka fanahy ny Fanahin’ny Tompo? Indro, eo am-baravarana ny tongotr’ireo izay nandevina ny vadinao ary hitondra anao koa izy. '
