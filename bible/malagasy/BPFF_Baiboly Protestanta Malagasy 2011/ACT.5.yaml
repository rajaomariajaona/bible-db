document_id: ACT.5
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: I Ananiasy sy i Safira
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Nisy kosa lehilahy iray antsoina hoe Ananiasy sy i Safira vadiny nivarotra tany, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'kanefa nanafenany ny vola vidin’ny tany ary nifanarahany tamin’ny vavy izany; dia noentiny ary ny ampahan’ny vola vidiny ka napetrany teo anoloan’ny tongotry ny Apostoly. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Hoy anefa i Petera: Ry Ananiasy, nahoana i Satana no nameno ny fonao handainga amin’ny Fanahy Masina ka hanafina ny ampahan’ny vola vidin’ny tany? '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Moa tsy anao va ny tany? Ary rehefa lafo izy, moa tsy mbola eo ambany fahefanao va? Koa nahoana no nisaina izao zavatra izao tao am-ponao ianao? Tsy nandainga tamin’olona ianao fa tamin’Andriamanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Nony nandre izany teny izany i Ananiasy dia niankarapoka ka afaka ny ainy; dia raiki-tahotra indrindra izay rehetra nandre izany. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ary nitsangana ireo zatovo dia nofonosiny ny faty ka noentiny nivoaka ny trano, dia naleviny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Tokony ho adiny telo taorianan’izay dia niditra koa ny vadiny, tsy nahalala izay zava-nitranga. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Hoy i Petera taminy: Lazao amiko raha toy izao no vola vidin’ny taninareo. Dia hoy izy: Eny, toy izao tokoa. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Dia hoy i Petera taminy: Nahoana ianareo no niray tetika haka fanahy ny Fanahin’ny Tompo? Indro, eo am-baravarana ny tongotr’ireo izay nandevina ny vadinao ary hitondra anao koa izy. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dia niankarapoka teo anoloan’ny tongony niaraka tamin’izay koa izy ka afaka ny ainy; ary raha niditra ireo zatovo ka nahita fa maty izy dia noentiny nivoaka ny trano ka naleviny teo anilan’ny vadiny izy. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Dia raiki-tahotra indrindra ny fiangonana rehetra sy izay rehetra nandre izany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fahagagana maro no nataon’ny Apostoly
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Tamin’ny tanan’ny Apostoly no nanaovana famantarana sy fahagagana maro teo amin’ny vahoaka; ary izy rehetra dia niray saina teo amin’ny Fialofan’i Solomona. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Tsy nisy sahy niaraka taminy ny olona sisa rehetra, nefa nankalaza azy ny vahoaka. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary vao mainka nisy olona maro koa na lahy na vavy, izay nino ny Tompo, nanampy ho isany; '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'noentiny teny an-dalambe koa aza ny marary ka napetrany teny ambony farafara sy fandriana, mba hisy ho azon’ny tandindon’i Petera ahay rehefa mandalo izy. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Dia tonga koa ny olona maro avy tamin’ny vohitra manodidina an’i Jerosalema nitondra ny marary sy izay nampahorin’ny fanahy maloto; samy sitrana avokoa izy rehetra.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nosamborina ny Apostoly dia nalefa indray
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary nitsangana ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Mpisoronabe
  - type: text
    text: ' mbamin’ny namany rehetra izay antokon’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Sadoseo
  - type: text
    text: ', fa feno fialonana izy, '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'dia nisambotra ny Apostoly ka nampiditra azy tao an-tranomaizina. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Nony alina anefa dia nisy anjelin’ny Tompo namoha ny varavaran’ny tranomaizina ka nitondra azy nivoaka avy tao sady niteny hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Mandehana ka mitsangàna, ary torio amin’ny vahoaka eo amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tempoly
  - type: text
    text: ' ny teny rehetra milaza izany fiainana izany. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Rehefa nandre izany izy ireo dia nandeha vao maraina nankany amin’ny tempoly ka nampianatra.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Nony tonga ny Mpisoronabe sy ny namany dia namory ny Sinedriona sy ny loholona rehetra tamin’ny Zanak’Israely ka naniraka olona nankao amin’ny tranomaizina haka ny Apostoly. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Rehefa tonga anefa ny mpiambina dia tsy nahita azy ireo tao an-tranomaizina ka niverina nilaza hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ny tranomaizina dia hitanay mihidy tsara, ary ny mpiambina dia mitsangana eo am-baravarana; kanefa nony novohanay ny trano dia tsy nahita olona tao izahay. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Rehefa nandre izany teny izany ny lehiben’ny mpiambina ny tempoly sy ireo lehiben’ny mpisorona dia sahiran-tsaina ny amin’izay ho vokatr’izany. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Dia nisy olona tonga ka nilaza tamin’izy ireo hoe: Ireny lehilahy izay nataonareo tao an-tranomaizina ireny dia indreo, mitsangana eo amin’ny tempoly ka mampianatra ny olona. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Dia lasa ny lehiben’ny mpiambina sy ny mpiandry raharaha ka nitondra azy ireo, nefa tsy nampiasa hery izy ireo, satria natahotra ny vahoaka izy, fandrao hotorahany vato.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Rehefa noentiny izy ireo dia nataony teo anatrehan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Sinedriona
  - type: text
    text: ', ary nanontany azy ny Mpisoronabe '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'hoe: Tsy efa noraranay mafy dia mafy va ianareo tsy hampianatra amin’izany anarana izany? Kanefa indro, efa nofenoinareo ny fampianaranareo indray Jerosalema ka tianareo hankinina aminay ny ran’izany Lehilahy izany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Namaly anefa i Petera sy ny Apostoly hoe: Andriamanitra no tokony hekena mihoatra noho ny olona. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Andriamanitry ny razantsika efa nanangana an’i Jesosy, izay novonoin’ny tananareo tamin’ny nanantonanareo Azy teo amin’ny hazo. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Izy dia nasandratry ny tanana ankavanan’Andriamanitra ho Tompo sy Mpamonjy, mba hanome fibebahana sy famelan-keloka ho an’ny Israely. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Vavolombelon’izany zavatra izany izahay, ary ny Fanahy Masina koa, izay efa nomen’Andriamanitra izay manaiky Azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Rehefa nandre izany ireo dia lotika ny fony ka nikasa hamono azy ireo izy. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Dia nitsangana teo amin’ny Sinedriona ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Fariseo
  - type: text
    text: ' iray antsoina hoe Gamaliela, mpampiana-dalàna, izay nalaza teo amin’ny olona rehetra, ka nasainy navoaka kely ireo olona ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Dia hoy izy tamin’ny namany: Ry lehilahy Israely, tandremo tsara izay ataonareo amin’ireo olona ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Fa fahiny dia nitsangana i Teodasy ka nanao ny tenany ho zavatra; tokony ho efajato no isan’ny lehilahy izay niandany taminy; nefa novonoina izy ka nihahaka izay rehetra nanaiky azy ary tonga tsinontsinona. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Nanarakaraka azy indray, tamin’ny andro nanoratana ny vahoaka, dia nitsangana i Jodasy avy any Galilia; nitaona olona hikomy hanaraka azy izy; dia novonoina koa ka nihahaka izay rehetra nanaiky azy. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Koa ankehitriny dia izao no lazaiko aminareo: Mandefera amin’ireo olona ireo ka avelao ihany izy; satria raha avy amin’olona izao saina na asa izao dia ho foana; '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'fa raha avy amin’Andriamanitra kosa izao dia tsy ho azonareo foanana, sao dia hita ho mpiady amin’Andriamanitra ianareo. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Dia nanaiky an’i Gamaliela izy ireo; koa rehefa niantso ny Apostoly izy dia nikapoka azy ireo sady nandrara azy tsy hiteny amin’ny anaran’i Jesosy intsony sady namela azy handeha.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Dia niala tamim-pifaliana teo anatrehan’ny Sinedriona ny Apostoly, satria natao ho mendrika hitondra fahafaham-baraka ho voninahitr’izany anarana izany. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Ary isanandro, teo amin’ny tempoly sy tany an-trano, dia tsy nitsahatra nampianatra sy nitory ny vaovao mahafaly momba an’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' Jesosy izy ireo.'
