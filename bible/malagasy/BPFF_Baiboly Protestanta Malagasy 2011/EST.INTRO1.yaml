document_id: EST.INTRO1
type_code: plt
segments:
- type: usfm
  marker: imt1
  children:
  - type: text
    text: INDRAY MIJERY
- type: usfm
  marker: ip
  children:
  - type: text
    text: Ny Boky dia isan’ireo Horonam-boky Dimy ka novakina tamin’ny Fetin’ny Porima.
- type: usfm
  marker: is1
  children:
  - type: text
    text: Ny votoatin’ny Boky
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Hita ato amin’ity boky ity ny tantara momba an’i Estera, vehivavy jiosy izay isan’ny babo avy tany Jerosalema, ary tonga vadin’ny mpanjakan’i Persia. Ao koa i Mordekay izay zanaky ny rahalahin-drainy sady mpitaiza azy. Ao ihany koa i Hamana izay nikasa handripaka ny Jiosy noho i Mordekay tsy nety niankohoka taminy. Nanao vy very ny ainy mihitsy i Estera tamin’ny fanatonana ny mpanjaka mba hamonjena ny fireneny. Nahazo sitraka tamin’ny mpanjaka anefa izy ka nivadika ny rasa: I Hamana indray no nahantona tamin’ny hazo fa i Mordekay no nahazo toeram-boninahitra ho valin’ny soa nataony tamin’ny mpanjaka, ary nahazo nandripaka ny fahavalony ny Jiosy.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: Ny bokin’i Estera dia tsy ahitana mivantana ny anaran’Andriamanitra, kanefa miharihary ao fa i Estera sy ireo Jiosy namany dia miandrandra ny vonjy avy amin’Andriamanitra ary Andriamanitra no mitantana ny fandehan-javatra rehetra, fa fiasana ihany ny Mpino. Ny fifaranan’ny boky dia mitantara ny valifaty nataon’ny Jiosy tamin’ny fahavalony.
- type: usfm
  marker: ip
  children:
  - type: text
    text: Ity boky ity koa dia manazava ny niandohan’ny fetin’ny Porima, izay tsy hita ao amin’ny Baiboly koa afa-tsy ato amin’ny bokin’i Estera, ary mbola ankalazain’ny Jiosy mandraka androany.
- type: usfm
  marker: is1
  children:
  - type: text
    text: Ny fetin’ny Porima
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Ny fotoana izay noheverin’i Hamana handripahana ny Jiosy dia nanaovana Pora. Io dia teny vahiny, tsy hebreo, midika hoe Fanaovana antsapaka: Nanaovana antsapaka ny andro sy volana handringanana ny Jiosy, koa izay voatondro dia ny faha-13-n’ny volana Adara. Io fotoana io indrindra anefa no tonga andro nahavoavonjy ny Jiosy ka namaliany ny fahavalony. Noho izany ny Jiosy dia nanao andro firavoravoana lehibe tamin’ny faha-13 sy faha-14 Adara, ary notendrena ho andro firavoravoana isan-taona ireo andro ireo ka nomena ny anarana hoe Porima, avy amin’ny hoe Pora.'
