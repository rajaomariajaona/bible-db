document_id: 1TH.INTRO1,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: imt1
    children:
    - type: text
      text: INDRAY MIJERY
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Ny epistily ho an’ny Tesaloniana no epistily nosoratan’i Paoly voalohany indrindra sady voasoratra voalohany indrindra tamin’ireo bokin’ny Testamenta Vaovao koa.
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Renivohitr’i Makedonia, faritany romana izay notetezin’i Paoly niaraka tamin’i Silasy sy i Timoty i Tesalonika. Tsy afaka nijanona ela tao ry Paoly noho ny fanenjehana nafitsoky ny Jiosy (Asa 17.1-9), kanefa tafaorina tao ihany ny fiangonana.
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Fiangonana tanora nahabe fanahiana ilay rainy am-panahy izao anoratana izao. Nirahin’i Paoly hamangy tany koa i Timoty mba hampahery ny Kristiana ka vaovao mahafaly momba ny finoan’ny olona tao amin’ny fiangonana tao Tesalonika no noentiny niverina tany amin’i Paoly izay tany Korinto:'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Naharitra tamin’ny finoana izy ireo ka nahafaly an’i Paoly indrindra izany.
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Tany Korinto (Asa 18.1-5) no nanoratan’i Paoly ny Epistily, tamin’ny andron’i Galio governora tao Akaia (Asa 18.12).
  - type: usfm
    marker: is1
    children:
    - type: text
      text: Ny votoatin’ny Epistily
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Misaotra an’Andriamanitra i Paoly noho ny vokatra tsara avy tamin’ny fitoriana ny Filazantsara tamin’ny Tesaloniana. Mampahery azy tokoa izany. Mampirisika azy ireo izy mba haharitra amin’izany sady handroso lalina kokoa hatrany amin’ny fiainana kristiana.
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Taratasin-draiamandreny ho an’ny zanaka am-panahy ity. Manan-toerana lehibe ato ny fampianarana ny amin’ny fiavian’ny Tompo, izay nihazona ny sain’ny Kristiana voalohany. Koa satria ho tonga tampoka izany fotoana izany dia tokony hiomana amin’ny fitondrantena mendrika ny mpivavaka.
  - type: usfm
    marker: iot
    children:
    - type: text
      text: Ny firafitry ny Epistily
  - type: usfm
    marker: io1
    children:
    - type: text
      text: 'Fiarahabana apostolika: 1.1'
  - type: usfm
    marker: io1
    children:
    - type: text
      text: 'Fisaorana an’Andriamanitra noho ny finoan’ny Tesaloniana sy fampaherezana azy ireo: 1.2–3.13'
  - type: usfm
    marker: io1
    children:
    - type: text
      text: 'Fitondrantena eo am-piandrasana ny fiavian’ny Tompo: 4.1–5.11'
  - type: usfm
    marker: io1
    children:
    - type: text
      text: 'Hafatra sy fanaovam-beloma: 5.12-28'
