document_id: JOS.3,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nitan’ny Zanak’Israely an’i Jordana
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nifoha vao maraina i Josoa ary izy sy ny Zanak’Israely rehetra dia niala tany Sitima ka nankany Jordana ary nitoetra teo izy aloha vao nita. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy i Josoa: Izao no hahafantaranareo fa eo aminareo Andriamanitra velona ka horoahiny eo alohanareo tokoa ny Kananita, ny Hetita, ny Hivita, ny Perizita, ny Girgasita, ny Amorita ary ny Jebosita: '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Indro, mandroso eo alohanareo ao anatin’i Jordana izao ny vata misy ny faneken’ny Tompon’ny tany rehetra. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa ankehitriny, makà lehilahy roa amby folo amin’ny fokon’ny Israely ho anareo, dia iray avy isam-poko; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ary raha vao miroboka ao amin’ny ranon’i Jordana ny faladian’ny mpisorona izay mitondra ny vata misy ny faneken’NY TOMPO, Tompon’ny tany rehetra, dia ho tapaka ny ranon’i Jordana, dia ny rano izay midina avy any ambony, ka hijanona ho toy ny antontan-javatra iray.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa niainga niala tamin’ny tranolainy hita an’i Jordana ny olona ary nitondra ny vata misy ny Fanekena eo alohany ny mpisorona '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ka tonga teo amin’i Jordana ireo izay nitondra ny vata misy ny Fanekena ary naroboky ny mpisorona izay nitondra ny vata misy ny Fanekena tamin’ny sisin-drano ny tongony, satria tondraka nihoatra ny morony rehetra i Jordana mandritra ny fararano, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia nijanona ny rano izay nidina avy tany ambony ka tonga toy ny antontan-javatra terỳ lavitra erỳ, dia terỳ amin’ny tanàna Adama, izay eo anilan’i Zaretana; eny, tena tapaka ny rano izay nidina ho any amin’ny ranomasin’ny tany ngazana, dia ny Ranomasintsira; ary nita tandrifin’i Jeriko ny olona. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ny mpisorona izay nitondra ny vata misy ny faneken’NY TOMPO dia nijoro tsara tamin’ny tany maina teo afovoan’i Jordana ary ny Israely rehetra dia nandeha tamin’ny tany maina mandra-pahatafitan’izy rehetra an’i Jordana.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa afaka hateloana dia nandeha namakivaky ny toby ny mpifehy '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ka nandidy ny olona hoe: Rehefa hitanareo ny vata misy ny faneken’NY TOMPO Andriamanitrareo entin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: levita
    - type: text
      text: ' mpisorona dia miaingà avy amin’izay itoeranareo ka manaraha azy. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Kanefa asio elanelany tokony ho roa arivo '
    - type: usfm
      marker: w
      children:
      - type: text
        text: hakiho
    - type: text
      text: ' aminareo sy izy, fa aza manakaiky azy, mba ho fantatrareo ny lalana izay mety halehanareo fa tsy mbola nalehanareo akory izao lalana izao. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy i Josoa tamin’ny olona: Manamasìna ny tenanareo fa rahampitso dia hanao fahagagana eo aminareo NY TOMPO. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary niteny tamin’ny mpisorona i Josoa hoe: Ento ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: vata misy ny Fanekena
    - type: text
      text: ' ka mità eo anoloan’ny olona. Dia nitondra ny vata misy ny Fanekena izy ireo ka nandeha teo anoloan’ny olona.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy NY TOMPO tamin’i Josoa: Anio Aho no hanomboka hanandratra anao eo imason’ny Israely rehetra, hahafantarany fa tahaka ny nombako an’i Mosesy no hombako anao koa. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary mandidia ny mpisorona izay mitondra ny vata misy ny Fanekena hoe: Rehefa tody eo amin’ny moron’ny ranon’i Jordana ianareo dia mijanòna ihany eo amin’ny Jordana. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary niteny tamin’ny Zanak’Israely i Josoa hoe: Manatòna atỳ ka mihainoa ny tenin’NY TOMPO Andriamanitrareo. '
