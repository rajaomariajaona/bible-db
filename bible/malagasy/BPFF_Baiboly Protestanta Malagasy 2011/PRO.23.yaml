document_id: PRO.23
type_code: plt
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Raha mipetraka hiara-komana amin’ny mpanapaka ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hevero tsara izay eo anoloanao
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ka ambeno amin’ny antsy ny tendanao
- type: usfm
  marker: q1
  children:
  - type: text
    text: raha dia mazoto homana loatra ianao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Aza mitsiriritra ny hanim-piny
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa hani-mamitaka izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Aza manasa-tena hanankarena;
- type: usfm
  marker: q1
  children:
  - type: text
    text: aza entina amin’izany ny fahendrenao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ampanarahanao ny harena va ny masonao
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa tsy eo intsony izy?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa maniry elatra tokoa izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka manidina toy ny voromahery ho eny amin’ny lanitra!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Aza homana ny mofon’izay ratsy fijery
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary aza mitsiriritra ny hanim-piny;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: fa tahaka ny heviny ao am-pony ihany ny toetrany.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Hoy izy aminao: Mihinàna, misotroa;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: kanjo tsy sitrany akory ianao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Izay sombiny kely voatelinao aza dia mbola haloanao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka ho very foana ny teny mahafinaritra nataonao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Aza miteny ao an-tsofin’ny adala,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa hohamavoiny foana ny fahendren’ny teninao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Aza manakisaka ny fanamarihana zaratany efa teo hatry ny ela,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary aza miditra ao amin’ny sahan’ny kamboty,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: fa mahery ny Mpanavotra azy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izy no hisolo vava azy amin’ny adiny aminao.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Torohevitra hafa koa
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Atodiho hanaiky ny fananarana ny fonao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary amin’ny tenim-pahalalana ny sofinao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Aza matahotra mananatra ny zanaka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa tsy ho faty izy tsy akory na dia kapohinao amin’ny hazo aza.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Raha mamely azy amin’ny hazo ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'dia ho voavonjinao tsy ho any amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: fitoeran’ny maty
  - type: text
    text: ' izy.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Anaka, raha hendry ny fonao
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ho faly koa ny foko;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: eny, ho ravoravo ato anatiko tokoa aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: raha milaza izay mahitsy ny molotrao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Aoka tsy hialona ny mpanota ny fonao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa matahora NY TOMPO mandritra ny andro;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: fa mbola misy ny ho avy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy ho foana ny fanantenanao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Mihainoa ianao, anaka, ka hendre
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ampizory amin’ny lala-mahitsy ny fonao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Aza misakaiza amin’izay mpiboboka divay
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy izay fatra-pitia hena;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: fa hahantra izay mpiboboka sy izay fatra-pitia hena,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny fitiavan-torimaso dia mampitafy vorodamba.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Maneke ny rainao izay niteraka anao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary aza manamavo ny reninao na dia efa antitra aza izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Vidio ny marina fa aza amidy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ny fahendrena sy ny fananarana ary ny fahazavan-tsaina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Feno fifaliana ny rain’ny olo-marina
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary izay miteraka zaza hendry dia manam-pifaliana aminy!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Aoka ho faly ny rainao sy ny reninao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, aoka ho ravoravo ny reninao izay niteraka anao!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Anaka, atolory ahy ny fonao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary aoka ny masonao hifaly amin’ny lalako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Fa ny vehivavy janga dia hady lalina
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny vehivavy jejo dia lava-drano ety;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: eny, manao vela-pandrika toy ny jiolahy ireny
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mahamaro ny olona mpivadika.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny mpimamo
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: An’iza ny Indrisy? An’iza ny Loza?
- type: usfm
  marker: q1
  children:
  - type: text
    text: An’iza ny fifandirana? An’iza ny fitolokoana?
- type: usfm
  marker: q1
  children:
  - type: text
    text: An’iza ny ratra tsy amin’antony?
- type: usfm
  marker: q1
  children:
  - type: text
    text: An’iza ny maso mivoaramena?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: An’izay mandany andro eo amin’ny divay,
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, an’izay mandeha hanandrana divay voaharoharo zavatra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Aza mijery ny divay noho ny hamenany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny fanganohanony ao anaty vera,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny fikoriany mahafinaritra;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: fa any aoriana any dia hanaikitra toy ny bibilava izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hanindrona toy ny menarana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Koa ny masonao dia hijery vehivavy jejo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny fonao hirediredy foana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Eny, ho sahala amin’izay mandry ao anaty ranomasina ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady ho tahaka izay mandry eo an-tendron’ny andrin-tsambo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Voakapoka aho, hoy ianao, nefa tsy reko naharary ahy!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Voadaroka aho, nefa tsy tsaroako izany!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Rahoviana ange aho no hifoha mba hitadiavako divay indray?
