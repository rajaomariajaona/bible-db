document_id: PRO.23,3103
type_code: plt
verses:
  '1':
  - type: text
    content: Raha mipetraka hiara-komana amin’ny mpanapaka ianao
  - type: text
    content: dia hevero tsara izay eo anoloanao
  '10':
  - type: text
    content: Aza manakisaka ny fanamarihana zaratany efa teo hatry ny ela,
  - type: text
    content: ary aza miditra ao amin’ny sahan’ny kamboty,
  '11':
  - type: text
    content: fa mahery ny Mpanavotra azy,
  - type: text
    content: Izy no hisolo vava azy amin’ny adiny aminao.
  - type: heading
    content: Torohevitra hafa koa
  '12':
  - type: text
    content: Atodiho hanaiky ny fananarana ny fonao
  - type: text
    content: ary amin’ny tenim-pahalalana ny sofinao.
  '13':
  - type: text
    content: Aza matahotra mananatra ny zanaka,
  - type: text
    content: fa tsy ho faty izy tsy akory na dia kapohinao amin’ny hazo aza.
  '14':
  - type: text
    content: Raha mamely azy amin’ny hazo ianao
  - type: text
    content: 'dia ho voavonjinao tsy ho any amin’ny '
  - type: text
    content: fitoeran’ny maty
  - type: text
    content: ' izy.'
  '15':
  - type: text
    content: Anaka, raha hendry ny fonao
  - type: text
    content: dia ho faly koa ny foko;
  '16':
  - type: text
    content: eny, ho ravoravo ato anatiko tokoa aho
  - type: text
    content: raha milaza izay mahitsy ny molotrao.
  '17':
  - type: text
    content: Aoka tsy hialona ny mpanota ny fonao,
  - type: text
    content: fa matahora NY TOMPO mandritra ny andro;
  '18':
  - type: text
    content: fa mbola misy ny ho avy
  - type: text
    content: ka tsy ho foana ny fanantenanao.
  '19':
  - type: text
    content: Mihainoa ianao, anaka, ka hendre
  - type: text
    content: ary ampizory amin’ny lala-mahitsy ny fonao.
  '2':
  - type: text
    content: ka ambeno amin’ny antsy ny tendanao
  - type: text
    content: raha dia mazoto homana loatra ianao.
  '20':
  - type: text
    content: Aza misakaiza amin’izay mpiboboka divay
  - type: text
    content: sy izay fatra-pitia hena;
  '21':
  - type: text
    content: fa hahantra izay mpiboboka sy izay fatra-pitia hena,
  - type: text
    content: ary ny fitiavan-torimaso dia mampitafy vorodamba.
  '22':
  - type: text
    content: Maneke ny rainao izay niteraka anao
  - type: text
    content: ary aza manamavo ny reninao na dia efa antitra aza izy.
  '23':
  - type: text
    content: Vidio ny marina fa aza amidy,
  - type: text
    content: dia ny fahendrena sy ny fananarana ary ny fahazavan-tsaina.
  '24':
  - type: text
    content: Feno fifaliana ny rain’ny olo-marina
  - type: text
    content: ary izay miteraka zaza hendry dia manam-pifaliana aminy!
  '25':
  - type: text
    content: Aoka ho faly ny rainao sy ny reninao;
  - type: text
    content: eny, aoka ho ravoravo ny reninao izay niteraka anao!
  '26':
  - type: text
    content: Anaka, atolory ahy ny fonao,
  - type: text
    content: ary aoka ny masonao hifaly amin’ny lalako.
  '27':
  - type: text
    content: Fa ny vehivavy janga dia hady lalina
  - type: text
    content: ary ny vehivavy jejo dia lava-drano ety;
  '28':
  - type: text
    content: eny, manao vela-pandrika toy ny jiolahy ireny
  - type: text
    content: ary mahamaro ny olona mpivadika.
  - type: heading
    content: Ny mpimamo
  '29':
  - type: text
    content: An’iza ny Indrisy? An’iza ny Loza?
  - type: text
    content: An’iza ny fifandirana? An’iza ny fitolokoana?
  - type: text
    content: An’iza ny ratra tsy amin’antony?
  - type: text
    content: An’iza ny maso mivoaramena?
  '3':
  - type: text
    content: Aza mitsiriritra ny hanim-piny
  - type: text
    content: fa hani-mamitaka izany.
  '30':
  - type: text
    content: An’izay mandany andro eo amin’ny divay,
  - type: text
    content: eny, an’izay mandeha hanandrana divay voaharoharo zavatra.
  '31':
  - type: text
    content: Aza mijery ny divay noho ny hamenany,
  - type: text
    content: sy ny fanganohanony ao anaty vera,
  - type: text
    content: ary ny fikoriany mahafinaritra;
  '32':
  - type: text
    content: fa any aoriana any dia hanaikitra toy ny bibilava izy
  - type: text
    content: ary hanindrona toy ny menarana.
  '33':
  - type: text
    content: Koa ny masonao dia hijery vehivavy jejo
  - type: text
    content: ary ny fonao hirediredy foana.
  '34':
  - type: text
    content: Eny, ho sahala amin’izay mandry ao anaty ranomasina ianao
  - type: text
    content: sady ho tahaka izay mandry eo an-tendron’ny andrin-tsambo.
  '35':
  - type: text
    content: Voakapoka aho, hoy ianao, nefa tsy reko naharary ahy!
  - type: text
    content: Voadaroka aho, nefa tsy tsaroako izany!
  - type: text
    content: Rahoviana ange aho no hifoha mba hitadiavako divay indray?
  '4':
  - type: text
    content: Aza manasa-tena hanankarena;
  - type: text
    content: aza entina amin’izany ny fahendrenao.
  '5':
  - type: text
    content: Ampanarahanao ny harena va ny masonao
  - type: text
    content: nefa tsy eo intsony izy?
  - type: text
    content: Fa maniry elatra tokoa izy
  - type: text
    content: ka manidina toy ny voromahery ho eny amin’ny lanitra!
  '6':
  - type: text
    content: Aza homana ny mofon’izay ratsy fijery
  - type: text
    content: ary aza mitsiriritra ny hanim-piny;
  '7':
  - type: text
    content: fa tahaka ny heviny ao am-pony ihany ny toetrany.
  - type: text
    content: 'Hoy izy aminao: Mihinàna, misotroa;'
  - type: text
    content: kanjo tsy sitrany akory ianao.
  '8':
  - type: text
    content: Izay sombiny kely voatelinao aza dia mbola haloanao
  - type: text
    content: ka ho very foana ny teny mahafinaritra nataonao.
  '9':
  - type: text
    content: Aza miteny ao an-tsofin’ny adala,
  - type: text
    content: fa hohamavoiny foana ny fahendren’ny teninao.
