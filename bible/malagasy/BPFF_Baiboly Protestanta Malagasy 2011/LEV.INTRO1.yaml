verses:
  '1':
  - type: text
    content: INDRAY MIJERY
  - type: text
    content: Ny votoatin’ny Boky
  - type: text
    content: 'Ny Boky Levitikosy dia mirakitra ireo fisoronana sy fanaovana fanatitra araka ny lalàna momba ny fanatitra, ny fahamasinana ary ny fahadiovana, araka ny nandidian’ny lalàna nomena tao Sinay: Ireo no hevi-baventy ao amin’ny Levitikosy. Koa na ny mpanao raharaham-pisoronana, na ny vahoaka, dia samy iantefan’ny hafatra fonosin’ireo hevitra ireo: «Tandremo ny didiko sy ny fitsipiko; fa raha mahatandrina izany ny olona dia ho velona amin’izany izy. Izaho no TOMPO.»'
  - type: text
    content: Tsy ny fombam-pivavahana rehetra anefa no hita ao amin’ny Levitikosy; ny hira sy ny tonom-bavaka ohatra dia ao amin’ny Bokin’ny Salamo no tena ahitana azy, fa ny Levitikosy dia manamafy ny fahamasinana izay tokony ho hita eo amin’ny vahoakan’Andriamanitra.
  - type: text
    content: Ny firafitry ny Boky
  - type: text
    content: 'Ny fanatitra: 1–7'
  - type: text
    content: 'Ny nanorenana ny asam-pisoronana: 8–10'
  - type: text
    content: 'Ny lalàna momba ny fahadiovana levitika: 11–18'
  - type: text
    content: 'Ny lalàna momba ny fahamasinana: 18–25'
  - type: text
    content: 'Fampahatsiahivana ny Fanekena: 26'
  - type: text
    content: 'Fanampiny: Lalàna momba ny voady: 27'
