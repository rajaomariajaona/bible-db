- type: usfm
  marker: imt1
  children:
  - type: text
    text: INDRAY MIJERY
- type: usfm
  marker: is1
  children:
  - type: text
    text: Ny votoatin’ny Boky
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Ny Boky Levitikosy dia mirakitra ireo fisoronana sy fanaovana fanatitra araka ny lalàna momba ny fanatitra, ny fahamasinana ary ny fahadiovana, araka ny nandidian’ny lalàna nomena tao Sinay: Ireo no hevi-baventy ao amin’ny Levitikosy. Koa na ny mpanao raharaham-pisoronana, na ny vahoaka, dia samy iantefan’ny hafatra fonosin’ireo hevitra ireo: «Tandremo ny didiko sy ny fitsipiko; fa raha mahatandrina izany ny olona dia ho velona amin’izany izy. Izaho no TOMPO.»'
- type: usfm
  marker: ip
  children:
  - type: text
    text: Tsy ny fombam-pivavahana rehetra anefa no hita ao amin’ny Levitikosy; ny hira sy ny tonom-bavaka ohatra dia ao amin’ny Bokin’ny Salamo no tena ahitana azy, fa ny Levitikosy dia manamafy ny fahamasinana izay tokony ho hita eo amin’ny vahoakan’Andriamanitra.
- type: usfm
  marker: iot
  children:
  - type: text
    text: Ny firafitry ny Boky
- type: usfm
  marker: io1
  children:
  - type: text
    text: 'Ny fanatitra: 1–7'
- type: usfm
  marker: io1
  children:
  - type: text
    text: 'Ny nanorenana ny asam-pisoronana: 8–10'
- type: usfm
  marker: io1
  children:
  - type: text
    text: 'Ny lalàna momba ny fahadiovana levitika: 11–18'
- type: usfm
  marker: io1
  children:
  - type: text
    text: 'Ny lalàna momba ny fahamasinana: 18–25'
- type: usfm
  marker: io1
  children:
  - type: text
    text: 'Fampahatsiahivana ny Fanekena: 26'
- type: usfm
  marker: io1
  children:
  - type: text
    text: 'Fanampiny: Lalàna momba ny voady: 27'
