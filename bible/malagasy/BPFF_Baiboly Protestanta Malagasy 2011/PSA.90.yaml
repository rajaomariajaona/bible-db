document_id: PSA.90,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: BOKY FAHEFATRA
  - type: heading
    content: Ny olona dia mandalo fa Andriamanitra no maharitra
  - type: text
    content: Vavaka nataon’i Mosesy, lehilahin’Andriamanitra.
  - type: text
    content: Tompo ô, efa fonenanay hatramin’ny taranaka rehetra Ianao.
  '10':
  - type: text
    content: Fitopolo taona ny halavan’ny andronay
  - type: text
    content: ary raha toa ka mateza aza dia valopolo taona,
  - type: text
    content: nefa fahasasarana sy zava-poana ny voninahiny
  - type: text
    content: fa mihelina haingana izany ka lasa manidina izahay.
  '11':
  - type: text
    content: Iza no mahafantatra ny herin’ny fahatezeranao sy ny fahaviniranao
  - type: text
    content: araka izay tokony ho fahatahorana Anao?
  '12':
  - type: text
    content: Mampianara anay hanisa ny andronay,
  - type: text
    content: hahazoanay fo hendry.
  '13':
  - type: text
    content: Miverena, TOMPO ô! Mandra-pahoviana?
  - type: text
    content: Mba aneneno ny aminay mpanomponao!
  '14':
  - type: text
    content: Vokiso ny famindramponao nony maraina izahay
  - type: text
    content: mba hihobianay sy hifalianay amin’ny andro rehetra hiainanay.
  '15':
  - type: text
    content: Mampifalia anay araka ny andro nampahorianao anay
  - type: text
    content: sy ny taona nahitanay loza.
  '16':
  - type: text
    content: Aoka hiseho aminay mpanomponao ny asanao
  - type: text
    content: ary ny voninahitrao amin’ny zanakay.
  '17':
  - type: text
    content: Aoka ho aminay ny fahasoavan’ny Tompo Andriamanitray!
  - type: text
    content: Ampitoero aminay ny asan’ny tananay;
  - type: text
    content: Eny, ny asan’ny tananay, ampitoero izy!
  '2':
  - type: text
    content: Fony tsy mbola ary ny tendrombohitra,
  - type: text
    content: na voaforonao ny tany sy izao rehetra izao,
  - type: text
    content: dia Andriamanitra Ianao, hatramin’ny taloha indrindra ka ho mandrakizay.
  '3':
  - type: text
    content: Mamerina ny olona ho amin’ny vovoka Ianao
  - type: text
    content: 'ka miteny hoe: Miverena, ry zanak’olombelona!'
  '4':
  - type: text
    content: Fa eo imasonao ny arivo taona dia toy ny fandalon’ny omaly
  - type: text
    content: ary tahaka ny fotoam-piambenana iray amin’ny alina.
  '5':
  - type: text
    content: Mipaoka azy tahaka ny riaka Ianao; torimaso izy;
  - type: text
    content: amin’ny maraina dia tahaka ny ahitra mora miova izy;
  '6':
  - type: text
    content: amin’ny maraina dia mamony izy nefa mora miova;
  - type: text
    content: amin’ny hariva dia voajinja izy ka maina.
  '7':
  - type: text
    content: Lanin’ny fahatezeranao izahay
  - type: text
    content: ary raiki-tahotra noho ny fahaviniranao.
  '8':
  - type: text
    content: Ny helokay dia nataonao teo anatrehanao
  - type: text
    content: ary ny fahotanay miafina dia nataonao teo amin’ny fahazavan’ny tavanao.
  '9':
  - type: text
    content: Fa ny andronay rehetra dia mandalo noho ny fahatezeranao;
  - type: text
    content: laninay toy ny eritreritra ny taonanay.
