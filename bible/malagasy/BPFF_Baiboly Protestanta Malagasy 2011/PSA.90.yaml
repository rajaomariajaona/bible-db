document_id: PSA.90,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: BOKY FAHEFATRA
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny olona dia mandalo fa Andriamanitra no maharitra
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: Vavaka nataon’i Mosesy, lehilahin’Andriamanitra.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tompo ô, efa fonenanay hatramin’ny taranaka rehetra Ianao.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fitopolo taona ny halavan’ny andronay
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary raha toa ka mateza aza dia valopolo taona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa fahasasarana sy zava-poana ny voninahiny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa mihelina haingana izany ka lasa manidina izahay.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Iza no mahafantatra ny herin’ny fahatezeranao sy ny fahaviniranao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: araka izay tokony ho fahatahorana Anao?
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mampianara anay hanisa ny andronay,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hahazoanay fo hendry.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miverena, TOMPO ô! Mandra-pahoviana?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mba aneneno ny aminay mpanomponao!
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vokiso ny famindramponao nony maraina izahay
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hihobianay sy hifalianay amin’ny andro rehetra hiainanay.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mampifalia anay araka ny andro nampahorianao anay
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny taona nahitanay loza.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka hiseho aminay mpanomponao ny asanao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny voninahitrao amin’ny zanakay.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka ho aminay ny fahasoavan’ny Tompo Andriamanitray!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ampitoero aminay ny asan’ny tananay;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, ny asan’ny tananay, ampitoero izy!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fony tsy mbola ary ny tendrombohitra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na voaforonao ny tany sy izao rehetra izao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia Andriamanitra Ianao, hatramin’ny taloha indrindra ka ho mandrakizay.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mamerina ny olona ho amin’ny vovoka Ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ka miteny hoe: Miverena, ry zanak’olombelona!'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa eo imasonao ny arivo taona dia toy ny fandalon’ny omaly
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tahaka ny fotoam-piambenana iray amin’ny alina.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mipaoka azy tahaka ny riaka Ianao; torimaso izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: amin’ny maraina dia tahaka ny ahitra mora miova izy;
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: amin’ny maraina dia mamony izy nefa mora miova;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: amin’ny hariva dia voajinja izy ka maina.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lanin’ny fahatezeranao izahay
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary raiki-tahotra noho ny fahaviniranao.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny helokay dia nataonao teo anatrehanao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny fahotanay miafina dia nataonao teo amin’ny fahazavan’ny tavanao.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny andronay rehetra dia mandalo noho ny fahatezeranao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: laninay toy ny eritreritra ny taonanay.
