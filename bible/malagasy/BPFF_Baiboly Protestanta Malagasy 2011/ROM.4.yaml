document_id: ROM.4,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny ohatra nomen’i Abrahama
  - type: text
    content: 'Inona ary no holazaintsika fa efa azon’i Abrahama razantsika araka ny nofo? '
  '10':
  - type: text
    content: 'Ary ahoana no nanisana izany? Tamin’izy efa voafora va, sa fony izy tsy mbola voafora? Tsy tamin’izy efa voafora tsy akory, fa fony izy tsy mbola voafora. '
  '11':
  - type: text
    content: 'Nandray ny famantarana amin’ny famorana izy, toy ny tombo-kasen’ny fahamarinana amin’ny finoana izay nananany fony izy tsy mbola voafora, mba ho rain’izay rehetra mino izy na dia ny tsy voafora aza, mba hisaina ho an’ireny koa ny fahamarinana. '
  '12':
  - type: text
    content: Rain’ny voafora tokoa izy; tsy izay voafora ihany, fa izay manaraka ny dian’ny finoan’i Abrahama raintsika koa, dia izay nananany fony izy tsy mbola voafora.
  - type: heading
    content: Ny teny fikasan’Andriamanitra raisina amin’ny finoana
  '13':
  - type: text
    content: 'Tsy tamin’ny lalàna anefa no nahazoan’i Abrahama sy ny taranany ny teny fikasana ho mpandova an’izao rehetra izao fa tamin’ny fahamarinana amin’ny finoana. '
  '14':
  - type: text
    content: 'Fa raha ireo avy amin’ny lalàna no mpandova dia tonga foana ny finoana, ary tonga tsinontsinona ny teny fikasana. '
  '15':
  - type: text
    content: Mahatonga fahatezerana mantsy ny lalàna; fa raha tsy misy lalàna dia tsy misy fandikan-dalàna.
  '16':
  - type: text
    content: 'Noho izany dia ny finoana no hahatò ny teny fikasana ho an’ny taranaka rehetra, mba ho araka ny fahasoavana, tsy ho an’izay avy amin’ny lalàna ihany fa ho an’izay avy amin’ny finoan’i Abrahama koa, dia ilay raintsika rehetra, '
  '17':
  - type: text
    content: 'araka ny voasoratra hoe: «Nataoko rain’ny firenena maro ianao» (Gen 17.5). Raintsika izy eo anatrehan’Izay ninoany: Andriamanitra izay mamelona ny maty sy miantso ny tsy misy ho misy.'
  '18':
  - type: text
    content: 'Na dia efa tsy nisy nanantenana aza dia nanantena ihany izy ka nino, mba ho tonga rain’ny firenena maro; araka ny voalaza hoe: «Ho tahaka izany ny taranakao» (Gen 15.5). '
  '19':
  - type: text
    content: 'Tsy mba nalemy finoana izy na dia nihevitra ny tenany ho efa toy ny maty aza, satria efa tokony ho zato taona izy, toy izany koa ny fahafatesan’ny kibon’i Saraha. '
  '2':
  - type: text
    content: 'Raha asa tokoa mantsy no nanamarinana an’i Abrahama dia misy hireharehany ihany, saingy tsy eo anatrehan’Andriamanitra. '
  '20':
  - type: text
    content: 'Tsy nisalasala tamin’ny tsy finoana ny amin’ny teny fikasan’Andriamanitra izy fa nampaherezin’ny finoana ka nanome voninahitra an’Andriamanitra '
  '21':
  - type: text
    content: 'sady natoky tanteraka fa izay nolazainy dia hainy hatao tokoa. '
  '22':
  - type: text
    content: Dia nisaina ho fahamarinany izany.
  '23':
  - type: text
    content: 'Nefa tsy ho azy ihany no nanoratana hoe: Nisaina ho azy izany, '
  '24':
  - type: text
    content: 'fa ho antsika izay hanisana izany koa, dia isika izay mino Ilay nanangana an’i Jesosy Tompontsika tamin’ny maty, '
  '25':
  - type: text
    content: Izay natolotra noho ny fahadisoantsika ary natsangana indray ho fanamarinana antsika.
  '3':
  - type: text
    content: 'Fa ahoana hoy ny Soratra Masina? «Ary nino an’Andriamanitra i Abrahama ka nisaina ho fahamarinany izany» (Gen 15.6). '
  '4':
  - type: text
    content: 'Ho an’izay miasa dia tsy isaina ho toy ny fahasoavana ny karama fa ho toy ny trosa. '
  '5':
  - type: text
    content: 'Fa ho an’izay tsy miasa kosa nefa mino Izay manamarina ny ratsy fanahy, dia ny finoany no isaina ho fahamarinana. '
  '6':
  - type: text
    content: 'Izany no ilazan’i Davida ny fahasambaran’ny olona izay isain’Andriamanitra fahamarinana tsy amin’ny asa:'
  '7':
  - type: text
    content: «Sambatra ireo izay voavela ny helony
  - type: text
    content: sy voasarona ny fahotany.
  '8':
  - type: text
    content: Sambatra izay olona tsy isain’NY TOMPO heloka» (Sal 32.1-2).
  '9':
  - type: text
    content: 'Koa izany fahasambarana izany, moa an’ny voafora ihany va, sa an’ny tsy voafora koa? Satria lazaintsika fa ny finoana no nisaina ho fahamarinan’i Abrahama. '
