document_id: ROM.4,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny ohatra nomen’i Abrahama
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Inona ary no holazaintsika fa efa azon’i Abrahama razantsika araka ny nofo? '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ary ahoana no nanisana izany? Tamin’izy efa voafora va, sa fony izy tsy mbola voafora? Tsy tamin’izy efa voafora tsy akory, fa fony izy tsy mbola voafora. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Nandray ny famantarana amin’ny famorana izy, toy ny tombo-kasen’ny fahamarinana amin’ny finoana izay nananany fony izy tsy mbola voafora, mba ho rain’izay rehetra mino izy na dia ny tsy voafora aza, mba hisaina ho an’ireny koa ny fahamarinana. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Rain’ny voafora tokoa izy; tsy izay voafora ihany, fa izay manaraka ny dian’ny finoan’i Abrahama raintsika koa, dia izay nananany fony izy tsy mbola voafora.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny teny fikasan’Andriamanitra raisina amin’ny finoana
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Tsy tamin’ny lalàna anefa no nahazoan’i Abrahama sy ny taranany ny teny fikasana ho mpandova an’izao rehetra izao fa tamin’ny fahamarinana amin’ny finoana. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Fa raha ireo avy amin’ny lalàna no mpandova dia tonga foana ny finoana, ary tonga tsinontsinona ny teny fikasana. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Mahatonga fahatezerana mantsy ny lalàna; fa raha tsy misy lalàna dia tsy misy fandikan-dalàna.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Noho izany dia ny finoana no hahatò ny teny fikasana ho an’ny taranaka rehetra, mba ho araka ny fahasoavana, tsy ho an’izay avy amin’ny lalàna ihany fa ho an’izay avy amin’ny finoan’i Abrahama koa, dia ilay raintsika rehetra, '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'araka ny voasoratra hoe: «Nataoko rain’ny firenena maro ianao» (Gen 17.5). Raintsika izy eo anatrehan’Izay ninoany: Andriamanitra izay mamelona ny maty sy miantso ny tsy misy ho misy.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Na dia efa tsy nisy nanantenana aza dia nanantena ihany izy ka nino, mba ho tonga rain’ny firenena maro; araka ny voalaza hoe: «Ho tahaka izany ny taranakao» (Gen 15.5). '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Tsy mba nalemy finoana izy na dia nihevitra ny tenany ho efa toy ny maty aza, satria efa tokony ho zato taona izy, toy izany koa ny fahafatesan’ny kibon’i Saraha. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Raha asa tokoa mantsy no nanamarinana an’i Abrahama dia misy hireharehany ihany, saingy tsy eo anatrehan’Andriamanitra. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Tsy nisalasala tamin’ny tsy finoana ny amin’ny teny fikasan’Andriamanitra izy fa nampaherezin’ny finoana ka nanome voninahitra an’Andriamanitra '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'sady natoky tanteraka fa izay nolazainy dia hainy hatao tokoa. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Dia nisaina ho fahamarinany izany.
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Nefa tsy ho azy ihany no nanoratana hoe: Nisaina ho azy izany, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'fa ho antsika izay hanisana izany koa, dia isika izay mino Ilay nanangana an’i Jesosy Tompontsika tamin’ny maty, '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Izay natolotra noho ny fahadisoantsika ary natsangana indray ho fanamarinana antsika.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Fa ahoana hoy ny Soratra Masina? «Ary nino an’Andriamanitra i Abrahama ka nisaina ho fahamarinany izany» (Gen 15.6). '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ho an’izay miasa dia tsy isaina ho toy ny fahasoavana ny karama fa ho toy ny trosa. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Fa ho an’izay tsy miasa kosa nefa mino Izay manamarina ny ratsy fanahy, dia ny finoany no isaina ho fahamarinana. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Izany no ilazan’i Davida ny fahasambaran’ny olona izay isain’Andriamanitra fahamarinana tsy amin’ny asa:'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: «Sambatra ireo izay voavela ny helony
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy voasarona ny fahotany.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Sambatra izay olona tsy isain’NY TOMPO heloka» (Sal 32.1-2).
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Koa izany fahasambarana izany, moa an’ny voafora ihany va, sa an’ny tsy voafora koa? Satria lazaintsika fa ny finoana no nisaina ho fahamarinan’i Abrahama. '
