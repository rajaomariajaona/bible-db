document_id: PSA.46
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: NY TOMPO no momba antsika
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: Ho an’ny mpiventy hira. Nataon’ny Koraìta. Al-alamot. Tononkira.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Andriamanitra no fialofana sy hery ho antsika;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mpamonjy mora azo indrindra amin’ny fahoriana Izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Koa izany no tsy atahorantsika na dia mihovotrovotra aza ny tany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: na dia mifindra ho ao anatin’ny ranomasina aza ny tendrombohitra,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: na mirohondrohona sy misamboaravoara aza ny onjany
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ka mihorohoro ny tendrombohitra noho ny fisafoakany. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Fiatoana
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Misy ony iray, koa ny sampany dia mampifaly ny tanànan’Andriamanitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fonena-masin’ny Avo Indrindra;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Andriamanitra no eo afovoany ka tsy mba hihetsika akory izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Andriamanitra no hamonjy azy rehefa madiva ho maraina ny andro.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Mitabataba ny firenen-tsamihafa, mikorontana ny fanjakana maro;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mamoaka ny feony Izy ka niempo ny tany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Andriamanitra, Tompon’izao rehetra izao, no momba antsika,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Andriamanitr’i Jakoba no fiarovana avo ho antsika. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Fiatoana
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Avia, jereo ny asan’NY TOMPO,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa mahatonga faharavana etỳ ambonin’ny tany Izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Mampitsahatra ady hatrany amin’ny faran’ny tany Izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mamotipotika ny tsipìka sy manapaka ny lefona Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mandoro ny sarety amin’ny afo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Mitsahara ka aoka ho fantatrareo fa Izaho no Andriamanitra!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hisandratra amin’ny firenen-tsamihafa Aho, hisandratra amin’ny tany Aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Andriamanitra, Tompon’izao rehetra izao, no momba antsika,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Andriamanitr’i Jakoba no fiarovana avo ho antsika. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Fiatoana
