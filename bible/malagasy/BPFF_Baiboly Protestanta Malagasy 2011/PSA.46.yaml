document_id: PSA.46,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: NY TOMPO no momba antsika
  - type: text
    content: Ho an’ny mpiventy hira. Nataon’ny Koraìta. Al-alamot. Tononkira.
  - type: text
    content: Andriamanitra no fialofana sy hery ho antsika;
  - type: text
    content: Mpamonjy mora azo indrindra amin’ny fahoriana Izy.
  '10':
  - type: text
    content: Mitsahara ka aoka ho fantatrareo fa Izaho no Andriamanitra!
  - type: text
    content: Hisandratra amin’ny firenen-tsamihafa Aho, hisandratra amin’ny tany Aho.
  '11':
  - type: text
    content: Andriamanitra, Tompon’izao rehetra izao, no momba antsika,
  - type: text
    content: 'Andriamanitr’i Jakoba no fiarovana avo ho antsika. '
  - type: text
    content: Fiatoana
  '2':
  - type: text
    content: Koa izany no tsy atahorantsika na dia mihovotrovotra aza ny tany,
  - type: text
    content: na dia mifindra ho ao anatin’ny ranomasina aza ny tendrombohitra,
  '3':
  - type: text
    content: na mirohondrohona sy misamboaravoara aza ny onjany
  - type: text
    content: 'ka mihorohoro ny tendrombohitra noho ny fisafoakany. '
  - type: text
    content: Fiatoana
  '4':
  - type: text
    content: Misy ony iray, koa ny sampany dia mampifaly ny tanànan’Andriamanitra,
  - type: text
    content: fonena-masin’ny Avo Indrindra;
  '5':
  - type: text
    content: Andriamanitra no eo afovoany ka tsy mba hihetsika akory izy;
  - type: text
    content: Andriamanitra no hamonjy azy rehefa madiva ho maraina ny andro.
  '6':
  - type: text
    content: Mitabataba ny firenen-tsamihafa, mikorontana ny fanjakana maro;
  - type: text
    content: mamoaka ny feony Izy ka niempo ny tany.
  '7':
  - type: text
    content: Andriamanitra, Tompon’izao rehetra izao, no momba antsika,
  - type: text
    content: 'Andriamanitr’i Jakoba no fiarovana avo ho antsika. '
  - type: text
    content: Fiatoana
  '8':
  - type: text
    content: Avia, jereo ny asan’NY TOMPO,
  - type: text
    content: fa mahatonga faharavana etỳ ambonin’ny tany Izy.
  '9':
  - type: text
    content: Mampitsahatra ady hatrany amin’ny faran’ny tany Izy,
  - type: text
    content: mamotipotika ny tsipìka sy manapaka ny lefona Izy
  - type: text
    content: ary mandoro ny sarety amin’ny afo.
