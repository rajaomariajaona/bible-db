document_id: LUK.11
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesosy sy ny vavaka
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat 6.9-13
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Nivavaka tao amin’ny toerana iray Jesosy, koa rehefa nitsahatra Izy dia hoy ny mpianany iray Taminy: Tompoko, mampianara anay hivavaka, tahaka ny nampianaran’i Jaona ny mpianany koa.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Hoy Izy taminy: Raha mivavaka ianareo dia ataovy hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ray ô,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hohamasinina anie ny anaranao.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ho tonga anie ny fanjakanao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Omeo anay isanandro izay hanina sahaza ho anay.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ary mamelà ny helokay;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa izahay koa dia mamela izay rehetra meloka aminay.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary aza mitondra anay ho amin’ny fakam-panahy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Hoy koa Jesosy taminy: Iza moa aminareo no manana sakaiza izay hankeo aminy mamatonalina ka hilaza aminy hoe: Ry sakaiza, ampisambory mofo telo aho; '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'fa ny namako dia tonga ao amiko avy tany amin’ny nalehany ka tsy misy harosoko azy; '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'ary ilay ao an-trano kosa dia hamaly hoe: Aza manahirana ahy; fa efa mihidy ny varavarana izao, ary ny zanako dia efa mandry eto am-pandriana miaraka amiko; tsy afaka hifoha hanome anao aho. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Hoy Izaho aminareo: Na dia tsy hiainga hanome azy noho ny fihavanana aza izy dia hifoha ihany izy noho ny fitarainany fatratra ka hanome azy izay ilainy.'
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat 7.7-11
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Hoy Izaho aminareo: Mangataha dia homena ianareo; mitadiava dia hahita ianareo; dondòny dia hovohana ianareo. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Fa izay rehetra mangataka no mahazo; ary izay mitady no mahita; ary izay mandondòna no hovohana. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Fa iza moa aminareo izay ray, raha angatahan’ny zanany mofo, no hanome azy vato? Na angatahany hazandrano ka hanome azy menarana ho solon’ny hazandrano? '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Na angatahany atody ka hanome azy maingoka? '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Koa raha ianareo, na dia ratsy aza, mahay hanome zava-tsoa ho an’ny zanakareo, tsy mainka va ny Ray izay any an-danitra no hanome ny Fanahy Masina ho an’izay mangataka Aminy?
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mifandray amin’ny demonia va Jesosy?
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat 12.22-30; Mar 3.22-27
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Nandroaka '
  - type: usfm
    marker: w
    children:
    - type: text
      text: demonia
  - type: text
    text: ' moana Jesosy. Ary rehefa niala ny demonia dia niteny ilay moana ka gaga ny vahoaka. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Fa hoy ny sasany: Amin’ny alalan’i Belzeboba, lehiben’ny demonia, no androahany ny demonia. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Fa ny sasany kosa dia naka fanahy Azy ka nangataka famantarana avy any an-danitra Taminy. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Fa nahalala ny heviny Izy ka niteny taminy hoe: Ho foana ny fanjakana rehetra izay miady an-trano; ary ho rava ny ankohonana izay miady an-trano. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary raha i Satana koa aza no miady an-trano, ahoana no haharetan’ny fanjakany? Fa hoy ianareo: Amin’ny alalan’i Belzeboba no androahako ny demonia. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Fa raha Izaho mandroaka demonia amin’ny alalan’i Belzeboba dia amin’ny alalan’iza kosa no androahan’ny zanakareo azy? Koa amin’izany dia ho mpitsara anareo ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Fa raha ny rantsantanan’Andriamanitra no androahako ny demonia dia efa tonga aminareo tokoa ny fanjakan’Andriamanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Raha ny mahery mivonona amin’ny fiadiany no miaro ny tranony dia tsy haninona ny fananany. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Fa raha avy kosa izay mahery noho izy ka mandresy azy dia alainy ny fiadiany rehetra izay nitokiany, ary izay azony ho babo dia zarainy. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Izay tsy momba Ahy dia manohitra Ahy; ary izay tsy miara-mamory Amiko dia mampihahaka.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fiverenan’ny fanahy maloto
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat 12.43-45
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Raha miala amin’ny olona ny fanahy maloto dia mandeha mitety ny tany tsy misy rano izy, mitady fitsaharana; ary rehefa tsy mahita dia hoy izy: Hody any an-tranoko izay nialako aho. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Nony tonga izy dia hitany fa voafafa sy voalamina ny trano. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Dia mandeha izy ka mitondra fanahy fito hafa koa izay ratsy noho izy; dia miditra ireo ka mitoetra ao; ary ny fiafaran’izany olona izany dia ratsy noho ny tamin’ny voalohany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny tena fahasambarana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Raha nilaza izany Jesosy dia nisy vehivavy iray teo amin’ny vahoaka niantso ka niteny taminy hoe: Sambatra ny kibo izay nitondra Anao sy ny nono izay ninonoanao. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Fa hoy Izy: Sambatra kokoa izay mandre ny tenin’Andriamanitra ka mitandrina izany.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny famantarana ny amin’i Jona sy ny Zanak’Olona
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat 12.38-42
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Raha mbola niangona ny vahoaka betsaka dia nilaza Izy hoe: Ity taranaka ity dia taranaka ratsy. Mitady famantarana izy; nefa tsy hisy famantarana homena azy, afa-tsy ny famantarana ny amin’i Jona; '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'fa tahaka an’i Jona, izay famantarana tamin’ny Ninivita, dia ho toy izany koa ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Zanak’Olona
  - type: text
    text: ' amin’ity taranaka ity. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ny mpanjakavavy avy any atsimo dia hiara-mitsangana amin’ny lehilahy amin’ity taranaka ity amin’ny andro fitsarana ka hanameloka azy; fa avy any amin’ny faran’ny tany izy hihaino ny fahendren’i Solomona; nefa indro, misy lehibe noho i Solomona eto. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Hiara-mitsangana amin’ity taranaka ity amin’ny andro fitsarana ny olona tany Ninive ka hanameloka azy, fa izy ireo dia nibebaka tamin’ny nitorian’i Jona teny; nefa indro, misy lehibe noho i Jona eto.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny jiron’ny tena
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Tsy misy olona mandrehitra jiro ka mametraka azy ao an-davaka na ao ambanin’ny vata famarana, fa apetrany eo amin’ny fitoeran-jiro izany mba ho hitan’izay miditra ny mazava.
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat 6.22-23
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ny masonao no jiron’ny tena; koa raha tsara ny masonao dia mazava ny tenanao manontolo; fa raha ratsy izany dia maizina koa ny tenanao. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Koa tandremo mba tsy ho maizina ny mazava izay ao anatinao. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Ary amin’izany, raha mazava ny tenanao manontolo ka tsy misy faritra maizina, dia hazava avokoa izy manontolo, tahaka ny jiro raha mirehitra tsara ka manazava anao.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Manameloka ireo Fariseo sy ireo manampahaizana momba ny Lalàna Jesosy
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat 23.4-36
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Raha mbola niteny Jesosy dia nisy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Fariseo
  - type: text
    text: ' nanasa Azy hisakafo ao aminy; dia niditra Izy ka nipetraka nisakafo. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Dia gaga ilay Fariseo, raha nahita, fa tsy nisasa Izy talohan’ny sakafo. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Fa hoy ny Tompo taminy: Ankehitriny ianareo Fariseo dia manadio ny ivelan’ny kapoaka sy ny lovia, nefa ny ao anatinareo kosa dia feno fandrobana sy faharatsiana. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Ry adala! Tsy Izay nanao ny ivelany va no nanao ny atiny koa? '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: Koa ny zavatra ao anatiny no omeo ho fiantrana, dia indro, ho madio ho anareo ny zavatra rehetra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: Fa lozanareo, Fariseo! Fa mandoa ny fahafolon’ny solila sy ny rota ary izay anana famboly rehetra ianareo, nefa lalovanareo ny fitsarana sy ny fitiavana an’Andriamanitra; ireto tokony ho nataonareo, nefa tsy tokony havelanareo iretsy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Lozanareo, Fariseo! Fa tia ny toerana eny aloha ao amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sinagoga
  - type: text
    text: ' sy ny fiarahabana any an-tsena ianareo.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: Lozanareo, fa ianareo dia tahaka ny fasana tsy misy hahafantarana azy ka tsy fantatry ny olona izay manitsaka azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Ary hoy ny iray tamin’ireo mpahay lalàna Taminy: Mpampianatra ô, raha miteny izany Ianao, dia manala baraka anay koa.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Fa hoy Jesosy: Lozanareo, mpahay lalàna koa! Fa mampitondra entana sarotra entina ny olona ianareo, nefa tsy mikasika izany entana izany akory ianareo na dia amin’ny rantsantananareo iray aza.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Lozanareo! Fa manorina ny fasan’ny mpaminany ianareo, nefa ny razanareo ihany no namono azy ireny. '
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Dia vavolombelona ianareo ka mankasitraka ny asan’ny razanareo; fa izy ireny no namono azy, ary ianareo kosa dia manorina ny fasany. '
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'Koa izany no nilazan’ny fahendren’Andriamanitra hoe: Haniraka mpaminany sy Apostoly ho any aminy Aho, koa ny sasany dia hovonoiny, ary ny sasany dia henjehiny, '
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'mba hadinina amin’ity taranaka ity ny ran’ny mpaminany rehetra izay nalatsaka hatramin’ny nanorenana izao tontolo izao, '
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: dia hatramin’ny ran’i Abela ka hatramin’ny ran’i Zakaria, izay novonoina teo anelanelan’ny alitara sy ny tempoly. Eny, lazaiko aminareo fa hadinina amin’ity taranaka ity izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '52'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: Lozanareo, mpahay lalàna satria nalainareo ny fanalahidin’ny fahalalana; ianareo dia tsy niditra ary izay te hiditra dia nosakananareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '53'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'Ary raha niala teo Izy dia nanomboka nanery Azy tamin-katezerana ny mpanoradalàna sy ny Fariseo ka nampiteny Azy momba ny zavatra maro. '
  - type: usfm
    marker: v
    metadata:
      v: '54'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: Dia nikendry Azy izy ireo mba hamandrika Azy amin’izay teny aloaky ny vavany.
