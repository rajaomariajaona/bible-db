document_id: LUK.11,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Jesosy sy ny vavaka
  - type: heading
    content: Mat 6.9-13
  - type: text
    content: 'Nivavaka tao amin’ny toerana iray Jesosy, koa rehefa nitsahatra Izy dia hoy ny mpianany iray Taminy: Tompoko, mampianara anay hivavaka, tahaka ny nampianaran’i Jaona ny mpianany koa.'
  '10':
  - type: text
    content: 'Fa izay rehetra mangataka no mahazo; ary izay mitady no mahita; ary izay mandondòna no hovohana. '
  '11':
  - type: text
    content: 'Fa iza moa aminareo izay ray, raha angatahan’ny zanany mofo, no hanome azy vato? Na angatahany hazandrano ka hanome azy menarana ho solon’ny hazandrano? '
  '12':
  - type: text
    content: 'Na angatahany atody ka hanome azy maingoka? '
  '13':
  - type: text
    content: Koa raha ianareo, na dia ratsy aza, mahay hanome zava-tsoa ho an’ny zanakareo, tsy mainka va ny Ray izay any an-danitra no hanome ny Fanahy Masina ho an’izay mangataka Aminy?
  - type: heading
    content: Mifandray amin’ny demonia va Jesosy?
  - type: heading
    content: Mat 12.22-30; Mar 3.22-27
  '14':
  - type: text
    content: 'Nandroaka '
  - type: text
    content: demonia
  - type: text
    content: ' moana Jesosy. Ary rehefa niala ny demonia dia niteny ilay moana ka gaga ny vahoaka. '
  '15':
  - type: text
    content: 'Fa hoy ny sasany: Amin’ny alalan’i Belzeboba, lehiben’ny demonia, no androahany ny demonia. '
  '16':
  - type: text
    content: 'Fa ny sasany kosa dia naka fanahy Azy ka nangataka famantarana avy any an-danitra Taminy. '
  '17':
  - type: text
    content: 'Fa nahalala ny heviny Izy ka niteny taminy hoe: Ho foana ny fanjakana rehetra izay miady an-trano; ary ho rava ny ankohonana izay miady an-trano. '
  '18':
  - type: text
    content: 'Ary raha i Satana koa aza no miady an-trano, ahoana no haharetan’ny fanjakany? Fa hoy ianareo: Amin’ny alalan’i Belzeboba no androahako ny demonia. '
  '19':
  - type: text
    content: 'Fa raha Izaho mandroaka demonia amin’ny alalan’i Belzeboba dia amin’ny alalan’iza kosa no androahan’ny zanakareo azy? Koa amin’izany dia ho mpitsara anareo ireo. '
  '2':
  - type: text
    content: 'Hoy Izy taminy: Raha mivavaka ianareo dia ataovy hoe:'
  - type: text
    content: Ray ô,
  - type: text
    content: hohamasinina anie ny anaranao.
  - type: text
    content: Ho tonga anie ny fanjakanao.
  '20':
  - type: text
    content: 'Fa raha ny rantsantanan’Andriamanitra no androahako ny demonia dia efa tonga aminareo tokoa ny fanjakan’Andriamanitra. '
  '21':
  - type: text
    content: 'Raha ny mahery mivonona amin’ny fiadiany no miaro ny tranony dia tsy haninona ny fananany. '
  '22':
  - type: text
    content: 'Fa raha avy kosa izay mahery noho izy ka mandresy azy dia alainy ny fiadiany rehetra izay nitokiany, ary izay azony ho babo dia zarainy. '
  '23':
  - type: text
    content: Izay tsy momba Ahy dia manohitra Ahy; ary izay tsy miara-mamory Amiko dia mampihahaka.
  - type: heading
    content: Ny fiverenan’ny fanahy maloto
  - type: heading
    content: Mat 12.43-45
  '24':
  - type: text
    content: 'Raha miala amin’ny olona ny fanahy maloto dia mandeha mitety ny tany tsy misy rano izy, mitady fitsaharana; ary rehefa tsy mahita dia hoy izy: Hody any an-tranoko izay nialako aho. '
  '25':
  - type: text
    content: 'Nony tonga izy dia hitany fa voafafa sy voalamina ny trano. '
  '26':
  - type: text
    content: Dia mandeha izy ka mitondra fanahy fito hafa koa izay ratsy noho izy; dia miditra ireo ka mitoetra ao; ary ny fiafaran’izany olona izany dia ratsy noho ny tamin’ny voalohany.
  - type: heading
    content: Ny tena fahasambarana
  '27':
  - type: text
    content: 'Raha nilaza izany Jesosy dia nisy vehivavy iray teo amin’ny vahoaka niantso ka niteny taminy hoe: Sambatra ny kibo izay nitondra Anao sy ny nono izay ninonoanao. '
  '28':
  - type: text
    content: 'Fa hoy Izy: Sambatra kokoa izay mandre ny tenin’Andriamanitra ka mitandrina izany.'
  - type: heading
    content: Ny famantarana ny amin’i Jona sy ny Zanak’Olona
  - type: heading
    content: Mat 12.38-42
  '29':
  - type: text
    content: 'Raha mbola niangona ny vahoaka betsaka dia nilaza Izy hoe: Ity taranaka ity dia taranaka ratsy. Mitady famantarana izy; nefa tsy hisy famantarana homena azy, afa-tsy ny famantarana ny amin’i Jona; '
  '3':
  - type: text
    content: Omeo anay isanandro izay hanina sahaza ho anay.
  '30':
  - type: text
    content: 'fa tahaka an’i Jona, izay famantarana tamin’ny Ninivita, dia ho toy izany koa ny '
  - type: text
    content: Zanak’Olona
  - type: text
    content: ' amin’ity taranaka ity. '
  '31':
  - type: text
    content: 'Ny mpanjakavavy avy any atsimo dia hiara-mitsangana amin’ny lehilahy amin’ity taranaka ity amin’ny andro fitsarana ka hanameloka azy; fa avy any amin’ny faran’ny tany izy hihaino ny fahendren’i Solomona; nefa indro, misy lehibe noho i Solomona eto. '
  '32':
  - type: text
    content: Hiara-mitsangana amin’ity taranaka ity amin’ny andro fitsarana ny olona tany Ninive ka hanameloka azy, fa izy ireo dia nibebaka tamin’ny nitorian’i Jona teny; nefa indro, misy lehibe noho i Jona eto.
  - type: heading
    content: Ny jiron’ny tena
  '33':
  - type: text
    content: Tsy misy olona mandrehitra jiro ka mametraka azy ao an-davaka na ao ambanin’ny vata famarana, fa apetrany eo amin’ny fitoeran-jiro izany mba ho hitan’izay miditra ny mazava.
  - type: heading
    content: Mat 6.22-23
  '34':
  - type: text
    content: 'Ny masonao no jiron’ny tena; koa raha tsara ny masonao dia mazava ny tenanao manontolo; fa raha ratsy izany dia maizina koa ny tenanao. '
  '35':
  - type: text
    content: 'Koa tandremo mba tsy ho maizina ny mazava izay ao anatinao. '
  '36':
  - type: text
    content: Ary amin’izany, raha mazava ny tenanao manontolo ka tsy misy faritra maizina, dia hazava avokoa izy manontolo, tahaka ny jiro raha mirehitra tsara ka manazava anao.
  - type: heading
    content: Manameloka ireo Fariseo sy ireo manampahaizana momba ny Lalàna Jesosy
  - type: heading
    content: Mat 23.4-36
  '37':
  - type: text
    content: 'Raha mbola niteny Jesosy dia nisy '
  - type: text
    content: Fariseo
  - type: text
    content: ' nanasa Azy hisakafo ao aminy; dia niditra Izy ka nipetraka nisakafo. '
  '38':
  - type: text
    content: 'Dia gaga ilay Fariseo, raha nahita, fa tsy nisasa Izy talohan’ny sakafo. '
  '39':
  - type: text
    content: 'Fa hoy ny Tompo taminy: Ankehitriny ianareo Fariseo dia manadio ny ivelan’ny kapoaka sy ny lovia, nefa ny ao anatinareo kosa dia feno fandrobana sy faharatsiana. '
  '4':
  - type: text
    content: Ary mamelà ny helokay;
  - type: text
    content: fa izahay koa dia mamela izay rehetra meloka aminay.
  - type: text
    content: Ary aza mitondra anay ho amin’ny fakam-panahy.
  '40':
  - type: text
    content: 'Ry adala! Tsy Izay nanao ny ivelany va no nanao ny atiny koa? '
  '41':
  - type: text
    content: Koa ny zavatra ao anatiny no omeo ho fiantrana, dia indro, ho madio ho anareo ny zavatra rehetra.
  '42':
  - type: text
    content: Fa lozanareo, Fariseo! Fa mandoa ny fahafolon’ny solila sy ny rota ary izay anana famboly rehetra ianareo, nefa lalovanareo ny fitsarana sy ny fitiavana an’Andriamanitra; ireto tokony ho nataonareo, nefa tsy tokony havelanareo iretsy.
  '43':
  - type: text
    content: 'Lozanareo, Fariseo! Fa tia ny toerana eny aloha ao amin’ny '
  - type: text
    content: sinagoga
  - type: text
    content: ' sy ny fiarahabana any an-tsena ianareo.'
  '44':
  - type: text
    content: Lozanareo, fa ianareo dia tahaka ny fasana tsy misy hahafantarana azy ka tsy fantatry ny olona izay manitsaka azy.
  '45':
  - type: text
    content: 'Ary hoy ny iray tamin’ireo mpahay lalàna Taminy: Mpampianatra ô, raha miteny izany Ianao, dia manala baraka anay koa.'
  '46':
  - type: text
    content: 'Fa hoy Jesosy: Lozanareo, mpahay lalàna koa! Fa mampitondra entana sarotra entina ny olona ianareo, nefa tsy mikasika izany entana izany akory ianareo na dia amin’ny rantsantananareo iray aza.'
  '47':
  - type: text
    content: 'Lozanareo! Fa manorina ny fasan’ny mpaminany ianareo, nefa ny razanareo ihany no namono azy ireny. '
  '48':
  - type: text
    content: 'Dia vavolombelona ianareo ka mankasitraka ny asan’ny razanareo; fa izy ireny no namono azy, ary ianareo kosa dia manorina ny fasany. '
  '49':
  - type: text
    content: 'Koa izany no nilazan’ny fahendren’Andriamanitra hoe: Haniraka mpaminany sy Apostoly ho any aminy Aho, koa ny sasany dia hovonoiny, ary ny sasany dia henjehiny, '
  '5':
  - type: text
    content: 'Hoy koa Jesosy taminy: Iza moa aminareo no manana sakaiza izay hankeo aminy mamatonalina ka hilaza aminy hoe: Ry sakaiza, ampisambory mofo telo aho; '
  '50':
  - type: text
    content: 'mba hadinina amin’ity taranaka ity ny ran’ny mpaminany rehetra izay nalatsaka hatramin’ny nanorenana izao tontolo izao, '
  '51':
  - type: text
    content: dia hatramin’ny ran’i Abela ka hatramin’ny ran’i Zakaria, izay novonoina teo anelanelan’ny alitara sy ny tempoly. Eny, lazaiko aminareo fa hadinina amin’ity taranaka ity izany.
  '52':
  - type: text
    content: Lozanareo, mpahay lalàna satria nalainareo ny fanalahidin’ny fahalalana; ianareo dia tsy niditra ary izay te hiditra dia nosakananareo.
  '53':
  - type: text
    content: 'Ary raha niala teo Izy dia nanomboka nanery Azy tamin-katezerana ny mpanoradalàna sy ny Fariseo ka nampiteny Azy momba ny zavatra maro. '
  '54':
  - type: text
    content: Dia nikendry Azy izy ireo mba hamandrika Azy amin’izay teny aloaky ny vavany.
  '6':
  - type: text
    content: 'fa ny namako dia tonga ao amiko avy tany amin’ny nalehany ka tsy misy harosoko azy; '
  '7':
  - type: text
    content: 'ary ilay ao an-trano kosa dia hamaly hoe: Aza manahirana ahy; fa efa mihidy ny varavarana izao, ary ny zanako dia efa mandry eto am-pandriana miaraka amiko; tsy afaka hifoha hanome anao aho. '
  '8':
  - type: text
    content: 'Hoy Izaho aminareo: Na dia tsy hiainga hanome azy noho ny fihavanana aza izy dia hifoha ihany izy noho ny fitarainany fatratra ka hanome azy izay ilainy.'
  - type: heading
    content: Mat 7.7-11
  '9':
  - type: text
    content: 'Hoy Izaho aminareo: Mangataha dia homena ianareo; mitadiava dia hahita ianareo; dondòny dia hovohana ianareo. '
