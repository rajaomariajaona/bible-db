document_id: JHN.14
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny lalana mankany amin’ny Ray
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Aza mangorohoro ny fonareo; minoa an’Andriamanitra ianareo, ary minoa Ahy koa. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ao amin’ny tranon’ny Raiko misy fonenana maro; raha tsy izany dia efa nilaza taminareo Aho; fa handeha hamboatra fitoerana ho anareo Aho. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary raha handeha hamboatra fitoerana ho anareo Aho dia ho avy indray ka handray anareo ho any Amiko, ary izay misy Ahy no hisy anareo koa. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ary fantatrareo koa ny lalana ho any amin’izay halehako.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Hoy i Tomasy Taminy: Tompoko, tsy fantatray izay alehanao; koa hataonay ahoana no fahafantatra ny lalana? '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Hoy Jesosy taminy: Izaho no lalana sy fahamarinana ary fiainana; tsy misy olona mankany amin’ny Ray, afa-tsy amin’ny alalako. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Raha nahafantatra Ahy ianareo dia ho nahafantatra ny Raiko koa; ary hatramin’izao dia mahafantatra Azy ianareo sady efa nahita Azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Hoy i Filipo Taminy: Tompoko, asehoy anay ny Ray dia ampy ho anay izay. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Hoy Jesosy taminy: Izay ela izay no efa nitoerako teto aminareo ka tsy mbola fantatrao ihany va Aho, ry Filipo? Izay nahita Ahy dia nahita ny Ray; koa ahoana no itenenanareo hoe: Asehoy anay ny Ray? '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Tsy mino va ianao fa Izaho ao amin’ny Ray ary ny Ray ato Amiko? Ny teny izay lazaiko aminareo dia tsy avy amin’ny fahefan’ny tenako no ilazako izany; fa ny Ray mitoetra ato Amiko no manao ny asa. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Minoa Ahy fa Izaho ao amin’ny Ray ary ny Ray ato Amiko; fa raha tsy izany dia minoa Ahy noho ny asa ihany aza.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Lazaiko aminareo marina dia marina tokoa: Izay mino Ahy, ny asa ataoko no hataony koa; ary hanao asa lehibe noho izany aza izy satria Izaho mankany amin’ny Ray. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary na inona na inona no hangatahinareo amin’ny anarako dia hataoko izany mba hankalazana ny Ray ao amin’ny Zanaka. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Raha mangataka zavatra Amiko amin’ny anarako ianareo dia hataoko izany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny «Mpananatra»
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Raha tia Ahy ianareo dia hitandrina ny didiko. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ary Izaho hangataka amin’ny Ray ary Izy hanome anareo Mpananatra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.16 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Parakleto, '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'dia '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Mpanampy, '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'na '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Mpampahery, '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'na '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Mpisolovava.
    marker-yv: yv-n
  - type: text
    text: ' hafa mba ho eo aminareo mandrakizay, '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: dia ny Fanahin’ny fahamarinana, izay tsy hain’izao tontolo izao raisina satria tsy hitany na fantany; fa ianareo no mahafantatra Azy satria mitoetra eo aminareo Izy ary ho ao anatinareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Tsy hamela anareo ho kamboty Aho; hankaty aminareo Aho. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Vetivety foana dia tsy hahita Ahy intsony izao tontolo izao; fa ianareo no hahita Ahy; satria velona Aho dia ho velona koa ianareo. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Amin’izany andro izany dia ho fantatrareo fa Izaho ao amin’ny Raiko ary ianareo dia ato Amiko, ary Izaho ao aminareo. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Izay manana ny didiko ka mitandrina izany dia izy no tia Ahy; ary izay tia Ahy no ho tian’ny Raiko, ary Izaho ho tia azy ka hiseho aminy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Hoy i Jodasy, tsy Iskariota, Taminy: Tompoko, nahoana no aminay ihany no hisehoanao fa tsy amin’izao tontolo izao koa? '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Dia namaly azy i Jesosy hoe: Raha misy tia Ahy dia hitandrina ny teniko izy; ary ny Raiko ho tia azy, ary hankao aminy Izahay ka hanorina fonenana ao aminy. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Izay tsy tia Ahy dia tsy mitandrina ny teniko; ary ny teny izay renareo dia tsy Ahy, fa an’ny Ray izay naniraka Ahy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Izany teny izany dia efa voalazako taminareo raha mbola mitoetra eto aminareo Aho; '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: fa ny Mpananatra, dia ny Fanahy Masina, izay hirahin’ny Ray amin’ny anarako, Izy no hampianatra anareo ny zavatra rehetra sy hampahatsiaro anareo ny zavatra rehetra izay nolazaiko taminareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Fiadanana no avelako ho anareo, ny fiadanako no omeko anareo; tsy tahaka ny fanomen’izao tontolo izao no fanomeko anareo. Aza mangorohoro na matahotra ny fonareo. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Efa renareo fa nilaza taminareo Aho hoe: Handeha Aho, nefa ho avy aminareo indray. Raha tia Ahy ianareo dia ho faly satria mankany amin’ny Ray Aho; fa ny Ray dia lehibe noho Izaho. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Ary ankehitriny, efa nilaza taminareo Aho, dieny tsy mbola tonga izany, mba hinoanareo, rehefa tonga.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Tsy hilaza zavatra maro aminareo intsony Aho; fa avy ny andrianan’izao tontolo izao, nefa tsy manana na inona na inona ato Amiko izy. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Fa mba ho fantatr’izao tontolo izao fa tiako ny Ray, ary araka izay nandidian’ny Ray Ahy dia izany no hataoko. Mitsangàna, andeha isika hiala eto.
