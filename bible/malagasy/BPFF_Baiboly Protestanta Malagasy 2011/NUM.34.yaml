document_id: NUM.34,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Izay ho sisintanin’i Kanana
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ary NY TOMPO niteny tamin’i Mosesy hoe: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ary ny ho sisintaninareo atsinanana dia farito hatreo Hazara-Enana ka hatrany Sefama, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'ary hidina avy ao Sefama hatrany Ribla any atsinanan’i Aina, dia mbola hidina ihany koa ka hipaka amin’ny moron’ny ranomasin’i Kinereta, any atsinanana; '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ary hidina indray hatrany Jordana ny sisintany ka hipaka amin’ny Ranomasintsira. Izany no ho taninareo araka ny sisintaniny manodidina.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ary nandidy ny Zanak’Israely i Mosesy hoe: Izany no tany izay hozarainareo araka ny antsapaka, dia izay andidian’NY TOMPO mba homena ny foko sivy sy ny antsasaky ny fokon’i Manase; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'fa ny foko taranak’i Robena araka ny fianakaviany sy ny foko taranak’i Gada araka ny fianakaviany dia efa nandray ny zarataniny, ary ny antsasaky ny fokon’i Manase koa dia efa nandray ny zarataniny. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Ireo ny foko roa sy sasany izay samy efa nandray ny zarataniny atỳ andafy atsinanan’i Jordana, hitsin’i Jeriko, tandrifin’ny fiposahan’ny masoandro.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ireo izay hiandraikitra ny fizarana ny tany
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Ary NY TOMPO niteny tamin’i Mosesy hoe: '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Ireto ny anaran’ny lehilahy izay hizara ny tany ho anareo: I Eleazara mpisorona sy i Josoa, zanak’i Nona. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Ary loholona iray avy amin’ny foko tsirairay koa no halainareo hizara ny tany. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Izao no anaran’ireo lehilahy ireo:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny avy amin’ny fokon’i Joda dia i Kaleba, zanak’i Jefone;
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Mandidia ny Zanak’Israely hoe: Raha tonga any amin’ny tany Kanana ianareo dia izao no tany izay ho azonareo ho lova, dia ny tany Kanana araka ny voafaritry ny sisintaniny. '
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ny avy amin’ny foko taranak’i Simeona dia i Semoela, zanak’i Amihoda;
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ny avy amin’ny fokon’i Benjamina dia i Elidada, zanak’i Kislona;
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ny lehiben’ny foko taranak’i Dana dia i Bokỳ, zanak’i Jogly;
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'ny avy amin’ny taranak’i Josefa: Ny lehiben’ny foko taranak’i Manase dia i Haniela, zanak’i Efoda;'
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ny lehiben’ny foko taranak’i Efraima dia i Kemoela, zanak’i Siftana;
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ny lehiben’ny foko taranak’i Zebolona dia i Elizafana, zanak’i Parnaka;
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: ny lehiben’ny foko taranak’Isakara dia i Paltiela, zanak’i Azana;
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: ny lehiben’ny foko taranak’i Asera dia i Ahihoda, zanak’i Selomy;
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: ny lehiben’ny foko taranak’i Naftaly dia i Pedahela, zanak’i Amihoda.
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Ireo no nodidian’NY TOMPO hizara ny tany Kanana ho an’ny Zanak’Israely.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Ny lafiny atsimo amin’ny taninareo dia hatramin’ny tany efitra Zina, izay mifanolotra amin’i Edoma. Ny sisintaninareo atsimo dia hatramin’ny faran’ny Ranomasintsira
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ny Ranomasintsira: ny Ranomasina Maty.'
      marker-yv: yv-n
    - type: text
      text: ', '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'dia miolaka eo atsimon’ny fiakarana Akrabima, dia mandroso hatrany Zina, dia mahazo any atsimon’i Kadesy-Barnea, dia mahazo an’i Hazara-Adara ka mandroso hatrany Azmona; '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'ary miolaka hatreo Azmona ka hatrany amin’ny lohasahan-driakan’i Ejipta, ary mipaka hatrany amin’ny ranomasina. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ny amin’ny sisintany andrefana dia indro ny Ranomasina Lehibe sy ny morony, koa hatreo no ho sisintaninareo andrefana. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Izao no ho sisintaninareo avaratra: Hatreo amin’ny Ranomasina Lehibe dia ny tendrombohitra Hora no hotandrifìnareo; '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'avy eo amin’ny tendrombohitra Hora dia ny lalana mankany Hamata no hotandrifìnareo ary hahazo an’i Zedada ny sisintany; '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'dia hahazo an’i Zifrona ka hipaka hatrany Hazara-Enana; izany no ho sisintaninareo avaratra. '
