document_id: PSA.35,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Fitarainan’ny tsy manan-tsiny entina eo amin’ny fitsarana
  - type: text
    content: Nataon’i Davida.
  - type: text
    content: TOMPO ô, mamalia izay manana ady amiko;
  - type: text
    content: miadia amin’izay mamely ahy!
  '10':
  - type: text
    content: 'Hatramin’ny taolako rehetra dia hiteny hoe: TOMPO ô, iza no tahaka Anao'
  - type: text
    content: izay manafaka ny mpandefitra amin’ny mahery noho izy;
  - type: text
    content: eny, ny ory sy ny mahantra amin’izay mandroba azy?
  '11':
  - type: text
    content: Misy vavolombelona mampidi-doza mitsangana
  - type: text
    content: ka zavatra tsy fantatro no anadinany ahy.
  '12':
  - type: text
    content: Mamaly ratsy ahy ho solon’ny soa izy
  - type: text
    content: ka zary manirery aho.
  '13':
  - type: text
    content: Ary ny amiko, raha narary izy ireo, dia akanjo fisaonana no nanaovako;
  - type: text
    content: nampahory ny tenako tamin’ny fifadian-kanina aho
  - type: text
    content: ary niverimberina ny vavaka nataoko.
  '14':
  - type: text
    content: Nandeha toy ny nanan-tsakaiza na rahalahy mana-manjo aho,
  - type: text
    content: nitanondrika tamin’alahelo toy ny misaona reny aho.
  '15':
  - type: text
    content: Nefa nony nivembena efa ho lavo aho dia faly izy ireo ka nitangorona;
  - type: text
    content: nitangorona hamely ahy izy ireo fa izaho no tsy nahafantatra;
  - type: text
    content: tsy nitsahatra namiravira izy;
  '16':
  - type: text
    content: miaraka amin’ny olon-dratsy mpanendrikendrika sy mpanararaotra izy
  - type: text
    content: ka mihidy vazana amiko.
  '17':
  - type: text
    content: Tompo ô, mandra-pahoviana no hijery izany fotsiny Ianao?
  - type: text
    content: Afaho amin’ny fandringanana ataony aho
  - type: text
    content: ary avoty amin’ny liona tanora ny aiko tokana.
  '18':
  - type: text
    content: Hisaotra Anao eo amin’ny fiangonan-dehibe aho;
  - type: text
    content: hidera Anao eo afovoan’ny olona maro aho.
  '19':
  - type: text
    content: Aoka tsy hifalian’izay mandrafy ahy foana aho
  - type: text
    content: ary aoka tsy hangarika ahy izay mankahala ahy tsy amin’antony!
  '2':
  - type: text
    content: Raiso ny ampinga kely sy ny ampinga lehibe
  - type: text
    content: ka mitsangàna hamonjy ahy!
  '20':
  - type: text
    content: Fa tsy fihavanana no lazainy;
  - type: text
    content: mamorom-pitaka izy hamelezany ny olona bonaika ambonin’ny tany.
  '21':
  - type: text
    content: Mitanatana vava amiko izy
  - type: text
    content: 'ka miteny hoe: Hia! Akory izay!'
  - type: text
    content: Ny masonay no nahita!
  '22':
  - type: text
    content: Hitanao izany, TOMPO ô, ka aza mangina!
  - type: text
    content: Aza manalavitra ahy, Tompo ô!
  '23':
  - type: text
    content: Mifohaza Ianao
  - type: text
    content: ka miarena hitsara ny raharahako!
  - type: text
    content: Ry Andriamanitro sy Tompoko! Mifohaza ho amin’ny adiko!
  '24':
  - type: text
    content: Tsarao araka ny fahamarinanao aho, RY TOMPO Andriamanitro ô!
  - type: text
    content: Aoka tsy hifalian’ireo aho!
  '25':
  - type: text
    content: 'Aoka tsy hiteny anakampo izy hoe: Hia! Izay no nirinay!'
  - type: text
    content: 'Aoka tsy hiteny izy hoe: Efa natelinay izy!'
  '26':
  - type: text
    content: Aoka hitsanga-menatra sy hangaihay avokoa
  - type: text
    content: izay mifaly amin’ny manjo ahy!
  - type: text
    content: Aoka hitafy henatra sy fahafaham-baraka
  - type: text
    content: izay mirehareha amiko!
  '27':
  - type: text
    content: Aoka hihoby sy hifaly
  - type: text
    content: izay mankasitraka ny fahamarinako;
  - type: text
    content: 'aoka izy hiteny mandrakariva hoe: Lehibe NY TOMPO'
  - type: text
    content: izay mankasitraka ny fiadanan’ny mpanompony!
  '28':
  - type: text
    content: Hilaza ny fahamarinanao ny lelako;
  - type: text
    content: ny fiderana Anao no hataoko mandrakariva.
  '3':
  - type: text
    content: Raiso ny lefona ka sakano izay manenjika ahy!
  - type: text
    content: 'Lazao amiko hoe: Famonjena anao Aho!'
  '4':
  - type: text
    content: Aoka hitsanga-menatra sy ho afa-baraka izay mitady ny aiko!
  - type: text
    content: Aoka hiamboho sy hangaihay izay misaina hanisy ratsy ahy!
  '5':
  - type: text
    content: Aoka ho tahaka ny akofa aelin’ny rivotra izy
  - type: text
    content: 'ary aoka handroaka azy ny '
  - type: text
    content: Anjelin’NY TOMPO
  - type: text
    content: .
  '6':
  - type: text
    content: Aoka ho maizina sy malama ny lalany
  - type: text
    content: ary aoka hanenjika azy ny Anjelin’NY TOMPO!
  '7':
  - type: text
    content: Fa tsy amin’antony ny nanafenany lavaka tamiko tamin’ny harato hahazoany ahy;
  - type: text
    content: tsy amin’antony ny nandavahany lavaka hamandrihana ny aiko.
  '8':
  - type: text
    content: Aoka ny fandringanana ho tonga tampoka aminy
  - type: text
    content: ary aoka hahazo azy ny fandrika harato nafeniny;
  - type: text
    content: aoka ho azon’izany izy ka ho latsaka ao amin’izany fandringanana izany.
  '9':
  - type: text
    content: Fa ny fanahiko kosa dia hiravoravo ao amin’NY TOMPO
  - type: text
    content: sy ho faly amin’ny famonjeny.
