document_id: PSA.35,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fitarainan’ny tsy manan-tsiny entina eo amin’ny fitsarana
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: Nataon’i Davida.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: TOMPO ô, mamalia izay manana ady amiko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: miadia amin’izay mamely ahy!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Hatramin’ny taolako rehetra dia hiteny hoe: TOMPO ô, iza no tahaka Anao'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay manafaka ny mpandefitra amin’ny mahery noho izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, ny ory sy ny mahantra amin’izay mandroba azy?
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Misy vavolombelona mampidi-doza mitsangana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka zavatra tsy fantatro no anadinany ahy.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Mamaly ratsy ahy ho solon’ny soa izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka zary manirery aho.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Ary ny amiko, raha narary izy ireo, dia akanjo fisaonana no nanaovako;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nampahory ny tenako tamin’ny fifadian-kanina aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary niverimberina ny vavaka nataoko.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Nandeha toy ny nanan-tsakaiza na rahalahy mana-manjo aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nitanondrika tamin’alahelo toy ny misaona reny aho.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Nefa nony nivembena efa ho lavo aho dia faly izy ireo ka nitangorona;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nitangorona hamely ahy izy ireo fa izaho no tsy nahafantatra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy nitsahatra namiravira izy;
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: miaraka amin’ny olon-dratsy mpanendrikendrika sy mpanararaotra izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka mihidy vazana amiko.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Tompo ô, mandra-pahoviana no hijery izany fotsiny Ianao?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Afaho amin’ny fandringanana ataony aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary avoty amin’ny liona tanora ny aiko tokana.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Hisaotra Anao eo amin’ny fiangonan-dehibe aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hidera Anao eo afovoan’ny olona maro aho.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Aoka tsy hifalian’izay mandrafy ahy foana aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary aoka tsy hangarika ahy izay mankahala ahy tsy amin’antony!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Raiso ny ampinga kely sy ny ampinga lehibe
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka mitsangàna hamonjy ahy!
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Fa tsy fihavanana no lazainy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mamorom-pitaka izy hamelezany ny olona bonaika ambonin’ny tany.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Mitanatana vava amiko izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ka miteny hoe: Hia! Akory izay!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny masonay no nahita!
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Hitanao izany, TOMPO ô, ka aza mangina!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aza manalavitra ahy, Tompo ô!
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Mifohaza Ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka miarena hitsara ny raharahako!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ry Andriamanitro sy Tompoko! Mifohaza ho amin’ny adiko!
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Tsarao araka ny fahamarinanao aho, RY TOMPO Andriamanitro ô!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka tsy hifalian’ireo aho!
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Aoka tsy hiteny anakampo izy hoe: Hia! Izay no nirinay!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Aoka tsy hiteny izy hoe: Efa natelinay izy!'
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Aoka hitsanga-menatra sy hangaihay avokoa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay mifaly amin’ny manjo ahy!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka hitafy henatra sy fahafaham-baraka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay mirehareha amiko!
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Aoka hihoby sy hifaly
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay mankasitraka ny fahamarinako;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'aoka izy hiteny mandrakariva hoe: Lehibe NY TOMPO'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay mankasitraka ny fiadanan’ny mpanompony!
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Hilaza ny fahamarinanao ny lelako;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny fiderana Anao no hataoko mandrakariva.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Raiso ny lefona ka sakano izay manenjika ahy!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Lazao amiko hoe: Famonjena anao Aho!'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Aoka hitsanga-menatra sy ho afa-baraka izay mitady ny aiko!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka hiamboho sy hangaihay izay misaina hanisy ratsy ahy!
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Aoka ho tahaka ny akofa aelin’ny rivotra izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ary aoka handroaka azy ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Anjelin’NY TOMPO
    - type: text
      text: .
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Aoka ho maizina sy malama ny lalany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary aoka hanenjika azy ny Anjelin’NY TOMPO!
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Fa tsy amin’antony ny nanafenany lavaka tamiko tamin’ny harato hahazoany ahy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy amin’antony ny nandavahany lavaka hamandrihana ny aiko.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Aoka ny fandringanana ho tonga tampoka aminy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary aoka hahazo azy ny fandrika harato nafeniny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aoka ho azon’izany izy ka ho latsaka ao amin’izany fandringanana izany.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Fa ny fanahiko kosa dia hiravoravo ao amin’NY TOMPO
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ho faly amin’ny famonjeny.
