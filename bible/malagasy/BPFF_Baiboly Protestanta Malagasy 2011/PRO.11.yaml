document_id: PRO.11
type_code: plt
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ny mizana mandainga dia fahavetavetana eo imason’NY TOMPO,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny vato marina no ankasitrahany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Rehefa tonga ny fiavonavonana dia tonga koa ny fahafaham-baraka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ao amin’ny manetry tena no misy ny fahendrena.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ny fahitsian’ny mahitsy no mitari-dalana azy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny faharatsian’ny mpivadika no mahatonga faharinganana amin’ny tenany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ny harena dia tsy mahasoa amin’ny andron’ny fahatezerana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny fahamarinana no mamonjy tsy ho azon’ny fahafatesana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Mandamina ny alehany ny fahamarinan’ny marina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny ratsy fanahy dia lavon’ny faharatsiany ihany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Manafaka ny mahitsy ny fahamarinany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny mpivadika dia voafandriky ny filany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Raha maty ny ratsy fanahy dia levona ny fanantenany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, foana izay nantenainy tamin’ny heriny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ny marina dia vonjena ho afaka amin’ny fahoriana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ho avy kosa ny ratsy fanahy handimby toerana azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ny tenin’ny mpihatsaravelatsihy no animbany ny namany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny fahalalana no hanafahana ny marina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Raha miadana ny marina dia ravoravo ny tanàna;
- type: usfm
  marker: q1
  children:
  - type: text
    text: raha ringana ny ratsy fanahy dia velona ny hoby.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ny fitahiana avy amin’ny marina no mampisandratra ny tanàna,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny tenin’ny ratsy fanahy no maharava azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Tsy ampy saina izay manamavo ny namany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa izay hendry kosa mangina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Izay mandehandeha manaratsy dia manambara ny zavatra afenina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny olona mahatoky tsy mba tia lazalaza.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Raha tsy misy fahaiza-mitondra dia rava ny firenena,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa famonjena ny fahamaroan’ny mpanolotsaina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Hahita loza tokoa ny miantoka vahiny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa mitoetra tsy manana ahiahy ny mankahala antoka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Mahazo dera ny vehivavy tsara tarehy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mandroba harena ny mpampihorohoro.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ny olona mamindra fo dia mahazo soa ho an’ny tenany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny lozabe dia todìn’ny halozany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ny ratsy fanahy dia mahazo tambiny mamitaka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa izay mamafy fahamarinana no mahazo karama marina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ny tena fahamarinana dia mamantana any amin’ny fiainana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa izay fatra-panaraka ny ratsy no iharan’ny fahafatesana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Fahavetavetana eo imason’NY TOMPO ny fo miolakolaka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ankasitrahany kosa izay mandeha tsy misy tsiny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Azo antoka fa tsy maintsy handray ny saziny ny ratsy fanahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny taranaky ny marina no ho afa-doza.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Toy ny kavina volamena eo amin’ny oron-kisoa
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny vehivavy tsara tarehy nefa tsy manam-pahendrena.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ny soa ihany no irin’ny marina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny fahatezerana no fanantenan’ny ratsy fanahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Misy malala-tanana nefa mitombo fananana ihany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary misy izay fatra-pitahiry loatra nefa tonga mahantra ihany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Izay manisy soa olona dia ho feno fanambinana
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary izay mampisotro dia mba hampisotroina kosa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Izay tsy mamoaka ny variny dia ozonin’ny olona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa saotra no ho amin’ny lohan’izay mivarotra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Izay fatra-pikatsaka ny tsara no mitady ny mahafinaritra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa izay mitady ny ratsy dia hahita ny ratsy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Izay matoky ny hareny dia ho lavo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny marina dia ho tahaka ny ravin-kazo maitso.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Izay manakorontana ny ankohonany dia handova rivotra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny adala dia ho tonga mpanompon’ny hendry.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Ny vokatry ny marina dia hazon’aina
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny hendry mahataona olona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Indro, ny marina aza dia valina etỳ an-tany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: koa mainka fa ny ratsy fanahy sy ny mpanota!
