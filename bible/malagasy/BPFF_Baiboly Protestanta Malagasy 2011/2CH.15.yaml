document_id: 2CH.15,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Manao fanitsiam-pivavahana i Asa
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Tonga tamin’i Azaria, zanak’i Odeda, ny Fanahin’Andriamanitra; '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ary nivory tany Jerosalema ireo tamin’ny volana fahatelo tamin’ny taona fahadimy amby folo nanjakan’i Asa. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Tamin’io andro io dia nanolotra fanatitra ho an’NY TOMPO tamin’ny babo izay noentiny izy, dia omby fitonjato sy ondry aman’osy fito arivo. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Ary nanao fanekena hitady NY TOMPO, Andriamanitry ny razany, tamin’ny fony manontolo sy ny fanahiny manontolo izy; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'koa na iza na iza tsy mety mitady NY TOMPO Andriamanitry ny Israely dia hovonoina ho faty, na kely na lehibe, na lahy na vavy. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Ary nianiana tamin’NY TOMPO tamin’ny feo mahery sy ny fihobiana ary tamin’ny trompetra sy ny anjomara izy. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Dia nifaly ny Joda rehetra noho ny fianianana, satria efa nianiana tamin’ny fony manontolo izy sady nazoto nitady NY TOMPO indrindra ka nahita Azy; ary NY TOMPO dia nanome azy fiadanana tamin’ny manodidina rehetra.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 1Mpa 15.13-15
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Ary na dia Imaka, renin’i Asa mpanjaka, aza dia naetriny tsy ho andriambavy satria nanangana sampy ho an’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Aseraha
    - type: text
      text: ' izy; ary nikapa ny sampiny i Asa dia nanorotoro izany ka nandoro azy tao amin’ny lohasahan-driaka Kidrona. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Fa ny toerana fanaovana sorona tamin’ny Israely dia tsy mba noravana; nefa nahitsy ny fon’i Asa tamin’ny androny rehetra. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Ary nampidiriny ho ao amin’ny tranon’NY TOMPO ny zavatra izay nohamasinin’ny rainy mbamin’izay nohamasinin’ny tenany, dia volafotsy sy volamena ary fanaka.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Dia tsy nisy ady intsony hatramin’ny taona fahadimy amby telopolo nanjakan’i Asa.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'nandeha hitsena an’i Asa izy ka niteny taminy hoe: Mihainoa ahy, ry Asa mbamin’ny Joda sy ny Benjamina rehetra: Momba anareo NY TOMPO raha momba Azy ianareo; ary raha mitady Azy ianareo dia hahita Azy; fa raha mahafoy Azy kosa ianareo dia hahafoy anareo Izy. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Efa ela ny Israely no tsy nanana an’Andriamanitra marina, na mpisorona mba hampianatra, na lalàna. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Fa rehefa niverina tamin’NY TOMPO, Andriamanitry ny Israely, nony azom-pahoriana izy ka nitady Azy, dia nahita Azy. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Tamin’izany fotoana izany dia tsy nisy fiadanana ho an’izay nivoaka ny tanàna na izay niditra tao; fa horohoro be no nahazo ny mponina rehetra tamin’ny tany; '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'ary nifandringana ny firenena sy ny tanàna, fa Andriamanitra nampangorohoro azy tamin’ny fahoriana rehetra. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Koa mahereza ianareo fa aza miraviravy tanana, fa hisy valim-pitia tokoa ny ataonareo.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Nony ren’i Asa izany teny izany sy ny faminanian’i Odeda mpaminany dia niezaka izy ka nanaisotra ny sampy fahavetavetana tamin’ny tanin’i Joda sy i Benjamina rehetra ary tamin’ny tanàna izay azony tany amin’ny tany be havoana any Efraima; nohavaoziny koa ny alitaran’NY TOMPO izay teo anoloan’ny lalantsara fidirana amin’ny tranon’NY TOMPO. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Novoriny i Joda, i Benjamina rehetra, ny vahiny teo aminy izay avy tany amin’i Efraima, i Manase ary i Simeona; fa betsaka tamin’ny Israely no nanatona azy rehefa hitany fa NY TOMPO Andriamaniny no teo aminy. '
