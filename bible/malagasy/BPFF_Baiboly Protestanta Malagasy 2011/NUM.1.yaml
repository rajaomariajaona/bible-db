segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fanisana voalohany natao tamin’ny Zanak’Israely
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary NY TOMPO niteny tamin’i Mosesy tany an-tany efitr’i Sinay, tao amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tranolay fihaonana
  - type: text
    text: ', tamin’ny andro voalohany tamin’ny volana faharoa, tamin’ny taona faharoa taorianan’ny nivoahan’ny Zanak’Israely avy tany amin’ny tany Ejipta. Hoy NY TOMPO taminy: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Alao isa ny fiangonan’ny Zanak’Israely manontolo, araka ny fokony sy ny fianakaviany avy, ary araka ny anaran’ny lehilahy tsirairay, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'dia ny lehilahy rehetra hatramin’ny roapolo taona no ho miakatra, dia izay rehetra azo alefa hanafika amin’ny Israely. Handamina azy araka ny antokony avy ianao sy i Arona. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Aoka hisy lehilahy iray avy isam-poko ho namanareo, dia izay samy lohan’ny fianakaviany avy. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Toy izao avy ny anaran’ireo lehilahy ho namanareo ireo.
- type: usfm
  marker: p
  children:
  - type: text
    text: Ny avy amin’i Robena dia i Elizora, zanak’i Sedeora;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ny avy amin’i Simeona dia i Selomiela, zanak’i Zorisaday;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ny avy amin’i Joda dia i Nasona, zanak’i Aminadaba;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ny avy amin’Isakara dia i Netanela, zanak’i Zoara;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ny avy amin’i Zebolona dia i Eliaba, zanak’i Helona;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'ny avy amin’ny zanak’i Josefa kosa: Ny avy amin’i Efraima dia i Elisama, zanak’i Amihoda, ary ny avy amin’i Manase dia i Gamaliela, zanak’i Pedazora;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
