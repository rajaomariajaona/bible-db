  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Tamin’ny taranak’Isakara, araka ny fokony sy ny fianakaviany, ary araka ny anarany tsirairay, hatramin’ny roapolo taona no ho miakatra, dia izay rehetra azo alefa hanafika, '
  - type: usfm
