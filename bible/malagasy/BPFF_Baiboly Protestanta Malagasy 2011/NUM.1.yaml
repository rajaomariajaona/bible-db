document_id: NUM.1,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fanisana voalohany natao tamin’ny Zanak’Israely
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary NY TOMPO niteny tamin’i Mosesy tany an-tany efitr’i Sinay, tao amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: tranolay fihaonana
    - type: text
      text: ', tamin’ny andro voalohany tamin’ny volana faharoa, tamin’ny taona faharoa taorianan’ny nivoahan’ny Zanak’Israely avy tany amin’ny tany Ejipta. Hoy NY TOMPO taminy: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ny avy amin’ny zanak’i Josefa kosa: Ny avy amin’i Efraima dia i Elisama, zanak’i Amihoda, ary ny avy amin’i Manase dia i Gamaliela, zanak’i Pedazora;'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ny avy amin’i Benjamina dia i Abidana, zanak’i Gideony;
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ny avy amin’i Dana dia i Ahiezera, zanak’i Amisaday;
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ny avy amin’i Asera dia i Pagiela, zanak’i Okrana;
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ny avy amin’i Gada dia i Eliasafa, zanak’i Deoela;
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ny avy amin’i Naftaly dia i Ahira, zanak’i Enana.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ireo no voaantso teo amin’ny fiangonana, samy lohan’ny fokony avy sady mpifehy arivo amin’ny Israely. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary naka ireo olona voatonona anarana ireo i Mosesy sy i Arona '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia namory ny fiangonana manontolo tamin’ny andro voalohany tamin’ny volana faharoa. Samy nampanoratra ny firazanany avy izy, araka ny fokony sy ny fianakaviany, ary araka ny anarany tsirairay, hatramin’ny roapolo taona no ho miakatra. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Araka izay nandidian’NY TOMPO an’i Mosesy no nandaminany azy tany amin’ny tany efitr’i Sinay.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alao isa ny fiangonan’ny Zanak’Israely manontolo, araka ny fokony sy ny fianakaviany avy, ary araka ny anaran’ny lehilahy tsirairay, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dimanjato sy enina arivo sy efatra alina ny avy tamin’ny taranak’i Robena, lahimatoan’Israely, araka ny fokony sy ny fianakaviany, ary araka ny anarany tsirairay, dia ny lehilahy rehetra hatramin’ny roapolo taona no ho miakatra izay azo alefa hanafika, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ary voaisa avy tamin’ny fokon’i Robena.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin’ny taranak’i Simeona, araka ny fokony sy ny fianakaviany, dia izay rehetra voaisa, araka ny anaran’ny tsirairay, dia ny lehilahy rehetra hatramin’ny roapolo taona no ho miakatra, izay azo alefa hanafika, '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: izay voaisa avy tamin’ny fokon’i Simeona dia telonjato sy sivy arivo sy dimy alina.
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin’ny taranak’i Gada, araka ny fokony sy ny fianakaviany, ary araka ny anarany tsirairay, hatramin’ny roapolo taona no ho miakatra, dia izay rehetra azo alefa hanafika, '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: izay voaisa avy tamin’ny fokon’i Gada kosa dia dimampolo sy eninjato sy dimy arivo sy efatra alina.
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin’ny taranak’i Joda, araka ny fokony sy ny fianakaviany, ary araka ny anarany tsirairay hatramin’ny roapolo taona no ho miakatra, dia izay rehetra azo alefa hanafika, '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: izay voaisa avy tamin’ny fokon’i Joda dia eninjato sy efatra arivo sy fito alina.
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin’ny taranak’Isakara, araka ny fokony sy ny fianakaviany, ary araka ny anarany tsirairay, hatramin’ny roapolo taona no ho miakatra, dia izay rehetra azo alefa hanafika, '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: izay voaisa avy tamin’ny fokon’Isakara dia efajato sy efatra arivo sy dimy alina.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia ny lehilahy rehetra hatramin’ny roapolo taona no ho miakatra, dia izay rehetra azo alefa hanafika amin’ny Israely. Handamina azy araka ny antokony avy ianao sy i Arona. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin’ny taranak’i Zebolona, araka ny fokony sy ny fianakaviany, ary araka ny anarany tsirairay, hatramin’ny roapolo taona no ho miakatra, dia izay rehetra azo alefa hanafika, '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ny voaisa avy tamin’ny fokon’i Zebolona dia efajato sy fito arivo sy dimy alina.
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin’ny taranak’i Josefa: Avy tamin’ny taranak’i Efraima, araka ny fokony sy ny fianakaviany, ary araka ny anarany tsirairay, hatramin’ny roapolo taona no ho miakatra, dia izay rehetra azo alefa hanafika, '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: izay voaisa avy tamin’ny fokon’i Efraima dia dimanjato sy efatra alina.
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin’ny taranak’i Manase, araka ny fokony sy ny fianakaviany, ary araka ny anarany tsirairay, hatramin’ny roapolo taona no ho miakatra, dia izay rehetra azo alefa hanafika, '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: izay voaisa avy tamin’ny fokon’i Manase dia roanjato sy telo arivo sy telo alina.
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin’ny taranak’i Benjamina, araka ny fokony sy ny fianakaviany, ary araka ny anarany tsirairay, hatramin’ny roapolo taona no ho miakatra, dia izay rehetra azo alefa hanafika, '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: izay voaisa avy tamin’ny fokon’i Benjamina dia efajato sy dimy arivo sy telo alina.
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin’ny taranak’i Dana, araka ny fokony sy ny fianakaviany, ary araka ny anarany tsirairay, hatramin’ny roapolo taona no ho miakatra, dia izay rehetra azo alefa hanafika, '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: izay voaisa avy tamin’ny fokon’i Dana dia fitonjato sy roa arivo sy enina alina.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aoka hisy lehilahy iray avy isam-poko ho namanareo, dia izay samy lohan’ny fianakaviany avy. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin’ny taranak’i Asera, araka ny fokony sy ny fianakaviany, ary araka ny anarany tsirairay, hatramin’ny roapolo taona no ho miakatra, dia izay rehetra azo alefa hanafika, '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: izay voaisa avy tamin’ny fokon’i Asera dia dimanjato sy arivo sy efatra alina.
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin’ny taranak’i Naftaly, araka ny fokony sy ny fianakaviany, ary araka ny anarany tsirairay, hatramin’ny roapolo taona no ho miakatra, dia izay rehetra azo alefa hanafika, '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: izay voaisa avy tamin’ny fokon’i Naftaly dia efajato sy telo arivo sy dimy alina.
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ireo no voaisan’i Mosesy sy i Arona ary ireo mpifehy roa amby folo lahy tamin’ny Israely, izay samy lohan’ny fianakaviany avy. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary izay rehetra voaisa avy tamin’ny Zanak’Israely araka ny fianakaviany, hatramin’ny roapolo taona no ho miakatra, dia izay rehetra azo alefa hanafika avy amin’ny Israely, '
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: izay rehetra voaisa dia dimampolo sy dimanjato sy telo arivo sy enina hetsy.
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsy mba nisaina tao anatin’ireo kosa ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: levita
    - type: text
      text: ', araka ny fokony.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny anjara asa manokana ho an’ny fokon’i Levy
    marker-yv: yv-h
  '48':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy NY TOMPO tamin’i Mosesy: '
  '49':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny fokon’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: levita
    - type: text
      text: ' ihany no aza isaina, aza mba alaina isa miaraka amin’ny Zanak’Israely izy ireo. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Toy izao avy ny anaran’ireo lehilahy ho namanareo ireo.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny avy amin’i Robena dia i Elizora, zanak’i Sedeora;
  '50':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa tendreonao ny levita hitandrina ny tabernakelin’ny Vavolombelona sy ny fanaka rehetra ary ny zavatra rehetra izay momba azy. Izy ireo no hitondra ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: tabernakely
    - type: text
      text: ' sy ny zavatra rehetra, ary izy ireo no hanao fanompoana ao; manodidina ny tabernakely no hitobiany. '
  '51':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa hiainga ny tabernakely dia ny levita no handrava azy; rehefa mijanona ny tabernakely dia ny levita no hanangana azy indray; fa raha olon-kafa no manakaiky dia hovonoina izy. '
  '52':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hitoby ny Zanak’Israely, samy eo amin’ny tobiny avy, samy eo amin’ny fanevany avy, araka ny antokony. '
  '53':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ny levita kosa dia hitoby manodidina ny tabernakelin’ny Vavolombelona, mba tsy hisy fahatezerana hahatratra ny fiangonan’ny Zanak’Israely; ny levita dia hitandrina ny anjara raharaha momba ny tabernakelin’ny Vavolombelona '
  '54':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nataon’ny Zanak’Israely izany. Araka izay rehetra nandidian’NY TOMPO an’i Mosesy no nataony.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ny avy amin’i Simeona dia i Selomiela, zanak’i Zorisaday;
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ny avy amin’i Joda dia i Nasona, zanak’i Aminadaba;
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ny avy amin’Isakara dia i Netanela, zanak’i Zoara;
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ny avy amin’i Zebolona dia i Eliaba, zanak’i Helona;
