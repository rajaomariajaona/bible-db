- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ireo no voaantso teo amin’ny fiangonana, samy lohan’ny fokony avy sady mpifehy arivo amin’ny Israely. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary naka ireo olona voatonona anarana ireo i Mosesy sy i Arona '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'dia namory ny fiangonana manontolo tamin’ny andro voalohany tamin’ny volana faharoa. Samy nampanoratra ny firazanany avy izy, araka ny fokony sy ny fianakaviany, ary araka ny anarany tsirairay, hatramin’ny roapolo taona no ho miakatra. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Araka izay nandidian’NY TOMPO an’i Mosesy no nandaminany azy tany amin’ny tany efitr’i Sinay.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Dimanjato sy enina arivo sy efatra alina ny avy tamin’ny taranak’i Robena, lahimatoan’Israely, araka ny fokony sy ny fianakaviany, ary araka ny anarany tsirairay, dia ny lehilahy rehetra hatramin’ny roapolo taona no ho miakatra izay azo alefa hanafika, '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ary voaisa avy tamin’ny fokon’i Robena.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Tamin’ny taranak’i Simeona, araka ny fokony sy ny fianakaviany, dia izay rehetra voaisa, araka ny anaran’ny tsirairay, dia ny lehilahy rehetra hatramin’ny roapolo taona no ho miakatra, izay azo alefa hanafika, '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: izay voaisa avy tamin’ny fokon’i Simeona dia telonjato sy sivy arivo sy dimy alina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Tamin’ny taranak’i Gada, araka ny fokony sy ny fianakaviany, ary araka ny anarany tsirairay, hatramin’ny roapolo taona no ho miakatra, dia izay rehetra azo alefa hanafika, '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: izay voaisa avy tamin’ny fokon’i Gada kosa dia dimampolo sy eninjato sy dimy arivo sy efatra alina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
