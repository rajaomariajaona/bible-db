      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Tamin’ny taranak’i Asera, araka ny fokony sy ny fianakaviany, ary araka ny anarany tsirairay, hatramin’ny roapolo taona no ho miakatra, dia izay rehetra azo alefa hanafika, '
