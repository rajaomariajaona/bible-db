- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Ireo no voaisan’i Mosesy sy i Arona ary ireo mpifehy roa amby folo lahy tamin’ny Israely, izay samy lohan’ny fianakaviany avy. '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Ary izay rehetra voaisa avy tamin’ny Zanak’Israely araka ny fianakaviany, hatramin’ny roapolo taona no ho miakatra, dia izay rehetra azo alefa hanafika avy amin’ny Israely, '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: izay rehetra voaisa dia dimampolo sy dimanjato sy telo arivo sy enina hetsy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Tsy mba nisaina tao anatin’ireo kosa ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: levita
  - type: text
    text: ', araka ny fokony.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny anjara asa manokana ho an’ny fokon’i Levy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Hoy NY TOMPO tamin’i Mosesy: '
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'Ny fokon’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: levita
  - type: text
    text: ' ihany no aza isaina, aza mba alaina isa miaraka amin’ny Zanak’Israely izy ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Fa tendreonao ny levita hitandrina ny tabernakelin’ny Vavolombelona sy ny fanaka rehetra ary ny zavatra rehetra izay momba azy. Izy ireo no hitondra ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tabernakely
  - type: text
    text: ' sy ny zavatra rehetra, ary izy ireo no hanao fanompoana ao; manodidina ny tabernakely no hitobiany. '
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'Rehefa hiainga ny tabernakely dia ny levita no handrava azy; rehefa mijanona ny tabernakely dia ny levita no hanangana azy indray; fa raha olon-kafa no manakaiky dia hovonoina izy. '
  - type: usfm
    marker: v
    metadata:
      v: '52'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'Dia hitoby ny Zanak’Israely, samy eo amin’ny tobiny avy, samy eo amin’ny fanevany avy, araka ny antokony. '
  - type: usfm
    marker: v
    metadata:
      v: '53'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'Fa ny levita kosa dia hitoby manodidina ny tabernakelin’ny Vavolombelona, mba tsy hisy fahatezerana hahatratra ny fiangonan’ny Zanak’Israely; ny levita dia hitandrina ny anjara raharaha momba ny tabernakelin’ny Vavolombelona '
  - type: usfm
    marker: v
    metadata:
      v: '54'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: Dia nataon’ny Zanak’Israely izany. Araka izay rehetra nandidian’NY TOMPO an’i Mosesy no nataony.
