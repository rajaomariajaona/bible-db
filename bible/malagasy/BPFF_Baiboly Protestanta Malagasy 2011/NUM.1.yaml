document_id: NUM.1,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Fanisana voalohany natao tamin’ny Zanak’Israely
  - type: text
    content: 'Ary NY TOMPO niteny tamin’i Mosesy tany an-tany efitr’i Sinay, tao amin’ny '
  - type: text
    content: tranolay fihaonana
  - type: text
    content: ', tamin’ny andro voalohany tamin’ny volana faharoa, tamin’ny taona faharoa taorianan’ny nivoahan’ny Zanak’Israely avy tany amin’ny tany Ejipta. Hoy NY TOMPO taminy: '
  '10':
  - type: text
    content: 'ny avy amin’ny zanak’i Josefa kosa: Ny avy amin’i Efraima dia i Elisama, zanak’i Amihoda, ary ny avy amin’i Manase dia i Gamaliela, zanak’i Pedazora;'
  '11':
  - type: text
    content: ny avy amin’i Benjamina dia i Abidana, zanak’i Gideony;
  '12':
  - type: text
    content: ny avy amin’i Dana dia i Ahiezera, zanak’i Amisaday;
  '13':
  - type: text
    content: ny avy amin’i Asera dia i Pagiela, zanak’i Okrana;
  '14':
  - type: text
    content: ny avy amin’i Gada dia i Eliasafa, zanak’i Deoela;
  '15':
  - type: text
    content: ny avy amin’i Naftaly dia i Ahira, zanak’i Enana.
  '16':
  - type: text
    content: 'Ireo no voaantso teo amin’ny fiangonana, samy lohan’ny fokony avy sady mpifehy arivo amin’ny Israely. '
  '17':
  - type: text
    content: 'Ary naka ireo olona voatonona anarana ireo i Mosesy sy i Arona '
  '18':
  - type: text
    content: 'dia namory ny fiangonana manontolo tamin’ny andro voalohany tamin’ny volana faharoa. Samy nampanoratra ny firazanany avy izy, araka ny fokony sy ny fianakaviany, ary araka ny anarany tsirairay, hatramin’ny roapolo taona no ho miakatra. '
  '19':
  - type: text
    content: Araka izay nandidian’NY TOMPO an’i Mosesy no nandaminany azy tany amin’ny tany efitr’i Sinay.
  '2':
  - type: text
    content: 'Alao isa ny fiangonan’ny Zanak’Israely manontolo, araka ny fokony sy ny fianakaviany avy, ary araka ny anaran’ny lehilahy tsirairay, '
  '20':
  - type: text
    content: 'Dimanjato sy enina arivo sy efatra alina ny avy tamin’ny taranak’i Robena, lahimatoan’Israely, araka ny fokony sy ny fianakaviany, ary araka ny anarany tsirairay, dia ny lehilahy rehetra hatramin’ny roapolo taona no ho miakatra izay azo alefa hanafika, '
  '21':
  - type: text
    content: ary voaisa avy tamin’ny fokon’i Robena.
  '22':
  - type: text
    content: 'Tamin’ny taranak’i Simeona, araka ny fokony sy ny fianakaviany, dia izay rehetra voaisa, araka ny anaran’ny tsirairay, dia ny lehilahy rehetra hatramin’ny roapolo taona no ho miakatra, izay azo alefa hanafika, '
  '23':
  - type: text
    content: izay voaisa avy tamin’ny fokon’i Simeona dia telonjato sy sivy arivo sy dimy alina.
  '24':
  - type: text
    content: 'Tamin’ny taranak’i Gada, araka ny fokony sy ny fianakaviany, ary araka ny anarany tsirairay, hatramin’ny roapolo taona no ho miakatra, dia izay rehetra azo alefa hanafika, '
  '25':
  - type: text
    content: izay voaisa avy tamin’ny fokon’i Gada kosa dia dimampolo sy eninjato sy dimy arivo sy efatra alina.
  '26':
  - type: text
    content: 'Tamin’ny taranak’i Joda, araka ny fokony sy ny fianakaviany, ary araka ny anarany tsirairay hatramin’ny roapolo taona no ho miakatra, dia izay rehetra azo alefa hanafika, '
  '27':
  - type: text
    content: izay voaisa avy tamin’ny fokon’i Joda dia eninjato sy efatra arivo sy fito alina.
  '28':
  - type: text
    content: 'Tamin’ny taranak’Isakara, araka ny fokony sy ny fianakaviany, ary araka ny anarany tsirairay, hatramin’ny roapolo taona no ho miakatra, dia izay rehetra azo alefa hanafika, '
  '29':
  - type: text
    content: izay voaisa avy tamin’ny fokon’Isakara dia efajato sy efatra arivo sy dimy alina.
  '3':
  - type: text
    content: 'dia ny lehilahy rehetra hatramin’ny roapolo taona no ho miakatra, dia izay rehetra azo alefa hanafika amin’ny Israely. Handamina azy araka ny antokony avy ianao sy i Arona. '
  '30':
  - type: text
    content: 'Tamin’ny taranak’i Zebolona, araka ny fokony sy ny fianakaviany, ary araka ny anarany tsirairay, hatramin’ny roapolo taona no ho miakatra, dia izay rehetra azo alefa hanafika, '
  '31':
  - type: text
    content: ny voaisa avy tamin’ny fokon’i Zebolona dia efajato sy fito arivo sy dimy alina.
  '32':
  - type: text
    content: 'Tamin’ny taranak’i Josefa: Avy tamin’ny taranak’i Efraima, araka ny fokony sy ny fianakaviany, ary araka ny anarany tsirairay, hatramin’ny roapolo taona no ho miakatra, dia izay rehetra azo alefa hanafika, '
  '33':
  - type: text
    content: izay voaisa avy tamin’ny fokon’i Efraima dia dimanjato sy efatra alina.
  '34':
  - type: text
    content: 'Tamin’ny taranak’i Manase, araka ny fokony sy ny fianakaviany, ary araka ny anarany tsirairay, hatramin’ny roapolo taona no ho miakatra, dia izay rehetra azo alefa hanafika, '
  '35':
  - type: text
    content: izay voaisa avy tamin’ny fokon’i Manase dia roanjato sy telo arivo sy telo alina.
  '36':
  - type: text
    content: 'Tamin’ny taranak’i Benjamina, araka ny fokony sy ny fianakaviany, ary araka ny anarany tsirairay, hatramin’ny roapolo taona no ho miakatra, dia izay rehetra azo alefa hanafika, '
  '37':
  - type: text
    content: izay voaisa avy tamin’ny fokon’i Benjamina dia efajato sy dimy arivo sy telo alina.
  '38':
  - type: text
    content: 'Tamin’ny taranak’i Dana, araka ny fokony sy ny fianakaviany, ary araka ny anarany tsirairay, hatramin’ny roapolo taona no ho miakatra, dia izay rehetra azo alefa hanafika, '
  '39':
  - type: text
    content: izay voaisa avy tamin’ny fokon’i Dana dia fitonjato sy roa arivo sy enina alina.
  '4':
  - type: text
    content: 'Aoka hisy lehilahy iray avy isam-poko ho namanareo, dia izay samy lohan’ny fianakaviany avy. '
  '40':
  - type: text
    content: 'Tamin’ny taranak’i Asera, araka ny fokony sy ny fianakaviany, ary araka ny anarany tsirairay, hatramin’ny roapolo taona no ho miakatra, dia izay rehetra azo alefa hanafika, '
  '41':
  - type: text
    content: izay voaisa avy tamin’ny fokon’i Asera dia dimanjato sy arivo sy efatra alina.
  '42':
  - type: text
    content: 'Tamin’ny taranak’i Naftaly, araka ny fokony sy ny fianakaviany, ary araka ny anarany tsirairay, hatramin’ny roapolo taona no ho miakatra, dia izay rehetra azo alefa hanafika, '
  '43':
  - type: text
    content: izay voaisa avy tamin’ny fokon’i Naftaly dia efajato sy telo arivo sy dimy alina.
  '44':
  - type: text
    content: 'Ireo no voaisan’i Mosesy sy i Arona ary ireo mpifehy roa amby folo lahy tamin’ny Israely, izay samy lohan’ny fianakaviany avy. '
  '45':
  - type: text
    content: 'Ary izay rehetra voaisa avy tamin’ny Zanak’Israely araka ny fianakaviany, hatramin’ny roapolo taona no ho miakatra, dia izay rehetra azo alefa hanafika avy amin’ny Israely, '
  '46':
  - type: text
    content: izay rehetra voaisa dia dimampolo sy dimanjato sy telo arivo sy enina hetsy.
  '47':
  - type: text
    content: 'Tsy mba nisaina tao anatin’ireo kosa ny '
  - type: text
    content: levita
  - type: text
    content: ', araka ny fokony.'
  - type: heading
    content: Ny anjara asa manokana ho an’ny fokon’i Levy
  '48':
  - type: text
    content: 'Hoy NY TOMPO tamin’i Mosesy: '
  '49':
  - type: text
    content: 'Ny fokon’ny '
  - type: text
    content: levita
  - type: text
    content: ' ihany no aza isaina, aza mba alaina isa miaraka amin’ny Zanak’Israely izy ireo. '
  '5':
  - type: text
    content: Toy izao avy ny anaran’ireo lehilahy ho namanareo ireo.
  - type: text
    content: Ny avy amin’i Robena dia i Elizora, zanak’i Sedeora;
  '50':
  - type: text
    content: 'Fa tendreonao ny levita hitandrina ny tabernakelin’ny Vavolombelona sy ny fanaka rehetra ary ny zavatra rehetra izay momba azy. Izy ireo no hitondra ny '
  - type: text
    content: tabernakely
  - type: text
    content: ' sy ny zavatra rehetra, ary izy ireo no hanao fanompoana ao; manodidina ny tabernakely no hitobiany. '
  '51':
  - type: text
    content: 'Rehefa hiainga ny tabernakely dia ny levita no handrava azy; rehefa mijanona ny tabernakely dia ny levita no hanangana azy indray; fa raha olon-kafa no manakaiky dia hovonoina izy. '
  '52':
  - type: text
    content: 'Dia hitoby ny Zanak’Israely, samy eo amin’ny tobiny avy, samy eo amin’ny fanevany avy, araka ny antokony. '
  '53':
  - type: text
    content: 'Fa ny levita kosa dia hitoby manodidina ny tabernakelin’ny Vavolombelona, mba tsy hisy fahatezerana hahatratra ny fiangonan’ny Zanak’Israely; ny levita dia hitandrina ny anjara raharaha momba ny tabernakelin’ny Vavolombelona '
  '54':
  - type: text
    content: Dia nataon’ny Zanak’Israely izany. Araka izay rehetra nandidian’NY TOMPO an’i Mosesy no nataony.
  '6':
  - type: text
    content: ny avy amin’i Simeona dia i Selomiela, zanak’i Zorisaday;
  '7':
  - type: text
    content: ny avy amin’i Joda dia i Nasona, zanak’i Aminadaba;
  '8':
  - type: text
    content: ny avy amin’Isakara dia i Netanela, zanak’i Zoara;
  '9':
  - type: text
    content: ny avy amin’i Zebolona dia i Eliaba, zanak’i Helona;
