  - type: text
    text: ny avy amin’i Benjamina dia i Abidana, zanak’i Gideony;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
