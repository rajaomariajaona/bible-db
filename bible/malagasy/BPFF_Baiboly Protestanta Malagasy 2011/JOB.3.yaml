document_id: JOB.3,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: NY RESAKA IFAMALIAN’I JOBA SY IREO NAMANY
  - type: heading
    content: Manenina ny nahaterahany i Joba
  - type: text
    content: 'Rehefa afaka izany dia niloa-bava i Joba nanozona ny androny. '
  '10':
  - type: text
    content: Satria tsy nanidy ny varavaran’ny kibon’Ineny izy
  - type: text
    content: ka tsy nanafina fahoriana tamin’ny masoko.
  '11':
  - type: text
    content: Nahoana re aho no tsy maty hatrany am-bohoka e
  - type: text
    content: ary tsy niala aina raha vao nivoaka avy tany an-kibo?
  '12':
  - type: text
    content: Nahoana no nisy lohalika niandry ahy?
  - type: text
    content: Ary nahoana no nisy nono hinonoako?
  '13':
  - type: text
    content: Fa raha tsy izany dia efa nandry tamim-piadanana aho;
  - type: text
    content: eny, natory aho ka afa-tsasatra
  '14':
  - type: text
    content: niaraka tamin’ny mpanjaka sy ny mpanolotsainan’ny tany
  - type: text
    content: izay nanao ireny tanàna efa rava ireny,
  '15':
  - type: text
    content: na niaraka tamin’ny andriandahy izay manana volamena
  - type: text
    content: sady mameno volafotsy ny tranony;
  '16':
  - type: text
    content: na efa tsy ary toy ny zaza tsy tonga volana aho ka nafenina,
  - type: text
    content: dia toy ny zaza izay tsy nahita ny mazava akory.
  '17':
  - type: text
    content: Any no itsaharan’ny ratsy fanahy tsy hampitebiteby intsony
  - type: text
    content: ary any ny reraka no afa-tsasatra;
  '18':
  - type: text
    content: miadana avokoa ny mpifatotra,
  - type: text
    content: tsy mandre ny feon’ny mpampijaly izy;
  '19':
  - type: text
    content: samy any ny kely sy ny lehibe
  - type: text
    content: ary afaka amin’ny tompony ny mpanompo.
  '2':
  - type: text
    content: 'Hoy izy:'
  '20':
  - type: text
    content: Nahoana no fahazavana no mba omena ny reraka
  - type: text
    content: ary fiainana ho an’izay latsaka amin’izay feno alahelo,
  '21':
  - type: text
    content: izay miandry fahafatesana, nefa tsy avy izy,
  - type: text
    content: sady mitady azy mihoatra noho ny fitady harena nafenina;
  '22':
  - type: text
    content: izay faly indrindra sady ravoravo
  - type: text
    content: raha mahita ny fasana,
  '23':
  - type: text
    content: dia olona izay mandeha ao amin’ny maizina
  - type: text
    content: sady voafefin’Andriamanitra manodidina?
  '24':
  - type: text
    content: Fa mialoha ny hanin-kohaniko ny fitolokoko
  - type: text
    content: ary migororoana toy ny rano ny fidradradradrako;
  '25':
  - type: text
    content: fa izay atahorako no mahazo ahy
  - type: text
    content: ary izay angovitako no manjo ahy.
  '26':
  - type: text
    content: Tsy mbola nahita fiadanana na fitsaharana na fiatoana akory aza aho
  - type: text
    content: dia tonga indray ny tebiteby.
  '3':
  - type: text
    content: Ho foana anie ny andro nahaterahako
  - type: text
    content: 'sy ny alina izay niteny hoe: Misy zazalahy vao torontoronina!'
  '4':
  - type: text
    content: Aoka izany andro izany ho maizina;
  - type: text
    content: aoka tsy hikaroka azy avy any ambony Andriamanitra;
  - type: text
    content: aoka tsy hisy mazava hamirapiratra aminy!
  '5':
  - type: text
    content: Aoka hitaky azy indray ny haizina sy ny aloky ny fahafatesana;
  - type: text
    content: aoka hitatao eo amboniny ny rahona;
  - type: text
    content: aoka hampihoron-koditra azy ny fahamaizin’ny andro!
  '6':
  - type: text
    content: Aoka ny haizim-pito hisambotra izany alina izany!
  - type: text
    content: Aoka tsy hiara-mifaly amin’ny andron’ny taona izy
  - type: text
    content: ary tsy ho anatin’ny fanisana ny volana!
  '7':
  - type: text
    content: Eny, aoka ho momba izany alina izany;
  - type: text
    content: aoka tsy ho velona ao ny hoby!
  '8':
  - type: text
    content: Aoka hanozona azy ny mpanozona andro
  - type: text
    content: 'izay mahay mamoha ny '
  - type: text
    content: dragona
  - type: text
    content: '!'
  '9':
  - type: text
    content: Aoka ho maizina ny kintan’ny marainany!
  - type: text
    content: Aoka hiandry ny mazava izy nefa tsy hisy!
  - type: text
    content: Ary aoka tsy ho faly mahita ny hodimason’ny maraina izy!
