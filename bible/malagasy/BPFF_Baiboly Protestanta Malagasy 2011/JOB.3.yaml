document_id: JOB.3
type_code: plt
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: NY RESAKA IFAMALIAN’I JOBA SY IREO NAMANY
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Manenina ny nahaterahany i Joba
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Rehefa afaka izany dia niloa-bava i Joba nanozona ny androny. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Hoy izy:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ho foana anie ny andro nahaterahako
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'sy ny alina izay niteny hoe: Misy zazalahy vao torontoronina!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Aoka izany andro izany ho maizina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: aoka tsy hikaroka azy avy any ambony Andriamanitra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: aoka tsy hisy mazava hamirapiratra aminy!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Aoka hitaky azy indray ny haizina sy ny aloky ny fahafatesana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: aoka hitatao eo amboniny ny rahona;
- type: usfm
  marker: q1
  children:
  - type: text
    text: aoka hampihoron-koditra azy ny fahamaizin’ny andro!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Aoka ny haizim-pito hisambotra izany alina izany!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aoka tsy hiara-mifaly amin’ny andron’ny taona izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy ho anatin’ny fanisana ny volana!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Eny, aoka ho momba izany alina izany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: aoka tsy ho velona ao ny hoby!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Aoka hanozona azy ny mpanozona andro
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'izay mahay mamoha ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: dragona
  - type: text
    text: '!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Aoka ho maizina ny kintan’ny marainany!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aoka hiandry ny mazava izy nefa tsy hisy!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary aoka tsy ho faly mahita ny hodimason’ny maraina izy!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Satria tsy nanidy ny varavaran’ny kibon’Ineny izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy nanafina fahoriana tamin’ny masoko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Nahoana re aho no tsy maty hatrany am-bohoka e
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy niala aina raha vao nivoaka avy tany an-kibo?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Nahoana no nisy lohalika niandry ahy?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary nahoana no nisy nono hinonoako?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Fa raha tsy izany dia efa nandry tamim-piadanana aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, natory aho ka afa-tsasatra
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: niaraka tamin’ny mpanjaka sy ny mpanolotsainan’ny tany
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay nanao ireny tanàna efa rava ireny,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: na niaraka tamin’ny andriandahy izay manana volamena
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady mameno volafotsy ny tranony;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: na efa tsy ary toy ny zaza tsy tonga volana aho ka nafenina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia toy ny zaza izay tsy nahita ny mazava akory.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Any no itsaharan’ny ratsy fanahy tsy hampitebiteby intsony
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary any ny reraka no afa-tsasatra;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: miadana avokoa ny mpifatotra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy mandre ny feon’ny mpampijaly izy;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: samy any ny kely sy ny lehibe
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary afaka amin’ny tompony ny mpanompo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Nahoana no fahazavana no mba omena ny reraka
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary fiainana ho an’izay latsaka amin’izay feno alahelo,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: izay miandry fahafatesana, nefa tsy avy izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady mitady azy mihoatra noho ny fitady harena nafenina;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: izay faly indrindra sady ravoravo
- type: usfm
  marker: q1
  children:
  - type: text
    text: raha mahita ny fasana,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: dia olona izay mandeha ao amin’ny maizina
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady voafefin’Andriamanitra manodidina?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Fa mialoha ny hanin-kohaniko ny fitolokoko
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary migororoana toy ny rano ny fidradradradrako;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: fa izay atahorako no mahazo ahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary izay angovitako no manjo ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Tsy mbola nahita fiadanana na fitsaharana na fiatoana akory aza aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia tonga indray ny tebiteby.
