document_id: JOB.5,3103
type_code: plt
verses:
  '1':
  - type: text
    content: Miantsoa ange!
  - type: text
    content: Moa misy hamaly anao va?
  - type: text
    content: Ary iza amin’ireo masina no hotodihinao?
  '10':
  - type: text
    content: mampilatsaka ranonorana etỳ ambonin’ny tany Izy
  - type: text
    content: ary mampandeha rano eny amin’ny saha;
  '11':
  - type: text
    content: apetrany amin’ny avo izay ambany
  - type: text
    content: ary ny misaona no asandrany ho amin’ny famonjena.
  '12':
  - type: text
    content: Izy no mandrava ny hevitry ny fetsy
  - type: text
    content: ka tsy mahefa na inona na inona ny tanan’ireny;
  '13':
  - type: text
    content: ny hafetsen’ny hendry ihany no entiny misambotra azy,
  - type: text
    content: ary ny saina ataon’ny mpiolakolaka dia rava;
  '14':
  - type: text
    content: na dia amin’ny antoandro aza dia tafatsarapaka ao amin’ny maizina ireny
  - type: text
    content: ka miraparapa amin’ny mitataovovonana tahaka ny amin’ny alina,
  '15':
  - type: text
    content: fa vonjeny kosa ny malahelo tsy ho voan’ny sabatry ny vavany;
  - type: text
    content: eny, vonjeny tsy ho azon’ny tanan’ny mahery izy.
  '16':
  - type: text
    content: Dia misy fanantenana ho an’ny reraka,
  - type: text
    content: fa ny faharatsiana kosa dia mihombom-bava.
  '17':
  - type: text
    content: Indro, sambatra ny zanak’olombelona izay anarin’Andriamanitra!
  - type: text
    content: Koa aza atao tsinontsinona ny famaizan’ny Tsitoha!
  '18':
  - type: text
    content: Fa sady mandratra Izy no mamehy;
  - type: text
    content: manorotoro Izy ary ny tanany ihany no manasitrana.
  '19':
  - type: text
    content: Amin’ny fahoriana enina dia hamonjy anao Izy;
  - type: text
    content: eny, amin’ny fito aza dia tsy hisy loza hihatra aminao.
  '2':
  - type: text
    content: Fa ny adala dia vonoin’ny fahasosorana
  - type: text
    content: ary ny kely saina dia matin’ny fialonana.
  '20':
  - type: text
    content: Raha avy ny mosary dia hiaro anao amin’ny fahafatesana Izy
  - type: text
    content: ary raha avy ny ady dia hiaro anao tsy ho voan’ny sabatra Izy;
  '21':
  - type: text
    content: afeniny tsy ho voan’ny kapo-bava ianao
  - type: text
    content: ary tsy hatahotra ianao raha avy ny fandringanana;
  '22':
  - type: text
    content: ny fandringanana sy ny mosary dia hihomehezanao
  - type: text
    content: ary tsy hatahoranao ny bibidia;
  '23':
  - type: text
    content: fa vita fanekena amin’ny vato any an-tsaha aza ianao
  - type: text
    content: ary ny bibidia dia hihavana aminao.
  '24':
  - type: text
    content: Ho hitanao fa ny fiadanana no tranolainao,
  - type: text
    content: ary raha mizaha ny kijananao ianao
  - type: text
    content: dia ho hitanao fa tsy misy very ny ao.
  '25':
  - type: text
    content: Ho hitanao koa fa maro ny zanakao
  - type: text
    content: ary ny naterakao dia ho tahaka ny ahitra amin’ny tany.
  '26':
  - type: text
    content: Mbola feno tanjaka ianao no hiditra any am-pasana,
  - type: text
    content: tahaka ny famoriana ny amboaram-bary amin’ny fotoanany.
  '27':
  - type: text
    content: Izany ary no izy fa efa nandinika azy izahay!
  - type: text
    content: Hevero ary izany ka fantaro tsara!
  '3':
  - type: text
    content: Izaho dia nahita olona adala mamaka,
  - type: text
    content: nefa vetivety indray dia tsy maintsy nanozona ny fonenany aho.
  '4':
  - type: text
    content: Aoka ho lavitra ny famonjena ny zanany
  - type: text
    content: ka ho torotoro eo am-bavahady
  - type: text
    content: nefa tsy misy mamonjy!
  '5':
  - type: text
    content: Aoka ny vokatry ny taniny ho lanin’ny mosarena;
  - type: text
    content: eny, halainy na dia voafefy tsilo aza!
  - type: text
    content: Ary aoka ny mangetaheta hitsiriritra ny fananany.
  '6':
  - type: text
    content: Fa tsy mivoaka avy amin’ny vovoka ny alahelo
  - type: text
    content: ary tsy mitrebona avy amin’ny tany ny fahoriana,
  '7':
  - type: text
    content: nefa teraka ho amin’ny fahoriana ny olombelona,
  - type: text
    content: dia tahaka ny fanidin’ny kilalaon’afo miakatra.
  '8':
  - type: text
    content: Fa raha izaho kosa dia hitady an’Andriamanitra aho
  - type: text
    content: ary Andriamanitra ihany no hametrahako ny raharahako.
  '9':
  - type: text
    content: Manao zava-dehibe tsy takatry ny saina Izy
  - type: text
    content: ary zava-mahagaga tsy hita isa;
