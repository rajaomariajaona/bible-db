document_id: JOB.5
type_code: plt
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Miantsoa ange!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Moa misy hamaly anao va?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary iza amin’ireo masina no hotodihinao?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Fa ny adala dia vonoin’ny fahasosorana
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny kely saina dia matin’ny fialonana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Izaho dia nahita olona adala mamaka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa vetivety indray dia tsy maintsy nanozona ny fonenany aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Aoka ho lavitra ny famonjena ny zanany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka ho torotoro eo am-bavahady
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa tsy misy mamonjy!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Aoka ny vokatry ny taniny ho lanin’ny mosarena;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, halainy na dia voafefy tsilo aza!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary aoka ny mangetaheta hitsiriritra ny fananany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Fa tsy mivoaka avy amin’ny vovoka ny alahelo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy mitrebona avy amin’ny tany ny fahoriana,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: nefa teraka ho amin’ny fahoriana ny olombelona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia tahaka ny fanidin’ny kilalaon’afo miakatra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Fa raha izaho kosa dia hitady an’Andriamanitra aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary Andriamanitra ihany no hametrahako ny raharahako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Manao zava-dehibe tsy takatry ny saina Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary zava-mahagaga tsy hita isa;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: mampilatsaka ranonorana etỳ ambonin’ny tany Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mampandeha rano eny amin’ny saha;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: apetrany amin’ny avo izay ambany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny misaona no asandrany ho amin’ny famonjena.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Izy no mandrava ny hevitry ny fetsy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy mahefa na inona na inona ny tanan’ireny;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ny hafetsen’ny hendry ihany no entiny misambotra azy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny saina ataon’ny mpiolakolaka dia rava;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: na dia amin’ny antoandro aza dia tafatsarapaka ao amin’ny maizina ireny
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka miraparapa amin’ny mitataovovonana tahaka ny amin’ny alina,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: fa vonjeny kosa ny malahelo tsy ho voan’ny sabatry ny vavany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, vonjeny tsy ho azon’ny tanan’ny mahery izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Dia misy fanantenana ho an’ny reraka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny faharatsiana kosa dia mihombom-bava.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Indro, sambatra ny zanak’olombelona izay anarin’Andriamanitra!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Koa aza atao tsinontsinona ny famaizan’ny Tsitoha!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Fa sady mandratra Izy no mamehy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: manorotoro Izy ary ny tanany ihany no manasitrana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Amin’ny fahoriana enina dia hamonjy anao Izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, amin’ny fito aza dia tsy hisy loza hihatra aminao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Raha avy ny mosary dia hiaro anao amin’ny fahafatesana Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary raha avy ny ady dia hiaro anao tsy ho voan’ny sabatra Izy;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: afeniny tsy ho voan’ny kapo-bava ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy hatahotra ianao raha avy ny fandringanana;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ny fandringanana sy ny mosary dia hihomehezanao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy hatahoranao ny bibidia;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: fa vita fanekena amin’ny vato any an-tsaha aza ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny bibidia dia hihavana aminao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Ho hitanao fa ny fiadanana no tranolainao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary raha mizaha ny kijananao ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ho hitanao fa tsy misy very ny ao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Ho hitanao koa fa maro ny zanakao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny naterakao dia ho tahaka ny ahitra amin’ny tany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Mbola feno tanjaka ianao no hiditra any am-pasana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tahaka ny famoriana ny amboaram-bary amin’ny fotoanany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Izany ary no izy fa efa nandinika azy izahay!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hevero ary izany ka fantaro tsara!
