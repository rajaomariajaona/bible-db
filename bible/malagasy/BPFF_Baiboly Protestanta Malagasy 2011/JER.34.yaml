document_id: JER.34,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Nambaran’i Jeremia tamin’i Zedekia mpanjaka ny anjara miandry azy
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao no teny tonga tamin’i Jeremia avy tamin’NY TOMPO, fony i Nebokadnezara, mpanjakan’i Babilona, namely an’i Jerosalema sy ny tanànany rehetra niaraka tamin’ny miaramilany rehetra ary ny fanjakana rehetra amin’ny tany izay nanjakany mbamin’ny firenena rehetra:'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nanaiky ny mpanapaka rehetra sy ny vahoaka rehetra izay nanao ny fanekena fa samy handefa ny mpanompolahiny sy ny mpanompovaviny ho afaka mba tsy hampanompoany azy intsony; eny, nanaiky izy ka samy nandefa azy ho afaka. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Kanjo taorianan’izany dia nanenina izy ka naveriny indray ireo mpanompolahy sy mpanompovavy izay efa nalefany ho afaka ireo, dia nandevoziny ho mpanompolahiny sy ho mpanompovaviny indray.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary tonga tamin’i Jeremia ny tenin’NY TOMPO hoe: '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao no lazain’NY TOMPO, Andriamanitry ny Israely: Izaho efa nanao fanekena tamin’ny razanareo tamin’ny andro nitondrako azy nivoaka avy tany amin’ny tany Ejipta hiala tamin’ny trano nanandevozana, tamin’ny nilazako hoe: '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Isaky ny fito taona dia samia mandefa ny Hebreo rahalahiny izay namidy taminao; koa rehefa nanompo anao enin-taona izy dia alefaso ho afaka; nefa tsy nihaino Ahy ny razanareo ary tsy nanongilana ny sofiny izy. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nibebaka ianareo androany ka nanao izay mahitsy teo imasoko tamin’ny niantsoanareo fanafahana, samy handefa ny rahalahiny avy; ary nanao fanekena teo anatrehako ianareo, dia tao amin’ny trano izay efa niantsoana ny anarako; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: kanjo nivadika indray ianareo ka nanamavo ny anarako, fa samy namerina ny mpanompolahiny sy ny mpanompovaviny izay efa nalefanareo handeha araka izay tiany, dia nanandevo azy ho mpanompolahiny sy ho mpanompovaviny indray ianareo.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa izao no lazain’NY TOMPO: Tsy nihaino Ahy ianareo ka tsy nety nitory fanafahana ho an’ny rahalahinareo sy ny namanareo avy; dia indro, miantso fanafahana ho anareo kosa Aho, hoy NY TOMPO, nefa ho an’ny sabatra sy ny areti-mandringana ary ny mosary; hatolotro ho fampangovitana ny fanjakana rehetra amin’ny tany ianareo. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hatolotro ny olona izay nivadika ny fanekeko ka tsy nahatana ny tenin’ny fanekena izay nataony teo anatrehako, fony nosasahiny ny ombilahy kely ka nandeha teo anelanelan’ny tapany izy, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'eny, hatolotro ny mpanapaka ny Joda, ny mpanapaka any Jerosalema, ny tandapa, ny mpisorona ary ny vahoaka rehetra izay nandeha teo anelanelan’ny tapaky ny ombilahy kely, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao no lazain’NY TOMPO, Andriamanitry ny Israely: Mandehana, lazao amin’i Zedekia, mpanjakan’ny Joda, ka ambarao aminy hoe: Izao no lazain’NY TOMPO: Indro, atolotro eo an-tanan’ny mpanjakan’i Babilona ity tanàna ity ka hodorany amin’ny afo izy; '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia hatolotro eo an-tanan’ny fahavalony sy eo an-tanan’izay mitady ny ainy; ary ho fihinan’ny voromanidina sy ny bibidia ny fatiny. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary i Zedekia, mpanjakan’ny Joda, sy ny mpanapaka dia hatolotro eo an-tanan’ny fahavalony sy eo an-tanan’izay mitady ny ainy ary eo an-tanan’ny miaramilan’ny mpanjakan’i Babilona izay efa lasa niala taminareo. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Indro, handidy Aho, hoy NY TOMPO, ary hampivereniko ho amin’ity tanàna ity ireo; hasiany ity tanàna ity ka ho azony, dia hodorany amin’ny afo. Ary ny tanànan’ny Joda dia hofoanako tsy hisy mponina.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'tsy ho afa-mandositra ny tanany ianao fa ho voasambotra tokoa ka hatolotra eo an-tanany; ary hahita ny mason’ny mpanjakan’i Babilona ny masonao, dia hiteny mifanatrika aminao izy, sady ho tonga any Babilona ianao. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nefa henoy ny tenin’NY TOMPO, ry Zedekia, mpanjakan’ny Joda. Izao no lazain’NY TOMPO ny aminao: Tsy ho fatin-tsabatra ianao, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fa amin’ny fiadanana no hahafatesanao, ary handoro zavatra ho fisaonana anao ny olona, tahaka ny nandoroany ho fisaonana ny razanao, dia ireo mpanjaka fahiny tany alohanao, ary hitomany anao ny olona hoe: Indrisy ry tompoko! Izaho no milaza izany, hoy NY TOMPO.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nolazain’i Jeremia mpaminany tamin’i Zedekia, mpanjakan’ny Joda, tany Jerosalema, izany teny rehetra izany, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fony mbola namely an’i Jerosalema sy ny tanànan’ny Joda sisa rehetra, dia i Lakisy sy i Azeka, ny miaramilan’ny mpanjakan’i Babilona: fa ireo ihany no tanàna mimanda sisa tamin’ny tanànan’ny Joda.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Naverina nanompo indray ireo mpanompo afaka
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao no teny tonga tamin’i Jeremia avy tamin’NY TOMPO, rehefa nanao fanekena tamin’ny vahoaka rehetra izay tany Jerosalema i Zedekia mpanjaka mba hitory fanafahana aminy '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ka samy handefa ny mpanompolahiny sy ny mpanompovaviny, dia izay Hebreo lahy sy Hebreo vavy, ho afaka, mba tsy hisy hampanompo ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jiosy
    - type: text
      text: ' rahalahiny intsony. '
