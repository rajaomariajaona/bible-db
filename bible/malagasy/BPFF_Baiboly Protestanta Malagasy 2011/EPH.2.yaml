document_id: EPH.2,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Avy amin’ny fahafatesana ho amin’ny fiainana
  - type: text
    content: 'Ianareo dia maty noho ny fahadisoanareo sy ny fahotanareo '
  '10':
  - type: text
    content: Fa asany isika, voaforona tao amin’i Kristy Jesosy mba hanao asa tsara izay nomanin’Andriamanitra rahateo mba handehanantsika amin’izany.
  - type: heading
    content: Samy miombona ao amin’i Kristy na Jiosy na Jentilisa
  '11':
  - type: text
    content: 'Koa tsarovy fa fahiny ianareo dia '
  - type: text
    content: Jentilisa
  - type: text
    content: ' araka ny nofo ka nolazain’ny voaforan-tanana teo amin’ny nofo hoe tsy voafora. '
  '12':
  - type: text
    content: 'Eny, tsy nanana an’i '
  - type: text
    content: Kristy
  - type: text
    content: ' ianareo tamin’izany andro izany, fa olon-ko azy tamin’ny fanjakan’ny Israely ary vahiny tamin’ireo faneken’ny teny fikasana, tsy nanana fanantenana sady tsy nanana an’Andriamanitra teo amin’izao tontolo izao. '
  '13':
  - type: text
    content: Ankehitriny kosa, ao amin’i Kristy Jesosy, ianareo izay lavitra fahiny dia tonga akaiky noho ny ran’i Kristy.
  '14':
  - type: text
    content: 'Izy no fihavanantsika izay nahatonga antsika roa tonta ho iray ka nandrava ny efitry ny fisarahana: Tao amin’ny nofony no nandravany ny fifandrafiana. '
  '15':
  - type: text
    content: 'Nofoanany ny lalàna nisy didy natao hotandremana mba hanakambanany antsika roa tonta ao amin’ny tenany ho olom-baovao iray ka nanaovany fihavanana, '
  '16':
  - type: text
    content: 'sady hampihavana antsika roa tonta ho tena iray amin’Andriamanitra noho ny hazofijaliana izay namonoany ny fifandrafiana tao aminy. '
  '17':
  - type: text
    content: 'Tonga Izy nitory teny soa mahafaly nilaza fihavanana taminareo izay lavitra ary fihavanana koa tamin’izay akaiky, '
  '18':
  - type: text
    content: satria Izy no ahafahantsika roa tonta manatona ny Ray amin’ny Fanahy iray.
  '19':
  - type: text
    content: 'Koa tsy vahiny sy mpivahiny intsony ianareo fa tompon-tany, mpiray fanjakana amin’ny olona masina sady ankohonan’Andriamanitra, '
  '2':
  - type: text
    content: 'izay niainanareo fahiny, araka ny fomban’izao tontolo izao, araka ny mpanapaka ny fanjakana eny amin’ny rivotra, dia ny fanahy izay miasa ankehitriny ao anatin’ny tsy mpankato. '
  '20':
  - type: text
    content: 'naorina teo ambonin’ny fanorenan’ny Apostoly sy ny mpaminany; ary Kristy Jesosy no vato fehizoro. '
  '21':
  - type: text
    content: 'Ao Aminy no irafetan’ny rafitra rehetra, mitombo ho '
  - type: text
    content: tempoly
  - type: text
    content: ' masina ao amin’ny Tompo; '
  '22':
  - type: text
    content: ao Aminy koa ianareo no miaraka aorina ho fonenan’Andriamanitra ao amin’ny Fanahy.
  '3':
  - type: text
    content: 'Teo amin’ireo no nitondrantsika rehetra tena koa fahiny tamin’ny filan’ny nofontsika ka nanaovantsika ny danin’ny nofo sy ny saina; ary araka ny toetsika dia voatendry ho amin’ny fahatezerana toy ny hafa koa isika. '
  '4':
  - type: text
    content: 'Andriamanitra anefa manankarena famindrampo, noho ny halehiben’ny fitiavany izay nitiavany antsika, '
  '5':
  - type: text
    content: 'koa fony mbola maty noho ny fahadisoana isika dia novelominy niaraka tamin’i '
  - type: text
    content: Kristy
  - type: text
    content: '. Fahasoavana no namonjena anareo. '
  '6':
  - type: text
    content: 'Niara-natsangany isika ary niara-napetrany any an-danitra ao amin’i Kristy Jesosy '
  '7':
  - type: text
    content: mba hasehony amin’ny andro ho avy ny harenan’ny fahasoavany tsy hita lany amin’ny fahamoram-panahiny amintsika ao amin’i Kristy Jesosy.
  '8':
  - type: text
    content: 'Fa fahasoavana no namonjena anareo amin’ny alalan’ny finoana; ary tsy avy aminareo izany, fa fanomezana avy amin’Andriamanitra; '
  '9':
  - type: text
    content: 'tsy avy amin’ny asa, fandrao hisy hirehareha. '
