document_id: EPH.2
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Avy amin’ny fahafatesana ho amin’ny fiainana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ianareo dia maty noho ny fahadisoanareo sy ny fahotanareo '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'izay niainanareo fahiny, araka ny fomban’izao tontolo izao, araka ny mpanapaka ny fanjakana eny amin’ny rivotra, dia ny fanahy izay miasa ankehitriny ao anatin’ny tsy mpankato. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Teo amin’ireo no nitondrantsika rehetra tena koa fahiny tamin’ny filan’ny nofontsika ka nanaovantsika ny danin’ny nofo sy ny saina; ary araka ny toetsika dia voatendry ho amin’ny fahatezerana toy ny hafa koa isika. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Andriamanitra anefa manankarena famindrampo, noho ny halehiben’ny fitiavany izay nitiavany antsika, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'koa fony mbola maty noho ny fahadisoana isika dia novelominy niaraka tamin’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: '. Fahasoavana no namonjena anareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Niara-natsangany isika ary niara-napetrany any an-danitra ao amin’i Kristy Jesosy '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: mba hasehony amin’ny andro ho avy ny harenan’ny fahasoavany tsy hita lany amin’ny fahamoram-panahiny amintsika ao amin’i Kristy Jesosy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Fa fahasoavana no namonjena anareo amin’ny alalan’ny finoana; ary tsy avy aminareo izany, fa fanomezana avy amin’Andriamanitra; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'tsy avy amin’ny asa, fandrao hisy hirehareha. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Fa asany isika, voaforona tao amin’i Kristy Jesosy mba hanao asa tsara izay nomanin’Andriamanitra rahateo mba handehanantsika amin’izany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Samy miombona ao amin’i Kristy na Jiosy na Jentilisa
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Koa tsarovy fa fahiny ianareo dia '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jentilisa
  - type: text
    text: ' araka ny nofo ka nolazain’ny voaforan-tanana teo amin’ny nofo hoe tsy voafora. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Eny, tsy nanana an’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' ianareo tamin’izany andro izany, fa olon-ko azy tamin’ny fanjakan’ny Israely ary vahiny tamin’ireo faneken’ny teny fikasana, tsy nanana fanantenana sady tsy nanana an’Andriamanitra teo amin’izao tontolo izao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ankehitriny kosa, ao amin’i Kristy Jesosy, ianareo izay lavitra fahiny dia tonga akaiky noho ny ran’i Kristy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Izy no fihavanantsika izay nahatonga antsika roa tonta ho iray ka nandrava ny efitry ny fisarahana: Tao amin’ny nofony no nandravany ny fifandrafiana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Nofoanany ny lalàna nisy didy natao hotandremana mba hanakambanany antsika roa tonta ao amin’ny tenany ho olom-baovao iray ka nanaovany fihavanana, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'sady hampihavana antsika roa tonta ho tena iray amin’Andriamanitra noho ny hazofijaliana izay namonoany ny fifandrafiana tao aminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Tonga Izy nitory teny soa mahafaly nilaza fihavanana taminareo izay lavitra ary fihavanana koa tamin’izay akaiky, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: satria Izy no ahafahantsika roa tonta manatona ny Ray amin’ny Fanahy iray.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Koa tsy vahiny sy mpivahiny intsony ianareo fa tompon-tany, mpiray fanjakana amin’ny olona masina sady ankohonan’Andriamanitra, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'naorina teo ambonin’ny fanorenan’ny Apostoly sy ny mpaminany; ary Kristy Jesosy no vato fehizoro. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ao Aminy no irafetan’ny rafitra rehetra, mitombo ho '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tempoly
  - type: text
    text: ' masina ao amin’ny Tompo; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ao Aminy koa ianareo no miaraka aorina ho fonenan’Andriamanitra ao amin’ny Fanahy.
