document_id: JER.33,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ireo tanàna voamboatra indray
  - type: text
    content: 'Tonga fanindroany tamin’i Jeremia ny tenin’NY TOMPO, raha mbola voatazona teo amin’ny trano fiambenana ihany izy hoe:'
  '10':
  - type: text
    content: 'Izao no lazain’NY TOMPO: Eto amin’ity tany ity izay ataonareo hoe rava ka tsy misy olona na biby fiompy intsony, dia eto amin’ny tanànan’ny Joda sy ao amin’ny lalamben’i Jerosalema izay efa lao ka tsy misy olona na mponina na biby fiompy, '
  '11':
  - type: text
    content: 'no mbola handrenesana indray ny feo mifaly sy ny feo miravoravo, dia ny feon’ny mpampakatra sy ny an’ny ampakarina ary ny feon’izay miteny hoe: Miderà an’Andriamanitra, Tompon’izao rehetra izao, fa tsara Izy, fa, mandrakizay ny famindrampony, dia izay mitondra fanati-pisaorana ho ao amin’ny tranon’NY TOMPO; fa hataoko tonga tahaka ny tany aloha ny fahatsarany, hoy NY TOMPO.'
  '12':
  - type: text
    content: 'Izao no lazain’Andriamanitra, Tompon’izao rehetra izao: Eto amin’ity tany efa lao tsy misy olona na biby fiompy ity sy amin’ny tanànany rehetra dia mbola hisy fonenan’ny mpiandry ondry hampandriany ny ondry aman’osiny, '
  '13':
  - type: text
    content: dia amin’ny tanàna any amin’ny tany be havoana, amin’ny tanàna any Sefela, amin’ny tanàna any Negeva, amin’ny tanin’ny Benjamina, amin’ny manodidina an’i Jerosalema, ary amin’ny tanànan’ny Joda, dia mbola hampandalovina eo anatrehan’ny mpanisa azy ny ondry aman’osy mba ho isainy, hoy NY TOMPO.
  - type: heading
    content: Fanavaozana ny fanjakan’i Davida
  '14':
  - type: text
    content: 'Indro, avy ny andro, hoy NY TOMPO, izay hanatanterahako ny teny soa izay nolazaiko ny amin’ny taranak’Israely sy ny taranak’i Joda. '
  '15':
  - type: text
    content: 'Amin’izany andro izany sy amin’izany fotoana izany dia hampaniry Solofo marina ho an’i Davida Aho; ary hanao fitsarana marina amin’ny tany Izy. '
  '16':
  - type: text
    content: 'Amin’izany andro izany dia hovonjena ny Joda, ary handry fehizay i Jerosalema; ary izao no hanononana azy: NY TOMPO no Fahamarinantsika. '
  '17':
  - type: text
    content: 'Fa izao no lazain’NY TOMPO: Tsy ho diso zanakalahy hipetraka eo amin’ny sezafiandrianan’ny taranak’Israely i Davida; '
  '18':
  - type: text
    content: 'ary ny '
  - type: text
    content: levita
  - type: text
    content: ' mpisorona dia tsy ho diso zanakalahy ho eo anatrehako, izay hanolotra tsy tapaka, fanatitra dorana manontolo sy fanatitra avy amin’ny zavamaniry ary fanatitra hafa alatsa-dra.'
  - type: heading
    content: Fanekena tsy azo foanana
  '19':
  - type: text
    content: 'Ary tonga tamin’i Jeremia ny tenin’NY TOMPO hoe: '
  '2':
  - type: text
    content: 'Izao no lazain’NY TOMPO, Mpanao izany, dia NY TOMPO izay namorona izany mba hampitoetra azy; NY TOMPO no anarany: '
  '20':
  - type: text
    content: 'Izao no lazain’NY TOMPO: Raha mahafoana ny fanekeko ny amin’ny andro sy ny fanekeko ny amin’ny alina ianareo, mba tsy hisy intsony andro sy alina amin’ny fotoanany, '
  '21':
  - type: text
    content: 'dia ho azo foanana koa ny fanekeko tamin’i Davida mpanompoko, tsy hananany zanakalahy hanjaka eo amin’ny sezafiandrianany, sy ny amin’ny '
  - type: text
    content: levita
  - type: text
    content: ' mpisorona, mpanompoko. '
  '22':
  - type: text
    content: Toy ny hamaroan’ny kintana eny amin’ny lanitra, izay tsy azo isaina, ary toy ny fasika any amin’ny ranomasina, izay tsy azo afàtra, dia toy izany no hanamaroako ny taranak’i Davida mpanompoko sy ny levita, izay manao fanompoam-pivavahana ho Ahy.
  '23':
  - type: text
    content: 'Ary tonga tamin’i Jeremia ny tenin’NY TOMPO hoe: '
  '24':
  - type: text
    content: 'Tsy hitanao va izay nolazain’ity firenena ity hoe: Ny fianakaviana roa izay nofidin’NY TOMPO dia efa nariany; toy izany no anamavoany ny oloko ka tsy vanon-ko firenena eo imasony intsony izy.'
  '25':
  - type: text
    content: 'Izao no lazain’NY TOMPO: Raha tsy amin’ny andro sy ny alina ny fanekeko ary raha tsy notendreko ny lalàna mitondra ny lanitra sy ny tany, '
  '26':
  - type: text
    content: dia hariako ny taranak’i Jakoba sy i Davida mpanompoko ka ny taranany tsy mba hanalako ho mpanapaka ny taranak’i Abrahama sy Isaka ary i Jakoba; fa hampodiko avy amin’ny fahababoana izy ka hamindrako fo.
  '3':
  - type: text
    content: 'Antsoy Aho, dia hovaliko ianao ka hampisehoako zavatra lehibe sy saro-pantarina izay tsy fantatrao. '
  '4':
  - type: text
    content: 'Fa izao no lazain’NY TOMPO, Andriamanitry ny Israely, ny amin’ny trano amin’ity tanàna ity sy ny amin’ny lapan’ny mpanjakan’ny Joda, izay noravana tamin’ny tovon-tany sy ny sabatra, '
  '5':
  - type: text
    content: 'raha nandroso hiady tamin’ny Kaldeana izy ka nameno ny trano tamin’ny fatin’olona izay novonoiko tamin’ny fahatezerako sy ny fahavinirako, sady nanafenako ny tavako tamin’ity tanàna ity noho ny faharatsiany rehetra, '
  '6':
  - type: text
    content: 'dia indro, hotanterahiko tokoa ny fanasitranana azy, eny, hositraniko izy, ary hasehoko aminy ny harenan’ny fiadanana sy ny fahamarinana. '
  '7':
  - type: text
    content: 'Ary ny Joda sy ny Israely dia hampodiko avy amin’ny fahababoany ka haoriko ho toy ny taloha izy. '
  '8':
  - type: text
    content: 'Ary hodioviko ho afaka amin’ny helony rehetra izay nanotany Tamiko izy; koa havelako ny helony rehetra izay nanotany sy nikomiany Tamiko. '
  '9':
  - type: text
    content: Ary ho anarana mahafaly Ahy izany sady ho dera sy voninahitra ho an’ny firenena rehetra ambonin’ny tany izay handre ny soa rehetra hataoko aminy; dia hatahotra sy hangovitra izy noho ny soa rehetra sy noho ny fiadanana rehetra izay hataoko aminy.
