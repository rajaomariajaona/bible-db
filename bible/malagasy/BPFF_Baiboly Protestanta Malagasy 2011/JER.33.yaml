document_id: JER.33
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ireo tanàna voamboatra indray
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Tonga fanindroany tamin’i Jeremia ny tenin’NY TOMPO, raha mbola voatazona teo amin’ny trano fiambenana ihany izy hoe:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Izao no lazain’NY TOMPO, Mpanao izany, dia NY TOMPO izay namorona izany mba hampitoetra azy; NY TOMPO no anarany: '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Antsoy Aho, dia hovaliko ianao ka hampisehoako zavatra lehibe sy saro-pantarina izay tsy fantatrao. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Fa izao no lazain’NY TOMPO, Andriamanitry ny Israely, ny amin’ny trano amin’ity tanàna ity sy ny amin’ny lapan’ny mpanjakan’ny Joda, izay noravana tamin’ny tovon-tany sy ny sabatra, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'raha nandroso hiady tamin’ny Kaldeana izy ka nameno ny trano tamin’ny fatin’olona izay novonoiko tamin’ny fahatezerako sy ny fahavinirako, sady nanafenako ny tavako tamin’ity tanàna ity noho ny faharatsiany rehetra, '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'dia indro, hotanterahiko tokoa ny fanasitranana azy, eny, hositraniko izy, ary hasehoko aminy ny harenan’ny fiadanana sy ny fahamarinana. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary ny Joda sy ny Israely dia hampodiko avy amin’ny fahababoany ka haoriko ho toy ny taloha izy. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary hodioviko ho afaka amin’ny helony rehetra izay nanotany Tamiko izy; koa havelako ny helony rehetra izay nanotany sy nikomiany Tamiko. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ary ho anarana mahafaly Ahy izany sady ho dera sy voninahitra ho an’ny firenena rehetra ambonin’ny tany izay handre ny soa rehetra hataoko aminy; dia hatahotra sy hangovitra izy noho ny soa rehetra sy noho ny fiadanana rehetra izay hataoko aminy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Izao no lazain’NY TOMPO: Eto amin’ity tany ity izay ataonareo hoe rava ka tsy misy olona na biby fiompy intsony, dia eto amin’ny tanànan’ny Joda sy ao amin’ny lalamben’i Jerosalema izay efa lao ka tsy misy olona na mponina na biby fiompy, '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'no mbola handrenesana indray ny feo mifaly sy ny feo miravoravo, dia ny feon’ny mpampakatra sy ny an’ny ampakarina ary ny feon’izay miteny hoe: Miderà an’Andriamanitra, Tompon’izao rehetra izao, fa tsara Izy, fa, mandrakizay ny famindrampony, dia izay mitondra fanati-pisaorana ho ao amin’ny tranon’NY TOMPO; fa hataoko tonga tahaka ny tany aloha ny fahatsarany, hoy NY TOMPO.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Izao no lazain’Andriamanitra, Tompon’izao rehetra izao: Eto amin’ity tany efa lao tsy misy olona na biby fiompy ity sy amin’ny tanànany rehetra dia mbola hisy fonenan’ny mpiandry ondry hampandriany ny ondry aman’osiny, '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: dia amin’ny tanàna any amin’ny tany be havoana, amin’ny tanàna any Sefela, amin’ny tanàna any Negeva, amin’ny tanin’ny Benjamina, amin’ny manodidina an’i Jerosalema, ary amin’ny tanànan’ny Joda, dia mbola hampandalovina eo anatrehan’ny mpanisa azy ny ondry aman’osy mba ho isainy, hoy NY TOMPO.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fanavaozana ny fanjakan’i Davida
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Indro, avy ny andro, hoy NY TOMPO, izay hanatanterahako ny teny soa izay nolazaiko ny amin’ny taranak’Israely sy ny taranak’i Joda. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Amin’izany andro izany sy amin’izany fotoana izany dia hampaniry Solofo marina ho an’i Davida Aho; ary hanao fitsarana marina amin’ny tany Izy. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Amin’izany andro izany dia hovonjena ny Joda, ary handry fehizay i Jerosalema; ary izao no hanononana azy: NY TOMPO no Fahamarinantsika. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Fa izao no lazain’NY TOMPO: Tsy ho diso zanakalahy hipetraka eo amin’ny sezafiandrianan’ny taranak’Israely i Davida; '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'ary ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: levita
  - type: text
    text: ' mpisorona dia tsy ho diso zanakalahy ho eo anatrehako, izay hanolotra tsy tapaka, fanatitra dorana manontolo sy fanatitra avy amin’ny zavamaniry ary fanatitra hafa alatsa-dra.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fanekena tsy azo foanana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary tonga tamin’i Jeremia ny tenin’NY TOMPO hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Izao no lazain’NY TOMPO: Raha mahafoana ny fanekeko ny amin’ny andro sy ny fanekeko ny amin’ny alina ianareo, mba tsy hisy intsony andro sy alina amin’ny fotoanany, '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'dia ho azo foanana koa ny fanekeko tamin’i Davida mpanompoko, tsy hananany zanakalahy hanjaka eo amin’ny sezafiandrianany, sy ny amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: levita
  - type: text
    text: ' mpisorona, mpanompoko. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Toy ny hamaroan’ny kintana eny amin’ny lanitra, izay tsy azo isaina, ary toy ny fasika any amin’ny ranomasina, izay tsy azo afàtra, dia toy izany no hanamaroako ny taranak’i Davida mpanompoko sy ny levita, izay manao fanompoam-pivavahana ho Ahy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary tonga tamin’i Jeremia ny tenin’NY TOMPO hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Tsy hitanao va izay nolazain’ity firenena ity hoe: Ny fianakaviana roa izay nofidin’NY TOMPO dia efa nariany; toy izany no anamavoany ny oloko ka tsy vanon-ko firenena eo imasony intsony izy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Izao no lazain’NY TOMPO: Raha tsy amin’ny andro sy ny alina ny fanekeko ary raha tsy notendreko ny lalàna mitondra ny lanitra sy ny tany, '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: dia hariako ny taranak’i Jakoba sy i Davida mpanompoko ka ny taranany tsy mba hanalako ho mpanapaka ny taranak’i Abrahama sy Isaka ary i Jakoba; fa hampodiko avy amin’ny fahababoana izy ka hamindrako fo.
