document_id: EZK.45,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ireo zaratany voatokana
  - type: text
    content: Rehefa zarainareo araka ny antsapaka ny tany ho lova dia hisy hatokanareo ho fanomezana ho an’NY TOMPO, dia anjara masina eo amin’ny tany; ny lavany dia dimy arivo sy roa alina
  - type: note
    content: Manomboka eto dia tsy voalaza ny anaran’ny refy, na volotara izany na hakiho.
  - type: text
    content: ' ary ny sakany dia iray alina. Ho masina any amin’ny faritaniny rehetra manodidina izany. '
  '10':
  - type: text
    content: 'Mizana marina sy '
  - type: text
    content: efaha
  - type: text
    content: ' marina ary '
  - type: text
    content: bata
  - type: text
    content: ' marina no aoka hotananareo. '
  '11':
  - type: text
    content: 'Hitovy habe ny efaha sy ny bata, ary ny bata dia hahalany ny ampahafolon’ny homera, ary ny efaha koa dia ampahafolon’ny homera. Ny homera no handrefesana azy. '
  '12':
  - type: text
    content: 'Ny sekela dia roapolo gera; sekela roapolo miampy sekela dimy amby roapolo ary sekela dimy amby folo ny '
  - type: text
    content: mane
  - type: text
    content: ' eo aminareo.'
  '13':
  - type: text
    content: 'Izao no zavatra haloanareo: Ny ampahenin’ny efaha isaky ny homeran’ny varimbazaha iray; haloanareo koa ny ampahenin’ny efaha isaky ny homeran’ny varimbazaha iray hafa. '
  '14':
  - type: text
    content: 'Ny didy ny amin’ny diloilo, dia ny diloilo iray '
  - type: text
    content: bata
  - type: text
    content: ': Ampahafolon’ny bata isaky ny '
  - type: text
    content: kora
  - type: text
    content: '; fa ny homera dia misy bata folo satria bata folo no homera iray. '
  '15':
  - type: text
    content: 'Ary ondry iray amin’ny roanjato amin’ny tanin’ny Israely izay azon-drano no haloanareo hatao fanatitra hohanina sy fanatitra dorana manontolo ary fanati-pihavanana, mba hanaovana fanavotana ho an’ny vahoaka, hoy NY TOMPO Andriamanitra. '
  '16':
  - type: text
    content: 'Ny vahoaka rehetra no handoa izany ho an’ny mpanjakan’ny Israely. '
  '17':
  - type: text
    content: Fa ny mpanjaka kosa no hiantoka ny fanatitra dorana manontolo, ny fanatitra avy amin’ny zavamaniry, ny fanatitra aidina amin’ny andro firavoravoana sy ny voaloham-bolana ary ny Sabata, dia amin’ny fotoam-pivavahana rehetra tandreman’ny taranak’Israely; eny, izy no hiantoka ny fanatitra ho fanadiovana, ny fanatitra avy amin’ny zavamaniry, ny fanatitra dorana manontolo ary ny fanati-pihavanana, mba hanaovana fanavotana ho an’ny taranak’Israely.
  - type: heading
    content: Ny amin’ny andro firavoravoana samihafa
  '18':
  - type: text
    content: 'Izao no lazain’NY TOMPO Andriamanitra: Amin’ny andro voalohany amin’ny volana voalohany dia haka vantotra ombilahy tsy misy kilema ianao ka hanadio ny fitoerana masina. '
  '19':
  - type: text
    content: 'Ary hanalan’ny mpisorona ny ran’ny fanatitra ho fanadiovana ka hatentiny amin’ny tolanan’ny Trano sy amin’ny zorony efatra amin’ny lafin’ny alitara ary amin’ny tolanan’ny vavahadin’ny kianja anatiny. '
  '2':
  - type: text
    content: 'Io dia hanalana efamira ho an’ny fitoerana masina, dimanjato ny lavany ary dimanjato koa ny sakany; ary ho dimampolo '
  - type: text
    content: hakiho
  - type: text
    content: ' ny tany malalaka manodidina azy. '
  '20':
  - type: text
    content: Toy izany koa no hataonao amin’ny andro fahafito amin’ny volana ho an’ny olona manota tsy nahy, na noho izy kely saina, koa izany no hanadiovanareo ny Trano.
  '21':
  - type: text
    content: 'Amin’ny andro fahefatra amby folo amin’ny volana voalohany no hanaovanareo ny Paska. Andro firavoravoana hafitoana izany, koa mofo tsy misy masirasira no hohanina. '
  '22':
  - type: text
    content: 'Amin’izany andro izany ny mpanjaka dia hanatitra vantotra ombilahy iray hatao fanatitra noho ny ota ho an’ny tenany sy ny vahoaka rehetra. '
  '23':
  - type: text
    content: 'Amin’ny andro firavoravoana hafitoana dia hanolotra fanatitra dorana manontolo isanandro mandritra ny hafitoana ho an’NY TOMPO izy, dia vantotra ombilahy fito sy ondrilahy fito tsy misy kilema, ary osilahy iray isanandro hataony fanatitra noho ny ota. '
  '24':
  - type: text
    content: 'Ary hanolotra ny fanatitra avy amin’ny zavamaniry koa izy, dia iray '
  - type: text
    content: efaha
  - type: text
    content: ' isam-bantotra ombilahy sy iray efaha isan’ondrilahy, ary diloilo eran’ny '
  - type: text
    content: hina
  - type: text
    content: ' isan’efaha.'
  '25':
  - type: text
    content: Amin’ny andro fahadimy amby folo amin’ny volana fahafito, amin’ny andro firavoravoana, dia hanolotra tahaka izany koa hafitoana izy, na ny fanatitra noho ny ota na ny fanatitra dorana manontolo na ny fanatitra avy amin’ny zavamaniry, na ny diloilo.
  '3':
  - type: text
    content: 'Eny, ao amin’izany tany voarefy izany, izay dimy arivo sy roa alina ny lavany ary iray alina ny sakany izany, dia handrefesanao faritra ho an’ny fitoerana masina, dia ny masina indrindra. '
  '4':
  - type: text
    content: Ho faritra masina amin’ny tany izany ka ho an’ny mpisorona, mpanao fanompoana ao amin’ny fitoerana masina, dia izay manakaiky hanao fanompoana ho an’NY TOMPO, ary ho faritra ho an’ny tranony sy ho tany masina hasiana ny fitoerana masina.
  '5':
  - type: text
    content: 'Ity faritra ity, izay dimy arivo sy roa alina ny lavany ary iray alina ny sakany, no ho an’ny '
  - type: text
    content: levita
  - type: text
    content: ' mpanao fanompoana ao amin’ny Trano; zaratany ho azy izany, misy efitrano roapolo.'
  '6':
  - type: text
    content: Homenareo koa ny zaratany ho an’ny tanàna, dimy arivo ny sakany ary dimy arivo sy roa alina ny lavany, mifanolotra amin’ny anjara masina voatokana; ho an’ny taranak’Israely rehetra izany.
  '7':
  - type: text
    content: 'Ary ny mpanjaka dia homenareo tany eo an-daniny roa amin’ny anjara masina voatokana sy amin’ny zaratany ho an’ny tanàna, dia ny mifanolotra amin’ny anjara masina voatokana sy ny mifanolotra amin’ny zaratany ho an’ny tanàna, hatreo amin’ny andrefana mikipaka miankandrefana, ary hatreo amin’ny atsinanana mikipaka miantsinanana; ny lavany dia mitovy amin’ny lavan’ny zaratany ho an’ny firenena iray, hatrany andrefana ka hatrany atsinanana. '
  '8':
  - type: text
    content: Ho taniny izany, dia anjara ho azy ao amin’ny Israely; ireo mpanjakako dia tsy hampahory ny oloko intsony fa hahafoy ny tany ho an’ny taranak’Israely isam-pokony avy.
  - type: heading
    content: Ny zo aman’andraikitry ny mpanjaka
  '9':
  - type: text
    content: 'Izao no lazain’NY TOMPO Andriamanitra: Aoka izay, ry mpanjakan’ny Israely! Ajanòny ny halozana sy ny fampahoriana ary manaova fitsarana sy fahamarinana. Atsaharo ny fandroahanareo ny oloko, hoy NY TOMPO Andriamanitra.'
