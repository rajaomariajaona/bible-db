document_id: EZK.45,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ireo zaratany voatokana
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Rehefa zarainareo araka ny antsapaka ny tany ho lova dia hisy hatokanareo ho fanomezana ho an’NY TOMPO, dia anjara masina eo amin’ny tany; ny lavany dia dimy arivo sy roa alina
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '45.1 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: Manomboka eto dia tsy voalaza ny anaran’ny refy, na volotara izany na hakiho.
      marker-yv: yv-n
    - type: text
      text: ' ary ny sakany dia iray alina. Ho masina any amin’ny faritaniny rehetra manodidina izany. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Mizana marina sy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: efaha
    - type: text
      text: ' marina ary '
    - type: usfm
      marker: w
      children:
      - type: text
        text: bata
    - type: text
      text: ' marina no aoka hotananareo. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Hitovy habe ny efaha sy ny bata, ary ny bata dia hahalany ny ampahafolon’ny homera, ary ny efaha koa dia ampahafolon’ny homera. Ny homera no handrefesana azy. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Ny sekela dia roapolo gera; sekela roapolo miampy sekela dimy amby roapolo ary sekela dimy amby folo ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mane
    - type: text
      text: ' eo aminareo.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Izao no zavatra haloanareo: Ny ampahenin’ny efaha isaky ny homeran’ny varimbazaha iray; haloanareo koa ny ampahenin’ny efaha isaky ny homeran’ny varimbazaha iray hafa. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Ny didy ny amin’ny diloilo, dia ny diloilo iray '
    - type: usfm
      marker: w
      children:
      - type: text
        text: bata
    - type: text
      text: ': Ampahafolon’ny bata isaky ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: kora
    - type: text
      text: '; fa ny homera dia misy bata folo satria bata folo no homera iray. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Ary ondry iray amin’ny roanjato amin’ny tanin’ny Israely izay azon-drano no haloanareo hatao fanatitra hohanina sy fanatitra dorana manontolo ary fanati-pihavanana, mba hanaovana fanavotana ho an’ny vahoaka, hoy NY TOMPO Andriamanitra. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Ny vahoaka rehetra no handoa izany ho an’ny mpanjakan’ny Israely. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Fa ny mpanjaka kosa no hiantoka ny fanatitra dorana manontolo, ny fanatitra avy amin’ny zavamaniry, ny fanatitra aidina amin’ny andro firavoravoana sy ny voaloham-bolana ary ny Sabata, dia amin’ny fotoam-pivavahana rehetra tandreman’ny taranak’Israely; eny, izy no hiantoka ny fanatitra ho fanadiovana, ny fanatitra avy amin’ny zavamaniry, ny fanatitra dorana manontolo ary ny fanati-pihavanana, mba hanaovana fanavotana ho an’ny taranak’Israely.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny amin’ny andro firavoravoana samihafa
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Izao no lazain’NY TOMPO Andriamanitra: Amin’ny andro voalohany amin’ny volana voalohany dia haka vantotra ombilahy tsy misy kilema ianao ka hanadio ny fitoerana masina. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Ary hanalan’ny mpisorona ny ran’ny fanatitra ho fanadiovana ka hatentiny amin’ny tolanan’ny Trano sy amin’ny zorony efatra amin’ny lafin’ny alitara ary amin’ny tolanan’ny vavahadin’ny kianja anatiny. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Io dia hanalana efamira ho an’ny fitoerana masina, dimanjato ny lavany ary dimanjato koa ny sakany; ary ho dimampolo '
    - type: usfm
      marker: w
      children:
      - type: text
        text: hakiho
    - type: text
      text: ' ny tany malalaka manodidina azy. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Toy izany koa no hataonao amin’ny andro fahafito amin’ny volana ho an’ny olona manota tsy nahy, na noho izy kely saina, koa izany no hanadiovanareo ny Trano.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Amin’ny andro fahefatra amby folo amin’ny volana voalohany no hanaovanareo ny Paska. Andro firavoravoana hafitoana izany, koa mofo tsy misy masirasira no hohanina. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Amin’izany andro izany ny mpanjaka dia hanatitra vantotra ombilahy iray hatao fanatitra noho ny ota ho an’ny tenany sy ny vahoaka rehetra. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Amin’ny andro firavoravoana hafitoana dia hanolotra fanatitra dorana manontolo isanandro mandritra ny hafitoana ho an’NY TOMPO izy, dia vantotra ombilahy fito sy ondrilahy fito tsy misy kilema, ary osilahy iray isanandro hataony fanatitra noho ny ota. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Ary hanolotra ny fanatitra avy amin’ny zavamaniry koa izy, dia iray '
    - type: usfm
      marker: w
      children:
      - type: text
        text: efaha
    - type: text
      text: ' isam-bantotra ombilahy sy iray efaha isan’ondrilahy, ary diloilo eran’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: hina
    - type: text
      text: ' isan’efaha.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Amin’ny andro fahadimy amby folo amin’ny volana fahafito, amin’ny andro firavoravoana, dia hanolotra tahaka izany koa hafitoana izy, na ny fanatitra noho ny ota na ny fanatitra dorana manontolo na ny fanatitra avy amin’ny zavamaniry, na ny diloilo.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Eny, ao amin’izany tany voarefy izany, izay dimy arivo sy roa alina ny lavany ary iray alina ny sakany izany, dia handrefesanao faritra ho an’ny fitoerana masina, dia ny masina indrindra. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Ho faritra masina amin’ny tany izany ka ho an’ny mpisorona, mpanao fanompoana ao amin’ny fitoerana masina, dia izay manakaiky hanao fanompoana ho an’NY TOMPO, ary ho faritra ho an’ny tranony sy ho tany masina hasiana ny fitoerana masina.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ity faritra ity, izay dimy arivo sy roa alina ny lavany ary iray alina ny sakany, no ho an’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: levita
    - type: text
      text: ' mpanao fanompoana ao amin’ny Trano; zaratany ho azy izany, misy efitrano roapolo.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Homenareo koa ny zaratany ho an’ny tanàna, dimy arivo ny sakany ary dimy arivo sy roa alina ny lavany, mifanolotra amin’ny anjara masina voatokana; ho an’ny taranak’Israely rehetra izany.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ary ny mpanjaka dia homenareo tany eo an-daniny roa amin’ny anjara masina voatokana sy amin’ny zaratany ho an’ny tanàna, dia ny mifanolotra amin’ny anjara masina voatokana sy ny mifanolotra amin’ny zaratany ho an’ny tanàna, hatreo amin’ny andrefana mikipaka miankandrefana, ary hatreo amin’ny atsinanana mikipaka miantsinanana; ny lavany dia mitovy amin’ny lavan’ny zaratany ho an’ny firenena iray, hatrany andrefana ka hatrany atsinanana. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Ho taniny izany, dia anjara ho azy ao amin’ny Israely; ireo mpanjakako dia tsy hampahory ny oloko intsony fa hahafoy ny tany ho an’ny taranak’Israely isam-pokony avy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny zo aman’andraikitry ny mpanjaka
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Izao no lazain’NY TOMPO Andriamanitra: Aoka izay, ry mpanjakan’ny Israely! Ajanòny ny halozana sy ny fampahoriana ary manaova fitsarana sy fahamarinana. Atsaharo ny fandroahanareo ny oloko, hoy NY TOMPO Andriamanitra.'
