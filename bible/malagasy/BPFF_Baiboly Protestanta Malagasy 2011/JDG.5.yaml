document_id: JDG.5,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny hiran’i Debora
  - type: text
    content: 'Tamin’izany andro izany dia nihira i Debora sy i Baraka, zanak’i Abinoama hoe:'
  '10':
  - type: text
    content: Ianareo izay mitaingina borikivavy fotsy,
  - type: text
    content: ianareo izay mipetraka amin’ny karipetra
  - type: text
    content: ary ianareo izay mandeha amin’ny lalambe koa, samia milaza!
  '11':
  - type: text
    content: Ny feon’ireo mpantsaka rano dia eny amin’ny fampisotroan-drano;
  - type: text
    content: any no ankalazana ireo asa marina nataon’NY TOMPO,
  - type: text
    content: dia ireo asam-pahamarinana nataony tamin’ny tanin’ny Israely.
  - type: text
    content: Tamin’izany dia nidina ho any am-bavahady ny olon’NY TOMPO.
  '12':
  - type: text
    content: Mifohaza, mifohaza, ry Debora!
  - type: text
    content: Mifohaza, mifohaza ka mihirà!
  - type: text
    content: Mitsangàna, ry Baraka!
  - type: text
    content: Ento ny babonao, ry zanakalahin’i Abinoama!
  '13':
  - type: text
    content: Tamin’izany dia nidina izay sisa tavela nankany amin’ireo mahery fo;
  - type: text
    content: ny vahoakan’NY TOMPO dia nidina homba ahy koa niaraka tamin’ireo mpiady mahery.
  '14':
  - type: text
    content: Ny avy amin’i Efraima dia any amin’i Amaleka ny fotony.
  - type: text
    content: Ao aoriananao, dia i Benjamina no nomba ireo olonao.
  - type: text
    content: Avy tany Makira no nidinan’ireo mpitari-tafika
  - type: text
    content: ary avy tamin’i Zebolona ireo mitana ny tehin’ny mpanoratra.
  '15':
  - type: text
    content: Ireo manamboninahitr’Isakara dia niaraka tamin’i Debora.
  - type: text
    content: I Baraka dia sahala amin’Isakara,
  - type: text
    content: nanezaka an-tongotra nanaraka azy tany an-dohasaha.
  - type: text
    content: Tsy nisy farany ny adihevitra
  - type: text
    content: teo amin’ireo sakeli-dranon’i Robena!
  '16':
  - type: text
    content: Nahoana ianao no nitoetra teny anelanelan’ny vala
  - type: text
    content: ka nihaino fotsiny ny feon-tsodina teny amin’ny ondry?
  - type: text
    content: Tsy nisy farany ny adi-hevitra
  - type: text
    content: teny amin’ireo sakeli-dranon’i Robena!
  '17':
  - type: text
    content: I Gileada dia nijanona tany andafin’i Jordana.
  - type: text
    content: Ary nahoana i Dana no nitoetra teny amin’ny sambo?
  - type: text
    content: I Asera dia nipetraka tany amoron-dranomasina,
  - type: text
    content: teny amin’ny fitodian-tsambo no nonenany.
  '18':
  - type: text
    content: I Zebolona dia firenena nanao vy very ny ainy hatramin’ny fahafatesana,
  - type: text
    content: toy izany koa i Naftaly, teny amin’ny havoana tamin’ny tany.
  '19':
  - type: text
    content: Tonga ireo mpanjaka ka niady,
  - type: text
    content: eny, niady ireo mpanjakan’i Kanana,
  - type: text
    content: tany Tanàka, teo anilan’ny ranon’i Megido
  - type: text
    content: nefa tsy nisy volafotsy azony ho babo.
  '2':
  - type: text
    content: Noho ny fanokanan-tena tanteraka teo amin’ny Israely
  - type: text
    content: sy ny fanoloran-tena an-tsitrapo nataon’ny vahoaka
  - type: text
    content: dia miderà NY TOMPO!
  '20':
  - type: text
    content: Avy teny amin’ny lanitra no niady ny kintana.
  - type: text
    content: Avy teny amin’ny lalany no niadiany tamin’i Sisera.
  '21':
  - type: text
    content: Ny ony Kisona no nipaoka ireo mpanjaka,
  - type: text
    content: ilay ony ela, dia ny ony Kisona.
  - type: text
    content: Mandrosoa amin-kery ianao, ry fanahiko!
  '22':
  - type: text
    content: Tamin’izany dia nikatrokatroka ny kitron-tsoavaly
  - type: text
    content: noho ny firimorimony, dia ny firimorimon’ny maheriny.
  '23':
  - type: text
    content: 'Ozòny i Meroza, hoy ilay '
  - type: text
    content: Anjelin’NY TOMPO
  - type: text
    content: ','
  - type: text
    content: ozòny tanteraka ny mponina ao!
  - type: text
    content: Satria tsy mba tonga nanampy NY TOMPO izy,
  - type: text
    content: eny, tsy nanampy NY TOMPO niaraka tamin’ireo mpiady mahery.
  '24':
  - type: text
    content: Hotahìna amin’ny samy vehivavy mitoetra an-day anie i Jaela,
  - type: text
    content: vadin’i Hebera kenita!
  - type: text
    content: Eny, hotahìna amin’ny samy vehivavy mitoetra an-day anie izy!
  '25':
  - type: text
    content: Rano no nangatahin-dRalehilahy dia ronono no nomeny azy;
  - type: text
    content: teo an-dovian’olona ambony no nitondrany ronono mandry.
  '26':
  - type: text
    content: Nandray ny tsatòkan-day ny tanany,
  - type: text
    content: ny tanany havanana no nandray ny tantanan’ny mpiasa,
  - type: text
    content: dia namely an’i Sisera tamin’ny tantanana izy ka nahavoa ny lohany;
  - type: text
    content: nahapotika sy nahaboroaka ny fihirifany izy.
  '27':
  - type: text
    content: Teo an-tongo-dRavehivavy izy no nitolefika,
  - type: text
    content: lavo, niampatra;
  - type: text
    content: eny, teo an-tongony izy no nitolefika, lavo;
  - type: text
    content: teo amin’izay nampitolefika azy no niamparan’ny fatiny.
  '28':
  - type: text
    content: Teo am-baravarankely
  - type: text
    content: no nitsirihan’ny renin’i Sisera
  - type: text
    content: ka niantsoantsoany mafy;
  - type: text
    content: 'eny, niantso teo amin’ny makarakara izy hoe:'
  - type: text
    content: Nahoana no ela izato kalesy fitondrany miady vao tonga?
  - type: text
    content: Nahoana no mitaredratra ny kodiaran’ny kalesiny?
  '29':
  - type: text
    content: Izay hendry indrindra tamin’ireo vehivavy manankaja teo aminy,
  - type: text
    content: 'eny, izy tenany aza, dia niteny hoe:'
  '3':
  - type: text
    content: Mandrenesa ianareo, ry mpanjaka!
  - type: text
    content: Atongilano ny sofinareo, ry mpanapaka!
  - type: text
    content: Izaho indrindra no hihira ho an’NY TOMPO;
  - type: text
    content: hihira ho an’NY TOMPO, Andriamanitry ny Israely, aho.
  '30':
  - type: text
    content: Efa nahita babo izao izy ireo e! Efa mizara babo izao izy ireo e!
  - type: text
    content: Dia zazavavy iray, zazavavy roa, ho an’ny mpiady iray,
  - type: text
    content: lamba azo babo samihafa volo ho an’i Sisera, lamba azo babo,
  - type: text
    content: lamba roa samihafa soratra, lamba azo babo hatao eo am-bozoko.
  '31':
  - type: text
    content: Ho levona tahaka izany anie ny fahavalonao rehetra, ry TOMPO ô!
  - type: text
    content: Fa izay tia Azy kosa, aoka ho tahaka ny masoandro miposaka amin’ny heriny.
  - type: text
    content: Dia nandry ny tany nandritra efapolo taona.
  '4':
  - type: text
    content: TOMPO ô, fony Ianao nivoaka avy tany Seìra
  - type: text
    content: ary nandeha avy tany amin’ny tany Edoma
  - type: text
    content: dia nihorohoro ny tany ary ny lanitra koa nitete;
  - type: text
    content: eny, ny rahona matevina dia nitete rano.
  '5':
  - type: text
    content: Ny tendrombohitra dia nikorian-drano teo anatrehan’NY TOMPO.
  - type: text
    content: Eny, irỳ Sinay irỳ, teo anatrehan’NY TOMPO, Andriamanitry ny Israely.
  '6':
  - type: text
    content: Tamin’ny andron’i Samgara, zanak’i Anata
  - type: text
    content: sy tamin’ny andron’i Jaela
  - type: text
    content: dia tsy nodiavina ny lalambe,
  - type: text
    content: fa ny sakeli-dalana mivilivily no nalehan’ny mpandeha.
  '7':
  - type: text
    content: Tsy nisy mpanapaka intsony teo amin’ny Israely; eny, nitsahatra izany,
  - type: text
    content: mandra-pitsangako, izaho Debora,
  - type: text
    content: eny, mandra-pitsangako ho reny teo amin’ny Israely.
  '8':
  - type: text
    content: Nifidy andriamanitra vaovao ny olona
  - type: text
    content: ka tamin’izay dia nisy ady hatrany am-bavahady.
  - type: text
    content: Moa nahitana ampinga na lefona na dia iray akory aza va
  - type: text
    content: teo amin’ny olona efatra alina tamin’ny Israely?
  '9':
  - type: text
    content: Ny foko dia mankasitraka ireo mpitari-tafika eo amin’ny Israely
  - type: text
    content: izay nanolo-tena an-tsitrapo teo amin’ny vahoaka.
  - type: text
    content: Miderà NY TOMPO ianareo!
