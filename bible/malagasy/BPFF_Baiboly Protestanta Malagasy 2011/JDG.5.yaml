document_id: JDG.5,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny hiran’i Debora
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Tamin’izany andro izany dia nihira i Debora sy i Baraka, zanak’i Abinoama hoe:'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Ianareo izay mitaingina borikivavy fotsy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ianareo izay mipetraka amin’ny karipetra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ianareo izay mandeha amin’ny lalambe koa, samia milaza!
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Ny feon’ireo mpantsaka rano dia eny amin’ny fampisotroan-drano;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: any no ankalazana ireo asa marina nataon’NY TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ireo asam-pahamarinana nataony tamin’ny tanin’ny Israely.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tamin’izany dia nidina ho any am-bavahady ny olon’NY TOMPO.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Mifohaza, mifohaza, ry Debora!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mifohaza, mifohaza ka mihirà!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mitsangàna, ry Baraka!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ento ny babonao, ry zanakalahin’i Abinoama!
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Tamin’izany dia nidina izay sisa tavela nankany amin’ireo mahery fo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny vahoakan’NY TOMPO dia nidina homba ahy koa niaraka tamin’ireo mpiady mahery.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Ny avy amin’i Efraima dia any amin’i Amaleka ny fotony.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ao aoriananao, dia i Benjamina no nomba ireo olonao.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avy tany Makira no nidinan’ireo mpitari-tafika
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary avy tamin’i Zebolona ireo mitana ny tehin’ny mpanoratra.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Ireo manamboninahitr’Isakara dia niaraka tamin’i Debora.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I Baraka dia sahala amin’Isakara,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nanezaka an-tongotra nanaraka azy tany an-dohasaha.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy nisy farany ny adihevitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: teo amin’ireo sakeli-dranon’i Robena!
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Nahoana ianao no nitoetra teny anelanelan’ny vala
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka nihaino fotsiny ny feon-tsodina teny amin’ny ondry?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy nisy farany ny adi-hevitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: teny amin’ireo sakeli-dranon’i Robena!
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: I Gileada dia nijanona tany andafin’i Jordana.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary nahoana i Dana no nitoetra teny amin’ny sambo?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I Asera dia nipetraka tany amoron-dranomasina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: teny amin’ny fitodian-tsambo no nonenany.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: I Zebolona dia firenena nanao vy very ny ainy hatramin’ny fahafatesana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toy izany koa i Naftaly, teny amin’ny havoana tamin’ny tany.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Tonga ireo mpanjaka ka niady,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, niady ireo mpanjakan’i Kanana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tany Tanàka, teo anilan’ny ranon’i Megido
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa tsy nisy volafotsy azony ho babo.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Noho ny fanokanan-tena tanteraka teo amin’ny Israely
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny fanoloran-tena an-tsitrapo nataon’ny vahoaka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia miderà NY TOMPO!
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Avy teny amin’ny lanitra no niady ny kintana.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avy teny amin’ny lalany no niadiany tamin’i Sisera.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Ny ony Kisona no nipaoka ireo mpanjaka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ilay ony ela, dia ny ony Kisona.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mandrosoa amin-kery ianao, ry fanahiko!
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Tamin’izany dia nikatrokatroka ny kitron-tsoavaly
  - type: usfm
    marker: q1
    children:
    - type: text
      text: noho ny firimorimony, dia ny firimorimon’ny maheriny.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Ozòny i Meroza, hoy ilay '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Anjelin’NY TOMPO
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ozòny tanteraka ny mponina ao!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Satria tsy mba tonga nanampy NY TOMPO izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, tsy nanampy NY TOMPO niaraka tamin’ireo mpiady mahery.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Hotahìna amin’ny samy vehivavy mitoetra an-day anie i Jaela,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vadin’i Hebera kenita!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, hotahìna amin’ny samy vehivavy mitoetra an-day anie izy!
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Rano no nangatahin-dRalehilahy dia ronono no nomeny azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: teo an-dovian’olona ambony no nitondrany ronono mandry.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Nandray ny tsatòkan-day ny tanany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny tanany havanana no nandray ny tantanan’ny mpiasa,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia namely an’i Sisera tamin’ny tantanana izy ka nahavoa ny lohany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nahapotika sy nahaboroaka ny fihirifany izy.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Teo an-tongo-dRavehivavy izy no nitolefika,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: lavo, niampatra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, teo an-tongony izy no nitolefika, lavo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: teo amin’izay nampitolefika azy no niamparan’ny fatiny.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Teo am-baravarankely
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no nitsirihan’ny renin’i Sisera
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka niantsoantsoany mafy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'eny, niantso teo amin’ny makarakara izy hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nahoana no ela izato kalesy fitondrany miady vao tonga?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nahoana no mitaredratra ny kodiaran’ny kalesiny?
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Izay hendry indrindra tamin’ireo vehivavy manankaja teo aminy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'eny, izy tenany aza, dia niteny hoe:'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Mandrenesa ianareo, ry mpanjaka!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Atongilano ny sofinareo, ry mpanapaka!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izaho indrindra no hihira ho an’NY TOMPO;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hihira ho an’NY TOMPO, Andriamanitry ny Israely, aho.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Efa nahita babo izao izy ireo e! Efa mizara babo izao izy ireo e!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia zazavavy iray, zazavavy roa, ho an’ny mpiady iray,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: lamba azo babo samihafa volo ho an’i Sisera, lamba azo babo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: lamba roa samihafa soratra, lamba azo babo hatao eo am-bozoko.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Ho levona tahaka izany anie ny fahavalonao rehetra, ry TOMPO ô!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa izay tia Azy kosa, aoka ho tahaka ny masoandro miposaka amin’ny heriny.
  - type: usfm
    marker: m
    children:
    - type: text
      text: Dia nandry ny tany nandritra efapolo taona.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: TOMPO ô, fony Ianao nivoaka avy tany Seìra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary nandeha avy tany amin’ny tany Edoma
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia nihorohoro ny tany ary ny lanitra koa nitete;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, ny rahona matevina dia nitete rano.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Ny tendrombohitra dia nikorian-drano teo anatrehan’NY TOMPO.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, irỳ Sinay irỳ, teo anatrehan’NY TOMPO, Andriamanitry ny Israely.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Tamin’ny andron’i Samgara, zanak’i Anata
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy tamin’ny andron’i Jaela
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia tsy nodiavina ny lalambe,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny sakeli-dalana mivilivily no nalehan’ny mpandeha.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Tsy nisy mpanapaka intsony teo amin’ny Israely; eny, nitsahatra izany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mandra-pitsangako, izaho Debora,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, mandra-pitsangako ho reny teo amin’ny Israely.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Nifidy andriamanitra vaovao ny olona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tamin’izay dia nisy ady hatrany am-bavahady.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moa nahitana ampinga na lefona na dia iray akory aza va
  - type: usfm
    marker: q1
    children:
    - type: text
      text: teo amin’ny olona efatra alina tamin’ny Israely?
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Ny foko dia mankasitraka ireo mpitari-tafika eo amin’ny Israely
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay nanolo-tena an-tsitrapo teo amin’ny vahoaka.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miderà NY TOMPO ianareo!
