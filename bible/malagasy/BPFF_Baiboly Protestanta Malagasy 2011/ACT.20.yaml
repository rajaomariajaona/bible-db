document_id: ACT.20,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Niverina tany Makedonia sy Gresy i Paoly
  - type: text
    content: 'Rehefa nitsahatra ny tabataba dia nampaka ny mpianatra i Paoly ka nampahery azy sy nanao veloma azy ary lasa nankany Makedonia. '
  '10':
  - type: text
    content: 'Dia nidina i Paoly ary niankohoka taminy sy namihina azy sady hoy izy: Aza mikorontana ianareo fa mbola ao aminy ihany ny ainy. '
  '11':
  - type: text
    content: 'Ary niakatra i Paoly, dia namaky ny mofo ary rehefa avy nisakafo izy dia mbola niresaka ela mandra-paharain’ny andro. Dia lasa nandeha izy. '
  '12':
  - type: text
    content: Ary velona ilay zatovo raha noentina niverina ka faly dia faly tokoa ny olona.
  - type: heading
    content: Avy tany Troasy dia nankany Mileto
  '13':
  - type: text
    content: 'Nialoha lalana tamin’ny sambo izahay ka niondrana nankany Aso, fa eo no handraisana an’i Paoly, araka ny teny nomeny, fa ta handeha an-tongotra izy. '
  '14':
  - type: text
    content: 'Rehefa tafahaona taminay tany Aso izy dia noraisinay ary lasa nankany Mitilena izahay. '
  '15':
  - type: text
    content: 'Rehefa niondrana an-tsambo niala teo izahay dia tonga tandrifin’i Kio nony ampitso; ny ampitson’iny indray dia niantsona tao Samo izahay ka tonga tany Mileto ny andro manaraka. '
  '16':
  - type: text
    content: 'I Paoly moa dia efa nikasa handeha an-tsambo handalo any Efesosy mba tsy hijanonany ela any Azia satria maika hamonjy ny andro '
  - type: text
    content: Pentekosta
  - type: text
    content: ' any Jerosalema izy raha azo atao.'
  - type: heading
    content: Niteny tamin’ireo loholona tany Efesosy i Paoly
  '17':
  - type: text
    content: Rehefa tany Mileto i Paoly dia nandefa iraka hankany Efesosy ka nampiantso ny loholon’ny fiangonana
  - type: note
    content: 'Na: presbytera.'
  - type: text
    content: ' hankeo aminy. '
  '18':
  - type: text
    content: 'Nony tonga teo aminy ireo, dia hoy izy taminy:'
  - type: text
    content: 'Fantatrareo hatramin’ny andro voalohany nahatongavako teto Azia izay toetry ny fitondrantenako taminareo tamin’ny fotoana rehetra, '
  '19':
  - type: text
    content: 'dia ny nanompoako ny Tompo tamin’ny fanetren-tena rehetra sy ny ranomaso ary ny fakam-panahy izay nanjo ahy tamin’ny teti-dratsin’ny '
  - type: text
    content: Jiosy
  - type: text
    content: ', '
  '2':
  - type: text
    content: 'Nony nitety izany tany izany izy dia nampahery ny olona tamin’ny teny maro ary tonga tany Gresy. '
  '20':
  - type: text
    content: 'koa tsy mba nafeniko izay mahasoa, fa nambarako sy nampianariko anareo teo imason’ny olona sy tao amin’ny isan-trano; '
  '21':
  - type: text
    content: 'nambarako tamin’ny Jiosy sy ny Grika koa ny fibebahana amin’Andriamanitra sy ny finoana an’i Jesosy '
  - type: text
    content: Kristy
  - type: text
    content: ' Tompontsika.'
  '22':
  - type: text
    content: 'Koa ankehitriny, indro, tery am-panahy hankany Jerosalema aho, nefa tsy fantatro izay hanjo ahy any, '
  '23':
  - type: text
    content: 'afa-tsy izay ambaran’ny Fanahy Masina amiko amin’ny isan-tanàna, fa hisy famatorana sy fahoriana miandry ahy. '
  '24':
  - type: text
    content: Nefa tsy ataoko ho zavatra akory ny aiko, mba hahatanteraka ny fihazakazahako sy ny fanompoana izay noraisiko tamin’i Jesosy Tompo hanambara ny Filazantsaran’ny fahasoavan’Andriamanitra.
  '25':
  - type: text
    content: 'Ary indro, ankehitriny dia fantatro fa tsy hahita ny tavako intsony ianareo rehetra izay nalehako nitoriako ny fanjakana. '
  '26':
  - type: text
    content: 'Koa manambara aminareo aho anio fa afaka amin’ny ranareo rehetra aho. '
  '27':
  - type: text
    content: 'Fa tsy nafeniko anareo fa notoriko taminareo avokoa ny fikasan’Andriamanitra rehetra. '
  '28':
  - type: text
    content: Tandremo ny tenanareo sy ny ondry rehetra izay nanaovan’ny Fanahy Masina anareo ho mpitandrina
  - type: note
    content: 'Na: eveka.'
  - type: text
    content: ', hiandrasanareo ny fiangonan’'
  - type: note
    content: 'Na: eklesia.'
  - type: text
    content: 'Andriamanitra, izay novidiny tamin’ny rany. '
  '29':
  - type: text
    content: 'Fantatro fa rehefa lasa aho dia hisy amboadia masiaka hiditra eo aminareo ka tsy hiantra ny ondry. '
  '3':
  - type: text
    content: 'Rehefa nijanona nandritra ny telo volana teo izy ka efa hiondrana an-tsambo hankany Siria dia nisy '
  - type: text
    content: Jiosy
  - type: text
    content: ' niara-nanao teti-dratsy hamely azy ka niova hevitra izy ary lasa niverina namakivaky an’i Makedonia. '
  '30':
  - type: text
    content: 'Ary avy aminareo ihany no hipoiran’ny olona sasany hitory teny tsy marina ka hitaona ny mpianatra hanaraka azy. '
  '31':
  - type: text
    content: Koa miambena ary tsarovy fa telo taona mipaka aho tsy nitsahatra nananatra anareo rehetra andro aman’alina, tamin’ny ranomaso.
  '32':
  - type: text
    content: 'Ankehitriny aho dia manolotra anareo ho amin’Andriamanitra sy ho amin’ny tenin’ny fahasoavany, izay mahay mampandroso sy manome lova anareo eo amin’izay rehetra nohamasinina. '
  '33':
  - type: text
    content: 'Tsy mba naniry volafotsy na volamena na lamban’olona aho. '
  '34':
  - type: text
    content: 'Fa fantatrareo ihany fa ireto tanako ireto no niasa mba hahazoako sy izay niaraka tamiko, izay nilainay. '
  '35':
  - type: text
    content: 'Efa nasehoko anareo tamin’ny zavatra rehetra fa tokony hiasa toy izany koa ianareo mba hanampy ny sahirana ka hahatsiaro ny tenin’i Jesosy Tompo hoe: Mahasambatra kokoa ny manome noho ny mandray.'
  '36':
  - type: text
    content: 'Rehefa avy niteny izany izy dia nandohalika teo ka niara-nivavaka tamin’izy rehetra. '
  '37':
  - type: text
    content: 'Ary nitomany mafy izy rehetra, dia namihina ny vozon’i Paoly ka nanoroka azy '
  '38':
  - type: text
    content: sady nalahelo loatra noho ny nilazany fa tsy hahita ny tavany intsony izy. Dia nanatitra azy hatreny amin’ny sambo izy ireo.
  '4':
  - type: text
    content: 'Niaraka taminy hatrany Azia i Sopatera, zanak’i Piro, avy any Beria, i Aristarko sy i Sekondo avy any Tesalonika, i Gaio avy any Derbe, i Timoty sy i Tikiko ary i Trofimo avy any Azia. '
  '5':
  - type: text
    content: 'Efa nandeha nialoha ireo ka niandry anay tany Troasy. '
  '6':
  - type: text
    content: Dia niondrana an-tsambo niala tany Filipia izahay rehefa tapitra ny andro fihinanana ny mofo tsy misy masirasira ary namonjy azy ireo tany Troasy nony afaka dimy andro; tany no nipetrahanay nandritra ny fito andro.
  - type: heading
    content: Fanaovam-beloma tany Troasy
  '7':
  - type: text
    content: 'Tamin’ny andro voalohany amin’ny herinandro, rehefa niangona hamaky mofo izahay dia nitoriteny i Paoly, fa nikasa handeha ny ampitso maraina; naharitra nitoriteny mandra-paha-mamatonalina izy. '
  '8':
  - type: text
    content: 'Ary nisy jiro maro tao amin’ny efitrano ambony izay niangonanay. '
  '9':
  - type: text
    content: 'Nisy zatovo iray antsoina hoe Eotika nipetraka teo am-baravarankely renoky ny torimaso; ary naharitra ela ny toritenin’i Paoly, dia niraika noho ny torimaso ilay zatovo ka nianjera tamin’ny tany avy eny amin’ny rihana fahatelo, ary nony narenina izy dia hita fa efa maty. '
