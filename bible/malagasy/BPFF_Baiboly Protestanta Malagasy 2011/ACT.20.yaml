document_id: ACT.20
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Niverina tany Makedonia sy Gresy i Paoly
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Rehefa nitsahatra ny tabataba dia nampaka ny mpianatra i Paoly ka nampahery azy sy nanao veloma azy ary lasa nankany Makedonia. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Nony nitety izany tany izany izy dia nampahery ny olona tamin’ny teny maro ary tonga tany Gresy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Rehefa nijanona nandritra ny telo volana teo izy ka efa hiondrana an-tsambo hankany Siria dia nisy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jiosy
  - type: text
    text: ' niara-nanao teti-dratsy hamely azy ka niova hevitra izy ary lasa niverina namakivaky an’i Makedonia. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Niaraka taminy hatrany Azia i Sopatera, zanak’i Piro, avy any Beria, i Aristarko sy i Sekondo avy any Tesalonika, i Gaio avy any Derbe, i Timoty sy i Tikiko ary i Trofimo avy any Azia. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Efa nandeha nialoha ireo ka niandry anay tany Troasy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Dia niondrana an-tsambo niala tany Filipia izahay rehefa tapitra ny andro fihinanana ny mofo tsy misy masirasira ary namonjy azy ireo tany Troasy nony afaka dimy andro; tany no nipetrahanay nandritra ny fito andro.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fanaovam-beloma tany Troasy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Tamin’ny andro voalohany amin’ny herinandro, rehefa niangona hamaky mofo izahay dia nitoriteny i Paoly, fa nikasa handeha ny ampitso maraina; naharitra nitoriteny mandra-paha-mamatonalina izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary nisy jiro maro tao amin’ny efitrano ambony izay niangonanay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Nisy zatovo iray antsoina hoe Eotika nipetraka teo am-baravarankely renoky ny torimaso; ary naharitra ela ny toritenin’i Paoly, dia niraika noho ny torimaso ilay zatovo ka nianjera tamin’ny tany avy eny amin’ny rihana fahatelo, ary nony narenina izy dia hita fa efa maty. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dia nidina i Paoly ary niankohoka taminy sy namihina azy sady hoy izy: Aza mikorontana ianareo fa mbola ao aminy ihany ny ainy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary niakatra i Paoly, dia namaky ny mofo ary rehefa avy nisakafo izy dia mbola niresaka ela mandra-paharain’ny andro. Dia lasa nandeha izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ary velona ilay zatovo raha noentina niverina ka faly dia faly tokoa ny olona.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Avy tany Troasy dia nankany Mileto
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Nialoha lalana tamin’ny sambo izahay ka niondrana nankany Aso, fa eo no handraisana an’i Paoly, araka ny teny nomeny, fa ta handeha an-tongotra izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Rehefa tafahaona taminay tany Aso izy dia noraisinay ary lasa nankany Mitilena izahay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Rehefa niondrana an-tsambo niala teo izahay dia tonga tandrifin’i Kio nony ampitso; ny ampitson’iny indray dia niantsona tao Samo izahay ka tonga tany Mileto ny andro manaraka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'I Paoly moa dia efa nikasa handeha an-tsambo handalo any Efesosy mba tsy hijanonany ela any Azia satria maika hamonjy ny andro '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Pentekosta
  - type: text
    text: ' any Jerosalema izy raha azo atao.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Niteny tamin’ireo loholona tany Efesosy i Paoly
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Rehefa tany Mileto i Paoly dia nandefa iraka hankany Efesosy ka nampiantso ny loholon’ny fiangonana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.17 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: presbytera.
    marker-yv: yv-n
  - type: text
    text: ' hankeo aminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Nony tonga teo aminy ireo, dia hoy izy taminy:'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Fantatrareo hatramin’ny andro voalohany nahatongavako teto Azia izay toetry ny fitondrantenako taminareo tamin’ny fotoana rehetra, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'dia ny nanompoako ny Tompo tamin’ny fanetren-tena rehetra sy ny ranomaso ary ny fakam-panahy izay nanjo ahy tamin’ny teti-dratsin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jiosy
  - type: text
    text: ', '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'koa tsy mba nafeniko izay mahasoa, fa nambarako sy nampianariko anareo teo imason’ny olona sy tao amin’ny isan-trano; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'nambarako tamin’ny Jiosy sy ny Grika koa ny fibebahana amin’Andriamanitra sy ny finoana an’i Jesosy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' Tompontsika.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Koa ankehitriny, indro, tery am-panahy hankany Jerosalema aho, nefa tsy fantatro izay hanjo ahy any, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'afa-tsy izay ambaran’ny Fanahy Masina amiko amin’ny isan-tanàna, fa hisy famatorana sy fahoriana miandry ahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Nefa tsy ataoko ho zavatra akory ny aiko, mba hahatanteraka ny fihazakazahako sy ny fanompoana izay noraisiko tamin’i Jesosy Tompo hanambara ny Filazantsaran’ny fahasoavan’Andriamanitra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary indro, ankehitriny dia fantatro fa tsy hahita ny tavako intsony ianareo rehetra izay nalehako nitoriako ny fanjakana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Koa manambara aminareo aho anio fa afaka amin’ny ranareo rehetra aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Fa tsy nafeniko anareo fa notoriko taminareo avokoa ny fikasan’Andriamanitra rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Tandremo ny tenanareo sy ny ondry rehetra izay nanaovan’ny Fanahy Masina anareo ho mpitandrina
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.28 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: eveka.
    marker-yv: yv-n
  - type: text
    text: ', hiandrasanareo ny fiangonan’'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.28 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: eklesia.
    marker-yv: yv-n
  - type: text
    text: 'Andriamanitra, izay novidiny tamin’ny rany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Fantatro fa rehefa lasa aho dia hisy amboadia masiaka hiditra eo aminareo ka tsy hiantra ny ondry. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ary avy aminareo ihany no hipoiran’ny olona sasany hitory teny tsy marina ka hitaona ny mpianatra hanaraka azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Koa miambena ary tsarovy fa telo taona mipaka aho tsy nitsahatra nananatra anareo rehetra andro aman’alina, tamin’ny ranomaso.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Ankehitriny aho dia manolotra anareo ho amin’Andriamanitra sy ho amin’ny tenin’ny fahasoavany, izay mahay mampandroso sy manome lova anareo eo amin’izay rehetra nohamasinina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Tsy mba naniry volafotsy na volamena na lamban’olona aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Fa fantatrareo ihany fa ireto tanako ireto no niasa mba hahazoako sy izay niaraka tamiko, izay nilainay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Efa nasehoko anareo tamin’ny zavatra rehetra fa tokony hiasa toy izany koa ianareo mba hanampy ny sahirana ka hahatsiaro ny tenin’i Jesosy Tompo hoe: Mahasambatra kokoa ny manome noho ny mandray.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Rehefa avy niteny izany izy dia nandohalika teo ka niara-nivavaka tamin’izy rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Ary nitomany mafy izy rehetra, dia namihina ny vozon’i Paoly ka nanoroka azy '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: sady nalahelo loatra noho ny nilazany fa tsy hahita ny tavany intsony izy. Dia nanatitra azy hatreny amin’ny sambo izy ireo.
