document_id: 2SA.23,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Teny farany nataon’i Davida
  - type: text
    content: 'Izao no teny farany nataon’i Davida:'
  - type: text
    content: Hoy i Davida, zanak’i Jese,
  - type: text
    content: dia ny lehilahy izay voasandratra ho ambony,
  - type: text
    content: ilay voahosotry ny Andriamanitr’i Jakoba
  - type: text
    content: 'sady mpanao hira mahafinaritra ho an’ny Israely:'
  '10':
  - type: text
    content: Izy no nitsangana ka namely ny Filistina mandra-pahavizan’ny tanany ka efa niraikitra tamin’ny sabatra. Ary NY TOMPO nanao famonjena lehibe tamin’io andro io. Ny haka babo ihany no sisa niverenan’ny olona hanaraka an’i Eleazara.
  '11':
  - type: text
    content: 'Manarakaraka azy dia i Sama, zanak’i Age hararita. Nony nivory ho andiany iray teo amin’ny tany nisy voanemba maniry ny Filistina dia nandositra azy ny olona. '
  '12':
  - type: text
    content: Nijoro teo afovoan’io tany io kosa anefa i Sama ka nahazo azy ary namono ny Filistina. Nanao famonjena lehibe NY TOMPO.
  '13':
  - type: text
    content: 'Nisy telo lahy samy malaza avy tamin’ny telopolo lahy nidina koa ka tonga tao amin’i Davida tao amin’ny zohin’i Adolama nony fararano; ary ny miaramilan’ny Filistina dia nitoby teo amin’ny lohasahan’ny Refaìta. '
  '14':
  - type: text
    content: Tao amin’ny toeram-piereny i Davida tamin’izay ary ny miaramilan’ny Filistina kosa dia tao Betlehema.
  '15':
  - type: text
    content: 'Dia nilaza ny faniriany i Davida hoe: Iza re no mba hampisotro rano ahy avy amin’ny fantsakana ao Betlehema, ilay ao akaikin’ny vavahady e! '
  '16':
  - type: text
    content: 'Dia namakivaky teo amin’ny miaramilan’ny Filistina ireo telo lahy mahery fo ka nanovo rano tamin’ny fantsakana tao Betlehema, izay teo anilan’ny vavahady, dia noentiny ho any amin’i Davida; kanjo tsy nety nisotro izy fa naidiny ho an’NY TOMPO iny. '
  '17':
  - type: text
    content: 'Fa hoy i Davida: Sanatria, TOMPO ô, raha hanao izany aho; tsy ran’ny lehilahy izay nandeha nanao vy very ny ainy va ity? Dia tsy nety nisotro izy. Izany zavatra izany no nataon’ireo telo lahy mahery fo ireo.'
  '18':
  - type: text
    content: 'I Abisay, rahalahin’i Joaba, zanak’i Zeroia, no lehibe tamin’izy telo lahy, namely ny telonjato lahy tamin’ny lefona izy ka nahafaty azy ireo, ary izy no nalaza tamin’izy telo lahy. '
  '19':
  - type: text
    content: Izy no be voninahitra noho izy telo lahy. Izy no lehibeny; nefa tsy nahomby noho izy telo lahy ireo izy.
  '2':
  - type: text
    content: Ny Fanahin’NY TOMPO no mampiteny ahy,
  - type: text
    content: ary ny teniny no eo amin’ny lelako;
  '20':
  - type: text
    content: 'Ary i Benaia, zanak’i Joiada, zanaka lehilahy mahay tany Kabezela, izay nahavita asa be, izy no namono ny roa lahy mahery tany Moaba; izy no nidina ka namono ny liona tao an-davaka fantsakana tamin’ilay andro nisy orampanala iny; '
  '21':
  - type: text
    content: 'ary izy koa no namono ilay Ejiptiana makadiry be. Nitondra lefona teny an-tanany ilay Ejiptiana, nefa nidina teny aminy tamin’ny tehina i Benaia ka nosarihany ny lefona teny an-tanan’ilay Ejiptiana, ary iny lefony iny ihany no namonoany azy. '
  '22':
  - type: text
    content: 'Izany no nataon’i Benaia, zanak’i Joiada, ary tamin’izy telo lahy mahery dia izy no nalaza. '
  '23':
  - type: text
    content: Nalaza noho ny telopolo lahy izy, nefa tsy nahatratra ny vitan’izy telo lahy teo. Ary nanendry azy ho isan’ny mpanolotsaina azy i Davida.
  '24':
  - type: text
    content: I Asahela, rahalahin’i Joaba kosa no iray amin’ny telopolo;
  - type: text
    content: i Elanana, zanak’i Dodo, avy any Betlehema,
  '25':
  - type: text
    content: i Sama harodita,
  - type: text
    content: i Elika harodita,
  '26':
  - type: text
    content: i Heleza paltita,
  - type: text
    content: Ira, zanak’Ikesy tekoita,
  '27':
  - type: text
    content: i Abiezera anatotita,
  - type: text
    content: i Mebonay hosatita,
  '28':
  - type: text
    content: i Zalmona ahohita,
  - type: text
    content: i Maharay netofatita,
  '29':
  - type: text
    content: i Haleba, zanak’i Bana netofatita,
  - type: text
    content: Itahy, zanak’i Ribay, avy any Gibean’ny taranak’i Benjamina,
  '3':
  - type: text
    content: Andriamanitry ny Israely milaza,
  - type: text
    content: 'eny, ny Vatolampin’ny Israely miteny amiko hoe:'
  - type: text
    content: Indro ny mpanapaka ny olona;
  - type: text
    content: marina izy sady manapaka amin’ny fahatahorana an’Andriamanitra;
  '30':
  - type: text
    content: i Benaia piratonita,
  - type: text
    content: i Hiday, avy any amin’ny lohasahan-driakan’i Gaasy,
  '31':
  - type: text
    content: i Aby-Albona arbatita,
  - type: text
    content: i Azmaveta baromita,
  '32':
  - type: text
    content: i Eliaba salbonita,
  - type: text
    content: i Bene-Jasena,
  - type: text
    content: i Jonatana,
  '33':
  - type: text
    content: i Sama hararita,
  - type: text
    content: i Ahiama, zanak’i Sarara hararita,
  '34':
  - type: text
    content: i Elifeleta, zanak’i Ahasbay, zanaky ny Makatita,
  - type: text
    content: i Eliama, zanak’i Ahitofela gilonita,
  '35':
  - type: text
    content: i Hezray karmelita,
  - type: text
    content: i Paray arbita,
  '36':
  - type: text
    content: i Jigala, zanak’i Natana, avy any Zoba,
  - type: text
    content: i Bany gadita,
  '37':
  - type: text
    content: i Zeleka amonita,
  - type: text
    content: i Naharay berotita, mpitondra ny fiadian’i Joaba, zanak’i Zeroia,
  '38':
  - type: text
    content: Ira jitirita,
  - type: text
    content: i Gareba jitirita,
  '39':
  - type: text
    content: i Oria hetita. Fito amby telopolo no isan’izy rehetra.
  '4':
  - type: text
    content: izy dia toy ny fahazavan’ny maraina, raha miposaka ny masoandro,
  - type: text
    content: dia ilay maraina tsy misy rahona iny;
  - type: text
    content: ny ahitra dia mandrobona amin’ny tany noho ny hainandro manarakaraka ny ranonorana.
  '5':
  - type: text
    content: Moa tsy toy izany indrindra va ny taranako amin’Andriamanitra?
  - type: text
    content: Satria fanekena mandrakizay no nataony tamiko,
  - type: text
    content: voalamina amin’ny zavatra rehetra sady voatandrina;
  - type: text
    content: moa tsy hampitsimohiny va
  - type: text
    content: ny famonjena ahy rehetra sy ny faniriako rehetra?
  '6':
  - type: text
    content: Ny tena ratsy fanahy rehetra kosa dia tahaka ny tsilo ariana,
  - type: text
    content: fa tsy azo raisin’ny tanana izy;
  '7':
  - type: text
    content: Ary ny olona izay mikasika azy
  - type: text
    content: dia tsy maintsy mitondra vy sy zaran-defona;
  - type: text
    content: ary hodorana amin’ny afo avokoa amin’izay itoerany ireny.
  - type: heading
    content: Ny anaran’ireo lehilahy maherin’i Davida
  - type: heading
    content: 1Tan 11.10-47
  '8':
  - type: text
    content: 'Izao no anaran’ireo lehilahy maherin’i Davida: i Joseba-Basebeta takemonita no lehiben’ny mpanafika malaza. Izy no ilay Edino eznita izay namely ny valonjato lahy ka nahafaty azy tamin’ny ady indray mandeha monja.'
  '9':
  - type: text
    content: 'Ny manarakaraka azy dia i Eleazara, zanak’i Dodo, zanak’i Ahoha, iray amin’izy telo lahy mahery teo amin’i Davida, raha nihantsy ny Filistina izay niangona hiady ireo ka niakatra ny lehilahy tamin’ny Israely. '
