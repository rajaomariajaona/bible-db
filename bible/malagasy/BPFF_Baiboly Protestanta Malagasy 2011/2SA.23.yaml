document_id: 2SA.23,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Teny farany nataon’i Davida
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Izao no teny farany nataon’i Davida:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hoy i Davida, zanak’i Jese,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ny lehilahy izay voasandratra ho ambony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ilay voahosotry ny Andriamanitr’i Jakoba
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'sady mpanao hira mahafinaritra ho an’ny Israely:'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Izy no nitsangana ka namely ny Filistina mandra-pahavizan’ny tanany ka efa niraikitra tamin’ny sabatra. Ary NY TOMPO nanao famonjena lehibe tamin’io andro io. Ny haka babo ihany no sisa niverenan’ny olona hanaraka an’i Eleazara.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Manarakaraka azy dia i Sama, zanak’i Age hararita. Nony nivory ho andiany iray teo amin’ny tany nisy voanemba maniry ny Filistina dia nandositra azy ny olona. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Nijoro teo afovoan’io tany io kosa anefa i Sama ka nahazo azy ary namono ny Filistina. Nanao famonjena lehibe NY TOMPO.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Nisy telo lahy samy malaza avy tamin’ny telopolo lahy nidina koa ka tonga tao amin’i Davida tao amin’ny zohin’i Adolama nony fararano; ary ny miaramilan’ny Filistina dia nitoby teo amin’ny lohasahan’ny Refaìta. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Tao amin’ny toeram-piereny i Davida tamin’izay ary ny miaramilan’ny Filistina kosa dia tao Betlehema.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Dia nilaza ny faniriany i Davida hoe: Iza re no mba hampisotro rano ahy avy amin’ny fantsakana ao Betlehema, ilay ao akaikin’ny vavahady e! '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Dia namakivaky teo amin’ny miaramilan’ny Filistina ireo telo lahy mahery fo ka nanovo rano tamin’ny fantsakana tao Betlehema, izay teo anilan’ny vavahady, dia noentiny ho any amin’i Davida; kanjo tsy nety nisotro izy fa naidiny ho an’NY TOMPO iny. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Fa hoy i Davida: Sanatria, TOMPO ô, raha hanao izany aho; tsy ran’ny lehilahy izay nandeha nanao vy very ny ainy va ity? Dia tsy nety nisotro izy. Izany zavatra izany no nataon’ireo telo lahy mahery fo ireo.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'I Abisay, rahalahin’i Joaba, zanak’i Zeroia, no lehibe tamin’izy telo lahy, namely ny telonjato lahy tamin’ny lefona izy ka nahafaty azy ireo, ary izy no nalaza tamin’izy telo lahy. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Izy no be voninahitra noho izy telo lahy. Izy no lehibeny; nefa tsy nahomby noho izy telo lahy ireo izy.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Ny Fanahin’NY TOMPO no mampiteny ahy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny teniny no eo amin’ny lelako;
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Ary i Benaia, zanak’i Joiada, zanaka lehilahy mahay tany Kabezela, izay nahavita asa be, izy no namono ny roa lahy mahery tany Moaba; izy no nidina ka namono ny liona tao an-davaka fantsakana tamin’ilay andro nisy orampanala iny; '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'ary izy koa no namono ilay Ejiptiana makadiry be. Nitondra lefona teny an-tanany ilay Ejiptiana, nefa nidina teny aminy tamin’ny tehina i Benaia ka nosarihany ny lefona teny an-tanan’ilay Ejiptiana, ary iny lefony iny ihany no namonoany azy. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Izany no nataon’i Benaia, zanak’i Joiada, ary tamin’izy telo lahy mahery dia izy no nalaza. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Nalaza noho ny telopolo lahy izy, nefa tsy nahatratra ny vitan’izy telo lahy teo. Ary nanendry azy ho isan’ny mpanolotsaina azy i Davida.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: I Asahela, rahalahin’i Joaba kosa no iray amin’ny telopolo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: i Elanana, zanak’i Dodo, avy any Betlehema,
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: i Sama harodita,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: i Elika harodita,
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: i Heleza paltita,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ira, zanak’Ikesy tekoita,
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: i Abiezera anatotita,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: i Mebonay hosatita,
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: i Zalmona ahohita,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: i Maharay netofatita,
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: i Haleba, zanak’i Bana netofatita,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Itahy, zanak’i Ribay, avy any Gibean’ny taranak’i Benjamina,
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Andriamanitry ny Israely milaza,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'eny, ny Vatolampin’ny Israely miteny amiko hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro ny mpanapaka ny olona;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: marina izy sady manapaka amin’ny fahatahorana an’Andriamanitra;
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: i Benaia piratonita,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: i Hiday, avy any amin’ny lohasahan-driakan’i Gaasy,
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: i Aby-Albona arbatita,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: i Azmaveta baromita,
  '32':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: i Eliaba salbonita,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: i Bene-Jasena,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: i Jonatana,
  '33':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: i Sama hararita,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: i Ahiama, zanak’i Sarara hararita,
  '34':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: i Elifeleta, zanak’i Ahasbay, zanaky ny Makatita,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: i Eliama, zanak’i Ahitofela gilonita,
  '35':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: i Hezray karmelita,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: i Paray arbita,
  '36':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: i Jigala, zanak’i Natana, avy any Zoba,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: i Bany gadita,
  '37':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: i Zeleka amonita,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: i Naharay berotita, mpitondra ny fiadian’i Joaba, zanak’i Zeroia,
  '38':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: Ira jitirita,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: i Gareba jitirita,
  '39':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: i Oria hetita. Fito amby telopolo no isan’izy rehetra.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: izy dia toy ny fahazavan’ny maraina, raha miposaka ny masoandro,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ilay maraina tsy misy rahona iny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny ahitra dia mandrobona amin’ny tany noho ny hainandro manarakaraka ny ranonorana.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Moa tsy toy izany indrindra va ny taranako amin’Andriamanitra?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Satria fanekena mandrakizay no nataony tamiko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: voalamina amin’ny zavatra rehetra sady voatandrina;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: moa tsy hampitsimohiny va
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny famonjena ahy rehetra sy ny faniriako rehetra?
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Ny tena ratsy fanahy rehetra kosa dia tahaka ny tsilo ariana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa tsy azo raisin’ny tanana izy;
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Ary ny olona izay mikasika azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia tsy maintsy mitondra vy sy zaran-defona;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hodorana amin’ny afo avokoa amin’izay itoerany ireny.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny anaran’ireo lehilahy maherin’i Davida
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 1Tan 11.10-47
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Izao no anaran’ireo lehilahy maherin’i Davida: i Joseba-Basebeta takemonita no lehiben’ny mpanafika malaza. Izy no ilay Edino eznita izay namely ny valonjato lahy ka nahafaty azy tamin’ny ady indray mandeha monja.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ny manarakaraka azy dia i Eleazara, zanak’i Dodo, zanak’i Ahoha, iray amin’izy telo lahy mahery teo amin’i Davida, raha nihantsy ny Filistina izay niangona hiady ireo ka niakatra ny lehilahy tamin’ny Israely. '
