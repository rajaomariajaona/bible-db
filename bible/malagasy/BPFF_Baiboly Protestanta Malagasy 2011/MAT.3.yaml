document_id: MAT.3,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: I Jaona Mpanao batisa
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mar 1.2-6; Lio 3.1-6; ampit. Jao 1.19-23
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary tamin’izany andro izany dia niseho vahoaka i Jaona Mpanao batisa, nitory tany an-tany efitr’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jodia
    - type: text
      text: ' ka nilaza hoe: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary indro, efa mipetraka eo amin’ny fototry ny hazo sahady ny famaky; koa ny hazo rehetra izay tsy mamoa voa tsara dia hokapaina ka hatsipy any anaty afo.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny amin’Ilay ho avy
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mar 1.7-8; Lio 3.15-17; ampit. Jao 1.24-28
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izaho dia manao batisa anareo amin’ny rano ho amin’ny fibebahana; fa Ilay avy ao aorianako no mahery noho izaho ka tsy mendrika hanaisotra ny kapany aza aho; Izy no hanao batisa anareo amin’ny Fanahy Masina sy ny afo; '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: eny an-tanany ny fikororohany, Izy hanadio tsara ny eo am-pamoloany ka hanangona ny variny ho any an-tsompitra; fa ny akofa sy ny mololo dia hodorany amin’ny afo tsy mety maty.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nanaovana batisa an’i Jesosy
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mar 1.9-11; Lio 3.21-22; ampit. Jao 1.29-34
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary tamin’izay Jesosy dia avy tany Galilia ka tonga teo amoron’i Jordana, dia nanatona an’i Jaona Izy mba hataony batisa. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa nandà Azy i Jaona ka niteny hoe: Izaho no tokony hataonao batisa ka Ianao indray va no mankaty amiko? '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nefa namaly azy Jesosy hoe: Ekeo ihany ankehitriny, fa izao no mety amintsika mba hahatanteraka ny fahamarinana rehetra. Dia nekeny Izy. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary raha vao vita batisa Jesosy dia niakatra avy tao amin’ny rano avy hatrany; ary indro, nisokatra Taminy ny lanitra, ary hitany ny Fanahin’Andriamanitra nidina tahaka ny voromailala nankeo amboniny. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary injao nisy feo avy tany an-danitra hoe: Ity no Zanako malalako izay sitrako.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mibebaha ianareo fa efa akaiky ny fanjakan’ny lanitra. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa izy no ilay nampilazaina an’Isaia mpaminany hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '«Injany! Misy feon’ny miantso mafy any an-tany efitra hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Amboary ny lalan’NY TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ataovy mahitsy ny lalan-kalehany» (Isa 40.3).
  '4':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Ny fitafian’i Jaona dia lamba volon-drameva ary fehikibo hoditra no teny aminy; valala sy tantely remby kosa no sakafony.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Jerosalema sy Jodia rehetra mbamin’ny tany rehetra amoron’i Jordana dia nandeha nankany amin’i Jaona '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ka nataony batisa tao amin’ny ony Jordana ireny, rehefa niaiky ny fahotany.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny hafatr’i Jaona Mpanao batisa
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Lio 3.7-9
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa nony nahita ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Fariseo
    - type: text
      text: ' sy ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Sadoseo
    - type: text
      text: ' maro nanatona mba hatao batisa i Jaona dia hoy izy taminy: Ry taranaky ny menarana, iza no nanoro hevitra anareo handositra ny fahatezerana ho avy? '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa mamoaza voa mendrika ny fibebahana ianareo; '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary aza mihevitra ny hiteny anakampo hoe: Manana an’i Abrahama ho rainay izahay; fa lazaiko aminareo fa Andriamanitra mahay manangana zanaka ho an’i Abrahama avy amin’ireto vato ireto. '
