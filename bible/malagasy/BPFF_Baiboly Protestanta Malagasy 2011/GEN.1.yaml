document_id: GEN.1,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Nahary izao rehetra izao sy ny olombelona Andriamanitra
  - type: text
    content: Tamin’ny voalohany Andriamanitra nahary ny lanitra sy ny tany.
  '10':
  - type: text
    content: 'Ary nataon’Andriamanitra hoe tany ny maina; ary nataony hoe ranomasina ny rano tafangona. Ary hitan’Andriamanitra fa tsara izany. '
  '11':
  - type: text
    content: 'Ary Andriamanitra niteny hoe: Aoka ny tany haniry ahitra sy anana mamoa ary hazo fihinam-boa eny ambonin’ny tany, izay mamoa, samy araka ny karazany avy, ka ao anatiny ny voany! Dia nisy izany. '
  '12':
  - type: text
    content: 'Ary ny tany dia naniry ahitra sy anana mamoa, samy araka ny karazany avy ary hazo mamoa ka ao anatiny ny voany, samy araka ny karazany avy. Ary hitan’Andriamanitra fa tsara izany. '
  '13':
  - type: text
    content: Dia nisy hariva ary nisy maraina; izay no andro fahatelo.
  '14':
  - type: text
    content: 'Ary Andriamanitra niteny hoe: Misia fanazavana eny amin’ny habakabaky ny lanitra hampisaraka ny andro sy ny alina. Aoka ho famantarana ny andro firavoravoana samihafa, ny andro ary ny fizaran-taona ireo, '
  '15':
  - type: text
    content: 'dia aoka ho fanazavana eny amin’ny habakabaky ny lanitra izy hanazava eny ambonin’ny tany! Dia nisy izany. '
  '16':
  - type: text
    content: 'Ary Andriamanitra nanao ny fanazavana roa lehibe, dia ny fanazavana lehibe ho mpanapaka ny andro, ny fanazavana kely ho mpanapaka ny alina ary ny kintana. '
  '17':
  - type: text
    content: 'Ary Andriamanitra nametraka azy ireo eny amin’ny habakabaky ny lanitra mba hanazava eny ambonin’ny tany '
  '18':
  - type: text
    content: 'sy ho mpanapaka ny andro sy ny alina ary hampisaraka ny mazava sy ny maizina. Ary hitan’Andriamanitra fa tsara izany. '
  '19':
  - type: text
    content: Dia nisy hariva ary nisy maraina; izay no andro fahefatra.
  '2':
  - type: text
    content: Ary ny tany dia tsy nisy endrika sady foana; ary haizina no teo ambonin’ny lalina. Ary ny Fanahin’Andriamanitra nanomba teo ambonin’ny rano.
  '20':
  - type: text
    content: 'Ary Andriamanitra niteny hoe: Aoka ny rano ho be zavamananaina; aoka hisy vorona hanidina eny ambonin’ny tany, eny amin’ny habakabaky ny lanitra! '
  '21':
  - type: text
    content: 'Ary Andriamanitra nahary ireo biby vaventy any anaty rano sy ireo zavamananaina mihetsiketsika rehetra, dia ireo izay betsaka ao amin’ny rano, samy araka ny karazany avy, ary ny voromanidina rehetra, samy araka ny karazany avy. Ary hitan’Andriamanitra fa tsara izany. '
  '22':
  - type: text
    content: 'Ary Andriamanitra nitahy azy ireo ka niteny hoe: Maroa fara sy mihabetsaha ka mamenoa ny rano ao amin’ny ranomasina; aoka ny vorona hihamaro eny ambonin’ny tany! '
  '23':
  - type: text
    content: Dia nisy hariva ary nisy maraina; izay no andro fahadimy.
  '24':
  - type: text
    content: 'Ary Andriamanitra niteny hoe: Aoka ny tany hamoaka zavamananaina, samy araka ny karazany avy, dia biby fiompy sy biby mandady na mikisaka ary bibidia, samy araka ny karazany avy! Dia nisy izany. '
  '25':
  - type: text
    content: Ary Andriamanitra nanao ny bibidia, samy araka ny karazany avy, sy ny biby fiompy, samy araka ny karazany avy, ary ny biby rehetra izay mandady na mikisaka amin’ny tany, samy araka ny karazany avy. Ary hitan’Andriamanitra fa tsara izany.
  '26':
  - type: text
    content: 'Ary Andriamanitra niteny hoe: Andeha Isika hamorona olona tahaka ny endritsika, araka ny tarehintsika; ary aoka izy ireo hanapaka amin’ny hazandrano ao amin’ny ranomasina, amin’ny voromanidina sy ny biby fiompy, amin’ny tany rehetra ary amin’ny biby rehetra izay mandady na mikisaka amin’ny tany. '
  '27':
  - type: text
    content: 'Ary Andriamanitra nahary ny olona tahaka ny endriny; tahaka ny endrik’Andriamanitra no nahariany azy; lahy sy vavy no nahariany azy. '
  '28':
  - type: text
    content: 'Ary Andriamanitra nitahy azy ka niteny hoe: Maroa fara sy mihabetsaha ka mamenoa ny tany, dia mampanompoa azy. Manapaha amin’ny hazandrano ao amin’ny ranomasina sy ny voromanidina ary ny biby rehetra izay mihetsiketsika ambonin’ny tany. '
  '29':
  - type: text
    content: 'Ary Andriamanitra niteny hoe: Indro, omeko anareo ny zava-maitso misy voany rehetra izay ambonin’ny tany manontolo sy ny voan’ny hazo fihinam-boa rehetra; ho fihinanareo ireny. '
  '3':
  - type: text
    content: 'Ary Andriamanitra niteny hoe: Misia mazava! Dia nisy mazava. '
  '30':
  - type: text
    content: 'Ary ho an’ny bibidia rehetra sy ny voromanidina rehetra ary ny zavamananaina rehetra izay mandady na mikisaka amin’ny tany dia omeko azy ny zava-maitso rehetra ho fihinany. Dia nisy izany. '
  '31':
  - type: text
    content: Ary hitan’Andriamanitra izay rehetra nataony ka indro, tsara indrindra izany. Dia nisy hariva ary nisy maraina; izay no andro fahenina.
  '4':
  - type: text
    content: 'Ary hitan’Andriamanitra fa tsara ny mazava ka nosarahin’Andriamanitra ny mazava sy ny maizina. '
  '5':
  - type: text
    content: Ary nataon’Andriamanitra hoe andro ny mazava; ary ny maizina dia nataony hoe alina. Dia nisy hariva ary nisy maraina; izay no andro voalohany.
  '6':
  - type: text
    content: 'Ary Andriamanitra niteny hoe: Misia habakabaka eo anelanelan’ny rano, ary aoka izany no hampisaraka ny rano amin’ny rano! '
  '7':
  - type: text
    content: 'Ary Andriamanitra nanao ny habakabaka ka nanasaraka ny rano ambanin’ny habakabaka tamin’ny rano ambonin’ny habakabaka. Dia nisy izany. '
  '8':
  - type: text
    content: Ary nataon’Andriamanitra hoe lanitra ny habakabaka. Dia nisy hariva ary nisy maraina; izay no andro faharoa.
  '9':
  - type: text
    content: 'Ary Andriamanitra niteny hoe: Aoka hiangona ho eo amin’ny toerana iray ny rano izay eny ambanin’ny lanitra, ary aoka hiseho ny maina! Dia nisy izany. '
