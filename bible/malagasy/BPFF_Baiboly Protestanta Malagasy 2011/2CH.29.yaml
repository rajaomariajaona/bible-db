document_id: 2CH.29,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nanjakan’i Hezekia
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 2Mpa 18.1-3
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dimy amby roapolo taona i Hezekia raha nanomboka nanjaka ary sivy amby roapolo taona no nanjakany tany Jerosalema. Ny anaran’ny reniny dia Abia, zanakavavin’i Zakaria. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa efa ato am-poko ny hanao fanekena amin’NY TOMPO, Andriamanitry ny Israely, mba hiala amintsika ny fahatezerany mirehitra. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ry zanako, aza malaina ianareo; fa ianareo no nofidin’NY TOMPO hijoro eo anatrehany hanompo Azy ka ho mpanao fanompoam-pivavahana sy ho mpandoro ditin-kazo manitra ho Azy.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nitsangana ny levita, dia i Mahata, zanak’i Amasay sy i Joela, zanak’i Azaria avy amin’ny taranaky ny Kehatita; avy amin’ny taranak’i Merary dia i Kisy, zanak’i Abdia, sy i Azaria, zanak’i Jehalalila; avy amin’ny Gersonita dia i Joa, zanak’i Zima sy i Edena, zanak’i Joa; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'avy amin’ny taranak’i Elizafana dia i Simry sy i Jeiela; avy amin’ny taranak’i Asafa dia i Zakaria sy i Matania; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: avy amin’ny taranak’i Hemana dia i Jehiela sy i Simey; avy amin’ny taranak’i Jedotona dia i Semaia sy i Oziela.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary namory ny rahalahiny izy dia samy nanamasina ny tenany avy ireo ka tonga, araka ny didin’ny mpanjaka, noho ny tenin’NY TOMPO mba hanadio ny tranon’NY TOMPO. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary niditra tao amin’ny efitra anatiny amin’ny tranon’NY TOMPO ny mpisorona mba hanadio azy, koa navoakany ho eo an-kianjan’ny tranon’NY TOMPO ny zava-maloto rehetra izay hitany tao an-tempolin’NY TOMPO. Nandray ireny kosa ny levita ka navoakany ho any amin’ny lohasahan-driaka Kidrona. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tamin’ny andro voalohany tamin’ny volana voalohany no nanomboka ny fanamasinana izy ary tamin’ny andro fahavalo tamin’io volana io dia niditra teo amin’ny lalantsara an’NY TOMPO izy ireo; dia nanamasina ny tranon’NY TOMPO tamin’ny havaloana izy ireo; ary tamin’ny andro fahenina amby folo tamin’ny volana voalohany no nahavitany azy.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia niditra tao amin’i Hezekia mpanjaka izy ireo ka niteny hoe: Efa voadionay avokoa ny tranon’NY TOMPO sy ny alitara fandoroana ny fanatitra dorana manontolo mbamin’ny fanaka rehetra momba azy ary ny latabatry ny mofo atao fanatitra mbamin’ny fanaka rehetra momba azy koa. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ny fanaka rehetra izay nozimbazimbain’i Ahaza mpanjaka tamin’ny fahotana vitany, fony izy mbola nanjaka, dia efa namboarinay sy nohamasininay, koa indreo, eo anoloan’ny alitaran’NY TOMPO izy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Averin’i Hezekia amin’ny laoniny ny fanompoam-pivavahana sy ny fanaovana sorona
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nanao izay mahitsy teo imason’NY TOMPO izy, tahaka izay rehetra nataon’i Davida rainy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nanadiovana ny tempoly
    marker-yv: yv-h
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nifoha vao maraina i Hezekia mpanjaka ka namory ny mpanapaka ny tanàna ary niakatra ho ao amin’ny tranon’NY TOMPO. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nitondra vantotra ombilahy fito, ondrilahy fito, zanak’ondry fito ary osilahy fito izy ho fanatitra noho ny ota ho an’ny fanjakana sy ho an’ny fitoerana masina ary ho an’i Joda. Ary ny mpisorona, taranak’i Arona, dia nasainy nanolotra ireo teo ambonin’ny alitaran’NY TOMPO. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia novonoiny ny vantotra ombilahy, ary noraisin’ny mpisorona ny ra ka nafafiny tamin’ny alitara; novonoiny koa ny ondrilahy dia nafafiny tamin’ny alitara ny rany; novonoiny koa ny zanak’ondry dia nafafiny tamin’ny alitara ny rany. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny osilahy ho fanatitra noho ny ota dia noentiny teo anatrehan’ny mpanjaka sy ny fiangonana ka nametrahany tanana; '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia novonoin’ny mpisorona ireo ka ny rany dia nataony teo amin’ny alitara araka ny fanao ho fanatitra noho ny ota hanaovana fanavotana ho an’ny Israely; fa ho an’ny Israely rehetra no nasain’ny mpanjaka nanaovana ny fanatitra dorana manontolo sy ny fanatitra noho ny ota. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny mpanjaka dia nametraka ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: levita
    - type: text
      text: ' tao amin’ny tranon’NY TOMPO mba hitondra kipantsona sy valiha ary lokanga, araka ny didin’i Davida mpanjaka sy i Gada, mpahitan’ny mpanjaka, sy i Natana mpaminany; fa izany no didin’NY TOMPO nampitondrainy ny mpaminaniny. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nitsangana teo ny levita nitondra ny zavamanenon’i Davida, ary teo koa ny mpisorona izay nitondra ny trompetra. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nasain’i Hezekia natolotra teo ambonin’ny alitara ny fanatitra dorana manontolo; koa raha vao natomboka ny fanolorana ny fanatitra dorana manontolo dia natomboka koa ny fihirana ho an’NY TOMPO sy ny fitsofana ny trompetra niaraka tamin’ny zavamanenon’i Davida, mpanjakan’ny Israely. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Niankohoka ny fiangonana manontolo, nihira ny mpihira, ary ny mpitsoka trompetra dia nitsoka, mandra-pahavitan’ny fanatitra dorana manontolo. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nony efa nitsahatra ny fanolorana izany dia nandohalika sy niankohoka ny mpanjaka mbamin’izay rehetra niaraka taminy. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin’ny volana voalohany tamin’ny taona voalohany nanjakany dia namoha ny varavaran’ny tranon’NY TOMPO izy ka nanamboatra izay simba tao. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nasain’i Hezekia mpanjaka sy ny mpanapaka hihira sy hidera NY TOMPO tamin’ny teny namboarin’i Davida sy i Asafa mpahita ny levita. Ary nihira fiderana tamin-kafaliana izy, dia niankohoka tamin’ny tany ka nivavaka.
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy i Hezekia: Efa nanokana ny tenanareo ho an’NY TOMPO ianareo izao, koa manatòna ka mitondrà fanati-pisaorana sy fanatitra hafa koa ho ao amin’ny tranon’NY TOMPO. Dia nitondra fanati-pisaorana sy fanatitra hafa ny fiangonana, ary izay rehetra nazoto dia nitondra fanatitra dorana manontolo. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny isan’ny fanatitra dorana manontolo izay noentin’ny fiangonana dia omby fitopolo sy ondrilahy zato ary zanak’ondry roanjato; natao fanatitra dorana manontolo ho an’NY TOMPO ireo rehetra ireo. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny zavatra nohamasinina dia omby eninjato sy ondry aman’osy telo arivo. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa vitsy loatra ny mpisorona ka tsy nahendaka ny fanatitra dorana manontolo rehetra, dia nanampy azy ny levita rahalahiny mandra-pahavitan’ny raharaha sy ny nanamasinan’ny mpisorona sasany ny tenany koa; fa ny levita dia nazoto kokoa tamin’ny fanamasinana ny tenany noho ny mpisorona. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary be koa ny fanatitra dorana manontolo sy ny saboran’ny fanati-pihavanana sy ny fanatitra aidina ampiarahina amin’ny fanatitra dorana manontolo. Izany no nanavaozany ny fanompoana tao amin’ny tranon’NY TOMPO. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary faly i Hezekia sy ny vahoaka rehetra noho izay namboarin’Andriamanitra ho an’ny olona, satria tampoka no nanaovana izany raharaha izany.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nampidiriny tao ny mpisorona sy ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: levita
    - type: text
      text: ' ka nangoniny teo amin’ny kianja malalaka teo atsinanana. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy izy taminy: Mihainoa ahy, ianareo levita, koa hamasino ny tenanareo izao, hamasino koa ny tranon’NY TOMPO, Andriamanitry ny razanareo, ary esory amin’ny fitoerana masina ny zava-maloto rehetra. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa nikomy sy nanao izay ratsy teo imason’NY TOMPO Andriamanitsika ny razantsika ary nahafoy Azy ka niamboho ny fonenan’NY TOMPO. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary narindriny ny varavarana amin’ny lalantsara fidirana, dia novonoiny ny jiro sady tsy nodorany ny ditin-kazo manitra, ary tsy natolony tao amin’ny fitoerana masina ho an’Andriamanitry ny Israely ny fanatitra dorana manontolo. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nihatra tamin’ny Joda sy Jerosalema ny fahatezeran’NY TOMPO, koa izany no nanaovany izao zavatra mampihorohoro sy ho figagana ary ho zavatra mampihivingivina toy izao hitan’ny masonareo izao. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa e! Lavon’ny sabatra ny razantsika, ary ny zanakalahintsika sy ny zanakavavintsika ary ny vadintsika dia efa babo noho izany. '
