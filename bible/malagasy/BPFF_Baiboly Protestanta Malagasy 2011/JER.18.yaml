document_id: JER.18,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: I Jeremia tao an-tranon’ny mpanefy tanimanga
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Izao no teny tonga tamin’i Jeremia avy tamin’NY TOMPO: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'nefa raha manao izay ratsy eo imasoko izy ka tsy mihaino ny feoko dia hanenenako kosa ny soa izay nolazaiko hanasoavana azy. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Koa amin’izany, lazao amin’ny Joda sy amin’ny mponina eto Jerosalema hoe: Izao no lazain’NY TOMPO: Indro, mamorona loza hihatra aminareo Aho ary mihevitra izay hamelezako anareo; koa samia miala amin’ny lalany ratsy avy ianareo ary ataovy tsara ny lalanareo sy ny ataonareo. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Nefa hoy ireo: Tsy misy fanantenana ho anay! Fa mbola hanaraka ny hevitray ihany izahay; eny, samy hanao araka ny ditran’ny fo ratsinay avy izahay rehetra.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Nanadino ny Andriamaniny ny Israely
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Koa izao no lazain’NY TOMPO:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Anontanio any amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jentilisa
    - type: text
      text: ' hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Iza no nandre zavatra toy izany?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Zavatra mahatsiravina indrindra no nataon’Israely virijiny.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Hitsahatra tsy ho eo amin’ny vatolampy any an-tsaha va
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny orampanalan’i Libanona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mety ho ritra va ny rano maria sady mangatsiaka avy amin’ny tany hafa?
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Fa efa nanadino Ahy ny oloko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: koa ho an’ny sampy no nandoroany ditin-kazo manitra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary nahatafintohina azy teo amin’ny lalany ireny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ny lalana efa hatramin’ny fahagola
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka nandehanany amin’ny sakeli-dalana madinika,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia amin’ny lalana tsy voavoatra.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Izany no nahatonga ny taniny ho figagana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ho zavatra mampisitrisitra mandrakizay;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay rehetra mandalo azy dia gaga
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy mihifikifi-doha.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Toy ny fampielin’ny rivotra avy any atsinanana no hampielezako azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eo anoloan’ny fahavalony;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hiamboho azy Aho fa tsy hanatrika azy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: amin’ny andro hahitany loza.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny teti-dratsy hamelezana an’i Jeremia sy ny vavaka nataony tamin’izany
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Hoy ny olona: Andeha isika hihevitra izay hamelezana an’i Jeremia; fa tsy ho tapaka tsy akory ny lalàna avy amin’ny mpisorona, na ny tolo-tsaina avy amin’ny hendry, na ny teny avy amin’ny mpaminany. Aoka hoenti-mamely azy ny lelantsika ary aoka tsy hohenointsika akory izay teniny.'
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Mihainoa ahy, TOMPO ô;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mihainoa ny tenin’izay miady amiko.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Mitsangàna ka midìna ho any amin’ny tranon’ny mpanefy tanimanga; any no hampandrenesako anao ny teniko. '
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Ratsy va no havaly ny soa?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa efa nihady lavaka hamandrihana ahy ireo.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsarovy ny nitsanganako teo anatrehanao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nitaraina ho azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hampiala ny fahatezeranao aminy.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Koa aoka ho mosarena ny zanany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary atolory ho amin’ny herin’ny sabatra izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka ho foana anaka ny vadiny sady ho tonga mpitondratena;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary aoka haripaky ny aretina ny lehilahy lehibe ao aminy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ho fatin-tsabatra amin’ny ady ny zatovony.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Aoka hisy fidradradradrana ho re avy ao an-tranony
  - type: usfm
    marker: q1
    children:
    - type: text
      text: rehefa mitondra miaramila iray toko any aminy tampoka Ianao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa efa nihady lavaka hamandrihana ahy izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady nanafim-pandrika haningorana ny tongotro.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Fa Ianao, TOMPO ô, no mahalala
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny fisainana rehetra ataony hamelezany ahy ho faty;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aza avela ny helony;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary aza vonoina tsy ho eo imasonao ny fahotany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa aoka ho solafaka eo anatrehanao izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mameleza azy amin’ny andro fahatezeranao.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Dia nidina tany amin’ny tranon’ny mpanefy tanimanga aho ary indro, teo am-panaovana ny asany teo amin’ny milina fanodinana izy. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ary raha simba ny vilany amboariny, araka izay miseho matetika amin’ny tanimanga eny an-tanan’ny mpanefy, dia ataony vilany hafa indray, araka izay tian’izy mpanefy tanimanga hanaovana azy. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Dia tonga tamiko ny tenin’NY TOMPO hoe: '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Moa tsy afaka manao aminareo toy ny ataon’ity mpanefy tanimanga ity va Aho, ry taranak’Israely? Hoy NY TOMPO. Indro, toy ny tanimanga eo an-tanan’ny mpanefy azy, dia toy izany ianareo eo an-tanako, ry taranak’Israely. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Mbetika Aho dia milaza ny amin’ny firenena sy fanjakana iray fa hongotako sy hazerako ary horavako izy; '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'kanefa raha miala amin’ny ratsy izany firenena noteneniko izany dia hanenenako kosa ny loza izay nokasaiko hamelezana azy. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ary mbetika kosa Aho dia milaza ny amin’ny firenena sy fanjakana iray fa haoriko sy hamboleko; '
