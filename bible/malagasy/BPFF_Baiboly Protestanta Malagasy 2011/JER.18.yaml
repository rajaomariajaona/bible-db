document_id: JER.18,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: I Jeremia tao an-tranon’ny mpanefy tanimanga
  - type: text
    content: 'Izao no teny tonga tamin’i Jeremia avy tamin’NY TOMPO: '
  '10':
  - type: text
    content: 'nefa raha manao izay ratsy eo imasoko izy ka tsy mihaino ny feoko dia hanenenako kosa ny soa izay nolazaiko hanasoavana azy. '
  '11':
  - type: text
    content: 'Koa amin’izany, lazao amin’ny Joda sy amin’ny mponina eto Jerosalema hoe: Izao no lazain’NY TOMPO: Indro, mamorona loza hihatra aminareo Aho ary mihevitra izay hamelezako anareo; koa samia miala amin’ny lalany ratsy avy ianareo ary ataovy tsara ny lalanareo sy ny ataonareo. '
  '12':
  - type: text
    content: 'Nefa hoy ireo: Tsy misy fanantenana ho anay! Fa mbola hanaraka ny hevitray ihany izahay; eny, samy hanao araka ny ditran’ny fo ratsinay avy izahay rehetra.'
  - type: heading
    content: Nanadino ny Andriamaniny ny Israely
  '13':
  - type: text
    content: 'Koa izao no lazain’NY TOMPO:'
  - type: text
    content: 'Anontanio any amin’ny '
  - type: text
    content: Jentilisa
  - type: text
    content: ' hoe:'
  - type: text
    content: Iza no nandre zavatra toy izany?
  - type: text
    content: Zavatra mahatsiravina indrindra no nataon’Israely virijiny.
  '14':
  - type: text
    content: Hitsahatra tsy ho eo amin’ny vatolampy any an-tsaha va
  - type: text
    content: ny orampanalan’i Libanona,
  - type: text
    content: ary mety ho ritra va ny rano maria sady mangatsiaka avy amin’ny tany hafa?
  '15':
  - type: text
    content: Fa efa nanadino Ahy ny oloko,
  - type: text
    content: koa ho an’ny sampy no nandoroany ditin-kazo manitra;
  - type: text
    content: ary nahatafintohina azy teo amin’ny lalany ireny,
  - type: text
    content: dia ny lalana efa hatramin’ny fahagola
  - type: text
    content: ka nandehanany amin’ny sakeli-dalana madinika,
  - type: text
    content: dia amin’ny lalana tsy voavoatra.
  '16':
  - type: text
    content: Izany no nahatonga ny taniny ho figagana
  - type: text
    content: sy ho zavatra mampisitrisitra mandrakizay;
  - type: text
    content: izay rehetra mandalo azy dia gaga
  - type: text
    content: sy mihifikifi-doha.
  '17':
  - type: text
    content: Toy ny fampielin’ny rivotra avy any atsinanana no hampielezako azy
  - type: text
    content: eo anoloan’ny fahavalony;
  - type: text
    content: hiamboho azy Aho fa tsy hanatrika azy,
  - type: text
    content: amin’ny andro hahitany loza.
  - type: heading
    content: Ny teti-dratsy hamelezana an’i Jeremia sy ny vavaka nataony tamin’izany
  '18':
  - type: text
    content: 'Hoy ny olona: Andeha isika hihevitra izay hamelezana an’i Jeremia; fa tsy ho tapaka tsy akory ny lalàna avy amin’ny mpisorona, na ny tolo-tsaina avy amin’ny hendry, na ny teny avy amin’ny mpaminany. Aoka hoenti-mamely azy ny lelantsika ary aoka tsy hohenointsika akory izay teniny.'
  '19':
  - type: text
    content: Mihainoa ahy, TOMPO ô;
  - type: text
    content: ary mihainoa ny tenin’izay miady amiko.
  '2':
  - type: text
    content: 'Mitsangàna ka midìna ho any amin’ny tranon’ny mpanefy tanimanga; any no hampandrenesako anao ny teniko. '
  '20':
  - type: text
    content: Ratsy va no havaly ny soa?
  - type: text
    content: Fa efa nihady lavaka hamandrihana ahy ireo.
  - type: text
    content: Tsarovy ny nitsanganako teo anatrehanao
  - type: text
    content: nitaraina ho azy
  - type: text
    content: hampiala ny fahatezeranao aminy.
  '21':
  - type: text
    content: Koa aoka ho mosarena ny zanany,
  - type: text
    content: ary atolory ho amin’ny herin’ny sabatra izy
  - type: text
    content: ka ho foana anaka ny vadiny sady ho tonga mpitondratena;
  - type: text
    content: ary aoka haripaky ny aretina ny lehilahy lehibe ao aminy
  - type: text
    content: ary ho fatin-tsabatra amin’ny ady ny zatovony.
  '22':
  - type: text
    content: Aoka hisy fidradradradrana ho re avy ao an-tranony
  - type: text
    content: rehefa mitondra miaramila iray toko any aminy tampoka Ianao;
  - type: text
    content: fa efa nihady lavaka hamandrihana ahy izy
  - type: text
    content: sady nanafim-pandrika haningorana ny tongotro.
  '23':
  - type: text
    content: Fa Ianao, TOMPO ô, no mahalala
  - type: text
    content: ny fisainana rehetra ataony hamelezany ahy ho faty;
  - type: text
    content: aza avela ny helony;
  - type: text
    content: ary aza vonoina tsy ho eo imasonao ny fahotany,
  - type: text
    content: fa aoka ho solafaka eo anatrehanao izy;
  - type: text
    content: mameleza azy amin’ny andro fahatezeranao.
  '3':
  - type: text
    content: 'Dia nidina tany amin’ny tranon’ny mpanefy tanimanga aho ary indro, teo am-panaovana ny asany teo amin’ny milina fanodinana izy. '
  '4':
  - type: text
    content: 'Ary raha simba ny vilany amboariny, araka izay miseho matetika amin’ny tanimanga eny an-tanan’ny mpanefy, dia ataony vilany hafa indray, araka izay tian’izy mpanefy tanimanga hanaovana azy. '
  '5':
  - type: text
    content: 'Dia tonga tamiko ny tenin’NY TOMPO hoe: '
  '6':
  - type: text
    content: 'Moa tsy afaka manao aminareo toy ny ataon’ity mpanefy tanimanga ity va Aho, ry taranak’Israely? Hoy NY TOMPO. Indro, toy ny tanimanga eo an-tanan’ny mpanefy azy, dia toy izany ianareo eo an-tanako, ry taranak’Israely. '
  '7':
  - type: text
    content: 'Mbetika Aho dia milaza ny amin’ny firenena sy fanjakana iray fa hongotako sy hazerako ary horavako izy; '
  '8':
  - type: text
    content: 'kanefa raha miala amin’ny ratsy izany firenena noteneniko izany dia hanenenako kosa ny loza izay nokasaiko hamelezana azy. '
  '9':
  - type: text
    content: 'Ary mbetika kosa Aho dia milaza ny amin’ny firenena sy fanjakana iray fa haoriko sy hamboleko; '
