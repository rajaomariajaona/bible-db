document_id: EZK.38,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Faminaniana ny amin’i Goga
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tonga tamiko ny tenin’NY TOMPO hoe:'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao no lazain’NY TOMPO Andriamanitra: Amin’izany andro izany dia hisy eritreritra hiditra ao an-tsainao, ary hamorona hevi-dratsy ianao '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ka hiteny hoe: Hiakatra hamely ny tany izay misy tanàna tsy mimanda aho; hankany amin’izay mandry fehizay sy mitoetra tsy manana ahiahy aho, samy monina ao an-tanàna tsy misy manda na hidy na vavahady izy rehetra, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'mba hamabo sy handroba ary hamely indray izay efa rava, saingy vao misy mponina ankehitriny izao, ary ny firenena izay nangonina avy tany amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jentilisa
    - type: text
      text: ' sady nihary omby sy fananana, dia ireo mitoetra ao amin’ny foiben’ny tany. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I Sheba sy i Dedana ary ny mpivaro-mandehan’i Tarsisy rehetra mbamin’ireo lionany tanora rehetra dia hiteny aminao hoe: Tonga hamabo va ianao? Nangoninao handroba va ireto olonao betsaka ireto, hahalasa volafotsy sy volamena, handroba harena sy fananana ary hahazo babo betsaka?'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa maminania, ry zanak’olona, ka lazao amin’i Goga hoe: Izao no lazain’NY TOMPO Andriamanitra: Amin’izany andro hitoeran’ny Israely oloko mandry fehizay izany, moa tsy ho fantatrao va izany? '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ho tonga avy any amin’ny fonenanao avy any amin’ny farany avaratra ianao mbamin’ny firenena maro miaraka aminao, izay samy mitaingin-tsoavaly, dia olona maro be sy miaramila betsaka; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ary hiakatra hamely ny Israely oloko tahaka ny fiakatry ny rahona hanarona ny tany ianao. Any aoriana any no ho tonga izany. Hoentiko hamely ny taniko ianao, mba hahafantaran’ny firenena Ahy, rehefa miseho ho masina eo anatrehany Aho amin’ny ataoko aminao, ry Goga!
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao no lazain’NY TOMPO Andriamanitra: Moa ianao va ilay nampilazaiko ny mpanompoko hatramin’ny fahiny, dia ny mpaminanin’ny Israely, izay naminany ela tamin’izany andro izany ny hampiakarako anao hamely azy? '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Amin’izany andro izany, dia ny andro hiavian’i Goga hamely ny tanin’ny Israely, hoy NY TOMPO Andriamanitra, dia hiefonefona eo am-bavoroko ny fahatezerako. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa amin’ny fahasaro-piaroko sy ny afon’ny fahatezerako no nitenenako hoe: Amin’izany andro izany dia hisy horohoron-tany mafy any amin’ny tanin’ny Israely '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ry '
    - type: usfm
      marker: w
      children:
      - type: text
        text: zanak’olona
    - type: text
      text: ', manandrifia an’i Goga avy any amin’ny tany Magoga, izay mpanjakan’i Rosy sy i Meseka ary i Tobala, ary maminania ny hamelezana azy '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ka hangorohoro eo anatrehako ny hazandrano any an-dranomasina, ny voromanidina, ny bibidia ary ny biby mandady sy mikisaka rehetra izay mandady sy mikisaka amin’ny tany, ary ny olona rehetra ambonin’ny tany; dia hazera ny tendrombohitra, hikoa ny fiakarana mideza, ary hirodana ny ampiantany rehetra. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hiantso sabatra hamely azy eny amin’ny tendrombohitro rehetra Aho, hoy NY TOMPO Andriamanitra. Hifamely sabatra amin’ny namany avy izy rehetra. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hamaly azy amin’ny areti-mandringana, ny ra, ny ranonorana manafotra ary ny havandra vaventy Aho; ary koa, handatsaka afo sy solifara aminy sy amin’ny miaramilany mbamin’ny firenena maro izay miaraka aminy Aho. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia hasehoko ny fahalehibiazako sy ny fahamasinako, ary ho fantatra eo imason’ny firenena maro Aho; dia ho fantany fa Izaho no TOMPO.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ka lazao hoe: Izao no lazain’NY TOMPO Andriamanitra: Indro, avy hamely anao Aho, ry Goga, mpanjakan’i Rosy sy i Meseka ary i Tobala. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hitaritarika anao Aho ka hanisy masom-by ny valanoranonao ary hoentiko mivoaka ianao sy ny tafikao rehetra, dia ny soavaly sy ny mpitaingin-tsoavaly izay samy mitafy marevaka, dia olona marobe mitondra ampinga lehibe sy ampinga kely, ary samy mitan-tsabatra; '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'miaraka aminy ny Persiana, i Kosy ary i Pota, samy mitondra ampinga lehibe sy fiarovan-doha avokoa, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'i Gomera koa mbamin’ny miaramilany rehetra, ny taranak’i Togarma avy any amin’ny farany avaratra mbamin’ny miaramilany rehetra, dia firenena maro izay miaraka aminao. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Miomàna ka mitaova tsara ianao, eny, ianao sy ireo mpomba anao izay efa mivory ao aminao, ary aoka ianao no ho mpiaro azy. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa afaka andro maro dia hantsoina ianao; any aoriana any dia ho tonga any amin’ny tany izay novonjena ka afaka tamin’ny sabatra ianao, dia ny tanin’ny olona izay novoriana avy tany amin’ny firenena maro, any amin’ny tendrombohitry ny Israely izay efa lao hatry ny ela; fa efa navoaka avy tany amin’ny firenena izy ka mandry fehizay izy rehetra. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Eny, hiakatra ianao, ary ho tahaka ny fiavin’ny rivo-doza no hiavianao, ho tahaka ny rahona hanarona ny tany, dia ianao sy ny miaramilanao rehetra mbamin’ny firenena maro izay miaraka aminao.
