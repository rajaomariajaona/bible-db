document_id: LEV.15
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fahalotoana amin’ny fananahan’ny lehilahy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary NY TOMPO niteny tamin’i Mosesy sy i Arona hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Mitenena amin’ny Zanak’Israely hoe: Ny lehilahy rehetra izay marary mitsika dia haloto noho ny fitsihany. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Izao no ho fahalotoany raha marary mitsika izy, na mandeha ny fitsihany na tsy mandeha, dia samy fahalotoana izany. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Maloto ny fandriana rehetra izay andrian’ny marary mitsika ary maloto ny zavatra rehetra izay ipetrahany. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Izay rehetra mikasika ny fandrianany dia hanasa ny fitafiany sy handro amin’ny rano ary haloto mandra-paharivan’ny andro. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Izay mipetraka amin’ny zavatra izay efa nipetrahan’ny marary mitsika dia hanasa ny fitafiany sy handro amin’ny rano ary haloto mandra-paharivan’ny andro. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Izay mikasika ny tenan’ny marary mitsika dia hanasa ny fitafiany sy handro amin’ny rano ary haloto mandra-paharivan’ny andro. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Raha misy olona madio voaroran’ny marary mitsika dia hanasa ny fitafiany izy sady handro amin’ny rano ary haloto mandra-paharivan’ny andro. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Haloto ny lasely rehetra izay nitaingenan’ny marary mitsika. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Izay rehetra mikasika ny zavatra teo ambaniny dia haloto mandra-paharivan’ny andro; ary izay mitondra izany zavatra izany dia hanasa ny fitafiany sy handro amin’ny rano ary haloto mandra-paharivan’ny andro. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Izay rehetra voakasiky ny marary mitsika kanefa ilay marary tsy mbola nanasa ny tanany tamin’ny rano dia hanasa ny fitafiany sy handro amin’ny rano ary haloto mandra-paharivan’ny andro. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Hovakivakina ny vilany tany izay voakasiky ny marary mitsika ary hosasana amin’ny rano kosa ny fanaka hazo rehetra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Rehefa sitrana amin’ny fitsihany ny marary mitsika dia hiandry hafitoana izy ho amin’ny fanadiovana azy ary hanasa ny fitafiany sy handro amin’ny rano mandeha izy dia hadio. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Amin’ny andro fahavalo dia hitondra domohina roa na voromailala roa izy ary hankeo anatrehan’NY TOMPO, eo anoloan’ny varavaran’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tranolay fihaonana
  - type: text
    text: ' ka hatolony amin’ny mpisorona ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Dia haterin’ny mpisorona ireo, ny iray dia hatao fanatitra fanadiovana ary ny iray kosa dia hatao fanatitra dorana manontolo; dia hanao fanavotana ho azy eo anatrehan’NY TOMPO ny mpisorona noho ny fitsihany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Raha miala amin’ny lehilahy ny tsirinainy dia hanasa ny tenany rehetra amin’ny rano izy ary haloto mandra-paharivan’ny andro; '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Hosasana amin’ny rano ny fitafiany rehetra sy ny hoditra rehetra izay nilatsahan’ny tsirinainy; haloto mandra-paharivan’ny andro ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Raha misy lehilahy mandry amin’ny vehivavy koa dia samy handro amin’ny rano izy roa ary haloto mandra-paharivan’ny andro.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fahalotoana amin’ny fananahan’ny vehivavy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Raha misy vehivavy mararin’ny fadimbolany ka mandeha ra tsy mijanona dia haloto hafitoana izy ary izay rehetra mikasika azy dia haloto mandra-paharivan’ny andro. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ny zavatra rehetra izay andriany amin’ny andro fahalotoany koa dia haloto ary ny zavatra rehetra izay ipetrahany dia haloto koa. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Hanasa ny fitafiany sy handro amin’ny rano izay rehetra mikasika ny fandrianany ary haloto mandra-paharivan’ny andro. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Izay rehetra mikasika ny zavatra izay efa nipetrahany koa dia hanasa ny fitafiany sy handro amin’ny rano ary haloto mandra-paharivan’ny andro. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Raha ao amin’ny fandrianany izany na eo amin’izay nipetrahany izay voakasik’izany dia haloto mandra-paharivan’ny andro. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Raha misy lehilahy mandry amin’ny vehivavy ary mankeo aminy ny ra amin’ny fadimbolany dia haloto hafitoana izy ary izay rehetra andriany dia haloto koa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Raha misy vehivavy marary mitsi-dra ela, ankoatra ny andro fahalotoany amin’ny fadimbolany, na raha misy mararin’ny fadimbolana ka mandeha ra mihoatra noho ny fiaviny mahazatra dia haloto izy amin’ny andron’ny faharariany rehetra, tahaka ny amin’ny andro fahalotoany ihany. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Izay fandriana andriany mandritra ny andron’ny fahalotoany rehetra dia hataony tahaka ny fandriana maloto noho ny fadimbolany ary izay rehetra ipetrahany koa dia haloto tahaka ny fahalotoany amin’ny fadimbolany. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Izay rehetra mikasika izany zavatra izany dia haloto ary hanasa ny fitafiany sy handro amin’ny rano izy sady haloto mandra-paharivan’ny andro. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Rehefa sitrana amin’ny faharariany Ravehivavy dia hiandry hafitoana izy ka rehefa afaka izany vao hadio izy. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Amin’ny andro fahavalo dia haka domohina roa na voromailala roa izy ka hitondra ireo ho eo amin’ny mpisorona, eo anoloan’ny varavaran’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tranolay fihaonana
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Dia haterin’ny mpisorona ny iray hatao fanatitra fanadiovana ary ny iray hatao fanatitra dorana manontolo; dia hanao fanavotana ho an’i Ravehivavy eo anatrehan’NY TOMPO ny mpisorona noho ny faharariany izay nahaloto azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Koa hosarahinareo amin’ny fahalotoany ny Zanak’Israely mba tsy handotoany ny tabernakeliko izay eo anivony, koa tsy hahafaty azy ny fahalotoany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Izany no lalàna ny amin’ny marary mitsika sy ny amin’izay ialan’ny tsirinainy ka voaloto amin’izany, '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ny amin’ny mararin’ny fadimbolany, ny amin’ny marary mitsika, na lehilahy na vehivavy, ary ny amin’izay mandry amin’ny vehivavy maloto.
