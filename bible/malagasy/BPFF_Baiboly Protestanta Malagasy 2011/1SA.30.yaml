document_id: 1SA.30
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Rava i Ziklaga; manenjika ny Amalekita i Davida
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Nony tonga teo Ziklaga i Davida sy ny olony tamin’ny andro fahatelo dia indro, fa efa nanafika tany Negeva sy Ziklaga ny Amalekita ka namely an’i Ziklaga sy nandoro azy tamin’ny afo. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Namabo ny vehivavy sy izay rehetra tao izy ireo, na lehibe na kely, nefa tsy nisy novonoiny ireo na dia iray aza fa noentiny rehefa nanohy ny diany izy. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Nony tonga tao amin’ny tanàna i Davida sy ny olony dia indro, efa levon’ny afo ny tanàna; ary ny vadiny mbamin’ny zanany lahy sy ny zanany vavy dia lasan-ko babo. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dia nanandra-peo nitomany i Davida sy ny mpanaraka azy mandra-pahalany ritra ny ranomasony. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Voababo koa izy roa vavy vadin’i Davida, dia i Ahinoama jezirelita sy Abigaila, ilay novadin’i Nabala karmelita.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia ory indrindra i Davida, fa ny olona dia nifampitaona hitora-bato azy satria samy nalahelo ny zanany lahy sy ny zanany vavy ny olona rehetra; fa i Davida kosa dia nampahery ny tenany tamin’NY TOMPO Andriamaniny. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary hoy i Davida tamin’i Abiatara mpisorona, zanak’i Ahimeleka: Miangavy anao aho, ento etỳ amiko ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: efoda
  - type: text
    text: '. Dia noentin’i Abiatara teo amin’i Davida ny efoda. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dia nanontany tamin’NY TOMPO i Davida hoe: Henjehiko va izany jirika izany? Ho tratrako va izy? Dia namaly azy NY TOMPO hoe: Enjeho izy fa ho tratranao tokoa ary ho afakao tokoa ireo babo. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Dia lasa i Davida sy ny eninjato lahy izay nanaraka azy ka tonga teo amin’ny lohasahan-driaka Besora ary teo no nijanonan’ny sasany. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: I Davida sy ny efajato lahy no nanenjika; fa ny roanjato lahy kosa izay reraka ka tsy afaka nita ny lohasahan-driaka Besora dia nijanona tany aoriana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Nahita lehilahy ejiptiana iray teny an-tsaha ny olona ka noentiny tany amin’i Davida. Dia nomeny hanina Ralehilahy ka nihinana sady nampisotroiny rano koa. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Nomeny mofo aviavy didiny iray sy mofo voaloboka maina koa izy; ary rehefa nihinana izy dia nody indray ny ainy, satria efa telo andro sy telo alina izy tsy nihinan-kanina na nisotro rano. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary hoy i Davida taminy: An’iza moa ianao, ary avy taiza? Ary hoy izy: Zatovo ejiptiana, mpanompon’ny Amalekita iray, aho; ary narian’ny tompoko aho afaka omaly satria narary. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Izahay mantsy nanafika ny tany atsimo izay an’ny Keretita sy ny faritanin’ny Joda ary ny tany atsimo izay an’i Kaleba sady nandoro an’i Ziklaga tamin’ny afo. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Hoy i Davida taminy: Hitondra ahy midina ho amin’izany jirika izany va ianao? Ary hoy izy: Mianiàna amiko amin’Andriamanitra ianao fa tsy hamono ahy na hanolotra ahy ho eo an-tanan’ny tompoko, dia hitondra anao midina ho amin’izany jirika izany aho.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Resin’i Davida ny Amalekita
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Nony noentiny nidina izy, indreo, miely manerana ny tany ny Amalekita ka homana sy misotro ary milanona noho ny haben’ny babo rehetra izay azony tamin’ny tanin’ny Filistina sy ny tanin’ny Joda. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary namely azy tamin’iny takariva iny ka hatramin’ny ampitso hariva i Davida; tsy nisy olona afaka, afa-tsy zatovo efajato lahy izay nitaingina rameva ka lasa nandositra. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Dia azon’i Davida izay rehetra efa nobaboin’ny Amalekita; azon’i Davida koa ny vadiny roa. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Tsy nisy zavatra tsy azony, na kely na lehibe, na zazalahy na zazavavy, na inona na inona tamin’izay nobaboin’ireny; izany rehetra izany dia azon’i Davida avokoa. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary naka ny ondry aman’osy sy ny omby rehetra i Davida. Ireo izay nandeha teo aloha dia nitarika ireo biby kosa dia niantsoantso hoe: Itony ny babon’i Davida!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Nony tonga teo amin’ny roanjato lahy izay reraka ka tsy afaka nanaraka azy ary navela teo amin’ny lohasahan-driaka Besora i Davida dia nandeha nitsena an’i Davida sy ny olona nanaraka azy izy ireo. Rehefa tonga teo akaikin’ny olona i Davida dia nanontany azy ireo izay fahasalamany. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Dia niteny ireo olona sompatra sy tena ratsy fanahy rehetra izay isan’ireo nanaraka an’i Davida hoe: Satria tsy mba niaraka tamintsika ireo dia tsy hanomezantsika azy ny babo izay azontsika, afa-tsy ny vadiny aman-janany avy ihany; ireo no aoka hoentiny dia aoka handeha izy. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Fa hoy i Davida: Aza manao izany amin’izay nomen’NY TOMPO antsika, ry rahalahy; fa niaro antsika Izy ary natolony teo an-tanantsika ny jirika izay tonga namely antsika. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Koa iza no hanaiky anareo amin’izany? Fa tahaka ny anjaran’izay nidina hiady ihany no ho anjaran’izay nitoetra tamin’ny entana: Hifampizara izany izy rehetra.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Dia izany no fanao hatramin’io andro io ka natao didy sy lalàna tamin’ny Israely ambaraka androany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Nony tonga tao Ziklaga i Davida, dia mba nanaterany ho an’ireo loholon’ny Joda sakaizany koa ny babo sady hoy izy: Inty ny saotra ho anareo avy amin’ny babo azo tamin’ny fahavalon’NY TOMPO.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Ho an’izay ao Betela
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy izay any Ramata amin’ny tany Negeva,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho an’izay ao Jatira
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: sy ho an’izay ao Aroera,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho an’izay ao Sifmota,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho an’izay ao Estemoa,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ho an’izay ao Rakala,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho an’izay any an-tanànan’ny Jeramelita,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho an’izay any an-tanànan’ny Kenita,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ho an’izay ao Horma,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho an’izay ao Borasana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho an’izay ao Ataka,
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ho an’izay ao Hebrona ary ho an’izay any amin’ny tany rehetra nandehandehanan’i Davida sy ny olony.
