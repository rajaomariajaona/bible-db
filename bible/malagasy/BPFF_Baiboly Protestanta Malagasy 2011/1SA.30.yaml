document_id: 1SA.30,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Rava i Ziklaga; manenjika ny Amalekita i Davida
  - type: text
    content: 'Nony tonga teo Ziklaga i Davida sy ny olony tamin’ny andro fahatelo dia indro, fa efa nanafika tany Negeva sy Ziklaga ny Amalekita ka namely an’i Ziklaga sy nandoro azy tamin’ny afo. '
  '10':
  - type: text
    content: I Davida sy ny efajato lahy no nanenjika; fa ny roanjato lahy kosa izay reraka ka tsy afaka nita ny lohasahan-driaka Besora dia nijanona tany aoriana.
  '11':
  - type: text
    content: 'Nahita lehilahy ejiptiana iray teny an-tsaha ny olona ka noentiny tany amin’i Davida. Dia nomeny hanina Ralehilahy ka nihinana sady nampisotroiny rano koa. '
  '12':
  - type: text
    content: 'Nomeny mofo aviavy didiny iray sy mofo voaloboka maina koa izy; ary rehefa nihinana izy dia nody indray ny ainy, satria efa telo andro sy telo alina izy tsy nihinan-kanina na nisotro rano. '
  '13':
  - type: text
    content: 'Ary hoy i Davida taminy: An’iza moa ianao, ary avy taiza? Ary hoy izy: Zatovo ejiptiana, mpanompon’ny Amalekita iray, aho; ary narian’ny tompoko aho afaka omaly satria narary. '
  '14':
  - type: text
    content: 'Izahay mantsy nanafika ny tany atsimo izay an’ny Keretita sy ny faritanin’ny Joda ary ny tany atsimo izay an’i Kaleba sady nandoro an’i Ziklaga tamin’ny afo. '
  '15':
  - type: text
    content: 'Hoy i Davida taminy: Hitondra ahy midina ho amin’izany jirika izany va ianao? Ary hoy izy: Mianiàna amiko amin’Andriamanitra ianao fa tsy hamono ahy na hanolotra ahy ho eo an-tanan’ny tompoko, dia hitondra anao midina ho amin’izany jirika izany aho.'
  - type: heading
    content: Resin’i Davida ny Amalekita
  '16':
  - type: text
    content: 'Nony noentiny nidina izy, indreo, miely manerana ny tany ny Amalekita ka homana sy misotro ary milanona noho ny haben’ny babo rehetra izay azony tamin’ny tanin’ny Filistina sy ny tanin’ny Joda. '
  '17':
  - type: text
    content: 'Ary namely azy tamin’iny takariva iny ka hatramin’ny ampitso hariva i Davida; tsy nisy olona afaka, afa-tsy zatovo efajato lahy izay nitaingina rameva ka lasa nandositra. '
  '18':
  - type: text
    content: 'Dia azon’i Davida izay rehetra efa nobaboin’ny Amalekita; azon’i Davida koa ny vadiny roa. '
  '19':
  - type: text
    content: 'Tsy nisy zavatra tsy azony, na kely na lehibe, na zazalahy na zazavavy, na inona na inona tamin’izay nobaboin’ireny; izany rehetra izany dia azon’i Davida avokoa. '
  '2':
  - type: text
    content: 'Namabo ny vehivavy sy izay rehetra tao izy ireo, na lehibe na kely, nefa tsy nisy novonoiny ireo na dia iray aza fa noentiny rehefa nanohy ny diany izy. '
  '20':
  - type: text
    content: 'Ary naka ny ondry aman’osy sy ny omby rehetra i Davida. Ireo izay nandeha teo aloha dia nitarika ireo biby kosa dia niantsoantso hoe: Itony ny babon’i Davida!'
  '21':
  - type: text
    content: 'Nony tonga teo amin’ny roanjato lahy izay reraka ka tsy afaka nanaraka azy ary navela teo amin’ny lohasahan-driaka Besora i Davida dia nandeha nitsena an’i Davida sy ny olona nanaraka azy izy ireo. Rehefa tonga teo akaikin’ny olona i Davida dia nanontany azy ireo izay fahasalamany. '
  '22':
  - type: text
    content: 'Dia niteny ireo olona sompatra sy tena ratsy fanahy rehetra izay isan’ireo nanaraka an’i Davida hoe: Satria tsy mba niaraka tamintsika ireo dia tsy hanomezantsika azy ny babo izay azontsika, afa-tsy ny vadiny aman-janany avy ihany; ireo no aoka hoentiny dia aoka handeha izy. '
  '23':
  - type: text
    content: 'Fa hoy i Davida: Aza manao izany amin’izay nomen’NY TOMPO antsika, ry rahalahy; fa niaro antsika Izy ary natolony teo an-tanantsika ny jirika izay tonga namely antsika. '
  '24':
  - type: text
    content: 'Koa iza no hanaiky anareo amin’izany? Fa tahaka ny anjaran’izay nidina hiady ihany no ho anjaran’izay nitoetra tamin’ny entana: Hifampizara izany izy rehetra.'
  '25':
  - type: text
    content: Dia izany no fanao hatramin’io andro io ka natao didy sy lalàna tamin’ny Israely ambaraka androany.
  '26':
  - type: text
    content: 'Nony tonga tao Ziklaga i Davida, dia mba nanaterany ho an’ireo loholon’ny Joda sakaizany koa ny babo sady hoy izy: Inty ny saotra ho anareo avy amin’ny babo azo tamin’ny fahavalon’NY TOMPO.'
  '27':
  - type: text
    content: Ho an’izay ao Betela
  - type: text
    content: sy izay any Ramata amin’ny tany Negeva,
  - type: text
    content: ho an’izay ao Jatira
  '28':
  - type: text
    content: sy ho an’izay ao Aroera,
  - type: text
    content: ho an’izay ao Sifmota,
  - type: text
    content: ho an’izay ao Estemoa,
  '29':
  - type: text
    content: ho an’izay ao Rakala,
  - type: text
    content: ho an’izay any an-tanànan’ny Jeramelita,
  - type: text
    content: ho an’izay any an-tanànan’ny Kenita,
  '3':
  - type: text
    content: 'Nony tonga tao amin’ny tanàna i Davida sy ny olony dia indro, efa levon’ny afo ny tanàna; ary ny vadiny mbamin’ny zanany lahy sy ny zanany vavy dia lasan-ko babo. '
  '30':
  - type: text
    content: ho an’izay ao Horma,
  - type: text
    content: ho an’izay ao Borasana,
  - type: text
    content: ho an’izay ao Ataka,
  '31':
  - type: text
    content: ho an’izay ao Hebrona ary ho an’izay any amin’ny tany rehetra nandehandehanan’i Davida sy ny olony.
  '4':
  - type: text
    content: 'Dia nanandra-peo nitomany i Davida sy ny mpanaraka azy mandra-pahalany ritra ny ranomasony. '
  '5':
  - type: text
    content: Voababo koa izy roa vavy vadin’i Davida, dia i Ahinoama jezirelita sy Abigaila, ilay novadin’i Nabala karmelita.
  '6':
  - type: text
    content: 'Dia ory indrindra i Davida, fa ny olona dia nifampitaona hitora-bato azy satria samy nalahelo ny zanany lahy sy ny zanany vavy ny olona rehetra; fa i Davida kosa dia nampahery ny tenany tamin’NY TOMPO Andriamaniny. '
  '7':
  - type: text
    content: 'Ary hoy i Davida tamin’i Abiatara mpisorona, zanak’i Ahimeleka: Miangavy anao aho, ento etỳ amiko ny '
  - type: text
    content: efoda
  - type: text
    content: '. Dia noentin’i Abiatara teo amin’i Davida ny efoda. '
  '8':
  - type: text
    content: 'Dia nanontany tamin’NY TOMPO i Davida hoe: Henjehiko va izany jirika izany? Ho tratrako va izy? Dia namaly azy NY TOMPO hoe: Enjeho izy fa ho tratranao tokoa ary ho afakao tokoa ireo babo. '
  '9':
  - type: text
    content: 'Dia lasa i Davida sy ny eninjato lahy izay nanaraka azy ka tonga teo amin’ny lohasahan-driaka Besora ary teo no nijanonan’ny sasany. '
