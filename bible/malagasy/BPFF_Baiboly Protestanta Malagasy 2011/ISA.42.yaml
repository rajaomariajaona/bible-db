document_id: ISA.42
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ilay Mpanompon’NY TOMPO
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Indro ny Mpanompoko izay tantanako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia Ilay voafidiko sady ankasitrahiko.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Napetrako tao aminy ny Fanahiko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'hanao fitsarana marina ho an’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jentilisa
  - type: text
    text: ' Izy.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Tsy hiantsoantso Izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: na hanandratra ny feony,
- type: usfm
  marker: q1
  children:
  - type: text
    text: na hanao izay handrenesana ny feony eny an-dalana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Tsy hotapahiny ny volotara torotoro,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy hovonoiny ny lahin-jiro manetona;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hanao fitsarana marina tokoa Izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Tsy ho reraka Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: na ho kivy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mandra-panoriny ny rariny amin’ny tany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny nosy dia hiandry ny lalànany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Izao no lazain’NY TOMPO Andriamanitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay nahary ny lanitra sy nanenjana azy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay namelatra ny tany sy ny vokatra avy aminy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay manome fofonaina ny mponina ao aminy
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'sy fanahy ho an’izay mandeha eo aminy:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Izaho TOMPO no niantso anao tamin’ny fahamarinana
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy mihazona anao amin’ny tananao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary miaro anao Aho ka hanao anao ho fanekena ho an’ny olona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho fanazavana ny Jentilisa,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: hampahiratra ny mason’ny jamba,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hamoaka ny voafonja hiala ao an-tranomaizina
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary izay mipetraka ao amin’ny maizina hiala tao amin’ny trano famatorana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Izaho no TOMPO, izany no anarako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: koa ny voninahitro dia tsy homeko ny hafa,
- type: usfm
  marker: q1
  children:
  - type: text
    text: na ny fiderana Ahy ho an’ny sarin-javatra voasokitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ny zavatra taloha dia indreo, efa miseho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary zava-baovao kosa no toriko izao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: na dia tsy mbola miposaka aza ireny
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ambarako aminareo.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Miditra an-tsehatra NY TOMPO
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Samia mihira fihiram-baovao ho an’NY TOMPO,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ny fiderana Azy avy any amin’ny faran’ny tany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ianareo izay midina any amin’ny ranomasina
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny ao aminy rehetra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ianareo nosy sy ny mponina ao aminy!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Aoka ny tany efitra sy ireo tanàna eny aminy hanandratra ny feony,
- type: usfm
  marker: q1
  children:
  - type: text
    text: toa izany koa ny vohitra izay onenan’i Kedara!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aoka hihoby ny mponina any Sela!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aoka hanao feo avo any an-tampon’ny tendrombohitra izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Aoka homena voninahitra NY TOMPO
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hotorina any amin’ny nosy ny fiderana Azy!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Mivoaka hiady tahaka ny lehilahy mahery NY TOMPO,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tahaka ny fanaon’ny lehilahy mpiady no amohazany ny fahasaro-piarony;
- type: usfm
  marker: q1
  children:
  - type: text
    text: miantsoantso Izy; eny, mihiaka mafy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mampiseho hery handreseny ny fahavalony Izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Efa tsy niteny Aho hatrizay hatrizay,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nangina ihany Aho ka nanindry fo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa izao Aho dia mitaraina tahaka ny vehivavy raha miteraka;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, miemponempona tsy avy miaina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Hataoko ngazana ny tendrombohitra sy ny havoana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hataoko maina ny ahitra rehetra eo aminy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hataoko tonga nosy ny ony,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hataoko tankina ny farihy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Hitarika ny jamba
- type: usfm
  marker: q1
  children:
  - type: text
    text: amin’izay lalana tsy fantany Aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: amin’ny lalana tsy fantany no hitondrako azy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hataoko mazava eo anoloany ny maizina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hataoko tany marina tsara ny mikitoantoana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: izany zavatra izany dia hataoko aminy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy hilaozako izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Hihemotra sady hitsanga-menatra tokoa
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay matoky ny sarin-javatra voasokitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'dia izay miteny amin’ny sarin-javatra voarendrika hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ianareo no andriamanitray!
- type: usfm
  marker: s1
  children:
  - type: text
    text: Vahoaka tsy mety mihaino
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Mihainoa ry marenina!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mijere ry jamba mba hahita!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Iza moa no jamba, afa-tsy ny mpanompoko?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Iza no marenina tahaka ny iraka izay irahiko?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Iza no jamba tahak’ilay nahita fiadanana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary jamba tahaka ny mpanompon’NY TOMPO?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Mahita zavatra maro ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa tsy mitandrina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: misy nanongilana ny sofiny
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa tsy nihaino.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Sitraky NY TOMPO noho ny fahamarinany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny hahalehibe ny lalàna sy ny hahabe voninahitra azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Kanefa ity dia firenena voababo sy voaroba!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Voafandrika ao an-davaka avokoa izy rehetra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary voafina ao an-tranomaizina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: voababo izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa tsy misy mamonjy!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Voasambotra izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'nefa tsy misy miteny hoe: Ampodio!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Iza aminareo no hihaino izany?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Iza no handre dia hitandrina izany amin’ny ho avy?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Iza no nanolotra an’i Jakoba hosamborina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary Israely ho an’ny mpamabo?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy NY TOMPO,
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay nanotantsika va?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Satria tsy nety nandeha tamin’ny lalany ireo
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady tsy nety nihaino ny lalànany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Dia narotsany tamin’Israely
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny firehitry ny fahatezerany
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny halozan’ny ady.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary nampirehitra azy manodidina izany
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa tsy fantany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary nandoro azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa tsy noheverin’ny fony.
