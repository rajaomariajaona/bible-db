document_id: ISA.42,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ilay Mpanompon’NY TOMPO
  - type: text
    content: Indro ny Mpanompoko izay tantanako,
  - type: text
    content: dia Ilay voafidiko sady ankasitrahiko.
  - type: text
    content: Napetrako tao aminy ny Fanahiko;
  - type: text
    content: 'hanao fitsarana marina ho an’ny '
  - type: text
    content: Jentilisa
  - type: text
    content: ' Izy.'
  '10':
  - type: text
    content: Samia mihira fihiram-baovao ho an’NY TOMPO,
  - type: text
    content: dia ny fiderana Azy avy any amin’ny faran’ny tany,
  - type: text
    content: ianareo izay midina any amin’ny ranomasina
  - type: text
    content: sy ny ao aminy rehetra,
  - type: text
    content: dia ianareo nosy sy ny mponina ao aminy!
  '11':
  - type: text
    content: Aoka ny tany efitra sy ireo tanàna eny aminy hanandratra ny feony,
  - type: text
    content: toa izany koa ny vohitra izay onenan’i Kedara!
  - type: text
    content: Aoka hihoby ny mponina any Sela!
  - type: text
    content: Aoka hanao feo avo any an-tampon’ny tendrombohitra izy.
  '12':
  - type: text
    content: Aoka homena voninahitra NY TOMPO
  - type: text
    content: ary hotorina any amin’ny nosy ny fiderana Azy!
  '13':
  - type: text
    content: Mivoaka hiady tahaka ny lehilahy mahery NY TOMPO,
  - type: text
    content: tahaka ny fanaon’ny lehilahy mpiady no amohazany ny fahasaro-piarony;
  - type: text
    content: miantsoantso Izy; eny, mihiaka mafy;
  - type: text
    content: mampiseho hery handreseny ny fahavalony Izy.
  '14':
  - type: text
    content: Efa tsy niteny Aho hatrizay hatrizay,
  - type: text
    content: nangina ihany Aho ka nanindry fo;
  - type: text
    content: fa izao Aho dia mitaraina tahaka ny vehivavy raha miteraka;
  - type: text
    content: eny, miemponempona tsy avy miaina.
  '15':
  - type: text
    content: Hataoko ngazana ny tendrombohitra sy ny havoana,
  - type: text
    content: hataoko maina ny ahitra rehetra eo aminy,
  - type: text
    content: hataoko tonga nosy ny ony,
  - type: text
    content: ary hataoko tankina ny farihy.
  '16':
  - type: text
    content: Hitarika ny jamba
  - type: text
    content: amin’izay lalana tsy fantany Aho;
  - type: text
    content: amin’ny lalana tsy fantany no hitondrako azy.
  - type: text
    content: Hataoko mazava eo anoloany ny maizina,
  - type: text
    content: ary hataoko tany marina tsara ny mikitoantoana;
  - type: text
    content: izany zavatra izany dia hataoko aminy
  - type: text
    content: ka tsy hilaozako izy.
  '17':
  - type: text
    content: Hihemotra sady hitsanga-menatra tokoa
  - type: text
    content: izay matoky ny sarin-javatra voasokitra,
  - type: text
    content: 'dia izay miteny amin’ny sarin-javatra voarendrika hoe:'
  - type: text
    content: Ianareo no andriamanitray!
  - type: heading
    content: Vahoaka tsy mety mihaino
  '18':
  - type: text
    content: Mihainoa ry marenina!
  - type: text
    content: Mijere ry jamba mba hahita!
  '19':
  - type: text
    content: Iza moa no jamba, afa-tsy ny mpanompoko?
  - type: text
    content: Iza no marenina tahaka ny iraka izay irahiko?
  - type: text
    content: Iza no jamba tahak’ilay nahita fiadanana,
  - type: text
    content: ary jamba tahaka ny mpanompon’NY TOMPO?
  '2':
  - type: text
    content: Tsy hiantsoantso Izy,
  - type: text
    content: na hanandratra ny feony,
  - type: text
    content: na hanao izay handrenesana ny feony eny an-dalana.
  '20':
  - type: text
    content: Mahita zavatra maro ianao
  - type: text
    content: nefa tsy mitandrina;
  - type: text
    content: misy nanongilana ny sofiny
  - type: text
    content: nefa tsy nihaino.
  '21':
  - type: text
    content: Sitraky NY TOMPO noho ny fahamarinany
  - type: text
    content: ny hahalehibe ny lalàna sy ny hahabe voninahitra azy.
  '22':
  - type: text
    content: Kanefa ity dia firenena voababo sy voaroba!
  - type: text
    content: Voafandrika ao an-davaka avokoa izy rehetra
  - type: text
    content: ary voafina ao an-tranomaizina;
  - type: text
    content: voababo izy
  - type: text
    content: nefa tsy misy mamonjy!
  - type: text
    content: Voasambotra izy
  - type: text
    content: 'nefa tsy misy miteny hoe: Ampodio!'
  '23':
  - type: text
    content: Iza aminareo no hihaino izany?
  - type: text
    content: Iza no handre dia hitandrina izany amin’ny ho avy?
  '24':
  - type: text
    content: Iza no nanolotra an’i Jakoba hosamborina,
  - type: text
    content: ary Israely ho an’ny mpamabo?
  - type: text
    content: Tsy NY TOMPO,
  - type: text
    content: izay nanotantsika va?
  - type: text
    content: Satria tsy nety nandeha tamin’ny lalany ireo
  - type: text
    content: sady tsy nety nihaino ny lalànany.
  '25':
  - type: text
    content: Dia narotsany tamin’Israely
  - type: text
    content: ny firehitry ny fahatezerany
  - type: text
    content: sy ny halozan’ny ady.
  - type: text
    content: Ary nampirehitra azy manodidina izany
  - type: text
    content: nefa tsy fantany;
  - type: text
    content: ary nandoro azy
  - type: text
    content: nefa tsy noheverin’ny fony.
  '3':
  - type: text
    content: Tsy hotapahiny ny volotara torotoro,
  - type: text
    content: ary tsy hovonoiny ny lahin-jiro manetona;
  - type: text
    content: hanao fitsarana marina tokoa Izy.
  '4':
  - type: text
    content: Tsy ho reraka Izy
  - type: text
    content: na ho kivy,
  - type: text
    content: mandra-panoriny ny rariny amin’ny tany;
  - type: text
    content: ary ny nosy dia hiandry ny lalànany.
  '5':
  - type: text
    content: Izao no lazain’NY TOMPO Andriamanitra,
  - type: text
    content: izay nahary ny lanitra sy nanenjana azy,
  - type: text
    content: izay namelatra ny tany sy ny vokatra avy aminy,
  - type: text
    content: izay manome fofonaina ny mponina ao aminy
  - type: text
    content: 'sy fanahy ho an’izay mandeha eo aminy:'
  '6':
  - type: text
    content: Izaho TOMPO no niantso anao tamin’ny fahamarinana
  - type: text
    content: sy mihazona anao amin’ny tananao,
  - type: text
    content: ary miaro anao Aho ka hanao anao ho fanekena ho an’ny olona,
  - type: text
    content: ho fanazavana ny Jentilisa,
  '7':
  - type: text
    content: hampahiratra ny mason’ny jamba,
  - type: text
    content: hamoaka ny voafonja hiala ao an-tranomaizina
  - type: text
    content: ary izay mipetraka ao amin’ny maizina hiala tao amin’ny trano famatorana.
  '8':
  - type: text
    content: Izaho no TOMPO, izany no anarako,
  - type: text
    content: koa ny voninahitro dia tsy homeko ny hafa,
  - type: text
    content: na ny fiderana Ahy ho an’ny sarin-javatra voasokitra.
  '9':
  - type: text
    content: Ny zavatra taloha dia indreo, efa miseho;
  - type: text
    content: ary zava-baovao kosa no toriko izao;
  - type: text
    content: na dia tsy mbola miposaka aza ireny
  - type: text
    content: dia ambarako aminareo.
  - type: heading
    content: Miditra an-tsehatra NY TOMPO
