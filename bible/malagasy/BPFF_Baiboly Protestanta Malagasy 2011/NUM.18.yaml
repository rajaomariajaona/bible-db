document_id: NUM.18,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny raharahan’ny mpisorona sy ny levita
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy NY TOMPO tamin’i Arona: Ianao sy ireo zanakao ary ny taranaky ny rainao miaraka aminao no hitondra ny heloky ny fitoerana masina; ary ianao sy ireo zanakao miaraka aminao no hitondra ny heloky ny fisoronanareo. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Amin’ireo zavatra masina indrindra no hihinananareo; ny lehilahy rehetra no mahazo mihinana azy; ho masina ho anao izany.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao koa no anjaranao: Ny anjara nalaina avy tamin’ny zavatra nomeny ho fanatitra dia ny fanatitra asandratra rehetra izay atolotry ny Zanak’Israely; efa nomeko ho anao sy ny zanakao lahy ary ny zanakao vavy koa izany ho lalàna maharitra. Izay rehetra madio amin’ny ankohonanao no mahazo mihinana izany. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izay rehetra tsara indrindra amin’ny diloilo sy ny ranom-boaloboka ary ny vary, dia ny voaloham-bokatra aminy, izay atolony ho an’NY TOMPO, dia efa nomeko anao koa. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny voaloham-bokatra rehetra eo amin’ny taniny, izay hatolony ho an’NY TOMPO, dia ho anao. Izay rehetra madio amin’ny ankohonanao no mahazo mihinana aminy. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny zavatra voaozona rehetra ao amin’ny Israely dia ho anao. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny voalohan-teraka rehetra, izay atolony ho an’NY TOMPO, na olona izany na biby, dia ho anao avokoa. Kanefa tsy maintsy havotanao ny voalohan-teraky ny olona, ary havotanao ny voalohan-teraky ny biby maloto. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny amin’ny fanavotana azy, dia izay efa iray volana no havotanao, araka izay anombanana azy, dia sekela dimy na gera roapolo, araka ny sekela masina. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ny voalohan-teraky ny omby na ny voalohan-teraky ny ondry na ny voalohan-teraky ny osy kosa dia tsy mba havotanao, fa masina ireny. Ny rany dia hafafinao amin’ny alitara ary ny jaborany dia hodoranao ho fofona, ho fanatitra levonina amin’ny afo, ho hanitra ankasitrahana ho an’NY TOMPO. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia ho anao ny henany, ho anao tahaka ny tratrany nasandratra sy tahaka ny feny havanana. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny fanatitra rehetra izay alaina avy amin’ny zava-masina atolotry ny Zanak’Israely ho an’NY TOMPO dia efa nomeko anao miaraka amin’ireo zanakao lahy sy ireo zanakao vavy ho anjarany; lalàna maharitra izany, dia fanekena mandrakizay asian-tsira eo anatrehan’NY TOMPO, ho anao sy ireo zanakao miaraka aminao.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ireo rahalahinao avy amin’ny fokon’i Levy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.2 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Levy: Izay nakambana.'
      marker-yv: yv-n
    - type: text
      text: ' izay fokon’ny razanao koa dia ento miaraka aminao mba hikambana aminao izy ireo ka hanompo anao; fa ianao sy ireo zanakao no ho eo anoloan’ny tranolain’ny Vavolombelona. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy NY TOMPO tamin’i Arona: Tsy mba hanana lova eo amin’ny tanin’ireo ianao sady tsy mba hanana anjara eo aminy; Izaho no anjaranao sy lovanao eo anivon’ny Zanak’Israely.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fiveloman’ny levita
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Indro, efa nomeko ny taranak’i Levy ho fananany ny fahafolonkarena rehetra amin’ny Israely noho ny fanompoana izay ataony, dia ny fanompoana ny amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: tranolay fihaonana
    - type: text
      text: '. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsy mahazo manakaiky ny tranolay fihaonana intsony ny Zanak’Israely, fandrao meloka izy ka maty. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: levita
    - type: text
      text: ' ihany no hanao ny fanompoana momba ny tranolay fihaonana ary izy ireo no hitondra ny helony; ho lalàna maharitra amin’ny taranakareo hatramin’ny taranaka fara aman-dimby izany, fa tsy hanan-tany ho lova eo amin’ny Zanak’Israely izy. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ny fahafolonkarenan’ny Zanak’Israely, izay atolony ho fanomezana ho an’NY TOMPO, dia efa nomeko ho an’ny taranak’i Levy ho fananany; izany no nilazako taminy hoe: Tsy hanana lova eo amin’ny Zanak’Israely izy.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary NY TOMPO niteny tamin’i Mosesy hoe: '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mitenena indray amin’ny levita hoe: Rehefa raisinareo avy amin’ny Zanak’Israely io fahafolonkarena io, izay efa nomeko ho fanananareo avy aminy, dia hanalanareo indray ny ampahafolon’izany ho fanomezana ho an’NY TOMPO. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary izany fanomezana izany dia hisaina ho anareo toy ny fanomezana nalaina avy amin’ny vary avy eo am-pamoloana sy ny divay avy eo amin’ny famiazana. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Toy izany koa no hanokananareo fanomezana ho an’NY TOMPO avy amin’ny fahafolonkarenanareo rehetra, izay horaisinareo avy amin’ny Zanak’Israely; avy amin’izany no hanateranareo ho an’NY TOMPO, dia ho an’i Arona mpisorona. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Avy amin’ny zavatra rehetra omena anareo no hanokananareo ny fanomezana rehetra ho an’NY TOMPO, avy amin’izay rehetra tsara indrindra ka natokana avy aminy. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hitandrina ny anjara raharahanao sy ny anjara raharaha rehetra momba ny tranolay izy ireo; kanefa ny fanaky ny fitoerana masina sy ny alitara dia tsy mba hakaikeziny, fandrao ho faty izy ireo sy ny tenanareo koa. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary lazao aminy hoe: Rehefa maka ny tsara indrindra avy amin’izany ianareo dia hisaina ho an’ny levita toy ny vokatra avy eo am-pamoloana sy avy eo amin’ny famiazana izany. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia mahazo mihinana izany na aiza na aiza ianareo sy ny ankohonanareo; fa karamanareo izany, anjara noho ny fanompoanareo ao amin’ny tranolay fihaonana. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tsy hahazoanareo heloka ireny raha maka ny tsara indrindra avy aminy ianareo; ary tsy mandoto ny zava-masina aterin’ny Zanak’Israely ianareo ka tsy ho faty.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hikambana aminao izy ireo ka hitandrina ny anjara raharaha momba ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: tranolay fihaonana
    - type: text
      text: ', dia ny fanompoana rehetra momba ny tranolay. Tsy hisy olon-kafa hanakaiky anareo. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hotandremanareo ny anjara raharaha momba ny fitoerana masina sy ny anjara raharaha momba ny alitara mba tsy hisy fahatezerana hahazo ny Zanak’Israely intsony. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary indro Aho efa naka ireo '
    - type: usfm
      marker: w
      children:
      - type: text
        text: levita
    - type: text
      text: ' rahalahinareo avy tamin’ny Zanak’Israely; omena anareo izy ireo ho fanomezana ho an’NY TOMPO mba hanao ny fanompoana momba ny tranolay fihaonana. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa ianao sy ireo zanakao miaraka aminao kosa no hitandrina ny fisoronanareo ka hanompo ny amin’ny zavatra rehetra mikasika ny alitara sy ny ao anatin’ny efitra lamba satria fanompoana omeko anareo ny fisoronana. Ny olon-kafa izay manakaiky kosa dia hovonoina.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fiveloman’ny mpisorona
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary NY TOMPO niteny tamin’i Arona hoe: Indro Aho efa nanome ho anjaranao ny fitandremana ireo fanomezana ho Ahy, dia ireo zava-masina rehetra atolotry ny Zanak’Israely; efa nomeko ho anjaranao sy ireo zanakao izany ka ho lalàna maharitra. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao no ho anao amin’ireo zavatra masina indrindra, avy amin’ny fanatitra izay tsy nolevonina tamin’ny afo: Ny fanatitra rehetra izay atolony ho fanatitra avy amin’ny zavamaniry sy ho fanatitra noho ny ota ary ho fanati-panonerana izay hanonerany ho Ahy; ho masina indrindra ho anao sy ireo zanakao izany. '
