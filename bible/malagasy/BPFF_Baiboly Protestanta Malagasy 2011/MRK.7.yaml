document_id: MRK.7,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny hevitr’i Jesosy ny amin’ny fanaon-drazana
  - type: heading
    content: Mat 15.1-20
  - type: text
    content: 'Ary nivory teo Aminy ny '
  - type: text
    content: Fariseo
  - type: text
    content: ' sy ny '
  - type: text
    content: mpanoradalàna
  - type: text
    content: ' sasany izay avy tany Jerosalema '
  '10':
  - type: text
    content: 'Fa hoy Mosesy: «Manajà ny rainao sy ny reninao» (Eks 20.12), ary koa: «Izay manozona ny rainy sy ny reniny dia hovonoina ho faty tokoa» (Eks 21.17). '
  '11':
  - type: text
    content: 'Fa hoy kosa ianareo: Raha misy olona milaza amin’ny rainy na amin’ny reniny hoe: Efa nataoko fanatitra ho an’Andriamanitra izay fanampiana tokony ho anao avy amiko, '
  '12':
  - type: text
    content: 'dia tsy avelanareo hanao na inona na inona ho an’ny rainy sy ny reniny intsony izy '
  '13':
  - type: text
    content: koa foananareo ny tenin’Andriamanitra amin’ny fampianarana napetraka ho anareo, izay nasainareo hotandremana. Ary zavatra maro mifanahatahaka amin’izany koa no ataonareo.
  - type: heading
    content: Izay mahaloto ny olona
  - type: heading
    content: Mat 15.10-20
  '14':
  - type: text
    content: 'Ary niantso ny vahoaka hankeo Aminy indray Izy ka niteny taminy hoe: Mihainoa Ahy ianareo rehetra ka fantaro. '
  '15':
  - type: text
    content: 'Fa tsy ny zavatra avy eo ivelany izay miditra ao anatin’ny olona no mahaloto azy. Fa izay mivoaka avy ao anatin’ny olona no mahaloto azy. '
  '16':
  - type: text
    content: Raha misy manan-tsofina hoenti-mihaino, aoka izy hihaino.
  '17':
  - type: text
    content: 'Ary rehefa niala teo amin’ny vahoaka Izy ka niditra tao an-trano iray dia nanontany Azy ny mpianany ny amin’izany fanoharana izany. '
  '18':
  - type: text
    content: 'Ary hoy Izy taminy: Hay! Ianareo koa aza mba tsy mahafantatra! Tsy fantatrareo va fa izay rehetra eo ivelan’ny olona ka miditra ao anatiny dia tsy mahaloto azy? '
  '19':
  - type: text
    content: 'Satria tsy miditra ao am-pony izany fa ao an-kibony ihany ka mivoaka any amin’ny toeram-pivoahana. Izany no nolazainy mba hampadio ny sakafo rehetra. '
  '2':
  - type: text
    content: 'ka nahita ny mpianany sasany misakafo tamin’ny tanana tsy madio, izany hoe, tsy voasasa. '
  '20':
  - type: text
    content: 'Ary hoy koa Izy: Izay mivoaka avy ao amin’ny olona, dia izany, no mahaloto azy. '
  '21':
  - type: text
    content: 'Fa avy ao anatin’ny olona, dia avy ao am-pony, no ivoahan’ny sain-dratsy, dia ny fijangajangana, ny halatra, ny vonoan’olona, '
  '22':
  - type: text
    content: 'ny fakam-badin’olona, ny fitiavan-karena, ny faharatsiam-panahy, ny fitaka, ny fijejojejoana, ny fijery ratsy, ny fitenenan-dratsy, ny avonavona, ny fahadalana. '
  '23':
  - type: text
    content: Ireny zavatra ratsy rehetra ireny no mivoaka avy ao anatin’ny olona ka mahaloto azy.
  - type: heading
    content: 'Any amin’ny tany tsy jiosy: Ny finoan’ilay vehivavy siro-foinikiana'
  - type: heading
    content: Mat 15.21-28
  '24':
  - type: text
    content: 'Ary niala teo Jesosy ka lasa nankany amin’ny sisintanin’i Tiro sy i Sidona. Dia niditra tao amin’ny trano iray Izy, ary tsy tiany ho fantatry ny olona izany; kanefa tsy afaka niery Izy. '
  '25':
  - type: text
    content: 'Fa niaraka tamin’izay dia nisy vehivavy iray izay azom-panahy maloto ny zanany vavy kely; nandre ny Aminy izy ka tonga niankohoka teo amin’ny tongony. '
  '26':
  - type: text
    content: Jentilisa
  - type: text
    content: ' Ravehivavy, avy amin’ny firenena siro-foinikiana. Nangataka Taminy izy mba handroaka ny '
  - type: text
    content: demonia
  - type: text
    content: ' amin’ny zanany vavy. '
  '27':
  - type: text
    content: 'Fa hoy Jesosy taminy: Aoka ho voky aloha ny zaza; fa tsy mety raha maka ny mofon-jaza ka manipy azy ho an’ny amboa kely. '
  '28':
  - type: text
    content: 'Fa namaly Azy Ravehivavy hoe: Eny, Tompoko; kanefa na dia ny amboa kely ao ambanin’ny latabatra aza dia mba mihinana ny sombintsombin’ny mofon-jaza ihany. '
  '29':
  - type: text
    content: 'Dia hoy Jesosy taminy: Noho izany teny izany dia mandehana ianao; efa niala tamin’ny zanakao vavy ny demonia. '
  '3':
  - type: text
    content: 'Fa ny Fariseo sy ny '
  - type: text
    content: Jiosy
  - type: text
    content: ' rehetra dia tsy mba misakafo raha tsy efa manasa tsara ny tanany, satria mitana ny fampianarana napetraky ny razana izy. '
  '30':
  - type: text
    content: Ary rehefa tonga tany an-tranony Ravehivavy dia hitany nandry teo ambonin’ny farafara ny zanany vavy, ary ny demonia dia efa niala taminy.
  - type: heading
    content: 'Any amin’ny tany tsy jiosy: Fanasitranan’i Jesosy ilay marenina sady raiki-dela'
  - type: heading
    content: Mat 15.29-31
  '31':
  - type: text
    content: 'Ary niala indray avy tamin’ny faritanin’i Tiro Jesosy dia namakivaky an’i Sidona sy ny faritanin’i Dekapolisy ka nankany amoron’ny ranomasin’i Galilia. '
  '32':
  - type: text
    content: 'Ary nisy marenina sady raiki-dela iray noentin’olona teo Aminy ka niangavy Azy izy ireo mba hametra-tanana aminy. '
  '33':
  - type: text
    content: 'Ary nitondra an-dRalehilahy niala kely ny vahoaka Izy dia nangarona ny sofiny tamin’ny rantsantanany, dia nandrora ka nikasika ny lelany; '
  '34':
  - type: text
    content: 'ary niandrandra ny lanitra Izy dia nisento ka niteny taminy hoe: Efata, izany hoe: Maladia! '
  '35':
  - type: text
    content: 'Dia nalady ny sofiny sady voavaha ny fatoran’ny lelany ka afaka niteny tsara izy. '
  '36':
  - type: text
    content: 'Ary nandrara ny olona teo Jesosy mba tsy hilaza na amin’iza na amin’iza; kanefa na dia norarany aza ireo dia vao mainka nampiely izany bebe kokoa. '
  '37':
  - type: text
    content: 'Dia talanjona indrindra ny olona ka niteny hoe: Tsara ny nanaovany ny zavatra rehetra; fa sady mampalady ny marenina Izy no mampiteny ny moana.'
  '4':
  - type: text
    content: 'Ary raha avy any an-tsena izy dia tsy misakafo raha tsy misasa aloha. Ary misy fomba maro hafa koa izay noraisiny ka nofikiriny, dia ny manasa kaopy sy siny, mbamin’izay lovia varahina. '
  '5':
  - type: text
    content: 'Dia nanontany Azy ny Fariseo sy ny mpanoradalàna hoe: Nahoana ny mpianatrao no tsy manaraka ny fampianarana napetraky ny razana fa misakafo amin’ny tanana tsy voasasa?'
  '6':
  - type: text
    content: 'Fa hoy Jesosy taminy: Marina ny naminanian’Isaia anareo mpihatsaravelatsihy, araka ny voasoratra hoe:'
  - type: text
    content: «Ity firenena ity dia manaja Ahy amin’ny molony,
  - type: text
    content: fa ny fony kosa dia lavitra Ahy.
  '7':
  - type: text
    content: Koa foana ny ivavahan’ireo Amiko
  - type: text
    content: raha mampianatra didin’olombelona ho fampianarana izy» (Isa. 29.13).
  '8':
  - type: text
    content: 'Mahafoy ny didin’Andriamanitra ianareo ka mifikitra amin’ny fomba napetraky ny olona. '
  '9':
  - type: text
    content: 'Ary hoy koa Izy taminy: Hay, tsara ny nahafoizanareo ny didin’Andriamanitra mba hitandremanareo ny fampianarana napetraka ho anareo! '
