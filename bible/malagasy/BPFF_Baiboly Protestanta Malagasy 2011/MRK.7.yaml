document_id: MRK.7,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny hevitr’i Jesosy ny amin’ny fanaon-drazana
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mat 15.1-20
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ary nivory teo Aminy ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Fariseo
    - type: text
      text: ' sy ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpanoradalàna
    - type: text
      text: ' sasany izay avy tany Jerosalema '
  '10':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Fa hoy Mosesy: «Manajà ny rainao sy ny reninao» (Eks 20.12), ary koa: «Izay manozona ny rainy sy ny reniny dia hovonoina ho faty tokoa» (Eks 21.17). '
  '11':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Fa hoy kosa ianareo: Raha misy olona milaza amin’ny rainy na amin’ny reniny hoe: Efa nataoko fanatitra ho an’Andriamanitra izay fanampiana tokony ho anao avy amiko, '
  '12':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'dia tsy avelanareo hanao na inona na inona ho an’ny rainy sy ny reniny intsony izy '
  '13':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: koa foananareo ny tenin’Andriamanitra amin’ny fampianarana napetraka ho anareo, izay nasainareo hotandremana. Ary zavatra maro mifanahatahaka amin’izany koa no ataonareo.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Izay mahaloto ny olona
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mat 15.10-20
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Ary niantso ny vahoaka hankeo Aminy indray Izy ka niteny taminy hoe: Mihainoa Ahy ianareo rehetra ka fantaro. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Fa tsy ny zavatra avy eo ivelany izay miditra ao anatin’ny olona no mahaloto azy. Fa izay mivoaka avy ao anatin’ny olona no mahaloto azy. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Raha misy manan-tsofina hoenti-mihaino, aoka izy hihaino.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Ary rehefa niala teo amin’ny vahoaka Izy ka niditra tao an-trano iray dia nanontany Azy ny mpianany ny amin’izany fanoharana izany. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Ary hoy Izy taminy: Hay! Ianareo koa aza mba tsy mahafantatra! Tsy fantatrareo va fa izay rehetra eo ivelan’ny olona ka miditra ao anatiny dia tsy mahaloto azy? '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Satria tsy miditra ao am-pony izany fa ao an-kibony ihany ka mivoaka any amin’ny toeram-pivoahana. Izany no nolazainy mba hampadio ny sakafo rehetra. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'ka nahita ny mpianany sasany misakafo tamin’ny tanana tsy madio, izany hoe, tsy voasasa. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Ary hoy koa Izy: Izay mivoaka avy ao amin’ny olona, dia izany, no mahaloto azy. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Fa avy ao anatin’ny olona, dia avy ao am-pony, no ivoahan’ny sain-dratsy, dia ny fijangajangana, ny halatra, ny vonoan’olona, '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'ny fakam-badin’olona, ny fitiavan-karena, ny faharatsiam-panahy, ny fitaka, ny fijejojejoana, ny fijery ratsy, ny fitenenan-dratsy, ny avonavona, ny fahadalana. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Ireny zavatra ratsy rehetra ireny no mivoaka avy ao anatin’ny olona ka mahaloto azy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Any amin’ny tany tsy jiosy: Ny finoan’ilay vehivavy siro-foinikiana'
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mat 15.21-28
    marker-yv: yv-h
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Ary niala teo Jesosy ka lasa nankany amin’ny sisintanin’i Tiro sy i Sidona. Dia niditra tao amin’ny trano iray Izy, ary tsy tiany ho fantatry ny olona izany; kanefa tsy afaka niery Izy. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Fa niaraka tamin’izay dia nisy vehivavy iray izay azom-panahy maloto ny zanany vavy kely; nandre ny Aminy izy ka tonga niankohoka teo amin’ny tongony. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jentilisa
    - type: text
      text: ' Ravehivavy, avy amin’ny firenena siro-foinikiana. Nangataka Taminy izy mba handroaka ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: demonia
    - type: text
      text: ' amin’ny zanany vavy. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Fa hoy Jesosy taminy: Aoka ho voky aloha ny zaza; fa tsy mety raha maka ny mofon-jaza ka manipy azy ho an’ny amboa kely. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Fa namaly Azy Ravehivavy hoe: Eny, Tompoko; kanefa na dia ny amboa kely ao ambanin’ny latabatra aza dia mba mihinana ny sombintsombin’ny mofon-jaza ihany. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Dia hoy Jesosy taminy: Noho izany teny izany dia mandehana ianao; efa niala tamin’ny zanakao vavy ny demonia. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Fa ny Fariseo sy ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jiosy
    - type: text
      text: ' rehetra dia tsy mba misakafo raha tsy efa manasa tsara ny tanany, satria mitana ny fampianarana napetraky ny razana izy. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Ary rehefa tonga tany an-tranony Ravehivavy dia hitany nandry teo ambonin’ny farafara ny zanany vavy, ary ny demonia dia efa niala taminy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Any amin’ny tany tsy jiosy: Fanasitranan’i Jesosy ilay marenina sady raiki-dela'
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mat 15.29-31
    marker-yv: yv-h
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Ary niala indray avy tamin’ny faritanin’i Tiro Jesosy dia namakivaky an’i Sidona sy ny faritanin’i Dekapolisy ka nankany amoron’ny ranomasin’i Galilia. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Ary nisy marenina sady raiki-dela iray noentin’olona teo Aminy ka niangavy Azy izy ireo mba hametra-tanana aminy. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Ary nitondra an-dRalehilahy niala kely ny vahoaka Izy dia nangarona ny sofiny tamin’ny rantsantanany, dia nandrora ka nikasika ny lelany; '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'ary niandrandra ny lanitra Izy dia nisento ka niteny taminy hoe: Efata, izany hoe: Maladia! '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Dia nalady ny sofiny sady voavaha ny fatoran’ny lelany ka afaka niteny tsara izy. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Ary nandrara ny olona teo Jesosy mba tsy hilaza na amin’iza na amin’iza; kanefa na dia norarany aza ireo dia vao mainka nampiely izany bebe kokoa. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Dia talanjona indrindra ny olona ka niteny hoe: Tsara ny nanaovany ny zavatra rehetra; fa sady mampalady ny marenina Izy no mampiteny ny moana.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ary raha avy any an-tsena izy dia tsy misakafo raha tsy misasa aloha. Ary misy fomba maro hafa koa izay noraisiny ka nofikiriny, dia ny manasa kaopy sy siny, mbamin’izay lovia varahina. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Dia nanontany Azy ny Fariseo sy ny mpanoradalàna hoe: Nahoana ny mpianatrao no tsy manaraka ny fampianarana napetraky ny razana fa misakafo amin’ny tanana tsy voasasa?'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Fa hoy Jesosy taminy: Marina ny naminanian’Isaia anareo mpihatsaravelatsihy, araka ny voasoratra hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Ity firenena ity dia manaja Ahy amin’ny molony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny fony kosa dia lavitra Ahy.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Koa foana ny ivavahan’ireo Amiko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: raha mampianatra didin’olombelona ho fampianarana izy» (Isa. 29.13).
  '8':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Mahafoy ny didin’Andriamanitra ianareo ka mifikitra amin’ny fomba napetraky ny olona. '
  '9':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ary hoy koa Izy taminy: Hay, tsara ny nahafoizanareo ny didin’Andriamanitra mba hitandremanareo ny fampianarana napetraka ho anareo! '
