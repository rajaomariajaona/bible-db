document_id: GEN.37
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ary nonina tany amin’ny tany nivahinian’ny rainy i Jakoba, tany amin’ny tany Kanana.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ireo nofin’i Josefa
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Izao no taranak’i Jakoba.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Rehefa fito amby folo taona i Josefa dia niara-niandry ondry tamin’ny rahalahiny izy; izy moa dia zaza niaraka tamin’ny zanak’i Bila sy ny zanak’i Zilpa, vadin’i Jakoba rainy. Ary i Josefa dia mpitati-bolana tamin’ny rainy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Tian’Israely mihoatra noho ny zanany rehetra i Josefa, satria zanaky ny fahanterany, ka nanaovany akanjo misoratsoratra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Nony hitan’ny rahalahiny fa i Josefa no tian’ny rainy mihoatra noho izy mirahalahy avy dia nankahala azy izy ireo ka tsy afaka nilaza teny tsara taminy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary nanonofy i Josefa ka nambarany tamin’ireo rahalahiny; dia vao mainka nankahalan’izy ireo azy izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Izao no nolazainy taminy: Mba henoy kely ange izao nofy izao! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Indro, namehy amboara tany an-tsaha, isika; ary indro, niarina ny amboarako sady nijoro; ary indreo, nilahatra manodidina azy kosa ny amboaranareo ka niankohoka teo anatrehan’ny amboarako. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dia hoy ny rahalahiny taminy: Moa va izany hanjaka aminay tokoa ianao? Sa hanapaka aminay tokoa ianao? Vao mainka nankahalan’izy ireo azy izany nofiny sy teniny izany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Dia nanonofy indray izy ka nolazainy tamin’ny rahalahiny. Hoy izy: Indro, nanonofy indray aho! Ary indreo, ny masoandro sy ny volana ary ny kintana iraika amby folo, niankohoka teo anatrehako. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Nambarany tamin’ny rainy sy ireo rahalahiny koa izany ka niteny mafy azy ny rainy hoe: Inona izany nofy nonofisinao izany? Moa ho avy tokoa va aho sy ny reninao ary ny rahalahinao ka hiankohoka amin’ny tany eo anatrehanao? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Dia nialona azy ny rahalahiny fa ny rainy kosa dia nitadidy izany zavatra izany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Namidin’ny rahalahiny i Josefa
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary lasa niandry ny ondrin’ny rainy tany Sekema ny rahalahiny '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'ka hoy Israely tamin’i Josefa: Tsy miandry ondry any Sekema va ny rahalahinao? Avia ianao hirahiko hankany amin’izy ireo. Dia hoy ny navaliny: Inty aho! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary hoy ny rainy taminy: Miangavy anao aho, andeha zahao na tsara ihany ny rahalahinao sy ny ondry aman’osy, na manao ahoana, dia miverena hilaza amiko. Dia nalefany avy teo amin’ny lohasahan’i Hebrona izy ka nankany Sekema.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary nisy lehilahy nahita azy nirenireny tany an-tsaha ka nanontany azy hoe: Inona moa no tadiavinao? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Dia hoy izy: Ny rahalahiko no tadiaviko; koa miangavy anao aho mba lazao amiko izay toerana iandrasany ondry. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Dia hoy Ralehilahy: Efa nifindra niala teto izy; reko niresaka izy ireo hoe: Andeha isika hankany Dotana. Dia lasa nanaraka ny rahalahiny i Josefa ka nahita azy tany Dotana.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Vao lavidavitra dia nahatazana azy ny rahalahiny; koa raha tsy mbola nanakaiky azy i Josefa dia niray tetika hamono azy izy ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Niresaka izy ireo hoe: Indro fa tamy ilay mpanonofy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'koa ankehitriny, andeha hovonointsika izy ary hatsipintsika ao anatin’ny lava-drano, dia holazaintsika hoe: Lanin’ny biby masiaka izy. Ho hitantsika amin’izany ny hiafaran’ny nofiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Raha nandre izany i Robena dia namonjy azy tamin’ny tanan’ireo ka niteny hoe: Aoka tsy hamono azy isika. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Hoy koa i Robena tamin’izy ireo: Aoka tsy handatsa-dra ianareo; fa atsipazo ao anatin’io lava-drano etỳ an-tany efitra io izy fa aza misy mikasi-tanana azy ianareo. Izany no nolazainy mba hamonjeny an’i Josefa amin’ny tanan’ny rahalahiny ka hamerenany azy any amin’ny rainy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Rehefa tonga teo amin’ny rahalahiny i Josefa dia nendahin’izy ireo ny akanjony, dia ilay akanjo misoratsoratra teny aminy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: avy eo, nobatain’izy ireo izy ka natsipiny tao an-dava-drano. Maina ny lavaka tamin’izay fa tsy nisy rano tao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Dia nipetraka nisakafo izy ireo. Fa raha sendra nanopy ny masony izy ireo dia nahatazana fa indreo, nisy Ismaelita niara-dia avy tany Gileada ka nitondra ditin-kazo ny ramevany, dia nekota sy balisama ary lota izay noentiny hidina ho any Ejipta. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ary hoy i Joda tamin’ny rahalahiny: Inona no soa ho azontsika raha hamono ny rahalahintsika sy hanafina ny rany isika? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Andeha hamidintsika amin’ireo Ismaelita ireo izy ary aoka tsy hikasika azy ny tanantsika. Rahalahintsika sy nofontsika ihany mantsy izy! Dia nanaiky ny rahalahiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Fa nisy Midianita mpivaro-mandeha nandalo teo; dia nakariny niala tao an-dava-drano i Josefa ka namidiny sekela volafotsy roapolo tamin’ny Ismaelita, ary nitondra an’i Josefa ho any Ejipta ireo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Rehefa niverina nankeo amin’ny lava-drano i Robena ka nahita fa indro, tsy tao an-dava-drano intsony i Josefa dia nandriatra ny fitafiany izy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'ary niverina nankeo amin’ny rahalahiny i Robena ka niteny hoe: Tsy ao ny zaza ka izaho, dia mba aiza izao no halehako? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ary nalain’ireo rahalahiny ilay akanjon’i Josefa dia namono zanak’osy izy ka natsobony tamin’ny ran’io ilay akanjo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Dia nampanateriny ho any amin’ny rainy ilay akanjo sady hoy ny filazany azy: Nahita an’ity izahay ka fantaro na akanjon’ny zanakao ity na tsia. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Dia fantany ilay akanjo ka hoy izy: Akanjon’ny zanako io! Lanin’ny biby masiaka izy! Voaviravira tokoa i Josefa! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Dia nandriatra ny fitafiany i Jakoba ka nisikina lamba fisaonana ary nisaona ny zanany andro maromaro. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Dia avy ny zanany lahy rehetra sy ny zanany vavy rehetra mba hampionona azy nefa tsy nety nampiononina izy, fa hoy izy: Tsia, fa hidina hisaona any amin’ny zanako any amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: fitoeran’ny maty
  - type: text
    text: ' aho. Dia mbola nitomany azy foana ny rainy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Fa ny Midianita kosa dia nivarotra an’i Josefa tany Ejipta tamin’i Potifara, tandapan’i Farao, sady lehiben’ny mpiambina.
