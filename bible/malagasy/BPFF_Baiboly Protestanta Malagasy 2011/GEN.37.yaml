document_id: GEN.37,3103
type_code: plt
verses:
  '1':
  - type: text
    content: Ary nonina tany amin’ny tany nivahinian’ny rainy i Jakoba, tany amin’ny tany Kanana.
  - type: heading
    content: Ireo nofin’i Josefa
  '10':
  - type: text
    content: 'Nambarany tamin’ny rainy sy ireo rahalahiny koa izany ka niteny mafy azy ny rainy hoe: Inona izany nofy nonofisinao izany? Moa ho avy tokoa va aho sy ny reninao ary ny rahalahinao ka hiankohoka amin’ny tany eo anatrehanao? '
  '11':
  - type: text
    content: Dia nialona azy ny rahalahiny fa ny rainy kosa dia nitadidy izany zavatra izany.
  - type: heading
    content: Namidin’ny rahalahiny i Josefa
  '12':
  - type: text
    content: 'Ary lasa niandry ny ondrin’ny rainy tany Sekema ny rahalahiny '
  '13':
  - type: text
    content: 'ka hoy Israely tamin’i Josefa: Tsy miandry ondry any Sekema va ny rahalahinao? Avia ianao hirahiko hankany amin’izy ireo. Dia hoy ny navaliny: Inty aho! '
  '14':
  - type: text
    content: 'Ary hoy ny rainy taminy: Miangavy anao aho, andeha zahao na tsara ihany ny rahalahinao sy ny ondry aman’osy, na manao ahoana, dia miverena hilaza amiko. Dia nalefany avy teo amin’ny lohasahan’i Hebrona izy ka nankany Sekema.'
  '15':
  - type: text
    content: 'Ary nisy lehilahy nahita azy nirenireny tany an-tsaha ka nanontany azy hoe: Inona moa no tadiavinao? '
  '16':
  - type: text
    content: 'Dia hoy izy: Ny rahalahiko no tadiaviko; koa miangavy anao aho mba lazao amiko izay toerana iandrasany ondry. '
  '17':
  - type: text
    content: 'Dia hoy Ralehilahy: Efa nifindra niala teto izy; reko niresaka izy ireo hoe: Andeha isika hankany Dotana. Dia lasa nanaraka ny rahalahiny i Josefa ka nahita azy tany Dotana.'
  '18':
  - type: text
    content: 'Vao lavidavitra dia nahatazana azy ny rahalahiny; koa raha tsy mbola nanakaiky azy i Josefa dia niray tetika hamono azy izy ireo. '
  '19':
  - type: text
    content: 'Niresaka izy ireo hoe: Indro fa tamy ilay mpanonofy; '
  '2':
  - type: text
    content: Izao no taranak’i Jakoba.
  - type: text
    content: 'Rehefa fito amby folo taona i Josefa dia niara-niandry ondry tamin’ny rahalahiny izy; izy moa dia zaza niaraka tamin’ny zanak’i Bila sy ny zanak’i Zilpa, vadin’i Jakoba rainy. Ary i Josefa dia mpitati-bolana tamin’ny rainy. '
  '20':
  - type: text
    content: 'koa ankehitriny, andeha hovonointsika izy ary hatsipintsika ao anatin’ny lava-drano, dia holazaintsika hoe: Lanin’ny biby masiaka izy. Ho hitantsika amin’izany ny hiafaran’ny nofiny. '
  '21':
  - type: text
    content: 'Raha nandre izany i Robena dia namonjy azy tamin’ny tanan’ireo ka niteny hoe: Aoka tsy hamono azy isika. '
  '22':
  - type: text
    content: 'Hoy koa i Robena tamin’izy ireo: Aoka tsy handatsa-dra ianareo; fa atsipazo ao anatin’io lava-drano etỳ an-tany efitra io izy fa aza misy mikasi-tanana azy ianareo. Izany no nolazainy mba hamonjeny an’i Josefa amin’ny tanan’ny rahalahiny ka hamerenany azy any amin’ny rainy.'
  '23':
  - type: text
    content: 'Rehefa tonga teo amin’ny rahalahiny i Josefa dia nendahin’izy ireo ny akanjony, dia ilay akanjo misoratsoratra teny aminy; '
  '24':
  - type: text
    content: avy eo, nobatain’izy ireo izy ka natsipiny tao an-dava-drano. Maina ny lavaka tamin’izay fa tsy nisy rano tao.
  '25':
  - type: text
    content: 'Dia nipetraka nisakafo izy ireo. Fa raha sendra nanopy ny masony izy ireo dia nahatazana fa indreo, nisy Ismaelita niara-dia avy tany Gileada ka nitondra ditin-kazo ny ramevany, dia nekota sy balisama ary lota izay noentiny hidina ho any Ejipta. '
  '26':
  - type: text
    content: 'Ary hoy i Joda tamin’ny rahalahiny: Inona no soa ho azontsika raha hamono ny rahalahintsika sy hanafina ny rany isika? '
  '27':
  - type: text
    content: 'Andeha hamidintsika amin’ireo Ismaelita ireo izy ary aoka tsy hikasika azy ny tanantsika. Rahalahintsika sy nofontsika ihany mantsy izy! Dia nanaiky ny rahalahiny. '
  '28':
  - type: text
    content: Fa nisy Midianita mpivaro-mandeha nandalo teo; dia nakariny niala tao an-dava-drano i Josefa ka namidiny sekela volafotsy roapolo tamin’ny Ismaelita, ary nitondra an’i Josefa ho any Ejipta ireo.
  '29':
  - type: text
    content: 'Rehefa niverina nankeo amin’ny lava-drano i Robena ka nahita fa indro, tsy tao an-dava-drano intsony i Josefa dia nandriatra ny fitafiany izy, '
  '3':
  - type: text
    content: 'Tian’Israely mihoatra noho ny zanany rehetra i Josefa, satria zanaky ny fahanterany, ka nanaovany akanjo misoratsoratra. '
  '30':
  - type: text
    content: 'ary niverina nankeo amin’ny rahalahiny i Robena ka niteny hoe: Tsy ao ny zaza ka izaho, dia mba aiza izao no halehako? '
  '31':
  - type: text
    content: 'Ary nalain’ireo rahalahiny ilay akanjon’i Josefa dia namono zanak’osy izy ka natsobony tamin’ny ran’io ilay akanjo. '
  '32':
  - type: text
    content: 'Dia nampanateriny ho any amin’ny rainy ilay akanjo sady hoy ny filazany azy: Nahita an’ity izahay ka fantaro na akanjon’ny zanakao ity na tsia. '
  '33':
  - type: text
    content: 'Dia fantany ilay akanjo ka hoy izy: Akanjon’ny zanako io! Lanin’ny biby masiaka izy! Voaviravira tokoa i Josefa! '
  '34':
  - type: text
    content: 'Dia nandriatra ny fitafiany i Jakoba ka nisikina lamba fisaonana ary nisaona ny zanany andro maromaro. '
  '35':
  - type: text
    content: 'Dia avy ny zanany lahy rehetra sy ny zanany vavy rehetra mba hampionona azy nefa tsy nety nampiononina izy, fa hoy izy: Tsia, fa hidina hisaona any amin’ny zanako any amin’ny '
  - type: text
    content: fitoeran’ny maty
  - type: text
    content: ' aho. Dia mbola nitomany azy foana ny rainy.'
  '36':
  - type: text
    content: Fa ny Midianita kosa dia nivarotra an’i Josefa tany Ejipta tamin’i Potifara, tandapan’i Farao, sady lehiben’ny mpiambina.
  '4':
  - type: text
    content: Nony hitan’ny rahalahiny fa i Josefa no tian’ny rainy mihoatra noho izy mirahalahy avy dia nankahala azy izy ireo ka tsy afaka nilaza teny tsara taminy.
  '5':
  - type: text
    content: 'Ary nanonofy i Josefa ka nambarany tamin’ireo rahalahiny; dia vao mainka nankahalan’izy ireo azy izany. '
  '6':
  - type: text
    content: 'Izao no nolazainy taminy: Mba henoy kely ange izao nofy izao! '
  '7':
  - type: text
    content: 'Indro, namehy amboara tany an-tsaha, isika; ary indro, niarina ny amboarako sady nijoro; ary indreo, nilahatra manodidina azy kosa ny amboaranareo ka niankohoka teo anatrehan’ny amboarako. '
  '8':
  - type: text
    content: 'Dia hoy ny rahalahiny taminy: Moa va izany hanjaka aminay tokoa ianao? Sa hanapaka aminay tokoa ianao? Vao mainka nankahalan’izy ireo azy izany nofiny sy teniny izany.'
  '9':
  - type: text
    content: 'Dia nanonofy indray izy ka nolazainy tamin’ny rahalahiny. Hoy izy: Indro, nanonofy indray aho! Ary indreo, ny masoandro sy ny volana ary ny kintana iraika amby folo, niankohoka teo anatrehako. '
