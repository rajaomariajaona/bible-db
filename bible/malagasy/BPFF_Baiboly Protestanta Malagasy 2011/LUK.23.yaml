document_id: LUK.23,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nitsaran’i Pilato an’i Jesosy
  - type: heading
    content: Mat 27.2, 11-14; Mar 15.1-5; Jao 18.28, 33-38
  - type: text
    content: Ary nitsangana ny olona rehetra ka nitondra an’i Jesosy tany amin’i Pilato.
  '10':
  - type: text
    content: 'Ary ireo lehiben’ny mpisorona sy ny mpanoradalàna nijanona teo dia nitompo teny fantatra hiampanga Azy. '
  '11':
  - type: text
    content: 'Ary namingavinga Azy i Heroda sy ny miaramilany ka nanao Azy ho fihomehezana, dia nampiakanjo Azy akanjo marevaka ka namerina Azy tany amin’i Pilato. '
  '12':
  - type: text
    content: Ary nanjary mpinamana i Heroda sy i Pilato tamin’izany andro izany; kanefa nifankahala izy roa lahy taloha.
  - type: heading
    content: Ny nanamelohana an’i Jesosy ho faty
  - type: heading
    content: Mat 27.11-26; Mar 15.11-15; Jao 18.39–19.16
  '13':
  - type: text
    content: 'Rehefa nasain’i Pilato novorina ireo lehiben’ny mpisorona sy ireo manampahefana ary ny vahoaka '
  '14':
  - type: text
    content: 'dia hoy izy tamin’izy ireo: Noentinareo atỳ amiko ity Lehilahy ity fa hoe nampiodina ny vahoaka; ary indro, efa nanadina Azy teto anatrehanareo aho, nefa tsy hitako izay helok’ity Lehilahy ity amin’izay iampanganareo Azy; '
  '15':
  - type: text
    content: 'na dia i Heroda koa aza dia tsy nahita, fa namerina Azy ho atỳ amintsika izy; ary indro, tsy nisy zavatra nataony izay tokony hahafaty Azy; '
  '16':
  - type: text
    content: 'koa hofaiziko Izy dia halefako. '
  '17':
  - type: text
    content: Fa tsy maintsy manafaka olona iray ho an’ny vahoaka izy amin’ny andro firavoravoana.
  '18':
  - type: text
    content: 'Fa izy rehetra dia niantso mafy indray miredona hoe: Vonoy Io ka i Barabasy no alefaso ho anay! '
  '19':
  - type: text
    content: 'Io Barabasy io dia natao tao an-tranomaizina noho ny fikomiana tao an-tanàna sy noho ny vonoan’olona. '
  '2':
  - type: text
    content: 'Dia nanomboka niampanga Azy izy ireo hoe: Izy ity hitanay nampiodina ny firenenay sady nandrara tsy handoa hetra ho an’i Kaisara ary nilaza ny tenany ho '
  - type: text
    content: Kristy
  - type: text
    content: ' Mpanjaka. '
  '20':
  - type: text
    content: 'Ary satria tian’i Pilato hafahana Jesosy dia nifandahatra tamin’ireo indray izy. '
  '21':
  - type: text
    content: 'Fa ny olona kosa dia niantsoantso hoe: Homboy, homboy amin’ny hazofijaliana Izy! '
  '22':
  - type: text
    content: 'Dia niteny tamin’izy ireo fanintelony izy hoe: Inona ary no ratsy nataony? Tsy hitako izay helony tokony hahafaty Azy; koa hofaiziko Izy dia halefako. '
  '23':
  - type: text
    content: Fa mbola niantsoantso tamin’ny feo mahery ihany ny olona ka nangataka ny hanomboana an’i Jesosy amin’ny hazofijaliana. Ary nihanahery ny feon’ny olona.
  '24':
  - type: text
    content: 'Dia nanapa-kevitra hanaiky izay nangatahin’izy ireo i Pilato. '
  '25':
  - type: text
    content: Koa nanafaka ilay natao tao an-tranomaizina noho ny fikomiana sy ny vonoan’olona izy satria io no nangatahin’ny olona; fa Jesosy kosa natolony araka ny sitrapon’ireo.
  - type: heading
    content: Ny nanomboana an’i Jesosy teo amin’ny hazofijaliana
  - type: heading
    content: Mat 27.31-44; Mar 15.20-32; Jao 19.17-24
  '26':
  - type: text
    content: Raha nitondra an’i Jesosy izy ireo dia nisambotra lehilahy kireniana iray atao hoe Simona, izay vao avy any an-tsaha, ka nampitondra azy ny hazofijaliana tao aorianan’i Jesosy.
  '27':
  - type: text
    content: 'Dia nisy vahoaka betsaka nanaraka Azy ary nisy koa vehivavy maro izay niteha-tratra sady nitomany Azy. '
  '28':
  - type: text
    content: 'Fa Jesosy nitodika tamin’izy ireo ka niteny hoe: Ry zanakavavin’i Jerosalema, aza mitomany Ahy fa mitomania ny tenanareo sy ny zanakareo. '
  '29':
  - type: text
    content: 'Fa indro, ho avy ny andro izay hilazana hoe: Sambatra ny momba sy ny kibo izay tsy nitoeran-jaza ary ny nono izay tsy ninonoan-jaza. '
  '3':
  - type: text
    content: 'Ary nanontany Azy i Pilato hoe: Ianao va no Mpanjakan’ny '
  - type: text
    content: Jiosy
  - type: text
    content: '? Dia namaly azy Izy hoe: Voalazanao. '
  '30':
  - type: text
    content: 'Dia hilaza amin’ny tendrombohitra ny olona hoe: «Mianjerà aminay; ary amin’ny havoana hoe: Saròny izahay» (Hos 10.8). '
  '31':
  - type: text
    content: Fa raha ataony amin’ny hazo maitso izao, inona no hanjo ny hazo maina?
  '32':
  - type: text
    content: 'Ary nisy koa olon-dratsy roa lahy noentina hiaraka hovonoina Aminy. '
  '33':
  - type: text
    content: 'Rehefa tonga teo amin’ny toerana atao hoe Ikarandoha izy ireo dia teo no nanomboany an’i Jesosy sy ireo olon-dratsy ireo, ny iray dia teo ankavanany ary ny iray dia teo ankaviany. '
  '34':
  - type: text
    content: 'Ary hoy Jesosy: Raiko ô, mamelà ny helony fa tsy fantany izay ataony. Dia nanaovany antsapaka no fizara ny fitafiany.'
  '35':
  - type: text
    content: 'Nijanona teo ny olona ka nijery. Ireo loholona koa dia nandatsa hoe: Namonjy ny sasany Izy; aoka hovonjeny koa ny tenany, raha Izy no Kristin’Andriamanitra, dia Ilay voafidy. '
  '36':
  - type: text
    content: 'Ary nihomehy Azy koa ny miaramila, dia nanatona ka nanome Azy vinaingitra '
  '37':
  - type: text
    content: 'sady niteny hoe: Raha Ianao no Mpanjakan’ny '
  - type: text
    content: Jiosy
  - type: text
    content: ', vonjeo ny tenanao. '
  '38':
  - type: text
    content: 'Ary nisy soratra koa teo amboniny hoe:'
  - type: heading
    content: ity no mpanjakan’ny jiosy
  - type: text
    content: .
  '39':
  - type: text
    content: 'Ny iray tamin’ireo olon-dratsy nahantona teo dia niteny ratsy Azy hoe: Tsy Ianao va no '
  - type: text
    content: Kristy
  - type: text
    content: '? Vonjeo ny tenanao sy izahay. '
  '4':
  - type: text
    content: 'Hoy i Pilato tamin’ireo lehiben’ny mpisorona sy ny vahoaka: Tsy hitako izay helok’ity Lehilahy ity. '
  '40':
  - type: text
    content: 'Fa niteny kosa ilay iray sady nananatra ny namany hoe: Moa tsy mba matahotra an’Andriamanitra va ianao na dia ianao voaheloka izao koa aza? '
  '41':
  - type: text
    content: 'Marina ny anamelohana antsika satria mandray ny valin’ny nataontsika isika; fa ity Lehilahy ity kosa, tsy mba nanao ratsy na dia kely akory aza. '
  '42':
  - type: text
    content: 'Ary hoy izy: Jesosy ô, tsarovy aho, rehefa tonga any amin’ny fanjakanao Ianao. '
  '43':
  - type: text
    content: 'Dia hoy Jesosy taminy: Lazaiko aminao marina tokoa: Anio no hiarahanao Amiko any '
  - type: text
    content: Paradisa
  - type: text
    content: .
  - type: heading
    content: Ny nahafatesan’i Jesosy
  - type: heading
    content: Mat 27.46-56; Mar 15.33-41; Jao 19.28-30
  '44':
  - type: text
    content: 'Rehefa tokony ho tamin’ny ora fahenina dia nisy haizina nandrakotra ny tany manontolo ka naharitra hatramin’ny ora fahasivy izany '
  '45':
  - type: text
    content: 'satria nihamaizina ny masoandro, ary triatra misasaka ny efitra lamba tao amin’ny tempoly. '
  '46':
  - type: text
    content: 'Dia niantso tamin’ny feo mahery Jesosy hoe: «Ray ô, eo an-tananao no atolotro ny fanahiko» (Sal 31.5); rehefa niteny izany Izy dia afaka ny ainy.'
  '47':
  - type: text
    content: 'Raha nahita izay zava-nitranga teo ny kapiteny dia nankalaza an’Andriamanitra hoe: Tena olona marina tokoa io Lehilahy io. '
  '48':
  - type: text
    content: Ary ny vahoaka rehetra dia niara-nirohotra mba hijery izay niseho, ary raha nahita ny zava-nitranga ireo dia niverina sady niteha-tratra.
  '49':
  - type: text
    content: Fa ny olom-pantany rehetra sy ny vehivavy izay nanaraka Azy avy tany Galilia kosa dia nijanona teny lavidavitra teny nijery izany zavatra izany.
  - type: heading
    content: Ny nandevenana an’i Jesosy
  - type: heading
    content: Mat 27.57-61; Mar 15.42-47; Jao 19.38-42
  '5':
  - type: text
    content: 'Fa vao mainka nanizingizina ireo hoe: Nampiodina ny olona Izy sady nampianatra manerana an’i '
  - type: text
    content: Jodia
  - type: text
    content: ' rehetra, nanomboka hatrany Galilia ka hatratỳ.'
  - type: heading
    content: Jesosy teo anatrehan’i Heroda
  '50':
  - type: text
    content: 'Ary indro, nisy lehilahy antsoina hoe Josefa, izay isan’ny mpanolotsaina tao amin’ny Sinedriona, lehilahy tsara fanahy sady marina. '
  '51':
  - type: text
    content: 'Izany lehilahy izany dia tsy mba nanaiky ny hevitra sy ny zavatra nataon’ny sasany; avy tany Arimatia tanànan’ny '
  - type: text
    content: Jiosy
  - type: text
    content: ' izy sady niandry ny fanjakan’Andriamanitra. '
  '52':
  - type: text
    content: 'Nankao amin’i Pilato izy ka nangataka ny fatin’i Jesosy. '
  '53':
  - type: text
    content: 'Dia nampidininy ny faty ka nofonosiny lamba hariry madinika, dia naleviny tao amin’ny fasana voalavaka tao amin’ny vatolampy, izay tsy mbola nandevenana olona. '
  '54':
  - type: text
    content: 'Andro fiomanana izany andro izany, fa efa antomotra ny '
  - type: text
    content: Sabata
  - type: text
    content: '. '
  '55':
  - type: text
    content: 'Ary ny vehivavy, izay niaraka Taminy hatrany Galilia, dia nanaraka tao aoriana ka nahita ny fasana sy izay fomba nametrahany ny faty. '
  '56':
  - type: text
    content: Ary niverina ireo ka nanomana zavamanitra sy menaka manitra. Ary tamin’ny Sabata dia nitsahatra ihany izy ireo araka ny lalàna.
  '6':
  - type: text
    content: 'Raha nandre izany i Pilato dia nanontany raha olona avy any Galilia Jesosy. '
  '7':
  - type: text
    content: Rehefa fantany fa avy tamin’ny tany tapahin’i Heroda Izy dia nampanateriny tany aminy, fa tany Jerosalema koa i Heroda tamin’izany andro izany.
  '8':
  - type: text
    content: 'Faly dia faly i Heroda raha nahita an’i Jesosy; fa efa ela no naniriany hahita Azy satria efa nandre ny Aminy sy nanantena hahita Azy hanao famantarana izy. '
  '9':
  - type: text
    content: 'Nametraka fanontaniana maro Taminy izy; nefa tsy namaly teny azy akory Jesosy. '
