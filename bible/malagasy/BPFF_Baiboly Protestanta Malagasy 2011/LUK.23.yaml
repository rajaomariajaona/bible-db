document_id: LUK.23
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nitsaran’i Pilato an’i Jesosy
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat 27.2, 11-14; Mar 15.1-5; Jao 18.28, 33-38
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ary nitsangana ny olona rehetra ka nitondra an’i Jesosy tany amin’i Pilato.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Dia nanomboka niampanga Azy izy ireo hoe: Izy ity hitanay nampiodina ny firenenay sady nandrara tsy handoa hetra ho an’i Kaisara ary nilaza ny tenany ho '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' Mpanjaka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary nanontany Azy i Pilato hoe: Ianao va no Mpanjakan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jiosy
  - type: text
    text: '? Dia namaly azy Izy hoe: Voalazanao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Hoy i Pilato tamin’ireo lehiben’ny mpisorona sy ny vahoaka: Tsy hitako izay helok’ity Lehilahy ity. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Fa vao mainka nanizingizina ireo hoe: Nampiodina ny olona Izy sady nampianatra manerana an’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jodia
  - type: text
    text: ' rehetra, nanomboka hatrany Galilia ka hatratỳ.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesosy teo anatrehan’i Heroda
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Raha nandre izany i Pilato dia nanontany raha olona avy any Galilia Jesosy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Rehefa fantany fa avy tamin’ny tany tapahin’i Heroda Izy dia nampanateriny tany aminy, fa tany Jerosalema koa i Heroda tamin’izany andro izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Faly dia faly i Heroda raha nahita an’i Jesosy; fa efa ela no naniriany hahita Azy satria efa nandre ny Aminy sy nanantena hahita Azy hanao famantarana izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Nametraka fanontaniana maro Taminy izy; nefa tsy namaly teny azy akory Jesosy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary ireo lehiben’ny mpisorona sy ny mpanoradalàna nijanona teo dia nitompo teny fantatra hiampanga Azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary namingavinga Azy i Heroda sy ny miaramilany ka nanao Azy ho fihomehezana, dia nampiakanjo Azy akanjo marevaka ka namerina Azy tany amin’i Pilato. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ary nanjary mpinamana i Heroda sy i Pilato tamin’izany andro izany; kanefa nifankahala izy roa lahy taloha.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nanamelohana an’i Jesosy ho faty
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat 27.11-26; Mar 15.11-15; Jao 18.39–19.16
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Rehefa nasain’i Pilato novorina ireo lehiben’ny mpisorona sy ireo manampahefana ary ny vahoaka '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'dia hoy izy tamin’izy ireo: Noentinareo atỳ amiko ity Lehilahy ity fa hoe nampiodina ny vahoaka; ary indro, efa nanadina Azy teto anatrehanareo aho, nefa tsy hitako izay helok’ity Lehilahy ity amin’izay iampanganareo Azy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'na dia i Heroda koa aza dia tsy nahita, fa namerina Azy ho atỳ amintsika izy; ary indro, tsy nisy zavatra nataony izay tokony hahafaty Azy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'koa hofaiziko Izy dia halefako. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Fa tsy maintsy manafaka olona iray ho an’ny vahoaka izy amin’ny andro firavoravoana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Fa izy rehetra dia niantso mafy indray miredona hoe: Vonoy Io ka i Barabasy no alefaso ho anay! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Io Barabasy io dia natao tao an-tranomaizina noho ny fikomiana tao an-tanàna sy noho ny vonoan’olona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary satria tian’i Pilato hafahana Jesosy dia nifandahatra tamin’ireo indray izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Fa ny olona kosa dia niantsoantso hoe: Homboy, homboy amin’ny hazofijaliana Izy! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Dia niteny tamin’izy ireo fanintelony izy hoe: Inona ary no ratsy nataony? Tsy hitako izay helony tokony hahafaty Azy; koa hofaiziko Izy dia halefako. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Fa mbola niantsoantso tamin’ny feo mahery ihany ny olona ka nangataka ny hanomboana an’i Jesosy amin’ny hazofijaliana. Ary nihanahery ny feon’ny olona.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Dia nanapa-kevitra hanaiky izay nangatahin’izy ireo i Pilato. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Koa nanafaka ilay natao tao an-tranomaizina noho ny fikomiana sy ny vonoan’olona izy satria io no nangatahin’ny olona; fa Jesosy kosa natolony araka ny sitrapon’ireo.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nanomboana an’i Jesosy teo amin’ny hazofijaliana
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat 27.31-44; Mar 15.20-32; Jao 19.17-24
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Raha nitondra an’i Jesosy izy ireo dia nisambotra lehilahy kireniana iray atao hoe Simona, izay vao avy any an-tsaha, ka nampitondra azy ny hazofijaliana tao aorianan’i Jesosy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Dia nisy vahoaka betsaka nanaraka Azy ary nisy koa vehivavy maro izay niteha-tratra sady nitomany Azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Fa Jesosy nitodika tamin’izy ireo ka niteny hoe: Ry zanakavavin’i Jerosalema, aza mitomany Ahy fa mitomania ny tenanareo sy ny zanakareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Fa indro, ho avy ny andro izay hilazana hoe: Sambatra ny momba sy ny kibo izay tsy nitoeran-jaza ary ny nono izay tsy ninonoan-jaza. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Dia hilaza amin’ny tendrombohitra ny olona hoe: «Mianjerà aminay; ary amin’ny havoana hoe: Saròny izahay» (Hos 10.8). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Fa raha ataony amin’ny hazo maitso izao, inona no hanjo ny hazo maina?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Ary nisy koa olon-dratsy roa lahy noentina hiaraka hovonoina Aminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Rehefa tonga teo amin’ny toerana atao hoe Ikarandoha izy ireo dia teo no nanomboany an’i Jesosy sy ireo olon-dratsy ireo, ny iray dia teo ankavanany ary ny iray dia teo ankaviany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ary hoy Jesosy: Raiko ô, mamelà ny helony fa tsy fantany izay ataony. Dia nanaovany antsapaka no fizara ny fitafiany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Nijanona teo ny olona ka nijery. Ireo loholona koa dia nandatsa hoe: Namonjy ny sasany Izy; aoka hovonjeny koa ny tenany, raha Izy no Kristin’Andriamanitra, dia Ilay voafidy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Ary nihomehy Azy koa ny miaramila, dia nanatona ka nanome Azy vinaingitra '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'sady niteny hoe: Raha Ianao no Mpanjakan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jiosy
  - type: text
    text: ', vonjeo ny tenanao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Ary nisy soratra koa teo amboniny hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ity no mpanjakan’ny jiosy
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Ny iray tamin’ireo olon-dratsy nahantona teo dia niteny ratsy Azy hoe: Tsy Ianao va no '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: '? Vonjeo ny tenanao sy izahay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Fa niteny kosa ilay iray sady nananatra ny namany hoe: Moa tsy mba matahotra an’Andriamanitra va ianao na dia ianao voaheloka izao koa aza? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Marina ny anamelohana antsika satria mandray ny valin’ny nataontsika isika; fa ity Lehilahy ity kosa, tsy mba nanao ratsy na dia kely akory aza. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Ary hoy izy: Jesosy ô, tsarovy aho, rehefa tonga any amin’ny fanjakanao Ianao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Dia hoy Jesosy taminy: Lazaiko aminao marina tokoa: Anio no hiarahanao Amiko any '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Paradisa
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nahafatesan’i Jesosy
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat 27.46-56; Mar 15.33-41; Jao 19.28-30
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Rehefa tokony ho tamin’ny ora fahenina dia nisy haizina nandrakotra ny tany manontolo ka naharitra hatramin’ny ora fahasivy izany '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'satria nihamaizina ny masoandro, ary triatra misasaka ny efitra lamba tao amin’ny tempoly. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Dia niantso tamin’ny feo mahery Jesosy hoe: «Ray ô, eo an-tananao no atolotro ny fanahiko» (Sal 31.5); rehefa niteny izany Izy dia afaka ny ainy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Raha nahita izay zava-nitranga teo ny kapiteny dia nankalaza an’Andriamanitra hoe: Tena olona marina tokoa io Lehilahy io. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: Ary ny vahoaka rehetra dia niara-nirohotra mba hijery izay niseho, ary raha nahita ny zava-nitranga ireo dia niverina sady niteha-tratra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: Fa ny olom-pantany rehetra sy ny vehivavy izay nanaraka Azy avy tany Galilia kosa dia nijanona teny lavidavitra teny nijery izany zavatra izany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nandevenana an’i Jesosy
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat 27.57-61; Mar 15.42-47; Jao 19.38-42
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Ary indro, nisy lehilahy antsoina hoe Josefa, izay isan’ny mpanolotsaina tao amin’ny Sinedriona, lehilahy tsara fanahy sady marina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'Izany lehilahy izany dia tsy mba nanaiky ny hevitra sy ny zavatra nataon’ny sasany; avy tany Arimatia tanànan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jiosy
  - type: text
    text: ' izy sady niandry ny fanjakan’Andriamanitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'Nankao amin’i Pilato izy ka nangataka ny fatin’i Jesosy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'Dia nampidininy ny faty ka nofonosiny lamba hariry madinika, dia naleviny tao amin’ny fasana voalavaka tao amin’ny vatolampy, izay tsy mbola nandevenana olona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: 'Andro fiomanana izany andro izany, fa efa antomotra ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Sabata
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: 'Ary ny vehivavy, izay niaraka Taminy hatrany Galilia, dia nanaraka tao aoriana ka nahita ny fasana sy izay fomba nametrahany ny faty. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: Ary niverina ireo ka nanomana zavamanitra sy menaka manitra. Ary tamin’ny Sabata dia nitsahatra ihany izy ireo araka ny lalàna.
