document_id: 2KI.24
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Tamin’ny andro nanjakan’i Joiakima no niakaran’i Nebokadnezara, mpanjakan’i Babilona. Nanoa azy nandritra ny telo taona i Joiakima; nivadika anefa izy ka nikomy taminy. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ary NY TOMPO nandefa ny miaramilan’ny Kaldeana, ny miaramilan’ny Arameana, ny miaramilan’i Moaba ary ny miaramilan’ny taranak’i Amona hiady aminy; nampandehaniny hiady amin’i Joda ireo mba handrava azy araka ny tenin’NY TOMPO izay nampilazainy ny mpaminany mpanompony.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Araka ny tenin’NY TOMPO ihany no nahatongavan’izany tamin’i Joda ka nanesorany azy tsy ho eo imasony noho ny fahotan’i Manase, noho izay rehetra nataony '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: sy noho ny ran’ny tsy manan-tsiny izay nalatsany koa; fa nofenoiny ran’ny tsy manan-tsiny i Jerosalema. Izany no tsy netezan’NY TOMPO hamela ny helony.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ny tantaran’i Joiakima sisa mbamin’izay rehetra nataony, tsy voasoratra ao amin’ny bokin’ny tantaran’ny mpanjakan’ny Joda va izany? '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary nodimandry any amin’ny razany i Joiakima ka i Joiakina zanany no nanjaka nandimby azy. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ary tsy nivoaka avy tany amin’ny taniny intsony ny mpanjakan’i Ejipta; fa lasan’ny mpanjakan’i Babilona izay rehetra an’ny mpanjakan’i Ejipta, hatrany amin’ny lohasahan-driakan’i Ejipta ka hatrany amin’ny ony Eofrata.
- type: usfm
  marker: s1
  children:
  - type: text
    text: I Joiakina, mpanjakan’ny Joda; ny fahababoana voalohany
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 2Tan 36.9-10
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Valo amby folo taona i Joiakina raha nanomboka nanjaka, ary telo volana no nanjakany tany Jerosalema. Ny anaran’ny reniny dia Nehosta, zanakavavin’i Elnatana avy any Jerosalema. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Nanao izay ratsy teo imason’NY TOMPO izy, tahaka izay rehetra nataon’ny rainy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Tamin’izany andro izany no niakaran’ny mpanompon’i Nebokadnezara, mpanjakan’i Babilona, hamely an’i Jerosalema, ary nataony fahirano ny tanàna. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Dia tonga koa i Nebokadnezara, mpanjakan’i Babilona, hamely ny tanàna, raha mbola nanao fahirano azy ny mpanompony. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Dia nandeha nankany amin’ny mpanjakan’i Babilona i Joiakina, mpanjakan’ny Joda, dia izy sy ny reniny, ny mpanompony, ny mpanapaka ary ny tandapany. Noentin’ny mpanjakan’i Babilona izy tamin’ny taona fahavalo nanjakany. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary navoakan’i Nebokadnezara ny harena rehetra tao amin’ny tranon’NY TOMPO sy ny harena tao amin’ny tranon’ny mpanjaka dia nendahany ny volamena rehetra izay nataon’i Solomona, mpanjakan’ny Israely, tao amin’ny tempolin’NY TOMPO, araka izay nolazain’NY TOMPO. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Noentiny ho babo ny tao Jerosalema rehetra sy ny manamboninahitra rehetra ary ny lehilahy mahery rehetra, dia olona iray alina mbamin’ny mpahay taozavatra rehetra sy ny mpanefy, tsy nisy izay navelany afa-tsy ny madinika teo amin’ny tany. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Nitondra an’i Joiakina koa ho babo any Babilona izy; ary ny renin’ny mpanjaka, ny vadin’ny mpanjaka, ny tandapa ary ny lehilahy mahery amin’ny tany dia noentiny ho babo avy tany Jerosalema ho any Babilona. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ny lehilahy mahery rehetra, fito arivo, mbamin’ny mpahay taozavatra sy ny mpanefy arivo lahy, izay samy mahery sy mahay miady, dia noentin’ny mpanjakan’i Babilona ho babo tany Babilona avokoa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ary i Matania, rahalahin-drainy, no notendren’ny mpanjakan’i Babilona ho mpanjaka hisolo an’i Joiakina ka novany hoe Zedekia ny anarany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: I Zedekia, mpanjakan’ny Joda
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Jer 52.1-3; 2Tan 36.11-12
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Iraika amby roapolo taona i Zedekia raha nanomboka nanjaka, ary iraika amby folo taona no nanjakany tany Jerosalema. Ny anaran’ny reniny dia Hamotala, zanakavavin’i Jeremia, avy any Libna. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Nanao izay ratsy teo imason’NY TOMPO izy, tahaka izay rehetra nataon’i Joiakima. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Fa ny fahatezeran’NY TOMPO no nahatongavan’izany tamin’i Jerosalema sy ny Joda ambara-pandroahany azy tsy ho eo anatrehany. Ary nikomy tamin’ny mpanjakan’i Babilona i Zedekia.
