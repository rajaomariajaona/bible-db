document_id: 2KI.24,3103
type_code: plt
verses:
  '1':
  - type: text
    content: 'Tamin’ny andro nanjakan’i Joiakima no niakaran’i Nebokadnezara, mpanjakan’i Babilona. Nanoa azy nandritra ny telo taona i Joiakima; nivadika anefa izy ka nikomy taminy. '
  '10':
  - type: text
    content: 'Tamin’izany andro izany no niakaran’ny mpanompon’i Nebokadnezara, mpanjakan’i Babilona, hamely an’i Jerosalema, ary nataony fahirano ny tanàna. '
  '11':
  - type: text
    content: 'Dia tonga koa i Nebokadnezara, mpanjakan’i Babilona, hamely ny tanàna, raha mbola nanao fahirano azy ny mpanompony. '
  '12':
  - type: text
    content: 'Dia nandeha nankany amin’ny mpanjakan’i Babilona i Joiakina, mpanjakan’ny Joda, dia izy sy ny reniny, ny mpanompony, ny mpanapaka ary ny tandapany. Noentin’ny mpanjakan’i Babilona izy tamin’ny taona fahavalo nanjakany. '
  '13':
  - type: text
    content: 'Ary navoakan’i Nebokadnezara ny harena rehetra tao amin’ny tranon’NY TOMPO sy ny harena tao amin’ny tranon’ny mpanjaka dia nendahany ny volamena rehetra izay nataon’i Solomona, mpanjakan’ny Israely, tao amin’ny tempolin’NY TOMPO, araka izay nolazain’NY TOMPO. '
  '14':
  - type: text
    content: 'Noentiny ho babo ny tao Jerosalema rehetra sy ny manamboninahitra rehetra ary ny lehilahy mahery rehetra, dia olona iray alina mbamin’ny mpahay taozavatra rehetra sy ny mpanefy, tsy nisy izay navelany afa-tsy ny madinika teo amin’ny tany. '
  '15':
  - type: text
    content: 'Nitondra an’i Joiakina koa ho babo any Babilona izy; ary ny renin’ny mpanjaka, ny vadin’ny mpanjaka, ny tandapa ary ny lehilahy mahery amin’ny tany dia noentiny ho babo avy tany Jerosalema ho any Babilona. '
  '16':
  - type: text
    content: Ny lehilahy mahery rehetra, fito arivo, mbamin’ny mpahay taozavatra sy ny mpanefy arivo lahy, izay samy mahery sy mahay miady, dia noentin’ny mpanjakan’i Babilona ho babo tany Babilona avokoa.
  '17':
  - type: text
    content: Ary i Matania, rahalahin-drainy, no notendren’ny mpanjakan’i Babilona ho mpanjaka hisolo an’i Joiakina ka novany hoe Zedekia ny anarany.
  - type: heading
    content: I Zedekia, mpanjakan’ny Joda
  - type: heading
    content: Jer 52.1-3; 2Tan 36.11-12
  '18':
  - type: text
    content: 'Iraika amby roapolo taona i Zedekia raha nanomboka nanjaka, ary iraika amby folo taona no nanjakany tany Jerosalema. Ny anaran’ny reniny dia Hamotala, zanakavavin’i Jeremia, avy any Libna. '
  '19':
  - type: text
    content: 'Nanao izay ratsy teo imason’NY TOMPO izy, tahaka izay rehetra nataon’i Joiakima. '
  '2':
  - type: text
    content: Ary NY TOMPO nandefa ny miaramilan’ny Kaldeana, ny miaramilan’ny Arameana, ny miaramilan’i Moaba ary ny miaramilan’ny taranak’i Amona hiady aminy; nampandehaniny hiady amin’i Joda ireo mba handrava azy araka ny tenin’NY TOMPO izay nampilazainy ny mpaminany mpanompony.
  '20':
  - type: text
    content: Fa ny fahatezeran’NY TOMPO no nahatongavan’izany tamin’i Jerosalema sy ny Joda ambara-pandroahany azy tsy ho eo anatrehany. Ary nikomy tamin’ny mpanjakan’i Babilona i Zedekia.
  '3':
  - type: text
    content: 'Araka ny tenin’NY TOMPO ihany no nahatongavan’izany tamin’i Joda ka nanesorany azy tsy ho eo imasony noho ny fahotan’i Manase, noho izay rehetra nataony '
  '4':
  - type: text
    content: sy noho ny ran’ny tsy manan-tsiny izay nalatsany koa; fa nofenoiny ran’ny tsy manan-tsiny i Jerosalema. Izany no tsy netezan’NY TOMPO hamela ny helony.
  '5':
  - type: text
    content: 'Ny tantaran’i Joiakima sisa mbamin’izay rehetra nataony, tsy voasoratra ao amin’ny bokin’ny tantaran’ny mpanjakan’ny Joda va izany? '
  '6':
  - type: text
    content: 'Ary nodimandry any amin’ny razany i Joiakima ka i Joiakina zanany no nanjaka nandimby azy. '
  '7':
  - type: text
    content: Ary tsy nivoaka avy tany amin’ny taniny intsony ny mpanjakan’i Ejipta; fa lasan’ny mpanjakan’i Babilona izay rehetra an’ny mpanjakan’i Ejipta, hatrany amin’ny lohasahan-driakan’i Ejipta ka hatrany amin’ny ony Eofrata.
  - type: heading
    content: I Joiakina, mpanjakan’ny Joda; ny fahababoana voalohany
  - type: heading
    content: 2Tan 36.9-10
  '8':
  - type: text
    content: 'Valo amby folo taona i Joiakina raha nanomboka nanjaka, ary telo volana no nanjakany tany Jerosalema. Ny anaran’ny reniny dia Nehosta, zanakavavin’i Elnatana avy any Jerosalema. '
  '9':
  - type: text
    content: Nanao izay ratsy teo imason’NY TOMPO izy, tahaka izay rehetra nataon’ny rainy.
