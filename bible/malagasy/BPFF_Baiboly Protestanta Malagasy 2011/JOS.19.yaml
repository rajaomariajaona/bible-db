  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'avy eo mitodika miantsinanana ho any Bety-Dagona, mihatra amin’i Zebolona, ny lohasaha Jifta-Ela any avaratra, i Bety-Emeka, i Neiela, mihatra amin’i Kabola eo ankavia, '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'i Ebrona, i Rehoba, i Hamona, i Kana, hatrany Sidona lehibe, '
