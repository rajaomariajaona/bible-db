    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ny anjara faharoa azo tamin’ny antsapaka dia azon’i Simeona, dia ny fokon’i Simeona isam-pianakaviany; ary ny lovany dia tao anatin’ny lovan’ny taranak’i Joda. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ny anjara fahatelo azo tamin’ny antsapaka dia azon’ny taranak’i Zebolona isam-pianakaviany; ny sisintanin’ny lovany dia hatrany Sarida, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'miakatra miankandrefana hatrany Marala, mahazo an’i Dabeseta, mihatra amin’ny lohasahan-driaka tandrifin’i Jokneama; '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'mitodika miantsinanana hatrany Sarida, hatramin’ny sisintanin’i Kislota-Tabara, mandroso hatrany Daberata, miakatra hatrany Jafia, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'mandroso miantsinanana hatrany Gata-Hefera sy Ita-Kazina, mandroso hatrany Rimona, izay mipaka any Nea, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'miolaka eo avaratr’iny ka mahazo an’i Hanatona, mihatra amin’ny lohasaha Jifta-Ela. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Ary i Katata, i Nahalola, i Simrona, Idala ary i Betlehema, dia tanàna roa amby folo sy ny vohitra miankina aminy. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Izany no lovan’ny taranak’i Zebolona araka ny fianakaviany, dia ireo tanàna ireo mbamin’ny vohitra miankina aminy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny zaratanin’Isakara
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Ny anjara fahefatra azo tamin’ny antsapaka dia azon’Isakara, dia ny taranak’Isakara isam-pianakaviany. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Ny sisintaniny dia hatrany Jezirela, i Kesolota, i Sonema, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'i Hafraima, i Siona, i Anaharata, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Ary izao no azony ho lovany: i Bery-Sheba na i Seba, i Molada, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
