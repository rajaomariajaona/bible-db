    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'i Remeta, i Eny-Ganima, i Eny-Hada ary i Bety-Pazeza. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Ary ny faritaniny dia mahazo an’i Tabara, i Sahazoma, i Bety-Semesy, ka nihatra tany Jordana: Tanàna enina amby folo mbamin’ny vohitra miankina aminy. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Ireo no lovan’ny foko taranak’Isakara araka ny fianakaviany, dia ireo tanàna ireo mbamin’ny vohitra miankina aminy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny zaratanin’i Asera
    marker-yv: yv-h
