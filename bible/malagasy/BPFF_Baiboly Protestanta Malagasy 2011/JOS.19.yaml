document_id: JOS.19,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny zaratanin’i Simeona
  - type: heading
    content: 1Tan 4.28-33
  - type: text
    content: 'Ny anjara faharoa azo tamin’ny antsapaka dia azon’i Simeona, dia ny fokon’i Simeona isam-pianakaviany; ary ny lovany dia tao anatin’ny lovan’ny taranak’i Joda. '
  '10':
  - type: text
    content: 'Ny anjara fahatelo azo tamin’ny antsapaka dia azon’ny taranak’i Zebolona isam-pianakaviany; ny sisintanin’ny lovany dia hatrany Sarida, '
  '11':
  - type: text
    content: 'miakatra miankandrefana hatrany Marala, mahazo an’i Dabeseta, mihatra amin’ny lohasahan-driaka tandrifin’i Jokneama; '
  '12':
  - type: text
    content: 'mitodika miantsinanana hatrany Sarida, hatramin’ny sisintanin’i Kislota-Tabara, mandroso hatrany Daberata, miakatra hatrany Jafia, '
  '13':
  - type: text
    content: 'mandroso miantsinanana hatrany Gata-Hefera sy Ita-Kazina, mandroso hatrany Rimona, izay mipaka any Nea, '
  '14':
  - type: text
    content: 'miolaka eo avaratr’iny ka mahazo an’i Hanatona, mihatra amin’ny lohasaha Jifta-Ela. '
  '15':
  - type: text
    content: 'Ary i Katata, i Nahalola, i Simrona, Idala ary i Betlehema, dia tanàna roa amby folo sy ny vohitra miankina aminy. '
  '16':
  - type: text
    content: Izany no lovan’ny taranak’i Zebolona araka ny fianakaviany, dia ireo tanàna ireo mbamin’ny vohitra miankina aminy.
  - type: heading
    content: Ny zaratanin’Isakara
  '17':
  - type: text
    content: 'Ny anjara fahefatra azo tamin’ny antsapaka dia azon’Isakara, dia ny taranak’Isakara isam-pianakaviany. '
  '18':
  - type: text
    content: 'Ny sisintaniny dia hatrany Jezirela, i Kesolota, i Sonema, '
  '19':
  - type: text
    content: 'i Hafraima, i Siona, i Anaharata, '
  '2':
  - type: text
    content: 'Ary izao no azony ho lovany: i Bery-Sheba na i Seba, i Molada, '
  '20':
  - type: text
    content: 'i Rabita, i Kisiona, i Abeza, '
  '21':
  - type: text
    content: 'i Remeta, i Eny-Ganima, i Eny-Hada ary i Bety-Pazeza. '
  '22':
  - type: text
    content: 'Ary ny faritaniny dia mahazo an’i Tabara, i Sahazoma, i Bety-Semesy, ka nihatra tany Jordana: Tanàna enina amby folo mbamin’ny vohitra miankina aminy. '
  '23':
  - type: text
    content: Ireo no lovan’ny foko taranak’Isakara araka ny fianakaviany, dia ireo tanàna ireo mbamin’ny vohitra miankina aminy.
  - type: heading
    content: Ny zaratanin’i Asera
  '24':
  - type: text
    content: 'Ny anjara fahadimy azo tamin’ny antsapaka dia azon’ny fokon’i Asera isam-pianakaviany. '
  '25':
  - type: text
    content: 'Ny sisintaniny dia i Helkata, i Haly, i Batena, i Aksafa, '
  '26':
  - type: text
    content: 'i Alameleka, i Amada ary i Misala, dia mihatra amin’i Karmela eo andrefana sy i Sihora-Libnata, '
  '27':
  - type: text
    content: 'avy eo mitodika miantsinanana ho any Bety-Dagona, mihatra amin’i Zebolona, ny lohasaha Jifta-Ela any avaratra, i Bety-Emeka, i Neiela, mihatra amin’i Kabola eo ankavia, '
  '28':
  - type: text
    content: 'i Ebrona, i Rehoba, i Hamona, i Kana, hatrany Sidona lehibe, '
  '29':
  - type: text
    content: 'mitodika hatrany Rama sy hatrany Tiro, tanàna mimanda, mitodika hatrany Hosa, mihatra amin’ny ranomasina eo akaikin’ny tany Akziba, '
  '3':
  - type: text
    content: 'i Hazara-Soala, i Baala, i Azema, '
  '30':
  - type: text
    content: 'i Oma, i Afeka ary i Rehoba: Tanàna roa amby roapolo mbamin’ny vohitra miankina aminy. '
  '31':
  - type: text
    content: Izany no lovan’ny foko taranak’i Asera araka ny fianakaviany, dia ireo tanàna ireo sy ny vohitra miankina aminy.
  - type: heading
    content: Ny zaratanin’i Naftaly
  '32':
  - type: text
    content: 'Ny anjara fahenina azo tamin’ny antsapaka dia an’ny taranak’i Naftaly isam-pianakaviany. '
  '33':
  - type: text
    content: 'Ny sisintaniny dia hatrany Halefa ka hatrany amin’ny hazo '
  - type: text
    content: terebinta
  - type: text
    content: ' ao Zananima, hatrany Adamy-Hanekeba, i Jabniela, hatrany Lakoma, mihatra tamin’i Jordana, '
  '34':
  - type: text
    content: 'mitodika miankandrefana hatrany Aznota-Tabara, mandroso hatrany Hokoka, mihatra amin’i Zebolona eo atsimo sy i Asera eo andrefana ary Joda amoron’i Jordana eo atsinanana. '
  '35':
  - type: text
    content: 'Ary ny tanàna mimanda dia i Zidima, i Zera, i Hamata, i Rakata, i Kinereta, '
  '36':
  - type: text
    content: 'i Adama, i Rama, i Hazora, '
  '37':
  - type: text
    content: 'i Kadesy, i Edrehy, i Eny-Hazora, '
  '38':
  - type: text
    content: 'Irona, i Migdala-Ela, i Horema, i Bety-Anata ary i Bety-Semesy: Tanàna sivy amby folo mbamin’ny vohitra miankina aminy. '
  '39':
  - type: text
    content: Ireo no lovan’ny fokon’i Naftaly araka ny fianakaviana, dia ireo tanàna ireo mbamin’ny vohitra miankina aminy.
  - type: heading
    content: Ny zaratanin’i Dana
  '4':
  - type: text
    content: 'i Eltolada, i Betola, i Horma, '
  '40':
  - type: text
    content: 'Ny anjara fahafito azo tamin’ny antsapaka dia an’ny fokon’i Dana araka ny fianakaviany. '
  '41':
  - type: text
    content: 'Ary ny faritanin’ny lovany dia i Zora, i Estaola, Ira-Semesy, '
  '42':
  - type: text
    content: 'i Salabima, i Aialona, i Jitla, '
  '43':
  - type: text
    content: 'i Elona, i Timna, i Ekrona, '
  '44':
  - type: text
    content: 'i Elteke, i Gibetona, i Balata, '
  '45':
  - type: text
    content: 'i Jehoda, i Bene-Beraka, i Gata-Rimona, '
  '46':
  - type: text
    content: i Me-Jarkona, i Rakona ary ny tany tandrifin’i Jopa.
  '47':
  - type: text
    content: 'Ny sisintanin’ny taranak’i Dana dia nandroso nihoatra ireo; fa niakatra ny taranak’i Dana, dia niady tamin’i Lesema ka naharesy azy ary namely azy tamin’ny lelan-tsabatra ka nahazo azy, dia nitoetra teo; ary ny anaran’i Lesema nataony hoe Dana araka ny anaran’i Dana rainy. '
  '48':
  - type: text
    content: Izany no lovan’ny fokon’i Dana araka ny fianakaviany, dia ireo tanàna ireo sy ny vohitra miankina aminy.
  - type: heading
    content: Ny nanomezana an’i Josoa ny tanàna tao Timnata-Sera
  '49':
  - type: text
    content: 'Rehefa vitan’ny zanak’Israely ny fizarana ny tany holovany araka ny sisintaniny avy dia nomeny lova teo aminy koa i Josoa, zanak’i Nona. '
  '5':
  - type: text
    content: 'i Ziklaga, i Bety-Markabota, i Hazara-Sosa, '
  '50':
  - type: text
    content: Araka ny tenin’NY TOMPO dia nomeny azy ny tanàna izay nangatahiny, dia i Timnata-Sera any amin’ny tany havoanan’i Efraima; dia namboarin’i Josoa ilay tanàna ka nitoerany.
  '51':
  - type: text
    content: 'Ireo no lova izay nozarain’i Eleazara mpisorona sy i Josoa, zanak’i Nona, ary ny lohan’ny fianakaviana tamin’ny fokon’ny Zanak’Israely tao Silo teo anatrehan’NY TOMPO, dia teo am-baravaran’ny '
  - type: text
    content: tranolay fihaonana
  - type: text
    content: ', araka ny antsapaka. Ary vitany avokoa ny fizarany ny tany.'
  '6':
  - type: text
    content: 'i Bety-Lebaota ary i Sarohena: Tanàna telo amby folo mbamin’ny vohitra miankina aminy; '
  '7':
  - type: text
    content: 'i Aina, i Rimona, i Etera, ary i Asana: Tanàna efatra mbamin’ny vohitra miankina aminy; '
  '8':
  - type: text
    content: 'ary ny vohitra miankina aminy rehetra manodidina ireo tanàna ireo hatrany Baleta-Bera sy i Rama amin’ny Negeva. Ireo no lovan’ny foko taranak’i Simeona araka ny fianakaviany. '
  '9':
  - type: text
    content: Avy tamin’ny anjaran’ny taranak’i Joda no nahazoan’ny taranak’i Simeona ny lovany; fa nalalaka loatra taminy ny anjaran’ny taranak’i Joda, koa izany no nahazoan’ny taranak’i Simeona anjara tao anatin’ny azy.
  - type: heading
    content: Ny zaratanin’i Zebolona
