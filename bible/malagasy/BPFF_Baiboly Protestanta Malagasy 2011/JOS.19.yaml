  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: 'i Jehoda, i Bene-Beraka, i Gata-Rimona, '
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: i Me-Jarkona, i Rakona ary ny tany tandrifin’i Jopa.
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: 'Ny sisintanin’ny taranak’i Dana dia nandroso nihoatra ireo; fa niakatra ny taranak’i Dana, dia niady tamin’i Lesema ka naharesy azy ary namely azy tamin’ny lelan-tsabatra ka nahazo azy, dia nitoetra teo; ary ny anaran’i Lesema nataony hoe Dana araka ny anaran’i Dana rainy. '
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: Izany no lovan’ny fokon’i Dana araka ny fianakaviany, dia ireo tanàna ireo sy ny vohitra miankina aminy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nanomezana an’i Josoa ny tanàna tao Timnata-Sera
    marker-yv: yv-h
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: 'Rehefa vitan’ny zanak’Israely ny fizarana ny tany holovany araka ny sisintaniny avy dia nomeny lova teo aminy koa i Josoa, zanak’i Nona. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'i Ziklaga, i Bety-Markabota, i Hazara-Sosa, '
  '50':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '50'
    - type: text
      text: Araka ny tenin’NY TOMPO dia nomeny azy ny tanàna izay nangatahiny, dia i Timnata-Sera any amin’ny tany havoanan’i Efraima; dia namboarin’i Josoa ilay tanàna ka nitoerany.
  '51':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '51'
    - type: text
      text: 'Ireo no lova izay nozarain’i Eleazara mpisorona sy i Josoa, zanak’i Nona, ary ny lohan’ny fianakaviana tamin’ny fokon’ny Zanak’Israely tao Silo teo anatrehan’NY TOMPO, dia teo am-baravaran’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: tranolay fihaonana
    - type: text
      text: ', araka ny antsapaka. Ary vitany avokoa ny fizarany ny tany.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'i Bety-Lebaota ary i Sarohena: Tanàna telo amby folo mbamin’ny vohitra miankina aminy; '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'i Aina, i Rimona, i Etera, ary i Asana: Tanàna efatra mbamin’ny vohitra miankina aminy; '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'ary ny vohitra miankina aminy rehetra manodidina ireo tanàna ireo hatrany Baleta-Bera sy i Rama amin’ny Negeva. Ireo no lovan’ny foko taranak’i Simeona araka ny fianakaviany. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Avy tamin’ny anjaran’ny taranak’i Joda no nahazoan’ny taranak’i Simeona ny lovany; fa nalalaka loatra taminy ny anjaran’ny taranak’i Joda, koa izany no nahazoan’ny taranak’i Simeona anjara tao anatin’ny azy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny zaratanin’i Zebolona
    marker-yv: yv-h
