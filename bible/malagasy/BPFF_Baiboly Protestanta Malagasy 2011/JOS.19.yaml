  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Ny sisintaniny dia i Helkata, i Haly, i Batena, i Aksafa, '
