    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'mitodika hatrany Rama sy hatrany Tiro, tanàna mimanda, mitodika hatrany Hosa, mihatra amin’ny ranomasina eo akaikin’ny tany Akziba, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'i Hazara-Soala, i Baala, i Azema, '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'i Oma, i Afeka ary i Rehoba: Tanàna roa amby roapolo mbamin’ny vohitra miankina aminy. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Izany no lovan’ny foko taranak’i Asera araka ny fianakaviany, dia ireo tanàna ireo sy ny vohitra miankina aminy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny zaratanin’i Naftaly
    marker-yv: yv-h
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Ny anjara fahenina azo tamin’ny antsapaka dia an’ny taranak’i Naftaly isam-pianakaviany. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Ny sisintaniny dia hatrany Halefa ka hatrany amin’ny hazo '
    - type: usfm
      marker: w
      children:
      - type: text
        text: terebinta
    - type: text
      text: ' ao Zananima, hatrany Adamy-Hanekeba, i Jabniela, hatrany Lakoma, mihatra tamin’i Jordana, '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'mitodika miankandrefana hatrany Aznota-Tabara, mandroso hatrany Hokoka, mihatra amin’i Zebolona eo atsimo sy i Asera eo andrefana ary Joda amoron’i Jordana eo atsinanana. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Ary ny tanàna mimanda dia i Zidima, i Zera, i Hamata, i Rakata, i Kinereta, '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'i Adama, i Rama, i Hazora, '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'i Kadesy, i Edrehy, i Eny-Hazora, '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Irona, i Migdala-Ela, i Horema, i Bety-Anata ary i Bety-Semesy: Tanàna sivy amby folo mbamin’ny vohitra miankina aminy. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
