document_id: PRO.17,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsara ny sombi-mofo maina misy fiadanana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: noho ny trano feno hena misy fifandirana.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny anatra iray dia mandaitra kokoa amin’ny hendry
  - type: usfm
    marker: q1
    children:
    - type: text
      text: noho ny kapoka injato amin’ny adala.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny maditra dia fatra-pitady ny fikomiana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka iraka lozabe no irahina hamely azy.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aleo mifanena amin’ny bera very anaka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toy izay amin’ny adala ao anatin’ny hadalany.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay mamaly ratsy ny soa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia tsy hialan’ny ratsy ao an-tranony.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny manomboka ady dia toy ny manata-drano;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: koa ilaozy ny fifandirana dieny tsy mbola mifandramatra.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay manamarina ny meloka na izay manameloka ny marina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia samy fahavetavetana eo imason’NY TOMPO.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hatao inona re ity vola an-tanan’ny adala?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hamidy fahendrena va? Tsy manan-tsaina akory izy!
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay tena sakaiza tokoa dia tia amin’ny andro rehetra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny rahalahy dia nateraka hamonjy amin’ny fahoriana.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Olona tsy ampy saina izay mifandray tanana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hiantoka ny sakaizany.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay tia ady dia tia heloka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary izay manao vavahady avo, mitady faharavana.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny mpanompo hendry dia mifehy ny zanaka manao izay mahamenatra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hiray lova amin’ny mpirahalahy izy.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay fo maditra dia tsy hahita soa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary izay manana lela mandainga hivarina any amin’ny loza.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay miteraka adala dia hahazo alahelo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny rain’ny adala tsy mba manam-pifaliana.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fo ravoravo dia mahasalama tsara,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny fanahy kivy mahamaina ny taolana.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny ratsy fanahy dia mandray kolikoly avy any anaty lamba
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoentiny mamadika ny rariny.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eo anoloan’ny manan-tsaina ny fahendrena,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny mason’ny adala dia mibirioka any amin’ny faran’ny tany.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny zanaka adala dia mampalahelo ny rainy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady fahoriana mangidy amin’ny reniny niteraka azy.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy mety ny mampandoa sazy ny marina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na mamely ny manankaja tsy amin’ny rariny.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay mahafihim-bava no manam-pahalalana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary izay mahatsindry fo no manan-tsaina.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na ny adala aza raha tsy miteny dia toa hendry,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary izay mahafihina ny molony dia manan-tsaina.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny memy dia ho famantarana ny tena volafotsy ary ny fatana fandrendrehana ho famantarana ny tena volamena,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa NY TOMPO kosa no Mpamantatra ny fo.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny mpanao ratsy dia manongilan-tsofina amin’ny molotra mandainga
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny mpandainga mihaino ny lela mampidi-doza.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manala baraka ny Mpanao azy izay mihomehy ny mahantra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary izay faly amin’ny loza mitranga dia tsy ho afa-tsiny.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Satroboninahitry ny antitra ny zafiny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary voninahitry ny zanaka ny rainy.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy mendrika ny adala ny manao teny jadona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary vao mainka tsy tokony ho an’ny olo-manankaja ny molotra mandainga.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny kolikoly dia heverin’izay manao azy ho toy ny vatosoa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka na aiza na aiza no alehany dia ambinina ihany izy.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay mikatsaka ny fihavanana dia manarona heloka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa izay mamohafoha heloka mampisaraka ny tena mpisakaiza.
