document_id: PRO.17
type_code: plt
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Tsara ny sombi-mofo maina misy fiadanana
- type: usfm
  marker: q1
  children:
  - type: text
    text: noho ny trano feno hena misy fifandirana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ny mpanompo hendry dia mifehy ny zanaka manao izay mahamenatra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hiray lova amin’ny mpirahalahy izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ny memy dia ho famantarana ny tena volafotsy ary ny fatana fandrendrehana ho famantarana ny tena volamena,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa NY TOMPO kosa no Mpamantatra ny fo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ny mpanao ratsy dia manongilan-tsofina amin’ny molotra mandainga
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny mpandainga mihaino ny lela mampidi-doza.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Manala baraka ny Mpanao azy izay mihomehy ny mahantra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary izay faly amin’ny loza mitranga dia tsy ho afa-tsiny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Satroboninahitry ny antitra ny zafiny
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary voninahitry ny zanaka ny rainy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Tsy mendrika ny adala ny manao teny jadona
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary vao mainka tsy tokony ho an’ny olo-manankaja ny molotra mandainga.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ny kolikoly dia heverin’izay manao azy ho toy ny vatosoa
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka na aiza na aiza no alehany dia ambinina ihany izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Izay mikatsaka ny fihavanana dia manarona heloka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa izay mamohafoha heloka mampisaraka ny tena mpisakaiza.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ny anatra iray dia mandaitra kokoa amin’ny hendry
- type: usfm
  marker: q1
  children:
  - type: text
    text: noho ny kapoka injato amin’ny adala.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ny maditra dia fatra-pitady ny fikomiana
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka iraka lozabe no irahina hamely azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Aleo mifanena amin’ny bera very anaka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: toy izay amin’ny adala ao anatin’ny hadalany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Izay mamaly ratsy ny soa
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia tsy hialan’ny ratsy ao an-tranony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ny manomboka ady dia toy ny manata-drano;
- type: usfm
  marker: q1
  children:
  - type: text
    text: koa ilaozy ny fifandirana dieny tsy mbola mifandramatra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Izay manamarina ny meloka na izay manameloka ny marina
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia samy fahavetavetana eo imason’NY TOMPO.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Hatao inona re ity vola an-tanan’ny adala?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hamidy fahendrena va? Tsy manan-tsaina akory izy!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Izay tena sakaiza tokoa dia tia amin’ny andro rehetra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny rahalahy dia nateraka hamonjy amin’ny fahoriana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Olona tsy ampy saina izay mifandray tanana
- type: usfm
  marker: q1
  children:
  - type: text
    text: hiantoka ny sakaizany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Izay tia ady dia tia heloka
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary izay manao vavahady avo, mitady faharavana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Izay fo maditra dia tsy hahita soa
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary izay manana lela mandainga hivarina any amin’ny loza.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Izay miteraka adala dia hahazo alahelo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny rain’ny adala tsy mba manam-pifaliana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ny fo ravoravo dia mahasalama tsara,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny fanahy kivy mahamaina ny taolana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ny ratsy fanahy dia mandray kolikoly avy any anaty lamba
- type: usfm
  marker: q1
  children:
  - type: text
    text: hoentiny mamadika ny rariny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Eo anoloan’ny manan-tsaina ny fahendrena,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny mason’ny adala dia mibirioka any amin’ny faran’ny tany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Ny zanaka adala dia mampalahelo ny rainy
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady fahoriana mangidy amin’ny reniny niteraka azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Tsy mety ny mampandoa sazy ny marina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: na mamely ny manankaja tsy amin’ny rariny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Izay mahafihim-bava no manam-pahalalana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary izay mahatsindry fo no manan-tsaina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Na ny adala aza raha tsy miteny dia toa hendry,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary izay mahafihina ny molony dia manan-tsaina.
