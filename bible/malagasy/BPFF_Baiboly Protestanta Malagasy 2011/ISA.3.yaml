document_id: ISA.3
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny korontana ao amin’ny fanjakana Joda
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Indro NY TOMPO Andriamanitra, Tompon’izao rehetra izao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: manaisotra amin’i Jerosalema sy Joda
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny andry sy tohana rehetra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ny sakafo rehetra
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny rano rehetra izay tohan’aina,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ny lehilahy mahery fo sy ny mpiady,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny mpitsara sy ny mpaminany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny mpisikidy sy ny loholona,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ny mpifehy dimampolo sy ny manankaja,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny mpanolotsaina sy ny mpahay taozavatra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny mahay ny boredirediky ny mpitana ody.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Hanendry ankizilahy ho lehibeny Aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary haitraitran-jaza no hitondran’ireo azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Hifampijaly ny vahoaka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia izy samy izy sy ny namany avy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny tanora dia hihetraketraka amin’ny zokiolona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny tsinontsinona amin’ny manankaja.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Hisy olona hohazonin’ny rahalahiny
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ao an-tranon’ny rainy ka hitenenany hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ianao no manana fitafiana ka aoka ho mpanapaka aminay!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary aoka ho andraikitrao izao faharavana izao!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dia hanangam-peo izy amin’izany andro izany hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy mpitsabo aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy misy hanina na fitafiana ao an-tranoko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: koa tsy azonareo apetraka ho mpanapaka amin’ny olona aho!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Fa tafintohina i Jerosalema
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary potraka i Joda
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria ny lelany sy ny asany dia samy manohitra NY TOMPO
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hikomy eo anatrehan’ny voninahiny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Miampanga azy ny fisehon’ny tarehiny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mampiharihary ny fahotany tahaka an’i Sodoma izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy manafina azy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Loza ny manjo azy!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa mampidi-doza amin’ny tenany izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Lazao hoe: Hahita soa ny marina,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny vokatry ny asany no hohaniny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Loza no hanjo ny ratsy fanahy!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Satria ny valin’ny nataon’ny tanany ihany no hanody azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ny amin’ny oloko dia zaza no mampahory azy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary vehivavy no mitondra azy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ry oloko ô, ny mpitarika anao no mampivily anao
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady mandrava ny lalana alehanao.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fitsarana ireo mpitarika ny Israely
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Mitsangana handahatra NY TOMPO
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mijoro hitsara ny olona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Miampanga ny loholona sy ny lehiben’ny olony
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'amin’ny fitsarana NY TOMPO hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ripakareo ny tanim-boaloboka!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ao an-tranonareo ny fananan’ny mahantra izay efa nalainareo an-keriny!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Nahoana no dia hosihosenareo ny oloko
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary torotoroinareo ny tavan’ny madinika?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hoy NY TOMPO, Andriamanitra Tompon’izao rehetra izao.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny famaizana ny zanakavavin’i Jerosalema
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Hoy NY TOMPO: Satria miavona ireo zanakavavin’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Ziona
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka mandeha mianjonanjona
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy manao maso meloka
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady kasikasy fandeha
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mampikorintsandrintsana ny fehin-tongony,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: dia hataon’ny Tompo feno takompery ny tampon-dohan’ny zanakavavin’i Ziona
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hahanjahanjan’NY TOMPO ny tampon-kandriny.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Amin’izany andro izany dia hesorin’NY TOMPO ny firavaka rehetra: Ny fehin-tongotra, ny sarondoha, ny firavaka sarim-bolan-tsinana, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'ny kavina, ny rojo, ny fisalobonana, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'ny satroka, ny rojo parapaingo, ny fehikibo misy haingony, ny fitoeran-dranomanitra, ny ody fiambozonany, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'ny peratra, ny kavin’orona, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'ny akanjo fihaingoana, ny akanjobe fanao ivelany, ny salotra, ny poketra, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ny fitaratra, ny atin’akanjo, ny fehiloha ary ny lamba fisaronana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Hosoloana zavatra maimbo ny ranomanitra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hosoloana mahazaka ny fehikibo tsara;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hosoloana loha sola ny volo voavoatra tsara;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hosoloana akanjo fisaonana ny akanjo mirebareba
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hosoloana marika amin’ny vy mahamay ny hatsaran-tarehy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny mpitondratenan’i Jerosalema
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Ho lavon-tsabatra ny lehilahy ao aminao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ho faty an’ady ny lehilahy mahery fo ao aminao
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ka hitomany sy hisaona ny vavahadiny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho foana ny tanàna ka hitorovoka amin’ny tany.
