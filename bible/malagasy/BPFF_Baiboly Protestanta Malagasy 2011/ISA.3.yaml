document_id: ISA.3,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny korontana ao amin’ny fanjakana Joda
  - type: text
    content: Indro NY TOMPO Andriamanitra, Tompon’izao rehetra izao,
  - type: text
    content: manaisotra amin’i Jerosalema sy Joda
  - type: text
    content: ny andry sy tohana rehetra,
  - type: text
    content: dia ny sakafo rehetra
  - type: text
    content: sy ny rano rehetra izay tohan’aina,
  '10':
  - type: text
    content: 'Lazao hoe: Hahita soa ny marina,'
  - type: text
    content: fa ny vokatry ny asany no hohaniny.
  '11':
  - type: text
    content: Loza no hanjo ny ratsy fanahy!
  - type: text
    content: Satria ny valin’ny nataon’ny tanany ihany no hanody azy.
  '12':
  - type: text
    content: Ny amin’ny oloko dia zaza no mampahory azy,
  - type: text
    content: ary vehivavy no mitondra azy.
  - type: text
    content: Ry oloko ô, ny mpitarika anao no mampivily anao
  - type: text
    content: sady mandrava ny lalana alehanao.
  - type: heading
    content: Ny fitsarana ireo mpitarika ny Israely
  '13':
  - type: text
    content: Mitsangana handahatra NY TOMPO
  - type: text
    content: ary mijoro hitsara ny olona.
  '14':
  - type: text
    content: Miampanga ny loholona sy ny lehiben’ny olony
  - type: text
    content: 'amin’ny fitsarana NY TOMPO hoe:'
  - type: text
    content: Ripakareo ny tanim-boaloboka!
  - type: text
    content: Ary ao an-tranonareo ny fananan’ny mahantra izay efa nalainareo an-keriny!
  '15':
  - type: text
    content: Nahoana no dia hosihosenareo ny oloko
  - type: text
    content: ary torotoroinareo ny tavan’ny madinika?
  - type: text
    content: Hoy NY TOMPO, Andriamanitra Tompon’izao rehetra izao.
  - type: heading
    content: Ny famaizana ny zanakavavin’i Jerosalema
  '16':
  - type: text
    content: 'Hoy NY TOMPO: Satria miavona ireo zanakavavin’i '
  - type: text
    content: Ziona
  - type: text
    content: ka mandeha mianjonanjona
  - type: text
    content: sy manao maso meloka
  - type: text
    content: sady kasikasy fandeha
  - type: text
    content: ary mampikorintsandrintsana ny fehin-tongony,
  '17':
  - type: text
    content: dia hataon’ny Tompo feno takompery ny tampon-dohan’ny zanakavavin’i Ziona
  - type: text
    content: ary hahanjahanjan’NY TOMPO ny tampon-kandriny.
  '18':
  - type: text
    content: 'Amin’izany andro izany dia hesorin’NY TOMPO ny firavaka rehetra: Ny fehin-tongotra, ny sarondoha, ny firavaka sarim-bolan-tsinana, '
  '19':
  - type: text
    content: 'ny kavina, ny rojo, ny fisalobonana, '
  '2':
  - type: text
    content: ny lehilahy mahery fo sy ny mpiady,
  - type: text
    content: ny mpitsara sy ny mpaminany,
  - type: text
    content: ny mpisikidy sy ny loholona,
  '20':
  - type: text
    content: 'ny satroka, ny rojo parapaingo, ny fehikibo misy haingony, ny fitoeran-dranomanitra, ny ody fiambozonany, '
  '21':
  - type: text
    content: 'ny peratra, ny kavin’orona, '
  '22':
  - type: text
    content: 'ny akanjo fihaingoana, ny akanjobe fanao ivelany, ny salotra, ny poketra, '
  '23':
  - type: text
    content: ny fitaratra, ny atin’akanjo, ny fehiloha ary ny lamba fisaronana.
  '24':
  - type: text
    content: Hosoloana zavatra maimbo ny ranomanitra;
  - type: text
    content: hosoloana mahazaka ny fehikibo tsara;
  - type: text
    content: hosoloana loha sola ny volo voavoatra tsara;
  - type: text
    content: hosoloana akanjo fisaonana ny akanjo mirebareba
  - type: text
    content: ary hosoloana marika amin’ny vy mahamay ny hatsaran-tarehy.
  - type: heading
    content: Ny mpitondratenan’i Jerosalema
  '25':
  - type: text
    content: Ho lavon-tsabatra ny lehilahy ao aminao
  - type: text
    content: ary ho faty an’ady ny lehilahy mahery fo ao aminao
  '26':
  - type: text
    content: ka hitomany sy hisaona ny vavahadiny;
  - type: text
    content: ho foana ny tanàna ka hitorovoka amin’ny tany.
  '3':
  - type: text
    content: ny mpifehy dimampolo sy ny manankaja,
  - type: text
    content: ny mpanolotsaina sy ny mpahay taozavatra
  - type: text
    content: ary ny mahay ny boredirediky ny mpitana ody.
  '4':
  - type: text
    content: Hanendry ankizilahy ho lehibeny Aho,
  - type: text
    content: ary haitraitran-jaza no hitondran’ireo azy.
  '5':
  - type: text
    content: Hifampijaly ny vahoaka,
  - type: text
    content: dia izy samy izy sy ny namany avy;
  - type: text
    content: ny tanora dia hihetraketraka amin’ny zokiolona,
  - type: text
    content: ary ny tsinontsinona amin’ny manankaja.
  '6':
  - type: text
    content: Hisy olona hohazonin’ny rahalahiny
  - type: text
    content: 'ao an-tranon’ny rainy ka hitenenany hoe:'
  - type: text
    content: Ianao no manana fitafiana ka aoka ho mpanapaka aminay!
  - type: text
    content: Ary aoka ho andraikitrao izao faharavana izao!
  '7':
  - type: text
    content: 'Dia hanangam-peo izy amin’izany andro izany hoe:'
  - type: text
    content: Tsy mpitsabo aho
  - type: text
    content: ary tsy misy hanina na fitafiana ao an-tranoko;
  - type: text
    content: koa tsy azonareo apetraka ho mpanapaka amin’ny olona aho!
  '8':
  - type: text
    content: Fa tafintohina i Jerosalema
  - type: text
    content: ary potraka i Joda
  - type: text
    content: satria ny lelany sy ny asany dia samy manohitra NY TOMPO
  - type: text
    content: mba hikomy eo anatrehan’ny voninahiny.
  '9':
  - type: text
    content: Miampanga azy ny fisehon’ny tarehiny;
  - type: text
    content: mampiharihary ny fahotany tahaka an’i Sodoma izy
  - type: text
    content: ka tsy manafina azy.
  - type: text
    content: Loza ny manjo azy!
  - type: text
    content: Fa mampidi-doza amin’ny tenany izy.
