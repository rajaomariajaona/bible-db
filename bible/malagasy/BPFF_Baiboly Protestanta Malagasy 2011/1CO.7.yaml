document_id: 1CO.7
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny amin’ny fanambadiana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ny amin’ireo zavatra nosoratanareo tamiko dia tsara amin’ny lehilahy raha tsy mikasi-behivavy akory. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Kanefa noho ny fijangajangana dia aoka samy hanana ny vadiny avy ny lehilahy rehetra ary aoka koa samy hanana ny vadiny avy ny vehivavy rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Aoka hanao izay mety hatao amin’ny vavy ny lahy; ary mba toy izany koa ny vavy amin’ny lahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Tsy ny vavy no manam-pahefana amin’ny tenany fa ny lahy; ary mba toy izany koa, tsy ny lahy no manam-pahefana amin’ny tenany fa ny vavy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Aza misara-pandriana ianareo raha tsy amin’izay fotoana sasany ifanekenareo ho andro hivavahana, nefa miraisa fandriana indray aorianan’izany mba tsy hakan’i Satana fanahy anareo noho ny tsy faharetanareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Famelana malalaka no ilazako izany fa tsy mandidy aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Fa mba tiako ho tahaka ahy ny olona rehetra; kanefa samy manana izay fanomezam-pahasoavana nomen’Andriamanitra azy avy, koa ny iray dia toy izao, ary ny iray kosa dia toy izao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Fa hoy aho amin’ny tsy manambady sy ny mpitondratena: Tsara aminy raha mitoetra tahaka ahy izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Nefa raha tsy maharitra izy dia aoka hanambady ihany; fa tsara ny manambady noho ny ho maimay.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ny manambady dia izao no andidiako azy, nefa tsy izaho fa ny Tompo: Aoka tsy hisaraka amin’ny lahy ny vavy '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: nefa raha misy efa nisaraka dia aoka hitoetra tsy manambady izy, na aoka hody amin’ny lahy; ary aoka ny lahy tsy hisaraka amin’ny vavy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Fa amin’ny sisa dia hoy aho fa tsy ny Tompo: Raha misy rahalahy manambady tsy mino ary manaiky hitoetra aminy ihany ny vavy dia aoka tsy hisaraka aminy izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Raha misy vehivavy manambady tsy mino, ary manaiky hitoetra aminy ihany ny lahy, dia aoka tsy hisaraka aminy izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Fa ny lahy tsy mino dia efa nohamasinina ao amin’ny vavy, ary ny vavy tsy mino dia efa nohamasinina ao amin’ny rahalahy; raha tsy izay dia tsy madio ny zanakareo, kanefa masina izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Fa raha ny tsy mino no te hisaraka dia aoka izy hisaraka. Na ny rahalahy na ny anabavy dia tsy voafehy amin’izany; fa Andriamanitra efa niantso anareo amin’ny fihavanana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Fa ahoana moa no ahafantaranao, Ravehivavy, na ho voavonjinao ny vadinao na tsia? Ary ahoana no ahafantaranao, Ralehilahy, na ho voavonjinao ny vadinao na tsia?
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mandeha araka izay niantsoan’Andriamanitra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Fa aoka ny olona rehetra samy handeha araka izay anjara nomen’ny Tompo azy sy araka ny niantsoan’Andriamanitra azy avy. Ary izany no andidiako any amin’ny fiangonana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.17 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: eklesia.
    marker-yv: yv-n
  - type: text
    text: ' rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Misy va efa voafora fony izy voaantso? Aoka izy tsy hiova ho tsy voafora. Misy va tsy mbola voafora fony izy voaantso? Aoka izy tsy hoforana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Tsinontsinona ny famorana ary tsinontsinona ny tsy famorana; fa ny mitandrina ny didin’Andriamanitra no izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Aoka samy hitoetra eo amin’izay efa niantsoana azy ihany ny olona rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Nantsoina va ianao raha mbola andevo? Aoka tsy hampaninona anao izany; nefa raha misy hahafahanao dia aleo hararaotina izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Fa ny andevo izay voaantso ao amin’ny Tompo dia olona afaka an’ny Tompo; toy izany koa, ny olona afaka izay voaantso dia mpanompon’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Fa olom-boavidy ianareo, koa aza mety ho andevon’olona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Ry rahalahy, aoka ny olona rehetra samy hitoetra eo anatrehan’Andriamanitra, eo amin’izay niantsoana azy avy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ireo olona tsy manambady sy ireo mpitondratena
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Fa ny amin’ny virijiny dia tsy manana didy avy amin’ny Tompo aho, nefa omeko izay hevitro araka izay niantran’ny Tompo ahy ho mahatoky. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Koa heveriko fa noho ny fahoriana miseho ankehitriny dia tsara amin’ny olona ny mitoetra amin’izao ihany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Manambady va ianao? Aza mitady izay hisarahana. Tsy manambady va ianao? Aza mitady vady. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Nefa na dia hanambady aza ianao dia tsy manota tsy akory; ary na dia hanambady aza ny virijiny dia tsy manota izy. Kanefa kosa hanam-pahoriana eo amin’ny fiainany ara-nofo ireny; fa raha izaho dia tsy ta hampiditra anareo amin’izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Fa izao no lazaiko, ry rahalahy: Efa fohy ny andro, koa aoka mba ho toy ny tsy manambady ny manana amin’izao sisa izao; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'aoka mba ho toy izay tsy mitomany ny mitomany; aoka mba ho toy izay tsy mifaly ny mifaly; aoka mba ho toy izay tsy manana ny mividy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ary aoka mba ho toy izay tsy mankafy an’izao fiainana izao loatra ny mampiasa an’izao fiainana izao, fa mandalo ny endrik’izao fiainana izao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Fa tiako tsy ho maro ahiana ianareo. Izay tsy manambady dia miahy ny an’ny Tompo mba hahafaly ny Tompo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Fa izay manambady kosa dia miahy ny an’izao fiainana izao mba hahafaly ny vavy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ary tsy mitovy koa ny vehivavy manambady sy ny virijiny. Ny vehivavy tsy manambady dia mitandrina ny an’ny Tompo, mba samy ho masina avokoa ny tenany sy ny fanahiny; fa izay manambady kosa dia mitandrina ny an’izao fiainana izao mba hahafaly ny lahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Ary miteny izany aho mba hahasoa anareo; tsy haningotra anareo amin’ny tadivavarana aho fa mba hanaovanareo izay mendrika sy hitoeranareo tsara amin’ny Tompo ka tsy hivezivezen’ny sainareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Fa raha misy mihevitra fa tsy mety ny fitondrany ny fofombadiny, satria manana faniriana mafy izy araka izay mety mitranga, dia aoka hifanambady izy ireo; tsy manota izy raha izay no sitrapony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Fa raha misy kosa efa mikasa tsara ao am-pony, sady tsy misy manery azy, fa afaka mifehy ny safidiny izy ka ninia tao am-pony hanaja ny fofombadiny, dia tsara ny nataony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Koa tsara ny ataon’izay mampakatra ny fofombadiny ary tsaratsara kokoa ny ataon’izay tsy mbola mampakatra azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Voafehin’ny lalàna ny vavy raha mbola velona ny lahy; fa raha maty kosa ny lahy dia afaka hanambady izay tiany izy, nefa ao amin’ny Tompo ihany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Nefa raha araka ny hevitro dia sambatra kokoa izy raha mitoetra amin’izao ihany; ary ataoko fa izaho koa dia manana ny Fanahin’Andriamanitra.
