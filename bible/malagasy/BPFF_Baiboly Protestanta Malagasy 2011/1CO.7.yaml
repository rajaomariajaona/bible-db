document_id: 1CO.7,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny amin’ny fanambadiana
  - type: text
    content: 'Ny amin’ireo zavatra nosoratanareo tamiko dia tsara amin’ny lehilahy raha tsy mikasi-behivavy akory. '
  '10':
  - type: text
    content: 'Ny manambady dia izao no andidiako azy, nefa tsy izaho fa ny Tompo: Aoka tsy hisaraka amin’ny lahy ny vavy '
  '11':
  - type: text
    content: nefa raha misy efa nisaraka dia aoka hitoetra tsy manambady izy, na aoka hody amin’ny lahy; ary aoka ny lahy tsy hisaraka amin’ny vavy.
  '12':
  - type: text
    content: 'Fa amin’ny sisa dia hoy aho fa tsy ny Tompo: Raha misy rahalahy manambady tsy mino ary manaiky hitoetra aminy ihany ny vavy dia aoka tsy hisaraka aminy izy. '
  '13':
  - type: text
    content: 'Raha misy vehivavy manambady tsy mino, ary manaiky hitoetra aminy ihany ny lahy, dia aoka tsy hisaraka aminy izy. '
  '14':
  - type: text
    content: 'Fa ny lahy tsy mino dia efa nohamasinina ao amin’ny vavy, ary ny vavy tsy mino dia efa nohamasinina ao amin’ny rahalahy; raha tsy izay dia tsy madio ny zanakareo, kanefa masina izy. '
  '15':
  - type: text
    content: 'Fa raha ny tsy mino no te hisaraka dia aoka izy hisaraka. Na ny rahalahy na ny anabavy dia tsy voafehy amin’izany; fa Andriamanitra efa niantso anareo amin’ny fihavanana. '
  '16':
  - type: text
    content: Fa ahoana moa no ahafantaranao, Ravehivavy, na ho voavonjinao ny vadinao na tsia? Ary ahoana no ahafantaranao, Ralehilahy, na ho voavonjinao ny vadinao na tsia?
  - type: heading
    content: Mandeha araka izay niantsoan’Andriamanitra
  '17':
  - type: text
    content: Fa aoka ny olona rehetra samy handeha araka izay anjara nomen’ny Tompo azy sy araka ny niantsoan’Andriamanitra azy avy. Ary izany no andidiako any amin’ny fiangonana
  - type: note
    content: 'Na: eklesia.'
  - type: text
    content: ' rehetra. '
  '18':
  - type: text
    content: 'Misy va efa voafora fony izy voaantso? Aoka izy tsy hiova ho tsy voafora. Misy va tsy mbola voafora fony izy voaantso? Aoka izy tsy hoforana. '
  '19':
  - type: text
    content: 'Tsinontsinona ny famorana ary tsinontsinona ny tsy famorana; fa ny mitandrina ny didin’Andriamanitra no izy. '
  '2':
  - type: text
    content: 'Kanefa noho ny fijangajangana dia aoka samy hanana ny vadiny avy ny lehilahy rehetra ary aoka koa samy hanana ny vadiny avy ny vehivavy rehetra. '
  '20':
  - type: text
    content: 'Aoka samy hitoetra eo amin’izay efa niantsoana azy ihany ny olona rehetra. '
  '21':
  - type: text
    content: 'Nantsoina va ianao raha mbola andevo? Aoka tsy hampaninona anao izany; nefa raha misy hahafahanao dia aleo hararaotina izany. '
  '22':
  - type: text
    content: 'Fa ny andevo izay voaantso ao amin’ny Tompo dia olona afaka an’ny Tompo; toy izany koa, ny olona afaka izay voaantso dia mpanompon’i '
  - type: text
    content: Kristy
  - type: text
    content: '. '
  '23':
  - type: text
    content: 'Fa olom-boavidy ianareo, koa aza mety ho andevon’olona. '
  '24':
  - type: text
    content: Ry rahalahy, aoka ny olona rehetra samy hitoetra eo anatrehan’Andriamanitra, eo amin’izay niantsoana azy avy.
  - type: heading
    content: Ireo olona tsy manambady sy ireo mpitondratena
  '25':
  - type: text
    content: 'Fa ny amin’ny virijiny dia tsy manana didy avy amin’ny Tompo aho, nefa omeko izay hevitro araka izay niantran’ny Tompo ahy ho mahatoky. '
  '26':
  - type: text
    content: 'Koa heveriko fa noho ny fahoriana miseho ankehitriny dia tsara amin’ny olona ny mitoetra amin’izao ihany. '
  '27':
  - type: text
    content: 'Manambady va ianao? Aza mitady izay hisarahana. Tsy manambady va ianao? Aza mitady vady. '
  '28':
  - type: text
    content: Nefa na dia hanambady aza ianao dia tsy manota tsy akory; ary na dia hanambady aza ny virijiny dia tsy manota izy. Kanefa kosa hanam-pahoriana eo amin’ny fiainany ara-nofo ireny; fa raha izaho dia tsy ta hampiditra anareo amin’izany.
  '29':
  - type: text
    content: 'Fa izao no lazaiko, ry rahalahy: Efa fohy ny andro, koa aoka mba ho toy ny tsy manambady ny manana amin’izao sisa izao; '
  '3':
  - type: text
    content: 'Aoka hanao izay mety hatao amin’ny vavy ny lahy; ary mba toy izany koa ny vavy amin’ny lahy. '
  '30':
  - type: text
    content: 'aoka mba ho toy izay tsy mitomany ny mitomany; aoka mba ho toy izay tsy mifaly ny mifaly; aoka mba ho toy izay tsy manana ny mividy; '
  '31':
  - type: text
    content: ary aoka mba ho toy izay tsy mankafy an’izao fiainana izao loatra ny mampiasa an’izao fiainana izao, fa mandalo ny endrik’izao fiainana izao.
  '32':
  - type: text
    content: 'Fa tiako tsy ho maro ahiana ianareo. Izay tsy manambady dia miahy ny an’ny Tompo mba hahafaly ny Tompo. '
  '33':
  - type: text
    content: 'Fa izay manambady kosa dia miahy ny an’izao fiainana izao mba hahafaly ny vavy. '
  '34':
  - type: text
    content: 'Ary tsy mitovy koa ny vehivavy manambady sy ny virijiny. Ny vehivavy tsy manambady dia mitandrina ny an’ny Tompo, mba samy ho masina avokoa ny tenany sy ny fanahiny; fa izay manambady kosa dia mitandrina ny an’izao fiainana izao mba hahafaly ny lahy. '
  '35':
  - type: text
    content: Ary miteny izany aho mba hahasoa anareo; tsy haningotra anareo amin’ny tadivavarana aho fa mba hanaovanareo izay mendrika sy hitoeranareo tsara amin’ny Tompo ka tsy hivezivezen’ny sainareo.
  '36':
  - type: text
    content: 'Fa raha misy mihevitra fa tsy mety ny fitondrany ny fofombadiny, satria manana faniriana mafy izy araka izay mety mitranga, dia aoka hifanambady izy ireo; tsy manota izy raha izay no sitrapony. '
  '37':
  - type: text
    content: 'Fa raha misy kosa efa mikasa tsara ao am-pony, sady tsy misy manery azy, fa afaka mifehy ny safidiny izy ka ninia tao am-pony hanaja ny fofombadiny, dia tsara ny nataony. '
  '38':
  - type: text
    content: Koa tsara ny ataon’izay mampakatra ny fofombadiny ary tsaratsara kokoa ny ataon’izay tsy mbola mampakatra azy.
  '39':
  - type: text
    content: 'Voafehin’ny lalàna ny vavy raha mbola velona ny lahy; fa raha maty kosa ny lahy dia afaka hanambady izay tiany izy, nefa ao amin’ny Tompo ihany. '
  '4':
  - type: text
    content: 'Tsy ny vavy no manam-pahefana amin’ny tenany fa ny lahy; ary mba toy izany koa, tsy ny lahy no manam-pahefana amin’ny tenany fa ny vavy. '
  '40':
  - type: text
    content: Nefa raha araka ny hevitro dia sambatra kokoa izy raha mitoetra amin’izao ihany; ary ataoko fa izaho koa dia manana ny Fanahin’Andriamanitra.
  '5':
  - type: text
    content: 'Aza misara-pandriana ianareo raha tsy amin’izay fotoana sasany ifanekenareo ho andro hivavahana, nefa miraisa fandriana indray aorianan’izany mba tsy hakan’i Satana fanahy anareo noho ny tsy faharetanareo. '
  '6':
  - type: text
    content: 'Famelana malalaka no ilazako izany fa tsy mandidy aho. '
  '7':
  - type: text
    content: Fa mba tiako ho tahaka ahy ny olona rehetra; kanefa samy manana izay fanomezam-pahasoavana nomen’Andriamanitra azy avy, koa ny iray dia toy izao, ary ny iray kosa dia toy izao.
  '8':
  - type: text
    content: 'Fa hoy aho amin’ny tsy manambady sy ny mpitondratena: Tsara aminy raha mitoetra tahaka ahy izy. '
  '9':
  - type: text
    content: Nefa raha tsy maharitra izy dia aoka hanambady ihany; fa tsara ny manambady noho ny ho maimay.
