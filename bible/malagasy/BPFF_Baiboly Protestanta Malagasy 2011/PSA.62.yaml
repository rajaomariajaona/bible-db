document_id: PSA.62
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fitokisana an’Andriamanitra
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: Ho an’ny mpiventy hira. Al-Jedotona. Salamo nataon’i Davida.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Amin’Andriamanitra tokoa no iantombenan’ny fanahiko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: avy Aminy ny famonjena ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Izy tokoa no vatolampiko sy famonjena ahy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izy tokoa no fiarovana avo ho ahy ka tsy hangozohozo loatra aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Mandra-pahoviana no hirohotanareo hamely olona
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy handrodananareo rehetra azy toy ny manda mirona sy ny rova mihozongozona?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Misaina hanongana azy hiala amin’ny toerany ambony ireny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: lainga no ifaliany.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Misaotra amin’ny vavany izy nefa manozona amin’ny fony. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Fiatoana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Miantombena amin’Andriamanitra tokoa ianao, ry fanahiko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa Izy no antenaiko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Izy tokoa no vatolampiko sy famonjena ahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fiarovana avo ho ahy ka tsy mba hangozohozo aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Andriamanitra no iankinan’ny famonjena ahy sy ny voninahitro;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny vatolampiko mafy sy ny fialofako dia ao amin’Andriamanitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Matokia Azy mandrakariva ianareo, ry olona!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Loary eo anatrehany ny fonareo!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Andriamanitra no fialofana ho antsika. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Fiatoana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Entona fotsiny ny zanak’i Adama ary lainga ny zanak’olombelona;
- type: usfm
  marker: q1
  children:
  - type: text
    text: raha atao amin’ny mizana izy rehetra dia maivana noho ny entona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Aza miankina amin’ny fanaovana an-keriny ary aza manantena ny zavatra azo tamin’ny halatra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: raha mitombo ny harena dia aza anorenana ny fonareo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Indray mandeha no nitenenan’Andriamanitra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'indroa no nandrenesako hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: An’Andriamanitra ny hery.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Anao koa, Tompo ô, ny famindrampo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa Ianao no mamaly ny olona rehetra araka ny asany avy.
