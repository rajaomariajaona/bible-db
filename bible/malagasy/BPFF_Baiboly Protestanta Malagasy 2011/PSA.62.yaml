document_id: PSA.62,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Fitokisana an’Andriamanitra
  - type: text
    content: Ho an’ny mpiventy hira. Al-Jedotona. Salamo nataon’i Davida.
  - type: text
    content: Amin’Andriamanitra tokoa no iantombenan’ny fanahiko;
  - type: text
    content: avy Aminy ny famonjena ahy.
  '10':
  - type: text
    content: Aza miankina amin’ny fanaovana an-keriny ary aza manantena ny zavatra azo tamin’ny halatra;
  - type: text
    content: raha mitombo ny harena dia aza anorenana ny fonareo.
  '11':
  - type: text
    content: Indray mandeha no nitenenan’Andriamanitra;
  - type: text
    content: 'indroa no nandrenesako hoe:'
  - type: text
    content: An’Andriamanitra ny hery.
  '12':
  - type: text
    content: Anao koa, Tompo ô, ny famindrampo,
  - type: text
    content: fa Ianao no mamaly ny olona rehetra araka ny asany avy.
  '2':
  - type: text
    content: Izy tokoa no vatolampiko sy famonjena ahy.
  - type: text
    content: Izy tokoa no fiarovana avo ho ahy ka tsy hangozohozo loatra aho.
  '3':
  - type: text
    content: Mandra-pahoviana no hirohotanareo hamely olona
  - type: text
    content: sy handrodananareo rehetra azy toy ny manda mirona sy ny rova mihozongozona?
  '4':
  - type: text
    content: Misaina hanongana azy hiala amin’ny toerany ambony ireny;
  - type: text
    content: lainga no ifaliany.
  - type: text
    content: 'Misaotra amin’ny vavany izy nefa manozona amin’ny fony. '
  - type: text
    content: Fiatoana.
  '5':
  - type: text
    content: Miantombena amin’Andriamanitra tokoa ianao, ry fanahiko,
  - type: text
    content: fa Izy no antenaiko.
  '6':
  - type: text
    content: Izy tokoa no vatolampiko sy famonjena ahy,
  - type: text
    content: fiarovana avo ho ahy ka tsy mba hangozohozo aho.
  '7':
  - type: text
    content: Andriamanitra no iankinan’ny famonjena ahy sy ny voninahitro;
  - type: text
    content: ny vatolampiko mafy sy ny fialofako dia ao amin’Andriamanitra.
  '8':
  - type: text
    content: Matokia Azy mandrakariva ianareo, ry olona!
  - type: text
    content: Loary eo anatrehany ny fonareo!
  - type: text
    content: 'Andriamanitra no fialofana ho antsika. '
  - type: text
    content: Fiatoana.
  '9':
  - type: text
    content: Entona fotsiny ny zanak’i Adama ary lainga ny zanak’olombelona;
  - type: text
    content: raha atao amin’ny mizana izy rehetra dia maivana noho ny entona.
