document_id: PSA.62,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fitokisana an’Andriamanitra
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: Ho an’ny mpiventy hira. Al-Jedotona. Salamo nataon’i Davida.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Amin’Andriamanitra tokoa no iantombenan’ny fanahiko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avy Aminy ny famonjena ahy.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aza miankina amin’ny fanaovana an-keriny ary aza manantena ny zavatra azo tamin’ny halatra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: raha mitombo ny harena dia aza anorenana ny fonareo.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indray mandeha no nitenenan’Andriamanitra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'indroa no nandrenesako hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: An’Andriamanitra ny hery.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Anao koa, Tompo ô, ny famindrampo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa Ianao no mamaly ny olona rehetra araka ny asany avy.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izy tokoa no vatolampiko sy famonjena ahy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izy tokoa no fiarovana avo ho ahy ka tsy hangozohozo loatra aho.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mandra-pahoviana no hirohotanareo hamely olona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy handrodananareo rehetra azy toy ny manda mirona sy ny rova mihozongozona?
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Misaina hanongana azy hiala amin’ny toerany ambony ireny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: lainga no ifaliany.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Misaotra amin’ny vavany izy nefa manozona amin’ny fony. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Fiatoana.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miantombena amin’Andriamanitra tokoa ianao, ry fanahiko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa Izy no antenaiko.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izy tokoa no vatolampiko sy famonjena ahy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fiarovana avo ho ahy ka tsy mba hangozohozo aho.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Andriamanitra no iankinan’ny famonjena ahy sy ny voninahitro;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny vatolampiko mafy sy ny fialofako dia ao amin’Andriamanitra.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Matokia Azy mandrakariva ianareo, ry olona!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Loary eo anatrehany ny fonareo!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Andriamanitra no fialofana ho antsika. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Fiatoana.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Entona fotsiny ny zanak’i Adama ary lainga ny zanak’olombelona;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: raha atao amin’ny mizana izy rehetra dia maivana noho ny entona.
