document_id: ISA.45,3103
type_code: plt
verses:
  '1':
  - type: text
    content: Izao no lazain’NY TOMPO amin’ny Voahosony, dia i Kirosy
  - type: text
    content: izay notantanako tamin’ny tanany havanana
  - type: text
    content: mba handreseko firenena eo anoloany
  - type: text
    content: sy hamahako ny fehikibon’ny mpanjaka,
  - type: text
    content: mba hamohako varavarana eo anoloany
  - type: text
    content: 'ka tsy hirindrina intsony ny vavahady:'
  '10':
  - type: text
    content: 'Lozan’izay miteny amin’ny ray hoe:'
  - type: text
    content: Inona no aterakao?
  - type: text
    content: 'Na amin’ny reny hoe:'
  - type: text
    content: Inona no aloaky ny kibonao?
  '11':
  - type: text
    content: Izao no lazain’NY TOMPO, ny Iray Masin’ny Israely,
  - type: text
    content: 'dia ny namorona azy:'
  - type: text
    content: Ny zavatra ho avy va no anontaniana Amiko?
  - type: text
    content: Ny zanako sy ny asan’ny tanako dia aoka ho adidiko ihany.
  '12':
  - type: text
    content: Izaho no nanao ny tany
  - type: text
    content: sy nahary ny olona eo amboniny;
  - type: text
    content: ny tanako ihany no namelatra ny lanitra
  - type: text
    content: sy nandahatra ny eny aminy rehetra.
  '13':
  - type: text
    content: Izaho no nanaitra azy io tamin’ny fahamarinana
  - type: text
    content: ary haravoko avokoa ny lalany rehetra;
  - type: text
    content: izy no hanangana ny tanànako
  - type: text
    content: ary havelany handeha ny oloko voababo,
  - type: text
    content: nefa tsy amim-bola amin-karena,
  - type: text
    content: hoy Andriamanitra, Tompon’izao rehetra izao.
  '14':
  - type: text
    content: 'Izao no lazain’NY TOMPO:'
  - type: text
    content: Ny vokatry ny fisasaran’i Ejipta sy ny tombom-barotr’i Kosy
  - type: text
    content: sy ny Sabeana, olona lava tsanganana,
  - type: text
    content: dia hafindra ao aminao ka ho anao.
  - type: text
    content: Dia hanaraka ao aoriananao ireo;
  - type: text
    content: avy aman-gadra izy
  - type: text
    content: ary hiankohoka eo anatrehanao
  - type: text
    content: 'sady hifona aminao hoe:'
  - type: text
    content: Ato aminao tokoa Andriamanitra
  - type: text
    content: ary tsy misy afa-tsy Izy,
  - type: text
    content: zava-poana ireo andriamanitra tsy izy!
  '15':
  - type: text
    content: Marina tokoa fa Ianao dia Andriamanitra miafina,
  - type: text
    content: ry Andriamanitry ny Israely sady Mpamonjy ô!
  '16':
  - type: text
    content: Hitsanga-menatra sy hangaihay izy rehetra;
  - type: text
    content: eny, handeha aman-kenatra avokoa
  - type: text
    content: ny mpamorona sarin-javatra hivavahana.
  '17':
  - type: text
    content: Fa hahazo famonjena mandrakizay avy amin’NY TOMPO kosa ny Israely.
  - type: text
    content: Tsy hitsanga-menatra na hangaihay mandrakizay mandrakizay ianareo.
  '18':
  - type: text
    content: Fa izao no lazain’NY TOMPO,
  - type: text
    content: izay nahary ny lanitra,
  - type: text
    content: Izy no Andriamanitra izay namolavola ny tany
  - type: text
    content: ka nahavita sy nampiorina azy,
  - type: text
    content: tsy ho tany tsy misy endrika tsy akory no nahariany azy,
  - type: text
    content: 'fa novolavolainy mba honenana:'
  - type: text
    content: Izaho no TOMPO,
  - type: text
    content: ary tsy misy hafa.
  '19':
  - type: text
    content: Tsy tao amin’ny mangingina no nitenenako,
  - type: text
    content: na tao amin’ny toerana maizina amin’ny tany.
  - type: text
    content: 'Tsy nilaza tamin’ny taranak’i Jakoba aho hoe:'
  - type: text
    content: Tadiavo any amin’izay tsy misy endrika Aho!
  - type: text
    content: Izaho TOMPO no miteny ny marina
  - type: text
    content: sy manambara ny mahitsy.
  '2':
  - type: text
    content: Handroso eo alohanao Aho
  - type: text
    content: ary handravona ny mikitoantoana
  - type: text
    content: sy hanorotoro ny varavarana varahina
  - type: text
    content: ary hanapatapaka ny hidy vy;
  '20':
  - type: text
    content: Mivoria ka avia
  - type: text
    content: ary miaraha manatona,
  - type: text
    content: ianareo Jentilisa sisa afaka!
  - type: text
    content: Tsy manam-pahalalana
  - type: text
    content: ireo izay mitondra ny hazo natao sarin-javatra voasokitra
  - type: text
    content: ka mivavaka amin’izay andriamanitra
  - type: text
    content: tsy mahavonjy.
  '21':
  - type: text
    content: Ambarao ka asehoy mazava!
  - type: text
    content: Eny, aoka hiara-misaina izy ireo!
  - type: text
    content: Iza moa no nanambara izany hatrizay hatrizay?
  - type: text
    content: Iza no nilaza izany hatramin’ny fahiny?
  - type: text
    content: Tsy Izaho TOMPO va?
  - type: text
    content: Fa tsy misy Andriamanitra afa-tsy Izaho,
  - type: text
    content: dia Andriamanitra marina sady Mpamonjy;
  - type: text
    content: eny, tsy misy afa-tsy Izaho.
  '22':
  - type: text
    content: Mijere Ahy dia ho voavonjy ianareo,
  - type: text
    content: ry vazan-tany rehetra!
  - type: text
    content: Fa Izaho no Andriamanitra
  - type: text
    content: ary tsy misy hafa.
  '23':
  - type: text
    content: Ny tenako no nianianako,
  - type: text
    content: ny vavako no ivoahan’ny fahamarinana,
  - type: text
    content: 'teny tsy hiverina foana izany, dia ny hoe:'
  - type: text
    content: Izaho no handohalehan’ny lohalika rehetra
  - type: text
    content: 'sy hianianan’ny lela rehetra hoe:'
  '24':
  - type: text
    content: Ao amin’NY TOMPO ihany no voalaza
  - type: text
    content: fa misy fahamarinana sy hery;
  - type: text
    content: ka Izy ihany no hohatonin’ny olona amin-kenatra,
  - type: text
    content: dia ireo rehetra tezitra Aminy.
  '25':
  - type: text
    content: Ao amin’NY TOMPO no hanamarinana ny taranak’Israely rehetra
  - type: text
    content: sy hananany rehareha.
  '3':
  - type: text
    content: dia homeko anao ny harena ao amin’ny maizina
  - type: text
    content: sy ny harena nafenina ao amin’ny mangingina,
  - type: text
    content: mba hahafantaranao
  - type: text
    content: fa Izaho no TOMPO izay miantso anao amin’ny anaranao,
  - type: text
    content: dia Andriamanitry ny Israely.
  '4':
  - type: text
    content: Noho ny amin’i Jakoba mpanompoko
  - type: text
    content: sy Israely voafidiko
  - type: text
    content: no niantsoako anao tamin’ny anaranao
  - type: text
    content: sy nanomezako anarana malaza ho anao,
  - type: text
    content: na dia tsy nahafantatra Ahy aza ianao.
  '5':
  - type: text
    content: Izaho no TOMPO fa tsy misy hafa.
  - type: text
    content: Tsy misy Andriamanitra afa-tsy Izaho;
  - type: text
    content: efa nampisikina anao Aho,
  - type: text
    content: kanefa tsy nahafantatra Ahy ianao,
  '6':
  - type: text
    content: mba hahafantarana
  - type: text
    content: hatrany amin’ny fiposahan’ny masoandro ka hatrany amin’ny filentehany
  - type: text
    content: 'fa tsy misy afa-tsy Izaho:'
  - type: text
    content: Izaho no TOMPO
  - type: text
    content: ary tsy misy hafa,
  '7':
  - type: text
    content: dia Izaho izay mamorona ny mazava
  - type: text
    content: sy mahary ny maizina,
  - type: text
    content: manao ny fiadanana
  - type: text
    content: sy mahary ny loza;
  - type: text
    content: Izaho TOMPO no manao izany rehetra izany.
  '8':
  - type: text
    content: Manateteva avy any ambony, ry lanitra,
  - type: text
    content: ary aoka ny habakabaka hampilatsaka ny fahamarinana!
  - type: text
    content: Aoka ny tany hisokatra
  - type: text
    content: mba ho vokatra avy amin’ireo ny famonjena,
  - type: text
    content: aoka hitsimoka miaraka amin’izay ny fahamarinana.
  - type: text
    content: Izaho TOMPO no efa nahatonga izany.
  '9':
  - type: text
    content: Lozan’izay miady amin’ny namorona azy,
  - type: text
    content: tavim-bilany isan’ny tavim-bilany amin’ny tany ihany ireny!
  - type: text
    content: 'Ny tanimanga va hilaza amin’ny mpanefy azy hoe:'
  - type: text
    content: Inona no ataonao?
  - type: text
    content: 'Na ny asanao va hiteny hoe: Tsy manan-tanana izy!'
