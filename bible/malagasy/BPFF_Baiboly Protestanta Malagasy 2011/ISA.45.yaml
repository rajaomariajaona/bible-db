document_id: ISA.45,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izao no lazain’NY TOMPO amin’ny Voahosony, dia i Kirosy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay notantanako tamin’ny tanany havanana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba handreseko firenena eo anoloany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy hamahako ny fehikibon’ny mpanjaka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hamohako varavarana eo anoloany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ka tsy hirindrina intsony ny vavahady:'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Lozan’izay miteny amin’ny ray hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Inona no aterakao?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Na amin’ny reny hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Inona no aloaky ny kibonao?
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izao no lazain’NY TOMPO, ny Iray Masin’ny Israely,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'dia ny namorona azy:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny zavatra ho avy va no anontaniana Amiko?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny zanako sy ny asan’ny tanako dia aoka ho adidiko ihany.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izaho no nanao ny tany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy nahary ny olona eo amboniny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny tanako ihany no namelatra ny lanitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy nandahatra ny eny aminy rehetra.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izaho no nanaitra azy io tamin’ny fahamarinana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary haravoko avokoa ny lalany rehetra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izy no hanangana ny tanànako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary havelany handeha ny oloko voababo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa tsy amim-bola amin-karena,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy Andriamanitra, Tompon’izao rehetra izao.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Izao no lazain’NY TOMPO:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny vokatry ny fisasaran’i Ejipta sy ny tombom-barotr’i Kosy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny Sabeana, olona lava tsanganana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hafindra ao aminao ka ho anao.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia hanaraka ao aoriananao ireo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avy aman-gadra izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hiankohoka eo anatrehanao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'sady hifona aminao hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ato aminao tokoa Andriamanitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy misy afa-tsy Izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: zava-poana ireo andriamanitra tsy izy!
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Marina tokoa fa Ianao dia Andriamanitra miafina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ry Andriamanitry ny Israely sady Mpamonjy ô!
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hitsanga-menatra sy hangaihay izy rehetra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, handeha aman-kenatra avokoa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny mpamorona sarin-javatra hivavahana.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa hahazo famonjena mandrakizay avy amin’NY TOMPO kosa ny Israely.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy hitsanga-menatra na hangaihay mandrakizay mandrakizay ianareo.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa izao no lazain’NY TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay nahary ny lanitra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izy no Andriamanitra izay namolavola ny tany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka nahavita sy nampiorina azy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy ho tany tsy misy endrika tsy akory no nahariany azy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'fa novolavolainy mba honenana:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izaho no TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy misy hafa.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy tao amin’ny mangingina no nitenenako,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na tao amin’ny toerana maizina amin’ny tany.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Tsy nilaza tamin’ny taranak’i Jakoba aho hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tadiavo any amin’izay tsy misy endrika Aho!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izaho TOMPO no miteny ny marina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy manambara ny mahitsy.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Handroso eo alohanao Aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary handravona ny mikitoantoana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy hanorotoro ny varavarana varahina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hanapatapaka ny hidy vy;
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mivoria ka avia
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary miaraha manatona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ianareo Jentilisa sisa afaka!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy manam-pahalalana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ireo izay mitondra ny hazo natao sarin-javatra voasokitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka mivavaka amin’izay andriamanitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy mahavonjy.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ambarao ka asehoy mazava!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, aoka hiara-misaina izy ireo!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Iza moa no nanambara izany hatrizay hatrizay?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Iza no nilaza izany hatramin’ny fahiny?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy Izaho TOMPO va?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa tsy misy Andriamanitra afa-tsy Izaho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia Andriamanitra marina sady Mpamonjy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, tsy misy afa-tsy Izaho.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mijere Ahy dia ho voavonjy ianareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ry vazan-tany rehetra!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa Izaho no Andriamanitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy misy hafa.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny tenako no nianianako,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny vavako no ivoahan’ny fahamarinana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'teny tsy hiverina foana izany, dia ny hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izaho no handohalehan’ny lohalika rehetra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'sy hianianan’ny lela rehetra hoe:'
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ao amin’NY TOMPO ihany no voalaza
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa misy fahamarinana sy hery;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka Izy ihany no hohatonin’ny olona amin-kenatra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ireo rehetra tezitra Aminy.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ao amin’NY TOMPO no hanamarinana ny taranak’Israely rehetra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy hananany rehareha.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia homeko anao ny harena ao amin’ny maizina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny harena nafenina ao amin’ny mangingina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hahafantaranao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa Izaho no TOMPO izay miantso anao amin’ny anaranao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia Andriamanitry ny Israely.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Noho ny amin’i Jakoba mpanompoko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy Israely voafidiko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no niantsoako anao tamin’ny anaranao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy nanomezako anarana malaza ho anao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na dia tsy nahafantatra Ahy aza ianao.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izaho no TOMPO fa tsy misy hafa.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy misy Andriamanitra afa-tsy Izaho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: efa nampisikina anao Aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: kanefa tsy nahafantatra Ahy ianao,
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hahafantarana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hatrany amin’ny fiposahan’ny masoandro ka hatrany amin’ny filentehany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'fa tsy misy afa-tsy Izaho:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izaho no TOMPO
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy misy hafa,
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia Izaho izay mamorona ny mazava
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy mahary ny maizina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: manao ny fiadanana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy mahary ny loza;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izaho TOMPO no manao izany rehetra izany.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manateteva avy any ambony, ry lanitra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary aoka ny habakabaka hampilatsaka ny fahamarinana!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka ny tany hisokatra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba ho vokatra avy amin’ireo ny famonjena,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aoka hitsimoka miaraka amin’izay ny fahamarinana.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izaho TOMPO no efa nahatonga izany.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lozan’izay miady amin’ny namorona azy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tavim-bilany isan’ny tavim-bilany amin’ny tany ihany ireny!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ny tanimanga va hilaza amin’ny mpanefy azy hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Inona no ataonao?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Na ny asanao va hiteny hoe: Tsy manan-tanana izy!'
