document_id: PSA.86,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Amin’ny andro fahoriana dia miantso Anao aho
  - type: text
    content: Vavaka nataon’i Davida.
  - type: text
    content: Mihainoa, TOMPO ô, ka valio aho
  - type: text
    content: fa ory sy mahantra!
  '10':
  - type: text
    content: Fa lehibe Ianao ka manao zava-mahagaga;
  - type: text
    content: Ianao irery ihany no Andriamanitra.
  '11':
  - type: text
    content: Ampianaro ny lalanao aho, TOMPO ô,
  - type: text
    content: dia handeha amin’ny fahamarinanao.
  - type: text
    content: Aoka ny foko manontolo hatahotra ny anaranao.
  '12':
  - type: text
    content: Hidera Anao amin’ny foko manontolo aho, Tompo Andriamanitro ô;
  - type: text
    content: hanome voninahitra ny anaranao mandrakizay aho.
  '13':
  - type: text
    content: Fa lehibe ny famindramponao amiko
  - type: text
    content: 'ary efa nafahanao tamin’ny '
  - type: text
    content: fitoeran’ny maty
  - type: text
    content: ' any ambany indrindra aho.'
  '14':
  - type: text
    content: Andriamanitra ô, mitsangana hanohitra ahy ny mpirehareha
  - type: text
    content: ary mitady ny aiko ny antokon’ny mpampihorohoro,
  - type: text
    content: tsy mba heveriny fa eo anatrehany Ianao.
  '15':
  - type: text
    content: Nefa Ianao, Tompo ô, dia Andriamanitra mamindra fo sy miantra,
  - type: text
    content: mahari-po sady be famindrampo sy fahamarinana.
  '16':
  - type: text
    content: Todiho aho ka amindrao fo,
  - type: text
    content: omeo ny herinao ny mpanomponao
  - type: text
    content: ary vonjeo ny zanaky ny mpanompovavinao!
  '17':
  - type: text
    content: Anehoy famantarana ny ho soa aho
  - type: text
    content: mba ho hitan’izay mankahala ahy ka ho menatra izy!
  - type: text
    content: Fa Ianao TOMPO ô, no mamonjy sy mampionona ahy.
  '2':
  - type: text
    content: Arovy aho fa masina aho!
  - type: text
    content: Andriamanitro ô, vonjeo ny mpanomponao
  - type: text
    content: izay matoky Anao!
  '3':
  - type: text
    content: Tompo ô, mamindrà fo amiko!
  - type: text
    content: Fa Aminao no itarainako mandrakariva.
  '4':
  - type: text
    content: Ampifalio aho, dia izaho mpanomponao;
  - type: text
    content: fa Aminao, Tompo ô, no anandratako ny fanahiko.
  '5':
  - type: text
    content: Ianao, Tompo ô, no tsara sady mamela heloka
  - type: text
    content: ary be famindrampo amin’izay rehetra miantso Anao.
  '6':
  - type: text
    content: Henoy ny vavaka ataoko, TOMPO ô,
  - type: text
    content: henoy tsara ny feon’ny fifonako!
  '7':
  - type: text
    content: Amin’ny andro mampahory ahy dia miantso Anao aho,
  - type: text
    content: fa mamaly ahy Ianao.
  '8':
  - type: text
    content: Tsy misy tahaka Anao, Tompo ô, amin’ireo andriamanitra
  - type: text
    content: ary tsy misy tahaka ny asanao.
  '9':
  - type: text
    content: Ny firenena rehetra nataonao
  - type: text
    content: dia ho avy hiankohoka eo anatrehanao, Tompo ô,
  - type: text
    content: ka hanome voninahitra ny anaranao.
