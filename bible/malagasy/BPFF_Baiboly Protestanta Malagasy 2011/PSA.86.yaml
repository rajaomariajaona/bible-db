document_id: PSA.86
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Amin’ny andro fahoriana dia miantso Anao aho
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: Vavaka nataon’i Davida.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Mihainoa, TOMPO ô, ka valio aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ory sy mahantra!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Arovy aho fa masina aho!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Andriamanitro ô, vonjeo ny mpanomponao
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay matoky Anao!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Tompo ô, mamindrà fo amiko!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa Aminao no itarainako mandrakariva.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ampifalio aho, dia izaho mpanomponao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa Aminao, Tompo ô, no anandratako ny fanahiko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ianao, Tompo ô, no tsara sady mamela heloka
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary be famindrampo amin’izay rehetra miantso Anao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Henoy ny vavaka ataoko, TOMPO ô,
- type: usfm
  marker: q1
  children:
  - type: text
    text: henoy tsara ny feon’ny fifonako!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Amin’ny andro mampahory ahy dia miantso Anao aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa mamaly ahy Ianao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Tsy misy tahaka Anao, Tompo ô, amin’ireo andriamanitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy misy tahaka ny asanao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ny firenena rehetra nataonao
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ho avy hiankohoka eo anatrehanao, Tompo ô,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hanome voninahitra ny anaranao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Fa lehibe Ianao ka manao zava-mahagaga;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ianao irery ihany no Andriamanitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ampianaro ny lalanao aho, TOMPO ô,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia handeha amin’ny fahamarinanao.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aoka ny foko manontolo hatahotra ny anaranao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Hidera Anao amin’ny foko manontolo aho, Tompo Andriamanitro ô;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hanome voninahitra ny anaranao mandrakizay aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Fa lehibe ny famindramponao amiko
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ary efa nafahanao tamin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: fitoeran’ny maty
  - type: text
    text: ' any ambany indrindra aho.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Andriamanitra ô, mitsangana hanohitra ahy ny mpirehareha
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mitady ny aiko ny antokon’ny mpampihorohoro,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy mba heveriny fa eo anatrehany Ianao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Nefa Ianao, Tompo ô, dia Andriamanitra mamindra fo sy miantra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mahari-po sady be famindrampo sy fahamarinana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Todiho aho ka amindrao fo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: omeo ny herinao ny mpanomponao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary vonjeo ny zanaky ny mpanompovavinao!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Anehoy famantarana ny ho soa aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba ho hitan’izay mankahala ahy ka ho menatra izy!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa Ianao TOMPO ô, no mamonjy sy mampionona ahy.
