document_id: PRO.3,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fahendrena sy ny fahatahorana an’Andriamanitra
  - type: text
    content: Anaka, aza manadino ny fampianarako,
  - type: text
    content: fa aoka ny fonao hitandrina ny didiko;
  '10':
  - type: text
    content: dia ho feno mitafotafo ny fitoeram-barinao,
  - type: text
    content: ary hihoatra ny vata fanantazanao ny ranom-boaloboka.
  '11':
  - type: text
    content: Anaka, aza manamavo ny fitaizan’NY TOMPO,
  - type: text
    content: ary aza tofoka amin’ny fanitsiana ataony;
  '12':
  - type: text
    content: fa izay tian’NY TOMPO no anariny,
  - type: text
    content: dia tahaka ny ataon’ny ray amin’ny zanaka tiany.
  - type: heading
    content: Sarobidy lavitra noho ny volamena ny fahendrena
  '13':
  - type: text
    content: Sambatra izay olona mahita fahendrena
  - type: text
    content: sy izay olona mahazo fahalalana!
  '14':
  - type: text
    content: Aleo mikatsaka tombony avy aminy, toy izay mikatsaka tombony avy amin’ny volafotsy,
  - type: text
    content: ary ny tombom-barotra avy aminy dia mihoatra noho ny volamena;
  '15':
  - type: text
    content: sarobidy noho ny voahangy izy,
  - type: text
    content: ary izay rehetra irinao dia tsy misy azo ampitahaina aminy.
  '16':
  - type: text
    content: Fa andro maro no eo amin’ny tanany havanana,
  - type: text
    content: ary harena sy voninahitra no eo amin’ny tanany havia.
  '17':
  - type: text
    content: Lalana mahafinaritra ny lalany
  - type: text
    content: ary fiadanana ny alehany rehetra.
  '18':
  - type: text
    content: Hazon’aina ho an’izay rehetra mifikitra aminy izy
  - type: text
    content: ary izay rehetra mihazona azy no atao hoe sambatra.
  '19':
  - type: text
    content: Tamin’ny fahendrena no nanorenan’NY TOMPO ny tany
  - type: text
    content: ary tamin’ny fahalalana no nampitoerany ny lanitra.
  '2':
  - type: text
    content: fa hampitomboiny ho anao ny andro maro sy ny taona ela iainana
  - type: text
    content: ary ny fiadanana.
  '20':
  - type: text
    content: Ny fahalalany no noentiny nampiboiboika ny rano any amin’ny lalina
  - type: text
    content: sy ampitetevany ando avy amin’ny rahona.
  - type: heading
    content: Miaro ny hendry Andriamanitra
  '21':
  - type: text
    content: Anaka, aoka tsy hiala amin’ny masonao izany;
  - type: text
    content: raketo ny tena fahendrena sy ny fahaiza-mandinika,
  '22':
  - type: text
    content: dia ho aina ho an’ny fanahinao izany
  - type: text
    content: ary ho firavaky ny vozonao.
  '23':
  - type: text
    content: Dia hizotra amin’ny lalanao amin-toky ianao
  - type: text
    content: ka tsy ho tafintohina ny tongotrao.
  '24':
  - type: text
    content: Tsy hatahotra ianao raha mandry;
  - type: text
    content: eny, handry ianao, ary ho mamy ny torimasonao.
  '25':
  - type: text
    content: Aza manahy ny fampitahorana avy tampoka,
  - type: text
    content: na ny loza mandringana afitsoky ny ratsy fanahy raha avy izany;
  '26':
  - type: text
    content: fa NY TOMPO no ho tokinao
  - type: text
    content: ka hiambina ny tongotrao tsy ho voafandrika.
  - type: heading
    content: Ny hendry manoloana ny namany
  '27':
  - type: text
    content: Aza mamihina ny soa amin’izay tokony homena azy
  - type: text
    content: raha azon’ny tananao atao ihany.
  '28':
  - type: text
    content: 'Aza miteny amin’ny namanao hoe: Mandehana ka miverena,'
  - type: text
    content: fa rahampitso no homeko! Kanefa manana ihany ianao.
  '29':
  - type: text
    content: Aza mamorona sain-dratsy hoenti-mamely ny namanao
  - type: text
    content: raha mitoetra tsy manana ahiahy ao aminao izy.
  '3':
  - type: text
    content: Aoka tsy handao anao ny famindrampo sy ny fahamarinana;
  - type: text
    content: aoka iambozonanao izany,
  - type: text
    content: ary soraty ao am-ponao tahaka ny amin’ny vato fisaka,
  '30':
  - type: text
    content: Aza miady amin’olona tsy amin’antony
  - type: text
    content: raha tsy nanisy ratsy anao izy.
  '31':
  - type: text
    content: Aza mialona ny mpanao herisetra
  - type: text
    content: na mifidy izay lalany akory.
  '32':
  - type: text
    content: Satria fahavetavetana eo imason’NY TOMPO ny mpivadika,
  - type: text
    content: fa ireo marina kosa no ataony sakaiza;
  '33':
  - type: text
    content: ao an-tranon’ny ratsy fanahy ny ozon’NY TOMPO,
  - type: text
    content: fa tahiny kosa ny fonenan’ny marina;
  '34':
  - type: text
    content: tsiratsirainy ny mpaniratsira,
  - type: text
    content: fa omeny fahasoavana kosa ny mpandefitra;
  '35':
  - type: text
    content: handova voninahitra ny hendry,
  - type: text
    content: fa henatra kosa no ho anjaran’ny adala,
  '4':
  - type: text
    content: dia hahita fitia sy fahalalana tsara
  - type: text
    content: eo anatrehan’Andriamanitra sy ny olona ianao.
  '5':
  - type: text
    content: Matokia NY TOMPO amin’ny fonao manontolo;
  - type: text
    content: aza miantehitra amin’ny fahalalanao;
  '6':
  - type: text
    content: mahaiza mamantatra Azy amin’ny alehanao rehetra,
  - type: text
    content: fa Izy no handamina ny lalanao.
  '7':
  - type: text
    content: Aza mihevi-tena ho hendry;
  - type: text
    content: matahora NY TOMPO ka mifadia ny ratsy
  '8':
  - type: text
    content: dia ho famelombelomana ny nofonao izany
  - type: text
    content: sy ho fampangatsiatsiahana ny taolanao.
  '9':
  - type: text
    content: Mankalazà NY TOMPO amin’ny fanananao
  - type: text
    content: sy amin’izay voaloham-bokatrao rehetra,
