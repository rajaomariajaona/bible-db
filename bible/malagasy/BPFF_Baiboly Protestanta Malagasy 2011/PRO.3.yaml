document_id: PRO.3
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fahendrena sy ny fahatahorana an’Andriamanitra
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Anaka, aza manadino ny fampianarako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa aoka ny fonao hitandrina ny didiko;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: fa hampitomboiny ho anao ny andro maro sy ny taona ela iainana
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny fiadanana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Aoka tsy handao anao ny famindrampo sy ny fahamarinana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: aoka iambozonanao izany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary soraty ao am-ponao tahaka ny amin’ny vato fisaka,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: dia hahita fitia sy fahalalana tsara
- type: usfm
  marker: q1
  children:
  - type: text
    text: eo anatrehan’Andriamanitra sy ny olona ianao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Matokia NY TOMPO amin’ny fonao manontolo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: aza miantehitra amin’ny fahalalanao;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: mahaiza mamantatra Azy amin’ny alehanao rehetra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa Izy no handamina ny lalanao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Aza mihevi-tena ho hendry;
- type: usfm
  marker: q1
  children:
  - type: text
    text: matahora NY TOMPO ka mifadia ny ratsy
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: dia ho famelombelomana ny nofonao izany
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ho fampangatsiatsiahana ny taolanao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Mankalazà NY TOMPO amin’ny fanananao
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy amin’izay voaloham-bokatrao rehetra,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: dia ho feno mitafotafo ny fitoeram-barinao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hihoatra ny vata fanantazanao ny ranom-boaloboka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Anaka, aza manamavo ny fitaizan’NY TOMPO,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary aza tofoka amin’ny fanitsiana ataony;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: fa izay tian’NY TOMPO no anariny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia tahaka ny ataon’ny ray amin’ny zanaka tiany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Sarobidy lavitra noho ny volamena ny fahendrena
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Sambatra izay olona mahita fahendrena
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy izay olona mahazo fahalalana!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Aleo mikatsaka tombony avy aminy, toy izay mikatsaka tombony avy amin’ny volafotsy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny tombom-barotra avy aminy dia mihoatra noho ny volamena;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: sarobidy noho ny voahangy izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary izay rehetra irinao dia tsy misy azo ampitahaina aminy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Fa andro maro no eo amin’ny tanany havanana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary harena sy voninahitra no eo amin’ny tanany havia.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Lalana mahafinaritra ny lalany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary fiadanana ny alehany rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Hazon’aina ho an’izay rehetra mifikitra aminy izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary izay rehetra mihazona azy no atao hoe sambatra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Tamin’ny fahendrena no nanorenan’NY TOMPO ny tany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tamin’ny fahalalana no nampitoerany ny lanitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ny fahalalany no noentiny nampiboiboika ny rano any amin’ny lalina
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ampitetevany ando avy amin’ny rahona.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Miaro ny hendry Andriamanitra
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Anaka, aoka tsy hiala amin’ny masonao izany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: raketo ny tena fahendrena sy ny fahaiza-mandinika,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: dia ho aina ho an’ny fanahinao izany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ho firavaky ny vozonao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Dia hizotra amin’ny lalanao amin-toky ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy ho tafintohina ny tongotrao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Tsy hatahotra ianao raha mandry;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, handry ianao, ary ho mamy ny torimasonao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Aza manahy ny fampitahorana avy tampoka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: na ny loza mandringana afitsoky ny ratsy fanahy raha avy izany;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: fa NY TOMPO no ho tokinao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hiambina ny tongotrao tsy ho voafandrika.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny hendry manoloana ny namany
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Aza mamihina ny soa amin’izay tokony homena azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: raha azon’ny tananao atao ihany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Aza miteny amin’ny namanao hoe: Mandehana ka miverena,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa rahampitso no homeko! Kanefa manana ihany ianao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Aza mamorona sain-dratsy hoenti-mamely ny namanao
- type: usfm
  marker: q1
  children:
  - type: text
    text: raha mitoetra tsy manana ahiahy ao aminao izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Aza miady amin’olona tsy amin’antony
- type: usfm
  marker: q1
  children:
  - type: text
    text: raha tsy nanisy ratsy anao izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Aza mialona ny mpanao herisetra
- type: usfm
  marker: q1
  children:
  - type: text
    text: na mifidy izay lalany akory.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Satria fahavetavetana eo imason’NY TOMPO ny mpivadika,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ireo marina kosa no ataony sakaiza;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ao an-tranon’ny ratsy fanahy ny ozon’NY TOMPO,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa tahiny kosa ny fonenan’ny marina;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: tsiratsirainy ny mpaniratsira,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa omeny fahasoavana kosa ny mpandefitra;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: handova voninahitra ny hendry,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa henatra kosa no ho anjaran’ny adala,
