document_id: EXO.20
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ireo Teny Folo na ny Didy Folo
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Dia nilaza izao teny rehetra izao Andriamanitra:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Izaho no TOMPO Andriamanitrao izay nitondra anao nivoaka avy tany amin’ny tany Ejipta, tamin’ny trano nanandevozana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Aza manana andriamanitra hafa fa Izaho ihany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Aza manao sarin-javatra voasokitra, na izay mety ho endriky ny zavatra izay eny amin’ny lanitra ambony, na izay etỳ amin’ny tany ambany, na izay any amin’ny rano ambanin’ny tany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Aza miankohoka eo anatrehany ary aza manompo azy; fa Izaho, TOMPO Andriamanitrao, dia Andriamanitra saro-piaro ka mamaly ny heloky ny ray amin’ny zanaka hatramin’ny zafiafy sy ny zafindohalika, dia amin’izay mankahala Ahy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: nefa mamindra fo kosa amin’ny olona arivo mandimby izay tia Ahy ka mitandrina ny didiko.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Aza manonona foana ny anaran’NY TOMPO Andriamanitrao, fa tsy hataon’NY TOMPO ho tsy manan-tsiny izay manonona foana ny anarany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Mahatsiarova ny andro Sabata hanamasina azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Henemana no hiasanao sy hanaovanao ny raharahanao rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Fa Sabatan’NY TOMPO Andriamanitrao ny andro fahafito; koa aza manao raharaha akory ianao amin’izany, na ny zanakao lahy, na ny zanakao vavy, na ny mpanompolahinao, na ny mpanompovavinao, na ny biby fiompinao, na ny vahininao izay tafiditra eo am-bavahadinao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Fa henemana no nanaovan’NY TOMPO ny lanitra sy ny tany sy ny ranomasina mbamin’izay rehetra ao aminy, dia nitsahatra Izy tamin’ny andro fahafito. Izany no nitahian’NY TOMPO ny andro Sabata sy nanamasinany azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Manajà ny rainao sy ny reninao mba ho maro andro ianao eo amin’ny tany izay omen’NY TOMPO Andriamanitrao anao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Aza mamono olona.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Aza mijangajanga.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Aza mangalatra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Aza mety ho vavolombelona mandainga hanameloka ny namanao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Aza mitsiriritra ny tranon’ny namanao; aza mitsiriritra ny vadin’ny namanao, na ny mpanompolahiny, na ny mpanompovaviny, na ny ombiny, na ny borikiny, na izay mety ho an’ny namanao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary nandre ny kotroka sy ny feon’ny anjomara ary nahita ny tselatra sy ny tendrombohitra nivoa-tsetroka ny olona rehetra, koa nony nahita izany izy ireo dia toran-kovitra sady nijanona terỳ lavitra terỳ. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Dia hoy izy ireo tamin’i Mosesy: Aoka ihany ianao no hiteny aminay dia hihaino izahay; fa aoka tsy Andriamanitra no hiteny aminay fandrao maty izahay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Dia hoy i Mosesy tamin’ny olona: Aza matahotra; fa tonga Andriamanitra mba hizaha toetra anareo, ary mba ho eo anoloanareo ny fahatahorana Azy, mba tsy hanotanareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Dia nijanona teny lavitra teny ny olona, fa i Mosesy kosa dia nanakaiky ny haizim-pito izay nitoeran’Andriamanitra.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Lalàna momba ny alitara
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary hoy NY TOMPO tamin’i Mosesy: Izao no holazainao amin’ny Zanak’Israely: Ianareo dia efa nahita fa avy tany an-danitra no nitenenako taminareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Aza manao andriamanitra volafotsy ho fanampiko, ary aza manao andriamanitra volamena ho anareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Alitara tany no hataonao ho Ahy ka eo amboniny no hanoloranao ny fanatitra doranao manontolo sy ny fanati-pihavananao, dia ny ondry aman’osinao sy ny ombinao. Eo amin’ny toerana rehetra izay ampahatsiarovako ny anarako no hanatonako anao sy hitahiako anao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary raha alitara vato no hataonao ho Ahy dia aza atao amin’ny vato voapaika; satria raha manainga ny fandrakao eo aminy ianao dia handoto azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Ary aza asiana ambaratonga hiakaranao ho eo amin’ny alitarako mba tsy ho hita eo ny fitanjahanao.
