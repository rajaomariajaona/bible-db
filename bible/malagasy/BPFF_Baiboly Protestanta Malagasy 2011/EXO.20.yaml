document_id: EXO.20,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ireo Teny Folo na ny Didy Folo
  - type: text
    content: 'Dia nilaza izao teny rehetra izao Andriamanitra:'
  '10':
  - type: text
    content: 'Fa Sabatan’NY TOMPO Andriamanitrao ny andro fahafito; koa aza manao raharaha akory ianao amin’izany, na ny zanakao lahy, na ny zanakao vavy, na ny mpanompolahinao, na ny mpanompovavinao, na ny biby fiompinao, na ny vahininao izay tafiditra eo am-bavahadinao. '
  '11':
  - type: text
    content: Fa henemana no nanaovan’NY TOMPO ny lanitra sy ny tany sy ny ranomasina mbamin’izay rehetra ao aminy, dia nitsahatra Izy tamin’ny andro fahafito. Izany no nitahian’NY TOMPO ny andro Sabata sy nanamasinany azy.
  '12':
  - type: text
    content: Manajà ny rainao sy ny reninao mba ho maro andro ianao eo amin’ny tany izay omen’NY TOMPO Andriamanitrao anao.
  '13':
  - type: text
    content: Aza mamono olona.
  '14':
  - type: text
    content: Aza mijangajanga.
  '15':
  - type: text
    content: Aza mangalatra.
  '16':
  - type: text
    content: Aza mety ho vavolombelona mandainga hanameloka ny namanao.
  '17':
  - type: text
    content: Aza mitsiriritra ny tranon’ny namanao; aza mitsiriritra ny vadin’ny namanao, na ny mpanompolahiny, na ny mpanompovaviny, na ny ombiny, na ny borikiny, na izay mety ho an’ny namanao.
  '18':
  - type: text
    content: 'Ary nandre ny kotroka sy ny feon’ny anjomara ary nahita ny tselatra sy ny tendrombohitra nivoa-tsetroka ny olona rehetra, koa nony nahita izany izy ireo dia toran-kovitra sady nijanona terỳ lavitra terỳ. '
  '19':
  - type: text
    content: 'Dia hoy izy ireo tamin’i Mosesy: Aoka ihany ianao no hiteny aminay dia hihaino izahay; fa aoka tsy Andriamanitra no hiteny aminay fandrao maty izahay. '
  '2':
  - type: text
    content: Izaho no TOMPO Andriamanitrao izay nitondra anao nivoaka avy tany amin’ny tany Ejipta, tamin’ny trano nanandevozana.
  '20':
  - type: text
    content: 'Dia hoy i Mosesy tamin’ny olona: Aza matahotra; fa tonga Andriamanitra mba hizaha toetra anareo, ary mba ho eo anoloanareo ny fahatahorana Azy, mba tsy hanotanareo. '
  '21':
  - type: text
    content: Dia nijanona teny lavitra teny ny olona, fa i Mosesy kosa dia nanakaiky ny haizim-pito izay nitoeran’Andriamanitra.
  - type: heading
    content: Lalàna momba ny alitara
  '22':
  - type: text
    content: 'Ary hoy NY TOMPO tamin’i Mosesy: Izao no holazainao amin’ny Zanak’Israely: Ianareo dia efa nahita fa avy tany an-danitra no nitenenako taminareo. '
  '23':
  - type: text
    content: 'Aza manao andriamanitra volafotsy ho fanampiko, ary aza manao andriamanitra volamena ho anareo. '
  '24':
  - type: text
    content: 'Alitara tany no hataonao ho Ahy ka eo amboniny no hanoloranao ny fanatitra doranao manontolo sy ny fanati-pihavananao, dia ny ondry aman’osinao sy ny ombinao. Eo amin’ny toerana rehetra izay ampahatsiarovako ny anarako no hanatonako anao sy hitahiako anao. '
  '25':
  - type: text
    content: 'Ary raha alitara vato no hataonao ho Ahy dia aza atao amin’ny vato voapaika; satria raha manainga ny fandrakao eo aminy ianao dia handoto azy. '
  '26':
  - type: text
    content: Ary aza asiana ambaratonga hiakaranao ho eo amin’ny alitarako mba tsy ho hita eo ny fitanjahanao.
  '3':
  - type: text
    content: Aza manana andriamanitra hafa fa Izaho ihany.
  '4':
  - type: text
    content: 'Aza manao sarin-javatra voasokitra, na izay mety ho endriky ny zavatra izay eny amin’ny lanitra ambony, na izay etỳ amin’ny tany ambany, na izay any amin’ny rano ambanin’ny tany. '
  '5':
  - type: text
    content: 'Aza miankohoka eo anatrehany ary aza manompo azy; fa Izaho, TOMPO Andriamanitrao, dia Andriamanitra saro-piaro ka mamaly ny heloky ny ray amin’ny zanaka hatramin’ny zafiafy sy ny zafindohalika, dia amin’izay mankahala Ahy, '
  '6':
  - type: text
    content: nefa mamindra fo kosa amin’ny olona arivo mandimby izay tia Ahy ka mitandrina ny didiko.
  '7':
  - type: text
    content: Aza manonona foana ny anaran’NY TOMPO Andriamanitrao, fa tsy hataon’NY TOMPO ho tsy manan-tsiny izay manonona foana ny anarany.
  '8':
  - type: text
    content: 'Mahatsiarova ny andro Sabata hanamasina azy. '
  '9':
  - type: text
    content: 'Henemana no hiasanao sy hanaovanao ny raharahanao rehetra. '
