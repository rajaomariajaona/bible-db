document_id: MAT.18,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Iza no lehibe indrindra?
  - type: heading
    content: Mar 9.33-37; Lio 9.46-48
  - type: text
    content: 'Tamin’io fotoana io indrindra dia nankeo amin’i Jesosy ny mpianatra ka niteny hoe: Iza moa no lehibe indrindra ao amin’ny fanjakan’ny lanitra? '
  '10':
  - type: text
    content: 'Tandremo fandrao manao tsinontsinona na dia ny iray aza amin’ireny madinika ireny ianareo; fa lazaiko aminareo: Ny anjeliny any an-danitra dia mahita mandrakariva ny tavan’ny Raiko izay any an-danitra. '
  '11':
  - type: text
    content: 'Fa tonga ny '
  - type: text
    content: Zanak’Olona
  - type: text
    content: ' hamonjy ny very.'
  - type: heading
    content: Fanoharana ny amin’ny ondry very
  - type: heading
    content: Lio 15.3-7
  '12':
  - type: text
    content: 'Ahoana ny hevitrareo? Raha misy olona manana ondry zato ka mania ny iray, moa tsy hamela ny sivy amby sivifolo eny an-tendrombohitra va izy ka handeha hitady ilay nania? '
  '13':
  - type: text
    content: 'Ary raha toa ka hitany izany dia lazaiko aminareo marina tokoa fa mahafaly azy iny noho ny sivy amby sivifolo izay tsy nania. '
  '14':
  - type: text
    content: Tahaka izany dia tsy sitraky ny Rainareo izay any an-danitra raha ho very na dia iray monja aza amin’ireny madinika ireny.
  - type: heading
    content: Ny hampiverenana ny rahalahy izay nanota
  '15':
  - type: text
    content: 'Ary raha manota ny rahalahinao dia mandehana anaro izy rehefa mitokana ianareo roa lahy. Raha mihaino anao izy dia efa azonao ny rahalahinao; '
  '16':
  - type: text
    content: 'fa raha tsy mihaino anao kosa izy dia ento miaraka aminao ny olona iray na roa mba hohamafisina amin’ny tenin’ny vavolombelona roa na telo ny teny rehetra (Deo 19.15). '
  '17':
  - type: text
    content: Ary raha tsy mety mihaino an’ireo izy dia ambarao amin’ny fiangonana
  - type: note
    content: 'Na: eklesia.'
  - type: text
    content: '; ary raha tsy mety mihaino ny fiangonana koa izy dia aoka hataonao ho tahaka ny '
  - type: text
    content: Jentilisa
  - type: text
    content: ' sy ny mpamory hetra. '
  '18':
  - type: text
    content: 'Lazaiko aminareo marina tokoa: Na inona na inona fehezinareo etỳ ambonin’ny tany dia hofehezina any an-danitra; ary na inona na inona vahànareo etỳ ambonin’ny tany dia hovahana any an-danitra.'
  - type: heading
    content: Ny fiombonam-bavaka
  '19':
  - type: text
    content: 'Lazaiko aminareo koa: Raha misy roa aminareo mifanaiky etỳ ambonin’ny tany na amin’inona na amin’inona ka hangataka izany dia ho azony avy amin’ny Raiko izay any an-danitra izany. '
  '2':
  - type: text
    content: 'Ary Jesosy niantso zazakely iray hankeo aminy, dia nametraka azy teo afovoany '
  '20':
  - type: text
    content: Fa na aiza na aiza no iangonan’ny roa na telo amin’ny anarako dia eo afovoany Aho.
  - type: heading
    content: Ny fifamelan-keloky ny mpirahalahy
  '21':
  - type: text
    content: 'Dia nanatona i Petera ka niteny Taminy hoe: Tompoko, impiry moa no hanotan’ny rahalahiko amiko ka havelako izy? Hatramin’ny impito va?'
  '22':
  - type: text
    content: 'Fa hoy Jesosy taminy: Tsy lazaiko aminao hoe: Hatramin’ny impito, fa hatramin’ny impito amby fitopolo'
  - type: note
    content: 'Na: fitopolo impito.'
  - type: text
    content: .
  - type: heading
    content: Fanoharana ny amin’ilay mpanompo tsy namindra fo
  '23':
  - type: text
    content: 'Koa amin’izany, ny fanjakan’ny lanitra dia tahaka ny mpanjaka iray izay ta hanamarina ny amin’ny toe-bolany amin’ny mpanompony. '
  '24':
  - type: text
    content: 'Ary raha vao nanamarina izy dia nisy iray noentina teo aminy, izay nitrosa '
  - type: text
    content: talenta
  - type: text
    content: ' iray alina. '
  '25':
  - type: text
    content: 'Ary satria tsy nanan-kaloa izy io dia nasain’ny tompony hamidy izy sy ny vady aman-janany mbamin’ny fananany rehetra mba handoavana ny trosa. '
  '26':
  - type: text
    content: 'Dia niankohoka teo anatrehany ilay mpanompo ka niteny hoe: Tompoko, omeo andro aho fa haloako ny anao rehetra. '
  '27':
  - type: text
    content: 'Onena azy ny tompon’izany mpanompo izany ka nandefa azy sady namoy ny trosa taminy. '
  '28':
  - type: text
    content: 'Nefa nony niala teo ilay mpanompo dia nahita mpanompo namany iray, izay nitrosa '
  - type: text
    content: denaria
  - type: text
    content: ' zato taminy; dia nosamboriny Ilehio ka nokendainy sady nataony hoe: Aloavy izay trosako any aminao. '
  '29':
  - type: text
    content: 'Fa niankohoka ilay mpanompo namany ka nifona taminy hoe: Omeo andro aho fa haloako ny anao. '
  '3':
  - type: text
    content: 'ka niteny hoe: Lazaiko aminareo marina tokoa: Raha tsy miova ianareo ka ho tonga tahaka ny zazakely dia tsy hiditra ao amin’ny fanjakan’ny lanitra mihitsy. '
  '30':
  - type: text
    content: 'Nefa tsy nety izy fa lasa nampiditra azy tao an-tranomaizina mandra-pandoany ny trosa. '
  '31':
  - type: text
    content: 'Nony hitan’ireo mpanompo namany izay efa nataony dia nalahelo indrindra izy ireo ka nandeha nanao tatitra tamin’ny tompony momba ny zava-niseho rehetra. '
  '32':
  - type: text
    content: 'Dia nampiantsoin’ny tompony Ralehilahy ka noteneniny hoe: Ry mpanompo ratsy fanahy, efa nafoiko manontolo ny trosa taminao satria nifona tamiko ianao; '
  '33':
  - type: text
    content: 'moa tsy tokony mba ho namindra fo tamin’ny mpanompo namanao koa va ianao tahaka ny namindrako fo taminao? '
  '34':
  - type: text
    content: 'Dia tezitra ny tompony ka nanolotra azy ho amin’ny mpampijaly mandra-pandoany ny trosa rehetra. '
  '35':
  - type: text
    content: Ary tahaka izany koa no hataon’ny Raiko izay any an-danitra aminareo, raha tsy samy mamela ny rahalahinareo amin’ny fonareo avy ianareo.
  '4':
  - type: text
    content: 'Koa na zovy na zovy no hanetry tena tahaka ity zaza ity dia izy no ho lehibe indrindra ao amin’ny fanjakan’ny lanitra. '
  '5':
  - type: text
    content: Ary na zovy na zovy no handray zazakely iray tahaka itony amin’ny anarako dia mandray Ahy.
  - type: heading
    content: Izay mahatonga fahatafintohinana
  - type: heading
    content: Mar 9.42-48; Lio 17.1-2
  '6':
  - type: text
    content: Fa na zovy na zovy no hanafintohina na dia iray aza amin’ireny madinika mino Ahy ireny dia tsara lavitra ho azy raha anantonana vato lehibe fikosoham-bary ny vozony ka alentika any amin’ny ranomasina lalina izy.
  '7':
  - type: text
    content: Lozan’izao tontolo izao noho ny fahatafintohinana! Fa tsy maintsy ho avy ny fahatafintohinana, nefa lozan’izay olona mahatonga ny fahatafintohinana.
  '8':
  - type: text
    content: 'Koa raha ny tananao na ny tongotrao no manafintohina anao, tapaho izy ka ario hiala aminao; fa tsara ho anao ny hiditra kilemaina na mandringa any amin’ny fiainana noho ny manana tanana roa sy tongotra roa, nefa hariana any amin’ny afo maharitra mandrakizay. '
  '9':
  - type: text
    content: 'Ary raha ny masonao no manafintohina anao, ongoty izy ka ario ho afaka aminao; fa tsara ho anao ny hiditra toka-maso amin’ny fiainana noho ny manana maso roa, nefa hariana any amin’ny '
  - type: text
    content: afobe
  - type: text
    content: .
