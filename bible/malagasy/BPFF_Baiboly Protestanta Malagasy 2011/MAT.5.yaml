document_id: MAT.5,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny toriteny teo an-tendrombohitra
  - type: heading
    content: Mar 3.13; Lio 6.12-13
  - type: text
    content: 'Ary Jesosy, nony nahita ny vahoaka, dia niakatra teo an-tendrombohitra; rehefa tafapetraka Izy dia nanatona Azy ny mpianany. '
  '10':
  - type: text
    content: Sambatra izay enjehina noho ny fahamarinana,
  - type: text
    content: fa azy ny fanjakan’ny lanitra.
  '11':
  - type: text
    content: 'Sambatra ianareo, raha haratsin’ny olona sy enjehiny ary asiany izay teny ratsy rehetra hitenenany lainga anareo noho ny Amiko. '
  '12':
  - type: text
    content: Mifalia sy miravoravoa ianareo, fa lehibe ny valim-pitianareo any an-danitra; fa toy izany ihany no nanenjehany ny mpaminany izay talohanareo.
  - type: heading
    content: Fanasin’ny tany sy fahazavan’izao tontolo izao
  - type: heading
    content: Mar 9.50; Lio 14.34-35
  '13':
  - type: text
    content: Ianareo no fanasin’ny tany; fa raha ny sira no tonga matsatso, inona indray no hahasira azy? Tsy misy heriny hanaovana na inona na inona intsony izy, fa hariana any ivelany ka hohitsahin’ny olona.
  - type: heading
    content: Mar 4.21; Lio 8.16; 11.33
  '14':
  - type: text
    content: 'Ianareo no fahazavan’izao tontolo izao. Tsy azo afenina izay tanàna miorina eo an-tampon-tendrombohitra. '
  '15':
  - type: text
    content: 'Ary koa, tsy misy olona mandrehitra jiro ka mametraka azy ao ambanin’ny vata famarana, fa apetrany eo amin’ny fitoeran-jiro izany mba ho fanazavana ho an’izay rehetra ao an-trano. '
  '16':
  - type: text
    content: Aoka hazava eo imason’ny olona toy izany koa ny fahazavanareo mba hahitany ny asa tsara ataonareo ka hankalazany ny Rainareo izay any an-danitra.
  - type: heading
    content: Jesosy sy ny lalàna
  '17':
  - type: text
    content: 'Aza ataonareo fa tonga Aho handrava ny lalàna na ny mpaminany; tsy tonga handrava Aho fa hanatanteraka. '
  '18':
  - type: text
    content: 'Fa lazaiko aminareo marina tokoa: Mandra-pahafoanan’ny lanitra sy ny tany dia tsy hisy ho foana akory ny amin’ny lalàna, na dia iota'
  - type: note
    content: 'iota: litera fahasivy amin’ny soratra grika mitovy amin’ny i.'
  - type: text
    content: ' iray na tsipika kely iray aza, mandra-pahatanterak’izy rehetra. '
  '19':
  - type: text
    content: Ary amin’izany na zovy na zovy no mamaha ny iray amin’ireo didy madinika indrindra ireo ka mampianatra ny olona hanao toy izany dia hatao hoe kely indrindra amin’ny fanjakan’ny lanitra izy. Fa na zovy na zovy no mankatò sy mampianatra ireo dia izy no hatao hoe lehibe ao amin’ny fanjakan’ny lanitra.
  '2':
  - type: text
    content: 'Dia nanomboka niteny Izy ka nampianatra azy ireo hoe:'
  - type: heading
    content: Ireo Fahasambarana
  - type: heading
    content: Lio 6.20-26
  '20':
  - type: text
    content: 'Fa lazaiko aminareo: Raha tsy mihoatra noho ny an’ny '
  - type: text
    content: mpanoradalàna
  - type: text
    content: ' sy ny '
  - type: text
    content: Fariseo
  - type: text
    content: ' ny fahamarinanareo dia tsy hiditra ao amin’ny fanjakan’ny lanitra mihitsy ianareo.'
  - type: heading
    content: Heloka sy fampihavanana
  - type: heading
    content: Mar 11.25; Lio 12.57-59
  '21':
  - type: text
    content: 'Efa renareo fa voalaza tamin’ny Ntaolo hoe: «Aza mamono olona» (Eks 20.13); ary izay mamono olona dia mendrika hohelohina amin’ny fitsarana. '
  '22':
  - type: text
    content: 'Fa Izaho kosa milaza aminareo hoe: Izay rehetra tezitra amin’ny rahalahiny dia mendrika hohelohina amin’ny fitsarana; ary na zovy na zovy no hilaza amin’ny rahalahiny hoe: Tsy misy saina ianao, dia mendrika hohelohina eo amin’ny Sinedriona; ary na zovy na zovy no hiteny hoe: Adala Ialahy, dia mendrika ho ao amin’ny '
  - type: text
    content: afobe
  - type: text
    content: .
  '23':
  - type: text
    content: 'Koa raha mitondra ny fanatitrao ho eo amin’ny alitara ianao, ary eo ianao no mahatsiaro fa manana alahelo aminao ny rahalahinao, '
  '24':
  - type: text
    content: dia avelao eo anoloan’ny alitara ny fanatitrao ka mandehana aloha mihavana amin’ilay rahalahinao, ary rehefa miverina ianao dia izay vao manolotra ny fanatitrao.
  '25':
  - type: text
    content: 'Mihavàna haingana amin’ilay manana ady aminao raha mbola miara-dia aminy ianao, fandrao ilay manana ady aminao hanolotra anao amin’ny mpitsara, ary ny mpitsara kosa dia hanolotra anao amin’ny mpiambina ka hatao ao an-tranomaizina ianao. '
  '26':
  - type: text
    content: 'Lazaiko aminao marina tokoa: Tsy ho afaka ao mihitsy ianao, ambara-pandoanao ny '
  - type: text
    content: kaodiranta
  - type: text
    content: ' farany indrindra.'
  - type: heading
    content: Ny fijangajangana sy ireo fandrika ho an’ny finoana
  - type: heading
    content: Mat 18.8-9; Mar 9.43, 47-48
  '27':
  - type: text
    content: 'Efa renareo fa voalaza hoe: «Aza mijangajanga.» (Eks 20.14) '
  '28':
  - type: text
    content: 'Fa Izaho kosa milaza aminareo fa izay rehetra mijery vehivavy ka mitsiriritra azy dia efa nijangajanga taminy tao am-pony sahady. '
  '29':
  - type: text
    content: 'Fa raha ny masonao havanana no mahatafintohina anao dia esory hiala izy ka ario ho afaka aminao; fa mahasoa anao na very aza ny ampahany iray amin’ny tenanao ka tsy ny tenanao manontolo no hariana any amin’ny '
  - type: text
    content: afobe
  - type: text
    content: '. '
  '3':
  - type: text
    content: Sambatra ny mahantra am-panahy,
  - type: text
    content: fa azy ny fanjakan’ny lanitra.
  '30':
  - type: text
    content: Ary raha ny tananao havanana no mahatafintohina anao dia tapaho izy ka ario ho afaka aminao; fa mahasoa anao na very aza ny ampahany iray amin’ny tenanao ka tsy ny tenanao manontolo no ho lasa ho any amin’ny afobe.
  - type: heading
    content: Ny fisaraham-panambadiana
  - type: heading
    content: Mat 19.7-9; Mar 10.4-5, 10-12; Lio 16.18
  '31':
  - type: text
    content: 'Ary voalaza hoe: Na zovy na zovy no misaotra ny vadiny dia aoka izy hanome an-dRavehivavy taratasy fisaoram-bady (Deo 24.1). '
  '32':
  - type: text
    content: 'Fa Izaho kosa milaza aminareo hoe: Izay rehetra misaotra ny vadiny afa-tsy noho ny fijangajangana ihany dia mampijangajanga azy; ary na zovy na zovy no manambady izay voasaotra dia mijangajanga.'
  - type: heading
    content: Ny fianianana
  '33':
  - type: text
    content: 'Efa renareo koa fa voalaza tamin’ny Ntaolo hoe: «Aza manao fianianana mandainga, fa efao amin’NY TOMPO ny fianiananao» (Lev 19.12). '
  '34':
  - type: text
    content: 'Fa Izaho kosa milaza aminareo hoe: Aza mianiana akory: Na amin’ny lanitra, fa sezafiandrianan’Andriamanitra izany; '
  '35':
  - type: text
    content: 'na amin’ny tany, fa fitoeran-tongony izany; na amin’i Jerosalema, fa tanànan’ny Mpanjaka lehibe izy io. '
  '36':
  - type: text
    content: 'Aza mianiana amin’ny lohanao, fa tsy mahay mahafotsy na mahamainty na dia singam-bolo iray akory aza ianao. '
  '37':
  - type: text
    content: Fa aoka ny teninareo ho Eny, rehefa eny; Tsia, rehefa tsia; fa izay mihoatra noho izany dia avy amin’ilay ratsy.
  - type: heading
    content: Ny valifaty
  - type: heading
    content: Lio 6.29-30
  '38':
  - type: text
    content: 'Efa renareo fa voalaza hoe: «Maso solon’ny maso ary nify solon’ny nify» (Eks 21.24). '
  '39':
  - type: text
    content: 'Fa Izaho kosa milaza aminareo hoe: Aza manohitra izay manisy ratsy anao; fa na zovy na zovy no mamely tehamaina ny takolakao havanana dia atolory azy koa ny iray. '
  '4':
  - type: text
    content: Sambatra ny malahelo,
  - type: text
    content: fa izy no hampaherezina.
  '40':
  - type: text
    content: 'Ary izay te hiady aminao ka ta haka ny akanjonao dia avelao ho azy koa ny lambanao. '
  '41':
  - type: text
    content: 'Ary na zovy na zovy no hanery anao handeha iray kilaometatra dia mandehana miaraka aminy roa kilaometatra. '
  '42':
  - type: text
    content: Omeo izay mangataka aminao; aza odian-tsy hita izay te hisambotra aminao.
  - type: heading
    content: Ny fitiavana sy ny fahavalo
  - type: heading
    content: Lio 6.27-28, 32-36
  '43':
  - type: text
    content: 'Efa renareo fa voalaza hoe: «Tiava ny namanao» (Lev 19.18), ary «mankahalà ny fahavalonao». '
  '44':
  - type: text
    content: 'Fa Izaho kosa milaza aminareo hoe: Tiava ny fahavalonareo ary mivavaha ho an’izay manenjika anareo '
  '45':
  - type: text
    content: 'mba ho tonga zanaky ny Rainareo izay any an-danitra ianareo; fa Izy mampiposaka ny masoandrony amin’ny ratsy fanahy sy ny tsara fanahy ary mampilatsaka ny ranonorana amin’ny marina sy ny tsy marina. '
  '46':
  - type: text
    content: 'Fa raha izay olona tia anareo ihany no tianareo, inona no valim-pitia azonareo? Moa na ny mpamory hetra aza tsy mba manao toy izany koa va? '
  '47':
  - type: text
    content: 'Ary raha ny rahalahinareo ihany no arahabainareo, inona no ataonareo mihoatra noho ny sasany? Moa na dia ny '
  - type: text
    content: Jentilisa
  - type: text
    content: ' aza tsy mba mahavita toy izany ihany va? '
  '48':
  - type: text
    content: Koa amin’izany aoka ianareo ho tanteraka toy ny fahatanterahan’ny Rainareo izay any an-danitra.
  '5':
  - type: text
    content: Sambatra ny malemy fanahy,
  - type: text
    content: fa izy no handova ny tany (Sal 37.11).
  '6':
  - type: text
    content: Sambatra ny noana sy mangetaheta ny fahamarinana,
  - type: text
    content: fa izy no hovokisana.
  '7':
  - type: text
    content: Sambatra ny mpamindra fo,
  - type: text
    content: fa izy no hamindrana fo.
  '8':
  - type: text
    content: Sambatra ny madio am-po,
  - type: text
    content: fa izy no hahita an’Andriamanitra.
  '9':
  - type: text
    content: Sambatra ny mpampihavana,
  - type: text
    content: fa izy no hatao hoe zanak’Andriamanitra.
