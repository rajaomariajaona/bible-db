document_id: MAT.5
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny toriteny teo an-tendrombohitra
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mar 3.13; Lio 6.12-13
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary Jesosy, nony nahita ny vahoaka, dia niakatra teo an-tendrombohitra; rehefa tafapetraka Izy dia nanatona Azy ny mpianany. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Dia nanomboka niteny Izy ka nampianatra azy ireo hoe:'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ireo Fahasambarana
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Lio 6.20-26
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Sambatra ny mahantra am-panahy,
- type: usfm
  marker: q2
  children:
  - type: text
    text: fa azy ny fanjakan’ny lanitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Sambatra ny malahelo,
- type: usfm
  marker: q2
  children:
  - type: text
    text: fa izy no hampaherezina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Sambatra ny malemy fanahy,
- type: usfm
  marker: q2
  children:
  - type: text
    text: fa izy no handova ny tany (Sal 37.11).
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Sambatra ny noana sy mangetaheta ny fahamarinana,
- type: usfm
  marker: q2
  children:
  - type: text
    text: fa izy no hovokisana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Sambatra ny mpamindra fo,
- type: usfm
  marker: q2
  children:
  - type: text
    text: fa izy no hamindrana fo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Sambatra ny madio am-po,
- type: usfm
  marker: q2
  children:
  - type: text
    text: fa izy no hahita an’Andriamanitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Sambatra ny mpampihavana,
- type: usfm
  marker: q2
  children:
  - type: text
    text: fa izy no hatao hoe zanak’Andriamanitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Sambatra izay enjehina noho ny fahamarinana,
- type: usfm
  marker: q2
  children:
  - type: text
    text: fa azy ny fanjakan’ny lanitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Sambatra ianareo, raha haratsin’ny olona sy enjehiny ary asiany izay teny ratsy rehetra hitenenany lainga anareo noho ny Amiko. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Mifalia sy miravoravoa ianareo, fa lehibe ny valim-pitianareo any an-danitra; fa toy izany ihany no nanenjehany ny mpaminany izay talohanareo.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fanasin’ny tany sy fahazavan’izao tontolo izao
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mar 9.50; Lio 14.34-35
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ianareo no fanasin’ny tany; fa raha ny sira no tonga matsatso, inona indray no hahasira azy? Tsy misy heriny hanaovana na inona na inona intsony izy, fa hariana any ivelany ka hohitsahin’ny olona.
- type: usfm
  marker: r
  children:
  - type: text
    text: Mar 4.21; Lio 8.16; 11.33
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ianareo no fahazavan’izao tontolo izao. Tsy azo afenina izay tanàna miorina eo an-tampon-tendrombohitra. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary koa, tsy misy olona mandrehitra jiro ka mametraka azy ao ambanin’ny vata famarana, fa apetrany eo amin’ny fitoeran-jiro izany mba ho fanazavana ho an’izay rehetra ao an-trano. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Aoka hazava eo imason’ny olona toy izany koa ny fahazavanareo mba hahitany ny asa tsara ataonareo ka hankalazany ny Rainareo izay any an-danitra.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesosy sy ny lalàna
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Aza ataonareo fa tonga Aho handrava ny lalàna na ny mpaminany; tsy tonga handrava Aho fa hanatanteraka. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Fa lazaiko aminareo marina tokoa: Mandra-pahafoanan’ny lanitra sy ny tany dia tsy hisy ho foana akory ny amin’ny lalàna, na dia iota'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'iota: litera fahasivy amin’ny soratra grika mitovy amin’ny i.'
    marker-yv: yv-n
  - type: text
    text: ' iray na tsipika kely iray aza, mandra-pahatanterak’izy rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ary amin’izany na zovy na zovy no mamaha ny iray amin’ireo didy madinika indrindra ireo ka mampianatra ny olona hanao toy izany dia hatao hoe kely indrindra amin’ny fanjakan’ny lanitra izy. Fa na zovy na zovy no mankatò sy mampianatra ireo dia izy no hatao hoe lehibe ao amin’ny fanjakan’ny lanitra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Fa lazaiko aminareo: Raha tsy mihoatra noho ny an’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpanoradalàna
  - type: text
    text: ' sy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Fariseo
  - type: text
    text: ' ny fahamarinanareo dia tsy hiditra ao amin’ny fanjakan’ny lanitra mihitsy ianareo.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Heloka sy fampihavanana
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mar 11.25; Lio 12.57-59
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Efa renareo fa voalaza tamin’ny Ntaolo hoe: «Aza mamono olona» (Eks 20.13); ary izay mamono olona dia mendrika hohelohina amin’ny fitsarana. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Fa Izaho kosa milaza aminareo hoe: Izay rehetra tezitra amin’ny rahalahiny dia mendrika hohelohina amin’ny fitsarana; ary na zovy na zovy no hilaza amin’ny rahalahiny hoe: Tsy misy saina ianao, dia mendrika hohelohina eo amin’ny Sinedriona; ary na zovy na zovy no hiteny hoe: Adala Ialahy, dia mendrika ho ao amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: afobe
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Koa raha mitondra ny fanatitrao ho eo amin’ny alitara ianao, ary eo ianao no mahatsiaro fa manana alahelo aminao ny rahalahinao, '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: dia avelao eo anoloan’ny alitara ny fanatitrao ka mandehana aloha mihavana amin’ilay rahalahinao, ary rehefa miverina ianao dia izay vao manolotra ny fanatitrao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Mihavàna haingana amin’ilay manana ady aminao raha mbola miara-dia aminy ianao, fandrao ilay manana ady aminao hanolotra anao amin’ny mpitsara, ary ny mpitsara kosa dia hanolotra anao amin’ny mpiambina ka hatao ao an-tranomaizina ianao. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Lazaiko aminao marina tokoa: Tsy ho afaka ao mihitsy ianao, ambara-pandoanao ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: kaodiranta
  - type: text
    text: ' farany indrindra.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fijangajangana sy ireo fandrika ho an’ny finoana
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat 18.8-9; Mar 9.43, 47-48
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Efa renareo fa voalaza hoe: «Aza mijangajanga.» (Eks 20.14) '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Fa Izaho kosa milaza aminareo fa izay rehetra mijery vehivavy ka mitsiriritra azy dia efa nijangajanga taminy tao am-pony sahady. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Fa raha ny masonao havanana no mahatafintohina anao dia esory hiala izy ka ario ho afaka aminao; fa mahasoa anao na very aza ny ampahany iray amin’ny tenanao ka tsy ny tenanao manontolo no hariana any amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: afobe
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Ary raha ny tananao havanana no mahatafintohina anao dia tapaho izy ka ario ho afaka aminao; fa mahasoa anao na very aza ny ampahany iray amin’ny tenanao ka tsy ny tenanao manontolo no ho lasa ho any amin’ny afobe.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fisaraham-panambadiana
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat 19.7-9; Mar 10.4-5, 10-12; Lio 16.18
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ary voalaza hoe: Na zovy na zovy no misaotra ny vadiny dia aoka izy hanome an-dRavehivavy taratasy fisaoram-bady (Deo 24.1). '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Fa Izaho kosa milaza aminareo hoe: Izay rehetra misaotra ny vadiny afa-tsy noho ny fijangajangana ihany dia mampijangajanga azy; ary na zovy na zovy no manambady izay voasaotra dia mijangajanga.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fianianana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Efa renareo koa fa voalaza tamin’ny Ntaolo hoe: «Aza manao fianianana mandainga, fa efao amin’NY TOMPO ny fianiananao» (Lev 19.12). '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Fa Izaho kosa milaza aminareo hoe: Aza mianiana akory: Na amin’ny lanitra, fa sezafiandrianan’Andriamanitra izany; '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'na amin’ny tany, fa fitoeran-tongony izany; na amin’i Jerosalema, fa tanànan’ny Mpanjaka lehibe izy io. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Aza mianiana amin’ny lohanao, fa tsy mahay mahafotsy na mahamainty na dia singam-bolo iray akory aza ianao. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Fa aoka ny teninareo ho Eny, rehefa eny; Tsia, rehefa tsia; fa izay mihoatra noho izany dia avy amin’ilay ratsy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny valifaty
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Lio 6.29-30
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Efa renareo fa voalaza hoe: «Maso solon’ny maso ary nify solon’ny nify» (Eks 21.24). '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Fa Izaho kosa milaza aminareo hoe: Aza manohitra izay manisy ratsy anao; fa na zovy na zovy no mamely tehamaina ny takolakao havanana dia atolory azy koa ny iray. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Ary izay te hiady aminao ka ta haka ny akanjonao dia avelao ho azy koa ny lambanao. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Ary na zovy na zovy no hanery anao handeha iray kilaometatra dia mandehana miaraka aminy roa kilaometatra. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: Omeo izay mangataka aminao; aza odian-tsy hita izay te hisambotra aminao.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fitiavana sy ny fahavalo
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Lio 6.27-28, 32-36
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Efa renareo fa voalaza hoe: «Tiava ny namanao» (Lev 19.18), ary «mankahalà ny fahavalonao». '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Fa Izaho kosa milaza aminareo hoe: Tiava ny fahavalonareo ary mivavaha ho an’izay manenjika anareo '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'mba ho tonga zanaky ny Rainareo izay any an-danitra ianareo; fa Izy mampiposaka ny masoandrony amin’ny ratsy fanahy sy ny tsara fanahy ary mampilatsaka ny ranonorana amin’ny marina sy ny tsy marina. '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Fa raha izay olona tia anareo ihany no tianareo, inona no valim-pitia azonareo? Moa na ny mpamory hetra aza tsy mba manao toy izany koa va? '
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Ary raha ny rahalahinareo ihany no arahabainareo, inona no ataonareo mihoatra noho ny sasany? Moa na dia ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jentilisa
  - type: text
    text: ' aza tsy mba mahavita toy izany ihany va? '
  - type: usfm
