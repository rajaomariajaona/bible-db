document_id: PSA.65
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Andriamanitra Mpihaino vavaka, Andriamanitra, Tompon’izao rehetra izao
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: Ho an’ny mpiventy hira. Salamo nataon’i Davida. Tononkira.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ho Anao ny fahanginana sy ny fiderana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Andriamanitra any '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Ziona
  - type: text
    text: ' ô,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary Aminao no anefana ny voady.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ry Mpihaino vavaka ô,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ianao no hohatonin’ny nofo rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ny zava-mahameloka ahy dia mihoatra noho izay zakako;
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa Ianao no mamela ny fahadisoanay.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Sambatra izay fidinao sy ampanatoninao mba hitoetra eo an-kianjanao!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ho voky ny zava-tsoa ao amin’ny tranonao izahay, dia ny zava-masina ao amin’ny tempolinao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Zava-mahatahotra no ataonao amin’ny fahamarinana ho valin’ny vavakay,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ry Andriamanitry ny famonjena anay ô,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ry tokin’ny faran’ny tany rehetra sy ny ranomasina eny lavitra eny!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Mampiorina ny tendrombohitra amin’ny heriny Izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: misikina fahatanjahana Izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Mampitsahatra ny firohondrohon’ny onjan-dranomasina
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny fitabataban’ny firenena Izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Dia matahotra noho ny famantarana ataonao ny mponina any am-paran’ny tany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fenoinao hoby ny any amin’ny fiposahan’ny maraina sy ny hariva.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Mamangy ny tany Ianao ka mahamando azy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mampahavokatra azy betsaka Ianao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny onin’Andriamanitra dia tondra-drano;
- type: usfm
  marker: q1
  children:
  - type: text
    text: manomana vary ho an’ny olona Ianao.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izany no fanomananao ny tany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Mahampoka ny tany voaasa Ianao ka mampiravona azy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ranonorana mivatravatra no amontosanao azy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mitahy ny fitsimohany Ianao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Satrohanao voninahitra ny taonan’ny fitahianao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny dianao dia mitete menaka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Vonton-drano ny fiandrasana ondry any an-tany efitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary misikina fifaliana ny havoana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Rakotra ondry ny saha
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ary voasarona vary ny lohasaha:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mihoby izy; eny, mihira koa.
