document_id: PSA.65,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Andriamanitra Mpihaino vavaka, Andriamanitra, Tompon’izao rehetra izao
  - type: text
    content: Ho an’ny mpiventy hira. Salamo nataon’i Davida. Tononkira.
  - type: text
    content: Ho Anao ny fahanginana sy ny fiderana,
  - type: text
    content: 'Andriamanitra any '
  - type: text
    content: Ziona
  - type: text
    content: ' ô,'
  - type: text
    content: ary Aminao no anefana ny voady.
  '10':
  - type: text
    content: Mahampoka ny tany voaasa Ianao ka mampiravona azy;
  - type: text
    content: ranonorana mivatravatra no amontosanao azy;
  - type: text
    content: mitahy ny fitsimohany Ianao.
  '11':
  - type: text
    content: Satrohanao voninahitra ny taonan’ny fitahianao;
  - type: text
    content: ny dianao dia mitete menaka.
  '12':
  - type: text
    content: Vonton-drano ny fiandrasana ondry any an-tany efitra
  - type: text
    content: ary misikina fifaliana ny havoana.
  '13':
  - type: text
    content: Rakotra ondry ny saha
  - type: text
    content: 'ary voasarona vary ny lohasaha:'
  - type: text
    content: Mihoby izy; eny, mihira koa.
  '2':
  - type: text
    content: Ry Mpihaino vavaka ô,
  - type: text
    content: Ianao no hohatonin’ny nofo rehetra.
  '3':
  - type: text
    content: Ny zava-mahameloka ahy dia mihoatra noho izay zakako;
  - type: text
    content: nefa Ianao no mamela ny fahadisoanay.
  '4':
  - type: text
    content: Sambatra izay fidinao sy ampanatoninao mba hitoetra eo an-kianjanao!
  - type: text
    content: Ho voky ny zava-tsoa ao amin’ny tranonao izahay, dia ny zava-masina ao amin’ny tempolinao.
  '5':
  - type: text
    content: Zava-mahatahotra no ataonao amin’ny fahamarinana ho valin’ny vavakay,
  - type: text
    content: ry Andriamanitry ny famonjena anay ô,
  - type: text
    content: ry tokin’ny faran’ny tany rehetra sy ny ranomasina eny lavitra eny!
  '6':
  - type: text
    content: Mampiorina ny tendrombohitra amin’ny heriny Izy,
  - type: text
    content: misikina fahatanjahana Izy.
  '7':
  - type: text
    content: Mampitsahatra ny firohondrohon’ny onjan-dranomasina
  - type: text
    content: sy ny fitabataban’ny firenena Izy.
  '8':
  - type: text
    content: Dia matahotra noho ny famantarana ataonao ny mponina any am-paran’ny tany;
  - type: text
    content: fenoinao hoby ny any amin’ny fiposahan’ny maraina sy ny hariva.
  '9':
  - type: text
    content: Mamangy ny tany Ianao ka mahamando azy;
  - type: text
    content: mampahavokatra azy betsaka Ianao;
  - type: text
    content: ny onin’Andriamanitra dia tondra-drano;
  - type: text
    content: manomana vary ho an’ny olona Ianao.
  - type: text
    content: Izany no fanomananao ny tany.
