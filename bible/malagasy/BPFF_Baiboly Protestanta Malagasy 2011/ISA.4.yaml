document_id: ISA.4,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Amin’izany andro izany dia hisy vehivavy fito
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'hihazona lehilahy iray ka hiteny hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny haninay ihany no hohaninay
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny fitafianay ihany no hanaovanay;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'fa izao no hany angatahinay: Aoka hampitondraina ny anaranao izahay'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka afaho tondro-maso!
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ireo nieren-doza tamin’ny Israely
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Amin’izany andro izany dia ho tonga fahatsaran-tarehy sy voninahitra ny solofon’NY TOMPO, ary ny vokatry ny tany dia ho rehareha sy firavaka ho an’izay nieren-doza tamin’ny Israely. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Koa izay sisa any '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Ziona
    - type: text
      text: ' sy izay mbola mitoetra any Jerosalema dia hatao hoe masina, dia izay rehetra voasoratra ho isan’ny velona any Jerosalema. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Rehefa voasasan’ny Tompo ho afaka amin’ny fahalotoany ireo zanakavavin’i Ziona, ary voadion’ny fanahin’ny fitsarana sy ny fanahin’ny fandringanana ho afaka amin’ny ran’olona nalatsany i Jerosalema, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'dia hamorona rahona sy setroka NY TOMPO amin’ny antoandro ary fahazavan’ny afo midedadeda amin’ny alina. Ho eny ambonin’ny toerana rehetra any an-tendrombohitra Ziona izany sady ho eny ambonin’ny fivoriany rehetra; satria ho fiarovana eo ambonin’ny zavatra rehetra ny voninahiny. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Hisy tranolay ho fialokalofana amin’ny hainandro raha antoandro sady ho fialofana sy fierena amin’ny tafio-drivotra sy ny ranonorana.
