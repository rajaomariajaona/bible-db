document_id: ISA.4,3103
type_code: plt
verses:
  '1':
  - type: text
    content: Amin’izany andro izany dia hisy vehivavy fito
  - type: text
    content: 'hihazona lehilahy iray ka hiteny hoe:'
  - type: text
    content: Ny haninay ihany no hohaninay
  - type: text
    content: ary ny fitafianay ihany no hanaovanay;
  - type: text
    content: 'fa izao no hany angatahinay: Aoka hampitondraina ny anaranao izahay'
  - type: text
    content: ka afaho tondro-maso!
  - type: heading
    content: Ireo nieren-doza tamin’ny Israely
  '2':
  - type: text
    content: 'Amin’izany andro izany dia ho tonga fahatsaran-tarehy sy voninahitra ny solofon’NY TOMPO, ary ny vokatry ny tany dia ho rehareha sy firavaka ho an’izay nieren-doza tamin’ny Israely. '
  '3':
  - type: text
    content: 'Koa izay sisa any '
  - type: text
    content: Ziona
  - type: text
    content: ' sy izay mbola mitoetra any Jerosalema dia hatao hoe masina, dia izay rehetra voasoratra ho isan’ny velona any Jerosalema. '
  '4':
  - type: text
    content: 'Rehefa voasasan’ny Tompo ho afaka amin’ny fahalotoany ireo zanakavavin’i Ziona, ary voadion’ny fanahin’ny fitsarana sy ny fanahin’ny fandringanana ho afaka amin’ny ran’olona nalatsany i Jerosalema, '
  '5':
  - type: text
    content: 'dia hamorona rahona sy setroka NY TOMPO amin’ny antoandro ary fahazavan’ny afo midedadeda amin’ny alina. Ho eny ambonin’ny toerana rehetra any an-tendrombohitra Ziona izany sady ho eny ambonin’ny fivoriany rehetra; satria ho fiarovana eo ambonin’ny zavatra rehetra ny voninahiny. '
  '6':
  - type: text
    content: Hisy tranolay ho fialokalofana amin’ny hainandro raha antoandro sady ho fialofana sy fierena amin’ny tafio-drivotra sy ny ranonorana.
