document_id: LEV.24
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fitoeran-jiro ao amin’ny fitoerana masina
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary NY TOMPO niteny tamin’i Mosesy hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Omeo baiko ny Zanak’Israely mba hitondra diloilon’oliva voatoto tsy miharo ho eo aminao, hatao fanazavana mba hampirehetana tsy an-kiato ny jiro. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Eo ivelan’ny efitra lamba izay manakona ny Vavolombelona ao amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tranolay fihaonana
  - type: text
    text: ' no hametrahan’i Arona azy mba hirehitra mandrakariva, ny hariva ka hatramin’ny maraina, eo anatrehan’NY TOMPO; ho lalàna maharitra hatramin’ny taranakareo fara aman-dimby izany. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Eo amin’ny fitoeran-jiro volamena tsy miharo no hametrahany ny jiro mba hirehitra mandrakariva eo anatrehan’NY TOMPO.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ireo mofo atolotra an’Andriamanitra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Makà koba tsara toto ka endaso ho mofo roa amby folo; roa ampahafolon’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: efaha
  - type: text
    text: ' no hatao mofo iray. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Apetraho eo ambonin’ny latabatra madio eo anatrehan’NY TOMPO ireo ka ataovy laharana roa, enina avy isan-daharana. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Asio ditin-kazo manitra madio ny toerana tsirairay, koa aoka ho eo amin’ny mofo izany mba ho fanati-pahatsiarovana, dia fanatitra levonina amin’ny afo ho an’NY TOMPO. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Isaky ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Sabata
  - type: text
    text: ' no handaharany ireo mandrakariva eo anatrehan’NY TOMPO; avy amin’ny Zanak’Israely izany, dia fanekena maharitra. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ho an’i Arona sy ireo zanany ireo mofo ireo ka hohaniny eo amin’izay fitoerana masina; zavatra tena masina ho an’ny mpisorona ireo, avy amin’ny fanatitra levonina amin’ny afo; lalàna maharitra izany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny famaizana ireo izay miteny ratsy ny anaran’Andriamanitra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Nisy lehilahy iray nankeo amin’ny Zanak’Israely, Israelita ny reniny ary Ejiptiana ny rainy; niady tamin’ny lehilahy israelita iray teo an-toby io zanaky ny vehivavy israelita io. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Niteny ratsy ny anaran’Andriamanitra ilay zanaky ny vehivavy israelita ka nanozona; dia noentina tany amin’i Mosesy izy; Selomita no anaran’ny reniny, zanakavavin’i Dibry avy tamin’ny fokon’i Dana izy; '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: dia nambenana izy, mandra-pahafantatra izay ho didin’NY TOMPO.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary NY TOMPO niteny tamin’i Mosesy hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Avoahy ho eny ivelan’ny toby ilay nanozona ary aoka izay rehetra nandre azy hametraka ny tanany amin’ny lohany ary aoka hitora-bato azy ny fiangonana rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary mitenena amin’ny Zanak’Israely hoe: Na iza na iza no mamingavinga an’Andriamaniny dia ho meloka. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Izay miteny ratsy ny anaran’NY TOMPO dia hovonoina ho faty; hitora-bato azy tokoa ny fiangonana manontolo; na vahiny na tompon-tany, izay miteny ratsy ny anarana, dia hovonoina. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Izay mahafaty olona dia hovonoina ho faty. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Fa izay mahafaty biby fiompy kosa dia hanonitra azy: Biby solon’ny biby. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Raha misy olona mampanan-kilema ny namany dia toy izay nataony no hatao aminy koa: '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Tapaka solon’ny tapaka, maso solon’ny maso, nify solon’ny nify; tahaka ny kilema nataony tamin’ny olona no hatao aminy koa. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Izay mahafaty biby fiompy dia hanonitra azy; fa izay mahafaty olona kosa dia hovonoina ho faty. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Fitsipika iray no hitondrana anareo, na vahiny na tompon-tany; Izaho no TOMPO Andriamanitrareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ary niteny tamin’ny Zanak’Israely i Mosesy dia navoakany teny ivelan’ny toby ilay niteny ratsy ka notoraham-bato. Dia nanatanteraka izay nandidian’NY TOMPO an’i Mosesy ny Zanak’Israely.
