document_id: PRO.21,3103
type_code: plt
verses:
  '1':
  - type: text
    content: Toy ny rano velona eo an-tanan’NY TOMPO ny fon’ny mpanjaka
  - type: text
    content: ka tarihiny ho amin’izay tiany.
  '10':
  - type: text
    content: Ny ratsy fanahy dia maniry ny ratsy
  - type: text
    content: ka na ny havany aza dia tsy mahita fitia eo imasony.
  '11':
  - type: text
    content: Raha sazina ny mpaniratsira dia ho hendry ny kely saina
  - type: text
    content: ary raha toroan-kevitra ny hendry dia hahazo fahalalana izy.
  '12':
  - type: text
    content: Ny marina dia mandinika ny tranon’ny ratsy fanahy
  - type: text
    content: ka mamarina azy ho amin’ny loza.
  '13':
  - type: text
    content: Izay manentsin-tadìny amin’ny fitarainan’ny mahantra
  - type: text
    content: dia mba hitaraina koa, nefa tsy hohenoina.
  '14':
  - type: text
    content: Ny fanomezana mangingina dia mampionona ny fahatezerana
  - type: text
    content: ary ny kolikoly amin’ny takona dia mampitsahatra ny fahavinirana mafy.
  '15':
  - type: text
    content: Fifalian’ny marina ny hanao araka ny rariny,
  - type: text
    content: fa zava-mahatahotra ny mpanao ratsy kosa izany.
  '16':
  - type: text
    content: Ny olona izay mivily miala amin’ny lalan’ny fahendrena
  - type: text
    content: dia hitoetra ao amin’ny fivorian’ny fanahin’ny maty.
  '17':
  - type: text
    content: Izay tia fanaranam-po dia ho olona sahirana;
  - type: text
    content: eny, tsy mba hanankarena izay tia divay sy diloilo.
  '18':
  - type: text
    content: Ny ratsy fanahy dia ho avotry ny marina
  - type: text
    content: ary ny mpivadika no ho solon’ny mahitsy.
  '19':
  - type: text
    content: Aleo mitoetra any an-tany efitra
  - type: text
    content: toy izay miaraka amin’ny vehivavy tia ady sady mora tezitra.
  '2':
  - type: text
    content: Ataon’ny olona ho marina avokoa ny lalana rehetra alehany,
  - type: text
    content: fa NY TOMPO ihany no mpandanja ny fo.
  '20':
  - type: text
    content: Harena mahafinaritra sy diloilo no ao amin’ny tranon’ny hendry,
  - type: text
    content: fa ny adala mandany ny azy.
  '21':
  - type: text
    content: Izay mikatsaka ny fahamarinana sy ny famindrampo
  - type: text
    content: dia hahazo fiainana sy fahamarinana ary voninahitra.
  '22':
  - type: text
    content: Mananika ny vohitry ny mahery ny hendry
  - type: text
    content: ka mandrodana ny fiarovana mafy izay itokiany.
  '23':
  - type: text
    content: Izay miambina ny vavany sy ny lelany
  - type: text
    content: dia miaro ny tenany tsy ho azom-pahoriana.
  '24':
  - type: text
    content: Izay mirehareha sy miavonavona no antsoina hoe mpaniratsira,
  - type: text
    content: dia izay olona fatra-piavonavona.
  '25':
  - type: text
    content: Ny fanirian’ny kamo dia hahafaty azy
  - type: text
    content: satria tsy mety miasa tsinona ny tanany;
  '26':
  - type: text
    content: maniry fatratra izy mandritra ny andro;
  - type: text
    content: ny marina kosa manome fa tsy mba mahihitra.
  '27':
  - type: text
    content: Fahavetavetana ny fanatitry ny ratsy fanahy,
  - type: text
    content: indrindra raha amin’ny sain-dratsy no anolorany azy!
  '28':
  - type: text
    content: Ho levona ny vavolombelona mandainga,
  - type: text
    content: fa izay mahay mihaino dia ho afaka hiteny mandrakariva.
  '29':
  - type: text
    content: Mampiseho ny fahasahisahiany amin’ny tarehiny ny ratsy fanahy,
  - type: text
    content: fa ny marina kosa dia mihevitra tsara ny lalan-kalehany.
  '3':
  - type: text
    content: Ny hanao izay marina sy mahitsy
  - type: text
    content: no sitraky NY TOMPO mihoatra noho ny fanatitra alatsa-dra.
  '30':
  - type: text
    content: Tsy misy fahendrena na fahalalana
  - type: text
    content: na fisainana mahazaka ny fanatrehana NY TOMPO!
  '31':
  - type: text
    content: Voaomana ho amin’ny andro iadiana ny soavaly,
  - type: text
    content: fa an’NY TOMPO ihany ny famonjena.
  '4':
  - type: text
    content: Ny fiandranandran’ny maso sy ny fiavonavon’ny fo,
  - type: text
    content: izay jiron’ny ratsy fanahy, dia ota.
  '5':
  - type: text
    content: Ny hevitry ny mazoto dia mampanankarena,
  - type: text
    content: fa ny maimaika rehetra dia hahantra ihany.
  '6':
  - type: text
    content: Ny fahazoana harena amin’ny lela mandainga
  - type: text
    content: dia fofonaina mihelina ho an’izay mitady fahafatesana.
  '7':
  - type: text
    content: Ny herisetran’ny ratsy fanahy dia hamongotra azy
  - type: text
    content: satria mandà tsy hanao izay marina izy.
  '8':
  - type: text
    content: Miolikolika ny lalan’ny mavesa-keloka,
  - type: text
    content: fa mahitsy ny asan’ny madio.
  '9':
  - type: text
    content: Aleo mitoetra eo an-joron’ny tampon-trano
  - type: text
    content: toy izay hiray trano amin’ny vehivavy tia ady.
