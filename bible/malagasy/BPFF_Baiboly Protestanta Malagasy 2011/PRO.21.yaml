document_id: PRO.21
type_code: plt
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Toy ny rano velona eo an-tanan’NY TOMPO ny fon’ny mpanjaka
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tarihiny ho amin’izay tiany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ataon’ny olona ho marina avokoa ny lalana rehetra alehany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa NY TOMPO ihany no mpandanja ny fo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ny hanao izay marina sy mahitsy
- type: usfm
  marker: q1
  children:
  - type: text
    text: no sitraky NY TOMPO mihoatra noho ny fanatitra alatsa-dra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ny fiandranandran’ny maso sy ny fiavonavon’ny fo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay jiron’ny ratsy fanahy, dia ota.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ny hevitry ny mazoto dia mampanankarena,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny maimaika rehetra dia hahantra ihany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ny fahazoana harena amin’ny lela mandainga
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia fofonaina mihelina ho an’izay mitady fahafatesana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ny herisetran’ny ratsy fanahy dia hamongotra azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria mandà tsy hanao izay marina izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Miolikolika ny lalan’ny mavesa-keloka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa mahitsy ny asan’ny madio.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Aleo mitoetra eo an-joron’ny tampon-trano
- type: usfm
  marker: q1
  children:
  - type: text
    text: toy izay hiray trano amin’ny vehivavy tia ady.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ny ratsy fanahy dia maniry ny ratsy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka na ny havany aza dia tsy mahita fitia eo imasony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Raha sazina ny mpaniratsira dia ho hendry ny kely saina
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary raha toroan-kevitra ny hendry dia hahazo fahalalana izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ny marina dia mandinika ny tranon’ny ratsy fanahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka mamarina azy ho amin’ny loza.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Izay manentsin-tadìny amin’ny fitarainan’ny mahantra
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia mba hitaraina koa, nefa tsy hohenoina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ny fanomezana mangingina dia mampionona ny fahatezerana
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny kolikoly amin’ny takona dia mampitsahatra ny fahavinirana mafy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Fifalian’ny marina ny hanao araka ny rariny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa zava-mahatahotra ny mpanao ratsy kosa izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ny olona izay mivily miala amin’ny lalan’ny fahendrena
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hitoetra ao amin’ny fivorian’ny fanahin’ny maty.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Izay tia fanaranam-po dia ho olona sahirana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, tsy mba hanankarena izay tia divay sy diloilo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ny ratsy fanahy dia ho avotry ny marina
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny mpivadika no ho solon’ny mahitsy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Aleo mitoetra any an-tany efitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: toy izay miaraka amin’ny vehivavy tia ady sady mora tezitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Harena mahafinaritra sy diloilo no ao amin’ny tranon’ny hendry,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny adala mandany ny azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Izay mikatsaka ny fahamarinana sy ny famindrampo
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hahazo fiainana sy fahamarinana ary voninahitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Mananika ny vohitry ny mahery ny hendry
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka mandrodana ny fiarovana mafy izay itokiany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Izay miambina ny vavany sy ny lelany
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia miaro ny tenany tsy ho azom-pahoriana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Izay mirehareha sy miavonavona no antsoina hoe mpaniratsira,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia izay olona fatra-piavonavona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Ny fanirian’ny kamo dia hahafaty azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria tsy mety miasa tsinona ny tanany;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: maniry fatratra izy mandritra ny andro;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny marina kosa manome fa tsy mba mahihitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Fahavetavetana ny fanatitry ny ratsy fanahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: indrindra raha amin’ny sain-dratsy no anolorany azy!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Ho levona ny vavolombelona mandainga,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa izay mahay mihaino dia ho afaka hiteny mandrakariva.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Mampiseho ny fahasahisahiany amin’ny tarehiny ny ratsy fanahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny marina kosa dia mihevitra tsara ny lalan-kalehany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Tsy misy fahendrena na fahalalana
- type: usfm
  marker: q1
  children:
  - type: text
    text: na fisainana mahazaka ny fanatrehana NY TOMPO!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Voaomana ho amin’ny andro iadiana ny soavaly,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa an’NY TOMPO ihany ny famonjena.
