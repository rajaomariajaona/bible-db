document_id: EZK.1,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: 'Ny fahitana voalohany: Ny voninahitry NY TOMPO'
  - type: text
    content: 'Tamin’ny andro fahadimy tamin’ny volana fahefatra, tamin’ny taona fahatelopolo, raha teo amin’ny babo teo amoron’ny ony Kebara aho, dia nisokatra ny lanitra ka nahita fahitana avy tamin’Andriamanitra aho. '
  '10':
  - type: text
    content: 'Ny tarehiny dia tahaka ny tarehin’olona; tamin’ny ankavanany dia samy nanana ny tarehin’ny liona izy efatra, ary tamin’ny ankaviany dia samy nanana ny tarehin’ny omby, ary samy nanana ny tarehin’ny voromahery koa izy efatra. '
  '11':
  - type: text
    content: 'Ny tarehiny sy ny elany dia nisaraka hatreo ambony; samy nanana elatra roa nifanendry izy, ary roa hafa koa nanarona ny tenany. '
  '12':
  - type: text
    content: 'Samy nizotra tamin’izay hitsiny avy izy ka na taiza na taiza no tian’ny fanahy ho nalehany dia nalehany; tsy niherika izy raha nandeha. '
  '13':
  - type: text
    content: 'Tahaka ny vainafo mirehitra ny fijery ny zavamananaina, tahaka ny fanilo; nivoivoy teny anelanelan’ny zavamananaina ny afo; namirapiratra ny afo sady nisy tselatra nivoaka avy tao aminy. '
  '14':
  - type: text
    content: Ary ny zavamananaina dia nifanaretsaka nankatsỳ nankarỳ, toy ny tselatra mifelopeloka.
  '15':
  - type: text
    content: 'Ary hitako ny zavamananaina fa indro, nisy kodiarana iray teo amin’ny tany, teo anilan’ny zavamananaina teo anoloan’ny tarehiny efatra. '
  '16':
  - type: text
    content: 'Ny fijery ireo kodiarana sy ny fombafombany dia tahaka ny volon’ny krizolita; nitovy endrika izy efatra, ary ny fijery azy sy ny fombafombany dia toy ny kodiarana anatin’ny kodiarana hafa. '
  '17':
  - type: text
    content: 'Rehefa nandeha izy ireo dia nandeha tamin’izay hitsin’ny lafiny efatra; tsy niherika izy raha nandeha. '
  '18':
  - type: text
    content: 'Ny boriboriny dia avo sy mahatahotra, sady feno maso manodidina izy efatra. '
  '19':
  - type: text
    content: 'Rehefa nandeha ny zavamananaina dia nandeha teo anilany koa ireo kodiarana; rehefa niainga tsy nipaka tamin’ny tany ireo zavamananaina dia mba niainga koa ireo kodiarana. '
  '2':
  - type: text
    content: 'Tamin’ny andro fahadimin’ny volana, tamin’ny taona fahadimy taorianan’ny namaboana an’i Joiakina mpanjaka, '
  '20':
  - type: text
    content: 'Na taiza na taiza no tian’ny fanahy ho naleha dia nalehan’ireo koa, fa any no tian’ny fanahy haleha, ary ny kodiarana dia niainga teo anilany; fa tao amin’ny kodiarana ny fanahin’ny zavamananaina. '
  '21':
  - type: text
    content: Rehefa nandeha ireo dia mba nandeha koa ireto; ary rehefa nijanona ireny dia mba nijanona koa ireto; ary rehefa niainga tsy nipaka tamin’ny tany ireny dia mba niainga teo anilany koa ny kodiarana; fa ny fanahin’ny zavamananaina dia tao amin’ny kodiarana.
  '22':
  - type: text
    content: 'Teo ambonin’ny lohan’ny zavamananaina dia nisy toa endriky ny eloelo, toy ny volon’ny kristaly mahatahotra, mivelatra eo ambonin’ny lohany. '
  '23':
  - type: text
    content: 'Teo ambanin’ny eloelo dia nivelatra mahitsy sady nifanendry ny elany; samy nanana roa nisaronany avy izy rehetra ary samy nanana roa izay nanaronany ny tenany. '
  '24':
  - type: text
    content: 'Rehefa nandeha izy dia nahare ny fikopakopaky ny elany aho, toy ny firohondrohon’ny ranobe, dia tahaka ny feon’ny Tsitoha, dia feo toy ny fireondreon’ny miaramila mitoby. '
  '25':
  - type: text
    content: Ary nisy feo avy teo ambonin’ny eloelo izay teo ambonin’ny lohany; rehefa nijanona izy dia namihina ny elany.
  '26':
  - type: text
    content: 'Ary teo ambonin’ny eloelo izay teo ambonin’ny lohany dia nisy toy ny sezafiandrianana mitovy volo amin’ny vato safira; ary teo ambonin’izany toy ny sezafiandrianana izany dia nisy ohatra ny endrika olona. '
  '27':
  - type: text
    content: 'Ary nahita toy ny volon’ny metaly mamirapiratra aho, ohatra ny afo manodidina azy; hatramin’ny andilany no ho miakatra ka hatramin’ny andilany no ho midina dia hitako tahaka ny afo ka nisy namirapiratra manodidina azy. '
  '28':
  - type: text
    content: Toy ny fijery ny avana amin’ny rahona amin’ny andro nisy ranonorana no fijery ny namirapiratra manodidina. Izany no fijery ny voninahitry NY TOMPO. Nony nahita izany aho dia niankarapoka tamin’ny tany ka nandre ny feon’ny iray niteny.
  '3':
  - type: text
    content: dia tonga tamin’i Ezekiela mpisorona, zanak’i Bozỳ, ny tenin’NY TOMPO tany amin’ny tanin’ny Kaldeana, teo amoron’ny ony Kebara. Ary tany dia teo aminy ny tanan’NY TOMPO.
  '4':
  - type: text
    content: 'Ary hitako fa indro, nisy tafio-drivotra avy tany avaratra, dia rahona lehibe sy afo mifandrambondrambona sady nisy namirapiratra manodidina azy. Avy teo amin’ny afo dia nisy toy ny volon’ny metaly mamirapiratra. '
  '5':
  - type: text
    content: Teo anivony dia nisy toa endriky ny zavamananaina efatra. Ny fijery azy dia ohatra ny endrika olona.
  '6':
  - type: text
    content: 'Samy nanana tarehy efatra sy elatra efatra avy izy. '
  '7':
  - type: text
    content: 'Ny ranjony dia mahitsy, ary ny faladiany dia tahaka ny faladian’ny ombilahy kely; namirapiratra toy ny volon’ny varahina manganohano izy. '
  '8':
  - type: text
    content: 'Nisy tanan’olona teo ambanin’ny elany teo amin’ny lafiny efatra, ary samy nanana ny tarehiny sy ny elany avy izy efatra. '
  '9':
  - type: text
    content: 'Nifanendry ny elany; tsy niherika izy raha nandeha fa samy nizotra tamin’izay hitsiny avy izy rehetra. '
