document_id: EZK.1
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Ny fahitana voalohany: Ny voninahitry NY TOMPO'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Tamin’ny andro fahadimy tamin’ny volana fahefatra, tamin’ny taona fahatelopolo, raha teo amin’ny babo teo amoron’ny ony Kebara aho, dia nisokatra ny lanitra ka nahita fahitana avy tamin’Andriamanitra aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Tamin’ny andro fahadimin’ny volana, tamin’ny taona fahadimy taorianan’ny namaboana an’i Joiakina mpanjaka, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: dia tonga tamin’i Ezekiela mpisorona, zanak’i Bozỳ, ny tenin’NY TOMPO tany amin’ny tanin’ny Kaldeana, teo amoron’ny ony Kebara. Ary tany dia teo aminy ny tanan’NY TOMPO.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary hitako fa indro, nisy tafio-drivotra avy tany avaratra, dia rahona lehibe sy afo mifandrambondrambona sady nisy namirapiratra manodidina azy. Avy teo amin’ny afo dia nisy toy ny volon’ny metaly mamirapiratra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Teo anivony dia nisy toa endriky ny zavamananaina efatra. Ny fijery azy dia ohatra ny endrika olona.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Samy nanana tarehy efatra sy elatra efatra avy izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ny ranjony dia mahitsy, ary ny faladiany dia tahaka ny faladian’ny ombilahy kely; namirapiratra toy ny volon’ny varahina manganohano izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Nisy tanan’olona teo ambanin’ny elany teo amin’ny lafiny efatra, ary samy nanana ny tarehiny sy ny elany avy izy efatra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Nifanendry ny elany; tsy niherika izy raha nandeha fa samy nizotra tamin’izay hitsiny avy izy rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ny tarehiny dia tahaka ny tarehin’olona; tamin’ny ankavanany dia samy nanana ny tarehin’ny liona izy efatra, ary tamin’ny ankaviany dia samy nanana ny tarehin’ny omby, ary samy nanana ny tarehin’ny voromahery koa izy efatra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ny tarehiny sy ny elany dia nisaraka hatreo ambony; samy nanana elatra roa nifanendry izy, ary roa hafa koa nanarona ny tenany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Samy nizotra tamin’izay hitsiny avy izy ka na taiza na taiza no tian’ny fanahy ho nalehany dia nalehany; tsy niherika izy raha nandeha. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Tahaka ny vainafo mirehitra ny fijery ny zavamananaina, tahaka ny fanilo; nivoivoy teny anelanelan’ny zavamananaina ny afo; namirapiratra ny afo sady nisy tselatra nivoaka avy tao aminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ary ny zavamananaina dia nifanaretsaka nankatsỳ nankarỳ, toy ny tselatra mifelopeloka.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary hitako ny zavamananaina fa indro, nisy kodiarana iray teo amin’ny tany, teo anilan’ny zavamananaina teo anoloan’ny tarehiny efatra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ny fijery ireo kodiarana sy ny fombafombany dia tahaka ny volon’ny krizolita; nitovy endrika izy efatra, ary ny fijery azy sy ny fombafombany dia toy ny kodiarana anatin’ny kodiarana hafa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Rehefa nandeha izy ireo dia nandeha tamin’izay hitsin’ny lafiny efatra; tsy niherika izy raha nandeha. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ny boriboriny dia avo sy mahatahotra, sady feno maso manodidina izy efatra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Rehefa nandeha ny zavamananaina dia nandeha teo anilany koa ireo kodiarana; rehefa niainga tsy nipaka tamin’ny tany ireo zavamananaina dia mba niainga koa ireo kodiarana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Na taiza na taiza no tian’ny fanahy ho naleha dia nalehan’ireo koa, fa any no tian’ny fanahy haleha, ary ny kodiarana dia niainga teo anilany; fa tao amin’ny kodiarana ny fanahin’ny zavamananaina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Rehefa nandeha ireo dia mba nandeha koa ireto; ary rehefa nijanona ireny dia mba nijanona koa ireto; ary rehefa niainga tsy nipaka tamin’ny tany ireny dia mba niainga teo anilany koa ny kodiarana; fa ny fanahin’ny zavamananaina dia tao amin’ny kodiarana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Teo ambonin’ny lohan’ny zavamananaina dia nisy toa endriky ny eloelo, toy ny volon’ny kristaly mahatahotra, mivelatra eo ambonin’ny lohany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Teo ambanin’ny eloelo dia nivelatra mahitsy sady nifanendry ny elany; samy nanana roa nisaronany avy izy rehetra ary samy nanana roa izay nanaronany ny tenany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Rehefa nandeha izy dia nahare ny fikopakopaky ny elany aho, toy ny firohondrohon’ny ranobe, dia tahaka ny feon’ny Tsitoha, dia feo toy ny fireondreon’ny miaramila mitoby. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Ary nisy feo avy teo ambonin’ny eloelo izay teo ambonin’ny lohany; rehefa nijanona izy dia namihina ny elany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ary teo ambonin’ny eloelo izay teo ambonin’ny lohany dia nisy toy ny sezafiandrianana mitovy volo amin’ny vato safira; ary teo ambonin’izany toy ny sezafiandrianana izany dia nisy ohatra ny endrika olona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ary nahita toy ny volon’ny metaly mamirapiratra aho, ohatra ny afo manodidina azy; hatramin’ny andilany no ho miakatra ka hatramin’ny andilany no ho midina dia hitako tahaka ny afo ka nisy namirapiratra manodidina azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Toy ny fijery ny avana amin’ny rahona amin’ny andro nisy ranonorana no fijery ny namirapiratra manodidina. Izany no fijery ny voninahitry NY TOMPO. Nony nahita izany aho dia niankarapoka tamin’ny tany ka nandre ny feon’ny iray niteny.
