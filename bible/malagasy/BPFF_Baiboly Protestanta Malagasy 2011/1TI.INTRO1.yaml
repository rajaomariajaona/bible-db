document_id: 1TI.INTRO1,3103
type_code: plt
verses:
  '1':
  - type: text
    content: INDRAY MIJERY
  - type: text
    content: Ny epistily voalohany sy faharoa ho an’i Timoty ary ny epistily ho an’i Titosy no atao hoe Epistily Pastoraly, noho izy voasoratra ho an’i Timoty sy i Titosy, izay samy tanora mpitondra fiangonana.
  - type: text
    content: Natao hovakin’ny mpitondra fiangonana sy ny Fiangonana itony epistily pastoraly itony.
  - type: text
    content: Tamin’ny faramparan’ny fiainan’i Paoly no nanoratany azy ireto.
  - type: text
    content: Niara-niasa akaiky tamin’i Paoly ry Timoty sy i Titosy ary nataony ho tena zanany ara-panahy. I Timoty dia nanaraka azy hatrany am-pifatorana.
  - type: text
    content: Araka ny Asan’ny Apostoly 28.30 dia nigadra roa taona tany Roma i Paoly. Raha ny filazan’ireo Rain’ny fiangonana dia afaka izy taorianan’izay ary niverina tany Azia Minora. Tamin’izany izy no nametraka an’i Timoty hitondra ny Fiangonana tao Efesosy. Avy any Makedonia no nanoratany ny epistily voalohany ho an’i Timoty, tamin’ny taona 65 eo ho eo.
  - type: text
    content: Taorianan’izany izy no nanorina ny Fiangonana tany Kreta ka nametraka an’i Titosy hitondra azy io, koa tamin’ny diany ho any Nikopolia, any Gresy, no nanoratany ny epistily ho an’i Titosy.
  - type: text
    content: Efa nirehitra ny fanenjehana nataon’ny amperora Neron tamin’io fotoana io ka voatana fanindroany tany Roma i Paoly. Niafara tamin’ny famonoana azy ho faty izany, tamin’ny taona 67 teo ho eo.
  - type: text
    content: Ny votoatin’ny Epistily
  - type: text
    content: 'Azo raisina ho fotokevitry ny Epistily ny 1Tim 3.15: «hahafantaranao izay fitondrantena mety hatao ao amin’ny tranon’Andriamanitra».'
  - type: text
    content: Tany Efesosy dia nisy ireo olona izay nanao fampianarana sandoka, nanohitra ny fampianarana tsy misy kilema, dia ny filazantsara madio izay nampianarin’ny Apostoly.
  - type: text
    content: Maro samihafa ireny fampianarana ireny, ary niharoharo tao ny anganonganon-drazana, ny adihevitra sy fibedibedena foana, ny fitondrantena maloto, tao koa ny fampahorian-tena, ny filàna tombontsoa amin’ny fivavahana.
  - type: text
    content: Didìn’i Paoly mihitsy i Timoty hanohitra ireny ary hanendry rafitra sy tomponandraikitra, dia ny mpitondra fiangonana izay nantsoina hoe «episkopos», mpanara-maso ny ondry, na eveka, ary koa ny loholona na «presbiteros» sy ny diakona na mpanompo. Izy ireo dia manana andraikitra lehibe amin’ny fitandroana ny fiainan’ny Fiangonana ary indrindra ny fiarovana ny fampianarana tsy misy kilema izay mampandroso ny fahatahorana an’Andriamanitra.
  - type: text
    content: Teny miverimberina ao amin’ireo epistily pastoraly ny hoe ny toe-panahy araka an’Andriamanitra, izay azo adika koa hoe ny fahatahorana an’Andriamanitra na ny maha mpivavaka tsara. Ny zavamiafin’ny fahatahorana an’Andriamanitra dia Jesosy Kristy.
  - type: text
    content: Ny firafitry ny Epistily
  - type: text
    content: 'Fitarihanteny: Ny mpanoratra sy ny anoratana. Fiarahabana apostolika: 1.1-2'
  - type: text
    content: 'Ny mahamaika ny hanoherana ny fampianaran-diso na ny fampianarana sandoka: 1.3-20'
  - type: text
    content: 'Torolalana momba ny fitondrana ny Fiangonana. Ny fanendrena izay ho tomponandraikitra: 2.1–3.16'
  - type: text
    content: 'Fampitandremana ny amin’ireo fampianarana sandoka: 4.1-6'
  - type: text
    content: 'Ny fitondrana ireo sokajin’olona samihafa ao amin’ny Fiangonana: 5.1–6.2'
  - type: text
    content: 'Fananarana farany: 6.3-21'
