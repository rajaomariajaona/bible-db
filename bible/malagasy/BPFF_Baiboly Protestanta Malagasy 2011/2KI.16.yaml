document_id: 2KI.16,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: I Ahaza, mpanjakan’ny Joda
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 2Tan 28.1-27
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Tamin’ny taona fahafito amby folo nanjakan’i Peka, zanak’i Remalia, no nanomboka nanjaka i Ahaza, zanak’i Jotama, mpanjakan’ny Joda. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ary nandeha i Ahaza mpanjaka hitsena an’i Tiglato-Pilesera, mpanjakan’i Asiria, any Damaskosy. Nony nahita ny alitara tao Damaskosy izy dia nampitondra ny mariky ny alitara sy ny sariny araka ny fombany rehetra ho any amin’i Oria mpisorona. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ary nanao alitara i Oria mpisorona. Araka ny marika rehetra nampitondrain’i Ahaza mpanjaka avy tany Damaskosy no nanaovan’i Oria mpisorona azy mandra-piavin’i Ahaza mpanjaka avy tany Damaskosy. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Nony tonga avy tany Damaskosy ny mpanjaka dia nahita ny alitara, dia nanatona ny alitara ka niakatra teo. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ary nandoro ny fanatiny dorana manontolo sy ny fanatiny avy amin’ny zavamaniry teo izy sady nampidina ny fanatiny aidina no namafy ny ran’ny fanati-pihavanany tamin’ny alitara. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Ny alitara varahina kosa, izay teo anatrehan’NY TOMPO, dia nafindrany hiala teo anoloan’ny trano, dia teo anelanelan’ny alitara vaovao sy ny tranon’NY TOMPO ka nataony teo avaratry ny alitarany. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Ary i Ahaza mpanjaka dia nandidy an’i Oria mpisorona hoe: Eo ambonin’ny alitara lehibe no handorana ny fanatitra dorana manontolo amin’ny maraina; tahaka izany koa ny fanatitra avy amin’ny zavamaniry amin’ny hariva ary ny fanatitra dorana manontolo mbamin’ny fanatitra avy amin’ny zavamaniry izay ho an’ny mpanjaka sy ny fanatitra dorana manontolo mbamin’ny fanatitra avy amin’ny zavamaniry, ary ny fanatitra aidina izay ho an’ny vahoaka rehetra; ary ny ra rehetra avy amin’ny fanatitra dorana manontolo sy ny fanatitra alatsa-dra hafa dia hafafinao eo amboniny; ary ny amin’ny alitara varahina dia izaho no hikarakara ny momba azy. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Ary i Oria mpisorona dia nanatanteraka izay rehetra nandidian’i Ahaza mpanjaka.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Nopotehin’i Ahaza mpanjaka ireo takelaka teo amin’ny fitoeran’ny koveta ary nesoriny ny koveta izay teo amboniny. Ilay koveta lehibe dia nampidininy hiala tamin’ireo omby varahina izay teo ambaniny ka nataony teo ambony lampivato. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Ny Fialofana tamin’ny Sabata, izay natao teo akaikin’ny trano, sy ny fidirana ivelany izay an’ny mpanjaka, dia nafindrany ho ao amin’ny tranon’NY TOMPO noho ny tahony ny mpanjakan’i Asiria.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Ny tantaran’i Ahaza sisa, tsy voasoratra ao amin’ny bokin’ny tantaran’ny mpanjakan’ny Joda va izany? '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Roapolo taona i Ahaza, raha nanomboka nanjaka, ary enina amby folo taona no nanjakany tany Jerosalema. Tsy nanao izay mahitsy teo imason’NY TOMPO Andriamaniny tahaka ny nataon’i Davida rainy izy '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Ary nodimandry any amin’ny razany i Ahaza dia nalevina tao amin’ny razany tao amin’ny Tanànan’i Davida izy. Ary i Hezekia zanany no nanjaka nandimby azy.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'fa nandeha tamin’ny lalan’ireo mpanjakan’ny Israely; eny, ny zanany lahy aza dia nampamakivakiny ny afo, araka ny fahavetavetan’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jentilisa
    - type: text
      text: ' izay noroahin’NY TOMPO tsy ho eo anoloan’ny Zanak’Israely. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Namono zavatra ho fanatitra izy sady nandoro ditin-kazo manitra teny amin’ny toerana fanaovana sorona sy teny amin’ny havoana ary teny ambanin’ny hazo maitso rehetra koa.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Tamin’izany dia niakatra hanafika an’i Jerosalema i Rezina, mpanjakan’i Arama, sy i Peka, zanak’i Remalia, mpanjakan’ny Israely. Nanao fahirano an’i Ahaza izy, nefa tsy afaka namaky ady. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Tamin’izany andro izany i Rezina, mpanjakan’i Arama, dia nahazo an’i Elota ho isan’ny fanjakan’i Arama indray ka nandroaka ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jiosy
    - type: text
      text: ' hiala tao; ary nankany Elota ny Arameana ka monina ao mandraka androany. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ary i Ahaza dia nandefa iraka ho any amin’i Tiglato-Pilesera, mpanjakan’i Asiria, hilaza hoe: Mpanomponao sy zanakao aho; miakara ka vonjeo aho tsy ho azon’ny mpanjakan’i Arama sy ny mpanjakan’ny Israely, izay mitsangana hiady amiko. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Ary nalain’i Ahaza ny volafotsy sy ny volamena izay hita tao amin’ny tranon’NY TOMPO sy tao amin’ny efitrano fitahirizana ao amin’ny tranon’ny mpanjaka dia nampanateriny ho fanomezana ho an’ny mpanjakan’i Asiria. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Dia nanaiky ny teniny ny mpanjakan’i Asiria. Niakatra hamely an’i Damaskosy ny mpanjakan’i Asiria ka nahazo azy; dia nalefany ho babo any Kira ny olona, fa i Rezina kosa dia novonoiny.
