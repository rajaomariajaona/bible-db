document_id: EZK.19
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Hira fitarainan’ny liona
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary ianao, manaova hira fisaonana ny amin’ireo andrianan’ny Israely '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'ka lazao hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Inona moa reninareo? Liom-bavy izy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Namitsaka teo amin’ny liona izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary nitaiza ny zanany
- type: usfm
  marker: q1
  children:
  - type: text
    text: teo amin’ny liona tanora.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Nahalehibe ny zanany iray izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia tonga liona tanora io
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka nianatra hamiravira haza
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady nihinana olona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Nahare ny lazany ny firenena
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia namandrika azy tamin’ny lavaka
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka nasiany masom-by ny orony,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary noentiny ho any amin’ny tany Ejipta izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Nony hitan’ny liom-bavy
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa foana sy levona ny fanantenany
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia nanalany indray ny zanany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka notezainy ho tonga liona tanora.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Dia nivoivoy teny amin’ny liom-bavy iny
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tonga liona tanora,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary nianatra hamiravira haza
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady nihinana olona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Narodany ny lapan’ireny
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady noravany ny tanànany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka lao ny tany mbamin’izay rehetra tao aminy
- type: usfm
  marker: q1
  children:
  - type: text
    text: noho ny feon’ny fierony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jentilisa
  - type: text
    text: ' manodidina,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay avy any amin’ny fari-piadidiany samihafa,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia nanamboatra sy namelatra ny fandrika haratony taminy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka voafandrika tamin’ny lavaka izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Nataony tamin’ny tranokely izy ka nasiany masom-by ny orony
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary noentiny ho any amin’ny mpanjakan’i Babilona izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: noentiny ho ao amin’ny manda izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba tsy ho re intsony ny feony
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny amin’ny tendrombohitry ny Israely.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fitarainan’ny tahom-boaloboka
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ny reninao dia tahaka ny voaloboka
- type: usfm
  marker: q1
  children:
  - type: text
    text: voavoly teo amoron-drano,
- type: usfm
  marker: q1
  children:
  - type: text
    text: vokatra sady nanaroka izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: azon’ny rano betsaka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Nisy rantsany matanjaka teo aminy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka azo natao tehim-panjakana ho an’izay manapaka izany.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tonga avo izy ka nitehika teny amin’ny rahona matevina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mora tazana noho ny haavony izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy noho ny hamaroan’ny rantsany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Nefa nongotana tamin’ny fahavinirana izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka nazera ho amin’ny tany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny rivotra avy any atsinanana no nahamaina ny voany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny rantsany matanjaka dia tapaka ka maina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: levon’ny afo ireny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ary ankehitriny dia voavoly any an-tany efitra izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ao amin’ny tany maina sady karankaina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Afo no mivoaka avy amin’ny sampany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka mandevona ny voany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy misy rantsany mafy
- type: usfm
  marker: q1
  children:
  - type: text
    text: azo atao tehim-panjakana ho fanapahana intsony izy.
- type: usfm
  marker: m
  children:
  - type: text
    text: Hira fisaonana izany sady mbola ho hira fisaonana ihany.
