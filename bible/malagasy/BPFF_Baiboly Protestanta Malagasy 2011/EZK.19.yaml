document_id: EZK.19,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Hira fitarainan’ny liona
  - type: text
    content: 'Ary ianao, manaova hira fisaonana ny amin’ireo andrianan’ny Israely '
  '10':
  - type: text
    content: Ny reninao dia tahaka ny voaloboka
  - type: text
    content: voavoly teo amoron-drano,
  - type: text
    content: vokatra sady nanaroka izy
  - type: text
    content: azon’ny rano betsaka.
  '11':
  - type: text
    content: Nisy rantsany matanjaka teo aminy
  - type: text
    content: ka azo natao tehim-panjakana ho an’izay manapaka izany.
  - type: text
    content: Tonga avo izy ka nitehika teny amin’ny rahona matevina,
  - type: text
    content: mora tazana noho ny haavony izy
  - type: text
    content: sy noho ny hamaroan’ny rantsany.
  '12':
  - type: text
    content: Nefa nongotana tamin’ny fahavinirana izy
  - type: text
    content: ka nazera ho amin’ny tany;
  - type: text
    content: ny rivotra avy any atsinanana no nahamaina ny voany;
  - type: text
    content: ny rantsany matanjaka dia tapaka ka maina;
  - type: text
    content: levon’ny afo ireny.
  '13':
  - type: text
    content: Ary ankehitriny dia voavoly any an-tany efitra izy,
  - type: text
    content: dia ao amin’ny tany maina sady karankaina.
  '14':
  - type: text
    content: Afo no mivoaka avy amin’ny sampany
  - type: text
    content: ka mandevona ny voany;
  - type: text
    content: tsy misy rantsany mafy
  - type: text
    content: azo atao tehim-panjakana ho fanapahana intsony izy.
  - type: text
    content: Hira fisaonana izany sady mbola ho hira fisaonana ihany.
  '2':
  - type: text
    content: 'ka lazao hoe:'
  - type: text
    content: Inona moa reninareo? Liom-bavy izy.
  - type: text
    content: Namitsaka teo amin’ny liona izy
  - type: text
    content: ary nitaiza ny zanany
  - type: text
    content: teo amin’ny liona tanora.
  '3':
  - type: text
    content: Nahalehibe ny zanany iray izy
  - type: text
    content: dia tonga liona tanora io
  - type: text
    content: ka nianatra hamiravira haza
  - type: text
    content: sady nihinana olona.
  '4':
  - type: text
    content: Nahare ny lazany ny firenena
  - type: text
    content: dia namandrika azy tamin’ny lavaka
  - type: text
    content: ka nasiany masom-by ny orony,
  - type: text
    content: ary noentiny ho any amin’ny tany Ejipta izy.
  '5':
  - type: text
    content: Nony hitan’ny liom-bavy
  - type: text
    content: fa foana sy levona ny fanantenany
  - type: text
    content: dia nanalany indray ny zanany
  - type: text
    content: ka notezainy ho tonga liona tanora.
  '6':
  - type: text
    content: Dia nivoivoy teny amin’ny liom-bavy iny
  - type: text
    content: ka tonga liona tanora,
  - type: text
    content: ary nianatra hamiravira haza
  - type: text
    content: sady nihinana olona.
  '7':
  - type: text
    content: Narodany ny lapan’ireny
  - type: text
    content: sady noravany ny tanànany
  - type: text
    content: ka lao ny tany mbamin’izay rehetra tao aminy
  - type: text
    content: noho ny feon’ny fierony.
  '8':
  - type: text
    content: 'Ary ny '
  - type: text
    content: Jentilisa
  - type: text
    content: ' manodidina,'
  - type: text
    content: izay avy any amin’ny fari-piadidiany samihafa,
  - type: text
    content: dia nanamboatra sy namelatra ny fandrika haratony taminy
  - type: text
    content: ka voafandrika tamin’ny lavaka izy.
  '9':
  - type: text
    content: Nataony tamin’ny tranokely izy ka nasiany masom-by ny orony
  - type: text
    content: ary noentiny ho any amin’ny mpanjakan’i Babilona izy;
  - type: text
    content: noentiny ho ao amin’ny manda izy
  - type: text
    content: mba tsy ho re intsony ny feony
  - type: text
    content: eny amin’ny tendrombohitry ny Israely.
  - type: heading
    content: Fitarainan’ny tahom-boaloboka
