document_id: JAS.INTRO1
type_code: plt
segments:
- type: usfm
  marker: imt1
  children:
  - type: text
    text: INDRAY MIJERY
- type: usfm
  marker: ip
  children:
  - type: text
    text: Voalaza eo am-piandohana fa taratasy nosoratana ho an’ny firenena roa amby folo monina any am-pielezana ity epistily ity. Sary ilazana ny Fiangonana kristiana izay vahiny eto amin’izao tontolo izao izany. Ny fiteny grika ampiasaina ato sy ny fomba fanoratra dia mahatonga ny mpandinika rehetra hihevitra fa ireto nanoratana ny Epistily ireto dia Jiosy niova ho Kristiana nefa mbola manana fifandraisana amin’ny sinagoga sady nobeazina tamin’ny kolontsaina grika.
- type: usfm
  marker: ip
  children:
  - type: text
    text: I Jakoba, rahalahin’ny Tompo, ilay ambaran’i Paoly fa anisan’ny andry teo amin’ny Fiangonana voalohany tany Jerosalema (Gal 1.19; 2.9) no heverina fa nanoratra ity epistily ity.
- type: usfm
  marker: is1
  children:
  - type: text
    text: Ny votoatin’ny Epistily
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Fampianarana sy dinika mahakasika ny fiainana andavanandro sy ny fitondrantena mahamendrika ny Kristiana no ampahafantarina ato amin’ity epistily ity, ary misy ifandraisany akaiky amin’ny voalazan’i Jesosy tao amin’ny toriteniny teo an-tendrombohitra izany. Ny finoana aseho amin’ny asa: Izay no isan’ny mampalaza ity epistily ity. Asiany teny amin’izany ny maha zava-dehibe ny teny aloaky ny vava, ny fahendrena vokatry ny maha mpivavaka, ny amin’ny mpanankarena sy ny mahantra, ary ny maha izy azy ny fiarahamonin’ny mpivavaka.'
- type: usfm
  marker: iot
  children:
  - type: text
    text: Ny firafitry ny Epistily
- type: usfm
  marker: io1
  children:
  - type: text
    text: 'Ny fizahan-toetra ny finoana: 1.12-18'
- type: usfm
  marker: io1
  children:
  - type: text
    text: 'Ny lojikan’ny finoana sy ny lojikan’izao tontolo izao: 1.19–2.26'
- type: usfm
  marker: io1
  children:
  - type: text
    text: 'Ny fahendrena azo amin’ny finoana aseho amin’ny teny sy amin’ny asa: 3.1–4.12'
- type: usfm
  marker: io1
  children:
  - type: text
    text: 'Ny mpanankarena sy ny fanaony: 4.13–5.6'
- type: usfm
  marker: io1
  children:
  - type: text
    text: 'Ny faharetana sy ny fiombonana noho ny finoana: 5.7-20'
