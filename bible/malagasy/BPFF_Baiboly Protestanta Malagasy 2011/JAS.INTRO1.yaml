document_id: JAS.INTRO1,3103
type_code: plt
verses:
  '1':
  - type: text
    content: INDRAY MIJERY
  - type: text
    content: Voalaza eo am-piandohana fa taratasy nosoratana ho an’ny firenena roa amby folo monina any am-pielezana ity epistily ity. Sary ilazana ny Fiangonana kristiana izay vahiny eto amin’izao tontolo izao izany. Ny fiteny grika ampiasaina ato sy ny fomba fanoratra dia mahatonga ny mpandinika rehetra hihevitra fa ireto nanoratana ny Epistily ireto dia Jiosy niova ho Kristiana nefa mbola manana fifandraisana amin’ny sinagoga sady nobeazina tamin’ny kolontsaina grika.
  - type: text
    content: I Jakoba, rahalahin’ny Tompo, ilay ambaran’i Paoly fa anisan’ny andry teo amin’ny Fiangonana voalohany tany Jerosalema (Gal 1.19; 2.9) no heverina fa nanoratra ity epistily ity.
  - type: text
    content: Ny votoatin’ny Epistily
  - type: text
    content: 'Fampianarana sy dinika mahakasika ny fiainana andavanandro sy ny fitondrantena mahamendrika ny Kristiana no ampahafantarina ato amin’ity epistily ity, ary misy ifandraisany akaiky amin’ny voalazan’i Jesosy tao amin’ny toriteniny teo an-tendrombohitra izany. Ny finoana aseho amin’ny asa: Izay no isan’ny mampalaza ity epistily ity. Asiany teny amin’izany ny maha zava-dehibe ny teny aloaky ny vava, ny fahendrena vokatry ny maha mpivavaka, ny amin’ny mpanankarena sy ny mahantra, ary ny maha izy azy ny fiarahamonin’ny mpivavaka.'
  - type: text
    content: Ny firafitry ny Epistily
  - type: text
    content: 'Ny fizahan-toetra ny finoana: 1.12-18'
  - type: text
    content: 'Ny lojikan’ny finoana sy ny lojikan’izao tontolo izao: 1.19–2.26'
  - type: text
    content: 'Ny fahendrena azo amin’ny finoana aseho amin’ny teny sy amin’ny asa: 3.1–4.12'
  - type: text
    content: 'Ny mpanankarena sy ny fanaony: 4.13–5.6'
  - type: text
    content: 'Ny faharetana sy ny fiombonana noho ny finoana: 5.7-20'
