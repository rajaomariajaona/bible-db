document_id: GAL.6,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mifampitondra izay mavesatra
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ry rahalahy, raha misy olona sendra azon’ny ota dia atsanganonareo izay ara-panahy amin’ny fahamorana izy ka tandremo ny tenanao, fandrao halaim-panahy koa ianao. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Koa araka ny ananantsika fotoana, aoka isika hanao soa amin’ny olona rehetra, indrindra fa amin’ny mpianakavin’ny finoana.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Anatra farany sy fanaovam-beloma
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Jereo ny havaventin’ny soratra izay soratan’ny tanako ho anareo. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Na iza na iza te hiseho ho tsara amin’ny nofo dia ireo no manery anareo hoforana, noho izao ihany: Fandrao enjehina noho ny hazofijalian’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ' izy. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Na ny tenan’izy voafora aza dia tsy mitandrina ny lalàna; kanefa ianareo dia tiany hoforana koa, mba hireharehany amin’ny nofonareo.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Fa ny amiko dia sanatria raha misy hataoko rehareha afa-tsy ny hazofijalian’i Jesosy Kristy Tompontsika. Tamin’ny alalany no naha voahombo an’izao tontolo izao raha ny amiko, ary naha voahombo ahy raha ny amin’izao tontolo izao. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Samy tsy mahasoa na ny famorana na ny tsy famorana, fa ny maha olom-baovao ihany. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Ny fiadanana sy ny famindrampo anie no ho an’izay rehetra mandeha araka ity fitsipika ity sy ho amin’ny Israelin’Andriamanitra.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Aoka tsy hisy hanahirana ahy intsony amin’izao sisa izao; fa izaho dia mitondra ny marik’i Jesosy eo amin’ny tenako.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Ho amin’ny fanahinareo anie, ry rahalahy, ny fahasoavan’i Jesosy Kristy Tompontsika! '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Amena
    - type: text
      text: '!'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Mifampitondrà izay mavesatra ary aoka izany no hahatanterahanareo ny lalànan’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: '. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Raha misy mihevi-tena ho zavatra, kanefa tsinontsinona, dia mamitaka ny tenany izy. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Aoka hizaha toetra ny asany avy ny olona rehetra, mba ho amin’ny tenany ihany izy no afaka hirehareha, fa tsy amin’ny olon-kafa; '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: satria samy hitondra ny anjara entany avy ny olona rehetra.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Aoka izay ampianarina ny teny mba hahafoy zava-tsoa ho an’izay mampianatra.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Aza mety hofitahina ianareo; Andriamanitra tsy azo vazivazina, fa izay afafin’ny olona no hojinjainy. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Izay mamafy ho an’ny nofony dia hijinja fahasimbana avy amin’ny nofo; izay mamafy ho an’ny Fanahy dia hijinja fiainana mandrakizay avy amin’ny Fanahy. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Aza mba ketraka amin’ny fanaovan-tsoa isika; fa amin’ny fotoanany no hijinjantsika raha tsy kivy isika. '
