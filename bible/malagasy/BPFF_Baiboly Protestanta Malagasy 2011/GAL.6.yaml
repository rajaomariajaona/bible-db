document_id: GAL.6,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Mifampitondra izay mavesatra
  - type: text
    content: 'Ry rahalahy, raha misy olona sendra azon’ny ota dia atsanganonareo izay ara-panahy amin’ny fahamorana izy ka tandremo ny tenanao, fandrao halaim-panahy koa ianao. '
  '10':
  - type: text
    content: Koa araka ny ananantsika fotoana, aoka isika hanao soa amin’ny olona rehetra, indrindra fa amin’ny mpianakavin’ny finoana.
  - type: heading
    content: Anatra farany sy fanaovam-beloma
  '11':
  - type: text
    content: 'Jereo ny havaventin’ny soratra izay soratan’ny tanako ho anareo. '
  '12':
  - type: text
    content: 'Na iza na iza te hiseho ho tsara amin’ny nofo dia ireo no manery anareo hoforana, noho izao ihany: Fandrao enjehina noho ny hazofijalian’i '
  - type: text
    content: Kristy
  - type: text
    content: ' izy. '
  '13':
  - type: text
    content: Na ny tenan’izy voafora aza dia tsy mitandrina ny lalàna; kanefa ianareo dia tiany hoforana koa, mba hireharehany amin’ny nofonareo.
  '14':
  - type: text
    content: 'Fa ny amiko dia sanatria raha misy hataoko rehareha afa-tsy ny hazofijalian’i Jesosy Kristy Tompontsika. Tamin’ny alalany no naha voahombo an’izao tontolo izao raha ny amiko, ary naha voahombo ahy raha ny amin’izao tontolo izao. '
  '15':
  - type: text
    content: 'Samy tsy mahasoa na ny famorana na ny tsy famorana, fa ny maha olom-baovao ihany. '
  '16':
  - type: text
    content: Ny fiadanana sy ny famindrampo anie no ho an’izay rehetra mandeha araka ity fitsipika ity sy ho amin’ny Israelin’Andriamanitra.
  '17':
  - type: text
    content: Aoka tsy hisy hanahirana ahy intsony amin’izao sisa izao; fa izaho dia mitondra ny marik’i Jesosy eo amin’ny tenako.
  '18':
  - type: text
    content: 'Ho amin’ny fanahinareo anie, ry rahalahy, ny fahasoavan’i Jesosy Kristy Tompontsika! '
  - type: text
    content: Amena
  - type: text
    content: '!'
  '2':
  - type: text
    content: 'Mifampitondrà izay mavesatra ary aoka izany no hahatanterahanareo ny lalànan’i '
  - type: text
    content: Kristy
  - type: text
    content: '. '
  '3':
  - type: text
    content: 'Raha misy mihevi-tena ho zavatra, kanefa tsinontsinona, dia mamitaka ny tenany izy. '
  '4':
  - type: text
    content: 'Aoka hizaha toetra ny asany avy ny olona rehetra, mba ho amin’ny tenany ihany izy no afaka hirehareha, fa tsy amin’ny olon-kafa; '
  '5':
  - type: text
    content: satria samy hitondra ny anjara entany avy ny olona rehetra.
  '6':
  - type: text
    content: Aoka izay ampianarina ny teny mba hahafoy zava-tsoa ho an’izay mampianatra.
  '7':
  - type: text
    content: 'Aza mety hofitahina ianareo; Andriamanitra tsy azo vazivazina, fa izay afafin’ny olona no hojinjainy. '
  '8':
  - type: text
    content: 'Izay mamafy ho an’ny nofony dia hijinja fahasimbana avy amin’ny nofo; izay mamafy ho an’ny Fanahy dia hijinja fiainana mandrakizay avy amin’ny Fanahy. '
  '9':
  - type: text
    content: 'Aza mba ketraka amin’ny fanaovan-tsoa isika; fa amin’ny fotoanany no hijinjantsika raha tsy kivy isika. '
