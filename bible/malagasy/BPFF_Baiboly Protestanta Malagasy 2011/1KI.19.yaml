document_id: 1KI.19
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mandositra an’i Jezebela i Elia
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Dia nolazain’i Ahaba tamin’i Jezebela izay rehetra nataon’i Elia, dia ny namonoany ny mpaminany rehetra tamin’ny sabatra. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary nandefa iraka tany amin’i Elia i Jezebela hilaza hoe: Hataon’ireo andriamanitra amiko anie izany, eny, mihoatra noho izany aza, raha tsy hataoko toy ny ain’ny iray amin’ireny ny ainao raha maraina toy izao! '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Raha nahatsinjo izany i Elia dia niainga ka lasa nandeha hamonjy ny ainy nankany Bery-Sheba izay any Joda, ary ny zatovony dia najanony tao. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Fa izy kosa nandeha lalana indray andro tany an-tany efitra, ary tonga teo ambanin’ny anjavidy iray izy dia nipetraka; nangataka ho faty teo izy ka niteny hoe: Aoka izay! Alao ny aiko ankehitriny, TOMPO ô, fa tsy tsara noho ny razako aho. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Nony nandry teo izy ka natory, indro nisy anjely nanohina azy ka niteny taminy hoe: Miarena ka homàna! '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia nijery izy ka indro, teo anilan’ny lohany dia nisy mofo voaendy tamin’ny vato mahamay sy rano iray tavoara. Nihinana sy nisotro izy dia nandry indray. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Tonga nanohina azy fanindroany ilay '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Anjelin’NY TOMPO
  - type: text
    text: ' dia nanohina azy ka niteny hoe: Mifohaza ka homàna, fa lavitra loatra ny halehanao. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Dia nifoha izy ka nihinana sy nisotro ary nandeha tamin’ny tanjaka azony tamin’izany hanina izany efapolo andro sy efapolo alina ho any Horeba, tendrombohitr’Andriamanitra.
- type: usfm
  marker: s1
  children:
  - type: text
    text: I Elia tany Horeba
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Rehefa tonga tany izy dia niditra tao anatin’ny zohy iray ka nandany ny alina tao. Ary indro, tonga taminy ny tenin’NY TOMPO hoe: Manao inona eto ianao, ry Elia? '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dia hoy izy: Saro-piaro loatra ny foko noho ny fitiavako NY TOMPO, Andriamanitra Tompon’izao rehetra izao; fa ny Zanak’Israely dia nahafoy ny fanekenao; ny alitaranao dia noravany, ny mpaminaninao dia novonoiny tamin’ny sabatra, ary izaho dia izaho irery ihany no sisa, nefa mbola mitady hahafaty ny aiko koa izy! '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Hoy NY TOMPO: Mivoaha avy ato ka mijoroa eo ambonin’ny tendrombohitra, eo anatrehan’NY TOMPO. Ary indro, nandalo NY TOMPO ka nisy rivotra be sady mahery namakivaky ny tendrombohitra sy nanorotoro ny harambato teo alohan’NY TOMPO; nefa NY TOMPO tsy tao amin’ny rivotra. Nanarakaraka ny rivotra dia nisy horohoron-tany; nefa NY TOMPO tsy tao amin’ny horohoron-tany. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Nanarakaraka ny horohoron-tany dia nisy afo; nefa NY TOMPO tsy tao amin’ny afo. Ary nanarakaraka ny afo dia nisy feo toy ny rivotra nitsoka malefaka. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Rehefa nahare izany i Elia dia nosaronany ny akanjobeny ivelany ny tavany dia niala teo izy ka nijoro teo am-bavan’ny zohy. Ary indro, nisy feo tonga taminy hoe: Manao inona eto ianao ry Elia? '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dia hoy izy: Saro-piaro loatra ny foko noho ny fitiavako NY TOMPO, Andriamanitra Tompon’izao rehetra izao; fa ny Zanak’Israely dia nahafoy ny fanekenao; ny alitaranao dia noravany, ary ny mpaminaninao dia novonoiny tamin’ny sabatra, ary izaho dia izaho irery ihany no sisa, nefa mbola mitady hahafaty ny aiko koa izy! '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Hoy NY TOMPO taminy: Mandehana, miverena amin’ny nalehanao ho any an-tany efitr’i Damaskosy; rehefa tonga any ianao dia hosory ho mpanjakan’i Arama i Hazaela. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary i Jeho, zanak’i Nimsy, kosa dia hosory ho mpanjakan’ny Israely; ary i Elisa, zanak’i Safata, avy any Abela-Mehola, dia hosory ho mpaminany handimby anao. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary izay afa-mandositra ny sabatr’i Hazaela dia hovonoin’i Jeho; ary izay afa-mandositra ny sabatr’i Jeho kosa dia hovonoin’i Elisa. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Nefa hamela fito arivo ao amin’ny Israely Aho, dia ny lohalika rehetra izay tsy nandohalika tamin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Baala
  - type: text
    text: ' sy ny vava rehetra izay tsy nanoroka azy.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Tendren’i Elia handimby azy i Elisa
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Dia niala teo i Elia ka nahita an’i Elisa, zanak’i Safata, teo am-piasana tany. Nampiasa omby efatra amby roapolo mikambana tsiroaroa avy izy, ary izy teo amin’ny roa farany indrindra; ary nandroso nanatona azy i Elia, dia nanipy ny akanjobeny ivelany hanarona azy. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Dia nandao ny omby izy ka nihazakazaka nanaraka an’i Elia sady niteny hoe: Miangavy anao aho, mba avelao aloha aho hanoroka an’Ikaky sy Ineny vao manaraka anao. Nefa hoy izy taminy: Mandehana miverina! Fa naninona anao moa aho? '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Dia niverina izy niala tamin’i Elia ka naka omby roa mikambana dia namono azy, ary nahandroiny tamin’ny hazo avy tamin’ny fiasàn’ny omby ihany ny henan’ireo ka nomeny hohanin’ny olona. Ary niainga izy ka nanaraka an’i Elia dia nanompo azy.
