document_id: 1KI.19,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Mandositra an’i Jezebela i Elia
  - type: text
    content: 'Dia nolazain’i Ahaba tamin’i Jezebela izay rehetra nataon’i Elia, dia ny namonoany ny mpaminany rehetra tamin’ny sabatra. '
  '10':
  - type: text
    content: 'Dia hoy izy: Saro-piaro loatra ny foko noho ny fitiavako NY TOMPO, Andriamanitra Tompon’izao rehetra izao; fa ny Zanak’Israely dia nahafoy ny fanekenao; ny alitaranao dia noravany, ny mpaminaninao dia novonoiny tamin’ny sabatra, ary izaho dia izaho irery ihany no sisa, nefa mbola mitady hahafaty ny aiko koa izy! '
  '11':
  - type: text
    content: 'Hoy NY TOMPO: Mivoaha avy ato ka mijoroa eo ambonin’ny tendrombohitra, eo anatrehan’NY TOMPO. Ary indro, nandalo NY TOMPO ka nisy rivotra be sady mahery namakivaky ny tendrombohitra sy nanorotoro ny harambato teo alohan’NY TOMPO; nefa NY TOMPO tsy tao amin’ny rivotra. Nanarakaraka ny rivotra dia nisy horohoron-tany; nefa NY TOMPO tsy tao amin’ny horohoron-tany. '
  '12':
  - type: text
    content: 'Nanarakaraka ny horohoron-tany dia nisy afo; nefa NY TOMPO tsy tao amin’ny afo. Ary nanarakaraka ny afo dia nisy feo toy ny rivotra nitsoka malefaka. '
  '13':
  - type: text
    content: 'Rehefa nahare izany i Elia dia nosaronany ny akanjobeny ivelany ny tavany dia niala teo izy ka nijoro teo am-bavan’ny zohy. Ary indro, nisy feo tonga taminy hoe: Manao inona eto ianao ry Elia? '
  '14':
  - type: text
    content: 'Dia hoy izy: Saro-piaro loatra ny foko noho ny fitiavako NY TOMPO, Andriamanitra Tompon’izao rehetra izao; fa ny Zanak’Israely dia nahafoy ny fanekenao; ny alitaranao dia noravany, ary ny mpaminaninao dia novonoiny tamin’ny sabatra, ary izaho dia izaho irery ihany no sisa, nefa mbola mitady hahafaty ny aiko koa izy! '
  '15':
  - type: text
    content: 'Hoy NY TOMPO taminy: Mandehana, miverena amin’ny nalehanao ho any an-tany efitr’i Damaskosy; rehefa tonga any ianao dia hosory ho mpanjakan’i Arama i Hazaela. '
  '16':
  - type: text
    content: 'Ary i Jeho, zanak’i Nimsy, kosa dia hosory ho mpanjakan’ny Israely; ary i Elisa, zanak’i Safata, avy any Abela-Mehola, dia hosory ho mpaminany handimby anao. '
  '17':
  - type: text
    content: 'Ary izay afa-mandositra ny sabatr’i Hazaela dia hovonoin’i Jeho; ary izay afa-mandositra ny sabatr’i Jeho kosa dia hovonoin’i Elisa. '
  '18':
  - type: text
    content: 'Nefa hamela fito arivo ao amin’ny Israely Aho, dia ny lohalika rehetra izay tsy nandohalika tamin’ny '
  - type: text
    content: Baala
  - type: text
    content: ' sy ny vava rehetra izay tsy nanoroka azy.'
  - type: heading
    content: Tendren’i Elia handimby azy i Elisa
  '19':
  - type: text
    content: 'Dia niala teo i Elia ka nahita an’i Elisa, zanak’i Safata, teo am-piasana tany. Nampiasa omby efatra amby roapolo mikambana tsiroaroa avy izy, ary izy teo amin’ny roa farany indrindra; ary nandroso nanatona azy i Elia, dia nanipy ny akanjobeny ivelany hanarona azy. '
  '2':
  - type: text
    content: 'Ary nandefa iraka tany amin’i Elia i Jezebela hilaza hoe: Hataon’ireo andriamanitra amiko anie izany, eny, mihoatra noho izany aza, raha tsy hataoko toy ny ain’ny iray amin’ireny ny ainao raha maraina toy izao! '
  '20':
  - type: text
    content: 'Dia nandao ny omby izy ka nihazakazaka nanaraka an’i Elia sady niteny hoe: Miangavy anao aho, mba avelao aloha aho hanoroka an’Ikaky sy Ineny vao manaraka anao. Nefa hoy izy taminy: Mandehana miverina! Fa naninona anao moa aho? '
  '21':
  - type: text
    content: Dia niverina izy niala tamin’i Elia ka naka omby roa mikambana dia namono azy, ary nahandroiny tamin’ny hazo avy tamin’ny fiasàn’ny omby ihany ny henan’ireo ka nomeny hohanin’ny olona. Ary niainga izy ka nanaraka an’i Elia dia nanompo azy.
  '3':
  - type: text
    content: 'Raha nahatsinjo izany i Elia dia niainga ka lasa nandeha hamonjy ny ainy nankany Bery-Sheba izay any Joda, ary ny zatovony dia najanony tao. '
  '4':
  - type: text
    content: 'Fa izy kosa nandeha lalana indray andro tany an-tany efitra, ary tonga teo ambanin’ny anjavidy iray izy dia nipetraka; nangataka ho faty teo izy ka niteny hoe: Aoka izay! Alao ny aiko ankehitriny, TOMPO ô, fa tsy tsara noho ny razako aho. '
  '5':
  - type: text
    content: 'Nony nandry teo izy ka natory, indro nisy anjely nanohina azy ka niteny taminy hoe: Miarena ka homàna! '
  '6':
  - type: text
    content: 'Dia nijery izy ka indro, teo anilan’ny lohany dia nisy mofo voaendy tamin’ny vato mahamay sy rano iray tavoara. Nihinana sy nisotro izy dia nandry indray. '
  '7':
  - type: text
    content: 'Tonga nanohina azy fanindroany ilay '
  - type: text
    content: Anjelin’NY TOMPO
  - type: text
    content: ' dia nanohina azy ka niteny hoe: Mifohaza ka homàna, fa lavitra loatra ny halehanao. '
  '8':
  - type: text
    content: Dia nifoha izy ka nihinana sy nisotro ary nandeha tamin’ny tanjaka azony tamin’izany hanina izany efapolo andro sy efapolo alina ho any Horeba, tendrombohitr’Andriamanitra.
  - type: heading
    content: I Elia tany Horeba
  '9':
  - type: text
    content: 'Rehefa tonga tany izy dia niditra tao anatin’ny zohy iray ka nandany ny alina tao. Ary indro, tonga taminy ny tenin’NY TOMPO hoe: Manao inona eto ianao, ry Elia? '
