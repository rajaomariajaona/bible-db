document_id: PSA.33,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Fiderana an’Andriamanitra Mpahary sy Mpamonjy
  - type: text
    content: Mihobia ho an’NY TOMPO ianareo, ry olona marina!
  - type: text
    content: Fa mendrika hataon’ny olo-mahitsy ny fiderana.
  '10':
  - type: text
    content: Mahafoana ny fikasan’ny firenen-tsamihafa NY TOMPO;
  - type: text
    content: mahatsinontsinona ny hevitry ny olona Izy.
  '11':
  - type: text
    content: Maharitra mandrakizay ny fikasan’NY TOMPO
  - type: text
    content: ary mahatratra ny taranaka fara aman-dimby ny hevitry ny fony.
  '12':
  - type: text
    content: Sambatra ny firenena izay manana NY TOMPO ho Andriamaniny,
  - type: text
    content: dia ny olona nofidiny ho lovany!
  '13':
  - type: text
    content: Avy eny an-danitra no itsinjovan’NY TOMPO;
  - type: text
    content: mijery ny zanak’olombelona rehetra Izy;
  '14':
  - type: text
    content: avy eo amin’ny fonenany no ijereny
  - type: text
    content: ny mponina rehetra ambonin’ny tany,
  '15':
  - type: text
    content: dia Izy izay namolavola ny fon’izy rehetra
  - type: text
    content: sy mamantatra ny asany rehetra.
  '16':
  - type: text
    content: Tsy misy mpanjaka voavonjin’ny hamaroan’ny miaramilany;
  - type: text
    content: ny olo-mahery dia tsy voavonjin’ny haben’ny heriny.
  '17':
  - type: text
    content: Ny soavaly dia tsy azo itokiana ho famonjena
  - type: text
    content: ary tsy mahavonjy ny haben’ny tanjany.
  '18':
  - type: text
    content: Indro, mitsinjo izay matahotra Azy ny mason’NY TOMPO,
  - type: text
    content: dia izay manantena ny famindrampony,
  '19':
  - type: text
    content: mba hanafaka azy amin’ny fahafatesana
  - type: text
    content: sy hamelona azy raha misy mosary.
  '2':
  - type: text
    content: Miderà NY TOMPO amin’ny lokanga;
  - type: text
    content: mankalazà Azy amin’ny valiha tory folo.
  '20':
  - type: text
    content: Miandry NY TOMPO ny fanahintsika;
  - type: text
    content: famonjena antsika sy ampingantsika Izy;
  '21':
  - type: text
    content: fa Izy no ifalian’ny fontsika
  - type: text
    content: satria ny anarany masina no itokiantsika.
  '22':
  - type: text
    content: TOMPO ô, aoka ny famindramponao hitoetra aminay
  - type: text
    content: araka ny iandrasanay Anao!
  '3':
  - type: text
    content: Mihirà hira vaovao ho Azy!
  - type: text
    content: Mitendre tsara amin’ny feo mihoby.
  '4':
  - type: text
    content: Fa mahitsy ny tenin’NY TOMPO
  - type: text
    content: ary mahatoky avokoa ny asany rehetra.
  '5':
  - type: text
    content: Tia fahamarinana sy rariny Izy;
  - type: text
    content: henika ny famindrampon’NY TOMPO ny tany.
  '6':
  - type: text
    content: Tamin’ny tenin’NY TOMPO no nanaovana ny lanitra
  - type: text
    content: ary ny fofonain’ny vavany no nanaovana izay rehetra ao aminy.
  '7':
  - type: text
    content: Mampiavosa ny rano ao an-dranomasina ho toy ny antontan-javatra iray Izy;
  - type: text
    content: mitahiry ny rano lalina ho ao amin’ny trano fitahirizana Izy.
  '8':
  - type: text
    content: Aoka hatahotra NY TOMPO ny tany rehetra!
  - type: text
    content: Aoka hangovitra eo anatrehany ny mponina rehetra amin’izao tontolo izao!
  '9':
  - type: text
    content: Fa Izy no niteny dia ary izany;
  - type: text
    content: Izy no nandidy dia nitoetra mafy izany.
