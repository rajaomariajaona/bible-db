document_id: PSA.33,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fiderana an’Andriamanitra Mpahary sy Mpamonjy
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Mihobia ho an’NY TOMPO ianareo, ry olona marina!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa mendrika hataon’ny olo-mahitsy ny fiderana.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Mahafoana ny fikasan’ny firenen-tsamihafa NY TOMPO;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mahatsinontsinona ny hevitry ny olona Izy.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Maharitra mandrakizay ny fikasan’NY TOMPO
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mahatratra ny taranaka fara aman-dimby ny hevitry ny fony.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Sambatra ny firenena izay manana NY TOMPO ho Andriamaniny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ny olona nofidiny ho lovany!
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Avy eny an-danitra no itsinjovan’NY TOMPO;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mijery ny zanak’olombelona rehetra Izy;
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: avy eo amin’ny fonenany no ijereny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny mponina rehetra ambonin’ny tany,
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: dia Izy izay namolavola ny fon’izy rehetra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy mamantatra ny asany rehetra.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Tsy misy mpanjaka voavonjin’ny hamaroan’ny miaramilany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny olo-mahery dia tsy voavonjin’ny haben’ny heriny.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Ny soavaly dia tsy azo itokiana ho famonjena
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy mahavonjy ny haben’ny tanjany.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Indro, mitsinjo izay matahotra Azy ny mason’NY TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia izay manantena ny famindrampony,
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: mba hanafaka azy amin’ny fahafatesana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy hamelona azy raha misy mosary.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Miderà NY TOMPO amin’ny lokanga;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mankalazà Azy amin’ny valiha tory folo.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Miandry NY TOMPO ny fanahintsika;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: famonjena antsika sy ampingantsika Izy;
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: fa Izy no ifalian’ny fontsika
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria ny anarany masina no itokiantsika.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: TOMPO ô, aoka ny famindramponao hitoetra aminay
  - type: usfm
    marker: q1
    children:
    - type: text
      text: araka ny iandrasanay Anao!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Mihirà hira vaovao ho Azy!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mitendre tsara amin’ny feo mihoby.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Fa mahitsy ny tenin’NY TOMPO
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mahatoky avokoa ny asany rehetra.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Tia fahamarinana sy rariny Izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: henika ny famindrampon’NY TOMPO ny tany.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Tamin’ny tenin’NY TOMPO no nanaovana ny lanitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny fofonain’ny vavany no nanaovana izay rehetra ao aminy.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Mampiavosa ny rano ao an-dranomasina ho toy ny antontan-javatra iray Izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mitahiry ny rano lalina ho ao amin’ny trano fitahirizana Izy.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Aoka hatahotra NY TOMPO ny tany rehetra!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka hangovitra eo anatrehany ny mponina rehetra amin’izao tontolo izao!
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Fa Izy no niteny dia ary izany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izy no nandidy dia nitoetra mafy izany.
