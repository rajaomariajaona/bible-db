document_id: 2SA.8,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nandresen’i Davida ireo firenena manodidina
  - type: heading
    content: 1Tan 18.1-13
  - type: text
    content: Nony afaka izany dia nandresy ny Filistina i Davida ka nampietry azy; ary nesorin’i Davida tamin’ny tanan’ny Filistina ny fitondrana.
  '10':
  - type: text
    content: dia nirahin’i Toy hankany amin’i Davida mpanjaka i Jorama zanany mba hiarahaba azy sy hisaotra azy noho ny niadiany tamin’i Hadadezera sy ny nandreseny azy; fahavalon’i Toy mantsy i Hadadezera. Nitondra fanaka volafotsy sy fanaka volamena ary fanaka varahina i Jorama.
  '11':
  - type: text
    content: 'Dia nohamasinin’i Davida mpanjaka ho an’NY TOMPO koa izany mbamin’ny volafotsy sy ny volamena izay nohamasininy avy tamin’ny firenena rehetra izay efa resiny, '
  '12':
  - type: text
    content: dia tamin’i Arama sy i Moaba sy ny taranak’i Amona, ny Filistina, ny Amalekita ary ny babo azony tamin’i Hadadezera, zanak’i Rehoba, mpanjakan’i Zoba.
  '13':
  - type: text
    content: 'Ary nahazo laza i Davida nony niverina avy nandresy ny Arameana valo arivo sy iray alina teo amin’ny Lohasahantsira. '
  '14':
  - type: text
    content: Nametrahany miaramila tany Edoma; eny, nametrahany miaramila i Edoma manontolo ka tonga mpanompon’i Davida ny mponina rehetra tany Edoma. Ary nampandresy an’i Davida NY TOMPO teny amin’izay rehetra nalehany.
  - type: heading
    content: Ireo mpanao raharaham-panjakan’i Davida
  - type: heading
    content: 1Tan 18.14-17
  '15':
  - type: text
    content: 'Nanjaka tamin’ny Israely rehetra i Davida ka nitsara sy nitondra marina ny vahoakany rehetra. '
  '16':
  - type: text
    content: 'I Joaba, zanak’i Zeroia, no komandin’ny miaramila; i Josafata, zanak’i Ahiloda, no mpitadidy ny raharaham-panjakana; '
  '17':
  - type: text
    content: 'i Zadoka, zanak’i Ahitoba, sy i Ahimeleka, zanak’i Abiatara, no mpisorona; ary i Seraia no mpitantsoratra; '
  '18':
  - type: text
    content: ary i Benaia zanak’i Joiada, no komandin’ny Keretita sy ny Peletita
  - type: note
    content: 'Keretita sy Peletita: anaran’ireo miaramila vahiny, mpiambina an’i Davida.'
  - type: text
    content: ' ary ny zanak’i Davida no mpisorona.'
  '2':
  - type: text
    content: Nandresy ny Moabita koa izy dia nampandriany tamin’ny tany ireo ary norefesiny tamin’ny kofehy, koa ny indroan’ny kofehy dia novonoiny ary ny iray kofehy kosa dia novelominy; dia tonga mpanompon’i Davida ny Moabita ka nandoa hetra.
  '3':
  - type: text
    content: 'Dia resin’i Davida koa i Hadadezera, zanak’i Rehoba, mpanjakan’i Zoba, tamin’izy nampody ny fanjakany tany amoron’ny ony Eofrata. '
  '4':
  - type: text
    content: 'Nahazo babo taminy i Davida, dia miaramila an-tsoavaly fitonjato sy arivo sy miaramila an-tongotra roa alina; ary notraingotraingoin’i Davida avokoa ny soavalin’ny kalesy fitondra miady rehetra, fa ny tokony ho amin’ny kalesy zato ihany no navelany. '
  '5':
  - type: text
    content: 'Tonga hanampy an’i Hadadezera mpanjakan’i Zoba ny Arameana avy tany Damaskosy; dia nahafatesan’i Davida olona roa arivo sy roa alina koa ny Arameana. '
  '6':
  - type: text
    content: 'Nametrahan’i Davida miaramila koa tany amin’ny Arameana any Damaskosy; dia tonga mpanompon’i Davida ny Arameana ka nandoa hetra. Fa NY TOMPO nampandresy an’i Davida tany amin’izay rehetra nalehany. '
  '7':
  - type: text
    content: 'Nalain’i Davida ny ampinga volamena izay teny amin’ny mpanompon’i Hadadezera ka noentiny nankany Jerosalema. '
  '8':
  - type: text
    content: Tao Beta sy Berotahy, tanànan’i Hadadezera i Davida mpanjaka no namabo varahina be dia be.
  '9':
  - type: text
    content: 'Nony ren’i Toy, mpanjakan’i Hamata fa efa naharesy ny miaramilan’i Hadadezera rehetra i Davida, '
