document_id: 2SA.8
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nandresen’i Davida ireo firenena manodidina
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 1Tan 18.1-13
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Nony afaka izany dia nandresy ny Filistina i Davida ka nampietry azy; ary nesorin’i Davida tamin’ny tanan’ny Filistina ny fitondrana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Nandresy ny Moabita koa izy dia nampandriany tamin’ny tany ireo ary norefesiny tamin’ny kofehy, koa ny indroan’ny kofehy dia novonoiny ary ny iray kofehy kosa dia novelominy; dia tonga mpanompon’i Davida ny Moabita ka nandoa hetra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dia resin’i Davida koa i Hadadezera, zanak’i Rehoba, mpanjakan’i Zoba, tamin’izy nampody ny fanjakany tany amoron’ny ony Eofrata. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Nahazo babo taminy i Davida, dia miaramila an-tsoavaly fitonjato sy arivo sy miaramila an-tongotra roa alina; ary notraingotraingoin’i Davida avokoa ny soavalin’ny kalesy fitondra miady rehetra, fa ny tokony ho amin’ny kalesy zato ihany no navelany. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Tonga hanampy an’i Hadadezera mpanjakan’i Zoba ny Arameana avy tany Damaskosy; dia nahafatesan’i Davida olona roa arivo sy roa alina koa ny Arameana. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Nametrahan’i Davida miaramila koa tany amin’ny Arameana any Damaskosy; dia tonga mpanompon’i Davida ny Arameana ka nandoa hetra. Fa NY TOMPO nampandresy an’i Davida tany amin’izay rehetra nalehany. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Nalain’i Davida ny ampinga volamena izay teny amin’ny mpanompon’i Hadadezera ka noentiny nankany Jerosalema. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Tao Beta sy Berotahy, tanànan’i Hadadezera i Davida mpanjaka no namabo varahina be dia be.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Nony ren’i Toy, mpanjakan’i Hamata fa efa naharesy ny miaramilan’i Hadadezera rehetra i Davida, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: dia nirahin’i Toy hankany amin’i Davida mpanjaka i Jorama zanany mba hiarahaba azy sy hisaotra azy noho ny niadiany tamin’i Hadadezera sy ny nandreseny azy; fahavalon’i Toy mantsy i Hadadezera. Nitondra fanaka volafotsy sy fanaka volamena ary fanaka varahina i Jorama.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Dia nohamasinin’i Davida mpanjaka ho an’NY TOMPO koa izany mbamin’ny volafotsy sy ny volamena izay nohamasininy avy tamin’ny firenena rehetra izay efa resiny, '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: dia tamin’i Arama sy i Moaba sy ny taranak’i Amona, ny Filistina, ny Amalekita ary ny babo azony tamin’i Hadadezera, zanak’i Rehoba, mpanjakan’i Zoba.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary nahazo laza i Davida nony niverina avy nandresy ny Arameana valo arivo sy iray alina teo amin’ny Lohasahantsira. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Nametrahany miaramila tany Edoma; eny, nametrahany miaramila i Edoma manontolo ka tonga mpanompon’i Davida ny mponina rehetra tany Edoma. Ary nampandresy an’i Davida NY TOMPO teny amin’izay rehetra nalehany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ireo mpanao raharaham-panjakan’i Davida
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 1Tan 18.14-17
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Nanjaka tamin’ny Israely rehetra i Davida ka nitsara sy nitondra marina ny vahoakany rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'I Joaba, zanak’i Zeroia, no komandin’ny miaramila; i Josafata, zanak’i Ahiloda, no mpitadidy ny raharaham-panjakana; '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'i Zadoka, zanak’i Ahitoba, sy i Ahimeleka, zanak’i Abiatara, no mpisorona; ary i Seraia no mpitantsoratra; '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ary i Benaia zanak’i Joiada, no komandin’ny Keretita sy ny Peletita
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Keretita sy Peletita: '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: anaran’ireo miaramila vahiny, mpiambina an’i Davida.
    marker-yv: yv-n
  - type: text
    text: ' ary ny zanak’i Davida no mpisorona.'
