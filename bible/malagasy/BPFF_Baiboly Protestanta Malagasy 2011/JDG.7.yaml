document_id: JDG.7,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Telonjato lahy ho an’i Gideona
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Dia nifoha vao maraina i Jerobaala na i Gideona, sy ny vahoaka rehetra teo aminy ka nitoby teo akaikin’ny loharano Haroda. Ny tobin’ny Midianita kosa dia teo avaratra, teo amin’ny lohasaha anilan’ny havoana More. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Fa raha matahotra hidina ianao dia aoka hidina miaraka aminao ho any amin’ny toby i Pora zatovonao. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ho renao izay lazain’ny olona, ary aorianan’izany dia hampaherezina ny tananao hidinanao any amin’ny toby. Dia nidina niaraka tamin’i Pora zatovony izy ho any amin’ny sisin-daharan’ny mpiady izay teo amin’ny toby. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Ary ny Midianita sy ny Amalekita ary ny zanaky ny Atsinanana rehetra dia nirohotra teny an-dohasaha ka tahaka ny valala ny hamarony; tsy hita isa ny ramevany ary tahaka ny fasika any amoron-dranomasina ny hamarony. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Rehefa tonga tao i Gideona, indro, nisy lehilahy nitantara nofy tamin’ny namany ka niteny hoe: Nanonofy aho ka indro, nisy silaka mofo varimbazaha hono nikodiadia ho eo amin’ny tobin’ny Midianita ka nankeo amin’ny tranolay iray, dia nandona azy ka nampivadika azy ambony ambany ary nianjera ny tranolay. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Dia namaly ilay namany hoe: Tsy zavatra hafa izany fa ny sabatr’i Gideona, zanak’i Joasy, lehilahy Israelita, mihitsy; efa natolotr’Andriamanitra eo an-tanany ny Midianita sy ny toby manontolo! '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Rehefa ren’i Gideona ny filazany ny nofy sy ny heviny dia niankohoka nivavaka izy. Avy eo izy dia niverina ho any amin’ny tobin’ny Israely ka nilaza hoe: Mitsangàna! Efa natolotry NY TOMPO eo an-tananareo ny tobin’ny Midianita!'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Resy ny Midianita
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Dia nozarainy telo toko ny telonjato lahy ka samy nomeny anjomara iray avy ho eny an-tanany sy siny tsy nisy rano ary fanilo tao anatin’ny siny. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Dia hoy izy taminy: Mijere ahy ianareo ka manaova araka izay ataoko; koa rehefa mankany amin’ny sisin’ny toby aho dia izay ataoko no hataonareo koa. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Rehefa mitsoka ny anjomara aho sy izay miaraka amiko dia mitsofa anjomara manodidina ny toby manontolo koa ianareo ka miantsoa hoe: Ho an’NY TOMPO sy ho an’i Gideona!'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Dia nankany amin’ny sisin’ny toby tamin’ny fiandohan’ny fotoam-piambenana faharoa i Gideona sy ny zato lahy niaraka taminy raha vao nanomboka ny fotoam-piambenana amin’ny misasakalina; dia nitsoka anjomara ireo sady namaky ny siny teny an-tanany. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Hoy NY TOMPO tamin’i Gideona: Maro loatra ny olona miaraka aminao ka tsy hanolotra ny Midianita eo an-tanany Aho, fandrao haka ny voninahitro ny Israely ka hiteny hoe: Ny tanako ihany no namonjy ahy. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Dia nitsoka anjomara avokoa ny telo toko sady namaky ny sininy ka nihazona ny fanilo teny an-tanany havia ary ny anjomara teny an-tanany havanana mba hotsofiny; dia niantso izy hoe: Ny sabatry NY TOMPO sy i Gideona! '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Ary samy nijoro teo amin’ny toerany avy, manodidina ny toby izy rehetra; dia nihazakazaka ny miaramila rehetra ka niantsoantso sady nandositra. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Dia nitsoka anjomara ny telonjato lahy ary nampifamelezin’NY TOMPO tamin’ny sabatra ny miaramila rehetra manerana ny toby, dia nandositra hatrany Bety-Sita izy ka hatrany Zereraha sy hatrany amin’ny sisin’i Abela-Mehola akaiky an’i Tabata.
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Dia nivory ny lehilahin’ny Israely avy tamin’ny Naftaly sy ny Asera ary ny Manase rehetra ka nanenjika ny Midianita. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Ary naniraka olona hitety ny tany be havoana any Efraima rehetra i Gideona mba hilaza hoe: Midìna hisakana ny Midianita ka baboy ny toerana misy rano eo alohany, hatrany Bety-Bara sy i Jordana. Dia nivory ny lehilahin’i Efraima rehetra ka namabo ny toerana misy rano hatrany Bety-Bara sy i Jordana. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Nosamborin’izy ireo ny andriana midianita roa lahy, dia i Oreba sy i Zeba ka i Oreba dia novonoiny teo ambonin’ny vatolampin’i Oreba ary i Zeba dia novonoiny teo amin’ny famiazam-boalobok’i Zeba. Nenjehin’ireo ny Midianita ary ny lohan’i Oreba sy i Zeba dia noentiny tany amin’i Gideona tany andafin’i Jordana.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Koa ankehitriny, andeha miantso eo anatrehan’ny vahoaka hoe: Izay matahotra na mangovitra dia aoka hiverina ka hiala tamin’ny tany be havoana any Gileada! Dia lasa niverina ny olona roa arivo sy roa alina fa ny iray alina no sisa.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Hoy NY TOMPO tamin’i Gideona: Mbola maro loatra ihany ny olona. Ampidino ho eo amin’ny rano izy ka eo no hizahako toetra azy ho anao; izay holazaiko aminao hoe: Io no hiaraka handeha aminao, dia izy no handeha hiaraka aminao; ary izay holazaiko aminao hoe: Io tsy hiaraka aminao, dia izy kosa no tsy handeha. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Dia nampidinin’i Gideona ho eo amin’ny rano ny olona. Hoy NY TOMPO taminy: Izay rehetra milelaka rano amin’ny lelany tahaka ny filelaky ny amboa dia atokàny, ary izay rehetra mandohalika mba hisotro dia atokàny koa. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Telonjato lahy no isan’izay nanainga ny tanany tany amin’ny vavany ka nilelaka; fa ny olona sisa rehetra dia nandohalika mba hisotro rano. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Hoy NY TOMPO tamin’i Gideona: Ny telonjato lahy izay nilelaka rano no hamonjeko anareo ka hanolorako ny Midianita eo an-tananao. Ny olona sisa rehetra kosa, aoka samy hody any amin’ny fonenany avy! '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Dia noraisin’ireo an-tanana ny vatsy izay teo amin’ny olona, mbamin’ny anjomarany. Ary ny Israely sisa dia nalefany hody samy ho any amin’ny tranolainy avy, fa ny telonjato lahy ihany no nohazoniny. Ary ny tobin’ny Midianita dia teo ambaniny, teo an-dohasaha.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fambara fandresena
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Tamin’izany alina izany dia hoy NY TOMPO tamin’i Gideona: Mitsangàna, midìna ho any amin’ny toby fa efa natolotro eo an-tananao io. '
