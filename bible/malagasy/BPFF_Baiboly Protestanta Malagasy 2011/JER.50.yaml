document_id: JER.50
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Faharavan’i Babilona sy fanafahana an’ny Israely
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Izao no teny nampilazain’NY TOMPO an’i Jeremia mpaminany ny amin’i Babilona, dia ny tanin’ny Kaldeana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ambaraonareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, torio any amin’ny firenena,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary manangàna faneva,
- type: usfm
  marker: q1
  children:
  - type: text
    text: torio fa aza afenina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'lazao hoe: Azo i Babilona!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mangaihay i Bela,
- type: usfm
  marker: q1
  children:
  - type: text
    text: raiki-tahotra i Merodaka!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, mangaihay ireo sarin-javatra nataony
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary raiki-tahotra ny sampiny!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Fa misy firenena avy any avaratra miakatra hamely azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hahatonga ny taniny ho lao
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy hisy mponina intsony;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa na ny olona na ny biby dia samy handositra ka ho lasa avokoa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Amin’izany andro izany sy amin’izany fotoana izany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hoy NY TOMPO,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ho avy ny Zanak’Israely, dia izy mbamin’ny taranak’i Joda;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, handeha izy sady hitomany eny am-pandehanana
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hitady NY TOMPO Andriamaniny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Hanontany ny lalana mankany '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Ziona
  - type: text
    text: ' izy'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'sady hiatrika hankany ka hiteny hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Avia ka maneke NY TOMPO
- type: usfm
  marker: q1
  children:
  - type: text
    text: amin’ny fanekena mandrakizay tsy hohadinoina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ondry very ny oloko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa nampirenireny azy ny mpiandry azy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, nampirenireny azy teny an-tendrombohitra izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: nirenireny teny an-tendrombohitra sy teny an-kavoana ireny
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hadinony ny tany fatoriany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Izay rehetra nahita azy dia nandringana azy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ary ny fahavalony dia niteny hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy manan-keloka izahay
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria nanota tamin’NY TOMPO,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fonenan’ny fahamarinana izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia NY TOMPO, fanantenan’ny razany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Mandosira hiala an’i Babilona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, mialà amin’ny tanin’ny Kaldeana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary aoka ho tahaka ny osy mitari-dalana ny andian’ondry ianareo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Fa indro, hanaitra sy hampiakatra firenena lehibe manao andiany avy any avaratra
- type: usfm
  marker: q1
  children:
  - type: text
    text: hamely an’i Babilona Aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ireo dia hilahatra hamely azy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: koa avy ao no hahazoany azy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho tahaka ny lehilahy mahery sady mahay ny zana-tsipìkany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy miverina foana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ary ho voababo i Kaldea;
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay rehetra mamabo azy dia ho afa-po,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hoy NY TOMPO.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Satria mifaly sy miravoravo ianareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ry mpamabo ny lovako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, mifalihavanja toy ny ombivavy kely eny amin’ny ahitra ianareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady maneno toy ny soavaly matanjaka;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ho menatra indrindra ny reninareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hangaihay ilay niteraka anareo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: indro, izy no farany amin’ny firenena,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tany efitra sy tany karankaina ary tany ngazana!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Noho ny fahatezeran’NY TOMPO
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia tsy honenana i Babilona
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ho tonga tany lao avokoa;
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay rehetra mandalo azy dia ho gaga
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hisitrisitra noho ny loza rehetra namelezana azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Milahara manodidina an’i Babilona hamelezana azy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ianareo rehetra izay manenjana tsipìka;
- type: usfm
  marker: q1
  children:
  - type: text
    text: asio izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa aza tsitsìna ny zana-tsipìka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa tamin’NY TOMPO no nanotany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Akoray manodidina izy!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Manatsotra ny tanany izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: nirodana ny fotony,
- type: usfm
  marker: q1
  children:
  - type: text
    text: rava koa ny mandany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa famalian’NY TOMPO izany.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Valio izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, toy ny efa nataony no mba ataovinareo aminy kosa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Aringano tsy ho any Babilona ny mpamafy
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy izay mitana antsy fijinjana amin’ny fararano;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa noho ny sabatra mandoza
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia samy hihodina ho any amin’ny fireneny avy izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary samy handositra ho any amin’ny taniny avy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ondry iray very lalana ny Israely,
- type: usfm
  marker: q1
  children:
  - type: text
    text: liona no nanenjika azy.
- type: usfm
  marker: m
  children:
  - type: text
    text: 'Ny voalohany nandany azy dia ny mpanjakan’i Asiria, ary ny farany dia ity Nebokadnezara, mpanjakan’i Babilona, ity izay nanapatapaka ny taolany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Koa izao no lazain’Andriamanitra, Tompon’izao rehetra izao, Andriamanitry ny Israely: Indro, hovaliko ny mpanjakan’i Babilona sy ny taniny, toy ny efa namaliako ny mpanjakan’i Asiria.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ary hampodiko ho any amin’ny saha fiandrasana azy indray ny Israely
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hihinana ao Karmela sy Basana izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary any amin’ny tany be havoana any Efraima sy Gileada
- type: usfm
  marker: q1
  children:
  - type: text
    text: no hahavoky azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Amin’izany andro izany sy amin’izany fotoana izany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hoy NY TOMPO,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hotadiavina izay heloky ny Israely
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa tsy hisy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary izay fahotan’ny Joda
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa tsy ho hita;
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria havelako ny helok’izay sisa narovako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Iakaro i Merataima
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny mponina ao Pekoda,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ravao sy aringano ho toy ny zavatra voaozona ireo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hoy NY TOMPO,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tanteraho izay rehetra nandidiako anao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Misy tabataban’ady amin’ny tany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary misy fandringanana be.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Indrisy! Tapaka sy torotoro
- type: usfm
  marker: q1
  children:
  - type: text
    text: ilay tantanana namely ny tany rehetra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: efa tonga figagana any amin’ny firenena i Babilona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Nofandrihako ianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ry Babilona, ka voa,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa tsy fantatrao akory;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hita ka voasambotra koa ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria nila ady tamin’NY TOMPO.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Novohan’NY TOMPO ny trano fitoeram-piadiany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka navoakany ny fitaovan’ny fahatezerany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa misy raharaha hataon’Andriamanitra, Tompon’izao rehetra izao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: any amin’ny tanin’ny Kaldeana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Avia avokoa ianareo rehetra hamely azy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: vohay ny trano fitoeran-kanina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: atobitobio toy ny antontam-bary,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka levòny ho toy ny zavatra voaozona avokoa izay ao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa aza avela hisy sisa ho azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Vonoy ireo ombilahy rehetra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary aoka hidina ho any amin’ny famonoana ireo.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mahita loza izy fa tonga ny androny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ny fotoana hamaliana azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Injany misy feon’izay mandositra sy izay afaka avy any amin’ny tany Babilona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hanambara ny famalian’NY TOMPO Andriamanitsika ao Ziona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ny famaliana noho ny tempoliny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Antsoy ny mpandefa zana-tsipìka hamely an’i Babilona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ny mpanenjana tsipìka rehetra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mitobia manodidina hamely azy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: aoka tsy hisy ho afa-miala izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: valio araka ny asany izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, araka ny asa rehetra nataony no mba ataovy aminy kosa;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa niavonavona tamin’NY TOMPO izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia tamin’ny Iray Masin’ny Israely.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Koa hiampatrampatra eny amin’ny kianja ny zatovony, ary ho ringana ny miaramilany rehetra amin’izany andro izany, hoy NY TOMPO.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Indro, hiatrika anao Aho, ry Babilona mpiavonavona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hoy NY TOMPO, Andriamanitra Tompon’izao rehetra izao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa tonga ny andronao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ny fotoana hamaliako anao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Ho tafintohina i Babilona mpiavonavona dia ho lavo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy hisy hanarina azy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary handrehitra afo ao an-tanànany Aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka handevona ny manodidina azy rehetra izany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: NY TOMPO, mpamonjy ny Israely
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Izao no lazain’Andriamanitra, Tompon’izao rehetra izao:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Niara-nampahorina ny Zanak’Israely sy ny taranak’i Joda:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary izay rehetra namabo azy dia mihazona azy mafy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy mety mandefa azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Mahery anefa ny Mpanavotra azy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Andriamanitra, Tompon’izao rehetra izao, no anarany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: handahatra ny adiny tokoa Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hampiadana ny tany
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy hampangovitra ny mponina any Babilona kosa.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny hevitry NY TOMPO ny amin’i Babilona
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Indro, hisy sabatra hamely ny Kaldeana
- type: usfm
  marker: q1
  children:
  - type: text
    text: mbamin’ny mponina any Babilona
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny mpanapaka azy ary ny olon-kendriny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hoy NY TOMPO.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Indro, hisy sabatra hamely ny mpibedibedy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka ho very saina ireny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Indro, hisy sabatra hamely ny lehilahy maheriny
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hivadi-po ireny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Indro, hisy sabatra hamely ny soavaliny sy ny kalesy fitondrany miady
- type: usfm
  marker: q1
  children:
  - type: text
    text: mbamin’ny olona samihafa firenena rehetra ao aminy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka ho tonga toy ny vehivavy ireny!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Indro, hisy sabatra hamely ny trano fitahirizany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka horobaina izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Ny fihantonan’ny andro
- type: usfm
  marker: q1
  children:
  - type: text
    text: no mahatankina ny ranony;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa tany be sarin-javatra voasokitra izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mahalasa adala azy ny sampiny mahatahotra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Koa ny bibidia any an-tany efitra sy ny kary
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny aotirisy no honina ao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy honenana intsony izany mandrakizay
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy hitoerana hatramin’ny taranaka fara aman-dimby.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Toy ny nandravan’Andriamanitra an’i Sodoma sy i Gomora mbamin’ny tanàna eny akaikiny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hoy NY TOMPO,
- type: usfm
  marker: q1
  children:
  - type: text
    text: no tsy hisian’ny olona honina any,
- type: usfm
  marker: q1
  children:
  - type: text
    text: na zanak’olombelona hivahiny any intsony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: Indro, misy firenena avy any avaratra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia firenena lehibe sy mpanjaka maro
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay mitsangana avy any amin’ny faran’ny tany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: Tsipìka sy lefona no entiny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: lozabe sy tsy mamindra fo izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny feony dia mirohondrohona toy ny ranomasina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady mitaingin-tsoavaly izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary voaomana tahaka ny lehilahy ho amin’ny ady,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ady hamelezana anao, ry Babilona zanakavavy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: Efa ren’ny mpanjakan’i Babilona ny lazany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka miraviravy tanana izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fahoriana no mahazo azy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, fanaintainana tahaka ny vehivavy eo am-piterahana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: Indro, toy ny fiakatry ny liona avy ao amin’ny kirihitrala eny amoron’i Jordana
- type: usfm
  marker: q1
  children:
  - type: text
    text: no hiakarany ho any amin’ny fonenany mafy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa hampandosiriko tampoka hiala ao aminy izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary izay olona iray voafidy no hotendreko hanapaka azy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa iza no tahaka Ahy?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Iza no hifandahatra Amiko?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary iza moa no mpiandry ondry mahajanona eo anatrehako?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: Koa henoy ny tolo-tsaina avy amin’NY TOMPO, izay nosaininy hamelezana an’i Babilona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'sy ny heviny izay noheveriny hamelezana ny tanin’ny Kaldeana:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hoviraviraina tokoa ireny, dia ny kely indrindra amin’ny ondry;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho gaga azy tokoa ny saha fiandrasana azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Noho ny antsoantso hoe: Efa azo i Babilona,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia mihorohoro ny tany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny fitarainana dia re any amin’ny firenena.
