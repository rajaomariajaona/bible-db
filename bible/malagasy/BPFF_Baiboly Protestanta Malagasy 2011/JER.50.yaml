document_id: JER.50,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Faharavan’i Babilona sy fanafahana an’ny Israely
  - type: text
    content: Izao no teny nampilazain’NY TOMPO an’i Jeremia mpaminany ny amin’i Babilona, dia ny tanin’ny Kaldeana.
  '10':
  - type: text
    content: Ary ho voababo i Kaldea;
  - type: text
    content: izay rehetra mamabo azy dia ho afa-po,
  - type: text
    content: hoy NY TOMPO.
  '11':
  - type: text
    content: Satria mifaly sy miravoravo ianareo,
  - type: text
    content: ry mpamabo ny lovako,
  - type: text
    content: eny, mifalihavanja toy ny ombivavy kely eny amin’ny ahitra ianareo
  - type: text
    content: sady maneno toy ny soavaly matanjaka;
  '12':
  - type: text
    content: ho menatra indrindra ny reninareo,
  - type: text
    content: hangaihay ilay niteraka anareo;
  - type: text
    content: indro, izy no farany amin’ny firenena,
  - type: text
    content: tany efitra sy tany karankaina ary tany ngazana!
  '13':
  - type: text
    content: Noho ny fahatezeran’NY TOMPO
  - type: text
    content: dia tsy honenana i Babilona
  - type: text
    content: fa ho tonga tany lao avokoa;
  - type: text
    content: izay rehetra mandalo azy dia ho gaga
  - type: text
    content: ka hisitrisitra noho ny loza rehetra namelezana azy.
  '14':
  - type: text
    content: Milahara manodidina an’i Babilona hamelezana azy,
  - type: text
    content: ianareo rehetra izay manenjana tsipìka;
  - type: text
    content: asio izy,
  - type: text
    content: fa aza tsitsìna ny zana-tsipìka,
  - type: text
    content: fa tamin’NY TOMPO no nanotany.
  '15':
  - type: text
    content: Akoray manodidina izy!
  - type: text
    content: Manatsotra ny tanany izy;
  - type: text
    content: nirodana ny fotony,
  - type: text
    content: rava koa ny mandany;
  - type: text
    content: fa famalian’NY TOMPO izany.
  - type: text
    content: Valio izy,
  - type: text
    content: eny, toy ny efa nataony no mba ataovinareo aminy kosa.
  '16':
  - type: text
    content: Aringano tsy ho any Babilona ny mpamafy
  - type: text
    content: sy izay mitana antsy fijinjana amin’ny fararano;
  - type: text
    content: fa noho ny sabatra mandoza
  - type: text
    content: dia samy hihodina ho any amin’ny fireneny avy izy,
  - type: text
    content: ary samy handositra ho any amin’ny taniny avy.
  '17':
  - type: text
    content: Ondry iray very lalana ny Israely,
  - type: text
    content: liona no nanenjika azy.
  - type: text
    content: 'Ny voalohany nandany azy dia ny mpanjakan’i Asiria, ary ny farany dia ity Nebokadnezara, mpanjakan’i Babilona, ity izay nanapatapaka ny taolany. '
  '18':
  - type: text
    content: 'Koa izao no lazain’Andriamanitra, Tompon’izao rehetra izao, Andriamanitry ny Israely: Indro, hovaliko ny mpanjakan’i Babilona sy ny taniny, toy ny efa namaliako ny mpanjakan’i Asiria.'
  '19':
  - type: text
    content: Ary hampodiko ho any amin’ny saha fiandrasana azy indray ny Israely
  - type: text
    content: ka hihinana ao Karmela sy Basana izy;
  - type: text
    content: ary any amin’ny tany be havoana any Efraima sy Gileada
  - type: text
    content: no hahavoky azy.
  '2':
  - type: text
    content: Ambaraonareo,
  - type: text
    content: eny, torio any amin’ny firenena,
  - type: text
    content: ary manangàna faneva,
  - type: text
    content: torio fa aza afenina,
  - type: text
    content: 'lazao hoe: Azo i Babilona!'
  - type: text
    content: Mangaihay i Bela,
  - type: text
    content: raiki-tahotra i Merodaka!
  - type: text
    content: Eny, mangaihay ireo sarin-javatra nataony
  - type: text
    content: ary raiki-tahotra ny sampiny!
  '20':
  - type: text
    content: Amin’izany andro izany sy amin’izany fotoana izany,
  - type: text
    content: hoy NY TOMPO,
  - type: text
    content: dia hotadiavina izay heloky ny Israely
  - type: text
    content: fa tsy hisy;
  - type: text
    content: ary izay fahotan’ny Joda
  - type: text
    content: fa tsy ho hita;
  - type: text
    content: satria havelako ny helok’izay sisa narovako.
  '21':
  - type: text
    content: Iakaro i Merataima
  - type: text
    content: sy ny mponina ao Pekoda,
  - type: text
    content: ravao sy aringano ho toy ny zavatra voaozona ireo,
  - type: text
    content: hoy NY TOMPO,
  - type: text
    content: ary tanteraho izay rehetra nandidiako anao.
  '22':
  - type: text
    content: Misy tabataban’ady amin’ny tany
  - type: text
    content: ary misy fandringanana be.
  '23':
  - type: text
    content: Indrisy! Tapaka sy torotoro
  - type: text
    content: ilay tantanana namely ny tany rehetra;
  - type: text
    content: efa tonga figagana any amin’ny firenena i Babilona.
  '24':
  - type: text
    content: Nofandrihako ianao,
  - type: text
    content: ry Babilona, ka voa,
  - type: text
    content: nefa tsy fantatrao akory;
  - type: text
    content: hita ka voasambotra koa ianao
  - type: text
    content: satria nila ady tamin’NY TOMPO.
  '25':
  - type: text
    content: Novohan’NY TOMPO ny trano fitoeram-piadiany
  - type: text
    content: ka navoakany ny fitaovan’ny fahatezerany;
  - type: text
    content: fa misy raharaha hataon’Andriamanitra, Tompon’izao rehetra izao,
  - type: text
    content: any amin’ny tanin’ny Kaldeana.
  '26':
  - type: text
    content: Avia avokoa ianareo rehetra hamely azy;
  - type: text
    content: vohay ny trano fitoeran-kanina,
  - type: text
    content: atobitobio toy ny antontam-bary,
  - type: text
    content: ka levòny ho toy ny zavatra voaozona avokoa izay ao,
  - type: text
    content: fa aza avela hisy sisa ho azy.
  '27':
  - type: text
    content: Vonoy ireo ombilahy rehetra
  - type: text
    content: ary aoka hidina ho any amin’ny famonoana ireo.
  - type: text
    content: Mahita loza izy fa tonga ny androny,
  - type: text
    content: dia ny fotoana hamaliana azy.
  '28':
  - type: text
    content: Injany misy feon’izay mandositra sy izay afaka avy any amin’ny tany Babilona,
  - type: text
    content: hanambara ny famalian’NY TOMPO Andriamanitsika ao Ziona,
  - type: text
    content: dia ny famaliana noho ny tempoliny.
  '29':
  - type: text
    content: Antsoy ny mpandefa zana-tsipìka hamely an’i Babilona,
  - type: text
    content: dia ny mpanenjana tsipìka rehetra;
  - type: text
    content: mitobia manodidina hamely azy;
  - type: text
    content: aoka tsy hisy ho afa-miala izy;
  - type: text
    content: valio araka ny asany izy,
  - type: text
    content: eny, araka ny asa rehetra nataony no mba ataovy aminy kosa;
  - type: text
    content: fa niavonavona tamin’NY TOMPO izy,
  - type: text
    content: dia tamin’ny Iray Masin’ny Israely.
  '3':
  - type: text
    content: Fa misy firenena avy any avaratra miakatra hamely azy
  - type: text
    content: ka hahatonga ny taniny ho lao
  - type: text
    content: tsy hisy mponina intsony;
  - type: text
    content: fa na ny olona na ny biby dia samy handositra ka ho lasa avokoa.
  '30':
  - type: text
    content: Koa hiampatrampatra eny amin’ny kianja ny zatovony, ary ho ringana ny miaramilany rehetra amin’izany andro izany, hoy NY TOMPO.
  '31':
  - type: text
    content: Indro, hiatrika anao Aho, ry Babilona mpiavonavona,
  - type: text
    content: hoy NY TOMPO, Andriamanitra Tompon’izao rehetra izao;
  - type: text
    content: fa tonga ny andronao,
  - type: text
    content: dia ny fotoana hamaliako anao.
  '32':
  - type: text
    content: Ho tafintohina i Babilona mpiavonavona dia ho lavo
  - type: text
    content: ka tsy hisy hanarina azy;
  - type: text
    content: ary handrehitra afo ao an-tanànany Aho
  - type: text
    content: ka handevona ny manodidina azy rehetra izany.
  - type: heading
    content: NY TOMPO, mpamonjy ny Israely
  '33':
  - type: text
    content: 'Izao no lazain’Andriamanitra, Tompon’izao rehetra izao:'
  - type: text
    content: 'Niara-nampahorina ny Zanak’Israely sy ny taranak’i Joda:'
  - type: text
    content: ary izay rehetra namabo azy dia mihazona azy mafy
  - type: text
    content: ka tsy mety mandefa azy.
  '34':
  - type: text
    content: Mahery anefa ny Mpanavotra azy,
  - type: text
    content: Andriamanitra, Tompon’izao rehetra izao, no anarany;
  - type: text
    content: handahatra ny adiny tokoa Izy
  - type: text
    content: mba hampiadana ny tany
  - type: text
    content: sy hampangovitra ny mponina any Babilona kosa.
  - type: heading
    content: Ny hevitry NY TOMPO ny amin’i Babilona
  '35':
  - type: text
    content: Indro, hisy sabatra hamely ny Kaldeana
  - type: text
    content: mbamin’ny mponina any Babilona
  - type: text
    content: sy ny mpanapaka azy ary ny olon-kendriny,
  - type: text
    content: hoy NY TOMPO.
  '36':
  - type: text
    content: Indro, hisy sabatra hamely ny mpibedibedy
  - type: text
    content: ka ho very saina ireny;
  - type: text
    content: Indro, hisy sabatra hamely ny lehilahy maheriny
  - type: text
    content: ka hivadi-po ireny.
  '37':
  - type: text
    content: Indro, hisy sabatra hamely ny soavaliny sy ny kalesy fitondrany miady
  - type: text
    content: mbamin’ny olona samihafa firenena rehetra ao aminy
  - type: text
    content: ka ho tonga toy ny vehivavy ireny!
  - type: text
    content: Indro, hisy sabatra hamely ny trano fitahirizany
  - type: text
    content: ka horobaina izany.
  '38':
  - type: text
    content: Ny fihantonan’ny andro
  - type: text
    content: no mahatankina ny ranony;
  - type: text
    content: fa tany be sarin-javatra voasokitra izy,
  - type: text
    content: ary mahalasa adala azy ny sampiny mahatahotra.
  '39':
  - type: text
    content: Koa ny bibidia any an-tany efitra sy ny kary
  - type: text
    content: ary ny aotirisy no honina ao;
  - type: text
    content: tsy honenana intsony izany mandrakizay
  - type: text
    content: ary tsy hitoerana hatramin’ny taranaka fara aman-dimby.
  '4':
  - type: text
    content: Amin’izany andro izany sy amin’izany fotoana izany,
  - type: text
    content: hoy NY TOMPO,
  - type: text
    content: dia ho avy ny Zanak’Israely, dia izy mbamin’ny taranak’i Joda;
  - type: text
    content: eny, handeha izy sady hitomany eny am-pandehanana
  - type: text
    content: ka hitady NY TOMPO Andriamaniny.
  '40':
  - type: text
    content: Toy ny nandravan’Andriamanitra an’i Sodoma sy i Gomora mbamin’ny tanàna eny akaikiny,
  - type: text
    content: hoy NY TOMPO,
  - type: text
    content: no tsy hisian’ny olona honina any,
  - type: text
    content: na zanak’olombelona hivahiny any intsony.
  '41':
  - type: text
    content: Indro, misy firenena avy any avaratra,
  - type: text
    content: dia firenena lehibe sy mpanjaka maro
  - type: text
    content: izay mitsangana avy any amin’ny faran’ny tany.
  '42':
  - type: text
    content: Tsipìka sy lefona no entiny;
  - type: text
    content: lozabe sy tsy mamindra fo izy;
  - type: text
    content: ny feony dia mirohondrohona toy ny ranomasina,
  - type: text
    content: sady mitaingin-tsoavaly izy,
  - type: text
    content: ary voaomana tahaka ny lehilahy ho amin’ny ady,
  - type: text
    content: ady hamelezana anao, ry Babilona zanakavavy.
  '43':
  - type: text
    content: Efa ren’ny mpanjakan’i Babilona ny lazany
  - type: text
    content: ka miraviravy tanana izy;
  - type: text
    content: fahoriana no mahazo azy,
  - type: text
    content: eny, fanaintainana tahaka ny vehivavy eo am-piterahana.
  '44':
  - type: text
    content: Indro, toy ny fiakatry ny liona avy ao amin’ny kirihitrala eny amoron’i Jordana
  - type: text
    content: no hiakarany ho any amin’ny fonenany mafy;
  - type: text
    content: nefa hampandosiriko tampoka hiala ao aminy izy,
  - type: text
    content: ary izay olona iray voafidy no hotendreko hanapaka azy;
  - type: text
    content: fa iza no tahaka Ahy?
  - type: text
    content: Iza no hifandahatra Amiko?
  - type: text
    content: Ary iza moa no mpiandry ondry mahajanona eo anatrehako?
  '45':
  - type: text
    content: Koa henoy ny tolo-tsaina avy amin’NY TOMPO, izay nosaininy hamelezana an’i Babilona,
  - type: text
    content: 'sy ny heviny izay noheveriny hamelezana ny tanin’ny Kaldeana:'
  - type: text
    content: Hoviraviraina tokoa ireny, dia ny kely indrindra amin’ny ondry;
  - type: text
    content: ho gaga azy tokoa ny saha fiandrasana azy.
  '46':
  - type: text
    content: 'Noho ny antsoantso hoe: Efa azo i Babilona,'
  - type: text
    content: dia mihorohoro ny tany
  - type: text
    content: ary ny fitarainana dia re any amin’ny firenena.
  '5':
  - type: text
    content: 'Hanontany ny lalana mankany '
  - type: text
    content: Ziona
  - type: text
    content: ' izy'
  - type: text
    content: 'sady hiatrika hankany ka hiteny hoe:'
  - type: text
    content: Avia ka maneke NY TOMPO
  - type: text
    content: amin’ny fanekena mandrakizay tsy hohadinoina.
  '6':
  - type: text
    content: Ondry very ny oloko,
  - type: text
    content: fa nampirenireny azy ny mpiandry azy,
  - type: text
    content: eny, nampirenireny azy teny an-tendrombohitra izy;
  - type: text
    content: nirenireny teny an-tendrombohitra sy teny an-kavoana ireny
  - type: text
    content: ka hadinony ny tany fatoriany.
  '7':
  - type: text
    content: Izay rehetra nahita azy dia nandringana azy,
  - type: text
    content: 'ary ny fahavalony dia niteny hoe:'
  - type: text
    content: Tsy manan-keloka izahay
  - type: text
    content: satria nanota tamin’NY TOMPO,
  - type: text
    content: fonenan’ny fahamarinana izy,
  - type: text
    content: dia NY TOMPO, fanantenan’ny razany.
  '8':
  - type: text
    content: Mandosira hiala an’i Babilona,
  - type: text
    content: eny, mialà amin’ny tanin’ny Kaldeana,
  - type: text
    content: ary aoka ho tahaka ny osy mitari-dalana ny andian’ondry ianareo.
  '9':
  - type: text
    content: Fa indro, hanaitra sy hampiakatra firenena lehibe manao andiany avy any avaratra
  - type: text
    content: hamely an’i Babilona Aho;
  - type: text
    content: ary ireo dia hilahatra hamely azy,
  - type: text
    content: koa avy ao no hahazoany azy;
  - type: text
    content: ho tahaka ny lehilahy mahery sady mahay ny zana-tsipìkany
  - type: text
    content: ka tsy miverina foana.
