document_id: ACT.17,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Tany Tesalonika i Paoly sy i Silasy
  - type: text
    content: 'Rehefa avy namakivaky an’i Amfipolia sy Apolonia izy ireo dia tonga tao Tesalonika ary nisy sinagogan’ny '
  - type: text
    content: Jiosy
  - type: text
    content: ' tao. '
  '10':
  - type: text
    content: 'Niaraka tamin’izay dia nampandehanin’ny rahalahy iny alina iny ihany hankany Beria i Paoly sy i Silasy ka rehefa tonga tany izy ireo dia niditra tao amin’ny sinagogan’ny '
  - type: text
    content: Jiosy
  - type: text
    content: '. '
  '11':
  - type: text
    content: 'Tsara noho ny tao Tesalonika ny toe-panahin’ireo satria nandray ny teny tamin’ny zotom-po indrindra izy ka nandinika ny Soratra Masina isanandro sady nanadihady ny fahamarinan’izay reny. '
  '12':
  - type: text
    content: Koa maro tamin’izy ireo no nino ary tsy vitsy ny vehivavy grika nanan-kaja sy ny lehilahy.
  '13':
  - type: text
    content: 'Nony ren’ny Jiosy tany Tesalonika anefa fa nitory ny tenin’Andriamanitra tany Beria i Paoly dia nankany koa izy ireo ka nampikitrana sy nampitabataba ny vahoaka. '
  '14':
  - type: text
    content: 'Ary niaraka tamin’izay dia nasain’ny rahalahy nandeha hatrany amoron-dranomasina i Paoly; fa i Silasy sy i Timoty kosa mbola nijanona teo ihany. '
  '15':
  - type: text
    content: Ireo izay nanatitra an’i Paoly dia nitondra azy hatrany Atena; nomen’i Paoly teny holazainy amin’i Silasy sy i Timoty izy ireo mba hankanesan’izy roa lahy haingana any aminy, vao lasa nandeha.
  - type: heading
    content: Tany Atena i Paoly
  '16':
  - type: text
    content: 'Raha niandry azy tany Atena i Paoly dia nangitakitaka ny fanahiny nahita ny tanàna feno sampy. '
  '17':
  - type: text
    content: 'Dia niady hevitra tamin’ny '
  - type: text
    content: Jiosy
  - type: text
    content: ' sy ny '
  - type: text
    content: prozelita
  - type: text
    content: ' tao amin’ny '
  - type: text
    content: sinagoga
  - type: text
    content: ' sy tamin’izay tafavory tany an-tsena isanandro izy. '
  '18':
  - type: text
    content: Ary ny olon-kendry sasany tamin’ny Epikoreana sy ny Stoika
  - type: note
    content: 'Epikoreana sy ny Stoika: karazany roa amin’ny filozofa grika nalaza.'
  - type: text
    content: ' dia nanohitra azy koa ka hoy ny sasany: Inona no tian’io mpibedibedy io holazaina? Hoy indray ny sasany: Toa mitory andriamanitra vaovao izy satria Jesosy sy ny fitsanganan’ny maty no notorin’i Paoly.'
  '19':
  - type: text
    content: 'Ary naka azy izy ireo dia nitondra azy ho any amin’ny Areopago ka niteny hoe: Moa mba mahazo mahafantatra izany fampianarana vaovao lazainao izany va izahay? '
  '2':
  - type: text
    content: 'Dia niditra tao tahaka ny fanaony i Paoly; nandritra ny '
  - type: text
    content: Sabata
  - type: text
    content: ' telo no niadiany hevitra tamin’ny olona tao, avy amin’ny Soratra Masina. '
  '20':
  - type: text
    content: 'Mampandre ny sofinay zavatra hafahafa izay tsy fantatray ianao; koa tianay ho fantatra izay hevitr’izany zavatra izany. '
  '21':
  - type: text
    content: Fa ny Ateniana rehetra sy ny vahiny izay nonina teo dia tsy nandany ny androny tamin’ny zavatra hafa, afa-tsy ny hilaza na hihaino zava-baovao.
  '22':
  - type: text
    content: 'Dia nitsangana teo afovoan’ny Areopago i Paoly ka nanambara hoe: Ry lehilahy Ateniana, hitako amin’ny zavatra rehetra fa fatra-pivavaka tokoa ianareo. '
  '23':
  - type: text
    content: 'Fa raha nandeha aho ka nandinika izay zavatra ivavahanareo dia nahita alitara iray misy izao soratra izao:'
  - type: text
    content: Ho an’izay Andriamanitra tsy fantatra.
  - type: text
    content: 'Koa izay ivavahanareo kanefa tsy fantatrareo, dia izany no toriko aminareo, '
  '24':
  - type: text
    content: 'dia Andriamanitra izay nanao izao tontolo izao sy izay eo aminy rehetra; Izy no Tompon’ny lanitra sy ny tany ka tsy mba mitoetra ao anaty '
  - type: text
    content: tempoly
  - type: text
    content: ' nataon-tanana '
  '25':
  - type: text
    content: 'sady tsy mba tompoin’ny tanan’olona toy ny hoe mila zavatra Izy, fa Izy ihany no manome izao rehetra izao aina sy fofonaina ary ny zavatra rehetra; '
  '26':
  - type: text
    content: 'ary ny firenena rehetra avy amin’ny iray ihany dia namponeniny ambonin’ny tany rehetra ary efa notendreny ny fotoanandro sy ny faritry ny fonenany '
  '27':
  - type: text
    content: 'mba hitady an’Andriamanitra izy, raha toa ka mba hahatsapa sy hahita Azy, kanefa tsy mba lavitra antsika rehetra Izy; '
  '28':
  - type: text
    content: 'fa Izy no ivelomantsika sy ihetsehantsika ary iainantsika; araka ny nataon’ny mpanao tononkira sasany teo aminareo hoe:'
  - type: text
    content: Fa terany koa isika.
  '29':
  - type: text
    content: 'Koa satria terak’Andriamanitra isika dia tsy mety raha ny fomban’Andriamanitra no ataontsika ho tahaka ny volamena, na volafotsy, na vato voasoratry ny fahaizana aman-tsain’olombelona. '
  '3':
  - type: text
    content: 'Nanambara izy ka naneho marina fa tsy maintsy nijaly sy nitsangana tamin’ny maty i '
  - type: text
    content: Kristy
  - type: text
    content: '; ary Jesosy izay toriko aminareo, hoy izy, no Kristy. '
  '30':
  - type: text
    content: 'Andriamanitra ninia tsy nijery ny andron’ny tsy fahalalana, fa ankehitriny Izy mandidy ny olona rehetra amin’izao tontolo izao hibebaka, '
  '31':
  - type: text
    content: satria Izy efa nanendry andro iray izay hitsarany izao tontolo izao amin’ny fahamarinana amin’ny alalan’ny Lehilahy iray voatendriny; koa nanome antoka hampino ny olona rehetra Izy tamin’ny nananganany an’i Jesosy tamin’ny maty.
  '32':
  - type: text
    content: 'Rehefa nahare ny amin’ny fitsanganan’ny maty izy ireo dia nihomehy ny sasany; fa ny sasany kosa dia niteny hoe: Mbola hihaino anao indray izahay ny amin’izany zavatra izany. '
  '33':
  - type: text
    content: 'Dia niala teo amin’izy ireo i Paoly. '
  '34':
  - type: text
    content: Fa ny olona sasany dia niaraka taminy ary nanjary nino; anisan’izany i Dionisio ilay Areopagita sy vehivavy iray antsoina hoe Damary ary ny hafa koa.
  '4':
  - type: text
    content: Ny sasany tamin’ireo dia nino ka nanampy ho isan’ny mpianatr’i Paoly sy i Silasy, mbamin’ny Grika marobe izay mpivavaka, ary tsy vitsy tamin’ny vehivavy nanan-kaja.
  '5':
  - type: text
    content: 'Nialona anefa ny Jiosy ka naka olona ratsy fanahy teny an-tsena ary nahavory vahoaka betsaka, nampitabataba ny tanàna ka nanao fahirano ny tranon’i Jasona ary nitady hamoaka azy roa lahy ho eo amin’ny olona. '
  '6':
  - type: text
    content: 'Rehefa tsy nahita azy roa lahy izy dia nisarika an’i Jasona sy ny rahalahy sasany ho eo amin’ny lehiben’ny tanàna ka niantso mafy hoe: Tonga atỳ koa ireo lehilahy namadika izao tontolo izao ireo; '
  '7':
  - type: text
    content: 'nampiantranoin’i Jasona izy ireo, nefa izy rehetra ireo dia manohitra ny didin’i Kaisara satria milaza fa misy mpanjaka hafa, dia Jesosy. '
  '8':
  - type: text
    content: 'Dia taitra ny vahoaka sy ny lehiben’ny tanàna raha nahare izany. '
  '9':
  - type: text
    content: Koa rehefa naharay antoka tamin’i Jasona sy ny sasany teo aminy izy ireo dia navelany handeha izy roa lahy.
  - type: heading
    content: I Paoly sy i Silasy tany Beria
