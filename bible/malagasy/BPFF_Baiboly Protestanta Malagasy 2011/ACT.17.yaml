document_id: ACT.17
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Tany Tesalonika i Paoly sy i Silasy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Rehefa avy namakivaky an’i Amfipolia sy Apolonia izy ireo dia tonga tao Tesalonika ary nisy sinagogan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jiosy
  - type: text
    text: ' tao. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Dia niditra tao tahaka ny fanaony i Paoly; nandritra ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Sabata
  - type: text
    text: ' telo no niadiany hevitra tamin’ny olona tao, avy amin’ny Soratra Masina. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Nanambara izy ka naneho marina fa tsy maintsy nijaly sy nitsangana tamin’ny maty i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: '; ary Jesosy izay toriko aminareo, hoy izy, no Kristy. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ny sasany tamin’ireo dia nino ka nanampy ho isan’ny mpianatr’i Paoly sy i Silasy, mbamin’ny Grika marobe izay mpivavaka, ary tsy vitsy tamin’ny vehivavy nanan-kaja.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Nialona anefa ny Jiosy ka naka olona ratsy fanahy teny an-tsena ary nahavory vahoaka betsaka, nampitabataba ny tanàna ka nanao fahirano ny tranon’i Jasona ary nitady hamoaka azy roa lahy ho eo amin’ny olona. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Rehefa tsy nahita azy roa lahy izy dia nisarika an’i Jasona sy ny rahalahy sasany ho eo amin’ny lehiben’ny tanàna ka niantso mafy hoe: Tonga atỳ koa ireo lehilahy namadika izao tontolo izao ireo; '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'nampiantranoin’i Jasona izy ireo, nefa izy rehetra ireo dia manohitra ny didin’i Kaisara satria milaza fa misy mpanjaka hafa, dia Jesosy. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dia taitra ny vahoaka sy ny lehiben’ny tanàna raha nahare izany. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Koa rehefa naharay antoka tamin’i Jasona sy ny sasany teo aminy izy ireo dia navelany handeha izy roa lahy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: I Paoly sy i Silasy tany Beria
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Niaraka tamin’izay dia nampandehanin’ny rahalahy iny alina iny ihany hankany Beria i Paoly sy i Silasy ka rehefa tonga tany izy ireo dia niditra tao amin’ny sinagogan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jiosy
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Tsara noho ny tao Tesalonika ny toe-panahin’ireo satria nandray ny teny tamin’ny zotom-po indrindra izy ka nandinika ny Soratra Masina isanandro sady nanadihady ny fahamarinan’izay reny. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Koa maro tamin’izy ireo no nino ary tsy vitsy ny vehivavy grika nanan-kaja sy ny lehilahy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Nony ren’ny Jiosy tany Tesalonika anefa fa nitory ny tenin’Andriamanitra tany Beria i Paoly dia nankany koa izy ireo ka nampikitrana sy nampitabataba ny vahoaka. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary niaraka tamin’izay dia nasain’ny rahalahy nandeha hatrany amoron-dranomasina i Paoly; fa i Silasy sy i Timoty kosa mbola nijanona teo ihany. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ireo izay nanatitra an’i Paoly dia nitondra azy hatrany Atena; nomen’i Paoly teny holazainy amin’i Silasy sy i Timoty izy ireo mba hankanesan’izy roa lahy haingana any aminy, vao lasa nandeha.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Tany Atena i Paoly
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Raha niandry azy tany Atena i Paoly dia nangitakitaka ny fanahiny nahita ny tanàna feno sampy. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Dia niady hevitra tamin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jiosy
  - type: text
    text: ' sy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prozelita
  - type: text
    text: ' tao amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sinagoga
  - type: text
    text: ' sy tamin’izay tafavory tany an-tsena isanandro izy. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ary ny olon-kendry sasany tamin’ny Epikoreana sy ny Stoika
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Epikoreana sy ny Stoika: karazany roa amin’ny filozofa grika nalaza.'
    marker-yv: yv-n
  - type: text
    text: ' dia nanohitra azy koa ka hoy ny sasany: Inona no tian’io mpibedibedy io holazaina? Hoy indray ny sasany: Toa mitory andriamanitra vaovao izy satria Jesosy sy ny fitsanganan’ny maty no notorin’i Paoly.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary naka azy izy ireo dia nitondra azy ho any amin’ny Areopago ka niteny hoe: Moa mba mahazo mahafantatra izany fampianarana vaovao lazainao izany va izahay? '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Mampandre ny sofinay zavatra hafahafa izay tsy fantatray ianao; koa tianay ho fantatra izay hevitr’izany zavatra izany. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Fa ny Ateniana rehetra sy ny vahiny izay nonina teo dia tsy nandany ny androny tamin’ny zavatra hafa, afa-tsy ny hilaza na hihaino zava-baovao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Dia nitsangana teo afovoan’ny Areopago i Paoly ka nanambara hoe: Ry lehilahy Ateniana, hitako amin’ny zavatra rehetra fa fatra-pivavaka tokoa ianareo. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Fa raha nandeha aho ka nandinika izay zavatra ivavahanareo dia nahita alitara iray misy izao soratra izao:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ho an’izay Andriamanitra tsy fantatra.
- type: usfm
  marker: m
  children:
  - type: text
    text: 'Koa izay ivavahanareo kanefa tsy fantatrareo, dia izany no toriko aminareo, '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'dia Andriamanitra izay nanao izao tontolo izao sy izay eo aminy rehetra; Izy no Tompon’ny lanitra sy ny tany ka tsy mba mitoetra ao anaty '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tempoly
  - type: text
    text: ' nataon-tanana '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'sady tsy mba tompoin’ny tanan’olona toy ny hoe mila zavatra Izy, fa Izy ihany no manome izao rehetra izao aina sy fofonaina ary ny zavatra rehetra; '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'ary ny firenena rehetra avy amin’ny iray ihany dia namponeniny ambonin’ny tany rehetra ary efa notendreny ny fotoanandro sy ny faritry ny fonenany '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'mba hitady an’Andriamanitra izy, raha toa ka mba hahatsapa sy hahita Azy, kanefa tsy mba lavitra antsika rehetra Izy; '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'fa Izy no ivelomantsika sy ihetsehantsika ary iainantsika; araka ny nataon’ny mpanao tononkira sasany teo aminareo hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa terany koa isika.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Koa satria terak’Andriamanitra isika dia tsy mety raha ny fomban’Andriamanitra no ataontsika ho tahaka ny volamena, na volafotsy, na vato voasoratry ny fahaizana aman-tsain’olombelona. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Andriamanitra ninia tsy nijery ny andron’ny tsy fahalalana, fa ankehitriny Izy mandidy ny olona rehetra amin’izao tontolo izao hibebaka, '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: satria Izy efa nanendry andro iray izay hitsarany izao tontolo izao amin’ny fahamarinana amin’ny alalan’ny Lehilahy iray voatendriny; koa nanome antoka hampino ny olona rehetra Izy tamin’ny nananganany an’i Jesosy tamin’ny maty.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Rehefa nahare ny amin’ny fitsanganan’ny maty izy ireo dia nihomehy ny sasany; fa ny sasany kosa dia niteny hoe: Mbola hihaino anao indray izahay ny amin’izany zavatra izany. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Dia niala teo amin’izy ireo i Paoly. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Fa ny olona sasany dia niaraka taminy ary nanjary nino; anisan’izany i Dionisio ilay Areopagita sy vehivavy iray antsoina hoe Damary ary ny hafa koa.
