document_id: PSA.73,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: BOKY FAHATELO
  - type: heading
    content: Rehefa toa ambinina amin’ny zavatra rehetra ny ratsy fanahy
  - type: text
    content: Salamo nataon’i Asafa
  - type: text
    content: Eny, marina tokoa fa Andriamanitra dia tsara amin’ny Israely,
  - type: text
    content: dia amin’izay madio fo.
  '10':
  - type: text
    content: Izany no itodihan’ny olony hankany aminy.
  - type: text
    content: Ranobe no gohin’ireny
  '11':
  - type: text
    content: 'ka hoy izy: Hataon’Andriamanitra ahoana no fahalala?'
  - type: text
    content: Ary moa mba misy fahalalana ao amin’ny Avo Indrindra?
  '12':
  - type: text
    content: Indro ireny dia olona ratsy fanahy;
  - type: text
    content: miadana mandrakariva izy ka mitombo harena.
  '13':
  - type: text
    content: Foana mihitsy ny nanadiovako ny foko
  - type: text
    content: sy ny nanasako ny tanako tamin’ny tsy fananan-tsiny.
  '14':
  - type: text
    content: Voakapoka mandritra ny andro aho
  - type: text
    content: ary faizina isa-maraina.
  '15':
  - type: text
    content: 'Raha toa ka niteny aho hoe: Hiteny sahala aminy aho,'
  - type: text
    content: dia ho namitaka ireo zanakao.
  '16':
  - type: text
    content: Dia nieritreritra aho mba hahafantatra izany zavatra izany,
  - type: text
    content: kanjo sarotra tamiko izany,
  '17':
  - type: text
    content: mandra-piditro tao amin’ny fitoera-masin’Andriamanitra
  - type: text
    content: ka azoko an-tsaina ny zavatra miandry azy.
  '18':
  - type: text
    content: Eo amin’izay mahasolafaka tokoa no ametrahanao azy
  - type: text
    content: ary aripakao ho ringana izy.
  '19':
  - type: text
    content: Akory izay! Rava indray mipy maso izy,
  - type: text
    content: levona izy, matin’ny zava-mahatahotra!
  '2':
  - type: text
    content: Fa izaho dia saika nibolasitra ny tongotro;
  - type: text
    content: saika solafaka ny diako
  '20':
  - type: text
    content: Tahaka ny anaovan’ny olona ny nofiny ho tsinontsinona
  - type: text
    content: dia tahaka izany, Tompo ô, no anaovanao ny endrik’ireny ho tsinontsinona, rehefa mifoha Ianao.
  '21':
  - type: text
    content: Raha lotika ny foko
  - type: text
    content: ka voatsindrona ny voako
  '22':
  - type: text
    content: dia ketrina aho ka tsy nahalala;
  - type: text
    content: eny, toy ny biby teo anatrehanao aho.
  '23':
  - type: text
    content: Nefa izaho dia eo Aminao ihany mandrakariva,
  - type: text
    content: mihazona ny tanako havanana Ianao.
  '24':
  - type: text
    content: Ny saina omenao no itarihanao ahy
  - type: text
    content: ary rehefa afaka izany dia horaisinao ho amin’ny voninahitra aho.
  '25':
  - type: text
    content: Iza no ahy any an-danitra?
  - type: text
    content: Ary tsy misy etỳ ambonin’ny tany iriko tahaka Anao.
  '26':
  - type: text
    content: Na dia levona aza ny nofoko sy ny foko
  - type: text
    content: dia mbola vatolampin’ny foko sy anjarako mandrakizay ihany Andriamanitra.
  '27':
  - type: text
    content: Fa indro, very izay lavitra Anao;
  - type: text
    content: aringanao izay rehetra mijangajanga mahafoy Anao.
  '28':
  - type: text
    content: Fa ny amiko dia ny manakaiky an’Andriamanitra no mahatsara ahy;
  - type: text
    content: Ianao, RY TOMPO Andriamanitra ô, no nataoko fialofana,
  - type: text
    content: mba hitantarako ny asanao rehetra.
  '3':
  - type: text
    content: satria nialona ny mpirehareha aho
  - type: text
    content: raha nahita ny fiadanan’ny ratsy fanahy.
  '4':
  - type: text
    content: Fa tsy mba misy fanaintainana amin’ny fahafatesany
  - type: text
    content: ary fatratra ny heriny.
  '5':
  - type: text
    content: Tsy mba misy manavesatra azy tahaka ny olona rehetra
  - type: text
    content: ary tsy mba azom-pahoriana tahaka ny olon-kafa izy.
  '6':
  - type: text
    content: Noho izany dia ny fireharehana no rojo iambozonany
  - type: text
    content: ary ny fanaovana an-keriny no lamba itafiany.
  '7':
  - type: text
    content: Bongon-tavy ny masony;
  - type: text
    content: mihoa-pampana ny hevitra avy ao am-pony.
  '8':
  - type: text
    content: Manazimbazimba izy ka miresaka fampahoriana sy fanaovana an-keriny;
  - type: text
    content: avo vava izy;
  '9':
  - type: text
    content: manao vava manakatra ny lanitra izy
  - type: text
    content: ary ny lelany dia mandeha mitety ny tany.
