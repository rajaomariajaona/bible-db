document_id: PSA.73,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: BOKY FAHATELO
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Rehefa toa ambinina amin’ny zavatra rehetra ny ratsy fanahy
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: Salamo nataon’i Asafa
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Eny, marina tokoa fa Andriamanitra dia tsara amin’ny Israely,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia amin’izay madio fo.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Izany no itodihan’ny olony hankany aminy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ranobe no gohin’ireny
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'ka hoy izy: Hataon’Andriamanitra ahoana no fahalala?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary moa mba misy fahalalana ao amin’ny Avo Indrindra?
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Indro ireny dia olona ratsy fanahy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: miadana mandrakariva izy ka mitombo harena.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Foana mihitsy ny nanadiovako ny foko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny nanasako ny tanako tamin’ny tsy fananan-tsiny.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Voakapoka mandritra ny andro aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary faizina isa-maraina.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Raha toa ka niteny aho hoe: Hiteny sahala aminy aho,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ho namitaka ireo zanakao.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Dia nieritreritra aho mba hahafantatra izany zavatra izany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: kanjo sarotra tamiko izany,
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: mandra-piditro tao amin’ny fitoera-masin’Andriamanitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka azoko an-tsaina ny zavatra miandry azy.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Eo amin’izay mahasolafaka tokoa no ametrahanao azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary aripakao ho ringana izy.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Akory izay! Rava indray mipy maso izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: levona izy, matin’ny zava-mahatahotra!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Fa izaho dia saika nibolasitra ny tongotro;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: saika solafaka ny diako
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Tahaka ny anaovan’ny olona ny nofiny ho tsinontsinona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia tahaka izany, Tompo ô, no anaovanao ny endrik’ireny ho tsinontsinona, rehefa mifoha Ianao.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Raha lotika ny foko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka voatsindrona ny voako
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: dia ketrina aho ka tsy nahalala;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, toy ny biby teo anatrehanao aho.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Nefa izaho dia eo Aminao ihany mandrakariva,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mihazona ny tanako havanana Ianao.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Ny saina omenao no itarihanao ahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary rehefa afaka izany dia horaisinao ho amin’ny voninahitra aho.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Iza no ahy any an-danitra?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tsy misy etỳ ambonin’ny tany iriko tahaka Anao.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Na dia levona aza ny nofoko sy ny foko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia mbola vatolampin’ny foko sy anjarako mandrakizay ihany Andriamanitra.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Fa indro, very izay lavitra Anao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aringanao izay rehetra mijangajanga mahafoy Anao.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Fa ny amiko dia ny manakaiky an’Andriamanitra no mahatsara ahy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ianao, RY TOMPO Andriamanitra ô, no nataoko fialofana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hitantarako ny asanao rehetra.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: satria nialona ny mpirehareha aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: raha nahita ny fiadanan’ny ratsy fanahy.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Fa tsy mba misy fanaintainana amin’ny fahafatesany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary fatratra ny heriny.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Tsy mba misy manavesatra azy tahaka ny olona rehetra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy mba azom-pahoriana tahaka ny olon-kafa izy.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Noho izany dia ny fireharehana no rojo iambozonany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny fanaovana an-keriny no lamba itafiany.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Bongon-tavy ny masony;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mihoa-pampana ny hevitra avy ao am-pony.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Manazimbazimba izy ka miresaka fampahoriana sy fanaovana an-keriny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avo vava izy;
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: manao vava manakatra ny lanitra izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny lelany dia mandeha mitety ny tany.
