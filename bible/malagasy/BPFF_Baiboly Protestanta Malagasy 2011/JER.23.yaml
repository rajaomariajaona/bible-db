document_id: JER.23
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ireo mpitondra ratsy sy ny mpanjaka mpamonjy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Lozan’ireo mpiandry ondry izay manimba sy mampihahaka ny ondry fiandriko, hoy NY TOMPO. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Koa izao no lazain’NY TOMPO, Andriamanitry ny Israely, ny amin’ireo mpitondra izay miandry ny oloko: Efa nampihahaka ny ondriko sy nandao azy ianareo, fa tsy nikarakara azy; koa indro, hovaliako ianareo noho ny ratsy nataonareo, hoy NY TOMPO. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary hanangona ny ondriko sisa avy any amin’ny tany rehetra izay nandroahako azy Aho ka hampodiko ho any amin’ny saha niandrasana azy izy dia hitombo sy hihamaro. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ary hanendry mpitondra ho azy Aho ka ireo no hiandry azy; ary tsy hatahotra na hivadi-po intsony izy sady tsy hisy tsy ho voavory, hoy NY TOMPO.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Indro, avy ny andro,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hoy NY TOMPO,
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay hananganako Solofo marina ho an’i Davida,
- type: usfm
  marker: q1
  children:
  - type: text
    text: koa hanjaka Izy sady ho hendry
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hanao fitsarana marina amin’ny tany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Amin’ny androny no hamonjena ny Joda
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy handrian’ny Israely fehizay;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ary izao no anarany izay hanononana Azy:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: NY TOMPO no fahamarinantsika.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Koa indro, avy ny andro, hoy NY TOMPO, izay tsy hitenenana intsony hoe: Raha velona koa NY TOMPO izay nitondra ny Zanak’Israely niakatra avy tany amin’ny tany Ejipta! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Fa izao kosa: Raha velona koa NY TOMPO izay nitondra ny taranak’Israely niakatra sady nitarika azy avy tany amin’ny tany avaratra sy avy tany amin’ny tany rehetra izay nandroahako azy; dia honina ao amin’ny taniny izy.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny amin’ireo mpaminany tsy mendrika
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ny amin’ireo mpaminany:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Montsamontsana ato anatiko ny foko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mangozohozo ny taolako rehetra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: toy ny olona mamo aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary toy ny lehilahy leon-divay,
- type: usfm
  marker: q1
  children:
  - type: text
    text: noho ny amin’NY TOMPO sy noho ny teniny masina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Fa feno mpijangajanga ny tany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary noho ny ozona no isaonan’ny tany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: efa maina ny kijana any an-tany efitra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary efa ratsy ny fanaon’ny olona
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady ny tsy fahamarinana no heriny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Fa na mpaminany na mpisorona dia samy mpihatsaravelatsihy avokoa;
- type: usfm
  marker: q1
  children:
  - type: text
    text: na dia tao an-tranoko aza dia mbola hitako ihany ny haratsiany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hoy NY TOMPO.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Koa ho toy ny lala-malama amin’ny haizim-pito ny lalany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hifanosika izy ka ho potraka ao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa hahatonga loza aminy Aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: amin’ny taona hamaliana azy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hoy NY TOMPO.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mpaminany ratsy noho ny any Samaria
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ary tamin’ny mpaminanin’i Samaria
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'no nahitako zavatra mahaloiloy:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Naminany tamin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Baala
  - type: text
    text: ' izy'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka nampivily ny Israely oloko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ary tamin’ny mpaminanin’i Jerosalema koa
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'no nahitako zavatra mahatsiravina:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mijangajanga
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy mandeha araka ny lainga izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady mampahery ny tanan’ny mpanao ratsy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka samy tsy misy miala amin’ny faharatsiany avy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, izy rehetra, Amiko, dia tonga tahaka an’i Sodoma,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny mponina ao dia tonga tahaka an’i Gomora.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Koa izao no lazain’Andriamanitra, Tompon’izao rehetra izao, ny amin’ireo mpaminany ireo:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Indro, hofahanako zava-mahafaty izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hampisotroiko rano misy poizina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria avy tamin’ny mpaminanin’i Jerosalema
- type: usfm
  marker: q1
  children:
  - type: text
    text: no nivoahan’ny faharatsiana ho any amin’ny tany rehetra.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mpaminany miasa ho amin’ny lainga
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Izao no lazain’Andriamanitra, Tompon’izao rehetra izao:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aza mihaino ny tenin’ny mpaminany
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay maminany aminareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa mamitaka anareo ireo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny fahitana avy ao am-pony ihany no lazainy
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa tsy izay aloaky ny vavan’NY TOMPO.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Sahy milaza amin’izay manamavo Ahy izy hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'NY TOMPO no nilaza hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hahita fiadanana ianareo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ary izay rehetra mandeha araka ny ditran’ny fony dia ilazany hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy hisy loza hanjo anareo.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Fa iza moa no efa isan’ny mpihevitra teo amin’NY TOMPO ka nahita sy nandre ny teniny? Iza no nanongilana ny sofiny Taminy ka nihaino ny teniny?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: E! Ny tadion’NY TOMPO!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mivoaka ny fahatezerana
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny tadio mitambolimbolina
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka miantonta amin’ny lohan’ny ratsy fanahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ny fahatezeran’NY TOMPO dia tsy hitsahatra
- type: usfm
  marker: q1
  children:
  - type: text
    text: raha tsy efany sy tanterany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny hevitry ny fony;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mbola ho fantatrareo marimarina izany any am-parany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Tsy naniraka ireo mpaminany ireo Aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: kanefa nidodododo ihany izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy niteny taminy Aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: kanefa naminany ihany izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Fa raha isan’ireo nandray torohevitra Tamiko izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ho nitory ny teniko tamin’ny oloko
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka namerina azy hiala tamin’ny lalany ratsy
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy tamin’ny ratsy nataony.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Manerana izao tontolo izao ny fanatrehan’NY TOMPO
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Moa Andriamanitra etỳ akaiky ihany va Aho?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hoy NY TOMPO,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa tsy Andriamanitra any lavitra any koa?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Moa misy olona afaka miafina any amin’ny toerana fierena va
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy ho hitako?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hoy NY TOMPO.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy manerana ny lanitra sy ny tany va Aho?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hoy NY TOMPO.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mitantara feno lainga ireo mpaminany
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Efa reko ny nolazain’ny mpaminany izay naminany lainga tamin’ny anarako hoe: Nanonofy aho, nanonofy aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Mandra-pahoviana no hiheveran’ireo mpaminany ireo hilazany lainga sy haminaniany araka ny fitaky ny fony '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'ka hampanadino ny oloko ny anarako amin’ny nofiny izay lazainy amin’ny namany avy, toy ny nanadinoan’ny razany ny anarako noho ny amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Baala
  - type: text
    text: '? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Ny mpaminany izay manonofy dia aoka hilaza nofy, ary izay manana ny teniko dia aoka hanambara marina ny teniko.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa inona moa izay mololo raha oharina amin’ny vary?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hoy NY TOMPO.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Tsy tahaka ny afo va ny teniko? Hoy NY TOMPO, ary tsy tahaka ny kanonta manorotoro ny vatolampy va? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Koa indro, fa hasiako ny mpaminany, izay samy mangalatra ny teniko amin’ny namany avy, hoy NY TOMPO. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Indro, hoy NY TOMPO, Izaho no hamely ny mpaminany, izay mampiteny ny lelany hoe avy Amiko izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Indro, hasiako izay maminany nofy lainga, hoy NY TOMPO, ary milaza izany ka mampivily ny oloko amin’ny laingany sy ny fandokafany tena; nefa tsy naniraka azy na nandidy azy Aho tsinona, koa dia tsy mahasoa ity firenena ity akory izy ireny, hoy NY TOMPO.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Moa enta-mavesatra va ny tenin’NY TOMPO
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ary raha manontany anao ity firenena ity, na ny mpaminany, na ny mpisorona ka miteny hoe: Inona indray no enta-mavesatry NY TOMPO? Dia teneno aminy hoe: Ianareo no enta-mavesatra ka hariako ianareo, hoy NY TOMPO. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ary raha misy miteny ny mpaminany sy ny mpisorona mbamin’ny vahoaka hoe: Ny enta-mavesatry NY TOMPO, dia hoteneniko izany olona izany mbamin’ny ankohonany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Samia manontany amin’ny namany sy ny rahalahiny avy ianareo hoe: Ahoana no navalin’NY TOMPO? Ary ahoana no nolazain’NY TOMPO? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Fa ny hoe ny enta-mavesatry NY TOMPO dia tsy hotononinareo intsony; fa ny tenin’ny olona tsirairay ihany no ho enta-mavesatry ny tenany, satria efa navadikareo ny tenin’Andriamanitra velona, dia Andriamanitra, Tompon’izao rehetra izao, Andriamanitsika. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Izao no hanontanianareo amin’ny mpaminany: Ahoana no navalin’NY TOMPO anao? Ary ahoana no nolazain’NY TOMPO? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Fa raha hoy ianareo: Enta-mavesatry NY TOMPO, dia izao no lazain’NY TOMPO: Noho ny nilazanareo ny teny hoe: Ny enta-mavesatry NY TOMPO, nefa efa nandefasako iraka ihany ianareo ka nilazako hoe: Aza miteny izany hoe: Ny enta-mavesatry NY TOMPO izany, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'indro, hanadino anareo tokoa Aho sady hanary anareo mbamin’ny tanàna izay nomeko anareo sy ny razanareo tsy ho eo anatrehako; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: ary hataoko mihatra aminareo ny fahafaham-baraka mandrakizay sy ny henatra mandrakizay izay tsy hohadinoina.
