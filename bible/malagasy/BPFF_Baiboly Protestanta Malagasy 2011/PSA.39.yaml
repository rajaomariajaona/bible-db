document_id: PSA.39,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ampanalaviro ny fikapohanao aho! Fohy loatra ny andro iainana
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: Ho an’ny mpiventy hira. Ho an’i Jedotona. Salamo nataon’i Davida.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Hoy aho: Hitandrina ny lalako aho'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba tsy hanota amin’ny lelako;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hasiako fehiny ny vavako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: raha mbola eo anatrehako ny ratsy fanahy.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Ampanalaviro ahy ny kapoka avy Aminao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: reraka aho azon’ny famelin’ny tananao.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Fanasaziana noho ny fahadisoany no anitsianao ny olona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka manimba ny zavatra tiany tahaka ny ataon’ny kalalao Ianao.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Eny, zava-poana tokoa ny olona rehetra. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Fiatoana
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Henoy ny vavaka ataoko, TOMPO ô!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Atongilano amin’ny fitarainako ny sofinao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary aza mangina amin’ny ranomasoko!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa vahiny Aminao aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady mpivahiny tahaka ny razako rehetra.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Aza atrehinao aho aloha dia ho miramirana indray,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dieny tsy mbola lasa aho ka tsy ho eto intsony!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Nangina tsy niteny mihitsy aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: namihim-bava aho ka tsy nilaza na dia ny tsara aza,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia nihetsika mafy ny fanaintainako.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Nafana ny foko tato anatiko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: raha nieritreritra aho dia nisy afo nirehitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ka niteny tamin’ny lelako aho hoe:'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: TOMPO ô, ampahafantaro ny fiafarako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy izay fetran’ny androko aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aoka ho fantatro fa olon-kandalo aho.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Indro, efa nataonao toy ny felatanana ny halavan’ny androko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ary toy ny tsinontsinona eo anatrehanao ny androm-piainako:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Natao ho zava-poana ihany tokoa ny olona mijoro rehetra. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Fiatoana
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Toy ny aloka miserana tokoa ny fandehan’ny andron’ny olona;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: zava-poana tokoa no itabatabany!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mihary harena izy nefa tsy fantany izay ho tompon’izany.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Ary ankehitriny Tompo ô, inona no andrasako?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ianao no antenaiko.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Manafaha ahy amin’ny fahadisoako rehetra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aza mamela ahy ho fanakòran’ny adala.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Mangina aho ka tsy miloa-bava
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria Ianao no nanao izao.
