document_id: PSA.39,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ampanalaviro ny fikapohanao aho! Fohy loatra ny andro iainana
  - type: text
    content: Ho an’ny mpiventy hira. Ho an’i Jedotona. Salamo nataon’i Davida.
  - type: text
    content: 'Hoy aho: Hitandrina ny lalako aho'
  - type: text
    content: mba tsy hanota amin’ny lelako;
  - type: text
    content: hasiako fehiny ny vavako
  - type: text
    content: raha mbola eo anatrehako ny ratsy fanahy.
  '10':
  - type: text
    content: Ampanalaviro ahy ny kapoka avy Aminao;
  - type: text
    content: reraka aho azon’ny famelin’ny tananao.
  '11':
  - type: text
    content: Fanasaziana noho ny fahadisoany no anitsianao ny olona
  - type: text
    content: ka manimba ny zavatra tiany tahaka ny ataon’ny kalalao Ianao.
  - type: text
    content: 'Eny, zava-poana tokoa ny olona rehetra. '
  - type: text
    content: Fiatoana
  '12':
  - type: text
    content: Henoy ny vavaka ataoko, TOMPO ô!
  - type: text
    content: Atongilano amin’ny fitarainako ny sofinao
  - type: text
    content: ary aza mangina amin’ny ranomasoko!
  - type: text
    content: Fa vahiny Aminao aho
  - type: text
    content: sady mpivahiny tahaka ny razako rehetra.
  '13':
  - type: text
    content: Aza atrehinao aho aloha dia ho miramirana indray,
  - type: text
    content: dieny tsy mbola lasa aho ka tsy ho eto intsony!
  '2':
  - type: text
    content: Nangina tsy niteny mihitsy aho,
  - type: text
    content: namihim-bava aho ka tsy nilaza na dia ny tsara aza,
  - type: text
    content: dia nihetsika mafy ny fanaintainako.
  '3':
  - type: text
    content: Nafana ny foko tato anatiko;
  - type: text
    content: raha nieritreritra aho dia nisy afo nirehitra
  - type: text
    content: 'ka niteny tamin’ny lelako aho hoe:'
  '4':
  - type: text
    content: TOMPO ô, ampahafantaro ny fiafarako
  - type: text
    content: sy izay fetran’ny androko aho;
  - type: text
    content: aoka ho fantatro fa olon-kandalo aho.
  '5':
  - type: text
    content: Indro, efa nataonao toy ny felatanana ny halavan’ny androko
  - type: text
    content: 'ary toy ny tsinontsinona eo anatrehanao ny androm-piainako:'
  - type: text
    content: 'Natao ho zava-poana ihany tokoa ny olona mijoro rehetra. '
  - type: text
    content: Fiatoana
  '6':
  - type: text
    content: Toy ny aloka miserana tokoa ny fandehan’ny andron’ny olona;
  - type: text
    content: zava-poana tokoa no itabatabany!
  - type: text
    content: Mihary harena izy nefa tsy fantany izay ho tompon’izany.
  '7':
  - type: text
    content: Ary ankehitriny Tompo ô, inona no andrasako?
  - type: text
    content: Ianao no antenaiko.
  '8':
  - type: text
    content: Manafaha ahy amin’ny fahadisoako rehetra;
  - type: text
    content: aza mamela ahy ho fanakòran’ny adala.
  '9':
  - type: text
    content: Mangina aho ka tsy miloa-bava
  - type: text
    content: satria Ianao no nanao izao.
