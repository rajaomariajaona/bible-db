document_id: 2CH.23,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Voahosotra ho mpanjaka i Joasy
  - type: heading
    content: 2Mpa 11.4-16
  - type: text
    content: 'Tamin’ny taona fahafito dia nandray fanapahan-kevitra i Joiada ka nanao fanekena tamin’ny mpifehy zato, dia i Azaria, zanak’i Jerohama, Ismaela, zanak’i Johanana, i Azaria, zanak’i Obeda, i Mahaseia, zanak’i Adaia ary i Elisafata, zanak’i Zikry. '
  '10':
  - type: text
    content: 'Nalahany ny vahoaka rehetra, samy nitana ny fiadiany avy mba hanodidina ny mpanjaka hatramin’ny lafiny ankavanan’ny trano ka hatramin’ny lafiny ankavia, hatramin’ny alitara ka hatramin’ny trano. '
  '11':
  - type: text
    content: Dia noentiny nivoaka ny zanakalahin’ny mpanjaka ka nosatrohany ny satroboninahitra, sady notolorany ny Vavolombelona
  - type: note
    content: 'Ny Vavolombelona: zahao 2Mpa 11.12.'
  - type: text
    content: ', dia nampanjakainy. Ary nanosotra azy i Joiada sy ny zanany ka niantso hoe: Ho ela velona anie ny mpanjaka!'
  '12':
  - type: text
    content: 'Nony ren’i Atalia ny tabataban’ny vahoaka nifamoivoy sy niarahaba ny mpanjaka dia mba nankao amin’ny vahoaka tao amin’ny tranon’NY TOMPO izy. '
  '13':
  - type: text
    content: 'Ary hitany fa indro, nitsangana teo amin’ny fitoeran’andriana teo amin’ny fidirana ny mpanjaka, ary ny andriandahy sy ny mpitsoka ny trompetra dia teo anilan’ny mpanjaka; ary ny vahoaka rehetra dia nifaly sady nitsoka ny trompetra, ary ny mpihira no nitarika ny hira fiderana amin’ny zavamaneno isan-karazany. Dia nandriatra ny fitafiany i Atalia ka niantso hoe: Fikomiana! Fikomiana! '
  '14':
  - type: text
    content: 'Fa nasain’i Joiada navoakan’ny kapiteny, mpifehy ny miaramila, izy ka hoy izy tamin’ireo: Avoahy eny ivelan’ny filaharana izy, ary izay manaraka azy dia vonoy amin’ny sabatra. Fa ny mpisorona dia efa nandrara hoe: Aza vonoina eto amin’ny tranon’NY TOMPO izy. '
  '15':
  - type: text
    content: Ary nisambotra azy ny olona, dia nankany amin’ny fidirana amin’ny vavahadin-tsoavaly Ravehivavy ka niditra tao an-tranon’ny mpanjaka; dia novonoiny tao izy.
  - type: heading
    content: Fanavaozana noentin’i Joiada
  - type: heading
    content: 2Mpa 11.17-20
  '16':
  - type: text
    content: 'Ary i Joiada dia nampanao fanekena ny vahoaka rehetra sy ny mpanjaka mbamin’ny tenany mba ho olon’NY TOMPO. '
  '17':
  - type: text
    content: 'Ary ny vahoaka rehetra dia niditra tao an-tranon’ny '
  - type: text
    content: Baala
  - type: text
    content: ' ka nandrava azy; ny alitara sy ny sarin-javatra dia notorotoroiny avokoa ary novonoiny teo anoloan’ny alitara i Matana, mpisoron’ny Baala. '
  '18':
  - type: text
    content: 'Dia nanendry olona hitandrina ny tranon’NY TOMPO i Joiada mba hofehezin’ny '
  - type: text
    content: levita
  - type: text
    content: ' mpisorona, izay nozarazarain’i Davida ho ao amin’ny tranon’NY TOMPO, hanolotra ny fanatitra dorana manontolo ho an’NY TOMPO, araka ny voasoratra ao amin’ny lalànan’i Mosesy, amin’ny fifaliana sy ny fihirana, dia araka ny nasain’i Davida natao. '
  '19':
  - type: text
    content: 'Ary nalatsany teo am-bavahadin’ny tranon’NY TOMPO ny mpiandry varavarana mba tsy hisy zavatra maloto na inona na inona ho tafiditra ao. '
  '2':
  - type: text
    content: 'Nitety an’i Joda ireo ka namory ny '
  - type: text
    content: levita
  - type: text
    content: ' avy tany amin’ny tanànan’ny Joda rehetra sy ny lohan’ny fianakaviana tamin’ny Israely dia tonga tany Jerosalema ireo. '
  '20':
  - type: text
    content: 'Dia nalainy ny mpifehy zato sy ny olona manankaja sy ny mpanapaka ny olona ary ny vahoaka rehetra; dia noentiny nidina avy tao amin’ny tranon’NY TOMPO ny mpanjaka, koa ny vavahady ambony no nalehany hankao an-tranon’ny mpanjaka; dia nametraka ny mpanjaka teo amin’ny sezafiandrianan’ny fanjakana izy. '
  '21':
  - type: text
    content: Dia nifaly ny vahoaka rehetra; ary nandry fehizay ny tanàna, fa efa novonoiny tamin’ny sabatra i Atalia.
  '3':
  - type: text
    content: 'Vory tao ny olona rehetra dia nanao fanekena tamin’ny mpanjaka tao amin’ny tranon’Andriamanitra. Ary hoy i Joiada taminy: Indro, ny zanaky ny mpanjaka no hanjaka araka ny efa nolazain’NY TOMPO ny amin’ny taranak’i Davida. '
  '4':
  - type: text
    content: 'Izao no hataonareo: Ny ampahatelonareo izay milatsaka amin’ny Sabata, dia ny mpisorona sy ny levita, dia ho mpiandry varavarana; '
  '5':
  - type: text
    content: 'ny ampahatelonareo dia ho ao an-tranon’ny mpanjaka; ary ny ampahatelonareo dia ho eo amin’ny vavahadin’ny Fanorenana. Ny vahoaka rehetra kosa dia ho eo amin’ny kianjan’ny tranon’NY TOMPO. '
  '6':
  - type: text
    content: 'Fa aza avela hisy hiditra ao amin’ny tranon’NY TOMPO afa-tsy ny mpisorona sy ny levita izay manao fanompoam-pivavahana ihany; ireo ihany no hiditra, satria masina ireo; fa ny vahoaka rehetra kosa dia hitandrina izay nasain’NY TOMPO hotandremana. '
  '7':
  - type: text
    content: Ary ny levita dia hanemitra manodidina ny mpanjaka, samy mitana ny fiadiany avy; koa na iza na iza miditra ao an-trano dia vonoy, ary araho ny mpanjaka, na aiza na aiza alehany.
  '8':
  - type: text
    content: 'Ny levita sy ny Joda rehetra dia nanatanteraka izay rehetra nandidian’i Joiada mpisorona ka samy nitondra ny olom-peheziny izay nilatsaka tamin’ny Sabata sy izay niala tamin’ny Sabata; fa tsy nandrava ny antokony i Joiada mpisorona. '
  '9':
  - type: text
    content: 'Ary nomen’i Joiada mpisorona ho an’ny mpifehy zato ny lefona sy ny ampinga kely sy ny ampinga lehibe, izay an’i Davida mpanjaka, izay tao amin’ny tranon’Andriamanitra. '
