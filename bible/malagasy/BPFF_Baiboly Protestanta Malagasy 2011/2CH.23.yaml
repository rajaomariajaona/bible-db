document_id: 2CH.23,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Voahosotra ho mpanjaka i Joasy
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 2Mpa 11.4-16
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Tamin’ny taona fahafito dia nandray fanapahan-kevitra i Joiada ka nanao fanekena tamin’ny mpifehy zato, dia i Azaria, zanak’i Jerohama, Ismaela, zanak’i Johanana, i Azaria, zanak’i Obeda, i Mahaseia, zanak’i Adaia ary i Elisafata, zanak’i Zikry. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Nalahany ny vahoaka rehetra, samy nitana ny fiadiany avy mba hanodidina ny mpanjaka hatramin’ny lafiny ankavanan’ny trano ka hatramin’ny lafiny ankavia, hatramin’ny alitara ka hatramin’ny trano. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Dia noentiny nivoaka ny zanakalahin’ny mpanjaka ka nosatrohany ny satroboninahitra, sady notolorany ny Vavolombelona
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.11 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Ny Vavolombelona: zahao '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 2Mpa 11.12.
      marker-yv: yv-n
    - type: text
      text: ', dia nampanjakainy. Ary nanosotra azy i Joiada sy ny zanany ka niantso hoe: Ho ela velona anie ny mpanjaka!'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Nony ren’i Atalia ny tabataban’ny vahoaka nifamoivoy sy niarahaba ny mpanjaka dia mba nankao amin’ny vahoaka tao amin’ny tranon’NY TOMPO izy. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ary hitany fa indro, nitsangana teo amin’ny fitoeran’andriana teo amin’ny fidirana ny mpanjaka, ary ny andriandahy sy ny mpitsoka ny trompetra dia teo anilan’ny mpanjaka; ary ny vahoaka rehetra dia nifaly sady nitsoka ny trompetra, ary ny mpihira no nitarika ny hira fiderana amin’ny zavamaneno isan-karazany. Dia nandriatra ny fitafiany i Atalia ka niantso hoe: Fikomiana! Fikomiana! '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Fa nasain’i Joiada navoakan’ny kapiteny, mpifehy ny miaramila, izy ka hoy izy tamin’ireo: Avoahy eny ivelan’ny filaharana izy, ary izay manaraka azy dia vonoy amin’ny sabatra. Fa ny mpisorona dia efa nandrara hoe: Aza vonoina eto amin’ny tranon’NY TOMPO izy. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Ary nisambotra azy ny olona, dia nankany amin’ny fidirana amin’ny vavahadin-tsoavaly Ravehivavy ka niditra tao an-tranon’ny mpanjaka; dia novonoiny tao izy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fanavaozana noentin’i Joiada
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 2Mpa 11.17-20
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Ary i Joiada dia nampanao fanekena ny vahoaka rehetra sy ny mpanjaka mbamin’ny tenany mba ho olon’NY TOMPO. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Ary ny vahoaka rehetra dia niditra tao an-tranon’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Baala
    - type: text
      text: ' ka nandrava azy; ny alitara sy ny sarin-javatra dia notorotoroiny avokoa ary novonoiny teo anoloan’ny alitara i Matana, mpisoron’ny Baala. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Dia nanendry olona hitandrina ny tranon’NY TOMPO i Joiada mba hofehezin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: levita
    - type: text
      text: ' mpisorona, izay nozarazarain’i Davida ho ao amin’ny tranon’NY TOMPO, hanolotra ny fanatitra dorana manontolo ho an’NY TOMPO, araka ny voasoratra ao amin’ny lalànan’i Mosesy, amin’ny fifaliana sy ny fihirana, dia araka ny nasain’i Davida natao. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Ary nalatsany teo am-bavahadin’ny tranon’NY TOMPO ny mpiandry varavarana mba tsy hisy zavatra maloto na inona na inona ho tafiditra ao. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Nitety an’i Joda ireo ka namory ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: levita
    - type: text
      text: ' avy tany amin’ny tanànan’ny Joda rehetra sy ny lohan’ny fianakaviana tamin’ny Israely dia tonga tany Jerosalema ireo. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Dia nalainy ny mpifehy zato sy ny olona manankaja sy ny mpanapaka ny olona ary ny vahoaka rehetra; dia noentiny nidina avy tao amin’ny tranon’NY TOMPO ny mpanjaka, koa ny vavahady ambony no nalehany hankao an-tranon’ny mpanjaka; dia nametraka ny mpanjaka teo amin’ny sezafiandrianan’ny fanjakana izy. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Dia nifaly ny vahoaka rehetra; ary nandry fehizay ny tanàna, fa efa novonoiny tamin’ny sabatra i Atalia.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Vory tao ny olona rehetra dia nanao fanekena tamin’ny mpanjaka tao amin’ny tranon’Andriamanitra. Ary hoy i Joiada taminy: Indro, ny zanaky ny mpanjaka no hanjaka araka ny efa nolazain’NY TOMPO ny amin’ny taranak’i Davida. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Izao no hataonareo: Ny ampahatelonareo izay milatsaka amin’ny Sabata, dia ny mpisorona sy ny levita, dia ho mpiandry varavarana; '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'ny ampahatelonareo dia ho ao an-tranon’ny mpanjaka; ary ny ampahatelonareo dia ho eo amin’ny vavahadin’ny Fanorenana. Ny vahoaka rehetra kosa dia ho eo amin’ny kianjan’ny tranon’NY TOMPO. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Fa aza avela hisy hiditra ao amin’ny tranon’NY TOMPO afa-tsy ny mpisorona sy ny levita izay manao fanompoam-pivavahana ihany; ireo ihany no hiditra, satria masina ireo; fa ny vahoaka rehetra kosa dia hitandrina izay nasain’NY TOMPO hotandremana. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Ary ny levita dia hanemitra manodidina ny mpanjaka, samy mitana ny fiadiany avy; koa na iza na iza miditra ao an-trano dia vonoy, ary araho ny mpanjaka, na aiza na aiza alehany.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Ny levita sy ny Joda rehetra dia nanatanteraka izay rehetra nandidian’i Joiada mpisorona ka samy nitondra ny olom-peheziny izay nilatsaka tamin’ny Sabata sy izay niala tamin’ny Sabata; fa tsy nandrava ny antokony i Joiada mpisorona. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ary nomen’i Joiada mpisorona ho an’ny mpifehy zato ny lefona sy ny ampinga kely sy ny ampinga lehibe, izay an’i Davida mpanjaka, izay tao amin’ny tranon’Andriamanitra. '
