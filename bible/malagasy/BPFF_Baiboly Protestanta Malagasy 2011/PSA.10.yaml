document_id: PSA.10,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: lamed ל
  - type: text
    content: TOMPO ô, nahoana Ianao no mijanona eny lavitra eny?
  - type: text
    content: Nahoana Ianao no miery amin’ny andro fahoriana?
  '10':
  - type: text
    content: Torotoro sy mitanondrika ny mahantra
  - type: text
    content: fa lavon’ny herin’ny ratsy fanahy.
  '11':
  - type: text
    content: 'Dia hoy izy anakampo: Efa nanadino Andriamanitra!'
  - type: text
    content: Nanafina ny tavany Izy ka tsy hahita mandrakizay!
  - type: heading
    content: kof ק
  '12':
  - type: text
    content: Mitsangàna, TOMPO ô!
  - type: text
    content: Atsangano ny tananao, Andriamanitra ô!
  - type: text
    content: Aza manadino ny ory!
  '13':
  - type: text
    content: Nahoana no mamingavinga an’Andriamanitra ny ratsy fanahy?
  - type: text
    content: 'Nahoana no miteny anakampo izy hoe: Tsy hanadina akory Ianao?'
  - type: heading
    content: res ר
  '14':
  - type: text
    content: Hitanao ny fahoriana sy ny alahelo;
  - type: text
    content: jerenao izany mba hovalian’ny tananao;
  - type: text
    content: Ianao no fiononan’ny mahantra;
  - type: text
    content: Ianao no mpamonjy ny kamboty.
  - type: heading
    content: sin שׁ
  '15':
  - type: text
    content: Torotoroy ny sandrin’ny ratsy fanahy
  - type: text
    content: ary sazio noho ny helony ny mpanao ratsy mba tsy ho hitanao intsony.
  '16':
  - type: text
    content: NY TOMPO no Mpanjaka mandrakizay doria;
  - type: text
    content: voafongotra tsy ho amin’ny taniny intsony ny Jentilisa.
  - type: heading
    content: tao ת
  '17':
  - type: text
    content: Efa nohenoinao, TOMPO ô, ny fanirian’ny mahantra;
  - type: text
    content: mampiorina ny fony Ianao sady mampihaino ny sofinao
  '18':
  - type: text
    content: mba hanomezanao rariny ny kamboty sy ny voan’ny tsindry hazo lena,
  - type: text
    content: koa tsy hisy olombelona hampitahotra intsony etỳ an-tany.
  '2':
  - type: text
    content: Milomay manenjika ny mahantra ny ratsy fanahy;
  - type: text
    content: azon’ny fandrika nataony ihany izy ireny.
  '3':
  - type: text
    content: Mirehareha ny ratsy fanahy fa nahazo izay niriny
  - type: text
    content: ary mahafoy sy mamingavinga NY TOMPO ny mpierina.
  '4':
  - type: text
    content: 'Ny ratsy fanahy dia mirehareha hoe: Tsy hanadina Izy!'
  - type: text
    content: Tsy misy Andriamanitra! Izany no tontalin-keviny.
  '5':
  - type: text
    content: Mahomby amin’ny fotoana rehetra izy;
  - type: text
    content: any amin’ny avo ka lavitra azy ny fitsaranao;
  - type: text
    content: ny mpandrafy azy rehetra dia vingavingainy.
  '6':
  - type: text
    content: 'Hoy izy anakampo: Tsy hangozohozo aho,'
  - type: text
    content: tsy ho azon-doza mandrakizay doria aho!
  - type: heading
    content: pe פ
  '7':
  - type: text
    content: Feno ozona sy fitaka ary fanaovana an-keriny ny vavany;
  - type: text
    content: misy fampahoriana sy fampijaliana ao ambanin’ny lelany.
  '8':
  - type: text
    content: Mamitsaka manao vela-pandrika ao an-tanàna izy;
  - type: text
    content: ao amin’ny takona no amonoany ny tsy manan-tsiny;
  - type: text
    content: mikendry ny mahantra ny masony.
  - type: heading
    content: aìn ע
  '9':
  - type: text
    content: Manao vela-pandrika ao amin’ny takona tahaka ny liona ao amin’ny famitsahany izy,
  - type: text
    content: manao vela-pandrika hisambotra ny ampahorina izy,
  - type: text
    content: fandrihany amin’ny harato no fisambony ny ory.
