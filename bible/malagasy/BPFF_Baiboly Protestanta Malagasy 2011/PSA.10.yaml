document_id: PSA.10
type_code: plt
segments:
- type: usfm
  marker: qa
  children:
  - type: text
    text: lamed ל
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: TOMPO ô, nahoana Ianao no mijanona eny lavitra eny?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nahoana Ianao no miery amin’ny andro fahoriana?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Milomay manenjika ny mahantra ny ratsy fanahy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: azon’ny fandrika nataony ihany izy ireny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Mirehareha ny ratsy fanahy fa nahazo izay niriny
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mahafoy sy mamingavinga NY TOMPO ny mpierina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ny ratsy fanahy dia mirehareha hoe: Tsy hanadina Izy!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy misy Andriamanitra! Izany no tontalin-keviny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Mahomby amin’ny fotoana rehetra izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: any amin’ny avo ka lavitra azy ny fitsaranao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny mpandrafy azy rehetra dia vingavingainy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Hoy izy anakampo: Tsy hangozohozo aho,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy ho azon-doza mandrakizay doria aho!
- type: usfm
  marker: qa
  children:
  - type: text
    text: pe פ
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Feno ozona sy fitaka ary fanaovana an-keriny ny vavany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: misy fampahoriana sy fampijaliana ao ambanin’ny lelany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Mamitsaka manao vela-pandrika ao an-tanàna izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ao amin’ny takona no amonoany ny tsy manan-tsiny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mikendry ny mahantra ny masony.
- type: usfm
  marker: qa
  children:
  - type: text
    text: aìn ע
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Manao vela-pandrika ao amin’ny takona tahaka ny liona ao amin’ny famitsahany izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: manao vela-pandrika hisambotra ny ampahorina izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fandrihany amin’ny harato no fisambony ny ory.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Torotoro sy mitanondrika ny mahantra
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa lavon’ny herin’ny ratsy fanahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Dia hoy izy anakampo: Efa nanadino Andriamanitra!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nanafina ny tavany Izy ka tsy hahita mandrakizay!
- type: usfm
  marker: qa
  children:
  - type: text
    text: kof ק
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Mitsangàna, TOMPO ô!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Atsangano ny tananao, Andriamanitra ô!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aza manadino ny ory!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Nahoana no mamingavinga an’Andriamanitra ny ratsy fanahy?
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Nahoana no miteny anakampo izy hoe: Tsy hanadina akory Ianao?'
- type: usfm
  marker: qa
  children:
  - type: text
    text: res ר
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Hitanao ny fahoriana sy ny alahelo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: jerenao izany mba hovalian’ny tananao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ianao no fiononan’ny mahantra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ianao no mpamonjy ny kamboty.
- type: usfm
  marker: qa
  children:
  - type: text
    text: sin שׁ
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Torotoroy ny sandrin’ny ratsy fanahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary sazio noho ny helony ny mpanao ratsy mba tsy ho hitanao intsony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: NY TOMPO no Mpanjaka mandrakizay doria;
- type: usfm
  marker: q1
  children:
  - type: text
    text: voafongotra tsy ho amin’ny taniny intsony ny Jentilisa.
- type: usfm
  marker: qa
  children:
  - type: text
    text: tao ת
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Efa nohenoinao, TOMPO ô, ny fanirian’ny mahantra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mampiorina ny fony Ianao sady mampihaino ny sofinao
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: mba hanomezanao rariny ny kamboty sy ny voan’ny tsindry hazo lena,
- type: usfm
  marker: q1
  children:
  - type: text
    text: koa tsy hisy olombelona hampitahotra intsony etỳ an-tany.
