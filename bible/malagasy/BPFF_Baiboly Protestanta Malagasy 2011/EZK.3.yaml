document_id: EZK.3,3103
type_code: plt
verses:
  '1':
  - type: text
    content: 'Ary hoy Izy tamiko: Ry zanak’olona, hano izay hitanao, eny, hano ity horonan-taratasy ity, dia mandehana ka mitenena amin’ny taranak’Israely! '
  '10':
  - type: text
    content: 'Ary hoy ihany Izy tamiko: Ry zanak’olona, ny teny rehetra izay holazaiko aminao dia raiso ao am-ponao ka henoy amin’ny sofinao. '
  '11':
  - type: text
    content: 'Dia mandehana mankany amin’ny babo, dia ireo zanaky ny firenenao, ary mitenena aminy hoe: Izao no lazain’NY TOMPO Andriamanitra, na hihaino izy na tsy hihaino.'
  '12':
  - type: text
    content: 'Ary nisy fanahy nanainga ahy, dia nandre horakoraka be teo ivohoko aho nanao hoe: Isaorana anie ny voninahitry NY TOMPO avy amin’ny fitoerany! '
  '13':
  - type: text
    content: 'Ary reko koa ny fikopakopaky ny elatry ny zavamananaina izay nifanendry, sy ny fidilodilotry ny kodiarana teo anilany sy ny horakoraka be. '
  '14':
  - type: text
    content: 'Ary nisy fanahy nanainga ahy ka nitondra ahy, dia lasa aho sady tezitra no nivonto ny fanahiko; ary ny tanan’NY TOMPO dia nahery tamiko. '
  '15':
  - type: text
    content: Dia tonga tany amin’ny babo tany Tela-Aviva aho, teo amin’izay nonina teo amoron’ny ony Kebara, teo amin’izay nipetrahany, ary mandritra ny hafitoana aho dia teo anivony, nivarahontsana.
  - type: heading
    content: Natao ho mpitily i Ezekiela
  '16':
  - type: text
    content: 'Nony afaka ny hafitoana dia tonga tamiko ny tenin’NY TOMPO hoe:'
  '17':
  - type: text
    content: 'Ry '
  - type: text
    content: zanak’olona
  - type: text
    content: ', efa nataoko mpitily ho an’ny taranak’Israely ianao ka hohenoinao ny teny avy amin’ny vavako, ary avy Amiko no hananaranao azy. '
  '18':
  - type: text
    content: 'Raha hoy Aho amin’ny ratsy fanahy: Ho faty tokoa ianao! Nefa tsy mananatra azy ianao, na miteny hananatra ny ratsy fanahy hialany amin’ny lalany ratsy hamonjena ny ainy, dia ho faty amin’ny helony ihany ilay ratsy fanahy; nefa hadiniko amin’ny tananao ny rany. '
  '19':
  - type: text
    content: 'Fa raha mananatra ny ratsy fanahy kosa ianao, fa izy no tsy mety miala amin’ny faharatsiany sy amin’ny lalany ratsy, dia ho faty amin’ny helony ihany izy, fa ho voavonjinao ny ainao. '
  '2':
  - type: text
    content: 'Dia nosokafako ny vavako ary nafahany ahy izany horonan-taratasy izany. '
  '20':
  - type: text
    content: 'Ary koa, raha ny marina no miala amin’ny fahamarinany ka manao meloka, ary mametraka fahatafintohinana eo anoloany Aho, dia ho faty izy; eny, noho ny tsy nananaranao azy dia ho faty amin’ny fahotany ihany izy, ary ny fahamarinana izay nataony tsy hotsaroana, nefa kosa hadiniko amin’ny tananao ny rany. '
  '21':
  - type: text
    content: Fa raha mananatra ny marina mba tsy hanota ianao ka tsy manota izy, dia ho velona tokoa izy, satria nino anatra ary voavonjinao koa ny ainao.
  - type: heading
    content: Fotoana fahanginana ho an’i Ezekiela
  '22':
  - type: text
    content: 'Tao dia tonga tamiko ny tanan’NY TOMPO ary hoy Izy tamiko: Mitsangàna ka mivoaha ho any amin’ny lohasaha ary any no hitenenako aminao. '
  '23':
  - type: text
    content: 'Dia nitsangana aho ka nivoaka nankany amin’ny lohasaha; ary indro, tao ny voninahitry NY TOMPO, tahaka ny voninahitra izay efa hitako teo amoron’ny ony Kebara ihany. Dia niankarapoka tamin’ny tany aho. '
  '24':
  - type: text
    content: 'Ary nisy fanahy tonga tao anatiko ka nampitsangana ahy. Dia niteny tamiko Izy hoe: Andeha, mirindrìna ao anatin’ny tranonao ianao. '
  '25':
  - type: text
    content: 'Fa ianao, ry '
  - type: text
    content: zanak’olona
  - type: text
    content: ', indro, hasiany mahazaka hamatorany anao ianao ka tsy hahazo mivoaka ho eo anivony intsony ianao. '
  '26':
  - type: text
    content: 'Ary hampiraiketiko amin’ny lanilaninao ny lelanao ka ho moana ianao ary tsy ho mpananatra azy; fa taranaka maditra izy. '
  '27':
  - type: text
    content: 'Fa rehefa miteny aminao Aho dia hosokafako ny vavanao ka holazainao aminy hoe: Izao no lazain’NY TOMPO Andriamanitra: Izay mihaino dia aoka izy hihaino; ary izay tsy mihaino dia aoka izy tsy hihaino; fa taranaka maditra izy.'
  '3':
  - type: text
    content: 'Ary hoy Izy tamiko: Ry zanak’olona, vokiso ny kibonao ary fenoy ity horonan-taratasy omeko anao ity ny tsinainao! Dia nihinana aho ka mamy tao am-bavako toy ny tantely izany.'
  '4':
  - type: text
    content: 'Ary hoy Izy tamiko: Ry zanak’olona, andeha mankany amin’ny taranak’Israely ka lazao aminy ny teniko. '
  '5':
  - type: text
    content: 'Fa tsy ho any amin’ny firenena manao fiteny tsy hay sy miboredidredika no anirahana anao, fa ho any amin’ny taranak’Israely ihany. '
  '6':
  - type: text
    content: 'Tsy ho amin’ny firenena maro izay manao fiteny tsy hay sy miboredidredika ka tsy ho azonao ny teniny. Fa raha tamin’ireny no nanirahako anao dia ho nihaino anao tokoa izy. '
  '7':
  - type: text
    content: 'Fa ny taranak’Israely dia tsy mety mihaino anao satria tsy mety mihaino Ahy izy; fa ny taranak’Israely rehetra dia mafy handrina sady mafy fo. '
  '8':
  - type: text
    content: 'Indro, efa nohamafiko ny tarehinao hiatrika ny tarehiny sy ny handrinao hanandrina ny handriny. '
  '9':
  - type: text
    content: Ataoko toy ny diamondra ny handrinao, eny, mafy noho ny vatolampy aza. Koa aza matahotra azy na mivadi-po noho ny tarehiny fa taranaka maditra izy.
