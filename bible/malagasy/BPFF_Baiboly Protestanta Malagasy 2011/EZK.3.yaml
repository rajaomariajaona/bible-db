document_id: EZK.3,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Izy tamiko: Ry zanak’olona, hano izay hitanao, eny, hano ity horonan-taratasy ity, dia mandehana ka mitenena amin’ny taranak’Israely! '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy ihany Izy tamiko: Ry zanak’olona, ny teny rehetra izay holazaiko aminao dia raiso ao am-ponao ka henoy amin’ny sofinao. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia mandehana mankany amin’ny babo, dia ireo zanaky ny firenenao, ary mitenena aminy hoe: Izao no lazain’NY TOMPO Andriamanitra, na hihaino izy na tsy hihaino.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nisy fanahy nanainga ahy, dia nandre horakoraka be teo ivohoko aho nanao hoe: Isaorana anie ny voninahitry NY TOMPO avy amin’ny fitoerany! '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary reko koa ny fikopakopaky ny elatry ny zavamananaina izay nifanendry, sy ny fidilodilotry ny kodiarana teo anilany sy ny horakoraka be. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nisy fanahy nanainga ahy ka nitondra ahy, dia lasa aho sady tezitra no nivonto ny fanahiko; ary ny tanan’NY TOMPO dia nahery tamiko. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia tonga tany amin’ny babo tany Tela-Aviva aho, teo amin’izay nonina teo amoron’ny ony Kebara, teo amin’izay nipetrahany, ary mandritra ny hafitoana aho dia teo anivony, nivarahontsana.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Natao ho mpitily i Ezekiela
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nony afaka ny hafitoana dia tonga tamiko ny tenin’NY TOMPO hoe:'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ry '
    - type: usfm
      marker: w
      children:
      - type: text
        text: zanak’olona
    - type: text
      text: ', efa nataoko mpitily ho an’ny taranak’Israely ianao ka hohenoinao ny teny avy amin’ny vavako, ary avy Amiko no hananaranao azy. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha hoy Aho amin’ny ratsy fanahy: Ho faty tokoa ianao! Nefa tsy mananatra azy ianao, na miteny hananatra ny ratsy fanahy hialany amin’ny lalany ratsy hamonjena ny ainy, dia ho faty amin’ny helony ihany ilay ratsy fanahy; nefa hadiniko amin’ny tananao ny rany. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa raha mananatra ny ratsy fanahy kosa ianao, fa izy no tsy mety miala amin’ny faharatsiany sy amin’ny lalany ratsy, dia ho faty amin’ny helony ihany izy, fa ho voavonjinao ny ainao. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nosokafako ny vavako ary nafahany ahy izany horonan-taratasy izany. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary koa, raha ny marina no miala amin’ny fahamarinany ka manao meloka, ary mametraka fahatafintohinana eo anoloany Aho, dia ho faty izy; eny, noho ny tsy nananaranao azy dia ho faty amin’ny fahotany ihany izy, ary ny fahamarinana izay nataony tsy hotsaroana, nefa kosa hadiniko amin’ny tananao ny rany. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa raha mananatra ny marina mba tsy hanota ianao ka tsy manota izy, dia ho velona tokoa izy, satria nino anatra ary voavonjinao koa ny ainao.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fotoana fahanginana ho an’i Ezekiela
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tao dia tonga tamiko ny tanan’NY TOMPO ary hoy Izy tamiko: Mitsangàna ka mivoaha ho any amin’ny lohasaha ary any no hitenenako aminao. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nitsangana aho ka nivoaka nankany amin’ny lohasaha; ary indro, tao ny voninahitry NY TOMPO, tahaka ny voninahitra izay efa hitako teo amoron’ny ony Kebara ihany. Dia niankarapoka tamin’ny tany aho. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nisy fanahy tonga tao anatiko ka nampitsangana ahy. Dia niteny tamiko Izy hoe: Andeha, mirindrìna ao anatin’ny tranonao ianao. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ianao, ry '
    - type: usfm
      marker: w
      children:
      - type: text
        text: zanak’olona
    - type: text
      text: ', indro, hasiany mahazaka hamatorany anao ianao ka tsy hahazo mivoaka ho eo anivony intsony ianao. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hampiraiketiko amin’ny lanilaninao ny lelanao ka ho moana ianao ary tsy ho mpananatra azy; fa taranaka maditra izy. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa rehefa miteny aminao Aho dia hosokafako ny vavanao ka holazainao aminy hoe: Izao no lazain’NY TOMPO Andriamanitra: Izay mihaino dia aoka izy hihaino; ary izay tsy mihaino dia aoka izy tsy hihaino; fa taranaka maditra izy.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Izy tamiko: Ry zanak’olona, vokiso ny kibonao ary fenoy ity horonan-taratasy omeko anao ity ny tsinainao! Dia nihinana aho ka mamy tao am-bavako toy ny tantely izany.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Izy tamiko: Ry zanak’olona, andeha mankany amin’ny taranak’Israely ka lazao aminy ny teniko. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa tsy ho any amin’ny firenena manao fiteny tsy hay sy miboredidredika no anirahana anao, fa ho any amin’ny taranak’Israely ihany. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsy ho amin’ny firenena maro izay manao fiteny tsy hay sy miboredidredika ka tsy ho azonao ny teniny. Fa raha tamin’ireny no nanirahako anao dia ho nihaino anao tokoa izy. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ny taranak’Israely dia tsy mety mihaino anao satria tsy mety mihaino Ahy izy; fa ny taranak’Israely rehetra dia mafy handrina sady mafy fo. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Indro, efa nohamafiko ny tarehinao hiatrika ny tarehiny sy ny handrinao hanandrina ny handriny. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ataoko toy ny diamondra ny handrinao, eny, mafy noho ny vatolampy aza. Koa aza matahotra azy na mivadi-po noho ny tarehiny fa taranaka maditra izy.
