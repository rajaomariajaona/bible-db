document_id: ISA.29,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Natao fahirano i Jerosalema ary nafahana avy eo
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Lozan’i Ariela
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ariela: Fatan’Andriamanitra, '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'na '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Lion’Andriamanitra.
      marker-yv: yv-n
    - type: text
      text: ', dia i Ariela,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tanàna nitobian’i Davida!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ampio taona ny taona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aoka ho tafatsingeringerina ny andro firavoravoana,
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Fa NY TOMPO efa nampidina fanahy mahasondrian-tory
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ao aminareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: efa nakimpiny ny masonareo mpaminany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary efa nosaronany ny lohanareo mpahita.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Aminareo ny fahitana ny amin’izany rehetra izany dia tahaka ny teny amin’ny taratasy voaisy tombo-kase izay atolotra olona mahavaky teny ka ilazana hoe: Miangavy anao aho, vakio ity! Hoy anefa izy: Tsy azoko vakina ity satria voaisy tombo-kase. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Fa raha atolotra izay tsy mahavaky teny kosa izany ka atao hoe: Miangavy anao aho, vakio ity! Dia hamaly izy hoe: Tsy mahay mamaky teny aho.'
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ary hoy ny Tompo: Satria manatona Ahy amin’ny vavany ity firenena ity'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy mankalaza Ahy amin’ny molony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa ampanalaviriny Ahy kosa ny fony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny fahatahorany Ahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia didin’olombelona ampianarina azy ihany.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Noho izany dia mbola hanao zava-mahagaga amin’ity firenena ity indray Aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia zava-mahagaga sy mahatalanjona;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho foana ny fahendren’ny olon-kendriny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy ho hita ny fahalalan’ny manampahaizana eo aminy.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Lozan’izay miafina lalina mba tsy ho hitan’NY TOMPO
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka manafina ny fikasany!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ao amin’ny maizina ny asany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ka hoy izy: Iza no mahita antsika, ary iza no mahalala antsika?'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Endre izato hadalanareo!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moa ny mpanefy tanimanga va no hoheverina ho tahaka ny tanimanga,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ny novolavolaina va hilaza izay namolavola azy hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy namolavola ahy izy?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Na ny zavatra voaforona va hilaza izay namorona azy hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy manam-pahalalana izy?
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fiovan’ny toe-draharaha
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Tsy vetivety foana va
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hovana ho saha mahavokatra i Libanona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny saha mahavokatra dia hoheverina ho ala?
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Amin’izany andro izany dia ho ren’ny marenina ny lazain’ny boky;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary na dia ao amin’ny haizina sy ny haizim-pito aza
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hahita ihany ny mason’ny jamba.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Hitombo hafaliana amin’NY TOMPO ny ory;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny mahantra ao amin’ny olona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hiravoravo amin’ny Iray Masin’ny Israely.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: dia hampahory an’i Ariela Aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hisy fisentoana sy fitarainana ao aminy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ho tonga fatana alitara tokoa izy Amiko.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Fa tapitra ny mpampihorohoro,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy ao intsony ny mpaniratsira;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary fongotra izay rehetra tsy misaina afa-tsy ny hanisy ratsy,
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: dia ireo izay manameloka olona amin’ny teny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mamandrika izay mananatra eo am-bavahady
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady mamadika tsy amin’antony ny marina.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Noho izany dia izao no lazain’NY TOMPO
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay nanavotra an’i Abrahama,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'izao no lazainy amin’ny taranak’i Jakoba:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy hitsanga-menatra intsony i Jakoba
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy hivaloarika intsony ny tavany.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Fa rehefa hitan’ny zanany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny asan’ny tanako eo anivon’izy ireo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hanamasina ny anarako izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, hanamasina ny Iray Masin’i Jakoba izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hangovitra eo anatrehan’Andriamanitry ny Israely;
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ny fanahy diso lalana dia mbola hahazo fahalalana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary izay mimonomonona dia mbola hahazo lesona hampahendry azy.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Hitoby manodidina anao Aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hasiako miaramila hanao fahirano anao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hanangana manda aho mba hamelezana anao.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Dia haetry ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hiteny avy ao amin’ny tany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary avy ao amin’ny vovoka no hibitsibitsihanao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, hivoaka avy amin’ny tany tahaka ny an’ny mpiantso ny fanahin’ny maty ny feonao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary avy ao amin’ny vovoka no hibitsibitsihanao ny teninao.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Kanefa ho tonga tahaka ny vovoka madinika ny fahavalonao betsaka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ho tahaka ny akofa entin-drivotra ny mpampihorohoro maro;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, ho avy tampoka dia tampoka izany.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Avy amin’Andriamanitra, Tompon’izao rehetra izao, ny famaliana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: amin’ny kotrokorana sy horohoron-tany ary feo mahery,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tadio sy tafio-drivotra ary lelafo mandevona.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Ho tahaka ny fahitana amin’ny nofy amin’ny alina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ireo firenen-drehetra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay mivory hamely an’i Ariela,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia izay rehetra mivory hamely
  - type: usfm
    marker: q1
    children:
    - type: text
      text: azy sy ny mandany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hampahory azy.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Dia ho tahaka ny olona noana izay manonofy mihinana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: kanjo nony mahatsiaro izy dia foana ihany ny kibony;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na koa tahaka ny olona mangetaheta izay manonofy misotro,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: kanjo nony mahatsiaro izy dia indro, ana sady mbola mangetaheta ihany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho tahaka izany ny firenena rehetra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'izay mivory hamely ny tendrombohitra '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Ziona
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Vahoaka tsy mahataka-javatra
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Mijanòna ianareo ka mitalanjòna!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tampeno ny masonareo, ary aoka ianareo ho jamba!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mamo ireo nefa tsy tamin’ny divay;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mivembena izy nefa tsy noho ny toaka.
