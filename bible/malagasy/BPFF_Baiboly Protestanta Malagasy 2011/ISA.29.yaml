document_id: ISA.29,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Natao fahirano i Jerosalema ary nafahana avy eo
  - type: text
    content: Lozan’i Ariela
  - type: note
    content: 'Ariela: Fatan’Andriamanitra, na Lion’Andriamanitra.'
  - type: text
    content: ', dia i Ariela,'
  - type: text
    content: tanàna nitobian’i Davida!
  - type: text
    content: Ampio taona ny taona,
  - type: text
    content: aoka ho tafatsingeringerina ny andro firavoravoana,
  '10':
  - type: text
    content: Fa NY TOMPO efa nampidina fanahy mahasondrian-tory
  - type: text
    content: ao aminareo,
  - type: text
    content: efa nakimpiny ny masonareo mpaminany
  - type: text
    content: ary efa nosaronany ny lohanareo mpahita.
  '11':
  - type: text
    content: 'Aminareo ny fahitana ny amin’izany rehetra izany dia tahaka ny teny amin’ny taratasy voaisy tombo-kase izay atolotra olona mahavaky teny ka ilazana hoe: Miangavy anao aho, vakio ity! Hoy anefa izy: Tsy azoko vakina ity satria voaisy tombo-kase. '
  '12':
  - type: text
    content: 'Fa raha atolotra izay tsy mahavaky teny kosa izany ka atao hoe: Miangavy anao aho, vakio ity! Dia hamaly izy hoe: Tsy mahay mamaky teny aho.'
  '13':
  - type: text
    content: 'Ary hoy ny Tompo: Satria manatona Ahy amin’ny vavany ity firenena ity'
  - type: text
    content: sy mankalaza Ahy amin’ny molony,
  - type: text
    content: nefa ampanalaviriny Ahy kosa ny fony,
  - type: text
    content: ny fahatahorany Ahy
  - type: text
    content: dia didin’olombelona ampianarina azy ihany.
  '14':
  - type: text
    content: Noho izany dia mbola hanao zava-mahagaga amin’ity firenena ity indray Aho,
  - type: text
    content: dia zava-mahagaga sy mahatalanjona;
  - type: text
    content: ho foana ny fahendren’ny olon-kendriny,
  - type: text
    content: ary tsy ho hita ny fahalalan’ny manampahaizana eo aminy.
  '15':
  - type: text
    content: Lozan’izay miafina lalina mba tsy ho hitan’NY TOMPO
  - type: text
    content: ka manafina ny fikasany!
  - type: text
    content: Ao amin’ny maizina ny asany
  - type: text
    content: 'ka hoy izy: Iza no mahita antsika, ary iza no mahalala antsika?'
  '16':
  - type: text
    content: Endre izato hadalanareo!
  - type: text
    content: Moa ny mpanefy tanimanga va no hoheverina ho tahaka ny tanimanga,
  - type: text
    content: 'ny novolavolaina va hilaza izay namolavola azy hoe:'
  - type: text
    content: Tsy namolavola ahy izy?
  - type: text
    content: 'Na ny zavatra voaforona va hilaza izay namorona azy hoe:'
  - type: text
    content: Tsy manam-pahalalana izy?
  - type: heading
    content: Ny fiovan’ny toe-draharaha
  '17':
  - type: text
    content: Tsy vetivety foana va
  - type: text
    content: dia hovana ho saha mahavokatra i Libanona,
  - type: text
    content: ary ny saha mahavokatra dia hoheverina ho ala?
  '18':
  - type: text
    content: Amin’izany andro izany dia ho ren’ny marenina ny lazain’ny boky;
  - type: text
    content: ary na dia ao amin’ny haizina sy ny haizim-pito aza
  - type: text
    content: dia hahita ihany ny mason’ny jamba.
  '19':
  - type: text
    content: Hitombo hafaliana amin’NY TOMPO ny ory;
  - type: text
    content: ary ny mahantra ao amin’ny olona
  - type: text
    content: dia hiravoravo amin’ny Iray Masin’ny Israely.
  '2':
  - type: text
    content: dia hampahory an’i Ariela Aho;
  - type: text
    content: hisy fisentoana sy fitarainana ao aminy;
  - type: text
    content: ary ho tonga fatana alitara tokoa izy Amiko.
  '20':
  - type: text
    content: Fa tapitra ny mpampihorohoro,
  - type: text
    content: tsy ao intsony ny mpaniratsira;
  - type: text
    content: ary fongotra izay rehetra tsy misaina afa-tsy ny hanisy ratsy,
  '21':
  - type: text
    content: dia ireo izay manameloka olona amin’ny teny,
  - type: text
    content: ary mamandrika izay mananatra eo am-bavahady
  - type: text
    content: sady mamadika tsy amin’antony ny marina.
  '22':
  - type: text
    content: Noho izany dia izao no lazain’NY TOMPO
  - type: text
    content: izay nanavotra an’i Abrahama,
  - type: text
    content: 'izao no lazainy amin’ny taranak’i Jakoba:'
  - type: text
    content: Tsy hitsanga-menatra intsony i Jakoba
  - type: text
    content: ary tsy hivaloarika intsony ny tavany.
  '23':
  - type: text
    content: Fa rehefa hitan’ny zanany
  - type: text
    content: ny asan’ny tanako eo anivon’izy ireo
  - type: text
    content: dia hanamasina ny anarako izy;
  - type: text
    content: eny, hanamasina ny Iray Masin’i Jakoba izy
  - type: text
    content: ary hangovitra eo anatrehan’Andriamanitry ny Israely;
  '24':
  - type: text
    content: ny fanahy diso lalana dia mbola hahazo fahalalana,
  - type: text
    content: ary izay mimonomonona dia mbola hahazo lesona hampahendry azy.
  '3':
  - type: text
    content: Hitoby manodidina anao Aho
  - type: text
    content: ka hasiako miaramila hanao fahirano anao
  - type: text
    content: ary hanangana manda aho mba hamelezana anao.
  '4':
  - type: text
    content: Dia haetry ianao
  - type: text
    content: ka hiteny avy ao amin’ny tany
  - type: text
    content: ary avy ao amin’ny vovoka no hibitsibitsihanao;
  - type: text
    content: eny, hivoaka avy amin’ny tany tahaka ny an’ny mpiantso ny fanahin’ny maty ny feonao
  - type: text
    content: ary avy ao amin’ny vovoka no hibitsibitsihanao ny teninao.
  '5':
  - type: text
    content: Kanefa ho tonga tahaka ny vovoka madinika ny fahavalonao betsaka,
  - type: text
    content: ary ho tahaka ny akofa entin-drivotra ny mpampihorohoro maro;
  - type: text
    content: eny, ho avy tampoka dia tampoka izany.
  '6':
  - type: text
    content: Avy amin’Andriamanitra, Tompon’izao rehetra izao, ny famaliana,
  - type: text
    content: amin’ny kotrokorana sy horohoron-tany ary feo mahery,
  - type: text
    content: tadio sy tafio-drivotra ary lelafo mandevona.
  '7':
  - type: text
    content: Ho tahaka ny fahitana amin’ny nofy amin’ny alina
  - type: text
    content: ireo firenen-drehetra
  - type: text
    content: izay mivory hamely an’i Ariela,
  - type: text
    content: dia izay rehetra mivory hamely
  - type: text
    content: azy sy ny mandany
  - type: text
    content: ka hampahory azy.
  '8':
  - type: text
    content: Dia ho tahaka ny olona noana izay manonofy mihinana,
  - type: text
    content: kanjo nony mahatsiaro izy dia foana ihany ny kibony;
  - type: text
    content: na koa tahaka ny olona mangetaheta izay manonofy misotro,
  - type: text
    content: kanjo nony mahatsiaro izy dia indro, ana sady mbola mangetaheta ihany;
  - type: text
    content: ho tahaka izany ny firenena rehetra
  - type: text
    content: 'izay mivory hamely ny tendrombohitra '
  - type: text
    content: Ziona
  - type: text
    content: .
  - type: heading
    content: Vahoaka tsy mahataka-javatra
  '9':
  - type: text
    content: Mijanòna ianareo ka mitalanjòna!
  - type: text
    content: Tampeno ny masonareo, ary aoka ianareo ho jamba!
  - type: text
    content: Mamo ireo nefa tsy tamin’ny divay;
  - type: text
    content: mivembena izy nefa tsy noho ny toaka.
