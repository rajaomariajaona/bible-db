document_id: PSA.41,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Vavaka ataon’ny olona misy mpanenjika
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: Ho an’ny mpiventy hira. Salamo nataon’i Davida.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Sambatra izay mahatsiaro ny mahantra!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: NY TOMPO manafaka azy amin’ny andro fahoriana;
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Fa Ianao kosa, TOMPO ô, mamindrà fo amiko ka atsangano aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hamaliako azy!
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Izao no hahafantarako fa mankasitraka ahy Ianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ny tsy anakoran’ny fahavaloko ahy.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Ny amiko dia manohana ahy amin’ny fahitsiako Ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka mampitoetra ahy eo anatrehanao mandrakizay.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Isaorana anie NY TOMPO, Andriamanitry ny Israely, hatramin’ny taloha indrindra ka ho mandrakizay!
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: w
      children:
      - type: text
        text: Amena
    - type: text
      text: ; eny, Amena.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: NY TOMPO hitandrina azy sy hiaro azy tsy ho faty;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: holazaina fa sambatra ambonin’ny tany izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy mba hatolotrao amin’ny sitrapon’ny fahavalony.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: NY TOMPO hanohana azy eo ambonin’ny farafara itsaboana azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: soloinao ny momba ny fandrianany rehetra eo am-paharariany.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Hoy aho: Mamindrà fo amiko, TOMPO ô!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sitrano ny fanahiko fa efa nanota Taminao aho.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Maniry loza ho ahy ny fahavaloko ka miteny hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rahoviana izy no ho faty ka ho very ny anarany?
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Raha misy tonga mamangy ahy dia zava-poana no teneniny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: manangona faharatsiam-panahy ny fony;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: raha vao tafavoaka izy dia milazalaza ireny.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Mitakoritsika ahy izay rehetra mankahala ahy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: misaina hanisy ratsy ahy izy.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Tena zava-doza, hoy izy, no hihatra aminy!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha mandry izy dia tsy hitsangana intsony!
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Eny, ny sakaizako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay nitokisako sady nihinana ny haniko aza
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no nanainga ny voditongony hamely ahy.
