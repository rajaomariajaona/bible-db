document_id: PSA.41,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Vavaka ataon’ny olona misy mpanenjika
  - type: text
    content: Ho an’ny mpiventy hira. Salamo nataon’i Davida.
  - type: text
    content: Sambatra izay mahatsiaro ny mahantra!
  - type: text
    content: NY TOMPO manafaka azy amin’ny andro fahoriana;
  '10':
  - type: text
    content: Fa Ianao kosa, TOMPO ô, mamindrà fo amiko ka atsangano aho
  - type: text
    content: mba hamaliako azy!
  '11':
  - type: text
    content: Izao no hahafantarako fa mankasitraka ahy Ianao,
  - type: text
    content: dia ny tsy anakoran’ny fahavaloko ahy.
  '12':
  - type: text
    content: Ny amiko dia manohana ahy amin’ny fahitsiako Ianao
  - type: text
    content: ka mampitoetra ahy eo anatrehanao mandrakizay.
  '13':
  - type: text
    content: Isaorana anie NY TOMPO, Andriamanitry ny Israely, hatramin’ny taloha indrindra ka ho mandrakizay!
  - type: text
    content: Amena
  - type: text
    content: ; eny, Amena.
  '2':
  - type: text
    content: NY TOMPO hitandrina azy sy hiaro azy tsy ho faty;
  - type: text
    content: holazaina fa sambatra ambonin’ny tany izy
  - type: text
    content: ary tsy mba hatolotrao amin’ny sitrapon’ny fahavalony.
  '3':
  - type: text
    content: NY TOMPO hanohana azy eo ambonin’ny farafara itsaboana azy;
  - type: text
    content: soloinao ny momba ny fandrianany rehetra eo am-paharariany.
  '4':
  - type: text
    content: 'Hoy aho: Mamindrà fo amiko, TOMPO ô!'
  - type: text
    content: Sitrano ny fanahiko fa efa nanota Taminao aho.
  '5':
  - type: text
    content: 'Maniry loza ho ahy ny fahavaloko ka miteny hoe:'
  - type: text
    content: Rahoviana izy no ho faty ka ho very ny anarany?
  '6':
  - type: text
    content: Raha misy tonga mamangy ahy dia zava-poana no teneniny;
  - type: text
    content: manangona faharatsiam-panahy ny fony;
  - type: text
    content: raha vao tafavoaka izy dia milazalaza ireny.
  '7':
  - type: text
    content: Mitakoritsika ahy izay rehetra mankahala ahy;
  - type: text
    content: misaina hanisy ratsy ahy izy.
  '8':
  - type: text
    content: Tena zava-doza, hoy izy, no hihatra aminy!
  - type: text
    content: Raha mandry izy dia tsy hitsangana intsony!
  '9':
  - type: text
    content: Eny, ny sakaizako
  - type: text
    content: izay nitokisako sady nihinana ny haniko aza
  - type: text
    content: no nanainga ny voditongony hamely ahy.
