document_id: LUK.18,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Fanoharana ny amin’ilay mpitsara sy ilay mpitondratena
  - type: text
    content: 'Ary nilaza fanoharana tamin’izy ireo Jesosy, ny amin’ny tokony hivavahany mandrakariva ka tsy ho reraka, '
  '10':
  - type: text
    content: 'Nisy roa lahy niakatra tao amin’ny tempoly mba hivavaka; '
  - type: text
    content: Fariseo
  - type: text
    content: ' ny iray ary mpamory hetra ny iray. '
  '11':
  - type: text
    content: 'Ilay Fariseo nitsangana ka nivavaka nitokana hoe: Andriamanitra ô, misaotra Anao aho fa tsy mba tahaka ny olona hafa izay mpanao an-keriny, tsy marina, mpijangajanga, na tahaka io mpamory hetra io aza. '
  '12':
  - type: text
    content: 'Mifady hanina indroa isan-kerinandro aho; mandoa ny ampahafolony amin’izay azoko rehetra aho. '
  '13':
  - type: text
    content: 'Fa ilay mpamory hetra kosa dia nijanona teny lavitra eny sady tsy nety niandrandra ny lanitra akory fa niteha-tratra ka niteny hoe: Andriamanitra ô, mamindrà fo amiko mpanota! '
  '14':
  - type: text
    content: 'Lazaiko aminareo: Izany lehilahy izany rehefa nody tany an-tranony dia efa nohamarinina, fa tsy mba toy izany ilay iray; fa izay rehetra manandra-tena no haetry ary izay rehetra manetry tena no hasandratra.'
  - type: heading
    content: Jesosy sy ny zaza
  - type: heading
    content: Mat 19.13-15; Mar 10.13-16
  '15':
  - type: text
    content: 'Nisy nitondra zazakely koa ho eo amin’i Jesosy mba hokasihiny; fa raha vao nahita izany ny mpianatra dia nandrara azy ireo. '
  '16':
  - type: text
    content: 'Nefa nasain’i Jesosy noentina teo Aminy ireo ary hoy Izy hoe: Avelao ny zaza hanatona Ahy ary aza rarana; fa an’ny toa azy ny fanjakan’Andriamanitra. '
  '17':
  - type: text
    content: 'Lazaiko aminareo marina tokoa: Na zovy na zovy no tsy handray ny fanjakan’Andriamanitra tahaka ny zaza dia tsy ho tafiditra ao aminy velively.'
  - type: heading
    content: Jesosy sy ilay mpanankarena
  - type: heading
    content: Mat 19.16-30; Mar 10.17-31
  '18':
  - type: text
    content: 'Nisy manampahefana iray nanontany Azy hoe: Mpampianatra tsara ô, inona no hataoko mba handovako fiainana mandrakizay? '
  '19':
  - type: text
    content: 'Fa hoy Jesosy taminy: Nahoana Aho no lazainao fa tsara? Tsy misy tsara afa-tsy iray ihany, dia Andriamanitra. '
  '2':
  - type: text
    content: 'dia hoy Izy: Nisy mpitsara tao an-tanàna iray, izay tsy natahotra an’Andriamanitra sady tsy niraharaha olona. '
  '20':
  - type: text
    content: 'Fantatrao ny didy hoe: «Aza mijangajanga, aza mamono olona, aza mangalatra, aza mety ho vavolombelona mandainga, manajà ny rainao sy ny reninao» (Eks 20.12-16). '
  '21':
  - type: text
    content: 'Ary hoy kosa izy: Izany rehetra izany dia efa notandremako hatry ny fony aho mbola kely. '
  '22':
  - type: text
    content: 'Rehefa nandre izany Jesosy dia hoy Izy taminy: Mbola diso zavatra iray loha ianao: Amidio ny fanananao rehetra ka zarao ho an’ny mahantra, dia hanana rakitra any an-danitra ianao; ary avia, manaraha Ahy. '
  '23':
  - type: text
    content: Ary rehefa nandre izany Ralehilahy dia nalahelo tokoa; tena nanankarena mantsy izy.
  '24':
  - type: text
    content: 'Raha nahita azy nalahelo fatratra Jesosy dia niteny hoe: Manao ahoana ny hasarotry ny hidiran’ny mpanankarena amin’ny fanjakan’Andriamanitra! '
  '25':
  - type: text
    content: 'Fa ho moramora kokoa ny hidiran’ny rameva amin’ny vodifanjaitra noho ny hidiran’ny mpanankarena amin’ny fanjakan’Andriamanitra! '
  '26':
  - type: text
    content: 'Ary izay nandre dia niteny hoe: Iza indray ary no ho azo vonjena? '
  '27':
  - type: text
    content: 'Fa hoy Jesosy: Izay zavatra tsy hain’ny olona dia hain’Andriamanitra.'
  '28':
  - type: text
    content: 'Dia hoy i Petera: Indro izahay, efa nahafoy ny fanananay ka nanaraka Anao. '
  '29':
  - type: text
    content: 'Ary hoy Jesosy taminy: Lazaiko aminareo marina tokoa: Tsy misy olona izay efa nahafoy trano na vady na rahalahy na ray na reny na zanaka, noho ny fanjakan’Andriamanitra, '
  '3':
  - type: text
    content: 'Ary nisy mpitondratena iray tao amin’izany tanàna izany, izay nankao aminy matetika ka niteny hoe: Omeo rariny aho eo anoloan’ilay manana ady amiko. '
  '30':
  - type: text
    content: ka tsy handray be lavitra noho izany amin’izao andro ankehitriny izao, ary amin’ny fotoana ho avy dia fiainana mandrakizay.
  - type: heading
    content: Manambara indray ny fahafatesany sy ny fitsanganany amin’ny maty Jesosy
  - type: heading
    content: Mat 20.17-19; Mar 10.32-34
  '31':
  - type: text
    content: 'Naka ny roa amby folo lahy Jesosy ka niteny taminy hoe: Indro, miakatra ho any Jerosalema isika, dia ho tanteraka ny zavatra rehetra izay voasoratry ny mpaminany ny amin’ny '
  - type: text
    content: Zanak’Olona
  - type: text
    content: '. '
  '32':
  - type: text
    content: 'Fa hatolotra ho amin’ny '
  - type: text
    content: Jentilisa
  - type: text
    content: ' Izy, dia hataony fihomehezana sy hisetrasetrany sy hororany '
  '33':
  - type: text
    content: 'ary hokapohiny sy hovonoiny, ary amin’ny andro fahatelo dia hitsangana Izy. '
  '34':
  - type: text
    content: Nefa tsy nisy azony akory izany teny izany sady tsy fantany izay nolazainy satria nafenina taminy izany.
  - type: heading
    content: Ny nampahiratan’i Jesosy ilay lehilahy jamba tao Jeriko
  - type: heading
    content: Mat 20.29-34; Mar 10.46-52
  '35':
  - type: text
    content: 'Raha nanakaiky an’i Jeriko Jesosy dia indro jamba iray, nipetraka nangataka teo amoron-dalana. '
  '36':
  - type: text
    content: 'Raha nandre ny vahoaka mandalo izy dia nanontany hoe: Inona izany? '
  '37':
  - type: text
    content: 'Dia hoy ny olona taminy: Jesosy avy any Nazareta no mandalo. '
  '38':
  - type: text
    content: 'Dia niantso mafy Ralehilahy hoe: Ry Jesosy, Zanak’i Davida ô, mamindrà fo amiko! '
  '39':
  - type: text
    content: 'Ireo izay nandeha teny aloha dia niteny mafy azy mba hangina, fa vao mainka niantsoantso izy hoe: Ry Zanak’i Davida ô, mamindrà fo amiko. '
  '4':
  - type: text
    content: 'Tsy nanaiky ilay mpitsara aloha; fa taorianan’izany dia niteny anakampo izy hoe: Na dia tsy matahotra an’Andriamanitra aza aho sady tsy miraharaha olona '
  '40':
  - type: text
    content: 'Dia nijanona Jesosy ka nasainy noentina teo aminy Ralehilahy; ary rehefa nanatona Azy izy dia nanontany azy Jesosy hoe: '
  '41':
  - type: text
    content: 'Inona moa no tianao hataoko aminao? Ary hoy izy: Tompoko, ny mba hahitako indray. '
  '42':
  - type: text
    content: 'Dia hoy Jesosy taminy: Aoka ianao hahita indray! Ny finoanao no efa nahavonjy anao. '
  '43':
  - type: text
    content: Ary niaraka tamin’izay dia nahita izy ka nanaraka an’i Jesosy sady nankalaza an’Andriamanitra; ary ny vahoaka rehetra, raha nahita izany, dia nidera an’Andriamanitra.
  '5':
  - type: text
    content: 'mba homeko rariny ihany io mpitondratena io fa manahirana ahy, mba tsy ho avy hanorisory ahy tsy misy farany izy. '
  '6':
  - type: text
    content: 'Ary hoy ny Tompo: Henoy izay lazain’ilay mpitsara tsy marina. '
  '7':
  - type: text
    content: 'Fa Andriamanitra va tsy hanome rariny ireo olom-boafidiny izay mitaraina Aminy andro aman’alina, ary moa hampiandry azy ireo ela va Izy? '
  '8':
  - type: text
    content: 'Lazaiko aminareo fa homeny rariny haingana izy. Kanefa, raha avy ny '
  - type: text
    content: Zanak’Olona
  - type: text
    content: ', moa hahita finoana etỳ ambonin’ny tany va Izy?'
  - type: heading
    content: Fanoharana ny amin’ilay Fariseo sy ilay mpamory hetra
  '9':
  - type: text
    content: 'Nilaza ity fanoharana ity tamin’ny sasany izay natoky tena ho marina ka namingavinga ny hafa Jesosy: '
