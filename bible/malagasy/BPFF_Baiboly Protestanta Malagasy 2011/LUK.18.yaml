document_id: LUK.18
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fanoharana ny amin’ilay mpitsara sy ilay mpitondratena
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary nilaza fanoharana tamin’izy ireo Jesosy, ny amin’ny tokony hivavahany mandrakariva ka tsy ho reraka, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'dia hoy Izy: Nisy mpitsara tao an-tanàna iray, izay tsy natahotra an’Andriamanitra sady tsy niraharaha olona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary nisy mpitondratena iray tao amin’izany tanàna izany, izay nankao aminy matetika ka niteny hoe: Omeo rariny aho eo anoloan’ilay manana ady amiko. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Tsy nanaiky ilay mpitsara aloha; fa taorianan’izany dia niteny anakampo izy hoe: Na dia tsy matahotra an’Andriamanitra aza aho sady tsy miraharaha olona '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'mba homeko rariny ihany io mpitondratena io fa manahirana ahy, mba tsy ho avy hanorisory ahy tsy misy farany izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary hoy ny Tompo: Henoy izay lazain’ilay mpitsara tsy marina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Fa Andriamanitra va tsy hanome rariny ireo olom-boafidiny izay mitaraina Aminy andro aman’alina, ary moa hampiandry azy ireo ela va Izy? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Lazaiko aminareo fa homeny rariny haingana izy. Kanefa, raha avy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Zanak’Olona
  - type: text
    text: ', moa hahita finoana etỳ ambonin’ny tany va Izy?'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fanoharana ny amin’ilay Fariseo sy ilay mpamory hetra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Nilaza ity fanoharana ity tamin’ny sasany izay natoky tena ho marina ka namingavinga ny hafa Jesosy: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Nisy roa lahy niakatra tao amin’ny tempoly mba hivavaka; '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Fariseo
  - type: text
    text: ' ny iray ary mpamory hetra ny iray. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ilay Fariseo nitsangana ka nivavaka nitokana hoe: Andriamanitra ô, misaotra Anao aho fa tsy mba tahaka ny olona hafa izay mpanao an-keriny, tsy marina, mpijangajanga, na tahaka io mpamory hetra io aza. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Mifady hanina indroa isan-kerinandro aho; mandoa ny ampahafolony amin’izay azoko rehetra aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Fa ilay mpamory hetra kosa dia nijanona teny lavitra eny sady tsy nety niandrandra ny lanitra akory fa niteha-tratra ka niteny hoe: Andriamanitra ô, mamindrà fo amiko mpanota! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Lazaiko aminareo: Izany lehilahy izany rehefa nody tany an-tranony dia efa nohamarinina, fa tsy mba toy izany ilay iray; fa izay rehetra manandra-tena no haetry ary izay rehetra manetry tena no hasandratra.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesosy sy ny zaza
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat 19.13-15; Mar 10.13-16
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Nisy nitondra zazakely koa ho eo amin’i Jesosy mba hokasihiny; fa raha vao nahita izany ny mpianatra dia nandrara azy ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Nefa nasain’i Jesosy noentina teo Aminy ireo ary hoy Izy hoe: Avelao ny zaza hanatona Ahy ary aza rarana; fa an’ny toa azy ny fanjakan’Andriamanitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Lazaiko aminareo marina tokoa: Na zovy na zovy no tsy handray ny fanjakan’Andriamanitra tahaka ny zaza dia tsy ho tafiditra ao aminy velively.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesosy sy ilay mpanankarena
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat 19.16-30; Mar 10.17-31
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Nisy manampahefana iray nanontany Azy hoe: Mpampianatra tsara ô, inona no hataoko mba handovako fiainana mandrakizay? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Fa hoy Jesosy taminy: Nahoana Aho no lazainao fa tsara? Tsy misy tsara afa-tsy iray ihany, dia Andriamanitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Fantatrao ny didy hoe: «Aza mijangajanga, aza mamono olona, aza mangalatra, aza mety ho vavolombelona mandainga, manajà ny rainao sy ny reninao» (Eks 20.12-16). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary hoy kosa izy: Izany rehetra izany dia efa notandremako hatry ny fony aho mbola kely. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Rehefa nandre izany Jesosy dia hoy Izy taminy: Mbola diso zavatra iray loha ianao: Amidio ny fanananao rehetra ka zarao ho an’ny mahantra, dia hanana rakitra any an-danitra ianao; ary avia, manaraha Ahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ary rehefa nandre izany Ralehilahy dia nalahelo tokoa; tena nanankarena mantsy izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Raha nahita azy nalahelo fatratra Jesosy dia niteny hoe: Manao ahoana ny hasarotry ny hidiran’ny mpanankarena amin’ny fanjakan’Andriamanitra! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Fa ho moramora kokoa ny hidiran’ny rameva amin’ny vodifanjaitra noho ny hidiran’ny mpanankarena amin’ny fanjakan’Andriamanitra! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ary izay nandre dia niteny hoe: Iza indray ary no ho azo vonjena? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Fa hoy Jesosy: Izay zavatra tsy hain’ny olona dia hain’Andriamanitra.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Dia hoy i Petera: Indro izahay, efa nahafoy ny fanananay ka nanaraka Anao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ary hoy Jesosy taminy: Lazaiko aminareo marina tokoa: Tsy misy olona izay efa nahafoy trano na vady na rahalahy na ray na reny na zanaka, noho ny fanjakan’Andriamanitra, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ka tsy handray be lavitra noho izany amin’izao andro ankehitriny izao, ary amin’ny fotoana ho avy dia fiainana mandrakizay.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Manambara indray ny fahafatesany sy ny fitsanganany amin’ny maty Jesosy
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat 20.17-19; Mar 10.32-34
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Naka ny roa amby folo lahy Jesosy ka niteny taminy hoe: Indro, miakatra ho any Jerosalema isika, dia ho tanteraka ny zavatra rehetra izay voasoratry ny mpaminany ny amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Zanak’Olona
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Fa hatolotra ho amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jentilisa
  - type: text
    text: ' Izy, dia hataony fihomehezana sy hisetrasetrany sy hororany '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'ary hokapohiny sy hovonoiny, ary amin’ny andro fahatelo dia hitsangana Izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Nefa tsy nisy azony akory izany teny izany sady tsy fantany izay nolazainy satria nafenina taminy izany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nampahiratan’i Jesosy ilay lehilahy jamba tao Jeriko
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat 20.29-34; Mar 10.46-52
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Raha nanakaiky an’i Jeriko Jesosy dia indro jamba iray, nipetraka nangataka teo amoron-dalana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Raha nandre ny vahoaka mandalo izy dia nanontany hoe: Inona izany? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Dia hoy ny olona taminy: Jesosy avy any Nazareta no mandalo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Dia niantso mafy Ralehilahy hoe: Ry Jesosy, Zanak’i Davida ô, mamindrà fo amiko! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Ireo izay nandeha teny aloha dia niteny mafy azy mba hangina, fa vao mainka niantsoantso izy hoe: Ry Zanak’i Davida ô, mamindrà fo amiko. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Dia nijanona Jesosy ka nasainy noentina teo aminy Ralehilahy; ary rehefa nanatona Azy izy dia nanontany azy Jesosy hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Inona moa no tianao hataoko aminao? Ary hoy izy: Tompoko, ny mba hahitako indray. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Dia hoy Jesosy taminy: Aoka ianao hahita indray! Ny finoanao no efa nahavonjy anao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: Ary niaraka tamin’izay dia nahita izy ka nanaraka an’i Jesosy sady nankalaza an’Andriamanitra; ary ny vahoaka rehetra, raha nahita izany, dia nidera an’Andriamanitra.
