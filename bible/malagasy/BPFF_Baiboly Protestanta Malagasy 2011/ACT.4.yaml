document_id: ACT.4,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: I Petera sy i Jaona teo anoloan’ny Sinedriona
  - type: text
    content: 'Raha mbola niteny tamin’ny vahoaka izy roa lahy dia indreo, tonga teo aminy ny mpisorona sy ny lehiben’ny mpiambina ny '
  - type: text
    content: tempoly
  - type: text
    content: ' ary ny '
  - type: text
    content: Sadoseo
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'dia aoka ho fantatrareo rehetra sy ny vahoaka Israely rehetra fa ny anaran’i Jesosy '
  - type: text
    content: Kristy
  - type: text
    content: ' avy any Nazareta, izay nohomboinareo tamin’ny hazofijaliana, kanefa natsangan’Andriamanitra tamin’ny maty kosa, tamin’ny alalany no nitsanganan’io lehilahy sitrana io eto imasonareo. '
  '11':
  - type: text
    content: '«Ity no vato izay nolavinareo mpanao trano nefa tonga fehizoro» (Sal 118.22). '
  '12':
  - type: text
    content: Tsy misy famonjena avy amin’ny hafa na iza na iza; satria tsy misy anarana hafa ambanin’ny lanitra nomena ny olona izay hahazoantsika famonjena.
  '13':
  - type: text
    content: 'Nony nahita ny fahasahian’i Petera sy i Jaona izy ireo sady nahalala fa tsy mba mpahay lalàna na nampianarina izy roa lahy, dia gaga; ary fantany tsara fa efa niaraka tamin’i Jesosy izy roa lahy. '
  '14':
  - type: text
    content: 'Rehefa nijery ilay lehilahy izay efa sitrana nitsangana niaraka taminy izy dia tsy hitany izay havaliny. '
  '15':
  - type: text
    content: 'Dia nasainy niala teo amin’ny '
  - type: text
    content: Sinedriona
  - type: text
    content: ' izy roa lahy, ary niara-nisaina ry zareo '
  '16':
  - type: text
    content: 'hoe: Hataontsika ahoana ireo lehilahy ireo? Fa efa nanao famantarana malaza tokoa izy ireo ary fantatry ny mponina rehetra eto Jerosalema izany ka tsy azontsika lavina. '
  '17':
  - type: text
    content: Kanefa mba tsy hielezan’izao amin’ny vahoaka intsony dia aoka horahonantsika izy ireo mba tsy hiteny amin’izany anarana izany intsony na amin’iza na amin’iza.
  '18':
  - type: text
    content: 'Dia niantso azy ireo izy ka nandrara azy tsy hiteny na hampianatra amin’ny anaran’i Jesosy intsony. '
  '19':
  - type: text
    content: 'Fa i Petera sy i Jaona kosa dia namaly azy hoe: Tsaraonareo na marina eo imason’Andriamanitra na tsia, ny hanaiky anareo mihoatra noho Andriamanitra. '
  '2':
  - type: text
    content: 'Sosotra mantsy izy ireo noho ny nampianaran’ny Apostoly ny vahoaka sy ny nitoriany tamin’ny alalan’i Jesosy ny fitsanganana amin’ny maty. '
  '20':
  - type: text
    content: 'Fa izahay dia tsy maintsy milaza izay zavatra efa hitanay sy renay. '
  '21':
  - type: text
    content: 'Rehefa norahonany indray izy ireo dia nalefany satria tsy hitany izay hampijaliany azy noho ny tahony ny vahoaka; fa izy rehetra dia nankalaza an’Andriamanitra noho ny amin’ny zava-nitranga. '
  '22':
  - type: text
    content: Efa mihoatra ny efapolo taona mantsy Ralehilahy izay nanaovana izany famantarana nanasitrana azy izany.
  - type: heading
    content: Vavaky ny fiangonana voaenjika
  '23':
  - type: text
    content: 'Rehefa nalefa izy roa lahy dia tonga teo amin’ny namany ka nanambara izay rehetra nolazain’ny lehiben’ny mpisorona sy ny loholona taminy. '
  '24':
  - type: text
    content: 'Fa rehefa nandre izany izy ireo dia niara-nanandratra ny feony ho amin’Andriamanitra hoe: Tompo ô! Ianao no nanao ny lanitra sy ny tany ary ny ranomasina mbamin’izay rehetra ao anatiny, '
  '25':
  - type: text
    content: 'ary ny Fanahy Masina no nampitenenanao an’i Davida razanay sady mpanomponao hoe:'
  - type: text
    content: '«Nahoana no mitabataba ny '
  - type: text
    content: Jentilisa
  - type: text
    content: ary misaina anoano foana ny firenena?
  '26':
  - type: text
    content: Ireo mpanjakan’ny tany dia nitsangana,
  - type: text
    content: ary ny mpitondra dia niangona
  - type: text
    content: hanohitra NY TOMPO sy ny Mesiany» (Sal 2.1-2).
  '27':
  - type: text
    content: 'Fa efa niangona marina tokoa teto amin’ity tanàna ity i Heroda sy i Pontio Pilato mbamin’ny Jentilisa sy ny firenena Israely mba hanohitra ny Mpanomponao Masina, dia Jesosy izay nohosoranao, '
  '28':
  - type: text
    content: 'mba hanao izay notendren’ny tananao aman-tsainao mialoha hatao. '
  '29':
  - type: text
    content: 'Koa ankehitriny, Tompo ô, jereo ny fandrahonany, ary omeo anay mpanomponao ny mba hitory ny teninao amin’ny fahasahiana rehetra, '
  '3':
  - type: text
    content: 'Dia nisambotra azy ireo izy ka nampiditra azy tao an-tranomaizina mandra-paharain’ny andro, satria efa hariva ny andro tamin’izay. '
  '30':
  - type: text
    content: 'miaraka amin’ny anatsoranao ny tananao hanasitrana sy ny hanaovana famantarana sy fahagagana amin’ny anaran’i Jesosy, Mpanomponao Masina. '
  '31':
  - type: text
    content: Rehefa nivavaka izy ireo dia nihovotrovotra ny trano izay niangonany; dia feno ny Fanahy Masina izy rehetra ary nitory ny tenin’Andriamanitra tamin’ny fahasahiana.
  - type: heading
    content: Nifampizara ny fananany ny Mpino
  '32':
  - type: text
    content: 'Niray fo sy fanahy ny olona rehetra izay nino ka tsy nisy na dia iray aza nanonona ny fananany ho azy manokana, fa niombonany avokoa ny zavatra rehetra nananany. '
  '33':
  - type: text
    content: 'Tamin’ny hery be no nanambaràn’ny Apostoly ny nitsanganan’i Jesosy Tompo; ary fahasoavana be no tao amin’izy rehetra. '
  '34':
  - type: text
    content: 'Fa tsy nisy olona nahantra teo aminy; ary izay nanana tany na trano, raha nivarotra izany dia nitondra ny vola vidin’ny zavatra lafo '
  '35':
  - type: text
    content: ka nametraka izany teo anoloan’ny tongotry ny Apostoly dia nozaraina tamin’izy rehetra araka izay nilainy avy izany.
  '36':
  - type: text
    content: 'Ary i Josefa izay nantsoin’ny apostoly koa hoe Barnabasy, izany hoe, raha adika, Zanaky ny fananarana, '
  - type: text
    content: levita
  - type: text
    content: ' avy any Sipra no firazanany, '
  '37':
  - type: text
    content: dia nivarotra ny sahany ka noentiny ny vola vidiny ary napetrany teo anoloan’ny tongotry ny Apostoly.
  '4':
  - type: text
    content: Kanefa maro tamin’izay nandre ny teny no nino ka efa tokony ho dimy arivo ny isan’ny lehilahy.
  '5':
  - type: text
    content: 'Nony ampitso dia niangona tany Jerosalema ny mpitondra sy ny loholona ary ny '
  - type: text
    content: mpanoradalàna
  - type: text
    content: ' '
  '6':
  - type: text
    content: 'mbamin’i Anasy '
  - type: text
    content: mpisoronabe
  - type: text
    content: ', i Kaiafa, i Jaona, i Aleksandra ary izay rehetra mety ho havan’ny Mpisoronabe. '
  '7':
  - type: text
    content: 'Rehefa nataony teo ampovoany izy roa lahy dia nanontaniany hoe: Fahefana manao ahoana, na anarana manao ahoana, no nanaovanareo izao zavatra izao?'
  '8':
  - type: text
    content: 'Dia feno ny Fanahy Masina i Petera ka nilaza taminy hoe: Ry mpanapaka ny vahoaka sy loholona, '
  '9':
  - type: text
    content: 'raha nadinina izahay androany ny amin’ny asa tsara natao tamin’ny nahasitranana ilay lehilahy malemy, '
