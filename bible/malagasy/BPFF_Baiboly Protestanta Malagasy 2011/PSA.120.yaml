document_id: PSA.120,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Vavaka ataon’ny olona voampanga amin’ny zavatra tsy marina
  - type: text
    content: Hira fanao amin’ny fiakarana.
  - type: text
    content: NY TOMPO no nitarainako tamin’ny fahoriako
  - type: text
    content: dia namaly ahy Izy.
  '2':
  - type: text
    content: TOMPO ô, vonjeo ny fanahiko amin’ny molotra mandainga;
  - type: text
    content: eny, amin’ny lela mamitaka.
  '3':
  - type: text
    content: Inona no homeny anao, ary inona koa no hataony aminao,
  - type: text
    content: ry lela mamitaka?
  '4':
  - type: text
    content: Zana-tsipìkan’ny mahery sady voaranitra,
  - type: text
    content: miaraka amin’ny vain’afon’anjavidy.
  '5':
  - type: text
    content: Lozako fa mivahiny eto amin’ny Maseka aho
  - type: text
    content: ary mitoetra ato an-dain’ny Kedara!
  '6':
  - type: text
    content: Ela loatra izay no nitoeran’ny fanahiko
  - type: text
    content: teo amin’izay tsy tia fihavanana.
  '7':
  - type: text
    content: Raha izaho dia fihavanana no lazaiko; kanjo nony niteny aho
  - type: text
    content: dia mila ady kosa ireny.
