verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Vavaka ataon’ny olona voampanga amin’ny zavatra tsy marina
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: Hira fanao amin’ny fiakarana.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: NY TOMPO no nitarainako tamin’ny fahoriako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia namaly ahy Izy.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: TOMPO ô, vonjeo ny fanahiko amin’ny molotra mandainga;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, amin’ny lela mamitaka.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Inona no homeny anao, ary inona koa no hataony aminao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ry lela mamitaka?
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Zana-tsipìkan’ny mahery sady voaranitra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: miaraka amin’ny vain’afon’anjavidy.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lozako fa mivahiny eto amin’ny Maseka aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mitoetra ato an-dain’ny Kedara!
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ela loatra izay no nitoeran’ny fanahiko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: teo amin’izay tsy tia fihavanana.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha izaho dia fihavanana no lazaiko; kanjo nony niteny aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia mila ady kosa ireny.
