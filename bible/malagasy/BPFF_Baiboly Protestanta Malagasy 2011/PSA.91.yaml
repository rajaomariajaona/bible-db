document_id: PSA.91,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ao ambanin’ny fiarovan’ny Avo Indrindra
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Ny mitoetra ao amin’ny fierena izay an’ny Avo Indrindra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia monina eo ambanin’ny aloky ny Tsitoha.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: dia tsy hisy loza hanjo anao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na aretin-dratsy hanakaiky ny tranolainao.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Fa Izy handidy ny anjeliny ny aminao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hiaro anao eny amin’izay rehetra alehanao;
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Eny an-tanany no hitondran’ireo anao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fandrao ho tafintohina amin’ny vato ny tongotrao.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Ny liona masiaka sy ny vipera dia hodiavinao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny liona tanora sy ny menarana dia hohitsakitsahinao.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Satria Izaho no niraiketan’ny fitiavany dia hovonjeko izy ka ho afa-mandositra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hanandratra azy ho any amin’ny avo Aho satria mahalala ny anarako izy.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Hiantso Ahy izy dia hamaly azy Aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho eo aminy Aho raha ory izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hanafaka sy hanome voninahitra azy Aho.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Hovokisako fahelavelona izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hasehoko azy ny famonjeko.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Izaho dia hilaza an’NY TOMPO hoe: Fialofako sy manda fiarovana ho ahy Izy,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Andriamanitro izay itokiako!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Fa Izy no hanafaka anao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: amin’ny fandriky ny mpihaza sy ny areti-mandoza.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Ny volon’elany no hanaronany anao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ao ambanin’ny elany no hialofanao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho ampinga kely sy ampinga lehibe ny fahamarinany.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Tsy hatahotra ny horohoro nony alina ianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na ny zana-tsipìka manidina nony andro,
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: na ny areti-mandringana mandeha amin’ny maizina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na ny fandringanana mandripaka amin’ny mitataovovonana.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Na dia hisy arivo lahy aza no lavo eo anilanao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy iray alina eo ankavananao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia tsy hihatra aminao izany.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Hijery amin’ny masonao fotsiny ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka ho hitanao ny hamaliana ny ratsy fanahy.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Satria hoy ianao: TOMPO ô, Ianao no aroko!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady nataonao ho fonenanao ny Avo Indrindra,
