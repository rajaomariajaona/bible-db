document_id: PSA.91,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ao ambanin’ny fiarovan’ny Avo Indrindra
  - type: text
    content: Ny mitoetra ao amin’ny fierena izay an’ny Avo Indrindra
  - type: text
    content: dia monina eo ambanin’ny aloky ny Tsitoha.
  '10':
  - type: text
    content: dia tsy hisy loza hanjo anao,
  - type: text
    content: na aretin-dratsy hanakaiky ny tranolainao.
  '11':
  - type: text
    content: Fa Izy handidy ny anjeliny ny aminao
  - type: text
    content: mba hiaro anao eny amin’izay rehetra alehanao;
  '12':
  - type: text
    content: Eny an-tanany no hitondran’ireo anao,
  - type: text
    content: fandrao ho tafintohina amin’ny vato ny tongotrao.
  '13':
  - type: text
    content: Ny liona masiaka sy ny vipera dia hodiavinao,
  - type: text
    content: ny liona tanora sy ny menarana dia hohitsakitsahinao.
  '14':
  - type: text
    content: Satria Izaho no niraiketan’ny fitiavany dia hovonjeko izy ka ho afa-mandositra;
  - type: text
    content: hanandratra azy ho any amin’ny avo Aho satria mahalala ny anarako izy.
  '15':
  - type: text
    content: Hiantso Ahy izy dia hamaly azy Aho;
  - type: text
    content: ho eo aminy Aho raha ory izy;
  - type: text
    content: hanafaka sy hanome voninahitra azy Aho.
  '16':
  - type: text
    content: Hovokisako fahelavelona izy
  - type: text
    content: ary hasehoko azy ny famonjeko.
  '2':
  - type: text
    content: 'Izaho dia hilaza an’NY TOMPO hoe: Fialofako sy manda fiarovana ho ahy Izy,'
  - type: text
    content: Andriamanitro izay itokiako!
  '3':
  - type: text
    content: Fa Izy no hanafaka anao
  - type: text
    content: amin’ny fandriky ny mpihaza sy ny areti-mandoza.
  '4':
  - type: text
    content: Ny volon’elany no hanaronany anao
  - type: text
    content: ary ao ambanin’ny elany no hialofanao;
  - type: text
    content: Ho ampinga kely sy ampinga lehibe ny fahamarinany.
  '5':
  - type: text
    content: Tsy hatahotra ny horohoro nony alina ianao,
  - type: text
    content: na ny zana-tsipìka manidina nony andro,
  '6':
  - type: text
    content: na ny areti-mandringana mandeha amin’ny maizina,
  - type: text
    content: na ny fandringanana mandripaka amin’ny mitataovovonana.
  '7':
  - type: text
    content: Na dia hisy arivo lahy aza no lavo eo anilanao
  - type: text
    content: sy iray alina eo ankavananao
  - type: text
    content: dia tsy hihatra aminao izany.
  '8':
  - type: text
    content: Hijery amin’ny masonao fotsiny ianao
  - type: text
    content: ka ho hitanao ny hamaliana ny ratsy fanahy.
  '9':
  - type: text
    content: 'Satria hoy ianao: TOMPO ô, Ianao no aroko!'
  - type: text
    content: Sady nataonao ho fonenanao ny Avo Indrindra,
