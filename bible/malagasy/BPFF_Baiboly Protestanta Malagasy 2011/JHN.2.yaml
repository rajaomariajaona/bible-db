document_id: JHN.2
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ilay fampakaram-bady tao Kana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Tamin’ny andro fahatelo dia nisy fampakaram-bady tao Kana any Galilia; ary tao ny renin’i Jesosy. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary Jesosy sy ny mpianany koa dia nasaina ho ao amin’izany fampakaram-bady izany. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary rehefa lany ny divay dia hoy ny renin’i Jesosy Taminy: Tsy manana divay izy. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Hoy Jesosy taminy: Ravehivavy, moa mifaninona akory Izaho sy ianao? Tsy mbola tonga ny fotoanandroko. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Fa hoy ny reniny tamin’ny mpanompo: Ataovy izay asainy ataonareo. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ary nisy siny vato enina mahalany rano indroa na intelon’ny famarana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.6 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Metreta: 40 l.'
    marker-yv: yv-n
  - type: text
    text: ' avy, nipetraka teo ho fanadiovana, araka ny fanaon’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jiosy
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dia hoy Jesosy taminy: Fenoy rano ny siny. Dia nofenoiny hatramin’ny molony. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary hoy Jesosy taminy: Tovozy amin’izao ka ento ho eo amin’ny mpandahatra ny fanasana. Dia noentiny izany. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Nony nanandrana ny rano tonga divay ny mpandahatra ny fanasana, nefa tsy nahalala izay niaviany, fa ny mpanompo izay nanovo ny rano ihany no nahalala izany, dia niantso ny mpampakatra izy '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'ka niteny taminy hoe: Araka ny fanaon’ny olona dia ny divay tsara aloha no arosony; fa rehefa mitady ho mamo ny olona dia izay vao ny ratsiratsy kokoa; fa ianao kosa dia nitahiry ny divay tsara ambaraka ankehitriny.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Izany no nataon’i Jesosy tao Kana any Galilia ho voaloham-pamantarana. Nasehony ny voninahiny, ary nino Azy ny mpianany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Rehefa afaka izany dia nidina nankany Kapernaomy Jesosy sy ny reniny ary ny rahalahiny mbamin’ny mpianany; nefa tsy dia nitoetra ela tany izy ireo.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nandroahan’i Jesosy ireo mpivarotra tao amin’ny tempoly
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Ampit. Mat 21.12-13; Mar 11.15-17; Lio 19.45-46
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Nony akaiky ny Paska an’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jiosy
  - type: text
    text: ' dia niakatra tany Jerosalema Jesosy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary hitany nipetraka tao amin’ny tempoly ireo mpivarotra omby sy ondry ary voromailala, tao koa ireo mpanakalo vola; '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'dia nanao kotopia kofehy Izy ka nandroaka azy rehetra hiala tao amin’ny tempoly, na ny ondry na ny omby, ary naparitany ny volan’ny mpanakalo vola sady nazerany ny latabatra; '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'dia hoy Izy tamin’ny mpivarotra ny voromailala: Ento mivoaka any ireto zavatra ireto; aza ataonareo trano fivarotana ny tranon’ny Raiko. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary tsaroan’ny mpianany fa voasoratra hoe: «Ny firehetako ny amin’ny tranonao no haharìtra aina ahy» (Sal 69.9).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Fa hoy ny Jiosy Taminy: Inona no famantarana asehonao aminay no manao izao zavatra izao Ianao? '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Jesosy namaly azy ireo hoe: Ravao ity tempoly ity, fa ao anatin’ny hateloana dia hatsangako indray. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Nefa hoy ny Jiosy: Nandritra ny enina amby efapolo taona no efa nananganana ity tempoly ity, koa Ianao va hahatsangana azy amin’ny hateloana? '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ny tenany anefa no tempoly nolazainy. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Koa rehefa nitsangana tamin’ny maty Izy dia tsaroan’ny mpianany fa efa nilaza izany Izy; ary nino ny Soratra Masina sy ny teny izay nolazain’i Jesosy izy ireo.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesosy mahalala ny amin’ny olona
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Nony tao Jerosalema Jesosy tamin’ny Paska, izany hoe tamin’ny andro firavoravoana, dia maro no nino ny anarany raha nahita ny famantarana izay nataony. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Nefa Jesosy tsy natoky azy satria fantany avokoa ny olona rehetra; '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ary tsy nitady olona hanambara olona Izy; fa ny tenany no nahalala izay tao am-pon’ny olona.
