document_id: JHN.2,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ilay fampakaram-bady tao Kana
  - type: text
    content: 'Tamin’ny andro fahatelo dia nisy fampakaram-bady tao Kana any Galilia; ary tao ny renin’i Jesosy. '
  '10':
  - type: text
    content: 'ka niteny taminy hoe: Araka ny fanaon’ny olona dia ny divay tsara aloha no arosony; fa rehefa mitady ho mamo ny olona dia izay vao ny ratsiratsy kokoa; fa ianao kosa dia nitahiry ny divay tsara ambaraka ankehitriny.'
  '11':
  - type: text
    content: Izany no nataon’i Jesosy tao Kana any Galilia ho voaloham-pamantarana. Nasehony ny voninahiny, ary nino Azy ny mpianany.
  '12':
  - type: text
    content: Rehefa afaka izany dia nidina nankany Kapernaomy Jesosy sy ny reniny ary ny rahalahiny mbamin’ny mpianany; nefa tsy dia nitoetra ela tany izy ireo.
  - type: heading
    content: Ny nandroahan’i Jesosy ireo mpivarotra tao amin’ny tempoly
  - type: heading
    content: Ampit. Mat 21.12-13; Mar 11.15-17; Lio 19.45-46
  '13':
  - type: text
    content: 'Nony akaiky ny Paska an’ny '
  - type: text
    content: Jiosy
  - type: text
    content: ' dia niakatra tany Jerosalema Jesosy.'
  '14':
  - type: text
    content: 'Ary hitany nipetraka tao amin’ny tempoly ireo mpivarotra omby sy ondry ary voromailala, tao koa ireo mpanakalo vola; '
  '15':
  - type: text
    content: 'dia nanao kotopia kofehy Izy ka nandroaka azy rehetra hiala tao amin’ny tempoly, na ny ondry na ny omby, ary naparitany ny volan’ny mpanakalo vola sady nazerany ny latabatra; '
  '16':
  - type: text
    content: 'dia hoy Izy tamin’ny mpivarotra ny voromailala: Ento mivoaka any ireto zavatra ireto; aza ataonareo trano fivarotana ny tranon’ny Raiko. '
  '17':
  - type: text
    content: 'Ary tsaroan’ny mpianany fa voasoratra hoe: «Ny firehetako ny amin’ny tranonao no haharìtra aina ahy» (Sal 69.9).'
  '18':
  - type: text
    content: 'Fa hoy ny Jiosy Taminy: Inona no famantarana asehonao aminay no manao izao zavatra izao Ianao? '
  '19':
  - type: text
    content: 'Jesosy namaly azy ireo hoe: Ravao ity tempoly ity, fa ao anatin’ny hateloana dia hatsangako indray. '
  '2':
  - type: text
    content: 'Ary Jesosy sy ny mpianany koa dia nasaina ho ao amin’izany fampakaram-bady izany. '
  '20':
  - type: text
    content: 'Nefa hoy ny Jiosy: Nandritra ny enina amby efapolo taona no efa nananganana ity tempoly ity, koa Ianao va hahatsangana azy amin’ny hateloana? '
  '21':
  - type: text
    content: 'Ny tenany anefa no tempoly nolazainy. '
  '22':
  - type: text
    content: Koa rehefa nitsangana tamin’ny maty Izy dia tsaroan’ny mpianany fa efa nilaza izany Izy; ary nino ny Soratra Masina sy ny teny izay nolazain’i Jesosy izy ireo.
  - type: heading
    content: Jesosy mahalala ny amin’ny olona
  '23':
  - type: text
    content: 'Nony tao Jerosalema Jesosy tamin’ny Paska, izany hoe tamin’ny andro firavoravoana, dia maro no nino ny anarany raha nahita ny famantarana izay nataony. '
  '24':
  - type: text
    content: 'Nefa Jesosy tsy natoky azy satria fantany avokoa ny olona rehetra; '
  '25':
  - type: text
    content: ary tsy nitady olona hanambara olona Izy; fa ny tenany no nahalala izay tao am-pon’ny olona.
  '3':
  - type: text
    content: 'Ary rehefa lany ny divay dia hoy ny renin’i Jesosy Taminy: Tsy manana divay izy. '
  '4':
  - type: text
    content: 'Hoy Jesosy taminy: Ravehivavy, moa mifaninona akory Izaho sy ianao? Tsy mbola tonga ny fotoanandroko. '
  '5':
  - type: text
    content: 'Fa hoy ny reniny tamin’ny mpanompo: Ataovy izay asainy ataonareo. '
  '6':
  - type: text
    content: Ary nisy siny vato enina mahalany rano indroa na intelon’ny famarana
  - type: note
    content: 'Gr. Metreta: 40 l.'
  - type: text
    content: ' avy, nipetraka teo ho fanadiovana, araka ny fanaon’ny '
  - type: text
    content: Jiosy
  - type: text
    content: '. '
  '7':
  - type: text
    content: 'Dia hoy Jesosy taminy: Fenoy rano ny siny. Dia nofenoiny hatramin’ny molony. '
  '8':
  - type: text
    content: 'Ary hoy Jesosy taminy: Tovozy amin’izao ka ento ho eo amin’ny mpandahatra ny fanasana. Dia noentiny izany. '
  '9':
  - type: text
    content: 'Nony nanandrana ny rano tonga divay ny mpandahatra ny fanasana, nefa tsy nahalala izay niaviany, fa ny mpanompo izay nanovo ny rano ihany no nahalala izany, dia niantso ny mpampakatra izy '
