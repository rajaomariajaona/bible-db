document_id: NUM.22,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Ny tantaran’i Balama: Ny fiangavian’i Balaka mpanjaka'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Niainga indray ny Zanak’Israely ka nitoby tany amin’ireo tany lemaka ngazana tany Moaba, tany andafin’i Jordana, tandrifin’i Jeriko. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy i Balama tamin’Andriamanitra: I Balaka, zanak’i Zipora, mpanjakan’i Moaba, no nandefa iraka tatỳ amiko ka niteny hoe: '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Indro ny firenena izay nivoaka avy tany Ejipta mandrakotra ny tany rehetra; koa mankanesa atỳ ankehitriny ka ozòny ho ahy izy; angamba haharesy azy aho ka haharoaka azy. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Andriamanitra tamin’i Balama: Aza mandeha miaraka aminy na manozona izany firenena izany fa voatahy izy. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nifoha maraina i Balama ka niteny tamin’ireo andriandahin’i Balaka hoe: Andeha mody any amin’ny taninareo fa tsy avelan’NY TOMPO handeha hiaraka aminareo aho. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia niainga ireo andriandahin’i Moaba ka tonga tany amin’i Balaka ary nilaza hoe: Tsy nety nandeha niaraka taminay i Balama.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary mbola naniraka andriandahy maro sady malaza noho ny teo i Balaka. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia tonga tao amin’i Balama ireny ka niteny taminy hoe: Izao no lazain’i Balaka, zanak’i Zipora: Aoka mba tsy ho azon-tsampona ny hankanesanao atỳ amiko; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fa hanome anao voninahitra lehibe indrindra aho ary izay rehetra holazainao amiko dia hataoko avokoa; koa miangavy anao, mankanesa atỳ ka ozòny io firenena io! '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Namaly an’ireo mpanompon’i Balaka anefa i Balama hoe: Na dia homen’i Balaka volafotsy sy volamena eran’ny tranony aza aho dia tsy mahazo manoatra ny didin’NY TOMPO Andriamanitro na handatsaka na hampihoatra. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nefa, na dia izany aza, mitoera atỳ ihany koa ianareo anio alina mba ho fantatro izay mbola holazain’NY TOMPO amiko. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary i Balaka, zanak’i Zipora, dia nahita izay rehetra nataon’ny Israely tamin’ny Amorita. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nony alina dia nankao amin’i Balama Andriamanitra ka niteny taminy hoe: Raha haka anao no nahatongavan’ireo olona ireo dia miaingà ka mandehana ihany miaraka aminy; kanefa izay holazaiko aminao ihany no hataonao.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny borikin’i Balama
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nifoha maraina i Balama ka nanisy lasely ny borikiny, ary nandeha niaraka tamin’ireo andriandahin’i Moaba. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nirehitra taminy anefa ny fahatezeran’Andriamanitra satria nandeha izy; ary ilay '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Anjelin’NY TOMPO
    - type: text
      text: ' nijoro teo an-dalana mba hisakana azy. Ary i Balama dia nitaingina ny borikiny ary niaraka taminy ny zatovony roa lahy. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hitan’ny boriky nijoro teo amin’ny lalana ilay Anjelin’NY TOMPO sady nitana ny sabany efa voatsoaka teny an-tanany; dia nivily lalana ny boriky ka nankany amin’ny saha. Dia nikapoka ny boriky i Balama mba hampiverina azy ho amin’ny lalana. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ilay Anjelin’NY TOMPO nijanona tao amin’ny lalan-tery teo anelanelan’ny tanim-boaloboka; nisy fefy teo an-daniny roa. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nahita ilay Anjelin’NY TOMPO ny boriky dia niampify teo amin’ny rindrina ka nanery ny tongotr’i Balama tamin’ny rindrina. Dia nikapoka azy indray izy. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia mbola nandroso ilay Anjelin’NY TOMPO ka nijanona teo amin’ny toerana ety, izay tsy nisy hiviliana, na ho amin’ny ankavanana na ho amin’ny ankavia. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nahita ilay Anjelin’NY TOMPO ny boriky ka nandry teo ambanin’i Balama. Dia nirehitra ny fahatezeran’i Balama ka nikapoka ny boriky tamin’ny tehina izy. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nosokafan’NY TOMPO ny vavan’ny boriky ka hoy ny boriky tamin’i Balama: Inona no nataoko taminao no dia nokapohinao fanintelony aho izao? '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy i Balama tamin’ny boriky: Satria namazivazy ahy ianao! Raha izao no nisy sabatra tetỳ an-tanako dia matiko mihitsy ianao ankehitriny. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raiki-tahotra indrindra ny Moabita teo anatrehan’ny olona satria maro be izy; ary nangorohoro ny Moabita noho ny Zanak’Israely. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy ny boriky tamin’i Balama: Tsy borikinao va aho, izay nitaingenanao hatrizay nanananao ahy ka mandraka androany? Moa efa fanaoko va ny manao toy izao aminao? Dia hoy izy: Tsia!'
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nampahiratin’NY TOMPO ny mason’i Balama hahita ilay Anjelin’NY TOMPO mijoro eo an-dalana sady mitana ny sabany efa voatsoaka eny an-tanany; dia niondrika tamin’ny tany i Balama. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy ilay Anjelin’NY TOMPO taminy: Nahoana no nikapoka ny borikinao intelo ianao? Indro Aho no niainga mba hisakana anao satria hitako fa mivarina amin-doza ny lalanao. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nahita Ahy ny boriky dia nidify Ahy intelo; raha tsy nidify Ahy izy dia ianao mihitsy no nataoko maty, fa izy kosa dia ho novelomiko! '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy i Balama tamin’ilay Anjelin’NY TOMPO: Efa nanota aho satria tsy fantatro fa Ianao no nijoro nisakana ahy teo an-dalana; koa ankehitriny, raha tsy sitrakao izao diako izao, dia hiverina aho! '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy anefa ilay Anjelin’NY TOMPO tamin’i Balama: Mandehana ihany miaraka amin’ireo lehilahy ireo, kanefa ny teny izay holazaiko aminao ihany no holazainao. Dia nandeha i Balama niaraka tamin’ireo andriandahin’i Balaka.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fihaonan’i Balama sy i Balaka
    marker-yv: yv-h
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nony ren’i Balaka fa tonga i Balama dia niainga izy mba hitsena azy teo amin’ilay tanànan’i Moaba, teo amoron’i Arnona izay mamaritra ny sisintaniny. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy i Balaka tamin’i Balama: Tsy efa nandefa iraka tany aminao nampaka anao tokoa va aho? Koa nahoana no tsy nankaty amiko ianao? Tena tsy haiko tokoa va ny hanome voninahitra anao? '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy i Balama tamin’i Balaka: Inty aho tonga eto aminao ankehitriny; kanefa moa mahazo milaza na inona na inona va aho? Ny teny izay hataon’Andriamanitra ato am-bavako, dia izany ihany no holazaiko. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nandeha niaraka tamin’i Balaka i Balama ka tonga tany Kiriata-Hozota izy roa lahy. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy izy tamin’ny loholon’ny Midianita: Ankehitriny dia hiraoka izay rehetra manodidina antsika ireto vahoaka be ireto, tahaka ny firaokan’ny omby ny zava-maitso any an-tsaha. I Balaka zanak’i Zipora moa no mpanjakan’i Moaba tamin’izany fotoana izany. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary namono omby sy ondry aman’osy i Balaka ka nisy nampanateriny ho an’i Balama sy ireo andriandahy izay teo aminy.
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nony maraina dia nalain’i Balaka i Balama ka noentiny niakatra ho ao Bamota-Baala, ary tazany avy teo ny tapany amin’ny toby.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nandefa iraka izy ho any amin’i Balama, zanak’i Beora, any Petora, izay eo amoron’ny ony Eofrata, dia eo amin’ny tanin’ny fireneny, mba hiantso azy ka hilaza hoe: Indro, misy firenena nivoaka avy tany Ejipta; ary indro, mandrakotra ny tany rehetra izy ka mitoby mifanandrify amiko. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Koa ankehitriny, mba mankanesa atỳ ka ozòny io firenena io, fa mahery noho izaho izy; asa angamba mba hahazo hamely azy isika ka handroaka azy hiala amin’ny tany aho; satria fantatro fa izay tsofinao rano dia voatahy ary izay ozoninao dia voaozona.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nandeha ireo loholon’ny Moabita sy ireo loholon’ny Midianita nitondra ny saran’ny fanaovana sikidy teny an-tanany. Dia nankany amin’i Balama izy ireo ka nilaza taminy ny tenin’i Balaka. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy i Balama taminy: Mandria atỳ anio alina, dia hamaly ny teninareo aho, araka izay holazain’NY TOMPO amiko. Dia nitoetra tao amin’i Balama ireo andriandahin’i Moaba.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Andriamanitra nankao amin’i Balama ka niteny hoe: Iza moa ireo lehilahy ato aminao ireo? '
