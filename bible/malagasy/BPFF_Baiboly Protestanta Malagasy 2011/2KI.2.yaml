document_id: 2KI.2,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nampiakarana an’i Elia any an-danitra; ny fiandohan’ny asan’i Elisa
  - type: text
    content: 'Nony efa hampiakarin’NY TOMPO any an-danitra amin’ny tafio-drivotra i Elia dia niara-nandeha avy tany Gilgala izy sy i Elisa. '
  '10':
  - type: text
    content: 'Hoy i Elia: Sarotra ny zavatra angatahinao. Kanefa raha mahita ahy sarahina aminao ianao dia ho tonga aminao izany; fa raha tsy izany kosa dia tsy ho aminao izany.'
  '11':
  - type: text
    content: 'Raha mbola nandeha sy niresaka izy roa lahy dia indro, nisy kalesy afo fitondra miady sy soavaly afo nampisaraka azy, ary niakatra tamin’ny tafio-drivotra ho any an-danitra i Elia. '
  '12':
  - type: text
    content: 'Ary raha nahita izany i Elisa dia niantso hoe: Ry Ikaky ô! Ry Ikaky ô! E ny kalesy fitondra miady an’ny Israely sy ny mpitaingin-tsoavaliny! Dia tsy nahita azy intsony izy. Ary noraisiny ny fitafiany ka notriariny roa, '
  '13':
  - type: text
    content: 'dia nalainy ny akanjobe ivelany an’i Elia izay latsaka avy teny aminy, ary niverina izy ka nitsangana teo amoron’ny Jordana. '
  '14':
  - type: text
    content: 'Dia noraisin’i Elisa ny akanjobe ivelany an’i Elia, ilay latsaka avy teny aminy ka nakapony ny rano dia hoy izy: Aiza NY TOMPO, Andriamanitr’i Elia? Eny, i Elisa koa nikapoka ny rano dia nisaraka roa izany ka nita izy.'
  '15':
  - type: text
    content: 'Nony nahita azy nifanatrika ireo zanaky ny mpaminany tao Jeriko dia niteny hoe: Ny fanahin’i Elia no mipetraka amin’i Elisa! Dia nandeha nitsena azy izy ireo ka niankohoka tamin’ny tany teo anatrehany. '
  '16':
  - type: text
    content: 'Ary hoy ireo taminy: Indro, misy dimampolo lahy matanjaka ato amin’ny mpanomponao. Miangavy anao izahay, aoka handeha hitady ny tomponao ireo, sao noentin’ny Fanahin’NY TOMPO izy ka nazerany any an-tendrombohitra any, na any an-dohasaha any. Fa hoy i Elisa: Aza maniraka azy ianareo! '
  '17':
  - type: text
    content: 'Nanery azy fatratra anefa ireo ka farany dia hoy izy: Maniraha azy ary ianareo! Dia naniraka dimampolo lahy izy ireo; nitady an’i Elia nandritra ny hateloana ireny nefa tsy nahita azy. '
  '18':
  - type: text
    content: 'Dia tonga tao amin’i Elisa indray ireny raha mbola tao Jeriko ihany izy ka nataony hoe: Tsy efa nilaza taminareo va aho hoe: Aza mandeha?'
  - type: heading
    content: Ny nataon’i Elisa tany Jeriko sy tany Betela
  '19':
  - type: text
    content: 'Hoy ny mponina tao amin’izany tanàna izany tamin’i Elisa: Miangavy anao izahay: Indro, tsara toerana ity tanàna ity, araka izao hitanao izao, tompokolahy, saingy ratsy rano, ary ny tany dia tsy mampahavanona anaka. '
  '2':
  - type: text
    content: 'Hoy i Elia tamin’i Elisa: Miangavy anao aho, mijanòna eto fa NY TOMPO naniraka ahy ho any Betela. Nefa hoy i Elisa: Raha velona koa NY TOMPO, ary raha velona koa ny ainao, tsy handao anao mihitsy aho! Dia nidina nankany Betela izy roa lahy.'
  '20':
  - type: text
    content: 'Dia hoy i Elisa: Itondray lovia vaovao aho ka asio sira ao anatiny. Dia noentiny tany aminy izany. '
  '21':
  - type: text
    content: 'Ary lasa nankany an-dohan’ny rano izy, dia nanipy sira tao sady niteny hoe: Izao no lazain’NY TOMPO: Efa nahasitrana ity rano ity Aho; tsy hahatonga fahafatesana na tsy fahavanonana anaka intsony ity. '
  '22':
  - type: text
    content: Koa tonga tsara ny rano mandraka androany araka ny teny izay nolazain’i Elisa.
  '23':
  - type: text
    content: 'Ary niakatra avy tao i Elisa ka nankany Betela; nony niakatra teny an-dalana izy dia indreo, nisy ankizilahy avy tao an-tanàna nanakora azy hoe: Miakara, ry ilay sola! Miakara, ry ilay sola! '
  '24':
  - type: text
    content: 'Ary nitodika izy ka nahita azy dia nanozona azy tamin’ny anaran’NY TOMPO. Dia nisy bera vavy roa avy tany an’ala namiravira roa amby efapolo tamin’ireo ankizilahy madinika ireo. '
  '25':
  - type: text
    content: Dia niala teo i Elisa ka nankany amin’ny tendrombohitra Karmela, ary avy tao izy no niverina ho any Samaria.
  '3':
  - type: text
    content: 'Ary nandeha nankany amin’i Elisa ireo '
  - type: text
    content: zanaky ny mpaminany
  - type: text
    content: ' izay tao Betela ka niteny taminy hoe: Fantatrao va fa anio no hakan’NY TOMPO an’i Elia tomponao hiala ho any ambonin’ny lohanao? Dia hoy izy: Eny, fantatro ihany koa izany, fa mangìna ianareo. '
  '4':
  - type: text
    content: 'Ary hoy i Elia taminy: Miangavy anao aho, ry Elisa, mijanòna eto; fa NY TOMPO naniraka ahy ho any Jeriko. Fa hoy i Elisa: Raha velona koa NY TOMPO, ary raha velona koa ny ainao, dia tsy handao anao mihitsy aho! Dia tonga tany Jeriko izy roa lahy.'
  '5':
  - type: text
    content: 'Ary nanatona an’i Elisa ireo zanaky ny mpaminany izay tao Jeriko ka niteny taminy hoe: Fantatrao va fa anio no hanalan’NY TOMPO ny tomponao hiala ho any ambonin’ny lohanao? Ary hoy izy hoe: Eny, fantatro ihany koa izany, fa mangìna ianareo. '
  '6':
  - type: text
    content: 'Ary hoy i Elia taminy: Miangavy anao aho, mijanòna eto; fa NY TOMPO naniraka ahy ho any Jordana. Fa hoy i Elisa hoe: Raha velona koa NY TOMPO, ary raha velona koa ny ainao, dia tsy handao anao mihitsy aho! Dia lasa nandeha izy roa lahy.'
  '7':
  - type: text
    content: 'Ary nisy dimampolo lahy, zanaky ny mpaminany, nandeha, dia nijanona tandrify azy teny lavitra teny; fa izy roa lahy kosa nijanona teo amoron’i Jordana. '
  '8':
  - type: text
    content: 'Ary i Elia nandray ny akanjobeny ivelany ka namalona azy dia nikapoka ny rano ka nisaraka roa ny rano, dia nita tamin’ny tany maina izy roa lahy. '
  '9':
  - type: text
    content: 'Nony efa tafita izy roa lahy dia hoy i Elia tamin’i Elisa: Angataho izay hataoko ho anao, dieny tsy mbola nosarahina miala aminao aho. Hoy i Elisa: Miangavy anao aho, aoka ny anjaran-droa amin’ny fanahinao mba ho ahy! '
