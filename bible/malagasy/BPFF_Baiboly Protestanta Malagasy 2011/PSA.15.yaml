document_id: PSA.15,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Izay andrasan’Andriamanitra amin’ny olona matoky Azy
  - type: text
    content: Salamo nataon’i Davida.
  - type: text
    content: TOMPO ô, iza no hitoetra ao amin’ny tabernakelinao?
  - type: text
    content: Iza no honina ao amin’ny tendrombohitrao masina?
  '2':
  - type: text
    content: Izay mandeha tsy misy tsiny ary manao izay mahitsy
  - type: text
    content: sady misaintsaina ny marina ao am-pony.
  '3':
  - type: text
    content: Tsy manendrikendrika amin’ny lelany izy
  - type: text
    content: sady tsy manisy ratsy ny sakaizany
  - type: text
    content: no tsy manao izay hahafa-baraka ny namany.
  '4':
  - type: text
    content: Tsy manaja ny ratsy fanahy izy
  - type: text
    content: fa manome voninahitra ny matahotra NY TOMPO;
  - type: text
    content: tsy mivadika amin’ny fianianany izy na dia maningotra ny tenany aza.
  '5':
  - type: text
    content: Tsy manome ny volany hampanjanahina izy,
  - type: text
    content: na mandray kolikoly hanameloka ny tsy manan-tsiny.
  - type: text
    content: Izay mitandrina izany dia tsy mba hangozohozo mandrakizay.
