document_id: PSA.15,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Izay andrasan’Andriamanitra amin’ny olona matoky Azy
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: Salamo nataon’i Davida.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: TOMPO ô, iza no hitoetra ao amin’ny tabernakelinao?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Iza no honina ao amin’ny tendrombohitrao masina?
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Izay mandeha tsy misy tsiny ary manao izay mahitsy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady misaintsaina ny marina ao am-pony.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Tsy manendrikendrika amin’ny lelany izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady tsy manisy ratsy ny sakaizany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no tsy manao izay hahafa-baraka ny namany.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Tsy manaja ny ratsy fanahy izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa manome voninahitra ny matahotra NY TOMPO;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy mivadika amin’ny fianianany izy na dia maningotra ny tenany aza.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Tsy manome ny volany hampanjanahina izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na mandray kolikoly hanameloka ny tsy manan-tsiny.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay mitandrina izany dia tsy mba hangozohozo mandrakizay.
