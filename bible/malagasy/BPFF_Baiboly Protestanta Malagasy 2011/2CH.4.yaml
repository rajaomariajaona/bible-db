document_id: 2CH.4,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Nanorina alitara varahina izy: Roapolo hakiho ny lavany, roapolo hakiho koa ny sakany, ary folo hakiho ny haavony.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny koveta be voarendrika sy ireo koveta varahina folo
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 1Mpa 7.23-26
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ary nataony tamin’ny ankavanana ny koveta, teo amin’ny zorony atsimo atsinanana. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Nanao ny vilany fandraofan-davenona sy ny sotron’afo ary ny lovia famafazana koa i Hirama.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia vitan’i Hirama ny asa izay nataony ho an’i Solomona mpanjaka momba ny tranon’Andriamanitra: '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Ny andry roa, ny bolany, ny tendrony izay teny ambonin’ny andry roa, ny harato roa hafono ny bolany roa amin’ny tendrony izay teo an-tampon’ny andry avy, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'ary ny sarin’ampongabendanitra efajato ho amin’ny harato roa, sarin’ampongabendanitra roa andalana ho amin’ny harato iray hafono ny bolany roa momba ny tendrony izay teo an-tampon’ny andry avy; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'ary nanao ireo fitoeran-koveta izy, dia napetrany teo ambonin’ny fitoerany ny koveta, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'ary ny koveta lehibe iray sy ny sarin’omby roa amby folo, ambaniny. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Ny vilany, ny sotron’afo, ny fitrebika ary ny fanaka rehetra momba azy dia nataon’i Hirama-Aby tamin’ny varahina manganohano ho an’i Solomona mpanjaka ho amin’ny tranon’NY TOMPO. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Tany amin’ny tany amoron’i Jordana no nandrendrehan’ny mpanjaka azy tamin’ny tanimanga, teo anelanelan’i Sokota sy i Zaretana. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Toy izany no nanaovan’i Solomona ireo fanaka marobe ireo ary tsy nozahana izay lanjan’ny varahina.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Nanao ny fanaka rehetra izay tao amin’ny tranon’Andriamanitra i Solomona: Ny alitara volamena sy ny latabatra fitoeran’ny mofo atao fanatitra, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Nanao ny koveta be boribory voarendrika izy: Folo '
    - type: usfm
      marker: w
      children:
      - type: text
        text: hakiho
    - type: text
      text: ' no halehiben’ny vavany, dimy hakiho ny haavony, ary telopolo hakiho ny manodidina azy. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'ary ny fitoeran-jiro sy ny jirony izay hampirehetina eo anoloan’ny efitra anatiny araka ny fanao dia samy volamena voafantina; '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'ny voniny sy ny lela fitoeran-jiro ary ny hetin-jiro dia samy volamena tsara indrindra avokoa; '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ary ny antsy, ny lovia famafazana, ny lovia kely ary ny fitoeran-davenon-jiro koa dia samy volamena voafantina; samy volamena koa ny lelam-baravarana teo anatin’ny Trano, dia ny mankao amin’ny fitoerana masina indrindra, sy ny lelam-baravarana ho amin’ny efitrano lehibe.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Nisy sarin’omby folo isaky ny hakiho iray manodidina, teo ambanin’ny koveta be. Roa andalana ny sarin’omby sady niara-voarendrika tamin’ilay koveta be. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ary ny koveta be dia nipetraka teo ambonin’ny sarin’omby roa amby folo: Nanatrika ny avaratra ny telo, nanatrika ny andrefana ny telo, nanatrika ny atsinanana ny telo, ary nanatrika ny atsimo ny telo; ny koveta be dia teo amboniny, ary nifampiamboho izy rehetra. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ny hateviny dia vodivoampelatanana iray, ary nataony tahaka ny molotry ny kapoaka ny molony, dia tahaka ny vonin’ny lisy; mahalany telo arivo '
    - type: usfm
      marker: w
      children:
      - type: text
        text: bata
    - type: text
      text: ' izy io.'
  - type: usfm
    marker: r
    children:
    - type: text
      text: 1Mpa 7.38-39
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Nanao koveta varahina folo koa izy mba ho fidiovana, nataony teo amin’ny ankavanana ny dimy, ary teo amin’ny ankavia ny dimy; ary tao no nanasana ny zavatra hatao fanatitra dorana manontolo; fa ny koveta lehibe kosa dia ho fisasan’ny mpisorona.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fitanisana ireo fitaovana vita amin’ny metaly
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 1Mpa 7.40-51
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Nanao ny fitoeran-jiro volamena folo araka ny marika izy dia napetrany tao amin’ny tempoly, teo amin’ny ankavanana ny dimy ary teo amin’ny ankavia ny dimy. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Nanao latabatra folo koa izy, dia napetrany tao amin’ny tempoly, teo amin’ny ankavanana ny dimy ary teo amin’ny ankavia ny dimy. Ary nanao lovia volamena famafazana miisa zato izy. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Nanamboatra ny kianjan’ny mpisorona sy ny kianja lehibe sy ny lelam-bavahadin’ny kianja izy ary nopetahany takelaka varahina ny lelam-bavahady. '
