document_id: 1TI.2
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny amin’ny fivavahana ho an’ny olona rehetra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Koa mananatra voalohany indrindra aho mba hatao izay fangatahana, fivavahana, fifonana, fisaorana, ho an’ny olona rehetra, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'ho an’ny mpanjaka mbamin’izay rehetra manana fahefana, mba hiainantsika am-piadanana sy mandry fehizay amin’ny fahatahorana an’Andriamanitra sy ny fahamaotinana rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Izany no tsara ka ankasitrahina eo imason’Andriamanitra, Mpamonjy antsika, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: izay tia ny olona rehetra hovonjena ka ho tonga amin’ny fahalalana ny marina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Fa iray Andriamanitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary iray no Mpanalalana amin’Andriamanitra sy ny olona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'dia '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' Jesosy, izay olona,'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: sady nanolotra ny tenany ho avotra hisolo ny olona rehetra.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izany no zavatra ho fitory amin’ny fotoana voatendry.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ho amin’izany no nanendrena ahy ho mpitory sy Apostoly; milaza ny marina aho fa tsy mandainga; ary koa ho mpampianatra ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jentilisa
  - type: text
    text: ' amin’ny finoana sy ny fahamarinana.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny lehilahy sy ny vehivavy ao amin’ny fiangonana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Koa tiako mba hivavaka eny amin’izay rehetra misy azy eny ny lehilahy ka manandra-tanana masina, tsy amin’ny fahatezerana na amin’ny fifandirana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Toy izany koa ny vehivavy, hiravaka amin’ny fitafiana mahamendrika mbamin’ny fahamaotinana sy ny fahononan-tena, nefa tsy amin’ny volo mirandrana sy ny volamena, na vatosoa na fitafiana sarobidy, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: fa amin’ny asa tsara, araka izay mahamendrika ny vehivavy manaiky ny fivavahana amin’Andriamanitra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Aoka mba hianatra amin’ny fahanginana ny vehivavy ka hanaiky tsara. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Fa ny vehivavy dia tsy avelako hampianatra na hifehy ny lehilahy fa hangina ihany. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Fa i Adama no natao voalohany, vao i Eva. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary tsy i Adama no voafitaka fa ny vehivavy no voafitaka ka tonga mpanota. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Nefa hovonjena ihany izy amin’ny fiterahan-jaza, raha maharitra amin’ny finoana sy ny fitiavana ary ny fahamasinana mbamin’ny fahononan-tena.
