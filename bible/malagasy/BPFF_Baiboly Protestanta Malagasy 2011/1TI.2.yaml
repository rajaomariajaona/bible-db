document_id: 1TI.2,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny amin’ny fivavahana ho an’ny olona rehetra
  - type: text
    content: 'Koa mananatra voalohany indrindra aho mba hatao izay fangatahana, fivavahana, fifonana, fisaorana, ho an’ny olona rehetra, '
  '10':
  - type: text
    content: fa amin’ny asa tsara, araka izay mahamendrika ny vehivavy manaiky ny fivavahana amin’Andriamanitra.
  '11':
  - type: text
    content: 'Aoka mba hianatra amin’ny fahanginana ny vehivavy ka hanaiky tsara. '
  '12':
  - type: text
    content: 'Fa ny vehivavy dia tsy avelako hampianatra na hifehy ny lehilahy fa hangina ihany. '
  '13':
  - type: text
    content: 'Fa i Adama no natao voalohany, vao i Eva. '
  '14':
  - type: text
    content: 'Ary tsy i Adama no voafitaka fa ny vehivavy no voafitaka ka tonga mpanota. '
  '15':
  - type: text
    content: Nefa hovonjena ihany izy amin’ny fiterahan-jaza, raha maharitra amin’ny finoana sy ny fitiavana ary ny fahamasinana mbamin’ny fahononan-tena.
  '2':
  - type: text
    content: 'ho an’ny mpanjaka mbamin’izay rehetra manana fahefana, mba hiainantsika am-piadanana sy mandry fehizay amin’ny fahatahorana an’Andriamanitra sy ny fahamaotinana rehetra. '
  '3':
  - type: text
    content: 'Izany no tsara ka ankasitrahina eo imason’Andriamanitra, Mpamonjy antsika, '
  '4':
  - type: text
    content: izay tia ny olona rehetra hovonjena ka ho tonga amin’ny fahalalana ny marina.
  '5':
  - type: text
    content: Fa iray Andriamanitra
  - type: text
    content: ary iray no Mpanalalana amin’Andriamanitra sy ny olona,
  - type: text
    content: 'dia '
  - type: text
    content: Kristy
  - type: text
    content: ' Jesosy, izay olona,'
  '6':
  - type: text
    content: sady nanolotra ny tenany ho avotra hisolo ny olona rehetra.
  - type: text
    content: Izany no zavatra ho fitory amin’ny fotoana voatendry.
  '7':
  - type: text
    content: 'Ho amin’izany no nanendrena ahy ho mpitory sy Apostoly; milaza ny marina aho fa tsy mandainga; ary koa ho mpampianatra ny '
  - type: text
    content: Jentilisa
  - type: text
    content: ' amin’ny finoana sy ny fahamarinana.'
  - type: heading
    content: Ny lehilahy sy ny vehivavy ao amin’ny fiangonana
  '8':
  - type: text
    content: Koa tiako mba hivavaka eny amin’izay rehetra misy azy eny ny lehilahy ka manandra-tanana masina, tsy amin’ny fahatezerana na amin’ny fifandirana.
  '9':
  - type: text
    content: 'Toy izany koa ny vehivavy, hiravaka amin’ny fitafiana mahamendrika mbamin’ny fahamaotinana sy ny fahononan-tena, nefa tsy amin’ny volo mirandrana sy ny volamena, na vatosoa na fitafiana sarobidy, '
