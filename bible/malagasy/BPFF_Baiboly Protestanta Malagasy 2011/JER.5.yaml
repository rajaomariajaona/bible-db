document_id: JER.5
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Faharatsiam-pitondrantena ao Jerosalema
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Mandehandehana eny an-dalamben’i Jerosalema ianareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka zahao sy fantaro
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tadiavo eny amin’ny kianja,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa raha mba misy olona hitanareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay manao ny marina sy mitady ny hitsiny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia havelako ny helok’i Jerosalema.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary na dia misy aza miteny hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Raha velona koa NY TOMPO
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia fianianana mandainga izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: TOMPO ô, tsy mijery ny toe-panahy mahatoky va ny masonao?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Namely azy Ianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa tsy nahatsiaro narary izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: nandripaka azy Ianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa tsy nety nino anatra izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: nohamafisiny mihoatra noho ny harambato ny tarehiny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy nety niverina Taminao izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dia hoy aho hoe: Olona mahantra ireto;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: adala izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa tsy mahalala ny lalan’NY TOMPO,
- type: usfm
  marker: q1
  children:
  - type: text
    text: na ny fitsipik’Andriamaniny;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Aleoko mandeha ho any amin’ny lehibe
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hiteny aminy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ireny dia mahalala ny lalan’NY TOMPO
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny fitsipik’Andriamaniny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: kanjo ireny koa aza dia samy efa nanapaka zioga
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy namaha fatorana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Koa noho izany dia mamely azy ny liona avy any an’ala
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mandringana azy ny amboadia avy any an-tany efitra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: miandry hamely ny tanànany ny leoparda,
- type: usfm
  marker: q1
  children:
  - type: text
    text: koa izay rehetra mivoaka avy ao dia viraviraina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa efa maro ny fahadisoany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary fatratra ny fikomiany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Koa nahoana Aho no hamela ny helokao?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Efa nahafoy Ahy ny zanakao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka nianiana tamin’izay tsy Andriamanitra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: novokisako izy, nefa nijangajanga ihany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka nirohotra niditra tao an-tranon’ny vehivavy janga.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Tahaka ny soavaly tsara fahana izy ka nikarenjy tamin’izay tiany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: samy naneno tamin’ny vadin’ny namany avy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Tsy hovaliko va izy amin’izany?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hoy NY TOMPO;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy hanamparako ny fahatezerako va ny firenena toy izany?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Miakara ao amin’ny tanim-boalobony ianareo ka poteho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa aza dia levonina avokoa izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: esory ny rantsany
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria tsy an’NY TOMPO ireny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Fa efa nivadika Tamiko mihitsy ny taranak’Israely sy ny taranak’i Joda,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hoy NY TOMPO.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Nahafoy NY TOMPO izy ireo
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ka niteny hoe: Tsy Izy no izy;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy hisy loza hanjo antsika
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy hahita sabatra na mosary isika.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Hanjary rivotra ny mpaminany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy hisy ny teny ao aminy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, izany no hanjo azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Koa izao no lazain’NY TOMPO, Andriamanitra Tompon’izao rehetra izao:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Noho ny nitenenanareo izany teny izany
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia indro, hataoko afo ny teniko izay eo am-bavanao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ho kitay hazo ity firenena ity ka holevoniny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Indro, hitondra firenena avy lavitra Aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: hamely anareo, ry taranak’Israely,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hoy NY TOMPO,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia firenena tsy mety resy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: firenena hatry ny ela,
- type: usfm
  marker: q1
  children:
  - type: text
    text: firenena izay tsy fantatrao ny fiteniny
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady tsy ho azonao izay lazainy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ny tranon-jana-tsipìkany dia tahaka ny fasana misokatra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: izy rehetra dia samy lehilahy mahery avokoa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ary hohaniny ny vokatrao sy ny haninao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hohaniny ny zanakao lahy sy ny zanakao vavy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hohaniny ny ondry aman’osinao sy ny ombinao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hohaniny ny voalobokao sy ny aviavinao
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady horavany amin’ny sabatra ny tanàna mimanda izay itokianao.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Nefa na dia amin’izany andro izany aza, hoy NY TOMPO, dia tsy holevoniko avokoa ianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary raha hoy ianareo: Nahoana NY TOMPO Andriamanitsika no dia nanao izany rehetra izany tamintsika? Dia hovalianao hoe: Toy ny nahafoizanareo Ahy sy ny nanompoanareo andriamanitra hafa teo amin’ny taninareo no hanompoanareo ny firenen-kafa any amin’ny tany izay tsy anareo.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Rehefa tsy ekena intsony ny fahefan’Andriamanitra
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ambarao ao amin’ny taranak’i Jakoba,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ary torio ao amin’ny Joda hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Henoy izao, ry firenena adala sady tsy manan-tsaina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay mana-maso nefa tsy mahita,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ary manan-tsofina nefa tsy mandre:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Izaho va tsy atahoranareo?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hoy NY TOMPO;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy mangovitra va ianareo eo anatrehako
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay nanao ny fasika ho fefin’ny ranomasina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia fetra mandrakizay tsy azony ihoarana?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Koa na dia mitopatopa aza ny onjany dia tsy mahavaky azy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary na dia mirohondrohona aza dia tsy mahahoatra azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Fa ity firenena ity dia manana fo maditra sy mikomy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mikomy izy dia lasa nandeha,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'ary tsy miteny anakampo akory hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aoka isika hatahotra NY TOMPO Andriamanitsika
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay mandatsaka ranonorana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ny lohaorana sy ny faraorana amin’ny fotoanany avy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ireo herinandro voatendry ho amin’ny fararano dia tandremany ho antsika.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Ny helokareo no nampikorontana izany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny fahotanareo no misakana ny soa tsy ho azonareo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Fa ratsy fanahy maro no hita ao amin’ny oloko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mamitsaka sy mijoko toy ny mpamandri-borona izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: manao vela-pandrika izy ka olona no azony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Toy ny tranom-borona feno vorona
- type: usfm
  marker: q1
  children:
  - type: text
    text: no mahafeno fitaka ny tranony;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary noho izany dia tonga lehibe sy mpanankarena izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Mihamatavy izy ka mandimandina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia mihoa-pampana amin’ny fanaovan-dratsy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy mety mitsara ady izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hahazoan’ny kamboty ny rariny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: kanefa mahomby ihany amin’ny ataony,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy mba jereny ny zon’ny mahantra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Tsy hampamoahiko amin’izany va izy?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hoy NY TOMPO;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy hanamparako ny fahatezerako va ny firenena toy izany?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Zava-mahagaga sy mahatsiravina no atao eo amin’ny tany;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: maminany lainga ny mpaminany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: manapaka araka izay atoron’ireny ny mpisorona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mankasitraka izany ny oloko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: koa hanao ahoana re ianareo amin’ny ho avy?
