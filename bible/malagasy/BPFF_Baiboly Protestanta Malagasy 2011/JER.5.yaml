document_id: JER.5,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Faharatsiam-pitondrantena ao Jerosalema
  - type: text
    content: Mandehandehana eny an-dalamben’i Jerosalema ianareo
  - type: text
    content: ka zahao sy fantaro
  - type: text
    content: ary tadiavo eny amin’ny kianja,
  - type: text
    content: fa raha mba misy olona hitanareo,
  - type: text
    content: izay manao ny marina sy mitady ny hitsiny,
  - type: text
    content: dia havelako ny helok’i Jerosalema.
  '10':
  - type: text
    content: Miakara ao amin’ny tanim-boalobony ianareo ka poteho,
  - type: text
    content: nefa aza dia levonina avokoa izy;
  - type: text
    content: esory ny rantsany
  - type: text
    content: satria tsy an’NY TOMPO ireny.
  '11':
  - type: text
    content: Fa efa nivadika Tamiko mihitsy ny taranak’Israely sy ny taranak’i Joda,
  - type: text
    content: hoy NY TOMPO.
  '12':
  - type: text
    content: Nahafoy NY TOMPO izy ireo
  - type: text
    content: 'ka niteny hoe: Tsy Izy no izy;'
  - type: text
    content: tsy hisy loza hanjo antsika
  - type: text
    content: ary tsy hahita sabatra na mosary isika.
  '13':
  - type: text
    content: Hanjary rivotra ny mpaminany
  - type: text
    content: ary tsy hisy ny teny ao aminy,
  - type: text
    content: eny, izany no hanjo azy.
  '14':
  - type: text
    content: 'Koa izao no lazain’NY TOMPO, Andriamanitra Tompon’izao rehetra izao:'
  - type: text
    content: Noho ny nitenenanareo izany teny izany
  - type: text
    content: dia indro, hataoko afo ny teniko izay eo am-bavanao
  - type: text
    content: ary ho kitay hazo ity firenena ity ka holevoniny.
  '15':
  - type: text
    content: Indro, hitondra firenena avy lavitra Aho
  - type: text
    content: hamely anareo, ry taranak’Israely,
  - type: text
    content: hoy NY TOMPO,
  - type: text
    content: dia firenena tsy mety resy,
  - type: text
    content: firenena hatry ny ela,
  - type: text
    content: firenena izay tsy fantatrao ny fiteniny
  - type: text
    content: sady tsy ho azonao izay lazainy.
  '16':
  - type: text
    content: Ny tranon-jana-tsipìkany dia tahaka ny fasana misokatra;
  - type: text
    content: izy rehetra dia samy lehilahy mahery avokoa.
  '17':
  - type: text
    content: Ary hohaniny ny vokatrao sy ny haninao,
  - type: text
    content: hohaniny ny zanakao lahy sy ny zanakao vavy,
  - type: text
    content: hohaniny ny ondry aman’osinao sy ny ombinao,
  - type: text
    content: hohaniny ny voalobokao sy ny aviavinao
  - type: text
    content: sady horavany amin’ny sabatra ny tanàna mimanda izay itokianao.
  '18':
  - type: text
    content: 'Nefa na dia amin’izany andro izany aza, hoy NY TOMPO, dia tsy holevoniko avokoa ianareo. '
  '19':
  - type: text
    content: 'Ary raha hoy ianareo: Nahoana NY TOMPO Andriamanitsika no dia nanao izany rehetra izany tamintsika? Dia hovalianao hoe: Toy ny nahafoizanareo Ahy sy ny nanompoanareo andriamanitra hafa teo amin’ny taninareo no hanompoanareo ny firenen-kafa any amin’ny tany izay tsy anareo.'
  - type: heading
    content: Rehefa tsy ekena intsony ny fahefan’Andriamanitra
  '2':
  - type: text
    content: 'Ary na dia misy aza miteny hoe:'
  - type: text
    content: Raha velona koa NY TOMPO
  - type: text
    content: dia fianianana mandainga izany.
  '20':
  - type: text
    content: Ambarao ao amin’ny taranak’i Jakoba,
  - type: text
    content: 'ary torio ao amin’ny Joda hoe:'
  '21':
  - type: text
    content: Henoy izao, ry firenena adala sady tsy manan-tsaina,
  - type: text
    content: izay mana-maso nefa tsy mahita,
  - type: text
    content: 'ary manan-tsofina nefa tsy mandre:'
  '22':
  - type: text
    content: Izaho va tsy atahoranareo?
  - type: text
    content: Hoy NY TOMPO;
  - type: text
    content: tsy mangovitra va ianareo eo anatrehako
  - type: text
    content: izay nanao ny fasika ho fefin’ny ranomasina,
  - type: text
    content: dia fetra mandrakizay tsy azony ihoarana?
  - type: text
    content: Koa na dia mitopatopa aza ny onjany dia tsy mahavaky azy,
  - type: text
    content: ary na dia mirohondrohona aza dia tsy mahahoatra azy.
  '23':
  - type: text
    content: Fa ity firenena ity dia manana fo maditra sy mikomy;
  - type: text
    content: mikomy izy dia lasa nandeha,
  '24':
  - type: text
    content: 'ary tsy miteny anakampo akory hoe:'
  - type: text
    content: Aoka isika hatahotra NY TOMPO Andriamanitsika
  - type: text
    content: izay mandatsaka ranonorana,
  - type: text
    content: dia ny lohaorana sy ny faraorana amin’ny fotoanany avy;
  - type: text
    content: ary ireo herinandro voatendry ho amin’ny fararano dia tandremany ho antsika.
  '25':
  - type: text
    content: Ny helokareo no nampikorontana izany
  - type: text
    content: ary ny fahotanareo no misakana ny soa tsy ho azonareo.
  '26':
  - type: text
    content: Fa ratsy fanahy maro no hita ao amin’ny oloko;
  - type: text
    content: mamitsaka sy mijoko toy ny mpamandri-borona izy,
  - type: text
    content: manao vela-pandrika izy ka olona no azony.
  '27':
  - type: text
    content: Toy ny tranom-borona feno vorona
  - type: text
    content: no mahafeno fitaka ny tranony;
  - type: text
    content: ary noho izany dia tonga lehibe sy mpanankarena izy.
  '28':
  - type: text
    content: Mihamatavy izy ka mandimandina,
  - type: text
    content: dia mihoa-pampana amin’ny fanaovan-dratsy;
  - type: text
    content: tsy mety mitsara ady izy
  - type: text
    content: mba hahazoan’ny kamboty ny rariny,
  - type: text
    content: kanefa mahomby ihany amin’ny ataony,
  - type: text
    content: ary tsy mba jereny ny zon’ny mahantra.
  '29':
  - type: text
    content: Tsy hampamoahiko amin’izany va izy?
  - type: text
    content: Hoy NY TOMPO;
  - type: text
    content: tsy hanamparako ny fahatezerako va ny firenena toy izany?
  '3':
  - type: text
    content: TOMPO ô, tsy mijery ny toe-panahy mahatoky va ny masonao?
  - type: text
    content: Namely azy Ianao,
  - type: text
    content: nefa tsy nahatsiaro narary izy;
  - type: text
    content: nandripaka azy Ianao,
  - type: text
    content: nefa tsy nety nino anatra izy;
  - type: text
    content: nohamafisiny mihoatra noho ny harambato ny tarehiny,
  - type: text
    content: tsy nety niverina Taminao izy.
  '30':
  - type: text
    content: Zava-mahagaga sy mahatsiravina no atao eo amin’ny tany;
  '31':
  - type: text
    content: maminany lainga ny mpaminany,
  - type: text
    content: manapaka araka izay atoron’ireny ny mpisorona,
  - type: text
    content: ary mankasitraka izany ny oloko;
  - type: text
    content: koa hanao ahoana re ianareo amin’ny ho avy?
  '4':
  - type: text
    content: 'Dia hoy aho hoe: Olona mahantra ireto;'
  - type: text
    content: adala izy
  - type: text
    content: fa tsy mahalala ny lalan’NY TOMPO,
  - type: text
    content: na ny fitsipik’Andriamaniny;
  '5':
  - type: text
    content: Aleoko mandeha ho any amin’ny lehibe
  - type: text
    content: ka hiteny aminy;
  - type: text
    content: fa ireny dia mahalala ny lalan’NY TOMPO
  - type: text
    content: sy ny fitsipik’Andriamaniny;
  - type: text
    content: kanjo ireny koa aza dia samy efa nanapaka zioga
  - type: text
    content: sy namaha fatorana.
  '6':
  - type: text
    content: Koa noho izany dia mamely azy ny liona avy any an’ala
  - type: text
    content: ary mandringana azy ny amboadia avy any an-tany efitra;
  - type: text
    content: miandry hamely ny tanànany ny leoparda,
  - type: text
    content: koa izay rehetra mivoaka avy ao dia viraviraina;
  - type: text
    content: fa efa maro ny fahadisoany,
  - type: text
    content: ary fatratra ny fikomiany.
  '7':
  - type: text
    content: Koa nahoana Aho no hamela ny helokao?
  - type: text
    content: Efa nahafoy Ahy ny zanakao
  - type: text
    content: ka nianiana tamin’izay tsy Andriamanitra;
  - type: text
    content: novokisako izy, nefa nijangajanga ihany
  - type: text
    content: ka nirohotra niditra tao an-tranon’ny vehivavy janga.
  '8':
  - type: text
    content: Tahaka ny soavaly tsara fahana izy ka nikarenjy tamin’izay tiany,
  - type: text
    content: samy naneno tamin’ny vadin’ny namany avy.
  '9':
  - type: text
    content: Tsy hovaliko va izy amin’izany?
  - type: text
    content: Hoy NY TOMPO;
  - type: text
    content: ary tsy hanamparako ny fahatezerako va ny firenena toy izany?
