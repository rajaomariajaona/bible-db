document_id: GEN.23,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nahafatesan’i Saraha sy ny nividianan’i Abrahama tany fandevenana
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny andro niainan’i Saraha dia fito amby roapolo amby zato taona; izany no taona niainan’i Saraha. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary i Efrona dia niara-nipetraka tamin’ireo taranak’i Heta. Namaly an’i Abrahama i Efrona hetita teo anatrehan’ireo taranak’i Heta, dia izay rehetra niditra teo am-bavahadin’ny tanànany, ka niteny hoe: '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsia, tompokolahy fa mihainoa ahy! Ny saha dia omeko anao ary ny zohy izay ao anatiny koa dia omeko anao. Eto imason’ny zanaky ny fireneko no anomezako azy ho anao; aleveno ny fatin’ny vadinao. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia niankohoka teo anatrehan’ireo tompon-tany i Abrahama '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ka niteny tamin’i Efrona teo anatrehan’ireo tompon-tany hoe: Raha mba hihaino ahy ihany anefa ianao dia homeko ny vidin’ny saha; raiso avy amiko izany dia haleviko ao ny fatin’ny vadiko. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy ny navalin’i Efrona an’i Abrahama: '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tompokolahy, mihainoa ahy! Raha izay tany tokony ho lafo sekela volafotsy efajato io, inona anefa moa izany amintsika roa lahy, fa aleveno ny fatin’ny vadinao. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Neken’i Abrahama ny tenin’i Efrona ka nolanjainy ho azy teo anatrehan’ireo taranak’i Heta ny vola izay voalazany, dia sekela volafotsy efajato araka ny sandany eo amin’ny mpivarotra.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Araka izany, ny sahan’i Efrona, izay teo Makpela, tandrifin’i Mamre, dia ny saha sy ny zohy izay tao anatiny mbamin’ny hazo rehetra izay tao amin’ny saha, izay teo amin’ny sisiny rehetra manodidina, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia natao varo-maty tamin’i Abrahama ho fananany, teo imason’ireo taranak’i Heta, dia izay rehetra niditra teo am-bavahadin’ny tanànany. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa vita izany dia nandevina an’i Saraha vadiny tao amin’ny zohy tao amin’ny saha Makpela tandrifin’i Mamre na Hebrona, ao amin’ny tany Kanana, i Abrahama. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary maty tao Kiriata-Arba na Hebrona, tany amin’ny tany Kanana, i Saraha. Dia tonga i Abrahama hisaona an’i Saraha sy hitomany azy. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Koa ny saha mbamin’ny zohy izay ao anatiny dia nataon’ireo taranak’i Heta varo-maty tamin’i Abrahama ho tany fandevenana.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nitsangana niala avy teo anilan’ny fatin’ny vadiny i Abrahama dia niteny tamin’ireo taranak’i Heta hoe: '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vahiny sy mpivahiny eto aminareo aho; omeo tany fandevenana eto aminareo aho mba handevenako ny fatin’ny vadiko izay nandao ahy. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia namaly an’i Abrahama ireo taranak’i Heta hoe: '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mihainoa anay, tompokolahy: Andrian-dehibe eto aminay ianao; koa izay tsara indrindra amin’ny fasanay no andeveno ny fatin’ny vadinao; tsy misy aminay tsy hanome ny fasany ho anao mba handevenanao ny fatin’ny vadinao. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nitsangana i Abrahama ka niankohoka teo anatrehan’ireo taranak’i Heta tompon-tany, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary hoy izy tamin’ireo: Raha sitrakareo ary ny handevenako ny fatin’ny vadiko izay nandao ahy dia mihainoa ahy, koa iangavio kely i Efrona, zanak’i Zohara, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: mba homeny ahy ilay zohiny ao Makpela, dia ilay eo amin’ny sisin’ny sahany; koa amin’izay vola tokony ho vidiny no aoka hanomezany azy ho ahy eto aminareo ho tany fandevenana.
