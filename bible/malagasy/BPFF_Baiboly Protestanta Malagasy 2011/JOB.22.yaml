document_id: JOB.22,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Ny teny fanintelony nataon’i Elifaza: Tsy maintsy misy heloka ao amin’i Joba'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Dia nandray fitenenana i Elifaza temanita hoe:'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Koa noho izany dia misy fandrika manodidina anao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary misy zava-mahatahotra mampihorohoro anao tampoka.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Moa tsy hitanao va ny haizina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny rano mandriaka mandifotra anao?
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Tsy avo tahaka ny lanitra va Andriamanitra?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jereo ny haavon’ny kintana, endre ny haavony!
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Nefa hoy ianao: Ataon’Andriamanitra ahoana no fahafantatra?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mahay mitsara any ankoatra ny rahona maizina va Izy?
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Manakona Azy ny rahona matevina ka tsy mahita Izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mandehandeha eny amin’ny lanitra Izy.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Moa hizotra amin’ny lalana izay nalehan’ny olona fahagola va ianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ilay nalehan’ny olona ratsy fanahy?
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Nesorina alohan’ny androny izy ireny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka nindaosin’ny riaka ny fanorenany,
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'dia ireo izay niteny tamin’Andriamanitra hoe: Mialà aminay!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary inona no azon’ny Tsitoha atao ho anay?
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Kanefa Izy no efa nameno zava-tsoa ny tranony.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lavitra ahy ny fisainan’ny ratsy fanahy!
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Mahita ny marina ka mifaly
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ary ny tsy manan-tsiny dia mihomehy ireny hoe:'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Mahasoa an’Andriamanitra va ny olona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa ny olon-kendry aza dia tsy mahasoa afa-tsy ny tenany ihany?
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Marina tokoa fa rava ny fahavalontsika
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny harenany betsaka dia levon’ny afo.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Mifankazara amin’ny Tsitoha ianao dia hiadana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izany no hahatafaverina ny fahasambarana aminao.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Miangavy anao aho, mandraisa fampianarana avy amin’ny vavany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary alatsaho ao am-ponao ny teniny.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Raha miverina amin’ny Tsitoha ianao dia ho tafaorina indray;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, raha ampanalavirinao ny tranolainao ny heloka.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Ario eny amin’ny vovoka ny akoram-bolamena sy ny akoram-bolafotsy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, ario eny amin’ny vato eny an-dohasahan-driaka ny volamena avy any Ofira;
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: fa ny Tsitoha no ho akoram-bolamenanao sy akoram-bolafotsinao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ho volafotsy mamirapiratra ho anao.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Fa amin’izany dia hiravoravo amin’ny Tsitoha ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hanandratra ny tavanao amin’Andriamanitra.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Raha mifona Aminy ianao dia hihaino anao Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hanefa ny voadinao ianao.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Ary raha misy kasainao hatao dia hotanterahina aminao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hamirapiratra amin’ny lalanao ny mazava.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Raha misy mietry dia hataonao hoe: Misandrata!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny manetry tena no hovonjeny.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Mampaninona ny Tsitoha moa raha marina ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sa misy tombony ho Azy raha ataonao tsy misy diso ny alehanao?
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Hanafaka na dia ny olona meloka aza Izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, ny fahadiovan’ny tananao no hamonjena azy.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Moa ny fahatahoranao Azy va no ananarany anao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ifanatrehany aminao amin’ny fitsarana?
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Tsy be va ny faharatsianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady tsy hita isa ny helokao?
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Fa efa naka antoka tsy amin’antony tamin’ny rahalahinao ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka nanendaka ny akanjon’ny mahantra.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Tsy nanome rano hosotroin’ny mangetaheta ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady tsy nahafoy hanina ho an’ny noana.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Fa ny olona be sandry ihany no nanana ny tany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny manankaja ihany no nitoetra teo.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Efa nampialainao maina ny mpitondratena
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary notapahina ny sandrin’ny kamboty.
