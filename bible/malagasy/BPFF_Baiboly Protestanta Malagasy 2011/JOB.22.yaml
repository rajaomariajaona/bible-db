document_id: JOB.22,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: 'Ny teny fanintelony nataon’i Elifaza: Tsy maintsy misy heloka ao amin’i Joba'
  - type: text
    content: 'Dia nandray fitenenana i Elifaza temanita hoe:'
  '10':
  - type: text
    content: Koa noho izany dia misy fandrika manodidina anao
  - type: text
    content: ary misy zava-mahatahotra mampihorohoro anao tampoka.
  '11':
  - type: text
    content: Moa tsy hitanao va ny haizina
  - type: text
    content: sy ny rano mandriaka mandifotra anao?
  '12':
  - type: text
    content: Tsy avo tahaka ny lanitra va Andriamanitra?
  - type: text
    content: Jereo ny haavon’ny kintana, endre ny haavony!
  '13':
  - type: text
    content: 'Nefa hoy ianao: Ataon’Andriamanitra ahoana no fahafantatra?'
  - type: text
    content: Mahay mitsara any ankoatra ny rahona maizina va Izy?
  '14':
  - type: text
    content: Manakona Azy ny rahona matevina ka tsy mahita Izy;
  - type: text
    content: mandehandeha eny amin’ny lanitra Izy.
  '15':
  - type: text
    content: Moa hizotra amin’ny lalana izay nalehan’ny olona fahagola va ianao,
  - type: text
    content: dia ilay nalehan’ny olona ratsy fanahy?
  '16':
  - type: text
    content: Nesorina alohan’ny androny izy ireny
  - type: text
    content: ka nindaosin’ny riaka ny fanorenany,
  '17':
  - type: text
    content: 'dia ireo izay niteny tamin’Andriamanitra hoe: Mialà aminay!'
  - type: text
    content: Ary inona no azon’ny Tsitoha atao ho anay?
  '18':
  - type: text
    content: Kanefa Izy no efa nameno zava-tsoa ny tranony.
  - type: text
    content: Lavitra ahy ny fisainan’ny ratsy fanahy!
  '19':
  - type: text
    content: Mahita ny marina ka mifaly
  - type: text
    content: 'ary ny tsy manan-tsiny dia mihomehy ireny hoe:'
  '2':
  - type: text
    content: Mahasoa an’Andriamanitra va ny olona,
  - type: text
    content: nefa ny olon-kendry aza dia tsy mahasoa afa-tsy ny tenany ihany?
  '20':
  - type: text
    content: Marina tokoa fa rava ny fahavalontsika
  - type: text
    content: ary ny harenany betsaka dia levon’ny afo.
  '21':
  - type: text
    content: Mifankazara amin’ny Tsitoha ianao dia hiadana;
  - type: text
    content: izany no hahatafaverina ny fahasambarana aminao.
  '22':
  - type: text
    content: Miangavy anao aho, mandraisa fampianarana avy amin’ny vavany
  - type: text
    content: ary alatsaho ao am-ponao ny teniny.
  '23':
  - type: text
    content: Raha miverina amin’ny Tsitoha ianao dia ho tafaorina indray;
  - type: text
    content: eny, raha ampanalavirinao ny tranolainao ny heloka.
  '24':
  - type: text
    content: Ario eny amin’ny vovoka ny akoram-bolamena sy ny akoram-bolafotsy,
  - type: text
    content: eny, ario eny amin’ny vato eny an-dohasahan-driaka ny volamena avy any Ofira;
  '25':
  - type: text
    content: fa ny Tsitoha no ho akoram-bolamenanao sy akoram-bolafotsinao;
  - type: text
    content: ary ho volafotsy mamirapiratra ho anao.
  '26':
  - type: text
    content: Fa amin’izany dia hiravoravo amin’ny Tsitoha ianao
  - type: text
    content: ka hanandratra ny tavanao amin’Andriamanitra.
  '27':
  - type: text
    content: Raha mifona Aminy ianao dia hihaino anao Izy
  - type: text
    content: ary hanefa ny voadinao ianao.
  '28':
  - type: text
    content: Ary raha misy kasainao hatao dia hotanterahina aminao
  - type: text
    content: ary hamirapiratra amin’ny lalanao ny mazava.
  '29':
  - type: text
    content: 'Raha misy mietry dia hataonao hoe: Misandrata!'
  - type: text
    content: Fa ny manetry tena no hovonjeny.
  '3':
  - type: text
    content: Mampaninona ny Tsitoha moa raha marina ianao
  - type: text
    content: sa misy tombony ho Azy raha ataonao tsy misy diso ny alehanao?
  '30':
  - type: text
    content: Hanafaka na dia ny olona meloka aza Izy;
  - type: text
    content: eny, ny fahadiovan’ny tananao no hamonjena azy.
  '4':
  - type: text
    content: Moa ny fahatahoranao Azy va no ananarany anao
  - type: text
    content: sy ifanatrehany aminao amin’ny fitsarana?
  '5':
  - type: text
    content: Tsy be va ny faharatsianao
  - type: text
    content: sady tsy hita isa ny helokao?
  '6':
  - type: text
    content: Fa efa naka antoka tsy amin’antony tamin’ny rahalahinao ianao
  - type: text
    content: ka nanendaka ny akanjon’ny mahantra.
  '7':
  - type: text
    content: Tsy nanome rano hosotroin’ny mangetaheta ianao
  - type: text
    content: sady tsy nahafoy hanina ho an’ny noana.
  '8':
  - type: text
    content: Fa ny olona be sandry ihany no nanana ny tany;
  - type: text
    content: ary ny manankaja ihany no nitoetra teo.
  '9':
  - type: text
    content: Efa nampialainao maina ny mpitondratena
  - type: text
    content: ary notapahina ny sandrin’ny kamboty.
