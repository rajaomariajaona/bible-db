document_id: 2CO.13,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Hafatrafatra sy fanaovam-beloma
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao no fanintelony hankanesako atỳ aminareo. «Amin’ny tenin’ny vavolombelona roa na telo no hanorenana mafy ny teny rehetra» (Deo 19.15). '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izany no anoratako izany zavatra izany raha tsy eo aminareo aho, fandrao, rehefa tonga aho dia voatery hiasa ho amin’ny fanorenana mafy tsy azo ravana, araka ny hery izay nomen’ny Tompo ahy ho fampandrosoana fa tsy ho fandravana.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Farany, ry rahalahy, mifalia, miezaha ho tanteraka, mifampahereza, miraisa saina, mihavàna; ary Andriamanitry ny fitiavana sy ny fiadanana ho aminareo. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mifanaova veloma amin’ny fanorohana masina. Manao veloma anareo ny olona masina rehetra.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ho aminareo rehetra anie ny fahasoavan’i Jesosy Kristy Tompo sy ny fitiavan’Andriamanitra ary ny firaisana amin’ny Fanahy Masina.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Efa nambarako fahiny sady mbola milaza rahateo koa aho izao, toy ny nataoko fony teo aminareo fanindroany ihany; ary ankehitriny, raha tsy eo kosa aho fa amin’izay nanota teo aloha sy amin’ny sisa rehetra dia tsy hanam-piantrana aho rehefa tonga indray, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'satria mitady famantarana ianareo fa miteny ato anatiko '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ' izay tsy malemy aminareo fa mahery ao aminareo kosa. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa voahombo tamin’ny hazofijaliana Izy noho ny fahalemena, nefa velona kosa noho ny herin’Andriamanitra. Fa izahay koa dia malemy ao Aminy, nefa hiara-belona Aminy ho anareo izahay noho ny herin’Andriamanitra.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Diniho ny tenanareo, na mitoetra amin’ny finoana ianareo, na tsia; izahao toetra ny tenanareo. Moa tsy fantatrareo va ny amin’ny tenanareo, fa ao anatinareo Jesosy Kristy, raha tsy olona nolavina ianareo? '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nefa manantena aho fa ho fantatrareo fa izahay dia tsy olona nolavina. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary mangataka amin’Andriamanitra izahay mba tsy hanao izay ratsy ianareo, tsy ny hisehoanay ho olona voazaha toetra anefa fa ny mba hanaovanareo izay tsara, na dia ho toy ny olona nolavina aza izahay. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa tsy mahefa na inona na inona hanoherana ny marina izahay fa hampandroso ny marina kosa. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa faly izahay raha malemy fa ianareo no mahery; ary izao no vavaka ataonay, dia ny hahatanteraka anareo. '
