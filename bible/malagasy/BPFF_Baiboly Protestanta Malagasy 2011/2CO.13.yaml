document_id: 2CO.13,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Hafatrafatra sy fanaovam-beloma
  - type: text
    content: 'Izao no fanintelony hankanesako atỳ aminareo. «Amin’ny tenin’ny vavolombelona roa na telo no hanorenana mafy ny teny rehetra» (Deo 19.15). '
  '10':
  - type: text
    content: Izany no anoratako izany zavatra izany raha tsy eo aminareo aho, fandrao, rehefa tonga aho dia voatery hiasa ho amin’ny fanorenana mafy tsy azo ravana, araka ny hery izay nomen’ny Tompo ahy ho fampandrosoana fa tsy ho fandravana.
  '11':
  - type: text
    content: 'Farany, ry rahalahy, mifalia, miezaha ho tanteraka, mifampahereza, miraisa saina, mihavàna; ary Andriamanitry ny fitiavana sy ny fiadanana ho aminareo. '
  '12':
  - type: text
    content: Mifanaova veloma amin’ny fanorohana masina. Manao veloma anareo ny olona masina rehetra.
  '13':
  - type: text
    content: Ho aminareo rehetra anie ny fahasoavan’i Jesosy Kristy Tompo sy ny fitiavan’Andriamanitra ary ny firaisana amin’ny Fanahy Masina.
  '2':
  - type: text
    content: 'Efa nambarako fahiny sady mbola milaza rahateo koa aho izao, toy ny nataoko fony teo aminareo fanindroany ihany; ary ankehitriny, raha tsy eo kosa aho fa amin’izay nanota teo aloha sy amin’ny sisa rehetra dia tsy hanam-piantrana aho rehefa tonga indray, '
  '3':
  - type: text
    content: 'satria mitady famantarana ianareo fa miteny ato anatiko '
  - type: text
    content: Kristy
  - type: text
    content: ' izay tsy malemy aminareo fa mahery ao aminareo kosa. '
  '4':
  - type: text
    content: Fa voahombo tamin’ny hazofijaliana Izy noho ny fahalemena, nefa velona kosa noho ny herin’Andriamanitra. Fa izahay koa dia malemy ao Aminy, nefa hiara-belona Aminy ho anareo izahay noho ny herin’Andriamanitra.
  '5':
  - type: text
    content: 'Diniho ny tenanareo, na mitoetra amin’ny finoana ianareo, na tsia; izahao toetra ny tenanareo. Moa tsy fantatrareo va ny amin’ny tenanareo, fa ao anatinareo Jesosy Kristy, raha tsy olona nolavina ianareo? '
  '6':
  - type: text
    content: 'Nefa manantena aho fa ho fantatrareo fa izahay dia tsy olona nolavina. '
  '7':
  - type: text
    content: 'Ary mangataka amin’Andriamanitra izahay mba tsy hanao izay ratsy ianareo, tsy ny hisehoanay ho olona voazaha toetra anefa fa ny mba hanaovanareo izay tsara, na dia ho toy ny olona nolavina aza izahay. '
  '8':
  - type: text
    content: 'Fa tsy mahefa na inona na inona hanoherana ny marina izahay fa hampandroso ny marina kosa. '
  '9':
  - type: text
    content: 'Fa faly izahay raha malemy fa ianareo no mahery; ary izao no vavaka ataonay, dia ny hahatanteraka anareo. '
