    content: Endre! Tsara raha ny mpirahalahy no miara-monina
  - type: text
    content: Hira fanao amin’ny fiakarana. Nataon’i Davida.
  - type: text
    content: Endre! Tsara sady mahafinaritra
  - type: text
    content: raha ny mpirahalahy no miara-monina.
  '2':
  - type: text
    content: Tahaka ny diloilo tsara
  - type: text
    content: amin’ny loha,
  - type: text
    content: izay mitsororoka amin’ny somotra, dia ny somotr’i Arona,
  - type: text
    content: izay mitsororoka amin’ny morontongotr’akanjony.
  '3':
  - type: text
    content: Tahaka ny ando any Hermona,
  - type: text
    content: 'izay milatsaka amin’ny tendrombohitra '
  - type: text
    content: Ziona
  - type: text
    content: ;
  - type: text
