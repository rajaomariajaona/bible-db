document_id: GEN.7,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Niditra tao anatin’ny sambofiara i Noa
  - type: text
    content: 'Ary hoy NY TOMPO tamin’i Noa: Midira ao anatin’ny sambofiara ianao mbamin’ny ankohonanao rehetra, satria ianao no hitako fa marina eo anatrehako amin’ity taranaka ity. '
  '10':
  - type: text
    content: 'Rehefa afaka hafitoana dia tonga tetỳ ambonin’ny tany ny safodrano. '
  '11':
  - type: text
    content: 'Tamin’ny andro fahafito amby folo tamin’ny volana faharoa tamin’ny faheninjato taona niainan’i Noa, tamin’izany andro izany dia vaky ny loharano rehetra tamin’ny '
  - type: text
    content: lalina
  - type: text
    content: ' lehibe ary nivoha ireo varavaran’ny lanitra. '
  '12':
  - type: text
    content: 'Dia nisy ranonorana nivatravatra tamin’ny tany nandritra ny efapolo andro sy efapolo alina. '
  '13':
  - type: text
    content: 'Tamin’izay andro izay indrindra no efa tafiditra tao anatin’ny sambofiara i Noa, i Sema, i Hama ary i Jafeta, zanakalahin’i Noa, ny vadin’i Noa ary ny vinantony telo vavy niaraka taminy '
  '14':
  - type: text
    content: 'mbamin’ny bibidia rehetra, samy araka ny karazany avy, ny biby fiompy rehetra, samy araka ny karazany avy, ny biby rehetra izay mandady na mikisaka amin’ny tany, samy araka ny karazany avy, ny vorona rehetra, samy araka ny karazany avy, ny voronkely ary ny manana elatra rehetra. '
  '15':
  - type: text
    content: 'Niditra tao amin’i Noa tao anatin’ny sambofiara ireo, tsiroaroa avy tamin’ny nofo rehetra izay manam-pofonaina. '
  '16':
  - type: text
    content: 'Izay niditra tao dia lahy sy vavy, avy tamin’ny nofo rehetra, araka ny nandidian’Andriamanitra an’i Noa. Dia narindrin’NY TOMPO tao izy ireo. '
  '17':
  - type: text
    content: 'Naharitra efapolo andro tetỳ ambonin’ny tany ny safodrano ka niakatra ny rano dia nanainga ny sambofiara, ary nitsinkafona niala tamin’ny tany izy. '
  '18':
  - type: text
    content: 'Nitombo ny rano ka nisondrotra be indrindra tetỳ ambonin’ny tany, dia nandeha teny ambonin’ny rano ny sambofiara. '
  '19':
  - type: text
    content: 'Nitombo izay tsy izy ny rano tetỳ ambonin’ny tany ka voasarony ny tendrombohitra avo rehetra izay tetỳ ambanin’ny lanitra manontolo. '
  '2':
  - type: text
    content: 'Analao ho ao aminao ny biby madio rehetra isaky ny karazany, fito avy, lahy sy vavy; ny biby tsy madio isaky ny karazany, roa avy, lahy sy vavy; '
  '20':
  - type: text
    content: 'Nihoatra dimy amby folo '
  - type: text
    content: hakiho
  - type: text
    content: ' ny rano ka voasarona ny tendrombohitra. '
  '21':
  - type: text
    content: 'Dia maty ny nofo rehetra izay nihetsiketsika tetỳ ambonin’ny tany, dia ny vorona, ny biby fiompy, ny bibidia sy ny biby rehetra izay mandady na mikisaka amin’ny tany ary ny olombelona rehetra. '
  '22':
  - type: text
    content: 'Izay rehetra manam-pofonaina eo am-bavorony, izay rehetra teo amin’ny tany maina, dia maty avokoa. '
  '23':
  - type: text
    content: 'Naringana ny mananaina rehetra izay tetỳ ambonin’ny tany, hatramin’ny olona ka hatramin’ny biby fiompy sy ny zava-mandady na mikisaka ary ny voromanidina; naringana tsy ho amin’ny tany ireny. Fa i Noa sy izay niara-nitoetra taminy tao anatin’ny sambofiara ihany no sisa velona. '
  '24':
  - type: text
    content: Mbola nitombo ihany tetỳ ambonin’ny tany nandritra ny dimampolo amby zato andro ny rano.
  '3':
  - type: text
    content: 'ary ny voromanidina isaky ny karazany koa, fito avy, lahy sy vavy, mba tsy ho lany taranaka ambonin’ny tany rehetra ireny. '
  '4':
  - type: text
    content: 'Fa raha afaka hafitoana, Izaho hampilatsaka ranonorana ambonin’ny tany efapolo andro sy efapolo alina; ary ny mananaina rehetra izay nataoko dia haringako tsy ho ambonin’ny tany. '
  '5':
  - type: text
    content: Dia narahin’i Noa izay rehetra nandidian’NY TOMPO azy.
  - type: heading
    content: Ny safodrano
  '6':
  - type: text
    content: 'Eninjato taona i Noa raha tonga teto ambonin’ny tany ny safodrano. '
  '7':
  - type: text
    content: 'Ary i Noa sy ny vady aman-janany mbamin’ny vinantovaviny niaraka taminy dia niditra tao anatin’ny sambofiara mba tsy ho tratry ny safodrano. '
  '8':
  - type: text
    content: 'Ary ny biby madio sy ny biby izay tsy madio sy ny vorona mbamin’izay rehetra mandady na mikisaka amin’ny tany '
  '9':
  - type: text
    content: 'dia nisy niditra tsiroaroa ho ao amin’i Noa tao anatin’ny sambofiara, dia lahy sy vavy, araka izay nandidian’Andriamanitra an’i Noa. '
