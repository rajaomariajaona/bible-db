document_id: 2SA.20
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nikomy tamin’i Davida i Seba
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Sendra nisy lehilahy iray tena ratsy fanahy teo, i Seba no anarany, zanak’i Bikry benjaminita; nitsoka ny anjomara izy sady niantsoantso hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Isika dia tsy manana anjara amin’i Davida
- type: usfm
  marker: q1
  children:
  - type: text
    text: na lova amin’ny zanak’i Jese!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Samia mody any amin’ny tranolainy avy, ry Israely ô!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Dia samy niara-nandao an’i Davida ny lehilahin’ny Israely ka nanaraka an’i Seba, zanak’i Bikry; fa ny lehilahin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Joda
  - type: text
    text: ' no nifikitra tamin’ny mpanjakany hatrany Jordana ka hatrany Jerosalema.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Nony tonga tao an-tranony tany Jerosalema i Davida mpanjaka dia nalainy ny vady tsindranony folo vavy izay navelany hiandry trano tao ka nataony tao an-trano fiambenana ary nomeny fivelomana, fa tsy nandriany intsony. Dia nambenana tao mandra-pahafatiny ireo ka velona tsy nanambady intsony.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny namonoan’i Joaba an’i Amasa
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Hoy ny mpanjaka tamin’i Amasa: Vorio ho eto amiko ao anatin’ny hateloana ny lehilahin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Joda
  - type: text
    text: ', ary aoka mba ho eto koa ny tenanao. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia lasa namory ny Joda i Amasa, nefa nandiso ny fotoana nifanaovana taminy izy. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary hoy i Davida tamin’i Abisay: Ankehitriny izao dia i Seba, zanak’i Bikry, no ahitantsika loza mihoatra noho i Absaloma; koa ento ny mpanompon’ny tomponao ka enjeho izy, fandrao mahazo tanàna mimanda ka tsy ho azontsika. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Dia niainga hanenjika azy ny olon’i Joaba mbamin’ny Keretita sy ny Peletita
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Keretita sy ny Peletita: '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'zahao '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 8.18.
    marker-yv: yv-n
  - type: text
    text: ' ary ny lehilahy mahery rehetra; nivoaka avy tany Jerosalema ireo hanenjika an’i Seba, zanak’i Bikry.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Nony tonga tao amin’ilay vato lehibe tao Gibeona izy dia avy i Amasa nitsena azy. Niakanjo fanamiana fitondra miady i Joaba ka nafehy azy teo an-tsikinany ny fehikibony mbamin’ny trano-tsabany; ary nony nandeha izy dia latsaka ny sabatra. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary hoy i Joaba tamin’i Amasa: Tsara ihany va ianao, ry rahalahy? Dia noraisin’i Joaba tamin’ny tanany havanana ny somotr’i Amasa horohany. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Tsy nanahinahy ny sabatra teny an-tanan’i Joaba anefa i Amasa ka nasiany tamin’ny kibony dia nivaroraka tamin’ny tany ny tsinainy, ary tsy nasiany intsony izy, fa matiny tamin’izay ihany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nifaranan’ny fikomian’i Seba
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ary nanenjika an’i Seba, zanak’i Bikry i Joaba sy i Abisay rahalahiny. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Dia nijanona teo anilan’ny faty ny zatovon’i Joaba iray ka niteny hoe: Izay miandany amin’i Joaba sy i Davida dia aoka hanaraka an’i Joaba. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary nihosin-dra teo anaty lalambe i Amasa ka nony hitan-dRalehilahy fa nijanona ny olona rehetra dia nafindrany niala teo amin’ny lalambe ho any an-tsaha ny fatin’i Amasa ary nosaronany lamba, satria hitany fa nijanona izay rehetra mandalo azy. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Rehefa nafindrany niala teo amin’ny lalambe izy dia nizotra nanaraka an’i Joaba ny olona rehetra hanenjika an’i Seba, zanak’i Bikry.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Nandeha namakivaky ny fokon’ny Israely rehetra hatrany Abela-Bety-Maka sy ny Berita rehetra izy; ary nivory ireo ka mba lasa nanaraka azy. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Dia tonga izy ireo ka nanao fahirano azy teo Abela-Bety-Maka, ary nanandratra tovon-tany teo anilan’ny tanàna izy ka teo ivelany manolotra ny manda no niankinany; ary ny olona izay nomba an’i Joaba dia namely ny manda mba handrava azy. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary nisy vehivavy hendry tao an-tanàna niantso hoe: Mihainoa, mihainoa e! Miangavy anareo aho, lazao amin’i Joaba hoe: Mankanesa erỳ aminy, hono, ianao, fa misy holazainy aminao! '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Nony tonga teo akaiky izy dia hoy Ravehivavy: Ianao va no Joaba? Dia hoy izy: Eny, izaho no izy! Hoy Ravehivavy taminy: Mihainoa ny teniko mpanompovavinao. Dia hoy izy: Mihaino aho izao. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary hoy Ravehivavy: Izao no fitenin’ny olona taloha: Aoka hanadina ao Abela izy; koa araka izany no nahavitany ny raharaha. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Izaho dia isan’ny tia fihavanana sady olona mahatoky eto amin’ny Israely, fa ianao kosa dia mitady handrava renivohitra eto amin’ny Israely. Koa ahoana no hamongoranao ny lovan’NY TOMPO? '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary namaly i Joaba hoe: Sanatria dia sanatria amiko izay handripaka sy handringana! '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Tsy izany tsy akory. Fa misy lehilahy avy amin’ny tany be havoana any Efraima, Seba no anarany, zanak’i Bikry, izay efa nanainga tanana hikomy amin’i Davida mpanjaka; koa izy ihany no atolory ahy; dia hiala amin’ny tanàna aho. Ary hoy Ravehivavy tamin’i Joaba: Indro, ny lohany dia hatsipy any aminao any ambadiky ny manda. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Dia lasa nanatona ny vahoaka Ravehivavy ka nanome azy izany torohevitra feno fahendrena izany. Dia notapahin’ireo ny lohan’i Seba, zanak’i Bikry, ka natsipiny teny amin’i Joaba. Ary nitsoka ny anjomara i Joaba ka niala tamin’ny tanàna samy ho any amin’ny tranolainy avy ny olona. Ary niverina nankany Jerosalema ho any amin’ny mpanjaka i Joaba.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ireo mpanao raharaham-panjakan’i Davida
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: I Joaba no komandin’ny miaramila rehetra tamin’ny Israely; i Benaia, zanak’i Joiada, no mpifehy ny Keretita sy ny Peletita
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Keretita sy ny Peletita: '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'zahao '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 8.18.
    marker-yv: yv-n
  - type: text
    text: '; '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'i Adorama no lehiben’ny mpanao fanompoana; i Josafata, zanak’i Ahiloda, no mpitadidy ny raharaham-panjakana; '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'i Seva no mpanoratra; i Zadoka sy i Abiatara no mpisorona; '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ary Ira jairita koa no mpisorona ho an’i Davida.
