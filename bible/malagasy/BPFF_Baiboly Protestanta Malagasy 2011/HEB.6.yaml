document_id: HEB.6
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Koa aoka hilaozantsika ny abidim-pianarana ny amin’i Kristy, fa aoka handroso ho amin’ny tanteraka isika ka tsy hanao fanorenana indray, dia fibebahana hahafahana amin’ny asa maty sy finoana an’Andriamanitra, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'ary fampianarana ny amin’ny batisa sy ny fametrahan-tanana, ary ny fitsanganan’ny maty sy ny fitsarana mandrakizay. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Izany no hataontsika raha avelan’Andriamanitra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Fa izay efa nohazavaina indray mandeha sady efa nanandrana ny fanomezana avy any an-danitra sy efa nandray ny Fanahy Masina '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'ary efa nanandrana ny teny tsaran’Andriamanitra sy ny herin’ny fiainana ho avy, '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'nefa nihemotra, dia tsy azo havaozina indray ho amin’ny fibebahana, satria manombo ny Zanak’Andriamanitra indray amin’ny hazofijaliana ka manala-baraka Azy. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Fa izay tany mifoka ny ranonorana milatsaka aminy matetika ka maniry anana tsara ho an’ny olona nambolena azy dia mahazo fitahiana avy amin’Andriamanitra; '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: fa izay maniry tsilo sy songosongo kosa dia lavina sady akaikin’ny ozona, ary ny hiafarany dia hodorana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Nefa, ry malala, na dia miteny izany aza izahay, dia manantena zavatra tsara ny aminareo, dia izay momba ny famonjena. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Fa Andriamanitra tsy mba tsy marina ka hanadino ny asanareo sy ny fitiavana izay nasehonareo ho voninahitry ny anarany, raha nanompo ny olona masina ianareo sady mbola manompo ihany. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Mbola irinay ianareo rehetra samy haneho izany fahazotoana izany mba hahazo ny fahatokiana be ny amin’ny fanantenana hatramin’ny farany, '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: mba tsy ho ketraka ianareo fa hanahaka ireo mandova araka ny teny fikasana amin’ny finoana sy ny faharetana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Fa Andriamanitra nanao teny fikasana tamin’i Abrahama, ary satria tsy nisy lehibe noho ny tenany izay azony nianianana, dia nianiana tamin’ny tenany Izy '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'ka niteny hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Hitahy anao tokoa Aho ary hahamaro dia hahamaro anao» (Gen 22.17).
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary araka izany, rehefa naharitra tsara i Abrahama dia nahazo izay nampanantenain’ny teny fikasana. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Fa ny olona dia mianiana amin’izay lehibe noho ny tenany; ary ny fianianana dia ataony mba hahamafy ny teny ka hampitsahatra ny fifandirana rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary amin’izany, mainka fa raha Andriamanitra ta haneho ny tsy fiovan’ny sitrapony amin’ny mpandova araka ny teny fikasana, dia nataony mafy orina tamin’ny fianianana izany, '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'mba ho zavatra roa loha tsy mety miova, izay tsy hain’Andriamanitra andaingana, no sady hahazoantsika fampirisihana mafy, dia isika izay nitady fialofana amin’ny fihazonana ny fanantenana napetraka eo anoloantsika. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Izany fanantenana izany no ananantsika ho vatofantsiky ny aina sady mafy no tsy mihetsika ary miditra any anatin’ny efitra lamba; '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: tany no nidiran’i Jesosy ho Mpialoha lalana antsika, rehefa tonga Mpisoronabe mandrakizay araka ny fomban’i Melkizedeka Izy.
