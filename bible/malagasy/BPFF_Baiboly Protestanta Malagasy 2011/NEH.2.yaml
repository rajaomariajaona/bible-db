document_id: NEH.2,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Nahazo lalana hiverina any Jerosalema i Nehemia
  - type: text
    content: 'Tamin’ny volana '
  - type: text
    content: Nisana
  - type: text
    content: ' tamin’ny taona faharoapolo nanjakan’i Artaksersesy, raha teo anoloany ny divay, dia noraisiko izany ka natolotro ny mpanjaka. Tamin’izay aho vao mba nalahelo teo anatrehany. '
  '10':
  - type: text
    content: Raha nahare izany i Sanibala horonita sy i Tobia amonita mpanompo dia sosotra loatra satria nisy lehilahy tonga hitady izay hahasoa ny Zanak’Israely.
  - type: heading
    content: Mizaha ny endriky ny manda i Nehemia
  '11':
  - type: text
    content: 'Dia tonga tany Jerosalema aho ka nitoetra tany hateloana. '
  '12':
  - type: text
    content: 'Nifoha tamin’ny alina aho, dia izaho sy ny olom-bitsy nomba ahy, nefa tsy nisy olona nilazako izay nataon’Andriamanitra tao am-poko mba hatao any Jerosalema; ary tsy nisy biby nentiko afa-tsy ilay nitaingenako ihany. '
  '13':
  - type: text
    content: 'Dia nandeha alina aho ka nivoaka ny vavahady mankany amin’ny lohasaha, tandrifin’ny loharanon’ny dragona sy tamin’ny vavahadin-jezika ka nizaha ny mandan’i Jerosalema izay rava sy ny vavahadiny izay levon’ny afo. '
  '14':
  - type: text
    content: 'Dia nankany amin’ny vavahadin-doharano sy ny farihin’ny mpanjaka koa aho nefa tsy nisy lalana azon’ilay biby nitaingenako naleha akory. '
  '15':
  - type: text
    content: Dia niakatra teo amin’ny lohasahan-driaka aho tamin’ny alina ka nizaha ny manda, dia nitodika ka niditra tamin’ny vavahady mankany amin’ny lohasaha, dia niverina indray.
  '16':
  - type: text
    content: 'Tsy nahalala izay nalehako, na izay nataoko anefa ireo mpanapaka; fa hatramin’izay dia tsy mbola nolazaiko tamin’ny '
  - type: text
    content: Jiosy
  - type: text
    content: ' izany, na tamin’ny mpisorona, na tamin’ny olo-manankaja, na tamin’ny mpanapaka, na tamin’ny vahoaka sisa izay nanao ny asa. '
  '17':
  - type: text
    content: 'Ary hoy aho tamin’izy ireo: Ianareo dia mahita ny fahoriantsika fa rava Jerosalema ary main’ny afo ny vavahadiny; koa andeha isika hanangana ny mandan’i Jerosalema mba tsy hahavoalatsa antsika intsony. '
  '18':
  - type: text
    content: 'Dia nambarako azy ny tanan’Andriamanitro izay nahasoa ahy sy ny tenin’ny mpanjaka izay nolazainy tamiko koa. Ary hoy izy ireo: Eny, aoka ary isika hitsangana ka handrafitra azy! Dia nampahery ny tanany hanao izany soa izany izy ireo.'
  '19':
  - type: text
    content: 'Nony ren’i Sanibala horonita sy i Tobia amonita mpanompo ary i Gasema arabo anefa izany dia nanaraby sy nanevateva anay izy hoe: Inona izao zavatra ataonareo izao? Hikomy amin’ny mpanjaka angaha ianareo? '
  '2':
  - type: text
    content: 'Dia hoy ny mpanjaka tamiko: Nahoana no malahelo tarehy ianao kanefa tsy marary tsinona? Tsy zavatra hafa izao fa alahelom-po mihitsy. Dia raiki-tahotra indrindra aho '
  '20':
  - type: text
    content: 'Dia namaly azy aho hoe: Andriamanitry ny lanitra, Izy no hanambina anay ka hitsangana handrafitra izahay mpanompony; fa ianareo dia tsy manana anjara, na rariny, na fahatsiarovana akory, atỳ Jerosalema.'
  '3':
  - type: text
    content: 'ka niteny tamin’ny mpanjaka hoe: Ho ela velona anie ny mpanjaka! Nahoana moa no tsy halahelo tarehy aho raha rava ny tanàna misy ny fasan-drazako sady efa levon’ny afo ny vavahadiny? '
  '4':
  - type: text
    content: 'Dia hoy ny mpanjaka tamiko: Inona ary no angatahinao? Dia nivavaka tamin’Andriamanitry ny lanitra aho aloha, '
  '5':
  - type: text
    content: 'izay vao niteny tamin’ny mpanjaka hoe: Raha sitraky ny mpanjaka ka mahita fitia eto imasonao ny mpanomponao dia alefaso ho any Joda aho, ho any amin’ny tanàna misy ny fasan-drazako mba hanamboarako izany. '
  '6':
  - type: text
    content: 'Ary hoy ny mpanjaka izay nipetraka teo anilan’ny vadiny tamiko: Haharitra hafiriana anefa ny dianao ary rahoviana no hiverina? Dia sitraky ny mpanjaka ny handefa ahy ka nilaza fotoana taminy aho. '
  '7':
  - type: text
    content: 'Hoy koa aho tamin’ny mpanjaka: Raha sitraky ny mpanjaka, aoka homena taratasy ho amin’ireo governora any andafin’ny ony Eofrata aho mba hamelany ahy handeha hatrany Joda, '
  '8':
  - type: text
    content: omena taratasy ho an’i Asafa mpitandrina ny alan’ny mpanjaka koa mba hanomezany hazo hanaovako ny vavahadin’ny manda izay momba ny Trano sy hanaovako ny mandan’ny tanàna ary ny trano izay hitoerako. Dia nomen’ny mpanjaka ahy izany araka ny soa nataon’ny tanan’Andriamanitro tamiko.
  '9':
  - type: text
    content: 'Dia tonga tany amin’ireo governora any andafin’ny ony Eofrata aho ka natolotro azy ny taratasin’ny mpanjaka. Ary naniraka manamboninahitra sy mpitaingin-tsoavaly hanatitra ahy ny mpanjaka. '
