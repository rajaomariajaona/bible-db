document_id: GEN.9,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fanekena nataon’Andriamanitra tamin’i Noa
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Nitahy an’i Noa sy ny zanany Andriamanitra ka niteny hoe: Maroa fara sy mihabetsaha ary mamenoa ny tany. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'ary amin’ny zavamananaina rehetra eo aminareo, na ny vorona na ny biby fiompy na ny bibidia rehetra eo aminareo, izay rehetra nivoaka avy tao anatin’ny sambofiara, dia ny biby samihafa rehetra. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Dia aoriko ny fanekeko aminareo ka tsy haringako amin’ny safodrano intsony ny nofo rehetra, ary tsy hisy safodrano hanimba ny tany intsony. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Ary hoy ihany Andriamanitra: Izao no famantarana ny fanekena izay ataoko Amiko sy aminareo mbamin’ny zavamananaina rehetra eo aminareo hatramin’ny taranaka fara aman-dimby: '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ny avako dia apetrako eo amin’ny rahona ho famantarana ny fanekena Amiko sy amin’ny tany. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Rehefa mampiangona rahona eo ambonin’ny tany Aho ka hita eo amin’ny rahona ny avana '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'dia hotsarovako ny fanekeko izay Amiko sy aminareo mbamin’ny zavamananaina, dia ny nofo rehetra; tsy hisy safodrano handringana ny nofo rehetra intsony. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Ho eo amin’ny rahona ny avana; hitsinjo azy Aho mba hahatsiarovako ny fanekena mandrakizay izay amin’Andriamanitra sy amin’ny zavamananaina rehetra, dia ny nofo rehetra ambonin’ny tany. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Ary hoy Andriamanitra tamin’i Noa: Izany no famantarana ny fanekena izay naoriko Amiko sy amin’ny nofo rehetra etỳ ambonin’ny tany.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Izy telo mirahalahy zanak’i Noa
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Ny zanakalahin’i Noa nivoaka avy tamin’ny sambofiara dia i Sema sy i Hama ary i Jafeta. I Hama no rain’i Kanana. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Ireo telo lahy ireo no zanak’i Noa. Avy tamin’ireo no nielezan’ny olona tetỳ ambonin’ny tany rehetra.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Hanan-tahotra sy hihorohoro aminareo ny bibidia rehetra sy ny voromanidina rehetra; ireny mbamin’izay rehetra mandady na mikisaka amin’ny tany sy ny hazandrano rehetra ao amin’ny ranomasina dia efa natolotra ho eo an-tananareo. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Ary tonga mpamboly i Noa ka namboly voaloboka. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Ary nisotro divay izy ka mamo; dia nanary lamba izy ka nitanjaka tao anatin’ny tranolainy. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Ary hitan’i Hama, rain’i Kanana, ny fitanjahan’ny rainy ka nambarany tamin’ny rahalahiny roa lahy teo ivelany izany. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Fa naka lamba i Sema sy i Jafeta ka noentin’izy mirahalahy teo an-tsorony io, ary nanao dia mianòtra izy ka nandrakotra ny fitanjahan’ny rainy; ary ny tavany dia tsy nanatrika ka tsy hitany ny fitanjahan’ny rainy. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Dia nahatsiaro i Noa rehefa afaka ny hamamoany ka nahafantatra izay nataon’ny zanany faralahy taminy. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Dia hoy izy:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho voaozona anie i Kanana!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho tena mpanompon’ny rahalahiny anie izy!
  '26':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Ary hoy koa izy:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Isaorana anie NY TOMPO, Andriamanitr’i Sema,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary aoka i Kanana ho mpanompony!
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Hataon’Andriamanitra malalaka anie ny toeran’i Jafeta
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Jafeta: Fahalalahana.'
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aoka honina ao an-dain’i Sema izy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.27 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Izy.
      marker-yv: yv-n
    - type: text
      text: ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary aoka i Kanana ho mpanompony!
  '28':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Ny andro niainan’i Noa taorianan’ny safodrano dia dimampolo sy telonjato taona. '
  '29':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Ary ny andro rehetra niainan’i Noa dia dimampolo sy sivinjato taona; dia maty izy.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Ny biby mihetsiketsika rehetra izay miaina dia ho fihinanareo; omeko anareo toy ny zava-maitso koa izy rehetra. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Kanefa ny nofo izay mbola misy aina, dia ny rany izany, no aza haninareo. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Fa hampamoahiko kosa ny ranareo satria ainareo izany; eo amin’ny tanan’ny mananaina rehetra no hampamoahako azy; ary eo amin’ny tanan’ny olona, dia eo amin’ny tanan’ny olona tsirairay, no hampamoahiko ny ain’ny olona.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Izay mandatsaka ny ran’olona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia mba halatsak’olona kosa ny rany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria tahaka ny endrik’Andriamanitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no nanaovany ny olona.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Koa ny aminareo dia maroa fara sy mihabetsaha;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aoka ho marobe eny ambonin’ny tany ianareo ary mihabetsaha eny.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Ary Andriamanitra mbola niteny tamin’i Noa sy tamin’ireo zanany izay niaraka taminy hoe: '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Raha ny Amiko dia indro, manorina ny fanekeko aminareo sy amin’ny taranakareo handimby anareo Aho, '
