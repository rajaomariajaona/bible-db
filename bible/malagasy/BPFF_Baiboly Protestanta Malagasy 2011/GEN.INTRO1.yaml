  children:
  - type: text
    text: INDRAY MIJERY
- type: usfm
  marker: is1
  children:
  - type: text
    text: Ny votoatin’ny Boky
- type: usfm
  marker: ip
  children:
  - type: text
    text: Ny hoe Genesisy dia midika hoe Fiandohana, ary ity boky ity no milaza ny naharian’Andriamanitra izao rehetra izao, ary tsara no nanaovany ny zavatra rehetra. Nanota anefa ny olombelona ka izany no niandohan’ny fisarahany tamin’Andriamanitra sy ny fahoriana rehetra ary ny fahafatesana. Nitombo ny fahotana, kanefa koa Andriamanitra dia nanomboka nanomana sahady ny famonjena ho an’ny olombelona. Nanomboka nifidy olona izay hiavian’ny Mpamonjy Izy, dia ireo Patriarka na ireo razamben’ny Israely izany. Ny Boky dia mifarana amin’ny fijanonan’ny Zanak’Israely any Ejipta sy ny fahafatesan’i Jakoba. Mitohy ao amin’ny Boky Eksodosy izany tantara izany.
- type: usfm
  marker: iot
  children:
  - type: text
    text: Ny firafitry ny Boky
- type: usfm
  marker: io1
  children:
  - type: text
    text: 'Ny tantaran’ny fiandohana: 1–11'
- type: usfm
  marker: io2
  children:
  - type: text
    text: 'Ny nahariana an’izao rehetra izao: 1–2.3'
- type: usfm
  marker: io2
  children:
  - type: text
    text: 'Ny nidiran’ny fahotana sy ny vokany: 3'
- type: usfm
  marker: io2
  children:
  - type: text
    text: 'Ny nitomboan’ny fahotana sy ny nitomboan’ny taranak’olombelona: 4'
- type: usfm
  marker: io2
  children:
  - type: text
    text: 'Ny taranak’olombelona, hatramin’i Adama ka hatramin’i Noa: 6–10'
- type: usfm
  marker: io2
  children:
  - type: text
    text: 'Ilay tilikambo tao Babela: 11.1-9'
- type: usfm
  marker: io2
  children:
  - type: text
    text: 'Ny firazanan’i Abrahama, hatramin’i Sema: 11.10-32'
- type: usfm
  marker: io1
  children:
  - type: text
    text: 'Ireo Patriarka na ireo razamben’ny Israely: 12–50'
- type: usfm
  marker: io2
  children:
  - type: text
    text: 'Abrahama: 12–25'
- type: usfm
  marker: io2
  children:
  - type: text
    text: 'Isaka: 26–27'
- type: usfm
  marker: io2
  children:
  - type: text
    text: 'Jakoba: 28–49'
- type: usfm
  marker: io2
  children:
  - type: text
    text: 'Josefa: 37–50'
