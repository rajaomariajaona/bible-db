type_code: plt
verses:
  '1':
  - type: text
    content: INDRAY MIJERY
  - type: text
    content: Ny votoatin’ny Boky
  - type: text
    content: Ny hoe Genesisy dia midika hoe Fiandohana, ary ity boky ity no milaza ny naharian’Andriamanitra izao rehetra izao, ary tsara no nanaovany ny zavatra rehetra. Nanota anefa ny olombelona ka izany no niandohan’ny fisarahany tamin’Andriamanitra sy ny fahoriana rehetra ary ny fahafatesana. Nitombo ny fahotana, kanefa koa Andriamanitra dia nanomboka nanomana sahady ny famonjena ho an’ny olombelona. Nanomboka nifidy olona izay hiavian’ny Mpamonjy Izy, dia ireo Patriarka na ireo razamben’ny Israely izany. Ny Boky dia mifarana amin’ny fijanonan’ny Zanak’Israely any Ejipta sy ny fahafatesan’i Jakoba. Mitohy ao amin’ny Boky Eksodosy izany tantara izany.
  - type: text
    content: Ny firafitry ny Boky
  - type: text
    content: 'Ny tantaran’ny fiandohana: 1–11'
  - type: text
    content: 'Ny nahariana an’izao rehetra izao: 1–2.3'
  - type: text
    content: 'Ny nidiran’ny fahotana sy ny vokany: 3'
  - type: text
    content: 'Ny nitomboan’ny fahotana sy ny nitomboan’ny taranak’olombelona: 4'
  - type: text
    content: 'Ny taranak’olombelona, hatramin’i Adama ka hatramin’i Noa: 6–10'
  - type: text
    content: 'Ilay tilikambo tao Babela: 11.1-9'
  - type: text
    content: 'Ny firazanan’i Abrahama, hatramin’i Sema: 11.10-32'
  - type: text
    content: 'Ireo Patriarka na ireo razamben’ny Israely: 12–50'
  - type: text
    content: 'Abrahama: 12–25'
  - type: text
    content: 'Isaka: 26–27'
  - type: text
    content: 'Jakoba: 28–49'
  - type: text
    content: 'Josefa: 37–50'
