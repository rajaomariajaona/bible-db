document_id: PSA.94,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Andriamanitra no Mpamaly ny tsy fahamarinana
  - type: text
    content: RY TOMPO, Andriamanitra Mpamaly ny natao ô,
  - type: text
    content: Andriamanitra, Mpamaly ny natao ô, misehoa ka mamirapirata!
  '10':
  - type: text
    content: 'Izay mampianatra ny '
  - type: text
    content: Jentilisa
  - type: text
    content: ' va tsy hananatra,'
  - type: text
    content: dia Izy izay mampianatra fahalalana ny olona?
  '11':
  - type: text
    content: NY TOMPO no mahalala ny hevitry ny olona
  - type: text
    content: fa zava-poana izany!
  '12':
  - type: text
    content: Sambatra izay olona anarinao, TOMPO ô,
  - type: text
    content: sady ampianarinao avy amin’ny lalànanao
  '13':
  - type: text
    content: mba homenao fitsaharana amin’ny andro fahoriana izy,
  - type: text
    content: mandra-pihady lavaka ho an’ny ratsy fanahy!
  '14':
  - type: text
    content: Fa NY TOMPO tsy mba hanary ny olony
  - type: text
    content: ary ny lovany dia tsy hafoiny.
  '15':
  - type: text
    content: Fa hiverina ho amin’ny fahamarinana ny fitsarana
  - type: text
    content: ary hanaraka izany ny mahitsy fo rehetra.
  '16':
  - type: text
    content: Iza no hitsangana hiaro ahy amin’ny mpanao ratsy?
  - type: text
    content: Iza no hijoro hiaro ahy amin’ny mpanao meloka?
  '17':
  - type: text
    content: Raha tsy NY TOMPO no Mpamonjy ahy
  - type: text
    content: dia vetivety dia efa nitoetra tao amin’ny mangingina aho.
  '18':
  - type: text
    content: 'Fony aho niteny hoe: Mangozohozo ny tongotro,'
  - type: text
    content: dia ny famindramponao, TOMPO ô, no nanohana ahy.
  '19':
  - type: text
    content: Raha be ny ahiahy ato anatiko
  - type: text
    content: dia mampifaly ahy ny fampiononanao.
  '2':
  - type: text
    content: Mitsangàna, ry Mpitsara ny tany ô,
  - type: text
    content: valio amin’izay tandrify azy ny mpiavonavona!
  '20':
  - type: text
    content: Hiray tetika Aminao va ireo mpitsara lozan-tany
  - type: text
    content: izay mamolavola fampahoriana araka ny lalànany?
  '21':
  - type: text
    content: Manao andiany hamely ny ain’ny marina ireo
  - type: text
    content: ka manameloka ny ran’ny tsy manan-tsiny.
  '22':
  - type: text
    content: Fa tonga fiarovana avo ho ahy NY TOMPO
  - type: text
    content: ary vatolampy fialofako Andriamanitro.
  '23':
  - type: text
    content: Ampanodiaviny azy ireo ny helony
  - type: text
    content: ka aringany noho ny faharatsiany izy;
  - type: text
    content: eny, aringan’NY TOMPO Andriamanitsika izy.
  '3':
  - type: text
    content: Mandra-pahoviana re ny ratsy fanahy, TOMPO ô,
  - type: text
    content: mandra-pahoviana re no mbola hiravoravo ny ratsy fanahy?
  '4':
  - type: text
    content: Mirezadrezatra sy manao teny an’avona izy;
  - type: text
    content: mirehareha ny mpanao ratsy rehetra.
  '5':
  - type: text
    content: Ny olonao, TOMPO ô, dia torotoroiny
  - type: text
    content: ary ny lovanao dia ampahoriany;
  '6':
  - type: text
    content: ny mpitondratena sy ny vahiny dia vonoiny
  - type: text
    content: ary ny kamboty dia matiny.
  '7':
  - type: text
    content: 'Fa hoy izy: Tsy mijery NY TOMPO,'
  - type: text
    content: tsy mandinika ny Andriamanitr’i Jakoba!
  '8':
  - type: text
    content: Mba mandiniha, ianareo olona ketrina;
  - type: text
    content: ary ianareo kely saina, rahoviana re no mba ho hendry ianareo?
  '9':
  - type: text
    content: Izay namboly ny sofina va tsy handre?
  - type: text
    content: Izay namolavola ny maso va tsy hahita?
