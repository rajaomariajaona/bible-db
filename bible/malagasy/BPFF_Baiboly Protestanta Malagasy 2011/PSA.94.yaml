document_id: PSA.94,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Andriamanitra no Mpamaly ny tsy fahamarinana
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: RY TOMPO, Andriamanitra Mpamaly ny natao ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Andriamanitra, Mpamaly ny natao ô, misehoa ka mamirapirata!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Izay mampianatra ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jentilisa
    - type: text
      text: ' va tsy hananatra,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia Izy izay mampianatra fahalalana ny olona?
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: NY TOMPO no mahalala ny hevitry ny olona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa zava-poana izany!
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Sambatra izay olona anarinao, TOMPO ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady ampianarinao avy amin’ny lalànanao
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: mba homenao fitsaharana amin’ny andro fahoriana izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mandra-pihady lavaka ho an’ny ratsy fanahy!
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Fa NY TOMPO tsy mba hanary ny olony
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny lovany dia tsy hafoiny.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Fa hiverina ho amin’ny fahamarinana ny fitsarana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hanaraka izany ny mahitsy fo rehetra.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Iza no hitsangana hiaro ahy amin’ny mpanao ratsy?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Iza no hijoro hiaro ahy amin’ny mpanao meloka?
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Raha tsy NY TOMPO no Mpamonjy ahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia vetivety dia efa nitoetra tao amin’ny mangingina aho.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Fony aho niteny hoe: Mangozohozo ny tongotro,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ny famindramponao, TOMPO ô, no nanohana ahy.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Raha be ny ahiahy ato anatiko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia mampifaly ahy ny fampiononanao.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Mitsangàna, ry Mpitsara ny tany ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: valio amin’izay tandrify azy ny mpiavonavona!
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Hiray tetika Aminao va ireo mpitsara lozan-tany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay mamolavola fampahoriana araka ny lalànany?
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Manao andiany hamely ny ain’ny marina ireo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka manameloka ny ran’ny tsy manan-tsiny.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Fa tonga fiarovana avo ho ahy NY TOMPO
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary vatolampy fialofako Andriamanitro.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Ampanodiaviny azy ireo ny helony
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka aringany noho ny faharatsiany izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, aringan’NY TOMPO Andriamanitsika izy.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Mandra-pahoviana re ny ratsy fanahy, TOMPO ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mandra-pahoviana re no mbola hiravoravo ny ratsy fanahy?
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Mirezadrezatra sy manao teny an’avona izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mirehareha ny mpanao ratsy rehetra.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Ny olonao, TOMPO ô, dia torotoroiny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny lovanao dia ampahoriany;
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ny mpitondratena sy ny vahiny dia vonoiny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny kamboty dia matiny.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Fa hoy izy: Tsy mijery NY TOMPO,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy mandinika ny Andriamanitr’i Jakoba!
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Mba mandiniha, ianareo olona ketrina;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ianareo kely saina, rahoviana re no mba ho hendry ianareo?
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Izay namboly ny sofina va tsy handre?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay namolavola ny maso va tsy hahita?
