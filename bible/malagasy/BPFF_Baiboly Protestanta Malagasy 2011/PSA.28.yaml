document_id: PSA.28
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Vavaky ny olona eo ambavahoanan’ny fahafatesana
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: Nataon’i Davida.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ianao no antsoiko, TOMPO ô!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ry Vatolampiko ô! Aza manentsin-tadìny amiko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fandrao raha mangina amiko Ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ho tahaka izay midina any an-davaka aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Mihainoa ny feon’ny fifonako rehefa mitaraina Aminao aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka manandratra ny tanako ho amin’ny fitoeranao ao amin’ny Masina Indrindra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Aza atao indray manakipaka amin’ny ratsy fanahy sy ny mpanao heloka aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ireny dia milaza fihavanana amin’ny namany, kanjo ratsy no ao am-pony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Manomeza azy araka ny asany sy ny faharatsian’ny ataony;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, manomeza azy araka ny asan’ny tanany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: valio araka izay mendrika azy izy!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Satria tsy mihevitra ny asan’NY TOMPO izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: na ny asan’ny tanany
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia aoka horavan’NY TOMPO izy fa tsy haoriny!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Isaorana anie NY TOMPO!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa efa nihaino ny feon’ny fifonako Izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: NY TOMPO no heriko sy ampingako;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izy no nitokian’ny foko ka voavonjy aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia mifaly ny foko
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka ny hirako no hiderako Azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: NY TOMPO no heriny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izy no fiarovana mafy hamonjena ny Voahosony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Vonjeo ny olonao ary tahio ny lovanao!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Andraso izy ka ento hatramin’ny mandrakizay.
