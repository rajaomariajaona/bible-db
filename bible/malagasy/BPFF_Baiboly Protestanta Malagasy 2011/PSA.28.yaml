document_id: PSA.28,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Vavaky ny olona eo ambavahoanan’ny fahafatesana
  - type: text
    content: Nataon’i Davida.
  - type: text
    content: Ianao no antsoiko, TOMPO ô!
  - type: text
    content: Ry Vatolampiko ô! Aza manentsin-tadìny amiko,
  - type: text
    content: fandrao raha mangina amiko Ianao
  - type: text
    content: dia ho tahaka izay midina any an-davaka aho.
  '2':
  - type: text
    content: Mihainoa ny feon’ny fifonako rehefa mitaraina Aminao aho
  - type: text
    content: ka manandratra ny tanako ho amin’ny fitoeranao ao amin’ny Masina Indrindra.
  '3':
  - type: text
    content: Aza atao indray manakipaka amin’ny ratsy fanahy sy ny mpanao heloka aho
  - type: text
    content: fa ireny dia milaza fihavanana amin’ny namany, kanjo ratsy no ao am-pony.
  '4':
  - type: text
    content: Manomeza azy araka ny asany sy ny faharatsian’ny ataony;
  - type: text
    content: eny, manomeza azy araka ny asan’ny tanany,
  - type: text
    content: valio araka izay mendrika azy izy!
  '5':
  - type: text
    content: Satria tsy mihevitra ny asan’NY TOMPO izy
  - type: text
    content: na ny asan’ny tanany
  - type: text
    content: dia aoka horavan’NY TOMPO izy fa tsy haoriny!
  '6':
  - type: text
    content: Isaorana anie NY TOMPO!
  - type: text
    content: Fa efa nihaino ny feon’ny fifonako Izy.
  '7':
  - type: text
    content: NY TOMPO no heriko sy ampingako;
  - type: text
    content: Izy no nitokian’ny foko ka voavonjy aho;
  - type: text
    content: dia mifaly ny foko
  - type: text
    content: ka ny hirako no hiderako Azy.
  '8':
  - type: text
    content: NY TOMPO no heriny,
  - type: text
    content: Izy no fiarovana mafy hamonjena ny Voahosony.
  '9':
  - type: text
    content: Vonjeo ny olonao ary tahio ny lovanao!
  - type: text
    content: Andraso izy ka ento hatramin’ny mandrakizay.
