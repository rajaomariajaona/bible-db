document_id: PSA.28,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Vavaky ny olona eo ambavahoanan’ny fahafatesana
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: Nataon’i Davida.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ianao no antsoiko, TOMPO ô!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ry Vatolampiko ô! Aza manentsin-tadìny amiko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fandrao raha mangina amiko Ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ho tahaka izay midina any an-davaka aho.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mihainoa ny feon’ny fifonako rehefa mitaraina Aminao aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka manandratra ny tanako ho amin’ny fitoeranao ao amin’ny Masina Indrindra.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aza atao indray manakipaka amin’ny ratsy fanahy sy ny mpanao heloka aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ireny dia milaza fihavanana amin’ny namany, kanjo ratsy no ao am-pony.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manomeza azy araka ny asany sy ny faharatsian’ny ataony;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, manomeza azy araka ny asan’ny tanany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: valio araka izay mendrika azy izy!
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Satria tsy mihevitra ny asan’NY TOMPO izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na ny asan’ny tanany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia aoka horavan’NY TOMPO izy fa tsy haoriny!
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Isaorana anie NY TOMPO!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa efa nihaino ny feon’ny fifonako Izy.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: NY TOMPO no heriko sy ampingako;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izy no nitokian’ny foko ka voavonjy aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia mifaly ny foko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka ny hirako no hiderako Azy.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: NY TOMPO no heriny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izy no fiarovana mafy hamonjena ny Voahosony.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vonjeo ny olonao ary tahio ny lovanao!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Andraso izy ka ento hatramin’ny mandrakizay.
