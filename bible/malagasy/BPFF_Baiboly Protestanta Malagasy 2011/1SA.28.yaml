document_id: 1SA.28,3103
type_code: plt
verses:
  '1':
  - type: text
    content: 'Tamin’izany andro izany ny Filistina dia namory ny miaramilany mba hanafika ny Israely. Ary hoy i Akisy tamin’i Davida: Aoka ho fantatrao tsara fa hiara-mandeha amiko hanafika ianao sy ny olonao. '
  '10':
  - type: text
    content: 'Ary nianiana tamin’NY TOMPO i Saoly ka niteny taminy hoe: Raha velona koa NY TOMPO dia tsy hisy heloka hahazo anao amin’izao zavatra izao. '
  '11':
  - type: text
    content: 'Hoy Ravehivavy: Iza ary no hampiakariko ho eto aminao? Ary hoy izy: I Samoela no ampiakaro ho eto amiko.'
  '12':
  - type: text
    content: 'Nony hitan-dRavehivavy i Samoela, dia nidradradradra tamin’ny feo mahery izy ka niteny tamin’i Saoly hoe: Nahoana no namitaka ahy ianao? I Saoly ianao. '
  '13':
  - type: text
    content: 'Hoy ny mpanjaka taminy: Aza matahotra! Inona no hitanao? Hoy Ravehivavy tamin’i Saoly: Mahita andriamanitra miakatra avy amin’ny tany aho. '
  '14':
  - type: text
    content: 'Ary hoy izy taminy: Manao ahoana ny endriny? Dia hoy izy: Lehilahy antitra manao akanjobe ivelany no miakatra. Dia fantatr’i Saoly fa i Samoela izay ka niankohoka niondrika tamin’ny tany izy. '
  '15':
  - type: text
    content: 'Hoy i Samoela tamin’i Saoly: Nahoana no helingeleninao aho ka ampiakarinao? Dia hoy i Saoly: Sahirana loatra aho, fa miady amiko ny Filistina nefa Andriamanitra efa nahafoy ahy ka tsy mamaly teny ahy intsony, na amin’ny alalan’ny mpaminany, na amin’ny nofy; koa izany no niantsoako anao mba hampahafantaranao ahy izay hataoko. '
  '16':
  - type: text
    content: 'Hoy i Samoela: Nahoana no manontany amiko ianao, nefa NY TOMPO efa mahafoy anao ka tonga fahavalonao? '
  '17':
  - type: text
    content: 'NY TOMPO efa nanatanteraka izay nampilazainy ahy; fa efa nendahin’NY TOMPO hiala amin’ny tananao ny fanjakana ka nomeny olon-kafa, dia i Davida. '
  '18':
  - type: text
    content: 'Satria tsy nihaino ny feon’NY TOMPO ianao ka tsy nahatanteraka ny fahatezerany mirehitra tamin’ny Amalekita, dia izany no nanaovan’NY TOMPO izao zavatra izao taminao androany. '
  '19':
  - type: text
    content: 'Indray hatolotry NY TOMPO ho eo an-tanan’ny Filistina ny tenanao sy ny Israely; ary rahampitso dia ho etỳ amiko ianao sy ny zanakao; ary ny miaramilan’ny Israely koa dia hatolotry NY TOMPO ho eo an-tanan’ny Filistina. '
  '2':
  - type: text
    content: 'Hoy i Davida tamin’i Akisy: Ho fantatrao amin’izao tokoa izay hain’ny mpanomponao atao. Hoy kosa i Akisy tamin’i Davida: Raha izany dia hataoko mpiambina ahy manokana mandrakizay ianao.'
  - type: heading
    content: Nanatona vehivavy mpanontany amin’ny maty tao Eny-Dora i Saoly
  '20':
  - type: text
    content: Dia lavo niampatra tamin’ny tany niaraka tamin’izay i Saoly ka raiki-tahotra indrindra noho ny tenin’i Samoela, sady efa tsy nisy hery intsony izy, satria tsy nihinan-kanina indray andro sy indray alina maninjitra.
  '21':
  - type: text
    content: 'Nankao amin’i Saoly Ravehivavy ka nahita azy raiki-tahotra indrindra dia niteny taminy hoe: Indro, ny mpanompovavinao nihaino ny feonao dia nanao ny aiko tsy ho zavatra aho ka nihaino ny teninao izay nolazainao tamiko. '
  '22':
  - type: text
    content: 'Koa ankehitriny, miangavy anao aho, mba henoy kosa ny tenin’ny mpanompovavinao, ary aoka aho handroso sombin-kanina kely eo anoloanao; dia hano izany mba ho tanjaka ho anao rehefa handeha amin’ny alehanao ianao. '
  '23':
  - type: text
    content: 'Fa nandà izy hoe: Tsy hihinana aho. Ny mpanompony sy Ravehivavy anefa dia mbola nanery azy ihany, hany ka nihaino ny feony ihany izy. Dia nitsangana avy teo amin’ny tany izy ka nipetraka teo am-parafara. '
  '24':
  - type: text
    content: 'Ary Ravehivavy dia nanana zanak’omby mifahy tao an-trano; dia nandeha haingana izy ka namono izany, ary naka koba izy dia nofetafetainy ka nendasiny ho mofo tsy misy masirasira. '
  '25':
  - type: text
    content: Dia narosony teo anoloan’i Saoly sy teo anoloan’ny mpanompony izany ka nihinana izy ireo, dia niainga ary lasa nandeha tamin’iny alina iny ihany.
  '3':
  - type: text
    content: Efa maty i Samoela, ary ny Israely rehetra dia nisaona azy sy nandevina azy tao Rama, tao an-tanànany. Efa noroahin’i Saoly hiala amin’ny tany koa izay mpanontany amin’ny maty sy izay mpanandro.
  '4':
  - type: text
    content: 'Ary nivory ny Filistina dia tonga nitoby tao Sonema, fa i Saoly kosa dia namory ny Israely rehetra ka nitoby tao Gilboa. '
  '5':
  - type: text
    content: 'Raha nahita ny miaramilan’ny Filistina i Saoly dia raiki-tahotra sady niemponempona tokoa ny fony. '
  '6':
  - type: text
    content: Dia nanontany tamin’NY TOMPO i Saoly nefa tsy namaly azy NY TOMPO, na tamin’ny nofy, na tamin’ny Orima, na tamin’ny mpaminany.
  '7':
  - type: text
    content: 'Hoy i Saoly tamin’ny mpanompony: Itadiavo vehivavy mpanontany amin’ny maty aho hankanesako any hanontaniako aminy. Ary hoy ny mpanompony taminy: Indro, misy vehivavy mpanontany amin’ny maty ao Eny-Dora. '
  '8':
  - type: text
    content: 'Dia nanova tarehy i Saoly ka niakanjo fitafiana hafa. Ary nandeha niaraka tamin’ny olona roa lahy izy ka tonga tao amin-dRavehivavy nony alina. Hoy izy: Miangavy anao aho, manaova sikidy ho ahy hiantso fanahin’ny maty iray ka ampiakaro ho eto amiko izay hotononiko aminao. '
  '9':
  - type: text
    content: 'Hoy Ravehivavy taminy: Indro, fantatrao izay nataon’i Saoly tamin’ny namongorany ny mpanontany amin’ny maty sy ny mpanandro hiala amin’ny tany; koa nahoana ianao no mamandrika ny aiko hahafaty ahy? '
