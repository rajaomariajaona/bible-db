document_id: 1SA.11,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nandresen’i Saoly ny Amonita
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary niakatra i Nahasy amonita ka nitoby tandrifin’i Jabesy-Gileada; dia hoy ny mponina rehetra tao Jabesy tamin’i Nahasy: Manaova fanekena aminay, dia hanompo anao izahay. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy ny mponina tao Jabesy: Rahampitso no hivoahanay ho eny aminareo ka hataonareo aminay izay rehetra sitrakareo.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nony maraina dia nozarain’i Saoly ho telo toko ny olona ka tonga teo amin’ny toby izy ireo tamin’ny fotoam-piambenana maraina, ary namely ny Amonita mandra-pahafampanan’ny andro. Izay sisa kosa dia niely patrana ka tsy nisy na dia olona roa aza tafaraka.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nanamafisana ny maha mpanjaka an’i Saoly
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy ny vahoaka tamin’i Samoela: Iza moa no niteny hoe: I Saoly va no hanjaka aminay? Atolory anay ireny olona ireny hovonoinay ho faty. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nefa hoy i Saoly: Tsy hisy olona hovonoina ho faty anio; fa androany no nanaovan’NY TOMPO famonjena teo amin’ny Israely. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy i Samoela tamin’ny vahoaka: Andeha isika hankany Gilgala hanamafy ny fanjakana any. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia lasa nankany Gilgala ny vahoaka manontolo, ary tany Gilgala no nananganany an’i Saoly ho mpanjaka teo anatrehan’NY TOMPO; tany koa no nanolorany fanati-pihavanana teo anatrehan’NY TOMPO, dia nifaly indrindra teo i Saoly mbamin’ny lehilahin’ny Israely rehetra.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy i Nahasy amonita: Izao no hanaovako fanekena aminareo: Hopotsirina ny masonareo havanana rehetra ka hataoko fandatsana ny Israely rehetra izany. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nefa hoy ny loholon’i Jabesy taminy: Omeo hafitoana izahay mba hanirahanay olona ho any amin’ny tanin’ny Israely rehetra, koa raha toa tsy misy olona hamonjy anay dia handeha hanatona anao izahay. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia tonga tany Gibean’i Saoly ny iraka ka nanambara ny teniny teo anatrehan’ny vahoaka; dia nanandratra ny feony ny vahoaka rehetra ka nitomany.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary indro, tonga avy tany an-tsaha i Saoly, sady nandroaka omby no niteny hoe: Inona izato manjo ny olona no mitomany izy? Ary nambarany azy ny tenin’ny mponina tao Jabesy. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia tonga tamin’i Saoly ny Fanahin’Andriamanitra teo am-pandrenesana izany teny izany ka nirehitra mafy ny hatezerany. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia naka omby roa izy ka norasainy ireo ary nampitondrainy ny iraka ho any amin’ny faritry ny tanin’ny Israely rehetra ka hoy izy: Na iza na iza no tsy mandeha hanaraka an’i Saoly sy i Samoela dia tahaka ireny no hanaovana ny ombiny. Dia nahazo ny olona ny fahatahorana NY TOMPO ka nandeha toy ny olona iray izy. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nandamina azy tany Bezeka i Saoly. Telo hetsy no isan’ny Zanak’Israely ary telo alina no isan’ny lehilahin’ny Joda. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy i Saoly tamin’ny iraka izay tonga teo: Izao no holazainareo amin’ny mponina ao Jabesy-Gileada: Rahampitso, rehefa mafampana iny ny andro dia hisy famonjena ho anareo. Dia tonga ny iraka ka nanambara izany tamin’ny mponina tao Jabesy, dia faly ireo. '
