document_id: EXO.24,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nanaovan’Andriamanitra fanekena tamin’ny Israely
  - type: text
    content: 'Ary hoy Izy tamin’i Mosesy: Miakara any amin’NY TOMPO ianao sy i Arona, i Nadaba, i Abiho ary fitopolo lahy amin’ny loholon’ny Israely ka miankohofa eny lavitra eny ianareo. '
  '10':
  - type: text
    content: 'Dia nahita ny Andriamanitry ny Israely izy ireo; ny teo ambanin’ny tongony dia toy ny fanganohanon’ny safira vita rarivato, toy ny lanitra mihitsy ny famirapiratany. '
  '11':
  - type: text
    content: Nefa tsy nanatsotra ny tanany tamin’ireo lehiben’ny Zanak’Israely Izy, dia nahita an’Andriamanitra izy ireo ary nihinana sy nisotro.
  - type: heading
    content: Mihaona amin’Andriamanitra ao an-tendrombohitra i Mosesy
  '12':
  - type: text
    content: 'Ary hoy NY TOMPO tamin’i Mosesy: Miakara eto Amiko eto an-tendrombohitra ka mitoera eto dia homeko anao ny vato fisaka izay misy ny lalàna sy ny didy izay nosoratako mba hampianarina azy ireo.'
  '13':
  - type: text
    content: 'Dia niainga i Mosesy sy i Josoa mpanompony ka i Mosesy dia niakatra nankao amin’ny tendrombohitr’Andriamanitra. '
  '14':
  - type: text
    content: 'Ary hoy izy tamin’ny loholona: Andraso eto izahay mandra-piverinay eto aminareo. Indro i Arona sy i Hora dia eto aminareo; koa raha misy olona manana ady, aoka hankeo amin’izy roalahy izy. '
  '15':
  - type: text
    content: 'Dia niakatra tao amin’ny tendrombohitra i Mosesy, ary ny rahona dia nanarona ny tendrombohitra. '
  '16':
  - type: text
    content: 'Ary ny voninahitry NY TOMPO nitoetra teo ambonin’ny tendrombohitra Sinay, ary ny rahona dia nanarona azy henemana. Fa tamin’ny andro fahafito Izy no niantso an’i Mosesy teo afovoan’ny rahona. '
  '17':
  - type: text
    content: 'Ary tahaka ny afo mandevona no fijery ny voninahitry NY TOMPO teo an-tampon’ny tendrombohitra teo imason’ny Zanak’Israely. '
  '18':
  - type: text
    content: Dia niditra tao afovoan’ny rahona i Mosesy ka niakatra nankao amin’ny tendrombohitra. Ary nitoetra tao amin’ny tendrombohitra efapolo andro sy efapolo alina izy.
  '2':
  - type: text
    content: I Mosesy irery no hanakaiky NY TOMPO, fa ireo hafa dia tsy hanakaiky, ary ny olona koa dia tsy hiakatra miaraka aminy.
  '3':
  - type: text
    content: 'Dia tonga nanambara tamin’ny olona ny teny rehetra izay nolazain’NY TOMPO sy ny fitsipika rehetra i Mosesy. Ary niara-niredona namaly ny olona rehetra hoe: Ny teny rehetra izay nolazain’NY TOMPO dia hotanterahinay.'
  '4':
  - type: text
    content: 'Ary nanoratra ny teny rehetra nolazain’NY TOMPO i Mosesy, dia nifoha vao maraina izy ka nanorina alitara teo am-pototry ny tendrombohitra sy tsangambato roa amby folo, araka ireo fokon’ny Israely roa amby folo. '
  '5':
  - type: text
    content: Dia naniraka ny zatovo teo amin’ny Zanak’Israely izy ka nitondra fanatitra dorana manontolo ireo sady namono vantotra ombilahy hatao fanati-pihavanana ho an’NY TOMPO.
  '6':
  - type: text
    content: 'Ary nalain’i Mosesy ny antsasaky ny ra ka nataony tao anaty lovia, ary ny antsasaky ny ra kosa dia nafafiny teo amin’ny alitara. '
  '7':
  - type: text
    content: 'Dia naka ny bokin’ny fanekena izy ka namaky azy teo anatrehan’ny olona. Ary hoy ny olona: Izay rehetra nolazain’NY TOMPO dia hotanterahinay sy hekenay.'
  '8':
  - type: text
    content: 'Ary nalain’i Mosesy ny ra ka nafafiny tamin’ny olona, sady hoy izy: Indro ny ran’ny fanekena izay nataon’NY TOMPO taminareo ny amin’izany teny rehetra izany.'
  '9':
  - type: text
    content: 'Dia niakatra i Mosesy, i Arona, i Nadaba, i Abiho ary fitopolo lahy tamin’ny loholon’ny Israely. '
