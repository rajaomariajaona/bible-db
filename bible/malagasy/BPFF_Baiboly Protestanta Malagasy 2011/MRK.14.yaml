document_id: MRK.14
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny teti-dratsy hamonoana an’i Jesosy
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat 26.1-5; Lio 22.1-2
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Rehefa indroa andro no sisa tsy hahatongavan’ny Paska izay fihinanana ny mofo tsy misy masirasira dia nitady hisambotra an’i Jesosy tamin’ny fitaka ireo lehiben’ny mpisorona sy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpanoradalàna
  - type: text
    text: ' mba hamonoany Azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Nefa hoy ireo: Tsy amin’ny andro firavoravoana, fandrao hampitabataba ny vahoaka.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nanosorana menaka manitra an’i Jesosy tany Betania
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat 26.6-13; ampit. Lio 7.36-50; Jao 12.1-8
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary nony tany Betania Jesosy ka nipetraka nisakafo tao an-tranon’i Simona boka dia avy ity vehivavy iray izay nitondra tavoara alabasitara feno menaka manitra nisy narda tena sarobidy; novakiny ny tavoara ka nararany tamin’ny lohan’i Jesosy ny menaka manitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary tezitra ny sasany ka nifampilaza hoe: Inona no anton’izao fandaniam-poana ny menaka manitra izao? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Fa azo namidy lafo mihoatra ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: denaria
  - type: text
    text: ' telonjato iny menaka manitra iny ka ho nomena ny mahantra! Dia tezitra indrindra tamin-dRavehivavy ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Fa hoy Jesosy taminy: Avelao izy. Nahoana ianareo no manao izay mampalahelo azy? Asa soa no nataony Tamiko. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Fa ny mahantra dia eto aminareo mandrakariva, ary na oviana na oviana no tianareo hanaovana soa aminy dia mahazo manao izany ianareo; fa Izaho kosa dia tsy mba ho eto aminareo mandrakariva. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Efa nanao izay azony natao izy: Nanosotra mialoha ny tenako izy hanamboarany Ahy halevina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary lazaiko aminareo marina tokoa: Na aiza na aiza no hitoriana ny Filazantsara eto amin’izao tontolo izao dia hotantaraina koa izao nataon-dRavehivavy izao mba ho fahatsiarovana azy.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny naneken’i Jodasy hamadika an’i Jesosy
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat 26.14-16; Lio 22.3-6
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary i Jodasy iskariota, ilay isan’ny roa amby folo lahy, dia nankao amin’ireo lehiben’ny mpisorona mba hanolotra an’i Jesosy amin’ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Rehefa nandre izany izy ireo dia faly ka nampanantena fa hanome vola azy. Ary i Jodasy dia nitady izay andro hahazoany manolotra Azy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny niarahan’i Jesosy sy ny mpianany nihinana ny Paska
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat 26.17-19; Lio 22.7-13
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Tamin’ny andro voalohany amin’ny fihinanana ny mofo tsy misy masirasira, izay famonoana ny Paska, dia hoy ny mpianany Taminy: Aiza no tianao handehananay hanomanana ny sakafon’ny Paska ho Anao? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dia naniraka roa lahy tamin’ny mpianany Izy ka niteny taminy hoe: Mankanesa any an-tanàna, ary hisy lehilahy mitondra siny feno rano hifanena aminareo; dia manaraha azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary lazao amin’ny tompon’ny trano izay hidirany hoe: Izao no lazain’ny Mpampianatra: Aiza ny efitrano hiarahako mihinana ny Paska amin’ny mpianatro? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary izy no hanoro anareo efitrano malalaka ambony rihana izay efa misy izay ilaina rehetra sady voavoatra tsara; any ianareo no manomana ho antsika. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ary nandeha ny mpianatra dia tonga tany an-tanàna ka nahita araka izay nolazainy taminy; dia nanomana ny Paska izy ireo.
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat 26.20-25; Lio 22.21-23; Jao 13.21-26
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Nony hariva ny andro dia tonga niaraka tamin’ny roa amby folo lahy Izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary raha nipetraka nisakafo izy ireo dia hoy Jesosy: Lazaiko aminareo marina tokoa fa ny iray aminareo no hamadika Ahy, dia izay miara-mihinana Amiko. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Dia nalahelo izy ireo ka nanomboka nanontany an’i Jesosy ny tsirairay hoe: Izaho va izany? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary niteny tamin’izy ireo Izy hoe: Izay iray aminareo roa amby folo lahy miara-manatsoboka ny tanany Amiko ao anatin’ny lovia no izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Fa ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Zanak’Olona
  - type: text
    text: ' dia mandeha araka izay voasoratra momba Azy, nefa lozan’izay olona hahatonga ny Zanak’Olona ho voatolotra! Tsara ho an’izany olona izany raha tsy teraka akory izy.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nanorenana ny Fanasan’ny Tompo
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat 26.26-29; Lio 22.15-20; ampit. 1Kor 11.23-26
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary raha mbola nisakafo izy ireo dia nandray mofo Jesosy, koa nony efa nisaotra Izy dia novakiny ka natolony azy ireo sady nataony hoe: Raiso, ity no tenako. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Dia nandray kapoaka Izy ka nony efa nisaotra dia natolony azy ireo ary nisotroan’izy rehetra izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Dia hoy Izy taminy: Ity no rako amin’ny fanekena izay alatsaka hamonjy ny maro. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Lazaiko aminareo marina tokoa: Tsy mba hisotro ny vokatry ny voaloboka intsony Aho mandra-piavin’ny andro hisotroako izay vaovao any amin’ny fanjakan’Andriamanitra.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nambaran’i Jesosy fa handa Azy i Petera
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat 26.30-35; Lio 22.31-34; Jao 13.36-38
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Rehefa avy nihira fiderana izy ireo dia lasa nankany an-tendrombohitra Oliva.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ary hoy Jesosy taminy: Ho tafintohina avokoa ianareo rehetra; fa voasoratra hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Hamely ny mpiandry Aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hihahaka ny ondry» (Zak 13.7).
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Fa rehefa tafatsangana amin’ny maty Aho dia hialoha anareo any Galilia. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Fa hoy i Petera Taminy: Na dia ho tafintohina avokoa aza ny olona rehetra, izaho dia tsy mba ho tafintohina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Dia hoy Jesosy taminy: Lazaiko aminao marina tokoa: Anio, amin’ity alina ity ihany, raha mbola tsy misy akoho maneno fanindroany, dia handa Ahy intelo ianao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Fa vao mainka nanamafy izy hoe: Na dia tsy maintsy ho faty miaraka Aminao aza aho dia tsy mba handa Anao mihitsy. Ary toy izany koa no nolazain’izy rehetra.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny vavaka nataon’i Jesosy tao Getsemane
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat 26.36-46; Lio 22.39-46
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Ary tonga tany amin’ny saha iray atao hoe Getsemane izy ireo; dia hoy Jesosy tamin’ny mpianany: Mipetraha eto ianareo fa handeha hivavaka Aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ary Jesosy nitondra an’i Petera sy i Jakoba ary i Jaona niaraka Taminy, dia nanomboka nangorohoro sady ory fatratra Izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Dia hoy Izy tamin’ireo: Fadiranovana loatra toy ny efa ho faty ny fanahiko; mitoera eto ka miareta tory. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Ary nony nandroso kelikely Izy dia niankohoka tamin’ny tany ka nivavaka mba hialan’izany ora izany Aminy, raha azo atao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Ary hoy Izy: Aba, Ray ô, ny zavatra rehetra hainao; esory Amiko ity kapoaka ity. Nefa aoka tsy ny sitrapoko anie no hatao fa ny Anao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Ary niverina Izy ka nahita azy ireo matory dia hoy Izy tamin’i Petera: Ry Simona, matory va ianao? Tsy mahazaka miari-tory na dia ora iray ihany aza va ianao? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Miareta tory ianareo ka mivavaha mba tsy hidiranareo amin’ny fakam-panahy; mety ihany ny fanahy fa ny nofo no tsy manan-kery. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Dia lasa indray Izy niverina nivavaka ka namerina ilay teny teo ihany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Nony niverina indray Izy dia nahita azy ireo matory, ary efa nilondolondo ny masony ka tsy hitany izay havaliny Azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Ary niverina fanintelony Izy dia niteny taminy hoe: Mbola matory ihany ianareo ka miala sasatra. Ampy izay. Tonga ny fotoanandro; indro ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Zanak’Olona
  - type: text
    text: ' hatolotra eo an-tanan’ny mpanota. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: Mitsangàna, andeha isika; fa indro, efa manakaiky ilay manolotra Ahy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nisamborana an’i Jesosy
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat 26.47-56; Lio 22.47-53; Jao 18.2-12
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Niaraka tamin’izay, raha mbola niteny Izy, dia avy i Jodasy, iray amin’ny roa amby folo lahy, ary nisy vahoaka niaraka taminy, nitondra sabatra sy langilangy, nirahin’ireo lehiben’ny mpisorona sy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpanoradalàna
  - type: text
    text: ' ary ny loholona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Ary ilay hanolotra Azy dia efa nanome famantarana tamin’ireo ka niteny hoe: Izay horohako no Izy; sambory Izy ka ento dia ataovy tsara ambina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Ary raha vao tonga izy ka nanatona an’i Jesosy dia niteny hoe: Raby ô! Sady nanoroka Azy izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Ary nanatsotra ny tanany Taminy ny olona ka nisambotra Azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Ary nanatsoaka ny sabany ny iray tamin’ireo izay nanatrika teo dia nikapoka ny mpanompon’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Mpisoronabe
  - type: text
    text: ' ka nahafaka ny sofiny.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Dia niteny taminy Jesosy hoe: Tonga mitondra sabatra sy langilangy hisambotra Ahy toy ny fisambotra jiolahy va ianareo? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: Teo aminareo isanandro Aho, nampianatra tao amin’ny tempoly, nefa tsy nisambotra Ahy ianareo; fa mba hahatanteraka ny Soratra Masina izao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Ary samy nandao Azy izy rehetra ka nandositra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'Ary nisy zatovo iray nanaraka Azy, tsy nitafy afa-tsy lamba hariry madinika, ary nosamborin’ny olona teo izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: Dia navelany teny amin’ireo mpisambotra azy ny lambany hariry madinika ka nandositra nitanjaka izy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nitsaran’ny Sinedriona an’i Jesosy
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat 26.57-58; Lio 22.54-55, 63-71; Jao 18.12-15
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'Ary nitondra an’i Jesosy ho any amin’ny Mpisoronabe izy ireo; ary nivory ireo lehiben’ny mpisorona rehetra sy ireo loholona ary ireo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpanoradalàna
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: 'Ary i Petera dia nanaraka Azy teny lavidavitra teny hatrany anatin’ny kianjan’ny tranon’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Mpisoronabe
  - type: text
    text: . Ary niara-nipetraka teo amin’ny mpiandry raharaha izy ka namindro teo anilan’ny afo.
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat 26.59-68; Lio 22.63-71; Jao 18.19-24
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: 'Ary ireo lehiben’ny mpisorona sy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Sinedriona
  - type: text
    text: ' manontolo dia nitady zavatra hiampangana an’i Jesosy ka hamonoany Azy ho faty, nefa tsy nahita. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: 'Fa maro no niampanga lainga Azy, nefa tsy nifanaraka ny fanambaràny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: 'Dia nitsangana ny sasany ka niampanga lainga Azy hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: 'Izahay nandre Azy niteny hoe: Izaho handrava ity tempoly nataon-tanana ity ary amin’ny hateloana dia hanangana hafa izay tsy nataon-tanana Aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '59'
  - type: text
    text: 'Tsy nifanaraka anefa ny filazany na dia tamin’izany aza. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '60'
  - type: text
    text: 'Dia nitsangana ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Mpisoronabe
  - type: text
    text: ' ka nankeo afovoany nanontany an’i Jesosy hoe: Tsy manan-kavaly va Ianao? Inona no iampangan’ireto Anao? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '61'
  - type: text
    text: 'Fa tsy niteny Jesosy sady tsy namaly akory. Dia nanontany Azy indray ny Mpisoronabe ka niteny taminy hoe: Ianao va no '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ', Zanaky ny Isaorana? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '62'
  - type: text
    text: 'Dia hoy Jesosy: Izaho no Izy. Ary ho hitanareo ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Zanak’Olona
  - type: text
    text: ' mipetraka eo ankavanan’ny Hery sady avy eny amin’ny rahon’ny lanitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '63'
  - type: text
    text: 'Ary nandriatra ny fitafiany ny Mpisoronabe ka nilaza hoe: Inona indray no mbola ilantsika vavolombelona? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '64'
  - type: text
    text: Efa renareo ny fitenenan-dratsy ka ahoana ny hevitrareo? Dia nanameloka Azy ho mendrika ho faty izy rehetra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '65'
  - type: text
    text: 'Ary nanomboka nandrora Azy ny sasany dia nanarona ny tavany sady namely tehamaina Azy ka niteny hoe: Maminania! Ary namely Azy tamin’ny tehamaina koa ireo mpiandry raharaha.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nandavan’i Petera an’i Jesosy
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat 26.69-75; Lio 22.56-62; Jao 18.17, 25-27
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '66'
  - type: text
    text: 'Ary raha mbola teo ambany, teo an-kianja i Petera, dia avy ny iray tamin’ny ankizivavin’ny Mpisoronabe. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '67'
  - type: text
    text: 'Nony nahita an’i Petera namindro izy dia nijery azy ary niteny hoe: Ianao koa dia niaraka tamin’Ilay Nazareana atao hoe Jesosy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '68'
  - type: text
    text: 'Nandà anefa izy ka niteny hoe: Sady tsy fantatro no tsy azoko ny teninao. Dia nandeha nankany ivelany ho any amin’ny vavahady izy, ary nisy akoho naneno tamin’izay.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '69'
  - type: text
    text: 'Ary nahita azy ilay ankizivavy ka namerina niteny tamin’ireo izay nanatrika teo fa io lehilahy io dia naman-dry zareo ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '70'
  - type: text
    text: 'Fa mbola nandà indray izy. Nony afaka kelikely, ireo izay nanatrika teo, dia niteny indray tamin’i Petera hoe: Marina mihitsy fa anisan’ireny ianao; fa Galiliana koa ianao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '71'
  - type: text
    text: 'Dia niozona sy nianiana izy hoe: Tsy fantatro izany Lehilahy lazainareo izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '72'
  - type: text
    text: 'Ary niaraka tamin’izay dia nisy akoho naneno fanindroany. Ary tsaroan’i Petera ny teny izay nolazain’i Jesosy taminy hoe: Raha mbola tsy misy akoho maneno fanindroany dia handa Ahy intelo ianao. Dia niala teo izy sady nigogogogo nitomany.'
