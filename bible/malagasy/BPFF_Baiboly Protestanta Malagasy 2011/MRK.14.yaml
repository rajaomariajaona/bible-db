document_id: MRK.14,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny teti-dratsy hamonoana an’i Jesosy
  - type: heading
    content: Mat 26.1-5; Lio 22.1-2
  - type: text
    content: 'Rehefa indroa andro no sisa tsy hahatongavan’ny Paska izay fihinanana ny mofo tsy misy masirasira dia nitady hisambotra an’i Jesosy tamin’ny fitaka ireo lehiben’ny mpisorona sy ny '
  - type: text
    content: mpanoradalàna
  - type: text
    content: ' mba hamonoany Azy. '
  '10':
  - type: text
    content: 'Ary i Jodasy iskariota, ilay isan’ny roa amby folo lahy, dia nankao amin’ireo lehiben’ny mpisorona mba hanolotra an’i Jesosy amin’ireo. '
  '11':
  - type: text
    content: Rehefa nandre izany izy ireo dia faly ka nampanantena fa hanome vola azy. Ary i Jodasy dia nitady izay andro hahazoany manolotra Azy.
  - type: heading
    content: Ny niarahan’i Jesosy sy ny mpianany nihinana ny Paska
  - type: heading
    content: Mat 26.17-19; Lio 22.7-13
  '12':
  - type: text
    content: 'Tamin’ny andro voalohany amin’ny fihinanana ny mofo tsy misy masirasira, izay famonoana ny Paska, dia hoy ny mpianany Taminy: Aiza no tianao handehananay hanomanana ny sakafon’ny Paska ho Anao? '
  '13':
  - type: text
    content: 'Dia naniraka roa lahy tamin’ny mpianany Izy ka niteny taminy hoe: Mankanesa any an-tanàna, ary hisy lehilahy mitondra siny feno rano hifanena aminareo; dia manaraha azy. '
  '14':
  - type: text
    content: 'Ary lazao amin’ny tompon’ny trano izay hidirany hoe: Izao no lazain’ny Mpampianatra: Aiza ny efitrano hiarahako mihinana ny Paska amin’ny mpianatro? '
  '15':
  - type: text
    content: 'Ary izy no hanoro anareo efitrano malalaka ambony rihana izay efa misy izay ilaina rehetra sady voavoatra tsara; any ianareo no manomana ho antsika. '
  '16':
  - type: text
    content: Ary nandeha ny mpianatra dia tonga tany an-tanàna ka nahita araka izay nolazainy taminy; dia nanomana ny Paska izy ireo.
  - type: heading
    content: Mat 26.20-25; Lio 22.21-23; Jao 13.21-26
  '17':
  - type: text
    content: 'Nony hariva ny andro dia tonga niaraka tamin’ny roa amby folo lahy Izy. '
  '18':
  - type: text
    content: 'Ary raha nipetraka nisakafo izy ireo dia hoy Jesosy: Lazaiko aminareo marina tokoa fa ny iray aminareo no hamadika Ahy, dia izay miara-mihinana Amiko. '
  '19':
  - type: text
    content: 'Dia nalahelo izy ireo ka nanomboka nanontany an’i Jesosy ny tsirairay hoe: Izaho va izany? '
  '2':
  - type: text
    content: 'Nefa hoy ireo: Tsy amin’ny andro firavoravoana, fandrao hampitabataba ny vahoaka.'
  - type: heading
    content: Ny nanosorana menaka manitra an’i Jesosy tany Betania
  - type: heading
    content: Mat 26.6-13; ampit. Lio 7.36-50; Jao 12.1-8
  '20':
  - type: text
    content: 'Ary niteny tamin’izy ireo Izy hoe: Izay iray aminareo roa amby folo lahy miara-manatsoboka ny tanany Amiko ao anatin’ny lovia no izy. '
  '21':
  - type: text
    content: 'Fa ny '
  - type: text
    content: Zanak’Olona
  - type: text
    content: ' dia mandeha araka izay voasoratra momba Azy, nefa lozan’izay olona hahatonga ny Zanak’Olona ho voatolotra! Tsara ho an’izany olona izany raha tsy teraka akory izy.'
  - type: heading
    content: Ny nanorenana ny Fanasan’ny Tompo
  - type: heading
    content: Mat 26.26-29; Lio 22.15-20; ampit. 1Kor 11.23-26
  '22':
  - type: text
    content: 'Ary raha mbola nisakafo izy ireo dia nandray mofo Jesosy, koa nony efa nisaotra Izy dia novakiny ka natolony azy ireo sady nataony hoe: Raiso, ity no tenako. '
  '23':
  - type: text
    content: 'Dia nandray kapoaka Izy ka nony efa nisaotra dia natolony azy ireo ary nisotroan’izy rehetra izany. '
  '24':
  - type: text
    content: 'Dia hoy Izy taminy: Ity no rako amin’ny fanekena izay alatsaka hamonjy ny maro. '
  '25':
  - type: text
    content: 'Lazaiko aminareo marina tokoa: Tsy mba hisotro ny vokatry ny voaloboka intsony Aho mandra-piavin’ny andro hisotroako izay vaovao any amin’ny fanjakan’Andriamanitra.'
  - type: heading
    content: Nambaran’i Jesosy fa handa Azy i Petera
  - type: heading
    content: Mat 26.30-35; Lio 22.31-34; Jao 13.36-38
  '26':
  - type: text
    content: Rehefa avy nihira fiderana izy ireo dia lasa nankany an-tendrombohitra Oliva.
  '27':
  - type: text
    content: 'Ary hoy Jesosy taminy: Ho tafintohina avokoa ianareo rehetra; fa voasoratra hoe:'
  - type: text
    content: «Hamely ny mpiandry Aho
  - type: text
    content: dia hihahaka ny ondry» (Zak 13.7).
  '28':
  - type: text
    content: 'Fa rehefa tafatsangana amin’ny maty Aho dia hialoha anareo any Galilia. '
  '29':
  - type: text
    content: 'Fa hoy i Petera Taminy: Na dia ho tafintohina avokoa aza ny olona rehetra, izaho dia tsy mba ho tafintohina. '
  '3':
  - type: text
    content: 'Ary nony tany Betania Jesosy ka nipetraka nisakafo tao an-tranon’i Simona boka dia avy ity vehivavy iray izay nitondra tavoara alabasitara feno menaka manitra nisy narda tena sarobidy; novakiny ny tavoara ka nararany tamin’ny lohan’i Jesosy ny menaka manitra. '
  '30':
  - type: text
    content: 'Dia hoy Jesosy taminy: Lazaiko aminao marina tokoa: Anio, amin’ity alina ity ihany, raha mbola tsy misy akoho maneno fanindroany, dia handa Ahy intelo ianao. '
  '31':
  - type: text
    content: 'Fa vao mainka nanamafy izy hoe: Na dia tsy maintsy ho faty miaraka Aminao aza aho dia tsy mba handa Anao mihitsy. Ary toy izany koa no nolazain’izy rehetra.'
  - type: heading
    content: Ny vavaka nataon’i Jesosy tao Getsemane
  - type: heading
    content: Mat 26.36-46; Lio 22.39-46
  '32':
  - type: text
    content: 'Ary tonga tany amin’ny saha iray atao hoe Getsemane izy ireo; dia hoy Jesosy tamin’ny mpianany: Mipetraha eto ianareo fa handeha hivavaka Aho. '
  '33':
  - type: text
    content: 'Ary Jesosy nitondra an’i Petera sy i Jakoba ary i Jaona niaraka Taminy, dia nanomboka nangorohoro sady ory fatratra Izy. '
  '34':
  - type: text
    content: 'Dia hoy Izy tamin’ireo: Fadiranovana loatra toy ny efa ho faty ny fanahiko; mitoera eto ka miareta tory. '
  '35':
  - type: text
    content: 'Ary nony nandroso kelikely Izy dia niankohoka tamin’ny tany ka nivavaka mba hialan’izany ora izany Aminy, raha azo atao. '
  '36':
  - type: text
    content: 'Ary hoy Izy: Aba, Ray ô, ny zavatra rehetra hainao; esory Amiko ity kapoaka ity. Nefa aoka tsy ny sitrapoko anie no hatao fa ny Anao. '
  '37':
  - type: text
    content: 'Ary niverina Izy ka nahita azy ireo matory dia hoy Izy tamin’i Petera: Ry Simona, matory va ianao? Tsy mahazaka miari-tory na dia ora iray ihany aza va ianao? '
  '38':
  - type: text
    content: 'Miareta tory ianareo ka mivavaha mba tsy hidiranareo amin’ny fakam-panahy; mety ihany ny fanahy fa ny nofo no tsy manan-kery. '
  '39':
  - type: text
    content: 'Dia lasa indray Izy niverina nivavaka ka namerina ilay teny teo ihany. '
  '4':
  - type: text
    content: 'Ary tezitra ny sasany ka nifampilaza hoe: Inona no anton’izao fandaniam-poana ny menaka manitra izao? '
  '40':
  - type: text
    content: 'Nony niverina indray Izy dia nahita azy ireo matory, ary efa nilondolondo ny masony ka tsy hitany izay havaliny Azy. '
  '41':
  - type: text
    content: 'Ary niverina fanintelony Izy dia niteny taminy hoe: Mbola matory ihany ianareo ka miala sasatra. Ampy izay. Tonga ny fotoanandro; indro ny '
  - type: text
    content: Zanak’Olona
  - type: text
    content: ' hatolotra eo an-tanan’ny mpanota. '
  '42':
  - type: text
    content: Mitsangàna, andeha isika; fa indro, efa manakaiky ilay manolotra Ahy.
  - type: heading
    content: Ny nisamborana an’i Jesosy
  - type: heading
    content: Mat 26.47-56; Lio 22.47-53; Jao 18.2-12
  '43':
  - type: text
    content: 'Niaraka tamin’izay, raha mbola niteny Izy, dia avy i Jodasy, iray amin’ny roa amby folo lahy, ary nisy vahoaka niaraka taminy, nitondra sabatra sy langilangy, nirahin’ireo lehiben’ny mpisorona sy ny '
  - type: text
    content: mpanoradalàna
  - type: text
    content: ' ary ny loholona. '
  '44':
  - type: text
    content: 'Ary ilay hanolotra Azy dia efa nanome famantarana tamin’ireo ka niteny hoe: Izay horohako no Izy; sambory Izy ka ento dia ataovy tsara ambina. '
  '45':
  - type: text
    content: 'Ary raha vao tonga izy ka nanatona an’i Jesosy dia niteny hoe: Raby ô! Sady nanoroka Azy izy. '
  '46':
  - type: text
    content: 'Ary nanatsotra ny tanany Taminy ny olona ka nisambotra Azy. '
  '47':
  - type: text
    content: 'Ary nanatsoaka ny sabany ny iray tamin’ireo izay nanatrika teo dia nikapoka ny mpanompon’ny '
  - type: text
    content: Mpisoronabe
  - type: text
    content: ' ka nahafaka ny sofiny.'
  '48':
  - type: text
    content: 'Dia niteny taminy Jesosy hoe: Tonga mitondra sabatra sy langilangy hisambotra Ahy toy ny fisambotra jiolahy va ianareo? '
  '49':
  - type: text
    content: Teo aminareo isanandro Aho, nampianatra tao amin’ny tempoly, nefa tsy nisambotra Ahy ianareo; fa mba hahatanteraka ny Soratra Masina izao.
  '5':
  - type: text
    content: 'Fa azo namidy lafo mihoatra ny '
  - type: text
    content: denaria
  - type: text
    content: ' telonjato iny menaka manitra iny ka ho nomena ny mahantra! Dia tezitra indrindra tamin-dRavehivavy ireo. '
  '50':
  - type: text
    content: 'Ary samy nandao Azy izy rehetra ka nandositra. '
  '51':
  - type: text
    content: 'Ary nisy zatovo iray nanaraka Azy, tsy nitafy afa-tsy lamba hariry madinika, ary nosamborin’ny olona teo izy. '
  '52':
  - type: text
    content: Dia navelany teny amin’ireo mpisambotra azy ny lambany hariry madinika ka nandositra nitanjaka izy.
  - type: heading
    content: Ny nitsaran’ny Sinedriona an’i Jesosy
  - type: heading
    content: Mat 26.57-58; Lio 22.54-55, 63-71; Jao 18.12-15
  '53':
  - type: text
    content: 'Ary nitondra an’i Jesosy ho any amin’ny Mpisoronabe izy ireo; ary nivory ireo lehiben’ny mpisorona rehetra sy ireo loholona ary ireo '
  - type: text
    content: mpanoradalàna
  - type: text
    content: '. '
  '54':
  - type: text
    content: 'Ary i Petera dia nanaraka Azy teny lavidavitra teny hatrany anatin’ny kianjan’ny tranon’ny '
  - type: text
    content: Mpisoronabe
  - type: text
    content: . Ary niara-nipetraka teo amin’ny mpiandry raharaha izy ka namindro teo anilan’ny afo.
  - type: heading
    content: Mat 26.59-68; Lio 22.63-71; Jao 18.19-24
  '55':
  - type: text
    content: 'Ary ireo lehiben’ny mpisorona sy ny '
  - type: text
    content: Sinedriona
  - type: text
    content: ' manontolo dia nitady zavatra hiampangana an’i Jesosy ka hamonoany Azy ho faty, nefa tsy nahita. '
  '56':
  - type: text
    content: 'Fa maro no niampanga lainga Azy, nefa tsy nifanaraka ny fanambaràny. '
  '57':
  - type: text
    content: 'Dia nitsangana ny sasany ka niampanga lainga Azy hoe: '
  '58':
  - type: text
    content: 'Izahay nandre Azy niteny hoe: Izaho handrava ity tempoly nataon-tanana ity ary amin’ny hateloana dia hanangana hafa izay tsy nataon-tanana Aho. '
  '59':
  - type: text
    content: 'Tsy nifanaraka anefa ny filazany na dia tamin’izany aza. '
  '6':
  - type: text
    content: 'Fa hoy Jesosy taminy: Avelao izy. Nahoana ianareo no manao izay mampalahelo azy? Asa soa no nataony Tamiko. '
  '60':
  - type: text
    content: 'Dia nitsangana ny '
  - type: text
    content: Mpisoronabe
  - type: text
    content: ' ka nankeo afovoany nanontany an’i Jesosy hoe: Tsy manan-kavaly va Ianao? Inona no iampangan’ireto Anao? '
  '61':
  - type: text
    content: 'Fa tsy niteny Jesosy sady tsy namaly akory. Dia nanontany Azy indray ny Mpisoronabe ka niteny taminy hoe: Ianao va no '
  - type: text
    content: Kristy
  - type: text
    content: ', Zanaky ny Isaorana? '
  '62':
  - type: text
    content: 'Dia hoy Jesosy: Izaho no Izy. Ary ho hitanareo ny '
  - type: text
    content: Zanak’Olona
  - type: text
    content: ' mipetraka eo ankavanan’ny Hery sady avy eny amin’ny rahon’ny lanitra. '
  '63':
  - type: text
    content: 'Ary nandriatra ny fitafiany ny Mpisoronabe ka nilaza hoe: Inona indray no mbola ilantsika vavolombelona? '
  '64':
  - type: text
    content: Efa renareo ny fitenenan-dratsy ka ahoana ny hevitrareo? Dia nanameloka Azy ho mendrika ho faty izy rehetra.
  '65':
  - type: text
    content: 'Ary nanomboka nandrora Azy ny sasany dia nanarona ny tavany sady namely tehamaina Azy ka niteny hoe: Maminania! Ary namely Azy tamin’ny tehamaina koa ireo mpiandry raharaha.'
  - type: heading
    content: Ny nandavan’i Petera an’i Jesosy
  - type: heading
    content: Mat 26.69-75; Lio 22.56-62; Jao 18.17, 25-27
  '66':
  - type: text
    content: 'Ary raha mbola teo ambany, teo an-kianja i Petera, dia avy ny iray tamin’ny ankizivavin’ny Mpisoronabe. '
  '67':
  - type: text
    content: 'Nony nahita an’i Petera namindro izy dia nijery azy ary niteny hoe: Ianao koa dia niaraka tamin’Ilay Nazareana atao hoe Jesosy. '
  '68':
  - type: text
    content: 'Nandà anefa izy ka niteny hoe: Sady tsy fantatro no tsy azoko ny teninao. Dia nandeha nankany ivelany ho any amin’ny vavahady izy, ary nisy akoho naneno tamin’izay.'
  '69':
  - type: text
    content: 'Ary nahita azy ilay ankizivavy ka namerina niteny tamin’ireo izay nanatrika teo fa io lehilahy io dia naman-dry zareo ireo. '
  '7':
  - type: text
    content: 'Fa ny mahantra dia eto aminareo mandrakariva, ary na oviana na oviana no tianareo hanaovana soa aminy dia mahazo manao izany ianareo; fa Izaho kosa dia tsy mba ho eto aminareo mandrakariva. '
  '70':
  - type: text
    content: 'Fa mbola nandà indray izy. Nony afaka kelikely, ireo izay nanatrika teo, dia niteny indray tamin’i Petera hoe: Marina mihitsy fa anisan’ireny ianao; fa Galiliana koa ianao. '
  '71':
  - type: text
    content: 'Dia niozona sy nianiana izy hoe: Tsy fantatro izany Lehilahy lazainareo izany. '
  '72':
  - type: text
    content: 'Ary niaraka tamin’izay dia nisy akoho naneno fanindroany. Ary tsaroan’i Petera ny teny izay nolazain’i Jesosy taminy hoe: Raha mbola tsy misy akoho maneno fanindroany dia handa Ahy intelo ianao. Dia niala teo izy sady nigogogogo nitomany.'
  '8':
  - type: text
    content: 'Efa nanao izay azony natao izy: Nanosotra mialoha ny tenako izy hanamboarany Ahy halevina. '
  '9':
  - type: text
    content: 'Ary lazaiko aminareo marina tokoa: Na aiza na aiza no hitoriana ny Filazantsara eto amin’izao tontolo izao dia hotantaraina koa izao nataon-dRavehivavy izao mba ho fahatsiarovana azy.'
  - type: heading
    content: Ny naneken’i Jodasy hamadika an’i Jesosy
  - type: heading
    content: Mat 26.14-16; Lio 22.3-6
