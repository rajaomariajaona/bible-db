document_id: REV.21,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Lanitra vaovao sy tany vaovao
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nahita lanitra vaovao sy tany vaovao aho; fa efa lasa ny lanitra voalohany sy ny tany voalohany, ary ny ranomasina dia tsy nisy intsony. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nitondra ahy tamin’ny Fanahy ho any an-tendrombohitra iray sady lehibe no avo izy ka naneho ahy ny tanàna masina, dia i Jerosalema, midina avy tamin’Andriamanitra any an-danitra. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Manana ny voninahitr’Andriamanitra izy; ny famirapiratany dia tahaka ny vatosoa tena sarobidy, dia tahaka ny vato jaspy, manganohano toy ny vato kristaly. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Manana manda lehibe sady avo sy vavahady roa amby folo izy, ary eo amin’ny vavahady dia misy anjely roa amby folo, ary misy anarana voasoratra eo, dia ny an’ny foko roa amby folo amin’ny Zanak’Israely: '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Eo atsinanana, vavahady telo; eo avaratra, vavahady telo; eo atsimo, vavahady telo; eo andrefana, vavahady telo. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny mandan’ny tanàna dia misy fanorenana roa amby folo ary misy anarana roa amby folo koa eo, dia ny an’ny Apostoly roa amby folon’ny Zanak’ondry.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ilay niteny tamiko dia nanana fandrefesana volotara volamena handrefesany ny tanàna sy ny vavahadiny ary ny mandany. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny tanàna dia efamira, koa mitovy ny lavany sy ny sakany. Nandrefy ny tanàna tamin’ny volotara izy ka roa arivo sy iray alina '
    - type: usfm
      marker: w
      children:
      - type: text
        text: stadio
    - type: text
      text: '. Mitovy ny lavany sy ny sakany ary ny haavony. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nandrefy ny mandany izy ka efatra amby efapolo amby zato '
    - type: usfm
      marker: w
      children:
      - type: text
        text: hakiho
    - type: text
      text: ', araka ny refin’ny olona, dia ny an’ny anjely. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny mandany dia vato jaspy; ary ny tanàna dia tena volamena, toy ny fitaratra madio. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny fanorenan’ny mandan’ny tanàna dia voaravaka vatosoa samihafa rehetra. Ny fanorenana voalohany dia jaspy, ny faharoa dia safira, ny fahatelo dia kalkedoana, ny fahefatra dia emeraoda, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hitako ny tanàna masina, dia i Jerosalema vaovao, nidina avy any an-danitra tamin’Andriamanitra, voaomana tahaka ny ampakarina efa mihaingo hihaona amin’ny vadiny. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ny fahadimy dia sardoniksa, ny fahenina dia karneola, ny fahafito dia krizolita, ny fahavalo dia berila, ny fahasivy dia topaza, ny fahafolo dia krizopraso, ny fahiraika amby folo dia hiakinta, ny faharoa amby folo dia ametista. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny vavahady roa amby folo dia perila roa amby folo; perila iray ny vavahady tsirairay; ny lalambe teo an-tanàna dia volamena tsy miharo, toy ny fitaratra manganohano.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsy nahita tempoly teo aho, fa ny Tompo Andriamanitra, dia ny Tsitoha, sy ny Zanak’ondry no tempoliny. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny tanàna dia tsy mba mila ny masoandro na ny volana hamirapiratra aminy; fa ny voninahitr’Andriamanitra no nanazava azy ary ny Zanak’ondry no fanazavana azy. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny firenena maro no handeha amin’ny fahazavany; ary ny mpanjakan’ny tany dia samy hitondra ny voninahiny ho ao anatiny. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny vavahadiny dia tsy harindrina akory amin’ny andro, fa tsy mba hisy alina ao. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny voninahitra sy ny hajan’ny firenena maro dia hoentina ao anatiny. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary tsy mba hiditra ao mihitsy izay tsy masina, na izay manao vetaveta, na izay mandainga, fa izay voasoratra ao anatin’ny bokin’ny fiainana izay an’ny Zanak’ondry ihany.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nandre feo mahery avy teo amin’ny sezafiandrianana aho niteny hoe:'
  - type: usfm
    marker: pi1
    children:
    - type: text
      text: 'Indro, ny tabernakelin’Andriamanitra dia eo amin’ny olona! Ary Izy hitoetra eo aminy, ary ireo ho olony, ary Andriamanitra mihitsy no hitoetra eo aminy, dia ho Andriamaniny. '
  '4':
  - type: usfm
    marker: pi1
    children:
    - type: text
      text: Ary hofafany ny ranomaso rehetra amin’ny masony; tsy hisy fahafatesana intsony sady tsy hisy alahelo, na fitarainana, na fanaintainana; fa efa lasa ny zavatra taloha.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Ilay mipetraka eo ambonin’ny sezafiandrianana: Indro, havaoziko ny zavatra rehetra. Ary hoy koa Izy: Soraty, fa mahatoky sy marina ireo teny ireo. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy koa Izy tamiko: Vita! Izaho no Alfa sy Omega, ny fiandohana sy ny fiafarana. Izaho no hanome maimaimpoana avy amin’ny loharanon’aina ho an’izay mangetaheta. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izay maharesy no handova izany zavatra izany; ho Andriamaniny Aho ary izy ho zanako. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa ny osa, ny tsy mino, ny vetaveta, ny mpamono olona, ny mpijangajanga, ny mpanao ody ratsy, ny mpanompo sampy ary ny mpandainga rehetra dia hanana ny anjarany ao anatin’ny farihy mirehitra afo sy solifara. Izany no fahafatesana faharoa.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jerosalema vaovao
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary tonga ny iray tamin’ny anjely fito izay nitana ny lovia fito, dia ireo nitondra ny loza fito farany. Hoy izy tamiko hoe: Avia atỳ, dia hasehoko anao ny ampakarina, vadin’ny Zanak’ondry. '
