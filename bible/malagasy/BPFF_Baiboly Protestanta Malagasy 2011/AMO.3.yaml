document_id: AMO.3,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Hampamoahin’NY TOMPO ny Israely
  - type: text
    content: Henoy izao teny izao izay lazain’NY TOMPO ny aminareo, ry Zanak’Israely, dia ny amin’ny taranaka rehetra izay nentiko niakatra avy tany amin’ny tany Ejipta!
  '10':
  - type: text
    content: Fa tsy mahalala hanao ny marina izy ireo,
  - type: text
    content: hoy NY TOMPO;
  - type: text
    content: mitahiry fanaovana an-keriny sy hetraketraka ao an-dapany izy.
  '11':
  - type: text
    content: 'Koa izao no lazain’NY TOMPO Andriamanitra:'
  - type: text
    content: E, misy fahavalo manodidina ny tany!
  - type: text
    content: Hazerany ny mandanao
  - type: text
    content: ary horobaina ny lapanao.
  '12':
  - type: text
    content: 'Izao no lazain’NY TOMPO:'
  - type: text
    content: Toy ny fandrirotry ny mpiandry ondry avy eo am-bavan’ny liona
  - type: text
    content: ny tongotr’ondry roa monja na ny sombin-tsofiny,
  - type: text
    content: toy izany no ho fandrirotra ny Zanak’Israely
  - type: text
    content: izay mipetraka ao Samaria,
  - type: text
    content: eo an-jorom-parafara sy eo amin’ny lamba lafo vidy avy any Damaskosy.
  '13':
  - type: text
    content: Henoinareo ka ambarao ny hamelezana ny taranak’i Jakoba!
  - type: text
    content: 'Hoy NY TOMPO, Andriamanitra Tompon’izao rehetra izao:'
  '14':
  - type: text
    content: Amin’ny andro hamaliako ny Israely noho ny fahotany
  - type: text
    content: no hamaliako ireo alitara ao Betela;
  - type: text
    content: 'hokapaina ny '
  - type: text
    content: tandroky
  - type: text
    content: ' ny alitara'
  - type: text
    content: ka hianjera amin’ny tany ireo.
  '15':
  - type: text
    content: Hamely ny trano fonenana amin’ny ririnina sy ny trano fonenana amin’ny fahavaratra Aho;
  - type: text
    content: ho rava ny trano ivoara;
  - type: text
    content: trano maro no ho fongana,
  - type: text
    content: hoy NY TOMPO.
  '2':
  - type: text
    content: Ianareo ihany no fantatro
  - type: text
    content: tamin’ny firenena rehetra ambonin’ny tany;
  - type: text
    content: araka izany dia hovaliako ianareo
  - type: text
    content: noho ny helokareo rehetra.
  - type: heading
    content: Miteny NY TOMPO ka afaka hangina va ny mpaminany?
  '3':
  - type: text
    content: Ho tafara-dalana va ny olona roa lahy
  - type: text
    content: raha tsy efa nifanaiky?
  '4':
  - type: text
    content: Mierona any an’ala va ny liona
  - type: text
    content: raha tsy mahita remby?
  - type: text
    content: Manerona ao an-davany va ny liona tanora
  - type: text
    content: raha tsy nahazo haza?
  '5':
  - type: text
    content: Voan’ny fandrika amin’ny tany va ny vorona
  - type: text
    content: raha tsy nisy tadivavarana?
  - type: text
    content: Voarirotra hiainga amin’ny tany va ny fandrika
  - type: text
    content: raha tsy nahavoa zavatra?
  '6':
  - type: text
    content: Tsofina ao an-tanàna va ny anjomara
  - type: text
    content: ka tsy hangovitra ny vahoaka?
  - type: text
    content: Misy loza va ao an-tanàna
  - type: text
    content: raha tsy NY TOMPO no nahatonga izany?
  '7':
  - type: text
    content: Fa tsy manao na inona na inona tokoa NY TOMPO Andriamanitra
  - type: text
    content: raha tsy milaza ny heviny
  - type: text
    content: amin’ireo mpaminany mpanompony.
  '8':
  - type: text
    content: Ny liona no mierona ka iza no tsy hatahotra?
  - type: text
    content: NY TOMPO Andriamanitra no miteny ka iza no tsy haminany?
  - type: heading
    content: Madiva tsy hisy na inona na inona ho tavela intsony ao Samaria
  '9':
  - type: text
    content: Ambarao any amin’ireo lapa any Asdoda
  - type: text
    content: 'sy any amin’ireo lapa any amin’ny tany Ejipta hoe:'
  - type: text
    content: Mivoria any amin’ny tendrombohitr’i Samaria ianareo
  - type: text
    content: ka jereo ny tabataba be ao aminy
  - type: text
    content: sy ny fampahoriana ao anatiny ao!
