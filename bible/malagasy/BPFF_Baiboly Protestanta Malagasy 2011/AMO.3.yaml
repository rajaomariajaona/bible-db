document_id: AMO.3,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Hampamoahin’NY TOMPO ny Israely
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Henoy izao teny izao izay lazain’NY TOMPO ny aminareo, ry Zanak’Israely, dia ny amin’ny taranaka rehetra izay nentiko niakatra avy tany amin’ny tany Ejipta!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Fa tsy mahalala hanao ny marina izy ireo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy NY TOMPO;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mitahiry fanaovana an-keriny sy hetraketraka ao an-dapany izy.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Koa izao no lazain’NY TOMPO Andriamanitra:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: E, misy fahavalo manodidina ny tany!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hazerany ny mandanao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary horobaina ny lapanao.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Izao no lazain’NY TOMPO:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toy ny fandrirotry ny mpiandry ondry avy eo am-bavan’ny liona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny tongotr’ondry roa monja na ny sombin-tsofiny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toy izany no ho fandrirotra ny Zanak’Israely
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay mipetraka ao Samaria,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eo an-jorom-parafara sy eo amin’ny lamba lafo vidy avy any Damaskosy.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Henoinareo ka ambarao ny hamelezana ny taranak’i Jakoba!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Hoy NY TOMPO, Andriamanitra Tompon’izao rehetra izao:'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Amin’ny andro hamaliako ny Israely noho ny fahotany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no hamaliako ireo alitara ao Betela;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'hokapaina ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: tandroky
    - type: text
      text: ' ny alitara'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hianjera amin’ny tany ireo.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Hamely ny trano fonenana amin’ny ririnina sy ny trano fonenana amin’ny fahavaratra Aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho rava ny trano ivoara;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: trano maro no ho fongana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy NY TOMPO.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Ianareo ihany no fantatro
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tamin’ny firenena rehetra ambonin’ny tany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: araka izany dia hovaliako ianareo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: noho ny helokareo rehetra.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Miteny NY TOMPO ka afaka hangina va ny mpaminany?
    marker-yv: yv-h
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Ho tafara-dalana va ny olona roa lahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: raha tsy efa nifanaiky?
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Mierona any an’ala va ny liona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: raha tsy mahita remby?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manerona ao an-davany va ny liona tanora
  - type: usfm
    marker: q1
    children:
    - type: text
      text: raha tsy nahazo haza?
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Voan’ny fandrika amin’ny tany va ny vorona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: raha tsy nisy tadivavarana?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voarirotra hiainga amin’ny tany va ny fandrika
  - type: usfm
    marker: q1
    children:
    - type: text
      text: raha tsy nahavoa zavatra?
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Tsofina ao an-tanàna va ny anjomara
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy hangovitra ny vahoaka?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Misy loza va ao an-tanàna
  - type: usfm
    marker: q1
    children:
    - type: text
      text: raha tsy NY TOMPO no nahatonga izany?
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Fa tsy manao na inona na inona tokoa NY TOMPO Andriamanitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: raha tsy milaza ny heviny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: amin’ireo mpaminany mpanompony.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Ny liona no mierona ka iza no tsy hatahotra?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: NY TOMPO Andriamanitra no miteny ka iza no tsy haminany?
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Madiva tsy hisy na inona na inona ho tavela intsony ao Samaria
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Ambarao any amin’ireo lapa any Asdoda
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'sy any amin’ireo lapa any amin’ny tany Ejipta hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mivoria any amin’ny tendrombohitr’i Samaria ianareo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka jereo ny tabataba be ao aminy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny fampahoriana ao anatiny ao!
