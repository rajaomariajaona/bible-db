    text: Ny votoatin’ny Epistily
- type: usfm
  marker: ip
  children:
  - type: text
    text: Ny ankamaroan’ireo Fiangonana anoratan’ny Apostoly Petera ity epistily ity dia any Azia Minora. Izay nanorina ireny Fiangonana ireny dia i Paoly, na mpiara-miasa taminy. I Petera dia manoratra avy any Roma, izay lazainy hoe Babilona. Ny Kristiana anoratany dia lazainy hoe «mpivahiny», izay ilazana tsotra ny Kristiana, izay mpivahiny eto amin’izao tontolo izao. Manoratra aminy i Petera ho fampaherezana mba hitoerany tsara amin’ny fahasoavan’Andriamanitra. Ireo Kristiana ireo dia niharan’ny fizahan-toetra. Mety tsy ho fanenjehana mivantana anefa izany fa fitenenan-dratsy, na koa fanaovana toeran-tsy zaka, avy tamin’ireo Jentilisa mpiara-monina. Teo amin’izany toerana nisy azy izany dia nila fampaherezana izy ireo. Nila fananarana koa mba tsy hirona indray amin’ny fombam-piainana taloha. Nilana fananarana koa ny amin’ny fitondrana ao amin’ny Fiangonana.
- type: usfm
  marker: iot
