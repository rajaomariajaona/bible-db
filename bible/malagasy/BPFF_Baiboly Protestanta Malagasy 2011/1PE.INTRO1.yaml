verses:
  '1':
  - type: text
    content: INDRAY MIJERY
  - type: text
    content: Ny votoatin’ny Epistily
  - type: text
    content: Ny ankamaroan’ireo Fiangonana anoratan’ny Apostoly Petera ity epistily ity dia any Azia Minora. Izay nanorina ireny Fiangonana ireny dia i Paoly, na mpiara-miasa taminy. I Petera dia manoratra avy any Roma, izay lazainy hoe Babilona. Ny Kristiana anoratany dia lazainy hoe «mpivahiny», izay ilazana tsotra ny Kristiana, izay mpivahiny eto amin’izao tontolo izao. Manoratra aminy i Petera ho fampaherezana mba hitoerany tsara amin’ny fahasoavan’Andriamanitra. Ireo Kristiana ireo dia niharan’ny fizahan-toetra. Mety tsy ho fanenjehana mivantana anefa izany fa fitenenan-dratsy, na koa fanaovana toeran-tsy zaka, avy tamin’ireo Jentilisa mpiara-monina. Teo amin’izany toerana nisy azy izany dia nila fampaherezana izy ireo. Nila fananarana koa mba tsy hirona indray amin’ny fombam-piainana taloha. Nilana fananarana koa ny amin’ny fitondrana ao amin’ny Fiangonana.
  - type: text
    content: Ny firafitry ny Boky
  - type: text
    content: 'Fitarihana: 1.1-12'
  - type: text
    content: 'Fananarana mifototra amin’ny famonjena: 1.13–2.10'
  - type: text
    content: 'Fananarana amin’ny maha mpivahiny ny Kristiana eto amin’izao tontolo izao: 2.11–3.12'
  - type: text
    content: 'Fananarana mifototra amin’ny fijalian’i Kristy: 3.13–5.11'
  - type: text
    content: 'Famaranana: 5.12-14'
