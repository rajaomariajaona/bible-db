document_id: EXO.28,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny Mpisoronabe sy ny mpisorona
  - type: text
    content: Ampanatony anao avy eo anivon’ny Zanak’Israely i Arona rahalahinao mbamin’ireo zanany mba hanao fisoronana ho Ahy izy, dia i Arona, i Nadaba, i Abiho, i Eleazara ary Itamara, zanak’i Arona.
  - type: heading
    content: Ny fitafian’ny Mpisoronabe
  '10':
  - type: text
    content: 'Ny anaran’ny enina dia amin’ny vato iray ary ny anaran’ny enina hafa kosa dia amin’ny vato iray, araka ny fizokiany. '
  '11':
  - type: text
    content: 'Amin’ny asan’ny mpanora-bato, tahaka ny fanoratana fitombo-kase, no hanoratanao ny vato roa, araka ny anaran’ny Zanak’Israely ary asio randram-bolamena manodidina. '
  '12':
  - type: text
    content: 'Ataovy eo amin’ny soroky ny efoda ny vato roa, ho vato fahatsiarovana ho an’ny Zanak’Israely. Ary i Arona dia hitondra ireo anarany ireo eo amin’ny sorony roa, eo anatrehan’NY TOMPO ho fahatsiarovana. '
  '13':
  - type: text
    content: 'Ary manaova randram-bolamena '
  '14':
  - type: text
    content: sy rojo kely volamena tsy miharo roa; mirandrana toy ny tady no hanaovanao ireo, ary hapetakao eo amin’ny randram-bolamena ireo rojo kely toy ny tady ireo.
  - type: heading
    content: Ny saron-tratra
  '15':
  - type: text
    content: 'Ary manaova saron-tratra fitsarana, asan’ny mpanenona mahay. Toy ny nanaovana ny '
  - type: text
    content: efoda
  - type: text
    content: ' no hanaovanao azy: Volamena, lamba manga, volomparasy, jaky ary lamba rongony fotsy madinika voatenona. '
  '16':
  - type: text
    content: 'Ho efa-joro miforitra roa ilay izy ary irain-jehy avy ny lafiny efatra. '
  '17':
  - type: text
    content: 'Asio vato alatsaka an-tranontranony koa ka efatra andalana: Ny andalana voalohany dia karnelia sy topaza ary emeraoda; '
  '18':
  - type: text
    content: 'ny andalana faharoa dia robisy sy safira ary oniksa; '
  '19':
  - type: text
    content: 'ny andalana fahatelo dia opala sy agata ary ametista; '
  '2':
  - type: text
    content: 'Manaova fitafiana masina ho an’i Arona rahalahinao ho mariky ny voninahitra sy ny fahamboniany. '
  '20':
  - type: text
    content: 'ny andalana fahefatra kosa dia krizolita sy berila ary jaspy. Asio randram-bolamena ny fitoerany avy. '
  '21':
  - type: text
    content: Ny vato dia alaharo araka ny anaran’ny Zanak’Israely, roa amby folo araka ny anarany; hisy soratra toy ny amin’ny fitombo-kase izany, ho amin’ny foko roa amby folo araka ny anarany avy.
  '22':
  - type: text
    content: 'Asio rojo kely volamena tsy miharo, mirandrana toy ny tady eo amin’ny saron-tratra. '
  '23':
  - type: text
    content: 'Petaho mason-drojo volamena roa koa eo amin’ny saron-tratra; ataovy eo amin’ny zorony roa, izay amin’ny zorony roa ambony amin’ny saron-tratra ireo mason-drojo roa ireo. '
  '24':
  - type: text
    content: 'Ary ny tady volamena roa dia ataovy eo amin’ny mason-drojo roa, izay amin’ny zorony roa ambony amin’ny saron-tratra. '
  '25':
  - type: text
    content: 'Ataovy eo amin’ny soroky ny efoda anoloana kosa ny lanin’ny tady roa. '
  '26':
  - type: text
    content: 'Dia manaova koa mason-drojo volamena roa ka ataovy amin’ny zorony roa ambany amin’ny saron-tratra, amin’ny sisiny anatiny, izay mifanolotra amin’ny efoda. '
  '27':
  - type: text
    content: 'Ary manaova koa mason-drojo roa ka ataovy eo amin’ny soroka roa amin’ny efoda, dia ao ambaniny, eo anoloany, akaikin’ny fihaonany, eo ambonin’ny fehikibo momba ny efoda. '
  '28':
  - type: text
    content: Kofehy manga no hamehezana ny mason-drojon’ny saron-tratra amin’ny mason-drojon’ny efoda, mba ho eo ambonin’ny fehikibo momba ny efoda ny saron-tratra ka tsy hikisaka hiala eo.
  '29':
  - type: text
    content: Ary i Arona dia hitondra ny anaran’ny Zanak’Israely eo amin’ny saron-tratra fitsarana mifanolotra amin’ny fony rehefa miditra ao amin’ny fitoerana masina izy mba ho fahatsiarovana mandrakariva eo anatrehan’NY TOMPO.
  '3':
  - type: text
    content: 'Koa mitenena amin’izay manan-talenta, izay nofenoiko fanahim-pahendrena, mba hanao ny fitafian’i Arona hanamasinana azy mba hanaovany fisoronana ho Ahy. '
  '30':
  - type: text
    content: Ataovy eo amin’ny saron-tratra fitsarana ny Orima sy ny Tomima; ho eo amin’ny fon’i Arona izany rehefa miditra eo anatrehan’NY TOMPO izy. Hoentin’i Arona eo amin’ny fony mandrakariva eo anatrehan’NY TOMPO ny fitsarana ny Zanak’Israely.
  - type: heading
    content: Ireo akanjo masina hafa
  '31':
  - type: text
    content: 'Ataovy lamba manga avokoa ny akanjobe misy ny '
  - type: text
    content: efoda
  - type: text
    content: '. '
  '32':
  - type: text
    content: 'Asio vozony eo afovoany ary aoka hisy sisiny voatenona manodidina ny vozony, tahaka ny vozon’ny akanjo fiarovan-tratra, mba tsy haharovitra azy. '
  '33':
  - type: text
    content: 'Asio sarin’ampongabendanitra miloko manga, volomparasy, jaky, manodidina eny amin’ny moron-tongony, ary lakolosy kely volamena kosa eo anelanelany manodidina; '
  '34':
  - type: text
    content: 'io dia lakolosy kely volamena sy sarin’ampongabendanitra mifanelanelana manodidina eny amin’ny morontongotry ny akanjobe. '
  '35':
  - type: text
    content: Hiakanjoan’i Arona izany rehefa manao ny fanompoam-pivavahana izy, mba ho re ny fanenony rehefa miditra ao amin’ny fitoerana masina eo anatrehan’NY TOMPO sy rehefa miala ao izy, mba tsy hahafaty azy.
  '36':
  - type: text
    content: 'Manaova koa takelaka volamena tsy miharo ka asio soratra eo aminy, araka ny fanoratana fitombo-kase hoe: NOHAMASININA HO AN’NY TOMPO. '
  '37':
  - type: text
    content: 'Asio kofehy manga izy io ka ataovy eo amin’ny fehiloha, fa eo anoloan’ny fehiloha no hasiana azy. '
  '38':
  - type: text
    content: Ho eo ambonin’ny handrin’i Arona izy io mba hitondran’i Arona ny heloky ny zava-masina izay hohamasinin’ny Zanak’Israely amin’ny fanomezany masina rehetra; ho eo amin’ny handriny mandrakariva izy io mba hankasitrahana ny olona eo anatrehan’NY TOMPO.
  '39':
  - type: text
    content: Ataovy amin’ny rongony fotsy madinika tenom-boaroy ny akanjo lava ary manaova fehiloha amin’ny lamba rongony fotsy madinika sy fehikibo, asan’ny mahay tenona samihafa soratra.
  - type: heading
    content: Ireo akanjon’ny mpisorona
  '4':
  - type: text
    content: 'Izao no fitafiana izay hataon’ireo: Saron-tratra, '
  - type: text
    content: efoda
  - type: text
    content: ', akanjobe, akanjo lava tenom-boaroy, fehiloha ary fehikibo. Hanao fitafiana masina ho an’i Arona rahalahinao sy ho an’ireo zanany izy ireo, mba hanaovany fisoronana ho Ahy.'
  - type: heading
    content: Ny efoda
  '40':
  - type: text
    content: 'Manaova koa akanjo lava ho an’ireo zanak’i Arona dia anamboary fehikibo izy ireo; ary manaova ihany koa satroka boribory ho azy ireo ho mariky ny voninahitra sy ny fahamboniana. '
  '41':
  - type: text
    content: 'Dia ampiakanjoy an’i Arona rahalahinao sy ireo zanany ireo; ary hosory izy ireo dia atokàny sy hamasino mba hanao fisoronana ho Ahy. '
  '42':
  - type: text
    content: 'Ary manaova kalisaonina fohy amin’ny lamba rongony fotsy ho azy hanarona ny fitanjahany hatramin’ny maojany ka hatramin’ny feny. '
  '43':
  - type: text
    content: 'Ary hiakanjoan’i Arona sy ireo zanany ireo rehefa miditra ao amin’ny '
  - type: text
    content: tranolay fihaonana
  - type: text
    content: ' izy ireo, na manakaiky ny alitara hanao fanompoam-pivavahana ao amin’ny fitoerana masina, mba tsy hahazoany heloka hahafaty azy; ho lalàna maharitra aminy sy amin’ny taranany mandimby azy izany.'
  '5':
  - type: text
    content: 'Halain’ireo ny volamena, lamba manga, volomparasy, jaky ary ny lamba rongony fotsy madinika. '
  '6':
  - type: text
    content: 'Dia aoka izy hanao ny '
  - type: text
    content: efoda
  - type: text
    content: ' amin’ny volamena, lamba manga, volomparasy, jaky ary lamba rongony fotsy madinika, asan’ny mpanenona mahay. '
  '7':
  - type: text
    content: 'Hisy soroka roa eo amin’ny sisiny roa mba hampikambana azy. '
  '8':
  - type: text
    content: 'Ary ny fehikibo momba ny efoda, izay eo amboniny, dia hiray aminy sady hitovy fomba aminy, dia hatao amin’ny volamena, lamba manga, volomparasy, jaky ary lamba rongony fotsy madinika voatenona. '
  '9':
  - type: text
    content: 'Ary makà vato berila roa ka soraty eo aminy ny anaran’ny Zanak’Israely: '
