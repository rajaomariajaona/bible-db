document_id: ISA.51,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Famonjena tsy misy fetra
  - type: text
    content: Mihainoa Ahy
  - type: text
    content: ianareo izay miezaka mitady fahamarinana,
  - type: text
    content: dia izay mitady NY TOMPO!
  - type: text
    content: Tsarovy ny vatolampy izay nakana anareo
  - type: text
    content: sy ny aty lavaka izay nihadiana anareo.
  '10':
  - type: text
    content: Tsy Ianao va Ilay nahamaina ny ranomasina,
  - type: text
    content: 'dia ny rano ao amin’ny '
  - type: text
    content: lalina lehibe
  - type: text
    content: ka nanao ny ranomasina lalina
  - type: text
    content: ho lalana halehan’ny olona navotana?
  '11':
  - type: text
    content: Eny, hiverina ny navotan’NY TOMPO
  - type: text
    content: 'ka hankany '
  - type: text
    content: Ziona
  - type: text
    content: ' amin’ny fihobiana,'
  - type: text
    content: fifaliana mandrakizay no ho eny an-dohany;
  - type: text
    content: hahazo fifaliana sy faharavoravoana izy
  - type: text
    content: ka handositra ny alahelo sy ny fisentoana.
  '12':
  - type: text
    content: Izaho dia Izaho no mampionona anareo.
  - type: text
    content: Koa nahoana ianao no dia matahotra ny zanak’olombelona mety maty
  - type: text
    content: sy ny zanak’olona izay tahaka ny ahitra ny hanjo azy?
  '13':
  - type: text
    content: Hadinonao angaha NY TOMPO, mpanao anao,
  - type: text
    content: izay namelatra ny lanitra sy nanorina ny tany!
  - type: text
    content: Matahotra lalandava ianao mandritra ny andro
  - type: text
    content: noho ny fahatezeran’ny mpampahory
  - type: text
    content: rehefa mikendry hamono izy.
  - type: text
    content: Fa aiza intsony izay fahatezeran’ny mpampahory?
  '14':
  - type: text
    content: Tsy ho ela dia ho afaka izay mitanondrika;
  - type: text
    content: tsy ho faty havarina ao an-davaka izy
  - type: text
    content: ary tsy ho diso hanina.
  '15':
  - type: text
    content: Fa Izaho TOMPO no Andriamanitrao,
  - type: text
    content: izay mampanonja ny ranomasina sy mampirohondrohona ny onjany;
  - type: text
    content: Andriamanitra, Tompon’izao rehetra izao no anarako.
  '16':
  - type: text
    content: Nataoko eo am-bavanao ny teniko,
  - type: text
    content: ary ao amin’ny aloky ny tanako no nanaronako anao,
  - type: text
    content: Hamelatra ny lanitra sy hanorina ny tany Aho,
  - type: text
    content: 'ary hiteny amin’i '
  - type: text
    content: Ziona
  - type: text
    content: ' hoe: Oloko ianao!'
  - type: heading
    content: Hanangana indray an’i Jerosalema NY TOMPO
  '17':
  - type: text
    content: Mifohaza, mifohaza ianao!
  - type: text
    content: Mitsangàna, ry Jerosalema ô,
  - type: text
    content: ianao izay efa nisotro ny kapoaky ny fahatezerana
  - type: text
    content: avy tamin’ny tanan’NY TOMPO;
  - type: text
    content: eny, efa nisotro tamin’ny kapoaka mampiraikiraiky ianao
  - type: text
    content: ka notrohinao mbamin’ny faikany!
  '18':
  - type: text
    content: Tsy misy mitondra azy
  - type: text
    content: ny zanany lahy rehetra izay naterany;
  - type: text
    content: ary tsy misy mitantana azy
  - type: text
    content: ny zanany lahy rehetra izay notezainy.
  '19':
  - type: text
    content: 'Izao zavatra roa izao no manjo anao:'
  - type: text
    content: Iza no hampitony ny alahelonao?
  - type: text
    content: Fandravana sy fandringanana
  - type: text
    content: ary mosary sy sabatra.
  - type: text
    content: Koa hataoko ahoana no fampionona anao?
  '2':
  - type: text
    content: Eny, tsarovy i Abrahama rainareo
  - type: text
    content: sy i Saraha izay niteraka anareo;
  - type: text
    content: fa fony mbola izy irery dia nantsoiko
  - type: text
    content: sy notahiko ary nohamaroiko.
  '20':
  - type: text
    content: Reraka ny zanakao lahy
  - type: text
    content: ka midabodaboka eny an-joron-dalambe rehetra eny,
  - type: text
    content: tahaka ny diera ao anatin’ny fandrika harato;
  - type: text
    content: eny, tahaka ny olona rakotry ny fahatezeran’NY TOMPO
  - type: text
    content: sy ny teny mafy ataon’Andriamanitrao.
  '21':
  - type: text
    content: Koa mihainoa izao, ianao ry ilay ory
  - type: text
    content: sady mamo, nefa tsy tamin-divay!
  '22':
  - type: text
    content: Izao no lazain’NY TOMPO, ny Tomponao?
  - type: text
    content: 'dia Andriamanitrao izay mandaha-teny hiaro ny olony:'
  - type: text
    content: Indro, esoriko eny an-tananao
  - type: text
    content: ny kapoaka mampiraikiraiky,
  - type: text
    content: dia ny kapoaky ny fahatezerako;
  - type: text
    content: tsy hisotroanao intsony iny!
  '23':
  - type: text
    content: Hataoko eo an-tanan’izay mampahory anao kosa izany,
  - type: text
    content: 'dia ireo izay nilaza taminao hoe: Miankohofa mba hohitsahinay!'
  - type: text
    content: Dia nataonao tahaka ny tany ny lamosinao;
  - type: text
    content: eny, tahaka ny lalambe ho an’izay mandeha eo.
  '3':
  - type: text
    content: 'Fa NY TOMPO mampionona an’i '
  - type: text
    content: Ziona
  - type: text
    content: ;
  - type: text
    content: eny, mampionona izay rava rehetra ao Izy
  - type: text
    content: ka manao ny tany efitra ao ho tahaka an’i Edena,
  - type: text
    content: ary ny tany foana ao ho tahaka ny sahan’NY TOMPO.
  - type: text
    content: Hafaliana sy haravoana no hita ao,
  - type: text
    content: mbamin’ny fisaorana sy ny feo fiderana.
  '4':
  - type: text
    content: Mihainoa Ahy, ry vahoakako!
  - type: text
    content: Ary atongilano Amiko ny sofinareo ry oloko!
  - type: text
    content: Fa hisy lalàna hivoaka avy Amiko;
  - type: text
    content: ary ny fitsipiko dia hampitoeriko
  - type: text
    content: ho fanazavana ny firenena.
  '5':
  - type: text
    content: Akaiky ny fahamarinako,
  - type: text
    content: efa hiseho ny famonjeko,
  - type: text
    content: ary ny sandriko no hitsara ny firenena;
  - type: text
    content: Izaho no antenain’ny nosy,
  - type: text
    content: ary ny sandriko no andrasany.
  '6':
  - type: text
    content: Andrandrao ho amin’ny lanitra ny masonareo
  - type: text
    content: ary jereo ny tany ambany.
  - type: text
    content: Fa ho levona tahaka ny setroka ny lanitra
  - type: text
    content: ary ho tahaka ny lamba mangarahara ny tany;
  - type: text
    content: ho faty tahaka ny fahafatesan’ny moka ny mponina ao,
  - type: text
    content: fa ny famonjeko kosa dia haharitra mandrakizay
  - type: text
    content: ary ny fahamarinako dia tsy mba ho rava.
  '7':
  - type: text
    content: Mihainoa Ahy ianareo izay mahalala ny fahamarinana,
  - type: text
    content: dia ianao ry firenena izay manana ny lalànako ao am-ponao!
  - type: text
    content: Aza matahotra ny latsa ataon’ny zanak’olombelona
  - type: text
    content: na manahy noho ny fanaratsiana ataony.
  '8':
  - type: text
    content: Fa hihinana azy tahaka ny fihinany ny lamba ny kalalao
  - type: text
    content: ary ny lolo fotsy dia hihinana azy tahaka ny fihinany ny volon’ondry;
  - type: text
    content: fa haharitra mandrakizay ny fahamarinako
  - type: text
    content: ary ny famonjeko dia hihatra amin’ny taranaka fara aman-dimby.
  - type: heading
    content: Mifohaza ianao, ry sandrin’NY TOMPO!
  '9':
  - type: text
    content: Mifohaza, mifohaza!
  - type: text
    content: Ry sandrin’NY TOMPO,
  - type: text
    content: ka mitafia hery!
  - type: text
    content: Mifohaza tahaka ny tamin’ny andro fahiny,
  - type: text
    content: dia tamin’ny taranaka taloha ela!
  - type: text
    content: Tsy Ianao va Ilay nitetitetika an’i Rahaba
  - type: text
    content: 'sy nitomboka ny '
  - type: text
    content: dragona
  - type: text
    content: '?'
