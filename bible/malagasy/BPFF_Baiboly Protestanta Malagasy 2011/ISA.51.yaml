document_id: ISA.51,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Famonjena tsy misy fetra
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Mihainoa Ahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ianareo izay miezaka mitady fahamarinana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia izay mitady NY TOMPO!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsarovy ny vatolampy izay nakana anareo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny aty lavaka izay nihadiana anareo.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Tsy Ianao va Ilay nahamaina ny ranomasina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'dia ny rano ao amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: lalina lehibe
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka nanao ny ranomasina lalina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho lalana halehan’ny olona navotana?
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Eny, hiverina ny navotan’NY TOMPO
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ka hankany '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Ziona
    - type: text
      text: ' amin’ny fihobiana,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fifaliana mandrakizay no ho eny an-dohany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hahazo fifaliana sy faharavoravoana izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka handositra ny alahelo sy ny fisentoana.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Izaho dia Izaho no mampionona anareo.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa nahoana ianao no dia matahotra ny zanak’olombelona mety maty
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny zanak’olona izay tahaka ny ahitra ny hanjo azy?
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Hadinonao angaha NY TOMPO, mpanao anao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay namelatra ny lanitra sy nanorina ny tany!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Matahotra lalandava ianao mandritra ny andro
  - type: usfm
    marker: q1
    children:
    - type: text
      text: noho ny fahatezeran’ny mpampahory
  - type: usfm
    marker: q1
    children:
    - type: text
      text: rehefa mikendry hamono izy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa aiza intsony izay fahatezeran’ny mpampahory?
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Tsy ho ela dia ho afaka izay mitanondrika;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy ho faty havarina ao an-davaka izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy ho diso hanina.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Fa Izaho TOMPO no Andriamanitrao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay mampanonja ny ranomasina sy mampirohondrohona ny onjany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Andriamanitra, Tompon’izao rehetra izao no anarako.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Nataoko eo am-bavanao ny teniko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ao amin’ny aloky ny tanako no nanaronako anao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hamelatra ny lanitra sy hanorina ny tany Aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ary hiteny amin’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Ziona
    - type: text
      text: ' hoe: Oloko ianao!'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Hanangana indray an’i Jerosalema NY TOMPO
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Mifohaza, mifohaza ianao!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mitsangàna, ry Jerosalema ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ianao izay efa nisotro ny kapoaky ny fahatezerana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avy tamin’ny tanan’NY TOMPO;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, efa nisotro tamin’ny kapoaka mampiraikiraiky ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka notrohinao mbamin’ny faikany!
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Tsy misy mitondra azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny zanany lahy rehetra izay naterany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy misy mitantana azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny zanany lahy rehetra izay notezainy.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Izao zavatra roa izao no manjo anao:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Iza no hampitony ny alahelonao?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fandravana sy fandringanana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mosary sy sabatra.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa hataoko ahoana no fampionona anao?
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Eny, tsarovy i Abrahama rainareo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy i Saraha izay niteraka anareo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa fony mbola izy irery dia nantsoiko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy notahiko ary nohamaroiko.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Reraka ny zanakao lahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka midabodaboka eny an-joron-dalambe rehetra eny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tahaka ny diera ao anatin’ny fandrika harato;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, tahaka ny olona rakotry ny fahatezeran’NY TOMPO
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny teny mafy ataon’Andriamanitrao.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Koa mihainoa izao, ianao ry ilay ory
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady mamo, nefa tsy tamin-divay!
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Izao no lazain’NY TOMPO, ny Tomponao?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'dia Andriamanitrao izay mandaha-teny hiaro ny olony:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro, esoriko eny an-tananao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny kapoaka mampiraikiraiky,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ny kapoaky ny fahatezerako;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy hisotroanao intsony iny!
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Hataoko eo an-tanan’izay mampahory anao kosa izany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'dia ireo izay nilaza taminao hoe: Miankohofa mba hohitsahinay!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia nataonao tahaka ny tany ny lamosinao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, tahaka ny lalambe ho an’izay mandeha eo.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Fa NY TOMPO mampionona an’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Ziona
    - type: text
      text: ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, mampionona izay rava rehetra ao Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka manao ny tany efitra ao ho tahaka an’i Edena,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny tany foana ao ho tahaka ny sahan’NY TOMPO.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hafaliana sy haravoana no hita ao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mbamin’ny fisaorana sy ny feo fiderana.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Mihainoa Ahy, ry vahoakako!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary atongilano Amiko ny sofinareo ry oloko!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa hisy lalàna hivoaka avy Amiko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny fitsipiko dia hampitoeriko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho fanazavana ny firenena.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Akaiky ny fahamarinako,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: efa hiseho ny famonjeko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny sandriko no hitsara ny firenena;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izaho no antenain’ny nosy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny sandriko no andrasany.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Andrandrao ho amin’ny lanitra ny masonareo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary jereo ny tany ambany.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ho levona tahaka ny setroka ny lanitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ho tahaka ny lamba mangarahara ny tany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho faty tahaka ny fahafatesan’ny moka ny mponina ao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny famonjeko kosa dia haharitra mandrakizay
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny fahamarinako dia tsy mba ho rava.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Mihainoa Ahy ianareo izay mahalala ny fahamarinana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ianao ry firenena izay manana ny lalànako ao am-ponao!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aza matahotra ny latsa ataon’ny zanak’olombelona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na manahy noho ny fanaratsiana ataony.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Fa hihinana azy tahaka ny fihinany ny lamba ny kalalao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny lolo fotsy dia hihinana azy tahaka ny fihinany ny volon’ondry;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa haharitra mandrakizay ny fahamarinako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny famonjeko dia hihatra amin’ny taranaka fara aman-dimby.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mifohaza ianao, ry sandrin’NY TOMPO!
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Mifohaza, mifohaza!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ry sandrin’NY TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka mitafia hery!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mifohaza tahaka ny tamin’ny andro fahiny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia tamin’ny taranaka taloha ela!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy Ianao va Ilay nitetitetika an’i Rahaba
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'sy nitomboka ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: dragona
    - type: text
      text: '?'
