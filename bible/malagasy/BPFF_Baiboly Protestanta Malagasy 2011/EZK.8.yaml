document_id: EZK.8,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Fanompoan-tsampy ao amin’ny tranon’Andriamanitra
  - type: text
    content: Tamin’ny andro fahadimy tamin’ny volana fahenina, tamin’ny taona fahenina, raha nipetraka tao an-tranoko aho ary nipetraka teo anatrehako ny loholon’ny Joda dia nanan-kery tampoka tamiko ny tanan’NY TOMPO Andriamanitra.
  '10':
  - type: text
    content: 'Dia niditra aho ka nahita, ary indreo, nisy sarin’ny biby mandady sy mikisaka rehetra sy ny biby hafa, izay fahavetavetana, sy ny sampy rehetra an’ny taranak’Israely, voasoratra teny amin’ny rindrina manodidina. '
  '11':
  - type: text
    content: 'Ary nisy fitopolo lahy, isan’ny loholon’ny taranak’Israely, nitsangana teo anoloan’ireo, ary Jazania, zanak’i Safana, nitsangana teo afovoany, samy nitondra ny loviany fandoroana ditin-kazo manitra teny an-tanany avy, ary ny setroky ny ditin-kazo manitra dia nidonaka. '
  '12':
  - type: text
    content: 'Ary hoy Izy tamiko: Ry zanak’olona, hitanao va ny ataon’ny loholon’ny taranak’Israely ao amin’ny maizina, samy ao amin’ny efitranony misy sarin’ny sampiny? Fa hoy izy: NY TOMPO tsy mahita anay, efa nahafoy ny tany Izy! '
  '13':
  - type: text
    content: 'Ary hoy koa Izy tamiko: Mbola hahita fahavetavetana lehibe izay ataony koa ianao.'
  '14':
  - type: text
    content: Dia noentiny ho eo anoloan’ny vavahadin’ny tranon’NY TOMPO, izay manatrika ny avaratra aho; ary indreo, nisy vehivavy nipetraka teo, nitomany an’i Tamoza
  - type: note
    content: 'Tamoza: andriamanitry ny fahavokarana mezopotamiana izay nitomaniana ny fahafatesany tamin’ny fiandohan’ny main-tany, ary nankalazaina ny fitsanganany avy eo.'
  - type: text
    content: '. '
  '15':
  - type: text
    content: 'Dia hoy Izy tamiko: Hitanao va izany, ry zanak’olona? Mbola hahita fahavetavetana lehibe noho ireto koa ianao.'
  '16':
  - type: text
    content: 'Dia noentiny ho eo amin’ny kianja anatiny amin’ny tranon’NY TOMPO aho, ary indro, teo am-baravaran’ny tempolin’NY TOMPO, teo anelanelan’ny lalantsara fidirana sy ny alitara, dia nisy tokony ho dimy amby roapolo lahy niamboho ny tempolin’NY TOMPO ka nanatrika ny atsinanana; ary ireo dia niankohoka manandrify ny masoandro, nanatrika ny atsinanana. '
  '17':
  - type: text
    content: 'Dia hoy Izy tamiko: Hitanao va izany, ry zanak’olona? Moa ataon’ny taranak’i Joda ho kely loatra va ny nanaovany ny fahavetavetana izay ataony eto, no fenoiny fampahoriana koa ny tany ka mampahatezitra Ahy lalandava izy. Ary indro, nanainga ny rantsan-kazo ho amin’ny orony izy. '
  '18':
  - type: text
    content: Ary Izaho kosa hamely amin’ny fahatezerako; tsy hiantra ny masoko sady tsy hamindra fo Aho; ary na dia mitaraina mafy eo an-tsofiko aza izy dia tsy hihaino azy Aho.
  '2':
  - type: text
    content: 'Ary hitako fa indro, nisy zavatra nitarehin’afo; hatramin’ny andilany no ho midina dia afo; ary hatramin’ny andilany no ho miakatra kosa dia nitarehin-java-mamirapiratra, toy ny volon’ny metaly mamirapiratra. '
  '3':
  - type: text
    content: 'Ary nisy zavatra nitarehin-tanana natsotra ka noraisiny tamin’ny voloko aho, dia nisy fanahy nanainga ahy ho eny anelanelan’ny tany sy ny lanitra ka nitondra ahy ho any Jerosalema tamin’ny fahitana avy amin’Andriamanitra, ho eo amin’ny vavahadin’ny kianja anatiny izay manatrika ny avaratra, dia ilay nisy ny sarin-javatra mampahasaro-piaro, ilay mampahasaro-piaro. '
  '4':
  - type: text
    content: Ary indro, teo ny voninahitry ny Andriamanitry ny Israely, tahaka ilay fahitana hitako teo amin’ny lohasaha.
  '5':
  - type: text
    content: 'Dia hoy Izy tamiko: Ry '
  - type: text
    content: zanak’olona
  - type: text
    content: ', atopazo kely mianavaratra ny masonao! Dia natopiko mianavaratra ny masoko ka indro, eny avaratry ny vavahadin’ny alitara, teo amin’ny fidirana, no nisy ilay sarin-javatra mampahasaro-piaro. '
  '6':
  - type: text
    content: 'Hoy koa Izy tamiko: Ry zanak’olona, hitanao va izay ataon’ireo, dia ireo fahavetavetana lehibe izay ataon’ny taranak’Israely eto ka mampanalavitra Ahy amin’ny fitoerako masina? Mbola hahita fahavetavetana lehibe koa ianao.'
  '7':
  - type: text
    content: 'Dia noentiny ho eo amin’ny vavahadin’ny kianja aho. Ary hitako fa indro, nisy loaka teo amin’ny rindrina. '
  '8':
  - type: text
    content: 'Dia hoy Izy tamiko: Ry zanak’olona, loahy ny rindrina! Dia noloahako ny rindrina ka indro, nisy varavarana. '
  '9':
  - type: text
    content: 'Ary hoy Izy tamiko: Midira ka jereo ny fahavetavetana lehibe ataony ato! '
