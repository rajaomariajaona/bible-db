document_id: EZK.8
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fanompoan-tsampy ao amin’ny tranon’Andriamanitra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Tamin’ny andro fahadimy tamin’ny volana fahenina, tamin’ny taona fahenina, raha nipetraka tao an-tranoko aho ary nipetraka teo anatrehako ny loholon’ny Joda dia nanan-kery tampoka tamiko ny tanan’NY TOMPO Andriamanitra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary hitako fa indro, nisy zavatra nitarehin’afo; hatramin’ny andilany no ho midina dia afo; ary hatramin’ny andilany no ho miakatra kosa dia nitarehin-java-mamirapiratra, toy ny volon’ny metaly mamirapiratra. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary nisy zavatra nitarehin-tanana natsotra ka noraisiny tamin’ny voloko aho, dia nisy fanahy nanainga ahy ho eny anelanelan’ny tany sy ny lanitra ka nitondra ahy ho any Jerosalema tamin’ny fahitana avy amin’Andriamanitra, ho eo amin’ny vavahadin’ny kianja anatiny izay manatrika ny avaratra, dia ilay nisy ny sarin-javatra mampahasaro-piaro, ilay mampahasaro-piaro. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ary indro, teo ny voninahitry ny Andriamanitry ny Israely, tahaka ilay fahitana hitako teo amin’ny lohasaha.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia hoy Izy tamiko: Ry '
  - type: usfm
    marker: w
    children:
    - type: text
      text: zanak’olona
  - type: text
    text: ', atopazo kely mianavaratra ny masonao! Dia natopiko mianavaratra ny masoko ka indro, eny avaratry ny vavahadin’ny alitara, teo amin’ny fidirana, no nisy ilay sarin-javatra mampahasaro-piaro. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Hoy koa Izy tamiko: Ry zanak’olona, hitanao va izay ataon’ireo, dia ireo fahavetavetana lehibe izay ataon’ny taranak’Israely eto ka mampanalavitra Ahy amin’ny fitoerako masina? Mbola hahita fahavetavetana lehibe koa ianao.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dia noentiny ho eo amin’ny vavahadin’ny kianja aho. Ary hitako fa indro, nisy loaka teo amin’ny rindrina. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dia hoy Izy tamiko: Ry zanak’olona, loahy ny rindrina! Dia noloahako ny rindrina ka indro, nisy varavarana. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary hoy Izy tamiko: Midira ka jereo ny fahavetavetana lehibe ataony ato! '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dia niditra aho ka nahita, ary indreo, nisy sarin’ny biby mandady sy mikisaka rehetra sy ny biby hafa, izay fahavetavetana, sy ny sampy rehetra an’ny taranak’Israely, voasoratra teny amin’ny rindrina manodidina. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary nisy fitopolo lahy, isan’ny loholon’ny taranak’Israely, nitsangana teo anoloan’ireo, ary Jazania, zanak’i Safana, nitsangana teo afovoany, samy nitondra ny loviany fandoroana ditin-kazo manitra teny an-tanany avy, ary ny setroky ny ditin-kazo manitra dia nidonaka. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary hoy Izy tamiko: Ry zanak’olona, hitanao va ny ataon’ny loholon’ny taranak’Israely ao amin’ny maizina, samy ao amin’ny efitranony misy sarin’ny sampiny? Fa hoy izy: NY TOMPO tsy mahita anay, efa nahafoy ny tany Izy! '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary hoy koa Izy tamiko: Mbola hahita fahavetavetana lehibe izay ataony koa ianao.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Dia noentiny ho eo anoloan’ny vavahadin’ny tranon’NY TOMPO, izay manatrika ny avaratra aho; ary indreo, nisy vehivavy nipetraka teo, nitomany an’i Tamoza
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Tamoza: andriamanitry ny fahavokarana mezopotamiana izay nitomaniana ny fahafatesany tamin’ny fiandohan’ny main-tany, ary nankalazaina ny fitsanganany avy eo.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Dia hoy Izy tamiko: Hitanao va izany, ry zanak’olona? Mbola hahita fahavetavetana lehibe noho ireto koa ianao.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Dia noentiny ho eo amin’ny kianja anatiny amin’ny tranon’NY TOMPO aho, ary indro, teo am-baravaran’ny tempolin’NY TOMPO, teo anelanelan’ny lalantsara fidirana sy ny alitara, dia nisy tokony ho dimy amby roapolo lahy niamboho ny tempolin’NY TOMPO ka nanatrika ny atsinanana; ary ireo dia niankohoka manandrify ny masoandro, nanatrika ny atsinanana. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Dia hoy Izy tamiko: Hitanao va izany, ry zanak’olona? Moa ataon’ny taranak’i Joda ho kely loatra va ny nanaovany ny fahavetavetana izay ataony eto, no fenoiny fampahoriana koa ny tany ka mampahatezitra Ahy lalandava izy. Ary indro, nanainga ny rantsan-kazo ho amin’ny orony izy. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ary Izaho kosa hamely amin’ny fahatezerako; tsy hiantra ny masoko sady tsy hamindra fo Aho; ary na dia mitaraina mafy eo an-tsofiko aza izy dia tsy hihaino azy Aho.
