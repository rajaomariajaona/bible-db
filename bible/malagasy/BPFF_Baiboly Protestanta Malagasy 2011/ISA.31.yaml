document_id: ISA.31
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Tsy Andriamanitra ny Ejiptiana fa olona
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Lozan’izay midina any Ejipta hitady famonjena,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy izay miantehitra amin’ny soavaly
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary matoky ny kalesy fitondra miady satria maro ireny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny mpitaingin-tsoavaly satria mahery dia mahery ireny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa tsy mibanjina ny Iray Masin’ny Israely,
- type: usfm
  marker: q1
  children:
  - type: text
    text: na mitady NY TOMPO!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Izy anefa dia hendry
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka mahatonga loza;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy mba tsoahiny ny teniny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa mitsangana Izy hamely ny mpianakavin’ny mpanao ratsy
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy izay manampy ny mpanao heloka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Olona ihany ny Ejiptiana fa tsy Andriamanitra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: nofo ihany ny soavaliny fa tsy fanahy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Koa rehefa atsotran’NY TOMPO ny tanany
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ho tafintohina izay manampy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ho potraka izay ampiana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: koa samy ho levona avokoa izy rehetra.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Hiaro an’i Jerosalema NY TOMPO
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Fa izao no nolazain’NY TOMPO tamiko:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tahaka ny fieron’ny liona sy ny liona tanora eo amin’ny rembiny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: koa na dia betsaka aza ny mpiandry ondry voaantso hamely azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia tsy matahotra ny feon’ireo izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: na mivarahontsana noho ny fihorakorahany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tahaka izany no hidinan’Andriamanitra, Tompon’izao rehetra izao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'hiady ao amin’ny tendrombohitra '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Ziona
  - type: text
    text: ' sy ny havoanany.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Tahaka ny fandrakofan’ny vorona amin’ny elany
- type: usfm
  marker: q1
  children:
  - type: text
    text: no hiarovan’Andriamanitra, Tompon’izao rehetra izao, an’i Jerosalema;
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady hiaro Izy no hamonjy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, sady hiantra no hanafaka.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Koa miverena ho amin’Izay efa nikomianareo fatratra ry Zanak’Israely ô! '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Fa amin’izany andro izany dia harian’ny olona rehetra ny andriamanitra volafotsiny sy ny andriamanitra volamenany, izay fahotana nataon’ny tananareo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ho lavo ny Asiriana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho lavon’ny sabatra izay tsy mba an’olona;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, sabatra izay tsy mba an’olombelona no handringanana azy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: handositra ny sabatra izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hampanaovina fanompoana ny zatovony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Handositra noho ny tahotra ny mpanjakany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hivadi-po eo anoloan’ny faneva ny mpanapaka eo aminy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'hoy NY TOMPO, izay manana afo ao '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Ziona
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy fatana fandoroana ao Jerosalema.
