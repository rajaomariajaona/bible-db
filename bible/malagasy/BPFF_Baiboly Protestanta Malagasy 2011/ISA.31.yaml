document_id: ISA.31,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Tsy Andriamanitra ny Ejiptiana fa olona
  - type: text
    content: Lozan’izay midina any Ejipta hitady famonjena,
  - type: text
    content: sy izay miantehitra amin’ny soavaly
  - type: text
    content: ary matoky ny kalesy fitondra miady satria maro ireny,
  - type: text
    content: sy ny mpitaingin-tsoavaly satria mahery dia mahery ireny,
  - type: text
    content: fa tsy mibanjina ny Iray Masin’ny Israely,
  - type: text
    content: na mitady NY TOMPO!
  '2':
  - type: text
    content: Izy anefa dia hendry
  - type: text
    content: ka mahatonga loza;
  - type: text
    content: tsy mba tsoahiny ny teniny;
  - type: text
    content: fa mitsangana Izy hamely ny mpianakavin’ny mpanao ratsy
  - type: text
    content: sy izay manampy ny mpanao heloka.
  '3':
  - type: text
    content: Olona ihany ny Ejiptiana fa tsy Andriamanitra;
  - type: text
    content: nofo ihany ny soavaliny fa tsy fanahy.
  - type: text
    content: Koa rehefa atsotran’NY TOMPO ny tanany
  - type: text
    content: dia ho tafintohina izay manampy
  - type: text
    content: ary ho potraka izay ampiana,
  - type: text
    content: koa samy ho levona avokoa izy rehetra.
  - type: heading
    content: Hiaro an’i Jerosalema NY TOMPO
  '4':
  - type: text
    content: 'Fa izao no nolazain’NY TOMPO tamiko:'
  - type: text
    content: Tahaka ny fieron’ny liona sy ny liona tanora eo amin’ny rembiny,
  - type: text
    content: koa na dia betsaka aza ny mpiandry ondry voaantso hamely azy
  - type: text
    content: dia tsy matahotra ny feon’ireo izy,
  - type: text
    content: na mivarahontsana noho ny fihorakorahany,
  - type: text
    content: tahaka izany no hidinan’Andriamanitra, Tompon’izao rehetra izao,
  - type: text
    content: 'hiady ao amin’ny tendrombohitra '
  - type: text
    content: Ziona
  - type: text
    content: ' sy ny havoanany.'
  '5':
  - type: text
    content: Tahaka ny fandrakofan’ny vorona amin’ny elany
  - type: text
    content: no hiarovan’Andriamanitra, Tompon’izao rehetra izao, an’i Jerosalema;
  - type: text
    content: sady hiaro Izy no hamonjy;
  - type: text
    content: eny, sady hiantra no hanafaka.
  '6':
  - type: text
    content: 'Koa miverena ho amin’Izay efa nikomianareo fatratra ry Zanak’Israely ô! '
  '7':
  - type: text
    content: Fa amin’izany andro izany dia harian’ny olona rehetra ny andriamanitra volafotsiny sy ny andriamanitra volamenany, izay fahotana nataon’ny tananareo.
  '8':
  - type: text
    content: Ho lavo ny Asiriana,
  - type: text
    content: ho lavon’ny sabatra izay tsy mba an’olona;
  - type: text
    content: eny, sabatra izay tsy mba an’olombelona no handringanana azy;
  - type: text
    content: handositra ny sabatra izy
  - type: text
    content: ary hampanaovina fanompoana ny zatovony.
  '9':
  - type: text
    content: Handositra noho ny tahotra ny mpanjakany
  - type: text
    content: ary hivadi-po eo anoloan’ny faneva ny mpanapaka eo aminy,
  - type: text
    content: 'hoy NY TOMPO, izay manana afo ao '
  - type: text
    content: Ziona
  - type: text
    content: sy fatana fandoroana ao Jerosalema.
