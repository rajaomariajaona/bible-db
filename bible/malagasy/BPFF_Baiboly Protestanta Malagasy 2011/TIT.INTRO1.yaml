    - type: text
      text: INDRAY MIJERY
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Misy fitoviana be amin’ny 1, 2Timoty ity epistily ity ka tokony ho fotoana nifanarakaraka no nanoratana ireo. Heverina fa tany Nikopolia, tanàna any Gresy, i Paoly no manoratra, taorianan’ny nanoratany ny 1Timoty.
  - type: usfm
    marker: is1
    children:
    - type: text
      text: Ny votoatin’ny Epistily
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Napetrak’i Paoly tao amin’ny Fiangonana tao Kreta i Titosy mba handamina izay mbola tsy tanteraka sady hametraka loholona sy mpitondra fiangonana ao. Ny fotokevitra ao amin’ny Epistily dia mitovitovy ihany amin’izay hita ao amin’ny 1, 2Timoty, dia ny hihazonan’i Titosy ny fampianarana tsy misy kilema izay mampandroso ny fahatahorana an’Andriamanitra ary hanoherany ireo manao fampianarana hafahafa toy izay hita ao amin’ny 1Timoty: 1.10, 14-16; 3.9.'
  - type: usfm
    marker: iot
    children:
    - type: text
      text: Ny firafitry ny Epistily
  - type: usfm
    marker: io1
    children:
    - type: text
      text: 'Fitarihanteny sy fiarahabana apostolika: 1.1-4'
  - type: usfm
    marker: io1
    children:
    - type: text
      text: 'Fampahatsiarovana ny andraikitr’i Titosy: 1.5-16'
  - type: usfm
    marker: io1
    children:
    - type: text
      text: 'Famintinana ireo fananarana manokana tandrify ny Mpino: 2–3.11'
  - type: usfm
    marker: io1
    children:
    - type: text
      text: Famaranana 3.12-15
