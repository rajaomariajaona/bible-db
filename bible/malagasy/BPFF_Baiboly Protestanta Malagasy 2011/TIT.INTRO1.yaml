document_id: TIT.INTRO1,3103
type_code: plt
verses:
  '1':
  - type: text
    content: INDRAY MIJERY
  - type: text
    content: Misy fitoviana be amin’ny 1, 2Timoty ity epistily ity ka tokony ho fotoana nifanarakaraka no nanoratana ireo. Heverina fa tany Nikopolia, tanàna any Gresy, i Paoly no manoratra, taorianan’ny nanoratany ny 1Timoty.
  - type: text
    content: Ny votoatin’ny Epistily
  - type: text
    content: 'Napetrak’i Paoly tao amin’ny Fiangonana tao Kreta i Titosy mba handamina izay mbola tsy tanteraka sady hametraka loholona sy mpitondra fiangonana ao. Ny fotokevitra ao amin’ny Epistily dia mitovitovy ihany amin’izay hita ao amin’ny 1, 2Timoty, dia ny hihazonan’i Titosy ny fampianarana tsy misy kilema izay mampandroso ny fahatahorana an’Andriamanitra ary hanoherany ireo manao fampianarana hafahafa toy izay hita ao amin’ny 1Timoty: 1.10, 14-16; 3.9.'
  - type: text
    content: Ny firafitry ny Epistily
  - type: text
    content: 'Fitarihanteny sy fiarahabana apostolika: 1.1-4'
  - type: text
    content: 'Fampahatsiarovana ny andraikitr’i Titosy: 1.5-16'
  - type: text
    content: 'Famintinana ireo fananarana manokana tandrify ny Mpino: 2–3.11'
  - type: text
    content: Famaranana 3.12-15
