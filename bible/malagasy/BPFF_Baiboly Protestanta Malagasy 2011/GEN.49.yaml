document_id: GEN.49,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny tsodrano nataon’i Jakoba tamin’ireo zanany roa amby folo lahy
  - type: text
    content: 'Ary namory ireo zanany lahy i Jakoba ka niteny hoe:'
  - type: text
    content: Mivoria ianareo mba hanambarako aminareo izay ho tonga aminareo amin’ny ho avy.
  '10':
  - type: text
    content: Ny tehim-panjakana dia tsy hiala amin’i Joda
  - type: text
    content: ary ny tehim-panapahana dia tsy hiala eo anelanelan’ny tongony,
  - type: text
    content: mandra-pahatongan’i Silo
  - type: note
    content: 'Silo: Fiadanana.'
  - type: text
    content: ka hanoa azy
  - type: note
    content: 'Na: Azy.'
  - type: text
    content: ' ny firenena maro.'
  '11':
  - type: text
    content: Mamatotra ny borikiny tanora eo amin’ny tahom-boaloboka izy
  - type: text
    content: ary ny zanaky ny borikivaviny eo amin’ny tahom-boaloboka tsara;
  - type: text
    content: manasa ny fitafiany amin’ny divay izy
  - type: text
    content: ary ny akanjony amin’ny ram-boaloboka.
  '12':
  - type: text
    content: Mivoaramena ny masony noho ny divay
  - type: text
    content: ary fotsy ny nifiny noho ny ronono.
  '13':
  - type: text
    content: I Zebolona dia honina eo amoron-dranomasina,
  - type: text
    content: eny amoron-dranomasina misy ny fitodian-tsambo,
  - type: text
    content: ary ny sisintaniny dia hifanolotra amin’i Sidona.
  '14':
  - type: text
    content: Isakara dia boriky henjana
  - type: text
    content: mandry eny anelanelan’ny vala.
  '15':
  - type: text
    content: Nony hitany fa tsara ny toeram-pialan-tsasatra
  - type: text
    content: sady mahafinaritra ny tany
  - type: text
    content: dia nanongilana ny sorony hitondra entana izy
  - type: text
    content: ka tonga mpanompo mandoa hetra.
  '16':
  - type: text
    content: I Dana
  - type: note
    content: 'Dana: Mpitsara.'
  - type: text
    content: ' dia hitsara ny olony'
  - type: text
    content: tahaka ny iray amin’ireo fokon’ny Israely.
  '17':
  - type: text
    content: I Dana dia ho menarana ao amoron-dalana,
  - type: text
    content: ho bibilava misy tandroka ao an-dalana izy,
  - type: text
    content: manaikitra ny kitrokelin’ny soavaly
  - type: text
    content: ka potraka miantsilany ny mpitaingina azy.
  '18':
  - type: text
    content: Ny famonjenao no andrasako, TOMPO ô!
  '19':
  - type: text
    content: I Gada dia misy andian-jiolahy manafika azy
  - type: text
    content: fa izy kosa dia hamely am-pitaka.
  '2':
  - type: text
    content: Miangòna ka mihainoa, ry zanakalahin’i Jakoba,
  - type: text
    content: 'eny, mihainoa an’Israely rainareo:'
  '20':
  - type: text
    content: Ao amin’i Asera ny sakafo matavy
  - type: text
    content: ka izy no hanome sakafo matsiro ny mpanjaka.
  '21':
  - type: text
    content: I Naftaly dia dieravavy tsy voafehy;
  - type: text
    content: mpanome teny mahafinaritra izy.
  '22':
  - type: text
    content: I Josefa dia sampana mahavokatra;
  - type: text
    content: eny, sampana mahavokatra eo anilan’ny loharano;
  - type: text
    content: ny rantsany dia mananika mihoatra ny fefy.
  '23':
  - type: text
    content: Nampahory azy ny mpitifitra,
  - type: text
    content: nitifitra sy nanenjika azy;
  '24':
  - type: text
    content: kanefa mateza hery ny tsipìkany
  - type: text
    content: ary mailamailaka ny sandriny,
  - type: text
    content: noho ny tanan’Ilay Maherin’i Jakoba,
  - type: text
    content: noho ny Mpiandry, izay Vatolampin’Israely,
  '25':
  - type: text
    content: noho Andriamanitry ny rainao
  - type: text
    content: ka Izy no hamonjy anao;
  - type: text
    content: noho ny Tsitoha ka Izy no hitahy anao,
  - type: text
    content: dia fitahiana avy amin’ny lanitra any ambony
  - type: text
    content: sy fitahiana avy amin’ny lalina, izay mamitsaka any ambany,
  - type: text
    content: ary fitahiana avy amin’ny nono sy ny kibo.
  '26':
  - type: text
    content: Ny tsodranon’ny rainao dia mahery
  - type: text
    content: noho ny tsodranon’ireo havoana mandrakizay
  - type: text
    content: sy ny zavatra mahafinaritra amin’ny tendrombohitra fahagola;
  - type: text
    content: ho eo an-dohan’i Josefa izany,
  - type: text
    content: ho eo an-tampon-dohan’ilay nalaza tamin’ny rahalahiny.
  '27':
  - type: text
    content: I Benjamina dia amboadia mamiravira;
  - type: text
    content: nony maraina izy dia homan-dremby,
  - type: text
    content: nony hariva mizara babo.
  '28':
  - type: text
    content: Ireo rehetra ireo no fokon’ny Israely roa amby folo. Izany no nolazain’ny rainy taminy sy nitsofany rano azy. Samy araka ny tsodrano izay tokony ho azy ireo avy no nitsofany rano azy ireo.
  - type: heading
    content: Ny nahafatesan’i Jakoba
  '29':
  - type: text
    content: 'Dia nanafatra an’i Josefa i Jakoba ka niteny taminy hoe: Efa madiva hangonina any amin’ny razako aho; aleveno any amin’ny razako aho, dia ao anatin’ilay zohy izay any amin’ny sahan’i Efrona hetita, '
  '3':
  - type: text
    content: Ry Robena, lahimatoako ianao,
  - type: text
    content: heriko sy voalohan’ny tanjako;
  - type: text
    content: manana tombom-pisandratana, manana tombon-kery.
  '30':
  - type: text
    content: 'ao anatin’ilay zohy izay any amin’ny saha Makpela, izay tandrifin’i Mamre, any amin’ny tany Kanana, dia ilay novidin’i Abrahama niaraka tamin’ny saha, tamin’i Efrona hetita, ho tany fandevenana. '
  '31':
  - type: text
    content: 'Tao no nandevenana an’i Abrahama sy i Saraha vadiny; tao koa no nandevenana an’Isaka sy i Rebeka vadiny; tao koa no nandevenako an’i Lea. '
  '32':
  - type: text
    content: 'Ny saha sy ny zohy ao anatiny dia novidina tamin’ny taranak’i Heta. '
  '33':
  - type: text
    content: Rehefa vitan’i Jakoba ny hafatra nataony tamin’ny zanany lahy rehetra dia navonkiny teo am-parafara ny tongony, dia niala aina izy ka nangonina any amin’ny razany.
  '4':
  - type: text
    content: Mandroadroatra toy ny rano anefa ianao ka tsy hanana tombony intsony,
  - type: text
    content: satria niakatra tamin’ny fandrianan’ny rainao ianao,
  - type: text
    content: ary tamin’izany no nandotoanao azy
  - type: note
    content: Zahao 35. 22.
  - type: text
    content: .
  - type: text
    content: Endre, ny farafarako lahy ka niakarany!
  '5':
  - type: text
    content: I Simeona sy i Levy dia niray saina;
  - type: text
    content: fiadiana mandoza ny sabany
  - type: note
    content: Zahao 34. 25-31.
  - type: text
    content: ;
  '6':
  - type: text
    content: tsy hiditra amin’izay fiokoany aho
  - type: text
    content: ary tsy hiray amin’izay fivoriany!
  - type: text
    content: Satria tamin’ny fahatezerany no namonoany olona
  - type: text
    content: ary tamin’ny fahasahisahiany no nanatraingoany omby.
  '7':
  - type: text
    content: Ho voaozona anie ny fahatezerany, satria nasiaka izany
  - type: text
    content: ary ny fahavinirany, satria loza izany!
  - type: text
    content: Hampihahakahaka azy eny amin’i Jakoba aho
  - type: text
    content: ary hanely azy eny amin’ny Israely.
  '8':
  - type: text
    content: Ry Joda
  - type: note
    content: Zahao 29.35.
  - type: text
    content: ', hoderain’ny rahalahinao ianao.'
  - type: text
    content: Ny tananao dia ho ao amin’ny vozon’ny fahavalonao;
  - type: text
    content: hiankohoka eo anatrehanao ny zanaky ny rainao.
  '9':
  - type: text
    content: Zanaka liona i Joda.
  - type: text
    content: Avy niremby ianao, anaka!
  - type: text
    content: Mamitsaka, mandry toy ny liona izy,
  - type: text
    content: toy ny liom-bavy, koa iza no hanaitra azy?
