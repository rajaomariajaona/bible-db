document_id: GEN.49,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny tsodrano nataon’i Jakoba tamin’ireo zanany roa amby folo lahy
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ary namory ireo zanany lahy i Jakoba ka niteny hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mivoria ianareo mba hanambarako aminareo izay ho tonga aminareo amin’ny ho avy.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Ny tehim-panjakana dia tsy hiala amin’i Joda
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny tehim-panapahana dia tsy hiala eo anelanelan’ny tongony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mandra-pahatongan’i Silo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '49.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Silo: Fiadanana.'
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hanoa azy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '49.10 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Azy.
      marker-yv: yv-n
    - type: text
      text: ' ny firenena maro.'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Mamatotra ny borikiny tanora eo amin’ny tahom-boaloboka izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny zanaky ny borikivaviny eo amin’ny tahom-boaloboka tsara;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: manasa ny fitafiany amin’ny divay izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny akanjony amin’ny ram-boaloboka.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Mivoaramena ny masony noho ny divay
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary fotsy ny nifiny noho ny ronono.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: I Zebolona dia honina eo amoron-dranomasina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny amoron-dranomasina misy ny fitodian-tsambo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny sisintaniny dia hifanolotra amin’i Sidona.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Isakara dia boriky henjana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mandry eny anelanelan’ny vala.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Nony hitany fa tsara ny toeram-pialan-tsasatra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady mahafinaritra ny tany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia nanongilana ny sorony hitondra entana izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tonga mpanompo mandoa hetra.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: I Dana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '49.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Dana: Mpitsara.'
      marker-yv: yv-n
    - type: text
      text: ' dia hitsara ny olony'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tahaka ny iray amin’ireo fokon’ny Israely.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: I Dana dia ho menarana ao amoron-dalana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho bibilava misy tandroka ao an-dalana izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: manaikitra ny kitrokelin’ny soavaly
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka potraka miantsilany ny mpitaingina azy.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Ny famonjenao no andrasako, TOMPO ô!
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: I Gada dia misy andian-jiolahy manafika azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa izy kosa dia hamely am-pitaka.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Miangòna ka mihainoa, ry zanakalahin’i Jakoba,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'eny, mihainoa an’Israely rainareo:'
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Ao amin’i Asera ny sakafo matavy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka izy no hanome sakafo matsiro ny mpanjaka.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: I Naftaly dia dieravavy tsy voafehy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mpanome teny mahafinaritra izy.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: I Josefa dia sampana mahavokatra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, sampana mahavokatra eo anilan’ny loharano;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny rantsany dia mananika mihoatra ny fefy.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Nampahory azy ny mpitifitra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nitifitra sy nanenjika azy;
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: kanefa mateza hery ny tsipìkany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mailamailaka ny sandriny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: noho ny tanan’Ilay Maherin’i Jakoba,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: noho ny Mpiandry, izay Vatolampin’Israely,
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: noho Andriamanitry ny rainao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka Izy no hamonjy anao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: noho ny Tsitoha ka Izy no hitahy anao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia fitahiana avy amin’ny lanitra any ambony
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy fitahiana avy amin’ny lalina, izay mamitsaka any ambany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary fitahiana avy amin’ny nono sy ny kibo.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Ny tsodranon’ny rainao dia mahery
  - type: usfm
    marker: q1
    children:
    - type: text
      text: noho ny tsodranon’ireo havoana mandrakizay
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny zavatra mahafinaritra amin’ny tendrombohitra fahagola;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho eo an-dohan’i Josefa izany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho eo an-tampon-dohan’ilay nalaza tamin’ny rahalahiny.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: I Benjamina dia amboadia mamiravira;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nony maraina izy dia homan-dremby,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nony hariva mizara babo.
  '28':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Ireo rehetra ireo no fokon’ny Israely roa amby folo. Izany no nolazain’ny rainy taminy sy nitsofany rano azy. Samy araka ny tsodrano izay tokony ho azy ireo avy no nitsofany rano azy ireo.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nahafatesan’i Jakoba
    marker-yv: yv-h
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Dia nanafatra an’i Josefa i Jakoba ka niteny taminy hoe: Efa madiva hangonina any amin’ny razako aho; aleveno any amin’ny razako aho, dia ao anatin’ilay zohy izay any amin’ny sahan’i Efrona hetita, '
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Ry Robena, lahimatoako ianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: heriko sy voalohan’ny tanjako;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: manana tombom-pisandratana, manana tombon-kery.
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'ao anatin’ilay zohy izay any amin’ny saha Makpela, izay tandrifin’i Mamre, any amin’ny tany Kanana, dia ilay novidin’i Abrahama niaraka tamin’ny saha, tamin’i Efrona hetita, ho tany fandevenana. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Tao no nandevenana an’i Abrahama sy i Saraha vadiny; tao koa no nandevenana an’Isaka sy i Rebeka vadiny; tao koa no nandevenako an’i Lea. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Ny saha sy ny zohy ao anatiny dia novidina tamin’ny taranak’i Heta. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Rehefa vitan’i Jakoba ny hafatra nataony tamin’ny zanany lahy rehetra dia navonkiny teo am-parafara ny tongony, dia niala aina izy ka nangonina any amin’ny razany.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Mandroadroatra toy ny rano anefa ianao ka tsy hanana tombony intsony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria niakatra tamin’ny fandrianan’ny rainao ianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tamin’izany no nandotoanao azy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '49.4 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Zahao '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 35. 22.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Endre, ny farafarako lahy ka niakarany!
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: I Simeona sy i Levy dia niray saina;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fiadiana mandoza ny sabany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '49.5 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Zahao '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 34. 25-31.
      marker-yv: yv-n
    - type: text
      text: ;
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: tsy hiditra amin’izay fiokoany aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy hiray amin’izay fivoriany!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Satria tamin’ny fahatezerany no namonoany olona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tamin’ny fahasahisahiany no nanatraingoany omby.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Ho voaozona anie ny fahatezerany, satria nasiaka izany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny fahavinirany, satria loza izany!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hampihahakahaka azy eny amin’i Jakoba aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hanely azy eny amin’ny Israely.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Ry Joda
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '49.8 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Zahao '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 29.35.
      marker-yv: yv-n
    - type: text
      text: ', hoderain’ny rahalahinao ianao.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny tananao dia ho ao amin’ny vozon’ny fahavalonao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hiankohoka eo anatrehanao ny zanaky ny rainao.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Zanaka liona i Joda.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avy niremby ianao, anaka!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mamitsaka, mandry toy ny liona izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toy ny liom-bavy, koa iza no hanaitra azy?
