document_id: 1CH.14,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: I Davida tao Jerosalema
  - type: heading
    content: 2Sam 5.11-16
  - type: text
    content: 'Ary nandefa iraka tany amin’i Davida i Hirama, mpanjakan’i Tiro, sady nampanatitra hazo sedera ho azy no nandefa mpanao trano vato sy mpandrafitra hanao trano koa. '
  '10':
  - type: text
    content: 'Ary nanontany an’Andriamanitra i Davida hoe: Hiakatra hamely ny Filistina va aho? Hatolotrao eo an-tanako va izy? Dia hoy NY TOMPO taminy: Miakara fa hatolotro eo an-tananao izy. '
  '11':
  - type: text
    content: 'Dia niakatra nankao Baala-Perazima i Davida ka namely azy teo; dia hoy izy: Ny tanako no namakian’Andriamanitra ny fahavaloko hipariaka toy ny rano vaky; koa izany no nanaovany ny anaran’io tany io hoe Baala-Perazima'
  - type: note
    content: 'Baala-Perazima: Tany nahavakiana.'
  - type: text
    content: '. '
  '12':
  - type: text
    content: Dia nilaozan’ireny teo ireo andriamaniny ka nasain’i Davida nodorana tamin’ny afo.
  '13':
  - type: text
    content: 'Ary tonga indray ny Filistina ka nihahakahaka teny an-dohasaha. '
  '14':
  - type: text
    content: 'Dia nanontany an’Andriamanitra indray i Davida ka novaliny hoe: Aza manenjika azy; fa mivilia lalana manodidina azy; dia mandehana fa ho tonga eo aminy ianao eo amin’ny tandrifin’ny hazo balisama. '
  '15':
  - type: text
    content: 'Rehefa mandre fingadongadon’olona eny amin’ny tendron’ny hazo balisama ianao dia miaingà amin’izay hiady; fa amin’izay no efa miainga mialoha anao Andriamanitra hamely ny miaramilan’ny Filistina. '
  '16':
  - type: text
    content: 'Dia nanatanteraka izay nandidian’Andriamanitra azy i Davida ka namely ny miaramilan’ny Filistina hatrany Gibeona ka hatrany Gezera. '
  '17':
  - type: text
    content: Niely teny amin’ny tany rehetra ny lazan’i Davida; ary nataon’NY TOMPO nahazo ny firenena rehetra ny tahotra an’i Davida.
  '2':
  - type: text
    content: Dia fantatr’i Davida fa NY TOMPO efa nampitoetra azy ho mpanjakan’ny Israely ka voasandratra ny fanjakany noho ny amin’ny Israely olony.
  '3':
  - type: text
    content: 'Nampaka-bady tany Jerosalema indray i Davida ka niteraka zazalahy sy zazavavy. '
  '4':
  - type: text
    content: 'Ireto no anaran’ny zanany naterany tany Jerosalema: I Samoa, i Sobaba, i Natana, i Solomona, '
  '5':
  - type: text
    content: 'i Jibara, i Elisoa, i Elipeleta, '
  '6':
  - type: text
    content: 'i Noga, i Nafega, i Jafia, '
  '7':
  - type: text
    content: i Elisama, i Beliada ary i Elifeleta.
  - type: heading
    content: Ny nandresen’i Davida ny Filistina
  - type: heading
    content: 2Sam 5.17-25
  '8':
  - type: text
    content: 'Nony ren’ny Filistina fa voahosotra ho mpanjakan’ny Israely rehetra i Davida dia niakatra hitady azy ny Filistina rehetra. Koa raha ren’i Davida izany dia nivoaka hiady taminy izy. '
  '9':
  - type: text
    content: 'Dia tonga ny Filistina ka nihahakahaka teny amin’ny lohasahan’ny Refaìta. '
