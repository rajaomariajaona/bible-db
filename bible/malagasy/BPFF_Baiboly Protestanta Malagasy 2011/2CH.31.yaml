document_id: 2CH.31
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nandaminan’i Hezekia ny fanompoam-pivavahana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Nony vita izany rehetra izany dia niainga nankany an-tanànan’i Joda ny Israely rehetra izay tao ka nanorotoro ny tsangambaton-tsampy sy nikapa ny tsangankazon-tsampy ho an’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Aseraha
  - type: text
    text: ' ary nandrava ny toerana fanaovana sorona sy ny alitara manerana an’i Joda sy Benjamina rehetra ary tany Efraima sy Manase koa ambara-paharavany azy rehetra. Samy nody ho any amin’ny taniny sy ny tanànany avy ny Zanak’Israely rehetra avy eo.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Dia nanendry ny antokon’ny mpisorona sy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: levita
  - type: text
    text: ' araka ny antokony avy i Hezekia, samy araka ny fanompoany avy, dia ny mpisorona sy ny levita ho amin’ny fanatitra dorana manontolo, ny fanati-pihavanana, hanao fanompoam-pivavahana, hisaotra ary hidera eny amin’ny vavahadin’ny tobin’NY TOMPO. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Izay hatao fanatitra dorana manontolo rehetra dia nomen’ny mpanjaka avy tamin’ny fananany, dia ny fanatitra dorana manontolo maraina sy hariva sy ny fanatitra dorana manontolo atao amin’ny Sabata sy amin’ny voaloham-bolana sy amin’ny fotoam-pivavahana, araka ny voasoratra ao amin’ny lalànan’NY TOMPO. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary nasainy nandoa ny anjaran’ny mpisorona sy ny levita ny olona izay nonina tany Jerosalema mba hipetrahany tsara amin’ny lalànan’NY TOMPO. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Nony niely izany teny izany dia nitondra voaloham-bokatra betsaka ny Zanak’Israely, dia vary, ranom-boaloboka, diloilo, tantely ary vokatry ny tany isan-karazany; ny fahafolonkarena tamin’ny zavatra rehetra dia betsaka koa no noentiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary ny Israely sy ny Joda, izay nonina tany an-tanànan’i Joda, dia nitondra ny fahafolonkarena koa, dia omby sy ondry aman’osy, ary ny fahafolon’ny zavatra masina izay nohamasinina ho an’NY TOMPO Andriamaniny, ary natokotokony maro miavosa ireny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Tamin’ny volana fahatelo izy no nanomboka nanokotoko azy, ary tamin’ny volana fahafito no nahavitany azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Nony avy i Hezekia sy ny mpanapaka ka nahita ireo zavatra niavosa ireo dia nisaotra NY TOMPO sy ny Israely olony izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Dia nanontany ny mpisorona sy ny levita momba ireo zavatra niavosa ireo i Hezekia. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary namaly azy i Azaria mpisoronabe, taranak’i Zadoka hoe: Hatramin’ny nanombohan’ny olona nitondra ny fanomezana ho ao amin’ny tranon’NY TOMPO dia nihinana izahay ka voky sady be koa ny sisa; satria nitahy ny olony NY TOMPO ka ny sisa ireo betsaka ireo.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Dia nasain’i Hezekia nanamboatra efitrano fitahirizana tao amin’ny tranon’NY TOMPO izy; dia namboariny izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary tamin’ny fahamarinana no nampidirany ny fanomezana sy ny fahafolonkarena ary ny zavatra nohamasininy. I Konania levita no mpitahiry ireny, i Simey rahalahiny no lefiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'I Jehiela, i Azazia, i Nahata, i Asahela, i Jerimota, i Jozabada, i Eliala, i Jismakia, i Mahata ary i Benaia, fehin’i Konania sy i Simey rahalahiny, no tonian’ireny, araka ny didin’i Hezekia mpanjaka sy i Azaria, mpanapaka ny tranon’Andriamanitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary i Kore levita, zanak’i Jimna, mpiandry varavarana tao atsinanana, no tonian’ny fanatitra an-tsitrapo ho an’Andriamanitra ka hizara ny fanomezana ho an’NY TOMPO sy ny zava-masina indrindra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ny fehin’i Kore dia i Edena, i Miniamina, i Jesoa, i Semaia, i Amaria ary i Sekania tao amin’ny tanànan’ny mpisorona; adidin’ireo ny hizara ho an’ny rahalahiny araka ny antokony avy, na ny lehibe na ny kely, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'afa-tsy ny lehilahy voasoratra hatramin’ny telo taona no ho miakatra, dia izay miditra ao amin’ny tranon’NY TOMPO handray ny anjarany isanandro noho ny fanompoany amin’ny anjara raharahany araka ny antokony avy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ny amin’ny fanoratana ny mpisorona dia nosoratana araka ny fianakaviany avy; ny levita koa dia hatramin’ny roapolo taona no ho miakatra, araka ny anjara raharahany sy ny antokony avy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Nomena koa ny ankohonany rehetra izay voasoratra, dia ny vadiny mbamin’ny zanany lahy sy ny zanany vavy rehetra; satria tamin’ny fahamarinany no nanamasinany ny tenany ny amin’ny zavatra masina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ary ho an’ny mpisorona, taranak’i Arona, koa, izay tany amin’ny tany manodidina ny tanànany, dia nisy olona voatonona anarana tamin’ny isan-tanàna hanome anjara ny lehilahy rehetra amin’ny mpisorona sy ny levita rehetra voasoratra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Toy izany no nataon’i Hezekia nanerana ny Joda rehetra; fa nanao izay tsara sy mety ary marina teo anatrehan’NY TOMPO Andriamaniny izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ary ny raharaha rehetra izay natombony ny amin’ny fanompoana ao amin’ny tranon’Andriamanitra sy ny lalàna ary ny didy hitadiavana an’Andriamaniny dia nataony tamin’ny fony manontolo ka nanambinana azy.
