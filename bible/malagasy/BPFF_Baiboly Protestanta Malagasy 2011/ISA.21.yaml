document_id: ISA.21
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Rava i Babilona
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ny amin’ny loza hanjo ny tany efitra amoron’ny ranomasina
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ny tany efitra amoron’ny ranomasina: '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Ny helodranomasin’i Persia no lazaina eto.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tahaka ny firimorimon’ny tadio any Negeva
- type: usfm
  marker: q1
  children:
  - type: text
    text: no fiaviny avy any an-tany efitra, avy any amin’ny tany mahatahotra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Misy fahitana mampahory aseho amiko:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mamitaka ny mpamitaka ary mandringana ny mpandringana.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Iakaro, ry Elama ô! Ataovy fahirano, ry Media ô!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hatsahatro ny fisentoana rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ary raha nahita izany aho dia feno fanaintainana ny andilako;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fijalijaliana no nahazo ahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: tahaka ny fijalijalian’ny vehivavy raha miteraka;
- type: usfm
  marker: q1
  children:
  - type: text
    text: niolanolana fatratra aho ka tsy nandre;
- type: usfm
  marker: q1
  children:
  - type: text
    text: toran-kovitra aho ka tsy nahita.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Niemponempona ny foko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: horohoro no nahazo ahy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: navadiny ho fangovitana ny hariva niriko ho avy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Velarina ny latabatra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: miambina ny mpiambina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mihinana sy misotro ny olona.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mitsangàna ianareo lehibe!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hosory diloilo ny ampinga!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Fa izao no nolazain’NY TOMPO tamiko:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mandehana, manendre mpitily,
- type: usfm
  marker: q1
  children:
  - type: text
    text: koa izay hitany no aoka holazainy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Dia nahita izy ka indreo kalesy fitondra miady,
- type: usfm
  marker: q1
  children:
  - type: text
    text: soavaly mandeha tsiroaroa
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy boriky betsaka
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary rameva betsaka;
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia nihaino izy; eny, nihaino tsara;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dia niantso mafy nanao feon-diona izy hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tompo ô! Mijanona mandrakariva eto ambonin’ny fitazanako aho amin’ny antoandro,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mitoetra eto amin’ny fiambenako aho mandritra ny alina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Koa indro, avy ny kalesy fitondra miady miaraka amin’olona;
- type: usfm
  marker: q1
  children:
  - type: text
    text: soavaly mandeha tsiroaroa!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ary hoy izy hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Rava, rava i Babilona!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny sarivongan’ny andriamaniny rehetra dia voatorotoro miraraka amin’ny tany!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ianareo izay voavely toy ny vary teo am-pamoloako!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay efa reko tamin’Andriamanitra, Tompon’izao rehetra izao, Andriamanitry ny Israely,
- type: usfm
  marker: q1
  children:
  - type: text
    text: no nambarako taminareo.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ry mpiambina ô! Amin’ny firy alina moa izao?
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ny amin’ny loza hanjo an’i Edoma.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Misy miantsoantso ahy any Seìra hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ry mpiambina ô, toy inona alina moa izao?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ry mpiambina ô, toy inona alina moa izao?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Dia hoy ny mpiambina:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Avy ny maraina, avy koa ny alina.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Raha mbola ta hanontany ianareo dia manontania ihany!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia miverena indray; eny, miverena!
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny loza hanjo an’i Arabia
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ny loza hanjo an’i Arabia.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Any anaty kirihitrala any Arabia no handrianareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ry andian’ny Dedanita!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Itondray rano ny mangetaheta;
- type: usfm
  marker: q1
  children:
  - type: text
    text: itondray mofo mitsena ireo olona mandositra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ry mponina amin’ny tany Tema.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Fa mandositra ny sabatra ireo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ny sabatra voatsoaka sy ny tsipìka voahenjana
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny havesatry ny ady.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Fa izao no nolazain’NY TOMPO tamiko: Ato anatin’ny herintaona, tahaka ny taonan’ny mpikarama, dia ho levona avokoa ny voninahitr’i Kedara. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ho vitsy foana sisa ny tsipìka izay an’ny lehilahy mahery, taranak’i Kedara; fa NY TOMPO, Andriamanitry ny Israely, no efa niteny.
