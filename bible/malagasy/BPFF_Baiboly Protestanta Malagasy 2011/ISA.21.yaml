document_id: ISA.21,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Rava i Babilona
  - type: text
    content: Ny amin’ny loza hanjo ny tany efitra amoron’ny ranomasina
  - type: note
    content: 'ny tany efitra amoron’ny ranomasina: Ny helodranomasin’i Persia no lazaina eto.'
  - type: text
    content: .
  - type: text
    content: Tahaka ny firimorimon’ny tadio any Negeva
  - type: text
    content: no fiaviny avy any an-tany efitra, avy any amin’ny tany mahatahotra.
  '10':
  - type: text
    content: Ianareo izay voavely toy ny vary teo am-pamoloako!
  - type: text
    content: Izay efa reko tamin’Andriamanitra, Tompon’izao rehetra izao, Andriamanitry ny Israely,
  - type: text
    content: no nambarako taminareo.
  - type: heading
    content: Ry mpiambina ô! Amin’ny firy alina moa izao?
  '11':
  - type: text
    content: Ny amin’ny loza hanjo an’i Edoma.
  - type: text
    content: 'Misy miantsoantso ahy any Seìra hoe:'
  - type: text
    content: Ry mpiambina ô, toy inona alina moa izao?
  - type: text
    content: Ry mpiambina ô, toy inona alina moa izao?
  '12':
  - type: text
    content: 'Dia hoy ny mpiambina:'
  - type: text
    content: Avy ny maraina, avy koa ny alina.
  - type: text
    content: Raha mbola ta hanontany ianareo dia manontania ihany!
  - type: text
    content: Dia miverena indray; eny, miverena!
  - type: heading
    content: Ny loza hanjo an’i Arabia
  '13':
  - type: text
    content: Ny loza hanjo an’i Arabia.
  - type: text
    content: Any anaty kirihitrala any Arabia no handrianareo,
  - type: text
    content: ry andian’ny Dedanita!
  '14':
  - type: text
    content: Itondray rano ny mangetaheta;
  - type: text
    content: itondray mofo mitsena ireo olona mandositra,
  - type: text
    content: ry mponina amin’ny tany Tema.
  '15':
  - type: text
    content: Fa mandositra ny sabatra ireo,
  - type: text
    content: dia ny sabatra voatsoaka sy ny tsipìka voahenjana
  - type: text
    content: ary ny havesatry ny ady.
  '16':
  - type: text
    content: 'Fa izao no nolazain’NY TOMPO tamiko: Ato anatin’ny herintaona, tahaka ny taonan’ny mpikarama, dia ho levona avokoa ny voninahitr’i Kedara. '
  '17':
  - type: text
    content: Ho vitsy foana sisa ny tsipìka izay an’ny lehilahy mahery, taranak’i Kedara; fa NY TOMPO, Andriamanitry ny Israely, no efa niteny.
  '2':
  - type: text
    content: 'Misy fahitana mampahory aseho amiko:'
  - type: text
    content: Mamitaka ny mpamitaka ary mandringana ny mpandringana.
  - type: text
    content: Iakaro, ry Elama ô! Ataovy fahirano, ry Media ô!
  - type: text
    content: Hatsahatro ny fisentoana rehetra.
  '3':
  - type: text
    content: Ary raha nahita izany aho dia feno fanaintainana ny andilako;
  - type: text
    content: fijalijaliana no nahazo ahy
  - type: text
    content: tahaka ny fijalijalian’ny vehivavy raha miteraka;
  - type: text
    content: niolanolana fatratra aho ka tsy nandre;
  - type: text
    content: toran-kovitra aho ka tsy nahita.
  '4':
  - type: text
    content: Niemponempona ny foko,
  - type: text
    content: horohoro no nahazo ahy;
  - type: text
    content: navadiny ho fangovitana ny hariva niriko ho avy.
  '5':
  - type: text
    content: Velarina ny latabatra,
  - type: text
    content: miambina ny mpiambina,
  - type: text
    content: mihinana sy misotro ny olona.
  - type: text
    content: Mitsangàna ianareo lehibe!
  - type: text
    content: Hosory diloilo ny ampinga!
  '6':
  - type: text
    content: 'Fa izao no nolazain’NY TOMPO tamiko:'
  - type: text
    content: Mandehana, manendre mpitily,
  - type: text
    content: koa izay hitany no aoka holazainy.
  '7':
  - type: text
    content: Dia nahita izy ka indreo kalesy fitondra miady,
  - type: text
    content: soavaly mandeha tsiroaroa
  - type: text
    content: sy boriky betsaka
  - type: text
    content: ary rameva betsaka;
  - type: text
    content: dia nihaino izy; eny, nihaino tsara;
  '8':
  - type: text
    content: 'Dia niantso mafy nanao feon-diona izy hoe:'
  - type: text
    content: Tompo ô! Mijanona mandrakariva eto ambonin’ny fitazanako aho amin’ny antoandro,
  - type: text
    content: ary mitoetra eto amin’ny fiambenako aho mandritra ny alina.
  '9':
  - type: text
    content: Koa indro, avy ny kalesy fitondra miady miaraka amin’olona;
  - type: text
    content: soavaly mandeha tsiroaroa!
  - type: text
    content: 'Ary hoy izy hoe:'
  - type: text
    content: Rava, rava i Babilona!
  - type: text
    content: Ary ny sarivongan’ny andriamaniny rehetra dia voatorotoro miraraka amin’ny tany!
