document_id: EZK.18,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Valin’Andriamanitra araka ny asany avy ny olona
  - type: text
    content: 'Tonga tamiko ny tenin’NY TOMPO hoe:'
  '10':
  - type: text
    content: 'Fa raha miteraka zazalahy mpanao an-keriny sy mpandatsa-dra izy ka indrisy, manao na dia ny iray ihany amin’ireo zavatra ireo aza iny, '
  '11':
  - type: text
    content: 'nefa izy tenany tsy nanao ireo zavatra ireo akory fa ilay zazalahy no mihinana eny an-tendrombohitra, na mandoto ny vadin’ny namany, '
  '12':
  - type: text
    content: 'na mampahory ny malahelo sy ny mahantra, na mandroba, na tsy mamerina ny natao antoka, na manandratra ny masony ho amin’ny sampy ka manao izay fahavetavetana, '
  '13':
  - type: text
    content: na mampanjana-bola, na maka tombony, moa ho velona va izy? Tsy ho velona izy; nanao ireo fahavetavetana rehetra ireo izy; ho faty tokoa izy ary ny rany dia ho aminy ihany!
  '14':
  - type: text
    content: 'Fa raha iny kosa indray no miteraka zazalahy izay mahita ny fahotana rehetra nataon’ny rainy, nefa nony mahita izany izy dia tsy mba manao tahaka izany '
  '15':
  - type: text
    content: 'ka tsy mihinana eny an-tendrombohitra, na manandratra ny masony ho amin’ny sampin’ny taranak’Israely, na mandoto ny vadin’ny namany, '
  '16':
  - type: text
    content: 'na mampahory olona, na maka antoka, na mandroba, fa manome ny haniny ho an’ny noana ary manafy lamba ny mitanjaka, '
  '17':
  - type: text
    content: 'miaro ny tanany tsy hampahory ny mahantra, tsy mampanàna vola na maka tombony, fa manaraka ny fitsipiko sy mandeha araka ny lalànako, dia tsy ho faty noho ny heloky ny rainy izy; ho velona tokoa izy. '
  '18':
  - type: text
    content: Ny amin’ny rainy kosa, noho ny nanaovany an-keriny sy ny nandrobany ny rahalahiny ary ny nanaovany izay tsy mety tao amin’ny fireneny, dia indro, ho faty noho ny helony izy.
  '19':
  - type: text
    content: 'Nefa hoy ianareo: Nahoana moa ny zanaka no tsy mba hitondra ny heloky ny rainy? Raha ny zanaka no manao izay marina sy mahitsy sy mitandrina ny didiko rehetra ka mankatò azy dia ho velona tokoa izy. '
  '2':
  - type: text
    content: 'Nahoana no manao izao oha-teny izao ao amin’ny tanin’ny Israely ianareo:'
  - type: text
    content: Ny ray no mihinana voaloboka maharikivy
  - type: text
    content: ka ny nifin’ny zanany no madilo?
  '20':
  - type: text
    content: Ny olona izay manota no ho faty. Ny zanaka dia tsy hitondra ny heloky ny rainy, ary ny ray dia tsy hitondra ny heloky ny zanany. Ny fahamarinan’ny marina dia ho aminy ihany, ary ny faharatsian’ny ratsy fanahy kosa dia ho aminy ihany.
  - type: heading
    content: Ny faharetana amin’ny fitondrantena marina
  '21':
  - type: text
    content: 'Fa raha ny ratsy fanahy no miala amin’ny fahotana rehetra izay nataony ka mitandrina ny didiko rehetra ary manao izay marina sy mahitsy dia ho velona tokoa izy fa tsy ho faty. '
  '22':
  - type: text
    content: 'Ny fahadisoany rehetra izay nataony dia tsy hotsarovana intsony; ho velona izy noho ny fahamarinana izay nataony. '
  '23':
  - type: text
    content: 'Moa sitrako akory va ny fahafatesan’ny ratsy fanahy, hoy NY TOMPO Andriamanitra, fa tsy ny hialany amin’ny lalany mba ho velona izy? '
  '24':
  - type: text
    content: Fa raha ny marina no miala amin’ny fahamarinany ka manao meloka ary manaraka ny fahavetavetana rehetra izay nataon’ny ratsy fanahy, ho velona va izy? Ny fahamarinany rehetra izay nataony dia tsy hotsarovana. Noho ny fahadisoana sy ny fahotana izay nataony dia ho faty izy.
  '25':
  - type: text
    content: 'Nefa hoy ianareo: Tsy marina ny lalan’ny Tompo. Mihainoa ange, ry taranak’Israely! Moa ny lalako va no tsy marina? Tsy ny lalanareo va no tsy marina? '
  '26':
  - type: text
    content: 'Raha ny marina no miala amin’ny fahamarinany ary manao meloka ka maty amin’izany dia maty noho ny heloka nataony ihany izy. '
  '27':
  - type: text
    content: 'Ary raha ny ratsy fanahy no miala amin’ny faharatsiana nataony ka manao izay marina sy mahitsy dia hahavonjy ny ainy izy. '
  '28':
  - type: text
    content: Raha mahita ny fahadisoana rehetra izay nataony izy ka miala amin’izany dia ho velona tokoa izy fa tsy ho faty.
  '29':
  - type: text
    content: 'Nefa hoy ny taranak’Israely: Tsy marina ny lalan’ny Tompo. Ry taranak’Israely, ny lalako va no tsy marina? Tsy ny lalanareo va no tsy marina? '
  '3':
  - type: text
    content: 'Raha velona koa Aho, hoy NY TOMPO Andriamanitra, dia tsy hisy hanaovanareo izany oha-teny izany ao amin’ny Israely intsony. '
  '30':
  - type: text
    content: 'Koa samy hotsaraiko araka ny lalanareo avy ianareo, ry taranak’Israely, hoy NY TOMPO Andriamanitra. Mitodiha ka mibebaha amin’ny fahadisoanareo rehetra, dia tsy ho tonga fahatafintohinana mahameloka anareo intsony izany. '
  '31':
  - type: text
    content: 'Esory ho afaka aminareo ny fahadisoanareo rehetra izay nataonareo ka manaova fo vaovao sy fanahy vaovao ho anareo. Fa nahoana no ho faty ianareo, ry taranak’Israely? '
  '32':
  - type: text
    content: Fa tsy sitrako ny fahafatesan’izay maty, hoy NY TOMPO Andriamanitra. Koa mibebaha ianareo mba ho velona!
  '4':
  - type: text
    content: Indro, Ahy ny aina rehetra; toy ny ain’ny ray, dia toy izany koa ny ain’ny zanany; samy Ahy ireny; ny olona izay manota no ho faty.
  '5':
  - type: text
    content: 'Fa raha marina ny olona ka manao izay marina sy mahitsy, '
  '6':
  - type: text
    content: 'tsy mihinana eny an-tendrombohitra, na manandratra ny masony ho amin’ny sampin’ny taranak’Israely, na mandoto ny vadin’ny namany, na manakaiky ny vehivavy izay mararin’ny fadimbolana, '
  '7':
  - type: text
    content: 'na mampahory olona fa mamerina ny natao antoka, tsy mandroba fa manome ny haniny ho an’ny noana ary manafy lamba ny mitanjaka, '
  '8':
  - type: text
    content: 'tsy mampanjana-bola na maka tombony akory fa miaro ny tanany tsy hanao izay ratsy, ary manao fitsarana marina amin’izay miady, '
  '9':
  - type: text
    content: ary mandeha araka ny lalànako sy mitandrina ny fitsipiko ka manao izay marina, dia marina izy ka ho velona tokoa, hoy NY TOMPO Andriamanitra.
