document_id: EZK.18
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Valin’Andriamanitra araka ny asany avy ny olona
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Tonga tamiko ny tenin’NY TOMPO hoe:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Nahoana no manao izao oha-teny izao ao amin’ny tanin’ny Israely ianareo:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny ray no mihinana voaloboka maharikivy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka ny nifin’ny zanany no madilo?
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Raha velona koa Aho, hoy NY TOMPO Andriamanitra, dia tsy hisy hanaovanareo izany oha-teny izany ao amin’ny Israely intsony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Indro, Ahy ny aina rehetra; toy ny ain’ny ray, dia toy izany koa ny ain’ny zanany; samy Ahy ireny; ny olona izay manota no ho faty.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Fa raha marina ny olona ka manao izay marina sy mahitsy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'tsy mihinana eny an-tendrombohitra, na manandratra ny masony ho amin’ny sampin’ny taranak’Israely, na mandoto ny vadin’ny namany, na manakaiky ny vehivavy izay mararin’ny fadimbolana, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'na mampahory olona fa mamerina ny natao antoka, tsy mandroba fa manome ny haniny ho an’ny noana ary manafy lamba ny mitanjaka, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'tsy mampanjana-bola na maka tombony akory fa miaro ny tanany tsy hanao izay ratsy, ary manao fitsarana marina amin’izay miady, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ary mandeha araka ny lalànako sy mitandrina ny fitsipiko ka manao izay marina, dia marina izy ka ho velona tokoa, hoy NY TOMPO Andriamanitra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Fa raha miteraka zazalahy mpanao an-keriny sy mpandatsa-dra izy ka indrisy, manao na dia ny iray ihany amin’ireo zavatra ireo aza iny, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'nefa izy tenany tsy nanao ireo zavatra ireo akory fa ilay zazalahy no mihinana eny an-tendrombohitra, na mandoto ny vadin’ny namany, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'na mampahory ny malahelo sy ny mahantra, na mandroba, na tsy mamerina ny natao antoka, na manandratra ny masony ho amin’ny sampy ka manao izay fahavetavetana, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: na mampanjana-bola, na maka tombony, moa ho velona va izy? Tsy ho velona izy; nanao ireo fahavetavetana rehetra ireo izy; ho faty tokoa izy ary ny rany dia ho aminy ihany!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Fa raha iny kosa indray no miteraka zazalahy izay mahita ny fahotana rehetra nataon’ny rainy, nefa nony mahita izany izy dia tsy mba manao tahaka izany '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'ka tsy mihinana eny an-tendrombohitra, na manandratra ny masony ho amin’ny sampin’ny taranak’Israely, na mandoto ny vadin’ny namany, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'na mampahory olona, na maka antoka, na mandroba, fa manome ny haniny ho an’ny noana ary manafy lamba ny mitanjaka, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'miaro ny tanany tsy hampahory ny mahantra, tsy mampanàna vola na maka tombony, fa manaraka ny fitsipiko sy mandeha araka ny lalànako, dia tsy ho faty noho ny heloky ny rainy izy; ho velona tokoa izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ny amin’ny rainy kosa, noho ny nanaovany an-keriny sy ny nandrobany ny rahalahiny ary ny nanaovany izay tsy mety tao amin’ny fireneny, dia indro, ho faty noho ny helony izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Nefa hoy ianareo: Nahoana moa ny zanaka no tsy mba hitondra ny heloky ny rainy? Raha ny zanaka no manao izay marina sy mahitsy sy mitandrina ny didiko rehetra ka mankatò azy dia ho velona tokoa izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ny olona izay manota no ho faty. Ny zanaka dia tsy hitondra ny heloky ny rainy, ary ny ray dia tsy hitondra ny heloky ny zanany. Ny fahamarinan’ny marina dia ho aminy ihany, ary ny faharatsian’ny ratsy fanahy kosa dia ho aminy ihany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny faharetana amin’ny fitondrantena marina
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Fa raha ny ratsy fanahy no miala amin’ny fahotana rehetra izay nataony ka mitandrina ny didiko rehetra ary manao izay marina sy mahitsy dia ho velona tokoa izy fa tsy ho faty. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ny fahadisoany rehetra izay nataony dia tsy hotsarovana intsony; ho velona izy noho ny fahamarinana izay nataony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Moa sitrako akory va ny fahafatesan’ny ratsy fanahy, hoy NY TOMPO Andriamanitra, fa tsy ny hialany amin’ny lalany mba ho velona izy? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Fa raha ny marina no miala amin’ny fahamarinany ka manao meloka ary manaraka ny fahavetavetana rehetra izay nataon’ny ratsy fanahy, ho velona va izy? Ny fahamarinany rehetra izay nataony dia tsy hotsarovana. Noho ny fahadisoana sy ny fahotana izay nataony dia ho faty izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Nefa hoy ianareo: Tsy marina ny lalan’ny Tompo. Mihainoa ange, ry taranak’Israely! Moa ny lalako va no tsy marina? Tsy ny lalanareo va no tsy marina? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Raha ny marina no miala amin’ny fahamarinany ary manao meloka ka maty amin’izany dia maty noho ny heloka nataony ihany izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ary raha ny ratsy fanahy no miala amin’ny faharatsiana nataony ka manao izay marina sy mahitsy dia hahavonjy ny ainy izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Raha mahita ny fahadisoana rehetra izay nataony izy ka miala amin’izany dia ho velona tokoa izy fa tsy ho faty.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Nefa hoy ny taranak’Israely: Tsy marina ny lalan’ny Tompo. Ry taranak’Israely, ny lalako va no tsy marina? Tsy ny lalanareo va no tsy marina? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Koa samy hotsaraiko araka ny lalanareo avy ianareo, ry taranak’Israely, hoy NY TOMPO Andriamanitra. Mitodiha ka mibebaha amin’ny fahadisoanareo rehetra, dia tsy ho tonga fahatafintohinana mahameloka anareo intsony izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Esory ho afaka aminareo ny fahadisoanareo rehetra izay nataonareo ka manaova fo vaovao sy fanahy vaovao ho anareo. Fa nahoana no ho faty ianareo, ry taranak’Israely? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Fa tsy sitrako ny fahafatesan’izay maty, hoy NY TOMPO Andriamanitra. Koa mibebaha ianareo mba ho velona!
