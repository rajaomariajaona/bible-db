document_id: MIC.INTRO1
type_code: plt
segments:
- type: usfm
  marker: imt1
  children:
  - type: text
    text: INDRAY MIJERY
- type: usfm
  marker: ip
  children:
  - type: text
    text: I Mika mpaminany dia niara-belona tamin’Isaia ary samy niasa tao Joda izy roalahy. Tokony ho tamin’ny 740–700 eo ho eo ny fotoana niasany. Izany dia fotoana nikorontana sy nampihorohoro tokoa satria tamin’izany dia mandrahona hamely ny fanjakana Joda ny Asiriana.
- type: usfm
  marker: is1
  children:
  - type: text
    text: Ny votoatin’ny Boky
- type: usfm
  marker: ip
  children:
  - type: text
    text: Ambaran’i Mika fa i Jerosalema dia ho potika sahala amin’ny nanjo an’i Samaria izay rava tamin’ny taona 721 tal JK. Izany dia noho ny fahotana manjaka ao, indrindra fa ny tsy fahamarinana eo amin’ny fiarahamonina. Ambaran’ny Mpaminany fa Andriamanitra mihitsy no miditra an-tsehatra mitaky ny fahamarinana sy ny fitiava-namana. Samy mahazo teny tandrify azy na ny loholona na ny mpanapaka na ny mpisorona na ny mpitsara mandray kolikoly na ny mpaminany sandoka mila vola amin’ny faminaniany. Manaitra ny mpihaino ny Mpaminany mba hisaina ka hanapa-kevitra hankatò ny sitrapon’Andriamanitra, dia ny hanao ny marina sy ho tia famindrampo, ary ny hanaraka an’Andriamanitra amin’ny fanetren-tena. Mifandimby ao amin’ny Boky ny fananarana hentitra sy ny fanambaràna famonjena izay hataon’Andriamanitra amin’ny ho avy.
- type: usfm
  marker: iot
  children:
  - type: text
    text: Ny firafitry ny Boky
- type: usfm
  marker: ip
  children:
  - type: text
    text: Misy fizarana telo ny Boky, koa ny fizarana tsirairay dia miandoha amin’ny teny fanamelohana ary mifarana amin’ny teny fampanantenana ho an’izay sisa.
- type: usfm
  marker: io1
  children:
  - type: text
    text: 'Fizarana 1: 1–2'
- type: usfm
  marker: io2
  children:
  - type: text
    text: 'Teny fampidirana nataon’ny mpandamina ny Boky: 1.1'
- type: usfm
  marker: io2
  children:
  - type: text
    text: 'Fanamelohana ireo mpanankarena manao an-keriny sy mpandainga: 1.2–2.11'
- type: usfm
  marker: io2
  children:
  - type: text
    text: 'Fampanantenana fa mbola hangonin’NY TOMPO, Mpiandry tsara, indray, ny olona sisa: 2.12-13'
- type: usfm
  marker: io1
  children:
  - type: text
    text: 'Fizarana 2: 3–5'
- type: usfm
  marker: io2
  children:
  - type: text
    text: 'Fanamelohana ireo mpitondra: 3.1-12'
- type: usfm
  marker: io2
  children:
  - type: text
    text: 'Fampanantenana ny amin’ny hoavy. Hisy zazalahy ho teraka ao Betlehema, izay hiandry ny sisa amin’ny Israely amin’ny herin’NY TOMPO ary hitondra amin’ny fiadanana: 4–5'
- type: usfm
  marker: io1
  children:
  - type: text
    text: 'Fizarana 3: 6–7'
- type: usfm
  marker: io2
  children:
  - type: text
    text: 'Fanamelohana noho ny faharatsiam-panahy nanjaka teo amin’ny fiarahamonin’ny olon’Andriamanitra, ary fitarainan’ny Mpaminany noho izany: 6–7.6'
- type: usfm
  marker: io2
  children:
  - type: text
    text: 'Fanantenan’ny Mpaminany fa mbola haneho ny famindrampony ihany Andriamanitra: 7.7-20'
