document_id: PRO.30
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Tenim-pahendren’i Agora
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ny teny mavesa-danja nataon’i Agora, zanak’i Jake,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ny teny nataon-dRalehilahy tamin’Itiela, eny, tamin’Itiela sy Okala.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Izaho dia biby fa tsy olona
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy manan-tsain’olombelona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Tsy nianatra fahendrena aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: na nahazo ny fahalalan’ny Iray Masina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Iza no efa niakatra tany an-danitra sady nidina indray?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Iza no nahangona ny rivotra tao an-tanany?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Iza no nahafono ny rano tamin’ny lambany?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Iza no nametraka ireo faran’ny tany rehetra?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Iza no anarany, ary iza no anaran’ny zanany?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa toa fantatrao!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ny tenin’Andriamanitra dia voazaha toetra avokoa.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ampinga ho an’izay mialoka aminy Izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Aza manampy ny teniny fandrao hanariny ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka ho hita fa mpandainga.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Zavatra roa loha no angatahiko aminao
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ka aza lavinao, dieny tsy mbola maty aho:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ampanalaviro ahy ny zava-poana sy ny lainga;
- type: usfm
  marker: q1
  children:
  - type: text
    text: aza manome ahy fahantrana na harena;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fahano aho amin’izay anjara hanina sahaza ho ahy,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: fandrao raha voky aho dia handa
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ka hiteny hoe: Iza moa NY TOMPO?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary andrao raha tonga mahantra aho dia hangalatra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hanamavo ny anaran’Andriamanitro.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Aza manendrikendrika ny mpanompo amin’ny tompony
- type: usfm
  marker: q1
  children:
  - type: text
    text: fandrao hozoniny ianao ka hahazo heloka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Misy taranaka izay manozona ny rainy
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady tsy misaotra ny reniny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Misy taranaka milaza ny tenany ho madio,
- type: usfm
  marker: q1
  children:
  - type: text
    text: kanjo tsy voasasa ho afaka amin’ny fahalotoany akory.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Misy taranaka izay mampianjonanjona ny fijeriny
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary fatra-pampiridiridy ny hodimasony!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Misy taranaka izay toy ny sabatra ny nifiny
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary toy ny antsy ny vazany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hamongorany ny ory tsy ho amin’ny tany
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy mba hanafoanany ny mahantra tsy ho amin’ny olona.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ohabolana manaraka isa
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ny dinta manan-janakavavy roa, dia ny hoe: Omeo! Omeo!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Misy zavatra telo tsy mety voky,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'eny, efatra aza no tsy milaza hoe: Aoka izay!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: fitoeran’ny maty
  - type: text
    text: ' sy ny kibo momba,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny tany izay tsy vonton-drano,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ary ny afo koa no tsy mba milaza hoe: Aoka izay!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ny mianjonanjona amin-dray
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady manazimba tsy mankatò reny
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hotsaingotsaingohin’ny goaika eny an-dohasahan-driaka
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hohanin’ny zana-boromahery.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Misy zavatra telo mahagaga ka tsy takatro,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'eny, efatra aza no tsy fantatro:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ny lalan’ny voromahery eny amin’ny habakabaka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny dian’ny bibilava eny amin’ny vatolampy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny dian’ny sambo eny amin’ny ranomasina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny dian’ny lehilahy mankany amin’ny tovovavy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Tahaka izany koa ny fanaon’ny vehivavy mpijangajanga:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Homana izy dia mamafa ny vavany
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ka miteny hoe: Tsy nanao izay ratsy aho!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Izao fitondrana telo izao no tsy mampandry ny tany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'eny, zavatra efatra aza no tsy zakany:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Raha ny andevo no tonga mpanjaka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: raha ny adala no voky hanina,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: raha ny vehivavy tsy tiana no ampakarina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary raha ny mpanompovavy no mandova ny tompovaviny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Izao zavatra efatra izao dia kely amin’ny etỳ ambonin’ny tany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'nefa hendry sady mahay:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Ny vitsika izay firenena tsy matanjaka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa manangona ny haniny amin’ny fahavaratra;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ny hiràka izay firenena tsy manan-kery,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa manao ny tranony eny amin’ny harambato;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ny valala izay tsy manana mpanjaka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa izy rehetra miainga manao antokony tsara;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ny antsiantsy izay azonao samborina amin’ny tanana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa tonga ao an-dapan’ny mpanjaka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Misy zavatra telo izay tsara famindra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'eny, efatra aza no tsara fandeha:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Ny liona, izay mahery indrindra amin’ny biby
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy mihemotra na amin’inona na amin’inona;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ny soavaly voaomana hiady sy ny osilahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny mpanjaka miaraka amin’ny miaramilany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Raha adala ianao ka nanandra-tena,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa mba nieritreritra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia tampeno amin’ny tananao ny vavanao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Ny fanotsankotsanana ny ronono no miteraka rononomandry;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny fanolanana ny orona no miteraka ra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny fanetsiketsehana ny fahatezerana no miteraka ady.
