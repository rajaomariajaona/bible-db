document_id: PRO.30,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Tenim-pahendren’i Agora
  - type: text
    content: Ny teny mavesa-danja nataon’i Agora, zanak’i Jake,
  - type: text
    content: dia ny teny nataon-dRalehilahy tamin’Itiela, eny, tamin’Itiela sy Okala.
  '10':
  - type: text
    content: Aza manendrikendrika ny mpanompo amin’ny tompony
  - type: text
    content: fandrao hozoniny ianao ka hahazo heloka.
  '11':
  - type: text
    content: Misy taranaka izay manozona ny rainy
  - type: text
    content: sady tsy misaotra ny reniny.
  '12':
  - type: text
    content: Misy taranaka milaza ny tenany ho madio,
  - type: text
    content: kanjo tsy voasasa ho afaka amin’ny fahalotoany akory.
  '13':
  - type: text
    content: Misy taranaka izay mampianjonanjona ny fijeriny
  - type: text
    content: ary fatra-pampiridiridy ny hodimasony!
  '14':
  - type: text
    content: Misy taranaka izay toy ny sabatra ny nifiny
  - type: text
    content: ary toy ny antsy ny vazany,
  - type: text
    content: hamongorany ny ory tsy ho amin’ny tany
  - type: text
    content: sy mba hanafoanany ny mahantra tsy ho amin’ny olona.
  - type: heading
    content: Ohabolana manaraka isa
  '15':
  - type: text
    content: 'Ny dinta manan-janakavavy roa, dia ny hoe: Omeo! Omeo!'
  - type: text
    content: Misy zavatra telo tsy mety voky,
  - type: text
    content: 'eny, efatra aza no tsy milaza hoe: Aoka izay!'
  '16':
  - type: text
    content: 'Ny '
  - type: text
    content: fitoeran’ny maty
  - type: text
    content: ' sy ny kibo momba,'
  - type: text
    content: ny tany izay tsy vonton-drano,
  - type: text
    content: 'ary ny afo koa no tsy mba milaza hoe: Aoka izay!'
  '17':
  - type: text
    content: Ny mianjonanjona amin-dray
  - type: text
    content: sady manazimba tsy mankatò reny
  - type: text
    content: dia hotsaingotsaingohin’ny goaika eny an-dohasahan-driaka
  - type: text
    content: ary hohanin’ny zana-boromahery.
  '18':
  - type: text
    content: Misy zavatra telo mahagaga ka tsy takatro,
  - type: text
    content: 'eny, efatra aza no tsy fantatro:'
  '19':
  - type: text
    content: Ny lalan’ny voromahery eny amin’ny habakabaka,
  - type: text
    content: ny dian’ny bibilava eny amin’ny vatolampy,
  - type: text
    content: ny dian’ny sambo eny amin’ny ranomasina,
  - type: text
    content: ary ny dian’ny lehilahy mankany amin’ny tovovavy.
  '2':
  - type: text
    content: Izaho dia biby fa tsy olona
  - type: text
    content: ary tsy manan-tsain’olombelona.
  '20':
  - type: text
    content: 'Tahaka izany koa ny fanaon’ny vehivavy mpijangajanga:'
  - type: text
    content: Homana izy dia mamafa ny vavany
  - type: text
    content: 'ka miteny hoe: Tsy nanao izay ratsy aho!'
  '21':
  - type: text
    content: Izao fitondrana telo izao no tsy mampandry ny tany,
  - type: text
    content: 'eny, zavatra efatra aza no tsy zakany:'
  '22':
  - type: text
    content: Raha ny andevo no tonga mpanjaka,
  - type: text
    content: raha ny adala no voky hanina,
  '23':
  - type: text
    content: raha ny vehivavy tsy tiana no ampakarina,
  - type: text
    content: ary raha ny mpanompovavy no mandova ny tompovaviny.
  '24':
  - type: text
    content: Izao zavatra efatra izao dia kely amin’ny etỳ ambonin’ny tany,
  - type: text
    content: 'nefa hendry sady mahay:'
  '25':
  - type: text
    content: Ny vitsika izay firenena tsy matanjaka,
  - type: text
    content: nefa manangona ny haniny amin’ny fahavaratra;
  '26':
  - type: text
    content: ny hiràka izay firenena tsy manan-kery,
  - type: text
    content: nefa manao ny tranony eny amin’ny harambato;
  '27':
  - type: text
    content: ny valala izay tsy manana mpanjaka,
  - type: text
    content: nefa izy rehetra miainga manao antokony tsara;
  '28':
  - type: text
    content: ny antsiantsy izay azonao samborina amin’ny tanana,
  - type: text
    content: nefa tonga ao an-dapan’ny mpanjaka.
  '29':
  - type: text
    content: Misy zavatra telo izay tsara famindra,
  - type: text
    content: 'eny, efatra aza no tsara fandeha:'
  '3':
  - type: text
    content: Tsy nianatra fahendrena aho,
  - type: text
    content: na nahazo ny fahalalan’ny Iray Masina.
  '30':
  - type: text
    content: Ny liona, izay mahery indrindra amin’ny biby
  - type: text
    content: ka tsy mihemotra na amin’inona na amin’inona;
  '31':
  - type: text
    content: ny soavaly voaomana hiady sy ny osilahy
  - type: text
    content: ary ny mpanjaka miaraka amin’ny miaramilany.
  '32':
  - type: text
    content: Raha adala ianao ka nanandra-tena,
  - type: text
    content: nefa mba nieritreritra,
  - type: text
    content: dia tampeno amin’ny tananao ny vavanao.
  '33':
  - type: text
    content: Ny fanotsankotsanana ny ronono no miteraka rononomandry;
  - type: text
    content: ny fanolanana ny orona no miteraka ra
  - type: text
    content: ary ny fanetsiketsehana ny fahatezerana no miteraka ady.
  '4':
  - type: text
    content: Iza no efa niakatra tany an-danitra sady nidina indray?
  - type: text
    content: Iza no nahangona ny rivotra tao an-tanany?
  - type: text
    content: Iza no nahafono ny rano tamin’ny lambany?
  - type: text
    content: Iza no nametraka ireo faran’ny tany rehetra?
  - type: text
    content: Iza no anarany, ary iza no anaran’ny zanany?
  - type: text
    content: Fa toa fantatrao!
  '5':
  - type: text
    content: Ny tenin’Andriamanitra dia voazaha toetra avokoa.
  - type: text
    content: Ampinga ho an’izay mialoka aminy Izy.
  '6':
  - type: text
    content: Aza manampy ny teniny fandrao hanariny ianao
  - type: text
    content: ka ho hita fa mpandainga.
  '7':
  - type: text
    content: Zavatra roa loha no angatahiko aminao
  - type: text
    content: 'ka aza lavinao, dieny tsy mbola maty aho:'
  '8':
  - type: text
    content: Ampanalaviro ahy ny zava-poana sy ny lainga;
  - type: text
    content: aza manome ahy fahantrana na harena;
  - type: text
    content: fahano aho amin’izay anjara hanina sahaza ho ahy,
  '9':
  - type: text
    content: fandrao raha voky aho dia handa
  - type: text
    content: 'ka hiteny hoe: Iza moa NY TOMPO?'
  - type: text
    content: Ary andrao raha tonga mahantra aho dia hangalatra
  - type: text
    content: ka hanamavo ny anaran’Andriamanitro.
