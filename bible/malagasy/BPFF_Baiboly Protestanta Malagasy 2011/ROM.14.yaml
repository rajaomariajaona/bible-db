document_id: ROM.14,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Tsy mitsara ny rahalahy
  - type: text
    content: 'Raiso ny malemy finoana, nefa tsy amin’ny fitsaranareo ny eritreriny. '
  '10':
  - type: text
    content: 'Ary nahoana ianao no mitsara ny rahalahinao? Ary nahoana koa ianao no manao tsinontsinona ny rahalahinao? Fa samy hiseho eo anoloan’ny fitsaran’Andriamanitra isika rehetra. '
  '11':
  - type: text
    content: 'Satria voasoratra hoe:'
  - type: text
    content: «Raha velona koa Aho, hoy NY TOMPO, ny lohalika rehetra dia handohalika eo anatrehako
  - type: text
    content: ary ny lela rehetra dia hidera an’Andriamanitra!» (Isa 45.23)
  '12':
  - type: text
    content: Koa samy hampamoahin’Andriamanitra ny amin’ny tenany avy isika rehetra.
  - type: heading
    content: Tsy manao izay hahatafintohina ny rahalahy
  '13':
  - type: text
    content: 'Koa aza mifampitsara intsony isika fa aleo mihevitra izao: Ny tsy hanisy fandavoana na fanafintohinana eo anoloan’ny rahalahy. '
  '14':
  - type: text
    content: 'Mahafantatra sady resy lahatra ao amin’i Jesosy Tompo aho fa tsy misy zavatra maloto ho azy; satria raha misy manao zavatra iray ho maloto dia aminy ihany izany no maloto. '
  '15':
  - type: text
    content: 'Raha mampalahelo ny rahalahinao ny zavatra fihinanao dia tsy mba manaraka ny fitiavana intsony ianao. Aza ny zavatra haninao no animbanao azy, fa efa maty hamonjy azy '
  - type: text
    content: Kristy
  - type: text
    content: '. '
  '16':
  - type: text
    content: 'Koa aza avela hotenenina ratsy izay zavatra tsara anananareo. '
  '17':
  - type: text
    content: 'Fa tsy amin’ny fihinanana sy ny fisotroana ny fanjakan’Andriamanitra, fa fahamarinana sy fiadanana ary fifaliana ao amin’ny Fanahy Masina. '
  '18':
  - type: text
    content: Koa izay manompo an’i Kristy amin’izany zavatra izany no sitrak’Andriamanitra sy eken’ny olona fa tsara.
  '19':
  - type: text
    content: 'Koa aoka isika hitady ny momba ny fiadanana sy ny momba ny fifampandrosoana. '
  '2':
  - type: text
    content: 'Ny iray dia mino fa mahazo mihinana ny zavatra rehetra izy; malemy finoana kosa ny iray ka tsy mihinana afa-tsy ny vokatry ny zavamaniry. '
  '20':
  - type: text
    content: 'Aza izay hanina no andravanao ny asan’Andriamanitra. Madio avokoa ny zavatra rehetra, nefa ratsy ho an’ny olona izay mihinana ka mahatonga fahatafintohinana. '
  '21':
  - type: text
    content: 'Fa tsara ny tsy mihinana hena, ny tsy misotro divay, ny tsy manao izay hahatafintohina ny rahalahinao. '
  '22':
  - type: text
    content: 'Ny finoana izay anananao dia hazòny ho anao eo anatrehan’Andriamanitra. Sambatra izay tsy manameloka ny tenany amin’izay zavatra ekeny! '
  '23':
  - type: text
    content: Fa izay misalasala dia meloka raha homana, satria tsy avy amin’ny finoana izany; fa ota izay rehetra tsy avy amin’ny finoana.
  '3':
  - type: text
    content: 'Aoka ny mihinana tsy hanamavo ny tsy mihinana; aoka koa ny tsy mihinana tsy hitsara ny mihinana; fa Andriamanitra no efa nandray azy. '
  '4':
  - type: text
    content: Iza moa ianao izay mitsara ny mpanompon’ny hafa? Amin’ny tompony ihany no ijoroany na ahalavoany. Nefa hampijoroina ihany izy, satria mahay mampijoro azy ny Tompo.
  '5':
  - type: text
    content: 'Ny iray dia manao ny andro iray ho mihoatra noho ny andro sasany ary ny iray kosa dia manao ny andro rehetra ho mitovy. Aoka samy ho resy lahatra ao an-tsainy avy izy. '
  '6':
  - type: text
    content: 'Ny mitandrina ny andro dia mitandrina izany ho an’ny Tompo. Ary ny mihinana dia mihinana ho an’ny Tompo, satria misaotra an’Andriamanitra izy; ny tsy mihinana kosa dia tsy mihinana ho an’ny Tompo ary misaotra an’Andriamanitra koa izy. '
  '7':
  - type: text
    content: 'Fa tsy misy velona ho an’ny tenany isika ary tsy misy maty ho an’ny tenany. '
  '8':
  - type: text
    content: 'Satria raha velona isika dia velona ho an’ny Tompo ary raha maty isika dia maty ho an’ny Tompo; koa amin’izany, na velona na maty isika dia an’ny Tompo ihany. '
  '9':
  - type: text
    content: 'Fa izany no nahafatesan’i '
  - type: text
    content: Kristy
  - type: text
    content: ' sy nahavelomany indray, mba ho Tompon’ny maty sy ny velona Izy.'
