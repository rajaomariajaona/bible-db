document_id: JER.12,3103
type_code: plt
verses:
  '1':
  - type: text
    content: Raha mifandahatra aminao aho, TOMPO ô, dia Ianao no marina;
  - type: text
    content: 'nefa aoka ihany kosa aho mba handahatra Aminao:'
  - type: text
    content: Nahoana ary no ambinina ny lalan’ny ratsy fanahy?
  - type: text
    content: Nahoana no miadana
  - type: text
    content: ny mpikomy rehetra?
  '10':
  - type: text
    content: Mpitondra maro no nanimba ny tanim-boaloboko,
  - type: text
    content: nohitsakitsahiny ny anjarako;
  - type: text
    content: nataony tany efitra lao
  - type: text
    content: ny anjarako mahafinaritra.
  '11':
  - type: text
    content: Nataony lao izany, eny, lao izy
  - type: text
    content: ka nitomany teo anatrehako;
  - type: text
    content: nataony lao avokoa
  - type: text
    content: ny tany rehetra
  - type: text
    content: satria tsy nisy nandatsaka am-po.
  '12':
  - type: text
    content: Ny mpandrava dia tonga
  - type: text
    content: any amin’ny tendrombohitra mangadihady rehetra any an-tany efitra;
  - type: text
    content: fa misy sabatry NY TOMPO mandringana hatrany amin’ny faran’ny tany ka tsy misy fiadanana ho an’ny nofo rehetra.
  '13':
  - type: text
    content: Vary no nafafiny,
  - type: text
    content: nefa tsilo no nojinjainy;
  - type: text
    content: nanasatra ny tenany izy, kanjo herim-po very maina izany;
  - type: text
    content: dia hangaihay noho ny zavatra azonareo ianareo
  - type: text
    content: noho ny firehetan’ny fahatezeran’NY TOMPO.
  - type: heading
    content: NY TOMPO sy ireo mifanakaiky sisintany amin’ny Israely
  '14':
  - type: text
    content: 'Izao no lazain’NY TOMPO ny amin’ireo firenena ratsy fanahy rehetra mifanakaiky sisintany amin’ny oloko ireo, dia izay mikasikasika ny tany nomeko ho lovan’ny Israely oloko: Indro, hongotako tsy ho amin’ny taniny ireo ary ny taranak’i Joda koa dia hongotako tsy ho eo aminy. '
  '15':
  - type: text
    content: 'Nefa nony efa voaongotra izy dia hamindra fo aminy indray Aho ka samy hoentiko mody any amin’ny lovany sy ny taniny avy indray izy. '
  '16':
  - type: text
    content: 'Koa raha mba nianatra ny fanaon’ny oloko tokoa ireo ary hianiana amin’ny anarako hoe: Velona NY TOMPO, tahaka ny nampianaran’ireo ny oloko hianiana amin’ny '
  - type: text
    content: Baala
  - type: text
    content: ', dia haorina ao amin’ny oloko izy. '
  '17':
  - type: text
    content: Fa raha tsy hankatò kosa izy dia hongotako izany firenena izany, eny, hongotako sy haringako izy, hoy NY TOMPO.
  '2':
  - type: text
    content: Nambolenao izy
  - type: text
    content: ka mamaka;
  - type: text
    content: mitombo izy
  - type: text
    content: ka mamoa;
  - type: text
    content: manakaiky Anao amin’ny vavany izy
  - type: text
    content: nefa manalavitra Anao amin’ny fony.
  '3':
  - type: text
    content: Fa Ianao, TOMPO ô, no mahalala ahy; mahita ahy Ianao
  - type: text
    content: sady mizaha toetra ny foko, fa ao Aminao izy.
  - type: text
    content: Avaho toy ny ondry hovonoina ireny
  - type: text
    content: ary atokàny ho amin’ny andro hamonoana azy.
  '4':
  - type: text
    content: 'Mandra-pahoviana no hisaonan’ny tany sy hahalazoan’ny ahitra eny amin’ny saha rehetra? Noho ny faharatsian’ny mponina any dia lany ringana ny biby sy ny vorona; fa hoy ireo: Tsy mba mahita izay hoavintsika Izy.'
  '5':
  - type: text
    content: Raha niara-nihazakazaka tamin’izay mpandeha an-tongotra ianao
  - type: text
    content: ka tsy naharaka azy
  - type: text
    content: dia hataonao ahoana no fihaika ny soavaly?
  - type: text
    content: Ary raha eny amin’ny tany mandry fahalemana ihany
  - type: text
    content: no anananao toky
  - type: text
    content: dia hanao ahoana kosa ianao, raha tonga any amin’ny kirihitrala eny amoron’i Jordana?
  '6':
  - type: text
    content: Fa na dia ny rahalahinao sy ny mpianakavin’ny rainao aza dia samy namitaka anao; eny, niantso mafy tao aoriananao ireo. Aza mino azy, na dia tsara fiteny aminao aza izy ireo.
  - type: heading
    content: Mandao ny tempoliny sy ny vahoakany Andriamanitra
  '7':
  - type: text
    content: Nilaozako ny tranoko,
  - type: text
    content: nafoiko ny lovako;
  - type: text
    content: ny sombin’aiko
  - type: text
    content: dia natolotro ho eo an-tanan’ny fahavalony.
  '8':
  - type: text
    content: Amiko, ny lovako
  - type: text
    content: dia efa toy ny liona any anaty ala;
  - type: text
    content: mierona Amiko izy
  - type: text
    content: ka halako.
  '9':
  - type: text
    content: Moa tahaka ny vorona mpihaza hafahafa volo Amiko va ny lovako,
  - type: text
    content: no mivory manodidina azy ny vorona mpihaza?
  - type: text
    content: Avia ka angony ny bibidia rehetra,
  - type: text
    content: ampanatony ireny hihinana.
