document_id: JER.12
type_code: plt
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Raha mifandahatra aminao aho, TOMPO ô, dia Ianao no marina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'nefa aoka ihany kosa aho mba handahatra Aminao:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nahoana ary no ambinina ny lalan’ny ratsy fanahy?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nahoana no miadana
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny mpikomy rehetra?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Nambolenao izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka mamaka;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mitombo izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka mamoa;
- type: usfm
  marker: q1
  children:
  - type: text
    text: manakaiky Anao amin’ny vavany izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa manalavitra Anao amin’ny fony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Fa Ianao, TOMPO ô, no mahalala ahy; mahita ahy Ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady mizaha toetra ny foko, fa ao Aminao izy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Avaho toy ny ondry hovonoina ireny
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary atokàny ho amin’ny andro hamonoana azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Mandra-pahoviana no hisaonan’ny tany sy hahalazoan’ny ahitra eny amin’ny saha rehetra? Noho ny faharatsian’ny mponina any dia lany ringana ny biby sy ny vorona; fa hoy ireo: Tsy mba mahita izay hoavintsika Izy.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Raha niara-nihazakazaka tamin’izay mpandeha an-tongotra ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy naharaka azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hataonao ahoana no fihaika ny soavaly?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary raha eny amin’ny tany mandry fahalemana ihany
- type: usfm
  marker: q1
  children:
  - type: text
    text: no anananao toky
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hanao ahoana kosa ianao, raha tonga any amin’ny kirihitrala eny amoron’i Jordana?
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Fa na dia ny rahalahinao sy ny mpianakavin’ny rainao aza dia samy namitaka anao; eny, niantso mafy tao aoriananao ireo. Aza mino azy, na dia tsara fiteny aminao aza izy ireo.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mandao ny tempoliny sy ny vahoakany Andriamanitra
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Nilaozako ny tranoko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nafoiko ny lovako;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny sombin’aiko
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia natolotro ho eo an-tanan’ny fahavalony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Amiko, ny lovako
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia efa toy ny liona any anaty ala;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mierona Amiko izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka halako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Moa tahaka ny vorona mpihaza hafahafa volo Amiko va ny lovako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: no mivory manodidina azy ny vorona mpihaza?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Avia ka angony ny bibidia rehetra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ampanatony ireny hihinana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Mpitondra maro no nanimba ny tanim-boaloboko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nohitsakitsahiny ny anjarako;
- type: usfm
  marker: q1
  children:
  - type: text
    text: nataony tany efitra lao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny anjarako mahafinaritra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Nataony lao izany, eny, lao izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka nitomany teo anatrehako;
- type: usfm
  marker: q1
  children:
  - type: text
    text: nataony lao avokoa
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny tany rehetra
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria tsy nisy nandatsaka am-po.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ny mpandrava dia tonga
- type: usfm
  marker: q1
  children:
  - type: text
    text: any amin’ny tendrombohitra mangadihady rehetra any an-tany efitra;
- type: usfm
  marker: m
  children:
  - type: text
    text: fa misy sabatry NY TOMPO mandringana hatrany amin’ny faran’ny tany ka tsy misy fiadanana ho an’ny nofo rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Vary no nafafiny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa tsilo no nojinjainy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: nanasatra ny tenany izy, kanjo herim-po very maina izany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hangaihay noho ny zavatra azonareo ianareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: noho ny firehetan’ny fahatezeran’NY TOMPO.
- type: usfm
  marker: s1
  children:
  - type: text
    text: NY TOMPO sy ireo mifanakaiky sisintany amin’ny Israely
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Izao no lazain’NY TOMPO ny amin’ireo firenena ratsy fanahy rehetra mifanakaiky sisintany amin’ny oloko ireo, dia izay mikasikasika ny tany nomeko ho lovan’ny Israely oloko: Indro, hongotako tsy ho amin’ny taniny ireo ary ny taranak’i Joda koa dia hongotako tsy ho eo aminy. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Nefa nony efa voaongotra izy dia hamindra fo aminy indray Aho ka samy hoentiko mody any amin’ny lovany sy ny taniny avy indray izy. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Koa raha mba nianatra ny fanaon’ny oloko tokoa ireo ary hianiana amin’ny anarako hoe: Velona NY TOMPO, tahaka ny nampianaran’ireo ny oloko hianiana amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Baala
  - type: text
    text: ', dia haorina ao amin’ny oloko izy. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Fa raha tsy hankatò kosa izy dia hongotako izany firenena izany, eny, hongotako sy haringako izy, hoy NY TOMPO.
