document_id: DAN.9,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny vavaka nataon’i Daniela
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Tamin’ny taona voalohany nanjakan’i Dariosy, zanak’i Ahasoerosy, avy amin’ny taranaky ny Mediana, izay nampanjakaina tamin’ny fanjakan’ny Kaldeana, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'ka tsy nihaino ny feon’NY TOMPO Andriamanitray, mba handeha araka ny lalàna izay nasainy napetraky ny mpaminany mpanompony teo anoloanay. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Eny, nandika ny lalànanao ny Israely rehetra ka niala fa tsy nihaino ny feonao, koa dia naidina taminay ny ozona lazain’ny fianianana izay voasoratra ao amin’ny lalànan’i Mosesy, mpanompon’Andriamanitra, satria efa nanota taminy izahay. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Ary notanterahiny ny teniny, izay nolazainy hamelezana anay sy ny mpitondra izay nitondra anay, koa nataony niharan-doza lehibe izahay, fa tetỳ ambanin’ny lanitra rehetra dia tsy mbola nisy zava-nitranga tahaka izay nitranga tany Jerosalema. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Araka ny voasoratra ao amin’ny lalànan’i Mosesy no nahatongavan’izao loza rehetra izao taminay; nefa tsy nifona teo anatrehan’NY TOMPO Andriamanitray ihany izahay mba hialanay amin’ny helokay sy hahafantaranay ny fahamarinanao. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Koa izany no nitahirizan’NY TOMPO ny loza ka nataony mihatra Taminay, fa marina NY TOMPO Andriamanitray amin’ny asany rehetra izay nataony, fa izahay no tsy nihaino ny feony. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Koa ankehitriny, Tompo Andriamanitray ô, izay nitondra ny olonao nivoaka avy tany amin’ny tany Ejipta tamin’ny tanana mahery ka nanao anarana ho Anao tahaka ny amin’izao anio izao, efa nanota izahay, efa nanao izay ratsy izahay. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Tompo ô, mifona aminao aho, araka ny fahamarinanao rehetra, aoka re hitony ny fahatezeranao sy ny fahaviniranao amin’i Jerosalema tanànanao sady tendrombohitrao masina; fa ny helokay sy ny fahotan’ny razanay no nahatonga an’i Jerosalema sy ny olonao ho latsa amin’izay rehetra manodidina anay. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Fa ankehitriny, ry Andriamanitray ô, henoy ny vavaka ataon’ny mpanomponao sy ny fifonany, ary ampamirapirato amin’ny fitoeranao masina, izay efa foana, ny tavanao, satria Tompo Ianao. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Andriamanitra ô, atongilano ny sofinao ka mihainoa; ahirato ny masonao ka jereo ny fahafoananay sy ny tanàna izay nantsoina amin’ny anaranao, fa tsy amin’ny fahamarinanay no andoaranay ny fifonanay eto anatrehanao fa amin’ny halehiben’ny indrafonao. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Tompo ô, henoy izahay! Tompo ô, mamelà ny helokay! Tompo ô, mihainoa ka miasà! Aza ela Ianao, ry Andriamanitro ô, noho ny Aminao, fa ny anaranao no antsoina eto amin’ny tanànanao sy ny olonao.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: I Gabriela sy ny herinandro fitopolo
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: tamin’ny taona voalohany nanjakany, izaho Daniela dia nahalala tamin’ny boky ny isan’ny taona nampahafantarin’ny tenin’NY TOMPO an’i Jeremia mpaminany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.2 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: profeta.
      marker-yv: yv-n
    - type: text
      text: ', fa afaka fitopolo taona no ho tapitra ny faharavan’i Jerosalema. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Raha mbola niteny sy nivavaka ary niaiky ny fahotako mbamin’ny fahotan’ny Israely fireneko aho ka nandoatra ny fifonako teo anatrehan’NY TOMPO Andriamanitro ho an’ny tendrombohitra masin’Andriamanitro; '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'eny, raha mbola niteny tamin’ny alalan’ny vavaka nataoko aho dia indro ilay lehilahy Gabriela izay hitako tamin’ny fahitana voalohany, nanidintsidina haingana ka nanatona ahy tokony ho tamin’ny fotoanan’ny fanatitra hariva. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Nampahalala ahy sy niresaka tamiko izy hoe: Ry Daniela ô, avy hampahazava ny sainao aho. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Tamin’ny niantombohan’ny vavakao dia nisy teny nivoaka ka tonga hanambara aminao aho, satria malala indrindra ianao; koa diniho ny teny, ary aoka ho fantatrao ny fahitana.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Herinandro fitopolo no voatendry
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho an’ny firenenao sy ny tanànanao masina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hampijanonana ny fahadisoana sy hampitsaharana ny fahotana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hanaovana fanavotana noho ny heloka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy hampidirana fahamarinana mandrakizay,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hasiana tombo-kase ny fahitana sy ny mpaminany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hatao ny fanosorana olona iray izay masina indrindra.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Koa aoka ho fantatrao sy ho azonao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa hatramin’ny hivoahan’ny didy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hanavaozana sy hanamboarana an’i Jerosalema
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hatramin’ny fanosorana mpanapaka iray
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia misy herinandro fito.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mandritra ny roa amby enimpolo herinandro
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no hanamboarana indray ny lalana sy ny hady,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: kanefa ao anatin’ny tebiteby.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Rehefa afaka ny roa amby enimpolo herinandro
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hovonoina ny lehilahy voahosotra iray
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy hisy hiaro azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny vahoakan’ny mpanjaka izay ho avy dia handrava ny tanàna sy ny fitoerana masina;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny fiafarany dia ho avy toy ny tondra-drano;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hatramin’ny faran’ny ady
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hisy fandravana voatendry.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Hanao fanekena mafy orina amin’ny maro mandritra ny herinandro izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hampitsahatra ny fanatitra alatsa-dra sy ny fanatitra hafa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mandritra ny antsasaky ny herinandro;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eo ambonin’ny elatry ny fahavetavetana no hiavian’ny mpandrava,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mandra-pahatanteraka ny fandravana voatendry,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay hamely ny mpandrava ihany.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Dia nitodika tamin’Andriamanitra Tompo aho mba hitady izay hivavahana sy hifonana amin’ny fifadian-kanina sy ny lamba fisaonana ary ny lavenona. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ary nivavaka tamin’NY TOMPO Andriamanitro aho ka nitsotra hoe:'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Indrisy, Tompo ô! Andriamanitra lehibe sy mahatahotra, mitandrina ny fanekena sy ny famindrampo ho amin’izay tia Anao sy mitandrina ny didinao. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Efa nanota izahay sady nanao izay meloka sy izay ratsy ary nikomy. Eny, efa niala tamin’ny didinao sy ny fitsipikao izahay, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'ary tsy nohenoinay ny mpaminany mpanomponao izay niteny tamin’ny anaranao tamin’ny mpanjakanay sy ny mpanapaka anay ary ny razanay sy ny vahoaka rehetra. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Anao ny fahamarinana, Tompo ô, fa anay kosa ny fangaihaizana, tahaka ny amin’izao anio izao, dia an’ny Joda sy ny mponina any Jerosalema ary ny Israely rehetra, na ny akaiky na ny lavitra, dia any amin’ny tany rehetra izay nandroahanao azy noho ny fahadisoana izay nataony Taminao. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Eny, anay ny fangaihaizana, TOMPO ô, dia an’ny mpanjakanay sy ny mpanapaka anay ary ny razanay, satria efa nanota taminao izahay. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'An’ny Tompo Andriamanitray kosa ny famindrampo sy ny famelan-keloka satria efa nikomy taminy izahay '
