document_id: DAN.9,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny vavaka nataon’i Daniela
  - type: text
    content: 'Tamin’ny taona voalohany nanjakan’i Dariosy, zanak’i Ahasoerosy, avy amin’ny taranaky ny Mediana, izay nampanjakaina tamin’ny fanjakan’ny Kaldeana, '
  '10':
  - type: text
    content: 'ka tsy nihaino ny feon’NY TOMPO Andriamanitray, mba handeha araka ny lalàna izay nasainy napetraky ny mpaminany mpanompony teo anoloanay. '
  '11':
  - type: text
    content: 'Eny, nandika ny lalànanao ny Israely rehetra ka niala fa tsy nihaino ny feonao, koa dia naidina taminay ny ozona lazain’ny fianianana izay voasoratra ao amin’ny lalànan’i Mosesy, mpanompon’Andriamanitra, satria efa nanota taminy izahay. '
  '12':
  - type: text
    content: 'Ary notanterahiny ny teniny, izay nolazainy hamelezana anay sy ny mpitondra izay nitondra anay, koa nataony niharan-doza lehibe izahay, fa tetỳ ambanin’ny lanitra rehetra dia tsy mbola nisy zava-nitranga tahaka izay nitranga tany Jerosalema. '
  '13':
  - type: text
    content: 'Araka ny voasoratra ao amin’ny lalànan’i Mosesy no nahatongavan’izao loza rehetra izao taminay; nefa tsy nifona teo anatrehan’NY TOMPO Andriamanitray ihany izahay mba hialanay amin’ny helokay sy hahafantaranay ny fahamarinanao. '
  '14':
  - type: text
    content: 'Koa izany no nitahirizan’NY TOMPO ny loza ka nataony mihatra Taminay, fa marina NY TOMPO Andriamanitray amin’ny asany rehetra izay nataony, fa izahay no tsy nihaino ny feony. '
  '15':
  - type: text
    content: 'Koa ankehitriny, Tompo Andriamanitray ô, izay nitondra ny olonao nivoaka avy tany amin’ny tany Ejipta tamin’ny tanana mahery ka nanao anarana ho Anao tahaka ny amin’izao anio izao, efa nanota izahay, efa nanao izay ratsy izahay. '
  '16':
  - type: text
    content: 'Tompo ô, mifona aminao aho, araka ny fahamarinanao rehetra, aoka re hitony ny fahatezeranao sy ny fahaviniranao amin’i Jerosalema tanànanao sady tendrombohitrao masina; fa ny helokay sy ny fahotan’ny razanay no nahatonga an’i Jerosalema sy ny olonao ho latsa amin’izay rehetra manodidina anay. '
  '17':
  - type: text
    content: 'Fa ankehitriny, ry Andriamanitray ô, henoy ny vavaka ataon’ny mpanomponao sy ny fifonany, ary ampamirapirato amin’ny fitoeranao masina, izay efa foana, ny tavanao, satria Tompo Ianao. '
  '18':
  - type: text
    content: 'Andriamanitra ô, atongilano ny sofinao ka mihainoa; ahirato ny masonao ka jereo ny fahafoananay sy ny tanàna izay nantsoina amin’ny anaranao, fa tsy amin’ny fahamarinanay no andoaranay ny fifonanay eto anatrehanao fa amin’ny halehiben’ny indrafonao. '
  '19':
  - type: text
    content: Tompo ô, henoy izahay! Tompo ô, mamelà ny helokay! Tompo ô, mihainoa ka miasà! Aza ela Ianao, ry Andriamanitro ô, noho ny Aminao, fa ny anaranao no antsoina eto amin’ny tanànanao sy ny olonao.
  - type: heading
    content: I Gabriela sy ny herinandro fitopolo
  '2':
  - type: text
    content: tamin’ny taona voalohany nanjakany, izaho Daniela dia nahalala tamin’ny boky ny isan’ny taona nampahafantarin’ny tenin’NY TOMPO an’i Jeremia mpaminany
  - type: note
    content: 'Na: profeta.'
  - type: text
    content: ', fa afaka fitopolo taona no ho tapitra ny faharavan’i Jerosalema. '
  '20':
  - type: text
    content: 'Raha mbola niteny sy nivavaka ary niaiky ny fahotako mbamin’ny fahotan’ny Israely fireneko aho ka nandoatra ny fifonako teo anatrehan’NY TOMPO Andriamanitro ho an’ny tendrombohitra masin’Andriamanitro; '
  '21':
  - type: text
    content: 'eny, raha mbola niteny tamin’ny alalan’ny vavaka nataoko aho dia indro ilay lehilahy Gabriela izay hitako tamin’ny fahitana voalohany, nanidintsidina haingana ka nanatona ahy tokony ho tamin’ny fotoanan’ny fanatitra hariva. '
  '22':
  - type: text
    content: 'Nampahalala ahy sy niresaka tamiko izy hoe: Ry Daniela ô, avy hampahazava ny sainao aho. '
  '23':
  - type: text
    content: Tamin’ny niantombohan’ny vavakao dia nisy teny nivoaka ka tonga hanambara aminao aho, satria malala indrindra ianao; koa diniho ny teny, ary aoka ho fantatrao ny fahitana.
  '24':
  - type: text
    content: Herinandro fitopolo no voatendry
  - type: text
    content: ho an’ny firenenao sy ny tanànanao masina,
  - type: text
    content: hampijanonana ny fahadisoana sy hampitsaharana ny fahotana,
  - type: text
    content: hanaovana fanavotana noho ny heloka
  - type: text
    content: sy hampidirana fahamarinana mandrakizay,
  - type: text
    content: mba hasiana tombo-kase ny fahitana sy ny mpaminany,
  - type: text
    content: ary hatao ny fanosorana olona iray izay masina indrindra.
  '25':
  - type: text
    content: Koa aoka ho fantatrao sy ho azonao
  - type: text
    content: fa hatramin’ny hivoahan’ny didy
  - type: text
    content: hanavaozana sy hanamboarana an’i Jerosalema
  - type: text
    content: ka hatramin’ny fanosorana mpanapaka iray
  - type: text
    content: dia misy herinandro fito.
  - type: text
    content: Mandritra ny roa amby enimpolo herinandro
  - type: text
    content: no hanamboarana indray ny lalana sy ny hady,
  - type: text
    content: kanefa ao anatin’ny tebiteby.
  '26':
  - type: text
    content: Rehefa afaka ny roa amby enimpolo herinandro
  - type: text
    content: dia hovonoina ny lehilahy voahosotra iray
  - type: text
    content: ka tsy hisy hiaro azy;
  - type: text
    content: ary ny vahoakan’ny mpanjaka izay ho avy dia handrava ny tanàna sy ny fitoerana masina;
  - type: text
    content: ary ny fiafarany dia ho avy toy ny tondra-drano;
  - type: text
    content: hatramin’ny faran’ny ady
  - type: text
    content: dia hisy fandravana voatendry.
  '27':
  - type: text
    content: Hanao fanekena mafy orina amin’ny maro mandritra ny herinandro izy
  - type: text
    content: ary hampitsahatra ny fanatitra alatsa-dra sy ny fanatitra hafa
  - type: text
    content: mandritra ny antsasaky ny herinandro;
  - type: text
    content: eo ambonin’ny elatry ny fahavetavetana no hiavian’ny mpandrava,
  - type: text
    content: mandra-pahatanteraka ny fandravana voatendry,
  - type: text
    content: izay hamely ny mpandrava ihany.
  '3':
  - type: text
    content: 'Dia nitodika tamin’Andriamanitra Tompo aho mba hitady izay hivavahana sy hifonana amin’ny fifadian-kanina sy ny lamba fisaonana ary ny lavenona. '
  '4':
  - type: text
    content: 'Ary nivavaka tamin’NY TOMPO Andriamanitro aho ka nitsotra hoe:'
  - type: text
    content: 'Indrisy, Tompo ô! Andriamanitra lehibe sy mahatahotra, mitandrina ny fanekena sy ny famindrampo ho amin’izay tia Anao sy mitandrina ny didinao. '
  '5':
  - type: text
    content: 'Efa nanota izahay sady nanao izay meloka sy izay ratsy ary nikomy. Eny, efa niala tamin’ny didinao sy ny fitsipikao izahay, '
  '6':
  - type: text
    content: 'ary tsy nohenoinay ny mpaminany mpanomponao izay niteny tamin’ny anaranao tamin’ny mpanjakanay sy ny mpanapaka anay ary ny razanay sy ny vahoaka rehetra. '
  '7':
  - type: text
    content: 'Anao ny fahamarinana, Tompo ô, fa anay kosa ny fangaihaizana, tahaka ny amin’izao anio izao, dia an’ny Joda sy ny mponina any Jerosalema ary ny Israely rehetra, na ny akaiky na ny lavitra, dia any amin’ny tany rehetra izay nandroahanao azy noho ny fahadisoana izay nataony Taminao. '
  '8':
  - type: text
    content: 'Eny, anay ny fangaihaizana, TOMPO ô, dia an’ny mpanjakanay sy ny mpanapaka anay ary ny razanay, satria efa nanota taminao izahay. '
  '9':
  - type: text
    content: 'An’ny Tompo Andriamanitray kosa ny famindrampo sy ny famelan-keloka satria efa nikomy taminy izahay '
