document_id: JER.20
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nofatorana tamin’ny boloky hazo i Jeremia
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary i Pasora, zanak’Imera, mpisorona sady mpiandraikitra ny tranon’NY TOMPO, raha nandre an’i Jeremia naminany izany zavatra izany, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'dia namely tehamaina an’i Jeremia mpaminany sady namatotra azy tamin’ny boloky hazo izay teo am-bavahadin’i Benjamina, dia ilay eo ambony, eo anilan’ny tranon’NY TOMPO. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Nony ampitso dia nesorin’i Pasora tamin’ny boloky hazo i Jeremia. Dia hoy i Jeremia taminy: Tsy nataon’NY TOMPO hoe Pasora'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Pasora: Fahavokarana.'
    marker-yv: yv-n
  - type: text
    text: ' ny anaranao, fa Magora-Misabiba'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Magora-Misabiba: Fampihorohoroana manodidina.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Fa izao no lazain’NY TOMPO: Indro, hataoko fampihorohoroana ho an’ny tenanao sy ny sakaizanao rehetra ianao, ary ho lavon’ny sabatry ny fahavalony ireo, dia ho hitan’ny masonao izany; ary hatolotro eo an-tanan’ny mpanjakan’i Babilona ny Joda rehetra, dia hoentiny ho babo any Babilona izy ka hovonoiny amin’ny sabatra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary ny harena rehetra amin’ity tanàna ity, ny vokatry ny fisasarany rehetra, ny zava-tsoany rehetra ary ny harenan’ny mpanjakan’ny Joda rehetra, dia samy hatolotro eo an-tanan’ny fahavalony ka hamabo sy haka azy ireny ary hitondra azy ho any Babilona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ary ianao, ry Pasora, sy izay rehetra mitoetra ao an-tranonao, dia ho lasan-ko babo; ary ho tonga any Babilona ianao ka any no hahafatesanao, ary any koa no handevenana anao mbamin’ny sakaizanao rehetra izay efa naminanianao lainga.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mitaraina amin’Andriamanitra i Jeremia fa tsy vitany intsony
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: TOMPO ô, notaominao aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka voataona;
- type: usfm
  marker: q1
  children:
  - type: text
    text: nosamborinao aho ka resinao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tonga fihomehezana mandritra ny andro aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: izy rehetra dia maneso ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Fa na oviana na oviana no itenenako dia tsy maintsy mitaraina aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'eny, miantso aho hoe: Loza sy fandravana!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ny tenin’NY TOMPO
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia atao fanakorana sy fihomehezana ahy isanandro.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Raha hoy aho:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy hanonona Azy intsony aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: na hiteny amin’ny anarany intsony,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia tonga toy ny afo mirehitra ato am-poko izany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: voahidy ato amin’ny taolako
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary sasatra ny miaritra aho ka tsy mahazaka.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Manankina ny tenany amin’Andriamanitra ny mpaminany
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Fa reko ny endrikendriky ny besinimaro,
- type: usfm
  marker: q1
  children:
  - type: text
    text: misy fampangorohoroana manodidina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: torio, eny, hotorìntsika koa izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay rehetra tsara fihavanana amiko
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia miandry izay hahalavoako
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ka miteny hoe: Angamba ho voataona izy,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia horesentsika
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy hovalìntsika.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Kanefa NY TOMPO dia momba ahy toy ny lehilahy mahery mahatahotra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary noho izany dia ho tafintohina ny mpanenjika ahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy haharesy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho menatra indrindra izy satria tsy hambinina.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Henatra mandrakizay tsy hohadinoina izany!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Fa Ianao, Andriamanitra, Tompon’izao rehetra izao ô, dia mamantatra ny marina
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka mizaha toetra ny voa sy ny fo.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ho hitako ny famalianao azy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa Aminao no nanankinako ny adiko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Mihirà ho an’NY TOMPO, miderà NY TOMPO;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa mamonjy ny mahantra
- type: usfm
  marker: q1
  children:
  - type: text
    text: amin’ny tanan’ny mpanao ratsy Izy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Manozona ny andro nahaterahany i Jeremia
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ho voaozona anie ny andro izay nahaterahako!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aoka tsy hotahìna anie ny andro izay niterahan’Ineny ahy!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ho voaozona anie ny olona izay nitondra teny mahafaly tamin’Ikaky hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tera-dahy ianao!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary nahafaly azy indrindra izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Aoka ho toy ny tanàna izay noravan’NY TOMPO
- type: usfm
  marker: q1
  children:
  - type: text
    text: izany lehilahy izany ka tsy nanenenany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: aoka handre fitarainana izy nony maraina
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary akora lava nony mitataovovonana,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: satria tsy nahafaty ahy tany an-kibo izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hahatonga an’Ineny ho fasako
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hivesatra ahy mandrakariva ny kibony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Nahoana re aho no nivoaka avy tany an-kibo
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hahita fahoriana sy alahelo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka ho lany amin-kenatra ny androko?
