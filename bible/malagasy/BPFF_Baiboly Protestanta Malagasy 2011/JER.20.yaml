document_id: JER.20,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Nofatorana tamin’ny boloky hazo i Jeremia
  - type: text
    content: 'Ary i Pasora, zanak’Imera, mpisorona sady mpiandraikitra ny tranon’NY TOMPO, raha nandre an’i Jeremia naminany izany zavatra izany, '
  '10':
  - type: text
    content: Fa reko ny endrikendriky ny besinimaro,
  - type: text
    content: misy fampangorohoroana manodidina,
  - type: text
    content: torio, eny, hotorìntsika koa izy;
  - type: text
    content: izay rehetra tsara fihavanana amiko
  - type: text
    content: dia miandry izay hahalavoako
  - type: text
    content: 'ka miteny hoe: Angamba ho voataona izy,'
  - type: text
    content: dia horesentsika
  - type: text
    content: sy hovalìntsika.
  '11':
  - type: text
    content: Kanefa NY TOMPO dia momba ahy toy ny lehilahy mahery mahatahotra;
  - type: text
    content: ary noho izany dia ho tafintohina ny mpanenjika ahy
  - type: text
    content: ka tsy haharesy;
  - type: text
    content: ho menatra indrindra izy satria tsy hambinina.
  - type: text
    content: Henatra mandrakizay tsy hohadinoina izany!
  '12':
  - type: text
    content: Fa Ianao, Andriamanitra, Tompon’izao rehetra izao ô, dia mamantatra ny marina
  - type: text
    content: ka mizaha toetra ny voa sy ny fo.
  - type: text
    content: Ho hitako ny famalianao azy,
  - type: text
    content: fa Aminao no nanankinako ny adiko.
  '13':
  - type: text
    content: Mihirà ho an’NY TOMPO, miderà NY TOMPO;
  - type: text
    content: fa mamonjy ny mahantra
  - type: text
    content: amin’ny tanan’ny mpanao ratsy Izy.
  - type: heading
    content: Manozona ny andro nahaterahany i Jeremia
  '14':
  - type: text
    content: Ho voaozona anie ny andro izay nahaterahako!
  - type: text
    content: Aoka tsy hotahìna anie ny andro izay niterahan’Ineny ahy!
  '15':
  - type: text
    content: 'Ho voaozona anie ny olona izay nitondra teny mahafaly tamin’Ikaky hoe:'
  - type: text
    content: Tera-dahy ianao!
  - type: text
    content: Ary nahafaly azy indrindra izany.
  '16':
  - type: text
    content: Aoka ho toy ny tanàna izay noravan’NY TOMPO
  - type: text
    content: izany lehilahy izany ka tsy nanenenany;
  - type: text
    content: aoka handre fitarainana izy nony maraina
  - type: text
    content: ary akora lava nony mitataovovonana,
  '17':
  - type: text
    content: satria tsy nahafaty ahy tany an-kibo izy
  - type: text
    content: mba hahatonga an’Ineny ho fasako
  - type: text
    content: ka hivesatra ahy mandrakariva ny kibony.
  '18':
  - type: text
    content: Nahoana re aho no nivoaka avy tany an-kibo
  - type: text
    content: mba hahita fahoriana sy alahelo
  - type: text
    content: ka ho lany amin-kenatra ny androko?
  '2':
  - type: text
    content: 'dia namely tehamaina an’i Jeremia mpaminany sady namatotra azy tamin’ny boloky hazo izay teo am-bavahadin’i Benjamina, dia ilay eo ambony, eo anilan’ny tranon’NY TOMPO. '
  '3':
  - type: text
    content: 'Nony ampitso dia nesorin’i Pasora tamin’ny boloky hazo i Jeremia. Dia hoy i Jeremia taminy: Tsy nataon’NY TOMPO hoe Pasora'
  - type: note
    content: 'Pasora: Fahavokarana.'
  - type: text
    content: ' ny anaranao, fa Magora-Misabiba'
  - type: note
    content: 'Magora-Misabiba: Fampihorohoroana manodidina.'
  - type: text
    content: '. '
  '4':
  - type: text
    content: 'Fa izao no lazain’NY TOMPO: Indro, hataoko fampihorohoroana ho an’ny tenanao sy ny sakaizanao rehetra ianao, ary ho lavon’ny sabatry ny fahavalony ireo, dia ho hitan’ny masonao izany; ary hatolotro eo an-tanan’ny mpanjakan’i Babilona ny Joda rehetra, dia hoentiny ho babo any Babilona izy ka hovonoiny amin’ny sabatra. '
  '5':
  - type: text
    content: 'Ary ny harena rehetra amin’ity tanàna ity, ny vokatry ny fisasarany rehetra, ny zava-tsoany rehetra ary ny harenan’ny mpanjakan’ny Joda rehetra, dia samy hatolotro eo an-tanan’ny fahavalony ka hamabo sy haka azy ireny ary hitondra azy ho any Babilona. '
  '6':
  - type: text
    content: Ary ianao, ry Pasora, sy izay rehetra mitoetra ao an-tranonao, dia ho lasan-ko babo; ary ho tonga any Babilona ianao ka any no hahafatesanao, ary any koa no handevenana anao mbamin’ny sakaizanao rehetra izay efa naminanianao lainga.
  - type: heading
    content: Mitaraina amin’Andriamanitra i Jeremia fa tsy vitany intsony
  '7':
  - type: text
    content: TOMPO ô, notaominao aho
  - type: text
    content: ka voataona;
  - type: text
    content: nosamborinao aho ka resinao;
  - type: text
    content: tonga fihomehezana mandritra ny andro aho;
  - type: text
    content: izy rehetra dia maneso ahy.
  '8':
  - type: text
    content: Fa na oviana na oviana no itenenako dia tsy maintsy mitaraina aho,
  - type: text
    content: 'eny, miantso aho hoe: Loza sy fandravana!'
  - type: text
    content: Fa ny tenin’NY TOMPO
  - type: text
    content: dia atao fanakorana sy fihomehezana ahy isanandro.
  '9':
  - type: text
    content: 'Raha hoy aho:'
  - type: text
    content: Tsy hanonona Azy intsony aho
  - type: text
    content: na hiteny amin’ny anarany intsony,
  - type: text
    content: dia tonga toy ny afo mirehitra ato am-poko izany,
  - type: text
    content: voahidy ato amin’ny taolako
  - type: text
    content: ary sasatra ny miaritra aho ka tsy mahazaka.
  - type: heading
    content: Manankina ny tenany amin’Andriamanitra ny mpaminany
