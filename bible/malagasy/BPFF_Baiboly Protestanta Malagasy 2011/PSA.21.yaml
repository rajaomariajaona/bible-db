document_id: PSA.21,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Afaka mitoky amin’NY TOMPO ny mpanjaka
  - type: text
    content: Ho an’ny mpiventy hira. Salamo nataon’i Davida.
  - type: text
    content: TOMPO ô, ny herinao no hifalian’ny mpanjaka.
  - type: text
    content: Endre ny haben’ny firavoravoany amin’ny famonjenao!
  '10':
  - type: text
    content: Haringanao tsy ho eo amin’ny tany ny zanany
  - type: text
    content: ary tsy ho eo amin’ny zanak’olombelona ny taranany.
  '11':
  - type: text
    content: Fa nikasa hanisy ratsy anao izy
  - type: text
    content: sady namoron-kevi-dratsy nefa tsy hahefa
  '12':
  - type: text
    content: fa hampiamboho azy ianao;
  - type: text
    content: ny tsipìkanao no ikendrenao ny tavany.
  '13':
  - type: text
    content: Misandrata amin’ny herinao Ianao, TOMPO ô!
  - type: text
    content: Hihira sy hankalaza ny herinao amin’ny salamo izahay.
  '2':
  - type: text
    content: Nomenao azy izay nirin’ny fony
  - type: text
    content: 'ary tsy mba nolavinao izay nangatahin’ny molony. '
  - type: text
    content: Fiatoana
  '3':
  - type: text
    content: Fa notsenainao tamin’ny fitahiana soa izy;
  - type: text
    content: nasianao satroboninahitra volamena tsy miharo teo an-dohany.
  '4':
  - type: text
    content: Aina no nangatahiny Taminao dia nomenao azy izany,
  - type: text
    content: dia andro lava mandrakizay doria.
  '5':
  - type: text
    content: Noho ny famonjenao dia lehibe ny voninahiny;
  - type: text
    content: laza sy voninahitra no nataonao taminy.
  '6':
  - type: text
    content: Fa nataonao ho fitahiana mandrakizay izy
  - type: text
    content: ary ampifalinao indrindra amin’ny fanatrehanao.
  '7':
  - type: text
    content: Fa matoky NY TOMPO ny mpanjaka
  - type: text
    content: ary noho ny famindrampon’ny Avo Indrindra dia tsy hangozohozo izy.
  '8':
  - type: text
    content: Ho azon’ny tananao ny fahavalonao rehetra;
  - type: text
    content: eny, ho azon’ny tananao ankavanana izay mankahala anao.
  '9':
  - type: text
    content: Hataonao tahaka ny fatana misy afo mirehitra izy
  - type: text
    content: amin’ny andro hisehoanao.
  - type: text
    content: NY TOMPO handany azy amin’ny fahatezerany
  - type: text
    content: ary handevona azy ny afo.
