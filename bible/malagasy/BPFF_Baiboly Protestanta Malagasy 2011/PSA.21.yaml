document_id: PSA.21
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Afaka mitoky amin’NY TOMPO ny mpanjaka
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: Ho an’ny mpiventy hira. Salamo nataon’i Davida.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: TOMPO ô, ny herinao no hifalian’ny mpanjaka.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Endre ny haben’ny firavoravoany amin’ny famonjenao!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Nomenao azy izay nirin’ny fony
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ary tsy mba nolavinao izay nangatahin’ny molony. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Fiatoana
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Fa notsenainao tamin’ny fitahiana soa izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: nasianao satroboninahitra volamena tsy miharo teo an-dohany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Aina no nangatahiny Taminao dia nomenao azy izany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia andro lava mandrakizay doria.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Noho ny famonjenao dia lehibe ny voninahiny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: laza sy voninahitra no nataonao taminy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Fa nataonao ho fitahiana mandrakizay izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ampifalinao indrindra amin’ny fanatrehanao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Fa matoky NY TOMPO ny mpanjaka
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary noho ny famindrampon’ny Avo Indrindra dia tsy hangozohozo izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ho azon’ny tananao ny fahavalonao rehetra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, ho azon’ny tananao ankavanana izay mankahala anao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Hataonao tahaka ny fatana misy afo mirehitra izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: amin’ny andro hisehoanao.
- type: usfm
  marker: q1
  children:
  - type: text
    text: NY TOMPO handany azy amin’ny fahatezerany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary handevona azy ny afo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Haringanao tsy ho eo amin’ny tany ny zanany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy ho eo amin’ny zanak’olombelona ny taranany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Fa nikasa hanisy ratsy anao izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady namoron-kevi-dratsy nefa tsy hahefa
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: fa hampiamboho azy ianao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny tsipìkanao no ikendrenao ny tavany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Misandrata amin’ny herinao Ianao, TOMPO ô!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hihira sy hankalaza ny herinao amin’ny salamo izahay.
