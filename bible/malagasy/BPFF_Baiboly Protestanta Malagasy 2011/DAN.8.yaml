document_id: DAN.8,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: 'Ny fahitana faharoa: Ny ondrilahy sy ny osilahy'
  - type: text
    content: 'Tamin’ny taona fahatelo nanjakan’i Belsazara mpanjaka dia nisy fahitana niseho tamiko, izaho Daniela, taorianan’ilay niseho tamiko tamin’ny voalohany. '
  '10':
  - type: text
    content: 'Nihalehibe izy ka tonga hatreo amin’ireo tafika eny amin’ny lanitra; ary nisy nazerany ho amin’ny tany ny tafika sy ny kintana ka nohitsakitsahiny. '
  '11':
  - type: text
    content: 'Eny, nihalehibe izy ka niady tamin’ny komandin’ny tafika; nesorina taminy ny fanatitra isanandro ary noravana ny fitoerana masina. '
  '12':
  - type: text
    content: 'Noho ny fahotana dia natolotra azy ny tafika mbamin’ny fanatitra isanandro ary nazeran’ny tandroka ho amin’ny tany ny fahamarinana. Ary nahomby tamin’izay nataony izy. '
  '13':
  - type: text
    content: 'Nandre ny masina iray niteny aho, ary hoy ny masina iray koa tamin’ilay niteny: Mandra-pahoviana no haharetan’ny fahitana ny amin’ny fanatitra isanandro sy ny fahotana mahatonga fandravana ary ny fitoerana masina sy ny tafika voatolotra sady voahitsakitsaka? '
  '14':
  - type: text
    content: 'Dia hoy izy tamiko: Afaka telonjato sy roa arivo hariva sy maraina, ary aorianan’izany vao hodiovina ny fitoerana masina.'
  - type: heading
    content: Ny hevitr’ilay fahitana faharoa
  '15':
  - type: text
    content: 'Nony nahita ny fahitana izaho Daniela ka nitady hahafantatra izany, dia indro, nisy toy ny lehilahy matanjaka nitsangana teo anatrehako. '
  '16':
  - type: text
    content: 'Ary nandre feon’olona tao afovoan’i Olay aho, izay niantso hoe: Ry Gabriela, ampahalalao ny fahitana ity lehilahy ity. '
  '17':
  - type: text
    content: 'Dia nankeo amin’ilay nitsanganako izy; ary nony tonga izy dia raiki-tahotra aho ka niankarapoka tamin’ny tany. Nefa hoy izy tamiko: Aoka ho fantatrao, ry zanak’olona, fa io fahitana io dia milaza ny farany. '
  '18':
  - type: text
    content: 'Ary raha niresaka tamiko izy dia renoky ny torimaso teo amin’ny tany aho; fa nanohina ahy izy ka nampitsangana ahy teo amin’izay nisy ahy. '
  '19':
  - type: text
    content: 'Dia hoy izy: Indro hampahafantariko anao izay ho tonga amin’ny fiafaran’ny fahatezerana; fa hisy farany efa voafaritra. '
  '2':
  - type: text
    content: Nahita tamin’ny fahitana aho, koa raha mbola nijery aho, dia indro, tao Sosana, tanàna mimanda izay ao amin’ny fari-piadidiana Elama no nisy ahy; hitako tamin’ity fahitana ity fa teo amoron’ny ony Olay aho.
  '20':
  - type: text
    content: 'Ilay ondrilahy hitanao nanana tandroka roa dia ny mpanjakan’i Media sy i Persia. '
  '21':
  - type: text
    content: 'Ny osilahy lava volo kosa dia ny mpanjakan’i Gresy; ary ny tandroka lehibe teo anelanelan’ny masony dia ny mpanjaka voalohany. '
  '22':
  - type: text
    content: 'Ny amin’ilay tapaka kosa ka nisy efatra nitsangana nandimby azy, ary hisy fanjakana efatra hitsangana avy amin’ny '
  - type: text
    content: Jentilisa
  - type: text
    content: ', nefa tsy mitovy hery aminy.'
  '23':
  - type: text
    content: Ary ny hiafaran’ny fanjakany,
  - type: text
    content: rehefa tanteraky ny mpanota ny asany
  - type: text
    content: dia hisy mpanjaka hitsangana, izay masiaka tarehy sy mahafantatra zavatra saro-pantarina.
  '24':
  - type: text
    content: Ho be ny heriny, nefa tsy amin’ny herin’ny tenany;
  - type: text
    content: mahagaga ny fanimbana hataony;
  - type: text
    content: hahomby amin’izay hataony izy
  - type: text
    content: ary handringana ny mahery
  - type: text
    content: sy ny olo-masina.
  '25':
  - type: text
    content: Ny hafetseny koa
  - type: text
    content: no hahatanteraka ny fitaka eny an-tanany;
  - type: text
    content: ary hiavonavona am-po izy
  - type: text
    content: ka handringana ny maro tsy manampo na inona na inona;
  - type: text
    content: ary hitsangana hanohitra ny Mpanjakan’ny mpanjaka izy;
  - type: text
    content: kanjo kosa ho torotoro, nefa tsy hisy tanana hamely azy tsinona.
  '26':
  - type: text
    content: Ary marina ny amin’ireo hariva sy maraina voalaza ireo,
  - type: text
    content: nefa tano ho tsiambaratelo ny fahitana
  - type: text
    content: fa mbola ho andro maro izany.
  '27':
  - type: text
    content: Dia torana izaho Daniela ka nandraiky narary nandritra ny andro vitsivitsy; nony afaka izany dia nitsangana aho ka nikarakara ny raharahan’ny mpanjaka. Nihoron-koditra tamin’ny fahitana aho satria tena tsy azoko ny hevitr’izany.
  '3':
  - type: text
    content: 'Natopiko ny masoko ka hitako fa indro nisy ondrilahy iray nitsangana teo amoron’ny ony ary nanana tandroka roa izy; lava ireo tandroka ireo, ary ny iray dia lava noho ny iray, nefa ilay lavalava kokoa no nipoitra taoriana. '
  '4':
  - type: text
    content: Hitako ilay ondrilahy nanoto niankandrefana sy nianavaratra ary nianatsimo; ary tsy nisy biby nahajanona teo anoloany sady tsy nisy naharombaka izay tonga teny an-tanany, fa nanao izay sitrapony izy ka nihalehibe.
  '5':
  - type: text
    content: 'Raha mbola nandinika aho dia indro nisy osilahy nivoaka avy tany andrefana ka nitety ny tany rehetra nefa tsy nikasika ny tany; ary ilay osilahy dia nanana tandroka lehibe teo anelanelan’ny masony. '
  '6':
  - type: text
    content: 'Nankeo amin’ilay ondrilahy nanana tandroka roa izy, dia ilay efa hitako nitsangana teo amoron’ny ony, ka niala vonkina teo aminy tamin’ny heriny rehetra. '
  '7':
  - type: text
    content: 'Eny, hitako nanatona ho eo anilan’ny ondrilahy izy, dia nisafoaka taminy ka namely ny ondrilahy ary nanapaka ny tandrony roa; vokany: Tsy nahajanona teo anoloany intsony ilay ondrilahy, fa nazerany teo amin’ny tany ka nohitsakitsahiny; ary tsy nisy nahavonjy ilay ondrilahy teny an-tanany. '
  '8':
  - type: text
    content: Dia nihanahery tokoa ilay osilahy; nefa nony nahery izy dia tapaka ilay tandrony lehibe; ary nisy tandroka efatra lehibe hafa nipoitra nisolo iny, nifanandrify tamin’ny rivotra efatry ny lanitra.
  '9':
  - type: text
    content: 'Nisy tandroka kely nipoitra avy tamin’ny iray tamin’ireny ka nihalehibe dia lehibe nianatsimo sy niantsinanana ary nankany amin’ny tany mahafinaritra. '
