document_id: DAN.8
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Ny fahitana faharoa: Ny ondrilahy sy ny osilahy'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Tamin’ny taona fahatelo nanjakan’i Belsazara mpanjaka dia nisy fahitana niseho tamiko, izaho Daniela, taorianan’ilay niseho tamiko tamin’ny voalohany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Nahita tamin’ny fahitana aho, koa raha mbola nijery aho, dia indro, tao Sosana, tanàna mimanda izay ao amin’ny fari-piadidiana Elama no nisy ahy; hitako tamin’ity fahitana ity fa teo amoron’ny ony Olay aho.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Natopiko ny masoko ka hitako fa indro nisy ondrilahy iray nitsangana teo amoron’ny ony ary nanana tandroka roa izy; lava ireo tandroka ireo, ary ny iray dia lava noho ny iray, nefa ilay lavalava kokoa no nipoitra taoriana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Hitako ilay ondrilahy nanoto niankandrefana sy nianavaratra ary nianatsimo; ary tsy nisy biby nahajanona teo anoloany sady tsy nisy naharombaka izay tonga teny an-tanany, fa nanao izay sitrapony izy ka nihalehibe.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Raha mbola nandinika aho dia indro nisy osilahy nivoaka avy tany andrefana ka nitety ny tany rehetra nefa tsy nikasika ny tany; ary ilay osilahy dia nanana tandroka lehibe teo anelanelan’ny masony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Nankeo amin’ilay ondrilahy nanana tandroka roa izy, dia ilay efa hitako nitsangana teo amoron’ny ony, ka niala vonkina teo aminy tamin’ny heriny rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Eny, hitako nanatona ho eo anilan’ny ondrilahy izy, dia nisafoaka taminy ka namely ny ondrilahy ary nanapaka ny tandrony roa; vokany: Tsy nahajanona teo anoloany intsony ilay ondrilahy, fa nazerany teo amin’ny tany ka nohitsakitsahiny; ary tsy nisy nahavonjy ilay ondrilahy teny an-tanany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Dia nihanahery tokoa ilay osilahy; nefa nony nahery izy dia tapaka ilay tandrony lehibe; ary nisy tandroka efatra lehibe hafa nipoitra nisolo iny, nifanandrify tamin’ny rivotra efatry ny lanitra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Nisy tandroka kely nipoitra avy tamin’ny iray tamin’ireny ka nihalehibe dia lehibe nianatsimo sy niantsinanana ary nankany amin’ny tany mahafinaritra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Nihalehibe izy ka tonga hatreo amin’ireo tafika eny amin’ny lanitra; ary nisy nazerany ho amin’ny tany ny tafika sy ny kintana ka nohitsakitsahiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Eny, nihalehibe izy ka niady tamin’ny komandin’ny tafika; nesorina taminy ny fanatitra isanandro ary noravana ny fitoerana masina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Noho ny fahotana dia natolotra azy ny tafika mbamin’ny fanatitra isanandro ary nazeran’ny tandroka ho amin’ny tany ny fahamarinana. Ary nahomby tamin’izay nataony izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Nandre ny masina iray niteny aho, ary hoy ny masina iray koa tamin’ilay niteny: Mandra-pahoviana no haharetan’ny fahitana ny amin’ny fanatitra isanandro sy ny fahotana mahatonga fandravana ary ny fitoerana masina sy ny tafika voatolotra sady voahitsakitsaka? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dia hoy izy tamiko: Afaka telonjato sy roa arivo hariva sy maraina, ary aorianan’izany vao hodiovina ny fitoerana masina.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny hevitr’ilay fahitana faharoa
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Nony nahita ny fahitana izaho Daniela ka nitady hahafantatra izany, dia indro, nisy toy ny lehilahy matanjaka nitsangana teo anatrehako. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary nandre feon’olona tao afovoan’i Olay aho, izay niantso hoe: Ry Gabriela, ampahalalao ny fahitana ity lehilahy ity. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Dia nankeo amin’ilay nitsanganako izy; ary nony tonga izy dia raiki-tahotra aho ka niankarapoka tamin’ny tany. Nefa hoy izy tamiko: Aoka ho fantatrao, ry zanak’olona, fa io fahitana io dia milaza ny farany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary raha niresaka tamiko izy dia renoky ny torimaso teo amin’ny tany aho; fa nanohina ahy izy ka nampitsangana ahy teo amin’izay nisy ahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Dia hoy izy: Indro hampahafantariko anao izay ho tonga amin’ny fiafaran’ny fahatezerana; fa hisy farany efa voafaritra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ilay ondrilahy hitanao nanana tandroka roa dia ny mpanjakan’i Media sy i Persia. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ny osilahy lava volo kosa dia ny mpanjakan’i Gresy; ary ny tandroka lehibe teo anelanelan’ny masony dia ny mpanjaka voalohany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ny amin’ilay tapaka kosa ka nisy efatra nitsangana nandimby azy, ary hisy fanjakana efatra hitsangana avy amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jentilisa
  - type: text
    text: ', nefa tsy mitovy hery aminy.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ary ny hiafaran’ny fanjakany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: rehefa tanteraky ny mpanota ny asany
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hisy mpanjaka hitsangana, izay masiaka tarehy sy mahafantatra zavatra saro-pantarina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Ho be ny heriny, nefa tsy amin’ny herin’ny tenany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mahagaga ny fanimbana hataony;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hahomby amin’izay hataony izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary handringana ny mahery
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny olo-masina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Ny hafetseny koa
- type: usfm
  marker: q1
  children:
  - type: text
    text: no hahatanteraka ny fitaka eny an-tanany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hiavonavona am-po izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka handringana ny maro tsy manampo na inona na inona;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hitsangana hanohitra ny Mpanjakan’ny mpanjaka izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: kanjo kosa ho torotoro, nefa tsy hisy tanana hamely azy tsinona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Ary marina ny amin’ireo hariva sy maraina voalaza ireo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa tano ho tsiambaratelo ny fahitana
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa mbola ho andro maro izany.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Dia torana izaho Daniela ka nandraiky narary nandritra ny andro vitsivitsy; nony afaka izany dia nitsangana aho ka nikarakara ny raharahan’ny mpanjaka. Nihoron-koditra tamin’ny fahitana aho satria tena tsy azoko ny hevitr’izany.
