document_id: MRK.10,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fampianaran’i Jesosy ny amin’ny fisaraham-panambadiana
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mat 19.1-9
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ary niainga niala teo Jesosy dia tonga tany amin’ny faritanin’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jodia
    - type: text
      text: ' sy tany andafin’i Jordana. Ary nisy vahoaka betsaka indray niangona teo Aminy; koa araka ny fanaony dia nampianatra azy ireo indray Izy.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ary rehefa tonga tao an-trano dia nanontany ny amin’izany koa ny mpianatra. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Dia hoy Izy taminy: Na zovy na zovy no misaotra ny vadiny ka mampakatra vehivavy hafa dia mijangajanga eo anatrehan’ilay voalohany izy. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Ary raha ny vehivavy kosa no misaotra ny lahy ka manambady olon-kafa dia mijangajanga izy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesosy sy ny zaza
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mat 19.13-15; Lio 18.15-17
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ary nisy nitondra zaza ho eo Aminy mba hametrahany tanana. Nefa ny mpianany niteny mafy azy ireny. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Kanefa tezitra Jesosy raha nahita izany ka hoy Izy taminy: Avelao ny zaza hanatona Ahy ary aza rarana; fa an’izay toa azy ny fanjakan’Andriamanitra. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Lazaiko aminareo marina tokoa: Na zovy na zovy no tsy mandray ny fanjakan’Andriamanitra tahaka ny zaza dia tsy ho tafiditra ao aminy akory. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Ary nitrotro azy Izy dia nametra-tanana taminy ka nitsodrano azy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesosy sy ilay mpanankarena iray
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mat 19.16-30; Lio 18.18-30
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Rehefa teny an-dalana Jesosy dia nisy olona iray nihazakazaka nanatona ka nandohalika teo anatrehany ary nanontany Azy hoe: Mpampianatra tsara ô, inona no hataoko mba handovako fiainana mandrakizay? '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Hoy Jesosy taminy: Nahoana Aho no lazainao hoe tsara? Tsy misy tsara afa-tsy Iray ihany, dia Andriamanitra. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Fantatrao ny didy hoe: «Aza mamono olona, aza mijangajanga, aza mangalatra, aza mety ho vavolombelona mandainga, aza manambaka olona, manajà ny rainao sy ny reninao» (Eks 20.12-17). '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Ary nisy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Fariseo
    - type: text
      text: ' maromaro nanatona Azy ka naka fanahy Azy sy nanontany hoe: Mahazo misaotra ny vadiny va ny lehilahy? '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Ary hoy izy taminy: Mpampianatra ô, izany rehetra izany dia efa notandremako hatramin’ny fahazazako. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Ary Jesosy nijery azy tsara dia tia azy ka niteny taminy hoe: Diso zavatra iray loha ianao: Mandehana, amidio izay rehetra anananao ka omeo ho an’ny mahantra, dia hanana rakitra any an-danitra ianao. Ary avia hanaraka Ahy. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Dia nanjombona ny tarehiny noho izany teny izany ka niala tamin’alahelo izy, satria nanana harena be.
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Ary Jesosy nijery manodidina ka niteny tamin’ny mpianany hoe: Manao ahoana ny hasarotry ny fidiran’ny mpanankarena ao amin’ny fanjakan’Andriamanitra!'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Dia gaga tamin’ny teniny ny mpianatra. Fa hoy indray Jesosy taminy: Anaka, manao ahoana ny hasarotry ny fidirana ao amin’ny fanjakan’Andriamanitra! '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Moramora kokoa ny hidiran’ny rameva amin’ny vodifanjaitra noho ny hidiran’ny manankarena ao amin’ny fanjakan’Andriamanitra.
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Dia talanjona indrindra izy ireo ka nifampiresaka hoe: Iza indray ary no azo hovonjena? '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Fa Jesosy nijery azy ka niteny hoe: Raha amin’ny olona dia zavatra tsy hainy izany, fa tsy mba tahaka izany amin’Andriamanitra; fa ny zavatra rehetra dia hain’Andriamanitra.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Ary hoy Petera taminy: Indro, efa nahafoy ny zavatra rehetra izahay ka nanaraka Anao. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Hoy Jesosy: Lazaiko aminareo marina tokoa: Tsy misy olona efa nahafoy trano, na rahalahy, na anabavy, na reny, na ray, na zanaka, na tany noho ny Amiko sy ny Filazantsara, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Ary Izy namaly azy ireo hoe: Inona no nandidian’i Mosesy anareo? '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'ka tsy handray zato heny amin’izao andro ankehitriny izao, dia trano, rahalahy, anabavy, reny, zanaka, tany mbamin’ny fanenjehana ary amin’ny andro ho avy dia fiainana mandrakizay. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Nefa maro izay voalohany no ho farany ary izay farany no ho voalohany.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nilazan’i Jesosy fanintelony ny hahafatesany sy ny hitsanganany amin’ny maty
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mat 20.17-19; Lio 18.31-34
    marker-yv: yv-h
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Ary Jesosy sy ny mpianany dia teny an-dalana niakatra ho any Jerosalema, ary Jesosy no nandeha teo alohany. Dia gaga ny mpianany, ary izay nanaraka Azy dia natahotra. Ary naka ny roa amby folo lahy indray Izy dia nilaza taminy izay efa hanjo Azy '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'ka niteny hoe: Indro, miakatra ho any Jerosalema isika; ary ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Zanak’Olona
    - type: text
      text: ' dia hatolotra ho amin’ireo lehiben’ny mpisorona sy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpanoradalàna
    - type: text
      text: '; ary hohelohiny ho faty Izy ka hatolony amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jentilisa
    - type: text
      text: '; '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: ary hanao Azy ho fihomehezana ireny sy handrora Azy sy hikapoka Azy ary hahafaty Azy; fa rehefa afaka hateloana dia hitsangana indray Izy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fangatahana nataon’i Jakoba sy i Jaona
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mat 20.20-28
    marker-yv: yv-h
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Ary nanatona an’i Jesosy i Jakoba sy i Jaona, zanak’i Zebedio ka niteny Taminy hoe: Mpampianatra ô, tianay hataonao aminay izay mba angatahinay Aminao. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Dia hoy Izy taminy: Inona moa no tianareo hataoko aminareo? '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Hoy izy mirahalahy Taminy: Mba ekeo ny hipetrahanay any amin’ny voninahitrao, koa ny iray dia ho eo amin’ny ankavananao ary ny iray dia ho eo amin’ny ankavianao. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Fa hoy Jesosy taminy: Tsy fantatrareo izay angatahinareo. Hainareo va ny hisotro amin’ny kapoaka izay isotroako, na ny hatao batisa amin’ny batisa izay anaovana Ahy batisa? '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Dia hoy izy mirahalahy Taminy: Hainay ihany izany. Hoy Jesosy taminy: Raha ny kapoaka izay isotroako dia hisotroanareo ihany ary ny batisa izay anaovana Ahy batisa dia hatao aminareo ihany; '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Dia hoy ireo: Navelan’i Mosesy hanoratra taratasy fisaoram-bady ny lehilahy ka hisaotra ny vadiny (Deo 24.1). '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: fa ny hipetraka eo ankavanako na eo ankaviako kosa dia tsy anjarako ny hanome izany fa natao ho an’ireo izay nanamboarana azy izany.
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'Nony nandre izany izy folo lahy dia tezitra noho ny nataon’i Jakoba sy i Jaona. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'Fa Jesosy niantso azy ireo hanatona Azy ka niteny taminy hoe: Fantatrareo fa izay eken’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jentilisa
    - type: text
      text: ' ho mpanapaka aminy dia mampanompo azy, ary ny lehibeny dia manapaka aminy. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'Fa tsy mba toy izany aminareo. Fa na iza na iza no te ho lehibe eo aminareo dia ho mpanompo anareo izy. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: 'Ary na iza na iza no te ho ambony eo aminareo dia ho mpanompon’izy rehetra izy. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: Fa ny Zanak’Olona tsy tonga mba hotompoina fa mba hanompo ka hanolotra ny ainy ho avotra hisolo ny maro.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nampahiratan’i Jesosy an’i Bartimeo jamba
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mat 20.29-34; Lio 18.35-43
    marker-yv: yv-h
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: 'Ary tonga tao Jeriko izy ireo. Ary raha vao niala tao Jeriko Jesosy mbamin’ny mpianany sy ny vahoaka betsaka dia nisy jamba mpangataka nipetraka teo amoron-dalana, i Bartimeo, zanak’i Timeo. '
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: 'Nony reny fa injay Jesosy avy any Nazareta dia niantso mafy izy hoe: Ry Jesosy, Zanak’i Davida ô, mamindrà fo amiko! '
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: 'Maro no niteny mafy azy mba hangina; fa vao mainka niantsoantso mafy izy hoe: Ry Zanak’i Davida ô, mamindrà fo amiko! '
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: 'Dia nijanona Jesosy ka niteny hoe: Antsoy ilay jamba. Ary niantso azy ny olona ka niteny taminy hoe: Matokia, mitsangàna fa miantso anao Izy. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Fa hoy Jesosy taminy: Ny hamafin’ny fonareo no nanoratany izany didy izany ho anareo. '
  '50':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '50'
    - type: text
      text: 'Dia navelany teo ny akanjony ivelany ka niantsambotra nankeo amin’i Jesosy izy. '
  '51':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '51'
    - type: text
      text: 'Ary Jesosy niteny taminy hoe: Inona no tianao hataoko aminao? Dia hoy ilay jamba taminy: Rabonỳ, ny mba hampahiratana ny masoko! '
  '52':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '52'
    - type: text
      text: 'Hoy Jesosy taminy: Mandehana ianao, ny finoanao no namonjy anao. Dia nahiratra niaraka tamin’izay ny masony ka nanaraka an’i Jesosy teny an-dalana izy.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Fa hatramin’ny namoronana izao tontolo izao dia lahy sy vavy no nanaovan’Andriamanitra ny olona (Gen 1.27). '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: '«Ary noho izany ny lehilahy dia handao ny rainy sy ny reniny ka hikambana amin’ny vadiny, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'dia ho nofo iray ihany izy roa» (Gen 2.24). Koa tsy roa intsony izy fa nofo iray ihany. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Koa izay nakamban’Andriamanitra dia aoka tsy hosarahin’olona.
