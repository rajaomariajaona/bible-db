document_id: 1CH.22
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Dia hoy i Davida: Eto no ho tranon’NY TOMPO Andriamanitra, ary eto no ho alitara fandoroana ny fanatitra dorana manontolo ho an’ny Israely.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nanomanan’i Davida ny fananganana ny tempoly
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary nasain’i Davida novorina ny olona hafa firenena izay tany amin’ny tanin’ny Israely ka nanendreny tambato hipai-bato hanaovana ny tranon’Andriamanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Nahavonona vy betsaka hatao hombon’ny lela vavahady sy ny fikambanany i Davida ary nahavory varahina betsaka tsy hita lanja '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'sy hazo sedera tsy hita isa koa; fa ny mponina tany Sidona sy Tiro dia nitondra hazo sedera betsaka ho any amin’i Davida. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Fa hoy i Davida: Mbola zaza sady tanora fanahy i Solomona zanako, ary ny trano hatao ho an’NY TOMPO dia tsy maintsy ho lehibe indrindra, mba hiely any amin’ny tany rehetra ny lazany sy ny voninahiny, koa hataoko vonona rahateo ny zavatra hoenti-manao azy. Dia nahavonona betsaka i Davida raha mbola velona.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Manankina amin’i Solomona ny fananganana ny tempoly i Davida
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Niantso an’i Solomona zanany izy ka nandidy azy hanao trano ho an’NY TOMPO, Andriamanitry ny Israely, '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'ary niteny taminy hoe: Anaka, efa tato am-poko ny hanao trano ho an’ny anaran’NY TOMPO Andriamanitro. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Nisy tenin’NY TOMPO anefa tonga tamiko hoe: Be ny ra efa nalatsakao ary ady lehibe maro no efa nataonao; koa tsy mahazo manao trano ho an’ny anarako ianao satria be ny ra efa nalatsakao tamin’ny tany teo imasoko. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Fa indro, ianao dia hiteraka zazalahy, izay ho lehilahy miadana, ary hampiadaniko; tsy hisy hahazo azy ny fahavalony rehetra manodidina; koa ny anarany dia hatao hoe Solomona
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Solomona: Miadana.'
    marker-yv: yv-n
  - type: text
    text: '; hampiadaniko sy hampandriako fehizay ny Israely amin’ny androny. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Izy no hanao trano ho an’ny anarako; ho zanako izy, ary ho rainy Aho, ary hampitoeriko amin’ny Israely mandrakizay ny sezafiandrianan’ny fanjakany. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Koa ankehitriny, anaka, homba anao anie NY TOMPO ka hambinina anie ianao, fa ataovy ny tranon’NY TOMPO Andriamanitrao araka izay nolazainy anao. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Homen’NY TOMPO saina sy fahendrena anie ianao ka hatsangany ho mpitondra ny Israely, mba hitandremanao ny lalànan’NY TOMPO Andriamanitrao. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary amin’izany dia hambinina ianao, raha mitandrina hankatò ny lalàna sy ny fitsipika izay nandidian’NY TOMPO an’i Mosesy ho an’ny Israely; mahereza sy matanjaha; aza matahotra na mivadi-po. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Eny, fa na dia be fahoriana aza aho dia nahavory '
  - type: usfm
    marker: w
    children:
    - type: text
      text: talenta
  - type: text
    text: ' volamena iray hetsy sy talenta volafotsy iray tapitrisa ary varahina sy vy betsaka tsy hita lanja hoenti-manao ny tranon’NY TOMPO; efa nahavonona hazo sy vato koa aho; koa ampionao kosa ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary koa, efa manana mpiasa betsaka ianao, dia mpikapa hazo sy tambato ary mpandrafitra sy olona mahay ny asa samihafa rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ny volamena sy ny volafotsy ary ny varahina sy ny vy dia tsy hita isa. Koa mitsangàna ianao ka atsangano izany, ary homba anao anie NY TOMPO.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary nandidy ny lehibe rehetra tamin’ny Israely i Davida mba hanampy an’i Solomona zanany ka hoy izy: '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Tsy momba anareo va NY TOMPO Andriamanitrareo ka efa nampiadana anareo amin’ny manodidina? Fa efa natolony teo an-tanako ny mponina amin’ny tany; ary ny tany dia efa resy teo anoloan’NY TOMPO sy teo anoloan’ny olony. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Koa ankehitriny, ampitadiavo NY TOMPO Andriamanitrareo ny fonareo sy ny fanahinareo ka mitsangàna, ary ataovy ny fitoerana masina ho an’NY TOMPO Andriamanitra, hampidirana ny vata misy ny faneken’NY TOMPO sy ny fanaka masin’Andriamanitra ho ao amin’ny trano izay hatao ho an’ny anaran’NY TOMPO.
