document_id: EZR.1
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Manome lalana ny fanorenana indray ny tempoly i Kirosy
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 2Tan 36.22-23
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Tamin’ny taona voalohany nanjakan’i Kirosy, mpanjakan’i Persia, dia notairin’NY TOMPO ny fanahin’i Kirosy mpanjakan’i Persia mba hanatanteraka ny tenin’NY TOMPO izay nampilazainy an’i Jeremia, koa nandefa teny manerana ny fanjakany rehetra izy; nataony an-tsoratra izany ary milaza hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Izao no lazain’i Kirosy mpanjakan’i Persia: Ny fanjakana rehetra ambonin’ny tany dia efa nomen’NY TOMPO, Andriamanitry ny lanitra, ahy; ary efa nandidy ahy Izy mba hanao trano ho Azy any Jerosalema izay any Joda. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Koa iza avy aminareo rehetra moa no olony? Andriamaniny anie homba azy! Aoka hiakatra any Jerosalema izay any Joda izy ka hanao ny tranon’NY TOMPO, Andriamanitry ny Israely. Izy no Andriamanitra izay any Jerosalema. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ary izay rehetra mijanona, na aiza na aiza toerana misy azy, dia aoka ny tompon-tany ao amin’izay ivahiniany hanome azy volafotsy, volamena, fanaka ary biby fiompy mbamin’ny fanatitra an-tsitrapo ho an’ny tranon’Andriamanitra izay any Jerosalema.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia niainga ny lohan’ny fianakavian’i Joda sy Benjamina mbamin’ny mpisorona sy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: levita
  - type: text
    text: ', dia izay rehetra efa notairin’Andriamanitra ny fanahiny, mba hiakatra hanao ny tranon’NY TOMPO any Jerosalema. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Izay rehetra manodidina dia nampahery azy ireo tamin’ny fanolorana fanaka volafotsy sy volamena, fanaka hafa, biby fiompy ary zava-tsoa mbamin’izay rehetra nateriny an-tsitrapo. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dia navoakan’i Kirosy mpanjaka ny fanaky ny tranon’NY TOMPO izay nalain’i Nebokadnezara tany Jerosalema ka nataony tao an-tranon’ny andriamaniny. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary nasain’i Kirosy mpanjakan’i Persia namoaka ireny i Mitredata mpitahiry ny harenan’ny fanjakana dia nisainy sady natolony an’i Sesbazara, lehiben’ny fokon’i Joda. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Izao no isany: Lovia volamena telopolo, lovia volafotsy arivo, antsy sivy amby roapolo, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'kapoaka volamena misarona telopolo, lovia volafotsy fiandry folo sy efajato ary lovia hafa koa arivo; '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: efajato sy dimy arivo no isan’ny fanaka volamena sy volafotsy rehetra. Ireo rehetra ireo dia noentin’i Sesbazara niaraka tamin’ny babo izay niverina avy tany Babilona nankany Jerosalema.
