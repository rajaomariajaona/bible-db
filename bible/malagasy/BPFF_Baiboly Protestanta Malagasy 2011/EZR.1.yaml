document_id: EZR.1,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Manome lalana ny fanorenana indray ny tempoly i Kirosy
  - type: heading
    content: 2Tan 36.22-23
  - type: text
    content: 'Tamin’ny taona voalohany nanjakan’i Kirosy, mpanjakan’i Persia, dia notairin’NY TOMPO ny fanahin’i Kirosy mpanjakan’i Persia mba hanatanteraka ny tenin’NY TOMPO izay nampilazainy an’i Jeremia, koa nandefa teny manerana ny fanjakany rehetra izy; nataony an-tsoratra izany ary milaza hoe: '
  '10':
  - type: text
    content: 'kapoaka volamena misarona telopolo, lovia volafotsy fiandry folo sy efajato ary lovia hafa koa arivo; '
  '11':
  - type: text
    content: efajato sy dimy arivo no isan’ny fanaka volamena sy volafotsy rehetra. Ireo rehetra ireo dia noentin’i Sesbazara niaraka tamin’ny babo izay niverina avy tany Babilona nankany Jerosalema.
  '2':
  - type: text
    content: 'Izao no lazain’i Kirosy mpanjakan’i Persia: Ny fanjakana rehetra ambonin’ny tany dia efa nomen’NY TOMPO, Andriamanitry ny lanitra, ahy; ary efa nandidy ahy Izy mba hanao trano ho Azy any Jerosalema izay any Joda. '
  '3':
  - type: text
    content: 'Koa iza avy aminareo rehetra moa no olony? Andriamaniny anie homba azy! Aoka hiakatra any Jerosalema izay any Joda izy ka hanao ny tranon’NY TOMPO, Andriamanitry ny Israely. Izy no Andriamanitra izay any Jerosalema. '
  '4':
  - type: text
    content: Ary izay rehetra mijanona, na aiza na aiza toerana misy azy, dia aoka ny tompon-tany ao amin’izay ivahiniany hanome azy volafotsy, volamena, fanaka ary biby fiompy mbamin’ny fanatitra an-tsitrapo ho an’ny tranon’Andriamanitra izay any Jerosalema.
  '5':
  - type: text
    content: 'Dia niainga ny lohan’ny fianakavian’i Joda sy Benjamina mbamin’ny mpisorona sy ny '
  - type: text
    content: levita
  - type: text
    content: ', dia izay rehetra efa notairin’Andriamanitra ny fanahiny, mba hiakatra hanao ny tranon’NY TOMPO any Jerosalema. '
  '6':
  - type: text
    content: 'Izay rehetra manodidina dia nampahery azy ireo tamin’ny fanolorana fanaka volafotsy sy volamena, fanaka hafa, biby fiompy ary zava-tsoa mbamin’izay rehetra nateriny an-tsitrapo. '
  '7':
  - type: text
    content: 'Dia navoakan’i Kirosy mpanjaka ny fanaky ny tranon’NY TOMPO izay nalain’i Nebokadnezara tany Jerosalema ka nataony tao an-tranon’ny andriamaniny. '
  '8':
  - type: text
    content: 'Ary nasain’i Kirosy mpanjakan’i Persia namoaka ireny i Mitredata mpitahiry ny harenan’ny fanjakana dia nisainy sady natolony an’i Sesbazara, lehiben’ny fokon’i Joda. '
  '9':
  - type: text
    content: 'Izao no isany: Lovia volamena telopolo, lovia volafotsy arivo, antsy sivy amby roapolo, '
