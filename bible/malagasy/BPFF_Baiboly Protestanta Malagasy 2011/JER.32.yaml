document_id: JER.32,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Mividy ny tanin’ny rahalahan-drainy i Jeremia
  - type: text
    content: Izao no teny tonga tamin’i Jeremia avy tamin’NY TOMPO tamin’ny taona fahafolo nanjakan’i Zedekia, mpanjakan’ny Joda, dia ny taona fahavalo amby folo nanjakan’i Nebokadnezara.
  '10':
  - type: text
    content: 'Ary nosoratako tamin’ny taratasy izany ka nasiako tombo-kase sady nasiako vavolombelona maromaro, ary nolanjaiko tamin’ny mizana ny vola. '
  '11':
  - type: text
    content: 'Dia noraisiko ny taratasy nisy ny fanekena ny amin’ny vidin-tany, dia ilay voaisy tombo-kase araka ny lalàna sy ny fanao mbamin’ny taratasy mivelatra koa; '
  '12':
  - type: text
    content: 'ary natolotro an’i Baroka, zanak’i Neria, zanak’i Mahaseia, ilay taratasy nisy ny fanekena tamin’ny vidin-tany, teo imason’i Hanamela, zana-drahalahin’Ikaky, sy teo anatrehan’ny vavolombelona izay nanao sonia tamin’ny taratasy nisy ny fanekena ny amin’ny vidin-tany, dia teo anatrehan’ny '
  - type: text
    content: Jiosy
  - type: text
    content: ' rehetra izay nipetraka teo amin’ny kianjan’ny trano fiambenana. '
  '13':
  - type: text
    content: 'Dia nanome didy an’i Baroka teo anatrehan’ireo aho hoe: '
  '14':
  - type: text
    content: 'Izao no lazain’Andriamanitra, Tompon’izao rehetra izao, Andriamanitry ny Israely: Ento ireto taratasy ireto, dia ireto taratasy misy ny fanekena ny amin’ny vidin-tany ireto, dia ilay misy tombo-kase, mbamin’ny taratasy mivelatra, ary ataovy ao anaty vilany tany izy mba haharitra ela. '
  '15':
  - type: text
    content: 'Fa izao no lazain’Andriamanitra, Tompon’izao rehetra izao, Andriamanitry ny Israely: Mbola hisy trano sy saha ary tanim-boaloboka hovidina indray eto amin’ity tany ity.'
  '16':
  - type: text
    content: 'Ary rehefa voatolotra an’i Baroka, zanak’i Neria, ilay taratasy nisy ny fanekena ny amin’ny vidin-tany, dia nivavaka tamin’NY TOMPO aho hoe:'
  - type: heading
    content: Ny vavak’i Jeremia
  '17':
  - type: text
    content: 'Indrisy, Andriamanitra Tompo ô! Indro, Ianao no nanao ny lanitra sy ny tany tamin’ny herinao lehibe sy ny sandrinao nitsotra, ary tsy misy zava-mahagaga izay tsy hainao atao. '
  '18':
  - type: text
    content: 'Mamindra fo amin’ny arivoarivo Ianao ary mamaly ny heloky ny ray ho ao an-tratran’ny zanany mandimby azy, dia Andriamanitra lehibe sy mahery, Andriamanitra, Tompon’izao rehetra izao, no anaranao, '
  '19':
  - type: text
    content: 'lehibe amin’ny fisainana sady mahery amin’ny atao; fa mibanjina ny alehan’ny zanak’olombelona rehetra ny masonao mba hanome azy rehetra, araka ny lalany avy sy araka ny vokatry ny asany. '
  '2':
  - type: text
    content: 'Fa tamin’izany no nanaovan’ny miaramilan’ny mpanjakan’i Babilona fahirano an’i Jerosalema; ary i Jeremia mpaminany dia nambenana teo amin’ny trano fiambenana izay teo amin’ny kianjan’ny tranon’ny mpanjakan’ny Joda. '
  '20':
  - type: text
    content: 'Ianao no nanisy famantarana sy fahagagana tany amin’ny tany Ejipta ka mandraka androany koa, na ao amin’ny Israely, na ao amin’ny olona hafa koa, dia nanao anarana ho Anao tahaka ny amin’izao anio izao. '
  '21':
  - type: text
    content: 'Nitondra ny Israely olonao nivoaka avy tany amin’ny tany Ejipta Ianao tamin’ny famantarana sy ny fahagagana ary ny tanana mahery sy ny sandry nitsotra ary ny fampahatahorana lehibe, '
  '22':
  - type: text
    content: 'ary nanome azy ity tany ity, izay efa nianiananao tamin’ny razany homena azy, dia tany tondra-dronono sy tantely. '
  '23':
  - type: text
    content: 'Ary tonga teto izy dia nandova izany, nefa tsy nihaino ny feonao izy sady tsy nandeha araka ny lalànanao; tsy nanao na inona na inona tamin’izay rehetra nasainao nataony izy ka nataonao mihatra aminy izao loza rehetra izao. '
  '24':
  - type: text
    content: 'Indro, ny tovon-tany dia miorina akaikin’ny tanàna hanafahana azy, ary ny tanàna dia atolotra eo an-tanan’ny Kaldeana izay mamely azy noho ny sabatra sy ny mosary ary ny areti-mandringana; ary izay nolazainao dia tonga, koa indro, hitan’ny masonao izany. '
  '25':
  - type: text
    content: 'Ary Ianao, Andriamanitra Tompo ô, dia niteny tamiko hoe: Vidionao vola ny saha, ary makà vavolombelona maromaro, na dia efa voatolotra eo an-tanan’ny Kaldeana aza ny tanàna.'
  - type: heading
    content: Ny navalin’NY TOMPO an’i Jeremia
  '26':
  - type: text
    content: 'Dia tonga tamin’i Jeremia ny tenin’NY TOMPO hoe: '
  '27':
  - type: text
    content: 'Indro, Izaho no TOMPO, Andriamanitry ny nofo rehetra. Moa misy zava-mahagaga izay tsy haiko va? '
  '28':
  - type: text
    content: 'Koa izao no lazain’NY TOMPO: Indro, hatolotro eo an-tanan’ny Kaldeana ity tanàna ity ary eo an-tanan’i Nebokadnezara, mpanjakan’i Babilona, ka ho azony. '
  '29':
  - type: text
    content: 'Ary ny Kaldeana izay mamely ity tanàna ity, dia hiditra ary handrehitra afo eto ka handoro azy mbamin’ny trano izay efa nandoroana ditin-kazo manitra teo an-tampony ho an’ny '
  - type: text
    content: Baala
  - type: text
    content: ', sady nanidinana fanatitra aidina ho an’ny andriamanitra hafa mba hampahatezitra Ahy. '
  '3':
  - type: text
    content: 'Fa nampiambina azy i Zedekia, mpanjakan’ny Joda, sady niteny hoe: Nahoana ianao no maminany hoe: Izao no lazain’NY TOMPO: Indro, hatolotro eo an-tanan’ny mpanjakan’i Babilona ity tanàna ity ka ho azony; '
  '30':
  - type: text
    content: 'Fa izay ratsy teo imasoko ihany no nataon’ny Zanak’Israely sy ny taranak’i Joda hatry ny fony ireo mbola kely; fa efa nampahatezitra Ahy tamin’ny asan’ny tanany ny Zanak’Israely, hoy NY TOMPO. '
  '31':
  - type: text
    content: 'Fa ity tanàna ity dia efa nampahatezitra sy nampahavinitra Ahy hatramin’ny andro nanorenana azy ka mandraka androany, mba hanesorako azy tsy ho eo anatrehako, '
  '32':
  - type: text
    content: 'noho ny ratsy rehetra nataon’ny Zanak’Israely sy ny taranak’i Joda, dia izy sy ny mpanjakany, ny mpanapaka azy, ny mpisorony, ny mpaminaniny, ny lehilahy amin’ny Joda ary ny mponina any Jerosalema, mba hampahatezitra Ahy. '
  '33':
  - type: text
    content: 'Fa efa niamboho Ahy izy, fa tsy nanatrika Ahy; ary na dia nampianariko aza izy, eny, nifoha vao maraina Aho ka nampianatra azy, dia tsy nihaino mba hahazoany anatra izy. '
  '34':
  - type: text
    content: 'Fa nametraka ny fahavetavetany tao amin’ny trano izay efa niantsoana ny anarako izy handotoany azy; '
  '35':
  - type: text
    content: ary nanorina ny toerana fanaovana sorona ho an’i Baala, izay ao amin’ny Lohasahan’ny taranak’i Hinoma, izy mba hampandeha ny zanany lahy sy ny zanany vavy hamakivaky ny afo ho an’i Moloka, izay tsy nandidiako azy, na tao an-tsaiko akory aza, dia nanao izany fahavetavetana izany izy mba hampanota ny Joda.
  '36':
  - type: text
    content: 'Koa noho izany dia izao no lazain’NY TOMPO, Andriamanitry ny Israely, ny amin’ity tanàna ity, izay ataonareo hoe: Hatolotra eo an-tanan’ny mpanjakan’i Babilona amin’ny sabatra sy ny mosary ary ny areti-mandringana izy:'
  '37':
  - type: text
    content: 'Indro, hangoniko avy any amin’ny tany rehetra izay nandroahako azy tamin’ny fahatezerako sy ny fisafoahako ary ny fahavinirako be izy; ary hoentiko amin’ity tany ity indray izy ka hataoko mandry fehizay; '
  '38':
  - type: text
    content: 'ary ho oloko izy ary Izaho ho Andriamaniny. '
  '39':
  - type: text
    content: 'Dia homeko fo iray sy lalana iray izy, mba hatahorany Ahy lalandava, hahasoa azy sy ny zanany mandimby azy; '
  '4':
  - type: text
    content: 'ary i Zedekia, mpanjakan’ny Joda, dia tsy ho afa-mandositra ny tanan’ny Kaldeana, fa hatolotra eo an-tanan’ny mpanjakan’i Babilona tokoa, ary hiteny aminy mifanatrika izy sady hifankahita maso aminy; '
  '40':
  - type: text
    content: 'dia hanao fanekena mandrakizay aminy Aho, dia ny tsy hitsaharako amin’ny fanasoavako azy; ary ny fahatahorana Ahy dia hataoko ao am-pony kosa mba tsy hialany Amiko. '
  '41':
  - type: text
    content: 'Eny, ho faly aminy Aho ka hanasoa azy, dia hamboly azy amin’ity tany ity tokoa amin’ny foko manontolo sy ny fanahiko manontolo. '
  '42':
  - type: text
    content: 'Fa izao no lazain’NY TOMPO: Araka ny namelako izao loza lehibe rehetra izao ho tonga tamin’ity firenena ity, dia araka izany koa no hamelako ho tonga aminy ny soa rehetra izay nokasaiko ho azy. '
  '43':
  - type: text
    content: 'Ary mbola hisy fividianana saha eto amin’ity tany ity izay ataonareo hoe: Tany lao tsy misy olona na biby fiompy sady efa voatolotra eo an-tanan’ny Kaldeana. '
  '44':
  - type: text
    content: Eny, saha no hovidin’ny olona vola ka hosoratany amin’ny taratasy sy hasiany tombo-kase ary hasiany vavolombelona maro ao amin’ny tanin’ny Benjamina, amin’ny manodidina an’i Jerosalema, amin’ny tanànan’ny Joda, amin’ny tanàna any amin’ny tany be havoana, amin’ny tanàna any Sefela ary amin’ny tanàna any Negeva; fa hampodiko avy amin’ny fahababoany izy, hoy NY TOMPO.
  '5':
  - type: text
    content: ary any Babilona no hitondrana an’i Zedekia, koa ho any izy ambara-pamangiko azy, hoy NY TOMPO. Na dia miady amin’ny Kaldeana aza ianareo dia tsy haharesy azy.
  '6':
  - type: text
    content: 'Ary hoy i Jeremia: Tonga tamiko ny tenin’NY TOMPO hoe: '
  '7':
  - type: text
    content: 'Indro i Hanamela, zanak’i Saloma, rahalahin-drainao, ho avy eto aminao hiteny hoe: Vidionao ny sahako izay ao Anatota, fa ianao no havana akaiky tokony hanavotra azy. '
  '8':
  - type: text
    content: 'Ary i Hanamela, zana-drahalahin’Ikaky, dia tonga tao amiko teo amin’ny kianjan’ny trano fiambenana araka ny tenin’NY TOMPO ka hoy izy tamiko: Miangavy anao aho, vidio ny sahako izay ao Anatota, dia ilay ao amin’ny tanin’ny Benjamina, fa ianao no havana akaiky tokony handova sy hanavotra azy, vidio re ho anao. Dia fantatro fa tenin’NY TOMPO izany. '
  '9':
  - type: text
    content: 'Ary novidiko tamin’i Hanamela, zana-drahalahin’Ikaky, ny saha izay tao Anatota; nolanjaiko ny vola, dia sekela volafotsy fito amby folo. '
