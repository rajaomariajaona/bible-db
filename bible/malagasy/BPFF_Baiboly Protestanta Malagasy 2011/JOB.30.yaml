document_id: JOB.30,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Ny teny farany navalin’i Joba (tohiny): Ankehitriny, inona sisa?'
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Fa ankehitriny kosa dia mihomehy ahy na dia izay mbola zandriko aza,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ny zanak’ireo izay nolaviko tsy ho isan’ny amboa miandry ny ondriko akory.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Ataony toy ny zava-betaveta aho ka halaviriny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy misalasala ny handrora ny tavako izy.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Koa satria noketrahin’Andriamanitra ny kofehin’ny tsipìkako ka nampietreny aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia tsy nisy fetrany intsony ny famelezan’ireo ahy.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Mitangorona eo ankavanako izy ireo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka manosika ny tongotro hibolisatra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary manandratra tovon-tany hampidirany loza amiko;
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: mandrava ny lalako izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mitady lalana hanapotehana ahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na dia tsy misy manampy azy aza;
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: toy ny fiditra eo amin’ny banga lehibe no fiaviny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka avy ao amin’ny voarava izy no miriotra.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Nitodika hamely ahy ny fampitahorana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nopaohin’ny rivotra ny voninahitro
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka levona tahaka ny rahona ny famonjena ahy.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Ary ankehitriny, miraraka ny aiko ato anatiko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: azon’ny andro fahoriana aho.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Amin’ny alina dia samatsamahiny hiala amiko ny taolako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy mitsahatra ireo manotahota ahy ireo.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Noho ny hery amelezany ahy dia simba ny akanjoko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: manendaka ahy amin’ny vozon-dobaka Izy.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Nanipy ahy teo amin’ny fotaka Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tahaka ny vovoka sy ny lavenona aho.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Koa hataoko inona moa ny herin-tsandrin’ireo?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Efa very ny fahatanjahany.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Mitaraina Aminao aho nefa tsy mihaino ahy Ianao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mijoro eo aho nefa jerenao foana.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Tonga lozabe amiko Ianao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny herin’ny tananao no andrafianao ahy.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Aingainao ho eny amin’ny rivotra aho ka ampitaingeninao azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary levoninao ao anatin’ny tafio-drivotra mifofofofo aho.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Fantatro fa hampodinao any amin’ny fahafatesana aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia any amin’ny trano ifamotoanan’ny olombelona rehetra.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Kanefa tsy manainga ny tanany va ny olona raha ianjeran’ny rava?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tsy mitaraina va izy raha tratry ny loza?
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Tsy nitomany ny ory va aho?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy nangorakoraka ny mahantra va ny fanahiko?
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Nanantena fahasambarana aho, kanjo ny ratsy no tonga;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: niandry ny mazava aho, kanjo ny maizina no tonga.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Tsy mitsahatra mandevilevy ny tsinaiko.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nitsena ahy ny andro fahoriana.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Mitsaitsaika mitafy lamba fisaonana aho sady tsy mahita masoandro;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mitsangana eo am-pivorian’ny olona aho ka mitaraina.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Tonga rahalahin’ny amboadia aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary naman’ny aotirisy.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Kaozatra noho ny tsy fisian-kanina sy ny mosary izy ireo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: homankomana foana any an-tany karankaina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ao amin’ny haizin’ny loza sy ny faharinganana.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Mivalomainty ny hoditro sady miendakendaka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary karankaina noho ny hafanana ny taolako.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Nanjary fisaonana ny lokangako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary feon’ny mitomany ny sodiko.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Mitsongo anana dia eny amin’ny kirihitrala ireny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny fototry ny anjavidy no sakafony.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Roahina tsy ho eo amin’ny olona izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady akoraina toy ny mpangalatra,
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: koa eny an-davaka amin’ny moron’ny lohasahan-driaka no itoerany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia any an-dava-tany sy any an-dava-bato.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Minananana eny amin’ny kirihitrala izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mitangorona eny ambanin’ny amiana.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Olom-poana izy ireny sady olona tsy manana anarana akory
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka roahina tsy ho eo amin’ny tany.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Ankehitriny anefa dia ataony an-kira aho.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, ataony ambentinteniny aho.
