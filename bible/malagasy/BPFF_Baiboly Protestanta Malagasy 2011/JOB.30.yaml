document_id: JOB.30,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: 'Ny teny farany navalin’i Joba (tohiny): Ankehitriny, inona sisa?'
  - type: text
    content: Fa ankehitriny kosa dia mihomehy ahy na dia izay mbola zandriko aza,
  - type: text
    content: dia ny zanak’ireo izay nolaviko tsy ho isan’ny amboa miandry ny ondriko akory.
  '10':
  - type: text
    content: Ataony toy ny zava-betaveta aho ka halaviriny
  - type: text
    content: ary tsy misalasala ny handrora ny tavako izy.
  '11':
  - type: text
    content: Koa satria noketrahin’Andriamanitra ny kofehin’ny tsipìkako ka nampietreny aho
  - type: text
    content: dia tsy nisy fetrany intsony ny famelezan’ireo ahy.
  '12':
  - type: text
    content: Mitangorona eo ankavanako izy ireo
  - type: text
    content: ka manosika ny tongotro hibolisatra
  - type: text
    content: ary manandratra tovon-tany hampidirany loza amiko;
  '13':
  - type: text
    content: mandrava ny lalako izy
  - type: text
    content: ary mitady lalana hanapotehana ahy
  - type: text
    content: na dia tsy misy manampy azy aza;
  '14':
  - type: text
    content: toy ny fiditra eo amin’ny banga lehibe no fiaviny
  - type: text
    content: ka avy ao amin’ny voarava izy no miriotra.
  '15':
  - type: text
    content: Nitodika hamely ahy ny fampitahorana;
  - type: text
    content: nopaohin’ny rivotra ny voninahitro
  - type: text
    content: ka levona tahaka ny rahona ny famonjena ahy.
  '16':
  - type: text
    content: Ary ankehitriny, miraraka ny aiko ato anatiko,
  - type: text
    content: azon’ny andro fahoriana aho.
  '17':
  - type: text
    content: Amin’ny alina dia samatsamahiny hiala amiko ny taolako
  - type: text
    content: ary tsy mitsahatra ireo manotahota ahy ireo.
  '18':
  - type: text
    content: Noho ny hery amelezany ahy dia simba ny akanjoko,
  - type: text
    content: manendaka ahy amin’ny vozon-dobaka Izy.
  '19':
  - type: text
    content: Nanipy ahy teo amin’ny fotaka Izy
  - type: text
    content: ka tahaka ny vovoka sy ny lavenona aho.
  '2':
  - type: text
    content: Koa hataoko inona moa ny herin-tsandrin’ireo?
  - type: text
    content: Efa very ny fahatanjahany.
  '20':
  - type: text
    content: Mitaraina Aminao aho nefa tsy mihaino ahy Ianao;
  - type: text
    content: mijoro eo aho nefa jerenao foana.
  '21':
  - type: text
    content: Tonga lozabe amiko Ianao;
  - type: text
    content: ny herin’ny tananao no andrafianao ahy.
  '22':
  - type: text
    content: Aingainao ho eny amin’ny rivotra aho ka ampitaingeninao azy
  - type: text
    content: ary levoninao ao anatin’ny tafio-drivotra mifofofofo aho.
  '23':
  - type: text
    content: Fantatro fa hampodinao any amin’ny fahafatesana aho,
  - type: text
    content: dia any amin’ny trano ifamotoanan’ny olombelona rehetra.
  '24':
  - type: text
    content: Kanefa tsy manainga ny tanany va ny olona raha ianjeran’ny rava?
  - type: text
    content: Ary tsy mitaraina va izy raha tratry ny loza?
  '25':
  - type: text
    content: Tsy nitomany ny ory va aho?
  - type: text
    content: Tsy nangorakoraka ny mahantra va ny fanahiko?
  '26':
  - type: text
    content: Nanantena fahasambarana aho, kanjo ny ratsy no tonga;
  - type: text
    content: niandry ny mazava aho, kanjo ny maizina no tonga.
  '27':
  - type: text
    content: Tsy mitsahatra mandevilevy ny tsinaiko.
  - type: text
    content: Nitsena ahy ny andro fahoriana.
  '28':
  - type: text
    content: Mitsaitsaika mitafy lamba fisaonana aho sady tsy mahita masoandro;
  - type: text
    content: mitsangana eo am-pivorian’ny olona aho ka mitaraina.
  '29':
  - type: text
    content: Tonga rahalahin’ny amboadia aho
  - type: text
    content: ary naman’ny aotirisy.
  '3':
  - type: text
    content: Kaozatra noho ny tsy fisian-kanina sy ny mosary izy ireo;
  - type: text
    content: homankomana foana any an-tany karankaina
  - type: text
    content: ao amin’ny haizin’ny loza sy ny faharinganana.
  '30':
  - type: text
    content: Mivalomainty ny hoditro sady miendakendaka
  - type: text
    content: ary karankaina noho ny hafanana ny taolako.
  '31':
  - type: text
    content: Nanjary fisaonana ny lokangako
  - type: text
    content: ary feon’ny mitomany ny sodiko.
  '4':
  - type: text
    content: Mitsongo anana dia eny amin’ny kirihitrala ireny
  - type: text
    content: ary ny fototry ny anjavidy no sakafony.
  '5':
  - type: text
    content: Roahina tsy ho eo amin’ny olona izy
  - type: text
    content: sady akoraina toy ny mpangalatra,
  '6':
  - type: text
    content: koa eny an-davaka amin’ny moron’ny lohasahan-driaka no itoerany,
  - type: text
    content: dia any an-dava-tany sy any an-dava-bato.
  '7':
  - type: text
    content: Minananana eny amin’ny kirihitrala izy
  - type: text
    content: ary mitangorona eny ambanin’ny amiana.
  '8':
  - type: text
    content: Olom-poana izy ireny sady olona tsy manana anarana akory
  - type: text
    content: ka roahina tsy ho eo amin’ny tany.
  '9':
  - type: text
    content: Ankehitriny anefa dia ataony an-kira aho.
  - type: text
    content: Eny, ataony ambentinteniny aho.
