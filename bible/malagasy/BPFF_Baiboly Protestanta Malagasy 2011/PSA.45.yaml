document_id: PSA.45,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Tononkalo amin’ny fanambadian’ny mpanjaka
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: Ho an’ny mpiventy hira. Al-shoshanim. Nataon’ny Koraìta. Maskila. Tononkiram-pitiavana.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Mampiboiboika teny tsara ny foko.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Hoy aho hoe: Ho an’ny mpanjaka ny asako!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka ny lelako ho toy ny fanoratan’ny haingam-panoratra!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Henoy, Razazavavy, jereo ka atongilano ny sofinao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hadinoy ny firenenao sy ny tranon’ny rainao.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Irin’ny mpanjaka ny hatsaran-tarehinao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria izy no tomponao, koa miankohofa eo anatrehany.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Hitondra fanomezana ho anao, ry zanakavavin’i Tiro,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny mpanankarena amin’ny vahoaka dia te hila sitraka aminao.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Be voninahitra ny zanakavavin’ny mpanjaka ao an-dapa;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tenona misy volamena no fitafiany.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Mitafy lamba misoratsoratra izy raha entina ho ao amin’ny mpanjaka.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny zazavavy sakaizany izay manaraka azy dia entina ao aminao.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Entina amin’ny fifaliana sy ny firavoravoana ireny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hiditra ao an-dapan’ny mpanjaka izy.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Handimby ny anaran-drainao ny zanakao lahy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hotendrenao ho mpanapaka any amin’ny tany rehetra izy.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Hampahatsiaro ny anaranao hatramin’ny taranaka fara aman-dimby aho.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izany rehetra izany no hideran’ny firenena anao mandrakizay doria.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Tsara tarehy noho ny zanak’olombelona rehetra ianao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fahasoavana no naidina tamin’ny molotrao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izany no nitahian’Andriamanitra anao mandrakizay.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Fehezo eo amin’ny andilanao ny sabatrao, ry ilay mahery,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ny fiandriananao sy ny voninahitrao;
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: eny, amin’ny voninahitra no hitaingenanao soavaly mba handrosoanao amin-kery,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho fiarovana ny marina sy ny fahalemem-panahy ary ny rariny sy hitsiny!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka hanoro anao hanao asa mahatahotra ny tananao ankavanana.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Voaranitra ny zana-tsipìkanao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: firenena maro no ho ringana ka hohitsakitsahinao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hitsatoka ao am-pon’ny fahavalon’ny mpanjaka izany.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Andriamanitra ô, mandrakizay doria ny sezafiandriananao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tehim-pahamarinana ny tehim-panjakanao.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Tianao ny fahamarinana fa halanao ny heloka.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Noho izany no nanosoran’Andriamanitra anao, fa tsy ny namanao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: diloilo fifaliana.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Manitra miora sy hazomanitra ary kasia ny fitafianao rehetra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: zavamaneno tendrena avy ao amin’ny lapa ivoara
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no mampifaly anao.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Zanakavavin’ny mpanjaka no isan’ny malalanao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eo ankavananao no itoeran’ny vadin’ny mpanjaka;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: miravaka volamena avy any Ofira izy.
