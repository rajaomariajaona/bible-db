document_id: PSA.45,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Tononkalo amin’ny fanambadian’ny mpanjaka
  - type: text
    content: Ho an’ny mpiventy hira. Al-shoshanim. Nataon’ny Koraìta. Maskila. Tononkiram-pitiavana.
  - type: text
    content: Mampiboiboika teny tsara ny foko.
  - type: text
    content: 'Hoy aho hoe: Ho an’ny mpanjaka ny asako!'
  - type: text
    content: Aoka ny lelako ho toy ny fanoratan’ny haingam-panoratra!
  '10':
  - type: text
    content: Henoy, Razazavavy, jereo ka atongilano ny sofinao;
  - type: text
    content: hadinoy ny firenenao sy ny tranon’ny rainao.
  '11':
  - type: text
    content: Irin’ny mpanjaka ny hatsaran-tarehinao
  - type: text
    content: satria izy no tomponao, koa miankohofa eo anatrehany.
  '12':
  - type: text
    content: Hitondra fanomezana ho anao, ry zanakavavin’i Tiro,
  - type: text
    content: ny mpanankarena amin’ny vahoaka dia te hila sitraka aminao.
  '13':
  - type: text
    content: Be voninahitra ny zanakavavin’ny mpanjaka ao an-dapa;
  - type: text
    content: tenona misy volamena no fitafiany.
  '14':
  - type: text
    content: Mitafy lamba misoratsoratra izy raha entina ho ao amin’ny mpanjaka.
  - type: text
    content: Ny zazavavy sakaizany izay manaraka azy dia entina ao aminao.
  '15':
  - type: text
    content: Entina amin’ny fifaliana sy ny firavoravoana ireny;
  - type: text
    content: hiditra ao an-dapan’ny mpanjaka izy.
  '16':
  - type: text
    content: Handimby ny anaran-drainao ny zanakao lahy,
  - type: text
    content: hotendrenao ho mpanapaka any amin’ny tany rehetra izy.
  '17':
  - type: text
    content: Hampahatsiaro ny anaranao hatramin’ny taranaka fara aman-dimby aho.
  - type: text
    content: Izany rehetra izany no hideran’ny firenena anao mandrakizay doria.
  '2':
  - type: text
    content: Tsara tarehy noho ny zanak’olombelona rehetra ianao;
  - type: text
    content: fahasoavana no naidina tamin’ny molotrao;
  - type: text
    content: izany no nitahian’Andriamanitra anao mandrakizay.
  '3':
  - type: text
    content: Fehezo eo amin’ny andilanao ny sabatrao, ry ilay mahery,
  - type: text
    content: dia ny fiandriananao sy ny voninahitrao;
  '4':
  - type: text
    content: eny, amin’ny voninahitra no hitaingenanao soavaly mba handrosoanao amin-kery,
  - type: text
    content: ho fiarovana ny marina sy ny fahalemem-panahy ary ny rariny sy hitsiny!
  - type: text
    content: Aoka hanoro anao hanao asa mahatahotra ny tananao ankavanana.
  '5':
  - type: text
    content: Voaranitra ny zana-tsipìkanao,
  - type: text
    content: firenena maro no ho ringana ka hohitsakitsahinao;
  - type: text
    content: hitsatoka ao am-pon’ny fahavalon’ny mpanjaka izany.
  '6':
  - type: text
    content: Andriamanitra ô, mandrakizay doria ny sezafiandriananao;
  - type: text
    content: tehim-pahamarinana ny tehim-panjakanao.
  '7':
  - type: text
    content: Tianao ny fahamarinana fa halanao ny heloka.
  - type: text
    content: Noho izany no nanosoran’Andriamanitra anao, fa tsy ny namanao,
  - type: text
    content: diloilo fifaliana.
  '8':
  - type: text
    content: Manitra miora sy hazomanitra ary kasia ny fitafianao rehetra,
  - type: text
    content: zavamaneno tendrena avy ao amin’ny lapa ivoara
  - type: text
    content: no mampifaly anao.
  '9':
  - type: text
    content: Zanakavavin’ny mpanjaka no isan’ny malalanao;
  - type: text
    content: eo ankavananao no itoeran’ny vadin’ny mpanjaka;
  - type: text
    content: miravaka volamena avy any Ofira izy.
