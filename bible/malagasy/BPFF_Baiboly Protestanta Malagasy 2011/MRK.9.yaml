document_id: MRK.9,3103
type_code: plt
verses:
  '1':
  - type: text
    content: 'Ary hoy koa Izy taminy: Lazaiko aminareo marina tokoa: Misy ny sasany eto izay tsy mba hahita fahafatesana mandra-pahitany ny fanjakan’Andriamanitra tonga amin’ny hery.'
  - type: heading
    content: Ny niovan’i Jesosy tarehy tao an-tendrombohitra
  - type: heading
    content: Mat 17.1-9; Lio 9.28-36
  '10':
  - type: text
    content: Ary nitana izany teny izany izy ireo ka niady hevitra ny amin’izay hevitr’izany fitsanganana amin’ny maty izany.
  - type: heading
    content: Manontany an’i Jesosy ny amin’i Elia ny mpianatra
  - type: heading
    content: Mat 17.10-13
  '11':
  - type: text
    content: 'Ary izy ireo dia nanontany an’i Jesosy hoe: Nahoana no lazain’ny '
  - type: text
    content: mpanoradalàna
  - type: text
    content: ' fa tsy maintsy ho avy aloha i Elia? '
  '12':
  - type: text
    content: 'Dia hoy Izy tamin’izy ireo: I Elia dia tonga mialoha ihany ka mamerina amin’ny laoniny ny zavatra rehetra. Fa ahoana kosa ary no nanoratana ny amin’ny '
  - type: text
    content: Zanak’Olona
  - type: text
    content: ', fa tsy maintsy hijaly mafy Izy sady hatao tsinontsinona? '
  '13':
  - type: text
    content: 'Nefa lazaiko aminareo: Efa tonga i Elia sady efa nanamparan’ny olona ny sitrapony izy, araka izay voasoratra ny aminy.'
  - type: heading
    content: Ny nanasitranan’i Jesosy ilay zazalahy nampahorin’ny demonia
  - type: heading
    content: Mat 17.14-21; Lio 9.37-43
  '14':
  - type: text
    content: 'Nony tonga teo amin’ny mpianatra izy ireo dia nahita vahoaka betsaka nanodidina ny mpianatra izay niady hevitra tamin’ny '
  - type: text
    content: mpanoradalàna
  - type: text
    content: '. '
  '15':
  - type: text
    content: 'Ary niaraka tamin’izay, nony nahita an’i Jesosy ny vahoaka rehetra, dia talanjona ka nihazakazaka nanatona sy niarahaba Azy. '
  '16':
  - type: text
    content: 'Ary nanontany azy ireo Izy hoe: Inona no iadianareo hevitra amin’ireo? '
  '17':
  - type: text
    content: 'Ary nisy iray tamin’ny vahoaka namaly hoe: Mpampianatra ô, nentiko ho etỳ Aminao ny zanako lahy izay manana fanahy moana; '
  '18':
  - type: text
    content: 'ary na aiza na aiza no ihetsehan’izany dia ampihinjitrinjiriny amin’ny tany izy, ary mandoa vory, dia mikitro-nify sady valaka be. Niteny tamin’ny mpianatrao aho mba handroaka izany nefa tsy vitany. '
  '19':
  - type: text
    content: 'Dia hoy ny navalin’i Jesosy azy hoe: Ry taranaka tsy mino, mandra-pahoviana no hitoerako aminareo? Mandra-pahoviana no handeferako aminareo? Ento etỳ Amiko izy. '
  '2':
  - type: text
    content: 'Nony afaka henemana, Jesosy, dia naka an’i Petera sy i Jakoba ary i Jaona ka nitondra azy ireo nitokana, niakatra ho any an-tendrombohitra avo iray. Dia niova tarehy teo anatrehan’izy ireo Izy, '
  '20':
  - type: text
    content: 'Dia noentiny teo Aminy izy. Fa nony nahita an’i Jesosy izy dia nampifanintontsintona ny tenany niaraka tamin’izay ilay fanahy. Dia lavo tamin’ny tany izy sady nitsinkasinkasina sy nandoa vory. '
  '21':
  - type: text
    content: 'Ary Jesosy nanontany ny rainy hoe: Hatramin’ny oviana izay no nahatongavan’izao taminy? Dia hoy izy: Hatry ny fony izy mbola zaza. '
  '22':
  - type: text
    content: 'Fa nazerany matetika tao anaty afo sy tao anaty rano izy hamonoany azy. Fa raha mba misy hainao re dia mamindrà fo aminay ka vonjeo izahay! '
  '23':
  - type: text
    content: 'Hoy Jesosy taminy: Hainao hoe? Ny zavatra rehetra dia hain’ny mino. '
  '24':
  - type: text
    content: 'Ary niaraka tamin’izay dia niantso mafy sady nandrotsa-dranomaso ny rain-drazazalahy ka niteny hoe: Mino aho! Vonjeo aho ho afaka amin’ny tsy finoako! '
  '25':
  - type: text
    content: 'Ary nony hitan’i Jesosy fa nihazakazaka nanatona azy ny vahoaka dia niteny mafy ny fanahy maloto Izy hoe: Ry fanahy moana sy marenina! Mandidy anao Aho: Mialà aminy ka aza miditra ao anatiny intsony! '
  '26':
  - type: text
    content: 'Ary rehefa ninananana izy sady nampifanintontsintona mafy ilay zazalahy dia niala taminy. Ary efa toy ny maty ilay zazalahy ka nolazain’ny maro hoe maty. '
  '27':
  - type: text
    content: 'Fa nandray ny tanany kosa Jesosy ka nampiarina azy dia nitsangana izy. '
  '28':
  - type: text
    content: 'Ary rehefa tonga tao an-trano Jesosy dia nanontany Azy mangingina ny mpianany hoe: Nahoana izahay no tsy afaka nandroaka an’iny? '
  '29':
  - type: text
    content: 'Ary hoy Izy taminy: Iny karazana iny dia tsy mba azo roahina na amin’inona na amin’inona, afa-tsy amin’ny fivavahana'
  - type: note
    content: 'Ny rakitsoratra sasany manampy hoe: sy ny fifadian-kanina.'
  - type: text
    content: ' ihany.'
  - type: heading
    content: Ny nilazan’i Jesosy fanindroany ny hahafatesany sy ny hitsanganany indray
  - type: heading
    content: Mat 17.22-23; Lio 9.43-45
  '3':
  - type: text
    content: 'ary niova ka tonga namirapiratra sady fotsy dia fotsy ny fitafiany ka tsy misy mpanasa lamba ambonin’ny tany mahafotsy lamba toy izany. '
  '30':
  - type: text
    content: 'Dia niala teo izy ireo ka nizotra namakivaky an’i Galilia, ary tsy tian’i Jesosy ho fantatry ny olona izany. '
  '31':
  - type: text
    content: 'Fa nampianatra ny mpianany Izy ka niteny taminy hoe: Ny '
  - type: text
    content: Zanak’Olona
  - type: text
    content: ' dia hatolotra eo an-tanan’ny olona ka hovonoiny; ary rehefa maty Izy dia hitsangana rehefa afaka hateloana. '
  '32':
  - type: text
    content: Tsy azon’ireo anefa izany teny izany sady natahotra ny hanontany Azy izy.
  - type: heading
    content: Iza no lehibe indrindra?
  - type: heading
    content: Mat 18.1-5; Lio 9.46-48
  '33':
  - type: text
    content: 'Ary nankany Kapernaomy izy ireo, koa rehefa tonga tao an-trano Jesosy dia nanontany ny mpianany hoe: Inona no niadianareo hevitra teny an-dalana? '
  '34':
  - type: text
    content: 'Tsy nisy nahateny anefa izy ireo satria niady hevitra teny an-dalana ny amin’izay lehibe indrindra. '
  '35':
  - type: text
    content: 'Rehefa tafapetraka Jesosy dia niantso ny roa amby folo lahy Izy ka niteny taminy hoe: Raha misy te ho voalohany dia aoka izy no ho farany amin’izy rehetra sy ho mpanompon’izy rehetra. '
  '36':
  - type: text
    content: 'Ary nandray zaza iray Izy ka nametraka azy teo afovoan’izy rehetra; rehefa notrotroiny ilay zaza dia hoy Izy tamin’ny mpianany: '
  '37':
  - type: text
    content: Na zovy na zovy no mandray iray amin’itony zaza itony amin’ny anarako dia mandray Ahy; ary na zovy na zovy no mandray Ahy dia tsy Izaho no raisiny fa Ilay naniraka Ahy.
  - type: heading
    content: Ireo mampiasa ny anaran’i Jesosy
  - type: heading
    content: Lio 9.49-50
  '38':
  - type: text
    content: 'Ary hoy i Jaona taminy: Mpampianatra ô, nahita olona iray nandroaka '
  - type: text
    content: demonia
  - type: text
    content: ' tamin’ny anaranao izahay ka noraranay izy satria tsy nanaraka antsika. '
  '39':
  - type: text
    content: 'Fa hoy Jesosy: Aza mandrara azy; fa tsy misy olona izay hanao asa lehibe amin’ny anarako ka hahateny ratsy Ahy eo no eo. '
  '4':
  - type: text
    content: 'Ary niseho tamin’izy ireo i Elia sy i Mosesy izay niresaka tamin’i Jesosy. '
  '40':
  - type: text
    content: Fa izay tsy manohitra antsika dia momba antsika.
  '41':
  - type: text
    content: 'Fa na iza na iza no manome anareo rano eran’ny kaopy hosotroinareo satria an’i '
  - type: text
    content: Kristy
  - type: text
    content: ' ianareo dia lazaiko aminareo marina tokoa fa tsy ho very ny valim-pitiany.'
  - type: heading
    content: Izay mahatonga fahatafintohinana
  - type: heading
    content: Mat 18.6-11; Lio 17.1-2
  '42':
  - type: text
    content: 'Na iza na iza no manafintohina na iray aza amin’ireo madinika mino Ahy ireo dia tsara ho azy raha anantonana vato lehibe fikosoham-bary ny tendany ka hatsipy any anaty ranomasina izy. '
  '43':
  - type: text
    content: 'Ary raha ny tananao no mahatafintohina anao dia tapaho izy; fa tsara ho anao ny miditra kilemaina any amin’ny fiainana noho ny manana tanana roa, nefa hariana any amin’ny '
  - type: text
    content: afobe
  - type: text
    content: ', dia any amin’ny afo tsy azo vonoina; '
  '44':
  - type: text
    content: 'any ny kankany tsy maty ary ny afo tsy mety maty. '
  '45':
  - type: text
    content: 'Ary raha ny tongotrao no mahatafintohina anao dia tapaho izy; fa tsara ho anao ny hiditra mandringa any amin’ny fiainana noho ny manana tongotra roa, nefa hariana any amin’ny afobe, any amin’ny afo tsy azo vonoina; '
  '46':
  - type: text
    content: 'any ny kankany tsy maty ary ny afo tsy mety maty. '
  '47':
  - type: text
    content: 'Ary raha ny masonao no manafintohina anao dia esory hiala izy; fa tsara ho anao ny hiditra toka-maso any amin’ny fanjakan’Andriamanitra noho ny manana maso roa, nefa hariana any amin’ny afobe; '
  '48':
  - type: text
    content: any ny kankany tsy maty ary ny afo tsy mety maty.
  - type: heading
    content: Mat 5.13; Lio 14.34-35
  '49':
  - type: text
    content: 'Fa samy hosedraina amin’ny afo izy rehetra, ary ny fanatitra rehetra dia samy hosedraina amin’ny fanasina. '
  '5':
  - type: text
    content: 'Ary niteny tamin’i Jesosy i Petera hoe: Raby ô, tsara raha mitoetra eto isika; ary andeha hanao tranolay telo izahay: Ho Anao ny iray, ho an’i Mosesy ny iray ary ho an’i Elia ny iray. '
  '50':
  - type: text
    content: Tsara ny sira, kanefa raha tonga matsatso izy, inona indray no hoentinareo mampody ny tsirony? Aoka hisy sira ao anatinareo ary mihavàna tsara ianareo.
  '6':
  - type: text
    content: 'Tsy fantany mantsy izay hotenenina satria raiki-tahotra izy rehetra. '
  '7':
  - type: text
    content: 'Ary nisy rahona niseho nanarona azy ireo. Ary nisy feo avy tao amin’ny rahona hoe: Ity no Zanako malalako, Izy no henoy! '
  '8':
  - type: text
    content: Niaraka tamin’izay, nony nijery manodidina izy ireo dia tsy nisy hitany intsony na iza na iza afa-tsy Jesosy irery ihany izay teo aminy.
  '9':
  - type: text
    content: 'Ary nony nidina avy teny an-tendrombohitra izy ireo dia nandrara azy Jesosy mba tsy hilazalaza amin’olona izay zavatra efa hitany mandra-pitsangan’ny '
  - type: text
    content: Zanak’Olona
  - type: text
    content: ' amin’ny maty. '
