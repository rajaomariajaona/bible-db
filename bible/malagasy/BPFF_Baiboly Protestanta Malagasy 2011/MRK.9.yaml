document_id: MRK.9
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary hoy koa Izy taminy: Lazaiko aminareo marina tokoa: Misy ny sasany eto izay tsy mba hahita fahafatesana mandra-pahitany ny fanjakan’Andriamanitra tonga amin’ny hery.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny niovan’i Jesosy tarehy tao an-tendrombohitra
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat 17.1-9; Lio 9.28-36
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Nony afaka henemana, Jesosy, dia naka an’i Petera sy i Jakoba ary i Jaona ka nitondra azy ireo nitokana, niakatra ho any an-tendrombohitra avo iray. Dia niova tarehy teo anatrehan’izy ireo Izy, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'ary niova ka tonga namirapiratra sady fotsy dia fotsy ny fitafiany ka tsy misy mpanasa lamba ambonin’ny tany mahafotsy lamba toy izany. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary niseho tamin’izy ireo i Elia sy i Mosesy izay niresaka tamin’i Jesosy. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary niteny tamin’i Jesosy i Petera hoe: Raby ô, tsara raha mitoetra eto isika; ary andeha hanao tranolay telo izahay: Ho Anao ny iray, ho an’i Mosesy ny iray ary ho an’i Elia ny iray. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Tsy fantany mantsy izay hotenenina satria raiki-tahotra izy rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary nisy rahona niseho nanarona azy ireo. Ary nisy feo avy tao amin’ny rahona hoe: Ity no Zanako malalako, Izy no henoy! '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Niaraka tamin’izay, nony nijery manodidina izy ireo dia tsy nisy hitany intsony na iza na iza afa-tsy Jesosy irery ihany izay teo aminy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary nony nidina avy teny an-tendrombohitra izy ireo dia nandrara azy Jesosy mba tsy hilazalaza amin’olona izay zavatra efa hitany mandra-pitsangan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Zanak’Olona
  - type: text
    text: ' amin’ny maty. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ary nitana izany teny izany izy ireo ka niady hevitra ny amin’izay hevitr’izany fitsanganana amin’ny maty izany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Manontany an’i Jesosy ny amin’i Elia ny mpianatra
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat 17.10-13
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary izy ireo dia nanontany an’i Jesosy hoe: Nahoana no lazain’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpanoradalàna
  - type: text
    text: ' fa tsy maintsy ho avy aloha i Elia? '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Dia hoy Izy tamin’izy ireo: I Elia dia tonga mialoha ihany ka mamerina amin’ny laoniny ny zavatra rehetra. Fa ahoana kosa ary no nanoratana ny amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Zanak’Olona
  - type: text
    text: ', fa tsy maintsy hijaly mafy Izy sady hatao tsinontsinona? '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Nefa lazaiko aminareo: Efa tonga i Elia sady efa nanamparan’ny olona ny sitrapony izy, araka izay voasoratra ny aminy.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nanasitranan’i Jesosy ilay zazalahy nampahorin’ny demonia
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat 17.14-21; Lio 9.37-43
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Nony tonga teo amin’ny mpianatra izy ireo dia nahita vahoaka betsaka nanodidina ny mpianatra izay niady hevitra tamin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpanoradalàna
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary niaraka tamin’izay, nony nahita an’i Jesosy ny vahoaka rehetra, dia talanjona ka nihazakazaka nanatona sy niarahaba Azy. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary nanontany azy ireo Izy hoe: Inona no iadianareo hevitra amin’ireo? '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary nisy iray tamin’ny vahoaka namaly hoe: Mpampianatra ô, nentiko ho etỳ Aminao ny zanako lahy izay manana fanahy moana; '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'ary na aiza na aiza no ihetsehan’izany dia ampihinjitrinjiriny amin’ny tany izy, ary mandoa vory, dia mikitro-nify sady valaka be. Niteny tamin’ny mpianatrao aho mba handroaka izany nefa tsy vitany. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Dia hoy ny navalin’i Jesosy azy hoe: Ry taranaka tsy mino, mandra-pahoviana no hitoerako aminareo? Mandra-pahoviana no handeferako aminareo? Ento etỳ Amiko izy. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Dia noentiny teo Aminy izy. Fa nony nahita an’i Jesosy izy dia nampifanintontsintona ny tenany niaraka tamin’izay ilay fanahy. Dia lavo tamin’ny tany izy sady nitsinkasinkasina sy nandoa vory. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary Jesosy nanontany ny rainy hoe: Hatramin’ny oviana izay no nahatongavan’izao taminy? Dia hoy izy: Hatry ny fony izy mbola zaza. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Fa nazerany matetika tao anaty afo sy tao anaty rano izy hamonoany azy. Fa raha mba misy hainao re dia mamindrà fo aminay ka vonjeo izahay! '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Hoy Jesosy taminy: Hainao hoe? Ny zavatra rehetra dia hain’ny mino. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary niaraka tamin’izay dia niantso mafy sady nandrotsa-dranomaso ny rain-drazazalahy ka niteny hoe: Mino aho! Vonjeo aho ho afaka amin’ny tsy finoako! '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary nony hitan’i Jesosy fa nihazakazaka nanatona azy ny vahoaka dia niteny mafy ny fanahy maloto Izy hoe: Ry fanahy moana sy marenina! Mandidy anao Aho: Mialà aminy ka aza miditra ao anatiny intsony! '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ary rehefa ninananana izy sady nampifanintontsintona mafy ilay zazalahy dia niala taminy. Ary efa toy ny maty ilay zazalahy ka nolazain’ny maro hoe maty. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Fa nandray ny tanany kosa Jesosy ka nampiarina azy dia nitsangana izy. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ary rehefa tonga tao an-trano Jesosy dia nanontany Azy mangingina ny mpianany hoe: Nahoana izahay no tsy afaka nandroaka an’iny? '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ary hoy Izy taminy: Iny karazana iny dia tsy mba azo roahina na amin’inona na amin’inona, afa-tsy amin’ny fivavahana'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.29 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Ny rakitsoratra sasany manampy hoe: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: sy ny fifadian-kanina.
    marker-yv: yv-n
  - type: text
    text: ' ihany.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nilazan’i Jesosy fanindroany ny hahafatesany sy ny hitsanganany indray
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat 17.22-23; Lio 9.43-45
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Dia niala teo izy ireo ka nizotra namakivaky an’i Galilia, ary tsy tian’i Jesosy ho fantatry ny olona izany. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Fa nampianatra ny mpianany Izy ka niteny taminy hoe: Ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Zanak’Olona
  - type: text
    text: ' dia hatolotra eo an-tanan’ny olona ka hovonoiny; ary rehefa maty Izy dia hitsangana rehefa afaka hateloana. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Tsy azon’ireo anefa izany teny izany sady natahotra ny hanontany Azy izy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Iza no lehibe indrindra?
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat 18.1-5; Lio 9.46-48
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ary nankany Kapernaomy izy ireo, koa rehefa tonga tao an-trano Jesosy dia nanontany ny mpianany hoe: Inona no niadianareo hevitra teny an-dalana? '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Tsy nisy nahateny anefa izy ireo satria niady hevitra teny an-dalana ny amin’izay lehibe indrindra. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Rehefa tafapetraka Jesosy dia niantso ny roa amby folo lahy Izy ka niteny taminy hoe: Raha misy te ho voalohany dia aoka izy no ho farany amin’izy rehetra sy ho mpanompon’izy rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Ary nandray zaza iray Izy ka nametraka azy teo afovoan’izy rehetra; rehefa notrotroiny ilay zaza dia hoy Izy tamin’ny mpianany: '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Na zovy na zovy no mandray iray amin’itony zaza itony amin’ny anarako dia mandray Ahy; ary na zovy na zovy no mandray Ahy dia tsy Izaho no raisiny fa Ilay naniraka Ahy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ireo mampiasa ny anaran’i Jesosy
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Lio 9.49-50
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Ary hoy i Jaona taminy: Mpampianatra ô, nahita olona iray nandroaka '
  - type: usfm
    marker: w
    children:
    - type: text
      text: demonia
  - type: text
    text: ' tamin’ny anaranao izahay ka noraranay izy satria tsy nanaraka antsika. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Fa hoy Jesosy: Aza mandrara azy; fa tsy misy olona izay hanao asa lehibe amin’ny anarako ka hahateny ratsy Ahy eo no eo. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Fa izay tsy manohitra antsika dia momba antsika.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Fa na iza na iza no manome anareo rano eran’ny kaopy hosotroinareo satria an’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' ianareo dia lazaiko aminareo marina tokoa fa tsy ho very ny valim-pitiany.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Izay mahatonga fahatafintohinana
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat 18.6-11; Lio 17.1-2
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Na iza na iza no manafintohina na iray aza amin’ireo madinika mino Ahy ireo dia tsara ho azy raha anantonana vato lehibe fikosoham-bary ny tendany ka hatsipy any anaty ranomasina izy. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Ary raha ny tananao no mahatafintohina anao dia tapaho izy; fa tsara ho anao ny miditra kilemaina any amin’ny fiainana noho ny manana tanana roa, nefa hariana any amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: afobe
  - type: text
    text: ', dia any amin’ny afo tsy azo vonoina; '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'any ny kankany tsy maty ary ny afo tsy mety maty. '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Ary raha ny tongotrao no mahatafintohina anao dia tapaho izy; fa tsara ho anao ny hiditra mandringa any amin’ny fiainana noho ny manana tongotra roa, nefa hariana any amin’ny afobe, any amin’ny afo tsy azo vonoina; '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'any ny kankany tsy maty ary ny afo tsy mety maty. '
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Ary raha ny masonao no manafintohina anao dia esory hiala izy; fa tsara ho anao ny hiditra toka-maso any amin’ny fanjakan’Andriamanitra noho ny manana maso roa, nefa hariana any amin’ny afobe; '
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: any ny kankany tsy maty ary ny afo tsy mety maty.
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat 5.13; Lio 14.34-35
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'Fa samy hosedraina amin’ny afo izy rehetra, ary ny fanatitra rehetra dia samy hosedraina amin’ny fanasina. '
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: Tsara ny sira, kanefa raha tonga matsatso izy, inona indray no hoentinareo mampody ny tsirony? Aoka hisy sira ao anatinareo ary mihavàna tsara ianareo.
