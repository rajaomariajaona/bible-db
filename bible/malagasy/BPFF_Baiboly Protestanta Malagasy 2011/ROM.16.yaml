document_id: ROM.16,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fanaovam-beloma manokana
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Iny i Foiby anabavintsika, diakonan’ny fiangonana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.1 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: eklesia.
      marker-yv: yv-n
    - type: text
      text: ' atỳ Kenkrea, lazaiko tsara aminareo, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Veloma amin’i Apela, ilay efa voazaha toetra ao amin’i Kristy. Veloma amin’ny ankohonan’i Aristobolo. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Veloma amin’i Herodiona havako. Veloma amin’ny ankohonan’i Narsisy, izay ao amin’ny Tompo. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Veloma amin’i Trifena sy i Trifosa, izay mikely aina ao amin’ny Tompo. Veloma amin’i Persy malala, izay nikely aina fatratra tao amin’ny Tompo. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Veloma amin’i Rofosy ilay voafidy ao amin’ny Tompo, ary veloma amin’ny reniny sy reniko. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Veloma amin’i Asinkrito, i Flegona, i Hermesy, i Patroba, i Hermasy, mbamin’ny rahalahy ao aminy. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Veloma amin’i Filologo sy i Jolia, i Nerea sy ny anabaviny ary i Olimpa sy ny olona masina rehetra izay ao aminy. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Mifanaova veloma amin’ny fanorohana masina. Ny fiangonana rehetra an’i Kristy manao veloma anareo.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fampitandremana farany
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Fa mananatra anareo aho, ry rahalahy, mba hitandremanareo ny amin’izay mahatonga ny fisarahana sy ny fahatafintohinana, tsy araka ny fampianarana efa nianaranareo; mialà amin’ireny olona ireny. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Fa izy ireny dia tsy mba manompo an’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ' Tompontsika, fa ny kibony ihany; ary amin’ny teny malefaka sady tsara lahatra no amitahany ny fon’ny tsy ary saina. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Fa efa niely any amin’ny olona rehetra ny lazan’ny fankatoavanareo. Ary faly aho noho ny aminareo satria tiako ho hendry amin’izay tsara ianareo ary tsy hiharo amin’izay ratsy. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: mba horaisinareo ao amin’ny Tompo izy, araka izay mendrika ny olona masina, ary mba hampianareo izy amin’izay raharaha ilàny anareo, fa izy dia mpiahy ny maro mbamin’ny tenako koa.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Andriamanitry ny fiadanana hanorotoro haingana an’i Satana eo ambanin’ny tongotrareo.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ho aminareo anie ny fahasoavan’i Jesosy Kristy Tompontsika!
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Manao veloma anareo i Timoty, mpiara-miasa amiko sy i Losio ary i Jasona sy i Sosipatro havako. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Manao veloma anareo ao amin’ny Tompo izaho Tertio, izay manoratra ity epistily ity. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Manao veloma anareo i Gaio, ilay mpampiantrano ahy sy ny fiangonana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.23 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: eklesia.
      marker-yv: yv-n
    - type: text
      text: ' rehetra. Manao veloma anareo i Erasto mpitahiry ny volam-panjakana eto an-tanàna sy i Koarto rahalahy. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Ho aminareo rehetra anie ny fahasoavan’i Jesosy Kristy Tompontsika! '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Amena
    - type: text
      text: '!'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ho an’Andriamanitra irery ihany ny voninahitra!
    marker-yv: yv-h
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Ary ho an’Izay mahay mampahery anareo araka ny Filazantsara toriko, dia ny fanambarana an’i Jesosy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ', araka ny fampisehoana ny zavamiafina, izay voafina hatry ny fony fahagola, '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'fa efa aseho ankehitriny tamin’izay soratry ny mpaminany, araka ny didin’Andriamanitra mandrakizay ka nampahafantarina any amin’ny firenena rehetra hahatonga fanekena ny finoana, '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'ho an’Andriamanitra, Ilay hany hendry, anie ny voninahitra amin’ny alalan’i Jesosy Kristy mandrakizay mandrakizay! '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Amena
    - type: text
      text: '!'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Veloma amin’i Prisila sy i Akoila, mpiara-miasa amiko ao amin’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ' Jesosy; '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'izy ireo dia nanao vy very ny ainy hamonjy ny aiko; nefa tsy izaho ihany no misaotra azy fa ny fiangonana rehetra any amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jentilisa
    - type: text
      text: ' koa. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Veloma amin’ny fiangonana izay ao an-tranony. Veloma amin’i Epaineto malalako, izay voaloham-bokatr’i Azia ho an’i Kristy. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Veloma amin’i Maria, izay nikely aina fatratra ho anareo. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Veloma amin’i Androniko sy i Jonia havako sy namako niara-nifatotra tamiko, izay malaza eo amin’ny Apostoly sady tao amin’i Kristy talohako. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Veloma amin’i Ampliato malalako ao amin’ny Tompo. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Veloma amin’i Orbano mpiara-miasa aminay ao amin’i Kristy sy i Staky malalako. '
