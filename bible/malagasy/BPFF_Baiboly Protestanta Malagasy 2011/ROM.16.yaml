document_id: ROM.16,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Fanaovam-beloma manokana
  - type: text
    content: Iny i Foiby anabavintsika, diakonan’ny fiangonana
  - type: note
    content: 'Na: eklesia.'
  - type: text
    content: ' atỳ Kenkrea, lazaiko tsara aminareo, '
  '10':
  - type: text
    content: 'Veloma amin’i Apela, ilay efa voazaha toetra ao amin’i Kristy. Veloma amin’ny ankohonan’i Aristobolo. '
  '11':
  - type: text
    content: 'Veloma amin’i Herodiona havako. Veloma amin’ny ankohonan’i Narsisy, izay ao amin’ny Tompo. '
  '12':
  - type: text
    content: 'Veloma amin’i Trifena sy i Trifosa, izay mikely aina ao amin’ny Tompo. Veloma amin’i Persy malala, izay nikely aina fatratra tao amin’ny Tompo. '
  '13':
  - type: text
    content: 'Veloma amin’i Rofosy ilay voafidy ao amin’ny Tompo, ary veloma amin’ny reniny sy reniko. '
  '14':
  - type: text
    content: 'Veloma amin’i Asinkrito, i Flegona, i Hermesy, i Patroba, i Hermasy, mbamin’ny rahalahy ao aminy. '
  '15':
  - type: text
    content: 'Veloma amin’i Filologo sy i Jolia, i Nerea sy ny anabaviny ary i Olimpa sy ny olona masina rehetra izay ao aminy. '
  '16':
  - type: text
    content: Mifanaova veloma amin’ny fanorohana masina. Ny fiangonana rehetra an’i Kristy manao veloma anareo.
  - type: heading
    content: Fampitandremana farany
  '17':
  - type: text
    content: 'Fa mananatra anareo aho, ry rahalahy, mba hitandremanareo ny amin’izay mahatonga ny fisarahana sy ny fahatafintohinana, tsy araka ny fampianarana efa nianaranareo; mialà amin’ireny olona ireny. '
  '18':
  - type: text
    content: 'Fa izy ireny dia tsy mba manompo an’i '
  - type: text
    content: Kristy
  - type: text
    content: ' Tompontsika, fa ny kibony ihany; ary amin’ny teny malefaka sady tsara lahatra no amitahany ny fon’ny tsy ary saina. '
  '19':
  - type: text
    content: 'Fa efa niely any amin’ny olona rehetra ny lazan’ny fankatoavanareo. Ary faly aho noho ny aminareo satria tiako ho hendry amin’izay tsara ianareo ary tsy hiharo amin’izay ratsy. '
  '2':
  - type: text
    content: mba horaisinareo ao amin’ny Tompo izy, araka izay mendrika ny olona masina, ary mba hampianareo izy amin’izay raharaha ilàny anareo, fa izy dia mpiahy ny maro mbamin’ny tenako koa.
  '20':
  - type: text
    content: Andriamanitry ny fiadanana hanorotoro haingana an’i Satana eo ambanin’ny tongotrareo.
  - type: text
    content: Ho aminareo anie ny fahasoavan’i Jesosy Kristy Tompontsika!
  '21':
  - type: text
    content: 'Manao veloma anareo i Timoty, mpiara-miasa amiko sy i Losio ary i Jasona sy i Sosipatro havako. '
  '22':
  - type: text
    content: 'Manao veloma anareo ao amin’ny Tompo izaho Tertio, izay manoratra ity epistily ity. '
  '23':
  - type: text
    content: Manao veloma anareo i Gaio, ilay mpampiantrano ahy sy ny fiangonana
  - type: note
    content: 'Na: eklesia.'
  - type: text
    content: ' rehetra. Manao veloma anareo i Erasto mpitahiry ny volam-panjakana eto an-tanàna sy i Koarto rahalahy. '
  '24':
  - type: text
    content: 'Ho aminareo rehetra anie ny fahasoavan’i Jesosy Kristy Tompontsika! '
  - type: text
    content: Amena
  - type: text
    content: '!'
  - type: heading
    content: Ho an’Andriamanitra irery ihany ny voninahitra!
  '25':
  - type: text
    content: 'Ary ho an’Izay mahay mampahery anareo araka ny Filazantsara toriko, dia ny fanambarana an’i Jesosy '
  - type: text
    content: Kristy
  - type: text
    content: ', araka ny fampisehoana ny zavamiafina, izay voafina hatry ny fony fahagola, '
  '26':
  - type: text
    content: 'fa efa aseho ankehitriny tamin’izay soratry ny mpaminany, araka ny didin’Andriamanitra mandrakizay ka nampahafantarina any amin’ny firenena rehetra hahatonga fanekena ny finoana, '
  '27':
  - type: text
    content: 'ho an’Andriamanitra, Ilay hany hendry, anie ny voninahitra amin’ny alalan’i Jesosy Kristy mandrakizay mandrakizay! '
  - type: text
    content: Amena
  - type: text
    content: '!'
  '3':
  - type: text
    content: 'Veloma amin’i Prisila sy i Akoila, mpiara-miasa amiko ao amin’i '
  - type: text
    content: Kristy
  - type: text
    content: ' Jesosy; '
  '4':
  - type: text
    content: 'izy ireo dia nanao vy very ny ainy hamonjy ny aiko; nefa tsy izaho ihany no misaotra azy fa ny fiangonana rehetra any amin’ny '
  - type: text
    content: Jentilisa
  - type: text
    content: ' koa. '
  '5':
  - type: text
    content: 'Veloma amin’ny fiangonana izay ao an-tranony. Veloma amin’i Epaineto malalako, izay voaloham-bokatr’i Azia ho an’i Kristy. '
  '6':
  - type: text
    content: 'Veloma amin’i Maria, izay nikely aina fatratra ho anareo. '
  '7':
  - type: text
    content: 'Veloma amin’i Androniko sy i Jonia havako sy namako niara-nifatotra tamiko, izay malaza eo amin’ny Apostoly sady tao amin’i Kristy talohako. '
  '8':
  - type: text
    content: 'Veloma amin’i Ampliato malalako ao amin’ny Tompo. '
  '9':
  - type: text
    content: 'Veloma amin’i Orbano mpiara-miasa aminay ao amin’i Kristy sy i Staky malalako. '
