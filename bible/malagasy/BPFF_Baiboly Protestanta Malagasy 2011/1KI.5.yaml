document_id: 1KI.5,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nanjaka tamin’ny fanjakana rehetra hatrany amin’ny ony Eofrata sy ny tanin’ny Filistina ka hatrany amin’ny sisintanin’i Ejipta i Solomona; nandoa hetra ireo sady nanompo an’i Solomona tamin’ny andro rehetra niainany.
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izany fahendren’i Solomona izany dia nihoatra noho ny fahendren’ny zanaky ny Atsinanana rehetra sy ny fahendren’i Ejipta manontolo. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hendry noho ny olona rehetra izy. Eny, hendry mihoatra noho i Etana ezrahita, i Hemana, i Kalkola ary i Darda, zanak’i Mahola, aza izy; niely tamin’ny firenena rehetra manodidina ny lazany. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nilaza ohabolana telo arivo izy sady nanao tononkira dimy sy arivo. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nilaza ny amin’ny hazo izy, hatramin’ny hazo sedera any Libanona ka hatramin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: hisopa
    - type: text
      text: ' izay maniry eny amin’ny rindrina; mbola nilaza ny amin’ny biby, ny voromanidina, ny biby mandady sy mikisaka ary ny hazandrano koa izy. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nisy tonga avy tany amin’ny firenena rehetra mba hihaino ny fahendren’i Solomona, dia avy amin’ny mpanjakan’ny tany rehetra izay nahare ny amin’ny fahendreny.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Manomana ny fananganana ny tempoly i Solomona
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 2Tan 2.2-15
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Naniraka ny mpanompony ho any amin’i Solomona i Hirama, mpanjakan’i Tiro, satria reny fa izy no voahosotra ho mpanjaka handimby ny rainy. I Hirama dia sakaizan’i Davida hatry ny ela.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nandefa iraka tany amin’i Hirama i Solomona hilaza hoe: '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fantatrao fa i Davida raiko dia tsy nahavita trano ho an’ny anaran’NY TOMPO Andriamaniny noho ny ady natrehany tamin’ny manodidina azy, ambara-panaon’NY TOMPO an’ireo ho eo ambanin’ny faladiany. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ankehitriny, NY TOMPO Andriamanitro dia efa nanome ahy fitsaharana amin’ny manodidina ka tsy misy fahavalo na loza manjo intsony. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa indro, izaho dia mikasa hanao trano ho an’ny anaran’NY TOMPO Andriamanitro, araka ilay nolazain’NY TOMPO tamin’i Davida raiko hoe: Ny zanakao izay hapetrako eo amin’ny sezafiandriananao handimby anao, izy no hanao trano ho an’ny anarako. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny fihinan’i Solomona isanandro dia koba tsara toto telopolo '
    - type: usfm
      marker: w
      children:
      - type: text
        text: kora
    - type: text
      text: ', sy koba hafa enimpolo kora, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Koa mba asaivo misy manapaka hazo sedera ho ahy any Libanona. Ny vahoakako no hiaraka amin’ny vahoakanao, koa ny karaman’ny vahoakanao dia homeko anao araka izay hotononinao; fa fantatrao fa tsy mba misy olona mahay manapaka hazo tahaka ny Sidoniana atỳ aminay.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa ren’i Hirama ny tenin’i Solomona dia faly tokoa izy ka niteny hoe: Ankehitriny izao dia isaorana anie NY TOMPO, izay nanome zanakalahy hendry ho an’i Davida mba hitondra izao olona marobe izao. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nandefa iraka tany amin’i Solomona i Hirama hilaza hoe: Efa reko ny hafatra nampitondrainao tatỳ amiko. Koa hanao izay rehetra irinao aho ny amin’ny hazo sedera sy ny hazo kipreso. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny vahoakako no hitondra azy midina avy any Libanona ho any amin’ny ranomasina, ary hofeheziko ireo ka hampandehaniko mitsinkafona amin’ny rano ho any amin’izay toerana hotononinao, ary any izy vao hoborahiko ka ianao no hampaka azy. Ary ianao dia hanatanteraka izay iriko amin’ny fanomezana sakafo ho an’ny ankohonako.
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nanome hazo sedera sy kipreso ho an’i Solomona araka izay rehetra nilainy i Hirama. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I Solomona kosa nanome an’i Hirama varimbazaha roa alina '
    - type: usfm
      marker: w
      children:
      - type: text
        text: kora
    - type: text
      text: ' ho sakafon’ny ankohonany, ary diloilo roapolo kora avy amin’ny oliva voatoto; ireo no nomen’i Solomona an’i Hirama isan-taona isan-taona.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary NY TOMPO nanome fahendrena an’i Solomona, araka izay nolazainy taminy. Nihavana i Hirama sy i Solomona ka nanao fanekena izy roa lahy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mandamina ny asa fanompoana i Solomona
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 2Tan 2.1, 16-17
    marker-yv: yv-h
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Naka olona tamin’ny Israely rehetra i Solomona mpanjaka mba hanao fanompoana ka olona telo alina no nalainy. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nirahiny nankany Libanona ireny ka iray alina no indray milatsaka isam-bolana; iray volana ireo no tany Libanona fa roa volana kosa mba tany an-tranony. I Adonirama no nifehy azy rehetra. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nanana mpitondra entana fito alina sy mpipaika vato valo alina tany an-tendrombohitra i Solomona, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: omby mifahy folo sy omby an-tondraka roapolo ary ondry aman’osy zato, ankoatra ny diera, ny gazela ary ny osidia mbamin’ny vorona mifahy.
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'afa-tsy ny lehiben’ireo mpifehy voatendrin’i Solomona izay nitandrina ny raharaha: Telonjato sy telo arivo lahy izay nifehy ny mpiasa. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny mpanjaka dia namoaka didy hanamboarana vato sady vaventy tsara no voapaika, hatao fototry ny Trano. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny mpiasan’i Solomona sy Hirama, sy ny avy any Gebala no nipaika ny vato sy nanamboatra ny hazo hananganana ny Trano.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa nanapaka tamin’ny tany rehetra atỳ andafin’ny ony Eofrata, hatrany Tifsa ka hatrany Gaza izy, dia tamin’ny mpanjaka rehetra etỳ andafin’ny ony Eofrata; ary tsara fihavanana tamin’ireo rehetra manodidina izy ka notoavin’ireny. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nandry fehizay ny Joda sy ny Israely tamin’ny andron’i Solomona rehetra. Samy teny ambanin’ny voalobony sy ny aviaviny ny olona hatrany Dana ka hatrany Bery-Sheba.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nanana efitrano efatra alina, fitoeran’ny soavaly mpitarika kalesy fitondra miady, ary soavaly fitaingina roa arivo sy iray alina i Solomona. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ireo mpifehy voatendry dia niadidy ny zavatra rehetra nilain’i Solomona mpanjaka sy izay rehetra noentina teo amin’ny latabatr’i Solomona mpanjaka; izy rehetra koa dia samy niadidy ny amin’ny iray volana anjarany avy ka tsy navelany ho nisy tsy ampy na inona na inona. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Noentiny ho ao amin’ny toerana izay tokony hitondrana azy koa ny varimbazaha sy ny mololo ho an’ny soavaly tsotra sy ny soavaly haingam-pandeha, samy araka ny anjara asany avy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mihoatra noho ny an’ny olona rehetra ny fahendren’i Solomona
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Andriamanitra nanome an’i Solomona fahendrena sy fahiratan-tsaina be tokoa ary fahalalana maro tahaka ny fasika amoron-dranomasina. '
