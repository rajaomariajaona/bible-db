document_id: HAB.3,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny vavaka nataon’i Habakoka sy ny firotsahan’Andriamanitra an-tsehatra
  - type: text
    content: Ny vavaka nataon’i Habakoka mpaminany,
  - type: text
    content: araka ny fomban’ny fitarainana.
  '10':
  - type: text
    content: Nahita Anao ny tendrombohitra ka toran-kovitra;
  - type: text
    content: mirotsaka ny ranonorana mivatravatra,
  - type: text
    content: 'miloa-peo ny '
  - type: text
    content: lalina
  - type: text
    content: sady manangan-tanana ho amin’ny avo.
  '11':
  - type: text
    content: Ny masoandro sy ny volana dia nijanona teo amin’ny toerany,
  - type: text
    content: noho ny fahazavan’ny zana-tsipìkanao mitsoriaka
  - type: text
    content: sy ny fanelatrelatry ny lefonao mamirapiratra.
  '12':
  - type: text
    content: Amin’ny fahatezeranao no itetezanao ny tany;
  - type: text
    content: amin’ny fahaviniranao no anosihosenao ny firenena.
  '13':
  - type: text
    content: Mivoaka hamonjy ny olonao Ianao,
  - type: text
    content: hamonjy ny Voahosotrao.
  - type: text
    content: Torotoroinao ny tapenaky ny tranon’ny ratsy fanahy
  - type: text
    content: 'ka rava hatrany am-potony ka hatrany an-tampony. '
  - type: text
    content: Fiatoana
  '14':
  - type: text
    content: Ny lefony ihany no anaboroahanao ny lohan’ireo miaramilany betsaka
  - type: text
    content: izay avy toy ny tadio hanely ahy;
  - type: text
    content: sady mifaly
  - type: text
    content: handripaka ny mahantra ao amin’ny mangingina izy.
  '15':
  - type: text
    content: Mitety ny ranomasina amin’ny soavalinao Ianao,
  - type: text
    content: dia eny amin’ny ranobe miavovona.
  '16':
  - type: text
    content: Nony nandre aho
  - type: text
    content: dia mandevilevy ny ato anatiko;
  - type: text
    content: ny molotro dia mipararetra noho ny feo;
  - type: text
    content: azon’ny fahalovana ny taolako
  - type: text
    content: ary mangovitra tsy afa-mihetsika aho
  - type: text
    content: eo am-piandrasana ny andro fahoriana,
  - type: text
    content: izay hiakaran’ny mpiantafika hamely ny olona.
  '17':
  - type: text
    content: Fa na dia tsy mamontsina aza ny aviavy
  - type: text
    content: ary tsy misy voany ny voaloboka,
  - type: text
    content: na dia mandiso fanantenana aza ny oliva
  - type: text
    content: ary tsy mahavokatra hohanina ny saha,
  - type: text
    content: na dia vonoina aza ny ondry ao am-bala
  - type: text
    content: ary tsy misy omby ao am-pahitra,
  '18':
  - type: text
    content: izaho kosa dia mbola hiravoravo amin’NY TOMPO ihany
  - type: text
    content: sy hihoby amin’Andriamanitry ny famonjena ahy.
  '19':
  - type: text
    content: NY TOMPO Andriamanitra no tanjako,
  - type: text
    content: manao ny tongotro ho toy ny an’ny dieravavy Izy
  - type: text
    content: ka mampandeha ahy any amin’ny havoanako.
  - type: text
    content: Ho an’ny mpiventy hira. Hampiarahina amin’ny valiha.
  '2':
  - type: text
    content: TOMPO ô, efa reko ny filazana momba Anao
  - type: text
    content: ka raiki-tahotra aho, RY TOMPO.
  - type: text
    content: Tanteraho amin’ny fotoanany ny asanao;
  - type: text
    content: ataovy fantatra amin’ny fotoanany izany!
  - type: text
    content: Na dia tezitra aza Ianao dia tsarovy ny indrafonao!
  '3':
  - type: text
    content: Tonga avy any Temana Andriamanitra,
  - type: text
    content: 'dia ny Iray masina avy any an-tendrombohitra Parana. '
  - type: text
    content: Fiatoana
  - type: text
    content: Manarona ny lanitra ny voninahiny
  - type: text
    content: ary manenika ny tany ny fiderana Azy.
  '4':
  - type: text
    content: Misy famirapiratana toy ny mazava
  - type: text
    content: ary misy tana-masoandro avy eo amin’ny tanany;
  - type: text
    content: ao no fieren’ny heriny!
  '5':
  - type: text
    content: Eo alohany no andehanan’ny areti-mandringana
  - type: text
    content: ary areti-mandripaka no mivoaka avy eo aorianany.
  '6':
  - type: text
    content: Mijanona Izy ka manozongozona ny tany;
  - type: text
    content: mijery Izy ka mampangovitra ny firenena.
  - type: text
    content: Torotoro ny tendrombohitra mandrakizay,
  - type: text
    content: mietry ny havoana fahagola
  - type: text
    content: sy ny lalana tranainy falehany.
  '7':
  - type: text
    content: Mahita ny tranolain’i Kosana azom-pahoriana
  - type: text
    content: sy ny ambaindain’ny tany Midiana mipararetra aho.
  '8':
  - type: text
    content: Moa amin’ny ony va no irehetan’ny hatezeran’NY TOMPO?
  - type: text
    content: Amin’ny ony va no fahatezeranao,
  - type: text
    content: na amin’ny ranomasina va no ahasosoranao,
  - type: text
    content: no dia mitaingina ny soavalinao
  - type: text
    content: sy ny kalesim-pandresenao Ianao?
  '9':
  - type: text
    content: Nalan-tsarona ny tsipìkanao;
  - type: text
    content: 'ny fianiananao no tsipìkan’ny teninao. '
  - type: text
    content: Fiatoana
  - type: text
    content: Nampitresaka ny tany Ianao mba hisy ony.
