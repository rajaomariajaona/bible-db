document_id: HAB.3,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny vavaka nataon’i Habakoka sy ny firotsahan’Andriamanitra an-tsehatra
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Ny vavaka nataon’i Habakoka mpaminany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: araka ny fomban’ny fitarainana.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Nahita Anao ny tendrombohitra ka toran-kovitra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mirotsaka ny ranonorana mivatravatra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'miloa-peo ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: lalina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady manangan-tanana ho amin’ny avo.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Ny masoandro sy ny volana dia nijanona teo amin’ny toerany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: noho ny fahazavan’ny zana-tsipìkanao mitsoriaka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny fanelatrelatry ny lefonao mamirapiratra.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Amin’ny fahatezeranao no itetezanao ny tany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: amin’ny fahaviniranao no anosihosenao ny firenena.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Mivoaka hamonjy ny olonao Ianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hamonjy ny Voahosotrao.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Torotoroinao ny tapenaky ny tranon’ny ratsy fanahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ka rava hatrany am-potony ka hatrany an-tampony. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Fiatoana
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Ny lefony ihany no anaboroahanao ny lohan’ireo miaramilany betsaka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay avy toy ny tadio hanely ahy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady mifaly
  - type: usfm
    marker: q1
    children:
    - type: text
      text: handripaka ny mahantra ao amin’ny mangingina izy.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Mitety ny ranomasina amin’ny soavalinao Ianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia eny amin’ny ranobe miavovona.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Nony nandre aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia mandevilevy ny ato anatiko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny molotro dia mipararetra noho ny feo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: azon’ny fahalovana ny taolako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mangovitra tsy afa-mihetsika aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eo am-piandrasana ny andro fahoriana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay hiakaran’ny mpiantafika hamely ny olona.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Fa na dia tsy mamontsina aza ny aviavy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy misy voany ny voaloboka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na dia mandiso fanantenana aza ny oliva
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy mahavokatra hohanina ny saha,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na dia vonoina aza ny ondry ao am-bala
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy misy omby ao am-pahitra,
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: izaho kosa dia mbola hiravoravo amin’NY TOMPO ihany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy hihoby amin’Andriamanitry ny famonjena ahy.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: NY TOMPO Andriamanitra no tanjako,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: manao ny tongotro ho toy ny an’ny dieravavy Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka mampandeha ahy any amin’ny havoanako.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Ho an’ny mpiventy hira. Hampiarahina amin’ny valiha.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: TOMPO ô, efa reko ny filazana momba Anao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka raiki-tahotra aho, RY TOMPO.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tanteraho amin’ny fotoanany ny asanao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ataovy fantatra amin’ny fotoanany izany!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na dia tezitra aza Ianao dia tsarovy ny indrafonao!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Tonga avy any Temana Andriamanitra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'dia ny Iray masina avy any an-tendrombohitra Parana. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Fiatoana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manarona ny lanitra ny voninahiny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary manenika ny tany ny fiderana Azy.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Misy famirapiratana toy ny mazava
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary misy tana-masoandro avy eo amin’ny tanany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ao no fieren’ny heriny!
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Eo alohany no andehanan’ny areti-mandringana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary areti-mandripaka no mivoaka avy eo aorianany.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Mijanona Izy ka manozongozona ny tany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mijery Izy ka mampangovitra ny firenena.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Torotoro ny tendrombohitra mandrakizay,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mietry ny havoana fahagola
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny lalana tranainy falehany.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Mahita ny tranolain’i Kosana azom-pahoriana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny ambaindain’ny tany Midiana mipararetra aho.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Moa amin’ny ony va no irehetan’ny hatezeran’NY TOMPO?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Amin’ny ony va no fahatezeranao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na amin’ny ranomasina va no ahasosoranao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no dia mitaingina ny soavalinao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny kalesim-pandresenao Ianao?
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Nalan-tsarona ny tsipìkanao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ny fianiananao no tsipìkan’ny teninao. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Fiatoana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nampitresaka ny tany Ianao mba hisy ony.
