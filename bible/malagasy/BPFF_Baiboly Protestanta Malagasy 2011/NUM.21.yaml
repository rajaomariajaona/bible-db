document_id: NUM.21,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Nandresy ny Kananita ny Zanak’Israely
  - type: text
    content: 'Rehefa ren’ilay Kananita, mpanjakan’i Arada, izay nonina tany Negeva, fa mandeha amin’ny lalana mankany Atarima ny Israely, dia niady taminy izy ka noentiny ho babo ny sasany tamin’ny Israely. '
  '10':
  - type: text
    content: 'Dia niainga ny Zanak’Israely ka nitoby tao Obota. '
  '11':
  - type: text
    content: 'Rehefa niala tao Obota izy dia nitoby tao Ie-Abarima, tany amin’ny tany efitra izay mifanolotra amin’i Moaba, tandrifin’ny fiposahan’ny masoandro. '
  '12':
  - type: text
    content: 'Nony niala tao izy ireo dia nitoby tao amin’ny lohasahan-driaka Zereda. '
  '13':
  - type: text
    content: 'Ary niala tao dia nilasy tany andafin’i Arnona, izay any amin’ny tany efitra sady mivoaka avy ao amin’ny faritanin’ny Amorita; fa ny ranon’i Arnona no mamaritra ny sisintanin’ny Moabita, eo anelanelan’i Moaba sy ny Amorita. '
  '14':
  - type: text
    content: 'Koa izany no ilazana ao amin’ny Bokin’ny Adin’NY TOMPO hoe:'
  - type: text
    content: I Vaheba any Sofa sy ireo lohasahan-driaka,
  - type: text
    content: 'i Arnona, '
  '15':
  - type: text
    content: ary ny hantsana manamorona ny lohasahan-driaka,
  - type: text
    content: izay mivily mankany amin’ny tanin’i Ara
  - type: text
    content: ka mipaka any amin’ny sisintanin’i Moaba.
  '16':
  - type: text
    content: 'Ary niala tao izy hankany Bera, dia ilay lava-drano fantsakana nilazan’NY TOMPO tamin’i Mosesy hoe: Angony ny olona fa homeko rano izy. '
  '17':
  - type: text
    content: 'Dia nanao izao hira izao ny Israely:'
  - type: text
    content: Aoka hiboiboika ianao, ry lavaka fantsakana! Ataovinareo an-kira izy!
  '18':
  - type: text
    content: Lavaka fantsakana izay nohadin’ireo olo-manankaja,
  - type: text
    content: nohadin’ireo manankaja amin’ny firenena
  - type: text
    content: tamin’ny tehiny, dia ireo tehiny fanapahana!
  '19':
  - type: text
    content: 'Nony niala tany Matana izy ireo dia nankany Nahaliela; nony niala tany Nahaliela dia nankao Bamota; '
  '2':
  - type: text
    content: 'Dia nivoady tamin’NY TOMPO ny Israely ka niteny hoe: Raha atolotrao eo an-tananay tokoa io firenena io dia hataonay zavatra voaozona avokoa ny tanànany. '
  '20':
  - type: text
    content: nony niala tany Bamota dia nankany amin’ny lohasaha izay ao amin’ny tany Moaba, ao an-tampon’i Pisga, izay manatrika ny tany efitra.
  - type: heading
    content: Fandresena an’i Sihona sy i Oga mpanjaka
  '21':
  - type: text
    content: 'Nandefa iraka ho any amin’i Sihona, mpanjakan’ny Amorita, ny Israely mba hilaza hoe: '
  '22':
  - type: text
    content: Avelao izahay mba handeha hamakivaky ny taninao, fa tsy hivily ho any amin’ny saha na ho amin’ny tanim-boaloboka izahay ary tsy hisotro ny rano amin’ny lavaka fantsakana; ny Lalan’andriana
  - type: note
    content: Zahao 20.17.
  - type: text
    content: ' ihany no halehanay mandra-pihoatranay ny sisintaninao. '
  '23':
  - type: text
    content: 'Nefa tsy namela ny Israely handeha hamakivaky ny taniny i Sihona fa nanangona ny vahoakany rehetra izy ka niainga hikatroka tamin’ny Israely tany an-tany efitra, dia nankany Jahaza ary niady tamin’ny Israely. '
  '24':
  - type: text
    content: 'Ary namely azy tamin’ny lelan-tsabatra ny Israely ka nahazo ny taniny hatrany Arnona ka hatrany Jaboka, dia hatrany amin’ny taranak’i Amona; fa nisy manda mafy ny sisintanin’ny taranak’i Amona. '
  '25':
  - type: text
    content: 'Dia nalain’ny Israely ireny tanàna rehetra ireny. Nonenan’ny Israely ny tanànan’ny Amorita rehetra, dia i Hesbona sy ireo vohitra miankina aminy rehetra. '
  '26':
  - type: text
    content: 'I Hesbona no tanànan’i Sihona, mpanjakan’ny Amorita, izay nanafika ny mpanjakan’i Moaba taloha ka naka ny taniny rehetra hatrany Arnona. '
  '27':
  - type: text
    content: 'Izany no nilazan’ny mpanao oha-teny hoe:'
  - type: text
    content: Midira ao Hesbona ianareo!
  - type: text
    content: Aoka hatsangana indray sy hatao mafy orina ny tanànan’i Sihona;
  '28':
  - type: text
    content: fa nisy afo nivoaka avy tao Hesbona
  - type: text
    content: ary lelafo avy tao an-tanànan’i Sihona
  - type: text
    content: ka nandevona an’i Ara-Moaba
  - type: text
    content: sy ireo tompon’ny havoana any Arnona.
  '29':
  - type: text
    content: Lozanao, ry Moaba!
  - type: text
    content: Ringana ianao, ry olon’i Kemosy!
  - type: text
    content: Nafoiny ho mpandositra ny zanany lahy
  - type: text
    content: ary navelany ho babo ny zanany vavy,
  - type: text
    content: ho an’i Sihona, mpanjakan’ny Amorita.
  '3':
  - type: text
    content: Ary NY TOMPO nihaino ny feon’ny Israely ka natolony azy ny Kananita. Dia nataon’ny Israely ho zavatra voaozona izy ireo sy ny tanànany; koa ny anaran’izany tany izany dia natao hoe Horma na Ozona.
  - type: heading
    content: Ireo menarana mandoro
  '30':
  - type: text
    content: Notifirintsika tamin’ny zana-tsipìka izy;
  - type: text
    content: ringana i Hesbona hatrany Dibona;
  - type: text
    content: nolevonintsika izy hatrany Nofa ka hatrany Medeba.
  '31':
  - type: text
    content: 'Dia nonina tao amin’ny tanin’ny Amorita ny Israely. '
  '32':
  - type: text
    content: Ary naniraka mpisafo tany ho any Jazera i Mosesy; ary naka ireo vohitra miankina aminy ny Israely ka nandroaka ny Amorita izay tany.
  '33':
  - type: text
    content: 'Ary niverina izy ireo ka niakatra tamin’ny lalana mankany Basana. Dia niainga i Oga, mpanjakan’i Basana, hifanehatra aminy, dia izy sy ny vahoakany rehetra mba hiady tao Edirehy. '
  '34':
  - type: text
    content: 'Dia hoy NY TOMPO tamin’i Mosesy: Aza matahotra azy ianao, fa efa natolotro eo an-tananao izy sy ny vahoakany rehetra ary ny taniny; hataonao aminy araka izay nataonao tamin’i Sihona, mpanjakan’ny Amorita, izay nonina tao Hesbona. '
  '35':
  - type: text
    content: Dia namely azy sy ny zanany lahy ary ny vahoakany rehetra izy ka tsy nasiany niangana na dia iray akory aza, dia azony ny taniny.
  '4':
  - type: text
    content: 'Niala tany an-tendrombohitra Hora indray izy ireo ka nihazo ny lalana mankany amin’ny Ranomasina Mena hanodidina ny tany Edoma. Dia kivy teny an-dalana ny olona. '
  '5':
  - type: text
    content: 'Dia niteny nanome tsiny an’Andriamanitra sy i Mosesy izy hoe: Nahoana no noentinao niakatra avy tany Ejipta ho faty atỳ an-tany efitra izahay? Tsy misy mofo na rano atỳ, ary leon’itony mofo tsy izy itony izahay. '
  '6':
  - type: text
    content: 'Ary NY TOMPO nampandeha menarana mandoro teny amin’ny olona; nanaikitra ny olona ireny ka nahafatesana be tamin’ny Israely. '
  '7':
  - type: text
    content: 'Dia nankeo amin’i Mosesy ny olona ka niteny hoe: Efa nanota izahay fa niteny nanohitra NY TOMPO sy ianao. Ifony amin’NY TOMPO izahay mba hanesorany ny menarana hiala aminay. Dia nifona ho an’ny olona i Mosesy. '
  '8':
  - type: text
    content: 'Dia hoy NY TOMPO tamin’i Mosesy: Manaova menarana varahina ka ahantòny amin’ny hazo lava, ary izay rehetra voakaikitra ka mijery izany dia ho velona. '
  '9':
  - type: text
    content: Dia nanao menarana varahina i Mosesy ka nanantona azy tamin’ny hazo lava; koa izay olona voakaikitry ny menarana ka nijery ilay menarana varahina dia velona.
  - type: heading
    content: Ireo toeram-pijanonana tao amin’ny tendrombohitra Pisga
