document_id: JOB.41,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Indro, iza no sahisahy foana ka hikitika azy?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy mahakivy va na dia ny fijery azy aza?
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Ny fieviny dia mampamirapiratra fahazavana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny masony dia tahaka ny hodimason’ny maraina.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Lelafo no mivoaka avy amin’ny vavany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: kilalaon’afo no mipariaka avy aminy.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Ny vavorony dia ivoahan’ny setroka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tahaka ny avy amin’ny vilany mangotraka na amin’ny fahandroana.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Ny fofonainy dia mampirehitra arina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary misy lelafo mivoaka avy amin’ny vavany.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Ny vozony no itoeran’ny hery
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mibitaka eo anoloany ny fampahatahorana.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Mivalombalona ny hotraka amin’ny tenany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mafy ireny ka tsy azo endahina.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Mafy tahaka ny vato ny fony;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, mafy tahaka ny vato fikosoham-bary.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Raha mitsangana izy dia raiki-tahotra ny mahery;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, toran-kovitra ireo ka mihemotra.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Raha misy mamely azy amin’ny sabatra dia tsy mahalaitra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na amin’ny lefom-pohy na ny firombaka na ny zana-tsipìka.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Ataony toy ny mololo ny vy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary toy ny hazo momoka ny varahina.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Tsy misy sahy manao vy very ny ainy hanaitra azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: koa iza kosa no mahajanona eo anatrehako?
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Tsy mampandositra azy ny zana-tsipìka;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ataony ho toy ny vodivary ny vaton’antsamotady.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Ataony ho toy ny vodivary koa ny langilangy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ihomehezany ny fisidin’ny lefona.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Ny takibany dia tahaka ny vakim-bilany maranitra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toy ny mitarika ragiragy eo amin’ny fotaka izy.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Mampandevy ny lalina ho tahaka ny ao am-bilany izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: manao ny ranomasina ho tahaka ny vilany misy menaka manitra izy.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Mampahazava ny lalany eo aorianany izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka lasa toy ny volo fotsy ny lalina.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Tsy misy tahaka azy eny ambonin’ny tany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay voaforona tsy hahalala tahotra.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Ny avo rehetra dia jereny avokoa;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mpanjakan’ny bibidia rehetra izy.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Iza no nanome Ahy aloha mba hamaliako azy?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny eny ambanin’ny lanitra rehetra dia Ahy avokoa.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Tsy mbola hangina Aho ny amin’ny rantsambatany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny heriny ary ny firafitry ny vatany.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Iza no mahasonga ny fitafiany?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na iza no sahy hiditra ao amin’ny nifiny roa sosona?
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Iza no mahasokatra ny varavaran’ny tavany?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mahatsiravina ny manodidina ny nifiny!
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Reharehany ny faraoraon’ny kirany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mihidy avokoa toy ny voapetaka mafy amin’ny tombo-kase ireo;
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: mikirindro ireo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy azon’ny rivotra idirana eo anelanelany.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Mifanindry lany ireo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady mifampiditra ka tsy azo sarahina.
