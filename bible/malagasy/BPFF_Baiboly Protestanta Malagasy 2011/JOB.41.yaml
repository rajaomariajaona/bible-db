document_id: JOB.41,3103
type_code: plt
verses:
  '1':
  - type: text
    content: Indro, iza no sahisahy foana ka hikitika azy?
  - type: text
    content: Tsy mahakivy va na dia ny fijery azy aza?
  '10':
  - type: text
    content: Ny fieviny dia mampamirapiratra fahazavana
  - type: text
    content: ary ny masony dia tahaka ny hodimason’ny maraina.
  '11':
  - type: text
    content: Lelafo no mivoaka avy amin’ny vavany;
  - type: text
    content: kilalaon’afo no mipariaka avy aminy.
  '12':
  - type: text
    content: Ny vavorony dia ivoahan’ny setroka,
  - type: text
    content: tahaka ny avy amin’ny vilany mangotraka na amin’ny fahandroana.
  '13':
  - type: text
    content: Ny fofonainy dia mampirehitra arina
  - type: text
    content: ary misy lelafo mivoaka avy amin’ny vavany.
  '14':
  - type: text
    content: Ny vozony no itoeran’ny hery
  - type: text
    content: ary mibitaka eo anoloany ny fampahatahorana.
  '15':
  - type: text
    content: Mivalombalona ny hotraka amin’ny tenany;
  - type: text
    content: mafy ireny ka tsy azo endahina.
  '16':
  - type: text
    content: Mafy tahaka ny vato ny fony;
  - type: text
    content: eny, mafy tahaka ny vato fikosoham-bary.
  '17':
  - type: text
    content: Raha mitsangana izy dia raiki-tahotra ny mahery;
  - type: text
    content: eny, toran-kovitra ireo ka mihemotra.
  '18':
  - type: text
    content: Raha misy mamely azy amin’ny sabatra dia tsy mahalaitra,
  - type: text
    content: na amin’ny lefom-pohy na ny firombaka na ny zana-tsipìka.
  '19':
  - type: text
    content: Ataony toy ny mololo ny vy
  - type: text
    content: ary toy ny hazo momoka ny varahina.
  '2':
  - type: text
    content: Tsy misy sahy manao vy very ny ainy hanaitra azy;
  - type: text
    content: koa iza kosa no mahajanona eo anatrehako?
  '20':
  - type: text
    content: Tsy mampandositra azy ny zana-tsipìka;
  - type: text
    content: ataony ho toy ny vodivary ny vaton’antsamotady.
  '21':
  - type: text
    content: Ataony ho toy ny vodivary koa ny langilangy;
  - type: text
    content: ihomehezany ny fisidin’ny lefona.
  '22':
  - type: text
    content: Ny takibany dia tahaka ny vakim-bilany maranitra;
  - type: text
    content: toy ny mitarika ragiragy eo amin’ny fotaka izy.
  '23':
  - type: text
    content: Mampandevy ny lalina ho tahaka ny ao am-bilany izy;
  - type: text
    content: manao ny ranomasina ho tahaka ny vilany misy menaka manitra izy.
  '24':
  - type: text
    content: Mampahazava ny lalany eo aorianany izy
  - type: text
    content: ka lasa toy ny volo fotsy ny lalina.
  '25':
  - type: text
    content: Tsy misy tahaka azy eny ambonin’ny tany,
  - type: text
    content: izay voaforona tsy hahalala tahotra.
  '26':
  - type: text
    content: Ny avo rehetra dia jereny avokoa;
  - type: text
    content: mpanjakan’ny bibidia rehetra izy.
  '3':
  - type: text
    content: Iza no nanome Ahy aloha mba hamaliako azy?
  - type: text
    content: Ny eny ambanin’ny lanitra rehetra dia Ahy avokoa.
  '4':
  - type: text
    content: Tsy mbola hangina Aho ny amin’ny rantsambatany
  - type: text
    content: sy ny heriny ary ny firafitry ny vatany.
  '5':
  - type: text
    content: Iza no mahasonga ny fitafiany?
  - type: text
    content: Na iza no sahy hiditra ao amin’ny nifiny roa sosona?
  '6':
  - type: text
    content: Iza no mahasokatra ny varavaran’ny tavany?
  - type: text
    content: Mahatsiravina ny manodidina ny nifiny!
  '7':
  - type: text
    content: Reharehany ny faraoraon’ny kirany,
  - type: text
    content: mihidy avokoa toy ny voapetaka mafy amin’ny tombo-kase ireo;
  '8':
  - type: text
    content: mikirindro ireo
  - type: text
    content: ka tsy azon’ny rivotra idirana eo anelanelany.
  '9':
  - type: text
    content: Mifanindry lany ireo
  - type: text
    content: sady mifampiditra ka tsy azo sarahina.
