document_id: JOB.41
type_code: plt
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Indro, iza no sahisahy foana ka hikitika azy?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy mahakivy va na dia ny fijery azy aza?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Tsy misy sahy manao vy very ny ainy hanaitra azy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: koa iza kosa no mahajanona eo anatrehako?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Iza no nanome Ahy aloha mba hamaliako azy?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny eny ambanin’ny lanitra rehetra dia Ahy avokoa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Tsy mbola hangina Aho ny amin’ny rantsambatany
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny heriny ary ny firafitry ny vatany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Iza no mahasonga ny fitafiany?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na iza no sahy hiditra ao amin’ny nifiny roa sosona?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Iza no mahasokatra ny varavaran’ny tavany?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mahatsiravina ny manodidina ny nifiny!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Reharehany ny faraoraon’ny kirany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mihidy avokoa toy ny voapetaka mafy amin’ny tombo-kase ireo;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: mikirindro ireo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy azon’ny rivotra idirana eo anelanelany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Mifanindry lany ireo
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady mifampiditra ka tsy azo sarahina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ny fieviny dia mampamirapiratra fahazavana
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny masony dia tahaka ny hodimason’ny maraina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Lelafo no mivoaka avy amin’ny vavany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: kilalaon’afo no mipariaka avy aminy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ny vavorony dia ivoahan’ny setroka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tahaka ny avy amin’ny vilany mangotraka na amin’ny fahandroana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ny fofonainy dia mampirehitra arina
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary misy lelafo mivoaka avy amin’ny vavany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ny vozony no itoeran’ny hery
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mibitaka eo anoloany ny fampahatahorana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Mivalombalona ny hotraka amin’ny tenany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mafy ireny ka tsy azo endahina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Mafy tahaka ny vato ny fony;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, mafy tahaka ny vato fikosoham-bary.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Raha mitsangana izy dia raiki-tahotra ny mahery;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, toran-kovitra ireo ka mihemotra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Raha misy mamely azy amin’ny sabatra dia tsy mahalaitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: na amin’ny lefom-pohy na ny firombaka na ny zana-tsipìka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ataony toy ny mololo ny vy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary toy ny hazo momoka ny varahina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Tsy mampandositra azy ny zana-tsipìka;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ataony ho toy ny vodivary ny vaton’antsamotady.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ataony ho toy ny vodivary koa ny langilangy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ihomehezany ny fisidin’ny lefona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ny takibany dia tahaka ny vakim-bilany maranitra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: toy ny mitarika ragiragy eo amin’ny fotaka izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Mampandevy ny lalina ho tahaka ny ao am-bilany izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: manao ny ranomasina ho tahaka ny vilany misy menaka manitra izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Mampahazava ny lalany eo aorianany izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka lasa toy ny volo fotsy ny lalina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Tsy misy tahaka azy eny ambonin’ny tany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay voaforona tsy hahalala tahotra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Ny avo rehetra dia jereny avokoa;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mpanjakan’ny bibidia rehetra izy.
