document_id: EXO.13
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Didy momba ny voalohan-teraka teo amin’ny Israely
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary NY TOMPO niteny tamin’i Mosesy indray hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Hamasino ho Ahy ny lahimatoa rehetra, dia izay voalohan-teraka rehetra eo amin’ny Zanak’Israely, na olona na biby fiompy. Ahy ireny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dia hoy i Mosesy tamin’ny olona: Tsarovy izao andro izao, izay nivoahanareo avy tany Ejipta, tamin’ny trano nanandevozana, fa tamin’ny tanana mahery no nitondran’NY TOMPO anareo nivoaka avy tany. Koa aza misy mihinana izay misy masirasira. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Izao andro amin’ny volana '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Abiba
  - type: text
    text: ' izao no ivoahanareo. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Rehefa mitondra anao NY TOMPO ho any amin’ny tanin’ny Kananita, ny Hetita, ny Amorita, ny Hivita ary ny Jebosita, izay nianianany tamin’ny razanao homena anao, dia tany tondra-dronono sy tantely, dia hanao izany fanompoana izany ianao amin’izao volana izao. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Hafitoana no hihinananao mofo tsy misy masirasira, ary amin’ny andro fahafito dia hisy andro firavoravoana ho an’NY TOMPO. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Mofo tsy misy masirasira no hohanina mandritra ny hafitoana; tsy hisy mofo misy masirasira ao aminao ary tsy hisy izay masirasira akory ao aminao, any amin’ny taninao rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Hambaranao amin’ny zanakao amin’izany andro izany hoe: Noho ny nataon’NY TOMPO tamiko tamin’ny nivoahako avy tany Ejipta no anaovako izao. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ho famantarana ho anao eo amin’ny tananao izany ary ho fampahatsiarovana eo ambonin’ny handrinao mba ho ao am-bavanao ny lalànan’NY TOMPO: Fa tanana mahery no nitondran’NY TOMPO anao nivoaka avy tany Ejipta. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Dia tandremo izao lalàna izao amin’ny fotoanany isan-taona.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Rehefa mitondra anao NY TOMPO hiditra any amin’ny tanin’ny Kananita araka izay nianianany taminao sy tamin’ny razanao ka homeny anao izany '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'dia hatokanao ho an’NY TOMPO izay voalohan-teraka rehetra: Ny voalohan-teraky ny biby fiompy rehetra anananao dia ho an’NY TOMPO ny lahy rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ny voalohan-teraky ny boriky dia hosoloanao zanak’ondry; fa raha tsy hanolo azy ianao dia hofolahinao ny vozony. Ary ny lahimatoa rehetra amin’ny olona eo amin’ny zanakao dia havotanao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary raha manontany anao ny zanakao amin’ny andro ho avy ka hiteny hoe: Inona no anton’izao? Dia holazainao aminy hoe: Tanana mahery no nitondran’NY TOMPO antsika nivoaka avy tany Ejipta, tamin’ny trano nanandevozana; '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'ary satria nanamafy ny fony i Farao ka tsy namela antsika handeha dia novonoin’NY TOMPO ny lahimatoa rehetra tany amin’ny tany Ejipta, hatramin’ny lahimatoan’ny olona ka hatramin’ny voalohan-teraky ny biby. Koa izany no anaterako ho an’NY TOMPO ny lahy voalohan-teraka rehetra, fa ny lahimatoa rehetra amin’ny zanako kosa dia soloiko. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ho famantarana eo amin’ny tananao sy ho fehy eo ambonin’ny handrinao izany; fa tanana mahery no nitondran’NY TOMPO antsika nivoaka avy tany Ejipta.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mitari-dalana ny olony Andriamanitra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Rehefa nalefan’i Farao ny olona dia tsy mba noentin’Andriamanitra tamin’ny lalana nankany amin’ny tanin’ny Filistina izy na dia akaiky aza any; fa hoy Andriamanitra: Sao hanenina ny olona raha mahita ady ka hiverina any Ejipta. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Koa noentin’Andriamanitra nivily ho amin’ny lalana mahazo ny tany efitra amoron’ny Ranomasina Mena ny olona; ary voaomana hiady no fiakatry ny Zanak’Israely avy tany amin’ny tany Ejipta.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary noentin’i Mosesy niaraka taminy ny taolan’i Josefa, satria i Josefa dia efa nampianiana mafy ny Zanak’Israely hoe: Hamangy anareo tokoa Andriamanitra ka hitondra ny taolako hiala atỳ miaraka aminareo ianareo.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Dia nifindra niala tao Sokota izy ka nitoby tao Etama teo an-tsisin’ny tany efitra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary NY TOMPO nandeha teo alohany tamin’ny andry rahona ny antoandro mba hitari-dalana azy ary tamin’ny andry afo, nony alina, ho fahazavana ho azy mba hahazoany mandeha na andro na alina. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ny andry rahona dia tsy niala teo alohan’ny olona ny antoandro, ary ny andry afo nony alina.
