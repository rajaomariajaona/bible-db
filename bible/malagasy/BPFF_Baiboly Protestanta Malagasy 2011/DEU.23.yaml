document_id: DEU.23,3103
type_code: plt
verses:
  '1':
  - type: text
    content: Tsy mahazo maka ny vadin’ny rainy ny olona, na mandry amin’izay nandrian’ny rainy.
  - type: heading
    content: Ireo olona tsy mahazo miditra ao amin’ny fiangonan’NY TOMPO
  '10':
  - type: text
    content: 'Raha miainga hiady amin’ny fahavalonao ny tafikao dia mifadia ny ratsy rehetra. '
  '11':
  - type: text
    content: 'Raha misy olona eo aminao, izay tsy madio noho izay nanjo azy tamin’ny alina, dia hivoaka ho eny ivelan’ny toby izy fa tsy hiditra ao anatiny. '
  '12':
  - type: text
    content: 'Aoka handro amin’ny rano izy rehefa hariva; ary rehefa tokony ho maty masoandro dia mahazo miverina ao amin’ny toby indray izy. '
  '13':
  - type: text
    content: 'Aoka hisy tany voafaritrao ho fivoahanao any ivelan’ny toby; '
  '14':
  - type: text
    content: 'ary mitondrà tsatòka miaraka amin’ny fitaovanao, koa raha hipetraka eny ivelany ianao dia mihadia lavaka amin’ny tsatòka ka totofy ny fivalananao. '
  '15':
  - type: text
    content: Fa NY TOMPO Andriamanitrao dia mandeha eo afovoan’ny tobinao hamonjy anao sy hanolotra ny fahavalonao eo anoloanao; ho masina ny tobinao, ary mba tsy hahita zavatra maloto eo aminao Izy ka tsy hiala aminao.
  - type: heading
    content: Ny andevo nandositra
  '16':
  - type: text
    content: 'Aza atolotrao amin’ny tompony intsony ny andevo izay mandositra mamonjy tena ho eo aminao. '
  '17':
  - type: text
    content: Eo aminao no hitoerany, dia eo amin’ny tanàna izay tiany sy izay sitraky ny fony; fa aza mampahory azy.
  - type: heading
    content: Fijangajangana ho fanompoan-tsampy
  '18':
  - type: text
    content: 'Aoka tsy hisy zanakavavy na zanakalahin’ny Israely hanolo-tena hijangajanga ho fanompoan-tsampy. '
  '19':
  - type: text
    content: Aza mitondra ny karama maloton’ny vehivavy janga na ny karaman’alika, ho ao amin’ny tranon’NY TOMPO Andriamanitra, hanefana voady; fa fahavetavetana eo imason’NY TOMPO Andriamanitrao ireo zavatra roa ireo.
  - type: heading
    content: Ny fampanjanaham-bola
  '2':
  - type: text
    content: Tsy mahazo miditra amin’ny fiangonan’NY TOMPO izay torotoro vihina, na izay voatapaka ny filahiany.
  '20':
  - type: text
    content: 'Aza mampanjanaka zavatra amin’ny rahalahinao, na vola, na hanina, na zavatra hafa mety hampanjanahina. '
  '21':
  - type: text
    content: Ny olona hafa firenena ihany no hampanjanahinao zavatra; fa ny rahalahinao kosa dia tsy hampanjanahinao; mba hotahìn’NY TOMPO Andriamanitrao ianao amin’izay rehetra ataon’ny tananao eo amin’ny tany izay efa hidiranao holovana.
  - type: heading
    content: Ny voady
  '22':
  - type: text
    content: 'Raha mivoady amin’NY TOMPO Andriamanitrao ianao dia aza ela fanefa, fa hadinin’NY TOMPO Andriamanitrao aminao tokoa izany ka ho fahotanao. '
  '23':
  - type: text
    content: 'Fa raha tsy mivoady ianao dia tsy fahotanao izany. '
  '24':
  - type: text
    content: Izay aloaky ny vavanao dia tandremo ka tanteraho, araka ny nivoadianao an-tsitrapo tamin’NY TOMPO Andriamanitrao ihany, dia izay nolazain’ny vavanao.
  - type: heading
    content: Ny tanim-boaloboka sy ny tanimbarin’ny namana
  '25':
  - type: text
    content: 'Raha mankany amin’ny tanim-boaloboky ny namanao ianao dia mahazo manaram-po mihinam-boaloboka hahavoky anao, nefa aza mitondra mody. '
  '26':
  - type: text
    content: Raha mankany amin’ny tanimbarin’ny namanao ianao dia mahazo mioty salohim-bary ny tananao, nefa aza jinjainao amin’ny antsimbary ny varin’ny namanao.
  '3':
  - type: text
    content: Tsy mahazo miditra amin’ny fiangonan’NY TOMPO ny zazasary. Na dia hatramin’ny taranany fahafolo mandimby aza dia tsy hahazo miditra amin’ny fiangonan’NY TOMPO.
  '4':
  - type: text
    content: 'Tsy mahazo miditra amin’ny fiangonan’NY TOMPO ny Amonita sy ny Moabita. Na dia hatramin’ny taranany fahafolo mandimby aza dia tsy hahazo miditra amin’ny fiangonan’NY TOMPO hatramin’ny mandrakizay ireny, '
  '5':
  - type: text
    content: 'satria tsy nitsena anareo tamin’ny mofo sy rano teny an-dalana izy, raha nivoaka avy tany Ejipta ianareo, ary satria nanangoly an’i Balama, zanak’i Beora, avy any Petora any Mesopotamia, hanozona anao izy. '
  '6':
  - type: text
    content: 'Kanefa NY TOMPO Andriamanitrao tsy nety nihaino an’i Balama fa nampody ny fanozonana anao ho fitahiana Izy noho ny fitiavany anao. '
  '7':
  - type: text
    content: Aza mitady izay hiadanany na izay hahasoa azy amin’ny andronao rehetra mandrakizay.
  '8':
  - type: text
    content: 'Aza atao ho fahavetavetana ny Edomita fa rahalahinao izy, na ny Ejiptiana, fa efa mba vahiny tany amin’ny taniny ianao. '
  '9':
  - type: text
    content: Ny zafiafin’ireo dia hahazo miditra amin’ny fiangonan’NY TOMPO.
  - type: heading
    content: Ny fahadiovan’ny toby
