document_id: DEU.23
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Tsy mahazo maka ny vadin’ny rainy ny olona, na mandry amin’izay nandrian’ny rainy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ireo olona tsy mahazo miditra ao amin’ny fiangonan’NY TOMPO
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Tsy mahazo miditra amin’ny fiangonan’NY TOMPO izay torotoro vihina, na izay voatapaka ny filahiany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Tsy mahazo miditra amin’ny fiangonan’NY TOMPO ny zazasary. Na dia hatramin’ny taranany fahafolo mandimby aza dia tsy hahazo miditra amin’ny fiangonan’NY TOMPO.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Tsy mahazo miditra amin’ny fiangonan’NY TOMPO ny Amonita sy ny Moabita. Na dia hatramin’ny taranany fahafolo mandimby aza dia tsy hahazo miditra amin’ny fiangonan’NY TOMPO hatramin’ny mandrakizay ireny, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'satria tsy nitsena anareo tamin’ny mofo sy rano teny an-dalana izy, raha nivoaka avy tany Ejipta ianareo, ary satria nanangoly an’i Balama, zanak’i Beora, avy any Petora any Mesopotamia, hanozona anao izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Kanefa NY TOMPO Andriamanitrao tsy nety nihaino an’i Balama fa nampody ny fanozonana anao ho fitahiana Izy noho ny fitiavany anao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Aza mitady izay hiadanany na izay hahasoa azy amin’ny andronao rehetra mandrakizay.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Aza atao ho fahavetavetana ny Edomita fa rahalahinao izy, na ny Ejiptiana, fa efa mba vahiny tany amin’ny taniny ianao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ny zafiafin’ireo dia hahazo miditra amin’ny fiangonan’NY TOMPO.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fahadiovan’ny toby
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Raha miainga hiady amin’ny fahavalonao ny tafikao dia mifadia ny ratsy rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Raha misy olona eo aminao, izay tsy madio noho izay nanjo azy tamin’ny alina, dia hivoaka ho eny ivelan’ny toby izy fa tsy hiditra ao anatiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Aoka handro amin’ny rano izy rehefa hariva; ary rehefa tokony ho maty masoandro dia mahazo miverina ao amin’ny toby indray izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Aoka hisy tany voafaritrao ho fivoahanao any ivelan’ny toby; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'ary mitondrà tsatòka miaraka amin’ny fitaovanao, koa raha hipetraka eny ivelany ianao dia mihadia lavaka amin’ny tsatòka ka totofy ny fivalananao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Fa NY TOMPO Andriamanitrao dia mandeha eo afovoan’ny tobinao hamonjy anao sy hanolotra ny fahavalonao eo anoloanao; ho masina ny tobinao, ary mba tsy hahita zavatra maloto eo aminao Izy ka tsy hiala aminao.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny andevo nandositra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Aza atolotrao amin’ny tompony intsony ny andevo izay mandositra mamonjy tena ho eo aminao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Eo aminao no hitoerany, dia eo amin’ny tanàna izay tiany sy izay sitraky ny fony; fa aza mampahory azy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fijangajangana ho fanompoan-tsampy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Aoka tsy hisy zanakavavy na zanakalahin’ny Israely hanolo-tena hijangajanga ho fanompoan-tsampy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Aza mitondra ny karama maloton’ny vehivavy janga na ny karaman’alika, ho ao amin’ny tranon’NY TOMPO Andriamanitra, hanefana voady; fa fahavetavetana eo imason’NY TOMPO Andriamanitrao ireo zavatra roa ireo.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fampanjanaham-bola
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Aza mampanjanaka zavatra amin’ny rahalahinao, na vola, na hanina, na zavatra hafa mety hampanjanahina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ny olona hafa firenena ihany no hampanjanahinao zavatra; fa ny rahalahinao kosa dia tsy hampanjanahinao; mba hotahìn’NY TOMPO Andriamanitrao ianao amin’izay rehetra ataon’ny tananao eo amin’ny tany izay efa hidiranao holovana.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny voady
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Raha mivoady amin’NY TOMPO Andriamanitrao ianao dia aza ela fanefa, fa hadinin’NY TOMPO Andriamanitrao aminao tokoa izany ka ho fahotanao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Fa raha tsy mivoady ianao dia tsy fahotanao izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Izay aloaky ny vavanao dia tandremo ka tanteraho, araka ny nivoadianao an-tsitrapo tamin’NY TOMPO Andriamanitrao ihany, dia izay nolazain’ny vavanao.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny tanim-boaloboka sy ny tanimbarin’ny namana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Raha mankany amin’ny tanim-boaloboky ny namanao ianao dia mahazo manaram-po mihinam-boaloboka hahavoky anao, nefa aza mitondra mody. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Raha mankany amin’ny tanimbarin’ny namanao ianao dia mahazo mioty salohim-bary ny tananao, nefa aza jinjainao amin’ny antsimbary ny varin’ny namanao.
