document_id: PRO.25,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Tenim-pahendrena samihafa
  - type: text
    content: 'Ireto koa ny ohabolan’i Solomona, izay nangonin’ny olon’i Hezekia, mpanjakan’ny Joda:'
  '10':
  - type: text
    content: fandrao izay mandre dia hanondro maso anao
  - type: text
    content: ka tsy ho afaka aminao ny laza ratsy.
  '11':
  - type: text
    content: Ny teny atao amin’ny antony
  - type: text
    content: dia paoma volamena misy ravaka volafotsy.
  '12':
  - type: text
    content: Kavina volamena sy ravaka volamena tsara
  - type: text
    content: ny mpananatra hendry, raha amin’ny sofina mihaino.
  '13':
  - type: text
    content: Toy ny hatsiakan’ny orampanala amin’ny taom-pijinjana,
  - type: text
    content: 'dia toy izany ny iraka mahatoky amin’izay naniraka azy:'
  - type: text
    content: Mamelombelona ny fon’ny tompony izy.
  '14':
  - type: text
    content: Toy ny rahona sy ny rivotra tsy misy orana
  - type: text
    content: ny olona izay mirehaka mampanantena fanomezana tsy misy akory.
  '15':
  - type: text
    content: Ny fahari-po no ahazoana mampanaiky ny mpitondra,
  - type: text
    content: ary ny teny malefaka no mahatapaka taolana.
  '16':
  - type: text
    content: Mahita tantely va ianao? Hano izay antonona anao,
  - type: text
    content: fandrao voky loatra ianao ka handoa azy.
  '17':
  - type: text
    content: Aza miditra matetika ao an-tranon’ny namanao,
  - type: text
    content: fandrao tofoka aminao izy ka ho halany ianao.
  '18':
  - type: text
    content: Langilangy sy sabatra ary zana-tsipìka maranitra
  - type: text
    content: ny olona izay mitsangana ho vavolombelona mandainga hanameloka ny namany.
  '19':
  - type: text
    content: Toy ny nify simatsimaka sy ny tongotra mangozohozo
  - type: text
    content: ny fiankinana amin’ny mpamitaka amin’ny andro fahoriana.
  '2':
  - type: text
    content: Voninahitr’Andriamanitra ny manafin-javatra,
  - type: text
    content: fa voninahitry ny mpanjaka kosa ny mamanta-javatra.
  '20':
  - type: text
    content: Toy ny miala lamba amin’ny hatsiaka ary toy ny vinaingitra amin’ny sirahazo,
  - type: text
    content: dia toy izany ny mikalo amin’ny malahelo am-po.
  '21':
  - type: text
    content: Raha noana ny fahavalonao, omeo hanina izy;
  - type: text
    content: ary raha mangetaheta izy, omeo rano hosotroiny.
  '22':
  - type: text
    content: Fa amin’izany dia hanambatra vainafo ho eo ambonin’ny lohany ianao
  - type: text
    content: ary NY TOMPO no hamaly soa anao.
  '23':
  - type: text
    content: Ny rivotra avy any avaratra no mahatonga ranonorana,
  - type: text
    content: dia toy izany ny lelan’ny mpifosa, mahavinitra endrika.
  '24':
  - type: text
    content: 'Aleo mitoetra eo an-joron’ny '
  - type: text
    content: tampon-trano
  - type: text
    content: toy izay miray trano amin’ny vehivavy tia ady.
  '25':
  - type: text
    content: Rano mangatsiatsiaka amin’ny fanahy reraka
  - type: text
    content: ny filazana soa avy any an-tany lavitra.
  '26':
  - type: text
    content: Loharano voahosihosy sy fantsakana voaloto
  - type: text
    content: ny marina izay mihozongozona eo anatrehan’ny ratsy fanahy.
  '27':
  - type: text
    content: Tsy tsara ny mihinan-tantely be loatra
  - type: text
    content: na ny mitady voninahitra hanampy voninahitra.
  '28':
  - type: text
    content: Tanàna rava tsy misy manda
  - type: text
    content: ny lehilahy izay tsy mahatsindry ny fahatezerany.
  '3':
  - type: text
    content: Ny haavon’ny lanitra sy ny halalin’ny tany
  - type: text
    content: ary ny fon’ny mpanjaka dia samy tsy azo fantarina avokoa.
  '4':
  - type: text
    content: Esory ny taim-bolafotsy
  - type: text
    content: dia hisy fanaka ho an’ny mpandrendrika.
  '5':
  - type: text
    content: Esory ny ratsy fanahy tsy ho eo anatrehan’ny mpanjaka
  - type: text
    content: dia ho tafaorina amin’ny fahamarinana ny sezafiandrianany.
  '6':
  - type: text
    content: Aza manandra-tena eo anatrehan’ny mpanjaka
  - type: text
    content: ary aza mijoro eo amin’ny toeran’ny lehibe;
  '7':
  - type: text
    content: 'fa aleo ianao hantsoina hoe: Miakara etỳ!'
  - type: text
    content: Toy izay atambotsotra eo imason’ny manankaja izay hitan’ny masonao.
  '8':
  - type: text
    content: Aza maika hampiditra ady amin’ny fitsarana,
  - type: text
    content: satria, inona no hataonao amin’ny manaraka
  - type: text
    content: raha resin’ny mpiady aminao ianao?
  '9':
  - type: text
    content: Miadia ihany ny adinao amin’ny namanao,
  - type: text
    content: kanefa aza aseho izay tsy tian’ny sasany holazaina,
