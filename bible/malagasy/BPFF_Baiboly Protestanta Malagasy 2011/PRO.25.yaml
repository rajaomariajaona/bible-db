document_id: PRO.25
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Tenim-pahendrena samihafa
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ireto koa ny ohabolan’i Solomona, izay nangonin’ny olon’i Hezekia, mpanjakan’ny Joda:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Voninahitr’Andriamanitra ny manafin-javatra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa voninahitry ny mpanjaka kosa ny mamanta-javatra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ny haavon’ny lanitra sy ny halalin’ny tany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny fon’ny mpanjaka dia samy tsy azo fantarina avokoa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Esory ny taim-bolafotsy
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hisy fanaka ho an’ny mpandrendrika.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Esory ny ratsy fanahy tsy ho eo anatrehan’ny mpanjaka
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ho tafaorina amin’ny fahamarinana ny sezafiandrianany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Aza manandra-tena eo anatrehan’ny mpanjaka
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary aza mijoro eo amin’ny toeran’ny lehibe;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'fa aleo ianao hantsoina hoe: Miakara etỳ!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Toy izay atambotsotra eo imason’ny manankaja izay hitan’ny masonao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Aza maika hampiditra ady amin’ny fitsarana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria, inona no hataonao amin’ny manaraka
- type: usfm
  marker: q1
  children:
  - type: text
    text: raha resin’ny mpiady aminao ianao?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Miadia ihany ny adinao amin’ny namanao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: kanefa aza aseho izay tsy tian’ny sasany holazaina,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: fandrao izay mandre dia hanondro maso anao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy ho afaka aminao ny laza ratsy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ny teny atao amin’ny antony
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia paoma volamena misy ravaka volafotsy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Kavina volamena sy ravaka volamena tsara
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny mpananatra hendry, raha amin’ny sofina mihaino.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Toy ny hatsiakan’ny orampanala amin’ny taom-pijinjana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'dia toy izany ny iraka mahatoky amin’izay naniraka azy:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mamelombelona ny fon’ny tompony izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Toy ny rahona sy ny rivotra tsy misy orana
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny olona izay mirehaka mampanantena fanomezana tsy misy akory.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ny fahari-po no ahazoana mampanaiky ny mpitondra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny teny malefaka no mahatapaka taolana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Mahita tantely va ianao? Hano izay antonona anao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fandrao voky loatra ianao ka handoa azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Aza miditra matetika ao an-tranon’ny namanao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fandrao tofoka aminao izy ka ho halany ianao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Langilangy sy sabatra ary zana-tsipìka maranitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny olona izay mitsangana ho vavolombelona mandainga hanameloka ny namany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Toy ny nify simatsimaka sy ny tongotra mangozohozo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny fiankinana amin’ny mpamitaka amin’ny andro fahoriana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Toy ny miala lamba amin’ny hatsiaka ary toy ny vinaingitra amin’ny sirahazo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia toy izany ny mikalo amin’ny malahelo am-po.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Raha noana ny fahavalonao, omeo hanina izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary raha mangetaheta izy, omeo rano hosotroiny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Fa amin’izany dia hanambatra vainafo ho eo ambonin’ny lohany ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary NY TOMPO no hamaly soa anao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ny rivotra avy any avaratra no mahatonga ranonorana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia toy izany ny lelan’ny mpifosa, mahavinitra endrika.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Aleo mitoetra eo an-joron’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tampon-trano
- type: usfm
  marker: q1
  children:
  - type: text
    text: toy izay miray trano amin’ny vehivavy tia ady.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Rano mangatsiatsiaka amin’ny fanahy reraka
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny filazana soa avy any an-tany lavitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Loharano voahosihosy sy fantsakana voaloto
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny marina izay mihozongozona eo anatrehan’ny ratsy fanahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Tsy tsara ny mihinan-tantely be loatra
- type: usfm
  marker: q1
  children:
  - type: text
    text: na ny mitady voninahitra hanampy voninahitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Tanàna rava tsy misy manda
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny lehilahy izay tsy mahatsindry ny fahatezerany.
