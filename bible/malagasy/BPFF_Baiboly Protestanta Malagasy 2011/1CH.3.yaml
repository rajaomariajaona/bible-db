document_id: 1CH.3
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny taranak’i Davida
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Ampit. 2Sam 3.2-5
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Izao no zanakalahin’i Davida, izay naterany tao Hebrona: I Amnona, zanak’i Ahinoama jezirelita, no lahimatoa; i Daniela, zanak’i Abigaila karmelita, no lahiaivo; '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'i Absaloma, zanak’i Maka, zanakavavin’i Talmay mpanjakan’i Gesora, no fahatelo; i Adonia, zanak’i Hagita, no fahefatra; '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'i Sefatia, zanak’i Abitala, no fahadimy; i Jitireama, zanak’i Egla vadiny, no fahenina. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ireo enina ireo no naterany tao Hebrona; tao no nanjakany fito taona sy enim-bolana; tany Jerosalema kosa no nanjakany telo amby telopolo taona.
- type: usfm
  marker: r
  children:
  - type: text
    text: 2Sam 5.14-16
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ireto no naterany tany Jerosalema: I Simea, i Sobaba, i Natana ary i Solomona, ireo efa-dahy ireo dia naterany tamin’i Baty-Soa, zanakavavin’i Amiela; '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'i Jibara, i Elisama, i Elifeleta, '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'i Noga, i Nafega, i Jafia, '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'i Elisama, i Eliada ary Elifeleta; sivy izy ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Izy rehetra ireo no zanakalahin’i Davida, afa-tsy ny zanaky ny vady tsindranony; ny anabavin-dry zareo dia i Tamara.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ny zanakalahin’i Solomona dia i Rehoboama; i Abia no zanakalahin’i Rehoboama; i Asa no zanakalahin’i Abia; i Josafata no zanakalahin’i Asa; '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'i Jehorama no zanakalahin’i Josafata; i Ahazia no zanakalahin’i Jehorama; i Joasy no zanakalahin’i Ahazia, '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'i Amazia no zanakalahin’i Joasy; i Azaria no zanakalahin’Amazia; i Jotama no zanakalahin’i Azaria; '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'i Ahaza no zanakalahin’i Jotama; i Hezekia no zanakalahin’i Ahaza; i Manase no zanakalahin’i Hezekia; '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'i Amona no zanakalahin’i Manase; i Josia no zanakalahin’i Amona. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Izao no zanakalahin’i Josia: I Johanana, lahimatoa; i Joiakima, lahiaivo; i Zedekia, fahatelo ary i Saloma, faralahy. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ny zanakalahin’i Joiakima dia i Jekonia ary i Zedekia no zanak’i Jekonia.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ny zanakalahin’i Jekonia ilay mpifatotra tany Babilona dia i Sealtiela, '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'i Malkirama, i Pedaia, i Senazara, i Jekamia, i Hosama ary i Nedabia. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ny zanakalahin’i Pedaia dia i Zerobabela sy i Simey. Ny zanakalahin’i Zerobabela dia i Mesolama sy i Hanania ary i Selomita, anabaviny, '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'ary koa i Hasoba, i Ohela, i Berekia, i Hasadia ary i Josaba-Heseda; dimy izy ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ny zanakalahin’i Hanania dia i Pelatia, Isaia, ny zanakalahin’i Refaia, ny zanakalahin’i Arnana, ny zanakalahin’i Obadia ary ny zanakalahin’i Sekania. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ny zanakalahin’i Sekania dia i Semaia. Ny zanakalahin’i Semaia dia i Hatosy, i Jigala, i Baria, i Nearia ary i Safata; enina izy ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ny zanakalahin’i Nearia dia i Elioenay sy i Hezekia ary i Azrikama; telo izy ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Ny zanakalahin’i Elioenay dia i Hodaia, i Eliasiba, i Pelaia, i Akoba, i Johanana, i Delaia ary i Ananỳ; fito izy ireo.
