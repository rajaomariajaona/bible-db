document_id: 1CH.3,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny taranak’i Davida
  - type: heading
    content: Ampit. 2Sam 3.2-5
  - type: text
    content: 'Izao no zanakalahin’i Davida, izay naterany tao Hebrona: I Amnona, zanak’i Ahinoama jezirelita, no lahimatoa; i Daniela, zanak’i Abigaila karmelita, no lahiaivo; '
  '10':
  - type: text
    content: 'Ny zanakalahin’i Solomona dia i Rehoboama; i Abia no zanakalahin’i Rehoboama; i Asa no zanakalahin’i Abia; i Josafata no zanakalahin’i Asa; '
  '11':
  - type: text
    content: 'i Jehorama no zanakalahin’i Josafata; i Ahazia no zanakalahin’i Jehorama; i Joasy no zanakalahin’i Ahazia, '
  '12':
  - type: text
    content: 'i Amazia no zanakalahin’i Joasy; i Azaria no zanakalahin’Amazia; i Jotama no zanakalahin’i Azaria; '
  '13':
  - type: text
    content: 'i Ahaza no zanakalahin’i Jotama; i Hezekia no zanakalahin’i Ahaza; i Manase no zanakalahin’i Hezekia; '
  '14':
  - type: text
    content: 'i Amona no zanakalahin’i Manase; i Josia no zanakalahin’i Amona. '
  '15':
  - type: text
    content: 'Izao no zanakalahin’i Josia: I Johanana, lahimatoa; i Joiakima, lahiaivo; i Zedekia, fahatelo ary i Saloma, faralahy. '
  '16':
  - type: text
    content: Ny zanakalahin’i Joiakima dia i Jekonia ary i Zedekia no zanak’i Jekonia.
  '17':
  - type: text
    content: 'Ny zanakalahin’i Jekonia ilay mpifatotra tany Babilona dia i Sealtiela, '
  '18':
  - type: text
    content: 'i Malkirama, i Pedaia, i Senazara, i Jekamia, i Hosama ary i Nedabia. '
  '19':
  - type: text
    content: 'Ny zanakalahin’i Pedaia dia i Zerobabela sy i Simey. Ny zanakalahin’i Zerobabela dia i Mesolama sy i Hanania ary i Selomita, anabaviny, '
  '2':
  - type: text
    content: 'i Absaloma, zanak’i Maka, zanakavavin’i Talmay mpanjakan’i Gesora, no fahatelo; i Adonia, zanak’i Hagita, no fahefatra; '
  '20':
  - type: text
    content: 'ary koa i Hasoba, i Ohela, i Berekia, i Hasadia ary i Josaba-Heseda; dimy izy ireo. '
  '21':
  - type: text
    content: 'Ny zanakalahin’i Hanania dia i Pelatia, Isaia, ny zanakalahin’i Refaia, ny zanakalahin’i Arnana, ny zanakalahin’i Obadia ary ny zanakalahin’i Sekania. '
  '22':
  - type: text
    content: 'Ny zanakalahin’i Sekania dia i Semaia. Ny zanakalahin’i Semaia dia i Hatosy, i Jigala, i Baria, i Nearia ary i Safata; enina izy ireo. '
  '23':
  - type: text
    content: 'Ny zanakalahin’i Nearia dia i Elioenay sy i Hezekia ary i Azrikama; telo izy ireo. '
  '24':
  - type: text
    content: Ny zanakalahin’i Elioenay dia i Hodaia, i Eliasiba, i Pelaia, i Akoba, i Johanana, i Delaia ary i Ananỳ; fito izy ireo.
  '3':
  - type: text
    content: 'i Sefatia, zanak’i Abitala, no fahadimy; i Jitireama, zanak’i Egla vadiny, no fahenina. '
  '4':
  - type: text
    content: Ireo enina ireo no naterany tao Hebrona; tao no nanjakany fito taona sy enim-bolana; tany Jerosalema kosa no nanjakany telo amby telopolo taona.
  - type: heading
    content: 2Sam 5.14-16
  '5':
  - type: text
    content: 'Ireto no naterany tany Jerosalema: I Simea, i Sobaba, i Natana ary i Solomona, ireo efa-dahy ireo dia naterany tamin’i Baty-Soa, zanakavavin’i Amiela; '
  '6':
  - type: text
    content: 'i Jibara, i Elisama, i Elifeleta, '
  '7':
  - type: text
    content: 'i Noga, i Nafega, i Jafia, '
  '8':
  - type: text
    content: 'i Elisama, i Eliada ary Elifeleta; sivy izy ireo. '
  '9':
  - type: text
    content: Izy rehetra ireo no zanakalahin’i Davida, afa-tsy ny zanaky ny vady tsindranony; ny anabavin-dry zareo dia i Tamara.
