document_id: 2CO.4,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Rakitra ao anaty vilany tany
  - type: text
    content: 'Ary amin’izany, satria manana izany fanompoana izany izahay, araka ny nahazoanay famindrampo, dia tsy very ny fahasahianay. '
  '10':
  - type: text
    content: 'mitondra ny fahafatesan’i Jesosy hatrany ao amin’ny tena izahay mba haseho ao amin’ny tenanay koa ny fiainan’i Jesosy. '
  '11':
  - type: text
    content: 'Fa izahay izay velona dia atolotra ho amin’ny fahafatesana mandrakariva noho ny amin’i Jesosy, mba haseho ao amin’ny nofonay mety maty koa ny fiainan’i Jesosy. '
  '12':
  - type: text
    content: Koa ny fahafatesana no miasa ao aminay fa ny fiainana kosa no ao aminareo.
  '13':
  - type: text
    content: 'Ary satria manana izany fanahin’ny finoana izany indrindra izahay, araka ny voasoratra hoe: «Nino aho ka niteny» (Sal 116.10), dia mino koa izahay ka miteny; '
  '14':
  - type: text
    content: 'fa fantatray fa izay nanangana an’i Jesosy Tompo no hanangana anay koa miaraka amin’i Jesosy ka hametraka anay eo akaikiny miaraka aminareo. '
  '15':
  - type: text
    content: Fa ny zavatra rehetra dia natao noho ny aminareo mba hitomboan’ny fisaorana ho voninahitr’Andriamanitra noho ny fitombon’ny fahasoavana amin’ny maro.
  - type: heading
    content: Mahery mandrakariva
  '16':
  - type: text
    content: 'Ary tsy ketraka izahay; fa na dia mihalevona aza ny toetranay ivelany, dia havaozina isanandro isanandro kosa ny toetranay anatiny. '
  '17':
  - type: text
    content: 'Fa ny fahoriantsika ankehitriny dia maivana sy vetivety foana, ary manomana antsika ho amin’ny voninahitra mandrakizay izay tsy misy fetrany sady manan-danja lehibe. '
  '18':
  - type: text
    content: Raha tsy mijery ny hita isika fa ny tsy hita; fa ny hita dia mandalo ihany, fa ny tsy hita no haharitra mandrakizay.
  '2':
  - type: text
    content: 'Fa efa nolavinay ny zavatra takona mahamenatra ka tsy mandeha amin’ny hafetsena ratsy, na manatsatso ny tenin’Andriamanitra izahay; fa amin’ny fanehoana ny marina no ideranay tena amin’ny fieritreretan’ny olona rehetra eo imason’Andriamanitra. '
  '3':
  - type: text
    content: 'Fa raha miafina ny Filazantsara torinay dia miafina amin’izay ho very, '
  '4':
  - type: text
    content: 'satria amin’ireny dia nohajambain’ny andriamanitr’izao tontolo izao ny sainy tsy mino, mba tsy hamirapiratan’ny fahazavan’ny Filazantsaran’ny voninahitr’i '
  - type: text
    content: Kristy
  - type: text
    content: ' izay endrik’Andriamanitra.'
  '5':
  - type: text
    content: 'Fa tsy ny tenanay no torinay fa Kristy Jesosy Tompo, ary mpanomponareo noho ny amin’i Jesosy izahay. '
  '6':
  - type: text
    content: 'Fa Andriamanitra izay nandidy hoe: Aoka ny mazava hahazava ao amin’ny maizina, Izy no nampahazava ny fonay ho amin’ny fahazavan’ny fahalalana ny voninahitr’Andriamanitra eo amin’ny tavan’i Jesosy Kristy.'
  '7':
  - type: text
    content: 'Fa manana izao rakitra izao ao anaty vilany tany izahay, mba ho an’Andriamanitra ny halehiben’ny hery fa tsy ho avy aminay. '
  '8':
  - type: text
    content: 'Voageja manodidina izahay nefa tsy tery; very hevitra nefa tsy mamoy fo; '
  '9':
  - type: text
    content: 'enjehina nefa tsy nafoy; potraka nefa tsy maty; '
