document_id: 2CO.4
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Rakitra ao anaty vilany tany
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary amin’izany, satria manana izany fanompoana izany izahay, araka ny nahazoanay famindrampo, dia tsy very ny fahasahianay. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Fa efa nolavinay ny zavatra takona mahamenatra ka tsy mandeha amin’ny hafetsena ratsy, na manatsatso ny tenin’Andriamanitra izahay; fa amin’ny fanehoana ny marina no ideranay tena amin’ny fieritreretan’ny olona rehetra eo imason’Andriamanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Fa raha miafina ny Filazantsara torinay dia miafina amin’izay ho very, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'satria amin’ireny dia nohajambain’ny andriamanitr’izao tontolo izao ny sainy tsy mino, mba tsy hamirapiratan’ny fahazavan’ny Filazantsaran’ny voninahitr’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' izay endrik’Andriamanitra.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Fa tsy ny tenanay no torinay fa Kristy Jesosy Tompo, ary mpanomponareo noho ny amin’i Jesosy izahay. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Fa Andriamanitra izay nandidy hoe: Aoka ny mazava hahazava ao amin’ny maizina, Izy no nampahazava ny fonay ho amin’ny fahazavan’ny fahalalana ny voninahitr’Andriamanitra eo amin’ny tavan’i Jesosy Kristy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Fa manana izao rakitra izao ao anaty vilany tany izahay, mba ho an’Andriamanitra ny halehiben’ny hery fa tsy ho avy aminay. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Voageja manodidina izahay nefa tsy tery; very hevitra nefa tsy mamoy fo; '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'enjehina nefa tsy nafoy; potraka nefa tsy maty; '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'mitondra ny fahafatesan’i Jesosy hatrany ao amin’ny tena izahay mba haseho ao amin’ny tenanay koa ny fiainan’i Jesosy. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Fa izahay izay velona dia atolotra ho amin’ny fahafatesana mandrakariva noho ny amin’i Jesosy, mba haseho ao amin’ny nofonay mety maty koa ny fiainan’i Jesosy. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Koa ny fahafatesana no miasa ao aminay fa ny fiainana kosa no ao aminareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary satria manana izany fanahin’ny finoana izany indrindra izahay, araka ny voasoratra hoe: «Nino aho ka niteny» (Sal 116.10), dia mino koa izahay ka miteny; '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'fa fantatray fa izay nanangana an’i Jesosy Tompo no hanangana anay koa miaraka amin’i Jesosy ka hametraka anay eo akaikiny miaraka aminareo. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Fa ny zavatra rehetra dia natao noho ny aminareo mba hitomboan’ny fisaorana ho voninahitr’Andriamanitra noho ny fitombon’ny fahasoavana amin’ny maro.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mahery mandrakariva
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary tsy ketraka izahay; fa na dia mihalevona aza ny toetranay ivelany, dia havaozina isanandro isanandro kosa ny toetranay anatiny. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Fa ny fahoriantsika ankehitriny dia maivana sy vetivety foana, ary manomana antsika ho amin’ny voninahitra mandrakizay izay tsy misy fetrany sady manan-danja lehibe. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Raha tsy mijery ny hita isika fa ny tsy hita; fa ny hita dia mandalo ihany, fa ny tsy hita no haharitra mandrakizay.
