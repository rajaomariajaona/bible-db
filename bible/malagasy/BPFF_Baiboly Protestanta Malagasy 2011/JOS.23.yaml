document_id: JOS.23
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fananarana nataon’i Josoa
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Rehefa afaka fotoana ela, taorianan’ny nanomezan’NY TOMPO fitsaharana ho an’ny Israely ho afaka amin’ny fahavalony rehetra manodidina, ary efa zokiolona sady nandroso fahanterana i Josoa, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'dia nantsoin’i Josoa ny Israely rehetra, dia ny loholony, ny lehibeny, ny mpitsara azy ary ny mpifehy azy ka hoy izy taminy: Efa zokiolona aho izao ka mandroso fahanterana, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'ary ianareo dia efa nahita izay rehetra nataon’NY TOMPO Andriamanitrareo tamin’ireo firenena rehetra ireo teo anoloanareo; fa NY TOMPO Andriamanitrareo no niady ho anareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Indreo, efa voazarako ho lovan’ny fokonareo tamin’ny antsapaka ireo firenena sisa ireo, hatrany Jordana, mbamin’ny firenena rehetra izay nofongorako, ka hatramin’ny Ranomasina Lehibe any andrefana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary NY TOMPO Andriamanitrareo, Izy no handroaka ireny eo anoloanareo, dia hampiala azy eo anoloanareo. Ary handova ny taniny ianareo araka izay nolazain’NY TOMPO Andriamanitrareo taminareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia mahereza tsara ianareo mitandrina sy manatanteraka izay rehetra voasoratra ao amin’ny bokin’ny lalànan’i Mosesy, mba tsy hivilianareo hiala aminy, na ho amin’ny ankavanana, na ho amin’ny ankavia, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'mba tsy hankanesanareo any amin’ireo firenena sisa eo aminareo ireo. Ny anaran’ny andriamaniny dia aoka tsy hotononinareo na hampianiananareo akory, ary aza manompo azy na miankohoka eo anatrehany; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'fa NY TOMPO Andriamanitrareo ihany no ifikiro, araka ny nataonareo mandraka androany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Fa nandroaka firenena lehibe sy mahery teo anoloanareo NY TOMPO; ary tsy nisy olona nahajanona teo anoloanareo mandraka androany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ny lehilahy iray aminareo dia manenjika ny arivo; fa NY TOMPO Andriamanitrareo, Izy no miady ho anareo, araka izay nolazainy taminareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Tandremo tsara ny fanahinareo mba ho tia NY TOMPO Andriamanitrareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Fa raha mihemotra ianareo ka miray amin’ireo firenena sisa eo aminareo ireo ary mifanambady aminy ka miditra ao aminy, ary izy kosa ao aminareo, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: dia ho fantatrareo tokoa fa tsy handroaka ireo firenena ireo eo anoloanareo intsony NY TOMPO Andriamanitrareo; fa ho fandrika sy tonta aminareo ireo, ary ho fanindronana amin’ny tehezanareo sy ho tsilo eo amin’ny masonareo mandra-pahalany ritra anareo tsy ho eo amin’ity tany soa nomen’NY TOMPO Andriamanitrareo anareo ity.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary indro, efa handeha ho amin’ny lalana falehan’ny tany rehetra aho izao; ary fantatrareo ao amin’ny fonareo manontolo sy ny fanahinareo manontolo fa tsy misy latsaka na dia zavatra iray akory aza ny zava-tsoa rehetra izay nolazain’NY TOMPO Andriamanitrareo anareo; efa tanteraka taminareo avokoa izy rehetra: Tsy nisy latsaka izy na dia zavatra iray akory aza. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Tahaka ny efa nanatanterahana taminareo ny zava-tsoa rehetra izay nolazain’NY TOMPO Andriamanitrareo taminareo, no hanatanterahan’NY TOMPO aminareo kosa ny loza rehetra mandra-paharingany anareo tsy ho eo amin’ity tany soa nomen’NY TOMPO Andriamanitrareo anareo ity. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Amin’izay hivadihanareo ny faneken’NY TOMPO Andriamanitrareo izay nandidiany anareo sy handehananareo hanompo ireo andriamanitra hafa ary hiankohofanareo eo anatrehany dia hirehitra aminareo ny fahatezeran’NY TOMPO ary ho lany ringana haingana ianareo tsy ho eo amin’ny tany soa nomeny anareo.
