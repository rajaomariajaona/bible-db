document_id: JOS.23,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Fananarana nataon’i Josoa
  - type: text
    content: 'Rehefa afaka fotoana ela, taorianan’ny nanomezan’NY TOMPO fitsaharana ho an’ny Israely ho afaka amin’ny fahavalony rehetra manodidina, ary efa zokiolona sady nandroso fahanterana i Josoa, '
  '10':
  - type: text
    content: 'Ny lehilahy iray aminareo dia manenjika ny arivo; fa NY TOMPO Andriamanitrareo, Izy no miady ho anareo, araka izay nolazainy taminareo. '
  '11':
  - type: text
    content: 'Tandremo tsara ny fanahinareo mba ho tia NY TOMPO Andriamanitrareo. '
  '12':
  - type: text
    content: 'Fa raha mihemotra ianareo ka miray amin’ireo firenena sisa eo aminareo ireo ary mifanambady aminy ka miditra ao aminy, ary izy kosa ao aminareo, '
  '13':
  - type: text
    content: dia ho fantatrareo tokoa fa tsy handroaka ireo firenena ireo eo anoloanareo intsony NY TOMPO Andriamanitrareo; fa ho fandrika sy tonta aminareo ireo, ary ho fanindronana amin’ny tehezanareo sy ho tsilo eo amin’ny masonareo mandra-pahalany ritra anareo tsy ho eo amin’ity tany soa nomen’NY TOMPO Andriamanitrareo anareo ity.
  '14':
  - type: text
    content: 'Ary indro, efa handeha ho amin’ny lalana falehan’ny tany rehetra aho izao; ary fantatrareo ao amin’ny fonareo manontolo sy ny fanahinareo manontolo fa tsy misy latsaka na dia zavatra iray akory aza ny zava-tsoa rehetra izay nolazain’NY TOMPO Andriamanitrareo anareo; efa tanteraka taminareo avokoa izy rehetra: Tsy nisy latsaka izy na dia zavatra iray akory aza. '
  '15':
  - type: text
    content: 'Tahaka ny efa nanatanterahana taminareo ny zava-tsoa rehetra izay nolazain’NY TOMPO Andriamanitrareo taminareo, no hanatanterahan’NY TOMPO aminareo kosa ny loza rehetra mandra-paharingany anareo tsy ho eo amin’ity tany soa nomen’NY TOMPO Andriamanitrareo anareo ity. '
  '16':
  - type: text
    content: Amin’izay hivadihanareo ny faneken’NY TOMPO Andriamanitrareo izay nandidiany anareo sy handehananareo hanompo ireo andriamanitra hafa ary hiankohofanareo eo anatrehany dia hirehitra aminareo ny fahatezeran’NY TOMPO ary ho lany ringana haingana ianareo tsy ho eo amin’ny tany soa nomeny anareo.
  '2':
  - type: text
    content: 'dia nantsoin’i Josoa ny Israely rehetra, dia ny loholony, ny lehibeny, ny mpitsara azy ary ny mpifehy azy ka hoy izy taminy: Efa zokiolona aho izao ka mandroso fahanterana, '
  '3':
  - type: text
    content: 'ary ianareo dia efa nahita izay rehetra nataon’NY TOMPO Andriamanitrareo tamin’ireo firenena rehetra ireo teo anoloanareo; fa NY TOMPO Andriamanitrareo no niady ho anareo. '
  '4':
  - type: text
    content: 'Indreo, efa voazarako ho lovan’ny fokonareo tamin’ny antsapaka ireo firenena sisa ireo, hatrany Jordana, mbamin’ny firenena rehetra izay nofongorako, ka hatramin’ny Ranomasina Lehibe any andrefana. '
  '5':
  - type: text
    content: 'Ary NY TOMPO Andriamanitrareo, Izy no handroaka ireny eo anoloanareo, dia hampiala azy eo anoloanareo. Ary handova ny taniny ianareo araka izay nolazain’NY TOMPO Andriamanitrareo taminareo. '
  '6':
  - type: text
    content: 'Dia mahereza tsara ianareo mitandrina sy manatanteraka izay rehetra voasoratra ao amin’ny bokin’ny lalànan’i Mosesy, mba tsy hivilianareo hiala aminy, na ho amin’ny ankavanana, na ho amin’ny ankavia, '
  '7':
  - type: text
    content: 'mba tsy hankanesanareo any amin’ireo firenena sisa eo aminareo ireo. Ny anaran’ny andriamaniny dia aoka tsy hotononinareo na hampianiananareo akory, ary aza manompo azy na miankohoka eo anatrehany; '
  '8':
  - type: text
    content: 'fa NY TOMPO Andriamanitrareo ihany no ifikiro, araka ny nataonareo mandraka androany. '
  '9':
  - type: text
    content: 'Fa nandroaka firenena lehibe sy mahery teo anoloanareo NY TOMPO; ary tsy nisy olona nahajanona teo anoloanareo mandraka androany. '
