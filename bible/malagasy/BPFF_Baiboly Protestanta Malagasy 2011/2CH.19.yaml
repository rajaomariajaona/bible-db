document_id: 2CH.19,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Nanendry mpitsara tao Joda i Josafata
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Niverina soa amantsara ho any an-tranony tany Jerosalema i Josafata, mpanjakan’ny Joda. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Na inona na inona ady avy amin’ny rahalahinareo izay monina amin’ny tanànany, na ny amin’ny mahafaty aina, na ny amin’ny hevitry ny lalàna sy ny didy ary ny fitsipika samihafa, dia anaro izy mba tsy ho meloka amin’NY TOMPO, fandrao iharan’ny fahatezerana ianareo sy ny rahalahinareo; izany no ataovy dia tsy ho meloka ianareo. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Ary indro, i Amaria mpisoronabe no ho lehibenareo amin’ny raharahan’NY TOMPO rehetra; i Zebadia, zanak’Ismaela, mpifehy ny taranak’i Joda, kosa no ho lehibenareo amin’ny raharahan’ny mpanjaka rehetra; ary ho mpifehy hanampy anareo ny levita. Mahereza ka mahefà, ary NY TOMPO anie homba izay manao ny tsara.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Niainga hitsena azy i Jeho, zanak’i Hanany mpahita ka niteny tamin’i Josafata mpanjaka hoe: Moa ny ratsy fanahy va no tokony hampiana, ary izay mankahala NY TOMPO va no tokony ho tianao? Koa izany no mahatezitra NY TOMPO aminao. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Nefa mba misy fahatsaram-panahy hita ihany aminao, fa noravanao tsy ho eo amin’ny tany ny tsangankazon-tsampy ho an’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Aseraha
    - type: text
      text: ', sady nampiomana ny fonao hitady an’Andriamanitra ianao.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Nitoetra tany Jerosalema i Josafata; ary nandeha nitety ny olona indray izy hatrany Bery-Sheba ka hatrany amin’ny tany be havoana any Efraima ka nampiverina ny olona ho amin’NY TOMPO, Andriamanitry ny razany. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ary nanendry mpitsara tamin’ny tany izy, dia tamin’ny isan-tanàna mimanda manerana ny tanin’ny Joda, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'ka niteny tamin’izy ireo hoe: Tandremo izay hataonareo; fa tsy ho an’olona no hitsaranareo fa ho an’NY TOMPO, sady momba anareo ao amin’ny fitsarana Izy. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Koa aoka ho ao aminareo ny tahotra NY TOMPO; tandremo ka ataovy izany, fa tsy mba misy heloka amin’NY TOMPO Andriamanitsika, na fizahan-tavan’olona, na fandraisana kolikoly.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Tany Jerosalema koa no nanendren’i Josafata ny sasany tamin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: levita
    - type: text
      text: ' sy ny mpisorona ary ny lohan’ny fianakaviana tamin’ny Israely ho amin’ny fitsaran’NY TOMPO sy ny adin’olona, fa efa tafaverina tany Jerosalema izy tamin’izay, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'dia nandidy azy ireo izy hoe: Izao no hataonareo amin’ny fahatahorana NY TOMPO sy amin’ny fahamarinana ary amin’ny fo mahitsy: '
