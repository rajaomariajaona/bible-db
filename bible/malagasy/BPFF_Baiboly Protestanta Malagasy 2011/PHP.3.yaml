document_id: PHP.3,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fomba maha marina eo anatrehan’Andriamanitra
  - type: text
    content: Farany, ry rahalahy, mifalia ao amin’ny Tompo. Tsy manahirana ahy ny manoratra teny averina fa mahatsara anareo izany.
  '10':
  - type: text
    content: 'Eny, mba ho fantatro Izy sy ny herin’ny fitsanganany tamin’ny maty ary ny fiombonana amin’ny fijaliany ka hampitoviana amin’ny endriky ny fahafatesany aho, '
  '11':
  - type: text
    content: raha mba misy hahatratrarako ny fitsanganana amin’ny maty.
  - type: heading
    content: Manatratra ny tanjona
  '12':
  - type: text
    content: 'Tsy toy ny efa nahazo sahady aho na efa tanteraka sahady; fa miezaka aho hihazona izay nihazonan’i '
  - type: text
    content: Kristy
  - type: text
    content: ' Jesosy ahy. '
  '13':
  - type: text
    content: 'Ry rahalahy, tsy mihevi-tena ho efa nahazo aho; fa zavatra iray loha no ataoko: Manadino izay zavatra ao aoriana ka miezaka hanatratra izay zavatra eo aloha; '
  '14':
  - type: text
    content: 'eny, miezaka hanatratra ny marika aho hahazoako ny lokan’ny fiantsoan’Andriamanitra any ambony ao amin’i Kristy Jesosy. '
  '15':
  - type: text
    content: 'Koa aoka isika rehetra izay tanteraka hisaina toy izany; fa hasehon’Andriamanitra aminareo izany raha sendra manana sain-kafa ianareo. '
  '16':
  - type: text
    content: Kanefa aoka ho amin’ilay efa azontsika sahady no mbola hizorantsika.
  '17':
  - type: text
    content: 'Ry rahalahy, aoka samy hanahaka ahy ianareo ka diniho izay mandeha tahaka ny anananareo anay ho marika. '
  '18':
  - type: text
    content: 'Fa maro no mandeha, izay efa nolazaiko taminareo matetika, sady mbola lazaiko aminareo amin’ny fitomaniana koa ankehitriny kanefa fahavalon’ny hazofijalian’i Kristy ireny; '
  '19':
  - type: text
    content: 'fahaverezana no hiafarany, ny kibony no andriamaniny, ny fahamenarany no voninahiny, tsy misaina afa-tsy ny zavatry ny tany izy. '
  '2':
  - type: text
    content: 'Mitandrema tena amin’ny amboa, mitandrema tena amin’ny mpanao ratsy, mitandrema tena amin’ny mpomba ny famorana ivelany fotsiny. '
  '20':
  - type: text
    content: 'Fa ny fanjakantsika dia any an-danitra ary avy any koa no iandrasantsika Mpamonjy, dia Jesosy Kristy Tompo, '
  '21':
  - type: text
    content: izay hanova ny tenantsika voaetry hitovy endrika amin’ny tenan’ny voninahiny, araka ny fiasan’ny heriny, izay ahaizany mampanaiky ny zavatra rehetra ho eo ambany fahefany.
  '3':
  - type: text
    content: 'Fa isika no voafora, izay manompo amin’ny Fanahin’Andriamanitra ary mirehareha ao amin’i '
  - type: text
    content: Kristy
  - type: text
    content: ' Jesosy ka tsy mitoky amin’ny nofo. '
  '4':
  - type: text
    content: Kanefa mba manana izay itokiako amin’ny nofo ihany aho.
  - type: text
    content: 'Raha misy olona mihevitra hitoky amin’ny nofo dia manoatra noho izany aho: '
  '5':
  - type: text
    content: 'Voafora tamin’ny andro fahavalo aho; ary avy amin’ny fototr’Israely, dia avy amin’ny fokon’i Benjamina; Hebreo sady avy amin’ny Hebreo aho; araka ny lalàna dia '
  - type: text
    content: Fariseo
  - type: text
    content: '; '
  '6':
  - type: text
    content: araka ny zotom-po dia nanenjika ny fiangonana
  - type: note
    content: 'Na: eklesia.'
  - type: text
    content: ; araka ny fahamarinana avy amin’ny lalàna dia tsy nanan-tsiny.
  '7':
  - type: text
    content: 'Nefa izay azoko ho tombony dia nataoko fatiantoka kosa noho ny amin’i Kristy. '
  '8':
  - type: text
    content: 'Eny tokoa, fa ataoko ho fatiantoka avokoa ny zavatra rehetra noho ny maha ambony indrindra ny hatsaran’ny fahalalana an’i Kristy Jesosy Tompoko. Noho Izy no nanaovako ho fatiantoka ny zavatra rehetra ka ataoko ho toy ny taimboraka ireny mba hahazoako an’i Kristy; '
  '9':
  - type: text
    content: 'ary mba ho hita ao Aminy ho tsy manana ny fahamarinako izay avy amin’ny lalàna aho, fa izay avy amin’ny finoana an’i Kristy, dia ny fahamarinan’Andriamanitra amin’ny finoana. '
