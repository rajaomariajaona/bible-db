document_id: PHP.3
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fomba maha marina eo anatrehan’Andriamanitra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Farany, ry rahalahy, mifalia ao amin’ny Tompo. Tsy manahirana ahy ny manoratra teny averina fa mahatsara anareo izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Mitandrema tena amin’ny amboa, mitandrema tena amin’ny mpanao ratsy, mitandrema tena amin’ny mpomba ny famorana ivelany fotsiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Fa isika no voafora, izay manompo amin’ny Fanahin’Andriamanitra ary mirehareha ao amin’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' Jesosy ka tsy mitoky amin’ny nofo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Kanefa mba manana izay itokiako amin’ny nofo ihany aho.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Raha misy olona mihevitra hitoky amin’ny nofo dia manoatra noho izany aho: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Voafora tamin’ny andro fahavalo aho; ary avy amin’ny fototr’Israely, dia avy amin’ny fokon’i Benjamina; Hebreo sady avy amin’ny Hebreo aho; araka ny lalàna dia '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Fariseo
  - type: text
    text: '; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: araka ny zotom-po dia nanenjika ny fiangonana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.6 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: eklesia.
    marker-yv: yv-n
  - type: text
    text: ; araka ny fahamarinana avy amin’ny lalàna dia tsy nanan-tsiny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Nefa izay azoko ho tombony dia nataoko fatiantoka kosa noho ny amin’i Kristy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Eny tokoa, fa ataoko ho fatiantoka avokoa ny zavatra rehetra noho ny maha ambony indrindra ny hatsaran’ny fahalalana an’i Kristy Jesosy Tompoko. Noho Izy no nanaovako ho fatiantoka ny zavatra rehetra ka ataoko ho toy ny taimboraka ireny mba hahazoako an’i Kristy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'ary mba ho hita ao Aminy ho tsy manana ny fahamarinako izay avy amin’ny lalàna aho, fa izay avy amin’ny finoana an’i Kristy, dia ny fahamarinan’Andriamanitra amin’ny finoana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Eny, mba ho fantatro Izy sy ny herin’ny fitsanganany tamin’ny maty ary ny fiombonana amin’ny fijaliany ka hampitoviana amin’ny endriky ny fahafatesany aho, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: raha mba misy hahatratrarako ny fitsanganana amin’ny maty.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Manatratra ny tanjona
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Tsy toy ny efa nahazo sahady aho na efa tanteraka sahady; fa miezaka aho hihazona izay nihazonan’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' Jesosy ahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ry rahalahy, tsy mihevi-tena ho efa nahazo aho; fa zavatra iray loha no ataoko: Manadino izay zavatra ao aoriana ka miezaka hanatratra izay zavatra eo aloha; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'eny, miezaka hanatratra ny marika aho hahazoako ny lokan’ny fiantsoan’Andriamanitra any ambony ao amin’i Kristy Jesosy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Koa aoka isika rehetra izay tanteraka hisaina toy izany; fa hasehon’Andriamanitra aminareo izany raha sendra manana sain-kafa ianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Kanefa aoka ho amin’ilay efa azontsika sahady no mbola hizorantsika.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ry rahalahy, aoka samy hanahaka ahy ianareo ka diniho izay mandeha tahaka ny anananareo anay ho marika. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Fa maro no mandeha, izay efa nolazaiko taminareo matetika, sady mbola lazaiko aminareo amin’ny fitomaniana koa ankehitriny kanefa fahavalon’ny hazofijalian’i Kristy ireny; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'fahaverezana no hiafarany, ny kibony no andriamaniny, ny fahamenarany no voninahiny, tsy misaina afa-tsy ny zavatry ny tany izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Fa ny fanjakantsika dia any an-danitra ary avy any koa no iandrasantsika Mpamonjy, dia Jesosy Kristy Tompo, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: izay hanova ny tenantsika voaetry hitovy endrika amin’ny tenan’ny voninahiny, araka ny fiasan’ny heriny, izay ahaizany mampanaiky ny zavatra rehetra ho eo ambany fahefany.
