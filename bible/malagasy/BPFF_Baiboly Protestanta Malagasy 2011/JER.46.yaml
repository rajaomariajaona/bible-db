document_id: JER.46,3103
type_code: plt
verses:
  '1':
  - type: text
    content: 'Ny tenin’NY TOMPO izay tonga tamin’i Jeremia mpaminany ny amin’ny '
  - type: text
    content: Jentilisa
  - type: text
    content: .
  - type: heading
    content: Ny faharesen’ny Ejiptiana tany Karkemisy
  '10':
  - type: text
    content: Fa izao andro izao dia an’NY TOMPO, Andriamanitra Tompon’izao rehetra izao,
  - type: text
    content: ho andro famaliana
  - type: text
    content: hamaliany ny fahavalony;
  - type: text
    content: dia hihinana ny sabatra ka ho voky
  - type: text
    content: ary ho mamon’ny ran’ireo;
  - type: text
    content: fa ny Tompo, dia NY TOMPO, Andriamanitra Tompon’izao rehetra izao, no mamono zavatra hatao fanatitra
  - type: text
    content: any amin’ny tany avaratra eo amoron’ny ony Eofrata.
  '11':
  - type: text
    content: Miakara any Gileada ka makà balisama, ry Ejipta zanakavavy virijiny;
  - type: text
    content: foana ny nanaovanao fanafody maro,
  - type: text
    content: fa tsy manana fanafody hanasitranana ny ferinao ianao.
  '12':
  - type: text
    content: Efa ren’ny firenena ny henatrao
  - type: text
    content: ary ny fiantsoantsoanao dia nanenika ny tany;
  - type: text
    content: fa mifandona ny samy mahery
  - type: text
    content: ka miaraka lavo izy roa tonta.
  - type: heading
    content: Fanafihana an’i Ejipta
  '13':
  - type: text
    content: Ny teny izay nolazain’NY TOMPO tamin’i Jeremia mpaminany ny amin’ny hiavian’i Nebokadnezara, mpanjakan’i Babilona, hamely ny tany Ejipta.
  '14':
  - type: text
    content: Ambaraonareo any Ejipta
  - type: text
    content: ary torio any Migdola,
  - type: text
    content: eny, torio any Nofa sy Tapanesa
  - type: text
    content: 'ka lazao hoe: Mijoroa tsara ianao ka miomàna;'
  - type: text
    content: fa mandringana manodidina anao ny sabatra.
  '15':
  - type: text
    content: Nahoana no voapaoka ny maherinao?
  - type: text
    content: Tsy nahafahatra izy satria NY TOMPO no nandroaka azy.
  '16':
  - type: text
    content: Efa nahatafintohina ny maro Izy
  - type: text
    content: 'ka lavo mifanindry ireo; dia hoy ireo:'
  - type: text
    content: Mitsangàna ka andeha isika hiverina ho any amin’ny firenentsika
  - type: text
    content: sy ho any amin’ny tany nahaterahantsika
  - type: text
    content: ho afaka amin’ny sabatra mandoza.
  '17':
  - type: text
    content: 'Nantsoina hoe:'
  - type: text
    content: Tabataba foana i Farao, mpanjakan’i Ejipta, nefa nandiso ny fotoana nifanarahana izy.
  '18':
  - type: text
    content: Raha velona koa Aho,
  - type: text
    content: 'hoy ny Mpanjaka, ny anarany dia Andriamanitra, Tompon’izao rehetra izao:'
  - type: text
    content: Tahaka an’i Tabara amin’ny tendrombohitra
  - type: text
    content: sy tahaka an’i Karmela ao amoron-dranomasina, dia ho tahaka izany no hiaviany.
  '19':
  - type: text
    content: Ry mponina ao Ejipta,
  - type: text
    content: ampirimo ny entana hoentinao any amin’ny fahababoana;
  - type: text
    content: fa ho tonga tany lao Nofa,
  - type: text
    content: eny, hodorana izy
  - type: text
    content: ka tsy hisy mponina.
  '2':
  - type: text
    content: 'Ny amin’i Ejipta. Ny amin’ny miaramilan’i Farao-Neko, mpanjakan’i Ejipta, izay teny amoron’ny ony Eofrata, tany Karkemisy, dia ilay resin’i Nebokadnezara, mpanjakan’i Babilona, tamin’ny taona fahefatra nanjakan’i Joiakima, zanak’i Josia, mpanjakan’ny Joda:'
  '20':
  - type: text
    content: Ejipta dia tahaka ny ombivavy kely tena tsara tarehy;
  - type: text
    content: Fa injay tamy! Eny, tamy ny fihitra avy any avaratra!
  '21':
  - type: text
    content: Na dia ny olona mpikarama an’ady ao aminy aza,
  - type: text
    content: izay tahaka ny ombilahy kely mifahy,
  - type: text
    content: ireny koa dia mihodina ka samy mandositra avokoa; tsy mahajanona izy
  - type: text
    content: fa tonga aminy ny andro hahitany loza,
  - type: text
    content: dia ny andro hamaliana azy.
  '22':
  - type: text
    content: Ny feony dia toy ny fikasaotsaoky ny menarana mandeha;
  - type: text
    content: fa mandeha mitondra miaramila izy
  - type: text
    content: ka avy hamely azy amin’ny famaky
  - type: text
    content: toy ny mpikapa hazo.
  '23':
  - type: text
    content: Kapainy ny alany,
  - type: text
    content: hoy NY TOMPO,
  - type: text
    content: satria efa nikirindro loatra;
  - type: text
    content: fa maro noho ny valala izy
  - type: text
    content: ka tsy tambo isaina.
  '24':
  - type: text
    content: Ho afa-baraka i Ejipta zanakavavy,
  - type: text
    content: hatolotra eo an-tanan’ny olona any avaratra izy.
  '25':
  - type: text
    content: 'Ary hoy Andriamanitra, Tompon’izao rehetra izao, Andriamanitry ny Israely: Indro, hovaliko i Amona avy any No, ary i Farao sy i Ejipta mbamin’ny andriamaniny sy ny mpanjakany, dia i Farao sy izay rehetra matoky azy; '
  '26':
  - type: text
    content: ary hatolotro eo an-tanan’izay mitady ny ainy izy, dia eo an-tanan’i Nebokadnezara, mpanjakan’i Babilona, sy eo an-tanan’ny mpanompony. Ary aorianan’izany, dia ho azo honenana toy ny tamin’ny andro fahiny ihany indray izy, hoy NY TOMPO.
  - type: heading
    content: Afaka Israely
  '27':
  - type: text
    content: Fa aza matahotra ianao,
  - type: text
    content: ry Jakoba mpanompoko,
  - type: text
    content: ary aza mivadi-po, ry Israely!
  - type: text
    content: Fa indro, hovonjeko avy any amin’ny tany lavitra ianao,
  - type: text
    content: ary ny taranakao avy any amin’ny tany nahababo azy;
  - type: text
    content: dia hiverina i Jakoba ka hiadana,
  - type: text
    content: eny, handry fehizay izy ka tsy hisy hanaitaitra azy.
  '28':
  - type: text
    content: Aza matahotra ianao,
  - type: text
    content: ry Jakoba mpanompoko,
  - type: text
    content: hoy NY TOMPO,
  - type: text
    content: fa momba anao Aho.
  - type: text
    content: Fa na dia levoniko aza
  - type: text
    content: ny firenena rehetra izay nandroahako anao
  - type: text
    content: dia tsy mba holevoniko ianao,
  - type: text
    content: nefa kosa mba hanariko araka ny fitsarako ihany ianao
  - type: text
    content: fa tsy dia havelako fotsiny.
  '3':
  - type: text
    content: Mivonòna amin’ny ampinga kely sy ny ampinga lehibe
  - type: text
    content: ka mandrosoa hiady;
  '4':
  - type: text
    content: fehezo amin’ny kalesy fitondra miady ny soavaly
  - type: text
    content: ary itaingeno ny soavaly fitaingina;
  - type: text
    content: mijoroa tsara ianareo ka samia misatroka fiarovan-doha;
  - type: text
    content: fotsio ny lefona,
  - type: text
    content: miakanjoa ny akanjo fiarovan-tratra.
  '5':
  - type: text
    content: Indrisy inona ity hitako! Raiki-tahotra
  - type: text
    content: sy miamboho izy,
  - type: text
    content: ary ny maheriny aza dia efa ripaka
  - type: text
    content: sady miezaka mandositra izy ka tsy miherika akory;
  - type: text
    content: fa misy fampangorohoroana manodidina,
  - type: text
    content: hoy NY TOMPO.
  '6':
  - type: text
    content: Tsy ho afa-mandositra ny haingam-pandeha,
  - type: text
    content: na ho afaka ny mahery;
  - type: text
    content: any avaratra eo amoron’ny ony Eofrata
  - type: text
    content: no hahatafintohina sy hahalavo azy.
  '7':
  - type: text
    content: Iza moa izato mizotra tahaka an’i Neily
  - type: text
    content: ary misamboaravoara toy ny renirano ny onjany?
  '8':
  - type: text
    content: Ejipta dia mizotra tahaka an’i Neily
  - type: text
    content: sady misamboaravoara toy ny renirano ny onjany;
  - type: text
    content: 'ary hoy izy: Hizotra aho'
  - type: text
    content: ka hanafotra ny tany;
  - type: text
    content: haringako ny tanàna sy ny mponina ao aminy.
  '9':
  - type: text
    content: Miakara, ianareo soavaly,
  - type: text
    content: ary miriota toy ny adala, ianareo kalesy fitondra miady;
  - type: text
    content: ary aoka hiainga ny lehilahy mahery,
  - type: text
    content: dia ny Kosy sy ny Pota
  - type: text
    content: izay mitana ampinga,
  - type: text
    content: ary ny Loda
  - type: text
    content: izay mitana sy manenjana tsipìka.
