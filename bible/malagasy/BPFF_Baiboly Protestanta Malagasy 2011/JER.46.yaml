document_id: JER.46,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ny tenin’NY TOMPO izay tonga tamin’i Jeremia mpaminany ny amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jentilisa
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny faharesen’ny Ejiptiana tany Karkemisy
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Fa izao andro izao dia an’NY TOMPO, Andriamanitra Tompon’izao rehetra izao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho andro famaliana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hamaliany ny fahavalony;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hihinana ny sabatra ka ho voky
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ho mamon’ny ran’ireo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny Tompo, dia NY TOMPO, Andriamanitra Tompon’izao rehetra izao, no mamono zavatra hatao fanatitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: any amin’ny tany avaratra eo amoron’ny ony Eofrata.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Miakara any Gileada ka makà balisama, ry Ejipta zanakavavy virijiny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: foana ny nanaovanao fanafody maro,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa tsy manana fanafody hanasitranana ny ferinao ianao.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Efa ren’ny firenena ny henatrao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny fiantsoantsoanao dia nanenika ny tany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa mifandona ny samy mahery
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka miaraka lavo izy roa tonta.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fanafihana an’i Ejipta
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Ny teny izay nolazain’NY TOMPO tamin’i Jeremia mpaminany ny amin’ny hiavian’i Nebokadnezara, mpanjakan’i Babilona, hamely ny tany Ejipta.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Ambaraonareo any Ejipta
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary torio any Migdola,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, torio any Nofa sy Tapanesa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ka lazao hoe: Mijoroa tsara ianao ka miomàna;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa mandringana manodidina anao ny sabatra.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Nahoana no voapaoka ny maherinao?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy nahafahatra izy satria NY TOMPO no nandroaka azy.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Efa nahatafintohina ny maro Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ka lavo mifanindry ireo; dia hoy ireo:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mitsangàna ka andeha isika hiverina ho any amin’ny firenentsika
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ho any amin’ny tany nahaterahantsika
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho afaka amin’ny sabatra mandoza.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Nantsoina hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tabataba foana i Farao, mpanjakan’i Ejipta, nefa nandiso ny fotoana nifanarahana izy.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Raha velona koa Aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'hoy ny Mpanjaka, ny anarany dia Andriamanitra, Tompon’izao rehetra izao:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tahaka an’i Tabara amin’ny tendrombohitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy tahaka an’i Karmela ao amoron-dranomasina, dia ho tahaka izany no hiaviany.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Ry mponina ao Ejipta,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ampirimo ny entana hoentinao any amin’ny fahababoana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ho tonga tany lao Nofa,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, hodorana izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy hisy mponina.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Ny amin’i Ejipta. Ny amin’ny miaramilan’i Farao-Neko, mpanjakan’i Ejipta, izay teny amoron’ny ony Eofrata, tany Karkemisy, dia ilay resin’i Nebokadnezara, mpanjakan’i Babilona, tamin’ny taona fahefatra nanjakan’i Joiakima, zanak’i Josia, mpanjakan’ny Joda:'
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Ejipta dia tahaka ny ombivavy kely tena tsara tarehy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa injay tamy! Eny, tamy ny fihitra avy any avaratra!
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Na dia ny olona mpikarama an’ady ao aminy aza,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay tahaka ny ombilahy kely mifahy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ireny koa dia mihodina ka samy mandositra avokoa; tsy mahajanona izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa tonga aminy ny andro hahitany loza,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ny andro hamaliana azy.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Ny feony dia toy ny fikasaotsaoky ny menarana mandeha;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa mandeha mitondra miaramila izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka avy hamely azy amin’ny famaky
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toy ny mpikapa hazo.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Kapainy ny alany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy NY TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria efa nikirindro loatra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa maro noho ny valala izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy tambo isaina.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Ho afa-baraka i Ejipta zanakavavy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hatolotra eo an-tanan’ny olona any avaratra izy.
  '25':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Ary hoy Andriamanitra, Tompon’izao rehetra izao, Andriamanitry ny Israely: Indro, hovaliko i Amona avy any No, ary i Farao sy i Ejipta mbamin’ny andriamaniny sy ny mpanjakany, dia i Farao sy izay rehetra matoky azy; '
  '26':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: ary hatolotro eo an-tanan’izay mitady ny ainy izy, dia eo an-tanan’i Nebokadnezara, mpanjakan’i Babilona, sy eo an-tanan’ny mpanompony. Ary aorianan’izany, dia ho azo honenana toy ny tamin’ny andro fahiny ihany indray izy, hoy NY TOMPO.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Afaka Israely
    marker-yv: yv-h
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Fa aza matahotra ianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ry Jakoba mpanompoko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary aza mivadi-po, ry Israely!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa indro, hovonjeko avy any amin’ny tany lavitra ianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny taranakao avy any amin’ny tany nahababo azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hiverina i Jakoba ka hiadana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, handry fehizay izy ka tsy hisy hanaitaitra azy.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Aza matahotra ianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ry Jakoba mpanompoko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy NY TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa momba anao Aho.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa na dia levoniko aza
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny firenena rehetra izay nandroahako anao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia tsy mba holevoniko ianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa kosa mba hanariko araka ny fitsarako ihany ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa tsy dia havelako fotsiny.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Mivonòna amin’ny ampinga kely sy ny ampinga lehibe
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka mandrosoa hiady;
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: fehezo amin’ny kalesy fitondra miady ny soavaly
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary itaingeno ny soavaly fitaingina;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mijoroa tsara ianareo ka samia misatroka fiarovan-doha;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fotsio ny lefona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: miakanjoa ny akanjo fiarovan-tratra.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Indrisy inona ity hitako! Raiki-tahotra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy miamboho izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny maheriny aza dia efa ripaka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady miezaka mandositra izy ka tsy miherika akory;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa misy fampangorohoroana manodidina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy NY TOMPO.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Tsy ho afa-mandositra ny haingam-pandeha,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na ho afaka ny mahery;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: any avaratra eo amoron’ny ony Eofrata
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no hahatafintohina sy hahalavo azy.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Iza moa izato mizotra tahaka an’i Neily
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary misamboaravoara toy ny renirano ny onjany?
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Ejipta dia mizotra tahaka an’i Neily
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady misamboaravoara toy ny renirano ny onjany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ary hoy izy: Hizotra aho'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hanafotra ny tany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: haringako ny tanàna sy ny mponina ao aminy.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Miakara, ianareo soavaly,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary miriota toy ny adala, ianareo kalesy fitondra miady;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary aoka hiainga ny lehilahy mahery,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ny Kosy sy ny Pota
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay mitana ampinga,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny Loda
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay mitana sy manenjana tsipìka.
