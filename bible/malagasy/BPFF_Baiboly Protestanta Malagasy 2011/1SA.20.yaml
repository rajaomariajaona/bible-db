document_id: 1SA.20,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Manao fifanekena i Davida sy i Jonatana
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Nandositra niala tao Naiota any Rama i Davida dia tonga teo anatrehan’i Jonatana ka nilaza taminy hoe: Inona no nataoko? Inona no heloko? Ary inona no fahotako teo anatrehan-drainao no dia mitady ny aiko izy? '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Dia hoy i Davida tamin’i Jonatana: Iza no hanambara amiko, raha teny masiaka no avalin-drainao anao? '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Hoy i Jonatana tamin’i Davida: Andeha ary isika ho any an-tsaha. Dia nandeha ho any an-tsaha izy roa lahy. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Ary hoy i Jonatana tamin’i Davida: NY TOMPO, Andriamanitry ny Israely, no vavolombelona! Rehefa avy nofotorako tsara ny hevitry ny raiko rahampitso na afaka ampitso toy izao ka indro, misy soa ho an’i Davida, nefa tsy maniraka ho any aminao aho mba hanambara izany aminao, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'dia hataon’NY TOMPO toy izany anie i Jonatana; eny, mihoatra noho izany aza; fa raha kasain’ny raiko kosa ny hanisy ratsy anao dia hambarako aminao ka halefako ianao mba handehananao amin’ny fiadanana; ary homba anao tahaka ny tamin’ny raiko anie NY TOMPO. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Raha mbola velona ihany aho, moa tsy hasehonao ahy va ny fiantran’NY TOMPO mba tsy hahafaty ahy? '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Tsy hesorinao mandrakizay amin’ny taranako koa ny famindramponao; eny, na dia avy aza izay hanesoran’NY TOMPO ny fahavalon’i Davida rehetra tsy ho etỳ ambonin’ny tany. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Dia nanao fanekena ny amin’ny taranak’i Davida i Jonatana hoe: NY TOMPO no hamaly ny fahavalon’i Davida. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Ary mbola nampianiana an’i Davida indray i Jonatana noho ny fitiavany azy, satria tiany toy ny tenany izy.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Hoy i Jonatana: Rahampitso no ho tsinana ny volana; ary ho hita fa tsy eo ianao satria ho banga ny toeranao. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Koa amin’ny andro fahatelo dia midìna haingana ianao ka tongava ao amin’ilay toerana izay nierenao tamin’ny andro nitrangan’ilay raharaha iny
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.19 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Zahao '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 19.2, 3.
      marker-yv: yv-n
    - type: text
      text: ', ary mitoera eo anilan’ny vato Ezela. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Hoy i Jonatana taminy: Sanatria izany! Tsy ho faty ianao. Indro, tsy misy tsy ambaran’Ikaky ahy izay ataony na zava-dehibe na kely, koa hataon’Ikaky ahoana no fanafina izany zavatra izany amiko? Tsy misy izany. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Dia handefa zana-tsipìka telo ho eo anilany, toy ny mikendry marika aho. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Ary indro, haniraka zatovo aho ka hilaza hoe: Mandehana, tadiavo ny zana-tsipìka. Koa raha lazaiko amin’ilay zatovo mazava tsara hoe: Indreo eo aoriananao ny zana-tsipìka, ento etỳ, dia avia ianao, fa hipetraka amin’ny fiadanana ianao, ary tsy hisy haninona anao raha velona koa NY TOMPO. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Fa raha hoy kosa aho amin’ilay zatovo: Indreo eo alohanao ny zana-tsipìka, dia mandehana ianao, satria NY TOMPO no mampandeha anao. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Ary ny amin’ilay noresahantsika, izany hoe izaho sy ianao, indro, NY TOMPO no vavolombelona amiko sy aminao mandrakizay.
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Dia niery tany an-tsaha i Davida.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fankahalan’i Saoly an’i Davida
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nony tsinana ny volana dia nipetraka hihinana ny mpanjaka. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Nipetraka tahaka ny isanandro ihany ny mpanjaka, teo amin’ny toerana eo anilan’ny rindrina, ary i Jonatana dia nitsangana fa i Abnera no nipetraka teo anilan’i Saoly; foana kosa ny toeran’i Davida. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Tsy niteny na inona na inona anefa i Saoly tamin’iny andro iny satria hoy izy: Nisy zavatra nanjo an’i Davida ka tsy madio izy; eny, tsy madio izy. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Tamin’ny andro faharoa, izany hoe ny ampitson’ny tsinam-bolana, dia mbola banga ihany ny toeran’i Davida ka hoy i Saoly tamin’i Jonatana zanany: Nahoana no tsy mba tonga nihinana ny zanak’i Jese omaly sy androany? '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Ary namaly an’i Saoly i Jonatana hoe: Niera fatratra tamiko i Davida mba hankany Betlehema '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'ka niteny hoe: Miangavy anao aho, aoka handeha aho, fa izahay mianakavy dia manao fanatitra any an-tanàna ka asain’ny rahalahiko ho any aho; koa ankehitriny, raha mahita fitia eo imasonao aho, miangavy anao aho, aoka aho handeha hamangy ny rahalahiko. Izany no tsy mba nahatongavany teto amin’ny latabatry ny mpanjaka. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Ary nianiana indray i Davida hoe: Fantatry ny rainao tokoa fa efa mahita fitia eo imasonao aho ka hoy izy: Aoka tsy ho fantatr’i Jonatana izany, fandrao malahelo izy; fa raha velona koa NY TOMPO, ary raha velona koa ny fanahinao, toy ny indray mandingana monja no manelanelana ahy amin’ny fahafatesana.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Dia nirehitra tamin’i Jonatana ny fahatezeran’i Saoly ka hoy izy taminy: Zanaky ny vehivavy maditra sy mpikomy ianao! Moa tsy fantatro va fa mifidy ny zanak’i Jese ianao ho henatrao sy ho henatry ny fitanjahan’ny reninao. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Satria amin’ny andro rehetra ahaveloman’iny zanak’i Jese iny etỳ ambonin’ny tany dia tsy ho tafatoetra tsara ianao na ny fanjakanao. Koa mandefasa iraka haka azy ho atỳ amiko, fa tokony ho faty izy. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Hoy anefa i Jonatana tamin’ny rainy: Nahoana no hovonoina izy? Inona no nataony? '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Ary nanambana handefona azy i Saoly ka fantatr’i Jonatana fa nofofoin’ny rainy hovonoina i Davida. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: Dia nitsangana niala teo amin’ny latabatra i Jonatana, sady nirehitra ny fahatezerany ka tsy nihinan-kanina izy tamin’ny ampitson’ny tsinam-bolana; fa nalahelo an’i Davida izy, satria nanala baraka azy ny rainy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mampitandrina an’i Davida i Jonatana
    marker-yv: yv-h
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Nony maraina dia nandeha ho any an-tsaha i Jonatana tamin’ilay fotoana nifanaovany tamin’i Davida ary nisy zatovo nanaraka azy. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Hoy izy tamin’ilay zatovo: Mihazakazaha ka tadiavo ny zana-tsipìka alefako. Nony nihazakazaka ilay zatovo dia nalefany nihoatra azy ny zana-tsipìka. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Rehefa tonga teo amin’ilay nisy ny zana-tsipìka nalefan’i Jonatana ilay zatovo dia nantsoin’i Jonatana izy hoe: Tsy ireo alohanao ireo va ny zana-tsipìka? '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Ary niantso ilay zatovo i Jonatana hoe: Haingàna dia haingàna ka aza mijanonjanona. Ary ny zatovolahin’i Jonatana nanangona ny zana-tsipìka dia niverina teo amin’ny tompony. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Nefa ilay zatovo dia tsy nahalala na inona na inona fa i Jonatana sy i Davida ihany no nahalala ny anton’izany. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Dia hoy i Jonatana tamin’i Davida: Na inona na inona no angatahinao dia hataoko aminao izany. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'Dia nomen’i Jonatana ilay zatovo ny fiadiany ka hoy izy taminy: Mandehana ka ento ho any an-tanàna ireto. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'Nony lasa ilay zazalahy dia nitsangana avy any atsimo i Davida ka niankohoka tamin’ny tany sady niondrika intelo, ary nifanoroka izy roa lahy ka samy nitomany; nefa ny an’i Davida dia mafy kokoa. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'Hoy i Jonatana tamin’i Davida: Mandehana soa amantsara; fa efa nianiana tamin’ny anaran’NY TOMPO isika roa lahy hoe: NY TOMPO no vavolombelona amiko sy aminao ary amin’ny taranako sy ny taranakao mandrakizay.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Hoy i Davida tamin’i Jonatana: Indro, ho tsinam-bolana rahampitso, ary tokony hiara-mipetraka hihinana amin’ny mpanjaka aho; nefa avelao aho handeha hiery any an-tsaha ambara-piavin’ny afaka ampitso hariva. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Koa rehefa hitan’ny rainao fa tsy eo aho dia ataovy hoe: Niera fatratra tamiko i Davida mba hikaretsaka kely any Betlehema tanànany; fa misy fanatitra fanaon’ny fianakaviany manontolo any isan-taona. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ary raha lazainy hoe: Tsara izany, dia fiadanana no ho an’ny mpanomponao; fa raha tezitra mafy kosa izy dia aoka ho fantatrao tsara fa misy ratsy ifofoany ahy. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Koa asehoy amin’ny mpanomponao ny hatsaram-ponao; fa nampanaovinao ny faneken’NY TOMPO aminao ny mpanomponao; nefa raha manan-keloka aho dia aoka ianao ihany no hahafaty ahy, fa nahoana no hoentinao any amin’ny rainao aho?
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Hoy anefa i Jonatana: Sanatria raha hahazo anao izany! Raha fantatro tokoa fa misy ratsy ifofoan’Ikaky anao dia hambarako aminao mihitsy izany. '
