  '1':
  - type: heading
    content: Ampahafantaro ny lalanao aho
  - type: text
    content: Nataon’i Davida.
  - type: heading
    content: alef א
  - type: text
    content: Aminao, TOMPO ô, no anandratako ny fanahiko.
  - type: heading
    content: bet ב
  '10':
  - type: text
    content: Ny lalan’NY TOMPO rehetra dia famindrampo sy fahamarinana
  - type: text
