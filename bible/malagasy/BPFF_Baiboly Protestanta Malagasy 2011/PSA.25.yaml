  - type: heading
    content: vav ו
  - type: text
    content: Ianao no andrasako mandritra ny andro.
  - type: heading
    content: zaìn ז
  '6':
  - type: text
    content: Tsarovy ny antranao sy ny indrafonao, TOMPO ô,
  - type: text
    content: fa efa hatrizay hatrizay ireny.
  - type: heading
    content: het ח
  '7':
  - type: text
    content: Aza ny fahotan’ny fahatanorako na ny ratsy nataoko no tsarovanao,
  - type: text
    content: fa aoka ho araka ny famindramponao no hahatsiarovanao ahy, noho ny fahasoavanao, TOMPO ô!
  - type: heading
    content: tet ט
  '8':
  - type: text
    content: Tsara sy mahitsy NY TOMPO,
  - type: text
    content: koa izany no anoroany lalana ny mpanota.
  - type: heading
    content: iod י
  '9':
  - type: text
    content: Mampandeha ny mpandefitra amin’ny fahamarinana Izy
  - type: text
