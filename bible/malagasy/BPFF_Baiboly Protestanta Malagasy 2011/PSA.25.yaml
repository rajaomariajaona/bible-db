    content: fa manantena Anao aho!
  '22':
  - type: text
    content: Andriamanitra ô,
  - type: text
    content: afaho amin’ny fahoriany rehetra ny Israely
  '3':
  - type: text
    content: Eny, tsy hisy hitsanga-menatra izay rehetra manantena Anao,
  - type: text
    content: fa izay mivadika foana no ho menatra.
  - type: heading
    content: dalet ד
  '4':
  - type: text
    content: Ampahafantaro ny lalanao aho, TOMPO ô,
