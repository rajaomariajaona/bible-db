    content: Izy no hampianariny izay lalana tokony hofidiny.
  - type: heading
    content: non נ
  '13':
  - type: text
    content: Hitoetra amin’ny soa izy
  - type: text
    content: ary handova ny tany ny taranany.
  - type: heading
    content: samek ס
  '14':
  - type: text
    content: Ny fisainana miafin’NY TOMPO dia asehony amin’izay matahotra Azy
  - type: text
    content: ary ny fanekeny no hampahafantariny azy.
  - type: heading
    content: aìn ע
  '15':
  - type: text
    content: Mijery NY TOMPO mandrakariva ny masoko
