    content: fa Izy no nanafaka ny tongotro tamin’ny fandrika harato.
  - type: heading
    content: pe פ
  '16':
  - type: text
    content: Todiho aho ka amindrao fo
  - type: text
    content: fa irery aho ka ory.
  - type: heading
    content: tsade צ
  '17':
  - type: text
    content: Mitombo ny fahorian’ny foko;
  - type: text
    content: afaho amin’ny fahatereko aho.
  - type: heading
    content: res ר
  '18':
  - type: text
    content: Jereo ny fahoriako sy ny mavesatra amiko
  - type: text
    content: ka mamelà ny fahotako rehetra!
  '19':
  - type: text
    content: Jereo ny fahavaloko fa marobe izy
  - type: text
    content: ary loza ny fankahalany ahy.
  - type: heading
    content: sin שׁ
  '2':
  - type: text
    content: Andriamanitro ô, Ianao no itokiako, aoka tsy hitsanga-menatra aho!
  - type: text
    content: Aoka tsy hibitahan’ny fahavaloko aho!
  - type: heading
    content: gimel ג
  '20':
  - type: text
    content: Arovy aho mba ho velona ka vonjeo aho!
  - type: text
    content: Aoka tsy hitsanga-menatra aho
  - type: text
    content: fa mialoka Aminao.
  - type: heading
    content: tao ת
  '21':
  - type: text
    content: Aoka ny tsy fananan-tsiny sy ny fahitsiana no hiaro ahy
