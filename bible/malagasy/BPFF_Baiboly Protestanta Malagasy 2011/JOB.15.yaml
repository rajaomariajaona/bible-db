document_id: JOB.15
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Ny teny fanindroany nataon’i Elifaza: Tsy ho afa-maina ny ratsy fanahy'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Dia nandray fitenenana i Elifaza temanita:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Tokony handahatra hevi-dravina va ny olon-kendry
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hameno ny kibony amin’ny rivotra avy any atsinanana?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Hamaly amin’ny teny tsy mahasoa
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny teny tsy mahatsara va izy?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Eny, foananao ny fahatahorana an’Andriamanitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tampenanao ny dinika eo anatrehany;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: fa ny helokao no manesika ny vavanao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mifidy ny fitenin’ny olom-petsy ianao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ny vavanao ihany no manameloka anao fa tsy izaho
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny molotrao ihany no mamely anao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ianao va no olombelona nateraka voalohany?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sa, naloaky ny kibo talohan’ny havoana va ianao?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ianao va nihaino teo amin’ny filankevitra teo amin’Andriamanitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka voarombakao ho anao irery ny fahendrena?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Inona no fantatrao ka tsy mba fantatray koa
- type: usfm
  marker: q1
  children:
  - type: text
    text: na saina azonao ka tsy ato aminay koa?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ny zokiolona sy ny fotsy volo dia misy ato aminay;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, olona ela niainana noho ny rainao aza.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ataonao ho tsinontsinona va ny fampiononana avy amin’Andriamanitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny teny natao taminao amin’ny halemem-panahy?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Nahoana no dia entin’ny fonao ianao?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary nahoana no mikimpikimpy foana ny masonao
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ka miefonefona amin’Andriamanitra ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady miteniteny foana ny vavanao?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Inona ny zanak’olombelona no mba hadio izy?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary izay tera-behivavy no mba ho marina?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Indro ireo masiny aza dia tsy mahatoky Azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny lanitra aza dia tsy madio eo imasony;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: koa mainka fa izay vetaveta sy tena ratsy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ny olona izay misotro heloka toy ny rano!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Hanambara aminao aho ka mihainoa ahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa izay efa hitako no hotantaraiko,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: dia zavatra notorin’ny olon-kendry
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa tsy nafeniny, dia izay azony avy tamin’ny razany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ireny ihany no nomena ny tany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy nisy olona hafa firenena nisisika teo aminy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Mijalijaly amin’ny androny rehetra ny ratsy fanahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: na firy na firy ny taona voatendry ho an’ny mpampihorohoro.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Feo mampitahotra no ren’ny sofiny
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary na dia miadana aza izy dia avy hamely azy ihany ny mpandroba.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Tsy manantena ho afaka amin’ny maizina izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: miandry azy ny sabatra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Mirenireny hitady izay hohaniny izy ka miteny hoe: Aiza re?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fantany fa antomotra azy ny andro maizina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Fahoriana sy fahaporetana no mampitahotra azy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mandresy azy ireo tahaka ny mpanjaka efa vonona ho amin’ny ady
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: satria nanatsotra ny tanany hanohitra an’Andriamanitra izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary nirehareha hanohitra ny Tsitoha.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Mimaona amin’ny hamafian-katoka izy hamely Azy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia amin’ny vohon’ny ampingany matevina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Rakotry ny tavy ny tarehiny
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mivalon-kotraka ny andilany;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: nefa honina ao amin’ny tanàna rava izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ao amin’ny trano tsy tokony hitoeran’olona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay voatendry ho korontam-bato.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Tsy hanankarena intsony izy sady tsy haharitra ny heriny
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy ho vokatra ambonin’ny tany ny fananany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Tsy ho afaka hiala amin’ny maizina izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny solofony dia hikainkona azon’ny lelafo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho levon’ny fofonain’Andriamanitra izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Aoka tsy ho voafitaka hatoky zava-poana izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa zava-poana no ho valiny homena azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Raha mbola tsy tonga aza ny fetrandrony dia manjo azy izany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy ho maitso ny sampany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Ho tahaka ny voaloboka manintsana ny voany manta izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ho tahaka ny hazo oliva mampiraraka ny voniny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Fa tsy ho vanona ny ankohonan’ny mpihatsaravelatsihy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ho lanin’ny afo ny tranolain’ny mpitoroka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Torontoronina fampahoriana izy ka miteraka fasiahana
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny kibony dia mamorom-pitaka.
