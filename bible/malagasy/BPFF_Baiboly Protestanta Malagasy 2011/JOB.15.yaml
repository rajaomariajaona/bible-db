document_id: JOB.15,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: 'Ny teny fanindroany nataon’i Elifaza: Tsy ho afa-maina ny ratsy fanahy'
  - type: text
    content: 'Dia nandray fitenenana i Elifaza temanita:'
  '10':
  - type: text
    content: Ny zokiolona sy ny fotsy volo dia misy ato aminay;
  - type: text
    content: eny, olona ela niainana noho ny rainao aza.
  '11':
  - type: text
    content: Ataonao ho tsinontsinona va ny fampiononana avy amin’Andriamanitra
  - type: text
    content: sy ny teny natao taminao amin’ny halemem-panahy?
  '12':
  - type: text
    content: Nahoana no dia entin’ny fonao ianao?
  - type: text
    content: Ary nahoana no mikimpikimpy foana ny masonao
  '13':
  - type: text
    content: ka miefonefona amin’Andriamanitra ianao
  - type: text
    content: sady miteniteny foana ny vavanao?
  '14':
  - type: text
    content: Inona ny zanak’olombelona no mba hadio izy?
  - type: text
    content: Ary izay tera-behivavy no mba ho marina?
  '15':
  - type: text
    content: Indro ireo masiny aza dia tsy mahatoky Azy
  - type: text
    content: ary ny lanitra aza dia tsy madio eo imasony;
  '16':
  - type: text
    content: koa mainka fa izay vetaveta sy tena ratsy,
  - type: text
    content: dia ny olona izay misotro heloka toy ny rano!
  '17':
  - type: text
    content: Hanambara aminao aho ka mihainoa ahy,
  - type: text
    content: fa izay efa hitako no hotantaraiko,
  '18':
  - type: text
    content: dia zavatra notorin’ny olon-kendry
  - type: text
    content: fa tsy nafeniny, dia izay azony avy tamin’ny razany.
  '19':
  - type: text
    content: Ireny ihany no nomena ny tany
  - type: text
    content: ary tsy nisy olona hafa firenena nisisika teo aminy.
  '2':
  - type: text
    content: Tokony handahatra hevi-dravina va ny olon-kendry
  - type: text
    content: ka hameno ny kibony amin’ny rivotra avy any atsinanana?
  '20':
  - type: text
    content: Mijalijaly amin’ny androny rehetra ny ratsy fanahy,
  - type: text
    content: na firy na firy ny taona voatendry ho an’ny mpampihorohoro.
  '21':
  - type: text
    content: Feo mampitahotra no ren’ny sofiny
  - type: text
    content: ary na dia miadana aza izy dia avy hamely azy ihany ny mpandroba.
  '22':
  - type: text
    content: Tsy manantena ho afaka amin’ny maizina izy;
  - type: text
    content: miandry azy ny sabatra.
  '23':
  - type: text
    content: 'Mirenireny hitady izay hohaniny izy ka miteny hoe: Aiza re?'
  - type: text
    content: Fantany fa antomotra azy ny andro maizina.
  '24':
  - type: text
    content: Fahoriana sy fahaporetana no mampitahotra azy.
  - type: text
    content: Mandresy azy ireo tahaka ny mpanjaka efa vonona ho amin’ny ady
  '25':
  - type: text
    content: satria nanatsotra ny tanany hanohitra an’Andriamanitra izy
  - type: text
    content: ary nirehareha hanohitra ny Tsitoha.
  '26':
  - type: text
    content: Mimaona amin’ny hamafian-katoka izy hamely Azy,
  - type: text
    content: dia amin’ny vohon’ny ampingany matevina.
  '27':
  - type: text
    content: Rakotry ny tavy ny tarehiny
  - type: text
    content: ary mivalon-kotraka ny andilany;
  '28':
  - type: text
    content: nefa honina ao amin’ny tanàna rava izy,
  - type: text
    content: dia ao amin’ny trano tsy tokony hitoeran’olona,
  - type: text
    content: izay voatendry ho korontam-bato.
  '29':
  - type: text
    content: Tsy hanankarena intsony izy sady tsy haharitra ny heriny
  - type: text
    content: ka tsy ho vokatra ambonin’ny tany ny fananany.
  '3':
  - type: text
    content: Hamaly amin’ny teny tsy mahasoa
  - type: text
    content: sy ny teny tsy mahatsara va izy?
  '30':
  - type: text
    content: Tsy ho afaka hiala amin’ny maizina izy;
  - type: text
    content: ny solofony dia hikainkona azon’ny lelafo;
  - type: text
    content: ho levon’ny fofonain’Andriamanitra izy.
  '31':
  - type: text
    content: Aoka tsy ho voafitaka hatoky zava-poana izy,
  - type: text
    content: fa zava-poana no ho valiny homena azy.
  '32':
  - type: text
    content: Raha mbola tsy tonga aza ny fetrandrony dia manjo azy izany
  - type: text
    content: ary tsy ho maitso ny sampany.
  '33':
  - type: text
    content: Ho tahaka ny voaloboka manintsana ny voany manta izy
  - type: text
    content: ary ho tahaka ny hazo oliva mampiraraka ny voniny.
  '34':
  - type: text
    content: Fa tsy ho vanona ny ankohonan’ny mpihatsaravelatsihy
  - type: text
    content: ary ho lanin’ny afo ny tranolain’ny mpitoroka.
  '35':
  - type: text
    content: Torontoronina fampahoriana izy ka miteraka fasiahana
  - type: text
    content: ary ny kibony dia mamorom-pitaka.
  '4':
  - type: text
    content: Eny, foananao ny fahatahorana an’Andriamanitra
  - type: text
    content: ary tampenanao ny dinika eo anatrehany;
  '5':
  - type: text
    content: fa ny helokao no manesika ny vavanao
  - type: text
    content: ary mifidy ny fitenin’ny olom-petsy ianao.
  '6':
  - type: text
    content: Ny vavanao ihany no manameloka anao fa tsy izaho
  - type: text
    content: ary ny molotrao ihany no mamely anao.
  '7':
  - type: text
    content: Ianao va no olombelona nateraka voalohany?
  - type: text
    content: Sa, naloaky ny kibo talohan’ny havoana va ianao?
  '8':
  - type: text
    content: Ianao va nihaino teo amin’ny filankevitra teo amin’Andriamanitra
  - type: text
    content: ka voarombakao ho anao irery ny fahendrena?
  '9':
  - type: text
    content: Inona no fantatrao ka tsy mba fantatray koa
  - type: text
    content: na saina azonao ka tsy ato aminay koa?
