document_id: NUM.33,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ireo toerana nijanonana hatramin’ny nivoahana tany Ejipta
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ireto avy no toerana nijanonan’ny Zanak’Israely, izay noentin’i Mosesy sy i Arona nivoaka avy tany amin’ny tany Ejipta araka ny antokony. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Niala tao Elima dia nitoby teo amoron’ny Ranomasina Mena. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Niala tao amoron’ny Ranomasina Mena dia nitoby tany an-tany efitra Sina. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Niala tany an-tany efitra Sina dia nitoby tao Dopka. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Niala tao Dopka dia nitoby tao Alosy. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Niala tao Alosy dia nitoby tao Refidima na dia tsy nisy rano hosotroin’ny olona aza tao. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Niala tao Refidima dia nitoby tany an-tany efitr’i Sinay.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Niala tany an-tany efitr’i Sinay dia nitoby tao Kibrota-Hatava. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Niala tao Kibrota-Hatava dia nitoby tao Hazerota. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Niala tao Hazerota dia nitoby tao Ritma. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Niala tao Ritma dia nitoby tao Rimona-Pareza. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Notanan’i Mosesy an-tsoratra ny toerana niaingany sy nijanonany, araka izay didin’NY TOMPO; ireto ny toerana nijanonany, araka ny diany:'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Niala tao Rimona-Pareza dia nitoby tao Libna. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Niala tao Libna dia nitoby tao Risa. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Niala tao Risa dia nitoby tao Kehelata. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Niala tao Kehelata dia nitoby tao an-tendrombohitra Sefera. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Niala tao an-tendrombohitra Sefera dia nitoby tao Harada. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Niala tao Harada dia nitoby tao Makelota. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Niala tao Makelota dia nitoby tao Tahata. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Niala tao Tahata dia nitoby tao Tara. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Niala tao Tara dia nitoby tao Mitka. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Niala tao Mitka dia nitoby tao Hasmona. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Niala tao Ramesesa izy ireo tamin’ny volana voalohany, dia tamin’ny andro fahadimy amby folo tamin’ny volana voalohany. Ny ampitson’ny Paska no nivoahan’ny Zanak’Israely tamin’ny fahafahana tanteraka, teo imason’ny Ejiptiana rehetra, '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Niala tao Hasmona dia nitoby tao Moserota.
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Niala tao Moserota dia nitoby tao Bene-Jakana. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Niala tao Bene-Jakana dia nitoby tao Hora-Gidigada. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Niala tao Hora-Gidigada dia nitoby tao Jotbata. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Niala tao Jotbata dia nitoby tao Abrona. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Niala tao Abrona dia nitoby tao Eziona-Gebera. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Niala tao Eziona-Gebera dia nitoby tany an-tany efitra Zina na Kadesy. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: Niala tao Kadesy dia nitoby tao amin’ny tendrombohitra Hora, tao an-tsisin’ny tanin’i Edoma.
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Ary niakatra tao amin’ny tendrombohitra Hora i Arona mpisorona, araka ny didin’NY TOMPO, dia maty tao izy tamin’ny fahefapolo taona taorianan’ny nivoahan’ny Zanak’Israely tany amin’ny tany Ejipta, tamin’ny andro voalohany tamin’ny volana fahadimy. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: Telo amby roapolo amby zato taona i Arona raha maty tao amin’ny tendrombohitra Hora.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: fa mbola nandevina izay novonoin’NY TOMPO teo aminy ny Ejiptiana, dia ny lahimatoa rehetra; ny andriamaniny dia notsarain’NY TOMPO.
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: Ary ren’ilay Kananita, mpanjakan’i Arada, izay nonina teo amin’ny tany Negeva, any amin’ny tany Kanana, fa avy ny Zanak’Israely.
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'Niala tao amin’ny tendrombohitra Hora izy ireo dia nitoby tao Zalmona. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'Niala tao Zalmona dia nitoby tao Ponona. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'Niala tao Ponona dia nitoby tao Obota. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: Niala tao Obota dia nitoby tao Ie-Abarima tao amin’ny sisintanin’i Moaba.
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: 'Niala tao Ie-Abarima dia nitoby tao Dibona-Gada. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: 'Niala tao Dibona-Gada dia nitoby tao Almona-Diblataima. '
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: 'Niala tao Almona-Diblataima dia nitoby tao amin’ny tendrombohitra Abarima, tandrifin’i Nebo. '
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: 'Niala tamin’ny tendrombohitra Abarima dia nitoby tany Arbota-Moaba, teo amoron’i Jordana tandrifin’i Jeriko. '
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: Ary nitoby teo amoron’i Jordana hatrany Bety-Jesimota ka hatrany Abela-Sitima, tany Arbota-Moaba.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Didy nomen’Andriamanitra momba ny fizarana an’i Kanana
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Niala tao Ramesesa ny Zanak’Israely dia nitoby tao Sokota. '
  '50':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '50'
    - type: text
      text: 'Ary NY TOMPO niteny tamin’i Mosesy tany amin’ireo tany lemaka ngazana tany Moaba, teo amoron’i Jordana, tandrifin’i Jeriko hoe: '
  '51':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '51'
    - type: text
      text: 'Mitenena amin’ny Zanak’Israely hoe: Rehefa tafita an’i Jordana ianareo ka tonga any amin’ny tany Kanana '
  '52':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '52'
    - type: text
      text: 'dia horoahinareo eo alohanareo ny mponina rehetra amin’ny tany ary horavanareo ny sampy vatony rehetra, holevoninareo ny sarin-javatra narendrika voalasitra rehetra nataony, hopotehinareo ny toerana fanaovany sorona rehetra; '
  '53':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '53'
    - type: text
      text: 'dia halainareo ny tany ka honina ao ianareo; fa ianareo no nomeko ny tany mba ho zarataninareo. '
  '54':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '54'
    - type: text
      text: 'Antsapaka no hizaranareo ny tany araka ny fianakavianareo avy. Ny maro an’isa dia homenareo zaratany bebe kokoa ary ny vitsy an’isa kosa dia homenareo kelikely kokoa; samy ao amin’izay tondroin’ny antsapaka ho azy no ho anjarany. Araka ny fokon’ny razanareo no hahazoanareo zaratany. '
  '55':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '55'
    - type: text
      text: 'Fa raha tsy roahinareo eo alohanareo ny mponina amin’ny tany dia ho lay amin’ny masonareo sy ho tsilo amin’ny tehezanareo izay avelanareo hitoetra eo ka handrafy anareo eo amin’ny tany izay onenanareo izy ireny; '
  '56':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '56'
    - type: text
      text: ary hataoko aminareo izay nokasaiko hatao aminy.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Niala tao Sokota dia nitoby tao Etama, izay teo an-tsisin’ny tany efitra. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Niala tao Etama dia niverina nankany Py-Hahirota, izay tandrifin’i Baala-Zefona ka nitoby tandrifin’i Migdola. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Niala avy teo anoloan’i Hahirota ka nandeha nita teo afovoan’ny ranomasina ho any an-tany efitra, dia nandeha lalan-kateloana tany an-tany efitra Etama ary nitoby tao Mara. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Niala tao Mara dia nankany Elima; tao Elima dia nisy loharano roa amby folo sy hazo daty fitopolo, dia nitoby teo. '
