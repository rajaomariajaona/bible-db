document_id: ZEC.10,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: NY TOMPO irery ihany no manome ny fanambinana sy ny fahafahana
  - type: text
    content: Mangataha ranonorana amin’NY TOMPO ianareo
  - type: text
    content: amin’ny andron’ny faraorana!
  - type: text
    content: NY TOMPO no manao ny oram-baratra.
  - type: text
    content: Ranonorana mivatravatra no homeny azy,
  - type: text
    content: Eny, samy homeny ny zava-maitso any an-tsaha ireny.
  '10':
  - type: text
    content: Dia hampody azy avy any amin’ny tany Ejipta Aho
  - type: text
    content: sy hanangona azy avy any Asiria;
  - type: text
    content: ary any amin’ny tany Gileada sy Libanona no hampidirako azy
  - type: text
    content: ka tsy ho omby azy izany.
  '11':
  - type: text
    content: Dia hamakivaky ny ranomasim-pahoriana izy;
  - type: text
    content: hamely ny onjan-dranomasina NY TOMPO.
  - type: text
    content: Ho ritra ny rano lalin’i Neily rehetra;
  - type: text
    content: haetry ny avonavon’i Asiria
  - type: text
    content: ary hesorina ny tehina fanapahan’i Ejipta.
  '12':
  - type: text
    content: Dia hampahereziko ao amin’NY TOMPO izy
  - type: text
    content: ka amin’ny anarany no handehanany, hoy NY TOMPO.
  '2':
  - type: text
    content: 'Fa ny '
  - type: text
    content: terafima
  - type: text
    content: ' dia niteny zava-poana'
  - type: text
    content: ary ny mpisikidy nahita fahitana mandainga
  - type: text
    content: ka nilaza nofy lainga,
  - type: text
    content: Foana ny fampiononana nataony.
  - type: text
    content: Koa izany no naniasiavany toy ny ondry;
  - type: text
    content: ory izy, satria tsy misy mpiandry.
  - type: heading
    content: Eksodosy vaovao
  '3':
  - type: text
    content: Amin’ny mpiandry ondry no irehetan’ny fahatezerako
  - type: text
    content: ary ireo osilahy no hovaliko;
  - type: text
    content: Fa Andriamanitra, Tompon’izao rehetra izao, no namangy ny taranak’i Joda, ondry andrasany,
  - type: text
    content: ka manao azy toy ny soavaliny miravaka ao amin’ny ady.
  '4':
  - type: text
    content: Avy ao aminy no hiavian’ny vato fehizoro,
  - type: text
    content: avy ao aminy no hiavian’ny tsatòkan’ny tranolay,
  - type: text
    content: avy ao aminy no hiavian’ny tsipìka fiadiana,
  - type: text
    content: avy ao aminy no hiavian’ny mpitarika rehetra.
  '5':
  - type: text
    content: Ho toy ny lehilahy mahery ireo,
  - type: text
    content: izay manitsaka ny fotaka eny an-dalana amin’ny ady;
  - type: text
    content: hiady izy, satria NY TOMPO no momba azy;
  - type: text
    content: ary ny mpitaingin-tsoavaly dia hitafy henatra.
  '6':
  - type: text
    content: Hampahery ny taranak’i Joda Aho
  - type: text
    content: ary hovonjeko ny taranak’i Josefa ka hampodiko indray,
  - type: text
    content: satria mamindra fo aminy Aho
  - type: text
    content: ka ho toy izay tsy nariako izy;
  - type: text
    content: fa Izaho no TOMPO Andriamaniny ka hihaino azy.
  '7':
  - type: text
    content: Ho toy ny lehilahy mahery i Efraima,
  - type: text
    content: ary hifaly toy ny azon’ny divay ny fony;
  - type: text
    content: hahita ny zanany ka ho faly;
  - type: text
    content: hifaly amin’NY TOMPO ny fony.
  '8':
  - type: text
    content: Hisiaka hiantso azy Aho ka hanangona azy,
  - type: text
    content: satria manavotra azy Aho
  - type: text
    content: ka mbola hihamaro toy ny efa nihamaroany ihany izy.
  '9':
  - type: text
    content: 'Ary na dia hafafiko any amin’ny '
  - type: text
    content: Jentilisa
  - type: text
    content: ' aza izy'
  - type: text
    content: dia hahatsiaro Ahy any amin’ny tany lavitra;
  - type: text
    content: samy ho velona izy mbamin’ny zanany
  - type: text
    content: ary hiverina.
