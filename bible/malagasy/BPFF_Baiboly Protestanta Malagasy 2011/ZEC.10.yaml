document_id: ZEC.10,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: NY TOMPO irery ihany no manome ny fanambinana sy ny fahafahana
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mangataha ranonorana amin’NY TOMPO ianareo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: amin’ny andron’ny faraorana!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: NY TOMPO no manao ny oram-baratra.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ranonorana mivatravatra no homeny azy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, samy homeny ny zava-maitso any an-tsaha ireny.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia hampody azy avy any amin’ny tany Ejipta Aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy hanangona azy avy any Asiria;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary any amin’ny tany Gileada sy Libanona no hampidirako azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy ho omby azy izany.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia hamakivaky ny ranomasim-pahoriana izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hamely ny onjan-dranomasina NY TOMPO.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho ritra ny rano lalin’i Neily rehetra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: haetry ny avonavon’i Asiria
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hesorina ny tehina fanapahan’i Ejipta.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia hampahereziko ao amin’NY TOMPO izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka amin’ny anarany no handehanany, hoy NY TOMPO.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Fa ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: terafima
    - type: text
      text: ' dia niteny zava-poana'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny mpisikidy nahita fahitana mandainga
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka nilaza nofy lainga,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Foana ny fampiononana nataony.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa izany no naniasiavany toy ny ondry;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ory izy, satria tsy misy mpiandry.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Eksodosy vaovao
    marker-yv: yv-h
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Amin’ny mpiandry ondry no irehetan’ny fahatezerako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ireo osilahy no hovaliko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa Andriamanitra, Tompon’izao rehetra izao, no namangy ny taranak’i Joda, ondry andrasany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka manao azy toy ny soavaliny miravaka ao amin’ny ady.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avy ao aminy no hiavian’ny vato fehizoro,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avy ao aminy no hiavian’ny tsatòkan’ny tranolay,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avy ao aminy no hiavian’ny tsipìka fiadiana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avy ao aminy no hiavian’ny mpitarika rehetra.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho toy ny lehilahy mahery ireo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay manitsaka ny fotaka eny an-dalana amin’ny ady;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hiady izy, satria NY TOMPO no momba azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny mpitaingin-tsoavaly dia hitafy henatra.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hampahery ny taranak’i Joda Aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hovonjeko ny taranak’i Josefa ka hampodiko indray,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria mamindra fo aminy Aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka ho toy izay tsy nariako izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa Izaho no TOMPO Andriamaniny ka hihaino azy.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho toy ny lehilahy mahery i Efraima,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hifaly toy ny azon’ny divay ny fony;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hahita ny zanany ka ho faly;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hifaly amin’NY TOMPO ny fony.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hisiaka hiantso azy Aho ka hanangona azy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria manavotra azy Aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka mbola hihamaro toy ny efa nihamaroany ihany izy.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ary na dia hafafiko any amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jentilisa
    - type: text
      text: ' aza izy'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hahatsiaro Ahy any amin’ny tany lavitra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: samy ho velona izy mbamin’ny zanany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hiverina.
