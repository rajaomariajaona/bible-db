document_id: PSA.127,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Raha tsy NY TOMPO no manorina ny trano
  - type: text
    content: Hira fanao amin’ny fiakarana. Nataon’i Solomona.
  - type: text
    content: Raha tsy NY TOMPO no manorina ny trano
  - type: text
    content: dia miasa foana ny mpanao azy.
  - type: text
    content: Raha tsy NY TOMPO no miambina ny tanàna
  - type: text
    content: dia miari-tory foana ny mpiambina.
  '2':
  - type: text
    content: Zava-poana ho anareo ny mifoha maraina sy ny alim-pandry
  - type: text
    content: ka homana ny hanina azo amin’ny fahasahiranana;
  - type: text
    content: izany anefa dia omeny ihany ho an’ny malalany na dia matory aza izy.
  '3':
  - type: text
    content: Indro, lova avy amin’NY TOMPO ny zanaka maro,
  - type: text
    content: valisoa ny ateraky ny kibo.
  '4':
  - type: text
    content: Tahaka ny zana-tsipìka eo an-tanan’ny mahery
  - type: text
    content: ny zanaky ny fahatanorana.
  '5':
  - type: text
    content: Sambatra ny lehilahy izay mameno ny tranon-jana-tsipìkany amin’ireny.
  - type: text
    content: Tsy ho menatra ireny
  - type: text
    content: raha mifamaly amin’ny fahavalo eo am-bavahady.
