      text: Raha tsy NY TOMPO no manorina ny trano
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: Hira fanao amin’ny fiakarana. Nataon’i Solomona.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Raha tsy NY TOMPO no manorina ny trano
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia miasa foana ny mpanao azy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha tsy NY TOMPO no miambina ny tanàna
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia miari-tory foana ny mpiambina.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Zava-poana ho anareo ny mifoha maraina sy ny alim-pandry
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka homana ny hanina azo amin’ny fahasahiranana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izany anefa dia omeny ihany ho an’ny malalany na dia matory aza izy.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Indro, lova avy amin’NY TOMPO ny zanaka maro,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: valisoa ny ateraky ny kibo.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Tahaka ny zana-tsipìka eo an-tanan’ny mahery
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny zanaky ny fahatanorana.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Sambatra ny lehilahy izay mameno ny tranon-jana-tsipìkany amin’ireny.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy ho menatra ireny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: raha mifamaly amin’ny fahavalo eo am-bavahady.
