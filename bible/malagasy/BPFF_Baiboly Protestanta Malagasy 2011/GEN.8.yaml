document_id: GEN.8
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nivoaka ny sambofiara i Noa
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary Andriamanitra nahatsiaro an’i Noa mbamin’ny bibidia rehetra ary ny biby fiompy rehetra izay niara-nitoetra taminy tao anatin’ny sambofiara; ary Andriamanitra nampandalo rivotra nanerana ny tany ka nihena ny rano. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary tampina ireo loharanon’ny lalina sy ny varavaran’ny lanitra ka nitsahatra ilay ranonorana nivatravatra avy tany an-danitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dia niala niandalana tamin’ny tany ny rano; nony afaka dimampolo amby zato andro dia efa nihena ny rano. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dia nipetraka teo amin’ny tendrombohitra any Ararata ny sambofiara tamin’ny andro fahafito amby folo tamin’ny volana fahafito. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Nefa ny rano dia mbola nihena niandalana hatramin’ny volana fahafolo; koa tamin’ny andro voalohany tamin’ny volana fahafolo dia niseho ny tampon’ny tendrombohitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Rehefa afaka efapolo andro dia novohan’i Noa ny varavarankelin’ny sambofiara izay nataony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dia namoaka goaika iray izy, ary niverimberina izy iny mandra-paharìtra ny rano tamin’ny tany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dia namoaka voromailala iray izay teo aminy izy, hahitany na efa kely ny rano tetỳ ambonin’ny tany na tsia. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Nefa tsy hitan’ilay voromailala izay hipetrahan’ny faladiany ka niverina tany amin’i Noa tao anatin’ny sambofiara izy satria mbola nisy rano teo ambonin’ny tany manontolo. Ary nanatsotra ny tanany i Noa ka nandray azy izy ary nampiditra azy ho ao aminy tao anatin’ny sambofiara. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Mbola niandry hafitoana koa izy dia navoakany tao amin’ny sambofiara indray ilay voromailala. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Dia niditra teo aminy ilay voromailala nony hariva ny andro ary indro, nisy ravin’oliva maitso teo am-bavany! Izany no nahafantaran’i Noa fa efa kely ny rano teny ambonin’ny tany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary mbola niandry hafitoana indray izy dia namoaka ilay voromailala. Tsy niverina teo aminy intsony anefa iny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Tamin’ny andro voalohany tamin’ny volana voalohany tamin’ny taona fahiraika sy eninjato dia ritra ny rano teny ambonin’ny tany. Ary nanaisotra ny tafon’ny sambofiara i Noa ka nijery ary indro, efa maina ny tany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Tamin’ny andro fahafito amby roapolo tamin’ny volana faharoa dia maina ny tany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary Andriamanitra niteny tamin’i Noa hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Mivoaha avy ao amin’ny sambofiara ianao sy ny vady aman-janakao ary ny vinantovavinao miaraka aminao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary ny zavamananaina rehetra izay miaraka aminao, avy tamin’ny nofo rehetra, dia ny vorona, ny biby fiompy, ny biby rehetra izay mandady na mikisaka amin’ny tany, dia avoahy miaraka aminao, ary aoka hiteraka betsaka eny ambonin’ny tany sy ho maro anaka ary hitombo isa eny ambonin’ny tany ireny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Dia nivoaka avy tao i Noa sy ny vady aman-janany ary ny vinantovaviny niaraka taminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ny zavamananaina rehetra sy ny biby rehetra izay mandady na mikisaka ary ny vorona rehetra mbamin’izay rehetra mihetsiketsika eny ambonin’ny tany isan-tsokajiny dia samy nivoaka avy tao amin’ny sambofiara.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Dia nanorina alitara ho an’NY TOMPO i Noa; nanalany natao fanatitra dorana manontolo teo ambonin’ny alitara ny biby madio rehetra sy ny vorona madio rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Dia nandre ny hanitra ankasitrahana NY TOMPO ka hoy Izy tao am-pony: Tsy mba hanozona ny tany intsony noho ny amin’ny olona Aho; fa izay foronin’ny fon’ny olona dia ratsy hatramin’ny fahazazany; ary tsy mba handringana ny velona rehetra intsony tahaka izay nataoko teo Aho.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Raha mbola maharitra koa ny tany
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia tsy hanam-pitsaharana ny fotoam-pamafazana sy ny fotoam-pijinjana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny hatsiaka sy ny hafanana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny fahavaratra sy ny ririnina
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny andro sy ny alina.
