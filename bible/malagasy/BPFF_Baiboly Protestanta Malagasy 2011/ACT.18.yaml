document_id: ACT.18,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Tany Korinto i Paoly
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Taorianan’izany dia niala tany Atena i Paoly ka nankany Korinto. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: fa Izaho momba anao ary tsy hisy olona hihazona anao hanisy ratsy anao; fa manana olona maro amin’ity tanàna ity Aho.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Naharitra herintaona sy enim-bolana teo izy ary nampianatra ny tenin’Andriamanitra teo aminy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Niseho teo anatrehan’i Galiona i Paoly
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fony i Galiona governora tany Akaia dia niray tetika hisambotra an’i Paoly ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jiosy
    - type: text
      text: ' ary nitondra azy nankeo amin’ny fitsarana '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ka nilaza hoe: Ilehio dia mampanaiky ny olona hivavaka amin’Andriamanitra nefa tsy araka ny lalàna. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary raha iny handray fitenenana iny i Paoly dia hoy i Galiona tamin’ny Jiosy: Ry Jiosy, raha misy heloka na zavatra ratsy natao dia ho niaritra nihaino ny teninareo aho; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fa raha adihevitra momba ny teny sy ny anaran’olona ary ny lalànanareo kosa dia ataovinareo ihany; fa izaho tsy te hitsara izany raharaha izany. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nandroaka azy hiala teo anoloan’ny fitsarana izy. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nisambotra an’i Sostena lehiben’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sinagoga
    - type: text
      text: ' izy rehetra ka nikapoka azy teo anoloan’ny fitsarana. Nefa tsy nahoan’i Galiona izany zavatra izany.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Niverina tany Antiokia i Paoly ary nandeha nanao asa misiona indray
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mbola nijanona teo andro maromaro ihany i Paoly, ary rehefa nanao veloma ny rahalahy izy dia niondrana an-tsambo nankany Siria; niaraka taminy koa i Prisila sy i Akoila; dia nohetezany tany Kenkrea ny volony satria efa nivoady izy. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa tonga tany Efesosy izy ireo dia nandao azy teo i Paoly ka lasa niditra tao amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sinagoga
    - type: text
      text: ' ary niady hevitra tamin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jiosy
    - type: text
      text: '. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nahita '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jiosy
    - type: text
      text: ' iray antsoina hoe Akoila avy any Ponto, vao tonga avy tany Italia, niaraka tamin’i Prisila vadiny izy; i Klaodio mantsy dia efa nandidy ny Jiosy rehetra hiala tany Roma; dia nankao amin’izy mivady i Paoly. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nangataka azy hijanona elaela kokoa ny olona nefa tsy nety izy, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fa nanao veloma azy hoe: Mbola hiverina hankaty aminareo indray aho raha sitrapon’Andriamanitra. Dia niondrana an-tsambo niala tany Efesosy izy. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Rehefa tafatody tany Kaisaria izy dia niakatra ka niarahaba ny fiangonana vao nidina nankany Antiokia.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Rehefa elaela ihany no nijanonany tao dia lasa nandeha nitety ny tany Galatia sy Frigia izy ka nampahery ny mpianatra rehetra.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Tany Efesosy sy tany Korinto i Apolosy
    marker-yv: yv-h
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tonga tany Efesosy ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jiosy
    - type: text
      text: ' iray antsoina hoe Apolosy izay avy any Aleksandria, lehilahy nahay nandaha-teny sady tena mahay Soratra Masina. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izany lehilahy izany dia efa nampianarina ny lalan’ny Tompo; ary nafana fo ka niteny sy nampianatra marina ny amin’i Jesosy izy, saingy ny batisan’i Jaona ihany no fantany. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nanomboka niteny tamin’ny fahasahiana teo amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sinagoga
    - type: text
      text: ' izy, koa rehefa nandre azy i Prisila sy i Akoila dia nandray azy hankao aminy ka nampianatra azy marimarina kokoa ny amin’ny lalànan’Andriamanitra. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Naniry handroso hankany Akaia izy ka nampirisika azy ny rahalahy sady nanoratra taratasy ho any amin’ny mpianatra mba handray azy tsara; ary rehefa tonga tany izy dia nanampy be dia be ireo izay efa nino noho ny fahasoavana, '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fa izy dia nahery nandresy lahatra ny Jiosy teo imason’ny olona ka naneho marimarina tamin’ny alalan’ny Soratra Masina fa Jesosy no '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: .
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Koa satria nitovy raharaha taminy izy ireo, dia nipetraka tao aminy i Paoly ka niasa satria mpanao tranolay no raharahan’izy mivady.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Niady hevitra isan-tSabata tao amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sinagoga
    - type: text
      text: ' i Paoly ka nandresy lahatra ny Jiosy sy ny Grika. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa tafidina avy tany Makedonia i Silasy sy i Timoty dia nanokan-tena ho amin’ny teny i Paoly ka nanambara tamin’ny Jiosy fa Jesosy no '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: '. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nony nanohitra sy niteny ratsy ireo dia nanopakopa-damba izy ka niteny taminy hoe: Aoka ho eo an-dohanareo ny ranareo; afaka aho; amin’izao sisa izao dia hankany amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jentilisa
    - type: text
      text: ' aho. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa niala teo izy dia niditra tao an-tranon’ny lehilahy antsoina hoe Titosy Josto izay nivavaka tamin’Andriamanitra; ary ny tranony dia teo akaikin’ny sinagoga. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I Krispo, lehiben’ny sinagoga mbamin’ny ankohonany rehetra dia nino ny Tompo; maro koa ny Korintiana, raha nandre, no nino ka natao batisa.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary niteny tamin’i Paoly tamin’ny fahitana ny Tompo nony alina hoe: Aza matahotra, fa mitenena ihany ka aza mangina; '
