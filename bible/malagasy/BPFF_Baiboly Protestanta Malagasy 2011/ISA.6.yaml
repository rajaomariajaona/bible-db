document_id: ISA.6,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Tonga mpaminanin’NY TOMPO Isaia
  - type: text
    content: 'Tamin’ny taona nahafatesan’i Ozia mpanjaka no nahitako ny Tompo nipetraka teo ambonin’ny sezafiandrianana avo sady manerinerina, ary ny ebaneban’akanjony nahafeno ny tempoly. '
  '10':
  - type: text
    content: Ataovy donto ny fon’ity firenena ity,
  - type: text
    content: ataovy lalodalovana ny sofiny,
  - type: text
    content: ary ataovy mikimpy ny masony,
  - type: text
    content: fandrao hahita ny masony,
  - type: text
    content: sy handre ny sofiny,
  - type: text
    content: ary hahalala ny fony,
  - type: text
    content: dia hibebaka izy ka ho sitrana.
  '11':
  - type: text
    content: 'Ary hoy aho: Tompo ô, mandra-pahoviana anefa? Dia hoy Izy:'
  - type: text
    content: Mandra-pahafoanan’ny tanàna ka tsy hisy mponina,
  - type: text
    content: ny trano tsy hisy olona,
  - type: text
    content: ary ny tany ho lao tanteraka.
  '12':
  - type: text
    content: Ary NY TOMPO hampandeha lavitra ny olona
  - type: text
    content: ka hihamaro ny tany lao.
  '13':
  - type: text
    content: Ary na misy ampahafolony aza sisa
  - type: text
    content: dia mbola hosimbana ihany koa izany;
  - type: text
    content: 'kanefa tahaka ny hazo '
  - type: text
    content: terebinta
  - type: text
    content: ' sy ny hazo oaka'
  - type: text
    content: izay mbola misy fotony ihany na dia voakapa aza,
  - type: text
    content: toy izany no mbola hisiana taranaka masina ho fotony.
  '2':
  - type: text
    content: 'Nisy serafima nitsangana teo amboniny, samy nanana elatra enina avy: Ny roa dia nanaronany ny tavany, ny roa dia nanaronany ny tongony ary ny roa dia nanidinany. '
  '3':
  - type: text
    content: 'Ary nanandratra ny feony ireo ka nifamaly hoe:'
  - type: text
    content: Masina, masina, masina Andriamanitra, Tompon’izao rehetra izao!
  - type: text
    content: Henika ny voninahiny ny tany rehetra!
  '4':
  - type: text
    content: 'Dia nihorohoro ny fanambanin’ny tokonana noho ny feon’ilay nanandratra ny feony ary feno setroka ny Trano. '
  '5':
  - type: text
    content: 'Dia hoy aho:'
  - type: text
    content: Lozako! Maty aho,
  - type: text
    content: fa lehilahy maloto molotra
  - type: text
    content: sady ato amin’ny firenena maloto molotra no onenako,
  - type: text
    content: nefa ny Mpanjaka, dia Andriamanitra, Tompon’izao rehetra izao, no hitan’ny masoko.
  '6':
  - type: text
    content: 'Dia nanidina nanatona ahy ny serafima iray, nitondra vainafo teny an-tanany, izay nalainy tamin’ny tandra avy teo amin’ny alitara. '
  '7':
  - type: text
    content: 'Ary natehiny ny vavako izany ka hoy izy:'
  - type: text
    content: 'Indro, efa nitehika tamin’ny molotrao io:'
  - type: text
    content: Afaka ny helokao
  - type: text
    content: ary voavela ny fahotanao.
  '8':
  - type: text
    content: 'Ary nandre ny feon’ny Tompo aho hoe: Iza no hirahiko? Iza no handeha ho irakay? Dia hoy aho: Inty aho, iraho aho! '
  '9':
  - type: text
    content: 'Ary hoy Izy:'
  - type: text
    content: 'Mandehana ka lazao amin’ity firenena ity hoe:'
  - type: text
    content: Handre mandrakariva ihany ianareo
  - type: text
    content: nefa tsy hahalala!
  - type: text
    content: Hijery mandrakariva ihany ianareo
  - type: text
    content: nefa tsy hahafantatra!
