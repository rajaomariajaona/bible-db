document_id: ISA.6
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Tonga mpaminanin’NY TOMPO Isaia
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Tamin’ny taona nahafatesan’i Ozia mpanjaka no nahitako ny Tompo nipetraka teo ambonin’ny sezafiandrianana avo sady manerinerina, ary ny ebaneban’akanjony nahafeno ny tempoly. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Nisy serafima nitsangana teo amboniny, samy nanana elatra enina avy: Ny roa dia nanaronany ny tavany, ny roa dia nanaronany ny tongony ary ny roa dia nanidinany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary nanandratra ny feony ireo ka nifamaly hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Masina, masina, masina Andriamanitra, Tompon’izao rehetra izao!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Henika ny voninahiny ny tany rehetra!
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dia nihorohoro ny fanambanin’ny tokonana noho ny feon’ilay nanandratra ny feony ary feno setroka ny Trano. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia hoy aho:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Lozako! Maty aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa lehilahy maloto molotra
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady ato amin’ny firenena maloto molotra no onenako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa ny Mpanjaka, dia Andriamanitra, Tompon’izao rehetra izao, no hitan’ny masoko.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia nanidina nanatona ahy ny serafima iray, nitondra vainafo teny an-tanany, izay nalainy tamin’ny tandra avy teo amin’ny alitara. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary natehiny ny vavako izany ka hoy izy:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Indro, efa nitehika tamin’ny molotrao io:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Afaka ny helokao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary voavela ny fahotanao.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary nandre ny feon’ny Tompo aho hoe: Iza no hirahiko? Iza no handeha ho irakay? Dia hoy aho: Inty aho, iraho aho! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary hoy Izy:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Mandehana ka lazao amin’ity firenena ity hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Handre mandrakariva ihany ianareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa tsy hahalala!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hijery mandrakariva ihany ianareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa tsy hahafantatra!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ataovy donto ny fon’ity firenena ity,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ataovy lalodalovana ny sofiny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ataovy mikimpy ny masony,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fandrao hahita ny masony,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy handre ny sofiny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hahalala ny fony,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hibebaka izy ka ho sitrana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary hoy aho: Tompo ô, mandra-pahoviana anefa? Dia hoy Izy:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mandra-pahafoanan’ny tanàna ka tsy hisy mponina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny trano tsy hisy olona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny tany ho lao tanteraka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ary NY TOMPO hampandeha lavitra ny olona
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hihamaro ny tany lao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ary na misy ampahafolony aza sisa
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia mbola hosimbana ihany koa izany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'kanefa tahaka ny hazo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: terebinta
  - type: text
    text: ' sy ny hazo oaka'
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay mbola misy fotony ihany na dia voakapa aza,
- type: usfm
  marker: q1
  children:
  - type: text
    text: toy izany no mbola hisiana taranaka masina ho fotony.
