document_id: JAS.5,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fampitandremana ny mpanankarena
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'E! Ianareo manankarena, mitomania sy midradradradrà noho ny fahoriana izay manjo anareo! '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ry rahalahiko, raiso ho fianarana ny fiaretana fahoriana sy ny fahari-po teo amin’ireo mpaminany izay niteny tamin’ny anaran’ny Tompo. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Indro, ambarantsika ho sambatra izay efa niaritra! Efa renareo ny fiaretan’i Joba, ary hitanareo ny anjara nomen’ny Tompo azy tamin’ny farany, fa miantra indrindra ny Tompo sady be famindrampo.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Rehefa eny dia eny
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa alohan’ny zavatra rehetra, ry rahalahiko, aza mianiana, na amin’ny lanitra, na amin’ny tany, na amin’izay fianianana hafa akory aza. Fa aoka ny Eny ataonareo dia ho Eny, ary ny Tsia ataonareo dia ho Tsia, fandrao hiharan’ny fitsarana ianareo.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fifaliana sy fahorian’ny namana
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Misy azom-pahoriana va eo aminareo? Aoka izy hivavaka. Misy faly va? Aoka izy hihira fiderana. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Misy marary va eo aminareo? Aoka izy hampaka ny loholon’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.14 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: presbytera.
      marker-yv: yv-n
    - type: text
      text: ny fiangonana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.14 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: eklesia.
      marker-yv: yv-n
    - type: text
      text: '; ary aoka hanosotra diloilo azy amin’ny anaran’ny Tompo ireo sady hivavaka ho azy. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny vavaka atao amin’ny ny finoana dia hamonjy ilay marary, fa ny Tompo hanangana azy; ary raha nanota izy dia havela ny helony. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Koa mifaneke heloka ianareo, ary mifampivavaha mba ho sitrana.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny fiasan’ny vavaka ataon’ny marina dia tena mahery. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I Elia dia olona tahaka antsika ihany, ary nahery nivavaka izy mba tsy hilatsahan’ny ranonorana; dia tsy nilatsaka tamin’ny tany aloha ny ranonorana nandritra ny telo taona sy enim-bolana. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary nivavaka indray izy dia nandatsaka ranonorana ny lanitra ka nahavokatra ny tany.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Izay mamerina ny diso lalana
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ry rahalahiko, raha misy eo aminareo miala amin’ny fahamarinana, ary misy iray mampibebaka azy, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny harenanareo dia efa simba ary ny fitafianareo dia efa lanin’ny kalalao. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: aoka ho fantany fa izay mampibebaka ny mpanota hiala amin’ny lalan’ny fahadisoany dia hamonjy fanahy tsy ho faty sady hanarona heloka marobe.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny volamena sy ny volafotsinareo dia efa harafesina; ary izy harafesina no vavolombelona hiampanga anareo sady handany ny nofonareo tahaka ny afo. Namory harena amin’ny andro farany ianareo! '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Indro, mitaraina ny karamany izay hazoninareo ny mpiasa nijinja ny taninareo; ny tolokon’ny mpijinja dia tonga any am-poto-tsofin’Andriamanitra, Tompon’izao rehetra izao. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Niaina tamin’ny fiadanana tetỳ ambonin’ny tany ianareo sady nanaram-po tamin’ny fahafinaretana; nafahinareo toy ny amin’ny andro famonoana biby hohanina ny fonareo. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nanameloka sady namono ny marina ianareo ary tsy manohitra anareo izy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mahareta fa akaiky ny Tompo
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mahareta tsara ary, ry rahalahy, mandra-piavin’ny Tompo. Indro ny mpiasa tany miandry ny vokatra sarobidy avy amin’ny tany ka maharitra amin’izany mandra-pahazony ny ranonorana aloha sy aoriana. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mahareta koa ianareo, ampaherezo ny fonareo fa efa akaiky ny fiavian’ny Tompo. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aza mifampimonomonona, ry rahalahy, fandrao hohelohina ianareo; indro ny Mpitsara dia efa mitsangana eo anoloan’ny varavarana. '
