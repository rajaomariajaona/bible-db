document_id: JAS.5,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Fampitandremana ny mpanankarena
  - type: text
    content: 'E! Ianareo manankarena, mitomania sy midradradradrà noho ny fahoriana izay manjo anareo! '
  '10':
  - type: text
    content: 'Ry rahalahiko, raiso ho fianarana ny fiaretana fahoriana sy ny fahari-po teo amin’ireo mpaminany izay niteny tamin’ny anaran’ny Tompo. '
  '11':
  - type: text
    content: Indro, ambarantsika ho sambatra izay efa niaritra! Efa renareo ny fiaretan’i Joba, ary hitanareo ny anjara nomen’ny Tompo azy tamin’ny farany, fa miantra indrindra ny Tompo sady be famindrampo.
  - type: heading
    content: Rehefa eny dia eny
  '12':
  - type: text
    content: Fa alohan’ny zavatra rehetra, ry rahalahiko, aza mianiana, na amin’ny lanitra, na amin’ny tany, na amin’izay fianianana hafa akory aza. Fa aoka ny Eny ataonareo dia ho Eny, ary ny Tsia ataonareo dia ho Tsia, fandrao hiharan’ny fitsarana ianareo.
  - type: heading
    content: Ny fifaliana sy fahorian’ny namana
  '13':
  - type: text
    content: 'Misy azom-pahoriana va eo aminareo? Aoka izy hivavaka. Misy faly va? Aoka izy hihira fiderana. '
  '14':
  - type: text
    content: Misy marary va eo aminareo? Aoka izy hampaka ny loholon’
  - type: note
    content: 'Na: presbytera.'
  - type: text
    content: ny fiangonana
  - type: note
    content: 'Na: eklesia.'
  - type: text
    content: '; ary aoka hanosotra diloilo azy amin’ny anaran’ny Tompo ireo sady hivavaka ho azy. '
  '15':
  - type: text
    content: 'Ny vavaka atao amin’ny ny finoana dia hamonjy ilay marary, fa ny Tompo hanangana azy; ary raha nanota izy dia havela ny helony. '
  '16':
  - type: text
    content: Koa mifaneke heloka ianareo, ary mifampivavaha mba ho sitrana.
  - type: text
    content: 'Ny fiasan’ny vavaka ataon’ny marina dia tena mahery. '
  '17':
  - type: text
    content: 'I Elia dia olona tahaka antsika ihany, ary nahery nivavaka izy mba tsy hilatsahan’ny ranonorana; dia tsy nilatsaka tamin’ny tany aloha ny ranonorana nandritra ny telo taona sy enim-bolana. '
  '18':
  - type: text
    content: Ary nivavaka indray izy dia nandatsaka ranonorana ny lanitra ka nahavokatra ny tany.
  - type: heading
    content: Izay mamerina ny diso lalana
  '19':
  - type: text
    content: 'Ry rahalahiko, raha misy eo aminareo miala amin’ny fahamarinana, ary misy iray mampibebaka azy, '
  '2':
  - type: text
    content: 'Ny harenanareo dia efa simba ary ny fitafianareo dia efa lanin’ny kalalao. '
  '20':
  - type: text
    content: aoka ho fantany fa izay mampibebaka ny mpanota hiala amin’ny lalan’ny fahadisoany dia hamonjy fanahy tsy ho faty sady hanarona heloka marobe.
  '3':
  - type: text
    content: 'Ny volamena sy ny volafotsinareo dia efa harafesina; ary izy harafesina no vavolombelona hiampanga anareo sady handany ny nofonareo tahaka ny afo. Namory harena amin’ny andro farany ianareo! '
  '4':
  - type: text
    content: 'Indro, mitaraina ny karamany izay hazoninareo ny mpiasa nijinja ny taninareo; ny tolokon’ny mpijinja dia tonga any am-poto-tsofin’Andriamanitra, Tompon’izao rehetra izao. '
  '5':
  - type: text
    content: 'Niaina tamin’ny fiadanana tetỳ ambonin’ny tany ianareo sady nanaram-po tamin’ny fahafinaretana; nafahinareo toy ny amin’ny andro famonoana biby hohanina ny fonareo. '
  '6':
  - type: text
    content: Nanameloka sady namono ny marina ianareo ary tsy manohitra anareo izy.
  - type: heading
    content: Mahareta fa akaiky ny Tompo
  '7':
  - type: text
    content: 'Mahareta tsara ary, ry rahalahy, mandra-piavin’ny Tompo. Indro ny mpiasa tany miandry ny vokatra sarobidy avy amin’ny tany ka maharitra amin’izany mandra-pahazony ny ranonorana aloha sy aoriana. '
  '8':
  - type: text
    content: 'Mahareta koa ianareo, ampaherezo ny fonareo fa efa akaiky ny fiavian’ny Tompo. '
  '9':
  - type: text
    content: 'Aza mifampimonomonona, ry rahalahy, fandrao hohelohina ianareo; indro ny Mpitsara dia efa mitsangana eo anoloan’ny varavarana. '
