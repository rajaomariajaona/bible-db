document_id: LEV.27,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: 'Fanampiny: Ny tombam-bidin’ny voady'
  - type: text
    content: 'Ary NY TOMPO niteny tamin’i Mosesy hoe: '
  '10':
  - type: text
    content: 'Tsy hanova na hanakalo izany izy, na ny tsara ho solon’ny ratsy na ny ratsy ho solon’ny tsara. Raha biby no atakalony biby dia samy ho masina izy sy ny takalony. '
  '11':
  - type: text
    content: 'Raha biby maloto izay tsy fanao fanatitra ho an’NY TOMPO kosa izany dia hoentina eo anatrehan’ny mpisorona '
  '12':
  - type: text
    content: 'ary ny mpisorona no hanombana azy, na tsara na ratsy; koa araka izay hataon’ny mpisorona tombany no izy. '
  '13':
  - type: text
    content: Fa raha ta hanavotra azy ny tompony dia hampiany ny ampahadiminy izay nataony tombany.
  '14':
  - type: text
    content: 'Raha misy olona manamasina ny tranony ho an’NY TOMPO dia hotombanan’ny mpisorona ny trano, na tsara na ratsy; koa araka izay hataon’ny mpisorona tombany no izy. '
  '15':
  - type: text
    content: Raha tian’ny tompony havotana ny tranony izay nohamasininy dia hampiany ny ampahadiminy ny vola nataonao tombany ka ho azy ny trano.
  '16':
  - type: text
    content: 'Raha misy olona manamasina ny sasany amin’ny zarataniny ho an’NY TOMPO dia hotombanana araka ny voan-javatra famafy eo izany; ny voam-barimbazaha iray homera dia hotombanana sekela volafotsy dimampolo. '
  '17':
  - type: text
    content: 'Raha misy manamasina ny taniny, raha vao afaka ny '
  - type: text
    content: Jobily
  - type: text
    content: ', dia araka izay hatao tombany no izy. '
  '18':
  - type: text
    content: 'Fa raha misy manamasina ny taniny aorianany dia holazain’ny mpisorona aminy ny vola araka ny taona sisa, dia hatramin’ny taona Jobily, ary hahena araka izany no hanaovana ny tombany. '
  '19':
  - type: text
    content: 'Raha tian’ilay nanamasina azy havotana ny tany dia hampiany ny ampahadiminy ny vola nataony tombany ka hijanona ho azy ny taniny. '
  '2':
  - type: text
    content: 'Mitenena amin’ny Zanak’Israely hoe: Raha misy olona hanefa voady dia hotombanana araka ny olona ho an’NY TOMPO izany. '
  '20':
  - type: text
    content: 'Fa raha tsy hanavotra ny tany izy fa hivarotra azy amin’olon-kafa dia tsy ho azo avotana intsony izany. '
  '21':
  - type: text
    content: 'Koa amin’ny Jobily, rehefa afaka tamin’ilay nivarotana azy ny tany, dia ho masina ho an’NY TOMPO tahaka ny saha natao zavatra voaozona izany: Ny mpisorona no ho tompony. '
  '22':
  - type: text
    content: 'Raha misy manamasina ny tany novidiny, izay tsy ao amin’ny zarataniny, ho an’NY TOMPO, '
  '23':
  - type: text
    content: 'dia hokajin’ny mpisorona aminy izay tokony ho tombany hatramin’ny taon-Jobily, ary handoa izay tombany amin’io andro io ihany izy; zava-masina ho an’NY TOMPO izany. '
  '24':
  - type: text
    content: 'Amin’ny taon-Jobily no hodian’ny tany amin’izay nividianana azy, dia ho an’izay tompon-dova. '
  '25':
  - type: text
    content: 'Ary ny tombany rehetra izay hatao dia ho araka ny sekelan’ny fitoerana masina: Ho gera roapolo ny sekela iray.'
  '26':
  - type: text
    content: 'Fa ny voalohan-teraky ny biby fiompy, dia izay voalohan-teraka ho an’NY TOMPO, aoka tsy hisy olona hanamasina izany, na omby na ondry na osy, fa efa an’NY TOMPO io. '
  '27':
  - type: text
    content: Fa raha biby maloto kosa dia havotany araka izay hatao tombany ary hampiany ny ampahadiminy; fa raha tsy havotana izy dia hamidy araka izay nanaovana ny tombany.
  '28':
  - type: text
    content: 'Kanefa ny zavatra rehetra izay ataon’ny olona ho zavatra voatokana ho an’NY TOMPO amin’izay ananany, na olona na biby fiompy na tany izay ao amin’ny fananany dia tsy hamidy na havotana satria tena zavatra masina ho an’NY TOMPO ny zavatra rehetra izay voatokana ho AZY. '
  '29':
  - type: text
    content: Ny olona rehetra izay atao ho zavatra voaozona dia tsy azo avotana fa hovonoina ho faty.
  '3':
  - type: text
    content: 'Ny hataonao tomban’ny lehilahy roapolo taona ka hatramin’ny enimpolo taona dia sekela volafotsy dimampolo araka ny sekelan’ny fitoerana masina; '
  '30':
  - type: text
    content: 'Ny ampahafolon’ny vokatra rehetra ao amin’ny tany, na avy amin’ny tanimbary na avy amin’ny saha, dia an’NY TOMPO; masina ho an’NY TOMPO izany. '
  '31':
  - type: text
    content: 'Raha misy tian’ny tompony havotana ny ampahafolon’ny vokatra dia hampiany ny ampahadiminy. '
  '32':
  - type: text
    content: Ary ny amin’ny ampahafolon’ny omby, na ny ondry na ny osy, ny ampahafolon’izay rehetra mandalo eo ambanin’ny tehin’ny mpiandry
  - type: note
    content: Ny tehin’ny mpiandry dia nisy loko menamena izay anamarihany ny biby fahafolo izay mandalo eo anoloany.
  - type: text
    content: ' dia ho masina ho an’NY TOMPO. '
  '33':
  - type: text
    content: Tsy hojerena na tsara na ratsy izany ary tsy hatakalo; fa raha misy biby atakalo dia samy ho masina avokoa na ilay atakalo na ny takalony ka tsy misy azo avotana.
  '34':
  - type: text
    content: Ireo no didy izay nandidian’NY TOMPO an’i Mosesy ho an’ny Zanak’Israely teo an-tendrombohitra Sinay.
  '4':
  - type: text
    content: 'raha vehivavy dia sekela telopolo kosa no hataonao tombany. '
  '5':
  - type: text
    content: 'Raha lehilahy dimy taona ka hatramin’ny roapolo taona izy dia sekela roapolo no hataonao tombany, fa raha vehivavy kosa dia sekela folo. '
  '6':
  - type: text
    content: 'Raha zazalahy iray volana ka hatramin’ny dimy taona dia sekela volafotsy dimy no hataonao tombany; ary sekela volafotsy telo kosa no hataonao tomban’ny zazavavy. '
  '7':
  - type: text
    content: 'Raha hatramin’ny enimpolo taona no ho miakatra izy, raha lehilahy dia sekela dimy amby folo no hataonao tombany ary raha vehivavy kosa dia sekela folo. '
  '8':
  - type: text
    content: Raha mahantra kosa izy ka tsy mahaloa izay hataonao ho tombany dia hoentina eo anatrehan’ny mpisorona izy ary ny mpisorona dia hanombana azy. Araka izay takatry ny ananan’ilay nivoady no hanombanan’ny mpisorona azy.
  '9':
  - type: text
    content: 'Raha biby fiompy fanao fanatitra ho an’NY TOMPO dia ho masina ho an’NY TOMPO izay rehetra omena amin’izany. '
