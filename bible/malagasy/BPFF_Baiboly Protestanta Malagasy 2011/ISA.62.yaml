document_id: ISA.62
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nahita NY TOMPO izay vadiny indray i Jerosalema
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Tsy hangina Aho noho ny amin’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Ziona
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy hitsaha-miteny Aho noho ny amin’i Jerosalema,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mandra-piposaky ny fahamarinany tahaka ny famirapiratry ny mazava,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny famonjena azy tahaka ny fanilo mirehitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Hahita ny fahamarinanao ny firenena,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny mpanjaka rehetra dia hahita ny voninahitrao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: homena anaram-baovao ianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay hotononin’ny vavan’NY TOMPO.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Dia ho tonga satroboninahitra tsara tarehy
- type: usfm
  marker: q1
  children:
  - type: text
    text: eo an-tanan’NY TOMPO ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary satroka mpanjaka
- type: usfm
  marker: q1
  children:
  - type: text
    text: eo am-pelatanan’Andriamanitrao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ianao dia tsy hatao intsony hoe Nafoy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny taninao dia tsy hatao intsony hoe Lao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ianao dia hatao hoe Ilay ankasitrahako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny taninao dia hatao hoe Vady ampakarina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria ankasitrahan’NY TOMPO ianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hampakarina ho vady ny taninao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Fa tahaka ny zatovo mampakatra virijiny ho vadiny
- type: usfm
  marker: q1
  children:
  - type: text
    text: no hampakaran’ny zanakao lahy anao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tahaka ny fifalian’ny mpampakatra amin’ny ampakariny
- type: usfm
  marker: q1
  children:
  - type: text
    text: no hifalian’Andriamanitrao aminao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Nanendry mpiambina
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho eny ambonin’ny mandanao Aho, ry Jerosalema ô;
- type: usfm
  marker: q1
  children:
  - type: text
    text: koa na andro na alina dia tsy mahazo mangina ireny.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, ianareo izay mpampahatsiaro NY TOMPO,
- type: usfm
  marker: q1
  children:
  - type: text
    text: aza mitsahatra!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ary aza mamela Azy hitsahatra
- type: usfm
  marker: q1
  children:
  - type: text
    text: mandra-panaony an’i Jerosalema ho mafy orina
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy hoderaina amin’ny tany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: NY TOMPO efa nianiana tamin’ny tanany ankavanana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'dia tamin’ny sandriny mahery hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy homeko hohanin’ny fahavalonao intsony
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny varinao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny hafa firenena dia tsy hisotro ny ranom-boalobokao
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay efa nisasaranao;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: fa izay nijinja azy no hihinana azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hidera NY TOMPO;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary izay nioty azy no hisotro azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ao amin’ny kianjako masina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Mivoaha, mivoaha amin’ny vavahady!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Amboary ny lalana halehan’ny olona!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Totofy tsara ny lalambe,
- type: usfm
  marker: q1
  children:
  - type: text
    text: esory ny vato eny aminy!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Manangàna faneva ho tazan’ny firenena!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Indro, efa nanambara
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'hatrany amin’ny faran’izao tontolo izao NY TOMPO hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Lazao amin’i Ziona zanakavavy:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Indro avy ny famonjena anao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: indro ny valim-pitia hatolony dia miaraka Aminy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny valin’asa homeny dia eo anoloany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary ireny hotononina hoe: Firenena masina,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: olona navotan’NY TOMPO;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ianao dia hatao hoe Ilay notadiavina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tanàna tsy foy.
