document_id: ISA.62,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Nahita NY TOMPO izay vadiny indray i Jerosalema
  - type: text
    content: 'Tsy hangina Aho noho ny amin’i '
  - type: text
    content: Ziona
  - type: text
    content: ary tsy hitsaha-miteny Aho noho ny amin’i Jerosalema,
  - type: text
    content: mandra-piposaky ny fahamarinany tahaka ny famirapiratry ny mazava,
  - type: text
    content: ary ny famonjena azy tahaka ny fanilo mirehitra.
  '10':
  - type: text
    content: Mivoaha, mivoaha amin’ny vavahady!
  - type: text
    content: Amboary ny lalana halehan’ny olona!
  - type: text
    content: Totofy tsara ny lalambe,
  - type: text
    content: esory ny vato eny aminy!
  - type: text
    content: Manangàna faneva ho tazan’ny firenena!
  '11':
  - type: text
    content: Indro, efa nanambara
  - type: text
    content: 'hatrany amin’ny faran’izao tontolo izao NY TOMPO hoe:'
  - type: text
    content: 'Lazao amin’i Ziona zanakavavy:'
  - type: text
    content: Indro avy ny famonjena anao;
  - type: text
    content: indro ny valim-pitia hatolony dia miaraka Aminy,
  - type: text
    content: ary ny valin’asa homeny dia eo anoloany.
  '12':
  - type: text
    content: 'Ary ireny hotononina hoe: Firenena masina,'
  - type: text
    content: olona navotan’NY TOMPO;
  - type: text
    content: ary ianao dia hatao hoe Ilay notadiavina,
  - type: text
    content: Tanàna tsy foy.
  '2':
  - type: text
    content: Hahita ny fahamarinanao ny firenena,
  - type: text
    content: ary ny mpanjaka rehetra dia hahita ny voninahitrao;
  - type: text
    content: homena anaram-baovao ianao,
  - type: text
    content: izay hotononin’ny vavan’NY TOMPO.
  '3':
  - type: text
    content: Dia ho tonga satroboninahitra tsara tarehy
  - type: text
    content: eo an-tanan’NY TOMPO ianao
  - type: text
    content: ary satroka mpanjaka
  - type: text
    content: eo am-pelatanan’Andriamanitrao.
  '4':
  - type: text
    content: Ianao dia tsy hatao intsony hoe Nafoy,
  - type: text
    content: ary ny taninao dia tsy hatao intsony hoe Lao,
  - type: text
    content: fa ianao dia hatao hoe Ilay ankasitrahako,
  - type: text
    content: ary ny taninao dia hatao hoe Vady ampakarina,
  - type: text
    content: satria ankasitrahan’NY TOMPO ianao,
  - type: text
    content: ary hampakarina ho vady ny taninao.
  '5':
  - type: text
    content: Fa tahaka ny zatovo mampakatra virijiny ho vadiny
  - type: text
    content: no hampakaran’ny zanakao lahy anao;
  - type: text
    content: ary tahaka ny fifalian’ny mpampakatra amin’ny ampakariny
  - type: text
    content: no hifalian’Andriamanitrao aminao.
  '6':
  - type: text
    content: Nanendry mpiambina
  - type: text
    content: ho eny ambonin’ny mandanao Aho, ry Jerosalema ô;
  - type: text
    content: koa na andro na alina dia tsy mahazo mangina ireny.
  - type: text
    content: Eny, ianareo izay mpampahatsiaro NY TOMPO,
  - type: text
    content: aza mitsahatra!
  '7':
  - type: text
    content: Ary aza mamela Azy hitsahatra
  - type: text
    content: mandra-panaony an’i Jerosalema ho mafy orina
  - type: text
    content: sy hoderaina amin’ny tany.
  '8':
  - type: text
    content: NY TOMPO efa nianiana tamin’ny tanany ankavanana,
  - type: text
    content: 'dia tamin’ny sandriny mahery hoe:'
  - type: text
    content: Tsy homeko hohanin’ny fahavalonao intsony
  - type: text
    content: ny varinao,
  - type: text
    content: ary ny hafa firenena dia tsy hisotro ny ranom-boalobokao
  - type: text
    content: izay efa nisasaranao;
  '9':
  - type: text
    content: fa izay nijinja azy no hihinana azy
  - type: text
    content: ka hidera NY TOMPO;
  - type: text
    content: ary izay nioty azy no hisotro azy
  - type: text
    content: ao amin’ny kianjako masina.
