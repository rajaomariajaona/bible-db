document_id: RUT.4
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mikarakara ny fandovàna an’i Elimeleka i Boaza
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Rehefa tafakatra teo am-bavahady i Boaza ka nipetraka teo dia indro nandalo ilay havana mahavotra voalazany. Dia hoy i Boaza: Ranona irỳ ô! Mivilia kely ka mipetraha eto! Dia nanatona izy ka nipetraka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Dia naka loholona folo lahy tao an-tanàna i Boaza ka niteny hoe: Mipetraha eto ianareo. Dia nipetraka ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dia niteny tamin’ilay havana mpanavotra izy hoe: I Naomy izay niverina avy tany amin’ny tany Moaba, dia mivarotra ny tany izay an’i Elimeleka rahalahintsika. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary izaho dia nikasa hampandre anao hoe: Vidio eto anatrehan’izay mipetraka eto sy eto anatrehan’ny loholona amin’ny fireneko izany! Raha hanavotra ianao, dia avoty! Fa raha toa ka tsy hanavotra ianao dia lazao amiko mba ho fantatro; fa tsy misy tokony hanavotra afa-tsy ianao, ary izaho no manarakaraka anao. Ary hoy izy: Izaho no hanavotra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia hoy i Boaza: Amin’izay andro ividiananao ny tany amin’ny tanan’i Naomy dia amin’i Rota koa, vehivavy moabita, vadin’ny maty, no hividiananao azy mba hitondra loloha ny anaran’ny maty ao amin’ny lovany ianao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Hoy anefa ilay havana mahavotra: Tsy afaka manavotra ho an’ny tenako aho fandrao manimba ny lovako izany; avoty ihany ho anao izay tokony ho anjarako fa tsy mahavotra aho.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Toy izao no fanao fahiny teo amin’ny Israely raha nisy raharaha fanavotana na fanakalozana, mba hahamafy orina ny teny rehetra: Nesorin’ny iray ny kirarony ka nomena ny iray. Izany no fanamarinam-panekena teo amin’ny Israely. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary hoy ilay havana mahavotra tamin’i Boaza: Vidionao izany! Dia nanaisotra ny kirarony izy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Dia hoy i Boaza tamin’ny loholona sy ny vahoaka rehetra: Ianareo no vavolombelona androany fa efa novidiko tamin’ny tanan’i Naomy izay rehetra an’i Elimeleka sy izay rehetra an’i Kiliona sy i Malòna. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary i Rota koa, vehivavy moabita, vadin’i Malòna, dia lasako ho vadiko hitondra loloha ny anaran’ny maty ao amin’ny lovany mba tsy ho faty maso ny anaran’ny maty eo amin’ny rahalahiny sy eo amin’ny vavahadin’ny fonenany. Ianareo no vavolombelona androany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Dia hoy ny vahoaka rehetra izay teo amin’ny vavahady sy ny loholona: Eny, vavolombelona izahay! Hataon’NY TOMPO tahaka an’i Rahely sy tahaka an’i Lea anie ny vehivavy izay miditra ao an-tranonao; fa izy roa vavy no nanangana ny tranon’ny Israely! Ary aoka ho lehibe any Efrata anie ianao, ary halaza any Betlehema anie ny anaranao! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ho tahaka ny taranak’i Fareza izay naterak’i Tamara tamin’i Joda, anie ny taranakao avy amin’ny zanaka izay homen’NY TOMPO anao amin’ity zazavavy ity!
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mampakatra an’i Rota i Boaza; ny nahaterahan’i Obeda
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary i Boaza dia nampakatra an’i Rota ka nanambady azy. Ary NY TOMPO nampanana anaka azy dia niteraka zazalahy izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary hoy ireo vehivavy tamin’i Naomy: Isaorana anie NY TOMPO izay tsy namela anao androany tsy hanan-kavana mahavotra, ary aoka hambara eo amin’ny Israely ny anarany! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Dia hamelombelona ny ainao sy hikarakara anao amin’ny fahanteranao izy; fa niteraka azy ny vinantovavinao tia anao, dia ilay tsara lavitra aminao mihoatra noho ny zanaka fito lahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Dia nandray ny zaza i Naomy ka nitrotro azy ary tonga mpitaiza azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary nanome anarana azy ny vehivavy namany ka niteny hoe: Misy zazalahy teraka ho an’i Naomy! Ary ny anarany dia nataony hoe Obeda. Izy no rain’i Jese, rain’i Davida.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny firazanan’i Davida
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 1Tan 2.5-17
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary izao no taranak’i Fareza:'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'I Fareza dia niteraka an’i Hezrona; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'i Hezrona dia niteraka an’i Rama; i Rama dia niteraka an’i Aminadaba; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'i Aminadaba dia niteraka an’i Nasona; i Nasona dia niteraka an’i Salmona; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'i Salmona dia niteraka an’i Boaza; i Boaza dia niteraka an’i Obeda; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: i Obeda dia niteraka an’i Jese, ary i Jese dia niteraka an’i Davida.
