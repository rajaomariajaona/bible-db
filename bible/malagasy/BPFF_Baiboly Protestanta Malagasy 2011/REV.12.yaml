document_id: REV.12,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ilay vehivavy mitafy masoandro sy ny dragona
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nisy famantarana lehibe hita tany an-danitra, dia vehivavy mitafy ny masoandro, ary ny volana no eo ambanin’ny tongony ary misy satroboninahitra kintana roa amby folo amin’ny lohany. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nahare feo mahery tany an-danitra aho niteny hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ankehitriny dia tonga ny famonjena, ny hery, ny fanjakan’Andriamanitsika
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny fahefan’ny Kristiny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria nazera ilay mpiampanga ny rahalahintsika,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ilay miampanga azy eo anatrehan’Andriamanitsika andro aman’alina.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izy ireo kosa dia naharesy azy noho ny amin’ny ran’ny Zanak’ondry sy ny teny nanambaràny Azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy nankamamy ny ainy izy na dia ho faty aza.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Noho izany dia mifalia, ry lanitra sy ianareo izay monina any!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa loza ho an’ny tany sy ny ranomasina kosa!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa nidina ho any aminareo ny devoly amin’ny fahatezerana lehibe
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria fantany fa kely sisa ny androny!
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa hitan’ilay dragona fa nazera tamin’ny tany izy dia nanenjika ilay vehivavy niteraka ny zazalahy izy. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ilay vehivavy dia nomena ny elatra roa an’ny voromahery lehibe mba hanidinany ho any an-tany efitra, ho any amin’ny toerany izay hamelomana azy fetrandro iray sy fetrandro roa ary antsasaky ny fetrandro, mba tsy ho hitan’ilay menarana izy. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ilay menarana dia namoaka rano tamin’ny vavany, toy ny ony, hanaraka an-dRavehivavy, mba hindaosin’ny ony izy. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nefa ny tany dia namonjy an-dRavehivavy, fa nivava ny tany ka nitelina ny ony izay navoakan’ny dragona tamin’ny vavany. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia tezitra tamin’ilay vehivavy ny dragona ka lasa nandeha hiady tamin’ny zanany sisa izay mitandrina ny didin’Andriamanitra sy mitana ny fanambaràna an’i Jesosy.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ilay dragona dia nitsangana teo amin’ny fasiky ny ranomasina.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Bevohoka izy ary mihetsi-jaza ka mitaraina satria marary fatratra efa hiteraka. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nisy famantarana hafa koa hita tany an-danitra ka indro, nisy dragona mena lehibe manana loha fito sy tandroka folo ary misy diadema fito amin’ny lohany. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny rambony dia nanala ny ampahatelon’ny kintana amin’ny lanitra ka nanjera ireny ho amin’ny tany. Ary ny dragona nijanona teo anatrehan’ilay vehivavy efa hiteraka mba handrapaka ny zanany raha vao teraka. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary niteraka zazalahy izy, ary hanapaka ny firenena rehetra amin’ny tehim-by izy io. Novonjena haingana ny zanany ka nakarina ho any amin’Andriamanitra, any amin’ny sezafiandrianany. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ravehivavy kosa dia nandositra nankany an-tany efitra, izay efa nisy toerany namboarin’Andriamanitra mba hovelomina any enimpolo sy roanjato sy arivo andro izy.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nisy ady tany an-danitra: I Mikaela sy ny anjeliny dia niady tamin’ilay dragona. Ary niady ilay dragona mbamin’ny anjeliny, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'nefa tsy naharesy, sady tsy nisy toerana ho azy intsony tany an-danitra. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nazera ilay dragona lehibe, dia ilay menarana tranainy, izay atao hoe '
    - type: usfm
      marker: w
      children:
      - type: text
        text: devoly
    - type: text
      text: ' sy Satana, izay mamitaka izao tontolo izao; nazera tamin’ny tany izy ary ny anjeliny koa dia niaraka nazera taminy. '
