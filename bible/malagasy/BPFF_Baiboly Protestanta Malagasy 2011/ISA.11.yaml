document_id: ISA.11
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Davida vaovao
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ary hisy Solofo mitsimoka eo amin’ny fototr’i Jese,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hisy mitrebona avy eo aminy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Hitoetra ao Aminy ny Fanahin’NY TOMPO,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ny Fanahin’ny fahendrena sy ny fahazavan-tsaina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny Fanahin’ny fanoloran-tsaina sy ny faherezana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny Fanahin’ny fahalalana sy ny fahatahorana NY TOMPO.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ho hanitra ankasitrahana Aminy ny fahatahorana NY TOMPO
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy hitsara araka ny hitan’ny masony Izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: na hampanaiky araka ny ren’ny sofiny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Fa hotsarainy amin’ny fahamarinana ny madinika
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary homeny rariny
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny mahantra amin’ny tany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hamely ny tany amin’ny tsorakazon’ny vavany Izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny fofonain’ny vavany no hamonoany ny ratsy fanahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Fahamarinana no ho fisikinany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary fanahy mahatoky no ho fehikibony.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Hiray toerana ny amboadia sy ny ondry
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Hiara-mitoetra amin’ny amboadia ny zanak’ondry,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hiara-mandry amin’ny zanak’osy ny leoparda;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hiray toerana ny zanak’omby sy ny liona tanora ary ny omby mifahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka zazalahy kely no hitari-dalana azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Hiara-komana ny ombivavy sy ny bera,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hiara-mandry ny zanany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hihina-mololo tahaka ny omby ny liona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Hilalao eo amin’ny lavaky ny menarana ny zaza minono
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hanatsotra ny tanany ao amin’ny lavaky ny bibilava ny zaza mitsaha-nono.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Tsy hisy handratra, ary tsy hisy hanimba
- type: usfm
  marker: q1
  children:
  - type: text
    text: manerana ny tendrombohitro masina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ho henika ny fahalalana NY TOMPO ny tany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tahaka ny anaronan’ny rano ny ranomasina.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fiverenan’ireo voaroaka tamin’ny Israely
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Amin’izany andro izany, ny Solofon’i Jese,
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay hijoro toy ny faneva ho an’ny firenena hafa,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'dia hotadiavin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jentilisa
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ho feno voninahitra ny toeram-pitsaharany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Amin’izany andro izany dia mbola hanatsotra ny tanany fanindroany ny Tompo
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hanavotra ny olony, izay mbola sisa, avy any Asiria sy Ejipta,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Patrosa sy Kosy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elama, Sinara sy Hamata
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny avy any amin’ny nosy an-dranomasina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Dia hanangana faneva ho an’ny Jentilisa Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hamory ny Israely izay voaroaka
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy hanangona ny Joda izay voaely
- type: usfm
  marker: q1
  children:
  - type: text
    text: avy any amin’ny vazan-tany efatra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Hitsahatra ny fialonan’i Efraima
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hofongorana ny mpandrafy an’i Joda;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy hialona an’i Joda intsony i Efraima
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy handrafy an’i Efraima intsony i Joda.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Fa hipaoka ny havoanan’ny Filistina any andrefana ireo
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady hiara-mamabo ny zanaky ny Atsinanana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: amin’i Edoma sy Moaba no hanaingany ny tanany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hanoa azy ny taranak’i Amona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Hataon’NY TOMPO ho zavatra voaozona ny sakeli-dranomasin’i Ejipta,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hanainga ny tanany amin’ny ony Eofrata Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hamely azy amin’ny rivony mahamay;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hokapohiny io dia hanjary sakeli-drano fito
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ho tafita amin’izany ny olona tsy miala kapa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Hisy lalana voavoatra halehan’ny olony sisa,
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay ho sisa avy any Asiria,
- type: usfm
  marker: q1
  children:
  - type: text
    text: toy ny ho an’ny Israely
- type: usfm
  marker: q1
  children:
  - type: text
    text: tamin’ny andro niakarany avy tany amin’ny tany Ejipta.
