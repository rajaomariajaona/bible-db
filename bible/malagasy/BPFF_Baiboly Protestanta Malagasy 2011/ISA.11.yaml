document_id: ISA.11,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Davida vaovao
  - type: text
    content: Ary hisy Solofo mitsimoka eo amin’ny fototr’i Jese,
  - type: text
    content: hisy mitrebona avy eo aminy.
  '10':
  - type: text
    content: Amin’izany andro izany, ny Solofon’i Jese,
  - type: text
    content: izay hijoro toy ny faneva ho an’ny firenena hafa,
  - type: text
    content: 'dia hotadiavin’ny '
  - type: text
    content: Jentilisa
  - type: text
    content: ','
  - type: text
    content: ary ho feno voninahitra ny toeram-pitsaharany.
  '11':
  - type: text
    content: Amin’izany andro izany dia mbola hanatsotra ny tanany fanindroany ny Tompo
  - type: text
    content: mba hanavotra ny olony, izay mbola sisa, avy any Asiria sy Ejipta,
  - type: text
    content: Patrosa sy Kosy,
  - type: text
    content: Elama, Sinara sy Hamata
  - type: text
    content: ary ny avy any amin’ny nosy an-dranomasina.
  '12':
  - type: text
    content: Dia hanangana faneva ho an’ny Jentilisa Izy
  - type: text
    content: ka hamory ny Israely izay voaroaka
  - type: text
    content: sy hanangona ny Joda izay voaely
  - type: text
    content: avy any amin’ny vazan-tany efatra.
  '13':
  - type: text
    content: Hitsahatra ny fialonan’i Efraima
  - type: text
    content: ary hofongorana ny mpandrafy an’i Joda;
  - type: text
    content: tsy hialona an’i Joda intsony i Efraima
  - type: text
    content: ary tsy handrafy an’i Efraima intsony i Joda.
  '14':
  - type: text
    content: Fa hipaoka ny havoanan’ny Filistina any andrefana ireo
  - type: text
    content: sady hiara-mamabo ny zanaky ny Atsinanana;
  - type: text
    content: amin’i Edoma sy Moaba no hanaingany ny tanany
  - type: text
    content: ary hanoa azy ny taranak’i Amona.
  '15':
  - type: text
    content: Hataon’NY TOMPO ho zavatra voaozona ny sakeli-dranomasin’i Ejipta,
  - type: text
    content: hanainga ny tanany amin’ny ony Eofrata Izy
  - type: text
    content: ka hamely azy amin’ny rivony mahamay;
  - type: text
    content: hokapohiny io dia hanjary sakeli-drano fito
  - type: text
    content: ary ho tafita amin’izany ny olona tsy miala kapa.
  '16':
  - type: text
    content: Hisy lalana voavoatra halehan’ny olony sisa,
  - type: text
    content: izay ho sisa avy any Asiria,
  - type: text
    content: toy ny ho an’ny Israely
  - type: text
    content: tamin’ny andro niakarany avy tany amin’ny tany Ejipta.
  '2':
  - type: text
    content: Hitoetra ao Aminy ny Fanahin’NY TOMPO,
  - type: text
    content: dia ny Fanahin’ny fahendrena sy ny fahazavan-tsaina,
  - type: text
    content: ny Fanahin’ny fanoloran-tsaina sy ny faherezana,
  - type: text
    content: ny Fanahin’ny fahalalana sy ny fahatahorana NY TOMPO.
  '3':
  - type: text
    content: Ho hanitra ankasitrahana Aminy ny fahatahorana NY TOMPO
  - type: text
    content: ka tsy hitsara araka ny hitan’ny masony Izy,
  - type: text
    content: na hampanaiky araka ny ren’ny sofiny.
  '4':
  - type: text
    content: Fa hotsarainy amin’ny fahamarinana ny madinika
  - type: text
    content: ary homeny rariny
  - type: text
    content: ny mahantra amin’ny tany;
  - type: text
    content: hamely ny tany amin’ny tsorakazon’ny vavany Izy,
  - type: text
    content: ary ny fofonain’ny vavany no hamonoany ny ratsy fanahy.
  '5':
  - type: text
    content: Fahamarinana no ho fisikinany,
  - type: text
    content: ary fanahy mahatoky no ho fehikibony.
  - type: heading
    content: Hiray toerana ny amboadia sy ny ondry
  '6':
  - type: text
    content: Hiara-mitoetra amin’ny amboadia ny zanak’ondry,
  - type: text
    content: hiara-mandry amin’ny zanak’osy ny leoparda;
  - type: text
    content: hiray toerana ny zanak’omby sy ny liona tanora ary ny omby mifahy
  - type: text
    content: ka zazalahy kely no hitari-dalana azy.
  '7':
  - type: text
    content: Hiara-komana ny ombivavy sy ny bera,
  - type: text
    content: hiara-mandry ny zanany,
  - type: text
    content: ary hihina-mololo tahaka ny omby ny liona.
  '8':
  - type: text
    content: Hilalao eo amin’ny lavaky ny menarana ny zaza minono
  - type: text
    content: ary hanatsotra ny tanany ao amin’ny lavaky ny bibilava ny zaza mitsaha-nono.
  '9':
  - type: text
    content: Tsy hisy handratra, ary tsy hisy hanimba
  - type: text
    content: manerana ny tendrombohitro masina;
  - type: text
    content: fa ho henika ny fahalalana NY TOMPO ny tany,
  - type: text
    content: tahaka ny anaronan’ny rano ny ranomasina.
  - type: heading
    content: Ny fiverenan’ireo voaroaka tamin’ny Israely
