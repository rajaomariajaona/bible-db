document_id: JHN.16,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izany teny izany dia efa nolazaiko taminareo mba tsy hahatafintohina anareo. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ny fahamarinana, satria mankany amin’ny Ray Aho ka tsy mahita Ahy intsony ianareo; '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ny fitsarana, satria ny andrianan’izao tontolo izao dia efa voatsara.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mbola manana zavatra maro holazaina aminareo Aho nefa tsy zakanareo izany ankehitriny. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa rehefa tonga ny Fanahin’ny fahamarinana dia Izy no hitari-dalana anareo ho amin’ny marina rehetra; fa tsy hiteny avy amin’ny fahefan’ny tenany Izy, fa izay ho reny dia holazainy avokoa; ary ny zavatra ho avy aza dia hambarany aminareo. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izy hankalaza Ahy; fa handray avy amin’ny Ahy Izy ka hanambara izany aminareo. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izay rehetra ananan’ny Ray dia Ahy avokoa, koa izany no nilazako fa mandray avy amin’ny Ahy Izy ka hanambara izany aminareo.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny alahelo hody fifaliana
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vetivety foana dia tsy hahita Ahy intsony ianareo; ary vetivety foana indray dia hahita Ahy ianareo. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny mpianany sasany dia niresaka hoe: Inona ary izany nolazainy tamintsika hoe: Vetivety foana dia tsy hahita Ahy ianareo; ary vetivety foana indray dia hahita Ahy ianareo satria mankany amin’ny Ray Aho? '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy koa ireo: Inona izany lazainy hoe vetivety foana izany? Tsy fantatsika izay lazainy amin’izany.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Jesosy nahalala fa ta hanontany Azy ny mpianany, dia hoy Izy taminy: Mifanontany ianareo satria hoy Aho: Vetivety foana dia tsy hahita Ahy ianareo ary vetivety foana indray dia hahita Ahy ianareo. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Handroaka anareo tsy ho isan’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sinagoga
    - type: text
      text: ' izy; eny, ho avy ny fotoana ka hataon’izay rehetra mamono anareo fa manao fanompoam-pivavahana ho an’Andriamanitra izy. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lazaiko aminareo marina dia marina tokoa: Hitomany sy hisaona ianareo, fa izao tontolo izao kosa hifaly; ary halahelo ianareo, nefa ny alahelonareo dia hody fifaliana. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Manam-pahoriana ny vehivavy raha miteraka satria tonga ny ora; fa rehefa velon-jaza izy dia tsy tsaroany intsony ilay fahoriany, noho ny fifaliany fa misy zaza nateraka ho amin’izao tontolo izao. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ianareo dia manana alahelo ankehitriny; nefa hahita anareo indray Aho dia ho faly ny fonareo, ary tsy misy olona afaka manaisotra ny fifalianareo aminareo.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary amin’izany andro izany dia tsy hanontany Ahy na inona na inona ianareo; lazaiko aminareo marina dia marina tokoa fa na inona na inona hangatahinareo amin’ny Ray dia homeny anareo amin’ny anarako izany. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mandraka ankehitriny dia tsy mbola nangataka na inona na inona tamin’ny anarako ianareo; mangataha dia hahazo ianareo mba ho feno ny fifalianareo.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesosy, efa naharesy izao tontolo izao
    marker-yv: yv-h
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fanoharana no nilazako izany zavatra izany taminareo; fa ho avy ny fotoana izay tsy hilazako fanoharana aminareo intsony, fa hambarako tsotra aminareo ny amin’ny Ray. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Amin’izany andro izany dia hangataka amin’ny anarako ianareo; ary tsy milaza aminareo Aho fa Izaho no hangataka amin’ny Ray ho anareo; '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fa ny Ray mihitsy no tia anareo satria ianareo efa tia Ahy, ary efa nino fa nivoaka avy tamin’ny Ray Aho. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Eny, nivoaka avy tamin’ny Ray Aho ka tonga amin’izao tontolo izao; ary hiala amin’izao tontolo izao indray Aho ka hankany amin’ny Ray.
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy ny mpianany: Indro, milaza mazava Ianao ankehitriny fa tsy manao fanoharana intsony. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary izany no hataony satria tsy fantany ny Ray na Izaho. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ankehitriny, fantatray fa mahalala ny zavatra rehetra Ianao ka tsy mitady olona hanontany Anao; izany no inoanay fa nivoaka avy tamin’Andriamanitra Ianao. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy Jesosy hoe: Mino va ianareo ankehitriny? '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Indro, avy ny fotoana; eny, efa tonga, izay hielezanareo samy ho any amin’ny azy avy, ary hilaozanareo ho irery Aho; kanefa tsy irery Aho, fa ny Ray no ato Amiko. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izany teny izany no efa nolazaiko taminareo mba hanananareo fiadanana Amiko. Atỳ amin’izao tontolo izao no ahitanareo fahoriana; nefa matokia fa Izaho efa naharesy izao tontolo izao.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa izany teny izany efa nolazaiko taminareo mba hotsaroanareo, raha tonga ny fotoanandro, fa efa nilaza izany taminareo Aho.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny asan’ny «Mpananatra»
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsy mba nolazaiko taminareo hatramin’ny voalohany izany satria mbola tatỳ aminareo ihany Aho. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ankehitriny, mankany amin’Izay naniraka Ahy Aho, ary tsy misy aminareo manontany Ahy hoe: Ho aiza Ianao? '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Satria nilaza izany taminareo Aho dia vonton’alahelo ny fonareo. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa milaza ny marina aminareo Aho; mahatsara anareo ny fialàko; fa raha tsy miala Aho dia tsy ho avy atỳ aminareo ny Mpananatra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.7 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Zahao '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 14.16.
      marker-yv: yv-n
    - type: text
      text: '; fa rehefa mandeha Aho dia hirahiko ho atỳ aminareo Izy. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa tonga Izy dia hampiaiky izao tontolo izao ny fahotana sy ny fahamarinana ary ny fitsarana: '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny fahotana, satria tsy mino Ahy izy; '
