document_id: PSA.31,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Fahatokiana an’Andriamanitra na dia ao anatin’ny zava-tsarotra aza
  - type: text
    content: Ho an’ny mpiventy hira. Salamo nataon’i Davida.
  - type: text
    content: TOMPO ô! Ianao no ialofako.
  - type: text
    content: Aoka tsy hitsanga-menatra akory aho mandrakizay!
  - type: text
    content: Afaho amin’ny fahamarinanao aho!
  '10':
  - type: text
    content: Lanin’alahelo ny aiko
  - type: text
    content: sady lanim-pisentoana ny taonako;
  - type: text
    content: tsy manan-kery aho noho ny heloko
  - type: text
    content: ary efa lany ny taolako.
  '11':
  - type: text
    content: Noho ny ataon’ny fahavaloko rehetra
  - type: text
    content: dia efa tonga fandatsa aho na dia amin’ny mpiaramonina aza;
  - type: text
    content: atahoran’ny olom-pantatro aho
  - type: text
    content: ary mandositra ahy izay mahita ahy eny ivelany.
  '12':
  - type: text
    content: Efa hadino any am-pon’ny olona tahaka ny olona maty aho,
  - type: text
    content: tahaka ny vilany fanary.
  '13':
  - type: text
    content: Fa mandre ny endrikendriky ny maro aho;
  - type: text
    content: eny, fampihorohoroana manodidina.
  - type: text
    content: Raha miara-mioko hamely ahy izy
  - type: text
    content: dia miray tetika hahafaty ny aiko.
  '14':
  - type: text
    content: Nefa matoky Anao aho, TOMPO ô!
  - type: text
    content: 'Hoy aho: Andriamanitro Ianao!'
  '15':
  - type: text
    content: Eo an-tananao ny androko;
  - type: text
    content: vonjeo aho tsy ho azon’ny tanan’ny fahavaloko sy izay manenjika ahy!
  '16':
  - type: text
    content: Ampamirapirato amin’ny mpanomponao ny tavanao;
  - type: text
    content: vonjeo amin’ny famindramponao aho!
  '17':
  - type: text
    content: Aoka tsy hitsanga-menatra aho, TOMPO ô, satria miantso Anao!
  - type: text
    content: Fa aoka kosa ho menatra ny ratsy fanahy
  - type: text
    content: 'ka hangina any amin’ny '
  - type: text
    content: fitoeran’ny maty
  - type: text
    content: .
  '18':
  - type: text
    content: Aoka hangina ny molotra mandainga
  - type: text
    content: izay miteny sahisahy manohitra ny marina
  - type: text
    content: amin’ny avonavona sy ny fanamavoana!
  '19':
  - type: text
    content: Akory re ny haben’ny hatsaranao
  - type: text
    content: izay voarakitrao ho an’ny matahotra Anao,
  - type: text
    content: dia izay nataonao teo anatrehan’ny zanak’olombelona,
  - type: text
    content: no ho an’izay mialoka Aminao!
  '2':
  - type: text
    content: Atongilano amiko ny sofinao,
  - type: text
    content: faingàna hanafaka ahy!
  - type: text
    content: Aoka ho vatolampiko fiarovana mafy Ianao
  - type: text
    content: mba hamonjena ahy!
  '20':
  - type: text
    content: Hanafina azy ao amin’ny fierena eo anatrehanao Ianao mba tsy ho tratry ny teti-dratsy ataon’ny olona izy;
  - type: text
    content: hampiery azy ao amin’ny tranonao Ianao mba tsy ho azon’ny lela miampanga izy.
  '21':
  - type: text
    content: Isaorana anie NY TOMPO!
  - type: text
    content: Fa nataony mahagaga ny famindrampony tamiko
  - type: text
    content: tao an-tanàna mimanda.
  '22':
  - type: text
    content: 'Fa hoy aho tamin’ny fahatairako:'
  - type: text
    content: Voafongotra tsy ho eo imasonao aho!
  - type: text
    content: Kanjo nihaino ny feon’ny fifonako ihany Ianao
  - type: text
    content: raha nitaraina Taminao aho.
  '23':
  - type: text
    content: Tiava NY TOMPO, ry olony masina rehetra!
  - type: text
    content: Miaro ny marina NY TOMPO
  - type: text
    content: fa mamaly mafy ny mpiavonavona kosa Izy.
  '24':
  - type: text
    content: Mahereza, ary aoka hatanjaka ny fonareo,
  - type: text
    content: dia ianareo rehetra izay miandry NY TOMPO.
  '3':
  - type: text
    content: Fa harambatoko sy manda fiarovana ho ahy Ianao
  - type: text
    content: ary noho ny anaranao no hitondranao sy hitarihanao ahy.
  '4':
  - type: text
    content: Hanafaka ahy amin’ny fandrika harato izay nafeniny hamandrihany ahy Ianao,
  - type: text
    content: fa Ianao no fiarovana mafy ho ahy.
  '5':
  - type: text
    content: Eo an-tananao no atolotro ny fanahiko;
  - type: text
    content: fa efa nanavotra ahy Ianao, TOMPO ô, Andriamanitry ny fahamarinana!
  '6':
  - type: text
    content: Halako izay mifikitra amin’ny zava-poana mamitaka,
  - type: text
    content: fa izaho dia NY TOMPO no itokiako.
  '7':
  - type: text
    content: Hifaly sy hiravoravo amin’ny famindramponao aho
  - type: text
    content: fa mahita ny fahantrako Ianao
  - type: text
    content: ka mahafantatra ny fahorian’ny fanahiko
  '8':
  - type: text
    content: ary tsy mba nanolotra ahy ho eo an-tanan’ny fahavalo
  - type: text
    content: fa efa mampitoetra ny tongotro teo amin’ny malalaka Ianao.
  '9':
  - type: text
    content: Mamindrà fo amiko, TOMPO ô, fa azom-pahoriana aho;
  - type: text
    content: simban’alahelo ny masoko sy ny fanahiko ary ny ao anatiko rehetra.
