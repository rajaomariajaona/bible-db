document_id: PSA.31
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fahatokiana an’Andriamanitra na dia ao anatin’ny zava-tsarotra aza
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: Ho an’ny mpiventy hira. Salamo nataon’i Davida.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: TOMPO ô! Ianao no ialofako.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aoka tsy hitsanga-menatra akory aho mandrakizay!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Afaho amin’ny fahamarinanao aho!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Atongilano amiko ny sofinao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: faingàna hanafaka ahy!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aoka ho vatolampiko fiarovana mafy Ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hamonjena ahy!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Fa harambatoko sy manda fiarovana ho ahy Ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary noho ny anaranao no hitondranao sy hitarihanao ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Hanafaka ahy amin’ny fandrika harato izay nafeniny hamandrihany ahy Ianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa Ianao no fiarovana mafy ho ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Eo an-tananao no atolotro ny fanahiko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa efa nanavotra ahy Ianao, TOMPO ô, Andriamanitry ny fahamarinana!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Halako izay mifikitra amin’ny zava-poana mamitaka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa izaho dia NY TOMPO no itokiako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Hifaly sy hiravoravo amin’ny famindramponao aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa mahita ny fahantrako Ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka mahafantatra ny fahorian’ny fanahiko
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ary tsy mba nanolotra ahy ho eo an-tanan’ny fahavalo
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa efa mampitoetra ny tongotro teo amin’ny malalaka Ianao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Mamindrà fo amiko, TOMPO ô, fa azom-pahoriana aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: simban’alahelo ny masoko sy ny fanahiko ary ny ao anatiko rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Lanin’alahelo ny aiko
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady lanim-pisentoana ny taonako;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy manan-kery aho noho ny heloko
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary efa lany ny taolako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Noho ny ataon’ny fahavaloko rehetra
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia efa tonga fandatsa aho na dia amin’ny mpiaramonina aza;
- type: usfm
  marker: q1
  children:
  - type: text
    text: atahoran’ny olom-pantatro aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mandositra ahy izay mahita ahy eny ivelany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Efa hadino any am-pon’ny olona tahaka ny olona maty aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tahaka ny vilany fanary.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Fa mandre ny endrikendriky ny maro aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, fampihorohoroana manodidina.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Raha miara-mioko hamely ahy izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia miray tetika hahafaty ny aiko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Nefa matoky Anao aho, TOMPO ô!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Hoy aho: Andriamanitro Ianao!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Eo an-tananao ny androko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: vonjeo aho tsy ho azon’ny tanan’ny fahavaloko sy izay manenjika ahy!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ampamirapirato amin’ny mpanomponao ny tavanao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: vonjeo amin’ny famindramponao aho!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Aoka tsy hitsanga-menatra aho, TOMPO ô, satria miantso Anao!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa aoka kosa ho menatra ny ratsy fanahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ka hangina any amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: fitoeran’ny maty
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Aoka hangina ny molotra mandainga
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay miteny sahisahy manohitra ny marina
- type: usfm
  marker: q1
  children:
  - type: text
    text: amin’ny avonavona sy ny fanamavoana!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Akory re ny haben’ny hatsaranao
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay voarakitrao ho an’ny matahotra Anao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia izay nataonao teo anatrehan’ny zanak’olombelona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: no ho an’izay mialoka Aminao!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Hanafina azy ao amin’ny fierena eo anatrehanao Ianao mba tsy ho tratry ny teti-dratsy ataon’ny olona izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hampiery azy ao amin’ny tranonao Ianao mba tsy ho azon’ny lela miampanga izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Isaorana anie NY TOMPO!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa nataony mahagaga ny famindrampony tamiko
- type: usfm
  marker: q1
  children:
  - type: text
    text: tao an-tanàna mimanda.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Fa hoy aho tamin’ny fahatairako:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Voafongotra tsy ho eo imasonao aho!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Kanjo nihaino ny feon’ny fifonako ihany Ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: raha nitaraina Taminao aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Tiava NY TOMPO, ry olony masina rehetra!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Miaro ny marina NY TOMPO
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa mamaly mafy ny mpiavonavona kosa Izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Mahereza, ary aoka hatanjaka ny fonareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ianareo rehetra izay miandry NY TOMPO.
