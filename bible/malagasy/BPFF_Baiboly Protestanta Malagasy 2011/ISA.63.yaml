document_id: ISA.63,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Mamaly ny olony NY TOMPO
  - type: text
    content: Iza moa ity avy any Edoma,
  - type: text
    content: avy any Bozra, miakanjo mena midorehitra,
  - type: text
    content: mareva-pitafiana
  - type: text
    content: sy miandranandrana
  - type: text
    content: amin’ny haben’ny heriny?
  - type: text
    content: Izaho izay mitory fahamarinana
  - type: text
    content: sady manan-kery hamonjy.
  '10':
  - type: text
    content: Ireo kosa dia nikomy
  - type: text
    content: ka nanome alahelo ny Fanahiny Masina.
  - type: text
    content: Dia tonga fahavalony Izy
  - type: text
    content: ka niady taminy.
  '11':
  - type: text
    content: 'Ary ny olony dia nahatsiaro ny andro taloha ela, tamin’ny andron’i Mosesy:'
  - type: text
    content: Aiza Ilay nitondra azy mbamin’ny mpiandry ondriny
  - type: text
    content: niakatra avy tamin’ny ranomasina?
  - type: text
    content: Aiza Ilay nametraka ny Fanahiny Masina tao aminy?
  '12':
  - type: text
    content: Dia Ilay nampandeha ny sandriny be voninahitra
  - type: text
    content: teo ankavanan’i Mosesy
  - type: text
    content: ka nampisaraka ny ranomasina teo anoloany,
  - type: text
    content: mba hanaovany anarana mandrakizay ho Azy,
  '13':
  - type: text
    content: Ilay nitondra azy nita ny rano lalina,
  - type: text
    content: tahaka ny fandehan’ny soavaly any an-tany efitra
  - type: text
    content: ka tsy nahatafintohina azy.
  '14':
  - type: text
    content: Tahaka ny fidinan’ny biby fiompy ho any an-dohasaha
  - type: text
    content: no nanomezan’ny Fanahin’NY TOMPO fitsaharana ho azy.
  - type: text
    content: Tahaka izany no nitondranao ny olonao
  - type: text
    content: mba hanaovana anarana be voninahitra ho Anao.
  - type: heading
    content: 'Vavaka: Raha triarinao ny lanitra'
  '15':
  - type: text
    content: Mitsinjova eny an-danitra ka mijere
  - type: text
    content: 'eny amin’ny fonenan’ny fahamasinanao sy ny voninahitrao:'
  - type: text
    content: Aiza ny fahasaro-piaronao sy ny asanao lehibe?
  - type: text
    content: Ny fandevilevin’ny kibonao sy ny famindramponao
  - type: text
    content: dia voasakana tsy ho amiko.
  '16':
  - type: text
    content: Kanefa Ianao no Rainay,
  - type: text
    content: fa tsy mahalala anay i Abrahama
  - type: text
    content: ary tsy mahafantatra anay Israely,
  - type: text
    content: TOMPO ô, Ianao no Rainay,
  - type: text
    content: Mpanavotra anay no anaranao hatrizay hatrizay.
  '17':
  - type: text
    content: TOMPO ô, nahoana no nampiala anay hanalavitra ny lalanao Ianao?
  - type: text
    content: Sady nanamafy ny fonay tsy hatahotra Anao?
  - type: text
    content: Miverena noho ny amin’ny mpanomponao,
  - type: text
    content: dia ny firenena lovanao!
  '18':
  - type: text
    content: Vetivety foana no nananan’ny olonao masina ny tany;
  - type: text
    content: efa nanitsaka ny toeranao masina ny fahavalonay.
  '19':
  - type: text
    content: Efa tonga tahaka izay tsy nanananao fahefana
  - type: text
    content: hatrizay hatrizay izahay,
  - type: text
    content: sady tsy mba nantsoina tamin’ny anaranao akory.
  - type: text
    content: Enga anie ka hotriarinao ny lanitra mba hidinanao,
  - type: text
    content: dia hiempo eo anoloanao ny tendrombohitra;
  '2':
  - type: text
    content: Nahoana no mena ny fitafianao,
  - type: text
    content: ary tahaka ny an’izay manosihosy ao amin’ny famiazam-boaloboka ny akanjonao?
  '3':
  - type: text
    content: Nanosihosy irery tao amin’ny famiazam-boaloboka Aho
  - type: text
    content: fa tsy mba nisy niaraka Tamiko ny avy tamin’ny firenena na dia iray akory aza;
  - type: text
    content: nanitsaka ireny tamin’ny fahatezerako Aho
  - type: text
    content: ary nanosihosy azy tamin’ny fahavinirako,
  - type: text
    content: dia nipitipitihan’ny rany ny fitafiako
  - type: text
    content: ka voalotoko ny akanjoko rehetra.
  '4':
  - type: text
    content: Fa efa ato am-poko ny andro hamaliako
  - type: text
    content: ary tonga ny taonan’ny fanavotako.
  '5':
  - type: text
    content: Nitsinjo Aho,
  - type: text
    content: nefa tsy nisy olona hanampy Ahy;
  - type: text
    content: ary talanjona Aho,
  - type: text
    content: satria tsy nisy olona hanohana Ahy.
  - type: text
    content: Koa ny sandriko ihany no nanao famonjena ho Ahy
  - type: text
    content: ary ny fahavinirako no nanohana Ahy.
  '6':
  - type: text
    content: Nanitsaka firenena tamin’ny fahatezerako Aho
  - type: text
    content: sady nahamamo azy tamin’ny fahavinirako
  - type: text
    content: ary nandatsaka ny rany tamin’ny tany.
  - type: heading
    content: Fampahatsiahivana ny soa nataon’NY TOMPO
  '7':
  - type: text
    content: Ny famindrampon’NY TOMPO no hambarako,
  - type: text
    content: dia ny asany mendri-piderana
  - type: text
    content: araka izay rehetra nataon’NY TOMPO tamintsika
  - type: text
    content: sy ny haben’ny fahasoavana tamin’ny taranak’Israely,
  - type: text
    content: dia ny soa nataony taminy
  - type: text
    content: araka ny fiantrany
  - type: text
    content: sy ny haben’ny famindrampony.
  '8':
  - type: text
    content: 'Fa hoy Izy: Oloko tokoa ireo,'
  - type: text
    content: dia zanaka tsy mba handainga!
  - type: text
    content: Dia tonga Mpamonjy azy Izy.
  '9':
  - type: text
    content: Tamin’ny fahoriany rehetra
  - type: text
    content: dia niory tokoa Izy,
  - type: text
    content: dia ilay Anjely nialoha Azy no namonjy ireo;
  - type: text
    content: ny fitiavany sy ny famindrampony
  - type: text
    content: no nanavotany azy
  - type: text
    content: sy nivimbinany azy ary nitondrany azy
  - type: text
    content: tamin’ny andro taloha ela rehetra.
