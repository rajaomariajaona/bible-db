document_id: ISA.63
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mamaly ny olony NY TOMPO
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Iza moa ity avy any Edoma,
- type: usfm
  marker: q1
  children:
  - type: text
    text: avy any Bozra, miakanjo mena midorehitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mareva-pitafiana
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy miandranandrana
- type: usfm
  marker: q1
  children:
  - type: text
    text: amin’ny haben’ny heriny?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izaho izay mitory fahamarinana
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady manan-kery hamonjy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Nahoana no mena ny fitafianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tahaka ny an’izay manosihosy ao amin’ny famiazam-boaloboka ny akanjonao?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Nanosihosy irery tao amin’ny famiazam-boaloboka Aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa tsy mba nisy niaraka Tamiko ny avy tamin’ny firenena na dia iray akory aza;
- type: usfm
  marker: q1
  children:
  - type: text
    text: nanitsaka ireny tamin’ny fahatezerako Aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary nanosihosy azy tamin’ny fahavinirako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia nipitipitihan’ny rany ny fitafiako
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka voalotoko ny akanjoko rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Fa efa ato am-poko ny andro hamaliako
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tonga ny taonan’ny fanavotako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Nitsinjo Aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa tsy nisy olona hanampy Ahy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary talanjona Aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria tsy nisy olona hanohana Ahy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Koa ny sandriko ihany no nanao famonjena ho Ahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny fahavinirako no nanohana Ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Nanitsaka firenena tamin’ny fahatezerako Aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady nahamamo azy tamin’ny fahavinirako
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary nandatsaka ny rany tamin’ny tany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fampahatsiahivana ny soa nataon’NY TOMPO
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ny famindrampon’NY TOMPO no hambarako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ny asany mendri-piderana
- type: usfm
  marker: q1
  children:
  - type: text
    text: araka izay rehetra nataon’NY TOMPO tamintsika
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny haben’ny fahasoavana tamin’ny taranak’Israely,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ny soa nataony taminy
- type: usfm
  marker: q1
  children:
  - type: text
    text: araka ny fiantrany
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny haben’ny famindrampony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Fa hoy Izy: Oloko tokoa ireo,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia zanaka tsy mba handainga!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia tonga Mpamonjy azy Izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Tamin’ny fahoriany rehetra
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia niory tokoa Izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ilay Anjely nialoha Azy no namonjy ireo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny fitiavany sy ny famindrampony
- type: usfm
  marker: q1
  children:
  - type: text
    text: no nanavotany azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy nivimbinany azy ary nitondrany azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: tamin’ny andro taloha ela rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ireo kosa dia nikomy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka nanome alahelo ny Fanahiny Masina.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia tonga fahavalony Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka niady taminy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary ny olony dia nahatsiaro ny andro taloha ela, tamin’ny andron’i Mosesy:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aiza Ilay nitondra azy mbamin’ny mpiandry ondriny
- type: usfm
  marker: q1
  children:
  - type: text
    text: niakatra avy tamin’ny ranomasina?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aiza Ilay nametraka ny Fanahiny Masina tao aminy?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Dia Ilay nampandeha ny sandriny be voninahitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: teo ankavanan’i Mosesy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka nampisaraka ny ranomasina teo anoloany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hanaovany anarana mandrakizay ho Azy,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ilay nitondra azy nita ny rano lalina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tahaka ny fandehan’ny soavaly any an-tany efitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy nahatafintohina azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Tahaka ny fidinan’ny biby fiompy ho any an-dohasaha
- type: usfm
  marker: q1
  children:
  - type: text
    text: no nanomezan’ny Fanahin’NY TOMPO fitsaharana ho azy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tahaka izany no nitondranao ny olonao
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hanaovana anarana be voninahitra ho Anao.
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Vavaka: Raha triarinao ny lanitra'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Mitsinjova eny an-danitra ka mijere
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'eny amin’ny fonenan’ny fahamasinanao sy ny voninahitrao:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aiza ny fahasaro-piaronao sy ny asanao lehibe?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny fandevilevin’ny kibonao sy ny famindramponao
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia voasakana tsy ho amiko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Kanefa Ianao no Rainay,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa tsy mahalala anay i Abrahama
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy mahafantatra anay Israely,
- type: usfm
  marker: q1
  children:
  - type: text
    text: TOMPO ô, Ianao no Rainay,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mpanavotra anay no anaranao hatrizay hatrizay.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: TOMPO ô, nahoana no nampiala anay hanalavitra ny lalanao Ianao?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady nanamafy ny fonay tsy hatahotra Anao?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Miverena noho ny amin’ny mpanomponao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ny firenena lovanao!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Vetivety foana no nananan’ny olonao masina ny tany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: efa nanitsaka ny toeranao masina ny fahavalonay.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Efa tonga tahaka izay tsy nanananao fahefana
- type: usfm
  marker: q1
  children:
  - type: text
    text: hatrizay hatrizay izahay,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady tsy mba nantsoina tamin’ny anaranao akory.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Enga anie ka hotriarinao ny lanitra mba hidinanao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hiempo eo anoloanao ny tendrombohitra;
