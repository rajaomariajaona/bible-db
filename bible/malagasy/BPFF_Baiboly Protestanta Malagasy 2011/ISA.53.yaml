document_id: ISA.53,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Iza no nino ny teny nampitondraina anay?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary iza no nampisehoana ny sandrin’NY TOMPO?
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Nefa sitraky NY TOMPO ny hanorotoro sy hampangirifiry Azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: rehefa manolotra ny tenany ho fanati-panonerana Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hahita taranaka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady ho maro andro,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hotanterahina eo an-tanany ny sitrapon’NY TOMPO.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Noho ny fisasaran’ny fanahiny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hahita mazava Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka ho afa-po.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fahalalana Azy no hanamarinan’ny Mpanompoko marina ny olona maro,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary Izy no hivesatra ny helok’ireo.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Noho izany dia hanome Azy anjara amin’ny maro Aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hizara babo amin’ny mahery Izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria naidiny ho amin’ny fahafatesana ny ainy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary natao ho isan’ny mpanota Izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, Izy no nitondra ny fahotan’ny maro
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady nanao fifonana ho an’ny mpanota.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Fa naniry teo anatrehany tahaka ny zana-kazo madinika Izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy tahaka ny solofon-kazo amin’ny tany karankaina;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy nanana endrika na hatsaran-tarehy Izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary raha nijery Azy isika
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia tsy nisy hatsaran-tarehy haniriantsika Azy.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Natao tsinontsinona sy nolavin’ny olona Izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: lehilahy ory
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady zatra fijaliana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tahaka izay tsy tian’ny olona hojerena akory Izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: natao tsinontsinona Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy mba nahoantsika.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Nitondra ny aretintsika tokoa Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady nivesatra ny fanaintainantsika,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: kanjo isika kosa dia nihevitra Azy ho nokapohina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy nasian’Andriamanitra ary nampahorina.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Nefa Izy dia voalefona noho ny fahadisoantsika
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy notorotoroina noho ny helotsika;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny famaizana nahazoantsika fihavanana no nihatra Taminy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny dian-kapoka Taminy no nahasitranana antsika.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Isika rehetra dia samy efa nania tahaka ny ondry,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: samy efa nivily ho amin’ny lalantsika avy isika rehetra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary nataon’NY TOMPO nihatra Taminy avokoa ny helotsika rehetra.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Nampahorina Izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa nanetry tena ka tsy niloa-bava,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tahaka ny zanak’ondry entina hovonoina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy tahaka ny ondrivavy izay moana eo anatrehan’ny mpanety azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, tsy niloa-bava Izy.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Ny fampahoriana sy ny fitsarana no nenti-nanaisotra Azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary iza tamin’izay niara-belona Taminy no nihevitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa nofongorana niala tamin’ny tanin’ny velona Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka ny fahadisoan’ny oloko no nikapohana Azy?
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Natao tao amin’ny olon-dratsy ny fasany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary teo amin’ny mpanankarena ny toerana nandevenana Azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na dia tsy nanao ratsy aza Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady tsy nisy fitaka teo am-bavany.
