document_id: ISA.53,3103
type_code: plt
verses:
  '1':
  - type: text
    content: Iza no nino ny teny nampitondraina anay?
  - type: text
    content: Ary iza no nampisehoana ny sandrin’NY TOMPO?
  '10':
  - type: text
    content: Nefa sitraky NY TOMPO ny hanorotoro sy hampangirifiry Azy;
  - type: text
    content: rehefa manolotra ny tenany ho fanati-panonerana Izy
  - type: text
    content: dia hahita taranaka
  - type: text
    content: sady ho maro andro,
  - type: text
    content: ary hotanterahina eo an-tanany ny sitrapon’NY TOMPO.
  '11':
  - type: text
    content: Noho ny fisasaran’ny fanahiny
  - type: text
    content: dia hahita mazava Izy
  - type: text
    content: ka ho afa-po.
  - type: text
    content: Ny fahalalana Azy no hanamarinan’ny Mpanompoko marina ny olona maro,
  - type: text
    content: ary Izy no hivesatra ny helok’ireo.
  '12':
  - type: text
    content: Noho izany dia hanome Azy anjara amin’ny maro Aho
  - type: text
    content: ary hizara babo amin’ny mahery Izy,
  - type: text
    content: satria naidiny ho amin’ny fahafatesana ny ainy,
  - type: text
    content: ary natao ho isan’ny mpanota Izy;
  - type: text
    content: eny, Izy no nitondra ny fahotan’ny maro
  - type: text
    content: sady nanao fifonana ho an’ny mpanota.
  '2':
  - type: text
    content: Fa naniry teo anatrehany tahaka ny zana-kazo madinika Izy,
  - type: text
    content: sy tahaka ny solofon-kazo amin’ny tany karankaina;
  - type: text
    content: tsy nanana endrika na hatsaran-tarehy Izy;
  - type: text
    content: ary raha nijery Azy isika
  - type: text
    content: dia tsy nisy hatsaran-tarehy haniriantsika Azy.
  '3':
  - type: text
    content: Natao tsinontsinona sy nolavin’ny olona Izy;
  - type: text
    content: lehilahy ory
  - type: text
    content: sady zatra fijaliana,
  - type: text
    content: tahaka izay tsy tian’ny olona hojerena akory Izy;
  - type: text
    content: natao tsinontsinona Izy
  - type: text
    content: ka tsy mba nahoantsika.
  '4':
  - type: text
    content: Nitondra ny aretintsika tokoa Izy
  - type: text
    content: sady nivesatra ny fanaintainantsika,
  - type: text
    content: kanjo isika kosa dia nihevitra Azy ho nokapohina
  - type: text
    content: sy nasian’Andriamanitra ary nampahorina.
  '5':
  - type: text
    content: Nefa Izy dia voalefona noho ny fahadisoantsika
  - type: text
    content: sy notorotoroina noho ny helotsika;
  - type: text
    content: ny famaizana nahazoantsika fihavanana no nihatra Taminy;
  - type: text
    content: ary ny dian-kapoka Taminy no nahasitranana antsika.
  '6':
  - type: text
    content: Isika rehetra dia samy efa nania tahaka ny ondry,
  - type: text
    content: samy efa nivily ho amin’ny lalantsika avy isika rehetra;
  - type: text
    content: ary nataon’NY TOMPO nihatra Taminy avokoa ny helotsika rehetra.
  '7':
  - type: text
    content: Nampahorina Izy,
  - type: text
    content: nefa nanetry tena ka tsy niloa-bava,
  - type: text
    content: tahaka ny zanak’ondry entina hovonoina,
  - type: text
    content: sy tahaka ny ondrivavy izay moana eo anatrehan’ny mpanety azy;
  - type: text
    content: Eny, tsy niloa-bava Izy.
  '8':
  - type: text
    content: Ny fampahoriana sy ny fitsarana no nenti-nanaisotra Azy;
  - type: text
    content: ary iza tamin’izay niara-belona Taminy no nihevitra
  - type: text
    content: fa nofongorana niala tamin’ny tanin’ny velona Izy
  - type: text
    content: ka ny fahadisoan’ny oloko no nikapohana Azy?
  '9':
  - type: text
    content: Natao tao amin’ny olon-dratsy ny fasany,
  - type: text
    content: ary teo amin’ny mpanankarena ny toerana nandevenana Azy
  - type: text
    content: na dia tsy nanao ratsy aza Izy
  - type: text
    content: sady tsy nisy fitaka teo am-bavany.
