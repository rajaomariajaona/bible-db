document_id: EXO.5
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mihaona amin’i Farao i Mosesy sy i Arona
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Rehefa afaka izany dia nankao amin’i Farao i Mosesy sy i Arona ka niteny taminy hoe: Izao no lazain’NY TOMPO, Andriamanitr’Israely: Avelao ny oloko handeha mba hanao andro firavoravoana ho Ahy any an-tany efitra.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Hoy anefa i Farao: Iza moa NY TOMPO no hekeko teny ka hamelako ny Israely handeha? Tsy fantatro izay TOMPO ka tsy havelako handeha ny Israely.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dia hoy izy roa lahy: Andriamanitry ny Hebreo no nihaona taminay. Koa trara antitra ianao, avelao izahay handeha lalan-kateloana any an-tany efitra hamono zavatra hatao fanatitra ho an’NY TOMPO Andriamanitray, fandrao hamely anay amin’ny areti-mandringana na amin’ny sabatra Izy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dia hoy ny mpanjakan’i Ejipta taminy: Nahoana ianareo, ry Mosesy sy i Arona, no manakivy ny olona amin’ny asany? Mandehana any amin’ny asa fanompoanareo! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary hoy koa i Farao: Indro, efa maro ankehitriny ny olona eto amin’ny tany ka hampitsahatra azy amin’ny fanompoany va ianareo?'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ampitomboin’i Farao ny asan’ny Zanak’Israely
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Io andro io ihany, i Farao dia nandidy ireo mpampiasa ny vahoaka sy ireo mpifehy azy hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Aza omenareo mololo hanaovana biriky tahaka ny teo aloha intsony ny olona; izy ihany no aoka handeha hanangona mololo! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Kanefa ny isan’ny biriky izay fanaony teo aloha dia mbola ampanaovy azy ihany fa aza ahenanareo; kamo mantsy izy ireo, koa izany no itarainany hoe: Aoka izahay handeha hamono zavatra hatao fanatitra ho an’Andriamanitray! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Hamafiso ny fanompoan’ny olona mba ho lany andro amin’izany izy, fa aza avela ho variana amin’izay lainga foana!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dia nandeha ny mpampiasa ny olona mbamin’ny mpifehy azy ka niteny tamin’ireo hoe: Izao no lazain’i Farao: Tsy hanome mololo anareo intsony aho; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: fa mandehana ianareo ka manangòna mololo any amin’izay hahitanareo any, ary ny fanompoanareo dia tsy hahena na dia kely akory aza.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Dia niely manerana ny tany Ejipta rehetra ny olona mba hifako vodivary ho solon’ny mololo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary ny mpampiasa dia nandodona azy ireo hoe: Vitao ny asanareo, izay anjara fanompoana isanandro, tahaka ny fony mbola nisy mololo ihany!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary ny mpifehy ny Zanak’Israely izay notendren’ny mpampiasa avy amin’i Farao hifehy azy dia nokapohina ka nanontaniana hoe: Ahoana no tsy nahavitanareo ny anjaranareo tamin’ny fanaovana ny biriky omaly sy androany, tahaka ny teo aloha?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Dia nankao amin’i Farao ny mpampiasa ny Zanak’Israely ka nitaraina taminy hoe: Nahoana no manao toy izany amin’ny mpanomponao ianao? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Tsy omena mololo tsinona izahay mpanomponao, nefa mbola tenenina ihany izahay hoe: Ataovy ny biriky! Ary indro izahay mpanomponao foana no nokapohina nefa ny vahoakanao no diso! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Fa hoy i Farao: Olona kamo ianareo, olona kamo! Koa izany no itenenanareo hoe: Aoka izahay handeha hamono zavatra hatao fanatitra ho an’NY TOMPO! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ankehitriny, mandehana, tanteraho ny fanompoanareo, fa tsy hisy mololo homena anareo, nefa ny anjara birikinareo dia mbola hovitainareo ihany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Hitan’ireo mpifehy ny Zanak’Israely fa efa azon-doza izy noho ny nilazana hoe: Tsy hahenanareo ny isan’ny birikinareo amin’ny anjara fanompoana isanandro. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Koa rehefa niala avy tao amin’i Farao izy ireo dia tafahaona tamin’i Mosesy sy i Arona izay nijanona niandry azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Hoy izy ireo tamin’i Mosesy sy i Arona: NY TOMPO anie hijery sy hitsara anareo, satria efa nataonareo mangidy hoditra eo anatrehan’i Farao sy eo anatrehan’ny mpanompony izahay ka nasianareo sabatra eo an-tanany hamonoany anay.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary niverina ho any amin’NY TOMPO i Mosesy ka niteny hoe: TOMPO ô, nahoana no nahatonga loza tamin’ity firenena ity Ianao? Nahoana re no naniraka ahy Ianao? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Fa hatrizay nankanesako tao amin’i Farao mba hiteny amin’ny anaranao izay dia nahatonga loza tamin’ity firenena ity izy; nefa Ianao tsy nanafaka ny olonao akory!
