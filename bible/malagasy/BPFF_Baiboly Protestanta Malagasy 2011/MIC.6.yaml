document_id: MIC.6
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny adin’NY TOMPO amin’ny olony
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Miangavy anareo aho, mihainoa izay lazain’NY TOMPO:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mitsangàna, mandahara eo anoloan’ny tendrombohitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary aoka ho ren’ny havoana ny feonao!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Mihainoa ny adin’NY TOMPO ianareo, ry tendrombohitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ianareo, ry fanorena-matezan’ny tany.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa NY TOMPO manana ady amin’ny olony,
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, amin’ny Israely no ifandaharany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ry oloko, inona no nataoko taminao?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Inona no nanasarako anao?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tondroy maso ary Aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Fa nentiko niakatra avy tany amin’ny tany Ejipta ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady navotako avy tao amin’ny trano nanandevozana.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia nirahiko hitarika anao i Mosesy sy i Arona ary i Miriama.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ry oloko, mba tsarovy ny saina nataon’i Balaka, mpanjakan’i Moaba,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy izay navalin’i Balama, zanak’i Beora, azy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary izay natao hatrany Sitima ka hatrany Gilgala,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hahafantaranareo ny asa marina nataon’NY TOMPO.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Izay tadiavin’NY TOMPO amin’ny olona
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Inona no hoentiko manatona NY TOMPO
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy miondrika eo anatrehan’Andriamanitra izay any amin’ny avo?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hanatona Azy mitondra fanatitra dorana manontolo
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ombilahy kely izay iray taona va aho?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ho sitraky NY TOMPO va ny ondrilahy arivoarivo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: na renirano diloilo iray alina?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hanolotra ny lahimatoako noho ny fahadisoako va aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: na ny ateraky ny kiboko noho ny fahotan’ny tenako?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ry olombelona, efa naseho anao izay tsara
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy izay ilain’NY TOMPO aminao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'dia izao ihany: Ny hanao ny rariny sy ny ho tia famindrampo'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny hanaraka an’Andriamanitrao amin’ny fanetren-tena.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Faizin’NY TOMPO ny fanaovana fitaka sy herisetra
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Manaitra ny tanàna ny feon’NY TOMPO
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mahita ny anaranao ny hendry;
- type: usfm
  marker: q1
  children:
  - type: text
    text: henoinareo ny tsorakazo sy izay nanendry azy!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Mbola misy rakitry ny harena azo tamin’ny tsy rariny ihany va
- type: usfm
  marker: q1
  children:
  - type: text
    text: ao an-tranon’ny ratsy fanahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'na misy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: efaha
  - type: text
    text: ' tsy ampy famarana ao, izay mahatonga fahatezerana?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Mety madio va aho raha manana mizana mandainga
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy kitapo misy vatomizana tsy marina?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Feno hetraketraka ny mpanankarenany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: miteny lainga ny mponina ao aminy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny lelany ao am-bavany dia fitaka avokoa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Izaho kosa dia hikapoka maharary anao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka handringana anao noho ny helokao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ary ianao dia hihinana nefa tsy ho voky,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa mbola ho ao anatinao ihany ny hanoananao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hanokana ho tahiry ianao nefa tsy hahita toerana azo antoka hasiana azy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary izay sendra voatahirinao aza dia hatolotro ho amin’ny sabatra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ianao dia hamafy nefa tsy hijinja;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ianao dia hanosihosy oliva nefa tsy hihosotra diloilo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hanosihosy ranom-boaloboka nefa tsy hisotro divay.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Fa fatra-pitandrina ny lalànan’i Omry
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny asan’ny taranak’i Ahaba rehetra ianareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady manaraka ny toroheviny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: noho izany no hanolorako anao ho amin’ny faharavana
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny mponina ao aminao dia ho zavatra mampisitrisitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hitondra ny latsan’ny oloko ianareo.
