document_id: MIC.6,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny adin’NY TOMPO amin’ny olony
  - type: text
    content: 'Miangavy anareo aho, mihainoa izay lazain’NY TOMPO:'
  - type: text
    content: Mitsangàna, mandahara eo anoloan’ny tendrombohitra,
  - type: text
    content: ary aoka ho ren’ny havoana ny feonao!
  '10':
  - type: text
    content: Mbola misy rakitry ny harena azo tamin’ny tsy rariny ihany va
  - type: text
    content: ao an-tranon’ny ratsy fanahy
  - type: text
    content: 'na misy '
  - type: text
    content: efaha
  - type: text
    content: ' tsy ampy famarana ao, izay mahatonga fahatezerana?'
  '11':
  - type: text
    content: Mety madio va aho raha manana mizana mandainga
  - type: text
    content: sy kitapo misy vatomizana tsy marina?
  '12':
  - type: text
    content: Feno hetraketraka ny mpanankarenany,
  - type: text
    content: miteny lainga ny mponina ao aminy
  - type: text
    content: ary ny lelany ao am-bavany dia fitaka avokoa.
  '13':
  - type: text
    content: Izaho kosa dia hikapoka maharary anao
  - type: text
    content: ka handringana anao noho ny helokao.
  '14':
  - type: text
    content: Ary ianao dia hihinana nefa tsy ho voky,
  - type: text
    content: fa mbola ho ao anatinao ihany ny hanoananao;
  - type: text
    content: hanokana ho tahiry ianao nefa tsy hahita toerana azo antoka hasiana azy,
  - type: text
    content: ary izay sendra voatahirinao aza dia hatolotro ho amin’ny sabatra.
  '15':
  - type: text
    content: Ianao dia hamafy nefa tsy hijinja;
  - type: text
    content: ianao dia hanosihosy oliva nefa tsy hihosotra diloilo,
  - type: text
    content: ary hanosihosy ranom-boaloboka nefa tsy hisotro divay.
  '16':
  - type: text
    content: Fa fatra-pitandrina ny lalànan’i Omry
  - type: text
    content: sy ny asan’ny taranak’i Ahaba rehetra ianareo,
  - type: text
    content: sady manaraka ny toroheviny;
  - type: text
    content: noho izany no hanolorako anao ho amin’ny faharavana
  - type: text
    content: ary ny mponina ao aminao dia ho zavatra mampisitrisitra
  - type: text
    content: ka hitondra ny latsan’ny oloko ianareo.
  '2':
  - type: text
    content: Mihainoa ny adin’NY TOMPO ianareo, ry tendrombohitra
  - type: text
    content: sy ianareo, ry fanorena-matezan’ny tany.
  - type: text
    content: Fa NY TOMPO manana ady amin’ny olony,
  - type: text
    content: eny, amin’ny Israely no ifandaharany.
  '3':
  - type: text
    content: Ry oloko, inona no nataoko taminao?
  - type: text
    content: Inona no nanasarako anao?
  - type: text
    content: Tondroy maso ary Aho.
  '4':
  - type: text
    content: Fa nentiko niakatra avy tany amin’ny tany Ejipta ianao
  - type: text
    content: sady navotako avy tao amin’ny trano nanandevozana.
  - type: text
    content: Dia nirahiko hitarika anao i Mosesy sy i Arona ary i Miriama.
  '5':
  - type: text
    content: Ry oloko, mba tsarovy ny saina nataon’i Balaka, mpanjakan’i Moaba,
  - type: text
    content: sy izay navalin’i Balama, zanak’i Beora, azy,
  - type: text
    content: ary izay natao hatrany Sitima ka hatrany Gilgala,
  - type: text
    content: hahafantaranareo ny asa marina nataon’NY TOMPO.
  - type: heading
    content: Izay tadiavin’NY TOMPO amin’ny olona
  '6':
  - type: text
    content: Inona no hoentiko manatona NY TOMPO
  - type: text
    content: sy miondrika eo anatrehan’Andriamanitra izay any amin’ny avo?
  - type: text
    content: Hanatona Azy mitondra fanatitra dorana manontolo
  - type: text
    content: sy ombilahy kely izay iray taona va aho?
  '7':
  - type: text
    content: Ho sitraky NY TOMPO va ny ondrilahy arivoarivo,
  - type: text
    content: na renirano diloilo iray alina?
  - type: text
    content: Hanolotra ny lahimatoako noho ny fahadisoako va aho,
  - type: text
    content: na ny ateraky ny kiboko noho ny fahotan’ny tenako?
  '8':
  - type: text
    content: Ry olombelona, efa naseho anao izay tsara
  - type: text
    content: sy izay ilain’NY TOMPO aminao,
  - type: text
    content: 'dia izao ihany: Ny hanao ny rariny sy ny ho tia famindrampo'
  - type: text
    content: ary ny hanaraka an’Andriamanitrao amin’ny fanetren-tena.
  - type: heading
    content: Faizin’NY TOMPO ny fanaovana fitaka sy herisetra
  '9':
  - type: text
    content: Manaitra ny tanàna ny feon’NY TOMPO
  - type: text
    content: ary mahita ny anaranao ny hendry;
  - type: text
    content: henoinareo ny tsorakazo sy izay nanendry azy!
