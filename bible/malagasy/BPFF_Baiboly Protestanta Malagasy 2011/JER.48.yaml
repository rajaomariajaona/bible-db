document_id: JER.48,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Faminaniana ny amin’i Moaba
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Ny amin’i Moaba.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Izao no lazain’Andriamanitra, Tompon’izao rehetra izao, Andriamanitry ny Israely:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nidiran-doza i Nebo fa rava!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mangaihay i Kiriataima fa azo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mangaihay i Misgaba sady raiki-tahotra.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Ho voaozona anie izay manao tsirambina foana ny asa asain’NY TOMPO atao!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, ho voaozona anie izay mihazona ny sabany tsy handatsa-dra!
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Nandry fehizay i Moaba hatry ny fony izy mbola kely
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka niotrika tao amin’ny faikany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa tsy mba naidina nafindrafindra siny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy mbola lasan-ko babo izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: koa izany no naharetan’ny tsirony ao aminy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy tsy niovan’ny fofony.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Koa indro, avy ny andro, hoy NY TOMPO, izay hanirahako olona any aminy, hampihohoka ny fitoeran-divainy ka hanafoana ny fitoeran-divainy sady hanorotoro ny siny hoditrany. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Ary ho menatra i Moaba noho ny amin’i Kemosy, toy ny nahamenatra ny taranak’Israely noho ny amin’i Betela tokiny.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Ahoana no ilazanareo hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lehilahy matanjaka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady mahery an’ady izahay?
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Rava i Moaba,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny tanànany dia efa levon’ny setroka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary nidina ho any amin’ny famonoana ny zatovony voafantina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy ny Mpanjaka, dia Andriamanitra, Tompon’izao rehetra izao no anarany.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Efa antomotra ny loza hanjo an’i Moaba
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary manatona haingana ny fahoriany.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Mitomania azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ianareo rehetra izay manodidina azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ianareo rehetra izay mahalala ny anarany!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Eny, lazao hoe: Indrisy!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tapaka ny tehina mafy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny tsorakazo tsara tarehy!
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Ry mponina ao Dibona zanakavavy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: midìna hiala amin’ny voninahitrao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka mitoera ao amin’ny tany mangentana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ilay mandringana an’i Moaba dia miakatra hamely anao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady mandrava ny fiarovanao.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Ry mponina any Aroera
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mijanòna eny an-dalambe ka mitazàna,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary izay mandositra, na lehilahy na vehivavy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'dia anontanio hoe: Inona no nitranga?'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Tsy misy ho reharehan’i Moaba intsony;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'tao Hesbona no niheverany izay hampidi-doza aminy hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Andeha horavantsika tsy ho firenena intsony izy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho ringana koa ianao, ry Madmena,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hanenjika anao ny sabatra.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Afa-baraka i Moaba, eny, raiki-tahotra izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: midradradradrà sy miantsoantsoa mafy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka ambaraonareo ao Arnona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa rava i Moaba.
  '21':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Ary ny fitsarana dia miakatra ao amin’ny tany lemaka, dia ao Holona, Jahaza, Mefata, '
  '22':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Dibona, Nebo, Bety-Diblataima, '
  '23':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Kiriataima, Bety-Gamola, Bety-Meona, '
  '24':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Keriota ary Bozra, eny, ny tanànan’i Moaba rehetra, na ny lavitra na ny akaiky.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Voakapa ny tandrok’i Moaba
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tapaka koa ny sandriny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy NY TOMPO.
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Ataovy leon-divay izy fa niavonavona tamin’NY TOMPO; hihosinkosina amin’ny loany i Moaba sady mba ho tonga fihomehezana kosa. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Fa tsy efa nataonao ho fihomehezana va ny Israely? Moa hita fa naman’ny mpangalatra va izy no dia mihifikifika ianao isaky ny milaza azy?
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Ry mponina any Moaba!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ilaozy ny tanàna
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka mitoera any amin’ny harambato,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary aoka ho tahaka ny voromailala
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay manao ny akaniny erỳ ampitan’ny hantsana ianao.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Efa renay ny fiavonavonan’i Moaba,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fatra-piavonavona loatra mantsy izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: renay ny fireharehany sy ny fiavonavonany ary ny fiaingitrainginy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny avonavon’ny fony.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Injay misy feo fitarainana ao Horonaima hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fandravana sy fandringanana be!
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Izaho no mahalala ny vavany tafahoatra sy ny fibedibediny foana, hoy NY TOMPO; samy tsinontsinona ireny. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Koa hidradradradra noho ny amin’i Moaba aho; eny, hitomany noho ny amin’i Moaba rehetra aho, ary hitsetra noho ny amin’ny mponina ao Kira-Haresa ny olona.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Mihoatra noho ny fitomanian’i Jazera no hitomaniako anao, ry voalobok’i Sibma,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tafita ny ranomasina ny rantsanao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tonga hatrany amin’ny ranomasin’i Jazera;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny mpandripaka dia tonga handripaka ny voankazonao masaka fahavaratra sy ny voalobokao.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Ary ny hafaliana sy ny faharavoravoana dia nesorina tamin’ny saha nahavokatra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy tamin’ny tany Moaba;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary nataoko tankina ny divay tamin’ny vata fanantazana ranom-boaloboka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy hisy intsony fihobiana rehefa manao fanitsakitsahana voaloboka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: raha misy aza dia fihobiana tsy izy akory.
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Ny fitarainan’i Hesbona dia re hatrany Elale sy Jahaza, hatrany Zoara ka hatrany Horonaima sy Eglata-Selisia; fa na dia ny ranon’i Nimrima aza dia ho ritra koa. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Ary hatsahatro ao Moaba koa izay miakatra hanatitra amin’ny toerana fanaovana sorona sy izay mandoro ditin-kazo manitra ho an’ny andriamaniny, hoy NY TOMPO. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Ary noho izany ny foko dia mitomany manao feon-tsodina noho ny amin’i Moaba, ary ny foko dia mitomany manao feon-tsodina noho ny amin’ny mponina ao Kira-Haresa, eny, noho izany dia levona ny harena be izay noharìny. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Fa nosolaina ny loha rehetra, voaharatra ny somotra rehetra, asiana tetika amin’ny tanana rehetra ary lamba fisaonana no amin’ny andilany. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Eny, amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: tampon-trano
    - type: text
      text: ' rehetra any Moaba sy eny amin’ny kianja malalaka dia misy fisaonana avokoa; satria torotoroiko toy ny fanaka tsy misy ilàna azy intsony i Moaba, hoy NY TOMPO. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Indrisy! Raiki-tahotra izy! Midradradradrà! Indrisy! Efa miamboho i Moaba, mangaihay izy ka tonga mampihomehy sady mampatahotra ho an’izay rehetra manodidina azy. '
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Rava i Moaba,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny madinika ao dia mamoaka fitarainana.
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'Fa izao no lazain’NY TOMPO: Indro, hanidina toy ny voromahery izy ka hamelatra ny elany hipaoka an’i Moaba.'
  '41':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: Azo ny tanàna Keriota
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary azo ny manda fiarovana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary amin’izany andro izany ny fon’ny lehilahy maherin’i Moaba
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ho tahaka ny fon’ny vehivavy mihetsi-jaza.
  '42':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: Fa horavana tsy ho firenena intsony i Moaba
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria niavonavona tamin’NY TOMPO.
  '43':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: Tahotra sy lavaka ary fandrika no mahazo anao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ry mponina any Moaba,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy NY TOMPO.
  '44':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: Izay mandositra ny tahotra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ho latsaka any an-davaka;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary izay miakatra avy any an-davaka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ho voan’ny fandrika;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa hataoko tonga amin’i Moaba
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny taona hamaliana azy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy NY TOMPO.
  '45':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: Ao amin’ny alokalok’i Hesbona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no ijanonan’ny mpandositra satria lany hery ireny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: kanjo misy afo mivoaka avy any Hesbona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary lelafo avy any Sihona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka mandevona ny sisin’i Moaba
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny tampon-dohan’ny mpitabataba.
  '46':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: Idiran-doza ianao, ry Moaba!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ringana ny olon’i Kemosy!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ho babo ny zanakao lahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hosamborina ny zanakao vavy.
  '47':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: Nefa mbola hampodiko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avy amin’ny fahababoana ihany i Moaba amin’ny ho avy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy NY TOMPO.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hatreto ny amin’ny fitsarana an’i Moaba.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Fa miakatra mitomany tsy misy fiafarany eny amin’ny fiakarana Lohita izy;
