document_id: JER.48,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Faminaniana ny amin’i Moaba
  - type: text
    content: Ny amin’i Moaba.
  - type: text
    content: 'Izao no lazain’Andriamanitra, Tompon’izao rehetra izao, Andriamanitry ny Israely:'
  - type: text
    content: Nidiran-doza i Nebo fa rava!
  - type: text
    content: Mangaihay i Kiriataima fa azo;
  - type: text
    content: mangaihay i Misgaba sady raiki-tahotra.
  '10':
  - type: text
    content: Ho voaozona anie izay manao tsirambina foana ny asa asain’NY TOMPO atao!
  - type: text
    content: Eny, ho voaozona anie izay mihazona ny sabany tsy handatsa-dra!
  '11':
  - type: text
    content: Nandry fehizay i Moaba hatry ny fony izy mbola kely
  - type: text
    content: ka niotrika tao amin’ny faikany,
  - type: text
    content: fa tsy mba naidina nafindrafindra siny
  - type: text
    content: ary tsy mbola lasan-ko babo izy;
  - type: text
    content: koa izany no naharetan’ny tsirony ao aminy
  - type: text
    content: sy tsy niovan’ny fofony.
  '12':
  - type: text
    content: 'Koa indro, avy ny andro, hoy NY TOMPO, izay hanirahako olona any aminy, hampihohoka ny fitoeran-divainy ka hanafoana ny fitoeran-divainy sady hanorotoro ny siny hoditrany. '
  '13':
  - type: text
    content: Ary ho menatra i Moaba noho ny amin’i Kemosy, toy ny nahamenatra ny taranak’Israely noho ny amin’i Betela tokiny.
  '14':
  - type: text
    content: 'Ahoana no ilazanareo hoe:'
  - type: text
    content: Lehilahy matanjaka
  - type: text
    content: sady mahery an’ady izahay?
  '15':
  - type: text
    content: Rava i Moaba,
  - type: text
    content: fa ny tanànany dia efa levon’ny setroka
  - type: text
    content: ary nidina ho any amin’ny famonoana ny zatovony voafantina,
  - type: text
    content: hoy ny Mpanjaka, dia Andriamanitra, Tompon’izao rehetra izao no anarany.
  '16':
  - type: text
    content: Efa antomotra ny loza hanjo an’i Moaba
  - type: text
    content: ary manatona haingana ny fahoriany.
  '17':
  - type: text
    content: Mitomania azy
  - type: text
    content: ianareo rehetra izay manodidina azy
  - type: text
    content: sy ianareo rehetra izay mahalala ny anarany!
  - type: text
    content: 'Eny, lazao hoe: Indrisy!'
  - type: text
    content: Tapaka ny tehina mafy
  - type: text
    content: sy ny tsorakazo tsara tarehy!
  '18':
  - type: text
    content: Ry mponina ao Dibona zanakavavy,
  - type: text
    content: midìna hiala amin’ny voninahitrao
  - type: text
    content: ka mitoera ao amin’ny tany mangentana,
  - type: text
    content: fa ilay mandringana an’i Moaba dia miakatra hamely anao
  - type: text
    content: sady mandrava ny fiarovanao.
  '19':
  - type: text
    content: Ry mponina any Aroera
  - type: text
    content: mijanòna eny an-dalambe ka mitazàna,
  - type: text
    content: ary izay mandositra, na lehilahy na vehivavy,
  - type: text
    content: 'dia anontanio hoe: Inona no nitranga?'
  '2':
  - type: text
    content: Tsy misy ho reharehan’i Moaba intsony;
  - type: text
    content: 'tao Hesbona no niheverany izay hampidi-doza aminy hoe:'
  - type: text
    content: Andeha horavantsika tsy ho firenena intsony izy.
  - type: text
    content: Ho ringana koa ianao, ry Madmena,
  - type: text
    content: hanenjika anao ny sabatra.
  '20':
  - type: text
    content: Afa-baraka i Moaba, eny, raiki-tahotra izy;
  - type: text
    content: midradradradrà sy miantsoantsoa mafy
  - type: text
    content: ka ambaraonareo ao Arnona
  - type: text
    content: fa rava i Moaba.
  '21':
  - type: text
    content: 'Ary ny fitsarana dia miakatra ao amin’ny tany lemaka, dia ao Holona, Jahaza, Mefata, '
  '22':
  - type: text
    content: 'Dibona, Nebo, Bety-Diblataima, '
  '23':
  - type: text
    content: 'Kiriataima, Bety-Gamola, Bety-Meona, '
  '24':
  - type: text
    content: Keriota ary Bozra, eny, ny tanànan’i Moaba rehetra, na ny lavitra na ny akaiky.
  '25':
  - type: text
    content: Voakapa ny tandrok’i Moaba
  - type: text
    content: ary tapaka koa ny sandriny,
  - type: text
    content: hoy NY TOMPO.
  '26':
  - type: text
    content: 'Ataovy leon-divay izy fa niavonavona tamin’NY TOMPO; hihosinkosina amin’ny loany i Moaba sady mba ho tonga fihomehezana kosa. '
  '27':
  - type: text
    content: Fa tsy efa nataonao ho fihomehezana va ny Israely? Moa hita fa naman’ny mpangalatra va izy no dia mihifikifika ianao isaky ny milaza azy?
  '28':
  - type: text
    content: Ry mponina any Moaba!
  - type: text
    content: Ilaozy ny tanàna
  - type: text
    content: ka mitoera any amin’ny harambato,
  - type: text
    content: ary aoka ho tahaka ny voromailala
  - type: text
    content: izay manao ny akaniny erỳ ampitan’ny hantsana ianao.
  '29':
  - type: text
    content: Efa renay ny fiavonavonan’i Moaba,
  - type: text
    content: fatra-piavonavona loatra mantsy izy,
  - type: text
    content: renay ny fireharehany sy ny fiavonavonany ary ny fiaingitrainginy
  - type: text
    content: sy ny avonavon’ny fony.
  '3':
  - type: text
    content: 'Injay misy feo fitarainana ao Horonaima hoe:'
  - type: text
    content: Fandravana sy fandringanana be!
  '30':
  - type: text
    content: 'Izaho no mahalala ny vavany tafahoatra sy ny fibedibediny foana, hoy NY TOMPO; samy tsinontsinona ireny. '
  '31':
  - type: text
    content: Koa hidradradradra noho ny amin’i Moaba aho; eny, hitomany noho ny amin’i Moaba rehetra aho, ary hitsetra noho ny amin’ny mponina ao Kira-Haresa ny olona.
  '32':
  - type: text
    content: Mihoatra noho ny fitomanian’i Jazera no hitomaniako anao, ry voalobok’i Sibma,
  - type: text
    content: tafita ny ranomasina ny rantsanao
  - type: text
    content: ary tonga hatrany amin’ny ranomasin’i Jazera;
  - type: text
    content: ny mpandripaka dia tonga handripaka ny voankazonao masaka fahavaratra sy ny voalobokao.
  '33':
  - type: text
    content: Ary ny hafaliana sy ny faharavoravoana dia nesorina tamin’ny saha nahavokatra
  - type: text
    content: sy tamin’ny tany Moaba;
  - type: text
    content: ary nataoko tankina ny divay tamin’ny vata fanantazana ranom-boaloboka,
  - type: text
    content: tsy hisy intsony fihobiana rehefa manao fanitsakitsahana voaloboka,
  - type: text
    content: raha misy aza dia fihobiana tsy izy akory.
  '34':
  - type: text
    content: 'Ny fitarainan’i Hesbona dia re hatrany Elale sy Jahaza, hatrany Zoara ka hatrany Horonaima sy Eglata-Selisia; fa na dia ny ranon’i Nimrima aza dia ho ritra koa. '
  '35':
  - type: text
    content: 'Ary hatsahatro ao Moaba koa izay miakatra hanatitra amin’ny toerana fanaovana sorona sy izay mandoro ditin-kazo manitra ho an’ny andriamaniny, hoy NY TOMPO. '
  '36':
  - type: text
    content: 'Ary noho izany ny foko dia mitomany manao feon-tsodina noho ny amin’i Moaba, ary ny foko dia mitomany manao feon-tsodina noho ny amin’ny mponina ao Kira-Haresa, eny, noho izany dia levona ny harena be izay noharìny. '
  '37':
  - type: text
    content: 'Fa nosolaina ny loha rehetra, voaharatra ny somotra rehetra, asiana tetika amin’ny tanana rehetra ary lamba fisaonana no amin’ny andilany. '
  '38':
  - type: text
    content: 'Eny, amin’ny '
  - type: text
    content: tampon-trano
  - type: text
    content: ' rehetra any Moaba sy eny amin’ny kianja malalaka dia misy fisaonana avokoa; satria torotoroiko toy ny fanaka tsy misy ilàna azy intsony i Moaba, hoy NY TOMPO. '
  '39':
  - type: text
    content: 'Indrisy! Raiki-tahotra izy! Midradradradrà! Indrisy! Efa miamboho i Moaba, mangaihay izy ka tonga mampihomehy sady mampatahotra ho an’izay rehetra manodidina azy. '
  '4':
  - type: text
    content: Rava i Moaba,
  - type: text
    content: ny madinika ao dia mamoaka fitarainana.
  '40':
  - type: text
    content: 'Fa izao no lazain’NY TOMPO: Indro, hanidina toy ny voromahery izy ka hamelatra ny elany hipaoka an’i Moaba.'
  '41':
  - type: text
    content: Azo ny tanàna Keriota
  - type: text
    content: ary azo ny manda fiarovana,
  - type: text
    content: ary amin’izany andro izany ny fon’ny lehilahy maherin’i Moaba
  - type: text
    content: dia ho tahaka ny fon’ny vehivavy mihetsi-jaza.
  '42':
  - type: text
    content: Fa horavana tsy ho firenena intsony i Moaba
  - type: text
    content: satria niavonavona tamin’NY TOMPO.
  '43':
  - type: text
    content: Tahotra sy lavaka ary fandrika no mahazo anao,
  - type: text
    content: ry mponina any Moaba,
  - type: text
    content: hoy NY TOMPO.
  '44':
  - type: text
    content: Izay mandositra ny tahotra
  - type: text
    content: dia ho latsaka any an-davaka;
  - type: text
    content: ary izay miakatra avy any an-davaka
  - type: text
    content: dia ho voan’ny fandrika;
  - type: text
    content: fa hataoko tonga amin’i Moaba
  - type: text
    content: ny taona hamaliana azy,
  - type: text
    content: hoy NY TOMPO.
  '45':
  - type: text
    content: Ao amin’ny alokalok’i Hesbona
  - type: text
    content: no ijanonan’ny mpandositra satria lany hery ireny;
  - type: text
    content: kanjo misy afo mivoaka avy any Hesbona
  - type: text
    content: ary lelafo avy any Sihona
  - type: text
    content: ka mandevona ny sisin’i Moaba
  - type: text
    content: sy ny tampon-dohan’ny mpitabataba.
  '46':
  - type: text
    content: Idiran-doza ianao, ry Moaba!
  - type: text
    content: Ringana ny olon’i Kemosy!
  - type: text
    content: Fa ho babo ny zanakao lahy
  - type: text
    content: ary hosamborina ny zanakao vavy.
  '47':
  - type: text
    content: Nefa mbola hampodiko
  - type: text
    content: avy amin’ny fahababoana ihany i Moaba amin’ny ho avy,
  - type: text
    content: hoy NY TOMPO.
  - type: text
    content: Hatreto ny amin’ny fitsarana an’i Moaba.
  '5':
  - type: text
    content: Fa miakatra mitomany tsy misy fiafarany eny amin’ny fiakarana Lohita izy;
  - type: text
    content: ary any amin’ny fidinana mankany Horonaima no andrenesana fitarainana mafy
  - type: text
    content: noho ny fandringanana.
  '6':
  - type: text
    content: Mandosira, vonjeo ny ainareo
  - type: text
    content: ary aoka ho tahaka ny anjavidy any an-tany efitra ianareo.
  '7':
  - type: text
    content: Fa noho ny nitokianao
  - type: text
    content: tamin’ny asanao sy ny harenanao
  - type: text
    content: dia ho voasambotra koa ianao;
  - type: text
    content: ary i Kemosy dia ho lasan-ko babo,
  - type: text
    content: dia ny mpisorony sy ny mpanapaka azy rehetra.
  '8':
  - type: text
    content: Ary ho tonga ao amin’ny tanàna rehetra ny mpandringana
  - type: text
    content: ka tsy hisy tanàna tsy ho azo;
  - type: text
    content: ho simba koa ny lohasaha, ary ho rava ny tany lemaka,
  - type: text
    content: araka izay nolazain’NY TOMPO.
  '9':
  - type: text
    content: Omeo elatra i Moaba
  - type: text
    content: fa hanidina izy ka ho lasa;
  - type: text
    content: ary ho lao ny tanànany
  - type: text
    content: ka tsy hisy mponina.
