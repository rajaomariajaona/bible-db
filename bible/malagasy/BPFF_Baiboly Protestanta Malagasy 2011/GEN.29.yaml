document_id: GEN.29,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nihaonan’i Jakoba sy Rahely
  - type: text
    content: 'Dia niainga i Jakoba ka nankany amin’ny tanin’ny zanaky ny Atsinanana. '
  '10':
  - type: text
    content: 'Rehefa hitan’i Jakoba Rahely, zanakavavin’i Labana anadahin-dreniny, sy ny ondry aman’osin’i Labana anadahin-dreniny, dia nanatona izy ka nanakodia ny vato hiala tamin’ny vavan’ny fantsakana, ary nampisotro ny ondry aman’osin’i Labana anadahin-dreniny. '
  '11':
  - type: text
    content: 'Ary nanoroka an’i Rahely i Jakoba dia nigogogogo nitomany. '
  '12':
  - type: text
    content: 'Dia nambaran’i Jakoba tamin’i Rahely fa havan’ny rainy sy zanak’i Rebeka izy. Dia nihazakazaka Rahely nanambara izany tamin’ny rainy. '
  '13':
  - type: text
    content: 'Rehefa ren’i Labana ny filazany an’i Jakoba, zanak’anabaviny, dia nihazakazaka nitsena azy izy ka namihina azy sy nanoroka azy ary nitondra azy ho any an-tranony. Dia nambaran’i Jakoba tamin’i Labana izany rehetra izany. '
  '14':
  - type: text
    content: 'Ary hoy i Labana taminy: Taolako sy nofoko tokoa ianao. Ary nitoetra tao aminy nandritra ny iray volana i Jakoba.'
  - type: heading
    content: Rahely sy i Lea
  '15':
  - type: text
    content: 'Fa hoy i Labana tamin’i Jakoba: Moa na dia havako aza va ianao dia hanompo ahy maina? Lazao amiko izay tokony ho karamanao. '
  '16':
  - type: text
    content: 'I Labana moa dia nanan-janaka roa vavy: Lea no anaran’ny zokiny ary Rahely ny zandriny. '
  '17':
  - type: text
    content: 'I Lea dia nalefa-pijery fa Rahely kosa dia bikana sady tsara tarehy. '
  '18':
  - type: text
    content: 'Ary i Jakoba dia tia an’i Rahely ka niteny hoe: Aoka aho hanompo anao fito taona noho ny amin’i Rahely, zanakao faravavy. '
  '19':
  - type: text
    content: 'Dia hoy i Labana: Aleoko omena anao izy, toy izay homena lehilahy hafa. Koa mitoera eto amiko. '
  '2':
  - type: text
    content: 'Dia nahita lavaka fantsakana iray tany an-tsaha izy; ary indro, nisy ondry aman’osy andiany telo nandry teo anilany, fa teo amin’izany lavaka fantsakana izany no fampisotroan’ny olona ny andian’ondry aman’osy. Nisy vato lehibe teo am-bavan’ny fantsakana. '
  '20':
  - type: text
    content: Dia nanompo an’i Labana fito taona i Jakoba noho ny amin’i Rahely. Toa andro vitsy foana teo imasony izany noho ny fitiavany azy.
  '21':
  - type: text
    content: 'Ary hoy i Jakoba tamin’i Labana: Omeo ahy ny vadiko mba hiarahako aminy, fa efa tapitra ny fe-potoana! '
  '22':
  - type: text
    content: 'Dia nampamory ny tompon-tany rehetra ary i Labana ka nanao fanasana. '
  '23':
  - type: text
    content: 'Kanjo nony hariva dia naka an’i Lea zanany vavy izy ka nitondra azy ho any amin’i Jakoba; dia nanambady azy i Jakoba. '
  '24':
  - type: text
    content: 'Tamin’io dia nomen’i Labana an’i Lea zanany vavy i Zilpa mpanompovaviny hanompo azy. '
  '25':
  - type: text
    content: 'Nony maraina ny andro, indro, hay i Lea ilay izy! Dia hoy i Jakoba tamin’i Labana: Ahoana izao nataonao tamiko izao? Moa tsy Rahely va no nanompoako anao? Koa nahoana no nofitahinao aho? '
  '26':
  - type: text
    content: 'Fa hoy i Labana: Tsy fanao atỳ amin’ny taninay ny mamoaka ny zandriny alohan’ny zokiny. '
  '27':
  - type: text
    content: Tanteraho ny herinandron’ity iray ity dia homenay anao koa ny iray noho ny fanompoana izay mbola hanompoanao ahy fito taona indray.
  '28':
  - type: text
    content: 'Nataon’i Jakoba izany ka notanterahiny ny herinandrony; dia nomen’i Labana azy koa Rahely zanany vavy ho vadiny. '
  '29':
  - type: text
    content: 'Ary nomen’i Labana an’i Rahely zanany vavy kosa i Bila mpanompovaviny hanompo azy. '
  '3':
  - type: text
    content: 'Teo no nangonina ny andian’ondry aman’osy rehetra, dia nakodia hiala amin’ny vavan’ny fantsakana ny vato ka nampisotroina ny ondry aman’osy; avy eo dia averina ho amin’ny toerany eo am-bavan’ny fantsakana indray ny vato. '
  '30':
  - type: text
    content: Dia novadin’i Jakoba koa Rahely; izy no tiany mihoatra noho i Lea ka nanompo an’i Labana fito taona indray izy.
  - type: heading
    content: Ireo zanak’i Jakoba
  '31':
  - type: text
    content: 'Rehefa hitan’NY TOMPO fa nankahalaina i Lea dia nampanana anaka azy Izy, fa Rahely kosa dia momba. '
  '32':
  - type: text
    content: Dia nanana anaka i Lea ka niteraka zazalahy, ary ny anarany dia nataony hoe Robena
  - type: note
    content: 'Robena: Indro zanakalahy.'
  - type: text
    content: '; fa hoy izy: Efa nahita ny fahoriako NY TOMPO, fa ankehitriny dia ho tian’ny vadiko aho. '
  '33':
  - type: text
    content: 'Dia nanana anaka indray izy ka niteraka zazalahy. Ary hoy izy: Satria ren’NY TOMPO fa nankahalaina aho ka nomeny ahy koa ity. Dia nataony hoe Simeona'
  - type: note
    content: 'Simeona: Fihainoana.'
  - type: text
    content: ' ny anarany. '
  '34':
  - type: text
    content: 'Dia nanana anaka indray izy ka niteraka zazalahy. Ary hoy izy: Ankehitriny izao dia hifikitra amiko ny vadiko satria niteraka zazalahy telo ho azy aho. Izany no nanaovana ny anarany hoe Levy'
  - type: note
    content: 'Levy: Fifikirana.'
  - type: text
    content: '. '
  '35':
  - type: text
    content: 'Dia nanana anaka indray izy ka niteraka zazalahy. Ary hoy izy: Ankehitriny, hidera NY TOMPO aho. Izany no nanaovany ny anarany hoe Joda'
  - type: note
    content: 'Joda: Hoderaina na: Izay hiderana NY TOMPO.'
  - type: text
    content: . Dia nitsaha-jaza izy.
  '4':
  - type: text
    content: 'Hoy i Jakoba tamin’ny olona: Ry rahalahiko, avy aiza moa ianareo? Hoy ireo: Avy any Harana izahay. '
  '5':
  - type: text
    content: 'Dia hoy izy taminy: Moa mba fantatrareo va i Labana, zanakalahin’i Nahora? Hoy ireo: Fantatray izy. '
  '6':
  - type: text
    content: 'Hoy izy taminy: Tsara ihany va izy? Dia hoy ireo: Tsara ihany izy! Ary indro, tamy Rahely zanany vavy mitondra ny ondry aman’osy. '
  '7':
  - type: text
    content: 'Hoy indray izy: Mbola antoandrobe ny andro ka tsy mbola fotoana famoriana ny omby aman’ondry izao; ampisotroy ny ondry aman’osy ka mandehana, andraso izy. '
  '8':
  - type: text
    content: 'Hoy ireo: Tsy azonay atao izany raha tsy efa tafangona avokoa ny andian’ondry aman’osy rehetra ka akodia ny vato hiala amin’ny vavan’ny fantsakana; dia izay vao mampisotro ny ondry aman’osy izahay.'
  '9':
  - type: text
    content: 'Raha mbola niteny tamin’izy ireo i Jakoba dia indro tamy Rahely nitondra ny ondry aman’osin’ny rainy; fa mpiandry ondry izy. '
