document_id: GEN.29
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nihaonan’i Jakoba sy Rahely
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Dia niainga i Jakoba ka nankany amin’ny tanin’ny zanaky ny Atsinanana. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Dia nahita lavaka fantsakana iray tany an-tsaha izy; ary indro, nisy ondry aman’osy andiany telo nandry teo anilany, fa teo amin’izany lavaka fantsakana izany no fampisotroan’ny olona ny andian’ondry aman’osy. Nisy vato lehibe teo am-bavan’ny fantsakana. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Teo no nangonina ny andian’ondry aman’osy rehetra, dia nakodia hiala amin’ny vavan’ny fantsakana ny vato ka nampisotroina ny ondry aman’osy; avy eo dia averina ho amin’ny toerany eo am-bavan’ny fantsakana indray ny vato. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Hoy i Jakoba tamin’ny olona: Ry rahalahiko, avy aiza moa ianareo? Hoy ireo: Avy any Harana izahay. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia hoy izy taminy: Moa mba fantatrareo va i Labana, zanakalahin’i Nahora? Hoy ireo: Fantatray izy. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Hoy izy taminy: Tsara ihany va izy? Dia hoy ireo: Tsara ihany izy! Ary indro, tamy Rahely zanany vavy mitondra ny ondry aman’osy. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Hoy indray izy: Mbola antoandrobe ny andro ka tsy mbola fotoana famoriana ny omby aman’ondry izao; ampisotroy ny ondry aman’osy ka mandehana, andraso izy. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Hoy ireo: Tsy azonay atao izany raha tsy efa tafangona avokoa ny andian’ondry aman’osy rehetra ka akodia ny vato hiala amin’ny vavan’ny fantsakana; dia izay vao mampisotro ny ondry aman’osy izahay.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Raha mbola niteny tamin’izy ireo i Jakoba dia indro tamy Rahely nitondra ny ondry aman’osin’ny rainy; fa mpiandry ondry izy. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Rehefa hitan’i Jakoba Rahely, zanakavavin’i Labana anadahin-dreniny, sy ny ondry aman’osin’i Labana anadahin-dreniny, dia nanatona izy ka nanakodia ny vato hiala tamin’ny vavan’ny fantsakana, ary nampisotro ny ondry aman’osin’i Labana anadahin-dreniny. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary nanoroka an’i Rahely i Jakoba dia nigogogogo nitomany. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Dia nambaran’i Jakoba tamin’i Rahely fa havan’ny rainy sy zanak’i Rebeka izy. Dia nihazakazaka Rahely nanambara izany tamin’ny rainy. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Rehefa ren’i Labana ny filazany an’i Jakoba, zanak’anabaviny, dia nihazakazaka nitsena azy izy ka namihina azy sy nanoroka azy ary nitondra azy ho any an-tranony. Dia nambaran’i Jakoba tamin’i Labana izany rehetra izany. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary hoy i Labana taminy: Taolako sy nofoko tokoa ianao. Ary nitoetra tao aminy nandritra ny iray volana i Jakoba.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Rahely sy i Lea
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Fa hoy i Labana tamin’i Jakoba: Moa na dia havako aza va ianao dia hanompo ahy maina? Lazao amiko izay tokony ho karamanao. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'I Labana moa dia nanan-janaka roa vavy: Lea no anaran’ny zokiny ary Rahely ny zandriny. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'I Lea dia nalefa-pijery fa Rahely kosa dia bikana sady tsara tarehy. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary i Jakoba dia tia an’i Rahely ka niteny hoe: Aoka aho hanompo anao fito taona noho ny amin’i Rahely, zanakao faravavy. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Dia hoy i Labana: Aleoko omena anao izy, toy izay homena lehilahy hafa. Koa mitoera eto amiko. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Dia nanompo an’i Labana fito taona i Jakoba noho ny amin’i Rahely. Toa andro vitsy foana teo imasony izany noho ny fitiavany azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary hoy i Jakoba tamin’i Labana: Omeo ahy ny vadiko mba hiarahako aminy, fa efa tapitra ny fe-potoana! '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Dia nampamory ny tompon-tany rehetra ary i Labana ka nanao fanasana. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Kanjo nony hariva dia naka an’i Lea zanany vavy izy ka nitondra azy ho any amin’i Jakoba; dia nanambady azy i Jakoba. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Tamin’io dia nomen’i Labana an’i Lea zanany vavy i Zilpa mpanompovaviny hanompo azy. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Nony maraina ny andro, indro, hay i Lea ilay izy! Dia hoy i Jakoba tamin’i Labana: Ahoana izao nataonao tamiko izao? Moa tsy Rahely va no nanompoako anao? Koa nahoana no nofitahinao aho? '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Fa hoy i Labana: Tsy fanao atỳ amin’ny taninay ny mamoaka ny zandriny alohan’ny zokiny. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Tanteraho ny herinandron’ity iray ity dia homenay anao koa ny iray noho ny fanompoana izay mbola hanompoanao ahy fito taona indray.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Nataon’i Jakoba izany ka notanterahiny ny herinandrony; dia nomen’i Labana azy koa Rahely zanany vavy ho vadiny. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ary nomen’i Labana an’i Rahely zanany vavy kosa i Bila mpanompovaviny hanompo azy. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Dia novadin’i Jakoba koa Rahely; izy no tiany mihoatra noho i Lea ka nanompo an’i Labana fito taona indray izy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ireo zanak’i Jakoba
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Rehefa hitan’NY TOMPO fa nankahalaina i Lea dia nampanana anaka azy Izy, fa Rahely kosa dia momba. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Dia nanana anaka i Lea ka niteraka zazalahy, ary ny anarany dia nataony hoe Robena
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29.32 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Robena: Indro zanakalahy.'
    marker-yv: yv-n
  - type: text
    text: '; fa hoy izy: Efa nahita ny fahoriako NY TOMPO, fa ankehitriny dia ho tian’ny vadiko aho. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Dia nanana anaka indray izy ka niteraka zazalahy. Ary hoy izy: Satria ren’NY TOMPO fa nankahalaina aho ka nomeny ahy koa ity. Dia nataony hoe Simeona'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29.33 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Simeona: Fihainoana.'
    marker-yv: yv-n
  - type: text
    text: ' ny anarany. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Dia nanana anaka indray izy ka niteraka zazalahy. Ary hoy izy: Ankehitriny izao dia hifikitra amiko ny vadiko satria niteraka zazalahy telo ho azy aho. Izany no nanaovana ny anarany hoe Levy'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29.34 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Levy: Fifikirana.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Dia nanana anaka indray izy ka niteraka zazalahy. Ary hoy izy: Ankehitriny, hidera NY TOMPO aho. Izany no nanaovany ny anarany hoe Joda'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29.35 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Joda: Hoderaina '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Izay hiderana NY TOMPO.
    marker-yv: yv-n
  - type: text
    text: . Dia nitsaha-jaza izy.
