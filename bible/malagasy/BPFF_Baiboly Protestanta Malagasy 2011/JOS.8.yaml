document_id: JOS.8,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nahazoana an’i Ay
  - type: text
    content: 'Hoy NY TOMPO tamin’i Josoa: Aza matahotra na mivadi-po ianao. Ento miaraka aminao ny vahoaka rehetra mpanafika ka miaingà, iakaro i Ay; indro, efa natolotro eo an-tananao ny mpanjakan’i Ay mbamin’ny vahoakany sy ny tanànany ary ny taniny. '
  '10':
  - type: text
    content: 'Ary nifoha vao maraina i Josoa ka nandamina ny vahoaka dia niakatra teo alohan’ny vahoaka hankany Ay izy sy ny loholon’ny Israely. '
  '11':
  - type: text
    content: 'Ary ny vahoaka mpanafika rehetra, izay niaraka tamin’i Josoa, dia niakatra ka nanakaiky sy nanandrify ny tanàna; ary nitoby teo avaratr’i Ay ireo ka ny lohasaha no teo anelanelan’i Ay sy rizareo. '
  '12':
  - type: text
    content: 'Dia naka olona tokony ho dimy arivo lahy izy ka nampanao vela-pandrika teo anelanelan’i Betela sy i Ay, andrefan’ny tanàna. '
  '13':
  - type: text
    content: Ary rehefa voalahatry ny vahoaka ny toby rehetra izay teo avaratry ny tanàna sy ny vela-pandrika teo andrefan’ny tanàna dia nandeha nankeo amin’ny lohasaha i Josoa tamin’io alina io.
  '14':
  - type: text
    content: 'Rehefa hitan’ny mpanjakan’i Ay izany dia nifoha vao maraina ny olona tao an-tanàna ka nandeha haingana hiady tamin’ny Israely, teo amin’ny toerana nifamotoanany tandrifin’i Arabà, ireo moa dia ny mpanjaka sy ny vahoakany: Satria tsy fantany ho nisy vela-pandrika hamely azy tao ambadiky ny tanàna. '
  '15':
  - type: text
    content: 'Ary i Josoa sy ny Israely rehetra dia nody resy teo anoloany ka nanao tari-dositra tamin’ny lalana mankany an-tany efitra. '
  '16':
  - type: text
    content: 'Dia nifampiantso hanenjika azy ny vahoaka rehetra izay tao an-tanàna; ary nanenjika an’i Josoa izy ka voatarika ho tafavoaka ny tanàna. '
  '17':
  - type: text
    content: Tsy nisy lehilahy tavela, na tao Ay na tao Betela, fa tsy nisy izay tsy nandeha hanenjika ny Israely; ary nilaozany mbola nivoha ny tanàna ka lasa nanenjika ny Israely izy.
  '18':
  - type: text
    content: 'Ary hoy NY TOMPO tamin’i Josoa: Atondroy an’i Ay ny lefona izay eny an-tananao fa hatolotro eo an-tananao i Ay. Dia natondron’i Josoa ny tanàna ny lefona izay teny an-tanany. '
  '19':
  - type: text
    content: 'Raha vao natondrony ny tanany dia nirohotra haingana ny nanao vela-pandrika avy tao amin’ny nitoerany ka nihazakazaka; dia niditra tao an-tanàna izy ireo ka nahazo azy ary nandoro azy haingana tamin’ny afo. '
  '2':
  - type: text
    content: Tahaka ny nataonao tamin’i Jeriko sy ny mpanjakany no hataonao koa amin’i Ay sy ny mpanjakany; nefa ny fananana rehetra sy ny biby fiompy ao dia halainareo ho babo ho anareo ihany. Asio vela-pandrika avy ao ambadiky ny tanàna.
  '20':
  - type: text
    content: 'Ary niherika ny mponina tao Ay ka hitany fa indro, ny setroky ny tanàna niakatra ho any an-danitra, sady tsy nisy handosirany na aiza na aiza intsony, na ho etỳ na ho erỳ. Ny Israely izay nanao tari-dositra ho any an-tany efitra dia nifotitra namely ny mpanenjika kosa. '
  '21':
  - type: text
    content: 'Rehefa hitan’i Josoa sy ny Israely rehetra fa efa azon’ny vela-pandrika ny tanàna ka niakatra ny setroky ny tanàna dia nifotitra izy ka namely ny mponina tao Ay. '
  '22':
  - type: text
    content: 'Ary ireo tao an-tanàna koa dia niainga hamely azy ka latsaka teo afovoan’ny Israely ny olona, fa ny Israely sasany dia teo an-daniny iray ary ny sasany dia teo an-kilany; dia nifandafaran’ny Israely teo izy ka tsy nasiany niangana na dia iray akory aza. '
  '23':
  - type: text
    content: 'Ary nataony sambo-belona ny mpanjakan’i Ay ka noentiny teo amin’i Josoa. '
  '24':
  - type: text
    content: 'Rehefa avy namono ny mponina rehetra tao Ay tany an-tsaha ny Israely, tany amin’ny tany efitra nanenjehany azy, ka lavo tamin’ny lelan-tsabatra avokoa izy rehetra mandra-pahalany ritra azy dia niverina tany Ay ny Israely rehetra ka namely azy tamin’ny lelan-tsabatra. '
  '25':
  - type: text
    content: 'Ary ireo rehetra maty tamin’izany andro izany, na lehilahy na vehivavy, dia roa arivo sy iray alina, izany hoe ny mponina rehetra tao Ay. '
  '26':
  - type: text
    content: 'Ary tsy nampihemotra ny tanany izay nanondro tamin’ny lefona i Josoa mandra-panaony ny mponina rehetra tao Ay ho zavatra voaozona. '
  '27':
  - type: text
    content: 'Nefa ny biby fiompy mbamin’ny fananana rehetra tao amin’izany tanàna izany dia nalain’ny Israely ho babony ihany, araka ny tenin’NY TOMPO izay nandidiany an’i Josoa. '
  '28':
  - type: text
    content: 'Ary nodoran’i Josoa i Ay ka nofoanany ho tanàna haolo mandrakizay, dia toy izany mandraka androany izy. '
  '29':
  - type: text
    content: Nahantony tamin’ny hazo mandra-paharivan’ny andro ny mpanjakan’i Ay; ary rehefa tokony ho maty masoandro dia nasain’i Josoa nesorina tamin’ny hazo ny fatiny ka nariana teo anoloan’ny vavahadin’ny tanàna sady notsindriany antontam-bato avo mandraka androany.
  - type: heading
    content: Ny namakiana ny lalàna teo an-tendrombohitra Ebala
  '3':
  - type: text
    content: 'Dia niainga i Josoa sy ny mpanafika rehetra hiakatra any Ay, ary nifidy lehilahy mahery telo alina i Josoa ka nandefa ireo rehefa alina. '
  '30':
  - type: text
    content: 'Tamin’izany dia nanorina alitara ho an’NY TOMPO, Andriamanitry ny Israely, teo an-tendrombohitra Ebala i Josoa, '
  '31':
  - type: text
    content: 'araka izay nandidian’i Mosesy, mpanompon’NY TOMPO, ny Zanak’Israely, araka ny voasoratra ao amin’ny bokin’ny lalànan’i Mosesy, ka alitara vato tsy voavoatra, izay tsy nopehim-by no natao; dia nanolotra fanatitra dorana manontolo teo amboniny ho an’NY TOMPO izy sady namono zavatra hatao fanati-pihavanana koa. '
  '32':
  - type: text
    content: 'Ary nosoratany teo amin’ny vato ny dika mitovy tamin’ny lalànan’i Mosesy, izay nosoratany teo anatrehan’ny Zanak’Israely. '
  '33':
  - type: text
    content: 'Ny Israely rehetra sy ny loholony sy ny mpifehy azy ary ny mpitsara azy, na olona hafa firenena na Israely, dia nitsangana teo an-daniny roa amin’ny '
  - type: text
    content: vata misy ny Fanekena
  - type: text
    content: ', teo anatrehan’ny '
  - type: text
    content: levita
  - type: text
    content: ' mpisorona izay nitondra ny vata misy ny faneken’NY TOMPO: Ny antsasany dia nanandrify ny tendrombohitra Gerizima, ary ny antsasany dia nanandrify ny tendrombohitra Ebala, araka izay efa nandidian’i Mosesy, mpanompon’NY TOMPO fahiny, mba hitsodrano ny vahoakan’Israely. '
  '34':
  - type: text
    content: 'Rehefa afaka izany dia namaky ny tenin’ny lalàna rehetra izy, dia ny fitahiana sy ny fanozonana, araka izay rehetra voasoratra ao amin’ny bokin’ny lalàna. '
  '35':
  - type: text
    content: Tsy nisy teny tamin’izay rehetra nandidian’i Mosesy, izay tsy novakin’i Josoa teo anatrehan’ny fiangonan’ny Israely manontolo, mbamin’ny vehivavy sy ny ankizy madinika ary ny vahiny izay teo aminy.
  '4':
  - type: text
    content: 'Ary nandidy azy izy hoe: Indro, hanao vela-pandrika avy ao ambadiky ny tanàna hamely azy ianareo ka aza manalavitra azy loatra fa aoka ho vonona ianareo rehetra. '
  '5':
  - type: text
    content: 'Izaho sy ny vahoaka rehetra izay miaraka amiko kosa dia hanatona ny tanàna; ary rehefa manatona hamely anay tahaka ny teo ny olona dia handositra eo anoloany izahay. '
  '6':
  - type: text
    content: 'Ary hivoaka hanenjika anay izy mandra-pitarikay azy hiala ao an-tanàna; fa hoy izy hoe: Mandositra eo anoloantsika tahaka ny teo izy; dia hanao tari-dositra eo anoloany izahay. '
  '7':
  - type: text
    content: 'Nefa hiroatra avy ao amin’ny vela-pandrika kosa ianareo ka ho azonareo ny tanàna, fa hatolotry NY TOMPO Andriamanitrareo eo an-tananareo izy. '
  '8':
  - type: text
    content: Rehefa azonareo ny tanàna dia doroy amin’ny afo, araka ny didin’NY TOMPO no hataonareo. Indro, efa nandidy anareo aho.
  '9':
  - type: text
    content: Dia nampandehanin’i Josoa izy ireo ka roso hanao vela-pandrika ary nitoetra teo andrefan’i Ay, teo anelanelan’i Betela sy i Ay. Fa i Josoa kosa dia nitoetra teo amin’ny vahoaka ihany tamin’izany alina izany.
