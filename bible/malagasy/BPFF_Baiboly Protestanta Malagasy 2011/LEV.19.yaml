document_id: LEV.19,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fomba tian’Andriamanitra hanompoana Azy
  - type: text
    content: 'Ary NY TOMPO niteny tamin’i Mosesy hoe: '
  '10':
  - type: text
    content: 'Aza otazana avokoa ny voaloboka eo amin’ny sahanao ary aza tsimponina izay latsaka eo amin’ny sahanao. Avelao ho an’ny mahantra sy ny vahiny izany: Izaho no TOMPO Andriamanitrareo.'
  '11':
  - type: text
    content: 'Aza mangalatra, aza mamitaka, aza mifandainga. '
  '12':
  - type: text
    content: 'Aza manao fianianana mandainga amin’ny anarako ka hanamavo ny anaran’Andriamanitrao: Izaho no TOMPO.'
  '13':
  - type: text
    content: 'Aza maka an-keriny ny zavatry ny namanao na mampahory azy; aoka tsy hitoetra ao aminao mandritra ny alina ny karaman’izay nokaramainao. '
  '14':
  - type: text
    content: 'Aza miteny ratsy ny marenina na manisy zavatra mahatafintohina eo anoloan’ny jamba; fa matahora an’Andriamanitrao: Izaho no TOMPO.'
  '15':
  - type: text
    content: 'Aza manao izay tsy marina amin’ny fitsarana; aza miandany foana amin’ny mahantra, na mena-maso ny lehibe; fahamarinana no hitsaranao ny namanao. '
  '16':
  - type: text
    content: 'Aza mandehandeha manaratsy ny mpiaramonina aminao; aza mitsangana handatsaka ny ran’ny namanao: Izaho no TOMPO. '
  '17':
  - type: text
    content: 'Aza mankahala ny rahalahinao amin’ny fonao; anaro mafy ny mpiray firenena aminao mba tsy hahazoanao heloka noho ny aminy. '
  '18':
  - type: text
    content: 'Aza mamaly ratsy na manao lolompo amin’ny zanaky ny firenenao fa tiava ny namanao tahaka ny tenanao: Izaho no TOMPO.'
  '19':
  - type: text
    content: 'Tandremo ny fitsipiko: Aza avela hiray amin’ny hafa karazana noho izy ny biby fiompinao; aza fafazanao voan-javatra roa tsy mitovy karazana ny taninao; ary aza mitafy lamba natao amin’ny zavatra roa samihafa karazana.'
  '2':
  - type: text
    content: 'Mitenena amin’ny fiangonana manontolo, dia ny Zanak’Israely hoe: Aoka ho masina ianareo satria masina Aho, TOMPO Andriamanitrareo. '
  '20':
  - type: text
    content: 'Raha misy mandry amin’ny andevovavy izay efa voafofon’olona ho vadiny ka tsy voaavotra na voavotsotra ho olona afaka Ravehivavy dia hofaizina izy roa nefa tsy hovonoina satria tsy olona afaka Ravehivavy. '
  '21':
  - type: text
    content: 'Fa hoentin-dRalehilahy ho eo anoloan’ny varavaran’ny '
  - type: text
    content: tranolay fihaonana
  - type: text
    content: ' ny fanati-panonerany ho an’NY TOMPO, dia ondrilahy iray hatao fanati-panonerana; '
  '22':
  - type: text
    content: ary ny mpisorona dia hanao fanavotana ho azy amin’ilay ondrilahy hatao fanati-panonerana, eo anatrehan’NY TOMPO, noho ny fahotana izay nataony; dia havela izany fahotany izany.
  '23':
  - type: text
    content: 'Rehefa tonga any amin’ilay tany ianareo ka mamboly hazo fihinam-boa dia hevero ho toy ny tsy voafora ny voany; telo taona no hataonareo ho toy ny tsy voafora izy ka tsy azo hanina. '
  '24':
  - type: text
    content: 'Amin’ny taona fahefatra kosa dia ho masina ny voany rehetra ka hatao fanatitra hiderana NY TOMPO. '
  '25':
  - type: text
    content: 'Amin’ny taona fahadimy vao hihinana ny voany ianareo mba hitomboan’ny fahavokarany ho anareo: Izaho no TOMPO Andriamanitrareo.'
  '26':
  - type: text
    content: 'Aza mihinana zavatra misy ra; aza manao sikidy na manandro. '
  '27':
  - type: text
    content: 'Aza manasola ny fihirifanareo. Aza manaratra ny sisin’ny volombavanao. '
  '28':
  - type: text
    content: Aza mitetika ny tenanareo ho an’ny maty na manao tombo-kavatsa amin’ny tenanareo. Izaho no TOMPO.
  '29':
  - type: text
    content: Aza mampijangajanga ny zanakao vavy ka hampaloto azy, fandrao hijangajanga ny tany ka ho feno fahavetavetana.
  '3':
  - type: text
    content: 'Samia matahotra ny reninareo sy ny rainareo ary tandremo ny Sabatako: Izaho no TOMPO Andriamanitrareo.'
  '30':
  - type: text
    content: 'Tandremo ny Sabatako ary hajao ny fitoerako masina: Izaho no TOMPO.'
  '31':
  - type: text
    content: 'Aza mivily hanaraka izay mpiantso ny fanahin’ny maty na mitady saina amin’ny mpanandro hampahaloto anareo aminy: Izaho no TOMPO Andriamanitrareo. '
  '32':
  - type: text
    content: 'Mitsangàna ianao raha eo anatrehan’ny fotsy volo; manajà ny zokiolona. Matahora an’Andriamanitrao: Izaho no TOMPO.'
  '33':
  - type: text
    content: 'Raha misy mivahiny aminareo eo amin’ny taninareo dia aza mampahory azy. '
  '34':
  - type: text
    content: 'Ny vahiny izay monina eo aminareo dia hataonareo tahaka ny tompon-tany ihany ka ho tianao tahaka ny tenanao izy; fa efa mba vahiny tany amin’ny tany Ejipta ianareo: Izaho no TOMPO Andriamanitrareo.'
  '35':
  - type: text
    content: 'Aza manao izay tsy marina, na amin’ny fitsarana na amin’ny fandrefesana na amin’ny fandanjana na amin’ny famarana. '
  '36':
  - type: text
    content: 'Mizana marina, vato mizana marina, '
  - type: text
    content: efaha
  - type: text
    content: ' marina, '
  - type: text
    content: hina
  - type: text
    content: ' marina, no hotananareo: Izaho no TOMPO Andriamanitrareo izay nitondra anareo nivoaka avy tany amin’ny tany Ejipta. '
  '37':
  - type: text
    content: 'Tandremo ny didiko rehetra sy ny fitsipiko rehetra ka araho izany: Izaho no TOMPO.'
  '4':
  - type: text
    content: 'Aza mivily hanaraka ireo andriamanitra tsy izy ary aza manao andriamanitra amin’ny vy voarendrika ho anareo: Izaho no TOMPO Andriamanitrareo.'
  '5':
  - type: text
    content: 'Raha mamono zavatra hatao fanati-pihavanana ho an’NY TOMPO ianareo dia ataovy amin’izay hankasitrahana anareo izany. '
  '6':
  - type: text
    content: 'Amin’izay andro amonoanareo zavatra hatao fanatitra sy amin’ny ampitson’iny no hihinananareo azy; fa raha mbola misy sisa tratry ny andro fahatelo dia hodorana amin’ny afo. '
  '7':
  - type: text
    content: 'Ary raha hanina amin’ny andro fahatelo izany dia ho fahavetavetana ka tsy hankasitrahana, '
  '8':
  - type: text
    content: fa izay mihinana azy io dia ho meloka satria nanamavo ny zava-masin’NY TOMPO izy ka hesorina tsy ho amin’ny fireneny izany olona izany.
  '9':
  - type: text
    content: 'Raha mijinja ny vokatry ny tanimbarinareo ianareo dia aza jinjaina avokoa ny eny an-tsisiny; aza tsimponina izay latsaka avy amin’ny vokatrao. '
