document_id: MAT.22,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Fanoharana ny amin’ny fampakaram-bady
  - type: heading
    content: Lio 14.15-24
  - type: text
    content: 'Ary Jesosy mbola niteny taminy tamin’ny fanoharana hafa hoe: '
  '10':
  - type: text
    content: Dia nandeha ho eny amin’ny lalana ireny mpanompo ireny ka namory izay rehetra hitany, na ny ratsy na ny tsara; dia feno mpiara-misakafo ny fampakaram-bady.
  '11':
  - type: text
    content: 'Nony efa niditra ny mpanjaka hizaha ny mpiara-misakafo dia nahita lehilahy iray izay tsy niakanjo ny akanjo fitondra amin’ny fampakaram-bady. '
  '12':
  - type: text
    content: 'Dia hoy izy taminy: Ry sakaiza, ahoana no idiranao eto, nefa ianao tsy manana ny akanjo fitondra amin’ny fampakaram-bady? Dia tsy nahateny izy. '
  '13':
  - type: text
    content: 'Ary hoy ny mpanjaka tamin’ny mpanompony: Afatory ny tongony aman-tanany dia ario any amin’ny maizina any ivelany izy; any no hisy ny fitomaniana sy ny fikitroha-nify. '
  '14':
  - type: text
    content: Fa maro no antsoina nefa vitsy no fidina.
  - type: heading
    content: Ny hetra ho an’i Kaisara
  - type: heading
    content: Mar 12.13-17; Lio 20.20-26
  '15':
  - type: text
    content: 'Ary tamin’izay dia lasa ny '
  - type: text
    content: Fariseo
  - type: text
    content: ' ka nikaon-doha mba hamandrika Azy amin’ny teniny. '
  '16':
  - type: text
    content: 'Koa naniraka ny mpianany mbamin’ny Herodiana hankeo aminy izy ireo ka niteny hoe: Mpampianatra ô, fantatray fa marina Ianao ka mampianatra marina ny lalànan’Andriamanitra ary tsy miahiahy olona satria tsy mba mizaha tavan’olona Ianao. '
  '17':
  - type: text
    content: 'Koa lazao aminay ary izay hevitrao: Moa mety va ny mandoa vola hetra ho an’i Kaisara sa tsia? '
  '18':
  - type: text
    content: 'Fa Jesosy nahalala ny faharatsiany ka hoy Izy: Nahoana no maka fanahy Ahy ianareo, ry mpihatsaravelatsihy? '
  '19':
  - type: text
    content: 'Asehoy Ahy ny vola fandoa amin’ny hetra. Dia nitondrany '
  - type: text
    content: denaria
  - type: text
    content: ' iray Izy. '
  '2':
  - type: text
    content: 'Ny fanjakan’ny lanitra dia tahaka ny mpanjaka iray izay nanao fanasana noho ny amin’ny fampakaram-badin’ny zanany lahy. '
  '20':
  - type: text
    content: 'Dia hoy Jesosy taminy: An’iza ity sary sy soratra ity? '
  '21':
  - type: text
    content: 'Hoy ireo Taminy: An’i Kaisara. Dia hoy Jesosy taminy: Aloavy ho an’i Kaisara ary izay an’i Kaisara ary ho an’Andriamanitra izay an’Andriamanitra. '
  '22':
  - type: text
    content: Ary gaga izy ireo nony nahare izany, dia nandao Azy ka lasa nandeha.
  - type: heading
    content: Fanontaniana ny amin’ny fitsanganan’ny maty
  - type: heading
    content: Mar 12.18-27; Lio 20.27-38
  '23':
  - type: text
    content: 'Tamin’io andro io ihany dia nankeo amin’i Jesosy ny '
  - type: text
    content: Sadoseo
  - type: text
    content: ' sasany izay nilaza fa tsy misy ny fitsanganana amin’ny maty ka nanontany Azy hoe: '
  '24':
  - type: text
    content: 'Mpampianatra ô, i Mosesy dia nilaza hoe: «Raha misy lehilahy maty momba dia aoka ny rahalahiny hampakatra ny vadiny ka hiteraka hamelo-maso ny rahalahiny» (Deo 25.5). '
  '25':
  - type: text
    content: 'Koa nisy fito mirahalahy tetỳ aminay; ary nampaka-bady ny zokiny dia maty, ary satria tsy niteraka izy dia navelany ho an’ny rahalahiny ny vadiny; '
  '26':
  - type: text
    content: 'ary toy izany koa ny faharoa sy ny fahatelo, hatramin’ny fahafito. '
  '27':
  - type: text
    content: 'Ary tao aorianan’izy rehetra dia maty koa Ravehivavy. '
  '28':
  - type: text
    content: 'Koa amin’ny fitsanganan’ny maty, ho vadin’iza amin’izy fito mirahalahy moa Ravehivavy? Satria efa samy nanambady azy avokoa izy rehetra. '
  '29':
  - type: text
    content: 'Fa Jesosy namaly azy ireo hoe: Mahadiso hevitra anareo ny tsy fahafantaranareo na ny Soratra Masina na ny herin’Andriamanitra. '
  '3':
  - type: text
    content: 'Ary naniraka ny mpanompony izy hiantso izay efa nasaina mba hankao amin’ny fampakaram-bady; nefa tsy nety ho avy ireo. '
  '30':
  - type: text
    content: 'Fa amin’ny fitsanganan’ny maty dia tsy mba hisy olona hampaka-bady, na havoaka hampakarina, fa ho tahaka ny anjely any an-danitra izy. '
  '31':
  - type: text
    content: 'Koa ny amin’ny fitsanganan’ny maty, moa mbola tsy novakinareo va ny teny nataon’Andriamanitra taminareo milaza hoe: '
  '32':
  - type: text
    content: '«Izaho no Andriamanitr’i Abrahama sy Andriamanitr’Isaka ary Andriamanitr’i Jakoba (Eks 3.6)? Andriamanitra tsy an’ny maty fa an’ny velona.» '
  '33':
  - type: text
    content: Ary ny vahoaka, raha nandre izany, dia talanjona tamin’ny fampianarany.
  - type: heading
    content: Ny didy lehibe indrindra
  - type: heading
    content: Mar 12.28-34; ampit. Lio 10.25-37
  '34':
  - type: text
    content: 'Ny '
  - type: text
    content: Fariseo
  - type: text
    content: ', nony nandre fa gina teo anatrehan’i Jesosy ny Sadoseo, dia nivory teo amin’ny toerana iray. '
  '35':
  - type: text
    content: 'Ary ny iray tamin’ireo, izay mpahay lalàna, dia nanontany naka fanahy Azy hoe: '
  '36':
  - type: text
    content: 'Mpampianatra ô, ny didy manao ahoana moa no lehibe ao amin’ny lalàna? '
  '37':
  - type: text
    content: 'Dia hoy Jesosy taminy: «Tiava NY TOMPO Andriamanitrao amin’ny fonao manontolo sy ny fanahinao manontolo ary ny sainao manontolo» (Deo 6.5). '
  '38':
  - type: text
    content: 'Izany no didy lehibe sady voalohany. '
  '39':
  - type: text
    content: 'Ary ny faharoa, izay tahaka azy ihany, dia izao: «Tiava ny namanao tahaka ny tenanao» (Lev 19.18). '
  '4':
  - type: text
    content: 'Dia naniraka mpanompo hafa indray izy ka niteny hoe: Lazao amin’ireo izay efa nasaina hoe: Indro, efa vonona ny sakafo nomaniko; efa voavono ny ombiko sy ny nafahiko ka efa vonona avokoa ny zavatra rehetra; koa tongava amin’izay atỳ amin’ny fampakaram-bady ianareo. '
  '40':
  - type: text
    content: Izany didy roa izany no ihantonan’ny lalàna manontolo sy ny mpaminany.
  - type: heading
    content: Kristy sy i Davida
  - type: heading
    content: Mar 12.35-37; Lio 20.41-44
  '41':
  - type: text
    content: 'Ary rehefa tafavory ny '
  - type: text
    content: Fariseo
  - type: text
    content: ' dia nanontany azy ireo Jesosy hoe: '
  '42':
  - type: text
    content: 'Ahoana ny hevitrareo ny amin’i '
  - type: text
    content: Kristy
  - type: text
    content: '? Zanak’iza moa Izy? Dia hoy ireo Taminy: Zanak’i Davida. '
  '43':
  - type: text
    content: 'Fa hoy Jesosy tamin’izy ireo: Koa nahoana ary i Davida, amin’ny Fanahy, no miantso Azy hoe Tompo, sady miteny hoe:'
  '44':
  - type: text
    content: '«NY TOMPO nilaza tamin’ny Tompoko hoe:'
  - type: text
    content: Mipetraha eo ankavanako
  - type: text
    content: ambara-panaoko ny fahavalonao ho eo ambanin’ny tongotrao» (Sal 110.1)?
  '45':
  - type: text
    content: 'Koa raha i Davida ary miantso Azy hoe: Tompo, ahoana no maha Zanany Azy? '
  '46':
  - type: text
    content: Dia tsy nisy nahavaly Azy na dia teny iray akory aza; ary hatramin’izay andro izay dia tsy nisy sahy nanontany Azy intsony.
  '5':
  - type: text
    content: 'Nefa tsy nahoan’ireo akory izany, fa samy lasa nandeha izy, ny iray dia ho any amin’ny sahany, ny iray dia ho any amin’ny varony. '
  '6':
  - type: text
    content: 'Ary ny sisa dia nisambotra ny mpanompony, dia nisetrasetra taminy ka namono azy. '
  '7':
  - type: text
    content: 'Dia tezitra ilay mpanjaka ka naniraka ny miaramilany dia nandringana ireny mpamono olona ireny sady nandoro ny tanànany. '
  '8':
  - type: text
    content: 'Dia hoy izy tamin’ny mpanompony: Efa vonona ny fampakaram-bady fa ireo izay nasaina no tsy mendrika. '
  '9':
  - type: text
    content: 'Koa mankanesa ianareo eny amin’ny sampanan-dalana ary izay hitanareo dia asao ho ao amin’ny fampakaram-bady. '
