document_id: MAT.22
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fanoharana ny amin’ny fampakaram-bady
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Lio 14.15-24
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary Jesosy mbola niteny taminy tamin’ny fanoharana hafa hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ny fanjakan’ny lanitra dia tahaka ny mpanjaka iray izay nanao fanasana noho ny amin’ny fampakaram-badin’ny zanany lahy. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary naniraka ny mpanompony izy hiantso izay efa nasaina mba hankao amin’ny fampakaram-bady; nefa tsy nety ho avy ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dia naniraka mpanompo hafa indray izy ka niteny hoe: Lazao amin’ireo izay efa nasaina hoe: Indro, efa vonona ny sakafo nomaniko; efa voavono ny ombiko sy ny nafahiko ka efa vonona avokoa ny zavatra rehetra; koa tongava amin’izay atỳ amin’ny fampakaram-bady ianareo. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Nefa tsy nahoan’ireo akory izany, fa samy lasa nandeha izy, ny iray dia ho any amin’ny sahany, ny iray dia ho any amin’ny varony. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary ny sisa dia nisambotra ny mpanompony, dia nisetrasetra taminy ka namono azy. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dia tezitra ilay mpanjaka ka naniraka ny miaramilany dia nandringana ireny mpamono olona ireny sady nandoro ny tanànany. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dia hoy izy tamin’ny mpanompony: Efa vonona ny fampakaram-bady fa ireo izay nasaina no tsy mendrika. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Koa mankanesa ianareo eny amin’ny sampanan-dalana ary izay hitanareo dia asao ho ao amin’ny fampakaram-bady. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Dia nandeha ho eny amin’ny lalana ireny mpanompo ireny ka namory izay rehetra hitany, na ny ratsy na ny tsara; dia feno mpiara-misakafo ny fampakaram-bady.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Nony efa niditra ny mpanjaka hizaha ny mpiara-misakafo dia nahita lehilahy iray izay tsy niakanjo ny akanjo fitondra amin’ny fampakaram-bady. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Dia hoy izy taminy: Ry sakaiza, ahoana no idiranao eto, nefa ianao tsy manana ny akanjo fitondra amin’ny fampakaram-bady? Dia tsy nahateny izy. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary hoy ny mpanjaka tamin’ny mpanompony: Afatory ny tongony aman-tanany dia ario any amin’ny maizina any ivelany izy; any no hisy ny fitomaniana sy ny fikitroha-nify. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Fa maro no antsoina nefa vitsy no fidina.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny hetra ho an’i Kaisara
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mar 12.13-17; Lio 20.20-26
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary tamin’izay dia lasa ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Fariseo
  - type: text
    text: ' ka nikaon-doha mba hamandrika Azy amin’ny teniny. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Koa naniraka ny mpianany mbamin’ny Herodiana hankeo aminy izy ireo ka niteny hoe: Mpampianatra ô, fantatray fa marina Ianao ka mampianatra marina ny lalànan’Andriamanitra ary tsy miahiahy olona satria tsy mba mizaha tavan’olona Ianao. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Koa lazao aminay ary izay hevitrao: Moa mety va ny mandoa vola hetra ho an’i Kaisara sa tsia? '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Fa Jesosy nahalala ny faharatsiany ka hoy Izy: Nahoana no maka fanahy Ahy ianareo, ry mpihatsaravelatsihy? '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Asehoy Ahy ny vola fandoa amin’ny hetra. Dia nitondrany '
  - type: usfm
    marker: w
    children:
    - type: text
      text: denaria
  - type: text
    text: ' iray Izy. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Dia hoy Jesosy taminy: An’iza ity sary sy soratra ity? '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Hoy ireo Taminy: An’i Kaisara. Dia hoy Jesosy taminy: Aloavy ho an’i Kaisara ary izay an’i Kaisara ary ho an’Andriamanitra izay an’Andriamanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ary gaga izy ireo nony nahare izany, dia nandao Azy ka lasa nandeha.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fanontaniana ny amin’ny fitsanganan’ny maty
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mar 12.18-27; Lio 20.27-38
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Tamin’io andro io ihany dia nankeo amin’i Jesosy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Sadoseo
  - type: text
    text: ' sasany izay nilaza fa tsy misy ny fitsanganana amin’ny maty ka nanontany Azy hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Mpampianatra ô, i Mosesy dia nilaza hoe: «Raha misy lehilahy maty momba dia aoka ny rahalahiny hampakatra ny vadiny ka hiteraka hamelo-maso ny rahalahiny» (Deo 25.5). '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Koa nisy fito mirahalahy tetỳ aminay; ary nampaka-bady ny zokiny dia maty, ary satria tsy niteraka izy dia navelany ho an’ny rahalahiny ny vadiny; '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'ary toy izany koa ny faharoa sy ny fahatelo, hatramin’ny fahafito. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ary tao aorianan’izy rehetra dia maty koa Ravehivavy. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Koa amin’ny fitsanganan’ny maty, ho vadin’iza amin’izy fito mirahalahy moa Ravehivavy? Satria efa samy nanambady azy avokoa izy rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Fa Jesosy namaly azy ireo hoe: Mahadiso hevitra anareo ny tsy fahafantaranareo na ny Soratra Masina na ny herin’Andriamanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Fa amin’ny fitsanganan’ny maty dia tsy mba hisy olona hampaka-bady, na havoaka hampakarina, fa ho tahaka ny anjely any an-danitra izy. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Koa ny amin’ny fitsanganan’ny maty, moa mbola tsy novakinareo va ny teny nataon’Andriamanitra taminareo milaza hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: '«Izaho no Andriamanitr’i Abrahama sy Andriamanitr’Isaka ary Andriamanitr’i Jakoba (Eks 3.6)? Andriamanitra tsy an’ny maty fa an’ny velona.» '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Ary ny vahoaka, raha nandre izany, dia talanjona tamin’ny fampianarany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny didy lehibe indrindra
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mar 12.28-34; ampit. Lio 10.25-37
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Fariseo
  - type: text
    text: ', nony nandre fa gina teo anatrehan’i Jesosy ny Sadoseo, dia nivory teo amin’ny toerana iray. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Ary ny iray tamin’ireo, izay mpahay lalàna, dia nanontany naka fanahy Azy hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Mpampianatra ô, ny didy manao ahoana moa no lehibe ao amin’ny lalàna? '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Dia hoy Jesosy taminy: «Tiava NY TOMPO Andriamanitrao amin’ny fonao manontolo sy ny fanahinao manontolo ary ny sainao manontolo» (Deo 6.5). '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Izany no didy lehibe sady voalohany. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Ary ny faharoa, izay tahaka azy ihany, dia izao: «Tiava ny namanao tahaka ny tenanao» (Lev 19.18). '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Izany didy roa izany no ihantonan’ny lalàna manontolo sy ny mpaminany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Kristy sy i Davida
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mar 12.35-37; Lio 20.41-44
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Ary rehefa tafavory ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Fariseo
  - type: text
    text: ' dia nanontany azy ireo Jesosy hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Ahoana ny hevitrareo ny amin’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: '? Zanak’iza moa Izy? Dia hoy ireo Taminy: Zanak’i Davida. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Fa hoy Jesosy tamin’izy ireo: Koa nahoana ary i Davida, amin’ny Fanahy, no miantso Azy hoe Tompo, sady miteny hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: '«NY TOMPO nilaza tamin’ny Tompoko hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mipetraha eo ankavanako
- type: usfm
  marker: q1
  children:
  - type: text
    text: ambara-panaoko ny fahavalonao ho eo ambanin’ny tongotrao» (Sal 110.1)?
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Koa raha i Davida ary miantso Azy hoe: Tompo, ahoana no maha Zanany Azy? '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: Dia tsy nisy nahavaly Azy na dia teny iray akory aza; ary hatramin’izay andro izay dia tsy nisy sahy nanontany Azy intsony.
