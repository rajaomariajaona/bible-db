document_id: EST.1,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fanasana lehibe nataon’i Ahasoerosy
  - type: text
    content: 'Tamin’ny andro nanjakan’i Ahasoerosy, i Ahasoerosy izay nanjaka hatrany India ka hatrany Kosy ary nizarazara ny fanjakany ho fari-piadidiana fito amby roapolo amby zato, '
  '10':
  - type: text
    content: 'Tamin’ny andro fahafito, nony faly azon’ny divay iny ny fon’ny mpanjaka, dia nomeny teny i Mehomana, i Bizta, i Harbona, i Bigta, i Abagta, i Zetara ary i Karkasa, '
  - type: text
    content: ionòka
  - type: text
    content: ' fito izay nanompo teo anatrehan’i Ahasoerosy mpanjaka, '
  '11':
  - type: text
    content: 'mba hitondra an’i Vasty, vadin’ny mpanjaka, ho eo anatrehan’ny mpanjaka, misatroka ny satroboninahitry ny fanjakana, mba haseho amin’ny olona sy ny mpitondra ny bikany fa tsara tarehy izy. '
  '12':
  - type: text
    content: 'Nandà ny tenin’ny mpanjaka izay noentin’ireo ionòka anefa i Vasty, vadin’ny mpanjaka, ka tsy nety nankany. Dia tezitra loatra ny mpanjaka ka nirehitra tao am-pony ny fahatezerany. '
  '13':
  - type: text
    content: 'Dia niresaka tamin’ny mpanandro ny mpanjaka. Toy izany mantsy no nanaovana ny raharahan’ny mpanjaka teo anatrehan’izay rehetra nahalala lalàna sy fitsarana '
  '14':
  - type: text
    content: 'ary ireo izay teo akaikiny, dia i Karsena, i Setara, i Admata, i Tarsisy, i Meresa, i Marsena ary i Memokana, mpitondra fito tamin’i Persia sy i Media, izay nahazo nijery ny tavan’ny mpanjaka ka nipetraka tamin’ny toerana voalohany teo amin’ny fanjakana. Hoy ny mpanjaka: '
  '15':
  - type: text
    content: Araka ny lalàna, ahoana no hanaovana an’i Vasty, vadin’ny mpanjaka, satria tsy nankatò ny didiko, izaho Ahasoerosy mpanjaka, didy izay noentin’ireo ionòka izy?
  '16':
  - type: text
    content: 'Dia namaly teo anatrehan’ny mpanjaka sy ny mpitondra i Memokana hoe: Tsy tamin’ny mpanjaka ihany no nanaovan’i Vasty, vadin’ny mpanjaka, izao ratsy izao fa tamin’ny mpitondra rehetra koa sy ny vahoaka rehetra amin’ny fari-piadidiana manerana ny fanjakan’i Ahasoerosy mpanjaka. '
  '17':
  - type: text
    content: 'Hiely any amin’ny vehivavy rehetra izao zavatra nataon’ny vadin’ny mpanjaka izao ka hanaovany tsinontsinona ny vadiny fa samy hilaza izy ireo hoe: I Ahasoerosy mpanjaka aza nandidy mba hitondrana an’i Vasty vadiny ho eo anatrehany nefa dia tsy nety izy. '
  '18':
  - type: text
    content: 'Ary na dia amin’izao andro izao aza ny vehivavy manankajan’i Persia sy i Media izay mandre ny nataon’ny vadin’ny mpanjaka dia samy hilaza izany amin’ny mpitondra rehetra voatendrin’ny mpanjaka, koa ho loza loatra ny famingavingana sy ny faniratsirana. '
  '19':
  - type: text
    content: 'Koa raha sitraky ny mpanjaka dia aoka hisy didim-panjakana avy amin’ny mpanjaka hosoratana ao amin’ny lalànan’i Persia sy Media ka tsy azo ovana: Tsy hahazo hankeo anatrehan’i Ahasoerosy mpanjaka intsony i Vasty ary ny voninahiny dia aoka homen’ny mpanjaka ho an’izay vehivavy hafa tsara noho izy. '
  '2':
  - type: text
    content: 'tamin’izany andro izany dia nipetraka teo amin’ny sezafiandrianan’ny fanjakany izay tany Sosana, tanàna mimanda, i Ahasoerosy mpanjaka. '
  '20':
  - type: text
    content: 'Koa rehefa re manerana ny fanjakany rehetra, izay lehibe tokoa, ny didin’ny mpanjaka izay havoakany dia samy hanome voninahitra ny vadiny avy ny vehivavy rehetra na lehibe na kely. '
  '21':
  - type: text
    content: 'Dia sitraky ny mpanjaka sy ny mpitondra izany teny izany ka nanatanteraka ny tenin’i Memokana ny mpanjaka. '
  '22':
  - type: text
    content: Dia nampitondra taratasy ho any amin’ny fari-piadidiana rehetra ao amin’ny fanjakan’ny mpanjaka izy, dia ny fari-piadidiana tsirairay araka ny fomba fanoratany avy ary ny firenena tsirairay araka ny fiteniny avy mba hahafehy ny ao an-tranony avy ny lehilahy rehetra ary samy hiteny araka ny fiteniny avy ny firenena tsirairay.
  '3':
  - type: text
    content: 'Tamin’ny taona fahatelo nanjakany dia nanao fanasana ho an’ny mpitarika sy ny mpanompony rehetra izy. Teo anatrehany koa ny lehiben’ny miaramilan’i Persia sy i Media ary ny mpitondra mbamin’ireo lehiben’ny fari-piadidiana ao amin’ny fanjakany. '
  '4':
  - type: text
    content: 'Nasehony nandritra ny andro maro, valopolo amby zato andro, ny harena amam-boninahitry ny fanjakany ary ny famirapiratry ny fahalehibiazany. '
  '5':
  - type: text
    content: 'Rehefa tapitra izany andro izany dia nanaovan’ny mpanjaka fanasana naharitra hafitoana teo ankalamanjana tao amin’ny zaridainan’ny mpanjakany ny olona rehetra izay tany Sosana, tanàna mimanda, na lehibe na kely. '
  '6':
  - type: text
    content: 'Nisy lamba fotsy misoratsoratra sy manga nohazonin’ny kofehy rongony fotsy madinika sy volomparasy izay nandalo tamin’ny masom-bolafotsy teny amin’ny andry vato marbra fotsy. Nisy farafara volamena sy volafotsy teo amin’ny lampivato vita amin’ny alabasitara, marbra fotsy, hara ary marbra mainty. '
  '7':
  - type: text
    content: 'Nampisotroina tamin’ny kapoaka volamena ny olona ka samihafa avokoa ny kapoaka, ary betsaka ny divain’ny mpanjaka araka ny fanomen’ny mpanjaka. '
  '8':
  - type: text
    content: 'Ny nisotroan’ny olona dia araka ny tenin’ny mpanjaka ka tsy nisy faneriterena satria toy izany no baikon’ny mpanjaka tamin’ny mpitandrina ny tranony rehetra mba hanaovany araka izay sitrapon’ny tsirairay avy. '
  '9':
  - type: text
    content: Mba nanao fanasana ho an’ny vehivavy tao amin’ny tranom-panjakana, izay an’i Ahasoerosy mpanjaka, koa i Vasty, vadin’ny mpanjaka.
  - type: heading
    content: Ny nampietrena an’i Vasty mpanjakavavy
