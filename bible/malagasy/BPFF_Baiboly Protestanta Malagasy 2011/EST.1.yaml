document_id: EST.1
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fanasana lehibe nataon’i Ahasoerosy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Tamin’ny andro nanjakan’i Ahasoerosy, i Ahasoerosy izay nanjaka hatrany India ka hatrany Kosy ary nizarazara ny fanjakany ho fari-piadidiana fito amby roapolo amby zato, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'tamin’izany andro izany dia nipetraka teo amin’ny sezafiandrianan’ny fanjakany izay tany Sosana, tanàna mimanda, i Ahasoerosy mpanjaka. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Tamin’ny taona fahatelo nanjakany dia nanao fanasana ho an’ny mpitarika sy ny mpanompony rehetra izy. Teo anatrehany koa ny lehiben’ny miaramilan’i Persia sy i Media ary ny mpitondra mbamin’ireo lehiben’ny fari-piadidiana ao amin’ny fanjakany. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Nasehony nandritra ny andro maro, valopolo amby zato andro, ny harena amam-boninahitry ny fanjakany ary ny famirapiratry ny fahalehibiazany. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Rehefa tapitra izany andro izany dia nanaovan’ny mpanjaka fanasana naharitra hafitoana teo ankalamanjana tao amin’ny zaridainan’ny mpanjakany ny olona rehetra izay tany Sosana, tanàna mimanda, na lehibe na kely. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Nisy lamba fotsy misoratsoratra sy manga nohazonin’ny kofehy rongony fotsy madinika sy volomparasy izay nandalo tamin’ny masom-bolafotsy teny amin’ny andry vato marbra fotsy. Nisy farafara volamena sy volafotsy teo amin’ny lampivato vita amin’ny alabasitara, marbra fotsy, hara ary marbra mainty. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Nampisotroina tamin’ny kapoaka volamena ny olona ka samihafa avokoa ny kapoaka, ary betsaka ny divain’ny mpanjaka araka ny fanomen’ny mpanjaka. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ny nisotroan’ny olona dia araka ny tenin’ny mpanjaka ka tsy nisy faneriterena satria toy izany no baikon’ny mpanjaka tamin’ny mpitandrina ny tranony rehetra mba hanaovany araka izay sitrapon’ny tsirairay avy. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Mba nanao fanasana ho an’ny vehivavy tao amin’ny tranom-panjakana, izay an’i Ahasoerosy mpanjaka, koa i Vasty, vadin’ny mpanjaka.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nampietrena an’i Vasty mpanjakavavy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Tamin’ny andro fahafito, nony faly azon’ny divay iny ny fon’ny mpanjaka, dia nomeny teny i Mehomana, i Bizta, i Harbona, i Bigta, i Abagta, i Zetara ary i Karkasa, '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ionòka
  - type: text
    text: ' fito izay nanompo teo anatrehan’i Ahasoerosy mpanjaka, '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'mba hitondra an’i Vasty, vadin’ny mpanjaka, ho eo anatrehan’ny mpanjaka, misatroka ny satroboninahitry ny fanjakana, mba haseho amin’ny olona sy ny mpitondra ny bikany fa tsara tarehy izy. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Nandà ny tenin’ny mpanjaka izay noentin’ireo ionòka anefa i Vasty, vadin’ny mpanjaka, ka tsy nety nankany. Dia tezitra loatra ny mpanjaka ka nirehitra tao am-pony ny fahatezerany. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dia niresaka tamin’ny mpanandro ny mpanjaka. Toy izany mantsy no nanaovana ny raharahan’ny mpanjaka teo anatrehan’izay rehetra nahalala lalàna sy fitsarana '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'ary ireo izay teo akaikiny, dia i Karsena, i Setara, i Admata, i Tarsisy, i Meresa, i Marsena ary i Memokana, mpitondra fito tamin’i Persia sy i Media, izay nahazo nijery ny tavan’ny mpanjaka ka nipetraka tamin’ny toerana voalohany teo amin’ny fanjakana. Hoy ny mpanjaka: '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Araka ny lalàna, ahoana no hanaovana an’i Vasty, vadin’ny mpanjaka, satria tsy nankatò ny didiko, izaho Ahasoerosy mpanjaka, didy izay noentin’ireo ionòka izy?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Dia namaly teo anatrehan’ny mpanjaka sy ny mpitondra i Memokana hoe: Tsy tamin’ny mpanjaka ihany no nanaovan’i Vasty, vadin’ny mpanjaka, izao ratsy izao fa tamin’ny mpitondra rehetra koa sy ny vahoaka rehetra amin’ny fari-piadidiana manerana ny fanjakan’i Ahasoerosy mpanjaka. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Hiely any amin’ny vehivavy rehetra izao zavatra nataon’ny vadin’ny mpanjaka izao ka hanaovany tsinontsinona ny vadiny fa samy hilaza izy ireo hoe: I Ahasoerosy mpanjaka aza nandidy mba hitondrana an’i Vasty vadiny ho eo anatrehany nefa dia tsy nety izy. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary na dia amin’izao andro izao aza ny vehivavy manankajan’i Persia sy i Media izay mandre ny nataon’ny vadin’ny mpanjaka dia samy hilaza izany amin’ny mpitondra rehetra voatendrin’ny mpanjaka, koa ho loza loatra ny famingavingana sy ny faniratsirana. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Koa raha sitraky ny mpanjaka dia aoka hisy didim-panjakana avy amin’ny mpanjaka hosoratana ao amin’ny lalànan’i Persia sy Media ka tsy azo ovana: Tsy hahazo hankeo anatrehan’i Ahasoerosy mpanjaka intsony i Vasty ary ny voninahiny dia aoka homen’ny mpanjaka ho an’izay vehivavy hafa tsara noho izy. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Koa rehefa re manerana ny fanjakany rehetra, izay lehibe tokoa, ny didin’ny mpanjaka izay havoakany dia samy hanome voninahitra ny vadiny avy ny vehivavy rehetra na lehibe na kely. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Dia sitraky ny mpanjaka sy ny mpitondra izany teny izany ka nanatanteraka ny tenin’i Memokana ny mpanjaka. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Dia nampitondra taratasy ho any amin’ny fari-piadidiana rehetra ao amin’ny fanjakan’ny mpanjaka izy, dia ny fari-piadidiana tsirairay araka ny fomba fanoratany avy ary ny firenena tsirairay araka ny fiteniny avy mba hahafehy ny ao an-tranony avy ny lehilahy rehetra ary samy hiteny araka ny fiteniny avy ny firenena tsirairay.
