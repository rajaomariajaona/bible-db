document_id: LEV.9,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nanombohan’i Arona sy ireo zanany ny raharahany
  - type: text
    content: 'Tamin’ny andro fahavalo dia nampiantso an’i Arona sy ireo zanany ary ny loholon’ny Israely i Mosesy. '
  '10':
  - type: text
    content: 'Ny jaborany sy ny voany roa ary ny ila atiny lehibe avy tamin’ny fanatitra fanadiovana dia nodorany ho fofona teo ambonin’ny alitara, araka izay nandidian’NY TOMPO an’i Mosesy; '
  '11':
  - type: text
    content: 'nodorany tamin’ny afo teny ivelan’ny toby kosa ny hena sy ny hoditra. '
  '12':
  - type: text
    content: 'Namono ny fanatitra dorana manontolo i Arona ary natolotry ny zanany azy ny ra ka nafafiny manodidina ny alitara. '
  '13':
  - type: text
    content: 'Ny fanatitra dorana manontolo voatetika, mbamin’ny lohany, dia natolotr’ireo azy ka nodorany ho fofona teo ambonin’ny alitara. '
  '14':
  - type: text
    content: 'Dia nosasany ny taovany sy ny tongony ka nodorany ho fofona niaraka tamin’ny fanatitra dorana manontolo teo ambonin’ny alitara. '
  '15':
  - type: text
    content: 'Noentiny nanatona avy eo ny fanatitry ny olona; nalainy ny osilahy hatao fanatitra fanadiovana ny olona dia novonoiny ary natolony ho fanatitra fanadiovana, tahaka ilay teo aloha. '
  '16':
  - type: text
    content: 'Taorianan’izany dia nanolotra ny fanatitra dorana manontolo izy ka nataony araka ny fanao izany. '
  '17':
  - type: text
    content: 'Noentiny nanatona koa ny fanatitra avy amin’ny zavamaniry ka nakany eran’ny tanana ila dia nodorany ho fofona teo ambonin’ny alitara izany, ho fanampin’ny fanatitra dorana manontolo amin’ny maraina. '
  '18':
  - type: text
    content: 'Novonoiny koa ny omby sy ny ondrilahy hatao fanati-pihavanana ho an’ny olona; ireo zanak’i Arona dia nanolotra azy ny ra ka nafafiny manodidina ny alitara izany. '
  '19':
  - type: text
    content: 'Natolony azy koa ny jaboran’ny omby sy ny hofaky ny ondrilahy mbamin’ny jabora mandrakotra ny taovany ary ny voany roa sy ny ila atiny lehibe. '
  '2':
  - type: text
    content: 'Dia hoy izy tamin’i Arona: Makà ombilahy kely hatao fanatitra fanadiovana sy ondrilahy ho fanatitra dorana manontolo, izay samy tsy misy kilema ka atero eo anatrehan’NY TOMPO. '
  '20':
  - type: text
    content: 'Dia napetrany teo ambonin’ny tratran’ireo ny jaborany ary nodorany ho fofona teo ambonin’ny alitara; '
  '21':
  - type: text
    content: fa ny tratrany sy ny feny havanana kosa dia nataon’i Arona fanatitra asandratra eo anatrehan’NY TOMPO, araka izay nandidian’i Mosesy azy.
  '22':
  - type: text
    content: 'Ary nanandratra ny tanany manandrify ny olona i Arona ka nitsodrano azy; dia nidina izy rehefa avy nanolotra ny fanatitra fanadiovana sy ny fanatitra dorana manontolo ary ny fanati-pihavanana. '
  '23':
  - type: text
    content: 'Dia niditra tao amin’ny tranolay fihaonana i Mosesy sy i Arona, koa rehefa avy tao izy roa lahy dia nitsodrano ny olona. Ary ny voninahitry NY TOMPO niseho tamin’ny olona rehetra. '
  '24':
  - type: text
    content: Dia nisy afo nivoaka avy teo anatrehan’NY TOMPO ka nandevona ny fanatitra dorana manontolo sy ny jaborany teo ambonin’ny alitara. Nony hitan’ny olona rehetra izany dia nihoby izy ireo sady niankohoka.
  '3':
  - type: text
    content: 'Ary ilazao ny Zanak’Israely hoe: Makà osilahy hatao fanatitra fanadiovana, ombilahy kely sy zanak’ondry, izay samy iray taona sady samy tsy misy kilema, hatao fanatitra dorana manontolo, '
  '4':
  - type: text
    content: omby sy ondrilahy hatao fanati-pihavanana, hovonoina ho fanatitra eo anatrehan’NY TOMPO, ary fanatitra avy amin’ny zavamaniry voaharo diloilo; fa anio no hisehoan’NY TOMPO aminareo.
  '5':
  - type: text
    content: 'Dia nitondra izay nandidian’i Mosesy azy ho eo anoloan’ny '
  - type: text
    content: tranolay fihaonana
  - type: text
    content: ' izy; ary nanatona ny fiangonana manontolo ka nijanona teo anatrehan’NY TOMPO. '
  '6':
  - type: text
    content: 'Ary hoy i Mosesy: Izao no zavatra izay nandidian’NY TOMPO, koa tanteraho izany, dia hiseho aminareo ny voninahitry NY TOMPO. '
  '7':
  - type: text
    content: 'Dia hoy i Mosesy tamin’i Arona: Manatòna ny alitara ka atolory ny fanatitra fanadiovana avy aminao sy ny fanatitra dorana manontolo dia manaova fanavotana ho an’ny tenanao sy ho an’ny olona; atolory ny fanatitry ny olona ka manaova fanavotana ho azy, araka izay nandidian’NY TOMPO.'
  '8':
  - type: text
    content: 'Dia nanatona ny alitara i Arona ka namono ny ombilahy kely hatao fanatitra fanadiovana izay an’ny tenany. '
  '9':
  - type: text
    content: 'Ary noentin’ireo zanak’i Arona ho eo aminy ny ra dia natsobok’i Arona tamin’ny ra ny fanondrony ka nahosony tamin’ireo '
  - type: text
    content: tandroky
  - type: text
    content: ' ny alitara; ny ra sisa kosa dia naidiny teo am-pototry ny alitara. '
