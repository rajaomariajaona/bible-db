document_id: LEV.9,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nanombohan’i Arona sy ireo zanany ny raharahany
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin’ny andro fahavalo dia nampiantso an’i Arona sy ireo zanany ary ny loholon’ny Israely i Mosesy. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny jaborany sy ny voany roa ary ny ila atiny lehibe avy tamin’ny fanatitra fanadiovana dia nodorany ho fofona teo ambonin’ny alitara, araka izay nandidian’NY TOMPO an’i Mosesy; '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'nodorany tamin’ny afo teny ivelan’ny toby kosa ny hena sy ny hoditra. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Namono ny fanatitra dorana manontolo i Arona ary natolotry ny zanany azy ny ra ka nafafiny manodidina ny alitara. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny fanatitra dorana manontolo voatetika, mbamin’ny lohany, dia natolotr’ireo azy ka nodorany ho fofona teo ambonin’ny alitara. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nosasany ny taovany sy ny tongony ka nodorany ho fofona niaraka tamin’ny fanatitra dorana manontolo teo ambonin’ny alitara. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Noentiny nanatona avy eo ny fanatitry ny olona; nalainy ny osilahy hatao fanatitra fanadiovana ny olona dia novonoiny ary natolony ho fanatitra fanadiovana, tahaka ilay teo aloha. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Taorianan’izany dia nanolotra ny fanatitra dorana manontolo izy ka nataony araka ny fanao izany. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Noentiny nanatona koa ny fanatitra avy amin’ny zavamaniry ka nakany eran’ny tanana ila dia nodorany ho fofona teo ambonin’ny alitara izany, ho fanampin’ny fanatitra dorana manontolo amin’ny maraina. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Novonoiny koa ny omby sy ny ondrilahy hatao fanati-pihavanana ho an’ny olona; ireo zanak’i Arona dia nanolotra azy ny ra ka nafafiny manodidina ny alitara izany. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Natolony azy koa ny jaboran’ny omby sy ny hofaky ny ondrilahy mbamin’ny jabora mandrakotra ny taovany ary ny voany roa sy ny ila atiny lehibe. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy izy tamin’i Arona: Makà ombilahy kely hatao fanatitra fanadiovana sy ondrilahy ho fanatitra dorana manontolo, izay samy tsy misy kilema ka atero eo anatrehan’NY TOMPO. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia napetrany teo ambonin’ny tratran’ireo ny jaborany ary nodorany ho fofona teo ambonin’ny alitara; '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: fa ny tratrany sy ny feny havanana kosa dia nataon’i Arona fanatitra asandratra eo anatrehan’NY TOMPO, araka izay nandidian’i Mosesy azy.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nanandratra ny tanany manandrify ny olona i Arona ka nitsodrano azy; dia nidina izy rehefa avy nanolotra ny fanatitra fanadiovana sy ny fanatitra dorana manontolo ary ny fanati-pihavanana. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia niditra tao amin’ny tranolay fihaonana i Mosesy sy i Arona, koa rehefa avy tao izy roa lahy dia nitsodrano ny olona. Ary ny voninahitry NY TOMPO niseho tamin’ny olona rehetra. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nisy afo nivoaka avy teo anatrehan’NY TOMPO ka nandevona ny fanatitra dorana manontolo sy ny jaborany teo ambonin’ny alitara. Nony hitan’ny olona rehetra izany dia nihoby izy ireo sady niankohoka.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ilazao ny Zanak’Israely hoe: Makà osilahy hatao fanatitra fanadiovana, ombilahy kely sy zanak’ondry, izay samy iray taona sady samy tsy misy kilema, hatao fanatitra dorana manontolo, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: omby sy ondrilahy hatao fanati-pihavanana, hovonoina ho fanatitra eo anatrehan’NY TOMPO, ary fanatitra avy amin’ny zavamaniry voaharo diloilo; fa anio no hisehoan’NY TOMPO aminareo.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nitondra izay nandidian’i Mosesy azy ho eo anoloan’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: tranolay fihaonana
    - type: text
      text: ' izy; ary nanatona ny fiangonana manontolo ka nijanona teo anatrehan’NY TOMPO. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy i Mosesy: Izao no zavatra izay nandidian’NY TOMPO, koa tanteraho izany, dia hiseho aminareo ny voninahitry NY TOMPO. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy i Mosesy tamin’i Arona: Manatòna ny alitara ka atolory ny fanatitra fanadiovana avy aminao sy ny fanatitra dorana manontolo dia manaova fanavotana ho an’ny tenanao sy ho an’ny olona; atolory ny fanatitry ny olona ka manaova fanavotana ho azy, araka izay nandidian’NY TOMPO.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nanatona ny alitara i Arona ka namono ny ombilahy kely hatao fanatitra fanadiovana izay an’ny tenany. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary noentin’ireo zanak’i Arona ho eo aminy ny ra dia natsobok’i Arona tamin’ny ra ny fanondrony ka nahosony tamin’ireo '
    - type: usfm
      marker: w
      children:
      - type: text
        text: tandroky
    - type: text
      text: ' ny alitara; ny ra sisa kosa dia naidiny teo am-pototry ny alitara. '
