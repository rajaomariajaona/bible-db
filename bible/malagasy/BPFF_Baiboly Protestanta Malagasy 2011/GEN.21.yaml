document_id: GEN.21
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nahaterahan’Isaka
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary NY TOMPO namangy an’i Saraha araka ilay efa nolazainy. Araka izay rehetra efa noteneniny no nataon’NY TOMPO tamin’i Saraha. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Dia nanana anaka i Saraha ka niteraka zazalahy tamin’i Abrahama na dia antitra aza izy, tamin’ny fotoana izay nolazain’Andriamanitra taminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary ny anaran’ny zanany vao teraka, ilay naterak’i Saraha taminy, dia nataon’i Abrahama hoe Isaka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dia noforan’i Abrahama Isaka zanany rehefa valo andro, araka ny didy nomen’Andriamanitra azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Zato taona i Abrahama raha niteraka an’Isaka zanany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia hoy i Saraha: Nampihomehezin’Andriamanitra aho; izay rehetra mandre dia hiara-mihomehy amiko. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Hoy koa izy: Iza moa no nanampo hilaza amin’i Abrahama fa hampinono zaza i Saraha? Kanjo niteraka zazalahy taminy ihany aho na dia efa antitra aza izy!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Rehefa lehibe ny zaza dia nosarahina nono. Nanao fanasana lehibe tamin’ny andro nanasarahana nono an’Isaka i Abrahama.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Noroahin’i Abrahama i Hagara sy Ismaela
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary hitan’i Saraha fa nihomehy azy ny zanak’i Hagara ejiptiana, izay naterany tamin’i Abrahama. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dia hoy izy tamin’i Abrahama: Roahy io mpanompovavy io sy ny zanany, fa ny zanak’io mpanompovavy io dia tsy hiray lova amin’Isaka zanako! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Nahatezitra be an’i Abrahama anefa izany teny izany noho ny amin’ny zanany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Hoy Andriamanitra tamin’i Abrahama: Aza atao mahatezitra anao ny amin’ny zaza sy ny mpanompovavinao. Fa na inona lazain’i Saraha aminao na inona dia ekeo ny teniny; fa avy amin’Isaka no hisy taranaka hantsoina amin’ny anaranao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Nefa ny zanak’ilay mpanompovavy koa dia hataoko firenena satria naterakao ihany izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dia nifoha vao maraina i Abrahama ka naka mofo sy siny hoditra iray feno rano; nomeny an’i Hagara ireo ka napetrany teo an-tsorony, dia natolony azy koa ny zaza ary nampandehaniny izy mianaka. Lasa nandeha izy ireo ka nirenireny tany an-tany efitr’i Bery-Sheba. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Rehefa lany ny rano tao amin’ny siny hoditra dia nariany teo am-pototry ny hazo iray ny zaza. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Dia lasa izy nipetraka terỳ lavidavitra tandrifiny, tokony ho tratran’ny zana-tsipìka, fa hoy izy: Aoka mba tsy ho hitako izay hahafatesan’ny zaza! Ary nipetraka tandrifiny izy dia nanandratra ny feony nitomany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ren’Andriamanitra ny feon’ny zaza ka niantso an’i Hagara avy tany an-danitra ilay '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Anjelin’Andriamanitra
  - type: text
    text: ' niteny taminy hoe: Inona izato manjo anao, ry Hagara? Aza matahotra fa efa ren’Andriamanitra ny feon’ny zaza eo amin’izay misy azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Mitsangàna, areno ny zaza ka hazòny mafy amin’ny tananao; fa hataoko firenena lehibe izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Dia nampahiratin’Andriamanitra ny mason’i Hagara ka nahita lavaka fantsakana izy; lasa nankeo izy, nameno rano ny siny hoditra ka nampisotro rano ny zaza. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary nomban’Andriamanitra ny zaza ka nitombo; nonina tany an-tany efitra izy ka nony efa lehibe dia tonga mpandefa tsipìka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Nonina tany an-tany efitra Parana izy ka nakan’ny reniny vady avy tany amin’ny tany Ejipta.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fanekena nataon’i Abrahama sy i Abimeleka
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Tamin’izany andro izany i Abimeleka sy i Pikola, komandin’ny miaramilany, dia niteny tamin’i Abrahama hoe: Omban’Andriamanitra ianao amin’izay rehetra ataonao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Koa ankehitriny, ianiano amin’Andriamanitra aho fa tsy hamitaka ahy na ny zanako na ny taranako ianao; fa araka ny soa izay nataoko taminao no mba hataonao amiko sy amin’ny tany izay ivahiniananao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Dia hoy i Abrahama: Mianiana aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary nananatra an’i Abimeleka i Abrahama noho ny lavaka fantsakana iray izay nalain’ny mpanompon’i Abimeleka an-keriny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Dia hoy i Abimeleka: Tsy fantatro izay nahavita izany satria tsy mbola nanambara tamiko ianao ary tsy mbola nahare koa aho raha tsy vao izao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ary naka ondry aman’osy i Abrahama ka nomeny an’i Abimeleka; dia nanao fanekena izy roa lahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Nanokana ondrivavy kely fito navahana tamin’ny andiany koa i Abrahama. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Dia hoy i Abimeleka taminy: Hatao inona ireo ondrivavy fito natokanao ireo? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Hoy ny navaliny: Mba horaisinao avy amin’ny tanako ireo ondrivavy fito ireo ho vavolombelona amiko fa izaho no nihady io lavaka fantsakana io. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Izany no nanaovana io toerana io hoe Bery-Sheba
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.31 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Bery-Sheba: Fantsakan’ny fianianana.'
    marker-yv: yv-n
  - type: text
    text: ', satria teo no nianianan’izy roa lahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Dia nanao fanekena tany Bery-Sheba izy roa lahy. Ary niainga i Abimeleka sy i Pikola, komandin’ny miaramilany, ka niverina ho any amin’ny tanin’ny Filistina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Namboly hazo tamarisika tany Bery-Sheba i Abrahama ka tao no niantsoany ny anaran’NY TOMPO, dia Andriamanitra Mandrakizay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Ary nivahiny naharitra tany amin’ny tanin’ny Filistina i Abrahama.
