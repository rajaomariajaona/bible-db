document_id: GEN.21,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nahaterahan’Isaka
  - type: text
    content: 'Ary NY TOMPO namangy an’i Saraha araka ilay efa nolazainy. Araka izay rehetra efa noteneniny no nataon’NY TOMPO tamin’i Saraha. '
  '10':
  - type: text
    content: 'Dia hoy izy tamin’i Abrahama: Roahy io mpanompovavy io sy ny zanany, fa ny zanak’io mpanompovavy io dia tsy hiray lova amin’Isaka zanako! '
  '11':
  - type: text
    content: 'Nahatezitra be an’i Abrahama anefa izany teny izany noho ny amin’ny zanany. '
  '12':
  - type: text
    content: 'Hoy Andriamanitra tamin’i Abrahama: Aza atao mahatezitra anao ny amin’ny zaza sy ny mpanompovavinao. Fa na inona lazain’i Saraha aminao na inona dia ekeo ny teniny; fa avy amin’Isaka no hisy taranaka hantsoina amin’ny anaranao. '
  '13':
  - type: text
    content: Nefa ny zanak’ilay mpanompovavy koa dia hataoko firenena satria naterakao ihany izy.
  '14':
  - type: text
    content: 'Dia nifoha vao maraina i Abrahama ka naka mofo sy siny hoditra iray feno rano; nomeny an’i Hagara ireo ka napetrany teo an-tsorony, dia natolony azy koa ny zaza ary nampandehaniny izy mianaka. Lasa nandeha izy ireo ka nirenireny tany an-tany efitr’i Bery-Sheba. '
  '15':
  - type: text
    content: 'Rehefa lany ny rano tao amin’ny siny hoditra dia nariany teo am-pototry ny hazo iray ny zaza. '
  '16':
  - type: text
    content: 'Dia lasa izy nipetraka terỳ lavidavitra tandrifiny, tokony ho tratran’ny zana-tsipìka, fa hoy izy: Aoka mba tsy ho hitako izay hahafatesan’ny zaza! Ary nipetraka tandrifiny izy dia nanandratra ny feony nitomany. '
  '17':
  - type: text
    content: 'Ren’Andriamanitra ny feon’ny zaza ka niantso an’i Hagara avy tany an-danitra ilay '
  - type: text
    content: Anjelin’Andriamanitra
  - type: text
    content: ' niteny taminy hoe: Inona izato manjo anao, ry Hagara? Aza matahotra fa efa ren’Andriamanitra ny feon’ny zaza eo amin’izay misy azy. '
  '18':
  - type: text
    content: 'Mitsangàna, areno ny zaza ka hazòny mafy amin’ny tananao; fa hataoko firenena lehibe izy. '
  '19':
  - type: text
    content: 'Dia nampahiratin’Andriamanitra ny mason’i Hagara ka nahita lavaka fantsakana izy; lasa nankeo izy, nameno rano ny siny hoditra ka nampisotro rano ny zaza. '
  '2':
  - type: text
    content: 'Dia nanana anaka i Saraha ka niteraka zazalahy tamin’i Abrahama na dia antitra aza izy, tamin’ny fotoana izay nolazain’Andriamanitra taminy. '
  '20':
  - type: text
    content: 'Ary nomban’Andriamanitra ny zaza ka nitombo; nonina tany an-tany efitra izy ka nony efa lehibe dia tonga mpandefa tsipìka. '
  '21':
  - type: text
    content: Nonina tany an-tany efitra Parana izy ka nakan’ny reniny vady avy tany amin’ny tany Ejipta.
  - type: heading
    content: Ny fanekena nataon’i Abrahama sy i Abimeleka
  '22':
  - type: text
    content: 'Tamin’izany andro izany i Abimeleka sy i Pikola, komandin’ny miaramilany, dia niteny tamin’i Abrahama hoe: Omban’Andriamanitra ianao amin’izay rehetra ataonao. '
  '23':
  - type: text
    content: 'Koa ankehitriny, ianiano amin’Andriamanitra aho fa tsy hamitaka ahy na ny zanako na ny taranako ianao; fa araka ny soa izay nataoko taminao no mba hataonao amiko sy amin’ny tany izay ivahiniananao. '
  '24':
  - type: text
    content: 'Dia hoy i Abrahama: Mianiana aho. '
  '25':
  - type: text
    content: 'Ary nananatra an’i Abimeleka i Abrahama noho ny lavaka fantsakana iray izay nalain’ny mpanompon’i Abimeleka an-keriny. '
  '26':
  - type: text
    content: 'Dia hoy i Abimeleka: Tsy fantatro izay nahavita izany satria tsy mbola nanambara tamiko ianao ary tsy mbola nahare koa aho raha tsy vao izao. '
  '27':
  - type: text
    content: 'Ary naka ondry aman’osy i Abrahama ka nomeny an’i Abimeleka; dia nanao fanekena izy roa lahy. '
  '28':
  - type: text
    content: 'Nanokana ondrivavy kely fito navahana tamin’ny andiany koa i Abrahama. '
  '29':
  - type: text
    content: 'Dia hoy i Abimeleka taminy: Hatao inona ireo ondrivavy fito natokanao ireo? '
  '3':
  - type: text
    content: 'Ary ny anaran’ny zanany vao teraka, ilay naterak’i Saraha taminy, dia nataon’i Abrahama hoe Isaka. '
  '30':
  - type: text
    content: 'Hoy ny navaliny: Mba horaisinao avy amin’ny tanako ireo ondrivavy fito ireo ho vavolombelona amiko fa izaho no nihady io lavaka fantsakana io. '
  '31':
  - type: text
    content: Izany no nanaovana io toerana io hoe Bery-Sheba
  - type: note
    content: 'Bery-Sheba: Fantsakan’ny fianianana.'
  - type: text
    content: ', satria teo no nianianan’izy roa lahy. '
  '32':
  - type: text
    content: 'Dia nanao fanekena tany Bery-Sheba izy roa lahy. Ary niainga i Abimeleka sy i Pikola, komandin’ny miaramilany, ka niverina ho any amin’ny tanin’ny Filistina. '
  '33':
  - type: text
    content: 'Namboly hazo tamarisika tany Bery-Sheba i Abrahama ka tao no niantsoany ny anaran’NY TOMPO, dia Andriamanitra Mandrakizay. '
  '34':
  - type: text
    content: Ary nivahiny naharitra tany amin’ny tanin’ny Filistina i Abrahama.
  '4':
  - type: text
    content: 'Dia noforan’i Abrahama Isaka zanany rehefa valo andro, araka ny didy nomen’Andriamanitra azy. '
  '5':
  - type: text
    content: 'Zato taona i Abrahama raha niteraka an’Isaka zanany. '
  '6':
  - type: text
    content: 'Dia hoy i Saraha: Nampihomehezin’Andriamanitra aho; izay rehetra mandre dia hiara-mihomehy amiko. '
  '7':
  - type: text
    content: 'Hoy koa izy: Iza moa no nanampo hilaza amin’i Abrahama fa hampinono zaza i Saraha? Kanjo niteraka zazalahy taminy ihany aho na dia efa antitra aza izy!'
  '8':
  - type: text
    content: Rehefa lehibe ny zaza dia nosarahina nono. Nanao fanasana lehibe tamin’ny andro nanasarahana nono an’Isaka i Abrahama.
  - type: heading
    content: Noroahin’i Abrahama i Hagara sy Ismaela
  '9':
  - type: text
    content: 'Ary hitan’i Saraha fa nihomehy azy ny zanak’i Hagara ejiptiana, izay naterany tamin’i Abrahama. '
