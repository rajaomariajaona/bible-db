document_id: SNG.3
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Manonofy mandeha hitady an-dRalehilahy Ravehivavy
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Eo am-pandrianako aho, rehefa alina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia mitady ilay malalan’ny aiko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: nitady azy aho nefa tsy nahita azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Hiarina aho ka handehandeha eny an-tanàna,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia eny an-dalambe sy eny an-kianja,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hitady ilay tian’ny fanahiko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, nitady azy aho nefa tsy nahita azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Hitan’ny mpiambina izay mandehandeha misafo ny tanàna aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'dia hoy aho hoe: Sao mba hitanareo lahy ilay tian’ny foko iny?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Vao avy nandalo ireo kely foana aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hitako ilay tian’ny foko
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka nohazoniko izy fa tsy navelako handeha
- type: usfm
  marker: q1
  children:
  - type: text
    text: mandra-pitondrako azy ho any an-tranon’Ineny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ao amin’ny efitranon’ilay niteraka ahy.
- type: usfm
  marker: sp
  children:
  - type: text
    text: (Olon-kafa?)
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Mampianiana anareo aho, ry zanakavavin’i Jerosalema,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'amin’ny gazela na amin’ny dieravavy any an-tsaha:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aza manaitra na mamoha ny fitiavana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: raha tsy efa sitrapony.
- type: usfm
  marker: sp
  children:
  - type: text
    text: (Olon-kafa)
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Iza moa irỳ miakatra avy any an-tany efitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: tahaka ny andry setroka
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady manitra miora sy ditin-kazo mani-pofona
- type: usfm
  marker: q1
  children:
  - type: text
    text: mbamin’ny vovo-javamanitra samihafa entin’ny mpivaro-mandeha?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Indro ny filanjan’i Solomona!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Lehilahy mahery fo enimpolo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: avy amin’ny lehilahy mahery voafantina amin’ny Israely, no manotrona azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Mitana sabatra avokoa izy rehetra sady mahay miady,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary samy mitondra ny sabany eo amin’ny fehikibony avy
- type: usfm
  marker: q1
  children:
  - type: text
    text: noho ny tahotra amin’ny alina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Nanamboatra filanjana ho azy i Solomona mpanjaka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'filanjana izay vita tamin’ny hazo avy any Libanona:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Volafotsy no nataony andriny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary volamena ny fiankinana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: lamba volomparasy ny fipetrahana eo aminy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny ao anatiny dia voatemitra fitiavana
- type: usfm
  marker: q1
  children:
  - type: text
    text: avy tamin’ny zanakavavin’i Jerosalema.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Mivoaha, ry zanakavavin’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Ziona
  - type: text
    text: ', ka mijere an’i Solomona mpanjaka,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay misatroka ilay satroboninahitra nasatroky ny reniny azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: tamin’ny andro nampakarany vady,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ilay tamin’ny andro nifalian’ny fony.
