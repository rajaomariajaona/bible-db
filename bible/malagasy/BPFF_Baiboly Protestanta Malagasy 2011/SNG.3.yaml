document_id: SNG.3,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Manonofy mandeha hitady an-dRalehilahy Ravehivavy
  - type: text
    content: Eo am-pandrianako aho, rehefa alina,
  - type: text
    content: dia mitady ilay malalan’ny aiko;
  - type: text
    content: nitady azy aho nefa tsy nahita azy.
  '10':
  - type: text
    content: Volafotsy no nataony andriny,
  - type: text
    content: ary volamena ny fiankinana,
  - type: text
    content: lamba volomparasy ny fipetrahana eo aminy;
  - type: text
    content: ny ao anatiny dia voatemitra fitiavana
  - type: text
    content: avy tamin’ny zanakavavin’i Jerosalema.
  '11':
  - type: text
    content: 'Mivoaha, ry zanakavavin’i '
  - type: text
    content: Ziona
  - type: text
    content: ', ka mijere an’i Solomona mpanjaka,'
  - type: text
    content: izay misatroka ilay satroboninahitra nasatroky ny reniny azy
  - type: text
    content: tamin’ny andro nampakarany vady,
  - type: text
    content: dia ilay tamin’ny andro nifalian’ny fony.
  '2':
  - type: text
    content: Hiarina aho ka handehandeha eny an-tanàna,
  - type: text
    content: dia eny an-dalambe sy eny an-kianja,
  - type: text
    content: hitady ilay tian’ny fanahiko,
  - type: text
    content: eny, nitady azy aho nefa tsy nahita azy.
  '3':
  - type: text
    content: Hitan’ny mpiambina izay mandehandeha misafo ny tanàna aho;
  - type: text
    content: 'dia hoy aho hoe: Sao mba hitanareo lahy ilay tian’ny foko iny?'
  '4':
  - type: text
    content: Vao avy nandalo ireo kely foana aho
  - type: text
    content: dia hitako ilay tian’ny foko
  - type: text
    content: ka nohazoniko izy fa tsy navelako handeha
  - type: text
    content: mandra-pitondrako azy ho any an-tranon’Ineny,
  - type: text
    content: dia ao amin’ny efitranon’ilay niteraka ahy.
  - type: heading
    content: (Olon-kafa?)
  '5':
  - type: text
    content: Mampianiana anareo aho, ry zanakavavin’i Jerosalema,
  - type: text
    content: 'amin’ny gazela na amin’ny dieravavy any an-tsaha:'
  - type: text
    content: Aza manaitra na mamoha ny fitiavana,
  - type: text
    content: raha tsy efa sitrapony.
  - type: heading
    content: (Olon-kafa)
  '6':
  - type: text
    content: Iza moa irỳ miakatra avy any an-tany efitra
  - type: text
    content: tahaka ny andry setroka
  - type: text
    content: sady manitra miora sy ditin-kazo mani-pofona
  - type: text
    content: mbamin’ny vovo-javamanitra samihafa entin’ny mpivaro-mandeha?
  '7':
  - type: text
    content: Indro ny filanjan’i Solomona!
  - type: text
    content: Lehilahy mahery fo enimpolo,
  - type: text
    content: avy amin’ny lehilahy mahery voafantina amin’ny Israely, no manotrona azy.
  '8':
  - type: text
    content: Mitana sabatra avokoa izy rehetra sady mahay miady,
  - type: text
    content: ary samy mitondra ny sabany eo amin’ny fehikibony avy
  - type: text
    content: noho ny tahotra amin’ny alina.
  '9':
  - type: text
    content: Nanamboatra filanjana ho azy i Solomona mpanjaka,
  - type: text
    content: 'filanjana izay vita tamin’ny hazo avy any Libanona:'
