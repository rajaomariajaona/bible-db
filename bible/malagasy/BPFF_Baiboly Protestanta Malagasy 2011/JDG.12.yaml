document_id: JDG.12,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny niadian’ny Efraimita tamin’i Jefta
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nivory ny lehilahin’i Efraima dia nandeha nianavaratra ka niteny tamin’i Jefta hoe: Nahoana no nandeha niady tamin’ny Amonita ianao ka tsy mba niantso anay hiaraka aminao? Hodoranay amin’ny afo ny tranonao sy ianao! '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: dia maty Ibzana ka nalevina tany Betlehema.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary i Elona Zebolonita no nitsara ny Israely taorianany. Nitsara ny Israely folo taona izy; '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: dia maty i Elona Zebolonita ka nalevina tany Aialona ao amin’ny tanin’i Zebolona.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Taorianany dia i Abdona, zanak’i Elela, avy any Piratona, no nitsara ny Israely. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nanana zanakalahy efapolo sy zafy telopolo izay nitaingina borikilahy tanora fitopolo izy ary nitsara ny Israely nandritra ny valo taona; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: dia maty i Abdona, zanak’i Elela, avy any Piratona, ka nalevina tany Piratona, any amin’ny tanin’i Efraima any amin’ny tendrombohitry ny Amalekita.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy i Jefta taminy: Izaho sy ny oloko dia niady mafy tamin’ny Amonita; ary niantso anareo aho, nefa tsy namonjy ahy tamin’ny tanany ianareo. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Koa rehefa hitako fa tsy namonjy ahy ianareo dia nanao ny aiko tsy ho zavatra aho ka nandeha niady tamin’ny Amonita ary natolotry NY TOMPO teo an-tanako izy. Koa nahoana ianareo no miakatra hila ady amiko amin’ity andro ity?
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary namory ny lehilahin’i Gileada rehetra i Jefta ka niady tamin’i Efraima. Dia namely an’i Efraima ny lehilahin’i Gileada, satria hoy ireo: Ianareo Gileadita dia mpandositra avy tamin’i Efraima, ao amin’ny taranak’i Efraima sy i Manase! '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia novonjen’ny Gileadita ny fitàna any Jordana mankany amin’i Efraima. Rehefa niteny ny mpandositra avy amin’i Efraima hoe: Aoka mba hita aho, dia hoy ny lehilahin’ny Gileada taminy: Efraimita va ianao? Ary raha hoy izy: Tsia, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia hoy izy ireo taminy: Tonòny ary ny hoe Shiboleta. Dia hoy izy: Siboleta, satria tsy nahay nanonona izany marina izy. Dia nisambotra azy izy ireo ka namono azy teo amin’ny fitàna ao Jordana; nahafatesana roa arivo sy efatra alina ny Efraimita tamin’izany andro izany.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Enina taona no nitondran’i Jefta ny Israely. Dia maty i Jefta gileadita ka nalevina tao amin’ny tanàna iray any Gileada.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ibzana sy i Elona ary i Abdona
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ibzana, avy any Betlehema, no nitsara ny Israely taorianan’i Jefta. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nanana zanakalahy telopolo sy zanakavavy telopolo, izay nampanambadiny tany ivelany izy, ary zazavavy telopolo kosa no nampidiriny ho an’ny zanany lahy. Nitsara ny Israely nandritra ny fito taona izy; '
