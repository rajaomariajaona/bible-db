document_id: 2SA.6,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fanapahan-kevitr’i Davida hitondra ny vata misy ny Fanekena ho any Jerosalema
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 1Tan 13.1-14
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Novorin’i Davida indray ny lehilahy voafantina rehetra tamin’ny Israely, telo alina no isany. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary tsy nety namindra ny vata misy ny faneken’NY TOMPO ho ao aminy ao an-Tanànan’i Davida i Davida fa naviliny ho ao an-tranon’i Obeda-Edoma gatita izany. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nipetraka telo volana tao an-tranon’i Obeda-Edoma gatita ny vata misy ny faneken’NY TOMPO; dia notahin’NY TOMPO i Obeda-Edoma sy ny ankohonany rehetra.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nahatongavan’ny vata misy ny Fanekena tao Jerosalema
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 1Tan 15.25–16.3
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nambara tamin’i Davida mpanjaka hoe: NY TOMPO efa nitahy ny ankohonan’i Obeda-Edoma sy izay nananany rehetra noho ny vata misy ny faneken’Andriamanitra. Dia nandeha i Davida ka nampiakatra ny vata misy ny faneken’Andriamanitra tamim-pifaliana avy tao an-tranon’i Obeda-Edoma ho any an-Tanànan’i Davida. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa namindra inenina ny mpitondra ny vata misy ny faneken’NY TOMPO dia namono omby sy zanak’omby mifahy izy hatao fanatitra. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nandihy tamin’ny heriny rehetra teo anatrehan’NY TOMPO i Davida sady nisalotra '
    - type: usfm
      marker: w
      children:
      - type: text
        text: efoda
    - type: text
      text: ' vita tamin’ny lamba rongony. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nampiakatra ny vata misy ny faneken’NY TOMPO tamin’ny hoby sy ny feon’ny anjomara i Davida sy ny taranak’Israely rehetra.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nony tonga teo an-Tanànan’i Davida ny vata misy ny faneken’NY TOMPO dia nitsirika teo am-baravarankely i Mikala, zanakavavin’i Saoly, ka nahita an’i Davida mpanjaka nibitaka sy nandihy teo anatrehan’NY TOMPO. Dia nanabanty azy tao am-pony izy.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nampidirina ny vata misy ny faneken’NY TOMPO ka napetraka teo amin’ny fitoerany tao anatin’ny tranolay izay naorin’i Davida hitoerany; ary nanolotra fanatitra dorana manontolo sy fanati-pihavanana teo anatrehan’NY TOMPO i Davida. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nony voatolotr’i Davida ny fanatitra dorana manontolo sy ny fanati-pihavanana dia nitsodrano ny vahoaka tamin’ny anaran’Andriamanitra, Tompon’izao rehetra izao, izy. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nomeny mofo iray sy hena didiny iray ary mofo voaloboka iray avy ny olona rehetra, izany hoe ny Israely rehetra, na lahy na vavy. Dia samy nody tany an-tranony avy ny olona rehetra.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary niainga i Davida sy ny olona rehetra izay nanaraka azy ka niala tany Baala-Joda mba hampiakatra ny vata misy ny faneken’Andriamanitra izay niantsoana ny anaran’Andriamanitra, Tompon’izao rehetra izao, izay mipetraka eo amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: kerobima
    - type: text
      text: '. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mba nody koa i Davida hitsodrano ny ankohonany. Fa tonga nitsena an’i Davida i Mikala, zanakavavin’i Saoly ary hoy izy: Akory ity voninahitry ny mpanjakan’ny Israely androany! Ilay nanary lamba anikeheo teo imason’ny zanakavavin’ny mpanompony, tahaka ny adala manary lamba ka tsy manan-kenatra. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy kosa i Davida tamin’i Mikala: Teo anatrehan’NY TOMPO, izay nifidy ahy fa tsy ny rainao sy ny ankohonany rehetra ka nanendry ahy ho mpanapaka ny Israely, olon’NY TOMPO, eny, teo anatrehan’NY TOMPO no nandihizako. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary mbola hidina ambany kokoa noho izany aza aho ka hataoko tsinontsinona ny tenako; nefa hiaraka hanam-boninahitra amin’ireo tovovavy lazainao ireo kosa aho. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tsy nanan-janaka intsony i Mikala, zanakavavin’i Saoly, mandra-pahafatiny.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nataony teo amin’ny sarety vaovao ny vata misy ny faneken’Andriamanitra ka noentiny avy tao an-tranon’i Abinadaba teo an-kavoana; i Oza sy i Ahio, zanak’i Abinadaba, no nampandeha ny sarety vaovao. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia noentiny niala tao an-tranon’i Abinadaba teo an-kavoana niaraka tamin’ny vata misy ny faneken’Andriamanitra izany; i Ahio no nandeha teo alohan’ny vata misy ny Fanekena. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I Davida sy ny taranak’Israely rehetra kosa dia nitsinjaka teo anatrehan’NY TOMPO tamin’ny karazan-javamaneno samihafa natao tamin’ny hazo kipreso, dia tamin’ny lokanga, ny valiha, ny ampongatapaka, ny korintsana ary ny kipantsona.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nony tonga teo amin’ny famoloanan’i Nakona izy ireo dia nanatsotra ny tanany tamin’ny vata misy ny faneken’Andriamanitra i Oza ka nihazona azy, satria nibolisatra ny omby. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nirehitra tamin’i Oza ny fahatezeran’NY TOMPO ka namely azy teo Andriamanitra noho ny fahadisoany. Maty teo anilan’ny vata misy ny faneken’Andriamanitra izy. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia tezitra i Davida noho ny namelezan’NY TOMPO an’i Oza ka nataony hoe Pereza-Oza
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Pereza-Oza: Famelezana an’i Oza.'
      marker-yv: yv-n
    - type: text
      text: ' ny anaran’izany tany izany mandraka androany. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Natahotra NY TOMPO i Davida tamin’izany andro izany ka niteny hoe: Nahoana no hoentina atỳ amiko ny vata misy ny faneken’NY TOMPO? '
