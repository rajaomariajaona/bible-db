document_id: ZEC.7,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fifadian-kanina ho fahatsiarovana ny naharavan’i Jerosalema
  - type: text
    content: 'Tamin’ny taona fahefatra nanjakan’i Dariosy no nahatongavan’ny tenin’NY TOMPO tamin’i Zakaria, tamin’ny andro fahefatra tamin’ny volana fahasivy na Kisleo. '
  '10':
  - type: text
    content: Aza mampahory ny mpitondratena na ny kamboty,
  - type: text
    content: na ny vahiny, na ny mahantra,
  - type: text
    content: ary aza mihevitra ao am-ponareo
  - type: text
    content: hanisy ratsy ny rahalahinareo ianareo.
  '11':
  - type: text
    content: 'Nefa tsy nety nihaino ireny fa nampihemotra ny sorony ary nanentsin-tadìny izy mba tsy handre. '
  '12':
  - type: text
    content: 'Eny, nataony mafy toy ny diamondra ny fony mba tsy hihainoany ny lalàna sy ny teny izay nampitondrain’Andriamanitra, Tompon’izao rehetra izao, tamin’ny Fanahiny tamin’ny alalan’ny mpaminany fahiny. Koa izany no nahatonga ny fahatezerana mafy avy tamin’Andriamanitra, Tompon’izao rehetra izao. '
  '13':
  - type: text
    content: 'Koa toy ny niantsoan’NY TOMPO, nefa tsy nohenoiny, dia ho toy izany kosa no hiantsoany Ahy fa tsy hohenoiko, hoy Andriamanitra, Tompon’izao rehetra izao, '
  '14':
  - type: text
    content: fa naeliko tamin’ny tafio-drivotra ho any amin’ny firenena rehetra izay tsy fantany izy. Toy izany no nahalao ny tany izay navelany tao aorianany ka tsy nisy olona nandroso na niverina; fa nahatonga ny tany mahafinaritra ho tany lao izy.
  '2':
  - type: text
    content: 'Ary i Betela-Serezera sy i Regema-Meleka mbamin’ny olony dia nandefa iraka mba hifona amin’NY TOMPO '
  '3':
  - type: text
    content: 'ka hiteny amin’ny mpisoron’ny tranon’Andriamanitra, Tompon’izao rehetra izao, sy amin’ny mpaminany hoe: Hitomany amin’ny volana fahadimy va aho ka hifady hanina toy ny efa fanaoko taona maro teo aloha?'
  '4':
  - type: text
    content: 'Dia tonga tamiko ny tenin’Andriamanitra, Tompon’izao rehetra izao hoe:'
  '5':
  - type: text
    content: 'Lazao amin’ny vahoaka rehetra amin’ny tany sy amin’ny mpisorona hoe:'
  - type: text
    content: Raha nifady hanina sy nitomany
  - type: text
    content: tamin’ny volana fahadimy sy ny fahafito
  - type: text
    content: nandritra ny fitopolo taona ianareo,
  - type: text
    content: moa ho Ahy tokoa no nifadianareo?
  '6':
  - type: text
    content: Ary raha mihinana sy misotro ianareo,
  - type: text
    content: moa tsy ianareo ihany va no mihinana sy misotro?
  '7':
  - type: text
    content: Moa tsy tokony ho nihaino ny teny izay nasain’NY TOMPO nantsoin’ny mpaminany fahiny va ianareo, fony mbola nonenana sy nandry fehizay i Jerosalema sy ny vohitra miankina aminy, sady nonenana koa i Negeva sy i Sefela?
  '8':
  - type: text
    content: 'Ary tonga tamin’i Zakaria ny tenin’NY TOMPO hoe:'
  '9':
  - type: text
    content: 'Izao no lazain’Andriamanitra, Tompon’izao rehetra izao:'
  - type: text
    content: Manaova fitsarana marina
  - type: text
    content: ary samia mifampiantra
  - type: text
    content: sy mifamindra fo amin’ny rahalahiny avy.
