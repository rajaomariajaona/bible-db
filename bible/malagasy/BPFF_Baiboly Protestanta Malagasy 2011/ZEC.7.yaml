document_id: ZEC.7,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fifadian-kanina ho fahatsiarovana ny naharavan’i Jerosalema
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin’ny taona fahefatra nanjakan’i Dariosy no nahatongavan’ny tenin’NY TOMPO tamin’i Zakaria, tamin’ny andro fahefatra tamin’ny volana fahasivy na Kisleo. '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aza mampahory ny mpitondratena na ny kamboty,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na ny vahiny, na ny mahantra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary aza mihevitra ao am-ponareo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hanisy ratsy ny rahalahinareo ianareo.
  '11':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Nefa tsy nety nihaino ireny fa nampihemotra ny sorony ary nanentsin-tadìny izy mba tsy handre. '
  '12':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Eny, nataony mafy toy ny diamondra ny fony mba tsy hihainoany ny lalàna sy ny teny izay nampitondrain’Andriamanitra, Tompon’izao rehetra izao, tamin’ny Fanahiny tamin’ny alalan’ny mpaminany fahiny. Koa izany no nahatonga ny fahatezerana mafy avy tamin’Andriamanitra, Tompon’izao rehetra izao. '
  '13':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Koa toy ny niantsoan’NY TOMPO, nefa tsy nohenoiny, dia ho toy izany kosa no hiantsoany Ahy fa tsy hohenoiko, hoy Andriamanitra, Tompon’izao rehetra izao, '
  '14':
  - type: usfm
    marker: m
    children:
    - type: text
      text: fa naeliko tamin’ny tafio-drivotra ho any amin’ny firenena rehetra izay tsy fantany izy. Toy izany no nahalao ny tany izay navelany tao aorianany ka tsy nisy olona nandroso na niverina; fa nahatonga ny tany mahafinaritra ho tany lao izy.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary i Betela-Serezera sy i Regema-Meleka mbamin’ny olony dia nandefa iraka mba hifona amin’NY TOMPO '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ka hiteny amin’ny mpisoron’ny tranon’Andriamanitra, Tompon’izao rehetra izao, sy amin’ny mpaminany hoe: Hitomany amin’ny volana fahadimy va aho ka hifady hanina toy ny efa fanaoko taona maro teo aloha?'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Dia tonga tamiko ny tenin’Andriamanitra, Tompon’izao rehetra izao hoe:'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Lazao amin’ny vahoaka rehetra amin’ny tany sy amin’ny mpisorona hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha nifady hanina sy nitomany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tamin’ny volana fahadimy sy ny fahafito
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nandritra ny fitopolo taona ianareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: moa ho Ahy tokoa no nifadianareo?
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary raha mihinana sy misotro ianareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: moa tsy ianareo ihany va no mihinana sy misotro?
  '7':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Moa tsy tokony ho nihaino ny teny izay nasain’NY TOMPO nantsoin’ny mpaminany fahiny va ianareo, fony mbola nonenana sy nandry fehizay i Jerosalema sy ny vohitra miankina aminy, sady nonenana koa i Negeva sy i Sefela?
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ary tonga tamin’i Zakaria ny tenin’NY TOMPO hoe:'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Izao no lazain’Andriamanitra, Tompon’izao rehetra izao:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manaova fitsarana marina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary samia mifampiantra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy mifamindra fo amin’ny rahalahiny avy.
