document_id: DEU.24,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny vady nisaorana
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Raha misy lehilahy maka vady ka mampakatra azy, ary tsy tiany intsony Ravehivavy noho ny nahitany fahalotoana teo aminy, dia aoka hanoratra taratasy fisaoram-bady ho an-dRavehivavy izy ka hanolotra izany eo an-tanany ary hampiala azy ao an-tranony. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Raha mampisambotra zavatra ny namanao ianao dia aza miditra ao an-tranony handray ny antoka avy aminy. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Mijanòna eo alatrano, ary ny lehilahy izay nampisamborinao no hamoaka ny antoka ho aminao eo alatrano. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Ary raha mahantra Ralehilahy dia aza tananao miloaka alina ny antoka, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: fa tsy maintsy haverinao aminy rehefa tokony ho maty masoandro, mba hirakofany ny lambany ka hisaorany anao; dia ho fahamarinana ho anao eo anatrehan’NY TOMPO Andriamanitrao izany.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fanajana ny mpikarama
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Aza manao fitondrana hafahafa amin’ny mpikarama mahantra sy sahirana, na rahalahinao na vahiny ao amin’ny taninao sy ao an-tanànanao. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Fa amin’ny andro iasany ihany no hanomezanao azy ny karamany, raha mbola tsy milentika ny masoandro, fa mahantra izy ka izany no irin’ny fony; fandrao hitaraina amin’NY TOMPO noho ny nataonao izy, dia ho fahotana ho anao izany.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny andraikitry ny tsirairay
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Ny ray dia tsy hovonoina amin’ny ataon’ny zanany, ary ny zanaka dia tsy hovonoina amin’ny ataon’ny rainy; fa samy hovonoina amin’ny fahotany avy ihany ny olona.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fepetra ho fanasoavana ny mahantra
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Aza manao fitsarana miangatra amin’ny vahiny sy ny kamboty; ary aza maka ny fitafian’ny mpitondratena ho antoka. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Tsarovy fa andevo tany Ejipta ianao, ary NY TOMPO Andriamanitrao no nanavotra anao ho afaka tany; koa izany no andidiako anao hanatanteraka ireo zavatra ireo.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Raha mijinja ny varinao any an-tsaha ianao ka misy amboara hadinonao any dia aza miverina haka azy fa aoka ho an’ny vahiny sy ny kamboty ary ny mpitondratena izany; mba hotahìn’NY TOMPO Andriamanitrao ianao amin’ny asa rehetra ataon’ny tananao. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Ary rehefa miala ao an-tranony Ravehivavy dia mahazo mandeha ka manambady olon-kafa. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Raha manintsana ny hazo olivanao ianao dia aza miverina hitsimpona izay sisa; fa aoka ho an’ny vahiny sy ny kamboty ary ny mpitondratena izany. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Raha mioty ny voalobokao ianao dia aza miverina hitsimpona izay sisa fa aoka ho an’ny vahiny sy ny kamboty ary ny mpitondratena izany. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Tsarovy fa andevo tany amin’ny tany Ejipta ianao; koa izany no andidiako anao ireo zavatra ireo.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Ary raha tsy tia an-dRavehivavy ilay vao manambady azy ka manoratra taratasy fisaoram-bady koa ary manolotra izany eo an-tanany ka mampiala azy ao an-tranony, na maty ilay nanambady azy taoriana, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: dia tsy mahazo manambady azy intsony ilay nanambady azy taloha izay nisaraka taminy, rehefa voaloto izy; fa fahavetavetana eo imason’NY TOMPO izany; aza mampiditra heloka amin’ny tany izay omen’NY TOMPO Andriamanitrao ho lovanao.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny mpivady vao
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Raha misy lehilahy vao nampaka-bady dia tsy handeha hiantafika izy, ary tsy hampanaovina fanompoana akory fa havela hitoetra ao an-tranony herintaona ka hampifaly ny vadiny izay vao nampakariny.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny amin’ny antoka
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Aoka tsy hisy olona haka fikosoham-bary ho antoka, na ny vatony ambony ihany aza; fa maka ny aina ho antoka izany.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fakàna olona an-keriny
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Raha misy olona tratra mangalatra ny iray amin’ny Zanak’Israely rahalahiny ka manandevo azy na mivarotra azy dia hovonoina izany mpangalatra izany. Hofongoranao tsy ho eo aminao ny fanao ratsy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny amin’ny habokana
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Mitandrema ny amin’ny habokana ka araho tsara izay rehetra hatoron’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: levita
    - type: text
      text: ' mpisorona anareo; araka izay nandidiako azy no hotandremanareo harahina. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Tsarovy izay nataon’NY TOMPO Andriamanitrao tamin’i Miriama teny an-dalana tamin’ny nivoahanareo avy tany Ejipta.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny amin’ny antoka ihany
    marker-yv: yv-h
