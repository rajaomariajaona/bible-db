document_id: DEU.24,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny vady nisaorana
  - type: text
    content: 'Raha misy lehilahy maka vady ka mampakatra azy, ary tsy tiany intsony Ravehivavy noho ny nahitany fahalotoana teo aminy, dia aoka hanoratra taratasy fisaoram-bady ho an-dRavehivavy izy ka hanolotra izany eo an-tanany ary hampiala azy ao an-tranony. '
  '10':
  - type: text
    content: 'Raha mampisambotra zavatra ny namanao ianao dia aza miditra ao an-tranony handray ny antoka avy aminy. '
  '11':
  - type: text
    content: 'Mijanòna eo alatrano, ary ny lehilahy izay nampisamborinao no hamoaka ny antoka ho aminao eo alatrano. '
  '12':
  - type: text
    content: 'Ary raha mahantra Ralehilahy dia aza tananao miloaka alina ny antoka, '
  '13':
  - type: text
    content: fa tsy maintsy haverinao aminy rehefa tokony ho maty masoandro, mba hirakofany ny lambany ka hisaorany anao; dia ho fahamarinana ho anao eo anatrehan’NY TOMPO Andriamanitrao izany.
  - type: heading
    content: Fanajana ny mpikarama
  '14':
  - type: text
    content: 'Aza manao fitondrana hafahafa amin’ny mpikarama mahantra sy sahirana, na rahalahinao na vahiny ao amin’ny taninao sy ao an-tanànanao. '
  '15':
  - type: text
    content: Fa amin’ny andro iasany ihany no hanomezanao azy ny karamany, raha mbola tsy milentika ny masoandro, fa mahantra izy ka izany no irin’ny fony; fandrao hitaraina amin’NY TOMPO noho ny nataonao izy, dia ho fahotana ho anao izany.
  - type: heading
    content: Ny andraikitry ny tsirairay
  '16':
  - type: text
    content: Ny ray dia tsy hovonoina amin’ny ataon’ny zanany, ary ny zanaka dia tsy hovonoina amin’ny ataon’ny rainy; fa samy hovonoina amin’ny fahotany avy ihany ny olona.
  - type: heading
    content: Fepetra ho fanasoavana ny mahantra
  '17':
  - type: text
    content: 'Aza manao fitsarana miangatra amin’ny vahiny sy ny kamboty; ary aza maka ny fitafian’ny mpitondratena ho antoka. '
  '18':
  - type: text
    content: Tsarovy fa andevo tany Ejipta ianao, ary NY TOMPO Andriamanitrao no nanavotra anao ho afaka tany; koa izany no andidiako anao hanatanteraka ireo zavatra ireo.
  '19':
  - type: text
    content: 'Raha mijinja ny varinao any an-tsaha ianao ka misy amboara hadinonao any dia aza miverina haka azy fa aoka ho an’ny vahiny sy ny kamboty ary ny mpitondratena izany; mba hotahìn’NY TOMPO Andriamanitrao ianao amin’ny asa rehetra ataon’ny tananao. '
  '2':
  - type: text
    content: 'Ary rehefa miala ao an-tranony Ravehivavy dia mahazo mandeha ka manambady olon-kafa. '
  '20':
  - type: text
    content: 'Raha manintsana ny hazo olivanao ianao dia aza miverina hitsimpona izay sisa; fa aoka ho an’ny vahiny sy ny kamboty ary ny mpitondratena izany. '
  '21':
  - type: text
    content: 'Raha mioty ny voalobokao ianao dia aza miverina hitsimpona izay sisa fa aoka ho an’ny vahiny sy ny kamboty ary ny mpitondratena izany. '
  '22':
  - type: text
    content: Tsarovy fa andevo tany amin’ny tany Ejipta ianao; koa izany no andidiako anao ireo zavatra ireo.
  '3':
  - type: text
    content: 'Ary raha tsy tia an-dRavehivavy ilay vao manambady azy ka manoratra taratasy fisaoram-bady koa ary manolotra izany eo an-tanany ka mampiala azy ao an-tranony, na maty ilay nanambady azy taoriana, '
  '4':
  - type: text
    content: dia tsy mahazo manambady azy intsony ilay nanambady azy taloha izay nisaraka taminy, rehefa voaloto izy; fa fahavetavetana eo imason’NY TOMPO izany; aza mampiditra heloka amin’ny tany izay omen’NY TOMPO Andriamanitrao ho lovanao.
  - type: heading
    content: Ny mpivady vao
  '5':
  - type: text
    content: Raha misy lehilahy vao nampaka-bady dia tsy handeha hiantafika izy, ary tsy hampanaovina fanompoana akory fa havela hitoetra ao an-tranony herintaona ka hampifaly ny vadiny izay vao nampakariny.
  - type: heading
    content: Ny amin’ny antoka
  '6':
  - type: text
    content: Aoka tsy hisy olona haka fikosoham-bary ho antoka, na ny vatony ambony ihany aza; fa maka ny aina ho antoka izany.
  - type: heading
    content: Fakàna olona an-keriny
  '7':
  - type: text
    content: Raha misy olona tratra mangalatra ny iray amin’ny Zanak’Israely rahalahiny ka manandevo azy na mivarotra azy dia hovonoina izany mpangalatra izany. Hofongoranao tsy ho eo aminao ny fanao ratsy.
  - type: heading
    content: Ny amin’ny habokana
  '8':
  - type: text
    content: 'Mitandrema ny amin’ny habokana ka araho tsara izay rehetra hatoron’ny '
  - type: text
    content: levita
  - type: text
    content: ' mpisorona anareo; araka izay nandidiako azy no hotandremanareo harahina. '
  '9':
  - type: text
    content: Tsarovy izay nataon’NY TOMPO Andriamanitrao tamin’i Miriama teny an-dalana tamin’ny nivoahanareo avy tany Ejipta.
  - type: heading
    content: Ny amin’ny antoka ihany
