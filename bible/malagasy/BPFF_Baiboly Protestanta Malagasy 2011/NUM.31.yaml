document_id: NUM.31,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny ady tamin’ny Midianita
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary NY TOMPO niteny tamin’i Mosesy indray hoe: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny tanàna rehetra izay nonenany sy ny tobiny rehetra dia nodoran’izy ireo tamin’ny afo. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nalainy avokoa ny babo rehetra, na olona na biby fiompy, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ka noentiny tany amin’i Mosesy sy i Eleazara mpisorona ary ny fiangonan’ny Zanak’Israely teo an-toby, tany Arbota-Moaba izay eo amoron’i Jordana tandrifin’i Jeriko.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary i Mosesy sy i Eleazara mpisorona mbamin’ny lohan’ny fiangonana rehetra dia nivoaka hitsena azy ireo teo ivelan’ny toby. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nefa tezitra tamin’ny mpifehy ny miaramila i Mosesy, dia tamin’ny mpifehy arivo sy ny mpifehy zato, izay avy nanafika, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ka hoy izy tamin’ireo: Nahoana no navelanareo ho velona ny vehivavy rehetra? '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ireo ihany no nampikomy ny Zanak’Israely tamin’NY TOMPO noho ny tenin’i Balama, tamin’ilay raharahan’i Peora, ka nahazo ny fiangonan’NY TOMPO ilay areti-mandringana. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa ankehitriny, vonoy ny zazalahy madinika rehetra, ary vonoy koa ny vehivavy rehetra izay efa nahalala lahy. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ny zazavavy rehetra izay tsy mbola nahalala lahy kosa dia velomy ho anareo. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mitobia eo ivelan’ny toby mandritra ny hafitoana; ary izay nahafaty olona na nikasika faty dia samia manadio ny tenany amin’ny andro fahatelo sy ny andro fahafito, na ianareo, na ny olona babonareo. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Valio noho ny nataony tamin’ny Zanak’Israely ny Midianita, ary rehefa afaka izany dia hangonina any amin’ny razanao ianao. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny fitafiana rehetra na ny fanaka hoditra na ny fanaka volon’osy na ny fanaka hazo dia diovy avokoa.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy i Eleazara mpisorona tamin’ireo mpanafika, izay efa tany amin’ny ady: Izao no lalàna hotandremana, izay nandidian’NY TOMPO an’i Mosesy: '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny volamena, ny volafotsy, ny varahina, ny vy, ny firapotsy ary ny firaka, '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia ny zavatra rehetra izay mahatanty afo, dia ataovy ao amin’ny afo mba hadio. Kanefa hodiovina amin’ny rano fanadiovana koa izy; ary izay rehetra tsy maharitra afo kosa dia ataovy ao amin’ny rano ihany. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Sasao koa ny fitafianareo amin’ny andro fahafito dia hadio ianareo, koa rehefa afaka izany vao mahazo miditra ao amin’ny toby ianareo.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fizarana ny babo
    marker-yv: yv-h
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary NY TOMPO niteny tamin’i Mosesy hoe: '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alaonao sy i Eleazara mpisorona sy ny lohan’ny fianakaviana ao amin’ny fiangonana ny isan’ny babo izay azo, na olona na biby fiompy. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Sasaho ny babo ho an’izay niady, dia ireo izay nanafika, sy ho an’ny fiangonana manontolo; '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'kanefa makà anjara ho an’NY TOMPO avy amin’ny mpanafika izay nandeha nanafika, dia iray isan-dimanjato, na olona na omby na boriky na ondry aman’osy; '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ilay antsasany izay anjaran’ireo no hanalanao izany ka homenao an’i Eleazara mpisorona ho fanomezana ho an’NY TOMPO. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia niteny tamin’ny olona i Mosesy hoe: Misia aminareo mandray fiadiana ka hanafika ny Midianita mba hahatanteraka ny famalian’NY TOMPO ny Midianita. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ilay antsasany izay an’ny Zanak’Israely kosa dia analao iray isan-dimampolo, na olona na omby na boriky na ondry aman’osy, dia ny biby fiompy rehetra ka omeo ho an’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: levita
    - type: text
      text: ' izay mitandrina ny anjara raharaha momba ny tabernakelin’NY TOMPO. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia notanterahin’i Mosesy sy i Eleazara mpisorona izany, araka izay nandidian’NY TOMPO an’i Mosesy. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny babo sisa afa-tsy izay azon’ny mpanafika dia ondry aman’osy dimy arivo sy fito alina sy enina hetsy, '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'omby roa arivo sy fito alina, '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'boriky arivo sy enina alina '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ary olona, dia ny zazavavy izay tsy mbola nahalala lahy, roa arivo sy telo alina.
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ireto ny antsasany izay anjaran’ny mpanafika: Dimanjato sy fito arivo sy telo alina sy telo hetsy ny ondry aman’osy; '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ny anjaran’NY TOMPO avy tamin’ireo ondry aman’osy ireo dia dimy amby fitopolo sy eninjato. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny omby kosa dia enina arivo sy telo alina; ny anjaran’NY TOMPO avy tamin’ireo dia roa amby fitopolo. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dimanjato sy telo alina ny boriky; ny anjaran’NY TOMPO avy tamin’ireo dia iraika amby enimpolo. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Arivo lahy avy isam-poko amin’ny fokon’ny Israely no halefanareo hanafika. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny olona indray dia enina arivo sy iray alina; ny anjaran’NY TOMPO avy tamin’ireo dia roa amby telopolo. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nomen’i Mosesy an’i Eleazara mpisorona ny fanomezana izay nalaina ho an’NY TOMPO, araka izay nandidian’NY TOMPO an’i Mosesy.
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Avy tamin’ilay antsasany izay an’ny Zanak’Israely, izay nozarain’i Mosesy avy tamin’ny mpanafika, '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia ilay antsasany izay an’ny fiangonana; izany hoe ondry aman’osy dimanjato sy arivo sy telo alina sy telo hetsy, '
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'omby enina arivo sy telo alina, '
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'boriky dimanjato sy telo alina '
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary olona enina arivo sy iray alina. '
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tamin’ny antsasany izay an’ny Zanak’Israely no nanalan’i Mosesy iray isan-dimampolo, na olona na biby fiompy, ka nomeny ho an’ny levita mpitandrina ny anjara raharaha momba ny tabernakelin’NY TOMPO izany, araka izay nandidian’NY TOMPO an’i Mosesy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fanatitra an-tsitrapo ho an’Andriamanitra
    marker-yv: yv-h
  '48':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ireo mpifehy, izay nifehy ny miaramila, dia ny mpifehy arivo sy ny mpifehy zato, dia nanatona an’i Mosesy '
  '49':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ka niteny taminy hoe: Ny mpanomponao dia efa naka ny isan’ny mpanafika izay nofehezinay ka tsy misy diso isa aminay na dia lehilahy iray aza; '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia navahana tamin’ny fokon’ny Israely ny arivo isam-poko, izany hoe roa arivo sy iray alina, samy mitam-piadiana. '
  '50':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'koa nitondra fanatitra ho an’NY TOMPO izahay, dia ny firavaka volamena efa azonay avy, dia fehin-tanana, haba, peratra fitombo-kase, kavina ary firavaka iambozonana, hanaovana fanavotana ho an’ny ainay eo anatrehan’NY TOMPO. '
  '51':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia noraisin’i Mosesy sy i Eleazara mpisorona taminy ny volamena izay firavaka voatefy avokoa. '
  '52':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny volamena rehetra izay natokan’ny mpifehy arivo sy ny mpifehy zato ho fanomezana ho an’NY TOMPO dia sekela dimampolo sy fitonjato sy enina arivo sy iray alina '
  '53':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'satria ny mpanafika dia samy namabo ho an’ny tenany. '
  '54':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia noraisin’i Mosesy sy i Eleazara mpisorona ny volamena nomen’ny mpifehy arivo sy ny mpifehy zato ka noentiny tao amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: tranolay fihaonana
    - type: text
      text: ', ho fahatsiarovana ho an’ny Zanak’Israely eo anatrehan’NY TOMPO.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nampandehanin’i Mosesy hanafika ireo arivo lahy isam-poko ireo sy i Finehasa, zanak’i Eleazara mpisorona, izay nitondra ny fanaka masina teny an-tanany, miaraka amin’ireo trompetra fanairana.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia niady tamin’ny Midianita ireo, araka izay efa nandidian’NY TOMPO an’i Mosesy; dia matiny ny lehilahy rehetra. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary matiny niaraka tamin’ireny koa ny mpanjakan’i Midiana dimy lahy, dia i Evy, i Rekema, i Zora, i Hora ary i Reba; ary i Balama, zanak’i Beora koa dia novonoiny tamin’ny sabatra. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nobaboin’ny Zanak’Israely koa ny vehivavy midianita sy ny zanany madinika; nalainy avokoa ny biby fiompiny rehetra sy ny omby aman’ondriny rehetra mbamin’ny fananany rehetra. '
