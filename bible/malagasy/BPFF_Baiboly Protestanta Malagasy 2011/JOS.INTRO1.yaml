segments:
- type: usfm
  marker: imt1
  children:
  - type: text
    text: INDRAY MIJERY
- type: usfm
  marker: is1
  children:
  - type: text
    text: Ny votoatin’ny Boky
- type: usfm
  marker: ip
  children:
  - type: text
    text: Ny Bokin’i Josoa dia maneho ny nakan’ny Israely ny tany Kanana, koa tamin’izany dia Andriamanitra no niady niaraka tamin’ny olony ka nampiseho ny heriny toy ny tamin’ny nivoahana tany Ejipta. Ambaran’ny Boky koa ny fizarana ny tany ho an’ireo fokon’ny Israely mba hananany ny anjarany avy, koa ao amin’izany zarataniny izany izy no hiaina amin’ny fitahiana sy ny fiadanana. Ny fitoeran’ny Zanak’Israely eo anivon’ny firenena jentilisa, izay tsy mbola resy tosika tanteraka anefa, dia tsy maintsy ho fakam-panahy be ho azy. Noho izany i Josoa dia mitaky fanapahan-kevitra avy aminy mba hanavaozany ny fanekena hanompo NY TOMPO irery ihany. Izany fanavaozana ny fanekena izany no mamarana ny Boky.
- type: usfm
  marker: iot
  children:
  - type: text
    text: Ny firafitry ny Boky
- type: usfm
  marker: io1
  children:
  - type: text
    text: 'Fitarihanteny: I Josoa, mpandimby an’i Mosesy: 1'
- type: usfm
  marker: io1
  children:
  - type: text
    text: 'Ny fitàna ny ony Jordana sy ny fandraisan’ny Israely ny tany Kanana: 2–12'
- type: usfm
  marker: io1
  children:
  - type: text
    text: 'Ny fizarana ny tany amin’ny foko roa amby folo: 13–21'
- type: usfm
  marker: io1
  children:
  - type: text
    text: 'Ny fiafaran’ny fiainan’i Josoa: Ny alitara naorin’ny Robenita, ny hafatrafatra nataon’i Josoa ary ny fanekena tao Sekema: 22–24'
