document_id: ACT.2
type_code: plt
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: ANY JEROSALEMA
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nirotsahan’ny Fanahy Masina
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Nony tonga ny andro '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Pentekosta
  - type: text
    text: ', dia teo amin’ny toerana iray izy rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary nisy feo tonga tampoka avy tany an-danitra toy ny rivotra mahery mifofofofo ka nanenika ilay trano niangonany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary nisy lela maro mitarehin’afo niseho taminy, izay nizarazara, ary nipetraka tamin’izy rehetra isan’olona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Dia samy feno ny Fanahy Masina izy rehetra ka niteny tamin’ny fiteny maro samihafa, araka ny nampitenenan’ny Fanahy Masina azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Nisy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jiosy
  - type: text
    text: ' nonina tany Jerosalema; olona mpivavaka tsara avy tany amin’ny firenena rehetra ambanin’ny lanitra izy ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Rehefa niely izany feo izany dia olona maro no vory sady very hevitra, satria samy nahare azy ireo niteny tamin’ny fiteniny avy izy rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dia talanjona sady gaga izy ireo ka niteny hoe: Indreo, tsy Galiliana va ireo rehetra miteny ireo? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Koa ahoana no andrenesantsika azy amin’ny fitenintsika avy izay nahabe antsika, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'isika izay Partiana, Mediana, Elamita, mponina any Mezopotamia, '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jodia
  - type: text
    text: ', Kapadokia, Ponto, Azia, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Frigia, Pamfilia, Ejipta sy ny faritr’i Libia izay manodidina an’i Kirena, ary vahiny avy any Roma, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Jiosy sy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prozelita
  - type: text
    text: ', Kretana, Arabo, koa ahoana no andrenesantsika azy ireo miteny amin’ny fitenintsika avy ny asa lehibe ataon’Andriamanitra? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Dia talanjona izy rehetra sady sahiran-tsaina ka nifampiresaka hoe: Inona no tokony ho hevitr’izany? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ny sasany kosa dia nihomehy sady niteny hoe: Mamon-divay mamy ireo.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nitoriteny tamin’ny vahoaka i Petera
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Nitsangana i Petera sy ny iraika amby folo lahy, dia nanandra-peo ka niteny tamin’izy ireo hoe: Ry lehilahy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jiosy
  - type: text
    text: ' sy izay rehetra monina eto Jerosalema, aoka ho fantatrareo izao ka henoy ny teniko: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Tsy mamo araka ny hevitrareo tsy akory ireo fa vao ora fahatelo ihany izao ny andro. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Fa izao ilay nampilazaina an’i Joela mpaminany hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: «Amin’ny andro farany, hoy Andriamanitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: no handrotsahako ny Fanahiko amin’ny nofo rehetra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny zanakareo lahy sy ny zanakareo vavy dia haminany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny zatovonareo dia hahita fahitana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny lahiantitrareo dia hanonofy;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ary ny mpanompoko, na lahy na vavy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia handrotsahako ny Fanahiko amin’izany andro izany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka haminany;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: hanisy fahagagana eny amin’ny lanitra ambony Aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary famantarana amin’ny tany ambany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ra sy afo ary setroka manjavona;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ny masoandro dia hiova ho haizina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny volana dia ho ra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: alohan’ny hahatongavan’ny Andron’NY TOMPO,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ilay sady lehibe no malaza;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ary izay rehetra hiantso ny anaran’NY TOMPO dia ho voavonjy.» (Joe 3.1-5)
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ry lehilahy Israelita, mihainoa izao teny izao: Jesosy avy any Nazareta, lehilahy nasehon’Andriamanitra teo aminareo tamin’ny asa lehibe sy ny fahagagana ary ny famantarana izay nampanaovin’Andriamanitra Azy teo aminareo, araka ny fantatrareo ihany, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Izy dia natolotra noho ny fandaharana sy ny fahalalan’Andriamanitra mialoha, ary nohomboinareo sy novonoinareo tamin’ny tanan’ny olona tsy tan-dalàna; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'nefa Andriamanitra nanangana Azy, rehefa nahafaka ny fanaintainan’ny fahafatesana, satria tsy azon’izany nohazonina Izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Fa i Davida dia milaza Azy hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Nijery NY TOMPO teo anatrehako mandrakariva aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria eo ankavanako Izy, mba tsy hangozohozo aho,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: dia izany no nifalian’ny foko sy niravoravoan’ny lelako;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny nofoko koa dia hitoetra amin’ny fanantenana;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'fa tsy ho foinao ho any amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: fitoeran’ny maty
  - type: text
    text: ' ny aiko'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy hamela Ilay Masinao ho tratry ny lo Ianao.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Nampahafantatra ahy ny lalan’aina Ianao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hampifaly ahy indrindra amin’ny tavanao Ianao» (Sal 16.8-11).
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ry rahalahy, aoka aho mba hilaza marina aminareo ny amin’i Davida '
  - type: usfm
    marker: w
    children:
    - type: text
      text: patriarka
  - type: text
    text: ', fa efa maty izy ka nalevina, ary eto amintsika mandraka androany ny fasany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Satria mpaminany izy ka nahafantatra fa Andriamanitra efa nianiana taminy fa izay hateraky ny kibony no hapetrany eo ambonin’ny sezafiandrianany, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'koa raha nahita mialoha izy dia nilaza ny fitsanganan’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ', fa tsy nafoy ho any amin’ny fitoeran’ny maty Izy, ary ny nofony dia tsy tratry ny lo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Izany Jesosy izany dia efa natsangan’Andriamanitra ary vavolombelon’izany izahay rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Rehefa nasandratry ny tanana ankavanan’Andriamanitra Izy sady nandray tamin’ny Ray ny Fanahy Masina izay nokasainy dia nandrotsaka izao hitanareo sy renareo izao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Fa tsy i Davida no niakatra tany an-danitra; satria hoy izy:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: '«NY TOMPO nilaza tamin’ny Tompoko hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mipetraha eo ankavanako
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ambara-panaoko ny fahavalonao ho fitoeran-tongotrao» (Sal 110.1).
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Koa aoka ho fantatry ny taranak’Israely rehetra tokoa fa iny Jesosy nohomboinareo tamin’ny hazofijaliana iny dia efa nataon’Andriamanitra Tompo sy Kristy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ireo olona telo arivo voalohany niova fo
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Raha nandre izany ny olona dia voatsindrona tao am-pony ka niteny tamin’i Petera sy ny apostoly namany hoe: Ry rahalahy, inona no hataonay?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Hoy i Petera taminy: Mibebaha, ary aoka samy hatao batisa amin’ny anaran’i Jesosy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' ianareo rehetra mba hahazo famelana ny helokareo; ary ianareo handray ny fanomezana, dia ny Fanahy Masina, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'satria ny teny fikasana dia ho anareo sy ny zanakareo ary ho an’izay rehetra lavitra, na iza na iza hantsoin’NY TOMPO Andriamanitsika hanatona Azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Ary nanamafy izany izy sady nananatra azy ireo tamin’ny teny maro hafa koa hoe: Aoka hovonjena ho afaka amin’ity taranaka maditra ity ianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: Dia natao batisa ireo izay nandray tsara ny teniny ka tokony ho telo arivo ireo olona vao nanampy ho isany tamin’izany andro izany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fiangonana kristiana voalohany
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Ary izy ireo dia naharitra tamin’ny fampianaran’ny Apostoly sy ny fiombonana sy ny famakiana ny mofo ary ny fivavahana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Dia raiki-tahotra ny olona rehetra, ary fahagagana sy famantarana maro no nataon’ny apostoly. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Izay rehetra nino dia niray toerana, sady niombonany avokoa ny fananany rehetra; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'namidiny ny taniny sy ny fananany ka nozarainy tamin’izy rehetra araka izay nilainy avy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Niray saina isanandro izy ireo ka nazoto nankeo amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tempoly
  - type: text
    text: ' ary namaky mofo tao an-trano sady nihinan-kanina tamin’ny fifaliana sy ny fahatsoram-po; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: nidera an’Andriamanitra sady nahita fitia tamin’ny vahoaka rehetra izy. Ary nampitomboin’ny Tompo isanandro ny olom-bonjena ho isan’ireo.
