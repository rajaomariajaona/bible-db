document_id: 1CO.6,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny adin’ny samy mpirahalahy
  - type: text
    content: 'Misy aminareo va, raha manana ady amin’ny namany, no sahy handeha hotsarain’ny olona tsy marina fa tsy eo anatrehan’ny olona masina? '
  '10':
  - type: text
    content: 'ny mpangalatra, ny fatra-pitia harena, ny mpimamo, ny mpanala baraka olona ary ny mpanao an-keriny dia tsy mba handova ny fanjakan’Andriamanitra. '
  '11':
  - type: text
    content: 'Ary efa mba toy izany ihany ny sasany aminareo, saingy efa voasasa ianareo, efa nohamasinina ianareo, efa nohamarinina ianareo, tamin’ny anaran’i Jesosy '
  - type: text
    content: Kristy
  - type: text
    content: ' Tompo sy tamin’ny Fanahin’Andriamanitsika.'
  - type: heading
    content: Mankalazà an’Andriamanitra amin’ny tenanareo
  '12':
  - type: text
    content: 'Azoko atao ny zavatra rehetra, nefa tsy dia ary mahasoa avokoa ny zavatra rehetra; azoko atao ny zavatra rehetra, nefa izaho dia tsy manaiky handevozin-javatra, na inona na inona izany. '
  '13':
  - type: text
    content: 'Ny hanina dia ho an’ny kibo, ary ny kibo dia ho an’ny hanina; nefa samy holevonin’Andriamanitra ireo zavatra roa ireo. Fa ny tena kosa dia tsy ho an’ny fijangajangana fa ho an’ny Tompo; ary ny Tompo ho an’ny tena. '
  '14':
  - type: text
    content: 'Ary Andriamanitra efa nanangana ny Tompo sady hanangana antsika koa amin’ny heriny. '
  '15':
  - type: text
    content: 'Tsy fantatrareo va fa momba ny tenan’i '
  - type: text
    content: Kristy
  - type: text
    content: ' ny tenanareo? Moa hanala ny momba ny tenan’i Kristy va aho ka hanolotra izany ho momba ny tenan’ny vehivavy janga? Sanatria izany! '
  '16':
  - type: text
    content: 'Moa tsy fantatrareo va fa izay miray amin’ny vehivavy janga dia tena iray aminy? Fa hoy Andriamanitra: «Ho nofo iray ihany izy roa» (Gen 2.24). '
  '17':
  - type: text
    content: Fa izay miray amin’ny Tompo kosa dia iray fanahy Aminy.
  '18':
  - type: text
    content: 'Mandosira ny fijangajangana. Izay fahotana rehetra ataon’ny olona dia eny ivelan’ny tena ihany; fa ny mpijangajanga kosa dia manota mihatra amin’ny tenany. '
  '19':
  - type: text
    content: 'Ahoana ary? Moa tsy fantatrareo fa ny tenanareo dia tempolin’ny Fanahy Masina izay ao anatinareo sady efa azonareo tamin’Andriamanitra? Koa tsy tompon’ny tenanareo ianareo. '
  '2':
  - type: text
    content: 'Sa tsy fantatrareo fa ny olona masina dia hitsara izao tontolo izao? Ary raha hitsara izao tontolo izao ianareo, moa tsy mendrika hitsara izay zavatra madinika indrindra va? '
  '20':
  - type: text
    content: Fa olom-boavidy ianareo, koa mankalazà an’Andriamanitra amin’ny tenanareo.
  '3':
  - type: text
    content: 'Tsy fantatrareo va fa hitsara anjely isika? Mainka fa izay zavatra momba izao fiainana izao? '
  '4':
  - type: text
    content: Koa raha misy hotsarainareo ny amin’ny momba izao fiainana izao, moa izay ataon’ny fiangonana
  - type: note
    content: 'Na: eklesia.'
  - type: text
    content: ' ho tsinontsinona va no tendrenareo ho mpitsara? '
  '5':
  - type: text
    content: 'Ny hampahamenatra anareo no itenenako izany. Hay ve dia tsy mba misy olon-kendry na dia iray akory aza, izay mahay mandamina ny adin’ny rahalahiny eo aminareo? '
  '6':
  - type: text
    content: Fa misy rahalahy mandeha hiady amin’ny rahalahiny, ary izany dia ataony eo imason’ny tsy mino.
  '7':
  - type: text
    content: 'Efa faharesena ho anareo ny fanananareo ady amin’ny namanareo. Nahoana no tsy aleo mandefitra ny tsy rariny aza ianareo? Nahoana no tsy aleo maharitra hambakaina aza ianareo? '
  '8':
  - type: text
    content: Kanjo ianareo indray no manao izay tsy rariny ka manambaka ny rahalahinareo.
  '9':
  - type: text
    content: 'Moa tsy fantatrareo va fa ny olona tsy marina dia tsy mba handova ny fanjakan’Andriamanitra? Aza mety hofitahina ianareo: Fa ny mpijangajanga, ny mpanompo sampy, ny mpaka vadin’olona, ny sodomita'
  - type: note
    content: Ampit. Lev 18.22.
  - type: text
    content: ', '
