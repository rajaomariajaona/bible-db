document_id: 1CO.6
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny adin’ny samy mpirahalahy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Misy aminareo va, raha manana ady amin’ny namany, no sahy handeha hotsarain’ny olona tsy marina fa tsy eo anatrehan’ny olona masina? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Sa tsy fantatrareo fa ny olona masina dia hitsara izao tontolo izao? Ary raha hitsara izao tontolo izao ianareo, moa tsy mendrika hitsara izay zavatra madinika indrindra va? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Tsy fantatrareo va fa hitsara anjely isika? Mainka fa izay zavatra momba izao fiainana izao? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Koa raha misy hotsarainareo ny amin’ny momba izao fiainana izao, moa izay ataon’ny fiangonana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.4 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: eklesia.
    marker-yv: yv-n
  - type: text
    text: ' ho tsinontsinona va no tendrenareo ho mpitsara? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ny hampahamenatra anareo no itenenako izany. Hay ve dia tsy mba misy olon-kendry na dia iray akory aza, izay mahay mandamina ny adin’ny rahalahiny eo aminareo? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Fa misy rahalahy mandeha hiady amin’ny rahalahiny, ary izany dia ataony eo imason’ny tsy mino.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Efa faharesena ho anareo ny fanananareo ady amin’ny namanareo. Nahoana no tsy aleo mandefitra ny tsy rariny aza ianareo? Nahoana no tsy aleo maharitra hambakaina aza ianareo? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Kanjo ianareo indray no manao izay tsy rariny ka manambaka ny rahalahinareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Moa tsy fantatrareo va fa ny olona tsy marina dia tsy mba handova ny fanjakan’Andriamanitra? Aza mety hofitahina ianareo: Fa ny mpijangajanga, ny mpanompo sampy, ny mpaka vadin’olona, ny sodomita'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.9 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Ampit. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Lev 18.22.
    marker-yv: yv-n
  - type: text
    text: ', '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'ny mpangalatra, ny fatra-pitia harena, ny mpimamo, ny mpanala baraka olona ary ny mpanao an-keriny dia tsy mba handova ny fanjakan’Andriamanitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary efa mba toy izany ihany ny sasany aminareo, saingy efa voasasa ianareo, efa nohamasinina ianareo, efa nohamarinina ianareo, tamin’ny anaran’i Jesosy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' Tompo sy tamin’ny Fanahin’Andriamanitsika.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mankalazà an’Andriamanitra amin’ny tenanareo
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Azoko atao ny zavatra rehetra, nefa tsy dia ary mahasoa avokoa ny zavatra rehetra; azoko atao ny zavatra rehetra, nefa izaho dia tsy manaiky handevozin-javatra, na inona na inona izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ny hanina dia ho an’ny kibo, ary ny kibo dia ho an’ny hanina; nefa samy holevonin’Andriamanitra ireo zavatra roa ireo. Fa ny tena kosa dia tsy ho an’ny fijangajangana fa ho an’ny Tompo; ary ny Tompo ho an’ny tena. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary Andriamanitra efa nanangana ny Tompo sady hanangana antsika koa amin’ny heriny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Tsy fantatrareo va fa momba ny tenan’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' ny tenanareo? Moa hanala ny momba ny tenan’i Kristy va aho ka hanolotra izany ho momba ny tenan’ny vehivavy janga? Sanatria izany! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Moa tsy fantatrareo va fa izay miray amin’ny vehivavy janga dia tena iray aminy? Fa hoy Andriamanitra: «Ho nofo iray ihany izy roa» (Gen 2.24). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Fa izay miray amin’ny Tompo kosa dia iray fanahy Aminy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Mandosira ny fijangajangana. Izay fahotana rehetra ataon’ny olona dia eny ivelan’ny tena ihany; fa ny mpijangajanga kosa dia manota mihatra amin’ny tenany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ahoana ary? Moa tsy fantatrareo fa ny tenanareo dia tempolin’ny Fanahy Masina izay ao anatinareo sady efa azonareo tamin’Andriamanitra? Koa tsy tompon’ny tenanareo ianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Fa olom-boavidy ianareo, koa mankalazà an’Andriamanitra amin’ny tenanareo.
