document_id: NUM.13,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Maniraka mpisafo tany any Kanana i Mosesy
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ary NY TOMPO niteny tamin’i Mosesy hoe: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: avy tamin’ny fokon’i Zebolona, i Gadiela, zanak’i Sody;
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: avy tamin’ny fokon’i Josefa, tamin’ny fokon’i Manase, i Gady, zanak’i Sosy;
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: avy tamin’ny fokon’i Dana, i Amiela, zanak’i Gemaly;
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: avy tamin’ny fokon’i Asera, i Setora, zanak’i Mikaela;
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: avy tamin’ny fokon’i Naftaly, i Naby, zanak’i Vofsy;
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: avy tamin’ny fokon’i Gada, i Geoela, zanak’i Makỳ.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Ireo no anaran’ny lehilahy izay nirahin’i Mosesy hisafo ny tany. Ary i Hosea, zanak’i Nona, dia nataon’i Mosesy hoe Josoa.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Nandefa azy ireo hisafo ny tany Kanana i Mosesy ka niteny taminy hoe: Miakara mandalo eto amin’ny Negeva, ary avy eo, miakara any amin’ny tany be havoana; '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'dia zahao izay toetry ny tany sy izay olona monina any, na mahery izy na osa, na vitsy izy na maro; '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'jereo izay toetry ny tany itoerany, na tsara na ratsy; ary ny toetry ny tanàna izay itoerany, na an-day izany na an-tanàna mimanda; '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Maniraha lehilahy vitsivitsy hisafo ny tany Kanana izay omeko ho an’ny Zanak’Israely. Lehilahy iray avy amin’ny fokony avy no hirahinareo, koa izay samy lehiben’ny fokony avy. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: fantaro ny toetry ny tany, na lonaka, na ngazana, na misy hazo eo na tsia; dia mahereza ianareo ka mitondrà avy amin’ny vokatry ny tany. Fa fotoana fahamasahan’ny voaloboka mialin-taona tamin’izany.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Dia niakatra ireo ka nisafo ny tany hatramin’ny tany efitra Zina ka hatrany Rehoba, any akaikin’i Hamata. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Niakatra nandalo ny Negeva izy ireo ka nankany Hebrona izay nisy an’i Ahimana sy i Sesay ary i Talmay, taranaky ny Anakita. I Hebrona dia voaorina fito taona talohan’i Zoana any Ejipta. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Dia tonga hatrany amin’ny lohasaha Eskola izy ireo ka tany no nanapaka sampam-boaloboka izay nisy sampahony iray ihany, ary nolanjain’ny roalahy tamin’ny bao izany; nitondrany mody koa ny ampongabendanitra sy ny aviavy. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Ary izany toerana izany dia nataony hoe Ny Lohasaha Eskola
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Eskola: Sampaho.'
      marker-yv: yv-n
    - type: text
      text: ', noho ny sampahom-boaloboka izay notapahin’ny Zanak’Israely tao.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Manao tatitra ireo mpisafo tany
    marker-yv: yv-h
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Rehefa afaka efapolo andro dia niverina avy nisafo ny tany izy ireo. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Dia nandeha izy ireo nankeo amin’i Mosesy sy i Arona ary ny fiangonana, dia ny Zanak’Israely manontolo, tany an-tany efitra Parana, tany Kadesy, ka nitondra teny taminy sy tamin’ny fiangonana manontolo sady naneho azy ny vokatry ny tany. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Nitantara taminy izy ireo hoe: Tonga tany amin’ny tany izay nanirahanao anay izahay. Tena tondra-dronono sy tantely tokoa izany, ary itony no vokatra avy tany. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Kanefa kosa mahery ny olona izay monina eo amin’ny tany, ary ny tanàna dia mimanda sady lehibe dia lehibe; ary hitanay tany koa aza ireo taranaky ny Anakita. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Ny Amalekita no monina any amin’ny Negeva; ny Hetita sy ny Jebosita ary ny Amorita no monina any amin’ny tany be havoana; ny Kananita no monina any amoron’ny ranomasina sy any amoron’i Jordana.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Ary nandefa azy ireo avy tao an-tany efitra Parana i Mosesy, araka ny didin’NY TOMPO; ary samy lehiben’ny Zanak’Israely ireo lehilahy rehetra ireo.
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Fa nampangina ny olona teo anatrehan’i Mosesy i Kaleba ka niteny hoe: Tsy maintsy miakatra isika ka handray ny tany fa tsy maintsy ho resintsika izy!'
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Fa hoy kosa ireo lehilahy izay niara-niakatra taminy: Tsy afa-miakatra handresy ireo olona ireo isika satria mahery noho isika izy. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Dia nilaza ratsy ny tany izay nosafoiny tamin’ny Zanak’Israely izy ireo ka niteny hoe: Ny tany izay nalehanay mba hosafoina dia tany mihinana izay monina ao ary ny olona rehetra izay hitanay tao dia olona vaventy be; '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: hitanay tany koa ny Nefilima izay taranaky ny Anakita avy amin’ny Nefilima; teo imasonay izahay dia nahatsiaro ho tahaka ny tsingetana; toy izany koa izahay teo imasony!
  '4':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ireto ny anarany:'
  - type: usfm
    marker: p
    children:
    - type: text
      text: Avy tamin’ny fokon’i Robena, i Samoa, zanak’i Zakora;
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: avy tamin’ny fokon’i Simeona, i Safata, zanak’i Hory;
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: avy tamin’ny fokon’i Joda, i Kaleba, zanak’i Jefone;
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: avy tamin’ny fokon’i Isakara, i Jigala, zanak’i Josefa;
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: avy tamin’ny fokon’i Efraima, i Hosea, zanak’i Nona;
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: avy tamin’ny fokon’i Benjamina, i Palty, zanak’i Rafo;
