document_id: EST.2
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Tonga mpanjakavavy i Estera
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Rehefa afaka izany ka efa nionona ny fahatezeran’i Ahasoerosy mpanjaka dia nahatsiaro an’i Vasty sy izay efa nataony izy ary ny efa nitsarana azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Hoy ireo zatovon’ny mpanjaka izay nanompo azy: Aoka hitadiavana zazavavy virijiny tsara tarehy ny mpanjaka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Aoka ny mpanjaka hanendry olona any amin’ny fari-piadidiana rehetra manerana ny fanjakany; dia aoka ireny hamory ny zazavavy virijiny tsara tarehy rehetra ho eto Sosana, tanàna mimanda, ho ao amin’ny tranom-behivavy izay eo ambany fifehezan’i Hegay, ionòkan’ny mpanjaka sady mpiambina ny vehivavy; ary aoka homena azy ireo izay rehetra ilainy momba ny fihaingoany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Koa izay zazavavy sitraky ny mpanjaka no aoka hanjaka hisolo an’i Vasty. Dia sitraky ny mpanjaka izany teny izany ka notanterahiny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary nisy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jiosy
  - type: text
    text: ' iray tany Sosana, tanàna mimanda, Mordekay no anarany, zanak’i Jaira, zanak’i Simey, zanak’i Kisy, avy amin’ny taranak’i Benjamina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Izy io dia babo avy tany Jerosalema niaraka tamin’ireo babo izay noentina niaraka tamin’i Jekonia, mpanjakan’i Joda, izay nobaboin’i Nebokadnezara, mpanjakan’i Babilona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Izy no nitaiza an’i Hadasa, na i Estera, zanakavavin’ny rahalahin-drainy. Tsy nanana ray sy reny intsony io zazavavy io; ary soa sady tsara tarehy izy. Rehefa maty ny rainy sy ny reniny dia noraisin’i Mordekay ho zanany izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Nony re ary ny tenin’ny mpanjaka sy ny lalànany ka voavory tany Sosana, tanàna mimanda, ny zazavavy maro ho ao ambany fifehezan’i Hegay, dia mba noentina ho ao amin’ny tranon’ny mpanjaka koa i Estera, ho ao ambany fifehezan’i Hegay, mpiambina ny vehivavy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Nahafaly azy Razazavavy ka nahita fitia teo imasony. Nomeny haingana an-dRazazavavy ny zavatra rehetra nilainy ho fihaingoana sy ny anjara haniny ary mpanompovavy fito izay voafantina homena azy avy tao amin’ny tranon’ny mpanjaka; ary nafindrany ho ao amin’ny toerana tsara indrindra ao amin’ny tranom-behivavy izy sy ny mpanompovaviny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Tsy mbola nilaza ny fireneny na ny fianakaviany anefa i Estera satria namepetra azy i Mordekay mba tsy hilaza izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Nitsangantsangana isanandro teo anoloan’ny kianjan’ny tranom-behivavy i Mordekay mba hahafantarany izay momba an’i Estera sy izay manjo azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Dia tonga ny fotoana hidiran’ny tovovavy tsirairay tany amin’i Ahasoerosy mpanjaka rehefa tapitra ny roa amby folo volana voatendrin’ny lalàna ho amin’ny fomba fiomanan’ny vehivavy ka tapitra tamin’izay ny fotoana hihaingoany: Enim-bolana tamin’ny diloilo nisy miora ary enim-bolana tamin’ny zavamanitra sy ny zavatra hafa fihaingoan’ny vehivavy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Koa rehefa hiditra ho ao amin’ny mpanjaka ny zatovovavy tamin’izany dia nomena azy izay rehetra nilainy ka noentiny avy tao amin’ny tranom-behivavy ho ao amin’ny tranon’ny mpanjaka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Tamin’ny hariva izy no niditra ary nony maraina izy dia niverina ho ao amin’ny trano faharoa nitoeran’ny vehivavy, izay ambany fifehezan’i Sasegaza, ionòkan’ny mpanjaka, mpiambina ny vady tsindrano. Tsy mba niverina tao amin’ny mpanjaka intsony izy raha tsy sitrapon’ny mpanjaka ka voatonona ny anarany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Rehefa tonga ny fotoana hidiran’i Estera ao amin’ny mpanjaka, dia i Estera, ilay zanakavavin’i Abihaila rahalahin-drain’i Mordekay izay nandray azy ho zanany vavy, dia tsy nila na inona na inona izy ankoatra izay notononin’i Hegay, tandapan’ny mpanjaka sady mpitandrina ny vehivavy. Ary nahita fitia teo imason’ny olona rehetra izay nijery azy i Estera. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Dia noentina ho ao amin’i Ahasoerosy mpanjaka i Estera, ho ao amin’ny tranon’ny fanjakana, tamin’ny volana fahafolo na ny volana Tebeta, tamin’ny taona fahafito nanjakany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Tian’ny mpanjaka mihoatra noho ny vehivavy hafa rehetra i Estera ka nahita fitia sy sitraka teo imasony mihoatra noho ny virijiny hafa rehetra. Nosatrohany ny satroboninahitry ny fanjakana izy ka nampanjakainy hisolo an’i Vasty. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary nanao fanasana lehibe ho an’ny mpitondra sy mpanompony rehetra ny mpanjaka; fanasan’i Estera izany. Nanendry andro fitsaharana ho an’ny fari-piadidiana rehetra ao amin’ny fanjakana izy sady nanome fanomezana araka ny fanomen’ny mpanjaka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Rehefa novorina fanindroany ireo virijiny dia nipetraka teo am-bavahadin’ny mpanjaka i Mordekay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Tsy mbola nilaza izay fianakaviany na izay fireneny anefa i Estera, araka ilay nameperan’i Mordekay azy ihany. Fa ny tenin’i Mordekay dia nankatoavin’i Estera tahaka ny fony izy mbola nitaiza azy ihany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Saron’i Mordekay ny teti-dratsy hamonoana ny mpanjaka
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Tamin’izany andro izany, raha nipetraka teo am-bavahadin’ny mpanjaka i Mordekay, dia tezitra i Bigtana sy i Taresy, roa lahy tamin’ireo ionòkan’ny mpanjaka sady mpiambina teo am-baravarana, ka nitady hamono an’i Ahasoerosy mpanjaka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Tonga fantatr’i Mordekay izany ka nambarany tamin’i Estera, vadin’ny mpanjaka. Dia nambaran’i Estera tamin’ny mpanjaka, tamin’ny anaran’i Mordekay izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Rehefa nohadihadiana izany zavatra izany dia hita fa marina ka nahantona tamin’ny hazo izy roa lahy. Nosoratana tao amin’ny bokin’ny tantara teo anatrehan’ny mpanjaka izany.
