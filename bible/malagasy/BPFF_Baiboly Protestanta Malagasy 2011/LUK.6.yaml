document_id: LUK.6,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nanotazan’ny mpianatra salohim-bary
  - type: heading
    content: Mat 12.1-8; Mar 2.23-28
  - type: text
    content: 'Indray '
  - type: text
    content: Sabata
  - type: text
    content: ' dia nandeha namakivaky tanimbary iray Jesosy; ary nanoty salohim-bary ny mpianany, koa rehefa nokosokosohiny tamin’ny tanany dia nohaniny. '
  '10':
  - type: text
    content: 'Ary nijery ireo rehetra nanodidina azy Izy dia niteny tamin-dRalehilahy hoe: Atsory ny tananao. Dia nataony izany ka sitrana ny tanany. '
  '11':
  - type: text
    content: Dia feno hatezerana izy ireo ka nifampidinika ny amin’izay hataony amin’i Jesosy.
  - type: heading
    content: Ny nifidianan’i Jesosy ny Apostoly roa amby folo lahy
  - type: heading
    content: Mat 10.1-4; Mar 3.13-19; Asa 1.13
  '12':
  - type: text
    content: 'Tamin’izany andro izany dia lasa nankany an-tendrombohitra Jesosy mba hivavaka; ary naharitra nivavaka tamin’Andriamanitra nandritra ny alina Izy. '
  '13':
  - type: text
    content: 'Nony maraina ny andro dia nantsoiny hanatona Azy ny mpianany, ka nifidianany roa amby folo lahy, izay nataony hoe Apostoly, '
  '14':
  - type: text
    content: 'dia i Simona izay nataony hoe Petera, i Andrea rahalahiny, i Jakoba, i Jaona, i Filipo, i Bartolomeo, '
  '15':
  - type: text
    content: 'i Matio, i Tomasy, i Jakoba zanak’i Alfeo, i Simona izay atao hoe '
  - type: text
    content: Zelota
  - type: text
    content: ', '
  '16':
  - type: text
    content: i Jodasy zanak’i Jakoba ary i Jodasy iskariota, ilay tonga mpamadika.
  - type: heading
    content: Nampianatra ny vahoaka sy nanasitrana ny marary Jesosy
  - type: heading
    content: Mat 4.24-25; Mar 3.7-13
  '17':
  - type: text
    content: 'Niara-nidina tamin’izy ireo Jesosy, dia nijanona teo amin’ny tany marin-tampona iray Izy sy ny mpianany maro mbamin’ny vahoaka betsaka avy tany '
  - type: text
    content: Jodia
  - type: text
    content: ' manontolo sy Jerosalema, ary avy tany amoron-dranomasina any Tiro sy Sidona, izay tonga mba hihaino Azy sy hositranina amin’ny aretiny; '
  '18':
  - type: text
    content: 'ary izay nampahorin’ny fanahy maloto dia nositranina. '
  '19':
  - type: text
    content: Nitady hikasika Azy ny vahoaka rehetra satria nisy hery niala Taminy ka nahasitrana azy rehetra.
  - type: heading
    content: Fahasambarana sy loza
  - type: heading
    content: Mat 5.2-12
  '2':
  - type: text
    content: 'Fa ny '
  - type: text
    content: Fariseo
  - type: text
    content: ' sasany dia niteny hoe: Nahoana ianareo no manao izay tsy azo atao amin’ny Sabata? '
  '20':
  - type: text
    content: 'Ary nanopy ny masony tamin’ny mpianany Jesosy ka nilaza hoe:'
  - type: text
    content: Sambatra ianareo mahantra,
  - type: text
    content: fa anareo ny fanjakan’Andriamanitra.
  '21':
  - type: text
    content: Sambatra ianareo noana ankehitriny,
  - type: text
    content: fa hovokisana ianareo.
  - type: text
    content: Sambatra ianareo mitomany ankehitriny,
  - type: text
    content: fa hihomehy ianareo.
  '22':
  - type: text
    content: 'Sambatra ianareo, raha halan’ny olona ka ariany sy haratsiny, ary laviny toy ny zava-dratsy ny anaranareo, noho ny amin’ny '
  - type: text
    content: Zanak’Olona
  - type: text
    content: .
  '23':
  - type: text
    content: Mifalia ianareo amin’izany andro izany ka mibitaha; fa indro, lehibe ny valim-pitianareo any an-danitra; fa izany no nataon’ny razany tamin’ny mpaminany.
  '24':
  - type: text
    content: Lozanareo izay manankarena kosa!
  - type: text
    content: Fa efa azonareo izay naha afa-po anareo.
  '25':
  - type: text
    content: Lozanareo izay voky ankehitriny!
  - type: text
    content: Fa mbola ho noana ianareo.
  - type: text
    content: Lozanareo izay mihomehy ankehitriny!
  - type: text
    content: Fa mbola ho ory sy hitomany ianareo.
  '26':
  - type: text
    content: Lozanareo, raha milaza soa anareo ny olona rehetra!
  - type: text
    content: Fa izany no nataon’ny razany tamin’ny mpaminany sandoka.
  - type: heading
    content: Ny fitiavana ny fahavalo
  - type: heading
    content: Mat 5.38-48
  '27':
  - type: text
    content: 'Kanefa hoy Aho aminareo izay mihaino: Tiava ny fahavalonareo; manaova soa amin’izay mankahala anareo; '
  '28':
  - type: text
    content: 'misaora izay manozona anareo; ary mivavaha ho an’izay manisy ratsy anareo. '
  '29':
  - type: text
    content: Raha misy mamely ny takolakao iray dia atolory azy koa ny iray; ary raha misy maka ny lambanao, aza lavinao na dia ny akanjonao aza.
  '3':
  - type: text
    content: 'Ary Jesosy namaly azy hoe: Tsy mbola novakinareo va ny teny milaza ilay nataon’i Davida, raha noana izy mbamin’izay niaraka taminy, '
  '30':
  - type: text
    content: Omeo izay rehetra mangataka aminao; ary raha misy maka izay anao dia aza mitaky izany aminy.
  '31':
  - type: text
    content: 'Ary araka izay tianareo hataon’ny olona aminareo no mba ataovy aminy kosa. '
  '32':
  - type: text
    content: 'Fa raha izay tia anareo ihany no tianareo, inona moa no fankasitrahana ho azonareo? Fa na dia ny mpanota koa aza mba tia izay tia azy. '
  '33':
  - type: text
    content: 'Raha izay manisy soa anareo ihany no asianareo soa, inona moa no fankasitrahana ho azonareo? Fa na dia ny mpanota aza mba manao toy izany koa. '
  '34':
  - type: text
    content: 'Raha mampisambotra amin’izay olona antenainareo fa mbola hanonitra ianareo, inona moa no fankasitrahana ho azonareo? Fa na dia ny mpanota aza mba mampisambotra amin’ny mpanota, handraisany toraka izany indray. '
  '35':
  - type: text
    content: Koa tiava ny fahavalonareo ary manaova soa, dia mampisambora ka aza manantena valiny, dia ho lehibe ny valim-pitianareo ary ho zanaky ny Avo Indrindra ianareo; fa Izy mora fanahy amin’izay tsy misaotra sy ny ratsy fanahy.
  '36':
  - type: text
    content: Aoka ho mpamindra fo ianareo tahaka ny Rainareo izay Mpamindra fo.
  - type: heading
    content: Ny sombin-kazo sy ny andry
  - type: heading
    content: Mat 7.1-5
  '37':
  - type: text
    content: 'Aza mitsara dia tsy hotsaraina ianareo; aza manameloka dia tsy hohelohina ianareo; mamelà dia mba havela ianareo; '
  '38':
  - type: text
    content: omeo dia mba homena ianareo; fatra tsara sady ahintsana no afatratra ka mihoatra no homeny ho eo ampofoanareo. Fa izay fatra amaranareo no hamarana ho anareo kosa.
  '39':
  - type: text
    content: 'Nilaza fanoharana taminy koa Jesosy hoe: Ny jamba va mahatari-dalana ny jamba? Tsy hianjera any an-kady va izy roa? '
  '4':
  - type: text
    content: 'fa niditra tao amin’ny tranon’Andriamanitra izy dia nandray ny mofo atao fanatitra ka nihinana sady nanome ho an’izay nanaraka azy koa, nefa mahadiso raha misy mihinana izany, afa-tsy ny mpisorona ihany? '
  '40':
  - type: text
    content: Tsy mihoatra noho ny mpampianatra ny mpianatra; fa izay rehetra tsara fiofanana dia ho tahaka ny mpampianatra azy ihany.
  '41':
  - type: text
    content: 'Nahoana ianao no mijery ny sombin-kazo izay eo amin’ny mason’ny rahalahinao, nefa ny andry izay eo amin’ny masonao dia tsy mba tsaroanao akory? '
  '42':
  - type: text
    content: 'Ary ahoana no ilazanao amin’ny rahalahinao hoe: Ry rahalahy, aoka hesoriko ny sombin-kazo eo amin’ny masonao, nefa tsy mba hitanao ny andry eo amin’ny masonao? Ry mpihatsaravelatsihy, esory aloha ny andry eo amin’ny masonao, ary amin’izany dia ho hitanao tsara ny hanesoranao ny sombin-kazo eo amin’ny mason’ny rahalahinao.'
  - type: heading
    content: Ny hazo sy ny voany
  - type: heading
    content: Mat 7.16-20; 12.33-35
  '43':
  - type: text
    content: 'Fa tsy misy hazo tsara mamoa voa ratsy na hazo ratsy mamoa voa tsara. '
  '44':
  - type: text
    content: 'Fa samy fantatra amin’ny voany avy ny hazo rehetra; tsy misy mioty aviavy amin’ny tsilo na voaloboka amin’ny voaroy. '
  '45':
  - type: text
    content: Ny olona tsara fanahy dia mamoaka ny tsara avy amin’ny rakitra tsaran’ny fony; ary ny ratsy fanahy kosa dia mamoaka ny ratsy; fa avy amin’ny haben’ny ao am-po no itenenan’ny vavany.
  - type: heading
    content: Ireo trano roa samihafa
  - type: heading
    content: Mat 7.24-27
  '46':
  - type: text
    content: 'Ary nahoana ianareo no miantso Ahy hoe: Tompoko! Tompoko! Nefa tsy manatanteraka izay lazaiko?'
  '47':
  - type: text
    content: 'Izay rehetra manatona Ahy sy mandre ny teniko ka mankatò azy dia hasehoko aminareo izay tahaka azy: '
  '48':
  - type: text
    content: 'Tahaka ny olona nanorina trano izy, izay nihady lalina ary nanisy fanorenana teo ambonin’ny vatolampy; koa nony tondraka ny rano dia namely mafy izany trano izany ny riaka, nefa tsy nahahozongozona azy satria tsara fanorenana izy. '
  '49':
  - type: text
    content: Fa izay mandre, nefa tsy mankatò, dia tahaka ny olona izay nanorina trano teo ambonin’ny tany, fa tsy nanisy fanorenana; dia namely azy mafy ny riaka ka nirodana niaraka tamin’izay izy; ary loza ny faharavan’izany trano izany.
  '5':
  - type: text
    content: 'Ary hoy Izy taminy: Tompon’ny Sabata ny '
  - type: text
    content: Zanak’Olona
  - type: text
    content: .
  - type: heading
    content: Ilay lehilahy maty tanana
  - type: heading
    content: Mat 12.9-14; Mar 3.1-6
  '6':
  - type: text
    content: 'Nony tamin’ny '
  - type: text
    content: Sabata
  - type: text
    content: ' hafa koa dia niditra tao amin’ny '
  - type: text
    content: sinagoga
  - type: text
    content: ' Jesosy ka nampianatra; ary nisy lehilahy iray maty tanana havanana tao. '
  '7':
  - type: text
    content: 'Ary ny mpanoradalàna sy ny '
  - type: text
    content: Fariseo
  - type: text
    content: ' dia nanara-maso Azy, na hanasitrana amin’ny Sabata Izy na tsia, mba hahitany izay hiampangana Azy. '
  '8':
  - type: text
    content: 'Nahalala ny hevitr’ireo Jesosy dia niteny tamin-dRalehilahy maty tanana hoe: Mitsangàna ka mijoroa etsy afovoany. Dia nitsangana izy ka nijoro. '
  '9':
  - type: text
    content: 'Ary hoy Jesosy tamin’ireo: Manontany anareo Aho: Moa ny manao soa va no mety hatao amin’ny Sabata sa ny manao ratsy? Ny mamonjy aina va sa ny mamono? '
