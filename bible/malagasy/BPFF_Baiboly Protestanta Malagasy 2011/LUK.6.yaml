  - type: text
    text: Fa izay mandre, nefa tsy mankatò, dia tahaka ny olona izay nanorina trano teo ambonin’ny tany, fa tsy nanisy fanorenana; dia namely azy mafy ny riaka ka nirodana niaraka tamin’izay izy; ary loza ny faharavan’izany trano izany.
