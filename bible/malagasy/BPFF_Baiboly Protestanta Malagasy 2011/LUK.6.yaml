  - type: text
    text: 'Tahaka ny olona nanorina trano izy, izay nihady lalina ary nanisy fanorenana teo ambonin’ny vatolampy; koa nony tondraka ny rano dia namely mafy izany trano izany ny riaka, nefa tsy nahahozongozona azy satria tsara fanorenana izy. '
