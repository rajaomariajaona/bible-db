document_id: LUK.6
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nanotazan’ny mpianatra salohim-bary
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat 12.1-8; Mar 2.23-28
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Indray '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Sabata
  - type: text
    text: ' dia nandeha namakivaky tanimbary iray Jesosy; ary nanoty salohim-bary ny mpianany, koa rehefa nokosokosohiny tamin’ny tanany dia nohaniny. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Fa ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Fariseo
  - type: text
    text: ' sasany dia niteny hoe: Nahoana ianareo no manao izay tsy azo atao amin’ny Sabata? '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary Jesosy namaly azy hoe: Tsy mbola novakinareo va ny teny milaza ilay nataon’i Davida, raha noana izy mbamin’izay niaraka taminy, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'fa niditra tao amin’ny tranon’Andriamanitra izy dia nandray ny mofo atao fanatitra ka nihinana sady nanome ho an’izay nanaraka azy koa, nefa mahadiso raha misy mihinana izany, afa-tsy ny mpisorona ihany? '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary hoy Izy taminy: Tompon’ny Sabata ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Zanak’Olona
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ilay lehilahy maty tanana
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat 12.9-14; Mar 3.1-6
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Nony tamin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Sabata
  - type: text
    text: ' hafa koa dia niditra tao amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sinagoga
  - type: text
    text: ' Jesosy ka nampianatra; ary nisy lehilahy iray maty tanana havanana tao. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary ny mpanoradalàna sy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Fariseo
  - type: text
    text: ' dia nanara-maso Azy, na hanasitrana amin’ny Sabata Izy na tsia, mba hahitany izay hiampangana Azy. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Nahalala ny hevitr’ireo Jesosy dia niteny tamin-dRalehilahy maty tanana hoe: Mitsangàna ka mijoroa etsy afovoany. Dia nitsangana izy ka nijoro. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary hoy Jesosy tamin’ireo: Manontany anareo Aho: Moa ny manao soa va no mety hatao amin’ny Sabata sa ny manao ratsy? Ny mamonjy aina va sa ny mamono? '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary nijery ireo rehetra nanodidina azy Izy dia niteny tamin-dRalehilahy hoe: Atsory ny tananao. Dia nataony izany ka sitrana ny tanany. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Dia feno hatezerana izy ireo ka nifampidinika ny amin’izay hataony amin’i Jesosy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nifidianan’i Jesosy ny Apostoly roa amby folo lahy
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat 10.1-4; Mar 3.13-19; Asa 1.13
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Tamin’izany andro izany dia lasa nankany an-tendrombohitra Jesosy mba hivavaka; ary naharitra nivavaka tamin’Andriamanitra nandritra ny alina Izy. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Nony maraina ny andro dia nantsoiny hanatona Azy ny mpianany, ka nifidianany roa amby folo lahy, izay nataony hoe Apostoly, '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'dia i Simona izay nataony hoe Petera, i Andrea rahalahiny, i Jakoba, i Jaona, i Filipo, i Bartolomeo, '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'i Matio, i Tomasy, i Jakoba zanak’i Alfeo, i Simona izay atao hoe '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Zelota
  - type: text
    text: ', '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: i Jodasy zanak’i Jakoba ary i Jodasy iskariota, ilay tonga mpamadika.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nampianatra ny vahoaka sy nanasitrana ny marary Jesosy
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat 4.24-25; Mar 3.7-13
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Niara-nidina tamin’izy ireo Jesosy, dia nijanona teo amin’ny tany marin-tampona iray Izy sy ny mpianany maro mbamin’ny vahoaka betsaka avy tany '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jodia
  - type: text
    text: ' manontolo sy Jerosalema, ary avy tany amoron-dranomasina any Tiro sy Sidona, izay tonga mba hihaino Azy sy hositranina amin’ny aretiny; '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'ary izay nampahorin’ny fanahy maloto dia nositranina. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Nitady hikasika Azy ny vahoaka rehetra satria nisy hery niala Taminy ka nahasitrana azy rehetra.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fahasambarana sy loza
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat 5.2-12
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary nanopy ny masony tamin’ny mpianany Jesosy ka nilaza hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sambatra ianareo mahantra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa anareo ny fanjakan’Andriamanitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Sambatra ianareo noana ankehitriny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa hovokisana ianareo.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sambatra ianareo mitomany ankehitriny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa hihomehy ianareo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Sambatra ianareo, raha halan’ny olona ka ariany sy haratsiny, ary laviny toy ny zava-dratsy ny anaranareo, noho ny amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Zanak’Olona
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Mifalia ianareo amin’izany andro izany ka mibitaha; fa indro, lehibe ny valim-pitianareo any an-danitra; fa izany no nataon’ny razany tamin’ny mpaminany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Lozanareo izay manankarena kosa!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa efa azonareo izay naha afa-po anareo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Lozanareo izay voky ankehitriny!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa mbola ho noana ianareo.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Lozanareo izay mihomehy ankehitriny!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa mbola ho ory sy hitomany ianareo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Lozanareo, raha milaza soa anareo ny olona rehetra!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa izany no nataon’ny razany tamin’ny mpaminany sandoka.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fitiavana ny fahavalo
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat 5.38-48
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Kanefa hoy Aho aminareo izay mihaino: Tiava ny fahavalonareo; manaova soa amin’izay mankahala anareo; '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'misaora izay manozona anareo; ary mivavaha ho an’izay manisy ratsy anareo. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Raha misy mamely ny takolakao iray dia atolory azy koa ny iray; ary raha misy maka ny lambanao, aza lavinao na dia ny akanjonao aza.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Omeo izay rehetra mangataka aminao; ary raha misy maka izay anao dia aza mitaky izany aminy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ary araka izay tianareo hataon’ny olona aminareo no mba ataovy aminy kosa. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Fa raha izay tia anareo ihany no tianareo, inona moa no fankasitrahana ho azonareo? Fa na dia ny mpanota koa aza mba tia izay tia azy. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Raha izay manisy soa anareo ihany no asianareo soa, inona moa no fankasitrahana ho azonareo? Fa na dia ny mpanota aza mba manao toy izany koa. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Raha mampisambotra amin’izay olona antenainareo fa mbola hanonitra ianareo, inona moa no fankasitrahana ho azonareo? Fa na dia ny mpanota aza mba mampisambotra amin’ny mpanota, handraisany toraka izany indray. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Koa tiava ny fahavalonareo ary manaova soa, dia mampisambora ka aza manantena valiny, dia ho lehibe ny valim-pitianareo ary ho zanaky ny Avo Indrindra ianareo; fa Izy mora fanahy amin’izay tsy misaotra sy ny ratsy fanahy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Aoka ho mpamindra fo ianareo tahaka ny Rainareo izay Mpamindra fo.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny sombin-kazo sy ny andry
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat 7.1-5
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Aza mitsara dia tsy hotsaraina ianareo; aza manameloka dia tsy hohelohina ianareo; mamelà dia mba havela ianareo; '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: omeo dia mba homena ianareo; fatra tsara sady ahintsana no afatratra ka mihoatra no homeny ho eo ampofoanareo. Fa izay fatra amaranareo no hamarana ho anareo kosa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Nilaza fanoharana taminy koa Jesosy hoe: Ny jamba va mahatari-dalana ny jamba? Tsy hianjera any an-kady va izy roa? '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Tsy mihoatra noho ny mpampianatra ny mpianatra; fa izay rehetra tsara fiofanana dia ho tahaka ny mpampianatra azy ihany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Nahoana ianao no mijery ny sombin-kazo izay eo amin’ny mason’ny rahalahinao, nefa ny andry izay eo amin’ny masonao dia tsy mba tsaroanao akory? '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Ary ahoana no ilazanao amin’ny rahalahinao hoe: Ry rahalahy, aoka hesoriko ny sombin-kazo eo amin’ny masonao, nefa tsy mba hitanao ny andry eo amin’ny masonao? Ry mpihatsaravelatsihy, esory aloha ny andry eo amin’ny masonao, ary amin’izany dia ho hitanao tsara ny hanesoranao ny sombin-kazo eo amin’ny mason’ny rahalahinao.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny hazo sy ny voany
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat 7.16-20; 12.33-35
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Fa tsy misy hazo tsara mamoa voa ratsy na hazo ratsy mamoa voa tsara. '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Fa samy fantatra amin’ny voany avy ny hazo rehetra; tsy misy mioty aviavy amin’ny tsilo na voaloboka amin’ny voaroy. '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: Ny olona tsara fanahy dia mamoaka ny tsara avy amin’ny rakitra tsaran’ny fony; ary ny ratsy fanahy kosa dia mamoaka ny ratsy; fa avy amin’ny haben’ny ao am-po no itenenan’ny vavany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ireo trano roa samihafa
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat 7.24-27
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Ary nahoana ianareo no miantso Ahy hoe: Tompoko! Tompoko! Nefa tsy manatanteraka izay lazaiko?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Izay rehetra manatona Ahy sy mandre ny teniko ka mankatò azy dia hasehoko aminareo izay tahaka azy: '
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
