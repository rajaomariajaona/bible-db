document_id: JER.29,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Taratasy nampitondrain’i Jeremia ho any amin’ny babo tany Babilona
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao no tao anatin’ny taratasy izay nampitondrain’i Jeremia mpaminany avy tany Jerosalema ho any amin’ny sisa amin’ny loholona voababo sy ho amin’ny mpisorona ary ny mpaminany sy ny vahoaka rehetra izay nobaboin’i Nebokadnezara ka noentiny avy tany Jerosalema ho any Babilona, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa izao no lazain’NY TOMPO: Rehefa tapitra ny fitopolo taona ny amin’i Babilona dia hamangy anareo Aho, fa hotanterahiko aminareo ny teny tsara nataoko ka hampodiko ho amin’ity tany ity ianareo. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa Izaho mahalala ny hevitra iheverako anareo, hoy NY TOMPO, dia hevitra hahatonga fiadanana fa tsy loza, mba hanome anareo fanantenana ny amin’ny ho avy. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hiantso Ahy ianareo ka handeha sy hivavaka Amiko dia hihaino anareo Aho. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hitady Ahy ianareo dia ho hitanareo Aho raha katsahinareo amin’ny fonareo manontolo. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Eny, ho hitanareo Aho, hoy NY TOMPO; ary hampodiko avy amin’ny fahababoana ianareo ka hangoniko avy any amin’ny firenena rehetra sy avy any amin’ny tany rehetra izay nandroahako anareo, hoy NY TOMPO, ary hampodiko ho any amin’ilay tany efa nanolorako anareo hobaboina.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy anefa ianareo: NY TOMPO nanangana mpaminany ho anay etỳ Babilona.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa izao no lazain’NY TOMPO ny amin’ny mpanjaka izay mipetraka eo amin’ny sezafiandrianan’i Davida sy ny amin’ny vahoaka rehetra izay monina amin’ity tanàna ity, dia ny rahalahinareo izay tsy mba lasan-ko babo niaraka taminareo; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'izao no lazain’Andriamanitra, Tompon’izao rehetra izao: Indro, hampameleziko azy ny sabatra sy ny mosary ary ny areti-mandringana ka hataoko toy ny aviavy tena ratsy izay tsy azo hanina noho ny haratsiny izy. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary henjehiko amin’ny sabatra sy ny mosary ary ny areti-mandringana izy ka hatolotro ho fampangovitana ny fanjakana rehetra ambonin’ny tany, ho fanozonana sy figagana sy zavatra mampisitrisitra sy fandatsa ho an’ny firenena izay nandroahako azy '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: noho ny tsy nihainoany ny teniko izay nampitondraiko ny mpaminany mpanompoko ho any aminy, eny, nifoha vao maraina Aho ka naniraka azy, nefa tsy nihaino ianareo, hoy NY TOMPO.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'rehefa lasa niala tany Jerosalema i Jekonia mpanjaka, ny reniny, ny tandapa, ny mpanapaka ny Joda sy Jerosalema mbamin’ny mpahay taozavatra sy ny mpanefy vy, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Koa mihainoa ny tenin’NY TOMPO, ianareo babo rehetra izay nesoriko tany Jerosalema ho atỳ Babilona.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao no lazain’Andriamanitra, Tompon’izao rehetra izao, Andriamanitry ny Israely, ny amin’i Ahaba, zanak’i Kolaia, sy ny amin’i Zedekia, zanak’i Mahaseia, izay maminany lainga aminareo amin’ny anarako: Indro, hatolotro eo an-tanan’i Nebokadnezara, mpanjakan’i Babilona, izy roa lahy dia hovonoiny eo imasonareo. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary izy roa lahy dia hataon’ny babo rehetra amin’ny Joda izay any Babilona ho fanozonana hoe: Hataon’NY TOMPO tahaka an’i Zedekia sy i Ahaba, izay nodoran’ny mpanjakan’i Babilona tamin’ny afo, anie ianao, '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: noho ny nanaovany izay fady indrindra tao amin’ny Israely dia ny nijangajangany tamin’ny vadin’ny namany sy ny nitenenany lainga tamin’ny anarako, dia izay teny tsy nandidiako azy; Izaho no mahalala, ary ho vavolombelon’izany Aho, hoy NY TOMPO.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Teny mamely an’i Semaia, mpaminany any am-pahababoana
    marker-yv: yv-h
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary i Semaia nehelamita dia hilazanao hoe: '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao no lazain’Andriamanitra, Tompon’izao rehetra izao, Andriamanitry ny Israely: Noho ny nampitondranao taratasy tamin’ny anaranao ho amin’ny vahoaka rehetra izay any Jerosalema sy amin’i Zefania mpisorona, zanak’i Mahaseia, ary amin’ny mpisorona rehetra hafa koa nilaza hoe: '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'NY TOMPO efa nanao anao ho mpisorona ho solon’i Joiada mpisorona, mba hanendry izay ho mpiandraikitra ny tranon’NY TOMPO, hisakana izay rehetra very saina sy manao azy ho mpaminany ka hasianao boloky hazo ny vozony sy ny tongony; '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia nahoana ianao no tsy nananatra mafy an’i Jeremia avy any Anatota, izay milaza azy ho mpaminany aminareo? '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa nandefa iraka ho aminay atỳ Babilona izy niteny hoe: Mbola haharitra ela izao, koa manaova trano ianareo dia mitoera aminy, ary manaova tanimboly ka hano ny vokatra aminy.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary namaky izany taratasy izany teo anatrehan’i Jeremia mpaminany i Zefania mpisorona. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia ilay teny nampitondrainy an’i Elasa, zanak’i Safana, sy i Gemaria, zanak’i Hilkia, izay nirahin’i Zedekia, mpanjakan’ny Joda, ho any Babilona, ho any amin’i Nebokadnezara, mpanjakan’i Babilona, nilaza hoe:'
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia tonga tamin’i Jeremia ny tenin’NY TOMPO hoe: '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mandefasa iraka ho any amin’ny babo rehetra ka lazao aminy hoe: Izao no lazain’NY TOMPO ny amin’i Semaia nehelamita: Noho ny naminanian’i Semaia taminareo, kanefa izy anie tsy nirahiko akory, fa dia nampitoky anareo tamin’ny lainga, '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia izao no lazain’NY TOMPO: Indro, efa hamaly an’i Semaia nehelamita sy ny taranany Aho: Tsy hanana zanakalahy honina amin’ity firenena ity izy sady tsy hahita ny soa izay hataoko amin’ny oloko, hoy NY TOMPO, satria fikomiana tamin’NY TOMPO no notorìny.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao no lazain’Andriamanitra, Tompon’izao rehetra izao, Andriamanitry ny Israely, amin’ny babo rehetra izay natolotro ho babo avy tany Jerosalema ho any Babilona: '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Manaova trano ianareo ka mitoera aminy; ary manaova tanimboly ka hano ny vokatra avy aminy. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Manambadia ka miteraha zazalahy sy zazavavy; analao vady ny zanakalahinareo, ary ampanambadio ny zanakavavinareo, mba hiterahany zazalahy sy zazavavy ka hihamaro anie ianareo, fa tsy hihavitsy. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Katsaho izay hiadanan’ny tanàna izay nampandehanako anareo ho babo, ary mivavaha amin’NY TOMPO ho azy; fa raha miadana izy, dia mba hiadana koa ianareo.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa izao no lazain’Andriamanitra, Tompon’izao rehetra izao, Andriamanitry ny Israely: Aza mety hofitahin’ny mpaminaninareo sy ny mpisikidinareo izay ao aminareo, ary aza mino ny nofinareo izay nofisinareo. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa lainga no faminaniany aminareo amin’ny anarako; tsy naniraka azy ireny Aho, hoy NY TOMPO. '
