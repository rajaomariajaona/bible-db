document_id: LEV.11,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny biby madio sy maloto
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ary hoy NY TOMPO tamin’i Mosesy sy i Arona: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'fa izay rehetra tsy misy vombony na kirany kosa, na ao anatin’ny ranomasina na ao anatin’ny ony na amin’izay rehetra mihetsiketsika ao anaty rano sy amin’izay zavamananaina ao anaty rano, dia ho fahavetavetana aminareo. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Eny, ho fahavetavetana aminareo ireny; tsy ho fihinanareo ny nofony ary hataonareo ho zava-betaveta ny fatiny. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Izay rehetra ao anaty rano ka tsy misy vombony na kirany dia ho zava-betaveta aminareo.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ary izao no ho zava-betaveta aminareo amin’ny vorona ka tsy ho fihinanareo: Ny vaotoro, ny voromahery sy ny ankoay, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'ny papango sy ny voromahery isan-karazany, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'ny goaika rehetra isan-karazany, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'ny aotirisy, ny tararaka, ny vorondriaka sy ny hitsikitsika isan-karazany, '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'ny vorondolo, ny manarana, ny vorondolo lehibe, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'ny ibisy sy ny sama, ny vaotoro madinika, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ny vano sy ny vanobe isan-karazany ary ny takodara sy ny ramanavy.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Mitenena amin’ny Zanak’Israely hoe: Ireto avy no azonareo hanina amin’ny biby rehetra ambonin’ny tany: '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Ny zava-mandady rehetra izay manana elatra sady mandia tongotra efatra dia ho zava-betaveta aminareo; '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'nefa kosa ho fihinanareo amin’ny zava-mandady manana elatra sady mandia tongotra efatra, izay manan-tongotra lava ambonin’ny faladiany hitsipihany eo amin’ny tany. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Amin’ireny dia ireto no ho fihinanareo: Ny valala sy ny sopanga isan-karazany. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Fa ny biby mandady hafa rehetra izay manana elatra sady mandia tongotra efatra ankoatra ireo kosa dia ho zava-betaveta aminareo.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fikasihana ireo zavatra mety mampaloto
    marker-yv: yv-h
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Ireo no ho zava-maloto aminareo; koa izay rehetra mikasika ny fatiny dia haloto mandra-paharivan’ny andro. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Hanasa ny fitafiany izay rehetra mitondra ny fatiny ka haloto mandra-paharivan’ny andro.
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Ny biby rehetra izay mivaky kitro nefa tsy misaraka tsara ny kitrony sady tsy mandinika dia ho zava-maloto aminareo; haloto izay rehetra mikasika azy. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Izay rehetra mandeha amin’ny faladiany, amin’ny biby rehetra izay mandia tongotra efatra, dia zava-maloto aminareo; haloto mandra-paharivan’ny andro izay rehetra mikasika ny fatiny. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Hanasa ny fitafiany izay mitondra ny fatiny ka haloto mandra-paharivan’ny andro; ho zava-maloto aminareo ireny. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Amin’ny biby izay mandady na mikisaka amin’ny tany kosa dia ireto no haloto aminareo: Ny jaboady, ny totozy ary ny androngo isan-karazany, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Izay biby rehetra mivaky kitro ka misaraka tsara ny kitrony sady mandinika no ho fihinanareo.
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'ny matahotrandro, ny sitry, ny tana, ary ny antsiantsy. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Ireo no maloto aminareo amin’ny biby rehetra izay mandady na mikisaka; izay rehetra mikasika ny fatin’ireo dia haloto mandra-paharivan’ny andro. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Izay zavatra rehetra ilatsahan’ny fatin’ireo, na fanaka hazo na fitafiana na hoditra na kitapo, izay mety ho fitaovana fampiasa, dia haloto ka tsy maintsy hatao anaty rano ary haloto mandra-paharivan’ny andro izy vao hadio. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Momba ny vilany tany rehetra izay ilatsahan’ny fatin’ireo dia haloto izay ao anatiny na inona na inona; koa hovakinareo ny vilany. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Ny hanina fihinana rehetra izay asiana rano dia haloto; ny fisotro rehetra izay sotroina koa dia haloto, na fitaovana inona na fitaovana inona no nisy azy. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Haloto izay zavatra rehetra ilatsahan’ny fatin’ireo, na fanendasana na vilany mirakotra, ka hopotipotehina; fa maloto ireny ary ho zava-maloto aminareo. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Kanefa ny loharano na ny lavaka famorian-drano izay misy rano dia hadio ihany; fa izay mikasika ny fatin-javatra eo no haloto. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Raha misy fatin’ireo latsaka amin’ny voan-javatra famafy, izay efa hafafy, dia hadio ihany izany. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: Fa raha misy voan-javatra nalona tamin’ny rano ka ilatsahan’ny fatiny dia ho zava-maloto aminareo izany.
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Raha misy maty izay biby fihinanareo dia haloto mandra-paharivan’ny andro izay mikasika ny fatiny. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Kanefa amin’izay mandinika sy mivaky kitro dia ireto kosa no tsy ho fihinanareo: Ny rameva, satria mandinika ihany izy nefa tsy mba mivaky kitro: Maloto aminareo izy; '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'Hanasa ny fitafiany izay mihinana amin’ny fatiny ka haloto mandra-paharivan’ny andro; ary izay mitondra ny fatiny dia hanasa ny fitafiany sady haloto mandra-paharivan’ny andro. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'Ny biby rehetra izay mandady na mikisaka amin’ny tany dia ho zava-betaveta aminareo ka tsy azo hanina. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'Izay rehetra mandady amin’ny kibony sy izay rehetra mandia tongotra efatra ary izay rehetra maro tongotra, izany hoe ny biby rehetra izay mandady na mikisaka amin’ny tany, dia tsy azo hanina fa zava-betaveta ireny. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'Aza mametaveta ny tenanareo amin’izay biby mandady na mikisaka; ary aza mandoto ny tenanareo aminy mba tsy hahaloto anareo. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: Fa Izaho no TOMPO Andriamanitrareo, koa manamasìna ny tenanareo dia ho masina ianareo satria masina Aho; ary aza mandoto ny tenanareo amin’izay zavatra mandady na mikisaka amin’ny tany.
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: 'Fa Izaho no TOMPO izay nitondra anareo niakatra avy tany amin’ny tany Ejipta mba ho Andriamanitrareo ka ho masina ianareo satria masina Aho. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: 'Izany no lalàna momba ny biby sy ny vorona, ny zavamananaina rehetra izay mihetsiketsika ao anaty rano ary ny zavamananaina rehetra izay mandady na mikisaka amin’ny tany, '
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: mba hanavahana ny maloto sy ny madio ary ny biby azo hanina sy tsy azo hanina.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'ny hiràka, satria mandinika ihany izy nefa tsy mba mivaky kitro: Maloto aminareo izy; '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'ny bitro, satria mandinika ihany izy nefa tsy mba mivaky kitro; maloto aminareo izy; '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'ny kisoa, satria mivaky kitro ihany izy sady misaraka tsara ny kitrony nefa tsy mba mandinika: Maloto aminareo izy. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Tsy ho fihinanareo ny henan’ireny ary tsy hokasihinareo akory ny fatiny: Zava-maloto aminareo ireny.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Amin’izay rehetra ao anatin’ny rano dia ireto no ho fihinanareo: Izay rehetra misy vombony sy kirany ao anaty rano, na ao anatin’ny ranomasina na ao anatin’ny ony, no ho fihinanareo; '
