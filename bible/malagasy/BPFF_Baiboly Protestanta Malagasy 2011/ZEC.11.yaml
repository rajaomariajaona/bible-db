document_id: ZEC.11
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Voarodana ireo firenen-dehibe matanjaka
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Vohay ny varavaranao, ry Libanona ô,
- type: usfm
  marker: q1
  children:
  - type: text
    text: handevonan’ny afo ny sederanao!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Midradradradrà, ry hazo kipreso,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa nianjera ny sedera!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, fongotra ireo avo be!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Midradradradrà, ianareo oaka any Basana
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ripaka ny ala mikirindro!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Injany ny fidradradradran’ny mpiandry ondry
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa rava ny voninahiny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Injany ny fieron’ny liona tanora
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa rava ny kirihitrala eny amoron’i Jordana.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny mpiandry tsara sy ny mpiandry adala
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Izao no lazain’NY TOMPO Andriamanitro: Andraso ny ondry izay entina hovonoina! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ireo mpividy azy dia mamono azy, nefa tsy mahatsiaro-tena ho meloka akory izy amin’izany; ary ny mpivarotra azy dia miteny hoe: Isaorana anie NY TOMPO fa manankarena aho! Ary ny mpiandry azy koa dia tsy miantra azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Fa tsy hiantra ny mponina amin’ny tany intsony Aho, hoy NY TOMPO. Fa indro, Izaho hanolotra ny olona samy ho eo an-tanan’ny namany avy ary samy ho eo an-tanan’ny mpanjakany avy; hanapotika ny tany ireo, nefa tsy mba hanafaka azy amin’ny tanany Aho.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dia niandry ny ondry izay noentina hovonoina, izay avy tamin’ny mpivarotra, aho. Ary naka tehina roa aho, ny iray dia nataoko hoe Fahasoavana ary ny iray kosa nataoko hoe Fikambanana. Dia nandrasako ny ondry. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary nandringana ny mpiandry ondry telo tamin’ny iray volana aho fa tsy nahatsindry fo taminy intsony sady tofoka ahy koa ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Dia hoy aho: Tsy hiandry anareo intsony aho! Izay ho faty dia aoka ho faty ary izay ho ringana dia aoka ho ringana ary ny sisa dia aoka samy hihinana ny nofon’ny namany avy! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary noraisiko ny tehiko Fahasoavana ka notapahiko mba hanafoanako ny fanekena izay efa nataoko tamin’ny firenena rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary tapaka tamin’izany andro izany iny, koa fantatry ny mpivarotra izay niambina ahy fa tenin’NY TOMPO izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Dia hoy aho taminy: Raha sitrakareo dia omeo ahy ny karamako; fa raha tsy izany dia ajanòny. Dia nolanjainy ny karamako ka sekela volafotsy telopolo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary hoy NY TOMPO tamiko: Atsipazo any amin’ny mpanefy tanimanga'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.13 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Mpanefy tanimanga. '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Mpitahiry vola. '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Izany dia tokony hilaza ny mpiasa iray tao amin’ny tempoly, izay nandrendrika ny volamena naterin’ny olona ho fonjam-bolamena.
    marker-yv: yv-n
  - type: text
    text: ' izany vola be nanombanany Ahy izany! Dia noraisiko ny sekela volafotsy telopolo ka natsipiko tany amin’ny mpanefy tanimanga tao amin’ny tranon’NY TOMPO. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Dia notapahiko koa ilay tehiko Fikambanana mba hanafoanako ny firahalahian’i Joda sy Israely.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary hoy NY TOMPO tamiko: Alao ho anao koa ny tehin’ny mpiandry ondry adala. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Fa indro, Izaho hanangana mpiandry amin’ny tany, izay tsy hikarakara ny naringana, na hitady ny niely, na hanasitrana ny maratra, na hiandry izay mbola matanjaka, fa hohaniny ny nofon’ny matavy sady helakelahiny ny kitrony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Lozan’ny mpiandry ondry tsy mahomby,
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay mandao ny ondry!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny sabatra no hamely ny sandriny
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny masony havanana!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Halazo tokoa ny sandriny
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ho pahina tokoa ny masony havanana!
