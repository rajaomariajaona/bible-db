document_id: ZEC.11,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Voarodana ireo firenen-dehibe matanjaka
  - type: text
    content: Vohay ny varavaranao, ry Libanona ô,
  - type: text
    content: handevonan’ny afo ny sederanao!
  '10':
  - type: text
    content: 'Ary noraisiko ny tehiko Fahasoavana ka notapahiko mba hanafoanako ny fanekena izay efa nataoko tamin’ny firenena rehetra. '
  '11':
  - type: text
    content: 'Ary tapaka tamin’izany andro izany iny, koa fantatry ny mpivarotra izay niambina ahy fa tenin’NY TOMPO izany. '
  '12':
  - type: text
    content: 'Dia hoy aho taminy: Raha sitrakareo dia omeo ahy ny karamako; fa raha tsy izany dia ajanòny. Dia nolanjainy ny karamako ka sekela volafotsy telopolo. '
  '13':
  - type: text
    content: 'Ary hoy NY TOMPO tamiko: Atsipazo any amin’ny mpanefy tanimanga'
  - type: note
    content: 'Heb. Mpanefy tanimanga. Na: Mpitahiry vola. Izany dia tokony hilaza ny mpiasa iray tao amin’ny tempoly, izay nandrendrika ny volamena naterin’ny olona ho fonjam-bolamena.'
  - type: text
    content: ' izany vola be nanombanany Ahy izany! Dia noraisiko ny sekela volafotsy telopolo ka natsipiko tany amin’ny mpanefy tanimanga tao amin’ny tranon’NY TOMPO. '
  '14':
  - type: text
    content: Dia notapahiko koa ilay tehiko Fikambanana mba hanafoanako ny firahalahian’i Joda sy Israely.
  '15':
  - type: text
    content: 'Ary hoy NY TOMPO tamiko: Alao ho anao koa ny tehin’ny mpiandry ondry adala. '
  '16':
  - type: text
    content: Fa indro, Izaho hanangana mpiandry amin’ny tany, izay tsy hikarakara ny naringana, na hitady ny niely, na hanasitrana ny maratra, na hiandry izay mbola matanjaka, fa hohaniny ny nofon’ny matavy sady helakelahiny ny kitrony.
  '17':
  - type: text
    content: Lozan’ny mpiandry ondry tsy mahomby,
  - type: text
    content: izay mandao ny ondry!
  - type: text
    content: Ny sabatra no hamely ny sandriny
  - type: text
    content: sy ny masony havanana!
  - type: text
    content: Halazo tokoa ny sandriny
  - type: text
    content: ary ho pahina tokoa ny masony havanana!
  '2':
  - type: text
    content: Midradradradrà, ry hazo kipreso,
  - type: text
    content: fa nianjera ny sedera!
  - type: text
    content: Eny, fongotra ireo avo be!
  - type: text
    content: Midradradradrà, ianareo oaka any Basana
  - type: text
    content: fa ripaka ny ala mikirindro!
  '3':
  - type: text
    content: Injany ny fidradradradran’ny mpiandry ondry
  - type: text
    content: fa rava ny voninahiny;
  - type: text
    content: Injany ny fieron’ny liona tanora
  - type: text
    content: fa rava ny kirihitrala eny amoron’i Jordana.
  - type: heading
    content: Ny mpiandry tsara sy ny mpiandry adala
  '4':
  - type: text
    content: 'Izao no lazain’NY TOMPO Andriamanitro: Andraso ny ondry izay entina hovonoina! '
  '5':
  - type: text
    content: 'Ireo mpividy azy dia mamono azy, nefa tsy mahatsiaro-tena ho meloka akory izy amin’izany; ary ny mpivarotra azy dia miteny hoe: Isaorana anie NY TOMPO fa manankarena aho! Ary ny mpiandry azy koa dia tsy miantra azy. '
  '6':
  - type: text
    content: Fa tsy hiantra ny mponina amin’ny tany intsony Aho, hoy NY TOMPO. Fa indro, Izaho hanolotra ny olona samy ho eo an-tanan’ny namany avy ary samy ho eo an-tanan’ny mpanjakany avy; hanapotika ny tany ireo, nefa tsy mba hanafaka azy amin’ny tanany Aho.
  '7':
  - type: text
    content: 'Dia niandry ny ondry izay noentina hovonoina, izay avy tamin’ny mpivarotra, aho. Ary naka tehina roa aho, ny iray dia nataoko hoe Fahasoavana ary ny iray kosa nataoko hoe Fikambanana. Dia nandrasako ny ondry. '
  '8':
  - type: text
    content: 'Ary nandringana ny mpiandry ondry telo tamin’ny iray volana aho fa tsy nahatsindry fo taminy intsony sady tofoka ahy koa ireo. '
  '9':
  - type: text
    content: 'Dia hoy aho: Tsy hiandry anareo intsony aho! Izay ho faty dia aoka ho faty ary izay ho ringana dia aoka ho ringana ary ny sisa dia aoka samy hihinana ny nofon’ny namany avy! '
