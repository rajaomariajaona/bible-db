document_id: JHN.1,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fiainana, ny fahazavana, ny Zanakalahitokana
  - type: text
    content: Tamin’ny voalohany ny Teny
  - type: text
    content: ary ny Teny dia tao amin’Andriamanitra;
  - type: text
    content: ary ny Teny dia Andriamanitra.
  '10':
  - type: text
    content: Teo amin’izao tontolo izao Izy,
  - type: text
    content: ary Izy no nanaovana izao tontolo izao,
  - type: text
    content: nefa izao tontolo izao dia tsy nahalala Azy.
  '11':
  - type: text
    content: Tonga tany amin’ny Azy Izy,
  - type: text
    content: fa ny Azy dia tsy nandray Azy;
  '12':
  - type: text
    content: fa izay rehetra nandray Azy
  - type: text
    content: dia nomeny hery
  - type: text
    content: ho tonga zanak’Andriamanitra,
  - type: text
    content: dia izay mino ny anarany,
  '13':
  - type: text
    content: dia ireo izay tsy nateraky ny ra na ny sitrapon’ny nofo na ny sitrapon’ny olona fa naterak’Andriamanitra.
  '14':
  - type: text
    content: Ary ny Teny dia tonga nofo
  - type: text
    content: ka nonina teto amintsika;
  - type: text
    content: ary hitanay ny voninahiny,
  - type: text
    content: dia voninahitra mendrika ho an’ny Lahitokana avy tamin’ny Ray
  - type: text
    content: sady feno fahasoavana sy fahamarinana.
  '15':
  - type: text
    content: 'Vavolombelona nanambara Azy i Jaona ka niantso hoe: Izy Ilay nolazaiko hoe: Izay avy ao aorianako dia efa tonga eo alohako satria talohako Izy.'
  '16':
  - type: text
    content: Fa tamin’ny fahafenoany
  - type: text
    content: no nandraisantsika rehetra,
  - type: text
    content: dia fahasoavana miampy fahasoavana;
  '17':
  - type: text
    content: 'fa ny lalàna dia nomena tamin’ny alalan’i Mosesy, fa ny fahasoavana sy ny fahamarinana kosa dia tonga tamin’ny alalan’i Jesosy '
  - type: text
    content: Kristy
  - type: text
    content: .
  '18':
  - type: text
    content: Tsy nisy nahita an’Andriamanitra na oviana na oviana; fa ny Zanaka Lahitokana, izay ao an-tratran’ny Ray, Izy no nanambara Azy.
  - type: heading
    content: Ny nanambaràn’i Jaona Mpanao batisa ny momba ny tenany
  - type: heading
    content: Ampit. Mat 3.1-6, 11-12; Mar 1.2-8; Lio 3.1-6, 15-18
  '19':
  - type: text
    content: 'Izao no fanambaràna nataon’i Jaona, raha naniraka mpisorona sy '
  - type: text
    content: levita
  - type: text
    content: ' avy tany Jerosalema hankany aminy ny '
  - type: text
    content: Jiosy
  - type: text
    content: ' mba hanontany azy hoe: Iza moa ianao? '
  '2':
  - type: text
    content: Izy dia tao amin’Andriamanitra tamin’ny voalohany.
  '20':
  - type: text
    content: 'Ary nilaza marina izy fa tsy nandà, ary hoy ny filazany: Tsy izaho no '
  - type: text
    content: Kristy
  - type: text
    content: '. '
  '21':
  - type: text
    content: 'Ary nanontany azy izy ireo hoe: Ahoana ary? I Elia va ianao? Dia hoy izy: Tsy izy aho. Ilay Mpaminany va ianao? Fa hoy izy hoe: Tsia. '
  '22':
  - type: text
    content: 'Dia hoy ireo taminy: Iza ary ianao mba hitondranay valiny ho any amin’izay naniraka anay? Lazainao ho iza moa ny tenanao? '
  '23':
  - type: text
    content: 'Dia hoy izy:'
  - type: text
    content: '«Izaho dia feon’ny miantso mafy any an-tany efitra hoe:'
  - type: text
    content: Ataovy mahitsy ny lalan’NY TOMPO» (Isa 40.3),
  - type: text
    content: araka izay nolazain’Isaia mpaminany
  - type: note
    content: 'Na: profeta.'
  - type: text
    content: .
  '24':
  - type: text
    content: 'Ary iraka avy tamin’ny '
  - type: text
    content: Fariseo
  - type: text
    content: ' ireo. '
  '25':
  - type: text
    content: 'Dia nanontany an’i Jaona indray ireo hoe: Nahoana ary ianao no manao batisa raha tsy ianao no Kristy na i Elia na ilay Mpaminany? '
  '26':
  - type: text
    content: 'Namaly azy ireo i Jaona hoe: Izaho dia manao batisa amin’ny rano; fa eto aminareo misy Iray izay tsy fantatrareo, '
  '27':
  - type: text
    content: dia ilay avy ao aorianako, ary tsy mendrika hamaha ny fehin-kapany akory aho.
  '28':
  - type: text
    content: Izany zavatra izany dia tany Betania any andafin’i Jordana, izay nanaovan’i Jaona batisa.
  - type: heading
    content: Ny nanambaràn’i Jaona Mpanao batisa an’i Jesosy
  - type: heading
    content: Ampit. Mat 3.13-17; Mar 1.9-11; Lio 3.21-22
  '29':
  - type: text
    content: 'Nony ampitso dia nahita an’i Jesosy avy manatona azy i Jaona ka hoy izy: Indro ny Zanak’ondrin’Andriamanitra izay manaisotra ny fahotan’izao tontolo izao! '
  '3':
  - type: text
    content: Izy no nahariana ny zavatra rehetra;
  - type: text
    content: ary raha tsy Izy dia tsy nisy nahariana izao zavatra ary izao na dia iray aza.
  '30':
  - type: text
    content: 'Izy ilay nolazaiko hoe: Misy Lehilahy tonga avy ao aorianako izay efa tonga eo alohako satria talohako Izy. '
  '31':
  - type: text
    content: Ary tsy nahalala Azy aho; fa mba hanehoana Azy amin’ny Israely dia izany no niaviako manao batisa amin’ny rano.
  '32':
  - type: text
    content: 'Ary i Jaona no vavolombelona nanambara hoe: Izaho dia nahita ny Fanahy nidina avy tany an-danitra tahaka ny voromailala ka nitoetra teo amboniny. '
  '33':
  - type: text
    content: 'Ary tsy nahalala Azy aho; fa izay naniraka ahy hanao batisa amin’ny rano no nilaza tamiko hoe: Izay ho hitanao idinan’ny Fanahy sy itoerany dia Izy no Mpanao batisa amin’ny Fanahy Masina. '
  '34':
  - type: text
    content: Ary nahita aho ka mijoro ho vavolombelona fa Izy no Zanak’Andriamanitra.
  - type: heading
    content: Ireo mpianatr’i Jesosy voalohany
  - type: heading
    content: Ampit. Mat 4.18-22; Mar 1.16-20; Lio 5.1-11
  '35':
  - type: text
    content: 'Nony ampitson’iny i Jaona dia mbola teo ihany niaraka tamin’ny mpianany roa lahy; '
  '36':
  - type: text
    content: 'ary nahita an’i Jesosy nitsangantsangana izy ka niteny hoe: Indro ny Zanak’ondrin’Andriamanitra! '
  '37':
  - type: text
    content: 'Ary ireo mpianatra roa lahy ireo, rehefa nandre azy niteny, dia nanaraka an’i Jesosy. '
  '38':
  - type: text
    content: 'Nony nitodika Jesosy ka nahita azy ireo manaraka, dia niteny taminy hoe: Inona no tadiavinareo? Ary hoy izy roa lahy Taminy: Raby, izany hoe, Mpampianatra ô, aiza Ianao no mitoetra? '
  '39':
  - type: text
    content: 'Dia hoy Izy taminy: Avia, fa ho hitanareo. Dia nandeha izy ireo ka nahita izay nitoerany ary nitoetra teo Aminy tamin’izany andro izany; ary efa tokony ho ora fahafolo tamin’izay.'
  '4':
  - type: text
    content: Tao Aminy ny fiainana;
  - type: text
    content: ary ny fiainana no fanazavana ny olona.
  '40':
  - type: text
    content: 'I Andrea, rahalahin’i Simona Petera, no iray tamin’izy roa lahy, izay nandre ny tenin’i Jaona ka nanaraka an’i Jesosy. '
  '41':
  - type: text
    content: 'Ary izy no nahita an’i Simona rahalahiny aloha, dia hoy izy taminy: Efa nahita ny Mesia, izany hoe ny '
  - type: text
    content: Kristy
  - type: text
    content: ', izahay. '
  '42':
  - type: text
    content: 'Dia nitondra azy ho any amin’i Jesosy izy. Nony nibanjina azy Jesosy dia niteny hoe: Ianao no Simona, zanak’i Jaona; ianao dia hantsoina koa hoe Kefasy, izany hoe Petera'
  - type: note
    content: 'Petera: Vato.'
  - type: text
    content: .
  - type: heading
    content: Miantso an’i Filipo sy i Natanaela Jesosy
  '43':
  - type: text
    content: 'Nony ampitso dia te hiala ho any Galilia Jesosy, ary nahita an’i Filipo Izy ka niteny taminy hoe: Manaraha Ahy. '
  '44':
  - type: text
    content: Ary i Filipo dia avy any Betsaida, tanànan’i Andrea sy i Petera.
  '45':
  - type: text
    content: 'I Filipo kosa raha nahita an’i Natanaela dia niteny taminy hoe: Efa hitanay ilay nosoratan’i Mosesy tao amin’ny Lalàna sady nosoratan’ny mpaminany, dia Jesosy, zanak’i Josefa, avy any Nazareta. '
  '46':
  - type: text
    content: 'Ary hoy i Natanaela taminy: Moa mba misy zava-tsoa toy izany va avy any Nazareta? Dia hoy i Filipo taminy: Andeha hizaha.'
  '47':
  - type: text
    content: 'Nony nahita an’i Natanaela nanatona Azy Jesosy dia nilaza ny momba azy hoe: Indro ny tena Israelita tsy misy fitaka. '
  '48':
  - type: text
    content: 'Hoy i Natanaela taminy: Ahoana no ahafantaranao ahy? Dia namaly azy Jesosy hoe: Talohan’ny niantsoan’i Filipo anao dia efa hitako teo ambanin’ny aviavy ianao. '
  '49':
  - type: text
    content: 'Dia hoy i Natanaela: Raby ô, Ianao no Zanak’Andriamanitra, Ianao no Mpanjakan’ny Israely. '
  '5':
  - type: text
    content: Ny mazava dia mamirapiratra ao amin’ny maizina,
  - type: text
    content: fa ny maizina dia tsy nandray azy.
  '50':
  - type: text
    content: 'Hoy ny navalin’i Jesosy azy hoe: Moa ny nilazako taminao va fa hitako teo ambanin’ny aviavy ianao no inoanao? Hahita zavatra lehibe noho izany ianao. '
  '51':
  - type: text
    content: 'Ary hoy koa Izy taminy: Lazaiko aminareo marina dia marina tokoa: Ho hitanareo ny lanitra misokatra sy ny anjelin’Andriamanitra miakatra sy midina eo ambonin’ny Zanak’Olona.'
  '6':
  - type: text
    content: 'Nisy lehilahy nirahin’Andriamanitra, Jaona no anarany. '
  '7':
  - type: text
    content: 'Tonga mba ho vavolombelona hanambara ny mazava izy, mba hinoan’ny olona rehetra noho ny teniny. '
  '8':
  - type: text
    content: Tsy izy anefa no Ilay mazava, fa tonga mba ho vavolombelona hanambara ny mazava ihany izy.
  '9':
  - type: text
    content: Ny Teny no tena mazava izay mahazava ny olona rehetra; tonga eto amin’izao tontolo izao Izy.
