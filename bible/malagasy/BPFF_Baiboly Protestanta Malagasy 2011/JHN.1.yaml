document_id: JHN.1
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fiainana, ny fahazavana, ny Zanakalahitokana
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Tamin’ny voalohany ny Teny
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny Teny dia tao amin’Andriamanitra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny Teny dia Andriamanitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Izy dia tao amin’Andriamanitra tamin’ny voalohany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Izy no nahariana ny zavatra rehetra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary raha tsy Izy dia tsy nisy nahariana izao zavatra ary izao na dia iray aza.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Tao Aminy ny fiainana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny fiainana no fanazavana ny olona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ny mazava dia mamirapiratra ao amin’ny maizina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny maizina dia tsy nandray azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Nisy lehilahy nirahin’Andriamanitra, Jaona no anarany. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Tonga mba ho vavolombelona hanambara ny mazava izy, mba hinoan’ny olona rehetra noho ny teniny. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Tsy izy anefa no Ilay mazava, fa tonga mba ho vavolombelona hanambara ny mazava ihany izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ny Teny no tena mazava izay mahazava ny olona rehetra; tonga eto amin’izao tontolo izao Izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Teo amin’izao tontolo izao Izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary Izy no nanaovana izao tontolo izao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa izao tontolo izao dia tsy nahalala Azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Tonga tany amin’ny Azy Izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny Azy dia tsy nandray Azy;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: fa izay rehetra nandray Azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia nomeny hery
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho tonga zanak’Andriamanitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia izay mino ny anarany,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: dia ireo izay tsy nateraky ny ra na ny sitrapon’ny nofo na ny sitrapon’ny olona fa naterak’Andriamanitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ary ny Teny dia tonga nofo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka nonina teto amintsika;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hitanay ny voninahiny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia voninahitra mendrika ho an’ny Lahitokana avy tamin’ny Ray
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady feno fahasoavana sy fahamarinana.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Vavolombelona nanambara Azy i Jaona ka niantso hoe: Izy Ilay nolazaiko hoe: Izay avy ao aorianako dia efa tonga eo alohako satria talohako Izy.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Fa tamin’ny fahafenoany
- type: usfm
  marker: q1
  children:
  - type: text
    text: no nandraisantsika rehetra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia fahasoavana miampy fahasoavana;
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'fa ny lalàna dia nomena tamin’ny alalan’i Mosesy, fa ny fahasoavana sy ny fahamarinana kosa dia tonga tamin’ny alalan’i Jesosy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Tsy nisy nahita an’Andriamanitra na oviana na oviana; fa ny Zanaka Lahitokana, izay ao an-tratran’ny Ray, Izy no nanambara Azy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nanambaràn’i Jaona Mpanao batisa ny momba ny tenany
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Ampit. Mat 3.1-6, 11-12; Mar 1.2-8; Lio 3.1-6, 15-18
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Izao no fanambaràna nataon’i Jaona, raha naniraka mpisorona sy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: levita
  - type: text
    text: ' avy tany Jerosalema hankany aminy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jiosy
  - type: text
    text: ' mba hanontany azy hoe: Iza moa ianao? '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary nilaza marina izy fa tsy nandà, ary hoy ny filazany: Tsy izaho no '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary nanontany azy izy ireo hoe: Ahoana ary? I Elia va ianao? Dia hoy izy: Tsy izy aho. Ilay Mpaminany va ianao? Fa hoy izy hoe: Tsia. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Dia hoy ireo taminy: Iza ary ianao mba hitondranay valiny ho any amin’izay naniraka anay? Lazainao ho iza moa ny tenanao? '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Dia hoy izy:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: '«Izaho dia feon’ny miantso mafy any an-tany efitra hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ataovy mahitsy ny lalan’NY TOMPO» (Isa 40.3),
- type: usfm
  marker: m
  children:
  - type: text
    text: araka izay nolazain’Isaia mpaminany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.23 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: profeta.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary iraka avy tamin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Fariseo
  - type: text
    text: ' ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Dia nanontany an’i Jaona indray ireo hoe: Nahoana ary ianao no manao batisa raha tsy ianao no Kristy na i Elia na ilay Mpaminany? '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Namaly azy ireo i Jaona hoe: Izaho dia manao batisa amin’ny rano; fa eto aminareo misy Iray izay tsy fantatrareo, '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: dia ilay avy ao aorianako, ary tsy mendrika hamaha ny fehin-kapany akory aho.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Izany zavatra izany dia tany Betania any andafin’i Jordana, izay nanaovan’i Jaona batisa.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nanambaràn’i Jaona Mpanao batisa an’i Jesosy
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Ampit. Mat 3.13-17; Mar 1.9-11; Lio 3.21-22
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Nony ampitso dia nahita an’i Jesosy avy manatona azy i Jaona ka hoy izy: Indro ny Zanak’ondrin’Andriamanitra izay manaisotra ny fahotan’izao tontolo izao! '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Izy ilay nolazaiko hoe: Misy Lehilahy tonga avy ao aorianako izay efa tonga eo alohako satria talohako Izy. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Ary tsy nahalala Azy aho; fa mba hanehoana Azy amin’ny Israely dia izany no niaviako manao batisa amin’ny rano.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Ary i Jaona no vavolombelona nanambara hoe: Izaho dia nahita ny Fanahy nidina avy tany an-danitra tahaka ny voromailala ka nitoetra teo amboniny. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ary tsy nahalala Azy aho; fa izay naniraka ahy hanao batisa amin’ny rano no nilaza tamiko hoe: Izay ho hitanao idinan’ny Fanahy sy itoerany dia Izy no Mpanao batisa amin’ny Fanahy Masina. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Ary nahita aho ka mijoro ho vavolombelona fa Izy no Zanak’Andriamanitra.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ireo mpianatr’i Jesosy voalohany
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Ampit. Mat 4.18-22; Mar 1.16-20; Lio 5.1-11
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Nony ampitson’iny i Jaona dia mbola teo ihany niaraka tamin’ny mpianany roa lahy; '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'ary nahita an’i Jesosy nitsangantsangana izy ka niteny hoe: Indro ny Zanak’ondrin’Andriamanitra! '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Ary ireo mpianatra roa lahy ireo, rehefa nandre azy niteny, dia nanaraka an’i Jesosy. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Nony nitodika Jesosy ka nahita azy ireo manaraka, dia niteny taminy hoe: Inona no tadiavinareo? Ary hoy izy roa lahy Taminy: Raby, izany hoe, Mpampianatra ô, aiza Ianao no mitoetra? '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Dia hoy Izy taminy: Avia, fa ho hitanareo. Dia nandeha izy ireo ka nahita izay nitoerany ary nitoetra teo Aminy tamin’izany andro izany; ary efa tokony ho ora fahafolo tamin’izay.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'I Andrea, rahalahin’i Simona Petera, no iray tamin’izy roa lahy, izay nandre ny tenin’i Jaona ka nanaraka an’i Jesosy. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Ary izy no nahita an’i Simona rahalahiny aloha, dia hoy izy taminy: Efa nahita ny Mesia, izany hoe ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ', izahay. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Dia nitondra azy ho any amin’i Jesosy izy. Nony nibanjina azy Jesosy dia niteny hoe: Ianao no Simona, zanak’i Jaona; ianao dia hantsoina koa hoe Kefasy, izany hoe Petera'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.42 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Petera: Vato.'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Miantso an’i Filipo sy i Natanaela Jesosy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Nony ampitso dia te hiala ho any Galilia Jesosy, ary nahita an’i Filipo Izy ka niteny taminy hoe: Manaraha Ahy. '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: Ary i Filipo dia avy any Betsaida, tanànan’i Andrea sy i Petera.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'I Filipo kosa raha nahita an’i Natanaela dia niteny taminy hoe: Efa hitanay ilay nosoratan’i Mosesy tao amin’ny Lalàna sady nosoratan’ny mpaminany, dia Jesosy, zanak’i Josefa, avy any Nazareta. '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Ary hoy i Natanaela taminy: Moa mba misy zava-tsoa toy izany va avy any Nazareta? Dia hoy i Filipo taminy: Andeha hizaha.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Nony nahita an’i Natanaela nanatona Azy Jesosy dia nilaza ny momba azy hoe: Indro ny tena Israelita tsy misy fitaka. '
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Hoy i Natanaela taminy: Ahoana no ahafantaranao ahy? Dia namaly azy Jesosy hoe: Talohan’ny niantsoan’i Filipo anao dia efa hitako teo ambanin’ny aviavy ianao. '
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'Dia hoy i Natanaela: Raby ô, Ianao no Zanak’Andriamanitra, Ianao no Mpanjakan’ny Israely. '
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Hoy ny navalin’i Jesosy azy hoe: Moa ny nilazako taminao va fa hitako teo ambanin’ny aviavy ianao no inoanao? Hahita zavatra lehibe noho izany ianao. '
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'Ary hoy koa Izy taminy: Lazaiko aminareo marina dia marina tokoa: Ho hitanareo ny lanitra misokatra sy ny anjelin’Andriamanitra miakatra sy midina eo ambonin’ny Zanak’Olona.'
