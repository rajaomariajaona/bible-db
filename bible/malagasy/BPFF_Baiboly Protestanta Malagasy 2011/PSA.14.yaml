document_id: PSA.14
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ireo olona matoky an’Andriamanitra na dia ao anatin’ny tontolo feno fahalovana aza
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: Ho an’ny mpiventy hira. Salamo nataon’i Davida.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ny adala no manao anakampo hoe: Tsy misy Andriamanitra!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Manao izay ratsy sy vetaveta izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy misy manao ny tsara.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Avy eny an-danitra NY TOMPO no miondrika mijery ny zanak’olombelona
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hizahany raha misy olon-kendry
- type: usfm
  marker: q1
  children:
  - type: text
    text: mitady an’Andriamanitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Samy efa nivily lalana izy rehetra ka tonga nanao zava-betaveta avokoa;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy misy manao ny tsara
- type: usfm
  marker: q1
  children:
  - type: text
    text: na dia iray akory aza.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Tsy mahalala va ny mpanao ratsy rehetra?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mihinana ny oloko toy ny fihinana mofo izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: no sady tsy miantso NY TOMPO.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Indreo, tonga feno tahotra ireny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria Andriamanitra no eo amin’ny taranaka marina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Na dia foananareo aza ny fisainan’ny ory,
- type: usfm
  marker: q1
  children:
  - type: text
    text: NY TOMPO kosa no fialofany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Enga anie ka hivoaka avy ao '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Ziona
  - type: text
    text: ' ny famonjena ny Israely!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Rehefa ampodin’NY TOMPO avy amin’ny fahababoana ny olony
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hiravoravo i Jakoba ary hifaly Israely.
