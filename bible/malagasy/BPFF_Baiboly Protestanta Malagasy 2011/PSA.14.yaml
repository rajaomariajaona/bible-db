document_id: PSA.14,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ireo olona matoky an’Andriamanitra na dia ao anatin’ny tontolo feno fahalovana aza
  - type: text
    content: Ho an’ny mpiventy hira. Salamo nataon’i Davida.
  - type: text
    content: 'Ny adala no manao anakampo hoe: Tsy misy Andriamanitra!'
  - type: text
    content: Manao izay ratsy sy vetaveta izy;
  - type: text
    content: tsy misy manao ny tsara.
  '2':
  - type: text
    content: Avy eny an-danitra NY TOMPO no miondrika mijery ny zanak’olombelona
  - type: text
    content: mba hizahany raha misy olon-kendry
  - type: text
    content: mitady an’Andriamanitra.
  '3':
  - type: text
    content: Samy efa nivily lalana izy rehetra ka tonga nanao zava-betaveta avokoa;
  - type: text
    content: tsy misy manao ny tsara
  - type: text
    content: na dia iray akory aza.
  '4':
  - type: text
    content: Tsy mahalala va ny mpanao ratsy rehetra?
  - type: text
    content: Mihinana ny oloko toy ny fihinana mofo izy
  - type: text
    content: no sady tsy miantso NY TOMPO.
  '5':
  - type: text
    content: Indreo, tonga feno tahotra ireny,
  - type: text
    content: satria Andriamanitra no eo amin’ny taranaka marina.
  '6':
  - type: text
    content: Na dia foananareo aza ny fisainan’ny ory,
  - type: text
    content: NY TOMPO kosa no fialofany.
  '7':
  - type: text
    content: 'Enga anie ka hivoaka avy ao '
  - type: text
    content: Ziona
  - type: text
    content: ' ny famonjena ny Israely!'
  - type: text
    content: Rehefa ampodin’NY TOMPO avy amin’ny fahababoana ny olony
  - type: text
    content: dia hiravoravo i Jakoba ary hifaly Israely.
