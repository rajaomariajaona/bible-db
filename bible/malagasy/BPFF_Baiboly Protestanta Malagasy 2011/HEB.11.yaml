document_id: HEB.11,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny finoan’ireo Mpino taloha
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Ary ny finoana no fahatokiana ny amin’ny zavatra antenaina, fanehoana ny zavatra tsy hita.
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'fa nanantena hahazo ny tanàna misy fanorenana izy ka Andriamanitra no tompo-marika sy mpanao izany. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ary na i Saraha aza dia finoana koa no nandraisany hery hanana anaka rehefa nitsaha-jaza izy satria nataony fa mahatoky ilay efa nanome ny teny fikasana. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Koa avy tamin’ny iray, izay efa toy ny maty, no niavian’ny maro toy ny kintana eny amin’ny lanitra sy toy ny fasika eny amoron-dranomasina izay tsy hita isa.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ireo rehetra ireo dia maty tamin’ny finoana, kanefa mbola tsy nahazo ny teny fikasana; fa nahatazana azy eny lavitra eny izy ka ravoravo niarahaba azy, dia nanaiky fa vahiny sy mpivahiny tetỳ ambonin’ny tany izy. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Fa izay milaza izany zavatra izany dia maneho marimarina fa mitady izay ho taniny izy. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Ary raha toa ka nahatsiaro ny tany nialany izy dia ho nahita fotoana hiverenany. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Fa amin’izany dia ny tsara lavitra no iriny, dia ny any an-danitra. Ary noho izany Andriamanitra dia tsy menatra hatao hoe Andriamaniny satria efa nanamboatra tanàna ho an’ireo Izy.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Finoana no nanoloran’i Abrahama an’Isaka raha nozahan-toetra izy; eny, ny zanany lahitokana no natolotr’ilay efa nandray tsara ny teny fikasana, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'dia ilay nilazana hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Avy amin’Isaka no hantsoina izay taranaka ho anao» (Gen 21.12).
  '19':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Fa nihevitra izy fa Andriamanitra dia mahay manangana na dia ny maty aza; ary ohatry ny avy tamin’izany no nandraisany azy. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Fa izany no nahatsara laza ny Mpino taloha.
  '20':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Finoana no nitsofan’Isaka rano an’i Jakoba sy i Esao ny amin’ny zavatra ho avy. '
  '21':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Finoana no nitsofan’i Jakoba rano ny zanak’i Josefa roa lahy, rehefa ho faty izy, sady nivavaka izy no niankina tamin’ny lohan’ny tehiny. '
  '22':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Finoana no nilazan’i Josefa ny fialan’ny Zanak’Israely, rehefa ho faty izy, ary ny nanafarany ny amin’ny taolany.
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Finoana no nanafenan’ny ray aman-drenin’i Mosesy azy telo volana, raha vao teraka, satria hitany fa zaza tsara tarehy izy, ary tsy natahorany ny didin’ny mpanjaka.
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Finoana no nandavan’i Mosesy tsy hatao hoe zanaky ny zanakavavin’i Farao rehefa lehibe izy; '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'nifidy hiara-mitondra fahoriana amin’ny olon’Andriamanitra mantsy izy toy izay hanana fifaliana vetivety amin’ny fahotana; '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'nanao ny fanaratsiana an’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ' ho harena be lavitra noho ny zava-tsoan’i Ejipta, satria nijery lavitra ny valisoa izy.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Finoana no nandaozany an’i Ejipta ka tsy natahorany ny fahatezeran’ny mpanjaka; fa naharitra toy ny mahita izay tsy hita izy. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Finoana no nitandremany ny Paska sy ny famafazana ny ra, fandrao hamono izay lahimatoa Israelita ilay mpandringana. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Finoana no nitana ny Ranomasina Mena toy ny mandia tany maina, fa mba nandraman’ny Ejiptiana izany ka voatelina ireo.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Finoana no ahafantarantsika fa ny tenin’Andriamanitra no nanaovana izao tontolo izao ka tsy izay zavatra hita maso no nanaovana izao zavatra hita izao. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Finoana no nampirodana ny mandan’i Jeriko rehefa nohodidinina hafitoana. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Finoana no tsy nahafaty an’i Rahaba janga niaraka tamin’ireo tsy mpino satria nandray ny mpisafo tany tamin’ny fihavanana izy.
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Ary inona koa no holazaiko? Fa ho lany ny andro raha milaza ny amin’i Gideona sy i Baraka ary i Samsona sy i Jefta aho, ary koa i Davida sy i Samoela ary ny mpaminany, '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'izay nandresy fanjakana tamin’ny finoana, niasa tamin’ny fahamarinana, nahazo teny fikasana, nanakombona ny vavan’ny liona, '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: namono ny afo midedadeda, afaka tamin’ny lelan-tsabatra, raha nalemy dia nohatanjahina, tonga nahery tamin’ny ady ka nampandositra ny miaramilan’ny firenena hafa.
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Nisy vehivavy nandray ny azy efa maty, tamin’ny fananganana azy ho velona indray; nampijalijaliana ho faty ny sasany, nefa tsy nety nanao izay hahafahany mba hahazoany fitsanganana tsara lavitra; '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'ary ny sasany dia niaritra fanesoana sy kapoka mafy ary fatorana sy tranomaizina koa; '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'notoraham-bato izy, notsofàna, nampijaliana, novonoina tamin’ny sabatra, nirenireny nitafy hoditr’ondry sy hoditr’osy; tsy nanana na inona na inona, ory, fadiranovana; '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: nefa izao tontolo izao dia tsy mendrika ho nitoerany akory; nirenireny tany an-tany efitra izy, tany an-tendrombohitra, tany an-johy ary tany an-dava-tany.
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Ary ireo rehetra ireo, na dia efa nahazo laza tsara noho ny finoana aza, dia tsy mba nandray ny teny fikasana; '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Finoana no nanoloran’i Abela ho an’Andriamanitra fanatitra tsara noho ny an’i Kaina ka izany no nanambaràna azy fa marina satria Andriamanitra no nanambara ny amin’ny fanatitra nataony. Ary amin’izany, na dia maty aza izy dia mbola miteny ihany. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: fa Andriamanitra efa nanamboatra izay tsara lavitra ho antsika mba tsy hatao tanteraka ireo raha tsy efa eo koa isika.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Finoana no namindrana an’i Enoka tsy hiharan’ny fahafatesana; koa dia tsy hita izy satria nafindran’Andriamanitra; fa talohan’ny namindrana azy dia nambara fa nankasitrahan’Andriamanitra izy. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Fa raha tsy amin’ny finoana dia tsy misy azo atao hahazoana sitraka Aminy; fa izay manatona an’Andriamanitra dia tsy maintsy mino fa misy Izy sady mpamaly soa izay mazoto mitady Azy. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Finoana no nanamboaran’i Noa sambofiara hamonjena ny ankohonany, fa natahotra izy rehefa notoroan’Andriamanitra hevitra ny amin’ny zavatra mbola tsy hita; koa izany no nanamelohany an’izao tontolo izao sy nahatongavany ho mpandova ny fahamarinana araka ny finoana.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Finoana no naneken’i Abrahama rehefa nantsoina hiainga hankany amin’izay tany ho azony ho lova; dia niainga izy na dia tsy fantany aza izay halehany. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Finoana no nivahinianany tany amin’ny tany nolazain’ny teny fikasana, toy ny any an-tanin’olona, mitoetra an-day, mbamin-dry Isaka sy i Jakoba, mpiara-mandova izany teny fikasana izany aminy; '
