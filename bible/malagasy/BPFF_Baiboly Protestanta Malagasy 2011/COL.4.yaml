document_id: COL.4,3103
type_code: plt
verses:
  '1':
  - type: text
    content: Ianareo tompo, ataovy amin’ny mpanomponareo izay marina sy izay mety, satria fantatrareo fa mba manana Tompo any an-danitra koa ianareo.
  - type: heading
    content: Ny fitondrantena manoloana ny hafa
  '10':
  - type: text
    content: 'Manao veloma anareo i Aristarko, mpiara-mifatotra amiko sy i Marka, havan’i Barnabasy; efa nomena toromarika momba azy ianareo ka raha tonga atỳ aminareo izy dia raiso. '
  '11':
  - type: text
    content: 'Raiso toa izany koa i Jesosy, izay antsoina hoe Josto. Avy amin’ny voafora ireo. Ireo ihany no mpiara-miasa amiko hampandroso ny fanjakan’Andriamanitra sady tonga fampiononana ahy. '
  '12':
  - type: text
    content: 'Manao veloma anareo i Epafra, ilay avy aminareo sady mpanompon’i '
  - type: text
    content: Kristy
  - type: text
    content: ' Jesosy ary mikely aina mandrakariva amin’ny fangatahana ho anareo, mba hijoro amin’ny fahafenoana ianareo sady hahatanteraka izay rehetra sitrapon’Andriamanitra. '
  '13':
  - type: text
    content: 'Vavolombelony aho fa mikely aina fatratra ho anareo sy ho an’ny any Laodikia ary ho an’ny any Hierapolia izy. '
  '14':
  - type: text
    content: Manao veloma anareo i Lioka malala, ilay mpitsabo, sy i Demasy.
  '15':
  - type: text
    content: Manaova veloma ny rahalahy any Laodikia ary i Nimfa sy ny fiangonana
  - type: note
    content: 'Na: eklesia.'
  - type: text
    content: ' ao an-tranony. '
  '16':
  - type: text
    content: 'Rehefa voavaky atỳ aminareo ity epistily ity dia ataovy koa izay hamakiana azy ao amin’ny fiangonan’ny Laodikiana; ary vakionareo kosa ilay avy amin’ny Laodikiana. '
  '17':
  - type: text
    content: 'Ary lazao amin’i Arkipo hoe: Tandremo ny fanompoana izay noraisinao tao amin’ny Tompo mba hahatanterahanao izany.'
  '18':
  - type: text
    content: Ity no veloma ataon’ny tanako, izaho Paoly. Tsarovy ny fifatorako. Ho aminareo anie ny fahasoavana.
  '2':
  - type: text
    content: 'Mahareta amin’ny fivavahana ka miambena amin’izany amin’ny fisaorana. '
  '3':
  - type: text
    content: 'Mangataha koa ho anay mba hamohan’Andriamanitra varavarana ho an’ny teny, hilazanay ny zavamiafina izay an’i '
  - type: text
    content: Kristy
  - type: text
    content: ', sady izany no efa namatorana ahy rahateo '
  '4':
  - type: text
    content: 'mba haharihariko tsara izany araka izay tokony hitenenako. '
  '5':
  - type: text
    content: 'Mandehana amin’ny fahendrena amin’izay eo ivelany, hararaoty ny fotoana. '
  '6':
  - type: text
    content: Aoka ny fiteninareo ho amin’ny fahasoavana mandrakariva, ho mamy sira, mba ho fantatrareo izay tokony havalinareo ny olona rehetra.
  - type: heading
    content: Hafatra manokana sy fanaovam-beloma
  '7':
  - type: text
    content: 'Ny momba ahy rehetra dia holazain’i Tikiko aminareo, ilay rahalahy malala sy mpanompo mahatoky ary namako manompo ao amin’ny Tompo. '
  '8':
  - type: text
    content: 'Ny anton’ny nanirahako azy ho atỳ aminareo indrindra dia ny hahafantaranareo ny momba anay sy ny mba hampaherezany ny fonareo. '
  '9':
  - type: text
    content: Nirahiko koa i Onesimosy, rahalahy mahatoky sy malala izay avy aminareo; hampahafantatra anareo ny zavatra rehetra atỳ izy roa lahy.
