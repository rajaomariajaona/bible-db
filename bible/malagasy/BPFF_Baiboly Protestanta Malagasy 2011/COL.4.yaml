document_id: COL.4
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ianareo tompo, ataovy amin’ny mpanomponareo izay marina sy izay mety, satria fantatrareo fa mba manana Tompo any an-danitra koa ianareo.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fitondrantena manoloana ny hafa
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Mahareta amin’ny fivavahana ka miambena amin’izany amin’ny fisaorana. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Mangataha koa ho anay mba hamohan’Andriamanitra varavarana ho an’ny teny, hilazanay ny zavamiafina izay an’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ', sady izany no efa namatorana ahy rahateo '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'mba haharihariko tsara izany araka izay tokony hitenenako. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Mandehana amin’ny fahendrena amin’izay eo ivelany, hararaoty ny fotoana. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Aoka ny fiteninareo ho amin’ny fahasoavana mandrakariva, ho mamy sira, mba ho fantatrareo izay tokony havalinareo ny olona rehetra.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Hafatra manokana sy fanaovam-beloma
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ny momba ahy rehetra dia holazain’i Tikiko aminareo, ilay rahalahy malala sy mpanompo mahatoky ary namako manompo ao amin’ny Tompo. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ny anton’ny nanirahako azy ho atỳ aminareo indrindra dia ny hahafantaranareo ny momba anay sy ny mba hampaherezany ny fonareo. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Nirahiko koa i Onesimosy, rahalahy mahatoky sy malala izay avy aminareo; hampahafantatra anareo ny zavatra rehetra atỳ izy roa lahy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Manao veloma anareo i Aristarko, mpiara-mifatotra amiko sy i Marka, havan’i Barnabasy; efa nomena toromarika momba azy ianareo ka raha tonga atỳ aminareo izy dia raiso. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Raiso toa izany koa i Jesosy, izay antsoina hoe Josto. Avy amin’ny voafora ireo. Ireo ihany no mpiara-miasa amiko hampandroso ny fanjakan’Andriamanitra sady tonga fampiononana ahy. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Manao veloma anareo i Epafra, ilay avy aminareo sady mpanompon’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' Jesosy ary mikely aina mandrakariva amin’ny fangatahana ho anareo, mba hijoro amin’ny fahafenoana ianareo sady hahatanteraka izay rehetra sitrapon’Andriamanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Vavolombelony aho fa mikely aina fatratra ho anareo sy ho an’ny any Laodikia ary ho an’ny any Hierapolia izy. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Manao veloma anareo i Lioka malala, ilay mpitsabo, sy i Demasy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Manaova veloma ny rahalahy any Laodikia ary i Nimfa sy ny fiangonana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.15 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: eklesia.
    marker-yv: yv-n
  - type: text
    text: ' ao an-tranony. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Rehefa voavaky atỳ aminareo ity epistily ity dia ataovy koa izay hamakiana azy ao amin’ny fiangonan’ny Laodikiana; ary vakionareo kosa ilay avy amin’ny Laodikiana. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary lazao amin’i Arkipo hoe: Tandremo ny fanompoana izay noraisinao tao amin’ny Tompo mba hahatanterahanao izany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ity no veloma ataon’ny tanako, izaho Paoly. Tsarovy ny fifatorako. Ho aminareo anie ny fahasoavana.
