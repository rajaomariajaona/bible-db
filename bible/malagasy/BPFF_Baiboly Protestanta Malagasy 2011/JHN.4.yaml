document_id: JHN.4,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Jesosy sy ilay vehivavy samaritana
  - type: text
    content: 'Tamin’izay, rehefa fantatr’i Jesosy fa ny '
  - type: text
    content: Fariseo
  - type: text
    content: ' efa nahare hoe: Jesosy mahazo mpianatra maro sy nanao batisa be noho i Jaona, '
  '10':
  - type: text
    content: 'Ary hoy Jesosy: Raha fantatrao ny fanomezan’Andriamanitra sy izay miteny aminao hoe: Omeo Aho hosotroiko dia ianao no ho nangataka Taminy ka nomeny rano velona. '
  '11':
  - type: text
    content: 'Hoy Ravehivavy taminy: Tompoko, tsy manana fanovozana Ianao, sady lalina ny fantsakana; koa avy aiza no hahazoanao izany rano velona izany? '
  '12':
  - type: text
    content: 'Ianao va lehibe noho i Jakoba razantsika izay nanome anay ity fantsakana ity, sady izy sy ny zanany mbamin’ny bibiny no nisotro teto? '
  '13':
  - type: text
    content: 'Fa Jesosy namaly azy hoe: Izay rehetra misotro ity rano ity dia mbola hangetaheta indray; '
  '14':
  - type: text
    content: 'fa na iza na iza no misotro ny rano izay homeko azy dia tsy hangetaheta mandrakizay; satria ny rano izay homeko azy dia ho loharano miboiboika ao aminy ho fiainana mandrakizay. '
  '15':
  - type: text
    content: 'Dia hoy Ravehivavy Taminy: Tompoko, omeo izany rano izany aho mba tsy hangetaheta na hanketo hantsaka intsony. '
  '16':
  - type: text
    content: 'Ary hoy Jesosy taminy: Andeha ary antsoy ny vadinao dia mankanesa atỳ. '
  '17':
  - type: text
    content: 'Namaly Azy Ravehivavy hoe: Tsy manambady aho. Hoy Jesosy taminy: Marina ihany izay nolazainao hoe: Tsy manambady aho; '
  '18':
  - type: text
    content: 'fa efa nanambady indimy ianao sady tsy vadinao ilay itoeranao ankehitriny; marina izany voalazanao izany. '
  '19':
  - type: text
    content: 'Hoy Ravehivavy taminy: Tompoko, hitako fa mpaminany ianao. '
  '2':
  - type: text
    content: 'kanefa tsy Jesosy tenany no nanao batisa fa ny mpianany, '
  '20':
  - type: text
    content: 'Ny razanay dia nivavaka teto amin’ity tendrombohitra ity; ianareo anefa dia milaza fa any Jerosalema ihany no tokony hivavahana. '
  '21':
  - type: text
    content: 'Hoy Jesosy taminy: Ravehivavy, minoa Ahy, fa avy ny andro ka tsy amin’ity tendrombohitra ity, na any Jerosalema aza, no hivavahanareo amin’ny Ray. '
  '22':
  - type: text
    content: 'Ianareo dia mivavaka amin’izay tsy fantatrareo; izahay kosa dia mivavaka amin’izay fantatray satria avy amin’ny Jiosy ny famonjena. '
  '23':
  - type: text
    content: 'Fa avy ny fotoana sady tonga ankehitriny, raha ny tena mpivavaka hivavaka amin’ny Ray amin’ny fanahy sy ny fahamarinana; satria ny Ray koa mitady ny mpivavaka Aminy ho tahaka izany. '
  '24':
  - type: text
    content: 'Andriamanitra dia Fanahy; ary izay mivavaka Aminy dia tsy maintsy mivavaka amin’ny fanahy sy ny fahamarinana. '
  '25':
  - type: text
    content: 'Dia hoy Ravehivavy taminy: Fantatro fa ho avy ny Mesia, ilay atao hoe '
  - type: text
    content: Kristy
  - type: text
    content: '; koa rehefa tonga Izy dia hambarany amintsika ny zavatra rehetra. '
  '26':
  - type: text
    content: 'Hoy Jesosy taminy: Izaho izay miresaka aminao no Izy.'
  '27':
  - type: text
    content: 'Tamin’izay dia tonga ny mpianany ka gaga satria vehivavy no niresahany; nefa tsy nisy nahateny hoe: Inona no tadiavinao? Na hoe: Nahoana no miresaka aminy Ianao? '
  '28':
  - type: text
    content: 'Dia nandao ny sininy Ravehivavy ka nankany an-tanàna ary nilaza tamin’ny olona hoe: '
  '29':
  - type: text
    content: 'Andeha isika hizaha lehilahy iray, izay nilaza tamiko ny nataoko rehetra; izao angaha no Kristy! '
  '3':
  - type: text
    content: 'dia niala tany '
  - type: text
    content: Jodia
  - type: text
    content: ' Izy ka nankany Galilia indray.'
  '30':
  - type: text
    content: Dia nivoaka avy tao an-tanàna ny olona ka nankeo amin’i Jesosy.
  '31':
  - type: text
    content: 'Nandritra izany fotoana izany kosa dia niangavy Azy ny mpianany hoe: Hano, Raby ô. '
  '32':
  - type: text
    content: 'Fa hoy Jesosy taminy: Izaho manan-kanina izay tsy fantatrareo. '
  '33':
  - type: text
    content: 'Dia niresaka ny mpianatra hoe: Nisy olona nitondra zavatra hohaniny va re? '
  '34':
  - type: text
    content: 'Hoy Jesosy taminy: Ny haniko dia ny manao ny sitrapon’izay naniraka Ahy sy ny mahavita ny asany. '
  '35':
  - type: text
    content: 'Moa tsy ianareo va no milaza hoe: Efa-bolana no sisa dia ho tonga ny fararano? Indro, lazaiko aminareo: Atopazy ny masonareo ka jereo, fa efa masaka sahady ho amin’ny fijinjana ny eny an-tsaha. '
  '36':
  - type: text
    content: 'Ary izay mijinja dia mandray karama ka mamory vokatra ho amin’ny fiainana mandrakizay mba hiara-mifaly ny mpamafy sy ny mpijinja. '
  '37':
  - type: text
    content: 'Ary amin’izany dia marina ilay teny hoe: Mamafy ny iray, mijinja kosa ny iray. '
  '38':
  - type: text
    content: Izaho naniraka anareo hijinja izay tsy nisasaranareo; olon-kafa no nisasatra, fa ianareo kosa no niditra teo amin’izay nisasarany.
  '39':
  - type: text
    content: 'Maro ny Samaritana avy tao amin’izany tanàna izany no nino an’i Jesosy noho ny filazan-dRavehivavy izay nanambara hoe: Nolazainy tamiko avokoa izay rehetra nataoko. '
  '4':
  - type: text
    content: Ary tsy maintsy namakivaky an’i Samaria Izy.
  '40':
  - type: text
    content: 'Rehefa nanatona Azy ny Samaritana dia nangataka Azy hitoetra tao aminy; koa nitoetra tao roa andro Izy. '
  '41':
  - type: text
    content: 'Ary maro koa no nino noho ny teniny '
  '42':
  - type: text
    content: 'ka nilaza tamin-dRavehivavy hoe: Tsy noho ny filazanao ihany no inoanay, fa ny tenanay no mandre ka fantatray fa Izy tokoa no Mpamonjy izao tontolo izao.'
  - type: heading
    content: Ny nanasitranan’i Jesosy ny zanakalahin’ilay tandapa iray
  '43':
  - type: text
    content: 'Rehefa afaka ny roa andro dia niala tao Jesosy ka nankany Galilia. '
  '44':
  - type: text
    content: 'Fa Jesosy tenany no nanambara fa tsy misy mpaminany omen-kaja ao amin’ny taniny. '
  '45':
  - type: text
    content: Koa rehefa tonga tany Galilia Izy dia nandray Azy ny Galiliana satria efa hitany izay rehetra nataony tany Jerosalema tamin’ny andro firavoravoana; fa mba niakatra tamin’ny andro firavoravoana koa izy ireo.
  '46':
  - type: text
    content: Ary tonga tany Kana any Galilia indray Jesosy, dia tany amin’ilay nampodiany ny rano ho divay.
  - type: heading
    content: Ampit. Mat 8.5-13; Lio 7.1-10
  - type: text
    content: 'Nisy tandapa iray tany Kapernaomy izay nanana zanakalahy narary. '
  '47':
  - type: text
    content: 'Rehefa nahare izy fa Jesosy efa tonga tany Galilia avy tany '
  - type: text
    content: Jodia
  - type: text
    content: ' dia nankany Aminy izy ka nangataka Azy mba hidina any aminy sy hanasitrana ny zanany izay efa ho faty. '
  '48':
  - type: text
    content: 'Dia hoy Jesosy taminy: Raha tsy mahita famantarana sy fahagagana ianareo dia tsy mba hety hino mihitsy. '
  '49':
  - type: text
    content: 'Hoy ilay tandapa taminy: Tompoko, midìna re dieny tsy mbola maty ny zanako. '
  '5':
  - type: text
    content: 'Tonga tao an-tanàna iray any Samaria, izay atao hoe Sikara, Jesosy; izy io dia akaikin’ny tany izay nomen’i Jakoba ho an’i Josefa zanany. '
  '50':
  - type: text
    content: 'Hoy Jesosy taminy: Andeha mody; velona ny zanakao.'
  - type: text
    content: 'Ary nino ny teny izay nolazain’i Jesosy taminy Ralehilahy ka lasa nody. '
  '51':
  - type: text
    content: 'Nony nidina izy dia nitsena azy ireo mpanompony ka nilaza fa velona ny zanany. '
  '52':
  - type: text
    content: 'Ary nanontany azy ny ora izay nahasitranany izy. Dia hoy ireo taminy: Omaly tamin’ny ora fahafito no nialan’ny tazo taminy. '
  '53':
  - type: text
    content: 'Koa fantatry ny rainy fa tamin’izay indrindra no ora nitenenan’i Jesosy taminy hoe: Velona ny zanakao. Dia nino izy mbamin’ny ankohonany rehetra. '
  '54':
  - type: text
    content: Izany no famantarana faharoa nataon’i Jesosy, fony Izy tonga tany Galilia avy tany Jodia.
  '6':
  - type: text
    content: Ary teo ilay fantsakan’i Jakoba. Koa satria sasatra tamin’ny nalehany Jesosy dia nipetraka teo am-pantsakana, rehefa tokony ho tamin’ny ora fahenina.
  '7':
  - type: text
    content: 'Ary nisy vehivavy '
  - type: text
    content: samaritana
  - type: text
    content: ' iray avy hantsaka rano; dia hoy Jesosy taminy: Omeo Aho hosotroiko. '
  '8':
  - type: text
    content: 'Fa efa lasa nankany an-tanàna hividy hanina ny mpianany. '
  '9':
  - type: text
    content: 'Fa hoy Ravehivavy samaritana Taminy: '
  - type: text
    content: Jiosy
  - type: text
    content: ' Ianao ka nahoana no mangataka amiko rano hosotroina nefa aho vehivavy samaritana? Fa ny Jiosy dia tsy manan-draharaha amin’ny Samaritana. '
