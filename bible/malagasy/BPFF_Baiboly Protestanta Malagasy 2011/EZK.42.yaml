document_id: EZK.42,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ireo kojakoja manodidina ny tempoly
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Dia noentiny nivoaka nianavaratra ho any amin’ny kianja ivelany aho, ary nampidiriny ho ao amin’ny efitrano tandrifin’ny kianja voafaritra sady tandrifin’ilay vatan-trano eo amin’ny avaratra. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Nisy efitrano koa teo amin’ny sakan’ny ampiantany teo amin’ny kianja, teo amin’ny atsinanana, tandrifin’ilay kianja voafaritra sady tandrifin’ny vatan-trano. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Nisy lalana teo anoloany, ary tahaka ny endriky ny efitrano teo amin’ny avaratra ny fijery azy sady mitovy amin’ireo avokoa ny lavany sy ny sakany ary ny fivoahana avy ao aminy mbamin’ny fombafombany rehetra sy ny varavarany. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Tahaka ny varavaran’ny efitrano eo amin’ny atsimo dia nisy varavarana koa teo amin’ny fiandohan’ny lalana, dia ilay lalana eo anoloan’ny ampiantany mifanolotra aminy, dia ny lalana avy eo amin’ny atsinanana, raha miditra ao aminy. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Dia hoy izy tamiko: Ny efitrano avaratra sy ny efitrano atsimo izay eo anoloan’ny kianja voatokana, dia efitrano masina; any ny mpisorona izay manatona NY TOMPO no mihinana ny zavatra masina indrindra; any no hametrahany izay zavatra masina indrindra, dia ny fanatitra avy amin’ny vokatry ny tany sy ny fanatitra noho ny ota ary ny fanati-panonerana. Masina io toerana io. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Rehefa miditra ao ny mpisorona dia tsy hiala amin’ny fitoerana masina ho any amin’ny kianja ivelany izy, fa ao no hametrahany ny fitafiana masina izay noentiny nanao fanompoana satria masina ireo; ary hitafy fitafiana hafa izy vao manatona ny vahoaka.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny refin’ny fefy amin’ny kianja
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Nony voarefiny ny Trano anatiny dia noentiny nivoaka nankany amin’ny vavahady izay manatrika ny atsinanana aho, ary nandrefy ny manodidina izy. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Norefesiny tamin’ny volotara fandrefesana ny lafiny atsinanana ka indimanjaton’ny volotara manodidina, tamin’ny volatara fandrefesana. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Norefesiny koa ny lafiny avaratra ka indimanjaton’ny volotara manodidina, tamin’ny volotara fandrefesana. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Norefesiny koa ny lafiny atsimo ka indimanjaton’ny volotara, tamin’ny volotara fandrefesana. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Nitodika nankany amin’ny lafiny andrefana izy ka nandrefy indimanjaton’ny volotara, tamin’ny volotara fandrefesana. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Io vatan-trano io, izay nisy ny varavarana avaratra, dia zato '
    - type: usfm
      marker: w
      children:
      - type: text
        text: hakiho
    - type: text
      text: ' ny lavany ary dimampolo hakiho ny sakany. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Norefesiny avokoa ny lafiny efatra. Nisy ampiantany manodidina, indimanjaton’ny volotara fandrefesana ny lavany ary indimanjatony koa ny sakany, hampiavaka ny masina sy ny tsy masina.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Tandrifin’ny roapolo hakiho amin’ny kianja anatiny sady tandrifin’ny lampivato amin’ny kianja ivelany dia nisy lalantsara nifanandrify tamin’ny lalantsara telo miantoana. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Teo anoloan’ireo efitrano dia nisy lalana mankao anatiny, folo hakiho ny sakany, ary lalana zato hakiho izany; nanatrika ny avaratra ny varavarany. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ary nohakelezina ny efitrano ambony fa nanalana ny ho lalantsara ka izany no nahakely azy noho ny ambany sy ny antenantenany. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Natao rihana telo ireo fa tsy nisy andry tahaka ny andrin’ny kianja ka izany no nahakely azy noho ny ao ambany sy ny ao antenantenany, hatreny amin’ny tany. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ary nisy ampiantany teo ivelany, tandrifin’ny efitrano, nanatrika ny kianja ivelany, teo anoloan’ny efitrano ka dimampolo hakiho ny lavany. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Fa ny lavan’ireo efitrano izay teo amin’ny kianja ivelany dia dimampolo hakiho; ary indro, ny teo anoloan’ny tempoly dia zato hakiho. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Teo ambanin’ireo efitrano ireo dia nisy fidirana avy eo atsinanana raha miditra avy eo amin’ny kianja ivelany.
