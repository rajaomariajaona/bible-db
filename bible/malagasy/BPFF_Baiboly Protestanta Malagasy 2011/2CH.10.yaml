document_id: 2CH.10
type_code: plt
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: TANTARAN’IREO MPANJAKAN’NY JODA
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fivoriana tao Sekema
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 1Mpa 12.1-15
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Nankany Sekema i Rehoboama, fa tonga tany ny Israely rehetra hampanjaka azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Koa raha nandre izany i Jeroboama, zanak’i Nebata, izay efa nandositra nankany Ejipta niala teo anatrehan’i Solomona mpanjaka, dia niverina avy tany Ejipta. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary nandefa iraka haka azy ny olona. Dia tonga i Jeroboama sy ny Israely rehetra ka niteny tamin’i Rehoboama hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Rainao dia nampitondra zioga mavesatra anay; fa ankehitriny, mba hamaivano ny fanompoana mafy nampanaovin’ny rainao sy ny zioga mavesatra izay nampitondrainy anay, dia hanompo anao izahay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Fa hoy kosa izy taminy: Rehefa afaka hateloana dia miverena atỳ amiko indray. Dia lasa ny olona.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Naka hevitra tamin’ny zokiolona izay nanompo an’i Solomona rainy fony fahavelony i Rehoboama mpanjaka ka hoy izy hoe: Ahoana no hevitra omenareo mba hamaliana ny vahoaka? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dia hoy ireo taminy: Raha tsara amin’ny vahoaka ianao ka mankasitraka azy sy manao teny mora aminy dia ho mpanomponao mandrakizay izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Nefa nolavin’i Rehoboama ny torohevitra nomen’ireo zokiolona azy, dia naka hevitra tamin’ny tanora izay indray nihira taminy sady efa nitoetra teo anatrehany izy ka niteny taminy hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ahoana kosa no mba hevitra omenareo ka havalintsika ny vahoaka izay niteny tamiko hoe: Hamaivano ny zioga izay nampitondrain’ny rainao anay? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary ireo tanora indray nihira taminy dia niteny taminy hoe: Izao no lazao amin’ny vahoaka izay niteny taminao hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Rainao dia nampitondra zioga mavesatra anay;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ianao kosa, mba hamaivano aminay izany!
- type: usfm
  marker: m
  children:
  - type: text
    text: 'Koa izao no lazao aminy:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny ankikeliko dia lehibe noho ny andilan’ny raiko;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: koa raha nampitondra zioga mavesatra anareo ny raiko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: izaho kosa dia mainka hanampy ny zioga hoentinareo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: kotopia no namaizan’ny raiko anareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa kotopia misy fantsika kosa no hamaizako anareo.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary i Jeroboama sy ny vahoaka rehetra dia nankany amin’i Rehoboama tamin’ny andro fahatelo, araka ilay nolazain’ny mpanjaka hoe: Miverena atỳ amiko indray amin’ny andro fahatelo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dia nanao teny mafy tamin’ny olona i Rehoboama mpanjaka fa tsy niraharaha ny hevitra nomen’ireo zokiolona azy izy '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'ka niteny taminy araka ny hevitra nomen’ireo tanora hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nampitondra zioga mavesatra anareo ny raiko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa izaho kosa dia vao mainka hanampy izany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: kotopia no namaizan’ny raiko anareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa kotopia misy fantsika kosa no hamaizako anareo.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Dia tsy nihaino ny olona ny mpanjaka, fa fitondrana avy tamin’Andriamanitra izany zavatra izany, mba hahatanteraka ny teniny izay nampilazainy an’i Ahia silonita tamin’i Jeroboama, zanak’i Nebata.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fahavakisan’ny fanjakan’ny Israely
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 1Mpa 12.16-19
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Nony hitan’ny Israely rehetra fa tsy nihaino azy ny mpanjaka dia hoy ny vahoaka tamin’ny mpanjaka:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Inona moa no anjaranay amin’i Davida?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy manana lova amin’ny zanak’i Jese izahay.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Samia mody any an-dainy avy, ry Israely e!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ankehitriny, tsinjovy ny taranakao, ry Davida ô.
- type: usfm
  marker: m
  children:
  - type: text
    text: Dia samy nody ho any an-dainy avy ny Israely rehetra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Fa ny Zanak’Israely izay nonina tany amin’ny tanànan’ny Joda ihany no nanjakan’i Rehoboama. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Dia naniraka an’i Adorama, mpifehy ny mpanao fanompoana, i Rehoboama mpanjaka, nefa nitora-bato azy ny Zanak’Israely ka maty izy. Dia niezaka niakatra haingana amin’ny kalesy fitondrany miady i Rehoboama mpanjaka handositra ho any Jerosalema. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ary mandraka androany dia mikomy amin’ny taranak’i Davida ny Israely.
