document_id: 2CH.10,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: TANTARAN’IREO MPANJAKAN’NY JODA
  - type: heading
    content: Ny fivoriana tao Sekema
  - type: heading
    content: 1Mpa 12.1-15
  - type: text
    content: 'Nankany Sekema i Rehoboama, fa tonga tany ny Israely rehetra hampanjaka azy. '
  '10':
  - type: text
    content: 'Ary ireo tanora indray nihira taminy dia niteny taminy hoe: Izao no lazao amin’ny vahoaka izay niteny taminao hoe:'
  - type: text
    content: Rainao dia nampitondra zioga mavesatra anay;
  - type: text
    content: fa ianao kosa, mba hamaivano aminay izany!
  - type: text
    content: 'Koa izao no lazao aminy:'
  - type: text
    content: Ny ankikeliko dia lehibe noho ny andilan’ny raiko;
  '11':
  - type: text
    content: koa raha nampitondra zioga mavesatra anareo ny raiko,
  - type: text
    content: izaho kosa dia mainka hanampy ny zioga hoentinareo;
  - type: text
    content: kotopia no namaizan’ny raiko anareo,
  - type: text
    content: fa kotopia misy fantsika kosa no hamaizako anareo.
  '12':
  - type: text
    content: 'Ary i Jeroboama sy ny vahoaka rehetra dia nankany amin’i Rehoboama tamin’ny andro fahatelo, araka ilay nolazain’ny mpanjaka hoe: Miverena atỳ amiko indray amin’ny andro fahatelo. '
  '13':
  - type: text
    content: 'Dia nanao teny mafy tamin’ny olona i Rehoboama mpanjaka fa tsy niraharaha ny hevitra nomen’ireo zokiolona azy izy '
  '14':
  - type: text
    content: 'ka niteny taminy araka ny hevitra nomen’ireo tanora hoe:'
  - type: text
    content: Nampitondra zioga mavesatra anareo ny raiko,
  - type: text
    content: fa izaho kosa dia vao mainka hanampy izany;
  - type: text
    content: kotopia no namaizan’ny raiko anareo,
  - type: text
    content: fa kotopia misy fantsika kosa no hamaizako anareo.
  '15':
  - type: text
    content: Dia tsy nihaino ny olona ny mpanjaka, fa fitondrana avy tamin’Andriamanitra izany zavatra izany, mba hahatanteraka ny teniny izay nampilazainy an’i Ahia silonita tamin’i Jeroboama, zanak’i Nebata.
  - type: heading
    content: Ny fahavakisan’ny fanjakan’ny Israely
  - type: heading
    content: 1Mpa 12.16-19
  '16':
  - type: text
    content: 'Nony hitan’ny Israely rehetra fa tsy nihaino azy ny mpanjaka dia hoy ny vahoaka tamin’ny mpanjaka:'
  - type: text
    content: Inona moa no anjaranay amin’i Davida?
  - type: text
    content: Tsy manana lova amin’ny zanak’i Jese izahay.
  - type: text
    content: Samia mody any an-dainy avy, ry Israely e!
  - type: text
    content: Ankehitriny, tsinjovy ny taranakao, ry Davida ô.
  - type: text
    content: Dia samy nody ho any an-dainy avy ny Israely rehetra.
  '17':
  - type: text
    content: 'Fa ny Zanak’Israely izay nonina tany amin’ny tanànan’ny Joda ihany no nanjakan’i Rehoboama. '
  '18':
  - type: text
    content: 'Dia naniraka an’i Adorama, mpifehy ny mpanao fanompoana, i Rehoboama mpanjaka, nefa nitora-bato azy ny Zanak’Israely ka maty izy. Dia niezaka niakatra haingana amin’ny kalesy fitondrany miady i Rehoboama mpanjaka handositra ho any Jerosalema. '
  '19':
  - type: text
    content: Ary mandraka androany dia mikomy amin’ny taranak’i Davida ny Israely.
  '2':
  - type: text
    content: 'Koa raha nandre izany i Jeroboama, zanak’i Nebata, izay efa nandositra nankany Ejipta niala teo anatrehan’i Solomona mpanjaka, dia niverina avy tany Ejipta. '
  '3':
  - type: text
    content: 'Ary nandefa iraka haka azy ny olona. Dia tonga i Jeroboama sy ny Israely rehetra ka niteny tamin’i Rehoboama hoe: '
  '4':
  - type: text
    content: 'Rainao dia nampitondra zioga mavesatra anay; fa ankehitriny, mba hamaivano ny fanompoana mafy nampanaovin’ny rainao sy ny zioga mavesatra izay nampitondrainy anay, dia hanompo anao izahay. '
  '5':
  - type: text
    content: 'Fa hoy kosa izy taminy: Rehefa afaka hateloana dia miverena atỳ amiko indray. Dia lasa ny olona.'
  '6':
  - type: text
    content: 'Naka hevitra tamin’ny zokiolona izay nanompo an’i Solomona rainy fony fahavelony i Rehoboama mpanjaka ka hoy izy hoe: Ahoana no hevitra omenareo mba hamaliana ny vahoaka? '
  '7':
  - type: text
    content: 'Dia hoy ireo taminy: Raha tsara amin’ny vahoaka ianao ka mankasitraka azy sy manao teny mora aminy dia ho mpanomponao mandrakizay izy. '
  '8':
  - type: text
    content: 'Nefa nolavin’i Rehoboama ny torohevitra nomen’ireo zokiolona azy, dia naka hevitra tamin’ny tanora izay indray nihira taminy sady efa nitoetra teo anatrehany izy ka niteny taminy hoe: '
  '9':
  - type: text
    content: 'Ahoana kosa no mba hevitra omenareo ka havalintsika ny vahoaka izay niteny tamiko hoe: Hamaivano ny zioga izay nampitondrain’ny rainao anay? '
