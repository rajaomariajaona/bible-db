      text: nefa tsy naharesy ahy izy.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toy ny fanaon’ny mpiasa tany no niasany ny lamosiko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka nanalava ny vavaasany izy.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Marina NY TOMPO;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: efa notapahany ny fatorana nataon’ny ratsy fanahy.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka ho menatra sy hihemotra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'izay rehetra mankahala an’i '
    - type: usfm
