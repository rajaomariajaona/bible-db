document_id: EZK.31,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Fanoharana ny amin’ilay hazo sedera voakapa
  - type: text
    content: 'Tamin’ny andro voalohany tamin’ny volana fahatelo, tamin’ny taona fahiraika amby folo dia tonga tamiko ny tenin’NY TOMPO hoe:'
  '10':
  - type: text
    content: 'Koa izany no nitenenan’NY TOMPO Andriamanitra hoe: Satria nisandratra avo ianao ka nanandratra ny lohanao teo amin’ny rahona matevina, ary nirehareha ny fonao noho ny haavony, '
  '11':
  - type: text
    content: 'dia hatolotro eo an-tanan’ilay mahery amin’ny firenena ianao; hamely anao tokoa io; noho ny faharatsianao no nandroahako anao. '
  '12':
  - type: text
    content: Izay fahavalo masiaka indrindra amin’ny firenena no nanapaka azy sady nanary azy; ary dia nihahaka teny an-tendrombohitra sy lohasaha rehetra teny ny sampany, ary notapatapahina teny amoron’ny ony rehetra amin’ny tany ny rantsany; dia nidina niala tamin’ny alokalony ny firenena rehetra ka nahafoy azy.
  '13':
  - type: text
    content: Mipetraka eo amin’ny vatany nianjera ny voromanidina rehetra
  - type: text
    content: ary eny amin’ny sampany ny bibidia rehetra
  '14':
  - type: text
    content: mba tsy hisy hiavonavona intsony noho ny haavony ny hazo rehetra eny amoron’ny rano, na hanandratra ny lohany ho eo amin’ny rahona matevina sady tsy hisy hitoky amin’ny haavony intsony ny hazo mifo-drano rehetra. Fa voatolotra ho faty ho any ambanin’ny tany izy rehetra, ho any amin’ny zanak’olombelona, dia any amin’izay midina any an-davaka.
  '15':
  - type: text
    content: 'Izao no lazain’NY TOMPO Andriamanitra: Tamin’ny andro nidinany ho any amin’ny '
  - type: text
    content: fitoeran’ny maty
  - type: text
    content: ' dia nampanao fisaonana Aho: Nanarona ny rano any amin’ny '
  - type: text
    content: lalina
  - type: text
    content: ' noho ny aminy Aho sady nanampina ny ony avy aminy ka nijanona ny ranobe; nampisaoniko i Libanona noho ny aminy ka nalazo noho izany ny hazo rehetra tany an-tsaha. '
  '16':
  - type: text
    content: 'Tamin’ny fiezinezin’ny fianjerany dia nampihorohoroiko ny firenena rehefa nampidiniko ho any amin’ny fitoeran’ny maty izy ho naman’izay midina any an-davaka; ary ny hazo rehetra any Edena, dia ny notsongaina sady soa indrindra any Libanona, izay mifo-drano rehetra, dia samy nampionona ny tenany any ambanin’ny tany. '
  '17':
  - type: text
    content: Ireo koa dia niara-nidina taminy ho any amin’ny fitoeran’ny maty ho any amin’izay voatrabaky ny sabatra, mbamin’ireo izay nianteherany ka nipetraka teo ambanin’ny alokalony teo amin’ny firenena.
  '18':
  - type: text
    content: Tahaka an’iza amin’ny hazo any Edena moa ianao amin’izao voninahitra sy fahalehibiazana izao? Hampidinina ho any ambanin’ny tany miaraka amin’ny hazo any Edena ianao. Eo amin’ny tsy voafora no hiamparanao, dia eo amin’izay voatrabaky ny sabatra. I Farao sy ny vahoakany marobe rehetra izany, hoy NY TOMPO Andriamanitra.
  '2':
  - type: text
    content: 'Ry '
  - type: text
    content: zanak’olona
  - type: text
    content: ', lazao amin’i Farao mpanjakan’i Ejipta sy amin’ny vahoakany marobe hoe:'
  - type: text
    content: Tahaka an’iza moa ianao amin’ny fahalehibiazanao?
  '3':
  - type: text
    content: Indro, i Asiria dia sedera tsara rantsana any Libanona,
  - type: text
    content: misandrahaka manalokaloka sady mijoroaka avo
  - type: text
    content: ka mitehika amin’ny rahona matevina ny tendrony.
  '4':
  - type: text
    content: Ny rano no nahalehibe azy,
  - type: text
    content: eny, ny rano any amin’ny lalina no nampijoroaka azy,
  - type: text
    content: ary ny ranovelona no nandeha
  - type: text
    content: manodidina ny tany nambolena azy
  - type: text
    content: ka nampandeha ny lakandranony
  - type: text
    content: hankany amin’ny hazo rehetra any an-tsaha.
  '5':
  - type: text
    content: Koa nisandratra ho avo
  - type: text
    content: noho ny hazo rehetra any an-tsaha izy,
  - type: text
    content: ary nihamaro ny sampany
  - type: text
    content: sady nihalava ny rantsany
  - type: text
    content: noho ny habetsahan’ny rano tamin’ny fisandrahany.
  '6':
  - type: text
    content: Teo amin’ny sampany
  - type: text
    content: no nanaovan’ny voromanidina rehetra akany
  - type: text
    content: ary teo ambanin’ny rantsany
  - type: text
    content: no niterahan’ny bibidia rehetra,
  - type: text
    content: sady teo amin’ny alokalony no nitoeran’ny firenena marobe.
  '7':
  - type: text
    content: Koa tsara tarehy tamin’ny fahalehibiazany
  - type: text
    content: sy ny halavan’ny sampany izy,
  - type: text
    content: fa tany amin’ny rano maro ny vahany.
  '8':
  - type: text
    content: Tsy nahatakona azy ny sedera tao amin’ny sahan’Andriamanitra;
  - type: text
    content: tsy mba nahatoraka ny sampany ny hazo kipreso,
  - type: text
    content: tsy mba nanana rantsana tahaka azy ny hazo platana;
  - type: text
    content: tsy nisy tsara tarehy tahaka azy
  - type: text
    content: ny hazo rehetra tany amin’ny sahan’Andriamanitra.
  '9':
  - type: text
    content: Nohatsaraiko tamin’ny haben’ny rantsany ny tarehiny
  - type: text
    content: ka nialona azy ny hazo rehetra tany Edena,
  - type: text
    content: dia ireo tany amin’ny sahan’Andriamanitra.
