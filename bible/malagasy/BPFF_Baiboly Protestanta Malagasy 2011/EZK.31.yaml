document_id: EZK.31
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fanoharana ny amin’ilay hazo sedera voakapa
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Tamin’ny andro voalohany tamin’ny volana fahatelo, tamin’ny taona fahiraika amby folo dia tonga tamiko ny tenin’NY TOMPO hoe:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ry '
  - type: usfm
    marker: w
    children:
    - type: text
      text: zanak’olona
  - type: text
    text: ', lazao amin’i Farao mpanjakan’i Ejipta sy amin’ny vahoakany marobe hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tahaka an’iza moa ianao amin’ny fahalehibiazanao?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Indro, i Asiria dia sedera tsara rantsana any Libanona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: misandrahaka manalokaloka sady mijoroaka avo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka mitehika amin’ny rahona matevina ny tendrony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ny rano no nahalehibe azy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, ny rano any amin’ny lalina no nampijoroaka azy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny ranovelona no nandeha
- type: usfm
  marker: q1
  children:
  - type: text
    text: manodidina ny tany nambolena azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka nampandeha ny lakandranony
- type: usfm
  marker: q1
  children:
  - type: text
    text: hankany amin’ny hazo rehetra any an-tsaha.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Koa nisandratra ho avo
- type: usfm
  marker: q1
  children:
  - type: text
    text: noho ny hazo rehetra any an-tsaha izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary nihamaro ny sampany
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady nihalava ny rantsany
- type: usfm
  marker: q1
  children:
  - type: text
    text: noho ny habetsahan’ny rano tamin’ny fisandrahany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Teo amin’ny sampany
- type: usfm
  marker: q1
  children:
  - type: text
    text: no nanaovan’ny voromanidina rehetra akany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary teo ambanin’ny rantsany
- type: usfm
  marker: q1
  children:
  - type: text
    text: no niterahan’ny bibidia rehetra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady teo amin’ny alokalony no nitoeran’ny firenena marobe.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Koa tsara tarehy tamin’ny fahalehibiazany
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny halavan’ny sampany izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa tany amin’ny rano maro ny vahany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Tsy nahatakona azy ny sedera tao amin’ny sahan’Andriamanitra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy mba nahatoraka ny sampany ny hazo kipreso,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy mba nanana rantsana tahaka azy ny hazo platana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy nisy tsara tarehy tahaka azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny hazo rehetra tany amin’ny sahan’Andriamanitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Nohatsaraiko tamin’ny haben’ny rantsany ny tarehiny
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka nialona azy ny hazo rehetra tany Edena,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ireo tany amin’ny sahan’Andriamanitra.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Koa izany no nitenenan’NY TOMPO Andriamanitra hoe: Satria nisandratra avo ianao ka nanandratra ny lohanao teo amin’ny rahona matevina, ary nirehareha ny fonao noho ny haavony, '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'dia hatolotro eo an-tanan’ilay mahery amin’ny firenena ianao; hamely anao tokoa io; noho ny faharatsianao no nandroahako anao. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Izay fahavalo masiaka indrindra amin’ny firenena no nanapaka azy sady nanary azy; ary dia nihahaka teny an-tendrombohitra sy lohasaha rehetra teny ny sampany, ary notapatapahina teny amoron’ny ony rehetra amin’ny tany ny rantsany; dia nidina niala tamin’ny alokalony ny firenena rehetra ka nahafoy azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Mipetraka eo amin’ny vatany nianjera ny voromanidina rehetra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary eny amin’ny sampany ny bibidia rehetra
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: mba tsy hisy hiavonavona intsony noho ny haavony ny hazo rehetra eny amoron’ny rano, na hanandratra ny lohany ho eo amin’ny rahona matevina sady tsy hisy hitoky amin’ny haavony intsony ny hazo mifo-drano rehetra. Fa voatolotra ho faty ho any ambanin’ny tany izy rehetra, ho any amin’ny zanak’olombelona, dia any amin’izay midina any an-davaka.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Izao no lazain’NY TOMPO Andriamanitra: Tamin’ny andro nidinany ho any amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: fitoeran’ny maty
  - type: text
    text: ' dia nampanao fisaonana Aho: Nanarona ny rano any amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: lalina
  - type: text
    text: ' noho ny aminy Aho sady nanampina ny ony avy aminy ka nijanona ny ranobe; nampisaoniko i Libanona noho ny aminy ka nalazo noho izany ny hazo rehetra tany an-tsaha. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Tamin’ny fiezinezin’ny fianjerany dia nampihorohoroiko ny firenena rehefa nampidiniko ho any amin’ny fitoeran’ny maty izy ho naman’izay midina any an-davaka; ary ny hazo rehetra any Edena, dia ny notsongaina sady soa indrindra any Libanona, izay mifo-drano rehetra, dia samy nampionona ny tenany any ambanin’ny tany. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ireo koa dia niara-nidina taminy ho any amin’ny fitoeran’ny maty ho any amin’izay voatrabaky ny sabatra, mbamin’ireo izay nianteherany ka nipetraka teo ambanin’ny alokalony teo amin’ny firenena.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Tahaka an’iza amin’ny hazo any Edena moa ianao amin’izao voninahitra sy fahalehibiazana izao? Hampidinina ho any ambanin’ny tany miaraka amin’ny hazo any Edena ianao. Eo amin’ny tsy voafora no hiamparanao, dia eo amin’izay voatrabaky ny sabatra. I Farao sy ny vahoakany marobe rehetra izany, hoy NY TOMPO Andriamanitra.
