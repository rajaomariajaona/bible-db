document_id: JOS.14,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Fizarana an’i Kanana
  - type: text
    content: 'Izao no nolovan’ny Zanak’Israely tao amin’ny tany Kanana izay nampandovain’i Eleazara mpisorona sy i Josoa, zanak’i Nona, ary ny lohan’ny fokon’ny Zanak’Israely azy. '
  '10':
  - type: text
    content: 'Ary ankehitriny indro, efa namelona ahy NY TOMPO, araka izay nolazainy hatramin’ny dimy amby efapolo taona lasa izay, dia hatramin’ny nilazan’NY TOMPO izany teny izany tamin’i Mosesy no ho mankaty, raha mbola nandehandeha tany an-tany efitra ny Israely; ary ankehitriny indro, efa dimy amby valopolo taona aho izao. '
  '11':
  - type: text
    content: 'Nefa mbola matanjaka ihany aho izao tahaka ny tamin’ny andro nanirahan’i Mosesy ahy: Tahaka ny tanjako tamin’izany ihany no mbola tanjako ankehitriny, na hivoaka hiady na hiverina. '
  '12':
  - type: text
    content: Koa ankehitriny, omeo ahy irỳ tendrombohitra irỳ, izay nolazain’NY TOMPO tamin’izany andro izany; fa efa renao tamin’io andro io fa mitoetra ao ny Anakita sady misy tanàna lehibe mimanda ao; angamba homba ahy NY TOMPO, dia haharoaka azy aho, araka izay nolazain’NY TOMPO.
  '13':
  - type: text
    content: 'Dia nitsodrano azy i Josoa ka nanome an’i Hebrona ho lovan’i Kaleba, zanak’i Jefone. '
  '14':
  - type: text
    content: 'Izany no nahatonga an’i Hebrona ho lovan’i Kaleba, zanak’i Jefone, kenizita, mandraka androany, satria tanteraka tamin’ny fanarahana NY TOMPO, Andriamanitry ny Israely, izy. '
  '15':
  - type: text
    content: Ary i Kiriata-Arba no anaran’i Hebrona taloha; ilay lehilahy vaventy tamin’ny Anakita izany i Arba izany. Dia nandry ny tany ka tsy nisy ady intsony.
  '2':
  - type: text
    content: 'Tamin’ny antsapaka no nahazoany ny lovany, araka izay nandidian’NY TOMPO an’i Mosesy ny amin’ny foko sivy sy sasany. '
  '3':
  - type: text
    content: 'Fa efa nomen’i Mosesy lova tany andafin’i Jordana ny foko roa sy sasany; fa ny taranak’i Levy dia tsy mba nomeny lova teo aminy. '
  '4':
  - type: text
    content: 'Foko roa ny taranak’i Josefa, dia i Manase sy i Efraima; ary tsy mba nomeny anjara teo amin’ny tany ny taranak’i Levy, afa-tsy ny tanàna onenany sy ny tany manodidina ny tanànany ho an’ny omby aman’ondriny sy ny fananany. '
  '5':
  - type: text
    content: Araka izay nandidian’NY TOMPO an’i Mosesy no nataon’ny Zanak’Israely, dia nizara ny tany izy.
  '6':
  - type: text
    content: 'Dia nankany amin’i Josoa tany Gilgala ny taranak’i Joda; ary i Kaleba, zanak’i Jefone, kenizita, dia niteny taminy hoe: Fantatrao ny teny izay nolazain’NY TOMPO tamin’i Mosesy, lehilahin’Andriamanitra, ny amiko sy ny aminao tany Kadesy-Barnea. '
  '7':
  - type: text
    content: 'Efapolo taona aho fony aho nirahin’i Mosesy, mpanompon’NY TOMPO, hiala tany Kadesy-Barnea hisafo ny tany; dia niverina aho nitondra teny taminy araka izay tao am-poko. '
  '8':
  - type: text
    content: 'Kanefa ireo rahalahiko izay niara-niakatra tamiko dia nanaketraka ny fon’ny olona fa izaho kosa dia tanteraka tamin’ny fanarahana NY TOMPO Andriamanitro. '
  '9':
  - type: text
    content: 'Dia nianiana i Mosesy tamin’izany andro izany ka nilaza hoe: Ny tany izay nodiavin’ny tongotrao dia ho lovanao sy ny taranakao tokoa mandrakizay satria tanteraka tamin’ny fanarahana NY TOMPO Andriamanitro ianao. '
