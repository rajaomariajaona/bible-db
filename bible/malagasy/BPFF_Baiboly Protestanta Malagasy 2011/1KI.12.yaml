document_id: 1KI.12,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fivoriana tao Sekema
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 2Tan 10.1-15
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ary i Rehoboama dia nankany Sekema satria tonga tany ny Israely rehetra hampanjaka azy. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Hoy ny navalin’ireo tanora indray nihira taminy: Raha niteny taminao ny vahoaka hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rainao dia nampitondra zioga mavesatra anay;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ianao kosa, mba hamaivano aminay izany!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Dia izao no lazao aminy:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny ankihikeliko dia lehibe noho ny andilan’ny raiko.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Koa raha nampitondra zioga mavesatra anareo ny raiko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izaho kosa dia mainka hanampy ny zioga hoentinareo!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Kotopia no namaizan’ny raiko anareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa kotopia misy fantsika kosa no hamaizako anareo.
  '12':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Ary nankany amin’i Rehoboama tamin’ny andro fahatelo i Jeroboama sy ny vahoaka rehetra, araka ilay nolazain’ny mpanjaka hoe: Miverena atỳ amiko indray amin’ny andro fahatelo. '
  '13':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ary nanao teny mafy tamin’ny olona ny mpanjaka fa tsy niraharaha ny torohevitra nomen’ireo zokiolona azy '
  '14':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'ka niteny taminy araka ny hevitra nomen’ireo tanora hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny raiko dia nampitondra zioga mavesatra anareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa izaho kosa dia mainka hanampy ny zioga hoentinareo!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Kotopia no namaizan’ny raiko anareo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa kotopia misy fantsika kosa no hamaizako anareo!
  '15':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Tsy nihaino ny olona ny mpanjaka; avy tamin’NY TOMPO anefa izany fandehan-javatra izany mba hahatanteraka ny teniny izay nampilazainy an’i Ahia silonita tamin’i Jeroboama, zanak’i Nebata.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Nivaky roa ny fanjakan’ny Israely
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 2Tan 10.16-19
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Nony hitan’ny Israely rehetra fa tsy nihaino azy ny mpanjaka dia hoy ny vahoaka tamin’ny mpanjaka:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Inona moa no anjaranay amin’i Davida?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy manana lova amin’ny zanak’i Jese izahay!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Samia mody any an-dainy avy, ry Israely e!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ankehitriny, jereo ny tranonao, ry Davida ô!
  - type: usfm
    marker: m
    children:
    - type: text
      text: Dia samy nody ho any an-dainy avy ny Israely.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Fa ny Zanak’Israely izay nonina tany amin’ireo tanànan’i Joda ihany no nanjakan’i Rehoboama.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Ary naniraka an’i Adorama, lehiben’ny mpanao fanompoana, i Rehoboama mpanjaka, nefa ny Israely rehetra dia nitora-bato azy ka maty izy. Dia niezaka nankeo amin’ny kalesy fitondrany miady i Rehoboama mpanjaka ka nandositra ho any Jerosalema. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Koa nikomy tamin’ny taranak’i Davida ny Israely mandraka androany.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Mbola tany Ejipta i Jeroboama, zanak’i Nebata, raha nandre izany; tany Ejipta mantsy no nalehany tamin’izy nandositra an’i Solomona mpanjaka ka nonina tany izy. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Rehefa ren’ny Israely rehetra fa tafaverina indray i Jeroboama dia nandefa iraka haka azy ho ao amin’ny fivoriana izy ka nampanjaka azy tamin’ny Israely rehetra. Tsy nisy nanaraka ny taranak’i Davida afa-tsy ny fokon’i Joda irery ihany.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 2Tan 11.1-4
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Nony tonga tany Jerosalema i Rehoboama dia novoriny ny taranak’i Joda rehetra mbamin’ny fokon’i Benjamina, dia miaramila voafantina valo alina sy iray hetsy, hiady amin’ny taranak’Israely mba hampody ny fanjakana indray ho amin’i Rehoboama, zanak’i Solomona. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Kanjo tonga tamin’i Semaia, lehilahin’Andriamanitra, kosa, ny tenin’Andriamanitra hoe: '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Mitenena amin’i Rehoboama, zanak’i Solomona, mpanjakan’i Joda, sy amin’ny taranak’i Joda sy i Benjamina rehetra ary amin’ny vahoaka sisa hoe: '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Izao no lazain’NY TOMPO: Aza mandeha hiady amin’ny Zanak’Israely rahalahinareo! Samia mody any an-tranony avy ianareo, fa avy Amiko izao zavatra izao. Dia nihaino ny tenin’NY TOMPO ny olona ka samy lasa nody araka ny tenin’NY TOMPO.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fahotan’i Jeroboama
    marker-yv: yv-h
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Ary nanamboatra an’i Sekema any amin’ny tany be havoana any Efraima i Jeroboama ka nonina tao; rehefa nivoaka avy tao izy dia nanamboatra an’i Penoela koa.
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Ary i Jeroboama dia niteny anakampo hoe: Izao ny fanjakana dia hiverina amin’ny taranak’i Davida ihany; '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'satria, raha miakatra hamono zavatra hatao fanatitra ao amin’ny tranon’NY TOMPO any Jerosalema ny vahoaka dia hiverina amin’ny tompony indray ny fony, dia amin’i Rehoboama, mpanjakan’ny Joda, koa hamono ahy izy ireo ka hiverina any amin’i Rehoboama, mpanjakan’ny Joda. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Dia nila hevitra ny mpanjaka ka nanao ombilahy kely volamena roa; sady hoy izy tamin’ny olona: Aoka izay ny fiakaranareo any Jerosalema! Ry Israely ô, indreo ny andriamanitrao izay nitondra anao nivoaka avy tany amin’ny tany Ejipta! '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Ny iray dia napetrany tao Betela, fa ny iray hafa kosa tao Dana. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Nandefa iraka haka azy ny olona, dia tonga izy sy ny fiangonana, dia ny Israely rehetra, ka niteny tamin’i Rehoboama hoe: '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Fahotana anefa izany zavatra izany, satria ny olona nandeha teo anatrehan’ny iray tamin’ireo, hatrany Dana. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Ary nanorina trano teny amin’ny toerana fanaovana sorona izy sady nanendry olona avy tao amin’ny vahoaka ho mpisorona, nefa ireo dia tsy avy amin’ny taranak’i Levy akory.
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Nanendry andro firavoravoana tamin’ny andro fahadimy amby folo amin’ny volana fahavalo, tahaka ny andro firavoravoana tamin’ny Joda ihany koa i Jeroboama ka nanolotra fanatitra teo ambonin’ny alitara izy. Toy izany no nataony tao Betela, fa namono zavatra hatao fanatitra ho an’ireo ombilahy kely izay nataony izy. Natsangany tao Betela ireo mpisoron’ny toerana fanaovana sorona izay notendreny. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Dia nanolotra fanatitra teo ambonin’ny alitara izay nataony tao Betela izy tamin’ny andro fahadimy amby folo amin’ny volana fahavalo, volana izay notendreny araka ny sitrapony ihany. Nanao andro firavoravoana ho an’ny Zanak’Israely izy ka sady nanolotra fanatitra teo ambonin’ny alitara no nandoro ditin-kazo manitra.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Rainao dia nampitondra zioga mavesatra anay; fa ianao kosa, mba hamaivano ankehitriny ny fanompoana mafy tamin’ny rainao sy ny zioga mavesatra izay nataony taminay, dia hanompo anao izahay. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Nefa hoy izy tamin’izy ireo: Mandehana aloha, fa raha afaka hateloana dia miverena atỳ amiko indray. Dia lasa ny olona.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Naka hevitra tamin’ny zokiolona izay nanompo an’i Solomona rainy fony fahavelony i Rehoboama mpanjaka ka hoy izy: Ahoana no hevitra omenareo mba havaly ny vahoaka? '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Dia hoy ireo taminy: Raha mety ho mpanompon’ny vahoaka ianao izao ka hanompo azy sy hanao teny mora aminy dia ho mpanomponao mandrakizay izy. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Nefa tsy nahoan’i Rehoboama akory ny torohevitra nomen’ireo zokiolona azy fa naka saina tamin’ireo tanora izay indray nihira taminy sady nanompo azy izy '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'ka niteny tamin’ireo hoe: Ahoana kosa no mba hevitra omenareo ka havalintsika ny vahoaka izay niteny tamiko hoe: Hamaivano ny zioga izay nataon’ny rainao taminay? '
