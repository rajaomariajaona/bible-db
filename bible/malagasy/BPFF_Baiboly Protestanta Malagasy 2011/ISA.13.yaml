document_id: ISA.13,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny loza hanjo an’i Babilona
  - type: text
    content: Ny loza hanjo an’i Babilona araka ny fahitan’Isaia zanak’i Amoza.
  '10':
  - type: text
    content: Fa ny kintan’ny lanitra sy ireo Telonohorefy aza
  - type: text
    content: dia tsy hampamirapiratra ny fahazavany intsony,
  - type: text
    content: ny masoandro dia ho maizina amin’ny fiposahany
  - type: text
    content: ary ny volana dia tsy hangarangarana.
  '11':
  - type: text
    content: Hatsingeriko amin’izao tontolo izao ny faharatsiany,
  - type: text
    content: ary amin’ny ratsy fanahy ny helony;
  - type: text
    content: hatsahatro ny fireharehan’ny mpiavonavona
  - type: text
    content: ary haetriko ny fiavonavonan’ny mpampihorohoro.
  '12':
  - type: text
    content: Hataoko ho saro-tadiavina mihoatra noho ny tena volamena tsy miharo ny olombelona;
  - type: text
    content: eny, mihoatra noho ny volamena tsy miharo avy any Ofira aza.
  '13':
  - type: text
    content: Noho izany dia hampihorohoroiko ny lanitra,
  - type: text
    content: ary hihovotrovotra any amin’ny fanorenany ny tany,
  - type: text
    content: noho ny fahatezeran’Andriamanitra, Tompon’izao rehetra izao,
  - type: text
    content: sy noho ny andro firehetan’ny fahatezerany.
  '14':
  - type: text
    content: Dia ho tahaka ny gazela hazaina ny olona,
  - type: text
    content: ary ho tahaka ny ondry aman’osy tsy misy mpamory
  - type: text
    content: ka samy ho lasa any amin’ny fireneny avy izy;
  - type: text
    content: eny, samy handositra ho any amin’ny taniny avy izy;
  '15':
  - type: text
    content: holefonina izay rehetra azo
  - type: text
    content: ary ho lavon’ny sabatra izay rehetra tratra.
  '16':
  - type: text
    content: Hotorotoroina eo imasony ny zanany madinika;
  - type: text
    content: hobaboina ny tranony
  - type: text
    content: ary hisy hanolana ny vadiny.
  '17':
  - type: text
    content: Indro, hampirisihiko hamely azy ny Mediana
  - type: text
    content: izay tsy miraharaha ny volafotsy
  - type: text
    content: sady tsy mankamamy ny volamena.
  '18':
  - type: text
    content: Handripaka ny zatovo ny tsipìkany
  - type: text
    content: ary tsy hamindrany fo izay ateraky ny kibo;
  - type: text
    content: eny, tsy hiantran’ny masony na dia ny zaza aza.
  '19':
  - type: text
    content: I Babilona izay ravaky ny fanjakana maro,
  - type: text
    content: tabiha sy reharehan’ny Kaldeana,
  - type: text
    content: dia ho rava tahaka ny nandravan’Andriamanitra an’i Sodoma sy i Gomora;
  '2':
  - type: text
    content: Manangàna faneva eo an-tampon’izay tendrombohitra mangadihady ianareo,
  - type: text
    content: manandrata feo hiantso azy,
  - type: text
    content: hofahofay tanana izy
  - type: text
    content: mba hiditra amin’ny vavahadin’ireo olo-manankaja!
  '20':
  - type: text
    content: Tsy honenana intsony izy,
  - type: text
    content: ary tsy hitoerana intsony
  - type: text
    content: hatramin’ny taranaka fara aman-dimby.
  - type: text
    content: Tsy hisy mpifindrafindra monina hanorin-day ao,
  - type: text
    content: na mpiandry ondry hampandry ny ondriny;
  '21':
  - type: text
    content: fa ny biby any an-tany efitra no hitoetra ao,
  - type: text
    content: ho feno vorondolo ny tranony;
  - type: text
    content: ny aotirisy no hitoetra any
  - type: text
    content: ary ny osilahy no hitsambikimbikina any.
  '22':
  - type: text
    content: Ny kary no hifampierona ao an-tranobeny
  - type: text
    content: ary ny amboadia no ho ao amin’ny lapa mirentirenty.
  - type: text
    content: Efa antomotra ny fotoanany
  - type: text
    content: ary tsy hatao ela intsony ny androny.
  '3':
  - type: text
    content: Efa nandidy ireo nohamasiniko Aho
  - type: text
    content: sady niantso ny lehilahy mahery fo;
  - type: text
    content: dia ireo mibitaka sy mirehareha
  - type: text
    content: mba hahatanteraka ny fahatezerako.
  '4':
  - type: text
    content: Injany ny horakoraka any an-tendrombohitra!
  - type: text
    content: Tahaka ny an’ny vahoaka marobe!
  - type: text
    content: Ny tabataba ataon’ireo fanjakana, ireo firenena maro tafatambatra!
  - type: text
    content: Andriamanitra, Tompon’izao rehetra izao,
  - type: text
    content: no misafo tafika hiady.
  '5':
  - type: text
    content: Avy any amin’ny tany lavitra izy ireo,
  - type: text
    content: avy any amin’ny faravodilanitra;
  - type: text
    content: NY TOMPO sy ireo fitaovam-piadian’ny fahatezerany
  - type: text
    content: no avy handrava ny tany rehetra.
  '6':
  - type: text
    content: Midradradradrà ianareo fa antomotra ny Andron’NY TOMPO;
  - type: text
    content: tahaka ny fandravan’ny Tsitoha no fiaviny.
  '7':
  - type: text
    content: Noho izany dia hiraviravy ny tanana rehetra,
  - type: text
    content: ary ho kivy ny fon’ny olona rehetra;
  '8':
  - type: text
    content: Ho toran-kovitra izy;
  - type: text
    content: fanaintainana sy fahoriana no hahazo azy;
  - type: text
    content: hijalijaly tahaka ny vehivavy mihetsi-jaza izy;
  - type: text
    content: samy ho talanjona izy ka hifampijery;
  - type: text
    content: toy ny nodorana afo ny tarehiny.
  '9':
  - type: text
    content: Indro, avy ny Andron’NY TOMPO;
  - type: text
    content: andron’ny loza sy fahavinirana ary firehetan’ny fahatezerana
  - type: text
    content: mba hanafoanana ny tany
  - type: text
    content: sy handringanana ny mpanota tsy ho ao.
