document_id: ISA.13,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny loza hanjo an’i Babilona
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny loza hanjo an’i Babilona araka ny fahitan’Isaia zanak’i Amoza.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny kintan’ny lanitra sy ireo Telonohorefy aza
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia tsy hampamirapiratra ny fahazavany intsony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny masoandro dia ho maizina amin’ny fiposahany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny volana dia tsy hangarangarana.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hatsingeriko amin’izao tontolo izao ny faharatsiany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary amin’ny ratsy fanahy ny helony;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hatsahatro ny fireharehan’ny mpiavonavona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary haetriko ny fiavonavonan’ny mpampihorohoro.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hataoko ho saro-tadiavina mihoatra noho ny tena volamena tsy miharo ny olombelona;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, mihoatra noho ny volamena tsy miharo avy any Ofira aza.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Noho izany dia hampihorohoroiko ny lanitra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hihovotrovotra any amin’ny fanorenany ny tany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: noho ny fahatezeran’Andriamanitra, Tompon’izao rehetra izao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy noho ny andro firehetan’ny fahatezerany.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ho tahaka ny gazela hazaina ny olona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ho tahaka ny ondry aman’osy tsy misy mpamory
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka samy ho lasa any amin’ny fireneny avy izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, samy handositra ho any amin’ny taniny avy izy;
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: holefonina izay rehetra azo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ho lavon’ny sabatra izay rehetra tratra.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hotorotoroina eo imasony ny zanany madinika;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hobaboina ny tranony
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hisy hanolana ny vadiny.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro, hampirisihiko hamely azy ny Mediana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay tsy miraharaha ny volafotsy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady tsy mankamamy ny volamena.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Handripaka ny zatovo ny tsipìkany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy hamindrany fo izay ateraky ny kibo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, tsy hiantran’ny masony na dia ny zaza aza.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I Babilona izay ravaky ny fanjakana maro,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tabiha sy reharehan’ny Kaldeana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ho rava tahaka ny nandravan’Andriamanitra an’i Sodoma sy i Gomora;
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manangàna faneva eo an-tampon’izay tendrombohitra mangadihady ianareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: manandrata feo hiantso azy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hofahofay tanana izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hiditra amin’ny vavahadin’ireo olo-manankaja!
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy honenana intsony izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy hitoerana intsony
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hatramin’ny taranaka fara aman-dimby.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy hisy mpifindrafindra monina hanorin-day ao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na mpiandry ondry hampandry ny ondriny;
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny biby any an-tany efitra no hitoetra ao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho feno vorondolo ny tranony;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny aotirisy no hitoetra any
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny osilahy no hitsambikimbikina any.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny kary no hifampierona ao an-tranobeny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny amboadia no ho ao amin’ny lapa mirentirenty.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Efa antomotra ny fotoanany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy hatao ela intsony ny androny.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Efa nandidy ireo nohamasiniko Aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady niantso ny lehilahy mahery fo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ireo mibitaka sy mirehareha
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hahatanteraka ny fahatezerako.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Injany ny horakoraka any an-tendrombohitra!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tahaka ny an’ny vahoaka marobe!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny tabataba ataon’ireo fanjakana, ireo firenena maro tafatambatra!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Andriamanitra, Tompon’izao rehetra izao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no misafo tafika hiady.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avy any amin’ny tany lavitra izy ireo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avy any amin’ny faravodilanitra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: NY TOMPO sy ireo fitaovam-piadian’ny fahatezerany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no avy handrava ny tany rehetra.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Midradradradrà ianareo fa antomotra ny Andron’NY TOMPO;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tahaka ny fandravan’ny Tsitoha no fiaviny.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Noho izany dia hiraviravy ny tanana rehetra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ho kivy ny fon’ny olona rehetra;
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho toran-kovitra izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fanaintainana sy fahoriana no hahazo azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hijalijaly tahaka ny vehivavy mihetsi-jaza izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: samy ho talanjona izy ka hifampijery;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toy ny nodorana afo ny tarehiny.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro, avy ny Andron’NY TOMPO;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: andron’ny loza sy fahavinirana ary firehetan’ny fahatezerana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hanafoanana ny tany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy handringanana ny mpanota tsy ho ao.
