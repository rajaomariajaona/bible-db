document_id: GEN.26,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Isaka sy i Abimeleka
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nisy mosary indray teo amin’ny tany, ankoatra ilay mosary voalohany fony fahavelon’i Abrahama. Ary Isaka dia nankany amin’i Abimeleka, mpanjakan’ny Filistina, tany Gerara. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy i Abimeleka: Inona izao nataonao taminay izao? Saiky nisy nandry tamin’ny vadinao ny olona, dia ho nahatonga heloka taminay ianao! '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nandidy ny vahoaka rehetra i Abimeleka hoe: Izay mikasika an’io lehilahy io na ny vadiny dia hovonoina ho faty!'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Isaka dia namafy tamin’izany tany izany ka nahazo zato heny satria notahin’NY TOMPO izy. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia tonga nanankarena Ralehilahy ka nitombo harena hatrany ka tena tonga mpanankarena be. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nahangona fananana be izy, dia ondry aman’osy sy omby ary mpanompo maro, hany ka nialona azy ny Filistina.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fanekena nataon’Isaka sy i Abimeleka
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny lavaka fantsakana rehetra izay nohadin’ny mpanompon’ny rainy fony fahavelon’i Abrahama rainy, dia notampenan’ny Filistina ka nototofany tany avokoa. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy i Abimeleka tamin’Isaka: Mialà eto aminay fa mahery lavitra noho izahay ianao. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia niala teo Isaka ka nanorina ny tranolainy tao an-dohasahan’i Gerara ary nonina tao. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nolavahan’Isaka indray ny lavaka fantsakana izay voahady fony fahavelon’i Abrahama rainy, satria notampenan’ny Filistina ireny nony maty i Abrahama. Nomeny anarana araka ny anarana izay nomen’ny rainy azy ihany ireny. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia mbola nihady lavaka teo amin’ny lohasaha ihany koa ny mpanompon’Isaka ka nahita loharano velona tao. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Niseho taminy NY TOMPO ka niteny hoe: Aza midina any Ejipta ianao fa mitoera eo amin’ny tany izay holazaiko aminao. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Kanjo niady tamin’ny mpiandry ondrin’Isaka ny mpiandry ondry tao Gerara ka niteny hoe: Anay ny rano! Noho izany dia nataon’Isaka hoe Eseka'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Eseka: Fifandirana.'
      marker-yv: yv-n
    - type: text
      text: ', ny anaran’ilay lavaka fantsakana, satria nifandìtra taminy izy ireo. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nihady lavaka fantsakana hafa indray koa izy, nefa niadiana indray io; koa nataony hoe Sitna
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Sitna: Fandrafiana.'
      marker-yv: yv-n
    - type: text
      text: ' ny anarany. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nifindra niala teo izy ka nihady lavaka fantsakana hafa indray, fa io kosa tsy mba niadiana; koa ny anarany dia nataony hoe Rehobota
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Rehobota: Toerana malalaka.'
      marker-yv: yv-n
    - type: text
      text: '; fa hoy izy: Nomen’NY TOMPO toerana malalaka isika ankehitriny, dia hihamaro eto amin’ny tany.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia niakatra niala teo Isaka ka nankany Bery-Sheba. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary NY TOMPO niseho taminy tamin’iny alina iny ka niteny hoe: Izaho no Andriamanitr’i Abrahama rainao; aza matahotra fa momba anao Aho ka hitahy anao sy hahamaro ny taranakao, noho ny amin’i Abrahama mpanompoko. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nanorina alitara teo izy ary niantso ny anaran’NY TOMPO sady nanorina ny tranolainy teo koa; dia nihady lavaka fantsakana teo ny mpanompon’Isaka.
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I Abimeleka mbamin’i Ahozata sakaizany sy i Pikola, mpitarika ny miaramilany, dia niala tao Gerara hankany amin’Isaka. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nefa hoy Isaka taminy: Nahoana indray ianareo no mankaty amiko, kanefa mankahala ahy ianareo ka nandroaka ahy hiala teo aminareo? '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy izy ireo: Hitanay marimarina fa momba anao NY TOMPO, koa hoy izahay: Aoka samy hanao fianianana isika, dia izahay sy ianao, ary aoka izahay hanao fanekena aminao '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fa tsy hanisy ratsy anay ianao, tahaka ny tsy nikasihanay anao akory sy tahaka ny tsy nanaovanay na inona na inona taminao afa-tsy ny soa ihany, satria navelanay handeha soa amantsara ianao. Efa notahin’NY TOMPO ianao ankehitriny. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mivahinia eto amin’ity tany ity ianao, dia homba anao sy hitahy anao Aho. Fa ianao sy ny taranakao no homeko ireto tany rehetra ireto ka hotanako ny fianianana izay nataoko tamin’i Abrahama rainao. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nanao fanasana ho azy Isaka ka nihinana sy nisotro izy ireo. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Avy eo dia nifoha vao maraina izy ireo ka nifampianiana. Dia navelan’Isaka handeha izy ireo ka lasa nody soa amantsara.
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin’izany andro izany dia avy ny mpanompon’Isaka ka nanambara taminy ny amin’ny lavaka fantsakana izay nohadiny sady niteny taminy hoe: Nahita rano izahay! '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nataony hoe Sheba ny anaran’io toerana io. Izany no niantsoana ny anaran’ny tanàna hoe Bery-Sheba mandraka androany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.33 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Zahao '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 21.31.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fanambadian’i Esao
    marker-yv: yv-h
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Efapolo taona i Esao raha nampakatra an’i Jodita, zanakavavin’i Bery hetita, sy i Basemata, zanakavavin’i Elona hetita. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nangidy tamin’Isaka sy i Rebeka loatra anefa izany.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hahamaro ny taranakao ho tahaka ny kintana eny amin’ny lanitra Aho ka homeko ny taranakao ireto tany rehetra ireto. Ary amin’ny taranakao no hitahiana ny firenena rehetra ambonin’ny tany, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'satria i Abrahama dia nihaino ny feoko ka nitandrina ny didiko sy ny fitsipiko ary ny lalànako izay nasaiko notandremany. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nitoetra tany Gerara Isaka.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nanontany azy ny amin’ny vadiny ny lehilahy tompon-tany ka hoy izy: Anabaviko izy. Fa natahotra izy hilaza hoe Vadiko izy, fandrao hamono azy ny lehilahy tompon-tany noho i Rebeka, satria tsara tarehy Ravehivavy. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa nitoetra ela teo izy dia nitsirika teo am-baravarankely i Abimeleka, mpanjakan’ny Filistina, ka nahita fa indro, nisangy tamin’i Rebeka vadiny Isaka. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia niantso an’Isaka i Abimeleka ka niteny hoe: Hita mihitsy fa vadinao izy, koa nahoana no nolazainao hoe Anabaviko izy? Dia hoy Isaka taminy: Satria hoy aho anakampo hoe: Fandrao ho faty noho ny aminy aho. '
