document_id: PRO.7,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Misy vehivavy ratsy, manodoka tanora lahy iray
  - type: text
    content: Anaka, tandremo ny teniko
  - type: text
    content: ary raketo ao aminao ny didiko.
  '10':
  - type: text
    content: Dia indro, nisy vehivavy nitsena azy
  - type: text
    content: sady manao fitafin’ny vehivavy janga ary feno fanangolena ao am-pony.
  '11':
  - type: text
    content: Sady vavàna izy no maniratsira,
  - type: text
    content: tsy mahajanona an-trano ny tongony;
  '12':
  - type: text
    content: vetivety izy eny an-dalambe, vetivety eny an-tsena,
  - type: text
    content: ary mamitsaka eny an-joron-dalana rehetra eny izy.
  '13':
  - type: text
    content: Dia nisavika ilay tanora izy ka nanoroka azy
  - type: text
    content: 'sady nisolantsolana taminy ary nilaza hoe:'
  '14':
  - type: text
    content: Nivoady hanatitra fanati-pihavanana aho
  - type: text
    content: ary androany no nanefako ny voadiko.
  '15':
  - type: text
    content: Koa nivoaka hitsena anao aho
  - type: text
    content: mba hitady fatratra anao ka nahita anao tokoa.
  '16':
  - type: text
    content: Ny fandrianako dia efa nasiako firakotra tsara,
  - type: text
    content: lamba rongony misoratsoratra avy any Ejipta;
  '17':
  - type: text
    content: efa norarahako zavamanitra ny fandrianako,
  - type: text
    content: dia miora sy hazomanitra ary havozomanitra.
  '18':
  - type: text
    content: Andeha, aoka isika hivoky fitia mandra-paharain’ny andro,
  - type: text
    content: aoka hanaram-po amin’ny fitiavana isika.
  '19':
  - type: text
    content: Tsy ato an-trano mantsy ny vadiko
  - type: text
    content: fa lasa nivahiny any lavitra;
  '2':
  - type: text
    content: Tandremo ny didiko dia ho velona ianao
  - type: text
    content: ary tandremo toy ny anakandriamasonao ny lalànako.
  '20':
  - type: text
    content: ny kitapom-bola dia noentiny any an-tanany
  - type: text
    content: ary tsy hody izy raha tsy feno ny volana.
  '21':
  - type: text
    content: Tamin’ny teny maro no nandreseny lahatra azy;
  - type: text
    content: tamin’ny fandokafan’ny molony no nitaomany azy.
  '22':
  - type: text
    content: Dia nandeha nanaraka azy niaraka tamin’izay ilay zatovo,
  - type: text
    content: tahaka ny omby entina hovonoina,
  - type: text
    content: ary tahaka ny adala gadraina ho famaizana azy,
  '23':
  - type: text
    content: ambara-piboroaky ny zana-tsipìka amin’ny atiny,
  - type: text
    content: ary tahaka ny vorona mamantana amin’ny fandrika
  - type: text
    content: ka tsy fantany fa hamono ny ainy izany.
  '24':
  - type: text
    content: Koa mihainoa ahy ianareo, anaka,
  - type: text
    content: ary tandremo ny teny ataoko!
  '25':
  - type: text
    content: Aoka tsy hivily ho any amin’ny lalany ny fonareo
  - type: text
    content: ary aza mania ho amin’ny alehany.
  '26':
  - type: text
    content: Fa betsaka no naripany ka maty,
  - type: text
    content: ary ny mahery indrindra aza dia matiny avokoa.
  '27':
  - type: text
    content: 'Ny tranony dia lalana mankany amin’ny '
  - type: text
    content: fitoeran’ny maty
  - type: text
    content: ','
  - type: text
    content: eny, midina ho any amin’ny efitranon’ny fahafatesana.
  '3':
  - type: text
    content: Afehezo eo amin’ny rantsantananao ireny
  - type: text
    content: ary soraty ao am-ponao tahaka ny amin’ny vato fisaka ireny.
  '4':
  - type: text
    content: 'Lazao amin’ny fahendrena hoe: Anabaviko ianao!'
  - type: text
    content: 'Ary ny fahaiza-misaina dia antsoy hoe: Havako akaiky ianao'
  '5':
  - type: text
    content: mba hiarovana anao amin’ny vehivavy jejo,
  - type: text
    content: dia amin’ny vehivavy janga izay manao teny manodoka.
  '6':
  - type: text
    content: Fa teo amin’ny varavarankelin’ny tranoko,
  - type: text
    content: dia teo amin’ny makarakara, no nitsirihako
  '7':
  - type: text
    content: ka nahita ny iray tamin’ireny kely saina ireny aho;
  - type: text
    content: eny, nandinika ireo tanora aho ka nahita zazalahy iray tsy ampy saina
  '8':
  - type: text
    content: izay nandeha tamin’ny lalana akaikin’ny zoron-tranon’ny vehivavy janga
  - type: text
    content: sady nizotra moramora nankany an-tranony,
  '9':
  - type: text
    content: tamin’ny takariva ilay somambisamby iny
  - type: text
    content: ary tamin’ny alimbe.
