document_id: PRO.7,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Misy vehivavy ratsy, manodoka tanora lahy iray
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Anaka, tandremo ny teniko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary raketo ao aminao ny didiko.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Dia indro, nisy vehivavy nitsena azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady manao fitafin’ny vehivavy janga ary feno fanangolena ao am-pony.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Sady vavàna izy no maniratsira,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy mahajanona an-trano ny tongony;
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: vetivety izy eny an-dalambe, vetivety eny an-tsena,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mamitsaka eny an-joron-dalana rehetra eny izy.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Dia nisavika ilay tanora izy ka nanoroka azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'sady nisolantsolana taminy ary nilaza hoe:'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Nivoady hanatitra fanati-pihavanana aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary androany no nanefako ny voadiko.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Koa nivoaka hitsena anao aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hitady fatratra anao ka nahita anao tokoa.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Ny fandrianako dia efa nasiako firakotra tsara,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: lamba rongony misoratsoratra avy any Ejipta;
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: efa norarahako zavamanitra ny fandrianako,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia miora sy hazomanitra ary havozomanitra.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Andeha, aoka isika hivoky fitia mandra-paharain’ny andro,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aoka hanaram-po amin’ny fitiavana isika.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Tsy ato an-trano mantsy ny vadiko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa lasa nivahiny any lavitra;
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Tandremo ny didiko dia ho velona ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tandremo toy ny anakandriamasonao ny lalànako.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ny kitapom-bola dia noentiny any an-tanany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy hody izy raha tsy feno ny volana.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Tamin’ny teny maro no nandreseny lahatra azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tamin’ny fandokafan’ny molony no nitaomany azy.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Dia nandeha nanaraka azy niaraka tamin’izay ilay zatovo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tahaka ny omby entina hovonoina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tahaka ny adala gadraina ho famaizana azy,
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ambara-piboroaky ny zana-tsipìka amin’ny atiny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tahaka ny vorona mamantana amin’ny fandrika
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy fantany fa hamono ny ainy izany.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Koa mihainoa ahy ianareo, anaka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tandremo ny teny ataoko!
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Aoka tsy hivily ho any amin’ny lalany ny fonareo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary aza mania ho amin’ny alehany.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Fa betsaka no naripany ka maty,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny mahery indrindra aza dia matiny avokoa.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Ny tranony dia lalana mankany amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: fitoeran’ny maty
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, midina ho any amin’ny efitranon’ny fahafatesana.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Afehezo eo amin’ny rantsantananao ireny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary soraty ao am-ponao tahaka ny amin’ny vato fisaka ireny.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Lazao amin’ny fahendrena hoe: Anabaviko ianao!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ary ny fahaiza-misaina dia antsoy hoe: Havako akaiky ianao'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: mba hiarovana anao amin’ny vehivavy jejo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia amin’ny vehivavy janga izay manao teny manodoka.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Fa teo amin’ny varavarankelin’ny tranoko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia teo amin’ny makarakara, no nitsirihako
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ka nahita ny iray tamin’ireny kely saina ireny aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, nandinika ireo tanora aho ka nahita zazalahy iray tsy ampy saina
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: izay nandeha tamin’ny lalana akaikin’ny zoron-tranon’ny vehivavy janga
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady nizotra moramora nankany an-tranony,
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: tamin’ny takariva ilay somambisamby iny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tamin’ny alimbe.
