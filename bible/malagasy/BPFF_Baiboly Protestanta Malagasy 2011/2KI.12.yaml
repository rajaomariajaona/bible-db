document_id: 2KI.12,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: I Joasy, mpanjakan’ny Joda
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 2Tan 24.1-3
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fito taona i Joasy raha nanomboka nanjaka; '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa naka vata iray i Joiada mpisorona dia noloahany ny rakony ary napetrany teo anilan’ny alitara tamin’ny sisiny havanan’ny fidirana amin’ny tranon’NY TOMPO; dia nalatsaky ny mpisorona, mpiandry varavarana, tao ny vola rehetra izay nampidirina ho ao amin’ny tranon’NY TOMPO. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nony hitany fa betsaka ny vola tao am-bata dia niakatra ny mpitantsoratry ny mpanjaka sy ny Mpisoronabe ka nofonosiny ny vola izay hita tao amin’ny tranon’NY TOMPO sady nisainy. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny vola voalanja dia natolotr’ireo ho eo an-tanan’ny mpiandraiki-draharaha, dia izay voatendry ny amin’ny tranon’NY TOMPO; ireo kosa dia namoaka azy ho amin’ny mpandrafitra sy ny mpanao trano izay nanamboatra ny tranon’NY TOMPO. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nomeny ny mpandatsa-bato sy ny mpipaika izany mba hamidy hazo sy vato voapaika, hanamboarana ny simba amin’ny tranon’NY TOMPO sy holanina amin’izay fanamboarana rehetra ilaina. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nefa tamin’ny volafotsy nampidirina tao dia tsy nisy nanaovana lovia volafotsy, na antsy, na lovia famafazana, na trompetra, na izay mety ho fanaka volamena sy volafotsy ho amin’ny tranon’NY TOMPO, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fa nomena ny mpiasa izany ka noentin’ireo nanamboarana ny tranon’NY TOMPO. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary tsy nampamoahiny ny olona izay notolorany ny vola homena ny mpiasa, fa olona nahatoky ireo. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny vola natao fanati-panonerana sy fanatitra noho ny ota kosa dia tsy mba nampidirina tao amin’ny tranon’NY TOMPO, fa an’ny mpisorona izany.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nifaranan’ny fitondran’i Joasy
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 2Tan 24.23-27
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin’izay dia niakatra i Hazaela, mpanjakan’i Arama ary namely an’i Gata ka nahazo azy. Dia nizotra niakatra hamely an’i Jerosalema koa izy. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary i Joasy, mpanjakan’ny Joda dia naka ny zavatra rehetra izay nohamasinin’ireo mpanjakan’ny Joda razany, dia i Josafata, i Jehorama ary i Ahazia, mbamin’ny zavatra nohamasinin’ny tenany koa sy ny volamena rehetra hita tao amin’ny efitrano fitahirizana, na ny tao amin’ny tranon’NY TOMPO, na ny tao amin’ny tranon’ny mpanjaka, ary nampitondrainy ho any amin’i Hazaela, mpanjakan’i Arama ireo ka lasa niverina i Hazaela fa tsy nankany Jerosalema.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'tamin’ny taona fahafito nanjakan’i Jeho mpanjakan’i Joda izy no nanombohany nanjaka, ary efapolo taona no nanjakany tany Jerosalema. Ny anaran’ny reniny dia Zibia, avy any Bery-Sheba. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny tantaran’i Joasy sisa mbamin’izay rehetra nataony, tsy voasoratra ao amin’ny bokin’ny tantaran’ny mpanjakan’ny Joda va izany? '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nitsangana ny mpanompon’i Joasy ka nanao tetika fikomiana dia namono azy tao Bety-Milo, izay teo am-pidinana mankany Sila. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa i Jozakara, zanak’i Simata sy i Jozabada, zanak’i Somera, mpanompony dia namely azy ho faty. Dia nalevina tao amin’ny razany tao amin’ny Tanànan’i Davida izy. Ary i Amazia zanany no nanjaka nandimby azy.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nanao izay mahitsy teo imason’NY TOMPO i Joasy tamin’ny androny rehetra izay nanoloran’i Joiada mpisorona saina azy. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nefa kosa ny toerana fanaovana sorona dia tsy mba noravana, ary ny olona dia mbola namono zavatra ho fanatitra sady nandoro ditin-kazo manitra teo amin’ny toerana fanaovana sorona ihany.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Asain’i Joasy amboarina ny simba ao amin’ny tempoly
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 2Tan 24.4-14
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy i Joasy tamin’ny mpisorona: Ny vola momba ny zava-masina rehetra izay nampidirina tao amin’ny tranon’NY TOMPO, dia ny volan’ny olona voaisa sy ny vola rehetra izay azo tamin’ny hetra naloan’ny olona ary ny vola rehetra izay noentin’ny olona an-tsitrapo ho ao amin’ny tranon’NY TOMPO, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: dia aoka horaisin’ny mpisorona amin’ny olom-pantany avy izany ka hanamboarany ny simba amin’ny Trano, na amin’inona na amin’inona no hitany misy simba.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Kanjo hatramin’ny fahatelo amby roapolo taona nanjakan’i Joasy mpanjaka dia tsy mbola voavoatry ny mpisorona ihany ny simba tamin’ny Trano. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa niantso an’i Joiada mpisorona sy ny mpisorona sasany koa i Joasy mpanjaka ka niteny taminy hoe: Nahoana ianareo no tsy manamboatra ny simba amin’ny Trano? Koa ankehitriny, aza mandray vola amin’ny olom-pantatrareo intsony ianareo fa omeo hanamboarana ny simba amin’ny Trano ny vola. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nanaiky tsy handray vola amin’ny olona hanamboarana ny simba amin’ny Trano intsony ny mpisorona. '
