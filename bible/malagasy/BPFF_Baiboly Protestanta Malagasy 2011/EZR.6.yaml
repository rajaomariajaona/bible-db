document_id: EZR.6,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny valintenin’i Dariosy mpanjaka
  - type: text
    content: 'Dia nandidy ny amin’izany i Dariosy mpanjaka ka nojerena ny trano fitahirizan-taratasy izay nitahirizana ny rakitra tany Babilona. '
  '10':
  - type: text
    content: 'mba hanolorany fanatitra ho hanitra ankasitrahana ho an’Andriamanitry ny lanitra sy mba hivavahany mba ho ela velona ny mpanjaka mbamin’ny zanany. '
  '11':
  - type: text
    content: 'Mamoaka didy aho fa na iza na iza no mandika izao teny izao dia hangalana hazo avy amin’ny tranony ary hatsangana izany dia hahantona eo ny tenany; ary aoka hatao fako ny tranony noho izany. '
  '12':
  - type: text
    content: Ary Andriamanitra izay efa nampitoetra ny anarany teo anie handringana ny mpanjaka sy ny vahoaka rehetra izay manainga ny tanany handika ny didiko ka handrava izany tranon’Andriamanitra any Jerosalema izany. Izaho Dariosy no namoaka ny didy; aoka hankatoavina marina tokoa izany.
  '13':
  - type: text
    content: Nankatò marina izany teny nampitondrain’i Dariosy ho any aminy izany i Tatenay, governora amin’ny etỳ andafin’ny ony Eofrata, sy i Setara-Bozenay mbamin’ny namany.
  - type: heading
    content: Fitokanana ny tempoly voaorina indray
  '14':
  - type: text
    content: 'Dia nanao ny trano ny loholon’ny '
  - type: text
    content: Jiosy
  - type: text
    content: ' ka nambinina noho ny faminanian’i Hagay mpaminany sy i Zakaria, zanak’Ido. Ary nanao ny trano izy ka nahavita azy, araka ny didin’Andriamanitry ny Israely sy araka ny didin’i Kirosy sy i Dariosy ary i Artaksersesy, mpanjakan’i Persia. '
  '15':
  - type: text
    content: 'Vita io trano io tamin’ny andro fahatelo tamin’ny volana '
  - type: text
    content: Adara
  - type: text
    content: ' tamin’ny taona fahenina nanjakan’i Dariosy mpanjaka. '
  '16':
  - type: text
    content: 'Ary ny Zanak’Israely, na ny mpisorona, na ny '
  - type: text
    content: levita
  - type: text
    content: ', na ny olona sisa izay nody avy tamin’ny fahababoana dia nitokana io tranon’Andriamanitra io tamin’ny fifaliana. '
  '17':
  - type: text
    content: 'Nateriny hitokanana io tranon’Andriamanitra io ny omby zato sy ondrilahy roanjato ary zanak’ondry efajato; ny fanatitra fanadiovana ho an’ny Israely rehetra kosa dia osilahy roa amby folo, araka ny isan’ny fokon’Israely. '
  '18':
  - type: text
    content: Dia nanendry ny mpisorona ho amin’ny firazanany avy sy ny levita ho amin’ny antokony avy izy, hanao ny fanompoana an’Andriamanitra izay any Jerosalema, araka izay voasoratra ao amin’ny bokin’i Mosesy.
  - type: heading
    content: Mankalaza ny fetin’ny Paska ny Jiosy
  '19':
  - type: text
    content: 'Ary ny olona izay nody avy tamin’ny fahababoana dia nitandrina ny '
  - type: text
    content: Paska
  - type: text
    content: ' tamin’ny andro fahefatra amby folo tamin’ny volana voalohany; '
  '2':
  - type: text
    content: 'Tao Akmeta, tao an-dapa izay any amin’ny tanin’ny Mediana no nahitana horonan-taratasy iray ka izao no tantara voasoratra tao:'
  '20':
  - type: text
    content: 'fa samy efa nanadio ny tenany rahateo ny mpisorona sy ny '
  - type: text
    content: levita
  - type: text
    content: '; dia nadio izy rehetra ka namono ny Paska ho an’izay rehetra nody avy tamin’ny fahababoana sy ho an’ny mpisorona rahalahiny ary ho an’ny tenany. '
  '21':
  - type: text
    content: 'Dia nihinana izany ny Zanak’Israely izay nody avy tamin’ny fahababoana mbamin’izay rehetra niavaka ho namany ka niala tamin’ny fahalotoan’ny firenena tompon-tany mba hitady NY TOMPO, Andriamanitry ny Israely. '
  '22':
  - type: text
    content: Nitandrina ny andro firavoravoana fihinanana ny mofo tsy misy masirasira nandritra ny hafitoana tamin’ny fifaliana izy; fa NY TOMPO efa nampifaly azy sady nampiova ny fon’ny mpanjakan’i Asiria mba hamindra fo aminy ka hampahery ny tanany tamin’ny nanaovany ny tranon’Andriamanitra, dia Andriamanitry ny Israely.
  '3':
  - type: text
    content: 'Tamin’ny taona voalohany nanjakan’i Kirosy dia namoaka didy izy hoe: Ny amin’ny tranon’Andriamanitra any Jerosalema, aoka hatao mihitsy izany ho fanoloran’ny olona fanatitra, aoka hatao mafy ny fanorenany ka ho enimpolo '
  - type: text
    content: hakiho
  - type: text
    content: ' ny haavony ary enimpolo hakiho koa ny sakany, '
  '4':
  - type: text
    content: 'dia asiana vato vaventy telo andalana sy hazo vaovao iray andalana. Aoka haloa avy amin’ny tranon’ny mpanjaka izay lany. '
  '5':
  - type: text
    content: Ary ny fanaky ny tranon’Andriamanitra, na ny volamena na ny volafotsy izay nalain’i Nebokadnezara tao amin’ny tempoly tany Jerosalema ka noentiny ho any Babilona dia aoka haverina ho any amin’ny tempoly any Jerosalema indray, samy ho amin’ny toerany avy ka aoka hapetraka ao amin’ny tranon’Andriamanitra avokoa ireo.
  '6':
  - type: text
    content: 'Koa ankehitriny, ry Tatenay governora any andafin’ny ony Eofrata sy ry Setara-Bozenay mbamin’ny Afarsakita namanareo, izay any andafin’ny ony Eofrata, mihataha ianareo. '
  '7':
  - type: text
    content: 'Aza misakana ny fanaovana io tranon’Andriamanitra io ianareo; aoka ny governoran’ny '
  - type: text
    content: Jiosy
  - type: text
    content: ' sy ny loholon’ny Jiosy hanao io tranon’Andriamanitra io eo amin’ilay efa niorenany ihany. '
  '8':
  - type: text
    content: 'Ary mamoaka didy ny amin’ny hataonareo amin’ny loholon’ireo Jiosy ireo hanaovany izany tranon’Andriamanitra izany aho: Aoka ny harenan’ny mpanjaka, izany hoe ny hetra avy amin’ny any andafin’ny ony Eofrata, no handoavana izay lany marina ho an’ireo lehilahy ireo mba tsy ho azon-tsampona izy. '
  '9':
  - type: text
    content: 'Ary izay zavatra ilainy, na zanak’omby, na ondrilahy, na zanak’ondry ho fanatitra dorana manontolo ho an’Andriamanitry ny lanitra, na varimbazaha, na sira, na divay, na diloilo, araka izay andidian’ny mpisorona any Jerosalema, dia aoka homena azy isanandro isanandro tsy tapaka '
