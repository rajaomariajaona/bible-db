document_id: LAM.INTRO1,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: imt1
    children:
    - type: text
      text: INDRAY MIJERY
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Ao amin’ny Baiboly hebreo dia «Indrisy», izay teny voalohany ao amin’ny 1 sy 2 ary 4, no anaran’ny Boky. Ny Septanta, ilay Baiboly dikanteny grika, no nanao azy hoe «Hira fisaonana», ary izany indray no nadika hoe «Ny Fitomaniana» ao amin’ny Baiboly malagasy. Ny Boky Fitomaniana dia naman’ireo Horonam-boky Dimy ka novakina tamin’ny fahasivin’ny volana Av, na ny volana Jolay-Aogositra eo ho eo, izay fahatsiarovana ny nandravana an’i Jerosalema.
  - type: usfm
    marker: is1
    children:
    - type: text
      text: Ny votoatin’ny Boky
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Ny mpanoratra dia mahatsiaro ireo loza nitranga ary manontany ny anton’izany satria toa nohadinoin’Andriamanitra ny teny fikasana izay nilaza fa haharitra mandrakizay ny sezafiandrianan’i Davida. Miaiky koa anefa izy fa ny fahotan’ny olona no nahatonga izany, ary rariny ny fahatezeran’Andriamanitra. Tsaroany koa anefa fa «ny famindrampon’NY TOMPO no tsy nahalany ritra antsika, ary tsy mitsahatra ny fiantrany», ary izany no mbola ananany fanantenana.
  - type: usfm
    marker: iot
    children:
    - type: text
      text: Ny firafitry ny Boky
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Tononkalo dimy no ao amin’ny Boky, koa amin’ny efatra voalohany, ireo andalana tsirairay dia manomboka amin’ny literan’ny abidy hebreo. Toy izao no azo amintinana azy:'
  - type: usfm
    marker: io1
    children:
    - type: text
      text: 'Ny latsa sy fahoriana manjo an’i Jerosalema: 1'
  - type: usfm
    marker: io1
    children:
    - type: text
      text: 'Ny kapoka mihatra amin’i Jerosalema: 2'
  - type: usfm
    marker: io1
    children:
    - type: text
      text: 'Ny fanantenana: 3'
  - type: usfm
    marker: io1
    children:
    - type: text
      text: 'Ny faharavan’i Jerosalema: 4'
  - type: usfm
    marker: io1
    children:
    - type: text
      text: 'Vavaka fangataham-pamonjena: 5'
