document_id: ISA.47,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny haharavan’i Babilona
  - type: text
    content: Midìna ka mipetraha amin’ny vovoka ry Babilona, zanakavavy virijiny!
  - type: text
    content: Mipetraha eo amin’ny tany, nefa tsy amin’ny sezafiandrianana,
  - type: text
    content: ry zanakavavin’i Kaldea!
  - type: text
    content: Fa tsy hatao hoe vehivavy malemilemy sy mihantahanta intsony ianao.
  '10':
  - type: text
    content: Fa nitoky tamin’ny faharatsianao ianao
  - type: text
    content: 'ka niteny hoe: Tsy misy mahita ahy!'
  - type: text
    content: Nampivily anao ny fahendrenao sy ny fahalalanao
  - type: text
    content: 'ka niteny anakampo ianao hoe:'
  - type: text
    content: Izaho no izy, tsy misy afa-tsy izaho.
  '11':
  - type: text
    content: Kanjo hanjo anao ny fahoriana
  - type: text
    content: nefa tsy ho fantatrao izay fiposahany;
  - type: text
    content: hahazo anao ny loza
  - type: text
    content: nefa tsy ho hainao sakanana;
  - type: text
    content: eny, hanjo anao tampoka ny fandringanana
  - type: text
    content: nefa tsy hampoizinao.
  '12':
  - type: text
    content: Arosoy ary ny odinao
  - type: text
    content: sy ny hamaroan’ny sikidinao,
  - type: text
    content: izay efa nisasaranao hatry ny fony ianao mbola kely!
  - type: text
    content: Angamba hahazo soa ianao;
  - type: text
    content: angamba ho tonga mahatahotra ianao!
  '13':
  - type: text
    content: Sasatra noho ny hamaroan’ny hevitrao ianao;
  - type: text
    content: ankehitriny, aoka hitsangana ka hamonjy anao
  - type: text
    content: ireo mpamantatra ny lanitra
  - type: text
    content: sy mpandinika ny kintana ireo,
  - type: text
    content: dia ireo mpanambara isaky ny tsinam-bolana
  - type: text
    content: izay zavatra ho tonga aminao.
  '14':
  - type: text
    content: 'Indro fa ho tahaka ny mololo ireo:'
  - type: text
    content: Ho main’ny afo izy
  - type: text
    content: ka tsy hahavonjy ny tenany amin’ny herin’ny lelafo;
  - type: text
    content: tsy misy vainafo hamindroana akory;
  - type: text
    content: eny, fa na afo hitaninana aza.
  '15':
  - type: text
    content: Ho toy izany no hanjo
  - type: text
    content: ireo efa nisasaranao ireo,
  - type: text
    content: dia ireo nifampivarotra taminao hatry ny fony ianao mbola kely;
  - type: text
    content: samy hipariaka mandositra ho any amin’ny fonenany avy izy
  - type: text
    content: ka tsy hisy hahavonjy anao!
  '2':
  - type: text
    content: Alaivo ny vato fikosoham-bary ka kosohy ny koba;
  - type: text
    content: esory ny fisalobonanao,
  - type: text
    content: akaro ny morontongotr’akanjonao;
  - type: text
    content: aoka hiseho ny fenao
  - type: text
    content: ka miroboha mita ny ony!
  '3':
  - type: text
    content: Hiseho ny fitanjahanao;
  - type: text
    content: eny, ho hita ny fahamenaranao.
  - type: text
    content: Hitondra famaliana Aho
  - type: text
    content: ka tsy hisy olona hahasakana Ahy.
  '4':
  - type: text
    content: Ny anaran’ny Mpanavotra anay dia Andriamanitra, Tompon’izao rehetra izao,
  - type: text
    content: Iray Masin’ny Israely.
  '5':
  - type: text
    content: Mipetraha mangingina
  - type: text
    content: ka midira ao amin’ny maizina,
  - type: text
    content: ry zanakavavin’i Kaldea!
  - type: text
    content: Fa tsy hatao hoe
  - type: text
    content: Tompovavin’ny fanjakana intsony ianao.
  '6':
  - type: text
    content: Tezitra tamin’ny oloko Aho,
  - type: text
    content: navelako holotoina ny lovako
  - type: text
    content: ka natolotro ho eo an-tananao izy;
  - type: text
    content: tsy mba namindranao fo izy,
  - type: text
    content: fa na ny antitra aza dia nasianao zioga tena mavesatra.
  '7':
  - type: text
    content: 'Ary hoy ianao: Ho tompovavy mandrakizay aho!'
  - type: text
    content: Tsy nandatsaka am-po izany zavatra izany ianao,
  - type: text
    content: na nitsapa izay hiafarany.
  '8':
  - type: text
    content: Koa mihainoa ankehitriny, ianao izay mihantahanta
  - type: text
    content: sady mipetraka tsy manana ahiahy
  - type: text
    content: 'ka miteny anakampo hoe:'
  - type: text
    content: Izaho no izy, ary tsy misy hafa!
  - type: text
    content: Tsy mba hipetraka ho mpitondratena aho,
  - type: text
    content: na hahita fahafoanan’anaka!
  '9':
  - type: text
    content: Kanjo hanjo anao tampoka ireto zavatra roa ireto,
  - type: text
    content: ao anatin’ny indray andro monja,
  - type: text
    content: dia ny fahafoanan’anaka sy ny maha mpitondratena;
  - type: text
    content: hotanterahina aminao avokoa izany
  - type: text
    content: na dia maro aza ny sikidinao,
  - type: text
    content: ary na dia be dia be aza ny odinao.
