document_id: ISA.47
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny haharavan’i Babilona
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Midìna ka mipetraha amin’ny vovoka ry Babilona, zanakavavy virijiny!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mipetraha eo amin’ny tany, nefa tsy amin’ny sezafiandrianana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ry zanakavavin’i Kaldea!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa tsy hatao hoe vehivavy malemilemy sy mihantahanta intsony ianao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Alaivo ny vato fikosoham-bary ka kosohy ny koba;
- type: usfm
  marker: q1
  children:
  - type: text
    text: esory ny fisalobonanao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: akaro ny morontongotr’akanjonao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: aoka hiseho ny fenao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka miroboha mita ny ony!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Hiseho ny fitanjahanao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, ho hita ny fahamenaranao.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hitondra famaliana Aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy hisy olona hahasakana Ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ny anaran’ny Mpanavotra anay dia Andriamanitra, Tompon’izao rehetra izao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Iray Masin’ny Israely.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Mipetraha mangingina
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka midira ao amin’ny maizina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ry zanakavavin’i Kaldea!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa tsy hatao hoe
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tompovavin’ny fanjakana intsony ianao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Tezitra tamin’ny oloko Aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: navelako holotoina ny lovako
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka natolotro ho eo an-tananao izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy mba namindranao fo izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa na ny antitra aza dia nasianao zioga tena mavesatra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary hoy ianao: Ho tompovavy mandrakizay aho!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy nandatsaka am-po izany zavatra izany ianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: na nitsapa izay hiafarany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Koa mihainoa ankehitriny, ianao izay mihantahanta
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady mipetraka tsy manana ahiahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ka miteny anakampo hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izaho no izy, ary tsy misy hafa!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy mba hipetraka ho mpitondratena aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: na hahita fahafoanan’anaka!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Kanjo hanjo anao tampoka ireto zavatra roa ireto,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ao anatin’ny indray andro monja,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ny fahafoanan’anaka sy ny maha mpitondratena;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hotanterahina aminao avokoa izany
- type: usfm
  marker: q1
  children:
  - type: text
    text: na dia maro aza ny sikidinao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary na dia be dia be aza ny odinao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Fa nitoky tamin’ny faharatsianao ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ka niteny hoe: Tsy misy mahita ahy!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nampivily anao ny fahendrenao sy ny fahalalanao
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ka niteny anakampo ianao hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izaho no izy, tsy misy afa-tsy izaho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Kanjo hanjo anao ny fahoriana
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa tsy ho fantatrao izay fiposahany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hahazo anao ny loza
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa tsy ho hainao sakanana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, hanjo anao tampoka ny fandringanana
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa tsy hampoizinao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Arosoy ary ny odinao
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny hamaroan’ny sikidinao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay efa nisasaranao hatry ny fony ianao mbola kely!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Angamba hahazo soa ianao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: angamba ho tonga mahatahotra ianao!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Sasatra noho ny hamaroan’ny hevitrao ianao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ankehitriny, aoka hitsangana ka hamonjy anao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ireo mpamantatra ny lanitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy mpandinika ny kintana ireo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ireo mpanambara isaky ny tsinam-bolana
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay zavatra ho tonga aminao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Indro fa ho tahaka ny mololo ireo:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ho main’ny afo izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy hahavonjy ny tenany amin’ny herin’ny lelafo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy misy vainafo hamindroana akory;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, fa na afo hitaninana aza.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ho toy izany no hanjo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ireo efa nisasaranao ireo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ireo nifampivarotra taminao hatry ny fony ianao mbola kely;
- type: usfm
  marker: q1
  children:
  - type: text
    text: samy hipariaka mandositra ho any amin’ny fonenany avy izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy hisy hahavonjy anao!
