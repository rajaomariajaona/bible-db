document_id: PSA.70
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Faingàna hamonjy ahy!
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: Ho an’ny mpiventy hira. Nataon’i Davida. Ho fampahatsiarovana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Andriamanitra ô, faingàna hanafaka ahy!
- type: usfm
  marker: q1
  children:
  - type: text
    text: TOMPO ô, faingàna hamonjy ahy!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Aoka ho menatra sy hangaihay izay mitady ny aiko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: aoka hiamboho sy ho afa-baraka izay faly amin’ny manjo ahy!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Aoka hiamboho noho ny fahamenarany
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'izay miteny hoe: Hia! Akory izay!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Aoka hifaly sy ho ravoravo Aminao
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay rehetra mitady Anao!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary aoka izay tia ny famonjenao
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'hiteny mandrakariva hoe: Hankalazaina anie Andriamanitra!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Fa izaho dia ory sy mahantra.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Faingàna hankaty amiko, Andriamanitra ô;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mpamonjy sy Mpanafaka ahy Ianao.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aza ela, TOMPO ô!
