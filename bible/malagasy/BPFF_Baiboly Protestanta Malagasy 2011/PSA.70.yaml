document_id: PSA.70,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Faingàna hamonjy ahy!
  - type: text
    content: Ho an’ny mpiventy hira. Nataon’i Davida. Ho fampahatsiarovana.
  - type: text
    content: Andriamanitra ô, faingàna hanafaka ahy!
  - type: text
    content: TOMPO ô, faingàna hamonjy ahy!
  '2':
  - type: text
    content: Aoka ho menatra sy hangaihay izay mitady ny aiko;
  - type: text
    content: aoka hiamboho sy ho afa-baraka izay faly amin’ny manjo ahy!
  '3':
  - type: text
    content: Aoka hiamboho noho ny fahamenarany
  - type: text
    content: 'izay miteny hoe: Hia! Akory izay!'
  '4':
  - type: text
    content: Aoka hifaly sy ho ravoravo Aminao
  - type: text
    content: izay rehetra mitady Anao!
  - type: text
    content: Ary aoka izay tia ny famonjenao
  - type: text
    content: 'hiteny mandrakariva hoe: Hankalazaina anie Andriamanitra!'
  '5':
  - type: text
    content: Fa izaho dia ory sy mahantra.
  - type: text
    content: Faingàna hankaty amiko, Andriamanitra ô;
  - type: text
    content: Mpamonjy sy Mpanafaka ahy Ianao.
  - type: text
    content: Aza ela, TOMPO ô!
