document_id: PSA.124,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Raha tsy NY TOMPO no nomba antsika...
  - type: text
    content: Hira fanao amin’ny fiakarana. Nataon’i Davida.
  - type: text
    content: Raha tsy NY TOMPO no nomba antsika;
  - type: text
    content: 'eny, aoka holazain’ny Israely hoe:'
  '2':
  - type: text
    content: Raha tsy NY TOMPO no nomba antsika,
  - type: text
    content: raha nitsangana hamely antsika ny olona,
  '3':
  - type: text
    content: dia ho nitelina antsika velona izy;
  - type: text
    content: raha nirehitra tamintsika ny fahatezerany
  '4':
  - type: text
    content: dia ho nandifotra antsika ny rano
  - type: text
    content: ary nanafotra antsika ny riaka;
  '5':
  - type: text
    content: eny, ho nanafotra antsika
  - type: text
    content: ny rano misafoaka.
  '6':
  - type: text
    content: Isaorana anie NY TOMPO
  - type: text
    content: izay tsy nanolotra antsika ho rembin’ny nifiny.
  '7':
  - type: text
    content: Isika dia afa-nandositra tahaka ny vorona afaka tamin’ny fandriky ny mpihaza;
  - type: text
    content: tapaka ny fandrika ka afaka isika.
  '8':
  - type: text
    content: Ny famonjena antsika dia amin’ny anaran’NY TOMPO,
  - type: text
    content: Mpanao ny lanitra sy ny tany.
