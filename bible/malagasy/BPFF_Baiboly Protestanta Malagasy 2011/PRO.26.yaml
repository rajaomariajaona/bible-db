document_id: PRO.26,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny lehilahy adala
  - type: text
    content: Toy ny orampanala amin’ny lohataona ary toy ny ranonorana amin’ny taom-pijinjana,
  - type: text
    content: dia toy izany ny voninahitra, tsy antonona ho an’ny adala.
  '10':
  - type: text
    content: Ny mpandefa zana-tsipìka dia mahavoa ny olona rehetra,
  - type: text
    content: toy izany ny manakarama ny olona adala, na ny manakarama izay sendra mandalo.
  '11':
  - type: text
    content: Toy ny amboa miverina amin’ny loany,
  - type: text
    content: dia toy izany ny adala miverina amin’ny hadalany.
  '12':
  - type: text
    content: Hitanao va ny olona mihevi-tena ho hendry?
  - type: text
    content: Misy hantenaina kokoa ny adala noho izy.
  - type: heading
    content: Ny kamo
  '13':
  - type: text
    content: 'Hoy ny kamo: Misy liona any an-dalana!'
  - type: text
    content: Misy liona atsy an-dalambe!
  '14':
  - type: text
    content: Toy ny varavarana mihodina amin’ny saviliny,
  - type: text
    content: dia toy izany ny kamo eo amin’ny fandrianany.
  '15':
  - type: text
    content: Mangarona ny eo an-doviany ny kamo,
  - type: text
    content: nefa ny hampakatra azy ho amin’ny vavany dia mahasasatra azy.
  '16':
  - type: text
    content: Ny kamo dia mihevi-tena ho hendry
  - type: text
    content: mihoatra noho ny olona fito izay mahavaly tsara.
  - type: heading
    content: Tenim-pahendrena hafa koa
  '17':
  - type: text
    content: Ny mpandalo izay mitsabaka amin’ny ady izay tsy azy
  - type: text
    content: dia mandroritra amboa amin’ny sofiny.
  '18':
  - type: text
    content: Toy ny olona mihetsika hadalana izay manely afo
  - type: text
    content: sy zana-tsipìka ary fahafatesana,
  '19':
  - type: text
    content: toy izany ny olona mamitaka ny namany
  - type: text
    content: 'ka miteny hoe: Tsy kivazivazy ihany va no nataoko?'
  '2':
  - type: text
    content: Toy ny voronkely mivezivezy sy ny sidintsidina manidina,
  - type: text
    content: 'dia toy izany ny fanozonana tsy amin’antony: Tsy mba hihatra izany.'
  '20':
  - type: text
    content: Rehefa tsy misy kitay intsony dia maty ny afo,
  - type: text
    content: ary rehefa tsy misy mpifosafosa intsony dia mangina ny fifandirana.
  '21':
  - type: text
    content: Toy ny arina atao amin’ny vainafo sy ny kitay hazo atao amin’ny afo,
  - type: text
    content: dia toy izany ny olona tia ady, mandrehitra fifandirana.
  '22':
  - type: text
    content: Ny tenin’ny mpifosafosa dia toy ny hanim-py
  - type: text
    content: ka mikorotsaka hatrany anaty rehetra any.
  '23':
  - type: text
    content: Tavim-bilany nopetahana taim-bolafotsy
  - type: text
    content: ny molotra mirehitra fiteny sy ny fo ratsy.
  '24':
  - type: text
    content: Ny mpandrafy dia mody hafa eo amin’ny molony
  - type: text
    content: sady manafim-pitaka ao am-pony.
  '25':
  - type: text
    content: Koa na dia miteny soa aza izy, aza mino azy
  - type: text
    content: fa fahavetavetana fito no ao am-pony.
  '26':
  - type: text
    content: Ny fankahalana dia mety hiafina ao anatin’ny fitaka,
  - type: text
    content: nefa ny haratsiam-panahiny dia hiharihary eo ampahibemaso.
  '27':
  - type: text
    content: Izay mihady lavaka no ho latsaka ao
  - type: text
    content: ary izay manakodiadia vato kosa no hikodiavany.
  '28':
  - type: text
    content: Halan’ny lela mandainga ny olona izay nampahoriny
  - type: text
    content: ary ny vava mandokadoka foana dia mahatonga faharavana.
  '3':
  - type: text
    content: Ny karavasy dia ho an’ny soavaly, ny lamboridy ho an’ny boriky
  - type: text
    content: ary ny tsorakazo dia ho an’ny lamosin’ny adala.
  '4':
  - type: text
    content: Aza mamaly ny adala araka ny hadalany,
  - type: text
    content: fandrao mba adala tahaka azy koa ianao.
  '5':
  - type: text
    content: Valio araka ny hadalany ny adala,
  - type: text
    content: fandrao hihevi-tena ho hendry izy.
  '6':
  - type: text
    content: Manapaka ny tongony sady misotro loza
  - type: text
    content: izay mampitondra teny ny adala.
  '7':
  - type: text
    content: Bilabila ny ranjon’ny malemy tongotra,
  - type: text
    content: dia toy izany ny ohabolana eo am-bavan’ny adala.
  '8':
  - type: text
    content: Toy ny manisy vato amin’ny antsamotady,
  - type: text
    content: dia toy izany ny manome voninahitra ny adala.
  '9':
  - type: text
    content: Toy ny tsilo eny an-tanan’ny olona mamo,
  - type: text
    content: dia toy izany ny ohabolana eo am-bavan’ny adala.
