document_id: PRO.26
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny lehilahy adala
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Toy ny orampanala amin’ny lohataona ary toy ny ranonorana amin’ny taom-pijinjana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia toy izany ny voninahitra, tsy antonona ho an’ny adala.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Toy ny voronkely mivezivezy sy ny sidintsidina manidina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'dia toy izany ny fanozonana tsy amin’antony: Tsy mba hihatra izany.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ny karavasy dia ho an’ny soavaly, ny lamboridy ho an’ny boriky
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny tsorakazo dia ho an’ny lamosin’ny adala.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Aza mamaly ny adala araka ny hadalany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fandrao mba adala tahaka azy koa ianao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Valio araka ny hadalany ny adala,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fandrao hihevi-tena ho hendry izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Manapaka ny tongony sady misotro loza
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay mampitondra teny ny adala.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Bilabila ny ranjon’ny malemy tongotra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia toy izany ny ohabolana eo am-bavan’ny adala.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Toy ny manisy vato amin’ny antsamotady,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia toy izany ny manome voninahitra ny adala.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Toy ny tsilo eny an-tanan’ny olona mamo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia toy izany ny ohabolana eo am-bavan’ny adala.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ny mpandefa zana-tsipìka dia mahavoa ny olona rehetra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: toy izany ny manakarama ny olona adala, na ny manakarama izay sendra mandalo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Toy ny amboa miverina amin’ny loany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia toy izany ny adala miverina amin’ny hadalany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Hitanao va ny olona mihevi-tena ho hendry?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Misy hantenaina kokoa ny adala noho izy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny kamo
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Hoy ny kamo: Misy liona any an-dalana!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Misy liona atsy an-dalambe!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Toy ny varavarana mihodina amin’ny saviliny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia toy izany ny kamo eo amin’ny fandrianany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Mangarona ny eo an-doviany ny kamo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa ny hampakatra azy ho amin’ny vavany dia mahasasatra azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ny kamo dia mihevi-tena ho hendry
- type: usfm
  marker: q1
  children:
  - type: text
    text: mihoatra noho ny olona fito izay mahavaly tsara.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Tenim-pahendrena hafa koa
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ny mpandalo izay mitsabaka amin’ny ady izay tsy azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia mandroritra amboa amin’ny sofiny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Toy ny olona mihetsika hadalana izay manely afo
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy zana-tsipìka ary fahafatesana,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: toy izany ny olona mamitaka ny namany
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ka miteny hoe: Tsy kivazivazy ihany va no nataoko?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Rehefa tsy misy kitay intsony dia maty ny afo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary rehefa tsy misy mpifosafosa intsony dia mangina ny fifandirana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Toy ny arina atao amin’ny vainafo sy ny kitay hazo atao amin’ny afo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia toy izany ny olona tia ady, mandrehitra fifandirana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ny tenin’ny mpifosafosa dia toy ny hanim-py
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka mikorotsaka hatrany anaty rehetra any.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Tavim-bilany nopetahana taim-bolafotsy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny molotra mirehitra fiteny sy ny fo ratsy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Ny mpandrafy dia mody hafa eo amin’ny molony
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady manafim-pitaka ao am-pony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Koa na dia miteny soa aza izy, aza mino azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa fahavetavetana fito no ao am-pony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Ny fankahalana dia mety hiafina ao anatin’ny fitaka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa ny haratsiam-panahiny dia hiharihary eo ampahibemaso.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Izay mihady lavaka no ho latsaka ao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary izay manakodiadia vato kosa no hikodiavany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Halan’ny lela mandainga ny olona izay nampahoriny
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny vava mandokadoka foana dia mahatonga faharavana.
