document_id: PRO.26,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny lehilahy adala
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toy ny orampanala amin’ny lohataona ary toy ny ranonorana amin’ny taom-pijinjana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia toy izany ny voninahitra, tsy antonona ho an’ny adala.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny mpandefa zana-tsipìka dia mahavoa ny olona rehetra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toy izany ny manakarama ny olona adala, na ny manakarama izay sendra mandalo.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toy ny amboa miverina amin’ny loany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia toy izany ny adala miverina amin’ny hadalany.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hitanao va ny olona mihevi-tena ho hendry?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Misy hantenaina kokoa ny adala noho izy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny kamo
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Hoy ny kamo: Misy liona any an-dalana!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Misy liona atsy an-dalambe!
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toy ny varavarana mihodina amin’ny saviliny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia toy izany ny kamo eo amin’ny fandrianany.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mangarona ny eo an-doviany ny kamo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa ny hampakatra azy ho amin’ny vavany dia mahasasatra azy.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny kamo dia mihevi-tena ho hendry
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mihoatra noho ny olona fito izay mahavaly tsara.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Tenim-pahendrena hafa koa
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny mpandalo izay mitsabaka amin’ny ady izay tsy azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia mandroritra amboa amin’ny sofiny.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toy ny olona mihetsika hadalana izay manely afo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy zana-tsipìka ary fahafatesana,
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toy izany ny olona mamitaka ny namany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ka miteny hoe: Tsy kivazivazy ihany va no nataoko?'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toy ny voronkely mivezivezy sy ny sidintsidina manidina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'dia toy izany ny fanozonana tsy amin’antony: Tsy mba hihatra izany.'
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rehefa tsy misy kitay intsony dia maty ny afo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary rehefa tsy misy mpifosafosa intsony dia mangina ny fifandirana.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toy ny arina atao amin’ny vainafo sy ny kitay hazo atao amin’ny afo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia toy izany ny olona tia ady, mandrehitra fifandirana.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny tenin’ny mpifosafosa dia toy ny hanim-py
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka mikorotsaka hatrany anaty rehetra any.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tavim-bilany nopetahana taim-bolafotsy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny molotra mirehitra fiteny sy ny fo ratsy.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny mpandrafy dia mody hafa eo amin’ny molony
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady manafim-pitaka ao am-pony.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa na dia miteny soa aza izy, aza mino azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa fahavetavetana fito no ao am-pony.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fankahalana dia mety hiafina ao anatin’ny fitaka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa ny haratsiam-panahiny dia hiharihary eo ampahibemaso.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay mihady lavaka no ho latsaka ao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary izay manakodiadia vato kosa no hikodiavany.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Halan’ny lela mandainga ny olona izay nampahoriny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny vava mandokadoka foana dia mahatonga faharavana.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny karavasy dia ho an’ny soavaly, ny lamboridy ho an’ny boriky
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny tsorakazo dia ho an’ny lamosin’ny adala.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aza mamaly ny adala araka ny hadalany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fandrao mba adala tahaka azy koa ianao.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Valio araka ny hadalany ny adala,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fandrao hihevi-tena ho hendry izy.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manapaka ny tongony sady misotro loza
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay mampitondra teny ny adala.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Bilabila ny ranjon’ny malemy tongotra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia toy izany ny ohabolana eo am-bavan’ny adala.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toy ny manisy vato amin’ny antsamotady,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia toy izany ny manome voninahitra ny adala.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toy ny tsilo eny an-tanan’ny olona mamo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia toy izany ny ohabolana eo am-bavan’ny adala.
