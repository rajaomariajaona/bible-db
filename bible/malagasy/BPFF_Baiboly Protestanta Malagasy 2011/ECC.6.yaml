document_id: ECC.6
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Misy toe-javatra ratsy hitako etỳ ambanin’ny masoandro ary mitambesatra amin’ny olona izany, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: dia olona izay omen’Andriamanitra vola aman-karena sy voninahitra ka tsy misy tsy ananany izay rehetra niriny, nefa tsy omen’Andriamanitra fahefana hihinana amin’izany izy fa olon-kafa no homana azy; zava-poana sy toe-javatra mampahory koa izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Na dia misy miteraka zato aza
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady tratra antitra ka efa maro ny andro niainany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa tsy mba voky soa izy sady tsy mba alevina akory ny fatiny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'dia hoy aho: Ny tsy tonga volana dia tsara kokoa noho izy.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Fa tamin’ny zava-poana no niaviany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ao amin’ny maizina no alehany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady ho voasaron’ny haizina ny anarany,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ary tsy nahita na nahalala ny masoandro akory koa izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mahita fitsaharana be kokoa noho izy ilay tsy tonga volana.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Eny, na dia tratry ny arivo taona indroa aza izy nefa tsy nahita fahasambarana, tsy ho any amin’ny toerana iray ihany va no alehan’izy rehetra?
- type: usfm
  marker: s1
  children:
  - type: text
    text: Tsy mahafa-po ny fiainan’ny olombelona
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ny fisasarana rehetra ataon’ny olona dia ho an’ny sakafony ihany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa tsy mety afa-po ny faniriany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Fa inona no soa azon’ny hendry mihoatra noho ny adala?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tombontsoa inona no ananan’ny mahantra
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay mahay mitondra tena eo imason’ny velona?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ny eo am-pelatanana dia tsara noho ny nofinofy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Zava-poana sy sambo-drivotra koa izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Izay efa teo dia voalaza anarana hatry ny fony ela,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary fantatra fa ny olombelona dia tsy mahazo mifandahatra amin’Izay mahery noho izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Araka ny hamaron’ny teny no maha maro ny zava-poana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: koa inona no tombontsoa azon’ny olona?
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Fa iza no mahalala izay mahasoa ny olona amin’ny fiainana, amin’ny andro mandalo foana izay laniny toy ny fihelin’ny aloka? Iza no hahalaza amin’ny olona izay zavatra ho avy any aorianany etỳ ambanin’ny masoandro?
