document_id: ECC.6,3103
type_code: plt
verses:
  '1':
  - type: text
    content: 'Misy toe-javatra ratsy hitako etỳ ambanin’ny masoandro ary mitambesatra amin’ny olona izany, '
  '10':
  - type: text
    content: Izay efa teo dia voalaza anarana hatry ny fony ela,
  - type: text
    content: ary fantatra fa ny olombelona dia tsy mahazo mifandahatra amin’Izay mahery noho izy.
  '11':
  - type: text
    content: Araka ny hamaron’ny teny no maha maro ny zava-poana,
  - type: text
    content: koa inona no tombontsoa azon’ny olona?
  '12':
  - type: text
    content: Fa iza no mahalala izay mahasoa ny olona amin’ny fiainana, amin’ny andro mandalo foana izay laniny toy ny fihelin’ny aloka? Iza no hahalaza amin’ny olona izay zavatra ho avy any aorianany etỳ ambanin’ny masoandro?
  '2':
  - type: text
    content: dia olona izay omen’Andriamanitra vola aman-karena sy voninahitra ka tsy misy tsy ananany izay rehetra niriny, nefa tsy omen’Andriamanitra fahefana hihinana amin’izany izy fa olon-kafa no homana azy; zava-poana sy toe-javatra mampahory koa izany.
  '3':
  - type: text
    content: Na dia misy miteraka zato aza
  - type: text
    content: sady tratra antitra ka efa maro ny andro niainany,
  - type: text
    content: nefa tsy mba voky soa izy sady tsy mba alevina akory ny fatiny,
  - type: text
    content: 'dia hoy aho: Ny tsy tonga volana dia tsara kokoa noho izy.'
  '4':
  - type: text
    content: Fa tamin’ny zava-poana no niaviany
  - type: text
    content: ary ao amin’ny maizina no alehany,
  - type: text
    content: sady ho voasaron’ny haizina ny anarany,
  '5':
  - type: text
    content: ary tsy nahita na nahalala ny masoandro akory koa izy;
  - type: text
    content: mahita fitsaharana be kokoa noho izy ilay tsy tonga volana.
  '6':
  - type: text
    content: Eny, na dia tratry ny arivo taona indroa aza izy nefa tsy nahita fahasambarana, tsy ho any amin’ny toerana iray ihany va no alehan’izy rehetra?
  - type: heading
    content: Tsy mahafa-po ny fiainan’ny olombelona
  '7':
  - type: text
    content: Ny fisasarana rehetra ataon’ny olona dia ho an’ny sakafony ihany,
  - type: text
    content: nefa tsy mety afa-po ny faniriany.
  '8':
  - type: text
    content: Fa inona no soa azon’ny hendry mihoatra noho ny adala?
  - type: text
    content: Tombontsoa inona no ananan’ny mahantra
  - type: text
    content: izay mahay mitondra tena eo imason’ny velona?
  '9':
  - type: text
    content: Ny eo am-pelatanana dia tsara noho ny nofinofy.
  - type: text
    content: Zava-poana sy sambo-drivotra koa izany.
