document_id: EPH.3
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny zavamiafina ny amin’i Kristy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Noho izany, izaho Paoly, mpifatotra noho ny amin’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' Jesosy, noho ny aminareo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jentilisa
  - type: text
    text: ', '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'raha mba renareo mantsy ny fitantanan’Andriamanitra ny fahasoavany izay nomeny ahy noho ny aminareo, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'fa fanambaràna no nampahafantarana ahy ny zavamiafina, araka ny voasoratro tamin’ny teny fohifohy teo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Araka izany, raha mamaky ianareo dia ho takatrareo ny fahafantarako ny zava-niafina momba an’i Kristy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'izay tsy mbola nampahafantarina ny zanak’olombelona tamin’ny taranaka lasa. Izany dia tahaka ny fanambaràn’ny Fanahy ankehitriny amin’ny Apostoly masina sy ny mpaminany, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'dia ny hahatongavan’ny Jentilisa ho mpiray lova sy ho tena iray ary ho mpiombona ny teny fikasana ao amin’i Kristy Jesosy noho ny Filazantsara '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: izay nanaovana ahy ho mpanompo, araka ny fanomezan’ny fahasoavan’Andriamanitra izay nomena ahy araka ny fiasan’ny heriny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Eny, izaho izay kely indrindra amin’ny olona masina rehetra, no nomena izao fahasoavana izao, mba hitory ny haren’i Kristy tsy hita lany amin’ny Jentilisa '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'sy hampahazava ny olona rehetra mba hahalalany ny fitondran’Andriamanitra ny zavamiafina, dia ilay voafina hatramin’ny nahariana izao tontolo izao tao amin’Andriamanitra izay nanao ny zavatra rehetra; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: mba hampahafantarina amin’ny alalan’ny fiangonana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.10 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: eklesia.
    marker-yv: yv-n
  - type: text
    text: ' an’ireo fanapahana sy fahefana any an-danitra amin’izao ankehitriny izao ny lafiny maro samihafa amin’ny fahendren’Andriamanitra, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'araka ny fikasana hatrizay hatrizay izay nataony tao amin’i Kristy Jesosy Tompontsika. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ao Aminy no ananantsika fahasahiana hanatona Azy amin’ny fahatokiana, noho ny finoana Azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Noho izany no angatahako aminareo mba tsy ho ketraka ianareo amin’ny fahoriako noho ny aminareo, fa voninahitrareo izany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Aoka hitoetra ao am-ponareo i Kristy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Izany no antony andohalehako eo anatrehan’ny Ray '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'izay ahazoan’ny fianakaviana rehetra any an-danitra sy etỳ an-tany anarana, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'mba homeny anareo, araka ny harenan’ny voninahiny, ny tanjaka sy ny hery avy ao anaty amin’ny alalan’ny Fanahiny; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'ary koa mba hitoeran’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' ao am-ponareo amin’ny finoana dia hamahatra sy hiorina mafy amin’ny fitiavana ianareo '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'ka hahaizanareo mbamin’ny olona masina rehetra hahafantatra tsara izay sakany, lavany, haavony ary halaliny, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ary hahalala ny fitiavan’i Kristy, izay mihoatra noho ny fahalalana, mba hamenoana anareo amin’ny fahafenoan’Andriamanitra rehetra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary ho an’Ilay mahavita mihoatra noho ny zavatra rehetra; eny, mihoatra lavitra noho izay rehetra angatahintsika na heverintsika aza, araka ny hery izay miasa ato amintsika, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ho Azy anie ny voninahitra ao amin’ny fiangonana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.21 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: eklesia.
    marker-yv: yv-n
  - type: text
    text: ' sy ao amin’i Kristy Jesosy hatramin’ny taranaka rehetra mandrakizay mandrakizay. '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Amena
  - type: text
    text: .
