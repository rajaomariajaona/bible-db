verses:
  '1':
  - type: heading
    content: Ny zavamiafina ny amin’i Kristy
  - type: text
    content: 'Noho izany, izaho Paoly, mpifatotra noho ny amin’i '
  - type: text
    content: Kristy
  - type: text
    content: ' Jesosy, noho ny aminareo '
  - type: text
    content: Jentilisa
  - type: text
    content: ', '
  '10':
  - type: text
    content: mba hampahafantarina amin’ny alalan’ny fiangonana
  - type: note
    content: 'Na: eklesia.'
  - type: text
    content: ' an’ireo fanapahana sy fahefana any an-danitra amin’izao ankehitriny izao ny lafiny maro samihafa amin’ny fahendren’Andriamanitra, '
  '11':
  - type: text
    content: 'araka ny fikasana hatrizay hatrizay izay nataony tao amin’i Kristy Jesosy Tompontsika. '
  '12':
  - type: text
    content: 'Ao Aminy no ananantsika fahasahiana hanatona Azy amin’ny fahatokiana, noho ny finoana Azy. '
  '13':
  - type: text
    content: Noho izany no angatahako aminareo mba tsy ho ketraka ianareo amin’ny fahoriako noho ny aminareo, fa voninahitrareo izany.
  - type: heading
    content: Aoka hitoetra ao am-ponareo i Kristy
  '14':
  - type: text
    content: 'Izany no antony andohalehako eo anatrehan’ny Ray '
  '15':
  - type: text
    content: 'izay ahazoan’ny fianakaviana rehetra any an-danitra sy etỳ an-tany anarana, '
  '16':
  - type: text
    content: 'mba homeny anareo, araka ny harenan’ny voninahiny, ny tanjaka sy ny hery avy ao anaty amin’ny alalan’ny Fanahiny; '
  '17':
  - type: text
    content: 'ary koa mba hitoeran’i '
  - type: text
    content: Kristy
  - type: text
    content: ' ao am-ponareo amin’ny finoana dia hamahatra sy hiorina mafy amin’ny fitiavana ianareo '
  '18':
  - type: text
    content: 'ka hahaizanareo mbamin’ny olona masina rehetra hahafantatra tsara izay sakany, lavany, haavony ary halaliny, '
  '19':
  - type: text
    content: ary hahalala ny fitiavan’i Kristy, izay mihoatra noho ny fahalalana, mba hamenoana anareo amin’ny fahafenoan’Andriamanitra rehetra.
  '2':
  - type: text
    content: 'raha mba renareo mantsy ny fitantanan’Andriamanitra ny fahasoavany izay nomeny ahy noho ny aminareo, '
  '20':
  - type: text
    content: 'Ary ho an’Ilay mahavita mihoatra noho ny zavatra rehetra; eny, mihoatra lavitra noho izay rehetra angatahintsika na heverintsika aza, araka ny hery izay miasa ato amintsika, '
  '21':
  - type: text
    content: ho Azy anie ny voninahitra ao amin’ny fiangonana
  - type: note
    content: 'Na: eklesia.'
  - type: text
    content: ' sy ao amin’i Kristy Jesosy hatramin’ny taranaka rehetra mandrakizay mandrakizay. '
  - type: text
    content: Amena
  - type: text
    content: .
  '3':
  - type: text
    content: 'fa fanambaràna no nampahafantarana ahy ny zavamiafina, araka ny voasoratro tamin’ny teny fohifohy teo. '
  '4':
  - type: text
    content: 'Araka izany, raha mamaky ianareo dia ho takatrareo ny fahafantarako ny zava-niafina momba an’i Kristy, '
  '5':
  - type: text
    content: 'izay tsy mbola nampahafantarina ny zanak’olombelona tamin’ny taranaka lasa. Izany dia tahaka ny fanambaràn’ny Fanahy ankehitriny amin’ny Apostoly masina sy ny mpaminany, '
  '6':
  - type: text
    content: 'dia ny hahatongavan’ny Jentilisa ho mpiray lova sy ho tena iray ary ho mpiombona ny teny fikasana ao amin’i Kristy Jesosy noho ny Filazantsara '
  '7':
  - type: text
    content: izay nanaovana ahy ho mpanompo, araka ny fanomezan’ny fahasoavan’Andriamanitra izay nomena ahy araka ny fiasan’ny heriny.
  '8':
  - type: text
    content: 'Eny, izaho izay kely indrindra amin’ny olona masina rehetra, no nomena izao fahasoavana izao, mba hitory ny haren’i Kristy tsy hita lany amin’ny Jentilisa '
  '9':
  - type: text
    content: 'sy hampahazava ny olona rehetra mba hahalalany ny fitondran’Andriamanitra ny zavamiafina, dia ilay voafina hatramin’ny nahariana izao tontolo izao tao amin’Andriamanitra izay nanao ny zavatra rehetra; '
