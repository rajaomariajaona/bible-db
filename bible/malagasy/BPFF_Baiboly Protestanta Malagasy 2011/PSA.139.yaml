document_id: PSA.139,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: TOMPO ô, Ianao dia mahalala ahy tsara
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: Ho an’ny mpiventy hira. Salamo nataon’i Davida.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: TOMPO ô, efa nandinika ahy Ianao ka mahalala ahy.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: dia mbola entin’ny tananao ihany aho, na dia any aza,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hazonin’ny tananao ankavanana.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ary na dia hoy aho aza hoe: Aoka ny maizina hanarona ahy'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary aoka ny mazava manodidina ahy ho tonga alina,
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: tsia, fa ny maizina aza dia tsy mahamaizina Aminao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny alina dia mahazava toy ny andro ihany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka sahala ny mazava sy ny maizina.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Fa Ianao no nahary ny voako;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: namolavola ahy tao an-kibon’ny reniko Ianao.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Midera Anao aho fa mahatahotra sy mahatalanjona ny fomba nanaovana ahy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mahagaga ny asanao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary fantatry ny fanahiko marimarina izany.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Tsy niafina Taminao ny momba ny tenako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fony natao tao amin’ny miafina aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka noforoninao hisy endrika tany ambanin’ny tany.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Efa nahita ahy ny masonao na dia fony tsy mbola nisy endrika akory aza aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: voasoratra teo amin’ny bokinao avokoa ny andro voatendry,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fony mbola tsy nisy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na dia iray akory aza.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Endre, tsy takatry ny saiko ny hevitrao, Andriamanitra ô!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Akory ny hamaron’ny isany!
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Raha hanisa azy aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia maro lavitra noho ny fasika ny isany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: raha mifoha aho dia mbola eo Aminao ihany.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Haringanao mihitsy anie ny ratsy fanahy, Andriamanitra ô!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mialà amiko, ianareo mpandatsa-dra.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Ianao no mahalala ahy na mipetraka aho na mitsangana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady mahafantatra ny hevitro eny lavitra eny.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Manonona Anao hoenti-mamitaka izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, ny fahavalonao dia manonona Anao foana.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Tsy hankahala izay mankahala Anao va aho, TOMPO ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ho rikoriko amin’izay mitsangana hanohitra Anao?
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Tena halako marina tokoa ireny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fahavaloko ireny.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Diniho aho, Andriamanitra ô, ary fantaro ny foko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: zahao toetra aho ary fantaro ny eritreritro;
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: zahao na misy lalana mety ahitan-doza ato anatiko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia tariho amin’ny lalana mandrakizay aho.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Voadinikao aho, na mandeha, na mandry,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary fantatrao tsara ny alehako rehetra.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Fa indro TOMPO ô, tsy mbola eo amin’ny lelako akory ny teny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia efa fantatrao izy rehetra.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Manodidina ahy ao aorianako sy eo alohako Ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary apetrakao amiko ny tananao.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Fahalalana mahagaga ahy loatra izany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, avo loatra ka tsy takatro.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Aiza no hialako amin’ny Fanahinao?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aiza no handosirako tsy ho eo anatrehanao?
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Na dia miakatra any an-danitra aza aho dia any Ianao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'na dia manao ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: fitoeran’ny maty
    - type: text
      text: ' ho fandriako aza aho dia indro, any Ianao.'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Na dia maka ny elatry ny maraina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba honina any am-paran’ny ranomasina aza aho
