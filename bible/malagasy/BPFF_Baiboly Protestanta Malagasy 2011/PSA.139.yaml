document_id: PSA.139,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: TOMPO ô, Ianao dia mahalala ahy tsara
  - type: text
    content: Ho an’ny mpiventy hira. Salamo nataon’i Davida.
  - type: text
    content: TOMPO ô, efa nandinika ahy Ianao ka mahalala ahy.
  '10':
  - type: text
    content: dia mbola entin’ny tananao ihany aho, na dia any aza,
  - type: text
    content: ary hazonin’ny tananao ankavanana.
  '11':
  - type: text
    content: 'Ary na dia hoy aho aza hoe: Aoka ny maizina hanarona ahy'
  - type: text
    content: ary aoka ny mazava manodidina ahy ho tonga alina,
  '12':
  - type: text
    content: tsia, fa ny maizina aza dia tsy mahamaizina Aminao,
  - type: text
    content: fa ny alina dia mahazava toy ny andro ihany
  - type: text
    content: ka sahala ny mazava sy ny maizina.
  '13':
  - type: text
    content: Fa Ianao no nahary ny voako;
  - type: text
    content: namolavola ahy tao an-kibon’ny reniko Ianao.
  '14':
  - type: text
    content: Midera Anao aho fa mahatahotra sy mahatalanjona ny fomba nanaovana ahy.
  - type: text
    content: Mahagaga ny asanao
  - type: text
    content: ary fantatry ny fanahiko marimarina izany.
  '15':
  - type: text
    content: Tsy niafina Taminao ny momba ny tenako
  - type: text
    content: fony natao tao amin’ny miafina aho
  - type: text
    content: ka noforoninao hisy endrika tany ambanin’ny tany.
  '16':
  - type: text
    content: Efa nahita ahy ny masonao na dia fony tsy mbola nisy endrika akory aza aho;
  - type: text
    content: voasoratra teo amin’ny bokinao avokoa ny andro voatendry,
  - type: text
    content: fony mbola tsy nisy
  - type: text
    content: na dia iray akory aza.
  '17':
  - type: text
    content: Endre, tsy takatry ny saiko ny hevitrao, Andriamanitra ô!
  - type: text
    content: Akory ny hamaron’ny isany!
  '18':
  - type: text
    content: Raha hanisa azy aho
  - type: text
    content: dia maro lavitra noho ny fasika ny isany;
  - type: text
    content: raha mifoha aho dia mbola eo Aminao ihany.
  '19':
  - type: text
    content: Haringanao mihitsy anie ny ratsy fanahy, Andriamanitra ô!
  - type: text
    content: Mialà amiko, ianareo mpandatsa-dra.
  '2':
  - type: text
    content: Ianao no mahalala ahy na mipetraka aho na mitsangana
  - type: text
    content: sady mahafantatra ny hevitro eny lavitra eny.
  '20':
  - type: text
    content: Manonona Anao hoenti-mamitaka izy;
  - type: text
    content: eny, ny fahavalonao dia manonona Anao foana.
  '21':
  - type: text
    content: Tsy hankahala izay mankahala Anao va aho, TOMPO ô,
  - type: text
    content: ary ho rikoriko amin’izay mitsangana hanohitra Anao?
  '22':
  - type: text
    content: Tena halako marina tokoa ireny;
  - type: text
    content: fahavaloko ireny.
  '23':
  - type: text
    content: Diniho aho, Andriamanitra ô, ary fantaro ny foko,
  - type: text
    content: zahao toetra aho ary fantaro ny eritreritro;
  '24':
  - type: text
    content: zahao na misy lalana mety ahitan-doza ato anatiko,
  - type: text
    content: dia tariho amin’ny lalana mandrakizay aho.
  '3':
  - type: text
    content: Voadinikao aho, na mandeha, na mandry,
  - type: text
    content: ary fantatrao tsara ny alehako rehetra.
  '4':
  - type: text
    content: Fa indro TOMPO ô, tsy mbola eo amin’ny lelako akory ny teny
  - type: text
    content: dia efa fantatrao izy rehetra.
  '5':
  - type: text
    content: Manodidina ahy ao aorianako sy eo alohako Ianao
  - type: text
    content: ary apetrakao amiko ny tananao.
  '6':
  - type: text
    content: Fahalalana mahagaga ahy loatra izany;
  - type: text
    content: eny, avo loatra ka tsy takatro.
  '7':
  - type: text
    content: Aiza no hialako amin’ny Fanahinao?
  - type: text
    content: Aiza no handosirako tsy ho eo anatrehanao?
  '8':
  - type: text
    content: Na dia miakatra any an-danitra aza aho dia any Ianao;
  - type: text
    content: 'na dia manao ny '
  - type: text
    content: fitoeran’ny maty
  - type: text
    content: ' ho fandriako aza aho dia indro, any Ianao.'
  '9':
  - type: text
    content: Na dia maka ny elatry ny maraina
  - type: text
    content: mba honina any am-paran’ny ranomasina aza aho
