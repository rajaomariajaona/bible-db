document_id: JDG.14,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fanambadian’i Samsona; ny amin’ny liona sy ny tantely
  - type: text
    content: 'Ary nidina nankany Timna i Samsona ka nahita vehivavy iray tao, avy tamin’ny zanakavavin’ny Filistina. '
  '10':
  - type: text
    content: 'Dia nidina ho any amin-dRavehivavy ny rain’i Samsona; ary nanao fanasana tany i Samsona, fa izany no fanaon’ny zatovo. '
  '11':
  - type: text
    content: 'Rehefa nahita azy izy mianakavy dia nametraka namana telopolo lahy hitoetra ao aminy. '
  '12':
  - type: text
    content: 'Dia hoy i Samsona tamin’ireo: Hanao ankamantatra aminareo aho. Koa raha lazainareo amiko ny heviny ka hitanareo ny valiny ao anatin’ny fito andro aharetan’ny fanasana dia homeko lobaka telopolo sy akanjo intelopolo miova ianareo. '
  '13':
  - type: text
    content: 'Fa raha tsy mahalaza amiko kosa ny valiny ianareo dia homenareo lobaka telopolo sy akanjo intelopolo miova aho. Dia hoy izy ireo: Lazao ary ny ankamantatra fa mihaino izahay. '
  '14':
  - type: text
    content: 'Dia hoy i Samsona taminy:'
  - type: text
    content: Avy tao amin’ny mpihinana no nivoahan’ny hanina;
  - type: text
    content: ary avy tao amin’ny mahery no nivoahan’ny mamy.
  - type: text
    content: 'Tao anatin’ny hateloana dia tsy nahalaza ny valin’ny ankamantatra izy ireo. '
  '15':
  - type: text
    content: 'Ary tamin’ny andro fahafito dia hoy izy ireo tamin’ny vadin’i Samsona: Kolikoleo ny vadinao mba hilaza ny ankamantatra aminay, fandrao hodoranay amin’ny afo ianao sy ny ankohonan-drainao. Nanasa anay va ianareo mba hanafoananareo izay anananay? Tsy izany va? '
  '16':
  - type: text
    content: 'Ary nitomany ny vadin’i Samsona sady nanjohy azy ka niteny hoe: Halanao aho fa tsy tianao akory; nanao ankamantatra tamin’ny zanaky ny fireneko ianao nefa tsy nolazainao tamiko ny heviny! Fa hoy i Samsona taminy: Indro, na dia ny raiko sy ny reniko aza tsy nilazako azy, koa ianao va no hilazako azy? '
  '17':
  - type: text
    content: 'Dia nitomany nanjohy azy hafitoana izay naharetan’ny fanasana Ravehivavy, koa tamin’ny andro fahafito dia nolazain’i Samsona taminy, satria nitakisina taminy izy; fa izy kosa dia nilaza ny hevitry ny ankamantatra tamin’ny zanaky ny fireneny. '
  '18':
  - type: text
    content: 'Tamin’ny andro fahafito, raha tsy mbola maty ny masoandro, dia hoy ireo lehilahy tao an-tanàna tamin’i Samsona:'
  - type: text
    content: Inona no mamy noho ny tantely,
  - type: text
    content: ary inona no mahery noho ny liona?
  - type: text
    content: 'Fa hoy kosa izy taminy:'
  - type: text
    content: Raha tsy nampiasa ny ombivavikeliko ianareo
  - type: text
    content: dia tsy ho nahalala ny ankamantatra nataoko.
  '19':
  - type: text
    content: 'Dia tonga tamin’i Samsona ny Fanahin’NY TOMPO ka nidina nankany Askelona izy dia namono telopolo lahy tao, ary nalainy ny fitafian’ireo ka nomeny ho an’izay nilaza ny ankamantatra. Nirehitra ny fahatezeran’i Samsona raha niakatra nankany amin’ny tranon’ny rainy izy. '
  '2':
  - type: text
    content: 'Dia niakatra izy ka nilaza tamin’ny rainy sy reniny hoe: Nahita vehivavy tany Timna, avy amin’ny zanakavavin’ny Filistina, aho; koa alao ho vadiko izy ankehitriny. '
  '20':
  - type: text
    content: Ary ny vadiny dia lasan’ny namany izay efa nataony sakaizany.
  '3':
  - type: text
    content: 'Fa hoy ny rainy sy ny reniny taminy: Moa tsy misy vehivavy va eto amin’ny zanaky ny havanao, na ato amin’ny fireneko manontolo, no dia mandeha maka vady any amin’ny Filistina tsy mifora ianao? Dia hoy i Samsona tamin’ny rainy: Izy ihany no alao ho ahy, fa izy no mahafinaritra ahy. '
  '4':
  - type: text
    content: Tsy fantatry ny rainy sy ny reniny fa avy tamin’NY TOMPO izany satria nitady izay hiadiany amin’ny Filistina Izy. Fa tamin’izany andro izany dia ny Filistina no nifehy ny Israely.
  '5':
  - type: text
    content: 'Dia nidina i Samsona sy ny ray aman-dreniny nankany Timna. Ary nony tonga tao amin’ny tanim-boaloboka tany Timna izy, indro, nisy liona tanora nierona taminy. '
  '6':
  - type: text
    content: 'Dia tonga tamin’i Samsona ny Fanahin’NY TOMPO ka nosamatsamahiny toy ny fanasamaka zanak’osy ilay liona tanora, nefa tsy nisy na inona na inona teny an-tanany. Ary tsy nambarany tamin’ny rainy na tamin’ny reniny ny zavatra izay nataony. '
  '7':
  - type: text
    content: Dia nidina izy ka niresaka tamin-dRavehivavy; nahafa-po an’i Samsona izy.
  '8':
  - type: text
    content: 'Andro vitsivitsy tatỳ aoriana dia niverina hampakatra azy i Samsona ka nivily hizaha ny fatin’ilay liona. Ary indro, nisy andian-tantely sy tantely ranony tao amin’ilay fatin’ny liona. '
  '9':
  - type: text
    content: Nakan’i Samsona tamin’ny tanany izany, dia nihinana teny am-pandehanana izy; ary nankany amin’ny ray aman-dreniny izy dia nanome azy ka nihinana koa izy mivady. Tsy nambarany taminy anefa fa tao amin’ny fatin’ilay liona no nakany ny tantely.
  - type: heading
    content: Manao ankamantatra amin’ny Filistina i Samsona
