document_id: JDG.14,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fanambadian’i Samsona; ny amin’ny liona sy ny tantely
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ary nidina nankany Timna i Samsona ka nahita vehivavy iray tao, avy tamin’ny zanakavavin’ny Filistina. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Dia nidina ho any amin-dRavehivavy ny rain’i Samsona; ary nanao fanasana tany i Samsona, fa izany no fanaon’ny zatovo. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Rehefa nahita azy izy mianakavy dia nametraka namana telopolo lahy hitoetra ao aminy. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Dia hoy i Samsona tamin’ireo: Hanao ankamantatra aminareo aho. Koa raha lazainareo amiko ny heviny ka hitanareo ny valiny ao anatin’ny fito andro aharetan’ny fanasana dia homeko lobaka telopolo sy akanjo intelopolo miova ianareo. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Fa raha tsy mahalaza amiko kosa ny valiny ianareo dia homenareo lobaka telopolo sy akanjo intelopolo miova aho. Dia hoy izy ireo: Lazao ary ny ankamantatra fa mihaino izahay. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Dia hoy i Samsona taminy:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avy tao amin’ny mpihinana no nivoahan’ny hanina;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary avy tao amin’ny mahery no nivoahan’ny mamy.
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Tao anatin’ny hateloana dia tsy nahalaza ny valin’ny ankamantatra izy ireo. '
  '15':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Ary tamin’ny andro fahafito dia hoy izy ireo tamin’ny vadin’i Samsona: Kolikoleo ny vadinao mba hilaza ny ankamantatra aminay, fandrao hodoranay amin’ny afo ianao sy ny ankohonan-drainao. Nanasa anay va ianareo mba hanafoananareo izay anananay? Tsy izany va? '
  '16':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Ary nitomany ny vadin’i Samsona sady nanjohy azy ka niteny hoe: Halanao aho fa tsy tianao akory; nanao ankamantatra tamin’ny zanaky ny fireneko ianao nefa tsy nolazainao tamiko ny heviny! Fa hoy i Samsona taminy: Indro, na dia ny raiko sy ny reniko aza tsy nilazako azy, koa ianao va no hilazako azy? '
  '17':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Dia nitomany nanjohy azy hafitoana izay naharetan’ny fanasana Ravehivavy, koa tamin’ny andro fahafito dia nolazain’i Samsona taminy, satria nitakisina taminy izy; fa izy kosa dia nilaza ny hevitry ny ankamantatra tamin’ny zanaky ny fireneny. '
  '18':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Tamin’ny andro fahafito, raha tsy mbola maty ny masoandro, dia hoy ireo lehilahy tao an-tanàna tamin’i Samsona:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Inona no mamy noho ny tantely,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary inona no mahery noho ny liona?
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Fa hoy kosa izy taminy:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha tsy nampiasa ny ombivavikeliko ianareo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia tsy ho nahalala ny ankamantatra nataoko.
  '19':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Dia tonga tamin’i Samsona ny Fanahin’NY TOMPO ka nidina nankany Askelona izy dia namono telopolo lahy tao, ary nalainy ny fitafian’ireo ka nomeny ho an’izay nilaza ny ankamantatra. Nirehitra ny fahatezeran’i Samsona raha niakatra nankany amin’ny tranon’ny rainy izy. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Dia niakatra izy ka nilaza tamin’ny rainy sy reniny hoe: Nahita vehivavy tany Timna, avy amin’ny zanakavavin’ny Filistina, aho; koa alao ho vadiko izy ankehitriny. '
  '20':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Ary ny vadiny dia lasan’ny namany izay efa nataony sakaizany.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Fa hoy ny rainy sy ny reniny taminy: Moa tsy misy vehivavy va eto amin’ny zanaky ny havanao, na ato amin’ny fireneko manontolo, no dia mandeha maka vady any amin’ny Filistina tsy mifora ianao? Dia hoy i Samsona tamin’ny rainy: Izy ihany no alao ho ahy, fa izy no mahafinaritra ahy. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Tsy fantatry ny rainy sy ny reniny fa avy tamin’NY TOMPO izany satria nitady izay hiadiany amin’ny Filistina Izy. Fa tamin’izany andro izany dia ny Filistina no nifehy ny Israely.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Dia nidina i Samsona sy ny ray aman-dreniny nankany Timna. Ary nony tonga tao amin’ny tanim-boaloboka tany Timna izy, indro, nisy liona tanora nierona taminy. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Dia tonga tamin’i Samsona ny Fanahin’NY TOMPO ka nosamatsamahiny toy ny fanasamaka zanak’osy ilay liona tanora, nefa tsy nisy na inona na inona teny an-tanany. Ary tsy nambarany tamin’ny rainy na tamin’ny reniny ny zavatra izay nataony. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Dia nidina izy ka niresaka tamin-dRavehivavy; nahafa-po an’i Samsona izy.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Andro vitsivitsy tatỳ aoriana dia niverina hampakatra azy i Samsona ka nivily hizaha ny fatin’ilay liona. Ary indro, nisy andian-tantely sy tantely ranony tao amin’ilay fatin’ny liona. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Nakan’i Samsona tamin’ny tanany izany, dia nihinana teny am-pandehanana izy; ary nankany amin’ny ray aman-dreniny izy dia nanome azy ka nihinana koa izy mivady. Tsy nambarany taminy anefa fa tao amin’ny fatin’ilay liona no nakany ny tantely.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Manao ankamantatra amin’ny Filistina i Samsona
    marker-yv: yv-h
