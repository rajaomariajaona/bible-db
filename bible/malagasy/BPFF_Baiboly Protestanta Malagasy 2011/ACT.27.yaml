document_id: ACT.27
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fiaingana nankany Italia
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Rehefa voadidy hiondrana an-tsambo hankany Italia izahay dia natolotra tamin’ny kapiteny antsoina hoe Jolio, tamin’ny antokon’i Aogosto, i Paoly sy ny mpifatotra sasany. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Niditra tamin’ny sambo avy any Adramitena izay efa handeha hitety ny sisintanin’i Azia izahay dia lasa nandeha; ary niaraka taminay i Aristarko makedoniana avy any Tesalonika. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Nony ampitso dia tonga tany Sidona izahay. Ary tsara ny fitondran’i Jolio an’i Paoly satria navelany hankany amin’ny namany izay nikarakara azy izy. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Rehefa niala teo izahay dia nanara-morona an’i Sipra nihazo ny ilany takon-drivotra satria nanohitra ny rivotra. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Namakivaky ny morontsiraka any Kilikia sy Pamfilia izahay, dia tonga tany Mira any Likia. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Tao no nahitan’ny kapiteny sambo iray avy any Aleksandria hankany Italia, dia nasainy niondrana teo aminy izahay. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Nandritra ny andro maromaro izahay dia nandroso niadana ka saika tsy tonga tandrifin’i Kinido, satria nisakana anay ny rivotra, koa nanara-morona an’i Kreta nihazo ny ilany takon-drivotra tandrifin’i Salmona izahay; '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: rehefa sahirana nanara-morona izahay dia tonga teo amin’ny toerana iray atao hoe Tsarafitodiantsambo, akaikin’ny tanànan’i Lasea.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Satria efa andro maro no lany sady notandindomin-doza ny dia teny an-tsambo tamin’izay, ary efa tapitra ny andro Fifadian-kanina, dia nanolo-kevitra azy ireo i Paoly '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'ka niteny taminy hoe: Ry tompokolahy isany ô! Hitako fa izao fandehanana izao dia hampisy fahasimbana sy fatiantoka be ihany, tsy amin’ny entana sy ny sambo ihany, fa amin’ny aintsika koa aza. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ny kapiteny anefa dia natoky ny mpitondra sy ny tompon-tsambo fa tsy ny teny nolazain’i Paoly. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Satria tsy tsara hitoerana amin’ny ririnina ny fitodian-tsambo teo dia noheverin’ny maro fa tsara raha miala, fandrao mba ho tonga any Foiniksa ahay handany ny ririnina any; fitodian-tsambo any Kreta izany ka manatrika mianatsimo andrefana sy mianavaratra andrefana.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ilay tafio-drivotra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Rehefa nitsoka malemy ny rivotra avy any atsimo dia nihevitra izy ireo fa ho tanteraka ny fikasany ka niala teo ary nanatona ny sisintanin’i Kreta. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Nony afaka kelikely anefa, dia nifofofofo avy tao amin’ny nosy ny tafio-drivotra mahery atao hoe Eorakilona. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Rehefa nopaohin’ny rivotra ny sambo ka tsy nahatoha azy dia navelanay nanara-drian-drano. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Dia nandeha haingana nanaraka ny moron’ny nosy atao hoe Kaoda izahay, ary efa saika tsy azonay ny lakan’aina; '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'rehefa tafakatra izany dia namatorana ny sambo manodidina ireo tady momba ny lakan’aina. Ary natahotra izy ireo fandrao ho tonga hatrany Sirtisy ka nampidinina ny lay ary navelany handeha ho azy ny sambo. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Koa satria nasian’ny rivotra mafy izahay dia nanariana ny entana nony ampitso; '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'ny andro manaraka indray dia ny tanan’izy ireo mihitsy no nanary ireo fitaovana momba ny sambo. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Na ny masoandro na ny kintana dia tsy nipoitra nandritra ny andro maro ary ilay tafio-drivotra dia tsy lefy fa mbola nahery ka tsy nanantena ny ho voavonjy intsony izahay.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Rehefa tsy nihinan-kanina ela izy ireo dia nitsangana teo afovoany i Paoly ka niteny hoe: Ry tompokolahy isany ô! Tokony nihaino ahy ianareo ka tsy niala tany Kreta, dia tsy ho nitranga izao fahasimbana sy fatiantoka izao. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Fa ankehitriny, mananatra anareo aho mba hatoky; fa tsy hisy ho faty akory ianareo fa ny sambo ihany no ho very. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Nisy anjelin’Andriamanitra izay Tompoko sady tompoiko mantsy, nitsangana teo anilako alina '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'ka nilaza hoe: Aza matahotra, ry Paoly; fa tsy maintsy hitsangana eo anatrehan’i Kaisara ianao; ary indro, efa nomen’Andriamanitra ho anao ireo tantsambo rehetra izay miaraka aminao. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Koa matokia, tompokolahy isany, fa mino an’Andriamanitra aho fa ho tanteraka araka ny voalazany tamiko ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Nefa tsy maintsy ho fefika ihany any amin’ny nosy iray isika.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Tamin’ny alina fahefatra amby folo, rehefa nivezivezy tany Adria izahay, nony misasakalina dia noheverin’ireo tantsambo fa efa manakaiky tany izy; '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'dia nanaka-drano izy ka nahita roapolo refy; ary nony nandrosondroso kokoa izy, dia nanaka-drano indray ka nahita dimy amby folo refy. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Natahotra izahay fandrao hidona amin’ny harambato ka nandatsaka vatofantsika efatra teo amin’ny vodisambo ary naniry ny andro haraina malaky. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Nitady handositra hiala tamin’ny sambo anefa ireo tantsambo ka nampidina ny lakan’aina teo amin’ny ranomasina ary nody handatsaka vatofantsika eo an-dohasambo; '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'dia hoy i Paoly tamin’ny kapiteny sy ny miaramila: Raha tsy mijanona eto an-tsambo ireo olona ireo dia tsy ho voavonjy ianareo. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Dia notapahin’ny miaramila ny mahazaka rehetra tamin’ny lakana ka navelany ho latsaka.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Raha mbola tsy nazava ny andro dia niangavy tamin’ny olona rehetra i Paoly mba hihinan-kanina daholo sady hoy izy: Anio no fahefatra amby folo andro niandrasanareo sady tsy nihinananareo na inona na inona. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Koa mananatra anareo aho hihinan-kanina, fa izany no isan’ny hamonjena anareo; tsy hisy ho very akory aminareo rehetra na dia singam-bolo iray aza. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Rehefa nilaza izany izy dia sady nandray mofo no nisaotra an’Andriamanitra teo anatrehan’ny olona rehetra; rehefa novakiny izany dia nanomboka nihinana izy. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Dia nahazo toky izy rehetra ka nihinana koa. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Ary izahay rehetra tao anaty sambo dia olona enina amby fitopolo sy roanjato. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Rehefa voky izy ireo dia nanariany ho any anaty ranomasina ny vary mba hanamaivanana ny sambo.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny faharendrehan’ny sambo
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Nony nazava ny andro dia tsy nahalala ny tany izy fa helodrano iray tsara morona no hitany, koa teo no nokasainy hampiantsonana ny sambo, raha azony atao. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Nesoriny avokoa ny vatofantsika, ka navelany ho any an-dranomasina, ary novahany koa ny kofehin’ny familian-tsambo dia namelatra ny lay anoloana izy mba ho azon’ny rivotra ka hanatona ny tany. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Rehefa tonga tamin’izay nisy fihaonan-dranomasina izy ireo dia navelany hidona tamin’ny tany ny sambo; ary nihizina ny lohasambo ka nijanona tsy nihetsika, fa ny vodisambo kosa dia vakivaky azon’ny herin’ny onja. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Nikasa hamono ny gadra ny miaramila, sao hisy amin’izy ireo ny handositra raha milomano. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Fa ny kapiteny ta hamonjy an’i Paoly ka nisakana azy tsy hanao izay nokasainy; fa izay nahay nilomano no nasainy hirotsaka mialoha ka hilomano ho any amin’ny tany, '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: ary ny sisa dia samy hanao izay hahafaka azy, na amin’ny hazo fisaka, na amin’ny zavatra avy amin’ny sambo. Dia tonga soa amantsara teny an-tanety izy rehetra.
