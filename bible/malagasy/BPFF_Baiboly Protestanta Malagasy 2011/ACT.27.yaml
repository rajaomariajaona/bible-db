document_id: ACT.27,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fiaingana nankany Italia
  - type: text
    content: 'Rehefa voadidy hiondrana an-tsambo hankany Italia izahay dia natolotra tamin’ny kapiteny antsoina hoe Jolio, tamin’ny antokon’i Aogosto, i Paoly sy ny mpifatotra sasany. '
  '10':
  - type: text
    content: 'ka niteny taminy hoe: Ry tompokolahy isany ô! Hitako fa izao fandehanana izao dia hampisy fahasimbana sy fatiantoka be ihany, tsy amin’ny entana sy ny sambo ihany, fa amin’ny aintsika koa aza. '
  '11':
  - type: text
    content: 'Ny kapiteny anefa dia natoky ny mpitondra sy ny tompon-tsambo fa tsy ny teny nolazain’i Paoly. '
  '12':
  - type: text
    content: Satria tsy tsara hitoerana amin’ny ririnina ny fitodian-tsambo teo dia noheverin’ny maro fa tsara raha miala, fandrao mba ho tonga any Foiniksa ahay handany ny ririnina any; fitodian-tsambo any Kreta izany ka manatrika mianatsimo andrefana sy mianavaratra andrefana.
  - type: heading
    content: Ilay tafio-drivotra
  '13':
  - type: text
    content: 'Rehefa nitsoka malemy ny rivotra avy any atsimo dia nihevitra izy ireo fa ho tanteraka ny fikasany ka niala teo ary nanatona ny sisintanin’i Kreta. '
  '14':
  - type: text
    content: 'Nony afaka kelikely anefa, dia nifofofofo avy tao amin’ny nosy ny tafio-drivotra mahery atao hoe Eorakilona. '
  '15':
  - type: text
    content: 'Rehefa nopaohin’ny rivotra ny sambo ka tsy nahatoha azy dia navelanay nanara-drian-drano. '
  '16':
  - type: text
    content: 'Dia nandeha haingana nanaraka ny moron’ny nosy atao hoe Kaoda izahay, ary efa saika tsy azonay ny lakan’aina; '
  '17':
  - type: text
    content: 'rehefa tafakatra izany dia namatorana ny sambo manodidina ireo tady momba ny lakan’aina. Ary natahotra izy ireo fandrao ho tonga hatrany Sirtisy ka nampidinina ny lay ary navelany handeha ho azy ny sambo. '
  '18':
  - type: text
    content: 'Koa satria nasian’ny rivotra mafy izahay dia nanariana ny entana nony ampitso; '
  '19':
  - type: text
    content: 'ny andro manaraka indray dia ny tanan’izy ireo mihitsy no nanary ireo fitaovana momba ny sambo. '
  '2':
  - type: text
    content: 'Niditra tamin’ny sambo avy any Adramitena izay efa handeha hitety ny sisintanin’i Azia izahay dia lasa nandeha; ary niaraka taminay i Aristarko makedoniana avy any Tesalonika. '
  '20':
  - type: text
    content: Na ny masoandro na ny kintana dia tsy nipoitra nandritra ny andro maro ary ilay tafio-drivotra dia tsy lefy fa mbola nahery ka tsy nanantena ny ho voavonjy intsony izahay.
  '21':
  - type: text
    content: 'Rehefa tsy nihinan-kanina ela izy ireo dia nitsangana teo afovoany i Paoly ka niteny hoe: Ry tompokolahy isany ô! Tokony nihaino ahy ianareo ka tsy niala tany Kreta, dia tsy ho nitranga izao fahasimbana sy fatiantoka izao. '
  '22':
  - type: text
    content: 'Fa ankehitriny, mananatra anareo aho mba hatoky; fa tsy hisy ho faty akory ianareo fa ny sambo ihany no ho very. '
  '23':
  - type: text
    content: 'Nisy anjelin’Andriamanitra izay Tompoko sady tompoiko mantsy, nitsangana teo anilako alina '
  '24':
  - type: text
    content: 'ka nilaza hoe: Aza matahotra, ry Paoly; fa tsy maintsy hitsangana eo anatrehan’i Kaisara ianao; ary indro, efa nomen’Andriamanitra ho anao ireo tantsambo rehetra izay miaraka aminao. '
  '25':
  - type: text
    content: 'Koa matokia, tompokolahy isany, fa mino an’Andriamanitra aho fa ho tanteraka araka ny voalazany tamiko ireo. '
  '26':
  - type: text
    content: Nefa tsy maintsy ho fefika ihany any amin’ny nosy iray isika.
  '27':
  - type: text
    content: 'Tamin’ny alina fahefatra amby folo, rehefa nivezivezy tany Adria izahay, nony misasakalina dia noheverin’ireo tantsambo fa efa manakaiky tany izy; '
  '28':
  - type: text
    content: 'dia nanaka-drano izy ka nahita roapolo refy; ary nony nandrosondroso kokoa izy, dia nanaka-drano indray ka nahita dimy amby folo refy. '
  '29':
  - type: text
    content: 'Natahotra izahay fandrao hidona amin’ny harambato ka nandatsaka vatofantsika efatra teo amin’ny vodisambo ary naniry ny andro haraina malaky. '
  '3':
  - type: text
    content: 'Nony ampitso dia tonga tany Sidona izahay. Ary tsara ny fitondran’i Jolio an’i Paoly satria navelany hankany amin’ny namany izay nikarakara azy izy. '
  '30':
  - type: text
    content: 'Nitady handositra hiala tamin’ny sambo anefa ireo tantsambo ka nampidina ny lakan’aina teo amin’ny ranomasina ary nody handatsaka vatofantsika eo an-dohasambo; '
  '31':
  - type: text
    content: 'dia hoy i Paoly tamin’ny kapiteny sy ny miaramila: Raha tsy mijanona eto an-tsambo ireo olona ireo dia tsy ho voavonjy ianareo. '
  '32':
  - type: text
    content: Dia notapahin’ny miaramila ny mahazaka rehetra tamin’ny lakana ka navelany ho latsaka.
  '33':
  - type: text
    content: 'Raha mbola tsy nazava ny andro dia niangavy tamin’ny olona rehetra i Paoly mba hihinan-kanina daholo sady hoy izy: Anio no fahefatra amby folo andro niandrasanareo sady tsy nihinananareo na inona na inona. '
  '34':
  - type: text
    content: 'Koa mananatra anareo aho hihinan-kanina, fa izany no isan’ny hamonjena anareo; tsy hisy ho very akory aminareo rehetra na dia singam-bolo iray aza. '
  '35':
  - type: text
    content: 'Rehefa nilaza izany izy dia sady nandray mofo no nisaotra an’Andriamanitra teo anatrehan’ny olona rehetra; rehefa novakiny izany dia nanomboka nihinana izy. '
  '36':
  - type: text
    content: 'Dia nahazo toky izy rehetra ka nihinana koa. '
  '37':
  - type: text
    content: 'Ary izahay rehetra tao anaty sambo dia olona enina amby fitopolo sy roanjato. '
  '38':
  - type: text
    content: Rehefa voky izy ireo dia nanariany ho any anaty ranomasina ny vary mba hanamaivanana ny sambo.
  - type: heading
    content: Ny faharendrehan’ny sambo
  '39':
  - type: text
    content: 'Nony nazava ny andro dia tsy nahalala ny tany izy fa helodrano iray tsara morona no hitany, koa teo no nokasainy hampiantsonana ny sambo, raha azony atao. '
  '4':
  - type: text
    content: 'Rehefa niala teo izahay dia nanara-morona an’i Sipra nihazo ny ilany takon-drivotra satria nanohitra ny rivotra. '
  '40':
  - type: text
    content: 'Nesoriny avokoa ny vatofantsika, ka navelany ho any an-dranomasina, ary novahany koa ny kofehin’ny familian-tsambo dia namelatra ny lay anoloana izy mba ho azon’ny rivotra ka hanatona ny tany. '
  '41':
  - type: text
    content: 'Rehefa tonga tamin’izay nisy fihaonan-dranomasina izy ireo dia navelany hidona tamin’ny tany ny sambo; ary nihizina ny lohasambo ka nijanona tsy nihetsika, fa ny vodisambo kosa dia vakivaky azon’ny herin’ny onja. '
  '42':
  - type: text
    content: 'Nikasa hamono ny gadra ny miaramila, sao hisy amin’izy ireo ny handositra raha milomano. '
  '43':
  - type: text
    content: 'Fa ny kapiteny ta hamonjy an’i Paoly ka nisakana azy tsy hanao izay nokasainy; fa izay nahay nilomano no nasainy hirotsaka mialoha ka hilomano ho any amin’ny tany, '
  '44':
  - type: text
    content: ary ny sisa dia samy hanao izay hahafaka azy, na amin’ny hazo fisaka, na amin’ny zavatra avy amin’ny sambo. Dia tonga soa amantsara teny an-tanety izy rehetra.
  '5':
  - type: text
    content: 'Namakivaky ny morontsiraka any Kilikia sy Pamfilia izahay, dia tonga tany Mira any Likia. '
  '6':
  - type: text
    content: 'Tao no nahitan’ny kapiteny sambo iray avy any Aleksandria hankany Italia, dia nasainy niondrana teo aminy izahay. '
  '7':
  - type: text
    content: 'Nandritra ny andro maromaro izahay dia nandroso niadana ka saika tsy tonga tandrifin’i Kinido, satria nisakana anay ny rivotra, koa nanara-morona an’i Kreta nihazo ny ilany takon-drivotra tandrifin’i Salmona izahay; '
  '8':
  - type: text
    content: rehefa sahirana nanara-morona izahay dia tonga teo amin’ny toerana iray atao hoe Tsarafitodiantsambo, akaikin’ny tanànan’i Lasea.
  '9':
  - type: text
    content: 'Satria efa andro maro no lany sady notandindomin-doza ny dia teny an-tsambo tamin’izay, ary efa tapitra ny andro Fifadian-kanina, dia nanolo-kevitra azy ireo i Paoly '
