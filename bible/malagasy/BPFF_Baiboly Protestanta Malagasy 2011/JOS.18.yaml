document_id: JOS.18,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nanaovana antsapaka ho an’ireo izay tsy mbola nahazo zaratany
  - type: text
    content: 'Nivory tao Silo ny fiangonana, dia ny Zanak’Israely manontolo, ka nanangana ny '
  - type: text
    content: tranolay fihaonana
  - type: text
    content: ' tao. Ary ny tany dia resy teo anoloany. '
  '10':
  - type: text
    content: Nanao antsapaka ho azy tao Silo teo anatrehan’NY TOMPO i Josoa; ary tao no nizarany ny tany ho an’ny Zanak’Israely araka ny anjarany.
  - type: heading
    content: Ny zaratanin’i Benjamina
  '11':
  - type: text
    content: 'Dia nahazo ny anjarany tamin’ny antsapaka ny fokon’i Benjamina isam-pianakaviany; ny tany azony dia teo anelanelan’ny taranak’i Joda sy ny taranak’i Josefa. '
  '12':
  - type: text
    content: 'Ny sisintaniny amin’ny lafiny avaratra dia hatrany Jordana ka miakatra hatrany amin’ny ilan’i Jeriko amin’ny avaratra, niakatra niankandrefana nahazo ny havoana, nihatra tamin’ny tany efitr’i Bety-Avena; '
  '13':
  - type: text
    content: 'hatreo dia mandroso hatrany Lozy, hatrany amin’ny ilany atsimon’i Lozy na Betela, midina hatrany Atarota-Adara ao amin’ny tendrombohitra atsimon’i Bety-Horona ambany, '
  '14':
  - type: text
    content: 'miolaka amin’ny lafiny andrefana, mianatsimo hatramin’ny tendrombohitra izay eo anoloan’i Bety-Horona eo atsimo, mihatra any Kiriata-Baala na Kiriata-Jearima, tanànan’ny taranak’i Joda: Izay no lafiny andrefana. '
  '15':
  - type: text
    content: 'Ary ny lafiny atsimo dia hatrany amin’ny sisin’i Kiriata-Jearima; ary ny sisintany dia mandroso miankandrefana, mihatra amin’ny loharanon’i Neftoa, '
  '16':
  - type: text
    content: 'midina hatrany amin’ny faran’ny tendrombohitra, izay tandrifin’ny lohasahan’ny taranak’i Hinoma, eo amin’ny lohasahan’ny Refaìta eo avaratra, midina hatramin’ny lohasahan’i Hinoma, hatramin’ny ilany atsimon’ny Jebosita, midina hatrany Eny-Rogela, '
  '17':
  - type: text
    content: 'mizotra avy any avaratra, mandroso hatrany Eny-Semesy sy i Gelilota izay tandrifin’ny fiakarana Adomima, midina hatramin’ny vaton’i Bohana, zanak’i Robena, '
  '18':
  - type: text
    content: 'mandroso hatrany amin’ny ilany avaratra tandrifin’ny tany ngazana, midina hatrany amin’ny tany ngazana, '
  '19':
  - type: text
    content: 'mandroso hatramin’ny ilany avaratr’i Bety-Hogla, mihatra amin’ny helodrano avaratra amin’ny Ranomasintsira, eo amin’ny farany atsimo amin’i Jordana: Izay no sisintany atsimo. '
  '2':
  - type: text
    content: 'Nisy foko fito tamin’ny Zanak’Israely anefa tsy mbola nahazo ny lovany. '
  '20':
  - type: text
    content: Ary i Jordana no mamaritra ny sisintaniny atsinanana. Ireo no lovan’ny taranak’i Benjamina sy ny sisintany manodidina azy, araka ny fokony.
  '21':
  - type: text
    content: 'Ary ny tanànan’ny fokon’i Benjamina araka ny fianakaviany dia i Jeriko sy i Bety-Hogla ary ny lohasahan’i Keziza, '
  '22':
  - type: text
    content: 'i Bety-Arabà, i Zemaraima, i Betela, '
  '23':
  - type: text
    content: 'i Avima, i Para, i Ofra, '
  '24':
  - type: text
    content: 'i Kefara-Hamony, i Ofny, i Geba: Tanàna roa amby folo mbamin’ny vohitra miankina aminy; '
  '25':
  - type: text
    content: 'i Gibeona, i Rama, i Berota, '
  '26':
  - type: text
    content: 'i Mizpa, i Kefira, i Moza, '
  '27':
  - type: text
    content: 'i Rekema, Iripela, i Tarala, '
  '28':
  - type: text
    content: 'i Zela, i Elefa, ny Jebosita na Jerosalema, i Gibea sy i Kiriata: Tanàna efatra amby folo sy ny vohitra miankina aminy. Izay no lovan’ny taranak’i Benjamina araka ny fianakaviany.'
  '3':
  - type: text
    content: 'Dia hoy i Josoa tamin’ny Zanak’Israely: Mandra-pahoviana ianareo no hiraviravy tanana tsy hiditra handray ny tany izay nomen’NY TOMPO, Andriamanitry ny razanareo, anareo? '
  '4':
  - type: text
    content: 'Manendre telo lahy avy isam-poko, dia haniraka azy aho ary hiainga izy ka handeha hitety ny tany mba hanoratra azy araka ny ho lovany, dia hiverina atỳ amiko. '
  '5':
  - type: text
    content: 'Ary hizara azy ho fito toko izy; koa ny Joda dia hijanona any amin’ny taniny ao atsimo, ary ny taranak’i Josefa dia hijanona any amin’ny taniny ao avaratra. '
  '6':
  - type: text
    content: 'Soratinareo ny tany ka ataovy fito toko; ary ento atỳ amiko ny soratra, dia hanao antsapaka ho anareo eto anatrehan’NY TOMPO Andriamanitsika aho. '
  '7':
  - type: text
    content: 'Fa tsy mba manana anjara eo aminareo ny '
  - type: text
    content: levita
  - type: text
    content: ' fa ny fisoronana amin’NY TOMPO no lovany; ary i Gada sy i Robena ary ny antsasaky ny fokon’i Manase dia efa nahazo ny lovany any andafy atsinanan’i Jordana izay nomen’i Mosesy, mpanompon’NY TOMPO, azy. '
  '8':
  - type: text
    content: 'Dia niainga ireo lehilahy ireo ka nandeha; ary nandidy izay nandeha hanoratra ny tany i Josoa hoe: Mandehana mitety ny tany ka soraty ireny, dia miverena atỳ amiko fa eto Silo no hanaovako antsapaka ho anareo eo anatrehan’NY TOMPO. '
  '9':
  - type: text
    content: 'Dia lasa ireo lehilahy ireo ka nandeha nitety ny tany, dia nanoratra azy ireo tamin’ny boky ka nataony fito toko, araka ny tanàna, ary niverina tany amin’i Josoa tao an-toby tao Silo. '
