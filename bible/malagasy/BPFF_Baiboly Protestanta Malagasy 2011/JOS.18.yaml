document_id: JOS.18
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nanaovana antsapaka ho an’ireo izay tsy mbola nahazo zaratany
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Nivory tao Silo ny fiangonana, dia ny Zanak’Israely manontolo, ka nanangana ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tranolay fihaonana
  - type: text
    text: ' tao. Ary ny tany dia resy teo anoloany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Nisy foko fito tamin’ny Zanak’Israely anefa tsy mbola nahazo ny lovany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dia hoy i Josoa tamin’ny Zanak’Israely: Mandra-pahoviana ianareo no hiraviravy tanana tsy hiditra handray ny tany izay nomen’NY TOMPO, Andriamanitry ny razanareo, anareo? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Manendre telo lahy avy isam-poko, dia haniraka azy aho ary hiainga izy ka handeha hitety ny tany mba hanoratra azy araka ny ho lovany, dia hiverina atỳ amiko. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary hizara azy ho fito toko izy; koa ny Joda dia hijanona any amin’ny taniny ao atsimo, ary ny taranak’i Josefa dia hijanona any amin’ny taniny ao avaratra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Soratinareo ny tany ka ataovy fito toko; ary ento atỳ amiko ny soratra, dia hanao antsapaka ho anareo eto anatrehan’NY TOMPO Andriamanitsika aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Fa tsy mba manana anjara eo aminareo ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: levita
  - type: text
    text: ' fa ny fisoronana amin’NY TOMPO no lovany; ary i Gada sy i Robena ary ny antsasaky ny fokon’i Manase dia efa nahazo ny lovany any andafy atsinanan’i Jordana izay nomen’i Mosesy, mpanompon’NY TOMPO, azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dia niainga ireo lehilahy ireo ka nandeha; ary nandidy izay nandeha hanoratra ny tany i Josoa hoe: Mandehana mitety ny tany ka soraty ireny, dia miverena atỳ amiko fa eto Silo no hanaovako antsapaka ho anareo eo anatrehan’NY TOMPO. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Dia lasa ireo lehilahy ireo ka nandeha nitety ny tany, dia nanoratra azy ireo tamin’ny boky ka nataony fito toko, araka ny tanàna, ary niverina tany amin’i Josoa tao an-toby tao Silo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Nanao antsapaka ho azy tao Silo teo anatrehan’NY TOMPO i Josoa; ary tao no nizarany ny tany ho an’ny Zanak’Israely araka ny anjarany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny zaratanin’i Benjamina
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Dia nahazo ny anjarany tamin’ny antsapaka ny fokon’i Benjamina isam-pianakaviany; ny tany azony dia teo anelanelan’ny taranak’i Joda sy ny taranak’i Josefa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ny sisintaniny amin’ny lafiny avaratra dia hatrany Jordana ka miakatra hatrany amin’ny ilan’i Jeriko amin’ny avaratra, niakatra niankandrefana nahazo ny havoana, nihatra tamin’ny tany efitr’i Bety-Avena; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'hatreo dia mandroso hatrany Lozy, hatrany amin’ny ilany atsimon’i Lozy na Betela, midina hatrany Atarota-Adara ao amin’ny tendrombohitra atsimon’i Bety-Horona ambany, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'miolaka amin’ny lafiny andrefana, mianatsimo hatramin’ny tendrombohitra izay eo anoloan’i Bety-Horona eo atsimo, mihatra any Kiriata-Baala na Kiriata-Jearima, tanànan’ny taranak’i Joda: Izay no lafiny andrefana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary ny lafiny atsimo dia hatrany amin’ny sisin’i Kiriata-Jearima; ary ny sisintany dia mandroso miankandrefana, mihatra amin’ny loharanon’i Neftoa, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'midina hatrany amin’ny faran’ny tendrombohitra, izay tandrifin’ny lohasahan’ny taranak’i Hinoma, eo amin’ny lohasahan’ny Refaìta eo avaratra, midina hatramin’ny lohasahan’i Hinoma, hatramin’ny ilany atsimon’ny Jebosita, midina hatrany Eny-Rogela, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'mizotra avy any avaratra, mandroso hatrany Eny-Semesy sy i Gelilota izay tandrifin’ny fiakarana Adomima, midina hatramin’ny vaton’i Bohana, zanak’i Robena, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'mandroso hatrany amin’ny ilany avaratra tandrifin’ny tany ngazana, midina hatrany amin’ny tany ngazana, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'mandroso hatramin’ny ilany avaratr’i Bety-Hogla, mihatra amin’ny helodrano avaratra amin’ny Ranomasintsira, eo amin’ny farany atsimo amin’i Jordana: Izay no sisintany atsimo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ary i Jordana no mamaritra ny sisintaniny atsinanana. Ireo no lovan’ny taranak’i Benjamina sy ny sisintany manodidina azy, araka ny fokony.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary ny tanànan’ny fokon’i Benjamina araka ny fianakaviany dia i Jeriko sy i Bety-Hogla ary ny lohasahan’i Keziza, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'i Bety-Arabà, i Zemaraima, i Betela, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'i Avima, i Para, i Ofra, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'i Kefara-Hamony, i Ofny, i Geba: Tanàna roa amby folo mbamin’ny vohitra miankina aminy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'i Gibeona, i Rama, i Berota, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'i Mizpa, i Kefira, i Moza, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'i Rekema, Iripela, i Tarala, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'i Zela, i Elefa, ny Jebosita na Jerosalema, i Gibea sy i Kiriata: Tanàna efatra amby folo sy ny vohitra miankina aminy. Izay no lovan’ny taranak’i Benjamina araka ny fianakaviany.'
