document_id: MAT.6,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fomba fanomezana
  - type: text
    content: Tandremo fandrao hanao ny asan’ny fahamarinanareo
  - type: note
    content: 'ny asan’ny fahamarinana: ilazana ny fiantrana sy ny vavaka ary ny fifadian-kanina izay fomba tamin’ny fivavahan’ny Jiosy.'
  - type: text
    content: ' eo imason’ny olona mba ho hitany ianareo; fa raha vao izay dia tsy manana valim-pitia amin’ny Rainareo izay any an-danitra ianareo. '
  '10':
  - type: text
    content: Ho tonga anie ny fanjakanao.
  - type: text
    content: Hatao anie ny sitraponao
  - type: text
    content: etỳ an-tany tahaka ny any an-danitra.
  '11':
  - type: text
    content: Omeo anay anio izay hanina sahaza ho anay.
  '12':
  - type: text
    content: Ary mamelà ny helokay
  - type: note
    content: 'Na: trosa.'
  - type: text
    content: tahaka ny namelanay izay meloka
  - type: note
    content: 'Na: nitrosa.'
  - type: text
    content: ' taminay.'
  '13':
  - type: text
    content: Ary aza mitondra anay ho amin’ny fakam-panahy
  - type: text
    content: fa manafaha anay amin’ny ratsy
  - type: note
    content: 'Ampio hoe: [Fa Anao ny fanjakana sy ny hery ary ny voninahitra mandrakizay. Amena.]'
  - type: text
    content: .
  '14':
  - type: text
    content: 'Fa raha mamela ny fahadisoan’ny olona ianareo dia mba hamela ny anareo ny Rainareo izay any an-danitra. '
  '15':
  - type: text
    content: Fa raha tsy mamela ny fahadisoan’ny olona kosa ianareo dia tsy hamela ny fahadisoanareo ny Rainareo.
  - type: heading
    content: Ny fomba fifadian-kanina
  '16':
  - type: text
    content: 'Rehefa mifady hanina ianareo, aza mety ho tahaka ny mpihatsaravelatsihy, izay mampanjombona ny endriny ary manaratsy ny tarehiny mba ho hitan’ny olona fa mifady hanina. Lazaiko aminareo marina tokoa fa efa azony ny valim-pitiany. '
  '17':
  - type: text
    content: 'Fa ianao kosa, rehefa mifady hanina, dia hosory menaka manitra ny lohanao ary sasao ny tavanao '
  '18':
  - type: text
    content: mba tsy ho hitan’ny olona fa mifady hanina ianao, fa ho hitan’ny Rainao, izay ao amin’ny mangingina; ary ny Rainao, izay mahita ao amin’ny mangingina, no hamaly anao.
  - type: heading
    content: Harena any an-danitra
  - type: heading
    content: Lio 11.33-34
  '19':
  - type: text
    content: 'Aza mihary harena ho anareo etỳ an-tany, izay misy kalalao sy harafesina manimba sady misy mpangalatra mamaky trano sy mangalatra. '
  '2':
  - type: text
    content: 'Koa amin’izany, rehefa manao fiantrana ianao, aza mba mitsoka trompetra eo alohanao tahaka ny fanaon’ny mpihatsaravelatsihy eo amin’ny sinagoga sy eny an-dalambe mba hankalazan’ny olona azy. Lazaiko aminareo marina tokoa fa efa azony ny valim-pitiany. '
  '20':
  - type: text
    content: 'Fa miharia harena ho anareo any an-danitra, izay tsy misy kalalao na harafesina manimba, sady tsy misy mpangalatra mamaky trano na mangalatra. '
  '21':
  - type: text
    content: Fa izay itoeran’ny harenanao dia ho any koa ny fonao.
  - type: heading
    content: Ny maso no jiron’ny tena
  - type: heading
    content: Lio 11.34-36
  '22':
  - type: text
    content: 'Ny maso no jiron’ny tena; koa amin’izany, raha tsara ny masonao, dia hazava avokoa ny tenanao manontolo. '
  '23':
  - type: text
    content: Fa raha ratsy ny masonao dia ho maizina avokoa ny tenanao manontolo; koa raha maizina ny fahazavana ao anatinao, toy inona ny halehiben’izany fahamaizinana izany!
  - type: heading
    content: Andriamanitra sa ny vola
  - type: heading
    content: Lio 16.13
  '24':
  - type: text
    content: Tsy misy olona mahay manompo tompo roa; fa ho halany ny iray ary ho tiany ny iray; na hombany ny iray ary hohamavoiny ny iray. Tsy mahay manompo an’Andriamanitra sy i Mamôna
  - type: note
    content: 'Mamôna: Anarana ilazana ny vola.'
  - type: text
    content: ' ianareo.'
  - type: heading
    content: Ny fanahiana
  - type: heading
    content: Lio 12.22-32
  '25':
  - type: text
    content: 'Noho izany no ilazako aminareo hoe: Aza manahy ny amin’ny ainareo, dia izay hohaninareo na izay hosotroinareo, na ny amin’ny tenanareo, dia izay hotafinareo. Moa tsy mihoatra noho ny hanina va ny aina ary noho ny fitafiana ny tena? '
  '26':
  - type: text
    content: 'Diniho ny voromanidina, fa tsy mba mamafy, na mijinja, na mitaona ho any an-tsompitra ireny; fa dia ny Rainareo izay any an-danitra no mamelona azy. Moa tsy mihoatra lavitra noho ireny va ianareo? '
  '27':
  - type: text
    content: 'Ary iza eo aminareo, na dia manahy aza, no mahay manampy ny andro hiainany na dia '
  - type: text
    content: hakiho
  - type: text
    content: ' iray akory aza?'
  '28':
  - type: text
    content: 'Nahoana koa no manahy ny amin’ny fitafiana ianareo? Diniho tsara ny fanirin’ny voninkazo eny an-tsaha; tsy mba miasa na mamoly ireny; '
  '29':
  - type: text
    content: 'nefa lazaiko aminareo fa na dia i Solomona tao amin’ny voninahiny rehetra aza tsy mba nitafy na dia tahaka ny iray amin’ireny voninkazo ireny. '
  '3':
  - type: text
    content: 'Fa ianao kosa, raha manao fiantrana, dia aoka tsy ho fantatry ny tananao havia izay ataon’ny tananao havanana '
  '30':
  - type: text
    content: Ary raha ny ahitra any an-tsaha, izay misy ihany anio fa hatsipy ao am-patana rahampitso, no ampitafin’Andriamanitra toy izany, tsy mainka va ianareo, ry kely finoana?
  '31':
  - type: text
    content: 'Koa aza manahy ianareo ka miteny hoe: Inona no hohaninay? Na: Inona no hosotroinay? Na: Inona no hotafinay? '
  '32':
  - type: text
    content: 'Fa izany rehetra izany dia katsahin’ny '
  - type: text
    content: Jentilisa
  - type: text
    content: ' fatratra; fantatry ny Rainareo izay any an-danitra fa ilainareo izany rehetra izany. '
  '33':
  - type: text
    content: Fa katsaho aloha ny fanjakany sy ny fahamarinany, dia hanampy ho anareo izany rehetra izany.
  '34':
  - type: text
    content: Ary amin’izany, aza manahy ny amin’ny ampitso ianareo; fa ny ampitso hanahy ny azy. Ampy ho an’ny andro iray ny ratsy miseho ao aminy.
  '4':
  - type: text
    content: mba hatao ao amin’ny mangingina ny fiantranao; ary ny Rainao, izay mahita ao amin’ny mangingina, no hamaly anao.
  - type: heading
    content: Ny fomba fanao rehefa mivavaka
  '5':
  - type: text
    content: 'Rehefa mivavaka ianareo, aza mba ho tahaka ny mpihatsaravelatsihy; fa izy tia ny mivavaka mitsangana eo amin’ny sinagoga sy eny an-joron-dalana mba hahitan’ny olona azy. Lazaiko aminareo marina tokoa fa efa azony ny valim-pitiany. '
  '6':
  - type: text
    content: Fa ianao kosa, rehefa mivavaka, dia midira ao amin’ny efitranonao, koa rehefa voarindrinao ny varavaranao dia mivavaha amin’ny Rainao izay ao amin’ny mangingina; ary ny Rainao izay mahita ao amin’ny mangingina no hamaly anao.
  '7':
  - type: text
    content: 'Ary rehefa mivavaka ianareo dia aza mba milaza teny maro foana tahaka ny '
  - type: text
    content: Jentilisa
  - type: text
    content: '; fa ireo dia mihevitra hoe: Ny hamaroan’ny teniny no hihainoana azy. '
  '8':
  - type: text
    content: Koa aza manahaka azy ianareo; fa alohan’ny hangatahanareo Aminy dia efa fantatry ny Rainareo izay tokony ho anareo.
  - type: heading
    content: Ny «Rainay izay any an-danitra»
  - type: heading
    content: Lio 11.2-4
  '9':
  - type: text
    content: 'Koa amin’izany dia mivavaha toy izao ianareo:'
  - type: text
    content: Rainay izay any an-danitra,
  - type: text
    content: hohamasinina anie ny anaranao.
