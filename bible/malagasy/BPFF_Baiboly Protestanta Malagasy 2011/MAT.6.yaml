document_id: MAT.6
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fomba fanomezana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Tandremo fandrao hanao ny asan’ny fahamarinanareo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'ny asan’ny fahamarinana: ilazana ny fiantrana sy ny vavaka ary ny fifadian-kanina izay fomba tamin’ny fivavahan’ny Jiosy.'
    marker-yv: yv-n
  - type: text
    text: ' eo imason’ny olona mba ho hitany ianareo; fa raha vao izay dia tsy manana valim-pitia amin’ny Rainareo izay any an-danitra ianareo. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Koa amin’izany, rehefa manao fiantrana ianao, aza mba mitsoka trompetra eo alohanao tahaka ny fanaon’ny mpihatsaravelatsihy eo amin’ny sinagoga sy eny an-dalambe mba hankalazan’ny olona azy. Lazaiko aminareo marina tokoa fa efa azony ny valim-pitiany. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Fa ianao kosa, raha manao fiantrana, dia aoka tsy ho fantatry ny tananao havia izay ataon’ny tananao havanana '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: mba hatao ao amin’ny mangingina ny fiantranao; ary ny Rainao, izay mahita ao amin’ny mangingina, no hamaly anao.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fomba fanao rehefa mivavaka
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Rehefa mivavaka ianareo, aza mba ho tahaka ny mpihatsaravelatsihy; fa izy tia ny mivavaka mitsangana eo amin’ny sinagoga sy eny an-joron-dalana mba hahitan’ny olona azy. Lazaiko aminareo marina tokoa fa efa azony ny valim-pitiany. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Fa ianao kosa, rehefa mivavaka, dia midira ao amin’ny efitranonao, koa rehefa voarindrinao ny varavaranao dia mivavaha amin’ny Rainao izay ao amin’ny mangingina; ary ny Rainao izay mahita ao amin’ny mangingina no hamaly anao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary rehefa mivavaka ianareo dia aza mba milaza teny maro foana tahaka ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jentilisa
  - type: text
    text: '; fa ireo dia mihevitra hoe: Ny hamaroan’ny teniny no hihainoana azy. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Koa aza manahaka azy ianareo; fa alohan’ny hangatahanareo Aminy dia efa fantatry ny Rainareo izay tokony ho anareo.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny «Rainay izay any an-danitra»
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Lio 11.2-4
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Koa amin’izany dia mivavaha toy izao ianareo:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Rainay izay any an-danitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hohamasinina anie ny anaranao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ho tonga anie ny fanjakanao.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hatao anie ny sitraponao
- type: usfm
  marker: q1
  children:
  - type: text
    text: etỳ an-tany tahaka ny any an-danitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Omeo anay anio izay hanina sahaza ho anay.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ary mamelà ny helokay
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.12 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: trosa.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: tahaka ny namelanay izay meloka
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.12 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: nitrosa.
    marker-yv: yv-n
  - type: text
    text: ' taminay.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ary aza mitondra anay ho amin’ny fakam-panahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa manafaha anay amin’ny ratsy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.13 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Ampio hoe: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[Fa Anao ny fanjakana sy ny hery ary ny voninahitra mandrakizay. Amena.]'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Fa raha mamela ny fahadisoan’ny olona ianareo dia mba hamela ny anareo ny Rainareo izay any an-danitra. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Fa raha tsy mamela ny fahadisoan’ny olona kosa ianareo dia tsy hamela ny fahadisoanareo ny Rainareo.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fomba fifadian-kanina
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Rehefa mifady hanina ianareo, aza mety ho tahaka ny mpihatsaravelatsihy, izay mampanjombona ny endriny ary manaratsy ny tarehiny mba ho hitan’ny olona fa mifady hanina. Lazaiko aminareo marina tokoa fa efa azony ny valim-pitiany. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Fa ianao kosa, rehefa mifady hanina, dia hosory menaka manitra ny lohanao ary sasao ny tavanao '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: mba tsy ho hitan’ny olona fa mifady hanina ianao, fa ho hitan’ny Rainao, izay ao amin’ny mangingina; ary ny Rainao, izay mahita ao amin’ny mangingina, no hamaly anao.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Harena any an-danitra
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Lio 11.33-34
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Aza mihary harena ho anareo etỳ an-tany, izay misy kalalao sy harafesina manimba sady misy mpangalatra mamaky trano sy mangalatra. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Fa miharia harena ho anareo any an-danitra, izay tsy misy kalalao na harafesina manimba, sady tsy misy mpangalatra mamaky trano na mangalatra. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Fa izay itoeran’ny harenanao dia ho any koa ny fonao.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny maso no jiron’ny tena
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Lio 11.34-36
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ny maso no jiron’ny tena; koa amin’izany, raha tsara ny masonao, dia hazava avokoa ny tenanao manontolo. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Fa raha ratsy ny masonao dia ho maizina avokoa ny tenanao manontolo; koa raha maizina ny fahazavana ao anatinao, toy inona ny halehiben’izany fahamaizinana izany!
- type: usfm
  marker: s1
  children:
  - type: text
    text: Andriamanitra sa ny vola
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Lio 16.13
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Tsy misy olona mahay manompo tompo roa; fa ho halany ny iray ary ho tiany ny iray; na hombany ny iray ary hohamavoiny ny iray. Tsy mahay manompo an’Andriamanitra sy i Mamôna
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Mamôna: Anarana ilazana ny vola.'
    marker-yv: yv-n
  - type: text
    text: ' ianareo.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fanahiana
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Lio 12.22-32
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Noho izany no ilazako aminareo hoe: Aza manahy ny amin’ny ainareo, dia izay hohaninareo na izay hosotroinareo, na ny amin’ny tenanareo, dia izay hotafinareo. Moa tsy mihoatra noho ny hanina va ny aina ary noho ny fitafiana ny tena? '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Diniho ny voromanidina, fa tsy mba mamafy, na mijinja, na mitaona ho any an-tsompitra ireny; fa dia ny Rainareo izay any an-danitra no mamelona azy. Moa tsy mihoatra lavitra noho ireny va ianareo? '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ary iza eo aminareo, na dia manahy aza, no mahay manampy ny andro hiainany na dia '
  - type: usfm
    marker: w
    children:
    - type: text
      text: hakiho
  - type: text
    text: ' iray akory aza?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Nahoana koa no manahy ny amin’ny fitafiana ianareo? Diniho tsara ny fanirin’ny voninkazo eny an-tsaha; tsy mba miasa na mamoly ireny; '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'nefa lazaiko aminareo fa na dia i Solomona tao amin’ny voninahiny rehetra aza tsy mba nitafy na dia tahaka ny iray amin’ireny voninkazo ireny. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Ary raha ny ahitra any an-tsaha, izay misy ihany anio fa hatsipy ao am-patana rahampitso, no ampitafin’Andriamanitra toy izany, tsy mainka va ianareo, ry kely finoana?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Koa aza manahy ianareo ka miteny hoe: Inona no hohaninay? Na: Inona no hosotroinay? Na: Inona no hotafinay? '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Fa izany rehetra izany dia katsahin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jentilisa
  - type: text
    text: ' fatratra; fantatry ny Rainareo izay any an-danitra fa ilainareo izany rehetra izany. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Fa katsaho aloha ny fanjakany sy ny fahamarinany, dia hanampy ho anareo izany rehetra izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Ary amin’izany, aza manahy ny amin’ny ampitso ianareo; fa ny ampitso hanahy ny azy. Ampy ho an’ny andro iray ny ratsy miseho ao aminy.
