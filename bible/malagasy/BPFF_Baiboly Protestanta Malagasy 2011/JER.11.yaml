document_id: JER.11
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mivadika ny fanekena
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Izao no teny tonga tamin’i Jeremia avy tamin’NY TOMPO: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Mihainoa ny tenin’izao fanekena izao ianareo, ary mitenena amin’ny Joda sy amin’ny mponina any Jerosalema. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Izao no holazainao aminy: Izao no lazain’NY TOMPO, Andriamanitry ny Israely: Ho voaozona izay olona tsy mankatò ny tenin’izao fanekena izao, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'dia izay nandidiako ny razanareo tamin’ny andro nitondrako azy nivoaka avy tany amin’ny tany Ejipta, izay avy tao amin’ny memy fandrendreham-by, ka nilazako hoe: Mihainoa ny feoko ary mankatoava ireny araka izay rehetra andidiako anareo, dia ho oloko ianareo, ary Izaho kosa ho Andriamanitrareo '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'mba hotanterahiko ny fianianana izay nianianako tamin’ny razanareo, dia ny hanomezana azy tany tondra-dronono sy tantely tahaka ny amin’izao anio izao. Dia namaly aho hoe: '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Amena
  - type: text
    text: ', RY TOMPO ô! '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary hoy NY TOMPO tamiko: Torio any an-tanànan’ny Joda sy any an-dalamben’i Jerosalema izany teny rehetra izany ka lazao hoe: Henoy ny tenin’izao fanekena izao ary ankatoavy izany. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Fa nananatra mafy ny razanareo Aho tamin’ny andro nitondrako azy nivoaka avy tany amin’ny tany Ejipta ka mandraka androany; eny, nifoha vao maraina Aho ka nananatra hoe: Mihainoa ny feoko. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Nefa tsy nihaino izy ireo na nanongilana ny sofiny, fa samy nandeha tamin’ny ditran’ny fo ratsiny ihany izy ireo. Koa nataoko mihatra aminy ny teny rehetra amin’izao fanekena izao, dia ilay nasaiko nataony nefa tsy nataony. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary hoy koa NY TOMPO tamiko: Misy tetika fikomiana hita ao amin’ny Joda sy amin’ny mponina any Jerosalema. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Fa izy dia niverina nankany amin’ny heloky ny razany izay tsy nety nihaino ny teniko, ary lasa nanaraka andriamanitra hafa izy ka nanompo azy. Nivadika ny fanekeko, izay nataoko tamin’ny razany, ny taranak’Israely sy ny taranak’i Joda.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Koa izao no lazain’NY TOMPO: Indro, hahatonga loza aminy, izay tsy azony andosirana Aho; ary na dia hitaraina Amiko aza izy dia tsy hihaino azy Aho. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Dia handeha ny tanànan’ny Joda sy ny mponina any Jerosalema ka hitaraina amin’ireny andriamaniny izay efa nandoroany ditin-kazo manitra ireny; nefa tsy hahavonjy azy akory ireny amin’ny andro fahoriany. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Fa araka ny isan’ny tanànanao, ry Joda, no isan’ny andriamanitrao; ary araka ny isan’ny lalamben’i Jerosalema no isan’ny alitara naorinareo ho an’ilay mampahamenatra, dia alitara handoroana ditin-kazo manitra ho an’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Baala
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Koa aza mivavaka ho an’ity firenena ity ianao, ary aza manandratra fitarainana na fifonana ho azy; fa amin’ny andro izay hitarainany Amiko noho ny fahoriany dia tsy hihaino azy Aho.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nokapain’NY TOMPO ilay hazo olivany
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Hanao inona ao an-tranoko ny malalako?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Efa namoron-tsain-dratsy niaraka tamin’ny maro izy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Moa ny voady sy ny hena masina va no hampiala ny faharatsianao, na hahafahanao handositra?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Raha azon-doza ianao, mifalia ary!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Hazo oliva maitso sady misy voany tena tsara endrika
- type: usfm
  marker: q1
  children:
  - type: text
    text: no nataon’NY TOMPO anaranao.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tamin’ny fihorakorahana be no nandrehetany afo taminy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary nokapaina ny rantsany.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Fa Andriamanitra, Tompon’izao rehetra izao, izay namboly anao, no nanambara ny loza hanjo anao, noho ny ratsy nataon’ny taranak’Israely sy ny taranak’i Joda, izay nahavoa ny tenany ka nahatezitra Ahy, dia tamin’ny nandoroany ditin-kazo manitra ho an’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Baala
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Norahonan’ny fianakaviany akaiky i Jeremia
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Nampahafantarin’NY TOMPO aho ka nahalala; nasehonao ahy tamin’izany ny fanaony. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Fa izaho dia tahaka ny zanak’ondry bonaika izay entina hovonoina; ary tsy fantatro fa izao no tetika nataony namelezany ahy: Aoka hosimbaintsika ny hazo mbamin’ny voany, ary aoka hofongorantsika hiala amin’ny tanin’ny velona izy mba tsy hotsarovana intsony ny anarany.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Nefa, Andriamanitra, Tompon’izao rehetra izao ô, izay mitsara marina
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka mamantatra ny voa sy ny fo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: aoka ho hitako ny famalianao azy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa Aminao no efa nanankinako ny adiko.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Koa izao no lazain’NY TOMPO ny amin’ny mponina ao Anatota, izay mitady ny ainao ka miteny hoe: Aza maminany amin’ny anaran’NY TOMPO, fandrao matin’ny tananay ianao. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Izao no lazain’Andriamanitra, Tompon’izao rehetra izao: Indro, hovaliako izy ka ho fatin-tsabatra ny zatovo ary ho fati-mosary ny zanany lahy sy ny zanany vavy. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Tsy hisy hiangana izy, fa hahatonga loza amin’ny mponina ao Anatota Aho amin’ny taona hamaliana azy.
