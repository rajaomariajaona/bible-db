document_id: JER.11,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Mivadika ny fanekena
  - type: text
    content: 'Izao no teny tonga tamin’i Jeremia avy tamin’NY TOMPO: '
  '10':
  - type: text
    content: Fa izy dia niverina nankany amin’ny heloky ny razany izay tsy nety nihaino ny teniko, ary lasa nanaraka andriamanitra hafa izy ka nanompo azy. Nivadika ny fanekeko, izay nataoko tamin’ny razany, ny taranak’Israely sy ny taranak’i Joda.
  '11':
  - type: text
    content: 'Koa izao no lazain’NY TOMPO: Indro, hahatonga loza aminy, izay tsy azony andosirana Aho; ary na dia hitaraina Amiko aza izy dia tsy hihaino azy Aho. '
  '12':
  - type: text
    content: 'Dia handeha ny tanànan’ny Joda sy ny mponina any Jerosalema ka hitaraina amin’ireny andriamaniny izay efa nandoroany ditin-kazo manitra ireny; nefa tsy hahavonjy azy akory ireny amin’ny andro fahoriany. '
  '13':
  - type: text
    content: 'Fa araka ny isan’ny tanànanao, ry Joda, no isan’ny andriamanitrao; ary araka ny isan’ny lalamben’i Jerosalema no isan’ny alitara naorinareo ho an’ilay mampahamenatra, dia alitara handoroana ditin-kazo manitra ho an’ny '
  - type: text
    content: Baala
  - type: text
    content: '. '
  '14':
  - type: text
    content: Koa aza mivavaka ho an’ity firenena ity ianao, ary aza manandratra fitarainana na fifonana ho azy; fa amin’ny andro izay hitarainany Amiko noho ny fahoriany dia tsy hihaino azy Aho.
  - type: heading
    content: Nokapain’NY TOMPO ilay hazo olivany
  '15':
  - type: text
    content: Hanao inona ao an-tranoko ny malalako?
  - type: text
    content: Efa namoron-tsain-dratsy niaraka tamin’ny maro izy.
  - type: text
    content: Moa ny voady sy ny hena masina va no hampiala ny faharatsianao, na hahafahanao handositra?
  - type: text
    content: Raha azon-doza ianao, mifalia ary!
  '16':
  - type: text
    content: Hazo oliva maitso sady misy voany tena tsara endrika
  - type: text
    content: no nataon’NY TOMPO anaranao.
  - type: text
    content: Tamin’ny fihorakorahana be no nandrehetany afo taminy
  - type: text
    content: ary nokapaina ny rantsany.
  '17':
  - type: text
    content: 'Fa Andriamanitra, Tompon’izao rehetra izao, izay namboly anao, no nanambara ny loza hanjo anao, noho ny ratsy nataon’ny taranak’Israely sy ny taranak’i Joda, izay nahavoa ny tenany ka nahatezitra Ahy, dia tamin’ny nandoroany ditin-kazo manitra ho an’ny '
  - type: text
    content: Baala
  - type: text
    content: .
  - type: heading
    content: Norahonan’ny fianakaviany akaiky i Jeremia
  '18':
  - type: text
    content: 'Nampahafantarin’NY TOMPO aho ka nahalala; nasehonao ahy tamin’izany ny fanaony. '
  '19':
  - type: text
    content: 'Fa izaho dia tahaka ny zanak’ondry bonaika izay entina hovonoina; ary tsy fantatro fa izao no tetika nataony namelezany ahy: Aoka hosimbaintsika ny hazo mbamin’ny voany, ary aoka hofongorantsika hiala amin’ny tanin’ny velona izy mba tsy hotsarovana intsony ny anarany.'
  '2':
  - type: text
    content: 'Mihainoa ny tenin’izao fanekena izao ianareo, ary mitenena amin’ny Joda sy amin’ny mponina any Jerosalema. '
  '20':
  - type: text
    content: Nefa, Andriamanitra, Tompon’izao rehetra izao ô, izay mitsara marina
  - type: text
    content: ka mamantatra ny voa sy ny fo,
  - type: text
    content: aoka ho hitako ny famalianao azy;
  - type: text
    content: fa Aminao no efa nanankinako ny adiko.
  '21':
  - type: text
    content: 'Koa izao no lazain’NY TOMPO ny amin’ny mponina ao Anatota, izay mitady ny ainao ka miteny hoe: Aza maminany amin’ny anaran’NY TOMPO, fandrao matin’ny tananay ianao. '
  '22':
  - type: text
    content: 'Izao no lazain’Andriamanitra, Tompon’izao rehetra izao: Indro, hovaliako izy ka ho fatin-tsabatra ny zatovo ary ho fati-mosary ny zanany lahy sy ny zanany vavy. '
  '23':
  - type: text
    content: Tsy hisy hiangana izy, fa hahatonga loza amin’ny mponina ao Anatota Aho amin’ny taona hamaliana azy.
  '3':
  - type: text
    content: 'Izao no holazainao aminy: Izao no lazain’NY TOMPO, Andriamanitry ny Israely: Ho voaozona izay olona tsy mankatò ny tenin’izao fanekena izao, '
  '4':
  - type: text
    content: 'dia izay nandidiako ny razanareo tamin’ny andro nitondrako azy nivoaka avy tany amin’ny tany Ejipta, izay avy tao amin’ny memy fandrendreham-by, ka nilazako hoe: Mihainoa ny feoko ary mankatoava ireny araka izay rehetra andidiako anareo, dia ho oloko ianareo, ary Izaho kosa ho Andriamanitrareo '
  '5':
  - type: text
    content: 'mba hotanterahiko ny fianianana izay nianianako tamin’ny razanareo, dia ny hanomezana azy tany tondra-dronono sy tantely tahaka ny amin’izao anio izao. Dia namaly aho hoe: '
  - type: text
    content: Amena
  - type: text
    content: ', RY TOMPO ô! '
  '6':
  - type: text
    content: 'Ary hoy NY TOMPO tamiko: Torio any an-tanànan’ny Joda sy any an-dalamben’i Jerosalema izany teny rehetra izany ka lazao hoe: Henoy ny tenin’izao fanekena izao ary ankatoavy izany. '
  '7':
  - type: text
    content: 'Fa nananatra mafy ny razanareo Aho tamin’ny andro nitondrako azy nivoaka avy tany amin’ny tany Ejipta ka mandraka androany; eny, nifoha vao maraina Aho ka nananatra hoe: Mihainoa ny feoko. '
  '8':
  - type: text
    content: 'Nefa tsy nihaino izy ireo na nanongilana ny sofiny, fa samy nandeha tamin’ny ditran’ny fo ratsiny ihany izy ireo. Koa nataoko mihatra aminy ny teny rehetra amin’izao fanekena izao, dia ilay nasaiko nataony nefa tsy nataony. '
  '9':
  - type: text
    content: 'Ary hoy koa NY TOMPO tamiko: Misy tetika fikomiana hita ao amin’ny Joda sy amin’ny mponina any Jerosalema. '
