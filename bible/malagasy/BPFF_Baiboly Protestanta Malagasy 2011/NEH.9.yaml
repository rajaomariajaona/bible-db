document_id: NEH.9,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Fivorian’ny daholobe ho fiaiken-keloka
  - type: text
    content: 'Tamin’ny andro fahefatra amby roapolo tamin’izany volana izany dia niangona ny Zanak’Israely sady nifady hanina no samy nanao akanjo fisaonana sy nihosin-tany. '
  '10':
  - type: text
    content: dia nanao famantarana sy fahagagana Ianao,
  - type: text
    content: tamin’i Farao sy ny mpanompony rehetra
  - type: text
    content: sy tamin’ny olona rehetra tany amin’ny taniny;
  - type: text
    content: satria fantatrao fa nirehareha taminy ireo
  - type: text
    content: dia nanao anarana ho Anao Ianao
  - type: text
    content: tahaka ny amin’izao anio izao.
  '11':
  - type: text
    content: Ny ranomasina dia nosarahinao teo anoloany
  - type: text
    content: ka nandeha namakivaky teo afovoan’ny ranomasina nandia ny tany maina izy;
  - type: text
    content: ary ireo nanenjika azy dia natsipinao
  - type: text
    content: hilentika amin’ny lalina
  - type: text
    content: tahaka ny vato amin’ny rano manonja.
  '12':
  - type: text
    content: Nitondra azy Ianao,
  - type: text
    content: tamin’ny andry rahona raha antoandro
  - type: text
    content: ary tamin’ny andry afo nony alina
  - type: text
    content: mba hampazava azy, hahitany izay lalana tokony halehany.
  '13':
  - type: text
    content: Nidina tao ambonin’ny tendrombohitra Sinay Ianao
  - type: text
    content: dia niteny taminy avy any an-danitra
  - type: text
    content: ka nanome azy fitsipika mahitsy
  - type: text
    content: sy lalàna marina
  - type: text
    content: ary fomba sy didy tsara.
  '14':
  - type: text
    content: Nampahalala azy ny Sabatanao masina Ianao
  - type: text
    content: ary i Mosesy mpanomponao dia nampilazainao
  - type: text
    content: didy sy fomba ary lalàna taminy;
  '15':
  - type: text
    content: mofo avy tany an-danitra no nomenao azy
  - type: text
    content: raha noana izy;
  - type: text
    content: rano avy tamin’ny vatolampy no navoakanao hosotroiny
  - type: text
    content: raha nangetaheta izy;
  - type: text
    content: nilaza taminy Ianao fa hiditra ka handova ny tany
  - type: text
    content: izay nanangananao tanana homena azy izy.
  '16':
  - type: text
    content: Nefa niavonavona ireny razanay ireny ka nanamafy ny hatony
  - type: text
    content: ary tsy nihaino ny didinao;
  '17':
  - type: text
    content: nandà tsy nety nanaraka izany izy
  - type: text
    content: sady tsy nahatsiaro ny fahagagana izay nataonao teo aminy;
  - type: text
    content: fa nanamafy ny hatony izy
  - type: text
    content: ka nikomy
  - type: text
    content: sady izay nanendry mpitarika mba hiverenany ho any amin’ny fahandevozany;
  - type: text
    content: kanefa Andriamanitry ny famelan-keloka Ianao
  - type: text
    content: ka miantra sy mamindra fo,
  - type: text
    content: mahari-po sady be famindrampo
  - type: text
    content: ka tsy nahafoy azy.
  '18':
  - type: text
    content: Eny, nanao ilay ombilahy kely voarendrika izy
  - type: text
    content: 'ka nilaza hoe: Io no andriamanitrao'
  - type: text
    content: izay nitondra anao niakatra avy tany Ejipta,
  - type: text
    content: dia nampahasosotra Anao indrindra izy;
  '19':
  - type: text
    content: kanefa noho ny haben’ny famindramponao
  - type: text
    content: dia tsy mba nahafoy azy tany an-tany efitra Ianao;
  - type: text
    content: ny andry rahona izay nitondra azy teny an-dalana
  - type: text
    content: dia tsy niala taminy raha antoandro,
  - type: text
    content: toy izany koa ny andry afo izay nampahazava azy nony alina
  - type: text
    content: dia hahitany izay lalana tokony halehany.
  '2':
  - type: text
    content: 'Dia niavaka tamin’ny olona hafa firenena rehetra ny taranak’Israely ary nitsangana ka niaiky ny fahotany sy ny heloky ny razany. '
  '20':
  - type: text
    content: Ny Fanahinao tsara
  - type: text
    content: dia nomenao azy koa hampianatra azy,
  - type: text
    content: ary tsy niaro ny mananao tsy hohaniny Ianao
  - type: text
    content: sady nanome azy rano raha nangetaheta izy;
  '21':
  - type: text
    content: eny, efapolo taona
  - type: text
    content: no namelomanao azy tany an-tany efitra
  - type: text
    content: ka tsy nisy zava-mahory akory izy;
  - type: text
    content: tsy rovitra ny fitafiany
  - type: text
    content: ary tsy nivonto ny tongony.
  '22':
  - type: text
    content: Nanome azy
  - type: text
    content: fanjakana sy firenena maro Ianao
  - type: text
    content: ka voazaranao araka ny faritry ny taniny avy ireny;
  - type: text
    content: dia nahazo
  - type: text
    content: ny tanin’i Sihona sy ny tanin’ny mpanjakan’i Hesbona
  - type: text
    content: ary ny tanin’i Oga, mpanjakan’i Basana, izy.
  '23':
  - type: text
    content: Ary ny zanany dia nohamaroinao
  - type: text
    content: ho tahaka ny kintana eny amin’ny lanitra
  - type: text
    content: sady noentinao ho amin’ny tany
  - type: text
    content: izay nolazainao tamin’ny razany fa hidirany holovana.
  '24':
  - type: text
    content: Dia niditra ny zanany ka nandova ny tany
  - type: text
    content: ary nampietrenao teo anoloany ny Kananita tompon-tany,
  - type: text
    content: dia natolotrao ho eo an-tanany ireo
  - type: text
    content: mbamin’ny mpanjakany sy ny vahoakan’ny fireneny
  - type: text
    content: hanaovany azy araka ny sitrapony.
  '25':
  - type: text
    content: Nahazo tanàna mimanda
  - type: text
    content: sy tany lonaka izy
  - type: text
    content: ary trano feno ny zava-tsoa tsy hita isa
  - type: text
    content: sy lavaka famorian-drano voahady
  - type: text
    content: ary tany voavoly voaloboka sy oliva
  - type: text
    content: ary hazo fihinam-boa betsaka;
  - type: text
    content: dia nihinana izy ka voky
  - type: text
    content: ary nihanatavy ka nifalifaly tamin’ny fahatsaranao lehibe.
  '26':
  - type: text
    content: Kanefa nandà izy sady nikomy Taminao
  - type: text
    content: ary nanary ny lalànanao teo ivohony,
  - type: text
    content: dia namono ny mpaminaninao izay nananatra azy mafy hampiverenana azy ho Aminao
  - type: text
    content: ka nanao izay nahasosotra Anao indrindra izy.
  '27':
  - type: text
    content: Koa dia natolotrao
  - type: text
    content: ho eo an-tanan’ny fahavalony izay nampahory azy izy;
  - type: text
    content: kanefa tamin’ny andro fahoriany
  - type: text
    content: dia nitaraina Taminao izy
  - type: text
    content: ka nihaino azy tany an-danitra Ianao,
  - type: text
    content: ary araka ny haben’ny fiantranao
  - type: text
    content: dia nomenao mpamonjy izy
  - type: text
    content: ka namonjy azy tamin’ny tanan’ny fahavalony ireo.
  '28':
  - type: text
    content: Kanjo rehefa niadana izy
  - type: text
    content: dia nanao ratsy teo anatrehanao indray;
  - type: text
    content: dia nafoinao
  - type: text
    content: ho eo an-tanan’ny fahavalony indray koa izy
  - type: text
    content: ka ireny no nifehy azy;
  - type: text
    content: dia nitaraina taminao indray izy
  - type: text
    content: ary nihaino azy tany an-danitra Ianao
  - type: text
    content: ka namonjy azy matetika
  - type: text
    content: araka ny haben’ny fiantranao.
  '29':
  - type: text
    content: Nananatra azy mafy Ianao hampiverenanao azy ho amin’ny lalànanao;
  - type: text
    content: kanefa mbola niavonavona ihany izy
  - type: text
    content: ka tsy nihaino ny didinao
  - type: text
    content: fa nandika ny fitsipikao;
  - type: text
    content: kanefa mahavelona ny olona mankatò azy izany;
  - type: text
    content: nampihemotra ny sorony sy nanamafy ny hatony izy
  - type: text
    content: ary tsy nety nihaino.
  '3':
  - type: text
    content: 'Nitsangana teo amin’ny fitoerany avy indray izy dia namaky ny teny tao amin’ny bokin’ny lalànan’NY TOMPO Andriamaniny tamin’ny ampahefatry ny andro; ary tamin’ny ampahefatry ny andro koa dia nifona sy niankohoka teo anatrehan’NY TOMPO Andriamaniny izy. '
  '30':
  - type: text
    content: Nefa nandefitra nandritra ny taona maro taminy Ianao,
  - type: text
    content: ary ny Fanahinao, izay tao amin’ny mpaminaninao,
  - type: text
    content: no noentinao nananatra azy mafy;
  - type: text
    content: fa tsy nety nihaino ihany izy,
  - type: text
    content: dia natolotrao ho eo an-tanan’ny firenena amin’ny tany hafa.
  '31':
  - type: text
    content: Nefa noho ny haben’ny fiantranao
  - type: text
    content: dia tsy navelanao ho lany ringana izy
  - type: text
    content: ary tsy nafoinao
  - type: text
    content: satria Andriamanitra mamindra fo sy miantra Ianao.
  '32':
  - type: text
    content: Koa ankehitriny, ry Andriamanitray ô,
  - type: text
    content: Andriamanitra lehibe sady mahery no mahatahotra,
  - type: text
    content: izay mitandrina ny fanekenao sy ny famindramponao,
  - type: text
    content: aoka tsy ho kely eo imasonao ny fahoriana rehetra izay nanjo anay,
  - type: text
    content: dia ny mpanjakanay sy ny mpitondra anay,
  - type: text
    content: ny mpisoronay sy ny mpaminaninay
  - type: text
    content: ary ny razanay, dia ny olonao rehetra,
  - type: text
    content: hatramin’ny andron’ireo mpanjakan’i Asiria ka mandraka androany.
  '33':
  - type: text
    content: Ianao no marina tamin’izay rehetra nanjo anay,
  - type: text
    content: fa marina ny nataonao
  - type: text
    content: fa izahay no nanao ratsy;
  '34':
  - type: text
    content: ary ny mpanjakanay sy ny mpanapaka anay,
  - type: text
    content: mbamin’ny mpisorona sy ny razanay,
  - type: text
    content: dia samy tsy nankatò ny lalànanao,
  - type: text
    content: samy tsy nihaino ny didinao sy ny teny vavolombelonao
  - type: text
    content: izay nananaranao azy mafy.
  '35':
  - type: text
    content: Fa tsy nanompo Anao teo amin’ny fanjakany izy
  - type: text
    content: na teo amin’ny haben’ny zava-tsoa nomenao azy
  - type: text
    content: na teo amin’ny tany malalaka sy lonaka izay nomenao ho eo anoloany
  - type: text
    content: sady tsy niala tamin’ny ratsy fanaony koa.
  '36':
  - type: text
    content: Ankehitriny, indreto, andevo izahay izao,
  - type: text
    content: ary eto amin’ny tany izay nomenao ny razanay
  - type: text
    content: hihinanany ny vokatra sy ny soa avy aminy,
  - type: text
    content: indreto, andevo eto izahay;
  '37':
  - type: text
    content: mahavokatra be izy,
  - type: text
    content: kanefa ho an’ireo mpanjaka izay notendrenao hitondra anay
  - type: text
    content: noho ny fahotanay ihany izany;
  - type: text
    content: eny, mifehy ny tenanay sy ny biby fiompinay araka ny sitrapony izy
  - type: text
    content: ka azom-pahoriana mafy izahay.
  '4':
  - type: text
    content: 'Ary nitsangana teo ambonin’ny lampihazon’ny '
  - type: text
    content: levita
  - type: text
    content: ' i Josoa, i Bany, i Kadmiela, i Sebania, i Bony, i Serebia, i Bany ary i Kenany ka nitaraina mafy tamin’ny Tompo Andriamaniny. '
  '5':
  - type: text
    content: 'Ary hoy ny levita, dia i Josoa, i Kadmiela, i Bany, i Hasabnia, i Serebia, i Hodia, i Sebania ary i Petahia:'
  - type: heading
    content: Vavaka fisaorana sy fiderana
  - type: text
    content: Mitsangàna ka misaora NY TOMPO Andriamanitrareo mandrakizay mandrakizay.
  - type: text
    content: Isaorana anie ny anaranao malaza
  - type: text
    content: izay voasandratra ambonin’ny fisaorana sy ny fiderana rehetra.
  '6':
  - type: text
    content: Ianao dia Ianao irery ihany no TOMPO;
  - type: text
    content: Ianao no nanao ny lanitra, dia ny lanitry ny lanitra, mbamin’ny kintany rehetra,
  - type: text
    content: ny tany sy izay rehetra eo aminy,
  - type: text
    content: ny ranomasina sy izay rehetra ao aminy,
  - type: text
    content: Ianao no mamelona azy rehetra;
  - type: text
    content: ary ireo marobe any an-danitra dia samy miankohoka eo anatrehanao.
  '7':
  - type: text
    content: Ianao no TOMPO Andriamanitra
  - type: text
    content: izay nifidy an’i Abrama
  - type: text
    content: ka nitondra azy nivoaka avy tany Oran’ny Kaldeana
  - type: text
    content: sady nanao ny anarany hoe Abrahama;
  '8':
  - type: text
    content: ary nahita ny fony nahatoky teo anatrehanao Ianao
  - type: text
    content: ka nanao ilay fanekena taminy
  - type: text
    content: hanome ho an’ny taranany
  - type: text
    content: ny tanin’ny Kananita, ny Hetita, ny Amorita,
  - type: text
    content: ny Perizita, ny Jebosita ary ny Girgasita;
  - type: text
    content: ary efa nahatanteraka ny teninao Ianao satria marina Ianao.
  '9':
  - type: text
    content: Nahita ny fahorian’ny razanay tany Ejipta koa Ianao
  - type: text
    content: sady nandre ny fitarainany teo amoron’ny Ranomasina Mena,
