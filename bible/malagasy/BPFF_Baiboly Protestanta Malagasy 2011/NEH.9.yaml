document_id: NEH.9,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fivorian’ny daholobe ho fiaiken-keloka
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Tamin’ny andro fahefatra amby roapolo tamin’izany volana izany dia niangona ny Zanak’Israely sady nifady hanina no samy nanao akanjo fisaonana sy nihosin-tany. '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: dia nanao famantarana sy fahagagana Ianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tamin’i Farao sy ny mpanompony rehetra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy tamin’ny olona rehetra tany amin’ny taniny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria fantatrao fa nirehareha taminy ireo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia nanao anarana ho Anao Ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tahaka ny amin’izao anio izao.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Ny ranomasina dia nosarahinao teo anoloany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka nandeha namakivaky teo afovoan’ny ranomasina nandia ny tany maina izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ireo nanenjika azy dia natsipinao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hilentika amin’ny lalina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tahaka ny vato amin’ny rano manonja.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Nitondra azy Ianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tamin’ny andry rahona raha antoandro
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tamin’ny andry afo nony alina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hampazava azy, hahitany izay lalana tokony halehany.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Nidina tao ambonin’ny tendrombohitra Sinay Ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia niteny taminy avy any an-danitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka nanome azy fitsipika mahitsy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy lalàna marina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary fomba sy didy tsara.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Nampahalala azy ny Sabatanao masina Ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary i Mosesy mpanomponao dia nampilazainao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: didy sy fomba ary lalàna taminy;
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: mofo avy tany an-danitra no nomenao azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: raha noana izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: rano avy tamin’ny vatolampy no navoakanao hosotroiny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: raha nangetaheta izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nilaza taminy Ianao fa hiditra ka handova ny tany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay nanangananao tanana homena azy izy.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Nefa niavonavona ireny razanay ireny ka nanamafy ny hatony
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy nihaino ny didinao;
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: nandà tsy nety nanaraka izany izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady tsy nahatsiaro ny fahagagana izay nataonao teo aminy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa nanamafy ny hatony izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka nikomy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady izay nanendry mpitarika mba hiverenany ho any amin’ny fahandevozany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: kanefa Andriamanitry ny famelan-keloka Ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka miantra sy mamindra fo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mahari-po sady be famindrampo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy nahafoy azy.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Eny, nanao ilay ombilahy kely voarendrika izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ka nilaza hoe: Io no andriamanitrao'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay nitondra anao niakatra avy tany Ejipta,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia nampahasosotra Anao indrindra izy;
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: kanefa noho ny haben’ny famindramponao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia tsy mba nahafoy azy tany an-tany efitra Ianao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny andry rahona izay nitondra azy teny an-dalana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia tsy niala taminy raha antoandro,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toy izany koa ny andry afo izay nampahazava azy nony alina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hahitany izay lalana tokony halehany.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Dia niavaka tamin’ny olona hafa firenena rehetra ny taranak’Israely ary nitsangana ka niaiky ny fahotany sy ny heloky ny razany. '
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Ny Fanahinao tsara
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia nomenao azy koa hampianatra azy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy niaro ny mananao tsy hohaniny Ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady nanome azy rano raha nangetaheta izy;
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: eny, efapolo taona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no namelomanao azy tany an-tany efitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy nisy zava-mahory akory izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy rovitra ny fitafiany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy nivonto ny tongony.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Nanome azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fanjakana sy firenena maro Ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka voazaranao araka ny faritry ny taniny avy ireny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia nahazo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny tanin’i Sihona sy ny tanin’ny mpanjakan’i Hesbona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny tanin’i Oga, mpanjakan’i Basana, izy.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Ary ny zanany dia nohamaroinao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho tahaka ny kintana eny amin’ny lanitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady noentinao ho amin’ny tany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay nolazainao tamin’ny razany fa hidirany holovana.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Dia niditra ny zanany ka nandova ny tany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary nampietrenao teo anoloany ny Kananita tompon-tany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia natolotrao ho eo an-tanany ireo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mbamin’ny mpanjakany sy ny vahoakan’ny fireneny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hanaovany azy araka ny sitrapony.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Nahazo tanàna mimanda
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy tany lonaka izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary trano feno ny zava-tsoa tsy hita isa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy lavaka famorian-drano voahady
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tany voavoly voaloboka sy oliva
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hazo fihinam-boa betsaka;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia nihinana izy ka voky
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary nihanatavy ka nifalifaly tamin’ny fahatsaranao lehibe.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Kanefa nandà izy sady nikomy Taminao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary nanary ny lalànanao teo ivohony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia namono ny mpaminaninao izay nananatra azy mafy hampiverenana azy ho Aminao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka nanao izay nahasosotra Anao indrindra izy.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Koa dia natolotrao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho eo an-tanan’ny fahavalony izay nampahory azy izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: kanefa tamin’ny andro fahoriany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia nitaraina Taminao izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka nihaino azy tany an-danitra Ianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary araka ny haben’ny fiantranao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia nomenao mpamonjy izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka namonjy azy tamin’ny tanan’ny fahavalony ireo.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Kanjo rehefa niadana izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia nanao ratsy teo anatrehanao indray;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia nafoinao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho eo an-tanan’ny fahavalony indray koa izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka ireny no nifehy azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia nitaraina taminao indray izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary nihaino azy tany an-danitra Ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka namonjy azy matetika
  - type: usfm
    marker: q1
    children:
    - type: text
      text: araka ny haben’ny fiantranao.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Nananatra azy mafy Ianao hampiverenanao azy ho amin’ny lalànanao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: kanefa mbola niavonavona ihany izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy nihaino ny didinao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa nandika ny fitsipikao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: kanefa mahavelona ny olona mankatò azy izany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nampihemotra ny sorony sy nanamafy ny hatony izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy nety nihaino.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Nitsangana teo amin’ny fitoerany avy indray izy dia namaky ny teny tao amin’ny bokin’ny lalànan’NY TOMPO Andriamaniny tamin’ny ampahefatry ny andro; ary tamin’ny ampahefatry ny andro koa dia nifona sy niankohoka teo anatrehan’NY TOMPO Andriamaniny izy. '
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Nefa nandefitra nandritra ny taona maro taminy Ianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny Fanahinao, izay tao amin’ny mpaminaninao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no noentinao nananatra azy mafy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa tsy nety nihaino ihany izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia natolotrao ho eo an-tanan’ny firenena amin’ny tany hafa.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Nefa noho ny haben’ny fiantranao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia tsy navelanao ho lany ringana izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy nafoinao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria Andriamanitra mamindra fo sy miantra Ianao.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Koa ankehitriny, ry Andriamanitray ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Andriamanitra lehibe sady mahery no mahatahotra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay mitandrina ny fanekenao sy ny famindramponao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aoka tsy ho kely eo imasonao ny fahoriana rehetra izay nanjo anay,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ny mpanjakanay sy ny mpitondra anay,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny mpisoronay sy ny mpaminaninay
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny razanay, dia ny olonao rehetra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hatramin’ny andron’ireo mpanjakan’i Asiria ka mandraka androany.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Ianao no marina tamin’izay rehetra nanjo anay,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa marina ny nataonao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa izahay no nanao ratsy;
  '34':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: ary ny mpanjakanay sy ny mpanapaka anay,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mbamin’ny mpisorona sy ny razanay,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia samy tsy nankatò ny lalànanao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: samy tsy nihaino ny didinao sy ny teny vavolombelonao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay nananaranao azy mafy.
  '35':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: Fa tsy nanompo Anao teo amin’ny fanjakany izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na teo amin’ny haben’ny zava-tsoa nomenao azy
  - type: usfm
