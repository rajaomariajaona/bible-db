document_id: PSA.138
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Midera Anao amin’ny foko manontolo aho
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: Nataon’i Davida.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Midera Anao amin’ny foko manontolo aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eo anatrehan’ireo andriamanitra no ankalazako Anao amin’ny hira.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Miankohoka manandrify ny tempolinao masina aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka midera ny anaranao
- type: usfm
  marker: q1
  children:
  - type: text
    text: noho ny famindramponao sy ny fahamarinanao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa efa nomenao voninahitra ho ambonin’ny zavatra rehetra ny anaranao sy ny teninao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Tamin’ny andro nitarainako dia namaly ahy Ianao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: nomenao fahasahiana aho ka nahazo hery ny fanahiko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: TOMPO ô, hidera Anao ny mpanjaka rehetra amin’ny tany
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa handre ny tenin’ny vavanao izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Eny, hihira ny amin’ny lalan’NY TOMPO izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa lehibe ny voninahitry NY TOMPO.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Fa na dia avo aza NY TOMPO dia mijery ny manetry tena
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny mpiavonavona dia fantany eny lavitra eny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Na dia handeha ao anatin’ny fahoriana aza aho dia hamelona ahy Ianao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hanatsotra ny tananao hanohitra ny fahatezeran’ny fahavaloko Ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hamonjy ahy ny tananao ankavanana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: NY TOMPO no hahatanteraka ny momba ahy rehetra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: TOMPO ô, mandrakizay ny famindramponao.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aza mahafoy ny asan’ny tananao.
