document_id: PSA.138,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Midera Anao amin’ny foko manontolo aho
  - type: text
    content: Nataon’i Davida.
  - type: text
    content: Midera Anao amin’ny foko manontolo aho;
  - type: text
    content: eo anatrehan’ireo andriamanitra no ankalazako Anao amin’ny hira.
  '2':
  - type: text
    content: Miankohoka manandrify ny tempolinao masina aho
  - type: text
    content: ka midera ny anaranao
  - type: text
    content: noho ny famindramponao sy ny fahamarinanao;
  - type: text
    content: fa efa nomenao voninahitra ho ambonin’ny zavatra rehetra ny anaranao sy ny teninao.
  '3':
  - type: text
    content: Tamin’ny andro nitarainako dia namaly ahy Ianao;
  - type: text
    content: nomenao fahasahiana aho ka nahazo hery ny fanahiko.
  '4':
  - type: text
    content: TOMPO ô, hidera Anao ny mpanjaka rehetra amin’ny tany
  - type: text
    content: fa handre ny tenin’ny vavanao izy.
  '5':
  - type: text
    content: Eny, hihira ny amin’ny lalan’NY TOMPO izy,
  - type: text
    content: fa lehibe ny voninahitry NY TOMPO.
  '6':
  - type: text
    content: Fa na dia avo aza NY TOMPO dia mijery ny manetry tena
  - type: text
    content: ary ny mpiavonavona dia fantany eny lavitra eny.
  '7':
  - type: text
    content: Na dia handeha ao anatin’ny fahoriana aza aho dia hamelona ahy Ianao;
  - type: text
    content: hanatsotra ny tananao hanohitra ny fahatezeran’ny fahavaloko Ianao
  - type: text
    content: ary hamonjy ahy ny tananao ankavanana.
  '8':
  - type: text
    content: NY TOMPO no hahatanteraka ny momba ahy rehetra;
  - type: text
    content: TOMPO ô, mandrakizay ny famindramponao.
  - type: text
    content: Aza mahafoy ny asan’ny tananao.
