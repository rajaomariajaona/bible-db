document_id: 1CO.14,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fivavahana kristiana sy ireo tsy mino
  - type: text
    content: Miezaha mitady ny fitiavana, nefa maniria fatratra ny zavatra ara-panahy koa, indrindra fa ny haminany.
  '10':
  - type: text
    content: 'Misy fiteny samihafa eto amin’izao tontolo izao ka samy manana ny heviny avy ireny. '
  '11':
  - type: text
    content: 'Koa raha tsy mahalala ny hevitry ny fiteny aho dia ho vaka amiko izay miteny, ary izaho kosa dia ho vaka amin’izay miteny. '
  '12':
  - type: text
    content: 'Ary toy izany koa ianareo: Raha fatra-paniry ny zava-panahy dia izay hampandroso ny fiangonana no tadiavo indrindra.'
  '13':
  - type: text
    content: 'Koa aoka izay miteny amin’ny fiteny tsy fantatra hangataka mba hahay mandika teny koa. '
  '14':
  - type: text
    content: 'Fa raha mivavaka amin’ny fiteny tsy fantatra aho dia ny fanahiko ihany no mivavaka fa tsy mba mandray anjara ny saiko. '
  '15':
  - type: text
    content: 'Ahoana ary no izy? Sady hivavaka miaraka amin’ny fanahiko aho no hivavaka miaraka koa amin’ny saina; sady hihira miaraka amin’ny fanahy aho no hihira miaraka amin’ny saina koa. '
  '16':
  - type: text
    content: 'Fa raha manao fisaorana araka ny fanahy fotsiny ianao dia hataon’izay tsy mahay ahoana no hiteny Amena raha misaotra ianao satria tsy mahafantatra izay lazainao izy? '
  '17':
  - type: text
    content: Marina fa misaotra ianao, nefa tsy mba nampandroso ny hafa izany.
  '18':
  - type: text
    content: 'Misaotra an’Andriamanitra aho fa miteny amin’ny fiteny tsy fantatra mihoatra noho ianareo rehetra; '
  '19':
  - type: text
    content: nefa raha ao am-piangonana dia aleoko manao teny dimy fantatry ny saiko mba hampianarako ny hafa koa, toy izay hanao teny iray alina amin’ny fiteny tsy fantatra.
  '2':
  - type: text
    content: 'Fa izay miteny amin’ny fiteny tsy fantatra dia tsy miteny amin’olona fa amin’Andriamanitra; fa amin’ny fanahy no itenenany zavamiafina ka tsy misy olona mahazo izay lazainy; '
  '20':
  - type: text
    content: 'Ry rahalahy, aza mba ho zaza amin’ny fahalalana; raha amin’ny lolompo dia aoka ho zaza bodo aza, fa amin’ny fahalalana kosa dia aoka ho lehilahy lehibe. '
  '21':
  - type: text
    content: 'Voasoratra ao amin’ny lalàna hoe:'
  - type: text
    content: «Amin’ny olona hafa fiteny
  - type: text
    content: sy amin’ny molotry ny olon-kafa
  - type: text
    content: no hitenenako amin’ity firenena ity;
  - type: text
    content: nefa na amin’izany aza dia tsy hihaino Ahy izy, hoy NY TOMPO» (Isa 28.11-12).
  '22':
  - type: text
    content: 'Koa ny fiteny tsy fantatra dia famantarana ho an’ny tsy mino fa tsy ho an’ny mino; fa ny faminaniana kosa dia ho an’ny mino fa tsy ho an’ny tsy mino. '
  '23':
  - type: text
    content: 'Koa raha vory ny mpiangona rehetra, ary ny olona rehetra dia samy miteny amin’ny fiteny tsy fantatra, ary miditra ny tsy mahay, na ny tsy mino, tsy holazainy va fa very saina ianareo? '
  '24':
  - type: text
    content: 'Fa raha samy maminany izy rehetra, ary miditra ny tsy mino, na ny tsy mahay, dia ho voan’ny anatra ataon’izy rehetra izy sady hotsarain’izy rehetra; '
  '25':
  - type: text
    content: koa miseho ny zavatra takona ao am-pony, dia hiankohoka izy ka hivavaka amin’Andriamanitra sady hilaza fa eo aminareo marina tokoa Andriamanitra.
  - type: heading
    content: Ny fandaminana ao amin’ny fiangonana
  '26':
  - type: text
    content: 'Ahoana ary no izy, ry rahalahy? Raha miangona ianareo dia misy te hihira, misy ta hampianatra, misy manana fanambaràna, misy manana fiteny tsy fantatra, misy manana fandikan-teny. Aoka ny zavatra rehetra hatao ho fampandrosoana. '
  '27':
  - type: text
    content: 'Raha misy miteny amin’ny fiteny tsy fantatra dia avelao ho roa na telo fa aza atao mihoatra noho izany ka ampifanarakarahina izy ireo; ary avelao hisy iray mandika teny. '
  '28':
  - type: text
    content: Fa raha tsy misy mpandika teny dia aoka izy hangina eo amin’ny fiangonana
  - type: note
    content: 'Na: eklesia.'
  - type: text
    content: '; fa aoka hiteny amin’ny tenany sy amin’Andriamanitra ihany izy. '
  '29':
  - type: text
    content: 'Ary aoka ny mpaminany roa na telo no hiteny fa aoka ho an’ny hafa ny hamantatra. '
  '3':
  - type: text
    content: 'fa izay maminany kosa dia miteny amin’olona ho fampandrosoana sy ho fampirisihana ary ho fampiononana. '
  '30':
  - type: text
    content: 'Fa raha misy tsindrian’ny Fanahy eo am-pitoerana dia aoka hangina kosa ny voalohany; '
  '31':
  - type: text
    content: 'fa mahazo maminany tsirairay ianareo rehetra mba hianaran’izy rehetra sy hampirisihana azy rehetra; '
  '32':
  - type: text
    content: 'ary ny fanahin’ny mpaminany dia manaiky hofehezin’izy mpaminany. '
  '33':
  - type: text
    content: Fa Andriamanitra dia tsy Andriamanitra tompon’ny fikitranana, fa Andriamanitra tompon’ny fiadanana.
  - type: text
    content: 'Araka ny fanaon’ny fiangonan’ny olona masina rehetra '
  '34':
  - type: text
    content: 'dia aoka hangina ny vehivavy raha ao am-piangonana; tsy avela hiteny izy fa aoka hanoa tsara araka ny lazain’ny lalàna koa. '
  '35':
  - type: text
    content: 'Ary raha misy tiany hianarana dia aoka izy hanontany ny lahy rehefa tonga any an-trano; fa mahamenatra raha miteny ao am-piangonana ny vehivavy. '
  '36':
  - type: text
    content: Avy aminareo va no niavian’ny tenin’Andriamanitra, sa ao aminareo ihany no nahatongavany?
  '37':
  - type: text
    content: 'Raha misy milaza azy ho mpaminany na mihevi-tena ho ara-panahy, dia aoka ho fantany tsara fa didin’ny Tompo ny teny izay soratako ho anareo. '
  '38':
  - type: text
    content: Fa raha misy tsy mahalala dia avelao izy tsy hahalala.
  '39':
  - type: text
    content: 'Koa amin’izany, ry rahalahiko, maniria fatratra ny haminany, ary aza mandrara tsy hiteny amin’ny fiteny tsy fantatra; '
  '4':
  - type: text
    content: Izay miteny amin’ny fiteny tsy fantatra dia mampandroso ny tenany; fa izay maminany kosa dia mampandroso ny fiangonana
  - type: note
    content: 'Na: eklesia.'
  - type: text
    content: '. '
  '40':
  - type: text
    content: kanefa aoka ny zavatra rehetra hatao amin’ny fahamendrehana sy ny filaminana.
  '5':
  - type: text
    content: Tiako raha samy hiteny amin’ny fiteny tsy fantatra ianareo rehetra; kanefa aleo maminany; fa izay maminany dia lehibe noho izay miteny amin’ny fiteny tsy fantatra, raha tsy mandika teny koa izy hahazoan’ny fiangonana fampandrosoana.
  '6':
  - type: text
    content: 'Raha mankeo aminareo aho izao, ry rahalahy, ka miteny amin’ny fiteny tsy fantatra, inona moa no soa ho vitako aminareo amin’izany raha tsy fanambaràna, na fahalalana, na faminaniana, na fampianarana, no hitenenako aminareo? '
  '7':
  - type: text
    content: 'Ary ny zavatra tsy manana aina, na sodina izany na lokanga, na dia maneno aza ka tsy mamoaka feo samihafa, ahoana no hahafantarana izay feo ataony, na an’ny sodina izany na an’ny lokanga? '
  '8':
  - type: text
    content: 'Fa raha manao feo hafahafa ny trompetra, iza no hiomana hiady? '
  '9':
  - type: text
    content: 'Dia toy izany koa ianareo: Raha tsy mazava ny teny aloaky ny vavanareo, hatao ahoana no fahafantatra izay lazainareo? Fa raha tsy izany dia hiteny amin’ny rivotra ianareo. '
