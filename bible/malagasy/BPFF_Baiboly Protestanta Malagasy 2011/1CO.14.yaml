document_id: 1CO.14,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fivavahana kristiana sy ireo tsy mino
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Miezaha mitady ny fitiavana, nefa maniria fatratra ny zavatra ara-panahy koa, indrindra fa ny haminany.
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Misy fiteny samihafa eto amin’izao tontolo izao ka samy manana ny heviny avy ireny. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Koa raha tsy mahalala ny hevitry ny fiteny aho dia ho vaka amiko izay miteny, ary izaho kosa dia ho vaka amin’izay miteny. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Ary toy izany koa ianareo: Raha fatra-paniry ny zava-panahy dia izay hampandroso ny fiangonana no tadiavo indrindra.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Koa aoka izay miteny amin’ny fiteny tsy fantatra hangataka mba hahay mandika teny koa. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Fa raha mivavaka amin’ny fiteny tsy fantatra aho dia ny fanahiko ihany no mivavaka fa tsy mba mandray anjara ny saiko. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Ahoana ary no izy? Sady hivavaka miaraka amin’ny fanahiko aho no hivavaka miaraka koa amin’ny saina; sady hihira miaraka amin’ny fanahy aho no hihira miaraka amin’ny saina koa. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Fa raha manao fisaorana araka ny fanahy fotsiny ianao dia hataon’izay tsy mahay ahoana no hiteny Amena raha misaotra ianao satria tsy mahafantatra izay lazainao izy? '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Marina fa misaotra ianao, nefa tsy mba nampandroso ny hafa izany.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Misaotra an’Andriamanitra aho fa miteny amin’ny fiteny tsy fantatra mihoatra noho ianareo rehetra; '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: nefa raha ao am-piangonana dia aleoko manao teny dimy fantatry ny saiko mba hampianarako ny hafa koa, toy izay hanao teny iray alina amin’ny fiteny tsy fantatra.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Fa izay miteny amin’ny fiteny tsy fantatra dia tsy miteny amin’olona fa amin’Andriamanitra; fa amin’ny fanahy no itenenany zavamiafina ka tsy misy olona mahazo izay lazainy; '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Ry rahalahy, aza mba ho zaza amin’ny fahalalana; raha amin’ny lolompo dia aoka ho zaza bodo aza, fa amin’ny fahalalana kosa dia aoka ho lehilahy lehibe. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Voasoratra ao amin’ny lalàna hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Amin’ny olona hafa fiteny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy amin’ny molotry ny olon-kafa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no hitenenako amin’ity firenena ity;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa na amin’izany aza dia tsy hihaino Ahy izy, hoy NY TOMPO» (Isa 28.11-12).
  '22':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Koa ny fiteny tsy fantatra dia famantarana ho an’ny tsy mino fa tsy ho an’ny mino; fa ny faminaniana kosa dia ho an’ny mino fa tsy ho an’ny tsy mino. '
  '23':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Koa raha vory ny mpiangona rehetra, ary ny olona rehetra dia samy miteny amin’ny fiteny tsy fantatra, ary miditra ny tsy mahay, na ny tsy mino, tsy holazainy va fa very saina ianareo? '
  '24':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Fa raha samy maminany izy rehetra, ary miditra ny tsy mino, na ny tsy mahay, dia ho voan’ny anatra ataon’izy rehetra izy sady hotsarain’izy rehetra; '
  '25':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: koa miseho ny zavatra takona ao am-pony, dia hiankohoka izy ka hivavaka amin’Andriamanitra sady hilaza fa eo aminareo marina tokoa Andriamanitra.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fandaminana ao amin’ny fiangonana
    marker-yv: yv-h
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Ahoana ary no izy, ry rahalahy? Raha miangona ianareo dia misy te hihira, misy ta hampianatra, misy manana fanambaràna, misy manana fiteny tsy fantatra, misy manana fandikan-teny. Aoka ny zavatra rehetra hatao ho fampandrosoana. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Raha misy miteny amin’ny fiteny tsy fantatra dia avelao ho roa na telo fa aza atao mihoatra noho izany ka ampifanarakarahina izy ireo; ary avelao hisy iray mandika teny. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Fa raha tsy misy mpandika teny dia aoka izy hangina eo amin’ny fiangonana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.28 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: eklesia.
      marker-yv: yv-n
    - type: text
      text: '; fa aoka hiteny amin’ny tenany sy amin’Andriamanitra ihany izy. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Ary aoka ny mpaminany roa na telo no hiteny fa aoka ho an’ny hafa ny hamantatra. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'fa izay maminany kosa dia miteny amin’olona ho fampandrosoana sy ho fampirisihana ary ho fampiononana. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Fa raha misy tsindrian’ny Fanahy eo am-pitoerana dia aoka hangina kosa ny voalohany; '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'fa mahazo maminany tsirairay ianareo rehetra mba hianaran’izy rehetra sy hampirisihana azy rehetra; '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'ary ny fanahin’ny mpaminany dia manaiky hofehezin’izy mpaminany. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Fa Andriamanitra dia tsy Andriamanitra tompon’ny fikitranana, fa Andriamanitra tompon’ny fiadanana.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Araka ny fanaon’ny fiangonan’ny olona masina rehetra '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'dia aoka hangina ny vehivavy raha ao am-piangonana; tsy avela hiteny izy fa aoka hanoa tsara araka ny lazain’ny lalàna koa. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Ary raha misy tiany hianarana dia aoka izy hanontany ny lahy rehefa tonga any an-trano; fa mahamenatra raha miteny ao am-piangonana ny vehivavy. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: Avy aminareo va no niavian’ny tenin’Andriamanitra, sa ao aminareo ihany no nahatongavany?
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Raha misy milaza azy ho mpaminany na mihevi-tena ho ara-panahy, dia aoka ho fantany tsara fa didin’ny Tompo ny teny izay soratako ho anareo. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: Fa raha misy tsy mahalala dia avelao izy tsy hahalala.
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Koa amin’izany, ry rahalahiko, maniria fatratra ny haminany, ary aza mandrara tsy hiteny amin’ny fiteny tsy fantatra; '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Izay miteny amin’ny fiteny tsy fantatra dia mampandroso ny tenany; fa izay maminany kosa dia mampandroso ny fiangonana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.4 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: eklesia.
      marker-yv: yv-n
    - type: text
      text: '. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: kanefa aoka ny zavatra rehetra hatao amin’ny fahamendrehana sy ny filaminana.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Tiako raha samy hiteny amin’ny fiteny tsy fantatra ianareo rehetra; kanefa aleo maminany; fa izay maminany dia lehibe noho izay miteny amin’ny fiteny tsy fantatra, raha tsy mandika teny koa izy hahazoan’ny fiangonana fampandrosoana.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Raha mankeo aminareo aho izao, ry rahalahy, ka miteny amin’ny fiteny tsy fantatra, inona moa no soa ho vitako aminareo amin’izany raha tsy fanambaràna, na fahalalana, na faminaniana, na fampianarana, no hitenenako aminareo? '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ary ny zavatra tsy manana aina, na sodina izany na lokanga, na dia maneno aza ka tsy mamoaka feo samihafa, ahoana no hahafantarana izay feo ataony, na an’ny sodina izany na an’ny lokanga? '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Fa raha manao feo hafahafa ny trompetra, iza no hiomana hiady? '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Dia toy izany koa ianareo: Raha tsy mazava ny teny aloaky ny vavanareo, hatao ahoana no fahafantatra izay lazainareo? Fa raha tsy izany dia hiteny amin’ny rivotra ianareo. '
