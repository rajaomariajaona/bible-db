document_id: 1CH.4,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fitanisana hafa koa ny amin’ny taranak’i Joda
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny zanakalahin’i Joda dia i Fareza, i Hezrona, i Karmy, i Hora ary i Sobala. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary niantso an’Andriamanitry ny Israely i Jabeza ka hoy izy: Enga anie ka hotahinao tokoa aho ka hohalalahinao ny faritaniko, ary ho amiko ny tananao ka harovanao amin’ny ratsy aho, mba tsy hampahory ahy izany. Dia nomen’Andriamanitra azy izay nangatahiny.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I Keloba, rahalahin’i Soha, no niteraka an’i Mehira, rain’i Estona; '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: i Estona no niteraka an’i Bety-Rafa sy i Pasea ary i Tehinà, rain’Ira-Nahasa. Ireo dia mponina tao Reka.
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mpits 1.13
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny zanakalahin’i Kenaza dia i Otniela sy i Seraia; ny zanakalahin’i Otniela dia i Hatata. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I Meonotahy no niteraka an’i Ofra; i Seraia no niteraka an’i Joaba, rain’ny ao an-dohasahan’ny mpiasa; fa mpahay taozavatra izy ireo.
  - type: usfm
    marker: r
    children:
    - type: text
      text: Nom 13.6
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny zanakalahin’i Kaleba, zanakalahin’i Jefone, dia Iro sy i Elaha ary i Nama; ny zanakalahin’i Elaha dia i Kenaza. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny zanakalahin’i Jehalalila dia i Zifa, i Zifaha, i Tiria ary i Asarela. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny zanakalahin’i Ezra dia i Jetera, i Mereda, i Efera ary i Jalona. Niteraka an’i Miriama sy i Samay ary i Jisba rain’ny any Estemoa izy. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ilay Jiosy vadiny no niteraka an’i Jareda, rain’ny any Gedora, sy i Ebera, rain’ny any Soko, ary i Jekotiela, rain’ny any Zanoa. Ireo no zanakalahin’i Bitia, zanakavavin’i Farao, izay novadin’i Mereda. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny zanakalahin’i Hodia vadiny, izay anabavin’i Nahama, dia ny rain’ny an’i Keila garmita sy i Estemoa makatita. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I Reaia, zanakalahin’i Sobala, no niteraka an’i Jahata; i Jahata no niteraka an’i Ahomay sy i Lahada. Ireo no fianakavian’ny Zoraìta. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny zanakalahin’i Simona dia i Amnona, i Rina, i Beny-Hanana ary i Tilona. Ny zanakalahin’i Jisy dia i Zoheta sy i Beny-Zoheta.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny zanakalahin’i Sela, zanak’i Joda, dia i Era, rain’i Leka; i Lada, rain’i Maresa; ny fokon’ny mpanao lamba rongony fotsy madinika amin’ny ankohonan’i Asbea; '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'i Jokima sy ny mponina tao Kozeba ary i Joasy sy i Sarafa, izay samy nitondra tany Moaba, dia niverina tany Lehema. Ary efa ela izany zavatra izany. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ireo no mpanefy vilany sy mponina tany Netaima sy Gadera; tany no nitoeran’izy ireo, teo akaikin’ny mpanjaka, satria niasa ho an’ny mpanjaka izy ireo.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny taranak’i Simeona
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Ampit. Gen 46.10; Nom 26.12-13
    marker-yv: yv-h
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny zanakalahin’i Simeona dia i Nemoela, i Jamina, i Jariba, i Zera ary i Saoly. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I Saloma no zanakalahin’i Saoly, i Mibsama no zanakalahin’i Saloma, i Misma no zanakalahin’i Mibsama. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny zanakalahin’i Misma dia i Hamoela, ary i Zakora no zanakalahin’i Hamoela, i Simey no zanakalahin’i Zakora. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nanana zanakalahy enina amby folo sy zanakavavy enina i Simey; fa ny rahalahiny tsy nanan-janaka maro, sady tsy nihamaro tahaka ny taranak’i Joda ny fokony rehetra.
  - type: usfm
    marker: r
    children:
    - type: text
      text: Jos 19.1-8
    marker-yv: yv-h
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izy ireo dia nonina tao Bery-Sheba, Molada, Hazara-Soala, '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Bila, Ezema, Tolada, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao no avy amin’ny rain’i Etama: I Jezirela sy i Jisma ary i Jidbasy. I Hazilelponỳ no anaran’ny anabaviny. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Betoela, Horma, Ziklaga, '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Bety-Markabota, Hazora-Sosima, Bety-Biry ary tao Saraima. Ireo no tanàna nonenany mandra-panjakan’i Davida. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny vohitra miankina aminy dia i Etama, i Aina, i Rimona, i Tokena ary i Asana; tanàna dimy ireo, '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: miampy ny vohitra miankina aminy rehetra koa izay manodidina izany tanàna izany hatrany Baala. Ireo no fonenany sady nanana tetiarana manokana izy.
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I Mesobaba, i Jamleka, i Josa, zanak’i Amazia, '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'i Joela sy i Jeho, zanak’i Josibia, zanak’i Seraia, zanak’i Asiela, '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'i Elioenay, i Jakoba, i Jesohaia, i Asaia, i Adiela, i Jesimiela, i Benaia, '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'i Ziza, zanak’i Sify, zanak’i Alona, zanak’i Jedaia, zanak’i Simry, zanak’i Semaia; '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ireo voalaza anarana ireo dia samy lohany tamin’ny fianakaviany avy; ary efa nihamaro indrindra ny fianakaviany. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nankany amin’ny fidirana ho any Gedora izy ireo, dia hatrany amin’ny ilany atsinanana amin’ny lohasaha, hitady ahitra ho an’ny ondry aman’osiny. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I Penoela no rain’i Gedora, ary i Ezera no rain’i Hosa. Ireo no zanak’i Hora, lahimatoan’i Efrata, rain’ny any Betlehema. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nahita ahitra maitso sady tsara izy ireo; malalaka ny tany sady nandry fehizay; ary ny taranak’i Hama no nonina tao tany taloha. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ireo voasoratra anarana ireo dia tonga tao tamin’ny andron’i Hezekia, mpanjakan’ny Joda, ka namely ny tranolay sy ny fonenan’ny Mehonita hitany tao ary nandringana azy rehetra toy ny zavatra voaozona, mandraka ankehitriny. Nonina nisolo azy izy ireo satria nisy ahitra ho an’ny ondry aman’osiny tany. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nisy lehilahy dimanjato tamin’ny taranak’i Simeona nankany amin’ny tendrombohitra Seìra ka i Peletia, i Nearia, i Refaia ary i Oziela, zanakalahin’i Jisy, no mpifehy azy. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Namely ny sisa afaka tamin’ny Amalekita izy ireo ka monina ao mandraka androany.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nampirafy i Asora, rain’ny any Tekoa, dia i Hela sy i Nara. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I Nara no niteraka an’i Ahozama, i Hafera, i Temeny ary i Hahastarỳ. Ireo no zanakalahin’i Nara. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny zanakalahin’i Hela dia i Zareta sy i Jizara ary i Etnana. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I Koza no niteraka an’i Anoba sy i Zobeba ary ny fokon’i Aharela, zanakalahin’i Haroma. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary i Jabeza dia nalaza noho ny rahalahiny; ny reniny no nanome ny anarany hoe Jabeza, satria hoy izy: Ory aho, raha niteraka azy. '
