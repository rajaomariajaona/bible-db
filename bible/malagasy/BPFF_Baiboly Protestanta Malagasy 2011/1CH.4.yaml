document_id: 1CH.4,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Fitanisana hafa koa ny amin’ny taranak’i Joda
  - type: text
    content: 'Ny zanakalahin’i Joda dia i Fareza, i Hezrona, i Karmy, i Hora ary i Sobala. '
  '10':
  - type: text
    content: 'Ary niantso an’Andriamanitry ny Israely i Jabeza ka hoy izy: Enga anie ka hotahinao tokoa aho ka hohalalahinao ny faritaniko, ary ho amiko ny tananao ka harovanao amin’ny ratsy aho, mba tsy hampahory ahy izany. Dia nomen’Andriamanitra azy izay nangatahiny.'
  '11':
  - type: text
    content: 'I Keloba, rahalahin’i Soha, no niteraka an’i Mehira, rain’i Estona; '
  '12':
  - type: text
    content: i Estona no niteraka an’i Bety-Rafa sy i Pasea ary i Tehinà, rain’Ira-Nahasa. Ireo dia mponina tao Reka.
  - type: heading
    content: Mpits 1.13
  '13':
  - type: text
    content: 'Ny zanakalahin’i Kenaza dia i Otniela sy i Seraia; ny zanakalahin’i Otniela dia i Hatata. '
  '14':
  - type: text
    content: I Meonotahy no niteraka an’i Ofra; i Seraia no niteraka an’i Joaba, rain’ny ao an-dohasahan’ny mpiasa; fa mpahay taozavatra izy ireo.
  - type: heading
    content: Nom 13.6
  '15':
  - type: text
    content: 'Ny zanakalahin’i Kaleba, zanakalahin’i Jefone, dia Iro sy i Elaha ary i Nama; ny zanakalahin’i Elaha dia i Kenaza. '
  '16':
  - type: text
    content: 'Ny zanakalahin’i Jehalalila dia i Zifa, i Zifaha, i Tiria ary i Asarela. '
  '17':
  - type: text
    content: 'Ny zanakalahin’i Ezra dia i Jetera, i Mereda, i Efera ary i Jalona. Niteraka an’i Miriama sy i Samay ary i Jisba rain’ny any Estemoa izy. '
  '18':
  - type: text
    content: 'Ary ilay Jiosy vadiny no niteraka an’i Jareda, rain’ny any Gedora, sy i Ebera, rain’ny any Soko, ary i Jekotiela, rain’ny any Zanoa. Ireo no zanakalahin’i Bitia, zanakavavin’i Farao, izay novadin’i Mereda. '
  '19':
  - type: text
    content: 'Ny zanakalahin’i Hodia vadiny, izay anabavin’i Nahama, dia ny rain’ny an’i Keila garmita sy i Estemoa makatita. '
  '2':
  - type: text
    content: 'I Reaia, zanakalahin’i Sobala, no niteraka an’i Jahata; i Jahata no niteraka an’i Ahomay sy i Lahada. Ireo no fianakavian’ny Zoraìta. '
  '20':
  - type: text
    content: Ny zanakalahin’i Simona dia i Amnona, i Rina, i Beny-Hanana ary i Tilona. Ny zanakalahin’i Jisy dia i Zoheta sy i Beny-Zoheta.
  '21':
  - type: text
    content: 'Ny zanakalahin’i Sela, zanak’i Joda, dia i Era, rain’i Leka; i Lada, rain’i Maresa; ny fokon’ny mpanao lamba rongony fotsy madinika amin’ny ankohonan’i Asbea; '
  '22':
  - type: text
    content: 'i Jokima sy ny mponina tao Kozeba ary i Joasy sy i Sarafa, izay samy nitondra tany Moaba, dia niverina tany Lehema. Ary efa ela izany zavatra izany. '
  '23':
  - type: text
    content: Ireo no mpanefy vilany sy mponina tany Netaima sy Gadera; tany no nitoeran’izy ireo, teo akaikin’ny mpanjaka, satria niasa ho an’ny mpanjaka izy ireo.
  - type: heading
    content: Ny taranak’i Simeona
  - type: heading
    content: Ampit. Gen 46.10; Nom 26.12-13
  '24':
  - type: text
    content: 'Ny zanakalahin’i Simeona dia i Nemoela, i Jamina, i Jariba, i Zera ary i Saoly. '
  '25':
  - type: text
    content: 'I Saloma no zanakalahin’i Saoly, i Mibsama no zanakalahin’i Saloma, i Misma no zanakalahin’i Mibsama. '
  '26':
  - type: text
    content: 'Ny zanakalahin’i Misma dia i Hamoela, ary i Zakora no zanakalahin’i Hamoela, i Simey no zanakalahin’i Zakora. '
  '27':
  - type: text
    content: Nanana zanakalahy enina amby folo sy zanakavavy enina i Simey; fa ny rahalahiny tsy nanan-janaka maro, sady tsy nihamaro tahaka ny taranak’i Joda ny fokony rehetra.
  - type: heading
    content: Jos 19.1-8
  '28':
  - type: text
    content: 'Izy ireo dia nonina tao Bery-Sheba, Molada, Hazara-Soala, '
  '29':
  - type: text
    content: 'Bila, Ezema, Tolada, '
  '3':
  - type: text
    content: 'Izao no avy amin’ny rain’i Etama: I Jezirela sy i Jisma ary i Jidbasy. I Hazilelponỳ no anaran’ny anabaviny. '
  '30':
  - type: text
    content: 'Betoela, Horma, Ziklaga, '
  '31':
  - type: text
    content: 'Bety-Markabota, Hazora-Sosima, Bety-Biry ary tao Saraima. Ireo no tanàna nonenany mandra-panjakan’i Davida. '
  '32':
  - type: text
    content: 'Ny vohitra miankina aminy dia i Etama, i Aina, i Rimona, i Tokena ary i Asana; tanàna dimy ireo, '
  '33':
  - type: text
    content: miampy ny vohitra miankina aminy rehetra koa izay manodidina izany tanàna izany hatrany Baala. Ireo no fonenany sady nanana tetiarana manokana izy.
  '34':
  - type: text
    content: 'I Mesobaba, i Jamleka, i Josa, zanak’i Amazia, '
  '35':
  - type: text
    content: 'i Joela sy i Jeho, zanak’i Josibia, zanak’i Seraia, zanak’i Asiela, '
  '36':
  - type: text
    content: 'i Elioenay, i Jakoba, i Jesohaia, i Asaia, i Adiela, i Jesimiela, i Benaia, '
  '37':
  - type: text
    content: 'i Ziza, zanak’i Sify, zanak’i Alona, zanak’i Jedaia, zanak’i Simry, zanak’i Semaia; '
  '38':
  - type: text
    content: 'ireo voalaza anarana ireo dia samy lohany tamin’ny fianakaviany avy; ary efa nihamaro indrindra ny fianakaviany. '
  '39':
  - type: text
    content: 'Nankany amin’ny fidirana ho any Gedora izy ireo, dia hatrany amin’ny ilany atsinanana amin’ny lohasaha, hitady ahitra ho an’ny ondry aman’osiny. '
  '4':
  - type: text
    content: 'I Penoela no rain’i Gedora, ary i Ezera no rain’i Hosa. Ireo no zanak’i Hora, lahimatoan’i Efrata, rain’ny any Betlehema. '
  '40':
  - type: text
    content: 'Dia nahita ahitra maitso sady tsara izy ireo; malalaka ny tany sady nandry fehizay; ary ny taranak’i Hama no nonina tao tany taloha. '
  '41':
  - type: text
    content: 'Ireo voasoratra anarana ireo dia tonga tao tamin’ny andron’i Hezekia, mpanjakan’ny Joda, ka namely ny tranolay sy ny fonenan’ny Mehonita hitany tao ary nandringana azy rehetra toy ny zavatra voaozona, mandraka ankehitriny. Nonina nisolo azy izy ireo satria nisy ahitra ho an’ny ondry aman’osiny tany. '
  '42':
  - type: text
    content: 'Nisy lehilahy dimanjato tamin’ny taranak’i Simeona nankany amin’ny tendrombohitra Seìra ka i Peletia, i Nearia, i Refaia ary i Oziela, zanakalahin’i Jisy, no mpifehy azy. '
  '43':
  - type: text
    content: Namely ny sisa afaka tamin’ny Amalekita izy ireo ka monina ao mandraka androany.
  '5':
  - type: text
    content: 'Nampirafy i Asora, rain’ny any Tekoa, dia i Hela sy i Nara. '
  '6':
  - type: text
    content: 'I Nara no niteraka an’i Ahozama, i Hafera, i Temeny ary i Hahastarỳ. Ireo no zanakalahin’i Nara. '
  '7':
  - type: text
    content: 'Ny zanakalahin’i Hela dia i Zareta sy i Jizara ary i Etnana. '
  '8':
  - type: text
    content: 'I Koza no niteraka an’i Anoba sy i Zobeba ary ny fokon’i Aharela, zanakalahin’i Haroma. '
  '9':
  - type: text
    content: 'Ary i Jabeza dia nalaza noho ny rahalahiny; ny reniny no nanome ny anarany hoe Jabeza, satria hoy izy: Ory aho, raha niteraka azy. '
