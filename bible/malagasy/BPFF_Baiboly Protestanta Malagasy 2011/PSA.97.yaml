segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: NY TOMPO no Mpanjaka, aoka hihoby ny tany!
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: NY TOMPO no Mpanjaka, aoka hihoby ny tany!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aoka hiravoravo ny nosy marobe!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Rahona sy haizim-pito no manodidina Azy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fahamarinana sy fitsarana marina no fanorenan’ny sezafiandrianany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Misy afo mialoha Azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka mandevona ny fahavalony manodidina izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Mahazava izao tontolo izao ny tselatra alefany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mahita izany ny tany ka mihorohoro.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ny tendrombohitra dia miempo tahaka ny savoka eo anatrehan’NY TOMPO,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia eo anatrehan’ny Tompon’ny tany rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ny lanitra dia manambara ny fahamarinany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny firenena rehetra dia mahita ny voninahiny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Aoka ho menatra izay rehetra manompo sarin-javatra voasokitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy mirehareha ny amin’ny andriamanitra tsy izy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Miankohofa eo anoloan’NY TOMPO
- type: usfm
  marker: q1
  children:
  - type: text
    text: ianareo andriamanitra rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Mandre i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Ziona
  - type: text
    text: ' ka faly'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ary miravoravo ny zanakavavin’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Joda
- type: usfm
  marker: q1
  children:
  - type: text
    text: noho ny fitsaranao, TOMPO ô!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Fa Ianao, TOMPO ô, no Avo Indrindra, ambonin’ny tany rehetra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tafasandratra avo ambonin’ny andriamanitra rehetra Ianao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ianareo izay tia NY TOMPO, mankahalà ny ratsy!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Miaro ny ain’ny olony masina Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary manafaka azy amin’ny tanan’ny ratsy fanahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ny fahazavana no voafafy ho an’ny marina
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny fifaliana dia ho an’ny mahitsy fo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Mifalia amin’NY TOMPO, ry olo-marina
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary miderà ny anarany masina!
