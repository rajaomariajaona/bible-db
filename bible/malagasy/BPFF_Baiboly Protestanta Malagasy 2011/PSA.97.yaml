verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: NY TOMPO no Mpanjaka, aoka hihoby ny tany!
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: NY TOMPO no Mpanjaka, aoka hihoby ny tany!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka hiravoravo ny nosy marobe!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ianareo izay tia NY TOMPO, mankahalà ny ratsy!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miaro ny ain’ny olony masina Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary manafaka azy amin’ny tanan’ny ratsy fanahy.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fahazavana no voafafy ho an’ny marina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny fifaliana dia ho an’ny mahitsy fo.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mifalia amin’NY TOMPO, ry olo-marina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary miderà ny anarany masina!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rahona sy haizim-pito no manodidina Azy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fahamarinana sy fitsarana marina no fanorenan’ny sezafiandrianany.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Misy afo mialoha Azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka mandevona ny fahavalony manodidina izany.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mahazava izao tontolo izao ny tselatra alefany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mahita izany ny tany ka mihorohoro.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny tendrombohitra dia miempo tahaka ny savoka eo anatrehan’NY TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia eo anatrehan’ny Tompon’ny tany rehetra.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny lanitra dia manambara ny fahamarinany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny firenena rehetra dia mahita ny voninahiny.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka ho menatra izay rehetra manompo sarin-javatra voasokitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy mirehareha ny amin’ny andriamanitra tsy izy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miankohofa eo anoloan’NY TOMPO
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ianareo andriamanitra rehetra.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Mandre i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Ziona
    - type: text
      text: ' ka faly'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ary miravoravo ny zanakavavin’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Joda
  - type: usfm
    marker: q1
    children:
    - type: text
      text: noho ny fitsaranao, TOMPO ô!
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa Ianao, TOMPO ô, no Avo Indrindra, ambonin’ny tany rehetra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tafasandratra avo ambonin’ny andriamanitra rehetra Ianao.
