document_id: PSA.97,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: NY TOMPO no Mpanjaka, aoka hihoby ny tany!
  - type: text
    content: NY TOMPO no Mpanjaka, aoka hihoby ny tany!
  - type: text
    content: Aoka hiravoravo ny nosy marobe!
  '10':
  - type: text
    content: Ianareo izay tia NY TOMPO, mankahalà ny ratsy!
  - type: text
    content: Miaro ny ain’ny olony masina Izy
  - type: text
    content: ary manafaka azy amin’ny tanan’ny ratsy fanahy.
  '11':
  - type: text
    content: Ny fahazavana no voafafy ho an’ny marina
  - type: text
    content: ary ny fifaliana dia ho an’ny mahitsy fo.
  '12':
  - type: text
    content: Mifalia amin’NY TOMPO, ry olo-marina
  - type: text
    content: ary miderà ny anarany masina!
  '2':
  - type: text
    content: Rahona sy haizim-pito no manodidina Azy.
  - type: text
    content: Fahamarinana sy fitsarana marina no fanorenan’ny sezafiandrianany.
  '3':
  - type: text
    content: Misy afo mialoha Azy
  - type: text
    content: ka mandevona ny fahavalony manodidina izany.
  '4':
  - type: text
    content: Mahazava izao tontolo izao ny tselatra alefany;
  - type: text
    content: mahita izany ny tany ka mihorohoro.
  '5':
  - type: text
    content: Ny tendrombohitra dia miempo tahaka ny savoka eo anatrehan’NY TOMPO,
  - type: text
    content: dia eo anatrehan’ny Tompon’ny tany rehetra.
  '6':
  - type: text
    content: Ny lanitra dia manambara ny fahamarinany
  - type: text
    content: ary ny firenena rehetra dia mahita ny voninahiny.
  '7':
  - type: text
    content: Aoka ho menatra izay rehetra manompo sarin-javatra voasokitra
  - type: text
    content: sy mirehareha ny amin’ny andriamanitra tsy izy.
  - type: text
    content: Miankohofa eo anoloan’NY TOMPO
  - type: text
    content: ianareo andriamanitra rehetra.
  '8':
  - type: text
    content: 'Mandre i '
  - type: text
    content: Ziona
  - type: text
    content: ' ka faly'
  - type: text
    content: 'ary miravoravo ny zanakavavin’i '
  - type: text
    content: Joda
  - type: text
    content: noho ny fitsaranao, TOMPO ô!
  '9':
  - type: text
    content: Fa Ianao, TOMPO ô, no Avo Indrindra, ambonin’ny tany rehetra;
  - type: text
    content: tafasandratra avo ambonin’ny andriamanitra rehetra Ianao.
