document_id: MAT.21,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny niakaran’i Jesosy tany Jerosalema
  - type: heading
    content: Mar 11.1-10; Lio 19.28-40; Jao 12.12-16
  - type: text
    content: 'Rehefa nanakaiky an’i Jerosalema izy ireo ka tonga tao Betifaga any amin’ny tendrombohitra Oliva dia naniraka mpianatra roa lahy Jesosy ka niteny taminy hoe: '
  '10':
  - type: text
    content: 'Nony efa tafiditra tao Jerosalema Izy dia nihotakotaka ny tanàna manontolo ka niteny hoe: Iza moa izao? '
  '11':
  - type: text
    content: 'Ary nilaza ny vahoaka hoe: Izao no Jesosy mpaminany izay avy any Nazareta any Galilia.'
  - type: heading
    content: Ny nandroahan’i Jesosy ireo mpivarotra tao amin’ny tempoly
  - type: heading
    content: Mar 11.15-17; Lio 19.45-46; ampit. Jao 2.13-17
  '12':
  - type: text
    content: 'Ary Jesosy niditra tao amin’ny tempoly dia nandroaka izay rehetra nivarotra sy nividy tao amin’ny tempoly ka nanjera ny latabatry ny mpanakalo vola sy ny sezan’ny mpivarotra voromailala; '
  '13':
  - type: text
    content: 'dia hoy Izy tamin’izy ireo: Voasoratra hoe: «Ny tranoko dia hatao hoe trano fivavahana (Isa 56.7);'
  - type: text
    content: fa ianareo kosa dia manao azy ho zohy fieren’ny jiolahy» (Jer 7.11).
  '14':
  - type: text
    content: 'Ary nisy jamba sy mandringa nanatona Azy tao amin’ny tempoly dia nositraniny. '
  '15':
  - type: text
    content: 'Fa nony hitan’ny lehiben’ny mpisorona sy ny '
  - type: text
    content: mpanoradalàna
  - type: text
    content: ' ny zava-mahagaga izay nataony sy ny ankizy madinika miantsoantso ao amin’ny tempoly hoe: '
  - type: text
    content: Hosana
  - type: text
    content: ' ho an’ny Zanak’i Davida! Dia tezitra ry zareo '
  '16':
  - type: text
    content: 'ka niteny Taminy hoe: Renao va izay lazain’ireo? Dia hoy Jesosy: Eny; mbola tsy novakinareo mihitsy va fa:'
  - type: text
    content: «Avy amin’ny vavan’ny ankizy madinika sy ny zaza minono no nanamboaranao fiderana» (Sal 8.2)?
  '17':
  - type: text
    content: Dia nandao azy ireo Izy ka niala tao an-tanàna hankany Betania ary nitoetra tany nandritra ny alina.
  - type: heading
    content: Ilay aviavy tsy namoa
  - type: heading
    content: Mar 11.12-14, 20-25
  '18':
  - type: text
    content: 'Rehefa niverina ho any an-tanàna Izy, nony maraina, dia nahatsiaro noana. '
  '19':
  - type: text
    content: 'Nahita hazo aviavy iray teo amoron-dalana anefa Izy dia nanatona, kanjo tsy nahita na inona na inona teo aminy, afa-tsy ravina ihany; dia hoy Izy taminy: Aza misy voa avy aminao intsony mandrakizay. Dia maina niaraka tamin’izay ilay hazo aviavy.'
  '2':
  - type: text
    content: 'Mankanesa amin’iroa vohitra tandrifinareo iroa, fa avy hatrany dia hahita boriky mifatotra sy ny zanany miaraka aminy ianareo; vahao izy dia ento etỳ Amiko. '
  '20':
  - type: text
    content: 'Ary nony hitan’ny mpianatra izany dia gaga izy ireo ka niteny hoe: Ahoana re no dia nahamaina tampoka io aviavy io? '
  '21':
  - type: text
    content: 'Ary Jesosy namaly azy ireo hoe: Lazaiko aminareo marina tokoa: Raha manam-pinoana ianareo ka tsy misalasala dia tsy izao natao tamin’ny aviavy izao ihany no ho vitanareo, fa raha hiteny amin’ity tendrombohitra ity aza ianareo hoe: Mifindrà ka mianjerà any anaty ranomasina, dia ho tonga izany. '
  '22':
  - type: text
    content: Ary na inona na inona no angatahinareo amin’ny fivavahana atao amin’ny finoana dia ho azonareo izany.
  - type: heading
    content: Fanontaniana ny amin’ny fahefan’i Jesosy
  - type: heading
    content: Mar 11.27-33; Lio 20.1-8
  '23':
  - type: text
    content: 'Rehefa tafiditra tao amin’ny tempoly Jesosy ka nampianatra dia nanatona Azy ny lehiben’ny mpisorona sy ny loholona ka niteny hoe: Fahefana manao ahoana no anaovanao izao? Ary iza no nanome Anao izao fahefana izao? '
  '24':
  - type: text
    content: 'Ary Jesosy namaly azy ireo hoe: Hanontany anareo zavatra tokana kosa Aho, koa raha voavalinareo izany dia hilaza aminareo izay fahefana anaovako izany Aho: '
  '25':
  - type: text
    content: 'Ny batisan’i Jaona, avy taiza moa izany? Avy tany an-danitra va sa avy tamin’ny olona? Ary nikaon-doha izy ireo ka niteny hoe: Raha lazaintsika hoe: Avy tany an-danitra, dia hovaliany isika hoe: Koa nahoana no tsy nino azy ianareo? '
  '26':
  - type: text
    content: 'Ary raha lazaintsika kosa hoe: Avy amin’ny olona, dia matahotra ny vahoaka isika satria eken’ny rehetra fa mpaminany i Jaona. '
  '27':
  - type: text
    content: 'Dia namaly an’i Jesosy izy ireo hoe: Tsy fantatray. Dia hoy koa Jesosy taminy: Izaho koa tsy hilaza aminareo izay fahefana anaovako izao.'
  - type: heading
    content: Fanoharana ny amin’ireo zanaka roa lahy
  '28':
  - type: text
    content: 'Fa ahoana kosa ny hevitrareo? Nisy lehilahy iray nanana zanaka roa lahy; dia nankeo amin’ny lahimatoa izy ka niteny hoe: Anaka, andeha miasa any amin’ny tanim-boaloboka anio. '
  '29':
  - type: text
    content: 'Fa namaly izy hoe: Tsy handeha aho; nefa nony avy eo dia nanenina izy ka nandeha ihany. '
  '3':
  - type: text
    content: 'Ary raha misy miteny anareo dia lazao hoe: Misy ilàn’ny Tompo azy; ary havelany hoentinareo avy hatrany izy. '
  '30':
  - type: text
    content: 'Dia nankeo amin’ny faralahy izy ka niteny toy izany koa. Ary namaly azy kosa izy hoe: Handeha aho, tompoko; kanjo tsy nandeha izy. '
  '31':
  - type: text
    content: 'Koa iza amin’izy mirahalahy moa no nanao ny sitrapon’ny rainy? Dia hoy ireo: Ny lahimatoa. Dia hoy Jesosy taminy: Lazaiko aminareo marina tokoa fa ny mpamory hetra sy ny vehivavy janga dia mialoha anareo ho any amin’ny fanjakan’Andriamanitra. '
  '32':
  - type: text
    content: Fa nankany aminareo tamin’ny lalan’ny fahamarinana i Jaona, nefa tsy nino azy ianareo; fa ny mpamory hetra sy ny vehivavy janga no nino azy; fa ianareo kosa, na dia efa nahita izany aza, dia mbola tsy nanenina avy eo mba hinoanareo azy.
  - type: heading
    content: Fanoharana ny amin’ireo mpiasa ratsy fanahy tao amin’ny tanim-boaloboka
  - type: heading
    content: Mar 12.1-12; Lio 20.9-19
  '33':
  - type: text
    content: 'Mihainoa fanoharana hafa koa: Nisy lehilahy tompon-trano nanamboatra tanim-boaloboka ka namefy azy manodidina sy nihady famiazana teo anatiny ary nanorina trano fiambenana, dia nahofany tamin’olona mpiasa tany izany ary nandeha ho any an-tany lavitra izy. '
  '34':
  - type: text
    content: 'Ary rehefa nanakaiky ny fotoana fiakaran’ny vokatra dia naniraka ny mpanompony izy hankany amin’ireo mpiasa tany mba handray ny vokatra. '
  '35':
  - type: text
    content: 'Ny mpiasa tany anefa dia nisambotra ireo mpanompony, koa ny iray dia nokapohiny, ny iray dia novonoiny ary ny iray dia notorahany vato. '
  '36':
  - type: text
    content: 'Dia naniraka mpanompo hafa indray izy, maro noho ny teo; nefa nataony toy izany koa ireny. '
  '37':
  - type: text
    content: 'Ary nony farany dia naniraka ny zanany hankany aminy izy sady niteny hoe: Hanaja ny zanako ireo. '
  '38':
  - type: text
    content: 'Kanjo ny mpiasa tany, nony nahita ilay zanaka, dia nifampiresaka hoe: Ity no mpandova; andeha hovonointsika dia ho lasantsika ny lovany. '
  '39':
  - type: text
    content: 'Dia nosamborin’ireo izy ka navoakany teny ivelan’ny tanim-boaloboka ary novonoiny. '
  '4':
  - type: text
    content: Izany dia tonga mba hahatanteraka izay nampilazaina ny mpaminany
  - type: note
    content: 'Na: profeta.'
  - type: text
    content: ' hoe:'
  '40':
  - type: text
    content: 'Koa rehefa tonga ny tompon’ny tanim-boaloboka, hataony ahoana moa ireo mpiasa tany ireo? '
  '41':
  - type: text
    content: 'Hoy ireo taminy: Ho loza tokoa ny handringanany izany olon-doza izany, ary ny tanim-boaloboka dia hahofany amin’ny mpiasa tany hafa izay hanome azy ny vokatra amin’izay fotoanany.'
  '42':
  - type: text
    content: 'Hoy Jesosy taminy: Tsy mbola novakinareo akory tao amin’ny Soratra Masina va izao:'
  - type: text
    content: «Ny vato izay nolavin’ny mpanao trano,
  - type: text
    content: dia izany no tonga vato fehizoro;
  - type: text
    content: avy tamin’NY TOMPO izao
  - type: text
    content: ka mahagaga eo imasontsika?» (Sal 118.22, 23)
  '43':
  - type: text
    content: 'Ary noho izany dia lazaiko aminareo hoe: Hesorina aminareo ny fanjakan’Andriamanitra ka homena izay firenena mahavokatra ny voany. '
  '44':
  - type: text
    content: Ary izay potraka amin’ity vato ity dia ho torotoro, ary na zovy na zovy no hianjerany dia ho montsamontsana.
  '45':
  - type: text
    content: 'Ary rehefa ren’ny lehiben’ny mpisorona sy ny '
  - type: text
    content: Fariseo
  - type: text
    content: ' ny fanoharana nataon’i Jesosy dia fantany fa ny tenan-dry zareo no nolazainy tamin’izany. '
  '46':
  - type: text
    content: Dia nitady hisambotra Azy izy ireo, saingy natahotra ny vahoaka satria neken’ny vahoaka ho mpaminany Jesosy.
  '5':
  - type: text
    content: '«Lazao amin’i '
  - type: text
    content: Ziona
  - type: text
    content: ' zanakavavy;'
  - type: text
    content: indro ny Mpanjakanao avy ho anao,
  - type: text
    content: malemy fanahy sady mitaingina boriky,
  - type: text
    content: dia zanaky ny boriky miasa
  - type: note
    content: Zahao Zak 9.9.
  - type: text
    content: .»
  '6':
  - type: text
    content: 'Ary nandeha ny mpianatra ka nanatanteraka izay toromarika nomen’i Jesosy azy, '
  '7':
  - type: text
    content: 'koa noentiny ny boriky sy ny zanany ary nataony teo amboniny ny lambany, dia nitaingina azy Jesosy. '
  '8':
  - type: text
    content: 'Ary ny ankabeazan’ny vahoaka dia namelatra ny lambany teny an-dalana; ny sasany dia nanapaka rantsan-kazo ary nampihahaka izany teny an-dalana. '
  '9':
  - type: text
    content: 'Ary ny vahoaka izay nialoha Azy sy izay nanaraka dia niantsoantso hoe:'
  - type: text
    content: «
  - type: text
    content: Hosana
  - type: text
    content: ' ho an’ny Zanak’i Davida!'
  - type: text
    content: Isaorana anie izay avy amin’ny anaran’NY TOMPO!
  - type: text
    content: Hosana any amin’ny avo indrindra» (Sal 118.26).
