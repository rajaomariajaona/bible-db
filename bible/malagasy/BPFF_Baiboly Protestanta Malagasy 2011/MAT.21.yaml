document_id: MAT.21,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny niakaran’i Jesosy tany Jerosalema
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mar 11.1-10; Lio 19.28-40; Jao 12.12-16
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Rehefa nanakaiky an’i Jerosalema izy ireo ka tonga tao Betifaga any amin’ny tendrombohitra Oliva dia naniraka mpianatra roa lahy Jesosy ka niteny taminy hoe: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Nony efa tafiditra tao Jerosalema Izy dia nihotakotaka ny tanàna manontolo ka niteny hoe: Iza moa izao? '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ary nilaza ny vahoaka hoe: Izao no Jesosy mpaminany izay avy any Nazareta any Galilia.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nandroahan’i Jesosy ireo mpivarotra tao amin’ny tempoly
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mar 11.15-17; Lio 19.45-46; ampit. Jao 2.13-17
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Ary Jesosy niditra tao amin’ny tempoly dia nandroaka izay rehetra nivarotra sy nividy tao amin’ny tempoly ka nanjera ny latabatry ny mpanakalo vola sy ny sezan’ny mpivarotra voromailala; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'dia hoy Izy tamin’izy ireo: Voasoratra hoe: «Ny tranoko dia hatao hoe trano fivavahana (Isa 56.7);'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ianareo kosa dia manao azy ho zohy fieren’ny jiolahy» (Jer 7.11).
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Ary nisy jamba sy mandringa nanatona Azy tao amin’ny tempoly dia nositraniny. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Fa nony hitan’ny lehiben’ny mpisorona sy ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpanoradalàna
    - type: text
      text: ' ny zava-mahagaga izay nataony sy ny ankizy madinika miantsoantso ao amin’ny tempoly hoe: '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Hosana
    - type: text
      text: ' ho an’ny Zanak’i Davida! Dia tezitra ry zareo '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'ka niteny Taminy hoe: Renao va izay lazain’ireo? Dia hoy Jesosy: Eny; mbola tsy novakinareo mihitsy va fa:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Avy amin’ny vavan’ny ankizy madinika sy ny zaza minono no nanamboaranao fiderana» (Sal 8.2)?
  '17':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Dia nandao azy ireo Izy ka niala tao an-tanàna hankany Betania ary nitoetra tany nandritra ny alina.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ilay aviavy tsy namoa
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mar 11.12-14, 20-25
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Rehefa niverina ho any an-tanàna Izy, nony maraina, dia nahatsiaro noana. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Nahita hazo aviavy iray teo amoron-dalana anefa Izy dia nanatona, kanjo tsy nahita na inona na inona teo aminy, afa-tsy ravina ihany; dia hoy Izy taminy: Aza misy voa avy aminao intsony mandrakizay. Dia maina niaraka tamin’izay ilay hazo aviavy.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Mankanesa amin’iroa vohitra tandrifinareo iroa, fa avy hatrany dia hahita boriky mifatotra sy ny zanany miaraka aminy ianareo; vahao izy dia ento etỳ Amiko. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Ary nony hitan’ny mpianatra izany dia gaga izy ireo ka niteny hoe: Ahoana re no dia nahamaina tampoka io aviavy io? '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Ary Jesosy namaly azy ireo hoe: Lazaiko aminareo marina tokoa: Raha manam-pinoana ianareo ka tsy misalasala dia tsy izao natao tamin’ny aviavy izao ihany no ho vitanareo, fa raha hiteny amin’ity tendrombohitra ity aza ianareo hoe: Mifindrà ka mianjerà any anaty ranomasina, dia ho tonga izany. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Ary na inona na inona no angatahinareo amin’ny fivavahana atao amin’ny finoana dia ho azonareo izany.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fanontaniana ny amin’ny fahefan’i Jesosy
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mar 11.27-33; Lio 20.1-8
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Rehefa tafiditra tao amin’ny tempoly Jesosy ka nampianatra dia nanatona Azy ny lehiben’ny mpisorona sy ny loholona ka niteny hoe: Fahefana manao ahoana no anaovanao izao? Ary iza no nanome Anao izao fahefana izao? '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Ary Jesosy namaly azy ireo hoe: Hanontany anareo zavatra tokana kosa Aho, koa raha voavalinareo izany dia hilaza aminareo izay fahefana anaovako izany Aho: '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Ny batisan’i Jaona, avy taiza moa izany? Avy tany an-danitra va sa avy tamin’ny olona? Ary nikaon-doha izy ireo ka niteny hoe: Raha lazaintsika hoe: Avy tany an-danitra, dia hovaliany isika hoe: Koa nahoana no tsy nino azy ianareo? '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Ary raha lazaintsika kosa hoe: Avy amin’ny olona, dia matahotra ny vahoaka isika satria eken’ny rehetra fa mpaminany i Jaona. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Dia namaly an’i Jesosy izy ireo hoe: Tsy fantatray. Dia hoy koa Jesosy taminy: Izaho koa tsy hilaza aminareo izay fahefana anaovako izao.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fanoharana ny amin’ireo zanaka roa lahy
    marker-yv: yv-h
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Fa ahoana kosa ny hevitrareo? Nisy lehilahy iray nanana zanaka roa lahy; dia nankeo amin’ny lahimatoa izy ka niteny hoe: Anaka, andeha miasa any amin’ny tanim-boaloboka anio. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Fa namaly izy hoe: Tsy handeha aho; nefa nony avy eo dia nanenina izy ka nandeha ihany. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Ary raha misy miteny anareo dia lazao hoe: Misy ilàn’ny Tompo azy; ary havelany hoentinareo avy hatrany izy. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Dia nankeo amin’ny faralahy izy ka niteny toy izany koa. Ary namaly azy kosa izy hoe: Handeha aho, tompoko; kanjo tsy nandeha izy. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Koa iza amin’izy mirahalahy moa no nanao ny sitrapon’ny rainy? Dia hoy ireo: Ny lahimatoa. Dia hoy Jesosy taminy: Lazaiko aminareo marina tokoa fa ny mpamory hetra sy ny vehivavy janga dia mialoha anareo ho any amin’ny fanjakan’Andriamanitra. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Fa nankany aminareo tamin’ny lalan’ny fahamarinana i Jaona, nefa tsy nino azy ianareo; fa ny mpamory hetra sy ny vehivavy janga no nino azy; fa ianareo kosa, na dia efa nahita izany aza, dia mbola tsy nanenina avy eo mba hinoanareo azy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fanoharana ny amin’ireo mpiasa ratsy fanahy tao amin’ny tanim-boaloboka
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mar 12.1-12; Lio 20.9-19
    marker-yv: yv-h
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Mihainoa fanoharana hafa koa: Nisy lehilahy tompon-trano nanamboatra tanim-boaloboka ka namefy azy manodidina sy nihady famiazana teo anatiny ary nanorina trano fiambenana, dia nahofany tamin’olona mpiasa tany izany ary nandeha ho any an-tany lavitra izy. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Ary rehefa nanakaiky ny fotoana fiakaran’ny vokatra dia naniraka ny mpanompony izy hankany amin’ireo mpiasa tany mba handray ny vokatra. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Ny mpiasa tany anefa dia nisambotra ireo mpanompony, koa ny iray dia nokapohiny, ny iray dia novonoiny ary ny iray dia notorahany vato. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Dia naniraka mpanompo hafa indray izy, maro noho ny teo; nefa nataony toy izany koa ireny. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Ary nony farany dia naniraka ny zanany hankany aminy izy sady niteny hoe: Hanaja ny zanako ireo. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Kanjo ny mpiasa tany, nony nahita ilay zanaka, dia nifampiresaka hoe: Ity no mpandova; andeha hovonointsika dia ho lasantsika ny lovany. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Dia nosamborin’ireo izy ka navoakany teny ivelan’ny tanim-boaloboka ary novonoiny. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Izany dia tonga mba hahatanteraka izay nampilazaina ny mpaminany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.4 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: profeta.
      marker-yv: yv-n
    - type: text
      text: ' hoe:'
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'Koa rehefa tonga ny tompon’ny tanim-boaloboka, hataony ahoana moa ireo mpiasa tany ireo? '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'Hoy ireo taminy: Ho loza tokoa ny handringanany izany olon-doza izany, ary ny tanim-boaloboka dia hahofany amin’ny mpiasa tany hafa izay hanome azy ny vokatra amin’izay fotoanany.'
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'Hoy Jesosy taminy: Tsy mbola novakinareo akory tao amin’ny Soratra Masina va izao:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Ny vato izay nolavin’ny mpanao trano,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia izany no tonga vato fehizoro;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avy tamin’NY TOMPO izao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka mahagaga eo imasontsika?» (Sal 118.22, 23)
  '43':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'Ary noho izany dia lazaiko aminareo hoe: Hesorina aminareo ny fanjakan’Andriamanitra ka homena izay firenena mahavokatra ny voany. '
  '44':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: Ary izay potraka amin’ity vato ity dia ho torotoro, ary na zovy na zovy no hianjerany dia ho montsamontsana.
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: 'Ary rehefa ren’ny lehiben’ny mpisorona sy ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Fariseo
    - type: text
      text: ' ny fanoharana nataon’i Jesosy dia fantany fa ny tenan-dry zareo no nolazainy tamin’izany. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: Dia nitady hisambotra Azy izy ireo, saingy natahotra ny vahoaka satria neken’ny vahoaka ho mpaminany Jesosy.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: '«Lazao amin’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Ziona
    - type: text
      text: ' zanakavavy;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: indro ny Mpanjakanao avy ho anao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: malemy fanahy sady mitaingina boriky,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia zanaky ny boriky miasa
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.5 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Zahao '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Zak 9.9.
      marker-yv: yv-n
    - type: text
      text: .»
  '6':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ary nandeha ny mpianatra ka nanatanteraka izay toromarika nomen’i Jesosy azy, '
  '7':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'koa noentiny ny boriky sy ny zanany ary nataony teo amboniny ny lambany, dia nitaingina azy Jesosy. '
  '8':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Ary ny ankabeazan’ny vahoaka dia namelatra ny lambany teny an-dalana; ny sasany dia nanapaka rantsan-kazo ary nampihahaka izany teny an-dalana. '
  '9':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ary ny vahoaka izay nialoha Azy sy izay nanaraka dia niantsoantso hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «
    - type: usfm
      marker: w
      children:
      - type: text
        text: Hosana
    - type: text
      text: ' ho an’ny Zanak’i Davida!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Isaorana anie izay avy amin’ny anaran’NY TOMPO!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hosana any amin’ny avo indrindra» (Sal 118.26).
