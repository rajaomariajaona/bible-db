document_id: GEN.50,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nandevenana an’i Jakoba
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nihohoka tamin’ny tavan’ny rainy i Josefa ka nitomany teo amboniny sady nanoroka azy. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa tonga teo Gorena-Atada izay any andafin’ny Jordana izy ireo dia nanao fisaonana lehibe sy mafy indrindra teo. Nisaona ny rainy hafitoana i Josefa. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa hitan’ny Kananita tompon-tany ny fisaonana teo Gorena-Atada dia hoy izy ireo: Fisaonana lehibe amin’ny Ejiptiana izao! Izany no nanaovany ny anarany hoe Abela-Ejiptiana'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '50.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Abela-Ejiptiana: Fisaonan’ny Ejiptiana.'
      marker-yv: yv-n
    - type: text
      text: ', any andafin’i Jordana. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nanatanteraka taminy izay rehetra nandidiany azy ny zanakalahin’i Jakoba, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia nitondra azy tany amin’ny tany Kanana ka nandevina azy tao amin’ny zohy ao amin’ny saha Makpela, tandrifin’i Mamre, dia ilay novidin’i Abrahama niaraka tamin’ny saha, tamin’i Efrona hetita, ho tany fandevenana. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Rehefa voalevina ny rainy dia niverina tany Ejipta i Josefa sy ny rahalahiny mbamin’izay rehetra niara-niakatra taminy handevina ny rainy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fiafaran’ny fiainan’i Josefa
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa hitan’ny rahalahin’i Josefa fa maty ny rainy dia hoy izy ireo: Sao dia hankahala antsika i Josefa ka hamaly antsika tokoa noho ny ratsy rehetra nataontsika taminy! '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa nandefa iraka nankany amin’i Josefa izy ireo ka niteny hoe: Nanafatra ny rainao, fony izy tsy mbola maty, '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'hoe: Izao no holazainareo amin’i Josefa: Mamelà re ny fahadisoan’ny rahalahinao sy ny fahotany fa nanao ratsy taminao izy! Eny, mamelà ankehitriny ny fahadisoan’ny mpanompon’ny Andriamanitry ny rainao! Nitomany i Josefa rehefa niteny izany taminy izy ireo. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa nanatona azy ny rahalahiny ka niankohoka teo anatrehany sady niteny hoe: Indreto izahay ho mpanomponao. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy i Josefa tamin’izy ireo: Aza matahotra! Moa solon’Andriamanitra va aho? '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Avy eo dia nasain’i Josefa nanosotra zava-manitra ny rainy ireo mpitsabo mpanompony; dia nanosotra zava-manitra an’Israely ireo mpitsabo. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ianareo no nisaina hanisy ratsy ahy fa Andriamanitra kosa nisaina izany ho soa, mba hahatonga izany ho tahaka ny amin’izao anio izao, hamelona olona betsaka. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ankehitriny, aza matahotra ianareo, fa izaho no hiantoka anareo sy ny zanakareo madinika. Dia nampionona azy sy nilaza teny malefaka taminy izy.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary i Josefa sy ny ankohonan’ny rainy dia nonina tany Ejipta. Folo amby zato taona ny andro niainan’i Josefa. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hitan’i Josefa ny zafiafin’i Efraima; ny zanak’i Makira, zanakalahin’i Manase koa dia naterak’i Josefa teo am-pofoany. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy i Josefa tamin’ny rahalahiny: Ho faty aho nefa hamangy anareo tokoa Andriamanitra ka hitondra anareo hiala amin’ity tany ity ho any amin’ny tany izay nianianany tamin’i Abrahama sy Isaka ary i Jakoba mba homena azy ireo. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nampianiana ny zanak’Israely i Josefa ka niteny hoe: Hamangy anareo tokoa Andriamanitra ka hitondra ny taolako hiala eto ianareo.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia maty i Josefa rehefa folo amby zato taona. Nohosorana zava-manitra izy ka napetraka tao anatin’ny vata iray tany Ejipta.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Naharitra efapolo andro izany, fa izany no isan’ny andro fanosoram-paty. Ary nisaona azy fitopolo andro ny Ejiptiana.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nony tapitra ny andro nisaonana azy dia hoy i Josefa tamin’ireo tao an-tranon’i Farao hoe: Raha mba nahita fitia teo imasonareo aho dia miangavy anareo, mitenena amin’i Farao ka lazao aminy hoe: '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny raiko dia efa nampianiana ahy hoe: Indro, ho faty aho. Koa ao amin’ny fasako, izay nohadiko any amin’ny tany Kanana, ao no andeveno ahy. Koa ankehitriny, trara antitra ianao, aoka hiakatra handevina ny raiko aho dia hiverina atỳ indray. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy i Farao: Miakara ary ka aleveno ny rainao araka izay nampianianany anao.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia lasa niakatra handevina ny rainy i Josefa. Niara-niakatra taminy koa ny mpanompon’i Farao rehetra, dia ny loholona tao an-tranony sy ny loholona rehetra tany amin’ny tany Ejipta '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary ny ankohonan’i Josefa rehetra sy ny rahalahiny mbamin’ny ankohonan’ny rainy; ny ankizy madinika sy ny ondriny aman’osiny ary ny ombiny ihany no navelany tao amin’ny tany Gosena. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nisy kalesy sy mpitaingin-tsoavaly koa niara-niakatra taminy ka lehibe dia lehibe ny toby. '
