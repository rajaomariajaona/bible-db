document_id: GEN.50,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nandevenana an’i Jakoba
  - type: text
    content: 'Ary nihohoka tamin’ny tavan’ny rainy i Josefa ka nitomany teo amboniny sady nanoroka azy. '
  '10':
  - type: text
    content: 'Rehefa tonga teo Gorena-Atada izay any andafin’ny Jordana izy ireo dia nanao fisaonana lehibe sy mafy indrindra teo. Nisaona ny rainy hafitoana i Josefa. '
  '11':
  - type: text
    content: 'Rehefa hitan’ny Kananita tompon-tany ny fisaonana teo Gorena-Atada dia hoy izy ireo: Fisaonana lehibe amin’ny Ejiptiana izao! Izany no nanaovany ny anarany hoe Abela-Ejiptiana'
  - type: note
    content: 'Abela-Ejiptiana: Fisaonan’ny Ejiptiana.'
  - type: text
    content: ', any andafin’i Jordana. '
  '12':
  - type: text
    content: 'Ary nanatanteraka taminy izay rehetra nandidiany azy ny zanakalahin’i Jakoba, '
  '13':
  - type: text
    content: 'dia nitondra azy tany amin’ny tany Kanana ka nandevina azy tao amin’ny zohy ao amin’ny saha Makpela, tandrifin’i Mamre, dia ilay novidin’i Abrahama niaraka tamin’ny saha, tamin’i Efrona hetita, ho tany fandevenana. '
  '14':
  - type: text
    content: Rehefa voalevina ny rainy dia niverina tany Ejipta i Josefa sy ny rahalahiny mbamin’izay rehetra niara-niakatra taminy handevina ny rainy.
  - type: heading
    content: Ny fiafaran’ny fiainan’i Josefa
  '15':
  - type: text
    content: 'Rehefa hitan’ny rahalahin’i Josefa fa maty ny rainy dia hoy izy ireo: Sao dia hankahala antsika i Josefa ka hamaly antsika tokoa noho ny ratsy rehetra nataontsika taminy! '
  '16':
  - type: text
    content: 'Koa nandefa iraka nankany amin’i Josefa izy ireo ka niteny hoe: Nanafatra ny rainao, fony izy tsy mbola maty, '
  '17':
  - type: text
    content: 'hoe: Izao no holazainareo amin’i Josefa: Mamelà re ny fahadisoan’ny rahalahinao sy ny fahotany fa nanao ratsy taminao izy! Eny, mamelà ankehitriny ny fahadisoan’ny mpanompon’ny Andriamanitry ny rainao! Nitomany i Josefa rehefa niteny izany taminy izy ireo. '
  '18':
  - type: text
    content: 'Koa nanatona azy ny rahalahiny ka niankohoka teo anatrehany sady niteny hoe: Indreto izahay ho mpanomponao. '
  '19':
  - type: text
    content: 'Fa hoy i Josefa tamin’izy ireo: Aza matahotra! Moa solon’Andriamanitra va aho? '
  '2':
  - type: text
    content: 'Avy eo dia nasain’i Josefa nanosotra zava-manitra ny rainy ireo mpitsabo mpanompony; dia nanosotra zava-manitra an’Israely ireo mpitsabo. '
  '20':
  - type: text
    content: 'Ianareo no nisaina hanisy ratsy ahy fa Andriamanitra kosa nisaina izany ho soa, mba hahatonga izany ho tahaka ny amin’izao anio izao, hamelona olona betsaka. '
  '21':
  - type: text
    content: Ankehitriny, aza matahotra ianareo, fa izaho no hiantoka anareo sy ny zanakareo madinika. Dia nampionona azy sy nilaza teny malefaka taminy izy.
  '22':
  - type: text
    content: 'Ary i Josefa sy ny ankohonan’ny rainy dia nonina tany Ejipta. Folo amby zato taona ny andro niainan’i Josefa. '
  '23':
  - type: text
    content: 'Hitan’i Josefa ny zafiafin’i Efraima; ny zanak’i Makira, zanakalahin’i Manase koa dia naterak’i Josefa teo am-pofoany. '
  '24':
  - type: text
    content: 'Ary hoy i Josefa tamin’ny rahalahiny: Ho faty aho nefa hamangy anareo tokoa Andriamanitra ka hitondra anareo hiala amin’ity tany ity ho any amin’ny tany izay nianianany tamin’i Abrahama sy Isaka ary i Jakoba mba homena azy ireo. '
  '25':
  - type: text
    content: 'Ary nampianiana ny zanak’Israely i Josefa ka niteny hoe: Hamangy anareo tokoa Andriamanitra ka hitondra ny taolako hiala eto ianareo.'
  '26':
  - type: text
    content: Dia maty i Josefa rehefa folo amby zato taona. Nohosorana zava-manitra izy ka napetraka tao anatin’ny vata iray tany Ejipta.
  '3':
  - type: text
    content: Naharitra efapolo andro izany, fa izany no isan’ny andro fanosoram-paty. Ary nisaona azy fitopolo andro ny Ejiptiana.
  '4':
  - type: text
    content: 'Nony tapitra ny andro nisaonana azy dia hoy i Josefa tamin’ireo tao an-tranon’i Farao hoe: Raha mba nahita fitia teo imasonareo aho dia miangavy anareo, mitenena amin’i Farao ka lazao aminy hoe: '
  '5':
  - type: text
    content: 'Ny raiko dia efa nampianiana ahy hoe: Indro, ho faty aho. Koa ao amin’ny fasako, izay nohadiko any amin’ny tany Kanana, ao no andeveno ahy. Koa ankehitriny, trara antitra ianao, aoka hiakatra handevina ny raiko aho dia hiverina atỳ indray. '
  '6':
  - type: text
    content: 'Ary hoy i Farao: Miakara ary ka aleveno ny rainao araka izay nampianianany anao.'
  '7':
  - type: text
    content: 'Dia lasa niakatra handevina ny rainy i Josefa. Niara-niakatra taminy koa ny mpanompon’i Farao rehetra, dia ny loholona tao an-tranony sy ny loholona rehetra tany amin’ny tany Ejipta '
  '8':
  - type: text
    content: 'ary ny ankohonan’i Josefa rehetra sy ny rahalahiny mbamin’ny ankohonan’ny rainy; ny ankizy madinika sy ny ondriny aman’osiny ary ny ombiny ihany no navelany tao amin’ny tany Gosena. '
  '9':
  - type: text
    content: 'Nisy kalesy sy mpitaingin-tsoavaly koa niara-niakatra taminy ka lehibe dia lehibe ny toby. '
