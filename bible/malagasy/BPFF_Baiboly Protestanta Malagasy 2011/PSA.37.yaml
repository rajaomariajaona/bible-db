  '1':
  - type: heading
    content: Aza mialona ny fahombiazan’ny ratsy fanahy
  - type: text
    content: Nataon’i Davida.
  - type: heading
    content: alef א
  - type: text
    content: Aoka tsy hirehitra noho ny amin’ny mpanao ratsy ny fahatezeranao
  - type: text
    content: ary aza mialona ny mpanao heloka,
  '10':
  - type: text
    content: Rehefa afaka kelikely dia tsy hisy ratsy fanahy intsony!
  - type: text
    content: Handinika ny fonenany ianao fa tsy ho ao intsony izy!
  '11':
  - type: text
    content: Ny mpandefitra kosa no handova ny tany
  - type: text
    content: ka hiravoravo amin’ny haben’ny fiadanana.
  - type: heading
    content: zaìn
  '12':
  - type: text
    content: Manao hevi-dratsy hamelezany ny marina ny ratsy fanahy
  - type: text
    content: ka mihidy vazana aminy.
  '13':
  - type: text
    content: Mihomehy azy ny Tompo
  - type: text
