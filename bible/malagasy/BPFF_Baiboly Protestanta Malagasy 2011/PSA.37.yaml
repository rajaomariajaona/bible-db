  - type: heading
    content: iod י
  '18':
  - type: text
    content: Fantatry NY TOMPO ny andron’ny olo-mahitsy
  - type: text
    content: ary ho mandrakizay ny lovany.
  '19':
  - type: text
    content: Tsy mba hitsanga-menatra ireny amin’ny andro fahoriana
  - type: text
    content: ary amin’ny taona misy mosary dia ho voky izy.
  - type: heading
    content: kaf כ
  '2':
  - type: text
    content: fa maina vetivety tahaka ny ahitra izy
  - type: text
    content: ka halazo tahaka ny ahi-maitso.
  - type: heading
    content: bet ב
  '20':
  - type: text
    content: Fa ho ringana ny ratsy fanahy
  - type: text
    content: ary ho tahaka ny voninahitry ny saha ny fahavalon’NY TOMPO;
  - type: text
    content: ho levona izy; eny, ho levon-ko setroka izy.
  - type: heading
    content: lamed ל
  '21':
  - type: text
    content: Mitrosa ny ratsy fanahy nefa tsy manonitra,
  - type: text
    content: fa mamindra fo kosa ny marina ka manome.
  '22':
  - type: text
    content: Fa izay tahiny no handova ny tany
  - type: text
    content: ary izay ozoniny kosa no hofongorana.
  - type: heading
    content: mem מ
  '23':
  - type: text
    content: Avy amin’NY TOMPO no mahalavorary ny dian’ny olona
  - type: text
    content: ka Izy no mankasitraka ny lalany;
  '24':
  - type: text
    content: na dia lavo aza izy, tsy dia mikarapoka
  - type: text
    content: satria NY TOMPO no mitantana azy.
  - type: heading
    content: non נ
  '25':
  - type: text
    content: Efa mba tanora ihany aho ary efa antitra ankehitriny,
  - type: text
    content: fa tsy mbola hitako izay marina nafoy,
  - type: text
    content: na ny zanany mangataka hanina.
  '26':
  - type: text
    content: Miantra mandrakariva ireny ka mampisambotra
  - type: text
    content: ary hotahina ny taranany.
  - type: heading
    content: samek ס
  '27':
  - type: text
    content: Halaviro ny ratsy ka manaova soa,
  - type: text
    content: dia honina mandrakizay ianao.
  '28':
  - type: text
    content: Fa NY TOMPO tia rariny
  - type: text
    content: sady tsy hahafoy ny olony masina.
  - type: heading
    content: aìn ע
  - type: text
    content: Harovana mandrakizay ireo;
  - type: text
    content: fa ny taranaky ny ratsy fanahy kosa dia hofongorana.
  '29':
  - type: text
    content: Ny marina dia handova ny tany
  - type: text
    content: ka honina eo aminy mandrakizay.
  - type: heading
    content: פ pe
  '3':
  - type: text
    content: Matokia NY TOMPO ianao ka manaova soa,
  - type: text
    content: dia honina amin’ny tany ianao ka ho faly amin’ny fahamarinana.
  '30':
  - type: text
    content: Miresaka fahendrena ny vavan’ny marina
  - type: text
    content: ary manambara ny rariny ny lelany.
  '31':
  - type: text
    content: Ny lalànan’Andriamaniny no ao am-pony;
  - type: text
    content: tsy mba ho solafaka ny diany.
  - type: heading
    content: tsade צ
  '32':
  - type: text
    content: Ny ratsy fanahy dia mitsikilo ny marina
  - type: text
    content: ka mitady ny hahafaty azy;
  '33':
  - type: text
    content: NY TOMPO anefa tsy hahafoy azy eo an-tanany
  - type: text
    content: na hamela azy ho voaheloka raha tsaraina.
  - type: heading
    content: kof ק
  '34':
  - type: text
    content: Miandrasa NY TOMPO ka tandremo ny lalany
  - type: text
    content: dia hanandratra anao handova ny tany Izy;
  - type: text
    content: ho faly ianao hahita ny hamongorana ny ratsy fanahy.
  - type: heading
    content: res ר
  '35':
  - type: text
    content: Efa hitako ny ratsy fanahy fa loza loatra izy;
  - type: text
    content: nisandrahaka tahaka ny hazo maitso naniry ho azy.
  '36':
  - type: text
    content: Kanjo nandalo izy ka indro, tsy teo intsony.
  - type: text
    content: Nitady azy aho nefa tsy hita izy.
  - type: heading
    content: sin שׁ
  '37':
  - type: text
    content: Diniho ny tsy misy tsiny ka jereo ny mahitsy;
  - type: text
    content: manana ny ho aviny ny olona tia fihavanana.
  '38':
  - type: text
    content: Fa ny mpanota kosa dia hiara-haringana;
  - type: text
    content: ho fongotra ny hoavin’ny ratsy fanahy.
  - type: heading
    content: tao ת
  '39':
  - type: text
    content: Ny famonjena ny marina dia avy amin’NY TOMPO;
  - type: text
    content: fiarovana mafy ho azy Izy amin’ny andro fahoriana.
  '4':
  - type: text
    content: Aoka NY TOMPO no iravoravoanao,
  - type: text
    content: dia homeny anao izay irin’ny fonao.
  - type: heading
    content: gimel ג
  '40':
  - type: text
    content: Ary NY TOMPO mamonjy azy sy manafaka azy;
  - type: text
    content: eny, manafaka azy amin’ny ratsy fanahy Izy ka mamonjy azy,
  - type: text
    content: satria mialoka Aminy ireo.
  '5':
  - type: text
    content: Ankino amin’NY TOMPO ny lalanao
  - type: text
    content: ary matokia Azy fa Izy no hanatanteraka.
  '6':
  - type: text
    content: Hampiseho ny fahamarinanao tahaka ny mazava Izy
  - type: text
    content: ary ny rariny ho anao tahaka ny mitataovovonana.
  - type: heading
    content: dalet ד
  '7':
  - type: text
    content: Miandrasa NY TOMPO amim-pahanginana ianao ka manantenà Azy;
  - type: text
    content: aza tezitra amin’izay ambinina amin’ny lalany,
  - type: text
    content: dia amin’izay olona manao sain-dratsy.
  - type: heading
    content: he ה
  '8':
  - type: text
    content: Mitsahara amin’ny fahatezerana ary mahafoiza ny fahavinirana;
  - type: text
    content: aoka tsy ho tezitra ianao fa ratsy no hiafaran’izany.
  '9':
  - type: text
    content: Fa hofongorana ny mpanao ratsy
  - type: text
    content: ary izay manantena NY TOMPO no handova ny tany.
