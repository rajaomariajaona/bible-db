  - type: heading
    content: het ח
  '14':
  - type: text
    content: Nanatsoaka ny sabany ny ratsy fanahy
  - type: text
    content: ka nanenjana ny tsipìkany
  - type: text
    content: mba hampikarapoka ny ory sy ny mahantra
  - type: text
    content: ary hamono ny mahitsy lalana.
  '15':
  - type: text
    content: Hitsatoka amin’ny fony ihany ny sabany
  - type: text
    content: ary ho tapatapaka ny tsipìkany.
  - type: heading
    content: tet ט
  '16':
  - type: text
    content: Tsara lavitra ny kely ananan’ny olona marina iray
  - type: text
    content: noho ny be ananan’ny ratsy fanahy maro;
  '17':
  - type: text
    content: ho tapatapaka ny sandrin’ny ratsy fanahy,
