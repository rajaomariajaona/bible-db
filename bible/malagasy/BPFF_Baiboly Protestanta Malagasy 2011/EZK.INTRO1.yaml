document_id: EZK.INTRO1
type_code: plt
segments:
- type: usfm
  marker: imt1
  children:
  - type: text
    text: INDRAY MIJERY
- type: usfm
  marker: ip
  children:
  - type: text
    text: I Ezekiela mpaminany no miteny ao amin’ny Boky manontolo, ankoatra ny 1.2-3, izay nataon’ny mpandamina ny Boky. I Ezekiela dia mpisorona. Hita taratra ao amin’ny Boky manontolo izany, ary ny Boky dia misy itovizany be amin’ny Levitikosy. Tany amin’ny fahababoana tany Babilona no niasany nandritra ny 22 taona ka nitenenany tamin’ny babo sy ireo izay tavela tany Jerosalema. Isan’ireo babo voalohany noentina ho any Babilona tamin’ny taona 597 izy.
- type: usfm
  marker: is1
  children:
  - type: text
    text: Ny votoatin’ny Boky
- type: usfm
  marker: ip
  children:
  - type: text
    text: Ny nahitany ny voninahitry NY TOMPO tamin’ny niantsoana azy ho mpaminany, sy ny faharavan’i Jerosalema, no zava-nitranga roa lehibe izay nanamarika ny fiainan’i Ezekiela sy ny asany. Averimberiny fa ny fahotana dia fahavetavetana, izany hoe zavatra izay tsy mahay miray amin’ny fahamasinan’Andriamanitra. Ny fialana amin’Andriamanitra dia fijangajangana. I Samaria sy i Jerosalema dia oharina amin’ny vehivavy roa nijangajanga. Ny fahotan’i Jerosalema dia tsy latsaka noho ny an’i Sodoma, i Tiro sy i Ejipta. Teo anivon’izany firenena maditra izany no nanirahana an’i Ezekiela hanambara ny tenin’Andriamanitra. Asehony amin’ny fihetsika manaitra koa ny hafatra ho an’ny olona. Ambaran’i Ezekiela fa tsy maintsy ho tonga ny faharavan’i Jerosalema sy ny fahababoana noho ny ditran’ny olona, ary tanteraka tokoa izany. Rehefa tanteraka anefa ny fahababoana dia manomboka manambara i Ezekiela fa mbola hanangana indray ny sisa amin’ny Israely Andriamanitra.
- type: usfm
  marker: iot
  children:
  - type: text
    text: Ny firafitry ny Boky
- type: usfm
  marker: io1
  children:
  - type: text
    text: 'Ny nahitan’i Ezekiela ny voninahitr’Andriamanitra sy ny fanirahana azy: 1.1–3.21'
- type: usfm
  marker: io1
  children:
  - type: text
    text: 'Faminaniana maromaro, manambara ny fitsarana an’i Jerosalema: 3.22–24.27'
- type: usfm
  marker: io1
  children:
  - type: text
    text: 'Ny fitsarana ireo firenena jentilisa: 25–32'
- type: usfm
  marker: io1
  children:
  - type: text
    text: 'Faminaniana ny hananganana indray ny Israely: 33–37'
- type: usfm
  marker: io1
  children:
  - type: text
    text: 'I Goga sy i Magoga, fahavalo farany hanafika ny Israely: 38–39'
- type: usfm
  marker: io1
  children:
  - type: text
    text: 'Fahitana ny amin’ny tempoly vaovao sy ny tany vaovao: 40–48'
