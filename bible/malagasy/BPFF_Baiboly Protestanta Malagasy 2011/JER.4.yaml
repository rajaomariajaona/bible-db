document_id: JER.4
type_code: plt
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Raha hiverina ianao, ry Israely, dia miverena Amiko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hoy NY TOMPO;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary raha hanaisotra ny fahavetavetanao tsy ho eo imasoko ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy hivezivezy foana,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'fa hianiana amin’ny hitsiny sy ny rariny ary ny fahamarinana hoe: Raha velona koa NY TOMPO'
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia handray fitahiana avy Aminy ny firenena
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady afaka hirehareha ny Aminy.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Fa izao no lazain’NY TOMPO amin’ny olon’ny Joda sy Jerosalema:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Miasà tany vao ho anareo ianareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa aza mamafy amin’ny tsilo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Miforà ho an’NY TOMPO ianareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, forao ny fonareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ry Joda sy ry mponina any Jerosalema!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fandrao hiseho toy ny afo ny fahatezerako
- type: usfm
  marker: q1
  children:
  - type: text
    text: noho ny ratsy ataonareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hirehitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady tsy hisy afaka hamono azy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Hiaka fanairana ao amin’ny Joda
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ambaraonareo ao amin’ny Joda,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary torio ao Jerosalema,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ka lazao hoe: Tsofy ao amin’ny tany ny anjomara!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Miantsoantsoa mafy ka lazao hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mivoria ianareo, ary andeha isika hiditra amin’ny tanàna mimanda!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Manangàna faneva manandrify an’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Ziona
  - type: text
    text: ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mandosira haingana, aza mijanona;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa Izaho hahatonga loza avy any avaratra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia fandringanana be.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Misy liona miakatra avy any anaty kirihitrala,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ilay mpanimba ny firenena dia efa miainga,
- type: usfm
  marker: q1
  children:
  - type: text
    text: efa mivoaka avy amin’ny fitoerany
- type: usfm
  marker: q1
  children:
  - type: text
    text: hahafoana ny taninao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hahalao ny tanànanao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy hisy mponina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ary noho izany dia misikìna lamba fisaonana ianareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka mitomania sy midradradradrà;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa tsy afaka amintsika ny firehetan’ny fahatezeran’NY TOMPO.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ary amin’izany andro izany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hoy NY TOMPO,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ho very hevitra ny mpanjaka sy ny lehibe,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho kepoka ny mpisorona
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ho gaga ny mpaminany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dia hoy aho: Indrisy, RY TOMPO Andriamanitra ô!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Efa nofitahinao tokoa ity firenena ity sy Jerosalema
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'tamin’ny nilazanao hoe: Hisy fiadanana ho anareo;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: kanjo mihatra amin’ny aina ny sabatra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Amin’izany andro izany dia holazaina amin’ity firenena ity sy Jerosalema hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hisy rivo-mahamay avy any an-tendrombohitra mangadihady any an-tany efitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: hankany amin’ny oloko, zanako vavy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: kanefa tsy hikororohana na hanadiovana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Fa izany dia rivotra mahery
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay nirahiko avy amin’ireny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ankehitriny kosa dia hifandahatra aminy Aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Indro, avy toy ny rahona izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tahaka ny tadio ny kalesy fitondrany miady,
- type: usfm
  marker: q1
  children:
  - type: text
    text: haingana noho ny voromahery ny soavaliny.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Lozantsika! Fa lany ringana isika.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ry Jerosalema, sasao ny fonao ho afaka amin’ny ratsy
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hamonjena anao!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mandra-pahoviana no hitoeran’ny
- type: usfm
  marker: q1
  children:
  - type: text
    text: hevi-dratsinao ao am-ponao?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Fa injany misy feo manambara avy any Dana
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary misy filazam-pahoriana avy amin’ny tany be havoana any Efraima.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Lazaonareo amin’ny firenena,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'torio amin’i Jerosalema hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Misy mpanao fahirano avy any an-tany lavitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka manakora hamely ny tanànan’ny Joda.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Manodidina an’i Jerosalema ireo
- type: usfm
  marker: q1
  children:
  - type: text
    text: toy ny fanaon’ny mpiandry saha,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa nikomy Tamiko izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hoy NY TOMPO.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ny alehanao sy ny asanao no nahatonga izany taminao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: izany no vokatry ny faharatsianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, mangidy izany
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady mihatra amin’ny ainao.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mararin’ny loza tsinjony mialoha i Jeremia
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Endre ny kiboko! Endre izany kiboko!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Manaintaina aho; endre! Mila ho vaky izany ny foko!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mitoloko ny foko ka tsy mahay mangina aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa reko ny feon’anjomara
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny akoran’ady.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Fandravana mifanontona no ambara,
- type: usfm
  marker: q1
  children:
  - type: text
    text: rava ny tany rehetra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: rava tampoka ny tranolaiko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, rava indray mipy maso monja ny ambaindaiko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Mandra-pahoviana re no mbola hahitako ny faneva
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy handrenesako ny feon’anjomara?
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fijerin’Andriamanitra ny olony
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Fa adala ny oloko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izaho tsy mba fantany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: zaza tsy misy saina izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady tsy manam-pahalalana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: raha ny hanao ratsy dia kinga izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny hanao soa kosa dia tsy fantany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Miverina ho tsy misy endrika sy foana
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Nojereko ny tany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka indro, tsy nisy endrika izy sady foana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny lanitra koa,
- type: usfm
  marker: q1
  children:
  - type: text
    text: indro, tsy teo intsony ny fahazavany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Nojereko ny tendrombohitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka indro, nihorohoro izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary nihozongozona ny havoana rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Nojereko
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka indro, tsy nisy olona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary efa nandositra ny voromanidina rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Nojereko
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka indro, Karmela aza dia tonga tany efitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny tanànany rehetra dia rava teo anatrehan’NY TOMPO,
- type: usfm
  marker: q1
  children:
  - type: text
    text: teo anoloan’ny firehetan’ny fahatezerany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Fa izao no lazain’NY TOMPO:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ho lao ny tany rehetra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa tsy dia holevoniko avokoa izy akory.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Noho izany dia hisaona ny tany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ho tonga mainty ny lanitra ambony
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria efa niteny izany Aho, sady efa nikasa izany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy hanenina
- type: usfm
  marker: q1
  children:
  - type: text
    text: na hanatsoaka izany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jerosalema manoloana ireo mpamono olona
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Noho ny fihorakoraky ny mpitaingin-tsoavaly sy ny mpandefa tsipìka
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia mandositra avokoa ny tanàna rehetra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mitsofoka any anatin’ny kirihitrala
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy mananika ny vatolampy izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: lao avokoa ny tanàna rehetra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy misy mponina intsony ao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Ary hanao inona ianao, ry ilay rava?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na dia miakanjo jaky aza ianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: na dia miravaka volamena aza ianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: na dia hosoranao loko mainty aza ny masonao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia foana ny itadiavanao hahatsara tarehy anao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hanifika anao ireo lehilahy tia anao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka ny ainao aza dia hotadiaviny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Fa efa nandre feo tahaka ny an’ny vehivavy eo am-piterahana aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy fidridridridriana tahaka ny vehivavy izay vao miteraka ny voalohan-janany,
- type: usfm
  marker: q1
  children:
