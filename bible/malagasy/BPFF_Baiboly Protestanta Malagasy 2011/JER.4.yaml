document_id: JER.4,3103
type_code: plt
verses:
  '1':
  - type: text
    content: Raha hiverina ianao, ry Israely, dia miverena Amiko,
  - type: text
    content: hoy NY TOMPO;
  - type: text
    content: ary raha hanaisotra ny fahavetavetanao tsy ho eo imasoko ianao
  - type: text
    content: ka tsy hivezivezy foana,
  '10':
  - type: text
    content: 'Dia hoy aho: Indrisy, RY TOMPO Andriamanitra ô!'
  - type: text
    content: Efa nofitahinao tokoa ity firenena ity sy Jerosalema
  - type: text
    content: 'tamin’ny nilazanao hoe: Hisy fiadanana ho anareo;'
  - type: text
    content: kanjo mihatra amin’ny aina ny sabatra.
  '11':
  - type: text
    content: 'Amin’izany andro izany dia holazaina amin’ity firenena ity sy Jerosalema hoe:'
  - type: text
    content: Hisy rivo-mahamay avy any an-tendrombohitra mangadihady any an-tany efitra
  - type: text
    content: hankany amin’ny oloko, zanako vavy,
  - type: text
    content: kanefa tsy hikororohana na hanadiovana.
  '12':
  - type: text
    content: Fa izany dia rivotra mahery
  - type: text
    content: izay nirahiko avy amin’ireny,
  - type: text
    content: ary ankehitriny kosa dia hifandahatra aminy Aho.
  '13':
  - type: text
    content: Indro, avy toy ny rahona izy,
  - type: text
    content: ary tahaka ny tadio ny kalesy fitondrany miady,
  - type: text
    content: haingana noho ny voromahery ny soavaliny.
  - type: text
    content: Lozantsika! Fa lany ringana isika.
  '14':
  - type: text
    content: Ry Jerosalema, sasao ny fonao ho afaka amin’ny ratsy
  - type: text
    content: mba hamonjena anao!
  - type: text
    content: Mandra-pahoviana no hitoeran’ny
  - type: text
    content: hevi-dratsinao ao am-ponao?
  '15':
  - type: text
    content: Fa injany misy feo manambara avy any Dana
  - type: text
    content: ary misy filazam-pahoriana avy amin’ny tany be havoana any Efraima.
  '16':
  - type: text
    content: Lazaonareo amin’ny firenena,
  - type: text
    content: 'torio amin’i Jerosalema hoe:'
  - type: text
    content: Misy mpanao fahirano avy any an-tany lavitra
  - type: text
    content: ka manakora hamely ny tanànan’ny Joda.
  '17':
  - type: text
    content: Manodidina an’i Jerosalema ireo
  - type: text
    content: toy ny fanaon’ny mpiandry saha,
  - type: text
    content: fa nikomy Tamiko izy,
  - type: text
    content: hoy NY TOMPO.
  '18':
  - type: text
    content: Ny alehanao sy ny asanao no nahatonga izany taminao;
  - type: text
    content: izany no vokatry ny faharatsianao,
  - type: text
    content: eny, mangidy izany
  - type: text
    content: sady mihatra amin’ny ainao.
  - type: heading
    content: Mararin’ny loza tsinjony mialoha i Jeremia
  '19':
  - type: text
    content: Endre ny kiboko! Endre izany kiboko!
  - type: text
    content: Manaintaina aho; endre! Mila ho vaky izany ny foko!
  - type: text
    content: Mitoloko ny foko ka tsy mahay mangina aho;
  - type: text
    content: fa reko ny feon’anjomara
  - type: text
    content: sy ny akoran’ady.
  '2':
  - type: text
    content: 'fa hianiana amin’ny hitsiny sy ny rariny ary ny fahamarinana hoe: Raha velona koa NY TOMPO'
  - type: text
    content: dia handray fitahiana avy Aminy ny firenena
  - type: text
    content: sady afaka hirehareha ny Aminy.
  '20':
  - type: text
    content: Fandravana mifanontona no ambara,
  - type: text
    content: rava ny tany rehetra;
  - type: text
    content: rava tampoka ny tranolaiko,
  - type: text
    content: eny, rava indray mipy maso monja ny ambaindaiko.
  '21':
  - type: text
    content: Mandra-pahoviana re no mbola hahitako ny faneva
  - type: text
    content: sy handrenesako ny feon’anjomara?
  - type: heading
    content: Ny fijerin’Andriamanitra ny olony
  '22':
  - type: text
    content: Fa adala ny oloko,
  - type: text
    content: Izaho tsy mba fantany;
  - type: text
    content: zaza tsy misy saina izy
  - type: text
    content: sady tsy manam-pahalalana;
  - type: text
    content: raha ny hanao ratsy dia kinga izy;
  - type: text
    content: fa ny hanao soa kosa dia tsy fantany.
  - type: heading
    content: Miverina ho tsy misy endrika sy foana
  '23':
  - type: text
    content: Nojereko ny tany
  - type: text
    content: ka indro, tsy nisy endrika izy sady foana,
  - type: text
    content: ary ny lanitra koa,
  - type: text
    content: indro, tsy teo intsony ny fahazavany.
  '24':
  - type: text
    content: Nojereko ny tendrombohitra
  - type: text
    content: ka indro, nihorohoro izy,
  - type: text
    content: ary nihozongozona ny havoana rehetra.
  '25':
  - type: text
    content: Nojereko
  - type: text
    content: ka indro, tsy nisy olona,
  - type: text
    content: ary efa nandositra ny voromanidina rehetra.
  '26':
  - type: text
    content: Nojereko
  - type: text
    content: ka indro, Karmela aza dia tonga tany efitra,
  - type: text
    content: ary ny tanànany rehetra dia rava teo anatrehan’NY TOMPO,
  - type: text
    content: teo anoloan’ny firehetan’ny fahatezerany.
  '27':
  - type: text
    content: 'Fa izao no lazain’NY TOMPO:'
  - type: text
    content: Ho lao ny tany rehetra,
  - type: text
    content: nefa tsy dia holevoniko avokoa izy akory.
  '28':
  - type: text
    content: Noho izany dia hisaona ny tany
  - type: text
    content: ary ho tonga mainty ny lanitra ambony
  - type: text
    content: satria efa niteny izany Aho, sady efa nikasa izany
  - type: text
    content: ka tsy hanenina
  - type: text
    content: na hanatsoaka izany.
  - type: heading
    content: Jerosalema manoloana ireo mpamono olona
  '29':
  - type: text
    content: Noho ny fihorakoraky ny mpitaingin-tsoavaly sy ny mpandefa tsipìka
  - type: text
    content: dia mandositra avokoa ny tanàna rehetra;
  - type: text
    content: mitsofoka any anatin’ny kirihitrala
  - type: text
    content: sy mananika ny vatolampy izy;
  - type: text
    content: lao avokoa ny tanàna rehetra
  - type: text
    content: ka tsy misy mponina intsony ao.
  '3':
  - type: text
    content: 'Fa izao no lazain’NY TOMPO amin’ny olon’ny Joda sy Jerosalema:'
  - type: text
    content: Miasà tany vao ho anareo ianareo
  - type: text
    content: fa aza mamafy amin’ny tsilo.
  '30':
  - type: text
    content: Ary hanao inona ianao, ry ilay rava?
  - type: text
    content: Na dia miakanjo jaky aza ianao,
  - type: text
    content: na dia miravaka volamena aza ianao,
  - type: text
    content: na dia hosoranao loko mainty aza ny masonao,
  - type: text
    content: dia foana ny itadiavanao hahatsara tarehy anao;
  - type: text
    content: hanifika anao ireo lehilahy tia anao
  - type: text
    content: ka ny ainao aza dia hotadiaviny.
  '31':
  - type: text
    content: Fa efa nandre feo tahaka ny an’ny vehivavy eo am-piterahana aho
  - type: text
    content: sy fidridridridriana tahaka ny vehivavy izay vao miteraka ny voalohan-janany,
  - type: text
    content: 'dia ny feon’i '
  - type: text
    content: Ziona
  - type: text
    content: ' zanakavavy'
  - type: text
    content: izay misefosefo
  - type: text
    content: sy mamelatra ny tanany
  - type: text
    content: 'no sady miteny hoe: Lozako!'
  - type: text
    content: Fa reraka ny aiko azon’ireo mpamono olona.
  '4':
  - type: text
    content: Miforà ho an’NY TOMPO ianareo,
  - type: text
    content: eny, forao ny fonareo,
  - type: text
    content: ry Joda sy ry mponina any Jerosalema!
  - type: text
    content: Fandrao hiseho toy ny afo ny fahatezerako
  - type: text
    content: noho ny ratsy ataonareo
  - type: text
    content: ka hirehitra,
  - type: text
    content: sady tsy hisy afaka hamono azy.
  - type: heading
    content: Hiaka fanairana ao amin’ny Joda
  '5':
  - type: text
    content: Ambaraonareo ao amin’ny Joda,
  - type: text
    content: ary torio ao Jerosalema,
  - type: text
    content: 'ka lazao hoe: Tsofy ao amin’ny tany ny anjomara!'
  - type: text
    content: 'Miantsoantsoa mafy ka lazao hoe:'
  - type: text
    content: Mivoria ianareo, ary andeha isika hiditra amin’ny tanàna mimanda!
  '6':
  - type: text
    content: 'Manangàna faneva manandrify an’i '
  - type: text
    content: Ziona
  - type: text
    content: ;
  - type: text
    content: mandosira haingana, aza mijanona;
  - type: text
    content: fa Izaho hahatonga loza avy any avaratra,
  - type: text
    content: dia fandringanana be.
  '7':
  - type: text
    content: Misy liona miakatra avy any anaty kirihitrala,
  - type: text
    content: ary ilay mpanimba ny firenena dia efa miainga,
  - type: text
    content: efa mivoaka avy amin’ny fitoerany
  - type: text
    content: hahafoana ny taninao
  - type: text
    content: ary hahalao ny tanànanao,
  - type: text
    content: ka tsy hisy mponina.
  '8':
  - type: text
    content: Ary noho izany dia misikìna lamba fisaonana ianareo
  - type: text
    content: ka mitomania sy midradradradrà;
  - type: text
    content: fa tsy afaka amintsika ny firehetan’ny fahatezeran’NY TOMPO.
  '9':
  - type: text
    content: Ary amin’izany andro izany,
  - type: text
    content: hoy NY TOMPO,
  - type: text
    content: dia ho very hevitra ny mpanjaka sy ny lehibe,
  - type: text
    content: ho kepoka ny mpisorona
  - type: text
    content: ary ho gaga ny mpaminany.
