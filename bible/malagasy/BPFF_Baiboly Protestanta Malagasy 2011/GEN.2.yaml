document_id: GEN.2,3103
type_code: plt
verses:
  '1':
  - type: text
    content: 'Dia vita ny lanitra sy ny tany ary izay rehetra ao aminy. '
  '10':
  - type: text
    content: 'Dia nisy ony nivoaka avy tao Edena hanondraka ny saha; hatreo izy dia nizara ka nisampana efatra. '
  '11':
  - type: text
    content: 'Ny anaran’ny voalohany dia Pisona; io no mandeha mihodidina ny tany Havila manontolo, izay misy volamena; '
  '12':
  - type: text
    content: 'ary tsara ny volamena tamin’izany tany izany. Any koa ny bedola sy ny vato berila. '
  '13':
  - type: text
    content: 'Ny anaran’ny ony faharoa dia Gihona; io no mandeha mihodidina ny tany Kosy manontolo. '
  '14':
  - type: text
    content: Ny anaran’ny ony fahatelo dia Hidekela; io no mankany atsinanan’i Asiria. Ary ny ony fahefatra dia Eofrata.
  '15':
  - type: text
    content: 'Ary NY TOMPO Andriamanitra naka an-dRalehilahy ka namponina azy tao amin’ny saha Edena mba hiasa sy hitandrina azy. '
  '16':
  - type: text
    content: 'Ary NY TOMPO Andriamanitra nandidy an-dRalehilahy hoe: Ny hazo rehetra ao amin’ny saha dia tena azonao ihinanana tsara; '
  '17':
  - type: text
    content: 'fa ny hazo fahalalana ny tsara sy ny ratsy kosa dia aza ihinananao, fa amin’ny andro izay ihinananao avy aminy dia ho faty tokoa ianao. '
  '18':
  - type: text
    content: 'Ary NY TOMPO Andriamanitra niteny hoe: Tsy tsara raha irery Ralehilahy; hanaovako vady sahaza azy'
  - type: note
    content: Heb. Mpanampy mifanatrika aminy.
  - type: text
    content: ' izy. '
  '19':
  - type: text
    content: 'Ary vovo-tany no namolavolan’NY TOMPO Andriamanitra ny biby rehetra sy ny voromanidina rehetra. Dia noentiny tany amin-dRalehilahy ireny mba hahitany izay anarana hiantsoany azy avy; koa izay rehetra niantsoan-dRalehilahy ny zavamananaina rehetra dia izany no anarany. '
  '2':
  - type: text
    content: 'Tamin’ny andro fahafito no vitan’Andriamanitra ny asa nataony; ary nitsahatra tamin’ny asany rehetra izay nataony Izy tamin’ny andro fahafito. '
  '20':
  - type: text
    content: 'Dia nomen-dRalehilahy anarana ny biby fiompy rehetra sy ny voromanidina mbamin’ny bibidia rehetra, nefa tsy hita izay mpanampy tandrify ho an-dRalehilahy. '
  '21':
  - type: text
    content: 'Ary NY TOMPO Andriamanitra nahasondrian-tory an-dRalehilahy ka natory izy; dia naka iray avy tamin’ireo taolan-tehezany NY TOMPO Andriamanitra ka nanakombona nofo ho solon’izany. '
  '22':
  - type: text
    content: 'Ary ilay taolan-tehezana izay nalainy tamin-dRalehilahy dia namboariny ho vehivavy ka noentiny nankany amin-dRalehilahy. '
  '23':
  - type: text
    content: 'Dia hoy Ralehilahy:'
  - type: text
    content: Ankehitriny dia taolana avy amin’ny taolako
  - type: text
    content: sy nofo avy amin’ny nofoko ity;
  - type: text
    content: ity dia hatao hoe vehivavy,
  - type: text
    content: satria lehilahy no nakana azy.
  '24':
  - type: text
    content: Noho izany dia handao ny rainy sy ny reniny ny lehilahy ka hikambana amin’ny vadiny dia ho nofo iray ihany izy roa.
  '25':
  - type: text
    content: Ary nitanjaka izy mivady, dia Ralehilahy sy ny vadiny, nefa tsy nahalala henatra izy ireo.
  '3':
  - type: text
    content: Ary Andriamanitra nitahy ny andro fahafito sy nanamasina azy, satria tamin’izay no nitsaharan’Andriamanitra tamin’ny asany rehetra izay noforoniny tamin’ny nanaovany azy.
  - type: heading
    content: Ny saha tao Edena
  '4':
  - type: text
    content: 'Toy izao no tantaran’ny lanitra sy ny tany tamin’ny nahariana azy, dia tamin’ny andro nanaovan’NY TOMPO Andriamanitra ny tany sy ny lanitra: '
  '5':
  - type: text
    content: 'Ny hazo madinika maniry eny an-tsaha dia tsy mbola nisy teo amin’ny tany, ny zava-maitso eny an-tsaha koa dia tsy mbola nisy naniry; fa tsy mbola nampilatsaka ranonorana teto ambonin’ny tany NY TOMPO Andriamanitra sady tsy mbola nisy olona hiasa ny tany. '
  '6':
  - type: text
    content: 'Nefa nisy loharano niakatra avy tao amin’ny tany ka nandena ny velaran’ny tany manontolo. '
  '7':
  - type: text
    content: 'Ary vovo-tany no namolavolan’NY TOMPO Andriamanitra ny olona, dia nitsofany ny fofonaina mahavelona tamin’ny vavorony ka tonga manana aina ilay olona. '
  '8':
  - type: text
    content: 'Ary NY TOMPO Andriamanitra namboly saha tao Edena tany atsinanana ka napetrany tao Ralehilahy izay novolavolainy. '
  '9':
  - type: text
    content: 'Ary nampanirin’NY TOMPO Andriamanitra teo amin’ny tany ny hazo rehetra izay mahafinaritra ny maso sady maha te hihinana, ny hazon’aina teo afovoan’ny saha sy ny hazo fahalalana ny tsara sy ny ratsy. '
