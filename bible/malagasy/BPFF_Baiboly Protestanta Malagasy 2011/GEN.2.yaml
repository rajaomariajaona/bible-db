document_id: GEN.2,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Dia vita ny lanitra sy ny tany ary izay rehetra ao aminy. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Dia nisy ony nivoaka avy tao Edena hanondraka ny saha; hatreo izy dia nizara ka nisampana efatra. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ny anaran’ny voalohany dia Pisona; io no mandeha mihodidina ny tany Havila manontolo, izay misy volamena; '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'ary tsara ny volamena tamin’izany tany izany. Any koa ny bedola sy ny vato berila. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ny anaran’ny ony faharoa dia Gihona; io no mandeha mihodidina ny tany Kosy manontolo. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Ny anaran’ny ony fahatelo dia Hidekela; io no mankany atsinanan’i Asiria. Ary ny ony fahefatra dia Eofrata.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Ary NY TOMPO Andriamanitra naka an-dRalehilahy ka namponina azy tao amin’ny saha Edena mba hiasa sy hitandrina azy. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Ary NY TOMPO Andriamanitra nandidy an-dRalehilahy hoe: Ny hazo rehetra ao amin’ny saha dia tena azonao ihinanana tsara; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'fa ny hazo fahalalana ny tsara sy ny ratsy kosa dia aza ihinananao, fa amin’ny andro izay ihinananao avy aminy dia ho faty tokoa ianao. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Ary NY TOMPO Andriamanitra niteny hoe: Tsy tsara raha irery Ralehilahy; hanaovako vady sahaza azy'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.18 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Mpanampy mifanatrika aminy.
      marker-yv: yv-n
    - type: text
      text: ' izy. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Ary vovo-tany no namolavolan’NY TOMPO Andriamanitra ny biby rehetra sy ny voromanidina rehetra. Dia noentiny tany amin-dRalehilahy ireny mba hahitany izay anarana hiantsoany azy avy; koa izay rehetra niantsoan-dRalehilahy ny zavamananaina rehetra dia izany no anarany. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Tamin’ny andro fahafito no vitan’Andriamanitra ny asa nataony; ary nitsahatra tamin’ny asany rehetra izay nataony Izy tamin’ny andro fahafito. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Dia nomen-dRalehilahy anarana ny biby fiompy rehetra sy ny voromanidina mbamin’ny bibidia rehetra, nefa tsy hita izay mpanampy tandrify ho an-dRalehilahy. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Ary NY TOMPO Andriamanitra nahasondrian-tory an-dRalehilahy ka natory izy; dia naka iray avy tamin’ireo taolan-tehezany NY TOMPO Andriamanitra ka nanakombona nofo ho solon’izany. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Ary ilay taolan-tehezana izay nalainy tamin-dRalehilahy dia namboariny ho vehivavy ka noentiny nankany amin-dRalehilahy. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Dia hoy Ralehilahy:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ankehitriny dia taolana avy amin’ny taolako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy nofo avy amin’ny nofoko ity;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ity dia hatao hoe vehivavy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria lehilahy no nakana azy.
  '24':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Noho izany dia handao ny rainy sy ny reniny ny lehilahy ka hikambana amin’ny vadiny dia ho nofo iray ihany izy roa.
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Ary nitanjaka izy mivady, dia Ralehilahy sy ny vadiny, nefa tsy nahalala henatra izy ireo.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Ary Andriamanitra nitahy ny andro fahafito sy nanamasina azy, satria tamin’izay no nitsaharan’Andriamanitra tamin’ny asany rehetra izay noforoniny tamin’ny nanaovany azy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny saha tao Edena
    marker-yv: yv-h
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Toy izao no tantaran’ny lanitra sy ny tany tamin’ny nahariana azy, dia tamin’ny andro nanaovan’NY TOMPO Andriamanitra ny tany sy ny lanitra: '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ny hazo madinika maniry eny an-tsaha dia tsy mbola nisy teo amin’ny tany, ny zava-maitso eny an-tsaha koa dia tsy mbola nisy naniry; fa tsy mbola nampilatsaka ranonorana teto ambonin’ny tany NY TOMPO Andriamanitra sady tsy mbola nisy olona hiasa ny tany. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Nefa nisy loharano niakatra avy tao amin’ny tany ka nandena ny velaran’ny tany manontolo. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ary vovo-tany no namolavolan’NY TOMPO Andriamanitra ny olona, dia nitsofany ny fofonaina mahavelona tamin’ny vavorony ka tonga manana aina ilay olona. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Ary NY TOMPO Andriamanitra namboly saha tao Edena tany atsinanana ka napetrany tao Ralehilahy izay novolavolainy. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ary nampanirin’NY TOMPO Andriamanitra teo amin’ny tany ny hazo rehetra izay mahafinaritra ny maso sady maha te hihinana, ny hazon’aina teo afovoan’ny saha sy ny hazo fahalalana ny tsara sy ny ratsy. '
