document_id: NUM.30,3103
type_code: plt
verses:
  '1':
  - type: text
    content: Dia nolazain’i Mosesy tamin’ny Zanak’Israely izany, araka izay rehetra efa nandidian’NY TOMPO azy.
  - type: heading
    content: Lalàna ny amin’ny voady
  '10':
  - type: text
    content: 'Fa ny amin’ny voadin’ny vehivavy maty vady na ny efa nisaorana kosa dia manan-kery izay rehetra namehezany tena. '
  '11':
  - type: text
    content: 'Raha misy vehivavy manambady kosa ka mivoady na mianiana mamehy tena tamin’ny voady '
  '12':
  - type: text
    content: 'ka mandre ny vadiny, nefa tsy miteny azy na mandrara azy, dia manan-kery ny voadiny na izay rehetra namehezany tena. '
  '13':
  - type: text
    content: 'Fa raha manafoana izany kosa ny vadiny amin’ny andro andrenesany azy miteny dia tsy manan-kery izay rehetra naloaky ny vavany ho voadiny na ho famehezany tena; ny vadiny no manafoana izany ary NY TOMPO hamela ny helony. '
  '14':
  - type: text
    content: 'Ny voady rehetra sy ny fianianana rehetra amehezany tena hampahory ny tenany dia ny lahy ihany no hampanan-kery azy na hanafoana azy. '
  '15':
  - type: text
    content: 'Fa raha tsy miteny azy hatramin’ny ampitson’iny ny lahy dia mampanan-kery ny voadin-dRavehivavy rehetra izy na izay rehetra namehezany tena; mampanan-kery ireny izy satria tsy niteny azy tamin’ny andro nandrenesany azy nivoady. '
  '16':
  - type: text
    content: Fa raha manao izay hahafoana izany izy aorianan’ny nandrenesany azy dia izy no hitondra ny heloky ny vavy.
  '17':
  - type: text
    content: Ireo no fitsipika nandidian’NY TOMPO an’i Mosesy ny amin’ny lehilahy sy ny vadiny ary ny amin’ny ray sy ny zanany vavy, raha mbola zaza ao an-tranon’ny rainy Razazavavy.
  '2':
  - type: text
    content: 'Ary niteny tamin’ireo lohan’ny fokon’ny Zanak’Israely i Mosesy hoe: Izao no teny izay nandidian’NY TOMPO: '
  '3':
  - type: text
    content: Raha misy lehilahy mifehy tena amin’ny voady amin’NY TOMPO dia tsy hamadika ny teny nataony izy fa araka izay rehetra naloaky ny vavany no hataony.
  '4':
  - type: text
    content: 'Raha misy indray vehivavy mifehy tena amin’ny voady amin’NY TOMPO, raha mbola zaza ao an-tranon’ny rainy izy '
  '5':
  - type: text
    content: 'ka ren’ilay rainy ny voadiny sy ny namehezany tena hifady, nefa tsy niteny azy rainy, dia manan-kery ny voadiny sy izay fatotra namehezany tena, na inona na inona izany. '
  '6':
  - type: text
    content: Fa raha nandrara azy ny rainy tamin’ny andro nandrenesany dia tsy manan-kery ny voadiny na izay namehezany tena; ary NY TOMPO hamela ny helony satria nandrara azy ny rainy.
  '7':
  - type: text
    content: 'Raha manambady izy ka misy voady efa nataony na misy teniteny foana nataon’ny molony ka namehezany ny tenany, '
  '8':
  - type: text
    content: 'raha nandre izany ny lahy, nefa tsy niteny azy tamin’ny andro nandrenesany, dia manan-kery ny voadiny sy izay namehezany ny tenany. '
  '9':
  - type: text
    content: 'Fa raha nandrara azy ny vadiny tamin’ny andro nandrenesany azy niteny dia hofoanan-dRalehilahy ny voady izay noteneniny sy izay teniteny foana naloaky ny vavany ka namehezany tena; ary NY TOMPO hamela ny helony. '
