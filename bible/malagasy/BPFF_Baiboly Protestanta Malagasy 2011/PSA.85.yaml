document_id: PSA.85
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Milaza fiadanana amin’ny olony NY TOMPO
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: Ho an’ny mpiventy hira. Salamo nataon’ny Koraìta.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: TOMPO ô, efa naneho fitia tamin’ny taninao Ianao!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Efa nampodianao avy tamin’ny fahababoany i Jakoba;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: voaesotrao ny heloky ny olonao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'voasaronao ny fahotany rehetra. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Fiatoana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Efa nampijanona ny fahatezeranao rehetra Ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary niala tamin’ny fahatezeranao mirehitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Miverena aminay, ry Andriamanitry ny famonjena anay ô!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary mialà amin’ny fahatezeranao aminay!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ho tezitra aminay mandrakizay va Ianao?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hampaharetinao hahatratra ny taranaka fara aman-dimby va ny fahatezeranao?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Tsy hovelominao indray va izahay
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hifalian’ny olonao Aminao?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Asehoy anay ny famindramponao, TOMPO ô,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka omeo anay ny famonjenao!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Hihaino izay holazain’NY TOMPO Andriamanitra aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa milaza fiadanana amin’ny olony Izy, dia amin’ny olony masina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: koa aoka tsy hiverina ho ao amin’ny fahadalana ireo!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Eny tokoa, akaikin’izay matahotra Azy ny famonjeny
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hitoeran’ny voninahitra eo amin’ny tanintsika.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Mihaona ny famindrampo sy ny fahamarinana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mifanoroka ny rariny sy ny fihavanana;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: mitsimoka amin’ny tany ny fahamarinana
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny rariny dia mitsinjo avy eny an-danitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Eny, NY TOMPO hanome ny tsara,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hahavoka-javatra ny tanintsika.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ny rariny no hialoha Azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady hizotra hanaraka ny diany eny an-dalana.
