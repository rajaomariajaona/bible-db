document_id: PSA.85,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Milaza fiadanana amin’ny olony NY TOMPO
  - type: text
    content: Ho an’ny mpiventy hira. Salamo nataon’ny Koraìta.
  - type: text
    content: TOMPO ô, efa naneho fitia tamin’ny taninao Ianao!
  - type: text
    content: Efa nampodianao avy tamin’ny fahababoany i Jakoba;
  '10':
  - type: text
    content: Mihaona ny famindrampo sy ny fahamarinana;
  - type: text
    content: mifanoroka ny rariny sy ny fihavanana;
  '11':
  - type: text
    content: mitsimoka amin’ny tany ny fahamarinana
  - type: text
    content: ary ny rariny dia mitsinjo avy eny an-danitra.
  '12':
  - type: text
    content: Eny, NY TOMPO hanome ny tsara,
  - type: text
    content: ary hahavoka-javatra ny tanintsika.
  '13':
  - type: text
    content: Ny rariny no hialoha Azy
  - type: text
    content: sady hizotra hanaraka ny diany eny an-dalana.
  '2':
  - type: text
    content: voaesotrao ny heloky ny olonao,
  - type: text
    content: 'voasaronao ny fahotany rehetra. '
  - type: text
    content: Fiatoana.
  '3':
  - type: text
    content: Efa nampijanona ny fahatezeranao rehetra Ianao
  - type: text
    content: ary niala tamin’ny fahatezeranao mirehitra.
  '4':
  - type: text
    content: Miverena aminay, ry Andriamanitry ny famonjena anay ô!
  - type: text
    content: Ary mialà amin’ny fahatezeranao aminay!
  '5':
  - type: text
    content: Ho tezitra aminay mandrakizay va Ianao?
  - type: text
    content: Hampaharetinao hahatratra ny taranaka fara aman-dimby va ny fahatezeranao?
  '6':
  - type: text
    content: Tsy hovelominao indray va izahay
  - type: text
    content: mba hifalian’ny olonao Aminao?
  '7':
  - type: text
    content: Asehoy anay ny famindramponao, TOMPO ô,
  - type: text
    content: ka omeo anay ny famonjenao!
  '8':
  - type: text
    content: Hihaino izay holazain’NY TOMPO Andriamanitra aho;
  - type: text
    content: fa milaza fiadanana amin’ny olony Izy, dia amin’ny olony masina;
  - type: text
    content: koa aoka tsy hiverina ho ao amin’ny fahadalana ireo!
  '9':
  - type: text
    content: Eny tokoa, akaikin’izay matahotra Azy ny famonjeny
  - type: text
    content: mba hitoeran’ny voninahitra eo amin’ny tanintsika.
