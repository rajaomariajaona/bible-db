document_id: 1KI.21,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Nanao an-keriny ny tanim-boalobok’i Nabota i Ahaba sy i Jezebela
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Taorianan’izay dia izao no zava-nitranga: I Nabota jezirelita dia nanana tanim-boaloboka tao Jezirela, akaikin’ny lapan’i Ahaba, mpanjakan’i Samaria. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Dia asio roa lahy izay tena ratsy fanahy mipetraka manatrika azy sady hiampanga azy hoe: Niteny ratsy an’Andriamanitra sy ny mpanjaka ianao! Dia ento miala teo izy ka torahy vato ho faty.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ary ny olona tao an-tanànany, dia ny loholona sy ny manankaja izay nonina tao, nanatanteraka izay nanirahan’i Jezebela tany aminy, dia izay voasoratra tao amin’ireo taratasy nampitondrainy tany aminy. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Niantso andro fifadian-kanina tokoa izy ireo ka nametraka an’i Nabota teny aloha teo amin’ny vahoaka. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ary niditra ireo roalahy tena ratsy fanahy ka nipetraka nanatrika azy, dia niampanga an’i Nabota ireo ka niteny hoe: Niteny ratsy an’Andriamanitra sy ny mpanjaka i Nabota! Dia noentin’ny olona nivoaka teny ivelan’ny tanàna i Nabota dia notorahiny vato ka maty. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Dia nandefa iraka tany amin’i Jezebela izy ireo hilaza hoe: Efa voatora-bato i Nabota ka maty.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Rehefa ren’i Jezebela fa voatora-bato i Nabota ka maty dia hoy izy tamin’i Ahaba: Mitsangàna ka raiso ho anao ny tanim-boalobok’i Nabota jezirelita izay tsy foiny ho namidy taminao; fa tsy velona intsony i Nabota fa efa maty. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Rehefa ren’i Ahaba fa efa maty i Nabota dia niainga izy ka nidina nankany amin’ny tanim-boalobok’i Nabota jezirelita mba handray ny tany ho fananany.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ambaran’i Elia ny famaizana an’i Ahaba sy i Jezebela
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Ary tonga tamin’i Elia tisbita ny tenin’NY TOMPO hoe: '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Miaingà ka midìna hihaona amin’i Ahaba, mpanjakan’ny Israely, izay ao Samaria; indro, ao amin’ny tanim-boalobok’i Nabota izy, fa lasa nankao izy mba handray ny tany ho fananany. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Koa mitenena aminy hoe: Izao no lazain’NY TOMPO: Efa namono va ianao ka mbola haka ho anao koa? Ary hiteny aminy ianao hoe: Izao no lazain’NY TOMPO: Eo amin’ny tany izay nilelafan’ny alika ny ran’i Nabota no hilelafan’ny alika ny ranao, dia ny anao indrindra. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Ary niteny tamin’i Nabota i Ahaba hoe: Omeo ahy ny tanim-boalobokao mba hataoko fambolena anana, fa akaikin’ny lapako izy io. Hatakaloko tanim-boaloboka tsara noho io, na vola izay tokony ho vidin’io, raha izany no sitraky ny fonao. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Hoy i Ahaba tamin’i Elia: Azonao va aho, ry ilay fahavaloko? Ary hoy i Elia: Azoko ianao, satria ianao dia efa nivaro-tena hanao izay ratsy eo imason’NY TOMPO. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Indro, hahatonga loza aminao Aho ka handringana ny taranakao, ary ho fongotra ny lehilahy rehetra amin’ny taranak’i Ahaba, na ny gadra, na ny olona afaka amin’ny Israely. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Ary ny taranakao dia hataoko tahaka ny taranak’i Jeroboama, zanak’i Nebata, sy tahaka ny taranak’i Basa, zanak’i Ahia, noho ny nampirehetanao ny fahatezerako sy ny nampanotanao ny Israely. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Ary ny amin’i Jezebela koa dia nolazain’NY TOMPO hoe: Ny alika no hihinana an’i Jezebela eny ivelan’ny mandan’i Jezirela. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Izay tamingan’i Ahaba maty ao an-tanàna dia hohanin’ny alika; ary izay tamingany maty any an-tsaha kosa dia hohanin’ny voromanidina.
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Fa tsy nisy tahaka an’i Ahaba, izay nivaro-tena hanao izay ratsy eo imason’NY TOMPO, satria nampirisihin’i Jezebela vadiny. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Ary be ny fahavetavetana nataony tamin’ny nanarahany ny sampy, dia tahaka izay rehetra nataon’ny Amorita, izay noroahin’NY TOMPO teo anoloan’ny Zanak’Israely.
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Rehefa ren’i Ahaba izany teny izany dia nandriatra ny fitafiany izy ka nitafy lamba fisaonana nataony manolo-koditra sady nifady hanina sy nandry tamin’ny lamba fisaonana ary nijoretra teny am-pandehanana. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Ary tonga tamin’i Elia tisbita ny tenin’NY TOMPO hoe: '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Hitanao va ny nanetren’i Ahaba tena teo anatrehako? Satria nanetry tena teo anatrehako izy dia tsy hahatonga loza aminy Aho amin’ny androny; fa any amin’ny andron’ny zanany Aho vao hahatonga loza amin’ny taranany.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Hoy anefa i Nabota tamin’i Ahaba: Sanatria amiko eo anatrehan’NY TOMPO izany! Tsy homeko anao ny tanindrazako! '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ary nankany an-tranony i Ahaba, sady maloka tarehy no sosotra noho ny teny nolazain’i Nabota jezirelita taminy hoe: Tsy homeko anao ny tanindrazako! Dia nandry teo am-parafarany izy ka nanodina ny tavany ary tsy nety nihinan-kanina. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ary nankeo aminy i Jezebela vadiny ka niteny taminy hoe: Inona no mampahasosotra anao toy izao no tsy mety mihinan-kanina ianao? '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Hoy izy taminy: Satria niteny tamin’i Nabota jezirelita aho hoe: Omeo ahy ny tanim-boalobokao hovidiko vola na hatakaloko tanim-boaloboka hafa, raha izany no sitraky ny fonao. Nefa hoy izy tamiko: Tsy homeko anao ny tanim-boaloboko! '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Dia hoy i Jezebela vadiny taminy: Moa ianao tokoa va no manjaka amin’ny Israely? Miarena, mihinàna hanina ary aoka ho ravoravo ny fonao! Izaho no hanome anao ny tanim-boalobok’i Nabota jezirelita!'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Ary nanoratra taratasy maromaro tamin’ny anaran’i Ahaba i Jezebela ka notombohiny tamin’ny fitombo-kasen’ny mpanjaka. Avy eo ireo taratasy ireo dia nampitondrainy ho any amin’ny loholona sy ny manankaja tao an-tanànany, dia ireo niara-monina tamin’i Nabota. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Izao no nosoratany tao amin’ireo taratasy: Miantsoa andro fifadian-kanina, ary asaivo mipetraka eny aloha eo amin’ny vahoaka i Nabota. '
