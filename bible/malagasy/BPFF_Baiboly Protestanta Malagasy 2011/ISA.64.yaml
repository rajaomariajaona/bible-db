    children:
    - type: text
      text: '1'
  - type: text
    text: dia tahaka ny fandevon’ny afo ny tapa-kazo maina
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny fampangotraky ny afo ny rano;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba ho fampahafantarana ny fahavalonao ny anaranao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hangovitra eo anoloanao ny Jentilisa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Raha nanao zava-mahatahotra izay tsy nantenainay Ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia nidina ka niempo teo anoloanao ny tendrombohitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Fa hatrizay hatrizay dia tsy mbola nisy nandre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: na naheno,
- type: usfm
  marker: q1
  children:
  - type: text
    text: na nahita maso,
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay Andriamanitra miasa ho an’ny miandry Azy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: afa-tsy Ianao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Mitsena
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay mifaly hanao ny marina Ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia izay mahatsiaro Anao amin’ny lalanao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Indro, tezitra Ianao, ary hita fa meloka izahay;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa tamin’ireo lalana fahiny no namonjena anay.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Fa samy tahaka ny olo-maloto izahay rehetra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tahaka ny lamba mihosin-dra ny fahamarinanay rehetra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: malazo tahaka ny ravina izahay rehetra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mipaoka anay tahaka ny rivotra ny helokay.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Tsy misy olona miantso ny anaranao
- type: usfm
  marker: q1
  children:
  - type: text
    text: na mifoha hifikitra Aminao.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa efa nanafina ny tavanao taminay Ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka nandevona anay
- type: usfm
  marker: q1
  children:
  - type: text
    text: noho ny helokay.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Nefa ankehitriny TOMPO ô, Rainay Ianao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: izahay dia tanimanga,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary Ianao no mpanefy anay.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Asan’ny tananao izahay rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Aza dia tezitra mafy loatra TOMPO ô,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary aza dia mahatsiaro heloka mandrakizay;
- type: usfm
  marker: q1
  children:
  - type: text
    text: miangavy Anao izahay, tsinjovy, fa olonao izahay rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Tonga tany efitra ireo tanànanao masina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'eny, tonga tany efitra i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Ziona
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary lao i Jerosalema.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ny tranonay masina sady mendrika,
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay nideran’ny razanay Anao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia voadoron’ny afo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary rava ny zavatray sarobidy rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Koa mbola mahatsindry fo amin’izany zavatra izany ihany va Ianao, TOMPO ô?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hangina va Ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hampahory anay mafy loatra?
