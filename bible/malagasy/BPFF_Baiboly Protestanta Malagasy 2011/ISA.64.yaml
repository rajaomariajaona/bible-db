document_id: ISA.64,3103
type_code: plt
verses:
  '1':
  - type: text
    content: dia tahaka ny fandevon’ny afo ny tapa-kazo maina
  - type: text
    content: sy ny fampangotraky ny afo ny rano;
  - type: text
    content: mba ho fampahafantarana ny fahavalonao ny anaranao
  - type: text
    content: ka hangovitra eo anoloanao ny Jentilisa.
  '10':
  - type: text
    content: Ny tranonay masina sady mendrika,
  - type: text
    content: izay nideran’ny razanay Anao,
  - type: text
    content: dia voadoron’ny afo,
  - type: text
    content: ary rava ny zavatray sarobidy rehetra.
  '11':
  - type: text
    content: Koa mbola mahatsindry fo amin’izany zavatra izany ihany va Ianao, TOMPO ô?
  - type: text
    content: Hangina va Ianao
  - type: text
    content: ka hampahory anay mafy loatra?
  '2':
  - type: text
    content: Raha nanao zava-mahatahotra izay tsy nantenainay Ianao
  - type: text
    content: dia nidina ka niempo teo anoloanao ny tendrombohitra.
  '3':
  - type: text
    content: Fa hatrizay hatrizay dia tsy mbola nisy nandre,
  - type: text
    content: na naheno,
  - type: text
    content: na nahita maso,
  - type: text
    content: izay Andriamanitra miasa ho an’ny miandry Azy,
  - type: text
    content: afa-tsy Ianao.
  '4':
  - type: text
    content: Mitsena
  - type: text
    content: izay mifaly hanao ny marina Ianao
  - type: text
    content: dia izay mahatsiaro Anao amin’ny lalanao;
  - type: text
    content: Indro, tezitra Ianao, ary hita fa meloka izahay;
  - type: text
    content: fa tamin’ireo lalana fahiny no namonjena anay.
  '5':
  - type: text
    content: Fa samy tahaka ny olo-maloto izahay rehetra,
  - type: text
    content: ary tahaka ny lamba mihosin-dra ny fahamarinanay rehetra;
  - type: text
    content: malazo tahaka ny ravina izahay rehetra
  - type: text
    content: ary mipaoka anay tahaka ny rivotra ny helokay.
  '6':
  - type: text
    content: Tsy misy olona miantso ny anaranao
  - type: text
    content: na mifoha hifikitra Aminao.
  - type: text
    content: Fa efa nanafina ny tavanao taminay Ianao
  - type: text
    content: ka nandevona anay
  - type: text
    content: noho ny helokay.
  '7':
  - type: text
    content: Nefa ankehitriny TOMPO ô, Rainay Ianao;
  - type: text
    content: izahay dia tanimanga,
  - type: text
    content: ary Ianao no mpanefy anay.
  - type: text
    content: Asan’ny tananao izahay rehetra.
  '8':
  - type: text
    content: Aza dia tezitra mafy loatra TOMPO ô,
  - type: text
    content: ary aza dia mahatsiaro heloka mandrakizay;
  - type: text
    content: miangavy Anao izahay, tsinjovy, fa olonao izahay rehetra.
  '9':
  - type: text
    content: Tonga tany efitra ireo tanànanao masina;
  - type: text
    content: 'eny, tonga tany efitra i '
  - type: text
    content: Ziona
  - type: text
    content: ary lao i Jerosalema.
