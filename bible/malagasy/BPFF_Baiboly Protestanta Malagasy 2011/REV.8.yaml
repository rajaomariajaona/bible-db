document_id: REV.8,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny tombo-kase fahafito sy ny lovia volamena fandoroana ditin-kazo manitra
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Rehefa novahany ny tombo-kase fahafito dia nangina tokony ho antsasaky ny ora iray ny tany an-danitra.
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nitsoka ny anjely fahatelo dia nisy kintana lehibe mirehitra toy ny fanilo nilatsaka avy tany an-danitra. Latsaka tamin’ny ampahatelon’ny ony sy tamin’ny loharano izany. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny anaran’ilay kintana dia atao hoe Zava-mangidy; tonga mangidy ny ampahatelon’ny rano ary maro ny olona no matin’ny rano satria nangidy izany.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nitsoka ny anjely fahefatra dia nokapohina ny ampahatelon’ny masoandro sy ny ampahatelon’ny volana ary ny ampahatelon’ny kintana, mba ho maizina ny ampahatelony ka tsy hazava ny ampahatelon’ny andro ary ho toy izany koa ny alina.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hitako sy reko, nisy voromahery iray nanidina teny afovoan’ny lanitra, izay niteny tamin’ny feo mahery hoe: Loza, loza, loza no hanjo an’izay monina eny ambonin’ny tany noho ny feon’ny trompetra izay mbola hotsofin’ny anjely telo!'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary hitako ny anjely fito izay mitsangana eo anatrehan’Andriamanitra; nomena trompetra fito ireo.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nisy anjely iray koa tonga ka nitsangana teo ambonin’ny alitara; nitondra lovia volamena fandoroana ditin-kazo manitra izy. Nomena ditin-kazo manitra betsaka izy mba hatolony izany miaraka amin’ny vavaky ny olona masina rehetra eo ambonin’ny alitara volamena fandoroana ditin-kazo manitra, izay eo anoloan’ny sezafiandrianana. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny setroky ny ditin-kazo manitra mbamin’ny vavaky ny olona masina dia niakatra avy eo an-tanan’ny anjely ho eo anatrehan’Andriamanitra. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ny anjely dia nandray ny lovia fandoroana ditin-kazo manitra ary nameno azy tamin’ny afo teo amin’ny alitara ka nanipy izany tamin’ny tany ary nisy kotrokorana, feo, tselatra ary horohoron-tany.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny trompetra enina voalohany
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ny anjely fito izay nanana ny trompetra fito dia niomana hitsoka.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nitsoka ny voalohany, dia nisy havandra sy afo miharoharo ra ka nararaka tamin’ny tany izany; ary may ny ampahatelon’ny tany, may ny ampahatelon’ny hazo, ary may koa ny ahi-maitso rehetra.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nitsoka ny anjely faharoa dia nisy toa tendrombohitra lehibe mirehitra afo natsipy tany an-dranomasina. Tonga ra ny ampahatelon’ny ranomasina '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ka maty ny ampahatelon’ny zavamananaina tao an-dranomasina ary potika ny ampahatelon’ny sambo.
