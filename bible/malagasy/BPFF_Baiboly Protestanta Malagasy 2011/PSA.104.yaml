document_id: PSA.104
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Misaora ny Mpamorona
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Misaora NY TOMPO, ry fanahiko.
- type: usfm
  marker: q1
  children:
  - type: text
    text: RY TOMPO Andriamanitro ô, lehibe indrindra Ianao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: famirapiratana sy voninahitra no itafianao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Mitafy ny mazava tahaka ny mitafy lamba Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mamelatra ny lanitra tahaka ny famelatra tranolay.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Mametraka ny rairain-drihan’ny tranony amin’ny rano Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady manao ny rahona matevina ho kalesiny
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka mandeha amin’ny elatry ny rivotra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Manao ny rivotra ho irany Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny lelafo ho mpanompony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Nanorina ny tany teo ambonin’ny fanorenany Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba tsy hihetsehany mandrakizay doria.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ny rano lalina no nasaronao azy tahaka ny lamba;
- type: usfm
  marker: q1
  children:
  - type: text
    text: nandifotra ny tendrombohitra ny rano.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Noho ny teny mafy nataonao dia nandositra ny tendrombohitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: noho ny feon’ny kotrokoranao dia nirifatra izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Nisondrotra ny tendrombohitra, nietry ny lohasaha,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho any amin’izay namboarinao hitoerany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Efa nasianao fetra tsy hihoarany izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba tsy hiverina hanarona ny tany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Mampandeha loharano ho riaka eny amin’ny lohasaha Izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny anelanelan’ny tendrombohitra no alehan’ireny
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ka isotroan’ny bibidia rehetra
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy analan’ny borikidia ny hetahetany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Eo akaikiny no itoeran’ny voromanidina
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary eo amin’ny rantsan-kazo no anenoany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Manondraka rano ny tendrombohitra avy any amin’ny tranony ambony Izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny vokatry ny asanao no mahavoky ny tany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Mampaniry ahitra ho an’ny biby fiompy
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy anana ambolen’ny olona Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mamoaka hanina avy amin’ny tany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ny divay dia mampifaly ny olona
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka mampamirapiratra ny tavany mihoatra noho ny diloilo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny mofo dia manohana ny ain’ny olona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Voky ny hazon’NY TOMPO,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ny sederan’i Libanona izay namboleny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Eny no anaovan’ny voronkely ny akaniny
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny vano dia eny amin’ny hazo kipreso no anaovany ny tranony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ny tendrombohitra avo dia ho an’ny osidia;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny harambato dia fiarovana ho an’ny hiràka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Nanao ny volana ho famantarana ny fotoana Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mahalala ny filentehany ny masoandro.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Mahatonga haizina Ianao dia tonga ny alina
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka mivezivezy ny biby rehetra any an’ala;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: mierona maniry remby ny liona tanora
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka mitady ny haniny avy amin’Andriamanitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Miposaka ny masoandro dia miverina ireny
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ao an-davany no amitsahany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Fa ny olona kosa dia mivoaka ho any amin’ny raharahany
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny asany mandra-paharivan’ny andro.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Endre ny hamaroan’ny asanao, TOMPO ô!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fahendrena no nanaovanao azy rehetra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: henika ny zavatra nataonao ny tany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Indro ny ranomasina, sady lehibe no malalaka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: any no misy zava-mihetsiketsika tsy tambo isaina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia zavamiaina, na ny kely na ny lehibe.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Any no alehan’ny sambo
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'sy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: leviatana
  - type: text
    text: ' izay noforoninao mba hilalao any.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Ireo rehetra ireo dia miandry Anao
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba homenao ny haniny amin’ny fotoanany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Manome Ianao dia manangona izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: manokatra ny tananao Ianao dia voky ny soa izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Manafina ny tavanao Ianao dia raiki-tahotra izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: alainao indray ny ainy dia maty izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka mody any amin’ny vovoka nanalana azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Maniraka ny Fanahinao Ianao dia ary izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary manavao ny velaran’ny tany Ianao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Ho mandrakizay anie ny voninahitry NY TOMPO;
- type: usfm
  marker: q1
  children:
  - type: text
    text: aoka hifaly amin’ny asany NY TOMPO.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Jereny ny tany dia mihorohoro;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tendren’ny tanany ny tendrombohitra dia midona-tsetroka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Hihira ho an’NY TOMPO aho raha mbola velona koa;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hankalaza an’Andriamanitro aho raha mbola miaina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Ho maminy anie ny fisainako Azy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: izaho no hifaly amin’NY TOMPO.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Ho lany ringana tsy ho etỳ amin’ny tany ny mpanota
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy ho etỳ intsony ny ratsy fanahy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Misaora NY TOMPO, ry fanahiko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: w
    children:
    - type: text
      text: Haleloia
  - type: text
    text: .
