document_id: PSA.104,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Misaora ny Mpamorona
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Misaora NY TOMPO, ry fanahiko.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: RY TOMPO Andriamanitro ô, lehibe indrindra Ianao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: famirapiratana sy voninahitra no itafianao.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mampandeha loharano ho riaka eny amin’ny lohasaha Izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny anelanelan’ny tendrombohitra no alehan’ireny
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka isotroan’ny bibidia rehetra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy analan’ny borikidia ny hetahetany.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eo akaikiny no itoeran’ny voromanidina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary eo amin’ny rantsan-kazo no anenoany.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manondraka rano ny tendrombohitra avy any amin’ny tranony ambony Izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny vokatry ny asanao no mahavoky ny tany.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mampaniry ahitra ho an’ny biby fiompy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy anana ambolen’ny olona Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mamoaka hanina avy amin’ny tany.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny divay dia mampifaly ny olona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka mampamirapiratra ny tavany mihoatra noho ny diloilo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny mofo dia manohana ny ain’ny olona.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voky ny hazon’NY TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ny sederan’i Libanona izay namboleny.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny no anaovan’ny voronkely ny akaniny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny vano dia eny amin’ny hazo kipreso no anaovany ny tranony.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny tendrombohitra avo dia ho an’ny osidia;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny harambato dia fiarovana ho an’ny hiràka.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nanao ny volana ho famantarana ny fotoana Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mahalala ny filentehany ny masoandro.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mitafy ny mazava tahaka ny mitafy lamba Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mamelatra ny lanitra tahaka ny famelatra tranolay.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mahatonga haizina Ianao dia tonga ny alina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka mivezivezy ny biby rehetra any an’ala;
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mierona maniry remby ny liona tanora
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka mitady ny haniny avy amin’Andriamanitra.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miposaka ny masoandro dia miverina ireny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ao an-davany no amitsahany.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny olona kosa dia mivoaka ho any amin’ny raharahany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny asany mandra-paharivan’ny andro.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Endre ny hamaroan’ny asanao, TOMPO ô!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fahendrena no nanaovanao azy rehetra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: henika ny zavatra nataonao ny tany.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro ny ranomasina, sady lehibe no malalaka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: any no misy zava-mihetsiketsika tsy tambo isaina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia zavamiaina, na ny kely na ny lehibe.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Any no alehan’ny sambo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'sy ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: leviatana
    - type: text
      text: ' izay noforoninao mba hilalao any.'
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ireo rehetra ireo dia miandry Anao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba homenao ny haniny amin’ny fotoanany.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manome Ianao dia manangona izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: manokatra ny tananao Ianao dia voky ny soa izy.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manafina ny tavanao Ianao dia raiki-tahotra izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: alainao indray ny ainy dia maty izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka mody any amin’ny vovoka nanalana azy.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mametraka ny rairain-drihan’ny tranony amin’ny rano Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady manao ny rahona matevina ho kalesiny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka mandeha amin’ny elatry ny rivotra.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Maniraka ny Fanahinao Ianao dia ary izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary manavao ny velaran’ny tany Ianao.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho mandrakizay anie ny voninahitry NY TOMPO;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aoka hifaly amin’ny asany NY TOMPO.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jereny ny tany dia mihorohoro;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tendren’ny tanany ny tendrombohitra dia midona-tsetroka.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hihira ho an’NY TOMPO aho raha mbola velona koa;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hankalaza an’Andriamanitro aho raha mbola miaina.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho maminy anie ny fisainako Azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izaho no hifaly amin’NY TOMPO.
  '35':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho lany ringana tsy ho etỳ amin’ny tany ny mpanota
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy ho etỳ intsony ny ratsy fanahy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Misaora NY TOMPO, ry fanahiko.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: w
      children:
      - type: text
        text: Haleloia
    - type: text
      text: .
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manao ny rivotra ho irany Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny lelafo ho mpanompony.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nanorina ny tany teo ambonin’ny fanorenany Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba tsy hihetsehany mandrakizay doria.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny rano lalina no nasaronao azy tahaka ny lamba;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nandifotra ny tendrombohitra ny rano.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Noho ny teny mafy nataonao dia nandositra ny tendrombohitra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: noho ny feon’ny kotrokoranao dia nirifatra izy.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nisondrotra ny tendrombohitra, nietry ny lohasaha,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho any amin’izay namboarinao hitoerany.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Efa nasianao fetra tsy hihoarany izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba tsy hiverina hanarona ny tany.
