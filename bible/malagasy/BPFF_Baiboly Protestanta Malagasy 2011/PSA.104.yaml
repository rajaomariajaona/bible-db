document_id: PSA.104,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Misaora ny Mpamorona
  - type: text
    content: Misaora NY TOMPO, ry fanahiko.
  - type: text
    content: RY TOMPO Andriamanitro ô, lehibe indrindra Ianao;
  - type: text
    content: famirapiratana sy voninahitra no itafianao.
  '10':
  - type: text
    content: Mampandeha loharano ho riaka eny amin’ny lohasaha Izy;
  - type: text
    content: eny anelanelan’ny tendrombohitra no alehan’ireny
  '11':
  - type: text
    content: ka isotroan’ny bibidia rehetra
  - type: text
    content: sy analan’ny borikidia ny hetahetany.
  '12':
  - type: text
    content: Eo akaikiny no itoeran’ny voromanidina
  - type: text
    content: ary eo amin’ny rantsan-kazo no anenoany.
  '13':
  - type: text
    content: Manondraka rano ny tendrombohitra avy any amin’ny tranony ambony Izy;
  - type: text
    content: ny vokatry ny asanao no mahavoky ny tany.
  '14':
  - type: text
    content: Mampaniry ahitra ho an’ny biby fiompy
  - type: text
    content: sy anana ambolen’ny olona Izy
  - type: text
    content: ary mamoaka hanina avy amin’ny tany.
  '15':
  - type: text
    content: Ny divay dia mampifaly ny olona
  - type: text
    content: ka mampamirapiratra ny tavany mihoatra noho ny diloilo
  - type: text
    content: ary ny mofo dia manohana ny ain’ny olona.
  '16':
  - type: text
    content: Voky ny hazon’NY TOMPO,
  - type: text
    content: dia ny sederan’i Libanona izay namboleny.
  '17':
  - type: text
    content: Eny no anaovan’ny voronkely ny akaniny
  - type: text
    content: ary ny vano dia eny amin’ny hazo kipreso no anaovany ny tranony.
  '18':
  - type: text
    content: Ny tendrombohitra avo dia ho an’ny osidia;
  - type: text
    content: ny harambato dia fiarovana ho an’ny hiràka.
  '19':
  - type: text
    content: Nanao ny volana ho famantarana ny fotoana Izy
  - type: text
    content: ary mahalala ny filentehany ny masoandro.
  '2':
  - type: text
    content: Mitafy ny mazava tahaka ny mitafy lamba Izy
  - type: text
    content: ary mamelatra ny lanitra tahaka ny famelatra tranolay.
  '20':
  - type: text
    content: Mahatonga haizina Ianao dia tonga ny alina
  - type: text
    content: ka mivezivezy ny biby rehetra any an’ala;
  '21':
  - type: text
    content: mierona maniry remby ny liona tanora
  - type: text
    content: ka mitady ny haniny avy amin’Andriamanitra.
  '22':
  - type: text
    content: Miposaka ny masoandro dia miverina ireny
  - type: text
    content: ary ao an-davany no amitsahany.
  '23':
  - type: text
    content: Fa ny olona kosa dia mivoaka ho any amin’ny raharahany
  - type: text
    content: sy ny asany mandra-paharivan’ny andro.
  '24':
  - type: text
    content: Endre ny hamaroan’ny asanao, TOMPO ô!
  - type: text
    content: Fahendrena no nanaovanao azy rehetra;
  - type: text
    content: henika ny zavatra nataonao ny tany.
  '25':
  - type: text
    content: Indro ny ranomasina, sady lehibe no malalaka,
  - type: text
    content: any no misy zava-mihetsiketsika tsy tambo isaina,
  - type: text
    content: dia zavamiaina, na ny kely na ny lehibe.
  '26':
  - type: text
    content: Any no alehan’ny sambo
  - type: text
    content: 'sy ny '
  - type: text
    content: leviatana
  - type: text
    content: ' izay noforoninao mba hilalao any.'
  '27':
  - type: text
    content: Ireo rehetra ireo dia miandry Anao
  - type: text
    content: mba homenao ny haniny amin’ny fotoanany.
  '28':
  - type: text
    content: Manome Ianao dia manangona izy;
  - type: text
    content: manokatra ny tananao Ianao dia voky ny soa izy.
  '29':
  - type: text
    content: Manafina ny tavanao Ianao dia raiki-tahotra izy;
  - type: text
    content: alainao indray ny ainy dia maty izy
  - type: text
    content: ka mody any amin’ny vovoka nanalana azy.
  '3':
  - type: text
    content: Mametraka ny rairain-drihan’ny tranony amin’ny rano Izy
  - type: text
    content: sady manao ny rahona matevina ho kalesiny
  - type: text
    content: ka mandeha amin’ny elatry ny rivotra.
  '30':
  - type: text
    content: Maniraka ny Fanahinao Ianao dia ary izy
  - type: text
    content: ary manavao ny velaran’ny tany Ianao.
  '31':
  - type: text
    content: Ho mandrakizay anie ny voninahitry NY TOMPO;
  - type: text
    content: aoka hifaly amin’ny asany NY TOMPO.
  '32':
  - type: text
    content: Jereny ny tany dia mihorohoro;
  - type: text
    content: tendren’ny tanany ny tendrombohitra dia midona-tsetroka.
  '33':
  - type: text
    content: Hihira ho an’NY TOMPO aho raha mbola velona koa;
  - type: text
    content: hankalaza an’Andriamanitro aho raha mbola miaina.
  '34':
  - type: text
    content: Ho maminy anie ny fisainako Azy;
  - type: text
    content: izaho no hifaly amin’NY TOMPO.
  '35':
  - type: text
    content: Ho lany ringana tsy ho etỳ amin’ny tany ny mpanota
  - type: text
    content: ary tsy ho etỳ intsony ny ratsy fanahy.
  - type: text
    content: Misaora NY TOMPO, ry fanahiko.
  - type: text
    content: Haleloia
  - type: text
    content: .
  '4':
  - type: text
    content: Manao ny rivotra ho irany Izy
  - type: text
    content: ary ny lelafo ho mpanompony.
  '5':
  - type: text
    content: Nanorina ny tany teo ambonin’ny fanorenany Izy
  - type: text
    content: mba tsy hihetsehany mandrakizay doria.
  '6':
  - type: text
    content: Ny rano lalina no nasaronao azy tahaka ny lamba;
  - type: text
    content: nandifotra ny tendrombohitra ny rano.
  '7':
  - type: text
    content: Noho ny teny mafy nataonao dia nandositra ny tendrombohitra,
  - type: text
    content: noho ny feon’ny kotrokoranao dia nirifatra izy.
  '8':
  - type: text
    content: Nisondrotra ny tendrombohitra, nietry ny lohasaha,
  - type: text
    content: ho any amin’izay namboarinao hitoerany.
  '9':
  - type: text
    content: Efa nasianao fetra tsy hihoarany izy
  - type: text
    content: mba tsy hiverina hanarona ny tany.
