document_id: JER.28
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: I Jeremia sy ny mpaminany Hanania
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Tamin’izany taona izany ihany, tamin’ny niandohan’ny nanjakan’i Zedekia, mpanjakan’ny Joda, tamin’ny volana fahadimy tamin’ny taona fahefatra, no nitenenan’i Hanania, zanak’i Azora, mpaminany avy tany Gibeona, tamiko tao amin’ny tranon’NY TOMPO, teo anatrehan’ny mpisorona sy ny vahoaka rehetra hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Izao no lazain’Andriamanitra, Tompon’izao rehetra izao, Andriamanitry ny Israely: Efa notapahiko ny ziogan’ny mpanjakan’i Babilona, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'koa ao anatin’ny roa taona no hampodiko ho amin’ity tanàna ity ny fanaka rehetra tao amin’ny tranon’NY TOMPO, izay nalain’i Nebokadnezara, mpanjakan’i Babilona, avy tato amin’ity tanàna ity ka noentiny ho any Babilona; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ary i Jekonia, zanak’i Joiakima, mpanjakan’ny Joda, mbamin’ny Joda voababo rehetra, izay lasa tany Babilona, dia hampodiko ho amin’ity tanàna ity, hoy NY TOMPO; fa hotapahiko ny ziogan’ny mpanjakan’i Babilona.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia hoy i Jeremia mpaminany tamin’i Hanania mpaminany, teo anatrehan’ny mpisorona sy ny vahoaka rehetra izay tao amin’ny tranon’NY TOMPO: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Eny! '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Amena
  - type: text
    text: '! Hoy Jeremia mpaminany; hataon’NY TOMPO anie izany! Hotanterahin’NY TOMPO anie ny teninao izay nolazainao ny amin’ny hampodina ny fanaky ny tranon’NY TOMPO mbamin’ny babo rehetra hiala any Babilona ka hiverina ho amin’ity tanàna ity indray. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Kanefa kosa mba henoinao izao teny izao izay holazaiko eto anatrehanao sy ny vahoaka rehetra: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ny mpaminany izay tany alohako sy tany alohanao hatramin’ny ela dia naminany ady sy loza ary areti-mandringana ho amin’ny tany maro sy ny fanjakana lehibe. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ny amin’ny mpaminany izay maminany fiadanana, raha tanteraka ny teniny, dia ho fantatra ho mpaminany nirahin’NY TOMPO tokoa izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dia nesorin’i Hanania mpaminany ny zioga tamin’ny vozon’i Jeremia mpaminany ka notapahiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary niteny teo anatrehan’ny vahoaka rehetra i Hanania hoe: Izao no lazain’NY TOMPO: Tahaka izao no hanapahako ny ziogan’i Nebokadnezara, mpanjakan’i Babilona, ho afaka amin’ny vozon’ny firenena rehetra ao anatin’ny roa taona. Dia lasa nandeha i Jeremia mpaminany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Nony efa notapahin’i Hanania mpaminany ho afaka tamin’ny vozon’i Jeremia mpaminany ny zioga dia tonga tamin’i Jeremia ny tenin’NY TOMPO nilaza hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Mandehana ka lazao amin’i Hanania hoe: Izao no lazain’NY TOMPO: Zioga hazo no notapahinao, fa zioga vy kosa no hataonao solony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Fa izao no lazain’Andriamanitra, Tompon’izao rehetra izao, Andriamanitry ny Israely: Zioga vy no nataoko tamin’ny vozon’ireto firenena rehetra ireto mba hanompoany an’i Nebokadnezara, mpanjakan’i Babilona ka hanompo azy izy; eny, na dia ny bibidia aza dia nomeko azy koa.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Dia hoy i Jeremia mpaminany tamin’i Hanania mpaminany: Mba henoy, ry Hanania: Tsy naniraka anao NY TOMPO; fa ianao dia mampitoky ity firenena ity amin’ny lainga. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Koa izao no lazain’NY TOMPO: Indro, hesoriko tsy ho amin’ny tany ianao; amin’ity taona ity ihany no hahafatesanao satria fikomiana tamin’NY TOMPO no notorìnao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Dia maty tamin’ny volana fahafito tamin’iny taona iny ihany i Hanania mpaminany.
