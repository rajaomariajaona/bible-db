document_id: JER.27,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Antso ho amin’ny fankatoavana
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin’ny niandohan’ny nanjakan’i Joiakima, zanak’i Josia, mpanjakan’ny Joda, no nahatongavan’izao teny izao tamin’i Jeremia avy tamin’NY TOMPO hoe:'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa lainga no nosaininy aminareo mba hamindrana anareo ho lavitra ny taninareo, dia horoahiko ianareo ka ho ringana. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa izay firenena mampiditra ny vozony eo amin’ny ziogan’ny mpanjakan’i Babilona kosa ka manompo azy dia havelako hitoetra amin’ny taniny ihany, hoy NY TOMPO, ka hiasa izany izy sady honina ao.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary i Zedekia, mpanjakan’ny Joda, koa dia efa nilazako araka izany teny rehetra izany hoe: Ampidiro eo amin’ny ziogan’ny mpanjakan’i Babilona ny vozonareo ka manompoa azy sy ny vahoakany, dia ho velona ianareo. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nahoana no ho fatin’ny sabatra sy ny mosary ary ny areti-mandringana ianareo, dia ianao mbamin’ny vahoakanao, araka ny nolazain’NY TOMPO ny amin’ny firenena izay tsy mety manompo ny mpanjakan’i Babilona? '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa aza mihaino ny tenin’ny mpaminany izay miteny aminareo hoe: Tsy hanompo ny mpanjakan’i Babilona ianareo! Fa lainga no ambaran’ireo aminareo. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa tsy naniraka azy Aho, hoy NY TOMPO, nefa misandoka ho mpaminany amin’ny anarako ihany izy, mba handroahako anareo sy hahalany ringana anareo, dia ianareo sy ny mpaminany izay maminany aminareo.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny mpisorona sy ity firenena rehetra ity dia efa nilazako hoe: Izao no lazain’NY TOMPO: Aza mihaino ny tenin’ny mpaminaninareo izay maminany aminareo hoe: Efa hampodina haingana avy any Babilona izao ny fanaky ny tranon’NY TOMPO! Fa lainga no ambarany aminareo ho faminaniana. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aza mihaino azy, fa manompoa ny mpanjakan’i Babilona, dia ho velona ianareo; fa nahoana no ho rava ity tanàna ity? '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa raha mpaminany tokoa ireo, ary raha ao aminy tokoa ny tenin’NY TOMPO dia aoka hifona amin’Andriamanitra, Tompon’izao rehetra izao, Andriamanitry ny Israely, izy, mba tsy ho lasa ho any Babilona koa ny fanaka sisa ao amin’ny tranon’NY TOMPO sy ao an-tranon’ny mpanjakan’ny Joda sy ato Jerosalema. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa izao no lazain’Andriamanitra, Tompon’izao rehetra izao, ny amin’ny andry sy ny koveta sy ny fitoerana koveta ary ny amin’ny fanaka hafa izay mbola sisa amin’ity tanàna ity, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao no nolazain’NY TOMPO tamiko: Manaova kofehy famatorana sy zioga maromaro ianao ka ataovy eo am-bozonao; '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia izay tsy nalain’i Nebokadnezara, mpanjakan’i Babilona, fony izy nitondra an’i Jekonia, zanak’i Joiakima, mpanjakan’ny Joda, ho babo avy teto Jerosalema ho any Babilona, mbamin’ny manankaja rehetra amin’ny Joda sy Jerosalema, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'eny, izao no lazain’Andriamanitra, Tompon’izao rehetra izao, Andriamanitry ny Israely, ny amin’ny fanaka izay sisa ao amin’ny tranon’NY TOMPO sy ao an-tranon’ny mpanjakan’ny Joda sy ato Jerosalema: '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ho any Babilona no hitondrana ireo sady hitoetra any izy ambara-pahatongan’ny andro hamangiako azy, hoy NY TOMPO, avy eo vao hoentiko miakatra izy ka hampodiko amin’ity tanàna ity.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary ampanatero any amin’ny mpanjakan’i Edoma, any amin’ny mpanjakan’i Moaba, any amin’ny mpanjakan’ny taranak’i Amona, any amin’ny mpanjakan’i Tiro ary any amin’ny mpanjakan’i Sidona izany, hoentin’ireo iraka izay mankaty Jerosalema ho atỳ amin’i Zedekia, mpanjakan’ny Joda; '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary asaivo lazainy amin’ny tompony avy hoe: Izao no lazain’Andriamanitra, Tompon’izao rehetra izao, Andriamanitry ny Israely: Izao no holazainareo amin’ny tomponareo: '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izaho no nanao ny tany sy ny olona ary ny biby izay eo aminy tamin’ny heriko lehibe sy tamin’ny sandriko nitsotra; ary nomeko ho an’izay sitraky ny foko ny tany. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ankehitriny, Izaho no nanolotra ireto tany rehetra ireto ho eo an-tanan’i Nebokadnezara, mpanjakan’i Babilona, mpanompoko; eny, na dia ny bibidia aza dia efa nomeko hanompo azy koa. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny firenena rehetra dia hanompo azy sy ny zanany ary ny zafiny ambara-pahatongan’ny fotoana hamaliana ny tanin’izy io kosa, dia hampanompoin’ny firenena maro sy ny mpanjaka lehibe izy. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izay firenena na fanjakana tsy mety manompo an’i Nebokadnezara, mpanjakan’i Babilona, ary tsy mety mampiditra ny vozony eo amin’ny ziogan’ny mpanjakan’i Babilona, dia hovaliko amin’ny sabatra sy ny mosary ary ny areti-mandringana izany firenena izany, hoy NY TOMPO, ambara-pandringako azy amin’ny tanany. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aza mihaino ny mpaminaninareo ianareo, na ny mpisikidinareo, na ny nofinareo, na ny mpanandronareo, na ny mpilalao odinareo, izay miteny aminareo hoe: Tsy hanompo ny mpanjakan’i Babilona ianareo. '
