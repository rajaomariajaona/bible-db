document_id: 1CH.29,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny zavatra naterin’ny Israely hoenti-manangana ny tempoly
  - type: text
    content: 'Ary hoy i Davida mpanjaka tamin’ny fiangonana rehetra: I Solomona zanako, ilay nofidin’Andriamanitra, dia mbola tanora sy marefo; nefa lehibe ny asa, fa tsy ho an’olona ny lapa fa ho an’NY TOMPO Andriamanitra. '
  '10':
  - type: text
    content: 'Dia nisaotra NY TOMPO teo anatrehan’ny fiangonana rehetra i Davida hoe: Isaorana anie Ianao, RY TOMPO, Andriamanitr’Israely razanay, hatramin’ny taloha indrindra ka ho mandrakizay. '
  '11':
  - type: text
    content: 'Anao, TOMPO ô, ny fahalehibiazana, ny hery, ny voninahitra, ny famirapiratana ary ny fiandrianana, dia izay rehetra any an-danitra sy etỳ an-tany; Anao ny fanjakana, TOMPO ô, ary Anao ny fisandratana ho ambonin’izy rehetra. '
  '12':
  - type: text
    content: Avy aminao ny harena sy ny voninahitra, ary Ianao no manjaka amin’izao rehetra izao; eo an-tananao ny hery sy ny tanjaka ka eo an-tananao koa ny mahalehibe sy ny mampatanjaka izao rehetra izao.
  '13':
  - type: text
    content: 'Koa ankehitriny, ry Andriamanitray ô, misaotra Anao sy midera ny anaranao be voninahitra izahay. '
  '14':
  - type: text
    content: 'Fa zinona moa aho, ary zinona moa ny oloko, no ahazoanay hery hanao fanatitra an-tsitrapo toy izao? Fa avy aminao ny zavatra rehetra, ary avy tamin’ny Anao ihany no nanomezanay Anao. '
  '15':
  - type: text
    content: 'Fa vahiny sy mpivahiny eo anatrehanao izahay tahaka ny razanay rehetra; tahaka ny aloka ny andronay etỳ an-tany ka tsy misy fanantenana. '
  '16':
  - type: text
    content: Ry TOMPO Andriamanitray ô, ireto zavatra rehetra novorinay hanaovana ny trano ho an’ny anaranao masina ireto dia avy tamin’ny tananao, ary Anao rahateo izy rehetra.
  '17':
  - type: text
    content: 'Fantatro, Andriamanitro ô, fa Ianao no mamantatra ny fo ary mankasitraka izay mahitsy. Ary ny amiko, dia tamin’ny hitsim-poko no nazotoako nanatitra ireto zavatra rehetra ireto; ankehitriny, efa hitako tamin’ny fifaliana ny olonao, izay vory eto, mazoto mitondra fanatitra ho Anao. '
  '18':
  - type: text
    content: 'Ry TOMPO, Andriamanitry ny razanay ô, dia i Abrahama sy Isaka ary Israely, mba ampahareto ao am-pon’ny olonao mandrakizay izany fikasan’ny sainy izany ka ampiomany ho Anao ny fony. '
  '19':
  - type: text
    content: Omeo fo marina i Solomona zanako hitandrina ny didinao sy ny teny vavolombelonao ary ny lalànanao ka hanatanteraka izany rehetra izany sady hahavita ny lapa izay efa namoriako fitaovana hanaovana azy.
  - type: heading
    content: Ny nanambaràna ny maha mpanjaka an’i Solomona sy ny nahafatesan’i Davida
  '2':
  - type: text
    content: 'Tamin’ny heriko rehetra no namoriako izay hanaovana ny tranon’Andriamanitro, dia ny volamena hanaovana ny fanaka volamena, ny volafotsy hanaovana ny fanaka volafotsy, ny varahina hanaovana ny fanaka varahina, ny vy hanaovana ny fanaka vy, ny hazo hanaovana ny fanaka hazo, ny vato berila sy ny vato halatsaka an-tranontranony, ny vato alatsaka miloko fotsy somary volomparasy, ny vato misoratsoratra samihafa, ny vatosoa samihafa rehetra ary ny marbra fotsy betsaka. '
  '20':
  - type: text
    content: 'Ary hoy i Davida tamin’ny fiangonana rehetra: Miangavy anareo aho, misaora NY TOMPO Andriamanitrareo! Ary ny fiangonana rehetra dia nisaotra NY TOMPO, Andriamanitry ny razany, sady niondrika ka niankohoka teo anatrehan’NY TOMPO sy ny mpanjaka. '
  '21':
  - type: text
    content: 'Nony ampitson’iny dia namono zavatra hatao fanatitra ho an’NY TOMPO izy sady nanolotra fanatitra dorana manontolo ho an’NY TOMPO, dia vantotra ombilahy arivo sy ondrilahy arivo ary zanak’ondry arivo mbamin’ny fanatitra aidina momba ireo ary fanatitra hafa be dia be ho an’ny Israely rehetra. '
  '22':
  - type: text
    content: 'Nihinana sy nisotro tamin’ny fifaliana be teo anatrehan’NY TOMPO ny olona tamin’izany andro izany. Ary nohamafisiny indray ny maha mpanjaka an’i Solomona, zanak’i Davida, sady nohosorany ho an’NY TOMPO ho mpanapaka, ary i Zadoka kosa ho mpisorona. '
  '23':
  - type: text
    content: 'Dia nipetraka teo amin’ny sezafiandrianan’NY TOMPO ho mpanjaka handimby an’i Davida rainy i Solomona, ary nambinina izy ka nanaiky azy ny Israely rehetra. '
  '24':
  - type: text
    content: 'Ny mpifehy rehetra sy ny lehilahy mahery ary ny zanak’i Davida rehetra koa dia samy nanaiky an’i Solomona mpanjaka. '
  '25':
  - type: text
    content: Ary NY TOMPO nanandratra an’i Solomona ho ambony indrindra teo imason’ny Israely rehetra sady nanome azy ny voninahitry ny fiandrianana mihoatra noho ny mpanjaka rehetra talohany teo amin’ny Israely.
  - type: heading
    content: 1Mpa 2.10-12
  '26':
  - type: text
    content: 'Toy izany no nanjakan’i Davida, zanak’i Jese, tamin’ny Israely rehetra. '
  '27':
  - type: text
    content: 'Ny andro nanjakany tamin’ny Israely dia efapolo taona; tao Hebrona no nanjakany fito taona, ary tany Jerosalema no nanjakany telo amby telopolo taona. '
  '28':
  - type: text
    content: 'Maty izy rehefa tratra antitra sady lava andro niainana, ary be harena sy voninahitra; ary i Solomona zanany no nanjaka nandimby azy. '
  '29':
  - type: text
    content: 'Ny tantaran’i Davida mpanjaka, hatramin’ny voalohany ka hatramin’ny farany, indro, efa voasoratra ao amin’ny bokin’i Samoela mpahita sy ao amin’ny bokin’i Natana mpaminany ary ao amin’ny bokin’i Gada mpahita izany, '
  '3':
  - type: text
    content: 'Koa, noho ny fitiavako ny tranon’Andriamanitro dia omeko ho an’ny tranon’Andriamanitra, ho fanampin’ny zavatra rehetra novoriko hanaovana ny tempoly masina, izay volamena sy volafotsy ananako, '
  '30':
  - type: text
    content: mbamin’ny fotoana nanjakany rehetra sy ny heriny, ary izay rehetra niseho tamin’ny androny ary tamin’ny Israely sy tamin’ny fanjakana rehetra tamin’ny tany.
  '4':
  - type: text
    content: 'dia '
  - type: text
    content: talenta
  - type: text
    content: ' volamena telo arivo, volamena avy any Ofira ary talenta volafotsy voadio fito arivo hapetaka amin’ny rindrin’ny efitrano tsirairay; '
  '5':
  - type: text
    content: ny volamena dia hanaovana ny fanaka volamena, ny volafotsy dia hanaovana ny fanaka volafotsy sy hanaovana ny asa samihafa rehetra izay hataon’ny tanan’ny mpahay taozavatra. Iza ary no mazoto hitondra fanatitra ho an’NY TOMPO anio?
  '6':
  - type: text
    content: 'Dia samy nazoto nanatitra zavatra ny lohan’ny fianakaviana sy ny lehiben’ny fokon’ny Israely ary ny mpifehy arivo sy ny mpifehy zato mbamin’ny mpitandrina ny raharahan’ny mpanjaka '
  '7':
  - type: text
    content: 'ka nanome izay hanaovana ny fanompoana amin’ny tranon’Andriamanitra, dia talenta volamena dimy arivo sy darika iray alina sy talenta volafotsy iray alina sy talenta varahina valo arivo sy iray alina ary talenta vy iray hetsy. '
  '8':
  - type: text
    content: 'Ary izay nanana vatosoa dia nanome azy ho naman’ireo kojakoja ho amin’ny tranon’NY TOMPO, hotahirizin’i Jehiela gersonita. '
  '9':
  - type: text
    content: Dia faly ny vahoaka noho ny fahazotoan’ireo, fa tamin’ny fony manontolo no nahazotoany nanatitra ho an’NY TOMPO; faly dia faly koa i Davida mpanjaka.
  - type: heading
    content: Ny vavaka nataon’i Davida
