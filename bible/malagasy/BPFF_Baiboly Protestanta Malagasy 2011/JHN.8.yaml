document_id: JHN.8,3103
type_code: plt
verses:
  '1':
  - type: text
    content: 'Fa Jesosy kosa nankany amin’ny tendrombohitra Oliva. '
  '10':
  - type: text
    content: 'Rehefa nitraka Jesosy dia hoy Izy taminy; Ravehivavy, aiza ry zareo teo? Tsy nisy nanameloka anao va? '
  '11':
  - type: text
    content: 'Ary hoy izy: Tsy misy, Tompoko. Dia hoy Jesosy: Izaho koa tsy manameloka anao; mandehana, ary amin’izao sisa izao dia aza manota intsony.'
  - type: heading
    content: Ny fahazavan’izao tontolo izao
  '12':
  - type: text
    content: 'Ary Jesosy niteny tamin’ny olona indray hoe: Izaho no fahazavan’izao tontolo izao; izay manaraka Ahy tsy mba handeha amin’ny maizina, fa hanana ny fahazavan’aina.'
  '13':
  - type: text
    content: 'Dia hoy ny '
  - type: text
    content: Fariseo
  - type: text
    content: ' Taminy: Ianao izao dia manambara ny tenanao, koa tsy marina ny fanambaranao. '
  '14':
  - type: text
    content: 'Hoy Jesosy hoe: Na dia manambara ny tenako aza Aho dia marina ny fanambaràko satria fantatro izay niaviako sy izay alehako; fa ianareo kosa dia tsy mahalala izay niaviako na izay alehako. '
  '15':
  - type: text
    content: 'Mitsara araka ny nofo ianareo; Izaho tsy mitsara olona na dia iray akory aza. '
  '16':
  - type: text
    content: 'Ary na dia mitsara aza Aho dia marina ny fitsarako satria tsy irery Aho, fa ao Izaho sy ny Ray izay naniraka Ahy. '
  '17':
  - type: text
    content: 'Fa voasoratra ao amin’ny lalànanareo fa marina ny teny ijoroan’ny olona roa vavolombelona (Deo 19.15). '
  '18':
  - type: text
    content: 'Izaho no manambara ny tenako, ary ny Ray izay naniraka Ahy dia manambara Ahy koa. '
  '19':
  - type: text
    content: 'Dia hoy ireo taminy: Aiza izay Rainao? Dia hoy Jesosy hoe: Samy tsy fantatrareo, na Izaho na ny Raiko; raha nahalala Ahy ianareo dia ho nahalala ny Raiko koa.'
  '2':
  - type: text
    content: Raha vao maraina dia nankao amin’ny tempoly indray Jesosy, ary satria ny vahoaka rehetra nanatona Azy dia nipetraka Izy ka nampianatra azy.
  '20':
  - type: text
    content: Teo akaikin’ny fandatsahan-drakitra izany teny izany no nolazain’i Jesosy, raha nampianatra tao amin’ny tempoly Izy; ary tsy nisy olona nisambotra Azy satria tsy mbola tonga ny fotoanandrony.
  - type: heading
    content: Jesosy, Ilay iraky ny Ray
  '21':
  - type: text
    content: 'Hoy indray Jesosy taminy: Handeha Aho ka hitady Ahy ianareo, ary ho faty amin’ny fahotanareo ianareo; izay halehako dia tsy ho azonareo aleha. '
  '22':
  - type: text
    content: 'Dia hoy ny '
  - type: text
    content: Jiosy
  - type: text
    content: ': Hamono tena va Izy no milaza hoe: Izay alehako dia tsy azonareo aleha? '
  '23':
  - type: text
    content: 'Fa hoy Izy taminy: Ianareo dia avy atỳ ambany; Izaho avy any ambony; ianareo dia avy amin’izao tontolo izao; Izaho tsy mba avy amin’izao tontolo izao; '
  '24':
  - type: text
    content: 'koa izany no nilazako taminareo fa ho faty amin’ny fahotanareo ianareo; satria raha tsy mino ianareo fa Izaho no Izy dia ho faty amin’ny fahotanareo ianareo. '
  '25':
  - type: text
    content: 'Dia hoy ireo taminy: Iza moa Ianao? Hoy Jesosy tamin’izy ireo: Ilay nolazaiko taminareo hatramin’ny voalohany. '
  '26':
  - type: text
    content: 'Manana zavatra maro hilazana sy hitsarana anareo Aho satria marina izay naniraka Ahy; ary izay zavatra reko Taminy no lazaiko amin’izao tontolo izao. '
  '27':
  - type: text
    content: 'Tsy fantany fa ny Ray no nolazainy taminy, '
  '28':
  - type: text
    content: 'koa hoy Jesosy: Rehefa asandratrareo ny '
  - type: text
    content: Zanak’Olona
  - type: text
    content: ' dia ho fantatrareo fa Izaho no Izy, ary tsy manao na inona na inona amin’ny fahefan’ny tenako Aho, fa araka ny nampianarin’ny Raiko Ahy no ilazako izany zavatra izany. '
  '29':
  - type: text
    content: Ary izay naniraka Ahy dia eto Amiko; tsy nandao Ahy ho irery Izy satria Izaho manao izay sitrany mandrakariva.
  '3':
  - type: text
    content: 'Ary nisy vehivavy iray, tratra nijangajanga, noentin’ny mpanoradalàna sy ny '
  - type: text
    content: Fariseo
  - type: text
    content: '; ary rehefa avy napetrany teo afovoany izy '
  '30':
  - type: text
    content: Rehefa nilaza izany teny izany Jesosy dia maro no nino Azy.
  - type: heading
    content: Zanak’i Abrahama sa zanaky ny devoly?
  '31':
  - type: text
    content: 'Dia hoy Jesosy tamin’ny '
  - type: text
    content: Jiosy
  - type: text
    content: ' izay nino Azy: Raha maharitra amin’ny teniko ianareo dia ho mpianatro tokoa; '
  '32':
  - type: text
    content: 'koa ho fantatrareo ny marina ary ny marina no hanafaka anareo tsy ho andevo. '
  '33':
  - type: text
    content: 'Ary ireo dia namaly Azy hoe: Taranak’i Abrahama izahay fa tsy mba andevon’olona hatrizay ela izay; koa nahoana no ataonao hoe: Ho afaka ianareo? '
  '34':
  - type: text
    content: 'Hoy Jesosy hoe: Lazaiko aminareo marina dia marina tokoa fa izay rehetra manota dia andevon’ny ota. '
  '35':
  - type: text
    content: 'Fa ny andevo dia tsy mitoetra ao an-trano mandrakariva; fa ny zanaka no mitoetra ao mandrakariva. '
  '36':
  - type: text
    content: Koa raha ny Zanaka no hahafaka anareo dia ho afaka tokoa ianareo.
  '37':
  - type: text
    content: 'Fantatro ihany fa taranak’i Abrahama ianareo nefa mitady hamono Ahy satria tsy mitombo ao anatinareo ny teniko. '
  '38':
  - type: text
    content: Izay efa hitako tamin’ny Ray no lazaiko, ary ianareo kosa dia manao izay renareo tamin’ny rainareo.
  '39':
  - type: text
    content: 'Dia hoy ireo hoe: I Abrahama no rainay. Hoy Jesosy taminy: Raha zanak’i Abrahama ianareo dia ny asan’i Abrahama no hataonareo. '
  '4':
  - type: text
    content: 'dia hoy ireo Taminy: Mpampianatra ô, ity vehivavy ity dia tratra nijangajanga. '
  '40':
  - type: text
    content: 'Fa ankehitriny ianareo dia mitady hamono Ahy, izay lehilahy nilaza ny marina taminareo, dia izay efa reko tamin’Andriamanitra; tsy mba nanao izany i Abrahama. '
  '41':
  - type: text
    content: Ianareo dia manao ny asan’ny rainareo.
  - type: text
    content: 'Hoy ireo taminy: Tsy mba teraka avy tamin’ny fijangajangana izahay; iray ihany ny Rainay dia Andriamanitra. '
  '42':
  - type: text
    content: 'Hoy Jesosy taminy: Raha Andriamanitra no Rainareo dia ho tia Ahy ianareo satria avy tamin’Andriamanitra no niaviako sy nankanesako atỳ; fa Izaho tsy tonga amin’ny fahefan’ny tenako fa Izy no naniraka Ahy. '
  '43':
  - type: text
    content: 'Nahoana no tsy azonareo ny teniko? Satria tsy afaka mihaino ny teniko ianareo. '
  '44':
  - type: text
    content: 'Ianareo avy tamin’ny '
  - type: text
    content: devoly
  - type: text
    content: ' rainareo, koa izay sitraky ny rainareo no tianareo hatao. Izy dia mpamono olona hatramin’ny taloha, ary tsy nitoetra tamin’ny marina satria tsy misy marina aminy. Raha mandainga izy dia ny azy no lazainy satria mpandainga izy sady rain’ny lainga. '
  '45':
  - type: text
    content: 'Fa satria milaza ny marina Aho dia tsy inoanareo. '
  '46':
  - type: text
    content: 'Iza aminareo moa no hampiseho Ahy ho nanota? Raha ny marina no lazaiko, nahoana ianareo no tsy mino Ahy? '
  '47':
  - type: text
    content: Izay avy amin’Andriamanitra dia mihaino ny tenin’Andriamanitra; izany no tsy ihainoanareo satria tsy mba avy amin’Andriamanitra ianareo.
  - type: heading
    content: Jesosy sy i Abrahama
  '48':
  - type: text
    content: 'Dia namaly Azy ny '
  - type: text
    content: Jiosy
  - type: text
    content: ' hoe: Tsy marina va ny filazanay fa '
  - type: text
    content: Samaritana
  - type: text
    content: ' ianao sady manana '
  - type: text
    content: demonia
  - type: text
    content: '? '
  '49':
  - type: text
    content: 'Fa hoy Jesosy hoe: Tsy manana demonia Aho, fa mankalaza ny Raiko, nefa kosa ianareo dia manala baraka Ahy. '
  '5':
  - type: text
    content: 'Ary ao amin’ny lalàna, i Mosesy dia nandidy antsika fa hotoraham-bato izay vehivavy manao toy izany (Deo 22.22-24); fa ahoana kosa hoy Ianao? '
  '50':
  - type: text
    content: 'Fa Izaho tsy mitady ny voninahitro; misy iray mitady sy mitsara. '
  '51':
  - type: text
    content: 'Lazaiko aminareo marina dia marina tokoa: Raha misy olona mitandrina ny teniko dia tsy mba hahita fahafatesana mandrakizay.'
  '52':
  - type: text
    content: 'Dia hoy ny Jiosy Taminy: Fantatray ankehitriny fa manana demonia Ianao. Efa maty i Abrahama sy ny mpaminany; nefa hoy Ianao: Raha misy olona mitandrina ny teniko dia tsy mba hanandrana fahafatesana mandrakizay izy. '
  '53':
  - type: text
    content: 'Moa Ianao va lehibe noho i Abrahama rainay izay efa maty? Sady efa maty koa ny mpaminany; koa manao Anao ho iza moa Ianao? '
  '54':
  - type: text
    content: 'Dia novalin’i Jesosy hoe: Raha mankalaza ny tenako Aho dia tsinontsinona ny voninahitro; ny Raiko, izay ataonareo fa Andriamanitrareo, Izy no mankalaza Ahy. '
  '55':
  - type: text
    content: 'Tsy fantatrareo Izy fa Izaho no mahalala Azy; ary raha hoy Aho: Tsy fantatro Izy, dia mba mpandainga tahaka anareo koa Aho; nefa mahalala Azy Aho ka mitandrina ny teniny. '
  '56':
  - type: text
    content: 'Miravoravo i Abrahama rainareo hahita ny androko; ary nahita izy ka faly. '
  '57':
  - type: text
    content: 'Dia hoy ny Jiosy taminy: Tsy mbola dimampolo taona akory Ianao izao dia ho efa nahita an’i Abrahama va Ianao? '
  '58':
  - type: text
    content: 'Hoy Jesosy taminy: Lazaiko aminareo marina tokoa: Fony tsy mbola ary i Abrahama dia efa Izy Aho.'
  '59':
  - type: text
    content: Dia naka vato hitorahana Azy ny olona; fa Jesosy niery ka niala tao amin’ny tempoly.
  '6':
  - type: text
    content: 'Izany no nolazainy hakany fanahy Azy mba hahazoany antony hiampangana Azy. Fa Jesosy niondrika ka nanoratra teo amin’ny tany tamin’ny rantsantanany. '
  '7':
  - type: text
    content: 'Ary raha nitohy nanontany Azy ry zareo dia nitraka Izy ka niteny taminy hoe: Izay tsy nanota aminareo no aoka hitora-bato azy voalohany. '
  '8':
  - type: text
    content: 'Dia niondrika indray Izy ka nanoratra teo amin’ny tany tamin’ny rantsantanany. '
  '9':
  - type: text
    content: 'Raha nandre izany izy ireo dia niala tsirairay, hatramin’ny zokinjokiny ka hatramin’ny zandrinjandriny; ary Jesosy sy ilay vehivavy, izay natao teo afovoany, irery no sisa teo. '
