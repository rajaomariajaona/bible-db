document_id: JHN.8
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Fa Jesosy kosa nankany amin’ny tendrombohitra Oliva. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Raha vao maraina dia nankao amin’ny tempoly indray Jesosy, ary satria ny vahoaka rehetra nanatona Azy dia nipetraka Izy ka nampianatra azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary nisy vehivavy iray, tratra nijangajanga, noentin’ny mpanoradalàna sy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Fariseo
  - type: text
    text: '; ary rehefa avy napetrany teo afovoany izy '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'dia hoy ireo Taminy: Mpampianatra ô, ity vehivavy ity dia tratra nijangajanga. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary ao amin’ny lalàna, i Mosesy dia nandidy antsika fa hotoraham-bato izay vehivavy manao toy izany (Deo 22.22-24); fa ahoana kosa hoy Ianao? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Izany no nolazainy hakany fanahy Azy mba hahazoany antony hiampangana Azy. Fa Jesosy niondrika ka nanoratra teo amin’ny tany tamin’ny rantsantanany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary raha nitohy nanontany Azy ry zareo dia nitraka Izy ka niteny taminy hoe: Izay tsy nanota aminareo no aoka hitora-bato azy voalohany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dia niondrika indray Izy ka nanoratra teo amin’ny tany tamin’ny rantsantanany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Raha nandre izany izy ireo dia niala tsirairay, hatramin’ny zokinjokiny ka hatramin’ny zandrinjandriny; ary Jesosy sy ilay vehivavy, izay natao teo afovoany, irery no sisa teo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Rehefa nitraka Jesosy dia hoy Izy taminy; Ravehivavy, aiza ry zareo teo? Tsy nisy nanameloka anao va? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary hoy izy: Tsy misy, Tompoko. Dia hoy Jesosy: Izaho koa tsy manameloka anao; mandehana, ary amin’izao sisa izao dia aza manota intsony.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fahazavan’izao tontolo izao
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary Jesosy niteny tamin’ny olona indray hoe: Izaho no fahazavan’izao tontolo izao; izay manaraka Ahy tsy mba handeha amin’ny maizina, fa hanana ny fahazavan’aina.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dia hoy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Fariseo
  - type: text
    text: ' Taminy: Ianao izao dia manambara ny tenanao, koa tsy marina ny fanambaranao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Hoy Jesosy hoe: Na dia manambara ny tenako aza Aho dia marina ny fanambaràko satria fantatro izay niaviako sy izay alehako; fa ianareo kosa dia tsy mahalala izay niaviako na izay alehako. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Mitsara araka ny nofo ianareo; Izaho tsy mitsara olona na dia iray akory aza. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary na dia mitsara aza Aho dia marina ny fitsarako satria tsy irery Aho, fa ao Izaho sy ny Ray izay naniraka Ahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Fa voasoratra ao amin’ny lalànanareo fa marina ny teny ijoroan’ny olona roa vavolombelona (Deo 19.15). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Izaho no manambara ny tenako, ary ny Ray izay naniraka Ahy dia manambara Ahy koa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Dia hoy ireo taminy: Aiza izay Rainao? Dia hoy Jesosy hoe: Samy tsy fantatrareo, na Izaho na ny Raiko; raha nahalala Ahy ianareo dia ho nahalala ny Raiko koa.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Teo akaikin’ny fandatsahan-drakitra izany teny izany no nolazain’i Jesosy, raha nampianatra tao amin’ny tempoly Izy; ary tsy nisy olona nisambotra Azy satria tsy mbola tonga ny fotoanandrony.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesosy, Ilay iraky ny Ray
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Hoy indray Jesosy taminy: Handeha Aho ka hitady Ahy ianareo, ary ho faty amin’ny fahotanareo ianareo; izay halehako dia tsy ho azonareo aleha. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Dia hoy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jiosy
  - type: text
    text: ': Hamono tena va Izy no milaza hoe: Izay alehako dia tsy azonareo aleha? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Fa hoy Izy taminy: Ianareo dia avy atỳ ambany; Izaho avy any ambony; ianareo dia avy amin’izao tontolo izao; Izaho tsy mba avy amin’izao tontolo izao; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'koa izany no nilazako taminareo fa ho faty amin’ny fahotanareo ianareo; satria raha tsy mino ianareo fa Izaho no Izy dia ho faty amin’ny fahotanareo ianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Dia hoy ireo taminy: Iza moa Ianao? Hoy Jesosy tamin’izy ireo: Ilay nolazaiko taminareo hatramin’ny voalohany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Manana zavatra maro hilazana sy hitsarana anareo Aho satria marina izay naniraka Ahy; ary izay zavatra reko Taminy no lazaiko amin’izao tontolo izao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Tsy fantany fa ny Ray no nolazainy taminy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'koa hoy Jesosy: Rehefa asandratrareo ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Zanak’Olona
  - type: text
    text: ' dia ho fantatrareo fa Izaho no Izy, ary tsy manao na inona na inona amin’ny fahefan’ny tenako Aho, fa araka ny nampianarin’ny Raiko Ahy no ilazako izany zavatra izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Ary izay naniraka Ahy dia eto Amiko; tsy nandao Ahy ho irery Izy satria Izaho manao izay sitrany mandrakariva.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Rehefa nilaza izany teny izany Jesosy dia maro no nino Azy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Zanak’i Abrahama sa zanaky ny devoly?
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Dia hoy Jesosy tamin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jiosy
  - type: text
    text: ' izay nino Azy: Raha maharitra amin’ny teniko ianareo dia ho mpianatro tokoa; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'koa ho fantatrareo ny marina ary ny marina no hanafaka anareo tsy ho andevo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ary ireo dia namaly Azy hoe: Taranak’i Abrahama izahay fa tsy mba andevon’olona hatrizay ela izay; koa nahoana no ataonao hoe: Ho afaka ianareo? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Hoy Jesosy hoe: Lazaiko aminareo marina dia marina tokoa fa izay rehetra manota dia andevon’ny ota. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Fa ny andevo dia tsy mitoetra ao an-trano mandrakariva; fa ny zanaka no mitoetra ao mandrakariva. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Koa raha ny Zanaka no hahafaka anareo dia ho afaka tokoa ianareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Fantatro ihany fa taranak’i Abrahama ianareo nefa mitady hamono Ahy satria tsy mitombo ao anatinareo ny teniko. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Izay efa hitako tamin’ny Ray no lazaiko, ary ianareo kosa dia manao izay renareo tamin’ny rainareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Dia hoy ireo hoe: I Abrahama no rainay. Hoy Jesosy taminy: Raha zanak’i Abrahama ianareo dia ny asan’i Abrahama no hataonareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Fa ankehitriny ianareo dia mitady hamono Ahy, izay lehilahy nilaza ny marina taminareo, dia izay efa reko tamin’Andriamanitra; tsy mba nanao izany i Abrahama. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: Ianareo dia manao ny asan’ny rainareo.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Hoy ireo taminy: Tsy mba teraka avy tamin’ny fijangajangana izahay; iray ihany ny Rainay dia Andriamanitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Hoy Jesosy taminy: Raha Andriamanitra no Rainareo dia ho tia Ahy ianareo satria avy tamin’Andriamanitra no niaviako sy nankanesako atỳ; fa Izaho tsy tonga amin’ny fahefan’ny tenako fa Izy no naniraka Ahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Nahoana no tsy azonareo ny teniko? Satria tsy afaka mihaino ny teniko ianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Ianareo avy tamin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: devoly
  - type: text
    text: ' rainareo, koa izay sitraky ny rainareo no tianareo hatao. Izy dia mpamono olona hatramin’ny taloha, ary tsy nitoetra tamin’ny marina satria tsy misy marina aminy. Raha mandainga izy dia ny azy no lazainy satria mpandainga izy sady rain’ny lainga. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Fa satria milaza ny marina Aho dia tsy inoanareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Iza aminareo moa no hampiseho Ahy ho nanota? Raha ny marina no lazaiko, nahoana ianareo no tsy mino Ahy? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: Izay avy amin’Andriamanitra dia mihaino ny tenin’Andriamanitra; izany no tsy ihainoanareo satria tsy mba avy amin’Andriamanitra ianareo.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesosy sy i Abrahama
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Dia namaly Azy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jiosy
  - type: text
    text: ' hoe: Tsy marina va ny filazanay fa '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Samaritana
  - type: text
    text: ' ianao sady manana '
  - type: usfm
    marker: w
    children:
    - type: text
      text: demonia
  - type: text
    text: '? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'Fa hoy Jesosy hoe: Tsy manana demonia Aho, fa mankalaza ny Raiko, nefa kosa ianareo dia manala baraka Ahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Fa Izaho tsy mitady ny voninahitro; misy iray mitady sy mitsara. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'Lazaiko aminareo marina dia marina tokoa: Raha misy olona mitandrina ny teniko dia tsy mba hahita fahafatesana mandrakizay.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'Dia hoy ny Jiosy Taminy: Fantatray ankehitriny fa manana demonia Ianao. Efa maty i Abrahama sy ny mpaminany; nefa hoy Ianao: Raha misy olona mitandrina ny teniko dia tsy mba hanandrana fahafatesana mandrakizay izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'Moa Ianao va lehibe noho i Abrahama rainay izay efa maty? Sady efa maty koa ny mpaminany; koa manao Anao ho iza moa Ianao? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: 'Dia novalin’i Jesosy hoe: Raha mankalaza ny tenako Aho dia tsinontsinona ny voninahitro; ny Raiko, izay ataonareo fa Andriamanitrareo, Izy no mankalaza Ahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: 'Tsy fantatrareo Izy fa Izaho no mahalala Azy; ary raha hoy Aho: Tsy fantatro Izy, dia mba mpandainga tahaka anareo koa Aho; nefa mahalala Azy Aho ka mitandrina ny teniny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: 'Miravoravo i Abrahama rainareo hahita ny androko; ary nahita izy ka faly. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: 'Dia hoy ny Jiosy taminy: Tsy mbola dimampolo taona akory Ianao izao dia ho efa nahita an’i Abrahama va Ianao? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: 'Hoy Jesosy taminy: Lazaiko aminareo marina tokoa: Fony tsy mbola ary i Abrahama dia efa Izy Aho.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '59'
  - type: text
    text: Dia naka vato hitorahana Azy ny olona; fa Jesosy niery ka niala tao amin’ny tempoly.
