document_id: HEB.10,3103
type_code: plt
verses:
  '1':
  - type: text
    content: 'Eny, ny lalàna dia mitondra aloky ny zava-tsoa ho avy, fa tsy ny tena endrik’ireny. Ny lalàna dia tsy mahatonga ho tanteraka ny olona izay manatona ka mitondra fanatitra atolotra tsy tapaka isan-taona. '
  '10':
  - type: text
    content: Amin’izany sitrapo izany no nanamasinana antsika tamin’ny nanolorana ny tenan’i Kristy indray mandeha monja ho fanatitra.
  '11':
  - type: text
    content: 'Ny mpisorona rehetra dia mitsangana isanandro manao fanompoam-pivavahana sy manolotra ireny fanatitra ireny ihany matetika, saingy tsy mahaisotra ny ota ireny; '
  '12':
  - type: text
    content: 'fa Izy kosa, rehefa avy nanolotra fanatitra iray monja ho mandrakizay noho ny ota, dia mipetraka eo ankavanan’Andriamanitra. '
  '13':
  - type: text
    content: 'Koa hatramin’izao dia miandry Izy mandra-panaony ny fahavalony ho fitoeran-tongony. '
  '14':
  - type: text
    content: 'Fa ny fanatitra iray ihany no efa nahatanterahany ho mandrakizay izay olona hamasinina. '
  '15':
  - type: text
    content: 'Manambara izany amintsika koa ny Fanahy Masina; fa rehefa voalazany hoe:'
  '16':
  - type: text
    content: «Izao no fanekena hataoko aminy
  - type: text
    content: 'rehefa afaka izany andro izany, hoy NY TOMPO:'
  - type: text
    content: Hataoko ao am-pony ny lalànako
  - type: text
    content: sady hosoratako ao an-tsainy;
  '17':
  - type: text
    content: ny fahotany sy ny helony dia tsy hotsarovako intsony» (Jer 31.33-34).
  '18':
  - type: text
    content: Ary rehefa misy famelana ireo dia tsy misy fanatitra noho ny ota intsony.
  - type: heading
    content: Antso ho amin’ny faharetana
  '19':
  - type: text
    content: 'Koa amin’izany, ry rahalahy, dia manana fahatokiana hiditra ao amin’ny fitoerana masina isika noho ny ran’i Jesosy, '
  '2':
  - type: text
    content: 'Fa raha tsy izany dia tsy ho nitsahatra va ireny fanolorana fanatitra ireny ka ireo izay mandray anjara amin’izany fanompoam-pivavahana izany dia ho efa voadio indray mandeha ary tsy henjehin’ny fieritreretany ny amin’ny fahotany intsony? '
  '20':
  - type: text
    content: 'amin’izay lalana natokany ho antsika, dia lalana vaovao sady velona, namakivaky teo amin’ny efitra lamba, dia ny nofony izany, '
  '21':
  - type: text
    content: 'sady manana mpisorona lehibe mitandrina ny tranon’Andriamanitra isika. '
  '22':
  - type: text
    content: 'Aoka isika hanatona amin’ny fo marina sy amin’ny fahatokiana be avy amin’ny finoana, manana fo voadio ho afaka amin’ny fieritreretana ratsy sy fo tena voasasa tamin’ny rano madio; '
  '23':
  - type: text
    content: 'aoka hohazonintsika mafy ny fanekena ny fanantenana mba tsy hihozongozonany, satria mahatoky ilay nanao ny teny fikasana; '
  '24':
  - type: text
    content: 'ary aoka isika hifampandinika hampandroso ny fitiavana sy ny asa tsara. '
  '25':
  - type: text
    content: Aza mahafoy ny fiarahantsika miangona, tahaka ny fanaon’ny sasany, fa mifananara kosa, mainka satria hitanareo fa efa antomotra ny andro.
  '26':
  - type: text
    content: 'Fa raha minia manota isika rehefa nahazo ny fahalalana tsara ny marina dia tsy misy fanatitra noho ny ota intsony, '
  '27':
  - type: text
    content: 'fa fiandrasana mahatahotra amin’ny fitsarana ary fahatezerana mirehitra izay handany ny fahavalo rehetra kosa. '
  '28':
  - type: text
    content: 'Izay manohitra ny lalànan’i Mosesy dia maty amin’ny tenin’ny vavolombelona roa na telo ka tsy asiana famindrampo. '
  '29':
  - type: text
    content: 'Manao ahoana kosa ary, araka ny hevitrareo, ny hamafin’ny fampijaliana tokony hihatra amin’izay nanitsakitsaka ny Zanak’Andriamanitra ka nanao ny ran’ny fanekena izay nanamasinana azy ho zavatra tsy masina sady naniratsira ny Fanahin’ny fahasoavana? '
  '3':
  - type: text
    content: 'Kanefa amin’ireny fanatitra ireny dia misy fahatsiarovana ny ota isan-taona. '
  '30':
  - type: text
    content: 'Fa fantatsika izay niteny hoe:'
  - type: text
    content: «Ahy ny famaliana; Izaho no hamaly»;
  - type: text
    content: 'ary koa:'
  - type: text
    content: «NY TOMPO hitsara ny olony» (Deo 32.35-36).
  '31':
  - type: text
    content: Zavatra mahatahotra no ho azon’ny tanan’Andriamanitra velona.
  '32':
  - type: text
    content: 'Fa tsarovy ny andro fahiny izay niaretanareo ny ady mafy tamin’ny fahoriana rehefa nandray ny mazava ianareo; '
  '33':
  - type: text
    content: 'indraindray dia natao ho faneso noho ny fanaratsiana sy ny fampahoriana ianareo, ary indraindray koa dia tonga naman’izay azon’izany. '
  '34':
  - type: text
    content: 'Fa sady niara-niaritra tamin’izay nifatotra ianareo no nifaly raha norobaina ny fanananareo satria fantatrareo fa ianareo dia manana fananana tsara lavitra sady maharitra. '
  '35':
  - type: text
    content: 'Koa aza manary ny fahatokianareo izay misy valisoa lehibe. '
  '36':
  - type: text
    content: Fa tokony hanana faharetana ianareo mba hahazoanareo izay lazain’ny teny fikasana, rehefa vitanareo ny sitrapon’Andriamanitra.
  '37':
  - type: text
    content: Fa «rehefa afaka fotoana kelikely
  - type: text
    content: dia ho tonga ilay ho avy fa tsy hitaredretra».
  '38':
  - type: text
    content: Ary «ny oloko marina dia ho velon’ny finoana;
  - type: text
    content: fa raha mihemotra izy dia tsy sitraky ny fanahiko» (Hab 2.3-4).
  '39':
  - type: text
    content: Fa isika tsy mba naman’izay mihemotra ho amin’ny fahaverezana fa naman’izay mino ho amin’ny famonjena ny fanahy.
  '4':
  - type: text
    content: Fa tsy mahaisotra ny ota ny ran’ombilahy sy ny ran’osilahy.
  '5':
  - type: text
    content: 'Koa nony niditra tamin’izao fiainana izao Izy dia niteny hoe:'
  - type: text
    content: «Tsy mba nilainao ny fanatitra alatsa-dra sy ny fanatitra avy amin’ny zavamaniry,
  - type: text
    content: fa tena no namboarinao ho Ahy;
  '6':
  - type: text
    content: Tsy sitrakao ny fanatitra dorana manontolo sy ny fanatitra noho ny ota;
  '7':
  - type: text
    content: 'dia hoy Aho: Inty Aho tonga,'
  - type: text
    content: ao amin’ny horonam-boky no nanoratana Ahy,
  - type: text
    content: hanao ny sitraponao, Andriamanitra ô» (Sal 40.6-8).
  '8':
  - type: text
    content: 'Rehefa voalaza taloha hoe:'
  - type: text
    content: Tsy ilainao ary tsy sitrakao
  - type: text
    content: ny fanatitra alatsa-dra, ny fanatitra avy amin’ny zavamaniry, ny fanatitra dorana manontolo ary ny fanatitra noho ny ota,
  - type: text
    content: 'dia ireny atolotra araka ny lalàna ireny, '
  '9':
  - type: text
    content: 'dia hoy indray Izy: Inty Aho tonga hanao ny sitraponao. Manaisotra ny voalohany Izy mba hampitoerany ny faharoa. '
