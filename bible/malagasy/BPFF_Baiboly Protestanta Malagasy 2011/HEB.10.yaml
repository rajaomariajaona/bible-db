document_id: HEB.10,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Eny, ny lalàna dia mitondra aloky ny zava-tsoa ho avy, fa tsy ny tena endrik’ireny. Ny lalàna dia tsy mahatonga ho tanteraka ny olona izay manatona ka mitondra fanatitra atolotra tsy tapaka isan-taona. '
  '10':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Amin’izany sitrapo izany no nanamasinana antsika tamin’ny nanolorana ny tenan’i Kristy indray mandeha monja ho fanatitra.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny mpisorona rehetra dia mitsangana isanandro manao fanompoam-pivavahana sy manolotra ireny fanatitra ireny ihany matetika, saingy tsy mahaisotra ny ota ireny; '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fa Izy kosa, rehefa avy nanolotra fanatitra iray monja ho mandrakizay noho ny ota, dia mipetraka eo ankavanan’Andriamanitra. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa hatramin’izao dia miandry Izy mandra-panaony ny fahavalony ho fitoeran-tongony. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ny fanatitra iray ihany no efa nahatanterahany ho mandrakizay izay olona hamasinina. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Manambara izany amintsika koa ny Fanahy Masina; fa rehefa voalazany hoe:'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Izao no fanekena hataoko aminy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'rehefa afaka izany andro izany, hoy NY TOMPO:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hataoko ao am-pony ny lalànako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady hosoratako ao an-tsainy;
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny fahotany sy ny helony dia tsy hotsarovako intsony» (Jer 31.33-34).
  '18':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Ary rehefa misy famelana ireo dia tsy misy fanatitra noho ny ota intsony.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Antso ho amin’ny faharetana
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa amin’izany, ry rahalahy, dia manana fahatokiana hiditra ao amin’ny fitoerana masina isika noho ny ran’i Jesosy, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa raha tsy izany dia tsy ho nitsahatra va ireny fanolorana fanatitra ireny ka ireo izay mandray anjara amin’izany fanompoam-pivavahana izany dia ho efa voadio indray mandeha ary tsy henjehin’ny fieritreretany ny amin’ny fahotany intsony? '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'amin’izay lalana natokany ho antsika, dia lalana vaovao sady velona, namakivaky teo amin’ny efitra lamba, dia ny nofony izany, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'sady manana mpisorona lehibe mitandrina ny tranon’Andriamanitra isika. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aoka isika hanatona amin’ny fo marina sy amin’ny fahatokiana be avy amin’ny finoana, manana fo voadio ho afaka amin’ny fieritreretana ratsy sy fo tena voasasa tamin’ny rano madio; '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'aoka hohazonintsika mafy ny fanekena ny fanantenana mba tsy hihozongozonany, satria mahatoky ilay nanao ny teny fikasana; '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary aoka isika hifampandinika hampandroso ny fitiavana sy ny asa tsara. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Aza mahafoy ny fiarahantsika miangona, tahaka ny fanaon’ny sasany, fa mifananara kosa, mainka satria hitanareo fa efa antomotra ny andro.
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa raha minia manota isika rehefa nahazo ny fahalalana tsara ny marina dia tsy misy fanatitra noho ny ota intsony, '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fa fiandrasana mahatahotra amin’ny fitsarana ary fahatezerana mirehitra izay handany ny fahavalo rehetra kosa. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izay manohitra ny lalànan’i Mosesy dia maty amin’ny tenin’ny vavolombelona roa na telo ka tsy asiana famindrampo. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Manao ahoana kosa ary, araka ny hevitrareo, ny hamafin’ny fampijaliana tokony hihatra amin’izay nanitsakitsaka ny Zanak’Andriamanitra ka nanao ny ran’ny fanekena izay nanamasinana azy ho zavatra tsy masina sady naniratsira ny Fanahin’ny fahasoavana? '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Kanefa amin’ireny fanatitra ireny dia misy fahatsiarovana ny ota isan-taona. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa fantatsika izay niteny hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Ahy ny famaliana; Izaho no hamaly»;
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'ary koa:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «NY TOMPO hitsara ny olony» (Deo 32.35-36).
  '31':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Zavatra mahatahotra no ho azon’ny tanan’Andriamanitra velona.
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa tsarovy ny andro fahiny izay niaretanareo ny ady mafy tamin’ny fahoriana rehefa nandray ny mazava ianareo; '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'indraindray dia natao ho faneso noho ny fanaratsiana sy ny fampahoriana ianareo, ary indraindray koa dia tonga naman’izay azon’izany. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa sady niara-niaritra tamin’izay nifatotra ianareo no nifaly raha norobaina ny fanananareo satria fantatrareo fa ianareo dia manana fananana tsara lavitra sady maharitra. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa aza manary ny fahatokianareo izay misy valisoa lehibe. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa tokony hanana faharetana ianareo mba hahazoanareo izay lazain’ny teny fikasana, rehefa vitanareo ny sitrapon’Andriamanitra.
  '37':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa «rehefa afaka fotoana kelikely
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ho tonga ilay ho avy fa tsy hitaredretra».
  '38':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary «ny oloko marina dia ho velon’ny finoana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa raha mihemotra izy dia tsy sitraky ny fanahiko» (Hab 2.3-4).
  '39':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Fa isika tsy mba naman’izay mihemotra ho amin’ny fahaverezana fa naman’izay mino ho amin’ny famonjena ny fanahy.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa tsy mahaisotra ny ota ny ran’ombilahy sy ny ran’osilahy.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa nony niditra tamin’izao fiainana izao Izy dia niteny hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Tsy mba nilainao ny fanatitra alatsa-dra sy ny fanatitra avy amin’ny zavamaniry,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa tena no namboarinao ho Ahy;
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy sitrakao ny fanatitra dorana manontolo sy ny fanatitra noho ny ota;
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'dia hoy Aho: Inty Aho tonga,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ao amin’ny horonam-boky no nanoratana Ahy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hanao ny sitraponao, Andriamanitra ô» (Sal 40.6-8).
  '8':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Rehefa voalaza taloha hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy ilainao ary tsy sitrakao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny fanatitra alatsa-dra, ny fanatitra avy amin’ny zavamaniry, ny fanatitra dorana manontolo ary ny fanatitra noho ny ota,
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'dia ireny atolotra araka ny lalàna ireny, '
  '9':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'dia hoy indray Izy: Inty Aho tonga hanao ny sitraponao. Manaisotra ny voalohany Izy mba hampitoerany ny faharoa. '
