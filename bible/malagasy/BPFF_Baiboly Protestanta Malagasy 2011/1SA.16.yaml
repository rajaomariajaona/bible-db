document_id: 1SA.16,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Manosotra an’i Davida ho mpanjakan’ny Israely i Samoela
  - type: text
    content: 'Hoy NY TOMPO tamin’i Samoela: Mandra-pahoviana no halahelovanao an’i Saoly, nefa Izaho efa nandà azy tsy ho mpanjakan’ny Israely? Fenoy diloilo ny tandrokao ka mandehana, fa hirahiko ho any amin’i Jese betlehemita ianao; fa efa nahita mpanjaka ho Ahy ao amin’ny zanany Aho. '
  '10':
  - type: text
    content: 'Nampandalo fito lahy tamin’ny zanany teo anatrehan’i Samoela i Jese, nefa hoy i Samoela tamin’i Jese: Tsy nofidin’NY TOMPO ireto.'
  '11':
  - type: text
    content: 'Ary hoy i Samoela tamin’i Jese: Tapitra eto avokoa va ny zanakao lahy rehetra? Dia hoy izy: Ny faralahy no sisa, fa miandry ondry izy. Hoy i Samoela tamin’i Jese: Maniraha olona haka azy, fa tsy hipetraka hihinana isika raha tsy tonga eto izy. '
  '12':
  - type: text
    content: 'Dia nandefa iraka haka azy izy. Mena volo izy sady bary maso no tsara tarehy. Ary hoy NY TOMPO: Mitsangàna, hosory izy, fa io no izy. '
  '13':
  - type: text
    content: Ary nandray ny tandroka feno diloilo i Samoela ka nanosotra azy teo anatrehan’ny rahalahiny; nanomboka tamin’iny andro iny dia tonga tamin’i Davida ny Fanahin’NY TOMPO. Dia nitsangana i Samoela ka nankany Rama.
  - type: heading
    content: Manao asa fanompoana ao amin’i Saoly i Davida
  '14':
  - type: text
    content: 'Dia niala tamin’i Saoly ny Fanahin’NY TOMPO, ary nisy fanahy ratsy avy tany amin’NY TOMPO nampahatahotra azy. '
  '15':
  - type: text
    content: 'Hoy ny mpanompon’i Saoly taminy: Indro, misy fanahy ratsy avy any amin’Andriamanitra mampahatahotra anao. '
  '16':
  - type: text
    content: 'Aoka ny tomponay haniraka anay mpanomponao izay eto anatrehanao, mba hitady olona mahay mitendry lokanga; koa rehefa misy fanahy ratsy avy amin’Andriamanitra tonga aminao dia hitendry amin’ny tanany izy ka ho tsara ianao. '
  '17':
  - type: text
    content: 'Hoy i Saoly tamin’ny mpanompony: Mizahà ary izay olona mahay mitendry tsara ka ento etỳ amiko.'
  '18':
  - type: text
    content: 'Hoy ny iray tamin’ny zatovony: Indro, ny iray amin’ny zanak’i Jese betlehemita no hitako mahay mitendry, sady lehilahy mahery sy mpiantafika izy no mahay mandaha-teny sy tsara tarehy, ary NY TOMPO momba azy. '
  '19':
  - type: text
    content: 'Dia nandefa iraka tany amin’i Jese i Saoly hilaza hoe: Iraho hankaty amiko i Davida zanakao izay miandry ondry. '
  '2':
  - type: text
    content: 'Fa hoy i Samoela: Hataoko ahoana no fandeha any? Raha ren’i Saoly izany, moa tsy hovonoiny va aho? Hoy NY TOMPO: Mitondrà ombivavy kely ianao ka lazao hoe: Avy hamono zavatra hatao fanatitra ho an’NY TOMPO aho. '
  '20':
  - type: text
    content: 'Ary naka mofo tokony ho zakan’ny boriky iray sy divay iray siny hoditra ary zanak’osy i Jese ka nampitondrainy an’i Davida zanany ho an’i Saoly ireo. '
  '21':
  - type: text
    content: 'Dia tonga tany amin’i Saoly i Davida ka niseho teo anatrehany; ary tiany indrindra izy ka tonga mpitondra ny fiadiany. '
  '22':
  - type: text
    content: 'Koa nandefa iraka tany amin’i Jese i Saoly hilaza hoe: Miangavy anao aho, avelao i Davida hitoetra eto anatrehako, satria efa mahita fitia amiko izy. '
  '23':
  - type: text
    content: Rehefa nisy fanahy avy tany amin’Andriamanitra tonga tamin’i Saoly dia noraisin’i Davida ny lokanga ka notendren’ny tanany; dia maivamaivana sady nihatsara i Saoly, ary niala taminy ny fanahy ratsy.
  '3':
  - type: text
    content: Dia antsoy i Jese mba ho any amin’ny fanatitra, ary Izaho no hampahafantatra anao izay hataonao ka hohosoranao ho Ahy izay holazaiko aminao.
  '4':
  - type: text
    content: 'Ary nanatanteraka izay nolazain’NY TOMPO i Samoela ka tonga tao Betlehema. Nitsena azy tamin-kovitra ny loholona teo an-tanàna ka niteny hoe: Fihavanana va no iavianao? '
  '5':
  - type: text
    content: 'Dia hoy izy: Fihavanana; avy hamono zavatra hatao fanatitra ho an’NY TOMPO aho; hamasino ny tenanareo, ary andeha hiaraka amiko ho any amin’ny fanatitra. Dia nohamasininy i Jese sy ny zanany ka nasainy ho any amin’ny fanatitra.'
  '6':
  - type: text
    content: 'Nony tonga ireo dia nijery an’i Eliaba izy ka niteny hoe: Ny voahosotry NY TOMPO tokoa ity eto anatrehany. '
  '7':
  - type: text
    content: 'Fa hoy NY TOMPO tamin’i Samoela: Aza mijery ny tarehiny na ny haavon’ny tsanganany fa efa nolaviko izy; satria tsy mba toy ny fijerin’ny olona no fijerin’NY TOMPO; ny olona dia mijery ny miseho eo ivelany, fa NY TOMPO kosa mijery ny fo. '
  '8':
  - type: text
    content: 'Ary niantso an’i Abinadaba i Jese ka nampandalo azy teo anatrehan’i Samoela. Fa hoy izy: Tsy ity no nofidin’NY TOMPO. '
  '9':
  - type: text
    content: 'Dia nampandalo an’i Sama indray i Jese. Fa hoy izy: Tsy ity no nofidin’NY TOMPO. '
