document_id: 1SA.16
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Manosotra an’i Davida ho mpanjakan’ny Israely i Samoela
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Hoy NY TOMPO tamin’i Samoela: Mandra-pahoviana no halahelovanao an’i Saoly, nefa Izaho efa nandà azy tsy ho mpanjakan’ny Israely? Fenoy diloilo ny tandrokao ka mandehana, fa hirahiko ho any amin’i Jese betlehemita ianao; fa efa nahita mpanjaka ho Ahy ao amin’ny zanany Aho. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Fa hoy i Samoela: Hataoko ahoana no fandeha any? Raha ren’i Saoly izany, moa tsy hovonoiny va aho? Hoy NY TOMPO: Mitondrà ombivavy kely ianao ka lazao hoe: Avy hamono zavatra hatao fanatitra ho an’NY TOMPO aho. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Dia antsoy i Jese mba ho any amin’ny fanatitra, ary Izaho no hampahafantatra anao izay hataonao ka hohosoranao ho Ahy izay holazaiko aminao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary nanatanteraka izay nolazain’NY TOMPO i Samoela ka tonga tao Betlehema. Nitsena azy tamin-kovitra ny loholona teo an-tanàna ka niteny hoe: Fihavanana va no iavianao? '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia hoy izy: Fihavanana; avy hamono zavatra hatao fanatitra ho an’NY TOMPO aho; hamasino ny tenanareo, ary andeha hiaraka amiko ho any amin’ny fanatitra. Dia nohamasininy i Jese sy ny zanany ka nasainy ho any amin’ny fanatitra.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Nony tonga ireo dia nijery an’i Eliaba izy ka niteny hoe: Ny voahosotry NY TOMPO tokoa ity eto anatrehany. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Fa hoy NY TOMPO tamin’i Samoela: Aza mijery ny tarehiny na ny haavon’ny tsanganany fa efa nolaviko izy; satria tsy mba toy ny fijerin’ny olona no fijerin’NY TOMPO; ny olona dia mijery ny miseho eo ivelany, fa NY TOMPO kosa mijery ny fo. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary niantso an’i Abinadaba i Jese ka nampandalo azy teo anatrehan’i Samoela. Fa hoy izy: Tsy ity no nofidin’NY TOMPO. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Dia nampandalo an’i Sama indray i Jese. Fa hoy izy: Tsy ity no nofidin’NY TOMPO. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Nampandalo fito lahy tamin’ny zanany teo anatrehan’i Samoela i Jese, nefa hoy i Samoela tamin’i Jese: Tsy nofidin’NY TOMPO ireto.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary hoy i Samoela tamin’i Jese: Tapitra eto avokoa va ny zanakao lahy rehetra? Dia hoy izy: Ny faralahy no sisa, fa miandry ondry izy. Hoy i Samoela tamin’i Jese: Maniraha olona haka azy, fa tsy hipetraka hihinana isika raha tsy tonga eto izy. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Dia nandefa iraka haka azy izy. Mena volo izy sady bary maso no tsara tarehy. Ary hoy NY TOMPO: Mitsangàna, hosory izy, fa io no izy. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ary nandray ny tandroka feno diloilo i Samoela ka nanosotra azy teo anatrehan’ny rahalahiny; nanomboka tamin’iny andro iny dia tonga tamin’i Davida ny Fanahin’NY TOMPO. Dia nitsangana i Samoela ka nankany Rama.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Manao asa fanompoana ao amin’i Saoly i Davida
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dia niala tamin’i Saoly ny Fanahin’NY TOMPO, ary nisy fanahy ratsy avy tany amin’NY TOMPO nampahatahotra azy. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Hoy ny mpanompon’i Saoly taminy: Indro, misy fanahy ratsy avy any amin’Andriamanitra mampahatahotra anao. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Aoka ny tomponay haniraka anay mpanomponao izay eto anatrehanao, mba hitady olona mahay mitendry lokanga; koa rehefa misy fanahy ratsy avy amin’Andriamanitra tonga aminao dia hitendry amin’ny tanany izy ka ho tsara ianao. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Hoy i Saoly tamin’ny mpanompony: Mizahà ary izay olona mahay mitendry tsara ka ento etỳ amiko.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Hoy ny iray tamin’ny zatovony: Indro, ny iray amin’ny zanak’i Jese betlehemita no hitako mahay mitendry, sady lehilahy mahery sy mpiantafika izy no mahay mandaha-teny sy tsara tarehy, ary NY TOMPO momba azy. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Dia nandefa iraka tany amin’i Jese i Saoly hilaza hoe: Iraho hankaty amiko i Davida zanakao izay miandry ondry. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary naka mofo tokony ho zakan’ny boriky iray sy divay iray siny hoditra ary zanak’osy i Jese ka nampitondrainy an’i Davida zanany ho an’i Saoly ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Dia tonga tany amin’i Saoly i Davida ka niseho teo anatrehany; ary tiany indrindra izy ka tonga mpitondra ny fiadiany. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Koa nandefa iraka tany amin’i Jese i Saoly hilaza hoe: Miangavy anao aho, avelao i Davida hitoetra eto anatrehako, satria efa mahita fitia amiko izy. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Rehefa nisy fanahy avy tany amin’Andriamanitra tonga tamin’i Saoly dia noraisin’i Davida ny lokanga ka notendren’ny tanany; dia maivamaivana sady nihatsara i Saoly, ary niala taminy ny fanahy ratsy.
