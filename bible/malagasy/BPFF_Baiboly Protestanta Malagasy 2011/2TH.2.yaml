document_id: 2TH.2,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mialoha ny fiavian’ny Tompo
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mangataka aminareo izahay, ry rahalahy, ny amin’ny fiavian’i Jesosy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ' Tompontsika sy ny hanangonana antsika ho eo Aminy, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'sy ny famitahana momba ny tsy fahamarinana amin’izay ho very, satria tsy nandray ny fitiavana ny fahamarinana izay hamonjena azy izy. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa izany no andefasan’Andriamanitra fiasan’ny fahadisoan-kevitra aminy ka inoany ny lainga '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: mba hohelohina avokoa izay rehetra tsy nino ny marina fa nankasitraka ny tsy marina.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Efa nifidy anareo Andriamanitra: Tomoera tsara'
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa tsy maintsy misaotra an’Andriamanitra mandrakariva ny aminareo izahay, ry rahalahy malalan’ny Tompo, satria Andriamanitra efa nifidy anareo hatramin’ny voalohany mba hahazo famonjena amin’ny fanamasinan’ny Fanahy sy ny finoana ny marina ianareo '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'sady ho amin’izany koa no niantsoany anareo tamin’ny Filazantsara torinay mba hahazoanareo ny voninahitr’i Jesosy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ' Tompontsika.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Koa tomoera tsara, ry rahalahy, dia hazòny ny fampianarana natolotra izay nampianarina anareo, na tamin’ny teninay na tamin’ny epistilinay.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Jesosy Kristy Tompontsika sy Andriamanitra Raintsika izay efa tia antsika ka nanome antsika fampiononana mandrakizay sy fanantenana tsara amin’ny fahasoavana, '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izy anie no hampionona ny fonareo sy hampahery anareo amin’ny asa sy ny teny tsara rehetra.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: mba tsy halaky hohozongozonina ny sainareo na hampitahorina ianareo, na amin’ny fanahy na amin’ny teny na amin’ny epistily izay toa hoe avy aminay ary milaza fa efa tonga sahady, hono, ny andron’ny Tompo.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aza mety hofitahin’olona akory ianareo; fa tsy ho avy izany raha tsy efa tonga aloha ny fihemorana ka hiseho ilay lehilahin’ny ota, dia ilay zanaky ny fahaverezana, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ilay manohitra ka manandra-tena ho ambony noho izay rehetra atao hoe Andriamanitra, na izay ivavahana, ka mipetraka eo amin’ny tempolin’Andriamanitra ary milaza ny tenany ho Andriamanitra.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsy tsaroanareo va fa fony mbola teo aminareo ihany aho dia efa nilaza izany zavatra izany taminareo? '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ankehitriny dia fantatrareo ny zavatra misakana azy mba tsy hisehoany raha tsy amin’ny fotoanany. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa miasa sahady ny zavamiafina dia ny tsy fankatoavan-dalàna, kanefa mandra-panaisotra ilay misakana ankehitriny fotsiny ihany. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa amin’izay dia haseho ilay tena mpandika lalàna, izay holevonin’i Jesosy Tompo amin’ny fofonain’ny vavany ary hofoanany amin’ny famirapiratan’ny fiaviany. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny fiavin’ilay mpanao ratsy dia araka ny fiasan’i Satana amin’ny hery sy ny famantarana ary ny fahagagana mandainga rehetra '
