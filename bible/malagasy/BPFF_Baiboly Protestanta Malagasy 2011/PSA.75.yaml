document_id: PSA.75,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Andriamanitra no Mpitsara
  - type: text
    content: Ho an’ny mpiventy hira. Al-tashet. Salamo nataon’i Asafa. Tononkira.
  - type: text
    content: Isaoranay Ianao, Andriamanitra ô; eny, isaoranay Ianao;
  - type: text
    content: fa akaiky ny anaranao;
  - type: text
    content: mitory ny fahagagana ataonao ny olona.
  '10':
  - type: text
    content: Ny tandroky ny ratsy fanahy rehetra dia hotapahiko;
  - type: text
    content: ny tandroky ny marina dia hasandratra.
  '2':
  - type: text
    content: Amin’ny fotoana voatendriko
  - type: text
    content: dia Izaho no hitsara marina.
  '3':
  - type: text
    content: Mihorohoro ny tany sy ny mponina rehetra eo aminy,
  - type: text
    content: 'nefa Izaho no nampiorina ny andriny. '
  - type: text
    content: Fiatoana.
  '4':
  - type: text
    content: 'Hoy aho tamin’ny mpirehareha: Aza mirehareha!'
  - type: text
    content: 'Ary tamin’ny ratsy fanahy: Aza manandra-'
  - type: text
    content: tandroka
  - type: text
    content: '!'
  '5':
  - type: text
    content: Aza manandratra ny tandrokareo ho avo
  - type: text
    content: ary aza mikiribiby amin’ny fiteny an’avona.
  '6':
  - type: text
    content: Fa tsy avy any atsinanana na avy any andrefana
  - type: text
    content: na avy any atsimo na avy any amin’ny tendrombohitry ny tany efitra no hiavian’ny fisandratana.
  '7':
  - type: text
    content: Fa Andriamanitra no Mpitsara;
  - type: text
    content: mampietry ny iray Izy ary manandratra ny iray hafa kosa.
  '8':
  - type: text
    content: Fa misy kapoaka eo an-tanan’NY TOMPO,
  - type: text
    content: feno divay mandroatra, miharoharo zavatra iny ka ampisotroany;
  - type: text
    content: eny, ny ratsy fanahy rehetra amin’ny tany dia hitroka ny faikany.
  '9':
  - type: text
    content: Fa hanambara izany mandrakariva aho
  - type: text
    content: ka hankalaza an’Andriamanitr’i Jakoba.
