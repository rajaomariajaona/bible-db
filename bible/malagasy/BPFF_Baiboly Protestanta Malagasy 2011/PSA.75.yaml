document_id: PSA.75,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Andriamanitra no Mpitsara
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: Ho an’ny mpiventy hira. Al-tashet. Salamo nataon’i Asafa. Tononkira.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Isaoranay Ianao, Andriamanitra ô; eny, isaoranay Ianao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa akaiky ny anaranao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mitory ny fahagagana ataonao ny olona.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Ny tandroky ny ratsy fanahy rehetra dia hotapahiko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny tandroky ny marina dia hasandratra.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Amin’ny fotoana voatendriko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia Izaho no hitsara marina.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Mihorohoro ny tany sy ny mponina rehetra eo aminy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'nefa Izaho no nampiorina ny andriny. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Fiatoana.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Hoy aho tamin’ny mpirehareha: Aza mirehareha!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ary tamin’ny ratsy fanahy: Aza manandra-'
    - type: usfm
      marker: w
      children:
      - type: text
        text: tandroka
    - type: text
      text: '!'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Aza manandratra ny tandrokareo ho avo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary aza mikiribiby amin’ny fiteny an’avona.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Fa tsy avy any atsinanana na avy any andrefana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na avy any atsimo na avy any amin’ny tendrombohitry ny tany efitra no hiavian’ny fisandratana.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Fa Andriamanitra no Mpitsara;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mampietry ny iray Izy ary manandratra ny iray hafa kosa.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Fa misy kapoaka eo an-tanan’NY TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: feno divay mandroatra, miharoharo zavatra iny ka ampisotroany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, ny ratsy fanahy rehetra amin’ny tany dia hitroka ny faikany.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Fa hanambara izany mandrakariva aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hankalaza an’Andriamanitr’i Jakoba.
