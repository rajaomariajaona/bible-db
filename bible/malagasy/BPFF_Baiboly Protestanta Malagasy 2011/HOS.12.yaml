document_id: HOS.12,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny laingan’i Efraima
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manodidina Ahy amin’ny lainga i Efraima
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary amin’ny fitaka ny taranak’Israely;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa i Joda dia mbola miaraka amin’Andriamanitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay masina sy mahatoky ihany.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izaho no TOMPO Andriamanitrao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hatrany amin’ny tany Ejipta;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mbola hampitoetra anao an-day indray Aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tahaka ny tamin’ny andro firavoravoana.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Niteny tamin’ny mpaminany koa Aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady nahabetsaka ny fahitana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny mpaminany dia nampilazako fanoharana.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha tena olon-dratsy i Gileada
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ho tonga zava-poana tokoa izy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tany Gilgala no namonoany omby betsaka ho fanatitra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: koa ny alitarany dia ho toy ny korontam-bato
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny am-bava asa any an-tsaha.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nandositra ho any amin’ny tany Arama i Jakoba,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nanompo hahazoany vady Israely;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, ny hahazoany vady no niandrasany ondry aman’osy.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mpaminany no noentin’NY TOMPO
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nitondra ny Israely nivoaka avy tany Ejipta,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mpaminany koa no noentina niahy azy.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nanao izay nahasosotra sy nahatezitra i Efraima,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka havelan’ny Tompony ho eo aminy ny rany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hatsingeriny aminy ny vava ratsy nataony.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Homan-drivotra i Efraima
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady manenjika ny rivotra avy any atsinanana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mandritra ny andro dia ataony betsaka ny lainga sy ny fampihorohoroana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: manao fanekena amin’ny Asiriana izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mitondra diloilo ho any Ejipta.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: I Jakoba, ilay mpamitaka, no razamben’ny Israely
    marker-yv: yv-h
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manana ady amin’i Joda koa NY TOMPO
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy maintsy mamaly an’i Jakoba araka ny lalany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hatsingeriny aminy ny nataony.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fony mbola tany am-bohoka izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia nihazona ny voditongotry ny rahalahiny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary rehefa lehibe izy dia nitolona tamin’Andriamanitra.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, nitolona tamin’ilay Anjely izy ka nahery;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nitomany izy sady nifona Taminy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nahita azy tao Betela Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tao no niresahany tamintsika;
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: NY TOMPO, Andriamanitra Tompon’izao rehetra izao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: NY TOMPO no hahatsiarovana Azy.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa miverena amin’Andriamanitrao ianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tandremo ny fahitsiana sy ny rariny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: miandrasa an’Andriamanitrao mandrakariva.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Misy mizana miangatra eny an-tanan’ny mpivaro-mandeha;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny manambaka no tiany.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Fa hoy i Efraima:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fiharian-karena ihany no nataoko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka nahazo fananana aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy misy nahatonga fahotana na heloka ho ahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny asako rehetra.
