document_id: HOS.12,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny laingan’i Efraima
  - type: text
    content: Manodidina Ahy amin’ny lainga i Efraima
  - type: text
    content: ary amin’ny fitaka ny taranak’Israely;
  - type: text
    content: nefa i Joda dia mbola miaraka amin’Andriamanitra
  - type: text
    content: izay masina sy mahatoky ihany.
  '10':
  - type: text
    content: Izaho no TOMPO Andriamanitrao
  - type: text
    content: hatrany amin’ny tany Ejipta;
  - type: text
    content: mbola hampitoetra anao an-day indray Aho
  - type: text
    content: tahaka ny tamin’ny andro firavoravoana.
  '11':
  - type: text
    content: Niteny tamin’ny mpaminany koa Aho
  - type: text
    content: sady nahabetsaka ny fahitana,
  - type: text
    content: ary ny mpaminany dia nampilazako fanoharana.
  '12':
  - type: text
    content: Raha tena olon-dratsy i Gileada
  - type: text
    content: dia ho tonga zava-poana tokoa izy.
  - type: text
    content: Tany Gilgala no namonoany omby betsaka ho fanatitra;
  - type: text
    content: koa ny alitarany dia ho toy ny korontam-bato
  - type: text
    content: eny am-bava asa any an-tsaha.
  '13':
  - type: text
    content: Nandositra ho any amin’ny tany Arama i Jakoba,
  - type: text
    content: nanompo hahazoany vady Israely;
  - type: text
    content: eny, ny hahazoany vady no niandrasany ondry aman’osy.
  '14':
  - type: text
    content: Mpaminany no noentin’NY TOMPO
  - type: text
    content: nitondra ny Israely nivoaka avy tany Ejipta,
  - type: text
    content: ary mpaminany koa no noentina niahy azy.
  '15':
  - type: text
    content: Nanao izay nahasosotra sy nahatezitra i Efraima,
  - type: text
    content: ka havelan’ny Tompony ho eo aminy ny rany
  - type: text
    content: ary hatsingeriny aminy ny vava ratsy nataony.
  '2':
  - type: text
    content: Homan-drivotra i Efraima
  - type: text
    content: sady manenjika ny rivotra avy any atsinanana;
  - type: text
    content: mandritra ny andro dia ataony betsaka ny lainga sy ny fampihorohoroana;
  - type: text
    content: manao fanekena amin’ny Asiriana izy
  - type: text
    content: ary mitondra diloilo ho any Ejipta.
  - type: heading
    content: I Jakoba, ilay mpamitaka, no razamben’ny Israely
  '3':
  - type: text
    content: Manana ady amin’i Joda koa NY TOMPO
  - type: text
    content: ary tsy maintsy mamaly an’i Jakoba araka ny lalany
  - type: text
    content: ka hatsingeriny aminy ny nataony.
  '4':
  - type: text
    content: Fony mbola tany am-bohoka izy
  - type: text
    content: dia nihazona ny voditongotry ny rahalahiny
  - type: text
    content: ary rehefa lehibe izy dia nitolona tamin’Andriamanitra.
  '5':
  - type: text
    content: Eny, nitolona tamin’ilay Anjely izy ka nahery;
  - type: text
    content: nitomany izy sady nifona Taminy.
  - type: text
    content: Nahita azy tao Betela Izy
  - type: text
    content: ary tao no niresahany tamintsika;
  '6':
  - type: text
    content: NY TOMPO, Andriamanitra Tompon’izao rehetra izao,
  - type: text
    content: NY TOMPO no hahatsiarovana Azy.
  '7':
  - type: text
    content: Koa miverena amin’Andriamanitrao ianao,
  - type: text
    content: tandremo ny fahitsiana sy ny rariny,
  - type: text
    content: miandrasa an’Andriamanitrao mandrakariva.
  '8':
  - type: text
    content: Misy mizana miangatra eny an-tanan’ny mpivaro-mandeha;
  - type: text
    content: ny manambaka no tiany.
  '9':
  - type: text
    content: 'Fa hoy i Efraima:'
  - type: text
    content: Fiharian-karena ihany no nataoko
  - type: text
    content: ka nahazo fananana aho;
  - type: text
    content: tsy misy nahatonga fahotana na heloka ho ahy
  - type: text
    content: ny asako rehetra.
