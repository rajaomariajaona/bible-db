document_id: LUK.14,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fanasitranana hafa indray tamin’ny andro Sabata
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha niditra mba hisakafo tao an-tranon’ny loholona iray amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Fariseo
    - type: text
      text: ' Izy tamin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Sabata
    - type: text
      text: ' dia nanara-maso Azy ireo. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa raha misy manasa anao, mandehana ka mipetraha amin’ny toerana any aoriana indrindra, ary rehefa tonga ilay nanasa anao dia hiteny aminao hoe: Ry sakaiza, mandrosoa etsy alohaloha kokoa; dia hahazo haja eo imason’izay rehetra miara-misakafo aminao ianao. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa izay rehetra manandra-tena no haetry ary izay manetry tena kosa no hasandratra.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fanasana ny mahantra
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy kosa Jesosy tamin’ilay nanasa Azy: Raha manasa olona amin’ny sakafo antoandro na ny sakafo hariva ianao dia aza ny namanao na ny rahalahinao na ny havanao na ny mpiaramonina manankarena no asainao, fandrao hanasa anao koa ireo ka ho voavaliny izay nataonao taminy. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa raha manao fanasana ianao dia asao ny mahantra, ny kilemaina, ny mandringa, ny jamba; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: dia ho sambatra ianao satria tsy mba manana havaly izay nataonao ireo; fa hovalìna kosa ianao amin’ny fitsanganan’ny marina.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fanoharana ny amin’ilay fanasana lehibe
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mat 22.1-14
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny iray tamin’izay niara-nisakafo Taminy dia nandre izany ka niteny taminy hoe: Sambatra izay hisakafo ao amin’ny fanjakan’Andriamanitra.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy Jesosy taminy: Nisy olona iray nanao fanasana lehibe ka nanasa olona maro. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary naniraka ny mpanompony izy tamin’ny fotoana fisakafoanana mba hilaza amin’ireo efa nasaina hoe: Andeha, fa efa vonona izao ny fanasana. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa nitovy saina izy rehetra ka samy niala tsiny. Hoy ny voalohany taminy: Efa nividy tany aho ka tsy maintsy mandeha hizaha azy; miangavy anao aho, ekeo ny fialan-tsiniko. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy koa ny iray: Efa nividy omby folo aho ka handeha hamantatra azy; miangavy anao aho, ekeo ny fialan-tsiniko. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary indro, nisy olona manirano iray teo anatrehany. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy koa ny iray: Efa nampaka-bady aho, koa noho izany dia tsy afaka mankany. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nony tonga ilay mpanompo dia nambarany tamin’ny tompony izany. Dia tezitra ny tompon-trano ka nilaza tamin’ilay mpanompony hoe: Mandehana haingana ho eny amin’ny lalambe sy ny sakeli-dalana eto an-tanàna ka ampidiro ny mahantra sy ny kilemaina, ny jamba sy ny mandringa. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy ilay mpanompo: Tompoko, efa tanteraka izay nampanaovinao, nefa mbola tsy feno ihany ny trano. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy ny tompony tamin’ilay mpanompo: Mandehana ho eny amin’ny lalambe sy ny sisim-boly ka tereo ny olona hiditra mba ho feno ny tranoko. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa lazaiko aminareo: Tsy hisy hanandrana ny nahandroko ireny olona nasaiko ireny na dia iray akory aza.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mahafoy ny zavatra rehetra noho ny fanarahana an’i Jesosy
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mat 10.37-38
    marker-yv: yv-h
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nisy vahoaka betsaka niaraka tamin’i Jesosy, dia nitodika Izy ka niteny taminy hoe:'
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha misy manaraka Ahy ka tsy mankahala ny rainy sy ny reniny, ny vadiny sy ny zanany, ny rahalahiny sy ny anabaviny; eny, ny ainy koa aza, dia tsy azo ekena ho mpianatro izy. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Na zovy na zovy no tsy mitondra ny hazofijaliana ka tsy manaraka Ahy dia tsy azo ekena ho mpianatro izy.
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa iza moa aminareo, raha ta hanangana tilikambo, no tsy mipetraka aloha mihevitra izay ho lany hanaovany izany, na misy hahavitany azy na tsia? '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fandrao, rehefa mametraka ny fanorenana izy ka tsy mahavita, dia handatsa azy izay rehetra mahita '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Jesosy tamin’ireo mpahay lalàna sy ny Fariseo: Mety va ny manasitrana amin’ny Sabata sa tsia? '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ka hilaza hoe: Io olona io dia nanomboka nanorina trano fa tsy nahavita. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary iza moa no mpanjaka, raha handeha hiady amin’ny mpanjaka hafa, no tsy mipetraka aloha mba haka hevitra tsara, na ho vitany na tsia, miaraka amin’ny olona iray alina, ny hifanandrina amin’ilay mitondra roa alina? '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa raha tsy izany, raha mbola lavitra ny mpanjaka iray, dia hampitondra teny izy ka hangataka fihavanana. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Toy izany koa ianareo rehetra, izay tsy mahafoy izay rehetra anananareo, dia tsy azo ekena ho mpianatro.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Raha ny sira no tonga matsatso
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mat 5.13; Mar 9.50
    marker-yv: yv-h
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsara ny sira; fa raha ny sira no tonga matsatso, inona indray no hahasira azy? '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tsy mahasoa ny tany na ny zezika izy, fa harian’ny olona. Izay manan-tsofina hoenti-mihaino, aoka izy hihaino.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa tsy nahateny izy ireo. Ary nandray ilay marary Izy dia nanasitrana azy ka nandefa azy handeha. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nilaza tamin’ireo Izy hoe: Iza moa aminareo, raha manana boriky na omby latsaka ao an-davaka fantsakana, no tsy hampakatra azy avy hatrany na dia amin’ny andro Sabata aza? '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary tsy nahavaly ny amin’izany zavatra izany izy ireo.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mifidy ny toerana any aoriana
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nilaza fanoharana tamin’izay nasaina Jesosy, raha nahita azy ireo nifidy ny toerana teny aloha, ka niteny taminy hoe: '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha misy manasa anao ho any amin’ny fampakaram-bady, aza mipetraka amin’ny toerana eny aloha, fandrao hisy olona nasaina izay mihaja kokoa noho ianao, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary ho avy izy sy ilay nanasa anao ka hilaza aminao hoe: Omeo toerana io olona io, dia ho menatra ianao ka hifindra ho amin’ny toerana any aoriana indrindra. '
