document_id: HOS.5,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fampitandremana ho an’ny mpisorona sy ny mpanjaka
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Henoinareo izao, ry mpisorona!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mihainoa, ry taranak’Israely!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Atongilano ny sofinareo, ry mpianakavin’ny mpanjaka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ianareo no hiharan’ny fitsarana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria tonga fandrika ao Mizpa ianareo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary fandrika harato voavelatra ao Tabara.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Ny mpanapaka an’i Joda
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia efa tonga toy izay mamindra ny fetran’ny faritany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: koa ireo no hampidinako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny fahatezerako toy ny riaka.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Ampahoriana i Efraima
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady voatorotoron’ny fitsarana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria ninia nanaraka zava-poana izy.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Koa amin’i Efraima Aho dia tahaka ny kalalao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary amin’ny taranak’i Joda dia toy ny fahalovana.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Hitan’i Efraima ny aretiny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hitan’i Joda ny feriny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia nankany Asiria i Efraima;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, nandefa iraka ho any amin’i Jareba
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Jareba: Mpandahatra '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'na '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Mpiady.
      marker-yv: yv-n
    - type: text
      text: ' mpanjaka izy;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa sady tsy mahasitrana anareo izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no tsy mahatsabo ny ferinareo,
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: satria amin’i Efraima dia tahaka ny liona Aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary amin’ny taranak’i Joda dia tahaka ny liona tanora.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izaho dia Izaho no mamiravira dia lasa mandeha.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lasako izy ka tsy misy mahavonjy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Tapa-kevitra hiala Andriamanitra
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Handeha hody any amin’ny fitoerako Aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ambara-piaikiny ny helony sy hitadiavany ny tavako.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hitady Ahy fatratra izy rehefa azom-pahoriana.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Misy mpivadika fatra-mpamono,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa Izaho kosa dia famaizana ho azy rehetra.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Izaho dia mahalala an’i Efraima
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy miafina Amiko Israely;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ankehitriny ianao, ry Efraima,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia tonga mpijangajanga
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka voaloto Israely.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Tsy avelan’ny ataony hiverina amin’Andriamanitra izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria ny fanahim-pijangajangana no ao anatiny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy mahalala NY TOMPO izy.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Vavolombelona manameloka azy ny avonavon’ny Israely;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho lavon-keloka Israely sy i Efraima;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hiara-lavo amin’izy ireo koa i Joda.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Hitondra ny omby aman’ondriny izy ka handeha hitady NY TOMPO
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa tsy hahita Azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria NY TOMPO efa niala taminy.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Nivadika tamin’NY TOMPO izy ireo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria niteraka zazasary;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ankehitriny dia ho levonin’ny voaloham-bolana izy mbamin’ny anjara lovany.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny adin’i Efraima sy i Joda
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Tsofy ao Gibea ny anjomara
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ao Rama ny trompetra!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miantsoantsoa mafy ao Bety-Avena!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jereo ao aoriananao ry Benjamina!
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Ho lao i Efraima raha tonga amin’ny andro fanamelohana.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Zavatra tsy maintsy ho to no nampahafantariko teo amin’ireo fokon’ny Israely.
