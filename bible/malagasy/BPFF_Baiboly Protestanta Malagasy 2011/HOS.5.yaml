document_id: HOS.5,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Fampitandremana ho an’ny mpisorona sy ny mpanjaka
  - type: text
    content: Henoinareo izao, ry mpisorona!
  - type: text
    content: Mihainoa, ry taranak’Israely!
  - type: text
    content: Atongilano ny sofinareo, ry mpianakavin’ny mpanjaka,
  - type: text
    content: fa ianareo no hiharan’ny fitsarana
  - type: text
    content: satria tonga fandrika ao Mizpa ianareo
  - type: text
    content: ary fandrika harato voavelatra ao Tabara.
  '10':
  - type: text
    content: Ny mpanapaka an’i Joda
  - type: text
    content: dia efa tonga toy izay mamindra ny fetran’ny faritany,
  - type: text
    content: koa ireo no hampidinako
  - type: text
    content: ny fahatezerako toy ny riaka.
  '11':
  - type: text
    content: Ampahoriana i Efraima
  - type: text
    content: sady voatorotoron’ny fitsarana
  - type: text
    content: satria ninia nanaraka zava-poana izy.
  '12':
  - type: text
    content: Koa amin’i Efraima Aho dia tahaka ny kalalao
  - type: text
    content: ary amin’ny taranak’i Joda dia toy ny fahalovana.
  '13':
  - type: text
    content: Hitan’i Efraima ny aretiny
  - type: text
    content: ary hitan’i Joda ny feriny;
  - type: text
    content: dia nankany Asiria i Efraima;
  - type: text
    content: eny, nandefa iraka ho any amin’i Jareba
  - type: note
    content: 'Jareba: Mpandahatra na Mpiady.'
  - type: text
    content: ' mpanjaka izy;'
  - type: text
    content: nefa sady tsy mahasitrana anareo izy
  - type: text
    content: no tsy mahatsabo ny ferinareo,
  '14':
  - type: text
    content: satria amin’i Efraima dia tahaka ny liona Aho,
  - type: text
    content: ary amin’ny taranak’i Joda dia tahaka ny liona tanora.
  - type: text
    content: Izaho dia Izaho no mamiravira dia lasa mandeha.
  - type: text
    content: Lasako izy ka tsy misy mahavonjy.
  - type: heading
    content: Tapa-kevitra hiala Andriamanitra
  '15':
  - type: text
    content: Handeha hody any amin’ny fitoerako Aho
  - type: text
    content: ambara-piaikiny ny helony sy hitadiavany ny tavako.
  - type: text
    content: Hitady Ahy fatratra izy rehefa azom-pahoriana.
  '2':
  - type: text
    content: Misy mpivadika fatra-mpamono,
  - type: text
    content: fa Izaho kosa dia famaizana ho azy rehetra.
  '3':
  - type: text
    content: Izaho dia mahalala an’i Efraima
  - type: text
    content: ary tsy miafina Amiko Israely;
  - type: text
    content: ankehitriny ianao, ry Efraima,
  - type: text
    content: dia tonga mpijangajanga
  - type: text
    content: ka voaloto Israely.
  '4':
  - type: text
    content: Tsy avelan’ny ataony hiverina amin’Andriamanitra izy
  - type: text
    content: satria ny fanahim-pijangajangana no ao anatiny
  - type: text
    content: ary tsy mahalala NY TOMPO izy.
  '5':
  - type: text
    content: Vavolombelona manameloka azy ny avonavon’ny Israely;
  - type: text
    content: ho lavon-keloka Israely sy i Efraima;
  - type: text
    content: hiara-lavo amin’izy ireo koa i Joda.
  '6':
  - type: text
    content: Hitondra ny omby aman’ondriny izy ka handeha hitady NY TOMPO
  - type: text
    content: nefa tsy hahita Azy
  - type: text
    content: satria NY TOMPO efa niala taminy.
  '7':
  - type: text
    content: Nivadika tamin’NY TOMPO izy ireo
  - type: text
    content: satria niteraka zazasary;
  - type: text
    content: ankehitriny dia ho levonin’ny voaloham-bolana izy mbamin’ny anjara lovany.
  - type: heading
    content: Ny adin’i Efraima sy i Joda
  '8':
  - type: text
    content: Tsofy ao Gibea ny anjomara
  - type: text
    content: ary ao Rama ny trompetra!
  - type: text
    content: Miantsoantsoa mafy ao Bety-Avena!
  - type: text
    content: Jereo ao aoriananao ry Benjamina!
  '9':
  - type: text
    content: Ho lao i Efraima raha tonga amin’ny andro fanamelohana.
  - type: text
    content: Zavatra tsy maintsy ho to no nampahafantariko teo amin’ireo fokon’ny Israely.
