document_id: JOB.33
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Ny fandresen-dahatra ataon’i Eliho: Mampitandrina ny olona Andriamanitra'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Kanefa, miangavy anao aho, ry Joba, mihainoa izay alahatro
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary atongilano ny sofinao amin’ny teniko rehetra!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Indro, manoka-bava aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: miteny ato am-bavako ny lelako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ny hitsim-poko no hiseho amin’ny teniko
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny fahalalan’ny molotro no holazaina tsy hasiana fitaka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ny Fanahin’Andriamanitra no efa nanao ahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny fofonain’ny Tsitoha no mamelona ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Raha hainao, valio ary aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: miomàna ianao ka miatreha tsara.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Indro, eo anatrehan’Andriamanitra aho dia mitovy aminao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, izaho koa dia mba nosombinana avy tamin’ny tanimanga.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Indro, ny fampahatahorana avy amiko dia tsy hampahatahotra anao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy hitambesatra aminao ny tanako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Efa nilaza teo anatrehako mihitsy ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ary efa reko ihany ny feon’ny teninao hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Madio tsy manam-pahadisoana aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy manan-tsiny aman-keloka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: E! Mahita izay hanatsiniana ahy foana Andriamanitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ataony fahavalony aho;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: mampiditra ny tongotro ao amin’ny boloky hazo Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mitsongo ny diako rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: E! Izany no tsy mahamarina anao, hoy aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa Andriamanitra dia lehibe loatra ka tsy leon’ny zanak’olombelona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Koa nahoana no manome tsiny Azy ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: noho ny tsy nampisehoany izay antony amin’ny ataony?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Kanefa misy fomba iray itenenan’Andriamanitra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, fomba roa aza, nefa tsy tandrin’ny olona izany,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: dia ny nofy sy ny tsindrimandry amin’ny alina.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Raha sondrian-tory iny ny olona
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka renoka eo am-pandriana
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: dia manokatra ny sofin’ny olona Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka manisy tombo-kase ny fananarany azy
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: mba hampiala ny olona amin’ny fanaony
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy hiaro azy amin’ny fireharehana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Miaro ny fanahiny tsy ho any an-davaka Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny ainy mba tsy ho voan’ny fiadiana atoraka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Anarina amin’ny fanaintainana eo am-pandrianany koa izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy amin’ny fikotrankotran’ny taolany lalandava;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: mankaloiloy azy ny hanina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, na ny hanim-py aza dia tsy tiany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Mihena ny nofony ka tsy hita
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mitranitrany ny taolany izay tsy hita teo;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: dia manakaiky ny lavaka ny fanahiny
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary manatona ny mpaka aina ny ainy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Raha misy anjely ho mpanalalana ho azy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: iray amin’ny arivo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hanoro izay tokony halehan’ny olona,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'ary hamindra fo aminy ka niteny hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vonjeo izy mba tsy hidina any an-davaka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa efa nahita avotra aho,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: dia ho tsara noho ny an’ny tanora ny nofony
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hody ho toy ny tamin’ny andron’ny fahatanorany izy;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: hivavaka amin’Andriamanitra izy ka hankasitrahany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hahita ny tavany amin’ny hafaliana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa hampodiny amin’ny zanak’olombelona ny fahamarinany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Dia hihira izy ka hilaza amin’ny olona hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Efa nanota aho fa nanao ny rariny ho heloka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: kanefa tsy novaliana araka ny nataoko;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: fa navotany ny fanahiko mba tsy hivarina any an-davaka
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mifaly ny aiko amin’ny fahitana ny mazava.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Indro, izany rehetra izany no ataon’Andriamanitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: indroa amin’ny olona; eny, intelo aza,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: mba hamerina ny fanahiny tsy ho any an-davaka
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hihazavany amin’ny fahazavan’ny velona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Tandremo, ry Joba, ka mihainoa ahy!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mangìna kely aloha ianao fa mbola hiteny aho!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Raha manan-kavaly ianao dia mamalia ahy ihany!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mitenena, fa ta hanamarina anao aho!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Fa raha tsy manan-kavaly ianao dia mihainoa ahy kosa!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mangìna tsara, fa hampianariko fahendrena ianao!
