document_id: JOB.33,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: 'Ny fandresen-dahatra ataon’i Eliho: Mampitandrina ny olona Andriamanitra'
  - type: text
    content: Kanefa, miangavy anao aho, ry Joba, mihainoa izay alahatro
  - type: text
    content: ary atongilano ny sofinao amin’ny teniko rehetra!
  '10':
  - type: text
    content: E! Mahita izay hanatsiniana ahy foana Andriamanitra
  - type: text
    content: ary ataony fahavalony aho;
  '11':
  - type: text
    content: mampiditra ny tongotro ao amin’ny boloky hazo Izy
  - type: text
    content: ary mitsongo ny diako rehetra.
  '12':
  - type: text
    content: E! Izany no tsy mahamarina anao, hoy aho;
  - type: text
    content: fa Andriamanitra dia lehibe loatra ka tsy leon’ny zanak’olombelona.
  '13':
  - type: text
    content: Koa nahoana no manome tsiny Azy ianao
  - type: text
    content: noho ny tsy nampisehoany izay antony amin’ny ataony?
  '14':
  - type: text
    content: Kanefa misy fomba iray itenenan’Andriamanitra;
  - type: text
    content: eny, fomba roa aza, nefa tsy tandrin’ny olona izany,
  '15':
  - type: text
    content: dia ny nofy sy ny tsindrimandry amin’ny alina.
  - type: text
    content: Raha sondrian-tory iny ny olona
  - type: text
    content: ka renoka eo am-pandriana
  '16':
  - type: text
    content: dia manokatra ny sofin’ny olona Izy
  - type: text
    content: ka manisy tombo-kase ny fananarany azy
  '17':
  - type: text
    content: mba hampiala ny olona amin’ny fanaony
  - type: text
    content: sy hiaro azy amin’ny fireharehana.
  '18':
  - type: text
    content: Miaro ny fanahiny tsy ho any an-davaka Izy
  - type: text
    content: ary ny ainy mba tsy ho voan’ny fiadiana atoraka.
  '19':
  - type: text
    content: Anarina amin’ny fanaintainana eo am-pandrianany koa izy
  - type: text
    content: sy amin’ny fikotrankotran’ny taolany lalandava;
  '2':
  - type: text
    content: Indro, manoka-bava aho,
  - type: text
    content: miteny ato am-bavako ny lelako.
  '20':
  - type: text
    content: mankaloiloy azy ny hanina;
  - type: text
    content: eny, na ny hanim-py aza dia tsy tiany.
  '21':
  - type: text
    content: Mihena ny nofony ka tsy hita
  - type: text
    content: ary mitranitrany ny taolany izay tsy hita teo;
  '22':
  - type: text
    content: dia manakaiky ny lavaka ny fanahiny
  - type: text
    content: ary manatona ny mpaka aina ny ainy.
  '23':
  - type: text
    content: Raha misy anjely ho mpanalalana ho azy,
  - type: text
    content: iray amin’ny arivo,
  - type: text
    content: hanoro izay tokony halehan’ny olona,
  '24':
  - type: text
    content: 'ary hamindra fo aminy ka niteny hoe:'
  - type: text
    content: Vonjeo izy mba tsy hidina any an-davaka,
  - type: text
    content: fa efa nahita avotra aho,
  '25':
  - type: text
    content: dia ho tsara noho ny an’ny tanora ny nofony
  - type: text
    content: ary hody ho toy ny tamin’ny andron’ny fahatanorany izy;
  '26':
  - type: text
    content: hivavaka amin’Andriamanitra izy ka hankasitrahany
  - type: text
    content: ary hahita ny tavany amin’ny hafaliana,
  - type: text
    content: fa hampodiny amin’ny zanak’olombelona ny fahamarinany.
  '27':
  - type: text
    content: 'Dia hihira izy ka hilaza amin’ny olona hoe:'
  - type: text
    content: Efa nanota aho fa nanao ny rariny ho heloka,
  - type: text
    content: kanefa tsy novaliana araka ny nataoko;
  '28':
  - type: text
    content: fa navotany ny fanahiko mba tsy hivarina any an-davaka
  - type: text
    content: ary mifaly ny aiko amin’ny fahitana ny mazava.
  '29':
  - type: text
    content: Indro, izany rehetra izany no ataon’Andriamanitra
  - type: text
    content: indroa amin’ny olona; eny, intelo aza,
  '3':
  - type: text
    content: Ny hitsim-poko no hiseho amin’ny teniko
  - type: text
    content: ary ny fahalalan’ny molotro no holazaina tsy hasiana fitaka.
  '30':
  - type: text
    content: mba hamerina ny fanahiny tsy ho any an-davaka
  - type: text
    content: mba hihazavany amin’ny fahazavan’ny velona.
  '31':
  - type: text
    content: Tandremo, ry Joba, ka mihainoa ahy!
  - type: text
    content: Mangìna kely aloha ianao fa mbola hiteny aho!
  '32':
  - type: text
    content: Raha manan-kavaly ianao dia mamalia ahy ihany!
  - type: text
    content: Mitenena, fa ta hanamarina anao aho!
  '33':
  - type: text
    content: Fa raha tsy manan-kavaly ianao dia mihainoa ahy kosa!
  - type: text
    content: Mangìna tsara, fa hampianariko fahendrena ianao!
  '4':
  - type: text
    content: Ny Fanahin’Andriamanitra no efa nanao ahy
  - type: text
    content: ary ny fofonain’ny Tsitoha no mamelona ahy.
  '5':
  - type: text
    content: Raha hainao, valio ary aho,
  - type: text
    content: miomàna ianao ka miatreha tsara.
  '6':
  - type: text
    content: Indro, eo anatrehan’Andriamanitra aho dia mitovy aminao;
  - type: text
    content: eny, izaho koa dia mba nosombinana avy tamin’ny tanimanga.
  '7':
  - type: text
    content: Indro, ny fampahatahorana avy amiko dia tsy hampahatahotra anao
  - type: text
    content: ary tsy hitambesatra aminao ny tanako.
  '8':
  - type: text
    content: Efa nilaza teo anatrehako mihitsy ianao
  - type: text
    content: 'ary efa reko ihany ny feon’ny teninao hoe:'
  '9':
  - type: text
    content: Madio tsy manam-pahadisoana aho
  - type: text
    content: ary tsy manan-tsiny aman-keloka.
