document_id: LUK.24,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fitsanganan’i Jesosy tamin’ny maty
  - type: heading
    content: Mat 28.1-8; Mar 16.1-8; Jao 20.1-13
  - type: text
    content: 'Vao maraina be, tamin’ny andro voalohany amin’ny herinandro, dia nankany amin’ny fasana izy ireo nitondra ny zavamanitra izay efa nomaniny. '
  '10':
  - type: text
    content: 'Teo i Maria Magdalena sy i Johana ary i Maria, renin’i Jakoba; ary ny vehivavy sasany izay naman’ireo koa dia nilaza izany tamin’ny Apostoly. '
  '11':
  - type: text
    content: 'Nefa noheverin’ireo ho arirarira ihany izany teny izany ka tsy ninoany. '
  '12':
  - type: text
    content: Fa nitsangana i Petera dia nihazakazaka nankany amin’ny fasana; ary niondrika izy ka nahita ny lambam-paty mipetraka mitokana; dia lasa nody izy sady gaga noho ny zavatra izay nitranga teo.
  - type: heading
    content: Teny an-dalana nankany Emaosy
  - type: heading
    content: Mar 16.12-13
  '13':
  - type: text
    content: 'Indreo, nisy roa lahy tamin’izy ireo nandeha tamin’izany andro izany hankany amin’ny vohitra atao hoe Emaosy, tokony ho enimpolo stadio avy eo Jerosalema. '
  '14':
  - type: text
    content: 'Dia niresaka ny amin’izay zava-nitranga rehetra izy. '
  '15':
  - type: text
    content: 'Ary raha mbola niresaka sy niady hevitra izy ireo dia nanatona Jesosy ka niaraka taminy. '
  '16':
  - type: text
    content: 'Nefa nosakanana ny mason’ireo mba tsy hahafantarany Azy. '
  '17':
  - type: text
    content: 'Ary hoy Izy taminy: Inona izany resahinareo etỳ am-pandehanana izany? Dia nijanona ireo sady nalahelo tarehy. '
  '18':
  - type: text
    content: 'Ary ny iray, izay atao hoe Kleopasy, dia namaly hoe: Ianao irery va no vahiny mitoetra ao Jerosalema izay tsy mba mahalala ny zava-nitranga tao, amin’izao andro izao? '
  '19':
  - type: text
    content: 'Fa hoy Izy taminy: Zavatra inona moa izany? Ary hoy izy roa lahy taminy: Ny amin’i Jesosy avy any Nazareta, mpaminany mahery tamin’ny asa sy ny teny teo anatrehan’Andriamanitra sy ny vahoaka rehetra, '
  '2':
  - type: text
    content: 'Ary hitany fa indro, ny vato efa voakodia niala tamin’ny fasana. '
  '20':
  - type: text
    content: 'dia ny amin’ny nanoloran’ireo lehiben’ny mpisorona sy ny mpanapaka eto amintsika Azy hanamelohany Azy ho faty sy ny nanomboany Azy tamin’ny hazofijaliana. '
  '21':
  - type: text
    content: 'Nefa nantenainay fa Izy no Ilay efa hanavotra ny Israely; ary tsy izany ihany, fa androany no andro fahatelo taorianan’ny nitrangan’izany. '
  '22':
  - type: text
    content: 'Nefa koa ny vehivavy sasany namanay dia nahavery hevitra anay, fa tany amin’ny fasana vao maraina be izy ireo '
  '23':
  - type: text
    content: 'ka tsy nahita ny faty, dia tonga ka nilaza fa nahita anjely niseho, izay nilaza fa velona Izy. '
  '24':
  - type: text
    content: 'Dia nandeha nankany amin’ny fasana ny sasany izay miaraka aminay, ary nahita araka izay nolazain’ny vehivavy; nefa tsy hitany Izy. '
  '25':
  - type: text
    content: 'Ary hoy Izy taminy: Ry adala sy votsa saina ka tsy mino izay rehetra nolazain’ny mpaminany! '
  '26':
  - type: text
    content: 'Moa tsy tokony ho niaritra izany va '
  - type: text
    content: Kristy
  - type: text
    content: ' ka hiditra any amin’ny voninahiny? '
  '27':
  - type: text
    content: Dia nanomboka hatramin’i Mosesy sy ny mpaminany rehetra Izy ka nanambara taminy ny hevitry ny teny milaza Azy ao amin’ny Soratra Masina rehetra.
  '28':
  - type: text
    content: 'Rehefa akaiky ny vohitra izay halehan’izy roa lahy, Jesosy kosa, dia toa nikasa handeha lavitra kokoa. '
  '29':
  - type: text
    content: 'Fa izy roa lahy dia nanery Azy hoe: Mitoera atỳ aminay; fa efa ho hariva izao ka lasan-davitra ny andro. Dia niditra hitoetra tao amin’izy ireo Izy. '
  '3':
  - type: text
    content: 'Dia niditra izy ireo, nefa tsy nahita ny fatin’i Jesosy Tompo. '
  '30':
  - type: text
    content: 'Rehefa nipetraka hisakafo niaraka taminy Izy dia nandray ny mofo ka nisaotra sy namaky izany ary nanome azy ireo. '
  '31':
  - type: text
    content: 'Dia nahiratra ny mason’ireo ka nahafantatra Azy; fa Izy kosa dia tonga tsy hitany. '
  '32':
  - type: text
    content: 'Dia nifampiresaka izy ireo hoe: Tsy nangorakoraka va ny fontsika, raha niresaka tamintsika teny an-dalana Izy ka namoaka ny hevitry ny Soratra Masina tamintsika?'
  '33':
  - type: text
    content: 'Dia niainga tamin’izany ora izany izy roa lahy ka niverina nankany Jerosalema, ary nahita ny iraika amby folo lahy mbamin’izay niaraka taminy tafangona teo '
  '34':
  - type: text
    content: 'sady nilaza hoe: Efa nitsangana marina tokoa ny Tompo ka efa niseho tamin’i Simona. '
  '35':
  - type: text
    content: Ary ireo kosa dia nilaza izay efa niseho teny an-dalana sy ny nahafantarany Azy teo am-pamakiana ny mofo.
  - type: heading
    content: Ny nisehoan’i Jesosy tamin’ny mpianany
  - type: heading
    content: Jao 20.19-23
  '36':
  - type: text
    content: 'Raha mbola nilaza izany izy ireo dia nitsangana teo afovoany Jesosy ka niteny taminy hoe: Fiadanana ho anareo. '
  '37':
  - type: text
    content: 'Dia taitra sady raiki-tahotra izy ireo satria nihevitra ho nahita matoatoa. '
  '38':
  - type: text
    content: 'Nefa hoy Jesosy taminy: Nahoana no taitra ianareo? Ary nahoana no tonga ao am-ponareo ny fisalasalana? '
  '39':
  - type: text
    content: 'Jereo ny tanako sy ny tongotro, fa Izaho no Izy; tsapao Aho ka jereo, fa ny matoatoa dia tsy mba manana nofo sy taolana, tahaka izao ahitanareo Ahy izao. '
  '4':
  - type: text
    content: 'Raha mbola very hevitra tamin’izany izy ireo, indreo, nisy roa lahy niseho taminy nitafy fitafiana mamirapiratra. '
  '40':
  - type: text
    content: 'Rehefa niteny izany Izy dia nasehony azy ny tanany sy ny tongony. '
  '41':
  - type: text
    content: 'Ary raha mbola tsy nino ihany izy ireo noho ny hafaliana sady mbola talanjona dia hoy Jesosy taminy: Manana zavatra azo hanina va ianareo atỳ? '
  '42':
  - type: text
    content: 'Dia nomeny tapaky ny hazandrano voatono sy tantely Izy. '
  '43':
  - type: text
    content: Dia noraisiny izany ka nohaniny teo anatrehan’ireo.
  '44':
  - type: text
    content: 'Dia hoy Izy taminy: Izao no teniko izay efa voalazako taminareo, fony mbola teo aminareo Aho, fa tsy maintsy ho tanteraka izay rehetra voasoratra momba Ahy ao amin’ny lalànan’i Mosesy sy ny Mpaminany ary ny Salamo. '
  '45':
  - type: text
    content: 'Dia nanokatra ny sain’ireo Izy hahalala ny Soratra Masina. '
  '46':
  - type: text
    content: 'Ary hoy Izy taminy: Toy izao no voasoratra: '
  - type: text
    content: Kristy
  - type: text
    content: ' hiaritra ka hitsangana amin’ny maty amin’ny andro fahatelo; '
  '47':
  - type: text
    content: 'ary hotorina amin’ny anarany ny fibebahana sy ny famelan-keloka amin’ny firenena rehetra, manomboka eto Jerosalema. '
  '48':
  - type: text
    content: 'Ianareo no vavolombelon’izany. '
  '49':
  - type: text
    content: Ary indro Aho mampitondra ny teny fikasan’ny Raiko ho anareo; fa mitoera eto an-tanàna mandra-pahavoatafy hery anareo avy any amin’ny avo.
  - type: heading
    content: Mar 16.19; Asa 1.4-14
  '5':
  - type: text
    content: 'Raiki-tahotra izy ireo dia niankohoka, koa hoy izy roa lahy taminy: Nahoana no ato amin’ny maty no itadiavanareo ny velona? '
  '50':
  - type: text
    content: 'Ary nitondra azy ireo hatrany Betania Jesosy, dia nanandratra ny tanany ka nitsodrano azy. '
  '51':
  - type: text
    content: 'Raha mbola nitsodrano azy Izy dia nisaraka taminy ka nakarina ho any an-danitra. '
  '52':
  - type: text
    content: 'Ary nitsaoka Azy izy ireo, dia niverina ho any Jerosalema tamin’ny hafaliam-be. '
  '53':
  - type: text
    content: Ary tao amin’ny tempoly isanandro izy ireo ka nankalaza an’Andriamanitra.
  '6':
  - type: text
    content: 'Tsy ato Izy fa efa nitsangana; tsarovy ny teny izay nolazainy taminareo, fony Izy mbola tany Galilia hoe: '
  '7':
  - type: text
    content: 'Ny '
  - type: text
    content: Zanak’Olona
  - type: text
    content: ' tsy maintsy hatolotra eo an-tanan’ny mpanota ka hohomboana amin’ny hazofijaliana ary hitsangana amin’ny andro fahatelo. '
  '8':
  - type: text
    content: Dia tsaroan’izy ireo ny teniny.
  '9':
  - type: text
    content: 'Ary niverina niala tamin’ny fasana izy dia nilaza izany rehetra izany tamin’ny iraika amby folo lahy sy ny namany rehetra. '
