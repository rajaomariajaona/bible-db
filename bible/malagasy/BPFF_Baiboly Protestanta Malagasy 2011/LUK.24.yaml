document_id: LUK.24,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fitsanganan’i Jesosy tamin’ny maty
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mat 28.1-8; Mar 16.1-8; Jao 20.1-13
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Vao maraina be, tamin’ny andro voalohany amin’ny herinandro, dia nankany amin’ny fasana izy ireo nitondra ny zavamanitra izay efa nomaniny. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Teo i Maria Magdalena sy i Johana ary i Maria, renin’i Jakoba; ary ny vehivavy sasany izay naman’ireo koa dia nilaza izany tamin’ny Apostoly. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Nefa noheverin’ireo ho arirarira ihany izany teny izany ka tsy ninoany. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Fa nitsangana i Petera dia nihazakazaka nankany amin’ny fasana; ary niondrika izy ka nahita ny lambam-paty mipetraka mitokana; dia lasa nody izy sady gaga noho ny zavatra izay nitranga teo.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Teny an-dalana nankany Emaosy
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mar 16.12-13
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Indreo, nisy roa lahy tamin’izy ireo nandeha tamin’izany andro izany hankany amin’ny vohitra atao hoe Emaosy, tokony ho enimpolo stadio avy eo Jerosalema. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Dia niresaka ny amin’izay zava-nitranga rehetra izy. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Ary raha mbola niresaka sy niady hevitra izy ireo dia nanatona Jesosy ka niaraka taminy. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Nefa nosakanana ny mason’ireo mba tsy hahafantarany Azy. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Ary hoy Izy taminy: Inona izany resahinareo etỳ am-pandehanana izany? Dia nijanona ireo sady nalahelo tarehy. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Ary ny iray, izay atao hoe Kleopasy, dia namaly hoe: Ianao irery va no vahiny mitoetra ao Jerosalema izay tsy mba mahalala ny zava-nitranga tao, amin’izao andro izao? '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Fa hoy Izy taminy: Zavatra inona moa izany? Ary hoy izy roa lahy taminy: Ny amin’i Jesosy avy any Nazareta, mpaminany mahery tamin’ny asa sy ny teny teo anatrehan’Andriamanitra sy ny vahoaka rehetra, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Ary hitany fa indro, ny vato efa voakodia niala tamin’ny fasana. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'dia ny amin’ny nanoloran’ireo lehiben’ny mpisorona sy ny mpanapaka eto amintsika Azy hanamelohany Azy ho faty sy ny nanomboany Azy tamin’ny hazofijaliana. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Nefa nantenainay fa Izy no Ilay efa hanavotra ny Israely; ary tsy izany ihany, fa androany no andro fahatelo taorianan’ny nitrangan’izany. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Nefa koa ny vehivavy sasany namanay dia nahavery hevitra anay, fa tany amin’ny fasana vao maraina be izy ireo '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'ka tsy nahita ny faty, dia tonga ka nilaza fa nahita anjely niseho, izay nilaza fa velona Izy. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Dia nandeha nankany amin’ny fasana ny sasany izay miaraka aminay, ary nahita araka izay nolazain’ny vehivavy; nefa tsy hitany Izy. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Ary hoy Izy taminy: Ry adala sy votsa saina ka tsy mino izay rehetra nolazain’ny mpaminany! '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Moa tsy tokony ho niaritra izany va '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ' ka hiditra any amin’ny voninahiny? '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Dia nanomboka hatramin’i Mosesy sy ny mpaminany rehetra Izy ka nanambara taminy ny hevitry ny teny milaza Azy ao amin’ny Soratra Masina rehetra.
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Rehefa akaiky ny vohitra izay halehan’izy roa lahy, Jesosy kosa, dia toa nikasa handeha lavitra kokoa. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Fa izy roa lahy dia nanery Azy hoe: Mitoera atỳ aminay; fa efa ho hariva izao ka lasan-davitra ny andro. Dia niditra hitoetra tao amin’izy ireo Izy. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Dia niditra izy ireo, nefa tsy nahita ny fatin’i Jesosy Tompo. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Rehefa nipetraka hisakafo niaraka taminy Izy dia nandray ny mofo ka nisaotra sy namaky izany ary nanome azy ireo. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Dia nahiratra ny mason’ireo ka nahafantatra Azy; fa Izy kosa dia tonga tsy hitany. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Dia nifampiresaka izy ireo hoe: Tsy nangorakoraka va ny fontsika, raha niresaka tamintsika teny an-dalana Izy ka namoaka ny hevitry ny Soratra Masina tamintsika?'
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Dia niainga tamin’izany ora izany izy roa lahy ka niverina nankany Jerosalema, ary nahita ny iraika amby folo lahy mbamin’izay niaraka taminy tafangona teo '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'sady nilaza hoe: Efa nitsangana marina tokoa ny Tompo ka efa niseho tamin’i Simona. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: Ary ireo kosa dia nilaza izay efa niseho teny an-dalana sy ny nahafantarany Azy teo am-pamakiana ny mofo.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nisehoan’i Jesosy tamin’ny mpianany
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Jao 20.19-23
    marker-yv: yv-h
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Raha mbola nilaza izany izy ireo dia nitsangana teo afovoany Jesosy ka niteny taminy hoe: Fiadanana ho anareo. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Dia taitra sady raiki-tahotra izy ireo satria nihevitra ho nahita matoatoa. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Nefa hoy Jesosy taminy: Nahoana no taitra ianareo? Ary nahoana no tonga ao am-ponareo ny fisalasalana? '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Jereo ny tanako sy ny tongotro, fa Izaho no Izy; tsapao Aho ka jereo, fa ny matoatoa dia tsy mba manana nofo sy taolana, tahaka izao ahitanareo Ahy izao. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Raha mbola very hevitra tamin’izany izy ireo, indreo, nisy roa lahy niseho taminy nitafy fitafiana mamirapiratra. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'Rehefa niteny izany Izy dia nasehony azy ny tanany sy ny tongony. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'Ary raha mbola tsy nino ihany izy ireo noho ny hafaliana sady mbola talanjona dia hoy Jesosy taminy: Manana zavatra azo hanina va ianareo atỳ? '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'Dia nomeny tapaky ny hazandrano voatono sy tantely Izy. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: Dia noraisiny izany ka nohaniny teo anatrehan’ireo.
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: 'Dia hoy Izy taminy: Izao no teniko izay efa voalazako taminareo, fony mbola teo aminareo Aho, fa tsy maintsy ho tanteraka izay rehetra voasoratra momba Ahy ao amin’ny lalànan’i Mosesy sy ny Mpaminany ary ny Salamo. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: 'Dia nanokatra ny sain’ireo Izy hahalala ny Soratra Masina. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: 'Ary hoy Izy taminy: Toy izao no voasoratra: '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ' hiaritra ka hitsangana amin’ny maty amin’ny andro fahatelo; '
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: 'ary hotorina amin’ny anarany ny fibebahana sy ny famelan-keloka amin’ny firenena rehetra, manomboka eto Jerosalema. '
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: 'Ianareo no vavolombelon’izany. '
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: Ary indro Aho mampitondra ny teny fikasan’ny Raiko ho anareo; fa mitoera eto an-tanàna mandra-pahavoatafy hery anareo avy any amin’ny avo.
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mar 16.19; Asa 1.4-14
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Raiki-tahotra izy ireo dia niankohoka, koa hoy izy roa lahy taminy: Nahoana no ato amin’ny maty no itadiavanareo ny velona? '
  '50':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '50'
    - type: text
      text: 'Ary nitondra azy ireo hatrany Betania Jesosy, dia nanandratra ny tanany ka nitsodrano azy. '
  '51':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '51'
    - type: text
      text: 'Raha mbola nitsodrano azy Izy dia nisaraka taminy ka nakarina ho any an-danitra. '
  '52':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '52'
    - type: text
      text: 'Ary nitsaoka Azy izy ireo, dia niverina ho any Jerosalema tamin’ny hafaliam-be. '
  '53':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '53'
    - type: text
      text: Ary tao amin’ny tempoly isanandro izy ireo ka nankalaza an’Andriamanitra.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Tsy ato Izy fa efa nitsangana; tsarovy ny teny izay nolazainy taminareo, fony Izy mbola tany Galilia hoe: '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Zanak’Olona
    - type: text
      text: ' tsy maintsy hatolotra eo an-tanan’ny mpanota ka hohomboana amin’ny hazofijaliana ary hitsangana amin’ny andro fahatelo. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Dia tsaroan’izy ireo ny teniny.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ary niverina niala tamin’ny fasana izy dia nilaza izany rehetra izany tamin’ny iraika amby folo lahy sy ny namany rehetra. '
