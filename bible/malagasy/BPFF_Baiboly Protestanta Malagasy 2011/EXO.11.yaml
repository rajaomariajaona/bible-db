document_id: EXO.11
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Filazana ny hiavian’ny loza fahafolo
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Hoy anefa NY TOMPO tamin’i Mosesy: Mbola hahatonga loza iray amin’i Farao sy i Ejipta koa Aho. Aorianan’izany dia hamela anareo handeha hiala eto izy. Rehefa mamela anareo rehetra handeha izy dia ho may handroaka anareo hiala etỳ. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Koa mitenena amin’ny olona ka ny lehilahy dia samy hangataka firavaka volafotsy sy firavaka volamena amin’ny namany avy ary ny vehivavy koa dia hangataka amin’ny namany avy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Dia nataon’NY TOMPO nahita fitia teo imason’ny Ejiptiana ny olona. Ary i Mosesy rahateo dia lehilahy nalaza indrindra teo amin’ny tany Ejipta, dia teo imason’ny mpanompon’i Farao sy teo imason’ny vahoaka.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Hoy i Mosesy: Izao no lazain’NY TOMPO: Rehefa tokony ho misasakalina dia hankeo afovoan’i Ejipta Aho, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'dia ho faty ny lahimatoa rehetra eto amin’ny tany Ejipta, hatramin’ny matoan’i Farao izay mipetraka eo ambonin’ny sezafiandrianany ka hatramin’ny matoan’ny mpanompovaviny izay eo anilan’ny fikosoham-bary ary ny voalohan-teraky ny biby fiompy rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary hisy fidradradradrana mafy manerana ny tany Ejipta manontolo, izay tsy mbola nisy tahaka izany sady tsy hisy tahaka izany intsony. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Kanefa tsy hisy na dia amboa iray aza hanetsika ny lelany amin’ny Zanak’Israely rehetra, na amin’ny olona na amin’ny biby, mba ho fantatrareo ny tsy fampitovian’NY TOMPO ny Ejiptiana sy ny Israely. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary hidina ho ao amiko ireo mpanomponao rehetra ireo dia hiankohoka eo anatrehako ka hiteny hoe: Mandehana ianao sy ny olona rehetra izay manaraka anao. Ary aorianan’izany dia handeha aho. Dia niala teo amin’i Farao tamin’ny fahatezerana mirehitra i Mosesy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary hoy NY TOMPO tamin’i Mosesy: Tsy hihaino anareo i Farao, mba hitomboan’ny famantarana izay hataoko eto amin’ny tany Ejipta.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ary nanao ireo famantarana rehetra ireo teo amin’i Farao i Mosesy sy i Arona; ary NY TOMPO nanamafy ny fon’i Farao ka tsy namela ny Zanak’Israely handeha hiala tamin’ny taniny ihany izy.
