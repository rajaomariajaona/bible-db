document_id: EXO.36
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Dia hiasa i Bezalila sy i Oholiaba ary ny olona manan-talenta rehetra, izay nomen’NY TOMPO talenta sy fahiratan-tsaina hahaizany manao ny asa rehetra ho amin’ny fanompoana ao amin’ny fitoerana masina, araka izay rehetra nandidian’NY TOMPO.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary i Mosesy dia nampiantso an’i Bezalila sy i Oholiaba ary ny olona manan-talenta rehetra izay nasian’NY TOMPO talenta tao an-tsainy, dia izay rehetra nohetsehin’ny fony hankeo amin’ny asa, hanatanteraka izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dia noraisin’izy ireo tamin’i Mosesy ireo fandraisana anjara rehetra izay noentin’ny Zanak’Israely hanaovana ny asa amin’ny fanompoana ao amin’ny fitoerana masina. Ny olona koa dia mbola nitondra fanatitra an-tsitrapo isa-maraina ihany ho eo amin’i Mosesy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dia nanatona ireo manan-talenta rehetra izay nanao ny asa manontolo ao amin’ny fitoerana masina, ary niala tamin’ny asa nataony avy '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'ka niteny tamin’i Mosesy hoe: Ny olona dia mitondra mihoatra lavitra noho izay hahavitana ny fanompoana amin’ny asa nandidian’NY TOMPO. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia nandidy i Mosesy ka nandefa teny manerana ny toby hoe: Aza misy manao zavatra ho fandraisana anjara ho amin’ny fitoerana masina intsony ianareo, na lahy na vavy. Izany no nampitsaharana ny olona tsy hanatitra intsony; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: fa ny zavatra efa nomanina dia ampy hanaovana ny asa rehetra ary nanana amby aza.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fonenana masina
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ny manan-talenta rehetra teo amin’izay nanao ny raharaha dia nanamboatra ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tabernakely
  - type: text
    text: ': Ambainy folo amin’ny lamba rongony fotsy madinika voatenona, lamba manga, volomparasy, jaky; '
  - type: usfm
    marker: w
    children:
    - type: text
      text: kerobima
  - type: text
    text: ', asan’ny mpanenona mahay, no nataony sorany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ny halavan’ny ambainy iray dia valo amby roapolo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: hakiho
  - type: text
    text: ' ary ny lambanan’ny ambainy iray dia efatra hakiho: Nitovy refy ny ambainy rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ambainy dimy no navitrany ho iray; ary ambainy dimy hafa koa no navitrany ho iray hafa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Nanao tadivavarana manga teo an-tsisin’ny ambainy iray izy, dia teo an-tsisin’ny iray efa voavitrana; ary nanao toy izany koa tamin’ny ambainy farany izy, dia teo amin’ny sisin’ny iray efa voavitrana koa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Tadivavarana dimampolo no nataony teo amin’ny ambainy iray ary tadivavarana dimampolo koa no nataony teo amin’ny sisin’ny ambainy izay amin’ny iray efa voavitrana hafa koa; ary nifandray ny tadivavarana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Nanao farango volamena dimampolo izy ka nakambany tamin’ny farango ny ambainy, dia voakambana ho iray ny tabernakely.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Nanao ambainy tamin’ny volon’osy koa izy ho lay handrakofana ny tabernakely; iraika amby folo ambainy no nanaovany azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ny halavan’ny ambainy iray dia telopolo hakiho ary ny lambanan’ny ambainy iray dia efatra hakiho; nitovy refy ny ambainy iraika amby folo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Navitrany ny ambainy dimy hikambana, ary ny ambainy enina sisa kosa dia hakambana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Nanao tadivavarana dimampolo ho eo an-tsisin’ny ambainy iray izay farany amin’ny efa voavitrana izy; ary tadivavarana dimampolo hafa koa ho eo an-tsisin’ny ambainy iray amin’ny iray hafa efa voavitrana koa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ary nanao farango varahina dimampolo izy hampikambana ny lay ho iray.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Nataony tamin’ny hoditr’ondrilahy voaloko mena ny rakotry ny lay, ary sarona hoditra trozona no ho eo amboniny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Nanao ny hazofisaka akasia ho amin’ny tabernakely izy, dia tsangankazo akasia. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Folo hakiho ny haavon’ny hazofisaka iray ary iray hakiho sy sasany ny sakan’ny hazofisaka iray. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Lahiny roa no amin’ny hazofisaka iray ka nasiany izay hikambanany. Izany no nanaovany ny hazofisaka rehetra tamin’ny tabernakely. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Nanao ny hazofisaka ho amin’ny tabernakely izy, hazofisaka roapolo ho eo amin’ny lafiny atsimo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Nanao faladia volafotsy efapolo izy ho eo ambanin’ny hazofisaka roapolo, faladia roa avy ho eo ambanin’ny hazofisaka tsirairay hiorenan’ny lahiny roa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Nanao hazofisaka roapolo ho eo amin’ny lafiny faharoa amin’ny tabernakely izy, dia ny lafiny avaratra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Nanao faladiany volafotsy efapolo izy, faladia roa avy ho eo ambanin’ny hazofisaka tsirairay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Nanao hazofisaka enina izy ho eo amin’ny lafiny andrefana izay eo aorianan’ny tabernakely. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Nanao hazofisaka roa izy ho eo amin’ny zoron’ny tabernakely tamin’ny lafiny ao aoriana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Nakambana ho iray hatrany ambany ka hatrany ambony ireo, dia hiray tsara hatrany an-tampony eo amin’ny mason-drojo tokana; nataony toy izany koa ny roa ho eo amin’ny zorony roa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Ary nisy hazofisaka valo sy ny faladiany volafotsy avy, izany hoe faladia enina amby folo; faladia roa avy no ho eo ambanin’ny hazofisaka tsirairay.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ary hazo akasia no nataony barany: Dimy no ho amin’ny hazofisaka amin’ny lafiny iray amin’ny tabernakely, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'barany dimy no ho amin’ny hazofisaka amin’ny lafiny iray koa amin’ny tabernakely, ary barany dimy no ho amin’ny hazofisaka amin’ny lafiny andrefana izay ao aorianany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ary nanao ny barany afovoany izy, ho afovoan’ny hazofisaka ka hahatratra ny farany roa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Ny hazofisaka dia nopetahany takelaka volamena, ary nataony volamena koa ny mason-drojo aminy, izay hitoeran’ny barany; nopetahany takelaka volamena koa ny barany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Ny efitra lamba dia nataony miloko manga, volomparasy, jaky ary rongony fotsy madinika voatenona; '
  - type: usfm
    marker: w
    children:
    - type: text
      text: kerobima
  - type: text
    text: ', asan’ny mpanenona mahay, no nataony sorany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Nanamboatra andry efatra tamin’ny hazo akasia izy mba hihantonan’izany, ary nopetahany takelaka volamena ireo, sady nataony volamena koa ny fihantonany; dia nandrendrika faladia volafotsy efatra izy mba hiorenany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Ary nanao varavarana lamba ho eo amin’ny varavaran’ny tranolay izy, dia tamin’ny manga, volomparasy, jaky ary lamba rongony fotsy madinika voatenona, asan’ny mahay tenona samihafa soratra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Ary ny andriny dimy sy ny fihantonany dia nataony koa, ary nopetahany takelaka volamena ny lohany sy ny farango hitohizany; ary ny faladiany dimy dia nataony varahina.
