document_id: EXO.36,3103
type_code: plt
verses:
  '1':
  - type: text
    content: Dia hiasa i Bezalila sy i Oholiaba ary ny olona manan-talenta rehetra, izay nomen’NY TOMPO talenta sy fahiratan-tsaina hahaizany manao ny asa rehetra ho amin’ny fanompoana ao amin’ny fitoerana masina, araka izay rehetra nandidian’NY TOMPO.
  '10':
  - type: text
    content: 'Ambainy dimy no navitrany ho iray; ary ambainy dimy hafa koa no navitrany ho iray hafa. '
  '11':
  - type: text
    content: 'Nanao tadivavarana manga teo an-tsisin’ny ambainy iray izy, dia teo an-tsisin’ny iray efa voavitrana; ary nanao toy izany koa tamin’ny ambainy farany izy, dia teo amin’ny sisin’ny iray efa voavitrana koa. '
  '12':
  - type: text
    content: 'Tadivavarana dimampolo no nataony teo amin’ny ambainy iray ary tadivavarana dimampolo koa no nataony teo amin’ny sisin’ny ambainy izay amin’ny iray efa voavitrana hafa koa; ary nifandray ny tadivavarana. '
  '13':
  - type: text
    content: Nanao farango volamena dimampolo izy ka nakambany tamin’ny farango ny ambainy, dia voakambana ho iray ny tabernakely.
  '14':
  - type: text
    content: 'Nanao ambainy tamin’ny volon’osy koa izy ho lay handrakofana ny tabernakely; iraika amby folo ambainy no nanaovany azy. '
  '15':
  - type: text
    content: 'Ny halavan’ny ambainy iray dia telopolo hakiho ary ny lambanan’ny ambainy iray dia efatra hakiho; nitovy refy ny ambainy iraika amby folo. '
  '16':
  - type: text
    content: 'Navitrany ny ambainy dimy hikambana, ary ny ambainy enina sisa kosa dia hakambana. '
  '17':
  - type: text
    content: 'Nanao tadivavarana dimampolo ho eo an-tsisin’ny ambainy iray izay farany amin’ny efa voavitrana izy; ary tadivavarana dimampolo hafa koa ho eo an-tsisin’ny ambainy iray amin’ny iray hafa efa voavitrana koa. '
  '18':
  - type: text
    content: Ary nanao farango varahina dimampolo izy hampikambana ny lay ho iray.
  '19':
  - type: text
    content: Nataony tamin’ny hoditr’ondrilahy voaloko mena ny rakotry ny lay, ary sarona hoditra trozona no ho eo amboniny.
  '2':
  - type: text
    content: 'Ary i Mosesy dia nampiantso an’i Bezalila sy i Oholiaba ary ny olona manan-talenta rehetra izay nasian’NY TOMPO talenta tao an-tsainy, dia izay rehetra nohetsehin’ny fony hankeo amin’ny asa, hanatanteraka izany. '
  '20':
  - type: text
    content: 'Nanao ny hazofisaka akasia ho amin’ny tabernakely izy, dia tsangankazo akasia. '
  '21':
  - type: text
    content: 'Folo hakiho ny haavon’ny hazofisaka iray ary iray hakiho sy sasany ny sakan’ny hazofisaka iray. '
  '22':
  - type: text
    content: 'Lahiny roa no amin’ny hazofisaka iray ka nasiany izay hikambanany. Izany no nanaovany ny hazofisaka rehetra tamin’ny tabernakely. '
  '23':
  - type: text
    content: 'Nanao ny hazofisaka ho amin’ny tabernakely izy, hazofisaka roapolo ho eo amin’ny lafiny atsimo. '
  '24':
  - type: text
    content: 'Nanao faladia volafotsy efapolo izy ho eo ambanin’ny hazofisaka roapolo, faladia roa avy ho eo ambanin’ny hazofisaka tsirairay hiorenan’ny lahiny roa. '
  '25':
  - type: text
    content: 'Nanao hazofisaka roapolo ho eo amin’ny lafiny faharoa amin’ny tabernakely izy, dia ny lafiny avaratra. '
  '26':
  - type: text
    content: 'Nanao faladiany volafotsy efapolo izy, faladia roa avy ho eo ambanin’ny hazofisaka tsirairay. '
  '27':
  - type: text
    content: 'Nanao hazofisaka enina izy ho eo amin’ny lafiny andrefana izay eo aorianan’ny tabernakely. '
  '28':
  - type: text
    content: 'Nanao hazofisaka roa izy ho eo amin’ny zoron’ny tabernakely tamin’ny lafiny ao aoriana. '
  '29':
  - type: text
    content: 'Nakambana ho iray hatrany ambany ka hatrany ambony ireo, dia hiray tsara hatrany an-tampony eo amin’ny mason-drojo tokana; nataony toy izany koa ny roa ho eo amin’ny zorony roa. '
  '3':
  - type: text
    content: 'Dia noraisin’izy ireo tamin’i Mosesy ireo fandraisana anjara rehetra izay noentin’ny Zanak’Israely hanaovana ny asa amin’ny fanompoana ao amin’ny fitoerana masina. Ny olona koa dia mbola nitondra fanatitra an-tsitrapo isa-maraina ihany ho eo amin’i Mosesy. '
  '30':
  - type: text
    content: Ary nisy hazofisaka valo sy ny faladiany volafotsy avy, izany hoe faladia enina amby folo; faladia roa avy no ho eo ambanin’ny hazofisaka tsirairay.
  '31':
  - type: text
    content: 'Ary hazo akasia no nataony barany: Dimy no ho amin’ny hazofisaka amin’ny lafiny iray amin’ny tabernakely, '
  '32':
  - type: text
    content: 'barany dimy no ho amin’ny hazofisaka amin’ny lafiny iray koa amin’ny tabernakely, ary barany dimy no ho amin’ny hazofisaka amin’ny lafiny andrefana izay ao aorianany. '
  '33':
  - type: text
    content: 'Ary nanao ny barany afovoany izy, ho afovoan’ny hazofisaka ka hahatratra ny farany roa. '
  '34':
  - type: text
    content: Ny hazofisaka dia nopetahany takelaka volamena, ary nataony volamena koa ny mason-drojo aminy, izay hitoeran’ny barany; nopetahany takelaka volamena koa ny barany.
  '35':
  - type: text
    content: 'Ny efitra lamba dia nataony miloko manga, volomparasy, jaky ary rongony fotsy madinika voatenona; '
  - type: text
    content: kerobima
  - type: text
    content: ', asan’ny mpanenona mahay, no nataony sorany. '
  '36':
  - type: text
    content: Nanamboatra andry efatra tamin’ny hazo akasia izy mba hihantonan’izany, ary nopetahany takelaka volamena ireo, sady nataony volamena koa ny fihantonany; dia nandrendrika faladia volafotsy efatra izy mba hiorenany.
  '37':
  - type: text
    content: 'Ary nanao varavarana lamba ho eo amin’ny varavaran’ny tranolay izy, dia tamin’ny manga, volomparasy, jaky ary lamba rongony fotsy madinika voatenona, asan’ny mahay tenona samihafa soratra. '
  '38':
  - type: text
    content: Ary ny andriny dimy sy ny fihantonany dia nataony koa, ary nopetahany takelaka volamena ny lohany sy ny farango hitohizany; ary ny faladiany dimy dia nataony varahina.
  '4':
  - type: text
    content: 'Dia nanatona ireo manan-talenta rehetra izay nanao ny asa manontolo ao amin’ny fitoerana masina, ary niala tamin’ny asa nataony avy '
  '5':
  - type: text
    content: 'ka niteny tamin’i Mosesy hoe: Ny olona dia mitondra mihoatra lavitra noho izay hahavitana ny fanompoana amin’ny asa nandidian’NY TOMPO. '
  '6':
  - type: text
    content: 'Dia nandidy i Mosesy ka nandefa teny manerana ny toby hoe: Aza misy manao zavatra ho fandraisana anjara ho amin’ny fitoerana masina intsony ianareo, na lahy na vavy. Izany no nampitsaharana ny olona tsy hanatitra intsony; '
  '7':
  - type: text
    content: fa ny zavatra efa nomanina dia ampy hanaovana ny asa rehetra ary nanana amby aza.
  - type: heading
    content: Ny fonenana masina
  '8':
  - type: text
    content: 'Ny manan-talenta rehetra teo amin’izay nanao ny raharaha dia nanamboatra ny '
  - type: text
    content: tabernakely
  - type: text
    content: ': Ambainy folo amin’ny lamba rongony fotsy madinika voatenona, lamba manga, volomparasy, jaky; '
  - type: text
    content: kerobima
  - type: text
    content: ', asan’ny mpanenona mahay, no nataony sorany. '
  '9':
  - type: text
    content: 'Ny halavan’ny ambainy iray dia valo amby roapolo '
  - type: text
    content: hakiho
  - type: text
    content: ' ary ny lambanan’ny ambainy iray dia efatra hakiho: Nitovy refy ny ambainy rehetra. '
