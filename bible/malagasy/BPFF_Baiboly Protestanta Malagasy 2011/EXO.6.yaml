document_id: EXO.6,3103
type_code: plt
verses:
  '1':
  - type: text
    content: 'Dia hoy NY TOMPO tamin’i Mosesy: Ankehitriny, ho hitanao izay hataoko amin’i Farao. Fa hisy tanana mahery hamelany azy handeha, ary hisy tanana mahery handroahany azy amin’ny taniny.'
  - type: heading
    content: Hiditra an-tsehatra Andriamanitra mba hanafaka ny Zanak’Israely
  '10':
  - type: text
    content: 'Ary NY TOMPO niteny tamin’i Mosesy hoe: '
  '11':
  - type: text
    content: Mandehana ka lazao i Farao, mpanjakan’i Ejipta, mba hamela ny Zanak’Israely hiala amin’ny taniny izy.
  '12':
  - type: text
    content: 'Nefa niteny teo anatrehan’NY TOMPO i Mosesy hoe: Indro, na dia ny Zanak’Israely aza dia tsy nihaino ahy, koa ahoana no hihainoan’i Farao ahy, nefa izaho dia tsy voafora molotra?'
  '13':
  - type: text
    content: Ary NY TOMPO niteny tamin’i Mosesy sy i Arona ka nanome teny azy momba ny Zanak’Israely sy momba an’i Farao, mpanjakan’i Ejipta, mba hamoahana ny Zanak’Israely avy amin’ny tany Ejipta.
  - type: heading
    content: Ireo razan’i Mosesy sy i Arona
  '14':
  - type: text
    content: 'Ireto avy ny lohan’ny fianakaviany:'
  - type: text
    content: Ny zanakalahin’i Robena, lahimatoan’Israely, dia i Hanoka, i Palo, i Hezrona ary i Karmy; ireo no fokom-pirenen’i Robena.
  '15':
  - type: text
    content: Ary ny zanakalahin’i Simeona dia i Jemoela, i Jamina, i Ohada, i Jakina, i Zohara ary i Saoly, zanakalahin’ny vehivavy Kananita; ireo no fokom-pirenen’i Simeona.
  '16':
  - type: text
    content: 'Ary izao no anaran’ny zanakalahin’i Levy, araka ny taranany, dia i Gersona sy i Kehata ary i Merary; fito amby telopolo amby zato taona ny andro niainan’i Levy. '
  '17':
  - type: text
    content: 'Ny zanakalahin’i Gersona dia i Libny sy i Simey, araka ny fokom-pireneny. '
  '18':
  - type: text
    content: 'Ny zanakalahin’i Kehata dia i Amrama, i Jizara, i Hebrona ary i Oziela. Telo amby telopolo amby zato taona ny andro niainan’i Kehata. '
  '19':
  - type: text
    content: 'Ny zanakalahin’i Merary dia i Maly sy i Mosy. Ireo no fokom-pirenen’ny '
  - type: text
    content: levita
  - type: text
    content: ', araka ny taranany. '
  '2':
  - type: text
    content: 'Ary Andriamanitra niteny tamin’i Mosesy hoe: Izaho no TOMPO. '
  '20':
  - type: text
    content: 'Ary i Amrama dia naka an’i Jokebeda anabavin-drainy ho vadiny, dia niteraka an’i Arona sy i Mosesy taminy izy. Fito amby telopolo amby zato taona ny andro niainan’i Amrama. '
  '21':
  - type: text
    content: 'Ary ny zanakalahin’i Jizara dia i Kora sy i Nefega ary i Zikry. '
  '22':
  - type: text
    content: 'Ny zanakalahin’i Oziela dia i Misaela sy i Elzafana ary i Sitirỳ. '
  '23':
  - type: text
    content: 'Ary i Arona dia naka an’i Eliseba, zanakavavin’i Aminadaba sady anabavin’i Nasona, ho vadiny; dia niteraka an’i Nadaba sy i Abiho ary i Eleazara sy Itamara taminy izy. '
  '24':
  - type: text
    content: 'Ary ny zanakalahin’i Kora dia i Asira sy i Elkana ary i Abiasafa. Ireo no fokom-pirenen’ny Koraìta. '
  '25':
  - type: text
    content: Ary i Eleazara, zanakalahin’i Arona, dia naka vady avy tamin’ny zanakavavin’i Potiela, ary niteraka an’i Finehasa taminy. Ireo no lohan’ny fianakavian’ny levita, araka ny fokom-pireneny.
  '26':
  - type: text
    content: 'Ireo no Arona sy Mosesy, izay nilazan’NY TOMPO hoe: Ento ny Zanak’Israely hivoaka avy any amin’ny tany Ejipta araka ny antokony. '
  '27':
  - type: text
    content: Ireo no niteny tamin’i Farao, mpanjakan’i Ejipta, fa hitondra ny Zanak’Israely hivoaka avy any Ejipta. Ireo no Mosesy sy Arona.
  - type: heading
    content: Mamerina ny teny fikasany amin’i Mosesy Andriamanitra
  '28':
  - type: text
    content: 'Tamin’ny andro izay nitenenan’NY TOMPO tamin’i Mosesy teo amin’ny tany Ejipta '
  '29':
  - type: text
    content: 'dia hoy NY TOMPO tamin’i Mosesy: Izaho no TOMPO. Lazao amin’i Farao, mpanjakan’i Ejipta, izay rehetra lazaiko aminao. '
  '3':
  - type: text
    content: 'Tamin’ny anarako hoe '
  - type: heading
    content: andriamanitra tsitoha
  - type: text
    content: ' no nisehoako tamin’i Abrahama sy Isaka ary i Jakoba, fa ny anarako hoe NY TOMPO tsy mbola nahafantarany Ahy. '
  '30':
  - type: text
    content: 'Nefa niteny teo anatrehan’NY TOMPO i Mosesy hoe: Indro, tsy voafora molotra aho, koa amin’ny fomba ahoana no hihainoan’i Farao ahy?'
  '4':
  - type: text
    content: 'Ary naoriko taminy koa ny fanekeko hanomezako azy ny tany Kanana, dia ny tany fivahinianany izay efa nitoerany toy ny mpivahiny. '
  '5':
  - type: text
    content: Ary koa, Izaho efa nandre ny fitarainan’ny Zanak’Israely izay ampanompoin’ny Ejiptiana ka tsaroako ny fanekeko.
  '6':
  - type: text
    content: 'Noho izany, lazao amin’ny Zanak’Israely hoe: Izaho no TOMPO; hitondra anareo hivoaka ho afaka amin’ny fanompoana mafy izay ampanaovin’ny Ejiptiana anareo Aho ka hanafaka anareo amin’ny fanompoana azy; sandry atsotra sy fitsarana lehibe no hanavotako anareo. '
  '7':
  - type: text
    content: 'Dia halaiko ho Ahy ianareo mba ho oloko ary Izaho ho Andriamanitrareo; dia ho fantatrareo fa Izaho no TOMPO Andriamanitrareo izay mitondra anareo mivoaka ho afaka amin’ny fanompoana mafy izay ampanaovin’ny Ejiptiana anareo. '
  '8':
  - type: text
    content: Hampiditra anareo any amin’ny tany izay nananganako tanana mba homena an’i Abrahama sy Isaka ary i Jakoba Aho; dia homeko ho fanananareo izany. Izaho no TOMPO.
  '9':
  - type: text
    content: Ary nilaza izany tamin’ny Zanak’Israely i Mosesy. Nefa tsy nihaino an’i Mosesy izy ireo noho ny fahakiviany amin’ny fanompoana tsy ara-drariny.
