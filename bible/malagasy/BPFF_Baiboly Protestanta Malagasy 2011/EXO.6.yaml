document_id: EXO.6
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Dia hoy NY TOMPO tamin’i Mosesy: Ankehitriny, ho hitanao izay hataoko amin’i Farao. Fa hisy tanana mahery hamelany azy handeha, ary hisy tanana mahery handroahany azy amin’ny taniny.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Hiditra an-tsehatra Andriamanitra mba hanafaka ny Zanak’Israely
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary Andriamanitra niteny tamin’i Mosesy hoe: Izaho no TOMPO. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Tamin’ny anarako hoe '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: andriamanitra tsitoha
  - type: text
    text: ' no nisehoako tamin’i Abrahama sy Isaka ary i Jakoba, fa ny anarako hoe NY TOMPO tsy mbola nahafantarany Ahy. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary naoriko taminy koa ny fanekeko hanomezako azy ny tany Kanana, dia ny tany fivahinianany izay efa nitoerany toy ny mpivahiny. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ary koa, Izaho efa nandre ny fitarainan’ny Zanak’Israely izay ampanompoin’ny Ejiptiana ka tsaroako ny fanekeko.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Noho izany, lazao amin’ny Zanak’Israely hoe: Izaho no TOMPO; hitondra anareo hivoaka ho afaka amin’ny fanompoana mafy izay ampanaovin’ny Ejiptiana anareo Aho ka hanafaka anareo amin’ny fanompoana azy; sandry atsotra sy fitsarana lehibe no hanavotako anareo. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dia halaiko ho Ahy ianareo mba ho oloko ary Izaho ho Andriamanitrareo; dia ho fantatrareo fa Izaho no TOMPO Andriamanitrareo izay mitondra anareo mivoaka ho afaka amin’ny fanompoana mafy izay ampanaovin’ny Ejiptiana anareo. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Hampiditra anareo any amin’ny tany izay nananganako tanana mba homena an’i Abrahama sy Isaka ary i Jakoba Aho; dia homeko ho fanananareo izany. Izaho no TOMPO.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ary nilaza izany tamin’ny Zanak’Israely i Mosesy. Nefa tsy nihaino an’i Mosesy izy ireo noho ny fahakiviany amin’ny fanompoana tsy ara-drariny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary NY TOMPO niteny tamin’i Mosesy hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Mandehana ka lazao i Farao, mpanjakan’i Ejipta, mba hamela ny Zanak’Israely hiala amin’ny taniny izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Nefa niteny teo anatrehan’NY TOMPO i Mosesy hoe: Indro, na dia ny Zanak’Israely aza dia tsy nihaino ahy, koa ahoana no hihainoan’i Farao ahy, nefa izaho dia tsy voafora molotra?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ary NY TOMPO niteny tamin’i Mosesy sy i Arona ka nanome teny azy momba ny Zanak’Israely sy momba an’i Farao, mpanjakan’i Ejipta, mba hamoahana ny Zanak’Israely avy amin’ny tany Ejipta.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ireo razan’i Mosesy sy i Arona
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ireto avy ny lohan’ny fianakaviany:'
- type: usfm
  marker: p
  children:
  - type: text
    text: Ny zanakalahin’i Robena, lahimatoan’Israely, dia i Hanoka, i Palo, i Hezrona ary i Karmy; ireo no fokom-pirenen’i Robena.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ary ny zanakalahin’i Simeona dia i Jemoela, i Jamina, i Ohada, i Jakina, i Zohara ary i Saoly, zanakalahin’ny vehivavy Kananita; ireo no fokom-pirenen’i Simeona.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary izao no anaran’ny zanakalahin’i Levy, araka ny taranany, dia i Gersona sy i Kehata ary i Merary; fito amby telopolo amby zato taona ny andro niainan’i Levy. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ny zanakalahin’i Gersona dia i Libny sy i Simey, araka ny fokom-pireneny. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ny zanakalahin’i Kehata dia i Amrama, i Jizara, i Hebrona ary i Oziela. Telo amby telopolo amby zato taona ny andro niainan’i Kehata. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ny zanakalahin’i Merary dia i Maly sy i Mosy. Ireo no fokom-pirenen’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: levita
  - type: text
    text: ', araka ny taranany. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary i Amrama dia naka an’i Jokebeda anabavin-drainy ho vadiny, dia niteraka an’i Arona sy i Mosesy taminy izy. Fito amby telopolo amby zato taona ny andro niainan’i Amrama. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary ny zanakalahin’i Jizara dia i Kora sy i Nefega ary i Zikry. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ny zanakalahin’i Oziela dia i Misaela sy i Elzafana ary i Sitirỳ. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary i Arona dia naka an’i Eliseba, zanakavavin’i Aminadaba sady anabavin’i Nasona, ho vadiny; dia niteraka an’i Nadaba sy i Abiho ary i Eleazara sy Itamara taminy izy. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary ny zanakalahin’i Kora dia i Asira sy i Elkana ary i Abiasafa. Ireo no fokom-pirenen’ny Koraìta. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Ary i Eleazara, zanakalahin’i Arona, dia naka vady avy tamin’ny zanakavavin’i Potiela, ary niteraka an’i Finehasa taminy. Ireo no lohan’ny fianakavian’ny levita, araka ny fokom-pireneny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ireo no Arona sy Mosesy, izay nilazan’NY TOMPO hoe: Ento ny Zanak’Israely hivoaka avy any amin’ny tany Ejipta araka ny antokony. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Ireo no niteny tamin’i Farao, mpanjakan’i Ejipta, fa hitondra ny Zanak’Israely hivoaka avy any Ejipta. Ireo no Mosesy sy Arona.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mamerina ny teny fikasany amin’i Mosesy Andriamanitra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Tamin’ny andro izay nitenenan’NY TOMPO tamin’i Mosesy teo amin’ny tany Ejipta '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'dia hoy NY TOMPO tamin’i Mosesy: Izaho no TOMPO. Lazao amin’i Farao, mpanjakan’i Ejipta, izay rehetra lazaiko aminao. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Nefa niteny teo anatrehan’NY TOMPO i Mosesy hoe: Indro, tsy voafora molotra aho, koa amin’ny fomba ahoana no hihainoan’i Farao ahy?'
