document_id: ROM.6,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Maty ny amin’ny ota fa velona ao amin’i Jesosy Kristy
  - type: text
    content: 'Inona ary no holazaintsika? Mbola hitoetra amin’ny ota ihany va isika mba hitomboan’ny fahasoavana? '
  '10':
  - type: text
    content: 'Ny amin’ny nahafatesany dia maty indray mandeha ny amin’ny ota Izy; fa ny amin’ny ahavelomany kosa dia velona ho an’Andriamanitra Izy. '
  '11':
  - type: text
    content: Ary aoka ho tahaka izany koa ianareo, ataovy ho efa maty ny amin’ny ota ny tenanareo fa velona ho an’Andriamanitra ao amin’i Kristy Jesosy kosa.
  '12':
  - type: text
    content: 'Koa aza avela hanjaka amin’ny tenanareo mety maty ny ota ka hanarahanareo ny filany; '
  '13':
  - type: text
    content: 'ary aza manolotra izay momba ny tenanareo ho amin’ny ota ho fiadian’ny tsy fahamarinana, fa atolory ho an’Andriamanitra ny tenanareo, toy ny efa maty nefa velona, ary ny momba ny tenanareo ho fiadian’ny fahamarinana ho an’Andriamanitra. '
  '14':
  - type: text
    content: Fa tsy hanan-kery aminareo ny ota; satria tsy mba ambanin’ny lalàna ianareo fa ambanin’ny fahasoavana.
  - type: heading
    content: Mpanompon’ny fahamarinana
  '15':
  - type: text
    content: 'Ahoana ary? Hanota va isika satria tsy ambanin’ny lalàna fa ambanin’ny fahasoavana? Sanatria izany! '
  '16':
  - type: text
    content: 'Tsy fantatrareo va fa raha manolo-tena ho andevo ianareo mba hanoa, na iza na iza, dia andevon’izay ankatoavinareo ianareo, na ny ota ho amin’ny fahafatesana, na ny fankatoavana ho amin’ny fahamarinana? '
  '17':
  - type: text
    content: 'Koa isaorana Andriamanitra, fa na dia efa andevon’ny ota aza ianareo, ny fonareo kosa dia efa nanaraka ny fomban’ny fampianarana izay nanolorana anareo; '
  '18':
  - type: text
    content: ary rehefa natao afaka tamin’ny ota ianareo dia tonga andevon’ny fahamarinana.
  '19':
  - type: text
    content: 'Miteny araka ny fanaon’ny olona aho noho ny fahalemen’ny nofonareo; fa tahaka ny nanoloranareo ny momba ny tenanareo ho andevon’ny fahalotoana sy ny tsy fanarahan-dalàna ka nanatanteraka ny tsy fanarahan-dalàna, dia mba atolory toy izany koa ny momba ny tenanareo ankehitriny ho andevon’ny fahamarinana, mba hahatanteraka ny fahamasinana. '
  '2':
  - type: text
    content: 'Sanatria izany! Hataontsika izay efa maty ny amin’ny ota ahoana no mbola ho velona ao aminy ihany? '
  '20':
  - type: text
    content: 'Fa fony mbola andevon’ny ota ianareo dia afaka tamin’ny fahamarinana. '
  '21':
  - type: text
    content: 'Inona ary no vokatra azonareo fahiny tamin’izay zavatra mahamenatra anareo ankehitriny? Fa fahafatesana no fiafaran’izany zavatra izany. '
  '22':
  - type: text
    content: 'Ankehitriny kosa, rehefa natao afaka tamin’ny ota ianareo, dia tonga mpanompon’Andriamanitra ka manana ny vokatrareo ho amin’ny fahamasinana, ary ny farany dia fiainana mandrakizay. '
  '23':
  - type: text
    content: 'Fa fahafatesana no tambin’ny ota, ary fiainana mandrakizay kosa no fanomezana maimaimpoana avy amin’Andriamanitra ao amin’i '
  - type: text
    content: Kristy
  - type: text
    content: ' Jesosy Tompontsika.'
  '3':
  - type: text
    content: 'Tsy fantatrareo va fa na iza na iza isika no efa natao batisa ho amin’i '
  - type: text
    content: Kristy
  - type: text
    content: ' Jesosy dia natao batisa ho amin’ny fahafatesany? '
  '4':
  - type: text
    content: 'Koa tamin’ny batisa dia niara-nalevina Taminy ho amin’ny fahafatesana isika, mba ho tahaka ny nananganana an’i Kristy tamin’ny maty tamin’ny voninahitry ny Ray no handehanantsika kosa amin’ny fiainam-baovao. '
  '5':
  - type: text
    content: 'Fa raha nampiraisina aina Taminy tamin’ny fahafatesana toy izany isika, dia ho tahaka izany koa amin’ny fitsanganany; '
  '6':
  - type: text
    content: 'fa fantatsika fa ny maha olona antsika taloha dia niaraka nohomboana Taminy mba tsy hampanan-kery ny tenan’ny ota, koa tsy ho andevozin’ny ota intsony isika. '
  '7':
  - type: text
    content: 'Fa izay efa maty dia nohamarinina ka afaka amin’ny ota. '
  '8':
  - type: text
    content: 'Koa raha miara-maty amin’i Kristy isika dia mino fa hiara-belona Aminy koa; '
  '9':
  - type: text
    content: 'fantatsika mantsy fa rehefa nitsangana tamin’ny maty Kristy dia tsy maty intsony Izy; tsy manan-kery Aminy intsony ny fahafatesana. '
