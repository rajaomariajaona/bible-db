document_id: ROM.6,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Maty ny amin’ny ota fa velona ao amin’i Jesosy Kristy
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Inona ary no holazaintsika? Mbola hitoetra amin’ny ota ihany va isika mba hitomboan’ny fahasoavana? '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny amin’ny nahafatesany dia maty indray mandeha ny amin’ny ota Izy; fa ny amin’ny ahavelomany kosa dia velona ho an’Andriamanitra Izy. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary aoka ho tahaka izany koa ianareo, ataovy ho efa maty ny amin’ny ota ny tenanareo fa velona ho an’Andriamanitra ao amin’i Kristy Jesosy kosa.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa aza avela hanjaka amin’ny tenanareo mety maty ny ota ka hanarahanareo ny filany; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary aza manolotra izay momba ny tenanareo ho amin’ny ota ho fiadian’ny tsy fahamarinana, fa atolory ho an’Andriamanitra ny tenanareo, toy ny efa maty nefa velona, ary ny momba ny tenanareo ho fiadian’ny fahamarinana ho an’Andriamanitra. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa tsy hanan-kery aminareo ny ota; satria tsy mba ambanin’ny lalàna ianareo fa ambanin’ny fahasoavana.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mpanompon’ny fahamarinana
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ahoana ary? Hanota va isika satria tsy ambanin’ny lalàna fa ambanin’ny fahasoavana? Sanatria izany! '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsy fantatrareo va fa raha manolo-tena ho andevo ianareo mba hanoa, na iza na iza, dia andevon’izay ankatoavinareo ianareo, na ny ota ho amin’ny fahafatesana, na ny fankatoavana ho amin’ny fahamarinana? '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa isaorana Andriamanitra, fa na dia efa andevon’ny ota aza ianareo, ny fonareo kosa dia efa nanaraka ny fomban’ny fampianarana izay nanolorana anareo; '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ary rehefa natao afaka tamin’ny ota ianareo dia tonga andevon’ny fahamarinana.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Miteny araka ny fanaon’ny olona aho noho ny fahalemen’ny nofonareo; fa tahaka ny nanoloranareo ny momba ny tenanareo ho andevon’ny fahalotoana sy ny tsy fanarahan-dalàna ka nanatanteraka ny tsy fanarahan-dalàna, dia mba atolory toy izany koa ny momba ny tenanareo ankehitriny ho andevon’ny fahamarinana, mba hahatanteraka ny fahamasinana. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Sanatria izany! Hataontsika izay efa maty ny amin’ny ota ahoana no mbola ho velona ao aminy ihany? '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa fony mbola andevon’ny ota ianareo dia afaka tamin’ny fahamarinana. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Inona ary no vokatra azonareo fahiny tamin’izay zavatra mahamenatra anareo ankehitriny? Fa fahafatesana no fiafaran’izany zavatra izany. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ankehitriny kosa, rehefa natao afaka tamin’ny ota ianareo, dia tonga mpanompon’Andriamanitra ka manana ny vokatrareo ho amin’ny fahamasinana, ary ny farany dia fiainana mandrakizay. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa fahafatesana no tambin’ny ota, ary fiainana mandrakizay kosa no fanomezana maimaimpoana avy amin’Andriamanitra ao amin’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ' Jesosy Tompontsika.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsy fantatrareo va fa na iza na iza isika no efa natao batisa ho amin’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ' Jesosy dia natao batisa ho amin’ny fahafatesany? '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa tamin’ny batisa dia niara-nalevina Taminy ho amin’ny fahafatesana isika, mba ho tahaka ny nananganana an’i Kristy tamin’ny maty tamin’ny voninahitry ny Ray no handehanantsika kosa amin’ny fiainam-baovao. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa raha nampiraisina aina Taminy tamin’ny fahafatesana toy izany isika, dia ho tahaka izany koa amin’ny fitsanganany; '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fa fantatsika fa ny maha olona antsika taloha dia niaraka nohomboana Taminy mba tsy hampanan-kery ny tenan’ny ota, koa tsy ho andevozin’ny ota intsony isika. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa izay efa maty dia nohamarinina ka afaka amin’ny ota. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa raha miara-maty amin’i Kristy isika dia mino fa hiara-belona Aminy koa; '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fantatsika mantsy fa rehefa nitsangana tamin’ny maty Kristy dia tsy maty intsony Izy; tsy manan-kery Aminy intsony ny fahafatesana. '
