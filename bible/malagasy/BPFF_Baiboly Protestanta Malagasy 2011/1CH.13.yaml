document_id: 1CH.13,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nanapahan’i Davida hevitra hitondra ny vata misy ny Fanekena ho any Jerosalema
  - type: heading
    content: 2Sam 6.1-11
  - type: text
    content: 'Naka saina tamin’ny mpifehy arivo sy ny mpifehy zato, dia ny mpifehy rehetra i Davida '
  '10':
  - type: text
    content: 'Dia nirehitra tamin’i Oza ny fahatezeran’NY TOMPO ka namely azy Izy noho ny nanatsorany ny tanany tamin’ny vata misy ny Fanekena. Dia maty teo anatrehan’Andriamanitra i Oza. '
  '11':
  - type: text
    content: Nalahelo i Davida noho ny namelezan’NY TOMPO an’i Oza ka nataony hoe Pereza-Oza
  - type: note
    content: 'Pereza-Oza: Famelezana an’i Oza. Zahao 2Sam 6.8.'
  - type: text
    content: ' no anaran’izany toerana izany mandraka androany. '
  '12':
  - type: text
    content: 'Ary natahotra an’Andriamanitra i Davida tamin’izany andro izany ka nilaza hoe: Amin’ny fomba ahoana no hitondrako ny vata misy ny faneken’Andriamanitra ho atỳ amiko? '
  '13':
  - type: text
    content: 'Dia tsy nafindran’i Davida ho ao aminy ao an-Tanànan’i Davida ny vata misy ny Fanekena fa naviliny ho ao an-tranon’i Obeda-Edoma gatita. '
  '14':
  - type: text
    content: Ary nipetraka telo volana tao amin’ny ankohonan’i Obeda-Edoma tao an-tranony ny vata misy ny faneken’Andriamanitra; dia notahin’NY TOMPO ny ankohonan’i Obeda-Edoma sy izay rehetra nananany.
  '2':
  - type: text
    content: 'ka hoy izy tamin’ny Israely rehetra izay tafangona: Raha heverinareo fa mety, sady avy amin’NY TOMPO Andriamanitsika izany, dia andeha isika handefa iraka haingana any amin’ny rahalahintsika rehetra izay sisa amin’ny tanin’ny Israely rehetra ary amin’ny mpisorona sy ny '
  - type: text
    content: levita
  - type: text
    content: ' koa, izay any amin’ny tanànany sy ny tany manodidina azy, mba hivory atỳ amintsika. '
  '3':
  - type: text
    content: 'Ary aoka haverintsika atỳ amintsika indray ny vata misy ny faneken’Andriamanitsika; fa tsy nahoantsika izy io tamin’ny andron’i Saoly. '
  '4':
  - type: text
    content: 'Ary ny olona rehetra izay tafangona dia nanaiky hanatanteraka izany, satria marina teo imason’ny olona rehetra izany. '
  '5':
  - type: text
    content: 'Dia novorin’i Davida ny Israely rehetra hatrany Sihora any Ejipta ka hatrany akaikin’i Hamata haka ny vata misy ny faneken’Andriamanitra avy any Kiriata-Jearima. '
  '6':
  - type: text
    content: 'Dia niakatra hankany Baala i Davida sy ny Israely rehetra, any Joda any Kiriata-Jearima izany, hampakatra ny vata misy ny faneken’NY TOMPO Andriamanitra, izay mipetraka amin’ny '
  - type: text
    content: kerobima
  - type: text
    content: ', ilay iantsoana ny anarany. '
  '7':
  - type: text
    content: 'Ary noentiny tamin’ny sarety vaovao niala tao an-tranon’i Abinadaba ny vata misy ny faneken’Andriamanitra. I Oza sy i Ahio no nampandeha ny sarety. '
  '8':
  - type: text
    content: 'I Davida sy ny Israely rehetra kosa dia nitsinjaka fatratra teo anatrehan’Andriamanitra tamin’ny hira, ny lokanga, ny valiha, ny ampongatapaka, ny kipantsona ary ny trompetra. '
  '9':
  - type: text
    content: 'Nony tonga teo amin’ny famoloan’i Kidona izy dia nanatsotra ny tanany hihazona ny '
  - type: text
    content: vata misy ny Fanekena
  - type: text
    content: ' i Oza, satria nibolasitra ny omby. '
