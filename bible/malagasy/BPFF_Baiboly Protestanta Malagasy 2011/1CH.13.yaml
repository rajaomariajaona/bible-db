document_id: 1CH.13
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nanapahan’i Davida hevitra hitondra ny vata misy ny Fanekena ho any Jerosalema
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 2Sam 6.1-11
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Naka saina tamin’ny mpifehy arivo sy ny mpifehy zato, dia ny mpifehy rehetra i Davida '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'ka hoy izy tamin’ny Israely rehetra izay tafangona: Raha heverinareo fa mety, sady avy amin’NY TOMPO Andriamanitsika izany, dia andeha isika handefa iraka haingana any amin’ny rahalahintsika rehetra izay sisa amin’ny tanin’ny Israely rehetra ary amin’ny mpisorona sy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: levita
  - type: text
    text: ' koa, izay any amin’ny tanànany sy ny tany manodidina azy, mba hivory atỳ amintsika. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary aoka haverintsika atỳ amintsika indray ny vata misy ny faneken’Andriamanitsika; fa tsy nahoantsika izy io tamin’ny andron’i Saoly. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary ny olona rehetra izay tafangona dia nanaiky hanatanteraka izany, satria marina teo imason’ny olona rehetra izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia novorin’i Davida ny Israely rehetra hatrany Sihora any Ejipta ka hatrany akaikin’i Hamata haka ny vata misy ny faneken’Andriamanitra avy any Kiriata-Jearima. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia niakatra hankany Baala i Davida sy ny Israely rehetra, any Joda any Kiriata-Jearima izany, hampakatra ny vata misy ny faneken’NY TOMPO Andriamanitra, izay mipetraka amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: kerobima
  - type: text
    text: ', ilay iantsoana ny anarany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary noentiny tamin’ny sarety vaovao niala tao an-tranon’i Abinadaba ny vata misy ny faneken’Andriamanitra. I Oza sy i Ahio no nampandeha ny sarety. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'I Davida sy ny Israely rehetra kosa dia nitsinjaka fatratra teo anatrehan’Andriamanitra tamin’ny hira, ny lokanga, ny valiha, ny ampongatapaka, ny kipantsona ary ny trompetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Nony tonga teo amin’ny famoloan’i Kidona izy dia nanatsotra ny tanany hihazona ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: vata misy ny Fanekena
  - type: text
    text: ' i Oza, satria nibolasitra ny omby. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dia nirehitra tamin’i Oza ny fahatezeran’NY TOMPO ka namely azy Izy noho ny nanatsorany ny tanany tamin’ny vata misy ny Fanekena. Dia maty teo anatrehan’Andriamanitra i Oza. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Nalahelo i Davida noho ny namelezan’NY TOMPO an’i Oza ka nataony hoe Pereza-Oza
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Pereza-Oza: Famelezana an’i Oza. '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Zahao '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 2Sam 6.8.
    marker-yv: yv-n
  - type: text
    text: ' no anaran’izany toerana izany mandraka androany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary natahotra an’Andriamanitra i Davida tamin’izany andro izany ka nilaza hoe: Amin’ny fomba ahoana no hitondrako ny vata misy ny faneken’Andriamanitra ho atỳ amiko? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dia tsy nafindran’i Davida ho ao aminy ao an-Tanànan’i Davida ny vata misy ny Fanekena fa naviliny ho ao an-tranon’i Obeda-Edoma gatita. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ary nipetraka telo volana tao amin’ny ankohonan’i Obeda-Edoma tao an-tranony ny vata misy ny faneken’Andriamanitra; dia notahin’NY TOMPO ny ankohonan’i Obeda-Edoma sy izay rehetra nananany.
