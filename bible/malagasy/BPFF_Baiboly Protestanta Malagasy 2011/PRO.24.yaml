document_id: PRO.24,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny hendry sy ny ratsy fanahy
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aza mialona ny olona ratsy fanahy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na maniry ho namany,
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha azom-paharerahana ianao amin’ny andro fahoriana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia kely izany ny herinao.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Afaho izay entina hovonoina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary vonjeo izay mangozohozo efa eo am-pamonoana!
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Raha hoy ianao: Tsia, tsy mahalala izany izahay!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moa Izay mandanja ny fo va tsy hihevitra izany?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary Izay mandinika ny fanahinao va tsy hahalala izany?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, hovaliany araka ny asany avy ny olona rehetra.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Anaka, homàna tantely fa tsara izany!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Homàna koa toho-tantely fa ho mamy amin’ny lanilaninao izany.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary aoka ho toy izany no hianaranao fahendrena ho anao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa raha azonao izany dia tsara antoka ny ho avy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy ho foana ny fanantenanao.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aza manao vela-pandrika eo akaikin’ny tranon’ny marina ianao, ry ilay ratsy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aza ravanao ny fonenany;
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa potraka impito ny marina, nefa tafarina ihany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny ratsy fanahy kosa dia solafaka raha azom-pahoriana.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aza faly raha lavo ny fahavalonao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary aza ravoravo ny fonao raha tafintohina izy;
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fandrao hitan’NY TOMPO izany ka ho ratsy eo anatrehany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary esoriny aminy ny fahatezerany.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka tsy hirehitra noho ny amin’ny mpanao ratsy ny fahatezeranao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary aza mialona ny ratsy fanahy;
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa fandravana no saintsainin’ny fony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary fampahoriana no tenenin’ny molony.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa tsy hisy fanantenana ho an’ny ratsy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, ho faty ny jiron’ny ratsy fanahy.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Anaka, matahora NY TOMPO sy ny mpanjaka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary aza mikambana amin’izay mpanovaova zavatra.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ho tampoka no hitrangan’izay hanjo ireny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary iza no mahalala izay loza hanjo azy roa tonta?
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Torohevitra hafa koa avy amin’ny hendry
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Izao koa no tenin’ny hendry:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy mety ny mizaha tavan’olona amin’ny fitsarana.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Izay milaza amin’ny meloka hoe: Marina ianao,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hozonin’ny olona sady ho halan’ny firenena;
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa izay mitsara marina kosa no hahita soa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy hahazo fitahiana tsara.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay manome valinteny tsara
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia manoroka ny molotra.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Amboary ny asanao any ivelany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ataovy lavorary ny any an-tsaha,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: koa rehefa vita izany dia mahazo manangana ny tranonao ianao.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aza manao fiampangana tsy marim-pototra amin’ny namanao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: moa hamitaka amin’ny molotrao va ianao?
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Aza miteny hoe: Araka izay nataony tamiko no mba hataoko aminy kosa,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hovaliako araka izay nataony ny olona.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny manjo ny kamo
    marker-yv: yv-h
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fahendrena no anaovana trano,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary halalinan-tsaina no mampaharitra azy.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nandalo ny sahan’ny kamo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny tanim-boaloboky ny tsy ampy saina aho;
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: koa indro, feno songosongo izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady voasaron’ny tsilo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary nirodana ny fefy vatony.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia nojereko ka noheveriko tsara;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, hitako ka nahazoako anatra.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mbola hatory kely ihany, mbola ho renoka kely ihany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mbola hanohon-tanana kely hatory;
  '34':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ho tonga toy ny mpirenireny hamely ny fahantranao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny fahasahirananao ho toy ny jiolahy mirongo fiadiana.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fahalalana no hamenoana ny efitrano
  - type: usfm
    marker: q1
    children:
    - type: text
      text: amin’izay harena soa sy mahafinaritra rehetra.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Feno hery ny lehilahy hendry;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, mitombo hery ny olona manam-pahalalana.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny fahaizana mandinika tsara no entonao miady;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary raha maro ny mpanolotsaina dia misy famonjena.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avo tsy takatry ny adala ny fahendrena;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'tsy mahaloa-bava eo amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: vavahady
    - type: text
      text: ' izy.'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay misaintsaina hanao ratsy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia antsoina hoe mpamoron-tsain-dratsy.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ota ny fikasan’ny hadalana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary fahavetavetana eo imason’ny olona ny mpaniratsira.
