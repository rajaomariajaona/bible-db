document_id: PRO.24
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny hendry sy ny ratsy fanahy
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Aza mialona ny olona ratsy fanahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: na maniry ho namany,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: fa fandravana no saintsainin’ny fony,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary fampahoriana no tenenin’ny molony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Fahendrena no anaovana trano,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary halalinan-tsaina no mampaharitra azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Fahalalana no hamenoana ny efitrano
- type: usfm
  marker: q1
  children:
  - type: text
    text: amin’izay harena soa sy mahafinaritra rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Feno hery ny lehilahy hendry;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, mitombo hery ny olona manam-pahalalana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Fa ny fahaizana mandinika tsara no entonao miady;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary raha maro ny mpanolotsaina dia misy famonjena.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Avo tsy takatry ny adala ny fahendrena;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'tsy mahaloa-bava eo amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: vavahady
  - type: text
    text: ' izy.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Izay misaintsaina hanao ratsy
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia antsoina hoe mpamoron-tsain-dratsy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ota ny fikasan’ny hadalana
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary fahavetavetana eo imason’ny olona ny mpaniratsira.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Raha azom-paharerahana ianao amin’ny andro fahoriana
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia kely izany ny herinao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Afaho izay entina hovonoina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary vonjeo izay mangozohozo efa eo am-pamonoana!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Raha hoy ianao: Tsia, tsy mahalala izany izahay!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Moa Izay mandanja ny fo va tsy hihevitra izany?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary Izay mandinika ny fanahinao va tsy hahalala izany?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, hovaliany araka ny asany avy ny olona rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Anaka, homàna tantely fa tsara izany!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Homàna koa toho-tantely fa ho mamy amin’ny lanilaninao izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ary aoka ho toy izany no hianaranao fahendrena ho anao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa raha azonao izany dia tsara antoka ny ho avy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy ho foana ny fanantenanao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Aza manao vela-pandrika eo akaikin’ny tranon’ny marina ianao, ry ilay ratsy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: aza ravanao ny fonenany;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: fa potraka impito ny marina, nefa tafarina ihany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny ratsy fanahy kosa dia solafaka raha azom-pahoriana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Aza faly raha lavo ny fahavalonao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary aza ravoravo ny fonao raha tafintohina izy;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: fandrao hitan’NY TOMPO izany ka ho ratsy eo anatrehany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary esoriny aminy ny fahatezerany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Aoka tsy hirehitra noho ny amin’ny mpanao ratsy ny fahatezeranao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary aza mialona ny ratsy fanahy;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Fa tsy hisy fanantenana ho an’ny ratsy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, ho faty ny jiron’ny ratsy fanahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Anaka, matahora NY TOMPO sy ny mpanjaka
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary aza mikambana amin’izay mpanovaova zavatra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Fa ho tampoka no hitrangan’izay hanjo ireny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary iza no mahalala izay loza hanjo azy roa tonta?
- type: usfm
  marker: s1
  children:
  - type: text
    text: Torohevitra hafa koa avy amin’ny hendry
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Izao koa no tenin’ny hendry:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy mety ny mizaha tavan’olona amin’ny fitsarana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Izay milaza amin’ny meloka hoe: Marina ianao,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hozonin’ny olona sady ho halan’ny firenena;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: fa izay mitsara marina kosa no hahita soa
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy hahazo fitahiana tsara.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Izay manome valinteny tsara
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia manoroka ny molotra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Amboary ny asanao any ivelany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ataovy lavorary ny any an-tsaha,
- type: usfm
  marker: q1
  children:
  - type: text
    text: koa rehefa vita izany dia mahazo manangana ny tranonao ianao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Aza manao fiampangana tsy marim-pototra amin’ny namanao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: moa hamitaka amin’ny molotrao va ianao?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Aza miteny hoe: Araka izay nataony tamiko no mba hataoko aminy kosa,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: hovaliako araka izay nataony ny olona.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny manjo ny kamo
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Nandalo ny sahan’ny kamo
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny tanim-boaloboky ny tsy ampy saina aho;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: koa indro, feno songosongo izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady voasaron’ny tsilo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary nirodana ny fefy vatony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Dia nojereko ka noheveriko tsara;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, hitako ka nahazoako anatra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Mbola hatory kely ihany, mbola ho renoka kely ihany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mbola hanohon-tanana kely hatory;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: dia ho tonga toy ny mpirenireny hamely ny fahantranao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny fahasahirananao ho toy ny jiolahy mirongo fiadiana.
