document_id: PRO.24,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny hendry sy ny ratsy fanahy
  - type: text
    content: Aza mialona ny olona ratsy fanahy,
  - type: text
    content: na maniry ho namany,
  '10':
  - type: text
    content: Raha azom-paharerahana ianao amin’ny andro fahoriana
  - type: text
    content: dia kely izany ny herinao.
  '11':
  - type: text
    content: Afaho izay entina hovonoina,
  - type: text
    content: ary vonjeo izay mangozohozo efa eo am-pamonoana!
  '12':
  - type: text
    content: 'Raha hoy ianao: Tsia, tsy mahalala izany izahay!'
  - type: text
    content: Moa Izay mandanja ny fo va tsy hihevitra izany?
  - type: text
    content: Ary Izay mandinika ny fanahinao va tsy hahalala izany?
  - type: text
    content: Eny, hovaliany araka ny asany avy ny olona rehetra.
  '13':
  - type: text
    content: Anaka, homàna tantely fa tsara izany!
  - type: text
    content: Homàna koa toho-tantely fa ho mamy amin’ny lanilaninao izany.
  '14':
  - type: text
    content: Ary aoka ho toy izany no hianaranao fahendrena ho anao;
  - type: text
    content: fa raha azonao izany dia tsara antoka ny ho avy
  - type: text
    content: ka tsy ho foana ny fanantenanao.
  '15':
  - type: text
    content: Aza manao vela-pandrika eo akaikin’ny tranon’ny marina ianao, ry ilay ratsy;
  - type: text
    content: aza ravanao ny fonenany;
  '16':
  - type: text
    content: fa potraka impito ny marina, nefa tafarina ihany,
  - type: text
    content: fa ny ratsy fanahy kosa dia solafaka raha azom-pahoriana.
  '17':
  - type: text
    content: Aza faly raha lavo ny fahavalonao,
  - type: text
    content: ary aza ravoravo ny fonao raha tafintohina izy;
  '18':
  - type: text
    content: fandrao hitan’NY TOMPO izany ka ho ratsy eo anatrehany,
  - type: text
    content: ary esoriny aminy ny fahatezerany.
  '19':
  - type: text
    content: Aoka tsy hirehitra noho ny amin’ny mpanao ratsy ny fahatezeranao,
  - type: text
    content: ary aza mialona ny ratsy fanahy;
  '2':
  - type: text
    content: fa fandravana no saintsainin’ny fony,
  - type: text
    content: ary fampahoriana no tenenin’ny molony.
  '20':
  - type: text
    content: Fa tsy hisy fanantenana ho an’ny ratsy;
  - type: text
    content: eny, ho faty ny jiron’ny ratsy fanahy.
  '21':
  - type: text
    content: Anaka, matahora NY TOMPO sy ny mpanjaka
  - type: text
    content: ary aza mikambana amin’izay mpanovaova zavatra.
  '22':
  - type: text
    content: Fa ho tampoka no hitrangan’izay hanjo ireny;
  - type: text
    content: ary iza no mahalala izay loza hanjo azy roa tonta?
  - type: heading
    content: Torohevitra hafa koa avy amin’ny hendry
  '23':
  - type: text
    content: 'Izao koa no tenin’ny hendry:'
  - type: text
    content: Tsy mety ny mizaha tavan’olona amin’ny fitsarana.
  '24':
  - type: text
    content: 'Izay milaza amin’ny meloka hoe: Marina ianao,'
  - type: text
    content: dia hozonin’ny olona sady ho halan’ny firenena;
  '25':
  - type: text
    content: fa izay mitsara marina kosa no hahita soa
  - type: text
    content: sy hahazo fitahiana tsara.
  '26':
  - type: text
    content: Izay manome valinteny tsara
  - type: text
    content: dia manoroka ny molotra.
  '27':
  - type: text
    content: Amboary ny asanao any ivelany
  - type: text
    content: ary ataovy lavorary ny any an-tsaha,
  - type: text
    content: koa rehefa vita izany dia mahazo manangana ny tranonao ianao.
  '28':
  - type: text
    content: Aza manao fiampangana tsy marim-pototra amin’ny namanao;
  - type: text
    content: moa hamitaka amin’ny molotrao va ianao?
  '29':
  - type: text
    content: 'Aza miteny hoe: Araka izay nataony tamiko no mba hataoko aminy kosa,'
  - type: text
    content: hovaliako araka izay nataony ny olona.
  - type: heading
    content: Ny manjo ny kamo
  '3':
  - type: text
    content: Fahendrena no anaovana trano,
  - type: text
    content: ary halalinan-tsaina no mampaharitra azy.
  '30':
  - type: text
    content: Nandalo ny sahan’ny kamo
  - type: text
    content: sy ny tanim-boaloboky ny tsy ampy saina aho;
  '31':
  - type: text
    content: koa indro, feno songosongo izy
  - type: text
    content: sady voasaron’ny tsilo,
  - type: text
    content: ary nirodana ny fefy vatony.
  '32':
  - type: text
    content: Dia nojereko ka noheveriko tsara;
  - type: text
    content: eny, hitako ka nahazoako anatra.
  '33':
  - type: text
    content: Mbola hatory kely ihany, mbola ho renoka kely ihany,
  - type: text
    content: mbola hanohon-tanana kely hatory;
  '34':
  - type: text
    content: dia ho tonga toy ny mpirenireny hamely ny fahantranao
  - type: text
    content: ary ny fahasahirananao ho toy ny jiolahy mirongo fiadiana.
  '4':
  - type: text
    content: Fahalalana no hamenoana ny efitrano
  - type: text
    content: amin’izay harena soa sy mahafinaritra rehetra.
  '5':
  - type: text
    content: Feno hery ny lehilahy hendry;
  - type: text
    content: eny, mitombo hery ny olona manam-pahalalana.
  '6':
  - type: text
    content: Fa ny fahaizana mandinika tsara no entonao miady;
  - type: text
    content: ary raha maro ny mpanolotsaina dia misy famonjena.
  '7':
  - type: text
    content: Avo tsy takatry ny adala ny fahendrena;
  - type: text
    content: 'tsy mahaloa-bava eo amin’ny '
  - type: text
    content: vavahady
  - type: text
    content: ' izy.'
  '8':
  - type: text
    content: Izay misaintsaina hanao ratsy
  - type: text
    content: dia antsoina hoe mpamoron-tsain-dratsy.
  '9':
  - type: text
    content: Ota ny fikasan’ny hadalana
  - type: text
    content: ary fahavetavetana eo imason’ny olona ny mpaniratsira.
