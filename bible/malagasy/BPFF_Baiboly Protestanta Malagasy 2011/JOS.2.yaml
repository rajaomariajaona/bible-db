document_id: JOS.2,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nanirahan’i Josoa ny mpisafo tany roa lahy ho any Jeriko
  - type: text
    content: 'Ary naniraka mangingina mpisafo tany roa lahy avy tany Sitima i Josoa, zanak’i Nona, ka niteny taminy hoe: Mandehana zahao ny tany, indrindra fa i Jeriko. Dia niainga izy roa lahy ary niditra tao an-tranon’ny vehivavy janga iray antsoina hoe Rahaba ka nandry tao. '
  '10':
  - type: text
    content: 'Fa efa renay ny nanamainan’NY TOMPO ny Ranomasina Mena teo anoloanareo tamin’ny nivoahanareo avy tany Ejipta; renay koa izay nataonareo tamin’ny mpanjaka Amorita roa lahy izay tany andafin’i Jordana, dia i Sihona sy i Oga, izay nataonareo ho toy ny zavatra voaozona. '
  '11':
  - type: text
    content: 'Ny fandrenesanay ireo dia nahaketraka ny fonay ka very hevitra avokoa izahay noho ny aminareo; fa NY TOMPO Andriamanitrareo, Izy no Andriamanitra any amin’ny lanitra ambony sy etỳ amin’ny tany ambany. '
  '12':
  - type: text
    content: 'Koa ankehitriny, miangavy anareo aho, mba ianiano amin’NY TOMPO, fa araka ny namindrako fo taminareo no mba hamindranareo fo amin’ny ankohonan’ny raiko kosa, koa omeo famantarana azo antoka aho '
  '13':
  - type: text
    content: 'fa hovelominareo ny raiko sy ny reniko mbamin’ny anadahiko sy ny rahavaviko ary izay rehetra mety ho azy; ary hamonjy ny ainay tsy ho faty ianareo. '
  '14':
  - type: text
    content: 'Dia hoy izy roa lahy taminy: Ny ainay no ho faty hisolo anareo raha tsy hambaranareo izao raharahanay izao. Raha omen’NY TOMPO anay ny tany dia hamindra fo sy hanao izay marina aminao izahay. '
  '15':
  - type: text
    content: 'Ary nampidina azy tamin’ny tady mahazaka avy teo amin’ny varavarankely Ravehivavy; fa teo amin’ny mandan’ny tanàna ny tranony ary teo amin’ny manda no nitoerany. '
  '16':
  - type: text
    content: 'Dia hoy Ravehivavy tamin’izy roa lahy: Mandehana any an-tendrombohitra fandrao hifanena amin’ny mpanenjika ianareo ka miere any mandritra ny hateloana mandra-piveriny. Rehefa afaka izany, vao manohy ny dia amin’izay halehanareo ianareo. '
  '17':
  - type: text
    content: 'Ary hoy izy roa lahy taminy: Izao no tsy hanananay tsiny ny amin’izany fianianana nampianianinao anay izany: '
  '18':
  - type: text
    content: 'Indro, rehefa tonga eto amin’ny tany izahay dia hafehinao eo amin’ny varavarankely izay nampidinanao anay io tady kely jaky io dia hovorinao ho ao an-tranonao ny rainao sy ny reninao ary ny anadahinao mbamin’ny ankohonan’ny rainao rehetra; '
  '19':
  - type: text
    content: 'ary izay rehetra mivoaka avy eo am-baravaran’ny tranonao ho eny ivelany dia ho eo an-dohany ihany ny rany ary izahay dia tsy hanan-tsiny; fa izay rehetra mitoetra ao aminao ao an-trano kosa dia ho eo an-dohanay ny rany raha toa ka misy olona mikasi-tanana azy; '
  '2':
  - type: text
    content: 'Ary nisy nilaza tamin’ny mpanjakan’i Jeriko hoe: Injao, misy olona avy tamin’ny Zanak’Israely tonga atỳ izao alina izao hisafo ny tany. '
  '20':
  - type: text
    content: 'fa raha toa ka hambarambaranao kosa izao raharahanay izao dia ho afaka amin’ny fianianana izay nampianianinao anay izahay. '
  '21':
  - type: text
    content: 'Dia hoy Ravehivavy: Eny ary fa marina izany. Dia nampandehaniny izy roa lahy ka lasa nandeha; dia nafehiny teo amin’ny varavarankely ilay tady kely jaky.'
  '22':
  - type: text
    content: 'Dia nandeha izy roa lahy ka nankany an-tendrombohitra ary nitoetra tany hateloana mandra-piverin’ny mpanenjika; nitady azy tamin’ny lalana rehetra ny mpanenjika nefa tsy nahita. '
  '23':
  - type: text
    content: 'Dia niverina izy roa lahy ka nidina avy tany an-tendrombohitra dia nita ny ony ary nankany amin’i Josoa, zanak’i Nona, ka nilaza ny zavatra rehetra izay nihatra taminy. '
  '24':
  - type: text
    content: 'Hoy izy ireo tamin’i Josoa: Efa natolotry NY TOMPO eo an-tanantsika tokoa ny tany rehetra; ary ketraka noho ny tahotra antsika ny mponina rehetra amin’ny tany.'
  '3':
  - type: text
    content: 'Dia nandefa iraka tao amin’i Rahaba ny mpanjakan’i Jeriko hiteny hoe: Avoahy ireo lehilahy tonga ato an-tranonao ireo fa hisafo ny tany manontolo no niaviany. '
  '4':
  - type: text
    content: 'Nalain-dRavehivavy anefa izy roa lahy ka nafeniny ary hoy izy: Tonga tatỳ amiko ihany tokoa ireny lehilahy ireny nefa tsy fantatro hoe avy aiza izy. '
  '5':
  - type: text
    content: 'Rehefa maizina ny andro ary hohidina ny vavahady dia lasa nandeha izy ka tsy fantatro indray izay nalehany. Enjeho haingana izy fa ho tratranareo. '
  '6':
  - type: text
    content: Kanjo efa nampiakarin-dRavehivavy tany an-
  - type: text
    content: tampon-trano
  - type: text
    content: ' izy ireo ka nafeniny tao amin’ny tahon-drongony izay nalahany teo an-tampon-trano. '
  '7':
  - type: text
    content: Ary ireo olona dia nanenjika azy tamin’ny lalana mankany Jordana hatrany amin’ny fitàna. Ary rehefa lasa nandeha izay nanenjika azy dia nohidina ny vavahady.
  '8':
  - type: text
    content: 'Raha mbola tsy natory izy roa lahy dia niakatra nankao aminy tao an-tampon-trano Ravehivavy '
  '9':
  - type: text
    content: 'ka niteny taminy hoe: Fantatro fa efa nomen’NY TOMPO anareo ny tany, koa efa mahazo anay ny tahotra anareo sady ketraka ny mponina rehetra amin’ny tany noho ny tahotra anareo. '
