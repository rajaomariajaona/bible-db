document_id: JOS.2
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nanirahan’i Josoa ny mpisafo tany roa lahy ho any Jeriko
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary naniraka mangingina mpisafo tany roa lahy avy tany Sitima i Josoa, zanak’i Nona, ka niteny taminy hoe: Mandehana zahao ny tany, indrindra fa i Jeriko. Dia niainga izy roa lahy ary niditra tao an-tranon’ny vehivavy janga iray antsoina hoe Rahaba ka nandry tao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary nisy nilaza tamin’ny mpanjakan’i Jeriko hoe: Injao, misy olona avy tamin’ny Zanak’Israely tonga atỳ izao alina izao hisafo ny tany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dia nandefa iraka tao amin’i Rahaba ny mpanjakan’i Jeriko hiteny hoe: Avoahy ireo lehilahy tonga ato an-tranonao ireo fa hisafo ny tany manontolo no niaviany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Nalain-dRavehivavy anefa izy roa lahy ka nafeniny ary hoy izy: Tonga tatỳ amiko ihany tokoa ireny lehilahy ireny nefa tsy fantatro hoe avy aiza izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Rehefa maizina ny andro ary hohidina ny vavahady dia lasa nandeha izy ka tsy fantatro indray izay nalehany. Enjeho haingana izy fa ho tratranareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Kanjo efa nampiakarin-dRavehivavy tany an-
  - type: usfm
    marker: w
    children:
    - type: text
      text: tampon-trano
  - type: text
    text: ' izy ireo ka nafeniny tao amin’ny tahon-drongony izay nalahany teo an-tampon-trano. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ary ireo olona dia nanenjika azy tamin’ny lalana mankany Jordana hatrany amin’ny fitàna. Ary rehefa lasa nandeha izay nanenjika azy dia nohidina ny vavahady.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Raha mbola tsy natory izy roa lahy dia niakatra nankao aminy tao an-tampon-trano Ravehivavy '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'ka niteny taminy hoe: Fantatro fa efa nomen’NY TOMPO anareo ny tany, koa efa mahazo anay ny tahotra anareo sady ketraka ny mponina rehetra amin’ny tany noho ny tahotra anareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Fa efa renay ny nanamainan’NY TOMPO ny Ranomasina Mena teo anoloanareo tamin’ny nivoahanareo avy tany Ejipta; renay koa izay nataonareo tamin’ny mpanjaka Amorita roa lahy izay tany andafin’i Jordana, dia i Sihona sy i Oga, izay nataonareo ho toy ny zavatra voaozona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ny fandrenesanay ireo dia nahaketraka ny fonay ka very hevitra avokoa izahay noho ny aminareo; fa NY TOMPO Andriamanitrareo, Izy no Andriamanitra any amin’ny lanitra ambony sy etỳ amin’ny tany ambany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Koa ankehitriny, miangavy anareo aho, mba ianiano amin’NY TOMPO, fa araka ny namindrako fo taminareo no mba hamindranareo fo amin’ny ankohonan’ny raiko kosa, koa omeo famantarana azo antoka aho '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'fa hovelominareo ny raiko sy ny reniko mbamin’ny anadahiko sy ny rahavaviko ary izay rehetra mety ho azy; ary hamonjy ny ainay tsy ho faty ianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dia hoy izy roa lahy taminy: Ny ainay no ho faty hisolo anareo raha tsy hambaranareo izao raharahanay izao. Raha omen’NY TOMPO anay ny tany dia hamindra fo sy hanao izay marina aminao izahay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary nampidina azy tamin’ny tady mahazaka avy teo amin’ny varavarankely Ravehivavy; fa teo amin’ny mandan’ny tanàna ny tranony ary teo amin’ny manda no nitoerany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Dia hoy Ravehivavy tamin’izy roa lahy: Mandehana any an-tendrombohitra fandrao hifanena amin’ny mpanenjika ianareo ka miere any mandritra ny hateloana mandra-piveriny. Rehefa afaka izany, vao manohy ny dia amin’izay halehanareo ianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary hoy izy roa lahy taminy: Izao no tsy hanananay tsiny ny amin’izany fianianana nampianianinao anay izany: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Indro, rehefa tonga eto amin’ny tany izahay dia hafehinao eo amin’ny varavarankely izay nampidinanao anay io tady kely jaky io dia hovorinao ho ao an-tranonao ny rainao sy ny reninao ary ny anadahinao mbamin’ny ankohonan’ny rainao rehetra; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'ary izay rehetra mivoaka avy eo am-baravaran’ny tranonao ho eny ivelany dia ho eo an-dohany ihany ny rany ary izahay dia tsy hanan-tsiny; fa izay rehetra mitoetra ao aminao ao an-trano kosa dia ho eo an-dohanay ny rany raha toa ka misy olona mikasi-tanana azy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'fa raha toa ka hambarambaranao kosa izao raharahanay izao dia ho afaka amin’ny fianianana izay nampianianinao anay izahay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Dia hoy Ravehivavy: Eny ary fa marina izany. Dia nampandehaniny izy roa lahy ka lasa nandeha; dia nafehiny teo amin’ny varavarankely ilay tady kely jaky.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Dia nandeha izy roa lahy ka nankany an-tendrombohitra ary nitoetra tany hateloana mandra-piverin’ny mpanenjika; nitady azy tamin’ny lalana rehetra ny mpanenjika nefa tsy nahita. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Dia niverina izy roa lahy ka nidina avy tany an-tendrombohitra dia nita ny ony ary nankany amin’i Josoa, zanak’i Nona, ka nilaza ny zavatra rehetra izay nihatra taminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Hoy izy ireo tamin’i Josoa: Efa natolotry NY TOMPO eo an-tanantsika tokoa ny tany rehetra; ary ketraka noho ny tahotra antsika ny mponina rehetra amin’ny tany.'
