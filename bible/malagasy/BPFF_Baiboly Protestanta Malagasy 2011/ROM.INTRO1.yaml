document_id: ROM.INTRO1
type_code: plt
segments:
- type: usfm
  marker: imt1
  children:
  - type: text
    text: INDRAY MIJERY
- type: usfm
  marker: ip
  children:
  - type: text
    text: Tany Korinto i Paoly no nanoratra ity epistily ho an’ny Romana ity. Namaramparana ny asany tany Korinto izy ary handeha hitondra ny fanampiana voavoriny tany Makedonia sy Akaia ho any Jerosalema.
- type: usfm
  marker: ip
  children:
  - type: text
    text: I Tertio no mpitantsoratra nampanoratin’i Paoly ny Epistily, ary mety ho i Foiby no nitondra ny taratasy tany Roma. Tsy mba anisan’ny tany nitorian’i Paoly ny Filazantsara i Roma ary tsy mbola tany izy tamin’ny fotoana nanoratany ny taratasy ho an’ny Romana, saingy fantany tsara kosa ny mombamomba ny Fiangonana tany. Na izany aza dia naniry mafy ny hankany Roma izy rehefa miverina avy manatitra ny fanampiana any Jerosalema, amin’ny diany ho any Espaina.
- type: usfm
  marker: ip
  children:
  - type: text
    text: Tsy fantatra mazava na iza na iza no nitory ny Filazantsara tany Roma ary tsy fantatra mazava koa ny fotoana niforonan’ny Fiangonana tany. Ny azo antoka, araka ny filazan’i Paoly, dia efa an-taonany maro no niforonan’ny Fiangonana kristiana tany Roma.
- type: usfm
  marker: ip
  children:
  - type: text
    text: Mivohitra ao amin’ny Epistily fa samy itodihan’i Paoly na ny Jentilisa tonga Kristiana tany Roma, na ny Jiosy tonga Kristiana. Ny fitodihany amin’ireo Jiosy kristiana dia hamafisiny amin’ny fampiasana teny ao amin’ny Testamenta Taloha amin’ny famelabelarana ataony.
- type: usfm
  marker: is1
  children:
  - type: text
    text: Ny votoatin’ny Epistily
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Ny hevi-dehibe mivohitra ao amin’ny epistily ho an’ny Romana ka ifantohan’ny famelabelarana rehetra ataon’i Paoly dia ny 1.16-17: «Fa tsy menatra ny Filazantsara aho satria herin’Andriamanitra ho famonjena izay rehetra mino izany, amin’ny Jiosy aloha, nefa amin’ny Jentilisa koa. Fa amin’izany no anehoana fahamarinana avy amin’Andriamanitra avy amin’ny finoana sy ho amin’ny finoana, araka ny voasoratra hoe: Ny marina amin’ny finoana no ho velona». Io hevi-dehibe momba ny fanamarinana amin’ny finoana io dia noentin’i Paoly nampieritreritra ny Jiosy izay fatra-pifikitra amin’ny Lalàna, koa io no nataony ho fampaherezana ny Jentilisa. Nanana lanjany lehibe teo amin’ireo mpanitsy fivavahana tamin’ny taonjato faha-16 koa ny epistily ho an’ny Romana noho ity hevi-dehibe ny amin’ny fanamarinana ity.'
- type: usfm
  marker: iot
  children:
  - type: text
    text: Ny firafitry ny Epistily
- type: usfm
  marker: io1
  children:
  - type: text
    text: 'Fiarahabana sy fampidirana: 1.1-15'
- type: usfm
  marker: io1
  children:
  - type: text
    text: 'Amin’ny finoana ihany no anamarinana ny olona: 1.16–4.25'
- type: usfm
  marker: io1
  children:
  - type: text
    text: 'Ny lalànan’ny fahafatesana sy ny lalànan’ny fiainana: 5–8'
- type: usfm
  marker: io1
  children:
  - type: text
    text: 'Ho an’ny olona rehetra ny fahasoavan’Andriamanitra: 9–11'
- type: usfm
  marker: io1
  children:
  - type: text
    text: 'Ny fiainan’ny olom-boavonjy: 12–15.13'
- type: usfm
  marker: io1
  children:
  - type: text
    text: 'Famaranana sy fanaovam-beloma: 15.14–16.27'
