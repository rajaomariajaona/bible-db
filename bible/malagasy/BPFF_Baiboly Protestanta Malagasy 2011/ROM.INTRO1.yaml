document_id: ROM.INTRO1,3103
type_code: plt
verses:
  '1':
  - type: text
    content: INDRAY MIJERY
  - type: text
    content: Tany Korinto i Paoly no nanoratra ity epistily ho an’ny Romana ity. Namaramparana ny asany tany Korinto izy ary handeha hitondra ny fanampiana voavoriny tany Makedonia sy Akaia ho any Jerosalema.
  - type: text
    content: I Tertio no mpitantsoratra nampanoratin’i Paoly ny Epistily, ary mety ho i Foiby no nitondra ny taratasy tany Roma. Tsy mba anisan’ny tany nitorian’i Paoly ny Filazantsara i Roma ary tsy mbola tany izy tamin’ny fotoana nanoratany ny taratasy ho an’ny Romana, saingy fantany tsara kosa ny mombamomba ny Fiangonana tany. Na izany aza dia naniry mafy ny hankany Roma izy rehefa miverina avy manatitra ny fanampiana any Jerosalema, amin’ny diany ho any Espaina.
  - type: text
    content: Tsy fantatra mazava na iza na iza no nitory ny Filazantsara tany Roma ary tsy fantatra mazava koa ny fotoana niforonan’ny Fiangonana tany. Ny azo antoka, araka ny filazan’i Paoly, dia efa an-taonany maro no niforonan’ny Fiangonana kristiana tany Roma.
  - type: text
    content: Mivohitra ao amin’ny Epistily fa samy itodihan’i Paoly na ny Jentilisa tonga Kristiana tany Roma, na ny Jiosy tonga Kristiana. Ny fitodihany amin’ireo Jiosy kristiana dia hamafisiny amin’ny fampiasana teny ao amin’ny Testamenta Taloha amin’ny famelabelarana ataony.
  - type: text
    content: Ny votoatin’ny Epistily
  - type: text
    content: 'Ny hevi-dehibe mivohitra ao amin’ny epistily ho an’ny Romana ka ifantohan’ny famelabelarana rehetra ataon’i Paoly dia ny 1.16-17: «Fa tsy menatra ny Filazantsara aho satria herin’Andriamanitra ho famonjena izay rehetra mino izany, amin’ny Jiosy aloha, nefa amin’ny Jentilisa koa. Fa amin’izany no anehoana fahamarinana avy amin’Andriamanitra avy amin’ny finoana sy ho amin’ny finoana, araka ny voasoratra hoe: Ny marina amin’ny finoana no ho velona». Io hevi-dehibe momba ny fanamarinana amin’ny finoana io dia noentin’i Paoly nampieritreritra ny Jiosy izay fatra-pifikitra amin’ny Lalàna, koa io no nataony ho fampaherezana ny Jentilisa. Nanana lanjany lehibe teo amin’ireo mpanitsy fivavahana tamin’ny taonjato faha-16 koa ny epistily ho an’ny Romana noho ity hevi-dehibe ny amin’ny fanamarinana ity.'
  - type: text
    content: Ny firafitry ny Epistily
  - type: text
    content: 'Fiarahabana sy fampidirana: 1.1-15'
  - type: text
    content: 'Amin’ny finoana ihany no anamarinana ny olona: 1.16–4.25'
  - type: text
    content: 'Ny lalànan’ny fahafatesana sy ny lalànan’ny fiainana: 5–8'
  - type: text
    content: 'Ho an’ny olona rehetra ny fahasoavan’Andriamanitra: 9–11'
  - type: text
    content: 'Ny fiainan’ny olom-boavonjy: 12–15.13'
  - type: text
    content: 'Famaranana sy fanaovam-beloma: 15.14–16.27'
