document_id: ACT.1
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Eo am-piandrasana ny Fanahy Masina
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ry Teofilo,
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ilay boky voalohany dia nosoratako momba izay natombok’i Jesosy natao sy nampianarina, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: hatramin’ny andro nampiakarana Azy, rehefa avy nodidiany tamin’ny alalan’ny Fanahy Masina ny Apostoly izay nofidiny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Niseho tamin’ireo tamin’ny famantarana maro koa Izy fa velona, taorianan’ny nijaliany; eny, niseho tamin’izy ireo nandritra ny efapolo andro Izy ary nilaza ny amin’ny fanjakan’Andriamanitra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Raha niara-nisakafo tamin’izy ireo Jesosy dia namepetra azy tsy hiala tao Jerosalema fa hiandry ny teny fikasan’ny Ray izay efa renareo tamiko, hoy Izy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: fa i Jaona dia nanao batisa tamin’ny rano fa ianareo kosa dia hatao batisa amin’ny Fanahy Masina rehefa afaka andro vitsivitsy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny niakaran’i Jesosy ho any an-danitra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Koa izay tafangona teo dia nanontany Azy hoe: Tompoko, amin’izao va no hampodianao ny fanjakana ho amin’ny Israely? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Fa hoy kosa Izy taminy: Tsy anjaranareo ny hahafantatra ny andro na ny fotoana izay efa notendren’ny Ray amin’ny fahefany irery ihany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Fa hahazo hery ianareo amin’ny hahatongavan’ny Fanahy Masina aminareo ka ho vavolombeloko any Jerosalema sy manerana an’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jodia
  - type: text
    text: ' sy i Samaria ary hatrany amin’ny faran’ny tany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Rehefa nilaza izany Jesosy dia nakarina, raha mbola nijery izy ireo; nisy rahona nitondra Azy ka tsy hitan’ny masony intsony Izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary raha mbola nandinika ny lanitra izy ireo tamin’ny nandehanan’i Jesosy dia indreo, nisy roa lahy tonga teo anilany, niakanjo fotsy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'ary niteny hoe: Ry lehilahy galiliana, nahoana no mijanona eto mijery ny lanitra ianareo? Iny Jesosy izay nampiakarina niala taminareo ho any an-danitra iny dia mbola ho avy indray tahaka ny nahitanareo Azy niakatra ho any an-danitra.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fiombonan’ny Apostoly
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Dia niverina nankany Jerosalema izy ireo rehefa avy teo amin’ny tendrombohitra atao hoe Oliva izay akaikin’i Jerosalema, halaviran-dalana azo aleha amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Sabata
  - type: text
    text: .
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat 10.2-4; Mar 3.16-19; Lio 6.13-16
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Rehefa tafiditra ny tanàna izy ireo dia niakatra ho any amin’ny efitra ambony rihana izay nipetrahany; i Petera, i Jaona, i Jakoba, i Andrea, i Filipo, i Tomasy, i Bartolomeo, i Matio, i Jakoba zanak’i Alfeo, i Simona Zelota ary i Jodasy, zanak’i Jakoba no tao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ireo rehetra ireo dia niray saina sady naharitra nivavaka niaraka tamin’ny vehivavy sy i Maria, renin’i Jesosy, ary ireo rahalahiny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Tamin’izany andro izany dia nitsangana teo afovoan’ireo rahalahy i Petera; tokony ho roapolo amby zato no isan’ny olona vory teo tamin’izay ka hoy izy: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ry rahalahy, tsy maintsy notanterahina ilay tenin’ny Soratra Masina izay nampilazain’ny Fanahy Masina mialoha an’i Davida, ny amin’i Jodasy izay tonga mpitarika ireo olona nisambotra an’i Jesosy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'izy iny dia isantsika ihany ka nahazo anjara tamin’izao fanompoana izao koa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary izany lehilahy izany dia nahazo saha tamin’ny tambin’ny fahotany; ary potraka niankohoka izy, dia vaky ny kibony ka nipoaka sady nivaroraka avokoa ny tsinainy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary fantatr’izay rehetra monina eto Jerosalema izany, koa ny anaran’io saha io, amin’ny fitenin-dry zareo, dia atao hoe Akeldama, izany hoe Sahan-dra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Fa voasoratra ao amin’ny bokin’ny Salamo hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Aoka ho lao ny fonenany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary aoka tsy hisy olona honina ao.» (Sal 69.25)
- type: usfm
  marker: m
  children:
  - type: text
    text: 'ary koa:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Aoka ho lasan’olon-kafa ny anjara raharahany.» (Sal 109.8)
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Koa amin’ireo lehilahy niaraka tamintsika mandrakariva ireo, raha nifanerasera tamintsika Jesosy Tompo, nanomboka tamin’ny batisan’i Jaona ka '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: hatramin’ny andro nampiakarana Azy niala tamintsika, dia tokony hisy iray ho namantsika mba ho vavolombelon’ny nitsanganany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary nanokana roa lahy izy ireo, dia i Josefa, antsoina hoe Barsabasy, izay antsoina koa hoe Josto, sy i Matia. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Dia nivavaka izy hoe: Ianao, Tompo ô, izay mahalala ny fon’ny olona rehetra, asehoy izay nofidinao amin’izy roa lahy ireto, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'mba hahazoany anjara amin’izao fanompoana sy ny maha apostoly izao, izay nialan’i Jodasy ho any amin’ny anjara toerany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Dia nanao antsapaka ho azy izy ireo ka nianjera tamin’i Matia ny antsapaka; ary izy izany no lany ho naman’ny apostoly iraika amby folo lahy.
