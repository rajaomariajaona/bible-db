document_id: ACT.1,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Eo am-piandrasana ny Fanahy Masina
  - type: text
    content: Ry Teofilo,
  - type: text
    content: 'Ilay boky voalohany dia nosoratako momba izay natombok’i Jesosy natao sy nampianarina, '
  '10':
  - type: text
    content: 'Ary raha mbola nandinika ny lanitra izy ireo tamin’ny nandehanan’i Jesosy dia indreo, nisy roa lahy tonga teo anilany, niakanjo fotsy, '
  '11':
  - type: text
    content: 'ary niteny hoe: Ry lehilahy galiliana, nahoana no mijanona eto mijery ny lanitra ianareo? Iny Jesosy izay nampiakarina niala taminareo ho any an-danitra iny dia mbola ho avy indray tahaka ny nahitanareo Azy niakatra ho any an-danitra.'
  - type: heading
    content: Ny fiombonan’ny Apostoly
  '12':
  - type: text
    content: 'Dia niverina nankany Jerosalema izy ireo rehefa avy teo amin’ny tendrombohitra atao hoe Oliva izay akaikin’i Jerosalema, halaviran-dalana azo aleha amin’ny '
  - type: text
    content: Sabata
  - type: text
    content: .
  - type: heading
    content: Mat 10.2-4; Mar 3.16-19; Lio 6.13-16
  '13':
  - type: text
    content: 'Rehefa tafiditra ny tanàna izy ireo dia niakatra ho any amin’ny efitra ambony rihana izay nipetrahany; i Petera, i Jaona, i Jakoba, i Andrea, i Filipo, i Tomasy, i Bartolomeo, i Matio, i Jakoba zanak’i Alfeo, i Simona Zelota ary i Jodasy, zanak’i Jakoba no tao. '
  '14':
  - type: text
    content: Ireo rehetra ireo dia niray saina sady naharitra nivavaka niaraka tamin’ny vehivavy sy i Maria, renin’i Jesosy, ary ireo rahalahiny.
  '15':
  - type: text
    content: 'Tamin’izany andro izany dia nitsangana teo afovoan’ireo rahalahy i Petera; tokony ho roapolo amby zato no isan’ny olona vory teo tamin’izay ka hoy izy: '
  '16':
  - type: text
    content: 'Ry rahalahy, tsy maintsy notanterahina ilay tenin’ny Soratra Masina izay nampilazain’ny Fanahy Masina mialoha an’i Davida, ny amin’i Jodasy izay tonga mpitarika ireo olona nisambotra an’i Jesosy; '
  '17':
  - type: text
    content: 'izy iny dia isantsika ihany ka nahazo anjara tamin’izao fanompoana izao koa. '
  '18':
  - type: text
    content: 'Ary izany lehilahy izany dia nahazo saha tamin’ny tambin’ny fahotany; ary potraka niankohoka izy, dia vaky ny kibony ka nipoaka sady nivaroraka avokoa ny tsinainy. '
  '19':
  - type: text
    content: 'Ary fantatr’izay rehetra monina eto Jerosalema izany, koa ny anaran’io saha io, amin’ny fitenin-dry zareo, dia atao hoe Akeldama, izany hoe Sahan-dra. '
  '2':
  - type: text
    content: hatramin’ny andro nampiakarana Azy, rehefa avy nodidiany tamin’ny alalan’ny Fanahy Masina ny Apostoly izay nofidiny.
  '20':
  - type: text
    content: 'Fa voasoratra ao amin’ny bokin’ny Salamo hoe:'
  - type: text
    content: «Aoka ho lao ny fonenany
  - type: text
    content: ary aoka tsy hisy olona honina ao.» (Sal 69.25)
  - type: text
    content: 'ary koa:'
  - type: text
    content: «Aoka ho lasan’olon-kafa ny anjara raharahany.» (Sal 109.8)
  '21':
  - type: text
    content: 'Koa amin’ireo lehilahy niaraka tamintsika mandrakariva ireo, raha nifanerasera tamintsika Jesosy Tompo, nanomboka tamin’ny batisan’i Jaona ka '
  '22':
  - type: text
    content: hatramin’ny andro nampiakarana Azy niala tamintsika, dia tokony hisy iray ho namantsika mba ho vavolombelon’ny nitsanganany.
  '23':
  - type: text
    content: 'Ary nanokana roa lahy izy ireo, dia i Josefa, antsoina hoe Barsabasy, izay antsoina koa hoe Josto, sy i Matia. '
  '24':
  - type: text
    content: 'Dia nivavaka izy hoe: Ianao, Tompo ô, izay mahalala ny fon’ny olona rehetra, asehoy izay nofidinao amin’izy roa lahy ireto, '
  '25':
  - type: text
    content: 'mba hahazoany anjara amin’izao fanompoana sy ny maha apostoly izao, izay nialan’i Jodasy ho any amin’ny anjara toerany. '
  '26':
  - type: text
    content: Dia nanao antsapaka ho azy izy ireo ka nianjera tamin’i Matia ny antsapaka; ary izy izany no lany ho naman’ny apostoly iraika amby folo lahy.
  '3':
  - type: text
    content: Niseho tamin’ireo tamin’ny famantarana maro koa Izy fa velona, taorianan’ny nijaliany; eny, niseho tamin’izy ireo nandritra ny efapolo andro Izy ary nilaza ny amin’ny fanjakan’Andriamanitra.
  '4':
  - type: text
    content: 'Raha niara-nisakafo tamin’izy ireo Jesosy dia namepetra azy tsy hiala tao Jerosalema fa hiandry ny teny fikasan’ny Ray izay efa renareo tamiko, hoy Izy; '
  '5':
  - type: text
    content: fa i Jaona dia nanao batisa tamin’ny rano fa ianareo kosa dia hatao batisa amin’ny Fanahy Masina rehefa afaka andro vitsivitsy.
  - type: heading
    content: Ny niakaran’i Jesosy ho any an-danitra
  '6':
  - type: text
    content: 'Koa izay tafangona teo dia nanontany Azy hoe: Tompoko, amin’izao va no hampodianao ny fanjakana ho amin’ny Israely? '
  '7':
  - type: text
    content: 'Fa hoy kosa Izy taminy: Tsy anjaranareo ny hahafantatra ny andro na ny fotoana izay efa notendren’ny Ray amin’ny fahefany irery ihany. '
  '8':
  - type: text
    content: 'Fa hahazo hery ianareo amin’ny hahatongavan’ny Fanahy Masina aminareo ka ho vavolombeloko any Jerosalema sy manerana an’i '
  - type: text
    content: Jodia
  - type: text
    content: ' sy i Samaria ary hatrany amin’ny faran’ny tany.'
  '9':
  - type: text
    content: 'Rehefa nilaza izany Jesosy dia nakarina, raha mbola nijery izy ireo; nisy rahona nitondra Azy ka tsy hitan’ny masony intsony Izy. '
