document_id: PSA.74,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fitarainana tamin’Andriamanitra noho ny faharavan’ny tempoly
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: Maskila nataon’i Asafa.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Andriamanitra ô, nahoana no nanary anay mandrakizay Ianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no sady manetroka amin’ny ondry fiandrinao ny fahatezeranao?
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Mandra-pahoviana, Andriamanitra ô, no hanaratsian’ny mpandrafy?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hanamavo ny anaranao mandrakizay va ny fahavalo?
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Nahoana no mampihemotra ny tananao, dia ny tananao ankavanana, Ianao?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mampialà azy amin’ny tratranao ka mandringàna!
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Andriamanitra anefa no Mpanjakako hatrizay hatrizay;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: manao famonjena eny amin’ny tany Izy.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Ianao no nampisaraka ny ranomasina tamin’ny herinao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ianao no namakivaky ny lohan’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: dragona
    - type: text
      text: ' tao anaty rano.'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Ianao no nanorotoro ny lohan’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: leviatana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka nanome azy hohanin’izay firenena any an-tany efitra.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Ianao no namaky ny vatolampy hamoaka loharano sy ony;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ianao no nahatankina ny ony tsy mety ritra.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Anao ny andro, anao koa ny alina;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ianao no nampitoetra ny volana sy ny masoandro.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Ianao no nametraka ny sisiny rehetra amin’ny tany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny fahavaratra sy ny ririnina dia Ianao no namolavola azy.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Tsarovy izao: Manaratsy NY TOMPO ny fahavalo'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary manamavo ny anaranao ny olona adala.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Aza manolotra ny ain’ny voromailalanao ho an’ny bibidia
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary aza manadino mandrakizay ny ain’ny olo-mahantranao.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Tsarovy ny fiangonanao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay efa azonao ho fananana fahiny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ilay navotanao ho firenena lovanao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'dia ny tendrombohitra '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Ziona
    - type: text
      text: ' izay nonenanao.'
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Hevero ny fanekena!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa feno fonenan’ny fanaovana an-keriny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny toerana maizina amin’ny tany.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Aoka tsy hiverina amin-kenatra ny mahantra!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka ny ory sy ny malahelo hidera ny anaranao!
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Mitsangàna, Andriamanitra ô, efao ny adinao!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsarovy ny fanaratsian’ny adala Anao mandritra ny andro!
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Aza manadino ny feon’ny rafinao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ny tabataba izay miakatra mandrakariva avy amin’ireo mpanohitra Anao!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Aingao ny tongotrao ka miakara ho amin’ny voarava mandrakizay!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny zavatra rehetra tao amin’ny fitoerana masina dia simban’ny fahavalo avokoa.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Nierona tao anatin’ny toeram-pivorian’ny fiangonanao ny mpandrafy Anao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nanangana ny fanevany ho famantarana izy.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Ny fijery azy dia tahaka ny olona manainga
  - type: usfm
    marker: q1
    children:
    - type: text
      text: famaky hijinja ny ala mikitroka;
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ary ankehitriny, ny rafitra voasokitra rehetra ao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia nasiany ny famaky sy ny kanonta.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Nandoro ny fitoeranao masina tamin’ny afo izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nolotoiny sy nazerany tamin’ny tany ny fonenan’ny anaranao.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Hoy izy anakampo: Aoka hampahorintsika izy rehetra!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nandoro izay rehetra toerana fihaonana amin’Andriamanitra manerana ny tany izy.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Tsy hitanay intsony ny famantaranay;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy misy mpaminany intsony
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy misy aminay mahalala izay mbola haharetan’izao.
