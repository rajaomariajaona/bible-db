document_id: PSA.74,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Fitarainana tamin’Andriamanitra noho ny faharavan’ny tempoly
  - type: text
    content: Maskila nataon’i Asafa.
  - type: text
    content: Andriamanitra ô, nahoana no nanary anay mandrakizay Ianao,
  - type: text
    content: no sady manetroka amin’ny ondry fiandrinao ny fahatezeranao?
  '10':
  - type: text
    content: Mandra-pahoviana, Andriamanitra ô, no hanaratsian’ny mpandrafy?
  - type: text
    content: Hanamavo ny anaranao mandrakizay va ny fahavalo?
  '11':
  - type: text
    content: Nahoana no mampihemotra ny tananao, dia ny tananao ankavanana, Ianao?
  - type: text
    content: Mampialà azy amin’ny tratranao ka mandringàna!
  '12':
  - type: text
    content: Andriamanitra anefa no Mpanjakako hatrizay hatrizay;
  - type: text
    content: manao famonjena eny amin’ny tany Izy.
  '13':
  - type: text
    content: Ianao no nampisaraka ny ranomasina tamin’ny herinao,
  - type: text
    content: 'Ianao no namakivaky ny lohan’ny '
  - type: text
    content: dragona
  - type: text
    content: ' tao anaty rano.'
  '14':
  - type: text
    content: 'Ianao no nanorotoro ny lohan’ny '
  - type: text
    content: leviatana
  - type: text
    content: ka nanome azy hohanin’izay firenena any an-tany efitra.
  '15':
  - type: text
    content: Ianao no namaky ny vatolampy hamoaka loharano sy ony;
  - type: text
    content: Ianao no nahatankina ny ony tsy mety ritra.
  '16':
  - type: text
    content: Anao ny andro, anao koa ny alina;
  - type: text
    content: Ianao no nampitoetra ny volana sy ny masoandro.
  '17':
  - type: text
    content: Ianao no nametraka ny sisiny rehetra amin’ny tany;
  - type: text
    content: ny fahavaratra sy ny ririnina dia Ianao no namolavola azy.
  '18':
  - type: text
    content: 'Tsarovy izao: Manaratsy NY TOMPO ny fahavalo'
  - type: text
    content: ary manamavo ny anaranao ny olona adala.
  '19':
  - type: text
    content: Aza manolotra ny ain’ny voromailalanao ho an’ny bibidia
  - type: text
    content: ary aza manadino mandrakizay ny ain’ny olo-mahantranao.
  '2':
  - type: text
    content: Tsarovy ny fiangonanao
  - type: text
    content: izay efa azonao ho fananana fahiny,
  - type: text
    content: ilay navotanao ho firenena lovanao,
  - type: text
    content: 'dia ny tendrombohitra '
  - type: text
    content: Ziona
  - type: text
    content: ' izay nonenanao.'
  '20':
  - type: text
    content: Hevero ny fanekena!
  - type: text
    content: Fa feno fonenan’ny fanaovana an-keriny
  - type: text
    content: ny toerana maizina amin’ny tany.
  '21':
  - type: text
    content: Aoka tsy hiverina amin-kenatra ny mahantra!
  - type: text
    content: Aoka ny ory sy ny malahelo hidera ny anaranao!
  '22':
  - type: text
    content: Mitsangàna, Andriamanitra ô, efao ny adinao!
  - type: text
    content: Tsarovy ny fanaratsian’ny adala Anao mandritra ny andro!
  '23':
  - type: text
    content: Aza manadino ny feon’ny rafinao,
  - type: text
    content: dia ny tabataba izay miakatra mandrakariva avy amin’ireo mpanohitra Anao!
  '3':
  - type: text
    content: Aingao ny tongotrao ka miakara ho amin’ny voarava mandrakizay!
  - type: text
    content: Ny zavatra rehetra tao amin’ny fitoerana masina dia simban’ny fahavalo avokoa.
  '4':
  - type: text
    content: Nierona tao anatin’ny toeram-pivorian’ny fiangonanao ny mpandrafy Anao;
  - type: text
    content: nanangana ny fanevany ho famantarana izy.
  '5':
  - type: text
    content: Ny fijery azy dia tahaka ny olona manainga
  - type: text
    content: famaky hijinja ny ala mikitroka;
  '6':
  - type: text
    content: ary ankehitriny, ny rafitra voasokitra rehetra ao
  - type: text
    content: dia nasiany ny famaky sy ny kanonta.
  '7':
  - type: text
    content: Nandoro ny fitoeranao masina tamin’ny afo izy;
  - type: text
    content: nolotoiny sy nazerany tamin’ny tany ny fonenan’ny anaranao.
  '8':
  - type: text
    content: 'Hoy izy anakampo: Aoka hampahorintsika izy rehetra!'
  - type: text
    content: Nandoro izay rehetra toerana fihaonana amin’Andriamanitra manerana ny tany izy.
  '9':
  - type: text
    content: Tsy hitanay intsony ny famantaranay;
  - type: text
    content: tsy misy mpaminany intsony
  - type: text
    content: ary tsy misy aminay mahalala izay mbola haharetan’izao.
