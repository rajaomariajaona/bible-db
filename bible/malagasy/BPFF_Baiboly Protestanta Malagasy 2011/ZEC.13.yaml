document_id: ZEC.13,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Holevonin’Andriamanitra ny sampy sy ny mpaminany sandoka rehetra
  - type: text
    content: Amin’izany andro izany dia hisy loharano voasokatra ho an’ny taranak’i Davida sy ho an’ny mponina any Jerosalema hanafaka fahotana sy fahalotoana.
  '2':
  - type: text
    content: 'Ary amin’izany andro izany, hoy Andriamanitra, Tompon’izao rehetra izao, dia hofoanako ny anaran-tsampy amin’ny tany ka tsy hotsarovana intsony ireny; ary hesoriko amin’ny tany ny mpaminany sy ny fanahin’ny fahalotoana. '
  '3':
  - type: text
    content: 'Ary raha mbola hisy haminany, ny ray aman-dreniny izay niteraka azy dia hiteny aminy hoe: Tsy ho velona ianao, satria miteny lainga amin’ny anaran’NY TOMPO; ary ny ray aman-dreniny izay niteraka azy dia handefona azy raha maminany izy. '
  '4':
  - type: text
    content: 'Amin’izany andro izany ny mpaminany dia samy hahazo henatra noho ny fahitany avy, raha maminany; ary tsy hisalotra akanjo volom-biby hamitahana intsony izy '
  '5':
  - type: text
    content: 'fa hilaza hoe: Tsy mpaminany aho fa mpiasa tany, satria nisy nividy ahy ho andevo fony aho mbola kely. '
  '6':
  - type: text
    content: 'Dia hisy hilaza aminy hoe: Koa inona itony ratra eny amin’ny tratranao itony? Dia hovaliny hoe: Naratra tao an-tranon’ny sakaizako ireny.'
  - type: heading
    content: Ny nanavaozana ny fanekena
  '7':
  - type: text
    content: Mifohaza, ry sabatra, hamely ny mpiandriko
  - type: text
    content: sy ny lehilahy izay akaiky Ahy,
  - type: text
    content: hoy Andriamanitra, Tompon’izao rehetra izao.
  - type: text
    content: Asio ny mpiandry
  - type: text
    content: dia hihahaka ny ondry!
  - type: text
    content: Ary hamerina ny tanako ho amin’ny madinika Aho.
  '8':
  - type: text
    content: Ary amin’ny tany rehetra,
  - type: text
    content: hoy NY TOMPO,
  - type: text
    content: ny androatokony ao dia haringana ho faty,
  - type: text
    content: fa ny ampahatelony sisa ao no havela.
  '9':
  - type: text
    content: Ary hoentiko miditra amin’ny afo ny ampahatelony,
  - type: text
    content: ary harendrika
  - type: text
    content: toy ny fandrendrika volafotsy izy,
  - type: text
    content: ary hizahako toetra
  - type: text
    content: toy ny fizaha toetra ny volamena izy.
  - type: text
    content: Hiantso ny anarako izy,
  - type: text
    content: ary Izaho hamaly azy;
  - type: text
    content: 'Izaho hilaza hoe: Oloko izy!'
  - type: text
    content: 'Ary izy hiteny hoe: NY TOMPO no Andriamanitro!'
