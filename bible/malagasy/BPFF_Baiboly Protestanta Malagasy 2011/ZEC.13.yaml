document_id: ZEC.13,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Holevonin’Andriamanitra ny sampy sy ny mpaminany sandoka rehetra
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Amin’izany andro izany dia hisy loharano voasokatra ho an’ny taranak’i Davida sy ho an’ny mponina any Jerosalema hanafaka fahotana sy fahalotoana.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary amin’izany andro izany, hoy Andriamanitra, Tompon’izao rehetra izao, dia hofoanako ny anaran-tsampy amin’ny tany ka tsy hotsarovana intsony ireny; ary hesoriko amin’ny tany ny mpaminany sy ny fanahin’ny fahalotoana. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary raha mbola hisy haminany, ny ray aman-dreniny izay niteraka azy dia hiteny aminy hoe: Tsy ho velona ianao, satria miteny lainga amin’ny anaran’NY TOMPO; ary ny ray aman-dreniny izay niteraka azy dia handefona azy raha maminany izy. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Amin’izany andro izany ny mpaminany dia samy hahazo henatra noho ny fahitany avy, raha maminany; ary tsy hisalotra akanjo volom-biby hamitahana intsony izy '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fa hilaza hoe: Tsy mpaminany aho fa mpiasa tany, satria nisy nividy ahy ho andevo fony aho mbola kely. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hisy hilaza aminy hoe: Koa inona itony ratra eny amin’ny tratranao itony? Dia hovaliny hoe: Naratra tao an-tranon’ny sakaizako ireny.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nanavaozana ny fanekena
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mifohaza, ry sabatra, hamely ny mpiandriko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny lehilahy izay akaiky Ahy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy Andriamanitra, Tompon’izao rehetra izao.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Asio ny mpiandry
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hihahaka ny ondry!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hamerina ny tanako ho amin’ny madinika Aho.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary amin’ny tany rehetra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy NY TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny androatokony ao dia haringana ho faty,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny ampahatelony sisa ao no havela.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hoentiko miditra amin’ny afo ny ampahatelony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary harendrika
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toy ny fandrendrika volafotsy izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hizahako toetra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toy ny fizaha toetra ny volamena izy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hiantso ny anarako izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary Izaho hamaly azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Izaho hilaza hoe: Oloko izy!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ary izy hiteny hoe: NY TOMPO no Andriamanitro!'
