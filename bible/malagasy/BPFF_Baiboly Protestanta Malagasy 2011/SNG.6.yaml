document_id: SNG.6,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: (Olon-kafa)
  - type: text
    content: Nankaiza ny malalanao,
  - type: text
    content: ry tsara tarehy indrindra amin’ny vehivavy?
  - type: text
    content: Nivily nankaiza ny malalanao
  - type: text
    content: mba hiarahanay aminao hitady azy?
  - type: heading
    content: (Ravehivavy)
  '10':
  - type: text
    content: Iza moa io vehivavy mitsidika toy ny maraina
  - type: text
    content: izay tsara tarehy tahaka ny volana, mamiratra toy ny masoandro
  - type: text
    content: nefa sady mahatahotra toy ny andia-miaramila mitondra faneva?
  - type: heading
    content: (Ralehilahy)
  '11':
  - type: text
    content: Lasa nidina nankany an-tsaha misy ny hazo fihinam-boa aho,
  - type: text
    content: hijerijery ny zava-maitso eny an-dohasaha,
  - type: text
    content: hizaha raha mitsimoka ny voaloboka
  - type: text
    content: na mamony ny ampongabendanitra.
  - type: heading
    content: (Ravehivavy)
  '12':
  - type: text
    content: Tsy nampoiziko ny nipetrahako
  - type: text
    content: teo amin’ny kalesin’ny fireneko be voninahitra.
  '2':
  - type: text
    content: Lasa nidina ho any an-tsahany ny malalako,
  - type: text
    content: dia any amin’ny tanim-boninkazo misy zavamanitra
  - type: text
    content: mba hiandry ny ondriny miraoka ahitra eny an-tsaha sy hioty ny lisy.
  '3':
  - type: text
    content: An’ny malalako aho, ary ahy ny malalako,
  - type: text
    content: dia ilay miandry ny andian’ondriny eny amin’ny lisy.
  - type: heading
    content: Ny mombamomba ilay malalany
  - type: heading
    content: (Ralehilahy)
  '4':
  - type: text
    content: Tsara tarehy tahaka an’i Tirza ianao, Rahavako,
  - type: text
    content: eny, tsara tarehy tahaka an’i Jerosalema,
  - type: text
    content: mahatahotra toy ny andia-miaramila mitondra faneva.
  '5':
  - type: text
    content: Avilio tsy hijery ahy ny masonao fa mampiontanontana ny foko.
  - type: text
    content: Ny volonao dia tahaka ny andian’osy
  - type: text
    content: izay miriotra midina an’i Gileada.
  '6':
  - type: text
    content: Ny nifinao dia tahaka ny andian’ondrivavy
  - type: text
    content: izay miakatra avy eo amin’ny fampandroana azy;
  - type: text
    content: samy kambana avy ireo
  - type: text
    content: fa tsy misy tsy mana-namana;
  '7':
  - type: text
    content: tahaka ny hasin’ampongabendanitra ny takolakao
  - type: text
    content: eo amin’ny fisalobonanao.
  '8':
  - type: text
    content: Misy mpanjakavavy enimpolo
  - type: text
    content: sy vady tsindrano valopolo
  - type: text
    content: ary zatovovavy tsy hita isa.
  '9':
  - type: text
    content: Fa tokana kosa ny voromailalako,
  - type: text
    content: dia ilay ahy tsy misy kilema,
  - type: text
    content: vavitokan’ny reniny
  - type: text
    content: sady tsongaina amin’izay naterany.
  - type: text
    content: Ny tovovavy izay nahita azy dia nilaza azy ho sambatra,
  - type: text
    content: eny, ny mpanjakavavy sy ny vady tsindrano ka nidera azy.
  - type: heading
    content: (Olon-kafa)
