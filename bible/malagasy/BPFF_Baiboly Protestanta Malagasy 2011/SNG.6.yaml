document_id: SNG.6
type_code: plt
segments:
- type: usfm
  marker: sp
  children:
  - type: text
    text: (Olon-kafa)
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Nankaiza ny malalanao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ry tsara tarehy indrindra amin’ny vehivavy?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nivily nankaiza ny malalanao
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hiarahanay aminao hitady azy?
- type: usfm
  marker: sp
  children:
  - type: text
    text: (Ravehivavy)
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Lasa nidina ho any an-tsahany ny malalako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia any amin’ny tanim-boninkazo misy zavamanitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hiandry ny ondriny miraoka ahitra eny an-tsaha sy hioty ny lisy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: An’ny malalako aho, ary ahy ny malalako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ilay miandry ny andian’ondriny eny amin’ny lisy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny mombamomba ilay malalany
  marker-yv: yv-h
- type: usfm
  marker: sp
  children:
  - type: text
    text: (Ralehilahy)
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Tsara tarehy tahaka an’i Tirza ianao, Rahavako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, tsara tarehy tahaka an’i Jerosalema,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mahatahotra toy ny andia-miaramila mitondra faneva.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Avilio tsy hijery ahy ny masonao fa mampiontanontana ny foko.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny volonao dia tahaka ny andian’osy
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay miriotra midina an’i Gileada.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ny nifinao dia tahaka ny andian’ondrivavy
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay miakatra avy eo amin’ny fampandroana azy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: samy kambana avy ireo
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa tsy misy tsy mana-namana;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: tahaka ny hasin’ampongabendanitra ny takolakao
- type: usfm
  marker: q1
  children:
  - type: text
    text: eo amin’ny fisalobonanao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Misy mpanjakavavy enimpolo
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy vady tsindrano valopolo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary zatovovavy tsy hita isa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Fa tokana kosa ny voromailalako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ilay ahy tsy misy kilema,
- type: usfm
  marker: q1
  children:
  - type: text
    text: vavitokan’ny reniny
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady tsongaina amin’izay naterany.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny tovovavy izay nahita azy dia nilaza azy ho sambatra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, ny mpanjakavavy sy ny vady tsindrano ka nidera azy.
- type: usfm
  marker: sp
  children:
  - type: text
    text: (Olon-kafa)
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Iza moa io vehivavy mitsidika toy ny maraina
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay tsara tarehy tahaka ny volana, mamiratra toy ny masoandro
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa sady mahatahotra toy ny andia-miaramila mitondra faneva?
- type: usfm
  marker: sp
  children:
  - type: text
    text: (Ralehilahy)
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Lasa nidina nankany an-tsaha misy ny hazo fihinam-boa aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hijerijery ny zava-maitso eny an-dohasaha,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hizaha raha mitsimoka ny voaloboka
- type: usfm
  marker: q1
  children:
  - type: text
    text: na mamony ny ampongabendanitra.
- type: usfm
  marker: sp
  children:
  - type: text
    text: (Ravehivavy)
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Tsy nampoiziko ny nipetrahako
- type: usfm
  marker: q1
  children:
  - type: text
    text: teo amin’ny kalesin’ny fireneko be voninahitra.
