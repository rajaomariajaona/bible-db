document_id: PSA.78,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Ny tantaran’ny Israely: Anatra tsy azo hadinoina'
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: Maskila nataon’i Asafa.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Henoy ny fampianarako, ry oloko!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Atongilano ny sofinareo amin’ny tenin’ny vavako.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Tsy nitandrina ny faneken’Andriamanitra izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy nety nandeha araka ny lalànany.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Nohadinoiny ny asany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny fahagagana izay nampahitany azy.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Teo anatrehan’ny razany no nanaovany fahagagana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tany amin’ny tany Ejipta, dia tany amin’ny tany lemak’i Zoana.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Nampisaraka ny ranomasina Izy ka nitondra azy nita,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia nampijoro ny rano ho toy ny antontan-javatra.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Tamin’ny rahona no nitarihany azy raha antoandro
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary afo mahazava nony alina.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Namaky vatolampy tany an-tany efitra Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka nampigoka azy tahaka ny tamin’ny ranon’ny lalina.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Nampivoaka rano mandriaka avy tamin’ny harambato Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka nampirotsaka rano ho tahaka ny ony.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Kanjo mbola nandroso nanota Taminy ihany izy ireo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka nampahatezitra ny Avo Indrindra tany an-tany efitra.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Naka fanahy an’Andriamanitra tao am-pony izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tamin’ny nilany hanina araka izay nahaliana azy.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Dia niteny nanohitra an’Andriamanitra izy hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mahay mamelatra latabatra atỳ an-tany efitra va Andriamanitra?
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Hiloa-bava hilaza fanoharana aho!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hanonona ankamantatra efa hatry ny ela aho.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Indro, nikapoka ny vatolampy Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia nigororoana ny rano ka nandriaka;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mahay manome mofo koa va Izy?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mahatonga hena ho an’ny olony va Izy?
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Nony ren’NY TOMPO izany dia tezitra Izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nisy afo nirehitra tamin’i Jakoba
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady nisy fahatezerana namely an’Israely,
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: satria tsy nino an’Andriamanitra izy ireo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy natoky ny famonjeny.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Kanefa nandidy ny rahona tany ambony Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny varavaran’ny lanitra no novohany,
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: dia nampirotsaka mana taminy mba hohaniny Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary varin’ny lanitra no nomeny azy.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Ny fihinan’ny mahery no nohanin’ny olona;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nandefasany hanina hahavoky azy izy.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Nampandeha ny rivotra avy any atsinanana teny amin’ny lanitra Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny heriny no nitondrany ny rivotra avy any atsimo;
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: dia nampilatsahany hena betsaka ohatra ny vovoka izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy voromanidina ohatra ny fasiky ny ranomasina
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: ka nalatsany teny afovoan’ny tobiny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: manodidina ny fitoerany.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Dia nihinana izy ireo ka voky tsara
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary izay nilainy dia nomeny azy.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Izay efa rentsika sy fantatsika
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary nambaran’ny razantsika tamintsika
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Nefa tsy niala tamin’ny filany izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mbola teo am-bavany ihany ny haniny
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: raha nirehitra taminy ny fahatezeran’Andriamanitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka nahafatesany ny tremalahy teo aminy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary naripany ny zatovolahin’ny Israely.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Tamin’izany rehetra izany anefa dia mbola nanota ihany izy ireo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy nino ny fahagagana nataony.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Dia nanapitra ny androny tao anatin’ny zava-poana Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny taonany tao amin’ny horohoro.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: Rehefa nisy novonoiny tamin’ireo dia nitady Azy izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia niverina, dia nikatsaka Azy fatratra.
  '35':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: Dia nahatsiaro izy fa Andriamanitra no vatolampiny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary Andriamanitra Avo Indrindra no Mpanavotra azy.
  '36':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: Kanefa namitaka Azy tamin’ny vavany ireo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tamin’ny lelany no nandaingany Taminy.
  '37':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: Ny fony dia tsy niorina Taminy akory;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, tsy nitana ny fanekeny izy.
  '38':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: Nefa Andriamanitra dia be famindrampo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka mamela heloka fa tsy mandringana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, nahatsindry fo tokoa Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy nofohaziny avokoa ny fahavinirany.
  '39':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: Nahatsiaro Izy fa nofo ihany ireo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: rivotra izay mandalo ka tsy miverina intsony.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: dia tsy mba hafenintsika amin’ny zanany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa hambarantsika amin’ny taranaka ho avy ny fiderana NY TOMPO
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny heriny ary ny fahagagana nataony.
  '40':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: Impiry akory izy ireo no efa nikomy Taminy tany an-tany efitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka nampalahelo Azy tany an-tany foana!
  '41':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: Naka fanahy an’Andriamanitra mandrakariva izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka nampalahelo ny Iray Masin’ny Israely.
  '42':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: Tsy mba tsaroany ny namonjeny azy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na ny andro izay nanavotany azy tamin’ny fahavalo,
  '43':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: izay nanaovany famantarana tany Ejipta
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'sy fahagagana tany an-tany lemak’i Zoana:'
  '44':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: Nampody ny oniny ho ra Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny reniranony dia tsy azony nisotroana.
  '45':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: Nandefa fihitra betsaka hamely azy Izy ka nandany azy ireny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary sahona ka nanimba azy ireny.
  '46':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: Dia nanome ny vokatry ny taniny ho an’ny sompanga Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny vokatry ny asany ho an’ny valala.
  '47':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: Namono ny voalobony tamin’ny havandra Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny aviaviny tamin’ny havandra vaventy.
  '48':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: Dia nanolotra ny biby fiompiny ho an’ny havandra Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny omby aman’ondriny ho an’ny varatra.
  '49':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: Nandatsaka ny fahatezerany mirehitra taminy Izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, fahavinirana sy fahatezerana ary fampahoriana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia anjely maro mitondra loza.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Fa nanorina teny vavolombelona teo amin’i Jakoba Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary teo amin’ny Israely no nametrahany lalàna
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay nandidiany ny razantsika,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hampahafantariny ny zanany,
  '50':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '50'
    - type: text
      text: Nanamboatra lalana ho an’ny fahatezerany Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy niaro ny ain’ireo tamin’ny fahafatesana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa nanolotra azy ho lanin’ny areti-mandringana.
  '51':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '51'
    - type: text
      text: Namely ny lahimatoa rehetra tany Ejipta Izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ny voalohan-terany tany an-dain’i Hama.
  '52':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '52'
    - type: text
      text: Namindra toerana ny olony toy ny ondry Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary nitarika azy tany an-tany efitra toy ny andian’ondry.
  '53':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '53'
    - type: text
      text: Notarihiny tamim-piadanana izy ireo ka tsy mba natahotra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny fahavalony kosa dia voasaron’ny ranomasina.
  '54':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '54'
    - type: text
      text: Nitondra azy ho any amin’ny tany misy ny fitoerany masina Izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ny tendrombohitra izay azon’ny tanany ankavanana.
  '55':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '55'
    - type: text
      text: 'Nandroaka ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jentilisa
    - type: text
      text: ' teo anoloany Izy'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka nanome ny tanin’ireny ho lova nozaraina tamin’ny kofehy fandrefesana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia nampitoetra ireo fokon’ny Israely tao an-dainy avy.
  '56':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '56'
    - type: text
      text: Nefa naka fanahy an’Andriamanitra Avo Indrindra izy ka nikomy taminy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy notandremany ny teny vavolombelony.
  '57':
  - type: usfm
    marker: q1
