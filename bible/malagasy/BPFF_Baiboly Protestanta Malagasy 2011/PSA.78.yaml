      v: '57'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: Nihemotra izy ka nivadika tahaka ny razany
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia nania tahaka ny tsipìka mamitaka ny mpampiasa azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '58'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: Nampahatezitra Azy tamin’ny toerana fanaovany sorona izy
- type: usfm
  marker: q1
  children:
  - type: text
