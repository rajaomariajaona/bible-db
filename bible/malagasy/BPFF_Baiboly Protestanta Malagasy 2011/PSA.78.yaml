      v: '63'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '63'
  - type: text
    text: Ny zatovolahiny dia lanin’ny afo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny zatovovaviny dia tsy mba nisy nidera.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '64'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '64'
  - type: text
    text: Lavon-tsabatra ny mpisorony,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa tsy nisaona ny mpitondratenan’ireo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '65'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '65'
  - type: text
    text: Dia nifoha tahaka ny olona avy natory ny Tompo,
