document_id: PSA.78,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: 'Ny tantaran’ny Israely: Anatra tsy azo hadinoina'
  - type: text
    content: Maskila nataon’i Asafa.
  - type: text
    content: Henoy ny fampianarako, ry oloko!
  - type: text
    content: Atongilano ny sofinareo amin’ny tenin’ny vavako.
  '10':
  - type: text
    content: Tsy nitandrina ny faneken’Andriamanitra izy
  - type: text
    content: ary tsy nety nandeha araka ny lalànany.
  '11':
  - type: text
    content: Nohadinoiny ny asany
  - type: text
    content: sy ny fahagagana izay nampahitany azy.
  '12':
  - type: text
    content: Teo anatrehan’ny razany no nanaovany fahagagana
  - type: text
    content: tany amin’ny tany Ejipta, dia tany amin’ny tany lemak’i Zoana.
  '13':
  - type: text
    content: Nampisaraka ny ranomasina Izy ka nitondra azy nita,
  - type: text
    content: dia nampijoro ny rano ho toy ny antontan-javatra.
  '14':
  - type: text
    content: Tamin’ny rahona no nitarihany azy raha antoandro
  - type: text
    content: ary afo mahazava nony alina.
  '15':
  - type: text
    content: Namaky vatolampy tany an-tany efitra Izy
  - type: text
    content: ka nampigoka azy tahaka ny tamin’ny ranon’ny lalina.
  '16':
  - type: text
    content: Nampivoaka rano mandriaka avy tamin’ny harambato Izy
  - type: text
    content: ka nampirotsaka rano ho tahaka ny ony.
  '17':
  - type: text
    content: Kanjo mbola nandroso nanota Taminy ihany izy ireo
  - type: text
    content: ka nampahatezitra ny Avo Indrindra tany an-tany efitra.
  '18':
  - type: text
    content: Naka fanahy an’Andriamanitra tao am-pony izy
  - type: text
    content: tamin’ny nilany hanina araka izay nahaliana azy.
  '19':
  - type: text
    content: 'Dia niteny nanohitra an’Andriamanitra izy hoe:'
  - type: text
    content: Mahay mamelatra latabatra atỳ an-tany efitra va Andriamanitra?
  '2':
  - type: text
    content: Hiloa-bava hilaza fanoharana aho!
  - type: text
    content: Hanonona ankamantatra efa hatry ny ela aho.
  '20':
  - type: text
    content: Indro, nikapoka ny vatolampy Izy
  - type: text
    content: dia nigororoana ny rano ka nandriaka;
  - type: text
    content: mahay manome mofo koa va Izy?
  - type: text
    content: Mahatonga hena ho an’ny olony va Izy?
  '21':
  - type: text
    content: Nony ren’NY TOMPO izany dia tezitra Izy;
  - type: text
    content: nisy afo nirehitra tamin’i Jakoba
  - type: text
    content: sady nisy fahatezerana namely an’Israely,
  '22':
  - type: text
    content: satria tsy nino an’Andriamanitra izy ireo
  - type: text
    content: ka tsy natoky ny famonjeny.
  '23':
  - type: text
    content: Kanefa nandidy ny rahona tany ambony Izy
  - type: text
    content: ary ny varavaran’ny lanitra no novohany,
  '24':
  - type: text
    content: dia nampirotsaka mana taminy mba hohaniny Izy
  - type: text
    content: ary varin’ny lanitra no nomeny azy.
  '25':
  - type: text
    content: Ny fihinan’ny mahery no nohanin’ny olona;
  - type: text
    content: nandefasany hanina hahavoky azy izy.
  '26':
  - type: text
    content: Nampandeha ny rivotra avy any atsinanana teny amin’ny lanitra Izy
  - type: text
    content: ary ny heriny no nitondrany ny rivotra avy any atsimo;
  '27':
  - type: text
    content: dia nampilatsahany hena betsaka ohatra ny vovoka izy
  - type: text
    content: sy voromanidina ohatra ny fasiky ny ranomasina
  '28':
  - type: text
    content: ka nalatsany teny afovoan’ny tobiny
  - type: text
    content: manodidina ny fitoerany.
  '29':
  - type: text
    content: Dia nihinana izy ireo ka voky tsara
  - type: text
    content: ary izay nilainy dia nomeny azy.
  '3':
  - type: text
    content: Izay efa rentsika sy fantatsika
  - type: text
    content: ary nambaran’ny razantsika tamintsika
  '30':
  - type: text
    content: Nefa tsy niala tamin’ny filany izy
  - type: text
    content: ary mbola teo am-bavany ihany ny haniny
  '31':
  - type: text
    content: raha nirehitra taminy ny fahatezeran’Andriamanitra
  - type: text
    content: ka nahafatesany ny tremalahy teo aminy
  - type: text
    content: ary naripany ny zatovolahin’ny Israely.
  '32':
  - type: text
    content: Tamin’izany rehetra izany anefa dia mbola nanota ihany izy ireo
  - type: text
    content: ka tsy nino ny fahagagana nataony.
  '33':
  - type: text
    content: Dia nanapitra ny androny tao anatin’ny zava-poana Izy
  - type: text
    content: ary ny taonany tao amin’ny horohoro.
  '34':
  - type: text
    content: Rehefa nisy novonoiny tamin’ireo dia nitady Azy izy
  - type: text
    content: dia niverina, dia nikatsaka Azy fatratra.
  '35':
  - type: text
    content: Dia nahatsiaro izy fa Andriamanitra no vatolampiny
  - type: text
    content: ary Andriamanitra Avo Indrindra no Mpanavotra azy.
  '36':
  - type: text
    content: Kanefa namitaka Azy tamin’ny vavany ireo
  - type: text
    content: ary tamin’ny lelany no nandaingany Taminy.
  '37':
  - type: text
    content: Ny fony dia tsy niorina Taminy akory;
  - type: text
    content: eny, tsy nitana ny fanekeny izy.
  '38':
  - type: text
    content: Nefa Andriamanitra dia be famindrampo
  - type: text
    content: ka mamela heloka fa tsy mandringana;
  - type: text
    content: eny, nahatsindry fo tokoa Izy
  - type: text
    content: ka tsy nofohaziny avokoa ny fahavinirany.
  '39':
  - type: text
    content: Nahatsiaro Izy fa nofo ihany ireo,
  - type: text
    content: rivotra izay mandalo ka tsy miverina intsony.
  '4':
  - type: text
    content: dia tsy mba hafenintsika amin’ny zanany,
  - type: text
    content: fa hambarantsika amin’ny taranaka ho avy ny fiderana NY TOMPO
  - type: text
    content: sy ny heriny ary ny fahagagana nataony.
  '40':
  - type: text
    content: Impiry akory izy ireo no efa nikomy Taminy tany an-tany efitra
  - type: text
    content: ka nampalahelo Azy tany an-tany foana!
  '41':
  - type: text
    content: Naka fanahy an’Andriamanitra mandrakariva izy
  - type: text
    content: ka nampalahelo ny Iray Masin’ny Israely.
  '42':
  - type: text
    content: Tsy mba tsaroany ny namonjeny azy,
  - type: text
    content: na ny andro izay nanavotany azy tamin’ny fahavalo,
  '43':
  - type: text
    content: izay nanaovany famantarana tany Ejipta
  - type: text
    content: 'sy fahagagana tany an-tany lemak’i Zoana:'
  '44':
  - type: text
    content: Nampody ny oniny ho ra Izy
  - type: text
    content: ary ny reniranony dia tsy azony nisotroana.
  '45':
  - type: text
    content: Nandefa fihitra betsaka hamely azy Izy ka nandany azy ireny
  - type: text
    content: ary sahona ka nanimba azy ireny.
  '46':
  - type: text
    content: Dia nanome ny vokatry ny taniny ho an’ny sompanga Izy
  - type: text
    content: ary ny vokatry ny asany ho an’ny valala.
  '47':
  - type: text
    content: Namono ny voalobony tamin’ny havandra Izy
  - type: text
    content: ary ny aviaviny tamin’ny havandra vaventy.
  '48':
  - type: text
    content: Dia nanolotra ny biby fiompiny ho an’ny havandra Izy
  - type: text
    content: ary ny omby aman’ondriny ho an’ny varatra.
  '49':
  - type: text
    content: Nandatsaka ny fahatezerany mirehitra taminy Izy;
  - type: text
    content: eny, fahavinirana sy fahatezerana ary fampahoriana,
  - type: text
    content: dia anjely maro mitondra loza.
  '5':
  - type: text
    content: Fa nanorina teny vavolombelona teo amin’i Jakoba Izy
  - type: text
    content: ary teo amin’ny Israely no nametrahany lalàna
  - type: text
    content: izay nandidiany ny razantsika,
  - type: text
    content: hampahafantariny ny zanany,
  '50':
  - type: text
    content: Nanamboatra lalana ho an’ny fahatezerany Izy
  - type: text
    content: ary tsy niaro ny ain’ireo tamin’ny fahafatesana,
  - type: text
    content: fa nanolotra azy ho lanin’ny areti-mandringana.
  '51':
  - type: text
    content: Namely ny lahimatoa rehetra tany Ejipta Izy,
  - type: text
    content: dia ny voalohan-terany tany an-dain’i Hama.
  '52':
  - type: text
    content: Namindra toerana ny olony toy ny ondry Izy
  - type: text
    content: ary nitarika azy tany an-tany efitra toy ny andian’ondry.
  '53':
  - type: text
    content: Notarihiny tamim-piadanana izy ireo ka tsy mba natahotra,
  - type: text
    content: fa ny fahavalony kosa dia voasaron’ny ranomasina.
  '54':
  - type: text
    content: Nitondra azy ho any amin’ny tany misy ny fitoerany masina Izy,
  - type: text
    content: dia ny tendrombohitra izay azon’ny tanany ankavanana.
  '55':
  - type: text
    content: 'Nandroaka ny '
  - type: text
    content: Jentilisa
  - type: text
    content: ' teo anoloany Izy'
  - type: text
    content: ka nanome ny tanin’ireny ho lova nozaraina tamin’ny kofehy fandrefesana,
  - type: text
    content: dia nampitoetra ireo fokon’ny Israely tao an-dainy avy.
  '56':
  - type: text
    content: Nefa naka fanahy an’Andriamanitra Avo Indrindra izy ka nikomy taminy
  - type: text
    content: ary tsy notandremany ny teny vavolombelony.
  '57':
  - type: text
    content: Nihemotra izy ka nivadika tahaka ny razany
  - type: text
    content: dia nania tahaka ny tsipìka mamitaka ny mpampiasa azy.
  '58':
  - type: text
    content: Nampahatezitra Azy tamin’ny toerana fanaovany sorona izy
  - type: text
    content: sady nahasaro-piaro Azy tamin’ny sarin-javatra voasokitra.
  '59':
  - type: text
    content: Nandre izany Andriamanitra dia tezitra
  - type: text
    content: ka nolaviny mihitsy ny Israely
  '6':
  - type: text
    content: mba hahafantatra izany ny taranaka ho avy,
  - type: text
    content: dia ny zaza mbola hateraka,
  - type: text
    content: ka hitsangana hitory izany amin’ny zanany kosa.
  '60':
  - type: text
    content: 'sady nahafoy ny '
  - type: text
    content: tabernakeliny
  - type: text
    content: ' tao Silo Izy,'
  - type: text
    content: dia ny tranolay izay naoriny teo amin’ny olona;
  '61':
  - type: text
    content: natolony ho babo ny heriny
  - type: text
    content: ary ho eo an-tanan’ny fahavalo ny voninahiny.
  '62':
  - type: text
    content: Dia nanolotra ny olony ho an’ny sabatra Izy
  - type: text
    content: ary tezitra indrindra tamin’ny lovany.
  '63':
  - type: text
    content: Ny zatovolahiny dia lanin’ny afo
  - type: text
    content: ary ny zatovovaviny dia tsy mba nisy nidera.
  '64':
  - type: text
    content: Lavon-tsabatra ny mpisorony,
  - type: text
    content: nefa tsy nisaona ny mpitondratenan’ireo.
  '65':
  - type: text
    content: Dia nifoha tahaka ny olona avy natory ny Tompo,
  - type: text
    content: tahaka ny lehilahy mahery izay miantsoantso azon’ny divay.
  '66':
  - type: text
    content: Namely ny fahavalony avy ao aorianany Izy
  - type: text
    content: ka nahafa-baraka azy mandrakizay.
  '67':
  - type: text
    content: Nanary ny tranolain’i Josefa Izy
  - type: text
    content: ary tsy nofidiny ny fokon’i Efraima.
  '68':
  - type: text
    content: 'Fa nifidy ny fokon’i '
  - type: text
    content: Joda
  - type: text
    content: ' kosa Izy,'
  - type: text
    content: 'dia ny tendrombohitra '
  - type: text
    content: Ziona
  - type: text
    content: ' izay tiany.'
  '69':
  - type: text
    content: Nanao ny fitoerany masina ho tahaka ny havoana Izy,
  - type: text
    content: tahaka ny tany izay naoriny ho mandrakizay.
  '7':
  - type: text
    content: Hametraka ny fanantenany amin’Andriamanitra izy
  - type: text
    content: ka tsy hanadino ny asany
  - type: text
    content: fa hitandrina ny didiny;
  '70':
  - type: text
    content: Nifidy an’i Davida mpanompony Izy
  - type: text
    content: ka naka azy avy tany amin’ny valan’ondry;
  '71':
  - type: text
    content: tany amin’ny fiandrasany ny ondrivavy mampinono no nakany azy
  - type: text
    content: mba hiandry an’i Jakoba olony
  - type: text
    content: sy Israely lovany.
  '72':
  - type: text
    content: Dia niandry ireo tamin’ny hitsim-po izy
  - type: text
    content: ka nitondra azy araka ny fahendren’ny tanany.
  '8':
  - type: text
    content: tsy ho tahaka ny razany
  - type: text
    content: izay taranaka maditra sy mpiodina, izy,
  - type: text
    content: dia taranaka izay tsy nampiorina ny fony
  - type: text
    content: sady tsy marina tamin’Andriamanitra ny fanahiny.
  '9':
  - type: text
    content: Ny zanak’i Efraima izay nitondra tsipìka hitifirany
  - type: text
    content: dia niamboho tamin’ny andron’ny ady.
