- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '59'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '59'
  - type: text
    text: Nandre izany Andriamanitra dia tezitra
- type: usfm
  marker: q1
  children:
  - type: text
