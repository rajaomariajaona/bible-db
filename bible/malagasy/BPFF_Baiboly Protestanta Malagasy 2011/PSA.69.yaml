document_id: PSA.69,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Antso vonjy
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: Ho an’ny mpiventy hira. Al-shoshanim. Nataon’i Davida.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Vonjeo aho, Andriamanitra ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa efa mihatra amin’ny aiko ny rano.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Nitomany sady nifady hanina aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia natao latsa ho ahy izany.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Akanjo fisaonana no nataoko fitafiako,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia efa ambentinteny tamin’ireny aho.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Miresaka ahy izay mipetraka eo am-bavahady
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ataon’ny mpisotro toaka an-kira aho.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Fa izaho dia hivavaka Aminao amin’ny andro fankasitrahana, TOMPO ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia Aminao, Andriamanitra ô, noho ny haben’ny famindramponao!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Valio aho araka ny hamarinan’ny famonjenao!
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Afaho amin’ny fotaka aho ka aza avela hilentika!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vonjeo amin’izay mankahala ahy sy amin’ny rano lalina aho!
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Aza avela hanafotra ahy ny rano mandriaka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na hitelina ahy ny lalina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary aza avela hikatom-bava amiko ny lavaka fantsakana!
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Valio aho, TOMPO ô, fa tsara ny famindramponao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: todiho aho, araka ny haben’ny antranao
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ary aza manafina ny tavanao amin’ny mpanomponao!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa azom-pahoriana aho, koa faingàna hamaly ahy Ianao!
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Hatòny aho ka avoty!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, vonjeo aho noho ny ataon’ny fahavaloko!
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Ianao no mahalala ny latsa mihatra amiko sy ny fahamenarako ary ny fahafaham-boninahitro;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eo anatrehanao ny mpandrafy ahy rehetra.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Milentika amin’ny fotaka mandrevo aho ka tsy misy hifaharana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: efa miditra amin’ny rano lalina aho ka mandifotra ahy ny riaka.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Ny latsa dia nanorotoro ny foko ka reraka aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: niandry antra aho nefa tsy nisy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mpampionona nefa tsy nahita.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Fa zava-mangidy no nomeny hohaniko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary vinaingitra no natolony ahy hosotroina raha nangetaheta aho.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Aoka ho tonga fandrika ho azy ny latabatra eo anoloany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ho tonta ho azy ny fiadanam-piainany!
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Aoka ho jamba ny masony mba tsy hahita
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ampangozohozoy mandrakariva ny lamosiny!
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Aidino aminy ny fahatezeranao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary aoka hahatratra azy ny firehetan’ny fahaviniranao!
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Aoka ho foana ny tobiny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aza avela hisy hitoetra ao an-dainy!
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Fa izay efa nasianao no nenjehiny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny fahararian’ny efa voatsindronao dia lazalazainy.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Aoka hiampy ny helony
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary aoka tsy hiditra amin’ny fahamarinanao izy!
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Aoka hovonoina tsy ho eo amin’ny bokin’ny velona ny anarany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary aoka izy tsy hosoratana miaraka amin’ny marina!
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Fa izaho dia ory sy mijaly, Andriamanitra ô;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aoka ny famonjenao no hanandratra ahy!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Sasatry ny mitaraina aho, maimay ny tendako;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pahina ny masoko raha miandry an’Andriamanitro aho.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Hankalaza ny anaran’Andriamanitra amin’ny hira aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hidera Azy amin’ny fisaorana.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Fa izany dia ho sitraky NY TOMPO mihoatra noho ny vantotra ombilahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay manan-tandroka sady mivaky kitro.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Hahita izany ny mpandefitra ka ho faly;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aoka ho velona ny fonareo, ry mpitady an’Andriamanitra.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Fa mihaino ny mahantra NY TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy mba hataony tsinontsinona ny olony mifatotra.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: Aoka hidera Azy ny lanitra sy ny tany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny ranomasina sy izay rehetra mihetsika ao aminy!
  '35':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Fa Andriamanitra hamonjy an’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Ziona
    - type: text
      text: ' sady hanangana ny tanànan’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Joda
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hitoetra ao ny olony ka ho tompony,
  '36':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: dia handova azy ny taranaky ny mpanompony
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hitoetra ao izay tia ny anarany.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Maro noho ny volon-dohako ny isan’izay mankahala ahy tsy amin’antony.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mahery izay ta hahafaty ahy, dia ny fahavaloko tsy amin’antony;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mampanonitra ahy izay tsy nalaiko izy.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Andriamanitra ô, Ianao mahalala ny hadalako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny heloko tsy mba miafina Aminao.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Aoka tsy ho menatra noho ny amiko izay olona miandry Anao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: RY TOMPO, Andriamanitra Tompon’izao rehetra izao ô!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka tsy ho very hevitra noho ny amiko izay olona mitady Anao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ry Andriamanitry ny Israely ô.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Fa noho ny Aminao no itondrako latsa;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: safotry ny henatra ny tavako.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Efa tonga vahiny amin’ny rahalahiko aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, tonga olon-ko azy amin’ny zanak’Ineny aho.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Fa ny firehetako ny amin’ny tranonao no naha ritra aina ahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny latsa nataon’izay nandatsa Anao dia nihatra tamiko.
