document_id: PSA.69,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Antso vonjy
  - type: text
    content: Ho an’ny mpiventy hira. Al-shoshanim. Nataon’i Davida.
  - type: text
    content: Vonjeo aho, Andriamanitra ô,
  - type: text
    content: fa efa mihatra amin’ny aiko ny rano.
  '10':
  - type: text
    content: Nitomany sady nifady hanina aho,
  - type: text
    content: dia natao latsa ho ahy izany.
  '11':
  - type: text
    content: Akanjo fisaonana no nataoko fitafiako,
  - type: text
    content: dia efa ambentinteny tamin’ireny aho.
  '12':
  - type: text
    content: Miresaka ahy izay mipetraka eo am-bavahady
  - type: text
    content: ary ataon’ny mpisotro toaka an-kira aho.
  '13':
  - type: text
    content: Fa izaho dia hivavaka Aminao amin’ny andro fankasitrahana, TOMPO ô,
  - type: text
    content: dia Aminao, Andriamanitra ô, noho ny haben’ny famindramponao!
  - type: text
    content: Valio aho araka ny hamarinan’ny famonjenao!
  '14':
  - type: text
    content: Afaho amin’ny fotaka aho ka aza avela hilentika!
  - type: text
    content: Vonjeo amin’izay mankahala ahy sy amin’ny rano lalina aho!
  '15':
  - type: text
    content: Aza avela hanafotra ahy ny rano mandriaka,
  - type: text
    content: na hitelina ahy ny lalina,
  - type: text
    content: ary aza avela hikatom-bava amiko ny lavaka fantsakana!
  '16':
  - type: text
    content: Valio aho, TOMPO ô, fa tsara ny famindramponao;
  - type: text
    content: todiho aho, araka ny haben’ny antranao
  '17':
  - type: text
    content: ary aza manafina ny tavanao amin’ny mpanomponao!
  - type: text
    content: Fa azom-pahoriana aho, koa faingàna hamaly ahy Ianao!
  '18':
  - type: text
    content: Hatòny aho ka avoty!
  - type: text
    content: Eny, vonjeo aho noho ny ataon’ny fahavaloko!
  '19':
  - type: text
    content: Ianao no mahalala ny latsa mihatra amiko sy ny fahamenarako ary ny fahafaham-boninahitro;
  - type: text
    content: eo anatrehanao ny mpandrafy ahy rehetra.
  '2':
  - type: text
    content: Milentika amin’ny fotaka mandrevo aho ka tsy misy hifaharana;
  - type: text
    content: efa miditra amin’ny rano lalina aho ka mandifotra ahy ny riaka.
  '20':
  - type: text
    content: Ny latsa dia nanorotoro ny foko ka reraka aho;
  - type: text
    content: niandry antra aho nefa tsy nisy,
  - type: text
    content: ary mpampionona nefa tsy nahita.
  '21':
  - type: text
    content: Fa zava-mangidy no nomeny hohaniko
  - type: text
    content: ary vinaingitra no natolony ahy hosotroina raha nangetaheta aho.
  '22':
  - type: text
    content: Aoka ho tonga fandrika ho azy ny latabatra eo anoloany
  - type: text
    content: ary ho tonta ho azy ny fiadanam-piainany!
  '23':
  - type: text
    content: Aoka ho jamba ny masony mba tsy hahita
  - type: text
    content: ary ampangozohozoy mandrakariva ny lamosiny!
  '24':
  - type: text
    content: Aidino aminy ny fahatezeranao
  - type: text
    content: ary aoka hahatratra azy ny firehetan’ny fahaviniranao!
  '25':
  - type: text
    content: Aoka ho foana ny tobiny;
  - type: text
    content: aza avela hisy hitoetra ao an-dainy!
  '26':
  - type: text
    content: Fa izay efa nasianao no nenjehiny
  - type: text
    content: ary ny fahararian’ny efa voatsindronao dia lazalazainy.
  '27':
  - type: text
    content: Aoka hiampy ny helony
  - type: text
    content: ary aoka tsy hiditra amin’ny fahamarinanao izy!
  '28':
  - type: text
    content: Aoka hovonoina tsy ho eo amin’ny bokin’ny velona ny anarany
  - type: text
    content: ary aoka izy tsy hosoratana miaraka amin’ny marina!
  '29':
  - type: text
    content: Fa izaho dia ory sy mijaly, Andriamanitra ô;
  - type: text
    content: aoka ny famonjenao no hanandratra ahy!
  '3':
  - type: text
    content: Sasatry ny mitaraina aho, maimay ny tendako;
  - type: text
    content: pahina ny masoko raha miandry an’Andriamanitro aho.
  '30':
  - type: text
    content: Hankalaza ny anaran’Andriamanitra amin’ny hira aho
  - type: text
    content: ary hidera Azy amin’ny fisaorana.
  '31':
  - type: text
    content: Fa izany dia ho sitraky NY TOMPO mihoatra noho ny vantotra ombilahy
  - type: text
    content: izay manan-tandroka sady mivaky kitro.
  '32':
  - type: text
    content: Hahita izany ny mpandefitra ka ho faly;
  - type: text
    content: aoka ho velona ny fonareo, ry mpitady an’Andriamanitra.
  '33':
  - type: text
    content: Fa mihaino ny mahantra NY TOMPO,
  - type: text
    content: ary tsy mba hataony tsinontsinona ny olony mifatotra.
  '34':
  - type: text
    content: Aoka hidera Azy ny lanitra sy ny tany,
  - type: text
    content: ny ranomasina sy izay rehetra mihetsika ao aminy!
  '35':
  - type: text
    content: 'Fa Andriamanitra hamonjy an’i '
  - type: text
    content: Ziona
  - type: text
    content: ' sady hanangana ny tanànan’i '
  - type: text
    content: Joda
  - type: text
    content: ary hitoetra ao ny olony ka ho tompony,
  '36':
  - type: text
    content: dia handova azy ny taranaky ny mpanompony
  - type: text
    content: ary hitoetra ao izay tia ny anarany.
  '4':
  - type: text
    content: Maro noho ny volon-dohako ny isan’izay mankahala ahy tsy amin’antony.
  - type: text
    content: Mahery izay ta hahafaty ahy, dia ny fahavaloko tsy amin’antony;
  - type: text
    content: mampanonitra ahy izay tsy nalaiko izy.
  '5':
  - type: text
    content: Andriamanitra ô, Ianao mahalala ny hadalako
  - type: text
    content: ary ny heloko tsy mba miafina Aminao.
  '6':
  - type: text
    content: Aoka tsy ho menatra noho ny amiko izay olona miandry Anao,
  - type: text
    content: RY TOMPO, Andriamanitra Tompon’izao rehetra izao ô!
  - type: text
    content: Aoka tsy ho very hevitra noho ny amiko izay olona mitady Anao,
  - type: text
    content: ry Andriamanitry ny Israely ô.
  '7':
  - type: text
    content: Fa noho ny Aminao no itondrako latsa;
  - type: text
    content: safotry ny henatra ny tavako.
  '8':
  - type: text
    content: Efa tonga vahiny amin’ny rahalahiko aho;
  - type: text
    content: eny, tonga olon-ko azy amin’ny zanak’Ineny aho.
  '9':
  - type: text
    content: Fa ny firehetako ny amin’ny tranonao no naha ritra aina ahy
  - type: text
    content: ary ny latsa nataon’izay nandatsa Anao dia nihatra tamiko.
