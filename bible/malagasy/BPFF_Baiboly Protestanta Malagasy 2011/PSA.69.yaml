document_id: PSA.69
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Antso vonjy
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: Ho an’ny mpiventy hira. Al-shoshanim. Nataon’i Davida.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Vonjeo aho, Andriamanitra ô,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa efa mihatra amin’ny aiko ny rano.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Milentika amin’ny fotaka mandrevo aho ka tsy misy hifaharana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: efa miditra amin’ny rano lalina aho ka mandifotra ahy ny riaka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Sasatry ny mitaraina aho, maimay ny tendako;
- type: usfm
  marker: q1
  children:
  - type: text
    text: pahina ny masoko raha miandry an’Andriamanitro aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Maro noho ny volon-dohako ny isan’izay mankahala ahy tsy amin’antony.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mahery izay ta hahafaty ahy, dia ny fahavaloko tsy amin’antony;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mampanonitra ahy izay tsy nalaiko izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Andriamanitra ô, Ianao mahalala ny hadalako
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny heloko tsy mba miafina Aminao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Aoka tsy ho menatra noho ny amiko izay olona miandry Anao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: RY TOMPO, Andriamanitra Tompon’izao rehetra izao ô!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aoka tsy ho very hevitra noho ny amiko izay olona mitady Anao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ry Andriamanitry ny Israely ô.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Fa noho ny Aminao no itondrako latsa;
- type: usfm
  marker: q1
  children:
  - type: text
    text: safotry ny henatra ny tavako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Efa tonga vahiny amin’ny rahalahiko aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, tonga olon-ko azy amin’ny zanak’Ineny aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Fa ny firehetako ny amin’ny tranonao no naha ritra aina ahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny latsa nataon’izay nandatsa Anao dia nihatra tamiko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Nitomany sady nifady hanina aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia natao latsa ho ahy izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Akanjo fisaonana no nataoko fitafiako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia efa ambentinteny tamin’ireny aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Miresaka ahy izay mipetraka eo am-bavahady
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ataon’ny mpisotro toaka an-kira aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Fa izaho dia hivavaka Aminao amin’ny andro fankasitrahana, TOMPO ô,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia Aminao, Andriamanitra ô, noho ny haben’ny famindramponao!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Valio aho araka ny hamarinan’ny famonjenao!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Afaho amin’ny fotaka aho ka aza avela hilentika!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vonjeo amin’izay mankahala ahy sy amin’ny rano lalina aho!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Aza avela hanafotra ahy ny rano mandriaka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: na hitelina ahy ny lalina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary aza avela hikatom-bava amiko ny lavaka fantsakana!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Valio aho, TOMPO ô, fa tsara ny famindramponao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: todiho aho, araka ny haben’ny antranao
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ary aza manafina ny tavanao amin’ny mpanomponao!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa azom-pahoriana aho, koa faingàna hamaly ahy Ianao!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Hatòny aho ka avoty!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, vonjeo aho noho ny ataon’ny fahavaloko!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ianao no mahalala ny latsa mihatra amiko sy ny fahamenarako ary ny fahafaham-boninahitro;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eo anatrehanao ny mpandrafy ahy rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ny latsa dia nanorotoro ny foko ka reraka aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: niandry antra aho nefa tsy nisy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mpampionona nefa tsy nahita.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Fa zava-mangidy no nomeny hohaniko
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary vinaingitra no natolony ahy hosotroina raha nangetaheta aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Aoka ho tonga fandrika ho azy ny latabatra eo anoloany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ho tonta ho azy ny fiadanam-piainany!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Aoka ho jamba ny masony mba tsy hahita
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ampangozohozoy mandrakariva ny lamosiny!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Aidino aminy ny fahatezeranao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary aoka hahatratra azy ny firehetan’ny fahaviniranao!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Aoka ho foana ny tobiny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: aza avela hisy hitoetra ao an-dainy!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Fa izay efa nasianao no nenjehiny
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny fahararian’ny efa voatsindronao dia lazalazainy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Aoka hiampy ny helony
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary aoka tsy hiditra amin’ny fahamarinanao izy!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Aoka hovonoina tsy ho eo amin’ny bokin’ny velona ny anarany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary aoka izy tsy hosoratana miaraka amin’ny marina!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Fa izaho dia ory sy mijaly, Andriamanitra ô;
- type: usfm
  marker: q1
  children:
  - type: text
    text: aoka ny famonjenao no hanandratra ahy!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Hankalaza ny anaran’Andriamanitra amin’ny hira aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hidera Azy amin’ny fisaorana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Fa izany dia ho sitraky NY TOMPO mihoatra noho ny vantotra ombilahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay manan-tandroka sady mivaky kitro.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Hahita izany ny mpandefitra ka ho faly;
- type: usfm
  marker: q1
  children:
  - type: text
    text: aoka ho velona ny fonareo, ry mpitady an’Andriamanitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Fa mihaino ny mahantra NY TOMPO,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy mba hataony tsinontsinona ny olony mifatotra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Aoka hidera Azy ny lanitra sy ny tany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny ranomasina sy izay rehetra mihetsika ao aminy!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Fa Andriamanitra hamonjy an’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Ziona
  - type: text
    text: ' sady hanangana ny tanànan’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Joda
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hitoetra ao ny olony ka ho tompony,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: dia handova azy ny taranaky ny mpanompony
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hitoetra ao izay tia ny anarany.
