document_id: 1TI.1
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fiarahabana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'I Paoly, apostolin’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' Jesosy araka ny didin’Andriamanitra, Mpamonjy antsika, sy Kristy Jesosy fanantenantsika, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'no mamangy an’i Timoty, tena zanako amin’ny finoana: Ho aminao anie ny fahasoavana, famindrampo, fiadanana avy amin’Andriamanitra Ray sy Kristy Jesosy Tompontsika.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Aoka tsy hanao fampianarana hafahafa
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Araka ny nangatahiko taminao fony aho handeha any Makedonia dia aoka ianao hitoetra any Efesosy mba handraranao ny olona sasany tsy hanao fampianarana hafahafa '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'na ho variana amin’ny anganongano sy ny tantaram-pirazanana tsy hita lany izay mahatonga adihevitra, fa tsy mampandroso ny fitondrana araka an’Andriamanitra amin’ny finoana ireny. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Fa ny anton’ny didy fandrarana dia fitiavana avy amin’ny fo madio sy ny fieritreretana tsara ary ny finoana tsy mihatsaravelatsihy; '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'fa fihatsarambelatsihy no nivilian’ny sasany ka nampania ho amin’ny resaka tsy misy antony. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Izy ireny dia te ho mpampiana-dalàna, kanefa tsy fantany akory izay lazainy na izay itompoany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny asan’ny lalàna
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Fantatsika anefa fa tsara ny lalàna raha entin’ny olona araka izay antony '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'ka fantany fa tsy ny olona marina no nanaovana ny lalàna fa ny mpandika lalàna sy ny mpikomy, dia ny tsy matahotra an’Andriamanitra sy ny mpanota, ny olona tsy manaja izay masina sy ny olona mpaniratsira, ny mpamono ray sy ny mpamono reny, ny mpamono olona, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'ny mpijangajanga, ny sodomita, ny mpivarotra olona, ny mpandainga, ny mpanao fianianana mandainga, ary na inona na inona manohitra ny fampianarana tsy misy kilema, '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: araka ny Filazantsaran’ny voninahitr’Andriamanitra loharanom-pahasambarana, izay nankinina tamiko.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fisaorana an’Andriamanitra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Izaho dia misaotra an’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' Jesosy Tompontsika, izay nampahery ahy, fa nataony mahatoky aho ka notendreny ho amin’ny fanompoana, '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'dia izaho izay mpiteny ratsy fahiny sady mpanenjika sy mpampahory; kanefa nahazo famindrampo aho satria tamin’ny tsy fahalalana noho ny tsy finoana no nanaovako ireny. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Fa mitafotafo ny fahasoavan’ny Tompontsika tamin’ny finoana sy ny fitiavana, izay ao amin’i Kristy Jesosy. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Mahatoky ka tokony hekena amin’ny fankasitrahana rehetra izao teny izao: Tonga tetỳ ambonin’ny tany Kristy Jesosy hamonjy ny mpanota, ary amin’ireny dia izaho no lohany. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Kanefa izao no namindrana fo tamiko, dia ny mba hanehoan’i Jesosy Kristy eo amiko izay lohany, ny fahari-po rehetra ho fianarana ho an’izay hino Azy ka hahazoany ny fiainana mandrakizay. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ary ho an’ny Mpanjaka mandrakizay, tsy mety maty, tsy hita maso, dia ho an’Andriamanitra tokana ihany anie ny laza sy ny voninahitra mandrakizay mandrakizay. Amena.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Miady ny ady tsara
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Izao didy izao no omeko anao, ry Timoty zanako, araka ireo faminaniana natao fahiny ny aminao mba hoentinao miady ny ady tsara, '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'amin’ny itananao ny finoana sy ny fieritreretana tsara, izay efa narian’ny sasany, koa toy ny olona vaky sambo izy amin’ny lafin’ny finoana; '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: naman’ireny i Himeneo sy i Aleksandra, izay natolotro ho an’i Satana mba hofaizina tsy hiteny ratsy.
