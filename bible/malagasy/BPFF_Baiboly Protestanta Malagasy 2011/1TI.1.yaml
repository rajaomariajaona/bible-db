document_id: 1TI.1,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Fiarahabana
  - type: text
    content: 'I Paoly, apostolin’i '
  - type: text
    content: Kristy
  - type: text
    content: ' Jesosy araka ny didin’Andriamanitra, Mpamonjy antsika, sy Kristy Jesosy fanantenantsika, '
  '10':
  - type: text
    content: 'ny mpijangajanga, ny sodomita, ny mpivarotra olona, ny mpandainga, ny mpanao fianianana mandainga, ary na inona na inona manohitra ny fampianarana tsy misy kilema, '
  '11':
  - type: text
    content: araka ny Filazantsaran’ny voninahitr’Andriamanitra loharanom-pahasambarana, izay nankinina tamiko.
  - type: heading
    content: Fisaorana an’Andriamanitra
  '12':
  - type: text
    content: 'Izaho dia misaotra an’i '
  - type: text
    content: Kristy
  - type: text
    content: ' Jesosy Tompontsika, izay nampahery ahy, fa nataony mahatoky aho ka notendreny ho amin’ny fanompoana, '
  '13':
  - type: text
    content: 'dia izaho izay mpiteny ratsy fahiny sady mpanenjika sy mpampahory; kanefa nahazo famindrampo aho satria tamin’ny tsy fahalalana noho ny tsy finoana no nanaovako ireny. '
  '14':
  - type: text
    content: 'Fa mitafotafo ny fahasoavan’ny Tompontsika tamin’ny finoana sy ny fitiavana, izay ao amin’i Kristy Jesosy. '
  '15':
  - type: text
    content: 'Mahatoky ka tokony hekena amin’ny fankasitrahana rehetra izao teny izao: Tonga tetỳ ambonin’ny tany Kristy Jesosy hamonjy ny mpanota, ary amin’ireny dia izaho no lohany. '
  '16':
  - type: text
    content: 'Kanefa izao no namindrana fo tamiko, dia ny mba hanehoan’i Jesosy Kristy eo amiko izay lohany, ny fahari-po rehetra ho fianarana ho an’izay hino Azy ka hahazoany ny fiainana mandrakizay. '
  '17':
  - type: text
    content: Ary ho an’ny Mpanjaka mandrakizay, tsy mety maty, tsy hita maso, dia ho an’Andriamanitra tokana ihany anie ny laza sy ny voninahitra mandrakizay mandrakizay. Amena.
  - type: heading
    content: Miady ny ady tsara
  '18':
  - type: text
    content: 'Izao didy izao no omeko anao, ry Timoty zanako, araka ireo faminaniana natao fahiny ny aminao mba hoentinao miady ny ady tsara, '
  '19':
  - type: text
    content: 'amin’ny itananao ny finoana sy ny fieritreretana tsara, izay efa narian’ny sasany, koa toy ny olona vaky sambo izy amin’ny lafin’ny finoana; '
  '2':
  - type: text
    content: 'no mamangy an’i Timoty, tena zanako amin’ny finoana: Ho aminao anie ny fahasoavana, famindrampo, fiadanana avy amin’Andriamanitra Ray sy Kristy Jesosy Tompontsika.'
  - type: heading
    content: Aoka tsy hanao fampianarana hafahafa
  '20':
  - type: text
    content: naman’ireny i Himeneo sy i Aleksandra, izay natolotro ho an’i Satana mba hofaizina tsy hiteny ratsy.
  '3':
  - type: text
    content: 'Araka ny nangatahiko taminao fony aho handeha any Makedonia dia aoka ianao hitoetra any Efesosy mba handraranao ny olona sasany tsy hanao fampianarana hafahafa '
  '4':
  - type: text
    content: 'na ho variana amin’ny anganongano sy ny tantaram-pirazanana tsy hita lany izay mahatonga adihevitra, fa tsy mampandroso ny fitondrana araka an’Andriamanitra amin’ny finoana ireny. '
  '5':
  - type: text
    content: 'Fa ny anton’ny didy fandrarana dia fitiavana avy amin’ny fo madio sy ny fieritreretana tsara ary ny finoana tsy mihatsaravelatsihy; '
  '6':
  - type: text
    content: 'fa fihatsarambelatsihy no nivilian’ny sasany ka nampania ho amin’ny resaka tsy misy antony. '
  '7':
  - type: text
    content: Izy ireny dia te ho mpampiana-dalàna, kanefa tsy fantany akory izay lazainy na izay itompoany.
  - type: heading
    content: Ny asan’ny lalàna
  '8':
  - type: text
    content: 'Fantatsika anefa fa tsara ny lalàna raha entin’ny olona araka izay antony '
  '9':
  - type: text
    content: 'ka fantany fa tsy ny olona marina no nanaovana ny lalàna fa ny mpandika lalàna sy ny mpikomy, dia ny tsy matahotra an’Andriamanitra sy ny mpanota, ny olona tsy manaja izay masina sy ny olona mpaniratsira, ny mpamono ray sy ny mpamono reny, ny mpamono olona, '
