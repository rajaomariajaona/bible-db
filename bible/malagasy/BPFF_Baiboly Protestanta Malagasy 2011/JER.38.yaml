document_id: JER.38
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nalatsaka tao amin’ny lavaka famorian-drano i Jeremia
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary i Safatia, zanak’i Matana, sy i Gedalia, zanak’i Pasora, ary i Jokala, zanak’i Selemia, sy i Pasora, zanak’i Malkia, dia nandre ny teny izay nolazain’i Jeremia tamin’ny vahoaka rehetra hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Izao no lazain’NY TOMPO: Izay mitoetra amin’ity tanàna ity dia ho fatin-tsabatra sy mosary ary areti-mandringana; fa izay mivoaka hanatona ny Kaldeana kosa no ho velona; ny ainy no ho babony fa ho velona ihany izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Izao no lazain’NY TOMPO: Ity tanàna ity dia hatolotra eo an-tanan’ny miaramilan’ny mpanjakan’i Babilona tokoa ka ho azony.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dia hoy ny mpanapaka tamin’ny mpanjaka: Trara antitra ianao, aoka hovonoina ity lehilahy ity, fa mampiraviravy tanana ny miaramila izay sisa amin’ity tanàna ity mbamin’ny olona rehetra izy, noho ny nitenenany taminy araka izany teny teo izany; fa ity lehilahy ity dia tsy mba mitady izay hiadanan’ity firenena ity fa izay hahatonga loza aminy kosa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia hoy i Zedekia mpanjaka: Indro, eo an-tananareo izy; fa tsy mahefa na inona na inona hisakana anareo ny mpanjaka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ary naka an’i Jeremia izy ireo ka nandatsaka azy tao amin’ny lavaka famorian-dranon’i Malkia, zanaky ny mpanjaka, izay tao amin’ny kianjan’ny trano fiambenana; ary nampidininy tamin’ny tady mahazaka i Jeremia. Tsy nisy rano tao amin’ny lavaka fa fotaka fotsiny ihany ka nilentika tao amin’ny fotaka i Jeremia.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary i Ebeda-Meleka kosita, tandapa iray tao amin’ny tranon’ny mpanjaka, dia nandre ny nandatsahan’ireo an’i Jeremia tao amin’ny lava-drano. Tamin’iny ny mpanjaka dia nipetraka teo amin’ny vavahadin’ny Benjamina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dia nivoaka avy tao an-tranon’ny mpanjaka i Ebeda-Meleka ka niteny tamin’ny mpanjaka hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ry tompokolahy mpanjaka, ratsy avokoa izay rehetra nataon’ity firenena ity tamin’i Jeremia mpaminany, fa nataony tao an-dava-drano izy ka ho faty mosary ao amin’izay itoerany satria tsy misy mofo intsony ato an-tanàna. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary niteny tamin’i Ebeda-Meleka kosita ny mpanjaka hoe: Mitondrà telopolo lahy hiaraka aminao hampakatra an’i Jeremia mpaminany hiala ao anaty lavaka, dieny tsy mbola maty izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary i Ebeda-Meleka dia nitondra ny olona niaraka taminy ka lasa nankany amin’ny tranon’ny mpanjaka eo ambanin’ny trano fitahirizana, ary naka lamba rovitra sy vorodamba tao izy ka nampidininy tamin’ny tady mahazaka ho ao amin’ny lavaka, ho ao amin’i Jeremia. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Dia hoy Ebeda-Meleka kosita tamin’i Jeremia: Ataovy eo ambanin’ny helikao ireto lamba rovitra sy vorodamba ireto, ary ho eo ambaniny ny tady mahazaka; dia nataon’i Jeremia izany; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ary nosintoniny tamin’ny tady mahazaka i Jeremia ka nakariny avy tao anaty lavaka; dia nitoetra teo amin’ny kianjan’ny trano fiambenana izy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fihaonana farany nifanaovan’i Zedekia sy i Jeremia
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Nandefa iraka haka an’i Jeremia mpaminany hankao aminy tao amin’ny fidirana fahatelo, izay ao amin’ny tranon’NY TOMPO, i Zedekia mpanjaka. Dia hoy ny mpanjaka tamin’i Jeremia: Hanontany zavatra kely aminao aho ka aza anafenana na inona na inona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary hoy i Jeremia tamin’i Zedekia: Raha ambarako anao, dia tsy hovonoinao tokoa va re aho? Fa na dia tolorako saina aza ianao, dia tsy hihaino ahy tsinona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary i Zedekia mpanjaka dia nianiana mangingina tamin’i Jeremia hoe: Raha velona koa NY TOMPO izay nanome aina antsika toy izao, dia tsy hamono anao tokoa aho, na hanolotra anao eo an-tanan’ireto olona mitady ny ainao ireto. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Dia hoy i Jeremia tamin’i Zedekia: Izao ary no lazain’NY TOMPO, Andriamanitra Tompon’izao rehetra izao, Andriamanitry ny Israely: Raha mivoaka hanatona ny mpanapaky ny mpanjakan’i Babilona tokoa ianao dia ho velona ny ainao sady tsy hodorana amin’ny afo ity tanàna ity, fa ho velona ianao sy ny mpianakavinao; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'fa raha tsy mivoaka hanatona ny mpanapaky ny mpanjakan’i Babilona kosa ianao dia hatolotra eo an-tanan’ny Kaldeana ity tanàna ity sady hodorany amin’ny afo izy ary tsy ho afa-mandositra ny tanany ianao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary hoy i Zedekia mpanjaka tamin’i Jeremia: Matahotra ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jiosy
  - type: text
    text: ' izay efa nanatona ny Kaldeana aho, fandrao hatolony eo an-tanany ka hataony fihomehezana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Hoy anefa i Jeremia: Tsy hanolotra anao izy tsy akory. Trara antitra ianao, ankatoavy ny tenin’NY TOMPO, izay lazaiko aminao, mba hahita soa ianao ka ho velona ny ainao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Fa raha tsy mety mivoaka kosa ianao dia izao no teny efa nasehon’NY TOMPO ahy: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Indreo, ny vehivavy rehetra izay sisa ao an-tranon’ny mpanjakan’ny Joda dia hoentina mivoaka ho any amin’ny mpanapaky ny mpanjakan’i Babilona, ary ireo vehivavy ireo dia hiteny hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ireo sakaizanao no nitaona anao
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady naharesy anao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary rehefa latsaka tao amin’ny honahona ny tongotrao
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia nilaozany nihemotra ianao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ny vadinao rehetra sy ny zanakao dia hoentina mivoaka ho any amin’ny Kaldeana; ary tsy ho afa-mandositra ny tanany ianao, fa ho azon’ny tanan’ny mpanjakan’i Babilona; ary noho ianao no handoroana ity tanàna ity amin’ny afo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Dia hoy i Zedekia tamin’i Jeremia: Aoka tsy ho ren’olona ary izany teny izany, mba tsy ho faty ianao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Fa rehefa ren’ny mpanapaka fa niresaka taminao aho, ary tonga aminao izy ka miteny aminao hoe: Ambarao aminay ankehitriny izay nolazainao tamin’ny mpanjaka, aza afenina anay fa tsy hamono anao izahay; ary ambarao anay koa izay nolazain’ny mpanjaka taminao; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'dia lazao aminy hoe: Noraisin’ny mpanjaka ny fiangaviako, mba tsy hamerenany ahy ho faty any amin’ny tranon’i Jonatana.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Ary nankany amin’i Jeremia ny mpanapaka rehetra ka nanontany azy; dia nolazainy taminy araka izay teny rehetra nandidian’ny mpanjaka azy. Ary tsy niresaka taminy intsony ireo satria tsy nisy re ny raharaha.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Dia nitoetra teo amin’ny kianjan’ny trano fiambenana i Jeremia mandra-pahatongan’ny andro nahazoana an’i Jerosalema.
