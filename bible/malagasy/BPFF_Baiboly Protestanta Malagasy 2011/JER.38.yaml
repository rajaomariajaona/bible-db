document_id: JER.38,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Nalatsaka tao amin’ny lavaka famorian-drano i Jeremia
  - type: text
    content: 'Ary i Safatia, zanak’i Matana, sy i Gedalia, zanak’i Pasora, ary i Jokala, zanak’i Selemia, sy i Pasora, zanak’i Malkia, dia nandre ny teny izay nolazain’i Jeremia tamin’ny vahoaka rehetra hoe: '
  '10':
  - type: text
    content: 'Ary niteny tamin’i Ebeda-Meleka kosita ny mpanjaka hoe: Mitondrà telopolo lahy hiaraka aminao hampakatra an’i Jeremia mpaminany hiala ao anaty lavaka, dieny tsy mbola maty izy. '
  '11':
  - type: text
    content: 'Ary i Ebeda-Meleka dia nitondra ny olona niaraka taminy ka lasa nankany amin’ny tranon’ny mpanjaka eo ambanin’ny trano fitahirizana, ary naka lamba rovitra sy vorodamba tao izy ka nampidininy tamin’ny tady mahazaka ho ao amin’ny lavaka, ho ao amin’i Jeremia. '
  '12':
  - type: text
    content: 'Dia hoy Ebeda-Meleka kosita tamin’i Jeremia: Ataovy eo ambanin’ny helikao ireto lamba rovitra sy vorodamba ireto, ary ho eo ambaniny ny tady mahazaka; dia nataon’i Jeremia izany; '
  '13':
  - type: text
    content: ary nosintoniny tamin’ny tady mahazaka i Jeremia ka nakariny avy tao anaty lavaka; dia nitoetra teo amin’ny kianjan’ny trano fiambenana izy.
  - type: heading
    content: Fihaonana farany nifanaovan’i Zedekia sy i Jeremia
  '14':
  - type: text
    content: 'Nandefa iraka haka an’i Jeremia mpaminany hankao aminy tao amin’ny fidirana fahatelo, izay ao amin’ny tranon’NY TOMPO, i Zedekia mpanjaka. Dia hoy ny mpanjaka tamin’i Jeremia: Hanontany zavatra kely aminao aho ka aza anafenana na inona na inona. '
  '15':
  - type: text
    content: 'Ary hoy i Jeremia tamin’i Zedekia: Raha ambarako anao, dia tsy hovonoinao tokoa va re aho? Fa na dia tolorako saina aza ianao, dia tsy hihaino ahy tsinona. '
  '16':
  - type: text
    content: 'Ary i Zedekia mpanjaka dia nianiana mangingina tamin’i Jeremia hoe: Raha velona koa NY TOMPO izay nanome aina antsika toy izao, dia tsy hamono anao tokoa aho, na hanolotra anao eo an-tanan’ireto olona mitady ny ainao ireto. '
  '17':
  - type: text
    content: 'Dia hoy i Jeremia tamin’i Zedekia: Izao ary no lazain’NY TOMPO, Andriamanitra Tompon’izao rehetra izao, Andriamanitry ny Israely: Raha mivoaka hanatona ny mpanapaky ny mpanjakan’i Babilona tokoa ianao dia ho velona ny ainao sady tsy hodorana amin’ny afo ity tanàna ity, fa ho velona ianao sy ny mpianakavinao; '
  '18':
  - type: text
    content: 'fa raha tsy mivoaka hanatona ny mpanapaky ny mpanjakan’i Babilona kosa ianao dia hatolotra eo an-tanan’ny Kaldeana ity tanàna ity sady hodorany amin’ny afo izy ary tsy ho afa-mandositra ny tanany ianao. '
  '19':
  - type: text
    content: 'Ary hoy i Zedekia mpanjaka tamin’i Jeremia: Matahotra ny '
  - type: text
    content: Jiosy
  - type: text
    content: ' izay efa nanatona ny Kaldeana aho, fandrao hatolony eo an-tanany ka hataony fihomehezana. '
  '2':
  - type: text
    content: 'Izao no lazain’NY TOMPO: Izay mitoetra amin’ity tanàna ity dia ho fatin-tsabatra sy mosary ary areti-mandringana; fa izay mivoaka hanatona ny Kaldeana kosa no ho velona; ny ainy no ho babony fa ho velona ihany izy. '
  '20':
  - type: text
    content: 'Hoy anefa i Jeremia: Tsy hanolotra anao izy tsy akory. Trara antitra ianao, ankatoavy ny tenin’NY TOMPO, izay lazaiko aminao, mba hahita soa ianao ka ho velona ny ainao. '
  '21':
  - type: text
    content: 'Fa raha tsy mety mivoaka kosa ianao dia izao no teny efa nasehon’NY TOMPO ahy: '
  '22':
  - type: text
    content: 'Indreo, ny vehivavy rehetra izay sisa ao an-tranon’ny mpanjakan’ny Joda dia hoentina mivoaka ho any amin’ny mpanapaky ny mpanjakan’i Babilona, ary ireo vehivavy ireo dia hiteny hoe:'
  - type: text
    content: Ireo sakaizanao no nitaona anao
  - type: text
    content: sady naharesy anao;
  - type: text
    content: ary rehefa latsaka tao amin’ny honahona ny tongotrao
  - type: text
    content: dia nilaozany nihemotra ianao.
  '23':
  - type: text
    content: 'Ny vadinao rehetra sy ny zanakao dia hoentina mivoaka ho any amin’ny Kaldeana; ary tsy ho afa-mandositra ny tanany ianao, fa ho azon’ny tanan’ny mpanjakan’i Babilona; ary noho ianao no handoroana ity tanàna ity amin’ny afo. '
  '24':
  - type: text
    content: 'Dia hoy i Zedekia tamin’i Jeremia: Aoka tsy ho ren’olona ary izany teny izany, mba tsy ho faty ianao. '
  '25':
  - type: text
    content: 'Fa rehefa ren’ny mpanapaka fa niresaka taminao aho, ary tonga aminao izy ka miteny aminao hoe: Ambarao aminay ankehitriny izay nolazainao tamin’ny mpanjaka, aza afenina anay fa tsy hamono anao izahay; ary ambarao anay koa izay nolazain’ny mpanjaka taminao; '
  '26':
  - type: text
    content: 'dia lazao aminy hoe: Noraisin’ny mpanjaka ny fiangaviako, mba tsy hamerenany ahy ho faty any amin’ny tranon’i Jonatana.'
  '27':
  - type: text
    content: Ary nankany amin’i Jeremia ny mpanapaka rehetra ka nanontany azy; dia nolazainy taminy araka izay teny rehetra nandidian’ny mpanjaka azy. Ary tsy niresaka taminy intsony ireo satria tsy nisy re ny raharaha.
  '28':
  - type: text
    content: Dia nitoetra teo amin’ny kianjan’ny trano fiambenana i Jeremia mandra-pahatongan’ny andro nahazoana an’i Jerosalema.
  '3':
  - type: text
    content: 'Izao no lazain’NY TOMPO: Ity tanàna ity dia hatolotra eo an-tanan’ny miaramilan’ny mpanjakan’i Babilona tokoa ka ho azony.'
  '4':
  - type: text
    content: 'Dia hoy ny mpanapaka tamin’ny mpanjaka: Trara antitra ianao, aoka hovonoina ity lehilahy ity, fa mampiraviravy tanana ny miaramila izay sisa amin’ity tanàna ity mbamin’ny olona rehetra izy, noho ny nitenenany taminy araka izany teny teo izany; fa ity lehilahy ity dia tsy mba mitady izay hiadanan’ity firenena ity fa izay hahatonga loza aminy kosa. '
  '5':
  - type: text
    content: 'Dia hoy i Zedekia mpanjaka: Indro, eo an-tananareo izy; fa tsy mahefa na inona na inona hisakana anareo ny mpanjaka. '
  '6':
  - type: text
    content: Ary naka an’i Jeremia izy ireo ka nandatsaka azy tao amin’ny lavaka famorian-dranon’i Malkia, zanaky ny mpanjaka, izay tao amin’ny kianjan’ny trano fiambenana; ary nampidininy tamin’ny tady mahazaka i Jeremia. Tsy nisy rano tao amin’ny lavaka fa fotaka fotsiny ihany ka nilentika tao amin’ny fotaka i Jeremia.
  '7':
  - type: text
    content: 'Ary i Ebeda-Meleka kosita, tandapa iray tao amin’ny tranon’ny mpanjaka, dia nandre ny nandatsahan’ireo an’i Jeremia tao amin’ny lava-drano. Tamin’iny ny mpanjaka dia nipetraka teo amin’ny vavahadin’ny Benjamina. '
  '8':
  - type: text
    content: 'Dia nivoaka avy tao an-tranon’ny mpanjaka i Ebeda-Meleka ka niteny tamin’ny mpanjaka hoe: '
  '9':
  - type: text
    content: 'Ry tompokolahy mpanjaka, ratsy avokoa izay rehetra nataon’ity firenena ity tamin’i Jeremia mpaminany, fa nataony tao an-dava-drano izy ka ho faty mosary ao amin’izay itoerany satria tsy misy mofo intsony ato an-tanàna. '
