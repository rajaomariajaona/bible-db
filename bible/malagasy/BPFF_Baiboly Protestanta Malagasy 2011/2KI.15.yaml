document_id: 2KI.15,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: I Azaria na Ozia, mpanjakan’i Joda
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 2Tan 26.3-4
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin’ny taona fahafito amby roapolo nanjakan’i Jeroboama, mpanjakan’ny Israely, no nanomboka nanjaka i Azaria, zanak’i Amazia, mpanjakan’ny Joda. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary i Saloma, zanak’i Jabesy dia nanao tetika fikomiana taminy dia namely azy teo anatrehan’ny vahoaka ka nahafaty azy ary avy eo dia nanjaka nandimby azy. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny tantaran’i Zakaria sisa, indro, efa voasoratra ao amin’ny bokin’ny tantaran’ny mpanjakan’ny Israely izany.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izany ilay tenin’NY TOMPO nolazainy tamin’i Jeho hoe: Ny taranakao hatramin’ny zafindohalika dia hipetraka amin’ny sezafiandrianan’ny Israely. Dia tanteraka izany.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: I Saloma, mpanjakan’ny Israely
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary i Saloma, zanak’i Jabesy, dia nanjaka tamin’ny taona fahasivy amby telopolo nanjakan’i Ozia, mpanjakan’ny Joda; nanjaka tany Samaria iray volana izy. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa niakatra avy tany Tirza hankany Samaria i Menahema, zanak’i Gady, dia namely an’i Saloma, zanak’i Jabesy, tany Samaria ka nahafaty azy ary nanjaka nandimby azy. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny tantaran’i Saloma sisa mbamin’ny nikomiany, indro, efa voasoratra ao amin’ny bokin’ny tantaran’ny mpanjakan’ny Israely izany.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tamin’izay i Menahema dia namely an’i Tifsa sy izay rehetra tao mbamin’ny faritaniny nanomboka hatrany Tirza, satria tsy namoha vavahady azy i Tifsa ka nasiany, ary notatahany ny kibon’izay bevohoka rehetra tao.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: I Menahema, mpanjakan’ny Israely
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin’ny taona fahasivy amby telopolo nanjakan’i Azaria, mpanjakan’ny Joda, no nanomboka nanjaka tamin’ny Israely i Menahema, zanak’i Gady, ary folo taona no nanjakany tao Samaria. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nanao izay ratsy teo imason’NY TOMPO izy. Tamin’ny androny rehetra izy dia tsy niala tamin’ny fahotan’i Jeroboama, zanak’i Nebata, izay nampanotany ny Israely. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary i Pola, mpanjakan’i Asiria dia avy hananika ny tany; ary i Menahema dia nanome '
    - type: usfm
      marker: w
      children:
      - type: text
        text: talenta
    - type: text
      text: ' volafotsy arivo an’i Pola, mba hanohana azy izy ka hampitoetra ny fanjakana eo an-tanany. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Enina amby folo taona izy no nanomboka nanjaka, ary roa amby dimampolo taona no nanjakany tany Jerosalema. Ny anaran’ny reniny dia Jekolia, avy any Jerosalema. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary nampandoavin’i Menahema io vola io ny mpanankarena rehetra tamin’ny Israely, dia sekela volafotsy dimampolo avy isan’olona, mba homeny ny mpanjakan’i Asiria. Dia lasa niverina ny mpanjakan’i Asiria fa tsy nijanona teo amin’ny tany.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny tantaran’i Menahema sisa mbamin’izay rehetra nataony, tsy voasoratra ao amin’ny bokin’ny tantaran’ny mpanjakan’ny Israely va izany? '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nodimandry any amin’ny razany i Menahema ka i Pekahia zanany no nanjaka nandimby azy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: I Pekahia, mpanjakan’ny Israely
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin’ny taona fahadimampolo nanjakan’i Azaria, mpanjakan’ny Joda, no nanomboka nanjaka tamin’ny Israely tao Samaria i Pekahia, zanak’i Menahema, ary roa taona no nanjakany. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nanao izay ratsy teo imason’NY TOMPO izy fa tsy niala tamin’ny fahotan’i Jeroboama, zanak’i Nebata, izay nampanotany ny Israely. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary i Peka, zanak’i Remalia, lefiny, dia nanao tetika fikomiana taminy ka namely an’i Pekahia mbamin’i Argoba sy i Aria tao Samaria, tao amin’ny tilikambo-mandan’ny lapa; nisy olona dimampolo lahy avy any Gileada niaraka tamin’i Peka. Koa namono an’i Pekahia i Peka dia nanjaka nandimby azy. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny tantaran’i Pekahia sisa mbamin’izay rehetra nataony, indro, voasoratra ao amin’ny bokin’ny tantaran’ny mpanjakan’ny Israely izany.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: I Peka, mpanjakan’ny Israely
    marker-yv: yv-h
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin’ny taona faharoa amby dimampolo nanjakan’i Azaria, mpanjakan’ny Joda, no nanomboka nanjaka tamin’ny Israely tao Samaria i Peka, zanak’i Remalia, ary roapolo taona no nanjakany. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nanao izay ratsy teo imason’NY TOMPO izy fa tsy niala tamin’ny fahotan’i Jeroboama, zanak’i Nebata, izay nampanotany ny Israely. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin’ny andron’i Peka, mpanjakan’ny Israely, dia tonga i Tiglato-Pilesera, mpanjakan’i Asiria, ka nahazo an’Iona sy i Abela-Bety-Maka, i Janoa, i Kadesy, i Hazora, i Gileada ary i Galilia, dia ny tanin’ny Naftaly manontolo; izy no nandefa ny olona ho babo tany Asiria. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nanao izay mahitsy teo imason’NY TOMPO izy, tahaka izay rehetra nataon’i Amazia rainy. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nanao tetika fikomiana tamin’i Peka, zanak’i Remalia, i Hosea, zanak’i Elaha, dia namely azy ho faty ka nanjaka nandimby azy tamin’ny taona faharoapolo nanjakan’i Jotama, zanak’i Ozia. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny tantaran’i Peka sisa mbamin’izay rehetra nataony, indro voasoratra ao amin’ny bokin’ny tantaran’ny mpanjakan’ny Israely izany.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: I Jotama, mpanjakan’ny Joda
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 2Tan 27.1-7
    marker-yv: yv-h
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin’ny taona faharoa nanjakan’i Peka, zanak’i Remalia, mpanjakan’ny Israely, no nanomboka nanjaka i Jotama, zanak’i Ozia, mpanjakan’ny Joda. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dimy amby roapolo taona izy raha nanomboka nanjaka, ary enina amby folo taona no nanjakany tany Jerosalema. Ny anaran’ny reniny dia Jerosa, zanakavavin’i Zadoka. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nanao izay mahitsy teo imason’NY TOMPO izy; tahaka izay rehetra nataon’i Ozia rainy no nataony. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Kanefa ireo toerana fanaovana sorona dia tsy mba noravana; mbola namono zavatra ho fanatitra sady nandoro ditin-kazo manitra teny amin’ireo toerana fanaovana sorona ihany ny olona. Izy no nanao ny vavahady ambony amin’ny tranon’NY TOMPO.
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny tantaran’i Jotama sisa mbamin’izay rehetra nataony, tsy voasoratra ao amin’ny bokin’ny tantaran’ny mpanjakan’ny Joda va izany?
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin’izany andro izany NY TOMPO dia nanomboka naniraka an’i Rezina, mpanjakan’i Arama, sy i Peka, zanak’i Remalia, hanafika an’i Joda. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary nodimandry any amin’ny razany i Jotama ka nalevina tao amin’ny razany tao amin’ny Tanànan’i Davida rainy; i Ahaza zanany no nanjaka nandimby azy.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Kanefa ny toerana fanaovana sorona dia tsy mba noravana; fa mbola namono zavatra ho fanatitra sady nandoro ditin-kazo manitra teny amin’ny toerana fanaovana sorona ihany ny olona.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 2Tan 26.16-23
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nikapoka ny mpanjaka NY TOMPO ka boka mandra-pahafatiny izy ary nitoetra tao amin’ny trano mitokana izy. I Jotama, zanaky ny mpanjaka, no nanapaka tao an-dapa sy nitondra ny vahoaka. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny tantaran’i Azaria sisa mbamin’izay rehetra nataony, tsy voasoratra ao amin’ny bokin’ny tantaran’ny mpanjakan’ny Joda va izany? '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary nodimandry any amin’ny razany i Azaria ka nalevina tao amin’ny razany tao amin’ny Tanànan’i Davida. Ary i Jotama zanany no nanjaka nandimby azy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: I Zakaria, mpanjakan’ny Israely
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin’ny taona fahavalo amby telopolo nanjakan’i Azaria, mpanjakan’ny Joda, no nanjakan’i Zakaria, zanak’i Jeroboama, tamin’ny Israely, ary nanjaka enim-bolana tao Samaria izy. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nanao izay ratsy teo imason’NY TOMPO tahaka ny nataon’ny razany izy; tsy niala tamin’ny fahotan’i Jeroboama, zanak’i Nebata, izay nampanotany ny Israely izy. '
