document_id: LEV.1,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Fitsipika momba ny fanatitra: Ny fanatitra dorana manontolo'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'NY TOMPO niantso an’i Mosesy ka niteny taminy avy tao amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: tranolay fihaonana
    - type: text
      text: ' hoe: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha ondry na osy no atolony ho fanatitra dorana manontolo dia lahy tsy misy kilema no hatolony. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hamono azy eo avaratry ny alitara eo anatrehan’NY TOMPO izy, ary ireo mpisorona, zanak’i Arona, dia hamafy ny ra manodidina ny alitara. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Horasainy tsara ilay fanatitra mbamin’ny lohany sy ny jaborany ka halahatry ny mpisorona eo ambonin’ny kitay izay eo amin’ny afo eo ambonin’ny alitara; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: nefa ny taovany sy ny tongony kosa dia hosasany amin’ny rano. Hoentin’ny mpisorona ireo rehetra ireo ka hodorany ho fofona eo ambonin’ny alitara. Ho fanatitra dorana manontolo izany, dia fanatitra levonina amin’ny afo ho hanitra ankasitrahana ho an’NY TOMPO.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha vorona no atolony ho an’NY TOMPO ho fanatitra dorana manontolo dia domohina na voromailala no hatolony ho fanatitra. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Haterin’ny mpisorona ho eo amin’ny alitara izany, dia hotapahiny ny lohany ka hodorany ho fofona eo ambonin’ny alitara sady hofiazany eo amin’ny rindrin’ny alitara ny rany. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hesoriny ny takorobabony sy ny volony dia hariany eo atsinanan’ny alitara, eo amin’ny fitoeran-davenona. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Hosamahiny ny elany nefa tsy hotapahiny hiala amin’ny vatany; ary ny mpisorona dia handoro azy ho fofona eo ambonin’ny alitara, ambonin’ny kitay eo amin’ny afo; fanatitra dorana manontolo izany, fanatitra levonina amin’ny afo ho hanitra ankasitrahana ho an’NY TOMPO.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mitenena amin’ny Zanak’Israely hoe:'
  - type: usfm
    marker: p
    children:
    - type: text
      text: Raha misy aminareo manolotra biby fiompy ho fanatitra ho an’NY TOMPO dia omby na ondry na osy no hatolotrareo.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha omby no atolony ho fanatitra dorana manontolo dia lahy tsy misy kilema no hoentiny; eo anoloan’ny varavaran’ny tranolay fihaonana no hanaterany azy mba hankasitrahana azy eo anatrehan’NY TOMPO. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hametraka ny tanany eo amin’ny lohan’ny fanatitra dorana manontolo izy, dia hahazoany fankasitrahana izany, hanaovana fanavotana ho azy. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hamono ny omby eo anatrehan’NY TOMPO izy ary ireo mpisorona, zanak’i Arona, dia hanatitra ny ra ka hamafy azy manodidina ny alitara izay eo anoloan’ny varavaran’ny tranolay fihaonana. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hendahiny ny hoditry ny fanatitra dorana manontolo ka horasainy tsara. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ireo zanak’i Arona mpisorona dia hanisy afo eo ambonin’ny alitara ka handahatra kitay eo amin’ny afo. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ireo mpisorona, zanak’i Arona, dia handahatra izay voarasa mbamin’ny lohany sy ny jaborany eo ambonin’ny kitay eo amin’ny afo izay eo ambonin’ny alitara; '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: nefa ny taovany sy ny tongony kosa dia hosasany amin’ny rano. Hodoran’ny mpisorona ho fofona eo ambonin’ny alitara ireo rehetra ireo; fanatitra dorana manontolo izany, fanatitra levonina amin’ny afo ho hanitra ankasitrahana ho an’NY TOMPO.
