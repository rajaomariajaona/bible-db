document_id: PSA.144,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Vavaka ataon’ny mpanjaka
  - type: text
    content: Nataon’i Davida.
  - type: text
    content: Isaorana anie NY TOMPO Vatolampiko
  - type: text
    content: izay mampianatra ny tanako hamely
  - type: text
    content: sy ny rantsan-tanako hiady,
  '10':
  - type: text
    content: izay manome famonjena ho an’ireo mpanjaka
  - type: text
    content: sady mamonjy an’i Davida mpanompony tsy ho voan’ny sabatra mandratra.
  '11':
  - type: text
    content: Afaho aho ka vonjeo
  - type: text
    content: amin’ny tanan’ny hafa firenena
  - type: text
    content: izay miteny zava-poana amin’ny vavany
  - type: text
    content: ary ny tanany havanana dia tanana havanana mamitaka.
  '12':
  - type: text
    content: Mba ho tahaka ny zavamaniry maroroka
  - type: text
    content: ny zanakay lahy
  - type: text
    content: ary ho tahaka ny vato fehizoro voasoratra tsara
  - type: text
    content: toy ny fomban’ny lapan’ny mpanjaka ny zanakay vavy.
  '13':
  - type: text
    content: Ho feno ny trano fitahirizanay
  - type: text
    content: ka hisy vokatra betsaka samihafa karazana;
  - type: text
    content: hiteraka arivoarivo sy alinalina
  - type: text
    content: ny ondrinay any an-tsahanay;
  '14':
  - type: text
    content: hahazaka be ny ombinay
  - type: text
    content: ary tsy hisy ho rava, na ho lasan-ko babo,
  - type: text
    content: sady tsy hisy fitarainana any an-kianjanay.
  '15':
  - type: text
    content: Sambatra ny firenena izay tahaka izany;
  - type: text
    content: eny, sambatra ny firenena izay manana NY TOMPO ho Andriamaniny.
  '2':
  - type: text
    content: izay Mpiantra sy manda fiarovana ho ahy
  - type: text
    content: sady fiarovana avo sy Mpanafaka ahy
  - type: text
    content: ary ampingako ka ao Aminy no ialofako,
  - type: text
    content: izay mahafolaka ny vahoakako hanoa ahy.
  '3':
  - type: text
    content: TOMPO ô, inona moa ny olona no iahianao azy?
  - type: text
    content: Ary ny zanak’olombelona no iheveranao azy?
  '4':
  - type: text
    content: Ny olona dia tahaka ny zava-poana.
  - type: text
    content: Ny androny dia tahaka ny aloka mihelina.
  '5':
  - type: text
    content: TOMPO ô, aondreho ny lanitrao ka midìna;
  - type: text
    content: tendreo ny tendrombohitra dia hidona-tsetroka ireny.
  '6':
  - type: text
    content: Ampitselatselaro ny tselatra ka ampielezo ireo;
  - type: text
    content: alefaso ny zana-tsipìkanao ka ampifanaritaho ireo.
  '7':
  - type: text
    content: Atsory avy any ambony ny tananao;
  - type: text
    content: afaho aho ka vonjeo amin’ny ranobe,
  - type: text
    content: dia amin’ny tanan’ny hafa firenena
  '8':
  - type: text
    content: izay miteny zava-poana amin’ny vavany
  - type: text
    content: ary ny tanany havanana dia tanana havanana mamitaka.
  '9':
  - type: text
    content: Andriamanitra ô, hihira fihiram-baovao ho Anao aho;
  - type: text
    content: amin’ny valiha tory folo no hankalazako Anao
