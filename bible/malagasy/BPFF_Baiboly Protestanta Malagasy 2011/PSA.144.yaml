document_id: PSA.144
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Vavaka ataon’ny mpanjaka
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: Nataon’i Davida.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Isaorana anie NY TOMPO Vatolampiko
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay mampianatra ny tanako hamely
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny rantsan-tanako hiady,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: izay Mpiantra sy manda fiarovana ho ahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady fiarovana avo sy Mpanafaka ahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ampingako ka ao Aminy no ialofako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay mahafolaka ny vahoakako hanoa ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: TOMPO ô, inona moa ny olona no iahianao azy?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny zanak’olombelona no iheveranao azy?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ny olona dia tahaka ny zava-poana.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny androny dia tahaka ny aloka mihelina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: TOMPO ô, aondreho ny lanitrao ka midìna;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tendreo ny tendrombohitra dia hidona-tsetroka ireny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ampitselatselaro ny tselatra ka ampielezo ireo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: alefaso ny zana-tsipìkanao ka ampifanaritaho ireo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Atsory avy any ambony ny tananao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: afaho aho ka vonjeo amin’ny ranobe,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia amin’ny tanan’ny hafa firenena
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: izay miteny zava-poana amin’ny vavany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny tanany havanana dia tanana havanana mamitaka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Andriamanitra ô, hihira fihiram-baovao ho Anao aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: amin’ny valiha tory folo no hankalazako Anao
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: izay manome famonjena ho an’ireo mpanjaka
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady mamonjy an’i Davida mpanompony tsy ho voan’ny sabatra mandratra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Afaho aho ka vonjeo
- type: usfm
  marker: q1
  children:
  - type: text
    text: amin’ny tanan’ny hafa firenena
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay miteny zava-poana amin’ny vavany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny tanany havanana dia tanana havanana mamitaka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Mba ho tahaka ny zavamaniry maroroka
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny zanakay lahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ho tahaka ny vato fehizoro voasoratra tsara
- type: usfm
  marker: q1
  children:
  - type: text
    text: toy ny fomban’ny lapan’ny mpanjaka ny zanakay vavy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ho feno ny trano fitahirizanay
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hisy vokatra betsaka samihafa karazana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hiteraka arivoarivo sy alinalina
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny ondrinay any an-tsahanay;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: hahazaka be ny ombinay
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy hisy ho rava, na ho lasan-ko babo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady tsy hisy fitarainana any an-kianjanay.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Sambatra ny firenena izay tahaka izany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, sambatra ny firenena izay manana NY TOMPO ho Andriamaniny.
