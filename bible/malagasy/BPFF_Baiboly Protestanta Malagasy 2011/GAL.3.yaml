document_id: GAL.3
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fahadalan’ny Galatiana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ry Galatiana adala, iza no namosavy anareo? Teo imasonareo indrindra anefa no nanehoana marimarina an’i Jesosy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' voahombo tamin’ny hazofijaliana. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Izao ihany no tiako ho fantatra avy aminareo: Moa ny asan’ny lalàna va no nandraisanareo ny Fanahy, sa ny nandrenesanareo ny hafatry ny finoana? '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Adala toy izany va ianareo? Rehefa nanomboka tamin’ny Fanahy va ianareo dia hamarana amin’ny nofo ankehitriny? '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Moa va niaretanareo foana izany zavatra rehetra izany, raha dia zava-poana tokoa izany? '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ary Izay manome anareo ny Fanahy sy mahavita asa lehibe eo aminareo, moa avy amin’ny asan’ny lalàna va no anaovany izany, sa avy amin’ny fandrenesana ny hafatry ny finoana?
- type: usfm
  marker: s1
  children:
  - type: text
    text: Voatahy miaraka amin’i Abrahama ireo izay mino
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Koa tahaka an’i «Abrahama, nino an’Andriamanitra ka nisaina ho fahamarinany izany» (Gen 15.6), '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'dia fantaro fa izay amin’ny finoana no zanak’i Abrahama. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary satria hitan’ny Soratra Masina rahateo fa amin’ny finoana no anamarinan’Andriamanitra ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jentilisa
  - type: text
    text: ', dia nitory ny Filazantsara tamin’i Abrahama koa izy ka niteny hoe: «Aminao no hitahiana ny firenena rehetra» (Gen 12.3); '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: koa izay manana finoana no tahina miaraka amin’i Abrahama, ilay mpino.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Izay rehetra avy amin’ny asan’ny lalàna dia eo ambanin’ny fanozonana; fa efa voasoratra hoe: «Voaozona izay rehetra tsy maharitra amin’ny fanatanterahana ny zavatra rehetra voasoratra ao amin’ny bokin’ny lalàna» (Deo 27.26). '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Hita marimarina fa tsy misy olona hamarinina eo anatrehan’Andriamanitra amin’ny lalàna; fa «ny marina amin’ny finoana no ho velona» (Hab 2.4). '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary ny lalàna dia tsy avy amin’ny finoana fa «izay mahatandrina izany no ho velona aminy» (Lev 18.5). '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' no nanavotra antsika tamin’ny ozon’ny lalàna satria tonga voaozona hamonjy antsika Izy; fa voasoratra hoe: «Voaozona izay rehetra mihantona amin’ny hazo» (Deo 21.23), '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: mba ho tonga amin’ny Jentilisa ny fitahiana an’i Abrahama ao amin’i Kristy Jesosy, ary mba horaisintsika amin’ny finoana ny teny fikasana ny amin’ny Fanahy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny lalàna sy ny teny fikasana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ry rahalahy! Miteny araka ny fanaon’ny olona aho, fa na dia ny didim-pananana ataon’olona aza, rehefa vita ara-dalàna, dia tsy fanao ny manatsoaka na manampy azy. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Tamin’i Abrahama sy ny taranany no nilazana ny teny fikasana. Tsy lazainy hoe: Ho an’ireo taranaka, toy ny milaza ny maro, fa toy ny milaza ny iray, «ary ho an’ny taranakao» (Gen 22.18), dia i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' izany. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary izao no lazaiko: Ny didim-pananana izay nataon’Andriamanitra mafy orina fahiny dia tsy foanan’ny lalàna, izay vao telopolo sy efajato taona tatỳ aoriana, fa manjary hanafoana ny teny fikasana io raha izany. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Raha avy amin’ny lalàna ny lova dia tsy avy amin’ny teny fikasana intsony; nefa tamin’i Abrahama dia ny teny fikasana no nanomezan’Andriamanitra azy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny asan’ny lalàna
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Nahoana moa no misy ny lalàna? Nomena ho fanampiny mba hisehoan’ny fahadisoana ambara-piavin’ny taranaka izay nomena ny teny fikasana izany; anjely no nandahatra izany teo an-tanan’ny mpanalalana. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary ny mpanalalana dia tsy an’olon-tokana, fa Andriamanitra kosa dia tokana. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Moa manohitra ny teny fikasan’Andriamanitra va ny lalàna? Sanatria izany! Raha nisy lalàna mahavelona nomena dia avy tamin’ny lalàna tokoa ny fahamarinana, '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'satria ny Soratra Masina dia efa nanidy azy rehetra tao amin’ny fahotana, mba homena ny Mino noho ny finoana an’i Jesosy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' ny teny fikasana.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Fa fony tsy mbola tonga ny finoana dia voambina tao ambanin’ny lalàna isika ka voahidy mandra-pahatongan’ny finoana izay efa haseho atỳ aoriana. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Noho izany ary dia mpitaiza antsika ho amin’i Kristy ny lalàna, mba hohamarinina noho ny finoana isika. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Rehefa tonga kosa ny finoana dia tsy eo ambany fifehezan’izay mpitaiza intsony isika. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Zanak’Andriamanitra amin’ny finoana an’i Kristy Jesosy ianareo rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Koa na iza na iza ianareo no natao batisa ho an’i Kristy dia nitafy an’i Kristy. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Tsy misy intsony ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jiosy
  - type: text
    text: ' sy Grika, ny andevo sy olona afaka, ny lahy sy vavy; fa iray ihany ianareo rehetra ao amin’i Kristy Jesosy. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Fa raha an’i Kristy ianareo dia taranak’i Abrahama, koa araka ny teny fikasana, dia mpandova.
