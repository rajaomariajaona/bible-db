document_id: 1SA.25,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Tsy naneho fankasitrahana an’i Davida i Nabala
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Ary maty i Samoela. Dia nivory ny Israely rehetra ka nisaona azy sy nandevina azy tao amin’ny fonenany tao Rama. Dia niainga i Davida ka nidina nankany an-tany efitra Parana.
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Fa namaly ny mpanompon’i Davida i Nabala hoe: Iza moa i Davida? Ary iza moa ny zanak’i Jese? Misy mpanompo maro ankehitriny izay milefa miala amin’ny tompony. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Koa halaiko va ny mofoko sy ny ranoko ary ny zavatra izay efa novonoiko ho an’ny mpanety ondriko ka homeko izay olona tsy fantatro fiaviana akory?
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Dia nihodina ny zatovon’i Davida ka niverin-dalana ary nody tany aminy ka nanambara izany teny rehetra izany taminy. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ary hoy i Davida tamin’ny olony: Samia manao ny sabatrareo eo amin’ny fehin-tsabany avy ianareo; dia samy nanao ny sabany teo amin’ny fehin-tsabany avy ny olona ary mba nanao ny sabany teo amin’ny fehin-tsabany koa i Davida. Tokony ho efajato lahy no niakatra nanaraka an’i Davida, roanjato lahy kosa no nijanona teo amin’ny entana.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mampitony an’i Davida i Abigaila
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'I Abigaila, vadin’i Nabala, dia nilazan’ny iray tamin’ny zatovony hoe: Indro, nandefa iraka avy tany an-tany efitra i Davida mba hiarahaba ny tompontsika nefa nisafoaka tamin’ireny izy. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Fa ireo lehilahy ireo dia tena nanao soa taminay ka tsy naninon-tsy naninona izahay, ary tsy nisy zavatra very nandritra ny andro rehetra nitoeranay teo aminy fony tany an-tsaha izahay. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Izy ireo no mandanay andro aman’alina tamin’ny andro rehetra nitoeranay niandry ondry tany aminy. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Koa fantaro sy diniho ankehitriny izay hataonao; fa ratsy no ifofoany ny tompontsika mbamin’ny ankohonany rehetra satria izy dia tena ratsy fanahy ka tsy misy olona mahazo miteny aminy.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Dia nandeha haingana i Abigaila ka naka mofo roanjato, divay roa siny hoditra, ondry dimy efa voavoatra, lango indimin’ny sea, mofo voaloboka maina zato ary mofo aviavy roanjato; dia natainginy tamin’ny boriky ireo. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Ary hoy izy tamin’ny zatovony: Mandehana eo alohako! Indro izaho hanaraka anareo. Nefa i Nabala vadiny dia tsy mba nilazany. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Nisy lehilahy iray tao Maona, ary tao Karmela no niasany; mpanankarem-be Ralehilahy ary nanana ondry telo arivo sy osy arivo; nanety ny ondriny tao Karmela izy. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Nony nitaingina ny borikiny izy ka nidina tao amin’ilay takona amin’ny havoana dia indro, nidina nanatona azy i Davida sy ny olony ka nifanena taminy. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Ary i Davida dia nilaza hoe: Foana tokoa ny niarovako izay rehetra nananan’ilehiny tany an-tany efitra ka tsy nisy very na inona na inona, satria novalìny ratsy ny soa nataoko. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Mba hataon’Andriamanitra toy izany anie ny fahavalon’i Davida; eny, mihoatra noho izany aza, raha havelako hisy miangana na dia lehilahy iray aza izay mety ho azy mandra-paharain’ny andro.
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Ary rehefa nahita an’i Davida i Abigaila dia niala haingana teo ambonin’ny boriky ka niondrika teo anatrehan’i Davida sady niankohoka tamin’ny tany. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Dia niankohoka teo an-tongony izy ka niteny hoe: Aoka ho ahy ny heloka, tompokolahy; miangavy anao aho, avelao ny mpanompovavinao hiteny eto anatrehanao, mba henoy ny tenin’ny mpanompovavinao. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Miangavy anao aho, aoka ny tompoko tsy hiraharaha io Nabala izay lehilahy tena ratsy fanahy io; satria tahaka ny anarany ihany ny toetrany; Nabala
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Nabala: Adala.'
      marker-yv: yv-n
    - type: text
      text: ' mantsy no anarany ka hadalana no ao aminy. Fa izaho mpanompovavinao kosa, tompoko, dia tsy mba nahita ny zatovo izay nirahinao. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Koa ankehitriny, tompoko, raha velona koa NY TOMPO, ary raha velona koa ianao, NY TOMPO efa niaro anao tsy hahazo heloka amin’ny fandatsahan-dra ka namonjy anao; koa ny fahavalonao sy izay mitady hanisy ratsy anao, tompoko, dia avelao ho tahaka an’i Nabala. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Ary izao saotra noentin’ny mpanompovavinao aminao ankehitriny izao, tompoko, dia aoka homena ny zatovo izay manaraka ny tompoko. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Miangavy anao aho, mamelà ny fahadisoan’ny mpanompovavinao, fa NY TOMPO hampaharitra ny taranaky ny tompoko tokoa; satria ny tompoko miady ny adin’NY TOMPO; tsy misy ratsy ho hita ao aminao amin’ny andronao rehetra. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Raha misy olona mitsangana hanenjika anao ka mitady ny ainao dia hofehezina amin’ny fehin’aina ao amin’NY TOMPO Andriamanitrao ny ain’ny tompoko, fa ny ain’ny fahavalonao kosa dia hatorany toy ny eo amin’ny foitran’antsamotady. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Nabala no anaran-dRalehilahy, ary Abigaila no anaran’ny vavy; vehivavy marani-tsaina sady tsara tarehy izy ity; ny lahy kosa saro-po sy ratsy amin’izay ataony; ary isan’ny taranak’i Kaleba izy. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Koa rehefa mahavita amin’ny tompoko araka ny soa rehetra nolazainy taminao NY TOMPO ka manendry anao ho mpanapaka ny Israely '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: dia tsy ho sakana na fanafintohinana amin’ny fon’ny tompoko izany, fa tsy nandatsa-dra tsy amin’antony ianao, na namonjy ny tenanao, tompoko; fa rehefa asian’NY TOMPO soa ny tompoko dia mba tsarovy aho mpanompovavinao.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nahafatesan’i Nabala sy ny nampakaran’i Davida an’i Abigaila ho vadiny
    marker-yv: yv-h
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Hoy i Davida tamin’i Abigaila: Isaorana anie NY TOMPO, Andriamanitry ny Israely izay naniraka anao hihaona amiko androany. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Hotahiny anie ny fahendrenao sady hotahiny anie ianao, izay niaro ahy tsy hahazo heloka amin’ny fandatsahan-dra ary tsy hamonjy ny tenako. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Kanefa, raha velona koa NY TOMPO, Andriamanitry ny Israely, izay niaro ahy tsy hanisy ratsy anao, raha tsy avy haingana nitsena ahy ianao dia efa tsy nasiako niangana na dia lehilahy iray aza amin’i Nabala mandra-paharain’ny andro. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Dia noraisin’i Davida teny an-tanany ilay zavatra noentiny ary hoy izy taminy: Miakara soa amantsara any an-tranonao ianao; indro, efa nohenoiko ny feonao ary nankasitrahiko ianao.'
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Dia tonga tao amin’i Nabala i Abigaila; kanjo, indro izy nanao fanasana, tahaka ny fanasan’ny mpanjaka, tao an-tranony; faly ny fon’i Nabala tamin’io sady tena mamo izy, noho izany dia tsy nisy nambaran’ny vavy taminy na kely akory aza mandra-pahazava ny andro. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Nony maraina, rehefa afaka ny hamamoan’i Nabala dia nambaran’ny vavy taminy ny zava-nitranga ka voadona ny fony ary tonga tahaka ny vato. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: Nony afaka hafoloana dia nasian’NY TOMPO i Nabala ka maty.
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Nony ren’i Davida fa maty i Nabala dia hoy izy: Isaorana anie NY TOMPO izay niady ho ahy ka nahafa-tondro-maso ahy tamin’ny tanan’i Nabala sy niaro ny mpanompony tamin’ny ratsy. Fa ny ratsy nataon’i Nabala dia naverin’NY TOMPO ho eo an-dohany ihany. Ary nandefa iraka hiresaka amin’i Abigaila haka azy ho vady i Davida.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ren’i Davida tany an-tany efitra fa manety ny ondriny i Nabala. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'Nony tonga tany amin’i Abigaila teo Karmela ny mpanompon’i Davida dia niteny taminy hoe: Naniraka anay hankaty aminao mba haka anao ho vadiny i Davida. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'Dia nitsangana izy ary niankohoka tamin’ny tany ka niteny hoe: Eny ary, aoka aho ho mpanompo hanasa ny tongotry ny mpanompon’ny tompoko. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: Ary nitsangana haingana i Abigaila ka nitaingina boriky; nanaraka azy koa ny mpanompovaviny dimy; dia nanaraka ireo irak’i Davida izy ka tonga vadiny.
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'I Davida moa dia efa nanambady an’i Ahinoama avy any Jezirela koa ka samy vadiny avokoa izy roa vavy. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: Fa i Saoly dia efa nanome an’i Mikala, zanany vavy, vadin’i Davida, ho vadin’i Palty, zanak’i Laisy, avy any Galima.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Dia naniraka zatovo folo lahy i Davida ka niteny tamin’ireo hoe: Miakara any Karmela ianareo ary mankanesa any amin’i Nabala, koa miarahabà azy amin’ny anarako. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ary izao no holazainareo aminy: Trara antitra ianao, fiadanana anie ho anao, fiadanana ho amin’ny ankohonanao, ary fiadanana ho amin’izay anananao rehetra. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Reko fa manety ondry ianao ankehitriny; koa ny mpiandry ondrinao, izay tao aminay, dia tsy mba nasianay ratsy, ary tsy nisy very na inona na inona tamin’ny andro rehetra nitoerany tao Karmela. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Anontanio ireo zatovonao fa hilaza aminao. Koa aoka hahita fitia eo imasonao ireo zatovo fa andro fifaliana no iavianay; miangavy anao aho, mba omeo amin’izay azon’ny tananao ireto mpanomponao sy i Davida zanakao.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Rehefa tonga ireo zatovon’i Davida dia niteny tamin’i Nabala tamin’ny anaran’i Davida izy ireo araka izany teny rehetra izany, dia nipetraka. '
