document_id: JOB.1,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: FITARIHANTENY
  - type: text
    content: 'Nisy lehilahy iray tany amin’ny tany Oza, Joba no anarany. Marina sy mahitsy izany lehilahy izany sady natahotra an’Andriamanitra ka nifady ny ratsy. '
  '10':
  - type: text
    content: 'Tsy Ianao va no nanao fefy manodidina azy sy manodidina ny tranony ary manodidina izay ananany rehetra? Notahinao ny asan’ny tanany ka manenika ny tany ny omby aman’ondriny. '
  '11':
  - type: text
    content: 'Fa atsory ange ny tananao ka tendreo izay ananany rehetra raha tsy handa Anao eo imasonao aza izy e! '
  '12':
  - type: text
    content: 'Dia hoy NY TOMPO tamin’i Satana: Indro, eo an-tananao izay ananany rehetra; fa ny tenany ihany no aza kasihin’ny tananao. Dia niala teo anatrehan’NY TOMPO i Satana.'
  '13':
  - type: text
    content: 'Indray andro, raha nihinana sy nisotro divay tao an-tranon’ny zokiny lahimatoa ny zanany lahy sy ny zanany vavy, '
  '14':
  - type: text
    content: 'dia nisy iraka tonga tany amin’i Joba ka nilaza hoe: Teo am-piasana ny omby ary nandrasana teo anilany ny borikivavy; '
  '15':
  - type: text
    content: 'nisy Sabeana namely azy tampoka ka namabo azy ary ny mpanompo dia nasiany tamin’ny lelan-tsabatra. Izaho dia izaho irery ihany no afa-nandositra hilaza aminao. '
  '16':
  - type: text
    content: 'Raha mbola niteny izy dia nisy iray koa tonga ka nilaza hoe:'
  - type: text
    content: Nilatsaka avy tany an-danitra ny afon’Andriamanitra
  - type: text
    content: ary nandoro ny ondry aman’osy sy ny mpanompo ka nandevona azy.
  - type: text
    content: Izaho dia izaho irery ihany no afa-nandositra hilaza aminao.
  '17':
  - type: text
    content: 'Raha mbola niteny izy dia nisy iray koa tonga ka nilaza hoe:'
  - type: text
    content: Nisy Kaldeana nanao telo toko,
  - type: text
    content: niroatra nankeny amin’ny rameva izy ireo ka namabo azy
  - type: text
    content: ary ny mpanompo dia nasiany tamin’ny lelan-tsabatra.
  - type: text
    content: Izaho dia izaho irery ihany no afa-nandositra hilaza aminao.
  '18':
  - type: text
    content: 'Raha mbola niteny izy dia nisy iray koa tonga ka nilaza hoe:'
  - type: text
    content: Ny zanakao lahy sy ny zanakao vavy dia nihinana sy nisotro divay tao an-tranon’ny zokiny lahimatoa;
  '19':
  - type: text
    content: ary indro, nisy rivotra mahery avy tany an-tany efitra
  - type: text
    content: ka namely ny zoron-trano efatra,
  - type: text
    content: dia nianjera tamin’ny zatovo ny trano
  - type: text
    content: ka maty izy rehetra.
  - type: text
    content: Izaho dia izaho irery ihany no afa-nandositra hilaza aminao.
  '2':
  - type: text
    content: 'Niteraka fito lahy sy telo vavy izy. '
  '20':
  - type: text
    content: 'Dia nitsangana i Joba ka nandriatra ny akanjobeny ary nanaratra ny lohany dia niankarapoka tamin’ny tany '
  '21':
  - type: text
    content: 'sady niteny hoe:'
  - type: text
    content: Nitanjaka no nivoahako avy tany an-kibon’Ineny
  - type: text
    content: ary mitanjaka no hiverenako any;
  - type: text
    content: NY TOMPO no nanome
  - type: text
    content: ary NY TOMPO no nanaisotra;
  - type: text
    content: isaorana anie ny anaran’NY TOMPO!
  '22':
  - type: text
    content: Tamin’izany rehetra izany dia tsy nanota i Joba na nanome tsiny an’Andriamanitra.
  '3':
  - type: text
    content: Ny fananany dia ondry aman’osy fito arivo, rameva telo arivo, omby arivo, borikivavy dimanjato ary mpanompo marobe. Nanankarena be mihoatra noho ny zanaky ny Atsinanana rehetra izany lehilahy izany.
  '4':
  - type: text
    content: 'Fanaon’ny zanany lahy ny nifanasa ka nitety ny tranony avy, ary nandefa iraka naka ny anabaviny telo mirahavavy izy hiara-mihinana sy misotro aminy. '
  '5':
  - type: text
    content: 'Ary isaky ny tapitra nitsingerina ireo andro fanasana ireo dia nandefa iraka haka azy i Joba ka nanamasina ireny. Nifoha vao maraina izy ka nanolotra fanatitra dorana manontolo araka ny isan’izy rehetra; fa hoy i Joba: Fandrao nanota ny zanako ka nandà an’Andriamanitra tao am-pony. Izany no nataon’i Joba mandrakariva.'
  - type: heading
    content: Ny fizahan-toetra voalohany nanjo an’i Joba
  '6':
  - type: text
    content: 'Indray andro, nony avy ireo '
  - type: text
    content: zanak’Andriamanitra
  - type: text
    content: ' mba hiseho teo anatrehan’NY TOMPO, dia mba tonga teo koa i '
  - type: text
    content: Satana
  - type: text
    content: ' tafaharo taminy. '
  '7':
  - type: text
    content: 'Dia hoy NY TOMPO tamin’i Satana: Avy taiza ianao? Dia namaly NY TOMPO i Satana hoe: Avy nivezivezy teny ambonin’ny tany aho, nandehandeha teny. '
  '8':
  - type: text
    content: 'Hoy NY TOMPO tamin’i Satana: Efa nandinika an’i Joba mpanompoko va ianao? Fa tsy misy tahaka azy eny ambonin’ny tany, fa olona marina sy mahitsy izy sady matahotra an’Andriamanitra ka mifady ny ratsy. '
  '9':
  - type: text
    content: 'Ary i Satana dia namaly NY TOMPO hoe: Moa tsy fanantenan-javatra ihany va no atahoran’i Joba an’Andriamanitra? '
