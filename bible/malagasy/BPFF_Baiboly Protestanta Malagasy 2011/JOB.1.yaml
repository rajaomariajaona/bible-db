document_id: JOB.1
type_code: plt
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: FITARIHANTENY
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Nisy lehilahy iray tany amin’ny tany Oza, Joba no anarany. Marina sy mahitsy izany lehilahy izany sady natahotra an’Andriamanitra ka nifady ny ratsy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Niteraka fito lahy sy telo vavy izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ny fananany dia ondry aman’osy fito arivo, rameva telo arivo, omby arivo, borikivavy dimanjato ary mpanompo marobe. Nanankarena be mihoatra noho ny zanaky ny Atsinanana rehetra izany lehilahy izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Fanaon’ny zanany lahy ny nifanasa ka nitety ny tranony avy, ary nandefa iraka naka ny anabaviny telo mirahavavy izy hiara-mihinana sy misotro aminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary isaky ny tapitra nitsingerina ireo andro fanasana ireo dia nandefa iraka haka azy i Joba ka nanamasina ireny. Nifoha vao maraina izy ka nanolotra fanatitra dorana manontolo araka ny isan’izy rehetra; fa hoy i Joba: Fandrao nanota ny zanako ka nandà an’Andriamanitra tao am-pony. Izany no nataon’i Joba mandrakariva.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fizahan-toetra voalohany nanjo an’i Joba
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Indray andro, nony avy ireo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: zanak’Andriamanitra
  - type: text
    text: ' mba hiseho teo anatrehan’NY TOMPO, dia mba tonga teo koa i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Satana
  - type: text
    text: ' tafaharo taminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dia hoy NY TOMPO tamin’i Satana: Avy taiza ianao? Dia namaly NY TOMPO i Satana hoe: Avy nivezivezy teny ambonin’ny tany aho, nandehandeha teny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Hoy NY TOMPO tamin’i Satana: Efa nandinika an’i Joba mpanompoko va ianao? Fa tsy misy tahaka azy eny ambonin’ny tany, fa olona marina sy mahitsy izy sady matahotra an’Andriamanitra ka mifady ny ratsy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary i Satana dia namaly NY TOMPO hoe: Moa tsy fanantenan-javatra ihany va no atahoran’i Joba an’Andriamanitra? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Tsy Ianao va no nanao fefy manodidina azy sy manodidina ny tranony ary manodidina izay ananany rehetra? Notahinao ny asan’ny tanany ka manenika ny tany ny omby aman’ondriny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Fa atsory ange ny tananao ka tendreo izay ananany rehetra raha tsy handa Anao eo imasonao aza izy e! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Dia hoy NY TOMPO tamin’i Satana: Indro, eo an-tananao izay ananany rehetra; fa ny tenany ihany no aza kasihin’ny tananao. Dia niala teo anatrehan’NY TOMPO i Satana.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Indray andro, raha nihinana sy nisotro divay tao an-tranon’ny zokiny lahimatoa ny zanany lahy sy ny zanany vavy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'dia nisy iraka tonga tany amin’i Joba ka nilaza hoe: Teo am-piasana ny omby ary nandrasana teo anilany ny borikivavy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'nisy Sabeana namely azy tampoka ka namabo azy ary ny mpanompo dia nasiany tamin’ny lelan-tsabatra. Izaho dia izaho irery ihany no afa-nandositra hilaza aminao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Raha mbola niteny izy dia nisy iray koa tonga ka nilaza hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nilatsaka avy tany an-danitra ny afon’Andriamanitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary nandoro ny ondry aman’osy sy ny mpanompo ka nandevona azy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izaho dia izaho irery ihany no afa-nandositra hilaza aminao.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Raha mbola niteny izy dia nisy iray koa tonga ka nilaza hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nisy Kaldeana nanao telo toko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: niroatra nankeny amin’ny rameva izy ireo ka namabo azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny mpanompo dia nasiany tamin’ny lelan-tsabatra.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izaho dia izaho irery ihany no afa-nandositra hilaza aminao.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Raha mbola niteny izy dia nisy iray koa tonga ka nilaza hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny zanakao lahy sy ny zanakao vavy dia nihinana sy nisotro divay tao an-tranon’ny zokiny lahimatoa;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ary indro, nisy rivotra mahery avy tany an-tany efitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka namely ny zoron-trano efatra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia nianjera tamin’ny zatovo ny trano
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka maty izy rehetra.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izaho dia izaho irery ihany no afa-nandositra hilaza aminao.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Dia nitsangana i Joba ka nandriatra ny akanjobeny ary nanaratra ny lohany dia niankarapoka tamin’ny tany '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'sady niteny hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nitanjaka no nivoahako avy tany an-kibon’Ineny
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mitanjaka no hiverenako any;
- type: usfm
  marker: q1
  children:
  - type: text
    text: NY TOMPO no nanome
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary NY TOMPO no nanaisotra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: isaorana anie ny anaran’NY TOMPO!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Tamin’izany rehetra izany dia tsy nanota i Joba na nanome tsiny an’Andriamanitra.
