document_id: DEU.22,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Fanajana ny fananan’ny hafa
  - type: text
    content: 'Raha hitanao mania ny omby na ny ondrin’ny rahalahinao dia aza jerem-potsiny izany, fa tsy maintsy averinao any amin’ny rahalahinao mihitsy izy ireo. '
  '10':
  - type: text
    content: 'Aza ampiarahina miasa tany ny omby sy ny boriky. '
  '11':
  - type: text
    content: Aza mitafy lamba volon’ondry sy rongony mifamahofaho.
  '12':
  - type: text
    content: Asio vona ny zorony efatra amin’ny lambanao izay tafinao.
  - type: heading
    content: Didy ny amin’ny fanamasinana ny fanambadiana
  '13':
  - type: text
    content: 'Raha misy lehilahy mampaka-bady ary mandry aminy ka tsy tiany indray Ravehivavy, '
  '14':
  - type: text
    content: 'fa sady haratsiny sy alàny baraka no ataony hoe: Efa nampakatra ity vehivavy ity aho, nefa raha nandry taminy dia tsy hitako ny famantarana azy ho virijiny, '
  '15':
  - type: text
    content: 'dia halain’ny ray aman-drenin-dRazazavavy ny famantarana azy ho virijiny ka hoentiny ho eo amin’ny loholona ao amin’ny tanàna eo am-bavahady. '
  '16':
  - type: text
    content: 'Ary hiteny amin’ny loholona ny rain-dRazazavavy hoe: Ny zanako vavy dia nomeko ho vadin’io lehilahy io, kanefa tsy tiany indray; '
  '17':
  - type: text
    content: 'ary indro efa noharatsìny ka nataony hoe: Tsy hitako ny famantarana ny zanakao vavy ho virijiny; kanefa indreto ny famantarana ny zanako vavy ho virijiny. Dia hamelatra ny lamba eo anatrehan’ny loholona amin’ny tanàna izy mivady. '
  '18':
  - type: text
    content: 'Ary halain’ny loholona ao amin’ny tanàna izany lehilahy izany ka hofaiziny. '
  '19':
  - type: text
    content: 'Dia hosaziny sekela volafotsy zato koa izy, homena ny rain-dRazazavavy, satria nahafa-baraka ny virijiny iray tamin’ny Israely Ralehilahy; nefa ho vadiny ihany Razazavavy ka tsy azony isaorana amin’ny andro rehetra iainany. '
  '2':
  - type: text
    content: 'Raha tsy akaiky anao na tsy fantatrao ny rahalahinao dia ento mody any aminao ilay nania, ary aoka hitoetra ao aminao mandra-pitadin’ny rahalahinao azy ka hamerenanao azy. '
  '20':
  - type: text
    content: 'Fa raha marina kosa izay nolazainy ka tsy hita ny famantarana an-dRazazavavy ho virijiny '
  '21':
  - type: text
    content: dia havoakany ho eo anoloan’ny varavaran’ny tranon’ny rainy Razazavavy ka hotorahan’ny mponina ao amin’ny tanànany vato ho faty, satria nanao izay fady indrindra teo amin’ny Israely izy ka nijangajanga tao an-tranon’ny rainy; dia hofongoranao tsy ho eo aminao ny fanao ratsy amin’izay.
  '22':
  - type: text
    content: Raha misy lehilahy fantatra fa mandry amin’ny vehivavy vadin’olona dia samy hovonoina izy roa, na Ralehilahy izay nandry tamin-dRavehivavy, na Ravehivavy; satria hofongoranao tsy ho eo amin’ny Israely ny fanao ratsy.
  '23':
  - type: text
    content: 'Raha misy zazavavy virijiny voafofo ho vadin’olona, ary misy lehilahy mahita azy eo an-tanàna ka mandry aminy, '
  '24':
  - type: text
    content: 'dia havoakanareo ho eo amin’ny vavahadin’izany tanàna izany izy roa ka hotorahanareo vato ho faty: Razazavavy moa, satria tsy niantso vonjy nefa tao an-tanàna ihany; ary Ralehilahy kosa, satria nandry tamin’ny vadin’ny namany; dia hofongoranao tsy ho eo aminao ny fanao ratsy. '
  '25':
  - type: text
    content: 'Raha any an-tsaha kosa no ahitan-dRalehilahy an-dRazazavavy voafofo ho vadin’olona, ary misavika azy Ralehilahy ka mandry aminy, dia Ralehilahy izay nandry taminy ihany no hovonoina. '
  '26':
  - type: text
    content: 'Fa Ravehivavy dia tsy hasianao na inona na inona satria tsy misy ota tokony hahafaty azy; tahaka ny olona mitsangana hamely ny namany ka mahafaty azy izany '
  '27':
  - type: text
    content: satria tany an-tsaha no nahitany azy, ary niantso vonjy ihany Razazavavy voafofo ho vadin’olona, nefa tsy nisy namonjy azy.
  '28':
  - type: text
    content: 'Raha misy lehilahy mahita zazavavy virijiny izay tsy voafofo ho vadin’olona ka misavika azy sady mandry aminy, koa tratra izy roa, '
  '29':
  - type: text
    content: dia hanome sekela volafotsy dimampolo ho an’ny rain-dRazazavavy Ralehilahy izay nandry taminy; ary hovadiny izy satria efa nosavihiny sady nandriany ka tsy azony isaorana izy amin’ny andro rehetra hiainany.
  '3':
  - type: text
    content: 'Toy izany koa no hataonao amin’ny borikiny, na ny fitafiany, na ny zavatry ny rahalahinao, na inona na inona izay very ka hitanao; fa aza jerem-potsiny. '
  '4':
  - type: text
    content: Raha hitanao potraka any an-dalana ny borikin’ny rahalahinao, na ny ombiny, dia aza jerem-potsiny; fa ampio ny rahalahinao hanarina azy.
  - type: heading
    content: Fitsipika samihafa
  '5':
  - type: text
    content: Aoka tsy hanao fitafian-dehilahy ny vehivavy ary aoka tsy hanao fitafiam-behivavy ny lehilahy fa fahavetavetana eo imason’NY TOMPO Andriamanitrao ny olona rehetra izay manao izany.
  '6':
  - type: text
    content: 'Raha sendra mahita akanim-borona eo anoloanao eny an-dalana ianao, na amin’ny efa foy na mbola atodiny, ary ny reniny dia manomba ny efa foy, na mikotrika ny atodiny, dia aza maka ny reniny miaraka amin’ny zanany. '
  '7':
  - type: text
    content: Tsy maintsy alefanao ny reniny, fa ny zanany ihany no alao ho anao mba hahita soa ianao ka ho maro andro.
  '8':
  - type: text
    content: Raha manorina trano vaovao ianao dia asio arofanina ny tampony, fandrao hisy olona hianjera avy eny ka hahatonga heloka ny amin’ny ra ho ao an-tranonao ianao.
  '9':
  - type: text
    content: 'Aza fafazana voan-javatra roa karazana mifangaroharo ny taninao, fandrao miara-tonga zava-masina ny vokatry ny voan-javatra nafafinao sy ny vokatry ny tanim-boalobokao. '
