document_id: ISA.INTRO1,3103
type_code: plt
verses:
  '1':
  - type: text
    content: INDRAY MIJERY
  - type: text
    content: 'Ny Boky Isaia no voalohany amin’ireo ataon’ny Jiosy hoe Ireo Mpaminany atỳ aoriana, dia ireo Mpaminany mpitoriteny izany. Ny anarana hoe Isaia dia midika hoe NY TOMPO no mpamonjy. Mifanaraka amin’ny fotokevitry ny Boky indrindra izany: NY TOMPO no mpamonjy, fa ny Israely kosa tsy maintsy miankina tanteraka Aminy fa tsy mahazo mitady vonjy amin’ny hafa. Ny boky Isaia dia misy fizarana telo lehibe izay mifanaraka amin’ny vanim-potoana telo samihafa amin’ny tantaran’ny Israely, fa ny Boky manontolo no mitondra ny anaran’Isaia mpaminany.'
  - type: text
    content: Ny fizarana voalohany dia ny 1–39, izay momba ny fotoana 740–700 tal JK eo ho eo.
  - type: text
    content: Ny fizarana faharoa dia ny 40–55, izay teny ho an’ny Fiangonana any amin’ny fahababoana.
  - type: text
    content: Ny fizarana fahatelo dia ny 56–66, izay teny amin’ny Fiangonana efa tafaverina avy any amin’ny fahababoana.
  - type: text
    content: Na dia samy tenim-paminaniana aza no ao amin’ireo fizarana telo ireo dia tsy mitovy tanteraka ny hafatra ho an’ny Fiangonana, fa mifanandrify amin’ny toe-pon’ny Fiangonana Israely teo anatrehan’Andriamanitra tamin’ireo vanim-potoana telo ireo.
  - type: text
    content: Ny votoatin’ny Boky araka ireo fizarana telo
  - type: text
    content: 'Fizarana voalohany: 1–39'
  - type: text
    content: 'Ao anatin’ny fotoana mikorontana tokoa eo amin’ny firenena izany: Miady ireo firenen-dehibe matanjaka, dia i Ejipta izay efa mihena ny heriny, ary indrindra i Asiria, izay manao politika mikendry handroba ny tany rehetra, ary ao anatin’izany ny tanin’ny Israely. Amin’izany fotoana mampihorohoro izany Isaia mpaminany no mitondra hafatra avy amin’Andriamanitra, ary manan-kolazaina amin’ny fiainan’ny Israely manontolo, na amin’ny politika, na amin’ny fiarahamonina, na amin’ny fivavahana. Ambarany fa ny firenena Asiriana dia fiasana eo am-pelatanan’Andriamanitra ikapohany ny olony noho ny ditrany, kanefa koa dia hovaliny ny Asiriana noho ny fireharehany sy ny fanamparany ny heriny amin’ny olon’Andriamanitra. Notenenin’Isaia koa anefa ny mpanjaka sy ireo mpitondra noho ny politikany, izay tsy mitady izay hevitra avy amin’Andriamanitra fa mitady vonjy any amin’ny firenena jentilisa. Teneniny mafy koa ny tsy fahamarinana eo amin’ny fiarahamonina, ny fitsarana tsy marina, ny fanitsakitsahana ny mahantra, ny fanaranam-po amin’ny toaka sy ny fijejojejoana, ny fanompoan-tsampy, ny fombam-pivavahana atao amin’ny fahazaram-poana, ary tsy miala amin’ny fahotany ny olona.'
  - type: text
    content: Izany rehetra izany dia ambaran’ny mpaminany fa vokatry ny fialana amin’Andriamanitra ka hitarika ny loza, fa izay hahazoana mijoro dia ny finoana, ny fiankinana tanteraka amin’NY TOMPO. Rehefa mandrahona ny loza dia mijoro ny mpaminany mampahery ny olona mba hihazona ny finoana fa tsy hangorohoro.
  - type: text
    content: Nambaran’Isaia fa ho avy ny loza noho ny fanamafisampo, kanefa ambarany koa ny hiavian’ny fanjakan’ny Mesia, izay fanjakam-piadanana.
  - type: text
    content: 'Fizarana faharoa: 40–55'
  - type: text
    content: Ny Israely izao dia any amin’ny fahababoana any Babilona, nanomboka tamin’ny taona 587. Izao dia tsy ny Asiriana intsony no firenen-dehibe matanjaka fa ny Babiloniana. Ny Fiangonana Israely any Babilona dia tsy mafy fo intsony fa nila hamoy fo indray aza, satria noheveriny fa narian’NY TOMPO tanteraka izy, ary indrindra koa, nanomboka nisalasala izy, sao dia tsy NY TOMPO no Andriamanitra marina fa ny andriamanitry ny Babiloniana, matoa resin’ny Babiloniana izy.
  - type: text
    content: Amin’izany Fiangonana kivy sy mila hamoy fo izany no itenenan’ny Mpaminany ka itondrany teny fampiononana avy amin’Andriamanitra, dia ny fanambarana fa hampodiny any Palestina ny olony. Ary ny fiasana irahin’Andriamanitra hanatanteraka izany dia i Kirosy persiana, mpanjaka jentilisa. Izany fampodin’Andriamanitra ny olony izany dia ho fahagagana lehibe mitovy amin’ny nanafahana ny Israely fahiny tany Ejipta. Ambaran’ny Mpaminany fa NY TOMPO no Andriamanitra marina fa tsy ny sampin’ny Babiloniana izay tsinontsinona. Ny maha Andriamanitra marina Azy dia Izy nahary izao rehetra izao, Izy manambara ny zavatra ho avy ka tanteraka izany, ary naniraka an’i Kirosy sy mitantana ny zavatra rehetra.
  - type: text
    content: Ato amin’ity fizarana faharoa ity no misy ireo rijan-teny efatra izay manambara ny amin’Ilay Mpanompon’NY TOMPO, izay ambara ao amin’ny Testamenta Vaovao fa tanteraka ao amin’i Jesosy Kristy.
  - type: text
    content: 'Ny Fizarana fahatelo: 56–66'
  - type: text
    content: 'Efa tafaverina any Joda ny Babo. Ny mpanjaka Kirosy, Persiana, no nandresy ny Babiloniana ka nandray ny fanjakana tao Babilona. Tamin’ny taona 538 izy no namoaka didy nanome lalana ny Jiosy hody an-tanindrazana ka hanangana ny tempoly indray. Rehefa tonga tany Joda anefa ireo Babo afaka dia namantana fiainana sarotra: Tanàna rava, tany nalain’ireo olona izay tsy mba tany amin’ny fahababoana, ny fampiharoharoam-pivavahana izay mbola niainan’ireny olona ireny koa. Izany rehetra izany dia nila hitondra fakam-panahy hiverina amin’ny fitiavan-tena, ny tsy fahamarinana ary ny fanompoan-tsampy indray. Eo anatrehan’izany ny Mpaminany no manolotra fananarana.'
  - type: text
    content: Ambaran’ny Mpaminany koa anefa fa izy no nirahin’NY TOMPO ka nametrahany ny Fanahiny mba hitory teny soa mahafaly ho an’ny malahelo sy hanasitrana ny torotoro fo. Izany teny izany no nambaran’i Jesosy fa tanteraka Aminy ka nanombohany ny asany (Lio 4.16-21).
