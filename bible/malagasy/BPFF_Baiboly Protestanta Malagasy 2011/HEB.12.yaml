document_id: HEB.12,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Mijery an’i Jesosy
  - type: text
    content: 'Koa amin’izany, satria misy vavolombelona maro be toy izany manodidina antsika toy ny rahona, dia aoka isika koa hanaisotra izay rehetra mitambesatra amintsika mbamin’ny ota izay malaky mahazo antsika; ary aoka isika hihazakazaka amin’ny faharetana, amin’izao fihazakazahana napetraka eo anoloantsika izao, '
  '10':
  - type: text
    content: 'Fa ireny dia nanao izay hanitsiana antsika tamin’ny andro vitsy araka izay sitrapony, fa Izy kosa dia ny hahasoa mba handraisantsika ny fahamasinany. '
  '11':
  - type: text
    content: Fa ny fanitsiana rehetra dia tsy mba atao ho mahafaly amin’ny andro anaovana fa mampahory; nefa rehefa afaka izany, dia izay vao mitondra ny vokatry ny fahamarinana sy ny fiadanana ho an’izay nanaovana azy izy.
  '12':
  - type: text
    content: 'Koa hatanjaho ny tanana miraviravy sy ny lohalika malemy; '
  '13':
  - type: text
    content: ary manaova lala-mahitsy halehan’ny tongotrareo mba tsy hampipitsoka ny tongotry ny mandringa fa mba hahasitrana azy kosa.
  - type: heading
    content: Lahimatoa voasoratra any an-danitra
  '14':
  - type: text
    content: 'Miezaha mitady fihavanana amin’ny olona rehetra ary koa fahamasinana; fa izay tsy manam-pahamasinana dia tsy hahita ny Tompo. '
  '15':
  - type: text
    content: 'Mitandrema tsara, fandrao hisy hiala amin’ny fahasoavan’Andriamanitra; fandrao hisy faka mangidy mitsimoka hampikorontana ka ho voaloto ny maro; '
  '16':
  - type: text
    content: 'fandrao hisy mpijangajanga na olona tsy manaja ny masina, dia tahaka an’i Esao, izay nivarotra ny fizokiany hahazoany hanina indraimbava. '
  '17':
  - type: text
    content: Fa fantatrareo fa rehefa afaka izany, raha ta handova ny fitahiana izy, dia nolavina; fa tsy nahita izay hibebahana izy na dia nitady izany fatratra tamin-dranomaso aza.
  '18':
  - type: text
    content: 'Fa tsy zavatra azo tsapain-tanana no nohatoninareo, na afo mirehitra, na haizim-pito, na tafio-drivotra, '
  '19':
  - type: text
    content: 'na fanenon’ny trompetra na feon’ny teny, koa izay nandre izany dia nangataka mba tsy hasian-teny intsony izy; '
  '2':
  - type: text
    content: mijery an’i Jesosy, Tompon’ny finoantsika sy mpanefa azy, izay niaritra ny hazofijaliana fa tsy nitandro henatra mba hahazoany ny fifaliana napetraka teo anoloany ka efa mipetraka eo ankavanan’ny sezafiandrianan’Andriamanitra Izy.
  '20':
  - type: text
    content: 'fa tsy tohany ilay nandidiana hoe: «Ary raha misy biby aza mikasika ny tendrombohitra dia hotoraham-bato izany» (Eks 19.12-13), '
  '21':
  - type: text
    content: 'ary satria mampahatahotra ny fahitana, dia hoy i Mosesy: «Matahotra loatra sy mangovitra indrindra aho» (Deo 9.19). '
  '22':
  - type: text
    content: 'Fa ianareo kosa dia efa tonga eo an-tendrombohitra '
  - type: text
    content: Ziona
  - type: text
    content: ', tanànan’Andriamanitra velona, dia Jerosalema any an-danitra, ary ho ao amin’ny anjely tsy omby alinalina, '
  '23':
  - type: text
    content: 'amin’ny fihaonam-pifaliana sy ny fiangonan’ny lahimatoa voasoratra any an-danitra, sy amin’Andriamanitra, Mpitsara ny olona rehetra, ary amin’ny fanahin’ny olona marina izay efa natao tanteraka, '
  '24':
  - type: text
    content: sy amin’i Jesosy, Mpanalalana amin’ny fanekena vaovao, ary amin’ny ra famafazana, izay miteny tsara lavitra noho ny an’i Abela.
  '25':
  - type: text
    content: 'Tandremo mba tsy holavinareo izay miteny. Fa raha izy ireo dia tsy afa-nandositra tamin’ny nandavany ilay nilaza ny tenin’Andriamanitra taminy tetỳ ambonin’ny tany, mainka fa isika, raha miodina miala amin’ilay avy any an-danitra, '
  '26':
  - type: text
    content: 'izay nampihorohoro ny tany fahiny tamin’ny feony; fa ankehitriny dia efa nanao teny fikasana Izy hoe:'
  - type: text
    content: «Indray maka indray dia tsy ny tany ihany no hampihorohoroiko, fa ny lanitra koa» (Hag 2.6).
  '27':
  - type: text
    content: 'Ary ny hoe indray maka indray dia manambara ny hanovana izay zavatra ampihorohoroina, toy ny zavatra natao, mba haharetan’izay zavatra tsy ampihorohoroina. '
  '28':
  - type: text
    content: 'Koa satria mandray fanjakana tsy azo ampihorohoroina isika dia aoka isika hanana fahasoavana hoentintsika manao izay fanompoana sitrak’Andriamanitra amin’ny fanajana sy ny fahatahorana; '
  '29':
  - type: text
    content: fa Andriamanitsika dia afo mandevona (Deo 4.24).
  '3':
  - type: text
    content: Fa hevero tsara ilay niaritra ny fanoherana nataon’ny mpanota Taminy, fandrao ho ketraka ianareo ka ho reraka ny fanahinareo.
  '4':
  - type: text
    content: 'Ianareo dia mbola tsy nanohitra niady tamin’ny ota hatramin’ny fahalatsahan-dra. '
  '5':
  - type: text
    content: 'Ary hadinonareo ny fananarana izay milaza aminareo toy ny amin’ny zanaka hoe:'
  - type: text
    content: «Anaka, aza atao ho zavatra kely ny fanitsiana ataon’NY TOMPO,
  - type: text
    content: ary aza reraka raha anariny;
  '6':
  - type: text
    content: fa izay tian’NY TOMPO no ahitsiny
  - type: text
    content: ary izay zanaka rehetra raisiny no kapohiny» (Oha 3.11-12).
  '7':
  - type: text
    content: 'Fanitsiana no anton’ny iaretanareo; Andriamanitra mitondra anareo toy ny zanaka; fa iza moa no zanaka tsy ahitsin’ny rainy? '
  '8':
  - type: text
    content: 'Fa raha tsy ahitsy tahaka ny itondrana azy rehetra ianareo dia zazasary fa tsy zanaka. '
  '9':
  - type: text
    content: 'Ary isika koa dia nanana ny raintsika ara-nofo ho mpanitsy antsika, ary nanaja azy isika; tsy mainka va ny hanekentsika ny Rain’ny fanahy ka ho velona isika? '
