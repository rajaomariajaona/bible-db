document_id: 1KI.2,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny hafatra farany nataon’i Davida
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Rehefa antomotra ny andro ahafatesan’i Davida dia nanome didy an’i Solomona zanany lahy izy hoe: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Dia nodimandry any amin’ny razany i Davida ka nalevina ao an-Tanànan’i Davida. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Efapolo taona ny fotoana nanjakan’i Davida teo amin’ny Israely; tao Hebrona no nanjakany fito taona ary tao Jerosalema no nanjakany telo amby telopolo taona.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Nipetraka teo amin’ny sezafiandrianan’i Davida rainy i Solomona ary niorina tsara ny fanjakany.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Nampamono an’i Adonia i Solomona
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ary nankany amin’i Batseba, renin’i Solomona i Adonia, zanakalahin’i Hagita. Hoy Ravehivavy: Moa fihavanana va no ahatongavanao? Dia hoy i Adonia: Eny, fihavanana! '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Hoy koa izy: Misy teny kely holazaiko aminao. Dia hoy Ravehivavy: Lazao ary! '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Dia hoy izy: Ianao dia mahalala fa voatendry ho ahy ny fanjakana, ary ny Israely rehetra dia efa niandrandra ahy hanjaka, kanjo tafahodina ny fanjakana ka lasan’ny rahalahiko, fa azony avy tamin’NY TOMPO izany. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Koa ankehitriny, zavatra iray loha no mba angatahiko aminao ka aza dia lavinao aho. Hoy Ravehivavy taminy: Lazao ary! '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Dia hoy izy: Miangavy anao aho, mitenena amin’i Solomona mpanjaka, fa tsy handa anao izy, mba homeny ho vadiko i Abisaga sonemita. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Ary hoy i Batseba: Eny ary, hilaza ny momba anao amin’ny mpanjaka aho.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Dia nankany amin’i Solomona mpanjaka i Batseba hilaza ny amin’i Adonia. Ary nitsangana hitsena an’i Batseba ny mpanjaka sady niankohoka teo anatrehany dia nipetraka teo amin’ny sezafiandrianany, ary nasainy nisy nitondra sezafiandrianana ihany koa ho an’ny renin’ny mpanjaka ka nipetraka teo ankavanany izy. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Izaho dia efa handeha amin’ny lalana falehan’ny tany rehetra. Koa mahereza ianao ary misehoa ho lehilahy! '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Ary hoy ny reniny: Misy zavatra kely iray loha mba angatahiko aminao ka aza dia lavinao aho. Hoy ny mpanjaka: Angataho ary, ry Ineny, fa tsy handa anao aho! '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Dia hoy izy: Aoka i Abisaga sonemita homena ho vadin’i Adonia rahalahinao. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Fa namaly ny reniny i Solomona mpanjaka hoe: Nahoana ianao no mangataka an’i Abisaga sonemita ho an’i Adonia? Angataho ho azy koa ary ny fanjakana fa izy no zokiko, dia ho azy sy i Abiatara mpisorona ary ho an’i Joaba, zanak’i Zeroia.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Ary nianiana tamin’NY TOMPO i Solomona mpanjaka hoe: Hataon’Andriamanitra amiko anie izany, eny, mihoatra noho izany aza, raha tsy hovonoina i Adonia noho ny nanaovany izay teny izay! '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Koa ankehitriny, raha velona koa NY TOMPO, izay nampitoetra sy nametraka ahy teo amin’ny sezafiandrianan’i Davida raiko sady nanome ahy fara handimby araka izay nolazainy, dia hovonoina anio ihany i Adonia. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Ary i Solomona mpanjaka dia naniraka an’i Benaia, zanak’i Joiada, hamono an’i Adonia ho faty.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Noroahin’i Solomona niala tao Jerosalema i Abiatara
    marker-yv: yv-h
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Nilazan’ny mpanjaka koa i Abiatara mpisorona hoe: Mandehana ianao mankany Anatota ho any amin’ny taninao, fa olona tokony ho faty ianao; nefa tsy hampamono anao amin’izao andro izao aho, satria nitondra ny vata misy ny Vavolombelon’NY TOMPO Andriamanitra teo alohan’i Davida raiko ianao, sady niara-nitondra fahoriana tamin’ny raiko tamin’izay rehetra nampahoriana azy. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Ary naongan’i Solomona tsy ho mpisoron’NY TOMPO i Abiatara, mba hahatanteraka ny tenin’NY TOMPO, dia ilay nolazainy tao Silo ny amin’ny taranak’i Ely.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Nampamono an’i Joaba i Solomona
    marker-yv: yv-h
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Ary ren’i Joaba izany. I Joaba anefa dia niandany tamin’i Adonia na dia tsy niandany tamin’i Absaloma aza. Dia nandositra nankao amin’ny tranolain’NY TOMPO izy ka nihazona ny tandroky ny alitara. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Ary nisy nanambara tamin’i Solomona mpanjaka fa lasa nandositra ho ao amin’ny tranolain’NY TOMPO i Joaba, koa indro, eo anilan’ny alitara izy. Dia nirahin’i Solomona i Benaia, zanak’i Joiada, ka nilazany hoe: Mandehana, vonoy izy. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Tandremo izay asain’NY TOMPO Andriamanitrao hotandremana ka handehananao amin’ny lalany, hitandremanao ny lalànany, ny didiny, ny fitsipiny ary ny teny vavolombelony, araka ny voasoratra ao amin’ny lalànan’i Mosesy, mba hataonao lavorary avokoa izay rehetra hataonao sy izay rehetra halehanao, '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Ary tonga tao amin’ny tranolain’NY TOMPO i Benaia ka niteny tamin’i Joaba hoe: Izao no lazain’ny mpanjaka: Mivoaha tao ianao! Fa hoy izy: Tsia, fa eto ihany aho no ho faty. Dia nitondra teny tany amin’ny mpanjaka indray i Benaia hoe: Izany no lazain’i Joaba, ary izany no navaliny ahy. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Hoy ny mpanjaka taminy: Ataovy araka izay nolazainy ka vonoy izy dia aleveno, mba hanesoranao amiko sy amin’ny taranaky ny raiko ny ra izay nalatsak’i Joaba tsy amin’antony. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Dia hatsingerin’NY TOMPO ho amin’ny lohany ihany ny rany, satria izy dia namely olona roa lahy izay marina sady tsara noho izy ka namono azy tamin’ny sabatra, dia i Abnera, zanak’i Nera, komandin’ny miaramilan’ny Israely, sy i Amasa, zanak’i Jetera, komandin’ny miaramilan’ny Joda, nefa tsy nahafantatra izany akory i Davida raiko. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Eny, hitsingerina amin’ny lohan’i Joaba sy amin’ny lohan’ny taranany mandrakizay ny ran’izy roa lahy ireo. Fa amin’i Davida sy ny taranany sy ny mpianakaviny ary amin’ny sezafiandrianany kosa dia hisy fiadanana mandrakizay avy amin’NY TOMPO. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Dia niakatra i Benaia, zanak’i Joiada, ka namely azy ho faty; ary nalevina tao amin’ny fonenany tany an-tany efitra izy. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: Ary i Benaia, zanak’i Joiada, no notendren’ny mpanjaka ho solony ho komandin’ny miaramila; i Zadoka mpisorona kosa no notendren’ny mpanjaka ho solon’i Abiatara.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Nampamono an’i Simey i Solomona
    marker-yv: yv-h
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Ary nandefa iraka hiantso an’i Simey ny mpanjaka ka niteny taminy hoe: Manaova trano eto Jerosalema ianao ka mitoera ao ary aza miala ao akory ianao na ho aiza na ho aiza. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Fa amin’izay andro andehananao mita ny lohasahan-driaka Kidrona dia aoka ho fantatrao marina fa hovonoina ho faty ianao; ny ranao dia ho amin’ny lohanao ihany. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Ary hoy i Simey tamin’ny mpanjaka: Tsara izany teny izany! Araka izay nolazain’ny mpanjaka tompoko teo no hataon’ny mpanomponao. Dia nitoetra ela tany Jerosalema i Simey.'
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Nony afaka telo taona mipaka dia nisy mpanompon’i Simey roa lahy nandositra ho any amin’i Akisy, zanak’i Maka mpanjakan’i Gata. Ary nisy nanambara tamin’i Simey hoe: Indreo, any Gata ny mpanomponao. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'mba hanatanterahan’NY TOMPO ny teny izay nolazainy momba ahy hoe: Raha mitandrina ny alehany ka mandeha eo anatrehako amin’ny fahamarinana amin’ny fony manontolo sy amin’ny fanahiny manontolo ny taranakao dia tsy ho diso zanakalahy eo amin’ny sezafiandrianan’ny Israely ianao. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: Koa nanisy lasely ny borikiny i Simey ka nankany Gata ho any amin’i Akisy hitady ny mpanompony; dia niverina nitondra ny mpanompony avy tany Gata i Simey.
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'Ary nisy nanambara tamin’i Solomona ny nialan’i Simey tao Jerosalema hankany Gata sy ny niverenany indray. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'Dia nandefa iraka hiantso an’i Simey ny mpanjaka ka niteny taminy hoe: Tsy efa nampianiana anao tamin’NY TOMPO va aho ka nilaza taminao marimarina hoe: Aoka ho fantatrao marina fa amin’izay andro ivoahanao sy andehananao na ho aiza io na ho aiza dia hovonoina ho faty ianao? Ary hoy ianao tamiko: Tsara izany teny reko izany! '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'Koa nahoana ianao no tsy nitandrina ny fianianana tamin’NY TOMPO sy ny didy izay nomeko anao? '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: 'Hoy koa ny mpanjaka tamin’i Simey: Ianao dia mahafantatra ny ratsy rehetra nataonao tamin’i Davida raiko, eny, tsaroan’ny fonao izany; koa hatsingerin’NY TOMPO amin’ny lohanao ny haratsianao. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: 'Fa hotahina kosa i Solomona mpanjaka, ary ny sezafiandrianan’i Davida dia hampitoerina eo anatrehan’NY TOMPO mandrakizay. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: Dia nandidy an’i Benaia, zanak’i Joiada, ny mpanjaka, dia lasa izy namely an’i Simey ho faty. Ary ny fanjakana dia tafaorina teo an-tanan’i Solomona.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ary ianao koa dia mahalala izay nataon’i Joaba, zanak’i Zeroia, tamiko, dia ilay nataony tamin’izy roa lahy lehiben’ny miaramilan’ny Israely, dia tamin’i Abnera, zanak’i Nera, sy tamin’i Amasa, zanak’i Jetera, izay novonoiny sady nalatsany ra toy ny amin’ny ady, nefa tsy nisy ady akory, ka nasiany ra toy ny amin’ny ady ny fehikibo nanaovany sy ny kapa teny an-tongony. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Koa miasà araka ny fahendrenao ary aza avela hidina any amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: fitoeran’ny maty
    - type: text
      text: ' amin’ny fiadanana ny volofotsiny. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Fa ny zanak’i Barizilay gileadita kosa dia asio soa, ary avelao izy mba ho isan’izay mihinana eo amin’ny latabatrao; fa hanao soa toy izany no nankanesan’ireo tany amiko fony nandositra an’i Absaloma rahalahinao aho. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Ary indro, ao aminao koa i Simey, zanak’i Gera, Benjaminita avy any Bahorima. Loza loatra ny nanozonany ahy tamin’ny andro nankanesako tany Mahanaima, nefa mba nidina hitsena ahy tao Jordana ihany izy, ary tamin’NY TOMPO no nianianako ka nanomezako toky azy hoe: Tsy hovonoiko amin’ny sabatra ianao. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Koa aza ataonao afa-tsiny izy; fa lehilahy hendry ianao ka fantatrao izay tokony hanaovanao azy. Amin’ny ra alatsaka no hampidinanao ny volofotsiny ho any amin’ny fitoeran’ny maty.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Maty i Davida ary mandimby azy i Solomona
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 1Tan 29.26-30
    marker-yv: yv-h
