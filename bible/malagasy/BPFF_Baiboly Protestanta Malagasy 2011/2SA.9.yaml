document_id: 2SA.9
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mandray an’i Mefiboseta ho ao aminy i Davida
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary hoy i Davida: Mbola misy sisa ihany va ny taranak’i Saoly mba hanisiako soa azy noho ny amin’i Jonatana? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary nisy mpanompon’ny fianakavian’i Saoly, i Ziba no anarany. Nantsoina hankany amin’i Davida izy ka hoy ny mpanjaka taminy: Ianao moa no Ziba? Ary hoy izy: Izaho mpanomponao no izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Hoy ny mpanjaka: Mbola misy sisa ihany va ny taranak’i Saoly mba hasiako soa araka ny fanaon’Andriamanitra? Dia hoy i Ziba tamin’ny mpanjaka: Mbola misy zanakalahin’i Jonatana iray ihany ao, nefa malemy tongotra izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Hoy ny mpanjaka taminy: Aiza anefa izy? Dia hoy i Ziba tamin’ny mpanjaka: Indro ao an-tranon’i Makira, zanak’i Amiela, ao Lo-Debara izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia nandefa iraka haka azy tao an-tranon’i Makira, zanak’i Amiela, tao Lo-Debara, i Davida mpanjaka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Nony tonga teo amin’i Davida i Mefiboseta, zanak’i Jonatana, zanak’i Saoly dia niankohoka sy nitsaoka azy izy. Ary hoy i Davida: Ry Mefiboseta! Dia hoy izy: Inty ny mpanomponao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary hoy i Davida taminy: Aza matahotra, fa hasiako soa tokoa ianao noho ny amin’i Jonatana rainao ka hampodiko ho anao ny tany rehetra izay an’i Saoly rainao, ary ianao dia hihinana eo amin’ny latabatro mandrakariva. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dia niankohoka izy ka niteny hoe: Zinona moa aho mpanomponao izay toy ny alika maty, no mba jerenao?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Dia niantso an’i Ziba, mpanompon’i Saoly, ny mpanjaka ka niteny taminy hoe: Izay rehetra nananan’i Saoly sy ny ankohonany rehetra dia nomeko ny zanakalahin’ny tomponao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Koa ianao sy ny zanakao lahy ary ny mpanomponao no hiasa ny tany ho azy ka hanatitra hanina ho an’ny zanakalahin’ny tomponao; fa i Mefiboseta, zanakalahin’ny tomponao, dia hihinana eo amin’ny latabatro mandrakariva. Nanana zanakalahy dimy amby folo sy mpanompo roapolo i Ziba. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Hoy i Ziba tamin’ny mpanjaka: Araka izay rehetra nandidianao mpanjaka tompoko no hataon’ny mpanomponao. Fa ny amin’i Mefiboseta, hoy i Davida, dia hihinana eo amin’ny latabatro toy ny iray amin’ny zanakalahin’ny mpanjaka izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Nanan-janakalahy tanora i Mefiboseta, i Mika no anarany. Ary izay rehetra nitoetra tao an-tranon’i Ziba dia nanompo an’i Mefiboseta avokoa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Nonina tany Jerosalema i Mefiboseta satria teo amin’ny latabatry ny mpanjaka mandrakariva izy no nihinana. Nalemy moa ny tongony roa.
