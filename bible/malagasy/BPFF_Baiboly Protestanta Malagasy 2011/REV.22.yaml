document_id: REV.22,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny Paradisa
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nasehony ahy ny ony nisy ranon’aina, manganohano tahaka ny vato kristaly, nivoaka avy teo amin’ny sezafiandrianan’Andriamanitra sy ny Zanak’ondry '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy indray izy tamiko: Aza asiana tombo-kase ny tenin’ny faminaniana amin’ity boky ity fa antomotra ny andro. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izay manao ny tsy marina dia aoka mbola hanao ny tsy marina ihany izy; izay maloto dia aoka mbola haloto ihany izy, fa izay marina kosa dia aoka mbola hanao ny marina ihany izy ary izay masina dia aoka mbola hihamasina ihany izy!
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Indro, avy haingana Aho ary entiko miaraka Amiko ny valisoa avy Amiko, mba hamaliako ny olona rehetra araka ny asany avy. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izaho no Alfa sy Omega, ny Voalohany sy ny Farany, ny fiandohana sy ny fiafarana.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Sambatra izay manasa ny akanjony mba hananany fahefana amin’ny hazon’aina sy hidirany amin’ny vavahady ho ao an-tanàna. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa any ivelany ny alika, ny mpanao ody ratsy, ny mpijangajanga, ny mpamono olona, ny mpanompo sampy ary izay rehetra tia lainga sady mandainga.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izaho Jesosy no naniraka ny anjeliko hanambara aminareo ireo zavatra ireo ho an’ny fiangonana. Izaho no Solofo sy taranak’i Davida, ny Kintana mamirapiratra fitarikandro.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny Fanahy sy ny ampakarina no miteny hoe: Avia! Aoka izay mandre hiteny hoe: Avia! Ary aoka ho avy izay mangetaheta; ary izay mety dia aoka izy hisotro maimaimpoana amin’ny ranon’aina.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izaho dia manambara amin’izay rehetra mandre ny tenin’ny faminaniana amin’ity boky ity: Raha misy manampy zavatra amin’ireo, Andriamanitra hanampy ireo loza voasoratra eto anatin’ity boky ity ho azy; '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ary raha misy manaisotra zavatra amin’ny teny amin’ny bokin’ity faminaniana ity dia hesorin’Andriamanitra ny anjarany amin’ny hazon’aina sy amin’ny tanàna masina, araka izay voasoratra ato anatin’ity boky ity.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'teo afovoan’ny lalambeny. Teny an-daniny roa amin’ny ony dia nisy hazon’aina mamoa voa roa amby folo samihafa sady mamoa isam-bolana. Ny ravin’ny hazo dia ho fanasitranana ny firenena maro. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy Izay manambara ireo zavatra ireo: Eny, avy haingana Aho. '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Amena
    - type: text
      text: '! Avia, Jesosy Tompo!'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ho amin’ny olona masina rehetra anie ny fahasoavan’i Jesosy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ' Tompo! Amena.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsy hisy ozona intsony, ary ny sezafiandrianan’Andriamanitra sy ny Zanak’ondry no ho ao aminy; ary ny mpanompony dia hanompo Azy '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ka hahita ny tavany, ary ny anarany dia ho eo amin’ny handriny. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tsy hisy alina intsony ary tsy mba hila fahazavan’ny jiro na fahazavan’ny masoandro izy, fa ny Tompo Andriamanitra no hanazava azy. Hanjaka mandrakizay mandrakizay izy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Avy haingana Aho
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy izy tamiko: Mahatoky sady marina ireo teny ireo; ny Tompo, Andriamanitry ny fanahin’ny mpaminany, no naniraka ny anjeliny haneho amin’ny mpanompony izay zavatra tsy maintsy ho tonga haingana. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary indro, avy haingana Aho. Sambatra izay mitandrina ny tenin’ny faminaniana amin’ity boky ity!
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izaho Jaona no nandre sy nahita ireo zavatra ireo. Rehefa nandre sy nahita aho dia niankohoka hivavaka teo anoloan’ny tongotr’ilay anjely naneho ahy ireo zavatra ireo. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Kanefa hoy izy tamiko: Tandremo, aza manao izao! Fa mpanompo namanao ihany aho sady naman’ny mpaminany rahalahinao sy izay mitandrina ny teny amin’ity boky ity; Andriamanitra ihany no ivavaho!'
