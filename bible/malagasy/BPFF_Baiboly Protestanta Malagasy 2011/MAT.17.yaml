document_id: MAT.17,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny niovan’i Jesosy tarehy tao an-tendrombohitra
  - type: heading
    content: Mar 9.2-10; Lio 9.28-36
  - type: text
    content: 'Nony afaka henemana, Jesosy, dia naka an’i Petera sy i Jakoba ary i Jaona rahalahiny ka nitondra azy ireo niakatra ho any an-tendrombohitra avo mba hitokana. '
  '10':
  - type: text
    content: 'Ary nanontany Azy ny mpianany hoe: Nahoana ary no ilazan’ny '
  - type: text
    content: mpanoradalàna
  - type: text
    content: ' fa tsy maintsy ho avy aloha i Elia? '
  '11':
  - type: text
    content: 'Ary Jesosy namaly hoe: I Elia dia ho tonga ihany ka hamerina amin’ny laoniny ny zavatra rehetra. '
  '12':
  - type: text
    content: 'Nefa lazaiko aminareo: Efa tonga sahady i Elia; nefa ny olona tsy nahafantatra azy fa nanao izay sitraky ny fony taminy. Dia tahaka izany koa no hampijaliany ny '
  - type: text
    content: Zanak’Olona
  - type: text
    content: '. '
  '13':
  - type: text
    content: Dia fantatry ny mpianatra fa ny amin’i Jaona Mpanao batisa no nolazainy taminy.
  - type: heading
    content: Ny nanasitranan’i Jesosy ilay zazalahy nampahorin’ny demonia
  - type: heading
    content: Mar 9.14-29; Lio 9.37-43
  '14':
  - type: text
    content: 'Rehefa tonga teo amin’ny vahoaka izy ireo dia nisy lehilahy iray nanatona an’i Jesosy, ary nandohalika teo anatrehany '
  '15':
  - type: text
    content: 'sady niteny hoe: Tompoko, mamindrà fo amin’ny zanako lahy fa mararin’ny androbe izy ka mijaly tokoa; matetika izy no mianjera ao anaty afo ary matetika ao anaty rano. '
  '16':
  - type: text
    content: 'Ary nitondra azy tamin’ny mpianatrao aho nefa tsy nahay nanasitrana azy izy. '
  '17':
  - type: text
    content: 'Ary hoy Jesosy: Ry taranaka tsy mino sady diso lalana, mandra-pahoviana no hiarahako aminareo? Mandra-pahoviana no handeferako aminareo? Ento atỳ Amiko izy. '
  '18':
  - type: text
    content: 'Ary niteny mafy azy Jesosy dia niala taminy ny '
  - type: text
    content: demonia
  - type: text
    content: ' ka sitrana tamin’izay ora izay ilay zazalahy.'
  '19':
  - type: text
    content: 'Dia nankao amin’i Jesosy mangingina ny mpianatra ka niteny hoe: Nahoana izahay no tsy afaka nandroaka an’iny? '
  '2':
  - type: text
    content: 'Dia niova tarehy teo anatrehan’izy ireo Izy, koa ny tarehiny dia namirapiratra tahaka ny masoandro, ary tonga fotsy tahaka ny mazava ny fitafiany. '
  '20':
  - type: text
    content: 'Ary hoy Jesosy taminy: Noho ny fahakelezan’ny finoanareo ihany; fa lazaiko aminareo marina tokoa: Raha manana finoana toy ny voantsinapy iray ianareo ka hiteny amin’io tendrombohitra io hoe: Mifindrà erỳ dia hifindra izy; ary tsy hisy zavatra tsy ho hainareo hatao. '
  '21':
  - type: text
    content: Kanefa iny karazana iny dia tsy miala raha tsy avoaka amin’ny fivavahana sy ny fifadian-kanina.
  - type: heading
    content: Ny nilazan’i Jesosy fanindroany ny hahafatesany sy ny hitsanganany amin’ny maty
  - type: heading
    content: Mar 9.30-32; Lio 9.43-45
  '22':
  - type: text
    content: 'Rehefa tafaverina tany Galilia izy ireo dia hoy Jesosy tamin’ny mpianany: Ny '
  - type: text
    content: Zanak’Olona
  - type: text
    content: ' efa hatolotra ho eo an-tanan’ny olona '
  '23':
  - type: text
    content: ka hovonoiny, nefa amin’ny andro fahatelo dia hatsangana indray Izy. Ary nalahelo indrindra ireo.
  - type: heading
    content: Ny nandoavan’i Jesosy sy i Petera ny hetra ho an’ny tempoly
  '24':
  - type: text
    content: 'Nony tonga tao Kapernaomy izy ireo dia nankeo amin’i Petera ny mpandray ny antsasaky ny sekela na didrakma ka niteny hoe: Moa va ny mpampianatra anareo tsy mba mandoa ny antsasaky ny sekela na didrakma? '
  '25':
  - type: text
    content: 'Dia hoy i Petera: Mandoa Izy. Ary raha vao tafiditra tao an-trano i Petera dia nialohavan’i Jesosy teny izy ka nilazany hoe: Ahoana no hevitrao, ry Simona? Avy amin’iza moa no andraisan’ny mpanjaka etỳ an-tany haban-tseranana sy vola hetra? Avy amin’ny zanany va sa avy amin’ny olon-kafa? '
  '26':
  - type: text
    content: 'Ary hoy i Petera taminy: Avy amin’ny olon-kafa, dia hoy kosa Jesosy: Raha izany dia afaka ny zanaka. '
  '27':
  - type: text
    content: 'Kanefa mba tsy hahatonga antsika hanafintohina azy ireo dia mandehana any amin’ny ranomasina ianao ka manjonoa; ary raiso izay hazandrano azo voalohany, koa rehefa sokafanao ny vavany dia hahita vola '
  - type: text
    content: statera
  - type: text
    content: ' ao ianao; dia raiso izany ka omeo azy ireo ho avy Amiko sy avy aminao.'
  '3':
  - type: text
    content: 'Ary indreo, niseho tamin’ny mpianatra i Mosesy sy i Elia, niresaka tamin’i Jesosy. '
  '4':
  - type: text
    content: 'Dia niteny tamin’i Jesosy i Petera hoe: Tompoko, tsara raha mitoetra eto isika; koa raha sitrakao dia hanao tranolay telo eto aho: Ny iray dia ho Anao, ny iray dia ho an’i Mosesy ary ny iray dia ho an’i Elia. '
  '5':
  - type: text
    content: 'Raha mbola niteny izy dia indro, nisy rahona mazava nanarona azy ireo; ary injao, nisy feo avy tao amin’ny rahona niteny hoe: Ity no Zanako malalako izay sitrako; Izy no henoy.'
  '6':
  - type: text
    content: 'Ary nony nandre izany ny mpianatra dia lavo niankohoka sady natahotra indrindra. '
  '7':
  - type: text
    content: 'Ary Jesosy nankeo aminy dia nikasika azy ireo sady niteny hoe: Mitsangàna fa aza matahotra. '
  '8':
  - type: text
    content: Nefa nony niandrandra izy ireo dia tsy nahita na iza na iza, afa-tsy Jesosy irery.
  '9':
  - type: text
    content: 'Rehefa nidina avy teny an-tendrombohitra izy ireo dia nandrara azy ireo Jesosy hoe: Aza milazalaza amin’olona iny fahitana iny, mandra-pitsangan’ny '
  - type: text
    content: Zanak’Olona
  - type: text
    content: ' amin’ny maty.'
  - type: heading
    content: Manontany an’i Jesosy ny amin’i Elia ny mpianatra
  - type: heading
    content: Mar 9.11-13
