document_id: ACT.7,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny toriteny nataon’i Stefana
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Mpisoronabe
    - type: text
      text: ': Moa izany tokoa va?'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ka nahafaka azy tamin’ny fahoriany rehetra sady nanome azy fahasoavana sy fahendrena teo imason’i Farao, mpanjakan’i Ejipta; ary nanendry azy ho mpanapaka tany Ejipta sy tao an-dapany manontolo izy. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nisy mosary manerana an’i Ejipta sy Kanana rehetra ka mafy ny fahoriana; ary tsy nahita hanina ny razantsika. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa nony ren’i Jakoba fa nisy vary tany Ejipta dia naniraka ny razantsika izy tamin’ny voalohany. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin’ny fanindroany dia fantatr’izy mirahalahy avy i Josefa ary fantatr’i Farao koa ny havan’i Josefa. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary naniraka nampiantso an’i Jakoba rainy mbamin’ny ankohonany rehetra i Josefa ka olona dimy amby fitopolo ry zareo. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nidina nankany Ejipta i Jakoba ary maty izy sy ny razantsika; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ary noentina ho any Sekema ka nalevina tao amin’ny fasana izay novidin’i Abrahama vola tamin’ny zanak’i Hamora tany Sekema.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa ho tonga ny fotoana hahatanterahan’ny teny fikasana izay nataon’Andriamanitra tamin’i Abrahama dia nitombo sy nihamaro ny olona tany Ejipta, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'mandra-pitsangan’ny mpanjaka hafa tany Ejipta, izay tsy nahalala an’i Josefa. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Io mpanjaka io dia nanao hafetsena tamin’ny razantsika ka nampahory azy, dia samy nanary ny zanany vao teraka ireo mba tsy ho velona izy ireny.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy i Stefana: Mihainoa, ry rahalahy sy ianareo ray: Andriamanitry ny voninahitra niseho tamin’i Abrahama razantsika raha tany Mezopotamia izy, fony tsy mbola nonina tany Harana, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin’izany andro izany no nahaterahan’i Mosesy, ary tsara teo anatrehan’Andriamanitra izy ka notezaina telo volana tao an-tranon’ny rainy. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa nariana izy dia nalain’ny zanakavavin’i Farao ka notezainy ho zanany. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nampianarina ny fahendrena rehetra nananan’ny Ejiptiana i Mosesy ary nahery tamin’ny teniny sy ny asany izy.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa efapolo taona izy dia nitsiry tao am-pony ny fikasana hamangy ireo zanak’Israely rahalahiny. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha nahita ny iray nampijaliana izy dia niaro azy sy namaly ka namono ilay Ejiptiana. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Noheveriny fa ho fantatry ny rahalahiny fa ny tanany no hamonjen’Andriamanitra azy; kanjo tsy fantatr’izy ireo izany. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nony ampitson’iny dia niseho tamin’olona izay niady i Mosesy ary nanao izay hampihavana azy ka niteny hoe: Mpirahalahy ianareo, koa nahoana no miady? '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ilay namely ny namany dia nanosika azy ka niteny hoe: Iza no nanendry an’Ialahy ho mpanapaka sy mpitsara anay? '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moa ta hamono ahy koa va Ialahy tahaka ny namonoan’Ialahy ilay Ejiptiana omaly? '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nandositra i Mosesy noho izany teny izany ka nivahiny tany amin’ny tany Midiana, izay niterahany zanaka roa lahy.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ka niteny taminy hoe: «Mialà amin’ny taninao sy ny havanao ka mandehana ho any amin’ny tany izay hasehoko anao» (Gen 12.1). '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nony afaka efapolo taona dia nisy anjely niseho taminy tany an-tany efitry ny tendrombohitra Sinay, tao anaty lelafo teo amin’ny roimemy. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nony nahita izany i Mosesy dia gaga noho ny fahitana; nefa nony nanatona handinika izy dia tonga ny feon’ny Tompo hoe: '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Izaho no Andriamanitry ny razanao, dia Andriamanitr’i Abrahama sy Isaka ary i Jakoba.» (Eks 3.6). Dia toran-kovitra i Mosesy ka tsy sahy nandinika. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy NY TOMPO taminy: «Esory ny kapa amin’ny tongotrao; fa masina io tany ijanonanao io. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Hitako tokoa ny fahorian’ny oloko any Ejipta ary reko ny fitarainany, dia nidina hamonjy azy Aho. Koa avia ankehitriny fa hirahiko ho any Ejipta ianao» (Eks 3.5-10).
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izany Mosesy izany ilay nolaviny ka nataony hoe: Iza no nanendry an’Ialahy ho mpanapaka sy mpitsara? Izy ihany no nirahin’Andriamanitra ho mpanapaka sy mpanavotra nomban’ny tanan’ny anjely, ilay niseho taminy teo amin’ny roimemy. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izy no nitondra ny olona nivoaka avy tany sady nanao fahagagana sy famantarana tany Ejipta, teo amin’ny Ranomasina Mena ary tany an-tany efitra nandritra ny efapolo taona. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izany no Mosesy ilay nilaza tamin’ny Zanak’Israely hoe: «Mpaminany no hatsangan’Andriamanitra ho anareo avy amin’ny rahalahinareo, tahaka ahy» (Deo 18.15). '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izy ilay teo amin’ny fiangonana tany an-tany efitra niaraka tamin’ilay anjely izay niteny taminy sy tamin’ny razantsika tany an-tendrombohitra Sinay; nandray teny velona mba homena antsika izy. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nefa ny razantsika dia tsy nety nanaiky azy fa nandà, ary manina an’i Ejipta ny fony '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia niala tamin’ny tanin’ny Kaldeana izy ka nonina tany Harana; ary rehefa maty ny rainy dia nafindran’Andriamanitra niala teo hankaty amin’ny tany izay onenanareo ankehitriny izy. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ka hoy izy tamin’i Arona: «Anaovy andriamanitra izahay hitarika antsika eo aloha; fa ilay Mosesy iny, izay nitondra antsika nivoaka avy tany amin’ny tany Ejipta dia tsy fantatray izay nanjo azy.» (Eks 32.1). '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nanao ombilahy kely izy tamin’izany andro izany ary nanolotra fanatitra tamin’ny sampy ka niravoravo tamin’ny asan’ny tanany. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa Andriamanitra nihodina taminy dia namela azy hanompo ny kintan’ny lanitra, araka ny voasoratra ao amin’ny bokin’ny mpaminany hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Moa nanolotra zavatra voavono sy fanatitra ho Ahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nandritra ny efapolo taona tany an-tany efitra va ianareo, ry taranak’Israely?
  '43':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsia, fa nobatainareo ny tranolain’i Moloka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny kintan’i Refana andriamanitrareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ny endri-javatra izay nataonareo mba hivavahana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: koa hamindra anareo ho any ankoatra an’i Babilona Aho» (Amo 5.25-27).
  '44':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Ny tranolain’ny Vavolombelona dia teo amin’ny razantsika tany an-tany efitra, tahaka ny voatendrin’Ilay niteny tamin’i Mosesy mba hanaovany azy araka ny endrika izay efa hitany. '
  '45':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Noraisin’ny razantsika izany ka noentiny niditra niaraka tamin’i Josoa tao amin’ny tanin’ny firenena izay noroahin’Andriamanitra hiala teo anoloan’ny razantsika hatramin’ny andron’i Davida; '
  '46':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'nahita fitia teo anatrehan’Andriamanitra i Davida ka nangataka hahita toerana ho an’ny tranon’i Jakoba. '
  '47':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Fa i Solomona kosa no nanao trano ho Azy. '
  '48':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Ny Avo Indrindra anefa tsy mitoetra ao amin’izay nataon-tanan’olona; araka ny nolazain’ny mpaminany hoe:'
  '49':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Ny lanitra no sezafiandrianako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny tany no fitoeran-tongotro;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: koa trano manao ahoana no hataonareo ho Ahy, hoy NY TOMPO?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary manao ahoana ny ho toerana fitsaharako?
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsy nomeny lova teto izy na dia eram-paladia akory aza; kanefa nampanantenainy fa homeny azy sy ny taranaka mandimby azy ho lovany izany na dia tsy mbola nanan-janaka akory aza izy. '
  '50':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy ny tanako va no nanao izao zavatra rehetra izao?» (Isa 66.1, 2)
  '51':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Ry olona mafy hatoka sady tsy voafora fo sy sofina, ianareo dia manohitra ny Fanahy Masina mandrakariva; tahaka ny nataon’ny razanareo ihany no ataonareo koa. '
  '52':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Iza tamin’ny mpaminany no tsy nenjehin’ny razanareo? Novonoiny aza ireo izay naminany ny fiavian’Ilay Marina, izay ianareo no tonga mpamadika sy mpamono Azy ankehitriny, '
  '53':
  - type: usfm
    marker: m
    children:
    - type: text
      text: dia ianareo izay olona nahazo ny lalàna tamin’ny nanoloran’ny anjely azy nefa tsy nankatò izany.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nahafatesan’i Stefana
    marker-yv: yv-h
  '54':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nony nandre izany izy ireo dia lotika ny fony ka nihidy vazana taminy izy. '
  '55':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nefa feno ny Fanahy Masina i Stefana ka nony nibanjina ny lanitra dia nahita ny voninahitr’Andriamanitra sy Jesosy nitsangana teo ankavanan’Andriamanitra, '
  '56':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ka hoy izy: Indro, hitako ny lanitra misokatra ary ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Zanak’Olona
    - type: text
      text: ' mitsangana eo ankavanan’Andriamanitra. '
  '57':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary niantsoantso mafy ny olona sady nanampin-tsofina no niara-nirohotra teo aminy, '
  '58':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia nandroaka azy ho eny ivelan’ny tanàna ary nitora-bato azy. Nametraka ny fitafiany teo anilan’ny tongotry ny zatovo iray antsoina hoe Saoly ireo vavolombelona. '
  '59':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny olona dia nitora-bato an’i Stefana, izay niantso hoe: Ry Jesosy Tompo ô, raiso ny fanahiko. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Araka izany no nilazan’Andriamanitra fa «hivahiny any amin’ny tanin’ny firenena hafa ny taranany ary handevozin’ireo sy hampahoriny mandritra ny efajato taona. '
  '60':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nandohalika izy ka niantso tamin’ny feo mahery hoe: Tompo ô, aza atao ho helony anie izao ota izao. Rehefa nilaza izany izy dia nodimandry.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nefa ny firenena izay hotompoiny dia hotsaraiko kosa, hoy Andriamanitra; ary rehefa afaka izany dia hivoaka avy ao izy ka hanompo Ahy eto amin’ity tany ity» (Gen 15.13-14). '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nomen’Andriamanitra azy koa ny fanekena ny amin’ny famorana. Dia niteraka an’Isaka i Abrahama ka namora azy tamin’ny andro fahavalo; ary Isaka dia niteraka an’i Jakoba, i Jakoba dia niteraka ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: patriarka
    - type: text
      text: ' roa amby folo lahy.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny patriarka dia nialona an’i Josefa ka nivarotra azy ho any Ejipta; nefa nomba azy Andriamanitra '
