document_id: GEN.5
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Tetiarana manomboka amin’i Adama ka hatramin’i Noa
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 1Tan 1.1-4
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ity no boky milaza ny taranak’i Adama. Tamin’ny andro naharian’Andriamanitra ny olona dia tahaka ny tarehin’Andriamanitra no nanaovany azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Lahy sy vavy no nahariany azy ireo; dia nitahy azy Izy ka nanao ny anarany hoe Adama, tamin’ny andro nahariany azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Telopolo amby zato taona i Adama raha niteraka tahaka ny tarehiny, araka ny endriny, ary ny anarany dia nataony hoe Seta. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ny andron’i Adama taorianan’ny niterahany an’i Seta dia valonjato taona; niteraka zazalahy sy zazavavy izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ny andro rehetra niainan’i Adama dia telopolo sy sivinjato taona; dia maty izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dimy amby zato taona i Seta raha niteraka an’i Enosy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ny andro niainan’i Seta taorianan’ny niterahany an’i Enosy dia fito sy valonjato taona; niteraka zazalahy sy zazavavy izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ny andro rehetra niainan’i Seta dia roa amby folo sy sivinjato taona; dia maty izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Sivifolo taona i Enosy raha niteraka an’i Kenana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ny andro niainan’i Enosy taorianan’ny niterahany an’i Kenana dia dimy amby folo sy valonjato taona; niteraka zazalahy sy zazavavy izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ny andro rehetra niainan’i Enosy dia dimy sy sivinjato taona; dia maty izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Fitopolo taona i Kenana raha niteraka an’i Mahalalila. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ny andro niainan’i Kenana taorianan’ny niterahany an’i Mahalalila dia efapolo sy valonjato taona; niteraka zazalahy sy zazavavy izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ny andro rehetra niainan’i Kenana dia folo sy sivinjato taona; dia maty izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Dimy amby enimpolo taona i Mahalalila raha niteraka an’i Jareda. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ny andro niainan’i Mahalalila taorianan’ny niterahany an’i Jareda dia telopolo sy valonjato taona; niteraka zazalahy sy zazavavy izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ny andro rehetra niainan’i Mahalalila dia dimy amby sivifolo sy valonjato taona; dia maty izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Roa amby enimpolo amby zato taona i Jereda raha niteraka an’i Enoka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ny andro niainan’i Jereda taorianan’ny niterahany an’i Enoka dia valonjato taona; niteraka zazalahy sy zazavavy izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ny andro rehetra niainan’i Jereda dia roa amby enimpolo sy sivinjato taona; dia maty izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Dimy amby enimpolo taona i Enoka raha niteraka an’i Metosela. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary niara-nandeha tamin’Andriamanitra telonjato taona i Enoka taorianan’ny niterahany an’i Metosela; niteraka zazalahy sy zazavavy izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ny andro rehetra niainan’i Enoka dia dimy amby enimpolo sy telonjato taona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Niara-nandeha tamin’Andriamanitra i Enoka; koa tsy hita izy, satria nalain’Andriamanitra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Fito amby valopolo amby zato taona i Metosela raha niteraka an’i Lameka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ny andro niainan’i Metosela taorianan’ny niterahany an’i Lameka dia roa amby valopolo sy fitonjato taona; niteraka zazalahy sy zazavavy izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Ny andro rehetra niainan’i Metosela dia sivy amby enimpolo sy sivinjato taona; dia maty izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Roa amby valopolo amby zato taona i Lameka raha niteraka zazalahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Ny anarany nataony hoe Noa
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.29 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Noa: Fitsaharana.'
    marker-yv: yv-n
  - type: text
    text: ', fa hoy izy: Ity no hampionona antsika amin’ny asantsika sy ny fisasaran’ny tanantsika noho ny tany izay nozonin’NY TOMPO. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ny andro niainan’i Lameka taorianan’ny niterahany an’i Noa dia dimy amby sivifolo sy dimanjato taona; niteraka zazalahy sy zazavavy izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Ny andro rehetra niainan’i Lameka dia fito amby fitopolo sy fitonjato taona; dia maty izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Dimanjato taona i Noa raha niteraka an’i Sema sy i Hama ary i Jafeta.
