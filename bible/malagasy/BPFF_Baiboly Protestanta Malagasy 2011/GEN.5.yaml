document_id: GEN.5,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Tetiarana manomboka amin’i Adama ka hatramin’i Noa
  - type: heading
    content: 1Tan 1.1-4
  - type: text
    content: 'Ity no boky milaza ny taranak’i Adama. Tamin’ny andro naharian’Andriamanitra ny olona dia tahaka ny tarehin’Andriamanitra no nanaovany azy. '
  '10':
  - type: text
    content: 'Ny andro niainan’i Enosy taorianan’ny niterahany an’i Kenana dia dimy amby folo sy valonjato taona; niteraka zazalahy sy zazavavy izy. '
  '11':
  - type: text
    content: Ny andro rehetra niainan’i Enosy dia dimy sy sivinjato taona; dia maty izy.
  '12':
  - type: text
    content: 'Fitopolo taona i Kenana raha niteraka an’i Mahalalila. '
  '13':
  - type: text
    content: 'Ny andro niainan’i Kenana taorianan’ny niterahany an’i Mahalalila dia efapolo sy valonjato taona; niteraka zazalahy sy zazavavy izy. '
  '14':
  - type: text
    content: Ny andro rehetra niainan’i Kenana dia folo sy sivinjato taona; dia maty izy.
  '15':
  - type: text
    content: 'Dimy amby enimpolo taona i Mahalalila raha niteraka an’i Jareda. '
  '16':
  - type: text
    content: 'Ny andro niainan’i Mahalalila taorianan’ny niterahany an’i Jareda dia telopolo sy valonjato taona; niteraka zazalahy sy zazavavy izy. '
  '17':
  - type: text
    content: Ny andro rehetra niainan’i Mahalalila dia dimy amby sivifolo sy valonjato taona; dia maty izy.
  '18':
  - type: text
    content: 'Roa amby enimpolo amby zato taona i Jereda raha niteraka an’i Enoka. '
  '19':
  - type: text
    content: 'Ny andro niainan’i Jereda taorianan’ny niterahany an’i Enoka dia valonjato taona; niteraka zazalahy sy zazavavy izy. '
  '2':
  - type: text
    content: Lahy sy vavy no nahariany azy ireo; dia nitahy azy Izy ka nanao ny anarany hoe Adama, tamin’ny andro nahariany azy.
  '20':
  - type: text
    content: Ny andro rehetra niainan’i Jereda dia roa amby enimpolo sy sivinjato taona; dia maty izy.
  '21':
  - type: text
    content: 'Dimy amby enimpolo taona i Enoka raha niteraka an’i Metosela. '
  '22':
  - type: text
    content: 'Ary niara-nandeha tamin’Andriamanitra telonjato taona i Enoka taorianan’ny niterahany an’i Metosela; niteraka zazalahy sy zazavavy izy. '
  '23':
  - type: text
    content: 'Ny andro rehetra niainan’i Enoka dia dimy amby enimpolo sy telonjato taona. '
  '24':
  - type: text
    content: Niara-nandeha tamin’Andriamanitra i Enoka; koa tsy hita izy, satria nalain’Andriamanitra.
  '25':
  - type: text
    content: 'Fito amby valopolo amby zato taona i Metosela raha niteraka an’i Lameka. '
  '26':
  - type: text
    content: 'Ny andro niainan’i Metosela taorianan’ny niterahany an’i Lameka dia roa amby valopolo sy fitonjato taona; niteraka zazalahy sy zazavavy izy. '
  '27':
  - type: text
    content: Ny andro rehetra niainan’i Metosela dia sivy amby enimpolo sy sivinjato taona; dia maty izy.
  '28':
  - type: text
    content: 'Roa amby valopolo amby zato taona i Lameka raha niteraka zazalahy. '
  '29':
  - type: text
    content: Ny anarany nataony hoe Noa
  - type: note
    content: 'Noa: Fitsaharana.'
  - type: text
    content: ', fa hoy izy: Ity no hampionona antsika amin’ny asantsika sy ny fisasaran’ny tanantsika noho ny tany izay nozonin’NY TOMPO. '
  '3':
  - type: text
    content: 'Telopolo amby zato taona i Adama raha niteraka tahaka ny tarehiny, araka ny endriny, ary ny anarany dia nataony hoe Seta. '
  '30':
  - type: text
    content: 'Ny andro niainan’i Lameka taorianan’ny niterahany an’i Noa dia dimy amby sivifolo sy dimanjato taona; niteraka zazalahy sy zazavavy izy. '
  '31':
  - type: text
    content: Ny andro rehetra niainan’i Lameka dia fito amby fitopolo sy fitonjato taona; dia maty izy.
  '32':
  - type: text
    content: Dimanjato taona i Noa raha niteraka an’i Sema sy i Hama ary i Jafeta.
  '4':
  - type: text
    content: 'Ny andron’i Adama taorianan’ny niterahany an’i Seta dia valonjato taona; niteraka zazalahy sy zazavavy izy. '
  '5':
  - type: text
    content: Ny andro rehetra niainan’i Adama dia telopolo sy sivinjato taona; dia maty izy.
  '6':
  - type: text
    content: 'Dimy amby zato taona i Seta raha niteraka an’i Enosy. '
  '7':
  - type: text
    content: 'Ny andro niainan’i Seta taorianan’ny niterahany an’i Enosy dia fito sy valonjato taona; niteraka zazalahy sy zazavavy izy. '
  '8':
  - type: text
    content: Ny andro rehetra niainan’i Seta dia roa amby folo sy sivinjato taona; dia maty izy.
  '9':
  - type: text
    content: 'Sivifolo taona i Enosy raha niteraka an’i Kenana. '
