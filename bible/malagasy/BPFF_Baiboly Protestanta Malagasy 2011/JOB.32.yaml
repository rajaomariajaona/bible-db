document_id: JOB.32,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: MIDITRA AN-TSEHATRA I ELIHO
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fahatezeran’i Eliho
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nitsahatra tsy namaly intsony izy telo lahy satria nihevitra ny tenany ho marina i Joba.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Noho izany dia hoy aho hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka samy hihaino ahy!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izaho koa dia mba hanambara izay fantatro.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro, niandry ny teninareo aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary nanongilan-tsofina tamin’ny teny nalahatrareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mandra-pihevitrareo izay holazaina.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, tena nihaino anareo aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa e! Tsy nisy naharesy lahatra an’i Joba ianareo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na nahavaly ny teniny akory.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Koa aoka ianareo tsy hiteny hoe: Hitanay ny fahendrena;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Andriamanitra no maharesy azy fa tsy olona!
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy nandaha-teny hamely ahy anefa izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy araka ny teninareo no havaliko azy.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Very hevitra terỳ izy ireo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy namaly intsony;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: efa nanalavitra azy ny teny.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hangina va aho raha tsy miteny izy ireo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa mijanona foana izy ka tsy mamaly intsony?
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Anjarako kosa izao ka hamaly aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, izaho no hanambara izay fantatro!
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa feno teny ny foko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: manery ahy ny fanahy ato anatiko.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Endre! Ny ato anatiko dia efa tahaka ny divay izay tsy misokatra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: efa ho triatra tahaka ny siny hoditra vaovao izy.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nirehitra kosa ny fahatezeran’i Eliho, zanak’i Barakela bozita, avy amin’ny fianakavian’i Rama. Eny, tamin’i Joba no nirehetan’ny fahatezerany satria nanao ny tenany ho marina noho Andriamanitra izy. '
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hiteny aho mba hisy hiainako tsara;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hiloa-bava aho ka hamaly.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy hizaha tavan’olona akory aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy handrobo olona.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa tsy mba mahay mandrobo aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: raha izany dia halain’ny Mpanao ahy faingana aho!
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary tamin’ny sakaizany telo lahy koa no nirehetan’ny fahatezerany satria tsy nahita teny havaly izy ireo, kanefa nanameloka an’i Joba. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary i Eliho dia tsy mbola niteny tamin’i Joba fa niandry satria ireo telo lahy dia be taona noho izy. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Rehefa hitany fa tsy nanan-kavaly izy telo lahy dia nirehitra ny fahatezerany.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Manamarina ny teniny i Eliho
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa niteny i Eliho, zanak’i Barakela bozita hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mbola tanora aho fa ianareo kosa dia fotsy volo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: koa natahotra aho fa tsy sahy nanambara aminareo izay fantatro.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Hoy aho hoe: Aoka ny fahanterana no hiteny'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary aoka ny hamaroan’ny taona no hampianatra fahendrena.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Kanefa ny fanahy izay ao anatin’ny zanak’olombelona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny fofonain’ny Tsitoha no mahahendry azy.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy dia ny fahalehibiazana no mahahendry
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy dia ny fahanterana no ahalalana ny rariny.
