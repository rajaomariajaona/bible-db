document_id: JOB.32
type_code: plt
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: MIDITRA AN-TSEHATRA I ELIHO
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fahatezeran’i Eliho
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Nitsahatra tsy namaly intsony izy telo lahy satria nihevitra ny tenany ho marina i Joba.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Nirehitra kosa ny fahatezeran’i Eliho, zanak’i Barakela bozita, avy amin’ny fianakavian’i Rama. Eny, tamin’i Joba no nirehetan’ny fahatezerany satria nanao ny tenany ho marina noho Andriamanitra izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary tamin’ny sakaizany telo lahy koa no nirehetan’ny fahatezerany satria tsy nahita teny havaly izy ireo, kanefa nanameloka an’i Joba. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary i Eliho dia tsy mbola niteny tamin’i Joba fa niandry satria ireo telo lahy dia be taona noho izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Rehefa hitany fa tsy nanan-kavaly izy telo lahy dia nirehitra ny fahatezerany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Manamarina ny teniny i Eliho
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Koa niteny i Eliho, zanak’i Barakela bozita hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mbola tanora aho fa ianareo kosa dia fotsy volo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: koa natahotra aho fa tsy sahy nanambara aminareo izay fantatro.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Hoy aho hoe: Aoka ny fahanterana no hiteny'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary aoka ny hamaroan’ny taona no hampianatra fahendrena.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Kanefa ny fanahy izay ao anatin’ny zanak’olombelona
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny fofonain’ny Tsitoha no mahahendry azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Tsy dia ny fahalehibiazana no mahahendry
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy dia ny fahanterana no ahalalana ny rariny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Noho izany dia hoy aho hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aoka samy hihaino ahy!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izaho koa dia mba hanambara izay fantatro.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Indro, niandry ny teninareo aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary nanongilan-tsofina tamin’ny teny nalahatrareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mandra-pihevitrareo izay holazaina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Eny, tena nihaino anareo aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa e! Tsy nisy naharesy lahatra an’i Joba ianareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: na nahavaly ny teniny akory.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Koa aoka ianareo tsy hiteny hoe: Hitanay ny fahendrena;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Andriamanitra no maharesy azy fa tsy olona!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Tsy nandaha-teny hamely ahy anefa izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy araka ny teninareo no havaliko azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Very hevitra terỳ izy ireo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy namaly intsony;
- type: usfm
  marker: q1
  children:
  - type: text
    text: efa nanalavitra azy ny teny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Hangina va aho raha tsy miteny izy ireo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa mijanona foana izy ka tsy mamaly intsony?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Anjarako kosa izao ka hamaly aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, izaho no hanambara izay fantatro!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Fa feno teny ny foko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: manery ahy ny fanahy ato anatiko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Endre! Ny ato anatiko dia efa tahaka ny divay izay tsy misokatra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: efa ho triatra tahaka ny siny hoditra vaovao izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Hiteny aho mba hisy hiainako tsara;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hiloa-bava aho ka hamaly.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Tsy hizaha tavan’olona akory aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy handrobo olona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Fa tsy mba mahay mandrobo aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: raha izany dia halain’ny Mpanao ahy faingana aho!
