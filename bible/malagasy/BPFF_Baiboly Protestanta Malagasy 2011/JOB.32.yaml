document_id: JOB.32,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: MIDITRA AN-TSEHATRA I ELIHO
  - type: heading
    content: Ny fahatezeran’i Eliho
  - type: text
    content: Nitsahatra tsy namaly intsony izy telo lahy satria nihevitra ny tenany ho marina i Joba.
  '10':
  - type: text
    content: 'Noho izany dia hoy aho hoe:'
  - type: text
    content: Aoka samy hihaino ahy!
  - type: text
    content: Izaho koa dia mba hanambara izay fantatro.
  '11':
  - type: text
    content: Indro, niandry ny teninareo aho
  - type: text
    content: ary nanongilan-tsofina tamin’ny teny nalahatrareo,
  - type: text
    content: mandra-pihevitrareo izay holazaina.
  '12':
  - type: text
    content: Eny, tena nihaino anareo aho,
  - type: text
    content: nefa e! Tsy nisy naharesy lahatra an’i Joba ianareo
  - type: text
    content: na nahavaly ny teniny akory.
  '13':
  - type: text
    content: 'Koa aoka ianareo tsy hiteny hoe: Hitanay ny fahendrena;'
  - type: text
    content: Andriamanitra no maharesy azy fa tsy olona!
  '14':
  - type: text
    content: Tsy nandaha-teny hamely ahy anefa izy
  - type: text
    content: ary tsy araka ny teninareo no havaliko azy.
  '15':
  - type: text
    content: Very hevitra terỳ izy ireo
  - type: text
    content: ka tsy namaly intsony;
  - type: text
    content: efa nanalavitra azy ny teny.
  '16':
  - type: text
    content: Hangina va aho raha tsy miteny izy ireo,
  - type: text
    content: fa mijanona foana izy ka tsy mamaly intsony?
  '17':
  - type: text
    content: Anjarako kosa izao ka hamaly aho;
  - type: text
    content: eny, izaho no hanambara izay fantatro!
  '18':
  - type: text
    content: Fa feno teny ny foko;
  - type: text
    content: manery ahy ny fanahy ato anatiko.
  '19':
  - type: text
    content: Endre! Ny ato anatiko dia efa tahaka ny divay izay tsy misokatra,
  - type: text
    content: efa ho triatra tahaka ny siny hoditra vaovao izy.
  '2':
  - type: text
    content: 'Nirehitra kosa ny fahatezeran’i Eliho, zanak’i Barakela bozita, avy amin’ny fianakavian’i Rama. Eny, tamin’i Joba no nirehetan’ny fahatezerany satria nanao ny tenany ho marina noho Andriamanitra izy. '
  '20':
  - type: text
    content: Hiteny aho mba hisy hiainako tsara;
  - type: text
    content: hiloa-bava aho ka hamaly.
  '21':
  - type: text
    content: Tsy hizaha tavan’olona akory aho
  - type: text
    content: ary tsy handrobo olona.
  '22':
  - type: text
    content: Fa tsy mba mahay mandrobo aho;
  - type: text
    content: raha izany dia halain’ny Mpanao ahy faingana aho!
  '3':
  - type: text
    content: 'Ary tamin’ny sakaizany telo lahy koa no nirehetan’ny fahatezerany satria tsy nahita teny havaly izy ireo, kanefa nanameloka an’i Joba. '
  '4':
  - type: text
    content: 'Ary i Eliho dia tsy mbola niteny tamin’i Joba fa niandry satria ireo telo lahy dia be taona noho izy. '
  '5':
  - type: text
    content: Rehefa hitany fa tsy nanan-kavaly izy telo lahy dia nirehitra ny fahatezerany.
  - type: heading
    content: Manamarina ny teniny i Eliho
  '6':
  - type: text
    content: 'Koa niteny i Eliho, zanak’i Barakela bozita hoe:'
  - type: text
    content: Mbola tanora aho fa ianareo kosa dia fotsy volo;
  - type: text
    content: koa natahotra aho fa tsy sahy nanambara aminareo izay fantatro.
  '7':
  - type: text
    content: 'Hoy aho hoe: Aoka ny fahanterana no hiteny'
  - type: text
    content: ary aoka ny hamaroan’ny taona no hampianatra fahendrena.
  '8':
  - type: text
    content: Kanefa ny fanahy izay ao anatin’ny zanak’olombelona
  - type: text
    content: sy ny fofonain’ny Tsitoha no mahahendry azy.
  '9':
  - type: text
    content: Tsy dia ny fahalehibiazana no mahahendry
  - type: text
    content: ary tsy dia ny fahanterana no ahalalana ny rariny.
