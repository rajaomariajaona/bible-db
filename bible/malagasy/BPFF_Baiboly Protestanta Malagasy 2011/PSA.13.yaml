document_id: PSA.13
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mandra-pahoviana no hanadinoanao ahy?
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: Ho an’ny mpiventy hira. Salamo nataon’i Davida.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: TOMPO ô, mandra-pahoviana no mbola hanadinoanao ahy ihany?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mandra-pahoviana no mbola hanafenanao ny tavanao amiko?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Mandra-pahoviana no mbola hisaintsainako ato anatiko
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy halahelovako am-po isanandro?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mandra-pahoviana no mbola hisandratan’ny fahavaloko ho amboniko?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Jereo aho ka valio, RY TOMPO Andriamanitro ô!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ampahazavao ny masoko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fandrao renoky ny torimasom-pahafatesana aho,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'fandrao ny fahavaloko hilaza hoe: Naharesy azy aho!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fandrao hifaly ny rafiko raha mangozohozo aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Fa raha izaho kosa dia ny famindramponao no itokiako;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hiravoravo amin’ny famonjenao ny foko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Hihira ho an’NY TOMPO aho satria nanisy soa ahy Izy.
