document_id: PSA.13,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Mandra-pahoviana no hanadinoanao ahy?
  - type: text
    content: Ho an’ny mpiventy hira. Salamo nataon’i Davida.
  - type: text
    content: TOMPO ô, mandra-pahoviana no mbola hanadinoanao ahy ihany?
  - type: text
    content: Mandra-pahoviana no mbola hanafenanao ny tavanao amiko?
  '2':
  - type: text
    content: Mandra-pahoviana no mbola hisaintsainako ato anatiko
  - type: text
    content: sy halahelovako am-po isanandro?
  - type: text
    content: Mandra-pahoviana no mbola hisandratan’ny fahavaloko ho amboniko?
  '3':
  - type: text
    content: Jereo aho ka valio, RY TOMPO Andriamanitro ô!
  - type: text
    content: Ampahazavao ny masoko,
  - type: text
    content: fandrao renoky ny torimasom-pahafatesana aho,
  '4':
  - type: text
    content: 'fandrao ny fahavaloko hilaza hoe: Naharesy azy aho!'
  - type: text
    content: Fandrao hifaly ny rafiko raha mangozohozo aho.
  '5':
  - type: text
    content: Fa raha izaho kosa dia ny famindramponao no itokiako;
  - type: text
    content: hiravoravo amin’ny famonjenao ny foko.
  '6':
  - type: text
    content: Hihira ho an’NY TOMPO aho satria nanisy soa ahy Izy.
