document_id: HEB.8,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fanompoam-pivavahana tranainy
  - type: text
    content: 'Amin’izany zavatra lazainay izany dia izao no fotony: Manana Mpisoronabe toy izany isika, dia ilay mipetraka eo amin’ny ankavanan’ny sezafiandrianan’ny Avo indrindra any an-danitra '
  '10':
  - type: text
    content: Fa izao no fanekena hataoko amin’ny taranak’Israely,
  - type: text
    content: 'rehefa afaka izany andro izany, hoy NY TOMPO:'
  - type: text
    content: Hataoko ao an-tsainy ny lalànako
  - type: text
    content: sady hosoratako ao am-pony,
  - type: text
    content: ary Izaho ho Andriamaniny
  - type: text
    content: ary ho oloko izy.
  '11':
  - type: text
    content: Ary samy tsy hampianatra
  - type: text
    content: 'ny namany sy ny rahalahiny avy izy ka hiteny hoe: Mahalalà NY TOMPO!'
  - type: text
    content: Fa samy hahalala Ahy avokoa izy rehetra
  - type: text
    content: hatramin’ny kely indrindra ka hatramin’ny lehibe indrindra;
  '12':
  - type: text
    content: fa hamindra fo amin’ny tsy fahamarinany Aho
  - type: text
    content: ary tsy hotsarovako intsony ny fahotany» (Jer 31.31-34).
  '13':
  - type: text
    content: Rehefa milaza izy hoe vaovao dia noheveriny fa efa ela ny fanekena voalohany. Fa izay tratra ela sy mihaantitra dia efa madiva ho levona.
  '2':
  - type: text
    content: 'ka manao fanompoam-pivavahana ao amin’ny fitoerana masina sy ny tena '
  - type: text
    content: tabernakely
  - type: text
    content: ' izay naorin’ny Tompo fa tsy nataon’olombelona.'
  '3':
  - type: text
    content: 'Fa ny Mpisoronabe rehetra dia tendrena hanolotra fanomezana sy fanatitra; ary amin’izany dia tsy maintsy mba manan-katolotra koa Izy. '
  '4':
  - type: text
    content: 'Koa raha etỳ ambonin’ny tany Izy dia tsy mba ho mpisorona akory satria efa misy rahateo ireo manolotra ny fanomezana araka ny lalàna, '
  '5':
  - type: text
    content: 'dia ireo manao fanompoam-pivavahana amin’izay endrika sy aloky ny zavatra any an-danitra, tahaka ny natoron’Andriamanitra an’i Mosesy, rehefa hanao ny tabernakely izy; fa hoy Izy: «Tandremo mba hataonao araka ny endrika izay naseho taminao tao an-tendrombohitra ny zavatra rehetra» (Eks 25.40). '
  '6':
  - type: text
    content: Fa ankehitriny dia fanompoana ambony lavitra noho ny an’ireny ny Azy, dia araka ny nanaovana Azy ho mpanalalana amin’ny fanekena tsara lavitra, izay natao tamin’ny teny fikasana tsara lavitra.
  '7':
  - type: text
    content: 'Fa raha tsy nanan-tsiny izany fanekena voalohany izany dia tsy mba nilaina hotadiavina ny fanekena faharoa. '
  '8':
  - type: text
    content: 'Fa manome tsiny ny olona Izy hoe:'
  - type: text
    content: «Indro, avy ny andro, hoy NY TOMPO,
  - type: text
    content: izay hanaovako fanekena vaovao amin’ny taranak’Israely
  - type: text
    content: sy ny taranak’i Joda,
  '9':
  - type: text
    content: nefa tsy araka ny fanekena nataoko tamin’ny razany
  - type: text
    content: tamin’ny andro nitantanako azy
  - type: text
    content: sy nitondrako azy nivoaka avy tany amin’ny tany Ejipta;
  - type: text
    content: fa tsy nitoetra tamin’ny fanekeko izy ireny,
  - type: text
    content: ary Izaho koa dia tsy nitandrina azy, hoy NY TOMPO.
