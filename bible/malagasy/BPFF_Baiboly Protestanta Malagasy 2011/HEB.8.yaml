document_id: HEB.8,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fanompoam-pivavahana tranainy
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Amin’izany zavatra lazainay izany dia izao no fotony: Manana Mpisoronabe toy izany isika, dia ilay mipetraka eo amin’ny ankavanan’ny sezafiandrianan’ny Avo indrindra any an-danitra '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Fa izao no fanekena hataoko amin’ny taranak’Israely,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'rehefa afaka izany andro izany, hoy NY TOMPO:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hataoko ao an-tsainy ny lalànako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady hosoratako ao am-pony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary Izaho ho Andriamaniny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ho oloko izy.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Ary samy tsy hampianatra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ny namany sy ny rahalahiny avy izy ka hiteny hoe: Mahalalà NY TOMPO!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa samy hahalala Ahy avokoa izy rehetra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hatramin’ny kely indrindra ka hatramin’ny lehibe indrindra;
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: fa hamindra fo amin’ny tsy fahamarinany Aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy hotsarovako intsony ny fahotany» (Jer 31.31-34).
  '13':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Rehefa milaza izy hoe vaovao dia noheveriny fa efa ela ny fanekena voalohany. Fa izay tratra ela sy mihaantitra dia efa madiva ho levona.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'ka manao fanompoam-pivavahana ao amin’ny fitoerana masina sy ny tena '
    - type: usfm
      marker: w
      children:
      - type: text
        text: tabernakely
    - type: text
      text: ' izay naorin’ny Tompo fa tsy nataon’olombelona.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Fa ny Mpisoronabe rehetra dia tendrena hanolotra fanomezana sy fanatitra; ary amin’izany dia tsy maintsy mba manan-katolotra koa Izy. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Koa raha etỳ ambonin’ny tany Izy dia tsy mba ho mpisorona akory satria efa misy rahateo ireo manolotra ny fanomezana araka ny lalàna, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'dia ireo manao fanompoam-pivavahana amin’izay endrika sy aloky ny zavatra any an-danitra, tahaka ny natoron’Andriamanitra an’i Mosesy, rehefa hanao ny tabernakely izy; fa hoy Izy: «Tandremo mba hataonao araka ny endrika izay naseho taminao tao an-tendrombohitra ny zavatra rehetra» (Eks 25.40). '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Fa ankehitriny dia fanompoana ambony lavitra noho ny an’ireny ny Azy, dia araka ny nanaovana Azy ho mpanalalana amin’ny fanekena tsara lavitra, izay natao tamin’ny teny fikasana tsara lavitra.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Fa raha tsy nanan-tsiny izany fanekena voalohany izany dia tsy mba nilaina hotadiavina ny fanekena faharoa. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Fa manome tsiny ny olona Izy hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Indro, avy ny andro, hoy NY TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay hanaovako fanekena vaovao amin’ny taranak’Israely
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny taranak’i Joda,
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: nefa tsy araka ny fanekena nataoko tamin’ny razany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tamin’ny andro nitantanako azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy nitondrako azy nivoaka avy tany amin’ny tany Ejipta;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa tsy nitoetra tamin’ny fanekeko izy ireny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary Izaho koa dia tsy nitandrina azy, hoy NY TOMPO.
