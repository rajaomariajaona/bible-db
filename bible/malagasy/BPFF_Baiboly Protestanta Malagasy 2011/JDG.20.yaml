document_id: JDG.20
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny namaliana ny Benjamina
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Dia niainga ny Zanak’Israely rehetra ka nivory toy ny olona tokana ny fiangonana, hatrany Dana ka hatrany Bery-Sheba ary ny tany Gileada, ho any amin’NY TOMPO tany Mizpa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary ny loholona rehetra tamin’ny fokon’ny Israely dia niseho teo amin’ny fivorian’ny vahoakan’Andriamanitra, dia miaramila efatra hetsy mandeha an-tongotra sady mahatan-tsabatra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary ren’ny taranak’i Benjamina fa niakatra ho any Mizpa ny Zanak’Israely. Dia hoy ny Zanak’Israely: Lazao izay nahatonga izao loza izao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dia hoy ilay '
  - type: usfm
    marker: w
    children:
    - type: text
      text: levita
  - type: text
    text: ', vadin-dRavehivavy novonoina hoe: Tonga tany Gibea, izay an’i Benjamina, izaho sy ny vady tsindranoko mba handry tao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia nitsangana hamely ahy ny mponina tao Gibea ka nanodidina ny trano hamely ahy tamin’ny alina. Izaho saika novonoiny, ary ny vady tsindranoko nandriany ka matiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia nalaiko ny vady tsindranoko ka norasaiko ary nampitondraiko tany amin’ny tany rehetra izay lovan’ny Israely satria efa nanao fahavetavetana sy zavatra fady indrindra teo amin’ny Israely ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Koa indreto ianareo Zanak’Israely rehetra, mba alaharo eto izay teny sy hevitrareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dia nitsangana tahaka ny olona iray ny vahoaka rehetra ka niteny hoe: Tsy hisy hankany amin’ny tranolaintsika isika, ary tsy hisy hody any an-tranontsika. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Fa ankehitriny, izao no hataontsika amin’i Gibea: Araka ny antsapaka no aoka hiakarantsika hamely azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Haka folo lahy isan-jato amin’ny fokon’ny Israely rehetra isika, dia zato amin’ny arivo, ary arivo amin’ny iray alina, mba haka vatsy ho an’ny olona, koa rehefa tonga any Gibean’i Benjamina ireo dia araka ilay zavatra fady indrindra efa nataony teo amin’ny Israely no hataony aminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Dia nivory ny lehilahy rehetra tamin’ny Israely ka nikambana tahaka ny olona iray hamely ny tanàna.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary nandefa iraka tany amin’ny fokon’i Benjamina rehetra ny fokon’ny Israely hiteny hoe: Inona izao loza natao teto aminareo izao? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ankehitriny, atolory anay ireo olona tena ratsy fanahy avy any Gibea ireo mba hovonoinay ho faty ka hesorinay tsy ho eo amin’ny Israely ny ratsy. Nefa ny taranak’i Benjamina tsy nety nihaino ny feon’ny Zanak’Israely rahalahiny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary nivory avy tamin’ny tanànany rehetra ny taranak’i Benjamina hankany Gibea mba handeha hiady amin’ny Zanak’Israely. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Dia voalamina tamin’izany andro izany ny taranak’i Benjamina avy tamin’ireo tanàna ireo ka enina arivo sy roa alin-dahy nahatan-tsabatra, afa-tsy ny mponina tao Gibea izay voalamina, dia fitonjato lahy voafantina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Teo amin’izany olona rehetra izany dia nisy olona kavia fitonjato lahy voafantina, samy nahay nitoraka tamin’ny antsamotady ka tsy nisy nivaona na dia toy ny singam-bolo iray aza. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary ny lehilahy voalamina tamin’ny Israely, afa-tsy ny Benjamina, dia efatra hetsy nahatan-tsabatra; mpanafika avokoa izy rehetra ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Dia niainga ny Zanak’Israely ka niakatra tany Betela ary nanontany tamin’Andriamanitra hoe: Iza aminay no hiakatra voalohany hiady amin’ny taranak’i Benjamina? Dia hoy NY TOMPO: I Joda no ho voalohany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Dia niainga vao maraina ny Zanak’Israely ka nitoby tandrifin’i Gibea. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Niainga ny lehilahin’ny Israely hiady amin’ny Benjamina; nilahatra ny lehilahin’ny Israely hiady aminy tao akaikin’i Gibea. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Niala avy tany Gibea kosa ny taranak’i Benjamina ka naharingana lehilahy roa arivo sy roa alina niampatrampatra tamin’ny tany tamin’ny Zanak’Israely, tamin’izany andro izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Nampahery tena anefa ny lehilahin’ny Israely ka nilahatra hiady indray teo amin’ilay nilaharany tamin’ny andro voalohany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary niakatra ny Zanak’Israely ka nitomany teo anatrehan’NY TOMPO mandra-paharivan’ny andro, dia nanontany tamin’NY TOMPO hoe: Handroso indray va aho hiady amin’ny taranak’i Benjamina rahalahiko? Ary hoy NY TOMPO: Miakara hiady aminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary ny Zanak’Israely dia nandroso tamin’ny andro faharoa hiady amin’ny taranak’i Benjamina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Dia niala avy tany Gibea ny Benjamina hiady aminy indray tamin’ny andro faharoa ka naharingana valo arivo sy iray alin-dahy niampatrampatra tamin’ny tany tamin’ny Zanak’Israely; lehilahy nahatan-tsabatra avokoa ireo rehetra ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Dia niakatra ny Zanak’Israely rehetra sy ny olona rehetra ka nankany Betela, dia nitomany sy nipetraka teo anatrehan’NY TOMPO ary nifady hanina tamin’izany andro izany mandra-paharivan’ny andro, ary nanolotra fanatitra dorana manontolo sy fanati-pihavanana teo anatrehan’NY TOMPO. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Dia nanontany tamin’NY TOMPO ny Zanak’Israely, fa tao ny vata misy ny faneken’Andriamanitra tamin’izany andro izany, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'ary i Finehasa, zanak’i Eleazara, zanak’i Arona, no nanao fanompoana teo anoloany tamin’izany andro izany ka niteny hoe: Mbola hivoaka indray va aho hiady amin’ny taranak’i Benjamina rahalahiko, sa hitsahatra? Dia hoy NY TOMPO: Miakara, fa hatolotro ho eo an-tananao izy rahampitso.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ary nasian’ny Israely vela-pandrika manodidina an’i Gibea. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Dia niakatra ny Zanak’Israely tamin’ny andro fahatelo hiady amin’ny taranak’i Benjamina ka nilahatra tandrifin’i Gibea tahaka ilay teo aloha ihany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Dia niainga ny taranak’i Benjamina hiady tamin’ny olona ka voatarika hanalavitra ny tanàna izy ary nanomboka namely sy nahafaty olona tahaka ny teo aloha, dia tokony ho telopolo lahy tamin’ny Israely, tany amin’ireo lalambe izay miakatra ho any Betela ny iray, ary ho any an-tsaha, mankany Gibea ny iray. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Ary hoy ny taranak’i Benjamina: Resy eo anoloantsika tahaka ilay teo aloha ihany izy. Fa hoy ny Zanak’Israely: Andeha hanao tari-dositra isika mba hampiala azy amin’ny tanàna ka ho any an-dalambe. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Dia nitsangana niala tamin’ny toerana nisy azy ny lehilahy rehetra tamin’ny Israely ka nilahatra tany Baala-Tamara; ary ny Israely izay nanao vela-pandrika dia nirohotra avy tamin’ny toerany, avy tao an-tsahan’i Gibea. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Tonga tandrifin’i Gibea ny lehilahy iray alina voafantina tamin’ny Israelita rehetra. Ary mafy ny ady nefa tsy fantatry ny taranak’i Benjamina fa efa hiharan-doza izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Ary NY TOMPO namely an’ny Benjamina teo anoloan’Israely, ary tamin’izany andro izany i Benjamina dia nahafatesan’ny Zanak’Israely lehilahy zato sy dimy arivo sy roa alina; lehilahy nahatan-tsabatra avokoa ireo rehetra ireo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Hitan’ny taranak’i Benjamina fa resy izy. Ny lehilahin’ny Israely dia nanao tari-dositra niala tamin’i Benjamina satria natoky ny vela-pandrika izay napetrany teo akaikin’i Gibea izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Dia nihazakazaka hankany Gibea ny mpanao vela-pandrika ka nirohotra namely ny tanàna manontolo tamin’ny lelan-tsabatra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Ary ny famantarana izay nifaneken’ny lehilahin’ny Israely sy ny mpanao vela-pandrika dia setroka matevim-be izay hampiakariny avy ao an-tanàna. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Dia nitampody tao anatin’ny ady ny lehilahin’ny Israely ka nanomboka namely an’i Benjamina ary nahafaty tokony ho telopolo lahy tamin’ny Israely, ka hoy ireo: Resy eo anoloantsika tokoa tahaka ny tamin’ny ady voalohany izy! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Kanjo raha vao niakatra avy tao amin’ny tanàna ny setroka mitankosina dia niherika hijery ny Benjamina; ary indro, niakatra ho amin’ny lanitra avokoa ny setroky ny tanàna! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Ary nitampody ny lehilahin’ny Israely, dia raiki-tahotra ny lehilahin’ny Benjamina, satria hitany fa efa nidiran-doza izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Nandositra teo anoloan’ny lehilahin’ny Israely ireo hankany amin’ny lalana ho any an-tany efitra, nefa nahatratra azy ihany ny ady, ary ireo izay nivoaka avy tao an-tanàna koa dia namono azy satria tonga teo afovoany ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Nohodidininy ny Benjamina ka nenjehiny ary tsy navelany hiaina, dia nohitsakitsahiny hatrany akaikin’i Gibea any atsinanany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Nahafatesany lehilahy valo arivo sy iray alina ny Benjamina; lehilahy mahery avokoa ireo rehetra ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Dia nivily ny sisa ka nandositra nankany an-tany efitra ho any amin’ny harambato any Rimona; ary izay voatsimpona teny an-dalana dia dimy arivo lahy, ary mbola noenjehiny ihany hatrany Gideoma ireo ka nahafatesany roa arivo lahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Ny Benjamina rehetra izay lavo tamin’izany andro izany dia lehilahy dimy arivo sy roa alina nahatan-tsabatra; lehilahy mahery avokoa ireo rehetra ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Fa nisy eninjato lahy nitampody ka nandositra nankany an-tany efitra ho any amin’ny harambato any Rimona, dia nitoetra efa-bolana tao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: Dia niverina indray tany amin’ny taranak’i Benjamina ny lehilahin’ny Israely ka namely azy tamin’ny lelan-tsabatra, hatramin’ny olona tao an-tanàna ka hatramin’ny biby fiompy mbamin’izay rehetra hitany. Ny tanàna rehetra izay hitany dia nodorany tamin’ny afo avokoa.
