document_id: EZK.40,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: FAHITANA NY AMIN’NY TEMPOLY VAOVAO
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin’ny taona fahadimy amby roapolo taorianan’ny namaboana antsika, tamin’ny niandohan’ny taona, tamin’ny andro fahafolo tamin’ny volana, tamin’ny taona fahefatra amby folo taorianan’ny namelezana ny tanàna, tamin’izany andro izany dia tonga tamiko ny tanan’NY TOMPO ka nitondra ahy ho any Izy. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny efitrefitra fiambenana teo amin’ny vavahady atsinanana dia telo teo andaniny avy; mitovy refy izy telo, ary mitovy refy koa ny andry teo amin’ny lafiny roa. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Norefesiny koa ny sakan’ny vavahady ka folo hakiho; ary ny lavan’ny vavahady dia telo amby folo hakiho. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nisy arofanina teo anoloan’ny efitrefitra fiambenana ka iray hakiho avy no teo an-daniny roa; ny efitrefitra fiambenana dia enina hakiho ny tamin’ny lafiny iray ary enina hakiho koa ny tamin’ny lafiny iray. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Norefesiny koa ny vavahady hatramin’ny tafon’ny efitrefitra fiambenana iray ka hatramin’ny tafon’ny iray koa, koa dimy amby roapolo hakiho ny sakany ary mifanatrika ny varavarana. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Norefesiny koa ny andry, dia enimpolo hakiho, ary nihatra tamin’ny andry ny kianja manodidina ny vavahady. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hatreo anoloan’ny vavahady fidirana ka hatreo anoloan’ny lalantsaran’ny vavahady anatiny dia dimampolo hakiho. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nisy varavarankely makarakara tsy mivoha manodidina, na tao amin’ny efitrefitra fiambenana na tamin’ny andry ao anatin’ny vavahady, manodidina ny vavahady; toy izany koa tamin’ny lalantsara; ary ny tao anatiny dia nisy varavarankely manodidina; teo amin’ny andry rehetra dia samy nisy sarin’ny hazo palma.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia noentiny ho any amin’ny kianja ivelany aho, ary indro, nisy efitrano sy lampivato teny amin’ny kianja manodidina; nisy efitrano telopolo teny amin’ny lampivato. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny lampivato dia teo anilan’ny vavahady sady nifanaraka tamin’ny lavan’ny vavahady: Lampivato ambany io. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Norefesiny koa ny sakany hatreo anoloan’ny vavahady ambany ka hatreo anoloan’ny kianja anatiny, dia hatreo amin’ny ivelany ka zato hakiho, teo atsinanana sy teo avaratra.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fahitana avy amin’Andriamanitra no nitondrany ahy ho any amin’ny tanin’ny Israely ka napetrany teo an-tendrombohitra avo dia avo aho, ary nisy zavatra toy ny trano ao amin’ny tanàna teo amin’ny ilany atsimo. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Norefesiny koa ny lavany sy ny sakan’ny vavahadin’ny kianja ivelany izay nanatrika ny avaratra. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny efitrefitra fiambenany dia telo no teo an-daniny avy; ary ny andry sy ny lalantsara teo aminy dia nitovy refy tamin’ny vavahady voalohany ka dimampolo hakiho ny lavany ary dimy amby roapolo hakiho ny sakany. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny varavarankeliny sy ny lalantsarany ary ny sarin’ny hazo palma taminy dia nitovy refy tamin’ireo amin’ny vavahady atsinanana; nisy zanatohatra fito ho fiakarana tao; ary ny lalantsara teo aminy dia tandrifin’ireo. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary nisy vavahadin’ny kianja anatiny, tandrifin’ny vavahady fidirana manatrika ny avaratra sy ny atsinanana; norefesiny hatramin’ny vavahady iray ka hatramin’ny iray, dia zato hakiho.
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia noentiny nianatsimo aho ka indro, nisy vavahady teo atsimo; norefesiny ny andry sy ny lalantsara teo aminy, dia araka ireo refy ireo ihany koa. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nisy varavarankely teo aminy sy teo amin’ny lalantsara manodidina azy, tahaka ireo varavarankely ireo ihany koa, ka dimampolo hakiho ny lavany ary dimy amby roapolo hakiho ny sakany. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nisy zanatohatra fito ho fiakarana tao, ary ny lalantsara dia tandrifin’ireo; ary nisy sarin’ny hazo palma iray tamin’ny lafiny iray, ary iray koa tamin’ny lafiny iray teo amin’ny andriny. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary nisy vavahady fidirana amin’ny kianja anatiny teo atsimo, dia norefesiny teo atsimo hatramin’ny vavahady iray ka hatramin’ny iray, dia zato hakiho koa.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ireo kianja sy varavarana anatiny
    marker-yv: yv-h
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary noentiny niditra tamin’ny vavahady atsimo ho any amin’ny kianja anatiny aho. Dia norefesiny ny vavahady atsimo ka araka ireo refy ireo ihany koa. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny efitrefitra fiambenana, ny andry ary ny lalantsara eo aminy dia araka ireo refy ireo ihany koa. Nisy varavarankely teo aminy sy teo amin’ny lalantsara manodidina azy, dimampolo '
    - type: usfm
      marker: w
      children:
      - type: text
        text: hakiho
    - type: text
      text: ' ny lavany ary dimy amby roapolo hakiho ny sakany. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia noentiny nankao aho ka indro, nisy lehilahy izay nitarehim-barahina, nitondra tady rongony teny an-tanany sy volotara fandrefesana, ary nitsangana teo am-bavahady izy. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nisy lalantsara manodidina azy, dimy amby roapolo hakiho ny lavany ary dimy hakiho ny sakany. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny lalantsara teo aminy dia nanatrika ny kianja ivelany; nisy sarin’ny hazo palma teo amin’ny andry, ary nisy zanatohatra valo ho fiakarana tao.
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia noentiny niantsinanana ho any amin’ny kianja anatiny aho, dia norefesiny ny vavahady ka araka ireo refy ireo ihany koa. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny efitrefitra fiambenana, ny andry ary ny lalantsara teo aminy dia araka ireo refy ireo ihany koa. Nisy varavarankely teo aminy sy teo amin’ny lalantsara manodidina azy, dimampolo hakiho ny lavany ary dimy amby roapolo hakiho ny sakany. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nanatrika ny kianja ivelany ny lalantsara teo aminy; nisy sarin’ny hazo palma teo amin’ny andry teo andaniny roa, ary nisy zanatohatra valo ho fiakarana ao.
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary noentiny ho any amin’ny vavahady avaratra aho, dia norefesiny ka araka ireo refy ireo ihany koa. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Teo amin’izany koa dia nisy ny efitrefitra fiambenana, ny andry, ny lalantsara, ary varavarankely manodidina, dimampolo hakiho ny lavany ary dimy amby roapolo hakiho ny sakany. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nanatrika ny kianja ivelany ny andry teo aminy; nisy sarin’ny hazo palma teo amin’ny andriny teo an-daniny roa, ary zanatohatra valo no fiakarana ao.
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nisy efitrano misy varavarana teo anilan’ny andry teo am-bavahady ka tao no hanakobanana ny fanatitra dorana manontolo. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Teo amin’ny lalantsaran’ny vavahady dia nisy latabatra roa teo an-daniny roa, hamonoana ny fanatitra dorana manontolo sy ny fanatitra noho ny ota ary ny fanati-panonerana. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy Ralehilahy tamiko: Ry '
    - type: usfm
      marker: w
      children:
      - type: text
        text: zanak’olona
    - type: text
      text: ', mijere amin’ny masonao ary mihainoa amin’ny sofinao ary aoka ny fonao handinika izay rehetra hasehoko anao, fa ny hanehoako anao izao no nitondrana anao eto. Ambarao amin’ny taranak’Israely izay rehetra hitanao.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny kianja sy ireo varavarana ivelany
    marker-yv: yv-h
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Teo amin’ny ilany ivelany izay fiakarana hiditra teo amin’ny vavahady avaratra dia nisy latabatra roa, ary teo amin’ny ilany iray koa, teo amin’ny lalantsaran’ny vavahady dia nisy latabatra roa koa. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nisy latabatra efatra teo amin’ny ilany iray amin’ny vavahady ary latabatra efatra teo amin’ny ilany iray, dia latabatra valo izay famonoana fanatitra. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nisy latabatra efatra natao tamin’ny vato voapaika ho amin’ny fanatitra dorana manontolo, iray hakiho sy sasany ny lavany ary iray hakiho sy sasany koa ny sakany, ary iray hakiho ny haavony; teo no hametrahana ny zavatra famonoana ny fanatitra dorana manontolo sy ny fanatitra hafa. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary nisy sisiny, felatanana iray ny sakany, manodidina eny amin’ny rindrina; ary eny ambonin’ny latabatra no hasiana ny hena hatao fanatitra.
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Teo ivelan’ny vavahady anatiny, teo anilan’ny vavahady avaratra ka manatrika ny atsimo, dia nisy efitrano maromaro ho an’ny mpihira, teo amin’ny kianja anatiny; nisy iray koa teo anilan’ny vavahady atsinanana ka nanatrika ny avaratra. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy izy tamiko: Ity efitrano manatrika ny atsimo ity dia ho an’ny mpisorona izay mitandrina ny anjara raharahany amin’ny trano. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ny efitrano manatrika ny avaratra kosa dia ho an’ny mpisorona izay mitandrina ny anjara raharaha ny amin’ny alitara. Ireo dia taranak’i Zadoka izay isan’ny taranak’i Levy ka manatona NY TOMPO hanao fanompoana ho Azy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny tempoly
    marker-yv: yv-h
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia norefesiny ny kianja, ka zato '
    - type: usfm
      marker: w
      children:
      - type: text
        text: hakiho
    - type: text
      text: ' ny lavany ary zato hakiho koa ny sakany; efamira izany. Ny alitara dia teo anoloan’ny Trano.'
  '48':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary noentiny ho any amin’ny lalantsaran’ny Trano aho, dia norefesiny ny andriny amin’ny lalantsara fidirana ka dimy hakiho ny tamin’ny lafiny iray ary dimy hakiho koa ny tamin’ny lafiny iray; ny sakan’ny vavahady dia telo hakiho ny tamin’ny lafiny iray ary telo hakiho koa ny tamin’ny lafiny iray. '
  '49':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Roapolo hakiho ny lavan’ny lalantsara fidirana ary iraika amby folo hakiho ny sakany; nisy zanatohatra hiakarana tao; nisy andry teo anilan’ny tolana, iray teo an-daniny, iray teo an-kilany.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary indro, nisy ampiantany vato manodidina teny ivelan’ny trano, ary teny an-tanan-dRalehilahy dia nisy volotara fandrefesana, enina '
    - type: usfm
      marker: w
      children:
      - type: text
        text: hakiho
    - type: text
      text: ' ny halavany, kanefa isaky ny hakiho iray dia nihoatra felatanana iray noho ny fanao. Norefesiny ny hatevin’ny ampiantany ka iray volotara fandrefesana, ary ny haavony dia iray volotara fandrefesana koa.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia tonga teo amin’ny vavahady manatrika ny atsinanana izy ka niakatra tamin’ny zanatohatra aminy dia nandrefy ny tokonan’ny vavahady, ka iray volotara fandrefesana ny sakany, dia ny tokonana voalohany izany ary iray volotara fandrefesana ny sakan’ny tokonana iray koa. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny efitrefitra fiambenana dia iray volotara fandrefesana ny lavany ary iray volotara fandrefesana koa ny sakany; ny elanelan’ny efitrefitra fiambenana dia dimy hakiho; ary ny tokonan’ny vavahady eo anilan’ny lalantsaran’ny vavahady, tao anatiny, dia iray volotara fandrefesana. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Norefesiny koa ny lalantsaran’ny vavahady tao anatiny ka iray volotara fandrefesana koa. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary norefesiny ny lalantsaran’ny vavahady ka valo hakiho; ny andriny dia roa hakiho; ary ny lalantsaran’ny vavahady dia teo anatiny. '
