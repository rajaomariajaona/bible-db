document_id: 1CO.2
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mitory an’i Kristy voahombo tamin’ny hazofijaliana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary izaho koa, ry rahalahy, raha tonga tany aminareo, dia tsy tonga tamin’ny teny marevaka na fahendrena, rehefa nitory taminareo ny zavamiafina ny amin’Andriamanitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Fa ninia tsy hahafantatra zavatra hafa teo aminareo aho, afa-tsy Jesosy Kristy, dia Izy voahombo tamin’ny hazofijaliana; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'ary izaho aza raha tany aminareo dia azon’ny fahalemena sy ny fahatahorana ary ny fangovitana be; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'ary ny teniko sy ny toriteniko dia tsy tamin’ny teny fahendrena izay natao hampiaiky, fa tamin’ny fanehoana ny Fanahy sy ny hery '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: mba tsy hiorenan’ny finoanareo amin’ny fahendren’ny olona fa amin’ny herin’Andriamanitra.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fahendren’Andriamanitra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Kanefa milaza fahendrena amin’ny efa matotra izahay, tsy ny fahendren’izao tontolo izao na ny an’ny mpanapaka izao tontolo izao, izay olona mihalevona; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'fa milaza ny fahendren’Andriamanitra izahay ka maneho zavamiafina, dia fahendrena izay nafenina sady voatendrin’Andriamanitra ho voninahitsika talohan’ny nahariana izao tontolo izao; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'ary tsy nisy nahalala izany ny mpanapaka izao tontolo izao; fa raha nahalala izy dia tsy nohomboany tamin’ny hazofijaliana ny Tompon’ny voninahitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Fa araka ny voasoratra hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Izay tsy mbola hitan’ny maso ary tsy mbola ren’ny sofina
- type: usfm
  marker: q1
  children:
  - type: text
    text: na niditra tao am-pon’ny olona
- type: usfm
  marker: q1
  children:
  - type: text
    text: no efa namboarin’Andriamanitra ho an’izay tia Azy» (Isa 64.3).
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Isika no nanambaràn’Andriamanitra izany tamin’ny Fanahy; fa ny Fanahy no mamantatra ny zavatra rehetra, na dia ny zava-dalina izay ao amin’Andriamanitra aza. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Fa iza no olona mahalala izay momba ny olona afa-tsy ny fanahin’ny olona izay ao anatiny ihany? Ary toy izany koa, tsy misy mahalala izay momba an’Andriamanitra afa-tsy ny Fanahin’Andriamanitra ihany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Fa tsy nandray ny fanahin’izao tontolo izao isika fa ny Fanahy izay avy amin’Andriamanitra mba ho fantatsika izay zavatra nomen’Andriamanitra antsika tamin’ny fahasoavany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Izany koa no teneninay, tsy amin’ny teny ampianarin’ny fahendren’olona fa amin’ny teny ampianarin’ny Fanahy, raha mampitaha izay zavatra ara-panahy amin’izay avy amin’ny Fanahy izahay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Fa ny olona izay araka ny nofo ihany dia tsy mba mandray izay an’ny Fanahin’Andriamanitra, fa fahadalana izany aminy sady tsy azony satria araka ny Fanahy no itsarana izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Fa ny olona araka ny Fanahy kosa dia mitsara ny zavatra rehetra kanefa tsy mba tsarain’olona izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Fa «Iza no nahafantatra ny sain’ny Tompo mba hampianatra Azy?» (Isa 40.13). Kanefa izahay dia manana ny sain’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: .
