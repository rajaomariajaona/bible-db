document_id: 1CO.2,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Mitory an’i Kristy voahombo tamin’ny hazofijaliana
  - type: text
    content: 'Ary izaho koa, ry rahalahy, raha tonga tany aminareo, dia tsy tonga tamin’ny teny marevaka na fahendrena, rehefa nitory taminareo ny zavamiafina ny amin’Andriamanitra. '
  '10':
  - type: text
    content: 'Isika no nanambaràn’Andriamanitra izany tamin’ny Fanahy; fa ny Fanahy no mamantatra ny zavatra rehetra, na dia ny zava-dalina izay ao amin’Andriamanitra aza. '
  '11':
  - type: text
    content: 'Fa iza no olona mahalala izay momba ny olona afa-tsy ny fanahin’ny olona izay ao anatiny ihany? Ary toy izany koa, tsy misy mahalala izay momba an’Andriamanitra afa-tsy ny Fanahin’Andriamanitra ihany. '
  '12':
  - type: text
    content: 'Fa tsy nandray ny fanahin’izao tontolo izao isika fa ny Fanahy izay avy amin’Andriamanitra mba ho fantatsika izay zavatra nomen’Andriamanitra antsika tamin’ny fahasoavany. '
  '13':
  - type: text
    content: 'Izany koa no teneninay, tsy amin’ny teny ampianarin’ny fahendren’olona fa amin’ny teny ampianarin’ny Fanahy, raha mampitaha izay zavatra ara-panahy amin’izay avy amin’ny Fanahy izahay. '
  '14':
  - type: text
    content: 'Fa ny olona izay araka ny nofo ihany dia tsy mba mandray izay an’ny Fanahin’Andriamanitra, fa fahadalana izany aminy sady tsy azony satria araka ny Fanahy no itsarana izany. '
  '15':
  - type: text
    content: 'Fa ny olona araka ny Fanahy kosa dia mitsara ny zavatra rehetra kanefa tsy mba tsarain’olona izy. '
  '16':
  - type: text
    content: 'Fa «Iza no nahafantatra ny sain’ny Tompo mba hampianatra Azy?» (Isa 40.13). Kanefa izahay dia manana ny sain’i '
  - type: text
    content: Kristy
  - type: text
    content: .
  '2':
  - type: text
    content: 'Fa ninia tsy hahafantatra zavatra hafa teo aminareo aho, afa-tsy Jesosy Kristy, dia Izy voahombo tamin’ny hazofijaliana; '
  '3':
  - type: text
    content: 'ary izaho aza raha tany aminareo dia azon’ny fahalemena sy ny fahatahorana ary ny fangovitana be; '
  '4':
  - type: text
    content: 'ary ny teniko sy ny toriteniko dia tsy tamin’ny teny fahendrena izay natao hampiaiky, fa tamin’ny fanehoana ny Fanahy sy ny hery '
  '5':
  - type: text
    content: mba tsy hiorenan’ny finoanareo amin’ny fahendren’ny olona fa amin’ny herin’Andriamanitra.
  - type: heading
    content: Ny fahendren’Andriamanitra
  '6':
  - type: text
    content: 'Kanefa milaza fahendrena amin’ny efa matotra izahay, tsy ny fahendren’izao tontolo izao na ny an’ny mpanapaka izao tontolo izao, izay olona mihalevona; '
  '7':
  - type: text
    content: 'fa milaza ny fahendren’Andriamanitra izahay ka maneho zavamiafina, dia fahendrena izay nafenina sady voatendrin’Andriamanitra ho voninahitsika talohan’ny nahariana izao tontolo izao; '
  '8':
  - type: text
    content: 'ary tsy nisy nahalala izany ny mpanapaka izao tontolo izao; fa raha nahalala izy dia tsy nohomboany tamin’ny hazofijaliana ny Tompon’ny voninahitra. '
  '9':
  - type: text
    content: 'Fa araka ny voasoratra hoe:'
  - type: text
    content: «Izay tsy mbola hitan’ny maso ary tsy mbola ren’ny sofina
  - type: text
    content: na niditra tao am-pon’ny olona
  - type: text
    content: no efa namboarin’Andriamanitra ho an’izay tia Azy» (Isa 64.3).
