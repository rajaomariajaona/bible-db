document_id: DEU.2,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia niverina isika ka nandeha tany an-tany efitra tamin’ny lalana mankany amin’ny Ranomasina Mena, araka izay nolazain’NY TOMPO tamiko; ary nanodidina ny tendrombohitra Seìra ela ihany isika.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny namakivakiana ny faritanin’i Edoma sy i Moaba ary i Amona
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny Emima nonina tany fahiny dia firenena lehibe sy maro an’isa ary olona lava tahaka ny Anakita. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ireo koa no nolazaina ho Refaìta tany aloha, tahaka ny Anakita; fa ny Moabita kosa dia nilaza azy hoe Emima. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny tany Seìra dia nonenan’ny Horita, fa ny taranak’i Esao no nandroaka azy ka nandringana azy tsy ho eo anoloany, dia nonina nisolo azy, araka ny nataon’ny Israely tao amin’ny tany izay nomen’NY TOMPO azy ho lovany. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa miaingà ianareo ankehitriny ka mandehana mita ny lohasahan-driaka Zereda. Dia namakivaky ny lohasahan-driaka Zereda isika. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Valo amby telopolo taona ny andro nandehanantsika hatrany Kadesy-Barnea ka hatramin’ny nitantsika ny lohasahan-driaka Zereda, ary izany dia mandra-pahalany ritra ny mpanafika rehetra tamin’izany taranaka rehetra izany ka tsy nisy intsony teo amin’ny toby, araka izay nianianan’NY TOMPO taminy. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ny tanan’NY TOMPO dia namely azy mba haharingana ireo mandra-pahalany ritra azy ho tsy nisy intsony teo amin’ny toby.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nony lany ritra ny mpanafika satria maty avokoa '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia niteny tamiko NY TOMPO hoe: '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ankehitriny dia hamakivaky ny tany Moaba ianao ka hahazo any Ara, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia ho tonga ao akaikin’ny taranak’i Amona, nefa aza mandrafy azy na mila ady aminy; fa tsy hanomezako ho lovanao ny tanin’ny taranak’i Amona satria nomeko ho lovan’ny taranak’i Lota io toerana io. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia niteny tamiko NY TOMPO hoe: '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nolazaina ho tanin’ny Refaìta koa teo; fa ny Refaìta no nitoetra tao taloha ka nataon’ny Amonita hoe Zamzomita. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Firenena lehibe sy maro an’isa ary ahitana olona lava tahaka ny Anakita ireny nefa naringan’NY TOMPO tsy ho eo anoloany, koa ny Amonita no nonina nisolo azy ireo, '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'araka izay nataony ho an’ny taranak’i Esao koa, izay mitoetra any Seìra, fa nandringana ny Horita tsy ho eo anoloany Izy ka nandroaka azy ireo dia nonina nisolo azy mandraka androany. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ny amin’ny Avita, izay nonina am-bohitra hatrany Gaza, dia naringan’ny Kaftorita, izay avy tany Kaftora; ary ireo no nonina nisolo azy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fakàna ny fanjakan’i Sihona
    marker-yv: yv-h
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mitsangàna, miaingà, ka mità ny lohasahan-driaka Arnona ianareo; indro, efa natolotro eo an-tananao i Sihona amorita, mpanjakan’i Hesbona, mbamin’ny taniny. Santaro ny handovanao azy ka tafiho. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Anio vao hataoko mahazo ny firenena ambanin’ny lanitra rehetra ny horohoro sy tahotra anareo, koa raha reny ny lazanao dia hangovitra sy hangorohoro eo anoloanao izy.
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nandefa iraka avy tany an-tany efitr’i Kedemota aho hankany amin’i Sihona, mpanjakan’i Hesbona, hitondra teny fihavanana hoe: '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aoka mba handeha hamakivaky ny taninao aho; ny lalambe ihany no halehako ka tsy hivily aho, na ho amin’ny ankavanana na ho amin’ny ankavia; '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'vola no hividianako hanina aminao hohaniko, ary vola koa no hividianako rano aminao hosotroiko; ary handalo fotsiny ihany aho, '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'araka izay nataoko koa tamin’ny taranak’i Esao izay monina any Seìra, sy ny Moabita, izay monina any Ara, mandra-pitako an’i Jordana ho any amin’ny tany izay omen’NY TOMPO Andriamanitray anay. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aoka izay ny fandehananareo nanodidina ity tendrombohitra ity fa miverena mianavaratra ianareo. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa tsy nety namela antsika handeha hamakivaky ny taniny i Sihona, mpanjakan’i Hesbona, satria NY TOMPO Andriamanitrao nampaditra ny fanahin’i Sihona sy nanamafy ny fony, mba hanolorany azy eo an-tananao tahaka ny amin’izao anio izao.
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia niteny tamiko NY TOMPO hoe: Indro, vao manomboka hanolotra an’i Sihona sy ny taniny eo anoloanao Aho; santaro ny handovanao ny taniny. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia niainga i Sihona mbamin’ny vahoakany rehetra hiady amintsika tao Jahaza. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nanolotra azy teo anoloantsika NY TOMPO Andriamanitsika ka nandresy azy sy ny zanany ary ny vahoakany rehetra isika. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin’izany andro izany ihany dia nahazo ny tanànany rehetra isika ka nataontsika ho zavatra voaozona ny mponina rehetra isan-tanàna mbamin’ny zaza amam-behivavy; tsy nasiantsika niangana izy na dia iray akory aza. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny biby fiompiny sy ny fananany tao amin’ny tanàna izay azontsika ihany anefa no nataontsika ho babo. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsy nisy tanàna tsy azontsika; hatrany Aroera, izay eo amoron’ny lohasahan-driaka Arnona, dia hatramin’ny tanàna izay ao an-dohasaha ka hatrany Gileada; fa izy rehetra ireo dia natolotry NY TOMPO Andriamanitsika teo anoloantsika. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Kanefa ny tanin’ny taranak’i Amona no tsy nohakekezinareo, dia ny tany amoron’ny lohasahan-driaka Jaboka sy ny tanàna ao amin’ny tany be havoana; ary izay rehetra nandraran’NY TOMPO Andriamanitsika antsika koa dia nolalovantsika fotsiny.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary mandidia ny olona hoe: Ianareo izao dia efa handeha hamakivaky ny tanin’ny taranak’i Esao rahalahinareo izay monina any Seìra; hatahotra anareo izy; nefa mitandrema tsara ianareo. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aza mila ady aminy, fa tsy hanomezako anareo ny taniny, na dia eram-paladia akory aza satria nomeko ho lovan’i Esao ny tendrombohitra Seìra. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vola no hividiananareo hanina aminy hohaninareo; ary vola koa no hividiananareo rano aminy hosotroinareo. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa NY TOMPO Andriamanitrao efa nitahy anao tamin’izay rehetra nataon’ny tananao; fantany ny nandehananao namakivaky ity tany efitra lehibe ity; izay efapolo taona izay NY TOMPO Andriamanitrao no teo aminao ka tsy nisy zava-mahory anao.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary raha nolalovantsika ny taranak’i Esao rahalahintsika izay monina any Seìra ka niala tamin’ny lalana any amin’ny Araba sy tao Elata ary Eziona-Gebera isika dia nivily avy eo ka nandeha tamin’ny lalana mankany amin’ny tany efitr’i Moaba.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy NY TOMPO tamiko: Aza mandrafy ny Moabita na mila ady aminy, fa tsy hanomezako ho lovanao ny taniny satria nomeko ho lovan’ny taranak’i Lota i Ara. '
