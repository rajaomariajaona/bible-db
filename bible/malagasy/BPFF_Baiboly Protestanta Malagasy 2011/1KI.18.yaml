document_id: 1KI.18
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: I Elia sy i Obadia
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Nony afaka andro maro dia tonga tamin’i Elia ny tenin’NY TOMPO, tamin’ny taona fahatelo hoe: Mandehana miseho amin’i Ahaba fa handatsaka ranonorana amin’ny tany Aho. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Dia niainga i Elia hiseho amin’i Ahaba.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Mafy ny mosary tany Samaria. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary niantso an’i Obadia, izay lehiben’ny tao an-dapany, i Ahaba. Fa i Obadia dia natahotra NY TOMPO tokoa, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'fa tamin’ny nandringanan’i Jezebela ny mpaminanin’NY TOMPO dia nalain’i Obadia ny mpaminany zato ka nafeniny, dimampolo avy no nataony tao amin’ny zohy iray, ary novelominy tamin’ny mofo sy rano ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Hoy i Ahaba tamin’i Obadia: Andeha mitety ny tany, hatrany amin’ny loharano rehetra sy hatrany amin’ny lohasahan-driaka rehetra; fa angamba hahita ahitra hamelomana ny soavaly sy ny ampondra isika ka mba tsy hisy hovonointsika ny biby fiompintsika. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Dia nizara lalana izy ka i Ahaba dia nandeha irery tamin’ny lalana iray, ary i Obadia koa nandeha irery tamin’ny lalana iray hafa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Rehefa tany an-dalana i Obadia dia indro, nifanena taminy i Elia. Nahafantatra azy izy ka niankohoka sady niteny hoe: Hay ianao va ity, ry Elia tompoko? '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary hoy izy hoe: Eny, izaho ity. Andeha, lazao amin’ny tomponao hoe: Injao, atsy i Elia! '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Hoy anefa i Obadia: Inona no heloko, no anoloranao ny mpanomponao ho eo an-tanan’i Ahaba hamonoany ahy? '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Raha velona koa NY TOMPO Andriamanitrao, dia tsy misy firenena na fanjakana izay tsy nanirahan’ny tompoko hitady anao; ary raha hoy ny olona hoe: Tsy ato izy, dia nampianianiny izany firenena sy fanjakana izany fa tsy nahita anao tokoa izy ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Koa ankehitriny, hoy ianao: Andeha, lazao amin’ny tomponao hoe: Injao, atsy i Elia! '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Nefa raha vao miala eto aminao aho dia hoentin’ny Fanahin’NY TOMPO any amin’izay tsy fantatro ianao; koa raha tonga aho ka milaza amin’i Ahaba, nefa tsy ho hitany ianao tsinona, dia hovonoiny aho. Izaho mpanomponao anefa dia matahotra NY TOMPO hatry ny fahakeliny. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Moa tsy nolazaina taminao va, tompoko, izay nataoko tamin’ilay namonoan’i Jezebela ny mpaminanin’NY TOMPO, dia ny nanafenako ny mpaminanin’NY TOMPO zato lahy, ka dimampolo avy no nataoko tao amin’ny zohy iray, ary novelomiko tamin’ny mofo sy rano ireo? '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Nefa ankehitriny, hoy ianao: Andeha, lazao amin’ny tomponao hoe: Injao, atsy i Elia! Dia hamono ahy i Ahaba! '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Hoy anefa i Elia: Raha velona koa Andriamanitra, Tompon’izao rehetra izao, izay tompoiko, dia hiseho amin’i Ahaba tokoa aho anio.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: I Elia sy i Ahaba
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Dia lasa i Obadia nitsena an’i Ahaba ka nilaza taminy. Ary nandeha hitsena an’i Elia i Ahaba. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Nony hitan’i Ahaba i Elia dia hoy izy taminy: Hay! Tonga etỳ ianao, ry ilay mpampidi-doza amin’ny Israely! '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Hoy anefa i Elia: Tsy izaho no nampidi-doza tamin’ny Israely fa ianao sy ny mpianakavin’ny rainao ihany, tamin’ny nandaozanareo ny didin’NY TOMPO sy ny nanarahanao ireo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Baala
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Koa ankehitriny, maniraha olona hamory ny Israely rehetra hihaona amiko any an-tendrombohitra Karmela, ary vorio any koa ny mpaminanin’ireo Baala dimampolo sy efajato sy ireo mpaminanin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Aseraha
  - type: text
    text: ' efajato, izay mihinana eo amin’ny latabatr’i Jezebela.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: I Elia sy ireo mpaminanin’ny Baala tao Karmela
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Dia nandefa iraka tany amin’ny Zanak’Israely rehetra i Ahaba ka namory ny mpaminany ho any amin’ny tendrombohitra Karmela. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary nanatona ny vahoaka rehetra i Elia ka niteny hoe: Mandra-pahoviana no hiroa saina ianareo? Raha NY TOMPO no Andriamanitra, manaraha Azy! Fa raha ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Baala
  - type: text
    text: ' kosa dia manaraha azy! Nefa tsy namaly azy ny olona na dia indraimbava aza. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Dia hoy i Elia tamin’ny olona: Izaho dia izaho irery ihany no sisa amin’ny mpaminanin’NY TOMPO; fa ny mpaminanin’ny Baala kosa dia dimampolo sy efajato lahy. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Koa aoka ireo no hanome vantotra ombilahy roa; ary aoka izy no hifidy ny iray, dia handrasa azy ka hametraka azy eo ambonin’ny kitay hazo, nefa tsy handrehetana afo; ary izaho kosa dia hanamboatra ny iray hafa ka hametraka azy eo ambonin’ny kitay hazo, nefa tsy handrehetana afo koa. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Dia miantsoa ny anaran’ny andriamanitrareo ianareo, ary izaho kosa dia hiantso ny anaran’NY TOMPO. Izay andriamanitra mamaly amin’ny afo, Izy no Andriamanitra. Ary ny olona rehetra dia namaly hoe: Marina izany teny izany!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary hoy i Elia tamin’ireo mpaminanin’ny Baala: Mifidiana vantotra ombilahy iray ho anareo ka manamboara aloha ianareo, satria ianareo no maro; ary miantsoa ny anaran’ny andriamanitrareo, nefa aza mandrehitra afo. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Dia naka ny vantotra ombilahy izay nomena azy izy ireo ka nanamboatra azy, dia niantso ny anaran’ny Baala hatry ny maraina ka mandra-pitataovovonan’ny andro izy ireo ka niantso hoe: Ry Baala ô, henoy izahay! Kanjo tsy nisy feo na valinteny akory. Dia nihinjakinjaka teo anoloan’ny alitara izay nataony koa izy ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Nony nitataovovonana ny andro dia nanesoeso azy i Elia hoe: Miantsoa mafy ihany, fa andriamanitra izy! Angamba varian-dresaka izy, na mbola mivoaka, na mbola nisy nalehany, na angamba matory izy ka mila hofohazina! '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Dia niantso mafy indray ireo sady nitetika ny tenany tamin’ny sabatra sy ny lefona araka ny fanaony, hany ka loa-dra ny tenany. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Ary na dia efa nihilana aza ny andro dia mbola naminany teo ihany ireo hatramin’ny fotoana fanolorana ny fanatitra, nefa tsy nisy feo na valinteny ary tsy nisy nihaino azy akory.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Hoy amin’izay i Elia tamin’ny olona rehetra: Manatòna ahy! Dia nanatona azy ny olona rehetra. Namboatra ny alitaran’NY TOMPO izay rava aloha i Elia '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'ka naka vato roa amby folo, araka ny isan’ny fokon’ny zanak’i Jakoba izay niavian’ilay tenin’NY TOMPO hoe: Israely no anaranao; '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'ireo vato ireo dia nataony alitara ho an’ny anaran’NY TOMPO. Dia nanao hady kely manodidina ny alitara koa izy, izay mahalany rano indroan’ny vata famarana voa maina. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Avy eo izy dia nandahatra ny kitay hazo sady nandrasa ny vantotra ombilahy ka nametraka azy teo ambonin’ny kitay hazo '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'ary niteny hoe: Fenoy rano ny siny efatra ka aidino eo amin’ny fanatitra dorana manontolo sy eo amin’ny kitay hazo. Dia hoy koa izy: Ataovy indray mandeha koa izany. Dia nataon’izy ireo indray. Ary hoy indray izy: Mbola ataovy indray mandeha ihany koa izany. Dia nataon’izy ireo indray koa. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Ary ny rano dia niraraka nanodidina ny alitara ka feno rano koa hatramin’ilay hady kely.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Nony tamin’ny fotoana fanolorana ny fanatitra dia nanatona i Elia mpaminany ka niteny hoe: Ry TOMPO, Andriamanitr’i Abrahama sy Isaka ary Israely ô! Aoka ho fantatra anio fa Ianao no Andriamanitra amin’ny Israely, ary izaho no mpanomponao, ary araka ny teninao no nanaovako izao zavatra izao! '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Mihainoa ahy, mihainoa ahy, ry TOMPO ô, mba hahafantaran’ireto olona ireto fa Ianao TOMPO no Andriamanitra, ary Ianao no mampiverina ny fony indray!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Dia nilatsaka ny afon’NY TOMPO ka nandevona ny fanatitra dorana manontolo sy ny kitay hazo mbamin’ny vato sy ny vovoka sady nandritra ny rano tao amin’ilay hady kely. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Raha nahita izany ny olona rehetra dia niankohoka tamin’ny tany ary niteny hoe: NY TOMPO, Izy no Andriamanitra! NY TOMPO, Izy no Andriamanitra! '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Hoy i Elia tamin’izy ireo: Sambory ireo mpaminanin’ny Baala! Aza avela hisy afa-mandositra na dia iray akory aza! Dia nosamborin’ny olona izy ireo ary noentin’i Elia ho eo amin’ny ony Kisona ka novonoiny tany.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mampandre ny hilatsahan’ny ranonorana indray i Elia
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Ary hoy i Elia tamin’i Ahaba: Miakara hihinana sy hisotro, fa ranonorambe izao misasasasa izao! '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Dia niakatra hihinana sy hisotro i Ahaba. Fa i Elia kosa dia niakatra ho eo an-tampon’i Karmela dia niankohoka tamin’ny tany, ary ny lohany nataony teo anelanelan’ny lohaliny. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Hoy izy tamin’ny zatovony: Miakara kely ka tazano ny ranomasina! Dia niakatra izy ka nitazana ary nilaza hoe: Tsy misy na inona na inona. Impito i Elia no niteny taminy hoe: Miverena! '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Nony fanimpitony dia hoy ilay zatovo: Misy rahona kely ohatra ny felatanan’olona miakatra avy eny amin’ny ranomasina. Dia hoy i Elia: Miakara ka lazao amin’i Ahaba hoe: Amboary ny kalesinao ka midìna, fandrao voasakan’ny ranonorana ianao! '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Ary nihamaizina ny lanitra noho ny rahona sy ny rivotra ka nisy ranonorambe. Dia niakatra tamin’ny kalesy i Ahaba ka nankany Jezirela. '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: Ary ny tanan’NY TOMPO dia tamin’i Elia ka nisikina izy ary nihazakazaka teo alohan’i Ahaba mandra-pahatongany tany Jezirela.
