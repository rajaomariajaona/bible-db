document_id: 1KI.18,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: I Elia sy i Obadia
  - type: text
    content: 'Nony afaka andro maro dia tonga tamin’i Elia ny tenin’NY TOMPO, tamin’ny taona fahatelo hoe: Mandehana miseho amin’i Ahaba fa handatsaka ranonorana amin’ny tany Aho. '
  '10':
  - type: text
    content: 'Raha velona koa NY TOMPO Andriamanitrao, dia tsy misy firenena na fanjakana izay tsy nanirahan’ny tompoko hitady anao; ary raha hoy ny olona hoe: Tsy ato izy, dia nampianianiny izany firenena sy fanjakana izany fa tsy nahita anao tokoa izy ireo. '
  '11':
  - type: text
    content: 'Koa ankehitriny, hoy ianao: Andeha, lazao amin’ny tomponao hoe: Injao, atsy i Elia! '
  '12':
  - type: text
    content: 'Nefa raha vao miala eto aminao aho dia hoentin’ny Fanahin’NY TOMPO any amin’izay tsy fantatro ianao; koa raha tonga aho ka milaza amin’i Ahaba, nefa tsy ho hitany ianao tsinona, dia hovonoiny aho. Izaho mpanomponao anefa dia matahotra NY TOMPO hatry ny fahakeliny. '
  '13':
  - type: text
    content: 'Moa tsy nolazaina taminao va, tompoko, izay nataoko tamin’ilay namonoan’i Jezebela ny mpaminanin’NY TOMPO, dia ny nanafenako ny mpaminanin’NY TOMPO zato lahy, ka dimampolo avy no nataoko tao amin’ny zohy iray, ary novelomiko tamin’ny mofo sy rano ireo? '
  '14':
  - type: text
    content: 'Nefa ankehitriny, hoy ianao: Andeha, lazao amin’ny tomponao hoe: Injao, atsy i Elia! Dia hamono ahy i Ahaba! '
  '15':
  - type: text
    content: 'Hoy anefa i Elia: Raha velona koa Andriamanitra, Tompon’izao rehetra izao, izay tompoiko, dia hiseho amin’i Ahaba tokoa aho anio.'
  - type: heading
    content: I Elia sy i Ahaba
  '16':
  - type: text
    content: 'Dia lasa i Obadia nitsena an’i Ahaba ka nilaza taminy. Ary nandeha hitsena an’i Elia i Ahaba. '
  '17':
  - type: text
    content: 'Nony hitan’i Ahaba i Elia dia hoy izy taminy: Hay! Tonga etỳ ianao, ry ilay mpampidi-doza amin’ny Israely! '
  '18':
  - type: text
    content: 'Hoy anefa i Elia: Tsy izaho no nampidi-doza tamin’ny Israely fa ianao sy ny mpianakavin’ny rainao ihany, tamin’ny nandaozanareo ny didin’NY TOMPO sy ny nanarahanao ireo '
  - type: text
    content: Baala
  - type: text
    content: '. '
  '19':
  - type: text
    content: 'Koa ankehitriny, maniraha olona hamory ny Israely rehetra hihaona amiko any an-tendrombohitra Karmela, ary vorio any koa ny mpaminanin’ireo Baala dimampolo sy efajato sy ireo mpaminanin’ny '
  - type: text
    content: Aseraha
  - type: text
    content: ' efajato, izay mihinana eo amin’ny latabatr’i Jezebela.'
  - type: heading
    content: I Elia sy ireo mpaminanin’ny Baala tao Karmela
  '2':
  - type: text
    content: Dia niainga i Elia hiseho amin’i Ahaba.
  - type: text
    content: 'Mafy ny mosary tany Samaria. '
  '20':
  - type: text
    content: 'Dia nandefa iraka tany amin’ny Zanak’Israely rehetra i Ahaba ka namory ny mpaminany ho any amin’ny tendrombohitra Karmela. '
  '21':
  - type: text
    content: 'Ary nanatona ny vahoaka rehetra i Elia ka niteny hoe: Mandra-pahoviana no hiroa saina ianareo? Raha NY TOMPO no Andriamanitra, manaraha Azy! Fa raha ny '
  - type: text
    content: Baala
  - type: text
    content: ' kosa dia manaraha azy! Nefa tsy namaly azy ny olona na dia indraimbava aza. '
  '22':
  - type: text
    content: 'Dia hoy i Elia tamin’ny olona: Izaho dia izaho irery ihany no sisa amin’ny mpaminanin’NY TOMPO; fa ny mpaminanin’ny Baala kosa dia dimampolo sy efajato lahy. '
  '23':
  - type: text
    content: 'Koa aoka ireo no hanome vantotra ombilahy roa; ary aoka izy no hifidy ny iray, dia handrasa azy ka hametraka azy eo ambonin’ny kitay hazo, nefa tsy handrehetana afo; ary izaho kosa dia hanamboatra ny iray hafa ka hametraka azy eo ambonin’ny kitay hazo, nefa tsy handrehetana afo koa. '
  '24':
  - type: text
    content: 'Dia miantsoa ny anaran’ny andriamanitrareo ianareo, ary izaho kosa dia hiantso ny anaran’NY TOMPO. Izay andriamanitra mamaly amin’ny afo, Izy no Andriamanitra. Ary ny olona rehetra dia namaly hoe: Marina izany teny izany!'
  '25':
  - type: text
    content: 'Ary hoy i Elia tamin’ireo mpaminanin’ny Baala: Mifidiana vantotra ombilahy iray ho anareo ka manamboara aloha ianareo, satria ianareo no maro; ary miantsoa ny anaran’ny andriamanitrareo, nefa aza mandrehitra afo. '
  '26':
  - type: text
    content: 'Dia naka ny vantotra ombilahy izay nomena azy izy ireo ka nanamboatra azy, dia niantso ny anaran’ny Baala hatry ny maraina ka mandra-pitataovovonan’ny andro izy ireo ka niantso hoe: Ry Baala ô, henoy izahay! Kanjo tsy nisy feo na valinteny akory. Dia nihinjakinjaka teo anoloan’ny alitara izay nataony koa izy ireo. '
  '27':
  - type: text
    content: 'Nony nitataovovonana ny andro dia nanesoeso azy i Elia hoe: Miantsoa mafy ihany, fa andriamanitra izy! Angamba varian-dresaka izy, na mbola mivoaka, na mbola nisy nalehany, na angamba matory izy ka mila hofohazina! '
  '28':
  - type: text
    content: 'Dia niantso mafy indray ireo sady nitetika ny tenany tamin’ny sabatra sy ny lefona araka ny fanaony, hany ka loa-dra ny tenany. '
  '29':
  - type: text
    content: Ary na dia efa nihilana aza ny andro dia mbola naminany teo ihany ireo hatramin’ny fotoana fanolorana ny fanatitra, nefa tsy nisy feo na valinteny ary tsy nisy nihaino azy akory.
  '3':
  - type: text
    content: 'Ary niantso an’i Obadia, izay lehiben’ny tao an-dapany, i Ahaba. Fa i Obadia dia natahotra NY TOMPO tokoa, '
  '30':
  - type: text
    content: 'Hoy amin’izay i Elia tamin’ny olona rehetra: Manatòna ahy! Dia nanatona azy ny olona rehetra. Namboatra ny alitaran’NY TOMPO izay rava aloha i Elia '
  '31':
  - type: text
    content: 'ka naka vato roa amby folo, araka ny isan’ny fokon’ny zanak’i Jakoba izay niavian’ilay tenin’NY TOMPO hoe: Israely no anaranao; '
  '32':
  - type: text
    content: 'ireo vato ireo dia nataony alitara ho an’ny anaran’NY TOMPO. Dia nanao hady kely manodidina ny alitara koa izy, izay mahalany rano indroan’ny vata famarana voa maina. '
  '33':
  - type: text
    content: 'Avy eo izy dia nandahatra ny kitay hazo sady nandrasa ny vantotra ombilahy ka nametraka azy teo ambonin’ny kitay hazo '
  '34':
  - type: text
    content: 'ary niteny hoe: Fenoy rano ny siny efatra ka aidino eo amin’ny fanatitra dorana manontolo sy eo amin’ny kitay hazo. Dia hoy koa izy: Ataovy indray mandeha koa izany. Dia nataon’izy ireo indray. Ary hoy indray izy: Mbola ataovy indray mandeha ihany koa izany. Dia nataon’izy ireo indray koa. '
  '35':
  - type: text
    content: Ary ny rano dia niraraka nanodidina ny alitara ka feno rano koa hatramin’ilay hady kely.
  '36':
  - type: text
    content: 'Nony tamin’ny fotoana fanolorana ny fanatitra dia nanatona i Elia mpaminany ka niteny hoe: Ry TOMPO, Andriamanitr’i Abrahama sy Isaka ary Israely ô! Aoka ho fantatra anio fa Ianao no Andriamanitra amin’ny Israely, ary izaho no mpanomponao, ary araka ny teninao no nanaovako izao zavatra izao! '
  '37':
  - type: text
    content: Mihainoa ahy, mihainoa ahy, ry TOMPO ô, mba hahafantaran’ireto olona ireto fa Ianao TOMPO no Andriamanitra, ary Ianao no mampiverina ny fony indray!
  '38':
  - type: text
    content: 'Dia nilatsaka ny afon’NY TOMPO ka nandevona ny fanatitra dorana manontolo sy ny kitay hazo mbamin’ny vato sy ny vovoka sady nandritra ny rano tao amin’ilay hady kely. '
  '39':
  - type: text
    content: 'Raha nahita izany ny olona rehetra dia niankohoka tamin’ny tany ary niteny hoe: NY TOMPO, Izy no Andriamanitra! NY TOMPO, Izy no Andriamanitra! '
  '4':
  - type: text
    content: 'fa tamin’ny nandringanan’i Jezebela ny mpaminanin’NY TOMPO dia nalain’i Obadia ny mpaminany zato ka nafeniny, dimampolo avy no nataony tao amin’ny zohy iray, ary novelominy tamin’ny mofo sy rano ireo. '
  '40':
  - type: text
    content: 'Hoy i Elia tamin’izy ireo: Sambory ireo mpaminanin’ny Baala! Aza avela hisy afa-mandositra na dia iray akory aza! Dia nosamborin’ny olona izy ireo ary noentin’i Elia ho eo amin’ny ony Kisona ka novonoiny tany.'
  - type: heading
    content: Mampandre ny hilatsahan’ny ranonorana indray i Elia
  '41':
  - type: text
    content: 'Ary hoy i Elia tamin’i Ahaba: Miakara hihinana sy hisotro, fa ranonorambe izao misasasasa izao! '
  '42':
  - type: text
    content: 'Dia niakatra hihinana sy hisotro i Ahaba. Fa i Elia kosa dia niakatra ho eo an-tampon’i Karmela dia niankohoka tamin’ny tany, ary ny lohany nataony teo anelanelan’ny lohaliny. '
  '43':
  - type: text
    content: 'Hoy izy tamin’ny zatovony: Miakara kely ka tazano ny ranomasina! Dia niakatra izy ka nitazana ary nilaza hoe: Tsy misy na inona na inona. Impito i Elia no niteny taminy hoe: Miverena! '
  '44':
  - type: text
    content: 'Nony fanimpitony dia hoy ilay zatovo: Misy rahona kely ohatra ny felatanan’olona miakatra avy eny amin’ny ranomasina. Dia hoy i Elia: Miakara ka lazao amin’i Ahaba hoe: Amboary ny kalesinao ka midìna, fandrao voasakan’ny ranonorana ianao! '
  '45':
  - type: text
    content: 'Ary nihamaizina ny lanitra noho ny rahona sy ny rivotra ka nisy ranonorambe. Dia niakatra tamin’ny kalesy i Ahaba ka nankany Jezirela. '
  '46':
  - type: text
    content: Ary ny tanan’NY TOMPO dia tamin’i Elia ka nisikina izy ary nihazakazaka teo alohan’i Ahaba mandra-pahatongany tany Jezirela.
  '5':
  - type: text
    content: 'Hoy i Ahaba tamin’i Obadia: Andeha mitety ny tany, hatrany amin’ny loharano rehetra sy hatrany amin’ny lohasahan-driaka rehetra; fa angamba hahita ahitra hamelomana ny soavaly sy ny ampondra isika ka mba tsy hisy hovonointsika ny biby fiompintsika. '
  '6':
  - type: text
    content: Dia nizara lalana izy ka i Ahaba dia nandeha irery tamin’ny lalana iray, ary i Obadia koa nandeha irery tamin’ny lalana iray hafa.
  '7':
  - type: text
    content: 'Rehefa tany an-dalana i Obadia dia indro, nifanena taminy i Elia. Nahafantatra azy izy ka niankohoka sady niteny hoe: Hay ianao va ity, ry Elia tompoko? '
  '8':
  - type: text
    content: 'Ary hoy izy hoe: Eny, izaho ity. Andeha, lazao amin’ny tomponao hoe: Injao, atsy i Elia! '
  '9':
  - type: text
    content: 'Hoy anefa i Obadia: Inona no heloko, no anoloranao ny mpanomponao ho eo an-tanan’i Ahaba hamonoany ahy? '
