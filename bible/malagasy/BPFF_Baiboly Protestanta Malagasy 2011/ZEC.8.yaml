document_id: ZEC.8
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Teny fikasana ny hisian’ny fiadanana sy taon-jina
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary tonga ny tenin’Andriamanitra, Tompon’izao rehetra izao hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Izao no lazain’Andriamanitra, Tompon’izao rehetra izao:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Saro-piaro dia saro-piaro ny amin’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Ziona
  - type: text
    text: ' Aho,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, saro-piaro ny aminy, amin’ny fahatezerana mafy Aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Izao no lazain’NY TOMPO:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Efa tafaverina eto Ziona Aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka honina eto afovoan’i Jerosalema;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary i Jerosalema dia hatao hoe Tanànan’ny fahamarinana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny tendrombohitr’Andriamanitra, Tompon’izao rehetra izao, dia hatao hoe Tendrombohitra masina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Izao no lazain’Andriamanitra, Tompon’izao rehetra izao:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mbola hisy lahiantitra sy vaviantitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: hipetraka eny amin’ny kianja malalaka ao Jerosalema,
- type: usfm
  marker: q1
  children:
  - type: text
    text: samy hanana tehina eny an-tanany noho ny fahanterany;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ary ny kianja malalaka ao amin’ny tanàna
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ho feno ankizilahy madinika sy ankizivavy madinika
- type: usfm
  marker: q1
  children:
  - type: text
    text: milalao eny amin’ny kianja.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Izao no lazain’Andriamanitra, Tompon’izao rehetra izao:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Raha mahagaga izany
- type: usfm
  marker: q1
  children:
  - type: text
    text: eo imason’ny sisa tavela amin’ity firenena ity amin’izany andro izany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: moa hahagaga eo imasoko koa va?
- type: usfm
  marker: q1
  children:
  - type: text
    text: hoy Andriamanitra, Tompon’izao rehetra izao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Izao no lazain’Andriamanitra, Tompon’izao rehetra izao:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Indro, mamonjy ny oloko
- type: usfm
  marker: q1
  children:
  - type: text
    text: avy any amin’ny tany atsinanana sy avy any amin’ny tany andrefana Aho;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: hitondra azy Aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka honina ao afovoan’i Jerosalema izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ho oloko izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary Izaho kosa ho Andriamaniny
- type: usfm
  marker: q1
  children:
  - type: text
    text: amin’ny fahamarinana sy ny fahitsiana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Izao no lazain’Andriamanitra, Tompon’izao rehetra izao:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aoka hatanjaka ny tananareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ianareo izay mandre izany teny izany amin’izao andro izao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: avy amin’ny vavan’ny mpaminany
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay teo tamin’ny andro nanaovana ny fanorenan’ny tranon’Andriamanitra, Tompon’izao rehetra izao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hanorenana ny tempoly.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Fa talohan’izany andro izany
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia tsy nisy valin-kasasarana ho an’ny olona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: na valim-pahasasarana ho an’ny biby fiompy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy nisy fiadanana ho an’izay nivoaka sy izay niditra
- type: usfm
  marker: q1
  children:
  - type: text
    text: noho ny fahavalo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa nalefako hifamely amin’ny namany avy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny olona rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Fa amin’izao kosa
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia tsy ho toy ny tamin’ny fahiny intsony
- type: usfm
  marker: q1
  children:
  - type: text
    text: amin’ny sisa amin’ity firenena ity Aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hoy Andriamanitra, Tompon’izao rehetra izao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Fa hamafy amin’ny fiadanana ny olona:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny voaloboka dia hamoa,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny tany dia hahavokatra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny lanitra dia hampilatsaka ny andony
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny sisa amin’ity firenena ity
- type: usfm
  marker: q1
  children:
  - type: text
    text: no hampandovaiko izany rehetra izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary toy ny nahatonga anareo ho fanozonana tany amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jentilisa
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: ry taranak’i Joda sy ry taranak’Israely,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ho toy izany no hamonjeko anareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka ho tonga fitahiana kosa ianareo.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aza matahotra
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa mahereza ianareo!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Fa izao no lazain’Andriamanitra, Tompon’izao rehetra izao:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Toy ny nisainako hahatonga loza aminareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: tamin’ny nampahatezeran’ny razanareo Ahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hoy Andriamanitra, Tompon’izao rehetra izao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy nanenina Aho,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: dia ho toy izany kosa no niovako hevitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka nisainako
- type: usfm
  marker: q1
  children:
  - type: text
    text: hanisy soa an’i Jerosalema sy ny taranak’i Joda amin’izao andro izao.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aza matahotra ianareo!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Izao no zavatra hataonareo:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Samia miteny marina amin’ny namany avy ianareo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mitsarà marina, eny, mitsarà hahatonga fiadanana ao am-bavahadinareo;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ary aza misy mieritreritra ao am-ponareo hanisy ratsy ny namanareo ianareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary aza tia fianianana mandainga;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa izany rehetra izany dia halako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hoy NY TOMPO.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ho tonga andro fifaliana ny andro fifadian-kanina
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary tonga tamiko ny tenin’Andriamanitra, Tompon’izao rehetra izao hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Izao no lazain’Andriamanitra, Tompon’izao rehetra izao:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny fifadian-kanina amin’ny volana fahefatra, ny fifadian-kanina amin’ny volana fahadimy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny fifadian-kanina amin’ny volana fahafito ary ny fifadian-kanina amin’ny volana fahafolo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia samy ho tonga fifaliana sy firavoravoana ary fotoana mahafinaritra avokoa
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho an’ny taranak’i Joda.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa aoka ianareo ho tia ny fahamarinana sy ny fiadanana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Izao no lazain’Andriamanitra, Tompon’izao rehetra izao:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mbola hisy firenena
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy mponina avy amin’ny tanàna maro ho tonga;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'ary ny mponina ao amin’ny tanàna iray dia hankany amin’ny tanàna iray hafa ka hiteny hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aoka handeha tokoa isika hifona amin’NY TOMPO
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy hitady an’Andriamanitra, Tompon’izao rehetra izao!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izaho koa dia mba handeha!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Eny, ho avy ny olona maro
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny firenena mahery mba hitady an’Andriamanitra, Tompon’izao rehetra izao, any Jerosalema
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy hifona amin’NY TOMPO.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Izao no lazain’Andriamanitra, Tompon’izao rehetra izao: Amin’izany andro izany dia hisy folo lahy avy amin’ny firenena samihafa fiteny rehetra hihazona ny sisin-damban’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jiosy
  - type: text
    text: ' iray ka hiteny hoe: Mba handeha hiaraka aminareo izahay, fa renay fa momba anareo Andriamanitra.'
