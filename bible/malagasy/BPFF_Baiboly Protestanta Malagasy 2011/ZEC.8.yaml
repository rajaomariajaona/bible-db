document_id: ZEC.8,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Teny fikasana ny hisian’ny fiadanana sy taon-jina
  - type: text
    content: 'Ary tonga ny tenin’Andriamanitra, Tompon’izao rehetra izao hoe: '
  '10':
  - type: text
    content: Fa talohan’izany andro izany
  - type: text
    content: dia tsy nisy valin-kasasarana ho an’ny olona,
  - type: text
    content: na valim-pahasasarana ho an’ny biby fiompy;
  - type: text
    content: ary tsy nisy fiadanana ho an’izay nivoaka sy izay niditra
  - type: text
    content: noho ny fahavalo,
  - type: text
    content: fa nalefako hifamely amin’ny namany avy
  - type: text
    content: ny olona rehetra.
  '11':
  - type: text
    content: Fa amin’izao kosa
  - type: text
    content: dia tsy ho toy ny tamin’ny fahiny intsony
  - type: text
    content: amin’ny sisa amin’ity firenena ity Aho,
  - type: text
    content: hoy Andriamanitra, Tompon’izao rehetra izao.
  '12':
  - type: text
    content: 'Fa hamafy amin’ny fiadanana ny olona:'
  - type: text
    content: Ny voaloboka dia hamoa,
  - type: text
    content: ny tany dia hahavokatra,
  - type: text
    content: ny lanitra dia hampilatsaka ny andony
  - type: text
    content: ary ny sisa amin’ity firenena ity
  - type: text
    content: no hampandovaiko izany rehetra izany.
  '13':
  - type: text
    content: 'Ary toy ny nahatonga anareo ho fanozonana tany amin’ny '
  - type: text
    content: Jentilisa
  - type: text
    content: ','
  - type: text
    content: ry taranak’i Joda sy ry taranak’Israely,
  - type: text
    content: dia ho toy izany no hamonjeko anareo
  - type: text
    content: ka ho tonga fitahiana kosa ianareo.
  - type: text
    content: Aza matahotra
  - type: text
    content: fa mahereza ianareo!
  '14':
  - type: text
    content: 'Fa izao no lazain’Andriamanitra, Tompon’izao rehetra izao:'
  - type: text
    content: Toy ny nisainako hahatonga loza aminareo
  - type: text
    content: tamin’ny nampahatezeran’ny razanareo Ahy,
  - type: text
    content: hoy Andriamanitra, Tompon’izao rehetra izao,
  - type: text
    content: ary tsy nanenina Aho,
  '15':
  - type: text
    content: dia ho toy izany kosa no niovako hevitra
  - type: text
    content: ka nisainako
  - type: text
    content: hanisy soa an’i Jerosalema sy ny taranak’i Joda amin’izao andro izao.
  - type: text
    content: Aza matahotra ianareo!
  '16':
  - type: text
    content: 'Izao no zavatra hataonareo:'
  - type: text
    content: Samia miteny marina amin’ny namany avy ianareo;
  - type: text
    content: mitsarà marina, eny, mitsarà hahatonga fiadanana ao am-bavahadinareo;
  '17':
  - type: text
    content: ary aza misy mieritreritra ao am-ponareo hanisy ratsy ny namanareo ianareo
  - type: text
    content: ary aza tia fianianana mandainga;
  - type: text
    content: fa izany rehetra izany dia halako,
  - type: text
    content: hoy NY TOMPO.
  - type: heading
    content: Ho tonga andro fifaliana ny andro fifadian-kanina
  '18':
  - type: text
    content: 'Ary tonga tamiko ny tenin’Andriamanitra, Tompon’izao rehetra izao hoe: '
  '19':
  - type: text
    content: 'Izao no lazain’Andriamanitra, Tompon’izao rehetra izao:'
  - type: text
    content: Ny fifadian-kanina amin’ny volana fahefatra, ny fifadian-kanina amin’ny volana fahadimy,
  - type: text
    content: ny fifadian-kanina amin’ny volana fahafito ary ny fifadian-kanina amin’ny volana fahafolo,
  - type: text
    content: dia samy ho tonga fifaliana sy firavoravoana ary fotoana mahafinaritra avokoa
  - type: text
    content: ho an’ny taranak’i Joda.
  - type: text
    content: Fa aoka ianareo ho tia ny fahamarinana sy ny fiadanana.
  '2':
  - type: text
    content: 'Izao no lazain’Andriamanitra, Tompon’izao rehetra izao:'
  - type: text
    content: 'Saro-piaro dia saro-piaro ny amin’i '
  - type: text
    content: Ziona
  - type: text
    content: ' Aho,'
  - type: text
    content: eny, saro-piaro ny aminy, amin’ny fahatezerana mafy Aho.
  '20':
  - type: text
    content: 'Izao no lazain’Andriamanitra, Tompon’izao rehetra izao:'
  - type: text
    content: Mbola hisy firenena
  - type: text
    content: sy mponina avy amin’ny tanàna maro ho tonga;
  '21':
  - type: text
    content: 'ary ny mponina ao amin’ny tanàna iray dia hankany amin’ny tanàna iray hafa ka hiteny hoe:'
  - type: text
    content: Aoka handeha tokoa isika hifona amin’NY TOMPO
  - type: text
    content: sy hitady an’Andriamanitra, Tompon’izao rehetra izao!
  - type: text
    content: Izaho koa dia mba handeha!
  '22':
  - type: text
    content: Eny, ho avy ny olona maro
  - type: text
    content: sy ny firenena mahery mba hitady an’Andriamanitra, Tompon’izao rehetra izao, any Jerosalema
  - type: text
    content: sy hifona amin’NY TOMPO.
  '23':
  - type: text
    content: 'Izao no lazain’Andriamanitra, Tompon’izao rehetra izao: Amin’izany andro izany dia hisy folo lahy avy amin’ny firenena samihafa fiteny rehetra hihazona ny sisin-damban’ny '
  - type: text
    content: Jiosy
  - type: text
    content: ' iray ka hiteny hoe: Mba handeha hiaraka aminareo izahay, fa renay fa momba anareo Andriamanitra.'
  '3':
  - type: text
    content: 'Izao no lazain’NY TOMPO:'
  - type: text
    content: Efa tafaverina eto Ziona Aho
  - type: text
    content: ka honina eto afovoan’i Jerosalema;
  - type: text
    content: ary i Jerosalema dia hatao hoe Tanànan’ny fahamarinana,
  - type: text
    content: ary ny tendrombohitr’Andriamanitra, Tompon’izao rehetra izao, dia hatao hoe Tendrombohitra masina.
  '4':
  - type: text
    content: 'Izao no lazain’Andriamanitra, Tompon’izao rehetra izao:'
  - type: text
    content: Mbola hisy lahiantitra sy vaviantitra
  - type: text
    content: hipetraka eny amin’ny kianja malalaka ao Jerosalema,
  - type: text
    content: samy hanana tehina eny an-tanany noho ny fahanterany;
  '5':
  - type: text
    content: ary ny kianja malalaka ao amin’ny tanàna
  - type: text
    content: dia ho feno ankizilahy madinika sy ankizivavy madinika
  - type: text
    content: milalao eny amin’ny kianja.
  '6':
  - type: text
    content: 'Izao no lazain’Andriamanitra, Tompon’izao rehetra izao:'
  - type: text
    content: Raha mahagaga izany
  - type: text
    content: eo imason’ny sisa tavela amin’ity firenena ity amin’izany andro izany,
  - type: text
    content: moa hahagaga eo imasoko koa va?
  - type: text
    content: hoy Andriamanitra, Tompon’izao rehetra izao.
  '7':
  - type: text
    content: 'Izao no lazain’Andriamanitra, Tompon’izao rehetra izao:'
  - type: text
    content: Indro, mamonjy ny oloko
  - type: text
    content: avy any amin’ny tany atsinanana sy avy any amin’ny tany andrefana Aho;
  '8':
  - type: text
    content: hitondra azy Aho
  - type: text
    content: ka honina ao afovoan’i Jerosalema izy;
  - type: text
    content: dia ho oloko izy,
  - type: text
    content: ary Izaho kosa ho Andriamaniny
  - type: text
    content: amin’ny fahamarinana sy ny fahitsiana.
  '9':
  - type: text
    content: 'Izao no lazain’Andriamanitra, Tompon’izao rehetra izao:'
  - type: text
    content: Aoka hatanjaka ny tananareo,
  - type: text
    content: dia ianareo izay mandre izany teny izany amin’izao andro izao,
  - type: text
    content: avy amin’ny vavan’ny mpaminany
  - type: text
    content: izay teo tamin’ny andro nanaovana ny fanorenan’ny tranon’Andriamanitra, Tompon’izao rehetra izao,
  - type: text
    content: mba hanorenana ny tempoly.
