document_id: JER.6,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Misy loza sy fandringanana be mandrahona an’i Jerosalema
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Mandosira haingana hiala an’i Jerosalema, ianareo zanak’i Benjamina!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsofy ao Tekoa ny anjomara
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka manangàna famantarana ao Bety-Hakerema;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa misy loza sy fandringanana be miposaka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avy any avaratra.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Iza no hilazako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy hanariko mba handrenesany?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro, ny sofiny dia tsy voafora
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy mahahaino izy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: E! Ny tenin’NY TOMPO
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia fahafaham-baraka ho azy ireo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy ankamamìny.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Fa feno ny fahatezeran’NY TOMPO aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy zakako tsindriana intsony izany!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aidino amin’ny ankizy madinika eny an-dalambe
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy amin’ny andian-jatovo izany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa na lehilahy na vehivavy dia hosamborina avokoa,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na ny antitra sy efa ela niainana koa.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Ho lasan’ny sasany ny tranony
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mbamin’ny sahany sy ny vehivavy koa;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa hatsotrako amin’ny mponina amin’ny tany ny tanako,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy NY TOMPO.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Satria izy rehetra, na ny kely na ny lehibe,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia samy fatra-pila harena avokoa;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na ny mpaminany na ny mpisorona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia samy mamitaka avokoa.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Fa nataotaony foana ny fanasitranany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny faharatran’ny oloko zanakavavy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'tamin’ny nitenenany hoe: Fiadanana, fiadanana!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Kanjo tsy misy fiadanana akory!
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Nitafy henatra izy noho ny nanaovany fahavetavetana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa tsy mba nahatsiaro menatra akory izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy mba tsapany ny hadisoany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: koa ho lavo miaraka amin’izay lavo izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: amin’ny andro hamaliako azy dia ho tafintohina izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy NY TOMPO.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Izao no lazain’NY TOMPO:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mijanòna eo an-dalana ianareo ka zahao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ary anontanio izay lalana masaka hatry ny ela:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aiza izay lalana mankany amin’ny tsara? Iny no izory,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hahita fitsaharana ho an’ny fanahinareo ianareo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'nefa hoy izy ireo:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy hizotra amin’iny izahay.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Ary nasiako mpitily teo aminareo hiteny hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Henoy ny feon’ny anjomara!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Nefa hoy ianareo:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy hihaino izahay.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Koa henoinareo, ry '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jentilisa
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary aoka ho fantatrareo, ry fiangonana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny hanjo azy.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Henoy, ry tany!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro, Izaho hahatonga loza amin’ity firenena ity,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ny vokatry ny heviny ihany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa tsy nihaino ny teniko izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary nolaviny ny lalànako.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Aringako ilay tsara tarehy sy mihantahanta,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'dia i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Ziona
    - type: text
      text: ' zanakavavy.'
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Nahoana Aho no itondrana ditin-kazo mani-pofona avy any Sheba
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy veromanitra avy any amin’ny tany lavitra?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy sitrako ny fanatitra doranareo manontolo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy mamiko ny zavatra vonoinareo hatao fanatitra.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Koa izao no lazain’NY TOMPO:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro, hasiako fahatafintohinana eo amin’ity firenena ity
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka samy ho tafintohina amin’izany ny ray mbamin’ny zanany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho faty ny mpiaramonina mbamin’ny namany.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Efa an-dalana ny mpandringana
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Izao no lazain’NY TOMPO:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro, misy firenena avy any amin’ny tany avaratra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia firenena lehibe mitsangana avy any amin’ny faran’ny tany.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Tsipìka sy lefona no entiny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: lozabe sady tsy mamindra fo izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny feony dia mirohondrohona toy ny ranomasina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mitaingin-tsoavaly izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady voaomana tahaka ny lehilahy ho amin’ny ady,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'hamelezana anao, ry '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Ziona
    - type: text
      text: ' zanakavavy.'
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Renay ny lazany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka miraviravy tanana izahay;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fahoriana no mahazo anay,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, fanaintainana tahaka ny vehivavy eo am-piterahana.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Aza mandeha ho any an-tsaha
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary aza mankeny amin’ny lalambe;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa manan-tsabatra ny fahavalo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: misy fampihorohoroana avy amin’ny manodidina.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Ry oloko zanakavavy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: misikìna lamba fisaonana ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mihosena lavenona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka manaova fisaonana toy ny fisaonana zanakalahy tokana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia fitomaniana fatratra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ho avy tampoka amintsika ny mpandringana.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mpikomy maditra
    marker-yv: yv-h
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Ho mpizaha toetra ao amin’ny oloko no nanendreko anao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ho fiarovana mafy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hahafantaranao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy hizahanao toetra ny alehany.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Tena mpikomy maditra avokoa izy rehetra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka mandehandeha manaratsy olona;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: varahina sy vy izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: samy mpanao ratsy avokoa izy rehetra.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: May ny tafoforana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: levon’ny afo ny firaka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: foana ny nandrendrehan’ny mpandrendrika,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa tsy voaisotra ny ratsy.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Ao aminy no alehan’ny mpiandry ondry sy ny ondriny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: haoriny manodidina azy ny tranolainy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka samy handany ny ao akaikiny avy izy.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Ataon’ny olona hoe volafotsy tsy ilaina izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria tsy ilain’NY TOMPO.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Miomàna ianareo hanao ady masina hamelezana azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mitsangàna ka andeha isika hamely azy antoandrobenanahary.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lozantsika! Fa lasan-davitra ny andro,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary efa mandroso ny aloky ny hariva.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Mitsangàna ka andeha isika hanao latsaka alina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary aoka horavantsika ny lapany.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fampandrenesana ampahibemaso
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Fa izao no lazain’Andriamanitra, Tompon’izao rehetra izao:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Kapao ny hazo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary manandrata tovon-tany hamelezana an’i Jerosalema;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: io ilay tanàna hovaliana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa feno fampahoriana ny ao anatiny.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Toy ny loharano mampiboiboika ny ranony
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no ampiboiboihany ny faharatsiany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: herisetra sy fandravana no re ao aminy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eo anatrehako mandrakariva
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny faharariana sy ny faharatrana.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Minoa anatra ianao, ry Jerosalema,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fandrao hiala aminao ny fanahiko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary fandrao hataoko tany lao ianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia tany tsy azo onenana.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Vahoaka mandà tsy hihaino
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Izao no lazain’Andriamanitra, Tompon’izao rehetra izao:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hotsimponina tsirairay toy ny fitsimpona voaloboka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay sisa amin’ny Israely;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avereno ho amin’ny rantsany indray ny tananao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toy ny an’ny mpioty voaloboka.
