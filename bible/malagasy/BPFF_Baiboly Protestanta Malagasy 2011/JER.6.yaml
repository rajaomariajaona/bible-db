document_id: JER.6,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Misy loza sy fandringanana be mandrahona an’i Jerosalema
  - type: text
    content: Mandosira haingana hiala an’i Jerosalema, ianareo zanak’i Benjamina!
  - type: text
    content: Tsofy ao Tekoa ny anjomara
  - type: text
    content: ka manangàna famantarana ao Bety-Hakerema;
  - type: text
    content: fa misy loza sy fandringanana be miposaka
  - type: text
    content: avy any avaratra.
  '10':
  - type: text
    content: Iza no hilazako
  - type: text
    content: sy hanariko mba handrenesany?
  - type: text
    content: Indro, ny sofiny dia tsy voafora
  - type: text
    content: ka tsy mahahaino izy.
  - type: text
    content: E! Ny tenin’NY TOMPO
  - type: text
    content: dia fahafaham-baraka ho azy ireo
  - type: text
    content: ka tsy ankamamìny.
  '11':
  - type: text
    content: Fa feno ny fahatezeran’NY TOMPO aho
  - type: text
    content: ka tsy zakako tsindriana intsony izany!
  - type: text
    content: Aidino amin’ny ankizy madinika eny an-dalambe
  - type: text
    content: sy amin’ny andian-jatovo izany;
  - type: text
    content: fa na lehilahy na vehivavy dia hosamborina avokoa,
  - type: text
    content: na ny antitra sy efa ela niainana koa.
  '12':
  - type: text
    content: Ho lasan’ny sasany ny tranony
  - type: text
    content: mbamin’ny sahany sy ny vehivavy koa;
  - type: text
    content: fa hatsotrako amin’ny mponina amin’ny tany ny tanako,
  - type: text
    content: hoy NY TOMPO.
  '13':
  - type: text
    content: Satria izy rehetra, na ny kely na ny lehibe,
  - type: text
    content: dia samy fatra-pila harena avokoa;
  - type: text
    content: na ny mpaminany na ny mpisorona
  - type: text
    content: dia samy mamitaka avokoa.
  '14':
  - type: text
    content: Fa nataotaony foana ny fanasitranany
  - type: text
    content: ny faharatran’ny oloko zanakavavy
  - type: text
    content: 'tamin’ny nitenenany hoe: Fiadanana, fiadanana!'
  - type: text
    content: Kanjo tsy misy fiadanana akory!
  '15':
  - type: text
    content: Nitafy henatra izy noho ny nanaovany fahavetavetana;
  - type: text
    content: nefa tsy mba nahatsiaro menatra akory izy
  - type: text
    content: ary tsy mba tsapany ny hadisoany,
  - type: text
    content: koa ho lavo miaraka amin’izay lavo izy;
  - type: text
    content: amin’ny andro hamaliako azy dia ho tafintohina izy,
  - type: text
    content: hoy NY TOMPO.
  '16':
  - type: text
    content: 'Izao no lazain’NY TOMPO:'
  - type: text
    content: Mijanòna eo an-dalana ianareo ka zahao
  - type: text
    content: 'ary anontanio izay lalana masaka hatry ny ela:'
  - type: text
    content: Aiza izay lalana mankany amin’ny tsara? Iny no izory,
  - type: text
    content: dia hahita fitsaharana ho an’ny fanahinareo ianareo;
  - type: text
    content: 'nefa hoy izy ireo:'
  - type: text
    content: Tsy hizotra amin’iny izahay.
  '17':
  - type: text
    content: 'Ary nasiako mpitily teo aminareo hiteny hoe:'
  - type: text
    content: Henoy ny feon’ny anjomara!
  - type: text
    content: 'Nefa hoy ianareo:'
  - type: text
    content: Tsy hihaino izahay.
  '18':
  - type: text
    content: 'Koa henoinareo, ry '
  - type: text
    content: Jentilisa
  - type: text
    content: ','
  - type: text
    content: ary aoka ho fantatrareo, ry fiangonana,
  - type: text
    content: ny hanjo azy.
  '19':
  - type: text
    content: Henoy, ry tany!
  - type: text
    content: Indro, Izaho hahatonga loza amin’ity firenena ity,
  - type: text
    content: dia ny vokatry ny heviny ihany;
  - type: text
    content: fa tsy nihaino ny teniko izy
  - type: text
    content: ary nolaviny ny lalànako.
  '2':
  - type: text
    content: Aringako ilay tsara tarehy sy mihantahanta,
  - type: text
    content: 'dia i '
  - type: text
    content: Ziona
  - type: text
    content: ' zanakavavy.'
  '20':
  - type: text
    content: Nahoana Aho no itondrana ditin-kazo mani-pofona avy any Sheba
  - type: text
    content: sy veromanitra avy any amin’ny tany lavitra?
  - type: text
    content: Tsy sitrako ny fanatitra doranareo manontolo
  - type: text
    content: ary tsy mamiko ny zavatra vonoinareo hatao fanatitra.
  '21':
  - type: text
    content: 'Koa izao no lazain’NY TOMPO:'
  - type: text
    content: Indro, hasiako fahatafintohinana eo amin’ity firenena ity
  - type: text
    content: ka samy ho tafintohina amin’izany ny ray mbamin’ny zanany;
  - type: text
    content: ho faty ny mpiaramonina mbamin’ny namany.
  - type: heading
    content: Efa an-dalana ny mpandringana
  '22':
  - type: text
    content: 'Izao no lazain’NY TOMPO:'
  - type: text
    content: Indro, misy firenena avy any amin’ny tany avaratra,
  - type: text
    content: dia firenena lehibe mitsangana avy any amin’ny faran’ny tany.
  '23':
  - type: text
    content: Tsipìka sy lefona no entiny,
  - type: text
    content: lozabe sady tsy mamindra fo izy;
  - type: text
    content: ny feony dia mirohondrohona toy ny ranomasina
  - type: text
    content: ary mitaingin-tsoavaly izy
  - type: text
    content: sady voaomana tahaka ny lehilahy ho amin’ny ady,
  - type: text
    content: 'hamelezana anao, ry '
  - type: text
    content: Ziona
  - type: text
    content: ' zanakavavy.'
  '24':
  - type: text
    content: Renay ny lazany
  - type: text
    content: ka miraviravy tanana izahay;
  - type: text
    content: fahoriana no mahazo anay,
  - type: text
    content: eny, fanaintainana tahaka ny vehivavy eo am-piterahana.
  '25':
  - type: text
    content: Aza mandeha ho any an-tsaha
  - type: text
    content: ary aza mankeny amin’ny lalambe;
  - type: text
    content: fa manan-tsabatra ny fahavalo,
  - type: text
    content: misy fampihorohoroana avy amin’ny manodidina.
  '26':
  - type: text
    content: Ry oloko zanakavavy,
  - type: text
    content: misikìna lamba fisaonana ianao
  - type: text
    content: ary mihosena lavenona
  - type: text
    content: ka manaova fisaonana toy ny fisaonana zanakalahy tokana,
  - type: text
    content: dia fitomaniana fatratra;
  - type: text
    content: fa ho avy tampoka amintsika ny mpandringana.
  - type: heading
    content: Mpikomy maditra
  '27':
  - type: text
    content: Ho mpizaha toetra ao amin’ny oloko no nanendreko anao,
  - type: text
    content: dia ho fiarovana mafy,
  - type: text
    content: mba hahafantaranao
  - type: text
    content: sy hizahanao toetra ny alehany.
  '28':
  - type: text
    content: Tena mpikomy maditra avokoa izy rehetra
  - type: text
    content: ka mandehandeha manaratsy olona;
  - type: text
    content: varahina sy vy izy;
  - type: text
    content: samy mpanao ratsy avokoa izy rehetra.
  '29':
  - type: text
    content: May ny tafoforana,
  - type: text
    content: levon’ny afo ny firaka,
  - type: text
    content: foana ny nandrendrehan’ny mpandrendrika,
  - type: text
    content: nefa tsy voaisotra ny ratsy.
  '3':
  - type: text
    content: Ao aminy no alehan’ny mpiandry ondry sy ny ondriny;
  - type: text
    content: haoriny manodidina azy ny tranolainy
  - type: text
    content: ka samy handany ny ao akaikiny avy izy.
  '30':
  - type: text
    content: Ataon’ny olona hoe volafotsy tsy ilaina izy
  - type: text
    content: satria tsy ilain’NY TOMPO.
  '4':
  - type: text
    content: Miomàna ianareo hanao ady masina hamelezana azy;
  - type: text
    content: mitsangàna ka andeha isika hamely azy antoandrobenanahary.
  - type: text
    content: Lozantsika! Fa lasan-davitra ny andro,
  - type: text
    content: ary efa mandroso ny aloky ny hariva.
  '5':
  - type: text
    content: Mitsangàna ka andeha isika hanao latsaka alina
  - type: text
    content: ary aoka horavantsika ny lapany.
  - type: heading
    content: Fampandrenesana ampahibemaso
  '6':
  - type: text
    content: 'Fa izao no lazain’Andriamanitra, Tompon’izao rehetra izao:'
  - type: text
    content: Kapao ny hazo,
  - type: text
    content: ary manandrata tovon-tany hamelezana an’i Jerosalema;
  - type: text
    content: io ilay tanàna hovaliana,
  - type: text
    content: fa feno fampahoriana ny ao anatiny.
  '7':
  - type: text
    content: Toy ny loharano mampiboiboika ny ranony
  - type: text
    content: no ampiboiboihany ny faharatsiany;
  - type: text
    content: herisetra sy fandravana no re ao aminy;
  - type: text
    content: eo anatrehako mandrakariva
  - type: text
    content: ny faharariana sy ny faharatrana.
  '8':
  - type: text
    content: Minoa anatra ianao, ry Jerosalema,
  - type: text
    content: fandrao hiala aminao ny fanahiko,
  - type: text
    content: ary fandrao hataoko tany lao ianao,
  - type: text
    content: dia tany tsy azo onenana.
  - type: heading
    content: Vahoaka mandà tsy hihaino
  '9':
  - type: text
    content: 'Izao no lazain’Andriamanitra, Tompon’izao rehetra izao:'
  - type: text
    content: Hotsimponina tsirairay toy ny fitsimpona voaloboka
  - type: text
    content: izay sisa amin’ny Israely;
  - type: text
    content: avereno ho amin’ny rantsany indray ny tananao,
  - type: text
    content: toy ny an’ny mpioty voaloboka.
