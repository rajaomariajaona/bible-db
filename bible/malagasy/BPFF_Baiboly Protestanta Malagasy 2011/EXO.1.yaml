document_id: EXO.1,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: NY FANANDEVOZANA SY NY FANAFAHANA NY ZANAK’ISRAELY
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Andevo tany Ejipta ny Zanak’Israely
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ireto ny anaran’ny Zanak’Israely izay niaraka tamin’i Jakoba nankany Ejipta; samy nandeha mbamin’ny ankohonany avy izy rehetra: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Andeha hitadiavantsika hevitra ireo, fandrao hihamaro izy, koa raha toa ka misy ady dia homba ny fahavalontsika koa izy ka hiady amintsika ary hiakatra hiala amin’ny tany izy ireo.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nanendreny mpifehy izy mba hampahory azy ireo amin’ny fanompoana mafy. Ary nanao tanàna fitahirizana ho an’i Farao izy, dia Pitoma sy Ramesesa. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nefa arakaraka ny nampahoriany azy no vao mainka nihamaroany sy nitomboany kosa ka natahotra ny Zanak’Israely fatratra ny Ejiptiana.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nampanompoin’ny Ejiptiana mafy ny Zanak’Israely '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ka nataony nitondra faisana tamin’ny fanompoana mafy, ny fanaovana feta sy biriky mbamin’ny fanompoana rehetra any an-tsaha, dia ny fanompoana rehetra izay nampanompoany azy mafy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mampahory ny Zanak’Israely i Farao
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy ny mpanjakan’i Ejipta tamin’ny mpampivelona hebreo, Sifra no anaran’ny iray, ary Poa no anaran’ny iray: '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa mampiteraka ny vehivavy hebreo ianareo ka hitanareo fa zazalahy dia vonoy, fa raha zazavavy kosa dia velomy. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nefa natahotra an’Andriamanitra ireo mpampivelona dia tsy nanatanteraka izay nolazain’ny mpanjakan’i Ejipta taminy fa novelominy ihany ny zazalahy.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia niantso ireo mpampivelona ny mpanjakan’i Ejipta ka niteny taminy hoe: Nahoana ianareo no nanao izao ka novelominareo ihany ny zazalahy? '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy ireo mpampivelona tamin’i Farao: Tsy mba tahaka ny vehivavy ejiptiana ny vehivavy hebreo fa matanjaka be izy, koa raha tsy mbola tonga any aminy akory ny mpampivelona dia efa teraka sahady izy. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I Robena, i Simeona, i Levy ary i Joda; '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nasian’Andriamanitra soa ireo mpampivelona; ary nihamaro sy nihanahery indrindra ny olona. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary tamin’izany, satria natahotra an’Andriamanitra ireo mpampivelona, dia nomen’Andriamanitra taranaka izy. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nandidy ny vahoakany rehetra i Farao hoe: Ny zazalahy rehetra izay teraka dia atsipazo any amin’ny ranon’i Neily, fa ny zazavavy rehetra kosa no velomy.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Isakara, i Zebolona, i Benjamina; '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'i Dana, i Naftaly, i Gada ary i Asera. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fitopolo ny isan’ny olona rehetra naterak’i Jakoba. I Josefa dia efa tany Ejipta rahateo.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary maty i Josefa sy ny rahalahiny rehetra mbamin’izany taranaka rehetra izany. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary niteraka maro ny Zanak’Israely ka nitombo betsaka sy nihamaro ary nitombo hery hatrany ka henika azy ny tany.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nisy mpanjaka vaovao nanjaka tany Ejipta, izay tsy nahafantatra an’i Josefa. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izy io no niteny tamin’ny vahoakany hoe: Indro, efa maro sy mahery noho isika ny firenen’ny Zanak’Israely. '
