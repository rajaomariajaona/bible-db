document_id: PRO.27
type_code: plt
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Aza mirehareha ny amin’ny ho ampitso ianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa na dia ny havoakan’ny anio aza dia tsy fantatrao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Aoka ny olon-kafa no hidera anao, fa tsy ny tenanao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, ny vahiny, fa tsy ny molotrao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Mavesatra ny vato ary misy lanjany ny fasika,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny fahasosoran’ny adala dia manoatra noho izy roa tonta.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Masiaka ny fahavinirana ary misafoaka ny fahatezerana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa iza no mahajanona eo anatrehan’ny fahasaro-piaro?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Aleo anatra imaso
- type: usfm
  marker: q1
  children:
  - type: text
    text: toy izay fitia afenina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Azo itokiana hahasoa ny fery ataon’ny sakaiza,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa tena fitaka ny fanorohana betsaka ataon’ny fahavalo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Hitsakitsahin’ny voky na dia ny toho-tantely aza,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa mamin’ny noana na dia ny zava-mangidy rehetra aza.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Toy ny voronkely miala amin’ny akaniny ka mirenireny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia toy izany ny olona izay mirenireny miala amin’ny fonenany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ny diloilo sy ny zavamanitra dia mahafaly ny fo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: aleo ny hamamin’ny fisakaizana toy izay ny hevitra avy amin’ny tena.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Aza mahafoy ny sakaizanao, na ny sakaizan-drainao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary aza mankany amin’ny tranon’ny rahalahinao amin’ny andro fahorianao.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsara ny namana akaiky noho ny rahalahy lavitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Anaka, hendre, ary ampifalio ny foko
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hamaliako izay miteny ratsy ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Mahatazana ny loza ny mahira-tsaina ka miery,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa mandroso kosa ny kely saina ka voa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Alao ny lambany fa efa niantoka olon-kafa izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ho solon’ny laniny tamin’ny niantohany vahiny janga.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Izay mifoha maraina ka miarahaba ny sakaizany amin’ny feo mahery
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia isaina ho fanozonana ny fiarahabany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Tahaka ny ranonorana mijononoka
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny vavan’ny vehivavy tia ady.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Izay misakana azy dia toy ny misakana ny rivotra
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady toy ny mamihina diloilo amin’ny tanany havanana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ny vy no andranitana ny vy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: toy izany, ny fanatrehan’ny sakaiza no mampahiratra ny endriky ny sakaizany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Izay miambina ny hazo aviavy dia hihinana ny voany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary izay miambina ny tompony dia homem-boninahitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Toy ny tandindona ao anaty rano ka mifanahaka amin’ny tarehy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia toy izany no ifanahafan’ny fon’ny olona amin’ny olona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: fitoeran’ny maty
  - type: text
    text: ' sy ny tanin’ny fandringanana dia tsy mety voky;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'toy izany ny mason’ny olona: Tsy mety afa-po izy.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ny memy no ahafantarana ny tena volafotsy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny fandrendrehana no ahafantarana ny tena volamena,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny toetry ny olona dia tsy maintsy ho araka ny lazany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Na dia miara-totoinao fanoto amin’ny vary ao an-daona aza ny adala
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia tsy mba hiala aminy tsy akory ny fahadalany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Fantaro tsara ny ondry aman’osinao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary miahia tsara ny andian’ny bibinao,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: fa ny harena tsy ho mandrakizay;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary moa haharitra ho amin’ny taranaka rehetra va ny satroboninahitra?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Na dia lany aza ny ahitra ka mitsiry ny solofony
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary voataona ny zavamaniry any an-tendrombohitra,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ny zanak’ondry no hahazoanao fitafiana
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny osy dia hamidinao tany;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ampy hosotroinao sy ho an’ny ankohonanao ny rononon’osy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hisy hiveloman’ny mpanompovavinao.
