document_id: PRO.27,3103
type_code: plt
verses:
  '1':
  - type: text
    content: Aza mirehareha ny amin’ny ho ampitso ianao,
  - type: text
    content: fa na dia ny havoakan’ny anio aza dia tsy fantatrao.
  '10':
  - type: text
    content: Aza mahafoy ny sakaizanao, na ny sakaizan-drainao,
  - type: text
    content: ary aza mankany amin’ny tranon’ny rahalahinao amin’ny andro fahorianao.
  - type: text
    content: Tsara ny namana akaiky noho ny rahalahy lavitra.
  '11':
  - type: text
    content: Anaka, hendre, ary ampifalio ny foko
  - type: text
    content: mba hamaliako izay miteny ratsy ahy.
  '12':
  - type: text
    content: Mahatazana ny loza ny mahira-tsaina ka miery,
  - type: text
    content: fa mandroso kosa ny kely saina ka voa.
  '13':
  - type: text
    content: Alao ny lambany fa efa niantoka olon-kafa izy,
  - type: text
    content: ary ho solon’ny laniny tamin’ny niantohany vahiny janga.
  '14':
  - type: text
    content: Izay mifoha maraina ka miarahaba ny sakaizany amin’ny feo mahery
  - type: text
    content: dia isaina ho fanozonana ny fiarahabany.
  '15':
  - type: text
    content: Tahaka ny ranonorana mijononoka
  - type: text
    content: ny vavan’ny vehivavy tia ady.
  '16':
  - type: text
    content: Izay misakana azy dia toy ny misakana ny rivotra
  - type: text
    content: sady toy ny mamihina diloilo amin’ny tanany havanana.
  '17':
  - type: text
    content: Ny vy no andranitana ny vy;
  - type: text
    content: toy izany, ny fanatrehan’ny sakaiza no mampahiratra ny endriky ny sakaizany.
  '18':
  - type: text
    content: Izay miambina ny hazo aviavy dia hihinana ny voany
  - type: text
    content: ary izay miambina ny tompony dia homem-boninahitra.
  '19':
  - type: text
    content: Toy ny tandindona ao anaty rano ka mifanahaka amin’ny tarehy,
  - type: text
    content: dia toy izany no ifanahafan’ny fon’ny olona amin’ny olona.
  '2':
  - type: text
    content: Aoka ny olon-kafa no hidera anao, fa tsy ny tenanao;
  - type: text
    content: eny, ny vahiny, fa tsy ny molotrao.
  '20':
  - type: text
    content: 'Ny '
  - type: text
    content: fitoeran’ny maty
  - type: text
    content: ' sy ny tanin’ny fandringanana dia tsy mety voky;'
  - type: text
    content: 'toy izany ny mason’ny olona: Tsy mety afa-po izy.'
  '21':
  - type: text
    content: Ny memy no ahafantarana ny tena volafotsy,
  - type: text
    content: ny fandrendrehana no ahafantarana ny tena volamena,
  - type: text
    content: ary ny toetry ny olona dia tsy maintsy ho araka ny lazany.
  '22':
  - type: text
    content: Na dia miara-totoinao fanoto amin’ny vary ao an-daona aza ny adala
  - type: text
    content: dia tsy mba hiala aminy tsy akory ny fahadalany.
  '23':
  - type: text
    content: Fantaro tsara ny ondry aman’osinao,
  - type: text
    content: ary miahia tsara ny andian’ny bibinao,
  '24':
  - type: text
    content: fa ny harena tsy ho mandrakizay;
  - type: text
    content: ary moa haharitra ho amin’ny taranaka rehetra va ny satroboninahitra?
  '25':
  - type: text
    content: Na dia lany aza ny ahitra ka mitsiry ny solofony
  - type: text
    content: ary voataona ny zavamaniry any an-tendrombohitra,
  '26':
  - type: text
    content: ny zanak’ondry no hahazoanao fitafiana
  - type: text
    content: ary ny osy dia hamidinao tany;
  '27':
  - type: text
    content: ampy hosotroinao sy ho an’ny ankohonanao ny rononon’osy
  - type: text
    content: ary hisy hiveloman’ny mpanompovavinao.
  '3':
  - type: text
    content: Mavesatra ny vato ary misy lanjany ny fasika,
  - type: text
    content: fa ny fahasosoran’ny adala dia manoatra noho izy roa tonta.
  '4':
  - type: text
    content: Masiaka ny fahavinirana ary misafoaka ny fahatezerana;
  - type: text
    content: fa iza no mahajanona eo anatrehan’ny fahasaro-piaro?
  '5':
  - type: text
    content: Aleo anatra imaso
  - type: text
    content: toy izay fitia afenina.
  '6':
  - type: text
    content: Azo itokiana hahasoa ny fery ataon’ny sakaiza,
  - type: text
    content: fa tena fitaka ny fanorohana betsaka ataon’ny fahavalo.
  '7':
  - type: text
    content: Hitsakitsahin’ny voky na dia ny toho-tantely aza,
  - type: text
    content: nefa mamin’ny noana na dia ny zava-mangidy rehetra aza.
  '8':
  - type: text
    content: Toy ny voronkely miala amin’ny akaniny ka mirenireny,
  - type: text
    content: dia toy izany ny olona izay mirenireny miala amin’ny fonenany.
  '9':
  - type: text
    content: Ny diloilo sy ny zavamanitra dia mahafaly ny fo;
  - type: text
    content: aleo ny hamamin’ny fisakaizana toy izay ny hevitra avy amin’ny tena.
