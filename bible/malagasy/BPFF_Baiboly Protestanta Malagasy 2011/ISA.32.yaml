document_id: ISA.32,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Hanjaka ihany ny fahamarinana amin’ny farany
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Indro, araka ny fahamarinana no hanjakan’ny mpanjaka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary araka ny rariny no hitondran’ny manampahefana.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Raha afaka herintaona mahery kely
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ho raiki-tahotra ianareo, ry vehivavy matokitoky foana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hifarana mantsy ny taom-piotazam-boaloboka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy hisy akory ny fanangonam-boankazo.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Mangovita, ianareo vehivavy tsy manana ahiahy!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mangorohoroa, ianareo matokitoky foana!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Endaho ny akanjonareo ka mitanjaha
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary misikìna lamba fisaonana.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Miteha-tratra izy fa malahelo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny saha mahafinaritra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny voaloboka vokatra.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Ho rakotry ny tsilo sy ny anjavidy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny tanin’ny oloko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, hatrany amin’ny trano filalaovana rehetra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: any amin’ny tanàna miravoravo.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Fa ho foana ny lapan’ny mpanjaka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hilaozana ny tanàna mitabataba;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho tonga zohy mandrakizay
  - type: usfm
    marker: q1
    children:
    - type: text
      text: i Ofela sy ny tilikambo fiambenana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho zary fikarenjen’ny borikidia
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy firaofan’ny andian’ny ondry aman’osy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fiadanana no ho vokatry ny fahamarinana
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Mandra-pandrotsaka ny Fanahy ho amintsika avy amin’ny avo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka ny tany efitra dia ho tonga saha mahavokatra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny saha mahavokatra dia hoheverina ho ala.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Hitoetra any an-tany efitra ny rariny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary honina ao amin’ny saha mahavokatra ny fahamarinana.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Fiadanana no ho vokatry ny fahamarinana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: filaminana sy fandriampahalemana mandrakizay
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no asan’ny fahamarinana.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Hitoetra ao amin’ny fonenana mandry fehizay ny oloko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ao amin’ny toerana mahatoky
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ao amin’ny fialan-tsasatra milamina.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Nefa ho ripaka amin’ny filatsahan’ny havandra ny ala,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hadaboka ambany dia ambany ny tanàna.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Samy ho fierena amin’ny rivotra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ho fialofana amin’ny oram-baratra izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho lakandrano manondraka ny tany maina izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho alokalo-batolampy mandondona amin’ny tany karankaina.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Sambatra ianareo izay mamafy eny amoron’ny rano rehetra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady mampiriaria ny omby sy ny boriky!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Tsy hikimpy ny mason’izay mahita
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hihaino ny sofin’izay mandre.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Hahazo fahalalana ny fon’izay maimaika
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny lelan’izay mikodedidedy dia hahay miteny haingana sy mazava.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Ny adala dia tsy hantsoina intsony hoe andriana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny mpanambaka dia tsy holazaina hoe mahafoy be.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Ny adala mantsy dia mbola miteny hadalana ihany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mamoron-keloka ny fony
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hanaovany izay ratsy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy hitenenany ratsy NY TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hiraharahany ny kibon’ny noana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy hanakanany ny mangetaheta tsy hisotro rano.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Ratsy ny hafetsen’ny mpanambaka;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: manao teti-dratsy izy hanimbany ny ory amin’ny teny lainga
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na dia manana ny rariny aza ny mahantra;
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Fa ny olo-mihaja kosa dia manana fikasana araka izay mahamendrika olo-mihaja
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary izay mahamendrika olo-mihaja no ifikirany.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fampitandremana ny vehivavy ao Jerosalema
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Mitsangàna, ry vehivavy tsy manana ahiahy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka henoy ny feoko!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ry zazavavy matokitoky foana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mihainoa ny teniko!
