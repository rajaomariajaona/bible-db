document_id: ISA.32,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Hanjaka ihany ny fahamarinana amin’ny farany
  - type: text
    content: Indro, araka ny fahamarinana no hanjakan’ny mpanjaka,
  - type: text
    content: ary araka ny rariny no hitondran’ny manampahefana.
  '10':
  - type: text
    content: Raha afaka herintaona mahery kely
  - type: text
    content: dia ho raiki-tahotra ianareo, ry vehivavy matokitoky foana;
  - type: text
    content: hifarana mantsy ny taom-piotazam-boaloboka
  - type: text
    content: ary tsy hisy akory ny fanangonam-boankazo.
  '11':
  - type: text
    content: Mangovita, ianareo vehivavy tsy manana ahiahy!
  - type: text
    content: Mangorohoroa, ianareo matokitoky foana!
  - type: text
    content: Endaho ny akanjonareo ka mitanjaha
  - type: text
    content: ary misikìna lamba fisaonana.
  '12':
  - type: text
    content: Miteha-tratra izy fa malahelo
  - type: text
    content: ny saha mahafinaritra
  - type: text
    content: sy ny voaloboka vokatra.
  '13':
  - type: text
    content: Ho rakotry ny tsilo sy ny anjavidy
  - type: text
    content: ny tanin’ny oloko;
  - type: text
    content: eny, hatrany amin’ny trano filalaovana rehetra
  - type: text
    content: any amin’ny tanàna miravoravo.
  '14':
  - type: text
    content: Fa ho foana ny lapan’ny mpanjaka,
  - type: text
    content: hilaozana ny tanàna mitabataba;
  - type: text
    content: ho tonga zohy mandrakizay
  - type: text
    content: i Ofela sy ny tilikambo fiambenana;
  - type: text
    content: ho zary fikarenjen’ny borikidia
  - type: text
    content: sy firaofan’ny andian’ny ondry aman’osy.
  - type: heading
    content: Fiadanana no ho vokatry ny fahamarinana
  '15':
  - type: text
    content: Mandra-pandrotsaka ny Fanahy ho amintsika avy amin’ny avo
  - type: text
    content: ka ny tany efitra dia ho tonga saha mahavokatra,
  - type: text
    content: ary ny saha mahavokatra dia hoheverina ho ala.
  '16':
  - type: text
    content: Hitoetra any an-tany efitra ny rariny
  - type: text
    content: ary honina ao amin’ny saha mahavokatra ny fahamarinana.
  '17':
  - type: text
    content: Fiadanana no ho vokatry ny fahamarinana,
  - type: text
    content: filaminana sy fandriampahalemana mandrakizay
  - type: text
    content: no asan’ny fahamarinana.
  '18':
  - type: text
    content: Hitoetra ao amin’ny fonenana mandry fehizay ny oloko,
  - type: text
    content: ao amin’ny toerana mahatoky
  - type: text
    content: sy ao amin’ny fialan-tsasatra milamina.
  '19':
  - type: text
    content: Nefa ho ripaka amin’ny filatsahan’ny havandra ny ala,
  - type: text
    content: ary hadaboka ambany dia ambany ny tanàna.
  '2':
  - type: text
    content: Samy ho fierena amin’ny rivotra,
  - type: text
    content: ary ho fialofana amin’ny oram-baratra izy,
  - type: text
    content: ho lakandrano manondraka ny tany maina izy,
  - type: text
    content: ho alokalo-batolampy mandondona amin’ny tany karankaina.
  '20':
  - type: text
    content: Sambatra ianareo izay mamafy eny amoron’ny rano rehetra
  - type: text
    content: sady mampiriaria ny omby sy ny boriky!
  '3':
  - type: text
    content: Tsy hikimpy ny mason’izay mahita
  - type: text
    content: ary hihaino ny sofin’izay mandre.
  '4':
  - type: text
    content: Hahazo fahalalana ny fon’izay maimaika
  - type: text
    content: ary ny lelan’izay mikodedidedy dia hahay miteny haingana sy mazava.
  '5':
  - type: text
    content: Ny adala dia tsy hantsoina intsony hoe andriana
  - type: text
    content: ary ny mpanambaka dia tsy holazaina hoe mahafoy be.
  '6':
  - type: text
    content: Ny adala mantsy dia mbola miteny hadalana ihany
  - type: text
    content: ary mamoron-keloka ny fony
  - type: text
    content: mba hanaovany izay ratsy
  - type: text
    content: sy hitenenany ratsy NY TOMPO,
  - type: text
    content: ary hiraharahany ny kibon’ny noana
  - type: text
    content: sy hanakanany ny mangetaheta tsy hisotro rano.
  '7':
  - type: text
    content: Ratsy ny hafetsen’ny mpanambaka;
  - type: text
    content: manao teti-dratsy izy hanimbany ny ory amin’ny teny lainga
  - type: text
    content: na dia manana ny rariny aza ny mahantra;
  '8':
  - type: text
    content: Fa ny olo-mihaja kosa dia manana fikasana araka izay mahamendrika olo-mihaja
  - type: text
    content: ary izay mahamendrika olo-mihaja no ifikirany.
  - type: heading
    content: Fampitandremana ny vehivavy ao Jerosalema
  '9':
  - type: text
    content: Mitsangàna, ry vehivavy tsy manana ahiahy,
  - type: text
    content: ka henoy ny feoko!
  - type: text
    content: Ry zazavavy matokitoky foana,
  - type: text
    content: mihainoa ny teniko!
