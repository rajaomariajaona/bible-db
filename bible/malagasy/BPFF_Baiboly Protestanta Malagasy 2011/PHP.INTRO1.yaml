type_code: plt
verses:
  '1':
  - type: text
    content: INDRAY MIJERY
  - type: text
    content: Araka ny voalazan’ny boky Asan’ny Apostoly dia fahitana no nanosika an’i Paoly ho any Filipia, tamin’ny antson’ilay Makedoniana (Asa 16.9).
  - type: text
    content: I Filipia no tanàna eropeana voalohany nitoriany ny Filazantsara. Zanatany romana io tanàna io. Niaraka taminy tamin’izany i Timoty sy i Silasy.
  - type: text
    content: Tamin’ny fifatorany tao Roma tamin’ny 60–62 i Paoly no nanoratra ny epistily ho an’ny Filipiana.
  - type: text
    content: Ny votoatin’ny Epistily
  - type: text
    content: Ny epistily ho an’ny Filipiana dia anisan’ireo antsoina hoe Epistilin’ny Fifatorana, miaraka amin’ny Efesiana, Kolosiana ary Filemona.
  - type: text
    content: Akaikin’ny fon’i Paoly apostoly ny Fiangonana tany Filipia. Izy ihany no neken’i Paoly hanampy azy tamin’izay nilainy. Nanendry an’i Epafrodito ho mpitondra ny fanampiana ho an’i Paoly ny Filipiana.
  - type: text
    content: Noho io fifandraisana akaiky io dia tsy mahagaga raha toa ka voaresaka matetika ny fifaliana izay miverina inefatra amby folo ao amin’ity epistily ity. Tsy mampisalasala an’i Paoly ny milaza ny fihetseham-pony manokana, ny heviny ny amin’ny ho aviny, ny vaovao momba azy sy ireo olona akaiky azy ary indrindra ny fisaorany sy ny fankasitrahany ny Filipiana.
  - type: text
    content: Mananatra sy mampitandrina azy ireo amin’ny fampianaran-diso samihafa mety hanimba ny Fiangonana koa i Paoly. Izany moa dia avy amin’ireo mpitana ny fivavahana jiosy na ny jodaisma, ao koa ireo manao fampianarana ara-pahalalana sy ara-tsaina fotsiny, izay fiandohan’ny gnostisisma.
  - type: text
    content: Sarotra ny toerana nisy an’i Paoly noho izy any am-pifatorana; tsy nanakana azy hilaza fifaliana amin’ny Filipiana anefa izany. Mampirisika ny Filipiana hampiorina ny fanantenany ao amin’i Kristy koa i Paoly.
  - type: text
    content: Ny fizaran’ny Epistily
