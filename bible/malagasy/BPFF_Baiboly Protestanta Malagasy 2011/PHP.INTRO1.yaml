document_id: PHP.INTRO1
type_code: plt
segments:
- type: usfm
  marker: imt1
  children:
  - type: text
    text: INDRAY MIJERY
- type: usfm
  marker: ip
  children:
  - type: text
    text: Araka ny voalazan’ny boky Asan’ny Apostoly dia fahitana no nanosika an’i Paoly ho any Filipia, tamin’ny antson’ilay Makedoniana (Asa 16.9).
- type: usfm
  marker: ip
  children:
  - type: text
    text: I Filipia no tanàna eropeana voalohany nitoriany ny Filazantsara. Zanatany romana io tanàna io. Niaraka taminy tamin’izany i Timoty sy i Silasy.
- type: usfm
  marker: ip
  children:
  - type: text
    text: Tamin’ny fifatorany tao Roma tamin’ny 60–62 i Paoly no nanoratra ny epistily ho an’ny Filipiana.
- type: usfm
  marker: is1
  children:
  - type: text
    text: Ny votoatin’ny Epistily
- type: usfm
  marker: ip
  children:
  - type: text
    text: Ny epistily ho an’ny Filipiana dia anisan’ireo antsoina hoe Epistilin’ny Fifatorana, miaraka amin’ny Efesiana, Kolosiana ary Filemona.
- type: usfm
  marker: ip
  children:
  - type: text
    text: Akaikin’ny fon’i Paoly apostoly ny Fiangonana tany Filipia. Izy ihany no neken’i Paoly hanampy azy tamin’izay nilainy. Nanendry an’i Epafrodito ho mpitondra ny fanampiana ho an’i Paoly ny Filipiana.
- type: usfm
  marker: ip
  children:
  - type: text
    text: Noho io fifandraisana akaiky io dia tsy mahagaga raha toa ka voaresaka matetika ny fifaliana izay miverina inefatra amby folo ao amin’ity epistily ity. Tsy mampisalasala an’i Paoly ny milaza ny fihetseham-pony manokana, ny heviny ny amin’ny ho aviny, ny vaovao momba azy sy ireo olona akaiky azy ary indrindra ny fisaorany sy ny fankasitrahany ny Filipiana.
- type: usfm
  marker: ip
  children:
  - type: text
    text: Mananatra sy mampitandrina azy ireo amin’ny fampianaran-diso samihafa mety hanimba ny Fiangonana koa i Paoly. Izany moa dia avy amin’ireo mpitana ny fivavahana jiosy na ny jodaisma, ao koa ireo manao fampianarana ara-pahalalana sy ara-tsaina fotsiny, izay fiandohan’ny gnostisisma.
- type: usfm
  marker: ip
  children:
  - type: text
    text: Sarotra ny toerana nisy an’i Paoly noho izy any am-pifatorana; tsy nanakana azy hilaza fifaliana amin’ny Filipiana anefa izany. Mampirisika ny Filipiana hampiorina ny fanantenany ao amin’i Kristy koa i Paoly.
- type: usfm
  marker: iot
  children:
  - type: text
    text: Ny fizaran’ny Epistily
- type: usfm
  marker: io1
  children:
  - type: text
    text: 'Fiarahabana: 1.1-11'
- type: usfm
  marker: io1
  children:
  - type: text
    text: 'I Paoly sy ny toe-javatra nihatra taminy: 1.12-26'
- type: usfm
  marker: io1
  children:
  - type: text
    text: 'Ny fiainana ao amin’i Kristy: 1.27–2.18'
- type: usfm
  marker: io1
  children:
  - type: text
    text: 'Fiaraha-miasa amin’i Timoty sy i Epafrodito: 2.19-30'
- type: usfm
  marker: io1
  children:
  - type: text
    text: 'Fampitandremana ny amin’ny mpampianatra sandoka: 3.1–4.9'
- type: usfm
  marker: io1
  children:
  - type: text
    text: 'I Paoly sy ny fifandraisany amin’ny Filipiana: 4.10-20'
- type: usfm
  marker: io1
  children:
  - type: text
    text: 'Fanaovam-beloma: 4.21-23'
