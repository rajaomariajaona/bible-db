document_id: 1KI.10
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Tonga hamangy an’i Solomona ny mpanjakavavin’i Sheba
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 2Tan 9.1-12
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary ny mpanjakavavin’i Sheba, rehefa nahare ny lazan’i Solomona noho ny amin’ny anaran’NY TOMPO, dia avy hizaha toetra azy amin’ny fanontaniana sarotra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Koa tonga tany Jerosalema izy mbamin’ny mpanotrona marobe sy ny rameva izay nitondra zavamanitra sy volamena sesehena ary vatosoa. Rehefa tonga tany amin’i Solomona izy dia nilaza taminy izay rehetra tao am-pony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Voavalin’i Solomona izy tamin’izay rehetra nanontaniany azy; tsy nisy zavatra miafina tamin’ny mpanjaka ka tsy nambarany azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Rehefa hitan’ilay mpanjakavavin’i Sheba ny fahendren’i Solomona rehetra sy ny trano izay naoriny, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'ny fihinany teo amin’ny latabany, ny fonenan’ny tandapany, ny fahaizan’ny mpanompony mbamin’ny fitafian’ireo sy ny mpitondra kapoakany ary ny fanatitra dorana manontolo izay nateriny tao amin’ny tranon’NY TOMPO, dia talanjona terỳ izy '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'ka niteny tamin’ny mpanjaka hoe: Marina ny teny reko tany amin’ny taniko ny amin’ny teninao sy ny fahendrenao! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Fa tsy nino ny filazana aho raha tsy tonga tatỳ, koa ny masoko no mahita. Kanjo hay, na dia ny antsasany aza tsy voalaza tamiko akory! Fa indro, ny fahendrenao sy ny voninahitrao dia mihoatra lavitra noho izay laza efa reko. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Sambatra lahy ny olonao, ary sambatra ireto tandapanao ireto, izay manompo anao mandrakariva ka mandre ny fahendrenao! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Isaorana anie NY TOMPO Andriamanitrao, izay tia anao ka nametraka anao amin’ny sezafiandrianan’ny Israely! Fa noho ny fitiavan’NY TOMPO, izay itiavany ny Israely mandrakizay, no nanaovany anao ho mpanjaka hanao fitsarana sy fahamarinana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dia nanome volamena roapolo amby zato '
  - type: usfm
    marker: w
    children:
    - type: text
      text: talenta
  - type: text
    text: ' sy zavamanitra sesehena ary vatosoa ho an’ny mpanjaka izy. Tsy nisy nahatonga zavamanitra be intsony tahaka izay nomen’ny mpanjakavavin’i Sheba ho an’i Solomona mpanjaka ny tatỳ aoriana rehetra.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary ireo sambon’i Hirama, izay naka volamena avy any Ofira koa, dia nitondra hazo sarobidy be dia be sy vatosoa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ny hazo almoga moa dia nanaovan’ny mpanjaka arofanina tamin’ny tranon’NY TOMPO sy ny lapan’andriana ary nanamboarany lokanga sy valiha ho an’ny mpihira. Tsy nahitana hazo almoga betsaka toy izany tonga tany mandraka androany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Nomen’i Solomona mpanjaka ho an’ny mpanjakavavin’i Sheba kosa izay rehetra niriny, na inona na inona nangatahiny, ankoatra izay nomeny azy araka ny fahalalahan-tanan’i Solomona mpanjaka. Koa niverina nody any amin’ny taniny izy mbamin’ny mpanompony.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny harenan’i Solomona
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 2Tan 9.13-28
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ny lanjan’ny volamena izay tonga tao amin’i Solomona isan-taona dia volamena enina amby enimpolo sy eninjato '
  - type: usfm
    marker: w
    children:
    - type: text
      text: talenta
  - type: text
    text: ', '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: afa-tsy izay hetra azony avy tamin’ny mpivaro-mandeha sy tamin’ny mpivarotra ary tamin’ny mpanjakan’ny firenena samihafa rehetra sy tamin’ny mpifehy ny tany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Nanao ampinga volamena lehibe roanjato tamin’ny volamena voafisaka i Solomona mpanjaka ka takelaka volamena eninjato '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sekela
  - type: text
    text: ' no napetaka tamin’ny ampinga lehibe iray. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Nanao ampinga volamena telonjato tamin’ny volamena voafisaka koa izy ka takelaka volamena milanja telo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mane
  - type: text
    text: ' no napetaka tamin’ny ampinga iray. Dia napetraky ny mpanjaka tao amin’ny trano Alan’i Libanona ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Nanao sezafiandrianana ivoara lehibe indray ny mpanjaka ka nopetahany takelaka volamena voafantina izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Nisy ambaratonga enina tamin’ny sezafiandrianana; ny tapany ambony amin’ny sezafiandrianana dia boribory ny eo an-damosiny; nisy fitehenan-tanana teo an-daniny roa amin’ny fipetrahana; ary nisy sarivongana liona roa nijoro teo akaikin’ny fitehenan-tanana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Nisy sarivongana liona roa amby folo teo an-daniny roa tamin’ny ambaratonga enina. Tsy nisy nahavita tahaka izany mihitsy tany amin’ny fanjakana rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ny fanaka fisotroan’i Solomona mpanjaka dia volamena ary ny fanaka rehetra tao amin’ny trano Alan’i Libanona koa dia volamena voafantina avokoa; tsy nisy volafotsy ireo fa noheverina ho tsinontsinona izany tamin’ny andron’i Solomona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Fa ny mpanjaka dia nanana sambon’i Tarsisy mbamin’ireo sambon’i Hirama teny ambonin’ny ranomasina; indray mandeha isan-telo taona no tonga ny sambon’i Tarsisy nitondra volamena, volafotsy, ivoara, rajako ary vorombola.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Nanankarena sady hendry noho ny mpanjaka rehetra ambonin’ny tany i Solomona mpanjaka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Naniry hahita an’i Solomona ny tany rehetra mba hihaino ny fahendrena izay nataon’Andriamanitra tao am-pony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Koa samy nahatonga ny fanomezany avy izy rehetra isan-taona, dia fanaka volafotsy sy fanaka volamena, fitafiana, fiadiana, zavamanitra, soavaly ary ampondra.
- type: usfm
  marker: r
  children:
  - type: text
    text: 2Tan 1.14-17; 9.25-28
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Nanangona kalesy fitondra miady sy mpitaingin-tsoavaly koa i Solomona ka nanana kalesy fitondra miady efajato sy arivo ary mpitaingin-tsoavaly roa arivo sy iray alina izy, ka natobiny tao amin’ireo tanàna fitoeran’ny kalesy sy tao amin’ny mpanjaka tany Jerosalema ireny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Nataon’ny mpanjaka tahaka ny vato ny habetsaky ny volafotsy tany Jerosalema, ary ny hazo sedera nataony toy ny aviavy any Sefela. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Avy tany Ejipta no nahazoan’i Solomona soavaly; ny iray toko tamin’ny mpivaro-mandeha an’ny mpanjaka dia naka ny andiany iray araka izay vidiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Ny vidin’ny kalesy fitondra miady iray noentiny niakatra avy tany Ejipta dia volafotsy eninjato sekela, ary ny soavaly dimampolo amby zato avy. Toy izany koa no nitondrany ho an’ny mpanjakan’ny Hetita sy ny mpanjakan’ny Arameana.
