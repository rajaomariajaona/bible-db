document_id: PSA.48,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny tanànan’ny Mpanjaka lehibe
  - type: text
    content: Tononkira. Salamo nataon’ny Koraìta.
  - type: text
    content: Lehibe NY TOMPO ka mendrika Azy ny fiderana ambony indrindra,
  - type: text
    content: ao an-tanànan’Andriamanitsika, ao an-tendrombohiny masina.
  '10':
  - type: text
    content: Tahaka ny anaranao, Andriamanitra ô,
  - type: text
    content: ny fiderana Anao hatrany amin’ny faran’ny tany.
  - type: text
    content: Feno fahamarinana ny tananao ankavanana.
  '11':
  - type: text
    content: Mifaly ny tendrombohitra Ziona
  - type: text
    content: ary miravoravo ny zanakavavin’i Joda
  - type: text
    content: noho ny fitsaranao.
  '12':
  - type: text
    content: Manodidìna an’i Ziona ianareo; eny, mandehana manodidina azy;
  - type: text
    content: isao ny tilikambo fiambenany,
  '13':
  - type: text
    content: jereo tsara ny mandany,
  - type: text
    content: diniho ny lapany,
  - type: text
    content: mba hotantarainareo amin’ny taranaka ho avy.
  '14':
  - type: text
    content: Fa izany no Andriamanitra, Andriamanitsika mandrakizay doria;
  - type: text
    content: Izy no hitarika antsika mandra-pahafaty.
  '2':
  - type: text
    content: Avo mahafinaritra sady fifalian’ny tany rehetra
  - type: text
    content: 'ny tendrombohitra '
  - type: text
    content: Ziona
  - type: text
    content: ' eo amin’ny ilany avaratra,'
  - type: text
    content: tanànan’ny Mpanjaka lehibe.
  '3':
  - type: text
    content: Andriamanitra ao an-dapa ao
  - type: text
    content: dia nanao izay hahafantarana Azy ho fiarovana avo.
  '4':
  - type: text
    content: Fa indro, nivondrona ny mpanjaka maro,
  - type: text
    content: niara-nandroso avokoa izy.
  '5':
  - type: text
    content: Nijery izy ka talanjona erỳ,
  - type: text
    content: very hevitra ka nalaky nandositra.
  '6':
  - type: text
    content: Hovitra no nahazo azy teo,
  - type: text
    content: tahaka ny fanaintainan’ny vehivavy eo am-piterahana;
  '7':
  - type: text
    content: tamin’ny rivotra avy any atsinanana
  - type: text
    content: no namakianao ny sambon’i Tarsisy.
  '8':
  - type: text
    content: Araka izay efa rentsika no hitantsika
  - type: text
    content: tao an-tanànan’Andriamanitra, Tompon’izao rehetra izao,
  - type: text
    content: 'tao an-tanànan’Andriamanitsika:'
  - type: text
    content: 'Mampitoetra azy mandrakizay Andriamanitra. '
  - type: text
    content: Fiatoana
  '9':
  - type: text
    content: Andriamanitra ô! Efa nieritreritra ny famindramponao
  - type: text
    content: tao anatin’ny tempolinao izahay.
