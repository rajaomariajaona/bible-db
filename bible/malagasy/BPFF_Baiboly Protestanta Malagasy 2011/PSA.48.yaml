document_id: PSA.48
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny tanànan’ny Mpanjaka lehibe
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: Tononkira. Salamo nataon’ny Koraìta.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Lehibe NY TOMPO ka mendrika Azy ny fiderana ambony indrindra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ao an-tanànan’Andriamanitsika, ao an-tendrombohiny masina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Avo mahafinaritra sady fifalian’ny tany rehetra
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ny tendrombohitra '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Ziona
  - type: text
    text: ' eo amin’ny ilany avaratra,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: tanànan’ny Mpanjaka lehibe.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Andriamanitra ao an-dapa ao
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia nanao izay hahafantarana Azy ho fiarovana avo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Fa indro, nivondrona ny mpanjaka maro,
- type: usfm
  marker: q1
  children:
  - type: text
    text: niara-nandroso avokoa izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Nijery izy ka talanjona erỳ,
- type: usfm
  marker: q1
  children:
  - type: text
    text: very hevitra ka nalaky nandositra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Hovitra no nahazo azy teo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tahaka ny fanaintainan’ny vehivavy eo am-piterahana;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: tamin’ny rivotra avy any atsinanana
- type: usfm
  marker: q1
  children:
  - type: text
    text: no namakianao ny sambon’i Tarsisy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Araka izay efa rentsika no hitantsika
- type: usfm
  marker: q1
  children:
  - type: text
    text: tao an-tanànan’Andriamanitra, Tompon’izao rehetra izao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'tao an-tanànan’Andriamanitsika:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Mampitoetra azy mandrakizay Andriamanitra. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Fiatoana
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Andriamanitra ô! Efa nieritreritra ny famindramponao
- type: usfm
  marker: q1
  children:
  - type: text
    text: tao anatin’ny tempolinao izahay.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Tahaka ny anaranao, Andriamanitra ô,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny fiderana Anao hatrany amin’ny faran’ny tany.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Feno fahamarinana ny tananao ankavanana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Mifaly ny tendrombohitra Ziona
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary miravoravo ny zanakavavin’i Joda
- type: usfm
  marker: q1
  children:
  - type: text
    text: noho ny fitsaranao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Manodidìna an’i Ziona ianareo; eny, mandehana manodidina azy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: isao ny tilikambo fiambenany,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: jereo tsara ny mandany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: diniho ny lapany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hotantarainareo amin’ny taranaka ho avy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Fa izany no Andriamanitra, Andriamanitsika mandrakizay doria;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izy no hitarika antsika mandra-pahafaty.
