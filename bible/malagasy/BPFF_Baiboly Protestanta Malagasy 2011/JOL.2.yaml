document_id: JOL.2,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Efa akaiky ny Andron’NY TOMPO
  - type: text
    content: 'Tsofy ao '
  - type: text
    content: Ziona
  - type: text
    content: ' ny anjomara!'
  - type: text
    content: Miantsoa mafy ao amin’ny tendrombohitro masina!
  - type: text
    content: Aoka hangovitra ny mponina rehetra amin’ny tany!
  - type: text
    content: Fa avy ny Andron’NY TOMPO,
  - type: text
    content: eny, efa antomotra izany,
  '10':
  - type: text
    content: Eo alohany dia mihorohoro ny tany
  - type: text
    content: ary mihozongozona ny lanitra;
  - type: text
    content: tonga maizina ny masoandro sy ny volana
  - type: text
    content: ary tsy mamirapiratra ny kintana.
  '11':
  - type: text
    content: Ary NY TOMPO mahatonga kotroka eo alohan’ny miaramilany;
  - type: text
    content: fa lehibe indrindra ny tobiny
  - type: text
    content: ary mahery izay manatanteraka ny teniny;
  - type: text
    content: fa lehibe ny Andron’NY TOMPO
  - type: text
    content: sady mahatahotra indrindra,
  - type: text
    content: koa iza no mahatanty izany?
  - type: heading
    content: Izao no fotoana hiverenana amin’NY TOMPO
  '12':
  - type: text
    content: Koa na dia ankehitriny aza,
  - type: text
    content: hoy NY TOMPO,
  - type: text
    content: dia miverena Amiko amin’ny fonareo manontolo,
  - type: text
    content: amin’ny fifadian-kanina sy ny fitomaniana ary ny fitarainana.
  '13':
  - type: text
    content: Ny fonareo no triatriaro fa aza ny fitafianareo,
  - type: text
    content: dia miverena amin’NY TOMPO Andriamanitrareo;
  - type: text
    content: fa mamindra fo sy miantra Izy,
  - type: text
    content: mahari-po sady be famindrampo
  - type: text
    content: ary manenina ny amin’ny loza.
  '14':
  - type: text
    content: Iza no mahalala raha mba hanenina ihany Izy
  - type: text
    content: ka hamela fitahiana ao aorianany,
  - type: text
    content: dia fanatitra avy amin’ny zavamaniry sy fanatitra aidina ho an’NY TOMPO Andriamanitrareo?
  '15':
  - type: text
    content: 'Tsofy ao '
  - type: text
    content: Ziona
  - type: text
    content: ' ny anjomara!'
  - type: text
    content: Manamasìna andro fifadian-kanina!
  - type: text
    content: Miantsoa fivoriana masina!
  '16':
  - type: text
    content: Angony ny vahoaka!
  - type: text
    content: Manamasìna ny fiangonana!
  - type: text
    content: Vorio ny zokiolona,
  - type: text
    content: angony ny ankizy madinika mbamin’ny zaza minono;
  - type: text
    content: aoka ny mpampakatra hiala ao an’efitranony,
  - type: text
    content: ary aoka ny ampakarina hiala ao an-trano fandriany.
  '17':
  - type: text
    content: Eo anelanelan’ny lalantsara fidirana sy ny alitara
  - type: text
    content: no aoka hitomanian’ny mpisorona,
  - type: text
    content: mpanao fanompoam-pivavahana ho an’NY TOMPO
  - type: text
    content: 'ka hilazany hoe: Iantrao ny olonao, RY TOMPO ô,'
  - type: text
    content: ary aza avela ho latsa ny lovanao
  - type: text
    content: 'ka hotapahin’ny '
  - type: text
    content: Jentilisa
  - type: text
    content: ;
  - type: text
    content: 'fa nahoana no hataon’ny any amin’ny firenena hoe:'
  - type: text
    content: Aiza izay Andriamaniny?
  - type: heading
    content: Ny tenin’Andriamanitra tamin’ny vahoakany
  '18':
  - type: text
    content: NY TOMPO dia saro-piaro amin’ny taniny
  - type: text
    content: sady miantra ny olony.
  '19':
  - type: text
    content: 'Eny, NY TOMPO niteny tamin’ny olony hoe:'
  - type: text
    content: Indro, handefa varimbazaha sy ranom-boaloboka ary diloilo vaovao ho anareo Aho
  - type: text
    content: ka ho vokin’izany ianareo;
  - type: text
    content: ary tsy havelako ho latsa any amin’ny Jentilisa intsony ianareo.
  '2':
  - type: text
    content: dia andro maizina sy manjombona,
  - type: text
    content: andro mandrahona sy maizim-pito,
  - type: text
    content: toy ny fahazavan’ny maraina miely manerana ny tendrombohitra,
  - type: text
    content: dia firenena lehibe sy matanjaka
  - type: text
    content: ka tsy nisy tahaka azy hatrizay hatrizay,
  - type: text
    content: sady tsy hisy tahaka azy intsony any aorianany,
  - type: text
    content: hatrany amin’ny taonan’ny taranaka fara aman-dimby.
  '20':
  - type: text
    content: Ary ilay avy any avaratra dia hampanalaviriko anareo
  - type: text
    content: ka horoahiko ho any amin’ny tany karankaina sady foana;
  - type: text
    content: ho any amin’ny ranomasina atsinanana ny lohalalany,
  - type: text
    content: ary ho any amin’ny ranomasina andrefana ny vodilalany;
  - type: text
    content: hiakatra ny hamaimboany,
  - type: text
    content: ary hisondrotra ny fofon-dratsiny
  - type: text
    content: fa efa nanao zava-dehibe izy.
  '21':
  - type: text
    content: Aza matahotra, ry tany fambolena,
  - type: text
    content: mifalia sy miravoravoa
  - type: text
    content: fa manao zava-dehibe NY TOMPO.
  '22':
  - type: text
    content: Aza matahotra, ry biby any an-tsaha,
  - type: text
    content: fa mihamaitso ny kijana any an-tany efitra,
  - type: text
    content: mamoa ny hazo
  - type: text
    content: ary vokatra ny aviavy sy ny voaloboka.
  '23':
  - type: text
    content: 'Ary ianareo, ry zanak’i '
  - type: text
    content: Ziona
  - type: text
    content: ', dia miravoravoa'
  - type: text
    content: sy mifalia amin’NY TOMPO Andriamanitrareo;
  - type: text
    content: fa hanome anareo ny lohaorana amin’ny fotoanany Izy
  - type: text
    content: ary handatsaka ranonorana mivatravatra ho anareo,
  - type: text
    content: dia ny lohaorana sy ny faraorana toy ny taloha.
  '24':
  - type: text
    content: Dia ho feno vary ny famoloana
  - type: text
    content: ary hihoatra ny vata fanantazana ny divay sy ny diloilo.
  '25':
  - type: text
    content: Ary honerako ho anareo ireo taona nohanin’ny valala,
  - type: text
    content: dia ny koraika sy ny sompanga ary ny kijeja, izay miaramilako betsaka nalefako hamely anareo.
  '26':
  - type: text
    content: Hihinana ianareo ka ho voky,
  - type: text
    content: ary hidera ny anaran’NY TOMPO Andriamanitrareo
  - type: text
    content: fa mahagaga ny fitondrany anareo;
  - type: text
    content: ary tsy ho menatra intsony ny oloko mandrakizay.
  '27':
  - type: text
    content: Dia ho fantatrareo fa ao afovoan’ny Israely Aho,
  - type: text
    content: ary Izaho no TOMPO Andriamanitrareo, fa tsy misy hafa;
  - type: text
    content: tsy ho menatra intsony ny oloko mandrakizay.
  '3':
  - type: text
    content: Misy afo mandevona eo alohany
  - type: text
    content: ary misy lelafo mandoro any aorianany;
  - type: text
    content: tahaka ny saha Edena ny tany eo alohany
  - type: text
    content: fa ny any aorianany kosa dia tahaka ny tany efitra foana,
  - type: text
    content: eny, tsy misy tsy azony.
  '4':
  - type: text
    content: Mitarehin-tsoavaly ny tarehiny
  - type: text
    content: ary tahaka ny firiotry ny mpitaingin-tsoavaly ny firiotrany.
  '5':
  - type: text
    content: Tahaka ny figorodon’ny kalesy fitondra miady
  - type: text
    content: any an-tampon’ny tendrombohitra no figorodon’ny fitsambikimbikiny,
  - type: text
    content: eny, tahaka ny fipororotry ny lelafo
  - type: text
    content: mandoro mololo,
  - type: text
    content: ary tahaka ny firenena mahery
  - type: text
    content: voalamina hiady.
  '6':
  - type: text
    content: Eo anoloany dia raiki-tahotra indrindra ny firenena;
  - type: text
    content: mivaloarika ny tarehy rehetra.
  '7':
  - type: text
    content: Mitsarapaka tahaka ny lehilahy mahery izy
  - type: text
    content: ary mananika ny manda tahaka ny mpiady,
  - type: text
    content: samy mandroso amin’izay hitsiny avy
  - type: text
    content: ka tsy vaky laharana.
  '8':
  - type: text
    content: Tsy mifanosika izy
  - type: text
    content: fa samy mandroso amin’izay hitsiny;
  - type: text
    content: ary na dia manidina aza ny lefona
  - type: text
    content: dia tsy miala an-daharana izy.
  '9':
  - type: text
    content: Mifamoivoy manerana ny tanàna izy,
  - type: text
    content: mihazakazaka eny amin’ny manda izy,
  - type: text
    content: mananika ny trano izy
  - type: text
    content: ary miditra eo am-baravarankely toy ny mpangalatra izy.
