document_id: JOL.2,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Efa akaiky ny Andron’NY TOMPO
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Tsofy ao '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Ziona
    - type: text
      text: ' ny anjomara!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miantsoa mafy ao amin’ny tendrombohitro masina!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka hangovitra ny mponina rehetra amin’ny tany!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa avy ny Andron’NY TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, efa antomotra izany,
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Eo alohany dia mihorohoro ny tany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mihozongozona ny lanitra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tonga maizina ny masoandro sy ny volana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy mamirapiratra ny kintana.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Ary NY TOMPO mahatonga kotroka eo alohan’ny miaramilany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa lehibe indrindra ny tobiny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mahery izay manatanteraka ny teniny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa lehibe ny Andron’NY TOMPO
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady mahatahotra indrindra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: koa iza no mahatanty izany?
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Izao no fotoana hiverenana amin’NY TOMPO
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Koa na dia ankehitriny aza,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy NY TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia miverena Amiko amin’ny fonareo manontolo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: amin’ny fifadian-kanina sy ny fitomaniana ary ny fitarainana.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Ny fonareo no triatriaro fa aza ny fitafianareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia miverena amin’NY TOMPO Andriamanitrareo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa mamindra fo sy miantra Izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mahari-po sady be famindrampo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary manenina ny amin’ny loza.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Iza no mahalala raha mba hanenina ihany Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hamela fitahiana ao aorianany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia fanatitra avy amin’ny zavamaniry sy fanatitra aidina ho an’NY TOMPO Andriamanitrareo?
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Tsofy ao '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Ziona
    - type: text
      text: ' ny anjomara!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manamasìna andro fifadian-kanina!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miantsoa fivoriana masina!
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Angony ny vahoaka!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manamasìna ny fiangonana!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vorio ny zokiolona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: angony ny ankizy madinika mbamin’ny zaza minono;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aoka ny mpampakatra hiala ao an’efitranony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary aoka ny ampakarina hiala ao an-trano fandriany.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Eo anelanelan’ny lalantsara fidirana sy ny alitara
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no aoka hitomanian’ny mpisorona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mpanao fanompoam-pivavahana ho an’NY TOMPO
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ka hilazany hoe: Iantrao ny olonao, RY TOMPO ô,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary aza avela ho latsa ny lovanao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ka hotapahin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jentilisa
    - type: text
      text: ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'fa nahoana no hataon’ny any amin’ny firenena hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aiza izay Andriamaniny?
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny tenin’Andriamanitra tamin’ny vahoakany
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: NY TOMPO dia saro-piaro amin’ny taniny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady miantra ny olony.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Eny, NY TOMPO niteny tamin’ny olony hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro, handefa varimbazaha sy ranom-boaloboka ary diloilo vaovao ho anareo Aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka ho vokin’izany ianareo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy havelako ho latsa any amin’ny Jentilisa intsony ianareo.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: dia andro maizina sy manjombona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: andro mandrahona sy maizim-pito,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toy ny fahazavan’ny maraina miely manerana ny tendrombohitra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia firenena lehibe sy matanjaka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy nisy tahaka azy hatrizay hatrizay,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady tsy hisy tahaka azy intsony any aorianany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hatrany amin’ny taonan’ny taranaka fara aman-dimby.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Ary ilay avy any avaratra dia hampanalaviriko anareo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka horoahiko ho any amin’ny tany karankaina sady foana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho any amin’ny ranomasina atsinanana ny lohalalany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ho any amin’ny ranomasina andrefana ny vodilalany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hiakatra ny hamaimboany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hisondrotra ny fofon-dratsiny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa efa nanao zava-dehibe izy.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Aza matahotra, ry tany fambolena,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mifalia sy miravoravoa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa manao zava-dehibe NY TOMPO.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Aza matahotra, ry biby any an-tsaha,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa mihamaitso ny kijana any an-tany efitra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mamoa ny hazo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary vokatra ny aviavy sy ny voaloboka.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Ary ianareo, ry zanak’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Ziona
    - type: text
      text: ', dia miravoravoa'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy mifalia amin’NY TOMPO Andriamanitrareo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa hanome anareo ny lohaorana amin’ny fotoanany Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary handatsaka ranonorana mivatravatra ho anareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ny lohaorana sy ny faraorana toy ny taloha.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Dia ho feno vary ny famoloana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hihoatra ny vata fanantazana ny divay sy ny diloilo.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Ary honerako ho anareo ireo taona nohanin’ny valala,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ny koraika sy ny sompanga ary ny kijeja, izay miaramilako betsaka nalefako hamely anareo.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Hihinana ianareo ka ho voky,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hidera ny anaran’NY TOMPO Andriamanitrareo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa mahagaga ny fitondrany anareo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy ho menatra intsony ny oloko mandrakizay.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Dia ho fantatrareo fa ao afovoan’ny Israely Aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary Izaho no TOMPO Andriamanitrareo, fa tsy misy hafa;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy ho menatra intsony ny oloko mandrakizay.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Misy afo mandevona eo alohany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary misy lelafo mandoro any aorianany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tahaka ny saha Edena ny tany eo alohany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny any aorianany kosa dia tahaka ny tany efitra foana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, tsy misy tsy azony.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Mitarehin-tsoavaly ny tarehiny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tahaka ny firiotry ny mpitaingin-tsoavaly ny firiotrany.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Tahaka ny figorodon’ny kalesy fitondra miady
  - type: usfm
    marker: q1
    children:
    - type: text
      text: any an-tampon’ny tendrombohitra no figorodon’ny fitsambikimbikiny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, tahaka ny fipororotry ny lelafo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mandoro mololo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tahaka ny firenena mahery
  - type: usfm
    marker: q1
    children:
    - type: text
      text: voalamina hiady.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Eo anoloany dia raiki-tahotra indrindra ny firenena;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mivaloarika ny tarehy rehetra.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Mitsarapaka tahaka ny lehilahy mahery izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mananika ny manda tahaka ny mpiady,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: samy mandroso amin’izay hitsiny avy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy vaky laharana.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Tsy mifanosika izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa samy mandroso amin’izay hitsiny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary na dia manidina aza ny lefona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia tsy miala an-daharana izy.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Mifamoivoy manerana ny tanàna izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mihazakazaka eny amin’ny manda izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mananika ny trano izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary miditra eo am-baravarankely toy ny mpangalatra izy.
