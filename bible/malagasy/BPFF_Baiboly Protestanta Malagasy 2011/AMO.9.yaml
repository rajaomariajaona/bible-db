document_id: AMO.9,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: 'Ny fahitana fahadimy: Tsy ho afa-mandositra'
  - type: text
    content: 'Nahita ny Tompo nitsangana teo anilan’ny alitara aho. Hoy Izy:'
  - type: text
    content: Asio ny lohan’ny andry hihetsiketsehan’ny tokonana,
  - type: text
    content: torotoroy hianjera amin’ny lohan’izy rehetra!
  - type: text
    content: Izay sisa aminy dia hovonoiko amin’ny sabatra
  - type: text
    content: ka tsy hisy afa-mandositra
  - type: text
    content: sady tsy hisy izay sisa ho afaka akory.
  '10':
  - type: text
    content: Sabatra no hamonoana ny mpanota rehetra amin’ny oloko,
  - type: text
    content: 'dia ireo izay milaza hoe:'
  - type: text
    content: Ny loza tsy hanakaiky
  - type: text
    content: na hahatratra anay.
  - type: heading
    content: Hatsangan’Andriamanitra indray ny fanjakan’i Davida
  '11':
  - type: text
    content: Amin’izany andro izany dia hatsangako indray ny trano bongon’i Davida izay efa nianjera,
  - type: text
    content: hotampenako ny banga eo aminy;
  - type: text
    content: hatsangako indray izay rava aminy
  - type: text
    content: ka haoriko ho tahaka ny taloha indray izy
  '12':
  - type: text
    content: mba handovany izay sisa amin’i Edoma
  - type: text
    content: sy amin’ny firenena rehetra
  - type: text
    content: hantsoina amin’ny anarako,
  - type: text
    content: hoy NY TOMPO izay manatanteraka izany.
  '13':
  - type: text
    content: Indro, avy ny andro,
  - type: text
    content: hoy NY TOMPO,
  - type: text
    content: izay hahatraran’ny mpiasa tany ny mpijinja
  - type: text
    content: ary ny mpanosihosy voaloboka dia hahatratra ny mpamafy;
  - type: text
    content: ny tendrombohitra dia hamoaka ranom-boaloboka
  - type: text
    content: ary ny havoana rehetra hiempo.
  '14':
  - type: text
    content: Dia hamerina ny Israely oloko indray Aho;
  - type: text
    content: dia hanangana ny tanàna efa rava izy
  - type: text
    content: ka honina ao,
  - type: text
    content: hamboly voaloboka izy
  - type: text
    content: ka hisotro ny divay avy aminy;
  - type: text
    content: hamboatra saham-boankazo koa izy
  - type: text
    content: ka hihinana ny vokatra avy aminy.
  '15':
  - type: text
    content: Eny, hamboleko ao amin’ny taniny izy
  - type: text
    content: ka tsy hongotana intsony amin’ny taniny
  - type: text
    content: izay nomeko azy,
  - type: text
    content: hoy NY TOMPO Andriamanitrao.
  '2':
  - type: text
    content: 'Na dia mibosesika ho any amin’ny '
  - type: text
    content: fitoeran’ny maty
  - type: text
    content: ' aza izy'
  - type: text
    content: dia any no hanalan’ny tanako azy;
  - type: text
    content: ary na dia miakatra ho any an-danitra aza izy
  - type: text
    content: dia avy any no hampidinako azy.
  '3':
  - type: text
    content: Na dia miery any an-tampon’i Karmela aza izy
  - type: text
    content: dia any no hitadiavako sy hanalako azy;
  - type: text
    content: ary na dia miafina any ambanin’ny ranomasina aza izy mba tsy ho hitan’ny masoko
  - type: text
    content: dia any no hibaikoako ny menarana hanaikitra azy.
  '4':
  - type: text
    content: Ary na dia lasan-ko babo eo anoloan’ny fahavalony aza izy
  - type: text
    content: dia any no hibaikoako ny sabatra hamono azy;
  - type: text
    content: ary hampanandriniko azy ny masoko
  - type: text
    content: hahatonga loza fa tsy soa aminy.
  - type: heading
    content: NY TOMPO no mitantana izao rehetra izao
  '5':
  - type: text
    content: Ary NY TOMPO, Andriamanitra Tompon’izao rehetra izao,
  - type: text
    content: no mikasika ny tany dia miempo izy;
  - type: text
    content: misaona ny mponina rehetra ao aminy;
  - type: text
    content: misondrotra tahaka an’i Neily avokoa ireny rehetra ireny
  - type: text
    content: ary mihena toy ny Neilin’i Ejipta indray izy;
  '6':
  - type: text
    content: Manangana ny tranony ambony any an-danitra Izy,
  - type: text
    content: sady manorina ny andohalambony eny ambonin’ny tany;
  - type: text
    content: miantso ny rano ao amin’ny ranomasina Izy
  - type: text
    content: 'ka mandraraka azy amin’ny tany:'
  - type: text
    content: NY TOMPO no anarany.
  - type: heading
    content: Ny sazy ho an’ny meloka
  '7':
  - type: text
    content: Moa tsy tahaka ny taranaky ny Kosita va ianareo Amiko ry Zanak’Israely? hoy NY TOMPO.
  - type: text
    content: Tsy nentiko nivoaka avy tany amin’ny tany Ejipta va ny Israely,
  - type: text
    content: ary avy tany Kaftora ny Filistina,
  - type: text
    content: ary avy tany Kira ny Arameana?
  '8':
  - type: text
    content: Indro, ny mason’NY TOMPO Andriamanitra
  - type: text
    content: no manandrina ity fanjakana feno ota ity
  - type: text
    content: ka hofongorako tsy ho eo ambonin’ny tany izy;
  - type: text
    content: kanefa tsy dia hofongorako tanteraka
  - type: text
    content: ny taranak’i Jakoba,
  - type: text
    content: hoy NY TOMPO.
  '9':
  - type: text
    content: Fa Indro, Izaho no mandidy,
  - type: text
    content: koa hosivaniko amin’ny firenena rehetra ny taranak’Israely,
  - type: text
    content: tahaka ny fanasivana vary amin’ny sivana;
  - type: text
    content: kanefa tsy hisy voam-bary ho latsaka amin’ny tany na dia iray akory aza.
