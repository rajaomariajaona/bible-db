document_id: AMO.9,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Ny fahitana fahadimy: Tsy ho afa-mandositra'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nahita ny Tompo nitsangana teo anilan’ny alitara aho. Hoy Izy:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Asio ny lohan’ny andry hihetsiketsehan’ny tokonana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: torotoroy hianjera amin’ny lohan’izy rehetra!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay sisa aminy dia hovonoiko amin’ny sabatra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy hisy afa-mandositra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady tsy hisy izay sisa ho afaka akory.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sabatra no hamonoana ny mpanota rehetra amin’ny oloko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'dia ireo izay milaza hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny loza tsy hanakaiky
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na hahatratra anay.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Hatsangan’Andriamanitra indray ny fanjakan’i Davida
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Amin’izany andro izany dia hatsangako indray ny trano bongon’i Davida izay efa nianjera,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hotampenako ny banga eo aminy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hatsangako indray izay rava aminy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka haoriko ho tahaka ny taloha indray izy
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba handovany izay sisa amin’i Edoma
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy amin’ny firenena rehetra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hantsoina amin’ny anarako,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy NY TOMPO izay manatanteraka izany.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro, avy ny andro,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy NY TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay hahatraran’ny mpiasa tany ny mpijinja
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny mpanosihosy voaloboka dia hahatratra ny mpamafy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny tendrombohitra dia hamoaka ranom-boaloboka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny havoana rehetra hiempo.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia hamerina ny Israely oloko indray Aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hanangana ny tanàna efa rava izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka honina ao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hamboly voaloboka izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hisotro ny divay avy aminy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hamboatra saham-boankazo koa izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hihinana ny vokatra avy aminy.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, hamboleko ao amin’ny taniny izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy hongotana intsony amin’ny taniny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay nomeko azy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy NY TOMPO Andriamanitrao.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Na dia mibosesika ho any amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: fitoeran’ny maty
    - type: text
      text: ' aza izy'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia any no hanalan’ny tanako azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary na dia miakatra ho any an-danitra aza izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia avy any no hampidinako azy.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na dia miery any an-tampon’i Karmela aza izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia any no hitadiavako sy hanalako azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary na dia miafina any ambanin’ny ranomasina aza izy mba tsy ho hitan’ny masoko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia any no hibaikoako ny menarana hanaikitra azy.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary na dia lasan-ko babo eo anoloan’ny fahavalony aza izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia any no hibaikoako ny sabatra hamono azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hampanandriniko azy ny masoko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hahatonga loza fa tsy soa aminy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: NY TOMPO no mitantana izao rehetra izao
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary NY TOMPO, Andriamanitra Tompon’izao rehetra izao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no mikasika ny tany dia miempo izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: misaona ny mponina rehetra ao aminy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: misondrotra tahaka an’i Neily avokoa ireny rehetra ireny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mihena toy ny Neilin’i Ejipta indray izy;
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manangana ny tranony ambony any an-danitra Izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady manorina ny andohalambony eny ambonin’ny tany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: miantso ny rano ao amin’ny ranomasina Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ka mandraraka azy amin’ny tany:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: NY TOMPO no anarany.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny sazy ho an’ny meloka
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moa tsy tahaka ny taranaky ny Kosita va ianareo Amiko ry Zanak’Israely? hoy NY TOMPO.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy nentiko nivoaka avy tany amin’ny tany Ejipta va ny Israely,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary avy tany Kaftora ny Filistina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary avy tany Kira ny Arameana?
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro, ny mason’NY TOMPO Andriamanitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no manandrina ity fanjakana feno ota ity
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hofongorako tsy ho eo ambonin’ny tany izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: kanefa tsy dia hofongorako tanteraka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny taranak’i Jakoba,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy NY TOMPO.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa Indro, Izaho no mandidy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: koa hosivaniko amin’ny firenena rehetra ny taranak’Israely,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tahaka ny fanasivana vary amin’ny sivana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: kanefa tsy hisy voam-bary ho latsaka amin’ny tany na dia iray akory aza.
