document_id: PSA.121,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Avy aiza ny famonjena ahy?
  - type: text
    content: Hira fanao amin’ny fiakarana
  - type: text
    content: Manopy ny masoko eny amin’ny tendrombohitra aho;
  - type: text
    content: avy aiza ny famonjena ahy?
  '2':
  - type: text
    content: Ny famonjena ahy dia avy amin’NY TOMPO,
  - type: text
    content: Mpanao ny lanitra sy ny tany.
  '3':
  - type: text
    content: Tsy mba havelany hangozohozo anie ny tongotrao;
  - type: text
    content: tsy ho rendrehana anie ny Mpiaro anao.
  '4':
  - type: text
    content: Indro, tsy matory na rendrehana
  - type: text
    content: ny Mpiaro ny Israely.
  '5':
  - type: text
    content: NY TOMPO no Mpiaro anao;
  - type: text
    content: NY TOMPO no fialofanao eo ankavananao.
  '6':
  - type: text
    content: Tsy mba hamely anao ny masoandro nony andro,
  - type: text
    content: na ny volana nony alina.
  '7':
  - type: text
    content: Hiaro anao amin’ny ratsy rehetra NY TOMPO;
  - type: text
    content: eny, hiaro ny fanahinao Izy.
  '8':
  - type: text
    content: Hiaro anao NY TOMPO, na mivoaka ny trano ianao na miditra,
  - type: text
    content: hatramin’izao ka ho mandrakizay.
