document_id: PSA.121
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Avy aiza ny famonjena ahy?
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: Hira fanao amin’ny fiakarana
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Manopy ny masoko eny amin’ny tendrombohitra aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: avy aiza ny famonjena ahy?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ny famonjena ahy dia avy amin’NY TOMPO,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mpanao ny lanitra sy ny tany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Tsy mba havelany hangozohozo anie ny tongotrao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy ho rendrehana anie ny Mpiaro anao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Indro, tsy matory na rendrehana
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny Mpiaro ny Israely.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: NY TOMPO no Mpiaro anao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: NY TOMPO no fialofanao eo ankavananao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Tsy mba hamely anao ny masoandro nony andro,
- type: usfm
  marker: q1
  children:
  - type: text
    text: na ny volana nony alina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Hiaro anao amin’ny ratsy rehetra NY TOMPO;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, hiaro ny fanahinao Izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Hiaro anao NY TOMPO, na mivoaka ny trano ianao na miditra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hatramin’izao ka ho mandrakizay.
