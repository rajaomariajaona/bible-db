document_id: EZK.4,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ezekiela sy ny fahiranon’i Jerosalema
  - type: text
    content: 'Ary ianao, ry '
  - type: text
    content: zanak’olona
  - type: text
    content: ', makà biriky tanimanga ary apetraho eo anoloanao, dia manaova sarin-tanàna eo aminy, sarin’i Jerosalema. '
  '10':
  - type: text
    content: 'Tsinjaraina no hihinananao ny haninao, dia roapolo sekela isanandro; amin’ny fotoana voafetra isanandro no hihinananao azy. '
  '11':
  - type: text
    content: 'Rano afàtra no hosotroinao, ampahenin’ny '
  - type: text
    content: hina
  - type: text
    content: '; amin’ny fotoana voafetra isanandro koa no hisotroanao azy. '
  '12':
  - type: text
    content: 'Hatao toy ny mofo varimbazaha no ho fihinanao azy, ary dikin’olona no hataonao kitay hanendasanao azy eo imasony. '
  '13':
  - type: text
    content: 'Ary hoy NY TOMPO: Toy izany no hihinanan’ny Zanak’Israely ny mofony voaloto any amin’ny firenena izay handroahako azy.'
  '14':
  - type: text
    content: 'Dia hoy aho: Indrisy! Ry TOMPO Andriamanitra ô! Indro, tsy mbola voaloto aho; fa hatry ny fony aho mbola tanora ka mandraka ankehitriny dia tsy mba nihinana izay fatin-javatra na izay noviraviraim-biby akory aho; ary tsy mbola nikasika ny vavako akory izay hena ratsy. '
  '15':
  - type: text
    content: 'Dia hoy Izy tamiko: Indro ary, tain’omby no omeko anao hisolo ny dikin’olona ka izany no hataonao kitay hanendasanao ny mofonao. '
  '16':
  - type: text
    content: 'Hoy koa Izy tamiko: Ry zanak’olona, indro, hotapahiko any Jerosalema ny mofo tohan’aina ka antsinjarany, amin’ny tebiteby, no hihinanany mofo, ary rano afàtra no hosotroiny amin’ny tahotra. '
  '17':
  - type: text
    content: Koa tsy hahita mofo na rano izy, ary samy ho raiki-tahotra sady hihalevona noho ny helony.
  '2':
  - type: text
    content: 'Dia ataovy fahirano izany ka manangàna manda fanafihana hamelezana azy; manandrata tovon-tany eo aminy, asio toby hamelezana azy ary anangano lohondry fandravana manodidina azy. '
  '3':
  - type: text
    content: Ary makà lapoaly vy ka ataovy manda vy eo anelanelanao sy ny tanàna; banjino tsara io, ary aoka hatao fahirano, eny, aoka hataonao fahirano io. Famantarana ho amin’ny taranak’Israely izany.
  '4':
  - type: text
    content: 'Ary ianao, mandria amin’ny ilanao havia ka ataovy eo aminy ny fahotan’ny taranak’Israely; koa araka ny isan’ny andro handrianao toy izany no hitondranao ny helony. '
  '5':
  - type: text
    content: 'Fa Izaho manao fetrandro ho anao mitovy amin’ny taonan’ny helony, dia sivifolo sy telonjato andro izay hitondranao ny heloky ny taranak’Israely. '
  '6':
  - type: text
    content: 'Rehefa tapitrao ireo dia mandria amin’ny ilanao havanana, ary aoka hitondra ny heloky ny taranak’i Joda efapolo andro ianao; ny andro iray no ataoko solon’ny taona iray ho anao. '
  '7':
  - type: text
    content: 'Dia banjino tsara io fahirano an’i Jerosalema io, ary aoka hiseho sandry ianao ka haminany hamely azy. '
  '8':
  - type: text
    content: Ary indro, hafatotro ianao ka tsy hahavadi-mandry ambara-pahatapitrao ny andron’ny fahiranonao.
  '9':
  - type: text
    content: 'Ary makà varimbazaha, tsaramaso, voanemba, tsiasisa, ampemby sy spelta ary ataovy anaty vilia iray ireo ka anaovy mofo ho anao; araka ny isan’ny andro izay handrianao amin’ny ilanao, dia sivifolo sy telonjato andro, no hihinananao azy. '
