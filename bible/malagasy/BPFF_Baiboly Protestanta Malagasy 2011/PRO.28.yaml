document_id: PRO.28
type_code: plt
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Mandositra ny ratsy fanahy na dia tsy misy manenjika aza;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny marina kosa dia matoky toy ny liona tanora.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ny fikomian’ny tany dia mahamaro isa ny mpanapaka eo aminy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny fisian’ny olona manan-tsaina sy fahalalana kosa no mampateza ny fanjakana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ny lehilahy mahantra izay mampahory ny madinika
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia toy ny ranonorana izay mipaoka ka tsy mamela hanina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Izay mahafoy ny lalàna dia mandoka ny ratsy fanahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa izay mitandrina ny lalàna kosa dia mirehitra hanohitra azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Tsy mahalala izay rariny ny ratsy fanahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa izay mitady NY TOMPO no mahalala ny zavatra rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ny mahantra izay mandeha amin’ny fahitsiany
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia tsara noho ny manankarena nefa mandeha amin’ny lalana miolikolika.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Izay mitandrina ny lalàna no zanaka hendry,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa izay misakaiza amin’ny mpandany harena dia manome henatra ny rainy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Izay mampitombo ny fananany amin’ny zana-bola sy ny tombony
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia manangona ho an’izay miantra ny mahantra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Izay manentsin-tadìny dia tsy hihaino ny fampianarana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: na ny vavaka ataony aza dia fahavetavetana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Izay mampivily ny mahitsy ho amin’ny lalan-dratsy
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ho lavo ao amin’ny lavaka nataony;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny tsy misy tsiny no handova ny soa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Mihevi-tena ho hendry ny mpanankarena,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny mahantra izay manan-tsaina dia hizaha toetra azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Rehefa ravoravo ny marina dia lehibe ny voninahitra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa rehefa misandratra kosa ny ratsy fanahy dia miery ny vahoaka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Izay manafina ny fahotany dia tsy hambinina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa izay mitsotra ka mahafoy azy no hahazo famindrampo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Sambatra izay olona matahotra mandrakariva!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa izay manamafy ny fony no hidiran-doza.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Liona mierona sy bera miremby
- type: usfm
  marker: q1
  children:
  - type: text
    text: amin’ny olona reraka ny mpanapaka ratsy fanahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ny mpanapaka tsy ampy saina dia mahery mampahory,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa izay mankahala ny fitiavan-karena no ho ela velona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Izay itambesaran-keloka noho ny fandatsahan-dra dia handositra hatrany an-davaka;
- type: usfm
  marker: q1
  children:
  - type: text
    text: aoka tsy hisy hihazona azy!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Izay mandeha tsy misy tsiny no ho voavonjy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa izay mandia lalana roa miolikolika dia hianjera ao amin’ny iray.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Izay miasa ny taniny dia ho voky hanina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa izay manenjika zava-poana ho voky fahantrana kosa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Izay olona mahatoky dia hahazo fitahiana be,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa izay maimay ta hanankarena tsy ho afa-tsiny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Tsy mety ny mizaha tavan’olona;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa na dia amin’ny sombin-kanina ihany aza dia sahin’ny olona hanotana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ny mpialona dia maimay ta hanankarena;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy fantany fa ho tonga aminy ny tsy fisiana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Izay mananatra olona no hahita fitia rahatrizay
- type: usfm
  marker: q1
  children:
  - type: text
    text: mihoatra noho izay mandokadoka amin’ny lelany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Izay mandroba ray sy reny
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ka milaza hoe: Tsy heloka izany,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia mpiray dia amin’ny jiolahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Izay tsy mety afa-po dia manetsika ady,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa izay matoky NY TOMPO no hanana ny feno.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Izay matoky ny fony dia adala,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa izay mandeha amin’ny fahendrena no ho afa-miala.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Izay manome ny mahantra dia tsy hisy zava-mahory azy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa izay minia mikimpy kosa dia hahazo ozona be.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Raha misandratra ny ratsy fanahy dia miery ny vahoaka;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa raha ringana kosa izy dia mihamaro ny marina.
