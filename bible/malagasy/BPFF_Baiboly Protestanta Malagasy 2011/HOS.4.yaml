document_id: HOS.4,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny adin’Andriamanitra amin’ny Israely
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mihainoa ny tenin’NY TOMPO, ianareo Zanak’Israely!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa manana ady amin’ny mponina amin’ny tany NY TOMPO
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria tsy misy fahamarinana, na fitiavana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na fahalalana an’Andriamanitra eo amin’ny tany,
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa hihinana izy nefa tsy ho voky,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hijangajanga izy nefa tsy hitombo isa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria efa tsy nahoany intsony NY TOMPO.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fijangajangan’ny olona
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fijangajangana sy divay ary ranom-boaloboka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no mahavery ny saina.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mila saina amin’ny tapa-kazony ny oloko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny tehiny no miteny aminy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny fanahim-pijangajangana no nampania azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mijangajanga izy ka manalavitra an’Andriamaniny.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny an-tampon’ny tendrombohitra no amonoany zavatra hatao fanatitra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny amin’ny havoana no andoroany ditin-kazo manitra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'dia eny ambanin’ny hazo oaka sy ny hazo kesika ary ny hazo '
    - type: usfm
      marker: w
      children:
      - type: text
        text: terebinta
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay tsara alokaloka!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa izany no ijejojejoan’ny zanakavavinareo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ijangajangan’ny vinantovavinareo.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy hamaly ny zanakavavinareo Aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: raha mijejojejo izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na ny vinantovavinareo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: raha mijangajanga izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny tenany aza dia mitokana mankany amin’ny mpijangajanga
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady mamono zavatra hatao fanatitra miaraka amin’ireo mpijangajanga ho fanompoan-tsampy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy ho vanona ny firenena tsy misaina.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na dia mijangajanga aza ianao, ry Israely,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aoka tsy mba hanota ny Joda;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aza mankany Gilgala ianareo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na miakatra any Bety-Avena;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ary aza mianiana hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha velona koa NY TOMPO!
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa maditra toy ny vantotra ombivavy maditra ny Israely;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: koa ankehitriny dia handrasan’NY TOMPO
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toy ny zanak’ondry eny amin’ny malalaka izy.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lasa mpiombona amin’ny sampy i Efraima;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aoka izy ho eo!
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha vao mitsahatra ny fibobohany divay
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia tsy manao afa-tsy ny mijangajanga izy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mankasitraka fahafaham-baraka ireo mpitondra azy.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voapaoky ny elatry ny rivotra izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka ho menatra noho ny zavatra novonoiny hatao fanatitra.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa fanozonana sy lainga,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: famonoana sy halatra ary fijangajangana kosa;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, manao an-keriny izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy mitsahatra ny mandatsa-dra.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Noho izany dia mitomany ny tany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary reraka izay rehetra mitoetra ao aminy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mbamin’ny bibidia
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny voromanidina;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, na dia ny hazandrano any anaty ranomasina aza dia ringana koa.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Miampanga ny mpisoron’ny Israely Andriamanitra
    marker-yv: yv-h
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Kanefa aza misy miampanga
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na manome tsiny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny olonao dia efa tahaka ireo mifamaly amin’ny mpisorona.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho tafintohina antoandro ianao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny mpaminany koa dia hiara-tafintohina aminao amin’ny alina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hovonoiko ny reninao.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ringana ny oloko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: noho ny tsy fisian’ny fahalalana.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Satria nandà ny fahalalana ianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia mba holaviko kosa tsy ho mpisoroko intsony;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nanadino ny lalànan’Andriamanitrao ianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka mba hohadinoiko kosa ny zanakao.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Arakaraka ny nitomboany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no nanotany Tamiko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hampodiko ho henatra kosa ny voninahiny.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mamoky tena amin’ny fanatitra fanadiovana izay aterin’ny oloko izy ireo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka satriny ihany ho diso ny olona.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho sahala ihany ny hanjo ny olona sy ny mpisorona;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hovaliako noho ny lalany izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hatsingeriko aminy ny nataony.
