document_id: HOS.4,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny adin’Andriamanitra amin’ny Israely
  - type: text
    content: Mihainoa ny tenin’NY TOMPO, ianareo Zanak’Israely!
  - type: text
    content: Fa manana ady amin’ny mponina amin’ny tany NY TOMPO
  - type: text
    content: satria tsy misy fahamarinana, na fitiavana
  - type: text
    content: na fahalalana an’Andriamanitra eo amin’ny tany,
  '10':
  - type: text
    content: Koa hihinana izy nefa tsy ho voky,
  - type: text
    content: hijangajanga izy nefa tsy hitombo isa
  - type: text
    content: satria efa tsy nahoany intsony NY TOMPO.
  - type: heading
    content: Ny fijangajangan’ny olona
  '11':
  - type: text
    content: Fijangajangana sy divay ary ranom-boaloboka
  - type: text
    content: no mahavery ny saina.
  '12':
  - type: text
    content: Mila saina amin’ny tapa-kazony ny oloko
  - type: text
    content: ary ny tehiny no miteny aminy;
  - type: text
    content: fa ny fanahim-pijangajangana no nampania azy;
  - type: text
    content: mijangajanga izy ka manalavitra an’Andriamaniny.
  '13':
  - type: text
    content: Eny an-tampon’ny tendrombohitra no amonoany zavatra hatao fanatitra;
  - type: text
    content: eny amin’ny havoana no andoroany ditin-kazo manitra,
  - type: text
    content: 'dia eny ambanin’ny hazo oaka sy ny hazo kesika ary ny hazo '
  - type: text
    content: terebinta
  - type: text
    content: izay tsara alokaloka!
  - type: text
    content: Koa izany no ijejojejoan’ny zanakavavinareo
  - type: text
    content: sy ijangajangan’ny vinantovavinareo.
  '14':
  - type: text
    content: Tsy hamaly ny zanakavavinareo Aho
  - type: text
    content: raha mijejojejo izy,
  - type: text
    content: na ny vinantovavinareo
  - type: text
    content: raha mijangajanga izy,
  - type: text
    content: fa ny tenany aza dia mitokana mankany amin’ny mpijangajanga
  - type: text
    content: sady mamono zavatra hatao fanatitra miaraka amin’ireo mpijangajanga ho fanompoan-tsampy.
  - type: text
    content: Tsy ho vanona ny firenena tsy misaina.
  '15':
  - type: text
    content: Na dia mijangajanga aza ianao, ry Israely,
  - type: text
    content: aoka tsy mba hanota ny Joda;
  - type: text
    content: aza mankany Gilgala ianareo
  - type: text
    content: na miakatra any Bety-Avena;
  - type: text
    content: 'ary aza mianiana hoe:'
  - type: text
    content: Raha velona koa NY TOMPO!
  '16':
  - type: text
    content: Fa maditra toy ny vantotra ombivavy maditra ny Israely;
  - type: text
    content: koa ankehitriny dia handrasan’NY TOMPO
  - type: text
    content: toy ny zanak’ondry eny amin’ny malalaka izy.
  '17':
  - type: text
    content: Lasa mpiombona amin’ny sampy i Efraima;
  - type: text
    content: aoka izy ho eo!
  '18':
  - type: text
    content: Raha vao mitsahatra ny fibobohany divay
  - type: text
    content: dia tsy manao afa-tsy ny mijangajanga izy.
  - type: text
    content: Mankasitraka fahafaham-baraka ireo mpitondra azy.
  '19':
  - type: text
    content: Voapaoky ny elatry ny rivotra izy
  - type: text
    content: ka ho menatra noho ny zavatra novonoiny hatao fanatitra.
  '2':
  - type: text
    content: fa fanozonana sy lainga,
  - type: text
    content: famonoana sy halatra ary fijangajangana kosa;
  - type: text
    content: eny, manao an-keriny izy
  - type: text
    content: ary tsy mitsahatra ny mandatsa-dra.
  '3':
  - type: text
    content: Noho izany dia mitomany ny tany
  - type: text
    content: ary reraka izay rehetra mitoetra ao aminy
  - type: text
    content: mbamin’ny bibidia
  - type: text
    content: sy ny voromanidina;
  - type: text
    content: eny, na dia ny hazandrano any anaty ranomasina aza dia ringana koa.
  - type: heading
    content: Miampanga ny mpisoron’ny Israely Andriamanitra
  '4':
  - type: text
    content: Kanefa aza misy miampanga
  - type: text
    content: na manome tsiny
  - type: text
    content: fa ny olonao dia efa tahaka ireo mifamaly amin’ny mpisorona.
  '5':
  - type: text
    content: Ho tafintohina antoandro ianao;
  - type: text
    content: ny mpaminany koa dia hiara-tafintohina aminao amin’ny alina,
  - type: text
    content: ary hovonoiko ny reninao.
  '6':
  - type: text
    content: Ringana ny oloko
  - type: text
    content: noho ny tsy fisian’ny fahalalana.
  - type: text
    content: Satria nandà ny fahalalana ianao,
  - type: text
    content: dia mba holaviko kosa tsy ho mpisoroko intsony;
  - type: text
    content: nanadino ny lalànan’Andriamanitrao ianao,
  - type: text
    content: ka mba hohadinoiko kosa ny zanakao.
  '7':
  - type: text
    content: Arakaraka ny nitomboany
  - type: text
    content: no nanotany Tamiko
  - type: text
    content: ka hampodiko ho henatra kosa ny voninahiny.
  '8':
  - type: text
    content: Mamoky tena amin’ny fanatitra fanadiovana izay aterin’ny oloko izy ireo,
  - type: text
    content: ka satriny ihany ho diso ny olona.
  '9':
  - type: text
    content: Ho sahala ihany ny hanjo ny olona sy ny mpisorona;
  - type: text
    content: hovaliako noho ny lalany izy,
  - type: text
    content: ary hatsingeriko aminy ny nataony.
