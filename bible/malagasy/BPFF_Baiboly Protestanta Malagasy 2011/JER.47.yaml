document_id: JER.47,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Faminaniana ny amin’ny Filistina
  - type: text
    content: Ny tenin’NY TOMPO izay tonga tamin’i Jeremia mpaminany ny amin’ny Filistina, fony i Farao tsy mbola namely an’i Gaza.
  '2':
  - type: text
    content: 'Izao no lazain’NY TOMPO:'
  - type: text
    content: Indro, misy rano mizotra avy any avaratra
  - type: text
    content: ka ho tonga ony maria
  - type: text
    content: manafotra ny tany mbamin’izay rehetra ao aminy,
  - type: text
    content: dia ny tanàna mbamin’izay monina ao aminy;
  - type: text
    content: mitaraina ny olona,
  - type: text
    content: ary midradradradra ny mponina rehetra amin’ny tany,
  '3':
  - type: text
    content: noho ny fikatrokatroky ny kitron’ny soavaliny matanjaka
  - type: text
    content: sy ny fikorodondrodon’ny kalesy fitondrany miady
  - type: text
    content: ary ny fikotrokotroky ny kodiarany;
  - type: text
    content: ary ny ray dia tsy mijery ny zanany
  - type: text
    content: fa miraviravy tanana,
  '4':
  - type: text
    content: noho ny hiavian’ny andro
  - type: text
    content: handravana ny Filistina rehetra
  - type: text
    content: sy handringanana izay sisa rehetra
  - type: text
    content: ta hanampy an’i Tiro sy i Sidona;
  - type: text
    content: fa horavan’NY TOMPO ny Filistina,
  - type: text
    content: dia ny sisa avy any amin’ny nosy Kaftora.
  '5':
  - type: text
    content: Voaharatra ny lohan’i Gaza,
  - type: text
    content: ao anatin’ny fahanginana i Askelona
  - type: text
    content: mbamin’ny sisa amin’ny lohasahany;
  - type: text
    content: mandra-pahoviana no mbola hitetika ny tenanao ianao?
  '6':
  - type: text
    content: Indrisy, ry sabatry NY TOMPO!
  - type: text
    content: Mandra-pahoviana no tsy hitsaharanao?
  - type: text
    content: Midira ao amin’ny tranonao ihany;
  - type: text
    content: mitsahara, mijanòna.
  '7':
  - type: text
    content: Hataonao ahoana no fitsahatra?
  - type: text
    content: Fa NY TOMPO no nandidy azy,
  - type: text
    content: eny, hamely an’i Askelona mbamin’ny eny amoron-dranomasina,
  - type: text
    content: izay no efa nanendreny azy.
