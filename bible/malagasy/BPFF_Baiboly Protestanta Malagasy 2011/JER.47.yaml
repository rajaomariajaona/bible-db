document_id: JER.47,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Faminaniana ny amin’ny Filistina
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Ny tenin’NY TOMPO izay tonga tamin’i Jeremia mpaminany ny amin’ny Filistina, fony i Farao tsy mbola namely an’i Gaza.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Izao no lazain’NY TOMPO:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro, misy rano mizotra avy any avaratra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka ho tonga ony maria
  - type: usfm
    marker: q1
    children:
    - type: text
      text: manafotra ny tany mbamin’izay rehetra ao aminy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ny tanàna mbamin’izay monina ao aminy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mitaraina ny olona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary midradradradra ny mponina rehetra amin’ny tany,
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: noho ny fikatrokatroky ny kitron’ny soavaliny matanjaka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny fikorodondrodon’ny kalesy fitondrany miady
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny fikotrokotroky ny kodiarany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny ray dia tsy mijery ny zanany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa miraviravy tanana,
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: noho ny hiavian’ny andro
  - type: usfm
    marker: q1
    children:
    - type: text
      text: handravana ny Filistina rehetra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy handringanana izay sisa rehetra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ta hanampy an’i Tiro sy i Sidona;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa horavan’NY TOMPO ny Filistina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ny sisa avy any amin’ny nosy Kaftora.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Voaharatra ny lohan’i Gaza,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ao anatin’ny fahanginana i Askelona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mbamin’ny sisa amin’ny lohasahany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mandra-pahoviana no mbola hitetika ny tenanao ianao?
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Indrisy, ry sabatry NY TOMPO!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mandra-pahoviana no tsy hitsaharanao?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Midira ao amin’ny tranonao ihany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mitsahara, mijanòna.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Hataonao ahoana no fitsahatra?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa NY TOMPO no nandidy azy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, hamely an’i Askelona mbamin’ny eny amoron-dranomasina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay no efa nanendreny azy.
