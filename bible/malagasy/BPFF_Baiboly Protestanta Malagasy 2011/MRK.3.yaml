document_id: MRK.3,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ilay lehilahy iray maty tanana
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mat 12.9-14; Lio 6.6-11
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary niditra tao amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sinagoga
    - type: text
      text: ' indray Jesosy. Ary indro, nisy lehilahy iray maty tanana tao. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa efa nanasitrana olona maro Izy ka nirohotra nankeo Aminy mba hikasika Azy izay rehetra nanana aretina. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny fanahy maloto, raha nahita Azy, dia niankohoka teo anatrehany ka niteny mafy hoe: Ianao no Zanak’Andriamanitra! '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nefa nandrara azy ireo mafy Izy mba tsy hanao izay hahafantarana Azy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nifidianan’i Jesosy ny roa amby folo lahy
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mat 10.1-4; Lio 6.12-16; Asa 1.13
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary niakatra teo an-tendrombohitra Jesosy ka niantso izay tiany hankeo Aminy, dia nankeo Aminy ireo.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nanendry roa amby folo lahy Izy mba ho eo Aminy sy hirahiny hitoriteny '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'sady hanana fahefana handroaka ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: demonia
    - type: text
      text: .
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I Simona dia nomeny anarana hafa koa hoe Petera; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'i Jakoba, zanak’i Zebedio, sy i Jaona, rahalahin’i Jakoba; izy mirahalahy ireo dia nomeny anarana hafa koa hoe Boanerjesy, izany hoe Zana-baratra; '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: i Andrea, i Filipo, i Bartolomeo, i Matio, i Tomasy, i Jakoba zanak’i Alfeo, i Tadeo, i Simona kananeana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.18 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Zelota; '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'zahao '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Mat 10.4.
      marker-yv: yv-n
    - type: text
      text: ' '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ary i Jodasy iskariota, ilay namadika Azy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mifandray amin’ny demonia va Jesosy?
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nijery izay ho fihetsiny ny olona, na hanasitrana an’ilay marary amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Sabata
    - type: text
      text: ' Izy na tsia, mba hiampangany Azy. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary niditra tao amin’ny trano iray Jesosy, dia vory indray ny vahoaka ka tsy afaka nisakafo akory Izy. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny havany, raha nandre izany, dia tonga mba haka Azy; fa hoy ireo: Efa very saina Izy.'
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mat 12.24-29; Lio 11.15-22
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpanoradalàna
    - type: text
      text: ' izay nidina avy tany Jerosalema dia niteny hoe: Manana an’i Belzeboba Izy, ary koa: Ny lohan’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: demonia
    - type: text
      text: ' no androahany ny demonia.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Jesosy niantso azy ireo hankeo Aminy ary nilaza fanoharana taminy hoe: Hataon’i Satana ahoana no fandroaka an’i Satana? '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha misy fanjakana miady an-trano dia tsy haharitra izany fanjakana izany. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary raha misy mpiray trano miady an-trano dia tsy haharitra izany mpiray trano izany. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary raha i Satana no mitsangana hanohitra ny tenany ka miady an-trano dia tsy haharitra izy fa ho rava ny heriny. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Kanefa tsy misy olona afaka miditra ao an-tranon’ny mahery ka handroba ny entany raha tsy afatony aloha ilay mahery dia izay vao robainy ny ao an-tranony.
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mat 12.31-33; Lio 12.10
    marker-yv: yv-h
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lazaiko aminareo marina tokoa: Hahazo famelan-keloka ny zanak’olombelona amin’ny ota rehetra sy ny fitenenan-dratsy rehetra izay ataony; '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fa izay miteny ratsy ny Fanahy Masina kosa dia tsy hahazo famelan-keloka mandrakizay, fa mendrika hohelohina ny amin’ny ota mandrakizay izy. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy Jesosy tamin’ilay lehilahy maty tanana: Mitsangàna etsy afovoany. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny olona mantsy dia niteny hoe: Azom-panahy maloto Izy.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny tena havan’i Jesosy
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mat 12.46-50; Lio 8.19-21
    marker-yv: yv-h
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary tonga ny reniny mbamin’ireo rahalahiny ka nijanona teo alatrano, dia naniraka olona hankao Aminy hiantso Azy. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nipetraka manodidina Azy ny vahoaka ka nilaza Taminy hoe: Indreo, ao alatrano ny reninao sy ireo rahalahinao ary ireo anabavinao mitady Anao. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Izy namaly azy ireo hoe: Iza no reniko sy rahalahiko? '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nijery izay nipetraka manodidina Azy Izy ka niteny hoe: Ireto ny reniko sy ny rahalahiko! '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa na iza na iza no manao ny sitrapon’Andriamanitra dia izy no rahalahiko sy anabaviko ary reniko.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy koa Izy tamin’ny olona: Inona moa no tokony hatao amin’ny Sabata, ny manao soa va sa ny manao ratsy? Ny mamonjy aina va sa ny mamono? Fa tsy nisy niteny ny olona. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nibanjina azy ireo tamim-pahatezerana Izy sady nalahelo noho ny hamafin’ny fony ka hoy Izy tamin-dRalehilahy: Atsory ny tananao. Dia natsotrany ka sitrana ny tanany.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary niala tao amin’ny sinagoga ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Fariseo
    - type: text
      text: ' ka avy hatrany dia nikaon-doha niaraka tamin’ny Herodiana hanohitra an’i Jesosy mba hahafaty Azy.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nanatonan’ny olona an’i Jesosy
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mat 4.23-25; 12.15-16; Lio 6.17-19
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary niala teo Jesosy mbamin’ny mpianany ka nankany amin’ny ranomasina. Nisy olona marobe avy tany Galilia nanaraka Azy, ary nisy olona marobe koa avy tany '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jodia
    - type: text
      text: ', '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Jerosalema, Edoma, avy tany andafin’i Jordana sy ny tany manodidina an’i Tiro sy i Sidona izay nandre izay zavatra nataony ka nankany Aminy.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nilaza tamin’ny mpianany Izy mba hanomana sambokely iray ho Azy noho ny habetsahan’ny vahoaka, mba tsy hifanositosika Aminy ny olona. '
