document_id: MRK.3
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ilay lehilahy iray maty tanana
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat 12.9-14; Lio 6.6-11
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary niditra tao amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sinagoga
  - type: text
    text: ' indray Jesosy. Ary indro, nisy lehilahy iray maty tanana tao. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary nijery izay ho fihetsiny ny olona, na hanasitrana an’ilay marary amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Sabata
  - type: text
    text: ' Izy na tsia, mba hiampangany Azy. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dia hoy Jesosy tamin’ilay lehilahy maty tanana: Mitsangàna etsy afovoany. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary hoy koa Izy tamin’ny olona: Inona moa no tokony hatao amin’ny Sabata, ny manao soa va sa ny manao ratsy? Ny mamonjy aina va sa ny mamono? Fa tsy nisy niteny ny olona. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary nibanjina azy ireo tamim-pahatezerana Izy sady nalahelo noho ny hamafin’ny fony ka hoy Izy tamin-dRalehilahy: Atsory ny tananao. Dia natsotrany ka sitrana ny tanany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary niala tao amin’ny sinagoga ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Fariseo
  - type: text
    text: ' ka avy hatrany dia nikaon-doha niaraka tamin’ny Herodiana hanohitra an’i Jesosy mba hahafaty Azy.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nanatonan’ny olona an’i Jesosy
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat 4.23-25; 12.15-16; Lio 6.17-19
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary niala teo Jesosy mbamin’ny mpianany ka nankany amin’ny ranomasina. Nisy olona marobe avy tany Galilia nanaraka Azy, ary nisy olona marobe koa avy tany '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jodia
  - type: text
    text: ', '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Jerosalema, Edoma, avy tany andafin’i Jordana sy ny tany manodidina an’i Tiro sy i Sidona izay nandre izay zavatra nataony ka nankany Aminy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary nilaza tamin’ny mpianany Izy mba hanomana sambokely iray ho Azy noho ny habetsahan’ny vahoaka, mba tsy hifanositosika Aminy ny olona. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Fa efa nanasitrana olona maro Izy ka nirohotra nankeo Aminy mba hikasika Azy izay rehetra nanana aretina. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary ny fanahy maloto, raha nahita Azy, dia niankohoka teo anatrehany ka niteny mafy hoe: Ianao no Zanak’Andriamanitra! '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Nefa nandrara azy ireo mafy Izy mba tsy hanao izay hahafantarana Azy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nifidianan’i Jesosy ny roa amby folo lahy
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat 10.1-4; Lio 6.12-16; Asa 1.13
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ary niakatra teo an-tendrombohitra Jesosy ka niantso izay tiany hankeo Aminy, dia nankeo Aminy ireo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary nanendry roa amby folo lahy Izy mba ho eo Aminy sy hirahiny hitoriteny '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'sady hanana fahefana handroaka ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: demonia
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'I Simona dia nomeny anarana hafa koa hoe Petera; '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'i Jakoba, zanak’i Zebedio, sy i Jaona, rahalahin’i Jakoba; izy mirahalahy ireo dia nomeny anarana hafa koa hoe Boanerjesy, izany hoe Zana-baratra; '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: i Andrea, i Filipo, i Bartolomeo, i Matio, i Tomasy, i Jakoba zanak’i Alfeo, i Tadeo, i Simona kananeana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.18 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Zelota; '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'zahao '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Mat 10.4.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ary i Jodasy iskariota, ilay namadika Azy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mifandray amin’ny demonia va Jesosy?
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary niditra tao amin’ny trano iray Jesosy, dia vory indray ny vahoaka ka tsy afaka nisakafo akory Izy. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary ny havany, raha nandre izany, dia tonga mba haka Azy; fa hoy ireo: Efa very saina Izy.'
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat 12.24-29; Lio 11.15-22
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpanoradalàna
  - type: text
    text: ' izay nidina avy tany Jerosalema dia niteny hoe: Manana an’i Belzeboba Izy, ary koa: Ny lohan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: demonia
  - type: text
    text: ' no androahany ny demonia.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary Jesosy niantso azy ireo hankeo Aminy ary nilaza fanoharana taminy hoe: Hataon’i Satana ahoana no fandroaka an’i Satana? '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Raha misy fanjakana miady an-trano dia tsy haharitra izany fanjakana izany. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary raha misy mpiray trano miady an-trano dia tsy haharitra izany mpiray trano izany. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ary raha i Satana no mitsangana hanohitra ny tenany ka miady an-trano dia tsy haharitra izy fa ho rava ny heriny. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Kanefa tsy misy olona afaka miditra ao an-tranon’ny mahery ka handroba ny entany raha tsy afatony aloha ilay mahery dia izay vao robainy ny ao an-tranony.
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat 12.31-33; Lio 12.10
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Lazaiko aminareo marina tokoa: Hahazo famelan-keloka ny zanak’olombelona amin’ny ota rehetra sy ny fitenenan-dratsy rehetra izay ataony; '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'fa izay miteny ratsy ny Fanahy Masina kosa dia tsy hahazo famelan-keloka mandrakizay, fa mendrika hohelohina ny amin’ny ota mandrakizay izy. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ny olona mantsy dia niteny hoe: Azom-panahy maloto Izy.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny tena havan’i Jesosy
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat 12.46-50; Lio 8.19-21
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ary tonga ny reniny mbamin’ireo rahalahiny ka nijanona teo alatrano, dia naniraka olona hankao Aminy hiantso Azy. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Ary nipetraka manodidina Azy ny vahoaka ka nilaza Taminy hoe: Indreo, ao alatrano ny reninao sy ireo rahalahinao ary ireo anabavinao mitady Anao. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ary Izy namaly azy ireo hoe: Iza no reniko sy rahalahiko? '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ary nijery izay nipetraka manodidina Azy Izy ka niteny hoe: Ireto ny reniko sy ny rahalahiko! '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Fa na iza na iza no manao ny sitrapon’Andriamanitra dia izy no rahalahiko sy anabaviko ary reniko.
