    - type: text
      text: eny, eo anatrehan’ny olony rehetra.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sarobidy eo imason’NY TOMPO
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny fahafatesan’ny olony masina.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indrisy, TOMPO ô! Mpanomponao tokoa aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, mpanomponao sady zanaky ny mpanompovavinao.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Namaha ny fatorako Ianao.
  '17':
