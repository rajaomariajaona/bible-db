segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fisaorana nataon’izay saika maty nefa novonjen’Andriamanitra
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Izaho dia tia NY TOMPO
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria efa nandre ny feon’ny fifonako Izy;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: satria efa nanongilana ny sofiny tamiko Izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hiantso aho raha mbola velona koa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Nihodidina tamiko ny famatoran’ny fahafatesana
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ary nahazo ahy ny fahorian’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: fitoeran’ny maty
  - type: text
    text: ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: nahita fahoriana sy alahelo aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dia niantso ny anaran’NY TOMPO aho hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mifona Aminao aho, TOMPO ô, afaho aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Mamindra fo sy marina NY TOMPO;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, miantra Andriamanitsika.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Miaro ny olona tso-po NY TOMPO;
- type: usfm
  marker: q1
  children:
  - type: text
    text: reraka aho dia namonjy ahy Izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Miverena ho amin’ny fitsaharanao, ry fanahiko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa NY TOMPO efa nanisy soa anao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ianao dia nanafaka ny fanahiko tamin’ny fahafatesana
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny masoko tamin’ny ranomaso
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny tongotro tamin’ny fahatafintohinana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Handeha eo anatrehan’NY TOMPO
- type: usfm
  marker: q1
  children:
  - type: text
    text: eo amin’ny tanin’ny velona aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Nanam-pinoana tokoa aho na dia niteny aza hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Reraka loatra aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Hoy aho tamin’ny fahatairako:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mpandainga ny olona rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Inona no havaliko NY TOMPO
- type: usfm
  marker: q1
  children:
  - type: text
    text: noho ny soa rehetra nataony tamiko?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Handray ny kapoaky ny famonjena aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hiantso ny anaran’NY TOMPO.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Hanefa ny voadiko amin’NY TOMPO aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, eo anatrehan’ny olony rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Sarobidy eo imason’NY TOMPO
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny fahafatesan’ny olony masina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Indrisy, TOMPO ô! Mpanomponao tokoa aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, mpanomponao sady zanaky ny mpanompovavinao.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Namaha ny fatorako Ianao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ianao no hanolorako fanati-pisaorana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny anaran’NY TOMPO no hantsoiko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Hanefa ny voadiko amin’NY TOMPO aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, eo anatrehan’ny olony rehetra,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: dia eo an-kianjan’ny tranon’NY TOMPO,
- type: usfm
  marker: q1
  children:
  - type: text
    text: eo afovoanao, ry Jerosalema ô!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: w
    children:
    - type: text
      text: Haleloia
  - type: text
    text: .
