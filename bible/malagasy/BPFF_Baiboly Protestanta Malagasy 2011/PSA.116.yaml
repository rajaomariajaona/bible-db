type_code: plt
verses:
  '1':
  - type: heading
    content: Fisaorana nataon’izay saika maty nefa novonjen’Andriamanitra
  - type: text
    content: Izaho dia tia NY TOMPO
  - type: text
    content: satria efa nandre ny feon’ny fifonako Izy;
  '10':
  - type: text
    content: 'Nanam-pinoana tokoa aho na dia niteny aza hoe:'
  - type: text
    content: Reraka loatra aho.
  '11':
  - type: text
    content: 'Hoy aho tamin’ny fahatairako:'
  - type: text
    content: Mpandainga ny olona rehetra.
  '12':
  - type: text
    content: Inona no havaliko NY TOMPO
  - type: text
    content: noho ny soa rehetra nataony tamiko?
  '13':
  - type: text
    content: Handray ny kapoaky ny famonjena aho
  - type: text
    content: ka hiantso ny anaran’NY TOMPO.
  '14':
  - type: text
    content: Hanefa ny voadiko amin’NY TOMPO aho;
  - type: text
    content: eny, eo anatrehan’ny olony rehetra.
  '15':
  - type: text
    content: Sarobidy eo imason’NY TOMPO
  - type: text
    content: ny fahafatesan’ny olony masina.
  '16':
  - type: text
    content: Indrisy, TOMPO ô! Mpanomponao tokoa aho;
  - type: text
    content: eny, mpanomponao sady zanaky ny mpanompovavinao.
  - type: text
    content: Namaha ny fatorako Ianao.
  '17':
  - type: text
    content: Ianao no hanolorako fanati-pisaorana,
  - type: text
    content: ary ny anaran’NY TOMPO no hantsoiko.
  '18':
  - type: text
    content: Hanefa ny voadiko amin’NY TOMPO aho
  - type: text
    content: eny, eo anatrehan’ny olony rehetra,
  '19':
  - type: text
    content: dia eo an-kianjan’ny tranon’NY TOMPO,
  - type: text
    content: eo afovoanao, ry Jerosalema ô!
  - type: text
    content: Haleloia
  - type: text
    content: .
  '2':
  - type: text
    content: satria efa nanongilana ny sofiny tamiko Izy;
  - type: text
    content: dia hiantso aho raha mbola velona koa.
  '3':
  - type: text
    content: Nihodidina tamiko ny famatoran’ny fahafatesana
  - type: text
    content: 'ary nahazo ahy ny fahorian’ny '
  - type: text
    content: fitoeran’ny maty
  - type: text
    content: ;
  - type: text
    content: nahita fahoriana sy alahelo aho.
  '4':
  - type: text
    content: 'Dia niantso ny anaran’NY TOMPO aho hoe:'
  - type: text
    content: Mifona Aminao aho, TOMPO ô, afaho aho.
  '5':
  - type: text
    content: Mamindra fo sy marina NY TOMPO;
  - type: text
    content: eny, miantra Andriamanitsika.
  '6':
  - type: text
    content: Miaro ny olona tso-po NY TOMPO;
  - type: text
    content: reraka aho dia namonjy ahy Izy.
  '7':
  - type: text
    content: Miverena ho amin’ny fitsaharanao, ry fanahiko,
  - type: text
    content: fa NY TOMPO efa nanisy soa anao.
  '8':
  - type: text
    content: Ianao dia nanafaka ny fanahiko tamin’ny fahafatesana
  - type: text
    content: sy ny masoko tamin’ny ranomaso
  - type: text
    content: ary ny tongotro tamin’ny fahatafintohinana.
  '9':
  - type: text
    content: Handeha eo anatrehan’NY TOMPO
  - type: text
    content: eo amin’ny tanin’ny velona aho.
