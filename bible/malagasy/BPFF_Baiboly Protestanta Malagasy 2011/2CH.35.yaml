document_id: 2CH.35,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nitandreman’i Josia ny Paska
  - type: heading
    content: 2Mpa 23.21-23
  - type: text
    content: 'Nitandrina ny '
  - type: text
    content: Paska
  - type: text
    content: ' tany Jerosalema ho an’NY TOMPO i Josia; namono ny Paska ny olona tamin’ny andro fahefatra amby folo tamin’ny volana voalohany. '
  '10':
  - type: text
    content: 'Koa dia vonona ny zavatra rehetra; ary nitsangana teo amin’ny toerany avy ny mpisorona, ary ny levita koa araka ny antokony avy, araka ny didin’ny mpanjaka. '
  '11':
  - type: text
    content: 'Dia novonoin’ny olona ny Paska, ary nafafin’ny mpisorona ny ra teny an-tanany, fa ny levita kosa no nanendaka ny hoditry ny biby voavono. '
  '12':
  - type: text
    content: 'Dia natokany ny fanatitra dorana manontolo homena ny olona araka ny fizaran’ny fianakaviany, mba hatolony ho fanatitra ho an’NY TOMPO araka izay voasoratra ao amin’ny bokin’i Mosesy. Toy izany koa tamin’ny omby. '
  '13':
  - type: text
    content: 'Ary nandrahoina tamin’ny afo araka ny fanao ny Paska; fa ny zava-masina kosa dia nandrahoiny tao anaty vilany sy vilany be ary vilany kely, dia nozarainy haingana tamin’ny olona rehetra ireo. '
  '14':
  - type: text
    content: Rehefa vita izany dia nanamboatra izay ho an’ny tenany sy ny mpisorona izy; fa ny mpisorona, taranak’i Arona, no nanolotra ny fanatitra dorana manontolo sy ny saborany mandra-pahalin’ny andro; ny levita kosa no nanamboatra ny Paska ho an’ny tenany sy ny mpisorona, taranak’i Arona.
  '15':
  - type: text
    content: 'Ary ny mpihira, taranak’i Asafa, dia teo amin’ny fitoerany, araka ny didin’i Davida sy i Asafa ary i Hemana sy i Jedotona, mpahitan’ny mpanjaka; ny mpiandry varavarana dia teo amin’ny isam-bavahady; fa tsy afaka niala tamin’ny fanompoany ireo, koa ny levita rahalahiny no nanamboatra ho azy. '
  '16':
  - type: text
    content: Dia vonona androtr’izay avokoa izay hanaovana ny fanompoana NY TOMPO amin’ny hitandremana ny Paska sy ny hanolorana ny fanatitra dorana manontolo eo ambonin’ny alitaran’NY TOMPO araka ny tenin’i Josia mpanjaka.
  '17':
  - type: text
    content: 'Ary ny Zanak’Israely izay vory teo dia nitandrina ny Paska tamin’izay fotoana izay sy ny andro firavoravoana hafitoana, fihinanana ny mofo tsy misy masirasira. '
  '18':
  - type: text
    content: 'Fa tsy nisy Paska notandremana toy izany teo amin’ny Israely na dia hatramin’ny andron’i Samoela mpaminany aza; ary ny mpanjakan’ny Israely rehetra dia tsy nisy nitandrina ny Paska tahaka izay nataon’i Josia sy ny mpisorona sy ny levita ary ny Joda rehetra sy ny Israely izay vory teo ary ny mponina tany Jerosalema. '
  '19':
  - type: text
    content: Tamin’ny taona fahavalo amby folo nanjakan’i Josia no nitandremana izany Paska izany.
  - type: heading
    content: Ny nifaranan’ny fanjakan’i Josia
  - type: heading
    content: Ampit. 2Mpa 23.24-30
  '2':
  - type: text
    content: 'Ary nanendry ny mpisorona ho amin’ny anjara raharahany avy i Josia ka nampirisika azy hanao ny fanompoana ao amin’ny tranon’NY TOMPO. '
  '20':
  - type: text
    content: 'Rehefa afaka izany rehetra izany, nony efa namboarin’i Josia ny Trano, dia niakatra i Neko, mpanjakan’i Ejipta, hiady tany Karkemisy eo amoron’i Eofrata; ary niainga hiady aminy i Josia. '
  '21':
  - type: text
    content: 'Fa nandefa iraka ho any aminy i Neko hilaza hoe: Moa mifaninona akory izaho sy ianao, ry mpanjakan’i Joda? Tsy hiady aminao izao anio izao aho fa amin’ny fahavaloko, sady nasain’Andriamanitra handeha haingana aho; koa aza manohitra an’Andriamanitra izay momba ahy, fandrao matiny ianao. '
  '22':
  - type: text
    content: 'Tsy nety nihodina niala teo aminy anefa i Josia fa nody olon-kafa mba hiady aminy ka tsy nety nihaino ny tenin’i Neko, izay nampilazain’Andriamanitra azy, fa nandeha hiady taminy ihany teo amin’ny lohasahan’i Megido. '
  '23':
  - type: text
    content: 'Ary nahavoa an’i Josia mpanjaka ny mpandefa tsipìka; dia hoy ny mpanjaka tamin’ny mpanompony: Ento miala eto aho fa voa mafy. '
  '24':
  - type: text
    content: 'Dia nesorin’ny mpanompony tamin’izany kalesy fitondra miady izany izy ka napetrany teo amin’ny kalesiny fitondra miady faharoa ary noentiny ho any Jerosalema; dia maty izy ka nalevina tao am-pasan-drazany. Ary nisaona an’i Josia ny Joda sy Jerosalema manontolo. '
  '25':
  - type: text
    content: Nanao hira fisaonana an’i Josia koa i Jeremia, ary ny mpihira lahy sy ny mpihira vavy rehetra dia mahatsiahy an’i Josia mandraka androany raha manao hira fisaonana, koa nataony fanao teo amin’ny Israely ireny; ary indro, voasoratra ao amin’ireo hira fisaonana izany.
  '26':
  - type: text
    content: 'Ary ny tantaran’i Josia sisa mbamin’ny soa nataony, araka izay efa voasoratra ao amin’ny lalànan’NY TOMPO, '
  '27':
  - type: text
    content: dia ny asany hatramin’ny voalohany ka hatramin’ny farany, indro, efa voasoratra ao amin’ny bokin’ny mpanjakan’ny Israely sy ny Joda izany.
  '3':
  - type: text
    content: 'Ary hoy izy tamin’ny '
  - type: text
    content: levita
  - type: text
    content: ' izay mpampianatra ny Israely rehetra sady efa masina ho an’NY TOMPO: Apetraho ao amin’ny trano nataon’i Solomona, zanak’i Davida, mpanjakan’ny Israely, ny vata masina misy ny Fanekena; fa izao dia efa tsy milanja azy intsony ianareo; koa manompoa NY TOMPO Andriamanitrareo sy ny Israely olony; '
  '4':
  - type: text
    content: 'ary samia miomana araka ny fianakavianareo avy ianareo, dia araka ny antokonareo, araka ny voasoratr’i Davida, mpanjakan’ny Israely, sy araka ny voasoratr’i Solomona zanany koa. '
  '5':
  - type: text
    content: 'Ary mitsangàna eo amin’ny fitoerana masina araka ny fizaran’ny fianakavian’ny rahalahinareo amin’ny vahoaka sy araka ny fizaran’ny fianakavian’ny levita. '
  '6':
  - type: text
    content: Dia vonoy ny Paska, sady hamasino ny tenanareo ka manamboara ho an’ny rahalahinareo mba handehanana araka ny tenin’NY TOMPO izay nampilazainy an’i Mosesy.
  '7':
  - type: text
    content: 'Ny vahoaka izay nivory teo dia nomen’i Josia zanak’ondry sy zanak’osy telo alina, sy omby telo arivo; avy tamin’ny fananan’ny mpanjaka ireo, ary hatao Paska avokoa. '
  '8':
  - type: text
    content: 'Nanome an-tsitrapo ho an’ny olona sy ho an’ny mpisorona ary ny levita koa ny mpanapaka. Ary nanome ondry aman’osy eninjato sy roa arivo ary omby telonjato kosa ho an’ny mpisorona hatao Paska i Hilkia sy i Zakaria ary i Jehiela, mpanapaka ny tranon’Andriamanitra. '
  '9':
  - type: text
    content: Ary nanome ondry aman’osy dimy arivo sy omby dimanjato ho an’ny levita hatao Paska i Konania, i Semaia, i Netanela rahalahiny, i Hasabia, i Jeiela ary i Jozabada, lehiben’ny levita.
