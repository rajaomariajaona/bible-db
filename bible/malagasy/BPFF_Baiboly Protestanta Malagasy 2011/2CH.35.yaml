document_id: 2CH.35
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nitandreman’i Josia ny Paska
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 2Mpa 23.21-23
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Nitandrina ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Paska
  - type: text
    text: ' tany Jerosalema ho an’NY TOMPO i Josia; namono ny Paska ny olona tamin’ny andro fahefatra amby folo tamin’ny volana voalohany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary nanendry ny mpisorona ho amin’ny anjara raharahany avy i Josia ka nampirisika azy hanao ny fanompoana ao amin’ny tranon’NY TOMPO. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary hoy izy tamin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: levita
  - type: text
    text: ' izay mpampianatra ny Israely rehetra sady efa masina ho an’NY TOMPO: Apetraho ao amin’ny trano nataon’i Solomona, zanak’i Davida, mpanjakan’ny Israely, ny vata masina misy ny Fanekena; fa izao dia efa tsy milanja azy intsony ianareo; koa manompoa NY TOMPO Andriamanitrareo sy ny Israely olony; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'ary samia miomana araka ny fianakavianareo avy ianareo, dia araka ny antokonareo, araka ny voasoratr’i Davida, mpanjakan’ny Israely, sy araka ny voasoratr’i Solomona zanany koa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary mitsangàna eo amin’ny fitoerana masina araka ny fizaran’ny fianakavian’ny rahalahinareo amin’ny vahoaka sy araka ny fizaran’ny fianakavian’ny levita. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Dia vonoy ny Paska, sady hamasino ny tenanareo ka manamboara ho an’ny rahalahinareo mba handehanana araka ny tenin’NY TOMPO izay nampilazainy an’i Mosesy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ny vahoaka izay nivory teo dia nomen’i Josia zanak’ondry sy zanak’osy telo alina, sy omby telo arivo; avy tamin’ny fananan’ny mpanjaka ireo, ary hatao Paska avokoa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Nanome an-tsitrapo ho an’ny olona sy ho an’ny mpisorona ary ny levita koa ny mpanapaka. Ary nanome ondry aman’osy eninjato sy roa arivo ary omby telonjato kosa ho an’ny mpisorona hatao Paska i Hilkia sy i Zakaria ary i Jehiela, mpanapaka ny tranon’Andriamanitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ary nanome ondry aman’osy dimy arivo sy omby dimanjato ho an’ny levita hatao Paska i Konania, i Semaia, i Netanela rahalahiny, i Hasabia, i Jeiela ary i Jozabada, lehiben’ny levita.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Koa dia vonona ny zavatra rehetra; ary nitsangana teo amin’ny toerany avy ny mpisorona, ary ny levita koa araka ny antokony avy, araka ny didin’ny mpanjaka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Dia novonoin’ny olona ny Paska, ary nafafin’ny mpisorona ny ra teny an-tanany, fa ny levita kosa no nanendaka ny hoditry ny biby voavono. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Dia natokany ny fanatitra dorana manontolo homena ny olona araka ny fizaran’ny fianakaviany, mba hatolony ho fanatitra ho an’NY TOMPO araka izay voasoratra ao amin’ny bokin’i Mosesy. Toy izany koa tamin’ny omby. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary nandrahoina tamin’ny afo araka ny fanao ny Paska; fa ny zava-masina kosa dia nandrahoiny tao anaty vilany sy vilany be ary vilany kely, dia nozarainy haingana tamin’ny olona rehetra ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Rehefa vita izany dia nanamboatra izay ho an’ny tenany sy ny mpisorona izy; fa ny mpisorona, taranak’i Arona, no nanolotra ny fanatitra dorana manontolo sy ny saborany mandra-pahalin’ny andro; ny levita kosa no nanamboatra ny Paska ho an’ny tenany sy ny mpisorona, taranak’i Arona.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary ny mpihira, taranak’i Asafa, dia teo amin’ny fitoerany, araka ny didin’i Davida sy i Asafa ary i Hemana sy i Jedotona, mpahitan’ny mpanjaka; ny mpiandry varavarana dia teo amin’ny isam-bavahady; fa tsy afaka niala tamin’ny fanompoany ireo, koa ny levita rahalahiny no nanamboatra ho azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Dia vonona androtr’izay avokoa izay hanaovana ny fanompoana NY TOMPO amin’ny hitandremana ny Paska sy ny hanolorana ny fanatitra dorana manontolo eo ambonin’ny alitaran’NY TOMPO araka ny tenin’i Josia mpanjaka.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary ny Zanak’Israely izay vory teo dia nitandrina ny Paska tamin’izay fotoana izay sy ny andro firavoravoana hafitoana, fihinanana ny mofo tsy misy masirasira. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Fa tsy nisy Paska notandremana toy izany teo amin’ny Israely na dia hatramin’ny andron’i Samoela mpaminany aza; ary ny mpanjakan’ny Israely rehetra dia tsy nisy nitandrina ny Paska tahaka izay nataon’i Josia sy ny mpisorona sy ny levita ary ny Joda rehetra sy ny Israely izay vory teo ary ny mponina tany Jerosalema. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Tamin’ny taona fahavalo amby folo nanjakan’i Josia no nitandremana izany Paska izany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nifaranan’ny fanjakan’i Josia
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Ampit. 2Mpa 23.24-30
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Rehefa afaka izany rehetra izany, nony efa namboarin’i Josia ny Trano, dia niakatra i Neko, mpanjakan’i Ejipta, hiady tany Karkemisy eo amoron’i Eofrata; ary niainga hiady aminy i Josia. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Fa nandefa iraka ho any aminy i Neko hilaza hoe: Moa mifaninona akory izaho sy ianao, ry mpanjakan’i Joda? Tsy hiady aminao izao anio izao aho fa amin’ny fahavaloko, sady nasain’Andriamanitra handeha haingana aho; koa aza manohitra an’Andriamanitra izay momba ahy, fandrao matiny ianao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Tsy nety nihodina niala teo aminy anefa i Josia fa nody olon-kafa mba hiady aminy ka tsy nety nihaino ny tenin’i Neko, izay nampilazain’Andriamanitra azy, fa nandeha hiady taminy ihany teo amin’ny lohasahan’i Megido. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary nahavoa an’i Josia mpanjaka ny mpandefa tsipìka; dia hoy ny mpanjaka tamin’ny mpanompony: Ento miala eto aho fa voa mafy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Dia nesorin’ny mpanompony tamin’izany kalesy fitondra miady izany izy ka napetrany teo amin’ny kalesiny fitondra miady faharoa ary noentiny ho any Jerosalema; dia maty izy ka nalevina tao am-pasan-drazany. Ary nisaona an’i Josia ny Joda sy Jerosalema manontolo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Nanao hira fisaonana an’i Josia koa i Jeremia, ary ny mpihira lahy sy ny mpihira vavy rehetra dia mahatsiahy an’i Josia mandraka androany raha manao hira fisaonana, koa nataony fanao teo amin’ny Israely ireny; ary indro, voasoratra ao amin’ireo hira fisaonana izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ary ny tantaran’i Josia sisa mbamin’ny soa nataony, araka izay efa voasoratra ao amin’ny lalànan’NY TOMPO, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: dia ny asany hatramin’ny voalohany ka hatramin’ny farany, indro, efa voasoratra ao amin’ny bokin’ny mpanjakan’ny Israely sy ny Joda izany.
