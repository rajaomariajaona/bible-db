document_id: PSA.84,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Hiran’ny mpivahiny tonga any Jerosalema
  - type: text
    content: Ho an’ny mpiventy hira. Al-hagitit. Salamo nataon’ny Koraìta.
  - type: text
    content: 'Endre ny hatsaran’ny '
  - type: text
    content: tabernakelinao
  - type: text
    content: ','
  - type: text
    content: Andriamanitra, Tompon’izao rehetra izao ô!
  '10':
  - type: text
    content: Fa ny indray andro eo an-kianjanao dia tsara noho ny arivo;
  - type: text
    content: aleoko mipetraka eo amin’ny tokonam-baravaran’ny tranon’Andriamanitra,
  - type: text
    content: toy izay hitoetra ao an-dain’ny ratsy fanahy.
  '11':
  - type: text
    content: Fa masoandro sy ampinga NY TOMPO Andriamanitra;
  - type: text
    content: fahasoavana sy voninahitra no homen’NY TOMPO,
  - type: text
    content: tsy miaro zava-tsoa amin’izay mandeha amin’ny fahitsiana Izy.
  '12':
  - type: text
    content: Andriamanitra, Tompon’izao rehetra izao ô,
  - type: text
    content: sambatra izay olona matoky Anao!
  '2':
  - type: text
    content: Manina sady vonton’alahelo ny kianjan’NY TOMPO ny fanahiko;
  - type: text
    content: mihoby an’Andriamanitra velona ny foko sy ny nofoko.
  '3':
  - type: text
    content: Eny, mahita trano ny tsikirity
  - type: text
    content: ary mahita akany hametrahany ny zanany ny sidintsidina,
  - type: text
    content: dia ny alitaranao, Andriamanitra, Tompon’izao rehetra izao ô,
  - type: text
    content: Mpanjakako sy Andriamanitro!
  '4':
  - type: text
    content: Sambatra izay mitoetra ao amin’ny tranonao!
  - type: text
    content: 'Hidera Anao mandrakariva izy. '
  - type: text
    content: Fiatoana.
  '5':
  - type: text
    content: Sambatra ny olona izay manana ny heriny ao Aminao;
  - type: text
    content: ao am-pony ny lalana voavoatra tsara.
  '6':
  - type: text
    content: Raha mandeha mamakivaky ny lohasaha Baka
  - type: note
    content: 'Baka: Fitomaniana.'
  - type: text
    content: ' izy'
  - type: text
    content: dia ataony misy loharano izany
  - type: text
    content: ary ny lohaorana no manarom-pitahiana azy.
  '7':
  - type: text
    content: Mitombo hery eny am-pandehanana izy;
  - type: text
    content: 'samy miseho eo anatrehan’Andriamanitra any '
  - type: text
    content: Ziona
  - type: text
    content: ' izy rehetra.'
  '8':
  - type: text
    content: RY TOMPO, Andriamanitra Tompon’izao rehetra izao ô, henoy ny vavaka ataoko!
  - type: text
    content: 'Mandrenesa, ry Andriamanitr’i Jakoba ô! '
  - type: text
    content: Fiatoana.
  '9':
  - type: text
    content: Andriamanitra, ampinganay ô, tsinjovy!
  - type: text
    content: Jereo ny tavan’ny Voahosotrao.
