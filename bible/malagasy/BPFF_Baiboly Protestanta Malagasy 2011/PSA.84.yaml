    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: RY TOMPO, Andriamanitra Tompon’izao rehetra izao ô, henoy ny vavaka ataoko!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Mandrenesa, ry Andriamanitr’i Jakoba ô! '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Fiatoana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Andriamanitra, ampinganay ô, tsinjovy!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Jereo ny tavan’ny Voahosotrao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Fa ny indray andro eo an-kianjanao dia tsara noho ny arivo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: aleoko mipetraka eo amin’ny tokonam-baravaran’ny tranon’Andriamanitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: toy izay hitoetra ao an-dain’ny ratsy fanahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Fa masoandro sy ampinga NY TOMPO Andriamanitra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fahasoavana sy voninahitra no homen’NY TOMPO,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy miaro zava-tsoa amin’izay mandeha amin’ny fahitsiana Izy.
- type: usfm
  marker: q1
  children:
