- type: usfm
  marker: q1
  children:
  - type: text
    text: Andriamanitra, Tompon’izao rehetra izao ô!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Manina sady vonton’alahelo ny kianjan’NY TOMPO ny fanahiko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mihoby an’Andriamanitra velona ny foko sy ny nofoko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Eny, mahita trano ny tsikirity
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mahita akany hametrahany ny zanany ny sidintsidina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ny alitaranao, Andriamanitra, Tompon’izao rehetra izao ô,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mpanjakako sy Andriamanitro!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Sambatra izay mitoetra ao amin’ny tranonao!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Hidera Anao mandrakariva izy. '
  - type: usfm
    marker: qs
    children:
