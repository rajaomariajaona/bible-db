    children:
    - type: text
      text: Hiran’ny mpivahiny tonga any Jerosalema
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: Ho an’ny mpiventy hira. Al-hagitit. Salamo nataon’ny Koraìta.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Endre ny hatsaran’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: tabernakelinao
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Andriamanitra, Tompon’izao rehetra izao ô!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Fa ny indray andro eo an-kianjanao dia tsara noho ny arivo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aleoko mipetraka eo amin’ny tokonam-baravaran’ny tranon’Andriamanitra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toy izay hitoetra ao an-dain’ny ratsy fanahy.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Fa masoandro sy ampinga NY TOMPO Andriamanitra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fahasoavana sy voninahitra no homen’NY TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy miaro zava-tsoa amin’izay mandeha amin’ny fahitsiana Izy.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Andriamanitra, Tompon’izao rehetra izao ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sambatra izay olona matoky Anao!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Manina sady vonton’alahelo ny kianjan’NY TOMPO ny fanahiko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mihoby an’Andriamanitra velona ny foko sy ny nofoko.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Eny, mahita trano ny tsikirity
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mahita akany hametrahany ny zanany ny sidintsidina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ny alitaranao, Andriamanitra, Tompon’izao rehetra izao ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mpanjakako sy Andriamanitro!
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Sambatra izay mitoetra ao amin’ny tranonao!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Hidera Anao mandrakariva izy. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Fiatoana.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Sambatra ny olona izay manana ny heriny ao Aminao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ao am-pony ny lalana voavoatra tsara.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Raha mandeha mamakivaky ny lohasaha Baka
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '84.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Baka: Fitomaniana.'
      marker-yv: yv-n
    - type: text
      text: ' izy'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ataony misy loharano izany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny lohaorana no manarom-pitahiana azy.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Mitombo hery eny am-pandehanana izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'samy miseho eo anatrehan’Andriamanitra any '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Ziona
    - type: text
      text: ' izy rehetra.'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: RY TOMPO, Andriamanitra Tompon’izao rehetra izao ô, henoy ny vavaka ataoko!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Mandrenesa, ry Andriamanitr’i Jakoba ô! '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Fiatoana.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Andriamanitra, ampinganay ô, tsinjovy!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jereo ny tavan’ny Voahosotrao.
