document_id: ROM.1,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny Filazantsara ambaran’i Paoly
  - type: text
    content: 'I Paoly, mpanompon’i Jesosy '
  - type: text
    content: Kristy
  - type: text
    content: ', voaantso ho Apostoly, voatokana ho amin’ny Filazantsaran’Andriamanitra '
  '10':
  - type: text
    content: 'koa rehefa mivavaka aho dia tsy tapaka mangataka mba hisy fotoana hahafahako mankany aminareo raha sitrapon’Andriamanitra. '
  '11':
  - type: text
    content: 'Fa maniry hahita anareo aho hanomezako fahasoavam-panahy ho anareo, mba hahamafy orina anareo; '
  '12':
  - type: text
    content: 'izany dia ny mba hiarahako mifampirisika aminareo amin’ny finoana iraisantsika, dia ny anareo sy ny ahy. '
  '13':
  - type: text
    content: 'Ary tsy tiako tsy ho fantatrareo ry rahalahy, fa matetika aho no nikasa hankaty aminareo mba hananako izay vokatra atỳ aminareo koa, toy ny any amin’ny '
  - type: text
    content: Jentilisa
  - type: text
    content: ' sasany, saingy azon-tsampona aho hatramin’izao. '
  '14':
  - type: text
    content: 'Ananan’ny Grika sy ny firenena hafa, ny hendry sy ny adala, trosa aho; '
  '15':
  - type: text
    content: noho izany dia mazoto hitory ny Filazantsara aminareo izay any Roma koa aho.
  - type: heading
    content: Ny herin’ny Filazantsara
  '16':
  - type: text
    content: 'Fa tsy menatra ny Filazantsara aho, satria herin’Andriamanitra ho famonjena izay rehetra mino izany, amin’ny '
  - type: text
    content: Jiosy
  - type: text
    content: ' aloha, nefa amin’ny '
  - type: text
    content: Jentilisa
  - type: text
    content: ' koa. '
  '17':
  - type: text
    content: 'Fa amin’izany no anehoana fahamarinana avy amin’Andriamanitra avy amin’ny finoana sy ho amin’ny finoana, araka ny voasoratra hoe: «Ny marina amin’ny finoana no ho velona» (Hab 2.4).'
  - type: heading
    content: Ny fahamarinana voageja
  '18':
  - type: text
    content: 'Fa aseho avy any an-danitra ny fahatezeran’Andriamanitra amin’ny faharatsiana rehetra sy ny tsy fahamarinan’ny olona izay mangeja ny marina amin’ny tsy fahamarinana; '
  '19':
  - type: text
    content: 'fa izay fantatra ny amin’Andriamanitra dia miseho ao am-pon’ireny, satria nasehon’Andriamanitra taminy izany. '
  '2':
  - type: text
    content: 'izay nampilazainy mialoha tamin’ny alalan’ny mpaminany tao amin’ny Soratra Masina; '
  '20':
  - type: text
    content: 'Fa ny fombany tsy hita maso, izany hoe ny heriny mandrakizay sy ny maha Andriamanitra Azy, dia miseho hatramin’ny nahariana izao tontolo izao ka fantatra sy hita amin’ny zavatra nataony, hany ka tsy manan-kalahatra ireo. '
  '21':
  - type: text
    content: 'Fa na dia nahalala an’Andriamanitra aza izy dia tsy mba nankalaza Azy, araka izay mendrika ho an’Andriamanitra, sady tsy mba nisaotra Azy; fa tonga zava-poana izy tamin’ny fisainany ary nihamaizina ny fony donto. '
  '22':
  - type: text
    content: 'Nandoka tena ho hendry izy ka tonga adala, '
  '23':
  - type: text
    content: ary ny voninahitr’Andriamanitra tsy mety lo dia nosoloany sary maneho ny olombelona mety lo sy ny vorona mbamin’ny biby manan-tongotra efatra ary ny zavamananaina mandady sy mikisaka.
  '24':
  - type: text
    content: 'Izany no nanoloran’Andriamanitra azy tamin’ny filan’ny fony ho amin’ny fahalotoana, mba hifanalany voninahitra tamin’ny tenany avy; '
  '25':
  - type: text
    content: 'nosoloiny lainga ny fahamarinan’Andriamanitra ka nanaja sy nanompo ny zavatra natao izy fa tsy ny Mpanao izay isaorana mandrakizay! '
  - type: text
    content: Amena
  - type: text
    content: '!'
  '26':
  - type: text
    content: 'Izany no nanoloran’Andriamanitra azy ho amin’ny filan-dratsy mahavoafady; fa ny vehivavy tao aminy dia nanova ny fanaony ara-boajanahary ho amin’izay tsy fanao; '
  '27':
  - type: text
    content: toy izany koa ny lehilahy, namela ny fanao amin’ny vehivavy izy ka maimay tamin’ny fifampilany samy lehilahy; nifanao izay mahamenatra izy ireo ka nandray tao amin’ny tenany ihany ny valiny izay tokony ho azy noho ny fiviliany.
  '28':
  - type: text
    content: 'Ary araka ny niheverany ny fahalalana marina an’Andriamanitra ho tsy mendrika hotanany, dia araka izany kosa no nanoloran’Andriamanitra azy ho amin’ny fisainana tsy mahamendrika ka hanaovany izay zavatra tsy fanao; '
  '29':
  - type: text
    content: 'feno ny tsy fahamarinana rehetra, ny faharatsiana, ny fitiavan-karena ary ny lolompo izy, feno fialonana, vonoan’olona, fifandirana, fitaka, otri-po; mpanendrikendrika, '
  '3':
  - type: text
    content: 'izany dia ny amin’ny Zanany izay nateraka avy tamin’ny taranak’i Davida araka ny nofo, '
  '30':
  - type: text
    content: 'mpifosafosa, mpankahala an’Andriamanitra, mpampahory, mpiavonavona, mpidoka tena, mpamoron-tsain-dratsy, tsy manoa ray sy reny, '
  '31':
  - type: text
    content: 'tsy manam-pahalalana, mpivadi-panekena, tsy manam-pitiavana, tsy miantra; '
  '32':
  - type: text
    content: 'olona mahalala tsara ny fitsipika nomen’Andriamanitra hoe: Izay manao izany zavatra izany dia mendrika ho faty; nefa tsy manao izany ihany izy, fa mankasitraka ny manao izany kosa.'
  '4':
  - type: text
    content: 'ary naseho tamin-kery ho Zanak’Andriamanitra, araka ny Fanahy Masina tamin’ny fitsanganana tamin’ny maty, dia Jesosy Kristy Tompontsika, '
  '5':
  - type: text
    content: 'izay nandraisanay fahasoavana sy ny maha Apostoly anay, mba hahatonga fankatoavana, dia ny finoana ho voninahitry ny anarany any amin’ny '
  - type: text
    content: Jentilisa
  - type: text
    content: ' rehetra; '
  '6':
  - type: text
    content: 'ary ianareo koa, izay isan’ireny, dia voaantso ho an’i Jesosy Kristy. '
  '7':
  - type: text
    content: 'Ho an’izay rehetra any Roma, malalan’Andriamanitra, sady voaantso no masina: Ho aminareo anie ny fahasoavana sy ny fiadanana avy amin’Andriamanitra Raintsika sy Jesosy Kristy Tompo!'
  - type: heading
    content: Maniry hamangy ny Kristiana any Roma i Paoly
  '8':
  - type: text
    content: 'Voalohany, misaotra an’Andriamanitro amin’ny alalan’i Jesosy '
  - type: text
    content: Kristy
  - type: text
    content: ' aho noho ny aminareo rehetra, satria efa re manerana izao tontolo izao ny lazan’ny finoanareo. '
  '9':
  - type: text
    content: 'Fa Andriamanitra izay tompoin’ny fanahiko amin’ny Filazantsaran’ny Zanany no vavolombeloko, fa tsy mitsahatra mahatsiaro anareo aho, '
