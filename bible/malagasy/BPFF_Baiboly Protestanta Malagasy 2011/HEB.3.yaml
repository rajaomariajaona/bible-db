document_id: HEB.3,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Jesosy sy i Mosesy
  - type: text
    content: 'Koa amin’izany, ry rahalahy masina, mpiombona ny fiantsoana avy any an-danitra, diniho tsara ny Apostoly sy ny Mpisoronabe izay ekentsika, dia Jesosy '
  '10':
  - type: text
    content: Koa tezitra tamin’izany taranaka izany Aho
  - type: text
    content: 'ka niteny hoe: Ireo dia maniasia amin’ny fony mandrakariva'
  - type: text
    content: ka tsy nahalala ny lalako.
  '11':
  - type: text
    content: 'Izany no nianianako tamin’ny fahatezerako hoe:'
  - type: text
    content: Tsy hiditra amin’ny fitsaharako mihitsy izy» (Sal 95.7-11).
  '12':
  - type: text
    content: 'Tandremo, ry rahalahy, fandrao hisy aminareo hanana fo ratsy tsy mino ka hiala amin’Andriamanitra velona. '
  '13':
  - type: text
    content: 'Fa mifananara isanandro raha mbola atao hoe Anio, fandrao hisy aminareo ho tonga mafy fo noho ny famitahan’ny ota. '
  '14':
  - type: text
    content: 'Fa efa tonga mpiombona amin’i '
  - type: text
    content: Kristy
  - type: text
    content: ' isika raha mihazona mafy ny fiandohan’ny fahatokiantsika hatramin’ny farany; '
  '15':
  - type: text
    content: 'raha lazaina hoe:'
  - type: text
    content: «Anio, raha mandre ny feony ianareo,
  - type: text
    content: dia aza manamafy ny fonareo tahaka ny tamin’ny fahasosorana» (Sal 95.7-8).
  '16':
  - type: text
    content: 'Fa iza moa no nahatezitra Azy rehefa nandre? Tsy izay rehetra noentin’i Mosesy niala tany Ejipta va? '
  '17':
  - type: text
    content: 'Ary iza no nahatezitra Azy efapolo taona? Tsy izay nanota va, dia ireo niampatrampatra tany an-tany efitra ny fatiny? '
  '18':
  - type: text
    content: 'Ary iza no nianianany fa tsy hiditra any amin’ny fitsaharany, afa-tsy izay tsy nanaiky? '
  '19':
  - type: text
    content: Dia hitantsika fa tsy nahazo niditra izy ireo noho ny tsy finoany.
  '2':
  - type: text
    content: 'izay mahatoky eo anatrehan’ny nanendry Azy, tahaka an’i Mosesy koa tao amin’ny tranon’Andriamanitra manontolo. '
  '3':
  - type: text
    content: 'Fa Izy dia natao mendrika hanam-boninahitra noho i Mosesy, araka ny ananan’ny mpanao trano voninahitra bebe kokoa noho ny trano nataony. '
  '4':
  - type: text
    content: 'Fa ny trano rehetra dia samy nisy mpanao azy; fa izay nanao ny zavatra rehetra kosa dia Andriamanitra. '
  '5':
  - type: text
    content: 'Ary i Mosesy dia mpanompo nahatoky tao amin’ny tranon’Andriamanitra manontolo, mba ho vavolombelona hanambara izay zavatra mbola holazaina; '
  '6':
  - type: text
    content: 'fa '
  - type: text
    content: Kristy
  - type: text
    content: ' kosa dia Zanaka mifehy ny tranon’Andriamanitra; ary isika no tranony raha hazonintsika mafy hatramin’ny farany ny fahatokiana sy firavoravoana ateraky ny fanantenana.'
  - type: heading
    content: Fampitandremana tsy hivadika
  '7':
  - type: text
    content: 'Koa araka izay lazain’ny Fanahy Masina hoe:'
  - type: text
    content: «Anio, raha mandre ny feony ianareo
  '8':
  - type: text
    content: dia aza manamafy ny fonareo tahaka ny tamin’ny fahasosorana,
  - type: text
    content: tamin’ny andron’ny fakam-panahy tany an-tany efitra,
  '9':
  - type: text
    content: izay nakan’ny razanareo fanahy Ahy
  - type: text
    content: tamin’ny nizahany toetra Ahy,
  - type: text
    content: nefa dia nahita ny asako efapolo taona izy.
