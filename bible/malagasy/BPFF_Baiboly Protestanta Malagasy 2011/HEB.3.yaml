document_id: HEB.3
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesosy sy i Mosesy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Koa amin’izany, ry rahalahy masina, mpiombona ny fiantsoana avy any an-danitra, diniho tsara ny Apostoly sy ny Mpisoronabe izay ekentsika, dia Jesosy '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'izay mahatoky eo anatrehan’ny nanendry Azy, tahaka an’i Mosesy koa tao amin’ny tranon’Andriamanitra manontolo. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Fa Izy dia natao mendrika hanam-boninahitra noho i Mosesy, araka ny ananan’ny mpanao trano voninahitra bebe kokoa noho ny trano nataony. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Fa ny trano rehetra dia samy nisy mpanao azy; fa izay nanao ny zavatra rehetra kosa dia Andriamanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary i Mosesy dia mpanompo nahatoky tao amin’ny tranon’Andriamanitra manontolo, mba ho vavolombelona hanambara izay zavatra mbola holazaina; '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'fa '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' kosa dia Zanaka mifehy ny tranon’Andriamanitra; ary isika no tranony raha hazonintsika mafy hatramin’ny farany ny fahatokiana sy firavoravoana ateraky ny fanantenana.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fampitandremana tsy hivadika
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Koa araka izay lazain’ny Fanahy Masina hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Anio, raha mandre ny feony ianareo
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: dia aza manamafy ny fonareo tahaka ny tamin’ny fahasosorana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tamin’ny andron’ny fakam-panahy tany an-tany efitra,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: izay nakan’ny razanareo fanahy Ahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: tamin’ny nizahany toetra Ahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa dia nahita ny asako efapolo taona izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Koa tezitra tamin’izany taranaka izany Aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ka niteny hoe: Ireo dia maniasia amin’ny fony mandrakariva'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy nahalala ny lalako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Izany no nianianako tamin’ny fahatezerako hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy hiditra amin’ny fitsaharako mihitsy izy» (Sal 95.7-11).
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Tandremo, ry rahalahy, fandrao hisy aminareo hanana fo ratsy tsy mino ka hiala amin’Andriamanitra velona. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Fa mifananara isanandro raha mbola atao hoe Anio, fandrao hisy aminareo ho tonga mafy fo noho ny famitahan’ny ota. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Fa efa tonga mpiombona amin’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' isika raha mihazona mafy ny fiandohan’ny fahatokiantsika hatramin’ny farany; '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'raha lazaina hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Anio, raha mandre ny feony ianareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia aza manamafy ny fonareo tahaka ny tamin’ny fahasosorana» (Sal 95.7-8).
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Fa iza moa no nahatezitra Azy rehefa nandre? Tsy izay rehetra noentin’i Mosesy niala tany Ejipta va? '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary iza no nahatezitra Azy efapolo taona? Tsy izay nanota va, dia ireo niampatrampatra tany an-tany efitra ny fatiny? '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary iza no nianianany fa tsy hiditra any amin’ny fitsaharany, afa-tsy izay tsy nanaiky? '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Dia hitantsika fa tsy nahazo niditra izy ireo noho ny tsy finoany.
