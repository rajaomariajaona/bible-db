document_id: 1SA.29,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Noroahin’ny Filistina i Davida
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary namory ny miaramilany rehetra ho ao Afeka ny Filistina; fa ny Israely kosa dia nitoby teo anilan’ny loharano ao Jezirela. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Koa mifohaza vao maraina ianao mbamin’ny mpanompon’ny tomponao izay nanaraka anao; ary rehefa mifoha maraina ianareo ka mazava ny andro dia mandehana.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary nifoha vao mangiran-dratsy i Davida sy ny olony mba handeha hiverina maraim-be any amin’ny tanin’ny Filistina. Ny Filistina kosa dia niakatra nankany Jezirela.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nandroso nitarika ny miaramilany isan-jato sy isan’arivo ireo andrianan’ny Filistina; fa i Davida sy ny olony kosa dia nandroso teo aoriana niaraka tamin’i Akisy. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy ireo andrianan’ny Filistina: Haninona moa ireto Hebreo ireto? Ary hoy i Akisy tamin’ireo andrianan’ny Filistina: Tsy io va no i Davida, mpanompon’i Saoly, mpanjakan’ny Israely, ilay tatỳ amiko elaela ihany izay, ary tsy hitako izay tsininy hatrizay nialany niandany tamiko ka mandraka androany? '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia tezitra taminy ireo andrianan’ny Filistina ka niteny taminy hoe: Avereno ho any amin’ny fonenany izay efa nomenao azy ihany Ilehio fa aza avela hiara-midina amintsika hiady, fandrao ho tonga fahavalontsika raha miady; fa amin’ny inona no hahazoan’io sitraka amin’ny tompony? Tsy amin’ny lohan’ireto olona ireto va? '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsy io moa no i Davida izay nandihizana sy nanaovana hira mifamaly hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I Saoly dia nahafaty arivoarivo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa i Davida dia nahafaty alinalina?
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary niantso an’i Davida i Akisy ka niteny taminy hoe: Raha velona koa NY TOMPO, olona marina ianao sady sitrako ny hiarahanao amiko mivoaka sy miditra eto an-toby satria tsy hitako izay tsininao hatrizay nahatongavanao teto amiko ka mandraka androany; nefa kosa tsy sitrak’ireo andriana ireo ianao. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa miverena ary mandehana soa amantsara mba tsy hanaovanao izay tsy sitrak’ireo andrianan’ny Filistina. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy i Davida tamin’i Akisy: Inona no nataoko, ary inona no hitanao tamin’ny mpanomponao hatrizay nitoerako tatỳ aminao ka mandraka androany, no tsy hahazoako mandeha hiady amin’ny fahavalon’ny mpanjaka tompoko? '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia namaly an’i Davida i Akisy hoe: Fantatro fa tsara eo imasoko tahaka ny anjelin’Andriamanitra ianao; nefa ireo andrianan’ny Filistina no niteny hoe: Tsy hiara-miakatra amintsika hiady izy. '
