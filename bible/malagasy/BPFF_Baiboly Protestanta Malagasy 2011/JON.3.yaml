document_id: JON.3
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Any Ninive i Jona
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Tonga fanindroany tamin’i Jona ny tenin’NY TOMPO hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Mitsangàna ka mankanesa any Ninive, ilay tanàna lehibe; ary ambarao aminy ny teny izay lazaiko aminao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dia nitsangana i Jona ka nankany Ninive araka ny tenin’NY TOMPO. Ary Ninive dia tanàna lehibe teo anatrehan’Andriamanitra, fa lalana hateloana no amakivakiana azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dia nanomboka nandeha lalana indray andro tao an-tanàna i Jona ka nanambara hoe: Rehefa afaka efapolo andro dia horavana i Ninive.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia nino an’Andriamanitra ny mponina tao Ninive ka niantso fifadian-kanina sady nitafy lamba fisaonana, hatramin’ny lehibe ka hatramin’ny kely. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Nony efa ren’ny mpanjakan’i Ninive izany dia nitsangana niala tamin’ny sezafiandrianany izy ka nanaisotra ny akanjom-boninahiny, dia nisarona lamba fisaonana izy sady nipetraka tamin’ny lavenona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary araka ny didin’ny mpanjaka sy ny mpanapaka dia nasaina nantsoina sy nambara manerana an’i Ninive hoe: Aza avela hisy hanendry hanina akory, na olona na biby fiompy, dia ny ondry aman’osy sy ny omby; eny, aza avela hisy hihinana na hisotro rano akory ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Fa aoka samy hisarona lamba fisaonana ny olona sy ny biby fiompy, ary aoka hitaraina mafy amin’Andriamanitra izy ireo, ary aoka samy hahafoy ny lalan-dratsiny sy ny herisetra fanaon’ny tanany avy izy rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Fa angamba hiverina ihany Andriamanitra ka hanenina ary hiala amin’ny fahatezerany mirehitra mba tsy hahalany ritra antsika? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ary rehefa hitan’Andriamanitra ny nataon’ireo ny amin’ny nialany tamin’ny lalan-dratsiny dia nanenina Izy ny amin’ny loza izay nolazainy hamelezany azy ka tsy nataony izany.
