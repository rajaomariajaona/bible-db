document_id: ZEC.9,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: FIZARANA FAHAROA
  - type: heading
    content: Fitsarana sy famonjena ho an’ireo firenena akaiky ny Israely
  - type: text
    content: Teny faminaniana.
  - type: text
    content: Tonga any amin’ny faritanin’i Hadraka ny tenin’NY TOMPO
  - type: text
    content: ary miato any Damaskosy izany.
  - type: text
    content: Fa ny mason’NY TOMPO mandinika ny olombelona
  - type: text
    content: mbamin’ny foko rehetra amin’ny Israely
  '10':
  - type: text
    content: Hofoanako tsy hisy kalesy fitondra miady intsony any Efraima,
  - type: text
    content: na soavaly any Jerosalema;
  - type: text
    content: hotapahiko koa ny tsipìka fiadiana.
  - type: text
    content: 'Hanambara fiadanana amin’ny '
  - type: text
    content: Jentilisa
  - type: text
    content: ' Izy;'
  - type: text
    content: ny fanapahany dia ho hatramin’ny ranomasina iray ka hatramin’ny ranomasina iray
  - type: text
    content: ary hatramin’ny ony Eofrata ka hatramin’ny faran’ny tany.
  - type: heading
    content: Ny fanafahana ny mpifatotra
  '11':
  - type: text
    content: Ny aminao koa, noho ny ran’ny fanekena taminao
  - type: text
    content: no efa namoahako ny mpifatotra ao aminao avy tao an-davaka tsy misy rano.
  '12':
  - type: text
    content: Miverena ho amin’ny fiarovana mafy,
  - type: text
    content: ianareo mpifatotra manana ny fanantenana!
  - type: text
    content: 'Anio koa no hanambarako hoe:'
  - type: text
    content: Hanonitra avo roa heny ho anao Aho.
  '13':
  - type: text
    content: Fa nohenjaniko ny tsipìkako, dia i Joda,
  - type: text
    content: ary i Efraima no nataoko zana-tsipìka;
  - type: text
    content: 'ary hotairiko ny zanakao, ry '
  - type: text
    content: Ziona
  - type: text
    content: ','
  - type: text
    content: hiady amin’ny zanakao, ry Gresy!
  - type: text
    content: Hataoko toy ny sabatry ny lehilahy mahery ianao.
  '14':
  - type: text
    content: Ary NY TOMPO hiseho eo amboniny
  - type: text
    content: ka handeha toy ny tselatra ny zana-tsipìkany;
  - type: text
    content: NY TOMPO Andriamanitra hitsoka anjomara
  - type: text
    content: ka handroso amin’ny tafio-drivotra any atsimo.
  '15':
  - type: text
    content: Andriamanitra, Tompon’izao rehetra izao, no hiaro ireny;
  - type: text
    content: dia hihinana ireny ka hanitsakitsaka vaton’antsamotady;
  - type: text
    content: ary hisotro ireny ka hihorakoraka tahaka ny azon’ny divay
  - type: text
    content: ary ho feno tahaka ny lovia famafazana ireny,
  - type: text
    content: tahaka ny zoron’ny alitara.
  '16':
  - type: text
    content: Amin’izany andro izany NY TOMPO Andriamaniny
  - type: text
    content: dia hamonjy ny olony toy ny famonjy andian’ondry;
  - type: text
    content: fa ireny no vato eo amin’ny satroboninahitra,
  - type: text
    content: mamirapiratra eny amin’ny taniny.
  '17':
  - type: text
    content: Akory ny hasoany! Ary akory ny hatsaran-tarehiny!
  - type: text
    content: Vary no hampaharoroka ny zatovo,
  - type: text
    content: ary ranom-boaloboka kosa no hampaharoroka ny zazavavy.
  '2':
  - type: text
    content: sy i Hamata koa, izay mifanolotra aminy,
  - type: text
    content: i Tiro sy i Sidona koa, izay manana fahendrena be.
  '3':
  - type: text
    content: I Tiro dia nanao manda mafy ho an’ny tenany
  - type: text
    content: ka nanangona volafotsy ohatra ny vovoka
  - type: text
    content: sy volamena tsara ohatra ny fotaka eny an-dalambe.
  '4':
  - type: text
    content: Indro, hofoanan’ny Tompo ny fananany
  - type: text
    content: sady harodany any an-dranomasina ny mandany
  - type: text
    content: ary ho levon’ny afo izy.
  '5':
  - type: text
    content: I Askelona dia hahita izany ka ho raiki-tahotra,
  - type: text
    content: i Gaza koa, ka ho toran-kovitra indrindra,
  - type: text
    content: ary i Ekrona, fa ho tonga henatra ny fanantenany;
  - type: text
    content: tsy hisy mpanjaka intsony ao Gaza
  - type: text
    content: ary i Askelona tsy honenana.
  '6':
  - type: text
    content: Zazasary no honina ao Asdoda
  - type: text
    content: ary hopotehiko ny reharehan’ny Filistina.
  '7':
  - type: text
    content: Hesoriko eny am-bavany ny rany
  - type: note
    content: 'ny rany: ny Filistina dia nihinana hena niaraka tamin’ny rany fa tsy mba araka ny lalàna teo amin’ny Israely (Gen 6.4; Lev 3.17).'
  - type: text
    content: ary tsy ho eny anelanelan’ny nifiny ny fahavetavetany
  - type: note
    content: 'fahavetavetana: mety hilazana hanina maloto araka ny lalàna izany (Lev 11.10 snm), na ny sampy (Eze 5.11), na koa ny hena naterina tamin’ny sampy (Isa 66.3).'
  - type: text
    content: ;
  - type: text
    content: ary izy koa dia ho sisa ho an’Andriamanitsika
  - type: text
    content: sy ho toy ny lohany amin’i Joda,
  - type: text
    content: ary i Ekrona dia ho toy ny Jebosita.
  '8':
  - type: text
    content: Manangana toby hiaro ny tranoko Aho
  - type: text
    content: noho ny miaramila betsaka,
  - type: text
    content: dia izay mandroso sy miverina;
  - type: text
    content: mba tsy hisy mpampahory handeha hamakivaky eo aminy intsony;
  - type: text
    content: fa ankehitriny dia ny masoko no miambina azy.
  - type: heading
    content: Ilay mpanjaka hitondra fiadanana
  '9':
  - type: text
    content: 'Mifalia indrindra, ry '
  - type: text
    content: Ziona
  - type: text
    content: ' zanakavavy!'
  - type: text
    content: Manaova feo fifaliana, ry Jerosalema zanakavavy;
  - type: text
    content: Indro, ny Mpanjakanao avy ho anao.
  - type: text
    content: Marina Izy sady mpandresy,
  - type: text
    content: manetry tena sady mitaingina boriky,
  - type: text
    content: boriky tanora, zanaky ny borikivavy.
