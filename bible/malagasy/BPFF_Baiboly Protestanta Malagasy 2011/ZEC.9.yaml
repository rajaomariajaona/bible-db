document_id: ZEC.9,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: FIZARANA FAHAROA
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fitsarana sy famonjena ho an’ireo firenena akaiky ny Israely
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Teny faminaniana.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tonga any amin’ny faritanin’i Hadraka ny tenin’NY TOMPO
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary miato any Damaskosy izany.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny mason’NY TOMPO mandinika ny olombelona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mbamin’ny foko rehetra amin’ny Israely
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hofoanako tsy hisy kalesy fitondra miady intsony any Efraima,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na soavaly any Jerosalema;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hotapahiko koa ny tsipìka fiadiana.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Hanambara fiadanana amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jentilisa
    - type: text
      text: ' Izy;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny fanapahany dia ho hatramin’ny ranomasina iray ka hatramin’ny ranomasina iray
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hatramin’ny ony Eofrata ka hatramin’ny faran’ny tany.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fanafahana ny mpifatotra
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny aminao koa, noho ny ran’ny fanekena taminao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no efa namoahako ny mpifatotra ao aminao avy tao an-davaka tsy misy rano.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miverena ho amin’ny fiarovana mafy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ianareo mpifatotra manana ny fanantenana!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Anio koa no hanambarako hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hanonitra avo roa heny ho anao Aho.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa nohenjaniko ny tsipìkako, dia i Joda,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary i Efraima no nataoko zana-tsipìka;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ary hotairiko ny zanakao, ry '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Ziona
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hiady amin’ny zanakao, ry Gresy!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hataoko toy ny sabatry ny lehilahy mahery ianao.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary NY TOMPO hiseho eo amboniny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka handeha toy ny tselatra ny zana-tsipìkany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: NY TOMPO Andriamanitra hitsoka anjomara
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka handroso amin’ny tafio-drivotra any atsimo.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Andriamanitra, Tompon’izao rehetra izao, no hiaro ireny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hihinana ireny ka hanitsakitsaka vaton’antsamotady;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hisotro ireny ka hihorakoraka tahaka ny azon’ny divay
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ho feno tahaka ny lovia famafazana ireny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tahaka ny zoron’ny alitara.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Amin’izany andro izany NY TOMPO Andriamaniny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hamonjy ny olony toy ny famonjy andian’ondry;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ireny no vato eo amin’ny satroboninahitra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mamirapiratra eny amin’ny taniny.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Akory ny hasoany! Ary akory ny hatsaran-tarehiny!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vary no hampaharoroka ny zatovo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ranom-boaloboka kosa no hampaharoroka ny zazavavy.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy i Hamata koa, izay mifanolotra aminy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: i Tiro sy i Sidona koa, izay manana fahendrena be.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I Tiro dia nanao manda mafy ho an’ny tenany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka nanangona volafotsy ohatra ny vovoka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy volamena tsara ohatra ny fotaka eny an-dalambe.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro, hofoanan’ny Tompo ny fananany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady harodany any an-dranomasina ny mandany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ho levon’ny afo izy.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I Askelona dia hahita izany ka ho raiki-tahotra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: i Gaza koa, ka ho toran-kovitra indrindra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary i Ekrona, fa ho tonga henatra ny fanantenany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy hisy mpanjaka intsony ao Gaza
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary i Askelona tsy honenana.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Zazasary no honina ao Asdoda
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hopotehiko ny reharehan’ny Filistina.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hesoriko eny am-bavany ny rany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ny rany: '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: ny Filistina dia nihinana hena niaraka tamin’ny rany fa tsy mba araka ny lalàna teo amin’ny Israely (Gen 6.4; Lev 3.17).
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy ho eny anelanelan’ny nifiny ny fahavetavetany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'fahavetavetana: '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: mety hilazana hanina maloto araka ny lalàna izany (Lev 11.10 snm), na ny sampy (Eze 5.11), na koa ny hena naterina tamin’ny sampy (Isa 66.3).
      marker-yv: yv-n
    - type: text
      text: ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary izy koa dia ho sisa ho an’Andriamanitsika
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ho toy ny lohany amin’i Joda,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary i Ekrona dia ho toy ny Jebosita.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manangana toby hiaro ny tranoko Aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: noho ny miaramila betsaka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia izay mandroso sy miverina;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba tsy hisy mpampahory handeha hamakivaky eo aminy intsony;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ankehitriny dia ny masoko no miambina azy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ilay mpanjaka hitondra fiadanana
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Mifalia indrindra, ry '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Ziona
    - type: text
      text: ' zanakavavy!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manaova feo fifaliana, ry Jerosalema zanakavavy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro, ny Mpanjakanao avy ho anao.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Marina Izy sady mpandresy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: manetry tena sady mitaingina boriky,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: boriky tanora, zanaky ny borikivavy.
