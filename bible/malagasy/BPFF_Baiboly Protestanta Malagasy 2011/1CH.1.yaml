document_id: 1CH.1,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: FITANISANA NY TETIARANA
  - type: heading
    content: I Adama ka hatramin’ny taranak’i Esao
  - type: heading
    content: Ampit. Gen 5
  - type: text
    content: 'I Adama, i Seta, i Enosy, '
  '10':
  - type: text
    content: I Kosy niteraka an’i Nimroda; izy no olo-mahery voalohany teto ambonin’ny tany.
  '11':
  - type: text
    content: 'I Mizraima no niteraka ny Lodita, ny Anamita, ny Lehabita, ny Naftohita, '
  '12':
  - type: text
    content: ny Patrosita, ny Kaslohita izay niavian’ny Filistina ary ny Kaftorita.
  '13':
  - type: text
    content: 'I Kanana no niteraka an’i Sidona lahimatoany, i Heta, '
  '14':
  - type: text
    content: 'ny Jebosita, ny Amorita, ny Girgasita, '
  '15':
  - type: text
    content: 'ny Hivita, ny Arkita, ny Sinita, '
  '16':
  - type: text
    content: ny Arvadita, ny Zemarita ary ny Hamatita.
  '17':
  - type: text
    content: Ny zanakalahin’i Sema dia i Elama, i Asira, i Arpaksada, i Loda, i Arama, i Oza, i Hola, i Getera ary i Maseka.
  '18':
  - type: text
    content: 'I Arpaksada no niteraka an’i Sela; i Sela no niteraka an’i Ebera. '
  '19':
  - type: text
    content: 'Niteraka roa lahy i Ebera: Ny anaran’ny iray dia Pelega'
  - type: note
    content: 'Pelega: Fizarana.'
  - type: text
    content: ', satria tamin’ny androny no nizarana ny tany; ary Joktana no anaran’ny rahalahiny. '
  '2':
  - type: text
    content: 'i Kenana, i Mahalalila, i Jereda, '
  '20':
  - type: text
    content: 'I Joktana no niteraka an’i Almodada, i Selefa, i Hazarmaveta, i Jera, '
  '21':
  - type: text
    content: 'i Hadorama, i Ozala, i Dikla, '
  '22':
  - type: text
    content: 'i Ebala, i Abimaela, i Sheba, '
  '23':
  - type: text
    content: i Ofira, i Havila ary i Jobaba; ireo rehetra ireo no zanakalahin’i Joktana.
  - type: heading
    content: Ampit. Gen 11.10-26
  '24':
  - type: text
    content: 'I Sema, i Arpaksada, i Sela, '
  '25':
  - type: text
    content: 'i Ebera, i Pelega, i Reo, '
  '26':
  - type: text
    content: 'i Seroga, i Nahora, i Tera, '
  '27':
  - type: text
    content: i Abrama izay antsoina koa hoe i Abrahama.
  '28':
  - type: text
    content: Ny zanakalahin’i Abrahama dia Isaka sy Ismaela.
  - type: heading
    content: Ampit. Gen 25
  '29':
  - type: text
    content: 'Izao no taranak’izy ireo: I Nebaiota, lahimatoan’Ismaela, i Kedara, i Abdela, i Mibsama, '
  '3':
  - type: text
    content: 'i Enoka, i Metosela, i Lameka, '
  '30':
  - type: text
    content: 'i Misma, i Doma, i Masa, i Hadada, i Tema, '
  '31':
  - type: text
    content: i Jetora, i Nafisy ary i Kedma. Ireo no zanakalahin’Ismaela.
  '32':
  - type: text
    content: 'Ny zanakalahin’i Ketora, vady tsindranon’i Abrahama: Izy no niteraka an’i Zimrama, i Joksana, i Medana, i Midiana, i Jisbaka ary i Soaha. Ny zanakalahin’i Joksana dia i Sheba sy i Dedana.'
  '33':
  - type: text
    content: Ny zanakalahin’i Midiana dia i Efaha, i Efera, i Hanoka, i Abida ary i Eldaha. Ireo rehetra ireo no zanakalahin’i Ketora.
  '34':
  - type: text
    content: I Abrahama no niteraka an’Isaka. Ny zanakalahin’i Isaka dia i Esao sy Israely.
  - type: heading
    content: Ampit. Gen 36.10-28
  '35':
  - type: text
    content: Ny zanakalahin’i Esao dia i Elifaza, i Regoela, i Jeosy, i Jalama ary i Kora.
  '36':
  - type: text
    content: Ny zanakalahin’i Elifaza dia i Temana, i Omara, i Zefo, i Gatama, i Kenaza, i Timna ary i Amaleka.
  '37':
  - type: text
    content: Ny zanakalahin’i Regoela dia i Nahata, i Zera, i Sama ary i Miza.
  '38':
  - type: text
    content: Ny zanakalahin’i Seìra dia i Lotana, i Sobala, i Zibona, i Ana, i Disona, i Ezera ary i Disana.
  '39':
  - type: text
    content: Ny zanakalahin’i Lotana dia i Hory sy i Homama. Ny anabavin’i Lotana dia i Timna.
  '4':
  - type: text
    content: i Noa, i Sema, i Hama ary i Jafeta.
  - type: heading
    content: Ampit. Gen 10
  '40':
  - type: text
    content: Ny zanakalahin’i Sobala dia i Aliana, i Manahata, i Ebala, i Sefy ary i Onama.
  - type: text
    content: Ny zanakalahin’i Zibona dia i Aia sy i Ana.
  '41':
  - type: text
    content: Ny zanakalahin’i Ana dia i Disona.
  - type: text
    content: Ny zanakalahin’i Disona dia i Hamrana, i Esbana, i Jitirana ary i Kerana.
  '42':
  - type: text
    content: Ny zanakalahin’i Ezera dia i Bilana sy i Zavana ary i Jakana. Ny zanakalahin’i Disana dia i Oza sy i Arana.
  - type: heading
    content: Ireo mpanjaka sy loham-pirenena tao Edoma
  - type: heading
    content: Ampit. Gen 36.31-43
  '43':
  - type: text
    content: 'Izao no mpanjaka izay nanjaka tany amin’ny tany Edoma, fony tsy mbola nisy mpanjaka nanjaka tamin’ny Zanak’Israely: I Bela, zanak’i Beora; Dinaba no anaran’ny tanànany. '
  '44':
  - type: text
    content: 'Maty i Bela; nanjaka nandimby azy i Jobaba, zanak’i Zera, avy any Bozra. '
  '45':
  - type: text
    content: 'Maty i Jobaba; nanjaka nandimby azy i Hosama, avy any amin’ny tanin’ny Temanita. '
  '46':
  - type: text
    content: 'Maty i Hosama; nanjaka nandimby azy i Hadada, zanak’i Bedada, izay namely ny Midianita tany amin’ny tany Moaba; ary Avita no anaran’ny tanànany. '
  '47':
  - type: text
    content: 'Maty i Hadada; nanjaka nandimby azy i Samla avy any Masreka. '
  '48':
  - type: text
    content: 'Maty i Samla; nanjaka nandimby azy i Saoly avy any Rehobota eo amoron’ny ony. '
  '49':
  - type: text
    content: 'Maty i Saoly; nanjaka nandimby azy i Baala-Hanana, zanak’i Akbora. '
  '5':
  - type: text
    content: Ny zanakalahin’i Jafeta dia i Gomera, i Magoga, i Maday, i Javana, i Tobala, i Maseka ary i Tirasa.
  '50':
  - type: text
    content: 'Maty i Baala-Hanana; nanjaka nandimby azy i Hadada; Pao no anaran’ny tanànany; ary ny anaran’ny vadiny dia i Mehetabela, zanakavavin’i Matreda, zanakavavin’i Me-Zahaba. '
  '51':
  - type: text
    content: Maty koa i Hadada.
  - type: text
    content: 'Ireo loham-pirenen’i Edoma dia i Timna loham-pireneny, i Alva loham-pireneny, i Jeteta loham-pireneny, '
  '52':
  - type: text
    content: 'i Oholibama loham-pireneny, i Elaha loham-pireneny, i Pinona loham-pireneny, '
  '53':
  - type: text
    content: 'i Kenaza loham-pireneny, i Temana loham-pireneny, i Mibzara loham-pireneny, '
  '54':
  - type: text
    content: i Magdiela loham-pireneny, Irama loham-pireneny. Ireo no loham-pirenenen’i Edoma.
  '6':
  - type: text
    content: Ny zanakalahin’i Gomera dia i Askenaza sy i Rifata ary i Togarma.
  '7':
  - type: text
    content: Ny zanakalahin’i Javana dia i Elisaha, i Tarsisy, i Kitima ary i Rodanima.
  '8':
  - type: text
    content: Ny zanakalahin’i Hama dia i Kosy, i Mizraima, i Pota ary i Kanana.
  '9':
  - type: text
    content: Ny zanakalahin’i Kosy dia i Seba, i Havila, i Sabta, i Ragama ary i Sabteka. Ny zanakalahin’i Ragama dia i Seba sy i Dedana.
