document_id: 1CH.1
type_code: plt
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: FITANISANA NY TETIARANA
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: I Adama ka hatramin’ny taranak’i Esao
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Ampit. Gen 5
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'I Adama, i Seta, i Enosy, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'i Kenana, i Mahalalila, i Jereda, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'i Enoka, i Metosela, i Lameka, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: i Noa, i Sema, i Hama ary i Jafeta.
- type: usfm
  marker: r
  children:
  - type: text
    text: Ampit. Gen 10
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ny zanakalahin’i Jafeta dia i Gomera, i Magoga, i Maday, i Javana, i Tobala, i Maseka ary i Tirasa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ny zanakalahin’i Gomera dia i Askenaza sy i Rifata ary i Togarma.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ny zanakalahin’i Javana dia i Elisaha, i Tarsisy, i Kitima ary i Rodanima.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ny zanakalahin’i Hama dia i Kosy, i Mizraima, i Pota ary i Kanana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ny zanakalahin’i Kosy dia i Seba, i Havila, i Sabta, i Ragama ary i Sabteka. Ny zanakalahin’i Ragama dia i Seba sy i Dedana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: I Kosy niteraka an’i Nimroda; izy no olo-mahery voalohany teto ambonin’ny tany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'I Mizraima no niteraka ny Lodita, ny Anamita, ny Lehabita, ny Naftohita, '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ny Patrosita, ny Kaslohita izay niavian’ny Filistina ary ny Kaftorita.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'I Kanana no niteraka an’i Sidona lahimatoany, i Heta, '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'ny Jebosita, ny Amorita, ny Girgasita, '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'ny Hivita, ny Arkita, ny Sinita, '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ny Arvadita, ny Zemarita ary ny Hamatita.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ny zanakalahin’i Sema dia i Elama, i Asira, i Arpaksada, i Loda, i Arama, i Oza, i Hola, i Getera ary i Maseka.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'I Arpaksada no niteraka an’i Sela; i Sela no niteraka an’i Ebera. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Niteraka roa lahy i Ebera: Ny anaran’ny iray dia Pelega'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Pelega: Fizarana.'
    marker-yv: yv-n
  - type: text
    text: ', satria tamin’ny androny no nizarana ny tany; ary Joktana no anaran’ny rahalahiny. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'I Joktana no niteraka an’i Almodada, i Selefa, i Hazarmaveta, i Jera, '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'i Hadorama, i Ozala, i Dikla, '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'i Ebala, i Abimaela, i Sheba, '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: i Ofira, i Havila ary i Jobaba; ireo rehetra ireo no zanakalahin’i Joktana.
- type: usfm
  marker: r
  children:
  - type: text
    text: Ampit. Gen 11.10-26
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'I Sema, i Arpaksada, i Sela, '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'i Ebera, i Pelega, i Reo, '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'i Seroga, i Nahora, i Tera, '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: i Abrama izay antsoina koa hoe i Abrahama.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Ny zanakalahin’i Abrahama dia Isaka sy Ismaela.
- type: usfm
  marker: r
  children:
  - type: text
    text: Ampit. Gen 25
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Izao no taranak’izy ireo: I Nebaiota, lahimatoan’Ismaela, i Kedara, i Abdela, i Mibsama, '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'i Misma, i Doma, i Masa, i Hadada, i Tema, '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: i Jetora, i Nafisy ary i Kedma. Ireo no zanakalahin’Ismaela.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Ny zanakalahin’i Ketora, vady tsindranon’i Abrahama: Izy no niteraka an’i Zimrama, i Joksana, i Medana, i Midiana, i Jisbaka ary i Soaha. Ny zanakalahin’i Joksana dia i Sheba sy i Dedana.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Ny zanakalahin’i Midiana dia i Efaha, i Efera, i Hanoka, i Abida ary i Eldaha. Ireo rehetra ireo no zanakalahin’i Ketora.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: I Abrahama no niteraka an’Isaka. Ny zanakalahin’i Isaka dia i Esao sy Israely.
- type: usfm
  marker: r
  children:
  - type: text
    text: Ampit. Gen 36.10-28
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Ny zanakalahin’i Esao dia i Elifaza, i Regoela, i Jeosy, i Jalama ary i Kora.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Ny zanakalahin’i Elifaza dia i Temana, i Omara, i Zefo, i Gatama, i Kenaza, i Timna ary i Amaleka.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Ny zanakalahin’i Regoela dia i Nahata, i Zera, i Sama ary i Miza.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Ny zanakalahin’i Seìra dia i Lotana, i Sobala, i Zibona, i Ana, i Disona, i Ezera ary i Disana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Ny zanakalahin’i Lotana dia i Hory sy i Homama. Ny anabavin’i Lotana dia i Timna.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Ny zanakalahin’i Sobala dia i Aliana, i Manahata, i Ebala, i Sefy ary i Onama.
- type: usfm
  marker: p
  children:
  - type: text
    text: Ny zanakalahin’i Zibona dia i Aia sy i Ana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: Ny zanakalahin’i Ana dia i Disona.
- type: usfm
  marker: p
  children:
  - type: text
    text: Ny zanakalahin’i Disona dia i Hamrana, i Esbana, i Jitirana ary i Kerana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: Ny zanakalahin’i Ezera dia i Bilana sy i Zavana ary i Jakana. Ny zanakalahin’i Disana dia i Oza sy i Arana.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ireo mpanjaka sy loham-pirenena tao Edoma
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Ampit. Gen 36.31-43
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Izao no mpanjaka izay nanjaka tany amin’ny tany Edoma, fony tsy mbola nisy mpanjaka nanjaka tamin’ny Zanak’Israely: I Bela, zanak’i Beora; Dinaba no anaran’ny tanànany. '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Maty i Bela; nanjaka nandimby azy i Jobaba, zanak’i Zera, avy any Bozra. '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Maty i Jobaba; nanjaka nandimby azy i Hosama, avy any amin’ny tanin’ny Temanita. '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Maty i Hosama; nanjaka nandimby azy i Hadada, zanak’i Bedada, izay namely ny Midianita tany amin’ny tany Moaba; ary Avita no anaran’ny tanànany. '
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Maty i Hadada; nanjaka nandimby azy i Samla avy any Masreka. '
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Maty i Samla; nanjaka nandimby azy i Saoly avy any Rehobota eo amoron’ny ony. '
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'Maty i Saoly; nanjaka nandimby azy i Baala-Hanana, zanak’i Akbora. '
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Maty i Baala-Hanana; nanjaka nandimby azy i Hadada; Pao no anaran’ny tanànany; ary ny anaran’ny vadiny dia i Mehetabela, zanakavavin’i Matreda, zanakavavin’i Me-Zahaba. '
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: Maty koa i Hadada.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ireo loham-pirenen’i Edoma dia i Timna loham-pireneny, i Alva loham-pireneny, i Jeteta loham-pireneny, '
  - type: usfm
    marker: v
    metadata:
      v: '52'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'i Oholibama loham-pireneny, i Elaha loham-pireneny, i Pinona loham-pireneny, '
  - type: usfm
    marker: v
    metadata:
      v: '53'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'i Kenaza loham-pireneny, i Temana loham-pireneny, i Mibzara loham-pireneny, '
  - type: usfm
    marker: v
    metadata:
      v: '54'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: i Magdiela loham-pireneny, Irama loham-pireneny. Ireo no loham-pirenenen’i Edoma.
