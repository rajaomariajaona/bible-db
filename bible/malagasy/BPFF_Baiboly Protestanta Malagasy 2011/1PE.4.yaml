document_id: 1PE.4,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ampy izay ny lasa
  - type: text
    content: 'Koa satria niaritra tamin’ny nofo '
  - type: text
    content: Kristy
  - type: text
    content: ' dia raiso mba ho fiadianareo koa izany saina izany; fa izay niaritra tamin’ny nofo dia efa nitsahatra tamin’ny ota '
  '10':
  - type: text
    content: 'Samia mifanompo araka ny fanomezam-pahasoavana izay noraisinareo, tahaka ny mpitantana tsara ny fahasoavan’Andriamanitra izay miasa amin’ny fomba maro samihafa. '
  '11':
  - type: text
    content: 'Raha misy olona miteny dia aoka izy hiteny toy ny milaza tenin’Andriamanitra; raha misy olona manompo dia aoka izy hanao izany araka ny hery izay omen’Andriamanitra azy mba hankalazana an’Andriamanitra amin’ny zavatra rehetra amin’ny alalan’i Jesosy '
  - type: text
    content: Kristy
  - type: text
    content: '; fa Azy ny voninahitra sy ny fanjakana mandrakizay mandrakizay. '
  - type: text
    content: Amena
  - type: text
    content: .
  - type: heading
    content: Fifaliana ny miaritra noho ny amin’i Kristy
  '12':
  - type: text
    content: 'Ry malala, aza gaga noho ny fizahan-toetra mahamay izay mahazo anareo, toy ny hoe misy zava-mahagaga manjo anareo. '
  '13':
  - type: text
    content: 'Fa mainka mifalia araka ny iombonanareo fijaliana amin’i '
  - type: text
    content: Kristy
  - type: text
    content: ' mba hifalianareo sy hiravoravoanareo koa amin’ny fisehoan’ny voninahiny. '
  '14':
  - type: text
    content: 'Sambatra ianareo raha haratsina noho ny anaran’i Kristy, fa ny Fanahin’ny voninahitra, dia ny Fanahin’Andriamanitra no mipetraka aminareo! '
  '15':
  - type: text
    content: 'Fa aoka tsy hisy eo aminareo hijaly satria mpamono olona, na mpangalatra na mpanao ratsy na mpitsabaka amin’ny raharahan’ny hafa. '
  '16':
  - type: text
    content: 'Fa raha misy mijaly satria Kristiana dia aoka tsy ho menatra izy; fa aoka hankalaza an’Andriamanitra amin’izany anarana izany izy. '
  '17':
  - type: text
    content: 'Fa tonga ny andro iantombohan’ny fitsarana hatrao amin’ny tranon’Andriamanitra. Ary raha miantomboka amintsika izany dia hanao ahoana kosa no hiafaran’izay tsy manaiky ny Filazantsaran’Andriamanitra? '
  '18':
  - type: text
    content: 'Ary «raha saika tsy voavonjy ny marina, inona no hahazo ny mpanota?» (Oha 11.31). '
  '19':
  - type: text
    content: Koa izay mitondra fahoriana araka ny sitrapon’Andriamanitra dia aoka ny fanaovan-tsoa no hanolorany ny tenany ho an’Ilay mahatoky, dia ny Mpanao azy.
  '2':
  - type: text
    content: 'mba tsy handanianareo ny andro sisa iainanareo amin’ny nofo araka ny filan’ny olona intsony, fa araka ny sitrapon’Andriamanitra. '
  '3':
  - type: text
    content: 'Fa ampy izay ny andro lasa ho nanaovana ny sitrapon’ny '
  - type: text
    content: Jentilisa
  - type: text
    content: ' tamin’ny nandehananareo tamin’ny fanaranam-po amin’ny ratsy sy ny fanirian-dratsy, ny fimamoana, ny filalaovan-dratsy, ny fisotroan-toaka ary ny fanompoan-tsampy izay fady indrindra. '
  '4':
  - type: text
    content: 'Amin’izany dia gaga izy ireo satria tsy miara-mihazakazaka aminy ianareo amin’izany fanaranam-po amin’ny ratsy izany ka teneniny ratsy; '
  '5':
  - type: text
    content: 'nefa hampamoahin’Ilay efa vonona hitsara ny velona sy ny maty izy. '
  '6':
  - type: text
    content: Fa noho izao no nitoriana ny Filazantsara tamin’izay maty aza mba hotsaraina araka ny olona amin’ny nofo izy fa ho velona araka an’Andriamanitra amin’ny fanahy.
  - type: heading
    content: Mpitantana ny fahasoavana
  '7':
  - type: text
    content: 'Fa antomotra ny faran’ny zavatra rehetra; koa hendre ka mahonòna tena mba ho afaka hivavaka ianareo. '
  '8':
  - type: text
    content: 'Ary mihoatra noho ny zavatra rehetra, mifankatiava tsara, fa «ny fitiavana no manarona fahotana maro» (Oha 10.12). '
  '9':
  - type: text
    content: 'Mifampiantranoa ka aza mimonomonona. '
