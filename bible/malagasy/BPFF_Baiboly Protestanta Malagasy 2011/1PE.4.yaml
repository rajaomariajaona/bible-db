document_id: 1PE.4
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ampy izay ny lasa
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Koa satria niaritra tamin’ny nofo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' dia raiso mba ho fiadianareo koa izany saina izany; fa izay niaritra tamin’ny nofo dia efa nitsahatra tamin’ny ota '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'mba tsy handanianareo ny andro sisa iainanareo amin’ny nofo araka ny filan’ny olona intsony, fa araka ny sitrapon’Andriamanitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Fa ampy izay ny andro lasa ho nanaovana ny sitrapon’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jentilisa
  - type: text
    text: ' tamin’ny nandehananareo tamin’ny fanaranam-po amin’ny ratsy sy ny fanirian-dratsy, ny fimamoana, ny filalaovan-dratsy, ny fisotroan-toaka ary ny fanompoan-tsampy izay fady indrindra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Amin’izany dia gaga izy ireo satria tsy miara-mihazakazaka aminy ianareo amin’izany fanaranam-po amin’ny ratsy izany ka teneniny ratsy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'nefa hampamoahin’Ilay efa vonona hitsara ny velona sy ny maty izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Fa noho izao no nitoriana ny Filazantsara tamin’izay maty aza mba hotsaraina araka ny olona amin’ny nofo izy fa ho velona araka an’Andriamanitra amin’ny fanahy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mpitantana ny fahasoavana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Fa antomotra ny faran’ny zavatra rehetra; koa hendre ka mahonòna tena mba ho afaka hivavaka ianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary mihoatra noho ny zavatra rehetra, mifankatiava tsara, fa «ny fitiavana no manarona fahotana maro» (Oha 10.12). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Mifampiantranoa ka aza mimonomonona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Samia mifanompo araka ny fanomezam-pahasoavana izay noraisinareo, tahaka ny mpitantana tsara ny fahasoavan’Andriamanitra izay miasa amin’ny fomba maro samihafa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Raha misy olona miteny dia aoka izy hiteny toy ny milaza tenin’Andriamanitra; raha misy olona manompo dia aoka izy hanao izany araka ny hery izay omen’Andriamanitra azy mba hankalazana an’Andriamanitra amin’ny zavatra rehetra amin’ny alalan’i Jesosy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: '; fa Azy ny voninahitra sy ny fanjakana mandrakizay mandrakizay. '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Amena
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fifaliana ny miaritra noho ny amin’i Kristy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ry malala, aza gaga noho ny fizahan-toetra mahamay izay mahazo anareo, toy ny hoe misy zava-mahagaga manjo anareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Fa mainka mifalia araka ny iombonanareo fijaliana amin’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' mba hifalianareo sy hiravoravoanareo koa amin’ny fisehoan’ny voninahiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Sambatra ianareo raha haratsina noho ny anaran’i Kristy, fa ny Fanahin’ny voninahitra, dia ny Fanahin’Andriamanitra no mipetraka aminareo! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Fa aoka tsy hisy eo aminareo hijaly satria mpamono olona, na mpangalatra na mpanao ratsy na mpitsabaka amin’ny raharahan’ny hafa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Fa raha misy mijaly satria Kristiana dia aoka tsy ho menatra izy; fa aoka hankalaza an’Andriamanitra amin’izany anarana izany izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Fa tonga ny andro iantombohan’ny fitsarana hatrao amin’ny tranon’Andriamanitra. Ary raha miantomboka amintsika izany dia hanao ahoana kosa no hiafaran’izay tsy manaiky ny Filazantsaran’Andriamanitra? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary «raha saika tsy voavonjy ny marina, inona no hahazo ny mpanota?» (Oha 11.31). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Koa izay mitondra fahoriana araka ny sitrapon’Andriamanitra dia aoka ny fanaovan-tsoa no hanolorany ny tenany ho an’Ilay mahatoky, dia ny Mpanao azy.
