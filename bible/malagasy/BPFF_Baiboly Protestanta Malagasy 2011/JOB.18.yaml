document_id: JOB.18,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Ny teny fanindroany nataon’i Bildada: Fandrika ho an’ny ratsy fanahy'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Dia namaly i Bildada sohita hoe:'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: miafina ao amin’ny tany ny fandrika haningotra azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny tonta dia efa vonona eny an-dalana.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Manodidina azy ny fampitahorana mampihorohoro azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka mampivadi-po azy eny amin’ny alehany rehetra.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Hamely azy ny mosary raha mbola ao amin’ny heriny izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary efa vonona eo anilany ny fandringanana
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ka handany tsikelikely ny hodiny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny ratsambatany dia lanin’ny lahimatoan’ny fahafatesana.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Ongotana hiala amin’ny tranolainy izay nitokiany izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hoentinao eo amin’ilay mpanjaka mampahatahotra indrindra.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Mahazo mitoetra ao an-dainy ianao: Tsy azy intsony izany;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: solifara no hafafy amin’ny fonenany.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Maina ny fotony ao ambany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tapaka ny rantsany eo ambony.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Ho very tsy ho eo amin’ny tany ny fahatsiarovana azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy malaza eny ivelany izy.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Roahina hiala amin’ny mazava ho any amin’ny maizina izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary enjehina hiala amin’izao tontolo izao.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Tsy manana fara aman-dimby eo amin’ny fireneny izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy misy olona tavela ao amin’ny toerana nonenany.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Mandra-pahoviana no hanisy fandrika amin’ny teny ianareo?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mba hendre aloha dia vao hiteny izahay.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Ny manjo azy dia italanjonan’ny any andrefana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary raiki-tahotra ny any atsinanana.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Izany tokoa no iafaran’ny fonenan’ny ratsy fanahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary izany no manjo ny toeran’ny tsy mahalala an’Andriamanitra!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Sao ataonareo ho biby anie izahay
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tahaka ny maloto eo imasonareo?
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Ry ilay mamiravira tena amin’ny fahatezerana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: noho ny aminao va no hahatonga ny tany ho lao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny vatolampy hafindra hiala amin’ny toerany?
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Eny, ho faty ny jiron’ny ratsy fanahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hitsilopilopy ny lelafony;
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ny mazava dia hanjary maizina ao amin’ny tranolainy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny jirony eo amboniny dia ho faty.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Ny diany izay navitrika teo aloha dia hiha ety
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny fisainany ihany no handavo azy.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Fa ny tongony ihany no mahatonga azy eo amin’ny fandrika harato
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka manitsaka eo amin’ny harato izy;
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: azon’ny fandrika ny voditongony
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary voahazon’ny tadivavarana;
