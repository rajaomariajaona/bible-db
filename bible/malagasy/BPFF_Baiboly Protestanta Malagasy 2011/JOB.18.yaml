document_id: JOB.18,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: 'Ny teny fanindroany nataon’i Bildada: Fandrika ho an’ny ratsy fanahy'
  - type: text
    content: 'Dia namaly i Bildada sohita hoe:'
  '10':
  - type: text
    content: miafina ao amin’ny tany ny fandrika haningotra azy
  - type: text
    content: ary ny tonta dia efa vonona eny an-dalana.
  '11':
  - type: text
    content: Manodidina azy ny fampitahorana mampihorohoro azy
  - type: text
    content: ka mampivadi-po azy eny amin’ny alehany rehetra.
  '12':
  - type: text
    content: Hamely azy ny mosary raha mbola ao amin’ny heriny izy
  - type: text
    content: ary efa vonona eo anilany ny fandringanana
  '13':
  - type: text
    content: ka handany tsikelikely ny hodiny;
  - type: text
    content: ny ratsambatany dia lanin’ny lahimatoan’ny fahafatesana.
  '14':
  - type: text
    content: Ongotana hiala amin’ny tranolainy izay nitokiany izy
  - type: text
    content: ka hoentinao eo amin’ilay mpanjaka mampahatahotra indrindra.
  '15':
  - type: text
    content: 'Mahazo mitoetra ao an-dainy ianao: Tsy azy intsony izany;'
  - type: text
    content: solifara no hafafy amin’ny fonenany.
  '16':
  - type: text
    content: Maina ny fotony ao ambany
  - type: text
    content: ary tapaka ny rantsany eo ambony.
  '17':
  - type: text
    content: Ho very tsy ho eo amin’ny tany ny fahatsiarovana azy
  - type: text
    content: ary tsy malaza eny ivelany izy.
  '18':
  - type: text
    content: Roahina hiala amin’ny mazava ho any amin’ny maizina izy
  - type: text
    content: ary enjehina hiala amin’izao tontolo izao.
  '19':
  - type: text
    content: Tsy manana fara aman-dimby eo amin’ny fireneny izy
  - type: text
    content: ka tsy misy olona tavela ao amin’ny toerana nonenany.
  '2':
  - type: text
    content: Mandra-pahoviana no hanisy fandrika amin’ny teny ianareo?
  - type: text
    content: Mba hendre aloha dia vao hiteny izahay.
  '20':
  - type: text
    content: Ny manjo azy dia italanjonan’ny any andrefana
  - type: text
    content: ary raiki-tahotra ny any atsinanana.
  '21':
  - type: text
    content: Izany tokoa no iafaran’ny fonenan’ny ratsy fanahy
  - type: text
    content: ary izany no manjo ny toeran’ny tsy mahalala an’Andriamanitra!
  '3':
  - type: text
    content: Sao ataonareo ho biby anie izahay
  - type: text
    content: ka tahaka ny maloto eo imasonareo?
  '4':
  - type: text
    content: Ry ilay mamiravira tena amin’ny fahatezerana,
  - type: text
    content: noho ny aminao va no hahatonga ny tany ho lao
  - type: text
    content: ary ny vatolampy hafindra hiala amin’ny toerany?
  '5':
  - type: text
    content: Eny, ho faty ny jiron’ny ratsy fanahy
  - type: text
    content: ary hitsilopilopy ny lelafony;
  '6':
  - type: text
    content: ny mazava dia hanjary maizina ao amin’ny tranolainy
  - type: text
    content: ary ny jirony eo amboniny dia ho faty.
  '7':
  - type: text
    content: Ny diany izay navitrika teo aloha dia hiha ety
  - type: text
    content: ary ny fisainany ihany no handavo azy.
  '8':
  - type: text
    content: Fa ny tongony ihany no mahatonga azy eo amin’ny fandrika harato
  - type: text
    content: ka manitsaka eo amin’ny harato izy;
  '9':
  - type: text
    content: azon’ny fandrika ny voditongony
  - type: text
    content: ary voahazon’ny tadivavarana;
