  - type: heading
    content: tet ט
  '15':
  - type: text
    content: Latsaka tamin’ny lavaka izay nohadiny ny Jentilisa;
  - type: text
    content: ny fandrika harato izay nafeniny ihany no nahazo ny tongony.
  '16':
  - type: text
    content: NY TOMPO manao izay hahafantarana Azy ho Mpitsara;
  - type: text
    content: 'namandrika ny ratsy fanahy tamin’ny asan’ny tanany Izy. '
  - type: text
    content: Feon-javamaneno. Fiatoana
  - type: heading
    content: iod י
  '17':
  - type: text
    content: 'Hiverina ho any amin’ny '
