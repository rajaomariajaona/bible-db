    content: Fa tsy ho mandrakizay no hanadinoana ny mahantra
  - type: text
    content: ary tsy ho very mandrakizay ny fanantenan’ny mpandefitra.
  '19':
  - type: text
    content: Mitsangàna, TOMPO ô! Aoka tsy hahery ny olona!
  - type: text
    content: Aoka hotsaraina eo anatrehanao ny Jentilisa!
  '2':
  - type: text
    content: Ho faly sy ho ravoravo Aminao aho;
  - type: text
    content: hankalaza ny anaranao aho, ry Avo Indrindra!
  - type: heading
    content: bet ב
  '20':
  - type: text
    content: Ataovy eo aminy ny horohoro, TOMPO ô!
  - type: text
    content: 'Aoka ho fantatry ny Jentilisa fa olona ihany izy! '
  - type: text
    content: Fiatoana
  '3':
