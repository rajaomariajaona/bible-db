  '1':
  - type: heading
    content: Mpamonjy ny mahantra sy izay ampahorina NY TOMPO
  - type: text
    content: Ho an’ny mpiventy hira Almot-laben. Salamo nataon’i Davida.
  - type: heading
    content: alef א
  - type: text
    content: Hidera NY TOMPO amin’ny foko manontolo aho;
  - type: text
    content: hanambara ny zava-mahagaga rehetra nataonao aho.
  '10':
  - type: text
    content: Aoka hatoky Anao izay mahalala ny anaranao,
  - type: text
    content: fa tsy mba afoinao izay mitady Anao, TOMPO ô!
  - type: heading
    content: zaìn ז
  '11':
  - type: text
    content: 'Mihirà ho an’NY TOMPO izay mitoetra any '
  - type: text
    content: Ziona
  - type: text
    content: ','
  - type: text
    content: ambarao any amin’ny firenena ny asany.
  '12':
  - type: text
    content: Fa manadina ny ra latsaka Izy ka mahatsiaro ny ampahorina;
  - type: text
    content: tsy manadino ny fitarainany Izy.
  - type: heading
    content: het ה
  '13':
  - type: text
    content: Mamindrà fo amiko, TOMPO ô,
