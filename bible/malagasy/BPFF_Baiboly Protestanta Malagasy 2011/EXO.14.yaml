document_id: EXO.14,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Enjehin’i Farao ny Zanak’Israely
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary NY TOMPO niteny tamin’i Mosesy hoe: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa nanakaiky i Farao dia natopin’ny Zanak’Israely ny masony ka indreo ny Ejiptiana tamy manenjika azy. Dia raiki-tahotra indrindra ny Zanak’Israely ka nitaraina tamin’NY TOMPO. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Sady hoy koa ireo tamin’i Mosesy: Moa tsy nisy fasana va tany Ejipta no noentinao ho faty atỳ an-tany efitra izahay? Inona izao nataonao taminay izao ka nitondra anay nivoaka avy tany Ejipta ianao? '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsy izao va no teny nolazainay taminao fony tany Ejipta hoe: Aoka izao fa avelao ihany izahay hanompo ny Ejiptiana? Fa aleonay manompo ny Ejiptiana toy izay ho faty any an-tany efitra. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy i Mosesy tamin’ny olona: Aza matahotra ianareo! Miorena tsara fa ho hitanareo ny famonjen’NY TOMPO izay hataony ho anareo anio; fa ny Ejiptiana izay hitanareo anio dia tsy hohitanareo intsony mandrakizay. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: NY TOMPO no hiady ho anareo fa ianareo kosa dia hangina.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Manokatra lalana mamakivaky ny ranomasina Andriamanitra
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy NY TOMPO tamin’i Mosesy: Nahoana no mitaraina Amiko ianao? Lazao ny Zanak’Israely mba handroso. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ianao, aingao ny tehinao ka atsory ambonin’ny ranomasina ny tananao dia saraho ny rano ka handeha hamakivaky eo afovoan’ny ranomasina, mandia tany maina, ny Zanak’Israely. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa indro Aho hanamafy ny fon’ny Ejiptiana ka hiditra hanaraka azy ao; dia hasehoko ny voninahitro amin’izay hataoko amin’i Farao sy amin’ny miaramilany rehetra miaraka amin’ny kalesy fitondrany miady sy ny mpitaingin-tsoavaliny '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ka ho fantatry ny Ejiptiana fa Izaho no TOMPO, rehefa asehoko ny voninahitro amin’izay ataoko amin’i Farao sy ny kalesiny sy ny mpitaingin-tsoavaliny.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ilay '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Anjelin’Andriamanitra
    - type: text
      text: ', izay nandeha teo alohan’ny tobin’ny Israelita, dia nifindra ka nankeo aorianany; ary nifindra niala teo alohany koa ny andry rahona dia nijanona teo aorianany '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lazao amin’ny Zanak’Israely mba hivily izy ka hitoby eo akaikin’i Py-Hahirota, eo anelanelan’i Migdola sy ny ranomasina. Eo akaikin’i Baala-Zefona, tandrify azy, no hitobianareo, eo amoron’ny ranomasina. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ka tonga teo anelanelan’ny tobin’ny Ejiptiana sy ny tobin’ny Israely. Teo ihany ny rahona sy ny hamaizinana nefa nampahazava ny alina kosa izany ka tsy nifanatona izy roa tonta nandritra ny alina.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia natsotran’i Mosesy teo ambonin’ny ranomasina ny tanany ka rivotra mahery avy any atsinanana no nampisavan’NY TOMPO ny ranomasina nandritra iny alina iny, ary nataony tany maina ny ranomasina sady voasaraka ny rano. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nandeha teo afovoan’ny ranomasina nandia tany maina ny Zanak’Israely; fa ny rano dia tonga fefy teo ankavanany sy teo ankaviany. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nanenjika azy ireo ny Ejiptiana ka niditra nanaraka azy teo afovoan’ny ranomasina, dia ny soavalin’i Farao rehetra sy ny kalesy fitondra miady ary ny mpitaingin-tsoavaliny. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin’ny fotoam-piambenana maraina dia nitazana ny tobin’ny Ejiptiana avy eo amin’ny andry afo sy ny rahona NY TOMPO ka nampifanaritaka ny tobin’ny Ejiptiana. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nataony nikatso ny kodiaran’ny kalesy fitondra miady ka nanasarotra ny fandehany izany. Dia hoy ny Ejiptiana: Andeha handositra ny Israelita isika fa NY TOMPO no miady amin’ny Ejiptiana ho an’ireo.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy NY TOMPO tamin’i Mosesy: Atsory eo ambonin’ny ranomasina ny tananao mba hikatonan’ny rano amin’ny Ejiptiana mbamin’ny kalesy fitondrany miady sy ny mpitaingin-tsoavaliny. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia natsotran’i Mosesy teo ambonin’ny ranomasina ny tanany ka niverina ho amin’ny toerany teo aloha ny ranomasina rehefa nadiva ho maraina ny andro; nitsoaka nandositra ny rano ny Ejiptiana, kanjo notsenainy ihany, ary narian’NY TOMPO teo afovoan’ny ranomasina ny Ejiptiana. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nikatona ny rano ka nanarona ny kalesy fitondra miady sy ny mpitaingin-tsoavaly, dia ny miaramilan’i Farao rehetra izay niditra tao amin’ny ranomasina nanenjika ny Zanak’Israely; tsy nisy niangana na dia iray akory aza ireo. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa ny Zanak’Israely kosa dia nandeha tamin’ny tany maina teo afovoan’ny ranomasina; ary ny rano dia tonga fefy teo ankavanany sy teo ankaviany.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hilaza amin’ny olony i Farao hoe: Azon’ny tamberin-tany izy ka voahidin’ny tany efitra. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Toy izany no namonjen’NY TOMPO ny Israely mba tsy ho azon’ny Ejiptiana tamin’izany andro izany; ary hitan’ny Israelita teny amoron’ny ranomasina ny fatin’ny Ejiptiana. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Rehefa hitan’ny Israelita ny asa lehibe izay nataon’ny tanan’NY TOMPO tamin’ny Ejiptiana dia natahotra NY TOMPO ny olona ka nino NY TOMPO sy i Mosesy mpanompony.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia hanamafy ny fon’i Farao Aho ka hanenjika anareo izy, kanefa dia hasehoko ny voninahitro amin’izay hataoko amin’i Farao sy amin’ny miaramilany rehetra ka ho fantatry ny Ejiptiana fa Izaho no TOMPO. Dia nataon’ny Zanak’Israely izany.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nisy nanambara tamin’ny mpanjakan’i Ejipta tokoa fa lasa nandositra ny olona. Dia niova ny eritreritr’i Farao sy ny mpanompony ny amin’ny olona ka hoy izy ireo: Inona izao nataontsika izao no dia nandefa ny Israelita hiala tamin’ny fanompoany antsika isika? '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nasainy nomanina ny kalesy fitondrany miady sady nitondra ny vahoakany hanaraka azy izy. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nitondra kalesy fitondra miady voafantina eninjato sy ny kalesy fitondra miadin’ny Ejiptiana rehetra izy ka samy nisy manamboninahitra avy ireo. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary NY TOMPO nanamafy ny fon’i Farao, mpanjakan’i Ejipta, dia nanenjika ny Zanak’Israely izy, na dia tamin’ny fahafahana tanteraka aza no nivoahan’ireo. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Koa nanenjika azy ireo ny Ejiptiana, dia ny soavaly rehetra mitarika ny kalesin’i Farao sy ny mpitaingin-tsoavaliny ary ny miaramilany ka nahatratra azy nitoby teo amoron’ny ranomasina, teo anilan’i Py-Hahirota, tandrifin’i Baala-Zefona.
