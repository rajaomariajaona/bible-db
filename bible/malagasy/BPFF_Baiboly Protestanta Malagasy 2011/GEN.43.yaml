document_id: GEN.43
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Niainga ho any Ejipta niaraka tamin’ireo rahalahiny i Benjamina
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Mafy ny mosary teo amin’ny tany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Koa rehefa lanin’izy ireo ny vary izay nalainy tany Ejipta dia hoy ny rainy taminy: Mandehana indray, mividiana hanina kely ho antsika. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Fa hoy i Joda taminy hoe: Niteny mafy taminay Ralehilahy hoe: Tsy hahita ny tavako ianareo raha tsy miaraka aminareo ilay rahalahinareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Raha alefanao miaraka aminay ny rahalahinay dia hidina izahay ka hividy hanina ho anao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Fa raha tsy ampandehaninao izy dia tsy hidina izahay, satria hoy Ralehilahy taminay: Tsy hahita ny tavako ianareo raha tsy miaraka aminareo ilay rahalahinareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia hoy Israely: Nahoana no dia nampidi-doza tamiko ianareo ka nanambara tamin-dRalehilahy fa mbola nanana rahalahy koa ianareo? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Hoy izy ireo: Nanadihady mafy ny amin’ny tenanay sy ny mpianakavinay Ralehilahy ka niteny hoe: Mbola velona ihany va izay rainareo? Ary manana rahalahy hafa koa va ianareo? Dia nambaranay taminy araka izany teny izany. Moa nampoizinay akory va izay hitenenany hoe: Ento midina ny rahalahinareo?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary hoy i Joda tamin’Israely rainy: Ampandehano miaraka amiko ny zaza, dia hiainga izahay ka handeha, mba ho velona isika fa tsy ho faty, dia izahay sy ianao ary ny zanatsika madinika koa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Izaho no hiantoka azy; amin’ny tanako no handraisanao azy. Raha tsy tongako atỳ aminao ka hatolotro eto anatrehanao izy dia ho meloka aminao amin’ny andro rehetra hiainako aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Raha tsy nitaredretra izahay dia efa tafaverina fanindroany toy izay.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Dia hoy Israely rainy taminy: Raha izany ary no izy dia izao no ataovy: Makà amin’ny vokatra malaza amin’ny tany ka ataovy ao anatin’ny fitondranareo entana dia ento midina hatao fanomezana ho an-dRalehilahy, dia balisama kely sy tantely kely, ditin-kazo nekota sy lota ary pistasy sy amanda. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Mitondrà vola torak’ilay teo eny an-tananareo; ary ilay vola izay naverina teo am-bavan’ny lasakanareo dia ento miverina any indray; angamba fahadisoana izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ento ihany ny rahalahinareo dia miaingà ka miverena indray ho any amin-dRalehilahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Andriamanitra Tsitoha anie hampahita famindrampo anareo eo anatrehan-dRalehilahy mba hamerenany ny rahalahinareo iray sy i Benjamina. Ary izaho, rehefa tsy hanan-janaka, dia tsy hanan-janaka intsony!
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nanao fanasana ho an’ny rahalahiny i Josefa
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Dia noentin’ireo lehilahy ireo ny zavatra hatao fanomezana; vola indroa torak’ilay teo koa no noentin’izy ireo teny an-tanany, niaraka tamin’i Benjamina. Dia niainga izy ireo, nidina tany Ejipta ka tonga teo anatrehan’i Josefa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Raha nahita an’i Benjamina niaraka tamin’ireo rahalahiny i Josefa dia niteny tamin’ny mpikarakara ny tao an-tranony hoe: Ampidiro atsy an-trano ireo lehilahy ireo dia amonoy zavatra ary anamboary sakafo fa hiara-hisakafo amiko izy ireo amin’ny mitataovovonana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Nataon-dRalehilahy araka izay nandidian’i Josefa izany ka nampidiriny tao an-tranon’i Josefa izy ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary raiki-tahotra ireo lehilahy ireo satria nampidirina tao an-tranon’i Josefa ka hoy izy ireo: Noho ilay vola naverina tao anatin’ny lasakantsika fahiny izao no nampidirana antsika, hitadiavany hevitra ny hamelezany antsika ka hataony mpanompo isika ary halainy koa ny borikintsika. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Rehefa izany dia nanatona an-dRalehilahy izay mpikarakara ny tao an-tranon’i Josefa izy ireo ka niteny taminy teo am-baravaran’ny trano hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Azafady, tompokolahy: Nidina tatỳ hividy hanina tokoa izahay tamin’ny voalohany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Rehefa tonga teo amin’izay nandrianay izahay dia nosokafanay ny lasakanay dia indreo, ny volanay isan-dahy teo am-bavan’ny lasakanay avy, tsy nahabangana ny lanjan’ny volanay rehetra. Noentinay niverina etỳ an-tananay izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ary nitondra vola hafa koa eto an-tananay izahay hamidy hanina. Nefa tsy fantatray izay nampiditra ny volanay tao anatin’ny lasakanay.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary hoy Ralehilahy: Fiadanana ho anareo! Aza matahotra! Andriamanitrareo, dia Andriamanitry ny rainareo, no nanome anareo harena tao anatin’ny lasakanareo. Ny volanareo dia efa tonga atỳ amiko. Dia namoaka an’i Simeona ho eo aminy izy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Dia nampidirin-dRalehilahy tao an-tranon’i Josefa ireo olona ireo ka nomeny rano. Dia nisasa tongotra izy ireo ary nomeny hanina koa ny borikiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Dia nandamina ny zavatra hatao fanomezana izy ireo mandra-piavin’i Josefa amin’ny mitataovovonana, fa reny fa eo no hisakafoany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Rehefa tonga tao an-trano i Josefa dia natolotr’izy ireo ho azy ny fanomezana izay noentiny ho ao an-trano, ary niankohoka tamin’ny tany teo anatrehany izy rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ary nanontany ny fahasalamany i Josefa ka niteny hoe: Tsara ihany va ny rainareo, ilay lahiantitra, nolazainareo? Mbola velona ihany va izy? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Dia hoy izy ireo: Tsara ihany ny mpanomponao rainay; mbola velona ihany izy. Dia niondrika izy ireo ka niankohoka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ary nanopy ny masony i Josefa ka nahita an’i Benjamina rahalahiny, zanaky ny reniny, dia hoy izy: Io va no zandrinareo faralahy izay nolazainareo tamiko? Hoy ihany izy: Andriamanitra anie hanisy soa anao, anaka! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Dia niala haingana i Josefa fa nangorakoraka ny fony noho ny rahalahiny ka nitady toerana hitomaniany izy; dia niditra tao amin’ny efitrano iray izy dia nitomany tao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Avy eo, rehefa avy nanasa ny tarehiny izy, dia niala tao. Nanindry ny fangorakoraky ny fony izy ka niteny hoe: Arosoy ny sakafo! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Dia narosony mitokana ny ho an’i Josefa, mitokana ny ho an’ny rahalahiny ary mitokana koa ny ho an’ny Ejiptiana izay nisakafo teo aminy, satria ny Ejiptiana dia tsy mahazo miara-misakafo amin’ny Hebreo fa zava-maharikoriko amin’ny Ejiptiana izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Dia nipetraka teo anatrehan’i Josefa ireo rahalahiny, ny lahimatoa araka ny fizokiany ary ny faralahy araka ny maha zandriny azy. Dia samy talanjona ka nifampijerijery teo izy ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Ary samy nitondrana anjara sakafo teo anoloan’i Josefa avy izy mirahalahy; kanefa ny anjaran’i Benjamina dia indimin’ny anjaran’ny iray tamin’izy rehetra. Dia niara-nisotro sy nivoky divay teo aminy izy ireo.
