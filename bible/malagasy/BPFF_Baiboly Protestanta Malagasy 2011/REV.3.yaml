document_id: REV.3,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Epistily ho an’ny Fiangonana any Sardisy
  - type: text
    content: 'Ary soraty ho an’ny anjelin’ny Fiangonana any Sardisy:'
  - type: text
    content: 'Izao no lazain’Ilay manana ny Fanahy fiton’Andriamanitra sy ny kintana fito: Fantatro ny asanao, fa manana anarana ho velona ianao, kanjo maty. '
  '10':
  - type: text
    content: 'Satria efa nitandrina ny teniko ny amin’ny faharetana ianao, Izaho kosa hiaro anao ho voavonjy amin’ny andron’ny fakam-panahy izay efa hihatra amin’izao tontolo izao ho fizahan-toetra izay monina ambonin’ny tany. '
  '11':
  - type: text
    content: Ho avy haingana Aho. Tano mafy izay anananao mba tsy hisy haka ny satroboninahitrao.
  '12':
  - type: text
    content: Izay mandresy dia hataoko andry eo amin’ny tempolin’Andriamanitro ary tsy hiala tao intsony izy. Hosoratako eo aminy ny anaran’Andriamanitro sy ny anaran’ny tanànan’Andriamanitro, dia i Jerosalema vaovao izay midina avy any an-danitra avy amin’Andriamanitro, ary ilay anarako vaovao.
  '13':
  - type: text
    content: Izay manan-tsofina, aoka izy hihaino izay lazain’ny Fanahy amin’ny Fiangonana rehetra.
  - type: heading
    content: Epistily ho an’ny Fiangonana any Laodikia
  '14':
  - type: text
    content: 'Ary soraty ho amin’ny anjelin’ny Fiangonana any Laodikia:'
  - type: text
    content: 'Izao no lazain’ny '
  - type: text
    content: Amena
  - type: text
    content: ', dia Ilay Vavolombelona mahatoky sy marina izay niandohan’izao zavatra noharin’Andriamanitra izao: '
  '15':
  - type: text
    content: 'Fantatro ny asanao, fa tsy mangatsiaka na mafana ianao. Aleo mangatsiaka na mafana ianao! '
  '16':
  - type: text
    content: 'Fa satria matimaty ianao ka tsy mafana na mangatsiaka dia mila haloan’ny vavako ianao. '
  '17':
  - type: text
    content: 'Fa hoy ianao: Manankarena sady nihary fananana be aho ka tsy misy na inona na inona mahory ahy, kanjo tsy fantatrao fa ianao no ilay ory, mahantra, malahelo, jamba ary mitanjaka; '
  '18':
  - type: text
    content: 'koa manoro hevitra anao Aho hividy Amiko volamena voadio tamin’ny afo mba hanankarena ianao, ary fitafiana fotsy hotafinao mba tsy hisehoan’ny henatrao noho ny fitanjahana, ary ody maso hahosotrao ny masonao mba hahiratanao. '
  '19':
  - type: text
    content: 'Izay rehetra tiako no anariko sy faiziko; koa mazotoa ianao ka mibebaha! '
  '2':
  - type: text
    content: 'Miambena ka aoreno tsara ny zavatra sisa izay mila ho faty; fa tsy nisy hitako tanteraka ny asanao eo anatrehan’Andriamanitro. '
  '20':
  - type: text
    content: Indro, mitsangana eo am-baravarana Aho ka mandondòna. Raha misy mihaino ny feoko ka mamoha ny varavarana dia hiditra ao aminy Aho ka hiara-misakafo aminy, ary izy Amiko.
  '21':
  - type: text
    content: Izay mandresy dia havelako hiara-mipetraka Amiko eo ambonin’ny sezafiandrianako, tahaka ny nandreseko sy ny niarahako nipetraka amin’ny Raiko eo ambonin’ny sezafiandrianany.
  '22':
  - type: text
    content: Izay manan-tsofina, aoka izy hihaino izay lazain’ny Fanahy amin’ny Fiangonana rehetra!
  '3':
  - type: text
    content: 'Dia tsarovy ny amin’ny nandraisanao sy ny nandrenesanao, ary tano mafy ka mibebaha. Fa raha tsy miambina ianao dia ho avy toy ny mpangalatra Aho ka tsy ho fantatrao izay ora hiaviako aminao. '
  '4':
  - type: text
    content: Kanefa misy olona vitsy atỳ aminao atỳ Sardisy izay tsy nandoto ny fitafiany; hiara-mandeha amiko mitafy lamba fotsy ireo satria mendrika izy.
  '5':
  - type: text
    content: Izay mandresy dia hitafy lamba fotsy tahaka ireo koa ary tsy hamono velively ny anarany eo amin’ny bokin’ny fiainana Aho fa hanaiky ny anarany eo anatrehan’ny Raiko sy eo anatrehan’ny anjeliny.
  '6':
  - type: text
    content: Izay manan-tsofina, aoka izy hihaino izay lazain’ny Fanahy amin’ny Fiangonana rehetra!
  - type: heading
    content: Epistily ho an’ny Fiangonana any Filadelfia
  '7':
  - type: text
    content: 'Ary soraty ho amin’ny anjelin’ny Fiangonana any Filadelfia:'
  - type: text
    content: 'Izao no lazain’Izay masina, Izay marina, Izay manana ny fanalahidin’i Davida, Izay mamoha ka tsy hisy hanidy ary manidy ka tsy misy mamoha: '
  '8':
  - type: text
    content: 'Fantatro ny asanao; indro, efa nasiako varavarana mivoha eo anatrehanao ka tsy misy maharindrina azy; fa na dia kely aza ny herinao dia nitandrina ny teniko ianao ary tsy mba nandà ny anarako. '
  '9':
  - type: text
    content: 'Indro, alaiko ny sasany amin’ny sinagogan’i Satana, izay milaza ny tenany ho '
  - type: text
    content: Jiosy
  - type: text
    content: ', kanjo tsy izy fa mandainga. Indro, hataoko tonga hiankohoka eo anoloan’ny tongotrao ireo ka ho fantany fa Izaho dia tia anao. '
