document_id: REV.3,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Epistily ho an’ny Fiangonana any Sardisy
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary soraty ho an’ny anjelin’ny Fiangonana any Sardisy:'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao no lazain’Ilay manana ny Fanahy fiton’Andriamanitra sy ny kintana fito: Fantatro ny asanao, fa manana anarana ho velona ianao, kanjo maty. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Satria efa nitandrina ny teniko ny amin’ny faharetana ianao, Izaho kosa hiaro anao ho voavonjy amin’ny andron’ny fakam-panahy izay efa hihatra amin’izao tontolo izao ho fizahan-toetra izay monina ambonin’ny tany. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ho avy haingana Aho. Tano mafy izay anananao mba tsy hisy haka ny satroboninahitrao.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izay mandresy dia hataoko andry eo amin’ny tempolin’Andriamanitro ary tsy hiala tao intsony izy. Hosoratako eo aminy ny anaran’Andriamanitro sy ny anaran’ny tanànan’Andriamanitro, dia i Jerosalema vaovao izay midina avy any an-danitra avy amin’Andriamanitro, ary ilay anarako vaovao.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izay manan-tsofina, aoka izy hihaino izay lazain’ny Fanahy amin’ny Fiangonana rehetra.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Epistily ho an’ny Fiangonana any Laodikia
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary soraty ho amin’ny anjelin’ny Fiangonana any Laodikia:'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao no lazain’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Amena
    - type: text
      text: ', dia Ilay Vavolombelona mahatoky sy marina izay niandohan’izao zavatra noharin’Andriamanitra izao: '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fantatro ny asanao, fa tsy mangatsiaka na mafana ianao. Aleo mangatsiaka na mafana ianao! '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa satria matimaty ianao ka tsy mafana na mangatsiaka dia mila haloan’ny vavako ianao. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy ianao: Manankarena sady nihary fananana be aho ka tsy misy na inona na inona mahory ahy, kanjo tsy fantatrao fa ianao no ilay ory, mahantra, malahelo, jamba ary mitanjaka; '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'koa manoro hevitra anao Aho hividy Amiko volamena voadio tamin’ny afo mba hanankarena ianao, ary fitafiana fotsy hotafinao mba tsy hisehoan’ny henatrao noho ny fitanjahana, ary ody maso hahosotrao ny masonao mba hahiratanao. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izay rehetra tiako no anariko sy faiziko; koa mazotoa ianao ka mibebaha! '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Miambena ka aoreno tsara ny zavatra sisa izay mila ho faty; fa tsy nisy hitako tanteraka ny asanao eo anatrehan’Andriamanitro. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Indro, mitsangana eo am-baravarana Aho ka mandondòna. Raha misy mihaino ny feoko ka mamoha ny varavarana dia hiditra ao aminy Aho ka hiara-misakafo aminy, ary izy Amiko.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izay mandresy dia havelako hiara-mipetraka Amiko eo ambonin’ny sezafiandrianako, tahaka ny nandreseko sy ny niarahako nipetraka amin’ny Raiko eo ambonin’ny sezafiandrianany.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izay manan-tsofina, aoka izy hihaino izay lazain’ny Fanahy amin’ny Fiangonana rehetra!
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia tsarovy ny amin’ny nandraisanao sy ny nandrenesanao, ary tano mafy ka mibebaha. Fa raha tsy miambina ianao dia ho avy toy ny mpangalatra Aho ka tsy ho fantatrao izay ora hiaviako aminao. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Kanefa misy olona vitsy atỳ aminao atỳ Sardisy izay tsy nandoto ny fitafiany; hiara-mandeha amiko mitafy lamba fotsy ireo satria mendrika izy.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izay mandresy dia hitafy lamba fotsy tahaka ireo koa ary tsy hamono velively ny anarany eo amin’ny bokin’ny fiainana Aho fa hanaiky ny anarany eo anatrehan’ny Raiko sy eo anatrehan’ny anjeliny.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izay manan-tsofina, aoka izy hihaino izay lazain’ny Fanahy amin’ny Fiangonana rehetra!
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Epistily ho an’ny Fiangonana any Filadelfia
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary soraty ho amin’ny anjelin’ny Fiangonana any Filadelfia:'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao no lazain’Izay masina, Izay marina, Izay manana ny fanalahidin’i Davida, Izay mamoha ka tsy hisy hanidy ary manidy ka tsy misy mamoha: '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fantatro ny asanao; indro, efa nasiako varavarana mivoha eo anatrehanao ka tsy misy maharindrina azy; fa na dia kely aza ny herinao dia nitandrina ny teniko ianao ary tsy mba nandà ny anarako. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Indro, alaiko ny sasany amin’ny sinagogan’i Satana, izay milaza ny tenany ho '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jiosy
    - type: text
      text: ', kanjo tsy izy fa mandainga. Indro, hataoko tonga hiankohoka eo anoloan’ny tongotrao ireo ka ho fantany fa Izaho dia tia anao. '
