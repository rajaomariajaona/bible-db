document_id: EZK.27,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fitomaniana noho ny naharava an’i Tiro
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tonga tamiko ny tenin’NY TOMPO hoe:'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny avy any Persia sy Loda ary Pota
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia isan’ny miaramila mpiadinao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nanantona ampinga sy fiarovan-doha teny aminao ireo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka nahatsara tarehy anao.
  '11':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Ny terak’i Arvada sy ny miaramilanao no teny ambonin’ny mandanao manodidina, ary lehilahy avy any Gamada no teny amin’ny tilikambo fiambenanao; ny ampingany dia nahantony teny amin’ny mandanao manodidina; ireny no nahatonga ny hatsaran-tarehinao ho tonga lafatra.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: I Tiro, renivohitry ny varotra
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I Tarsisy dia nifampivarotra taminao noho ny haben’ny harena samihafa tao aminao. Volafotsy, vy, firapotsy ary firaka no noentiny natakalo ny entanao. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I Javana sy i Tobala ary i Maseka dia nifampivarotra taminao, koa olona sy fanaka varahina no natakalony ny varotrao. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny terak’i Togarma no nitondra soavaly sy soavaly fitaingina ary ampondra natakalo ny entanao. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny terak’i Dedana dia nifampivarotra taminao; ny varotra avy amin’ny nosy marobe dia nandalo teto aminao ka vangy ivoara sy hazomainty no natakalo ny entanao. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I Arama dia nifampivarotra taminao noho ny habetsahan’ny taozavatrao ka karbonkolo, lamba volomparasy, tenona samihafa soratra, rongony fotsy madinika, voahangy ary robisy no noentiny natakalo ny entanao. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I Joda sy ny tanin’ny Israely dia nifampivarotra taminao ka varimbazaha avy tany Minita, mofomamy, tantely, diloilo ary balisama no natakalony ny varotrao. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I Damaskosy dia nifampivarotra taminao noho ny habetsahan’ny taozavatrao, ny haben’ny harenanao rehetra, ka nitondra divay avy any Helbona sy volon’ondry fotsy izy. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I Vedana koa sy i Javana dia nitondra vy voatefy avy any Ozala, kasia ary veromanitra ho takalon’ny varotrao. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ianao, ry '
    - type: usfm
      marker: w
      children:
      - type: text
        text: zanak’olona
    - type: text
      text: ', manaova hira fisaonana ny amin’i Tiro '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I Dedana dia nifampivarotra taminao, nitondra lamba fanao lamban-tsoavaly. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I Arabia sy ireo andriandahin’i Kedara rehetra dia nifampivarotra taminao ka zanak’ondry sy ondrilahy ary osilahy no noentiny natao varotra tao aminao. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny mpivaro-mandeha avy any Sheba sy Rama dia nifampivarotra taminao ka zavamanitra tsara indrindra sy vatosoa samihafa karazana ary volamena no noentiny natakalo ny entanao. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I Harana sy i Kane ary i Edena sy ny mpivaro-mandeha avy any Sheba sy Asiria ary Kilmada no nifampivarotra taminao. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ireo no mpivaro-mandeha nifampivarotra taminao nitondra ny fitafiana marevaka rehetra: Akanjobe fanao ivelany manga sy samihafa soratra, tady voarandrana mafy, fitafiana soa, izany no ao amin’ny tsenanao. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny sambon’i Tarsisy no mpitondra ny entanao.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Tohin’ny fitomaniana ny amin’i Tiro
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tao amin’ny fahafenoana sy voninahitra be ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tany afovoan’ny ranomasina.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Noentin’ny mpivoinao teny amin’ny ranobe ianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia nahavaky anao tao amin’ny ranomasina ny rivotra avy any atsinanana.
  '27':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Ny harenanao, ny entam-barotrao, ny entana notaterinao, ny tantsambonao, ny mpitondra sambonao, ny mpanentsin-tsambonao, ny mpividy ny entanao ary ny miaramilanao rehetra izay tao aminao mbamin’ny olona betsaka tafangona tao aminao dia nilentika tao amin’ny ranomasina tamin’ny andro nandravana anao.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Noho ny fidradradradran’ny mpitondra sambonao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia mihorohoro ny tany manodidina;
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: samy midina miala amin’ny sambony ny mpivoy rehetra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny tantsambo ary ny mpitondra sambo rehetra eny an-dranomasina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka mijanona eny an-tanety;
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ka teneno aminy hoe: E, ry ilay monina amin’ny vava-ranomasina, mpivaro-mandeha ho an’ny firenena, ho any amin’ny nosy maro samihafa: Izao no lazain’NY TOMPO Andriamanitra:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'E, ry Tiro, ianao no efa niteny hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izaho dia tena tsara tarehy!
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: manandratra ny feony noho ny nanjo anao izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka midradradradra mafy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady manopy vovoka hiraraka amin’ny lohany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mihosinkosin-davenona;
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nosolaina avokoa izy noho ny aminao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy misikina lamba fisaonana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mitomany anao amin’ny fangidiam-panahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy fisaonana mafy.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary raha midradradradra izy dia manao hira fisaonana ny aminao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ka mitomany anao hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Iza no tahaka an’i Tiro,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia tahaka ilay mangina ao ampovoan’ny ranomasina?
  '33':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Raha nivoaka avy amin’ny ranomasina ny entam-barotrao dia nahatretrika firenena maro ianao; tamin’ny haben’ny harenanao sy ny entana notaterinao dia nampanankarena ny mpanjakan’ny tany ianao.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tamin’ny andro nandravan’ny ranomasina anao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho any amin’ny rano lalina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia niara-nilentika taminao ny entana notaterinao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny olona tafangona tao aminao.
  '35':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Talanjona ny mponina rehetra amin’ny moron-dranomasina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: noho ny aminao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary raiki-tahotra ny mpanjakany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka mivalomainty.
  '36':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Misiotsioka ny mpivaro-mandeha amin’ny firenena
  - type: usfm
    marker: q1
    children:
    - type: text
      text: noho ny aminao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tonga zava-mahatahotra ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy hisy intsony mandrakizay!
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ao afovoan’ny ranomasina ny taninao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay nandrafitra anao dia nanao ny hatsaran-tarehinao ho tonga lafatra.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hazo kipreso avy any Senira no nanaovany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny lampihazonao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sedera avy any Libanona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no nalainy hatao andrin-tsambonao;
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: oaka avy any Basana no nanaovany ny fivoinao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hazo bokso avy any amin’ny moron-dranomasin’i Kitima
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no nataony fipetrahana ho an’ny mpivoinao sady nasiany gorodona ivoara.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lamba rongony madinika samihafa soratra avy any Ejipta
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no nataonao lay mba ho faneva;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: lamba manga sy volomparasy avy any amin’ny moron-dranomasin’i Elisaha
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no eloelonao.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny mponina any Sidona sy Arvada
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no mpivoinao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny olon-kendrinao tao aminao, ry Tiro,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ireo mpitondra sambonao.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny zokiolon’i Gebala sy izay hendry tany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no mpanentsin-tsambonao tao aminao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny sambo rehetra teny amin’ny ranomasina mbamin’ny tantsambony dia tonga tao aminao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hanakalo ny entam-barotrao.
