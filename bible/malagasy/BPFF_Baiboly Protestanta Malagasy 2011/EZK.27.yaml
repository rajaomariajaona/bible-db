document_id: EZK.27,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Fitomaniana noho ny naharava an’i Tiro
  - type: text
    content: 'Tonga tamiko ny tenin’NY TOMPO hoe:'
  '10':
  - type: text
    content: Ny avy any Persia sy Loda ary Pota
  - type: text
    content: dia isan’ny miaramila mpiadinao;
  - type: text
    content: nanantona ampinga sy fiarovan-doha teny aminao ireo
  - type: text
    content: ka nahatsara tarehy anao.
  '11':
  - type: text
    content: Ny terak’i Arvada sy ny miaramilanao no teny ambonin’ny mandanao manodidina, ary lehilahy avy any Gamada no teny amin’ny tilikambo fiambenanao; ny ampingany dia nahantony teny amin’ny mandanao manodidina; ireny no nahatonga ny hatsaran-tarehinao ho tonga lafatra.
  - type: heading
    content: I Tiro, renivohitry ny varotra
  '12':
  - type: text
    content: 'I Tarsisy dia nifampivarotra taminao noho ny haben’ny harena samihafa tao aminao. Volafotsy, vy, firapotsy ary firaka no noentiny natakalo ny entanao. '
  '13':
  - type: text
    content: 'I Javana sy i Tobala ary i Maseka dia nifampivarotra taminao, koa olona sy fanaka varahina no natakalony ny varotrao. '
  '14':
  - type: text
    content: 'Ny terak’i Togarma no nitondra soavaly sy soavaly fitaingina ary ampondra natakalo ny entanao. '
  '15':
  - type: text
    content: 'Ny terak’i Dedana dia nifampivarotra taminao; ny varotra avy amin’ny nosy marobe dia nandalo teto aminao ka vangy ivoara sy hazomainty no natakalo ny entanao. '
  '16':
  - type: text
    content: 'I Arama dia nifampivarotra taminao noho ny habetsahan’ny taozavatrao ka karbonkolo, lamba volomparasy, tenona samihafa soratra, rongony fotsy madinika, voahangy ary robisy no noentiny natakalo ny entanao. '
  '17':
  - type: text
    content: 'I Joda sy ny tanin’ny Israely dia nifampivarotra taminao ka varimbazaha avy tany Minita, mofomamy, tantely, diloilo ary balisama no natakalony ny varotrao. '
  '18':
  - type: text
    content: 'I Damaskosy dia nifampivarotra taminao noho ny habetsahan’ny taozavatrao, ny haben’ny harenanao rehetra, ka nitondra divay avy any Helbona sy volon’ondry fotsy izy. '
  '19':
  - type: text
    content: 'I Vedana koa sy i Javana dia nitondra vy voatefy avy any Ozala, kasia ary veromanitra ho takalon’ny varotrao. '
  '2':
  - type: text
    content: 'Ianao, ry '
  - type: text
    content: zanak’olona
  - type: text
    content: ', manaova hira fisaonana ny amin’i Tiro '
  '20':
  - type: text
    content: 'I Dedana dia nifampivarotra taminao, nitondra lamba fanao lamban-tsoavaly. '
  '21':
  - type: text
    content: 'I Arabia sy ireo andriandahin’i Kedara rehetra dia nifampivarotra taminao ka zanak’ondry sy ondrilahy ary osilahy no noentiny natao varotra tao aminao. '
  '22':
  - type: text
    content: 'Ny mpivaro-mandeha avy any Sheba sy Rama dia nifampivarotra taminao ka zavamanitra tsara indrindra sy vatosoa samihafa karazana ary volamena no noentiny natakalo ny entanao. '
  '23':
  - type: text
    content: 'I Harana sy i Kane ary i Edena sy ny mpivaro-mandeha avy any Sheba sy Asiria ary Kilmada no nifampivarotra taminao. '
  '24':
  - type: text
    content: 'Ireo no mpivaro-mandeha nifampivarotra taminao nitondra ny fitafiana marevaka rehetra: Akanjobe fanao ivelany manga sy samihafa soratra, tady voarandrana mafy, fitafiana soa, izany no ao amin’ny tsenanao. '
  '25':
  - type: text
    content: Ny sambon’i Tarsisy no mpitondra ny entanao.
  - type: heading
    content: Tohin’ny fitomaniana ny amin’i Tiro
  - type: text
    content: Tao amin’ny fahafenoana sy voninahitra be ianao
  - type: text
    content: tany afovoan’ny ranomasina.
  '26':
  - type: text
    content: Noentin’ny mpivoinao teny amin’ny ranobe ianao,
  - type: text
    content: dia nahavaky anao tao amin’ny ranomasina ny rivotra avy any atsinanana.
  '27':
  - type: text
    content: Ny harenanao, ny entam-barotrao, ny entana notaterinao, ny tantsambonao, ny mpitondra sambonao, ny mpanentsin-tsambonao, ny mpividy ny entanao ary ny miaramilanao rehetra izay tao aminao mbamin’ny olona betsaka tafangona tao aminao dia nilentika tao amin’ny ranomasina tamin’ny andro nandravana anao.
  '28':
  - type: text
    content: Noho ny fidradradradran’ny mpitondra sambonao
  - type: text
    content: dia mihorohoro ny tany manodidina;
  '29':
  - type: text
    content: samy midina miala amin’ny sambony ny mpivoy rehetra,
  - type: text
    content: ny tantsambo ary ny mpitondra sambo rehetra eny an-dranomasina
  - type: text
    content: ka mijanona eny an-tanety;
  '3':
  - type: text
    content: 'ka teneno aminy hoe: E, ry ilay monina amin’ny vava-ranomasina, mpivaro-mandeha ho an’ny firenena, ho any amin’ny nosy maro samihafa: Izao no lazain’NY TOMPO Andriamanitra:'
  - type: text
    content: 'E, ry Tiro, ianao no efa niteny hoe:'
  - type: text
    content: Izaho dia tena tsara tarehy!
  '30':
  - type: text
    content: manandratra ny feony noho ny nanjo anao izy
  - type: text
    content: ka midradradradra mafy
  - type: text
    content: sady manopy vovoka hiraraka amin’ny lohany
  - type: text
    content: ary mihosinkosin-davenona;
  '31':
  - type: text
    content: nosolaina avokoa izy noho ny aminao
  - type: text
    content: sy misikina lamba fisaonana,
  - type: text
    content: mitomany anao amin’ny fangidiam-panahy
  - type: text
    content: sy fisaonana mafy.
  '32':
  - type: text
    content: Ary raha midradradradra izy dia manao hira fisaonana ny aminao
  - type: text
    content: 'ka mitomany anao hoe:'
  - type: text
    content: Iza no tahaka an’i Tiro,
  - type: text
    content: dia tahaka ilay mangina ao ampovoan’ny ranomasina?
  '33':
  - type: text
    content: Raha nivoaka avy amin’ny ranomasina ny entam-barotrao dia nahatretrika firenena maro ianao; tamin’ny haben’ny harenanao sy ny entana notaterinao dia nampanankarena ny mpanjakan’ny tany ianao.
  '34':
  - type: text
    content: Tamin’ny andro nandravan’ny ranomasina anao
  - type: text
    content: ho any amin’ny rano lalina
  - type: text
    content: dia niara-nilentika taminao ny entana notaterinao
  - type: text
    content: sy ny olona tafangona tao aminao.
  '35':
  - type: text
    content: Talanjona ny mponina rehetra amin’ny moron-dranomasina
  - type: text
    content: noho ny aminao,
  - type: text
    content: ary raiki-tahotra ny mpanjakany
  - type: text
    content: ka mivalomainty.
  '36':
  - type: text
    content: Misiotsioka ny mpivaro-mandeha amin’ny firenena
  - type: text
    content: noho ny aminao;
  - type: text
    content: tonga zava-mahatahotra ianao
  - type: text
    content: ary tsy hisy intsony mandrakizay!
  '4':
  - type: text
    content: Ao afovoan’ny ranomasina ny taninao;
  - type: text
    content: izay nandrafitra anao dia nanao ny hatsaran-tarehinao ho tonga lafatra.
  '5':
  - type: text
    content: Hazo kipreso avy any Senira no nanaovany
  - type: text
    content: ny lampihazonao;
  - type: text
    content: sedera avy any Libanona
  - type: text
    content: no nalainy hatao andrin-tsambonao;
  '6':
  - type: text
    content: oaka avy any Basana no nanaovany ny fivoinao;
  - type: text
    content: hazo bokso avy any amin’ny moron-dranomasin’i Kitima
  - type: text
    content: no nataony fipetrahana ho an’ny mpivoinao sady nasiany gorodona ivoara.
  '7':
  - type: text
    content: Lamba rongony madinika samihafa soratra avy any Ejipta
  - type: text
    content: no nataonao lay mba ho faneva;
  - type: text
    content: lamba manga sy volomparasy avy any amin’ny moron-dranomasin’i Elisaha
  - type: text
    content: no eloelonao.
  '8':
  - type: text
    content: Ny mponina any Sidona sy Arvada
  - type: text
    content: no mpivoinao;
  - type: text
    content: ny olon-kendrinao tao aminao, ry Tiro,
  - type: text
    content: dia ireo mpitondra sambonao.
  '9':
  - type: text
    content: Ny zokiolon’i Gebala sy izay hendry tany
  - type: text
    content: no mpanentsin-tsambonao tao aminao;
  - type: text
    content: ny sambo rehetra teny amin’ny ranomasina mbamin’ny tantsambony dia tonga tao aminao
  - type: text
    content: hanakalo ny entam-barotrao.
