verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny amin’ny fanokanana ny mpisorona
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary izao no zavatra hataonao amin’izy ireo mba hanamasinana azy hanao fisoronana ho Ahy: Makà vantotra ombilahy iray sy ondrilahy roa tsy misy kilema, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary asaivo entina ho eo anoloan’ny tranolay fihaonana ny vantotra ombilahy; ary aoka i Arona sy ireo zanany hametraka ny tanany amin’ny lohan’ny vantotra ombilahy; '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia vonoy eo anatrehan’NY TOMPO ny vantotra ombilahy, eo anoloan’ny varavaran’ny tranolay fihaonana; '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary analao ny ran’ity vantotra ombilahy ity dia ahosory eo amin’ireo '
    - type: usfm
      marker: w
      children:
      - type: text
        text: tandroky
    - type: text
      text: ' ny alitara amin’ny fanondronao, ary ny ra sisa rehetra kosa dia araraho eo am-pototry ny alitara; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia alao ny jabora mandrakotra ny taovany rehetra sy ny ila atiny lehibe ary ny voany roa mbamin’ny fonom-boany ka doroy eo ambonin’ny alitara ireo ho fofona; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: fa ny henan’ny vantotra ombilahy sy ny hodiny ary ny tain-drorohany kosa dia doroy amin’ny afo eny ivelan’ny toby ho fanatitra noho ny ota.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alao indray ny ondrilahy iray ka aoka i Arona sy ireo zanany hametraka ny tanany amin’ny lohan’ny ondrilahy; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia vonoy izy ka tantazo ny rany dia afafazo manodidina amin’ny lafin’ny alitara; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary teteho tsara ny ondrilahy dia sasao ny taovany sy ny tongony ka ataovy eo ambonin’ireo voatetika miaraka amin’ny lohany; '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ary doroy ho fofona eo ambonin’ny alitara ilay ondrilahy manontolo ho fanatitra dorana manontolo ho an’NY TOMPO, dia hanitra ankasitrahana, fanatitra levonina amin’ny afo ho an’NY TOMPO.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mbola makà ondrilahy hafa koa; ary aoka hametraka ny tanany amin’ny lohan’io ondrilahy io i Arona sy ireo zanany; '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'mofo tsy misy masirasira sy mofo tsy misy masirasira voaharo diloilo ary mofo manify tsy misy masirasira sady voahosotra diloilo; kobam-barimbazaha tsara toto no hanamboarana ireo. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'vonoy ny ondrilahy ka analao ny rany, dia ahosory amin’ny tendron’ny ravin-tsofina havanan’i Arona sy amin’ny tendron’ny ravin-tsofina havanan’ireo zanany, ary amin’ny ankiben-tanany havanana sy amin’ny ankiben-tongony havanana; ny ra sisa kosa dia afafazo manodidina amin’ny lafin’ny alitara rehetra. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary analao ny ra izay eo ambonin’ny alitara sy ny diloilo fanosorana ka afafazo amin’i Arona sy amin’ny fitafiany ary amin’ireo zanany sy amin’ny fitafian’ireo zanany koa; dia ho masina izy sy ny fitafiany ary ireo zanany sy ny fitafian’ireo zanany koa. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alao indray ny jaboran’ny ondrilahy sy ny hofany ary ny jabora mandrakotra ny taovany sy ny ila atiny lehibe sy ny voany roa mbamin’ny jabora mandrakotra azy ary ny feny havanana, fa ondrilahy fanokanana io; '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary makà mofo iray, dia mofo iray voaisy diloilo, mofo manify iray izay eo amin’ny harona misy ny mofo tsy misy masirasira, izay eo anatrehan’NY TOMPO; '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary ataovy eo an-tanan’i Arona sy eo an-tanan’ireo zanany izy rehetra ka ataovy fanatitra asandratra eo anatrehan’NY TOMPO ireo. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia raiso avy amin’ny tanany ireo avy eo ka doroy hanome fofona eo ambonin’ny alitara, miaraka amin’ny fanatitra dorana manontolo, ho hanitra ankasitrahana eo anatrehan’NY TOMPO, dia fanatitra levonina amin’ny afo ho an’NY TOMPO. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alao indray ny tratran’ny ondrilahy fanokanana an’i Arona ka ataovy fanatitra asandratra eo anatrehan’NY TOMPO; dia izay no ho anjaranao. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hamasino ny tratran’ny fanatitra asandratra sy ny feny izay nalaina avy tamin’ny fanatitra, dia izay nasandratra sy izay nalaina avy tamin’ny ondrilahy fanokanana, dia izay ho an’i Arona sy izay ho an’ny zanany. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ho anjara mandrakizay ho an’i Arona sy ho an’ny taranany avy amin’ny Zanak’Israely izany, fa anjara fanomezana; ary hisy anjara fanomezana ho an’NY TOMPO, haterin’ny Zanak’Israely avy amin’ny fanati-pihavanany rehetra.
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny fitafiana masina izay an’i Arona dia ho an’ireo zanany mandimby azy koa hanosorana azy sy hanokanana azy. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ataovy ao anaty harona iray ireny ka ento amin’io harona io; ary ny vantotra ombilahy sy ny ondrilahy roa dia ento koa. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Hiakanjo azy hafitoana izay iray amin’ny zanany ho mpisorona handimby azy, dia izay miditra ao amin’ny tranolay fihaonana hanao fanompoam-pivavahana ao amin’ny fitoerana masina.
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alao avy eo ny ondrilahy fanokanana ka ahandroy eo amin’ny fitoerana masina iray ny henany. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hohanin’i Arona sy ireo zanany eo anoloan’ny varavaran’ny tranolay fihaonana ny henan’ny ondrilahy sy ny mofo izay ao anatin’ny harona. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izy ireo no hihinana ireo zavatra ireo, izay nanaovana fanavotana ho azy, mba hanokanana sy hanamasinana azy; fa tsy mba hihinana ny vahiny satria masina ireo. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary raha misy sisa tsy lany amin’ny henan’ny fanatitra fanokanana, na amin’ny mofo, ka tra-maraina, dia hodoranao amin’ny afo ny sisa tsy lany fa tsy hohanina satria masina.
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia manaova izany amin’i Arona sy ireo zanany, araka izay rehetra nandidiako anao; hafitoana no hanokananao azy ireo. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary vantotra ombilahy iray no haterinao isanandro ho fanatitra noho ny ota, hanaovana fanavotana; ary diovy ny alitara amin’ny fanaovanao fanavotana ho azy; dia hosory koa izy hanamasinana azy. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Hafitoana no hanaovanao fanavotana ho an’ny alitara sy hanamasinanao azy; dia ho masina indrindra ny alitara ary ho masina izay rehetra mikasika azy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fanatitra isanandro
    marker-yv: yv-h
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary izao no hatolotrao eo ambonin’ny alitara: Zanak’ondry izay herintaona, roa isanandro isanandro, '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'koa ny zanak’ondry iray dia hatolotrao amin’ny maraina ary ny zanak’ondry iray kosa dia hatolotrao amin’ny hariva; '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ento kosa i Arona sy ny zanany hankeo amin’ny varavaran’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: tranolay fihaonana
    - type: text
      text: ' ka ampandroy amin’ny rano. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'miampy koba tsara toto ampahafolon’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: efaha
    - type: text
      text: ', voaharo amin’ny diloilo nofiazana ampahefatry ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: hina
    - type: text
      text: ', sy divay ampahefatry ny hina, ho fanatitra aidina miaraka amin’ilay zanak’ondry iray. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ny zanak’ondry faharoa kosa dia hatolotrao amin’ny hariva. Fanatitra avy amin’ny zavamaniry sy fanatitra aidina tahaka ny natao tamin’ny fanatitra maraina no hampiarahinao aminy, ho hanitra ankasitrahana, dia fanatitra levonina amin’ny afo ho an’NY TOMPO.
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ho fanatitra mandrakariva, dorana manontolo izany, hatramin’ny taranakareo fara aman-dimby, eo anoloan’ny varavaran’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: tranolay fihaonana
    - type: text
      text: ' eo anatrehan’NY TOMPO, dia ao amin’izay hihaonako aminareo, hitenenako aminao. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hihaona amin’ny Zanak’Israely ao Aho ka hohamasinin’ny voninahitro izy. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary hohamasiniko ny tranolay fihaonana sy ny alitara; ary hohamasiniko koa i Arona sy ireo zanany mba hanao fisoronana ho Ahy.
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Honina eo amin’ny Zanak’Israely Aho ka ho Andriamaniny. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ho fantany fa Izaho no TOMPO Andriamaniny izay nitondra azy nivoaka avy tany amin’ny tany Ejipta, mba honenako eo aminy; Izaho no TOMPO Andriamaniny.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia ento ireo fitafiana ka ampiakanjoy an’i Arona ny akanjo lava sy ny akanjobe misy ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: efoda
    - type: text
      text: ' ary ny efoda sy ny saron-tratra, ary afehezo azy ny fehikibo momba ny efoda; '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary ataovy eo amin’ny lohany ny fehiloha ary apetraho eo amin’ny fehiloha ny diadema masina. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary alao ny diloilo fanosorana ka andraraho amin’ny lohany dia hosory izy.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ento koa ireo zanany ka ampiakanjoy akanjo lava. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Afehezo azy ireo ny fehikibo, dia amin’i Arona sy ireo zanany; asatrohy azy ireo koa ny satroka boribory; fa ho azy ireo ny fisoronana; ho lalàna maharitra izany. Dia toy izany no hanokananao an’i Arona sy ireo zanany.
