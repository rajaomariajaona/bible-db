document_id: MRK.5,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nanasitranan’i Jesosy demoniaka iray
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mat 8.28-34; Lio 8.26-39
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ary tonga teny ampitan’ny ranomasina tao amin’ny tanin’ny Geraseniana izy ireo. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Ary nifona mafy Taminy izy mba tsy horoahiny hiala amin’izany faritany izany.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ary nisy andian-kisoa maro, izay niraoka ahitra teny akaikin’ny tendrombohitra. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Ary nifona Taminy ireo fanahy maloto ka niteny hoe: Alefaso izahay ho eny amin’iretsy kisoa iretsy mba hiditra any anatiny. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Dia neken’i Jesosy izany. Ary ny fanahy maloto, rehefa niala tamin’ilay lehilahy, dia niditra tao anatin’ireo kisoa; ary ilay andian-kisoa, izay tokony ho roa arivo ny isany, dia nitratrevatreva teny amin’ny hantsana nankany amin’ny ranomasina ka maty sempotra tany anatin’ny ranomasina ireo.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Ary ny mpiandry azy ireo dia nandositra ka nilaza ny zava-nitranga tao an-tanàna sy tany an-tsaha. Dia tonga ny olona mba hizaha izany zavatra izany; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'ary tonga tany amin’i Jesosy izy ireo ka nandinika ilay demoniaka, izay nisy ny legiona, fa indro izy efa nipetraka sy niakanjo sady ary saina; dia raiki-tahotra ny olona. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Ary ireo izay nahita dia nitantara tamin’ny olona izay zava-nitranga tamin’ilay demoniaka sy ny amin’ny kisoa. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Ary nifona tamin’i Jesosy izy ireo mba hialany amin’ny faritaniny.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Ary rehefa hiondrana ho ao an-tsambokely Jesosy dia nangataka Taminy ilay demoniaka sitrana mba hijanona eo Aminy. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Tsy navelan’i Jesosy anefa izy, fa hoy kosa Izy taminy: Modia ihany any an-tranonao, any amin’ny havanao, ka lazao aminy izay zava-dehibe nataon’ny Tompo taminao sy ny namindrany fo taminao. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Nony niala teo an-tsambokely Izy, avy hatrany dia nifanena Taminy avy tany amin’ny fasana ny lehilahy iray, azom-panahy maloto. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Dia nandeha izy ka nitory tany Dekapolisy izay zava-dehibe efa nataon’i Jesosy taminy. Dia gaga ny olona rehetra.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny zanakavavin’i Jairo sy ilay vehivavy nikasika ny akanjon’i Jesosy
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mat 9.18-26; Lio 8.40-56
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Ary rehefa nita an-tsambokely indray Jesosy ka tonga teny ampita dia nisy vahoaka betsaka tafangona teo Aminy. Ary teo amoron-dranomasina Izy. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Dia avy ny mpanapaka ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sinagoga
    - type: text
      text: ' iray, Jairo no anarany. Rehefa nahita an’i Jesosy izy dia niankohoka teo an-tongony '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'ka niangavy fatratra Taminy hoe: Marary efa ho faty ny zanako vavy kely; andeha re, apetraho aminy ny tananao, mba ho sitrana izy ka ho velona. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Dia nandeha niaraka taminy Jesosy. Ary nisy vahoaka betsaka nanaraka Azy ka nifanizina Taminy.
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Ary nisy vehivavy iray izay efa narary nandeha ra nandritra ny roa amby folo taona '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'sady efa niaritra zavatra be tamin’ny mpitsabo maro ka nandany ny fananany rehetra nefa tsy nety sitrana, fa vao mainka niha narary kokoa aza. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Rehefa nahare ny amin’i Jesosy izy dia nankao aorianany namakivaky ny vahoaka ary nikasika ny akanjony. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Fa hoy izy: Na dia ny fitafiany ihany aza no voakasiko dia ho sitrana aho. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Ary niaraka tamin’izay dia ritra ny loharanon’aretiny ka tsaroany tao amin’ny tenany fa sitrana izy.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Teny amin’ny fasana izy io no nitoetra ary tsy nisy olona nahafatotra azy intsony na dia tamin’ny rojo vy aza. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Ary teo no eo dia fantatr’i Jesosy fa nisy hery niala Taminy ka nihodina teo afovoan’ny vahoaka Izy sady niteny hoe: Iza izany nikasika ny akanjoko izany? '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Fa hoy ny mpianany taminy: Hitanao izao vahoaka mifanositosika Aminao izao, koa hoy Ianao hoe: Iza no nikasika Ahy? '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Ary nijery manodidina Izy hahitany ilay nanao izany. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Dia raiki-tahotra sady toran-kovitra Ravehivavy satria fantany izay nitranga taminy, koa nankeo Aminy izy sady niankohoka teo anatrehany ary nanambara Taminy ny marina rehetra. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Ary hoy Izy taminy: Anaka, ny finoanao no nahasitrana anao; mandehana amin’ny fiadanana ary sitràna amin’ny aretinao.'
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Raha mbola niteny Jesosy dia nisy olona tonga avy tany amin’ilay mpanapaka ny sinagoga ka nilaza hoe: Efa maty ny zanakao vavy; koa nahoana ianao no mbola manahirana ny Mpampianatra ihany? '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Tsy nahoan’i Jesosy anefa izany teny nataony izany, fa hoy Izy tamin’ilay mpanapaka ny sinagoga: Aza matahotra, minoa fotsiny ihany. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Ary tsy nisy olona navelany hanaraka Azy afa-tsy i Petera sy i Jakoba ary i Jaona, rahalahin’i Jakoba. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Dia tonga tao an-tranon’ilay mpanapaka ny sinagoga izy ireo ka hitan’i Jesosy ny fikotaban’ny olona izay nitomany sy ninaonaona be ihany. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Rehefa niditra Izy dia niteny taminy hoe: Nahoana ianareo no mikorontana sy mitomany? Tsy maty Razazavavy fa matory. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Fa efa nafatotra matetika tamin’ny rojo vy, na ny tanany, na ny tongony; nefa notapahiny ny rojo vy tamin’ny tanany, ary ny rojo vy tamin’ny tongony dia notorotoroiny ka tsy nisy olona nahafolaka azy. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'Dia nihomehy Azy fatratra ny olona. Fa nandroaka azy rehetra Izy dia nitondra ny ray aman-drenin’ny zaza mbamin’izay olona teo aminy ka niditra tao amin’izay nisy ny zaza. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'Dia nandray ny tanan’ilay zaza Izy ka niteny taminy hoe: Talita komỳ, izany hoe, raha adika: Ry zazavavy, hoy Aho aminao: Mitsangàna! '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'Dia nitsangana niaraka tamin’izay Razazavavy ka afaka nandeha; fa efa roa amby folo taona izy. Dia talanjona indrindra ny olona. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: Ary Jesosy nandrara azy mafy mba tsy ho fantatr’olona izany; ary nasainy nomena hanina Razazavavy.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Ary mandrakariva, na andro na alina, dia nitoetra teny amin’ny fasana sy teny an-tendrombohitra izy ka ninananana sady niteti-tena tamin’ny vato.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Fa nony nahatsinjo an’i Jesosy teny lavitra teny izy dia nihazakazaka ka niankohoka teo anatrehany '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'sady niantso tamin’ny feo mahery hoe: Moa mifaninona akory izaho sy Ianao, ry Jesosy, Zanak’Andriamanitra Avo Indrindra ô? Mangataka Aminao amin’ny anaran’Andriamanitra aho, aza mampijaly ahy! '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Satria hoy Jesosy taminy hoe: Mialà amin’ity lehilahy ity, ry fanahy maloto! '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Dia nanontany azy Jesosy hoe: Iza moa no anaranao? Ary hoy izy: Legiona no anarako, satria maro izahay. '
