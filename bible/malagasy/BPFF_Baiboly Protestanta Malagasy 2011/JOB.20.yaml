document_id: JOB.20,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: 'Ny teny fanindroany nataon’i Zofara: Tsy maharitra ny fandresen’ny ratsy fanahy'
  - type: text
    content: 'Dia nandray fitenenana i Zofara namatita hoe:'
  '10':
  - type: text
    content: Ny zanany no hamerin-trosa amin’ny malahelo
  - type: text
    content: ary ny tanany ihany no hampody ny harena nangoniny.
  '11':
  - type: text
    content: Ny taolany dia feno ny herin’ny fahatanorana,
  - type: text
    content: nefa hiara-mandry aminy ao amin’ny vovoka izany.
  '12':
  - type: text
    content: Na dia mamy ao am-bavany aza ny ratsy
  - type: text
    content: ka afeniny ao ambanin’ny lelany,
  '13':
  - type: text
    content: ary tsitsiny ka tsy foiny
  - type: text
    content: fa tehiriziny ao amin’ny lanilaniny ihany,
  '14':
  - type: text
    content: dia hiova ao an-kibony ny haniny,
  - type: text
    content: ka aferon’ny menarana no ho ao anatiny.
  '15':
  - type: text
    content: Harena no nateliny nefa haloany indray;
  - type: text
    content: loaran’Andriamanitra hiala ao an-kibony izany.
  '16':
  - type: text
    content: Ny poizin’ny menarana no tsetsefiny;
  - type: text
    content: hahafaty azy ny lelan’ny menarana.
  '17':
  - type: text
    content: Tsy ho faly mahita renirano izy,
  - type: text
    content: dia ony sy riaky ny tantely sy ronono.
  '18':
  - type: text
    content: Tsy azony atelina izay nikelezany aina fa tsy maintsy hampodiny;
  - type: text
    content: na dia be aza ny hareny dia tsy ho araka izany ny hafaliany.
  '19':
  - type: text
    content: Efa nampahory sy nahafoy ny reraka izy
  - type: text
    content: ka naka trano an-keriny fa tsy mba nanangana.
  '2':
  - type: text
    content: Noho izany dia mamaly ahy ny eritreritro;
  - type: text
    content: eny, noho ny fihetsiketsehana ato anatiko.
  '20':
  - type: text
    content: Tsy mahalala mionona ny kibony
  - type: text
    content: ka tsy mamela na inona na inona tsy ho azony amin’izay notsiriritiny.
  '21':
  - type: text
    content: Tsy misy tsy tratry ny fitiavany harena tafahoatra
  - type: text
    content: ka tsy haharitra ny fiadanany.
  '22':
  - type: text
    content: Ho poriporitra izy na dia mihoa-pampana aza ny fananany;
  - type: text
    content: ny fahoriana no hamely azy amin’ny heriny rehetra.
  '23':
  - type: text
    content: Halefan’Andriamanitra hameno ny kibony ny fahatezerany mirehitra;
  - type: text
    content: eny, halatsany aminy toy ny ranonorana hatrany amin’ny tsinainy izany.
  '24':
  - type: text
    content: Raha mandositra ny vy fiadiana izy
  - type: text
    content: dia hahavoa azy miboroaka ny tsipìka varahina;
  '25':
  - type: text
    content: tsoahany izany ka mivoaka avy amin’ny tenany;
  - type: text
    content: eny, ny manelatselatra dia mivoaka avy amin’ny atiny;
  - type: text
    content: tamy manatona azy ny fahatahorana mafy.
  '26':
  - type: text
    content: Ny haizim-pito rehetra no voatahiry ho an’ny rakitra soa sarobidiny;
  - type: text
    content: afo tsy nisy nandrehitra no handoro azy
  - type: text
    content: sady handevona izay sisa ao amin’ny tranolainy.
  '27':
  - type: text
    content: Hambaran’ny lanitra ny helony
  - type: text
    content: ary hitsangana hiampanga azy ny tany,
  '28':
  - type: text
    content: ho voapaoka ny harena tafiditra ao an-tranony;
  - type: text
    content: eny, ho levona izany amin’ny andron’ny fahatezeran’Andriamanitra.
  '29':
  - type: text
    content: Izany no anjaran’ny ratsy fanahy avy amin’Andriamanitra
  - type: text
    content: sy lova voatendrin’Andriamanitra ho azy!
  '3':
  - type: text
    content: Reko lalandava ny anatra mampahamenatra ahy
  - type: text
    content: ary ny fanahiko dia mamaly ahy avy amin’ny fahalalako.
  '4':
  - type: text
    content: Tsy fantatrao va fa hatry ny ela;
  - type: text
    content: eny, hatrizay nampitoerana ny olona tetỳ ambonin’ny tany
  '5':
  - type: text
    content: dia vetivety foana ny firavoravoan’ny ratsy fanahy
  - type: text
    content: ary indray mipy maso monja ny fifalian’ny mpihatsaravelatsihy?
  '6':
  - type: text
    content: Fa na dia mipaka amin’ny lanitra aza ny haavony
  - type: text
    content: ka mitehika amin’ny rahona ny lohany
  '7':
  - type: text
    content: dia ho very mandrakizay toy ny dikiny ihany izy;
  - type: text
    content: 'ary izay nahafantatra azy dia hilaza hoe: Aiza izy?'
  '8':
  - type: text
    content: Manidina tahaka ny nofy izy ka tsy ho hita;
  - type: text
    content: eny, ampandosirina tahaka ny tsindrimandry amin’ny alina izy.
  '9':
  - type: text
    content: Ny maso izay mijery dia indray mitopy ihany no ahitany azy
  - type: text
    content: ary tsy hahita azy intsony ny fonenany.
