document_id: JOB.20,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Ny teny fanindroany nataon’i Zofara: Tsy maharitra ny fandresen’ny ratsy fanahy'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Dia nandray fitenenana i Zofara namatita hoe:'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Ny zanany no hamerin-trosa amin’ny malahelo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny tanany ihany no hampody ny harena nangoniny.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Ny taolany dia feno ny herin’ny fahatanorana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa hiara-mandry aminy ao amin’ny vovoka izany.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Na dia mamy ao am-bavany aza ny ratsy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka afeniny ao ambanin’ny lelany,
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ary tsitsiny ka tsy foiny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa tehiriziny ao amin’ny lanilaniny ihany,
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: dia hiova ao an-kibony ny haniny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka aferon’ny menarana no ho ao anatiny.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Harena no nateliny nefa haloany indray;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: loaran’Andriamanitra hiala ao an-kibony izany.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Ny poizin’ny menarana no tsetsefiny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hahafaty azy ny lelan’ny menarana.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Tsy ho faly mahita renirano izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ony sy riaky ny tantely sy ronono.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Tsy azony atelina izay nikelezany aina fa tsy maintsy hampodiny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na dia be aza ny hareny dia tsy ho araka izany ny hafaliany.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Efa nampahory sy nahafoy ny reraka izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka naka trano an-keriny fa tsy mba nanangana.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Noho izany dia mamaly ahy ny eritreritro;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, noho ny fihetsiketsehana ato anatiko.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Tsy mahalala mionona ny kibony
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy mamela na inona na inona tsy ho azony amin’izay notsiriritiny.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Tsy misy tsy tratry ny fitiavany harena tafahoatra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy haharitra ny fiadanany.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Ho poriporitra izy na dia mihoa-pampana aza ny fananany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny fahoriana no hamely azy amin’ny heriny rehetra.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Halefan’Andriamanitra hameno ny kibony ny fahatezerany mirehitra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, halatsany aminy toy ny ranonorana hatrany amin’ny tsinainy izany.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Raha mandositra ny vy fiadiana izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hahavoa azy miboroaka ny tsipìka varahina;
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: tsoahany izany ka mivoaka avy amin’ny tenany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, ny manelatselatra dia mivoaka avy amin’ny atiny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tamy manatona azy ny fahatahorana mafy.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Ny haizim-pito rehetra no voatahiry ho an’ny rakitra soa sarobidiny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: afo tsy nisy nandrehitra no handoro azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady handevona izay sisa ao amin’ny tranolainy.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Hambaran’ny lanitra ny helony
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hitsangana hiampanga azy ny tany,
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: ho voapaoka ny harena tafiditra ao an-tranony;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, ho levona izany amin’ny andron’ny fahatezeran’Andriamanitra.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Izany no anjaran’ny ratsy fanahy avy amin’Andriamanitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy lova voatendrin’Andriamanitra ho azy!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Reko lalandava ny anatra mampahamenatra ahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny fanahiko dia mamaly ahy avy amin’ny fahalalako.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Tsy fantatrao va fa hatry ny ela;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, hatrizay nampitoerana ny olona tetỳ ambonin’ny tany
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: dia vetivety foana ny firavoravoan’ny ratsy fanahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary indray mipy maso monja ny fifalian’ny mpihatsaravelatsihy?
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Fa na dia mipaka amin’ny lanitra aza ny haavony
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka mitehika amin’ny rahona ny lohany
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: dia ho very mandrakizay toy ny dikiny ihany izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ary izay nahafantatra azy dia hilaza hoe: Aiza izy?'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Manidina tahaka ny nofy izy ka tsy ho hita;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, ampandosirina tahaka ny tsindrimandry amin’ny alina izy.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Ny maso izay mijery dia indray mitopy ihany no ahitany azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy hahita azy intsony ny fonenany.
