document_id: 1SA.6
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Averin’ny Filistina amin’ny Israely ny vata misy ny Fanekena
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Efa nisy fito volana no tany amin’ny Filistina ny vata misy ny faneken’NY TOMPO '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'ka nampiantso ny mpisorona sy ny mpisikidy ny Filistina ary niteny hoe: Hataontsika ahoana ny vata misy ny faneken’NY TOMPO? Lazao aminay izay fomba hanateranay azy ho any amin’ny toerany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Hoy ireo: Raha averinareo ny vata misy ny faneken’ny Andriamanitry ny Israely dia aza averina foana, fa manolora fanati-panonerana ho Azy ianareo mba ho sitrana, ary ho fantatrareo koa ny tsy nialan’ny tanany taminareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dia hoy ny olona: Inona ary no fanati-panonerana haterinay ho Azy? Hoy ireo: Vay volamena dimy sy totozy volamena dimy, araka ny isan’ireo andrianan’ny Filistina; fa aretina iray ihany no manjo anareo rehetra sy ny andriananareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Koa manaova sarin’ny vainareo sy sarin’ny totozinareo izay manimba ny tany; ary omeo voninahitra ny Andriamanitry ny Israely; angamba hanamaivana ny tanany hiala aminareo sy ny andriamanitrareo ary ny taninareo Izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Fa nahoana no manamafy ny fonareo ianareo, toy ny nanamafisan’ny Ejiptiana sy i Farao ny fony? Raha nanao fahagagana namelezany azy ireo Izy, moa tsy nalefany handeha va ny olona ka lasa? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Koa ankehitriny manaova sarety vaovao, ary makà ombivavy roa mitaiza, izay tsy mbola nasiana zioga, dia afehezo amin’ny sarety ny ombivavy ka ento miverina any an-tranony ny zanany hisaraka aminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary alaivo ny vata misy ny faneken’NY TOMPO ka apetraho eo ambonin’ny sarety, dia ataovy ao anaty vata kely eo anilany ireo sary volamena hatolotrareo ho Azy ho fanati-panonerana. Ary avelao izany handeha. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Dia jereo, fa raha miakatra amin’ny lalana mankany amin’ny taniny ho any Bety-Semesy izany dia NY TOMPO no nahatonga izao loza lehibe izao tamintsika; raha tsy izany kosa dia ho fantatsika fa tsy ny tanany no namely fa kisendrasendra no nahavoa antsika.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dia nataon’ny olona izany ka naka ombivavy roa mitaiza izy, dia nafehiny tamin’ny sarety ireo, fa narindriny tao an-trano ny zanany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Napetrany teo ambonin’ny sarety ny vata misy ny faneken’NY TOMPO sy ny vata kely ary ny totozy volamena sy ny sarin’ny vay, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: dia nizotra mahitsy tamin’ny lalana mankany Bety-Semesy ny ombivavy; lalambe tokana no nandehanany, sady nitrena teny am-pandehanana izy ireo no tsy nivily, na ho amin’ny ankavanana, na ho amin’ny ankavia, ary nanaraka azy hatrany amin’ny sisintanin’i Bety-Semesy ireo andrianan’ny Filistina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary nijinja varimbazaha teny an-dohasaha ny mponina tao Bety-Semesy, koa raha nanopy ny masony izy dia nahatsinjo ny vata misy ny faneken’NY TOMPO ary faly nahita izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dia tonga teo an-tanimbarin’i Josoa bety-semesita ny sarety ka nijanona teo. Nisy vato lehibe teo ka namaky ny hazon’ny sarety ny olona ary nanolotra ny ombivavy ho fanatitra dorana manontolo ho an’NY TOMPO. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: levita
  - type: text
    text: ' dia nampidina ny vata misy ny faneken’NY TOMPO sy ny vata kely izay teo aminy, dia ilay nitoeran’ireo sary volamena ka nametraka azy teo ambonin’ny vato lehibe. Tamin’izany andro izany, ny mponina tao Bety-Semesy dia nanolotra fanatitra dorana manontolo sy fanatitra hafa alatsa-dra ho an’NY TOMPO. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Rehefa hitan’ireo andriana dimy tamin’ny Filistina izany dia niverina nankany Ekrona androtr’izay ihany izy ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ireto ny sary vay volamena natolotry ny Filistina ho fanati-panonerana ho an’NY TOMPO: Iray ho an’i Asdoda, iray ho an’i Gaza, iray ho an’i Askelona, iray ho an’i Gata ary iray ho an’i Ekrona; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ny totozy volamena dia araka ny isan’ny tanàna rehetra an’ny Filistina, izay an’ireo andriana dimy, an’ny tanàna mimanda, na ny vohitra tsy mimanda, ka hatramin’ny vato lehibe izay nametrahany ny vata misy ny faneken’NY TOMPO; ary mbola any an-tanimbarin’i Josoa bety-semesita mandraka androany izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary NY TOMPO namely ny mponina tao Bety-Semesy noho ny nijerijeren’ireo ny vata misy ny fanekeny, koa olona fitopolo tamin’ny dimy alina no maty; dia nisaona ny olona, satria nasian’NY TOMPO ka be dia be no maty. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary hoy ny mponina tao Bety-Semesy: Iza no mahajanona eo anoloan’izao TOMPO Andriamanitra masina izao? Ho amin’iza no hiakarany rehefa miala amintsika? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Dia nandefa iraka nankany amin’ny mponina tao Kiriata-Jearima izy hilaza hoe: Efa naverin’ny Filistina ny vata misy ny faneken’NY TOMPO; koa midìna ianareo dia ento miakatra ho any aminareo izy.'
