document_id: JDG.2,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Manome tsiny ny olony NY TOMPO
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ilay '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Anjelin’NY TOMPO
    - type: text
      text: ' dia niakatra avy tany Gilgala ka nankany Bokima ka niteny hoe: Nitondra anareo niakatra avy tany Ejipta Aho ka nampiditra anareo eto amin’ny tany izay nianianako tamin’ny razanareo homena azy, ka hoy Aho tamin’izany: Tsy hanatsoaka ny fanekeko aminareo mihitsy Aho; '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary izany taranaka rehetra izany koa dia voangona any amin’ny razany, koa taranaka hafa izay tsy nahalala NY TOMPO na ny asa nataony ho an’ny Israely no nitsangana nandimby azy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fivadihana, fahoriana, fanafahana
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nanao izay ratsy teo imason’NY TOMPO ny Zanak’Israely satria nanompo ireo '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Baala
    - type: text
      text: ' '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ka nahafoy NY TOMPO, Andriamanitry ny razany, izay nitondra azy nivoaka avy tany amin’ny tany Ejipta; nanaraka andriamanitra hafa tamin’ireo andriamanitry ny firenena manodidina azy izy, dia niankohoka teo anatrehany ka nahatezitra NY TOMPO. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Eny, nahafoy NY TOMPO izy ka nanompo ny Baala sy ireo '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Astarta
    - type: text
      text: .
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nirehitra tamin’ny Israely ny fahatezeran’NY TOMPO ka natolony teo an-tanan’ny mpamabo izay namabo azy izy, ary namidiny ho eo an-tanan’ny fahavalony manodidina azy; tsy nahajanona teo anoloan’ireo fahavalony intsony izy. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Na taiza na taiza no nivoahany hiady dia namely azy ny tanan’NY TOMPO ka nampahory azy, araka izay nolazain’NY TOMPO sy araka izay nianianany taminy. Koa ory indrindra izy. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary NY TOMPO nanangana mpitsara izay namonjy azy tamin’ny tanan’ireo namabo azy. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nefa na dia ireo mpitsara teo aminy aza dia tsy mba nohenoiny fa nandeha nijangajanga nanaraka andriamanitra hafa izy ka niankohoka teo anatrehan’ireny; nalaky nivily niala tamin’ny lalana nandehanan’ireo razany izay nanaraka ny didin’NY TOMPO izy; tsy mba araka izany no nataony. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa nanangana mpitsara ho azy NY TOMPO dia nomba izany mpitsara izany Izy ka namonjy ny olona tamin’ny tanan’ny fahavalony, tamin’ny andro rehetra niainan’izany mpitsara izany; fa nalahelo azy NY TOMPO amin’ny fitarainany noho ny nataon’ireo mpampahory sy mpampijaly azy. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Kanjo nony maty ilay mpitsara dia nanao izay ratsy mihoatra noho ny nataon’ny razany indray izy, fa nanaraka andriamanitra hafa sy nanompo azy ireo ary niankohoka teo anatrehany; tsy nitsahatra tamin’ny fanaony sy ny ditrany izy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mizaha toetra ny Israely Andriamanitra
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'koa aza manao fanekena amin’ireo mponina amin’ity tany ity ianareo fa ravao ny alitarany. Kanefa tsy nihaino ny feoko ianareo. Koa inona moa izao nataonareo izao? '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nirehitra tamin’ny Israely ny fahatezeran’NY TOMPO ka hoy Izy: Satria nivadika tamin’ny fanekeko izay nandidiako ny razany ity firenena ity ka tsy nihaino ny feoko, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izaho koa tsy handroaka intsony na dia iray aza amin’ireo firenena navelan’i Josoa tamin’ny nahafatesany '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'mba hizahako toetra ny Israely amin’ny alalan’ireny, na hitandrina ny lalan’NY TOMPO izy ka handeha amin’izany araka izay nitandreman’ny razany izany, na tsia. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia navelan’NY TOMPO hijanona ireny firenena ireny fa tsy nalaky noroahiny sady tsy natolony rahateo teo an-tanan’i Josoa ireny.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa izao no lazaiko: Tsy handroaka azy eo anoloanareo Aho fa ho eo anilanareo izy ary ny andriamaniny dia ho fandrika ho anareo. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nony niteny izany teny izany tamin’ny Zanak’Israely rehetra ilay Anjelin’NY TOMPO dia nanandratra ny feony ny vahoaka ka nitomany. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ny anaran’izany tany izany dia nataony hoe Bokima
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Bokima: Ireo mitomany.'
      marker-yv: yv-n
    - type: text
      text: ', ary namono zavatra teo izy mba hatao fanatitra ho an’NY TOMPO.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nahafatesan’i Josoa
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa nampodìn’i Josoa ny vahoaka dia nandeha ho any amin’ny lovany avy ny Zanak’Israely rehetra mba handray ny tany. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nanompo NY TOMPO ny vahoaka tamin’ny andro rehetra niainan’i Josoa sy tamin’ny andro rehetra niainan’ireo loholona izay velona taorianan’i Josoa, dia ireo izay nahita ny asa lehibe rehetra nataon’NY TOMPO ho an’ny Israely. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary maty i Josoa, zanak’i Nona, mpanompon’NY TOMPO, rehefa feno folo amby zato taona ny androny. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nalevina tao anatin’ny faritanin’ny lovany izy, tao Timnata-Heresa, any amin’ny tany be havoana any Efraima, avaratry ny tendrombohitra Gaasy. '
