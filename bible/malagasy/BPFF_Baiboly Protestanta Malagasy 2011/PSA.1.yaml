document_id: PSA.1,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: BOKY VOALOHANY
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny tena fahasambarana
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sambatra ny olona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay tsy manaraka ny fisainan’ny ratsy fanahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady tsy mijanona eo amin’ny lalana falehan’ny mpanota
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy mipetraka eo amin’ny fipetrahan’ny mpaniratsira,
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny lalànan’NY TOMPO no sitrany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, ny lalànany no saintsaininy andro aman’alina.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tahaka ny hazo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ambolena eo amoron’ny rano velona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay mamoa amin’ny fotoanany izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy mba malazo ny raviny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ataony lavorary avokoa ny asany rehetra.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy mba toy izany kosa ny ratsy fanahy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa toy ny akofa aelin’ny rivotra izy.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Noho izany, tsy hahajanona eo amin’ny fitsarana ny ratsy fanahy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na eo amin’ny fiangonan’ny marina ny mpanota.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa fantatry NY TOMPO ny lalan’ny marina;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mankany amin’ny fahaverezana kosa ny lalan’ny ratsy fanahy.
