document_id: PSA.1,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: BOKY VOALOHANY
  - type: heading
    content: Ny tena fahasambarana
  - type: text
    content: Sambatra ny olona
  - type: text
    content: izay tsy manaraka ny fisainan’ny ratsy fanahy
  - type: text
    content: sady tsy mijanona eo amin’ny lalana falehan’ny mpanota
  - type: text
    content: ary tsy mipetraka eo amin’ny fipetrahan’ny mpaniratsira,
  '2':
  - type: text
    content: fa ny lalànan’NY TOMPO no sitrany;
  - type: text
    content: eny, ny lalànany no saintsaininy andro aman’alina.
  '3':
  - type: text
    content: Tahaka ny hazo
  - type: text
    content: ambolena eo amoron’ny rano velona
  - type: text
    content: izay mamoa amin’ny fotoanany izy;
  - type: text
    content: tsy mba malazo ny raviny
  - type: text
    content: ary ataony lavorary avokoa ny asany rehetra.
  '4':
  - type: text
    content: Tsy mba toy izany kosa ny ratsy fanahy,
  - type: text
    content: fa toy ny akofa aelin’ny rivotra izy.
  '5':
  - type: text
    content: Noho izany, tsy hahajanona eo amin’ny fitsarana ny ratsy fanahy,
  - type: text
    content: na eo amin’ny fiangonan’ny marina ny mpanota.
  '6':
  - type: text
    content: Fa fantatry NY TOMPO ny lalan’ny marina;
  - type: text
    content: mankany amin’ny fahaverezana kosa ny lalan’ny ratsy fanahy.
