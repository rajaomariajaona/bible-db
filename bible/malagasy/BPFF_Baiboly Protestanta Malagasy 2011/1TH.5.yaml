document_id: 1TH.5,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Fiandrasana ny andron’ny Tompo
  - type: text
    content: 'Fa ny amin’ny andro sy ny fotoana, ry rahalahy, dia tsy misy tokony hosoratako aminareo '
  '10':
  - type: text
    content: 'izay maty hamonjy antsika, mba hiara-belona Aminy isika, na mahatsiaro na matory. '
  '11':
  - type: text
    content: Koa mifampahereza sy mifananara, tahaka ny ataonareo ihany.
  - type: heading
    content: Fananarana sy fanaovam-beloma
  '12':
  - type: text
    content: 'Mangataka aminareo izahay, ry rahalahy, mba hekenareo izay mikely aina eo aminareo sy ireo mitondra anareo ao amin’ny Tompo ary ireo mananatra anareo. '
  '13':
  - type: text
    content: Aoka mba hohajainareo indrindra amin’ny fitiavana izy noho ny asany. Mihavàna tsara ianareo.
  '14':
  - type: text
    content: 'Ary mananatra anareo izahay, ry rahalahy: Anaro izay tsy mitoetra tsara, omeo toky ny saro-tahotra, ampaherezo ny reraka, mandefera amin’ny olona rehetra. '
  '15':
  - type: text
    content: Tandremo mba tsy hisy hamaly ratsy olona fa miezaha mandrakariva hitady izay tsara, na amin’ny namanareo na amin’ny olona rehetra.
  '16':
  - type: text
    content: Mifalia mandrakariva.
  '17':
  - type: text
    content: Mivavaha ka aza mitsahatra.
  '18':
  - type: text
    content: 'Misaora amin’ny zavatra rehetra fa izany no sitrapon’Andriamanitra ao amin’i '
  - type: text
    content: Kristy
  - type: text
    content: ' Jesosy ho anareo.'
  '19':
  - type: text
    content: Aza mamono ny Fanahy.
  '2':
  - type: text
    content: 'satria mahalala marimarina ianareo fa ho avy toy ny mpangalatra amin’ny alina ny andron’ny Tompo. '
  '20':
  - type: text
    content: Aza manao tsinontsinona ny faminaniana.
  '21':
  - type: text
    content: Fantaro ny zavatra rehetra; hazòny mafy izay tsara.
  '22':
  - type: text
    content: Fadio ny fanao ratsy rehetra.
  '23':
  - type: text
    content: 'Andriamanitry ny fiadanana anie hanamasina anareo manontolo ka ho voatahiry avokoa ny fanahinareo sy ny ainareo ary ny tenanareo ho tanteraka ka tsy hanan-tsiny amin’ny fiavian’i Jesosy Kristy Tompontsika. '
  '24':
  - type: text
    content: Mahatoky izay miantso anareo sady Izy ihany no hanatanteraka izany.
  '25':
  - type: text
    content: Ry rahalahy, mivavaha koa ho anay.
  '26':
  - type: text
    content: 'Ataovy veloma amin’ny fanorohana masina ny rahalahy rehetra. '
  '27':
  - type: text
    content: Mampianiana anareo amin’ny Tompo aho mba hovakina amin’ny rahalahy masina rehetra ity epistily ity.
  '28':
  - type: text
    content: Ho aminareo anie ny fahasoavan’i Jesosy Kristy Tompontsika.
  '3':
  - type: text
    content: 'Raha misy olona milaza hoe: Miadana sy mandry fehizay, dia hanjo azy tampoka ny fandringanana, toy ny fahararian’ny vehivavy raha miteraka ka tsy ho afa-mandositra mihitsy izy. '
  '4':
  - type: text
    content: 'Fa ianareo, ry rahalahy, dia tsy ao amin’ny maizina ka hahatratra anareo toy ny mpangalatra izany andro izany. '
  '5':
  - type: text
    content: 'Fa ianareo rehetra dia zanaky ny mazava sy zanaky ny andro; tsy an’ny alina na an’ny maizina isika. '
  '6':
  - type: text
    content: Koa dia aza mba matory toy ny sasany isika fa aoka hiambina ka hahonon-tena.
  '7':
  - type: text
    content: 'Fa izay matory dia matory amin’ny alina ary izay mamo dia mamo amin’ny alina. '
  '8':
  - type: text
    content: 'Fa satria an’ny andro isika dia aoka hahonon-tena ka hitafy ny finoana sy ny fitiavana ho fiarovan-tratra ary ny fanantenana ny famonjena ho fiarovan-doha. '
  '9':
  - type: text
    content: 'Fa Andriamanitra tsy nanendry antsika ho amin’ny fahatezerana fa mba hahazo famonjena amin’ny alalan’i Jesosy '
  - type: text
    content: Kristy
  - type: text
    content: ' Tompontsika, '
