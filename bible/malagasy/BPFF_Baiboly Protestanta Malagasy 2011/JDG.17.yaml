document_id: JDG.17,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: TANTARA HAFA TAMIN’NY ANDRON’NY MPITSARA
  - type: heading
    content: Ny nanaovan’i Mika sarin-javatra hivavahana
  - type: text
    content: 'Nisy lehilahy tany amin’ny tany be havoana any Efraima, nantsoina hoe Mika. '
  '10':
  - type: text
    content: 'Dia hoy i Mika taminy: Mitoera atỳ amiko ianao, ary aoka ho raiko sy ho mpisoroko ianao, dia homeko sekela volafotsy folo isan-taona sy fitafiana ampy ary sakafo. Dia lasa nandeha ilay levita. '
  '11':
  - type: text
    content: 'Avy eo dia nanaiky hitoetra tao amin-dRalehilahy ilay levita ka tonga tahaka ny zanany. '
  '12':
  - type: text
    content: 'Dia natokan’i Mika ilay levita ka tonga mpisorony; nitoetra tao an-tranon’i Mika izy. '
  '13':
  - type: text
    content: 'Dia hoy i Mika: Fantatro izao fa hanisy soa ahy NY TOMPO satria manana ity levita ity ho mpisoroko aho.'
  '2':
  - type: text
    content: 'Hoy izy tamin’ny reniny: Ilay volafotsy zato sy arivo sekela nisy naka taminao, izay nasianao ozona, sady nolazainao teo anatrehako izany, indro, ato amiko ny volafotsy; izaho no naka azy. Dia hoy reniny: Hotahìn’NY TOMPO anie ny zanako! '
  '3':
  - type: text
    content: 'Rehefa naveriny tamin’ny reniny ny volafotsy zato sy arivo sekela dia hoy reniny: Atokako ho an’NY TOMPO tanteraka ity vola avy amin’ny tanako ity ka atolotro ho an’ny zanako hanaovana sarin-javatra voasokitra sy sarin-javatra voarendrika, ary ankehitriny dia averiko aminao izy. '
  '4':
  - type: text
    content: 'Rehefa naveriny tamin’ny reniny ary ny volafotsy dia naka volafotsy roanjato sekela ny reniny ka nomeny ny mpanefy volafotsy izany mba hataony sarin-javatra voasokitra sy sarin-javatra voarendrika. Dia natao tao an-tranon’i Mika izany. '
  '5':
  - type: text
    content: 'Dia tonga nanana tranon’Andriamanitra ary izany lehilahy natao hoe Mika izany; nanamboatra '
  - type: text
    content: efoda
  - type: text
    content: ' sy '
  - type: text
    content: terafima
  - type: text
    content: ' izy ary ny zanany lahy iray no natokany ho mpisorony.'
  '6':
  - type: text
    content: 'Tamin’izany andro izany dia tsy nisy mpanjaka teo amin’ny Israely fa samy nanao izay noheveriny ho mety avy ny olona rehetra. '
  '7':
  - type: text
    content: 'Nisy zatovo iray, avy any Betleheman’i Joda, tamin’ny fianakavian’i Joda; '
  - type: text
    content: levita
  - type: text
    content: ' izy io ary mpivahiny nitoetra tao. '
  '8':
  - type: text
    content: 'Ary niala tao amin’ny tanàna Betleheman’i Joda Ralehilahy mba hivahiny any amin’izay azony hitoerana; nony nandeha izy dia tonga tany amin’ny tany be havoana any Efraima tao amin’ny tranon’i Mika. '
  '9':
  - type: text
    content: 'Hoy i Mika taminy: Avy aiza moa ianao? Hoy izy taminy: Levita avy any Betleheman’i Joda aho ka handeha hivahiny any amin’izay azoko hitoerana. '
