document_id: JDG.17
type_code: plt
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: TANTARA HAFA TAMIN’NY ANDRON’NY MPITSARA
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nanaovan’i Mika sarin-javatra hivavahana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Nisy lehilahy tany amin’ny tany be havoana any Efraima, nantsoina hoe Mika. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Hoy izy tamin’ny reniny: Ilay volafotsy zato sy arivo sekela nisy naka taminao, izay nasianao ozona, sady nolazainao teo anatrehako izany, indro, ato amiko ny volafotsy; izaho no naka azy. Dia hoy reniny: Hotahìn’NY TOMPO anie ny zanako! '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Rehefa naveriny tamin’ny reniny ny volafotsy zato sy arivo sekela dia hoy reniny: Atokako ho an’NY TOMPO tanteraka ity vola avy amin’ny tanako ity ka atolotro ho an’ny zanako hanaovana sarin-javatra voasokitra sy sarin-javatra voarendrika, ary ankehitriny dia averiko aminao izy. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Rehefa naveriny tamin’ny reniny ary ny volafotsy dia naka volafotsy roanjato sekela ny reniny ka nomeny ny mpanefy volafotsy izany mba hataony sarin-javatra voasokitra sy sarin-javatra voarendrika. Dia natao tao an-tranon’i Mika izany. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia tonga nanana tranon’Andriamanitra ary izany lehilahy natao hoe Mika izany; nanamboatra '
  - type: usfm
    marker: w
    children:
    - type: text
      text: efoda
  - type: text
    text: ' sy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: terafima
  - type: text
    text: ' izy ary ny zanany lahy iray no natokany ho mpisorony.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Tamin’izany andro izany dia tsy nisy mpanjaka teo amin’ny Israely fa samy nanao izay noheveriny ho mety avy ny olona rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Nisy zatovo iray, avy any Betleheman’i Joda, tamin’ny fianakavian’i Joda; '
  - type: usfm
    marker: w
    children:
    - type: text
      text: levita
  - type: text
    text: ' izy io ary mpivahiny nitoetra tao. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary niala tao amin’ny tanàna Betleheman’i Joda Ralehilahy mba hivahiny any amin’izay azony hitoerana; nony nandeha izy dia tonga tany amin’ny tany be havoana any Efraima tao amin’ny tranon’i Mika. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Hoy i Mika taminy: Avy aiza moa ianao? Hoy izy taminy: Levita avy any Betleheman’i Joda aho ka handeha hivahiny any amin’izay azoko hitoerana. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dia hoy i Mika taminy: Mitoera atỳ amiko ianao, ary aoka ho raiko sy ho mpisoroko ianao, dia homeko sekela volafotsy folo isan-taona sy fitafiana ampy ary sakafo. Dia lasa nandeha ilay levita. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Avy eo dia nanaiky hitoetra tao amin-dRalehilahy ilay levita ka tonga tahaka ny zanany. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Dia natokan’i Mika ilay levita ka tonga mpisorony; nitoetra tao an-tranon’i Mika izy. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dia hoy i Mika: Fantatro izao fa hanisy soa ahy NY TOMPO satria manana ity levita ity ho mpisoroko aho.'
