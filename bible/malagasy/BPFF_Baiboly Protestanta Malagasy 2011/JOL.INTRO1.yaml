document_id: JOL.INTRO1,3103
type_code: plt
verses:
  '1':
  - type: text
    content: INDRAY MIJERY
  - type: text
    content: «NY TOMPO no Andriamanitra», izany no hevitry ny anarana hoe Joela. Fotoana tsy nisian’ny mpanjaka, fa fotoana nampisongadina kosa ny asam-pisoronana no nahaveloman’i Joela.
  - type: text
    content: Heverina ho taorianan’ny fahababoana no nanoratana ny bokin’i Joela, noho ny filazana ao amin’ny 4.2 ny amin’ny «Israely oloko sy lovako izay naeliny tany amin’ny Jentilisa».
  - type: text
    content: Ny votoatin’ny Boky
  - type: text
    content: Ny bokin’ny Joela dia isan’ny lahatsoratra atao hoe apokaliptika izay milaza ny zavatra hitranga mialoha ny farany.
  - type: text
    content: Fampiomanana ny Andron’NY TOMPO ny fiavian’ny andiam-balala mahatsiravina sy ny hain-tany izay hanapotika ny firenena. Tsy misy azo atao amin’izay fotoana izay na dia ny hanao fanompoam-pivavahana aza. Ho avy hitsara Andriamanitra ka samy hotsaraina na ny Israely na ny Jentilisa. Mialoha izany anefa dia asain’Andriamanitra antsoin’ny mpaminany ny olona mba hibebaka amin’ny alalan’ny fifadian-kanina, ny fitomaniana, ny fisaonana ary ny fanaovana vavaka fifonana.
  - type: text
    content: Ho setrin’izany, raha mibebaka izy, dia hisy fitahiana be dia be homen’Andriamanitra, ary ny handrotsahany ny Fanahy Masina ho an’ny olona rehetra no lehibe indrindra amin’izany.
  - type: text
    content: Fanamarihana
  - type: text
    content: Ny toko 3.1-5 ao amin’ny Baiboly malagasy dia manaraka ny fizarana ao amin’ny Baiboly hebreo, fa toko 2.28-32 izany ao amin’ireo Baiboly sasany izay manaraka ny fizarana ao amin’ny Baiboly dikanteny latina. Noho izany, amin’ireto farany, ny toko faha-4 amin’ny Baiboly malagasy dia lasa toko faha-3.
  - type: text
    content: Ny firafitry ny boky
  - type: text
    content: 'Fanafihan’ny andiam-balala sy hain-tany ary ny fitarainana noho izany: 1'
  - type: text
    content: 'Ny Andron’NY TOMPO sy ny fitahiana omeny raha mibebaka ny olony: 2–3'
  - type: text
    content: 'Ny fitsarana ny firenena ao amin’ny Lohasahan’i Josafata: Hotsaraina ny Jentilisa fa ho feno voninahitra kosa i Ziona: 4'
