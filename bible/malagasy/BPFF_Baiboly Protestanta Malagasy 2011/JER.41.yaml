document_id: JER.41
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Tamin’ny volana fahafito, Ismaela, zanak’i Netania, zanak’i Elisama, avy amin’ny taranaky ny mpanjaka, sy ny olona ambony maromaro akaiky ny mpanjaka, dia tonga tany amin’i Gedalia, zanak’i Ahikama, tao Mizpa; nisy folo lahy niaraka taminy; ary niara-nisakafo tao Mizpa izy ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Dia nitsangana Ismaela, zanak’i Netania, sy ireo olona folo lahy niaraka taminy ka namely sabatra an’i Gedalia, zanak’i Ahikama, zanak’i Safana. Novonoiny ilay efa nataon’ny mpanjakan’i Babilona ho mpanapaka ny tany. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Novonoin’Ismaela koa ny Jiosy rehetra izay tao aminy, dia izay tao amin’i Gedalia tao Mizpa, sy ny Kaldeana ary ny miaramila izay hita tao.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Novonoin’Ismaela ireo valopolo lahy avy lavitra handeha hivavaka
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Nony ampitson’ny andro namonoana an’i Gedalia, raha tsy mbola nisy olona nahalala izany, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'dia nisy valopolo lahy avy tany Sekema sy Silo ary Samaria, izay samy miharatra volombava, sady rovitra ny fitafiany, ary voatetika ny tenany, nitondra fanatitra sy ditin-kazo mani-pofona teny an-tanany, hoentina ao amin’ny tranon’NY TOMPO. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary Ismaela, zanak’i Netania, dia nivoaka hitsena azy avy tao Mizpa sady nitomany teny am-pandehanana. Nony tafahaona taminy izy dia niteny taminy hoe: Mankanesa any amin’i Gedalia, zanak’i Ahikama. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Kanjo nony tonga tao afovoan’ny tanàna izy ireo dia novonoin’Ismaela, zanak’i Netania, mbamin’ny olona nanaraka azy izy ka nariany tao anaty lavaka famorian-drano. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Fa nisy folo lahy tamin’ireo niteny tamin’Ismaela hoe: Aza vonoina izahay; fa manan-tahiry any an-tsaha izahay, dia varimbazaha isan-karazany sy diloilo ary tantely. Dia nijanona tsy namono azy tahaka ny efa nataony tamin’ny namany izy. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary ilay lavaka nanarian’Ismaela ny fatin’ny olona rehetra izay novonoiny ho eo anilan’i Gedalia, dia ilay nataon’i Asa mpanjaka mba hiereny an’i Basa, mpanjakan’ny Israely, dia nofenoin’Ismaela, zanak’i Netania, faty. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ary noentin’Ismaela ho babo ny olona rehetra izay sisa tao Mizpa, na ny vehivavy zanaky ny mpanjaka, na ny olona rehetra izay sisa tao Mizpa, izay napetrak’i Nebozaradana, lehiben’ny mpiambina, tao amin’i Gedalia, zanak’i Ahikama; eny, Ismaela, zanak’i Netania, no nitondra azy ireny ho babo ka lasa niala nankany amin’ny taranak’i Amona izy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Voaavotra ireo babon’Ismaela
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Fa nony ren’i Johanana, zanak’i Karea, sy ny mpifehy ny miaramila rehetra izay tao aminy ny ratsy rehetra nataon’Ismaela, zanak’i Netania, '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'dia novoriny ny olona rehetra ka noentiny niady tamin’Ismaela, zanak’i Netania ary hitany teo amoron’ny ranobe ao Gibeona izy. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary ny olona rehetra izay tao amin’Ismaela, nony nahita an’i Johanana, zanak’i Karea, sy ny mpifehy ny miaramila rehetra izay tao aminy, dia faly. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary ny olona rehetra izay noentin’Ismaela ho babo avy tany Mizpa dia nitodika ka niverina nanatona an’i Johanana, zanak’i Karea. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Fa Ismaela, zanak’i Netania, sy ny olona valo lahy kosa dia afaka nandositra an’i Johanana ka lasa nankany amin’ny taranak’i Amona. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary i Johanana, zanak’i Karea, sy ny mpifehy ny miaramila rehetra izay tao aminy dia nitondra ny olona rehetra izay voavonjiny ho afaka tamin’Ismaela, zanak’i Netania, avy tany Mizpa, taorianan’ny namonoany an’i Gedalia, zanak’i Ahikama, dia ny lehilahy mpiady sy ny zaza amam-behivavy ary ny tandapa, izay noentiny niverina avy tany Gibeona. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Dia lasa izy ireo ka nitoetra tao Gerota-Kimama izay ao akaikin’i Betlehema, mba handehanany hankany Ejipta '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: tsy ho tratry ny Kaldeana; fa natahotra azy izy, satria Ismaela, zanak’i Netania, dia efa namono an’i Gedalia, zanak’i Ahikama, izay notendren’ny mpanjakan’i Babilona ho mpanapaka ny tany.
