document_id: JER.41,3103
type_code: plt
verses:
  '1':
  - type: text
    content: 'Tamin’ny volana fahafito, Ismaela, zanak’i Netania, zanak’i Elisama, avy amin’ny taranaky ny mpanjaka, sy ny olona ambony maromaro akaiky ny mpanjaka, dia tonga tany amin’i Gedalia, zanak’i Ahikama, tao Mizpa; nisy folo lahy niaraka taminy; ary niara-nisakafo tao Mizpa izy ireo. '
  '10':
  - type: text
    content: Ary noentin’Ismaela ho babo ny olona rehetra izay sisa tao Mizpa, na ny vehivavy zanaky ny mpanjaka, na ny olona rehetra izay sisa tao Mizpa, izay napetrak’i Nebozaradana, lehiben’ny mpiambina, tao amin’i Gedalia, zanak’i Ahikama; eny, Ismaela, zanak’i Netania, no nitondra azy ireny ho babo ka lasa niala nankany amin’ny taranak’i Amona izy.
  - type: heading
    content: Voaavotra ireo babon’Ismaela
  '11':
  - type: text
    content: 'Fa nony ren’i Johanana, zanak’i Karea, sy ny mpifehy ny miaramila rehetra izay tao aminy ny ratsy rehetra nataon’Ismaela, zanak’i Netania, '
  '12':
  - type: text
    content: 'dia novoriny ny olona rehetra ka noentiny niady tamin’Ismaela, zanak’i Netania ary hitany teo amoron’ny ranobe ao Gibeona izy. '
  '13':
  - type: text
    content: 'Ary ny olona rehetra izay tao amin’Ismaela, nony nahita an’i Johanana, zanak’i Karea, sy ny mpifehy ny miaramila rehetra izay tao aminy, dia faly. '
  '14':
  - type: text
    content: 'Ary ny olona rehetra izay noentin’Ismaela ho babo avy tany Mizpa dia nitodika ka niverina nanatona an’i Johanana, zanak’i Karea. '
  '15':
  - type: text
    content: 'Fa Ismaela, zanak’i Netania, sy ny olona valo lahy kosa dia afaka nandositra an’i Johanana ka lasa nankany amin’ny taranak’i Amona. '
  '16':
  - type: text
    content: 'Ary i Johanana, zanak’i Karea, sy ny mpifehy ny miaramila rehetra izay tao aminy dia nitondra ny olona rehetra izay voavonjiny ho afaka tamin’Ismaela, zanak’i Netania, avy tany Mizpa, taorianan’ny namonoany an’i Gedalia, zanak’i Ahikama, dia ny lehilahy mpiady sy ny zaza amam-behivavy ary ny tandapa, izay noentiny niverina avy tany Gibeona. '
  '17':
  - type: text
    content: 'Dia lasa izy ireo ka nitoetra tao Gerota-Kimama izay ao akaikin’i Betlehema, mba handehanany hankany Ejipta '
  '18':
  - type: text
    content: tsy ho tratry ny Kaldeana; fa natahotra azy izy, satria Ismaela, zanak’i Netania, dia efa namono an’i Gedalia, zanak’i Ahikama, izay notendren’ny mpanjakan’i Babilona ho mpanapaka ny tany.
  '2':
  - type: text
    content: 'Dia nitsangana Ismaela, zanak’i Netania, sy ireo olona folo lahy niaraka taminy ka namely sabatra an’i Gedalia, zanak’i Ahikama, zanak’i Safana. Novonoiny ilay efa nataon’ny mpanjakan’i Babilona ho mpanapaka ny tany. '
  '3':
  - type: text
    content: Novonoin’Ismaela koa ny Jiosy rehetra izay tao aminy, dia izay tao amin’i Gedalia tao Mizpa, sy ny Kaldeana ary ny miaramila izay hita tao.
  - type: heading
    content: Novonoin’Ismaela ireo valopolo lahy avy lavitra handeha hivavaka
  '4':
  - type: text
    content: 'Nony ampitson’ny andro namonoana an’i Gedalia, raha tsy mbola nisy olona nahalala izany, '
  '5':
  - type: text
    content: 'dia nisy valopolo lahy avy tany Sekema sy Silo ary Samaria, izay samy miharatra volombava, sady rovitra ny fitafiany, ary voatetika ny tenany, nitondra fanatitra sy ditin-kazo mani-pofona teny an-tanany, hoentina ao amin’ny tranon’NY TOMPO. '
  '6':
  - type: text
    content: 'Ary Ismaela, zanak’i Netania, dia nivoaka hitsena azy avy tao Mizpa sady nitomany teny am-pandehanana. Nony tafahaona taminy izy dia niteny taminy hoe: Mankanesa any amin’i Gedalia, zanak’i Ahikama. '
  '7':
  - type: text
    content: 'Kanjo nony tonga tao afovoan’ny tanàna izy ireo dia novonoin’Ismaela, zanak’i Netania, mbamin’ny olona nanaraka azy izy ka nariany tao anaty lavaka famorian-drano. '
  '8':
  - type: text
    content: 'Fa nisy folo lahy tamin’ireo niteny tamin’Ismaela hoe: Aza vonoina izahay; fa manan-tahiry any an-tsaha izahay, dia varimbazaha isan-karazany sy diloilo ary tantely. Dia nijanona tsy namono azy tahaka ny efa nataony tamin’ny namany izy. '
  '9':
  - type: text
    content: 'Ary ilay lavaka nanarian’Ismaela ny fatin’ny olona rehetra izay novonoiny ho eo anilan’i Gedalia, dia ilay nataon’i Asa mpanjaka mba hiereny an’i Basa, mpanjakan’ny Israely, dia nofenoin’Ismaela, zanak’i Netania, faty. '
