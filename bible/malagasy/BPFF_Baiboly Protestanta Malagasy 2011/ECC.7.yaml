document_id: ECC.7,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Anatra sy tenim-pahendrena samihafa
  - type: text
    content: Tsara ny laza soa noho ny menaka manitra
  - type: text
    content: ary ny andro ahaterahana dia tsy mahaleo ny andro ahafatesana.
  '10':
  - type: text
    content: 'Aza milaza hoe: Ahoana no nahatsara ny andro taloha noho ny ankehitriny?'
  - type: text
    content: Fa tsy avy amin’ny fahendrena no anontanianao izany.
  '11':
  - type: text
    content: Tsara tahaka ny lova ny fahendrena,
  - type: text
    content: sady zava-mahasoa ho an’izay mahita masoandro izany
  '12':
  - type: text
    content: satria fialokalofana ny fahendrena ary fialokalofana ny vola;
  - type: text
    content: 'fa ny mahatsara ny fahalalana dia izao: Maharo ny ain’izay manana azy ny fahendrena.'
  '13':
  - type: text
    content: Diniho ny asan’Andriamanitra;
  - type: text
    content: fa iza moa no mahahitsy izay nataony meloka?
  '14':
  - type: text
    content: Amin’ny andro mahafaly dia mifalia
  - type: text
    content: ary amin’ny andro mahory dia mieritrereta;
  - type: text
    content: fa Andriamanitra no nanao ny iray, toy ny nanaovany ny iray koa,
  - type: text
    content: mba tsy hahitan’ny olombelona izay ho avy any aorianany akory.
  '15':
  - type: text
    content: 'Izao rehetra izao dia efa hitako tamin’ny androko mandalo foana:'
  - type: text
    content: misy marina maty noho ny fahamarinany
  - type: text
    content: ary misy meloka ela velona noho ny faharatsiany.
  '16':
  - type: text
    content: Aza marina loatra
  - type: text
    content: ary aza miseho ho hendry loatra; nahoana no hosimbanao ny tenanao?
  '17':
  - type: text
    content: Aza ratsy loatra
  - type: text
    content: ary aza adala; nahoana no ho faty raha tsy mbola tonga ny andronao?
  '18':
  - type: text
    content: Tsara raha mitana iroa ianao, nefa aza mampiala ny tananao amin’itsy;
  - type: text
    content: fa izay matahotra an’Andriamanitra dia ho afaka amin’izany rehetra izany.
  '19':
  - type: text
    content: Ny fahendrena dia mahatonga ny hendry hahery kokoa noho ny mpanapaka folo ao an-tanàna.
  '2':
  - type: text
    content: Tsara ny mankany amin’ny trano misy fisaonana noho ny mankany amin’ny trano misy fanasana,
  - type: text
    content: fa ho amin’io no hiafaran’ny olombelona rehetra,
  - type: text
    content: koa ny velona dia handatsaka izany am-po.
  '20':
  - type: text
    content: Fa tsy misy olona marina ambonin’ny tany izay manao ny tsara ka tsy manota.
  '21':
  - type: text
    content: 'Aza mihaino izay teny rehetra tenenina, fandrao handre ny mpanomponao manozona anao ianao '
  '22':
  - type: text
    content: satria fantatrao tsara fa matetika ny tenanao koa dia mba efa nanozona ny sasany ihany.
  - type: heading
    content: Vitsy ny olona tonga amin’ny fahendrena
  '23':
  - type: text
    content: Izany rehetra izany dia nozahako toetra tamin’ny fahendrena.
  - type: text
    content: 'Hoy aho: Ho hendry aho.'
  - type: text
    content: Kanjo lavitra ahy izany.
  '24':
  - type: text
    content: Eny, lavitra ny zava-misy; lalina dia lalina! Iza no hahatakatra azy?
  '25':
  - type: text
    content: Nitodika aho ka nampiasaiko ny saiko mba hahalala, handinika ary hitady fahendrena sy izay anton’ny zavatra rehetra
  - type: text
    content: ka hahafantatra ny haratsiam-panahy ho fahadalana, ary ny fahadalana ho fahaverezan-tsaina.
  '26':
  - type: text
    content: Ary hitako fa mangidy noho ny fahafatesana
  - type: text
    content: ny vehivavy, rehefa izy no fandrika
  - type: text
    content: ary harato ny fony, sady famatorana ny tanany;
  - type: text
    content: nefa izay olona ankasitrahan’Andriamanitra dia ho afa-mandositra azy
  - type: text
    content: fa ny mpanota ihany no ho azony.
  '27':
  - type: text
    content: Indro, izany no hitako, hoy i Mpitoriteny,
  - type: text
    content: rehefa nandinika ny zavatra tsirairay aho mba hahitako izay antony.
  '28':
  - type: text
    content: Izay mbola notadiaviko koa nefa tsy hitako,
  - type: text
    content: 'dia izao: Lehilahy iray no hitako ho marina tao amin’ny arivo;'
  - type: text
    content: fa tao amin’ny vehivavy rehetra dia tsy nisy hitako na dia iray akory aza.
  '29':
  - type: text
    content: 'Indro, izao ihany no hitako:'
  - type: text
    content: Nataon’Andriamanitra mahitsy ny olombelona,
  - type: text
    content: fa izy tenany ihany no namorona tetika maro.
  '3':
  - type: text
    content: Tsara ny alahelo noho ny hehy,
  - type: text
    content: fa na dia malahelo aza ny tarehy, mety ho tsara ihany ny fo.
  '4':
  - type: text
    content: Ny fon’ny hendry dia ao amin’ny trano misy fisaonana,
  - type: text
    content: fa ny fon’ny adala kosa dia any amin’ny trano misy fifaliana.
  '5':
  - type: text
    content: Tsara ny mihaino ny anatra mafy ataon’ny hendry
  - type: text
    content: noho ny mihaino ny hiran’ny adala.
  '6':
  - type: text
    content: Toy ny firefodrefotry ny tsilo ao ambanin’ny vilany,
  - type: text
    content: dia tahaka izany ny fihomehezan’ny adala.
  - type: text
    content: Izany koa aza dia zava-poana.
  '7':
  - type: text
    content: Ny fampahoriana dia mahavery saina ny hendry,
  - type: text
    content: ary ny kolikoly dia mahasimba ny fo.
  '8':
  - type: text
    content: Tsara ny fiafaran’ny raharaha iray noho ny fiandohany;
  - type: text
    content: tsara ny mahari-po noho ny miavonavona.
  '9':
  - type: text
    content: Aoka tsy halaky tezitra ianao,
  - type: text
    content: fa ny fahatezerana dia milafika ao am-pon’ny adala.
