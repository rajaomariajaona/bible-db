document_id: ECC.7
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Anatra sy tenim-pahendrena samihafa
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Tsara ny laza soa noho ny menaka manitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny andro ahaterahana dia tsy mahaleo ny andro ahafatesana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Tsara ny mankany amin’ny trano misy fisaonana noho ny mankany amin’ny trano misy fanasana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ho amin’io no hiafaran’ny olombelona rehetra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: koa ny velona dia handatsaka izany am-po.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Tsara ny alahelo noho ny hehy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa na dia malahelo aza ny tarehy, mety ho tsara ihany ny fo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ny fon’ny hendry dia ao amin’ny trano misy fisaonana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny fon’ny adala kosa dia any amin’ny trano misy fifaliana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Tsara ny mihaino ny anatra mafy ataon’ny hendry
- type: usfm
  marker: q1
  children:
  - type: text
    text: noho ny mihaino ny hiran’ny adala.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Toy ny firefodrefotry ny tsilo ao ambanin’ny vilany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia tahaka izany ny fihomehezan’ny adala.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izany koa aza dia zava-poana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ny fampahoriana dia mahavery saina ny hendry,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny kolikoly dia mahasimba ny fo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Tsara ny fiafaran’ny raharaha iray noho ny fiandohany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsara ny mahari-po noho ny miavonavona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Aoka tsy halaky tezitra ianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny fahatezerana dia milafika ao am-pon’ny adala.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Aza milaza hoe: Ahoana no nahatsara ny andro taloha noho ny ankehitriny?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa tsy avy amin’ny fahendrena no anontanianao izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Tsara tahaka ny lova ny fahendrena,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady zava-mahasoa ho an’izay mahita masoandro izany
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: satria fialokalofana ny fahendrena ary fialokalofana ny vola;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'fa ny mahatsara ny fahalalana dia izao: Maharo ny ain’izay manana azy ny fahendrena.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Diniho ny asan’Andriamanitra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa iza moa no mahahitsy izay nataony meloka?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Amin’ny andro mahafaly dia mifalia
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary amin’ny andro mahory dia mieritrereta;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa Andriamanitra no nanao ny iray, toy ny nanaovany ny iray koa,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba tsy hahitan’ny olombelona izay ho avy any aorianany akory.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Izao rehetra izao dia efa hitako tamin’ny androko mandalo foana:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: misy marina maty noho ny fahamarinany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary misy meloka ela velona noho ny faharatsiany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Aza marina loatra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary aza miseho ho hendry loatra; nahoana no hosimbanao ny tenanao?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Aza ratsy loatra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary aza adala; nahoana no ho faty raha tsy mbola tonga ny andronao?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Tsara raha mitana iroa ianao, nefa aza mampiala ny tananao amin’itsy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa izay matahotra an’Andriamanitra dia ho afaka amin’izany rehetra izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ny fahendrena dia mahatonga ny hendry hahery kokoa noho ny mpanapaka folo ao an-tanàna.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Fa tsy misy olona marina ambonin’ny tany izay manao ny tsara ka tsy manota.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Aza mihaino izay teny rehetra tenenina, fandrao handre ny mpanomponao manozona anao ianao '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: satria fantatrao tsara fa matetika ny tenanao koa dia mba efa nanozona ny sasany ihany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Vitsy ny olona tonga amin’ny fahendrena
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Izany rehetra izany dia nozahako toetra tamin’ny fahendrena.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Hoy aho: Ho hendry aho.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Kanjo lavitra ahy izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Eny, lavitra ny zava-misy; lalina dia lalina! Iza no hahatakatra azy?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Nitodika aho ka nampiasaiko ny saiko mba hahalala, handinika ary hitady fahendrena sy izay anton’ny zavatra rehetra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hahafantatra ny haratsiam-panahy ho fahadalana, ary ny fahadalana ho fahaverezan-tsaina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Ary hitako fa mangidy noho ny fahafatesana
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny vehivavy, rehefa izy no fandrika
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary harato ny fony, sady famatorana ny tanany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa izay olona ankasitrahan’Andriamanitra dia ho afa-mandositra azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny mpanota ihany no ho azony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Indro, izany no hitako, hoy i Mpitoriteny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: rehefa nandinika ny zavatra tsirairay aho mba hahitako izay antony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Izay mbola notadiaviko koa nefa tsy hitako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'dia izao: Lehilahy iray no hitako ho marina tao amin’ny arivo;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa tao amin’ny vehivavy rehetra dia tsy nisy hitako na dia iray akory aza.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Indro, izao ihany no hitako:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nataon’Andriamanitra mahitsy ny olombelona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa izy tenany ihany no namorona tetika maro.
