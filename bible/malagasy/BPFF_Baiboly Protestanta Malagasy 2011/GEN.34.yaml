document_id: GEN.34,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny valifaty nataon’i Simeona sy i Levy
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Indray andro dia lasa i Dina, zanakavavin’i Lea naterany tamin’i Jakoba, mba hizaha ny zazavavy tompon-tany. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia hiara-monina aminay ianareo; ary indro ny tany eo anoloanareo; monena eo ary mivarota ao, dia ho isan’ny tompon-tany ianareo.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy i Sekema tamin’ny rain’i Dina sy ny anadahiny: Aoka mba hahita fitia eto imasonareo aho, ary izay lazainareo amiko dia homeko. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Na dia harena be sy zavatra betsaka aza no asainareo homeko dia homeko ihany araka izay holazainareo amiko; fa omeo ahy Razazavavy ho vadiko! '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ireo zanak’i Jakoba dia namaly an’i Sekema sy i Hamora rainy tamin’ny fitaka sy hafetsena noho ny nandotoany an’i Dina anabaviny. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy izy ireo taminy: Tsy azonay atao ny hanome ny anabavinay ho an’izay lehilahy tsy voafora; fahavetavetana aminay izany! '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao ihany no azonay hanekena anareo: Raha ho tahaka anay ianareo ka hoforana ny lehilahy rehetra aminareo '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia homenay anareo ny zanakay vavy ary ny zanakareo vavy kosa dia halainay ho anay, dia hiara-monina aminareo izahay ka ho firenena iray isika. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa raha tsy hanaraka ny teninay ianareo ka tsy hoforana dia halainay ny zanakay vavy ka handeha izahay. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nahafaly an’i Hamora sy i Sekema zanany ireo teniny ireo. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tsy nitaredretra ilay zatovo hanatanteraka izany zavatra izany satria naniry loatra ny zanakavavin’i Jakoba izy. Ary izy no nalaza indrindra tamin’izay rehetra tao an-tranon’ny rainy.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nahita azy i Sekema, zanakalahin’i Hamora hivita, andriana tamin’izany tany izany; dia naka azy izy ary nandry taminy ka nampietry azy. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa nankeo amin’ny vavahadin’ny tanànany i Hamora sy i Sekema zanany lahy dia niteny tamin’ny mponina tao an-tanànany hoe: '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ireo olona ireo dia mipetraka tsara eto amintsika ka aoka honina eto amin’ny tany sy hivarotra eto izy; fa indro ny tany dia malalaka eo anoloany! Halaintsika ho vady ny zanany vavy ary ny zanatsika vavy kosa dia homentsika azy. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nefa izao ihany no hanaovan’ireo lehilahy ireo fanekena amintsika ka hiarahantsika monina ho firenena iray: Mba hoforana koa, hono, ny lehilahy rehetra eto amintsika tahaka izay namorana azy ireo. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsy ho antsika va ny omby aman’ondriny sy ny fananany mbamin’ny biby fiompiny rehetra? Aoka hanaiky ny teniny ihany isika, dia hiara-monina amintsika izy. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nanaiky ny tenin’i Hamora sy i Sekema zanany izay rehetra nivoaka ny vavahadin’ny tanànany. Noforana ny lehilahy rehetra, dia izay rehetra nivoaka ny vavahadin’ny tanànany.
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa tamin’ny andro fahatelo, rehefa ilay nanaintaina mafy iny izy ireo, dia samy nitondra ny sabany ny zanak’i Jakoba roa lahy, dia i Simeona sy i Levy, anadahin’i Dina, ka niakatra mora tao an-tanàna dia namono ny lehilahy rehetra tao. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Novonoiny tamin’ny lelan-tsabatra koa i Hamora sy i Sekema zanany lahy, dia naka an’i Dina tao an-tranon’i Sekema izy ireo vao lasa nandeha. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nankeny amin’ny faty ny zanak’i Jakoba ka namabo ny tanàna noho ny nandotoan’i Sekema ny anabaviny. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nalainy avokoa ny ondry aman’osiny, ny ombiny sy ny borikiny mbamin’izay rehetra tao an-tanàna sy izay rehetra tany an-tsaha; '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: nobaboiny ny fananany rehetra sy ny zanany madinika rehetra ary ny vadiny ka nofaohiny avokoa mbamin’izay rehetra tany an-trano.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raiki-pitia tamin’i Dina, zanakavavin’i Jakoba, ny fony; eny, tia an-dRazazavavy izy ka niteny malefaka taminy. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy i Jakoba tamin’i Simeona sy i Levy: Nahatonga loza amiko ianareo, fa nomaimboinareo eto amin’ny mponina amin’ny tany aho, dia amin’ny Kananita sy ny Perizita. Olom-bitsy anefa aho, koa hiangona hamely ahy izy ireo ka hamono ahy; ary ho fongotra aho, dia izaho sy ny ankohonako. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy kosa ireo: Moa va ny anabavinay havela hatao toy ny vehivavy janga?'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary niteny tamin’i Hamora rainy i Sekema hoe: Alao ho vadiko Razazavavy io. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ren’i Jakoba fa nandoto an’i Dina zanany vavy izy; nefa mbola niandry ny omby aman’ondriny tany an-tsaha ireo zanany lahy, dia nangina aloha i Jakoba mandra-pahatongan’izy ireo.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Roso nankany amin’i Jakoba ary i Hamora, rain’i Sekema, hidinika taminy. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa tonga avy tany an-tsaha ireo zanak’i Jakoba ka nandre izany dia nalahelo sady tezitra mafy, satria nahavita izay fahadalana be teo amin’ny Israely i Sekema tamin’ny nandriany tamin’ny zanakavavin’i Jakoba. Zavatra tsy fanao izany. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nidinika tamin’ireo i Hamora hoe: I Sekema zanako lahy dia raiki-pitia amin’ny zanakareo vavy; koa miangavy anareo aho, mba omeo azy ho vadiny izy. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aoka hifanambady anaka isika: Omeo anay ny zanakareo vavy, ary alao ho anareo kosa ny zanakay vavy. '
