document_id: ROM.8,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fiainana araka ny Fanahin’Andriamanitra
  - type: text
    content: 'Koa amin’izany dia tsy misy fanamelohana ho an’izay ao amin’i '
  - type: text
    content: Kristy
  - type: text
    content: ' Jesosy. '
  '10':
  - type: text
    content: 'Fa raha Kristy no mitoetra ao anatinareo, na dia maty ihany aza ny tena noho ny ota dia fiainana kosa ny an’ny Fanahy noho ny fahamarinana. '
  '11':
  - type: text
    content: Ary raha ny Fanahin’Izay nanangana an’i Jesosy tamin’ny maty no mitoetra ao anatinareo, dia Izay nanangana an’i Kristy Jesosy tamin’ny maty no hamelona ny tenanareo mety maty amin’ny Fanahiny izay mitoetra ao anatinareo.
  '12':
  - type: text
    content: 'Koa amin’izany, ry rahalahy, dia mpitrosa isika, tsy amin’ny nofo anefa ka ho velona araka ny nofo. '
  '13':
  - type: text
    content: 'Raha velona araka ny nofo ianareo dia tsy maintsy maty; fa raha ny Fanahy kosa no amonoanareo ny asan’ny tena dia ho velona ianareo. '
  '14':
  - type: text
    content: 'Fa izay tarihin’ny Fanahin’Andriamanitra no zanak’Andriamanitra. '
  '15':
  - type: text
    content: 'Fa tsy nandray ny fanahim-pahandevozana ho amin’ny tahotra indray ianareo, fa nandray ny fanahin’ny fananganana anaka, izay ahazoantsika miantso hoe: Aba! Ray ô! '
  '16':
  - type: text
    content: 'Izy Fanahy dia miara-milaza amin’ny fanahintsika fa zanak’Andriamanitra isika. '
  '17':
  - type: text
    content: Raha zanaka dia mpandova; eny, sady mpandova an’Andriamanitra isika no mpiray lova amin’i Kristy koa, raha miara-miaritra Aminy mba hiara-manam-boninahitra Aminy koa.
  - type: heading
    content: Ny voninahitra ho avy
  '18':
  - type: text
    content: 'Eny, heveriko fa ny fahoriana amin’izao fotoana ankehitriny izao dia tsy mendrika oharina amin’ny voninahitra izay haseho amintsika. '
  '19':
  - type: text
    content: 'Fa izao zavatra ary rehetra izao dia samy maniry fatratra ny hampisehoana ireo zanak’Andriamanitra. '
  '2':
  - type: text
    content: Fa ao amin’i Kristy Jesosy ny lalànan’ny Fanahin’aina no nahafaka ahy tamin’ny lalànan’ny fahotana sy ny fahafatesana.
  '20':
  - type: text
    content: 'Fa izao zavatra ary rehetra izao dia nampanekena ho zava-poana, nefa tsy noho ny sitrapony fa noho Izay nampanaiky azy, amin’ny fanantenana. '
  '21':
  - type: text
    content: 'Izao zavatra ary rehetra izao koa dia hovotsorana amin’ny fahandevozana, dia ny fahalovana, ho amin’ny fahafahana be voninahitra izay an’ireo zanak’Andriamanitra. '
  '22':
  - type: text
    content: 'Fa fantatsika fa mandraka ankehitriny, izao zavatra ary rehetra izao dia miara-misento sy miara-marary toy izay efa hiteraka. '
  '23':
  - type: text
    content: 'Tsy izany ihany, fa isika koa; eny, fa na dia manana ny voaloham-bokatry ny Fanahy aza, isika koa dia misento ato anatintsika, miandry ny fananganana anaka, dia ny fanavotana ny tenantsika. '
  '24':
  - type: text
    content: 'Fa ny fanantenana no namonjena antsika; nefa ny fanantenana hita maso dia tsy mba fanantenana intsony; izay hita va mbola azo antenaina ihany? '
  '25':
  - type: text
    content: Fa raha manantena izay tsy mbola hitantsika isika dia miandry amin’ny faharetana.
  '26':
  - type: text
    content: 'Toy izany koa, ny Fanahy no mamonjy ny fahalementsika, satria tsy fantatsika izay vavaka tokony hataontsika. Fa ny Fanahy no mangataka ho antsika amin’ny fitarainana tsy hay tononina. '
  '27':
  - type: text
    content: Ary Ilay mandinika ny fo no mahalala izay hevitry ny Fanahy, satria araka an’Andriamanitra ny fifonany ho an’ny olona masina.
  '28':
  - type: text
    content: 'Fantatsika koa fa ny zavatra rehetra dia miara-miasa hahasoa izay tia an’Andriamanitra, dia izay voaantso araka ny fikasany rahateo. '
  '29':
  - type: text
    content: 'Satria ireo izay fantany mialoha no notendreny koa hitovy endrika amin’ny Zanany, mba ho Lahimatoa amin’ny rahalahy maro Izy. '
  '3':
  - type: text
    content: 'Fa izay tsy hain’ny lalàna, satria ny nofo no nanalemy azy, dia vitan’Andriamanitra tamin’ny nanirahany ny Zanany, naka ny endriky ny nofo ota sy ny amin’ny ota ka nanameloka ny ota tao amin’ny nofo, '
  '30':
  - type: text
    content: Izay notendreny mialoha no nantsoiny koa; izay nantsoiny no nohamarininy koa; ary izay nohamarininy no nomeny voninahitra koa.
  - type: heading
    content: Mpandresy ny fitiavan’Andriamanitra
  '31':
  - type: text
    content: 'Inona ary no holazaintsika ny amin’izany zavatra izany? Raha Andriamanitra no momba antsika, iza no hahatohitra antsika? '
  '32':
  - type: text
    content: 'Izy izay tsy niaro ny Zanany lahy fa nanolotra Azy hamonjy antsika rehetra, tsy homeny antsika miaraka Aminy maimaimpoana koa va ny zavatra rehetra? '
  '33':
  - type: text
    content: 'Iza no hiampanga ny olom-boafidin’Andriamanitra? Andriamanitra no manamarina azy! '
  '34':
  - type: text
    content: 'Iza no manameloka? '
  - type: text
    content: Kristy
  - type: text
    content: ' Jesosy no efa maty! Eny, mihoatra noho izany aza, nitsangana tamin’ny maty koa Izy ka mitoetra eo ankavanan’Andriamanitra ary mifona ho antsika. '
  '35':
  - type: text
    content: 'Iza no hahasaraka antsika amin’ny fitiavan’i Kristy? Fahoriana va, sa tebiteby, sa fanenjehana, sa mosary, sa fitanjahana, sa loza, sa sabatra? '
  '36':
  - type: text
    content: 'Araka ny voasoratra hoe:'
  - type: text
    content: «Fa noho ny aminao no amonoana anay mandritra ny andro;
  - type: text
    content: toy ny ondry hovonoina no niheverana anay» (Sal 44.22).
  '37':
  - type: text
    content: 'Kanefa amin’izany rehetra izany dia mihoatra noho ny mpandresy isika amin’ny alalan’Ilay tia antsika. '
  '38':
  - type: text
    content: 'Eny, matoky aho fa na fahafatesana, na fiainana, na anjely, na ireo fahefana, na zavatra ankehitriny, na zavatra ho avy, na hery, '
  '39':
  - type: text
    content: na ny ambony, na ny ambany, na inona na inona amin’izao zavatra ary rehetra izao dia tsy hahasaraka antsika amin’ny fitiavan’Andriamanitra izay ao amin’i Kristy Jesosy Tompontsika.
  '4':
  - type: text
    content: 'mba hahatanteraka ny fahamarinana ilain’ny lalàna amintsika izay tsy mandeha araka ny nofo fa araka ny Fanahy. '
  '5':
  - type: text
    content: 'Fa izay araka ny nofo dia mihevitra izay zavatry ny nofo, fa izay araka ny Fanahy kosa dia mihevitra izay zavatry ny Fanahy. '
  '6':
  - type: text
    content: 'Ny fihevitry ny nofo dia fahafatesana, fa fiainana sy fiadanana kosa no fihevitry ny Fanahy, '
  '7':
  - type: text
    content: 'satria fandrafiana an’Andriamanitra ny fihevitry ny nofo; fa tsy manaiky ny lalànan’Andriamanitra izy sady tsy hainy akory izany. '
  '8':
  - type: text
    content: Ary izay ao amin’ny nofo dia tsy mahay manao ny sitrapon’Andriamanitra.
  '9':
  - type: text
    content: 'Fa ianareo dia tsy ao amin’ny nofo fa ao amin’ny Fanahy, raha ny Fanahin’Andriamanitra no mitoetra ao anatinareo. Raha misy kosa tsy manana ny Fanahin’i Kristy dia tsy Azy izy. '
