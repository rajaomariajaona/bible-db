document_id: ROM.8,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fiainana araka ny Fanahin’Andriamanitra
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Koa amin’izany dia tsy misy fanamelohana ho an’izay ao amin’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ' Jesosy. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Fa raha Kristy no mitoetra ao anatinareo, na dia maty ihany aza ny tena noho ny ota dia fiainana kosa ny an’ny Fanahy noho ny fahamarinana. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Ary raha ny Fanahin’Izay nanangana an’i Jesosy tamin’ny maty no mitoetra ao anatinareo, dia Izay nanangana an’i Kristy Jesosy tamin’ny maty no hamelona ny tenanareo mety maty amin’ny Fanahiny izay mitoetra ao anatinareo.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Koa amin’izany, ry rahalahy, dia mpitrosa isika, tsy amin’ny nofo anefa ka ho velona araka ny nofo. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Raha velona araka ny nofo ianareo dia tsy maintsy maty; fa raha ny Fanahy kosa no amonoanareo ny asan’ny tena dia ho velona ianareo. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Fa izay tarihin’ny Fanahin’Andriamanitra no zanak’Andriamanitra. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Fa tsy nandray ny fanahim-pahandevozana ho amin’ny tahotra indray ianareo, fa nandray ny fanahin’ny fananganana anaka, izay ahazoantsika miantso hoe: Aba! Ray ô! '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Izy Fanahy dia miara-milaza amin’ny fanahintsika fa zanak’Andriamanitra isika. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Raha zanaka dia mpandova; eny, sady mpandova an’Andriamanitra isika no mpiray lova amin’i Kristy koa, raha miara-miaritra Aminy mba hiara-manam-boninahitra Aminy koa.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny voninahitra ho avy
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Eny, heveriko fa ny fahoriana amin’izao fotoana ankehitriny izao dia tsy mendrika oharina amin’ny voninahitra izay haseho amintsika. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Fa izao zavatra ary rehetra izao dia samy maniry fatratra ny hampisehoana ireo zanak’Andriamanitra. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Fa ao amin’i Kristy Jesosy ny lalànan’ny Fanahin’aina no nahafaka ahy tamin’ny lalànan’ny fahotana sy ny fahafatesana.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Fa izao zavatra ary rehetra izao dia nampanekena ho zava-poana, nefa tsy noho ny sitrapony fa noho Izay nampanaiky azy, amin’ny fanantenana. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Izao zavatra ary rehetra izao koa dia hovotsorana amin’ny fahandevozana, dia ny fahalovana, ho amin’ny fahafahana be voninahitra izay an’ireo zanak’Andriamanitra. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Fa fantatsika fa mandraka ankehitriny, izao zavatra ary rehetra izao dia miara-misento sy miara-marary toy izay efa hiteraka. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Tsy izany ihany, fa isika koa; eny, fa na dia manana ny voaloham-bokatry ny Fanahy aza, isika koa dia misento ato anatintsika, miandry ny fananganana anaka, dia ny fanavotana ny tenantsika. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Fa ny fanantenana no namonjena antsika; nefa ny fanantenana hita maso dia tsy mba fanantenana intsony; izay hita va mbola azo antenaina ihany? '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Fa raha manantena izay tsy mbola hitantsika isika dia miandry amin’ny faharetana.
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Toy izany koa, ny Fanahy no mamonjy ny fahalementsika, satria tsy fantatsika izay vavaka tokony hataontsika. Fa ny Fanahy no mangataka ho antsika amin’ny fitarainana tsy hay tononina. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Ary Ilay mandinika ny fo no mahalala izay hevitry ny Fanahy, satria araka an’Andriamanitra ny fifonany ho an’ny olona masina.
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Fantatsika koa fa ny zavatra rehetra dia miara-miasa hahasoa izay tia an’Andriamanitra, dia izay voaantso araka ny fikasany rahateo. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Satria ireo izay fantany mialoha no notendreny koa hitovy endrika amin’ny Zanany, mba ho Lahimatoa amin’ny rahalahy maro Izy. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Fa izay tsy hain’ny lalàna, satria ny nofo no nanalemy azy, dia vitan’Andriamanitra tamin’ny nanirahany ny Zanany, naka ny endriky ny nofo ota sy ny amin’ny ota ka nanameloka ny ota tao amin’ny nofo, '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Izay notendreny mialoha no nantsoiny koa; izay nantsoiny no nohamarininy koa; ary izay nohamarininy no nomeny voninahitra koa.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mpandresy ny fitiavan’Andriamanitra
    marker-yv: yv-h
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Inona ary no holazaintsika ny amin’izany zavatra izany? Raha Andriamanitra no momba antsika, iza no hahatohitra antsika? '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Izy izay tsy niaro ny Zanany lahy fa nanolotra Azy hamonjy antsika rehetra, tsy homeny antsika miaraka Aminy maimaimpoana koa va ny zavatra rehetra? '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Iza no hiampanga ny olom-boafidin’Andriamanitra? Andriamanitra no manamarina azy! '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Iza no manameloka? '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ' Jesosy no efa maty! Eny, mihoatra noho izany aza, nitsangana tamin’ny maty koa Izy ka mitoetra eo ankavanan’Andriamanitra ary mifona ho antsika. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Iza no hahasaraka antsika amin’ny fitiavan’i Kristy? Fahoriana va, sa tebiteby, sa fanenjehana, sa mosary, sa fitanjahana, sa loza, sa sabatra? '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Araka ny voasoratra hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Fa noho ny aminao no amonoana anay mandritra ny andro;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toy ny ondry hovonoina no niheverana anay» (Sal 44.22).
  '37':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Kanefa amin’izany rehetra izany dia mihoatra noho ny mpandresy isika amin’ny alalan’Ilay tia antsika. '
  '38':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Eny, matoky aho fa na fahafatesana, na fiainana, na anjely, na ireo fahefana, na zavatra ankehitriny, na zavatra ho avy, na hery, '
  '39':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: na ny ambony, na ny ambany, na inona na inona amin’izao zavatra ary rehetra izao dia tsy hahasaraka antsika amin’ny fitiavan’Andriamanitra izay ao amin’i Kristy Jesosy Tompontsika.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'mba hahatanteraka ny fahamarinana ilain’ny lalàna amintsika izay tsy mandeha araka ny nofo fa araka ny Fanahy. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Fa izay araka ny nofo dia mihevitra izay zavatry ny nofo, fa izay araka ny Fanahy kosa dia mihevitra izay zavatry ny Fanahy. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ny fihevitry ny nofo dia fahafatesana, fa fiainana sy fiadanana kosa no fihevitry ny Fanahy, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'satria fandrafiana an’Andriamanitra ny fihevitry ny nofo; fa tsy manaiky ny lalànan’Andriamanitra izy sady tsy hainy akory izany. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Ary izay ao amin’ny nofo dia tsy mahay manao ny sitrapon’Andriamanitra.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Fa ianareo dia tsy ao amin’ny nofo fa ao amin’ny Fanahy, raha ny Fanahin’Andriamanitra no mitoetra ao anatinareo. Raha misy kosa tsy manana ny Fanahin’i Kristy dia tsy Azy izy. '
