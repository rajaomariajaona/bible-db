document_id: 1SA.31
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny ady tao Gilboa; ny nahafatesan’i Saoly
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 1Tan 10.1-14
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary niady tamin’ny Israely ny Filistina. Dia nandositra teo anoloan’ny Filistina ny lehilahin’ny Israely ka niampatrampatra teny an-tendrombohitra Gilboa ny faty. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Nanenjika mafy an’i Saoly sy ny zanany ny Filistina ka matin’ny Filistina i Jonatana sy i Abinadaba ary i Malky-Soa, zanak’i Saoly. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Mafy tamin’i Saoly ny ady; nifanehatra tamin’ny mpandefa tsipìka izy ka nangorohoro tokoa noho ny mpandefa tsipìka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dia hoy i Saoly tamin’ny mpitondra ny fiadiany: Tsoahy ny sabatrao ka tsatohy miboroaka aho, fandrao avy irerỳ tsy mifora irerỳ ka hotsatohany miboroaka aho, dia hataony ho fihomehezana. Nefa tsy nety ny mpitondra ny fiadiany fa natahotra loatra. Dia nalain’i Saoly ny sabatra ka nianjerany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Rehefa hitan’ny mpitondra ny fiadiany fa maty i Saoly dia mba nianjera tamin’ny sabany koa izy ka niara-maty taminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia niara-maty androtr’izay ihany i Saoly sy ny zanany telo lahy sy ny mpitondra ny fiadiany ary ny olony rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Nony hitan’ny lehilahin’ny Israely teny andafin’ny lohasaha sy teny andafin’i Jordana fa nandositra ny lehilahin’ny Israely, ary maty i Saoly sy ny zanany, dia nandositra niala tao an-tanàna izy ireo, ary tonga ny Filistina ka nonina tao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Nony ampitso, raha tonga haka ny zavatra teo amin’ny maty ny Filistina, dia nahita an’i Saoly sy ny zanany telo lahy niampatrampatra teo an-tendrombohitra Gilboa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Dia notapahiny ny lohany sady nalainy ny fiadiany ary nandefa iraka tany amin’ny tanin’ny Filistina manodidina izy mba hanambara izany zavatra mahafaly izany ao amin’ny tranon’ny sampiny sy amin’ny olona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dia napetrany tao amin’ny tranon’ireo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Astarta
  - type: text
    text: ' ny fiadiany; ary ny fatiny dia nofantsihany teo amin’ny mandan’i Bety-Sana.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Nony ren’ny mponina tany Jabesy-Gileada izay nataon’ny Filistina tamin’i Saoly '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'dia niainga ny lehilahy mahery rehetra ka nandeha nandritra ny alina ary naka ny fatin’i Saoly sy ny fatin’ny zanany teo amin’ny mandan’i Bety-Sana; ary tonga tao Jabesy izy ireo ka nandoro azy tao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ary noentiny ny taolany ka naleviny tao ambanin’ilay hazo tamarisika tao Jabesy, dia nifady hanina hafitoana izy ireo.
