document_id: JOB.40,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny teny voalohany navalin’i Joba
  - type: text
    content: 'Ary NY TOMPO mbola niteny tamin’i Joba hoe:'
  '10':
  - type: text
    content: Miravaha fahamboniana sy rehareha ianao
  - type: text
    content: ary mitafia famirapiratana sy voninahitra!
  '11':
  - type: text
    content: Avelao hihanaka ny fahatezeranao mirehitra;
  - type: text
    content: jereo ny mpiavonavona rehetra ka ampietreo!
  '12':
  - type: text
    content: Eny, jereo ny mpiavonavona rehetra ka aongany!
  - type: text
    content: Hoseo eo amin’ny fitoerany ihany ny ratsy fanahy.
  '13':
  - type: text
    content: Asitriho ao amin’ny vovoka avokoa izy rehetra;
  - type: text
    content: sarony ao amin’ny maizina ny tavany!
  '14':
  - type: text
    content: Fa Izaho kosa dia hidera anao
  - type: text
    content: satria mahavonjy anao ny tananao havanana.
  - type: heading
    content: Ny behemota
  '15':
  - type: text
    content: Indro ny behemota
  - type: note
    content: Biby lehibe ao anaty rano, toy ny lalomena.
  - type: text
    content: ', izay nataoko tahaka ny nanaovako anao ihany!'
  - type: text
    content: Mihinana ahitra tahaka ny omby izy.
  '16':
  - type: text
    content: Indro, ao amin’ny andilany ny heriny
  - type: text
    content: ary ao amin’ny ozatra amin’ny kibony ny tanjany.
  '17':
  - type: text
    content: Henjaniny ho tahaka ny hazo sedera ny rambony,
  - type: text
    content: mifaniditriditra ny ozatra amin’ny feny.
  '18':
  - type: text
    content: Ny taolany dia tahaka ny fantsona varahina;
  - type: text
    content: eny, tahaka ny anjam-by ny taolany.
  '19':
  - type: text
    content: Voalohany amin’ny asan’Andriamanitra izy;
  - type: text
    content: ny Mpanao azy no nanome sabatra azy.
  '2':
  - type: text
    content: Hiady amin’ny Tsitoha va io mpanohitra Azy io?
  - type: text
    content: Aoka ny mpananatra an’Andriamanitra no hamaly!
  '20':
  - type: text
    content: Mamoaka hanina ho azy ny tendrombohitra
  - type: text
    content: izay ilalaovan’ny bibidia rehetra;
  '21':
  - type: text
    content: eo ambanin’ny hazo lota no andriany,
  - type: text
    content: any am-pierena anaty zozoro sy honahona.
  '22':
  - type: text
    content: Manalokaloka azy ny hazo lota
  - type: text
    content: ary ny hazomalahelo eny amoron’ny ony no manodidina azy.
  '23':
  - type: text
    content: Indro, na dia maria aza ny ony, tsy manahy izy;
  - type: text
    content: matoky izy na dia migorodana amin’ny vavany aza ny Jordana.
  '24':
  - type: text
    content: Moa misy mahasambotra azy va raha mihiratra ny masony?
  - type: text
    content: Raha azon’ny fandrika izy, misy mahatsindrona ny orony va?
  - type: heading
    content: Leviatana
  '25':
  - type: text
    content: 'Mahasarika an’i '
  - type: text
    content: leviatana
  - type: text
    content: ' amin’ny fintana va ianao,'
  - type: text
    content: na mahafatotra ny lelany amin’ny mahazaka?
  '26':
  - type: text
    content: Mahisy tady zozoro amin’ny orony va ianao,
  - type: text
    content: na mahaboroaka ny valanoranony amin’ny farango?
  '27':
  - type: text
    content: Hifona injato aman’arivo aminao va izy
  - type: text
    content: na hanao teny malefaka aminao?
  '28':
  - type: text
    content: Hanao fanekena aminao va izy?
  - type: text
    content: Azonao alaina ho andevonao mandrakizay va izy?
  '29':
  - type: text
    content: Hilalao azy tahaka ny filalao voronkely va ianao?
  - type: text
    content: Ary hamatotra azy ho an’ny zazavavy kely ao aminao va ianao?
  '3':
  - type: text
    content: 'Ary namaly NY TOMPO i Joba hoe:'
  '30':
  - type: text
    content: Hataon’ny mpaka hazandrano varotra va izy
  - type: text
    content: ka hotsinjarainy amin’ny mpivaro-mandeha?
  '31':
  - type: text
    content: Mahafeno lefom-pohy ny hodiny va ianao
  - type: text
    content: na firombaka amin’ny lohany?
  '32':
  - type: text
    content: 'Atehefo aminy ange ny tananao:'
  - type: text
    content: Raha tsaroanao ny ady dia tsy hanindroa intsony ianao!
  '4':
  - type: text
    content: Indro, tsinontsinona aho,
  - type: text
    content: koa inona no azoko avaly Anao?
  - type: text
    content: Hitampim-bava aho izao.
  '5':
  - type: text
    content: Efa niteny indray mandeha aho ka tsy hamaly intsony;
  - type: text
    content: eny, indroa aza, fa tsy hanampy teny intsony aho.
  - type: heading
    content: Mihevi-tena ho Andriamanitra va i Joba?
  '6':
  - type: text
    content: 'Dia niteny tamin’i Joba teo amin’ny tafio-drivotra NY TOMPO hoe:'
  '7':
  - type: text
    content: Misikìna tahaka ny lehilahy;
  - type: text
    content: fa hanadina anao Aho ka hampianatra Ahy ianao.
  '8':
  - type: text
    content: Hanaisotra ny fahamarinana Amiko tokoa va ianao?
  - type: text
    content: Hanameloka Ahy va ianao mba hanamarinana ny tenanao kosa?
  '9':
  - type: text
    content: Manan-tsandry tahaka ny an’Andriamanitra va ianao?
  - type: text
    content: Ary mahay mampikotrokotro-peo tahaka ny Azy va ianao?
