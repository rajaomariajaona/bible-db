document_id: JOB.40
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny teny voalohany navalin’i Joba
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary NY TOMPO mbola niteny tamin’i Joba hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Hiady amin’ny Tsitoha va io mpanohitra Azy io?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aoka ny mpananatra an’Andriamanitra no hamaly!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary namaly NY TOMPO i Joba hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Indro, tsinontsinona aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: koa inona no azoko avaly Anao?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hitampim-bava aho izao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Efa niteny indray mandeha aho ka tsy hamaly intsony;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, indroa aza, fa tsy hanampy teny intsony aho.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mihevi-tena ho Andriamanitra va i Joba?
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia niteny tamin’i Joba teo amin’ny tafio-drivotra NY TOMPO hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Misikìna tahaka ny lehilahy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa hanadina anao Aho ka hampianatra Ahy ianao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Hanaisotra ny fahamarinana Amiko tokoa va ianao?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hanameloka Ahy va ianao mba hanamarinana ny tenanao kosa?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Manan-tsandry tahaka ny an’Andriamanitra va ianao?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary mahay mampikotrokotro-peo tahaka ny Azy va ianao?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Miravaha fahamboniana sy rehareha ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mitafia famirapiratana sy voninahitra!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Avelao hihanaka ny fahatezeranao mirehitra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: jereo ny mpiavonavona rehetra ka ampietreo!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Eny, jereo ny mpiavonavona rehetra ka aongany!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hoseo eo amin’ny fitoerany ihany ny ratsy fanahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Asitriho ao amin’ny vovoka avokoa izy rehetra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: sarony ao amin’ny maizina ny tavany!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Fa Izaho kosa dia hidera anao
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria mahavonjy anao ny tananao havanana.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny behemota
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Indro ny behemota
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '40.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Biby lehibe ao anaty rano, toy ny lalomena.
    marker-yv: yv-n
  - type: text
    text: ', izay nataoko tahaka ny nanaovako anao ihany!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mihinana ahitra tahaka ny omby izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Indro, ao amin’ny andilany ny heriny
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ao amin’ny ozatra amin’ny kibony ny tanjany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Henjaniny ho tahaka ny hazo sedera ny rambony,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mifaniditriditra ny ozatra amin’ny feny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ny taolany dia tahaka ny fantsona varahina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, tahaka ny anjam-by ny taolany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Voalohany amin’ny asan’Andriamanitra izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny Mpanao azy no nanome sabatra azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Mamoaka hanina ho azy ny tendrombohitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay ilalaovan’ny bibidia rehetra;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: eo ambanin’ny hazo lota no andriany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: any am-pierena anaty zozoro sy honahona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Manalokaloka azy ny hazo lota
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny hazomalahelo eny amoron’ny ony no manodidina azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Indro, na dia maria aza ny ony, tsy manahy izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: matoky izy na dia migorodana amin’ny vavany aza ny Jordana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Moa misy mahasambotra azy va raha mihiratra ny masony?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Raha azon’ny fandrika izy, misy mahatsindrona ny orony va?
- type: usfm
  marker: s1
  children:
  - type: text
    text: Leviatana
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Mahasarika an’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: leviatana
  - type: text
    text: ' amin’ny fintana va ianao,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: na mahafatotra ny lelany amin’ny mahazaka?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Mahisy tady zozoro amin’ny orony va ianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: na mahaboroaka ny valanoranony amin’ny farango?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Hifona injato aman’arivo aminao va izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: na hanao teny malefaka aminao?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Hanao fanekena aminao va izy?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Azonao alaina ho andevonao mandrakizay va izy?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Hilalao azy tahaka ny filalao voronkely va ianao?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hamatotra azy ho an’ny zazavavy kely ao aminao va ianao?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Hataon’ny mpaka hazandrano varotra va izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hotsinjarainy amin’ny mpivaro-mandeha?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Mahafeno lefom-pohy ny hodiny va ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: na firombaka amin’ny lohany?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Atehefo aminy ange ny tananao:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Raha tsaroanao ny ady dia tsy hanindroa intsony ianao!
