document_id: NEH.11
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny anaran’ireo Jiosy tonga honina indray tao Jerosalema
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Nonina tany Jerosalema ny mpanapaka ny olona; ary ny olona sisa dia nanao antsapaka hahatonga ny ampahafolony honina any Jerosalema, tanàna masina, fa ny sivy toko kosa dia any amin’ny tanàna hafa ihany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ary nisaoran’ny olona ny lehilahy rehetra izay nanolo-tena honina any Jerosalema.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Izao no mpitondra ny fari-piadidiana izay nonina tany Jerosalema; fa ny tao an-tanànan’ny Joda dia samy nonina tao amin’ny taniny avy, tao an-tanànany, dia ny Israely, ny mpisorona, ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: levita
  - type: text
    text: ', ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Netinima
  - type: text
    text: ' ary ny taranaky ny mpanompon’i Solomona.'
- type: usfm
  marker: r
  children:
  - type: text
    text: 1Tan 9.3-17
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Tany Jerosalema no nonenan’ny sasany tamin’ny taranak’i Joda sy ny taranak’i Benjamina.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ny avy tamin’ny taranak’i Joda dia i Ataia, zanak’i Ozia, zanak’i Zakaria, zanak’i Amaria, zanak’i Sefatia, zanak’i Mahalalila, avy tamin’ny taranak’i Fareza; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'i Mahaseia, zanak’i Baroka, zanak’i Kola-Hoze, zanak’i Hazaia, zanak’i Adaia, zanak’i Joariba, zanak’i Zakaria, zanak’ilay Silonita. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ny taranak’i Fareza rehetra izay nonina tany Jerosalema dia lehilahy mahery valo amby enimpolo sy efajato.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Izao no taranak’i Benjamina: I Salo, zanak’i Mesolama, zanak’i Joeda, zanak’i Pedaia, zanak’i Kolaia, zanak’i Mahaseia, zanak’Itiela, zanak’i Jesaia; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'nanarakaraka azy i Gabay sy i Salay; valo amby roapolo sy sivinjato. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: I Joela, zanak’i Zikry, no mpifehy azy; ary i Joda, zanak’i Senoa, no lefiny teo amin’ny tanàna.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ny avy tamin’ny mpisorona dia i Jedaia, zanak’i Joariba, mbamin’i Jakina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'I Seraia, zanak’i Hilkia, zanak’i Mesolama, zanak’i Zadoka, zanak’i Meraiota, zanak’i Ahitoba, no mpanapaka ny tranon’Andriamanitra, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ny rahalahin’ireo izay mpanao ny raharaha tao an-trano dia roa amby roapolo sy valonjato. I Adaia, zanak’i Jerohama, zanak’i Pelalia, zanak’i Amzy, zanak’i Zakaria, zanak’i Pasora, zanak’i Malkia, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'mbamin’ny rahalahiny, izay samy lohan’ny fianakaviana, dia roa amby efapolo sy roanjato; i Amasay, zanak’i Azarela, zanak’i Ahazay, zanak’i Mesilemota, zanak’Imera '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: mbamin’ny rahalahin’ireo, dia lehilahy mahery valo amby roapolo amby zato; i Zabdiela, zanak’i Hagedolima, no mpifehy azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ny avy tamin’ny levita dia i Semaia, zanak’i Hasoba, zanak’i Azrikama, zanak’i Hasabia, zanak’i Bony; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'ary i Sabetahy sy i Jozabada, avy tamin’ny lehiben’ny levita, no tonian’ny raharaha teo ivelan’ny tranon’Andriamanitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'I Matania, zanak’i Mika, zanak’i Zabdy, zanak’i Asafa, no mpiventy hira, rehefa natao ny vavaka fisaorana; ary i Bakbokia no nanarakaraka teo amin’ny rahalahiny, izay vao i Abda, zanak’i Samoa, zanak’i Galala, zanak’i Jedotona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ny levita rehetra tao an-tanàna masina dia efatra amby valopolo sy roanjato.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ny mpiandry varavarana dia i Akoba sy i Talmona mbamin’ny rahalahiny izay niambina ny vavahady, roa amby fitopolo amby zato.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ny sisa tamin’ny Israely sy ny mpisorona ary ny levita kosa dia teny an-tanàna rehetra any Joda, samy tao amin’ny zarataniny avy ihany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ny Netinima kosa dia nonina tany Ofela; ary i Ziha sy i Gispa no lehibeny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ny mpifehy ny levita tany Jerosalema amin’ny raharaha momba ny tranon’Andriamanitra dia i Ozy, zanak’i Bany, zanak’i Hasabia, zanak’i Matania, zanak’i Mika, isan’ny mpihira, taranak’i Asafa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Fa ny didin’ny mpanjaka ny amin’ireo mpihira ireo dia ny hahazoany izay anjara tokony ho azy isanandro. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Ary i Petahia, zanak’i Mesezabela, isan’ny taranak’i Zera, zanak’i Joda, dia teo anilan’ny mpanjaka mba hitandrina ny raharaha rehetra ny amin’ny olona.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ireo mponina Jiosy tany ivelan’i Jerosalema
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ny amin’ny vohitra eny an-tsaha, dia ny sasany tamin’ny taranak’i Joda, no nonina tany Kiriata-Arba sy ny vohitra miankina aminy, tany Dibona sy ny vohitra miankina aminy, tany Jekabzela sy ny vohitra miankina aminy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'tany Josoa, Molada, Bety-Paleta, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Hazara-Soala ary Bery-Sheba sy ny vohitra miankina aminy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'tany Ziklaga sy Mekona ary ny vohitra miankina aminy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'tany Eny-Rimona, Zora, Jarmota, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Zanoa, Adolama ary ny vohitra miankina aminy, tany Lakisy sy ny sahany, ary tany Azeka sy ny vohitra miankina aminy. Nonina hatrany Bery-Sheba ka hatrany amin’ny lohasahan’i Hinoma izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ny taranak’i Benjamina kosa no hatrany Geba ka hatrany Mikmasy, Aia, Betela ary ny vohitra miankina aminy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'tany Anatota, Noba, Anania, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Hazora, Rama, Gitaima, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Hadida, Zeboima, Nebalata, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Loda, Ono, lohasahan’ny mpahay taozavatra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Nisy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: levita
  - type: text
    text: ', izay isan’ny antokon’ny Joda tao amin’ny Benjamina.'
