document_id: 2TH.1
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fiarahabana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'I Paoly sy i Silasy ary i Timoty no mamangy ny fiangonan’ny Tesaloniana, izay ao amin’Andriamanitra Raintsika sy Jesosy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' Tompo: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ho aminareo anie ny fahasoavana sy ny fiadanana avy amin’Andriamanitra Ray sy Jesosy Kristy Tompo.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fitsarana amin’ny andro hiavian’i Kristy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Tsy maintsy misaotra an’Andriamanitra mandrakariva izahay noho ny aminareo, ry rahalahy, fa mendrika hatao izany satria mandroso fatratra ny finoanareo ary mitombo ny fifankatiavanareo rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Reharehan’ny tenanay eny amin’ny fiangonan’Andriamanitra ianareo noho ny faharetanareo sy ny finoanareo amin’ny fanenjehana rehetra izay manjo anareo sy ny fahoriana izay iaretanareo. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Famantarana ny fitsarana marin’Andriamanitra ireny mba hatao ho mendrika ny fanjakan’Andriamanitra ianareo sady izany rahateo koa no iaretanareo. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Zavatra marina amin’Andriamanitra ny hamaly fahoriana izay mampahory anareo, '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'ary ny hanome fitsaharana anareo izay ampahorina kosa mbamin’ny tenanay, rehefa hiseho avy any an-danitra Jesosy Tompo, mbamin’ny anjeliny mahery, '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'amin’ny afo midedadeda, hamaly izay tsy mahalala an’Andriamanitra sy izay tsy manaiky ny Filazantsaran’i Jesosy Tompontsika. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ireny olona ireny no hiharan’ny famaliana marina, dia fahaverezana mandrakizay, lavitry ny fanatrehan’ny Tompo sy ny voninahitry ny heriny, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: rehefa tonga Izy mba hankalazaina eo amin’ny olony masina sy hampitolagaga azy eo amin’izay rehetra mino amin’izany andro izany satria ninoana ny fanambarànay taminareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Izany no angatahinay mandrakariva ho anareo mba hataon’Andriamanitsika ho mendrika ny fiantsoana ianareo, ary hotanterahiny amin’ny hery ny fankasitrahana tsara rehetra sy ny asan’ny finoana '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'mba hankalazaina ao aminareo ny anaran’i Jesosy Tompontsika ary ao Aminy kosa ianareo, araka ny fahasoavan’Andriamanitsika sy Jesosy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' Tompo.'
