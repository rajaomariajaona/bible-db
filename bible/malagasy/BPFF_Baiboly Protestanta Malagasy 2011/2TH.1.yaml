document_id: 2TH.1,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Fiarahabana
  - type: text
    content: 'I Paoly sy i Silasy ary i Timoty no mamangy ny fiangonan’ny Tesaloniana, izay ao amin’Andriamanitra Raintsika sy Jesosy '
  - type: text
    content: Kristy
  - type: text
    content: ' Tompo: '
  '10':
  - type: text
    content: rehefa tonga Izy mba hankalazaina eo amin’ny olony masina sy hampitolagaga azy eo amin’izay rehetra mino amin’izany andro izany satria ninoana ny fanambarànay taminareo.
  '11':
  - type: text
    content: 'Izany no angatahinay mandrakariva ho anareo mba hataon’Andriamanitsika ho mendrika ny fiantsoana ianareo, ary hotanterahiny amin’ny hery ny fankasitrahana tsara rehetra sy ny asan’ny finoana '
  '12':
  - type: text
    content: 'mba hankalazaina ao aminareo ny anaran’i Jesosy Tompontsika ary ao Aminy kosa ianareo, araka ny fahasoavan’Andriamanitsika sy Jesosy '
  - type: text
    content: Kristy
  - type: text
    content: ' Tompo.'
  '2':
  - type: text
    content: Ho aminareo anie ny fahasoavana sy ny fiadanana avy amin’Andriamanitra Ray sy Jesosy Kristy Tompo.
  - type: heading
    content: Ny fitsarana amin’ny andro hiavian’i Kristy
  '3':
  - type: text
    content: 'Tsy maintsy misaotra an’Andriamanitra mandrakariva izahay noho ny aminareo, ry rahalahy, fa mendrika hatao izany satria mandroso fatratra ny finoanareo ary mitombo ny fifankatiavanareo rehetra. '
  '4':
  - type: text
    content: 'Reharehan’ny tenanay eny amin’ny fiangonan’Andriamanitra ianareo noho ny faharetanareo sy ny finoanareo amin’ny fanenjehana rehetra izay manjo anareo sy ny fahoriana izay iaretanareo. '
  '5':
  - type: text
    content: 'Famantarana ny fitsarana marin’Andriamanitra ireny mba hatao ho mendrika ny fanjakan’Andriamanitra ianareo sady izany rahateo koa no iaretanareo. '
  '6':
  - type: text
    content: 'Zavatra marina amin’Andriamanitra ny hamaly fahoriana izay mampahory anareo, '
  '7':
  - type: text
    content: 'ary ny hanome fitsaharana anareo izay ampahorina kosa mbamin’ny tenanay, rehefa hiseho avy any an-danitra Jesosy Tompo, mbamin’ny anjeliny mahery, '
  '8':
  - type: text
    content: 'amin’ny afo midedadeda, hamaly izay tsy mahalala an’Andriamanitra sy izay tsy manaiky ny Filazantsaran’i Jesosy Tompontsika. '
  '9':
  - type: text
    content: 'Ireny olona ireny no hiharan’ny famaliana marina, dia fahaverezana mandrakizay, lavitry ny fanatrehan’ny Tompo sy ny voninahitry ny heriny, '
