document_id: ISA.57,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Maty ny marina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa tsy misy misaina izany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: alevina ny olona tsara fanahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa tsy misy mihevitra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny marina dia alaina tsy ho azon’ny loza hanjo.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Noho ny halavitry ny nalehanao dia sasatra ianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'nefa tsy niteny ianao hoe: Kivy aho izany!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nahazo aina ihany ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy nahatsiaro reraka.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Iza ary no nahìnao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy natahoranao no dia nandainga ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy nahatsiaro Ahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na nisaina akory?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moa tsy efa nangina va Aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hatrizay hatrizay?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa tsy matahotra Ahy ianao.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Izaho no hanambara ny fahamarinanao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny asanao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia tsy hahasoa anao.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Raha mitaraina ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia aoka ireo sampinao no hamonjy anao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa hopaohin’ny rivotra avokoa ireo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ho lasan’ny tsio-drivotra malemilemy aza.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa izay mialoka Amiko kosa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no hanana ny tany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy handova ny tendrombohitro masina.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Hanasitrana ny olony NY TOMPO
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Hilaza Izy hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mandehana; eny, mandehana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka manamboara lalana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: esory izay mahatafintohina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny amin’ny alehan’ny oloko!
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Fa izao no lazain’ny Iray avo sy manerinerina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay monina mandrakizay,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Masina no anarany:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ao amin’ny fitoerana avo sy masina no onenako,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ao amin’ny torotoro fo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny manetry tena,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hamelombelona ny fanahin’ny manetry tena
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy hamelombelona ny fo torotoro.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Fa tsy hifandahatra mandrakariva Aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy ho tezitra mandrakizay,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fandrao ho reraka eo anatrehako ny fanahy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ny fofonaina izay nataoko.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Ny helony noho ny fitiavany harena
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no nahatezitra Ahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka namelezako azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa niery Aho satria tezitra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa nikomy izy ka mbola nandroso
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tamin’ny lalana tian’ny fony ihany.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Efa nahita ny lalany Aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa hahasitrana azy ihany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hitari-dalana azy Aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hampody ny fiononana ho aminy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ho amin’ny malahelo ao aminy.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Izaho no mahary ny vokatry ny molotra.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fiadanana, fiadanana ho an’izay lavitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ho an’izay akaiky,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy NY TOMPO!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hahasitrana azy Aho!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Miditra amin’ny fiadanana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mandry amin’ny fandrianany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay olona mizotra amin’ny lalana mahitsy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mampitandrina ireo mpanompo sampy NY TOMPO
    marker-yv: yv-h
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Fa ny ratsy fanahy dia tahaka ny ranomasina misamboaravoara;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, tsy mety tafatoetra izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka ny ranony dia mamoaka loto sy fotaka.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Tsy misy fiadanana ho an’ny ratsy fanahy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy Andriamanitro.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Fa ianareo kosa dia mankanesa etỳ,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ry zanaky ny mpanandro,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ianareo taranaky ny mpaka vadin’olona sy ny mpijangajanga!
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Iza no ihomehezanareo?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Iza no isanasananareo vava
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy itrangatranganareo lela?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy taranaky ny fikomiana va ianareo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady taranaky ny lainga?
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Dia ianareo izay mahamaimay ny fonareo eo amin’ny sampy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny ambanin’ny hazo maitso rehetra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka mamono zaza eny an-dohasahan-driaka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny ambanin’ny tsefatsefaky ny harambato.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Ary amin’ny vato kilonjy any an-dohasahan-driaka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no anjaranao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, ireny ihany no anjaranao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho an’ireny koa no nandrarahanao fanatitra aidina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy nanoloranao fanatitra dorana manontolo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: koa hahatsindry fo amin’izany va Aho?
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Teo an-tampon’ny tendrombohitra avo sy manerinerina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no nametrahanao ny fandriananao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka teny no niakaranao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hamono zavatra natao fanatitra.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Teo ivohon’ny varavarana sy ny tolanam-baravarana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no nametrahanao ny fampahatsiarovana anao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa lavitra Ahy no nitanjahanao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy niakaranao teo amin’ny fandriana izay nataonao malalaka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia nanao fanekena tamin’ireny ianao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tia ny mandry aminy ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka mijery azy.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Dia nivezivezy nankany amin’ny mpanjaka ianao nitondra diloilo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka nataonao betsaka ny zava-manitrao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady nandefa ny irakao hatrany lavitra any ianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary nietry
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'hatrany amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: fitoeran’ny maty
    - type: text
      text: .
