document_id: ISA.57,3103
type_code: plt
verses:
  '1':
  - type: text
    content: Maty ny marina
  - type: text
    content: nefa tsy misy misaina izany;
  - type: text
    content: alevina ny olona tsara fanahy
  - type: text
    content: nefa tsy misy mihevitra,
  - type: text
    content: fa ny marina dia alaina tsy ho azon’ny loza hanjo.
  '10':
  - type: text
    content: Noho ny halavitry ny nalehanao dia sasatra ianao,
  - type: text
    content: 'nefa tsy niteny ianao hoe: Kivy aho izany!'
  - type: text
    content: Nahazo aina ihany ianao
  - type: text
    content: ka tsy nahatsiaro reraka.
  '11':
  - type: text
    content: Iza ary no nahìnao
  - type: text
    content: sy natahoranao no dia nandainga ianao
  - type: text
    content: ka tsy nahatsiaro Ahy
  - type: text
    content: na nisaina akory?
  - type: text
    content: Moa tsy efa nangina va Aho
  - type: text
    content: hatrizay hatrizay?
  - type: text
    content: Fa tsy matahotra Ahy ianao.
  '12':
  - type: text
    content: Izaho no hanambara ny fahamarinanao;
  - type: text
    content: ary ny asanao
  - type: text
    content: dia tsy hahasoa anao.
  '13':
  - type: text
    content: Raha mitaraina ianao
  - type: text
    content: dia aoka ireo sampinao no hamonjy anao,
  - type: text
    content: nefa hopaohin’ny rivotra avokoa ireo
  - type: text
    content: ary ho lasan’ny tsio-drivotra malemilemy aza.
  - type: text
    content: Fa izay mialoka Amiko kosa
  - type: text
    content: no hanana ny tany
  - type: text
    content: sy handova ny tendrombohitro masina.
  - type: heading
    content: Hanasitrana ny olony NY TOMPO
  '14':
  - type: text
    content: 'Hilaza Izy hoe:'
  - type: text
    content: Mandehana; eny, mandehana
  - type: text
    content: ka manamboara lalana,
  - type: text
    content: esory izay mahatafintohina
  - type: text
    content: eny amin’ny alehan’ny oloko!
  '15':
  - type: text
    content: Fa izao no lazain’ny Iray avo sy manerinerina
  - type: text
    content: izay monina mandrakizay,
  - type: text
    content: 'Masina no anarany:'
  - type: text
    content: Ao amin’ny fitoerana avo sy masina no onenako,
  - type: text
    content: ary ao amin’ny torotoro fo
  - type: text
    content: sy ny manetry tena,
  - type: text
    content: mba hamelombelona ny fanahin’ny manetry tena
  - type: text
    content: sy hamelombelona ny fo torotoro.
  '16':
  - type: text
    content: Fa tsy hifandahatra mandrakariva Aho
  - type: text
    content: ary tsy ho tezitra mandrakizay,
  - type: text
    content: fandrao ho reraka eo anatrehako ny fanahy,
  - type: text
    content: dia ny fofonaina izay nataoko.
  '17':
  - type: text
    content: Ny helony noho ny fitiavany harena
  - type: text
    content: no nahatezitra Ahy
  - type: text
    content: ka namelezako azy;
  - type: text
    content: fa niery Aho satria tezitra,
  - type: text
    content: nefa nikomy izy ka mbola nandroso
  - type: text
    content: tamin’ny lalana tian’ny fony ihany.
  '18':
  - type: text
    content: Efa nahita ny lalany Aho
  - type: text
    content: nefa hahasitrana azy ihany,
  - type: text
    content: dia hitari-dalana azy Aho
  - type: text
    content: ka hampody ny fiononana ho aminy
  - type: text
    content: sy ho amin’ny malahelo ao aminy.
  '19':
  - type: text
    content: Izaho no mahary ny vokatry ny molotra.
  - type: text
    content: Fiadanana, fiadanana ho an’izay lavitra
  - type: text
    content: sy ho an’izay akaiky,
  - type: text
    content: hoy NY TOMPO!
  - type: text
    content: Hahasitrana azy Aho!
  '2':
  - type: text
    content: Miditra amin’ny fiadanana
  - type: text
    content: ary mandry amin’ny fandrianany
  - type: text
    content: izay olona mizotra amin’ny lalana mahitsy.
  - type: heading
    content: Mampitandrina ireo mpanompo sampy NY TOMPO
  '20':
  - type: text
    content: Fa ny ratsy fanahy dia tahaka ny ranomasina misamboaravoara;
  - type: text
    content: eny, tsy mety tafatoetra izy
  - type: text
    content: ka ny ranony dia mamoaka loto sy fotaka.
  '21':
  - type: text
    content: Tsy misy fiadanana ho an’ny ratsy fanahy,
  - type: text
    content: hoy Andriamanitro.
  '3':
  - type: text
    content: Fa ianareo kosa dia mankanesa etỳ,
  - type: text
    content: ry zanaky ny mpanandro,
  - type: text
    content: ianareo taranaky ny mpaka vadin’olona sy ny mpijangajanga!
  '4':
  - type: text
    content: Iza no ihomehezanareo?
  - type: text
    content: Iza no isanasananareo vava
  - type: text
    content: sy itrangatranganareo lela?
  - type: text
    content: Tsy taranaky ny fikomiana va ianareo
  - type: text
    content: sady taranaky ny lainga?
  '5':
  - type: text
    content: Dia ianareo izay mahamaimay ny fonareo eo amin’ny sampy
  - type: text
    content: eny ambanin’ny hazo maitso rehetra
  - type: text
    content: ka mamono zaza eny an-dohasahan-driaka
  - type: text
    content: eny ambanin’ny tsefatsefaky ny harambato.
  '6':
  - type: text
    content: Ary amin’ny vato kilonjy any an-dohasahan-driaka
  - type: text
    content: no anjaranao;
  - type: text
    content: eny, ireny ihany no anjaranao;
  - type: text
    content: Ho an’ireny koa no nandrarahanao fanatitra aidina
  - type: text
    content: sy nanoloranao fanatitra dorana manontolo;
  - type: text
    content: koa hahatsindry fo amin’izany va Aho?
  '7':
  - type: text
    content: Teo an-tampon’ny tendrombohitra avo sy manerinerina
  - type: text
    content: no nametrahanao ny fandriananao
  - type: text
    content: ka teny no niakaranao
  - type: text
    content: hamono zavatra natao fanatitra.
  '8':
  - type: text
    content: Teo ivohon’ny varavarana sy ny tolanam-baravarana
  - type: text
    content: no nametrahanao ny fampahatsiarovana anao;
  - type: text
    content: fa lavitra Ahy no nitanjahanao
  - type: text
    content: sy niakaranao teo amin’ny fandriana izay nataonao malalaka,
  - type: text
    content: dia nanao fanekena tamin’ireny ianao;
  - type: text
    content: tia ny mandry aminy ianao
  - type: text
    content: ka mijery azy.
  '9':
  - type: text
    content: Dia nivezivezy nankany amin’ny mpanjaka ianao nitondra diloilo
  - type: text
    content: ka nataonao betsaka ny zava-manitrao,
  - type: text
    content: sady nandefa ny irakao hatrany lavitra any ianao,
  - type: text
    content: ary nietry
  - type: text
    content: 'hatrany amin’ny '
  - type: text
    content: fitoeran’ny maty
  - type: text
    content: .
