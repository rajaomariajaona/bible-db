document_id: 1CH.19,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Nalaim-baraka ireo irak’i Davida
  - type: heading
    content: 2Sam 10.1-5
  - type: text
    content: 'Tatỳ aoriana dia maty i Nahasy, mpanjakan’ny taranak’i Amona, ary ny zanany no nanjaka nandimby azy. '
  '10':
  - type: text
    content: 'Rehefa hitan’i Joaba fa sady teo anoloany no teo ivohony ny fahavalo dia nifidy olona tamin’ireo voafantina tamin’ny Israely rehetra izy ka nalahany hiady tamin’ny Arameana. '
  '11':
  - type: text
    content: 'Ny olona sisa kosa dia nomeny hoentin’i Abisay rahalahiny, dia nilahatra hiady amin’ny taranak’i Amona ireo. '
  '12':
  - type: text
    content: 'Ary hoy i Joaba: Raha tsy tohako ny Arameana dia vonjeo aho; fa raha tsy tohanao kosa ny taranak’i Amona dia hovonjeko ianao. '
  '13':
  - type: text
    content: 'Mahereza, ary aoka hitomban-dahy isika ho an’ny firenentsika sy ireo tanànan’Andriamanitsika, dia aoka NY TOMPO hanao izay sitrapony. '
  '14':
  - type: text
    content: 'Dia nandroso hiady tamin’ny Arameana i Joaba sy ny olona nanaraka azy; koa vaky nandositra niala teo anoloany ireo. '
  '15':
  - type: text
    content: Nony hitan’ny taranak’i Amona fa nandositra ny Arameana dia mba nandositra niala teo anoloan’i Abisay, rahalahin’i Joaba, koa izy ka niditra tao an-tanàna. Dia niverina tany Jerosalema i Joaba.
  '16':
  - type: text
    content: 'Nony hitan’ny Arameana fa resy teo anoloan’ny Israely izy dia nandefa iraka izy haka ny Arameana izay tany andafin’ny ony Eofrata, ary i Sobaka, lehiben’ny miaramilan’i Hadadezera, no nitarika azy. '
  '17':
  - type: text
    content: 'Nony nambara tamin’i Davida izany dia namory ny Israely rehetra izy ka lasa nita an’i Jordana, dia tonga teo aminy ka nilahatra hiady aminy. Nony nilahatra hiady amin’ny Arameana i Davida dia niady taminy ireo. '
  '18':
  - type: text
    content: 'Fa vaky nandositra teo anoloan’ny Israely ny Arameana ka nahafaty fito arivo teo amin’ny kalesy fitondrany miady sy miaramila mandeha an-tongotra efatra alina tamin’ny Arameana i Davida; ary matiny koa i Sobaka, lehiben’ny miaramila. '
  '19':
  - type: text
    content: Nony hitan’ireo mpanompon’i Hadadezera fa resy teo anoloan’ny Israely izy dia nanao fihavanana tamin’i Davida izy ka nanompo azy; ary tsy nety nanampy ny taranak’i Amona intsony ny Arameana.
  '2':
  - type: text
    content: 'Dia hoy i Davida: Hanisy soa an’i Hanona, zanak’i Nahasy, aho, fa soa no nataon’ny rainy tamiko. Ary nandefa iraka hitsapa alahelo azy noho ny amin’ny rainy i Davida. Dia tonga tany amin’i Hanona tany amin’ny tanin’ny Amonita ny mpanompon’i Davida hitsapa alahelo azy. '
  '3':
  - type: text
    content: 'Hoy anefa ireo mpanapaka ny taranak’i Amona tamin’i Hanona: Moa heverinao ho fanajana ny rainao no anirahan’i Davida hitsapa alahelo anao? Moa tsy hizaha sy handrava ary hisafo ny tany va no nalehan’ireo mpanompony ireo atỳ aminao? '
  '4':
  - type: text
    content: 'Dia nosamborin’i Hanona ny mpanompon’i Davida ka noharatany sady notapahiny hatreo amin’ny foto-peny ny akanjony dia nalefany hody avy eo. '
  '5':
  - type: text
    content: 'Nisy lasa nanambara tamin’i Davida izay natao tamin’ireo lehilahy ireo; dia nandefa iraka izy hitsena azy ireo fa afa-baraka loatra izy ireo; dia hoy ny mpanjaka: Mitoera any Jeriko aloha ambara-panirin’ny somotrareo, aorianan’izay vao mody ianareo.'
  - type: heading
    content: Ny ady tamin’ny Amonita sy ny Arameana
  - type: heading
    content: 2Sam 10.6-19
  '6':
  - type: text
    content: 'Nony hitan’ny taranak’i Amona fa efa nanao izay nampangidy hoditra azy tamin’i Davida izy dia nandefa iraka hanatitra '
  - type: text
    content: talenta
  - type: text
    content: ' volafotsy arivo hanakaramany kalesy fitondra miady sy mpitaingin-tsoavaly avy any Mezopotamia sy Arama-Maka ary Zoba i Hanona sy ny taranak’i Amona. '
  '7':
  - type: text
    content: 'Dia nanakarama kalesy fitondra miady roa arivo sy telo alina mbamin’ny mpanjakan’i Maka sy ny olony izy; ary tonga ireo ka nitoby tandrifin’i Medeba. Dia nivory ny taranak’i Amona izay niala tany amin’ny tanànany avy ka tamy hiady. '
  '8':
  - type: text
    content: 'Nony ren’i Davida izany dia naniraka an’i Joaba sy ny miaramila rehetra izy, dia ny lehilahy mahery. '
  '9':
  - type: text
    content: Nandeha nilahatra hiady teo anoloan’ny vavahadin’ny tanàna ny taranak’i Amona, fa ireo mpanjaka tonga ireo kosa dia nitokana teny an-tsaha.
