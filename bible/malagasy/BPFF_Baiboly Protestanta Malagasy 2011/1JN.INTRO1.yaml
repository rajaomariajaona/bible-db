type_code: plt
verses:
  '1':
  - type: text
    content: INDRAY MIJERY
  - type: text
    content: Na dia tsy voalaza ao anatin’ny Epistily aza ny anaran’ny mpanoratra dia eken’ireo Rain’ny fiangonana taloha fa i Jaona Apostoly, izay nanoratra ny Filazantsara fahefatra sy ny Boky Apokalipsy, no nanoratra ity epistily ity, ary toy izany koa ny Epistily faharoa sy fahatelo. Ny fomba fiteny sy ny fotokevitra lehibe ato amin’ny Epistily voalohany sy ny Filazantsara fahefatra dia be itovizany. Ao amin’ny Fitarihanteny, ireo boky roa dia samy manambara an’i Jesosy ho Ny Teny; ireo boky roa dia samy manamafy koa fa Kristy no loharanon’ny fiainana; hita ato koa ireo fifanoheran’ny fiainana sy ny fahafatesana, ny mazava sy ny maizina, Andriamanitra sy izao tontolo izao, ny marina sy ny lainga, izay manamarika ny Filazantsara fahefatra.
  - type: text
    content: Ny votoatin’ny Epistily
  - type: text
    content: 'Tsy voalaza mivantana ny olona anoratana kanefa hita fa Kristiana izay nifandray akaiky tamin’ny Apostoly izy ireo: Ataony hoe «anaka», «ry malala», «ry rahalahy».'
  - type: text
    content: 'Hita ao amin’ny Epistily fa nisy fampianarana sandoka izay nila ho tafiditra tao amin’ny Fiangonana, toy izay hita koa tamin’ireo Fiangonana nanoratan’ireo Apostoly hafa: Fampianarana izay mila hampivily ny finoana kristiana notorin’ny Apostoly. Noho izany ny Epistily dia manana tanjona roa: Ny hampirisika ny mpamaky mba hiaina amin’ny fiombonana marina amin’Andriamanitra sy Jesosy Kristy Zanany, ary izany fiombonana izany dia hiseho amin’ny fifankatiavan’ny mpirahalahy. Ny tanjona faharoa dia ny hanohitra ny fampianarana sandoka izay mampiala amin’ny finoana marina. Ireny mpampianatra sandoka ireny dia nampianatra fa Jesosy dia tsy tena olona, satria hono ny famonjena dia ny tsy mikasika ny momba izao fiainana hita maso izao, ary koa, ny voavonjy hono dia tsy mila mitandrina ny fitondrantena sy ny fitiavana ny rahalahy.'
  - type: text
    content: Ho setrin’izany dia ambaran’i Jaona mazava fa Jesosy Kristy dia tena olombelona, ary amafisiny fa izay mino an’i Jesosy dia tsy maintsy mifankatia.
  - type: text
    content: Ny firafitry ny Epistily
  - type: text
    content: 'Fitarihanteny: 1.1-4'
  - type: text
    content: 'Ny mazava sy ny maizina: 1.5–2.17'
  - type: text
    content: 'Ireo izay mandà fa Jesosy dia tsy Kristy: 2.18-29'
  - type: text
    content: 'Ny zanak’Andriamanitra marina: 3.1-24'
  - type: text
    content: 'Ny marina sy ny fiviliana: 4.1-6'
  - type: text
    content: 'Ny fitiavana marina: 4.7-21'
  - type: text
    content: 'Ny fandresen’ny finoana ary famerenana ireo fotokevitra: 5.1-21'
