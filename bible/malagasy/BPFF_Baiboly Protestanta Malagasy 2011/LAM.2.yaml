document_id: LAM.2,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fahatezeran’Andriamanitra
  - type: heading
    content: alef א
  - type: text
    content: Indrisy!
  - type: text
    content: Amin’ny fahatezerany
  - type: text
    content: 'no anaronan’ny Tompo rahona an’i '
  - type: text
    content: Ziona
  - type: text
    content: ' zanakavavy,'
  - type: text
    content: nazerany avy tany an-danitra ho amin’ny tany
  - type: text
    content: ny reharehan’ny Israely,
  - type: text
    content: ary tsy tsaroany ny fitoeran-tongony
  - type: text
    content: tamin’ny andron’ny fahatezerany!
  - type: heading
    content: bet ב
  '10':
  - type: text
    content: Ny loholon’i Ziona zanakavavy
  - type: text
    content: dia mipetraka amin’ny tany ka mangina;
  - type: text
    content: nasiany vovoka ny lohany,
  - type: text
    content: misikina lamba fisaonana izy;
  - type: text
    content: mampitanondrika ny lohany ho amin’ny tany
  - type: text
    content: ny virijiny any Jerosalema.
  - type: heading
    content: kaf כ
  '11':
  - type: text
    content: Bongo ny masoko azon’ny ranomaso,
  - type: text
    content: mandevilevy ny ao anatiko;
  - type: text
    content: nararaka tamin’ny tany ny atiko
  - type: text
    content: noho ny fandringanana ny oloko zanakavavy,
  - type: text
    content: sy noho ny ankizy madinika sy ny zaza minono izay ana
  - type: text
    content: eny amin’ny toerana malalaka ao an-tanàna.
  - type: heading
    content: lamed ל
  '12':
  - type: text
    content: 'Manontany ny reniny izy ireo hoe:'
  - type: text
    content: Aiza izay vary sy divay?
  - type: text
    content: Ana toy ny voatrobaka
  - type: text
    content: eny amin’ny toerana malalaka ao an-tanàna izy ireo,
  - type: text
    content: ary miala aina
  - type: text
    content: eo ampofoan-dreniny.
  - type: heading
    content: mem מ
  '13':
  - type: text
    content: Inona no hampitoviako aminao?
  - type: text
    content: Inona no hanoharako anao, ry Jerosalema zanakavavy?
  - type: text
    content: Inona no hampitahaiko aminao,
  - type: text
    content: mba hampiononako anao, ry Ziona zanakavavy virijiny?
  - type: text
    content: Fa lehibe toy ny ranomasina ny faharatranao,
  - type: text
    content: iza no mahasitrana anao?
  - type: heading
    content: non נ
  '14':
  - type: text
    content: Ny mpaminaninao dia nilaza fahitana
  - type: text
    content: mandainga sy mamitaka ho anao
  - type: text
    content: sady tsy nampiseho ny helokao
  - type: text
    content: mba hiarovany anao tsy ho babo;
  - type: text
    content: eny, nahita faminaniana lainga
  - type: text
    content: sy fampivilian-tsaina ho anao izy.
  - type: heading
    content: samek ס
  '15':
  - type: text
    content: Miteha-tanana noho ny aminao
  - type: text
    content: izay rehetra mandalo eny an-dalana;
  - type: text
    content: misiaka maneso sady mihifikifi-doha
  - type: text
    content: 'ny amin’i Jerosalema zanakavavy izy ka miteny hoe:'
  - type: text
    content: Ity va ilay tanàna izay nolazainy hoe
  - type: text
    content: fanaperan’ny hatsaran-tarehy, fifalian’ny tany rehetra?
  - type: heading
    content: pe פ
  '16':
  - type: text
    content: Mitanatana vava aminao
  - type: text
    content: ny fahavalonao rehetra;
  - type: text
    content: misiaka maneso sy mihidy vazana izy
  - type: text
    content: 'ka miteny hoe: Natelinay!'
  - type: text
    content: Ity tokoa ilay andro nandrasanay
  - type: text
    content: ka efa azonay sady hitanay.
  - type: heading
    content: aìn ע
  '17':
  - type: text
    content: NY TOMPO efa nanatanteraka izay nosaininy
  - type: text
    content: ka nahatò ny teniny
  - type: text
    content: izay didy nomeny hatramin’ny andro fahagola;
  - type: text
    content: nandrava Izy, fa tsy niantra;
  - type: text
    content: ary nampifaly ny fahavalo taminao Izy
  - type: text
    content: sady nanandratra ny tandroky ny rafinao.
  - type: heading
    content: tsade צ
  '18':
  - type: text
    content: Mitaraina amin’ny Tompo ny fony.
  - type: text
    content: Ry mandan’i Ziona zanakavavy!
  - type: text
    content: Mandrotsaha ranomaso andro aman’alina toy ny riaka;
  - type: text
    content: aza mangina,
  - type: text
    content: aoka tsy hitsahatra ny anakandriamasonao.
  - type: heading
    content: kof ק
  '19':
  - type: text
    content: Mitsangàna, miantsoantsoa
  - type: text
    content: amin’ny alina hatramin’ny filatsahan’ny fiambenana,
  - type: text
    content: aidino tahaka ny rano
  - type: text
    content: eo anatrehan’ny Tompo ny fonao!
  - type: text
    content: Asandrato Aminy ny tananao
  - type: text
    content: hifona ho an’ny ain’ny zanakao madinika
  - type: text
    content: izay reraky ny hanoanana
  - type: text
    content: eny an-joron-dalana rehetra eny.
  - type: heading
    content: res ר
  '2':
  - type: text
    content: Natelin’ny Tompo ny fonenan’i Jakoba rehetra
  - type: text
    content: fa tsy nisy niantrany;
  - type: text
    content: noravany an-katezerana
  - type: text
    content: ny mandan’i Joda zanakavavy
  - type: text
    content: ka nazerany tamin’ny tany,
  - type: text
    content: notsiratsirainy ny fanjakana sy ny mpanapaka eo aminy.
  - type: heading
    content: gimel ג
  '20':
  - type: text
    content: TOMPO ô, jereo ka diniho
  - type: text
    content: ny olona izay nanaovanao izany.
  - type: text
    content: Hihinana ny ateraky ny kibony va ny vehivavy,
  - type: text
    content: dia ny zanany madinika izay notezainy am-pitiavana?
  - type: text
    content: Hovonoina ao amin’ny fitoerana masina an’ny Tompo va
  - type: text
    content: ny mpisorona sy ny mpaminany?
  - type: heading
    content: sin ש
  '21':
  - type: text
    content: Miampatrampatra amin’ny tany eny an-dalana
  - type: text
    content: ny tanora sy ny antitra;
  - type: text
    content: ny virijiniko sy ny zatovoko
  - type: text
    content: dia lavon’ny sabatra;
  - type: text
    content: novonoinao tamin’ny andro fahatezeranao izy ireo;
  - type: text
    content: eny, naripakao, fa tsy niantranao.
  - type: heading
    content: tao ת
  '22':
  - type: text
    content: Niantso ny fampihorohoroana hanodidina ahy
  - type: text
    content: toy ny amin’ny fotoam-piravoravoana ianao
  - type: text
    content: ka tsy nisy sisa afa-nandositra
  - type: text
    content: tamin’ny andro fahatezeran’NY TOMPO;
  - type: text
    content: izay notezaiko am-pitiavana sy nobeaziko aza
  - type: text
    content: dia lanin’ny fahavaloko.
  '3':
  - type: text
    content: Nokapainy tamin’ny fahatezerany mirehitra
  - type: text
    content: 'ny '
  - type: text
    content: tandroky
  - type: text
    content: ' ny Israely rehetra;'
  - type: text
    content: nahemony teo anoloan’ny fahavalo
  - type: text
    content: ny tanany ankavanana,
  - type: text
    content: ary nandoro an’i Jakoba toy ny lelafo miredareda
  - type: text
    content: izay nandevona manodidina Izy.
  - type: heading
    content: dalet ד
  '4':
  - type: text
    content: Nanenjana ny tsipìkany toy ny fahavalo Izy,
  - type: text
    content: nijoro nanatsotra ny tanany ankavanana toy ny mpanohitra Izy
  - type: text
    content: ka nandripaka
  - type: text
    content: izay rehetra mahafinaritra ny maso;
  - type: text
    content: ny fahatezerany dia naidiny toy ny afo
  - type: text
    content: tamin’ny tranolain’i Ziona zanakavavy.
  - type: heading
    content: he ה
  '5':
  - type: text
    content: Tonga toy ny fahavalo ny Tompo
  - type: text
    content: ka nitelina ny Israely.
  - type: text
    content: Eny, nateliny ny lapany rehetra
  - type: text
    content: sady noravany ny manda fiarovany;
  - type: text
    content: nampitomboiny tao amin’i Joda zanakavavy tokoa
  - type: text
    content: ny sento sy ny taraina.
  - type: heading
    content: vav ו
  '6':
  - type: text
    content: Noravany an-keriny toy ny tanimboly
  - type: text
    content: ny fefiny
  - type: text
    content: sady noravany ny toeram-piravoravoany;
  - type: text
    content: nataon’NY TOMPO hadino tao Ziona
  - type: text
    content: ny fotoam-piravoravoana sy ny Sabata
  - type: text
    content: ka nolaviny tamin’ny fahatezerany mirehitra
  - type: text
    content: ny mpanjaka sy ny mpisorona.
  - type: heading
    content: zaìn ז
  '7':
  - type: text
    content: Narian’ny Tompo ny alitarany,
  - type: text
    content: nolaviny ny fitoerany masina;
  - type: text
    content: natolony ho eo an-tanan’ny fahavalo
  - type: text
    content: ny mandan’ny lapa ao Ziona;
  - type: text
    content: nisy nanandra-peo tao amin’ny tranon’NY TOMPO
  - type: text
    content: toy ny amin’ny fotoam-piravoravoana.
  - type: heading
    content: het ח
  '8':
  - type: text
    content: NY TOMPO no ninia nandrava
  - type: text
    content: ny mandan’i Ziona zanakavavy;
  - type: text
    content: nanenjana ny kofehy fandrefesana Izy
  - type: text
    content: ka tsy namonkina ny tanany
  - type: text
    content: tsy handrava;
  - type: text
    content: dia mampitomany ny fiarovany ivelany sy ny manda Izy
  - type: text
    content: ka miara reraka ireo.
  - type: heading
    content: tet ט
  '9':
  - type: text
    content: Ny vavahadiny dia tototry ny tany
  - type: text
    content: sady nosimbany no nopotipotehiny ny hidiny;
  - type: text
    content: ny mpanjakany sy ny andriana eo aminy dia efa any amin’ny firenena hafa;
  - type: text
    content: tsy misy lalàna intsony,
  - type: text
    content: eny fa na ny mpaminaniny aza dia tsy mahita
  - type: text
    content: fahitana avy amin’NY TOMPO intsony.
  - type: heading
    content: iod י
