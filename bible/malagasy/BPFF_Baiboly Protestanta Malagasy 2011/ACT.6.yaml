document_id: ACT.6,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ireo fito lahy voafidy ho mpanampy ny Apostoly
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin’izany andro izany, rehefa nihamaro ny isan’ny mpianatra, dia nisy fimonomononan’ny Helenista tamin’ny Hebreo, satria tsy mba voajery tamin’ny fanampiana isanandro ny mpitondratenany. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsy nahatohitra ny fahendrena sy ny Fanahy izay nitenenany anefa ireo; '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'koa nisy olona nomen’ireo vola mba hiteny hoe: Efa renay niteny ratsy an’i Mosesy sy Andriamanitra io. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nandrisika ny olona sy ny loholona ary ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpanoradalàna
    - type: text
      text: ' koa izy ireo, dia nankeo amin’i Stefana ka nisambotra azy, sady nitondra azy ho eo amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Sinedriona
    - type: text
      text: '; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary izy ireo dia nanangana vavolombelona mandainga izay nilaza hoe: Io lehilahy io dia tsy mitsahatra miteny ratsy ity fitoerana masina ity sy ny lalàna; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fa efa renay mihitsy izy nilaza fa ilay Jesosy avy any Nazareta dia handrava ity toerana ity sy hanova ireo fomba izay natolotr’i Mosesy antsika. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary izay rehetra nipetraka teo amin’ny Sinedriona, raha nandinika an’i Stefana, dia nahita ny tarehiny tahaka ny tarehin’anjely.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nampiantso ny mpianatra rehetra ny roa amby folo lahy ka nilaza taminy hoe: Tsy mety raha mandao ny tenin’Andriamanitra mba hitandrina latabatra izahay. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa araka izany, ry rahalahy, mifidiana fito lahy eo aminareo, izay tsara laza sady feno ny Fanahy sy fahendrena, mba hotendrenay hitandrina izany raharaha izany. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa izahay kosa dia haharitra amin’ny fivavahana sy ny fampianarana. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia sitraky ny olona rehetra ny teniny ka nifidy an’i Stefana izy, lehilahy feno finoana sy ny Fanahy Masina, mbamin’i Filipo, i Prokoro, i Nikanora, i Timona, i Parmena ary i Nikoleo izay '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prozelita
    - type: text
      text: ' avy any Antiokia. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ireo no narosony teo anatrehan’ny Apostoly; ary rehefa nivavaka ireo dia nametra-tanana taminy.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nandroso ny tenin’Andriamanitra; ary nihamaro tokoa ny isan’ny mpianatra tany Jerosalema; maro tamin’ny mpisorona koa no nanaiky ny finoana.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nisamborana an’i Stefana
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary i Stefana dia feno fahasoavana sy hery ka nanao fahagagana sy famantarana lehibe teo amin’ny vahoaka. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa nisy olona sasany avy amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sinagoga
    - type: text
      text: ' antsoina hoe sinagogan’ny Olona afaka sy ny Kireniana ary ny Aleksandriana mbamin’izay avy any Kilikia sy Azia, niady hevitra tamin’i Stefana. '
