document_id: EZR.8,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ireo naman’i Ezra
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ireto no lohan’ny fianakaviana sy ny filazana ny firazanan’ny olona izay niara-niakatra tamiko avy tany Babilona tamin’ny nanjakan’i Artaksersesy mpanjaka:'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ny zanak’i Josifia, avy tamin’ny taranak’i Selomita, mbamin’ny namany enimpolo amby zato lahy;
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: i Zakaria, zanak’i Bebay, avy tamin’ny taranak’i Bebay, mbamin’ny namany valo amby roapolo lahy;
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: i Johanana, zanak’i Hakatana, avy tamin’ny taranak’i Azgada, mbamin’ny namany folo amby zato lahy;
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'ary ny avy tamin’ny taranak’i Adonikama dia ireo zandriny tatỳ aoriana; izao avy no anarany: I Elifeleta sy i Jeiela ary i Semaia mbamin’ny namany enimpolo lahy;'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ary avy tamin’ny taranak’i Bigvay, i Otahy sy i Zaboda, mbamin’ny namany fitopolo lahy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fanomanana ny dia ho any Jerosalema
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Dia novoriko teo amoron’ny ony mankany Ahava izy ireo ka nilasy teo nandritra ny hateloana izahay; nony nandinika ny olona sy ny mpisorona aho dia nahita fa tsy nisy taranak’i Levy teo na dia iray akory aza. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Dia nirahiko i Eliezera, i Ariela, i Semaia, i Elnatana, i Jariba, i Elnatana, i Natana, i Zakaria ary i Mesolama, samy loholona ireo; mbamin’i Joariba sy i Elnatana; samy mpampianatra kosa ireo. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Nampitondraiko teny ho any amin’Ido, loholona any Kasifia ireo, ka nambarako azy izay teny holazainy amin’Ido sy ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Netinima
    - type: text
      text: ' rahalahiny any Kasifia mba hoentiny any aminay izay ho mpanao fanompoam-pivavahana ao amin’ny tranon’Andriamanitray. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Ary araka ny soa nataon’ny tanan’Andriamanitray taminay no nitondrany olon-kendry iray ho any aminay avy tamin’ny taranak’i Maly, zanak’i Levy, zanak’Israely, ary i Serebia sy ny zanany mbamin’ny rahalahiny, valo amby folo lahy, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'ary i Hasabia sy Isaia, avy tamin’ny taranak’i Merary, mbamin’ny rahalahiny ary ny zanany roapolo lahy; '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: I Gersoma, avy tamin’ny taranak’i Finehasa;
  - type: usfm
    marker: p
    children:
    - type: text
      text: i Daniela, avy tamin’ny taranak’Itamara;
  - type: usfm
    marker: p
    children:
    - type: text
      text: i Hatosy avy tamin’ny taranak’i Davida;
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'avy tamin’ny Netinima, izay notendren’i Davida sy ny mpanapaka mba hanompo ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: levita
    - type: text
      text: ', dia roapolo sy roanjato lahy; notononina anarana avokoa ireo. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Dia niantso andro fifadian-kanina teo amoron’ny ony Ahava aho mba hampahorianay tena eo anatrehan’Andriamanitray ka hangataka Azy hahalavorary ny dianay sy ny an’ny vady aman-janakay ary ny biby fiompinay rehetra. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Fa nahamenatra ahy ny hangataka miaramila sy mpitaingin-tsoavaly amin’ny mpanjaka hiaro anay amin’ny fahavalonay eny an-dalana, satria efa niteny tamin’ny mpanjaka izahay hoe: Mahasoa izay rehetra mitady Azy ny tanan’Andriamanitray; fa ny heriny sy ny fahatezerany kosa dia mamely izay rehetra mahafoy Azy. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Dia nifady hanina izahay ka nangataka izany tamin’Andriamanitray; dia nihaino anay Izy. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Ary nanokana roa amby folo lahy tamin’ny lehiben’ny mpisorona aho, dia i Serebia sy i Hasabia ary rahalahiny folo lahy ho namany, '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'ka nolanjaiko ny volafotsy sy ny volamena horaisiny mbamin’ny fanaka, dia fanomezana ho ao amin’ny tranon’Andriamanitray, izay efa natokan’ny mpanjaka sy ireo mpanolotsainany sy ireo mpanapaka ary ny Israely rehetra izay vory teo; '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'eny, nolanjaiko hatolotra azy ny volafotsy dimampolo sy eninjato '
    - type: usfm
      marker: w
      children:
      - type: text
        text: talenta
    - type: text
      text: ', fanaka volafotsy milanja talenta zato, ary volamena talenta zato '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'sy kapoaka volamena misarona roapolo, milanja arivo '
    - type: usfm
      marker: w
      children:
      - type: text
        text: drakma
    - type: text
      text: ', ary fanaka varahina tsara roa, sarobidy toy ny volamena. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Ary hoy aho taminy: Masina ho an’NY TOMPO ianareo sady masina koa ny fanaka; ary ny volafotsy sy ny volamena dia fanatitra an-tsitrapo ho an’NY TOMPO Andriamanitry ny razanareo. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Koa miambena ianareo ka tandremo ireny mandra-pandanjanareo azy indray eo anatrehan’ny lehiben’ny mpisorona sy ny levita ary ny lohan’ny fianakaviana amin’ny Israely any Jerosalema, dia ao amin’ny efitrano ao amin’ny tranon’NY TOMPO. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: avy tamin’ny taranak’i Sekania,
  - type: usfm
    marker: p
    children:
    - type: text
      text: avy tamin’ny zanak’i Parosy, i Zakaria mbamin’ny namany dimampolo amby zato lahy, voasoratra araka ny firazanany;
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Dia noraisin’ny mpisorona sy ny levita izany volafotsy sy volamena ary fanaka voalanja izany mba hoentiny ho any Jerosalema ho ao amin’ny tranon’Andriamanitray.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny dia sy ny fahatongavana tao Jerosalema
    marker-yv: yv-h
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Dia niala teo amin’ny ony Ahava izahay tamin’ny andro faharoa amby folo tamin’ny volana voalohany fa hankany Jerosalema; ary ny tanan’Andriamanitray nomba anay, koa Izy no namonjy anay tamin’ny tanan’ny fahavalo sy ny mpanao vela-pandrika teny an-dalana. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Nony tonga tany Jerosalema izahay dia nijanona hateloana aloha. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Ary tamin’ny andro fahefatra no nandanjana ny volafotsy sy ny volamena ary ny fanaka ho eo an-tanan’i Meremota, zanak’i Oria mpisorona, tao amin’ny tranon’Andriamanitray; ary teo aminy koa i Eleazara, zanak’i Finehasa; teo amin’izy roa lahy koa i Jozabada, zanak’i Josoa, sy i Noadia, zanak’i Binoy; '
    - type: usfm
      marker: w
      children:
      - type: text
        text: levita
    - type: text
      text: ' izy roa lahy ireo; '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'voaisa sy voalanja izany rehetra izany; ary voasoratra tamin’izany andro izany ihany ny lanjany rehetra. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Ary ny olona izay niverina avy tamin’ny fahababoana dia nanolotra fanatitra dorana manontolo ho an’Andriamanitry ny Israely, dia vantotra ombilahy roa amby folo ho an’ny Israely rehetra sy ondrilahy enina amby sivifolo sy zanak’ondry fito amby fitopolo ary osilahy roa amby folo ho fanatitra noho ny ota: Fanatitra dorana manontolo ho an’NY TOMPO ireo rehetra ireo. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: Ny didin’ny mpanjaka kosa dia natolony tamin’ireo solontenany sy ireo governora tamin’ny etỳ andafin’ny ony Eofrata; ary izy ireo dia nampandroso ny olona sy ny tranon’Andriamanitra.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: i Elihoenay, zanak’i Zerahia, avy tamin’ny taranak’i Pahata-Moaba, mbamin’ny namany roanjato lahy;
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ny zanak’i Jahaziela, avy tamin’ny taranak’i Sekania, mbamin’ny namany telonjato lahy;
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: i Ebeda, zanak’i Jonatana, avy tamin’ny taranak’i Adina, mbamin’ny namany dimampolo lahy;
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: i Jesaia, zanak’i Atalia, avy tamin’ny taranak’i Elama, mbamin’ny namany fitopolo lahy;
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: i Zebadia, zanak’i Mikaela, avy tamin’ny taranak’i Sefatia, mbamin’ny namany valopolo lahy;
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: i Obadia, zanak’i Jehiela, avy tamin’ny taranak’i Joaba, mbamin’ny namany valo amby folo sy roanjato lahy;
