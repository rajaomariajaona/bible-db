document_id: ISA.35
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny lalan’ny fahamasinana
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ravoravo ny tany efitra sy ny tany karankaina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mibitaka ny tany ngazana sady mamony tahaka ny lisy;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: mamony be dia be izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, mibitaka sy mihoby izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: homena azy ny voninahitr’i Libanona
- type: usfm
  marker: q1
  children:
  - type: text
    text: mbamin’ny hatsaran-tarehin’i Karmela sy i Saròna.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia hahita ny voninahitry NY TOMPO
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny famirapiratan’Andriamanitsika izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ampaherezonareo ny tanana miraviravy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hatanjaho ny lohalika malemy;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Lazao amin’izay mitebiteby hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mahereza, aza matahotra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: indro Andriamanitrareo!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Avy mitondra famaliana Izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ny famalian’Andriamanitra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, Izy tokoa no ho avy ka hamonjy anareo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Dia hampahiratina ny mason’ny jamba
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hampandrenesina ny sofin’ny marenina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Hitsambikina tahaka ny diera ny mandringa
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hihoby ny lelan’ny moana.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa hisy rano hiboiboika any an-tany efitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hisy renirano any amin’ny tany karankaina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ny tany ngazana dia ho tonga farihy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny tany mangentana dia ho loharano miboiboika;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny fonenana izay amitsahan’ny amboadia
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia haniry volotara sy zozoro.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Hisy lalambe any, lalana voavoatra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay hatao hoe lalan’ny fahamasinana.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy mba handia izany ny tsy madio;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ho an’izay mandeha eo aminy kosa,
- type: usfm
  marker: q1
  children:
  - type: text
    text: na ny adala aza dia tsy ho diso lalana;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: tsy hisy liona ao
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady tsy hiakaran’ny biby masiaka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy ho hita ao ireny
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny olona navotana no handeha ao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Eny, hiverina ny navotan’NY TOMPO.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Hankany '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Ziona
  - type: text
    text: ' amin’ny fihobiana izy ireo,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny fifaliana mandrakizay no ho eny an-dohany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hahazo fifaliana sy faharavoravoana izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka handositra ny alahelo sy ny fisentoana.
