document_id: ISA.35,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny lalan’ny fahamasinana
  - type: text
    content: Ravoravo ny tany efitra sy ny tany karankaina,
  - type: text
    content: mibitaka ny tany ngazana sady mamony tahaka ny lisy;
  '10':
  - type: text
    content: Eny, hiverina ny navotan’NY TOMPO.
  - type: text
    content: 'Hankany '
  - type: text
    content: Ziona
  - type: text
    content: ' amin’ny fihobiana izy ireo,'
  - type: text
    content: ary ny fifaliana mandrakizay no ho eny an-dohany;
  - type: text
    content: hahazo fifaliana sy faharavoravoana izy
  - type: text
    content: ka handositra ny alahelo sy ny fisentoana.
  '2':
  - type: text
    content: mamony be dia be izy;
  - type: text
    content: eny, mibitaka sy mihoby izy,
  - type: text
    content: homena azy ny voninahitr’i Libanona
  - type: text
    content: mbamin’ny hatsaran-tarehin’i Karmela sy i Saròna.
  - type: text
    content: Dia hahita ny voninahitry NY TOMPO
  - type: text
    content: sy ny famirapiratan’Andriamanitsika izy.
  '3':
  - type: text
    content: Ampaherezonareo ny tanana miraviravy
  - type: text
    content: ary hatanjaho ny lohalika malemy;
  '4':
  - type: text
    content: 'Lazao amin’izay mitebiteby hoe:'
  - type: text
    content: Mahereza, aza matahotra,
  - type: text
    content: indro Andriamanitrareo!
  - type: text
    content: Avy mitondra famaliana Izy,
  - type: text
    content: dia ny famalian’Andriamanitra;
  - type: text
    content: eny, Izy tokoa no ho avy ka hamonjy anareo.
  '5':
  - type: text
    content: Dia hampahiratina ny mason’ny jamba
  - type: text
    content: ary hampandrenesina ny sofin’ny marenina.
  '6':
  - type: text
    content: Hitsambikina tahaka ny diera ny mandringa
  - type: text
    content: ary hihoby ny lelan’ny moana.
  - type: text
    content: Fa hisy rano hiboiboika any an-tany efitra
  - type: text
    content: ary hisy renirano any amin’ny tany karankaina.
  '7':
  - type: text
    content: Ny tany ngazana dia ho tonga farihy,
  - type: text
    content: ary ny tany mangentana dia ho loharano miboiboika;
  - type: text
    content: ny fonenana izay amitsahan’ny amboadia
  - type: text
    content: dia haniry volotara sy zozoro.
  '8':
  - type: text
    content: Hisy lalambe any, lalana voavoatra,
  - type: text
    content: izay hatao hoe lalan’ny fahamasinana.
  - type: text
    content: Tsy mba handia izany ny tsy madio;
  - type: text
    content: fa ho an’izay mandeha eo aminy kosa,
  - type: text
    content: na ny adala aza dia tsy ho diso lalana;
  '9':
  - type: text
    content: tsy hisy liona ao
  - type: text
    content: sady tsy hiakaran’ny biby masiaka,
  - type: text
    content: tsy ho hita ao ireny
  - type: text
    content: fa ny olona navotana no handeha ao.
