      text: 'Raha ny fiangonan’ny Israely manontolo kosa no manota tsy nahy ka meloka, satria misy zavatra tsy hitan’ny mason’ny fiangonana, ary nandika ny iray amin’ireo didin’NY TOMPO amin’izay tsy tokony hatao izy, '
