document_id: LEV.4,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ireo fanatitra hahazoana famelan-keloka
  - type: heading
    content: Noho ny fahotan’ny Mpisoronabe
  - type: text
    content: 'Ary NY TOMPO niteny tamin’i Mosesy hoe: '
  '10':
  - type: text
    content: 'tahaka ny fanalana azy amin’ny omby izay atao fanati-pihavanana ary handoro azy ho fofona eo ambonin’ny alitara fandoroana ny fanatitra dorana manontolo ny mpisorona. '
  '11':
  - type: text
    content: 'Fa ny hoditry ny vantotra ombilahy sy ny henany rehetra mbamin’ny lohany, ny tongony, ny taovany ary ny tain-drorohany, '
  '12':
  - type: text
    content: izany hoe ny tenan’ny vantotra ombilahy manontolo kosa indray no havoakany ho eny ivelan’ny toby, ho eny amin’izay toerana madio fanariana ny lavenona. Handoro azy eo ambonin’ny kitay eo amin’ny afo izy; eo amin’ny fanariana ny lavenona no handoroana azy.
  - type: heading
    content: Noho ny fahotan’ny fiangonana manontolo
  '13':
  - type: text
    content: 'Raha ny fiangonan’ny Israely manontolo kosa no manota tsy nahy ka meloka, satria misy zavatra tsy hitan’ny mason’ny fiangonana, ary nandika ny iray amin’ireo didin’NY TOMPO amin’izay tsy tokony hatao izy, '
  '14':
  - type: text
    content: 'rehefa fantatra ny ota izay nataony, dia hanatitra vantotra ombilahy iray ny fiangonana mba ho fanatitra fanadiovana ka hitondra izany ho eo anoloan’ny '
  - type: text
    content: tranolay fihaonana
  - type: text
    content: '. '
  '15':
  - type: text
    content: 'Ary ny loholon’ny fiangonana dia hametraka ny tanany eo amin’ny lohan’ny vantotra ombilahy eo anatrehan’NY TOMPO dia hovonoina eo anatrehan’NY TOMPO ilay vantotra ombilahy. '
  '16':
  - type: text
    content: 'Avy eo dia hakan’ny mpisorona voahosotra ny ran’ny vantotra ombilahy ka hoentiny ao amin’ny tranolay fihaonana; '
  '17':
  - type: text
    content: 'ary hanatsoboka ny fanondrony amin’ny ra ny mpisorona ka hafafiny impito eo anatrehan’NY TOMPO eo anoloan’ny efitra lamba izany. '
  '18':
  - type: text
    content: 'Hakany koa ny ra dia hohosorany ireo '
  - type: text
    content: tandroky
  - type: text
    content: ' ny alitara izay eo anatrehan’NY TOMPO, dia ilay ao anatin’ny tranolay fihaonana. Ny ra sisa rehetra dia haidiny eo an-tongotry ny alitara fandoroana ny fanatitra dorana manontolo, izay eo am-baravaran’ny tranolay fihaonana. '
  '19':
  - type: text
    content: 'Hesoriny ny jaborany rehetra ka hodorany ho fofona eo ambonin’ny alitara. '
  '2':
  - type: text
    content: 'Mitenena amin’ny Zanak’Israely hoe: Raha misy olona manota tsy nahy amin’ny fandikana ny iray amin’ireny didin’NY TOMPO rehetra ireny ka manao izay tsy tokony hatao:'
  '20':
  - type: text
    content: 'Ary ilay vantotra ombilahy dia hataony tahaka ny nataony tamin’ny vantotra ombilahy izay natao fanatitra fanadiovana, toy izany no hanaovany azy. Dia hanao fanavotana ho an’ny olona ny mpisorona ka havela ny helony. '
  '21':
  - type: text
    content: Ary ilay vantotra ombilahy dia havoakany ho eny ivelan’ny toby ka hodorany tahaka ny nandoroany ny vantotra ombilahy voalohany. Fanatitra fanadiovana ho an’ny fiangonana izany.
  - type: heading
    content: Noho ny fahotan’ny mpitondra
  '22':
  - type: text
    content: 'Raha misy mpanapaka manota tsy nahy ary meloka satria mandika ny iray amin’ny didin’NY TOMPO Andriamaniny amin’izay tsy tokony hatao, '
  '23':
  - type: text
    content: 'raha misy olona mampahafantatra azy ny fahotana nataony, dia hitondra osilahy iray tsy misy kilema ho fanatiny izy. '
  '24':
  - type: text
    content: 'Hametraka ny tanany eo amin’ny lohan’ny osilahy izy dia hamono azy eo amin’ny famonoana ny fanatitra dorana manontolo eo anatrehan’NY TOMPO. Fanatitra fanadiovana izany. '
  '25':
  - type: text
    content: 'Hakan’ny mpisorona amin’ny fanondrony ny ran’ny fanatitra fanadiovana ka hahosony eo amin’ireo '
  - type: text
    content: tandroky
  - type: text
    content: ' ny alitara fandoroana ny fanatitra dorana manontolo; ny ra sisa kosa dia haidiny eo an-tongotry ny alitara fandoroana ny fanatitra dorana manontolo. '
  '26':
  - type: text
    content: Ny jaborany rehetra dia hodorany ho fofona eo ambonin’ny alitara, tahaka ny jaboran’ny fanati-pihavanana. Ary hanao fanavotana ho azy noho ny fahotany ny mpisorona dia havela ny helony.
  - type: heading
    content: Noho ny fahotan’ny olon-tsotra
  '27':
  - type: text
    content: 'Raha misy olona amin’ny vahoaka manota tsy nahy ary meloka satria mandika ny iray amin’ireo didin’NY TOMPO amin’izay tsy tokony hatao, '
  '28':
  - type: text
    content: 'raha misy olona mampahafantatra azy ny fahotana nataony, dia hitondra osivavy iray tsy misy kilema ho fanatiny noho ny fahotana izay vitany izy. '
  '29':
  - type: text
    content: 'Ary hametraka ny tanany eo amin’ny lohan’ny fanatitra fanadiovana izy dia hamono azy eo amin’ny fitoeran’ny fanatitra dorana manontolo. '
  '3':
  - type: text
    content: 'Raha ny mpisorona voahosotra no manota ka mahameloka ny olona dia aoka izy hanolotra vantotra ombilahy tsy misy kilema noho ny fahotana izay vitany, dia fanatitra fanadiovana ho an’NY TOMPO. '
  '30':
  - type: text
    content: 'Hakan’ny mpisorona amin’ny fanondrony ny ra ka hohosorany ireo '
  - type: text
    content: tandroky
  - type: text
    content: ' ny alitara fandoroana ny fanatitra dorana manontolo, ny ra sisa rehetra kosa dia hararany eo an-tongotry ny alitara. '
  '31':
  - type: text
    content: Hesoriny avokoa ny jaborany rehetra, tahaka ny fanesorana ny jaboran’ny fanati-pihavanana, ary handoro azy ho fofona eo ambonin’ny alitara ny mpisorona ho hanitra ankasitrahana ho an’NY TOMPO; ary hanao fanavotana ho azy ny mpisorona dia havela ny helony.
  '32':
  - type: text
    content: 'Raha ondry no entiny ho fanatitra noho ny ota dia vavy iray tsy misy kilema no hoentiny. '
  '33':
  - type: text
    content: 'Hametraka ny tanany eo amin’ny lohan’ny fanatitra fanadiovana izy dia hamono azy ho fanatitra fanadiovana eo amin’ny famonoana ny fanatitra dorana manontolo. '
  '34':
  - type: text
    content: 'Hakan’ny mpisorona amin’ny fanondrony ny ran’ny fanatitra fanadiovana dia hohosorany ireo tandroky ny alitara fandoroana ny fanatitra dorana manontolo, ary ny ra sisa rehetra dia haidiny eo an-tongotry ny alitara. '
  '35':
  - type: text
    content: Hesoriny avokoa ny jaborany rehetra, tahaka ny fanesorana ny jaboran’ny ondry izay natao fanati-pihavanana, ary ny mpisorona dia handoro azy ho fofona eo amin’ny alitara, eo ambonin’ny fanatitra levonina amin’ny afo ho an’NY TOMPO. Hanao fanavotana ho azy ny mpisorona noho ny fahotany izay nataony dia havela ny helony.
  '4':
  - type: text
    content: 'Hitondra ny vantotra ombilahy ho eo anoloan’ny varavaran’ny '
  - type: text
    content: tranolay fihaonana
  - type: text
    content: ' eo anatrehan’NY TOMPO izy ka hametraka ny tanany amin’ny lohan’ny vantotra ombilahy ary hamono azy eo anatrehan’NY TOMPO. '
  '5':
  - type: text
    content: 'Hakan’ny mpisorona voahosotra ny ran’ny vantotra ombilahy dia hoentiny ho ao amin’ny tranolay fihaonana; '
  '6':
  - type: text
    content: 'ary hanatsoboka ny fanondrony ao amin’ny ra ny mpisorona ka hafafiny impito eo anatrehan’NY TOMPO, eo anoloan’ny efitra lamba ao amin’ny fitoerana masina izany. '
  '7':
  - type: text
    content: 'Hotentenan’ny mpisorona ra ireo '
  - type: text
    content: tandroky
  - type: text
    content: ' ny alitara fandoroana ditin-kazo manitra eo anatrehan’NY TOMPO, dia ireo ao amin’ny tranolay fihaonana. Ny ra sisa rehetra avy amin’ny vantotra ombilahy kosa dia hararany eo an-tongotry ny alitara fandoroana ny fanatitra dorana manontolo, izay eo anoloan’ny varavaran’ny tranolay fihaonana. '
  '8':
  - type: text
    content: 'Dia halainy avokoa ny jaborany rehetra amin’ilay vantotra ombilahy izay atao fanatitra fanadiovana, dia ny jabora mandrakotra ny taovany sy ny jaboran-tsinainy, '
  '9':
  - type: text
    content: 'ny voany roa mbamin’ny jabora mandrakotra azy, izay rehetra eo amin’ny takibany ary ny ila atiny lehibe. Hataony indray manala amin’ny voany no fakany izany, '
