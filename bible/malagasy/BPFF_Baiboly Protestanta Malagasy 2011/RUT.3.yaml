document_id: RUT.3
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Matory eo an-tongotr’i Boaza i Rota
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Dia hoy i Naomy rafozambaviny taminy: Tsy hitady izay tokantrano hahitanao fiadanana va aho anaka, mba hahasoa anao? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary ankehitriny, tsy isan’ny havantsika va i Boaza, tompon’ireo zatovovavy izay niarahanao? Indro, mikororòka varimbazaha eo am-pamoloana izy anio alina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Koa mandroa sy mihosora diloilo ary miakanjoa, dia midìna any am-pamoloana. Nefa aza atao fantatr’i Ralehilahy akory ianao raha tsy efa avy nihinana sy nisotro izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary rehefa mandry izy dia fantaro izay andriany ary midira ka songay ny lamba eo an-tongony, dia mandria eo ianao. Ary holazainy aminao izay hataonao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia hoy izy taminy: Eny, hataoko izay rehetra lazainao amiko.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia nidina tany am-pamoloana izy ka nanatanteraka izay rehetra nandidian’ny rafozambaviny azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary rehefa avy nihinana sy nisotro i Boaza ka faly ny fony dia nandeha handry teo amin’ny sisin’ny antontam-bary izy; fa nandeha nitsaitsaika kosa i Rota, dia nanonga ny lamba teo an-tongony ka nandry teo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary nony mamatonalina dia nangorohoro Ralehilahy ka niarina hitsapa ary indro, nisy vehivavy nandry teo an-tongony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Dia hoy izy: Iza moa izato? Ary hoy kosa Ravehivavy: Rota mpanompovavinao aho. Mba rakofy ny lambanao ny mpanompovavinao, fa havana mahavotra ianao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dia hoy izy: Hotahìn’NY TOMPO anie ianao, anaka! Izao farany izao ianao dia nanao soa be lavitra noho ny tamin’ny voalohany, noho ny tsy nandehananao nanaraka ny zatovo, na ny mahantra, na ny manankarena. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Koa ankehitriny anaka, aza matahotra; hataoko aminao izay rehetra angatahinao; fa fantatry ny fireneko rehetra eo an-tanàna fa vehivavy mendrika ianao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ankehitriny, marina fa havana mahavotra aho, nefa misy havana mahavotra akaiky kokoa noho izaho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Mitoera ihany atỳ anio alina, ary rehefa maraina, raha hanavotra anao izy dia tsara izany, aoka izy no hanavotra anao; fa raha toa ka tsy hanao izany izy dia izaho no hanavotra anao, raha velona koa NY TOMPO! Mitoera ihany atỳ mandra-paharain’ny andro.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dia nandry teo an-tongony mandra-paharain’ny andro i Rota, ary nifoha raha mbola maizimaizina, ilay mbola tsy ifankahalalana iny. Fa hoy Ralehilahy: Aza avela ho fantatr’olona fa tatỳ am-pamoloana Ravehivavy! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Dia hoy koa izy: Ento atỳ ny lamba itafianao ka hazòny. Ary rehefa nataony izany dia namatra varimbazaha inenin’ny famarana i Boaza ka nampitondrainy azy izany. Dia lasa nankany an-tanàna i Boaza.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Rehefa tonga tany amin’ny rafozambaviny i Rota dia hoy i Naomy: Nanao ahoana izay tany, anaka? Dia nambarany azy izay rehetra nataon-dRalehilahy taminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Hoy koa izy: Ireto varimbazaha inenin’ny famarana ireto dia nomeny ahy; fa hoy izy tamiko: Aza mandeha tsy mitondra zavatra ho any amin’ny rafozambavinao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Dia hoy i Naomy: Mitoera ihany anaka, mandra-pahafantatrao izay hiafaran’ny raharaha; fa tsy hijanona Ralehilahy raha tsy vitainy anio ihany izany.'
