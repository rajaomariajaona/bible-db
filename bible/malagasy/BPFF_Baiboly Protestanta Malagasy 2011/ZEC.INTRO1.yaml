document_id: ZEC.INTRO1
type_code: plt
segments:
- type: usfm
  marker: imt1
  children:
  - type: text
    text: INDRAY MIJERY
- type: usfm
  marker: ip
  children:
  - type: text
    text: I Zakaria mpaminany dia voalaza ao amin’ny 1.1 sy 1.7, ary Neh 12.16 sy Ezra 5.1; 6.14. Zanak’i Ido izy ary taranaka mpisorona izay tafaverina avy tany amin’ny fahababoana.
- type: usfm
  marker: ip
  children:
  - type: text
    text: Teo anelanelan’ny volana Marsevana 520 tal JK (1.1) sy Kisleo 518 tal JK (7.1) no nahitany ireo fahitana valo izay ao amin’ny 1–8, amin’ny andro anjakan’i Dariosy I, mpanjaka persiana. Ireo fahitana ireo dia manana ny endriky ny soratra apokaliptika, mampiasa sariohatra, izay hazavain’ny anjely iray. Amin’ny ankapobeny, ireny sariohatra ireny, dia manambara ny hamaliana ny firenena jentilisa ary ny hampiorenan’NY TOMPO ny fanjakam-piadanany ao Jerosalema.
- type: usfm
  marker: ip
  children:
  - type: text
    text: Ny Boky dia misy fizarana roa miavaka tsara, izay voasoratra tamin’ny fotoana roa samihafa, dia ny 1–8, izay mikasika ny taona 520–518 tal JK, izany hoe amin’ny andron’i Hagay mpaminany, ary ny 9–14 izay tatỳ aoriana.
- type: usfm
  marker: is1
  children:
  - type: text
    text: Ny votoatin’ny Boky
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Ny Fizarana voalohany, 1–8: Ireo fahitana valo sy teny samihafa nataon’ny Mpaminany.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Ambara ato fa ny fananganana indray ny tempoly sy ny tanànan’i Jerosalema no ho fiandohan’ny andro vaovao, koa izay nofidin’Andriamanitra hitarika amin’izany andro vaovao izany dia i Zerobabela governora sy i Josoa mpisoronabe. Manan-toerana be ato ireo fahitana valo. Toy izao izany:'
- type: usfm
  marker: ipi
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'Ny fahitana voalohany:'
  - type: text
    text: ' Ireo mpitaingin-tsoavaly efatra izay mahita fa miadana ny tany.'
- type: usfm
  marker: ipi
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'Ny fahitana faharoa:'
  - type: text
    text: ' Ireo mpanefy vy manapotika ny tandroka.'
- type: usfm
  marker: ipi
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'Ny fahitana fahatelo:'
  - type: text
    text: ' Ilay mpandrefy tany mandrefy an’i Jerosalema vaovao.'
- type: usfm
  marker: ipi
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'Ny fahitana fahefatra:'
  - type: text
    text: ' Akanjo maloto no eny amin’i Josoa mpisoronabe ka iampangan’i Satana azy izany.'
- type: usfm
  marker: ipi
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'Ny fahitana fahadimy:'
  - type: text
    text: ' Ny fitoeran-jiro volamena sy ny fitoeran-diloilo ary ny hazo oliva roa.'
- type: usfm
  marker: ipi
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'Ny fahitana fahenina:'
  - type: text
    text: ' Ilay horonan-taratasy manambara ny Lalàna na ny Tenin’Andriamanitra.'
- type: usfm
  marker: ipi
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'Ny fahitana fahafito:'
  - type: text
    text: ' Ilay vehivavy misolotena ny faharatsiam-panahy.'
- type: usfm
  marker: ipi
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'Ny fahitana fahavalo:'
  - type: text
    text: ' Ireo kalesy fitondra miady efatra sy ny soavaly samihafa loko.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Ny Fizarana faharoa: 9–14'
- type: usfm
  marker: ip
  children:
  - type: text
    text: Ity fizarana faharoa ity dia mbola maneho ny fanantenana ny hiavian’ny andro vaovao ihany koa, izay miseho amin’ny endrika roa, dia ny hahatongavan’ny fanjakan’Andriamanitra manerana ny tany manontolo, ary ny hahatanterahan’izany amin’ny alalan’ny Mpamonjy iray, izay manana endrika mpanjaka malemy fanahy nefa mpandresy ary mpiandry ondry, ary koa iraka izay novonoina ho faty.
- type: usfm
  marker: ip
  children:
  - type: text
    text: Ireo mpanoratra ny Filazantsara dia mandray ireo endriky ny Mpanjaka voalaza ao amin’ny Zakaria ireo, hilazany ny fahafatesan’i Jesosy.
- type: usfm
  marker: iot
  children:
  - type: text
    text: Ny firafitry ny Boky
- type: usfm
  marker: io1
  children:
  - type: text
    text: 'Fizarana 1: 1–8'
- type: usfm
  marker: io2
  children:
  - type: text
    text: 'Fitarihanteny, izay misy teny fananarana ataon’ny Mpaminany: 1.1-6'
- type: usfm
  marker: io2
  children:
  - type: text
    text: 'Ireo fahitana valo: 1.7–6.8'
- type: usfm
  marker: io2
  children:
  - type: text
    text: 'Ny satroboninahitra hapetraka eo an-dohan’i Josoa: 6.9-15'
- type: usfm
  marker: io2
  children:
  - type: text
    text: 'Teny fananarana ataon’ny Mpaminany: 7'
- type: usfm
  marker: io2
  children:
  - type: text
    text: 'Teny fampanantena ny amin’ny ho avy: 8'
- type: usfm
  marker: io1
  children:
  - type: text
    text: 'Fizarana 2: 9–14'
- type: usfm
  marker: io2
  children:
  - type: text
    text: 'Famaliana sy famonjena ho an’ireo firenena jentilisa: 9.1-8'
- type: usfm
  marker: io2
  children:
  - type: text
    text: 'Ny Mpanjaka malemy fanahy: 9.9-10'
- type: usfm
  marker: io2
  children:
  - type: text
    text: 'Ny TOMPO no miady ho an’i Joda sy Israely, mamely ny Grika: 9.11–10.1'
- type: usfm
  marker: io2
  children:
  - type: text
    text: 'Famaliana ny fanompoan-tsampy: 10.2-3'
- type: usfm
  marker: io2
  children:
  - type: text
    text: 'NY TOMPO no miady ho an’i Joda sy Israely, mamely an’i Asiria sy i Ejipta: 10.4–11.3'
- type: usfm
  marker: io2
  children:
  - type: text
    text: 'NY TOMPO, Mpiandry tsara, ary ireo mpiandry ratsy: 11.4-17'
- type: usfm
  marker: io2
  children:
  - type: text
    text: 'NY TOMPO no miady amin’ireo firenena jentilisa mivondrona hamely an’i Jerosalema sy i Joda: 12.1-9'
- type: usfm
  marker: io2
  children:
  - type: text
    text: 'Ny fanahin’ny fahasoavana sy ny fifonana: 12.10-14'
- type: usfm
  marker: io2
  children:
  - type: text
    text: 'Fanafoanana ny sampy sy ny faminaniana sandoka: 13.1-6'
- type: usfm
  marker: io2
  children:
  - type: text
    text: 'Voan’ny sabatra ny mpiandrin’NY TOMPO: 13.7-9'
- type: usfm
  marker: io2
  children:
  - type: text
    text: 'NY TOMPO miady amin’ireo firenena izay namabo an’i Jerosalema: 14.1-15'
- type: usfm
  marker: io2
  children:
  - type: text
    text: 'Famaliana sy famonjena ho an’ireo firenena izay tonga hamely an’i Jerosalema: 14.16-21'
