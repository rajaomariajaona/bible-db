document_id: ZEC.INTRO1,3103
type_code: plt
verses:
  '1':
  - type: text
    content: INDRAY MIJERY
  - type: text
    content: I Zakaria mpaminany dia voalaza ao amin’ny 1.1 sy 1.7, ary Neh 12.16 sy Ezra 5.1; 6.14. Zanak’i Ido izy ary taranaka mpisorona izay tafaverina avy tany amin’ny fahababoana.
  - type: text
    content: Teo anelanelan’ny volana Marsevana 520 tal JK (1.1) sy Kisleo 518 tal JK (7.1) no nahitany ireo fahitana valo izay ao amin’ny 1–8, amin’ny andro anjakan’i Dariosy I, mpanjaka persiana. Ireo fahitana ireo dia manana ny endriky ny soratra apokaliptika, mampiasa sariohatra, izay hazavain’ny anjely iray. Amin’ny ankapobeny, ireny sariohatra ireny, dia manambara ny hamaliana ny firenena jentilisa ary ny hampiorenan’NY TOMPO ny fanjakam-piadanany ao Jerosalema.
  - type: text
    content: Ny Boky dia misy fizarana roa miavaka tsara, izay voasoratra tamin’ny fotoana roa samihafa, dia ny 1–8, izay mikasika ny taona 520–518 tal JK, izany hoe amin’ny andron’i Hagay mpaminany, ary ny 9–14 izay tatỳ aoriana.
  - type: text
    content: Ny votoatin’ny Boky
  - type: text
    content: 'Ny Fizarana voalohany, 1–8: Ireo fahitana valo sy teny samihafa nataon’ny Mpaminany.'
  - type: text
    content: 'Ambara ato fa ny fananganana indray ny tempoly sy ny tanànan’i Jerosalema no ho fiandohan’ny andro vaovao, koa izay nofidin’Andriamanitra hitarika amin’izany andro vaovao izany dia i Zerobabela governora sy i Josoa mpisoronabe. Manan-toerana be ato ireo fahitana valo. Toy izao izany:'
  - type: text
    content: 'Ny fahitana voalohany:'
  - type: text
    content: ' Ireo mpitaingin-tsoavaly efatra izay mahita fa miadana ny tany.'
  - type: text
    content: 'Ny fahitana faharoa:'
  - type: text
    content: ' Ireo mpanefy vy manapotika ny tandroka.'
  - type: text
    content: 'Ny fahitana fahatelo:'
  - type: text
    content: ' Ilay mpandrefy tany mandrefy an’i Jerosalema vaovao.'
  - type: text
    content: 'Ny fahitana fahefatra:'
  - type: text
    content: ' Akanjo maloto no eny amin’i Josoa mpisoronabe ka iampangan’i Satana azy izany.'
  - type: text
    content: 'Ny fahitana fahadimy:'
  - type: text
    content: ' Ny fitoeran-jiro volamena sy ny fitoeran-diloilo ary ny hazo oliva roa.'
  - type: text
    content: 'Ny fahitana fahenina:'
  - type: text
    content: ' Ilay horonan-taratasy manambara ny Lalàna na ny Tenin’Andriamanitra.'
  - type: text
    content: 'Ny fahitana fahafito:'
  - type: text
    content: ' Ilay vehivavy misolotena ny faharatsiam-panahy.'
  - type: text
    content: 'Ny fahitana fahavalo:'
  - type: text
    content: ' Ireo kalesy fitondra miady efatra sy ny soavaly samihafa loko.'
  - type: text
    content: 'Ny Fizarana faharoa: 9–14'
  - type: text
    content: Ity fizarana faharoa ity dia mbola maneho ny fanantenana ny hiavian’ny andro vaovao ihany koa, izay miseho amin’ny endrika roa, dia ny hahatongavan’ny fanjakan’Andriamanitra manerana ny tany manontolo, ary ny hahatanterahan’izany amin’ny alalan’ny Mpamonjy iray, izay manana endrika mpanjaka malemy fanahy nefa mpandresy ary mpiandry ondry, ary koa iraka izay novonoina ho faty.
  - type: text
    content: Ireo mpanoratra ny Filazantsara dia mandray ireo endriky ny Mpanjaka voalaza ao amin’ny Zakaria ireo, hilazany ny fahafatesan’i Jesosy.
  - type: text
    content: Ny firafitry ny Boky
  - type: text
    content: 'Fizarana 1: 1–8'
  - type: text
    content: 'Fitarihanteny, izay misy teny fananarana ataon’ny Mpaminany: 1.1-6'
  - type: text
    content: 'Ireo fahitana valo: 1.7–6.8'
  - type: text
    content: 'Ny satroboninahitra hapetraka eo an-dohan’i Josoa: 6.9-15'
  - type: text
    content: 'Teny fananarana ataon’ny Mpaminany: 7'
  - type: text
    content: 'Teny fampanantena ny amin’ny ho avy: 8'
  - type: text
    content: 'Fizarana 2: 9–14'
  - type: text
    content: 'Famaliana sy famonjena ho an’ireo firenena jentilisa: 9.1-8'
  - type: text
    content: 'Ny Mpanjaka malemy fanahy: 9.9-10'
  - type: text
    content: 'Ny TOMPO no miady ho an’i Joda sy Israely, mamely ny Grika: 9.11–10.1'
  - type: text
    content: 'Famaliana ny fanompoan-tsampy: 10.2-3'
  - type: text
    content: 'NY TOMPO no miady ho an’i Joda sy Israely, mamely an’i Asiria sy i Ejipta: 10.4–11.3'
  - type: text
    content: 'NY TOMPO, Mpiandry tsara, ary ireo mpiandry ratsy: 11.4-17'
  - type: text
    content: 'NY TOMPO no miady amin’ireo firenena jentilisa mivondrona hamely an’i Jerosalema sy i Joda: 12.1-9'
  - type: text
    content: 'Ny fanahin’ny fahasoavana sy ny fifonana: 12.10-14'
  - type: text
    content: 'Fanafoanana ny sampy sy ny faminaniana sandoka: 13.1-6'
  - type: text
    content: 'Voan’ny sabatra ny mpiandrin’NY TOMPO: 13.7-9'
  - type: text
    content: 'NY TOMPO miady amin’ireo firenena izay namabo an’i Jerosalema: 14.1-15'
  - type: text
    content: 'Famaliana sy famonjena ho an’ireo firenena izay tonga hamely an’i Jerosalema: 14.16-21'
