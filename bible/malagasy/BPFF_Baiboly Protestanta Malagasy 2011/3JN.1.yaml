document_id: 3JN.1,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fiarahabana
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Izaho loholona
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.1 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: presbytera.
      marker-yv: yv-n
    - type: text
      text: ' no mamangy an’i Gaio, ilay malala, izay tiako amin’ny fahamarinana.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Koa amin’izany, raha tonga aho, dia hotsarovako izay asa ataony, fa mibedibedy foana manaratsy anay izy; ary tsy afa-po amin’izany ihany, fa ny tenany dia tsy mandray ireo rahalahy ireo, ary izay ta handray azy dia rarany sy roahiny hiala amin’ny fiangonana.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Ry malala, aza ny ratsy no alain-tahaka fa ny tsara. Izay manao ny tsara no avy amin’Andriamanitra; fa izay manao ny ratsy tsy mba nahita an’Andriamanitra.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: I Demetrio dia tsara laza amin’ny olona rehetra sy amin’ny fahamarinana koa; izahay koa manambara izany ary fantatrao fa marina ny fanambarànay.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mandra-pihaona indray
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Maro ny zavatra tiako ho nosoratana taminao nefa tsy tiako hosoratana aminao amin’ny ranomainty sy ny penina. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Fa manantena hahita anao faingana ihany aho dia hiresaka mifanatrika isika.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Ho aminao anie ny fiadanana! Ny namana atỳ dia manao veloma anao. Veloma amin’ny namana tsirairay araka ny anarany avy.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Ry malala, mangataka aho mba hambinina sy ho salama amin’ny zavatra rehetra anie ianao, tahaka izay anambinana ny fanahinao ihany.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: I Gaio sy ireo misionera mpitety tany
    marker-yv: yv-h
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Fa faly indrindra aho, fony nisy rahalahy tonga ka nanambara ny fahamarinanao, dia ny fandehananao amin’ny marina. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Tsy manana fifaliana mihoatra noho izao aho dia ny andrenesako fa mandeha amin’ny marina ny zanako.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ry malala, manao asa mahatoky ianao amin’izay rehetra ataonao amin’ireo rahalahy ireo na dia vahiny aza izy; '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: nambaran’ireo teo anatrehan’ny fiangonana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.6 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: eklesia.
      marker-yv: yv-n
    - type: text
      text: ' ny fitiavanao. Soa no ataonao, raha mamatsy azy amin’ny diany koa ianao, araka izay mendrika hatao noho ny amin’Andriamanitra. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Fa noho ny Anarana no niaingany, nefa tsy nandray na inona na inona avy tamin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jentilisa
    - type: text
      text: ' izy. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Koa isika dia tokony handray tsara ny olona toy izany, mba ho mpiara-miasa aminy amin’ny fahamarinana isika.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: I Diotrefa sy i Demetrio
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Nanoratra tamin’ny fiangonana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.9 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: eklesia.
      marker-yv: yv-n
    - type: text
      text: ' ihany aho; nefa i Diotrefa, izay te ho lohany, dia tsy mba mandray anay. '
