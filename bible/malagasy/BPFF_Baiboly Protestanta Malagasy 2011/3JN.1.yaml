document_id: 3JN.1,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Fiarahabana
  - type: text
    content: Izaho loholona
  - type: note
    content: 'Na: presbytera.'
  - type: text
    content: ' no mamangy an’i Gaio, ilay malala, izay tiako amin’ny fahamarinana.'
  '10':
  - type: text
    content: Koa amin’izany, raha tonga aho, dia hotsarovako izay asa ataony, fa mibedibedy foana manaratsy anay izy; ary tsy afa-po amin’izany ihany, fa ny tenany dia tsy mandray ireo rahalahy ireo, ary izay ta handray azy dia rarany sy roahiny hiala amin’ny fiangonana.
  '11':
  - type: text
    content: Ry malala, aza ny ratsy no alain-tahaka fa ny tsara. Izay manao ny tsara no avy amin’Andriamanitra; fa izay manao ny ratsy tsy mba nahita an’Andriamanitra.
  '12':
  - type: text
    content: I Demetrio dia tsara laza amin’ny olona rehetra sy amin’ny fahamarinana koa; izahay koa manambara izany ary fantatrao fa marina ny fanambarànay.
  - type: heading
    content: Mandra-pihaona indray
  '13':
  - type: text
    content: 'Maro ny zavatra tiako ho nosoratana taminao nefa tsy tiako hosoratana aminao amin’ny ranomainty sy ny penina. '
  '14':
  - type: text
    content: Fa manantena hahita anao faingana ihany aho dia hiresaka mifanatrika isika.
  '15':
  - type: text
    content: Ho aminao anie ny fiadanana! Ny namana atỳ dia manao veloma anao. Veloma amin’ny namana tsirairay araka ny anarany avy.
  '2':
  - type: text
    content: Ry malala, mangataka aho mba hambinina sy ho salama amin’ny zavatra rehetra anie ianao, tahaka izay anambinana ny fanahinao ihany.
  - type: heading
    content: I Gaio sy ireo misionera mpitety tany
  '3':
  - type: text
    content: 'Fa faly indrindra aho, fony nisy rahalahy tonga ka nanambara ny fahamarinanao, dia ny fandehananao amin’ny marina. '
  '4':
  - type: text
    content: Tsy manana fifaliana mihoatra noho izao aho dia ny andrenesako fa mandeha amin’ny marina ny zanako.
  '5':
  - type: text
    content: 'Ry malala, manao asa mahatoky ianao amin’izay rehetra ataonao amin’ireo rahalahy ireo na dia vahiny aza izy; '
  '6':
  - type: text
    content: nambaran’ireo teo anatrehan’ny fiangonana
  - type: note
    content: 'Na: eklesia.'
  - type: text
    content: ' ny fitiavanao. Soa no ataonao, raha mamatsy azy amin’ny diany koa ianao, araka izay mendrika hatao noho ny amin’Andriamanitra. '
  '7':
  - type: text
    content: 'Fa noho ny Anarana no niaingany, nefa tsy nandray na inona na inona avy tamin’ny '
  - type: text
    content: Jentilisa
  - type: text
    content: ' izy. '
  '8':
  - type: text
    content: Koa isika dia tokony handray tsara ny olona toy izany, mba ho mpiara-miasa aminy amin’ny fahamarinana isika.
  - type: heading
    content: I Diotrefa sy i Demetrio
  '9':
  - type: text
    content: Nanoratra tamin’ny fiangonana
  - type: note
    content: 'Na: eklesia.'
  - type: text
    content: ' ihany aho; nefa i Diotrefa, izay te ho lohany, dia tsy mba mandray anay. '
