document_id: JOB.11,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: 'Ny teny voalohany nataon’i Zofara: Miverena amin’Andriamanitra ianao'
  - type: text
    content: 'Dia nandray fitenenana i Zofara namatita hoe:'
  '10':
  - type: text
    content: Raha mandroso Izy ka misambotra ary manao fitsarana
  - type: text
    content: dia iza moa no mahasakana Azy?
  '11':
  - type: text
    content: Fa Izy mahafantatra ny olon-dratsy
  - type: text
    content: ary hitany ny heloka na dia tsy mandinika akory aza Izy.
  '12':
  - type: text
    content: Fa ny fahendren’olombelona dia fahendrena poakaty
  - type: text
    content: ary raha vao teraka izy dia toy ny zanaky ny borikidia.
  '13':
  - type: text
    content: Fa raha ampanatrehinao Azy ny fonao
  - type: text
    content: ary atantinao Aminy ny tananao
  '14':
  - type: text
    content: ka misy heloka eo an-tananao dia ario lavitra izany
  - type: text
    content: ary aza avela hisy ratsy hitoetra ao an-dainao;
  '15':
  - type: text
    content: dia hahazo hanandratra ny tavanao tsy misy tsiny ianao,
  - type: text
    content: koa hijoro tsara ary tsy hatahotra;
  '16':
  - type: text
    content: 'fa ho hadinonao ny fahorianao:'
  - type: text
    content: toy ny rano efa nandalo no hahatsiarovanao azy.
  '17':
  - type: text
    content: Ary hamirapiratra lavitra noho ny mitataovovonana ny andronao;
  - type: text
    content: na dia sendra manjombona aza dia ho tonga tahaka ny maraina.
  '18':
  - type: text
    content: Hatoky ianao satria misy ny fanantenana;
  - type: text
    content: eny, hijery manodidina ianao ka handry tsy amin’ahiahy.
  '19':
  - type: text
    content: Dia ho tafandry ianao fa tsy hisy hanaitaitra
  - type: text
    content: ary maro no hila sitraka aminao.
  '2':
  - type: text
    content: Moa tsy hovaliana va ny teny be toy izany?
  - type: text
    content: Ary moa raha maro vava dia ho marina va?
  '20':
  - type: text
    content: Fa ny mason’ny ratsy fanahy kosa dia ho pahina
  - type: text
    content: ka ho levona avokoa ny toeram-pialofany
  - type: text
    content: ary ny fialana aina ihany no hany sisa azony antenaina.
  '3':
  - type: text
    content: Ny bedibedinao va no hampangina ny olona?
  - type: text
    content: Dia haniratsira ianao ka tsy hisy handresy lahatra?
  '4':
  - type: text
    content: 'Hoy ianao: Madio ny teny nalahatro'
  - type: text
    content: ary tsy nanan-tsiny teo imasonao aho.
  '5':
  - type: text
    content: Enga anie ka hiteny Andriamanitra
  - type: text
    content: ka hiloa-bava hamaly anao!
  '6':
  - type: text
    content: Dia hasehony aminao ny fahendrena miafina
  - type: text
    content: fa tsy hita lany izany,
  - type: text
    content: koa ho fantatrao fa navelan’Andriamanitra ny helokao sasany.
  '7':
  - type: text
    content: Takatry ny sainao va ny fomban’Andriamanitra?
  - type: text
    content: Ary hitanao va hatrany amin’ny fahatanterahan’ny Tsitoha?
  '8':
  - type: text
    content: Avo tahaka ny lanitra izany ka inona no hainao atao?
  - type: text
    content: 'Lalina noho ny '
  - type: text
    content: fitoeran’ny maty
  - type: text
    content: ' izany ka inona no fantatrao?'
  '9':
  - type: text
    content: Mihoatra noho ny tany ny fivelarany
  - type: text
    content: ary lehibe noho ny ranomasina.
