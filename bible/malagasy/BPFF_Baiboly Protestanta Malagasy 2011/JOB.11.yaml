document_id: JOB.11
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Ny teny voalohany nataon’i Zofara: Miverena amin’Andriamanitra ianao'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Dia nandray fitenenana i Zofara namatita hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Moa tsy hovaliana va ny teny be toy izany?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary moa raha maro vava dia ho marina va?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ny bedibedinao va no hampangina ny olona?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia haniratsira ianao ka tsy hisy handresy lahatra?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Hoy ianao: Madio ny teny nalahatro'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy nanan-tsiny teo imasonao aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Enga anie ka hiteny Andriamanitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hiloa-bava hamaly anao!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Dia hasehony aminao ny fahendrena miafina
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa tsy hita lany izany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: koa ho fantatrao fa navelan’Andriamanitra ny helokao sasany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Takatry ny sainao va ny fomban’Andriamanitra?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hitanao va hatrany amin’ny fahatanterahan’ny Tsitoha?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Avo tahaka ny lanitra izany ka inona no hainao atao?
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Lalina noho ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: fitoeran’ny maty
  - type: text
    text: ' izany ka inona no fantatrao?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Mihoatra noho ny tany ny fivelarany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary lehibe noho ny ranomasina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Raha mandroso Izy ka misambotra ary manao fitsarana
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia iza moa no mahasakana Azy?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Fa Izy mahafantatra ny olon-dratsy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hitany ny heloka na dia tsy mandinika akory aza Izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Fa ny fahendren’olombelona dia fahendrena poakaty
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary raha vao teraka izy dia toy ny zanaky ny borikidia.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Fa raha ampanatrehinao Azy ny fonao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary atantinao Aminy ny tananao
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ka misy heloka eo an-tananao dia ario lavitra izany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary aza avela hisy ratsy hitoetra ao an-dainao;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: dia hahazo hanandratra ny tavanao tsy misy tsiny ianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: koa hijoro tsara ary tsy hatahotra;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'fa ho hadinonao ny fahorianao:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: toy ny rano efa nandalo no hahatsiarovanao azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ary hamirapiratra lavitra noho ny mitataovovonana ny andronao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: na dia sendra manjombona aza dia ho tonga tahaka ny maraina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Hatoky ianao satria misy ny fanantenana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, hijery manodidina ianao ka handry tsy amin’ahiahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Dia ho tafandry ianao fa tsy hisy hanaitaitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary maro no hila sitraka aminao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Fa ny mason’ny ratsy fanahy kosa dia ho pahina
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka ho levona avokoa ny toeram-pialofany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny fialana aina ihany no hany sisa azony antenaina.
