document_id: 2SA.3,3103
type_code: plt
verses:
  '1':
  - type: text
    content: Naharitra ela ny adin’ny taranak’i Saoly sy ny taranak’i Davida, nefa i Davida dia nihanahery, fa ny taranak’i Saoly kosa dia nihaosa.
  - type: heading
    content: Ireo zanak’i Davida nateraka tany Hebrona
  - type: heading
    content: 1Tan 3.1-4
  '10':
  - type: text
    content: 'ka hampiala ny fanjakana amin’ny taranak’i Saoly aho ary hampitoetra ny sezafiandrianan’i Davida amin’ny Israely sy amin’ny Joda hatrany Dana ka hatrany Bery-Sheba. '
  '11':
  - type: text
    content: Dia tsy nahavaly an’i Abnera intsony izy noho ny fahatahorany azy.
  - type: heading
    content: Manao fifanekena amin’i Davida i Abnera
  '12':
  - type: text
    content: 'Naniraka olona tany amin’i Davida niaraka tamin’izay i Abnera mba hisolo vava azy hiteny hoe: An’iza ny tany? Ary koa hoe: Manaova fanekena amiko dia indro homba anao ny tanako ka hampanaiky ny Israely rehetra anao. '
  '13':
  - type: text
    content: 'Dia hoy i Davida: Tsara izany! Hanao fanekena aminao aho. Zavatra iray loha anefa no ilaiko aminao: Tsy hahazo mihaona amiko ianao raha tsy entinao atỳ i Mikala, zanakavavin’i Saoly. '
  '14':
  - type: text
    content: 'Ary nandefa iraka nankany amin’Isboseta, zanakalahin’i Saoly i Davida hilaza hoe: Omeo ahy i Mikala vadiko, izay efa nifanekena ho vadiko tamin’ny mariky ny saron-tsotsòkan’ny Filistina zato lahy'
  - type: note
    content: Zahao 1Sam 18.25.
  - type: text
    content: '. '
  '15':
  - type: text
    content: 'Ary Isboseta dia nandefa iraka haka an’i Mikala tany amin’i Paltiela vadiny, zanak’i Laisy. '
  '16':
  - type: text
    content: 'Nanaraka azy io vadiny io ka nitomany teny aorianany hatrany Bahorima. Nefa hoy i Abnera taminy: Mandehana miverina! Dia niverina izy.'
  '17':
  - type: text
    content: 'Dia niteny tamin’ny loholon’ny Israely i Abnera hoe: Efa ela izay no nitadiavanareo an’i Davida ho mpanjakanareo; '
  '18':
  - type: text
    content: 'koa tanteraho izany ankehitriny, fa NY TOMPO efa nilaza an’i Davida hoe: Amin’ny tanan’i Davida mpanompoko no hamonjeko ny Israely oloko ho afaka amin’ny tanan’ny Filistina sy amin’ny tanan’ny fahavalony rehetra. '
  '19':
  - type: text
    content: 'Niteny tamin’ny Benjaminita koa i Abnera, avy eo dia lasa izy hilaza amin’i Davida tao Hebrona izay rehetra tian’ny Israely sy ny taranak’i Benjamina rehetra hatao. '
  '2':
  - type: text
    content: 'Niteraka zazalahy tao Hebrona i Davida. I Amnona no lahimatoany, tamin’i Ahinoama jezirelita; '
  '20':
  - type: text
    content: 'Dia tonga tany amin’i Davida tao Hebrona i Abnera sy olona roapolo lahy nanaraka azy. Ary nanao fanasana ho an’i Abnera sy ny olona nanaraka azy i Davida. '
  '21':
  - type: text
    content: 'Ary hoy i Abnera tamin’i Davida: Hiainga aho dia handeha hamory ny Israely rehetra ho etỳ aminao mpanjaka tompoko, mba hanaovany fanekena aminao ary hanjakanao amin’izay rehetra irin’ny fonao. Dia nampandeha an’i Abnera i Davida ka lasa soa amantsara izy.'
  - type: heading
    content: Ny namonoan’i Joaba an’i Abnera
  '22':
  - type: text
    content: 'Indreo, tonga avy niady ny mpanompon’i Davida sy i Joaba ka nitondra babo maro; ary efa tsy teo amin’i Davida tao Hebrona intsony i Abnera satria efa nalefany ka lasa soa amantsara. '
  '23':
  - type: text
    content: 'Nony tonga i Joaba sy ny miaramila rehetra izay nanaraka azy dia nisy nanambara tamin’i Joaba hoe: Tonga tao amin’ny mpanjaka i Abnera, zanak’i Nera, nefa nalefany, ka lasa soa amantsara. '
  '24':
  - type: text
    content: 'Dia nankao amin’ny mpanjaka i Joaba ka niteny hoe: Inona izany nataonao izany? Nahoana no efa tonga teto aminao i Abnera ka nalefanao fotsiny ary afaka soa amantsara? '
  '25':
  - type: text
    content: 'Fantatrao anefa ny amin’i Abnera, zanak’i Nera, fa hamitaka anao no nahatongavany mba hahafantarany ny fihetsikao rehetra sy hahafantarany izay rehetra ataonao. '
  '26':
  - type: text
    content: 'Dia niala teo amin’i Davida i Joaba ka nandefa iraka hanaraka an’i Abnera ary nitondra azy niverina avy tany amin’ny lavaka famorian-drano atao hoe Siraha ireo, nefa tsy fantatr’i Davida izany. '
  '27':
  - type: text
    content: Nony niverina tao Hebrona i Abnera dia noentin’i Joaba nitanila tao anaty vavahady mba hiresaka aminy mangingina, kanjo nasiany tamin’ny kibony ka matiny ho valin’ny ran’i Asahela rahalahiny.
  '28':
  - type: text
    content: 'Rehefa afaka izany dia nahare i Davida ka hoy izy: Tsy manan-tsiny mandrakizay eo anatrehan’NY TOMPO ny amin’ny ran’i Abnera, zanak’i Nera izaho sy ny fanjakako. '
  '29':
  - type: text
    content: 'Hitsingerina amin’ny lohan’i Joaba sy ny tarana-drainy rehetra anie ny todin’izany; ary tsy ho tapaka amin’ny taranak’i Joaba anie ny marary mitsika, ny boka, ny mamahatra amin’ny tehina, ny lavon-tsabatra, ary ny tsy manan-kohanina. '
  '3':
  - type: text
    content: 'i Kileaba no lahiaivo, naterany tamin’i Abigaila, ilay novinadin’i Nabala karmelita; i Absaloma no fahatelo, zanak’i Maka, zanakavavin’i Talmay, mpanjakan’i Gesora; '
  '30':
  - type: text
    content: Toy izany no namonoan’i Joaba sy Abisay rahalahiny an’i Abnera noho ny namonoany an’i Asahela rahalahiny tamin’ny ady tao Gibeona.
  '31':
  - type: text
    content: 'Hoy i Davida tamin’i Joaba sy ny olona rehetra izay teo aminy: Triaro ny fitafianareo ary misikìna lamba fisaonana ka aoka hisaona eo anoloan’i Abnera ianareo. Dia nanaraka ny tranovorona i Davida mpanjaka. '
  '32':
  - type: text
    content: 'Nalevina tao Hebrona i Abnera; ary nanandratra ny feony ny mpanjaka ka nitomany teo amin’ny fasan’i Abnera; nitomany koa ny vahoaka rehetra. '
  '33':
  - type: text
    content: 'Nanao hira fisaonana an’i Abnera ny mpanjaka hoe:'
  - type: text
    content: Tahaka ny fahafatesan’ny adala va no tokony ho nahafatesan’i Abnera?
  '34':
  - type: text
    content: Ny tananao dia tsy nifatotra
  - type: text
    content: ary ny tongotrao dia tsy nigadra;
  - type: text
    content: fa tahaka ny fiankarapok’izay asian’ny olon-dratsy
  - type: text
    content: no niankarapohanao.
  - type: text
    content: 'Ary mbola nitomany azy indray ny vahoaka rehetra. '
  '35':
  - type: text
    content: 'Dia avy hampihinan-kanina an’i Davida izy rehetra raha mbola antoandro nefa nianiana i Davida hoe: Hataon’Andriamanitra amiko anie izany, eny, mihoatra noho izany aza, raha mba hanendry hanina na inona na inona akory aho mandra-pilentiky ny masoandro. '
  '36':
  - type: text
    content: 'Azon’ny vahoaka rehetra ny hevitr’izany ka nankasitrahany, tahaka ny nankasitrahany izay rehetra nataon’ny mpanjaka. '
  '37':
  - type: text
    content: 'Fantatry ny vahoaka rehetra sy ny Israely rehetra ary tamin’io andro io fa tsy avy tamin’ny mpanjaka no nahafaty an’i Abnera, zanak’i Nera. '
  '38':
  - type: text
    content: 'Hoy ny mpanjaka tamin’ny mpanompony: Tsy fantatrareo va fa mpitari-tafika sady lehilahy malaza no maty androany tao amin’ny Israely? '
  '39':
  - type: text
    content: Tsy mbola manan-kery loatra aho izao na dia mpanjaka efa voahosotra aza; mafy loatra noho izaho ireo zanak’i Zeroia ireo; NY TOMPO anie hamaly izay nanao izao ratsy izao araka ny ratsy nataony.
  '4':
  - type: text
    content: 'i Adonia ny fahefatra, zanak’i Hagita; ny fahadimy dia i Sefatia, zanak’i Abitala; '
  '5':
  - type: text
    content: ary i Jitreama no fahenina, zanany tamin’i Egla, vadin’i Davida. Ireo no naterak’i Davida tao Hebrona.
  - type: heading
    content: Ny fifamalian’i Abnera sy Isboseta
  '6':
  - type: text
    content: Raha mbola niady ny taranak’i Davida sy ny taranak’i Saoly dia nampiseho hery niandany tamin’ny taranak’i Saoly i Abnera.
  '7':
  - type: text
    content: 'Nanana vady tsindrano i Saoly, i Rizpa no anarany, zanakavavin’i Aia. Niteny tamin’i Abnera anefa Isboseta hoe: Nahoana no nalainao ny vady tsindranon’Ikaky? '
  '8':
  - type: text
    content: 'Dia tezitra mafy i Abnera noho ny tenin’Isboseta ka hoy izy: Lohan’alika miandany amin’ny '
  - type: text
    content: Joda
  - type: text
    content: ' va aho? E! Izato izaho manisy soa ny taranak’i Saoly rainao sy ny rahalahiny sy ny sakaizany izao ka tsy nanolotra anao ho eo an-tanan’i Davida, nefa izaho izao dia helohinao noho ny amin’iny vehivavy iny? '
  '9':
  - type: text
    content: 'Hataon’Andriamanitra amin’i Abnera anie izany, eny, mihoatra noho izany aza, raha tsy hataoko aminy araka ny nianianan’NY TOMPO tamin’i Davida '
