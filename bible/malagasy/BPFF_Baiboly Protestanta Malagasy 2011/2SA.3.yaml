document_id: 2SA.3
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Naharitra ela ny adin’ny taranak’i Saoly sy ny taranak’i Davida, nefa i Davida dia nihanahery, fa ny taranak’i Saoly kosa dia nihaosa.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ireo zanak’i Davida nateraka tany Hebrona
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 1Tan 3.1-4
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Niteraka zazalahy tao Hebrona i Davida. I Amnona no lahimatoany, tamin’i Ahinoama jezirelita; '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'i Kileaba no lahiaivo, naterany tamin’i Abigaila, ilay novinadin’i Nabala karmelita; i Absaloma no fahatelo, zanak’i Maka, zanakavavin’i Talmay, mpanjakan’i Gesora; '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'i Adonia ny fahefatra, zanak’i Hagita; ny fahadimy dia i Sefatia, zanak’i Abitala; '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ary i Jitreama no fahenina, zanany tamin’i Egla, vadin’i Davida. Ireo no naterak’i Davida tao Hebrona.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fifamalian’i Abnera sy Isboseta
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Raha mbola niady ny taranak’i Davida sy ny taranak’i Saoly dia nampiseho hery niandany tamin’ny taranak’i Saoly i Abnera.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Nanana vady tsindrano i Saoly, i Rizpa no anarany, zanakavavin’i Aia. Niteny tamin’i Abnera anefa Isboseta hoe: Nahoana no nalainao ny vady tsindranon’Ikaky? '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dia tezitra mafy i Abnera noho ny tenin’Isboseta ka hoy izy: Lohan’alika miandany amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Joda
  - type: text
    text: ' va aho? E! Izato izaho manisy soa ny taranak’i Saoly rainao sy ny rahalahiny sy ny sakaizany izao ka tsy nanolotra anao ho eo an-tanan’i Davida, nefa izaho izao dia helohinao noho ny amin’iny vehivavy iny? '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Hataon’Andriamanitra amin’i Abnera anie izany, eny, mihoatra noho izany aza, raha tsy hataoko aminy araka ny nianianan’NY TOMPO tamin’i Davida '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'ka hampiala ny fanjakana amin’ny taranak’i Saoly aho ary hampitoetra ny sezafiandrianan’i Davida amin’ny Israely sy amin’ny Joda hatrany Dana ka hatrany Bery-Sheba. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Dia tsy nahavaly an’i Abnera intsony izy noho ny fahatahorany azy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Manao fifanekena amin’i Davida i Abnera
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Naniraka olona tany amin’i Davida niaraka tamin’izay i Abnera mba hisolo vava azy hiteny hoe: An’iza ny tany? Ary koa hoe: Manaova fanekena amiko dia indro homba anao ny tanako ka hampanaiky ny Israely rehetra anao. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dia hoy i Davida: Tsara izany! Hanao fanekena aminao aho. Zavatra iray loha anefa no ilaiko aminao: Tsy hahazo mihaona amiko ianao raha tsy entinao atỳ i Mikala, zanakavavin’i Saoly. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary nandefa iraka nankany amin’Isboseta, zanakalahin’i Saoly i Davida hilaza hoe: Omeo ahy i Mikala vadiko, izay efa nifanekena ho vadiko tamin’ny mariky ny saron-tsotsòkan’ny Filistina zato lahy'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.14 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Zahao '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 1Sam 18.25.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary Isboseta dia nandefa iraka haka an’i Mikala tany amin’i Paltiela vadiny, zanak’i Laisy. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Nanaraka azy io vadiny io ka nitomany teny aorianany hatrany Bahorima. Nefa hoy i Abnera taminy: Mandehana miverina! Dia niverina izy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Dia niteny tamin’ny loholon’ny Israely i Abnera hoe: Efa ela izay no nitadiavanareo an’i Davida ho mpanjakanareo; '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'koa tanteraho izany ankehitriny, fa NY TOMPO efa nilaza an’i Davida hoe: Amin’ny tanan’i Davida mpanompoko no hamonjeko ny Israely oloko ho afaka amin’ny tanan’ny Filistina sy amin’ny tanan’ny fahavalony rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Niteny tamin’ny Benjaminita koa i Abnera, avy eo dia lasa izy hilaza amin’i Davida tao Hebrona izay rehetra tian’ny Israely sy ny taranak’i Benjamina rehetra hatao. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Dia tonga tany amin’i Davida tao Hebrona i Abnera sy olona roapolo lahy nanaraka azy. Ary nanao fanasana ho an’i Abnera sy ny olona nanaraka azy i Davida. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary hoy i Abnera tamin’i Davida: Hiainga aho dia handeha hamory ny Israely rehetra ho etỳ aminao mpanjaka tompoko, mba hanaovany fanekena aminao ary hanjakanao amin’izay rehetra irin’ny fonao. Dia nampandeha an’i Abnera i Davida ka lasa soa amantsara izy.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny namonoan’i Joaba an’i Abnera
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Indreo, tonga avy niady ny mpanompon’i Davida sy i Joaba ka nitondra babo maro; ary efa tsy teo amin’i Davida tao Hebrona intsony i Abnera satria efa nalefany ka lasa soa amantsara. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Nony tonga i Joaba sy ny miaramila rehetra izay nanaraka azy dia nisy nanambara tamin’i Joaba hoe: Tonga tao amin’ny mpanjaka i Abnera, zanak’i Nera, nefa nalefany, ka lasa soa amantsara. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Dia nankao amin’ny mpanjaka i Joaba ka niteny hoe: Inona izany nataonao izany? Nahoana no efa tonga teto aminao i Abnera ka nalefanao fotsiny ary afaka soa amantsara? '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Fantatrao anefa ny amin’i Abnera, zanak’i Nera, fa hamitaka anao no nahatongavany mba hahafantarany ny fihetsikao rehetra sy hahafantarany izay rehetra ataonao. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Dia niala teo amin’i Davida i Joaba ka nandefa iraka hanaraka an’i Abnera ary nitondra azy niverina avy tany amin’ny lavaka famorian-drano atao hoe Siraha ireo, nefa tsy fantatr’i Davida izany. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Nony niverina tao Hebrona i Abnera dia noentin’i Joaba nitanila tao anaty vavahady mba hiresaka aminy mangingina, kanjo nasiany tamin’ny kibony ka matiny ho valin’ny ran’i Asahela rahalahiny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Rehefa afaka izany dia nahare i Davida ka hoy izy: Tsy manan-tsiny mandrakizay eo anatrehan’NY TOMPO ny amin’ny ran’i Abnera, zanak’i Nera izaho sy ny fanjakako. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Hitsingerina amin’ny lohan’i Joaba sy ny tarana-drainy rehetra anie ny todin’izany; ary tsy ho tapaka amin’ny taranak’i Joaba anie ny marary mitsika, ny boka, ny mamahatra amin’ny tehina, ny lavon-tsabatra, ary ny tsy manan-kohanina. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Toy izany no namonoan’i Joaba sy Abisay rahalahiny an’i Abnera noho ny namonoany an’i Asahela rahalahiny tamin’ny ady tao Gibeona.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Hoy i Davida tamin’i Joaba sy ny olona rehetra izay teo aminy: Triaro ny fitafianareo ary misikìna lamba fisaonana ka aoka hisaona eo anoloan’i Abnera ianareo. Dia nanaraka ny tranovorona i Davida mpanjaka. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Nalevina tao Hebrona i Abnera; ary nanandratra ny feony ny mpanjaka ka nitomany teo amin’ny fasan’i Abnera; nitomany koa ny vahoaka rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Nanao hira fisaonana an’i Abnera ny mpanjaka hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tahaka ny fahafatesan’ny adala va no tokony ho nahafatesan’i Abnera?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Ny tananao dia tsy nifatotra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny tongotrao dia tsy nigadra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa tahaka ny fiankarapok’izay asian’ny olon-dratsy
- type: usfm
  marker: q1
  children:
  - type: text
    text: no niankarapohanao.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ary mbola nitomany azy indray ny vahoaka rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Dia avy hampihinan-kanina an’i Davida izy rehetra raha mbola antoandro nefa nianiana i Davida hoe: Hataon’Andriamanitra amiko anie izany, eny, mihoatra noho izany aza, raha mba hanendry hanina na inona na inona akory aho mandra-pilentiky ny masoandro. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Azon’ny vahoaka rehetra ny hevitr’izany ka nankasitrahany, tahaka ny nankasitrahany izay rehetra nataon’ny mpanjaka. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Fantatry ny vahoaka rehetra sy ny Israely rehetra ary tamin’io andro io fa tsy avy tamin’ny mpanjaka no nahafaty an’i Abnera, zanak’i Nera. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Hoy ny mpanjaka tamin’ny mpanompony: Tsy fantatrareo va fa mpitari-tafika sady lehilahy malaza no maty androany tao amin’ny Israely? '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Tsy mbola manan-kery loatra aho izao na dia mpanjaka efa voahosotra aza; mafy loatra noho izaho ireo zanak’i Zeroia ireo; NY TOMPO anie hamaly izay nanao izao ratsy izao araka ny ratsy nataony.
