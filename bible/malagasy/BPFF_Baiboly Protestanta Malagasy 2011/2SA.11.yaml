document_id: 2SA.11,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: I Davida sy i Batseba
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa niherina ny taona ka tonga ny andro fandehanan’ny mpanjaka hiady dia naniraka an’i Joaba sy ny mpanompony ary ny Israely rehetra i Davida; nandringana ny taranak’i Amona ireo sady nanao fahirano an’i Raba. I Davida kosa dia nijanona tany Jerosalema ihany. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nisy nanambara tamin’i Davida hoe: Tsy nidina nody tany an-tranony i Oria. Dia hoy i Davida tamin’i Oria: Tsy avy lavitra va ianao? Koa nahoana ianao no tsy midina mody any an-tranonao? '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy i Oria tamin’i Davida: Ny vata misy ny Fanekena sy ny Israely ary ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Joda
    - type: text
      text: ' dia mitoetra amin’ny trano rantsan-kazo; ary i Joaba tompoko sy ny mpanompon’ny tompoko dia mitoby any an-tsaha, koa izaho kosa va dia hody any an-tranoko hihinana sy hisotro ary handry amin’ny vadiko? Raha velona koa ianao, ary raha velona koa ny ainao, dia tsy hanao izany aho. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy i Davida tamin’i Oria: Mitoera ihany ary atỳ anio fa rahampitso ianao dia halefako. Dia nitoetra tany Jerosalema i Oria androtr’izay sy ny ampitson’iny. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary nasain’i Davida izy dia nihinana sy nisotro teo anatrehany ka nomamoiny. Nony hariva dia nivoaka avy tao izy ka nandry teo amin’ilay nandriany teo amin’ny mpanompon’ny tompony ihany fa tsy nidina nody tany an-tranony.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nony maraina dia nanoratra taratasy ho any amin’i Joaba i Davida ka nampitondrainy an’i Oria izany. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao no soratra nataony tao amin’ny taratasy: Arosoy amin’ny ady mafy i Oria; dia ilaozy izy mba ho voa ka ho faty.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nahafatesan’i Oria, vadin’i Batseba
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha mbola nanao fahirano ny tanàna i Joaba dia nanendry an’i Oria ho eo amin’izay hitany misy lehilahy mahery. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny mponina tao an-tanàna dia nivoaka hiady amin’i Joaba ka nahafatesana ny mpanompon’i Davida, ary maty koa i Oria hetita. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nandefa iraka hitatitra any amin’i Davida ny toetry ny ady i Joaba; '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary nandidy ilay iraka izy hoe: Rehefa voalazanao tsara amin’ny mpanjaka ny toetry ny ady '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nony harivariva dia niala tao am-pandrianany i Davida ka nitsangantsangana teo an-tampon’ny lapa; ary raha teo izy dia nahatazana vehivavy mandro; ary Ravehivavy dia tsara tarehy maha te hijery. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ka tezitra ny mpanjaka ary miteny aminao hoe: Nahoana no nanakaiky ny tanàna toy izany ianareo raha niady? Tsy fantatrareo va fa hisy hitifitra avy eny amin’ny manda? '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa iza no namely an’i Abimeleka, zanak’i Jerobeseta? Moa tsy vehivavy va no nanjera vato fikosoham-bary taminy avy teo amin’ny manda ka maty tao Tebeza izy? Koa nahoana no nanakaiky ny manda ianareo? Dia ataovy hoe: Maty koa i Oria hetita mpanomponao.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nandeha ilay iraka ka tonga tany amin’i Davida ary nanambara taminy izay rehetra nanirahan’i Joaba azy. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy ilay iraka tamin’i Davida: Nahery noho izahay ireny, ary nandehanany tany an-tsaha izahay ka nenjehinay hatreo anoloan’ny vavahady kosa izy. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny mpitifitra teo amin’ny manda dia nitifitra ny mpanomponao; nahafatesana ny mpanompon’ny mpanjaka, ary maty koa i Oria hetita mpanomponao. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy i Davida tamin’ny iraka: Izao no holazainao amin’i Joaba: Aza malahelo amin’izany ianao fa tsy mifidy hasiana ny sabatra; herezo ihany ny adinao amin’ny tanàna ka ravao izy. Ary ampaherezo i Joaba.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nony ren’ny vadin’i Oria fa maty ny lahy dia nisaona azy izy. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Rehefa afa-tsaona izy dia nampanalain’i Davida ho any an-tranony ka tonga vadiny ary niteraka zazalahy taminy.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nefa tsy sitraky NY TOMPO izany nataon’i Davida izany.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nandefa iraka hanontany ny amin-dRavehivavy i Davida. Ary nolazaina taminy hoe: Iny no Batseba, zanakavavin’i Eliama, sady vadin’i Oria hetita. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Naniraka olona haka azy i Davida. Dia tonga tao aminy izy ka nandriany kanefa vao avy nanamasina ny tenany ho afaka tamin’ny fahalotoany. Nody tany an-tranony Ravehivavy nony avy eo. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nanana anaka Ravehivavy ka nandefa iraka hilaza tamin’i Davida hoe: Manana anaka aho.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nandefa iraka tany amin’i Joaba i Davida hilaza hoe: Asaivo mankaty amiko kely i Oria hetita. Dia nasain’i Joaba nankany amin’i Davida i Oria. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nony tonga teo amin’i Davida izy dia nanontaniany ny momba an’i Joaba sy ny olona ary ny fizotry ny ady. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy i Davida tamin’i Oria: Andeha ary mody ka sasao ny tongotrao. Dia niala tao an-tranon’ny mpanjaka i Oria ary nampanarahina fanomezana avy tao amin’ny mpanjaka izy. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nandry teo am-baravaran’ny tranon’ny mpanjaka, teo amin’ny mpanompon’ny tompony rehetra anefa i Oria fa tsy nidina nody tany an-tranony akory. '
