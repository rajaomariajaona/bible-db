document_id: PSA.79
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Reraka loatra izahay ka vonjeo e!
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: Salamo nataon’i Asafa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Andriamanitra ô, tonga eto amin’ny lovanao ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jentilisa
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka nandoto ny tempolinao masina
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady nanao an’i Jerosalema ho korontam-bato.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ny fatin’ny mpanomponao
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia nomeny hohanin’ny voromanidina
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny nofon’ny olonao masina ho an’ny bibidia;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ny rany dia naidiny manodidina an’i Jerosalema
- type: usfm
  marker: q1
  children:
  - type: text
    text: tahaka ny rano
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy nisy nandevina azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Tonga fandatsan’ny mpiaramonina izahay
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady faneso sy fanakoran’izay manodidina anay.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Mandra-pahoviana, TOMPO ô, no hanontolo fo Ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hirehitra tahaka ny afo ny fahasaro-piaronao?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Aidino amin’ny Jentilisa izay tsy mahalala Anao
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy amin’ny fanjakana izay tsy miantso ny anaranao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny fahatezeranao!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Fa efa nandany an’i Jakoba izy ireo
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady nandrava ny fonenany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Aza tsarovanao ny helokay taloha!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aoka ho avy haingana hitsena anay ny fiantranao!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa reraka loatra izahay.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Vonjeo izahay, ry Andriamanitry ny famonjena anay ô,
- type: usfm
  marker: q1
  children:
  - type: text
    text: noho ny voninahitry ny anaranao!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Afaho izahay ka mamelà ny helokay, noho ny anaranao!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Nahoana ny Jentilisa no hiteny hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aiza izay Andriamaniny?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aoka ho fantatra any amin’ny Jentilisa, eo imasonay,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny famaliana ny ran’ny mpanomponao izay nalatsaka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Aoka ho tonga eo anatrehanao ny senton’ny mpifatotra!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Araka ny halehiben’ny sandrinao dia arovy tsy ho faty izay voaheloka ho faty!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Valio impito heny ho ao ampofoan’ny mifanila fonenana aminay
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny fanaratsiana izay nataony Anao, Tompo ô!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Fa izahay, olonao sy ondry fiandrinao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hisaotra Anao mandrakizay;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hatramin’ny taranaka fara aman-dimby no hilazanay ny fiderana Anao.
