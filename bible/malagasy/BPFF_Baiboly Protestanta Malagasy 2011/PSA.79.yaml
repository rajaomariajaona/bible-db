document_id: PSA.79,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Reraka loatra izahay ka vonjeo e!
  - type: text
    content: Salamo nataon’i Asafa.
  - type: text
    content: 'Andriamanitra ô, tonga eto amin’ny lovanao ny '
  - type: text
    content: Jentilisa
  - type: text
    content: ka nandoto ny tempolinao masina
  - type: text
    content: sady nanao an’i Jerosalema ho korontam-bato.
  '10':
  - type: text
    content: 'Nahoana ny Jentilisa no hiteny hoe:'
  - type: text
    content: Aiza izay Andriamaniny?
  - type: text
    content: Aoka ho fantatra any amin’ny Jentilisa, eo imasonay,
  - type: text
    content: ny famaliana ny ran’ny mpanomponao izay nalatsaka.
  '11':
  - type: text
    content: Aoka ho tonga eo anatrehanao ny senton’ny mpifatotra!
  - type: text
    content: Araka ny halehiben’ny sandrinao dia arovy tsy ho faty izay voaheloka ho faty!
  '12':
  - type: text
    content: Valio impito heny ho ao ampofoan’ny mifanila fonenana aminay
  - type: text
    content: ny fanaratsiana izay nataony Anao, Tompo ô!
  '13':
  - type: text
    content: Fa izahay, olonao sy ondry fiandrinao,
  - type: text
    content: dia hisaotra Anao mandrakizay;
  - type: text
    content: hatramin’ny taranaka fara aman-dimby no hilazanay ny fiderana Anao.
  '2':
  - type: text
    content: Ny fatin’ny mpanomponao
  - type: text
    content: dia nomeny hohanin’ny voromanidina
  - type: text
    content: ary ny nofon’ny olonao masina ho an’ny bibidia;
  '3':
  - type: text
    content: ny rany dia naidiny manodidina an’i Jerosalema
  - type: text
    content: tahaka ny rano
  - type: text
    content: ary tsy nisy nandevina azy.
  '4':
  - type: text
    content: Tonga fandatsan’ny mpiaramonina izahay
  - type: text
    content: sady faneso sy fanakoran’izay manodidina anay.
  '5':
  - type: text
    content: Mandra-pahoviana, TOMPO ô, no hanontolo fo Ianao
  - type: text
    content: ka hirehitra tahaka ny afo ny fahasaro-piaronao?
  '6':
  - type: text
    content: Aidino amin’ny Jentilisa izay tsy mahalala Anao
  - type: text
    content: sy amin’ny fanjakana izay tsy miantso ny anaranao
  - type: text
    content: ny fahatezeranao!
  '7':
  - type: text
    content: Fa efa nandany an’i Jakoba izy ireo
  - type: text
    content: sady nandrava ny fonenany.
  '8':
  - type: text
    content: Aza tsarovanao ny helokay taloha!
  - type: text
    content: Aoka ho avy haingana hitsena anay ny fiantranao!
  - type: text
    content: Fa reraka loatra izahay.
  '9':
  - type: text
    content: Vonjeo izahay, ry Andriamanitry ny famonjena anay ô,
  - type: text
    content: noho ny voninahitry ny anaranao!
  - type: text
    content: Afaho izahay ka mamelà ny helokay, noho ny anaranao!
