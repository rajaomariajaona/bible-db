document_id: LEV.2
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fanatitra avy amin’ny zavamaniry
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Raha misy manolotra fanatitra avy amin’ny zavamaniry ho an’NY TOMPO dia koba tsara toto no hataony fanatitra ary handraraka diloilo sy hanisy ditin-kazo manitra eo amboniny izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Hitondra izany ho any amin’ireo mpisorona zanak’i Arona izy, dia handraofan’izy ireo eran’ny tanana ila ny koba sy ny diloilon’ny fanatitra mbamin’ny ditin-kazo manitra rehetra. Hodoran’ny mpisorona ho fofona eo ambonin’ny alitara izany fanati-pahatsiarovana avy aminy izany. Fanatitra levonina amin’ny afo ho hanitra ankasitrahana ho an’NY TOMPO izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ny sisa amin’ny fanatitra avy amin’ny zavamaniry dia ho an’i Arona sy ireo zanany; anjara tena masina avy amin’ny fanatitra levonina amin’ny afo ho an’NY TOMPO izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Raha manolotra fanatitra avy amin’ny zavamaniry voaendy tamin’ny fanendasa-mofo ianao dia aoka ho mofo tsy misy masirasira vita amin’ny koba tsara toto sady voaharo diloilo, miampy mofo manify tsy misy masirasira sady voahosotra diloilo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Raha fanatitra avy amin’ny zavamaniry voaendy tamin’ny lapoaly no fanatitrao dia aoka ho koba tsara toto voaharo diloilo sady tsy misy masirasira. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Hovakivakinao sy horarahanao diloilo ilay izy; fanatitra avy amin’ny zavamaniry izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Raha fanatitra avy amin’ny zavamaniry nahandroina tamin’ny vilany no atolotrao dia koba tsara toto asiana diloilo no atao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Hoentinao ho an’NY TOMPO ny fanatitra avy amin’ny zavamaniry izay vita amin’ireo zavatra ireo; rehefa voaatitra eo amin’ny mpisorona ireo dia hoentiny eo amin’ny alitara. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary haka ny fanati-pahatsiarovana avy amin’ny fanatitra avy amin’ny zavamaniry ny mpisorona ka handoro azy ho fofona eo ambonin’ny alitara. Fanatitra levonina amin’ny afo, ho hanitra ankasitrahana ho an’NY TOMPO, izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ny sisa amin’ny fanatitra avy amin’ny zavamaniry dia ho an’i Arona sy ny zanany, ho anjara tena masina avy amin’ny fanatitra levonina amin’ny afo ho an’NY TOMPO.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ny fanatitra avy amin’ny zavamaniry rehetra izay atolotrareo ho an’NY TOMPO dia aza asiana masirasira; fa ny masirasira sy ny tantely dia samy tsy hakanareo hodorana ho fofona ho fanatitra levonina amin’ny afo ho an’NY TOMPO. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ho fanatitra voaloham-bokatra ihany no hahazoanareo manolotra ireo ho an’NY TOMPO, kanefa tsy hakarina eo ambonin’ny alitara ho hanitra ankasitrahana izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Samy asio sira avokoa ny fanatitra avy amin’ny zavamaniry atolotrao rehetra; ny siran’ny faneken’Andriamanitrao dia aza atsahatra amin’ny fanatitra avy amin’ny zavamaniry atolotrao; fa manolora sira miaraka amin’ny fanatitrao rehetra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Raha manolotra fanatitra avy amin’ny zavamaniry ho an’NY TOMPO avy amin’ny voaloham-bokatra ianao dia salohim-bary voaendy amin’ny afo, lango avy amin’ny salohy vao, no hatolotrao ho fanatitra avy amin’ny zavamaniry avy amin’ny voaloham-bokatrao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Hasianao diloilo izany sady hasianao ditin-kazo manitra eo amboniny. Fanatitra avy amin’ny zavamaniry izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Hodoran’ny mpisorona ho fofona ny fanati-pahatsiarovana avy amin’ny lango sy avy amin’ny diloilo ary ny ditin-kazo manitra rehetra. Fanatitra levonina amin’ny afo ho an’NY TOMPO izany.
