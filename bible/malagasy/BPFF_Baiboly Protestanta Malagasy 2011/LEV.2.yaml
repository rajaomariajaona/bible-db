document_id: LEV.2,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fanatitra avy amin’ny zavamaniry
  - type: text
    content: 'Raha misy manolotra fanatitra avy amin’ny zavamaniry ho an’NY TOMPO dia koba tsara toto no hataony fanatitra ary handraraka diloilo sy hanisy ditin-kazo manitra eo amboniny izy. '
  '10':
  - type: text
    content: Ny sisa amin’ny fanatitra avy amin’ny zavamaniry dia ho an’i Arona sy ny zanany, ho anjara tena masina avy amin’ny fanatitra levonina amin’ny afo ho an’NY TOMPO.
  '11':
  - type: text
    content: 'Ny fanatitra avy amin’ny zavamaniry rehetra izay atolotrareo ho an’NY TOMPO dia aza asiana masirasira; fa ny masirasira sy ny tantely dia samy tsy hakanareo hodorana ho fofona ho fanatitra levonina amin’ny afo ho an’NY TOMPO. '
  '12':
  - type: text
    content: 'Ho fanatitra voaloham-bokatra ihany no hahazoanareo manolotra ireo ho an’NY TOMPO, kanefa tsy hakarina eo ambonin’ny alitara ho hanitra ankasitrahana izany. '
  '13':
  - type: text
    content: Samy asio sira avokoa ny fanatitra avy amin’ny zavamaniry atolotrao rehetra; ny siran’ny faneken’Andriamanitrao dia aza atsahatra amin’ny fanatitra avy amin’ny zavamaniry atolotrao; fa manolora sira miaraka amin’ny fanatitrao rehetra.
  '14':
  - type: text
    content: 'Raha manolotra fanatitra avy amin’ny zavamaniry ho an’NY TOMPO avy amin’ny voaloham-bokatra ianao dia salohim-bary voaendy amin’ny afo, lango avy amin’ny salohy vao, no hatolotrao ho fanatitra avy amin’ny zavamaniry avy amin’ny voaloham-bokatrao. '
  '15':
  - type: text
    content: 'Hasianao diloilo izany sady hasianao ditin-kazo manitra eo amboniny. Fanatitra avy amin’ny zavamaniry izany. '
  '16':
  - type: text
    content: Hodoran’ny mpisorona ho fofona ny fanati-pahatsiarovana avy amin’ny lango sy avy amin’ny diloilo ary ny ditin-kazo manitra rehetra. Fanatitra levonina amin’ny afo ho an’NY TOMPO izany.
  '2':
  - type: text
    content: 'Hitondra izany ho any amin’ireo mpisorona zanak’i Arona izy, dia handraofan’izy ireo eran’ny tanana ila ny koba sy ny diloilon’ny fanatitra mbamin’ny ditin-kazo manitra rehetra. Hodoran’ny mpisorona ho fofona eo ambonin’ny alitara izany fanati-pahatsiarovana avy aminy izany. Fanatitra levonina amin’ny afo ho hanitra ankasitrahana ho an’NY TOMPO izany. '
  '3':
  - type: text
    content: Ny sisa amin’ny fanatitra avy amin’ny zavamaniry dia ho an’i Arona sy ireo zanany; anjara tena masina avy amin’ny fanatitra levonina amin’ny afo ho an’NY TOMPO izany.
  '4':
  - type: text
    content: Raha manolotra fanatitra avy amin’ny zavamaniry voaendy tamin’ny fanendasa-mofo ianao dia aoka ho mofo tsy misy masirasira vita amin’ny koba tsara toto sady voaharo diloilo, miampy mofo manify tsy misy masirasira sady voahosotra diloilo.
  '5':
  - type: text
    content: 'Raha fanatitra avy amin’ny zavamaniry voaendy tamin’ny lapoaly no fanatitrao dia aoka ho koba tsara toto voaharo diloilo sady tsy misy masirasira. '
  '6':
  - type: text
    content: Hovakivakinao sy horarahanao diloilo ilay izy; fanatitra avy amin’ny zavamaniry izany.
  '7':
  - type: text
    content: Raha fanatitra avy amin’ny zavamaniry nahandroina tamin’ny vilany no atolotrao dia koba tsara toto asiana diloilo no atao.
  '8':
  - type: text
    content: 'Hoentinao ho an’NY TOMPO ny fanatitra avy amin’ny zavamaniry izay vita amin’ireo zavatra ireo; rehefa voaatitra eo amin’ny mpisorona ireo dia hoentiny eo amin’ny alitara. '
  '9':
  - type: text
    content: 'Ary haka ny fanati-pahatsiarovana avy amin’ny fanatitra avy amin’ny zavamaniry ny mpisorona ka handoro azy ho fofona eo ambonin’ny alitara. Fanatitra levonina amin’ny afo, ho hanitra ankasitrahana ho an’NY TOMPO, izany. '
