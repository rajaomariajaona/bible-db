document_id: SNG.5,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: (Ralehilahy)
  - type: text
    content: Efa tonga eto an-tsahako aho, ry havako ampakariko;
  - type: text
    content: mioty ny miorako mbamin’ny balisama aho;
  - type: text
    content: efa homana ny toho-tanteliko mbamin’ny tanteliko aho,
  - type: text
    content: ary efa misotro ny divaiko mbamin’ny rononoko.
  - type: heading
    content: (Olon-kafa)
  - type: text
    content: Mihinàna ianareo, ry sakaizako, misotroa, eny, mivokisa divay, ry malala.
  - type: heading
    content: Namoha varavarana an-dRalehilahy Ravehivavy, kanjo tratra aoriana
  - type: heading
    content: (Ravehivavy)
  '10':
  - type: text
    content: Ny malalako dia sady fotsy mangatsakatsaka no mena,
  - type: text
    content: notsongaina tamin’ny alinalina.
  '11':
  - type: text
    content: Ny lohany dia toy ny tena volamena tsy miharo;
  - type: text
    content: ny volony dia milantolanto sady mangiloilo toy ny an’ny goaika.
  '12':
  - type: text
    content: Ny masony dia tahaka ny an’ny voromailala
  - type: text
    content: eo anilan’ny sakeli-drano,
  - type: text
    content: mandro amin’ny ronono
  - type: text
    content: sady tahaka ny vatosoa nalatsaka an-tranontranony.
  '13':
  - type: text
    content: Ny takolany dia tahaka ny tanim-boninkazo misy zavamanitra eo an-tsaha,
  - type: text
    content: tahaka ny tilikambo misy voninkazo manitra.
  - type: text
    content: Ny molony dia tahaka ny lisy
  - type: text
    content: no sady mitete ranon’ny miora.
  '14':
  - type: text
    content: Ny tanany dia tahaka ny haba volamena
  - type: text
    content: voaisy krizolita;
  - type: text
    content: ny tenany dia tahaka ny ivoara voalama tsara
  - type: text
    content: no sady misarona safira;
  '15':
  - type: text
    content: ny ranjony dia tahaka ny marbra fotsy
  - type: text
    content: miorina amin’ny faladia volamena tsy miharo;
  - type: text
    content: ny tarehiny dia tahaka an’i Libanona,
  - type: text
    content: tsara toy ny sedera.
  '16':
  - type: text
    content: Mamy dia mamy ny vavany,
  - type: text
    content: eny, maha te ho tia avokoa ny aminy.
  - type: text
    content: Toy izany ny malalako, ary toy izany ny sakaizako,
  - type: text
    content: ry zanakavavin’i Jerosalema!
  '2':
  - type: text
    content: Natory aho nefa nahatsiaro ihany ny foko;
  - type: text
    content: 'Injay! Ny feon’ny malalako, izay mandondòna hoe:'
  - type: text
    content: Vohay aho, ry havako ampakariko,
  - type: text
    content: ry voromailalako, ilay ahy tsy misy kilema
  - type: text
    content: fa vonton’ando ny lohako;
  - type: text
    content: ny voloko milantolanto dia kotsan’ny andon’ny alina.
  '3':
  - type: text
    content: Efa niala akanjo aho, koa hataoko ahoana indray no fiakanjo?
  - type: text
    content: Efa avy nanasa tongotra aho, koa hataoko ahoana ny handoto azy indray?
  '4':
  - type: text
    content: Nampiditra ny tanany teo amin’ny lava-kombarika ilay malalako
  - type: text
    content: dia nangorakoraka azy ny foko.
  '5':
  - type: text
    content: Nitsangana hamoha varavarana ny malalako ihany aho
  - type: text
    content: ary nitete miora ny tanako,
  - type: text
    content: eny, nitete ranon’ny miora ny rantsan-tanako
  - type: text
    content: teo amin’ny famohana ny hidim-baravarana.
  '6':
  - type: text
    content: Namoha varavarana ny malalako aho,
  - type: text
    content: kanjo efa nihodina izy ka lasa;
  - type: text
    content: very hevitra tamin’ny fitenenany teo am-baravarana aho;
  - type: text
    content: nitady azy aho nefa tsy nahita;
  - type: text
    content: niantso azy aho nefa tsy novalìny.
  '7':
  - type: text
    content: Nahita ahy ny mpiambina izay mandehandeha manao andrimaso eny an-tanàna,
  - type: text
    content: dia nikapoka sy nandratra ahy;
  - type: text
    content: ary nesorin’ireo mpiambina ny manda ny lamba fisaonako.
  '8':
  - type: text
    content: 'Mampianiana anareo aho, ry zanakavavin’i Jerosalema:'
  - type: text
    content: Raha mba hitanareo re ny malalako,
  - type: text
    content: dia ahoana no holazainareo aminy?
  - type: text
    content: Lazao fa mararim-pitia aho.
  - type: heading
    content: (Olon-kafa)
  '9':
  - type: text
    content: Inona ny malalanao mihoatra noho ny malala sasany,
  - type: text
    content: ry tsara tarehy amin’ny vehivavy?
  - type: text
    content: Inona ny malalanao mihoatra noho ny malala sasany,
  - type: text
    content: no dia mampianiana anay toy izao ianao?
  - type: heading
    content: (Ravehivavy)
