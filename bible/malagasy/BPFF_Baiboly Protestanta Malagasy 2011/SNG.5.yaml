document_id: SNG.5
type_code: plt
segments:
- type: usfm
  marker: sp
  children:
  - type: text
    text: (Ralehilahy)
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Efa tonga eto an-tsahako aho, ry havako ampakariko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mioty ny miorako mbamin’ny balisama aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: efa homana ny toho-tanteliko mbamin’ny tanteliko aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary efa misotro ny divaiko mbamin’ny rononoko.
- type: usfm
  marker: sp
  children:
  - type: text
    text: (Olon-kafa)
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mihinàna ianareo, ry sakaizako, misotroa, eny, mivokisa divay, ry malala.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Namoha varavarana an-dRalehilahy Ravehivavy, kanjo tratra aoriana
  marker-yv: yv-h
- type: usfm
  marker: sp
  children:
  - type: text
    text: (Ravehivavy)
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Natory aho nefa nahatsiaro ihany ny foko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Injay! Ny feon’ny malalako, izay mandondòna hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vohay aho, ry havako ampakariko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ry voromailalako, ilay ahy tsy misy kilema
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa vonton’ando ny lohako;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny voloko milantolanto dia kotsan’ny andon’ny alina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Efa niala akanjo aho, koa hataoko ahoana indray no fiakanjo?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Efa avy nanasa tongotra aho, koa hataoko ahoana ny handoto azy indray?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Nampiditra ny tanany teo amin’ny lava-kombarika ilay malalako
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia nangorakoraka azy ny foko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Nitsangana hamoha varavarana ny malalako ihany aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary nitete miora ny tanako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, nitete ranon’ny miora ny rantsan-tanako
- type: usfm
  marker: q1
  children:
  - type: text
    text: teo amin’ny famohana ny hidim-baravarana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Namoha varavarana ny malalako aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: kanjo efa nihodina izy ka lasa;
- type: usfm
  marker: q1
  children:
  - type: text
    text: very hevitra tamin’ny fitenenany teo am-baravarana aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: nitady azy aho nefa tsy nahita;
- type: usfm
  marker: q1
  children:
  - type: text
    text: niantso azy aho nefa tsy novalìny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Nahita ahy ny mpiambina izay mandehandeha manao andrimaso eny an-tanàna,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia nikapoka sy nandratra ahy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary nesorin’ireo mpiambina ny manda ny lamba fisaonako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Mampianiana anareo aho, ry zanakavavin’i Jerosalema:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Raha mba hitanareo re ny malalako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ahoana no holazainareo aminy?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Lazao fa mararim-pitia aho.
- type: usfm
  marker: sp
  children:
  - type: text
    text: (Olon-kafa)
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Inona ny malalanao mihoatra noho ny malala sasany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ry tsara tarehy amin’ny vehivavy?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Inona ny malalanao mihoatra noho ny malala sasany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: no dia mampianiana anay toy izao ianao?
- type: usfm
  marker: sp
  children:
  - type: text
    text: (Ravehivavy)
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ny malalako dia sady fotsy mangatsakatsaka no mena,
- type: usfm
  marker: q1
  children:
  - type: text
    text: notsongaina tamin’ny alinalina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ny lohany dia toy ny tena volamena tsy miharo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny volony dia milantolanto sady mangiloilo toy ny an’ny goaika.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ny masony dia tahaka ny an’ny voromailala
- type: usfm
  marker: q1
  children:
  - type: text
    text: eo anilan’ny sakeli-drano,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mandro amin’ny ronono
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady tahaka ny vatosoa nalatsaka an-tranontranony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ny takolany dia tahaka ny tanim-boninkazo misy zavamanitra eo an-tsaha,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tahaka ny tilikambo misy voninkazo manitra.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny molony dia tahaka ny lisy
- type: usfm
  marker: q1
  children:
  - type: text
    text: no sady mitete ranon’ny miora.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ny tanany dia tahaka ny haba volamena
- type: usfm
  marker: q1
  children:
  - type: text
    text: voaisy krizolita;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny tenany dia tahaka ny ivoara voalama tsara
- type: usfm
  marker: q1
  children:
  - type: text
    text: no sady misarona safira;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ny ranjony dia tahaka ny marbra fotsy
- type: usfm
  marker: q1
  children:
  - type: text
    text: miorina amin’ny faladia volamena tsy miharo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny tarehiny dia tahaka an’i Libanona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsara toy ny sedera.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Mamy dia mamy ny vavany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, maha te ho tia avokoa ny aminy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Toy izany ny malalako, ary toy izany ny sakaizako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ry zanakavavin’i Jerosalema!
