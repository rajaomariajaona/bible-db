document_id: JON.4,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: I Jona sy ny famindrampon’Andriamanitra
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Tsy sitrak’i Jona velively izany ka nirehitra ny fahatezerany. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Dia hoy NY TOMPO: Malahelo ny tanantanamanga izay tsy nisasaranao na nampanirinao ianao, dia ilay naniry indray alina monja ary maty indray alina koa. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Koa moa va Aho tsy mba halahelo an’i Ninive, ilay tanàna lehibe, izay misy olona maherin’ny roa alina sy iray hetsy, izay tsy mahafantatra ny havanany sy ny haviany, sady be biby fiompy koa?
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Dia nivavaka tamin’NY TOMPO izy hoe: Mifona aminao aho, TOMPO ô, tsy izao ihany va no efa nolazaiko fony aho mbola tany amin’ny taniko? Fa ny tsy hisian’ny toy izao no nandosirako ho any Tarsisy satria fantatro fa Ianao dia Andriamanitra mamindra fo sy miantra, mahari-po sady be famindrampo ary manenina ny amin’ny loza. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Koa mifona aminao aho ankehitriny, TOMPO ô, esory ny aiko; fa aleoko maty toy izay ho velona.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Fa hoy NY TOMPO: Moa mety va izao firehitry ny fahatezeranao izao?'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Dia nivoaka niala ny tanàna i Jona ka nipetraka teo atsinanan’ny tanàna; ary nanao trano rantsan-kazo ho azy teo izy ka nipetraka teo ambanin’ny alokalony ambara-pahitany izay hiafaran’ny tanàna. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ary NY TOMPO Andriamanitra nanomana tanantanamanga ka nampaniriny izany, hialokalofan’i Jona, ho alokaloky ny lohany sy hanafaka azy amin’ny manjo azy. Dia nahafaly an’i Jona indrindra ny tanantanamanga. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Kanjo nony ampitso maraina dia nanomana fositra koa Andriamanitra ka namely ilay tanantanamanga iny, dia maina io. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Nony niposaka ny masoandro dia nanomana rivotra mahamay avy any atsinanana Andriamanitra, ary namely ny lohan’i Jona ny masoandro, dia nangataka ny ho faty izy, sady niteny hoe: Aleoko maty toy izay ho velona. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Fa hoy Andriamanitra tamin’i Jona: Moa mety va izao firehitry ny fahatezeranao ny amin’ny tanantanamanga izao? Ary hoy izy: Mety ny hahatezerako na dia mandra-pahafatiko aza. '
