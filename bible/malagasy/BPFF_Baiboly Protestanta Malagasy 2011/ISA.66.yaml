document_id: ISA.66,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny tena mpivavaka sy ny mpivavaka tsy izy
  - type: text
    content: 'Izao no lazain’NY TOMPO:'
  - type: text
    content: Ny lanitra no sezafiandrianako
  - type: text
    content: ary ny tany no fitoeran-tongotro.
  - type: text
    content: Trano manao ahoana no hataonareo ho Ahy?
  - type: text
    content: Ary toerana manao ahoana no ho fitsaharako?
  '10':
  - type: text
    content: Miaraha mifaly amin’i Jerosalema
  - type: text
    content: ary miravoravoa aminy,
  - type: text
    content: ianareo rehetra izay tia azy;
  - type: text
    content: aoka hiara-mifaly aminy tokoa
  - type: text
    content: ianareo rehetra izay malahelo noho ny aminy,
  '11':
  - type: text
    content: mba hinonoanareo sy hivokisanareo
  - type: text
    content: amin’ny nonony mahafaly;
  - type: text
    content: eny, mba higoka ianareo ka hiravoravo
  - type: text
    content: amin’ny haben’ny voninahiny.
  '12':
  - type: text
    content: 'Fa izao no lazain’NY TOMPO:'
  - type: text
    content: Indro, hitarihako fiadanana tahaka ny ony izy
  - type: text
    content: ary ny voninahitry ny firenena, ho tahaka ny renirano tondraka.
  - type: text
    content: Hampinonoana ianareo;
  - type: text
    content: ary hosakelehina ianareo
  - type: text
    content: sady horotsirotsina eo ambony lohalika.
  '13':
  - type: text
    content: Tahaka ny olona ampiononin’ny reniny
  - type: text
    content: no hampiononako anareo;
  - type: text
    content: eny, ao Jerosalema no hampiononana anareo.
  '14':
  - type: text
    content: Dia hahita izany ianareo ka ho faly ny fonareo,
  - type: text
    content: ho tsara fitombo tahaka ny ahi-maitso ny taolanareo;
  - type: text
    content: ary ny tanan’NY TOMPO dia ataony fantatry ny mpanompony,
  - type: text
    content: fa ho tezitra amin’ny fahavalony kosa Izy.
  '15':
  - type: text
    content: Fa indro NY TOMPO
  - type: text
    content: ho avy amin’ny afo,
  - type: text
    content: ary tahaka ny tadio ny kalesy fitondrany miady maro
  - type: text
    content: mba hanao famaliana amin’ny hatezerany mirehitra
  - type: text
    content: sy ny fitenenany mafy amin’ny lelafo.
  '16':
  - type: text
    content: Fa ny afo no hoentin’NY TOMPO mitsara,
  - type: text
    content: ary amin’ny sabany no hitsarany ny nofo rehetra;
  - type: text
    content: ho maro ny voaringan’NY TOMPO.
  '17':
  - type: text
    content: Izay manamasina sy manadio ny tenany
  - type: text
    content: ho ao an-tanimboly
  - type: text
    content: ka mifandimby mankeo afovoany
  - type: text
    content: ary mihinana henan-kisoa
  - type: text
    content: sy zava-betaveta ary totozy
  - type: text
    content: dia hiaraka ho levona avokoa,
  - type: text
    content: hoy NY TOMPO.
  - type: heading
    content: Ilay famoriana farany
  '18':
  - type: text
    content: 'Fa Izaho mahalala ny asany sy ny heviny. Ary ho avy ny fotoana hamoriana ny '
  - type: text
    content: Jentilisa
  - type: text
    content: ' rehetra sy ny samihafa fiteny; ho avy ireo ka hahita ny voninahitro. '
  '19':
  - type: text
    content: 'Hasiako famantarana eo aminy; izay afaka mandositra dia hisy halefako ho any amin’ny Jentilisa, dia ho any Tarsisy sy Pola ary Loda izay mpanenjana tsipìka, ho any Tobala sy Javana, dia ho any amin’ireo nosy lavitra izay tsy mbola nandre ny lazako na nahita ny voninahitro, ary hitory ny voninahitro any amin’ny Jentilisa izy. '
  '2':
  - type: text
    content: Fa izao zavatra rehetra izao no nataon’ny tanako
  - type: text
    content: dia ary izao rehetra izao,
  - type: text
    content: hoy NY TOMPO.
  - type: text
    content: 'Nefa izao no olona hotsinjoviko:'
  - type: text
    content: Izay mahantra sy torotoro fanahy
  - type: text
    content: sady mangovitra noho ny teniko.
  '20':
  - type: text
    content: 'Hitondra ny rahalahinareo rehetra avy any amin’ny Jentilisa rehetra ho fanatitra ho an’NY TOMPO izy, mitaingin-tsoavaly sy anaty kalesy sy filanjana izy, ary mitaingina ampondra sy rameva haingam-pandeha, ho any Jerosalema tendrombohitro masina, hoy NY TOMPO; tahaka ny fitondran’ny Zanak’Israely ny fanatitra avy amin’ny zavamaniry ao anatin’ny lovia madio ho any amin’ny tranon’NY TOMPO. '
  '21':
  - type: text
    content: 'Ary avy amin’ireo aza no hakako ho mpisorona sy '
  - type: text
    content: levita
  - type: text
    content: ', hoy NY TOMPO.'
  '22':
  - type: text
    content: Fa tahaka ny lanitra vaovao
  - type: text
    content: sy ny tany vaovao, izay hataoko
  - type: text
    content: ka haharitra eo anatrehako, hoy NY TOMPO,
  - type: text
    content: dia toy izany no haharetan’ny taranakareo sy ny anaranareo.
  '23':
  - type: text
    content: Ary isaky ny voaloham-bolana
  - type: text
    content: sy isan-tSabata
  - type: text
    content: dia ho avy hiankohoka eo anatrehako
  - type: text
    content: ny nofo rehetra, hoy NY TOMPO.
  '24':
  - type: text
    content: Ary rehefa hivoaka izy ireny dia hahita
  - type: text
    content: ny fatin’ny olona izay efa nikomy Tamiko;
  - type: text
    content: fa tsy ho faty ny kankany,
  - type: text
    content: tsy hovonoina ny afony,
  - type: text
    content: ary hataon’ny nofo rehetra ho fahavetavetana izy.
  '3':
  - type: text
    content: Izay mamono omby dia
  - type: text
    content: ohatry ny mamono olona;
  - type: text
    content: izay mamono ondry hatao fanatitra
  - type: text
    content: dia ohatry ny mamolaka ny vozon’alika;
  - type: text
    content: izay manolotra fanatitra avy amin’ny zavamaniry
  - type: text
    content: dia ohatry ny manatitra ran-kisoa;
  - type: text
    content: izay mandoro ditin-kazo manitra ho fanati-pahatsiarovana
  - type: text
    content: dia ohatry ny misaotra ny sampy.
  - type: text
    content: Eny, nifidy ny halehany ireny
  - type: text
    content: sady nifaly tamin’ny fahavetavetany.
  '4':
  - type: text
    content: Dia tahaka izany kosa no hifidianako ny fampahoriana azy
  - type: text
    content: sy handatsahako ny fahatahorany ho ao aminy,
  - type: text
    content: satria niantso Aho
  - type: text
    content: nefa tsy nisy namaly;
  - type: text
    content: niteny Aho
  - type: text
    content: nefa tsy nihaino izy
  - type: text
    content: fa nanao izay ratsy teo imasoko,
  - type: text
    content: ary izay tsy sitrako no nofidiny.
  - type: heading
    content: Mitondra fampaherezana sy fitsarana NY TOMPO
  '5':
  - type: text
    content: Mihainoa ny tenin’NY TOMPO,
  - type: text
    content: ianareo izay mangovitra noho ny teniny.
  - type: text
    content: Hoy ny rahalahinareo
  - type: text
    content: izay mankahala anareo ka mandroaka anareo
  - type: text
    content: 'noho ny amin’ny anarako:'
  - type: text
    content: Aoka hampiseho ny voninahiny NY TOMPO,
  - type: text
    content: mba ho hitanay ny fifalianareo!
  - type: text
    content: Kanefa izy ireny kosa no hitsanga-menatra.
  '6':
  - type: text
    content: Injany misy horakoraka avy any an-tanàna,
  - type: text
    content: misy feo avy ao amin’ny tempoly.
  - type: text
    content: Feon’NY TOMPO izany,
  - type: text
    content: mamaly ny ataon’ny fahavalony Izy.
  '7':
  - type: text
    content: Mbola tsy nihetsi-jaza aza
  - type: text
    content: izy dia efa niteraka;
  - type: text
    content: mbola tsy nanaintaina aza izy
  - type: text
    content: dia efa niteraka zazalahy.
  '8':
  - type: text
    content: Iza no nandre zavatra toy izany?
  - type: text
    content: Iza no nahita zavatra toy izany?
  - type: text
    content: Hisy tany hateraka indray andro va?
  - type: text
    content: Hisy firenena azo atao indray miteraka va?
  - type: text
    content: 'Fa raha vao nihetsi-jaza i '
  - type: text
    content: Ziona
  - type: text
    content: ' dia efa velon-jaza.'
  '9':
  - type: text
    content: Moa hahatonga vehivavy ho eo amin’ny fiterahana va Aho
  - type: text
    content: ka tsy hampiteraka azy?
  - type: text
    content: Hoy NY TOMPO;
  - type: text
    content: Izaho izay nampiteraka va
  - type: text
    content: no hanakana izany indray?
  - type: text
    content: Hoy Andriamanitrao.
