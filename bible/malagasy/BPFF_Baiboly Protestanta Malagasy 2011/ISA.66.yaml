document_id: ISA.66
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny tena mpivavaka sy ny mpivavaka tsy izy
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Izao no lazain’NY TOMPO:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny lanitra no sezafiandrianako
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny tany no fitoeran-tongotro.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Trano manao ahoana no hataonareo ho Ahy?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary toerana manao ahoana no ho fitsaharako?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Fa izao zavatra rehetra izao no nataon’ny tanako
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ary izao rehetra izao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hoy NY TOMPO.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Nefa izao no olona hotsinjoviko:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay mahantra sy torotoro fanahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady mangovitra noho ny teniko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Izay mamono omby dia
- type: usfm
  marker: q1
  children:
  - type: text
    text: ohatry ny mamono olona;
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay mamono ondry hatao fanatitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ohatry ny mamolaka ny vozon’alika;
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay manolotra fanatitra avy amin’ny zavamaniry
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ohatry ny manatitra ran-kisoa;
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay mandoro ditin-kazo manitra ho fanati-pahatsiarovana
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ohatry ny misaotra ny sampy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, nifidy ny halehany ireny
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady nifaly tamin’ny fahavetavetany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Dia tahaka izany kosa no hifidianako ny fampahoriana azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy handatsahako ny fahatahorany ho ao aminy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria niantso Aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa tsy nisy namaly;
- type: usfm
  marker: q1
  children:
  - type: text
    text: niteny Aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa tsy nihaino izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa nanao izay ratsy teo imasoko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary izay tsy sitrako no nofidiny.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mitondra fampaherezana sy fitsarana NY TOMPO
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Mihainoa ny tenin’NY TOMPO,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ianareo izay mangovitra noho ny teniny.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hoy ny rahalahinareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay mankahala anareo ka mandroaka anareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'noho ny amin’ny anarako:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aoka hampiseho ny voninahiny NY TOMPO,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba ho hitanay ny fifalianareo!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Kanefa izy ireny kosa no hitsanga-menatra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Injany misy horakoraka avy any an-tanàna,
- type: usfm
  marker: q1
  children:
  - type: text
    text: misy feo avy ao amin’ny tempoly.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Feon’NY TOMPO izany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mamaly ny ataon’ny fahavalony Izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Mbola tsy nihetsi-jaza aza
- type: usfm
  marker: q1
  children:
  - type: text
    text: izy dia efa niteraka;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mbola tsy nanaintaina aza izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia efa niteraka zazalahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Iza no nandre zavatra toy izany?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Iza no nahita zavatra toy izany?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hisy tany hateraka indray andro va?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hisy firenena azo atao indray miteraka va?
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Fa raha vao nihetsi-jaza i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Ziona
  - type: text
    text: ' dia efa velon-jaza.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Moa hahatonga vehivavy ho eo amin’ny fiterahana va Aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy hampiteraka azy?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hoy NY TOMPO;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izaho izay nampiteraka va
- type: usfm
  marker: q1
  children:
  - type: text
    text: no hanakana izany indray?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hoy Andriamanitrao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Miaraha mifaly amin’i Jerosalema
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary miravoravoa aminy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ianareo rehetra izay tia azy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: aoka hiara-mifaly aminy tokoa
- type: usfm
  marker: q1
  children:
  - type: text
    text: ianareo rehetra izay malahelo noho ny aminy,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: mba hinonoanareo sy hivokisanareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: amin’ny nonony mahafaly;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, mba higoka ianareo ka hiravoravo
- type: usfm
  marker: q1
  children:
  - type: text
    text: amin’ny haben’ny voninahiny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Fa izao no lazain’NY TOMPO:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Indro, hitarihako fiadanana tahaka ny ony izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny voninahitry ny firenena, ho tahaka ny renirano tondraka.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hampinonoana ianareo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hosakelehina ianareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady horotsirotsina eo ambony lohalika.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Tahaka ny olona ampiononin’ny reniny
- type: usfm
  marker: q1
  children:
  - type: text
    text: no hampiononako anareo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, ao Jerosalema no hampiononana anareo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Dia hahita izany ianareo ka ho faly ny fonareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho tsara fitombo tahaka ny ahi-maitso ny taolanareo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny tanan’NY TOMPO dia ataony fantatry ny mpanompony,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ho tezitra amin’ny fahavalony kosa Izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Fa indro NY TOMPO
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho avy amin’ny afo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tahaka ny tadio ny kalesy fitondrany miady maro
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hanao famaliana amin’ny hatezerany mirehitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny fitenenany mafy amin’ny lelafo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Fa ny afo no hoentin’NY TOMPO mitsara,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary amin’ny sabany no hitsarany ny nofo rehetra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho maro ny voaringan’NY TOMPO.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Izay manamasina sy manadio ny tenany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho ao an-tanimboly
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka mifandimby mankeo afovoany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mihinana henan-kisoa
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy zava-betaveta ary totozy
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hiaraka ho levona avokoa,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hoy NY TOMPO.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ilay famoriana farany
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Fa Izaho mahalala ny asany sy ny heviny. Ary ho avy ny fotoana hamoriana ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jentilisa
  - type: text
    text: ' rehetra sy ny samihafa fiteny; ho avy ireo ka hahita ny voninahitro. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Hasiako famantarana eo aminy; izay afaka mandositra dia hisy halefako ho any amin’ny Jentilisa, dia ho any Tarsisy sy Pola ary Loda izay mpanenjana tsipìka, ho any Tobala sy Javana, dia ho any amin’ireo nosy lavitra izay tsy mbola nandre ny lazako na nahita ny voninahitro, ary hitory ny voninahitro any amin’ny Jentilisa izy. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Hitondra ny rahalahinareo rehetra avy any amin’ny Jentilisa rehetra ho fanatitra ho an’NY TOMPO izy, mitaingin-tsoavaly sy anaty kalesy sy filanjana izy, ary mitaingina ampondra sy rameva haingam-pandeha, ho any Jerosalema tendrombohitro masina, hoy NY TOMPO; tahaka ny fitondran’ny Zanak’Israely ny fanatitra avy amin’ny zavamaniry ao anatin’ny lovia madio ho any amin’ny tranon’NY TOMPO. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary avy amin’ireo aza no hakako ho mpisorona sy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: levita
  - type: text
    text: ', hoy NY TOMPO.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Fa tahaka ny lanitra vaovao
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny tany vaovao, izay hataoko
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka haharitra eo anatrehako, hoy NY TOMPO,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia toy izany no haharetan’ny taranakareo sy ny anaranareo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ary isaky ny voaloham-bolana
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy isan-tSabata
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ho avy hiankohoka eo anatrehako
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny nofo rehetra, hoy NY TOMPO.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Ary rehefa hivoaka izy ireny dia hahita
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny fatin’ny olona izay efa nikomy Tamiko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa tsy ho faty ny kankany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy hovonoina ny afony,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hataon’ny nofo rehetra ho fahavetavetana izy.
