document_id: JHN.18,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nisamborana an’i Jesosy
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Rehefa voalazan’i Jesosy izany teny izany dia nandeha Izy mbamin’ny mpianany ka nita ny lohasahan-driaka Kidrona; ary nisy saha teo, izay nidiran’Izy sy ny mpianany.
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nanana sabatra i Simona Petera dia nanatsoaka izany ka nikapa ny sofin’ny mpanompon’ny Mpisoronabe ary nahafaka ny sofiny havanana. Malko no anaran’ilay mpanompo. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy Jesosy tamin’i Petera: Ampidiro amin’ny tranony ny sabatrao; tsy hosotroiko va ny kapoaka nomen’ny Raiko Ahy?'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nitsarana an’i Jesosy teo anatrehan’i Anasy
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mat 26.57-58; Mar 14.53-54; Lio 22.54
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny miaramila iray toko sy ny mpifehy arivo ary ny mpiambina tamin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jiosy
    - type: text
      text: ' dia nisambotra an’i Jesosy ka namatotra Azy, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia nitondra Azy tany amin’i Anasy aloha, fa izy no rafozan’i Kaiafa, '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Mpisoronabe
    - type: text
      text: ' tamin’izany taona izany. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I Kaiafa dia ilay nanome saina ny Jiosy hoe mahatsara raha maty ny olona iray hamonjena ny firenena.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nandavan’i Petera ny maha mpianatr’i Jesosy azy
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mat 26.69-70; Mar 14.66-68; Lio 22.55-57
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary i Simona Petera sy ny mpianatra iray koa dia nanaraka an’i Jesosy; ary fantatry ny Mpisoronabe io mpianatra io, dia niara-niditra tamin’i Jesosy ho ao an-kianjan’ny tranon’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Mpisoronabe
    - type: text
      text: ' izy. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa i Petera dia nijanona teny ivelan’ny vavahady. Dia nivoaka avy tao ilay mpianatra iray izay fantatry ny Mpisoronabe ka niteny tamin’ny mpiandry vavahady, dia nitondra an’i Petera niditra. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy ny ankizivavy mpiandry vavahady tamin’i Petera: Moa ianao mba isan’ny mpianatr’io lehilahy io? Hoy izy: Tsy izy aho. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary namelona afon’arina ny mpanompo sy ny mpiandry raharaha ka nijanona namindro teo, fa nangatsiaka ny andro; ary mba nijanona niara-namindro taminy koa i Petera.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Nanadina an’i Jesosy ny Mpisoronabe
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mat 26.59-66; Mar 14.55-64; Lio 22.66-71
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nanadina an’i Jesosy ny amin’ny mpianany sy ny fampianarany ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Mpisoronabe
    - type: text
      text: '. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary i Jodasy koa, ilay namadika Azy, dia nahafantatra izany toerana izany satria mpankao matetika Jesosy mbamin’ny mpianany.
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mat 26.47-56; Mar 14.43-50; Lio 22.47-53
    marker-yv: yv-h
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa Jesosy namaly azy hoe: Izaho niteny miharihary tamin’izao tontolo izao; Izaho nampianatra mandrakariva tao amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sinagoga
    - type: text
      text: ' sy tao amin’ny tempoly, izay iangonan’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jiosy
    - type: text
      text: ' rehetra; ary tsy nisy nolazaiko tao amin’ny takona; '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'koa nahoana no manontany Ahy ianao? Ireo izay nihaino no anontanio izay nolazaiko taminy; fa ireo no mahalala izay nolazaiko. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa nilaza izany teny izany Izy dia namely tehamaina an’i Jesosy ny mpiambina iray izay nitsangana teo sady niteny hoe: Izany va no famalinao ny Mpisoronabe? '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy Jesosy: Raha ratsy no nolazaiko, ambarao izay maha ratsy azy; fa raha tsara ihany kosa, nahoana no dia mamely Ahy ianao? '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary nasain’i Anasy noentina am-patorana ho any amin’i Kaiafa izay Mpisoronabe Izy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nandavan’i Petera indray an’i Jesosy
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mat 26.71-75; Mar 14.69-72; Lio 22.58-62
    marker-yv: yv-h
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nijanona namindro teo i Simona Petera. Dia nisy nilaza taminy hoe: Moa ianao koa mba isan’ny mpianany? Fa nandà izy hoe: Tsy izy aho. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy ny iray tamin’ny mpanompon’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Mpisoronabe
    - type: text
      text: ', havan’ilay nokapain’i Petera sofina: Tsy efa hitako niaraka Taminy tao anaty saha va ianao? '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nandà indray i Petera; ary niaraka tamin’izay dia nisy akoho naneno.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nitsaran’i Pilato an’i Jesosy
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mat 27.1-2, 11-12; Mar 15.1-5; Lio 23.1-5
    marker-yv: yv-h
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary noentiny niala tao amin’i Kaiafa ho ao anaty lapa Jesosy; vao maraina ny andro tamin’izay; nefa tsy niditra tao anaty lapa ireo, fandrao ho voaloto satria hihinana ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Paska
    - type: text
      text: ' izy ireo.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nivoaka ho eo aminy teo ivelany i Pilato ka niteny hoe: Inona moa no iampanganareo io lehilahy io? '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa nahazo miaramila iray toko sy mpiambina avy tamin’ireo lehiben’ny mpisorona sy ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Fariseo
    - type: text
      text: ' i Jodasy dia nankao nitondra fanilo sy fanala ary fiadiana. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia namaly ireo hoe: Raha tsy mpanao ratsy Izy, tsy mba natolotray anao. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy i Pilato taminy: Entonareo Izy ka tsarao araka ny lalànanareo. Hoy ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jiosy
    - type: text
      text: ' taminy: Izahay dia tsy manam-pahefana hahafaty olona; '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: izany dia mba hahatanteraka ny tenin’i Jesosy izay nolazainy ka nanambarany ny fomban’ny fahafatesana izay efa hiaretany.
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Niditra tao anaty lapa indray i Pilato, dia niantso an’i Jesosy ka niteny Taminy hoe: Ianao va no Mpanjakan’ny Jiosy? '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia novalin’i Jesosy hoe: Hevitrao ihany va no ilazanao izany sa nisy hafa nilaza Ahy taminao? '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Namaly i Pilato hoe: Moa Jiosy va aho? Ny firenenao sy ireo lehiben’ny mpisorona no nanolotra Anao tamiko; inona moa no nataonao? '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy Jesosy hoe: Ny fanjakako dia tsy avy amin’izao tontolo izao; fa raha mba avy amin’izao tontolo izao ny fanjakako dia ho niady ny mpanompoko mba tsy ho voatolotra tamin’ny Jiosy Aho; nefa amin’izao fotoana izao tsy avy amin’izany ny fanjakako. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy i Pilato taminy: Mpanjaka ary va Ianao? Dia namaly Jesosy hoe: Voalazanao fa mpanjaka Aho. Izao no nahaterahako, ary izao no niaviako amin’izao tontolo izao, dia ny hanambara ny marina. Izay rehetra avy amin’ny marina dia mihaino ny feoko. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy Pilato taminy: Inona ny marina?'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nanamelohana an’i Jesosy ho faty
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mat 27.15-31; Mar 15.6-20; Lio 23.13-25
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa avy nanontany izany izy dia nivoaka nankeo amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jiosy
    - type: text
      text: ' indray ka niteny taminy hoe: Tsy hitako izay helony na dia kely akory aza. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa misy fomba fanaonareo amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Paska
    - type: text
      text: ' dia ny hanafahako olona iray ho anareo; koa tianareo va raha hafahako ho anareo ny Mpanjakan’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jiosy
    - type: text
      text: '? '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary satria fantatr’i Jesosy izay rehetra hanjo Azy dia nanatona azy ireo Izy ka niteny tamin’ireo hoe: Iza moa no tadiavinareo? '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nefa ireo niantso indray hoe: Tsy Ilehio, fa i Barabasy; kanefa i Barabasy dia jiolahy.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary novalin’ireo hoe: Jesosy avy any Nazareta. Hoy Jesosy taminy: Izaho no Izy. Ary teo koa i Jodasy, ilay namadika Azy. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha vao nilaza taminy Jesosy hoe: Izaho no Izy, dia nihemotra ireo ka lavo tamin’ny tany.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nanontany azy indray Jesosy hoe: Iza moa no tadiavinareo? Dia hoy izy: Jesosy avy any Nazareta. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy Jesosy hoe: Efa nolazaiko taminareo fa Izaho no Izy; koa raha Izaho no tadiavinareo dia avelao handeha ireto; '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'mba hahatanteraka ny teny izay nolazainy hoe: Tsy nasiako very izay nomenao Ahy.'
