document_id: JDG.21,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny namelomana indray ny fokon’i Benjamina
  - type: text
    content: 'Ary ny lehilahin’ny Israely dia efa nianiana tany Mizpa hoe: Aoka tsy hisy amintsika hanome ny zanany vavy ho vadin’ny Benjamina. '
  '10':
  - type: text
    content: 'Dia naniraka lehilahy mahery roa arivo sy iray alina ny fiangonana ka nandidy azy hoe: Mandehana ka asio amin’ny lelan-tsabatra ny mponina any Jabesy-Gileada mbamin’ny zaza amam-behivavy. '
  '11':
  - type: text
    content: 'Izao no hataonareo: Ny lehilahy rehetra sy ny vehivavy rehetra efa nahalala lahy dia hataonareo zavatra voaozona. '
  '12':
  - type: text
    content: Ary nahita zazavavy virijiny efajato tsy mbola nahalala lahy teo amin’ny mponina tany Jabesy-Gileada izy ka nitondra ireo ho any an-toby tany Silo any amin’ny tany Kanana.
  '13':
  - type: text
    content: 'Ary ny fiangonana rehetra dia nandefa iraka hiteny tany amin’ny taranak’i Benjamina, izay tao amin’ny harambato tao Rimona, ka niantso azy hihavana aminy. '
  '14':
  - type: text
    content: Dia niverina tamin’izany andro izany ny Benjamina ka nomeny azy ireo vehivavy efa novelominy tamin’ny vehivavy tao Jabesy-Gileada ireo. Kanjo mbola tsy nahenina azy ihany ireo.
  '15':
  - type: text
    content: 'Ary nanenina noho ny amin’ny Benjamina ny olona satria nisy nobangain’NY TOMPO ny fokon’ny Israely. '
  '16':
  - type: text
    content: 'Dia hoy ny loholon’ny fiangonana: Inona no hataontsika ho an’ireo sisa mba hahazoany vady, fa efa naringana ny vehivavy tamin’ny Benjamina? '
  '17':
  - type: text
    content: 'Dia hoy ireo: Tsy maintsy mahazo lova izay afa-nandositra amin’ny Benjamina mba tsy hisy foko iray izay fongotra amin’ny Israely. '
  '18':
  - type: text
    content: 'Nefa isika dia tsy mahazo manome azy ny zanatsika vavy ho vadiny satria efa nianiana ny Zanak’Israely hoe: Ho voaozona izay manome vady ho an’ny Benjamina. '
  '19':
  - type: text
    content: 'Dia hoy ireo: Indro, misy andro firavoravoana isan-taona ho an’NY TOMPO any Silo izay avaratr’i Betela, atsinanan’ny lalambe miakatra avy any Betela hankany Sekema ary atsimon’i Lebona. '
  '2':
  - type: text
    content: 'Dia nankany Betela ny olona ka nitoetra teo anatrehan’Andriamanitra mandra-paharivan’ny andro, dia nanandratra ny feony ka nitomany mafy indrindra '
  '20':
  - type: text
    content: 'Ary nandidy ny taranak’i Benjamina izy ireo hoe: Mandehana ka manaova vela-pandrika any amin’ny tanim-boaloboka ka jereo, '
  '21':
  - type: text
    content: 'ary rehefa hitanareo mivoaka handihy ny zazavavy avy any Silo dia mivoaha avy ao amin’ny tanim-boaloboka ianareo, ary samia misambotra amin’ny zazavavy avy any Silo izay ho vadiny avy ka mandehana any amin’ny tanin’ny Benjamina indray. '
  '22':
  - type: text
    content: 'Ary raha mankany aminay hitaraina ny rainy na ny anadahiny dia holazainay aminy hoe: Aoka hamindra fo aminy ianareo fa izahay tsy mba nahazo vady tany amin’ilay ady teo; fa tsy ianareo no nanome azy, fa raha izany dia meloka ianareo. '
  '23':
  - type: text
    content: 'Dia nanao izany ny taranak’i Benjamina ka samy naka vady araka ny isany tamin’ny mpandihy izay nosamboriny; dia lasa izy ireo niverina ho any amin’ny lovany ary nanangana indray ireo tanàna ka nonina tao. '
  '24':
  - type: text
    content: Dia samy nandeha niala teo ny Zanak’Israely tamin’izany andro izany, samy ho any amin’ny fokony sy ny fianakaviany avy; niala teo ho any amin’ny lovany avy ny olona rehetra.
  '25':
  - type: text
    content: Tsy nisy mpanjaka teo amin’ny Israely tamin’izany andro izany; samy nanao izay noheveriny ho mety avy izy rehetra.
  '3':
  - type: text
    content: 'hoe: Ry TOMPO, Andriamanitry ny Israely ô, nahoana no tonga tamin’ny Israely izao zavatra izao ankehitriny ka nahabangana foko iray ny Israely? '
  '4':
  - type: text
    content: 'Nony ampitson’iny dia nifoha vao maraina ny olona ka nanorina alitara teo ary nanolotra fanatitra dorana manontolo sy fanati-pihavanana. '
  '5':
  - type: text
    content: 'Hoy ny Zanak’Israely: Iza amin’ny fokon’ny Israely rehetra no tsy niakatra teo amin’ny fiangonana hanatona NY TOMPO? Fa efa nisy fianianana lehibe ny amin’izay tsy niakatra ho any amin’NY TOMPO tany Mizpa, nilaza hoe: Hovonoina ho faty izy. '
  '6':
  - type: text
    content: 'Ary nanenina ny amin’ny Benjamina rahalahiny ny Zanak’Israely ka niteny hoe: Misy firenena iray voafongotra tsy ho eo amin’ny Israely ankehitriny. '
  '7':
  - type: text
    content: 'Inona no hataontsika amin’ireo sisa mba hahazoany vady, fa isika efa nianiana tamin’NY TOMPO tsy hanome vady azy amin’ny zanatsika vavy? '
  '8':
  - type: text
    content: 'Dia hoy izy: Iza amin’ny fokon’ny Israely no tsy mba niakatra ho any amin’NY TOMPO tany Mizpa? Ary indro, tsy nisy olona avy tany Jabesy-Gileada na dia iray akory aza nankany an-toby ho ao amin’ny fiangonana. '
  '9':
  - type: text
    content: 'Fa rehefa voaisa ny olona dia indro, tsy nisy tao na dia iray akory aza avy tamin’ny tompon-tany tany Jabesy-Gileada. '
