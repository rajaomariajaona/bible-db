document_id: JDG.21
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny namelomana indray ny fokon’i Benjamina
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary ny lehilahin’ny Israely dia efa nianiana tany Mizpa hoe: Aoka tsy hisy amintsika hanome ny zanany vavy ho vadin’ny Benjamina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Dia nankany Betela ny olona ka nitoetra teo anatrehan’Andriamanitra mandra-paharivan’ny andro, dia nanandratra ny feony ka nitomany mafy indrindra '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'hoe: Ry TOMPO, Andriamanitry ny Israely ô, nahoana no tonga tamin’ny Israely izao zavatra izao ankehitriny ka nahabangana foko iray ny Israely? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Nony ampitson’iny dia nifoha vao maraina ny olona ka nanorina alitara teo ary nanolotra fanatitra dorana manontolo sy fanati-pihavanana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Hoy ny Zanak’Israely: Iza amin’ny fokon’ny Israely rehetra no tsy niakatra teo amin’ny fiangonana hanatona NY TOMPO? Fa efa nisy fianianana lehibe ny amin’izay tsy niakatra ho any amin’NY TOMPO tany Mizpa, nilaza hoe: Hovonoina ho faty izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary nanenina ny amin’ny Benjamina rahalahiny ny Zanak’Israely ka niteny hoe: Misy firenena iray voafongotra tsy ho eo amin’ny Israely ankehitriny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Inona no hataontsika amin’ireo sisa mba hahazoany vady, fa isika efa nianiana tamin’NY TOMPO tsy hanome vady azy amin’ny zanatsika vavy? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dia hoy izy: Iza amin’ny fokon’ny Israely no tsy mba niakatra ho any amin’NY TOMPO tany Mizpa? Ary indro, tsy nisy olona avy tany Jabesy-Gileada na dia iray akory aza nankany an-toby ho ao amin’ny fiangonana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Fa rehefa voaisa ny olona dia indro, tsy nisy tao na dia iray akory aza avy tamin’ny tompon-tany tany Jabesy-Gileada. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dia naniraka lehilahy mahery roa arivo sy iray alina ny fiangonana ka nandidy azy hoe: Mandehana ka asio amin’ny lelan-tsabatra ny mponina any Jabesy-Gileada mbamin’ny zaza amam-behivavy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Izao no hataonareo: Ny lehilahy rehetra sy ny vehivavy rehetra efa nahalala lahy dia hataonareo zavatra voaozona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ary nahita zazavavy virijiny efajato tsy mbola nahalala lahy teo amin’ny mponina tany Jabesy-Gileada izy ka nitondra ireo ho any an-toby tany Silo any amin’ny tany Kanana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary ny fiangonana rehetra dia nandefa iraka hiteny tany amin’ny taranak’i Benjamina, izay tao amin’ny harambato tao Rimona, ka niantso azy hihavana aminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Dia niverina tamin’izany andro izany ny Benjamina ka nomeny azy ireo vehivavy efa novelominy tamin’ny vehivavy tao Jabesy-Gileada ireo. Kanjo mbola tsy nahenina azy ihany ireo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary nanenina noho ny amin’ny Benjamina ny olona satria nisy nobangain’NY TOMPO ny fokon’ny Israely. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Dia hoy ny loholon’ny fiangonana: Inona no hataontsika ho an’ireo sisa mba hahazoany vady, fa efa naringana ny vehivavy tamin’ny Benjamina? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Dia hoy ireo: Tsy maintsy mahazo lova izay afa-nandositra amin’ny Benjamina mba tsy hisy foko iray izay fongotra amin’ny Israely. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Nefa isika dia tsy mahazo manome azy ny zanatsika vavy ho vadiny satria efa nianiana ny Zanak’Israely hoe: Ho voaozona izay manome vady ho an’ny Benjamina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Dia hoy ireo: Indro, misy andro firavoravoana isan-taona ho an’NY TOMPO any Silo izay avaratr’i Betela, atsinanan’ny lalambe miakatra avy any Betela hankany Sekema ary atsimon’i Lebona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary nandidy ny taranak’i Benjamina izy ireo hoe: Mandehana ka manaova vela-pandrika any amin’ny tanim-boaloboka ka jereo, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'ary rehefa hitanareo mivoaka handihy ny zazavavy avy any Silo dia mivoaha avy ao amin’ny tanim-boaloboka ianareo, ary samia misambotra amin’ny zazavavy avy any Silo izay ho vadiny avy ka mandehana any amin’ny tanin’ny Benjamina indray. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary raha mankany aminay hitaraina ny rainy na ny anadahiny dia holazainay aminy hoe: Aoka hamindra fo aminy ianareo fa izahay tsy mba nahazo vady tany amin’ilay ady teo; fa tsy ianareo no nanome azy, fa raha izany dia meloka ianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Dia nanao izany ny taranak’i Benjamina ka samy naka vady araka ny isany tamin’ny mpandihy izay nosamboriny; dia lasa izy ireo niverina ho any amin’ny lovany ary nanangana indray ireo tanàna ka nonina tao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Dia samy nandeha niala teo ny Zanak’Israely tamin’izany andro izany, samy ho any amin’ny fokony sy ny fianakaviany avy; niala teo ho any amin’ny lovany avy ny olona rehetra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Tsy nisy mpanjaka teo amin’ny Israely tamin’izany andro izany; samy nanao izay noheveriny ho mety avy izy rehetra.
