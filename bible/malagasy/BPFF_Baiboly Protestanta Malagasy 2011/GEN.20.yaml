document_id: GEN.20,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: I Abrahama sy i Abimeleka
  - type: text
    content: 'Dia nifindra niala teo i Abrahama ka nankany Negeva, ary nitoetra teo anelanelan’i Kadesy sy Sora izy, avy eo dia nivahiny tao Gerara. '
  '10':
  - type: text
    content: 'Hoy koa i Abimeleka tamin’i Abrahama: Inona no nokasainao ka nanaovanao izao zavatra izao? '
  '11':
  - type: text
    content: 'Dia hoy i Abrahama: Satria hoy aho hoe: Tsy misy fahatahorana an’Andriamanitra na dia kely aza amin’ity tany ity ka hovonoin’ny olona aho noho ny amin’ny vadiko. '
  '12':
  - type: text
    content: 'Nefa anabaviko ihany tokoa izy, satria zanakavavin’ny raiko fa tsy mba zanakavavin’ny reniko; dia nanambady azy aho. '
  '13':
  - type: text
    content: 'Ary raha nampifindrafindra ahy hiala tamin’ny tranon’ny raiko Andriamanitra dia hoy aho tamin’ny vadiko: Izao no soa hataonao amiko any amin’izay tany rehetra halehantsika, dia ny filazanao ahy hoe: Anadahiko izy.'
  '14':
  - type: text
    content: 'Ary naka ondry, omby, mpanompolahy ary mpanompovavy, i Abimeleka ka nomeny an’i Abrahama ireny sady naveriny taminy i Saraha vadiny. '
  '15':
  - type: text
    content: 'Hoy koa i Abimeleka: Indro, eo anoloanao ny taniko; mitoera eo amin’izay tianao. '
  '16':
  - type: text
    content: 'Ary hoy kosa izy tamin’i Saraha: Indro, efa nomeko sekela volafotsy arivo ny anadahinao; indro, ho tampi-maso noho ny aminao izany, dia amin’izay rehetra miaraka aminao ka hahazo rariny eo anatrehan’ny olona rehetra ianao. '
  '17':
  - type: text
    content: 'Ary nifona tamin’Andriamanitra i Abrahama; ary Andriamanitra nahasitrana an’i Abimeleka sy ny vadiny mbamin’ireo mpanompovaviny, dia niteraka izy ireo. '
  '18':
  - type: text
    content: Fa NY TOMPO nahamomba tanteraka ny vehivavy rehetra tamin’ny ankohonan’i Abimeleka noho ny amin’i Saraha, vadin’i Abrahama.
  '2':
  - type: text
    content: 'Ny filazan’i Abrahama an’i Saraha vadiny dia hoe: Anabaviko izy. Koa nandefa iraka haka an’i Saraha i Abimeleka, mpanjakan’i Gerara. '
  '3':
  - type: text
    content: 'Fa Andriamanitra nankeo amin’i Abimeleka tamin’ny nofy nony alina ka niteny taminy hoe: Indro, ho faty ianao noho ny vehivavy izay nalainao, fa vadin’olona io. '
  '4':
  - type: text
    content: 'Tsy mbola nanakaiky azy anefa i Abimeleka ka hoy izy: Tompo ô, hovonoinao koa va izay firenena marina? '
  '5':
  - type: text
    content: 'Tsy Ralehilahy va no nilaza tamiko hoe: Anabaviko izy? Ary Ravehivavy koa dia nilaza hoe: Anadahiko izy. Koa tamin’ny fahatsoran’ny foko sy ny fahadiovan’ny tanako no nanaovako izao. '
  '6':
  - type: text
    content: 'Ary hoy Andriamanitra taminy, tamin’ny nofy: Eny ary, fantatro ihany fa tamin’ny fahatsoran’ny fonao no nanaovanao izany; ary Izaho koa dia niaro anao mba tsy hanota Amiko. Koa izay no tsy namelako anao hikasika azy. '
  '7':
  - type: text
    content: Koa ankehitriny, avereno ny vadin-dRalehilahy, fa mpaminany izy ka hifona ho anao, dia ho velona ianao. Fa raha tsy averinao izy, aoka ho fantatrao fa ho faty tokoa ianao, dia ianao mbamin’izay rehetra mety ho anao.
  '8':
  - type: text
    content: 'Dia nifoha vao maraina i Abimeleka ka niantso ny mpanompony tsy an-kanavaka ary nanambara izany rehetra izany teo anatrehan’ireo, dia raiki-tahotra indrindra ny olona. '
  '9':
  - type: text
    content: 'Dia nampaka an’i Abrahama i Abimeleka ka niteny taminy hoe: Inona izao nataonao taminay izao, ary inona no ratsy nataoko taminao, no dia nahatonga heloka lehibe tamiko sy tamin’ny fanjakako ianao? Zavatra izay tsy fanao no nataonao tamiko. '
