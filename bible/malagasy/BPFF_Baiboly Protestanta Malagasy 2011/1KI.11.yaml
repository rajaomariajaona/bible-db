document_id: 1KI.11,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Niala tamin’ny Tompo ny fon’i Solomona
  - type: text
    content: 'Tia vehivavy maro hafa firenena ankoatra ilay zanakavavin’i Farao anefa i Solomona mpanjaka: Vehivavy moabita, amonita, edomita, sidoniana ary hetita, '
  '10':
  - type: text
    content: 'sady nanome didy azy ny amin’izany zavatra izany mba tsy hanarahany andriamanitra hafa, kanefa tsy notandremany izay nandidian’NY TOMPO azy. '
  '11':
  - type: text
    content: 'Koa hoy NY TOMPO tamin’i Solomona: Satria izao no nataonao ka tsy notandremanao ny fanekeko sy ny fitsipiko izay nandidiako anao dia hendahiko ho afaka aminao tokoa ny fanjakana ka homeko ny mpanomponao. '
  '12':
  - type: text
    content: 'Kanefa tsy hataoko amin’ny andronao izany noho ny amin’i Davida rainao; fa rehefa tonga amin’ny zanakao vao hendahiko aminy. '
  '13':
  - type: text
    content: Nefa tsy hendahiko manontolo ny fanjakana fa mba homeko firenena iray ihany ny zanakao noho ny amin’i Davida mpanompoko sy Jerosalema izay nofidiko.
  - type: heading
    content: Fahavalo roa nitsangana hanohitra an’i Solomona
  '14':
  - type: text
    content: 'Ary nanangana fahavalo hanohitra an’i Solomona NY TOMPO, dia i Hadada edomita, taranaky ny mpanjakan’i Edoma. '
  '15':
  - type: text
    content: 'Fa fony nanafika an’i Edoma i Davida dia niakatra handevina ny maty tany i Joaba, komandin’ny miaramila, ary namono ny lehilahy rehetra tany; '
  '16':
  - type: text
    content: 'enim-bolana no nitoeran’i Joaba sy ny Israely rehetra tany Edoma mandra-pandringany ny lehilahy rehetra tany. '
  '17':
  - type: text
    content: 'Tamin’izay fotoana izay i Hadada sy ny Edomita sasany, mpanompon’ny rainy izay nanaraka azy, no nandositra ka nankany Ejipta. Mbola zazalahy kely i Hadada tamin’io. '
  '18':
  - type: text
    content: 'Ary niainga niala tany Midiana ireo ka tonga tany Parana; dia naka olona avy tany Parana izy ireo homba azy ka nankany Ejipta ho any amin’i Farao, mpanjakan’i Ejipta, izay nanome azy trano sy tany sady nilaza hanome hanina azy koa. '
  '19':
  - type: text
    content: 'Nahita fitia fatratra teo imason’i Farao i Hadada ka ny rahavavin’i Tapanesa, vadin’ny mpanjaka, no nomeny ho vadiny. '
  '2':
  - type: text
    content: 'dia vehivavy avy amin’ny firenena izay nolazain’NY TOMPO tamin’ny Zanak’Israely hoe: Tsy hanambady azy ianareo, ary tsy hanambady anareo izy, fa hampivily ny fonareo hanaraka ny andriamaniny tokoa izy; kanjo tamin’ireo no niraiketan’ny fitiavan’i Solomona. '
  '20':
  - type: text
    content: 'Ary ny rahavavin’i Tapanesa dia niteraka zazalahy tamin’i Hadada, dia i Genobata, izay notezain’i Tapanesa tao an-tranon’i Farao; niara-nitoetra tamin’ny zanakalahin’i Farao tao an-dapa i Genobata. '
  '21':
  - type: text
    content: 'Rehefa ren’i Hadada tany Ejipta fa nodimandry any amin’ny razany i Davida sady maty koa i Joaba, lehiben’ny miaramila, dia hoy izy tamin’i Farao: Alefaso hody any amin’ny tanindrazako aho. '
  '22':
  - type: text
    content: 'Hoy anefa i Farao taminy: Fa inona moa no zavatra mahory anao atỳ amiko no dia mitady hody any amin’ny tanindrazanao indray ianao? Hoy ny navaliny: Tsy misy mahory ahy, fa alefaso ihany aho.'
  '23':
  - type: text
    content: 'Nanangana fahavalo hafa hanohitra an’i Solomona koa Andriamanitra, dia i Rezona, zanak’i Eliada, izay nandositra an’i Hadadezera tompony, mpanjakan’i Zoba. '
  '24':
  - type: text
    content: 'Namory olona maro ho ao aminy izy ka tonga kapitenin’ny andian-tafika iray, tamin’ilay fotoana namonoan’i Davida an’izany andian-tafika izany. Nankany Damaskosy izy sy ny namany ka nitoetra sy nanjaka tao. '
  '25':
  - type: text
    content: Izy koa dia fahavalon’ny Israely tamin’ny andron’i Solomona rehetra ka nanampy ny ratsy izay nataon’i Hadada; eny, nankahala ny Israely izy ary nanjaka tany Arama.
  - type: heading
    content: Ny fisintahan’i Jeroboama
  '26':
  - type: text
    content: 'Ary i Jeroboama, zanak’i Nebata, Efraimita avy any Zareda ary mpanompon’i Solomona, dia nanainga tanana hikomy tamin’ny mpanjaka. Zeroa no anaran’ny reniny, vehivavy mpitondratena iray. '
  '27':
  - type: text
    content: 'Izao no fototry ny nanaingany tanana hikomy tamin’ny mpanjaka: Nanorina an’i Milo i Solomona ary nanampina ny lohasaha tao amin’ny Tanànan’i Davida rainy. '
  '28':
  - type: text
    content: 'I Jeroboama dia lehilahy matanjaka sady mahery fo; koa nony hitan’i Solomona fa zatovo mahavita raharaha izy dia nataony mpifehy ny taranak’i Josefa manontolo tamin’ny fanompoany rehetra. '
  '29':
  - type: text
    content: 'Indray andro, raha nivoaka avy tany Jerosalema i Jeroboama, dia hitan’i Ahia silonita mpaminany teny an-dalana; i Ahia dia nanao akanjo ivelany vaovao, ary izy roa lahy ihany no tany an-tsaha. '
  '3':
  - type: text
    content: 'Nanana vady andriambavy fitonjato sy vady tsindrano telonjato izy ka nampivily ny fony ireo vadiny ireo. '
  '30':
  - type: text
    content: 'Noraisin’i Ahia ny akanjo vaovao izay nanaovany ka notriatriariny ho roa amby folo '
  '31':
  - type: text
    content: 'sady hoy izy tamin’i Jeroboama: Raiso ny tapatapany folo! Fa izao no lazain’NY TOMPO, Andriamanitry ny Israely: Indro, Izaho hanendaka ny fanjakana ho afaka amin’ny tanan’i Solomona ary homeko anao ny foko folo. '
  '32':
  - type: text
    content: 'Nefa ny foko iray dia mbola havela ho azy ihany noho ny amin’i Davida mpanompoko sy i Jerosalema, tanàna izay nofidiko tamin’ireo fokon’ny Israely rehetra, '
  '33':
  - type: text
    content: 'satria efa nahafoy Ahy izy ireo ka niankohoka teo anatrehan’i '
  - type: text
    content: Astarta
  - type: text
    content: ', andriamani-bavin’ny Sidoniana, sy i Kemosy, andriamanitr’i Moaba ary i Milkoma, andriamanitry ny taranak’i Amona, fa tsy nandeha tamin’ny lalako izy ireo mba hanaovany izay mahitsy eo imasoko sy hitandremany ny didiko sy ny fitsipiko tahaka an’i Davida rainy. '
  '34':
  - type: text
    content: 'Nefa tsy hesoriko eo an-tanany avokoa ny fanjakana rehetra fa hampitoeriko ho mpanjaka ihany izy amin’ny andro rehetra hiainany noho ny amin’i Davida mpanompoko izay nofidiko ary nitandrina ny lalànako sy ny didiko. '
  '35':
  - type: text
    content: 'Nefa hesoriko tsy ho eo an-tanan’ny zanany kosa ny fanjakana ka homeko anao, saingy ny firenena folo aminy ihany. '
  '36':
  - type: text
    content: 'Fa ny firenena iray dia homeko ny zanany, mba hisy fanilo ho an’i Davida mpanompoko eo anatrehako mandrakariva any Jerosalema, tanàna izay nofidiko ho Ahy hametrahana ny anarako. '
  '37':
  - type: text
    content: 'Koa ianao no halaiko ka hanjaka amin’izay rehetra irinao ary ho mpanjaka amin’ny Israely. '
  '38':
  - type: text
    content: 'Ary raha mihaino izay rehetra andidiako anao ianao ka mandeha amin’ny lalako ary manao izay mahitsy eo imasoko sady mitandrina ny didiko sy ny lalànako tahaka izay nataon’i Davida mpanompoko, dia ho aminao Aho ka hampaharitra ny taranakao, tahaka izay nataoko ho an’i Davida, ary homeko anao ny Israely. '
  '39':
  - type: text
    content: Hampietry ny taranak’i Davida Aho noho izany, nefa tsy ho mandrakizay.
  '4':
  - type: text
    content: 'Nony efa antitra i Solomona dia navilin’ireo vadiny hanaraka andriamanitra hafa ny fony ka tsy nahitsy tamin’NY TOMPO Andriamaniny intsony tahaka ny fon’i Davida rainy. '
  '40':
  - type: text
    content: Ary nitady hamono an’i Jeroboama i Solomona. Nefa niainga i Jeroboama dia nandositra nankany Ejipta ho any amin’i Sisaka, mpanjakan’i Ejipta, ka nitoetra tany mandra-pahafatin’i Solomona.
  - type: heading
    content: Ny nahafatesan’i Solomona
  - type: heading
    content: 2Tan 9.29-31
  '41':
  - type: text
    content: 'Ny tantaran’i Solomona sisa mbamin’izay rehetra nataony ary ny fahendreny, tsy voasoratra ao amin’ny bokin’ny tantaran’i Solomona va izany? '
  '42':
  - type: text
    content: 'Efapolo taona ny andro nanjakan’i Solomona tamin’ny Israely rehetra tany Jerosalema. '
  '43':
  - type: text
    content: Dia nodimandry any amin’ny razany i Solomona ka nalevina tao amin’ny Tanànan’i Davida rainy. I Rehoboama zanany no nanjaka nandimby azy.
  '5':
  - type: text
    content: 'Fa nanaraka an’i '
  - type: text
    content: Astarta
  - type: text
    content: ', andriamani-bavin’ny Sidoniana, sy i Milkoma, fahavetavetan’ny Amonita i Solomona. '
  '6':
  - type: text
    content: 'Ary nanao izay ratsy teo imason’NY TOMPO i Solomona ka tsy mba tanteraka tamin’ny fanarahana Azy tahaka an’i Davida rainy. '
  '7':
  - type: text
    content: 'Tamin’izany i Solomona dia nanorina toerana fanaovana sorona ho an’i Kemosy, izay fahavetavetan’i Moaba, teo amin’ny havoana tandrifin’i Jerosalema, ary koa ho an’i Moloka, izay fahavetavetan’ny taranak’i Amona. '
  '8':
  - type: text
    content: Toy izany no nataony ho an’ireo vadiny hafa firenena rehetra, izay nandoro ditin-kazo manitra sy namono zavatra hatao fanatitra ho an’ireo andriamaniny.
  '9':
  - type: text
    content: 'Tezitra tamin’i Solomona NY TOMPO noho ny nivilian’ny fony niala tamin’NY TOMPO, Andriamanitry ny Israely, izay niseho indroa taminy, '
