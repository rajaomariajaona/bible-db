document_id: 1KI.11
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Niala tamin’ny Tompo ny fon’i Solomona
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Tia vehivavy maro hafa firenena ankoatra ilay zanakavavin’i Farao anefa i Solomona mpanjaka: Vehivavy moabita, amonita, edomita, sidoniana ary hetita, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'dia vehivavy avy amin’ny firenena izay nolazain’NY TOMPO tamin’ny Zanak’Israely hoe: Tsy hanambady azy ianareo, ary tsy hanambady anareo izy, fa hampivily ny fonareo hanaraka ny andriamaniny tokoa izy; kanjo tamin’ireo no niraiketan’ny fitiavan’i Solomona. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Nanana vady andriambavy fitonjato sy vady tsindrano telonjato izy ka nampivily ny fony ireo vadiny ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Nony efa antitra i Solomona dia navilin’ireo vadiny hanaraka andriamanitra hafa ny fony ka tsy nahitsy tamin’NY TOMPO Andriamaniny intsony tahaka ny fon’i Davida rainy. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Fa nanaraka an’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Astarta
  - type: text
    text: ', andriamani-bavin’ny Sidoniana, sy i Milkoma, fahavetavetan’ny Amonita i Solomona. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary nanao izay ratsy teo imason’NY TOMPO i Solomona ka tsy mba tanteraka tamin’ny fanarahana Azy tahaka an’i Davida rainy. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Tamin’izany i Solomona dia nanorina toerana fanaovana sorona ho an’i Kemosy, izay fahavetavetan’i Moaba, teo amin’ny havoana tandrifin’i Jerosalema, ary koa ho an’i Moloka, izay fahavetavetan’ny taranak’i Amona. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Toy izany no nataony ho an’ireo vadiny hafa firenena rehetra, izay nandoro ditin-kazo manitra sy namono zavatra hatao fanatitra ho an’ireo andriamaniny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Tezitra tamin’i Solomona NY TOMPO noho ny nivilian’ny fony niala tamin’NY TOMPO, Andriamanitry ny Israely, izay niseho indroa taminy, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'sady nanome didy azy ny amin’izany zavatra izany mba tsy hanarahany andriamanitra hafa, kanefa tsy notandremany izay nandidian’NY TOMPO azy. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Koa hoy NY TOMPO tamin’i Solomona: Satria izao no nataonao ka tsy notandremanao ny fanekeko sy ny fitsipiko izay nandidiako anao dia hendahiko ho afaka aminao tokoa ny fanjakana ka homeko ny mpanomponao. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Kanefa tsy hataoko amin’ny andronao izany noho ny amin’i Davida rainao; fa rehefa tonga amin’ny zanakao vao hendahiko aminy. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Nefa tsy hendahiko manontolo ny fanjakana fa mba homeko firenena iray ihany ny zanakao noho ny amin’i Davida mpanompoko sy Jerosalema izay nofidiko.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fahavalo roa nitsangana hanohitra an’i Solomona
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary nanangana fahavalo hanohitra an’i Solomona NY TOMPO, dia i Hadada edomita, taranaky ny mpanjakan’i Edoma. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Fa fony nanafika an’i Edoma i Davida dia niakatra handevina ny maty tany i Joaba, komandin’ny miaramila, ary namono ny lehilahy rehetra tany; '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'enim-bolana no nitoeran’i Joaba sy ny Israely rehetra tany Edoma mandra-pandringany ny lehilahy rehetra tany. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Tamin’izay fotoana izay i Hadada sy ny Edomita sasany, mpanompon’ny rainy izay nanaraka azy, no nandositra ka nankany Ejipta. Mbola zazalahy kely i Hadada tamin’io. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary niainga niala tany Midiana ireo ka tonga tany Parana; dia naka olona avy tany Parana izy ireo homba azy ka nankany Ejipta ho any amin’i Farao, mpanjakan’i Ejipta, izay nanome azy trano sy tany sady nilaza hanome hanina azy koa. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Nahita fitia fatratra teo imason’i Farao i Hadada ka ny rahavavin’i Tapanesa, vadin’ny mpanjaka, no nomeny ho vadiny. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary ny rahavavin’i Tapanesa dia niteraka zazalahy tamin’i Hadada, dia i Genobata, izay notezain’i Tapanesa tao an-tranon’i Farao; niara-nitoetra tamin’ny zanakalahin’i Farao tao an-dapa i Genobata. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Rehefa ren’i Hadada tany Ejipta fa nodimandry any amin’ny razany i Davida sady maty koa i Joaba, lehiben’ny miaramila, dia hoy izy tamin’i Farao: Alefaso hody any amin’ny tanindrazako aho. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Hoy anefa i Farao taminy: Fa inona moa no zavatra mahory anao atỳ amiko no dia mitady hody any amin’ny tanindrazanao indray ianao? Hoy ny navaliny: Tsy misy mahory ahy, fa alefaso ihany aho.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Nanangana fahavalo hafa hanohitra an’i Solomona koa Andriamanitra, dia i Rezona, zanak’i Eliada, izay nandositra an’i Hadadezera tompony, mpanjakan’i Zoba. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Namory olona maro ho ao aminy izy ka tonga kapitenin’ny andian-tafika iray, tamin’ilay fotoana namonoan’i Davida an’izany andian-tafika izany. Nankany Damaskosy izy sy ny namany ka nitoetra sy nanjaka tao. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Izy koa dia fahavalon’ny Israely tamin’ny andron’i Solomona rehetra ka nanampy ny ratsy izay nataon’i Hadada; eny, nankahala ny Israely izy ary nanjaka tany Arama.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fisintahan’i Jeroboama
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ary i Jeroboama, zanak’i Nebata, Efraimita avy any Zareda ary mpanompon’i Solomona, dia nanainga tanana hikomy tamin’ny mpanjaka. Zeroa no anaran’ny reniny, vehivavy mpitondratena iray. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Izao no fototry ny nanaingany tanana hikomy tamin’ny mpanjaka: Nanorina an’i Milo i Solomona ary nanampina ny lohasaha tao amin’ny Tanànan’i Davida rainy. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'I Jeroboama dia lehilahy matanjaka sady mahery fo; koa nony hitan’i Solomona fa zatovo mahavita raharaha izy dia nataony mpifehy ny taranak’i Josefa manontolo tamin’ny fanompoany rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Indray andro, raha nivoaka avy tany Jerosalema i Jeroboama, dia hitan’i Ahia silonita mpaminany teny an-dalana; i Ahia dia nanao akanjo ivelany vaovao, ary izy roa lahy ihany no tany an-tsaha. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Noraisin’i Ahia ny akanjo vaovao izay nanaovany ka notriatriariny ho roa amby folo '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'sady hoy izy tamin’i Jeroboama: Raiso ny tapatapany folo! Fa izao no lazain’NY TOMPO, Andriamanitry ny Israely: Indro, Izaho hanendaka ny fanjakana ho afaka amin’ny tanan’i Solomona ary homeko anao ny foko folo. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Nefa ny foko iray dia mbola havela ho azy ihany noho ny amin’i Davida mpanompoko sy i Jerosalema, tanàna izay nofidiko tamin’ireo fokon’ny Israely rehetra, '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'satria efa nahafoy Ahy izy ireo ka niankohoka teo anatrehan’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Astarta
  - type: text
    text: ', andriamani-bavin’ny Sidoniana, sy i Kemosy, andriamanitr’i Moaba ary i Milkoma, andriamanitry ny taranak’i Amona, fa tsy nandeha tamin’ny lalako izy ireo mba hanaovany izay mahitsy eo imasoko sy hitandremany ny didiko sy ny fitsipiko tahaka an’i Davida rainy. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Nefa tsy hesoriko eo an-tanany avokoa ny fanjakana rehetra fa hampitoeriko ho mpanjaka ihany izy amin’ny andro rehetra hiainany noho ny amin’i Davida mpanompoko izay nofidiko ary nitandrina ny lalànako sy ny didiko. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Nefa hesoriko tsy ho eo an-tanan’ny zanany kosa ny fanjakana ka homeko anao, saingy ny firenena folo aminy ihany. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Fa ny firenena iray dia homeko ny zanany, mba hisy fanilo ho an’i Davida mpanompoko eo anatrehako mandrakariva any Jerosalema, tanàna izay nofidiko ho Ahy hametrahana ny anarako. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Koa ianao no halaiko ka hanjaka amin’izay rehetra irinao ary ho mpanjaka amin’ny Israely. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Ary raha mihaino izay rehetra andidiako anao ianao ka mandeha amin’ny lalako ary manao izay mahitsy eo imasoko sady mitandrina ny didiko sy ny lalànako tahaka izay nataon’i Davida mpanompoko, dia ho aminao Aho ka hampaharitra ny taranakao, tahaka izay nataoko ho an’i Davida, ary homeko anao ny Israely. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Hampietry ny taranak’i Davida Aho noho izany, nefa tsy ho mandrakizay.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Ary nitady hamono an’i Jeroboama i Solomona. Nefa niainga i Jeroboama dia nandositra nankany Ejipta ho any amin’i Sisaka, mpanjakan’i Ejipta, ka nitoetra tany mandra-pahafatin’i Solomona.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nahafatesan’i Solomona
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 2Tan 9.29-31
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Ny tantaran’i Solomona sisa mbamin’izay rehetra nataony ary ny fahendreny, tsy voasoratra ao amin’ny bokin’ny tantaran’i Solomona va izany? '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Efapolo taona ny andro nanjakan’i Solomona tamin’ny Israely rehetra tany Jerosalema. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: Dia nodimandry any amin’ny razany i Solomona ka nalevina tao amin’ny Tanànan’i Davida rainy. I Rehoboama zanany no nanjaka nandimby azy.
