document_id: 1KI.15
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: I Abia, mpanjakan’ny Joda
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 2Tan 13.1-3
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Tamin’ny taona fahavalo amby folo nanjakan’i Jeroboama, zanak’i Nebata, no tonga mpanjakan’i Joda i Abia. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Telo taona no nanjakany tany Jerosalema. Ny anaran’ny reniny dia Imaka, zanakavavin’i Absaloma. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Nandeha tamin’ny fahotana rehetra nataon’ny rainy izy, dia izay nataony teo alohany; ny fony dia tsy mba nahitsy tamin’NY TOMPO Andriamaniny tahaka ny fon’i Davida rainy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Nefa noho ny amin’i Davida dia nomen’NY TOMPO Andriamaniny fanilo tany Jerosalema ihany izy ka natsangany handimby azy ny zanany sady nampaharitra an’i Jerosalema Izy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'satria nanao izay mahitsy teo imason’NY TOMPO i Davida ka tsy nivily niala tamin’izay nandidiany azy tamin’ny andro rehetra niainany, afa-tsy ilay tamin’i Oria hetita ihany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Niady i Rehoboama sy i Jeroboama tamin’ny andro rehetra niainany.
- type: usfm
  marker: r
  children:
  - type: text
    text: 2Tan 13.22-23
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ny tantaran’i Abia sisa mbamin’izay rehetra nataony, tsy voasoratra ao amin’ny bokin’ny tantaran’ny mpanjakan’ny Joda va izany? Niady i Abia sy i Jeroboama. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Nodimandry any amin’ny razany i Abia, dia nalevina tao amin’ny Tanànan’i Davida izy. I Asa zanany no nanjaka nandimby azy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: I Asa, mpanjakan’ny Joda
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 2Tan 14.1-2
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Tamin’ny taona faharoapolo nanjakan’i Jeroboama, mpanjakan’ny Israely, no tonga mpanjakan’ny Joda i Asa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Iraika amby efapolo taona no nanjakany tany Jerosalema. Ny anaran’ny reniny dia Imaka, zanakavavin’i Absaloma. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Nanao izay mahitsy teo imason’NY TOMPO i Asa, toy ny nataon’i Davida rainy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Nesoriny tamin’ny tany ny olona izay nanolo-tena hijangajanga ho fanompoan-tsampy, sady nariany ny sampy rehetra izay nataon’ny rainy.
- type: usfm
  marker: r
  children:
  - type: text
    text: 2Tan 15.16-18
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Na dia Imaka reniny aza dia naetriny tsy ho andriambavy intsony, satria nanao sampy mahatsiravina ho an’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Aseraha
  - type: text
    text: '; ary nikapa ny sampiny i Asa ka nandoro azy tao an-dohasahan-driaka Kidrona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Na izany aza, ireo toerana fanaovana sorona dia tsy mba noravana; nefa nahitsy teo imason’NY TOMPO ny fon’i Asa tamin’ny andro rehetra niainany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Nampidiriny ho ao amin’ny tranon’NY TOMPO ny zavatra izay nohamasinin’ny rainy mbamin’izay nohamasinin’ny tenany, dia volafotsy sy volamena ary fanaka.
- type: usfm
  marker: r
  children:
  - type: text
    text: 2Tan 16.1-6
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Niady i Asa sy i Basa, mpanjakan’ny Israely, tamin’ny andro rehetra niainany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary niakatra hamely ny Joda i Basa, mpanjakan’ny Israely ka nanamboatra an’i Rama mba tsy hisy hahazo hivoaka sy hiditra ho any amin’i Asa, mpanjakan’ny Joda. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary naka ny volafotsy sy ny volamena rehetra izay sisa tao amin’ny efitrano fitahirizana tao amin’ny tranon’NY TOMPO sy tao amin’ny efitrano fitahirizana tao amin’ny tranon’ny mpanjaka i Asa ka natolony teo an-tanan’ny mpanompony. Avy eo i Asa mpanjaka dia nampanatitra azy tany amin’i Beny-Hadada, zanak’i Tabrimona, zanak’i Heziona, mpanjakan’i Arama, izay nonina tao Damaskosy, ka nampilazainy hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Misy fanekena amiko sy aminao, ary tamin’ny raiko sy ny rainao. Koa indro, mampanatitra volafotsy sy volamena ho fanomezana ho anao aho; andeha, tsoahy ny fanekenao tamin’i Basa, mpanjakan’ny Israely, mba hialany amiko. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary nihaino an’i Asa mpanjaka i Beny-Hadada ka naniraka ny komandin’ny miaramilany hamely ny tanànan’ny Israely; ary namely an’Iona, i Dana, i Abela-Bety-Maka ary ny Kinerota manontolo mbamin’ny tanin’ny Naftaly manontolo izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Rehefa ren’i Basa izany dia nitsahatra tsy nanamboatra an’i Rama intsony izy sady nitoetra tao Tirza. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: I Asa mpanjaka kosa dia nampiantso ny Joda rehetra ka tsy nisy izay tsy nampandrenesiny, mba hanaisotra ny vato sy ny hazo tao Rama izay naorin’i Basa; ary noentin’i Asa mpanjaka nanorenana an’i Geban’i Benjamina sy Mizpa kosa izany.
- type: usfm
  marker: r
  children:
  - type: text
    text: 2Tan 16.11–17.1
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ny tantaran’i Asa sisa rehetra sy ny heriny rehetra mbamin’izay rehetra nataony ary ny tanàna izay naoriny, tsy voasoratra ao amin’ny bokin’ny tantaran’ny mpanjakan’ny Joda va izany? Fa tamin’ny andron’ny fahanterany dia narary tongotra izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Ary nodimandry any amin’ny razany izy ka nalevina tao amin’ny razany tao amin’ny Tanànan’i Davida rainy. I Josafata zanany no nanjaka nandimby azy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: I Nadaba, mpanjakan’ny Israely
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Tonga mpanjakan’ny Israely i Nadaba zanak’i Jeroboama, tamin’ny taona faharoa nanjakan’i Asa, mpanjakan’ny Joda. Nanjaka roa taona tamin’ny Israely izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Nanao izay ratsy teo imason’NY TOMPO izy, fa nandeha tamin’ny lalan’ny rainy sy tamin’ny fahotany izay nampanotany ny Israely. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ary nikomy taminy i Basa, zanak’i Ahia, avy amin’ny taranak’Isakara, ka namely azy tao Gibetona izay an’ny Filistina, raha i Nadaba sy ny Israely rehetra nanao fahirano an’i Gibetona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Nahafaty azy i Basa tamin’ny taona fahatelo nanjakan’i Asa, mpanjakan’ny Joda ka izy no nanjaka nisolo azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Rehefa nanjaka izy dia namely ny mpianakavin’i Jeroboama rehetra ka tsy nisy navelany ho velona na dia iray akory aza fa naringany avokoa ireo araka ny tenin’NY TOMPO izay nampilazainy an’i Ahia silonita, mpanompony; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: izany dia noho ny fahotana nataon’i Jeroboama sy noho ny nampanotany ny Israely tamin’izay nataony ka nahatezitra NY TOMPO, Andriamanitry ny Israely.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ny tantaran’i Nadaba sisa mbamin’izay rehetra nataony, tsy voasoratra ao amin’ny bokin’ny tantaran’ny mpanjakan’ny Israely va izany? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Niady i Asa sy i Basa, mpanjakan’ny Israely, tamin’ny andro rehetra niainany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: I Basa, mpanjakan’ny Israely
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Tamin’ny taona fahatelo nanjakan’i Asa, mpanjakan’ny Joda, no tonga mpanjakan’ny Israely rehetra tao Tirza i Basa, zanak’i Ahia, ka nanjaka efatra amby roapolo taona izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Nanao izay ratsy teo imason’NY TOMPO izy, fa nandeha tamin’ny lalan’i Jeroboama sy tamin’ny fahotany izay nampanotany ny Israely.
