document_id: 1CO.3
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ireo izay mbola zaza ao amin’i Kristy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Fa izaho, ry rahalahy, dia tsy nahazo niteny taminareo tahaka ny amin’izay araka ny Fanahy fa tahaka ny amin’izay mbola araka ny nofo, dia tahaka izay mbola zaza ihany ao amin’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ronono no nomeko anareo fa tsy ventin-kanina satria tsy mbola natanjaka ianareo; eny, tsy mbola matanjaka aza mandraka ankehitriny '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'fa mbola araka ny nofo ihany ianareo. Fa raha misy fialonana sy fifandirana eo aminareo, tsy araka ny nofo va ianareo ka mandeha araka ny fanaon’ny olona? '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Fa raha hoy ny iray: Izaho dia an’i Paoly, ary ny iray kosa: Izaho dia an’i Apolosy, moa tsy olona ihany va ianareo?'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mpanompon’Andriamanitra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Fa inona moa i Apolosy, ary inona moa i Paoly? Mpanompo ihany izy ireo, izay nahatonga anareo ho mpino, dia samy araka ny nomen’ny Tompo azy avy. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Izaho no namboly, i Apolosy no nanondraka, fa Andriamanitra no nampitombo. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Koa tsinontsinona izay mamboly, na izay manondraka, fa Andriamanitra, izay mampitombo, no tena izy. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Iray ihany ny mpamboly sy ny mpanondraka; nefa samy handray izay valim-pitiany avy araka ny fisasarany izy ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Fa mpiara-miasa amin’Andriamanitra izahay ary sahan’Andriamanitra sy trano arafitr’Andriamanitra ianareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Araka ny fahasoavan’Andriamanitra nomena ahy dia tahaka ny fanaon’ny mpanao mari-trano hendry no nametrahako ny fanorenana, fa olon-kafa no mandrafitra eo amboniny; nefa aoka ny olona rehetra hitandrina izay arafiny eo amboniny. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Fa tsy misy mahay mametraka fanorenana hafa afa-tsy izay efa eo, dia Jesosy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary raha misy mandrafitra volamena, na volafotsy, na vatosoa, na hazo, na bozaka, na mololo, eo ambonin’ny fanorenana, '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'dia haseho avokoa ny asan’ny olona rehetra; fa ny andro no hampiseho azy, satria haseho amin’afo izany andro izany, dia hozahan-toetra amin’ny afo ny asan’ny olona rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Raha maharitra ny asan’ny olona izay narafiny teo amboniny dia handray valim-pitia izy. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Raha levon’ny afo ny asan’ny olona dia ho maty antoka izy; fa ny tenany kosa dia hovonjena, nefa toy ny avy ao amin’ny afo ihany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Tsy fantatrareo va fa tempolin’Andriamanitra ianareo ary ny Fanahin’Andriamanitra no mitoetra ao anatinareo? '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Raha misy manimba ny tempolin’Andriamanitra dia mba hosimban’Andriamanitra kosa izy; fa masina ny tempolin’Andriamanitra, dia ianareo izany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Anareo ny zavatra rehetra, ary ianareo dia an’i Kristy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Aza misy mamita-tena. Raha misy eo aminareo milaza azy ho hendry amin’izao tontolo izao dia aoka ho adala izy mba ho tonga hendry. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Fa ny fahendren’izao tontolo izao dia fahadalana eo anatrehan’Andriamanitra; fa voasoratra hoe: «Ny hafetsen’ny hendry ihany no entiny misambotra azy» (Job 5.13). '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary izao koa: «NY TOMPO mahalala ny fihevitry ny hendry, fa zava-poana izany» (Sal 94.11). '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Koa aoka tsy hisy hanao olona ho reharehany; fa anareo ny zavatra rehetra, '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'na i Paoly, na i Apolosy, na i Kefasy, na izao tontolo izao, na fiainana, na fahafatesana, na ny zavatra ankehitriny, na ny zavatra ho avy. Izany rehetra izany dia anareo; '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'ary ianareo dia an’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ', ary Kristy an’Andriamanitra.'
