document_id: 1CO.3,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ireo izay mbola zaza ao amin’i Kristy
  - type: text
    content: 'Fa izaho, ry rahalahy, dia tsy nahazo niteny taminareo tahaka ny amin’izay araka ny Fanahy fa tahaka ny amin’izay mbola araka ny nofo, dia tahaka izay mbola zaza ihany ao amin’i '
  - type: text
    content: Kristy
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'Araka ny fahasoavan’Andriamanitra nomena ahy dia tahaka ny fanaon’ny mpanao mari-trano hendry no nametrahako ny fanorenana, fa olon-kafa no mandrafitra eo amboniny; nefa aoka ny olona rehetra hitandrina izay arafiny eo amboniny. '
  '11':
  - type: text
    content: 'Fa tsy misy mahay mametraka fanorenana hafa afa-tsy izay efa eo, dia Jesosy '
  - type: text
    content: Kristy
  - type: text
    content: '. '
  '12':
  - type: text
    content: 'Ary raha misy mandrafitra volamena, na volafotsy, na vatosoa, na hazo, na bozaka, na mololo, eo ambonin’ny fanorenana, '
  '13':
  - type: text
    content: 'dia haseho avokoa ny asan’ny olona rehetra; fa ny andro no hampiseho azy, satria haseho amin’afo izany andro izany, dia hozahan-toetra amin’ny afo ny asan’ny olona rehetra. '
  '14':
  - type: text
    content: 'Raha maharitra ny asan’ny olona izay narafiny teo amboniny dia handray valim-pitia izy. '
  '15':
  - type: text
    content: Raha levon’ny afo ny asan’ny olona dia ho maty antoka izy; fa ny tenany kosa dia hovonjena, nefa toy ny avy ao amin’ny afo ihany.
  '16':
  - type: text
    content: 'Tsy fantatrareo va fa tempolin’Andriamanitra ianareo ary ny Fanahin’Andriamanitra no mitoetra ao anatinareo? '
  '17':
  - type: text
    content: Raha misy manimba ny tempolin’Andriamanitra dia mba hosimban’Andriamanitra kosa izy; fa masina ny tempolin’Andriamanitra, dia ianareo izany.
  - type: heading
    content: Anareo ny zavatra rehetra, ary ianareo dia an’i Kristy
  '18':
  - type: text
    content: 'Aza misy mamita-tena. Raha misy eo aminareo milaza azy ho hendry amin’izao tontolo izao dia aoka ho adala izy mba ho tonga hendry. '
  '19':
  - type: text
    content: 'Fa ny fahendren’izao tontolo izao dia fahadalana eo anatrehan’Andriamanitra; fa voasoratra hoe: «Ny hafetsen’ny hendry ihany no entiny misambotra azy» (Job 5.13). '
  '2':
  - type: text
    content: 'Ronono no nomeko anareo fa tsy ventin-kanina satria tsy mbola natanjaka ianareo; eny, tsy mbola matanjaka aza mandraka ankehitriny '
  '20':
  - type: text
    content: 'Ary izao koa: «NY TOMPO mahalala ny fihevitry ny hendry, fa zava-poana izany» (Sal 94.11). '
  '21':
  - type: text
    content: 'Koa aoka tsy hisy hanao olona ho reharehany; fa anareo ny zavatra rehetra, '
  '22':
  - type: text
    content: 'na i Paoly, na i Apolosy, na i Kefasy, na izao tontolo izao, na fiainana, na fahafatesana, na ny zavatra ankehitriny, na ny zavatra ho avy. Izany rehetra izany dia anareo; '
  '23':
  - type: text
    content: 'ary ianareo dia an’i '
  - type: text
    content: Kristy
  - type: text
    content: ', ary Kristy an’Andriamanitra.'
  '3':
  - type: text
    content: 'fa mbola araka ny nofo ihany ianareo. Fa raha misy fialonana sy fifandirana eo aminareo, tsy araka ny nofo va ianareo ka mandeha araka ny fanaon’ny olona? '
  '4':
  - type: text
    content: 'Fa raha hoy ny iray: Izaho dia an’i Paoly, ary ny iray kosa: Izaho dia an’i Apolosy, moa tsy olona ihany va ianareo?'
  - type: heading
    content: Mpanompon’Andriamanitra
  '5':
  - type: text
    content: 'Fa inona moa i Apolosy, ary inona moa i Paoly? Mpanompo ihany izy ireo, izay nahatonga anareo ho mpino, dia samy araka ny nomen’ny Tompo azy avy. '
  '6':
  - type: text
    content: 'Izaho no namboly, i Apolosy no nanondraka, fa Andriamanitra no nampitombo. '
  '7':
  - type: text
    content: 'Koa tsinontsinona izay mamboly, na izay manondraka, fa Andriamanitra, izay mampitombo, no tena izy. '
  '8':
  - type: text
    content: 'Iray ihany ny mpamboly sy ny mpanondraka; nefa samy handray izay valim-pitiany avy araka ny fisasarany izy ireo. '
  '9':
  - type: text
    content: Fa mpiara-miasa amin’Andriamanitra izahay ary sahan’Andriamanitra sy trano arafitr’Andriamanitra ianareo.
