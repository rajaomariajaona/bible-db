document_id: 1CH.5,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny taranak’i Robena
  - type: text
    content: 'Ny zanakalahin’i Robena, lahimatoan’Israely; izy no lahimatoa; saingy tamin’ny nandotoany ny farafaran’ny rainy no nanomezana ny fizokiany ho an’ny zanak’i Josefa, zanak’Israely; nefa tsy voasoratra ho zokiny amin’ny tetiarana ireo; '
  '10':
  - type: text
    content: Tamin’ny andron’i Saoly dia niady tamin’ny Hagarita izy ka naharesy azy; ary nonina an-day nanerana ny ilany atsinanana rehetra amin’i Gileada izy.
  - type: heading
    content: Ny taranak’i Gada
  '11':
  - type: text
    content: 'Nonina tandrifiny, teny amin’ny tany Basana hatrany Saleka ny taranak’i Gada. '
  '12':
  - type: text
    content: 'I Joela no lohany, i Safama no manarakaraka, ary i Janay sy i Safata no tany Basana. '
  '13':
  - type: text
    content: 'Ny rahalahiny araka ny fianakaviany avy dia i Mikaela, i Mesolama, i Seba, i Joray, i Jakana, i Zia ary i Ebera; fito izy ireo. '
  '14':
  - type: text
    content: 'Ireo no zanakalahin’i Abihaila, zanak’i Hory, zanak’i Jaroa, zanak’i Gileada, zanak’i Mikaela, zanak’i Jesisay, zanak’i Jado, zanak’i Boza; '
  '15':
  - type: text
    content: 'i Ahia, zanak’i Abdiela, zanak’i Gonỳ, no lohan’ny fianakaviany. '
  '16':
  - type: text
    content: 'Nonina tany Gileada sy tany Basana ary tany amin’ny vohitra miankina aminy sy tany amin’ny tany rehetra manodidina an’i Saròna ka hatrany an-tsisiny izy ireo. '
  '17':
  - type: text
    content: Ireo rehetra ireo dia nisaina araka ny firazanany tamin’ny andron’i Jotama, mpanjakan’ny Joda, sy tamin’ny andron’i Jeroboama, mpanjakan’ny Israely.
  '18':
  - type: text
    content: 'Ny taranak’i Robena sy ny Gadita ary ny antsasaky ny fokon’i Manase, izay isan’ny lehilahy mahery, mahatana ampinga sy sabatra ary mahahenjana tsipìka sady zatra ny miady, miisa enimpolo sy fitonjato sy efatra arivo sy efatra alina, no azo nalefa hanafika. '
  '19':
  - type: text
    content: 'Niady tamin’ny Hagarita, tamin’i Jetora, tamin’i Nafisy ary tamin’i Nodaba izy ireo. '
  '2':
  - type: text
    content: fa i Joda dia nisandratra ho ambony noho ny rahalahiny ary izy no niavian’ny mpitondra; fa ny fizokiana dia an’i Josefa ihany.
  - type: heading
    content: Gen 46.9; Nom 26.5-6
  '20':
  - type: text
    content: 'Nomban’Andriamanitra izy ireo teo amin’ny ady ka voatolotra teo an-tanany ny Hagarita mbamin’izay rehetra nomba azy, satria nitaraina tamin’Andriamanitra izy ireo nandritra ny ady, koa nekeny ny fangatahany noho ny fahatokiany Azy. '
  '21':
  - type: text
    content: 'Ary nobaboiny ny biby fiompiny, dia rameva dimy alina, ondry aman’osy dimy alina sy roa hetsy, boriky roa arivo ary olona iray hetsy; '
  '22':
  - type: text
    content: maro ny faty niampatrampatra, satria avy tamin’Andriamanitra ny ady. Ary nonina nandimby ireo izy mandra-pahatongan’ny fahababoana.
  - type: heading
    content: Ny taranak’i Manase tany atsinanan’ny Jordana
  '23':
  - type: text
    content: 'Ny taranaky ny antsasaky ny fokon’i Manase dia nonina teo amin’ny tany; ary nihamaro izy ireo ka tonga hatrany Basana ka hatrany Baala-Hermona sy Senira ary hatrany amin’ny tendrombohitra Hermona. '
  '24':
  - type: text
    content: 'Izao no lohan’ny fianakaviany: I Efera, i Jisy, i Eliela, i Azriela, i Jeremia, i Hodavia ary i Jadiela; lehilahy mahery ireo ary malaza sady samy loham-pianakaviany avy.'
  '25':
  - type: text
    content: 'Nivadika tamin’Andriamanitry ny razany anefa izy ireo fa nijangajanga nanaraka ny andriamanitry ny tompon-tany, izay naringan’Andriamanitra tsy ho eo anoloany. '
  '26':
  - type: text
    content: Ary ny Andriamanitry ny Israely nampirisika an’i Pola, mpanjakan’i Asiria, sy i Tiglato-Pilesera, mpanjakan’i Asiria, ka nobaboin’ireo ny Robenita sy ny Gadita ary ny antsasaky ny fokon’i Manase dia noentiny tany Hala, tany Habora, tany Hara ary tany amoron’ny ony Gozana, ambaraka androany.
  - type: heading
    content: 'Ny taranak’i Levy: Ny Mpisoronabe'
  - type: heading
    content: Ampit. Gen 46.11; Nom 26.59-60
  '27':
  - type: text
    content: 'Ny zanakalahin’i Levy dia i Gersona sy i Kehata ary i Merary. '
  '28':
  - type: text
    content: 'Ny zanakalahin’i Kehata dia i Amrama, i Jizara, i Hebrona ary i Oziela. '
  '29':
  - type: text
    content: 'Ny zanak’i Amrama dia i Arona sy i Mosesy ary i Miriama. Ny zanakalahin’i Arona dia i Nadaba, i Abiho, i Eleazara ary Itamara. '
  '3':
  - type: text
    content: Ny zanakalahin’i Robena, lahimatoan’Israely, dia i Hanoka, i Palo, i Hezrona ary i Karmy.
  '30':
  - type: text
    content: 'I Eleazara no niteraka an’i Finehasa; i Finehasa no niteraka an’i Abisoa; '
  '31':
  - type: text
    content: 'i Abisoa no niteraka an’i Bokỳ; i Bokỳ no niteraka an’i Ozy; '
  '32':
  - type: text
    content: 'i Ozy no niteraka an’i Zerahia; i Zerahia no niteraka an’i Meraiota; '
  '33':
  - type: text
    content: 'i Meraiota no niteraka an’i Amaria; i Amaria no niteraka an’i Ahitoba; '
  '34':
  - type: text
    content: 'i Ahitoba no niteraka an’i Zadoka; i Zadoka no niteraka an’i Ahimaza; '
  '35':
  - type: text
    content: 'i Ahimaza no niteraka an’i Azaria; i Azaria no niteraka an’i Johanana; '
  '36':
  - type: text
    content: 'i Johanana no niteraka an’i Azaria, ilay nanao fisoronana tao amin’ny trano nataon’i Solomona tany Jerosalema; '
  '37':
  - type: text
    content: 'i Azaria no niteraka an’i Amaria; i Amaria no niteraka an’i Ahitoba; '
  '38':
  - type: text
    content: 'i Ahitoba no niteraka an’i Zadoka; i Zadoka no niteraka an’i Saloma; '
  '39':
  - type: text
    content: 'i Saloma no niteraka an’i Hilkia; i Hilkia no niteraka an’i Azaria; '
  '4':
  - type: text
    content: 'Ny zanakalahin’i Joela dia i Semaia; i Goga no zanakalahin’i Semaia; i Simey no zanakalahin’i Goga; '
  '40':
  - type: text
    content: 'i Azaria no niteraka an’i Seraia; i Seraia no niteraka an’i Jozadaka. '
  '41':
  - type: text
    content: Lasa nandeha koa i Jozadaka nony voatolotry NY TOMPO ho babon’i Nebokadnezara ny Joda sy Jerosalema.
  '5':
  - type: text
    content: 'i Mika no zanakalahin’i Simey; i Reaia no zanakalahin’i Mika; i Baala no zanakalahin’i Reaia; '
  '6':
  - type: text
    content: 'i Bera no zanakalahin’i Baala, izay nobaboin’i Tiglato-Pilesera, mpanjakan’i Asiria; izy no loham-pirenen’ny Robenita. '
  '7':
  - type: text
    content: 'Ary ny rahalahiny araka ny fianakaviany avy, raha araka ny tetiarana, dia i Jeiela no lohany, ny manarakaraka azy dia i Zakaria '
  '8':
  - type: text
    content: 'ary i Bela, zanak’i Azaza, zanak’i Sema, zanak’i Joela, izay nonina tao Aroera hatrany Nebo sy Baala-Meona. '
  '9':
  - type: text
    content: 'Nonina tany atsinanana hatrany akaikin’ny tany efitra ka hatrany amin’ny ony Eofrata izy; fa nihamaro teny amin’ny tany Gileada ny omby aman’ondriny. '
