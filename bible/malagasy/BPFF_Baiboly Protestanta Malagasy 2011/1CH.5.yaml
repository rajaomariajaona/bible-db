document_id: 1CH.5
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny taranak’i Robena
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ny zanakalahin’i Robena, lahimatoan’Israely; izy no lahimatoa; saingy tamin’ny nandotoany ny farafaran’ny rainy no nanomezana ny fizokiany ho an’ny zanak’i Josefa, zanak’Israely; nefa tsy voasoratra ho zokiny amin’ny tetiarana ireo; '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: fa i Joda dia nisandratra ho ambony noho ny rahalahiny ary izy no niavian’ny mpitondra; fa ny fizokiana dia an’i Josefa ihany.
- type: usfm
  marker: r
  children:
  - type: text
    text: Gen 46.9; Nom 26.5-6
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ny zanakalahin’i Robena, lahimatoan’Israely, dia i Hanoka, i Palo, i Hezrona ary i Karmy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ny zanakalahin’i Joela dia i Semaia; i Goga no zanakalahin’i Semaia; i Simey no zanakalahin’i Goga; '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'i Mika no zanakalahin’i Simey; i Reaia no zanakalahin’i Mika; i Baala no zanakalahin’i Reaia; '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'i Bera no zanakalahin’i Baala, izay nobaboin’i Tiglato-Pilesera, mpanjakan’i Asiria; izy no loham-pirenen’ny Robenita. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary ny rahalahiny araka ny fianakaviany avy, raha araka ny tetiarana, dia i Jeiela no lohany, ny manarakaraka azy dia i Zakaria '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'ary i Bela, zanak’i Azaza, zanak’i Sema, zanak’i Joela, izay nonina tao Aroera hatrany Nebo sy Baala-Meona. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Nonina tany atsinanana hatrany akaikin’ny tany efitra ka hatrany amin’ny ony Eofrata izy; fa nihamaro teny amin’ny tany Gileada ny omby aman’ondriny. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Tamin’ny andron’i Saoly dia niady tamin’ny Hagarita izy ka naharesy azy; ary nonina an-day nanerana ny ilany atsinanana rehetra amin’i Gileada izy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny taranak’i Gada
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Nonina tandrifiny, teny amin’ny tany Basana hatrany Saleka ny taranak’i Gada. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'I Joela no lohany, i Safama no manarakaraka, ary i Janay sy i Safata no tany Basana. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ny rahalahiny araka ny fianakaviany avy dia i Mikaela, i Mesolama, i Seba, i Joray, i Jakana, i Zia ary i Ebera; fito izy ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ireo no zanakalahin’i Abihaila, zanak’i Hory, zanak’i Jaroa, zanak’i Gileada, zanak’i Mikaela, zanak’i Jesisay, zanak’i Jado, zanak’i Boza; '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'i Ahia, zanak’i Abdiela, zanak’i Gonỳ, no lohan’ny fianakaviany. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Nonina tany Gileada sy tany Basana ary tany amin’ny vohitra miankina aminy sy tany amin’ny tany rehetra manodidina an’i Saròna ka hatrany an-tsisiny izy ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ireo rehetra ireo dia nisaina araka ny firazanany tamin’ny andron’i Jotama, mpanjakan’ny Joda, sy tamin’ny andron’i Jeroboama, mpanjakan’ny Israely.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ny taranak’i Robena sy ny Gadita ary ny antsasaky ny fokon’i Manase, izay isan’ny lehilahy mahery, mahatana ampinga sy sabatra ary mahahenjana tsipìka sady zatra ny miady, miisa enimpolo sy fitonjato sy efatra arivo sy efatra alina, no azo nalefa hanafika. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Niady tamin’ny Hagarita, tamin’i Jetora, tamin’i Nafisy ary tamin’i Nodaba izy ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Nomban’Andriamanitra izy ireo teo amin’ny ady ka voatolotra teo an-tanany ny Hagarita mbamin’izay rehetra nomba azy, satria nitaraina tamin’Andriamanitra izy ireo nandritra ny ady, koa nekeny ny fangatahany noho ny fahatokiany Azy. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary nobaboiny ny biby fiompiny, dia rameva dimy alina, ondry aman’osy dimy alina sy roa hetsy, boriky roa arivo ary olona iray hetsy; '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: maro ny faty niampatrampatra, satria avy tamin’Andriamanitra ny ady. Ary nonina nandimby ireo izy mandra-pahatongan’ny fahababoana.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny taranak’i Manase tany atsinanan’ny Jordana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ny taranaky ny antsasaky ny fokon’i Manase dia nonina teo amin’ny tany; ary nihamaro izy ireo ka tonga hatrany Basana ka hatrany Baala-Hermona sy Senira ary hatrany amin’ny tendrombohitra Hermona. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Izao no lohan’ny fianakaviany: I Efera, i Jisy, i Eliela, i Azriela, i Jeremia, i Hodavia ary i Jadiela; lehilahy mahery ireo ary malaza sady samy loham-pianakaviany avy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Nivadika tamin’Andriamanitry ny razany anefa izy ireo fa nijangajanga nanaraka ny andriamanitry ny tompon-tany, izay naringan’Andriamanitra tsy ho eo anoloany. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Ary ny Andriamanitry ny Israely nampirisika an’i Pola, mpanjakan’i Asiria, sy i Tiglato-Pilesera, mpanjakan’i Asiria, ka nobaboin’ireo ny Robenita sy ny Gadita ary ny antsasaky ny fokon’i Manase dia noentiny tany Hala, tany Habora, tany Hara ary tany amoron’ny ony Gozana, ambaraka androany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Ny taranak’i Levy: Ny Mpisoronabe'
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Ampit. Gen 46.11; Nom 26.59-60
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ny zanakalahin’i Levy dia i Gersona sy i Kehata ary i Merary. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ny zanakalahin’i Kehata dia i Amrama, i Jizara, i Hebrona ary i Oziela. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ny zanak’i Amrama dia i Arona sy i Mosesy ary i Miriama. Ny zanakalahin’i Arona dia i Nadaba, i Abiho, i Eleazara ary Itamara. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'I Eleazara no niteraka an’i Finehasa; i Finehasa no niteraka an’i Abisoa; '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'i Abisoa no niteraka an’i Bokỳ; i Bokỳ no niteraka an’i Ozy; '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'i Ozy no niteraka an’i Zerahia; i Zerahia no niteraka an’i Meraiota; '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'i Meraiota no niteraka an’i Amaria; i Amaria no niteraka an’i Ahitoba; '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'i Ahitoba no niteraka an’i Zadoka; i Zadoka no niteraka an’i Ahimaza; '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'i Ahimaza no niteraka an’i Azaria; i Azaria no niteraka an’i Johanana; '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'i Johanana no niteraka an’i Azaria, ilay nanao fisoronana tao amin’ny trano nataon’i Solomona tany Jerosalema; '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'i Azaria no niteraka an’i Amaria; i Amaria no niteraka an’i Ahitoba; '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'i Ahitoba no niteraka an’i Zadoka; i Zadoka no niteraka an’i Saloma; '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'i Saloma no niteraka an’i Hilkia; i Hilkia no niteraka an’i Azaria; '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'i Azaria no niteraka an’i Seraia; i Seraia no niteraka an’i Jozadaka. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: Lasa nandeha koa i Jozadaka nony voatolotry NY TOMPO ho babon’i Nebokadnezara ny Joda sy Jerosalema.
