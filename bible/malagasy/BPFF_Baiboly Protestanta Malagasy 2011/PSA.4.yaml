document_id: PSA.4,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Mahazo valim-bavaka na dia eo anivon’ny fankahalana aza
  - type: text
    content: Ho an’ny mpiventy hira. Hampiarahina amin’ny valiha. Salamo nataon’i Davida.
  - type: text
    content: Mamalia ahy raha miantso aho, ry Andriamanitry ny fahamarinako ô!
  - type: text
    content: Raha tao an-katerena aho dia nohalalahinao toerana.
  - type: text
    content: Mamindrà fo amiko ka henoy ny vavaka ataoko!
  '2':
  - type: text
    content: Ry zanak’olombelona, mandra-pahoviana no handotoanareo ny voninahitro?
  - type: text
    content: Mandra-pahoviana no ho tia zava-poana
  - type: text
    content: 'sy hamoron-dainga ianareo? '
  - type: text
    content: Fiatoana
  '3':
  - type: text
    content: Kanefa aoka ho fantatrareo fa efa navahan’NY TOMPO ho Azy ny tsara fanahy;
  - type: text
    content: NY TOMPO mihaino rehefa miantso Azy aho.
  '4':
  - type: text
    content: Tezera fa aza manota;
  - type: text
    content: mieritrereta eo am-pandriananareo
  - type: text
    content: 'ka aoka hangina. '
  - type: text
    content: Fiatoana
  '5':
  - type: text
    content: Manolora fanatitra amim-pahamarinana
  - type: text
    content: ary matokia NY TOMPO.
  '6':
  - type: text
    content: 'Maro no miteny hoe: Iza no hampiseho amintsika ny fahasambarana?'
  - type: text
    content: Asandrato aminay ny fahazavan’ny tavanao, TOMPO ô!
  '7':
  - type: text
    content: Asianao fifaliana ato am-poko,
  - type: text
    content: mihoatra noho ny tamin’ny taona nahabetsahan’ny variny sy ny ranom-boalobony izany.
  '8':
  - type: text
    content: Handry amin’ny fiadanana aho ka hatory avy hatrany
  - type: text
    content: satria Ianao irery, TOMPO ô, no mampitoetra ahy tsy manana ahiahy.
