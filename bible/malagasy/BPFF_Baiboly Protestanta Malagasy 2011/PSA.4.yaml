document_id: PSA.4
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mahazo valim-bavaka na dia eo anivon’ny fankahalana aza
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: Ho an’ny mpiventy hira. Hampiarahina amin’ny valiha. Salamo nataon’i Davida.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Mamalia ahy raha miantso aho, ry Andriamanitry ny fahamarinako ô!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Raha tao an-katerena aho dia nohalalahinao toerana.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mamindrà fo amiko ka henoy ny vavaka ataoko!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ry zanak’olombelona, mandra-pahoviana no handotoanareo ny voninahitro?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mandra-pahoviana no ho tia zava-poana
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'sy hamoron-dainga ianareo? '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Fiatoana
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Kanefa aoka ho fantatrareo fa efa navahan’NY TOMPO ho Azy ny tsara fanahy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: NY TOMPO mihaino rehefa miantso Azy aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Tezera fa aza manota;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mieritrereta eo am-pandriananareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ka aoka hangina. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Fiatoana
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Manolora fanatitra amim-pahamarinana
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary matokia NY TOMPO.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Maro no miteny hoe: Iza no hampiseho amintsika ny fahasambarana?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Asandrato aminay ny fahazavan’ny tavanao, TOMPO ô!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Asianao fifaliana ato am-poko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mihoatra noho ny tamin’ny taona nahabetsahan’ny variny sy ny ranom-boalobony izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Handry amin’ny fiadanana aho ka hatory avy hatrany
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria Ianao irery, TOMPO ô, no mampitoetra ahy tsy manana ahiahy.
