document_id: ECC.10,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Ny fatin-dalitra dia mahamaimbo sy mampamorivory ny menaky ny mpampiharo zavamanitra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toy izany ny hadalana kely izay mavesatra noho ny fahendrena sy ny voninahitra.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Raha dombo ny fitaovana vy ka tsy asaina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia mila ampiasana hery be;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny fahendrena no mahasoa, satria mahalavorary ny raharaha izany.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Raha manaikitra ny menarana satria tsy nanan-kery ny ody
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia tsy misy ilàna ny mpisikidy mahay mampiasa ny vavany.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny tenin’ny olona tsy ampy saina
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Fahasoavana ny teny aloaky ny vavan’ny hendry,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny molotry ny adala kosa dia mandevona ny tenany.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Ny fiandohan’ny teny aloaky ny vavany dia fahadalana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny fiafaran’ny teniny dia fahaverezan-tsaina mampidi-doza.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Maro teny ny adala.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy misy olombelona mahafantatra izay ho avy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary iza no mahalaza aminy izay ho avy any aorianany?
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Ny fisasaran’ny adala dia mahareraka azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny lalana mankany an-tanàna aza dia tsy fantany akory.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Momba ny mpanjaka
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Lozanao, ry tany, raha tovolahy no mpanjakanao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny lehibenao dia mihinana dieny maraina!
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Sambatra kosa ianao, ry tany, raha olona tena mendri-kaja no mpanjakanao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny lehibenao dia homana amin’izay fotoana mety
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hampatanjaka ny tenany fa tsy ny hampahamamo azy!
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Ny fahalainana no mampianjera ny sakamandimby,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny hakamoan’ny tanana no mampitete ny trano.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Atao ho fialam-boly ny fisakafoanana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny divay no maharavoravo ny aina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny vola no mamaha ny olana rehetra.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Ny fon’ny hendry dia mitondra azy ho amin’izay tsara,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny fon’ny adala kosa dia mitondra azy any amin’izay tsy izy.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Aza manozona ny mpanjaka na dia amin’ny eritreritrao aza
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary aza manozona ny mpanankarena na dia ao anatin’ny efitrano fandrianao aza;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa na dia ny voromanidina aza ange ka hitondra ny feo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary na dia ny manana elatra aza dia hanambara ny teny.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Ary koa, rehefa mandeha eny an-dalambe ny adala dia tonga tsy ampy ny fisainany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka milaza tena amin’ny olona rehetra izy fa adala.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Raha tezeran’ny mpanapaka ianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aza miala amin’ny toeranao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny fahatoniana dia mahasakana fahotana lehibe.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Misy ratsy hitako atỳ ambanin’ny masoandro,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'toa vokatry ny fahadisoana tsy nahy nataon’ny mpanapaka izany:'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Asandratra ho amin’ny toerana ambony indrindra ny adala,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa misy mpanankarena mipetraka amin’ny toerana ambany.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Efa hitako ny mpanompo mitaingin-tsoavaly,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa ny mpanapaka dia mandeha an-tongotra toy ny mpanompo.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny mety hanjo izay mandray andraikitra
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Izay mihady lavaka no ho latsaka ao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary izay mandrava tamboho no hokekerin’ny menarana.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Izay manongotra vato no ho voaratrany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary izay mamaky hazo no ho voany.
