document_id: ECC.10,3103
type_code: plt
verses:
  '1':
  - type: text
    content: Ny fatin-dalitra dia mahamaimbo sy mampamorivory ny menaky ny mpampiharo zavamanitra;
  - type: text
    content: toy izany ny hadalana kely izay mavesatra noho ny fahendrena sy ny voninahitra.
  '10':
  - type: text
    content: Raha dombo ny fitaovana vy ka tsy asaina
  - type: text
    content: dia mila ampiasana hery be;
  - type: text
    content: fa ny fahendrena no mahasoa, satria mahalavorary ny raharaha izany.
  '11':
  - type: text
    content: Raha manaikitra ny menarana satria tsy nanan-kery ny ody
  - type: text
    content: dia tsy misy ilàna ny mpisikidy mahay mampiasa ny vavany.
  - type: heading
    content: Ny tenin’ny olona tsy ampy saina
  '12':
  - type: text
    content: Fahasoavana ny teny aloaky ny vavan’ny hendry,
  - type: text
    content: fa ny molotry ny adala kosa dia mandevona ny tenany.
  '13':
  - type: text
    content: Ny fiandohan’ny teny aloaky ny vavany dia fahadalana,
  - type: text
    content: ary ny fiafaran’ny teniny dia fahaverezan-tsaina mampidi-doza.
  '14':
  - type: text
    content: Maro teny ny adala.
  - type: text
    content: Tsy misy olombelona mahafantatra izay ho avy;
  - type: text
    content: ary iza no mahalaza aminy izay ho avy any aorianany?
  '15':
  - type: text
    content: Ny fisasaran’ny adala dia mahareraka azy
  - type: text
    content: fa ny lalana mankany an-tanàna aza dia tsy fantany akory.
  - type: heading
    content: Momba ny mpanjaka
  '16':
  - type: text
    content: Lozanao, ry tany, raha tovolahy no mpanjakanao,
  - type: text
    content: ary ny lehibenao dia mihinana dieny maraina!
  '17':
  - type: text
    content: Sambatra kosa ianao, ry tany, raha olona tena mendri-kaja no mpanjakanao,
  - type: text
    content: ary ny lehibenao dia homana amin’izay fotoana mety
  - type: text
    content: mba hampatanjaka ny tenany fa tsy ny hampahamamo azy!
  '18':
  - type: text
    content: Ny fahalainana no mampianjera ny sakamandimby,
  - type: text
    content: ary ny hakamoan’ny tanana no mampitete ny trano.
  '19':
  - type: text
    content: Atao ho fialam-boly ny fisakafoanana;
  - type: text
    content: ny divay no maharavoravo ny aina,
  - type: text
    content: ary ny vola no mamaha ny olana rehetra.
  '2':
  - type: text
    content: Ny fon’ny hendry dia mitondra azy ho amin’izay tsara,
  - type: text
    content: fa ny fon’ny adala kosa dia mitondra azy any amin’izay tsy izy.
  '20':
  - type: text
    content: Aza manozona ny mpanjaka na dia amin’ny eritreritrao aza
  - type: text
    content: ary aza manozona ny mpanankarena na dia ao anatin’ny efitrano fandrianao aza;
  - type: text
    content: fa na dia ny voromanidina aza ange ka hitondra ny feo
  - type: text
    content: ary na dia ny manana elatra aza dia hanambara ny teny.
  '3':
  - type: text
    content: Ary koa, rehefa mandeha eny an-dalambe ny adala dia tonga tsy ampy ny fisainany
  - type: text
    content: ka milaza tena amin’ny olona rehetra izy fa adala.
  '4':
  - type: text
    content: Raha tezeran’ny mpanapaka ianao,
  - type: text
    content: aza miala amin’ny toeranao;
  - type: text
    content: fa ny fahatoniana dia mahasakana fahotana lehibe.
  '5':
  - type: text
    content: Misy ratsy hitako atỳ ambanin’ny masoandro,
  - type: text
    content: 'toa vokatry ny fahadisoana tsy nahy nataon’ny mpanapaka izany:'
  '6':
  - type: text
    content: Asandratra ho amin’ny toerana ambony indrindra ny adala,
  - type: text
    content: nefa misy mpanankarena mipetraka amin’ny toerana ambany.
  '7':
  - type: text
    content: Efa hitako ny mpanompo mitaingin-tsoavaly,
  - type: text
    content: nefa ny mpanapaka dia mandeha an-tongotra toy ny mpanompo.
  - type: heading
    content: Ny mety hanjo izay mandray andraikitra
  '8':
  - type: text
    content: Izay mihady lavaka no ho latsaka ao
  - type: text
    content: ary izay mandrava tamboho no hokekerin’ny menarana.
  '9':
  - type: text
    content: Izay manongotra vato no ho voaratrany,
  - type: text
    content: ary izay mamaky hazo no ho voany.
