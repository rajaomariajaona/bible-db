document_id: DEU.11,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tiava NY TOMPO Andriamanitrao ka tandremo mandrakariva izay asainy hotandremana, dia ny lalànany sy ny fitsipiny ary ny didiny.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fahatakarana ny nataon’Andriamanitra tamin’ny Israely
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ny tany izay hidiranao holovana dia tsy mba tahaka ny tany Ejipta, izay nialanareo, izay namafazanao voan-javatra sy nandeman’ny tongotrao rano azy tahaka ny fambolena anana. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ny tany izay halehanareo holovana dia tany be tendrombohitra sy lohasaha sady mifoka rano avy amin’ny ranonoran-danitra, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ary tany izay tandreman’NY TOMPO Andriamanitrao; fa ny mason’NY TOMPO Andriamanitrao dia mitsinjo azy mandrakariva hatramin’ny fiandohan’ny taona ka hatramin’ny fiafarany.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa raha hihaino tsara ny didiko izay andidiako anareo anio ianareo ka ho tia NY TOMPO Andriamanitrareo sy hanompo Azy amin’ny fonareo manontolo sy ny fanahinareo manontolo, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia halatsako eo amin’ny taninareo amin’ny fotoanany ny ranonorana, dia ny lohaorana sy ny faraorana, mba hanangonanao ny varinao sy ny ranom-boalobokao ary ny diloilonao; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary hampaniriako ahitra ho an’ny biby fiompinao ny sahanao, dia hihinan-kanina ianao ka ho voky. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Kanefa mitandrema ianareo, fandrao ho voafitaka ny fonareo ka hivily hanompo andriamanitra hafa sy hiankohoka eo anatrehany; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: fa hirehitra aminareo ny fahatezeran’NY TOMPO ka hanampina ny lanitra Izy, ary tsy hisy ranonorana, sady tsy hahavokatra ny tany; dia ho lany ringana haingana tsy ho eo amin’ny tany soa izay omen’NY TOMPO anareo ianareo.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa alatsaho ao amin’ny fonareo sy ao amin’ny fanahinareo izao teniko izao, fehezo ho famantarana eo amin’ny tananareo, ary aoka ho fehy fampahatsiarovana eo ambonin’ny handrinareo; '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ampianaro ny zanakareo izany ka resaho, na mipetraka ao an-tranonao ianao, na mandeha eny an-dalana, na mandry, na mifoha; '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aoka ho fantatrao anio, fa izaho dia tsy miteny amin’ny zanakareo izay tsy nahalala na nahita ny famaizan’NY TOMPO Andriamanitrareo, ny fahalehibiazany, ny tanany mahery, ny sandriny natsotra, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary soraty eo amin’ny tolam-baravaran’ny tranonao sy eo amin’ny vavahadinao izany; '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: mba ho maro toy ny faharetan’ny lanitra ambonin’ny tany ny andronareo sy ny andron’ny taranakareo eo amin’ny tany izay nianianan’NY TOMPO tamin’ny razanareo homena azy.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa raha mitandrina tsara izao lalàna rehetra izay omeko anareo izao ianareo ka manaraka azy ary ho tia NY TOMPO Andriamanitrareo sy handeha eo amin’ny lalany rehetra ary hifikitra aminy '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia horoahin’NY TOMPO eo anoloanareo ireo firenena rehetra ireo, ary ianareo dia haharesy firenena maro izay lehibe sy mahery noho ianareo. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny tany rehetra izay hodiavin’ny faladian’ny tongotrareo dia ho anareo: Hatreo amin’ny tany efitra sy i Libanona ary hatrany amin’ny ony Eofrata ka hatrany amin’ny ranomasina andrefana no ho faritaninareo. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tsy hisy olona hahajanona eo anoloanareo, fa hataon’NY TOMPO Andriamanitrareo azon’ny tahotra sy horohoro anareo ny tany rehetra izay hodiavinareo, araka izay nolazainy taminareo.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fitahiana na ozona
    marker-yv: yv-h
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Indro aho mametraka fitahiana sy ozona eo anoloanareo anio: '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fitahiana, raha hohenoinareo ny didin’NY TOMPO Andriamanitrareo izay omeko anareo anio; '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: nefa ozona kosa, raha tsy hohenoinareo ny didin’NY TOMPO Andriamanitrareo, fa hivily hiala amin’ny lalana izay asaiko andehananareo anio ianareo ka hanaraka andriamanitra hafa izay tsy fantatrareo.
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa entin’NY TOMPO Andriamanitrao ianao ka tafiditra any amin’ny tany izay alehanao holovana, dia fitahiana no hotononinao eo an-tendrombohitra Gerizima ary fanozonana kosa raha eo an-tendrombohitra Ebala. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ny famantarana nataony, ny asany izay nataony tany Ejipta tamin’i Farao, mpanjakan’ny Ejipta, sy ny taniny rehetra, '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsy any andafin’i Jordana va ireo tendrombohitra ireo, any ankoatra ny lalana andrefana, amin’ny tanin’ny Kananita, izay monina ao amin’ny tany ngazana tandrifin’i Gilgala, eo anilan’ny hazo '
    - type: usfm
      marker: w
      children:
      - type: text
        text: terebintan’i
    - type: text
      text: ' More? '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa efa handeha hita an’i Jordana ianareo ka hiditra sy handova ny tany izay omen’NY TOMPO Andriamanitrareo anareo; handova azy ianareo ka honina ao.
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Koa tandremo ny fanarahanareo ny didy rehetra sy ny fitsipika izay ataoko eo anoloanareo anio.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary izay nataony tamin’ny miaramilan’ny Ejiptiana sy ny soavaliny ary ny kalesiny, dia ny nanasaforany azy tao amin’ny Ranomasina Mena, raha nanenjika anareo izy dia voaringan’NY TOMPO mandraka androany; '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'izay nataony taminareo tany an-tany efitra, hatramin’ny nahatongavanareo teto amin’ity toerana ity; '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'izay nataony tamin’i Datana sy i Abirama, zanak’i Eliaba, zanak’i Robena, teo amin’ny Israely rehetra, dia ilay nisokafan’ny tany sy nitelemany azy mbamin’ny ankohonany sy ny tranolainy ary ny zavamananaina izay nomba azy; '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: fa efa nahita ny asa lehibe rehetra izay nataon’NY TOMPO ny masonareo.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa tandremo ny lalàna rehetra izay omeko anareo anio, mba hahery ianareo, ka hiditra handova ny tany izay efa halehanareo holovana, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ary mba ho maro andro ianareo amin’ny tany izay nianianan’NY TOMPO tamin’ny razanareo homena azy sy ny taranany, dia tany izay tondra-dronono sy tantely.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny firenena izay karakarain’NY TOMPO
    marker-yv: yv-h
