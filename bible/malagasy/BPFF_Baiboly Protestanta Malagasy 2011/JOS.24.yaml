document_id: JOS.24,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nanaovan’ny olona fanekena mafy tany Sekema fa tsy hiala amin’Andriamanitra
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ary nanangona ny fokon’ny Israely rehetra tany Sekema i Josoa ka niantso ny loholon’ny Israely, ny lehibeny, ny mpitsara azy ary ny mpifehy azy, dia niara-niseho teo anatrehan’Andriamanitra izy ireo. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Fa tsy nety nihaino an’i Balama anefa Aho, koa nitahy anareo tokoa izy ary namonjy anareo tamin’ny tanany Aho. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Nita an’i Jordana ianareo ka nankany Jeriko; dia niady taminareo ny mponina tao Jeriko mbamin’ny Amorita, ny Perizita, ny Kananita, ny Hetita, ny Girgasita, ny Hivita ary ny Jebosita, ka natolotro teo an-tananareo ireny. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Dia nampandehaniko teo anoloanareo ny fanenitra izay nandroaka ny mpanjaka roa tamin’ny Amorita teo anoloanareo, fa tsy tamin’ny sabatrao na tamin’ny tsipìkanao. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Ary nomeko tany izay tsy nisasaranareo sy tanàna izay tsy naorinareo ianareo dia nonina tao; ary nihinana ny avy amin’ny tanim-boaloboka sy ny tanin’oliva izay tsy nambolenareo ianareo.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Koa ankehitriny, matahora NY TOMPO ka manompoa Azy amin’ny fahitsiana sy ny fahamarinana; ary ario ny andriamanitra izay notompoin’ny razanareo tany andafin’ny ony Eofrata sy tany Ejipta ka manompoa NY TOMPO. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Nefa raha tsy sitrakareo ny hanompo NY TOMPO dia fidionareo anio ary izay hotompoinareo, na ny andriamanitra izay notompoin’ny razanareo tany andafin’ny ony Eofrata na ny andriamanitry ny Amorita izay mponina teto amin’ny tany onenanareo fa raha izaho sy ny ankohonako kosa dia hanompo NY TOMPO izahay.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Dia namaly ny vahoaka hoe: Sanatria raha hahafoy NY TOMPO izahay ka hanompo izay andriamanitra hafa. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Fa NY TOMPO Andriamanitsika, Izy no nitondra antsika sy ny razantsika nivoaka avy tany amin’ny tany Ejipta, tany amin’ny trano nanandevozana, ary Izy no nanao ireny famantarana lehibe ireny teo imasontsika ka niaro antsika teny amin’ny lalana rehetra nalehantsika sy teny amin’ny firenena rehetra izay notetezintsika. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Ary NY TOMPO nandroaka ny firenena rehetra teo anoloantsika, dia ny Amorita izay nonina teto amin’ny tany; koa izahay koa dia mba hanompo NY TOMPO fa Izy no Andriamanitsika.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Ary hoy i Josoa tamin’ny vahoaka: Tsy mahay manompo NY TOMPO ianareo; fa Andriamanitra masina Izy, Andriamanitra saro-piaro Izy ka tsy hamela ny fahadisoanareo sy ny fahotanareo. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Ary hoy i Josoa tamin’ny vahoaka rehetra: Izao no lazain’NY TOMPO, Andriamanitry ny Israely: Tany andafin’ny ony Eofrata no nonenan’ny razanareo tany aloha, dia i Tera, rain’i Abrahama sy i Nahora; ary nanompo andriamanitra hafa izy. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Raha mahafoy NY TOMPO ianareo ka manompo andriamanitra hafa dia hiverina Izy ka hampahory anareo sy hahafongana anareo rehefa avy nanisy soa anareo.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Dia hoy ny vahoaka tamin’i Josoa: Tsia, fa NY TOMPO ihany no hotompoinay. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Dia hoy i Josoa tamin’ny vahoaka: Vavolombelona ho an’ny tenanareo ianareo fa efa nifidy NY TOMPO hotompoinareo. Ary hoy ny olona: Eny, vavolombelona izahay. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Arionareo ary ankehitriny ny andriamanitra hafa izay eo aminareo ka ampanatony NY TOMPO, Andriamanitry ny Israely, ny fonareo. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Dia hoy ny vahoaka tamin’i Josoa: NY TOMPO Andriamanitray no hotompoinay ary ny feony no hohenoinay.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Ary nanao fanekena tamin’ny vahoaka i Josoa tamin’izany andro izany ka nanome azy lalàna sy didy tany Sekema. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Dia nosoratan’i Josoa tao amin’ny bokin’ny lalànan’Andriamanitra ireo teny ireo, ary naka vato lehibe izy ka nanangana azy teo ambanin’ny hazo '
    - type: usfm
      marker: w
      children:
      - type: text
        text: terebinta
    - type: text
      text: ' izay teo anilan’ny toerana masin’NY TOMPO. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Dia hoy i Josoa tamin’ny vahoaka rehetra: Indro, io vato io no ho vavolombelona amintsika fa efa nahare ny teny rehetra nolazain’NY TOMPO tamintsika io, dia ho vavolombelona aminareo io, fandrao handainga amin’Andriamanitrareo ianareo. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Dia nampodìn’i Josoa samy ho any amin’ny lovany avy ny vahoaka.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nahafatesan’i Josoa
    marker-yv: yv-h
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Ary taorianan’izany zava-nitranga rehetra izany dia maty i Josoa, zanak’i Nona, mpanompon’NY TOMPO, rehefa folo amby zato taona ny androny. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Dia naka an’i Abrahama razanareo avy tany andafin’ny ony Eofrata Aho ka nitondra azy nitety ny tany Kanana rehetra, dia nahamaro ny taranany ka nanome an’Isaka ho zanany. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Dia nalevina tao amin’ny faritanin’ny lovany izy, dia tao Timnata-Sera, any amin’ny tany be havoana any Efraima, avaratry ny tendrombohitra Gaasy. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Ary nanompo NY TOMPO ny Israely tamin’ny andro rehetra niainan’i Josoa sy tamin’ny andro rehetra niainan’ny loholona izay velona taorianan’i Josoa ka nahalala ny asa rehetra izay nataon’NY TOMPO ho an’ny Israely.
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Ary ny taolan’i Josefa izay efa noentin’ny Zanak’Israely avy tany Ejipta dia naleviny tao Sekema tao amin’ny tany izay novidin’i Jakoba volafotsy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.32 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Zahao '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Gen 33.19.
      marker-yv: yv-n
    - type: text
      text: ' zato tamin’ny zanak’i Hamora, rain’i Sekema; dia tonga lovan’ny taranak’i Josefa izany. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Dia maty koa i Eleazara, zanak’i Arona, ka naleviny teo amin’ny havoanan’i Finehasa zanany izay nomena azy tany amin’ny tany be havoana any Efraima.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ary Isaka koa dia nomeko an’i Jakoba sy i Esao ho zanany; ary nomeko ho lovan’i Esao ny tendrombohitra Seìra; fa i Jakoba sy ny taranany kosa dia nankany Ejipta. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Dia naniraka an’i Mosesy sy i Arona Aho ka namely an’i Ejipta, araka izay nataoko teo aminy; ary rehefa afaka izany dia nitondra anareo nivoaka avy tany Aho. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Nony nitondra ny razanareo nivoaka avy tany Ejipta Aho dia tonga teo amin’ny ranomasina ianareo; ary nanenjika ny razanareo hatreo amin’ny Ranomasina Mena ny Ejiptiana, nitaingina kalesy fitondra miady sy soavaly. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Dia nitaraina tamin’NY TOMPO izy ka nasiany haizina teo anelanelanareo sy ny Ejiptiana sady nakatony taminy ny ranomasina ka nasarony azy ary ny masonareo dia nahita izay nataoko tany Ejipta; ary nitoetra ela tany an-tany efitra ianareo. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Nentiko ho any amin’ny tanin’ny Amorita izay nonina tany andafin’i Jordana ianareo; dia niady taminareo ireo; ary nanolotra azy teo an-tananareo Aho mba handovanareo ny taniny ary nandringana azy teo anoloanareo Aho. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Dia nitsangana i Balaka, zanak’i Zipora, mpanjakan’i Moaba, ka niady tamin’ny Israely; dia nandefa iraka haka an’i Balama, zanak’i Beora, izy, hanozona anareo. '
