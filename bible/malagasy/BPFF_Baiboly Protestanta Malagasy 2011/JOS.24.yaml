document_id: JOS.24,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nanaovan’ny olona fanekena mafy tany Sekema fa tsy hiala amin’Andriamanitra
  - type: text
    content: 'Ary nanangona ny fokon’ny Israely rehetra tany Sekema i Josoa ka niantso ny loholon’ny Israely, ny lehibeny, ny mpitsara azy ary ny mpifehy azy, dia niara-niseho teo anatrehan’Andriamanitra izy ireo. '
  '10':
  - type: text
    content: 'Fa tsy nety nihaino an’i Balama anefa Aho, koa nitahy anareo tokoa izy ary namonjy anareo tamin’ny tanany Aho. '
  '11':
  - type: text
    content: 'Nita an’i Jordana ianareo ka nankany Jeriko; dia niady taminareo ny mponina tao Jeriko mbamin’ny Amorita, ny Perizita, ny Kananita, ny Hetita, ny Girgasita, ny Hivita ary ny Jebosita, ka natolotro teo an-tananareo ireny. '
  '12':
  - type: text
    content: 'Dia nampandehaniko teo anoloanareo ny fanenitra izay nandroaka ny mpanjaka roa tamin’ny Amorita teo anoloanareo, fa tsy tamin’ny sabatrao na tamin’ny tsipìkanao. '
  '13':
  - type: text
    content: Ary nomeko tany izay tsy nisasaranareo sy tanàna izay tsy naorinareo ianareo dia nonina tao; ary nihinana ny avy amin’ny tanim-boaloboka sy ny tanin’oliva izay tsy nambolenareo ianareo.
  '14':
  - type: text
    content: 'Koa ankehitriny, matahora NY TOMPO ka manompoa Azy amin’ny fahitsiana sy ny fahamarinana; ary ario ny andriamanitra izay notompoin’ny razanareo tany andafin’ny ony Eofrata sy tany Ejipta ka manompoa NY TOMPO. '
  '15':
  - type: text
    content: Nefa raha tsy sitrakareo ny hanompo NY TOMPO dia fidionareo anio ary izay hotompoinareo, na ny andriamanitra izay notompoin’ny razanareo tany andafin’ny ony Eofrata na ny andriamanitry ny Amorita izay mponina teto amin’ny tany onenanareo fa raha izaho sy ny ankohonako kosa dia hanompo NY TOMPO izahay.
  '16':
  - type: text
    content: 'Dia namaly ny vahoaka hoe: Sanatria raha hahafoy NY TOMPO izahay ka hanompo izay andriamanitra hafa. '
  '17':
  - type: text
    content: 'Fa NY TOMPO Andriamanitsika, Izy no nitondra antsika sy ny razantsika nivoaka avy tany amin’ny tany Ejipta, tany amin’ny trano nanandevozana, ary Izy no nanao ireny famantarana lehibe ireny teo imasontsika ka niaro antsika teny amin’ny lalana rehetra nalehantsika sy teny amin’ny firenena rehetra izay notetezintsika. '
  '18':
  - type: text
    content: Ary NY TOMPO nandroaka ny firenena rehetra teo anoloantsika, dia ny Amorita izay nonina teto amin’ny tany; koa izahay koa dia mba hanompo NY TOMPO fa Izy no Andriamanitsika.
  '19':
  - type: text
    content: 'Ary hoy i Josoa tamin’ny vahoaka: Tsy mahay manompo NY TOMPO ianareo; fa Andriamanitra masina Izy, Andriamanitra saro-piaro Izy ka tsy hamela ny fahadisoanareo sy ny fahotanareo. '
  '2':
  - type: text
    content: 'Ary hoy i Josoa tamin’ny vahoaka rehetra: Izao no lazain’NY TOMPO, Andriamanitry ny Israely: Tany andafin’ny ony Eofrata no nonenan’ny razanareo tany aloha, dia i Tera, rain’i Abrahama sy i Nahora; ary nanompo andriamanitra hafa izy. '
  '20':
  - type: text
    content: Raha mahafoy NY TOMPO ianareo ka manompo andriamanitra hafa dia hiverina Izy ka hampahory anareo sy hahafongana anareo rehefa avy nanisy soa anareo.
  '21':
  - type: text
    content: 'Dia hoy ny vahoaka tamin’i Josoa: Tsia, fa NY TOMPO ihany no hotompoinay. '
  '22':
  - type: text
    content: 'Dia hoy i Josoa tamin’ny vahoaka: Vavolombelona ho an’ny tenanareo ianareo fa efa nifidy NY TOMPO hotompoinareo. Ary hoy ny olona: Eny, vavolombelona izahay. '
  '23':
  - type: text
    content: 'Arionareo ary ankehitriny ny andriamanitra hafa izay eo aminareo ka ampanatony NY TOMPO, Andriamanitry ny Israely, ny fonareo. '
  '24':
  - type: text
    content: 'Dia hoy ny vahoaka tamin’i Josoa: NY TOMPO Andriamanitray no hotompoinay ary ny feony no hohenoinay.'
  '25':
  - type: text
    content: 'Ary nanao fanekena tamin’ny vahoaka i Josoa tamin’izany andro izany ka nanome azy lalàna sy didy tany Sekema. '
  '26':
  - type: text
    content: 'Dia nosoratan’i Josoa tao amin’ny bokin’ny lalànan’Andriamanitra ireo teny ireo, ary naka vato lehibe izy ka nanangana azy teo ambanin’ny hazo '
  - type: text
    content: terebinta
  - type: text
    content: ' izay teo anilan’ny toerana masin’NY TOMPO. '
  '27':
  - type: text
    content: 'Dia hoy i Josoa tamin’ny vahoaka rehetra: Indro, io vato io no ho vavolombelona amintsika fa efa nahare ny teny rehetra nolazain’NY TOMPO tamintsika io, dia ho vavolombelona aminareo io, fandrao handainga amin’Andriamanitrareo ianareo. '
  '28':
  - type: text
    content: Dia nampodìn’i Josoa samy ho any amin’ny lovany avy ny vahoaka.
  - type: heading
    content: Ny nahafatesan’i Josoa
  '29':
  - type: text
    content: 'Ary taorianan’izany zava-nitranga rehetra izany dia maty i Josoa, zanak’i Nona, mpanompon’NY TOMPO, rehefa folo amby zato taona ny androny. '
  '3':
  - type: text
    content: 'Dia naka an’i Abrahama razanareo avy tany andafin’ny ony Eofrata Aho ka nitondra azy nitety ny tany Kanana rehetra, dia nahamaro ny taranany ka nanome an’Isaka ho zanany. '
  '30':
  - type: text
    content: 'Dia nalevina tao amin’ny faritanin’ny lovany izy, dia tao Timnata-Sera, any amin’ny tany be havoana any Efraima, avaratry ny tendrombohitra Gaasy. '
  '31':
  - type: text
    content: Ary nanompo NY TOMPO ny Israely tamin’ny andro rehetra niainan’i Josoa sy tamin’ny andro rehetra niainan’ny loholona izay velona taorianan’i Josoa ka nahalala ny asa rehetra izay nataon’NY TOMPO ho an’ny Israely.
  '32':
  - type: text
    content: Ary ny taolan’i Josefa izay efa noentin’ny Zanak’Israely avy tany Ejipta dia naleviny tao Sekema tao amin’ny tany izay novidin’i Jakoba volafotsy
  - type: note
    content: Zahao Gen 33.19.
  - type: text
    content: ' zato tamin’ny zanak’i Hamora, rain’i Sekema; dia tonga lovan’ny taranak’i Josefa izany. '
  '33':
  - type: text
    content: Dia maty koa i Eleazara, zanak’i Arona, ka naleviny teo amin’ny havoanan’i Finehasa zanany izay nomena azy tany amin’ny tany be havoana any Efraima.
  '4':
  - type: text
    content: 'Ary Isaka koa dia nomeko an’i Jakoba sy i Esao ho zanany; ary nomeko ho lovan’i Esao ny tendrombohitra Seìra; fa i Jakoba sy ny taranany kosa dia nankany Ejipta. '
  '5':
  - type: text
    content: 'Dia naniraka an’i Mosesy sy i Arona Aho ka namely an’i Ejipta, araka izay nataoko teo aminy; ary rehefa afaka izany dia nitondra anareo nivoaka avy tany Aho. '
  '6':
  - type: text
    content: 'Nony nitondra ny razanareo nivoaka avy tany Ejipta Aho dia tonga teo amin’ny ranomasina ianareo; ary nanenjika ny razanareo hatreo amin’ny Ranomasina Mena ny Ejiptiana, nitaingina kalesy fitondra miady sy soavaly. '
  '7':
  - type: text
    content: 'Dia nitaraina tamin’NY TOMPO izy ka nasiany haizina teo anelanelanareo sy ny Ejiptiana sady nakatony taminy ny ranomasina ka nasarony azy ary ny masonareo dia nahita izay nataoko tany Ejipta; ary nitoetra ela tany an-tany efitra ianareo. '
  '8':
  - type: text
    content: 'Nentiko ho any amin’ny tanin’ny Amorita izay nonina tany andafin’i Jordana ianareo; dia niady taminareo ireo; ary nanolotra azy teo an-tananareo Aho mba handovanareo ny taniny ary nandringana azy teo anoloanareo Aho. '
  '9':
  - type: text
    content: 'Dia nitsangana i Balaka, zanak’i Zipora, mpanjakan’i Moaba, ka niady tamin’ny Israely; dia nandefa iraka haka an’i Balama, zanak’i Beora, izy, hanozona anareo. '
