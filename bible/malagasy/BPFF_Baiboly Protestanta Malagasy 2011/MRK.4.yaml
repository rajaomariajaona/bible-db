document_id: MRK.4,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fanoharana ny amin’ny mpamafy
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mat 13.1-9; Lio 8.4-8
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary nampianatra teo amoron’ny ranomasina indray Jesosy. Ary nisy vahoaka betsaka nanatona Azy ka voatery niditra tao amin’ny sambokely iray teo amin’ny ranomasina Izy ka nipetraka tao; ary ny vahoaka rehetra dia teo an-tanety, teo amoron’ny ranomasina.
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa nisintona tsy teo amin’ny vahoaka intsony Izy dia nanontany Azy ny amin’ireo fanoharana ireo ny olona nomba Azy mbamin’ny roa amby folo lahy. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Izy taminy: Ianareo no efa nomena ny zavamiafina ny amin’ny fanjakan’Andriamanitra; fa amin’ireo izay any ivelany kosa ny zavatra rehetra dia atao amin’ny fanoharana'
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba «hijery mandrakariva ihany izy nefa tsy hahita
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary handre mandrakariva ihany izy nefa tsy hahafantatra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fandrao hibebaka izy ka havela ny helony» (Isa 6.9, 10).
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fanazavana ny fanoharana ny amin’ny mpamafy
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mat 13.18-23; Lio 8.11-15
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy koa Izy taminy: Tsy azonareo va ilay fanoharana teo? Koa hataonareo ahoana no fahafantatra ny fanoharana rehetra? '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny mpamafy dia mamafy ny teny. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ireo izay teo amoron-dalana dia ireo izay amafazana ny teny, kanefa rehefa nandre izy dia avy miaraka amin’izay i Satana ka manaisotra ny teny izay nafafy tao aminy. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tahaka izany koa, ireo izay voafafy teny amin’ny toerana be vato dia izay mandre ny teny ka malaky mandray izany amin’ny hafaliana; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'nefa tsy mamahatra lalina ao anatiny ireny fa mihelina vetivety foana; koa raha vao tonga izay fahoriana na fanenjehana noho ny teny dia tafintohina miaraka amin’izay izy. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary misy hafa koa izay voafafy teny amin’ny tsilo, dia ireo no nandre ny teny, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'nefa ny fanahiana ny amin’izao fiainana izao sy ny fitaky ny harena ary ny filana hafa tafiditra ao aminy dia mangeja ny teny ka tsy mamoa izy. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nampianatra azy zavatra maro tamin’ny fanoharana Izy ka nilaza izao fampianarana izao hoe: '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ireto kosa ireo voafafy teny amin’ny tany lonaka, dia izay mandre ny teny ka mandray azy dia mamoa: Ny iray dia manome voa telopolo, ny iray dia enimpolo ary ny iray dia zato.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fanoharana ny amin’ny jiro sy ny vata famarana
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Lio 8.16-18
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy koa Izy tamin’izy ireo: Moa entina va ny jiro mba hosaronana ny vata famarana, na hatao ao ambanin’ny farafara? Tsy hatao eo amin’ny fitoeran-jiro va izy? '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa tsy misy takona izay tsy ho hita na miafina izay tsy haseho. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha misy olona manan-tsofina hoenti-mihaino, aoka izy hihaino! '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy indray Izy tamin’izy ireo: Diniho izay teny renareo. Araka ny ohatra anoharanareo ihany no hanoharana ho anareo, ary homena mihoatra aza ianareo. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa izay manana no homena; ary ny amin’izay tsy manana, na dia izay ananany aza, dia halaina aminy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fanoharana ny amin’ny voa izay maniry ho azy
    marker-yv: yv-h
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy koa Izy: Toy izao ny fanjakan’Andriamanitra: Tahaka ny lehilahy mamafy voa amin’ny tany '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ka na matory izy na mahatsiaro, na alina na andro, ny voa dia mitsimoka ka mitombo ihany, nefa tsy fantany ny faniriny. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ny tany dia manome vokatra ho azy: Voalohany dia misy tahony, avy eo salohiny, ary farany dia salohy feno vary. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary rehefa masaka eny an-tsaha izy dia atao miaraka amin’izay ny fijinjana fa efa tonga ny fararano.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fanoharana ny amin’ny voantsinapy
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mat 13.31-32; Lio 13.18-19
    marker-yv: yv-h
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mihainoa: Indro, niainga ity mpamafy mba hamafy. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Izy: Ahoana no hanoharantsika ny fanjakan’Andriamanitra, ary inona no fanoharana hanoharantsika azy? '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tahaka ny voantsinapy izy, izay kely noho ny voan-javatra rehetra raha vao afafy amin’ny tany; '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: fa rehefa voafafy kosa izy dia maniry ka tonga lehibe noho ny anana rehetra, ary mandrantsana vaventy ka azon’ny voromanidina anorenana ny akaniny sy ialokalofany.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fampianarana amin’ny alalan’ny fanoharana
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mat 13.34-35
    marker-yv: yv-h
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary fanoharana maro toy izany no nanambaràny ny teny tamin’izy ireo, araka izay azony nohenoina. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tsy niteny taminy afa-tsy tamin’ny fanoharana Izy, fa tamin’ny mangingina no nilazany tamin’ny mpianany ny hevitr’ireo rehetra ireo.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nampitsaharan’i Jesosy ny tafio-drivotra
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mat 8.18, 23-27; Lio 8.22-25
    marker-yv: yv-h
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin’io andro io ihany, rehefa hariva ny andro, dia hoy Izy tamin’ireo: Andeha isika ho erỳ ampita. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa nampodin’ny mpianany ny vahoaka dia noentiny tamin’izao tamin’ilay sambokely izay efa nisy azy teo ihany Jesosy. Nisy sambokely hafa koa niaraka taminy. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nisy tafio-drivotra mahery ka nianjerazeran’ny alondrano ny sambokely ary efa ho feno rano. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tao aoriana Jesosy no natory teo ambonin’ny ondana. Dia namoha Azy izy ireo ka niteny Taminy hoe: Mpampianatra ô, tsy mampaninona Anao va izao hahafatesanay izao? '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nifoha Izy ka niteny mafy ny rivotra sady nilaza tamin’ny ranomasina hoe: Mangìna, mitsahara! Dia nitsahatra ny rivotra ka tony tsara ny andro. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha namafy izy dia nisy voa izay latsaka teny amoron-dalana, ary avy ny voromanidina ka nitsaingoka nihinana ireny. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Izy tamin’izy ireo: Nahoana no matahotra ianareo? Tsy mbola manana finoana va ianareo? '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary natahotra indrindra izy ireo ka niresaka hoe: Iza moa Ity, fa samy manaiky Azy, na ny rivotra na ny ranomasina?'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nisy ampahany sasany izay latsaka teny amin’ny toerana be vato izay tsy ampy nofon-tany; nalaky nitsiry ireny satria tsy lalina ny tany. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa rehefa niposaka ny masoandro dia nalazo ireo satria tsy namahatra tsara dia maty. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nisy ampahany hafa indray latsaka teny amin’ny tsilo; ary naniry ny tsilo ka nangeja azy dia tsy namoa izy. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny voa sasany dia latsaka teny amin’ny tany lonaka, koa raha naniry sy namoa ireny dia namokatra: Ny iray dia namokatra telopolo, ny iray dia enimpolo ary ny iray dia zato. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Izy: Izay manan-tsofina hoenti-mihaino, aoka izy hihaino.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny antony nampiasan’i Jesosy ny fanoharana
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mat 13.10-17; Lio 8.9-10
    marker-yv: yv-h
