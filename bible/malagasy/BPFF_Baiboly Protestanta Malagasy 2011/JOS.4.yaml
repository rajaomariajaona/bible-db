document_id: JOS.4,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ireo vato roa amby folo natao ho fahatsiarovana
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Rehefa tafita an’i Jordana avokoa ny olona rehetra dia hoy NY TOMPO tamin’i Josoa: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Nijanona teo afovoan’i Jordana ny mpisorona izay nitondra ny vata misy ny Fanekena, mandra-pahavitan’ny zavatra rehetra izay nandidian’NY TOMPO an’i Josoa holazaina amin’ny olona, araka izay rehetra nandidian’i Mosesy an’i Josoa; avy eo vao nita haingana ny olona. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Rehefa tafita avokoa ny olona rehetra dia nita teo anoloan’ny olona koa ny vata misy ny faneken’NY TOMPO sy ireo mpisorona. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Ary ny taranak’i Robena sy ny taranak’i Gada ary ny antsasaky ny fokon’i Manase dia samy efa voaomana hiady ka nita teo alohan’ny Zanak’Israely koa, araka izay efa nolazain’i Mosesy taminy. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Tokony ho lehilahy efatra alina efa voaomana hiady no nita teo anatrehan’NY TOMPO mba hanafika any amin’ny tany ngazana any Jeriko.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Tamin’izany andro izany no nanandratan’NY TOMPO an’i Josoa teo imason’ny Israely rehetra; dia natahotra azy ny olona, tahaka ny efa natahorany an’i Mosesy, tamin’ny andro rehetra niainany.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Ary hoy NY TOMPO tamin’i Josoa: '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Mandidia ny mpisorona izay mitondra ny vata misy ny Vavolombelona
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.16 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Zahao '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Nom 1.53.
      marker-yv: yv-n
    - type: text
      text: ' mba hiakatra hiala ao Jordana. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Dia nandidy ny mpisorona i Josoa hoe: Miakara hiala ao Jordana ianareo. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Ary rehefa niakatra niala avy tao afovoan’i Jordana ireo mpisorona izay nitondra ny vata misy ny faneken’NY TOMPO ireo ka nanainga ny faladiany ho eo amin’ny tanety dia avy indray ny ranon’i Jordana nankamin’ny fitoerany ka nihoatra ny morony rehetra tahaka ny teo aloha ihany.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Tamin’ny andro fahafolo tamin’ny volana voalohany no niakatra niala teo Jordana ny olona ka nitoby tany Gilgala, teo amin’ny sisintany atsinanan’i Jeriko.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Makà lehilahy roa amby folo amin’ny olona, dia iray avy isam-poko, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Ireo vato roa amby folo nalainy tao Jordana dia natsangan’i Josoa tany Gilgala.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Dia hoy izy tamin’ny Zanak’Israely: Raha manontany ny rainy ny taranakareo any amin’ny andro ho avy hoe: Inona no anton’ireo vato ireo? '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Dia hambaranareo aminy hoe: Tamin’ny tany maina no nitan’ny Israely ity Jordana ity. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Fa nataon’NY TOMPO Andriamanitrareo maina teo anoloanareo ny lalana falehan’ny rano Jordana mandra-pitanareo, dia tahaka ny nataon’NY TOMPO Andriamanitrareo tamin’ny Ranomasina Mena izay nataony maina teo anoloantsika mandra-pitantsika '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: mba ho fantatry ny firenena rehetra ambonin’ny tany fa mahery ny tanan’NY TOMPO ary mba hatahorany mandrakizay NY TOMPO Andriamanitrareo.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'ka mandidia azy hoe: Makà vato roa amby folo avy eo afovoan’i Jordana, eo amin’ilay nijoroan’ny tongotry ny mpisorona, dia ento miaraka aminareo ka apetraho eo amin’izay handrianareo anio alina.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Dia nantsoin’i Josoa ny lehilahy roa amby folo izay nofidiny tamin’ny Zanak’Israely, iray avy isam-poko, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'ary hoy izy taminy: Mandehana eo alohan’ny vata misy NY TOMPO Andriamanitrareo ho eo afovoan’i Jordana, koa samia maka sy milanja vato iray eny an-tsorony ianareo rehetra, araka ny isan’ny fokon’ny Zanak’Israely, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'mba ho famantarana eo aminareo izany. Raha manontany ny zanakareo amin’ny andro ho avy hoe: Inona no anton’ireo vato ireo aminareo? '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Dia holazainareo aminy hoe: Tapaka teo anoloan’ny vata misy ny faneken’NY TOMPO ny ranon’i Jordana; eny, tamin’ny nitan’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: vata misy ny Fanekena
    - type: text
      text: ' an’i Jordana dia tapaka ny rano; ary ho fahatsiarovana mandrakizay ho an’ny Zanak’Israely ireo vato ireo.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Dia nanatanteraka izay nandidian’i Josoa ny Zanak’Israely ka naka vato roa amby folo teo afovoan’i Jordana, araka izay nolazain’NY TOMPO tamin’i Josoa, araka ny isan’ny fokon’ny Zanak’Israely, ka noentiny nita niaraka taminy ho eo amin’izay nitobiany ireo ka napetrany teo. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Vato roa amby folo no natsangan’i Josoa tao Jordana, teo amin’ilay nijoroan’ny tongotry ny mpisorona izay nitondra ny vata misy ny Fanekena ary mbola ao ihany ireny mandraka androany. '
