document_id: EZK.21,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Vaovao ratsy ho an’ny Israely
  - type: text
    content: 'Tonga tamiko ny tenin’NY TOMPO hoe:'
  '10':
  - type: text
    content: Dia ho fantatry ny nofo rehetra fa Izaho TOMPO no nanatsoaka ny sabatro tamin’ny tranony. Tsy hiverina ao intsony izany.
  '11':
  - type: text
    content: 'Ary ianao, ry zanak’olona, midridridridria fa tapaka andilana, eny, midridridridria amin’ny fangidiana eo imasony! '
  '12':
  - type: text
    content: 'Ary raha misy miteny aminao hoe: Nahoana ianao no midridridridry? Dia valio hoe: Misy vaovao tonga. Ho ketraka ny fo rehetra, hiraviravy ny tanana rehetra, hivarahontsana ny fanahy rehetra ary ho tonga rano ny lohalika rehetra. Eny, ho avy izany ka ho tanteraka, hoy NY TOMPO Andriamanitra.'
  - type: heading
    content: Ny sabatra
  '13':
  - type: text
    content: 'Tonga tamiko ny tenin’NY TOMPO hoe:'
  '14':
  - type: text
    content: 'Ry '
  - type: text
    content: zanak’olona
  - type: text
    content: ', maminania! Lazao hoe: Izao no lazain’NY TOMPO:'
  - type: text
    content: Sabatra! Sabatra re!
  - type: text
    content: Voaranitra sady mangirana koa.
  '15':
  - type: text
    content: Voaranitra mba hahafaty be izany,
  - type: text
    content: mangirana ka hanelatselatra izany.
  - type: text
    content: 'Sa isika hifaly hoe:'
  - type: text
    content: Ny tsorakazon’ny zanako no mamingavinga ny hazo rehetra?
  '16':
  - type: text
    content: Natao mangirana izany
  - type: text
    content: mba horaisin-tanana;
  - type: text
    content: voaranitra io sabatra io sady mangirana
  - type: text
    content: mba hatolotra eo an-tanan’ny mpamono.
  '17':
  - type: text
    content: Mitomania sy midradradradrà, ry zanak’olona!
  - type: text
    content: Fa mihatra amin’ny oloko izany,
  - type: text
    content: dia amin’ny lehibe rehetra amin’ny Israely;
  - type: text
    content: lavon’ny sabatra miaraka amin’ny oloko izy.
  - type: text
    content: Koa tehafo ny fenao
  - type: note
    content: 'mitehaka fe: Fihetsika mampiseho alahelo sy fahaketrahana. Zahao Jer 31.19.'
  - type: text
    content: '!'
  '18':
  - type: text
    content: Fizahan-toetra izao! Koa inona no hitranga, raha ilay tehim-panjakana namingavinga iny aza no ho tonga tsinontsinona? hoy NY TOMPO Andriamanitra.
  '19':
  - type: text
    content: Ary ianao, ry zanak’olona, maminania
  - type: text
    content: ka mitehafa tanana!
  - type: text
    content: Aoka hihaloza roa heny, na telo heny aza, ny sabatra!
  - type: text
    content: Dia ny sabatra izay efa nahatrabaka olona;
  - type: text
    content: eny, ny sabatra izay efa nahatrabaka ny lehibe
  - type: text
    content: no manemitra azy.
  '2':
  - type: text
    content: 'Ry '
  - type: text
    content: zanak’olona
  - type: text
    content: ', manatreha ny atsimo ary mitenena manandrify ny atsimo! Maminania ny amin’ny hamelezana ny ala any Negeva! '
  '20':
  - type: text
    content: Nahebihebiko teny amin’ny vavahadiny rehetra ny sabatra
  - type: text
    content: mba hahaketraka ny fo
  - type: text
    content: sy hahatonga fahatafintohinana maro.
  - type: text
    content: Indrisy! Nataoko nanelatselatra izany
  - type: text
    content: sady voatsoaka hamono.
  '21':
  - type: text
    content: Miomàna ka mandrosoa eo ankavanana ianao,
  - type: text
    content: mijoroa ka mandrosoa eo ankavia,
  - type: text
    content: amin’izay voatendry hamelezanao na aiza na aiza!
  '22':
  - type: text
    content: Hiteha-tanana koa Aho
  - type: text
    content: ary hanampatra ny fahatezerako.
  - type: text
    content: Izaho TOMPO no nilaza izany.
  - type: heading
    content: Ny fanafihana sy ny fahazoana an’i Jerosalema aloha
  '23':
  - type: text
    content: 'Tonga tamiko ny tenin’NY TOMPO hoe:'
  '24':
  - type: text
    content: 'Ianao, ry '
  - type: text
    content: zanak’olona
  - type: text
    content: ', manaova lalana roa hiavian’ny sabatry ny mpanjakan’i Babilona; avy amin’ny tany iray no hiavian’izy roa. Manaova famantaran-dalana ka eo an-tsampanan-dalana mankany amin’ny tanàna no anaovanao azy. '
  '25':
  - type: text
    content: 'Manaova lalana hiavian’ny sabatra ho any Raban’ny taranak’i Amona sy ho an’i Joda ao Jerosalema, tanàna mimanda. '
  '26':
  - type: text
    content: 'Fa ny mpanjakan’i Babilona dia mijanona eo amin’ny sampanan-dalana, dia eo an-dohan’ny lalana roa mba hisikidy; manetsiketsika ny zana-tsipìka izy ary manontany amin’ny '
  - type: text
    content: terafima
  - type: text
    content: ' sy mizaha amin’ny atin-kena'
  - type: note
    content: 'mizaha amin’ny atin-kena: fomba fisikidiana taloha: Noheverina fa hita ao amin’ny atin-kena ny zavatra ho avy.'
  - type: text
    content: '. '
  '27':
  - type: text
    content: 'Eo an-tanany havanana ny sikidy izay manondro an’i Jerosalema mba hametrahany lohondry fandravana, hiantsoantsoany hampanao famonoana, hanandratany feo amin’ny akoran’ady, hametrahany lohondry fandravana eo akaikin’ny vavahady, hanandratany tovon-tany sy manda fanafihana. '
  '28':
  - type: text
    content: 'Heverin’ny olona fa sikidy lainga ihany izany satria ireo dia efa nanao fianianana mafy, nefa NY TOMPO no mampahatsiaro ny helony mba hisamborana azy. '
  '29':
  - type: text
    content: 'Koa izao no lazain’NY TOMPO Andriamanitra: Satria ianareo nampahatsiaro ny helokareo tamin’ny nampiharihariana ny fahadisoanareo ka nampiseho ny fahotanareo tamin’izay rehetra nataonareo, noho izany fahatsiarovana ny momba anareo izany dia hosamborina ianareo.'
  '3':
  - type: text
    content: 'Lazao amin’ny ala amin’ny tany atsimo hoe: Henoy ny tenin’NY TOMPO! Izao no lazain’NY TOMPO Andriamanitra: Indro, hampirehitra afo ao aminao Aho, izay handevona ny hazo maitso sy ny hazo maina rehetra ao aminao; tsy hovonoina ny lelafo midedadeda fa ho main’ny afo ny tava rehetra hatrany atsimo ka hatrany avaratra. '
  '30':
  - type: text
    content: 'Ary ianao, ry ilay ratsy fanahy, lozan-tany, dia ilay mpanjakan’ny Israely, izay tapitra andro amin’ny fotoanan’ny heloka tena mahafaty, '
  '31':
  - type: text
    content: 'izao no lazain’NY TOMPO Andriamanitra: Hesorina ny fehiloha, ary halàna ny satroboninahitra. Miova ny zavatra rehetra! Hasandratra ny iva ary haetry ny avo. '
  '32':
  - type: text
    content: Faharavana, faharavana, faharavana! Izany ho hataoko aminy. Efa niova sahady ny zavatra rehetra mandra-pahatongan’izay tena tompon’ny fitsarana ka hatolotro azy izany.
  - type: heading
    content: Avy eo dia ny fanafihana ny Amonita
  '33':
  - type: text
    content: 'Ary ianao, ry '
  - type: text
    content: zanak’olona
  - type: text
    content: ', maminania ka lazao hoe: Izao no lazain’NY TOMPO Andriamanitra: Ny amin’ny taranak’i Amona sy ny latsa ataony dia lazao hoe: Indro sabatra! Sabatra voatsoaka hamono! Mangirana izany ka handringana sy hanelatselatra! '
  '34':
  - type: text
    content: 'Ao anatin’ny fahitana mamitaka sy ny faminaniana mandainga ataonao no handrasàny ny tendanao miaraka amin’ireo ratsy fanahy lozan-tany, izay tapitra andro amin’ny fotoanan’ny heloka tena mahafaty. '
  '35':
  - type: text
    content: 'Avereno ao amin’ny tranony ny sabatrao. Any amin’ny tany namoronana anao, dia any amin’ny tany niavianao no hitsarako anao. '
  '36':
  - type: text
    content: 'Haidiko aminao ny fahavinirako; ny afon’ny fahatezerako no hotsofiko aminao ka hatolotro eo an-tanan’ny olona kentrina izay mpamorona fandringanana ianao, '
  '37':
  - type: text
    content: dia hataina amin’ny afo ianao; hijanona eny amin’ny tany ny ranao; tsy hotsaroana ianao; fa Izaho TOMPO no niteny izany.
  '4':
  - type: text
    content: Ho hitan’ny nofo rehetra fa Izaho TOMPO no nampirehitra io ka tsy ho faty io.
  '5':
  - type: text
    content: 'Dia hoy aho: Indrisy, RY TOMPO Andriamanitra ô! Hoy ny fitenin’ny olona ahy: Tsy oha-teny ihany va no lazain’io?'
  '6':
  - type: text
    content: 'Dia tonga tamiko ny tenin’NY TOMPO hoe:'
  '7':
  - type: text
    content: 'Ry zanak’olona, manandrifia an’i Jerosalema ary mitenena manandrify ny fitoerana masina! Maminania ny amin’ny hamelezana ny tanin’ny Israely! '
  '8':
  - type: text
    content: 'Lazao amin’ny tanin’ny Israely hoe: Izao no lazain’NY TOMPO: Indro, Izaho no mamely anao, ary hotsoahako amin’ny tranony ny sabatro ka haringako ny marina sy ny meloka eo aminao. '
  '9':
  - type: text
    content: 'Satria haringako ny marina sy ny meloka eo aminao, dia izany no itsoahan’ny sabatro amin’ny tranony mba hamely ny nofo rehetra hatrany atsimo ka hatrany avaratra. '
