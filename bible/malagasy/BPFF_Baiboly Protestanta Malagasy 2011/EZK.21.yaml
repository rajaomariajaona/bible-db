document_id: EZK.21,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Vaovao ratsy ho an’ny Israely
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Tonga tamiko ny tenin’NY TOMPO hoe:'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Dia ho fantatry ny nofo rehetra fa Izaho TOMPO no nanatsoaka ny sabatro tamin’ny tranony. Tsy hiverina ao intsony izany.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ary ianao, ry zanak’olona, midridridridria fa tapaka andilana, eny, midridridridria amin’ny fangidiana eo imasony! '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Ary raha misy miteny aminao hoe: Nahoana ianao no midridridridry? Dia valio hoe: Misy vaovao tonga. Ho ketraka ny fo rehetra, hiraviravy ny tanana rehetra, hivarahontsana ny fanahy rehetra ary ho tonga rano ny lohalika rehetra. Eny, ho avy izany ka ho tanteraka, hoy NY TOMPO Andriamanitra.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny sabatra
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Tonga tamiko ny tenin’NY TOMPO hoe:'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Ry '
    - type: usfm
      marker: w
      children:
      - type: text
        text: zanak’olona
    - type: text
      text: ', maminania! Lazao hoe: Izao no lazain’NY TOMPO:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sabatra! Sabatra re!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voaranitra sady mangirana koa.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Voaranitra mba hahafaty be izany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mangirana ka hanelatselatra izany.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Sa isika hifaly hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny tsorakazon’ny zanako no mamingavinga ny hazo rehetra?
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Natao mangirana izany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba horaisin-tanana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: voaranitra io sabatra io sady mangirana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hatolotra eo an-tanan’ny mpamono.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Mitomania sy midradradradrà, ry zanak’olona!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa mihatra amin’ny oloko izany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia amin’ny lehibe rehetra amin’ny Israely;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: lavon’ny sabatra miaraka amin’ny oloko izy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa tehafo ny fenao
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'mitehaka fe: '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Fihetsika mampiseho alahelo sy fahaketrahana. Zahao '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jer 31.19.
      marker-yv: yv-n
    - type: text
      text: '!'
  '18':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Fizahan-toetra izao! Koa inona no hitranga, raha ilay tehim-panjakana namingavinga iny aza no ho tonga tsinontsinona? hoy NY TOMPO Andriamanitra.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Ary ianao, ry zanak’olona, maminania
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka mitehafa tanana!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka hihaloza roa heny, na telo heny aza, ny sabatra!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ny sabatra izay efa nahatrabaka olona;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, ny sabatra izay efa nahatrabaka ny lehibe
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no manemitra azy.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Ry '
    - type: usfm
      marker: w
      children:
      - type: text
        text: zanak’olona
    - type: text
      text: ', manatreha ny atsimo ary mitenena manandrify ny atsimo! Maminania ny amin’ny hamelezana ny ala any Negeva! '
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Nahebihebiko teny amin’ny vavahadiny rehetra ny sabatra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hahaketraka ny fo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy hahatonga fahatafintohinana maro.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indrisy! Nataoko nanelatselatra izany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady voatsoaka hamono.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Miomàna ka mandrosoa eo ankavanana ianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mijoroa ka mandrosoa eo ankavia,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: amin’izay voatendry hamelezanao na aiza na aiza!
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Hiteha-tanana koa Aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hanampatra ny fahatezerako.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izaho TOMPO no nilaza izany.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fanafihana sy ny fahazoana an’i Jerosalema aloha
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Tonga tamiko ny tenin’NY TOMPO hoe:'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Ianao, ry '
    - type: usfm
      marker: w
      children:
      - type: text
        text: zanak’olona
    - type: text
      text: ', manaova lalana roa hiavian’ny sabatry ny mpanjakan’i Babilona; avy amin’ny tany iray no hiavian’izy roa. Manaova famantaran-dalana ka eo an-tsampanan-dalana mankany amin’ny tanàna no anaovanao azy. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Manaova lalana hiavian’ny sabatra ho any Raban’ny taranak’i Amona sy ho an’i Joda ao Jerosalema, tanàna mimanda. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Fa ny mpanjakan’i Babilona dia mijanona eo amin’ny sampanan-dalana, dia eo an-dohan’ny lalana roa mba hisikidy; manetsiketsika ny zana-tsipìka izy ary manontany amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: terafima
    - type: text
      text: ' sy mizaha amin’ny atin-kena'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'mizaha amin’ny atin-kena: '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'fomba fisikidiana taloha: Noheverina fa hita ao amin’ny atin-kena ny zavatra ho avy.'
      marker-yv: yv-n
    - type: text
      text: '. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Eo an-tanany havanana ny sikidy izay manondro an’i Jerosalema mba hametrahany lohondry fandravana, hiantsoantsoany hampanao famonoana, hanandratany feo amin’ny akoran’ady, hametrahany lohondry fandravana eo akaikin’ny vavahady, hanandratany tovon-tany sy manda fanafihana. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Heverin’ny olona fa sikidy lainga ihany izany satria ireo dia efa nanao fianianana mafy, nefa NY TOMPO no mampahatsiaro ny helony mba hisamborana azy. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Koa izao no lazain’NY TOMPO Andriamanitra: Satria ianareo nampahatsiaro ny helokareo tamin’ny nampiharihariana ny fahadisoanareo ka nampiseho ny fahotanareo tamin’izay rehetra nataonareo, noho izany fahatsiarovana ny momba anareo izany dia hosamborina ianareo.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Lazao amin’ny ala amin’ny tany atsimo hoe: Henoy ny tenin’NY TOMPO! Izao no lazain’NY TOMPO Andriamanitra: Indro, hampirehitra afo ao aminao Aho, izay handevona ny hazo maitso sy ny hazo maina rehetra ao aminao; tsy hovonoina ny lelafo midedadeda fa ho main’ny afo ny tava rehetra hatrany atsimo ka hatrany avaratra. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Ary ianao, ry ilay ratsy fanahy, lozan-tany, dia ilay mpanjakan’ny Israely, izay tapitra andro amin’ny fotoanan’ny heloka tena mahafaty, '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'izao no lazain’NY TOMPO Andriamanitra: Hesorina ny fehiloha, ary halàna ny satroboninahitra. Miova ny zavatra rehetra! Hasandratra ny iva ary haetry ny avo. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Faharavana, faharavana, faharavana! Izany ho hataoko aminy. Efa niova sahady ny zavatra rehetra mandra-pahatongan’izay tena tompon’ny fitsarana ka hatolotro azy izany.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Avy eo dia ny fanafihana ny Amonita
    marker-yv: yv-h
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Ary ianao, ry '
    - type: usfm
      marker: w
      children:
      - type: text
        text: zanak’olona
    - type: text
      text: ', maminania ka lazao hoe: Izao no lazain’NY TOMPO Andriamanitra: Ny amin’ny taranak’i Amona sy ny latsa ataony dia lazao hoe: Indro sabatra! Sabatra voatsoaka hamono! Mangirana izany ka handringana sy hanelatselatra! '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Ao anatin’ny fahitana mamitaka sy ny faminaniana mandainga ataonao no handrasàny ny tendanao miaraka amin’ireo ratsy fanahy lozan-tany, izay tapitra andro amin’ny fotoanan’ny heloka tena mahafaty. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Avereno ao amin’ny tranony ny sabatrao. Any amin’ny tany namoronana anao, dia any amin’ny tany niavianao no hitsarako anao. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Haidiko aminao ny fahavinirako; ny afon’ny fahatezerako no hotsofiko aminao ka hatolotro eo an-tanan’ny olona kentrina izay mpamorona fandringanana ianao, '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: dia hataina amin’ny afo ianao; hijanona eny amin’ny tany ny ranao; tsy hotsaroana ianao; fa Izaho TOMPO no niteny izany.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Ho hitan’ny nofo rehetra fa Izaho TOMPO no nampirehitra io ka tsy ho faty io.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Dia hoy aho: Indrisy, RY TOMPO Andriamanitra ô! Hoy ny fitenin’ny olona ahy: Tsy oha-teny ihany va no lazain’io?'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Dia tonga tamiko ny tenin’NY TOMPO hoe:'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ry zanak’olona, manandrifia an’i Jerosalema ary mitenena manandrify ny fitoerana masina! Maminania ny amin’ny hamelezana ny tanin’ny Israely! '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Lazao amin’ny tanin’ny Israely hoe: Izao no lazain’NY TOMPO: Indro, Izaho no mamely anao, ary hotsoahako amin’ny tranony ny sabatro ka haringako ny marina sy ny meloka eo aminao. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Satria haringako ny marina sy ny meloka eo aminao, dia izany no itsoahan’ny sabatro amin’ny tranony mba hamely ny nofo rehetra hatrany atsimo ka hatrany avaratra. '
