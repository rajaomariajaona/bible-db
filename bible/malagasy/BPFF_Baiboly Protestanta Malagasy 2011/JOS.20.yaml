document_id: JOS.20
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny tanàna fialofana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary NY TOMPO niteny tamin’i Josoa hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Lazao amin’ny Zanak’Israely hoe: Fidio ny tanàna fialofana izay nasaiko nolazain’i Mosesy taminareo, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'handosiran’izay nahafaty olona tamin’ny fanahy tsy niniana; koa ho fialofana ho anareo izany mba tsy ho azon’ny mpamaly ra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Raha misy mandositra ho ao amin’ny tanàna iray amin’ireo tanàna ireo ka mijanona eo anoloan’ny vavahady ary mandahatra ny raharahany eo anatrehan’ny loholona amin’izany tanàna izany dia hampidiriny ho ao an-tanàna izy ka homeny toerana mba hitoetra ao aminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary raha manenjika azy ny mpamaly ra dia tsy hanolotra azy ho eo an-tanany izy satria ilay nahafaty olona dia nahafaty tsy nahy ny namany fa tsy nankahala azy teo aloha. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Dia hitoetra ao amin’izany tanàna izany izy mandra-pisehony eo anatrehan’ny fiangonana mba hotsaraina, sy mandra-pahafatin’izay Mpisoronabe amin’izany fotoanandro izany; fa avy eo dia hiverina ilay nahafaty olona ka hody any an-tanànany sy any an-tranony, dia any amin’ny tanàna izay nialany fony izy nandositra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dia nanokana an’i Kadesy any Galilia any amin’ny tany be havoana any Naftaly sy i Sekema any amin’ny tany be havoana any Efraima ary i Kiriata-Arba na i Hebrona any amin’ny tany be havoana any Joda ny Zanak’Israely. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary nifidy an’i Bezera any an-tany efitra amin’ny tany lemaka izay an’ny fokon’i Robena, sy Ramota izay any Gileada, an’ny fokon’i Gada, ary i Golana any Basana, izay an’ny fokon’i Manase, any andafy atsinanan’i Jordana, tandrifin’i Jeriko koa izy ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ireo no tanàna voafidy ho an’ny Zanak’Israely rehetra sy ny vahiny eo aminy handosiran’izay rehetra nahafaty olona tsy nahy mba tsy ho fatin’ny tanan’ny mpamaly ra izy mandra-pisehony eo anatrehan’ny fiangonana.
