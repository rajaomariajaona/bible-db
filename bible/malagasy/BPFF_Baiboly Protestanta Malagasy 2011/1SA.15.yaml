document_id: 1SA.15
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fahadisoana hafa vitan’i Saoly
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Hoy i Samoela tamin’i Saoly: NY TOMPO naniraka ahy hanosotra anao ho mpanjakan’ny Israely olony; koa ankehitriny mihainoa ny tenin’NY TOMPO ianao. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Izao no lazain’Andriamanitra, Tompon’izao rehetra izao: Hovalìko izay nataon’ny Amalekita tamin’ny Israely, dia ny nanakanany azy tany an-dalana, fony izy niakatra avy tany Ejipta. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Koa mandehana ankehitriny ka asio ny Amalekita, ataovy zavatra voaozona izay rehetra mety ho azy, aza asiana miangana fa vonoy avokoa, na lahy na vavy, na ankizy madinika, na zaza minono, na omby, na ondry aman’osy, na rameva, na boriky.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dia namory ny olona i Saoly ka nandamina azy tao Telaima: Roa hetsy ny mandeha an-tongotra ary iray alina kosa ny lehilahin’ny Joda. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia tonga tao an-tanànan’ny Amalekita i Saoly ka nanao vela-pandrika tao an-dohasaha. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary hoy i Saoly tamin’ny Kenita: Andeha miala ianareo ka midìna hiala amin’ny Amalekita, fandrao miaraka aringako aminy ianareo, fa ianareo dia nanisy soa ny Zanak’Israely rehetra, fony izy nivoaka avy tany Ejipta. Dia niala tamin’ny Amalekita ny Kenita.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary i Saoly dia namely ny Amalekita hatrany Havila amin’ny lalana mankany Sora izay tandrifin’i Ejipta. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Azony sambo-belona i Agaga, mpanjakan’ny Amalekita, fa ny vahoaka rehetra kosa dia nataony zavatra voaozona tamin’ny lelan-tsabatra. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Nefa i Saoly sy ny olona dia tsy namono an’i Agaga sy izay tsara indrindra tamin’ny ondry aman’osy, ny omby, ny mifahy, ny zanak’ondry ary izay tsara rehetra, satria tsy foiny hatao zavatra voaozona ireny; ny ratsy rehetra sy izay tsy tiany kosa dia nataony zavatra voaozona avokoa.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nandavan’Andriamanitra an’i Saoly
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary tonga tamin’i Samoela ny tenin’NY TOMPO hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Manenina Aho noho ny nanaovako an’i Saoly ho mpanjaka, fa niala tamin’ny fanarahana Ahy izy ka tsy nanatanteraka ny teniko. Dia tezitra i Samoela ka nitaraina tamin’NY TOMPO nandritra ny alina. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary nifoha vao maraina i Samoela mba hitsena an’i Saoly, fa nisy nilaza tamin’i Samoela hoe: Efa tonga ato Karmela i Saoly. Indro, nanorina fahatsiarovana ho an’ny tenany izy, dia nihodina ka nandroso nidina ho any Gilgala. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dia tonga teo amin’i Saoly i Samoela, ary hoy i Saoly taminy: Hotahìn’NY TOMPO anie ianao; efa nanatanteraka ny tenin’NY TOMPO aho. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Hoy kosa i Samoela: Inona anefa izany fibarareoky ny ondry aman’osy ren’ny sofiko sy ny fitrenan’ny omby reko izany? '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Hoy i Saoly: Avy tany amin’ny Amalekita no nitondrana ireny, fa ny olona dia namela izay ondry aman’osy sy omby tsara indrindra mba hovonoina hatao fanatitra ho an’NY TOMPO Andriamanitrao, fa ny sisa dia nataonay zavatra voaozona avokoa.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Dia hoy i Samoela tamin’i Saoly: Aoka izay, fa hambarako aminao izay nolazain’NY TOMPO tamiko alina. Ary hoy izy taminy: Ambarao ary. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Dia hoy i Samoela: Na dia noheverinao ho kely aza ny tenanao, moa tsy tonga lohan’ny firenen’Israely va? Ary NY TOMPO nanosotra anao ho mpanjakan’ny Israely; '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'dia naniraka anao NY TOMPO ka niteny hoe: Mandehana ka ataovy zavatra voaozona avokoa ny Amalekita mpanota ary miadia aminy ambara-paharingany. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Koa nahoana ianao no tsy nihaino ny feon’NY TOMPO fa nanao ampihimamba tamin’ny babo ary nanao izay ratsy teo imason’NY TOMPO?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Hoy i Saoly tamin’i Samoela: Efa nihaino ny feon’NY TOMPO ihany aho ka nandeha tamin’izay nanirahan’NY TOMPO ahy ary nitondra an’i Agaga, mpanjakan’ny Amalekita, sady nandringana ny Amalekita rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Nefa nakan’ny olona ny ondry aman’osy sy omby tamin’ny babo, dia izay soa avy tamin’ny zavatra hatao zavatra voaozona mba hovonoina hatao fanatitra ho an’NY TOMPO Andriamanitrao ao Gilgala. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Fa hoy i Samoela:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sitraky NY TOMPO va
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny fanatitra dorana manontolo sy ny fanatitra hafa alatsa-dra
- type: usfm
  marker: q1
  children:
  - type: text
    text: mihoatra noho ny mihaino ny feon’NY TOMPO?
- type: usfm
  marker: q1
  children:
  - type: text
    text: E! Ny mankatò no tsara noho ny fanatitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny mihaino no tsara noho ny jaboran’ondrilahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Fa ny fikomiana dia toy ny heloka amin’ny fanaovana sikidy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ary ny ditra dia toy ny manompo sampy sy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: terafima
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: Satria nandà ny tenin’NY TOMPO ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia nolaviny tsy ho mpanjaka.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Hoy i Saoly tamin’i Samoela: Efa nanota aho, satria efa nandika ny tenin’NY TOMPO sy ny teninao; fa natahotra ny vahoaka aho ka nihaino ny feony. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Koa ankehitriny, miangavy anao aho, mamelà ny heloko ary miverena amiko indray mba hiankohofako eo anatrehan’NY TOMPO. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Fa hoy i Samoela tamin’i Saoly: Tsy hiverina aminao aho; fa efa nandà ny tenin’NY TOMPO ianao, ary NY TOMPO kosa efa nandà anao tsy ho mpanjakan’ny Israely intsony. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Nony nihodina handeha i Samoela, dia nohazonin’i Saoly ny sisin’akanjony ka rovitra. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Dia hoy i Samoela tamin’i Saoly: Efa norovitin’NY TOMPO ho afaka aminao androany ny fanjakan’Israely ka nomeny olon-kafa izay tsara noho ianao. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ary izao koa, ny Voninahitr’Israely dia tsy mba handainga na hanenina, fa tsy olona Izy ka hanenina. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Fa hoy i Saoly: Efa nanota aho izao, kanefa mba miangavy anao aho, omeo voninahitra eo anatrehan’ny loholoko sy eo anatrehan’ny Israely aho, koa andeha re hiara-miverina amiko indray mba hiankohofako eo anatrehan’NY TOMPO Andriamanitrao.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Dia niverina nanaraka an’i Saoly indray i Samoela ka niankohoka teo anatrehan’NY TOMPO i Saoly. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Dia hoy i Samoela: Entonareo eto amiko i Agaga, mpanjakan’ny Amalekita. Ary nankeo aminy i Agaga sady falifaly ka niteny hoe: Lasa tokoa ny fangidian’ny fahafatesana. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Fa hoy i Samoela: Toy ny tsy nampananan’ny sabatrao zanaka ny vehivavy no tsy hananan’ny reninao zanaka kosa. Dia notetitetehin’i Samoela teo anatrehan’NY TOMPO tao Gilgala i Agaga.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Dia nankany Rama i Samoela; fa i Saoly kosa dia niakatra tany amin’ny tranony tao Gibean’i Saoly. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Ary tsy namangy an’i Saoly intsony i Samoela ambara-pahafatiny; eny, nalahelo an’i Saoly i Samoela. NY TOMPO kosa nanenina tamin’ny nanaovany an’i Saoly ho mpanjakan’ny Israely.
