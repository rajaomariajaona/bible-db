document_id: 1SA.15,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Fahadisoana hafa vitan’i Saoly
  - type: text
    content: 'Hoy i Samoela tamin’i Saoly: NY TOMPO naniraka ahy hanosotra anao ho mpanjakan’ny Israely olony; koa ankehitriny mihainoa ny tenin’NY TOMPO ianao. '
  '10':
  - type: text
    content: 'Ary tonga tamin’i Samoela ny tenin’NY TOMPO hoe: '
  '11':
  - type: text
    content: 'Manenina Aho noho ny nanaovako an’i Saoly ho mpanjaka, fa niala tamin’ny fanarahana Ahy izy ka tsy nanatanteraka ny teniko. Dia tezitra i Samoela ka nitaraina tamin’NY TOMPO nandritra ny alina. '
  '12':
  - type: text
    content: 'Ary nifoha vao maraina i Samoela mba hitsena an’i Saoly, fa nisy nilaza tamin’i Samoela hoe: Efa tonga ato Karmela i Saoly. Indro, nanorina fahatsiarovana ho an’ny tenany izy, dia nihodina ka nandroso nidina ho any Gilgala. '
  '13':
  - type: text
    content: 'Dia tonga teo amin’i Saoly i Samoela, ary hoy i Saoly taminy: Hotahìn’NY TOMPO anie ianao; efa nanatanteraka ny tenin’NY TOMPO aho. '
  '14':
  - type: text
    content: 'Hoy kosa i Samoela: Inona anefa izany fibarareoky ny ondry aman’osy ren’ny sofiko sy ny fitrenan’ny omby reko izany? '
  '15':
  - type: text
    content: 'Hoy i Saoly: Avy tany amin’ny Amalekita no nitondrana ireny, fa ny olona dia namela izay ondry aman’osy sy omby tsara indrindra mba hovonoina hatao fanatitra ho an’NY TOMPO Andriamanitrao, fa ny sisa dia nataonay zavatra voaozona avokoa.'
  '16':
  - type: text
    content: 'Dia hoy i Samoela tamin’i Saoly: Aoka izay, fa hambarako aminao izay nolazain’NY TOMPO tamiko alina. Ary hoy izy taminy: Ambarao ary. '
  '17':
  - type: text
    content: 'Dia hoy i Samoela: Na dia noheverinao ho kely aza ny tenanao, moa tsy tonga lohan’ny firenen’Israely va? Ary NY TOMPO nanosotra anao ho mpanjakan’ny Israely; '
  '18':
  - type: text
    content: 'dia naniraka anao NY TOMPO ka niteny hoe: Mandehana ka ataovy zavatra voaozona avokoa ny Amalekita mpanota ary miadia aminy ambara-paharingany. '
  '19':
  - type: text
    content: Koa nahoana ianao no tsy nihaino ny feon’NY TOMPO fa nanao ampihimamba tamin’ny babo ary nanao izay ratsy teo imason’NY TOMPO?
  '2':
  - type: text
    content: 'Izao no lazain’Andriamanitra, Tompon’izao rehetra izao: Hovalìko izay nataon’ny Amalekita tamin’ny Israely, dia ny nanakanany azy tany an-dalana, fony izy niakatra avy tany Ejipta. '
  '20':
  - type: text
    content: 'Hoy i Saoly tamin’i Samoela: Efa nihaino ny feon’NY TOMPO ihany aho ka nandeha tamin’izay nanirahan’NY TOMPO ahy ary nitondra an’i Agaga, mpanjakan’ny Amalekita, sady nandringana ny Amalekita rehetra. '
  '21':
  - type: text
    content: 'Nefa nakan’ny olona ny ondry aman’osy sy omby tamin’ny babo, dia izay soa avy tamin’ny zavatra hatao zavatra voaozona mba hovonoina hatao fanatitra ho an’NY TOMPO Andriamanitrao ao Gilgala. '
  '22':
  - type: text
    content: 'Fa hoy i Samoela:'
  - type: text
    content: Sitraky NY TOMPO va
  - type: text
    content: ny fanatitra dorana manontolo sy ny fanatitra hafa alatsa-dra
  - type: text
    content: mihoatra noho ny mihaino ny feon’NY TOMPO?
  - type: text
    content: E! Ny mankatò no tsara noho ny fanatitra,
  - type: text
    content: ny mihaino no tsara noho ny jaboran’ondrilahy.
  '23':
  - type: text
    content: Fa ny fikomiana dia toy ny heloka amin’ny fanaovana sikidy,
  - type: text
    content: 'ary ny ditra dia toy ny manompo sampy sy '
  - type: text
    content: terafima
  - type: text
    content: .
  - type: text
    content: Satria nandà ny tenin’NY TOMPO ianao
  - type: text
    content: dia nolaviny tsy ho mpanjaka.
  '24':
  - type: text
    content: 'Hoy i Saoly tamin’i Samoela: Efa nanota aho, satria efa nandika ny tenin’NY TOMPO sy ny teninao; fa natahotra ny vahoaka aho ka nihaino ny feony. '
  '25':
  - type: text
    content: 'Koa ankehitriny, miangavy anao aho, mamelà ny heloko ary miverena amiko indray mba hiankohofako eo anatrehan’NY TOMPO. '
  '26':
  - type: text
    content: 'Fa hoy i Samoela tamin’i Saoly: Tsy hiverina aminao aho; fa efa nandà ny tenin’NY TOMPO ianao, ary NY TOMPO kosa efa nandà anao tsy ho mpanjakan’ny Israely intsony. '
  '27':
  - type: text
    content: 'Nony nihodina handeha i Samoela, dia nohazonin’i Saoly ny sisin’akanjony ka rovitra. '
  '28':
  - type: text
    content: 'Dia hoy i Samoela tamin’i Saoly: Efa norovitin’NY TOMPO ho afaka aminao androany ny fanjakan’Israely ka nomeny olon-kafa izay tsara noho ianao. '
  '29':
  - type: text
    content: 'Ary izao koa, ny Voninahitr’Israely dia tsy mba handainga na hanenina, fa tsy olona Izy ka hanenina. '
  '3':
  - type: text
    content: Koa mandehana ankehitriny ka asio ny Amalekita, ataovy zavatra voaozona izay rehetra mety ho azy, aza asiana miangana fa vonoy avokoa, na lahy na vavy, na ankizy madinika, na zaza minono, na omby, na ondry aman’osy, na rameva, na boriky.
  '30':
  - type: text
    content: 'Fa hoy i Saoly: Efa nanota aho izao, kanefa mba miangavy anao aho, omeo voninahitra eo anatrehan’ny loholoko sy eo anatrehan’ny Israely aho, koa andeha re hiara-miverina amiko indray mba hiankohofako eo anatrehan’NY TOMPO Andriamanitrao.'
  '31':
  - type: text
    content: 'Dia niverina nanaraka an’i Saoly indray i Samoela ka niankohoka teo anatrehan’NY TOMPO i Saoly. '
  '32':
  - type: text
    content: 'Dia hoy i Samoela: Entonareo eto amiko i Agaga, mpanjakan’ny Amalekita. Ary nankeo aminy i Agaga sady falifaly ka niteny hoe: Lasa tokoa ny fangidian’ny fahafatesana. '
  '33':
  - type: text
    content: 'Fa hoy i Samoela: Toy ny tsy nampananan’ny sabatrao zanaka ny vehivavy no tsy hananan’ny reninao zanaka kosa. Dia notetitetehin’i Samoela teo anatrehan’NY TOMPO tao Gilgala i Agaga.'
  '34':
  - type: text
    content: 'Dia nankany Rama i Samoela; fa i Saoly kosa dia niakatra tany amin’ny tranony tao Gibean’i Saoly. '
  '35':
  - type: text
    content: Ary tsy namangy an’i Saoly intsony i Samoela ambara-pahafatiny; eny, nalahelo an’i Saoly i Samoela. NY TOMPO kosa nanenina tamin’ny nanaovany an’i Saoly ho mpanjakan’ny Israely.
  '4':
  - type: text
    content: 'Dia namory ny olona i Saoly ka nandamina azy tao Telaima: Roa hetsy ny mandeha an-tongotra ary iray alina kosa ny lehilahin’ny Joda. '
  '5':
  - type: text
    content: 'Dia tonga tao an-tanànan’ny Amalekita i Saoly ka nanao vela-pandrika tao an-dohasaha. '
  '6':
  - type: text
    content: 'Ary hoy i Saoly tamin’ny Kenita: Andeha miala ianareo ka midìna hiala amin’ny Amalekita, fandrao miaraka aringako aminy ianareo, fa ianareo dia nanisy soa ny Zanak’Israely rehetra, fony izy nivoaka avy tany Ejipta. Dia niala tamin’ny Amalekita ny Kenita.'
  '7':
  - type: text
    content: 'Ary i Saoly dia namely ny Amalekita hatrany Havila amin’ny lalana mankany Sora izay tandrifin’i Ejipta. '
  '8':
  - type: text
    content: 'Azony sambo-belona i Agaga, mpanjakan’ny Amalekita, fa ny vahoaka rehetra kosa dia nataony zavatra voaozona tamin’ny lelan-tsabatra. '
  '9':
  - type: text
    content: Nefa i Saoly sy ny olona dia tsy namono an’i Agaga sy izay tsara indrindra tamin’ny ondry aman’osy, ny omby, ny mifahy, ny zanak’ondry ary izay tsara rehetra, satria tsy foiny hatao zavatra voaozona ireny; ny ratsy rehetra sy izay tsy tiany kosa dia nataony zavatra voaozona avokoa.
  - type: heading
    content: Ny nandavan’Andriamanitra an’i Saoly
