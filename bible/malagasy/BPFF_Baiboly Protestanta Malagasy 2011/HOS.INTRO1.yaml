type_code: plt
verses:
  '1':
  - type: text
    content: INDRAY MIJERY
  - type: text
    content: I Hosea mpaminany dia isan’ireo antsoina hoe Mpaminany madinika roa amby folo, noho ny bokiny fohy raha ampitahaina amin’ireo atao hoe Mpaminany lehibe, dia Isaia, Jeremia, Ezekiela, Daniela. Ao amin’ny Baibolintsika dia alohan’i Amosa no misy azy, fa ara-potoana dia i Amosa no talohany. Tany amin’ny fanjakana Avaratra no niasan’i Hosea, tamin’ny andron’i Jeroboama II sy mpanjaka 6 hafa nifandimby taorianany. I Hosea no mpaminany farany tany Avaratra, talohan’ny naharavan’i Samaria renivohitra tamin’ny 721 tal JK, vokatry ny fanafihan’ny Asiriana.
  - type: text
    content: Ny votoatin’ny Boky
  - type: text
    content: Nanaitra tokoa ny fomban’ny faminaniana nampanaovin’Andriamanitra an’i Hosea, fa nasainy nanambady vehivavy janga izy. Notanterahiny izany ary niaretany fahoriana maro, kanefa tsy niova hatramin’ny farany ny fitiavany io vadiny io.
  - type: text
    content: Sarin’ny fifandraisan’Andriamanitra amin’ny Israely izay antsoina hoe Jakoba na Efraima, izany. Israely dia fatra-pivadika tamin’Andriamanitra. Nanaraka ny fivavahana tamin’ny Baala, izay nisy ny fijangajangana ho amin’ny fanompoan-tsampy, izy. Niala tamin’ny fitokisany tamin’Andriamanitra izy ka naleony niantehitra tamin’ny Ejipta sy Asiria.
  - type: text
    content: Izany fahotan’ny Israely izany no hitarika ny faharavany tanteraka, kanefa mahatoky Andriamanitra noho ny famindrampony mahagaga. Na dia manafay azy aza Izy dia mandresy kosa ny fitiavany ka mamela heloka Izy amin’ny farany, ary mihavana indray amin’ny Israely izay oharina amin’ny vady malalany.
  - type: text
    content: Ny firafitry ny boky
  - type: text
    content: 'Ny fanambadian’i Hosea sy ny hafatra ambaran’izany: 1–3'
  - type: text
    content: 'Ny fitiavan’Andriamanitra ny Israely sy ny fanamelohany azy: 4–13'
  - type: text
    content: 'Fampanantenana famindrampo raha mibebaka izy: 14'
