document_id: HOS.7,3103
type_code: plt
verses:
  '1':
  - type: text
    content: Raha ta hanasitrana ny Israely Aho
  - type: text
    content: dia miseho ny helok’i Efraima sy ny asa ratsin’i Samaria
  - type: text
    content: satria fatra-mpandainga izy;
  - type: text
    content: miditra ny mpangalatra,
  - type: text
    content: ary mandehandeha eny ivelany ny andian-jiolahy.
  '10':
  - type: text
    content: Ny avonavon’Israely dia vavolombelona manameloka azy
  - type: text
    content: nefa tsy miverina amin’NY TOMPO Andriamaniny ihany izy;
  - type: text
    content: na dia eo aza izany rehetra izany dia tsy mitady Azy izy.
  '11':
  - type: text
    content: Tonga tahaka ny voromailala adaladala tsy manan-tsaina i Efraima;
  - type: text
    content: efa niantso an’i Ejipta izy
  - type: text
    content: ary efa nankany Asiria.
  '12':
  - type: text
    content: Raha vao mandeha izy
  - type: text
    content: dia hovelariko aminy ny fandrika haratoko
  - type: text
    content: ka hazerako ao toy ny voromanidina izy;
  - type: text
    content: hofaiziko izy, araka izay efa nambara tamin’ny fiangonany.
  '13':
  - type: text
    content: Lozan’izy ireo fa nandositra Ahy izy!
  - type: text
    content: Haringana izy satria nikomy tamiko!
  - type: text
    content: Ta hanavotra azy Aho,
  - type: text
    content: kanefa lainga no entiny milaza Ahy.
  '14':
  - type: text
    content: Tsy mitaraina Amiko ao am-pony izy
  - type: text
    content: fa midradradradra foana ao am-pandrianany;
  - type: text
    content: mitangorona hitady vary sy ranom-boaloboka izy
  - type: text
    content: sady mikomy hiala Amiko.
  '15':
  - type: text
    content: Izaho no nampianatra
  - type: text
    content: sy nanatanjaka ny sandriny,
  - type: text
    content: nefa izy kosa dia misaintsain-dratsy Ahy.
  '16':
  - type: text
    content: Miverina ihany izy nefa tsy ho amin’ny Avo;
  - type: text
    content: tonga tahaka ny tsipìka mivaona fandeha izy;
  - type: text
    content: ho lavon-tsabatra ny mpanapaka azy
  - type: text
    content: noho ny firehitry ny lelany.
  - type: text
    content: Izany no ho fandatsana azy any amin’ny tany Ejipta.
  '2':
  - type: text
    content: Tsy mihevitra ao am-pony izy
  - type: text
    content: fa tsaroako ny asa ratsiny rehetra;
  - type: text
    content: ankehitriny dia gejain’ny nataony izy,
  - type: text
    content: ary tonga eo anatrehako izany.
  - type: heading
    content: Teti-dratsy hanohitra ireo mpanjaka
  '3':
  - type: text
    content: Amin’ny asa ratsy ataony no ampifaliany ny mpanjaka
  - type: text
    content: ary amin’ny laingany no ampifaliany ny mpanapaka.
  '4':
  - type: text
    content: Samy mpaka vadin’olona avokoa izy rehetra
  - type: text
    content: ka toy ny fatana voafanan’ny mpanao mofo
  - type: text
    content: izay mitsahatra tsy misorona afo
  - type: text
    content: hatramin’ny ametafetany ny koba ka ambara-pitombony.
  '5':
  - type: text
    content: Tamin’ny andron’ny mpanjakantsika
  - type: text
    content: dia nankarary tena tamin’ny herin’ny divay ny mpanapaka;
  - type: text
    content: nifandray tanana tamin’ny mpaniratsira izy.
  '6':
  - type: text
    content: Fa entin’ireo ho ao amin’ny vela-pandrika ny fony toy ny ho ao amin’ny fatana;
  - type: text
    content: mandritra ny alina dia matory ihany ny mpanao mofo,
  - type: text
    content: ary nony maraina dia toy ny lelafo mirehitra ny fatana.
  '7':
  - type: text
    content: Samy mahamay toy ny fatana izy rehetra
  - type: text
    content: ka mandevona ny mpitsarany;
  - type: text
    content: efa lavo avokoa ny mpanjakany,
  - type: text
    content: ary tsy misy miantso Ahy izy rehetra.
  - type: heading
    content: Ny tsy fahaizan’ny Israely mankasitraka an’Andriamanitra
  '8':
  - type: text
    content: I Efraima dia miharoharo amin’ireo firenena;
  - type: text
    content: I Efraima dia efa tonga toy ny mofo tsy voavadika.
  '9':
  - type: text
    content: Lanin’ny vahiny ny heriny
  - type: text
    content: nefa tsy fantany akory izany.
  - type: text
    content: Eny, efa miha fotsy volo ihany izy
  - type: text
    content: saingy tsy fantany.
