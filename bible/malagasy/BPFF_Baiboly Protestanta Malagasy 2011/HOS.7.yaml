document_id: HOS.7
type_code: plt
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Raha ta hanasitrana ny Israely Aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia miseho ny helok’i Efraima sy ny asa ratsin’i Samaria
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria fatra-mpandainga izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: miditra ny mpangalatra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mandehandeha eny ivelany ny andian-jiolahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Tsy mihevitra ao am-pony izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa tsaroako ny asa ratsiny rehetra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ankehitriny dia gejain’ny nataony izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tonga eo anatrehako izany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Teti-dratsy hanohitra ireo mpanjaka
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Amin’ny asa ratsy ataony no ampifaliany ny mpanjaka
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary amin’ny laingany no ampifaliany ny mpanapaka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Samy mpaka vadin’olona avokoa izy rehetra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka toy ny fatana voafanan’ny mpanao mofo
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay mitsahatra tsy misorona afo
- type: usfm
  marker: q1
  children:
  - type: text
    text: hatramin’ny ametafetany ny koba ka ambara-pitombony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Tamin’ny andron’ny mpanjakantsika
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia nankarary tena tamin’ny herin’ny divay ny mpanapaka;
- type: usfm
  marker: q1
  children:
  - type: text
    text: nifandray tanana tamin’ny mpaniratsira izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Fa entin’ireo ho ao amin’ny vela-pandrika ny fony toy ny ho ao amin’ny fatana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mandritra ny alina dia matory ihany ny mpanao mofo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary nony maraina dia toy ny lelafo mirehitra ny fatana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Samy mahamay toy ny fatana izy rehetra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka mandevona ny mpitsarany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: efa lavo avokoa ny mpanjakany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy misy miantso Ahy izy rehetra.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny tsy fahaizan’ny Israely mankasitraka an’Andriamanitra
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: I Efraima dia miharoharo amin’ireo firenena;
- type: usfm
  marker: q1
  children:
  - type: text
    text: I Efraima dia efa tonga toy ny mofo tsy voavadika.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Lanin’ny vahiny ny heriny
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa tsy fantany akory izany.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, efa miha fotsy volo ihany izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: saingy tsy fantany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ny avonavon’Israely dia vavolombelona manameloka azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa tsy miverina amin’NY TOMPO Andriamaniny ihany izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: na dia eo aza izany rehetra izany dia tsy mitady Azy izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Tonga tahaka ny voromailala adaladala tsy manan-tsaina i Efraima;
- type: usfm
  marker: q1
  children:
  - type: text
    text: efa niantso an’i Ejipta izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary efa nankany Asiria.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Raha vao mandeha izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hovelariko aminy ny fandrika haratoko
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hazerako ao toy ny voromanidina izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hofaiziko izy, araka izay efa nambara tamin’ny fiangonany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Lozan’izy ireo fa nandositra Ahy izy!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Haringana izy satria nikomy tamiko!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ta hanavotra azy Aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: kanefa lainga no entiny milaza Ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Tsy mitaraina Amiko ao am-pony izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa midradradradra foana ao am-pandrianany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mitangorona hitady vary sy ranom-boaloboka izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady mikomy hiala Amiko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Izaho no nampianatra
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy nanatanjaka ny sandriny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa izy kosa dia misaintsain-dratsy Ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Miverina ihany izy nefa tsy ho amin’ny Avo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tonga tahaka ny tsipìka mivaona fandeha izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho lavon-tsabatra ny mpanapaka azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: noho ny firehitry ny lelany.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izany no ho fandatsana azy any amin’ny tany Ejipta.
