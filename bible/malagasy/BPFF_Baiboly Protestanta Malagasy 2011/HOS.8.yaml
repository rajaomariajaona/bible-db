document_id: HOS.8,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Manadino an’Andriamanitra ny Israely na amin’ny fivavahana na amin’ny raharaham-pirenena
  - type: text
    content: Ataovy eo am-bavanao ny anjomara!
  - type: text
    content: Fa hisy toy ny voromahery
  - type: text
    content: hipaoka ny tranon’NY TOMPO
  - type: text
    content: satria efa nivadika ny fanekeko
  - type: text
    content: sy nandika ny lalànako ireo.
  '10':
  - type: text
    content: Nefa na dia nandoa vola tany amin’ny Jentilisa aza izy
  - type: text
    content: dia hovoriko ihany ankehitriny;
  - type: text
    content: ary afaka fotoana fohy dia hijaly izy
  - type: text
    content: noho ny entan’ny mpanjakan’ireo mpanapaka.
  '11':
  - type: text
    content: Nanao alitara maro hanotana i Efraima;
  - type: text
    content: eny, alitara mba hanotany.
  '12':
  - type: text
    content: Na dia soratako ho azy aza ny antsipiriany amin’ny lalànako,
  - type: text
    content: dia ataony ho toy ny avy amin’olon-kafa izany.
  '13':
  - type: text
    content: Mamono zavatra hatao fanatitra ho Ahy izy;
  - type: text
    content: eny, mihinana ny henan’izany,
  - type: text
    content: nefa tsy sitraky NY TOMPO ireo.
  - type: text
    content: Ankehitriny dia hotsarovany ny fahotany,
  - type: text
    content: ary hovaliany ny helony;
  - type: text
    content: eny, hiverina ho any Ejipta izy ireny.
  '14':
  - type: text
    content: Nanadino ny Mpanao azy Israely
  - type: text
    content: ka nanorina lapa mirenty.
  - type: text
    content: I Joda kosa dia nanamaro tanàna mimanda.
  - type: text
    content: Handefasako afo ao an-tanànany
  - type: text
    content: ka holevonin’izany ireo lapa.
  '2':
  - type: text
    content: 'Izaho dia hitarainany hoe:'
  - type: text
    content: Andriamanitro ô! Mahalala Anao izahay Israely!
  '3':
  - type: text
    content: Arian’ny Israely ny soa
  - type: text
    content: ka ny fahavalo no hanenjika azy.
  '4':
  - type: text
    content: Nanangana mpanjaka ireo nefa tsy avy tamiko;
  - type: text
    content: nifidy mpanapaka izy nefa tsy fantatro.
  - type: text
    content: Ny volafotsiny sy ny volamenany
  - type: text
    content: no nataony sampy
  - type: text
    content: mba hamongorana azy!
  '5':
  - type: text
    content: Maharikoriko ny ombilahikelinao, ry Samaria!
  - type: text
    content: Mirehitra aminareo ny fahatezerako.
  - type: text
    content: Mandra-pahoviana no tsy ho zakanareo ny fahadiovana?
  '6':
  - type: text
    content: Fa avy tamin’ny Israely ireny;
  - type: text
    content: mpahay taozavatra no nanao azy ka tsy andriamanitra io!
  - type: text
    content: Ho torotoro ny ombilahikelin’i Samaria.
  '7':
  - type: text
    content: Satria rivotra no nafafiny
  - type: text
    content: dia tadio kosa no hojinjainy;
  - type: text
    content: tsy misy vary mitsangana,
  - type: text
    content: tsy hisy ventiny ny salohiny;
  - type: text
    content: ary raha toa ka hisy aza dia olona hafa firenena no hihinana azy.
  '8':
  - type: text
    content: Voatelina ny Israely!
  - type: text
    content: Ankehitriny dia tonga tahaka ny fanaka tsy misy vidiny izy
  - type: text
    content: 'any amin’ny '
  - type: text
    content: Jentilisa
  - type: text
    content: .
  '9':
  - type: text
    content: Fa niakatra ho any Asiria izy,
  - type: text
    content: toy ny borikidia mandeha irery.
  - type: text
    content: I Efraima dia nandoa vola tamin’ny olon-tiany.
