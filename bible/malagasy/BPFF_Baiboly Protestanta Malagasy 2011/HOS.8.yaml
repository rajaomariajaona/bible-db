document_id: HOS.8
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Manadino an’Andriamanitra ny Israely na amin’ny fivavahana na amin’ny raharaham-pirenena
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ataovy eo am-bavanao ny anjomara!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa hisy toy ny voromahery
- type: usfm
  marker: q1
  children:
  - type: text
    text: hipaoka ny tranon’NY TOMPO
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria efa nivadika ny fanekeko
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy nandika ny lalànako ireo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Izaho dia hitarainany hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Andriamanitro ô! Mahalala Anao izahay Israely!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Arian’ny Israely ny soa
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka ny fahavalo no hanenjika azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Nanangana mpanjaka ireo nefa tsy avy tamiko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: nifidy mpanapaka izy nefa tsy fantatro.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny volafotsiny sy ny volamenany
- type: usfm
  marker: q1
  children:
  - type: text
    text: no nataony sampy
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hamongorana azy!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Maharikoriko ny ombilahikelinao, ry Samaria!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mirehitra aminareo ny fahatezerako.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mandra-pahoviana no tsy ho zakanareo ny fahadiovana?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Fa avy tamin’ny Israely ireny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mpahay taozavatra no nanao azy ka tsy andriamanitra io!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ho torotoro ny ombilahikelin’i Samaria.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Satria rivotra no nafafiny
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia tadio kosa no hojinjainy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy misy vary mitsangana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy hisy ventiny ny salohiny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary raha toa ka hisy aza dia olona hafa firenena no hihinana azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Voatelina ny Israely!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ankehitriny dia tonga tahaka ny fanaka tsy misy vidiny izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'any amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jentilisa
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Fa niakatra ho any Asiria izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: toy ny borikidia mandeha irery.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I Efraima dia nandoa vola tamin’ny olon-tiany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Nefa na dia nandoa vola tany amin’ny Jentilisa aza izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hovoriko ihany ankehitriny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary afaka fotoana fohy dia hijaly izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: noho ny entan’ny mpanjakan’ireo mpanapaka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Nanao alitara maro hanotana i Efraima;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, alitara mba hanotany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Na dia soratako ho azy aza ny antsipiriany amin’ny lalànako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ataony ho toy ny avy amin’olon-kafa izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Mamono zavatra hatao fanatitra ho Ahy izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, mihinana ny henan’izany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa tsy sitraky NY TOMPO ireo.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ankehitriny dia hotsarovany ny fahotany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hovaliany ny helony;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, hiverina ho any Ejipta izy ireny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Nanadino ny Mpanao azy Israely
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka nanorina lapa mirenty.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I Joda kosa dia nanamaro tanàna mimanda.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Handefasako afo ao an-tanànany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka holevonin’izany ireo lapa.
