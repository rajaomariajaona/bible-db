document_id: LEV.25,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny taon-tSabata
  - type: text
    content: 'Ary NY TOMPO niteny tamin’i Mosesy teo an-tendrombohitra Sinay hoe: '
  '10':
  - type: text
    content: 'Ary hamasino ny taona fahadimampolo ka miantsoa fanafahana amin’ny tany ho an’ny mponina rehetra ao aminy; '
  - type: text
    content: Jobily
  - type: text
    content: ' ho anareo izany ka samia mody any amin’ny taninareo sy any amin’ny fokonareo avy ianareo. '
  '11':
  - type: text
    content: 'Jobily ho anareo izany taona fahadimampolo izany: Aza mamafy ianareo, aza mijinja izay maniry ho azy avy tamin’ny voa nihintsana tamin’ny fararano lasa ary aza mioty ny avy tamin’izay tsy nandrantsananareo '
  '12':
  - type: text
    content: fa Jobily izany ka ho masina ho anareo. Izay vokatra alaina any an-tsaha no hohaninareo.
  '13':
  - type: text
    content: 'Amin’izany taon-Jobily izany dia samy hody amin’ny taninareo avy ianareo. '
  '14':
  - type: text
    content: 'Raha mivarotra na mividy zavatra amin’ny mpiray firenena aminareo ianareo dia aza misy mampahory ny rahalahiny. '
  '15':
  - type: text
    content: 'Araka ny isan’ny taona aorianan’ny Jobily no hividiananao amin’ny namanao; ary araka ny isan’ny fararano no hivarotany aminao. '
  '16':
  - type: text
    content: 'Araka ny hamaron’ny taona no hampitomboanao ny vidiny, ary araka ny havitsin’ny taona sisa no hampihenanao ny vidiny; fa araka ny isan’ny fararano no hivarotany aminao. '
  '17':
  - type: text
    content: Aza misy mampahory ny mpiray firenena aminareo ianareo fa matahora an’Andriamanitrao; Izaho no TOMPO Andriamanitrareo.
  '18':
  - type: text
    content: 'Araho ny didiko ka tandremo ny fitsipiko, ary araho izany, dia handry fehizay amin’ny tany ianareo. '
  '19':
  - type: text
    content: 'Ary hanome vokatra ny tany ary hihinana ianareo ka ho voky sady honina am-piadanana eo amin’ny tany. '
  '2':
  - type: text
    content: 'Mitenena amin’ny Zanak’Israely hoe: Rehefa tonga any amin’ny tany izay omeko anareo ianareo, aoka hisy fitsaharana ho an’ny tany, dia '
  - type: text
    content: Sabata
  - type: text
    content: ' ho an’NY TOMPO. '
  '20':
  - type: text
    content: 'Ary fandrao ianareo hiteny hoe: Inona no hohaninay amin’ny taona fahafito satria tsy mamafy izahay na manangona ny vokatray '
  '21':
  - type: text
    content: 'dia hodidiako ho aminareo ny fitahiako amin’ny taona fahenina ka hisy vokatra ampy ho anareo amin’ny telo taona. '
  '22':
  - type: text
    content: Ary hamafy ianareo amin’ny taona fahavalo ka hihinana ny tranainy mandra-pahatonga ny taona fahasivy. Mandra-piakatry ny vokatra vaovao no hihinananareo ny tranainy.
  - type: heading
    content: Ny zo hanavotra
  '23':
  - type: text
    content: 'Tsy hatao varo-maty ny tany satria Ahy ny tany; fa vahiny sy mpivahiny Amiko ianareo. '
  '24':
  - type: text
    content: Ary havelanareo ho azo avotana ny tany eo amin’ny tany rehetra izay lovanareo.
  '25':
  - type: text
    content: 'Raha toa ka mihamahantra ny rahalahinao ka nivarotany ny taniny dia ho avy ny havany akaiky ka hanavotra izay namidin’ny rahalahiny. '
  '26':
  - type: text
    content: 'Raha tsy manan-kavana hanavotra Ralehilahy ka amin’izay tratry ny tanany no ahazoany izay ampy hoenti-manavotra azy '
  '27':
  - type: text
    content: 'dia aoka hanisa ny taona hatramin’ny nivarotany azy izy ary handoa izay mifanentana amin’ny taona sisa ho an’ny lehilahy izay nivarotany azy dia hody amin’ny taniny izy. '
  '28':
  - type: text
    content: 'Fa raha tsy nahatratra izay ampy handoavana izany izy dia mbola hijanona eo an-tanan’ilay nividy azy ihany ny tany izay namidiny mandra-pahatongan’ny taon-Jobily. Ho afaka izany amin’ny '
  - type: text
    content: Jobily
  - type: text
    content: ' ka hody amin’ny taniny Ralehilahy. '
  '29':
  - type: text
    content: 'Raha misy olona mivarotra trano itoerana ao amin’ny tanàna mimanda dia hahazo manavotra azy izy mandra-pahatapitra ny herintaona nivarotany azy; ao anatin’izany no hahazoany manavotra azy. '
  '3':
  - type: text
    content: 'Enina taona no hamafazanao ny taninao, enina taona no handrantsananao ny voalobokao sy hanangonanao ny vokatra avy aminy; '
  '30':
  - type: text
    content: 'Fa raha tsy voaavotra mandra-pahatapitra ny herintaona kosa ilay trano ao amin’ny tanàna mimanda dia tapaka ho varo-maty ho an’izay nividy azy sy ho an’ny taranany izany; tsy ho afaka izany na dia amin’ny Jobily aza. '
  '31':
  - type: text
    content: 'Fa ny trano ao amin’ny vohitra izay tsy misy manda manodidina kosa dia hatao tahaka ny tany ihany; ho azo avotana ihany izany ka ho afaka amin’ny Jobily. '
  '32':
  - type: text
    content: 'Kanefa ny amin’ny tanànan’ny '
  - type: text
    content: levita
  - type: text
    content: ', ny trano ao amin’ny tanàna izay ho anjarany dia ho azon’ny levita avotana ihany na rahoviana na rahoviana. '
  '33':
  - type: text
    content: 'Fa raha misy levita hafa manavotra azy dia ho afaka amin’ny Jobily ny trano izay namidy sy ny tanàna izay anjarany; fa ny trano ao an-tanànan’ny levita dia lovany ao amin’ny Zanak’Israely. '
  '34':
  - type: text
    content: Fa ny tany manodidina ny tanànany kosa dia tsy azo amidy satria ho lovany maharitra izany.
  '35':
  - type: text
    content: 'Raha mihamahantra ny rahalahinao izay miara-monina aminao ka reraka dia tohano izy ka aoka mba ho velona eo aminao tahaka ny vahiny sy ny mpivahiny. '
  '36':
  - type: text
    content: 'Aza maka zana-bola na tombony aminy fa matahora an’Andriamanitrao mba ho velona eo aminao ny rahalahinao. '
  '37':
  - type: text
    content: 'Aza mampanjana-bola aminy, ary aza mampisambotra hanina hahazoana tombony: '
  '38':
  - type: text
    content: Izaho no TOMPO Andriamanitrareo izay nitondra anareo nivoaka avy tany amin’ny tany Ejipta mba hanome anareo ny tany Kanana ka ho Andriamanitrareo Aho.
  '39':
  - type: text
    content: 'Raha mihamahantra ny rahalahinao ka mivarotra ny tenany aminao dia aza asainao manompo anao toy ny andevo izy; '
  '4':
  - type: text
    content: 'fa ny taona fahafito kosa dia ho tena fitsaharana ho an’ny tany, dia Sabata ho an’NY TOMPO; aza mamafy amin’ny taninao ianao ary aza mandrantsana ny voalobokao. '
  '40':
  - type: text
    content: 'fa aoka hitoetra eo aminao tahaka ny mpikarama sy tahaka ny vahiny izy ary mandra-pahatongan’ny taon-Jobily no hiasany ho anao. '
  '41':
  - type: text
    content: 'Dia ho afaka izy sy ny zanany ka hody amin’ny ankohonany sy amin’ny tanindrazany koa. '
  '42':
  - type: text
    content: 'Fa mpanompoko izay nentiko nivoaka avy tany amin’ny tany Ejipta izy ka tsy hamidy tahaka ny andevo. '
  '43':
  - type: text
    content: 'Aza mifehy azy amin-kery fa matahora an’Andriamanitrao. '
  '44':
  - type: text
    content: 'Fa ny amin’izay ho andevolahinao sy andevovavinao dia amin’ny '
  - type: text
    content: Jentilisa
  - type: text
    content: ' izay manodidina anareo no hividiananareo azy. '
  '45':
  - type: text
    content: 'Amin’ny zanaky ny vahiny izay monina eo aminareo sy amin’ny taranany izay haterany eo amin’ny taninareo koa no hividiananareo; dia ho fanananareo ireny. '
  '46':
  - type: text
    content: Ary hataonareo lovan’ny zanakareo mandimby anareo ireny ho fananana holovany ka hampanompoinareo maharitra; fa ny Zanak’Israely rahalahinareo dia aza mba anjakazakana amin-kery.
  '47':
  - type: text
    content: 'Raha tonga manankarena ny vahiny izay monina eo aminao na ny mpivahiny ary ny rahalahinao izay mifandray aminy kosa mihamahantra ka mivarotra ny tenany amin’ny vahiny eo aminao, na amin’ny taranaky ny vahiny '
  '48':
  - type: text
    content: 'na dia nivarotra ny tenany aza izy dia azo avotana indray ka ny iray amin’ny rahalahiny no mahazo manavotra azy; '
  '49':
  - type: text
    content: 'na ny rahalahin-drainy, na ny zanak’olo-mirahalahy aminy, na izay havany akaiky azy amin’ny ankohonany no mahazo manavotra azy kanefa raha tratry ny ananany dia afaka manavotra ny tenany izy. '
  '5':
  - type: text
    content: 'Aza mijinja izay naniry ho azy avy tamin’ny voa nihintsana tamin’ny fararano ary aza mioty ny voaloboka avy tamin’izay tsy nandrantsananao; fa aoka ho taona fitsaharana ho an’ny tany izany. '
  '50':
  - type: text
    content: 'Ary izany dia hisainy amin’izay nividy azy manomboka amin’ny taona nivarotana azy ka hatramin’ny taon-Jobily. Ny vola nivarotany ny tenany kosa dia hifanentana amin’ny isan’ny taona. Toy ny fanisa ny andro niasan’ny mpikarama no hiheverana azy. '
  '51':
  - type: text
    content: 'Raha mbola maro ny taona sisa dia ara-keviny ihany no handoavany ny fanavotana azy avy amin’ny vola vidiny teo aloha. '
  '52':
  - type: text
    content: 'Fa raha vitsy kosa ny taona sisa mandra-pahatongan’ny taon-Jobily dia hanisa izany aminy izy, koa ara-keviny amin’ny taona ihany no handoavany ny vola fanavotana azy. '
  '53':
  - type: text
    content: 'Tahaka izay karamaina isan-taona no hitoerany eo aminy; fa aza avelanao hampijaliana eo imasonao izy. '
  '54':
  - type: text
    content: Raha tsy voavotra amin’izany izy dia ho afaka amin’ny taon-Jobily izy sy ireo zanany.
  - type: heading
    content: Izaho no TOMPO Andriamanitrareo
  '55':
  - type: text
    content: Fa mpanompoko ny Zanak’Israely, dia mpanompoko izay nentiko nivoaka avy tany amin’ny tany Ejipta. Izaho no TOMPO Andriamanitrareo.
  '6':
  - type: text
    content: 'Ary izay maniry ho azy amin’ny Sabatan’ny tany no ho sakafo ho anao, ho an’ny mpanompolahinao sy ny mpanompovavinao, ho an’ny mpikarama sy ny vahiny eo aminao '
  '7':
  - type: text
    content: ary ho an’ny biby fiompinao sy ny bibidia izay eo amin’ny taninao; izay vokatra rehetra eo no ho sakafo.
  - type: heading
    content: Ny taon-Jobily
  '8':
  - type: text
    content: 'Manisà taon-tSabata fito ho anao, fito taona impito, koa ny hanisanao ny andron’ireo taon-tSabata fito ireo dia sivy amby efapolo taona. '
  '9':
  - type: text
    content: 'Dia mitsofa anjomara avo feo amin’ny andro fahafolo amin’ny volana fahafito; amin’ny Andro Fanavotana Lehibe no hitsofanareo anjomara manerana ny taninareo. '
