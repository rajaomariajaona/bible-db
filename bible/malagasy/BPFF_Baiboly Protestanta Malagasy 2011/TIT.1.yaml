document_id: TIT.1,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Fiarahabana
  - type: text
    content: 'I Paoly, mpanompon’Andriamanitra sy apostolin’i Jesosy '
  - type: text
    content: Kristy
  - type: text
    content: ', mba hampandroso ny finoan’ny olom-boafidin’Andriamanitra sy ny fahalalana tsara ny marina izay mifanaraka amin’ny fahatahorana an’Andriamanitra, '
  '10':
  - type: text
    content: 'Fa maro no maditra, mpiteniteny foana sy mpamitaka, indrindra fa ny avy amin’ny voafora; '
  '11':
  - type: text
    content: 'tsy maintsy hotampenam-bava ireo fa mampivadika fianakaviana maro sady mampianatra izay tsy mety mba hahazoany harena maloto. '
  '12':
  - type: text
    content: 'Hoy ny iray amin’ireny izay mpaminany teo aminy:'
  - type: text
    content: Mpandainga mandrakariva ny Kretana,
  - type: text
    content: biby masiaka,
  - type: text
    content: kamo be tenda.
  '13':
  - type: text
    content: 'Marina ireo teny vavolombelona ireo. Noho izany dia anaro mafy izy mba hatanjaka amin’ny finoana '
  '14':
  - type: text
    content: 'ka tsy hitandrina ny anganonganon’ny '
  - type: text
    content: Jiosy
  - type: text
    content: ' sy ny didin’ny olona izay mivily miala amin’ny fahamarinana.'
  '15':
  - type: text
    content: 'Madio avokoa ny zavatra rehetra amin’ny olona madio; fa amin’ny olona voaloto sady tsy mino kosa dia tsy misy madio na inona na inona; fa samy voaloto na ny sainy na ny fieritreretany. '
  '16':
  - type: text
    content: Manaiky fa mahalala an’Andriamanitra izy ireny nefa mandà Azy amin’ny asany. Olona tsy maha te ho tia sady mpikomy ary tsy mahavita asa tsara na dia iray aza izy ireny.
  '2':
  - type: text
    content: 'amin’ny fanantenana ny fiainana mandrakizay izay nampanantenain’Andriamanitra tsy mahay mandainga hatry ny fony fahagola; '
  '3':
  - type: text
    content: 'fa tamin’izay andro voatendry dia nasehony tamin’ny toriteny izay natolotra ho adidiko ny teniny, araka ny didin’Andriamanitra, Mpamonjy antsika; '
  '4':
  - type: text
    content: 'ho an’i Titosy, tena zanako araka ny finoana iombonantsika: Ho aminao anie ny fahasoavana sy fiadanana avy amin’Andriamanitra Ray sy Kristy Jesosy, Mpamonjy antsika.'
  - type: heading
    content: Ny amin’ny loholona
  '5':
  - type: text
    content: Izao no namelako anao tany Kreta dia ny handaminanao izay mbola tsy tanteraka, ary hanendrenao loholona
  - type: note
    content: 'Na: presbytera.'
  - type: text
    content: ' amin’ny isan-tanàna, araka izay nandidiako anao: '
  '6':
  - type: text
    content: 'Ho olona tsy manan-tsiny ny loholona, dia lehilahy manambady tokana, manana zanaka mino izay tsy mba ampangaina ho mpanaram-po amin’ny ratsy na ho maditra. '
  '7':
  - type: text
    content: Fa ny mpitondra fiangonana
  - type: note
    content: 'Na: eveka.'
  - type: text
    content: ' dia tokony ho tsy manan-tsiny, tahaka ny mpitandrina ny an’Andriamanitra izy, tsy mitompo teny fantatra, tsy mora tezitra, tsy mpimamo liana ady, tsy mpikapoka, tsy tia harena maloto; '
  '8':
  - type: text
    content: 'fa mampiantrano vahiny, tia ny tsara, mahonon-tena, marina, masina, mahafehy tena, '
  '9':
  - type: text
    content: mitana mafy ny teny marina araka ny efa nampianarina mba hahaizany hananatra amin’ny fampianarana tsy misy kilema sady handresy lahatra ny mpanohitra.
  - type: heading
    content: Ireo mpampiely ny fampianaran-diso
