document_id: TIT.1,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fiarahabana
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I Paoly, mpanompon’Andriamanitra sy apostolin’i Jesosy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ', mba hampandroso ny finoan’ny olom-boafidin’Andriamanitra sy ny fahalalana tsara ny marina izay mifanaraka amin’ny fahatahorana an’Andriamanitra, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa maro no maditra, mpiteniteny foana sy mpamitaka, indrindra fa ny avy amin’ny voafora; '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'tsy maintsy hotampenam-bava ireo fa mampivadika fianakaviana maro sady mampianatra izay tsy mety mba hahazoany harena maloto. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy ny iray amin’ireny izay mpaminany teo aminy:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mpandainga mandrakariva ny Kretana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: biby masiaka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: kamo be tenda.
  '13':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Marina ireo teny vavolombelona ireo. Noho izany dia anaro mafy izy mba hatanjaka amin’ny finoana '
  '14':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'ka tsy hitandrina ny anganonganon’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jiosy
    - type: text
      text: ' sy ny didin’ny olona izay mivily miala amin’ny fahamarinana.'
  '15':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Madio avokoa ny zavatra rehetra amin’ny olona madio; fa amin’ny olona voaloto sady tsy mino kosa dia tsy misy madio na inona na inona; fa samy voaloto na ny sainy na ny fieritreretany. '
  '16':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Manaiky fa mahalala an’Andriamanitra izy ireny nefa mandà Azy amin’ny asany. Olona tsy maha te ho tia sady mpikomy ary tsy mahavita asa tsara na dia iray aza izy ireny.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'amin’ny fanantenana ny fiainana mandrakizay izay nampanantenain’Andriamanitra tsy mahay mandainga hatry ny fony fahagola; '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fa tamin’izay andro voatendry dia nasehony tamin’ny toriteny izay natolotra ho adidiko ny teniny, araka ny didin’Andriamanitra, Mpamonjy antsika; '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ho an’i Titosy, tena zanako araka ny finoana iombonantsika: Ho aminao anie ny fahasoavana sy fiadanana avy amin’Andriamanitra Ray sy Kristy Jesosy, Mpamonjy antsika.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny amin’ny loholona
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izao no namelako anao tany Kreta dia ny handaminanao izay mbola tsy tanteraka, ary hanendrenao loholona
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.5 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: presbytera.
      marker-yv: yv-n
    - type: text
      text: ' amin’ny isan-tanàna, araka izay nandidiako anao: '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ho olona tsy manan-tsiny ny loholona, dia lehilahy manambady tokana, manana zanaka mino izay tsy mba ampangaina ho mpanaram-po amin’ny ratsy na ho maditra. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa ny mpitondra fiangonana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.7 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: eveka.
      marker-yv: yv-n
    - type: text
      text: ' dia tokony ho tsy manan-tsiny, tahaka ny mpitandrina ny an’Andriamanitra izy, tsy mitompo teny fantatra, tsy mora tezitra, tsy mpimamo liana ady, tsy mpikapoka, tsy tia harena maloto; '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fa mampiantrano vahiny, tia ny tsara, mahonon-tena, marina, masina, mahafehy tena, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: mitana mafy ny teny marina araka ny efa nampianarina mba hahaizany hananatra amin’ny fampianarana tsy misy kilema sady handresy lahatra ny mpanohitra.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ireo mpampiely ny fampianaran-diso
    marker-yv: yv-h
