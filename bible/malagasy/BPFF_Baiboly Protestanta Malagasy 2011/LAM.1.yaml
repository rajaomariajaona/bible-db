type_code: plt
verses:
  '1':
  - type: heading
    content: Jerosalema, ilay mpitondratena nafoy
  - type: heading
    content: alef א
  - type: text
    content: Indrisy!
  - type: text
    content: Mitoetra manirery izao
  - type: text
    content: ilay tanàna feno olona!
  - type: text
    content: Tonga toy ny mpitondratena izy!
  - type: text
    content: Ilay nalaza tamin’ny firenena
  - type: text
    content: sady andriambavy tamin’ny fari-piadidiana samihafa
  - type: text
    content: dia manjary miasa an-terivozona.
  - type: heading
    content: bet ב
  '10':
  - type: text
    content: Ny fahavalo dia nanatsotra ny tanany
  - type: text
    content: tamin’ny zava-tsoany rehetra;
  - type: text
    content: fa hitany tafiditra ao amin’ny fitoerany masina
  - type: text
    content: ny Jentilisa izay noraranao tsy hiditra ao amin’ny fiangonanao.
  - type: heading
    content: kaf כ
  '11':
  - type: text
    content: Misento ny olony rehetra
  - type: text
    content: mitady mofo;
  - type: text
    content: eny, atakalony hanina ny zava-tsoany
  - type: text
    content: mba hampody ny ainy;
  - type: text
    content: jereo, TOMPO ô, ka diniho
  - type: text
    content: fa vingavingaina aho.
  - type: heading
    content: lamed ל
  '12':
  - type: text
    content: Mba tsy ho aminareo rehetra izay mandalo amin’ny lalana anie izao!
  - type: text
    content: Diniho sy jereo
  - type: text
    content: raha mba misy fahoriana toy ny fahoriako
  - type: text
    content: izay namelezany ahy,
  - type: text
    content: dia ilay nampahorian’NY TOMPO ahy
  - type: text
    content: tamin’ny andro nirehetan’ny fahatezerany.
  - type: heading
    content: mem מ
  '13':
  - type: text
    content: Avy tany amin’ny avo no nandatsahany afo ho amin’ny taolako,
  - type: text
    content: Izy no mandefa izany;
  - type: text
    content: namelatra harato haningorana ny tongotro Izy
  - type: text
    content: ka nampihemotra ahy;
  - type: text
    content: nampahalao ahy Izy
  - type: text
    content: sady nampahareraka ahy mandritra ny andro.
  - type: heading
    content: non נ
  '14':
  - type: text
    content: Ny ziogan’ny fiodinako dia nofehezin’ny tanany;
  - type: text
    content: mifaningotsingotra ireny
  - type: text
    content: ka tonga teo an-katoko;
  - type: text
    content: noketrahiny ny heriko;
  - type: text
    content: eny, natolotry ny Tompo
  - type: text
    content: ho eo an-tanan’izay tsy leoko aho.
  - type: heading
    content: samek ס
  '15':
  - type: text
    content: Nataon’ny Tompo tsinontsinona ny mahery rehetra
  - type: text
    content: izay niaraka tamiko;
  - type: text
    content: nanendry fotoam-piravoravoana hamelezana ahy Izy,
  - type: text
    content: hamotehana ny zatovoko;
  - type: text
    content: nanosihosy an’i Joda zanakavavy virijiny
  - type: text
    content: teo amin’ny famiazam-boaloboka ny Tompo.
  - type: heading
    content: aìn ע
  '16':
  - type: text
    content: Izany zavatra izany no mampitomany ahy;
  - type: text
    content: ny masoko; eny, mandrotsa-dranomaso ny masoko
  - type: text
    content: satria lavitra ahy ny mpampionona
  - type: text
    content: izay tokony hamelombelona ny fanahiko;
  - type: text
    content: ringana ny zanako
  - type: text
    content: satria mahery ny fahavalo.
  - type: heading
    content: pe פ
  '17':
  - type: text
    content: Manatsotra tanana i Ziona,
  - type: text
    content: nefa tsy misy mampionona azy;
  - type: text
    content: NY TOMPO nandidy ny amin’i Jakoba,
  - type: text
    content: mba ho tonga fahavalony ny manodidina azy;
  - type: text
    content: Jerosalema dia tonga
  - type: text
    content: fahavetavetana eo afovoan’ireo.
  - type: heading
    content: tsade צ
  '18':
  - type: text
    content: Marina NY TOMPO,
  - type: text
    content: fa izaho kosa dia nandà ny teniny;
  - type: text
    content: ry firenena rehetra, mihainoa re!
  - type: text
    content: Mba jereo ny fahoriako;
  - type: text
    content: ny virijiniko sy ny zatovoko
  - type: text
    content: dia lasan-ko babo.
  - type: heading
    content: kof ק
  '19':
  - type: text
    content: Nantsoiko ireo tia ahy,
  - type: text
    content: nefa nofitahiny aho;
  - type: text
    content: ny mpisoroko sy ny loholoko
  - type: text
    content: dia niala aina tao an-tanàna
  - type: text
    content: raha teo am-pitadiavana hanina
  - type: text
    content: mba hampody ny ainy.
  - type: heading
    content: res ר
  '2':
  - type: text
    content: Mitomany mafy izy amin’ny alina,
  - type: text
    content: ary ny ranomasony dia manorika amin’ny takolany.
  - type: text
    content: Izay rehetra tia azy
  - type: text
    content: dia tsy mba misy mampionona azy;
  - type: text
    content: ny sakaizany rehetra dia efa nivadika taminy
  - type: text
    content: ka tonga fahavalony.
  - type: heading
    content: gimel ג
  '20':
  - type: text
    content: Jereo, TOMPO ô, fa azom-pahoriana aho,
  - type: text
    content: mandevilevy ny ato anatiko;
  - type: text
    content: miontana ato anatiko ny foko
  - type: text
    content: satria naditra loatra aho;
  - type: text
    content: eny ivelany dia ny sabatra no mandripaka ny zanako,
  - type: text
    content: ary ao an-trano dia toa misy fahafatesana.
  - type: heading
    content: sin ש
  '21':
  - type: text
    content: Reny fa misento aho;
  - type: text
    content: tsy misy mampionona ahy;
  - type: text
    content: ny fahavaloko rehetra dia nandre ny fahavoazako
  - type: text
    content: ka faly satria Ianao no nahavita izany;
  - type: text
    content: hahatonga ny andro izay nolazainao Ianao.
  - type: text
    content: Mba ho tahaka ahy koa anie ireo.
  - type: heading
    content: tao ת
  '22':
  - type: text
    content: Aoka ho tonga eo anatrehanao ny faharatsiany rehetra,
  - type: text
    content: ary mba ataovy aminy
  - type: text
    content: tahaka izay nataonao tamiko
  - type: text
    content: noho ny fahotako rehetra;
  - type: text
    content: fa betsaka ny fisentoako
  - type: text
    content: ka reraka ny foko.
  '3':
  - type: text
    content: Lasan-ko babo ny Joda, ory
  - type: text
    content: sady vesaran’ny fanompoana;
  - type: text
    content: 'mipetraka any amin’ny '
  - type: text
    content: Jentilisa
  - type: text
    content: ' izy'
  - type: text
    content: ary tsy mahita fitsaharana;
  - type: text
    content: izay rehetra nanenjika azy dia nahatratra azy
  - type: text
    content: teo anivon’ny fahoriam-be.
  - type: heading
    content: dalet ד
  '4':
  - type: text
    content: 'Ireo lalana mankany '
  - type: text
    content: Ziona
  - type: text
    content: ' dia misaona'
  - type: text
    content: satria tsy misy tonga amin’ny fotoam-piravoravoana;
  - type: text
    content: rava ny vavahadiny rehetra,
  - type: text
    content: misento ny mpisorony;
  - type: text
    content: ory ny virijininy
  - type: text
    content: ary i Ziona dia azon’ny fahoriana mangidy.
  - type: heading
    content: he ה
  '5':
  - type: text
    content: Ny mpanohitra azy no nanjary mpitondra,
  - type: text
    content: ny fahavalony no miadana
  - type: text
    content: satria NY TOMPO efa nampahory azy
  - type: text
    content: noho ny hamaroan’ny fahotany;
  - type: text
    content: ny zanany madinika aza dia lasan-ko babo
  - type: text
    content: eo anoloan’ny rafiny.
  - type: heading
    content: vav ו
  '6':
  - type: text
    content: Niala tamin’i Ziona zanakavavy
  - type: text
    content: ny voninahiny manontolo;
  - type: text
    content: ny mpanapaka azy dia toy ny diera
  - type: text
    content: tsy mahita ahitra,
  - type: text
    content: ary mandeha tsy misy hery
  - type: text
    content: eo anoloan’ny mpanenjika azy izy.
  - type: heading
    content: zaìn ז
  '7':
  - type: text
    content: Tsaroan’i Jerosalema
  - type: text
    content: amin’ny andron’ny fahoriany sy fanjenjenany
  - type: text
    content: ny zava-tsoa rehetra izay nananany
  - type: text
    content: hatramin’ny ela;
  - type: text
    content: fa nony lavo teo an-tanan’ny fahavalo ny olony
  - type: text
    content: ka tsy nisy namonjy azy
  - type: text
    content: dia nahita azy ny fahavalo
  - type: text
    content: ka nihomehy ny faharavany.
  - type: heading
    content: het ח
  '8':
  - type: text
    content: Tena nanota tokoa i Jerosalema
  - type: text
    content: ka izany no nahatonga azy ho fahavetavetana;
  - type: text
    content: izay rehetra nanaja azy dia mamingavinga azy
  - type: text
    content: satria nahita ny fitanjahany ireny;
  - type: text
    content: eny, izy tenany aza dia misento
  - type: text
    content: ka mihemotra.
  - type: heading
    content: tet ט
  '9':
  - type: text
    content: Ny fahalotoany dia teo amin’ny morontongotr’akanjony;
  - type: text
    content: tsy nihevitra izay ho aviny izy;
  - type: text
    content: mampitolagaga ny fietreny,
  - type: text
    content: tsy misy mampionona azy.
  - type: text
    content: TOMPO ô, jereo ny fahoriako
  - type: text
    content: fa mirehareha ny fahavalo.
  - type: heading
    content: iod י
