document_id: HEB.4,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Koa na dia mbola misy teny fikasana fa hiditra any amin’ny fitsaharany aza isika dia aoka isika hatahotra, fandrao mba misy eo aminareo toa tsy mahatratra izany. '
  '10':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Fa izay niditra tao amin’ny fitsaharany dia izy koa no nitsahatra tamin’ny asany, tahaka an’Andriamanitra tamin’ny Azy.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Koa aoka isika hazoto hiditra amin’izany fitsaharana izany, fandrao hisy olona ho latsaka amin’ny tsy finoana tahaka izany koa. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Fa velona sy mahery ny tenin’Andriamanitra ka maranitra noho ny sabatra roa lela ary manindrona hatramin’ny fampisarahana ny aina sy ny fanahy, ny tonona sy ny tsoka sady mahay mamantatra ny eritreritra sy ny fisainan’ny fo. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Ary tsy misy zavatra ary na inona na inona izay tsy miseho eo anatrehany; fa ny zavatra rehetra dia mihanjahanja sy aharihary eo imason’izay iafaran’ny ataontsika.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Kristy, Mpisoronabe mitondra ny fahoriantsika
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Koa satria manana Mpisoronabe lehibe izay lasa namakivaky ny lanitra isika, dia Jesosy, Zanak’Andriamanitra, aoka hihazona ilay efa nekentsika isika. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Fa tsy manana Mpisoronabe izay tsy mahay miara-mitondra ny fahalementsika isika; fa ny antsika dia izay efa nalaim-panahy tamin’ny zavatra rehetra tahaka antsika, kanefa tsy nanana ota. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Koa aoka isika hanatona ny sezafiandrianan’ny fahasoavana amin’ny fahatokiana mba hahazoantsika famindrampo sy hahitantsika fahasoavana ho famonjena amin’ny fotoana ilàna izany.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Fa isika koa dia nitoriana Filazantsara tahaka ireny ihany; kanefa ny teny izay efa reny dia tsy nahasoa azy satria tsy nitondra finoana tao amin’izay nandre azy. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Fa isika izay nino no miditra amin’izany fitsaharana izany, araka ny voalazany hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '«Toy ny nianianako tamin’ny fahatezerako hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy hiditra amin’ny fitsaharako mihitsy izy» (Sal 95.11),
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'na dia vita hatramin’ny nanorenana izao tontolo izao aza ny asa. '
  '4':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Fa nilaza ny andro fahafito Izy eo amin’ny teny iray, araka izao: «Ary Andriamanitra nitsahatra tamin’ny asany rehetra tamin’ny andro fahafito» (Gen 2.3). '
  '5':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ary amin’izao teny manaraka izao koa: Tsy hiditra amin’ny fitsaharako mihitsy izy! '
  '6':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Koa satria mbola hiditra eo ihany ny sasany, ary izay nitoriana Filazantsara tamin’ny voalohany dia tsy niditra noho ny tsy finoany, '
  '7':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'dia mametra andro iray indray Izy, na dia efa ela taorianan’izany aza, milaza amin’ny alalan’i Davida hoe: Anio, araka ny voalaza teo hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Anio, raha mandre ny feony ianareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia aza manamafy ny fonareo» (Sal 95.7-8).
  '8':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Fa raha i Josoa no nanome azy fitsaharana dia tsy mba ho nilaza andro hafa Izy tao aorianan’izany. '
  '9':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Koa dia mbola misy Sabata fitsaharana ho an’ny olon’Andriamanitra. '
