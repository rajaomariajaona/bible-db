document_id: NUM.35
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ireo tanàna ho an’ny levita
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary NY TOMPO niteny tamin’i Mosesy tany amin’ireo tany lemaka ngazana tany Moaba, teo amoron’i Jordana, tandrifin’i Jeriko, hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Mandidia ny Zanak’Israely mba hanome tanàna ao amin’ny zarataniny avy honenan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: levita
  - type: text
    text: '. Homenareo tany manodidina ny tanàna koa izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ireo tanàna ireo no ho fonenany; ary ny tany dia ho an’ny biby fiompiny sy ny fananany mbamin’ny bibiny rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ny tany manodidina ny tanàna izay homenareo ny levita dia izao: Hatreo amin’ny mandan’ny tanàna ka hatrany amin’ny sisin’ny tany manodidina dia arivo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: hakiho
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Handrefy roa arivo hakiho eo ivelan’ny tanàna ianareo amin’ny lafiny atsinanana. Roa arivo hakiho amin’ny lafiny atsimo, roa arivo hakiho amin’ny lafiny andrefana, roa arivo hakiho amin’ny lafiny avaratra, ary ny tanàna dia ho eo afovoany. Izany no ho taniny manodidina ny tanàna. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ny tanàna homenareo ny levita dia tanàna fialofana, enina izay ho fandosiran’izay nahafaty olona, ary tanàna roa amby efapolo koa ambonin’ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Koa ny tanàna rehetra izay homenareo ny levita dia valo amby efapolo mbamin’ny tany manodidina azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ny amin’ny tanàna izay homenareo avy amin’ny zaratanin’ny Zanak’Israely dia izay be no hanalanareo be ary izay kely no hanalanareo kely. Samy hanome tanàna ho an’ny levita izy rehetra araka ny zarataniny avy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ireo tanàna handosiran’izay nahafaty olona tsy nahy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary NY TOMPO niteny tamin’i Mosesy hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Mitenena amin’ny Zanak’Israely hoe: Rehefa tafita an’i Jordana ianareo ka tonga any amin’ny tany Kanana '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'dia hifidy tanàna ianareo, ho tanàna fialofana ho anareo mba handosiran’izay nahafaty olona tsy nahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ho fialofana ho anareo izany tanàna izany mba tsy ho azon’ny mpamaly ra ka tsy ho faty izay nahafaty olona, mandra-pisehony hotsaraina eo anatrehan’ny fiangonana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ireo tanàna homenareo dia tanàna enina ho fialofana ho anareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Tanàna telo no homenareo etỳ andafin’i Jordana ary tanàna telo no homenareo ao amin’ny tany Kanana; ho tanàna fialofana ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ireo tanàna enina ireo dia ho fialofana ho an’ny Zanak’Israely sy ny mpifindra monina ary izay vahiny mandalo eo anivony mba handosiran’izay rehetra nahafaty olona tsy nahy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Kanefa raha misy mamely olona amin’ny vy ka mahafaty azy dia mpamono olona izy; hovonoina ho faty izay namono olona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Raha misy mamely olona amin’ny vato ka mahafaty azy dia mpamono olona izy; hovonoina ho faty izay namono olona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Raha misy mamely olona amin’ny hazo ka mahafaty azy dia mpamono olona izy; hovonoina ho faty izay namono olona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ny mpamaly ra no hamono azy; rehefa mifanena aminy izy dia izy no hamono azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Raha misy manosika olona noho ny lolompo na mitoraka olona amin’ny fanotrehana ka mahafaty azy '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: na mamely olona amin’ny tanany noho ny fandrafiana ka mahafaty azy dia hovonoina ho faty ilay namely satria mpamono olona izy. Ny mpamaly ra no hamono azy rehefa mifanena aminy izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Fa raha misy nahatosika olona tsy nahy, fa tsy noho ny fandrafiana, na nahatoraka olona na amin’inona na amin’inona, nefa tsy tamin’ny fanotrehana, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'na sendra nanjera vato nahafaty olona, nefa tsy hitany ilay olona fa nianjera taminy ilay vato ary tsy fahavalony ilay olona sady tsy nitady handratra azy izy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'dia hotsarain’ny fiangonana ilay namely sy ny mpamaly ra araka ireo lalàna ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Hovonjen’ny fiangonana ho afaka amin’ny mpamaly ra ilay nahafaty olona ka hateriny indray ho ao amin’ny tanàna fialofana izay nalehany tamin’izy nandositra. Dia hitoetra ao izy mandra-pahafatin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Mpisoronabe
  - type: text
    text: ' izay voahosotra tamin’ny diloilo masina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Fa raha mivoaka ho eny ivelan’ny tanàna fialofana izay nalehany tamin’izy nandositra ilay nahafaty olona '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'ka hitan’ny mpamaly ra eny ivelan’ny tanàna dia azony vonoina izy; ary tsy hisy valin-dra amin’izany '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: satria tokony hitoetra tao an-tanàna fialofana izy mandra-pahafatin’ny Mpisoronabe; fa rehefa maty ny Mpisoronabe dia mahazo mody any amin’ny zarataniny ihany ilay nahafaty olona.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Izany dia ho lalàna hitondrana anareo hatramin’ny taranakareo fara aman-dimby any amin’izay rehetra onenanareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Raha misy vonoana olona dia hovonoina izay nahafaty rehefa noporofoin’ny vavolombelona maromaro; fa raha vavolombelona iray monja dia tsy ampy hanamelohana olona ho faty izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ianareo dia tsy handray avotr’aina avy amin’izay namono olona, izay meloka ka tokony ho faty, fa hovonoina ho faty izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Ary ianareo dia tsy handray vola avotra avy amin’izay nandositra ho ao an-tanàna fialofany mba hodiany indray honina amin’ny taniny raha tsy mbola maty akory ny mpisorona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Aza mandoto ny tany izay onenanareo, fa ny ra dia fandotoana ny tany; ary ny tany dia tsy azo anaovana fanavotana ny amin’ny ra izay nalatsaka teo, afa-tsy amin’ny ran’izay nandatsaka azy ihany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Aza lotoina ny tany onenanareo izay itoerako; fa Izaho TOMPO no mitoetra eo anivon’ny Zanak’Israely.
