document_id: PSA.76,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ao Ziona Andriamanitra no mampitsahatra ny ady
  - type: text
    content: Ho an’ny mpiventy hira. Hampiarahina amin’ny valiha. Salamo nataon’i Asafa. Tononkira.
  - type: text
    content: Andriamanitra dia fantatra ao amin’ny Joda;
  - type: text
    content: malaza eo amin’ny Israely ny anarany;
  '10':
  - type: text
    content: Ny fahatezeran’ny olona aza midera Anao;
  - type: text
    content: isikinanao ny fahatezerana sisa.
  '11':
  - type: text
    content: Manaova voady amin’NY TOMPO Andriamanitrareo ka efao ny voadinareo!
  - type: text
    content: Aoka izay rehetra manodidina Azy hanolotra fanatitra ho an’Izay mahatahotra.
  '12':
  - type: text
    content: Manapitra ny fofonain’ny mpitondra Izy,
  - type: text
    content: ary Izy no tahotry ny mpanjakan’ny tany.
  '2':
  - type: text
    content: naoriny ao Salema ny tranolainy
  - type: text
    content: 'ary ao '
  - type: text
    content: Ziona
  - type: text
    content: ' ny fonenany.'
  '3':
  - type: text
    content: Tao no nanapatapahany ny zana-tsipìka manelatselatra,
  - type: text
    content: 'ny ampinga sy ny sabatra ary ny fiadiana. '
  - type: text
    content: Fiatoana.
  '4':
  - type: text
    content: Mamirapiratra Ianao sady be voninahitra,
  - type: text
    content: mihoatra noho ny tendrombohitra mandrakizay.
  '5':
  - type: text
    content: Voababo ny mahery fo;
  - type: text
    content: renoky ny torimasony izy;
  - type: text
    content: samy tsy nahahetsika ny tanany avokoa ny lehilahy mahery rehetra.
  '6':
  - type: text
    content: Noho ny teny mafy nataonao, ry Andriamanitr’i Jakoba,
  - type: text
    content: dia sondrian-tory na ny kalesy fitondra miady na ny soavaly.
  '7':
  - type: text
    content: Ianao, Ianao no mahatahotra!
  - type: text
    content: Koa iza no mahajanona eo anatrehanao rehefa miseho ny fahatezeranao?
  '8':
  - type: text
    content: Avy tany an-danitra no nampandrenesanao ny didim-pitsarana;
  - type: text
    content: raiki-tahotra ny tany ka sina
  '9':
  - type: text
    content: rehefa nitsangana hitsara Andriamanitra
  - type: text
    content: 'mba hamonjy ny mpandefitra rehetra ambonin’ny tany. '
  - type: text
    content: Fiatoana.
