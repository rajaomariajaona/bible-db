document_id: PSA.76
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ao Ziona Andriamanitra no mampitsahatra ny ady
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: Ho an’ny mpiventy hira. Hampiarahina amin’ny valiha. Salamo nataon’i Asafa. Tononkira.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Andriamanitra dia fantatra ao amin’ny Joda;
- type: usfm
  marker: q1
  children:
  - type: text
    text: malaza eo amin’ny Israely ny anarany;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: naoriny ao Salema ny tranolainy
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ary ao '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Ziona
  - type: text
    text: ' ny fonenany.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Tao no nanapatapahany ny zana-tsipìka manelatselatra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ny ampinga sy ny sabatra ary ny fiadiana. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Fiatoana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Mamirapiratra Ianao sady be voninahitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mihoatra noho ny tendrombohitra mandrakizay.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Voababo ny mahery fo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: renoky ny torimasony izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: samy tsy nahahetsika ny tanany avokoa ny lehilahy mahery rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Noho ny teny mafy nataonao, ry Andriamanitr’i Jakoba,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia sondrian-tory na ny kalesy fitondra miady na ny soavaly.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ianao, Ianao no mahatahotra!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Koa iza no mahajanona eo anatrehanao rehefa miseho ny fahatezeranao?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Avy tany an-danitra no nampandrenesanao ny didim-pitsarana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: raiki-tahotra ny tany ka sina
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: rehefa nitsangana hitsara Andriamanitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'mba hamonjy ny mpandefitra rehetra ambonin’ny tany. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Fiatoana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ny fahatezeran’ny olona aza midera Anao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: isikinanao ny fahatezerana sisa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Manaova voady amin’NY TOMPO Andriamanitrareo ka efao ny voadinareo!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aoka izay rehetra manodidina Azy hanolotra fanatitra ho an’Izay mahatahotra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Manapitra ny fofonain’ny mpitondra Izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary Izy no tahotry ny mpanjakan’ny tany.
