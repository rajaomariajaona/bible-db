document_id: EZK.41,3103
type_code: plt
verses:
  '1':
  - type: text
    content: 'Ary noentiny ho ao amin’ny tempoly aho. Norefesiny ny andry ka enina '
  - type: text
    content: hakiho
  - type: text
    content: ' ny sakany tamin’ny lafiny iray ary enina hakiho ny sakany tamin’ny lafiny iray; sakan’ny tranolay izany.'
  '10':
  - type: text
    content: 'sy ny efitrano dia roapolo hakiho manodidina ny trano manontolo. '
  '11':
  - type: text
    content: Ary ny varavaran’ny paosin-trano dia mankao amin’ilay sisa navela, dia varavarana iray manatrika ny avaratra, ary iray koa manatrika ny atsimo; ny sakan’ilay sisa navela dia dimy hakiho manodidina.
  '12':
  - type: text
    content: 'Ny vatan-trano izay teo anoloan’ilay kianja voafaritra teo amin’ny lafiny andrefana dia fitopolo hakiho ny sakany, ary ny rindrin’ny trano dia dimy hakiho ny hatevin’ny manodidina ary sivifolo hakiho ny lavany. '
  '13':
  - type: text
    content: 'Dia nandrefy ny Trano izy ka zato hakiho ny lavany, ary ilay kianja voatokana sy ny vatan-trano ary ny rindrina dia zato hakiho ny lavany. '
  '14':
  - type: text
    content: 'Ary ny sakan’ny Trano eo anoloany sy ilay kianja voafaritra teo atsinanana dia zato hakiho. '
  '15':
  - type: text
    content: Dia norefesiny ny lavan’ny Trano teo anoloan’ny kianja izay tao ivohony, ary ny lalantsarany teo an-daniny roa, ka zato hakiho.
  - type: heading
    content: Ny tao anatin’ny tempoly
  - type: text
    content: 'Ny tempoly ao anaty, ny lalantsara ao amin’ny kianja, '
  '16':
  - type: text
    content: 'ny tokonana, ny varavarankely makarakara tsy mivoha ary ny rihana telo miantoana manodidina izay manandrify ny tokonana dia nopetahana hazo fisaka manodidina, hatramin’ny tany ka hatramin’ny varavarankely koa, ary nihidy ny varavarankely. '
  '17':
  - type: text
    content: 'Teo ambonin’ny varavarana, na amin’ny trano ao anatiny, na ny eny ivelany, mbamin’ny rindrina manodidina, na ny ao anatiny na ny eny ivelany dia namelàna toerana '
  '18':
  - type: text
    content: 'hasiana sarin’ny '
  - type: text
    content: kerobima
  - type: text
    content: ' sy ny hazo palma, koa ny sarin’ny hazo palma dia teo anelanelan’ny kerobima, ary ny kerobima dia samy nanana tarehy roa avy '
  '19':
  - type: text
    content: 'ka tarehin’olona no nanatrika ny hazo palma teo an-daniny, ary tarehin-diona tanora kosa no nanatrika ny hazo palma teo an-kilany; ny manodidina ny Trano dia natao tahaka izany avokoa. '
  '2':
  - type: text
    content: 'Ny sakan’ny varavarana dia folo hakiho; ny andaniny sy ny ankilany amin’ny varavarana dia dimy hakiho avy; ary norefesiny ny lavany ka efapolo hakiho ary ny sakany dia roapolo hakiho. '
  '20':
  - type: text
    content: 'Hatreo amin’ny tany ka hatrany ambonin’ny varavarana no nasiana sarin’ny kerobima sy ny hazo palma, teo amin’ny rindrin’ny tempoly. '
  '21':
  - type: text
    content: Efamira ny tolanam-baravaran’ny tempoly, ary ny manoloana ny fitoerana masina dia nitovy endrika tamin’izany koa.
  '22':
  - type: text
    content: 'Ny alitara dia hazo ka telo '
  - type: text
    content: hakiho
  - type: text
    content: ' ny haavony ary roa hakiho ny lavany; nisy zorony koa ka ny lavany sy ny sisiny dia hazo. Ary hoy izy tamiko: Io no latabatra izay eo anatrehan’NY TOMPO. '
  '23':
  - type: text
    content: 'Ary ny tempoly sy ny fitoerana masina dia nisy lelam-baravarana roa. '
  '24':
  - type: text
    content: 'Ireo lelam-baravarana ireo dia samy kopa-droa avy, lelam-baravarana roa amin’ny iray, ary lelam-baravarana roa koa amin’ny iray. '
  '25':
  - type: text
    content: 'Nisy sarin’ny kerobima sy ny hazo palma natao teo amin’ny varavaran’ny tempoly, tahaka izay natao teo amin’ny rindrina ihany; nisy tatao hazo teo anoloan’ny lalantsara fidirana, teo ivelany. '
  '26':
  - type: text
    content: Ary nisy varavarankely makarakara tsy mivoha sy sarin’ny hazo palma teo an-daniny roa, dia teo anilan’ny lalantsara fidirana sy teo amin’ireo paosin-trano momba ny Trano ary teo amin’ny tatao.
  '3':
  - type: text
    content: 'Dia nandroso ho ao anatiny indrindra izy. Norefesiny ny andry teo amin’ny varavarana: Roa hakiho, ary ny varavarana dia enina hakiho, ary ny sakan’ny varavarana dia fito hakiho. '
  '4':
  - type: text
    content: 'Norefesiny ny lavany: Roapolo hakiho, ary ny sakany dia roapolo hakiho teo anoloan’ny ati-trano lehibe; dia hoy izy tamiko: Io ny fitoerana masina indrindra.'
  - type: heading
    content: Ireo paosin-trano
  '5':
  - type: text
    content: 'Ary norefesiny ny rindrin’ny Trano ka ny hatevin’ny rindrin’ny Trano dia enina '
  - type: text
    content: hakiho
  - type: text
    content: ' ary ny sakan’ny paosin-trano dia efatra hakiho. '
  '6':
  - type: text
    content: 'Ireo paosin-trano ireo dia milahatra ho rihana telo izay miverina intelopolo; ary nitsatoka tamin’ny rindrina izay ho an’ny paosin-trano manodidina izy, fa tsy nitsatoka amin’ny rindrin’ny Trano. '
  '7':
  - type: text
    content: Ny sakan’ireo paosin-trano ireo dia nihamalalaka isaky ny rihana, fa niampy isaky ny rihana izany ka nihamalalaka araka ny fisandratany; ary ny tombon’ny ambony amin’ny antenantenany dia tahaka ny tombon’ny antenantenany amin’ny ambany.
  '8':
  - type: text
    content: 'Dia hitako fa nisy tokotany nasandratra manodidina ny Trano ho fanorenana ny paosin-trano, ary ny fanorenan’ny paosin-trano dia iray volotara fandrefesana, enina hakiho hatramin’ny fifanohizany. '
  '9':
  - type: text
    content: 'Ny hatevin’ny rindrina ivelany amin’ny paosin-trano dia dimy hakiho; ny sisa navela manelanelana ny paosin-trano '
