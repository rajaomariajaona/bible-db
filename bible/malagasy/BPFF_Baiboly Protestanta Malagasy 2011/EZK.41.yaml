document_id: EZK.41
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary noentiny ho ao amin’ny tempoly aho. Norefesiny ny andry ka enina '
  - type: usfm
    marker: w
    children:
    - type: text
      text: hakiho
  - type: text
    text: ' ny sakany tamin’ny lafiny iray ary enina hakiho ny sakany tamin’ny lafiny iray; sakan’ny tranolay izany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ny sakan’ny varavarana dia folo hakiho; ny andaniny sy ny ankilany amin’ny varavarana dia dimy hakiho avy; ary norefesiny ny lavany ka efapolo hakiho ary ny sakany dia roapolo hakiho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dia nandroso ho ao anatiny indrindra izy. Norefesiny ny andry teo amin’ny varavarana: Roa hakiho, ary ny varavarana dia enina hakiho, ary ny sakan’ny varavarana dia fito hakiho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Norefesiny ny lavany: Roapolo hakiho, ary ny sakany dia roapolo hakiho teo anoloan’ny ati-trano lehibe; dia hoy izy tamiko: Io ny fitoerana masina indrindra.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ireo paosin-trano
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary norefesiny ny rindrin’ny Trano ka ny hatevin’ny rindrin’ny Trano dia enina '
  - type: usfm
    marker: w
    children:
    - type: text
      text: hakiho
  - type: text
    text: ' ary ny sakan’ny paosin-trano dia efatra hakiho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ireo paosin-trano ireo dia milahatra ho rihana telo izay miverina intelopolo; ary nitsatoka tamin’ny rindrina izay ho an’ny paosin-trano manodidina izy, fa tsy nitsatoka amin’ny rindrin’ny Trano. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ny sakan’ireo paosin-trano ireo dia nihamalalaka isaky ny rihana, fa niampy isaky ny rihana izany ka nihamalalaka araka ny fisandratany; ary ny tombon’ny ambony amin’ny antenantenany dia tahaka ny tombon’ny antenantenany amin’ny ambany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dia hitako fa nisy tokotany nasandratra manodidina ny Trano ho fanorenana ny paosin-trano, ary ny fanorenan’ny paosin-trano dia iray volotara fandrefesana, enina hakiho hatramin’ny fifanohizany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ny hatevin’ny rindrina ivelany amin’ny paosin-trano dia dimy hakiho; ny sisa navela manelanelana ny paosin-trano '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'sy ny efitrano dia roapolo hakiho manodidina ny trano manontolo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ary ny varavaran’ny paosin-trano dia mankao amin’ilay sisa navela, dia varavarana iray manatrika ny avaratra, ary iray koa manatrika ny atsimo; ny sakan’ilay sisa navela dia dimy hakiho manodidina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ny vatan-trano izay teo anoloan’ilay kianja voafaritra teo amin’ny lafiny andrefana dia fitopolo hakiho ny sakany, ary ny rindrin’ny trano dia dimy hakiho ny hatevin’ny manodidina ary sivifolo hakiho ny lavany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dia nandrefy ny Trano izy ka zato hakiho ny lavany, ary ilay kianja voatokana sy ny vatan-trano ary ny rindrina dia zato hakiho ny lavany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary ny sakan’ny Trano eo anoloany sy ilay kianja voafaritra teo atsinanana dia zato hakiho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Dia norefesiny ny lavan’ny Trano teo anoloan’ny kianja izay tao ivohony, ary ny lalantsarany teo an-daniny roa, ka zato hakiho.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny tao anatin’ny tempoly
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ny tempoly ao anaty, ny lalantsara ao amin’ny kianja, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'ny tokonana, ny varavarankely makarakara tsy mivoha ary ny rihana telo miantoana manodidina izay manandrify ny tokonana dia nopetahana hazo fisaka manodidina, hatramin’ny tany ka hatramin’ny varavarankely koa, ary nihidy ny varavarankely. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Teo ambonin’ny varavarana, na amin’ny trano ao anatiny, na ny eny ivelany, mbamin’ny rindrina manodidina, na ny ao anatiny na ny eny ivelany dia namelàna toerana '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'hasiana sarin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: kerobima
  - type: text
    text: ' sy ny hazo palma, koa ny sarin’ny hazo palma dia teo anelanelan’ny kerobima, ary ny kerobima dia samy nanana tarehy roa avy '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'ka tarehin’olona no nanatrika ny hazo palma teo an-daniny, ary tarehin-diona tanora kosa no nanatrika ny hazo palma teo an-kilany; ny manodidina ny Trano dia natao tahaka izany avokoa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Hatreo amin’ny tany ka hatrany ambonin’ny varavarana no nasiana sarin’ny kerobima sy ny hazo palma, teo amin’ny rindrin’ny tempoly. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Efamira ny tolanam-baravaran’ny tempoly, ary ny manoloana ny fitoerana masina dia nitovy endrika tamin’izany koa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ny alitara dia hazo ka telo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: hakiho
  - type: text
    text: ' ny haavony ary roa hakiho ny lavany; nisy zorony koa ka ny lavany sy ny sisiny dia hazo. Ary hoy izy tamiko: Io no latabatra izay eo anatrehan’NY TOMPO. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary ny tempoly sy ny fitoerana masina dia nisy lelam-baravarana roa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ireo lelam-baravarana ireo dia samy kopa-droa avy, lelam-baravarana roa amin’ny iray, ary lelam-baravarana roa koa amin’ny iray. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Nisy sarin’ny kerobima sy ny hazo palma natao teo amin’ny varavaran’ny tempoly, tahaka izay natao teo amin’ny rindrina ihany; nisy tatao hazo teo anoloan’ny lalantsara fidirana, teo ivelany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Ary nisy varavarankely makarakara tsy mivoha sy sarin’ny hazo palma teo an-daniny roa, dia teo anilan’ny lalantsara fidirana sy teo amin’ireo paosin-trano momba ny Trano ary teo amin’ny tatao.
