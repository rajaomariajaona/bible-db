document_id: 1PE.1,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Fiarahabana
  - type: text
    content: 'I Petera, Apostolin’i Jesosy '
  - type: text
    content: Kristy
  - type: text
    content: ', no mamangy ny mpivahiny monina any am-pielezana any Ponto, Galatia, Kapadokia, Azia sy Bitinia, dia olom-boafidy '
  '10':
  - type: text
    content: 'Ny momba izany famonjena izany no nodinihin’ny mpaminany sy nokarohiny fatratra, dia ireo naminany ny fahasoavana ho anareo; '
  '11':
  - type: text
    content: 'eny, nokarohiny ny momba izay andro na izay toetry ny andro notondroin’ny Fanahin’i '
  - type: text
    content: Kristy
  - type: text
    content: ' tao anatiny raha nambarany mialoha ny fijalian’i Kristy sy ny voninahitra manaraka izany.'
  '12':
  - type: text
    content: Ary naseho tamin’ireo fa tsy ho azy fa ho anareo no nanompoany ny amin’izany zavatra izany, izay voambara aminareo ankehitriny, tamin’ny tenin’ireo nitory ny Filazantsara taminareo tamin’ny Fanahy Masina izay nirahina avy tany an-danitra. Izany zavatra izany dia mahaliana ny anjely tokoa ny hijery azy.
  - type: heading
    content: Ny fiainana sy ny fitomboan’ny zanak’Andriamanitra
  '13':
  - type: text
    content: 'Koa amin’izany dia atanjaho ny sainareo ka mahonòna tena ary manàna fanantenana feno ny fahasoavana izay hoentina ho anareo amin’ny hisehoan’i Jesosy '
  - type: text
    content: Kristy
  - type: text
    content: '. '
  '14':
  - type: text
    content: 'Tahaka ny zanaka manoa, dia aza mitondra tena araka ny filanareo fahiny tamin’ny tsy fahalalanareo; '
  '15':
  - type: text
    content: 'fa araka ny fahamasinan’Ilay niantso anareo, dia aoka mba ho masina koa ianareo amin’ny fitondrantena rehetra '
  '16':
  - type: text
    content: 'satria voasoratra hoe: «Ho masina ianareo, satria masina Aho» (Lev 11.44). '
  '17':
  - type: text
    content: Ary raha Ilay tsy mizaha tavan’olona fa mitsara araka ny asan’izy rehetra, no antsoinareo hoe Ray, dia mitondrà tena amin’ny fahatahorana mandritra ny andron’ny fivahiniananareo etỳ.
  '18':
  - type: text
    content: Fa fantatrareo fa tsy tamin’ny zavatra mety ho simba, na volafotsy na volamena no nanavotana anareo
  - type: text
    content: tamin’ny fitondrantena adala izay nolovanareo tamin’ny razanareo,
  '19':
  - type: text
    content: fa tamin’ny ra sarobidin’i Kristy, toy ny tamin’ny ran’ny zanak’ondry tsy misy kilema ary tsy misy pentimpentina,
  '2':
  - type: text
    content: 'araka ny fahalalana mialoha izay an’Andriamanitra Ray, amin’ny fanamasinan’ny Fanahy, ho amin’ny fankatoavana sy ny famafazana ny ran’i Jesosy Kristy: Hampitomboina ho anareo anie ny fahasoavana sy ny fiadanana.'
  - type: heading
    content: Ny famonjena, fototry ny fanantenana sy ny firavoravoana
  '20':
  - type: text
    content: Izy no efa fantatra mialoha, talohan’ny nanorenana an’izao tontolo izao,
  - type: text
    content: fa naseho kosa amin’izao andro farany izao
  - type: text
    content: 'noho ny aminareo '
  '21':
  - type: text
    content: izay mino an’Andriamanitra amin’ny alalany,
  - type: text
    content: dia Ilay nanangana Azy tamin’ny maty ka nanome voninahitra Azy,
  - type: text
    content: mba hiorenan’ny finoanareo sy ny fanantenanareo amin’Andriamanitra.
  '22':
  - type: text
    content: 'Koa satria efa nodiovinareo ny fanahinareo tamin’ny fanarahana ny fahamarinana ho amin’ny fitiavan-drahalahy tsy mihatsaravelatsihy dia mifankatiava fatratra amin’ny fo madio. '
  '23':
  - type: text
    content: 'Fa efa teraka indray ianareo, tsy tamin’ny voa mety ho lo, fa tamin’ny tsy mety ho lo, dia ny tenin’Andriamanitra izay velona sady maharitra. '
  '24':
  - type: text
    content: Fa
  - type: text
    content: «ny nofo rehetra dia tahaka ny ahitra,
  - type: text
    content: ary izay mety ho voninahiny dia tahaka ny vonin’ny ahitra.
  - type: text
    content: Malazo ny ahitra ka mihintsana ny voniny;
  '25':
  - type: text
    content: fa ny tenin’ny Tompo no maharitra mandrakizay» (Isa 40.6-8).
  - type: text
    content: Izany no tenin’ny Filazantsara izay notorina taminareo.
  '3':
  - type: text
    content: 'Isaorana anie Andriamanitra, Rain’i Jesosy '
  - type: text
    content: Kristy
  - type: text
    content: ' Tompontsika, izay niteraka antsika indray araka ny haben’ny famindrampony ho amin’ny fanantenana velona noho ny nitsanganan’i Jesosy Kristy tamin’ny maty, '
  '4':
  - type: text
    content: 'ho amin’ny lova tsy mety simba, tsy misy loto, tsy mety levona, voatahiry any an-danitra ho anareo, '
  '5':
  - type: text
    content: izay arovan’ny herin’Andriamanitra amin’ny alalan’ny finoana, ho amin’ny famonjena efa vonona haseho amin’ny fotoana farany.
  '6':
  - type: text
    content: 'Izany no iravoravoanareo, na dia ampalahelovina vetivety ankehitriny amin’ny fizahan-toetra maro samihafa aza ianareo, raha tsy maintsy hisy izany, '
  '7':
  - type: text
    content: mba ho antom-piderana sy voninahitra ary fankalazana amin’ny hisehoan’i Jesosy Kristy ny finoanareo voazaha toetra, izay tsara lavitra noho ny volamena mety ho simba, na dia voazaha toetra tamin’ny afo aza.
  '8':
  - type: text
    content: 'Na dia tsy hitanareo akory aza Izy dia tianareo; ary na dia tsy hitanareo ankehitriny aza Izy kanefa inoanareo dia iravoravoanareo amin’ny fifaliana tsy hay tononina sady be voninahitra, '
  '9':
  - type: text
    content: sady mandray ny anton’ny finoanareo ianareo, dia ny famonjena ny fanahy.
  - type: heading
    content: Ireo mpaminany sy ny famonjena
