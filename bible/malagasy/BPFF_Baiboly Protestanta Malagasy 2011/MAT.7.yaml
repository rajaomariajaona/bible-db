document_id: MAT.7,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny amin’ny singan’ahitra sy ny andry
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Lio 6.37-42
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Aza mitsara mba tsy hotsaraina ianareo. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ary raha angatahany hazandrano no hanome azy menarana? '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Koa raha ianareo, na dia ratsy aza, mahalala manome zava-tsoa ho an’ny zanakareo, tsy mainka va ny Rainareo izay any an-danitra no hanome zava-tsoa ho an’izay mangataka Aminy?
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ahoana no hifandraisana amin’ny hafa
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Lio 6.31
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Koa amin’izany, na inona na inona no tianareo hataon’ny olona aminareo, dia mba ataovy aminy koa tahaka izany; fa izany no lalàna sy mpaminany.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny amin’ny vavahady ety
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Lio 13.23-24
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Midira amin’ny vavahady ety ianareo; fa lehibe ny vavahady, ary malalaka ny lalana izay mankany amin’ny fahaverezana ka maro ny miditra any. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Fa ety ny vavahady, ary tery ny lalana mankany amin’ny fiainana ka vitsy no mahita azy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny hazo sy ny voany
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Lio 6.43-44
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Mitandrema ianareo, fandrao ho voafitaky ny mpaminany sandoka izay mankeo aminareo amin’ny fitafian’ny ondry, nefa ao anatiny izy dia amboadia ta hamiravira. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Ny voany no hahafantaranareo azy. Mioty voaloboka amin’ny tsilo va ny olona sa mahazo aviavy amin’ny songosongo? '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Dia toy izany, ny hazo tsara rehetra dia mamoa voa tsara fa ny hazo ratsy rehetra kosa dia mamoa voa ratsy. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Ny hazo tsara dia tsy mety mamoa voa ratsy ary ny hazo ratsy dia tsy mety mamoa voa tsara. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Ny hazo rehetra izay tsy mamoa voa tsara dia hokapaina ka hatsipy any anaty afo. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Fa araka ny fitsarana ataonareo no hitsarana anareo; ary araka ny refy ataonareo no handrefesana ho anareo. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Koa ny voany no hahafantaranareo azy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Miteny sady manatanteraka
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Lio 6.46; 13.25-27
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Tsy izay rehetra miteny amiko hoe: Tompoko, Tompoko, no hiditra amin’ny fanjakan’ny lanitra, fa izay manao ny sitrapon’ny Raiko izay any an-danitra. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Maro no hilaza Amiko amin’izany andro izany hoe: Tompoko, Tompoko, tsy efa naminany tamin’ny anaranao va izahay? Tsy efa namoaka '
    - type: usfm
      marker: w
      children:
      - type: text
        text: demonia
    - type: text
      text: ' tamin’ny anaranao va izahay? Ary tsy efa nanao asa lehibe maro tamin’ny anaranao va izahay? '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Dia hambarako aminy marimarina hoe: Tsy mba fantatro akory ianareo hatrizay hatrizay; mialà Amiko, ianareo tsy mpanao ny marina.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fanoharana ny amin’ny trano roa
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Lio 6.47-49
    marker-yv: yv-h
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Koa amin’izany, na zovy na zovy no mandre ny teniko teo ka mankatò azy dia hoharina amin’ny lehilahy manan-tsaina izy, izay nanorina ny tranony teo ambonin’ny vatolampy. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Ary rehefa latsaka ny ranonorana dia nisy riaka be sady nifofofofo ny rivotra ka namely izany trano izany; nefa tsy nianjera izy satria efa naorina teo ambonin’ny vatolampy. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Fa izay rehetra mandre ireo teniko ireo nefa tsy mankatò azy dia hoharina amin’ny lehilahy adala izy izay nanorina ny tranony teo ambonin’ny fasika. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Koa rehefa latsaka ny ranonorana dia nisy riaka be sady nifofofofo ny rivotra ka namely izany trano izany, dia nianjera izy ary loza ny faharavany.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fahefan’i Jesosy
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mar 1.22; Lio 4.32
    marker-yv: yv-h
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Nony efa vitan’i Jesosy izany teny izany dia talanjona ny vahoaka noho ny fampianarany, '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'satria nampianatra azy ireo toy izay manana fahefana Izy fa tsy tahaka ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpanoradalàna
    - type: text
      text: ' teo aminy.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Nahoana ianao no mijery ny singan’ahitra eo amin’ny mason’ny rahalahinao, nefa ny andry eo amin’ny masonao dia tsy mba tsikaritrao akory? '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ary ahoana no ilazanao amin’ny rahalahinao hoe: Aoka hesoriko ny singan’ahitra eo amin’ny masonao; nefa indro ny andry dia eo amin’ny masonao? '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Ry mpihatsaravelatsihy, esory aloha ny andry eo amin’ny masonao, fa amin’izay vao ho hitanao tsara ny hanesoranao ny singan’ahitra eo amin’ny mason’ny rahalahinao.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny vatosoa eny amin’ny kisoa
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Aza omena ny amboa ny masina; ary aza atsipy eny amin’ny kisoa ny vatosoanareo, fandrao hanitsaka azy izy dia hifotitra ka hamiravira anareo.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mangataka, mitady, mandondòna
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Lio 11.9-13
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Mangataha dia homena ianareo; mitadiava dia hahita ianareo; dondòny, dia hovohana ianareo. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Fa izay rehetra mangataka no mahazo; ary izay mitady no mahita; ary izay mandondòna no hovohana. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Fa iza moa aminareo raha angatahan’ny zanany mofo no hanome azy vato? '
