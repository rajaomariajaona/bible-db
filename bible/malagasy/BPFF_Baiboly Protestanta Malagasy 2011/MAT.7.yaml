document_id: MAT.7,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny amin’ny singan’ahitra sy ny andry
  - type: heading
    content: Lio 6.37-42
  - type: text
    content: 'Aza mitsara mba tsy hotsaraina ianareo. '
  '10':
  - type: text
    content: 'Ary raha angatahany hazandrano no hanome azy menarana? '
  '11':
  - type: text
    content: Koa raha ianareo, na dia ratsy aza, mahalala manome zava-tsoa ho an’ny zanakareo, tsy mainka va ny Rainareo izay any an-danitra no hanome zava-tsoa ho an’izay mangataka Aminy?
  - type: heading
    content: Ahoana no hifandraisana amin’ny hafa
  - type: heading
    content: Lio 6.31
  '12':
  - type: text
    content: Koa amin’izany, na inona na inona no tianareo hataon’ny olona aminareo, dia mba ataovy aminy koa tahaka izany; fa izany no lalàna sy mpaminany.
  - type: heading
    content: Ny amin’ny vavahady ety
  - type: heading
    content: Lio 13.23-24
  '13':
  - type: text
    content: 'Midira amin’ny vavahady ety ianareo; fa lehibe ny vavahady, ary malalaka ny lalana izay mankany amin’ny fahaverezana ka maro ny miditra any. '
  '14':
  - type: text
    content: Fa ety ny vavahady, ary tery ny lalana mankany amin’ny fiainana ka vitsy no mahita azy.
  - type: heading
    content: Ny hazo sy ny voany
  - type: heading
    content: Lio 6.43-44
  '15':
  - type: text
    content: 'Mitandrema ianareo, fandrao ho voafitaky ny mpaminany sandoka izay mankeo aminareo amin’ny fitafian’ny ondry, nefa ao anatiny izy dia amboadia ta hamiravira. '
  '16':
  - type: text
    content: 'Ny voany no hahafantaranareo azy. Mioty voaloboka amin’ny tsilo va ny olona sa mahazo aviavy amin’ny songosongo? '
  '17':
  - type: text
    content: 'Dia toy izany, ny hazo tsara rehetra dia mamoa voa tsara fa ny hazo ratsy rehetra kosa dia mamoa voa ratsy. '
  '18':
  - type: text
    content: 'Ny hazo tsara dia tsy mety mamoa voa ratsy ary ny hazo ratsy dia tsy mety mamoa voa tsara. '
  '19':
  - type: text
    content: 'Ny hazo rehetra izay tsy mamoa voa tsara dia hokapaina ka hatsipy any anaty afo. '
  '2':
  - type: text
    content: 'Fa araka ny fitsarana ataonareo no hitsarana anareo; ary araka ny refy ataonareo no handrefesana ho anareo. '
  '20':
  - type: text
    content: Koa ny voany no hahafantaranareo azy.
  - type: heading
    content: Miteny sady manatanteraka
  - type: heading
    content: Lio 6.46; 13.25-27
  '21':
  - type: text
    content: 'Tsy izay rehetra miteny amiko hoe: Tompoko, Tompoko, no hiditra amin’ny fanjakan’ny lanitra, fa izay manao ny sitrapon’ny Raiko izay any an-danitra. '
  '22':
  - type: text
    content: 'Maro no hilaza Amiko amin’izany andro izany hoe: Tompoko, Tompoko, tsy efa naminany tamin’ny anaranao va izahay? Tsy efa namoaka '
  - type: text
    content: demonia
  - type: text
    content: ' tamin’ny anaranao va izahay? Ary tsy efa nanao asa lehibe maro tamin’ny anaranao va izahay? '
  '23':
  - type: text
    content: 'Dia hambarako aminy marimarina hoe: Tsy mba fantatro akory ianareo hatrizay hatrizay; mialà Amiko, ianareo tsy mpanao ny marina.'
  - type: heading
    content: Fanoharana ny amin’ny trano roa
  - type: heading
    content: Lio 6.47-49
  '24':
  - type: text
    content: 'Koa amin’izany, na zovy na zovy no mandre ny teniko teo ka mankatò azy dia hoharina amin’ny lehilahy manan-tsaina izy, izay nanorina ny tranony teo ambonin’ny vatolampy. '
  '25':
  - type: text
    content: 'Ary rehefa latsaka ny ranonorana dia nisy riaka be sady nifofofofo ny rivotra ka namely izany trano izany; nefa tsy nianjera izy satria efa naorina teo ambonin’ny vatolampy. '
  '26':
  - type: text
    content: 'Fa izay rehetra mandre ireo teniko ireo nefa tsy mankatò azy dia hoharina amin’ny lehilahy adala izy izay nanorina ny tranony teo ambonin’ny fasika. '
  '27':
  - type: text
    content: Koa rehefa latsaka ny ranonorana dia nisy riaka be sady nifofofofo ny rivotra ka namely izany trano izany, dia nianjera izy ary loza ny faharavany.
  - type: heading
    content: Ny fahefan’i Jesosy
  - type: heading
    content: Mar 1.22; Lio 4.32
  '28':
  - type: text
    content: 'Nony efa vitan’i Jesosy izany teny izany dia talanjona ny vahoaka noho ny fampianarany, '
  '29':
  - type: text
    content: 'satria nampianatra azy ireo toy izay manana fahefana Izy fa tsy tahaka ny '
  - type: text
    content: mpanoradalàna
  - type: text
    content: ' teo aminy.'
  '3':
  - type: text
    content: 'Nahoana ianao no mijery ny singan’ahitra eo amin’ny mason’ny rahalahinao, nefa ny andry eo amin’ny masonao dia tsy mba tsikaritrao akory? '
  '4':
  - type: text
    content: 'Ary ahoana no ilazanao amin’ny rahalahinao hoe: Aoka hesoriko ny singan’ahitra eo amin’ny masonao; nefa indro ny andry dia eo amin’ny masonao? '
  '5':
  - type: text
    content: Ry mpihatsaravelatsihy, esory aloha ny andry eo amin’ny masonao, fa amin’izay vao ho hitanao tsara ny hanesoranao ny singan’ahitra eo amin’ny mason’ny rahalahinao.
  - type: heading
    content: Ny vatosoa eny amin’ny kisoa
  '6':
  - type: text
    content: Aza omena ny amboa ny masina; ary aza atsipy eny amin’ny kisoa ny vatosoanareo, fandrao hanitsaka azy izy dia hifotitra ka hamiravira anareo.
  - type: heading
    content: Mangataka, mitady, mandondòna
  - type: heading
    content: Lio 11.9-13
  '7':
  - type: text
    content: 'Mangataha dia homena ianareo; mitadiava dia hahita ianareo; dondòny, dia hovohana ianareo. '
  '8':
  - type: text
    content: 'Fa izay rehetra mangataka no mahazo; ary izay mitady no mahita; ary izay mandondòna no hovohana. '
  '9':
  - type: text
    content: 'Fa iza moa aminareo raha angatahan’ny zanany mofo no hanome azy vato? '
