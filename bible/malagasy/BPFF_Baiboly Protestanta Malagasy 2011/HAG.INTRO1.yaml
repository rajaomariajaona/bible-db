document_id: HAG.INTRO1
type_code: plt
segments:
- type: usfm
  marker: imt1
  children:
  - type: text
    text: INDRAY MIJERY
- type: usfm
  marker: ip
  children:
  - type: text
    text: Ny Mpaminany Hagay sy Zakaria dia samy voalaza ao amin’ny Ezra 5.1 sy 6.14, ary samy mampirisika ny fananganana indray ny tempoly. Efa tamin’ny taona 538 tal JK ny Jiosy no nanomboka niverina avy tany Babilona ary efa nanomboka nanangana ny tempoly izay rava tamin’ny 587, kanefa vetivety dia kivy izy ka niraviravy tanana. Noho izany dia nitsangana ireo mpaminanin’Andriamanitra ka nanetsika ny olona hanao ny asa indray, koa nanomboka tamin’ny taona 520 tal JK izany, ary vita tamin’ny taona 516 ny tempoly vaovao.
- type: usfm
  marker: is1
  children:
  - type: text
    text: Ny votoatin’ny Boky
- type: usfm
  marker: ip
  children:
  - type: text
    text: Ny Boky dia misy hafatra samihafa entin’ny Mpaminany avy amin’Andriamanitra, mampirisika ireo mpitondra mba hanetsika ny asa indray. Ambaran’ny Mpaminany fa ny fahantran’ny vahoaka sy ny tsy fisian’ny vokatra dia noho izy ireo tsy mikarakara ny tempoly, fa ny fanamboarana ny trano fonenany avy no mahamaika azy. Ambarany fa ny tempoly vaovao dia ho be voninahitra lavitra noho ny taloha, ary mampanantena koa Izy fa hisy fiadanana sy fahombiazana raha mankatò sy miova fo izy. Ambarany koa fa i Zerobabela, governora, avy amin’ny taranak’i Davida, dia hahita hoavy mamirapiratra.
- type: usfm
  marker: iot
  children:
  - type: text
    text: Ny firafitry ny Boky
- type: usfm
  marker: io1
  children:
  - type: text
    text: 'Ny fahantrana sy ny tsy fahombiazan’ny vokatra, noho ny tsy fiheverana ny tranon’Andriamanitra: 1.1-14'
- type: usfm
  marker: io1
  children:
  - type: text
    text: 'Ny ho voninahitry ny tempoly vaovao: 2.1-9'
- type: usfm
  marker: io1
  children:
  - type: text
    text: 'Ny fitahiana noho ny hahavitan’ny tempoly vaovao: 2.10-19'
- type: usfm
  marker: io1
  children:
  - type: text
    text: 'Ny ho voninahitr’i Zerobabela governora, taranak’i Davida: 2.20-23'
