document_id: MAT.20
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ireo mpiasa tamin’ny ora farany
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Fa ny fanjakan’ny lanitra dia tahaka ny lehilahy tompon-trano iray, niainga vao maraina mba hanakarama mpiasa ho any an-tanim-boalobony. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary rehefa nifanekeny tamin’ny mpiasa fa ho '
  - type: usfm
    marker: w
    children:
    - type: text
      text: denaria
  - type: text
    text: ' iray isanandro ny karamany dia nasainy nankany amin’ny tanim-boalobony ireny. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Niainga indray izy tamin’ny ora fahatelo dia nahita ny sasany nipetra-potsiny teny an-tsena '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'ka hoy izy taminy: Mandehana koa ianareo mankany amin’ny tanim-boaloboka fa izay tokony ho izy no homeko anareo. Dia lasa ireny. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary niainga indray izy tamin’ny ora fahenina sy fahasivy ka niteny toy izany koa. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Rehefa tokony ho tamin’ny ora fahiraika amby folo dia niainga indray izy ka nahita ny sasany nipetra-potsiny dia hoy izy taminy: Nahoana ianareo no mipetra-potsiny eto mandritra ny andro? '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Hoy ireo taminy: Satria tsy nisy olona nanakarama anay. Dia hoy Ralehilahy taminy: Mandehana koa ianareo mankany amin’ny tanim-boaloboka. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Rehefa hariva ny andro dia hoy ny tompon’ny tanim-boaloboka tamin’ny mpitandrina ny raharahany: Antsoy ny mpiasa ka aloavy ny karamany: Atombohy amin’ireo farany mankany amin’ny voalohany. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary rehefa tonga ireo nokaramaina tamin’ny ora fahiraika amby folo dia samy denaria iray avy no azon’ny tsirairay. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Fa rehefa tonga ireo voalohany dia nanantena hahazo mihoatra izy; kanjo samy denaria iray avy ihany no azony. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Koa rehefa nahazo izany izy ireo dia nimonomonona tamin’ny tompon-trano ka niteny hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ireo olona farany ireo dia niasa ora iray monja, kanefa nataonao mitovy aminay izay niaritra ny fahatrotrahana sy ny hafanana. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Fa hoy izy tamin’ny iray: Ry sakaiza, tsy mba manao izay tsy rariny aminao aho; tsy denaria iray va no nifanekenao tamiko? '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Raiso ny anao ka mandehana; fa ilay farany dia tiako homena tahaka ny anao koa. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Tsy mahazo manao izay tiako hatao amin’ny ahy va aho? Ratsy va ny masonao satria tsara aho? '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Dia toy izany, ny farany dia ho voalohany ary ny voalohany dia ho farany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nilazan’i Jesosy fanintelony ny hahafatesany sy ny hitsanganany amin’ny maty
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mar 10.32-34; Lio 18.31-34
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary Jesosy rehefa niakatra ho any Jerosalema dia nitondra ny mpianatra roa amby folo lahy nihataka kely ka niteny taminy teny an-dalana hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Indro, miakatra ho any Jerosalema isika; ary ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Zanak’Olona
  - type: text
    text: ' hatolotra ho amin’ireo lehiben’ny mpisorona sy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpanoradalàna
  - type: text
    text: ', dia hohelohiny ho faty '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'ka hatolony amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jentilisa
  - type: text
    text: ' mba hataony ho fihomehezana sy hokapohiny ary hohomboany amin’ny hazofijaliana; nefa amin’ny andro fahatelo dia hatsangana.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fangatahana nataon’ny renin’ny zanak’i Zebedio
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mar 10.35-41
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Tamin’izany, nanatona an’i Jesosy ny renin’ny zanak’i Zebedio mbamin’ireo zanany lahy, dia niankohoka ka nangataka zavatra Taminy. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Hoy Izy taminy: Inona no irinao? Dia hoy Ravehivavy Taminy: Manomeza teny mba hipetrahan’ireto zanako roa lahy ireto ao amin’ny fanjakanao; koa ny iray dia ho eo amin’ny ankavananao ary ny iray dia ho eo amin’ny ankavianao. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Fa Jesosy namaly azy hoe: Tsy fantatrareo izay angatahinareo; hainareo va ny hisotro amin’ny kapoaka izay efa hisotroako? Hoy ireo Taminy: Hainay ihany. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Hoy Izy taminy: Hisotro amin’ny kapoakako tokoa ianareo; fa ny hipetraka eo ankavanako sy eo ankaviako dia tsy anjarako ny hanome izany; fa homena ho an’izay nanomanan’ny Raiko azy izany.'
- type: usfm
  marker: r
  children:
  - type: text
    text: Mar 10.42-45; Lio 22.24-37
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary nony nandre izany izy folo lahy dia tezitra noho ny nataon’izy mirahalahy. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Nefa Jesosy niantso azy ireo hankeo Aminy ka niteny hoe: Fantatrareo fa ny mpitondra eo amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jentilisa
  - type: text
    text: ' dia mampanompo azy mafy ary ny lehibeny dia manapaka azy fatratra. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Fa tsy mba ho toy izany aminareo; fa izay te ho lehibe aminareo dia ho mpanompo anareo; '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'ary izay te ho voalohany aminareo dia ho mpanomponareo. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Fa tahaka izany, ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Zanak’Olona
  - type: text
    text: ', tsy tonga mba hotompoina fa mba hanompo ka hanolotra ny ainy ho avotra hisolo ny maro.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nampahiratan’i Jesosy ny jamba roa lahy tao akaikin’i Jeriko
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mar 10.46-52; Lio 18.35-43; ampit. Mat 9.27-31
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Rehefa niala tao Jeriko izy ireo dia nisy vahoaka betsaka nanaraka Azy. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ary indreo, nisy jamba roa lahy nipetraka teo amoron-dalana, ary nony reny fa Jesosy no mandalo dia niantsoantso mafy izy ireo hoe: Mamindrà fo aminay, ry Tompo, Zanak’i Davida ô! '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ary nandrara azy ireo ny vahoaka mba hangina; nefa vao mainka niantsoantso izy hoe: Mamindrà fo aminay, ry Tompo, Zanak’i Davida ô! '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Ary Jesosy nijanona dia niantso azy ireo ka niteny taminy hoe: Inona no tianareo hataoko aminareo? '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Hoy ireo Taminy: Tompoko ô, ny mba hampahiratana ny masonay. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Onena azy ireo Jesosy ka nikasika ny masony; ary nahiratra niaraka tamin’izay izy ireo dia nanaraka an’i Jesosy.
