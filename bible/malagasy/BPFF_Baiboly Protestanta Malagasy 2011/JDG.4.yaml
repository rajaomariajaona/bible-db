document_id: JDG.4
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: I Debora sy i Baraka
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary nanao izay ratsy teo imason’NY TOMPO indray ny Zanak’Israely rehefa maty i Ehoda. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Koa NY TOMPO dia nivarotra azy ho eo an-tanan’i Jabina, mpanjakan’i Kanana, izay nanjaka tany Hazora. Ny komandin’ny miaramilany dia i Sisera izay nonina tany Haroseta-Goima. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Dia nitaraina tamin’NY TOMPO ny Zanak’Israely satria nanana kalesy vy fitondra miady sivinjato i Jabina; nampahory fatratra ny Zanak’Israely nandritra ny roapolo taona izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'I Debora mpaminanivavy, vadin’i Lapidota, no mpitsara teo amin’ny Israely tamin’izany andro izany. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary nipetraka teo ambanin’ny hazo palman’i Debora izy, teo anelanelan’i Rama sy Betela, tany amin’ny tany be havoana any Efraima; niakatra ho any aminy ny Zanak’Israely rehefa nisy raharaha hotsaraina. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary i Debora dia nampiantso an’i Baraka, zanak’i Abinoama, avy any Kadesy-Naftaly, ka niteny taminy hoe: Tsy efa nandidy anao va NY TOMPO, Andriamanitry ny Israely hoe: Mandehana ka mankanesa any amin’ny tendrombohitra Tabara ary mitondrà iray alin-dahy avy amin’ny taranak’i Naftaly sy i Zebolona hiaraka aminao? '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Hotarihiko ho eo aminao, eo amoron’ny ony Kisona, i Sisera, komandin’ny miaramilan’i Jabina mbamin’ny kalesy fitondrany miady sy ny vahoakany marobe; dia hanolotra azy eo an-tananao Aho. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary hoy i Baraka tamin’i Debora: Raha handeha hiaraka amiko ianao dia handeha aho; fa raha tsy handeha hiaraka amiko kosa ianao dia tsy handeha aho. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Hoy kosa izy: Handeha hiaraka aminao ihany aho; kanefa tsy ho voninahitrao izao halehanao izao, satria ho eo an-tanam-behivavy no hivarotan’NY TOMPO an’i Sisera. Dia niainga i Debora ka nandeha niaraka tamin’i Baraka hankany Kadesy. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ary nantsoin’i Baraka ho any Kadesy ny Zebolona sy ny Naftaly; dia nisy iray alin-dahy niakatra nanaraka azy; ary niara-niakatra taminy i Debora.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary i Hebera kenita dia efa nisaraka tamin’ny Kenita izay avy amin’ny taranak’i Hobaba, rafozan’i Mosesy; tonga hatrany akaikin’ny hazo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: terebinta
  - type: text
    text: ' ao Zananima izay eo anilan’i Kadesy, izy ka namelatra ny tranolainy tao.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary nisy nilaza tamin’i Sisera fa i Baraka, zanak’i Abinoama, dia niakatra any amin’ny tendrombohitra Tabara. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dia nantsoin’i Sisera ny kalesiny rehetra, dia kalesy vy fitondra miady sivinjato sy ny vahoaka rehetra izay niaraka taminy avy tany Haroseta-Goima, hankany amin’ny ony Kisona. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary hoy i Debora tamin’i Baraka: Miakara, fa anio no andro hanoloran’NY TOMPO an’i Sisera ho eo an-tananao. Tsy mandeha eo anoloanao va NY TOMPO? Dia nidina avy tany amin’ny tendrombohitra Tabara i Baraka sy ny olona iray alina nanaraka azy. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Dia nampifanaritahin’NY TOMPO tamin’ny lelan-tsabatra teo anoloan’i Baraka i Sisera sy ny kalesy fitondra miady rehetra ary ny miaramila rehetra. Ary nidina niala tamin’ny kalesy i Sisera ka nandositra nandeha an-tongotra. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ary i Baraka dia nanenjika ny kalesy sy ny miaramila hatrany Haroseta-Goima; dia lavon’ny lelan-tsabatra avokoa ny miaramilan’i Sisera rehetra; tsy nisy niangana na dia iray akory aza.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary i Sisera dia nandositra an-tongotra ho any amin’ny tranolain’i Jaela, vadin’i Hebera kenita; nihavana mantsy i Jabina, mpanjakan’i Hazora, sy ny mpianakavin’i Hebera kenita. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Dia nivoaka hitsena an’i Sisera i Jaela ka niteny taminy hoe: Miakara, tompokolahy, miakara atỳ amiko; aza matahotra! Ary rehefa niakatra ho ao aminy tao an-day izy dia norakofany lamba firakotra. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary hoy i Sisera taminy: Miangavy anao aho, mba omeo rano kely aho hosotroiko fa mangetaheta aho izany. Dia nanokatra siny hoditra nisy ronono izy ka nomeny hosotroiny; dia norakofany indray izy. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Hoy indray izy taminy: Mitsangàna eo am-baravaran’ny tranolay ka raha toa ka misy avy ary manontany anao hoe: Misy olona va ato? Dia ataovy hoe: Tsia. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Dia naka tsatòkan-day i Jaela, vadin’i Hebera, sady nitondra tantanana teny an-tanany ka nitsaitsaika nankeo aminy; dia natsatony tamin’ny fihirifany ny tsatòkan-day ka nihatra tamin’ny tany; fa renoky ny torimaso noho ny hasasarana i Sisera dia maty. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary indro, avy i Baraka nanenjika an’i Sisera, dia nivoaka hitsena azy i Jaela ka niteny taminy hoe: Avia atỳ, fa hasehoko anao ny lehilahy izay tadiavinao. Ary rehefa tonga tao aminy izy, dia indro, niampatra teo ny fatin’i Sisera, ary teo amin’ny fihirifany ny tsatòkan-day.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Naetrin’Andriamanitra teo anoloan’ny Zanak’Israely i Jabina, mpanjakan’i Kanana, tamin’izany andro izany. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Ary nampitomboin’ny Zanak’Israely hatrany hatrany ny famoretany an’i Jabina, mpanjakan’i Kanana, mandra-pandringany azy.
