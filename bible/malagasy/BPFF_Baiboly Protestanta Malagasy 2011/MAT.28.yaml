document_id: MAT.28,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fitsanganan’i Jesosy tamin’ny maty
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mar 16.1-8; Lio 24.1-11; Jao 20.1, 11-18
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Tamin’ny alin’ny Sabata, raha vao nazava ratsy ny andro voalohany amin’ny herinandro, dia avy hijery ny fasana i Maria Magdalena sy ilay Maria iray hafa. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Dia hoy Jesosy: Aza matahotra; fa mandehana, ilazao ny rahalahiko mba hankany Galilia; fa any no hahitany Ahy.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fitantaran’ny mpiambina
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ary nony lasa izy ireo dia indreny ny mpiambina sasany dia nankany an-tanàna ka nilaza tamin’ny lehiben’ny mpisorona ny zavatra rehetra izay niseho. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Ary rehefa tafavory izy ireo mbamin’ny loholona dia nikaon-doha ka nanome vola be ny miaramila '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'sady niteny hoe: Lazao hoe: Ny mpianany no tonga ka nangalatra Azy alina, raha sendra natory izahay; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'ary raha misy milaza izany amin’ny governora, izahay no handresy lahatra azy ka hanao izay tsy hampaninona anareo. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Dia nandray ny vola izy ireo ka nanatanteraka ny teny nomena azy; ary izany teny izany dia naelin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jiosy
    - type: text
      text: ' mandraka androany.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Naniraka ny mpianany Ilay nitsangana tamin’ny maty
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Ary ny mpianatra iraika amby folo lahy dia nankany Galilia, ho any amin’ilay tendrombohitra nasain’i Jesosy halehany. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Ary nony nahita Azy izy ireo dia niankohoka, nefa ny sasany dia nisalasala. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Ary nanatona Jesosy dia niteny taminy hoe: Efa nomena Ahy ny fahefana rehetra any an-danitra sy etỳ an-tany; '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'koa mandehana ianareo, dia ataovy mpianatra ny firenena rehetra, manao batisa azy ho amin’ny anaran’ny Ray sy ny Zanaka ary ny Fanahy Masina, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Dia indro, nisy horohoron-tany mafy; fa nisy anjelin’ny Tompo nidina avy tany an-danitra, nankeo ka nanakodia ny vato, dia nipetraka teo amboniny. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: sady mampianatra azy hitandrina izay rehetra nandidiako anareo; ary indro Aho momba anareo mandrakariva, ambara-pahatongan’ny fahataperan’izao tontolo izao.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Ny fijery azy dia tahaka ny tselatra, ary ny akanjony dia fotsy tahaka ny orampanala; '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'ary tora-kovitra noho ny tahotra azy ny mpiambina ka tonga tahaka ny maty. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ary ilay anjely dia niteny tamin’ireo vehivavy hoe: Aza matahotra ianareo, fantatro fa Jesosy, ilay nohomboana tamin’ny hazofijaliana, no tadiavinareo. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Tsy ato Izy fa efa nitsangana araka izay efa nolazainy. Avia ka jereo ny toerana nandriany. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Dia mandehana haingana ka lazao amin’ny mpianany fa efa nitsangana tamin’ny maty Izy; ary indro, mialoha anareo any Galilia Izy; any no hahitanareo Azy; indro, efa nilaza taminareo aho.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Dia niala haingana tamin’ny fasana izy ireo sady natahotra no faly indrindra, ary nihazakazaka hilaza amin’ny mpianany. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Nefa indro Jesosy nifanena taminy sady niteny hoe: Finaritra. Ary nanatona izy ireo dia nihazona ny tongony ka niankohoka teo anatrehany. '
