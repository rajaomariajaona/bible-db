document_id: NUM.10,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ireo trompetra volafotsy
  - type: text
    content: 'Hoy NY TOMPO tamin’i Mosesy: '
  '10':
  - type: text
    content: Amin’ny andro fifalianareo sy amin’ny fotoam-pivavahanareo ary amin’ny voaloham-bolanareo no hitsofanareo ny trompetra, raha manao ny fanatitra dorana manontolo sy ny fanati-pihavanana ho fampahatsiarovana ho anareo ianareo eo anatrehan’Andriamanitrareo, satria Izaho no TOMPO Andriamanitrareo.
  - type: heading
    content: Ny filaharan’ireo foko rehefa mifindra toerana ny Zanak’Israely
  '11':
  - type: text
    content: 'Tamin’ny andro faharoapolo tamin’ny volana faharoa, tamin’ny taona faharoa, no niakaran’ny rahona niala teo ambonin’ny tabernakelin’ny Vavolombelona. '
  '12':
  - type: text
    content: 'Dia niainga tany an-tany efitr’i Sinay ny Zanak’Israely ka nandroso, ary ny rahona dia nijanona tany amin’ny tany efitra Parana. '
  '13':
  - type: text
    content: 'Dia izany no niaingany voalohany araka ny didin’NY TOMPO izay nampitondrainy an’i Mosesy. '
  '14':
  - type: text
    content: 'Ny fanevan’ny tobin’ny taranak’i Joda no niainga voalohany, araka ny antokony. Ny mpifehy ny antokony dia i Nasona, zanak’i Aminadaba. '
  '15':
  - type: text
    content: 'Ny mpifehy ny antokon’ny taranak’Isakara dia i Netanela, zanak’i Zoara. '
  '16':
  - type: text
    content: Ny mpifehy ny antokon’ny taranak’i Zebolona dia i Eliaba, zanak’i Helona.
  '17':
  - type: text
    content: 'Dia nahorona ny '
  - type: text
    content: tabernakely
  - type: text
    content: ' ka niainga ny taranak’i Gersona sy ny taranak’i Merary, nitondra ny tabernakely. '
  '18':
  - type: text
    content: 'Niainga indray ny fanevan’ny tobin’i Robena araka ny antokony; ny mpifehy ny antokony dia i Elizora, zanak’i Sedeora. '
  '19':
  - type: text
    content: 'Ny mpifehy ny antokon’ny zanak’i Simeona dia i Selomiela, zanak’i Zorisaday. '
  '2':
  - type: text
    content: 'Manaova trompetra volafotsy roa; voatefy no hanaovanao azy. Ho fiantsoanao ny fiangonana sy ho fampiainganao ny toby ireo. '
  '20':
  - type: text
    content: Ny mpifehy ny antokon’ny taranak’i Gada dia i Eliasafa, zanak’i Deoela.
  '21':
  - type: text
    content: 'Dia niainga ny Kehatita, nitondra ny fitoerana masina; ary nisy nanangana ny tabernakely mandra-piavin’ireo. '
  '22':
  - type: text
    content: 'Niainga koa ny fanevan’ny tobin’ny taranak’i Efraima, araka ny antokony; ary ny mpifehy ny antokony dia i Elisama, zanak’i Amihoda. '
  '23':
  - type: text
    content: 'Ny mpifehy ny antokon’ny taranak’i Manase dia i Gamaliela, zanak’i Pedazora. '
  '24':
  - type: text
    content: Ny mpifehy ny antokon’ny taranak’i Benjamina dia i Abidana, zanak’i Gideony.
  '25':
  - type: text
    content: 'Dia niainga ny fanevan’ny tobin’ny taranak’i Dana, izay vodilalan’ny toby rehetra, araka ny antokony; ary ny mpifehy ny antokony dia i Ahiezera, zanak’i Amisaday. '
  '26':
  - type: text
    content: 'Ny mpifehy ny antokon’ny taranak’i Asera dia i Pagiela, zanak’i Okrana. '
  '27':
  - type: text
    content: 'Ary ny mpifehy ny antokon’ny taranak’i Naftaly dia i Ahira, zanak’i Enana. '
  '28':
  - type: text
    content: Izany filaharana izany no niaingan’ny Zanak’Israely, araka ny antokony avy. Dia niainga izy.
  - type: heading
    content: Mitady mpitari-dalana i Mosesy
  '29':
  - type: text
    content: 'Dia hoy i Mosesy tamin’i Hobaba, zanak’i Regoela ilay Midianita, rafozan’i Mosesy: Izahay izao dia miainga hankany amin’ny tany izay nolazain’NY TOMPO hoe: Homeko anareo izany. Andeha ianao hiaraka aminay dia hasianay soa; fa NY TOMPO efa nilaza soa ny amin’ny Israely. '
  '3':
  - type: text
    content: 'Rehefa tsofina ireo dia hivory eo aminao, eo anoloan’ny varavaran’ny '
  - type: text
    content: tranolay fihaonana
  - type: text
    content: ', ny fiangonana manontolo. '
  '30':
  - type: text
    content: 'Fa hoy kosa izy taminy: Tsy handeha aho; fa ho any amin’ny taniko sy ny havako aho. '
  '31':
  - type: text
    content: 'Dia hoy i Mosesy: Aza ilaozanao re izahay; fa fantatrao izay toerana tokony hitobianay atỳ an-tany efitra ka ianao no ho masonay. '
  '32':
  - type: text
    content: Ary raha miaraka aminay ianao dia izay soa hataon’NY TOMPO aminay no hataonay aminao.
  '33':
  - type: text
    content: 'Dia niainga avy tany amin’ny tendrombohitry NY TOMPO izy ireo ka nandeha lalan-kateloana; ary ny vata misy ny faneken’NY TOMPO dia nandroso nialoha azy lalan-kateloana mba hitady toerana hialan-tsasatra ho an’ny olona. '
  '34':
  - type: text
    content: Ary ny rahon’NY TOMPO dia teo amboniny nony andro, tamin’ny niaingany niala tamin’ny nitobiany.
  '35':
  - type: text
    content: 'Rehefa niainga ny '
  - type: text
    content: vata misy ny Fanekena
  - type: text
    content: ' dia hoy i Mosesy:'
  - type: text
    content: Mitsangàna, TOMPO ô!
  - type: text
    content: Aoka hiely ny fahavalonao!
  - type: text
    content: Aoka handositra ny tavanao izay mankahala Anao!
  '36':
  - type: text
    content: 'Rehefa nijanona kosa ny vata misy ny Vavolombelona dia hoy izy:'
  - type: text
    content: Miverena, TOMPO ô, ho amin’ny Israely tsy omby alinalina!
  '4':
  - type: text
    content: 'Fa raha ny iray ihany no tsofina dia ireo lohan’ny foko izay mpifehy arivo amin’ny Israely ihany no hivory eo aminao. '
  '5':
  - type: text
    content: 'Fa rehefa mitsoka ho fanairana ianareo dia hiainga ny toby izay milasy eo atsinanana. '
  '6':
  - type: text
    content: 'Rehefa mitsoka ny fanairana fanindroany ianareo dia hiainga ny toby izay milasy eo atsimo; fanairana no hatao fiaingany. '
  '7':
  - type: text
    content: 'Fa raha hamory ny fiangonana kosa ianareo dia hitsoka fotsiny fa tsy hanao fanairana. '
  '8':
  - type: text
    content: 'Ny mpisorona, zanak’i Arona, no hitsoka ny trompetra. Ho lalàna maharitra ho anareo hatramin’ny taranakareo fara aman-dimby izany. '
  '9':
  - type: text
    content: 'Ary raha misy ady eo amin’ny taninareo ka mandeha hiady amin’ny fahavalo izay mampahory anareo ianareo dia hitsoka ireo trompetra ireo ho fanairana ianareo dia hotsarovana eo anatrehan’NY TOMPO Andriamanitrareo ianareo ka hovonjena amin’ny fahavalonareo. '
