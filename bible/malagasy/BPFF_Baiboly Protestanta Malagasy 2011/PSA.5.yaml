document_id: PSA.5,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Vavaky ny olona voaray ao amin’ny tranon’NY TOMPO
  - type: text
    content: Ho an’ny mpiventy hira. Hampiarahina amin’ny sodina. Salamo nataon’i Davida.
  - type: text
    content: TOMPO ô, henoy ny teniko,
  - type: text
    content: fantaro ny fisentoako!
  '10':
  - type: text
    content: Melohy izy, Andriamanitra ô!
  - type: text
    content: Aoka ny fikasany ihany no handavo azy!
  - type: text
    content: Roahy izy noho ny habetsahan’ny fahotany,
  - type: text
    content: satria efa nikomy Taminao.
  '11':
  - type: text
    content: Dia hifaly izay rehetra mialoka Aminao;
  - type: text
    content: hihoby mandrakariva izy.
  - type: text
    content: Hiaro azy Ianao dia ho ravoravo Aminao
  - type: text
    content: ireo izay tia ny anaranao.
  '12':
  - type: text
    content: Fa Ianao TOMPO ô dia mitahy ny marina;
  - type: text
    content: fankasitrahana no ataonao toy ny ampinga lehibe manodidina azy.
  '2':
  - type: text
    content: Henoy ny feon’ny fitarainako, ry Mpanjakako sy Andriamanitro ô!
  - type: text
    content: Fa Aminao no ivavahako.
  '3':
  - type: text
    content: TOMPO ô, amin’ny maraina no andrenesanao ny feoko;
  - type: text
    content: amin’ny maraina no manomana ny foko ho Anao aho ary miandry Anao.
  '4':
  - type: text
    content: Fa tsy Andriamanitra mankasitraka izay ratsy Ianao
  - type: text
    content: ary tsy mba hitoetra eo Aminao ny ratsy.
  '5':
  - type: text
    content: Tsy mahazo mijanona eo imasonao ny mpirehareha;
  - type: text
    content: halanao ny mpanao ratsy rehetra.
  '6':
  - type: text
    content: Haringanao ny mpiteny lainga.
  - type: text
    content: Ataon’NY TOMPO ho zava-betaveta ny olona mpandatsa-dra sy mpamitaka.
  '7':
  - type: text
    content: Fa izaho kosa dia hiditra ao amin’ny tranonao noho ny haben’ny famindramponao;
  - type: text
    content: hiankohoka manatrika ny lapanao masina amin’ny fahatahorana Anao aho.
  '8':
  - type: text
    content: TOMPO ô, tariho amin’ny fahamarinanao aho fa misy ny mpampahory ahy;
  - type: text
    content: ataovy marina eo anoloako ny lalanao.
  '9':
  - type: text
    content: Fa tsy misy azo itokiana ny aloaky ny vavany.
  - type: text
    content: Fandravana no ao anatiny,
  - type: text
    content: fasana misokatra ny tendany
  - type: text
    content: ary mandambolambo ny fiteniny.
