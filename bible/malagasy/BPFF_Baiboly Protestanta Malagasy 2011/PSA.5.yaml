document_id: PSA.5
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Vavaky ny olona voaray ao amin’ny tranon’NY TOMPO
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: Ho an’ny mpiventy hira. Hampiarahina amin’ny sodina. Salamo nataon’i Davida.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: TOMPO ô, henoy ny teniko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fantaro ny fisentoako!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Henoy ny feon’ny fitarainako, ry Mpanjakako sy Andriamanitro ô!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa Aminao no ivavahako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: TOMPO ô, amin’ny maraina no andrenesanao ny feoko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: amin’ny maraina no manomana ny foko ho Anao aho ary miandry Anao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Fa tsy Andriamanitra mankasitraka izay ratsy Ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy mba hitoetra eo Aminao ny ratsy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Tsy mahazo mijanona eo imasonao ny mpirehareha;
- type: usfm
  marker: q1
  children:
  - type: text
    text: halanao ny mpanao ratsy rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Haringanao ny mpiteny lainga.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ataon’NY TOMPO ho zava-betaveta ny olona mpandatsa-dra sy mpamitaka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Fa izaho kosa dia hiditra ao amin’ny tranonao noho ny haben’ny famindramponao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hiankohoka manatrika ny lapanao masina amin’ny fahatahorana Anao aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: TOMPO ô, tariho amin’ny fahamarinanao aho fa misy ny mpampahory ahy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ataovy marina eo anoloako ny lalanao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Fa tsy misy azo itokiana ny aloaky ny vavany.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fandravana no ao anatiny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fasana misokatra ny tendany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mandambolambo ny fiteniny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Melohy izy, Andriamanitra ô!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aoka ny fikasany ihany no handavo azy!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Roahy izy noho ny habetsahan’ny fahotany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria efa nikomy Taminao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Dia hifaly izay rehetra mialoka Aminao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hihoby mandrakariva izy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hiaro azy Ianao dia ho ravoravo Aminao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ireo izay tia ny anaranao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Fa Ianao TOMPO ô dia mitahy ny marina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fankasitrahana no ataonao toy ny ampinga lehibe manodidina azy.
