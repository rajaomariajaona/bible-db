document_id: ISA.18
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fampitandremana ireo masoivohon’i Kosy
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Loza! Ry tany alokalofan’ny elatra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay any andafin’ny onin’i Kosy,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: izay mandefa iraka eny ambonin’ny ranomasina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ao anaty lakan-jozoro ambonin’ny rano ka manafatra azy hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mandehana, ry iraka haingam-pandeha,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho any amin’ny firenena misy olona lava tsanganana sady mandimandina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: any amin’ny olona mahatahotra hatramin’ny niandohany ka mandraka ankehitriny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ny firenena matanjaka be sady mahery setra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay vakivakin’ny ony maro ny taniny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ry mponina rehetra amin’izao tontolo izao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ry mpitoetra etỳ ambonin’ny tany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mijere ianareo rehefa misy faneva atsangana eo an-tampon-tendrombohitra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary rehefa misy anjomara tsofina dia mihainoa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Fa izao no nolazain’NY TOMPO tamiko:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hangina Aho aloha ka hijery eto amin’ny fitoerako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tahaka ny hafanan’ny masoandro mipoaka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tahaka ny ranonando amin’ny hafanan’ny fararano.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Fa raha mbola tsy tonga ny fararano, rehefa tapitra ny fitsimohany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: rehefa tonga voa ny voniny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia horantsanany amin’ny fanetezam-boaloboka ny rantsany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hotapahiny sy hesoriny ny sakeliny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Dia hafoy avokoa izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka ho an’ny vorona mpihaza eny an-tendrombohitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ho an’ny biby eny ambonin’ny tany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny vorona mpihaza dia handany ny fahavaratra any
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny bibidia rehetra ambonin’ny tany dia handany ny ririnina any.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Amin’izany andro izany dia hisy fanomezana hoentina ho an’Andriamanitra, Tompon’izao rehetra izao, avy amin’ny firenena lava tsanganana sady mandimandina, firenena mahatahotra hatramin’ny niandohany ka mandraka ankehitriny, firenena matanjaka be sady mahery setra, izay vakivakin’ny ony maro ny taniny, ho ao amin’ny fitoeran’ny anaran’Andriamanitra, Tompon’izao rehetra izao, dia ny tendrombohitra '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Ziona
  - type: text
    text: .
