document_id: ISA.18,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Fampitandremana ireo masoivohon’i Kosy
  - type: text
    content: Loza! Ry tany alokalofan’ny elatra,
  - type: text
    content: izay any andafin’ny onin’i Kosy,
  '2':
  - type: text
    content: izay mandefa iraka eny ambonin’ny ranomasina,
  - type: text
    content: 'ao anaty lakan-jozoro ambonin’ny rano ka manafatra azy hoe:'
  - type: text
    content: Mandehana, ry iraka haingam-pandeha,
  - type: text
    content: ho any amin’ny firenena misy olona lava tsanganana sady mandimandina,
  - type: text
    content: any amin’ny olona mahatahotra hatramin’ny niandohany ka mandraka ankehitriny,
  - type: text
    content: dia ny firenena matanjaka be sady mahery setra,
  - type: text
    content: izay vakivakin’ny ony maro ny taniny.
  '3':
  - type: text
    content: Ry mponina rehetra amin’izao tontolo izao,
  - type: text
    content: ry mpitoetra etỳ ambonin’ny tany,
  - type: text
    content: mijere ianareo rehefa misy faneva atsangana eo an-tampon-tendrombohitra;
  - type: text
    content: ary rehefa misy anjomara tsofina dia mihainoa.
  '4':
  - type: text
    content: 'Fa izao no nolazain’NY TOMPO tamiko:'
  - type: text
    content: Hangina Aho aloha ka hijery eto amin’ny fitoerako,
  - type: text
    content: tahaka ny hafanan’ny masoandro mipoaka,
  - type: text
    content: tahaka ny ranonando amin’ny hafanan’ny fararano.
  '5':
  - type: text
    content: Fa raha mbola tsy tonga ny fararano, rehefa tapitra ny fitsimohany,
  - type: text
    content: rehefa tonga voa ny voniny,
  - type: text
    content: dia horantsanany amin’ny fanetezam-boaloboka ny rantsany,
  - type: text
    content: ary hotapahiny sy hesoriny ny sakeliny.
  '6':
  - type: text
    content: Dia hafoy avokoa izy
  - type: text
    content: ka ho an’ny vorona mpihaza eny an-tendrombohitra
  - type: text
    content: sy ho an’ny biby eny ambonin’ny tany;
  - type: text
    content: ny vorona mpihaza dia handany ny fahavaratra any
  - type: text
    content: ary ny bibidia rehetra ambonin’ny tany dia handany ny ririnina any.
  '7':
  - type: text
    content: 'Amin’izany andro izany dia hisy fanomezana hoentina ho an’Andriamanitra, Tompon’izao rehetra izao, avy amin’ny firenena lava tsanganana sady mandimandina, firenena mahatahotra hatramin’ny niandohany ka mandraka ankehitriny, firenena matanjaka be sady mahery setra, izay vakivakin’ny ony maro ny taniny, ho ao amin’ny fitoeran’ny anaran’Andriamanitra, Tompon’izao rehetra izao, dia ny tendrombohitra '
  - type: text
    content: Ziona
  - type: text
    content: .
