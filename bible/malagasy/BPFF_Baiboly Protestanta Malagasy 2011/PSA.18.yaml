document_id: PSA.18
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Vavaky ny mpanjaka taorianan’ny fandresena azony
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 2Sam 22.1-51
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: Ho an’ny mpiventy hira. Salamo nataon’i Davida, mpanompon’NY TOMPO, izay nilaza tamin’NY TOMPO ny tonon’ity hira ity tamin’ny andro namonjen’NY TOMPO azy tamin’ny tanan’ny fahavalony rehetra, indrindra fa tamin’ny tanan’i Saoly.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Hoy izy:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mamiko indrindra Ianao, RY TOMPO heriko ô!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: NY TOMPO no harambatoko sy manda fiarovana ho ahy ary Mpamonjy ahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Andriamanitro, vatolampy ialofako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ampingako ary '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tandroka
  - type: text
    text: ' famonjena ahy sy fiarovana avo ho ahy.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Miantso fiderana NY TOMPO aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia vonjena ho afaka amin’ny fahavaloko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Nihodidina tamiko ny famatoran’ny fahafatesana
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary nampahatahotra ahy ny riaky ny fahalevonana;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'nihodidina tamiko ny famatoran’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: fitoeran’ny maty
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary nisakana ahy ny fandriky ny fahafatesana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Fony azom-pahoriana aho dia niantso NY TOMPO;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, Andriamanitro no nitarainako;
- type: usfm
  marker: q1
  children:
  - type: text
    text: nihaino ny feoko tao an-tempoliny Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tonga teo an-tsofiny ny fitarainako teo anatrehany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Dia nihozongozona sy nihorohoro ny tany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary nihorohoro ny fanambanin’ny tendrombohitra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, nihozongozona ireo satria tezitra NY TOMPO.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Nisy setroka nisavoana teo am-bavorony
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary afo mandevona avy teo am-bavany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka nisy vainafo nidedadeda avy aminy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Dia naondriny ny lanitra ka nidina Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary haizim-pito no teo ambanin’ny tongony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Nitaingina '
  - type: usfm
    marker: w
    children:
    - type: text
      text: kerobima
  - type: text
    text: ' Izy ka nanidina;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, nanidina haingana tamin’ny elatry ny rivotra Izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Nanao ny maizina ho fiereny sy ho tranony manodidina Azy Izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia rano lalina ngalingaly sy rahona matevina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ary teo amin’ny famirapiratana teo anoloany dia nandalo ny rahony matevina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny havandra sy ny vainafo koa!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Dia nampikotroka tany an-danitra NY TOMPO,
- type: usfm
  marker: q1
  children:
  - type: text
    text: niloa-peo tamin’ny havandra sy ny vainafo ny Avo Indrindra
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Dia nandefa ny zana-tsipìkany Izy ka nampiely ny fahavaloko
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary nampandeha tselatra be ka nampifanaritaka azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Dia niseho ny masondrano
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary afa-tsarona ny fanambanin’ny tany
- type: usfm
  marker: q1
  children:
  - type: text
    text: noho ny teny mafy nataonao, TOMPO ô,
- type: usfm
  marker: q1
  children:
  - type: text
    text: noho ny fifofofofon’ny fofonain’ny vavoronao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Nanatsotra ny tanany avy tany ambony Izy ka nandray ahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nanintona ahy niala tamin’ny ranobe Izy;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: nanafaka ahy tamin’ny fahavaloko mahery
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy tamin’izay nankahala ahy Izy satria mahery noho izaho ireny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Nisakana ahy ireny tamin’ny andro nahitako loza,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa NY TOMPO no Mpanohana ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Nitondra ahy ho any amin’ny malalaka Izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: nanafaka ahy Izy satria tiany aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Nanisy soa ahy araka ny fahamarinako NY TOMPO;
- type: usfm
  marker: q1
  children:
  - type: text
    text: araka ny fahadiovan’ny tanako no namaliany ahy;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: fa nitandrina ny lalan’NY TOMPO aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy mba nanao ratsy hanalavirana an’Andriamanitro.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ny fitsipiny rehetra dia teo anatrehako
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny lalànany dia tsy mba nampialaiko tamiko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Tsy nanan-tsiny Taminy aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady niaro tena tsy ho azon’ny fahotana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Koa namaly ahy araka ny fahamarinako NY TOMPO,
- type: usfm
  marker: q1
  children:
  - type: text
    text: araka ny fahadiovan’ny tanako teo imasony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Amin’ny olona mahatoky no isehoanao fa mahatoky,
- type: usfm
  marker: q1
  children:
  - type: text
    text: amin’ny tena olona marina no isehoanao fa marina,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: amin’ny olona madio no isehoanao fa madio
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary amin’ny mpiolakolaka kosa no isehoanao fa lalin-tsaina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Fa Ianao no mamonjy ny olona ory
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny mason’ny mpianjonanjona kosa dia aetrinao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Fa Ianao no mampirehitra ny jiroko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: NY TOMPO Andriamanitro no mampahazava ny fahamaizinako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Fa Ianao no ahazoako mihazakazaka hamely ny miaramila iray toko
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary Andriamanitro no ahazoako mitsambikina mihoatra ny manda.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Raha ny amin’Andriamanitra dia tsy manan-tsiny ny lalany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: voazaha toetra ny tenin’NY TOMPO;
- type: usfm
  marker: q1
  children:
  - type: text
    text: NY TOMPO no ampingan’izay rehetra mialoka Aminy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Fa iza no Andriamanitra afa-tsy NY TOMPO?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Iza no Vatolampy afa-tsy Andriamanitsika?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Izany Andriamanitra izany no mampisikina hery ahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy mampanan-tsiny ny alehako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Manao ny tongotro ho tahaka ny an’ny dieravavy Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka mampitoetra ahy eo amin’ny havoana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Mampianatra ny tanako hiady Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka mahay manenjana ny tsipìka varahina ny sandriko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Manome ahy ny ampingan’ny famonjenao Ianao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny tananao ankavanana no manohana ahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny fahamoram-panahinao no mahalehibe ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Halalahinao ny lalana hodiaviko
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy mangovitra ny hato-tongotro.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Manenjika ny fahavaloko aho ka mahatratra azy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy miverina aho raha tsy mahalany ritra azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Mamely mafy azy aho ka tsy afa-mitsangana izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: lavo eo ambanin’ny tongotro izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Mampisikina ahy hery hoenti-miady Ianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: alefitrao ho ambaniko izay mitsangana hamely ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Ataonao miamboho ahy ny fahavaloko
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka aringako izay mankahala ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: Mitaraina izy nefa tsy misy mpamonjy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Miantso NY TOMPO izy nefa tsy mamaly azy Izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: Torotoroiko madinika tahaka ny vovoka entin’ny rivotra izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tahaka ny fanary fotaka eny an-dalambe no fanariako azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: Mamonjy ahy amin’ny fifandiran’ny olona Ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary manandratra ahy ho lehiben’ny firenen-tsamihafa;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny firenena tsy fantatro aza dia manompo ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: Raha vao mahare ny lazako izy dia manoa ahy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mikoy ahy ny hafa firenena;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: mihaketraka ny hafa firenena
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka miala amin-kovitra avy ao amin’ny fiarovany mafy.
- type: usfm
  marker: q1
  children:
  - type: usfm
