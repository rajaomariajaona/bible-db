document_id: PSA.18,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Vavaky ny mpanjaka taorianan’ny fandresena azony
  - type: heading
    content: 2Sam 22.1-51
  - type: text
    content: Ho an’ny mpiventy hira. Salamo nataon’i Davida, mpanompon’NY TOMPO, izay nilaza tamin’NY TOMPO ny tonon’ity hira ity tamin’ny andro namonjen’NY TOMPO azy tamin’ny tanan’ny fahavalony rehetra, indrindra fa tamin’ny tanan’i Saoly.
  - type: text
    content: 'Hoy izy:'
  - type: text
    content: Mamiko indrindra Ianao, RY TOMPO heriko ô!
  '10':
  - type: text
    content: 'Nitaingina '
  - type: text
    content: kerobima
  - type: text
    content: ' Izy ka nanidina;'
  - type: text
    content: eny, nanidina haingana tamin’ny elatry ny rivotra Izy.
  '11':
  - type: text
    content: Nanao ny maizina ho fiereny sy ho tranony manodidina Azy Izy,
  - type: text
    content: dia rano lalina ngalingaly sy rahona matevina.
  '12':
  - type: text
    content: Ary teo amin’ny famirapiratana teo anoloany dia nandalo ny rahony matevina,
  - type: text
    content: ny havandra sy ny vainafo koa!
  '13':
  - type: text
    content: Dia nampikotroka tany an-danitra NY TOMPO,
  - type: text
    content: niloa-peo tamin’ny havandra sy ny vainafo ny Avo Indrindra
  '14':
  - type: text
    content: Dia nandefa ny zana-tsipìkany Izy ka nampiely ny fahavaloko
  - type: text
    content: ary nampandeha tselatra be ka nampifanaritaka azy.
  '15':
  - type: text
    content: Dia niseho ny masondrano
  - type: text
    content: ary afa-tsarona ny fanambanin’ny tany
  - type: text
    content: noho ny teny mafy nataonao, TOMPO ô,
  - type: text
    content: noho ny fifofofofon’ny fofonain’ny vavoronao.
  '16':
  - type: text
    content: Nanatsotra ny tanany avy tany ambony Izy ka nandray ahy,
  - type: text
    content: nanintona ahy niala tamin’ny ranobe Izy;
  '17':
  - type: text
    content: nanafaka ahy tamin’ny fahavaloko mahery
  - type: text
    content: sy tamin’izay nankahala ahy Izy satria mahery noho izaho ireny.
  '18':
  - type: text
    content: Nisakana ahy ireny tamin’ny andro nahitako loza,
  - type: text
    content: nefa NY TOMPO no Mpanohana ahy.
  '19':
  - type: text
    content: Nitondra ahy ho any amin’ny malalaka Izy;
  - type: text
    content: nanafaka ahy Izy satria tiany aho.
  '2':
  - type: text
    content: NY TOMPO no harambatoko sy manda fiarovana ho ahy ary Mpamonjy ahy,
  - type: text
    content: Andriamanitro, vatolampy ialofako,
  - type: text
    content: 'ampingako ary '
  - type: text
    content: tandroka
  - type: text
    content: ' famonjena ahy sy fiarovana avo ho ahy.'
  '20':
  - type: text
    content: Nanisy soa ahy araka ny fahamarinako NY TOMPO;
  - type: text
    content: araka ny fahadiovan’ny tanako no namaliany ahy;
  '21':
  - type: text
    content: fa nitandrina ny lalan’NY TOMPO aho
  - type: text
    content: ary tsy mba nanao ratsy hanalavirana an’Andriamanitro.
  '22':
  - type: text
    content: Ny fitsipiny rehetra dia teo anatrehako
  - type: text
    content: ary ny lalànany dia tsy mba nampialaiko tamiko.
  '23':
  - type: text
    content: Tsy nanan-tsiny Taminy aho
  - type: text
    content: sady niaro tena tsy ho azon’ny fahotana.
  '24':
  - type: text
    content: Koa namaly ahy araka ny fahamarinako NY TOMPO,
  - type: text
    content: araka ny fahadiovan’ny tanako teo imasony.
  '25':
  - type: text
    content: Amin’ny olona mahatoky no isehoanao fa mahatoky,
  - type: text
    content: amin’ny tena olona marina no isehoanao fa marina,
  '26':
  - type: text
    content: amin’ny olona madio no isehoanao fa madio
  - type: text
    content: ary amin’ny mpiolakolaka kosa no isehoanao fa lalin-tsaina.
  '27':
  - type: text
    content: Fa Ianao no mamonjy ny olona ory
  - type: text
    content: ary ny mason’ny mpianjonanjona kosa dia aetrinao.
  '28':
  - type: text
    content: Fa Ianao no mampirehitra ny jiroko;
  - type: text
    content: NY TOMPO Andriamanitro no mampahazava ny fahamaizinako.
  '29':
  - type: text
    content: Fa Ianao no ahazoako mihazakazaka hamely ny miaramila iray toko
  - type: text
    content: ary Andriamanitro no ahazoako mitsambikina mihoatra ny manda.
  '3':
  - type: text
    content: Miantso fiderana NY TOMPO aho
  - type: text
    content: dia vonjena ho afaka amin’ny fahavaloko.
  '30':
  - type: text
    content: Raha ny amin’Andriamanitra dia tsy manan-tsiny ny lalany;
  - type: text
    content: voazaha toetra ny tenin’NY TOMPO;
  - type: text
    content: NY TOMPO no ampingan’izay rehetra mialoka Aminy.
  '31':
  - type: text
    content: Fa iza no Andriamanitra afa-tsy NY TOMPO?
  - type: text
    content: Iza no Vatolampy afa-tsy Andriamanitsika?
  '32':
  - type: text
    content: Izany Andriamanitra izany no mampisikina hery ahy
  - type: text
    content: ka tsy mampanan-tsiny ny alehako.
  '33':
  - type: text
    content: Manao ny tongotro ho tahaka ny an’ny dieravavy Izy
  - type: text
    content: ka mampitoetra ahy eo amin’ny havoana.
  '34':
  - type: text
    content: Mampianatra ny tanako hiady Izy
  - type: text
    content: ka mahay manenjana ny tsipìka varahina ny sandriko.
  '35':
  - type: text
    content: Manome ahy ny ampingan’ny famonjenao Ianao;
  - type: text
    content: ny tananao ankavanana no manohana ahy
  - type: text
    content: ary ny fahamoram-panahinao no mahalehibe ahy.
  '36':
  - type: text
    content: Halalahinao ny lalana hodiaviko
  - type: text
    content: ka tsy mangovitra ny hato-tongotro.
  '37':
  - type: text
    content: Manenjika ny fahavaloko aho ka mahatratra azy;
  - type: text
    content: tsy miverina aho raha tsy mahalany ritra azy.
  '38':
  - type: text
    content: Mamely mafy azy aho ka tsy afa-mitsangana izy;
  - type: text
    content: lavo eo ambanin’ny tongotro izy.
  '39':
  - type: text
    content: Mampisikina ahy hery hoenti-miady Ianao,
  - type: text
    content: alefitrao ho ambaniko izay mitsangana hamely ahy.
  '4':
  - type: text
    content: Nihodidina tamiko ny famatoran’ny fahafatesana
  - type: text
    content: ary nampahatahotra ahy ny riaky ny fahalevonana;
  '40':
  - type: text
    content: Ataonao miamboho ahy ny fahavaloko
  - type: text
    content: ka aringako izay mankahala ahy.
  '41':
  - type: text
    content: Mitaraina izy nefa tsy misy mpamonjy.
  - type: text
    content: Miantso NY TOMPO izy nefa tsy mamaly azy Izy.
  '42':
  - type: text
    content: Torotoroiko madinika tahaka ny vovoka entin’ny rivotra izy;
  - type: text
    content: tahaka ny fanary fotaka eny an-dalambe no fanariako azy.
  '43':
  - type: text
    content: Mamonjy ahy amin’ny fifandiran’ny olona Ianao
  - type: text
    content: ary manandratra ahy ho lehiben’ny firenen-tsamihafa;
  - type: text
    content: ny firenena tsy fantatro aza dia manompo ahy.
  '44':
  - type: text
    content: Raha vao mahare ny lazako izy dia manoa ahy;
  - type: text
    content: mikoy ahy ny hafa firenena;
  '45':
  - type: text
    content: mihaketraka ny hafa firenena
  - type: text
    content: ka miala amin-kovitra avy ao amin’ny fiarovany mafy.
  '46':
  - type: text
    content: Velona NY TOMPO; isaorana anie ny Vatolampiko!
  - type: text
    content: Hasandratra anie Andriamanitry ny famonjena ahy,
  '47':
  - type: text
    content: dia Andriamanitra izay manao famaliana ho ahy
  - type: text
    content: ka mampanaiky ahy amin’ny firenena maro.
  '48':
  - type: text
    content: Mamonjy ahy amin’ny fahavaloko Ianao!
  - type: text
    content: Eny, manandratra ahy ho ambonin’izay mitsangana hanohitra ahy Ianao
  - type: text
    content: ary manafaka ahy amin’ny mpampihorohoro.
  '49':
  - type: text
    content: Koa izany no hiderako Anao eny amin’ny firenen-tsamihafa, TOMPO ô,
  - type: text
    content: ary hankalazako ny anaranao.
  '5':
  - type: text
    content: 'nihodidina tamiko ny famatoran’ny '
  - type: text
    content: fitoeran’ny maty
  - type: text
    content: ary nisakana ahy ny fandriky ny fahafatesana.
  '50':
  - type: text
    content: Manao famonjena lehibe ho an’ny mpanjaka voatendriny Izy
  - type: text
    content: 'ary mamindra fo amin’ny '
  - type: text
    content: Voahosony
  - type: text
    content: ','
  - type: text
    content: dia amin’i Davida sy ny taranany mandrakizay.
  '6':
  - type: text
    content: Fony azom-pahoriana aho dia niantso NY TOMPO;
  - type: text
    content: eny, Andriamanitro no nitarainako;
  - type: text
    content: nihaino ny feoko tao an-tempoliny Izy
  - type: text
    content: ary tonga teo an-tsofiny ny fitarainako teo anatrehany.
  '7':
  - type: text
    content: Dia nihozongozona sy nihorohoro ny tany
  - type: text
    content: ary nihorohoro ny fanambanin’ny tendrombohitra;
  - type: text
    content: eny, nihozongozona ireo satria tezitra NY TOMPO.
  '8':
  - type: text
    content: Nisy setroka nisavoana teo am-bavorony
  - type: text
    content: ary afo mandevona avy teo am-bavany
  - type: text
    content: ka nisy vainafo nidedadeda avy aminy.
  '9':
  - type: text
    content: Dia naondriny ny lanitra ka nidina Izy
  - type: text
    content: ary haizim-pito no teo ambanin’ny tongony.
