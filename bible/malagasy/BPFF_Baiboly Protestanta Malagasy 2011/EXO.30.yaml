document_id: EXO.30
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny alitara fandoroana ditin-kazo manitra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Manaova koa alitara handoroana ditin-kazo manitra; hazo akasia no hanamboaranao azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ho iray '
  - type: usfm
    marker: w
    children:
    - type: text
      text: hakiho
  - type: text
    text: ' avy ny lafiny efatra, ary hatao efa-joro, ho roa hakiho kosa ny haavony, dia ataovy miray aminy ireo tandrony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Petaho takelaka volamena tsy miharo izany, dia ny tampony sy ny lafiny manodidina ary ireo tandrony, ary asio sisiny volamena manodidina azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Asio mason-drojo volamena roa eo ambanin’ny sisiny ka ataovy eo amin’ny sisiny roa ireo; amin’ny ilany roa no hanaovanao azy ka ho fitoeran’ny bao hilanjana azy ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Hazo akasia no anaovy ny bao ka petaho takelaka volamena. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Apetraho eo anoloan’ny efitra izay manakona ny vata misy ny Vavolombelona izy io, dia manandrify ny rakotra fanaovam-panavotana eo ambonin’ny Vavolombelona, izay hihaonako aminao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary handoro ditin-kazo mani-pofona eo i Arona, koa isa-maraina, rehefa manamboatra ny fitoeran-jiro, no hanatanterahany azy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'rehefa mampirehitra ireo jiro hariva koa i Arona dia mbola handoro azy ihany; ditin-kazo mani-pofona hodorana mandrakariva eo anatrehan’NY TOMPO, hatramin’ny taranakareo fara aman-dimby izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Aza manolotra ditin-kazo manitra tsy izy eo ianareo, na fanatitra dorana manontolo na fanatitra avy amin’ny zavamaniry; ary aza mandraraka fanatitra aidina eo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary aoka hanao fanavotana eo amin’ireo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tandrony
  - type: text
    text: ' indray mandeha isan-taona i Arona; indray mandeha isan-taona no hanaovany fanavotana ho azy amin’ny ran’ny fanatitra noho ny ota izay atao fanavotana, ary io dia hatramin’ny taranakareo fara aman-dimby ka ho masina indrindra ho an’NY TOMPO.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny handoavana ny vola avotra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary NY TOMPO niteny tamin’i Mosesy indray hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Rehefa manao fanisana ny Zanak’Israely rehetra ianao amin’ny fandaminana azy dia samy handoa avotry ny ainy ho an’NY TOMPO avy ny olona tsirairay, mba tsy hisy areti-mandringana hanjo azy rehefa isaina izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Izao no haloan’izay rehetra mandalo ny fanisana: Antsasaky ny sekela avy araka ny sekela masina ka gera roapolo ny sekela iray; eny, antsasaky ny sekela ho anjara fanomezana ho an’NY TOMPO. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Izay rehetra voaisa, hatramin’ny roapolo taona no ho miakatra, no handoa ny anjara fanomezana ho an’NY TOMPO. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ny manankarena dia tsy handoa mihoatra noho ny antsasaky ny sekela ary ny mahantra dia tsy handoa latsaka, rehefa mandoa ny anjara fanomezana ho an’NY TOMPO izy hanavotana ny ainareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary handray ny vola avotra amin’ny Zanak’Israely ianao ka hataonao amin’ny fanompoana ao amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tranolay fihaonana
  - type: text
    text: ; dia ho fahatsiarovana ho an’ny Zanak’Israely eo anatrehan’NY TOMPO izany, ho avotry ny ainareo.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny koveta fidiovana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary hoy indray NY TOMPO tamin’i Mosesy: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Manaova koveta varahina mba ho fidiovana, aoka ho varahina koa ny faladiany; ary apetraho eo anelanelan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tranolay fihaonana
  - type: text
    text: ' sy ny alitara izy io ka asio rano ao anatiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Eo no hanasan’i Arona sy ireo zanany ny tongony aman-tanany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Rehefa hiditra ao amin’ny tranolay fihaonana izy ireo dia hisasa amin’ny rano mba tsy ho faty; tahaka izany, rehefa manakaiky ny alitara hanao fanompoam-pivavahana mba handoro ny fanatitra levonina amin’ny afo ho an’NY TOMPO izy ireo, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: dia hanasa ny tongony aman-tanany mba tsy ho faty; ho lalàna maharitra aminy sy ireo zanany hatramin’ny taranany fara aman-dimby izany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny diloilo masina
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary NY TOMPO niteny indray tamin’i Mosesy hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Makà zava-manitra tsara ho anao, dia miora mitsiranoka dimanjato sekela sy havozomanitra antsasak’izany, dia dimampolo sy roanjato, veromanitra dimampolo sy roanjato, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'kasia dimanjato, araka ny sekela masina, ary diloilon’oliva eran’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: hina
  - type: text
    text: '; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: dia amboary ho diloilo fanosorana masina izany, ho zavatra aharoharo, asan’ny mpanao haro manitra, ho diloilo fanosorana masina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Dia hosory amin’izany ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tranolay fihaonana
  - type: text
    text: ' sy ny vata misy ny Vavolombelona, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'ny latabatra mbamin’ny fanaka rehetra momba azy, ny fitoeran-jiro mbamin’ny fanaka momba azy, ny alitara fandoroana ditin-kazo manitra, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'ny alitara fandoroana ny fanatitra dorana manontolo mbamin’ny fanaka rehetra momba azy ary ny koveta sy ny faladiany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Hamasino ireo mba ho masina indrindra; ho masina izay rehetra mikasika azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Ary hosory i Arona sy ireo zanany ka hamasino izy ireo mba hanao fisoronana ho Ahy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Avy eo dia mitenena amin’ny Zanak’Israely hoe: Ity dia ho diloilo fanosorana masina ho Ahy hatramin’ny taranakareo fara aman-dimby. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Aoka tsy hisy hihosotra amin’izany, na hisy haka tahaka ny fanamboarana azy na iza na iza; fa masina izany ka ho masina aminareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Izay rehetra mampiharo izay mitovy amin’izany, ary izay rehetra manosotra izany amin’ny vahiny, dia hofongorana tsy ho amin’ny fireneny.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fanamboarana ny ditin-kazo manitra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Dia hoy koa NY TOMPO tamin’i Mosesy: Makà zava-manitra, dia natafa sy sekeleta ary helbena sy lebona tsy misy fangarony, atao mitovy lanja. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Ary ataovy ditin-kazo manitra izany, dia zavatra aharoharo araka ny fanaon’ny mpanao haro manitra, misy sira, tsy misy fangarony, ary masina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Makà avy amin’izany ka totoy ho tonga vovony tena malemy, dia asio avy amin’izany eo anoloan’ny Vavolombelona ao amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tranolay fihaonana
  - type: text
    text: ' izay hihaonako aminao; ho masina indrindra ho anareo io. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Ary ny amin’ny ditin-kazo manitra izay hataonao dia aza mba misy atao mitovy amin’izany ny ho anareo; ho masina aminao ho an’NY TOMPO izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Izay rehetra manamboatra mitovy amin’izany ka mampiasa azy ho fofona manitra dia hofongorana tsy ho amin’ny fireneny.
