document_id: EXO.30,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny alitara fandoroana ditin-kazo manitra
  - type: text
    content: 'Manaova koa alitara handoroana ditin-kazo manitra; hazo akasia no hanamboaranao azy. '
  '10':
  - type: text
    content: 'Ary aoka hanao fanavotana eo amin’ireo '
  - type: text
    content: tandrony
  - type: text
    content: ' indray mandeha isan-taona i Arona; indray mandeha isan-taona no hanaovany fanavotana ho azy amin’ny ran’ny fanatitra noho ny ota izay atao fanavotana, ary io dia hatramin’ny taranakareo fara aman-dimby ka ho masina indrindra ho an’NY TOMPO.'
  - type: heading
    content: Ny handoavana ny vola avotra
  '11':
  - type: text
    content: 'Ary NY TOMPO niteny tamin’i Mosesy indray hoe: '
  '12':
  - type: text
    content: 'Rehefa manao fanisana ny Zanak’Israely rehetra ianao amin’ny fandaminana azy dia samy handoa avotry ny ainy ho an’NY TOMPO avy ny olona tsirairay, mba tsy hisy areti-mandringana hanjo azy rehefa isaina izy. '
  '13':
  - type: text
    content: 'Izao no haloan’izay rehetra mandalo ny fanisana: Antsasaky ny sekela avy araka ny sekela masina ka gera roapolo ny sekela iray; eny, antsasaky ny sekela ho anjara fanomezana ho an’NY TOMPO. '
  '14':
  - type: text
    content: 'Izay rehetra voaisa, hatramin’ny roapolo taona no ho miakatra, no handoa ny anjara fanomezana ho an’NY TOMPO. '
  '15':
  - type: text
    content: Ny manankarena dia tsy handoa mihoatra noho ny antsasaky ny sekela ary ny mahantra dia tsy handoa latsaka, rehefa mandoa ny anjara fanomezana ho an’NY TOMPO izy hanavotana ny ainareo.
  '16':
  - type: text
    content: 'Ary handray ny vola avotra amin’ny Zanak’Israely ianao ka hataonao amin’ny fanompoana ao amin’ny '
  - type: text
    content: tranolay fihaonana
  - type: text
    content: ; dia ho fahatsiarovana ho an’ny Zanak’Israely eo anatrehan’NY TOMPO izany, ho avotry ny ainareo.
  - type: heading
    content: Ny koveta fidiovana
  '17':
  - type: text
    content: 'Ary hoy indray NY TOMPO tamin’i Mosesy: '
  '18':
  - type: text
    content: 'Manaova koveta varahina mba ho fidiovana, aoka ho varahina koa ny faladiany; ary apetraho eo anelanelan’ny '
  - type: text
    content: tranolay fihaonana
  - type: text
    content: ' sy ny alitara izy io ka asio rano ao anatiny. '
  '19':
  - type: text
    content: 'Eo no hanasan’i Arona sy ireo zanany ny tongony aman-tanany. '
  '2':
  - type: text
    content: 'Ho iray '
  - type: text
    content: hakiho
  - type: text
    content: ' avy ny lafiny efatra, ary hatao efa-joro, ho roa hakiho kosa ny haavony, dia ataovy miray aminy ireo tandrony. '
  '20':
  - type: text
    content: 'Rehefa hiditra ao amin’ny tranolay fihaonana izy ireo dia hisasa amin’ny rano mba tsy ho faty; tahaka izany, rehefa manakaiky ny alitara hanao fanompoam-pivavahana mba handoro ny fanatitra levonina amin’ny afo ho an’NY TOMPO izy ireo, '
  '21':
  - type: text
    content: dia hanasa ny tongony aman-tanany mba tsy ho faty; ho lalàna maharitra aminy sy ireo zanany hatramin’ny taranany fara aman-dimby izany.
  - type: heading
    content: Ny diloilo masina
  '22':
  - type: text
    content: 'Ary NY TOMPO niteny indray tamin’i Mosesy hoe: '
  '23':
  - type: text
    content: 'Makà zava-manitra tsara ho anao, dia miora mitsiranoka dimanjato sekela sy havozomanitra antsasak’izany, dia dimampolo sy roanjato, veromanitra dimampolo sy roanjato, '
  '24':
  - type: text
    content: 'kasia dimanjato, araka ny sekela masina, ary diloilon’oliva eran’ny '
  - type: text
    content: hina
  - type: text
    content: '; '
  '25':
  - type: text
    content: dia amboary ho diloilo fanosorana masina izany, ho zavatra aharoharo, asan’ny mpanao haro manitra, ho diloilo fanosorana masina.
  '26':
  - type: text
    content: 'Dia hosory amin’izany ny '
  - type: text
    content: tranolay fihaonana
  - type: text
    content: ' sy ny vata misy ny Vavolombelona, '
  '27':
  - type: text
    content: 'ny latabatra mbamin’ny fanaka rehetra momba azy, ny fitoeran-jiro mbamin’ny fanaka momba azy, ny alitara fandoroana ditin-kazo manitra, '
  '28':
  - type: text
    content: 'ny alitara fandoroana ny fanatitra dorana manontolo mbamin’ny fanaka rehetra momba azy ary ny koveta sy ny faladiany. '
  '29':
  - type: text
    content: 'Hamasino ireo mba ho masina indrindra; ho masina izay rehetra mikasika azy. '
  '3':
  - type: text
    content: 'Petaho takelaka volamena tsy miharo izany, dia ny tampony sy ny lafiny manodidina ary ireo tandrony, ary asio sisiny volamena manodidina azy. '
  '30':
  - type: text
    content: Ary hosory i Arona sy ireo zanany ka hamasino izy ireo mba hanao fisoronana ho Ahy.
  '31':
  - type: text
    content: 'Avy eo dia mitenena amin’ny Zanak’Israely hoe: Ity dia ho diloilo fanosorana masina ho Ahy hatramin’ny taranakareo fara aman-dimby. '
  '32':
  - type: text
    content: 'Aoka tsy hisy hihosotra amin’izany, na hisy haka tahaka ny fanamboarana azy na iza na iza; fa masina izany ka ho masina aminareo. '
  '33':
  - type: text
    content: Izay rehetra mampiharo izay mitovy amin’izany, ary izay rehetra manosotra izany amin’ny vahiny, dia hofongorana tsy ho amin’ny fireneny.
  - type: heading
    content: Ny fanamboarana ny ditin-kazo manitra
  '34':
  - type: text
    content: 'Dia hoy koa NY TOMPO tamin’i Mosesy: Makà zava-manitra, dia natafa sy sekeleta ary helbena sy lebona tsy misy fangarony, atao mitovy lanja. '
  '35':
  - type: text
    content: 'Ary ataovy ditin-kazo manitra izany, dia zavatra aharoharo araka ny fanaon’ny mpanao haro manitra, misy sira, tsy misy fangarony, ary masina. '
  '36':
  - type: text
    content: 'Makà avy amin’izany ka totoy ho tonga vovony tena malemy, dia asio avy amin’izany eo anoloan’ny Vavolombelona ao amin’ny '
  - type: text
    content: tranolay fihaonana
  - type: text
    content: ' izay hihaonako aminao; ho masina indrindra ho anareo io. '
  '37':
  - type: text
    content: 'Ary ny amin’ny ditin-kazo manitra izay hataonao dia aza mba misy atao mitovy amin’izany ny ho anareo; ho masina aminao ho an’NY TOMPO izany. '
  '38':
  - type: text
    content: Izay rehetra manamboatra mitovy amin’izany ka mampiasa azy ho fofona manitra dia hofongorana tsy ho amin’ny fireneny.
  '4':
  - type: text
    content: 'Asio mason-drojo volamena roa eo ambanin’ny sisiny ka ataovy eo amin’ny sisiny roa ireo; amin’ny ilany roa no hanaovanao azy ka ho fitoeran’ny bao hilanjana azy ireo. '
  '5':
  - type: text
    content: 'Hazo akasia no anaovy ny bao ka petaho takelaka volamena. '
  '6':
  - type: text
    content: Apetraho eo anoloan’ny efitra izay manakona ny vata misy ny Vavolombelona izy io, dia manandrify ny rakotra fanaovam-panavotana eo ambonin’ny Vavolombelona, izay hihaonako aminao.
  '7':
  - type: text
    content: 'Ary handoro ditin-kazo mani-pofona eo i Arona, koa isa-maraina, rehefa manamboatra ny fitoeran-jiro, no hanatanterahany azy; '
  '8':
  - type: text
    content: 'rehefa mampirehitra ireo jiro hariva koa i Arona dia mbola handoro azy ihany; ditin-kazo mani-pofona hodorana mandrakariva eo anatrehan’NY TOMPO, hatramin’ny taranakareo fara aman-dimby izany. '
  '9':
  - type: text
    content: Aza manolotra ditin-kazo manitra tsy izy eo ianareo, na fanatitra dorana manontolo na fanatitra avy amin’ny zavamaniry; ary aza mandraraka fanatitra aidina eo.
