document_id: GEN.6,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ireo zanak’Andriamanitra sy ireo zanakavavin’ny olona
  - type: text
    content: 'Rehefa nihamaro ny olona tetỳ ambonin’ny tany ka niteraka zazavavy maro izy ireo '
  '10':
  - type: text
    content: 'Niteraka telo mirahalahy i Noa, dia i Sema sy i Hama ary i Jafeta. '
  '11':
  - type: text
    content: 'Ary feno fahalovana sy herisetra teo anatrehan’Andriamanitra ny tany. '
  '12':
  - type: text
    content: Hitan’Andriamanitra fa indro, feno fahalovana ny tany; ny nofo rehetra dia samy niaina tamin’ny fahalovana tetỳ ambonin’ny tany.
  '13':
  - type: text
    content: 'Dia hoy Andriamanitra tamin’i Noa: Tonga ny faran’ny nofo rehetra satria feno herisetra ny tany noho ny amin’ny olona ka indro, handringana azy mbamin’ny tany Aho. '
  '14':
  - type: text
    content: 'Koa manamboara sambofiara amin’ny hazomenaka; hasianao efitrefitra ny sambofiara ka hopetahanao dity ao anatiny sy eo ivelany. '
  '15':
  - type: text
    content: 'Toy izao no hanaovanao azy: Telonjato '
  - type: text
    content: hakiho
  - type: text
    content: ' ny lavan’ny sambofiara, dimampolo hakiho ny sakany ary telopolo hakiho ny haavony. '
  '16':
  - type: text
    content: 'Asio tafo ny sambofiara ka ataovy iray hakiho avy eo ambony, ary asio varavarana eo amin’ny rindriny; ataovy rihana telo ny ao anatiny. '
  '17':
  - type: text
    content: 'Fa Izaho hahatonga ny safodrano eny ambonin’ny tany handringana ny nofo rehetra izay manam-pofonaina eny ambanin’ny lanitra ka ho faty izay rehetra eo amin’ny tany. '
  '18':
  - type: text
    content: 'Nefa kosa haoriko aminao ny fanekeko; hiditra ao anatin’ny sambofiara ianao sy ny vady aman-janakao mbamin’ny vinantovavinao izay miaraka aminao. '
  '19':
  - type: text
    content: 'Ary hitondranao roa avy isaky ny karazany ho ao anatin’ny sambofiara ny zavamananaina rehetra mba hovelomina miaraka aminao; ho lahy sy vavy avy ireo. '
  '2':
  - type: text
    content: 'dia hitan’ireo zanak’Andriamanitra fa tsara tarehy ireo zanakavavin’ny olona ireo, koa nifidy vady ho azy tamin’izy rehetra araka izay tiany izy ireo. '
  '20':
  - type: text
    content: 'Ny vorona, samy araka ny karazany avy, ny biby, samy araka ny karazany avy, ny biby rehetra izay mandady na mikisaka amin’ny tany, samy araka ny karazany avy, roa avy isan-karazany no hankeo aminao mba hovelomina. '
  '21':
  - type: text
    content: 'Ary ianao, makà amin’ny zavatra rehetra izay mety ho fihinana ka angony ho eo aminao; fa ho hanina ho anao sy ho an’ireo biby ireo izany. '
  '22':
  - type: text
    content: Dia nataon’i Noa izany. Araka izay rehetra nandidian’Andriamanitra azy no nataony.
  '3':
  - type: text
    content: 'Dia hoy NY TOMPO: Tsy mba hijanona mandrakariva ao amin’ny olona ny fofonaiko fa nofo izy, koa ho roapolo amby zato taona ihany ny androny. '
  '4':
  - type: text
    content: Tamin’izany andro izany, sy taorianan’izany koa, rehefa nivady tamin’ireo zanakavavin’ny olona ireo zanak’Andriamanitra dia niteraka taminy ka nisy ireo Nefilima tetỳ ambonin’ny tany; ireo no olo-mahery hatrizay ela izay, dia ireo lehilahy nanan-daza.
  - type: heading
    content: Nanapa-kevitra Andriamanitra fa hamongotra ny olombelona rehetra afa-tsy i Noa
  '5':
  - type: text
    content: 'Ary hitan’NY TOMPO fa be ny faharatsian’ny olona tetỳ ambonin’ny tany, koa izay fisainana rehetra foronin’ny fony dia ratsy ihany mandritra ny andro. '
  '6':
  - type: text
    content: 'Ary NY TOMPO nanenina noho ny nanaovany ny olona teto ambonin’ny tany ka nalahelo ny fony. '
  '7':
  - type: text
    content: 'Dia hoy NY TOMPO: Haringako tsy hisy ambonin’ny tany ny olona izay noharìko, hatramin’ny olona ka hatramin’ny biby fiompy sy ny biby mandady na mikisaka, mbamin’ny voromanidina; fa manenina Aho noho ny nanaovako azy. '
  '8':
  - type: text
    content: Fa i Noa kosa dia nahita fitia teo imason’NY TOMPO.
  '9':
  - type: text
    content: 'Ary izao no tantaran’i Noa: I Noa dia lehilahy marina sady tsy nisy tsiny teo amin’ny olona niara-belona taminy; eny, niara-nandeha tamin’Andriamanitra i Noa. '
