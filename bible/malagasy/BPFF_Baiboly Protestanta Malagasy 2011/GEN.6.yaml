document_id: GEN.6
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ireo zanak’Andriamanitra sy ireo zanakavavin’ny olona
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Rehefa nihamaro ny olona tetỳ ambonin’ny tany ka niteraka zazavavy maro izy ireo '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'dia hitan’ireo zanak’Andriamanitra fa tsara tarehy ireo zanakavavin’ny olona ireo, koa nifidy vady ho azy tamin’izy rehetra araka izay tiany izy ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dia hoy NY TOMPO: Tsy mba hijanona mandrakariva ao amin’ny olona ny fofonaiko fa nofo izy, koa ho roapolo amby zato taona ihany ny androny. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Tamin’izany andro izany, sy taorianan’izany koa, rehefa nivady tamin’ireo zanakavavin’ny olona ireo zanak’Andriamanitra dia niteraka taminy ka nisy ireo Nefilima tetỳ ambonin’ny tany; ireo no olo-mahery hatrizay ela izay, dia ireo lehilahy nanan-daza.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nanapa-kevitra Andriamanitra fa hamongotra ny olombelona rehetra afa-tsy i Noa
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary hitan’NY TOMPO fa be ny faharatsian’ny olona tetỳ ambonin’ny tany, koa izay fisainana rehetra foronin’ny fony dia ratsy ihany mandritra ny andro. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary NY TOMPO nanenina noho ny nanaovany ny olona teto ambonin’ny tany ka nalahelo ny fony. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dia hoy NY TOMPO: Haringako tsy hisy ambonin’ny tany ny olona izay noharìko, hatramin’ny olona ka hatramin’ny biby fiompy sy ny biby mandady na mikisaka, mbamin’ny voromanidina; fa manenina Aho noho ny nanaovako azy. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Fa i Noa kosa dia nahita fitia teo imason’NY TOMPO.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary izao no tantaran’i Noa: I Noa dia lehilahy marina sady tsy nisy tsiny teo amin’ny olona niara-belona taminy; eny, niara-nandeha tamin’Andriamanitra i Noa. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Niteraka telo mirahalahy i Noa, dia i Sema sy i Hama ary i Jafeta. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary feno fahalovana sy herisetra teo anatrehan’Andriamanitra ny tany. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Hitan’Andriamanitra fa indro, feno fahalovana ny tany; ny nofo rehetra dia samy niaina tamin’ny fahalovana tetỳ ambonin’ny tany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dia hoy Andriamanitra tamin’i Noa: Tonga ny faran’ny nofo rehetra satria feno herisetra ny tany noho ny amin’ny olona ka indro, handringana azy mbamin’ny tany Aho. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Koa manamboara sambofiara amin’ny hazomenaka; hasianao efitrefitra ny sambofiara ka hopetahanao dity ao anatiny sy eo ivelany. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Toy izao no hanaovanao azy: Telonjato '
  - type: usfm
    marker: w
    children:
    - type: text
      text: hakiho
  - type: text
    text: ' ny lavan’ny sambofiara, dimampolo hakiho ny sakany ary telopolo hakiho ny haavony. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Asio tafo ny sambofiara ka ataovy iray hakiho avy eo ambony, ary asio varavarana eo amin’ny rindriny; ataovy rihana telo ny ao anatiny. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Fa Izaho hahatonga ny safodrano eny ambonin’ny tany handringana ny nofo rehetra izay manam-pofonaina eny ambanin’ny lanitra ka ho faty izay rehetra eo amin’ny tany. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Nefa kosa haoriko aminao ny fanekeko; hiditra ao anatin’ny sambofiara ianao sy ny vady aman-janakao mbamin’ny vinantovavinao izay miaraka aminao. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary hitondranao roa avy isaky ny karazany ho ao anatin’ny sambofiara ny zavamananaina rehetra mba hovelomina miaraka aminao; ho lahy sy vavy avy ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ny vorona, samy araka ny karazany avy, ny biby, samy araka ny karazany avy, ny biby rehetra izay mandady na mikisaka amin’ny tany, samy araka ny karazany avy, roa avy isan-karazany no hankeo aminao mba hovelomina. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary ianao, makà amin’ny zavatra rehetra izay mety ho fihinana ka angony ho eo aminao; fa ho hanina ho anao sy ho an’ireo biby ireo izany. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Dia nataon’i Noa izany. Araka izay rehetra nandidian’Andriamanitra azy no nataony.
