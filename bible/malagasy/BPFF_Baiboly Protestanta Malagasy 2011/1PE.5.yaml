document_id: 1PE.5,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Koa ny amin’ny loholona
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.1 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: presbytera.
      marker-yv: yv-n
    - type: text
      text: ' izay eo aminareo, izaho, izay naman’ny loholona ary vavolombelon’ny fijalian’i Kristy sady mpiombona ny voninahitra efa haseho koa, dia mananatra azy hoe: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ary Andriamanitry ny fahasoavana rehetra, izay niantso anareo ho any amin’ny voninahiny mandrakizay ao amin’i Kristy, rehefa niaritra fahoriana vetivety ianareo, Izy no hahatanteraka sy hampiorina ary hampitoetra anareo. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ho Azy anie ny fanjakana mandrakizay mandrakizay! '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Amena
    - type: text
      text: '!'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Manoratra teny fohifohy ho anareo aho ka hampitondraina an’i Silasy izay ataoko ho rahalahy mahatoky, dia mampahery anareo aho ka manambara fa izany no tena fahasoavan’Andriamanitra. Tomoera tsara amin’izany ianareo.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Izay any Babilona, voafidy sahala aminareo, dia manao veloma anareo, ary i Marka zanako koa. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Mifanaova veloma amin’ny fanoroham-pitiavana.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ho aminareo rehetra izay ao amin’i Kristy anie ny fiadanana!
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Andraso ny ondrin’Andriamanitra izay andraikitrareo; andraso izy, tsy amin’ny fanerena fa an-tsitrapo araka an’Andriamanitra, tsy amin’ny fitiavana harena maloto fa amin’ny zotom-panahy, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'tsy ho mpanjakazaka amin’ny anjara fiandrasana fa ho fianaran’ny ondry. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Ary rehefa miseho ny Lohan’ny mpiandry dia hahazo ny satroboninahitra tsy mety simba ianareo.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Toy izany koa ianareo tanora, maneke ny loholona. Eny, samia mitafy fanetren-tena ianareo ka mifanompoa, fa «Andriamanitra manohitra ny mpiavonavona fa manome fahasoavana ho an’ny manetry tena» (Oha 3.34).
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Koa amin’izany, manetre tena ambanin’ny tana-maherin’Andriamanitra, mba hanandratany anareo amin’ny fotoanandro; '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ary apetraho Aminy ny fanahianareo rehetra, fa Izy no miahy anareo (Sal 55.22).
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Mahonòna tena, miambena. Fa ny devoly fahavalonareo dia mandehandeha tahaka ny liona mierona mitady izay harapany; '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: tohero izy ka miorena tsara amin’ny finoana ianareo satria fantatrareo fa izany fahoriana izany dia manjo ny rahalahinareo rehetra manerana izao tontolo izao.
