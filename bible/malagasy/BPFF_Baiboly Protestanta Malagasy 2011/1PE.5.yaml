document_id: 1PE.5,3103
type_code: plt
verses:
  '1':
  - type: text
    content: Koa ny amin’ny loholona
  - type: note
    content: 'Na: presbytera.'
  - type: text
    content: ' izay eo aminareo, izaho, izay naman’ny loholona ary vavolombelon’ny fijalian’i Kristy sady mpiombona ny voninahitra efa haseho koa, dia mananatra azy hoe: '
  '10':
  - type: text
    content: 'Ary Andriamanitry ny fahasoavana rehetra, izay niantso anareo ho any amin’ny voninahiny mandrakizay ao amin’i Kristy, rehefa niaritra fahoriana vetivety ianareo, Izy no hahatanteraka sy hampiorina ary hampitoetra anareo. '
  '11':
  - type: text
    content: 'Ho Azy anie ny fanjakana mandrakizay mandrakizay! '
  - type: text
    content: Amena
  - type: text
    content: '!'
  '12':
  - type: text
    content: Manoratra teny fohifohy ho anareo aho ka hampitondraina an’i Silasy izay ataoko ho rahalahy mahatoky, dia mampahery anareo aho ka manambara fa izany no tena fahasoavan’Andriamanitra. Tomoera tsara amin’izany ianareo.
  '13':
  - type: text
    content: 'Izay any Babilona, voafidy sahala aminareo, dia manao veloma anareo, ary i Marka zanako koa. '
  '14':
  - type: text
    content: Mifanaova veloma amin’ny fanoroham-pitiavana.
  - type: text
    content: Ho aminareo rehetra izay ao amin’i Kristy anie ny fiadanana!
  '2':
  - type: text
    content: 'Andraso ny ondrin’Andriamanitra izay andraikitrareo; andraso izy, tsy amin’ny fanerena fa an-tsitrapo araka an’Andriamanitra, tsy amin’ny fitiavana harena maloto fa amin’ny zotom-panahy, '
  '3':
  - type: text
    content: 'tsy ho mpanjakazaka amin’ny anjara fiandrasana fa ho fianaran’ny ondry. '
  '4':
  - type: text
    content: Ary rehefa miseho ny Lohan’ny mpiandry dia hahazo ny satroboninahitra tsy mety simba ianareo.
  '5':
  - type: text
    content: Toy izany koa ianareo tanora, maneke ny loholona. Eny, samia mitafy fanetren-tena ianareo ka mifanompoa, fa «Andriamanitra manohitra ny mpiavonavona fa manome fahasoavana ho an’ny manetry tena» (Oha 3.34).
  '6':
  - type: text
    content: 'Koa amin’izany, manetre tena ambanin’ny tana-maherin’Andriamanitra, mba hanandratany anareo amin’ny fotoanandro; '
  '7':
  - type: text
    content: ary apetraho Aminy ny fanahianareo rehetra, fa Izy no miahy anareo (Sal 55.22).
  '8':
  - type: text
    content: 'Mahonòna tena, miambena. Fa ny devoly fahavalonareo dia mandehandeha tahaka ny liona mierona mitady izay harapany; '
  '9':
  - type: text
    content: tohero izy ka miorena tsara amin’ny finoana ianareo satria fantatrareo fa izany fahoriana izany dia manjo ny rahalahinareo rehetra manerana izao tontolo izao.
