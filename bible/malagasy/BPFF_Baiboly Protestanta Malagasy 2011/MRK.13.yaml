document_id: MRK.13,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny handravana ny tempoly
  - type: heading
    content: Mat 24.1-3; Lio 21.5-7
  - type: text
    content: 'Ary nony niala teo amin’ny tempoly Jesosy dia hoy ny iray tamin’ny mpianany: Mpampianatra ô, akory ny hatsaran’ireto vato sy rafitra ireto! '
  '10':
  - type: text
    content: 'Ary ny firenena rehetra dia tsy maintsy hitoriana ny Filazantsara aloha. '
  '11':
  - type: text
    content: Koa raha mitondra anareo hatolotra izy dia aza manahy rahateo izay holazainareo, fa izay teny homena anareo amin’izany ora izany no holazainareo; fa tsy ianareo no hiteny fa ny Fanahy Masina.
  '12':
  - type: text
    content: 'Ary ny rahalahy dia hanolotra ny rahalahiny ho amin’ny fahafatesana ary ny ray dia hanolotra ny zanany; ny zanaka dia hitsangana hanohitra ny rainy sy ny reniny ka hahafaty azy. '
  '13':
  - type: text
    content: Ary ho halan’ny olona rehetra ianareo noho ny anarako; fa izay maharitra hatramin’ny farany no hovonjena.
  - type: heading
    content: Fahoriana tsy hisy toa azy
  - type: heading
    content: Mat 24.15-22; Lio 21.20-24
  '14':
  - type: text
    content: 'Fa rehefa hitanareo mitsangana eo amin’izay tsy tokony hitsanganany «ilay mpandrava mahatsiravina» (Dan 12.11; 9.27), aoka hisaina izay mamaky izany, dia aoka handositra ho any an-tendrombohitra izay olona any '
  - type: text
    content: Jodia
  - type: text
    content: '; '
  '15':
  - type: text
    content: izay ao an-
  - type: text
    content: tampon-trano
  - type: text
    content: ' dia aoka tsy hidina na hiditra haka zavatra ao an-tranony; '
  '16':
  - type: text
    content: 'ary izay any an-tsaha dia aoka tsy hiverina haka ny akanjony. '
  '17':
  - type: text
    content: Loza ny hahazo ny bevohoka sy ny mampinono amin’izany andro izany!
  '18':
  - type: text
    content: 'Fa mivavaha ianareo mba tsy ho amin’ny ririnina izany. '
  '19':
  - type: text
    content: 'Fa amin’izay andro izay dia hisy fahoriana izay mbola tsy nisy toy izany hatrizay nanaovan’Andriamanitra izao tontolo izao ka mandraka izao ankehitriny izao sady tsy hisy intsony. '
  '2':
  - type: text
    content: 'Fa hoy Jesosy: Hitanao va ireto rafitra lehibe ireto? Tsy havela hisy vato hifanongoa eto ka tsy horavana.'
  - type: heading
    content: Ny famantarana ny hiavian’ny farany
  - type: heading
    content: Mat 24.4-8; Lio 21.8-11
  '20':
  - type: text
    content: Ary raha tsy nohafohezin’ny Tompo izany andro izany dia tsy nisy nofo ho voavonjy; fa noho ny olom-boafidy, izay nofidiny, dia nohafoheziny izany andro izany.
  - type: heading
    content: Mat 24.23-25
  '21':
  - type: text
    content: 'Amin’izany, raha toa ka misy olona milaza aminareo hoe: Indro, etỳ Kristy, na: Indro, erỳ Izy, dia aza mino izany ianareo. '
  '22':
  - type: text
    content: 'Fa hisy kristy sandoka sy mpaminany sandoka hitsangana ka haneho famantarana sy fahagagana hamitahany na dia ny olom-boafidy aza, raha azony atao izany. '
  '23':
  - type: text
    content: Fa mitandrema kosa ianareo; indro, efa voalazako taminareo rahateo ny zavatra rehetra.
  - type: heading
    content: Ny fiavian’ny Zanak’Olona
  - type: heading
    content: Mat 24.29-31; Lio 21.25-28
  '24':
  - type: text
    content: Fa amin’izay andro izay, aorianan’izany fahoriana izany,
  - type: text
    content: dia ho tonga maizina ny masoandro
  - type: text
    content: ary tsy hanome ny fahazavany ny volana,
  '25':
  - type: text
    content: hiraraka avy eny amin’ny lanitra ny kintana
  - type: text
    content: ary hohozongozonina ireo hery izay eny amin’ny lanitra.
  '26':
  - type: text
    content: 'Ary amin’izay dia ho hita ny '
  - type: text
    content: Zanak’Olona
  - type: text
    content: ', avy eny amin’ny rahona amin’ny hery lehibe sy ny voninahitra. '
  '27':
  - type: text
    content: Amin’izay dia haniraka ireo anjely Izy ary hanangona ny olom-boafidiny avy amin’ny vazan-tany efatra, hatramin’ny faran’ny tany ka hatramin’ny faran’ny lanitra.
  - type: heading
    content: Fanoharana ny amin’ny aviavy
  - type: heading
    content: Mat 24.32-36; Lio 21.29-33
  '28':
  - type: text
    content: 'Mianara ny fanoharana ny amin’ny aviavy: Raha vao mitsiry ny rantsany ka mandravina izy dia fantatrareo fa efa akaiky ny lohataona. '
  '29':
  - type: text
    content: Dia tahaka izany koa ianareo, raha vao hitanareo fa tonga izany zavatra izany dia aoka ho fantatrareo fa efa akaiky, efa eo am-baravarana Izy.
  '3':
  - type: text
    content: 'Ary raha nipetraka teo an-tendrombohitra Oliva tandrifin’ny tempoly Izy dia nanontany Azy mangingina i Petera sy i Jakoba ary i Jaona sy i Andrea hoe: '
  '30':
  - type: text
    content: 'Lazaiko aminareo marina tokoa fa tsy mba ho tapitra ity taranaka ity mandra-pahatongan’izany rehetra izany. '
  '31':
  - type: text
    content: Ny lanitra sy ny tany dia ho levona fa ny teniko dia tsy mba ho levona.
  - type: heading
    content: Andriamanitra irery ihany no mahafantatra ny andro sy ny ora
  '32':
  - type: text
    content: Fa ny amin’izany andro na ora izany dia tsy misy mahafantatra, na ny anjely any an-danitra, ary na ny Zanaka aza, afa-tsy ny Ray ihany.
  - type: heading
    content: Mat 25.13-15; Lio 19.12-13
  '33':
  - type: text
    content: 'Mitandrema, miambena ka mivavaha; fa tsy fantatrareo izay hiavian’ny fotoana. '
  '34':
  - type: text
    content: 'Izany dia tahaka ny olona nandeha hivahiny, izay nandao ny tranony ka nanome fahefana ny mpanompony, samy notolorany ny raharahany avy, ary ny mpiandry varavarana dia nasainy niambina tsara. '
  '35':
  - type: text
    content: 'Koa miambena ianareo fa tsy fantatrareo izay andro hiavian’ny tompon-trano, na ho hariva, na ho mamatonalina, na ho maneno akoho, na ho maraina, '
  '36':
  - type: text
    content: 'fandrao avy tampoka Izy ka mahita anareo matory. '
  '37':
  - type: text
    content: 'Ary izay lazaiko aminareo dia lazaiko amin’ny olona rehetra koa: Miambena.'
  '4':
  - type: text
    content: 'Lazao aminay: Rahoviana no ho tonga izany? Ary inona no ho famantarana rehefa ho tonga izany rehetra izany?'
  '5':
  - type: text
    content: 'Ary Jesosy nilaza taminy hoe: Mitandrema mba tsy hisy hamitaka anareo. '
  '6':
  - type: text
    content: 'Fa maro no ho avy amin’ny anarako hilaza hoe: Izaho no Izy, koa maro no ho voafitany. '
  '7':
  - type: text
    content: 'Ary raha mandre ady sy filazana ady ianareo dia aza matahotra; tsy maintsy hitranga izany, nefa mbola tsy izay akory ny farany. '
  '8':
  - type: text
    content: Fa hisy firenena hitsangana hamely firenena, hisy fanjakana hitsangana hamely fanjakana; ary hisy horohoron-tany any amin’ny toerana samihafa ary hisy mosary. Izany no ho fiandohan’ny faharariam-piterahana.
  - type: heading
    content: Mat 10.17-22; Lio 21.12-17
  '9':
  - type: text
    content: 'Fa mitandrema ianareo; fa hatolotra amin’ny '
  - type: text
    content: Sinedriona
  - type: text
    content: ' sy hokapohina any amin’ny '
  - type: text
    content: sinagoga
  - type: text
    content: ' ary hitsangana eo anatrehan’ny mpanapaka sy ny mpanjaka noho ny Amiko ianareo, ho vavolombelona aminy. '
