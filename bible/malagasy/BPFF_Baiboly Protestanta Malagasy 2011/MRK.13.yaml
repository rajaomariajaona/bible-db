document_id: MRK.13,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny handravana ny tempoly
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mat 24.1-3; Lio 21.5-7
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nony niala teo amin’ny tempoly Jesosy dia hoy ny iray tamin’ny mpianany: Mpampianatra ô, akory ny hatsaran’ireto vato sy rafitra ireto! '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny firenena rehetra dia tsy maintsy hitoriana ny Filazantsara aloha. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Koa raha mitondra anareo hatolotra izy dia aza manahy rahateo izay holazainareo, fa izay teny homena anareo amin’izany ora izany no holazainareo; fa tsy ianareo no hiteny fa ny Fanahy Masina.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny rahalahy dia hanolotra ny rahalahiny ho amin’ny fahafatesana ary ny ray dia hanolotra ny zanany; ny zanaka dia hitsangana hanohitra ny rainy sy ny reniny ka hahafaty azy. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ho halan’ny olona rehetra ianareo noho ny anarako; fa izay maharitra hatramin’ny farany no hovonjena.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fahoriana tsy hisy toa azy
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mat 24.15-22; Lio 21.20-24
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa rehefa hitanareo mitsangana eo amin’izay tsy tokony hitsanganany «ilay mpandrava mahatsiravina» (Dan 12.11; 9.27), aoka hisaina izay mamaky izany, dia aoka handositra ho any an-tendrombohitra izay olona any '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jodia
    - type: text
      text: '; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: izay ao an-
    - type: usfm
      marker: w
      children:
      - type: text
        text: tampon-trano
    - type: text
      text: ' dia aoka tsy hidina na hiditra haka zavatra ao an-tranony; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary izay any an-tsaha dia aoka tsy hiverina haka ny akanjony. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Loza ny hahazo ny bevohoka sy ny mampinono amin’izany andro izany!
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa mivavaha ianareo mba tsy ho amin’ny ririnina izany. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa amin’izay andro izay dia hisy fahoriana izay mbola tsy nisy toy izany hatrizay nanaovan’Andriamanitra izao tontolo izao ka mandraka izao ankehitriny izao sady tsy hisy intsony. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy Jesosy: Hitanao va ireto rafitra lehibe ireto? Tsy havela hisy vato hifanongoa eto ka tsy horavana.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny famantarana ny hiavian’ny farany
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mat 24.4-8; Lio 21.8-11
    marker-yv: yv-h
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary raha tsy nohafohezin’ny Tompo izany andro izany dia tsy nisy nofo ho voavonjy; fa noho ny olom-boafidy, izay nofidiny, dia nohafoheziny izany andro izany.
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mat 24.23-25
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Amin’izany, raha toa ka misy olona milaza aminareo hoe: Indro, etỳ Kristy, na: Indro, erỳ Izy, dia aza mino izany ianareo. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hisy kristy sandoka sy mpaminany sandoka hitsangana ka haneho famantarana sy fahagagana hamitahany na dia ny olom-boafidy aza, raha azony atao izany. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa mitandrema kosa ianareo; indro, efa voalazako taminareo rahateo ny zavatra rehetra.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fiavian’ny Zanak’Olona
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mat 24.29-31; Lio 21.25-28
    marker-yv: yv-h
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa amin’izay andro izay, aorianan’izany fahoriana izany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ho tonga maizina ny masoandro
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy hanome ny fahazavany ny volana,
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hiraraka avy eny amin’ny lanitra ny kintana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hohozongozonina ireo hery izay eny amin’ny lanitra.
  '26':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Ary amin’izay dia ho hita ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Zanak’Olona
    - type: text
      text: ', avy eny amin’ny rahona amin’ny hery lehibe sy ny voninahitra. '
  '27':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Amin’izay dia haniraka ireo anjely Izy ary hanangona ny olom-boafidiny avy amin’ny vazan-tany efatra, hatramin’ny faran’ny tany ka hatramin’ny faran’ny lanitra.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fanoharana ny amin’ny aviavy
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mat 24.32-36; Lio 21.29-33
    marker-yv: yv-h
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mianara ny fanoharana ny amin’ny aviavy: Raha vao mitsiry ny rantsany ka mandravina izy dia fantatrareo fa efa akaiky ny lohataona. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia tahaka izany koa ianareo, raha vao hitanareo fa tonga izany zavatra izany dia aoka ho fantatrareo fa efa akaiky, efa eo am-baravarana Izy.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary raha nipetraka teo an-tendrombohitra Oliva tandrifin’ny tempoly Izy dia nanontany Azy mangingina i Petera sy i Jakoba ary i Jaona sy i Andrea hoe: '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lazaiko aminareo marina tokoa fa tsy mba ho tapitra ity taranaka ity mandra-pahatongan’izany rehetra izany. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny lanitra sy ny tany dia ho levona fa ny teniko dia tsy mba ho levona.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Andriamanitra irery ihany no mahafantatra ny andro sy ny ora
    marker-yv: yv-h
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa ny amin’izany andro na ora izany dia tsy misy mahafantatra, na ny anjely any an-danitra, ary na ny Zanaka aza, afa-tsy ny Ray ihany.
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mat 25.13-15; Lio 19.12-13
    marker-yv: yv-h
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mitandrema, miambena ka mivavaha; fa tsy fantatrareo izay hiavian’ny fotoana. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izany dia tahaka ny olona nandeha hivahiny, izay nandao ny tranony ka nanome fahefana ny mpanompony, samy notolorany ny raharahany avy, ary ny mpiandry varavarana dia nasainy niambina tsara. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa miambena ianareo fa tsy fantatrareo izay andro hiavian’ny tompon-trano, na ho hariva, na ho mamatonalina, na ho maneno akoho, na ho maraina, '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fandrao avy tampoka Izy ka mahita anareo matory. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary izay lazaiko aminareo dia lazaiko amin’ny olona rehetra koa: Miambena.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lazao aminay: Rahoviana no ho tonga izany? Ary inona no ho famantarana rehefa ho tonga izany rehetra izany?'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Jesosy nilaza taminy hoe: Mitandrema mba tsy hisy hamitaka anareo. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa maro no ho avy amin’ny anarako hilaza hoe: Izaho no Izy, koa maro no ho voafitany. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary raha mandre ady sy filazana ady ianareo dia aza matahotra; tsy maintsy hitranga izany, nefa mbola tsy izay akory ny farany. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa hisy firenena hitsangana hamely firenena, hisy fanjakana hitsangana hamely fanjakana; ary hisy horohoron-tany any amin’ny toerana samihafa ary hisy mosary. Izany no ho fiandohan’ny faharariam-piterahana.
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mat 10.17-22; Lio 21.12-17
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa mitandrema ianareo; fa hatolotra amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Sinedriona
    - type: text
      text: ' sy hokapohina any amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sinagoga
    - type: text
      text: ' ary hitsangana eo anatrehan’ny mpanapaka sy ny mpanjaka noho ny Amiko ianareo, ho vavolombelona aminy. '
