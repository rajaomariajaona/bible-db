document_id: SNG.1,3103
type_code: plt
verses:
  '1':
  - type: text
    content: Ny tononkira tsara indrindra, izay an’i Solomona.
  - type: heading
    content: Resadresaka ifanaovan’ny mpifankatia
  - type: heading
    content: (Ravehivavy)
  '10':
  - type: text
    content: Mahatsara ny tarehinao ireo voahangy voatohy;
  - type: text
    content: manendrika ny vozonao ireo rojo feno perla.
  '11':
  - type: text
    content: Rojo volamena mitohitohy volafotsy kiboribory
  - type: text
    content: no ampiambozonanay anao.
  - type: heading
    content: (Ravehivavy)
  '12':
  - type: text
    content: Raha eo amin’ny latabany ny mpanjaka
  - type: text
    content: dia mamerovero tsara ny nardako.
  '13':
  - type: text
    content: Amiko, ny malalako dia miora iray fehezana madinika
  - type: text
    content: mandry eo an-tratrako.
  '14':
  - type: text
    content: Amiko, ny malalako dia salohim-boninkazo
  - type: text
    content: any an-tanim-boalobok’i Eny-Gedỳ.
  - type: heading
    content: (Ralehilahy)
  '15':
  - type: text
    content: Indro, tsara tarehy ianao, Rahavako;
  - type: text
    content: indro, tsara tarehy ianao;
  - type: text
    content: toy ny an’ny voromailala ny masonao.
  - type: heading
    content: (Ravehivavy)
  '16':
  - type: text
    content: Indro, tsara tarehy koa ianao, ry malalako,
  - type: text
    content: eny, mahafinaritra ianao;
  - type: text
    content: ahi-maitso no fandrianantsika.
  '17':
  - type: text
    content: Hazo sedera ny sakamandimbin’ny tranontsika,
  - type: text
    content: ary hazo kipreso ny valindrihantsika.
  '2':
  - type: text
    content: Enga anie ka hanoroka ahy amin’ny fanorohan’ny vavany izy!
  - type: text
    content: Fa tsara noho ny divay ny fitiavanao.
  '3':
  - type: text
    content: Mani-pofona ny menakao tsara,
  - type: text
    content: menaka manitra voaidina ny anaranao,
  - type: text
    content: koa izany no itiavan’ny tovovavy anao.
  '4':
  - type: text
    content: Tariho aho hanaraka anao, dia hiara-hihazakazaka isika;
  - type: text
    content: noentin’ny mpanjaka ho ao an’efitranony aho.
  - type: text
    content: Hifaly sy hiravoravo ao isika;
  - type: text
    content: hankalazaintsika mihoatra noho ny divay ny fitiavanao;
  - type: text
    content: fitiavana marina no itiavany anao.
  '5':
  - type: text
    content: Mivalomainty aho, nefa tsara tarehy, ry zanakavavin’i Jerosalema,
  - type: text
    content: toy ny tranolain’i Kedara, toy ny ambaindain’i Solomona.
  '6':
  - type: text
    content: Aza mibanjina ahy fa mivalomainty aho
  - type: text
    content: satria nodanihin’ny hainandro.
  - type: text
    content: Tezitra tamiko ny zanak’Ineny;
  - type: text
    content: notendreny ho mpiandry ny tanim-boalobony aho;
  - type: text
    content: nefa ny tanim-boaloboko kosa, izay ahy, dia tsy mba nambenako.
  '7':
  - type: text
    content: Ambarao amiko, ry ilay tian’ny foko,
  - type: text
    content: aiza no iandrasanao ny ondrinao,
  - type: text
    content: aiza no andriandrianao rehefa antoandro?
  - type: text
    content: Fa nahoana aho no ho tahaka izay mirenireny foana
  - type: text
    content: eny amin’ny andian’ondrin’ny namanao?
  - type: heading
    content: (Olon-kafa)
  '8':
  - type: text
    content: Raha tsy fantatrao, ry tsara tarehy indrindra amin’ny vehivavy,
  - type: text
    content: dia mandehana araho ny dian’ny andian’ondry aman’osy,
  - type: text
    content: ary andraso eny amin’ny tranolain’ny mpiandry ondry ny zanak’osinao.
  - type: heading
    content: (Ralehilahy)
  '9':
  - type: text
    content: Rahavako, ianao dia ampitahaiko
  - type: text
    content: amin’ny soavalivaviko mitarika ny kalesy fitondran’i Farao miady.
