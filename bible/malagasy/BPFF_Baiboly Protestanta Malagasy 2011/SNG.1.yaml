document_id: SNG.1,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Ny tononkira tsara indrindra, izay an’i Solomona.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Resadresaka ifanaovan’ny mpifankatia
    marker-yv: yv-h
  - type: usfm
    marker: sp
    children:
    - type: text
      text: (Ravehivavy)
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Mahatsara ny tarehinao ireo voahangy voatohy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: manendrika ny vozonao ireo rojo feno perla.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Rojo volamena mitohitohy volafotsy kiboribory
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no ampiambozonanay anao.
  - type: usfm
    marker: sp
    children:
    - type: text
      text: (Ravehivavy)
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Raha eo amin’ny latabany ny mpanjaka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia mamerovero tsara ny nardako.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Amiko, ny malalako dia miora iray fehezana madinika
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mandry eo an-tratrako.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Amiko, ny malalako dia salohim-boninkazo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: any an-tanim-boalobok’i Eny-Gedỳ.
  - type: usfm
    marker: sp
    children:
    - type: text
      text: (Ralehilahy)
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Indro, tsara tarehy ianao, Rahavako;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: indro, tsara tarehy ianao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toy ny an’ny voromailala ny masonao.
  - type: usfm
    marker: sp
    children:
    - type: text
      text: (Ravehivavy)
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Indro, tsara tarehy koa ianao, ry malalako,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, mahafinaritra ianao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ahi-maitso no fandrianantsika.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Hazo sedera ny sakamandimbin’ny tranontsika,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hazo kipreso ny valindrihantsika.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Enga anie ka hanoroka ahy amin’ny fanorohan’ny vavany izy!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa tsara noho ny divay ny fitiavanao.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Mani-pofona ny menakao tsara,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: menaka manitra voaidina ny anaranao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: koa izany no itiavan’ny tovovavy anao.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Tariho aho hanaraka anao, dia hiara-hihazakazaka isika;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: noentin’ny mpanjaka ho ao an’efitranony aho.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hifaly sy hiravoravo ao isika;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hankalazaintsika mihoatra noho ny divay ny fitiavanao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fitiavana marina no itiavany anao.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Mivalomainty aho, nefa tsara tarehy, ry zanakavavin’i Jerosalema,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toy ny tranolain’i Kedara, toy ny ambaindain’i Solomona.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Aza mibanjina ahy fa mivalomainty aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria nodanihin’ny hainandro.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tezitra tamiko ny zanak’Ineny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: notendreny ho mpiandry ny tanim-boalobony aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa ny tanim-boaloboko kosa, izay ahy, dia tsy mba nambenako.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Ambarao amiko, ry ilay tian’ny foko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aiza no iandrasanao ny ondrinao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aiza no andriandrianao rehefa antoandro?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa nahoana aho no ho tahaka izay mirenireny foana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny amin’ny andian’ondrin’ny namanao?
  - type: usfm
    marker: sp
    children:
    - type: text
      text: (Olon-kafa)
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Raha tsy fantatrao, ry tsara tarehy indrindra amin’ny vehivavy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia mandehana araho ny dian’ny andian’ondry aman’osy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary andraso eny amin’ny tranolain’ny mpiandry ondry ny zanak’osinao.
  - type: usfm
    marker: sp
    children:
    - type: text
      text: (Ralehilahy)
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Rahavako, ianao dia ampitahaiko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: amin’ny soavalivaviko mitarika ny kalesy fitondran’i Farao miady.
