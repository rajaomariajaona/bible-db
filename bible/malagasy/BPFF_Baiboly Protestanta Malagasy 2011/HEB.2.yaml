document_id: HEB.2
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary amin’izany dia tsy maintsy hotandremantsika mafimafy kokoa izay efa rentsika, fandrao hindaosina hiala aminy isika. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Fa raha tanteraka ny teny izay nampilazaina ny anjely ka samy voavaly marina avokoa ny fahadisoana rehetra mbamin’ny fahotana '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'dia hataontsika ahoana no fandositra, raha tsy mitandrina izao famonjena lehibe izao isika, dia ny famonjena izay nampilazaina ny Tompo tamin’ny voalohany, ary izay nandre dia nanamafy izany tamintsika kosa, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: sady Andriamanitra koa no niara-nanambara taminy tamin’ny famantarana sy ny fahagagana ary tamin’ny asa lehibe samihafa sy ny fanomezana ny Fanahy Masina nozarazarainy araka ny sitrapony.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Fa tsy anjely no nampanekeny ny fiainana ho avy, izay lazainay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Fa nisy iray nanambara eo amin’ny teny iray hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Inona ny olona no ahatsiarovanao azy?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny zanak’olombelona no amangianao azy?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Nataonao ambany kely noho ny anjely izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: efa nosatrohanao voninahitra sy fiandrianana izy;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ny zavatra rehetra dia efa nampanekenao ho eo ambanin’ny tongony» (Sal 8.4-6).
- type: usfm
  marker: m
  children:
  - type: text
    text: 'Fa tamin’ny nampanekeny Azy ny zavatra rehetra dia tsy nisy izay tsy nampanekeny Azy. Nefa ankehitriny dia mbola tsy hitantsika fa efa ampanekena Azy ny zavatra rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Fa ilay natao ambany kely noho ny anjely no hitantsika, dia Jesosy, ary noho ny fitondrany ny fahafatesana dia voasatroka voninahitra aman-daza Izy mba hanandrana ny fahafatesana hoenti-mamonjy ny olona rehetra noho ny fahasoavan’Andriamanitra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Fa Andriamanitra no anton’ny nanaovana ny zavatra rehetra sady nahariana ny zavatra rehetra. Rehefa mitondra zanaka maro ho any amin’ny voninahitra Izy dia tandrify Azy ny hitondra ny Tompon’ny famonjena azy ireo ho amin’ny fahatanterahana amin’ny alalan’ny fahoriana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Fa iray ihany no niavian’izy roa, na izay manamasina, na ireo izay hamasinina; koa izany no tsy mahamenatra Azy hiantso ireo hoe rahalahy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'raha hoy Izy hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Hitory ny anaranao amin’ny rahalahiko Aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eo amin’ny fiangonana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.12 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: eklesia.
    marker-yv: yv-n
  - type: text
    text: ' no hiderako Anao» (Sal 22.22).'
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary koa:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Raha Izaho dia hametraka fitokisana Aminy Aho».
- type: usfm
  marker: m
  children:
  - type: text
    text: 'Ary izao koa:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Indreto Izaho sy ireo zaza nomen’Andriamanitra Ahy.» (Isa 8.17-18)
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Koa satria manana nofo aman-dra ny zaza dia mba nandray izany koa Izy mba handringanany amin’ny fahafatesana ilay manana ny herin’ny fahafatesana, dia ny devoly, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'ary mba hanafahany izay rehetra nandany ny fiainany rehetra tamin’ny fahandevozana noho ny tahotra ny fahafatesana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Fa hita marina fa tsy anjely fa ny taranak’i Abrahama no vonjeny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Koa amin’izany dia mendrika mba hatao tahaka ny rahalahiny amin’ny zavatra rehetra Izy, mba ho Mpisoronabe mamindra fo sy mahatoky ny amin’ny fanompoana an’Andriamanitra, mba hanaovany fanavotana noho ny heloky ny olona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Fa satria nalaim-panahy tamin’ny fahoriana noentiny ny tenany dia mahavonjy izay alaim-panahy koa Izy.
