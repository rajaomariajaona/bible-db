document_id: HEB.2,3103
type_code: plt
verses:
  '1':
  - type: text
    content: 'Ary amin’izany dia tsy maintsy hotandremantsika mafimafy kokoa izay efa rentsika, fandrao hindaosina hiala aminy isika. '
  '10':
  - type: text
    content: 'Fa Andriamanitra no anton’ny nanaovana ny zavatra rehetra sady nahariana ny zavatra rehetra. Rehefa mitondra zanaka maro ho any amin’ny voninahitra Izy dia tandrify Azy ny hitondra ny Tompon’ny famonjena azy ireo ho amin’ny fahatanterahana amin’ny alalan’ny fahoriana. '
  '11':
  - type: text
    content: 'Fa iray ihany no niavian’izy roa, na izay manamasina, na ireo izay hamasinina; koa izany no tsy mahamenatra Azy hiantso ireo hoe rahalahy, '
  '12':
  - type: text
    content: 'raha hoy Izy hoe:'
  - type: text
    content: «Hitory ny anaranao amin’ny rahalahiko Aho;
  - type: text
    content: eo amin’ny fiangonana
  - type: note
    content: 'Na: eklesia.'
  - type: text
    content: ' no hiderako Anao» (Sal 22.22).'
  '13':
  - type: text
    content: 'Ary koa:'
  - type: text
    content: «Raha Izaho dia hametraka fitokisana Aminy Aho».
  - type: text
    content: 'Ary izao koa:'
  - type: text
    content: «Indreto Izaho sy ireo zaza nomen’Andriamanitra Ahy.» (Isa 8.17-18)
  '14':
  - type: text
    content: 'Koa satria manana nofo aman-dra ny zaza dia mba nandray izany koa Izy mba handringanany amin’ny fahafatesana ilay manana ny herin’ny fahafatesana, dia ny devoly, '
  '15':
  - type: text
    content: 'ary mba hanafahany izay rehetra nandany ny fiainany rehetra tamin’ny fahandevozana noho ny tahotra ny fahafatesana. '
  '16':
  - type: text
    content: 'Fa hita marina fa tsy anjely fa ny taranak’i Abrahama no vonjeny. '
  '17':
  - type: text
    content: 'Koa amin’izany dia mendrika mba hatao tahaka ny rahalahiny amin’ny zavatra rehetra Izy, mba ho Mpisoronabe mamindra fo sy mahatoky ny amin’ny fanompoana an’Andriamanitra, mba hanaovany fanavotana noho ny heloky ny olona. '
  '18':
  - type: text
    content: Fa satria nalaim-panahy tamin’ny fahoriana noentiny ny tenany dia mahavonjy izay alaim-panahy koa Izy.
  '2':
  - type: text
    content: 'Fa raha tanteraka ny teny izay nampilazaina ny anjely ka samy voavaly marina avokoa ny fahadisoana rehetra mbamin’ny fahotana '
  '3':
  - type: text
    content: 'dia hataontsika ahoana no fandositra, raha tsy mitandrina izao famonjena lehibe izao isika, dia ny famonjena izay nampilazaina ny Tompo tamin’ny voalohany, ary izay nandre dia nanamafy izany tamintsika kosa, '
  '4':
  - type: text
    content: sady Andriamanitra koa no niara-nanambara taminy tamin’ny famantarana sy ny fahagagana ary tamin’ny asa lehibe samihafa sy ny fanomezana ny Fanahy Masina nozarazarainy araka ny sitrapony.
  '5':
  - type: text
    content: 'Fa tsy anjely no nampanekeny ny fiainana ho avy, izay lazainay. '
  '6':
  - type: text
    content: 'Fa nisy iray nanambara eo amin’ny teny iray hoe:'
  - type: text
    content: «Inona ny olona no ahatsiarovanao azy?
  - type: text
    content: Ary ny zanak’olombelona no amangianao azy?
  '7':
  - type: text
    content: Nataonao ambany kely noho ny anjely izy;
  - type: text
    content: efa nosatrohanao voninahitra sy fiandrianana izy;
  '8':
  - type: text
    content: ny zavatra rehetra dia efa nampanekenao ho eo ambanin’ny tongony» (Sal 8.4-6).
  - type: text
    content: 'Fa tamin’ny nampanekeny Azy ny zavatra rehetra dia tsy nisy izay tsy nampanekeny Azy. Nefa ankehitriny dia mbola tsy hitantsika fa efa ampanekena Azy ny zavatra rehetra. '
  '9':
  - type: text
    content: Fa ilay natao ambany kely noho ny anjely no hitantsika, dia Jesosy, ary noho ny fitondrany ny fahafatesana dia voasatroka voninahitra aman-daza Izy mba hanandrana ny fahafatesana hoenti-mamonjy ny olona rehetra noho ny fahasoavan’Andriamanitra.
