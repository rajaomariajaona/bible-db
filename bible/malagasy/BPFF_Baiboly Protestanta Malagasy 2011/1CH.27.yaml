document_id: 1CH.27,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nandaminana ny tafiky ny fanjakana
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny amin’ny Zanak’Israely araka ny isany, dia ny loham-pianakaviany, ny mpifehy arivo, ny mpifehy zato ary ny mpifehy azy, izay nanompo ny mpanjaka tamin’izay raharahany rehetra isan-tokony, izay nifandimby isam-bolana mandritra ny herintaona, dia efatra arivo sy roa alina avy no isan’ny isan-tokony.
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny fahafito, ho amin’ny volana fahafito, dia i Heleza pelonita, isan’ny taranak’i Efraima; ny antokony dia efatra arivo sy roa alina.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny fahavalo, ho amin’ny volana fahavalo, dia i Sibekay hosatita, isan’ny Zerita; ny antokony dia efatra arivo sy roa alina.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny fahasivy, ho amin’ny volana fahasivy, dia i Abiezera anatotita, isan’ny Benjaminita; ny antokony dia efatra arivo sy roa alina.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny fahafolo, ho amin’ny volana fahafolo, dia i Maharay netofatita, isan’ny Zarita; ny antokony dia efatra arivo sy roa alina.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny fahiraika amby folo, ho amin’ny volana fahiraika amby folo, dia i Benaia piratonita, isan’ny taranak’i Efraima; ny antokony dia efatra arivo sy roa alina.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny faharoa amby folo, ho amin’ny volana faharoa amby folo, dia i Helday netofatita, isan’ny taranak’i Otniela; ny antokony dia efatra arivo sy roa alina.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Fandaminana ny fanjakana: Ireo lohan’ireo fokon’ny Israely'
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao no lohan’ireo fokon’ny Israely:'
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tamin’ny Robenita dia i Eliezera, zanakalahin’i Zikry;
  - type: usfm
    marker: p
    children:
    - type: text
      text: tamin’ny Simeonita dia i Sefatia, zanakalahin’i Maka;
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'tamin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: levita
    - type: text
      text: ' dia i Hasabia, zanakalahin’i Kemoela;'
  - type: usfm
    marker: p
    children:
    - type: text
      text: tamin’ny Aronita dia i Zadoka;
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: tamin’ny Joda dia i Eliho, izay isan’ny rahalahin’i Davida;
  - type: usfm
    marker: p
    children:
    - type: text
      text: tamin’ny Isakara dia i Omry, zanakalahin’i Mikaela;
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: tamin’ny Zebolona dia i Jismaia, zanakalahin’i Obadia;
  - type: usfm
    marker: p
    children:
    - type: text
      text: tamin’ny Naftaly dia i Jerimota, zanakalahin’i Azriela;
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny nifehy ny antoko voalohany, ho amin’ny volana voalohany, dia i Jasobeama, zanak’i Zabdiela; ny antokony dia efatra arivo sy roa alina. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: tamin’ny taranak’i Efraima dia i Hosea, zanakalahin’i Azazia;
  - type: usfm
    marker: p
    children:
    - type: text
      text: tamin’ny antsasaky ny fokon’i Manase dia i Joela, zanakalahin’i Pedaia;
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: tamin’ny antsasaky ny fokon’i Manase tao Gileada dia Ido, zanakalahin’i Zakaria;
  - type: usfm
    marker: p
    children:
    - type: text
      text: tamin’ny Benjamina dia i Jasiela, zanakalahin’i Abnera;
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: tamin’ny Dana dia i Azarela, zanakalahin’i Jerohama.
  - type: usfm
    marker: m
    children:
    - type: text
      text: Ireo no lohan’ireo fokon’ny Israely.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsy nanisa ny hatramin’ny roapolo taona no ho midina anefa i Davida satria efa nilaza NY TOMPO fa hampitombo ny Israely ho tahaka ny kintana eny amin’ny lanitra. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nanomboka nanisa i Joaba, zanak’i Zeroia, fa tsy nahefa, satria nisy fahatezerana nihatra tamin’ny Israely tamin’izany ka tsy voasoratra ao amin’ny bokin’ny tantaran’i Davida mpanjaka ny isany.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny mpitandrina ny fananan’ny fanjakana
    marker-yv: yv-h
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny tonian’ny trano fitahirizan’ny mpanjaka dia i Azmaveta, zanak’i Adiela;
  - type: usfm
    marker: p
    children:
    - type: text
      text: ny tonian’ny trano fitahirizana tany ambanivohitra, na tamin’ny tanàna, na tamin’ny vohitra, na tamin’ny tilikambo, dia i Jonatana, zanak’i Ozia;
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ny mpifehy ny mpiasa tany an-tsaha hiasa ny tany dia i Ezry, zanak’i Keloba;
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ny mpiandraikitra ny tanim-boaloboka dia i Simey ramatita;
  - type: usfm
    marker: p
    children:
    - type: text
      text: ny tonian’ny fitahirizana divay any amin’ny tanim-boaloboka dia i Zebdy sifmita;
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ny mpiandraikitra ny hazo oliva sy ny aviavy any Sefela dia i Baala-Hanana gaderita;
  - type: usfm
    marker: p
    children:
    - type: text
      text: ny tonian’ny fitahirizana diloilo dia i Joasy;
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ny mpiandraikitra ny fiandrasana omby any Saròna dia i Sitiray sarònita;
  - type: usfm
    marker: p
    children:
    - type: text
      text: ny mpiandraikitra ny omby any an-dohasaha dia i Safata, zanak’i Adlay;
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Isan’ny taranak’i Fareza izy sady lehiben’ny mpifehy rehetra tamin’ny tafika amin’ny volana voalohany. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny mpiandraikitra ny rameva dia i Obila ismaelita;
  - type: usfm
    marker: p
    children:
    - type: text
      text: ny mpiandraikitra ny borikivavy dia i Jedeia meronotita;
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ary ny mpiandraikitra ny ondry aman’osy dia i Jaziza hagarita.
  - type: usfm
    marker: m
    children:
    - type: text
      text: Ireo rehetra ireo no tonian’ny fananan’i Davida mpanjaka.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ireo mpanolotsaina manokana an’i Davida
    marker-yv: yv-h
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I Jonatana, rahalahin-drain’i Davida, dia mpanolotsaina; lehilahy be fahalalana izy sady mpitantsoratra; i Jehiela, zanak’i Hakmony, no nikarakara ny zanaky ny mpanjaka. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I Ahitofela dia mpanolotsaina ny mpanjaka; i Hosay arkita no namana akaiky ny mpanjaka; '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ny manarakaraka an’i Ahitofela dia i Jehoiada, zanak’i Benaia, sy i Abiatara; ary ny lehiben’ny miaramilan’ny mpanjaka dia i Joaba.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny nifehy ny antokony ho amin’ny volana faharoa dia i Doday ahohita; i Miklota andriandahy no isan’ny antokony; ny antokon’ny Ahohita dia efatra arivo sy roa alina.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny lehiben’ny antokony fahatelo tamin’ny tafika, ho amin’ny volana fahatelo, dia i Benaia, zanak’i Jehoiada mpisorona; ny antokony dia efatra arivo sy roa alina. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Io no ilay Benaia, izay nahery sady ambony tamin’izy telopolo lahy; i Amizabada zanany no isan’ny antokony.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny fahefatra, ho amin’ny volana fahefatra, dia i Asahela, rahalahin’i Joaba, ary i Zebadia zanany no nanarakaraka azy; ny antokony dia efatra arivo sy roa alina.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny fahadimy, ho amin’ny volana fahadimy, dia i Samihota jizraita; ny antokony dia efatra arivo sy roa alina.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny fahenina, ho amin’ny volana fahenina, dia Ira, zanak’Ikesy tekoita; ny antokony dia efatra arivo sy roa alina.
