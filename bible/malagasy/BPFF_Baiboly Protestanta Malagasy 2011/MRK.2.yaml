document_id: MRK.2,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ilay malemy tao Kapernaomy
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mat 9.1-8; Lio 5.17-26
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa afaka andro vitsivitsy dia niditra tao Kapernaomy indray Izy. Re fa tao amin’ny trano iray Jesosy, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa mba ho fantatrareo fa ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Zanak’Olona
    - type: text
      text: ' dia manana fahefana etỳ ambonin’ny tany hamela heloka, dia hoy Izy tamin’ilay malemy: '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lazaiko aminao: Mitsangàna, batao ny fandriananao ka modia any an-tranonao. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nitsangana izy ka nibata ny fandrianany niaraka tamin’izay ary niala teo anatrehan’ny olona rehetra; dia talanjona izy rehetra ka nankalaza an’Andriamanitra hoe: Tsy mbola nahita izay toy izao izahay.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: I Levy mpamory hetra
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mat 9.9-13; Lio 5.27-32
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lasa nandeha teny amoron-dranomasina indray Jesosy; ary nanatona Azy ny vahoaka rehetra ka nampianatra azy ireo Izy. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Teny am-pandehanana Izy dia nahita an’i Levy, zanak’i Alfeo, nipetraka teo am-pamorian-ketra; koa hoy Izy taminy: Manaraha Ahy. Dia nitsangana izy ka nanaraka Azy.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary raha nipetraka nisakafo tao an-tranon’i Levy Izy dia maro ny mpamory hetra sy ny mpanota no niara-nipetraka nisakafo tamin’i Jesosy mbamin’ny mpianany, satria maro izy ireo no nanaraka Azy. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpanoradalàna
    - type: text
      text: ', izay isan’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Fariseo
    - type: text
      text: ', raha nahita Azy niara-nipetraka nisakafo tamin’ny mpanota sy ny mpamory hetra, dia niteny tamin’ny mpianatra hoe: Miara-mihinana sy misotro amin’ny mpamory hetra sy ny mpanota Izy! '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha nahare izany Jesosy dia niteny taminy hoe: Tsy ny salama no mila mpitsabo fa ny marary. Tsy tonga hiantso ny marina Aho fa ny mpanota.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesosy sy ny fifadian-kanina
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mat 9.14-17; Lio 5.33-38
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin’izany fotoana izany dia nifady hanina ny mpianatr’i Jaona sy ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Fariseo
    - type: text
      text: '. Dia avy izy ireo ka niteny tamin’i Jesosy hoe: Nahoana ny mpianatr’i Jaona sy ny mpianatry ny Fariseo no mifady hanina fa ny mpianatrao kosa dia tsy mba mifady? '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy Jesosy taminy: Afaka mifady hanina va ireo havan’ny mpampakatra raha mbola ao aminy ihany ny mpampakatra? Raha mbola ao aminy ny mpampakatra dia tsy afaka hifady hanina izy. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ary maro ny olona tafavory tao ka tsy nisy hitoerana intsony na dia teny anoloan’ny varavarana aza. Ary nitoriany teny ireo.
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa ho avy ny andro izay hanalana ny mpampakatra hiala aminy ka amin’izay andro izay vao mifady hanina izy ireo.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsy misy olona manjaitra tapa-damba vaovao izay mbola tsy voasasa, amin’ny lamba tonta; fa raha izany, ny vaovao izay natampina, dia handrovitra ny tonta ka hiitatra ny rovitra. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary tsy misy olona manisy divay vaovao ao anaty siny hoditra tonta; fa raha izany dia hahatriatra ny siny hoditra ny divay ka samy ho very foana ny divay sy ny siny hoditra; fa divay vaovao no hatao ao anaty siny hoditra vaovao.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nanotazan’ny mpianatra salohim-bary tamin’ny Sabata
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mat 12.1-8; Lio 6.1-5
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha nandeha namakivaky tanimbary iray tamin’ny Sabata Jesosy dia nioty salohim-bary teny am-pandehanana ny mpianany. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Fariseo
    - type: text
      text: ' Taminy: Jereo, nahoana ireo no manao izay tsy azo atao amin’ny Sabata? '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy Izy taminy: Tsy mbola novakinareo va ny teny milaza ilay nataon’i Davida, raha reraky ny hanoanana izy mbamin’izay nanaraka azy? '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa niditra tao amin’ny tranon’Andriamanitra tamin’ny andron’i Abiatara '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpisoronabe
    - type: text
      text: ' izy ka nihinana ny mofo atao fanatitra, kanefa io mofo io dia mahadiso raha misy homana azy, afa-tsy ny mpisorona; ary nomeny koa izay nanaraka azy. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Izy taminy: Ny Sabata no natao ho an’ny olona fa tsy ny olona no natao ho an’ny Sabata, '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'koa Tompon’ny Sabata ihany koa ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Zanak’Olona
    - type: text
      text: .
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nisy nanatona nitondra lehilahy malemy ho eo Aminy, marary izay nolanjain’olona efa-dahy. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary satria tsy afaka nanakaiky Azy izy ireo noho ny habetsahan’ny vahoaka dia nanesorany ny tafon’ny trano nisy an’i Jesosy ka nony efa voasokatra izany dia nampidininy avy teo ny fandriana izay nandrian’ilay malemy. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Jesosy, nony nahita ny finoan’ireo, dia niteny tamin’ilay malemy hoe: Anaka, voavela ny helokao. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nisy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpanoradalàna
    - type: text
      text: ' sasany nipetraka teo ka nieritreritra tao am-pony hoe: '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nahoana Ilehity no miteny toy izany? Miteny ratsy Izy. Iza no mahavela heloka afa-tsy Iray ihany, dia Andriamanitra? '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Avy hatrany Jesosy dia nahalala tao am-panahiny fa izany no eritreritra tao am-pon’ireo ka hoy Izy taminy: Nahoana ianareo no mieritreritra izany zavatra izany ao am-ponareo? '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Inona moa no moramora kokoa, ny milaza amin’ilay malemy hoe: Voavela ny helokao, sa ny milaza hoe: Mitsangàna, batao ny fandriananao ka mandehana? '
