document_id: MRK.2,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ilay malemy tao Kapernaomy
  - type: heading
    content: Mat 9.1-8; Lio 5.17-26
  - type: text
    content: 'Rehefa afaka andro vitsivitsy dia niditra tao Kapernaomy indray Izy. Re fa tao amin’ny trano iray Jesosy, '
  '10':
  - type: text
    content: 'Fa mba ho fantatrareo fa ny '
  - type: text
    content: Zanak’Olona
  - type: text
    content: ' dia manana fahefana etỳ ambonin’ny tany hamela heloka, dia hoy Izy tamin’ilay malemy: '
  '11':
  - type: text
    content: 'Lazaiko aminao: Mitsangàna, batao ny fandriananao ka modia any an-tranonao. '
  '12':
  - type: text
    content: 'Dia nitsangana izy ka nibata ny fandrianany niaraka tamin’izay ary niala teo anatrehan’ny olona rehetra; dia talanjona izy rehetra ka nankalaza an’Andriamanitra hoe: Tsy mbola nahita izay toy izao izahay.'
  - type: heading
    content: I Levy mpamory hetra
  - type: heading
    content: Mat 9.9-13; Lio 5.27-32
  '13':
  - type: text
    content: 'Lasa nandeha teny amoron-dranomasina indray Jesosy; ary nanatona Azy ny vahoaka rehetra ka nampianatra azy ireo Izy. '
  '14':
  - type: text
    content: 'Teny am-pandehanana Izy dia nahita an’i Levy, zanak’i Alfeo, nipetraka teo am-pamorian-ketra; koa hoy Izy taminy: Manaraha Ahy. Dia nitsangana izy ka nanaraka Azy.'
  '15':
  - type: text
    content: 'Ary raha nipetraka nisakafo tao an-tranon’i Levy Izy dia maro ny mpamory hetra sy ny mpanota no niara-nipetraka nisakafo tamin’i Jesosy mbamin’ny mpianany, satria maro izy ireo no nanaraka Azy. '
  '16':
  - type: text
    content: 'Ary ny '
  - type: text
    content: mpanoradalàna
  - type: text
    content: ', izay isan’ny '
  - type: text
    content: Fariseo
  - type: text
    content: ', raha nahita Azy niara-nipetraka nisakafo tamin’ny mpanota sy ny mpamory hetra, dia niteny tamin’ny mpianatra hoe: Miara-mihinana sy misotro amin’ny mpamory hetra sy ny mpanota Izy! '
  '17':
  - type: text
    content: 'Raha nahare izany Jesosy dia niteny taminy hoe: Tsy ny salama no mila mpitsabo fa ny marary. Tsy tonga hiantso ny marina Aho fa ny mpanota.'
  - type: heading
    content: Jesosy sy ny fifadian-kanina
  - type: heading
    content: Mat 9.14-17; Lio 5.33-38
  '18':
  - type: text
    content: 'Tamin’izany fotoana izany dia nifady hanina ny mpianatr’i Jaona sy ny '
  - type: text
    content: Fariseo
  - type: text
    content: '. Dia avy izy ireo ka niteny tamin’i Jesosy hoe: Nahoana ny mpianatr’i Jaona sy ny mpianatry ny Fariseo no mifady hanina fa ny mpianatrao kosa dia tsy mba mifady? '
  '19':
  - type: text
    content: 'Hoy Jesosy taminy: Afaka mifady hanina va ireo havan’ny mpampakatra raha mbola ao aminy ihany ny mpampakatra? Raha mbola ao aminy ny mpampakatra dia tsy afaka hifady hanina izy. '
  '2':
  - type: text
    content: ary maro ny olona tafavory tao ka tsy nisy hitoerana intsony na dia teny anoloan’ny varavarana aza. Ary nitoriany teny ireo.
  '20':
  - type: text
    content: Fa ho avy ny andro izay hanalana ny mpampakatra hiala aminy ka amin’izay andro izay vao mifady hanina izy ireo.
  '21':
  - type: text
    content: 'Tsy misy olona manjaitra tapa-damba vaovao izay mbola tsy voasasa, amin’ny lamba tonta; fa raha izany, ny vaovao izay natampina, dia handrovitra ny tonta ka hiitatra ny rovitra. '
  '22':
  - type: text
    content: Ary tsy misy olona manisy divay vaovao ao anaty siny hoditra tonta; fa raha izany dia hahatriatra ny siny hoditra ny divay ka samy ho very foana ny divay sy ny siny hoditra; fa divay vaovao no hatao ao anaty siny hoditra vaovao.
  - type: heading
    content: Ny nanotazan’ny mpianatra salohim-bary tamin’ny Sabata
  - type: heading
    content: Mat 12.1-8; Lio 6.1-5
  '23':
  - type: text
    content: 'Raha nandeha namakivaky tanimbary iray tamin’ny Sabata Jesosy dia nioty salohim-bary teny am-pandehanana ny mpianany. '
  '24':
  - type: text
    content: 'Dia hoy ny '
  - type: text
    content: Fariseo
  - type: text
    content: ' Taminy: Jereo, nahoana ireo no manao izay tsy azo atao amin’ny Sabata? '
  '25':
  - type: text
    content: 'Fa hoy Izy taminy: Tsy mbola novakinareo va ny teny milaza ilay nataon’i Davida, raha reraky ny hanoanana izy mbamin’izay nanaraka azy? '
  '26':
  - type: text
    content: 'Fa niditra tao amin’ny tranon’Andriamanitra tamin’ny andron’i Abiatara '
  - type: text
    content: mpisoronabe
  - type: text
    content: ' izy ka nihinana ny mofo atao fanatitra, kanefa io mofo io dia mahadiso raha misy homana azy, afa-tsy ny mpisorona; ary nomeny koa izay nanaraka azy. '
  '27':
  - type: text
    content: 'Ary hoy Izy taminy: Ny Sabata no natao ho an’ny olona fa tsy ny olona no natao ho an’ny Sabata, '
  '28':
  - type: text
    content: 'koa Tompon’ny Sabata ihany koa ny '
  - type: text
    content: Zanak’Olona
  - type: text
    content: .
  '3':
  - type: text
    content: 'Dia nisy nanatona nitondra lehilahy malemy ho eo Aminy, marary izay nolanjain’olona efa-dahy. '
  '4':
  - type: text
    content: 'Ary satria tsy afaka nanakaiky Azy izy ireo noho ny habetsahan’ny vahoaka dia nanesorany ny tafon’ny trano nisy an’i Jesosy ka nony efa voasokatra izany dia nampidininy avy teo ny fandriana izay nandrian’ilay malemy. '
  '5':
  - type: text
    content: 'Ary Jesosy, nony nahita ny finoan’ireo, dia niteny tamin’ilay malemy hoe: Anaka, voavela ny helokao. '
  '6':
  - type: text
    content: 'Ary nisy '
  - type: text
    content: mpanoradalàna
  - type: text
    content: ' sasany nipetraka teo ka nieritreritra tao am-pony hoe: '
  '7':
  - type: text
    content: 'Nahoana Ilehity no miteny toy izany? Miteny ratsy Izy. Iza no mahavela heloka afa-tsy Iray ihany, dia Andriamanitra? '
  '8':
  - type: text
    content: 'Avy hatrany Jesosy dia nahalala tao am-panahiny fa izany no eritreritra tao am-pon’ireo ka hoy Izy taminy: Nahoana ianareo no mieritreritra izany zavatra izany ao am-ponareo? '
  '9':
  - type: text
    content: 'Inona moa no moramora kokoa, ny milaza amin’ilay malemy hoe: Voavela ny helokao, sa ny milaza hoe: Mitsangàna, batao ny fandriananao ka mandehana? '
