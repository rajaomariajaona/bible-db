document_id: MAT.15
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesosy sy ny fomban-drazana
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mar 7.1-23
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary nisy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Fariseo
  - type: text
    text: ' sy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpanoradalàna
  - type: text
    text: ' avy tany Jerosalema nankeo amin’i Jesosy ka niteny hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Nahoana ny mpianatrao no mandika ny fampianarana voatolotry ny razana? Fa tsy mba manasa tanana izy ireo rehefa hihinan-kanina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary Izy namaly azy ireo hoe: Nahoana kosa ianareo no mandika ny didin’Andriamanitra noho ny fampianarana voatolotra anareo? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Fa Andriamanitra efa niteny hoe: «Manajà ny rainao sy ny reninao» (Eks 20.12), ary koa: «Izay miteny ratsy ny rainy na ny reniny dia hovonoina ho faty tokoa» (Eks 21.17). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Fa hoy kosa ianareo: Na zovy na zovy no milaza amin’ny rainy na amin’ny reniny hoe: Efa nateriko ho fanatitra ho an’Andriamanitra izay fanampiana rehetra tokony ho anao avy amiko, dia tsy mila manaja ny rainy na ny reniny intsony izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Koa dia foananareo ny tenin’Andriamanitra noho ny fampianarana voatolotra anareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ry mpihatsaravelatsihy, marina ny naminanian’Isaia anareo hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: «Ity firenena ity dia manaja Ahy amin’ny molony
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny fony kosa lavitra Ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Koa zava-poana ny ivavahan’ireo Amiko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: raha mampianatra didin’olombelona ho fampianarana izy» (Isa 29.13).
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat 7.14-23
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary niantso ny vahoaka hankeo aminy Izy ka niteny taminy hoe: Mihainoa ka fantaro: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Tsy izay miditra amin’ny vava no mahaloto ny olona, fa izay mivoaka avy amin’ny vava, izany no mahaloto ny olona.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Dia nankeo Aminy ny mpianatra ka niteny Taminy hoe: Fantatrao va fa tafintohina ny Fariseo raha nandre izany teny izany? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Fa Izy namaly hoe: Ny zavatra rehetra izay tsy nambolen’ny Raiko izay any an-danitra dia hongotana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Avelao izy, fa jamba mitarika jamba; ary raha ny jamba no mitarika jamba dia samy ho latsaka any an-kady izy roa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Fa hoy i Petera Taminy: Lazao aminay ny hevitr’izany fanoharana izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Dia hoy Jesosy: Ianareo koa va mbola tsy mahafantatra ihany? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Tsy fantatrareo va fa izay rehetra miditra amin’ny vava dia mankao an-kibo ka avoaka any amin’ny toeram-pivoahana? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Fa izay mivoaka avy amin’ny vava kosa dia avy amin’ny fo ka izany no mahaloto ny olona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Fa avy amin’ny fo no ivoahan’ny sain-dratsy, dia ny vonoan’olona, ny fakàna vadin’olona, ny fijangajangana, ny halatra, ny fiampangana lainga, ny fitenenan-dratsy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: izany no mahaloto ny olona; fa ny mihinana amin’ny tanana tsy voasasa dia tsy mba mahaloto ny olona.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny finoan’ilay vehivavy kananita
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mar 7.24-30
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Dia niala teo Jesosy ka nankany amin’ny faritanin’i Tiro sy Sidona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary indro, nisy vehivavy kananita iray avy tamin’izany faritra izany niantsoantso hoe: Mamindrà fo amiko, Tompoko, Zanak’i Davida ô! Ny zanako vavy dia ampahorin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: demonia
  - type: text
    text: ' loatra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Kanefa Izy tsy namaly azy akory na dia teny indraimbava aza. Dia nanatona ny mpianany ka nangataka Taminy hoe: Roahy izy fa miantsoantso mafy ato aorianantsika. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Fa Izy namaly hoe: Tsy nirahina Aho afa-tsy ho amin’ny ondry very amin’ny taranak’Israely. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Nanatona ihany anefa Ravehivavy sady niankohoka teo anatrehany no niteny Taminy hoe: Tompoko ô, vonjeo aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ary Izy namaly hoe: Tsy mety raha maka ny mofon-jaza ka manipy azy ho an’ny amboa kely. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Fa hoy Ravehivavy: Marina izany, Tompoko; fa na dia ny amboa kely aza mba mihinana izay sombintsombiny latsaka avy amin’ny latabatry ny tompony ihany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Dia namaly azy Jesosy hoe: Ravehivavy, lehibe ny finoanao; tongava aminao araka izay irinao. Dia sitrana ny zanany vavy tamin’izay ora izay.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fanasitranana teo amoron’ny ranomasin’i Galilia
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mar 7.31-37
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Raha niala teo Jesosy dia nankany amoron’ny ranomasin’i Galilia; niakatra nankeo an-tendrombohitra Izy ka nipetraka teo; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'ary nisy vahoaka betsaka nankeo Aminy nitondra ny mandringa, ny jamba, ny kilemaina, ny moana sy ny maro hafa koa, ka nametraka azy teo akaikin’ny tongotr’i Jesosy; dia nahasitrana azy ireny Izy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: talanjona ny vahoaka, raha nahita ny moana miteny, ny kilemaina sitrana, ny mandringa afaka mandeha ary ny jamba mahiratra; dia nankalaza an’Andriamanitry ny Israely izy rehetra.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nampihinanan’i Jesosy ny olona efatra arivo lahy
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mar 8.1-10; ampit. 14.13-21
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Ary Jesosy niantso ny mpianany hankeo Aminy ka niteny hoe: Mahonena Ahy ny vahoaka, fa efa nitoetra hateloana tatỳ Amiko izy izao nefa tsy manan-kohanina ihany; tsy tiako ny hampody azy ireo tsy mihinana, fandrao reraka eny an-dalana izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Fa hoy ny mpianatra Taminy: Aiza no hahitanay mofo ampy hahavoky izao vahoaka betsaka izao atỳ an-tany efitra? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ary hoy Jesosy taminy: Misy mofo firy ary any aminareo? Dia hoy ireo: Fito sy hazandrano madinika vitsy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Dia nandidy ny vahoaka hipetraka amin’ny tany Izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Ary nandray ny mofo fito mbamin’ny hazandrano Izy, koa rehefa nisaotra dia namaky izany ka nanolotra azy ho an’ny mpianatra ary ny mpianatra kosa dia nanolotra izany ho an’ny vahoaka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Nihinana avokoa izy rehetra ka voky; rehefa nangoniny ny sombintsombiny sisa tsy lany dia nahafeno fito sobika. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Ary izay nihinana dia efatra arivo lahy, afa-tsy ny zaza amam-behivavy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Ary nony efa nampody ny vahoaka Izy dia niondrana an-tsambokely ka nankany amin’ny sisintanin’i Magadana.
