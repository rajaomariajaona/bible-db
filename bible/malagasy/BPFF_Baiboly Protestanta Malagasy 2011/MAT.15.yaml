document_id: MAT.15,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Jesosy sy ny fomban-drazana
  - type: heading
    content: Mar 7.1-23
  - type: text
    content: 'Ary nisy '
  - type: text
    content: Fariseo
  - type: text
    content: ' sy '
  - type: text
    content: mpanoradalàna
  - type: text
    content: ' avy tany Jerosalema nankeo amin’i Jesosy ka niteny hoe: '
  '10':
  - type: text
    content: 'Ary niantso ny vahoaka hankeo aminy Izy ka niteny taminy hoe: Mihainoa ka fantaro: '
  '11':
  - type: text
    content: Tsy izay miditra amin’ny vava no mahaloto ny olona, fa izay mivoaka avy amin’ny vava, izany no mahaloto ny olona.
  '12':
  - type: text
    content: 'Dia nankeo Aminy ny mpianatra ka niteny Taminy hoe: Fantatrao va fa tafintohina ny Fariseo raha nandre izany teny izany? '
  '13':
  - type: text
    content: 'Fa Izy namaly hoe: Ny zavatra rehetra izay tsy nambolen’ny Raiko izay any an-danitra dia hongotana. '
  '14':
  - type: text
    content: Avelao izy, fa jamba mitarika jamba; ary raha ny jamba no mitarika jamba dia samy ho latsaka any an-kady izy roa.
  '15':
  - type: text
    content: 'Fa hoy i Petera Taminy: Lazao aminay ny hevitr’izany fanoharana izany. '
  '16':
  - type: text
    content: 'Dia hoy Jesosy: Ianareo koa va mbola tsy mahafantatra ihany? '
  '17':
  - type: text
    content: 'Tsy fantatrareo va fa izay rehetra miditra amin’ny vava dia mankao an-kibo ka avoaka any amin’ny toeram-pivoahana? '
  '18':
  - type: text
    content: 'Fa izay mivoaka avy amin’ny vava kosa dia avy amin’ny fo ka izany no mahaloto ny olona. '
  '19':
  - type: text
    content: 'Fa avy amin’ny fo no ivoahan’ny sain-dratsy, dia ny vonoan’olona, ny fakàna vadin’olona, ny fijangajangana, ny halatra, ny fiampangana lainga, ny fitenenan-dratsy; '
  '2':
  - type: text
    content: 'Nahoana ny mpianatrao no mandika ny fampianarana voatolotry ny razana? Fa tsy mba manasa tanana izy ireo rehefa hihinan-kanina. '
  '20':
  - type: text
    content: izany no mahaloto ny olona; fa ny mihinana amin’ny tanana tsy voasasa dia tsy mba mahaloto ny olona.
  - type: heading
    content: Ny finoan’ilay vehivavy kananita
  - type: heading
    content: Mar 7.24-30
  '21':
  - type: text
    content: 'Dia niala teo Jesosy ka nankany amin’ny faritanin’i Tiro sy Sidona. '
  '22':
  - type: text
    content: 'Ary indro, nisy vehivavy kananita iray avy tamin’izany faritra izany niantsoantso hoe: Mamindrà fo amiko, Tompoko, Zanak’i Davida ô! Ny zanako vavy dia ampahorin’ny '
  - type: text
    content: demonia
  - type: text
    content: ' loatra. '
  '23':
  - type: text
    content: 'Kanefa Izy tsy namaly azy akory na dia teny indraimbava aza. Dia nanatona ny mpianany ka nangataka Taminy hoe: Roahy izy fa miantsoantso mafy ato aorianantsika. '
  '24':
  - type: text
    content: 'Fa Izy namaly hoe: Tsy nirahina Aho afa-tsy ho amin’ny ondry very amin’ny taranak’Israely. '
  '25':
  - type: text
    content: 'Nanatona ihany anefa Ravehivavy sady niankohoka teo anatrehany no niteny Taminy hoe: Tompoko ô, vonjeo aho. '
  '26':
  - type: text
    content: 'Ary Izy namaly hoe: Tsy mety raha maka ny mofon-jaza ka manipy azy ho an’ny amboa kely. '
  '27':
  - type: text
    content: 'Fa hoy Ravehivavy: Marina izany, Tompoko; fa na dia ny amboa kely aza mba mihinana izay sombintsombiny latsaka avy amin’ny latabatry ny tompony ihany. '
  '28':
  - type: text
    content: 'Dia namaly azy Jesosy hoe: Ravehivavy, lehibe ny finoanao; tongava aminao araka izay irinao. Dia sitrana ny zanany vavy tamin’izay ora izay.'
  - type: heading
    content: Fanasitranana teo amoron’ny ranomasin’i Galilia
  - type: heading
    content: Mar 7.31-37
  '29':
  - type: text
    content: 'Raha niala teo Jesosy dia nankany amoron’ny ranomasin’i Galilia; niakatra nankeo an-tendrombohitra Izy ka nipetraka teo; '
  '3':
  - type: text
    content: 'Ary Izy namaly azy ireo hoe: Nahoana kosa ianareo no mandika ny didin’Andriamanitra noho ny fampianarana voatolotra anareo? '
  '30':
  - type: text
    content: 'ary nisy vahoaka betsaka nankeo Aminy nitondra ny mandringa, ny jamba, ny kilemaina, ny moana sy ny maro hafa koa, ka nametraka azy teo akaikin’ny tongotr’i Jesosy; dia nahasitrana azy ireny Izy; '
  '31':
  - type: text
    content: talanjona ny vahoaka, raha nahita ny moana miteny, ny kilemaina sitrana, ny mandringa afaka mandeha ary ny jamba mahiratra; dia nankalaza an’Andriamanitry ny Israely izy rehetra.
  - type: heading
    content: Ny nampihinanan’i Jesosy ny olona efatra arivo lahy
  - type: heading
    content: Mar 8.1-10; ampit. 14.13-21
  '32':
  - type: text
    content: 'Ary Jesosy niantso ny mpianany hankeo Aminy ka niteny hoe: Mahonena Ahy ny vahoaka, fa efa nitoetra hateloana tatỳ Amiko izy izao nefa tsy manan-kohanina ihany; tsy tiako ny hampody azy ireo tsy mihinana, fandrao reraka eny an-dalana izy. '
  '33':
  - type: text
    content: 'Fa hoy ny mpianatra Taminy: Aiza no hahitanay mofo ampy hahavoky izao vahoaka betsaka izao atỳ an-tany efitra? '
  '34':
  - type: text
    content: 'Ary hoy Jesosy taminy: Misy mofo firy ary any aminareo? Dia hoy ireo: Fito sy hazandrano madinika vitsy.'
  '35':
  - type: text
    content: 'Dia nandidy ny vahoaka hipetraka amin’ny tany Izy. '
  '36':
  - type: text
    content: 'Ary nandray ny mofo fito mbamin’ny hazandrano Izy, koa rehefa nisaotra dia namaky izany ka nanolotra azy ho an’ny mpianatra ary ny mpianatra kosa dia nanolotra izany ho an’ny vahoaka. '
  '37':
  - type: text
    content: 'Nihinana avokoa izy rehetra ka voky; rehefa nangoniny ny sombintsombiny sisa tsy lany dia nahafeno fito sobika. '
  '38':
  - type: text
    content: Ary izay nihinana dia efatra arivo lahy, afa-tsy ny zaza amam-behivavy.
  '39':
  - type: text
    content: Ary nony efa nampody ny vahoaka Izy dia niondrana an-tsambokely ka nankany amin’ny sisintanin’i Magadana.
  '4':
  - type: text
    content: 'Fa Andriamanitra efa niteny hoe: «Manajà ny rainao sy ny reninao» (Eks 20.12), ary koa: «Izay miteny ratsy ny rainy na ny reniny dia hovonoina ho faty tokoa» (Eks 21.17). '
  '5':
  - type: text
    content: 'Fa hoy kosa ianareo: Na zovy na zovy no milaza amin’ny rainy na amin’ny reniny hoe: Efa nateriko ho fanatitra ho an’Andriamanitra izay fanampiana rehetra tokony ho anao avy amiko, dia tsy mila manaja ny rainy na ny reniny intsony izy. '
  '6':
  - type: text
    content: 'Koa dia foananareo ny tenin’Andriamanitra noho ny fampianarana voatolotra anareo. '
  '7':
  - type: text
    content: 'Ry mpihatsaravelatsihy, marina ny naminanian’Isaia anareo hoe:'
  '8':
  - type: text
    content: «Ity firenena ity dia manaja Ahy amin’ny molony
  - type: text
    content: fa ny fony kosa lavitra Ahy.
  '9':
  - type: text
    content: Koa zava-poana ny ivavahan’ireo Amiko,
  - type: text
    content: raha mampianatra didin’olombelona ho fampianarana izy» (Isa 29.13).
  - type: heading
    content: Mat 7.14-23
