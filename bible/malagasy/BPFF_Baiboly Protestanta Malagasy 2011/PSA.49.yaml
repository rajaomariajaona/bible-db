document_id: PSA.49,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Tsy mahatondra na inona na inona ny olona rehefa maty
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: Ho an’ny mpiventy hira. Salamo nataon’ny Koraìta.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Mihainoa izao, ry firenena rehetra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: atongilano ny sofinareo, ry mponina rehetra amin’izao tontolo izao,
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Hita mantsy fa maty ihany ny olon-kendry
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny adala sy ny kentrina koa dia samy lasa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka mamela ny fananany ho an’ny hafa.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Heveriny fa haharitra mandrakizay ny tranony
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hahatratra ny taranaka fara aman-dimby ny fonenany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria izy no nanome anarana ny taniny.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Nefa na dia manana voninahitra aza ny olona dia tsy maharitra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tahaka ny biby izay samy tsy maintsy ho faty izy.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Izany no falehan’ny olona adala;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'finaritra amin’ny teniny ny taranany mandimby azy. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Fiatoana
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Tahaka ny fanangona ondry no fanangona azy any amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: fitoeran’ny maty
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny fahafatesana no mpiandry azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hanosihosy azy ny olo-mahitsy nony maraina;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ho levona ny bikany fa ny fitoeran’ny maty no fonenany.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Fa Andriamanitra kosa no hanafaka ahy avy ao amin’ny fitoeran’ny maty,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'satria handray ahy Izy. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Fiatoana
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Aza matahotra ianao raha misy olona tonga manankarena
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka mitombo ny voninahitry ny tranony;
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: fa tsy hitondra na inona na inona izy raha maty;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy mba hidina hanaraka azy ny voninahiny.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Afaka miarahaba tena izy raha mbola velona hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Midera anao ny olona fa manisy soa ny tenanao ianao.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Mankany amin’ny razanao ianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa ireny dia tsy hahita ny mazava intsony mandrakizay.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: na ny kely, na ny lehibe,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na ny manankarena, na ny mahantra!
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Izay olona manana voninahitra nefa tsy manan-tsaina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia tahaka ny biby izay samy tsy maintsy ho faty.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Hilaza fahendrena ny vavako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hibitsika fahalalana ny foko.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Hanongilana ny sofiko hihaino tononkalo aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hanazava teny saro-pantarina amin’ny alalan’ny lokanga.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Nahoana aho no hatahotra amin’ny andro fahoriana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nony manodidina ahy ny haratsiam-panahin’ny mpamingana?
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Matoky ny harenany ireny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady mirehareha amin’ny haben’ny fananany.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Tsy misy olona mahavotra ny rahalahiny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na afaka manome an’Andriamanitra izay vola hanavotany azy.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Fa lafo ny takalon’ny ainy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy takatra mandrakizay.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Moa ho velona mandrakizay va izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy hiharan’ny fahalovana?
