document_id: PSA.49,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Tsy mahatondra na inona na inona ny olona rehefa maty
  - type: text
    content: Ho an’ny mpiventy hira. Salamo nataon’ny Koraìta.
  - type: text
    content: Mihainoa izao, ry firenena rehetra;
  - type: text
    content: atongilano ny sofinareo, ry mponina rehetra amin’izao tontolo izao,
  '10':
  - type: text
    content: Hita mantsy fa maty ihany ny olon-kendry
  - type: text
    content: ary ny adala sy ny kentrina koa dia samy lasa
  - type: text
    content: ka mamela ny fananany ho an’ny hafa.
  '11':
  - type: text
    content: Heveriny fa haharitra mandrakizay ny tranony
  - type: text
    content: ary hahatratra ny taranaka fara aman-dimby ny fonenany,
  - type: text
    content: satria izy no nanome anarana ny taniny.
  '12':
  - type: text
    content: Nefa na dia manana voninahitra aza ny olona dia tsy maharitra;
  - type: text
    content: tahaka ny biby izay samy tsy maintsy ho faty izy.
  '13':
  - type: text
    content: Izany no falehan’ny olona adala;
  - type: text
    content: 'finaritra amin’ny teniny ny taranany mandimby azy. '
  - type: text
    content: Fiatoana
  '14':
  - type: text
    content: 'Tahaka ny fanangona ondry no fanangona azy any amin’ny '
  - type: text
    content: fitoeran’ny maty
  - type: text
    content: ','
  - type: text
    content: ny fahafatesana no mpiandry azy;
  - type: text
    content: hanosihosy azy ny olo-mahitsy nony maraina;
  - type: text
    content: ary ho levona ny bikany fa ny fitoeran’ny maty no fonenany.
  '15':
  - type: text
    content: Fa Andriamanitra kosa no hanafaka ahy avy ao amin’ny fitoeran’ny maty,
  - type: text
    content: 'satria handray ahy Izy. '
  - type: text
    content: Fiatoana
  '16':
  - type: text
    content: Aza matahotra ianao raha misy olona tonga manankarena
  - type: text
    content: ka mitombo ny voninahitry ny tranony;
  '17':
  - type: text
    content: fa tsy hitondra na inona na inona izy raha maty;
  - type: text
    content: tsy mba hidina hanaraka azy ny voninahiny.
  '18':
  - type: text
    content: 'Afaka miarahaba tena izy raha mbola velona hoe:'
  - type: text
    content: Midera anao ny olona fa manisy soa ny tenanao ianao.
  '19':
  - type: text
    content: Mankany amin’ny razanao ianao,
  - type: text
    content: nefa ireny dia tsy hahita ny mazava intsony mandrakizay.
  '2':
  - type: text
    content: na ny kely, na ny lehibe,
  - type: text
    content: na ny manankarena, na ny mahantra!
  '20':
  - type: text
    content: Izay olona manana voninahitra nefa tsy manan-tsaina
  - type: text
    content: dia tahaka ny biby izay samy tsy maintsy ho faty.
  '3':
  - type: text
    content: Hilaza fahendrena ny vavako
  - type: text
    content: ary hibitsika fahalalana ny foko.
  '4':
  - type: text
    content: Hanongilana ny sofiko hihaino tononkalo aho
  - type: text
    content: ary hanazava teny saro-pantarina amin’ny alalan’ny lokanga.
  '5':
  - type: text
    content: Nahoana aho no hatahotra amin’ny andro fahoriana
  - type: text
    content: nony manodidina ahy ny haratsiam-panahin’ny mpamingana?
  '6':
  - type: text
    content: Matoky ny harenany ireny
  - type: text
    content: sady mirehareha amin’ny haben’ny fananany.
  '7':
  - type: text
    content: Tsy misy olona mahavotra ny rahalahiny
  - type: text
    content: na afaka manome an’Andriamanitra izay vola hanavotany azy.
  '8':
  - type: text
    content: Fa lafo ny takalon’ny ainy
  - type: text
    content: ka tsy takatra mandrakizay.
  '9':
  - type: text
    content: Moa ho velona mandrakizay va izy
  - type: text
    content: ka tsy hiharan’ny fahalovana?
