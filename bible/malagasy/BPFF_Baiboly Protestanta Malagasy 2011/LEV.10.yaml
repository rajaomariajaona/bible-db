document_id: LEV.10
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fitsipika momba ny fisaonana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary i Nadaba sy i Abiho, zanak’i Arona, dia samy naka ny fitondrana afony avy ary nanisy afo tao anatiny sy ditin-kazo manitra teo amboniny, dia nanatitra afo tsy izy teo anatrehan’NY TOMPO, izay tsy nandidiany azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ary nisy afo nivoaka avy teo anatrehan’NY TOMPO ka nahafaty azy roa lahy; maty teo anatrehan’NY TOMPO izy ireo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Hoy i Mosesy tamin’i Arona: Izany ilay nolazain’NY TOMPO hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Amin’izay akaiky Ahy no hisehoako ho masina
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary eo anatrehan’ny olona rehetra no hampisehoako ny voninahitro.
- type: usfm
  marker: m
  children:
  - type: text
    text: Dia sina i Arona.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary i Mosesy dia niantso an’i Misaela sy i Elzafana, zanak’i Oziela, rahalahin-drain’i Arona, ka niteny taminy hoe: Manatòna ka ento hiala teo anoloan’ny fitoerana masina ny rahalahinareo ho eny ivelan’ny toby. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Dia nanatona izy roa lahy ka nitondra azy, mbola miakanjo ny akanjo lavany ihany, ho eny ivelan’ny toby, araka izay nolazain’i Mosesy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary hoy i Mosesy tamin’i Arona sy i Eleazara ary Itamara, zanany lahy: Aza asaritaka ny volonareo na rovitina ny akanjonareo fandrao ho faty koa ianareo sady hisy fahatezerana hahatratra ny fiangonana manontolo; fa aoka ny rahalahinareo, dia ny taranak’Israely rehetra, no hitomany noho ny afo izay narehitry NY TOMPO. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Aza miala eo anoloan’ny varavaran’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tranolay fihaonana
  - type: text
    text: ' fandrao maty ianareo satria eo aminareo ny diloilo fanosoran’NY TOMPO. Dia nanatanteraka ny tenin’i Mosesy izy ireo.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fitsipika momba ny zava-pisotro mahamamo
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'NY TOMPO niteny tamin’i Arona hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Aza misotro divay na toaka ianao na ny zanakao, raha miditra ao amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tranolay fihaonana
  - type: text
    text: ', mba tsy ho faty ianareo. Ho lalàna maharitra amin’ny taranakareo fara aman-dimby izany, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'mba hahaizanareo manavaka ny masina sy ny tsy masina, ny madio sy ny tsy madio, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ary mba hampianaranareo ny Zanak’Israely ny didy rehetra izay nasain’NY TOMPO holazain’i Mosesy taminy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fitsipika momba ny henan’ny fanatitra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary hoy i Mosesy tamin’i Arona sy i Eleazara ary Itamara zanany lahy sisa tavela: Raiso ny fanatitra avy amin’ny zavamaniry izay sisa amin’ny fanatitra levonina amin’ny afo ho an’NY TOMPO ka hano eo anilan’ny alitara izany nefa aza asiana masirasira satria zavatra tena masina izy io. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Hohaninareo eo amin’izay fitoerana masina izany fa anjaranao sy ny zanakao avy amin’ny fanatitra levonina amin’ny afo ho an’NY TOMPO. Izany no nandidiany ahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ny tratrany natao fanatitra asandratra sy ny feny nalaina avy tamin’ny fanatitra koa dia hohaninareo eo amin’izay toerana madio, dia ianao mbamin’ny zanakao lahy sy ny zanakao vavy, fa nomena ho anjaranao sy ny zanakao ireo avy amin’ny fanati-pihavanana aterin’ny Zanak’Israely izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ny feny nalaina avy tamin’ny fanatitra sy ny tratrany natao fanatitra asandratra mbamin’ny jaborany izay fanatitra levonina amin’ny afo dia hoentiny mba hatao fanatitra asandratra eo anatrehan’NY TOMPO. Ho anao sy ny zanakao koa ireo, ho anjaranareo maharitra, araka izay nandidian’NY TOMPO.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Dia nitady fatratra ny osilahy izay natao fanatitra fanadiovana i Mosesy, kanjo efa voadoro izany ka tezitra tamin’ny zanak’i Arona sisa tavela izy, dia tamin’i Eleazara sy Itamara ka hoy izy: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Nahoana no tsy nohaninareo teo amin’ny fitoerana masina ny fanatitra fanadiovana? Fa zavatra tena masina izany ary efa nomeny anareo mba hitondranareo ny heloky ny fiangonana, hanaovana fanavotana ho azy eo anatrehan’NY TOMPO. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Indro, tsy nampidirina tao anatin’ny fitoerana masina ny rany, nefa tokony ho nohaninareo teo amin’ny fitoerana masina mihitsy izany, araka izay nandidiako. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary hoy i Arona tamin’i Mosesy: Indro, androany no nanoloran’ny olona ny fanatitra fanadiovana azy sy ny fanatitra dorana manontolo avy taminy teo anatrehan’NY TOMPO; koa amin’izao zavatra manjo ahy izao, raha toa ka nihinana ny fanatitra fanadiovana aho androany, moa ho tsara teo imason’NY TOMPO va izany? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Rehefa ren’i Mosesy izany dia nankasitrahany.
