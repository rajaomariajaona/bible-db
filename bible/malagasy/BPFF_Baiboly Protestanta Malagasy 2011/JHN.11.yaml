document_id: JHN.11,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nahafatesan’i Lazarosy, ilay sakaizan’i Jesosy
  - type: text
    content: 'Nisy lehilahy iray narary, dia i Lazarosy avy any Betania, tanànan’i Maria sy i Marta rahavaviny. '
  '10':
  - type: text
    content: Fa raha misy kosa mandeha amin’ny alina dia ho tafintohina izy satria tsy misy mazava ao aminy.
  '11':
  - type: text
    content: 'Izay no nolazainy; ary taorianan’izany dia hoy Izy taminy: Matory i Lazarosy sakaizantsika; fa handeha hamoha azy Aho. '
  '12':
  - type: text
    content: 'Dia hoy ny mpianatra Taminy: Tompoko, raha matory izy dia azo vonjena ihany. '
  '13':
  - type: text
    content: 'Nefa Jesosy tamin’io dia nilaza ny fahafatesan’i Lazarosy; saingy nataon’izy ireo kosa fa ny fialan-tsasatra amin’ny torimaso no nolazainy. '
  '14':
  - type: text
    content: 'Tamin’izay Jesosy vao nilaza mazava taminy hoe: Maty i Lazarosy. '
  '15':
  - type: text
    content: 'Ary faly Aho noho ny aminareo satria tsy tany, mba hinoanareo; fa andeha isika hankany aminy. '
  '16':
  - type: text
    content: 'Dia hoy i Tomasy, izay atao hoe Kambana, tamin’ny mpianatra namany: Andeha koa isika mba hiara-maty aminy.'
  - type: heading
    content: Ny fitsanganana amin’ny maty sy ny fiainana
  '17':
  - type: text
    content: 'Nony tonga Jesosy dia hitany fa efa nilevina hefarana izy. '
  '18':
  - type: text
    content: 'Ary Betania dia tao akaikin’i Jerosalema, tokony ho dimy amby folo stadio no elanelany. '
  '19':
  - type: text
    content: 'Ary maro tamin’ny '
  - type: text
    content: Jiosy
  - type: text
    content: ' no efa tonga teo amin’i Marta sy i Maria mba hitsapa alahelo azy noho ny amin’ny anadahiny.'
  '2':
  - type: text
    content: 'I Maria dia ilay nanosotra menaka manitra ny Tompo sy namaoka ny tongony tamin’ny volon-dohany, ary i Lazarosy anadahiny ity narary ity. '
  '20':
  - type: text
    content: 'Ary i Marta, raha nandre fa tamy Jesosy, dia nandeha nitsena Azy; fa i Maria kosa dia nitoetra tao an-trano. '
  '21':
  - type: text
    content: 'Ary hoy i Marta tamin’i Jesosy: Tompoko, raha teto Ianao dia tsy maty ny anadahiko. '
  '22':
  - type: text
    content: 'Nefa fantatro fa na dia ankehitriny izao aza, na inona na inona no hangatahinao amin’Andriamanitra, dia homen’Andriamanitra Anao. '
  '23':
  - type: text
    content: 'Hoy Jesosy taminy: Hitsangana ny anadahinao. '
  '24':
  - type: text
    content: 'Fa hoy i Marta taminy: Fantatro ihany fa hitsangana izy amin’ny fitsanganan’ny maty amin’ny andro farany. '
  '25':
  - type: text
    content: 'Hoy Jesosy taminy: Izaho no fananganana ny maty sy fiainana; izay mino Ahy, na dia maty aza, dia ho velona indray. '
  '26':
  - type: text
    content: 'Ary izay rehetra velona ka mino Ahy dia tsy ho faty mandrakizay. Mino izany va ianao? '
  '27':
  - type: text
    content: 'Hoy izy Taminy: Eny, Tompoko; mino aho fa Ianao no '
  - type: text
    content: Kristy
  - type: text
    content: ', Zanak’Andriamanitra, ilay ho tonga amin’izao tontolo izao.'
  '28':
  - type: text
    content: 'Rehefa nilaza izany izy dia nandeha niantso mangingina an’i Maria rahavaviny ka hoy izy hoe: Tonga ny Mpampianatra ka miantso anao. '
  '29':
  - type: text
    content: 'Raha vao nandre izany i Maria dia nitsangana haingana ka nankeo Aminy. '
  '3':
  - type: text
    content: 'Nandefa iraka tany amin’i Jesosy izy mirahavavy mba hilaza hoe: Tompoko, indro, marary ilay tianao. '
  '30':
  - type: text
    content: 'Nefa tsy mbola tonga tao an-tanàna Jesosy, fa mbola teo amin’ilay toerana nitsenan’i Marta Azy ihany. '
  '31':
  - type: text
    content: Ary ny Jiosy izay tao amin’i Maria tao an-trano ka nitsapa alahelo azy, raha nahita azy nitsangana haingana ka nivoaka avy tao dia nanaraka azy satria nataony fa nankany amin’ny fasana hitomany any izy.
  '32':
  - type: text
    content: 'Ary i Maria, rehefa tonga teo amin’izay nisy an’i Jesosy ka nahita Azy, dia niankohoka teo amin’ny tongony ka niteny Taminy hoe: Tompoko, raha teto Ianao dia tsy maty ny anadahiko. '
  '33':
  - type: text
    content: 'Ary Jesosy nony nahita azy nitomany sy ny Jiosy izay niaraka taminy nitomany koa dia vonto ny fanahiny ka nangorohoro ny tenany; '
  '34':
  - type: text
    content: 'ary hoy Izy: Aiza moa no nandevenanareo azy? Dia hoy ireo Taminy: Tompoko, andeha hizaha. '
  '35':
  - type: text
    content: 'Jesosy nitomany. '
  '36':
  - type: text
    content: 'Dia hoy ny Jiosy: Akory ity haben’ny fitiavany azy! '
  '37':
  - type: text
    content: 'Fa hoy ny sasany: Moa tsy hain’Ilehity izay nampahiratra ny mason’ilay jamba va, ny manao izay tsy ho nahafaty an-dRalehilahy ity?'
  - type: heading
    content: Mamerina an’i Lazarosy amin’ny fiainana Jesosy
  '38':
  - type: text
    content: 'Dia vonto indray ny fanahin’i Jesosy ka nankeo amin’ny fasana Izy, ary zohy izany sady nisy vato narindrina teo. '
  '39':
  - type: text
    content: 'Hoy Jesosy: Esory ny vato. Hoy i Marta, anabavin’ny maty, Taminy: Tompoko, efa maimbo izy izao, fa efa hefarana izay. '
  '4':
  - type: text
    content: 'Ary rehefa ren’i Jesosy izany dia hoy Izy: Tsy ho fahafatesana no anton’izany aretina izany, fa ny hampisehoana ny voninahitr’Andriamanitra, mba hankalazana ny Zanak’Andriamanitra. '
  '40':
  - type: text
    content: 'Hoy Jesosy taminy: Tsy voalazako va fa raha hino ianao dia ho hitanao ny voninahitr’Andriamanitra? '
  '41':
  - type: text
    content: 'Dia nesoriny ny vato. Ary Jesosy dia nanandratra ny masony ka niteny hoe: Ray ô, misaotra Anao Aho, fa efa nihaino Ahy Ianao. '
  '42':
  - type: text
    content: 'Raha Izaho dia fantatro fa mihaino Ahy mandrakariva Ianao; fa noho ny vahoaka mitsangana manodidina no nilazako izany mba hinoany fa Ianao no naniraka Ahy. '
  '43':
  - type: text
    content: 'Rehefa nilaza izany teny izany Izy dia niantso tamin’ny feo mahery hoe: Ry Lazarosy, mivoaha! '
  '44':
  - type: text
    content: 'Dia nivoaka tao ny maty, ny tanany sy ny tongony dia nisy fehim-paty sady voasarona lambam-paty koa ny tavany. Hoy Jesosy tamin’ny olona: Vahao izy ka avelao handeha.'
  - type: heading
    content: Ny teti-dratsy hamandrihana an’i Jesosy
  '45':
  - type: text
    content: 'Ary maro tamin’ny '
  - type: text
    content: Jiosy
  - type: text
    content: ', izay nankeo amin’i Maria ka nahita ireo zavatra nataon’i Jesosy ireo, no nino Azy. '
  '46':
  - type: text
    content: 'Fa ny sasany tamin’ireo kosa dia lasa nankany amin’ny '
  - type: text
    content: Fariseo
  - type: text
    content: ' ka nilaza taminy izay nataon’i Jesosy.'
  '47':
  - type: text
    content: 'Ary ireo lehiben’ny mpisorona sy ny '
  - type: text
    content: Fariseo
  - type: text
    content: ' dia nanangona ny '
  - type: text
    content: Sinedriona
  - type: text
    content: ' ka niteny hoe: Ahoana no hataontsika? Fa iny lehilahy iny dia manao famantarana maro. '
  '48':
  - type: text
    content: 'Raha avelantsika hanao toy izany ihany Izy dia hino Azy avokoa ny olona rehetra; ary ho avy ny Romana ka handrava ny fonenantsika sy ny firenentsika. '
  '49':
  - type: text
    content: 'Ary ny iray taminy, dia i Kaiafa mpisoronabe, tamin’izany taona izany, dia niteny taminy hoe: Ianareo dia tsy mahalala na inona na inona, '
  '5':
  - type: text
    content: Ary Jesosy tia an’i Marta sy ny rahavaviny ary i Lazarosy.
  '50':
  - type: text
    content: 'na misaina akory fa tsara ho anareo, raha ny lehilahy iray no ho faty hamonjy ny firenena, mba tsy ho levona avokoa ity firenena ity. '
  '51':
  - type: text
    content: 'Ary tsy niteny izany tamin’ny hevitry ny tenany izy, fa satria Mpisoronabe tamin’izany taona izany izy, dia naminany fa Jesosy ho faty hamonjy ny firenena; '
  '52':
  - type: text
    content: 'ary tsy hamonjy io firenena io ihany fa mba hanangona ny zanak’Andriamanitra izay efa niely mba ho tafangona ho iray. '
  '53':
  - type: text
    content: Koa hatramin’izany andro izany dia nikendry hahafaty Azy ry zareo.
  '54':
  - type: text
    content: Ary Jesosy tsy nandeha niharihary teny amin’ny Jiosy intsony; fa niala teo Izy nankany amin’ny tany akaikin’ny tany efitra, ho any amin’ny tanàna atao hoe Efraima, ary nitoetra tany Izy mbamin’ny mpianatra.
  '55':
  - type: text
    content: 'Ary efa akaiky ny '
  - type: text
    content: Paska
  - type: text
    content: ' an’ny Jiosy; ary maro ny avy tany ambanivohitra no niakatra ho any Jerosalema nialoha ny Paska mba hanadio ny tenany. '
  '56':
  - type: text
    content: 'Dia nitady an’i Jesosy ireo, raha nijanona tao amin’ny tempoly, ka niresaka hoe: Ahoana no hevitrareo? Tsy mba ho tonga amin’ny andro firavoravoana va Izy? '
  '57':
  - type: text
    content: Ary ny lehiben’ny mpisorona sy ny Fariseo dia efa nandidy fa raha misy olona mahalala izay itoerany dia tsy maintsy milaza amin’izy ireo mba hisamborany Azy.
  '6':
  - type: text
    content: 'Nony ren’i Jesosy fa narary i Lazarosy dia mbola nitoetra roa andro teo amin’izay nitoerany ihany Izy. '
  '7':
  - type: text
    content: 'Taorianan’izany, vao hoy Izy tamin’ny mpianatra: Andeha isika ho any '
  - type: text
    content: Jodia
  - type: text
    content: ' indray. '
  '8':
  - type: text
    content: 'Hoy ny mpianatra taminy: Raby ô, vao haingana teo no nitadiavan’ny '
  - type: text
    content: Jiosy
  - type: text
    content: ' hitora-bato Anao, koa hankany indray va Ianao? '
  '9':
  - type: text
    content: 'Dia hoy ny navalin’i Jesosy hoe: Tsy roa amby folo va ny ora amin’ny indray andro? Raha misy mandeha amin’ny antoandro dia tsy mba tafintohina izy, fa mahita ny fahazavan’izao tontolo izao. '
