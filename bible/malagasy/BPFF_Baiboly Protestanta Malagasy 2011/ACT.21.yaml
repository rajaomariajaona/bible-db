document_id: ACT.21,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Nankany Jerosalema i Paoly
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Rehefa tafasaraka tamin’ireo izahay dia niondrana an-tsambo ka nizotra nankany Kosy; nony ampitso dia tonga tao Rodo, dia niala tao nankany Patara; '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Rehefa nitoetra tao nandritra ny andro maromaro izahay dia nisy mpaminany iray antsoina hoe Agabo nidina avy tany '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jodia
    - type: text
      text: '. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Nony tonga tao aminay izy dia noraisiny ny fehikibon’i Paoly ka namatorany ny tongotra aman-tanany sady hoy izy: Izao no lazain’ny Fanahy Masina: Toy izao no hamatoran’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jiosy
    - type: text
      text: ' any Jerosalema ny lehilahy tompon’ity fehikibo ity sy hanolorany azy ho eo an-tanan’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jentilisa
    - type: text
      text: '. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Raha vao renay izany dia nangataka tamin’i Paoly izahay mbamin’izay nonina teo mba tsy hiakatra any Jerosalema. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Nefa hoy ny navalin’i Paoly: Nahoana ianareo no mitomany ka mampangorakoraka ny foko? Vonona aho, tsy ny hafatotra ihany, fa ny ho faty any Jerosalema koa aza mba ho voninahitry ny anaran’i Jesosy Tompo. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Rehefa tsy nanaiky izy dia nionona izahay ka niteny hoe: Aoka ny sitrapon’ny Tompo no hatao.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Tany Jerosalema i Paoly ary nandeha namangy an’i Jakoba
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Taorianan’izany dia nifehy entana izahay ka niakatra nankany Jerosalema. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Dia niaraka taminay koa ny mpianatra sasany avy tany Kaisaria, izay nitondra anay ho any amin’i Menasona avy any Sipra, mpianatra tranainy, izay nandray anay ho vahiny tao aminy. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Rehefa tonga tany Jerosalema izahay dia nandray anay tamin’ny fifaliana ny rahalahy tany.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Nony ampitso dia niaraka taminay nankao amin’i Jakoba i Paoly; vory teo koa ny loholona
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.18 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: presbytera.
      marker-yv: yv-n
    - type: text
      text: ' rehetra. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Dia niarahaba azy ireo i Paoly ary nilaza tamin’ny antsipiriany ny zavatra rehetra izay nataon’Andriamanitra azy tany amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jentilisa
    - type: text
      text: ' tamin’ny alalan’ny fanompoany.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'rehefa nahita sambo nita ho any Foinika izahay dia nifindra sambo teo ka lasa nandeha. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Rehefa nandre izany ireo dia nankalaza an’Andriamanitra. Ary hoy koa izy tamin’i Paoly: Hitanao, ry rahalahy, fa tsy omby alinalina ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jiosy
    - type: text
      text: ' izay efa mino; ary fatra-pitana ny lalàna izy rehetra; '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'efa novokisan’olona ny momba anao anefa izy ireo, fa ianao, hono, dia mampianatra ny Jiosy rehetra izay any amin’ny Jentilisa hahafoy an’i Mosesy ka mandrara azy tsy hamora ny zanany na hanaraka ny fanaon-drazany. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Inona ary no izy? Tsy maintsy ho ren’izy ireo ny nahatongavanao. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Noho izany dia ataovy izao lazainay aminao izao: Misy efa-dahy izay nanao voady atỳ aminay, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'koa raiso ireo ary manadiova ny tenanao miaraka aminy, dia aloavy ny vola ho lany mba hanaratany ny lohany; ho fantatry ny olona rehetra amin’izay fa tsinontsinona ny zavatra namokisana azy ny aminao, fa ianao koa aza dia mandeha manaraka ny lalàna. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Ny amin’ny Jentilisa izay efa mino kosa dia efa nampitondra epistily ho azy izahay ka nasainay nifady ny hena aterina amin’ny sampy, ny ra, ny biby kendaina ary ny fijangajangana izy ireo.
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Dia noraisin’i Paoly ireo lehilahy ireo ary nony ampitso dia nanadio ny tenany niaraka taminy izy ka niditra teo amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: tempoly
    - type: text
      text: ', dia nambarany ny fotoana fahatanterahan’ny andro fidiovana mba hanoloran’ny isan-dahy ny fanatitra.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Nosamborina tao amin’ny tempoly i Paoly
    marker-yv: yv-h
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Rehefa ho tapitra ny herinandro dia nahita an’i Paoly teo amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: tempoly
    - type: text
      text: ' ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jiosy
    - type: text
      text: ' avy tany Azia ka nampikotaba ny vahoaka rehetra sady nisambotra an’i Paoly, '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'no niantso hoe: Ry lehilahy Israelita, vonjeo! Io ilay lehilahy mampianatra ny olona rehetra hatraiza hatraiza hanohitra ny vahoaka sy ny lalàna ary ity toerana ity sady nampiditra Grika tao amin’ny tempoly ka nandoto ity fitoerana masina ity! '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Nahita an’i Trofimo efesiana niaraka taminy tao an-tanàna mantsy izy ireo ka noheveriny fa nampidirin’i Paoly tao amin’ny tempoly izy. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Nony nahatsinjo an’i Sipra izahay dia nandalo azy tamin’ny ankavia ka nankany Siria ary niantsona tao Tiro satria tao no nesorina ny entan’ny sambo. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Dia nifanaritaka be ihany ny tao an-tanàna rehetra, nihazakazaka ny olona ka tafavory; dia nosamboriny i Paoly ka nosarihiny niala teo amin’ny tempoly; ary niaraka tamin’izay dia narindrina ny vavahady.
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Raha nitady hamono azy ny olona dia nisy teny nakarina tany amin’ny mpifehy arivo tamin’ny antokon’ny miaramila nilaza fa mikotaba i Jerosalema manontolo; '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'niaraka tamin’izay ary dia naka miaramila sy kapiteny izy nihazakazaka nidina nankeo aminy; rehefa nahita ny mpifehy arivo sy ny miaramila ny olona dia nitsahatra tsy nikapoka an’i Paoly intsony. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Ary nanatona akaiky ny mpifehy arivo dia nisambotra azy ka nandidy hamatotra azy tamin’ny gadra roa sady nanontany hoe: Iza moa izy, ary inona no nataony? '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Fa ny sasany tamin’ny vahoaka niantso mafy nilaza zavatra iray, ary ny sasany kosa zavatra hafa; koa rehefa tsy azony nofantarina izay marina noho ny tabataba dia nasainy noentina ho any anaty rova i Paoly. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Rehefa tonga teo amin’ny zanatohatra izy dia nobatain’ny miaramila noho ny fifanosehan’ny olona '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'satria maro ireo olona nanaraka ka niantsoantso hoe: Vonoy Ilehio!'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mandahatra ny fiarovan-tenany i Paoly
    marker-yv: yv-h
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Rehefa noentiny tany anaty rova i Paoly dia hoy izy tamin’ny mpifehy arivo: Mahazo miteny aminao va aho? Dia hoy izy: Mahay teny grika va ianao? '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Moa tsy ianao va ilay Ejiptiana izay nampikomy ny olona vao haingana ka nitarika efatra arivo lahy mpitondra lefom-pohy nankany an-tany efitra? '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Fa hoy i Paoly: Izaho dia '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jiosy
    - type: text
      text: ' avy any Tarsosy any Kilikia, tompon-tany amin’izay tanàna tsy kely laza; koa miangavy anao aho, avelao re aho mba hiteny amin’ny olona. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Nitady ny mpianatra izahay ka nahita azy, dia nijanona teo nandritra ny herinandro; ary izy ireo dia voatsindrin’ny Fanahy hilaza amin’i Paoly mba tsy hiakatra any Jerosalema. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'Rehefa navelany i Paoly dia nitsangana teo amin’ny zanatohatra ka nanofa tanana tamin’ny olona. Rehefa nangina tsara ny olona, dia niteny mafy tamin’ny teny hebreo izy hoe:'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Rehefa tapitra ny fotoana nijanonana teo dia niainga izahay ka lasa nandeha ary naterin’izy rehetra mbamin’ny vady aman-janany hatrany ivelan’ny tanàna; ary nandohalika teo amoron-dranomasina izahay ka nivavaka; '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: rehefa nifanao veloma izahay dia niondrana an-tsambo; fa izy ireo kosa dia niverina nody.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ny niafaran’ny dianay an-tsambo dia tany Ptolemaia rehefa avy tany Tiro; niarahaba ny rahalahy izahay ka nijanona indray andro teo aminy. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Ny ampitso dia niala teo izahay ka tonga tany Kaisaria ary niditra tao an-tranon’i Filipo evanjelista izay iray tamin’izy fito lahy ary nipetraka tao aminy izahay. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Izany lehilahy izany dia nanana zanakavavy virijiny efatra izay samy naminany.
