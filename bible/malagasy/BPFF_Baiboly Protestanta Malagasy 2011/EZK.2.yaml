document_id: EZK.2,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Maniraka an’i Ezekiela ho any amin’ny Israely Andriamanitra
  - type: text
    content: 'Ary hoy Izy tamiko: Ry '
  - type: text
    content: zanak’olona
  - type: text
    content: ', mitsangàna, fa hiteny aminao Aho. '
  '10':
  - type: text
    content: Dia novelariny teo anatrehako izany, ary nisy soratra teo anatiny sy teo ivelany; ary fitomaniana sy fidradradradrana sy fitarainana no voasoratra teo.
  '2':
  - type: text
    content: Ary nisy fanahy tonga tao anatiko raha niteny tamiko Izy ka nampitsangana ahy, ary reko Izay niteny tamiko.
  '3':
  - type: text
    content: 'Ary hoy Izy tamiko: Ry zanak’olona, maniraka anao ho any amin’ny Zanak’Israely Aho, eny, ho amin’ireo '
  - type: text
    content: Jentilisa
  - type: text
    content: ' mpikomy izay nikomy tamiko; izy sy ny razany dia samy nanota tamiko avokoa mandraka androany; '
  '4':
  - type: text
    content: 'ireo zanakalahy ireo dia mafy handrina sy mafy fo; any amin’ireo no anirahako anao, ary ianao dia hiteny aminy hoe: Izao no lazain’NY TOMPO Andriamanitra. '
  '5':
  - type: text
    content: 'Ary na hihaino izy na tsy hihaino, fa taranaka maditra izy, dia ho fantany fa efa nisy mpaminany teo anivony. '
  '6':
  - type: text
    content: 'Ary ianao, ry zanak’olona, aza matahotra azy, ary aza matahotra ny teniny, na dia voakasiky ny songosongo sy ny tsilo aza ianao, ary na dia eo amin’ny maingoka aza no ipetrahanao; eny, aza matahotra ny fiteniny, ary aza mivadi-po noho ny tarehiny, fa taranaka maditra izy. '
  '7':
  - type: text
    content: 'Ary holazainao aminy ihany ny teniko, na hihaino izy na tsy hihaino, fa tena maditra izy. '
  '8':
  - type: text
    content: 'Fa ianao kosa, ry zanak’olona, mihainoa izay lazaiko aminao: Aza maditra tahaka izany taranaka maditra izany ianao! Sokafy ny vavanao ka hano izay afahako anao!'
  '9':
  - type: text
    content: 'Ary hitako fa indro, nisy tanana nitsotra tamiko, ary indro, nisy horonan-taratasy teny aminy. '
