document_id: EZK.2
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Maniraka an’i Ezekiela ho any amin’ny Israely Andriamanitra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary hoy Izy tamiko: Ry '
  - type: usfm
    marker: w
    children:
    - type: text
      text: zanak’olona
  - type: text
    text: ', mitsangàna, fa hiteny aminao Aho. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ary nisy fanahy tonga tao anatiko raha niteny tamiko Izy ka nampitsangana ahy, ary reko Izay niteny tamiko.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary hoy Izy tamiko: Ry zanak’olona, maniraka anao ho any amin’ny Zanak’Israely Aho, eny, ho amin’ireo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jentilisa
  - type: text
    text: ' mpikomy izay nikomy tamiko; izy sy ny razany dia samy nanota tamiko avokoa mandraka androany; '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'ireo zanakalahy ireo dia mafy handrina sy mafy fo; any amin’ireo no anirahako anao, ary ianao dia hiteny aminy hoe: Izao no lazain’NY TOMPO Andriamanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary na hihaino izy na tsy hihaino, fa taranaka maditra izy, dia ho fantany fa efa nisy mpaminany teo anivony. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary ianao, ry zanak’olona, aza matahotra azy, ary aza matahotra ny teniny, na dia voakasiky ny songosongo sy ny tsilo aza ianao, ary na dia eo amin’ny maingoka aza no ipetrahanao; eny, aza matahotra ny fiteniny, ary aza mivadi-po noho ny tarehiny, fa taranaka maditra izy. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary holazainao aminy ihany ny teniko, na hihaino izy na tsy hihaino, fa tena maditra izy. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Fa ianao kosa, ry zanak’olona, mihainoa izay lazaiko aminao: Aza maditra tahaka izany taranaka maditra izany ianao! Sokafy ny vavanao ka hano izay afahako anao!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary hitako fa indro, nisy tanana nitsotra tamiko, ary indro, nisy horonan-taratasy teny aminy. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Dia novelariny teo anatrehako izany, ary nisy soratra teo anatiny sy teo ivelany; ary fitomaniana sy fidradradradrana sy fitarainana no voasoratra teo.
