document_id: JOB.4
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Ny teny voalohany nataon’i Elifaza: Sambatra ny olona izay anarin’Andriamanitra!'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Dia nandray fitenenana i Elifaza temanita hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Raha misy sahy miteny aminao dia ho sosotra va ianao?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa raha ny mamehy vava kosa, iza moa no hahavita izany?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Indro, efa nananatra ny maro ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny tanana miraviravy dia efa nampaherezinao;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: efa nanohana izay efa saika lavo ny teninao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary efa nampatanjahinao ny lohalika malemy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Nefa ankehitriny, mba manjo anao izany dia kivy ianao!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mihatra aminao izany ka raiki-tahotra ianao!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Tsy ny fivavahanao va no tokinao?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tsy ny fahitsian’ny lalanao va no fanantenanao?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Miangavy anao aho, tsarovy
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa iza moa no very tsy nanan-tsiny?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary taiza no nisy olo-mahitsy naringana?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Araka izay efa hitako, dia izay miasa heloka
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy mamafy fahoriana no mijinja izany;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ny fofonain’Andriamanitra no andringanana azy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, ny fofonain’ny fahatezerany no mandevona azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ny fieron’ny liona; eny, ny feon’ny liona masiaka
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny nifin’ny liona tanora dia tapaka;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: maty ny liona noho ny tsy fahitany remby
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mihahaka ny zanaky ny liom-bavy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Nisy teny tonga tamiko mangingina
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny sofiko dia nahare siosio avy taminy,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: tamin’ny eritreritra avy amin’ny tsindrimandry alina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: raha sondrian-tory ny olona,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: dia azon-tahotra sy hovitra aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka nampihorohoro ny taolako rehetra izany;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: nisy tso-drivotra nandalo teo amin’ny tavako
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka nampitsangam-bolo ny tenako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Nijanona izy nefa tsy nahafantatra ny tarehiny aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: nisy endri-javatra teo anoloan’ny masoko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'nisy fahanginana, dia nandre feo aho hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ho marina noho Andriamanitra va ny zanak’olombelona?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ho madio noho ny Mpanao azy va ny olona?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Indro, na ireo mpanompony aza dia tsy itokiany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, ireo irany aza dia ahitany fahadisoana,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: koa mainka izay mitoetra amin’ny trano tanimanga
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady avy tamin’ny vovoka no niaviany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mora poretina noho ny kalalao izy!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Indray andro monja dia montsana izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy misy misaina azy na dia levona mandrakizay aza izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Tsy voaongotra va ny kofehin-dainy ao aminy?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Maty tao amin’ny tsy fananana fahendrena izy.
