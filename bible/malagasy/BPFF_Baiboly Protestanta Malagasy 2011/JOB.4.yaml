document_id: JOB.4,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: 'Ny teny voalohany nataon’i Elifaza: Sambatra ny olona izay anarin’Andriamanitra!'
  - type: text
    content: 'Dia nandray fitenenana i Elifaza temanita hoe:'
  '10':
  - type: text
    content: Ny fieron’ny liona; eny, ny feon’ny liona masiaka
  - type: text
    content: ary ny nifin’ny liona tanora dia tapaka;
  '11':
  - type: text
    content: maty ny liona noho ny tsy fahitany remby
  - type: text
    content: ary mihahaka ny zanaky ny liom-bavy.
  '12':
  - type: text
    content: Nisy teny tonga tamiko mangingina
  - type: text
    content: ary ny sofiko dia nahare siosio avy taminy,
  '13':
  - type: text
    content: tamin’ny eritreritra avy amin’ny tsindrimandry alina,
  - type: text
    content: raha sondrian-tory ny olona,
  '14':
  - type: text
    content: dia azon-tahotra sy hovitra aho
  - type: text
    content: ka nampihorohoro ny taolako rehetra izany;
  '15':
  - type: text
    content: nisy tso-drivotra nandalo teo amin’ny tavako
  - type: text
    content: ka nampitsangam-bolo ny tenako.
  '16':
  - type: text
    content: Nijanona izy nefa tsy nahafantatra ny tarehiny aho;
  - type: text
    content: nisy endri-javatra teo anoloan’ny masoko;
  - type: text
    content: 'nisy fahanginana, dia nandre feo aho hoe:'
  '17':
  - type: text
    content: Ho marina noho Andriamanitra va ny zanak’olombelona?
  - type: text
    content: Ho madio noho ny Mpanao azy va ny olona?
  '18':
  - type: text
    content: Indro, na ireo mpanompony aza dia tsy itokiany;
  - type: text
    content: eny, ireo irany aza dia ahitany fahadisoana,
  '19':
  - type: text
    content: koa mainka izay mitoetra amin’ny trano tanimanga
  - type: text
    content: sady avy tamin’ny vovoka no niaviany
  - type: text
    content: ary mora poretina noho ny kalalao izy!
  '2':
  - type: text
    content: Raha misy sahy miteny aminao dia ho sosotra va ianao?
  - type: text
    content: Fa raha ny mamehy vava kosa, iza moa no hahavita izany?
  '20':
  - type: text
    content: Indray andro monja dia montsana izy;
  - type: text
    content: tsy misy misaina azy na dia levona mandrakizay aza izy.
  '21':
  - type: text
    content: Tsy voaongotra va ny kofehin-dainy ao aminy?
  - type: text
    content: Maty tao amin’ny tsy fananana fahendrena izy.
  '3':
  - type: text
    content: Indro, efa nananatra ny maro ianao
  - type: text
    content: ary ny tanana miraviravy dia efa nampaherezinao;
  '4':
  - type: text
    content: efa nanohana izay efa saika lavo ny teninao
  - type: text
    content: ary efa nampatanjahinao ny lohalika malemy.
  '5':
  - type: text
    content: Nefa ankehitriny, mba manjo anao izany dia kivy ianao!
  - type: text
    content: Mihatra aminao izany ka raiki-tahotra ianao!
  '6':
  - type: text
    content: Tsy ny fivavahanao va no tokinao?
  - type: text
    content: Ary tsy ny fahitsian’ny lalanao va no fanantenanao?
  '7':
  - type: text
    content: Miangavy anao aho, tsarovy
  - type: text
    content: fa iza moa no very tsy nanan-tsiny?
  - type: text
    content: Ary taiza no nisy olo-mahitsy naringana?
  '8':
  - type: text
    content: Araka izay efa hitako, dia izay miasa heloka
  - type: text
    content: sy mamafy fahoriana no mijinja izany;
  '9':
  - type: text
    content: ny fofonain’Andriamanitra no andringanana azy;
  - type: text
    content: eny, ny fofonain’ny fahatezerany no mandevona azy.
