document_id: 2PE.2
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ireo mpampiely fampianarana sandoka
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Fa nisy mpaminany sandoka teo amin’ny olona, ary hisy koa mpampianatra sandoka tahaka izany eo aminareo, izay hampiditra fampianaran-diso an-tsokosoko mahavery ary mitondra azy handa ny Tompo izay nanavotra azy aza. Hahatonga fahaverezana tampoka ho amin’ny tenany izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Maro no hanaraka ny fanaranam-pony amin’ny ratsy ka ireny no hitenenan-dratsy ny lalan’ny fahamarinana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Amin’ny filana harena maloto sy ny teny mamitaka no hivarotany anareo. Ho an’ireny olona ireny dia efa hatry ny ela no niasa ny fitsarana azy ary tsy matoritory ny fahaverezany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Fa raha tsy navelan’Andriamanitra ny anjely izay nanota fa noroahiny ho any amin’ny helo ka nafatony tamin’ny gadra tao amin’ny maizina mba hotahirizina ho amin’ny fitsarana, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'ary raha tsy namela ny tontolo taloha Izy fa namonjy an’i Noa, mpitory ny fahamarinana, mbamin’izy fito mianaka, fony tonga tamin’ny tontolon’ny ratsy fanahy ny safodrano, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'ary raha nataony nanjary lavenona ny tanàna Sodoma sy Gomora ka nohelohiny horavana ary nataony ohatra ho an’izay ratsy fanahy atỳ aoriana, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'fa i Lota, lehilahy marina kosa izay ory dia ory noho ny fanaranam-pon’ny olona ratsy fanahy, no novonjeny ho afaka, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'fa izany lehilahy marina izany izay nitoetra teo anivon’ireo, dia nahory loatra ny fanahiny marina isanandro isanandro ny fahitany sy ny fandrenesany ny fandikan’ireo ny lalàna; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'raha izany rehetra izany dia hain’ny Tompo ny hamonjeny ny tsara fanahy amin’ny fizahan-toetra sy ny hitahirizany ny olona tsy marina amin’ny fijaliana ho amin’ny andro fitsarana, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: indrindra fa izay mandeha araka ny fitarihan’ny nofo hila zava-mahaloto ka manamavo ny manana fahamboniana.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ireo dia olona sahisahy, mitompo teny fantatra sady tsy matahotra hiteny ratsy ny manana voninahitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Fa ny anjely aza, izay mihoatra amin’ny tanjaka sy ny hery, dia tsy mitondra fiampangana hitenenan-dratsy azy ireny eo anatrehan’ny Tompo!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Fa ireo kosa dia tahaka ny biby tsy manan-tsaina, zavamananaina fotsiny ihany, izay teraka ho fisambotra sy ho famono; miteny ratsy ny zavatra tsy fantany izy; ho lo amin’ny fahalovan’ny biby izy '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'ary hiharan’ny tsy fahamarinana ho valin’ny tsy fahamarinany. Mahafinaritra azy ny velona vetivety amin’ny fy; feno pentimpentina sy tsiny izy ary faly mamitaka anareo raha miara-mihinana aminareo; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ny masony dia feno fijangajangana ary tsy mety mitsahatra amin’ny fahotana; mamitaka ny tsy miorina tsara izy; zatra amin’ny fitiavana harena maloto ny fony; olona voaozona izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Efa niala tamin’ny lalana mahitsy izy ka nivily nanaraka ny lalan’i Balama, zanak’i Beora, izay tia ny tambin’ny tsy fahamarinana, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'nefa voaanatra izy noho ny fahotany: Ny boriky moana dia nanao feon’olona ka nisakana ny hadalan’ilay mpaminany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ireny dia loharano ritra, zavona entin’ny tafio-drivotra, ka tahirizina ho azy ny haizina mikitroka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Fa mandoka fatratra ny zava-poana izy ireny ka ireo izay vao mba nandositra niala tamin’ireo diso lalana indray no taominy ho amin’ny filan’ny nofo sy ny fanaranam-po; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'fahafahana no ampanantenainy ireny, kanjo ny tenany aza dia andevon’ny fahalovana; fa izay maharesy ny olona no manandevo azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Fa raha misy efa afaka tamin’ny fahalotoan’izao tontolo izao noho ny fahalalana tsara an’i Jesosy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ', Tompo sy Mpamonjy, nefa voasingotr’izany indray ka resy, dia tonga ratsy noho ny tamin’ny voalohany ny amin’izany olona izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Fa tsara aminy raha tsy nahalala ny lalan’ny fahamarinana akory izy, toy izay hiala amin’ny didy masina natolotra azy, rehefa nahalala izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Efa mihatra aminy ny ohabolana marina hoe: «Ny amboa no miverina indray amin’ny loany» (Oha 26.11), ary: Ny kisoavavy efa nisasa dia mihosim-potaka indray.'
