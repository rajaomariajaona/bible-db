document_id: 2PE.2,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ireo mpampiely fampianarana sandoka
  - type: text
    content: 'Fa nisy mpaminany sandoka teo amin’ny olona, ary hisy koa mpampianatra sandoka tahaka izany eo aminareo, izay hampiditra fampianaran-diso an-tsokosoko mahavery ary mitondra azy handa ny Tompo izay nanavotra azy aza. Hahatonga fahaverezana tampoka ho amin’ny tenany izany. '
  '10':
  - type: text
    content: indrindra fa izay mandeha araka ny fitarihan’ny nofo hila zava-mahaloto ka manamavo ny manana fahamboniana.
  - type: text
    content: 'Ireo dia olona sahisahy, mitompo teny fantatra sady tsy matahotra hiteny ratsy ny manana voninahitra. '
  '11':
  - type: text
    content: Fa ny anjely aza, izay mihoatra amin’ny tanjaka sy ny hery, dia tsy mitondra fiampangana hitenenan-dratsy azy ireny eo anatrehan’ny Tompo!
  '12':
  - type: text
    content: 'Fa ireo kosa dia tahaka ny biby tsy manan-tsaina, zavamananaina fotsiny ihany, izay teraka ho fisambotra sy ho famono; miteny ratsy ny zavatra tsy fantany izy; ho lo amin’ny fahalovan’ny biby izy '
  '13':
  - type: text
    content: 'ary hiharan’ny tsy fahamarinana ho valin’ny tsy fahamarinany. Mahafinaritra azy ny velona vetivety amin’ny fy; feno pentimpentina sy tsiny izy ary faly mamitaka anareo raha miara-mihinana aminareo; '
  '14':
  - type: text
    content: ny masony dia feno fijangajangana ary tsy mety mitsahatra amin’ny fahotana; mamitaka ny tsy miorina tsara izy; zatra amin’ny fitiavana harena maloto ny fony; olona voaozona izy.
  '15':
  - type: text
    content: 'Efa niala tamin’ny lalana mahitsy izy ka nivily nanaraka ny lalan’i Balama, zanak’i Beora, izay tia ny tambin’ny tsy fahamarinana, '
  '16':
  - type: text
    content: 'nefa voaanatra izy noho ny fahotany: Ny boriky moana dia nanao feon’olona ka nisakana ny hadalan’ilay mpaminany.'
  '17':
  - type: text
    content: 'Ireny dia loharano ritra, zavona entin’ny tafio-drivotra, ka tahirizina ho azy ny haizina mikitroka. '
  '18':
  - type: text
    content: 'Fa mandoka fatratra ny zava-poana izy ireny ka ireo izay vao mba nandositra niala tamin’ireo diso lalana indray no taominy ho amin’ny filan’ny nofo sy ny fanaranam-po; '
  '19':
  - type: text
    content: 'fahafahana no ampanantenainy ireny, kanjo ny tenany aza dia andevon’ny fahalovana; fa izay maharesy ny olona no manandevo azy. '
  '2':
  - type: text
    content: 'Maro no hanaraka ny fanaranam-pony amin’ny ratsy ka ireny no hitenenan-dratsy ny lalan’ny fahamarinana. '
  '20':
  - type: text
    content: 'Fa raha misy efa afaka tamin’ny fahalotoan’izao tontolo izao noho ny fahalalana tsara an’i Jesosy '
  - type: text
    content: Kristy
  - type: text
    content: ', Tompo sy Mpamonjy, nefa voasingotr’izany indray ka resy, dia tonga ratsy noho ny tamin’ny voalohany ny amin’izany olona izany. '
  '21':
  - type: text
    content: 'Fa tsara aminy raha tsy nahalala ny lalan’ny fahamarinana akory izy, toy izay hiala amin’ny didy masina natolotra azy, rehefa nahalala izany. '
  '22':
  - type: text
    content: 'Efa mihatra aminy ny ohabolana marina hoe: «Ny amboa no miverina indray amin’ny loany» (Oha 26.11), ary: Ny kisoavavy efa nisasa dia mihosim-potaka indray.'
  '3':
  - type: text
    content: Amin’ny filana harena maloto sy ny teny mamitaka no hivarotany anareo. Ho an’ireny olona ireny dia efa hatry ny ela no niasa ny fitsarana azy ary tsy matoritory ny fahaverezany.
  '4':
  - type: text
    content: 'Fa raha tsy navelan’Andriamanitra ny anjely izay nanota fa noroahiny ho any amin’ny helo ka nafatony tamin’ny gadra tao amin’ny maizina mba hotahirizina ho amin’ny fitsarana, '
  '5':
  - type: text
    content: 'ary raha tsy namela ny tontolo taloha Izy fa namonjy an’i Noa, mpitory ny fahamarinana, mbamin’izy fito mianaka, fony tonga tamin’ny tontolon’ny ratsy fanahy ny safodrano, '
  '6':
  - type: text
    content: 'ary raha nataony nanjary lavenona ny tanàna Sodoma sy Gomora ka nohelohiny horavana ary nataony ohatra ho an’izay ratsy fanahy atỳ aoriana, '
  '7':
  - type: text
    content: 'fa i Lota, lehilahy marina kosa izay ory dia ory noho ny fanaranam-pon’ny olona ratsy fanahy, no novonjeny ho afaka, '
  '8':
  - type: text
    content: 'fa izany lehilahy marina izany izay nitoetra teo anivon’ireo, dia nahory loatra ny fanahiny marina isanandro isanandro ny fahitany sy ny fandrenesany ny fandikan’ireo ny lalàna; '
  '9':
  - type: text
    content: 'raha izany rehetra izany dia hain’ny Tompo ny hamonjeny ny tsara fanahy amin’ny fizahan-toetra sy ny hitahirizany ny olona tsy marina amin’ny fijaliana ho amin’ny andro fitsarana, '
