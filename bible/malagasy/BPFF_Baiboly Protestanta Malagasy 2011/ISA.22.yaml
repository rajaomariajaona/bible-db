document_id: ISA.22,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fampitandremana an’i Jerosalema
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny loza hanjo ny Lohasahan’ny Fahitana.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nahoana re ianao no niakatra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: niaraka tamin’ny olonao rehetra ho eny an-
    - type: usfm
      marker: w
      children:
      - type: text
        text: tampon-trano
    - type: text
      text: ','
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: isainareo ny trano any Jerosalema,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ravanareo ny trano mba hanamafisanareo ny manda.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mihady lavaka famorian-drano eo anelanelan’ny manda roa ianareo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: halehan’ny rano avy amin’ny lavaka famorian-drano taloha.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Kanefa tsy mijery Izay efa nanomana izao zavatra izao ianareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na mahita Izay namolavola azy hatry ny ela.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Amin’izany andro izany dia hiantso NY TOMPO, Andriamanitra Tompon’izao rehetra izao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hiantso fitomaniana sy fitolokoana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy fiharatana ary fisikinana lamba fisaonana;
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: kanjo e izato hafaliana sy haravoravoana!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vonoina ny omby sy ondry aman’osy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Hanina ny hena ary sotroina ny divay:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka isika hihinana sy hisotro, fa rahampitso dia ho faty!
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Dia nambaran’NY TOMPO, Andriamanitra Tompon’izao rehetra izao, teo an-tsofiko izao:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy hisy fanavotana ho an’izao helokareo izao ambara-pahafatinareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy NY TOMPO, Andriamanitra Tompon’izao rehetra izao.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fampitandremana an’ilay mpiandraiki-draharaha atao hoe Sebna
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Izao no lazain’NY TOMPO, Andriamanitra Tompon’izao rehetra izao:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Andeha mankao amin’io mpiandraiki-draharaha io,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'dia i Sebna, lehiben’ny ao an-dapa, ka lazao hoe:'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Inona no ataonao atỳ,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary iza no havanao etỳ,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no manao fasana etỳ ianao?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mandavaka ny fasanao eny an-kavoana ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy manamboatra fonenana ho anao etỳ amin’ny harambato!
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro NY TOMPO hanipy anao lavitra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, hogiazany mafy ianao,
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hakodiany toy ny kodiarana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho any amin’ny tany malalaka;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: any no hahafaty anao ary ho any koa ireo kalesy fitondranao miady feno voninahitra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ry ilay henatry ny fianakavian’ny tomponao!
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Horoahiko hiala amin’ny toeranao ianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: haongako hiala amin’ny raharahanao ianao
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ry tanàna be horakoraka sy be tabataba,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vohitra miravoravo?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny faty eo aminao dia tsy mba novonoin-tsabatra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na maty an’ady.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Amin’izany andro izany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hantsoiko kosa i Eliakima mpanompoko, zanak’i Hilkia;
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hampanaoviko azy ny akanjonao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady hosikinako amin’ny fehikibonao izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hatolotro ho eo an-tanany ny fahefanao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ho tonga rain’ny mponina eto Jerosalema
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny taranak’i Joda izy.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hapetrako eo an-tsorony ny fanalahidin’ny tranon’i Davida,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hamoha izy ka tsy hisy handrindrina;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary handrindrina izy ka tsy hisy hahavoha.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hatsatoko toy ny fanantonan-javatra eo amin’ny toerana mafy izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka ho sezam-boninahitra ho an’ny fianakavian-drainy.
  '24':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Hahantona eo aminy ny voninahitry ny fianakavian-drainy rehetra, dia ny sampany sy ny rantsany rehetra, ny fanaka madinika rehetra hatramin’ny lovia ka hatramin’ny siny samihafa rehetra. '
  '25':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Amin’izany andro izany, hoy Andriamanitra, Tompon’izao rehetra izao, dia hesorina ilay fanantonan-javatra voatsatoka teo amin’ny toerana mafy; eny, hokapaina izany ka hianjera; dia ho simba ny entana izay nihantona teo aminy; fa NY TOMPO no niteny.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miara-mandositra ny mpitondra anao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: afatotry ny mpandefa zana-tsipìka izy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay olona rehetra hita tao aminao dia niaraka azo babo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na dia nitady handositra lavitra aza.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Koa izany no ilazako hoe: Mihodìna tsy hijery ahy,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa hitomanin’alahelo aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aza dia fatra-pampionona ahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: noho ny fandringanana ny oloko, zanakavavy.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa misy andron’ny horohoro
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy fanosihosena ary fahaverezan-kevitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avy amin’NY TOMPO, Andriamanitra Tompon’izao rehetra izao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ao amin’ny Lohasahan’ny Fahitana:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rava ny manda,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary manako hatrany an-tendrombohitra ny antso vonjy.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mitondra ny tranon-jana-tsipìka i Elama,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: manatona ny kalesy fitondra miady misy olona sy ny mpitaingin-tsoavaly;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manaisotra ny fonon’ampinga i Kira.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Feno kalesy fitondra miady ny lohasahanao tsara indrindra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: milahatra eo am-bavahady ny mpitaingin-tsoavaly,
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary alany ny fisalobonan’i Joda.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Amin’izany andro izany dia mijery
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny fiadiana ao amin’ny Tranon’ny Ala
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Tranon’ny mpanjaka fitahirizana ny fiadiana. '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Zahao '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 1Mpa 7.2-6.
      marker-yv: yv-n
    - type: text
      text: ' ianao.'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hitanareo fa maro ny banga amin’ny Tanànan’i Davida;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mamory ny rano avy amin’ny kamory ambany ianareo;
