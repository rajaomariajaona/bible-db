document_id: ISA.22,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Fampitandremana an’i Jerosalema
  - type: text
    content: Ny loza hanjo ny Lohasahan’ny Fahitana.
  - type: text
    content: Nahoana re ianao no niakatra
  - type: text
    content: niaraka tamin’ny olonao rehetra ho eny an-
  - type: text
    content: tampon-trano
  - type: text
    content: ','
  '10':
  - type: text
    content: isainareo ny trano any Jerosalema,
  - type: text
    content: ary ravanareo ny trano mba hanamafisanareo ny manda.
  '11':
  - type: text
    content: Mihady lavaka famorian-drano eo anelanelan’ny manda roa ianareo
  - type: text
    content: halehan’ny rano avy amin’ny lavaka famorian-drano taloha.
  - type: text
    content: Kanefa tsy mijery Izay efa nanomana izao zavatra izao ianareo,
  - type: text
    content: na mahita Izay namolavola azy hatry ny ela.
  '12':
  - type: text
    content: Amin’izany andro izany dia hiantso NY TOMPO, Andriamanitra Tompon’izao rehetra izao,
  - type: text
    content: hiantso fitomaniana sy fitolokoana
  - type: text
    content: sy fiharatana ary fisikinana lamba fisaonana;
  '13':
  - type: text
    content: kanjo e izato hafaliana sy haravoravoana!
  - type: text
    content: Vonoina ny omby sy ondry aman’osy.
  - type: text
    content: 'Hanina ny hena ary sotroina ny divay:'
  - type: text
    content: Aoka isika hihinana sy hisotro, fa rahampitso dia ho faty!
  '14':
  - type: text
    content: 'Dia nambaran’NY TOMPO, Andriamanitra Tompon’izao rehetra izao, teo an-tsofiko izao:'
  - type: text
    content: Tsy hisy fanavotana ho an’izao helokareo izao ambara-pahafatinareo,
  - type: text
    content: hoy NY TOMPO, Andriamanitra Tompon’izao rehetra izao.
  - type: heading
    content: Fampitandremana an’ilay mpiandraiki-draharaha atao hoe Sebna
  '15':
  - type: text
    content: 'Izao no lazain’NY TOMPO, Andriamanitra Tompon’izao rehetra izao:'
  - type: text
    content: Andeha mankao amin’io mpiandraiki-draharaha io,
  - type: text
    content: 'dia i Sebna, lehiben’ny ao an-dapa, ka lazao hoe:'
  '16':
  - type: text
    content: Inona no ataonao atỳ,
  - type: text
    content: ary iza no havanao etỳ,
  - type: text
    content: no manao fasana etỳ ianao?
  - type: text
    content: Mandavaka ny fasanao eny an-kavoana ianao
  - type: text
    content: sy manamboatra fonenana ho anao etỳ amin’ny harambato!
  '17':
  - type: text
    content: Indro NY TOMPO hanipy anao lavitra;
  - type: text
    content: eny, hogiazany mafy ianao,
  '18':
  - type: text
    content: dia hakodiany toy ny kodiarana
  - type: text
    content: ho any amin’ny tany malalaka;
  - type: text
    content: any no hahafaty anao ary ho any koa ireo kalesy fitondranao miady feno voninahitra,
  - type: text
    content: ry ilay henatry ny fianakavian’ny tomponao!
  '19':
  - type: text
    content: Horoahiko hiala amin’ny toeranao ianao,
  - type: text
    content: haongako hiala amin’ny raharahanao ianao
  '2':
  - type: text
    content: ry tanàna be horakoraka sy be tabataba,
  - type: text
    content: vohitra miravoravo?
  - type: text
    content: Ny faty eo aminao dia tsy mba novonoin-tsabatra,
  - type: text
    content: na maty an’ady.
  '20':
  - type: text
    content: Amin’izany andro izany
  - type: text
    content: dia hantsoiko kosa i Eliakima mpanompoko, zanak’i Hilkia;
  '21':
  - type: text
    content: hampanaoviko azy ny akanjonao
  - type: text
    content: sady hosikinako amin’ny fehikibonao izy
  - type: text
    content: ka hatolotro ho eo an-tanany ny fahefanao;
  - type: text
    content: dia ho tonga rain’ny mponina eto Jerosalema
  - type: text
    content: sy ny taranak’i Joda izy.
  '22':
  - type: text
    content: Hapetrako eo an-tsorony ny fanalahidin’ny tranon’i Davida,
  - type: text
    content: dia hamoha izy ka tsy hisy handrindrina;
  - type: text
    content: ary handrindrina izy ka tsy hisy hahavoha.
  '23':
  - type: text
    content: Hatsatoko toy ny fanantonan-javatra eo amin’ny toerana mafy izy
  - type: text
    content: ka ho sezam-boninahitra ho an’ny fianakavian-drainy.
  '24':
  - type: text
    content: 'Hahantona eo aminy ny voninahitry ny fianakavian-drainy rehetra, dia ny sampany sy ny rantsany rehetra, ny fanaka madinika rehetra hatramin’ny lovia ka hatramin’ny siny samihafa rehetra. '
  '25':
  - type: text
    content: Amin’izany andro izany, hoy Andriamanitra, Tompon’izao rehetra izao, dia hesorina ilay fanantonan-javatra voatsatoka teo amin’ny toerana mafy; eny, hokapaina izany ka hianjera; dia ho simba ny entana izay nihantona teo aminy; fa NY TOMPO no niteny.
  '3':
  - type: text
    content: Miara-mandositra ny mpitondra anao;
  - type: text
    content: afatotry ny mpandefa zana-tsipìka izy.
  - type: text
    content: Izay olona rehetra hita tao aminao dia niaraka azo babo,
  - type: text
    content: na dia nitady handositra lavitra aza.
  '4':
  - type: text
    content: 'Koa izany no ilazako hoe: Mihodìna tsy hijery ahy,'
  - type: text
    content: fa hitomanin’alahelo aho;
  - type: text
    content: aza dia fatra-pampionona ahy
  - type: text
    content: noho ny fandringanana ny oloko, zanakavavy.
  '5':
  - type: text
    content: Fa misy andron’ny horohoro
  - type: text
    content: sy fanosihosena ary fahaverezan-kevitra
  - type: text
    content: avy amin’NY TOMPO, Andriamanitra Tompon’izao rehetra izao,
  - type: text
    content: 'ao amin’ny Lohasahan’ny Fahitana:'
  - type: text
    content: Rava ny manda,
  - type: text
    content: ary manako hatrany an-tendrombohitra ny antso vonjy.
  '6':
  - type: text
    content: Mitondra ny tranon-jana-tsipìka i Elama,
  - type: text
    content: manatona ny kalesy fitondra miady misy olona sy ny mpitaingin-tsoavaly;
  - type: text
    content: Manaisotra ny fonon’ampinga i Kira.
  '7':
  - type: text
    content: Feno kalesy fitondra miady ny lohasahanao tsara indrindra,
  - type: text
    content: milahatra eo am-bavahady ny mpitaingin-tsoavaly,
  '8':
  - type: text
    content: ary alany ny fisalobonan’i Joda.
  - type: text
    content: Amin’izany andro izany dia mijery
  - type: text
    content: ny fiadiana ao amin’ny Tranon’ny Ala
  - type: note
    content: Tranon’ny mpanjaka fitahirizana ny fiadiana. Zahao 1Mpa 7.2-6.
  - type: text
    content: ' ianao.'
  '9':
  - type: text
    content: Hitanareo fa maro ny banga amin’ny Tanànan’i Davida;
  - type: text
    content: mamory ny rano avy amin’ny kamory ambany ianareo;
