document_id: LUK.10,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Maniraka mpianatra fitopolo lahy Jesosy
  - type: heading
    content: Mat 10.7-16
  - type: text
    content: Taorianan’izany dia nanendry olona hafa koa ny Tompo, fitopolo
  - type: note
    content: 'Ny rakitsoratra sasany dia milaza hoe: Roa amby fitopolo.'
  - type: text
    content: ' lahy, ka naniraka azy tsiroaroa hialoha Azy any amin’ny tanàna sy ny toerana rehetra izay nokasainy haleha. '
  '10':
  - type: text
    content: 'Fa ao amin’izay tanàna idiranareo, ka tsy mandray anareo kosa ny olona, dia mankanesa eny amin’ny lalambe ka lazao hoe: '
  '11':
  - type: text
    content: 'Ny vovoky ny tanànanareo aza, izay miraikitra amin’ny tongotray, dia ahintsanay ho anareo; nefa aoka ho fantatrareo fa efa akaiky anareo ny fanjakan’Andriamanitra. '
  '12':
  - type: text
    content: Lazaiko aminareo fa ho moramora kokoa ny ho amin’i Sodoma amin’izany andro izany noho ny ho amin’izany tanàna izany.
  - type: heading
    content: Ireo tanàna tsy mety mino
  - type: heading
    content: Mat 11.21-23
  '13':
  - type: text
    content: 'Lozanao, ry Korazina! Lozanao, ry Betsaida! Fa raha mba tany Tiro sy Sidona no natao ny asa lehibe izay natao teo aminareo, dia ho efa nibebaka ela izy ka nanao akanjo fisaonana sy nipetraka tamin’ny lavenona. '
  '14':
  - type: text
    content: 'Fa ho moramora kokoa ny ho amin’i Tiro sy i Sidona amin’ny andro fitsarana noho ny ho aminareo. '
  '15':
  - type: text
    content: 'Ary ianao, ry Kapernaomy, hasandratra hatrany an-danitra va ianao? Haetry hatrany amin’ny '
  - type: text
    content: fitoeran’ny maty
  - type: text
    content: ' ianao.'
  '16':
  - type: text
    content: Izay mihaino anareo dia mihaino Ahy; ary izay mandà anareo dia mandà Ahy; ary izay mandà Ahy dia mandà Izay naniraka Ahy.
  - type: heading
    content: Ny fiverenan’ireo mpianatra fitopolo lahy
  '17':
  - type: text
    content: 'Niverina tamin’ny fifaliana ny fitopolo lahy ka nilaza hoe: Tompo ô, na dia ny '
  - type: text
    content: demonia
  - type: text
    content: ' aza dia manaiky anay noho ny anaranao. '
  '18':
  - type: text
    content: 'Fa hoy Jesosy taminy: Izaho nahita an’i Satana nilatsaka avy tany an-danitra tahaka ny varatra. '
  '19':
  - type: text
    content: 'Indro, efa nomeko fahefana hanitsaka menarana sy maingoka sy handresy ny hery rehetra ananan’ny fahavalo ianareo ka tsy hisy hampaninona anareo akory. '
  '2':
  - type: text
    content: 'Ary hoy Izy taminy: Be ny vokatra, fa ny mpiasa no vitsy; koa amin’izany, mangataha amin’ny Tompon’ny vokatra mba handefa mpiasa hanangona ny vokatra. '
  '20':
  - type: text
    content: Kanefa aza mifaly ianareo satria manaiky anareo ny fanahy, fa mifalia satria voasoratra any an-danitra ny anaranareo.
  - type: heading
    content: Ny fifalian’ny Zanaka
  - type: heading
    content: Mat 11.25-27
  '21':
  - type: text
    content: 'Tamin’izany ora izany dia ravoravo tamin’ny Fanahy Masina Jesosy ka niteny hoe: Midera Anao Aho, Raiko ô, Tompon’ny lanitra sy ny tany, fa nafeninao tamin’ny hendry sy ny manan-tsaina izany ka nasehonao tamin’ny zaza madinika; eny, Raiko, fa izany no sitrakao. '
  '22':
  - type: text
    content: Ny zavatra rehetra dia natolotry ny Raiko Ahy; tsy misy mahalala ny Zanaka afa-tsy ny Ray ary ny Ray afa-tsy ny Zanaka sy izay tian’ny Zanaka hanehoana Azy.
  - type: heading
    content: Ny fahasambaran’ny mpianatra
  - type: heading
    content: Mat 13.16-17
  '23':
  - type: text
    content: 'Ary nitodika tamin’ny mpianatra Izy dia nilaza taminy manokana hoe: Sambatra ny maso mahita izay hitanareo. '
  '24':
  - type: text
    content: Fa lazaiko aminareo fa mpaminany sy mpanjaka maro no naniry hahita izay hitanareo fa tsy nahita, ary naniry hahare izay renareo fa tsy nahare.
  - type: heading
    content: Fanoharana ny amin’ilay Samaritana tsara fanahy
  - type: heading
    content: Ampit. Mat 22.34-40; Mar 12.28-34
  '25':
  - type: text
    content: 'Ary indro, nisy mpahay lalàna iray nitsangana ka naka fanahy an’i Jesosy hoe: Mpampianatra ô, inona no hataoko handovako ny fiainana mandrakizay? '
  '26':
  - type: text
    content: 'Ary hoy Izy taminy: Inona no voasoratra ao amin’ny Lalàna? Ahoana no famakianao azy? '
  '27':
  - type: text
    content: 'Ary hoy izy hoe: «Tiava NY TOMPO Andriamanitrao amin’ny fonao manontolo sy ny fanahinao manontolo sy ny herinao manontolo ary ny sainao manontolo» (Deo 6.5); ary, «Tiava ny namanao tahaka ny tenanao» (Lev 19.18). '
  '28':
  - type: text
    content: 'Dia hoy Jesosy taminy: Marina ny navalinao; ataovy izany dia ho velona ianao. '
  '29':
  - type: text
    content: 'Fa izy ta hanamarin-tena ka niteny tamin’i Jesosy hoe: Iza ary no namako?'
  '3':
  - type: text
    content: 'Mandehana; indro Aho maniraka anareo tahaka ny zanak’ondry eo ampovoan’ny amboadia. '
  '30':
  - type: text
    content: 'Ary Jesosy namaly hoe: Nisy lehilahy iray nidina avy any Jerosalema hankany Jeriko ka nifanojo tamin’ny jiolahy, dia nendahany sady nokapohiny, ary nilaozany, rehefa saika maty. '
  '31':
  - type: text
    content: 'Ary sendra nisy mpisorona iray nidina tamin’izany lalana izany; ary raha nahita an-dRalehilahy izy dia nandalo azy. '
  '32':
  - type: text
    content: 'Ary toy izany koa ny '
  - type: text
    content: levita
  - type: text
    content: ' iray, izay tonga teo, dia nahita azy, nefa nandalo koa. '
  '33':
  - type: text
    content: 'Fa nisy kosa '
  - type: text
    content: Samaritana
  - type: text
    content: ' iray nandeha tamin’ny nalehany ka tonga teo aminy, ary nony nahita azy dia onena. '
  '34':
  - type: text
    content: 'Dia nanatona izy ka nofeheziny ny feriny sady nasiany diloilo sy divay; dia napetrany teo ambonin’ny borikiny izy ka noentiny ho any amin’ny tranom-bahiny dia nokarakarainy. '
  '35':
  - type: text
    content: 'Ary ny ampitson’iny dia naka vola '
  - type: text
    content: denaria
  - type: text
    content: ' roa izy ka nomeny ny tompon’ny tranom-bahiny sady hoy izy taminy hoe: Karakarao izy; ary na ohatrinona na ohatrinona no laninao mihoatra noho ireto dia honerako rehefa miverina aho. '
  '36':
  - type: text
    content: 'Iza moa amin’izy telo lahy no heverinao ho naman’ilay azon’ny jiolahy? '
  '37':
  - type: text
    content: 'Dia hoy izy: Ilay niantra azy. Hoy Jesosy taminy: Mandehana ianao ka mba manaova toy izany koa.'
  - type: heading
    content: Jesosy tao an-tranon’i Marta sy i Maria
  '38':
  - type: text
    content: 'Raha nandeha izy ireo dia niditra teo amin’ny vohitra iray Jesosy; ary nisy vehivavy iray antsoina hoe Marta, nampiantrano Azy. '
  '39':
  - type: text
    content: 'Nanana rahavavy antsoina hoe Maria izy, izay nipetraka teo anilan’ny tongotry ny Tompo ka nihaino ny teniny. '
  '4':
  - type: text
    content: 'Aza mitondra kitapom-bola, na kitapom-batsy, na kapa; ary aza miarahaba olona akory eny an-dalana. '
  '40':
  - type: text
    content: 'Fa i Marta kosa dia sahirana tamin’ny fanompoana maro; dia avy izy ka niteny hoe: Tompoko, moa tsy mampaninona Anao va ny amelan’ny rahavaviko ahy hanompo irery? Koa teneno izy mba hanampy ahy. '
  '41':
  - type: text
    content: 'Fa ny Tompo namaly azy hoe: Marta, Marta, maro ahina sy maro herehina ianao; '
  '42':
  - type: text
    content: nefa zavatra iray loha no ilaina; fa i Maria no efa nifidy ny anjara tsara, izay tsy halaina aminy.
  '5':
  - type: text
    content: 'Ao amin’izay trano idiranareo dia milazà aloha hoe: Fiadanana ho amin’ity trano ity! '
  '6':
  - type: text
    content: 'Raha misy zanaky ny fiadanana ao dia hitoetra ao aminy ny fiadanana tononinareo; fa raha tsy izany dia hiverina ho aminareo ihany izany. '
  '7':
  - type: text
    content: 'Ary mitoera ao amin’izany trano izany ka mihinàna sy misotroa izay zavatra omeny; fa ny mpiasa dia mendrika hahazo ny karamany. Aza mifindrafindra trano. '
  '8':
  - type: text
    content: 'Ary ao amin’izay tanàna idiranareo, ka mandray anareo ny olona, dia hano izay aroso anareo. '
  '9':
  - type: text
    content: 'Sitrano izay marary ao ka lazao amin’ny olona hoe: Efa akaiky anareo ny fanjakan’Andriamanitra. '
