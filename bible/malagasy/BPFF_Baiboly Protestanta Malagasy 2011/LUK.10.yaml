document_id: LUK.10
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Maniraka mpianatra fitopolo lahy Jesosy
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat 10.7-16
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Taorianan’izany dia nanendry olona hafa koa ny Tompo, fitopolo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ny rakitsoratra sasany dia milaza hoe: Roa amby fitopolo.'
    marker-yv: yv-n
  - type: text
    text: ' lahy, ka naniraka azy tsiroaroa hialoha Azy any amin’ny tanàna sy ny toerana rehetra izay nokasainy haleha. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary hoy Izy taminy: Be ny vokatra, fa ny mpiasa no vitsy; koa amin’izany, mangataha amin’ny Tompon’ny vokatra mba handefa mpiasa hanangona ny vokatra. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Mandehana; indro Aho maniraka anareo tahaka ny zanak’ondry eo ampovoan’ny amboadia. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Aza mitondra kitapom-bola, na kitapom-batsy, na kapa; ary aza miarahaba olona akory eny an-dalana. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ao amin’izay trano idiranareo dia milazà aloha hoe: Fiadanana ho amin’ity trano ity! '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Raha misy zanaky ny fiadanana ao dia hitoetra ao aminy ny fiadanana tononinareo; fa raha tsy izany dia hiverina ho aminareo ihany izany. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary mitoera ao amin’izany trano izany ka mihinàna sy misotroa izay zavatra omeny; fa ny mpiasa dia mendrika hahazo ny karamany. Aza mifindrafindra trano. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary ao amin’izay tanàna idiranareo, ka mandray anareo ny olona, dia hano izay aroso anareo. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Sitrano izay marary ao ka lazao amin’ny olona hoe: Efa akaiky anareo ny fanjakan’Andriamanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Fa ao amin’izay tanàna idiranareo, ka tsy mandray anareo kosa ny olona, dia mankanesa eny amin’ny lalambe ka lazao hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ny vovoky ny tanànanareo aza, izay miraikitra amin’ny tongotray, dia ahintsanay ho anareo; nefa aoka ho fantatrareo fa efa akaiky anareo ny fanjakan’Andriamanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Lazaiko aminareo fa ho moramora kokoa ny ho amin’i Sodoma amin’izany andro izany noho ny ho amin’izany tanàna izany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ireo tanàna tsy mety mino
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat 11.21-23
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Lozanao, ry Korazina! Lozanao, ry Betsaida! Fa raha mba tany Tiro sy Sidona no natao ny asa lehibe izay natao teo aminareo, dia ho efa nibebaka ela izy ka nanao akanjo fisaonana sy nipetraka tamin’ny lavenona. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Fa ho moramora kokoa ny ho amin’i Tiro sy i Sidona amin’ny andro fitsarana noho ny ho aminareo. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary ianao, ry Kapernaomy, hasandratra hatrany an-danitra va ianao? Haetry hatrany amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: fitoeran’ny maty
  - type: text
    text: ' ianao.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Izay mihaino anareo dia mihaino Ahy; ary izay mandà anareo dia mandà Ahy; ary izay mandà Ahy dia mandà Izay naniraka Ahy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fiverenan’ireo mpianatra fitopolo lahy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Niverina tamin’ny fifaliana ny fitopolo lahy ka nilaza hoe: Tompo ô, na dia ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: demonia
  - type: text
    text: ' aza dia manaiky anay noho ny anaranao. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Fa hoy Jesosy taminy: Izaho nahita an’i Satana nilatsaka avy tany an-danitra tahaka ny varatra. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Indro, efa nomeko fahefana hanitsaka menarana sy maingoka sy handresy ny hery rehetra ananan’ny fahavalo ianareo ka tsy hisy hampaninona anareo akory. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Kanefa aza mifaly ianareo satria manaiky anareo ny fanahy, fa mifalia satria voasoratra any an-danitra ny anaranareo.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fifalian’ny Zanaka
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat 11.25-27
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Tamin’izany ora izany dia ravoravo tamin’ny Fanahy Masina Jesosy ka niteny hoe: Midera Anao Aho, Raiko ô, Tompon’ny lanitra sy ny tany, fa nafeninao tamin’ny hendry sy ny manan-tsaina izany ka nasehonao tamin’ny zaza madinika; eny, Raiko, fa izany no sitrakao. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ny zavatra rehetra dia natolotry ny Raiko Ahy; tsy misy mahalala ny Zanaka afa-tsy ny Ray ary ny Ray afa-tsy ny Zanaka sy izay tian’ny Zanaka hanehoana Azy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fahasambaran’ny mpianatra
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat 13.16-17
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary nitodika tamin’ny mpianatra Izy dia nilaza taminy manokana hoe: Sambatra ny maso mahita izay hitanareo. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Fa lazaiko aminareo fa mpaminany sy mpanjaka maro no naniry hahita izay hitanareo fa tsy nahita, ary naniry hahare izay renareo fa tsy nahare.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fanoharana ny amin’ilay Samaritana tsara fanahy
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Ampit. Mat 22.34-40; Mar 12.28-34
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary indro, nisy mpahay lalàna iray nitsangana ka naka fanahy an’i Jesosy hoe: Mpampianatra ô, inona no hataoko handovako ny fiainana mandrakizay? '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ary hoy Izy taminy: Inona no voasoratra ao amin’ny Lalàna? Ahoana no famakianao azy? '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ary hoy izy hoe: «Tiava NY TOMPO Andriamanitrao amin’ny fonao manontolo sy ny fanahinao manontolo sy ny herinao manontolo ary ny sainao manontolo» (Deo 6.5); ary, «Tiava ny namanao tahaka ny tenanao» (Lev 19.18). '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Dia hoy Jesosy taminy: Marina ny navalinao; ataovy izany dia ho velona ianao. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Fa izy ta hanamarin-tena ka niteny tamin’i Jesosy hoe: Iza ary no namako?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ary Jesosy namaly hoe: Nisy lehilahy iray nidina avy any Jerosalema hankany Jeriko ka nifanojo tamin’ny jiolahy, dia nendahany sady nokapohiny, ary nilaozany, rehefa saika maty. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ary sendra nisy mpisorona iray nidina tamin’izany lalana izany; ary raha nahita an-dRalehilahy izy dia nandalo azy. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Ary toy izany koa ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: levita
  - type: text
    text: ' iray, izay tonga teo, dia nahita azy, nefa nandalo koa. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Fa nisy kosa '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Samaritana
  - type: text
    text: ' iray nandeha tamin’ny nalehany ka tonga teo aminy, ary nony nahita azy dia onena. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Dia nanatona izy ka nofeheziny ny feriny sady nasiany diloilo sy divay; dia napetrany teo ambonin’ny borikiny izy ka noentiny ho any amin’ny tranom-bahiny dia nokarakarainy. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Ary ny ampitson’iny dia naka vola '
  - type: usfm
    marker: w
    children:
    - type: text
      text: denaria
  - type: text
    text: ' roa izy ka nomeny ny tompon’ny tranom-bahiny sady hoy izy taminy hoe: Karakarao izy; ary na ohatrinona na ohatrinona no laninao mihoatra noho ireto dia honerako rehefa miverina aho. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Iza moa amin’izy telo lahy no heverinao ho naman’ilay azon’ny jiolahy? '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Dia hoy izy: Ilay niantra azy. Hoy Jesosy taminy: Mandehana ianao ka mba manaova toy izany koa.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesosy tao an-tranon’i Marta sy i Maria
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Raha nandeha izy ireo dia niditra teo amin’ny vohitra iray Jesosy; ary nisy vehivavy iray antsoina hoe Marta, nampiantrano Azy. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Nanana rahavavy antsoina hoe Maria izy, izay nipetraka teo anilan’ny tongotry ny Tompo ka nihaino ny teniny. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Fa i Marta kosa dia sahirana tamin’ny fanompoana maro; dia avy izy ka niteny hoe: Tompoko, moa tsy mampaninona Anao va ny amelan’ny rahavaviko ahy hanompo irery? Koa teneno izy mba hanampy ahy. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Fa ny Tompo namaly azy hoe: Marta, Marta, maro ahina sy maro herehina ianao; '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: nefa zavatra iray loha no ilaina; fa i Maria no efa nifidy ny anjara tsara, izay tsy halaina aminy.
