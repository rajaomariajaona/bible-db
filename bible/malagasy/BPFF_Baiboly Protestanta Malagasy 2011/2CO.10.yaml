document_id: 2CO.10,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Miaro ny asa fanompoany i Paoly
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny tenako, izaho Paoly, dia mananatra anareo amin’ny halemem-panahy sy ny hamoram-pon’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ', dia izaho izay manetry tena, hono, raha eo anatrehanareo, fa feno fahasahiana aminareo kosa raha tsy eo. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ny epistiliny, hoy ry zareo, dia mavesatra sy mahery; nefa malemy kosa ny fanatrehan’ny tenany, ary tsinontsinona ny teniny. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Aoka izany olona izany hahafantatra fa tahaka ny fiteninay amin’ny epistily, raha tsy eo izahay, dia ho tahaka izany koa ny asanay rehefa tonga izahay.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa tsy sahy hilaza ny tenanay ho isan’ny sasany izay midera tena izahay, na koa hampitaha ny tenanay aminy; fa tsy hendry ireny, satria manohatra ny tenany amin’ny tenany sy mampitaha ny tenany amin’ny tenany. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa tsy mba hirehareha mihoatra noho izay tokony ho izy izahay fa araka izay voafaritr’Andriamanitra ho anjaranay, dia ny hahatongavanay any aminareo koa. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa tsy toy ny olona izay tsy mbola tonga tany aminareo izahay ka ho mihoatra ny faritry ny anjaranay; fa efa tonga tany aminareo tokoa tamin’ny Filazantsaran’i Kristy izahay; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'tsy mirehareha mihoatra ny tokony ho izy izahay ka hirehareha amin’izay nisasaran’ny sasany, fa manana fanantenana izahay fa rehefa mitombo ny finoanareo dia mihalehibe ao aminareo koa izahay, araka izay voafaritra ho anjaranay, sady mbola handroso ihany '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ka hitory ny Filazantsara any ivelan’ny faritra misy anareo, mba tsy hireharehanay amin’ny asa efa vitan’ny hafa. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa «izay mirehareha dia aoka NY TOMPO no ho reharehany» (Jer 9. 23). '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa tsy izay midera tena no ankasitrahana fa izay derain’ny Tompo.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Miangavy anareo aho: Aoka mba tsy ho amin’ny fahasahiana no hanehoako ny fahatokiako raha tonga aho; fa izany fahasahiana izany no kasaiko haseho amin’ny sasany izay milaza anay ho mandeha araka ny nofo. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa na dia velona amin’ny nofo aza izahay dia tsy mba miady araka ny nofo, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fa tsy avy amin’ny nofo ny fiadian’ny tafikay fa manan-kery avy amin’Andriamanitra mba handrava manda. Mandrava ny fisainana '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'sy ny zavatra avo rehetra izay atsangana hanohitra ny fahalalana an’Andriamanitra izahay ka mamabo ny hevitra rehetra hanaiky an’i Kristy, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ary vonona hamaly ny tsy fankatoavana rehetra izahay, rehefa tanteraka ny fankatoavanareo.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mijery zavatra araka ny fisehony ihany ianareo. Raha misy olona matoky tena fa an’i Kristy dia aoka izy hisaintsaina izao indray: Fa tahaka ny maha an’i Kristy azy, no maha an’i Kristy anay koa. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa na dia bebe ihany aza ny fireharehako ny amin’ny fahefana izay nomen’i Kristy anay ho fampandrosoana, fa tsy ho fandravana anareo, dia tsy ho menatra ny amin’izany aho. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa tsy te hiseho ho mpampitahotra anareo amin’ny epistily nalefako aho. '
