document_id: EZK.26
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Faminaniana ny amin’i Tiro
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Tamin’ny andro voalohany amin’ny volana, tamin’ny taona fahiraika amby folo dia tonga tamiko ny tenin’NY TOMPO hoe:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ry '
  - type: usfm
    marker: w
    children:
    - type: text
      text: zanak’olona
  - type: text
    text: ', noho ny nandatsan’i Tiro an’i Jerosalema hoe: Hia! Akory izay! Potika ilay vavahadin’ny firenena! Mba anjarako kosa izao ka ho feno aho, fa izy kosa dia ho foana! '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dia izao no lazain’NY TOMPO Andriamanitra: Indro, hamely anao Aho, ry Tiro, ka hampiakatra firenena maro hiady aminao, tahaka ny fampiakatry ny ranomasina ny onjany. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Horavan’ireo ny mandan’i Tiro sady harodany ny tilikambo fiambenany, dia hofafako hiala aminy ny vovo-taniny ka hataoko tahaka ny vatolampy mangadihady izy. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ho toerana famelarana harato eo amin’ny ranomasina izy. Izaho no niteny izany, hoy NY TOMPO Andriamanitra. Ho babon’ny firenena izy, '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ary ny vohitra miankina aminy, izay eny an-tanety, dia hovonoina amin’ny sabatra, dia ho fantany fa Izaho no TOMPO.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Fa izao no lazain’NY TOMPO Andriamanitra: Indro, entiko avy any avaratra ho any Tiro i Nebokadnezara, mpanjakan’i Babilona, andrianan’ny andriana, mitondra soavaly, kalesy fitondra miady, mpitaingin-tsoavaly ary vahoaka betsaka. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ny vohitra miankina aminao, izay eny an-tanety, dia hovonoiny amin’ny sabatra; hanandratra manda fanafihana sy tovon-tany sady hanangana ampinga lehibe hamelezany anao izy. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Hanoto ny mandanao amin’ny lohondry vy fandravana izy sady horavany amin’ny fiadiany ny tilikambo fiambenanao. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ho feno ny vovo-taniny ianao noho ny hamaroan’ny soavaliny; hihorohoro ny mandanao noho ny fikorodondrodon’ny mpitaingin-tsoavaly sy ny kodiarana ary ny kalesy fitondra miady, rehefa miditra eo amin’ny vavahadinao tahaka ny olona miditra amin’ny tanàna izay voabanga izy. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ny kitron-tsoavaliny no hanitsakitsahany ny lalambenao rehetra; ny olonao dia hovonoiny amin’ny sabatra ary ny tsangambatonao mafy dia hianjera amin’ny tany. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Hobaboiny ny harenanao, horobainy ny entam-barotrao, harodany ny mandanao, horavany ny tranonao mahafinaritra; ary ny vatonao sy ny hazonao ary ny vovoka eo aminao dia hataony any anaty rano. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Hatsahatro ny tabataban’ny hiranao sady tsy ho re intsony ny fanenon’ny lokanganao. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Dia hataoko toy ny vatolampy mangadihady ianao ka ho toerana famelarana harato sady tsy haorina intsony; fa Izaho TOMPO no niteny, hoy NY TOMPO Andriamanitra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Izao no lazain’NY TOMPO Andriamanitra amin’i Tiro: Tsy hihorohoro va ny moron-dranomasina noho ny fikotrokotroky ny firodananao, raha mitrona ny voatrabaka, ary feno famonoana ao anatinao? '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Hidina hiala amin’ny sezafiandrianany ireo andrianan’ny ranomasina rehetra ka hanala ny akanjobe sy hanaisotra ny fitafiany misoratsoratra; hovitra no hitafiany ka hipetraka amin’ny tany izy; hangovitra isaky ny indray mipy maso izy ary ho very hevitra noho ny aminao. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary hanao hira fisaonana ny aminao izy ka hiteny aminao hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Indrisy! Rava ianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ry ilay nonenan’ny mpandeha an-dranomasina!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ilay tanàna malaza izay nahery teo amin’ny ranomasina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia izy mbamin’ny mponina ao
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay nampihorohoro ny mponina rehetra eo aminy!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ankehitriny dia raiki-tahotra ny moron-dranomasina amin’ny andro ianjeranao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, toran-kovitra ny nosy any an-dranomasina noho ny faharavanao.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Fa izao no lazain’NY TOMPO Andriamanitra: Rehefa ataoko tanàna lao tahaka ireo tanàna aolo ianao, ary hampiakariko aminao ny rano ao amin’ny lalina ka hosaronan’ny ranobe ianao, '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'dia hampidiniko hiaraka amin’izay mivarina any an-davaka ianao, hankany amin’ny razana fahiny ka hamponeniko any ambanin’ny tany ianao, dia any amin’ny fonenana efa lao hatramin’ny ela, hiaraka amin’izay mivarina any an-davaka, mba tsy honenana intsony ianao. Hasiako voninahitra eo amin’ny tanin’ny velona; '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: dia hataoko fampitahorana ianao ka tsy ho eo intsony; eny, hotadiavina ianao nefa tsy ho hita intsony mandrakizay, hoy NY TOMPO Andriamanitra.
