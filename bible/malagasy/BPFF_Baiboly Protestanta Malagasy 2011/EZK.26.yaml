document_id: EZK.26,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Faminaniana ny amin’i Tiro
  - type: text
    content: 'Tamin’ny andro voalohany amin’ny volana, tamin’ny taona fahiraika amby folo dia tonga tamiko ny tenin’NY TOMPO hoe:'
  '10':
  - type: text
    content: 'Ho feno ny vovo-taniny ianao noho ny hamaroan’ny soavaliny; hihorohoro ny mandanao noho ny fikorodondrodon’ny mpitaingin-tsoavaly sy ny kodiarana ary ny kalesy fitondra miady, rehefa miditra eo amin’ny vavahadinao tahaka ny olona miditra amin’ny tanàna izay voabanga izy. '
  '11':
  - type: text
    content: 'Ny kitron-tsoavaliny no hanitsakitsahany ny lalambenao rehetra; ny olonao dia hovonoiny amin’ny sabatra ary ny tsangambatonao mafy dia hianjera amin’ny tany. '
  '12':
  - type: text
    content: 'Hobaboiny ny harenanao, horobainy ny entam-barotrao, harodany ny mandanao, horavany ny tranonao mahafinaritra; ary ny vatonao sy ny hazonao ary ny vovoka eo aminao dia hataony any anaty rano. '
  '13':
  - type: text
    content: 'Hatsahatro ny tabataban’ny hiranao sady tsy ho re intsony ny fanenon’ny lokanganao. '
  '14':
  - type: text
    content: Dia hataoko toy ny vatolampy mangadihady ianao ka ho toerana famelarana harato sady tsy haorina intsony; fa Izaho TOMPO no niteny, hoy NY TOMPO Andriamanitra.
  '15':
  - type: text
    content: 'Izao no lazain’NY TOMPO Andriamanitra amin’i Tiro: Tsy hihorohoro va ny moron-dranomasina noho ny fikotrokotroky ny firodananao, raha mitrona ny voatrabaka, ary feno famonoana ao anatinao? '
  '16':
  - type: text
    content: 'Hidina hiala amin’ny sezafiandrianany ireo andrianan’ny ranomasina rehetra ka hanala ny akanjobe sy hanaisotra ny fitafiany misoratsoratra; hovitra no hitafiany ka hipetraka amin’ny tany izy; hangovitra isaky ny indray mipy maso izy ary ho very hevitra noho ny aminao. '
  '17':
  - type: text
    content: 'Ary hanao hira fisaonana ny aminao izy ka hiteny aminao hoe:'
  - type: text
    content: Indrisy! Rava ianao,
  - type: text
    content: ry ilay nonenan’ny mpandeha an-dranomasina!
  - type: text
    content: Dia ilay tanàna malaza izay nahery teo amin’ny ranomasina,
  - type: text
    content: dia izy mbamin’ny mponina ao
  - type: text
    content: izay nampihorohoro ny mponina rehetra eo aminy!
  '18':
  - type: text
    content: Ankehitriny dia raiki-tahotra ny moron-dranomasina amin’ny andro ianjeranao;
  - type: text
    content: eny, toran-kovitra ny nosy any an-dranomasina noho ny faharavanao.
  '19':
  - type: text
    content: 'Fa izao no lazain’NY TOMPO Andriamanitra: Rehefa ataoko tanàna lao tahaka ireo tanàna aolo ianao, ary hampiakariko aminao ny rano ao amin’ny lalina ka hosaronan’ny ranobe ianao, '
  '2':
  - type: text
    content: 'Ry '
  - type: text
    content: zanak’olona
  - type: text
    content: ', noho ny nandatsan’i Tiro an’i Jerosalema hoe: Hia! Akory izay! Potika ilay vavahadin’ny firenena! Mba anjarako kosa izao ka ho feno aho, fa izy kosa dia ho foana! '
  '20':
  - type: text
    content: 'dia hampidiniko hiaraka amin’izay mivarina any an-davaka ianao, hankany amin’ny razana fahiny ka hamponeniko any ambanin’ny tany ianao, dia any amin’ny fonenana efa lao hatramin’ny ela, hiaraka amin’izay mivarina any an-davaka, mba tsy honenana intsony ianao. Hasiako voninahitra eo amin’ny tanin’ny velona; '
  '21':
  - type: text
    content: dia hataoko fampitahorana ianao ka tsy ho eo intsony; eny, hotadiavina ianao nefa tsy ho hita intsony mandrakizay, hoy NY TOMPO Andriamanitra.
  '3':
  - type: text
    content: 'Dia izao no lazain’NY TOMPO Andriamanitra: Indro, hamely anao Aho, ry Tiro, ka hampiakatra firenena maro hiady aminao, tahaka ny fampiakatry ny ranomasina ny onjany. '
  '4':
  - type: text
    content: 'Horavan’ireo ny mandan’i Tiro sady harodany ny tilikambo fiambenany, dia hofafako hiala aminy ny vovo-taniny ka hataoko tahaka ny vatolampy mangadihady izy. '
  '5':
  - type: text
    content: 'Ho toerana famelarana harato eo amin’ny ranomasina izy. Izaho no niteny izany, hoy NY TOMPO Andriamanitra. Ho babon’ny firenena izy, '
  '6':
  - type: text
    content: ary ny vohitra miankina aminy, izay eny an-tanety, dia hovonoina amin’ny sabatra, dia ho fantany fa Izaho no TOMPO.
  '7':
  - type: text
    content: 'Fa izao no lazain’NY TOMPO Andriamanitra: Indro, entiko avy any avaratra ho any Tiro i Nebokadnezara, mpanjakan’i Babilona, andrianan’ny andriana, mitondra soavaly, kalesy fitondra miady, mpitaingin-tsoavaly ary vahoaka betsaka. '
  '8':
  - type: text
    content: 'Ny vohitra miankina aminao, izay eny an-tanety, dia hovonoiny amin’ny sabatra; hanandratra manda fanafihana sy tovon-tany sady hanangana ampinga lehibe hamelezany anao izy. '
  '9':
  - type: text
    content: 'Hanoto ny mandanao amin’ny lohondry vy fandravana izy sady horavany amin’ny fiadiany ny tilikambo fiambenanao. '
