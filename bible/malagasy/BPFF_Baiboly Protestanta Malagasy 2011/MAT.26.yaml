document_id: MAT.26,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny teti-dratsy hamonoana an’i Jesosy
  - type: heading
    content: Mar 14.1-2; Lio 22.1-2; Jao 11.47-53
  - type: text
    content: 'Rehefa vitan’i Jesosy izany teny rehetra izany dia nilaza tamin’ny mpianany Izy hoe: '
  '10':
  - type: text
    content: 'Ary fantatr’i Jesosy izay nataon’ireo ka hoy Izy taminy: Nahoana ianareo no manao izay mampalahelo io vehivavy io? Fa asa soa no nataony tamiko. '
  '11':
  - type: text
    content: 'Satria ny mahantra dia eto aminareo mandrakariva fa Izaho tsy mba ho eto aminareo mandrakariva. '
  '12':
  - type: text
    content: 'Nandraraka io menaka manitra io tamin’ny tenako izy, fa ny hanamboarany Ahy halevina no nanaovany izany. '
  '13':
  - type: text
    content: 'Lazaiko aminareo marina tokoa: Na aiza na aiza eto amin’izao tontolo izao no itoriana ity Filazantsara ity dia hotantaraina koa izay nataon’ity vehivavy ity mba ho fahatsiarovana azy.'
  - type: heading
    content: Ny naneken’i Jodasy hamadika an’i Jesosy
  - type: heading
    content: Mar 14.10-11; Lio 22.3-6
  '14':
  - type: text
    content: 'Ary ny iray tamin’ny roa amby folo lahy, izay antsoina hoe Jodasy iskariota, dia nankao amin’ireo lehiben’ny mpisorona '
  '15':
  - type: text
    content: 'ka niteny hoe: Homenareo ohatrinona aho hanolorako Azy aminareo? Ary izy ireo nandanja sekela volafotsy telopolo homena azy. '
  '16':
  - type: text
    content: Hatramin’izay no nitadiavany izay andro hahazoany manolotra Azy.
  - type: heading
    content: Asain’i Jesosy omanina ny Paska
  - type: heading
    content: Mar 14.12-17; Lio 22.7-14
  '17':
  - type: text
    content: 'Tamin’ny voalohany amin’ny andro fihinanana ny mofo tsy misy masirasira dia nankeo amin’i Jesosy ny mpianatra ka niteny hoe: Aiza no tianao handehananay hanomanana ny sakafon’ny Paska ho anao? '
  '18':
  - type: text
    content: 'Ary hoy Izy: Mankanesa any an-tanàna ho any amin’ny lehilahy iray ka lazao aminy hoe: Hoy ny Mpampianatra: Efa akaiky ny fotoanandroko; koa ato aminao Aho sy ny mpianatro no hitandrina ny Paska. '
  '19':
  - type: text
    content: Ary ny mpianatra dia nanatanteraka izay toromarika nomen’i Jesosy ka nanomana ny Paska.
  '2':
  - type: text
    content: 'Fantatrareo fa raha afaka indroa andro dia ho tonga ny Paska, koa ny '
  - type: text
    content: Zanak’Olona
  - type: text
    content: ' dia hatolotra hohomboana amin’ny hazofijaliana.'
  '20':
  - type: text
    content: Ary nony hariva ny andro dia nipetraka hisakafo Izy mbamin’ny mpianatra roa amby folo lahy.
  - type: heading
    content: Ny nilazan’i Jesosy fa hisy hamadika Izy
  - type: heading
    content: Mar 14.18-21; Lio 22.21-23; Jao 13.21-30
  '21':
  - type: text
    content: 'Ary raha mbola nihinana izy ireo dia hoy Jesosy: Lazaiko aminareo marina tokoa, fa ny iray aminareo no hamadika Ahy. '
  '22':
  - type: text
    content: 'Dia nalahelo mafy izy ireo ka samy nanontany Azy ny tsirairay hoe: Moa izaho va izany, Tompoko? '
  '23':
  - type: text
    content: 'Ary Izy namaly hoe: Izay niara-nanatsoboka ny tanany Tamiko tao anatin’ny lovia, izy no hamadika Ahy. '
  '24':
  - type: text
    content: 'Ny '
  - type: text
    content: Zanak’Olona
  - type: text
    content: ' dia mandeha tokoa araka izay voasoratra momba Azy, nefa lozan’izay olona hahatonga ny Zanak’Olona ho voatolotra! Tsara ho an’izany olona izany raha tsy teraka akory izy. '
  '25':
  - type: text
    content: 'Ary hoy i Jodasy ilay hanolotra Azy: Izaho va izany, Raby ô? Dia hoy Izy taminy: Voalazanao.'
  - type: heading
    content: Ny nanorenana ny fanasan’ny Tompo
  - type: heading
    content: Mar 14.22-25; Lio 22.15-20; ampit. 1Kor 11.23-26
  '26':
  - type: text
    content: 'Ary raha mbola teo am-pisakafoana izy ireo dia nandray mofo Jesosy, koa rehefa nisaotra Izy, dia novakiny ka natolony ny mpianatra, ary hoy Izy: Raiso, hano, ity no tenako. '
  '27':
  - type: text
    content: 'Ary nandray ny kapoaka Izy, koa rehefa nisaotra Izy, dia natolony azy ka nataony hoe: Misotroa amin’ity ianareo rehetra; '
  '28':
  - type: text
    content: 'fa ity no rako, dia ny amin’ny fanekena vaovao izay alatsaka ho an’ny maro ho famelan-keloka. '
  '29':
  - type: text
    content: Ary lazaiko aminareo fa manomboka izao dia tsy mba hisotro itony vokatry ny voaloboka itony intsony Aho mandra-piavin’ny andro hiarahako misotro izay vaovao aminareo any amin’ny fanjakan’ny Raiko.
  - type: heading
    content: Nambaran’i Jesosy fa handa Azy i Petera
  - type: heading
    content: Mar 14.26-31; Lio 22.31-34; Jao 13.37-38
  '3':
  - type: text
    content: 'Ary tamin’izany ny lehiben’ny mpisorona sy ny loholona dia nivory tao amin’ny lapan’ny Mpisoronabe antsoina hoe Kaiafa. '
  '30':
  - type: text
    content: Rehefa avy nihira fiderana izy ireo dia lasa nankany an-tendrombohitra Oliva.
  '31':
  - type: text
    content: 'Ary tamin’izany dia hoy Jesosy taminy: Ianareo rehetra dia ho tafintohina noho ny Amiko anio alina; fa voasoratra hoe:'
  - type: text
    content: «Hamely ny mpiandry Aho
  - type: text
    content: dia hihahaka ny ondry andrasana» (Zak 13.7).
  '32':
  - type: text
    content: Fa rehefa tafatsangana amin’ny maty Aho dia hialoha anareo any Galilia.
  '33':
  - type: text
    content: 'Fa hoy i Petera Taminy: Na dia ho tafintohina noho ny Aminao aza ny olona rehetra, izaho dia tsy mba ho tafintohina na oviana na oviana. '
  '34':
  - type: text
    content: 'Hoy Jesosy taminy: Lazaiko aminao marina tokoa fa anio alina, raha tsy mbola misy akoho maneno, dia handa Ahy intelo ianao. '
  '35':
  - type: text
    content: 'Hoy i Petera taminy: Na dia hiara-maty aminao aza aho dia tsy mba handa Anao mihitsy. Ary toy izany koa no nolazain’ny mpianatra rehetra.'
  - type: heading
    content: Ny vavaka nataon’i Jesosy tao Getsemane
  - type: heading
    content: Mar 14.32-42; Lio 22.40-46
  '36':
  - type: text
    content: 'Ary Jesosy mbamin’ny mpianany dia tonga tao amin’ny saha iray antsoina hoe Getsemane, ary hoy Izy tamin’ny mpianany: Mipetraha eto aloha ianareo, raha mbola mankeroa hivavaka Aho. '
  '37':
  - type: text
    content: 'Dia nitondra an’i Petera mbamin’izy roa lahy zanak’i Zebedio Izy, sady nalahelo am-po sy ory indrindra. '
  '38':
  - type: text
    content: 'Hoy Izy tamin’izy roa lahy: Fadiranovana loatra toy ny efa ho faty ny fanahiko; mitoera eto ka miaraha miari-tory Amiko. '
  '39':
  - type: text
    content: 'Ary nony nandroso kelikely Izy dia niankohoka ka nivavaka hoe: Raiko ô, raha azo atao dia aoka hesorina Amiko ity kapoaka ity; nefa aoka tsy ny sitrapoko no hatao fa ny Anao. '
  '4':
  - type: text
    content: 'Ary niara-nihevitra ny hisambotra an’i Jesosy amin’ny fitaka izy ireo ka hamono Azy; '
  '40':
  - type: text
    content: 'Nankeo amin’ny mpianatra Izy avy eo ka nahita azy ireo matory; dia hoy Izy tamin’i Petera: Hay tsy mahazaka ny miara-miari-tory Amiko na dia ora iray ihany aza ianareo! '
  '41':
  - type: text
    content: 'Miareta tory sy mivavaha ianareo mba tsy hidiranareo amin’ny fakam-panahy; mety ihany ny fanahy fa ny nofo no tsy manan-kery. '
  '42':
  - type: text
    content: 'Dia nihataka fanindroany Izy ka nivavaka hoe: Raiko ô, raha tsy azo esorina ity, fa tsy maintsy hosotroiko, dia aoka ny sitraponao no hatao. '
  '43':
  - type: text
    content: 'Ary nony niverina indray Izy dia nahita azy ireo matory; fa efa nilondolondo ny masony. '
  '44':
  - type: text
    content: 'Dia nandao azy ireo Izy ka lasa indray nivavaka fanintelony, ary ilay teniny teo ihany no naveriny. '
  '45':
  - type: text
    content: 'Niverina teo amin’ny mpianatra indray Izy avy eo sady niteny hoe: Matoria ary ianareo ankehitriny ka mialà sasatra, indro, efa akaiky ny ora, ary ny '
  - type: text
    content: Zanak’Olona
  - type: text
    content: ' dia hatolotra eo an-tanan’ny mpanota. '
  '46':
  - type: text
    content: Mitsangàna, andeha isika, indro, efa manakaiky ilay manolotra Ahy.
  - type: heading
    content: Ny nisamborana an’i Jesosy
  - type: heading
    content: Mar 14.43-50; Lio 22.47-53; Jao 18.2-11
  '47':
  - type: text
    content: 'Ary raha mbola niteny Jesosy dia indro, avy i Jodasy izay iray amin’ny roa amby folo lahy, miaraka amin’ny vahoaka betsaka, nitondra sabatra sy langilangy, nirahin’ireo lehiben’ny mpisorona sy ny loholona. '
  '48':
  - type: text
    content: 'Ary ilay nanolotra Azy nanome famantarana ny olona ka niteny hoe: Izay horohako no Izy ka sambory. '
  '49':
  - type: text
    content: 'Ary niaraka tamin’izay dia nanatona an’i Jesosy izy ka niteny hoe: Finaritra, Raby! Dia norohany izy. '
  '5':
  - type: text
    content: 'kanefa hoy izy: Tsy amin’ny andro firavoravoana, fandrao hisy tabataba eo amin’ny vahoaka.'
  - type: heading
    content: Ny nanosorana menaka manitra an’i Jesosy tany Betania
  - type: heading
    content: Mar 14.3-9; ampit. Lio 7.36-50; Jao 12.1-8
  '50':
  - type: text
    content: 'Fa hoy Jesosy taminy: Ry sakaiza, ataovy izay nahatongavanao eto. Dia nanatona ny olona ka nisambotra an’i Jesosy ary nitana Azy.'
  '51':
  - type: text
    content: 'Ary indro, ny iray tamin’ireo izay niaraka tamin’i Jesosy dia nanatsotra ny tanany, dia nanatsoaka ny sabany ka nikapoka ny mpanompon’ny Mpisoronabe ary nahafaka ny sofiny. '
  '52':
  - type: text
    content: 'Fa hoy Jesosy: Ampidiro amin’ny tranony ny sabatrao; fa izay rehetra mandray sabatra dia ho fatin’ny sabatra. '
  '53':
  - type: text
    content: 'Heverinao va fa tsy azoko atao ny mangataka amin’ny Raiko dia haniraka anjely maherin’ny roa amby folo legiona ho atỳ Amiko Izy eo no eo? '
  '54':
  - type: text
    content: Raha izany anefa, hatao ahoana no hahatanteraka ny Soratra Masina izay milaza fa tsy maintsy ho tonga izao?
  '55':
  - type: text
    content: 'Ary tamin’izany ora izany dia niteny tamin’ny vahoaka Jesosy hoe: Tonga mitondra sabatra sy langilangy hisambotra Ahy toy ny hisambotra jiolahy va ianareo? Isanandro dia nipetraka nampianatra tao amin’ny tempoly Aho nefa tsy nisambotra Ahy ianareo. '
  '56':
  - type: text
    content: Nefa moa izany rehetra izany dia tonga mba hahatanteraka izay voasoratry ny mpaminany.
  - type: text
    content: Tamin’izany tokoa dia nandao Azy ny mpianatra rehetra ka nandositra.
  - type: heading
    content: Ny nitsaran’ny Sinedriona an’i Jesosy
  - type: heading
    content: Mar 14.53-65; Lio 22.54-55, 63-71; Jao 18.12-24
  '57':
  - type: text
    content: 'Ary ireo izay nisambotra an’i Jesosy dia nitondra Azy ho any amin’i Kaiafa '
  - type: text
    content: mpisoronabe
  - type: text
    content: ', tao amin’izay nivorian’ny '
  - type: text
    content: mpanoradalàna
  - type: text
    content: ' sy ny loholona. '
  '58':
  - type: text
    content: Ary i Petera dia nanaraka Azy teny lavidavitra teny hatrany amin’ny lapan’ny Mpisoronabe; dia niditra izy ka niara-nipetraka tamin’ireo mpiandry raharaha mba hahita izay ho farany.
  '59':
  - type: text
    content: 'Ary ireo lehiben’ny mpisorona mbamin’ny '
  - type: text
    content: Sinedriona
  - type: text
    content: ' rehetra dia nitady teny hoentiny miampanga lainga an’i Jesosy mba hamonoany Azy; '
  '6':
  - type: text
    content: 'Ary nony tany Betania, tao an-tranon’i Simona boka, Jesosy, '
  '60':
  - type: text
    content: 'nefa tsy nahita izy ireo, na dia maro aza ny vavolombelona mandainga tonga teo. Ary nony farany dia nisy roa lahy tonga teo, izay niteny hoe: '
  '61':
  - type: text
    content: 'Ilehity dia nilaza hoe: Mahay mandrava ny tempolin’Andriamanitra Aho sy manangana azy ao anatin’ny hateloana. '
  '62':
  - type: text
    content: 'Dia nitsangana ny Mpisoronabe ka niteny tamin’i Jesosy hoe: Tsy manana havaly va Ianao? Inona no iampangan’ireo Anao? '
  '63':
  - type: text
    content: 'Nefa nangina Jesosy. Dia hoy ny Mpisoronabe Taminy: Ampianianiko amin’Andriamanitra velona Ianao hilaza aminay, raha Ianao no '
  - type: text
    content: Kristy
  - type: text
    content: ', Zanak’Andriamanitra. '
  '64':
  - type: text
    content: 'Hoy Jesosy taminy: Voalazanao; nefa, lazaiko aminareo fa hatramin’izao dia ho hitanareo ny '
  - type: text
    content: Zanak’Olona
  - type: text
    content: ' mipetraka eo ankavanan’ny Hery ary tonga eny amin’ny rahon’ny lanitra. '
  '65':
  - type: text
    content: 'Tamin’izay ny Mpisoronabe dia nandriatra ny fitafiany ka niteny hoe: Efa niteny ratsy Izy; inona no mbola ilàntsika vavolombelona indray? Indro, efa renareo izao fitenenan-dratsy izao. '
  '66':
  - type: text
    content: 'Ahoana ny hevitrareo? Ary namaly izy ireo hoe: Mendrika hohelohina ho faty Izy.'
  '67':
  - type: text
    content: 'Dia nandrora ny tavany sy nanisy totohondry Azy izy ireo, ary ny sasany dia namely tehamaina '
  '68':
  - type: text
    content: 'sady niteny hoe: Maminania aminay, ry Kristy, iza no namely Anao teo?'
  - type: heading
    content: Ny nandavan’i Petera an’i Jesosy
  - type: heading
    content: Mar 14.66-72; Lio 22.56-62; Jao 18.17, 25-27
  '69':
  - type: text
    content: 'Ary i Petera dia nipetraka teo ivelany, teo an-kianja; nanatona azy ny ankizivavy iray ka niteny hoe: Ianao koa dia niaraka tamin’i Jesosy, ilay Galiliana. '
  '7':
  - type: text
    content: 'dia nanatona Azy ny vehivavy iray nitondra tavoara alabasitara feno menaka manitra tena sarobidy, koa nararany tamin’ny lohan’i Jesosy izany, raha nipetraka nisakafo Izy. '
  '70':
  - type: text
    content: 'Fa nandà teo anatrehan’izy rehetra izy ka niteny hoe: Tsy fantatro izay lazainao. '
  '71':
  - type: text
    content: 'Ary nony niala ho eo am-bavahady izy dia nahita azy koa ny ankizivavy iray hafa ka nilaza tamin’izay teo hoe: Ity koa niaraka tamin’ilay Jesosy avy any Nazareta. '
  '72':
  - type: text
    content: 'Dia nandà indray tamin’ny fianianana izy hoe: Tsy fantatro izany Lehilahy izany. '
  '73':
  - type: text
    content: 'Nony afaka kelikely, nanatona ireo izay nijanona teo ka nilaza tamin’i Petera hoe: Marina tokoa fa naman’ireny ianao; fa ny fiteninao no miampanga anao. '
  '74':
  - type: text
    content: 'Dia nanomboka niozona sy nianiana izy hoe: Tsy fantatro izany Lehilahy izany; ary niaraka tamin’izay dia nisy akoho naneno.'
  '75':
  - type: text
    content: 'Ary nahatsiaro ny tenin’i Jesosy i Petera, dia ilay nolazainy hoe: Raha tsy mbola misy akoho maneno dia handa Ahy intelo ianao. Ary lasa nandeha tany ivelany izy dia nigogogogo nitomany.'
  '8':
  - type: text
    content: 'Nony nahita izany ny mpianatra dia tezitra ka niteny hoe: Inona no anton’izao fandaniam-poana izao? '
  '9':
  - type: text
    content: Fa azo namidy ho lafo be iny ka homena ny mahantra.
