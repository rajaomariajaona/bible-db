document_id: MAT.26
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny teti-dratsy hamonoana an’i Jesosy
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mar 14.1-2; Lio 22.1-2; Jao 11.47-53
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Rehefa vitan’i Jesosy izany teny rehetra izany dia nilaza tamin’ny mpianany Izy hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Fantatrareo fa raha afaka indroa andro dia ho tonga ny Paska, koa ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Zanak’Olona
  - type: text
    text: ' dia hatolotra hohomboana amin’ny hazofijaliana.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary tamin’izany ny lehiben’ny mpisorona sy ny loholona dia nivory tao amin’ny lapan’ny Mpisoronabe antsoina hoe Kaiafa. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary niara-nihevitra ny hisambotra an’i Jesosy amin’ny fitaka izy ireo ka hamono Azy; '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'kanefa hoy izy: Tsy amin’ny andro firavoravoana, fandrao hisy tabataba eo amin’ny vahoaka.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nanosorana menaka manitra an’i Jesosy tany Betania
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mar 14.3-9; ampit. Lio 7.36-50; Jao 12.1-8
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary nony tany Betania, tao an-tranon’i Simona boka, Jesosy, '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'dia nanatona Azy ny vehivavy iray nitondra tavoara alabasitara feno menaka manitra tena sarobidy, koa nararany tamin’ny lohan’i Jesosy izany, raha nipetraka nisakafo Izy. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Nony nahita izany ny mpianatra dia tezitra ka niteny hoe: Inona no anton’izao fandaniam-poana izao? '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Fa azo namidy ho lafo be iny ka homena ny mahantra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary fantatr’i Jesosy izay nataon’ireo ka hoy Izy taminy: Nahoana ianareo no manao izay mampalahelo io vehivavy io? Fa asa soa no nataony tamiko. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Satria ny mahantra dia eto aminareo mandrakariva fa Izaho tsy mba ho eto aminareo mandrakariva. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Nandraraka io menaka manitra io tamin’ny tenako izy, fa ny hanamboarany Ahy halevina no nanaovany izany. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Lazaiko aminareo marina tokoa: Na aiza na aiza eto amin’izao tontolo izao no itoriana ity Filazantsara ity dia hotantaraina koa izay nataon’ity vehivavy ity mba ho fahatsiarovana azy.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny naneken’i Jodasy hamadika an’i Jesosy
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mar 14.10-11; Lio 22.3-6
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary ny iray tamin’ny roa amby folo lahy, izay antsoina hoe Jodasy iskariota, dia nankao amin’ireo lehiben’ny mpisorona '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'ka niteny hoe: Homenareo ohatrinona aho hanolorako Azy aminareo? Ary izy ireo nandanja sekela volafotsy telopolo homena azy. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Hatramin’izay no nitadiavany izay andro hahazoany manolotra Azy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Asain’i Jesosy omanina ny Paska
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mar 14.12-17; Lio 22.7-14
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Tamin’ny voalohany amin’ny andro fihinanana ny mofo tsy misy masirasira dia nankeo amin’i Jesosy ny mpianatra ka niteny hoe: Aiza no tianao handehananay hanomanana ny sakafon’ny Paska ho anao? '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary hoy Izy: Mankanesa any an-tanàna ho any amin’ny lehilahy iray ka lazao aminy hoe: Hoy ny Mpampianatra: Efa akaiky ny fotoanandroko; koa ato aminao Aho sy ny mpianatro no hitandrina ny Paska. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ary ny mpianatra dia nanatanteraka izay toromarika nomen’i Jesosy ka nanomana ny Paska.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ary nony hariva ny andro dia nipetraka hisakafo Izy mbamin’ny mpianatra roa amby folo lahy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nilazan’i Jesosy fa hisy hamadika Izy
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mar 14.18-21; Lio 22.21-23; Jao 13.21-30
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary raha mbola nihinana izy ireo dia hoy Jesosy: Lazaiko aminareo marina tokoa, fa ny iray aminareo no hamadika Ahy. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Dia nalahelo mafy izy ireo ka samy nanontany Azy ny tsirairay hoe: Moa izaho va izany, Tompoko? '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary Izy namaly hoe: Izay niara-nanatsoboka ny tanany Tamiko tao anatin’ny lovia, izy no hamadika Ahy. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Zanak’Olona
  - type: text
    text: ' dia mandeha tokoa araka izay voasoratra momba Azy, nefa lozan’izay olona hahatonga ny Zanak’Olona ho voatolotra! Tsara ho an’izany olona izany raha tsy teraka akory izy. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary hoy i Jodasy ilay hanolotra Azy: Izaho va izany, Raby ô? Dia hoy Izy taminy: Voalazanao.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nanorenana ny fanasan’ny Tompo
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mar 14.22-25; Lio 22.15-20; ampit. 1Kor 11.23-26
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ary raha mbola teo am-pisakafoana izy ireo dia nandray mofo Jesosy, koa rehefa nisaotra Izy, dia novakiny ka natolony ny mpianatra, ary hoy Izy: Raiso, hano, ity no tenako. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ary nandray ny kapoaka Izy, koa rehefa nisaotra Izy, dia natolony azy ka nataony hoe: Misotroa amin’ity ianareo rehetra; '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'fa ity no rako, dia ny amin’ny fanekena vaovao izay alatsaka ho an’ny maro ho famelan-keloka. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Ary lazaiko aminareo fa manomboka izao dia tsy mba hisotro itony vokatry ny voaloboka itony intsony Aho mandra-piavin’ny andro hiarahako misotro izay vaovao aminareo any amin’ny fanjakan’ny Raiko.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nambaran’i Jesosy fa handa Azy i Petera
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mar 14.26-31; Lio 22.31-34; Jao 13.37-38
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Rehefa avy nihira fiderana izy ireo dia lasa nankany an-tendrombohitra Oliva.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ary tamin’izany dia hoy Jesosy taminy: Ianareo rehetra dia ho tafintohina noho ny Amiko anio alina; fa voasoratra hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Hamely ny mpiandry Aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hihahaka ny ondry andrasana» (Zak 13.7).
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Fa rehefa tafatsangana amin’ny maty Aho dia hialoha anareo any Galilia.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Fa hoy i Petera Taminy: Na dia ho tafintohina noho ny Aminao aza ny olona rehetra, izaho dia tsy mba ho tafintohina na oviana na oviana. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Hoy Jesosy taminy: Lazaiko aminao marina tokoa fa anio alina, raha tsy mbola misy akoho maneno, dia handa Ahy intelo ianao. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Hoy i Petera taminy: Na dia hiara-maty aminao aza aho dia tsy mba handa Anao mihitsy. Ary toy izany koa no nolazain’ny mpianatra rehetra.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny vavaka nataon’i Jesosy tao Getsemane
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mar 14.32-42; Lio 22.40-46
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Ary Jesosy mbamin’ny mpianany dia tonga tao amin’ny saha iray antsoina hoe Getsemane, ary hoy Izy tamin’ny mpianany: Mipetraha eto aloha ianareo, raha mbola mankeroa hivavaka Aho. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Dia nitondra an’i Petera mbamin’izy roa lahy zanak’i Zebedio Izy, sady nalahelo am-po sy ory indrindra. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Hoy Izy tamin’izy roa lahy: Fadiranovana loatra toy ny efa ho faty ny fanahiko; mitoera eto ka miaraha miari-tory Amiko. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Ary nony nandroso kelikely Izy dia niankohoka ka nivavaka hoe: Raiko ô, raha azo atao dia aoka hesorina Amiko ity kapoaka ity; nefa aoka tsy ny sitrapoko no hatao fa ny Anao. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Nankeo amin’ny mpianatra Izy avy eo ka nahita azy ireo matory; dia hoy Izy tamin’i Petera: Hay tsy mahazaka ny miara-miari-tory Amiko na dia ora iray ihany aza ianareo! '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Miareta tory sy mivavaha ianareo mba tsy hidiranareo amin’ny fakam-panahy; mety ihany ny fanahy fa ny nofo no tsy manan-kery. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Dia nihataka fanindroany Izy ka nivavaka hoe: Raiko ô, raha tsy azo esorina ity, fa tsy maintsy hosotroiko, dia aoka ny sitraponao no hatao. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Ary nony niverina indray Izy dia nahita azy ireo matory; fa efa nilondolondo ny masony. '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Dia nandao azy ireo Izy ka lasa indray nivavaka fanintelony, ary ilay teniny teo ihany no naveriny. '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Niverina teo amin’ny mpianatra indray Izy avy eo sady niteny hoe: Matoria ary ianareo ankehitriny ka mialà sasatra, indro, efa akaiky ny ora, ary ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Zanak’Olona
  - type: text
    text: ' dia hatolotra eo an-tanan’ny mpanota. '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: Mitsangàna, andeha isika, indro, efa manakaiky ilay manolotra Ahy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nisamborana an’i Jesosy
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mar 14.43-50; Lio 22.47-53; Jao 18.2-11
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Ary raha mbola niteny Jesosy dia indro, avy i Jodasy izay iray amin’ny roa amby folo lahy, miaraka amin’ny vahoaka betsaka, nitondra sabatra sy langilangy, nirahin’ireo lehiben’ny mpisorona sy ny loholona. '
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Ary ilay nanolotra Azy nanome famantarana ny olona ka niteny hoe: Izay horohako no Izy ka sambory. '
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'Ary niaraka tamin’izay dia nanatona an’i Jesosy izy ka niteny hoe: Finaritra, Raby! Dia norohany izy. '
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Fa hoy Jesosy taminy: Ry sakaiza, ataovy izay nahatongavanao eto. Dia nanatona ny olona ka nisambotra an’i Jesosy ary nitana Azy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'Ary indro, ny iray tamin’ireo izay niaraka tamin’i Jesosy dia nanatsotra ny tanany, dia nanatsoaka ny sabany ka nikapoka ny mpanompon’ny Mpisoronabe ary nahafaka ny sofiny. '
  - type: usfm
    marker: v
    metadata:
      v: '52'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'Fa hoy Jesosy: Ampidiro amin’ny tranony ny sabatrao; fa izay rehetra mandray sabatra dia ho fatin’ny sabatra. '
  - type: usfm
    marker: v
    metadata:
      v: '53'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'Heverinao va fa tsy azoko atao ny mangataka amin’ny Raiko dia haniraka anjely maherin’ny roa amby folo legiona ho atỳ Amiko Izy eo no eo? '
  - type: usfm
    marker: v
    metadata:
      v: '54'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: Raha izany anefa, hatao ahoana no hahatanteraka ny Soratra Masina izay milaza fa tsy maintsy ho tonga izao?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '55'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: 'Ary tamin’izany ora izany dia niteny tamin’ny vahoaka Jesosy hoe: Tonga mitondra sabatra sy langilangy hisambotra Ahy toy ny hisambotra jiolahy va ianareo? Isanandro dia nipetraka nampianatra tao amin’ny tempoly Aho nefa tsy nisambotra Ahy ianareo. '
  - type: usfm
    marker: v
    metadata:
      v: '56'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: Nefa moa izany rehetra izany dia tonga mba hahatanteraka izay voasoratry ny mpaminany.
- type: usfm
  marker: p
  children:
  - type: text
    text: Tamin’izany tokoa dia nandao Azy ny mpianatra rehetra ka nandositra.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nitsaran’ny Sinedriona an’i Jesosy
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mar 14.53-65; Lio 22.54-55, 63-71; Jao 18.12-24
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '57'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: 'Ary ireo izay nisambotra an’i Jesosy dia nitondra Azy ho any amin’i Kaiafa '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpisoronabe
  - type: text
    text: ', tao amin’izay nivorian’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpanoradalàna
  - type: text
    text: ' sy ny loholona. '
  - type: usfm
    marker: v
    metadata:
      v: '58'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: Ary i Petera dia nanaraka Azy teny lavidavitra teny hatrany amin’ny lapan’ny Mpisoronabe; dia niditra izy ka niara-nipetraka tamin’ireo mpiandry raharaha mba hahita izay ho farany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '59'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '59'
  - type: text
    text: 'Ary ireo lehiben’ny mpisorona mbamin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Sinedriona
  - type: text
    text: ' rehetra dia nitady teny hoentiny miampanga lainga an’i Jesosy mba hamonoany Azy; '
  - type: usfm
    marker: v
    metadata:
      v: '60'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '60'
  - type: text
    text: 'nefa tsy nahita izy ireo, na dia maro aza ny vavolombelona mandainga tonga teo. Ary nony farany dia nisy roa lahy tonga teo, izay niteny hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '61'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '61'
  - type: text
    text: 'Ilehity dia nilaza hoe: Mahay mandrava ny tempolin’Andriamanitra Aho sy manangana azy ao anatin’ny hateloana. '
  - type: usfm
    marker: v
    metadata:
      v: '62'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '62'
  - type: text
    text: 'Dia nitsangana ny Mpisoronabe ka niteny tamin’i Jesosy hoe: Tsy manana havaly va Ianao? Inona no iampangan’ireo Anao? '
  - type: usfm
    marker: v
    metadata:
      v: '63'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '63'
  - type: text
    text: 'Nefa nangina Jesosy. Dia hoy ny Mpisoronabe Taminy: Ampianianiko amin’Andriamanitra velona Ianao hilaza aminay, raha Ianao no '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ', Zanak’Andriamanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '64'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '64'
  - type: text
    text: 'Hoy Jesosy taminy: Voalazanao; nefa, lazaiko aminareo fa hatramin’izao dia ho hitanareo ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Zanak’Olona
  - type: text
    text: ' mipetraka eo ankavanan’ny Hery ary tonga eny amin’ny rahon’ny lanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '65'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '65'
  - type: text
    text: 'Tamin’izay ny Mpisoronabe dia nandriatra ny fitafiany ka niteny hoe: Efa niteny ratsy Izy; inona no mbola ilàntsika vavolombelona indray? Indro, efa renareo izao fitenenan-dratsy izao. '
  - type: usfm
    marker: v
    metadata:
      v: '66'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '66'
  - type: text
    text: 'Ahoana ny hevitrareo? Ary namaly izy ireo hoe: Mendrika hohelohina ho faty Izy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '67'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '67'
  - type: text
    text: 'Dia nandrora ny tavany sy nanisy totohondry Azy izy ireo, ary ny sasany dia namely tehamaina '
  - type: usfm
    marker: v
    metadata:
      v: '68'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '68'
  - type: text
    text: 'sady niteny hoe: Maminania aminay, ry Kristy, iza no namely Anao teo?'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nandavan’i Petera an’i Jesosy
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mar 14.66-72; Lio 22.56-62; Jao 18.17, 25-27
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '69'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '69'
  - type: text
    text: 'Ary i Petera dia nipetraka teo ivelany, teo an-kianja; nanatona azy ny ankizivavy iray ka niteny hoe: Ianao koa dia niaraka tamin’i Jesosy, ilay Galiliana. '
  - type: usfm
    marker: v
    metadata:
      v: '70'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '70'
  - type: text
    text: 'Fa nandà teo anatrehan’izy rehetra izy ka niteny hoe: Tsy fantatro izay lazainao. '
  - type: usfm
    marker: v
    metadata:
      v: '71'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '71'
  - type: text
    text: 'Ary nony niala ho eo am-bavahady izy dia nahita azy koa ny ankizivavy iray hafa ka nilaza tamin’izay teo hoe: Ity koa niaraka tamin’ilay Jesosy avy any Nazareta. '
  - type: usfm
    marker: v
    metadata:
      v: '72'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '72'
  - type: text
    text: 'Dia nandà indray tamin’ny fianianana izy hoe: Tsy fantatro izany Lehilahy izany. '
  - type: usfm
    marker: v
    metadata:
      v: '73'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '73'
  - type: text
    text: 'Nony afaka kelikely, nanatona ireo izay nijanona teo ka nilaza tamin’i Petera hoe: Marina tokoa fa naman’ireny ianao; fa ny fiteninao no miampanga anao. '
  - type: usfm
    marker: v
    metadata:
      v: '74'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '74'
  - type: text
    text: 'Dia nanomboka niozona sy nianiana izy hoe: Tsy fantatro izany Lehilahy izany; ary niaraka tamin’izay dia nisy akoho naneno.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '75'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '75'
  - type: text
    text: 'Ary nahatsiaro ny tenin’i Jesosy i Petera, dia ilay nolazainy hoe: Raha tsy mbola misy akoho maneno dia handa Ahy intelo ianao. Ary lasa nandeha tany ivelany izy dia nigogogogo nitomany.'
