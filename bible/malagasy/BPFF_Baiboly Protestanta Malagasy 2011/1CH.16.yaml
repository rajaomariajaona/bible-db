document_id: 1CH.16,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Nampiditra ny vata misy ny faneken’Andriamanitra ny olona ka nametraka azy tao afovoan’ny tranolay izay naorin’i Davida ho azy; avy eo dia nanolotra fanatitra dorana manontolo sy fanati-pihavanana teo anatrehan’Andriamanitra izy. '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Ataovy ho reharehanareo ny anarany masina!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka hifaly ny fon’izay mitady NY TOMPO!
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Mitadiava NY TOMPO sy ny heriny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: katsaho mandrakariva ny tavany!
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Tsarovy ny asa mahagaga izay nataony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ny fahagagana nataony sy ny fitsaran’ny vavany,
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ianareo taranak’Israely mpanompony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ianareo olom-boafidiny, taranak’i Jakoba!
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: NY TOMPO, Izy no Andriamanitsika;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: manerana ny tany rehetra ny fitsarany.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Tsarovy mandrakizay ny fanekeny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ilay teny nomeny ho an’ny taranaka arivo mandimby,
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: eny, ilay nataony tamin’i Abrahama
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny fianianany tamin’Isaka;
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: izay naoriny ho lalàna ho an’i Jakoba
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ho fanekena mandrakizay ho an’Israely
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'ka nilazany hoe: Homeko anao ny tany Kanana'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho lovanareo voarefy tsara.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Tamin’izay dia mbola olom-bitsy ianareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, vitsy sady vahiny tao;
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Nony voatolotr’i Davida ny fanatitra dorana manontolo sy ny fanati-pihavanana dia nitsodrano ny olona tamin’ny anaran’NY TOMPO izy. '
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: nifindrafindra tany amin’ny firenena
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy nifindrafindra fanjakana tany amin’ny firenen-kafa;
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: tsy nisy navelany hampahory azy anefa,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'fa nananatra mpanjaka noho ny amin’ireo Izy hoe:'
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Aza mikasika ireo Voahosotro,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary aza manisy ratsy ireo mpaminaniko!
  - type: usfm
    marker: r
    children:
    - type: text
      text: Sal 96
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Mihirà ho an’NY TOMPO, ry tany rehetra!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lazao isanandro isanandro ny vaovao mahafalin’ny famonjeny!
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Ambarao any amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jentilisa
    - type: text
      text: ' ny voninahiny,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary any amin’ny firenena rehetra ny fahagagana ataony!
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Fa lehibe NY TOMPO ka mendrika hoderaina indrindra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady mahatahotra, fa ambonin’ny andriamanitra rehetra.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Ny andriamanitry ny firenena rehetra dia tsinontsinona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa NY TOMPO no nanao ny lanitra.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Famirapiratana sy voninahitra no eo anatrehany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hery sy hafaliana no ao amin’ny fitoerany.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Ry firenena, manomeza an’NY TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, omeo voninahitra sy hery NY TOMPO!
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Omeo NY TOMPO ny voninahitry ny anarany!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manolora fanatitra ka mankanesa eo anatrehany!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miankohofa eo anatrehan’NY TOMPO amin’ny fihaingoana masina!
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Dia nizara mofo iray avy sy hena iray didy ary mofo voaloboka ho an’ny Israely rehetra, na lahy na vavy, izy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny hira nataon’ny levita ho fiderana NY TOMPO
    marker-yv: yv-h
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Mangovita eo anatrehany, ry tany rehetra!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izao rehetra izao dia voaorina ka tsy hihetsika.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Aoka ho faly ny lanitra ary ho ravo ny tany!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Aoka holazaina any amin’ny firenena hoe: NY TOMPO no Mpanjaka!'
  '32':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Aoka hirohondrohona ny ranomasina sy izay rehetra ao aminy!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka ho faly ny saha sy izay rehetra ao aminy!
  '33':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Dia hihoby eo anatrehan’NY TOMPO amin’izay koa ny hazo any an’ala!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa avy hitsara ny tany Izy.
  - type: usfm
    marker: r
    children:
    - type: text
      text: Sal 106.1, 47-48
    marker-yv: yv-h
  '34':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: Miderà NY TOMPO fa tsara Izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa mandrakizay ny famindrampony!
  '35':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Ary mitenena hoe: Vonjeo izahay, ry Andriamanitry ny famonjena anay ô,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: angony izahay ka afaho amin’ny Jentilisa,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hisaoranay ny anaranao masina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka ho reharehanay ny fiderana Anao!
  '36':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: Isaorana anie NY TOMPO, Andriamanitry ny Israely,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hatramin’ny taloha indrindra ka ho mandrakizay.
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Ary ny olona rehetra dia niteny hoe: Amena! Sady nidera NY TOMPO.'
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'I Asafa sy ny rahalahiny dia navelan’i Davida teo anoloan’ny vata misy ny faneken’NY TOMPO hanao fanompoam-pivavahana ao mandrakariva araka ny raharaha tokony hatao isanandro. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'I Obeda-Edoma, zanak’i Jedotona sy ny rahalahiny valo amby enimpolo ary i Hosa kosa dia ho mpiandry varavarana. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'I Zadoka mpisorona sy ny mpisorona rahalahiny dia navelany ho eo anoloan’ny tabernakelin’NY TOMPO teo amin’ny toerana fanaovana sorona any Gibeona. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Notendren’i Davida ho mpanao fanompoam-pivavahana eo anatrehan’ny vata misy ny faneken’NY TOMPO ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: levita
    - type: text
      text: ' sasany mba hankalaza sy hisaotra ary hidera NY TOMPO, Andriamanitry ny Israely: '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'Izy ireo dia hanolotra fanatitra dorana manontolo ho an’NY TOMPO marain-tsy hariva eo amin’ny alitara fandoroana ny fanatitra mandrakariva, dorana manontolo, ary hanatanteraka izay rehetra voasoratra ao amin’ny lalànan’NY TOMPO, izay nomeny ny Israely. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'Naman’ireo koa i Hemana sy i Jedotona ary ny sisa amin’ny olona voafidy izay voatonona anarana hidera NY TOMPO, fa mandrakizay ny famindrampony! '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: Tao amin’i Hemana sy i Jedotona dia nisy trompetra sy kipantsona natao hampanenoina; tao koa ireo karazavan-javamaneno hanaraka ny hira ho an’Andriamanitra. Ny zanak’i Jedotona no mpiandry varavarana.
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: Dia samy nody tany an-tranony avy ny olona rehetra ary lasa nody koa i Davida mba hitsodrano ny ankohonany.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'I Asafa no lehibeny, i Zakaria no nanarakaraka. I Jeiela, i Semiramota, i Jehiela, i Matitia, i Eliaba, i Benaia, i Obeda-Edoma ary i Jeiela no nitendry ny valiha sy ny lokanga; fa i Asafa no nampaneno ny kipantsona. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'I Benaia sy i Jahaziela mpisorona kosa no mpitsoka mandrakariva ny trompetra eo anoloan’ny vata misy ny faneken’Andriamanitra. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Tamin’izay andro izay no voalohan’ny nanendren’i Davida an’i Asafa sy ny rahalahiny hidera NY TOMPO.
  - type: usfm
    marker: r
    children:
    - type: text
      text: Sal 105.1-15
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Miderà NY TOMPO, miantsoa ny anarany!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ampahafantaro ny firenena ny asany!
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Mihirà ho Azy, mankalazà Azy!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Saintsaino ny fahagagana rehetra ataony!
