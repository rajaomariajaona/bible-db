document_id: 1CH.16,3103
type_code: plt
verses:
  '1':
  - type: text
    content: 'Nampiditra ny vata misy ny faneken’Andriamanitra ny olona ka nametraka azy tao afovoan’ny tranolay izay naorin’i Davida ho azy; avy eo dia nanolotra fanatitra dorana manontolo sy fanati-pihavanana teo anatrehan’Andriamanitra izy. '
  '10':
  - type: text
    content: Ataovy ho reharehanareo ny anarany masina!
  - type: text
    content: Aoka hifaly ny fon’izay mitady NY TOMPO!
  '11':
  - type: text
    content: Mitadiava NY TOMPO sy ny heriny,
  - type: text
    content: katsaho mandrakariva ny tavany!
  '12':
  - type: text
    content: Tsarovy ny asa mahagaga izay nataony,
  - type: text
    content: dia ny fahagagana nataony sy ny fitsaran’ny vavany,
  '13':
  - type: text
    content: ianareo taranak’Israely mpanompony,
  - type: text
    content: ianareo olom-boafidiny, taranak’i Jakoba!
  '14':
  - type: text
    content: NY TOMPO, Izy no Andriamanitsika;
  - type: text
    content: manerana ny tany rehetra ny fitsarany.
  '15':
  - type: text
    content: Tsarovy mandrakizay ny fanekeny,
  - type: text
    content: dia ilay teny nomeny ho an’ny taranaka arivo mandimby,
  '16':
  - type: text
    content: eny, ilay nataony tamin’i Abrahama
  - type: text
    content: sy ny fianianany tamin’Isaka;
  '17':
  - type: text
    content: izay naoriny ho lalàna ho an’i Jakoba
  - type: text
    content: sy ho fanekena mandrakizay ho an’Israely
  '18':
  - type: text
    content: 'ka nilazany hoe: Homeko anao ny tany Kanana'
  - type: text
    content: ho lovanareo voarefy tsara.
  '19':
  - type: text
    content: Tamin’izay dia mbola olom-bitsy ianareo,
  - type: text
    content: eny, vitsy sady vahiny tao;
  '2':
  - type: text
    content: 'Nony voatolotr’i Davida ny fanatitra dorana manontolo sy ny fanati-pihavanana dia nitsodrano ny olona tamin’ny anaran’NY TOMPO izy. '
  '20':
  - type: text
    content: nifindrafindra tany amin’ny firenena
  - type: text
    content: sy nifindrafindra fanjakana tany amin’ny firenen-kafa;
  '21':
  - type: text
    content: tsy nisy navelany hampahory azy anefa,
  - type: text
    content: 'fa nananatra mpanjaka noho ny amin’ireo Izy hoe:'
  '22':
  - type: text
    content: Aza mikasika ireo Voahosotro,
  - type: text
    content: ary aza manisy ratsy ireo mpaminaniko!
  - type: heading
    content: Sal 96
  '23':
  - type: text
    content: Mihirà ho an’NY TOMPO, ry tany rehetra!
  - type: text
    content: Lazao isanandro isanandro ny vaovao mahafalin’ny famonjeny!
  '24':
  - type: text
    content: 'Ambarao any amin’ny '
  - type: text
    content: Jentilisa
  - type: text
    content: ' ny voninahiny,'
  - type: text
    content: ary any amin’ny firenena rehetra ny fahagagana ataony!
  '25':
  - type: text
    content: Fa lehibe NY TOMPO ka mendrika hoderaina indrindra,
  - type: text
    content: sady mahatahotra, fa ambonin’ny andriamanitra rehetra.
  '26':
  - type: text
    content: Ny andriamanitry ny firenena rehetra dia tsinontsinona,
  - type: text
    content: fa NY TOMPO no nanao ny lanitra.
  '27':
  - type: text
    content: Famirapiratana sy voninahitra no eo anatrehany,
  - type: text
    content: hery sy hafaliana no ao amin’ny fitoerany.
  '28':
  - type: text
    content: Ry firenena, manomeza an’NY TOMPO,
  - type: text
    content: eny, omeo voninahitra sy hery NY TOMPO!
  '29':
  - type: text
    content: Omeo NY TOMPO ny voninahitry ny anarany!
  - type: text
    content: Manolora fanatitra ka mankanesa eo anatrehany!
  - type: text
    content: Miankohofa eo anatrehan’NY TOMPO amin’ny fihaingoana masina!
  '3':
  - type: text
    content: Dia nizara mofo iray avy sy hena iray didy ary mofo voaloboka ho an’ny Israely rehetra, na lahy na vavy, izy.
  - type: heading
    content: Ny hira nataon’ny levita ho fiderana NY TOMPO
  '30':
  - type: text
    content: Mangovita eo anatrehany, ry tany rehetra!
  - type: text
    content: Izao rehetra izao dia voaorina ka tsy hihetsika.
  '31':
  - type: text
    content: Aoka ho faly ny lanitra ary ho ravo ny tany!
  - type: text
    content: 'Aoka holazaina any amin’ny firenena hoe: NY TOMPO no Mpanjaka!'
  '32':
  - type: text
    content: Aoka hirohondrohona ny ranomasina sy izay rehetra ao aminy!
  - type: text
    content: Aoka ho faly ny saha sy izay rehetra ao aminy!
  '33':
  - type: text
    content: Dia hihoby eo anatrehan’NY TOMPO amin’izay koa ny hazo any an’ala!
  - type: text
    content: Fa avy hitsara ny tany Izy.
  - type: heading
    content: Sal 106.1, 47-48
  '34':
  - type: text
    content: Miderà NY TOMPO fa tsara Izy,
  - type: text
    content: fa mandrakizay ny famindrampony!
  '35':
  - type: text
    content: 'Ary mitenena hoe: Vonjeo izahay, ry Andriamanitry ny famonjena anay ô,'
  - type: text
    content: angony izahay ka afaho amin’ny Jentilisa,
  - type: text
    content: mba hisaoranay ny anaranao masina
  - type: text
    content: ka ho reharehanay ny fiderana Anao!
  '36':
  - type: text
    content: Isaorana anie NY TOMPO, Andriamanitry ny Israely,
  - type: text
    content: hatramin’ny taloha indrindra ka ho mandrakizay.
  - type: text
    content: 'Ary ny olona rehetra dia niteny hoe: Amena! Sady nidera NY TOMPO.'
  '37':
  - type: text
    content: 'I Asafa sy ny rahalahiny dia navelan’i Davida teo anoloan’ny vata misy ny faneken’NY TOMPO hanao fanompoam-pivavahana ao mandrakariva araka ny raharaha tokony hatao isanandro. '
  '38':
  - type: text
    content: 'I Obeda-Edoma, zanak’i Jedotona sy ny rahalahiny valo amby enimpolo ary i Hosa kosa dia ho mpiandry varavarana. '
  '39':
  - type: text
    content: 'I Zadoka mpisorona sy ny mpisorona rahalahiny dia navelany ho eo anoloan’ny tabernakelin’NY TOMPO teo amin’ny toerana fanaovana sorona any Gibeona. '
  '4':
  - type: text
    content: 'Notendren’i Davida ho mpanao fanompoam-pivavahana eo anatrehan’ny vata misy ny faneken’NY TOMPO ny '
  - type: text
    content: levita
  - type: text
    content: ' sasany mba hankalaza sy hisaotra ary hidera NY TOMPO, Andriamanitry ny Israely: '
  '40':
  - type: text
    content: 'Izy ireo dia hanolotra fanatitra dorana manontolo ho an’NY TOMPO marain-tsy hariva eo amin’ny alitara fandoroana ny fanatitra mandrakariva, dorana manontolo, ary hanatanteraka izay rehetra voasoratra ao amin’ny lalànan’NY TOMPO, izay nomeny ny Israely. '
  '41':
  - type: text
    content: 'Naman’ireo koa i Hemana sy i Jedotona ary ny sisa amin’ny olona voafidy izay voatonona anarana hidera NY TOMPO, fa mandrakizay ny famindrampony! '
  '42':
  - type: text
    content: Tao amin’i Hemana sy i Jedotona dia nisy trompetra sy kipantsona natao hampanenoina; tao koa ireo karazavan-javamaneno hanaraka ny hira ho an’Andriamanitra. Ny zanak’i Jedotona no mpiandry varavarana.
  '43':
  - type: text
    content: Dia samy nody tany an-tranony avy ny olona rehetra ary lasa nody koa i Davida mba hitsodrano ny ankohonany.
  '5':
  - type: text
    content: 'I Asafa no lehibeny, i Zakaria no nanarakaraka. I Jeiela, i Semiramota, i Jehiela, i Matitia, i Eliaba, i Benaia, i Obeda-Edoma ary i Jeiela no nitendry ny valiha sy ny lokanga; fa i Asafa no nampaneno ny kipantsona. '
  '6':
  - type: text
    content: 'I Benaia sy i Jahaziela mpisorona kosa no mpitsoka mandrakariva ny trompetra eo anoloan’ny vata misy ny faneken’Andriamanitra. '
  '7':
  - type: text
    content: Tamin’izay andro izay no voalohan’ny nanendren’i Davida an’i Asafa sy ny rahalahiny hidera NY TOMPO.
  - type: heading
    content: Sal 105.1-15
  '8':
  - type: text
    content: Miderà NY TOMPO, miantsoa ny anarany!
  - type: text
    content: Ampahafantaro ny firenena ny asany!
  '9':
  - type: text
    content: Mihirà ho Azy, mankalazà Azy!
  - type: text
    content: Saintsaino ny fahagagana rehetra ataony!
