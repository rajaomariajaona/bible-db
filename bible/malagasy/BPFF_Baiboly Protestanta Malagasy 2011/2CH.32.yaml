document_id: 2CH.32
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nanafihan’i Sankeriba ny fanjakan’ny Joda
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Taorianan’izany raharaha natao tamim-pahamarinana izany dia avy i Sankeriba, mpanjakan’i Asiria, niditra tany Joda ary nanao fahirano ny tanàna mimanda ka nikendry hahazo azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Nony hitan’i Hezekia fa tonga i Sankeriba ka nikasa hamely an’i Jerosalema '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'dia niara-nihevitra tamin’ny mpanapaka sy ny lehilahy mahery izy mba hanampina ny rano tamin’ny loharano eny ivelan’ny tanàna; ary nanampy azy ry zareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dia nivory ny olona maro ka nanampina ny loharano rehetra sy ilay renirano mamakivaky eo afovoan’ny tany, fa hoy izy: Nahoana no avela hahita rano betsaka ny mpanjakan’i Asiria raha avy? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Nahazo hery i Hezekia ka namboarina avokoa izay rava tamin’ny manda sady nasiany tilikambo teny amboniny, nasiany manda hafa koa teo ivelany; nanamboatra an’i Milo tao an-Tanànan’i Davida koa izy sady nanao lefona sy ampinga betsaka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Nanendry mpifehy miaramila hifehy ny olona izy ka nampiangona azy hankeo aminy teo an-kalalahana akaikin’ny vavahadin’ny tanàna, dia nanao teny fampirisihana taminy hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Mahereza ka matanjaha; aza matahotra na mivadi-po noho ny mpanjakan’i Asiria sy ny hamaroan’ny olona rehetra izay entiny; fa ny momba antsika dia be noho ny momba azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Sandry nofo no momba azy, fa NY TOMPO Andriamanitsika kosa no momba antsika hamonjy antsika ka hiady ny adintsika. Dia niankina tamin’ny tenin’i Hezekia, mpanjakan’ny Joda, ny olona.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mandrahona an’i Jerosalema i Sankeriba
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 2Mpa 18.17-37; Isa 36.2-22
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Rehefa afaka izany dia nirahin’i Sankeriba, mpanjakan’i Asiria, ny mpanompony hankany Jerosalema ho any amin’i Hezekia, mpanjakan’i Joda, sy ho any amin’i Joda rehetra izay tany Jerosalema, fa izy sy ny miaramilany rehetra kosa tamin’izay dia nanao fahirano an’i Lakisy, koa hoy izy: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Izao no lazain’i Sankeriba, mpanjakan’i Asiria: Inona izato itokianareo, no dia miaritra fahoriana ato Jerosalema ianareo? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Tsy i Hezekia ihany va no mampirisika anareo hanolo-tena ho faty mosary sy hetaheta ka milaza hoe: NY TOMPO Andriamanitsika hamonjy antsika amin’ny tanan’ny mpanjakan’i Asiria? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Tsy io Hezekia io ihany koa va no nandrava ny toerana fanaovana sorona ny sy ny alitarany ary nanome didy ny Joda sy Jerosalema hoe: Eo anoloan’ny alitara iray no hiankohofanareo sy handoroanareo ditin-kazo manitra? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Tsy fantatrareo va izay nataoko, dia izaho sy ny razako, tamin’ny firenena rehetra tany amin’ny tany hafa? Moa ireny andriamanitry ny firenena tany amin’ny tany hafa ireny va nisy nahavonjy ny taniny akory tamin’ny tanako? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Iza amin’ny andriamanitr’ireo firenena efa natolotra ho zavatra voaozon’ny razako ireo no nahavonjy ny olony tamin’ny tanako? Koa hahavonjy anareo amin’ny tanako va ny Andriamanitrareo? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Koa ankehitriny, aza avela hamitaka anareo i Hezekia, na hitaona anareo tahaka izao; aza mino azy ianareo; fa tsy nisy andriamanitra tany amin’ny firenena sy ny fanjakana rehetra izay nahavonjy ny olony tamin’ny tanako sy ny tanan’ny razako; koa aiza ny Andriamanitrareo no hahavonjy anareo amin’ny tanako?
- type: usfm
  marker: s1
  children:
  - type: text
    text: Miteny ratsy NY TOMPO i Sankeriba
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 2Mpa 19.8-13; Isa 37.8-13
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Mbola niteny ratsy NY TOMPO Andriamanitra sy i Hezekia mpanompony ny mpanompon’i Sankeriba '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'sady nanoratra taratasy hihantsy NY TOMPO, Andriamanitry ny Israely sy hiteny ratsy Azy ka niteny hoe: Tahaka ny tsy nahavonjen’ireny andriamanitry ny firenena tany amin’ny tany hafa ny olony tamin’ny tanako no tsy hahavonjen’ny Andriamanitr’i Hezekia ny olony koa amin’ny tanako. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Dia niantso tamin’ny feo mahery izy ka niteny hebreo teo anatrehan’ny mponina tany Jerosalema izay teny ambonin’ny manda hampitahorany sy hampangorohoroany azy mba hahazoany ny tanàna. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ary ny filazany ny Andriamanitr’i Jerosalema dia toy ny filazany ireny andriamanitry ny firenena tany amin’ny tany hafa, izay asan’ny tanan’olona ihany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mamonjy an’i Jerosalema Andriamanitra
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 2Mpa 19.35-37; Isa 37.36-38
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Noho izany fitrangan-javatra izany dia nivavaka i Hezekia mpanjaka sy Isaia mpaminany, zanak’i Amoza, ka nitaraina tamin’ny lanitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary NY TOMPO naniraka anjely izay nandringana ny lehilahy mahery rehetra sy ny mpanapaka ary ny mpitarika teo an-tobin’ny mpanjakan’i Asiria ka lasa nody tamin-kenatra i Sankeriba. Nony niditra tao an-tranon’ny andriamaniny izy dia novonoin’ny zanany naterany tao tamin’ny sabatra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Toy izany no namonjen’NY TOMPO an’i Hezekia sy ny mponina tany Jerosalema tamin’ny tanan’i Sankeriba, mpanjakan’i Asiria, sy tamin’ny tanan’ny fahavalony rehetra; eny, niaro azy tamin’ny manodidina rehetra Izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ary maro no nitondra fanatitra ho an’NY TOMPO tany Jerosalema ary nanome zava-tsoa ho an’i Hezekia, mpanjakan’ny Joda; dia nalaza teo imason’ny firenena rehetra izy hatramin’izay.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nifaranan’ny fanjakan’i Hezekia
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Indray andro dia narary efa saika maty i Hezekia, koa nivavaka tamin’NY TOMPO izy, ary niteny taminy NY TOMPO ka nanome azy famantarana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Kanefa tsy mba namaly araka izay soa efa natao taminy i Hezekia; fa niavonavona ny fony dia niharan’ny fahatezerana izy mbamin’ny Joda sy Jerosalema. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Kanefa nanetry tena noho ilay efa niavonavonan’ny fony i Hezekia, dia izy sy ny mponina tany Jerosalema ka tsy niharan’ny fahatezeran’NY TOMPO izy ireo fony fahavelon’i Hezekia.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ary nanana harena sy voninahitra be indrindra i Hezekia; dia nanao trano fitahirizana izy hitahirizany ny volafotsy, ny volamena, ny vatosoa, ny zavamanitra, ny ampinga mbamin’izay fanaka tsara rehetra, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'ary nanao tanàna fitahirizana ny vokatra koa, dia ny vary sy ny ranom-boaloboka ary ny diloilo, ary nanamboatra trano miefitrefitra hitoeran’ny biby fiompy samihafa karazana ary vala hitoeran’ny ondry aman’osy koa izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Nanorina tanàna maro koa izy sady nanana ondry aman’osy ary omby betsaka, satria nomen’Andriamanitra fananana be indrindra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Ary notampenan’io Hezekia io ny fivoahan’ny rano ambony any Gihona ka nampandehaniny tany ambanin’ny tany hidina mahitsy ho any andrefan’ny Tanànan’i Davida ilay rano. Ary nambinina tamin’ny asany rehetra i Hezekia.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Nefa noho ny amin’ny irak’ireo mpanapaka tany Babilona, izay nandefa iraka tany aminy mba hanontany ny amin’ny zava-mahagaga nitranga teo amin’ny tany, dia nilaozan’Andriamanitra izy, mba hizahany toetra azy mba hahalalany izay rehetra tao am-pony.
- type: usfm
  marker: r
  children:
  - type: text
    text: 2Mpa 20.20-21
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Ary ny tantaran’i Hezekia sisa mbamin’ny soa nataony, indro, efa voasoratra ao amin’ny fahitan’Isaia mpaminany, zanak’i Amoza, sy ao amin’ny bokin’ny mpanjakan’ny Joda sy ny Israely izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Ary nodimandry any amin’ny razany i Hezekia, dia nalevina tao amin’ny fiakarana ho any amin’ny fasan’ny zanak’i Davida; ary ny Joda rehetra sy ny mponina rehetra tany Jerosalema dia nanome voninahitra azy tamin’ny nahafatesany. Ary i Manase zanany no nanjaka nandimby azy.
