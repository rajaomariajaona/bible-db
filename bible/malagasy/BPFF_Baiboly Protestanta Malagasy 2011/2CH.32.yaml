document_id: 2CH.32,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nanafihan’i Sankeriba ny fanjakan’ny Joda
  - type: text
    content: 'Taorianan’izany raharaha natao tamim-pahamarinana izany dia avy i Sankeriba, mpanjakan’i Asiria, niditra tany Joda ary nanao fahirano ny tanàna mimanda ka nikendry hahazo azy. '
  '10':
  - type: text
    content: 'Izao no lazain’i Sankeriba, mpanjakan’i Asiria: Inona izato itokianareo, no dia miaritra fahoriana ato Jerosalema ianareo? '
  '11':
  - type: text
    content: 'Tsy i Hezekia ihany va no mampirisika anareo hanolo-tena ho faty mosary sy hetaheta ka milaza hoe: NY TOMPO Andriamanitsika hamonjy antsika amin’ny tanan’ny mpanjakan’i Asiria? '
  '12':
  - type: text
    content: 'Tsy io Hezekia io ihany koa va no nandrava ny toerana fanaovana sorona ny sy ny alitarany ary nanome didy ny Joda sy Jerosalema hoe: Eo anoloan’ny alitara iray no hiankohofanareo sy handoroanareo ditin-kazo manitra? '
  '13':
  - type: text
    content: 'Tsy fantatrareo va izay nataoko, dia izaho sy ny razako, tamin’ny firenena rehetra tany amin’ny tany hafa? Moa ireny andriamanitry ny firenena tany amin’ny tany hafa ireny va nisy nahavonjy ny taniny akory tamin’ny tanako? '
  '14':
  - type: text
    content: 'Iza amin’ny andriamanitr’ireo firenena efa natolotra ho zavatra voaozon’ny razako ireo no nahavonjy ny olony tamin’ny tanako? Koa hahavonjy anareo amin’ny tanako va ny Andriamanitrareo? '
  '15':
  - type: text
    content: Koa ankehitriny, aza avela hamitaka anareo i Hezekia, na hitaona anareo tahaka izao; aza mino azy ianareo; fa tsy nisy andriamanitra tany amin’ny firenena sy ny fanjakana rehetra izay nahavonjy ny olony tamin’ny tanako sy ny tanan’ny razako; koa aiza ny Andriamanitrareo no hahavonjy anareo amin’ny tanako?
  - type: heading
    content: Miteny ratsy NY TOMPO i Sankeriba
  - type: heading
    content: 2Mpa 19.8-13; Isa 37.8-13
  '16':
  - type: text
    content: 'Mbola niteny ratsy NY TOMPO Andriamanitra sy i Hezekia mpanompony ny mpanompon’i Sankeriba '
  '17':
  - type: text
    content: 'sady nanoratra taratasy hihantsy NY TOMPO, Andriamanitry ny Israely sy hiteny ratsy Azy ka niteny hoe: Tahaka ny tsy nahavonjen’ireny andriamanitry ny firenena tany amin’ny tany hafa ny olony tamin’ny tanako no tsy hahavonjen’ny Andriamanitr’i Hezekia ny olony koa amin’ny tanako. '
  '18':
  - type: text
    content: 'Dia niantso tamin’ny feo mahery izy ka niteny hebreo teo anatrehan’ny mponina tany Jerosalema izay teny ambonin’ny manda hampitahorany sy hampangorohoroany azy mba hahazoany ny tanàna. '
  '19':
  - type: text
    content: Ary ny filazany ny Andriamanitr’i Jerosalema dia toy ny filazany ireny andriamanitry ny firenena tany amin’ny tany hafa, izay asan’ny tanan’olona ihany.
  - type: heading
    content: Mamonjy an’i Jerosalema Andriamanitra
  - type: heading
    content: 2Mpa 19.35-37; Isa 37.36-38
  '2':
  - type: text
    content: 'Nony hitan’i Hezekia fa tonga i Sankeriba ka nikasa hamely an’i Jerosalema '
  '20':
  - type: text
    content: 'Noho izany fitrangan-javatra izany dia nivavaka i Hezekia mpanjaka sy Isaia mpaminany, zanak’i Amoza, ka nitaraina tamin’ny lanitra. '
  '21':
  - type: text
    content: 'Ary NY TOMPO naniraka anjely izay nandringana ny lehilahy mahery rehetra sy ny mpanapaka ary ny mpitarika teo an-tobin’ny mpanjakan’i Asiria ka lasa nody tamin-kenatra i Sankeriba. Nony niditra tao an-tranon’ny andriamaniny izy dia novonoin’ny zanany naterany tao tamin’ny sabatra. '
  '22':
  - type: text
    content: 'Toy izany no namonjen’NY TOMPO an’i Hezekia sy ny mponina tany Jerosalema tamin’ny tanan’i Sankeriba, mpanjakan’i Asiria, sy tamin’ny tanan’ny fahavalony rehetra; eny, niaro azy tamin’ny manodidina rehetra Izy. '
  '23':
  - type: text
    content: Ary maro no nitondra fanatitra ho an’NY TOMPO tany Jerosalema ary nanome zava-tsoa ho an’i Hezekia, mpanjakan’ny Joda; dia nalaza teo imason’ny firenena rehetra izy hatramin’izay.
  - type: heading
    content: Ny nifaranan’ny fanjakan’i Hezekia
  '24':
  - type: text
    content: 'Indray andro dia narary efa saika maty i Hezekia, koa nivavaka tamin’NY TOMPO izy, ary niteny taminy NY TOMPO ka nanome azy famantarana. '
  '25':
  - type: text
    content: 'Kanefa tsy mba namaly araka izay soa efa natao taminy i Hezekia; fa niavonavona ny fony dia niharan’ny fahatezerana izy mbamin’ny Joda sy Jerosalema. '
  '26':
  - type: text
    content: Kanefa nanetry tena noho ilay efa niavonavonan’ny fony i Hezekia, dia izy sy ny mponina tany Jerosalema ka tsy niharan’ny fahatezeran’NY TOMPO izy ireo fony fahavelon’i Hezekia.
  '27':
  - type: text
    content: 'Ary nanana harena sy voninahitra be indrindra i Hezekia; dia nanao trano fitahirizana izy hitahirizany ny volafotsy, ny volamena, ny vatosoa, ny zavamanitra, ny ampinga mbamin’izay fanaka tsara rehetra, '
  '28':
  - type: text
    content: 'ary nanao tanàna fitahirizana ny vokatra koa, dia ny vary sy ny ranom-boaloboka ary ny diloilo, ary nanamboatra trano miefitrefitra hitoeran’ny biby fiompy samihafa karazana ary vala hitoeran’ny ondry aman’osy koa izy. '
  '29':
  - type: text
    content: 'Nanorina tanàna maro koa izy sady nanana ondry aman’osy ary omby betsaka, satria nomen’Andriamanitra fananana be indrindra. '
  '3':
  - type: text
    content: 'dia niara-nihevitra tamin’ny mpanapaka sy ny lehilahy mahery izy mba hanampina ny rano tamin’ny loharano eny ivelan’ny tanàna; ary nanampy azy ry zareo. '
  '30':
  - type: text
    content: Ary notampenan’io Hezekia io ny fivoahan’ny rano ambony any Gihona ka nampandehaniny tany ambanin’ny tany hidina mahitsy ho any andrefan’ny Tanànan’i Davida ilay rano. Ary nambinina tamin’ny asany rehetra i Hezekia.
  '31':
  - type: text
    content: Nefa noho ny amin’ny irak’ireo mpanapaka tany Babilona, izay nandefa iraka tany aminy mba hanontany ny amin’ny zava-mahagaga nitranga teo amin’ny tany, dia nilaozan’Andriamanitra izy, mba hizahany toetra azy mba hahalalany izay rehetra tao am-pony.
  - type: heading
    content: 2Mpa 20.20-21
  '32':
  - type: text
    content: 'Ary ny tantaran’i Hezekia sisa mbamin’ny soa nataony, indro, efa voasoratra ao amin’ny fahitan’Isaia mpaminany, zanak’i Amoza, sy ao amin’ny bokin’ny mpanjakan’ny Joda sy ny Israely izany. '
  '33':
  - type: text
    content: Ary nodimandry any amin’ny razany i Hezekia, dia nalevina tao amin’ny fiakarana ho any amin’ny fasan’ny zanak’i Davida; ary ny Joda rehetra sy ny mponina rehetra tany Jerosalema dia nanome voninahitra azy tamin’ny nahafatesany. Ary i Manase zanany no nanjaka nandimby azy.
  '4':
  - type: text
    content: 'Dia nivory ny olona maro ka nanampina ny loharano rehetra sy ilay renirano mamakivaky eo afovoan’ny tany, fa hoy izy: Nahoana no avela hahita rano betsaka ny mpanjakan’i Asiria raha avy? '
  '5':
  - type: text
    content: 'Nahazo hery i Hezekia ka namboarina avokoa izay rava tamin’ny manda sady nasiany tilikambo teny amboniny, nasiany manda hafa koa teo ivelany; nanamboatra an’i Milo tao an-Tanànan’i Davida koa izy sady nanao lefona sy ampinga betsaka. '
  '6':
  - type: text
    content: 'Nanendry mpifehy miaramila hifehy ny olona izy ka nampiangona azy hankeo aminy teo an-kalalahana akaikin’ny vavahadin’ny tanàna, dia nanao teny fampirisihana taminy hoe: '
  '7':
  - type: text
    content: 'Mahereza ka matanjaha; aza matahotra na mivadi-po noho ny mpanjakan’i Asiria sy ny hamaroan’ny olona rehetra izay entiny; fa ny momba antsika dia be noho ny momba azy. '
  '8':
  - type: text
    content: Sandry nofo no momba azy, fa NY TOMPO Andriamanitsika kosa no momba antsika hamonjy antsika ka hiady ny adintsika. Dia niankina tamin’ny tenin’i Hezekia, mpanjakan’ny Joda, ny olona.
  - type: heading
    content: Mandrahona an’i Jerosalema i Sankeriba
  - type: heading
    content: 2Mpa 18.17-37; Isa 36.2-22
  '9':
  - type: text
    content: 'Rehefa afaka izany dia nirahin’i Sankeriba, mpanjakan’i Asiria, ny mpanompony hankany Jerosalema ho any amin’i Hezekia, mpanjakan’i Joda, sy ho any amin’i Joda rehetra izay tany Jerosalema, fa izy sy ny miaramilany rehetra kosa tamin’izay dia nanao fahirano an’i Lakisy, koa hoy izy: '
