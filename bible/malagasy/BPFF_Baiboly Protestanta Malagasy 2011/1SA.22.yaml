document_id: 1SA.22,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Nanjary mpitarika andian’olona i Davida
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia niala teo i Davida ka nandositra nankany amin’ny zohin’i Adolama. Nandre izany ny rahalahiny sy ny fianakavian-drainy ka nidina tany aminy. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nanontany ho azy tamin’NY TOMPO i Ahimeleka sady nanome vatsy azy; nomeny azy koa ny sabatr’i Goliata, ilay Filistina. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nandefa iraka ny mpanjaka mba hampiantso an’i Ahimeleka mpisorona, zanak’i Ahitoba, sy ny taranaky ny rainy rehetra, izay mpisorona tao Noba; ary tonga tany amin’ny mpanjaka izy rehetra. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa hoy i Saoly: Mba mihainoa ianao, ry zanak’i Ahitoba. Ary namaly izy hoe: Inty aho, tompoko. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy i Saoly taminy: Nahoana no niray tetika hanohitra ahy ianareo, dia ianao sy ny zanak’i Jese, tamin’ilay nanomezanao azy mofo sy sabatra ary nanontanianao ho azy tamin’Andriamanitra mba hitsanganany hanohitra ahy sy hamandrika ahy tahaka ny amin’izao anio izao? '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy i Ahimeleka tamin’ny mpanjaka: Iza amin’ny mpanomponao rehetra moa no mba mahatoky tahaka an’i Davida izay vinanton’ny mpanjaka sady lehiben’ny mpiambina anao ary omen-kaja ao an-tranonao? '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vao androany va no nanontaniako ho azy tamin’Andriamanitra? Sanatria ahy izany! Aoka tsy hanome tsiny ny mpanompony na ny taranaky ny raiko rehetra ny mpanjaka; satria ny mpanomponao dia tsy nahalala na inona na inona ny amin’izany rehetra izany na dia kely akory aza. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy ny mpanjaka: Hovonoina ho faty ianao, ry Ahimeleka, dia ianao sy ny taranaky ny rainao rehetra. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy ny mpanjaka tamin’ny mpiambina izay teo anilany: Mihodìna ka vonoy ny mpisoron’NY TOMPO, fa ny tanan’ireo koa dia momba an’i Davida, satria fantany ihany fa nandositra izy, nefa tsy nambarany tamiko izany. Fa ny mpanompon’ny mpanjaka dia tsy nety nanatsotra ny tanany hamely ny mpisoron’NY TOMPO. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy ny mpanjaka tamin’i Doega: Mihodìna ianao ka asio ny mpisorona. Ary nihodina i Doega edomita ka namely ny mpisorona, dia nahafaty olona dimy amby valopolo nisalotra '
    - type: usfm
      marker: w
      children:
      - type: text
        text: efoda
    - type: text
      text: ' vita amin’ny lamba rongony izy tamin’io andro io. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nasiany tamin’ny lelan-tsabatra koa i Noba, tanànan’ny mpisorona; ny lehilahy sy ny vehivavy mbamin’ny ankizy madinika sy ny zaza minono, ny omby sy ny boriky ary ny ondry aman’osy dia voan’ny lelan-tsabatra avokoa.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ny olona nanam-pahasahiranana rehetra sy izay nanan-trosa rehetra ary izay nanana alahelo am-po rehetra dia nivory tao aminy ka izy no tonga mpifehy azy ireny; tokony ho efajato lahy no niaraka taminy.
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny iray tamin’ny zanak’i Ahimeleka, zanak’i Ahitoba dia afa-nandositra ka nanaraka an’i Davida; Abiatara no anarany. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nambaran’i Abiatara tamin’i Davida ny namonoan’i Saoly ny mpisoron’NY TOMPO. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy i Davida tamin’i Abiatara: Fantatro androtr’iny ihany fa tao i Doega edomita ka hilaza amin’i Saoly tokoa; koa izaho no anton’ny nahafaty ny olona rehetra tamin’ny taranaky ny rainao. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mitoera etỳ amiko ka aza matahotra; fa izay mikatsaka ny aiko no mikatsaka ny ainao koa; ho voambina tsara ianao raha miaraka amiko.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Avy tao i Davida dia nankany Mizpa any Moaba ka niteny tamin’ny mpanjakan’i Moaba hoe: Miangavy anao aho, avelao ny raiko sy ny reniko hankaty aminao ambara-pahafantatro izay hataon’Andriamanitra amiko. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia noentina ho eo anatrehan’ny mpanjakan’i Moaba izy ireo ka nonina teo aminy nandritra ny andro rehetra nitoeran’i Davida tao amin’ny manda fiarovana.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy i Gada mpaminany tamin’i Davida: Aza mitoetra ao amin’ny manda fiarovana ianao; fa mandehana ka mankanesa any amin’ny tanin’ny Joda. Dia nandeha i Davida ka tonga tany amin’ny alan’i Hareta.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mampamono ny mpisorona any Noba i Saoly
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ren’i Saoly fa fantatra izay misy an’i Davida sy ny olona izay nanaraka azy. Nipetraka tao Gibea, teo ambanin’ny hazo tamarisika teo an-kavoana i Saoly tamin’izay; teny an-tanany ny lefony ary ny mpanompony rehetra dia nitsangana teo anilany. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy i Saoly tamin’ny mpanompony izay nitsangana teo anilany: Henoy kely, ry taranak’i Benjamina: Ianareo rehetra koa va mba homen’ny zanak’i Jese saha sy tanim-boaloboka na hataony mpifehy arivo sy mpifehy zato '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: no dia miray tetika hanohitra ahy ka tsy nisy nanambara tamiko fa nanao fifanekena tamin’ny zanak’i Jese ny zanako, ary tsy nisy nalahelo ahy akory ianareo na nanambara tamiko fa ny zanako dia nanome fo ny mpanompoko mba hamela-pandrika amiko tahaka ny amin’izao anio izao?
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary i Doega edomita izay nitsangana teo amin’ny mpanompon’i Saoly namaly hoe: Nahita ny zanak’i Jese tonga tany Noba tany amin’i Ahimeleka, zanak’i Ahitoba aho. '
