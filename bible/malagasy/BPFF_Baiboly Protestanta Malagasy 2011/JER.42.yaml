document_id: JER.42,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Maka hevitra amin’i Jeremia ireo nieren-doza
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ary ny mpifehy ny miaramila rehetra sy i Johanana, zanak’i Karea, ary i Jazania, zanak’i Hosaia, mbamin’ny vahoaka rehetra, na kely na lehibe, dia nanatona '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Raha mbola honina amin’ity tany ity ihany ianareo dia haoriko ianareo fa tsy horavako, ary hamboleko ianareo fa tsy hongotako; fa manenina Aho ny amin’ny loza namelezako anareo. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Aza matahotra ny mpanjakan’i Babilona izay atahoranareo; eny, aza matahotra azy, hoy NY TOMPO, fa momba anareo Aho ka hamonjy sy hanafaka anareo amin’ny tanany. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Ary hataoko mahita famindrampo ianareo, dia hamindra fo aminareo izy ka hampody anareo ho any amin’ny taninareo. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Fa raha hoy kosa ianareo: Tsy honina amin’ity tany ity izahay ka tsy hihaino ny feon’NY TOMPO Andriamanitrareo ianareo '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'fa miteny hoe: Tsia; hankany amin’ny tany Ejipta izahay, fa any no tsy hahitanay ady, na handrenesanay ny feon’ny anjomara na hahitanay mosary, ka any no honenanay, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'dia mihainoa ny tenin’NY TOMPO ankehitriny ianareo izay sisa amin’ny Joda: Izao no lazain’Andriamanitra, Tompon’izao rehetra izao, Andriamanitry ny Israely: Raha mikiry hankany Ejipta ihany ianareo ka mandeha hivahiny any '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'dia hahatratra anareo any amin’ny tany Ejipta ny sabatra izay atahoranareo, ary ny mosary izay ahinareo no hanjohy anareo any amin’ny tany Ejipta, ary any no hahafaty anareo. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Ary ny olona rehetra izay mikiry hankany Ejipta hivahiny any dia ho fatin’ny sabatra sy ny mosary ary ny areti-mandringana any; ary tsy hisy sisa ho afa-mandositra ny loza izay hataoko mihatra aminy. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Fa izao no lazain’Andriamanitra, Tompon’izao rehetra izao, Andriamanitry ny Israely: Toy ny nampidinana ny fahatezerako sy ny fahavinirako tamin’ny mponina any Jerosalema dia toy izany no hampidinana ny fahatezerako aminareo raha mankany Ejipta ianareo; ary ho fianianana sy ho figagana ary ho fanozonana sy ho fandatsa ianareo, sady tsy hahita ity tany ity intsony. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'NY TOMPO efa nilaza taminareo, ry sisa amin’ny Joda hoe: Aza mankany Ejipta ianareo; aoka ho fantatrareo tokoa fa efa nanariko ianareo androany. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'ka niteny tamin’i Jeremia mpaminany hoe: Miangavy anao izahay, aoka hoborahina eto anatrehanao ny fifonanay, ary mba mivavaha re ho anay amin’NY TOMPO Andriamanitrao, dia ireto sisa rehetra ireto, fa vitsy izahay no sisa, na dia maro aza fahiny, dia araka izao hitan’ny masonao izao, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Kanjo namita-tena ihany ianareo tamin’ny nanirahanareo ahy ho any amin’NY TOMPO Andriamanitrareo hiteny hoe: Mba mivavaha re ho anay amin’NY TOMPO Andriamanitsika, ary izay rehetra holazain’NY TOMPO Andriamanitsika dia ambarao aminay fa hataonay. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Ary efa nambarako taminareo androany; nefa tsy nihaino ny feon’NY TOMPO Andriamanitrareo ianareo ny amin’izay zavatra nanirahany ahy ho aminareo. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Koa aoka ho fantatrareo marimarina fa ho fatin-tsabatra sy mosary ary areti-mandringana ianareo any amin’ny tany izay tianareo hivahiniana.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'mba hambaran’NY TOMPO Andriamanitrao anay izay lalana mety halehanay sy izay zavatra tokony hataonay. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Dia hoy i Jeremia mpaminany taminy: Efa reko izany; koa indro, hivavaka amin’NY TOMPO Andriamanitrareo ary aho araka ny teninareo; ary ny teny rehetra izay havalin’NY TOMPO anareo dia hambarako anareo, fa tsy hisy hafeniko. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Dia hoy izy tamin’i Jeremia: NY TOMPO no aoka ho vavolombelona marina sy mahatoky amintsika raha tsy manatanteraka araka ny teny rehetra izay anirahan’NY TOMPO Andriamanitrao anao aminay izahay. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Na ho soa, na ho ratsy, dia hohenoinay ny feon’NY TOMPO Andriamanitray, izay nanirahanay anao, mba hahasoa anay, raha mihaino ny feon’NY TOMPO Andriamanitray izahay.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Nony afaka hafoloana dia tonga tamin’i Jeremia ny tenin’NY TOMPO. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Ary izy dia niantso an’i Johanana, zanak’i Karea, sy ny mpifehy ny miaramila rehetra izay teo aminy mbamin’ny olona rehetra, na kely na lehibe, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'ka niteny taminy hoe: Izao no lazain’NY TOMPO, Andriamanitry ny Israely, izay nanirahanareo ahy mba hanaborahako eo anatrehany ny fifonanareo: '
