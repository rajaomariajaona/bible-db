document_id: JDG.6,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Nampahorin’ny Midianita ny Israely
  - type: text
    content: 'Ary nanao izay ratsy teo imason’NY TOMPO ny Zanak’Israely ka natolotry NY TOMPO ho eo an-tanan’ny Midianita nandritra ny fito taona. '
  '10':
  - type: text
    content: 'Hoy Aho taminareo: Izaho no TOMPO Andriamanitrareo. Aza matahotra ny andriamanitry ny Amorita izay tompon’ny tany onenanareo. Nefa tsy nihaino ny feoko ianareo.'
  - type: heading
    content: Irahin’Andriamanitra hamonjy ny Israely i Gideona
  '11':
  - type: text
    content: 'Dia tonga ilay '
  - type: text
    content: Anjelin’NY TOMPO
  - type: text
    content: ' ka nipetraka teo ambanin’ny hazo '
  - type: text
    content: terebinta
  - type: text
    content: ' teo Ofra, izay an’i Joasy Abiezerita. Tamin’izay i Gideona zanany dia nively vary tao amin’ny famiazam-boaloboka mba hanafenany azy tamin’ny Midianita. '
  '12':
  - type: text
    content: 'Ary niseho taminy ilay Anjelin’NY TOMPO ka niteny taminy hoe: NY TOMPO no momba anao, ry lehilahy mpiady mahery! '
  '13':
  - type: text
    content: 'Fa hoy i Gideona taminy: Indrisy tompoko, raha momba anay NY TOMPO, nahoana no mihatra aminay izao zavatra rehetra izao? Aiza ny fahagagana rehetra nataony, izay notantarain’ny razanay taminay hoe: Tsy nitondra antsika niakatra avy tany Ejipta va NY TOMPO? Fa ankehitriny, efa nahafoy anay mihitsy NY TOMPO ka nanolotra anay eo an-tanan’ny Midianita.'
  '14':
  - type: text
    content: 'Dia nitodika nijery azy NY TOMPO ka niteny hoe: Mandehana amin’izao herinao izao ka vonjeo amin’ny tanan’ny Midianita ny Israely. Tsy efa naniraka anao va Aho? '
  '15':
  - type: text
    content: 'Fa hoy i Gideona Taminy: Indrisy, Tompo ô, amin’ny alalan’ny inona no hanafahako ny Israely? E! ny ankohonako no kely hery indrindra eo amin’ny Manase, ary izaho no kely indrindra amin’ny ankohonan’ny raiko! '
  '16':
  - type: text
    content: 'Dia hoy NY TOMPO taminy: Homba anao tokoa Aho ka hamely ny Midianita toy ny famely olona iray monja ianao. '
  '17':
  - type: text
    content: 'Dia hoy izy Taminy: Miangavy Anao aho, raha mahita fitia eto imasonao, mba anehoy famantarana aho fa Ianao tokoa no miteny amiko. '
  '18':
  - type: text
    content: 'Miangavy Anao mba tsy hiala eto mandra-piaviko hitondra fanatitra ka hapetrako eto anatrehanao izany. Dia hoy Izy: Eny, hiandry Aho mandra-piverinao.'
  '19':
  - type: text
    content: 'Dia lasa i Gideona nanomana zanak’osy sy mofo tsy misy masirasira tamin’ny koba eran’ny '
  - type: text
    content: efaha
  - type: text
    content: '; ny hena dia nataony tao anaty harona ary ny ron-kena dia nataony tao anaty vilany; dia noentiny ho eo Aminy teo ambanin’ilay hazo terebinta izany ka natolony Azy. '
  '2':
  - type: text
    content: Nanampatra ny heriny tamin’ny Israely ny Midianita ka ny tahotra ny Midianita no nanamboaran’ny Zanak’Israely fierena tany an-tendrombohitra sy zohy ary toeram-pialofana.
  '20':
  - type: text
    content: 'Ary hoy ilay '
  - type: text
    content: Anjelin’Andriamanitra
  - type: text
    content: ' taminy: Raiso ny hena sy ny mofo tsy misy masirasira ka apetraho eo ambonin’irỳ harambato irỳ, ary araraho eo amboniny ny ron-kena. Dia nataony izany. '
  '21':
  - type: text
    content: 'Ary naroson’ilay Anjelin’NY TOMPO ny lohan’ny tehina izay teny an-tanany ka notendreny ny hena sy ny mofo tsy misy masirasira; dia nisy afo nivoaka avy tamin’ny vatolampy ka nandevona ny hena sy ny mofo tsy misy masirasira. Dia lasa ilay Anjelin’NY TOMPO ka tsy hitan’ny masony. '
  '22':
  - type: text
    content: 'Dia hitan’i Gideona fa Anjelin’NY TOMPO ilay teo ka hoy izy: Andray, ry TOMPO Andriamanitra ô! Hay, nahita ilay Anjelin’NY TOMPO nifanatrika aho! '
  '23':
  - type: text
    content: 'Fa hoy NY TOMPO taminy: Fiadanana anie ho anao; aza matahotra; tsy ho faty ianao tsy akory. '
  '24':
  - type: text
    content: 'Ary nanorina alitara teo ho an’NY TOMPO i Gideona, ary ny anarany dia nataony hoe Adonay-Shalom, na: NY TOMPO dia fiadanana. Mbola ao Ofran’ilay Abiezerita izany mandraka androany.'
  - type: heading
    content: Nopotehin’i Gideona ny alitaran’ny Baala
  '25':
  - type: text
    content: 'Tamin’iny alina iny ihany dia hoy NY TOMPO taminy: Alao ny ombilahin-drainao, dia ilay ombilahy faharoa izay fito taona ka ravao ny alitaran’ny '
  - type: text
    content: Baala
  - type: text
    content: ' izay an’ny rainao, ary kapao ny tsangankazon-tsampy ho an’ny '
  - type: text
    content: Aseraha
  - type: text
    content: ' izay eo anilany. '
  '26':
  - type: text
    content: 'Dia manorena alitara ho an’NY TOMPO Andriamanitrao eto an-tampon’ity toeram-piarovana ity ka amboary tsara araka izay tokony ho izy izany. Ary alao ilay ombilahy faharoa ka atolory ho fanatitra dorana manontolo amin’ny hazo avy amin’ilay tsangankazon-tsampy ho an’ny Aseraha izay hokapainao. '
  '27':
  - type: text
    content: 'Dia naka folo lahy tamin’ny mpanompony i Gideona ka nanatanteraka araka izay nolazain’NY TOMPO taminy; ary satria natahotra ny fianakavian-drainy sy ireo lehilahy tao an-tanàna izy dia tsy nanao izany tamin’ny antoandro, fa tamin’ny alina no nanaovany azy. '
  '28':
  - type: text
    content: 'Nony nifoha vao maraina ny lehilahy tao an-tanàna ka nahita fa indro, potika ny alitaran’ny Baala sady voakapa ny tsangankazon-tsampy ho an’ny Aseraha izay teo anilany, ary ilay ombilahy faharoa dia efa natao fanatitra dorana manontolo teo ambonin’ilay alitara izay voaorina, '
  '29':
  - type: text
    content: 'dia nifanontany izy ireo hoe: Iza re no nanao izao zavatra izao? Ary rehefa nikaroka sy nanadihady izy ireo dia nilaza hoe: I Gideona, zanak’i Joasy, no nanao izao zavatra izao! '
  '3':
  - type: text
    content: 'Rehefa namafy ny Israely dia niakatra hanafika azy ny Midianita sy ny Amalekita ary ireo zanaky ny Atsinanana. '
  '30':
  - type: text
    content: 'Dia hoy ireo lehilahy tao an-tanàna tamin’i Joasy: Avoahy ny zanakao mba hovonoina satria nandrava ny alitaran’ny Baala izy sady nikapa ny tsangankazon-tsampy ho an’ny Aseraha teo anilany! '
  '31':
  - type: text
    content: 'Hoy i Joasy tamin’izay rehetra nitsangana teo anatrehany: Ianareo va no handahatra hiaro ny Baala? Ianareo va no hamonjy azy? Izay handahatra hiaro ny Baala dia hovonoina alohan’ny andro maraina! Raha andriamanitra ny Baala, aoka izy handahatra hiaro ny tenany, satria nisy nandrava ny alitarany! '
  '32':
  - type: text
    content: Tamin’izany andro izany, ny anaran’i Gideona dia natao hoe Jerobaala
  - type: note
    content: 'Jerobaala: Nifandahatra tamin’ny Baala.'
  - type: text
    content: ', satria hoy ny olona: Aoka ny Baala no hifandahatra aminy satria noravany ny alitarany.'
  - type: heading
    content: Mangataka antoka amin’Andriamanitra i Gideona
  '33':
  - type: text
    content: 'Ary nivory ny Midianita rehetra sy ny Amalekita ary ny zanaky ny Atsinanana, dia nita ka nitoby teny amin’ny tany lemaka Jezirela. '
  '34':
  - type: text
    content: 'Ary notafina ny Fanahin’NY TOMPO i Gideona; dia nitsoka anjomara izy ka nivory nanaraka azy ny Abiezerita. '
  '35':
  - type: text
    content: Naniraka olona nankany amin’ny Manase rehetra izy, dia nivory nanaraka azy ireo. Naniraka olona tany amin’ny Asera sy ny Zebolona ary ny Naftaly izy dia niakatra nitsena azy koa ireo.
  '36':
  - type: text
    content: 'Ary hoy i Gideona tamin’Andriamanitra: Raha hamonjy ny Israely amin’ny tanako tokoa Ianao araka izay nolazainao, '
  '37':
  - type: text
    content: 'indro, hapetrako eo amin’ny famoloana ity faham-bolon’ondry iray ity; koa raha ny volon’ondry ihany no lenan’ny ando fa maina kosa ny tany manontolo dia ho fantatro fa ny tanako no hamonjenao ny Israely araka izay nolazainao. '
  '38':
  - type: text
    content: 'Dia nisy tokoa izany. Nifoha vao maraina izy dia nofiazany ny volon’ondry ka nisy ranonando nikoriana avy taminy ary nahafeno lovia iray. '
  '39':
  - type: text
    content: 'Hoy ihany i Gideona tamin’Andriamanitra: Aoka tsy hirehitra amiko ny fahatezeranao fa hiteny izao indray mandeha izao monja aho. Aoka mba hozahako izao indray mandeha izao monja ny amin’ny volon’ondry: Aoka ny volon’ondry ihany no ho maina fa ny tany manontolo kosa no ho lenan’ny ando. '
  '4':
  - type: text
    content: 'Nitoby tandrifiny ireny ka nanimba ny vokatry ny tany, hatrany akaikin’i Gaza; tsy nisy zavatra navelany mba hiveloman’ny Israely, na ondry na osy na omby na boriky. '
  '40':
  - type: text
    content: Dia nataon’Andriamanitra izany tamin’ny alin’iny, koa ny volon’ondry ihany no maina fa ny tany manontolo kosa dia lenan’ny ando.
  '5':
  - type: text
    content: Rehefa nanafika izy ireny dia nitondra ny omby aman’ondriny sy ny tranolainy niaraka taminy ka ny fiaviny dia tahaka ny valala maro be; eny, tsy hita isa izy ireny sy ny ramevany; niditra tao amin’ny tany ireny mba handrava azy.
  '6':
  - type: text
    content: 'Dia nahantra indrindra ny Israely noho ny Midianita ka nitaraina tamin’NY TOMPO. '
  '7':
  - type: text
    content: 'Ary rehefa nitaraina tamin’NY TOMPO ny Zanak’Israely noho ny Midianita '
  '8':
  - type: text
    content: 'dia nirahin’NY TOMPO ho any amin’ny Zanak’Israely ny mpaminany iray izay nilaza taminy hoe: Izao no lazain’NY TOMPO, Andriamanitry ny Israely: Izaho no nitondra anareo niakatra avy tany Ejipta, sady nitondra anareo nivoaka avy tany amin’ny trano nanandevozana '
  '9':
  - type: text
    content: 'ary nanafaka anareo tamin’ny tanan’ny Ejiptiana sy ny tanan’izay rehetra nampahory anareo. Nandroaka ireny teo anoloanareo Aho ka nomeko anareo ny taniny. '
