document_id: JDG.6
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nampahorin’ny Midianita ny Israely
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary nanao izay ratsy teo imason’NY TOMPO ny Zanak’Israely ka natolotry NY TOMPO ho eo an-tanan’ny Midianita nandritra ny fito taona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Nanampatra ny heriny tamin’ny Israely ny Midianita ka ny tahotra ny Midianita no nanamboaran’ny Zanak’Israely fierena tany an-tendrombohitra sy zohy ary toeram-pialofana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Rehefa namafy ny Israely dia niakatra hanafika azy ny Midianita sy ny Amalekita ary ireo zanaky ny Atsinanana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Nitoby tandrifiny ireny ka nanimba ny vokatry ny tany, hatrany akaikin’i Gaza; tsy nisy zavatra navelany mba hiveloman’ny Israely, na ondry na osy na omby na boriky. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Rehefa nanafika izy ireny dia nitondra ny omby aman’ondriny sy ny tranolainy niaraka taminy ka ny fiaviny dia tahaka ny valala maro be; eny, tsy hita isa izy ireny sy ny ramevany; niditra tao amin’ny tany ireny mba handrava azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia nahantra indrindra ny Israely noho ny Midianita ka nitaraina tamin’NY TOMPO. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary rehefa nitaraina tamin’NY TOMPO ny Zanak’Israely noho ny Midianita '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'dia nirahin’NY TOMPO ho any amin’ny Zanak’Israely ny mpaminany iray izay nilaza taminy hoe: Izao no lazain’NY TOMPO, Andriamanitry ny Israely: Izaho no nitondra anareo niakatra avy tany Ejipta, sady nitondra anareo nivoaka avy tany amin’ny trano nanandevozana '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'ary nanafaka anareo tamin’ny tanan’ny Ejiptiana sy ny tanan’izay rehetra nampahory anareo. Nandroaka ireny teo anoloanareo Aho ka nomeko anareo ny taniny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Hoy Aho taminareo: Izaho no TOMPO Andriamanitrareo. Aza matahotra ny andriamanitry ny Amorita izay tompon’ny tany onenanareo. Nefa tsy nihaino ny feoko ianareo.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Irahin’Andriamanitra hamonjy ny Israely i Gideona
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Dia tonga ilay '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Anjelin’NY TOMPO
  - type: text
    text: ' ka nipetraka teo ambanin’ny hazo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: terebinta
  - type: text
    text: ' teo Ofra, izay an’i Joasy Abiezerita. Tamin’izay i Gideona zanany dia nively vary tao amin’ny famiazam-boaloboka mba hanafenany azy tamin’ny Midianita. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary niseho taminy ilay Anjelin’NY TOMPO ka niteny taminy hoe: NY TOMPO no momba anao, ry lehilahy mpiady mahery! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Fa hoy i Gideona taminy: Indrisy tompoko, raha momba anay NY TOMPO, nahoana no mihatra aminay izao zavatra rehetra izao? Aiza ny fahagagana rehetra nataony, izay notantarain’ny razanay taminay hoe: Tsy nitondra antsika niakatra avy tany Ejipta va NY TOMPO? Fa ankehitriny, efa nahafoy anay mihitsy NY TOMPO ka nanolotra anay eo an-tanan’ny Midianita.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dia nitodika nijery azy NY TOMPO ka niteny hoe: Mandehana amin’izao herinao izao ka vonjeo amin’ny tanan’ny Midianita ny Israely. Tsy efa naniraka anao va Aho? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Fa hoy i Gideona Taminy: Indrisy, Tompo ô, amin’ny alalan’ny inona no hanafahako ny Israely? E! ny ankohonako no kely hery indrindra eo amin’ny Manase, ary izaho no kely indrindra amin’ny ankohonan’ny raiko! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Dia hoy NY TOMPO taminy: Homba anao tokoa Aho ka hamely ny Midianita toy ny famely olona iray monja ianao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Dia hoy izy Taminy: Miangavy Anao aho, raha mahita fitia eto imasonao, mba anehoy famantarana aho fa Ianao tokoa no miteny amiko. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Miangavy Anao mba tsy hiala eto mandra-piaviko hitondra fanatitra ka hapetrako eto anatrehanao izany. Dia hoy Izy: Eny, hiandry Aho mandra-piverinao.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Dia lasa i Gideona nanomana zanak’osy sy mofo tsy misy masirasira tamin’ny koba eran’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: efaha
  - type: text
    text: '; ny hena dia nataony tao anaty harona ary ny ron-kena dia nataony tao anaty vilany; dia noentiny ho eo Aminy teo ambanin’ilay hazo terebinta izany ka natolony Azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary hoy ilay '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Anjelin’Andriamanitra
  - type: text
    text: ' taminy: Raiso ny hena sy ny mofo tsy misy masirasira ka apetraho eo ambonin’irỳ harambato irỳ, ary araraho eo amboniny ny ron-kena. Dia nataony izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary naroson’ilay Anjelin’NY TOMPO ny lohan’ny tehina izay teny an-tanany ka notendreny ny hena sy ny mofo tsy misy masirasira; dia nisy afo nivoaka avy tamin’ny vatolampy ka nandevona ny hena sy ny mofo tsy misy masirasira. Dia lasa ilay Anjelin’NY TOMPO ka tsy hitan’ny masony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Dia hitan’i Gideona fa Anjelin’NY TOMPO ilay teo ka hoy izy: Andray, ry TOMPO Andriamanitra ô! Hay, nahita ilay Anjelin’NY TOMPO nifanatrika aho! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Fa hoy NY TOMPO taminy: Fiadanana anie ho anao; aza matahotra; tsy ho faty ianao tsy akory. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary nanorina alitara teo ho an’NY TOMPO i Gideona, ary ny anarany dia nataony hoe Adonay-Shalom, na: NY TOMPO dia fiadanana. Mbola ao Ofran’ilay Abiezerita izany mandraka androany.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nopotehin’i Gideona ny alitaran’ny Baala
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Tamin’iny alina iny ihany dia hoy NY TOMPO taminy: Alao ny ombilahin-drainao, dia ilay ombilahy faharoa izay fito taona ka ravao ny alitaran’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Baala
  - type: text
    text: ' izay an’ny rainao, ary kapao ny tsangankazon-tsampy ho an’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Aseraha
  - type: text
    text: ' izay eo anilany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Dia manorena alitara ho an’NY TOMPO Andriamanitrao eto an-tampon’ity toeram-piarovana ity ka amboary tsara araka izay tokony ho izy izany. Ary alao ilay ombilahy faharoa ka atolory ho fanatitra dorana manontolo amin’ny hazo avy amin’ilay tsangankazon-tsampy ho an’ny Aseraha izay hokapainao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Dia naka folo lahy tamin’ny mpanompony i Gideona ka nanatanteraka araka izay nolazain’NY TOMPO taminy; ary satria natahotra ny fianakavian-drainy sy ireo lehilahy tao an-tanàna izy dia tsy nanao izany tamin’ny antoandro, fa tamin’ny alina no nanaovany azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Nony nifoha vao maraina ny lehilahy tao an-tanàna ka nahita fa indro, potika ny alitaran’ny Baala sady voakapa ny tsangankazon-tsampy ho an’ny Aseraha izay teo anilany, ary ilay ombilahy faharoa dia efa natao fanatitra dorana manontolo teo ambonin’ilay alitara izay voaorina, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'dia nifanontany izy ireo hoe: Iza re no nanao izao zavatra izao? Ary rehefa nikaroka sy nanadihady izy ireo dia nilaza hoe: I Gideona, zanak’i Joasy, no nanao izao zavatra izao! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Dia hoy ireo lehilahy tao an-tanàna tamin’i Joasy: Avoahy ny zanakao mba hovonoina satria nandrava ny alitaran’ny Baala izy sady nikapa ny tsangankazon-tsampy ho an’ny Aseraha teo anilany! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Hoy i Joasy tamin’izay rehetra nitsangana teo anatrehany: Ianareo va no handahatra hiaro ny Baala? Ianareo va no hamonjy azy? Izay handahatra hiaro ny Baala dia hovonoina alohan’ny andro maraina! Raha andriamanitra ny Baala, aoka izy handahatra hiaro ny tenany, satria nisy nandrava ny alitarany! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Tamin’izany andro izany, ny anaran’i Gideona dia natao hoe Jerobaala
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.32 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Jerobaala: Nifandahatra tamin’ny Baala.'
    marker-yv: yv-n
  - type: text
    text: ', satria hoy ny olona: Aoka ny Baala no hifandahatra aminy satria noravany ny alitarany.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mangataka antoka amin’Andriamanitra i Gideona
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ary nivory ny Midianita rehetra sy ny Amalekita ary ny zanaky ny Atsinanana, dia nita ka nitoby teny amin’ny tany lemaka Jezirela. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ary notafina ny Fanahin’NY TOMPO i Gideona; dia nitsoka anjomara izy ka nivory nanaraka azy ny Abiezerita. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Naniraka olona nankany amin’ny Manase rehetra izy, dia nivory nanaraka azy ireo. Naniraka olona tany amin’ny Asera sy ny Zebolona ary ny Naftaly izy dia niakatra nitsena azy koa ireo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Ary hoy i Gideona tamin’Andriamanitra: Raha hamonjy ny Israely amin’ny tanako tokoa Ianao araka izay nolazainao, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'indro, hapetrako eo amin’ny famoloana ity faham-bolon’ondry iray ity; koa raha ny volon’ondry ihany no lenan’ny ando fa maina kosa ny tany manontolo dia ho fantatro fa ny tanako no hamonjenao ny Israely araka izay nolazainao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Dia nisy tokoa izany. Nifoha vao maraina izy dia nofiazany ny volon’ondry ka nisy ranonando nikoriana avy taminy ary nahafeno lovia iray. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Hoy ihany i Gideona tamin’Andriamanitra: Aoka tsy hirehitra amiko ny fahatezeranao fa hiteny izao indray mandeha izao monja aho. Aoka mba hozahako izao indray mandeha izao monja ny amin’ny volon’ondry: Aoka ny volon’ondry ihany no ho maina fa ny tany manontolo kosa no ho lenan’ny ando. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Dia nataon’Andriamanitra izany tamin’ny alin’iny, koa ny volon’ondry ihany no maina fa ny tany manontolo kosa dia lenan’ny ando.
