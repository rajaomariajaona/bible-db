document_id: NEH.5
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fongoran’i Nehemia ny fanambakana ny mpiaramonina
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary nitaraina mafy ny lehilahy sy ny vadiny ny amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jiosy
  - type: text
    text: ' rahalahiny. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Fa nisy nilaza hoe: Maro izahay mbamin’ny zanakay lahy sy ny zanakay vavy; koa ta hahazo vary izahay mba hohaninay sy hivelomanay. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Nisy koa niteny hoe: Ny taninay sy ny tanim-boalobokay ary ny tranonay dia efa nataonay antoka, koa ta hahazo vary izahay amin’ny mosary. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary nisy indray koa nilaza hoe: Efa nisambo-bola izahay handoavanay ny hetran’ny mpanjaka ary ny taninay sy ny tanim-boalobokay no nataonay antoka. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Kanefa mba tahaka ny nofon’ny rahalahinay ihany ny nofonay ary tahaka ny zanany ihany ny zanakay; fa na izany aza, indreo izahay manetry ny zanakay lahy sy ny zanakay vavy ho andevo, ary ny sasany amin’ny zanakay vavy dia efa andevo rahateo; nefa tsy manana izay hoenti-manavotra azy izahay satria lasan’ny sasany ny taninay sy ny tanim-boalobokay.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia tezitra indrindra aho raha nahare ny fitarainany sy izany teny izany. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary nihevitra tao am-poko aho ka nananatra mafy ny olo-manankaja sy ny mpanapaka ary niteny taminy hoe: Samy mampanjanaka zavatra amin’ny rahalahinareo avy ianareo. Dia nanendry fivoriambe hitsarana azy ireo aho. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Hoy aho taminy: Izahay dia efa nanavotra ny Jiosy rahalahinay izay efa namidy tamin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jentilisa
  - type: text
    text: ', araka izay azonay natao; fa ianareo kosa, moa hivarotra ny rahalahinareo va ianareo ka hamidinareo aminay va izy? Dia sina izy fa tsy hitany izay havaliny. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary hoy koa aho: Tsy tsara izao ataonareo izao; moa tsy tokony handeha amin’ny fahatahorana an’Andriamanitsika va ianareo noho ny fanaratsiana ataon’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jentilisa
  - type: text
    text: ' fahavalontsika? '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Efa nampanjanaka vola sy vary taminy koa izaho sy ny rahalahiko ary ny zatovoko. Koa miangavy anareo aho, aoka re hafointsika izany trosa izany! '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Eny, miangavy anareo aho, avereno aminy anio ihany ny taniny, ny tanim-boalobony, ny tanin’olivany, ny tranony mbamin’ny ampahazaton’ny vola sy ny vary ary ny divay sy ny diloilo izay nampisamborinareo azy. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Dia hoy ireo: Eny, haverinay izany ka tsy haka na inona na inona aminy izahay fa hanatanteraka izay lazainao. Dia niantso ny mpisorona aho ka nampianiana azy ireo mba hanatanteraka izany teny izany. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dia nanakopaka ny paosin’akanjoko aho sady niteny hoe: Ho tahaka izany anie no hanakopahan’Andriamanitra hiala amin’ny tranony sy ny vokatry ny asany ny olona rehetra izay tsy mahatanteraka ny teny natao; eny, hakopaka ka hofoanana tahaka izany anie izy. Ary hoy ny fiangonana manontolo hoe: '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Amena
  - type: text
    text: ; sady nidera NY TOMPO izy. Dia nanatanteraka izany teny izany ny olona.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Hatramin’ny andro nanendrena ahy ho governora amin’ny tany Joda, dia hatramin’ny taona faharoapolo ka hatramin’ny taona faharoa amby telopolo nanjakan’i Artaksersesy, roa amby folo taona izay, izaho sy ny rahalahiko, dia tsy mba nihinana izay anjara fiveloman’ny governora. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Fa ireo governora fahiny izay teo alohako ireo dia nahavaky tratra ny olona ka nampandoa azy hanina sy divay ary sekela volafotsy efapolo koa; eny, na dia ny zatovony aza dia nisetrasetra tamin’ny olona; fa izaho dia tsy mba nanao izany noho ny fahatahorako an’Andriamanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Eny, naharitra nanarina io manda io aho sady tsy nividy tany izahay; ary ny zatovoko rehetra dia voangona hanao ny asa. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Nisy Jiosy sy mpanapaka dimampolo amby zato teo amin’ny latabatro, afa-tsy ireo izay nankeo aminay avy tamin’ny firenena manodidina anay. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ary ny nokarakaraina ho ahy isanandro dia omby iray sy ondry matavy enina ary vorona, ary indray mandeha isan-kafoloana dia nasiana divay betsaka samihafa; nefa na dia izany aza, ny anjara fiveloman’ny governora dia tsy mba nilaiko satria navesatra tamin’ny olona ny fanompoana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Tsarovy aho ka hasoavy, ry Andriamanitro ô, araka izay rehetra nataoko ho an’ity firenena ity!
