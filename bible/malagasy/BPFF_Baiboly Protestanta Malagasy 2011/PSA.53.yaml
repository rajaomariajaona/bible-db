document_id: PSA.53,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Andriamanitra manohitra ny mpanao kolikoly
  - type: text
    content: Ho an’ny mpiventy hira. Al-mahalat. Maskila nataon’i Davida.
  - type: text
    content: 'Ny adala no manao anakampo hoe: Tsy misy Andriamanitra.'
  - type: text
    content: Manao izay ratsy sy vetaveta izy;
  - type: text
    content: tsy misy manao ny tsara.
  '2':
  - type: text
    content: Avy eny an-danitra Andriamanitra no miondrika mijery ny zanak’olombelona
  - type: text
    content: mba hizaha raha misy hendry mitady an’Andriamanitra.
  '3':
  - type: text
    content: Samy efa nivily lalana izy rehetra ka tonga nanao zava-betaveta avokoa;
  - type: text
    content: tsy misy manao ny tsara na dia iray akory aza.
  '4':
  - type: text
    content: Tsy mahalala va ny mpanao ratsy?
  - type: text
    content: Mihinana ny oloko toy ny fihinanana mofo
  - type: text
    content: no sady tsy miantso an’Andriamanitra izy.
  '5':
  - type: text
    content: Indreo, tonga feno tahotra ireny nefa tsy nisy tokony hatahorany;
  - type: text
    content: fa Andriamanitra hanely ny taolan’izay nitoby hamely anao;
  - type: text
    content: hampahamenatra azy ianao satria Andriamanitra efa nanary azy.
  '6':
  - type: text
    content: 'Enga anie ka hivoaka avy ao '
  - type: text
    content: Ziona
  - type: text
    content: ' ny famonjena ny Israely!'
  - type: text
    content: Rehefa ampodin’Andriamanitra avy amin’ny fahababoana ny olony
  - type: text
    content: dia hiravoravo i Jakoba ary hifaly Israely.
