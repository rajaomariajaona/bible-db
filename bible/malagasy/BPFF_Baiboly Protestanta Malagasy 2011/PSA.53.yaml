document_id: PSA.53
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Andriamanitra manohitra ny mpanao kolikoly
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: Ho an’ny mpiventy hira. Al-mahalat. Maskila nataon’i Davida.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ny adala no manao anakampo hoe: Tsy misy Andriamanitra.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Manao izay ratsy sy vetaveta izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy misy manao ny tsara.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Avy eny an-danitra Andriamanitra no miondrika mijery ny zanak’olombelona
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hizaha raha misy hendry mitady an’Andriamanitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Samy efa nivily lalana izy rehetra ka tonga nanao zava-betaveta avokoa;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy misy manao ny tsara na dia iray akory aza.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Tsy mahalala va ny mpanao ratsy?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mihinana ny oloko toy ny fihinanana mofo
- type: usfm
  marker: q1
  children:
  - type: text
    text: no sady tsy miantso an’Andriamanitra izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Indreo, tonga feno tahotra ireny nefa tsy nisy tokony hatahorany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa Andriamanitra hanely ny taolan’izay nitoby hamely anao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hampahamenatra azy ianao satria Andriamanitra efa nanary azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Enga anie ka hivoaka avy ao '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Ziona
  - type: text
    text: ' ny famonjena ny Israely!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Rehefa ampodin’Andriamanitra avy amin’ny fahababoana ny olony
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hiravoravo i Jakoba ary hifaly Israely.
