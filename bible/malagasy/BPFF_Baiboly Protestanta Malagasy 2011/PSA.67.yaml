document_id: PSA.67,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Mankalaza Anao ny firenena
  - type: text
    content: Ho an’ny mpiventy hira. Hampiarahina amin’ny valiha. Salamo. Tononkira.
  - type: text
    content: Andriamanitra anie hamindra fo amintsika sy hitahy antsika,
  - type: text
    content: 'hampamirapiratra ny tavany amintsika anie Izy! '
  - type: text
    content: Fiatoana.
  '2':
  - type: text
    content: Mba ho fantatra etỳ ambonin’ny tany ny lalanao
  - type: text
    content: ary any amin’ny firenena rehetra ny famonjenao!
  '3':
  - type: text
    content: Hidera Anao ny firenena, Andriamanitra ô;
  - type: text
    content: eny, hidera Anao ny firenena rehetra!
  '4':
  - type: text
    content: Hifaly sy hihoby ny firenen-tsamihafa
  - type: text
    content: satria mitsara marina ny firenena Ianao,
  - type: text
    content: 'ny firenen-tsamihafa ambonin’ny tany dia tarihinao. '
  - type: text
    content: Fiatoana.
  '5':
  - type: text
    content: Hidera Anao ny firenena, Andriamanitra ô;
  - type: text
    content: eny, hidera Anao ny firenena rehetra.
  '6':
  - type: text
    content: Ny tany dia nahavokatra;
  - type: text
    content: mitahy antsika Andriamanitra, dia Andriamanitsika.
  '7':
  - type: text
    content: Mitahy antsika Andriamanitra
  - type: text
    content: ary hatahotra Azy ny vazan-tany rehetra.
