document_id: PSA.67,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mankalaza Anao ny firenena
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: Ho an’ny mpiventy hira. Hampiarahina amin’ny valiha. Salamo. Tononkira.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Andriamanitra anie hamindra fo amintsika sy hitahy antsika,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'hampamirapiratra ny tavany amintsika anie Izy! '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Fiatoana.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Mba ho fantatra etỳ ambonin’ny tany ny lalanao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary any amin’ny firenena rehetra ny famonjenao!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Hidera Anao ny firenena, Andriamanitra ô;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, hidera Anao ny firenena rehetra!
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Hifaly sy hihoby ny firenen-tsamihafa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria mitsara marina ny firenena Ianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ny firenen-tsamihafa ambonin’ny tany dia tarihinao. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Fiatoana.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Hidera Anao ny firenena, Andriamanitra ô;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, hidera Anao ny firenena rehetra.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Ny tany dia nahavokatra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mitahy antsika Andriamanitra, dia Andriamanitsika.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Mitahy antsika Andriamanitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hatahotra Azy ny vazan-tany rehetra.
