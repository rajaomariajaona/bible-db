document_id: JOB.16,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: 'Ny teny navalin’i Joba: Manana vavolombelona any an-danitra aho'
  - type: text
    content: 'Dia namaly i Joba hoe:'
  '10':
  - type: text
    content: nisanasana vava tamiko ny olona;
  - type: text
    content: latsa no noentiny namely ny takolako;
  - type: text
    content: mitambatra hamely ahy izy.
  '11':
  - type: text
    content: Efa voatolotr’Andriamanitra ho amin’ny ratsy fanahy aho
  - type: text
    content: ary natsipiny ho eo an-tanan’ny mpanota.
  '12':
  - type: text
    content: Tamin’ilay izaho tsy nanana ahiahy iny dia nanozongozona ahy Izy;
  - type: text
    content: nosamboriny tamin’ny hatoko aho ka nomontsaniny
  - type: text
    content: ary natsangany indray ho marika hokendreny.
  '13':
  - type: text
    content: Manodidina ahy ny zana-tsipìkany;
  - type: text
    content: mamaky ahy hatrany anatiko Izy ka tsy miantra
  - type: text
    content: ary mandraraka ny aferoko ho amin’ny tany.
  '14':
  - type: text
    content: Tsy mitsahatra manisy banga amiko Izy
  - type: text
    content: ka miroatra hamely ahy tahaka ny mpiady mahery.
  '15':
  - type: text
    content: Lamba fisaonana no voazaitrako hanarona ny hoditro
  - type: text
    content: 'ary nalako baraka teo amin’ny vovoka ny '
  - type: text
    content: tandroko
  - type: text
    content: .
  '16':
  - type: text
    content: Teramenan’ny fitomaniana ny tavako
  - type: text
    content: ary eo amin’ny hodimasoko ny aloky ny fahafatesana.
  '17':
  - type: text
    content: Kanefa tsy misy eto an-tanako izay mba nalaina an-keriny
  - type: text
    content: ary madio ny vavaka ataoko.
  '18':
  - type: text
    content: Ry tany ô, aza manarona ny rako
  - type: text
    content: ary aoka tsy ho voahazona ny fitarainako!
  '19':
  - type: text
    content: Fa na dia ankehitriny izao aza, indro, any an-danitra ny Vavolombeloko;
  - type: text
    content: eny, ny Mpiantoka ahy dia any amin’ny avo.
  '2':
  - type: text
    content: Efa nandre zavatra maro toy izany aho;
  - type: text
    content: mpampionona mahasorena foana ianareo rehetra.
  '20':
  - type: text
    content: Mihomehy ahy ny sakaizako;
  - type: text
    content: mandrotsa-dranomaso eo anatrehan’Andriamanitra kosa aho
  '21':
  - type: text
    content: mba hanamarina ahy olombelona eo anatrehany Izy
  - type: text
    content: ary hanafa-tsiny ahy zanak’olombelona amin’ny sakaizako.
  '22':
  - type: text
    content: Fa efa kely sisa ny taona hiainako
  - type: text
    content: ka handeha any amin’ny lalana izay tsy hiverenako intsony aho.
  '3':
  - type: text
    content: Efa tapitra va izay ny bedibedy foana?
  - type: text
    content: Sa mbola misy manesika anao hamaly ahy ihany?
  '4':
  - type: text
    content: Izaho kosa dia mba nahazo niteny tahaka anareo
  - type: text
    content: raha mba tamin’ny toerana misy ahy ianareo;
  - type: text
    content: eny, ho nahazo nandahatra teny hoenti-mamely anareo aho
  - type: text
    content: ary nahazo mihifikifi-doha aminareo;
  '5':
  - type: text
    content: nahazo nampahery anareo tamin’ny vavako aho
  - type: text
    content: ary nahazo nampitony ny alahelonareo ny fampiononana nataon’ny molotro.
  '6':
  - type: text
    content: Fa raha miteny aho dia tsy mitsahatra ny alaheloko;
  - type: text
    content: ary raha mangina aho, ahoana no hialany amiko?
  '7':
  - type: text
    content: Fa ankehitriny dia efa nandemy ahy Izy;
  - type: text
    content: naringanao ny ankohonako rehetra.
  '8':
  - type: text
    content: Nampifezaka ny tenako Ianao ka tonga vavolombelona mamely ahy izany.
  - type: text
    content: Mitsangana hiampanga ahy ny fahiazako
  - type: text
    content: ka tondro-maso mifanatrika izany.
  '9':
  - type: text
    content: Amin’ny fahatezerany no amiravirany sy andrafiany ahy,
  - type: text
    content: mihidy vazana amiko Izy;
  - type: text
    content: eny, miseho ho fahavaloko Izy ka mampivandravandra ny masony amiko;
