document_id: JOB.16
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Ny teny navalin’i Joba: Manana vavolombelona any an-danitra aho'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Dia namaly i Joba hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Efa nandre zavatra maro toy izany aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mpampionona mahasorena foana ianareo rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Efa tapitra va izay ny bedibedy foana?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sa mbola misy manesika anao hamaly ahy ihany?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Izaho kosa dia mba nahazo niteny tahaka anareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: raha mba tamin’ny toerana misy ahy ianareo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, ho nahazo nandahatra teny hoenti-mamely anareo aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary nahazo mihifikifi-doha aminareo;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: nahazo nampahery anareo tamin’ny vavako aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary nahazo nampitony ny alahelonareo ny fampiononana nataon’ny molotro.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Fa raha miteny aho dia tsy mitsahatra ny alaheloko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary raha mangina aho, ahoana no hialany amiko?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Fa ankehitriny dia efa nandemy ahy Izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: naringanao ny ankohonako rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Nampifezaka ny tenako Ianao ka tonga vavolombelona mamely ahy izany.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mitsangana hiampanga ahy ny fahiazako
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tondro-maso mifanatrika izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Amin’ny fahatezerany no amiravirany sy andrafiany ahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mihidy vazana amiko Izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, miseho ho fahavaloko Izy ka mampivandravandra ny masony amiko;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: nisanasana vava tamiko ny olona;
- type: usfm
  marker: q1
  children:
  - type: text
    text: latsa no noentiny namely ny takolako;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mitambatra hamely ahy izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Efa voatolotr’Andriamanitra ho amin’ny ratsy fanahy aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary natsipiny ho eo an-tanan’ny mpanota.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Tamin’ilay izaho tsy nanana ahiahy iny dia nanozongozona ahy Izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: nosamboriny tamin’ny hatoko aho ka nomontsaniny
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary natsangany indray ho marika hokendreny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Manodidina ahy ny zana-tsipìkany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mamaky ahy hatrany anatiko Izy ka tsy miantra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mandraraka ny aferoko ho amin’ny tany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Tsy mitsahatra manisy banga amiko Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka miroatra hamely ahy tahaka ny mpiady mahery.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Lamba fisaonana no voazaitrako hanarona ny hoditro
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ary nalako baraka teo amin’ny vovoka ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tandroko
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Teramenan’ny fitomaniana ny tavako
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary eo amin’ny hodimasoko ny aloky ny fahafatesana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Kanefa tsy misy eto an-tanako izay mba nalaina an-keriny
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary madio ny vavaka ataoko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ry tany ô, aza manarona ny rako
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary aoka tsy ho voahazona ny fitarainako!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Fa na dia ankehitriny izao aza, indro, any an-danitra ny Vavolombeloko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, ny Mpiantoka ahy dia any amin’ny avo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Mihomehy ahy ny sakaizako;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mandrotsa-dranomaso eo anatrehan’Andriamanitra kosa aho
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: mba hanamarina ahy olombelona eo anatrehany Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hanafa-tsiny ahy zanak’olombelona amin’ny sakaizako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Fa efa kely sisa ny taona hiainako
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka handeha any amin’ny lalana izay tsy hiverenako intsony aho.
