document_id: NEH.13,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Fanitsiam-pivavahana farany nataon’i Nehemia
  - type: text
    content: 'Tamin’ny andro iray dia novakina teo anatrehan’ny olona ny teny ao amin’ny Bokin’i Mosesy ka hita voasoratra ao fa tsy mahazo miditra amin’ny fiangonan’Andriamanitra mandrakizay ny Amonita sy ny Moabita '
  '10':
  - type: text
    content: 'Hitako fa tsy voaloa ny fiveloman’ny levita ka samy efa nandositra ho any an-tsahany avy ny levita sy ny mpihira izay nanao ny raharaha. '
  '11':
  - type: text
    content: 'Dia nifandahatra tamin’ny mpanapaka aho hoe: Nahoana no dia ilaozana ny tranon’Andriamanitra? Dia namory azy aho ka nametraka azy teo amin’ny toerany avy. '
  '12':
  - type: text
    content: 'Dia noentin’ny Joda rehetra ho ao amin’ny trano fitahirizana ny ampahafolon’ny vary sy ny ranom-boaloboka ary ny diloilo. '
  '13':
  - type: text
    content: Ary nanendry mpitandrina ny trano fitahirizana aho, dia i Selemia mpisorona sy i Zadoka mpitantsoratra ary i Pedaia avy tamin’ny levita; nanampy azy telo lahy i Hanana, zanak’i Zakora, zanak’i Matania; fa natao ho mahatoky ireo; ary ny adidin’ireo dia ny hizara ho an’ny rahalahiny.
  '14':
  - type: text
    content: Tsarovy aho noho izany, ry Andriamanitro ô, ka aza kosehina ny soa nataoko tao amin’ny tranon’Andriamanitro sy ny amin’ny raharaha tokony hatao ao.
  '15':
  - type: text
    content: 'Tamin’izany andro izany dia nahita aho fa ny sasany tany Joda dia nanosihosy tao amin’ny famiazam-boaloboka tamin’ny '
  - type: text
    content: Sabata
  - type: text
    content: ' sy nampiditra amboara ary nampitondra entana ny boriky sady nitondra divay sy voaloboka ary aviavy sy entana samihafa rehetra koa, izay noentiny ho any Jerosalema tamin’ny andro Sabata; dia nananatra azy mafy aho tamin’ny andro nivarotany hanina. '
  '16':
  - type: text
    content: 'Ary nisy Tiriana nitoetra tao, nitondra hazandrano sy varotra samihafa izy ireo ka nivarotra tamin’ny taranak’i Joda sy tany Jerosalema tamin’ny Sabata. '
  '17':
  - type: text
    content: 'Dia nifandahatra tamin’ireo olo-manankaja amin’ny Joda aho ka niteny taminy hoe: Inona izao zava-dratsy ataonareo izao no dia mandoto ny andro Sabata ianareo? '
  '18':
  - type: text
    content: Tsy nanao toy izao va ny razanareo ka nahatran’Andriamanitsika tamintsika sy amin’ity tanàna ity izao loza rehetra izao? Fa izao ianareo dia efa mampitombo indray ny fahatezerana mirehitra izay mihatra amin’ny Israely amin’ny andotoanareo ny Sabata.
  '19':
  - type: text
    content: 'Ary raha vao malomaloka ny vavahadin’i Jerosalema talohan’ny Sabata dia nasaiko nohidina ny vavahady ka tsy navelako hovohana mandra-pahatapitra ny Sabata; ary notendreko ny zatovoko sasany hiambina teo am-bavahady mba tsy hampidirana entana amin’ny andro Sabata. '
  '2':
  - type: text
    content: 'satria tsy nitsena ny Zanak’Israely tamin’ny hanina sy rano izy fa nanamby indray an’i Balama hanozona azy; kanjo nampodìn’Andriamanitsika ho fitahiana kosa ny fanozonana. '
  '20':
  - type: text
    content: 'Dia nandry teo ivelan’i Jerosalema indray mandeha na indroa ny mpivaro-mandeha sy ny mpivarotra zavatra samihafa; '
  '21':
  - type: text
    content: 'nananatra azy ireo mafy aho ka niteny taminy hoe: Nahoana ianareo no mandry eto anilan’ny manda? Raha mbola manao izany indray ianareo dia hosamboriko. Koa hatramin’izany andro izany dia tsy tonga tamin’ny Sabata intsony izy ireo.'
  '22':
  - type: text
    content: Ary nasaiko nanadio ny tenany ny levita ka ho avy hiambina eo am-bavahady mba hanamasinany ny andro Sabata.
  - type: text
    content: Tsarovy koa aho noho izany, ry Andriamanitro ô, ary iantrao aho araka ny haben’ny famindramponao.
  '23':
  - type: text
    content: 'Tamin’izany andro izany dia hitako ny '
  - type: text
    content: Jiosy
  - type: text
    content: ' izay efa nanambady vehivavy avy any Asdoda sy Amona ary Moaba; '
  '24':
  - type: text
    content: 'ary ny antsasaky ny zanany dia nanao tenin’ny Asdodita fa tsy nahay teny jiosy satria nanaraka ny fiteniny avy isam-poko izy. '
  '25':
  - type: text
    content: 'Dia nifandahatra taminy aho ka nanozona azy ary namely ny sasany sy nanongotra ny volony, dia nampianiana azy tamin’Andriamanitra hoe: Aza manome ny zanakareo vavy ho vadin’ny zanany lahy ary aza maka ny zanany vavy ho vadin’ny zanakareo lahy, na ho vadinareo. '
  '26':
  - type: text
    content: 'Tsy izany va no nanotan’i Solomona, mpanjakan’ny Israely? Kanefa tsy nisy mpanjaka tahaka azy tany amin’ny firenena maro, fa tian’Andriamaniny izy ka nataon’Andriamanitra mpanjaka tamin’ny Israely rehetra; kanefa na dia izy aza dia nampanotain’ny vehivavy hafa firenena. '
  '27':
  - type: text
    content: 'Ka moa mety va raha ianareo no re fa manao izao ratsy lehibe rehetra izao ka manota amin’Andriamanitsika amin’ny akanareo vehivavy hafa firenena ho vadinareo? '
  '28':
  - type: text
    content: 'Ary vinanton’i Sanibala horonita ny iray tamin’ny zanak’i Joiada, zanak’i Eliasiba, '
  - type: text
    content: Mpisoronabe
  - type: text
    content: ', dia noroahiko niala teo amiko izy. '
  '29':
  - type: text
    content: Tsarovy ireo, ry Andriamanitro ô, noho ny nandotoany ny fisoronana; eny, ny faneken’ny fisoronana sy ny levita.
  '3':
  - type: text
    content: Ary rehefa ren’ny olona ny lalàna dia navahany hiala tamin’ny Israely ny olona hafa firenena rehetra.
  '30':
  - type: text
    content: 'Toy izany no nanadiovako azy ho afaka tamin’ny olona hafa firenena rehetra sy nanendreko ny anjara raharahan’ny mpisorona sy ny levita samy ho amin’ny raharahany avy '
  '31':
  - type: text
    content: ary ny amin’ny fanaterana ny kitay hazo tamin’izay fotoanandrony sy ny voaloham-bokatra.
  - type: text
    content: Tsarovy aho ka hasoavy, ry Andriamanitro ô.
  '4':
  - type: text
    content: 'Talohan’izany, i Eliasiba mpisorona izay voatendry ho ao amin’ny efitrano ao amin’ny tranon’Andriamanitsika sady havana akaikin’i Tobia, '
  '5':
  - type: text
    content: 'dia nanamboatra efitrano lehibe ho an’i Tobia, dia ilay nitahirizana ny fanatitra avy amin’ny zavamaniry fahiny mbamin’ny ditin-kazo manitra sy ny fanaka ary ny ampahafolon’ny vary sy ny ranom-boaloboka ary ny diloilo izay anjara voadidy ho an’ny '
  - type: text
    content: levita
  - type: text
    content: ' sy ny mpihira ary ny mpiandry varavarana, ary nisy ny fanomezana ho an’ny mpisorona koa. '
  '6':
  - type: text
    content: 'Fa tamin’izany rehetra izany dia tsy mba tany Jerosalema aho; fa tamin’ny taona faharoa amby telopolo nanjakan’i Artaksersesy, mpanjakan’i Babilona, no nahatongavako tany amin’ny mpanjaka. Nony taoriandriana kely aho vao mba niera taminy; '
  '7':
  - type: text
    content: 'dia nankany Jerosalema aho ka nahita ny ratsy nataon’i Eliasiba ho an’i Tobia tamin’ny nanamboarany efitrano ho azy teo anatin’ny kianjan’ny tranon’Andriamanitra. '
  '8':
  - type: text
    content: 'Dia nalahelo indrindra aho ka navoakako hiala tao amin’ny efitrano ny fanaka rehetra izay an’i Tobia. '
  '9':
  - type: text
    content: Ary nasaiko nodiovin’ny olona ny efitrano, dia naveriko tao indray ny fanaky ny tranon’Andriamanitra mbamin’ny fanatitra avy amin’ny zavamaniry sy ny ditin-kazo manitra.
