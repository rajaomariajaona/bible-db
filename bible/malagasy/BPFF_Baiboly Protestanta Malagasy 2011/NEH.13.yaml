document_id: NEH.13,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fanitsiam-pivavahana farany nataon’i Nehemia
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Tamin’ny andro iray dia novakina teo anatrehan’ny olona ny teny ao amin’ny Bokin’i Mosesy ka hita voasoratra ao fa tsy mahazo miditra amin’ny fiangonan’Andriamanitra mandrakizay ny Amonita sy ny Moabita '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Hitako fa tsy voaloa ny fiveloman’ny levita ka samy efa nandositra ho any an-tsahany avy ny levita sy ny mpihira izay nanao ny raharaha. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Dia nifandahatra tamin’ny mpanapaka aho hoe: Nahoana no dia ilaozana ny tranon’Andriamanitra? Dia namory azy aho ka nametraka azy teo amin’ny toerany avy. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Dia noentin’ny Joda rehetra ho ao amin’ny trano fitahirizana ny ampahafolon’ny vary sy ny ranom-boaloboka ary ny diloilo. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Ary nanendry mpitandrina ny trano fitahirizana aho, dia i Selemia mpisorona sy i Zadoka mpitantsoratra ary i Pedaia avy tamin’ny levita; nanampy azy telo lahy i Hanana, zanak’i Zakora, zanak’i Matania; fa natao ho mahatoky ireo; ary ny adidin’ireo dia ny hizara ho an’ny rahalahiny.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Tsarovy aho noho izany, ry Andriamanitro ô, ka aza kosehina ny soa nataoko tao amin’ny tranon’Andriamanitro sy ny amin’ny raharaha tokony hatao ao.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Tamin’izany andro izany dia nahita aho fa ny sasany tany Joda dia nanosihosy tao amin’ny famiazam-boaloboka tamin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Sabata
    - type: text
      text: ' sy nampiditra amboara ary nampitondra entana ny boriky sady nitondra divay sy voaloboka ary aviavy sy entana samihafa rehetra koa, izay noentiny ho any Jerosalema tamin’ny andro Sabata; dia nananatra azy mafy aho tamin’ny andro nivarotany hanina. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Ary nisy Tiriana nitoetra tao, nitondra hazandrano sy varotra samihafa izy ireo ka nivarotra tamin’ny taranak’i Joda sy tany Jerosalema tamin’ny Sabata. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Dia nifandahatra tamin’ireo olo-manankaja amin’ny Joda aho ka niteny taminy hoe: Inona izao zava-dratsy ataonareo izao no dia mandoto ny andro Sabata ianareo? '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Tsy nanao toy izao va ny razanareo ka nahatran’Andriamanitsika tamintsika sy amin’ity tanàna ity izao loza rehetra izao? Fa izao ianareo dia efa mampitombo indray ny fahatezerana mirehitra izay mihatra amin’ny Israely amin’ny andotoanareo ny Sabata.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Ary raha vao malomaloka ny vavahadin’i Jerosalema talohan’ny Sabata dia nasaiko nohidina ny vavahady ka tsy navelako hovohana mandra-pahatapitra ny Sabata; ary notendreko ny zatovoko sasany hiambina teo am-bavahady mba tsy hampidirana entana amin’ny andro Sabata. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'satria tsy nitsena ny Zanak’Israely tamin’ny hanina sy rano izy fa nanamby indray an’i Balama hanozona azy; kanjo nampodìn’Andriamanitsika ho fitahiana kosa ny fanozonana. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Dia nandry teo ivelan’i Jerosalema indray mandeha na indroa ny mpivaro-mandeha sy ny mpivarotra zavatra samihafa; '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'nananatra azy ireo mafy aho ka niteny taminy hoe: Nahoana ianareo no mandry eto anilan’ny manda? Raha mbola manao izany indray ianareo dia hosamboriko. Koa hatramin’izany andro izany dia tsy tonga tamin’ny Sabata intsony izy ireo.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Ary nasaiko nanadio ny tenany ny levita ka ho avy hiambina eo am-bavahady mba hanamasinany ny andro Sabata.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tsarovy koa aho noho izany, ry Andriamanitro ô, ary iantrao aho araka ny haben’ny famindramponao.
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Tamin’izany andro izany dia hitako ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jiosy
    - type: text
      text: ' izay efa nanambady vehivavy avy any Asdoda sy Amona ary Moaba; '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'ary ny antsasaky ny zanany dia nanao tenin’ny Asdodita fa tsy nahay teny jiosy satria nanaraka ny fiteniny avy isam-poko izy. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Dia nifandahatra taminy aho ka nanozona azy ary namely ny sasany sy nanongotra ny volony, dia nampianiana azy tamin’Andriamanitra hoe: Aza manome ny zanakareo vavy ho vadin’ny zanany lahy ary aza maka ny zanany vavy ho vadin’ny zanakareo lahy, na ho vadinareo. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Tsy izany va no nanotan’i Solomona, mpanjakan’ny Israely? Kanefa tsy nisy mpanjaka tahaka azy tany amin’ny firenena maro, fa tian’Andriamaniny izy ka nataon’Andriamanitra mpanjaka tamin’ny Israely rehetra; kanefa na dia izy aza dia nampanotain’ny vehivavy hafa firenena. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Ka moa mety va raha ianareo no re fa manao izao ratsy lehibe rehetra izao ka manota amin’Andriamanitsika amin’ny akanareo vehivavy hafa firenena ho vadinareo? '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Ary vinanton’i Sanibala horonita ny iray tamin’ny zanak’i Joiada, zanak’i Eliasiba, '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Mpisoronabe
    - type: text
      text: ', dia noroahiko niala teo amiko izy. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Tsarovy ireo, ry Andriamanitro ô, noho ny nandotoany ny fisoronana; eny, ny faneken’ny fisoronana sy ny levita.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Ary rehefa ren’ny olona ny lalàna dia navahany hiala tamin’ny Israely ny olona hafa firenena rehetra.
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Toy izany no nanadiovako azy ho afaka tamin’ny olona hafa firenena rehetra sy nanendreko ny anjara raharahan’ny mpisorona sy ny levita samy ho amin’ny raharahany avy '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: ary ny amin’ny fanaterana ny kitay hazo tamin’izay fotoanandrony sy ny voaloham-bokatra.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tsarovy aho ka hasoavy, ry Andriamanitro ô.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Talohan’izany, i Eliasiba mpisorona izay voatendry ho ao amin’ny efitrano ao amin’ny tranon’Andriamanitsika sady havana akaikin’i Tobia, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'dia nanamboatra efitrano lehibe ho an’i Tobia, dia ilay nitahirizana ny fanatitra avy amin’ny zavamaniry fahiny mbamin’ny ditin-kazo manitra sy ny fanaka ary ny ampahafolon’ny vary sy ny ranom-boaloboka ary ny diloilo izay anjara voadidy ho an’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: levita
    - type: text
      text: ' sy ny mpihira ary ny mpiandry varavarana, ary nisy ny fanomezana ho an’ny mpisorona koa. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Fa tamin’izany rehetra izany dia tsy mba tany Jerosalema aho; fa tamin’ny taona faharoa amby telopolo nanjakan’i Artaksersesy, mpanjakan’i Babilona, no nahatongavako tany amin’ny mpanjaka. Nony taoriandriana kely aho vao mba niera taminy; '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'dia nankany Jerosalema aho ka nahita ny ratsy nataon’i Eliasiba ho an’i Tobia tamin’ny nanamboarany efitrano ho azy teo anatin’ny kianjan’ny tranon’Andriamanitra. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Dia nalahelo indrindra aho ka navoakako hiala tao amin’ny efitrano ny fanaka rehetra izay an’i Tobia. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Ary nasaiko nodiovin’ny olona ny efitrano, dia naveriko tao indray ny fanaky ny tranon’Andriamanitra mbamin’ny fanatitra avy amin’ny zavamaniry sy ny ditin-kazo manitra.
