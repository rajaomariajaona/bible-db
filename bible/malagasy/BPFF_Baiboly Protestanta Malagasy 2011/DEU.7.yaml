document_id: DEU.7,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Israely, vahoaka voatokana ho an’Andriamanitra
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa entin’NY TOMPO Andriamanitrao ianao ka tafiditra any amin’ny tany izay efa hidiranao holovana dia firenena maro, izay firenena fito lehibe sy mahery noho ianao, no ho voaroakany hiala eo anoloanao: Ny Hetita, ny Girgasita, ny Amorita, ny Kananita, ny Perizita, ny Hivita, ary ny Jebosita. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary mamaly miharihary amin’ny fandringanana izay mandrafy Azy fa tsy hitaredretra. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Koa tandremo ny lalàna sy ny didy ary ny fitsipika, izay omeko anao anio, mba arahinao tsara.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha mihaino ireo fitsipika ireo ianareo ka mitandrina sy manaraka azy dia hotanterahin’NY TOMPO Andriamanitrao aminao ny fanekena sy ny famindrampo izay nianianany tamin’ny razanao. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ho tia anao sy hitahy anao ary hahamaro anao Izy; hitahy ny ateraky ny kibonao sy ny vokatry ny taninao, dia ny varinao sy ny ranom-boalobokao ary ny menakao; hitahy ny ateraky ny ombinao sy ny ateraky ny ondry aman’osinao any amin’ny tany izay nianianany tamin’ny razanao homena anao. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hotahìna mihoatra noho ny firenena rehetra ianao; tsy hisy lahy na vavy tsy hiteraka, na ianareo na ny biby fiompinareo. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Harovan’NY TOMPO amin’ny aretina koa ianao ka tsy hisy hamelezany anao ny aretin-dratsin’i Ejipta, izay fantatrao; nefa hataony amin’izay rehetra mankahala anao kosa ireny. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Holevoninao ny firenena rehetra izay hatolotry NY TOMPO Andriamanitrao anao, koa aoka tsy hiantra azy ny masonao; ary aza manompo ny andriamaniny, fa ho fandrika aminao ireny.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: NY TOMPO, mpiaro ny vahoakany
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha hoy ianao anakampo hoe: Maro noho izaho ireo firenena ireo, koa hataoko ahoana no fahay mandroaka azy? '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia aza matahotra azy ianao; fa tsarovy tsara izay nataon’NY TOMPO Andriamanitrao tamin’i Farao sy ny Ejiptiana rehetra, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia ny fizahan-toetra lehibe izay efa hitan’ny masonao, ny famantarana, ny fahagagana, ny tanana mahery ary ny sandry nitsotra, izay namoahan’NY TOMPO Andriamanitrao anao avy tany; fa toy izany no hataon’NY TOMPO Andriamanitrao amin’ny firenena rehetra izay atahoranao. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa voatolotry NY TOMPO Andriamanitrao eo anoloanao ireny ka resinao dia ataovy ho zavatra voaozona mihitsy izy ireny fa aza manao fanekena aminy na mamindra fo aminy. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny fanenitra koa dia hampandehanin’NY TOMPO Andriamanitrao ho eo amin’izy ireo mandra-paharingan’izay sisa velona sy izay efa niery ka tsy hitanao. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aza matahotra azy ianao; fa NY TOMPO Andriamanitrao no eo aminao, dia Andriamanitra lehibe sy mahatahotra. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Horoahin’NY TOMPO Andriamanitrao eo alohanao tsikelikely ireny firenena ireny; tsy haharoaka azy haingana ianao, fandrao hihamaro ny bibidia ka hamely anao. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hatolotry NY TOMPO Andriamanitrao eo anoloanao izy ka hataony mifanaritaka be ihany mandra-pahalany ritra azy. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hatolony eo an-tananao ka hofoananao tsy ho re etỳ ambanin’ny lanitra ny anarany; tsy hisy olona hahajanona eo anoloanao fa haringanao avokoa izy rehetra mandra-pahalaniny. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny sarin-javatra voasokitra, izay andriamaniny, dia hodoranareo amin’ny afo; aza mitsiriritra ny volafotsy na ny volamena izay eo aminy, na maka izany ho anao, fandrao ho voafandriny ianao, fa fahavetavetana eo imason’NY TOMPO Andriamanitrao izany. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary aza mitondra fahavetavetana ho ao an-tranonao, fandrao ho tonga zavatra voaozona tahaka izany koa ianao; ho halanao sy ho fahavetavetana eo imasonao indrindra izany satria zavatra voaozona.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aza mifanambady anaka aminy; ny zanakao vavy dia tsy homenao ho vadin’ny zanany lahy, ary ny zanany vavy dia tsy halainao ho vadin’ny zanakao lahy. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hampiala ny zanakao lahy amin’ny fanarahana Ahy izy mba hanompoany andriamanitra hafa, dia hirehitra aminareo ny fahatezeran’NY TOMPO ka handringana anao vetivety Izy. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa izao kosa no ataovinareo aminy: Horavanareo ny alitarany, hovakivakinareo ny tsangambaton-tsampiny, hokapainareo ny tsangankazon-tsampy ho an’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Aserahany
    - type: text
      text: ' ary hodoranareo amin’ny afo ny sarin-javatra voasokitra.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa firenena masina ho an’NY TOMPO Andriamanitrao ianao; satria ianao dia firenena efa nofidin’NY TOMPO Andriamanitrao ho fananany sarobidy indrindra mihoatra noho ny firenena rehetra ambonin’ny tany.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Tsy mivadika amin’ny fanekem-pihavanany NY TOMPO
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsy ny hamaroanareo mihoatra noho ny firenena rehetra anefa no niraiketan’ny fitiavan’NY TOMPO taminareo sy nifidianany anareo, fa ianareo dia vitsy aza noho ny firenena rehetra '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fa ny nitiavan’NY TOMPO anareo sy ny nitandremany ny fianianana izay efa nianianany tamin’ny razanareo no nitondran’NY TOMPO anareo tamin’ny tanany mahery sy nanavotany anareo tamin’ny trano nanandevozana, dia tamin’ny tanan’i Farao, mpanjakan’i Ejipta. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa aoka ho fantatrao fa NY TOMPO Andriamanitrao ihany no Andriamanitra, dia Andriamanitra mahatoky, izay mitandrina fanekena sy famindrampo amin’izay tia Azy sy mitandrina ny didiny, hatramin’ny taranaka arivo mandimby, '
