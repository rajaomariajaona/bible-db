document_id: PSA.50,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Miseho Andriamanitra mba hanambara ny fitsaràny
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: Salamo nataon’i Asafa.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Andriamanitra, NY TOMPO Andriamanitra, no miteny ka miantso ny tany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hatrany amin’ny fiposahan’ny masoandro ka hatrany amin’ny filentehany.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Fa Ahy ny biby rehetra any an’ala
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny biby fiompy arivoarivo eny an-tendrombohitra;
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: fantatro ny vorona rehetra eny an-tendrombohitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary Ahy avokoa ny zava-mihetsiketsika eny an-tsaha.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Raha mba noana Aho dia tsy hilaza aminao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa Ahy izao tontolo izao sy izay rehetra eo aminy.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Mihinana ny nofon’ny ombilahy va Aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na misotro ny ran’osilahy?
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Manolora fanati-pisaorana ho an’Andriamanitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary efao amin’ny Avo Indrindra ny voadinao.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Antsoy Aho amin’ny andro fahoriana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hanafaka anao Aho ka hanome voninahitra Ahy ianao.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Hoy Andriamanitra amin’ny ratsy fanahy:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nahoana ianao no mitanisa ny lalànako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy mitondra ny fanekeko eo am-bavanao?
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Nefa ianao dia mankahala fananarana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady arianao any ivohonao ny teniko!
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Raha mahita mpangalatra ianao dia faly hikambana aminy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady miray anjara amin’ny mpijangajanga.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Avelanao hiteny ratsy ny vavanao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady mamorom-pitaka ny lelanao.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Avy ao '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Ziona
    - type: text
      text: ' izay tanteraka amin’ny hatsaran-tarehy'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no amirapiratan’Andriamanitra.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Mipetraka miteny ratsy ny rahalahinao ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady manendrikendrika ny zanaky ny reninao.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Izany no nataonao nefa nangina ihany Aho.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia noheverinao fa mitovy aminao ihany Aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa hananatra anao Aho ka handahatra izany eo imasonao.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Mihevera izany ankehitriny, ianareo izay manadino an’Andriamanitra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fandrao hamiravira Aho ka tsy hisy hanafaka.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Izay manolotra fanati-pisaorana no manome voninahitra Ahy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay mitandrina ny lalany no hanehoako ny famonjen’Andriamanitra.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Avy Andriamanitsika ka tsy hangina;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: afo no mandevona eo alohany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tafio-drivotra mahery no manodidina Azy.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Miantso ny lanitra any ambony
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'sy ny tany koa Izy mba hitsarany ny olony:'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Angony etỳ Amiko ny olona mahatoky Ahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia izay manao fanekena Amiko amin’ny fanatitra!
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Holazain’ny lanitra ny fahamarinany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'satria Andriamanitra no Mpitsara. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Fiatoana
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Mihainoa, ry oloko, fa hiteny Aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ry Israely ô, mihainoa fa hanambara aminao Aho:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izaho no Andriamanitra, dia Andriamanitrao.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Tsy ny fanatitrao no ananarako anao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary eo anatrehako mandrakariva ny fanatitra dorana manontolo natolotrao.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Tsy haka vantotra ombilahy ao amin’ny tranonao Aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na osilahy ao amin’ny valanao.
