document_id: PSA.50,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Miseho Andriamanitra mba hanambara ny fitsaràny
  - type: text
    content: Salamo nataon’i Asafa.
  - type: text
    content: Andriamanitra, NY TOMPO Andriamanitra, no miteny ka miantso ny tany
  - type: text
    content: hatrany amin’ny fiposahan’ny masoandro ka hatrany amin’ny filentehany.
  '10':
  - type: text
    content: Fa Ahy ny biby rehetra any an’ala
  - type: text
    content: sy ny biby fiompy arivoarivo eny an-tendrombohitra;
  '11':
  - type: text
    content: fantatro ny vorona rehetra eny an-tendrombohitra
  - type: text
    content: ary Ahy avokoa ny zava-mihetsiketsika eny an-tsaha.
  '12':
  - type: text
    content: Raha mba noana Aho dia tsy hilaza aminao
  - type: text
    content: fa Ahy izao tontolo izao sy izay rehetra eo aminy.
  '13':
  - type: text
    content: Mihinana ny nofon’ny ombilahy va Aho
  - type: text
    content: na misotro ny ran’osilahy?
  '14':
  - type: text
    content: Manolora fanati-pisaorana ho an’Andriamanitra
  - type: text
    content: ary efao amin’ny Avo Indrindra ny voadinao.
  '15':
  - type: text
    content: Antsoy Aho amin’ny andro fahoriana
  - type: text
    content: dia hanafaka anao Aho ka hanome voninahitra Ahy ianao.
  '16':
  - type: text
    content: 'Hoy Andriamanitra amin’ny ratsy fanahy:'
  - type: text
    content: Nahoana ianao no mitanisa ny lalànako
  - type: text
    content: sy mitondra ny fanekeko eo am-bavanao?
  '17':
  - type: text
    content: Nefa ianao dia mankahala fananarana
  - type: text
    content: sady arianao any ivohonao ny teniko!
  '18':
  - type: text
    content: Raha mahita mpangalatra ianao dia faly hikambana aminy
  - type: text
    content: sady miray anjara amin’ny mpijangajanga.
  '19':
  - type: text
    content: Avelanao hiteny ratsy ny vavanao
  - type: text
    content: sady mamorom-pitaka ny lelanao.
  '2':
  - type: text
    content: 'Avy ao '
  - type: text
    content: Ziona
  - type: text
    content: ' izay tanteraka amin’ny hatsaran-tarehy'
  - type: text
    content: no amirapiratan’Andriamanitra.
  '20':
  - type: text
    content: Mipetraka miteny ratsy ny rahalahinao ianao
  - type: text
    content: sady manendrikendrika ny zanaky ny reninao.
  '21':
  - type: text
    content: Izany no nataonao nefa nangina ihany Aho.
  - type: text
    content: Dia noheverinao fa mitovy aminao ihany Aho
  - type: text
    content: nefa hananatra anao Aho ka handahatra izany eo imasonao.
  '22':
  - type: text
    content: Mihevera izany ankehitriny, ianareo izay manadino an’Andriamanitra,
  - type: text
    content: fandrao hamiravira Aho ka tsy hisy hanafaka.
  '23':
  - type: text
    content: Izay manolotra fanati-pisaorana no manome voninahitra Ahy;
  - type: text
    content: izay mitandrina ny lalany no hanehoako ny famonjen’Andriamanitra.
  '3':
  - type: text
    content: Avy Andriamanitsika ka tsy hangina;
  - type: text
    content: afo no mandevona eo alohany
  - type: text
    content: ary tafio-drivotra mahery no manodidina Azy.
  '4':
  - type: text
    content: Miantso ny lanitra any ambony
  - type: text
    content: 'sy ny tany koa Izy mba hitsarany ny olony:'
  '5':
  - type: text
    content: Angony etỳ Amiko ny olona mahatoky Ahy
  - type: text
    content: dia izay manao fanekena Amiko amin’ny fanatitra!
  '6':
  - type: text
    content: Holazain’ny lanitra ny fahamarinany
  - type: text
    content: 'satria Andriamanitra no Mpitsara. '
  - type: text
    content: Fiatoana
  '7':
  - type: text
    content: Mihainoa, ry oloko, fa hiteny Aho;
  - type: text
    content: 'ry Israely ô, mihainoa fa hanambara aminao Aho:'
  - type: text
    content: Izaho no Andriamanitra, dia Andriamanitrao.
  '8':
  - type: text
    content: Tsy ny fanatitrao no ananarako anao
  - type: text
    content: ary eo anatrehako mandrakariva ny fanatitra dorana manontolo natolotrao.
  '9':
  - type: text
    content: Tsy haka vantotra ombilahy ao amin’ny tranonao Aho
  - type: text
    content: na osilahy ao amin’ny valanao.
