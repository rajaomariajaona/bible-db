type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ziona, tanindrazan’ny firenena rehetra
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: Salamo nataon’ny Koraìta. Tononkira.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ny naorin’NY TOMPO dia eo amin’ny tendrombohitra masina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ny vavahadin’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Ziona
  - type: text
    text: ' dia tian’NY TOMPO'
- type: usfm
  marker: q1
  children:
  - type: text
    text: mihoatra noho ny fonenana rehetra izay an’i Jakoba.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Zava-malaza no nolazaina momba anao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ry tanànan’Andriamanitra. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Fiatoana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Hanonona an’i Ejipta sy Babilona Aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho isan’izay mahalala Ahy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: indro ny tanin’ny Filistina sy i Tiro mbamin’i Kosy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ity dia teraka tao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary i Ziona dia hilazana hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ireto sy ireroa dia samy teraka tao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny Avo Indrindra no mampitoetra azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'NY TOMPO hanisa, raha manoratra ny firenena Izy:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ity dia teraka tao. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Fiatoana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Hoy izay mihira sy mandihy:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny loharanoko rehetra dia ao Aminao.
