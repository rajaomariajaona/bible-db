document_id: PSA.87,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ziona, tanindrazan’ny firenena rehetra
  - type: text
    content: Salamo nataon’ny Koraìta. Tononkira.
  - type: text
    content: Ny naorin’NY TOMPO dia eo amin’ny tendrombohitra masina.
  '2':
  - type: text
    content: 'Ny vavahadin’i '
  - type: text
    content: Ziona
  - type: text
    content: ' dia tian’NY TOMPO'
  - type: text
    content: mihoatra noho ny fonenana rehetra izay an’i Jakoba.
  '3':
  - type: text
    content: Zava-malaza no nolazaina momba anao,
  - type: text
    content: 'ry tanànan’Andriamanitra. '
  - type: text
    content: Fiatoana.
  '4':
  - type: text
    content: Hanonona an’i Ejipta sy Babilona Aho
  - type: text
    content: ho isan’izay mahalala Ahy;
  - type: text
    content: indro ny tanin’ny Filistina sy i Tiro mbamin’i Kosy,
  - type: text
    content: ity dia teraka tao.
  '5':
  - type: text
    content: 'Ary i Ziona dia hilazana hoe:'
  - type: text
    content: Ireto sy ireroa dia samy teraka tao;
  - type: text
    content: ny Avo Indrindra no mampitoetra azy.
  '6':
  - type: text
    content: 'NY TOMPO hanisa, raha manoratra ny firenena Izy:'
  - type: text
    content: 'Ity dia teraka tao. '
  - type: text
    content: Fiatoana.
  '7':
  - type: text
    content: 'Hoy izay mihira sy mandihy:'
  - type: text
    content: Ny loharanoko rehetra dia ao Aminao.
