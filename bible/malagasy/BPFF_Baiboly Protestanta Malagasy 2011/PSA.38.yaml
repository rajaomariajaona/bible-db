document_id: PSA.38,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Vavaka ataon’ny marary izay miaiky ny fahotany
  - type: text
    content: Salamo nataon’i Davida. Ho fampahatsiarovana.
  - type: text
    content: TOMPO ô, aza ny fahatezeranao no ananaranao ahy
  - type: text
    content: ary aza ny fahaviniranao no amaizanao ahy!
  '10':
  - type: text
    content: Miemponempona ny foko, nandao ahy ny heriko;
  - type: text
    content: tsy ato amiko intsony na ny fahiratan’ny masoko aza.
  '11':
  - type: text
    content: Manalavitra ny aretiko ny namako sy ny sakaizako
  - type: text
    content: ary mijanona eny lavitra eny ny havako.
  '12':
  - type: text
    content: Manao vela-pandrika ireo izay mitady ny aiko
  - type: text
    content: ary miteny fampihorohoroana ireo izay mitady hanimba ahy
  - type: text
    content: sady miteny fitaka mandrakariva.
  '13':
  - type: text
    content: Fa izaho dia tahaka ny marenina ka tsy mandre
  - type: text
    content: ary tahaka ny moana ka tsy mahaloa-bava;
  '14':
  - type: text
    content: eny, tahaka ny olona tsy mandre
  - type: text
    content: sady tsy misy teny havaly eo am-bavany.
  '15':
  - type: text
    content: Fa Ianao no antenaiko, TOMPO ô;
  - type: text
    content: Ianao no hamaly, ry Tompo Andriamanitro ô.
  '16':
  - type: text
    content: 'Fa hoy aho: Sao dia hifalian’izy ireo anie aho;'
  - type: text
    content: raha mibolasitra ny tongotro dia hirehareha amiko izy!
  '17':
  - type: text
    content: Fa efa ho lavo aho
  - type: text
    content: ary ny fanaintainako dia tsaroako mandrakariva.
  '18':
  - type: text
    content: Fa ibabohako ny heloko;
  - type: text
    content: matahotra aho noho ny fahotako.
  '19':
  - type: text
    content: Fa velona ihany ny fahavaloko sady mahery,
  - type: text
    content: maro no mankahala ahy tsy amin’antony;
  '2':
  - type: text
    content: Fa mitsatoka amiko ny zana-tsipìkanao
  - type: text
    content: ary manindry ahy mafy ny tananao.
  '20':
  - type: text
    content: mamaly ratsy ny soa izy ireo
  - type: text
    content: ka mandrafy ahy ho valin’ny fikatsahako ny tsara.
  '21':
  - type: text
    content: Aza mahafoy ahy, RY TOMPO ô!
  - type: text
    content: Ry Andriamanitro ô, aza manalavitra ahy!
  '22':
  - type: text
    content: Faingàna hamonjy ahy,
  - type: text
    content: ry Tompo, Mpamonjy ahy, ô!
  '3':
  - type: text
    content: Tsy misy fahasalamana ao amin’ny nofoko noho ny fahatezeranao;
  - type: text
    content: tsy misy fiadanana ao amin’ny taolako noho ny fahotako.
  '4':
  - type: text
    content: Fa mihoatra ny lohako ny heloko;
  - type: text
    content: tahaka ny entana mavesatra izany ka tsy zakako.
  '5':
  - type: text
    content: Maimbo sady mihalalina ny feriko
  - type: text
    content: noho ny hadalako.
  '6':
  - type: text
    content: Mitanondrika sy mijoretra izay tsy izy aho
  - type: text
    content: ary toy ny misaona mandrakariva.
  '7':
  - type: text
    content: Mamaivay avokoa ny voako
  - type: text
    content: ka tsy misy izay salama ao amin’ny nofoko.
  '8':
  - type: text
    content: Marikoditra aho sady torovana indrindra,
  - type: text
    content: midradradradra aho sady mitoloko ny foko.
  '9':
  - type: text
    content: Tompo ô, eo anatrehanao ny faniriako rehetra;
  - type: text
    content: tsy mba miafina Aminao ny fisentoako.
