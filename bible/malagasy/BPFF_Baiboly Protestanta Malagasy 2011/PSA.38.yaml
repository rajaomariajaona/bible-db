document_id: PSA.38,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Vavaka ataon’ny marary izay miaiky ny fahotany
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: Salamo nataon’i Davida. Ho fampahatsiarovana.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: TOMPO ô, aza ny fahatezeranao no ananaranao ahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary aza ny fahaviniranao no amaizanao ahy!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Miemponempona ny foko, nandao ahy ny heriko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy ato amiko intsony na ny fahiratan’ny masoko aza.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Manalavitra ny aretiko ny namako sy ny sakaizako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mijanona eny lavitra eny ny havako.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Manao vela-pandrika ireo izay mitady ny aiko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary miteny fampihorohoroana ireo izay mitady hanimba ahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady miteny fitaka mandrakariva.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Fa izaho dia tahaka ny marenina ka tsy mandre
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tahaka ny moana ka tsy mahaloa-bava;
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: eny, tahaka ny olona tsy mandre
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady tsy misy teny havaly eo am-bavany.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Fa Ianao no antenaiko, TOMPO ô;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ianao no hamaly, ry Tompo Andriamanitro ô.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Fa hoy aho: Sao dia hifalian’izy ireo anie aho;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: raha mibolasitra ny tongotro dia hirehareha amiko izy!
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Fa efa ho lavo aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny fanaintainako dia tsaroako mandrakariva.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Fa ibabohako ny heloko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: matahotra aho noho ny fahotako.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Fa velona ihany ny fahavaloko sady mahery,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: maro no mankahala ahy tsy amin’antony;
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Fa mitsatoka amiko ny zana-tsipìkanao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary manindry ahy mafy ny tananao.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: mamaly ratsy ny soa izy ireo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka mandrafy ahy ho valin’ny fikatsahako ny tsara.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Aza mahafoy ahy, RY TOMPO ô!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ry Andriamanitro ô, aza manalavitra ahy!
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Faingàna hamonjy ahy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ry Tompo, Mpamonjy ahy, ô!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Tsy misy fahasalamana ao amin’ny nofoko noho ny fahatezeranao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy misy fiadanana ao amin’ny taolako noho ny fahotako.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Fa mihoatra ny lohako ny heloko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tahaka ny entana mavesatra izany ka tsy zakako.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Maimbo sady mihalalina ny feriko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: noho ny hadalako.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Mitanondrika sy mijoretra izay tsy izy aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary toy ny misaona mandrakariva.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Mamaivay avokoa ny voako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy misy izay salama ao amin’ny nofoko.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Marikoditra aho sady torovana indrindra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: midradradradra aho sady mitoloko ny foko.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Tompo ô, eo anatrehanao ny faniriako rehetra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy mba miafina Aminao ny fisentoako.
