document_id: ISA.7,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Hafatry NY TOMPO ho an’i Ahaza mpanjaka
  - type: text
    content: 'Tamin’ny andron’i Ahaza, zanak’i Jotama, zanak’i Ozia mpanjakan’ny Joda, no niakaran’i Rezina, mpanjakan’i Arama, sy i Peka, zanak’i Remalia mpanjakan’ny Israely, hanafika an’i Jerosalema, nefa tsy afaka niady taminy izy. '
  '10':
  - type: text
    content: 'Mbola niteny tamin’i Ahaza ihany NY TOMPO hoe: '
  '11':
  - type: text
    content: 'Mangataha famantarana avy amin’NY TOMPO Andriamanitrao; eny, mangataha na ho avy amin’ny '
  - type: text
    content: lalina
  - type: text
    content: ', any amin’ny '
  - type: text
    content: fitoeran’ny maty
  - type: text
    content: ', na avy any amin’ny avo, any ambony indrindra any. '
  '12':
  - type: text
    content: 'Hoy anefa i Ahaza: Tsy hangataka aho, tsy haka fanahy NY TOMPO aho.'
  '13':
  - type: text
    content: 'Dia hoy Isaia: Mihainoa ary, ry taranak’i Davida! Heverinareo ho zavatra kely foana va ny hanasatra ny olona no mbola hanasatra an’Andriamanitro koa ianareo? '
  '14':
  - type: text
    content: 'Noho izany dia ny Tompo no hanome famantarana ho anareo: Indro, hanana anaka ny virijiny ka hiteraka zazalahy; ny anarany hataony hoe Imanoela, izany hoe: Amintsika Andriamanitra. '
  '15':
  - type: text
    content: 'Rehefa mahalala handa ny ratsy sy hifidy ny tsara ny zaza dia rononomandry sy tantely no ho fihinany. '
  '16':
  - type: text
    content: 'Fa raha tsy mbola mahalala handa ny ratsy sy hifidy ny tsara akory izany zaza izany dia ho lao ny tanin’ireo mpanjaka roa maharaiki-tahotra anao ireo. '
  '17':
  - type: text
    content: NY TOMPO hahatonga aminao sy ny olonao ary ny fianakavian’ny rainao izay andro tsy mbola nisy toa azy hatramin’ny andro nialan’i Efraima tamin’ny Joda. Ny mpanjakan’i Asiria izany.
  '18':
  - type: text
    content: Amin’izany andro izany, NY TOMPO hisiaka hiantso ny lalitra
  - type: text
    content: izay any amin’ny faran’ny onin’i Ejipta,
  - type: text
    content: sy ny renitantely izay any amin’ny tany Asiria;
  '19':
  - type: text
    content: dia ho avy ireo ka samy hipetraka any amin’ny lohasahan-driaka,
  - type: text
    content: eny an-tsefatsefaky ny harambato,
  - type: text
    content: eny amin’ny fefy tsilo rehetra,
  - type: text
    content: ary eny amin’ny saha fiandrasana rehetra.
  '2':
  - type: text
    content: 'Dia nambara tamin’ny taranak’i Davida hoe: Injao ny Arameana efa mitoby any amin’ny Efraima. Ary nihovotrovotra ny fony sy ny fon’ny vahoakany, toy ny fihovitrovitry ny hazo any an’ala raha asian’ny rivotra. '
  '20':
  - type: text
    content: Amin’izany andro izany koa dia hoharatan’ny Tompo
  - type: text
    content: amin’ny hareza nofaina tany ampitan’ny ony Eofrata,
  - type: text
    content: miaraka amin’ny mpanjakan’i Asiria,
  - type: text
    content: ny loha sy ny volon-tongotra;
  - type: text
    content: ary hokakasany koa ny volombava.
  '21':
  - type: text
    content: Amin’izany andro izany
  - type: text
    content: dia samy hiompy ombivavy kely sy ondry roa ny olona.
  '22':
  - type: text
    content: Ho be tokoa ny ronono azo avy amin’ireo
  - type: text
    content: ka hihinana rononomandry ny olona;
  - type: text
    content: rononomandry sy tantely no ho fihinan’ny olona sisa rehetra ao amin’ny tany.
  '23':
  - type: text
    content: Amin’izany andro izany
  - type: text
    content: dia ho rakotry ny anjavidy sy ny tsilo
  - type: text
    content: ny tany rehetra izay nisy voaloboka arivo fototra tokony ho arivo sekela.
  '24':
  - type: text
    content: Zana-tsipìka sy tsipìka no hoentin’izay miditra ao
  - type: text
    content: satria rakotry ny anjavidy sy ny tsilo ny tany rehetra.
  '25':
  - type: text
    content: Ary ny havoana rehetra izay nohavàna tamin’ny angady
  - type: text
    content: 'dia tsy ho sahinao diavina noho ny fahatahorana ny anjavidy sy ny tsilo:'
  - type: text
    content: Ho falehan’ny omby
  - type: text
    content: sy ho voahitsakitsaky ny ondry aman’osy izany.
  '3':
  - type: text
    content: 'Ary hoy NY TOMPO tamin’Isaia: Mivoaha ianao sy i Seara-Iasoba'
  - type: note
    content: 'Seara-Iasoba: Hisy sisa hiverina.'
  - type: text
    content: ' zanakao hitsena an’i Ahaza eo amin’ny faran’ny lakandrano amin’ny kamory ambony, eo amin’ny lalambe mankany amin’ny sahan’ny mpanasa lamba, '
  '4':
  - type: text
    content: 'koa lazao aminy hoe:'
  - type: text
    content: 'Mitandrema ka aza taitaitra foana; aza matahotra, ary aoka tsy ho ketraka ny fonao noho ireto tapa-porohana roa midona-tsetroka ireto, dia ny firehetan’ny fahatezeran’i Rezina sy i Arama ary ny zanak’i Remalia. '
  '5':
  - type: text
    content: 'Satria manam-pikasana hampidi-doza anao i Arama sy i Efraima ary ny zanak’i Remalia ka miteny hoe: '
  '6':
  - type: text
    content: Andeha isika hananika an’i Joda ka hampaharaiki-tahotra azy ary haka azy ho antsika dia hanangana ny zanak’i Tabeala ho mpanjaka ao afovoany,
  '7':
  - type: text
    content: 'dia izao no lazain’NY TOMPO Andriamanitra:'
  - type: text
    content: Tsy ho tanteraka izany sady tsy hisy,
  '8':
  - type: text
    content: satria ny lohan’i Arama dia i Damaskosy,
  - type: text
    content: ary ny lohan’i Damaskosy dia i Rezina.
  - type: text
    content: Ary ao anatin’ny dimy amby enimpolo taona dia ho rava i Efraima
  - type: text
    content: ka tsy ho vanon-ko firenena intsony.
  '9':
  - type: text
    content: Ny lohan’i Efraima dia i Samaria,
  - type: text
    content: ary ny lohan’i Samaria dia ny zanak’i Remalia.
  - type: text
    content: Raha tsy mety mino ianareo
  - type: text
    content: dia tsy ho tafatoetra!
  - type: heading
    content: Ny hahaterahan’ilay zaza hantsoina hoe Imanoela
