document_id: ISA.7
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Hafatry NY TOMPO ho an’i Ahaza mpanjaka
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Tamin’ny andron’i Ahaza, zanak’i Jotama, zanak’i Ozia mpanjakan’ny Joda, no niakaran’i Rezina, mpanjakan’i Arama, sy i Peka, zanak’i Remalia mpanjakan’ny Israely, hanafika an’i Jerosalema, nefa tsy afaka niady taminy izy. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Dia nambara tamin’ny taranak’i Davida hoe: Injao ny Arameana efa mitoby any amin’ny Efraima. Ary nihovotrovotra ny fony sy ny fon’ny vahoakany, toy ny fihovitrovitry ny hazo any an’ala raha asian’ny rivotra. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary hoy NY TOMPO tamin’Isaia: Mivoaha ianao sy i Seara-Iasoba'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Seara-Iasoba: Hisy sisa hiverina.'
    marker-yv: yv-n
  - type: text
    text: ' zanakao hitsena an’i Ahaza eo amin’ny faran’ny lakandrano amin’ny kamory ambony, eo amin’ny lalambe mankany amin’ny sahan’ny mpanasa lamba, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'koa lazao aminy hoe:'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Mitandrema ka aza taitaitra foana; aza matahotra, ary aoka tsy ho ketraka ny fonao noho ireto tapa-porohana roa midona-tsetroka ireto, dia ny firehetan’ny fahatezeran’i Rezina sy i Arama ary ny zanak’i Remalia. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Satria manam-pikasana hampidi-doza anao i Arama sy i Efraima ary ny zanak’i Remalia ka miteny hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Andeha isika hananika an’i Joda ka hampaharaiki-tahotra azy ary haka azy ho antsika dia hanangana ny zanak’i Tabeala ho mpanjaka ao afovoany,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'dia izao no lazain’NY TOMPO Andriamanitra:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy ho tanteraka izany sady tsy hisy,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: satria ny lohan’i Arama dia i Damaskosy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny lohan’i Damaskosy dia i Rezina.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ao anatin’ny dimy amby enimpolo taona dia ho rava i Efraima
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy ho vanon-ko firenena intsony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ny lohan’i Efraima dia i Samaria,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny lohan’i Samaria dia ny zanak’i Remalia.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Raha tsy mety mino ianareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia tsy ho tafatoetra!
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny hahaterahan’ilay zaza hantsoina hoe Imanoela
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Mbola niteny tamin’i Ahaza ihany NY TOMPO hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Mangataha famantarana avy amin’NY TOMPO Andriamanitrao; eny, mangataha na ho avy amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: lalina
  - type: text
    text: ', any amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: fitoeran’ny maty
  - type: text
    text: ', na avy any amin’ny avo, any ambony indrindra any. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Hoy anefa i Ahaza: Tsy hangataka aho, tsy haka fanahy NY TOMPO aho.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dia hoy Isaia: Mihainoa ary, ry taranak’i Davida! Heverinareo ho zavatra kely foana va ny hanasatra ny olona no mbola hanasatra an’Andriamanitro koa ianareo? '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Noho izany dia ny Tompo no hanome famantarana ho anareo: Indro, hanana anaka ny virijiny ka hiteraka zazalahy; ny anarany hataony hoe Imanoela, izany hoe: Amintsika Andriamanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Rehefa mahalala handa ny ratsy sy hifidy ny tsara ny zaza dia rononomandry sy tantely no ho fihinany. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Fa raha tsy mbola mahalala handa ny ratsy sy hifidy ny tsara akory izany zaza izany dia ho lao ny tanin’ireo mpanjaka roa maharaiki-tahotra anao ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: NY TOMPO hahatonga aminao sy ny olonao ary ny fianakavian’ny rainao izay andro tsy mbola nisy toa azy hatramin’ny andro nialan’i Efraima tamin’ny Joda. Ny mpanjakan’i Asiria izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Amin’izany andro izany, NY TOMPO hisiaka hiantso ny lalitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay any amin’ny faran’ny onin’i Ejipta,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny renitantely izay any amin’ny tany Asiria;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: dia ho avy ireo ka samy hipetraka any amin’ny lohasahan-driaka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny an-tsefatsefaky ny harambato,
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny amin’ny fefy tsilo rehetra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary eny amin’ny saha fiandrasana rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Amin’izany andro izany koa dia hoharatan’ny Tompo
- type: usfm
  marker: q1
  children:
  - type: text
    text: amin’ny hareza nofaina tany ampitan’ny ony Eofrata,
- type: usfm
  marker: q1
  children:
  - type: text
    text: miaraka amin’ny mpanjakan’i Asiria,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny loha sy ny volon-tongotra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hokakasany koa ny volombava.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Amin’izany andro izany
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia samy hiompy ombivavy kely sy ondry roa ny olona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ho be tokoa ny ronono azo avy amin’ireo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hihinana rononomandry ny olona;
- type: usfm
  marker: q1
  children:
  - type: text
    text: rononomandry sy tantely no ho fihinan’ny olona sisa rehetra ao amin’ny tany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Amin’izany andro izany
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ho rakotry ny anjavidy sy ny tsilo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny tany rehetra izay nisy voaloboka arivo fototra tokony ho arivo sekela.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Zana-tsipìka sy tsipìka no hoentin’izay miditra ao
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria rakotry ny anjavidy sy ny tsilo ny tany rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Ary ny havoana rehetra izay nohavàna tamin’ny angady
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'dia tsy ho sahinao diavina noho ny fahatahorana ny anjavidy sy ny tsilo:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ho falehan’ny omby
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ho voahitsakitsaky ny ondry aman’osy izany.
