document_id: JER.16,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Tokan-tena sy manirery i Jeremia
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary tonga tamiko ny tenin’NY TOMPO hoe: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary raha ambaranao amin’ity firenena ity izany teny rehetra izany ka hoy izy aminao: Nahoana NY TOMPO no nilaza izany loza mafy rehetra izany hamelezana anay? Fa inona no helokay? Ary inona no fahotana izay nanotanay tamin’NY TOMPO Andriamanitray? '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia lazao aminy hoe: Noho ny nahafoizan’ny razanareo Ahy, hoy NY TOMPO, noho ny nanarahany andriamanitra hafa, noho ny nanompoany azy sy ny niankohofany teo anatrehany ary ny nahafoizany Ahy sy ny tsy nitandremany ny lalànako. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny tenanareo koa dia nanao izay ratsy mihoatra noho ny razanareo. Fa e ianareo samy mandeha araka ny ditran’ny fo ratsinareo avokoa ka tsy mihaino Ahy! '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia horoahiko hiala amin’ity tany ity ianareo ho any amin’ny tany tsy fantatrareo na ny razanareo; any no hanompoanareo andriamanitra hafa andro aman’alina satria tsy hamindra fo aminareo Aho.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fiverenana lehibe
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa indro, avy ny andro, hoy NY TOMPO, izay tsy hilazana intsony hoe: Raha velona koa NY TOMPO izay nitondra ny Zanak’Israely niakatra avy tany amin’ny tany Ejipta; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fa izao kosa: Raha velona koa NY TOMPO izay nitondra ny Zanak’Israely niakatra avy tany amin’ny tany avaratra sy avy tany amin’ny tany rehetra izay nandroahany azy; eny, hampodiko ho amin’ny tany izay nomeko ny razany izy.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Indro, haniraka mpanarato maro Aho, hoy NY TOMPO, izay hanarato azy; ary rehefa afaka izany dia haniraka mpihaza maro Aho, izay hihaza azy any amin’ny tendrombohitra sy ny havoana rehetra ary any an-tsefatsefaky ny harambato. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ny masoko dia mijery ny alehany rehetra, tsy miafina amin’ny tavako izany, ary tsy takona amin’ny masoko ny helony. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Alohan’izany anefa dia hovaliko avo sasaka ny helony sy ny fahotany noho ny nandotoany ny taniko, dia ny namenoany ny lovako tamin’ireo fatin’ny sampiny sy fahavetavetany ireo.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fantatry ny manodidina ihany ilay tena Andriamanitra
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: TOMPO ô, Ianao no heriko sy fialofako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary fandosirako amin’ny andro fahoriana!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ho tonga eo aminao ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jentilisa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avy any amin’ny faran’ny tany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ka hiteny hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny tokoa, lainga no nolovan’ny razanay,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia zava-poana sady tsy misy mahasoa.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aza manambady ianao, ary aoka tsy hanana zanakalahy na zanakavavy amin’ity tany ity. '
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moa mahay manao andriamanitra ho an’ny tenany va ny olona?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy andriamanitra ireny.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa indro, hampahafantariko azy amin’izao indray mandeha izao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, hampahafantariko azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny tanako sy ny heriko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka ho fantany fa NY TOMPO no anarako.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa izao no lazain’NY TOMPO ny amin’ny zanakalahy sy ny zanakavavy izay teraka amin’ity tany ity sy ny amin’ny reniny izay niteraka azy ary ny amin’ny rainy izay niteraka azy amin’ity tany ity koa: '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ho fatin’ny aretina izy, nefa tsy hisaonana na halevina fa ho zezika eny ambonin’ny tany; ary ho lanin-tsabatra sy mosary izy ka ho fihinan’ny voromanidina sy ny bibidia ny fatiny. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa izao no lazain’NY TOMPO: Aza miditra amin’ny trano misy fisaonana ary aza misaona na mitsapa alahelo azy; fa efa nesoriko tsy ho amin’ity firenena ity ny fiadanako, hoy NY TOMPO, dia ny famindrampo sy ny fiantrana. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ho faty na ny lehibe na ny kely amin’ity tany ity; samy tsy halevina na hisaonana izy, tsy hitetehan’ny sasany tena, na hihetezany volo koa '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary tsy hisy hamahan-kanina azy ao amin’ny fisaonany mba hampionona azy ny amin’ny maty; ary tsy hisy hampisotro azy amin’ny kapoaka fampiononana, raha maty ny rainy na ny reniny. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary aza miditra ao amin’ny trano misy fanasana koa ianao, hiara-mitoetra aminy hihinana sy hisotro. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa izao no lazain’Andriamanitra, Tompon’izao rehetra izao, Andriamanitry ny Israely: Indro, hatsahatro amin’ity tany ity eo imasonareo sy amin’ny andronareo ny feo mifaly sy ny feo miravoravo, dia ny feon’ny mpampakatra sy ny feon’ny ampakarina.'
