document_id: JER.16,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Tokan-tena sy manirery i Jeremia
  - type: text
    content: 'Ary tonga tamiko ny tenin’NY TOMPO hoe: '
  '10':
  - type: text
    content: 'Ary raha ambaranao amin’ity firenena ity izany teny rehetra izany ka hoy izy aminao: Nahoana NY TOMPO no nilaza izany loza mafy rehetra izany hamelezana anay? Fa inona no helokay? Ary inona no fahotana izay nanotanay tamin’NY TOMPO Andriamanitray? '
  '11':
  - type: text
    content: 'Dia lazao aminy hoe: Noho ny nahafoizan’ny razanareo Ahy, hoy NY TOMPO, noho ny nanarahany andriamanitra hafa, noho ny nanompoany azy sy ny niankohofany teo anatrehany ary ny nahafoizany Ahy sy ny tsy nitandremany ny lalànako. '
  '12':
  - type: text
    content: 'Ary ny tenanareo koa dia nanao izay ratsy mihoatra noho ny razanareo. Fa e ianareo samy mandeha araka ny ditran’ny fo ratsinareo avokoa ka tsy mihaino Ahy! '
  '13':
  - type: text
    content: Dia horoahiko hiala amin’ity tany ity ianareo ho any amin’ny tany tsy fantatrareo na ny razanareo; any no hanompoanareo andriamanitra hafa andro aman’alina satria tsy hamindra fo aminareo Aho.
  - type: heading
    content: Ny fiverenana lehibe
  '14':
  - type: text
    content: 'Koa indro, avy ny andro, hoy NY TOMPO, izay tsy hilazana intsony hoe: Raha velona koa NY TOMPO izay nitondra ny Zanak’Israely niakatra avy tany amin’ny tany Ejipta; '
  '15':
  - type: text
    content: 'fa izao kosa: Raha velona koa NY TOMPO izay nitondra ny Zanak’Israely niakatra avy tany amin’ny tany avaratra sy avy tany amin’ny tany rehetra izay nandroahany azy; eny, hampodiko ho amin’ny tany izay nomeko ny razany izy.'
  '16':
  - type: text
    content: 'Indro, haniraka mpanarato maro Aho, hoy NY TOMPO, izay hanarato azy; ary rehefa afaka izany dia haniraka mpihaza maro Aho, izay hihaza azy any amin’ny tendrombohitra sy ny havoana rehetra ary any an-tsefatsefaky ny harambato. '
  '17':
  - type: text
    content: 'Fa ny masoko dia mijery ny alehany rehetra, tsy miafina amin’ny tavako izany, ary tsy takona amin’ny masoko ny helony. '
  '18':
  - type: text
    content: Alohan’izany anefa dia hovaliko avo sasaka ny helony sy ny fahotany noho ny nandotoany ny taniko, dia ny namenoany ny lovako tamin’ireo fatin’ny sampiny sy fahavetavetany ireo.
  - type: heading
    content: Fantatry ny manodidina ihany ilay tena Andriamanitra
  '19':
  - type: text
    content: TOMPO ô, Ianao no heriko sy fialofako
  - type: text
    content: ary fandosirako amin’ny andro fahoriana!
  - type: text
    content: 'Ho tonga eo aminao ny '
  - type: text
    content: Jentilisa
  - type: text
    content: avy any amin’ny faran’ny tany
  - type: text
    content: 'ka hiteny hoe:'
  - type: text
    content: Eny tokoa, lainga no nolovan’ny razanay,
  - type: text
    content: dia zava-poana sady tsy misy mahasoa.
  '2':
  - type: text
    content: 'Aza manambady ianao, ary aoka tsy hanana zanakalahy na zanakavavy amin’ity tany ity. '
  '20':
  - type: text
    content: Moa mahay manao andriamanitra ho an’ny tenany va ny olona?
  - type: text
    content: Tsy andriamanitra ireny.
  '21':
  - type: text
    content: Koa indro, hampahafantariko azy amin’izao indray mandeha izao,
  - type: text
    content: eny, hampahafantariko azy
  - type: text
    content: ny tanako sy ny heriko
  - type: text
    content: ka ho fantany fa NY TOMPO no anarako.
  '3':
  - type: text
    content: 'Fa izao no lazain’NY TOMPO ny amin’ny zanakalahy sy ny zanakavavy izay teraka amin’ity tany ity sy ny amin’ny reniny izay niteraka azy ary ny amin’ny rainy izay niteraka azy amin’ity tany ity koa: '
  '4':
  - type: text
    content: 'Ho fatin’ny aretina izy, nefa tsy hisaonana na halevina fa ho zezika eny ambonin’ny tany; ary ho lanin-tsabatra sy mosary izy ka ho fihinan’ny voromanidina sy ny bibidia ny fatiny. '
  '5':
  - type: text
    content: 'Fa izao no lazain’NY TOMPO: Aza miditra amin’ny trano misy fisaonana ary aza misaona na mitsapa alahelo azy; fa efa nesoriko tsy ho amin’ity firenena ity ny fiadanako, hoy NY TOMPO, dia ny famindrampo sy ny fiantrana. '
  '6':
  - type: text
    content: 'Ho faty na ny lehibe na ny kely amin’ity tany ity; samy tsy halevina na hisaonana izy, tsy hitetehan’ny sasany tena, na hihetezany volo koa '
  '7':
  - type: text
    content: 'Ary tsy hisy hamahan-kanina azy ao amin’ny fisaonany mba hampionona azy ny amin’ny maty; ary tsy hisy hampisotro azy amin’ny kapoaka fampiononana, raha maty ny rainy na ny reniny. '
  '8':
  - type: text
    content: 'Ary aza miditra ao amin’ny trano misy fanasana koa ianao, hiara-mitoetra aminy hihinana sy hisotro. '
  '9':
  - type: text
    content: 'Fa izao no lazain’Andriamanitra, Tompon’izao rehetra izao, Andriamanitry ny Israely: Indro, hatsahatro amin’ity tany ity eo imasonareo sy amin’ny andronareo ny feo mifaly sy ny feo miravoravo, dia ny feon’ny mpampakatra sy ny feon’ny ampakarina.'
