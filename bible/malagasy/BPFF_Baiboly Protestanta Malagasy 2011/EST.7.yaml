document_id: EST.7
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nampietrena an’i Hamana sy ny nahafatesany
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary nankao amin’i Estera, vadin’ny mpanjaka, ho ao amin’ny fanasana, ny mpanjaka sy i Hamana. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Hoy indray ny mpanjaka tamin’i Estera teo am-pisotroan-divay tamin’ny andro faharoa: Inona no angatahinao, ry Estera, vadin’ny mpanjaka? Fa homena anao izany. Ary inona angaha no tadiavinao? Fa na dia hatramin’ny antsasaky ny fanjakana aza dia hotovina izany. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dia namaly i Estera, vadin’ny mpanjaka hoe: Raha mahita fitia eto imasonao ary aho, ry mpanjaka, ka sitraky ny mpanjaka, dia aoka homena ahy ny aiko araka ny fifonako ary koa ny fireneko araka ny fangatahako! '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Fa namidy izahay, dia izaho sy ny fireneko, mba haringana sy hovonoina ary haripaka. Fa raha toa ka namidy ho andevolahy sy ho andevovavy izahay dia ho nangina ihany aho; kanefa ange tsy mahonitra ny fatiantoky ny mpanjaka akory ilay fahavalo e.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia nanontany an’i Estera, vadin’ny mpanjaka, i Ahasoerosy mpanjaka hoe: Iza moa izany, ary aiza izany olona asesiky ny fony hahevitra an’izany? '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Fa hoy i Estera: Io Hamana ratsy fanahy io no rafilahy sy fahavalo! Dia raiki-tahotra teo anatrehan’ny mpanjaka sy ny vadin’ny mpanjaka i Hamana. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary tezitra mafy ny mpanjaka ka nitsangana niala teo am-pisotroan-divay ho any amin’ny zaridainan’ny mpanjaka. Fa nitsangana kosa i Hamana hangataka ny ainy tamin’i Estera, vadin’ny mpanjaka, satria hitany fa misy loza hataon’ny mpanjaka aminy. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary niverina avy tao amin’ny zaridainan’ny mpanjaka ho ao amin’ilay efitrano izay nisotroany divay teo ny mpanjaka ary tamin’izay i Hamana dia niampatra tamin’ny farafara nandriandrian’i Estera. Dia hoy ny mpanjaka: Moa hisavika ny vadin’ny mpanjaka eto anatrehako ato an-trano koa va ilay io? Raha vantany vao naloaky ny vavan’ny mpanjaka izany teny izany dia nisy nanarona ny tavan’i Hamana. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary i Harbona, iray tamin’ireo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ionòka
  - type: text
    text: ' izay teo anatrehan’ny mpanjaka dia nilaza hoe: Indro, mijoro eo akaikin’ny tranon’i Hamana rahateo ny hazo; io ilay hazo natsangany mba hanantonany an’i Mordekay, ilay niteny soa ho an’ny mpanjaka; dimampolo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: hakiho
  - type: text
    text: ' ny haavony. Dia hoy ny mpanjaka: Ahantòny amin’io izy. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ary nahantony tamin’ilay hazo efa natsangany mba hanantonana an’i Mordekay i Hamana. Dia izay vao nionona ny fahatezeran’ny mpanjaka.
