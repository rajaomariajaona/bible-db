document_id: EST.7,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nampietrena an’i Hamana sy ny nahafatesany
  - type: text
    content: 'Ary nankao amin’i Estera, vadin’ny mpanjaka, ho ao amin’ny fanasana, ny mpanjaka sy i Hamana. '
  '10':
  - type: text
    content: Ary nahantony tamin’ilay hazo efa natsangany mba hanantonana an’i Mordekay i Hamana. Dia izay vao nionona ny fahatezeran’ny mpanjaka.
  '2':
  - type: text
    content: 'Hoy indray ny mpanjaka tamin’i Estera teo am-pisotroan-divay tamin’ny andro faharoa: Inona no angatahinao, ry Estera, vadin’ny mpanjaka? Fa homena anao izany. Ary inona angaha no tadiavinao? Fa na dia hatramin’ny antsasaky ny fanjakana aza dia hotovina izany. '
  '3':
  - type: text
    content: 'Dia namaly i Estera, vadin’ny mpanjaka hoe: Raha mahita fitia eto imasonao ary aho, ry mpanjaka, ka sitraky ny mpanjaka, dia aoka homena ahy ny aiko araka ny fifonako ary koa ny fireneko araka ny fangatahako! '
  '4':
  - type: text
    content: Fa namidy izahay, dia izaho sy ny fireneko, mba haringana sy hovonoina ary haripaka. Fa raha toa ka namidy ho andevolahy sy ho andevovavy izahay dia ho nangina ihany aho; kanefa ange tsy mahonitra ny fatiantoky ny mpanjaka akory ilay fahavalo e.
  '5':
  - type: text
    content: 'Dia nanontany an’i Estera, vadin’ny mpanjaka, i Ahasoerosy mpanjaka hoe: Iza moa izany, ary aiza izany olona asesiky ny fony hahevitra an’izany? '
  '6':
  - type: text
    content: 'Fa hoy i Estera: Io Hamana ratsy fanahy io no rafilahy sy fahavalo! Dia raiki-tahotra teo anatrehan’ny mpanjaka sy ny vadin’ny mpanjaka i Hamana. '
  '7':
  - type: text
    content: 'Ary tezitra mafy ny mpanjaka ka nitsangana niala teo am-pisotroan-divay ho any amin’ny zaridainan’ny mpanjaka. Fa nitsangana kosa i Hamana hangataka ny ainy tamin’i Estera, vadin’ny mpanjaka, satria hitany fa misy loza hataon’ny mpanjaka aminy. '
  '8':
  - type: text
    content: 'Ary niverina avy tao amin’ny zaridainan’ny mpanjaka ho ao amin’ilay efitrano izay nisotroany divay teo ny mpanjaka ary tamin’izay i Hamana dia niampatra tamin’ny farafara nandriandrian’i Estera. Dia hoy ny mpanjaka: Moa hisavika ny vadin’ny mpanjaka eto anatrehako ato an-trano koa va ilay io? Raha vantany vao naloaky ny vavan’ny mpanjaka izany teny izany dia nisy nanarona ny tavan’i Hamana. '
  '9':
  - type: text
    content: 'Ary i Harbona, iray tamin’ireo '
  - type: text
    content: ionòka
  - type: text
    content: ' izay teo anatrehan’ny mpanjaka dia nilaza hoe: Indro, mijoro eo akaikin’ny tranon’i Hamana rahateo ny hazo; io ilay hazo natsangany mba hanantonany an’i Mordekay, ilay niteny soa ho an’ny mpanjaka; dimampolo '
  - type: text
    content: hakiho
  - type: text
    content: ' ny haavony. Dia hoy ny mpanjaka: Ahantòny amin’io izy. '
