document_id: GEN.48
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny tsodrano nataon’i Jakoba tamin’ireo zanakalahin’i Josefa
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Rehefa afaka izany dia nisy nilaza tamin’i Josefa hoe: Indro, marary ny rainao. Dia noentiny niaraka taminy i Manase sy i Efraima, zanany mirahalahy. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary nisy nilaza tamin’i Jakoba hoe: Indro, tamy ho etỳ aminao i Josefa zanakao. Dia nanatanja-tena Israely ka niarina teo ambonin’ny farafara. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary hoy i Jakoba tamin’i Josefa: Andriamanitra Tsitoha efa niseho tamiko tany Lozy any amin’ny tany Kanana ary nitahy ahy ka niteny tamiko hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Indro, hahamaro ny taranakao Aho, hampitombo anao sy hahatonga anao ho firenena maro ary homeko ny taranakao mandimby anao ity tany ity ho lovany mandrakizay. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ankehitriny, ny zanakao mirahalahy, izay naterakao tatỳ amin’ny tany Ejipta fony tsy mbola tonga tatỳ aminao teto Ejipta aho, dia ho Ahy: Eny, ho Ahy i Efraima sy i Manase, tahaka an’i Robena sy i Simeona. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Fa ny zanakao izay haterakao aorianan’izy mirahalahy kosa dia ho anao ary ny anarany dia hatao amin’ny anaran’ny rahalahiny eo amin’ny zarataniny. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Raha niala tany Padana-Arama aho dia maty teo anatrehako Rahely, tany amin’ny tany Kanana, teny an-dalana, rehefa kely foana no tsy nahatongavana tao Efrata ary teo amoron’ny lalana mankany Efrata na Betlehema no nandevenako azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary rehefa hitan’Israely ny zanak’i Josefa dia hoy izy: Iza moa ireo? '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Dia hoy i Josefa tamin’ny rainy: Zanako ireto nomen’Andriamanitra ahy tatỳ. Dia hoy Israely: Ento eto amiko ary izy mba hotsofiko rano. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary satria efa pahina ny mason’Israely noho ny fahanterany ka tsy nahita intsony izy dia noentin’i Josefa nanatona azy izy mirahalahy; ary nanoroka sy namihina azy ireo Israely. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary hoy izy tamin’i Josefa: Tsy nanampo hahita ny tavanao intsony aho; kanjo, indro Andriamanitra nampahita ahy ny zanakao koa! '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary nampiala azy mirahalahy teo amin’ny lohalik’Israely i Josefa dia niankohoka tamin’ny tany. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dia notantanan’i Josefa izy mirahalahy: I Efraima, tamin’ny tanany havanana, ho eo ankavian’Israely, ary i Manase tamin’ny tanany havia, ho eo amin’ny ankavanan’Israely, ka noentiny nanatona azy. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dia natsotran’Israely ny tanany havanana ka napetrany tamin’ny lohan’i Efraima nefa izy no zandriny, fa ny tanany havia kosa no nataony teo amin’ny lohan’i Manase; izany hoe nampifandikainy ny tanany nefa i Manase no lahimatoa. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Dia nitsodrano an’i Josefa izy ka niteny hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Andriamanitra izay nandehanan’i Abrahama sy Isaka razako teo anatrehany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Andriamanitra Mpiandry ahy hatrizay niainako ka mandraka androany,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ary ilay Anjely izay Mpamonjy ahy tamin’ny loza rehetra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izy anie hitahy ireto zaza ireto!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aoka ny anarako
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny anaran’i Abrahama sy Isaka raiko no hanononana azy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hitombo ho maro dia maro eo amin’ny tany anie izy ireo!
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Rehefa hitan’i Josefa fa teo amin’ny lohan’i Efraima ny rainy no nametraka ny tanany havanana dia tsy sitrany izany ka noraisiny ny tanan’ny rainy, mba hampiala azy amin’ny lohan’i Efraima ho amin’ny lohan’i Manase, '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'sady hoy i Josefa tamin’ny rainy: Tsy izao no izy, ry Ikaky! Fa ity no lahimatoa ka apetraho eo amin’ny lohany ny tananao havanana. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Tsy nety anefa ny rainy ka niteny hoe: Fantatro ihany, anaka! Fantatro ihany! Izy koa ho tonga firenena ary koa ho lehibe; kanefa ny zandriny dia ho lehibe noho izy ary ny taranany dia ho firenena maro. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Dia nitsodrano azy ireo izy tamin’io andro io ka niteny hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ny anaranareo no hoentin’ny Israely hitsofana rano, hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hataon’Andriamanitra tahaka an’i Efraima sy tahaka an’i Manase anie ianao!
- type: usfm
  marker: m
  children:
  - type: text
    text: 'Koa i Efraima no nataony alohan’i Manase. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary hoy Israely tamin’i Josefa: Indro, ho faty aho. Andriamanitra anefa homba anareo ka hampody anareo indray ho any amin’ny tanindrazanareo. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ary izaho dia manome anao zaratany iray ho tombony amin’ny anjaran’ny rahalahinao; zaratany nalaiko tamin’ny sabatro sy ny tsipìkako teo an-tanan’ny Amorita io.
