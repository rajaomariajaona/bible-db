document_id: GEN.48,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny tsodrano nataon’i Jakoba tamin’ireo zanakalahin’i Josefa
  - type: text
    content: 'Rehefa afaka izany dia nisy nilaza tamin’i Josefa hoe: Indro, marary ny rainao. Dia noentiny niaraka taminy i Manase sy i Efraima, zanany mirahalahy. '
  '10':
  - type: text
    content: 'Ary satria efa pahina ny mason’Israely noho ny fahanterany ka tsy nahita intsony izy dia noentin’i Josefa nanatona azy izy mirahalahy; ary nanoroka sy namihina azy ireo Israely. '
  '11':
  - type: text
    content: 'Ary hoy izy tamin’i Josefa: Tsy nanampo hahita ny tavanao intsony aho; kanjo, indro Andriamanitra nampahita ahy ny zanakao koa! '
  '12':
  - type: text
    content: 'Ary nampiala azy mirahalahy teo amin’ny lohalik’Israely i Josefa dia niankohoka tamin’ny tany. '
  '13':
  - type: text
    content: 'Dia notantanan’i Josefa izy mirahalahy: I Efraima, tamin’ny tanany havanana, ho eo ankavian’Israely, ary i Manase tamin’ny tanany havia, ho eo amin’ny ankavanan’Israely, ka noentiny nanatona azy. '
  '14':
  - type: text
    content: 'Dia natsotran’Israely ny tanany havanana ka napetrany tamin’ny lohan’i Efraima nefa izy no zandriny, fa ny tanany havia kosa no nataony teo amin’ny lohan’i Manase; izany hoe nampifandikainy ny tanany nefa i Manase no lahimatoa. '
  '15':
  - type: text
    content: 'Dia nitsodrano an’i Josefa izy ka niteny hoe:'
  - type: text
    content: Andriamanitra izay nandehanan’i Abrahama sy Isaka razako teo anatrehany,
  - type: text
    content: Andriamanitra Mpiandry ahy hatrizay niainako ka mandraka androany,
  '16':
  - type: text
    content: ary ilay Anjely izay Mpamonjy ahy tamin’ny loza rehetra,
  - type: text
    content: Izy anie hitahy ireto zaza ireto!
  - type: text
    content: Aoka ny anarako
  - type: text
    content: sy ny anaran’i Abrahama sy Isaka raiko no hanononana azy;
  - type: text
    content: ary hitombo ho maro dia maro eo amin’ny tany anie izy ireo!
  '17':
  - type: text
    content: 'Rehefa hitan’i Josefa fa teo amin’ny lohan’i Efraima ny rainy no nametraka ny tanany havanana dia tsy sitrany izany ka noraisiny ny tanan’ny rainy, mba hampiala azy amin’ny lohan’i Efraima ho amin’ny lohan’i Manase, '
  '18':
  - type: text
    content: 'sady hoy i Josefa tamin’ny rainy: Tsy izao no izy, ry Ikaky! Fa ity no lahimatoa ka apetraho eo amin’ny lohany ny tananao havanana. '
  '19':
  - type: text
    content: 'Tsy nety anefa ny rainy ka niteny hoe: Fantatro ihany, anaka! Fantatro ihany! Izy koa ho tonga firenena ary koa ho lehibe; kanefa ny zandriny dia ho lehibe noho izy ary ny taranany dia ho firenena maro. '
  '2':
  - type: text
    content: 'Ary nisy nilaza tamin’i Jakoba hoe: Indro, tamy ho etỳ aminao i Josefa zanakao. Dia nanatanja-tena Israely ka niarina teo ambonin’ny farafara. '
  '20':
  - type: text
    content: 'Dia nitsodrano azy ireo izy tamin’io andro io ka niteny hoe:'
  - type: text
    content: 'Ny anaranareo no hoentin’ny Israely hitsofana rano, hoe:'
  - type: text
    content: Hataon’Andriamanitra tahaka an’i Efraima sy tahaka an’i Manase anie ianao!
  - type: text
    content: 'Koa i Efraima no nataony alohan’i Manase. '
  '21':
  - type: text
    content: 'Ary hoy Israely tamin’i Josefa: Indro, ho faty aho. Andriamanitra anefa homba anareo ka hampody anareo indray ho any amin’ny tanindrazanareo. '
  '22':
  - type: text
    content: Ary izaho dia manome anao zaratany iray ho tombony amin’ny anjaran’ny rahalahinao; zaratany nalaiko tamin’ny sabatro sy ny tsipìkako teo an-tanan’ny Amorita io.
  '3':
  - type: text
    content: 'Ary hoy i Jakoba tamin’i Josefa: Andriamanitra Tsitoha efa niseho tamiko tany Lozy any amin’ny tany Kanana ary nitahy ahy ka niteny tamiko hoe: '
  '4':
  - type: text
    content: 'Indro, hahamaro ny taranakao Aho, hampitombo anao sy hahatonga anao ho firenena maro ary homeko ny taranakao mandimby anao ity tany ity ho lovany mandrakizay. '
  '5':
  - type: text
    content: 'Ankehitriny, ny zanakao mirahalahy, izay naterakao tatỳ amin’ny tany Ejipta fony tsy mbola tonga tatỳ aminao teto Ejipta aho, dia ho Ahy: Eny, ho Ahy i Efraima sy i Manase, tahaka an’i Robena sy i Simeona. '
  '6':
  - type: text
    content: 'Fa ny zanakao izay haterakao aorianan’izy mirahalahy kosa dia ho anao ary ny anarany dia hatao amin’ny anaran’ny rahalahiny eo amin’ny zarataniny. '
  '7':
  - type: text
    content: Raha niala tany Padana-Arama aho dia maty teo anatrehako Rahely, tany amin’ny tany Kanana, teny an-dalana, rehefa kely foana no tsy nahatongavana tao Efrata ary teo amoron’ny lalana mankany Efrata na Betlehema no nandevenako azy.
  '8':
  - type: text
    content: 'Ary rehefa hitan’Israely ny zanak’i Josefa dia hoy izy: Iza moa ireo? '
  '9':
  - type: text
    content: 'Dia hoy i Josefa tamin’ny rainy: Zanako ireto nomen’Andriamanitra ahy tatỳ. Dia hoy Israely: Ento eto amiko ary izy mba hotsofiko rano. '
