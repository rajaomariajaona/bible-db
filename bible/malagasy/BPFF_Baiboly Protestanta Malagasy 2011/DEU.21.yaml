document_id: DEU.21,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny amin’ny vonoan’olona izay tsy fantatra ny nahafaty azy
  - type: text
    content: 'Raha toa ka misy maty novonoin’olona hita miampatra any an-tsaha amin’ny tany izay omen’NY TOMPO Andriamanitrao anao holovana, ary tsy fantatra izay nahafaty azy, '
  '10':
  - type: text
    content: 'Raha mandeha hanafika ny fahavalonao ianao, ary atolotry NY TOMPO Andriamanitrao eo an-tananao izy ka voababonao, '
  '11':
  - type: text
    content: 'sady misy vehivavy tsara tarehy hitanao eo amin’ny babo ka tianao hovadina, '
  '12':
  - type: text
    content: 'dia ento ho ao an-tranonao izy ka asaivo haratany ny lohany, alàny ny hohony, '
  '13':
  - type: text
    content: 'ary esoriny koa ny fitafiany tamin’ny nahababo azy, dia aoka hitoetra ao an-tranonao iray volana izy hitomany ny ray aman-dreniny. Rehefa afaka izany, izay vao mahazo mandry aminy ianao ka hanambady azy, ary ho vadinao izy. '
  '14':
  - type: text
    content: Fa raha tsy tianao intsony Ravehivavy dia alefaso handeha araka izay sitrapony izy fa aza mivarotra azy hatakalo vola aman-karena na manandevo azy, satria efa nampietry azy ianao.
  - type: heading
    content: Ny lovan’ny lahimatoa
  '15':
  - type: text
    content: 'Raha misy lehilahy mampirafy ka tiany ny iray fa tsy tiany kosa ny iray, ary samy miteraka aminy izy roa vavy, na ny tiany na ny tsy tiany, ary zanak’ilay tsy tiany no lahimatoa; '
  '16':
  - type: text
    content: 'amin’ny andro hanaovany didim-pananana ho an’ny zanany lahy dia tsy azo atao lahimatoa ny zanaky ny tiany, raha mbola eo ihany ny zanaky ny tsy tiany, izay tena lahimatoany; '
  '17':
  - type: text
    content: fa ny lahimatoa, zanak’ilay tsy tiany ihany, no hekeny ka homeny anjara avo roa heny amin’izay rehetra ananany; fa voalohan-janany izy ka azy ny fizokiana.
  - type: heading
    content: Ny fanao amin’ny zanaka maditra
  '18':
  - type: text
    content: 'Raha misy olona manana zanakalahy maditra sy manohitra ka tsy mety mihaino ny feon’ny rainy, na ny feon’ny reniny, sady tsy zakany anarina, '
  '19':
  - type: text
    content: 'dia hosamborin’ny rainy sy ny reniny izy ka hoentiny eo amin’ny loholona ao amin’ny tanànany, eo amin’ny vavahadin’ny tanàna onenany; '
  '2':
  - type: text
    content: 'dia handeha ny loholonao sy ny mpitsaranao ka horefesiny hatreo amin’ny faty ka hatramin’izay tanàna manodidina azy. '
  '20':
  - type: text
    content: 'dia hiteny amin’ny loholona amin’ny tanànany izy mivady hoe: Ity zanakay ity dia maditra sy manohitra ka tsy mihaino ny feonay, fa mpandany sy mpimamo. '
  '21':
  - type: text
    content: Dia hitora-bato azy ho faty ny mponina rehetra ao an-tanànany; fa hofongoranao tsy ho eo aminao ny fanao ratsy; ary ny Israely rehetra dia handre izany ka hatahotra.
  - type: heading
    content: Ny amin’ny fandevenana ny fatin’ny meloka izay nahantona tamin’ny hazo
  '22':
  - type: text
    content: 'Raha misy olona manao fahotana izay tokony hahafaty azy ka vonoina ary ahantona amin’ny hazo '
  '23':
  - type: text
    content: dia tsy havela hiloaka alina eo amin’ny hazo ny fatiny, fa tsy maintsy halevinao androtr’iny ihany izy; fa voaozon’Andriamanitra izay mihantona amin’ny hazo; koa aza lotoina ny taninao, izay omen’NY TOMPO Andriamanitrao anao ho lovanao.
  '3':
  - type: text
    content: 'Ary ny loholona amin’ny tanàna izay akaikin’ny faty indrindra dia haka ombivavy kely izay tsy mbola nampiasaina na nitondra zioga. '
  '4':
  - type: text
    content: 'Ary ilay ombivavy kely dia hoentin’ny loholona amin’io tanàna io midina any amin’izay lohasaha tsy voaasa na voafafy sady misy renirano tsy mety ritra, dia hofolahiny any an-dohasaha ny vozony. '
  '5':
  - type: text
    content: 'Ary hanatona ireo mpisorona, taranak’i Levy, fa izy no nofidin’NY TOMPO Andriamanitrao hanao fanompoam-pivavahana Aminy sy hitsodrano amin’ny anaran’NY TOMPO; koa araka ny teniny no hanefana ny ady rehetra sy ny fifamonoana rehetra. '
  '6':
  - type: text
    content: 'Ary ny loholona rehetra amin’izany tanàna akaikin’ny faty izany dia hanasa ny tanany eo ambonin’ilay ombivavy kely izay efa voafolaka tany an-dohasaha ny vozony, '
  '7':
  - type: text
    content: 'no sady hiloa-bava hoe: Tsy ny tananay no nandatsaka ity ra ity sady tsy nahita izany ny masonay. '
  '8':
  - type: text
    content: 'TOMPO ô, mamelà ny heloky ny Israely olonao izay navotanao ka aza atao ho heloky ny Israely olonao ny ran’ny tsy manan-tsiny! Dia ho afa-keloka amin’izany ra izany izy ireo. '
  '9':
  - type: text
    content: Ka hesorinao ho afaka aminao ny ran’ny tsy manan-tsiny, raha hanao izay mahitsy eo imason’NY TOMPO ianao.
  - type: heading
    content: Ny fanambadiana vehivavy babo
