document_id: 2CH.13,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fanjakan’i Abia
  - type: heading
    content: 1Mpa 15.1-2
  - type: text
    content: 'Tamin’ny taona fahavalo amby folo nanjakan’i Jeroboama mpanjaka no tonga mpanjakan’ny Joda i Abia. '
  '10':
  - type: text
    content: 'Fa ny aminay kosa dia NY TOMPO no Andriamanitray ka tsy mba nahafoy Azy izahay; ny mpisorona izay manao fanompoam-pivavahana ho an’NY TOMPO dia ny taranak’i Arona; ary ny '
  - type: text
    content: levita
  - type: text
    content: ' koa dia manao ny raharahany. '
  '11':
  - type: text
    content: 'Mandoro fanatitra dorana manontolo sy ditin-kazo manitra ho an’NY TOMPO isa-maraina sy isan-kariva izy, ny mofo atao fanatitra koa dia alahany tsara eo amin’ny latabatra, ary ny jiro dia ampirehetiny isan-kariva ao amin’ny fitoeran-jiro volamena sy ny lela fitoeran-jirony; fa izahay dia mitandrina izay nasain’NY TOMPO Andriamanitray hotandremana; fa ianareo kosa dia nahafoy Azy. '
  '12':
  - type: text
    content: Ary indro, ato aminay Andriamanitra ho mpitarika anay, ary ny mpisorony dia hitsoka mafy ny trompetra avo faneno mba hamelezana anareo. Ry Zanak’Israely ô, aza miady amin’NY TOMPO, Andriamanitry ny razanareo; fa tsy hambinina ianareo.
  '13':
  - type: text
    content: 'Fa nasain’i Jeroboama nivily nihodidina ny fandehan’ny vela-pandrika mba hahatonga azy ireo ho ao aorianan’ny Joda ka teo anoloan’ny Joda izy, nefa ny vela-pandrika teo ivohony. '
  '14':
  - type: text
    content: 'Nony nitodika ny Joda ka indreo, teo alohany sy teo aorianany ny fahavalo, dia nitaraina tamin’NY TOMPO izy, ary ny mpisorona dia nitsoka ny trompetra. '
  '15':
  - type: text
    content: 'Dia nihoby ny lehilahy amin’ny Joda; ary raha nihoby izy dia tamin’izay no namelezan’Andriamanitra an’i Jeroboama sy ny Israely rehetra teo anoloan’i Abia sy ny Joda. '
  '16':
  - type: text
    content: 'Nandositra niala teo anoloan’ny Joda ny Zanak’Israely; ary Andriamanitra nanolotra azy ho eo an-tanany '
  '17':
  - type: text
    content: 'ka nahafatesan’i Abia sy ny vahoakany be dia be izy; ary niampatrampatra ny fatin’ny Israely, dia lehilahy dimy hetsy voafantina. '
  '18':
  - type: text
    content: Toy izany no nampietrena ny Zanak’Israely fehizay; ary ny taranak’i Joda no nahery, satria niankina tamin’NY TOMPO, Andriamanitry ny razany, izy.
  '19':
  - type: text
    content: 'Nanenjika an’i Jeroboama i Abia ka nahazo ny tanànany, dia i Betela mbamin’ny vohitra miankina aminy sy i Jesana mbamin’ny vohitra miankina aminy ary i Efrona mbamin’ny vohitra miankina aminy. '
  '2':
  - type: text
    content: 'Telo taona no nanjakany tany Jerosalema. Ny anaran’ny reniny dia Mikaia, zanakavavin’i Oriela, avy any Gibea. Ary niady i Abia sy i Jeroboama. '
  '20':
  - type: text
    content: 'Tsy naharina intsony i Jeroboama tamin’ny andron’i Abia; ary NY TOMPO namely azy ka maty izy. '
  '21':
  - type: text
    content: Ary nitombo hery i Abia; nanana vady efatra amby folo izy ka niteraka lahy roa amby roapolo sy vavy enina amby folo.
  - type: heading
    content: 1Mpa 15.7-8
  '22':
  - type: text
    content: 'Ary ny tantaran’i Abia sisa mbamin’ny nataony sy ny teniny dia efa voasoratra ao amin’ny bokin’Ido mpaminany. '
  '23':
  - type: text
    content: Ary nodimandry any amin’ny razany i Abia, dia nalevina tao an-Tanànan’i Davida izy; ary i Asa zanany no nanjaka nandimby azy. Ary tamin’ny andron’i Asa dia nandry fehizay nandritra ny folo taona ny tany.
  '3':
  - type: text
    content: I Abia no nanomboka ny ady ka nitondra miaramila mahery, dia lehilahy efatra hetsy voafantina; i Jeroboama kosa dia nandahatra ny azy hiady aminy, dia lehilahy valo hetsy voafantina, samy mahery avokoa.
  '4':
  - type: text
    content: 'Nijoro teo an-tendrombohitra Zemaraima izay any amin’ny tany be havoana any Efraima i Abia ka niteny hoe: Mihainoa ahy, ry Jeroboama sy ry Israely rehetra: '
  '5':
  - type: text
    content: 'Moa tsy tokony ho fantatrareo va fa nomen’NY TOMPO, Andriamanitry ny Israely, ho an’i Davida mandrakizay ny fanjakan’ny Israely, dia ho azy sy ny taranany tamin’ny fanekena tsy azo ivadihana mandrakizay? '
  '6':
  - type: text
    content: 'Nefa nitsangana kosa i Jeroboama, zanak’i Nebata, mpanompon’i Solomona, zanak’i Davida, ka nikomy tamin’ny tompony. '
  '7':
  - type: text
    content: 'Nisy koa, olom-poana, tena ratsy fanahy, niangona tao aminy ka nampahery ny tenany hanohitra an’i Rehoboama, zanak’i Solomona raha mbola zaza sy tanora fanahy izy ka tsy nahatohitra azy. '
  '8':
  - type: text
    content: 'Ary ankehitriny ianareo dia mikasa hanohitra ny fanjakan’NY TOMPO, izay eo an-tanan’ny taranak’i Davida; ary marobe ianareo, sady misy ombilahy kely volamena ao aminareo, izay nataon’i Jeroboama ho andriamanitrareo. '
  '9':
  - type: text
    content: 'Tsy efa noroahinareo va ny mpisoron’NY TOMPO, dia ny taranak’i Arona, sy ny '
  - type: text
    content: levita
  - type: text
    content: ', ka nanendry mpisorona ho anareo, tahaka ny fanaon’ny firenena amin’ny tany hafa ianareo? Koa izay rehetra mitondra vantotra ombilahy sy ondrilahy fito hanokanana ny tenany dia izy no tonga mpisorona amin’ireo tsy Andriamanitra. '
