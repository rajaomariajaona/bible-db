document_id: 2CH.13
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fanjakan’i Abia
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 1Mpa 15.1-2
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Tamin’ny taona fahavalo amby folo nanjakan’i Jeroboama mpanjaka no tonga mpanjakan’ny Joda i Abia. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Telo taona no nanjakany tany Jerosalema. Ny anaran’ny reniny dia Mikaia, zanakavavin’i Oriela, avy any Gibea. Ary niady i Abia sy i Jeroboama. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: I Abia no nanomboka ny ady ka nitondra miaramila mahery, dia lehilahy efatra hetsy voafantina; i Jeroboama kosa dia nandahatra ny azy hiady aminy, dia lehilahy valo hetsy voafantina, samy mahery avokoa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Nijoro teo an-tendrombohitra Zemaraima izay any amin’ny tany be havoana any Efraima i Abia ka niteny hoe: Mihainoa ahy, ry Jeroboama sy ry Israely rehetra: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Moa tsy tokony ho fantatrareo va fa nomen’NY TOMPO, Andriamanitry ny Israely, ho an’i Davida mandrakizay ny fanjakan’ny Israely, dia ho azy sy ny taranany tamin’ny fanekena tsy azo ivadihana mandrakizay? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Nefa nitsangana kosa i Jeroboama, zanak’i Nebata, mpanompon’i Solomona, zanak’i Davida, ka nikomy tamin’ny tompony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Nisy koa, olom-poana, tena ratsy fanahy, niangona tao aminy ka nampahery ny tenany hanohitra an’i Rehoboama, zanak’i Solomona raha mbola zaza sy tanora fanahy izy ka tsy nahatohitra azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary ankehitriny ianareo dia mikasa hanohitra ny fanjakan’NY TOMPO, izay eo an-tanan’ny taranak’i Davida; ary marobe ianareo, sady misy ombilahy kely volamena ao aminareo, izay nataon’i Jeroboama ho andriamanitrareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Tsy efa noroahinareo va ny mpisoron’NY TOMPO, dia ny taranak’i Arona, sy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: levita
  - type: text
    text: ', ka nanendry mpisorona ho anareo, tahaka ny fanaon’ny firenena amin’ny tany hafa ianareo? Koa izay rehetra mitondra vantotra ombilahy sy ondrilahy fito hanokanana ny tenany dia izy no tonga mpisorona amin’ireo tsy Andriamanitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Fa ny aminay kosa dia NY TOMPO no Andriamanitray ka tsy mba nahafoy Azy izahay; ny mpisorona izay manao fanompoam-pivavahana ho an’NY TOMPO dia ny taranak’i Arona; ary ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: levita
  - type: text
    text: ' koa dia manao ny raharahany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Mandoro fanatitra dorana manontolo sy ditin-kazo manitra ho an’NY TOMPO isa-maraina sy isan-kariva izy, ny mofo atao fanatitra koa dia alahany tsara eo amin’ny latabatra, ary ny jiro dia ampirehetiny isan-kariva ao amin’ny fitoeran-jiro volamena sy ny lela fitoeran-jirony; fa izahay dia mitandrina izay nasain’NY TOMPO Andriamanitray hotandremana; fa ianareo kosa dia nahafoy Azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ary indro, ato aminay Andriamanitra ho mpitarika anay, ary ny mpisorony dia hitsoka mafy ny trompetra avo faneno mba hamelezana anareo. Ry Zanak’Israely ô, aza miady amin’NY TOMPO, Andriamanitry ny razanareo; fa tsy hambinina ianareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Fa nasain’i Jeroboama nivily nihodidina ny fandehan’ny vela-pandrika mba hahatonga azy ireo ho ao aorianan’ny Joda ka teo anoloan’ny Joda izy, nefa ny vela-pandrika teo ivohony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Nony nitodika ny Joda ka indreo, teo alohany sy teo aorianany ny fahavalo, dia nitaraina tamin’NY TOMPO izy, ary ny mpisorona dia nitsoka ny trompetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Dia nihoby ny lehilahy amin’ny Joda; ary raha nihoby izy dia tamin’izay no namelezan’Andriamanitra an’i Jeroboama sy ny Israely rehetra teo anoloan’i Abia sy ny Joda. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Nandositra niala teo anoloan’ny Joda ny Zanak’Israely; ary Andriamanitra nanolotra azy ho eo an-tanany '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'ka nahafatesan’i Abia sy ny vahoakany be dia be izy; ary niampatrampatra ny fatin’ny Israely, dia lehilahy dimy hetsy voafantina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Toy izany no nampietrena ny Zanak’Israely fehizay; ary ny taranak’i Joda no nahery, satria niankina tamin’NY TOMPO, Andriamanitry ny razany, izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Nanenjika an’i Jeroboama i Abia ka nahazo ny tanànany, dia i Betela mbamin’ny vohitra miankina aminy sy i Jesana mbamin’ny vohitra miankina aminy ary i Efrona mbamin’ny vohitra miankina aminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Tsy naharina intsony i Jeroboama tamin’ny andron’i Abia; ary NY TOMPO namely azy ka maty izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ary nitombo hery i Abia; nanana vady efatra amby folo izy ka niteraka lahy roa amby roapolo sy vavy enina amby folo.
- type: usfm
  marker: r
  children:
  - type: text
    text: 1Mpa 15.7-8
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary ny tantaran’i Abia sisa mbamin’ny nataony sy ny teniny dia efa voasoratra ao amin’ny bokin’Ido mpaminany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ary nodimandry any amin’ny razany i Abia, dia nalevina tao an-Tanànan’i Davida izy; ary i Asa zanany no nanjaka nandimby azy. Ary tamin’ny andron’i Asa dia nandry fehizay nandritra ny folo taona ny tany.
