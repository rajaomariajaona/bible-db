document_id: DEU.15,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fanafahan-trosa isaky ny fito taona
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Isaky ny fito taona dia manaova fanafahan-trosa ianao. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Omeo tokoa izy, ary aoka tsy halahelo ny fonao raha manome azy, satria izany zavatra izany no hitahin’NY TOMPO Andriamanitrao anao amin’ny asanao rehetra sy amin’izay rehetra ataon’ny tananao. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ny tany dia tsy ilaozan’izay olo-mahantra, koa izany no andidiako anao hoe: Sokafy tsara amin’ny rahalahinao ny tananao, dia amin’ny malahelo sy ny mahantra eo amin’ny taninao.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Famotsorana ny andevo hebreo
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha namidy taminao ny namanao, na lehilahy, na vehivavy hebreo, ka efa nanompo anao enin-taona, dia hovotsoranao ho afaka izy amin’ny taona fahafito. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa votsoranao ho afaka izy dia tsy havelanao handeha tanam-polo; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fa hisy hampitondrainao azy avy amin’ny ondry aman’osinao sy avy amin’ny famoloananao ary avy amin’ny famiazanao; araka izay efa nitahin’NY TOMPO Andriamanitrao anao no hanomezanao azy. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsarovy fa andevo tany amin’ny tany Ejipta ianao nefa nanavotra anao NY TOMPO Andriamanitrao, koa izany no andidiako anao izao zavatra izao anio. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Kanefa raha hoy izy aminao: Tsy hiala aminao aho, satria tsy foiny ianao sy ny ankohonanao fa finaritra aminao izy, '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia halainao ny fanjaibe ka hotevehinao amin’ny varavarana ny sofiny dia ho mpanomponao mandrakizay izy. Ary toy izany koa no hataonao amin’ny mpanompovavinao. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Aza ataonao ho sarotra aminao ny hamotsotra azy ho afaka, fa indroa toraka ny karaman’ny mpikarama no azonao tamin’ny nanompoany anao enin-taona; dia hitahy anao NY TOMPO Andriamanitrao amin’izay rehetra ataonao.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny voalohan-teraka atokana ho an’Andriamanitra
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny lahy rehetra amin’ny voalohan-teraky ny ombinao sy ny ondry aman’osinao dia hohamasininao ho an’NY TOMPO Andriamanitrao; aza mampiasa ny voalohan-teraky ny ombinao, na manety ny voalohan-teraky ny ondry aman’osinao. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Toy izao no fomban’ny fanafahan-trosa: Hamoy ny trosany rehetra ny tompon-trosa rehetra izay nampindram-bola tamin’ny namany; tsy hanery ny namany, izay rahalahiny handoa azy, satria antsoina hoe Fanafahan’NY TOMPO izany. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Eo anatrehan’NY TOMPO Andriamanitrao no hihinananao sy ny ankohonanao azy isan-taona isan-taona eo amin’ny fitoerana izay hofidin’NY TOMPO. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa raha manan-kilema izy, na mandringa, na jamba, na izay kilema ratsy hafa, dia aza vonoinao ho fanatitra ho an’NY TOMPO Andriamanitrao ireny, '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fa ao an-tanànanao ihany no hihinananao ireny; na ny olona tsy madio na ny madio dia samy mahazo mihinana azy, tahaka ny ahazoany mihinana ny gazela sy ny diera. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Kanefa ny rany no aza hanina, fa aidino amin’ny tany toy ny rano.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny olona hafa firenena ihany no azonao enjehina; fa izay anao any amin’ny rahalahinao kosa dia hafoinao; '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'kanefa tsy dia hisy mahantra eo aminao, fa hitahy anao tokoa NY TOMPO eo amin’ny tany izay omen’NY TOMPO Andriamanitrao ho lovanao, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'raha mihaino tsara ny feon’NY TOMPO Andriamanitrao ianao ka mitandrina hanaraka ireo lalàna rehetra ireo, izay andidiako anao anio. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa hitahy anao NY TOMPO Andriamanitrao araka izay nolazainy taminao; hampisambotra vola ny firenena maro ianao fa ianao kosa dia tsy hisambotra; ary hifehy firenena maro ianao fa ireny kosa dia tsy mba hifehy anao.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha misy mahantra ny rahalahinao ao an-tanànanao iray, amin’ny taninao izay omen’NY TOMPO Andriamanitrao anao, dia aza manamafy ny fonao, na manakombona ny tananao amin’ny rahalahinao mahantra; '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fa sokafy tsara aminy ny tananao ka ampisambory izay ilainy izy, araka izay mahory azy. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mitandrema anefa, fandrao hisy hevi-dratsy ao am-ponao milaza hoe: Antomotra ny taona fahafito, dia ny taom-panafahana; ary ho ratsy fijery ny rahalahinao mahantra ianao ka tsy hanome azy akory; dia hitaraina amin’NY TOMPO hiampanga anao izy ka ho fahotanao izany. '
