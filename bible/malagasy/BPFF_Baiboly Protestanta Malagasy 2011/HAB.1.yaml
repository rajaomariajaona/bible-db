document_id: HAB.1,3103
type_code: plt
verses:
  '1':
  - type: text
    content: Faminaniana ny loza hanjo, araka izay ahitan’i Habakoka mpaminany.
  - type: heading
    content: Fitarainana voalohany ataon’ny mpaminany amin’Andriamanitra
  '10':
  - type: text
    content: Manakora ny mpanjaka izy
  - type: text
    content: ary ihomehezany ny mpanapaka eo aminy.
  - type: text
    content: Ny tanàna mimanda rehetra dia ihomehezany
  - type: text
    content: ka manandratra tovon-tany izy
  - type: text
    content: ary mahafaka izany.
  '11':
  - type: text
    content: Dia mihelina toy ny rivotra izy
  - type: text
    content: ary mandroso ka mahazo heloka,
  - type: text
    content: izany heriny izany no andriamaniny.
  - type: heading
    content: Fitarainana faharoa ataon’ny mpaminany amin’Andriamanitra
  '12':
  - type: text
    content: Moa tsy hatrizay hatrizay va Ianao,
  - type: text
    content: RY TOMPO Iray Masina Andriamanitro?
  - type: text
    content: Tsy ho faty Ianao!
  - type: text
    content: TOMPO ô, ho amin’ny fitsarana no nanendrenao ireny;
  - type: text
    content: ry Vatolampy ô, ho fananarana no nanangananao azy.
  '13':
  - type: text
    content: Ianao izay madio maso ka tsy ta hahita ny ratsy
  - type: text
    content: ary tsy mahazaka mijery fampahoriana,
  - type: text
    content: nahoana Ianao no mijery ny mpamitaka?
  - type: text
    content: Nahoana no mangina Ianao raha mandrapaka ny marina noho izy ny ratsy fanahy?
  '14':
  - type: text
    content: Mitondra ny olona toy ny hazandrano any an-dranomasina
  - type: text
    content: sy toy ny biby mandady sy mikisaka, izay tsy manam-panapaka Ianao.
  '15':
  - type: text
    content: Aingainy amin’ny fintana izy rehetra,
  - type: text
    content: samboriny amin’ny haratony
  - type: text
    content: ary sarihiny amin’ny harato tarihiny
  - type: text
    content: ka faly sy ravoravo izy.
  '16':
  - type: text
    content: Koa izany no amonoany zavatra hatao fanatitra ho an’ny haratony
  - type: text
    content: sy andoroany ditin-kazo manitra ho an’ny harato tarihiny,
  - type: text
    content: fa ireo no ahazoany anjara matavy
  - type: text
    content: sy hanina matsiro.
  '17':
  - type: text
    content: Koa noho izany, moa va hanaisotra ny ao amin’ny tandrohony izy
  - type: text
    content: ary hamono firenena mandrakariva ka tsy hiantra?
  '2':
  - type: text
    content: Mandra-pahoviana, RY TOMPO,
  - type: text
    content: no hitarainako,
  - type: text
    content: ka tsy hohenoinao?
  - type: text
    content: 'Mandra-pahoviana no hitarainako hoe: Loza!'
  - type: text
    content: Nefa tsy vonjenao ihany?
  '3':
  - type: text
    content: Nahoana no ataonao mahita haratsiam-panahy aho
  - type: text
    content: ary mahajery fampahoriana Ianao?
  - type: text
    content: Fa herisetra sy loza no eo anatrehako,
  - type: text
    content: misy ady
  - type: text
    content: sady misy ny fifandirana.
  '4':
  - type: text
    content: Noho izany dia tsy manan-kery intsony ny lalàna
  - type: text
    content: ary tsy mivoaka mihitsy ny rariny;
  - type: text
    content: fa tsy mahatohitra ny ratsy fanahy ny marina
  - type: text
    content: ka izany no ivoahan’ny fitsarana miangatra.
  - type: heading
    content: 'Ny valintenin’Andriamanitra: Ny fanafihan’ny Kaldeana'
  '5':
  - type: text
    content: 'Jereo any amin’ny '
  - type: text
    content: Jentilisa
  - type: text
    content: ' ka diniho,'
  - type: text
    content: ary aoka ianareo ho gaga
  - type: text
    content: fa manao zavatra amin’ny andronareo Aho,
  - type: text
    content: izay tsy hinoanareo raha olona no mitantara aminareo.
  '6':
  - type: text
    content: Fa indro, atsangako ny Kaldeana,
  - type: text
    content: ilay firenena lozabe sady mirehidrehitra,
  - type: text
    content: izay mitety ny tany rehetra
  - type: text
    content: mba hahazoany fonenana
  - type: text
    content: izay tsy azy akory.
  '7':
  - type: text
    content: Mahatsiravina sy mahatahotra izy;
  - type: text
    content: avy amin’ny tenany ihany ny fitsarany sy ny fahalehibiazany.
  '8':
  - type: text
    content: Haingam-pandeha noho ny leoparda ny soavaliny
  - type: text
    content: sady masiaka noho ny amboadia amin’ny hariva.
  - type: text
    content: Mampiriotra ny kalesy fitondra miady ny mpitaingin-tsoavaliny;
  - type: text
    content: eny, avy lavitra ny mpitaingin-tsoavaliny;
  - type: text
    content: manidina toy ny voromahery
  - type: text
    content: maika hihinana izy.
  '9':
  - type: text
    content: Hampidi-doza no iavian’izy rehetra,
  - type: text
    content: ny handroso ihany no imatimatesany
  - type: text
    content: ka manangona babo toy ny fasika izy.
