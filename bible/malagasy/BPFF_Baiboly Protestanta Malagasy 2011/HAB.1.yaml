document_id: HAB.1
type_code: plt
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Faminaniana ny loza hanjo, araka izay ahitan’i Habakoka mpaminany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fitarainana voalohany ataon’ny mpaminany amin’Andriamanitra
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Mandra-pahoviana, RY TOMPO,
- type: usfm
  marker: q1
  children:
  - type: text
    text: no hitarainako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy hohenoinao?
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Mandra-pahoviana no hitarainako hoe: Loza!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nefa tsy vonjenao ihany?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Nahoana no ataonao mahita haratsiam-panahy aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mahajery fampahoriana Ianao?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa herisetra sy loza no eo anatrehako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: misy ady
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady misy ny fifandirana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Noho izany dia tsy manan-kery intsony ny lalàna
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy mivoaka mihitsy ny rariny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa tsy mahatohitra ny ratsy fanahy ny marina
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka izany no ivoahan’ny fitsarana miangatra.
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Ny valintenin’Andriamanitra: Ny fanafihan’ny Kaldeana'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Jereo any amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jentilisa
  - type: text
    text: ' ka diniho,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary aoka ianareo ho gaga
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa manao zavatra amin’ny andronareo Aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay tsy hinoanareo raha olona no mitantara aminareo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Fa indro, atsangako ny Kaldeana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ilay firenena lozabe sady mirehidrehitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay mitety ny tany rehetra
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hahazoany fonenana
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay tsy azy akory.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Mahatsiravina sy mahatahotra izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: avy amin’ny tenany ihany ny fitsarany sy ny fahalehibiazany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Haingam-pandeha noho ny leoparda ny soavaliny
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady masiaka noho ny amboadia amin’ny hariva.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mampiriotra ny kalesy fitondra miady ny mpitaingin-tsoavaliny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, avy lavitra ny mpitaingin-tsoavaliny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: manidina toy ny voromahery
- type: usfm
  marker: q1
  children:
  - type: text
    text: maika hihinana izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Hampidi-doza no iavian’izy rehetra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny handroso ihany no imatimatesany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka manangona babo toy ny fasika izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Manakora ny mpanjaka izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ihomehezany ny mpanapaka eo aminy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny tanàna mimanda rehetra dia ihomehezany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka manandratra tovon-tany izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mahafaka izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Dia mihelina toy ny rivotra izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mandroso ka mahazo heloka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: izany heriny izany no andriamaniny.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fitarainana faharoa ataon’ny mpaminany amin’Andriamanitra
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Moa tsy hatrizay hatrizay va Ianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: RY TOMPO Iray Masina Andriamanitro?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy ho faty Ianao!
- type: usfm
  marker: q1
  children:
  - type: text
    text: TOMPO ô, ho amin’ny fitsarana no nanendrenao ireny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ry Vatolampy ô, ho fananarana no nanangananao azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ianao izay madio maso ka tsy ta hahita ny ratsy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy mahazaka mijery fampahoriana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nahoana Ianao no mijery ny mpamitaka?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nahoana no mangina Ianao raha mandrapaka ny marina noho izy ny ratsy fanahy?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Mitondra ny olona toy ny hazandrano any an-dranomasina
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy toy ny biby mandady sy mikisaka, izay tsy manam-panapaka Ianao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Aingainy amin’ny fintana izy rehetra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: samboriny amin’ny haratony
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary sarihiny amin’ny harato tarihiny
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka faly sy ravoravo izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Koa izany no amonoany zavatra hatao fanatitra ho an’ny haratony
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy andoroany ditin-kazo manitra ho an’ny harato tarihiny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ireo no ahazoany anjara matavy
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy hanina matsiro.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Koa noho izany, moa va hanaisotra ny ao amin’ny tandrohony izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hamono firenena mandrakariva ka tsy hiantra?
