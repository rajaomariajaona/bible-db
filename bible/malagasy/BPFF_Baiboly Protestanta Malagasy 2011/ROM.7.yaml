document_id: ROM.7,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Afaka amin’ny fangejan’ny lalàna ny Kristiana
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsy fantatrareo va, ry rahalahy; eny, miteny amin’izay mahalala ny lalàna aho, fa ny lalàna dia mifehy ny olona mandritra ny fotoana ahavelomany? '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ka tonga maty aho. Koa ny didy izay natao hahazoana fiainana dia hitako fa nahatonga fahafatesana tamiko. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa io didy io dia noentin’ny ota namitaka sy nahafaty ahy. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Eny, masina tokoa ny lalàna, ary masina ny didy, sady marina no tsara.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Koa ny tsara va no nahafaty ahy? Sanatria izany! Fa ny ota no nahafaty ahy, mba hiseho ho ota; fa ny tsara no noentiny nahafaty ahy, mba ho tonga ota tokoa ny ota noho ny nataon’ny lalàna.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Voafatotry ny lalànan’ny fahotana
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fantatsika anefa fa araka ny fanahy ny lalàna; ary izaho kosa dia nofo, namidy tamin’ny ota. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa tsy fantatro izay ataoko; satria tsy izay sitrako no ataoko; fa izay halako no tanterahiko. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha izay tsy sitrako no ataoko dia miara-manaiky amin’ny lalàna aho fa tsara izy. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary amin’izany, tsy izaho intsony no manao io fa ny ota izay mitoetra ato anatiko.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fantatro anefa fa tsy misy zavatra tsara mitoetra ato amiko, dia ato amin’ny nofoko; fa ananako ihany ny fikasana, saingy ny hahatanteraka ny tsara no tsy ananako. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsy ny tsara izay sitrako no tanterahiko fa ny ratsy izay tsy sitrako no ataoko. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ny vehivavy izay manambady dia fehezin’ny lalàna amin’ny lahy raha mbola velona ny lahy; fa raha maty kosa ny lahy dia afaka amin’ny lalànan’ny fanambadiana izy. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa raha ny tsy sitrako no ataoko dia tsy izaho intsony no manao izany fa ny ota izay mitoetra ato amiko. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa hitako izao lalàna izao: Raha ta hanao ny marina aho dia ato amiko ihany ny ratsy. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mankasitraka ny lalànan’Andriamanitra anefa aho araka ny maha olona ahy ato anatiko; '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'saingy mahita lalàna hafa amin’ny momba ny tenako aho; izy io dia miady amin’ny lalànan’ny saiko ka mamabo ahy ho an’ny lalànan’ny ota izay ao amin’ny momba ny tenako. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Indrisy! Olo-mahantra aho! Iza no hanafaka ahy amin’ny tenan’ity fahafatesana ity? '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Misaotra an’Andriamanitra amin’ny alalan’i Jesosy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ' Tompontsika aho!'
  - type: usfm
    marker: p
    children:
    - type: text
      text: Koa raha ny amiko dia andevon’ny lalànan’Andriamanitra aho amin’ny saiko, fa ny lalànan’ny ota kosa amin’ny nofoko.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Koa raha mbola velona ny lahy ka manambady olon-kafa Ravehivavy dia holazaina hoe mpijangajanga izy; fa raha maty kosa ny lahy dia afaka amin’izany lalàna izany izy ka tsy mba mpijangajanga na dia manambady olon-kafa aza.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Noho izany, ianareo koa, ry rahalahiko, dia efa tonga maty ny amin’ny lalàna noho ny tenan’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ', mba ho vadin’ny hafa ianareo, dia Izay natsangana tamin’ny maty, mba hahavokarantsika ho an’Andriamanitra. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa fony tao amin’ny nofo isika dia ny filan’ny ota, noho ny lalàna, no niasa tao amin’ny momba ny tenantsika ka nahavokatra ho amin’ny fahafatesana. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa ankehitriny kosa dia efa afaka tamin’ny lalàna isika, satria maty ny amin’izay nihazonana antsika ka manompo araka ny fanavaozana avy amin’ny Fanahy fa tsy amin’ny fomba tranainy tao ambanin’ny lalàna voasoratra.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny asan’ny lalàna
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Inona ary no holazaintsika? Ota va ny lalàna? Sanatria izany! Kanefa tsy nahafantatra ny ota aho raha tsy tamin’ny lalàna, satria tsy fantatro akory ny fitsiriritana raha tsy ny lalàna no nilaza hoe: «Aza mitsiriritra» (Eks 20.17). '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Io didy io dia noentin’ny ota nampihetsika ny fitsiriritana rehetra tato anatiko; fa maty ny ota raha tsy misy lalàna. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izaho dia velona tsy nanan-dalàna fahiny; fa rehefa tonga kosa ny didy dia velona indray ny ota '
