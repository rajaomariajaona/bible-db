document_id: ROM.7,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Afaka amin’ny fangejan’ny lalàna ny Kristiana
  - type: text
    content: 'Tsy fantatrareo va, ry rahalahy; eny, miteny amin’izay mahalala ny lalàna aho, fa ny lalàna dia mifehy ny olona mandritra ny fotoana ahavelomany? '
  '10':
  - type: text
    content: 'ka tonga maty aho. Koa ny didy izay natao hahazoana fiainana dia hitako fa nahatonga fahafatesana tamiko. '
  '11':
  - type: text
    content: 'Fa io didy io dia noentin’ny ota namitaka sy nahafaty ahy. '
  '12':
  - type: text
    content: Eny, masina tokoa ny lalàna, ary masina ny didy, sady marina no tsara.
  '13':
  - type: text
    content: Koa ny tsara va no nahafaty ahy? Sanatria izany! Fa ny ota no nahafaty ahy, mba hiseho ho ota; fa ny tsara no noentiny nahafaty ahy, mba ho tonga ota tokoa ny ota noho ny nataon’ny lalàna.
  - type: heading
    content: Voafatotry ny lalànan’ny fahotana
  '14':
  - type: text
    content: 'Fantatsika anefa fa araka ny fanahy ny lalàna; ary izaho kosa dia nofo, namidy tamin’ny ota. '
  '15':
  - type: text
    content: 'Fa tsy fantatro izay ataoko; satria tsy izay sitrako no ataoko; fa izay halako no tanterahiko. '
  '16':
  - type: text
    content: 'Raha izay tsy sitrako no ataoko dia miara-manaiky amin’ny lalàna aho fa tsara izy. '
  '17':
  - type: text
    content: Ary amin’izany, tsy izaho intsony no manao io fa ny ota izay mitoetra ato anatiko.
  '18':
  - type: text
    content: 'Fantatro anefa fa tsy misy zavatra tsara mitoetra ato amiko, dia ato amin’ny nofoko; fa ananako ihany ny fikasana, saingy ny hahatanteraka ny tsara no tsy ananako. '
  '19':
  - type: text
    content: 'Tsy ny tsara izay sitrako no tanterahiko fa ny ratsy izay tsy sitrako no ataoko. '
  '2':
  - type: text
    content: 'Fa ny vehivavy izay manambady dia fehezin’ny lalàna amin’ny lahy raha mbola velona ny lahy; fa raha maty kosa ny lahy dia afaka amin’ny lalànan’ny fanambadiana izy. '
  '20':
  - type: text
    content: 'Fa raha ny tsy sitrako no ataoko dia tsy izaho intsony no manao izany fa ny ota izay mitoetra ato amiko. '
  '21':
  - type: text
    content: 'Koa hitako izao lalàna izao: Raha ta hanao ny marina aho dia ato amiko ihany ny ratsy. '
  '22':
  - type: text
    content: 'Mankasitraka ny lalànan’Andriamanitra anefa aho araka ny maha olona ahy ato anatiko; '
  '23':
  - type: text
    content: 'saingy mahita lalàna hafa amin’ny momba ny tenako aho; izy io dia miady amin’ny lalànan’ny saiko ka mamabo ahy ho an’ny lalànan’ny ota izay ao amin’ny momba ny tenako. '
  '24':
  - type: text
    content: 'Indrisy! Olo-mahantra aho! Iza no hanafaka ahy amin’ny tenan’ity fahafatesana ity? '
  '25':
  - type: text
    content: 'Misaotra an’Andriamanitra amin’ny alalan’i Jesosy '
  - type: text
    content: Kristy
  - type: text
    content: ' Tompontsika aho!'
  - type: text
    content: Koa raha ny amiko dia andevon’ny lalànan’Andriamanitra aho amin’ny saiko, fa ny lalànan’ny ota kosa amin’ny nofoko.
  '3':
  - type: text
    content: Koa raha mbola velona ny lahy ka manambady olon-kafa Ravehivavy dia holazaina hoe mpijangajanga izy; fa raha maty kosa ny lahy dia afaka amin’izany lalàna izany izy ka tsy mba mpijangajanga na dia manambady olon-kafa aza.
  '4':
  - type: text
    content: 'Noho izany, ianareo koa, ry rahalahiko, dia efa tonga maty ny amin’ny lalàna noho ny tenan’i '
  - type: text
    content: Kristy
  - type: text
    content: ', mba ho vadin’ny hafa ianareo, dia Izay natsangana tamin’ny maty, mba hahavokarantsika ho an’Andriamanitra. '
  '5':
  - type: text
    content: 'Fa fony tao amin’ny nofo isika dia ny filan’ny ota, noho ny lalàna, no niasa tao amin’ny momba ny tenantsika ka nahavokatra ho amin’ny fahafatesana. '
  '6':
  - type: text
    content: Fa ankehitriny kosa dia efa afaka tamin’ny lalàna isika, satria maty ny amin’izay nihazonana antsika ka manompo araka ny fanavaozana avy amin’ny Fanahy fa tsy amin’ny fomba tranainy tao ambanin’ny lalàna voasoratra.
  - type: heading
    content: Ny asan’ny lalàna
  '7':
  - type: text
    content: 'Inona ary no holazaintsika? Ota va ny lalàna? Sanatria izany! Kanefa tsy nahafantatra ny ota aho raha tsy tamin’ny lalàna, satria tsy fantatro akory ny fitsiriritana raha tsy ny lalàna no nilaza hoe: «Aza mitsiriritra» (Eks 20.17). '
  '8':
  - type: text
    content: 'Io didy io dia noentin’ny ota nampihetsika ny fitsiriritana rehetra tato anatiko; fa maty ny ota raha tsy misy lalàna. '
  '9':
  - type: text
    content: 'Izaho dia velona tsy nanan-dalàna fahiny; fa rehefa tonga kosa ny didy dia velona indray ny ota '
