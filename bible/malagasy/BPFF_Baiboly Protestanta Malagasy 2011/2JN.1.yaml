  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Izaho loholona
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: presbytera.
    marker-yv: yv-n
  - type: text
    text: ' no mamangy an’Itompokovavy'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Itompokovavy: '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: ilazana ny Fiangonana.
    marker-yv: yv-n
  - type: text
    text: ' voafidy sy ny zanany, izay tiako amin’ny fahamarinana, ary tsy izaho ihany, fa izay rehetra mahalala ny marina koa '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'noho ny fahamarinana izay mitoetra ato anatintsika sady ho ato amintsika mandrakizay: '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ho amintsika ny fahasoavana sy ny famindrampo ary ny fiadanana avy amin’Andriamanitra Ray sy Jesosy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ', Zanaky ny Ray, amin’ny fahamarinana sy ny fitiavana.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny didy avy amin’ny Ray
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Faly indrindra aho satria misy hitako ny zanakao sasany mandeha amin’ny marina araka ny nandraisantsika didy tamin’ny Ray. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary mangataka aminao aho ankehitriny, tompokovavy, tsy toy ny manoratra didy vaovao aminao, fa ilay nananantsika hatramin’ny voalohany ihany, dia aoka hifankatia isika. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ary izao no fitiavana dia ny handehanantsika araka ny didiny. Izany no didy, tahaka ny efa renareo hatramin’ny taloha ihany dia ny handehananareo aminy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fampianaran’i Kristy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Fa maro ny mpamitaka efa lasa any amin’izao tontolo izao, ireny dia tsy manaiky fa efa tonga tamin’ny nofo Jesosy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: '. Izany no mpamitaka sy antikristy. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Mitandrema ianareo, fandrao mahavery izay namonoanay tena, fa mba handraisanareo valim-pitia tanteraka kosa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Izay rehetra mitarika nefa tsy mitoetra ao amin’ny fampianaran’i Kristy dia tsy manana an’Andriamanitra. Izay mitoetra ao amin’ny fampianarana dia izy no manana ny Ray sy ny Zanaka. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Raha misy olona mankeo aminareo ka tsy mitondra izao fampianarana izao, aza mampiantrano azy na miarahaba azy akory; '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: fa izay miarahaba azy dia miombona amin’ny ratsy ataony.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mandra-pihaona indray
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Manana zavatra maro hosoratana aminareo aho, nefa tsy tiako hatao amin’ny taratasy sy ny ranomainty izany; fa manantena ho tonga atỳ aminareo aho ka hiteny mifanatrika mba ho tanteraka ny fifalianareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ny zanaky ny rahavavinao voafidy dia manao veloma anao.
