document_id: 1CH.15,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Manomana ny hamindrana ny vata misy ny Fanekena i Davida
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I Davida dia nanao trano ho azy tao an-Tanànan’i Davida sady nanamboatra fitoerana sy nanorina tranolay ho an’ny vata misy ny faneken’Andriamanitra. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: tamin’ny taranak’i Oziela dia i Aminadaba lehibeny sy ny rahalahiny roa amby folo amby zato.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary i Davida niantso an’i Zadoka sy i Abiatara mpisorona ary ny levita, dia i Oriela, i Asaia, i Joela, i Semaia, i Eliela ary i Aminadaba, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ka niteny tamin’ireo hoe: Ianareo lohan’ny fianakavian’ny levita, hamasino ny tenanareo, dia ianareo sy ny rahalahinareo, mba hampiakaranareo ny vata misy ny faneken’NY TOMPO, Andriamanitry ny Israely, ho ao amin’ilay toerana namboariko ho azy. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Satria tsy ianareo no nampiakatra azy tamin’ny voalohany, dia nasian’NY TOMPO Andriamanitsika isika, fa tsy nitady Azy araka ny fomba tokony harahina. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nanamasina ny tenany ny mpisorona sy ny levita mba hampiakatra ny vata misy ny faneken’NY TOMPO, Andriamanitry ny Israely. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary nilanja ny vata misy ny faneken’Andriamanitra tamin’ny bao hazo teny an-tsorony ny levita, fa izany no nandidian’i Mosesy araka ny tenin’NY TOMPO.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ireo lehiben’ny levita dia nasain’i Davida nanendry ny mpihira rahalahiny hitondra zavamaneno, dia ny valiha sy ny lokanga ary hampaneno ny kipantsona, mba hanandra-peo amin’ny fifaliana. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia notendren’ny levita i Hemana, zanak’i Joela; tamin’ny rahalahiny dia i Asafa, zanak’i Berekia; tamin’ny taranak’i Merary rahalahiny dia i Etana, zanak’i Kosaia; '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'naman’ireo ihany koa ny rahalahiny manarakaraka, dia i Zakaria, i Bena, i Jaziela, i Semiramota, i Jehiela, i Ony, i Eliaba, i Benaia, i Mahaseia, i Matitia, i Elifeleho, i Mikneia, i Obeda-Edoma ary i Jeiela, mpiandry varavarana. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I Hemana sy i Asafa ary i Etana mpihira dia nasaina nitondra kipantsona varahina hampanenoina. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin’izay dia hoy i Davida: Tsy misy tokony hitondra ny vata misy ny faneken’Andriamanitra afa-tsy ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: levita
    - type: text
      text: ' ihany, satria izy no efa nofidin’NY TOMPO hitondra ny vata misy ny faneken’Andriamanitra sy hanao fanompoam-pivavahana ho Azy mandrakariva.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I Zakaria, i Aziela, i Semiramota, i Jehiela, i Ony, i Eliaba, i Mahaseia ary i Benaia no nasaina nitendry valiha tamin’ny alamota
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'alamota: karazam-peo iray amin’ny fomba fihira.'
      marker-yv: yv-n
    - type: text
      text: '. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I Matitia, i Elifeleho, i Mikneia, i Obeda-Edoma, i Jeiela ary i Azazia no nasaina nitendry ny lokanga tamin’ny seminita
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'seminita: karazam-peo iray amin’ny fomba fihira.'
      marker-yv: yv-n
    - type: text
      text: ' ho fitarihana ny hira. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I Kenania, lehiben’ny levita, no tonian’ny fitondrana entana; nampianatra ny fitondrana entana izy satria hainy izany. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I Berekia sy i Elikana no mpiandry varavarana amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: vata misy ny Fanekena
    - type: text
      text: '. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I Sebania, i Josafata, i Netanela, i Amasay, i Zakaria, i Benaia ary i Eliezera, izay samy mpisorona, no nitsoka ny trompetra teo alohan’ny vata misy ny faneken’Andriamanitra; i Obeda-Edoma sy i Jehia kosa no mpiandry varavarana amin’ny vata misy ny Fanekena.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fahatongavan’ny vata misy ny Fanekena tao Jerosalema
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 2Sam 6.12-23
    marker-yv: yv-h
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I Davida sy ny loholon’ny Israely mbamin’ny mpifehy arivo no nandeha hampiakatra amim-pifaliana ny vata misy ny faneken’NY TOMPO avy tao an-tranon’i Obeda-Edoma. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa nomban’Andriamanitra ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: levita
    - type: text
      text: ' izay nilanja ny vata misy ny faneken’NY TOMPO dia namono vantotra ombilahy fito sy ondrilahy fito ho fanatitra izy. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nanao akanjo vita amin’ny rongony fotsy madinika i Davida; niakanjo toy izany koa ny levita rehetra izay nitondra ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: vata misy ny Fanekena
    - type: text
      text: ' ary ny mpihira sy i Kenania, tonian’ny fitondrana entana, mbamin’ny mpihira; nisalotra '
    - type: usfm
      marker: w
      children:
      - type: text
        text: efoda
    - type: text
      text: ' rongony fotsy koa i Davida. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Toy izany no nampiakaran’ny Israely rehetra ny vata misy ny faneken’NY TOMPO tamin’ny fihobiana, ny feon’ny anjomara, ny trompetra, ny kipantsona ary tamin’ny fitendrena ny valiha sy ny lokanga.
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nony tonga tao an-Tanànan’i Davida ny vata misy ny faneken’NY TOMPO dia nitsirika teo am-baravarankely i Mikala, zanakavavin’i Saoly, ka nahita an’i Davida mpanjaka nibitaka sy nitsinjaka; dia naneso azy mafy tao am-pony izy.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia novorin’i Davida tany Jerosalema ny Israely rehetra hampiakatra ny vata misy ny faneken’NY TOMPO ho any amin’ny toerana izay namboariny ho azy. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary novorin’i Davida ny taranak’i Arona sy ny levita:'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tamin’ny taranak’i Kehata dia i Oriela lehibeny sy ny rahalahiny roapolo amby zato;
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: tamin’ny taranak’i Merary dia i Asaia lehibeny sy ny rahalahiny roapolo sy roanjato;
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: tamin’ny taranak’i Gersoma dia i Joela lehibeny sy ny rahalahiny telopolo amby zato;
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: tamin’ny taranak’i Elizafana dia i Semaia lehibeny sy ny rahalahiny roanjato;
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: tamin’ny taranak’i Hebrona dia i Eliela lehibeny sy ny rahalahiny valopolo;
