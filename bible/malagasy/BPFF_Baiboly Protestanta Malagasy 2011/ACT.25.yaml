document_id: ACT.25
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nampiakatra ny fitsarana any amin’i Kaisara i Paoly
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Telo andro taorianan’ny nahatongavan’i Festosy teo amin’ny fari-piadidiany, dia niainga avy tany Kaisaria hiakatra ho any Jerosalema izy. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Nanambara taminy izay niampangany an’i Paoly ny lehiben’ny mpisorona sy ny olo-manankaja tamin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jiosy
  - type: text
    text: ' sady niangavy taminy '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'mba hampandefasana azy hankany Jerosalema; fa nikasa hanao vela-pandrika ho azy eny an-dalana izy ireo hamonoany azy. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dia namaly azy i Festosy fa ambenana any Kaisaria i Paoly ary efa hankany tsy ho ela koa izy. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Koa aoka izay manam-pahefana eo aminareo, hoy izy, no hiara-midina amiko any ka hiampanga an-dRalehilahy, raha manan-keloka izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Tsy nijanona teo aminy mihoatra ny valo na folo andro i Festosy ary nidina nankany Kaisaria avy eo; koa nony ampitso dia nipetraka teo amin’ny fitsarana izy ary nasainy nalaina i Paoly. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Nony tonga izy dia nitsangana manodidina azy ireo Jiosy izay nidina avy tany Jerosalema ka zavatra maro sady lehibe, izay tsy azony nohamarinina akory, no niampangany azy. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Nandaha-teny hanala tsiny ny tenany i Paoly hoe: Tsy nanao ratsy aho, na tamin’ny lalànan’ny Jiosy, na tamin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tempoly
  - type: text
    text: ', na tamin’i Kaisara.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ta hahazo sitraka tamin’ny Jiosy nefa i Festosy ka niteny tamin’i Paoly hoe: Tianao va ny hiakatra any Jerosalema hotsaraina eo anatrehako any, ny amin’izany zavatra izany? '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Fa hoy i Paoly: Eto amin’ny fitsaran’i Kaisara, izay tokony hitsarana ahy, no itsanganako. Tsy nanao ratsy na inona na inona tamin’ny Jiosy aho, ary na ianao aza dia mahafantatra tsara izany. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Koa raha nisy ratsy nataoko, na zavatra izay tokony hahafaty ahy, dia tsy mandà ny ho faty aho; fa raha tsy misy marina kosa izay zavatra iampangan’ireo ahy dia tsy misy mahazo manolotra ahy ho amin’ny sitrapon’ireo. Handahatra eo anatrehan’i Kaisara aho. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Rehefa niresaka tamin’ny mpanolotsaina i Festosy dia namaly hoe: Efa nifidy ny handahatra any anatrehan’i Kaisara ianao ka ho any amin’i Kaisara.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: I Paoly teo anatrehan’i Agripa sy i Berenika
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Rehefa afaka andro vitsivitsy dia tonga namangy an’i Festosy tany Kaisaria i Agripa mpanjaka sy i Berenika. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Satria nipetraka andro maro teo ry zareo dia nambaran’i Festosy tamin’ny mpanjaka ny amin’i Paoly ka hoy izy: Misy gadra iray navelan’i Feliksa ato, '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'koa fony aho tany Jerosalema dia niampanga azy sy nangataka izay hanamelohana azy ny mpisorona sy ny loholon’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jiosy
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'dia novaliko hoe: Tsy fanaon’ny Romana ny manolotra olona raha tsy mbola mifanatrika ny ampangaina sy ny mpiampanga ka mahazo mandahatra hanala tsiny ny tenany ny amin’izay niampangan’ireo azy izy. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Rehefa tonga tatỳ izy ireo dia tsy nitaredretra aho, fa ny ampitso ihany dia nipetraka teo amin’ny fitsarana ka nasaiko nalaina Ralehilahy. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Rehefa nitsangana anefa ireo mpiampanga ireo dia tsy mba niampanga azy araka izay zavatra ratsy nampoiziko akory izy, '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'fa adihevitra taminy ny amin’ny fivavahany sy ny amin’izany Jesosy izany, izay efa maty, nefa nolazain’i Paoly ho velona, no nataony. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Satria sahiran-tsaina aho ny amin’ny hitsarana izany zavatra izany dia nanontany aho na tian-dRalehilahy ny hankany Jerosalema hotsaraina any ny amin’izany zavatra izany, na tsia. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Rehefa nangataka fitsarana ambony any amin’ny amperora i Paoly dia nasaiko nambenana mandra-pandefako azy ho any amin’i Kaisara. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Dia hoy i Agripa tamin’i Festosy: Izaho koa dia mba ta handre izany lehilahy izany. Ary hoy izy: Rahampitso dia handre azy ianao.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Nony ampitso dia tonga i Agripa sy i Berenika niseho tamin’ny voninahitry ny fiandrianany ka niditra teo amin’ny efitrano fivoriana niaraka tamin’ny mpifehy arivo sy ny lehibe tao an-tanàna, ary noentina nankeo i Paoly araka ny didin’i Festosy. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Dia hoy i Festosy: Ry Agripa mpanjaka sy ianareo vory etoana, hitanareo io lehilahy io, izay notarainan’ny Jiosy rehetra tamiko, na tany Jerosalema na teto koa, ka nataony antso avo hoe: Tsy tokony hovelomina intsony Ilehio. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Hitako anefa fa tsy nisy zavatra nataony izay tokony hahafaty azy, saingy izy ihany no ta handahatra any amin’ny amperora, koa nanaiky hampanatitra azy any aho. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Tsy hitako izay teny marina hosoratako amin’ny lehibeko ny amin’io lehilahy io, koa dia nentiko eto anatrehanareo izy, indrindra fa eto anatrehanao, ry Agripa mpanjaka, mba hadinina, dia ho hitako eo izay hosoratako. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Heveriko mantsy fa tsy mety ny mampanatitra gadra any nefa tsy milaza izay zavatra iampangana azy.
