document_id: ACT.25,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Nampiakatra ny fitsarana any amin’i Kaisara i Paoly
  - type: text
    content: 'Telo andro taorianan’ny nahatongavan’i Festosy teo amin’ny fari-piadidiany, dia niainga avy tany Kaisaria hiakatra ho any Jerosalema izy. '
  '10':
  - type: text
    content: 'Fa hoy i Paoly: Eto amin’ny fitsaran’i Kaisara, izay tokony hitsarana ahy, no itsanganako. Tsy nanao ratsy na inona na inona tamin’ny Jiosy aho, ary na ianao aza dia mahafantatra tsara izany. '
  '11':
  - type: text
    content: 'Koa raha nisy ratsy nataoko, na zavatra izay tokony hahafaty ahy, dia tsy mandà ny ho faty aho; fa raha tsy misy marina kosa izay zavatra iampangan’ireo ahy dia tsy misy mahazo manolotra ahy ho amin’ny sitrapon’ireo. Handahatra eo anatrehan’i Kaisara aho. '
  '12':
  - type: text
    content: 'Rehefa niresaka tamin’ny mpanolotsaina i Festosy dia namaly hoe: Efa nifidy ny handahatra any anatrehan’i Kaisara ianao ka ho any amin’i Kaisara.'
  - type: heading
    content: I Paoly teo anatrehan’i Agripa sy i Berenika
  '13':
  - type: text
    content: 'Rehefa afaka andro vitsivitsy dia tonga namangy an’i Festosy tany Kaisaria i Agripa mpanjaka sy i Berenika. '
  '14':
  - type: text
    content: 'Satria nipetraka andro maro teo ry zareo dia nambaran’i Festosy tamin’ny mpanjaka ny amin’i Paoly ka hoy izy: Misy gadra iray navelan’i Feliksa ato, '
  '15':
  - type: text
    content: 'koa fony aho tany Jerosalema dia niampanga azy sy nangataka izay hanamelohana azy ny mpisorona sy ny loholon’ny '
  - type: text
    content: Jiosy
  - type: text
    content: ' '
  '16':
  - type: text
    content: 'dia novaliko hoe: Tsy fanaon’ny Romana ny manolotra olona raha tsy mbola mifanatrika ny ampangaina sy ny mpiampanga ka mahazo mandahatra hanala tsiny ny tenany ny amin’izay niampangan’ireo azy izy. '
  '17':
  - type: text
    content: 'Rehefa tonga tatỳ izy ireo dia tsy nitaredretra aho, fa ny ampitso ihany dia nipetraka teo amin’ny fitsarana ka nasaiko nalaina Ralehilahy. '
  '18':
  - type: text
    content: 'Rehefa nitsangana anefa ireo mpiampanga ireo dia tsy mba niampanga azy araka izay zavatra ratsy nampoiziko akory izy, '
  '19':
  - type: text
    content: 'fa adihevitra taminy ny amin’ny fivavahany sy ny amin’izany Jesosy izany, izay efa maty, nefa nolazain’i Paoly ho velona, no nataony. '
  '2':
  - type: text
    content: 'Nanambara taminy izay niampangany an’i Paoly ny lehiben’ny mpisorona sy ny olo-manankaja tamin’ny '
  - type: text
    content: Jiosy
  - type: text
    content: ' sady niangavy taminy '
  '20':
  - type: text
    content: 'Satria sahiran-tsaina aho ny amin’ny hitsarana izany zavatra izany dia nanontany aho na tian-dRalehilahy ny hankany Jerosalema hotsaraina any ny amin’izany zavatra izany, na tsia. '
  '21':
  - type: text
    content: 'Rehefa nangataka fitsarana ambony any amin’ny amperora i Paoly dia nasaiko nambenana mandra-pandefako azy ho any amin’i Kaisara. '
  '22':
  - type: text
    content: 'Dia hoy i Agripa tamin’i Festosy: Izaho koa dia mba ta handre izany lehilahy izany. Ary hoy izy: Rahampitso dia handre azy ianao.'
  '23':
  - type: text
    content: 'Nony ampitso dia tonga i Agripa sy i Berenika niseho tamin’ny voninahitry ny fiandrianany ka niditra teo amin’ny efitrano fivoriana niaraka tamin’ny mpifehy arivo sy ny lehibe tao an-tanàna, ary noentina nankeo i Paoly araka ny didin’i Festosy. '
  '24':
  - type: text
    content: 'Dia hoy i Festosy: Ry Agripa mpanjaka sy ianareo vory etoana, hitanareo io lehilahy io, izay notarainan’ny Jiosy rehetra tamiko, na tany Jerosalema na teto koa, ka nataony antso avo hoe: Tsy tokony hovelomina intsony Ilehio. '
  '25':
  - type: text
    content: 'Hitako anefa fa tsy nisy zavatra nataony izay tokony hahafaty azy, saingy izy ihany no ta handahatra any amin’ny amperora, koa nanaiky hampanatitra azy any aho. '
  '26':
  - type: text
    content: 'Tsy hitako izay teny marina hosoratako amin’ny lehibeko ny amin’io lehilahy io, koa dia nentiko eto anatrehanareo izy, indrindra fa eto anatrehanao, ry Agripa mpanjaka, mba hadinina, dia ho hitako eo izay hosoratako. '
  '27':
  - type: text
    content: Heveriko mantsy fa tsy mety ny mampanatitra gadra any nefa tsy milaza izay zavatra iampangana azy.
  '3':
  - type: text
    content: 'mba hampandefasana azy hankany Jerosalema; fa nikasa hanao vela-pandrika ho azy eny an-dalana izy ireo hamonoany azy. '
  '4':
  - type: text
    content: 'Dia namaly azy i Festosy fa ambenana any Kaisaria i Paoly ary efa hankany tsy ho ela koa izy. '
  '5':
  - type: text
    content: Koa aoka izay manam-pahefana eo aminareo, hoy izy, no hiara-midina amiko any ka hiampanga an-dRalehilahy, raha manan-keloka izy.
  '6':
  - type: text
    content: 'Tsy nijanona teo aminy mihoatra ny valo na folo andro i Festosy ary nidina nankany Kaisaria avy eo; koa nony ampitso dia nipetraka teo amin’ny fitsarana izy ary nasainy nalaina i Paoly. '
  '7':
  - type: text
    content: 'Nony tonga izy dia nitsangana manodidina azy ireo Jiosy izay nidina avy tany Jerosalema ka zavatra maro sady lehibe, izay tsy azony nohamarinina akory, no niampangany azy. '
  '8':
  - type: text
    content: 'Nandaha-teny hanala tsiny ny tenany i Paoly hoe: Tsy nanao ratsy aho, na tamin’ny lalànan’ny Jiosy, na tamin’ny '
  - type: text
    content: tempoly
  - type: text
    content: ', na tamin’i Kaisara.'
  '9':
  - type: text
    content: 'Ta hahazo sitraka tamin’ny Jiosy nefa i Festosy ka niteny tamin’i Paoly hoe: Tianao va ny hiakatra any Jerosalema hotsaraina eo anatrehako any, ny amin’izany zavatra izany? '
