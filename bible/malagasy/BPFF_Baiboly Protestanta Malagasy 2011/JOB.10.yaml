document_id: JOB.10,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Tohin’ny teny navalin’i Joba: Navelan’Andriamanitra ho teraka aho mba hanapotehana ahy'
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Maharikoriko ahy ny aiko!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hamoaka ny fitarainako aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hiteny noho ny fangidian’ny fanahiko.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy naidinao toy ny ronono va aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka nampandrinao toy ny rononomandry?
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, notafianao hoditra sy nofo aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary norarinao tamin’ny taolana sy ny ozatra.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aina sy famindrampo no nomenao ahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny fiahianao no niaro ny fofonaiko.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Saingy izao no nafeninao tao am-ponao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'eny, fantatro fa tao Aminao izao:'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha manota aho dia mamantatra ahy Ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy manafaka ahy amin’ny heloko.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha meloka aho dia lozako!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary na dia marina aza aho dia tsy ho sahy miandrandra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria feno henatra sady mahatsiaro fahoriana aho.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa raha sahy miandrandra aho dia hihaza ahy tahaka ny liona masiaka Ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hiverina indray Ianao ka ho mahagaga ny famelinao ahy.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mbola hanangana vavolombelona vaovao mandrakariva hanameloka ahy Ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hampitombo ny fahatezeranao amiko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fahavalo mifanontona no mamely ahy.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa nahoana no namoaka ahy foana avy tany am-bohoka Ianao?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa raha tsy izany dia ho niala aina aho ka tsy mba nisy maso nahita ahy akory,
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary efa toy ny tsy ary aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka noentina avy tany an-kibo ho any am-pasana.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Hiteny amin’Andriamanitra aho hoe: Aza manameloka ahy!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mba ampahalalao ahy izay anton’ny iadianao amiko!
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy vitsy va ny androko? Koa mitsahara Ianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mihataha mba hakako aina kely,
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dieny tsy mbola lasa ka tsy hiverina intsony aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ho any amin’ny tanin’ny haizina sy ny aloky ny fahafatesana,
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho any amin’ny tany maizim-pito,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ny an’ny aloky ny fahafatesana sy ny fikorontanana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady maizim-pito ny famirapiratana any!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mahafaly Anao va ny hampahory
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy hanary ny efa nisasaran’ny tananao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hamirapiratra amin’ny fisainan’ny ratsy fanahy Ianao?
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manana maso nofo va Ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na mijery tahaka ny fijerin’ny zanak’olombelona?
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tahaka ny andron’ny zanak’olombelona va ny andronao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na tahaka ny taonan’ny olombelona va ny taonanao
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no dia mikaroka izay heloko Ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mikatsaka izay fahotako,
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na dia fantatrao aza fa tsy mba ratsy fanahy aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy misy mahavonjy amin’ny tananao?
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny tananao ihany no namorona ahy ka nanisy endrika izao tenako rehetra izao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: kanjo levoninao indray aho izao!
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miangavy Anao aho, tsarovy fa notefenao toy ny tanimanga aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: koa hamerina ahy amin’ny vovoka indray va Ianao!
