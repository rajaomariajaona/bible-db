document_id: JOB.10,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: 'Tohin’ny teny navalin’i Joba: Navelan’Andriamanitra ho teraka aho mba hanapotehana ahy'
  - type: text
    content: Maharikoriko ahy ny aiko!
  - type: text
    content: Hamoaka ny fitarainako aho
  - type: text
    content: ary hiteny noho ny fangidian’ny fanahiko.
  '10':
  - type: text
    content: Tsy naidinao toy ny ronono va aho
  - type: text
    content: ka nampandrinao toy ny rononomandry?
  '11':
  - type: text
    content: Eny, notafianao hoditra sy nofo aho
  - type: text
    content: ary norarinao tamin’ny taolana sy ny ozatra.
  '12':
  - type: text
    content: Aina sy famindrampo no nomenao ahy
  - type: text
    content: ary ny fiahianao no niaro ny fofonaiko.
  '13':
  - type: text
    content: Saingy izao no nafeninao tao am-ponao;
  - type: text
    content: 'eny, fantatro fa tao Aminao izao:'
  '14':
  - type: text
    content: Raha manota aho dia mamantatra ahy Ianao
  - type: text
    content: ka tsy manafaka ahy amin’ny heloko.
  '15':
  - type: text
    content: Raha meloka aho dia lozako!
  - type: text
    content: Ary na dia marina aza aho dia tsy ho sahy miandrandra
  - type: text
    content: satria feno henatra sady mahatsiaro fahoriana aho.
  '16':
  - type: text
    content: Fa raha sahy miandrandra aho dia hihaza ahy tahaka ny liona masiaka Ianao
  - type: text
    content: ary hiverina indray Ianao ka ho mahagaga ny famelinao ahy.
  '17':
  - type: text
    content: Mbola hanangana vavolombelona vaovao mandrakariva hanameloka ahy Ianao
  - type: text
    content: ary hampitombo ny fahatezeranao amiko;
  - type: text
    content: fahavalo mifanontona no mamely ahy.
  '18':
  - type: text
    content: Koa nahoana no namoaka ahy foana avy tany am-bohoka Ianao?
  - type: text
    content: Fa raha tsy izany dia ho niala aina aho ka tsy mba nisy maso nahita ahy akory,
  '19':
  - type: text
    content: ary efa toy ny tsy ary aho
  - type: text
    content: ka noentina avy tany an-kibo ho any am-pasana.
  '2':
  - type: text
    content: 'Hiteny amin’Andriamanitra aho hoe: Aza manameloka ahy!'
  - type: text
    content: Mba ampahalalao ahy izay anton’ny iadianao amiko!
  '20':
  - type: text
    content: Tsy vitsy va ny androko? Koa mitsahara Ianao,
  - type: text
    content: mihataha mba hakako aina kely,
  '21':
  - type: text
    content: dieny tsy mbola lasa ka tsy hiverina intsony aho,
  - type: text
    content: dia ho any amin’ny tanin’ny haizina sy ny aloky ny fahafatesana,
  '22':
  - type: text
    content: ho any amin’ny tany maizim-pito,
  - type: text
    content: dia ny an’ny aloky ny fahafatesana sy ny fikorontanana
  - type: text
    content: sady maizim-pito ny famirapiratana any!
  '3':
  - type: text
    content: Mahafaly Anao va ny hampahory
  - type: text
    content: sy hanary ny efa nisasaran’ny tananao
  - type: text
    content: ka hamirapiratra amin’ny fisainan’ny ratsy fanahy Ianao?
  '4':
  - type: text
    content: Manana maso nofo va Ianao
  - type: text
    content: na mijery tahaka ny fijerin’ny zanak’olombelona?
  '5':
  - type: text
    content: Tahaka ny andron’ny zanak’olombelona va ny andronao
  - type: text
    content: na tahaka ny taonan’ny olombelona va ny taonanao
  '6':
  - type: text
    content: no dia mikaroka izay heloko Ianao
  - type: text
    content: ary mikatsaka izay fahotako,
  '7':
  - type: text
    content: na dia fantatrao aza fa tsy mba ratsy fanahy aho
  - type: text
    content: ary tsy misy mahavonjy amin’ny tananao?
  '8':
  - type: text
    content: Ny tananao ihany no namorona ahy ka nanisy endrika izao tenako rehetra izao,
  - type: text
    content: kanjo levoninao indray aho izao!
  '9':
  - type: text
    content: Miangavy Anao aho, tsarovy fa notefenao toy ny tanimanga aho,
  - type: text
    content: koa hamerina ahy amin’ny vovoka indray va Ianao!
