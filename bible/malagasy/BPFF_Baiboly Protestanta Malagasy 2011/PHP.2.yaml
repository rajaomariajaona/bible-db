document_id: PHP.2,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fanetren-tenan’i Kristy sy ny fahalehibiazany
  - type: text
    content: 'Koa raha misy fampirisihana ao amin’i '
  - type: text
    content: Kristy
  - type: text
    content: ', raha misy fampiononana avy amin’ny fitiavana, raha misy fiombonana ao amin’ny Fanahy, raha misy famindrampo sy fiantrana, '
  '10':
  - type: text
    content: mba ho amin’ny anaran’i Jesosy
  - type: text
    content: no handohalehan’ny lohalika rehetra,
  - type: text
    content: na ny any an-danitra na ny etỳ an-tany na ny any ambanin’ny tany,
  '11':
  - type: text
    content: sy haneken’ny lela rehetra
  - type: text
    content: fa Jesosy Kristy no Tompo
  - type: text
    content: ho voninahitr’Andriamanitra Ray.
  - type: heading
    content: Mamirapiratra toy ny fahazavana eo amin’izao tontolo izao
  '12':
  - type: text
    content: 'Koa amin’izany, ry malalako, tahaka ny nanekenareo hatramin’izay, tsy fony teo aminareo ihany aho, fa ankehitriny dia bebe kokoa aza raha tsy eo aho, miasà amin’ny tahotra sy ny hovitra mba hahatanteraka ny famonjena anareo. '
  '13':
  - type: text
    content: Fa Andriamanitra no miasa ao anatinareo na amin’ny fikasana na amin’ny fanatanterahana mba hahatò ny sitrapony.
  '14':
  - type: text
    content: 'Ataovy amin’ny tsy fimonomononana sy ny tsy fisalasalana ny zavatra rehetra '
  '15':
  - type: text
    content: 'mba ho tsy manan-tsiny sady madio ianareo; dia zanak’Andriamanitra tsy azo kianina eo amin’ny firenena meloka sy maditra izay amirapiratanareo tahaka ny fahazavana eo amin’izao tontolo izao, '
  '16':
  - type: text
    content: 'mitana ny tenin’ny fiainana: Mba ho reharehako izany amin’ny andron’i '
  - type: text
    content: Kristy
  - type: text
    content: ' ka tsy ho nihazakazaka foana na nisasatra foana aho. '
  '17':
  - type: text
    content: 'Eny, na dia haidina ho fanatitra aidina eo amin’ny fanatitra sy fisoronan’ny finoanareo aza aho dia faly ka miara-mifaly aminareo rehetra. '
  '18':
  - type: text
    content: Koa aoka izany no hampifaly anareo koa, ary miaraha mifaly amiko.
  - type: heading
    content: Ny iraka nampanaovina an’i Timoty sy i Epafrodito
  '19':
  - type: text
    content: 'Manantena ao amin’i Jesosy Tompo anefa aho fa haniraka haingana an’i Timoty ho atỳ aminareo, mba hifaliako koa, rehefa fantatro ny momba anareo. '
  '2':
  - type: text
    content: 'dia tanteraho ny fifaliako, amin’ny firaisanareo saina, miray fitiavana, miray fo, miray hevitra; '
  '20':
  - type: text
    content: 'Fa tsy manana olona mitovy firehana amiko aho na dia iray akory aza, izay hazoto hiahy anareo. '
  '21':
  - type: text
    content: 'Ny hafa rehetra dia samy mitady ny azy avy fa tsy ny an’i Jesosy '
  - type: text
    content: Kristy
  - type: text
    content: '; '
  '22':
  - type: text
    content: 'izy kosa dia fantatrareo fa lehilahy voazaha toetra satria efa niara-nanompo tamiko tamin’ny Filazantsara, tahaka ny zanaka manompo ny rainy. '
  '23':
  - type: text
    content: 'Ary izy no antenaiko hirahina haingana, rehefa hitako mazava ny momba ahy. '
  '24':
  - type: text
    content: Nefa matoky ao amin’ny Tompo aho fa ny tenako dia mbola ho avy haingana koa.
  '25':
  - type: text
    content: 'Nihevitra koa aho fa tokony hampandehaniko hankaty aminareo i Epafrodito rahalahiko sady mpiray asa amiko no mpiantafika namako ary Apostoly nirahinareo hanompo sy hanome ahy izay nilaiko. '
  '26':
  - type: text
    content: 'Koa satria manina anareo rehetra izy dia difotra alahelo nony fantany fa renareo ny naharariany. '
  '27':
  - type: text
    content: 'Eny, narary saika maty tokoa izy; nefa namindra fo taminy Andriamanitra, ary tsy taminy ihany fa tamiko koa, fandrao hanana alahelo mifanontona aho. '
  '28':
  - type: text
    content: 'Izany no nampahazoto ahy haniraka azy mba hifalianareo amin’ny fahitana azy indray, ary mba ho maivana kokoa ny alaheloko. '
  '29':
  - type: text
    content: 'Koa raiso ao amin’ny Tompo amin’ny fifaliana feno izy, ary omeo voninahitra izay olona tahaka izany, '
  '3':
  - type: text
    content: 'tsy manao na inona na inona amin’ny fifampiandaniana na amin’ny fieboeboana foana; fa aoka kosa samy hihevitra ny namany ho mihoatra noho ny tenany amin’ny fanetren-tena. '
  '30':
  - type: text
    content: satria efa saika maty izy noho ny asan’i Kristy sady nanao ny ainy tsy ho zavatra mba hanefa izay tsy vitanareo tamin’ny fanompoana ahy.
  '4':
  - type: text
    content: Aza samy mihevitra ny azy ihany fa aoka samy hihevitra ny an’ny namany koa.
  '5':
  - type: text
    content: 'Aoka ho ao aminareo izao saina izao, izay tao amin’i Kristy Jesosy koa:'
  '6':
  - type: text
    content: Na dia nanana ny endrik’Andriamanitra aza Izy
  - type: text
    content: dia tsy nataony ho zavatra hofikiriny
  - type: text
    content: mafy ny fitoviana amin’Andriamanitra,
  '7':
  - type: text
    content: fa nofoanany ny tenany
  - type: text
    content: tamin’ny nakany ny endriky ny mpanompo
  - type: text
    content: sy ny nahatongavany ho manam-pitoviana amin’ny olona;
  - type: text
    content: ary rehefa hita fa nanan-tarehy ho olona Izy
  '8':
  - type: text
    content: dia nanetry tena
  - type: text
    content: ka nanaiky hatramin’ny fahafatesana,
  - type: text
    content: dia ilay fahafatesana teo amin’ny hazofijaliana.
  '9':
  - type: text
    content: Noho izany no nanandratan’Andriamanitra Azy ho ambony indrindra
  - type: text
    content: sy nanomezany Azy ny anarana
  - type: text
    content: izay ambony noho ny anarana rehetra,
