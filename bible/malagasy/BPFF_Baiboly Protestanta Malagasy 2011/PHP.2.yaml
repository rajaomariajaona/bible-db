document_id: PHP.2
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fanetren-tenan’i Kristy sy ny fahalehibiazany
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Koa raha misy fampirisihana ao amin’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ', raha misy fampiononana avy amin’ny fitiavana, raha misy fiombonana ao amin’ny Fanahy, raha misy famindrampo sy fiantrana, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'dia tanteraho ny fifaliako, amin’ny firaisanareo saina, miray fitiavana, miray fo, miray hevitra; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'tsy manao na inona na inona amin’ny fifampiandaniana na amin’ny fieboeboana foana; fa aoka kosa samy hihevitra ny namany ho mihoatra noho ny tenany amin’ny fanetren-tena. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Aza samy mihevitra ny azy ihany fa aoka samy hihevitra ny an’ny namany koa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Aoka ho ao aminareo izao saina izao, izay tao amin’i Kristy Jesosy koa:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Na dia nanana ny endrik’Andriamanitra aza Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia tsy nataony ho zavatra hofikiriny
- type: usfm
  marker: q1
  children:
  - type: text
    text: mafy ny fitoviana amin’Andriamanitra,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: fa nofoanany ny tenany
- type: usfm
  marker: q1
  children:
  - type: text
    text: tamin’ny nakany ny endriky ny mpanompo
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny nahatongavany ho manam-pitoviana amin’ny olona;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary rehefa hita fa nanan-tarehy ho olona Izy
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: dia nanetry tena
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka nanaiky hatramin’ny fahafatesana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ilay fahafatesana teo amin’ny hazofijaliana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Noho izany no nanandratan’Andriamanitra Azy ho ambony indrindra
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy nanomezany Azy ny anarana
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay ambony noho ny anarana rehetra,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: mba ho amin’ny anaran’i Jesosy
- type: usfm
  marker: q1
  children:
  - type: text
    text: no handohalehan’ny lohalika rehetra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: na ny any an-danitra na ny etỳ an-tany na ny any ambanin’ny tany,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: sy haneken’ny lela rehetra
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa Jesosy Kristy no Tompo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho voninahitr’Andriamanitra Ray.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mamirapiratra toy ny fahazavana eo amin’izao tontolo izao
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Koa amin’izany, ry malalako, tahaka ny nanekenareo hatramin’izay, tsy fony teo aminareo ihany aho, fa ankehitriny dia bebe kokoa aza raha tsy eo aho, miasà amin’ny tahotra sy ny hovitra mba hahatanteraka ny famonjena anareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Fa Andriamanitra no miasa ao anatinareo na amin’ny fikasana na amin’ny fanatanterahana mba hahatò ny sitrapony.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ataovy amin’ny tsy fimonomononana sy ny tsy fisalasalana ny zavatra rehetra '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'mba ho tsy manan-tsiny sady madio ianareo; dia zanak’Andriamanitra tsy azo kianina eo amin’ny firenena meloka sy maditra izay amirapiratanareo tahaka ny fahazavana eo amin’izao tontolo izao, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'mitana ny tenin’ny fiainana: Mba ho reharehako izany amin’ny andron’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' ka tsy ho nihazakazaka foana na nisasatra foana aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Eny, na dia haidina ho fanatitra aidina eo amin’ny fanatitra sy fisoronan’ny finoanareo aza aho dia faly ka miara-mifaly aminareo rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Koa aoka izany no hampifaly anareo koa, ary miaraha mifaly amiko.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny iraka nampanaovina an’i Timoty sy i Epafrodito
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Manantena ao amin’i Jesosy Tompo anefa aho fa haniraka haingana an’i Timoty ho atỳ aminareo, mba hifaliako koa, rehefa fantatro ny momba anareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Fa tsy manana olona mitovy firehana amiko aho na dia iray akory aza, izay hazoto hiahy anareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ny hafa rehetra dia samy mitady ny azy avy fa tsy ny an’i Jesosy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: '; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'izy kosa dia fantatrareo fa lehilahy voazaha toetra satria efa niara-nanompo tamiko tamin’ny Filazantsara, tahaka ny zanaka manompo ny rainy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary izy no antenaiko hirahina haingana, rehefa hitako mazava ny momba ahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Nefa matoky ao amin’ny Tompo aho fa ny tenako dia mbola ho avy haingana koa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Nihevitra koa aho fa tokony hampandehaniko hankaty aminareo i Epafrodito rahalahiko sady mpiray asa amiko no mpiantafika namako ary Apostoly nirahinareo hanompo sy hanome ahy izay nilaiko. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Koa satria manina anareo rehetra izy dia difotra alahelo nony fantany fa renareo ny naharariany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Eny, narary saika maty tokoa izy; nefa namindra fo taminy Andriamanitra, ary tsy taminy ihany fa tamiko koa, fandrao hanana alahelo mifanontona aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Izany no nampahazoto ahy haniraka azy mba hifalianareo amin’ny fahitana azy indray, ary mba ho maivana kokoa ny alaheloko. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Koa raiso ao amin’ny Tompo amin’ny fifaliana feno izy, ary omeo voninahitra izay olona tahaka izany, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: satria efa saika maty izy noho ny asan’i Kristy sady nanao ny ainy tsy ho zavatra mba hanefa izay tsy vitanareo tamin’ny fanompoana ahy.
