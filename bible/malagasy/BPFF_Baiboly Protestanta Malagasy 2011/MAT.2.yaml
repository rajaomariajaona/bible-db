document_id: MAT.2,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny famangian’ny Magy
  - type: heading
    content: Ampit. Lio 2.8-20
  - type: text
    content: 'Rehefa teraka tao Betlehema any '
  - type: text
    content: Jodia
  - type: text
    content: ' Jesosy, tamin’ny andron’i Heroda mpanjaka, dia indreo, nisy Magy avy tany atsinanana tonga tany Jerosalema ka niteny hoe: '
  '10':
  - type: text
    content: 'Koa nony nahita ilay kintana izy ireo dia dibo-kafaliana. '
  '11':
  - type: text
    content: 'Ary rehefa tafiditra tao an-trano tokoa izy ireo dia nahita ny Zazakely sy i Maria reniny ka niankohoka teo anatrehany; ary nony efa nosokafany ireo fitahirizan-drakiny dia nanolotra fanomezana ho Azy izy ireo, dia volamena sy zavamanitra ary miora. '
  '12':
  - type: text
    content: Nefa rehefa notoroan’Andriamanitra hevitra tamin’ny nofy izy ireo tsy hiverina any amin’i Heroda dia lalana hafa no nandehanany nody ho any amin’ny fonenany.
  - type: heading
    content: Ny fandosirana nankany Ejipta
  '13':
  - type: text
    content: 'Nony efa lasa nandeha ireo dia indro, nisy anjelin’ny Tompo niseho tamin’i Josefa tamin’ny nofy ka niteny hoe: Mifohaza ianao, ento ny Zazakely sy ny reniny, dia mandosira any Ejipta, koa mitoera any ambara-piteniko aminao; satria i Heroda dia mitady ny Zazakely hovonoiny. '
  '14':
  - type: text
    content: 'Dia nifoha izy ka nitondra ny Zazakely sy ny reniny, raha mbola alina, dia lasa nankany Ejipta; '
  '15':
  - type: text
    content: ary nitoetra tany izy ambara-pahafatin’i Heroda, mba hahatanteraka izay nampilazain’NY TOMPO ny mpaminany
  - type: note
    content: 'Na: profeta.'
  - type: text
    content: ' hoe: «Nantsoiko avy tany Ejipta ny zanako» (Hos 11.1).'
  - type: heading
    content: Ny fandringanana ny zazakely
  '16':
  - type: text
    content: Nony fantatr’i Heroda fa voafitaky ny Magy izy dia tezitra mafy izy ka nandefa iraka hamono ny zazalahy rehetra hatramin’ny roa taona no ho midina, izay tao Betlehema sy tamin’ny manodidina rehetra, araka ny fotoana izay nofotorany fatratra tamin’ny Magy.
  '17':
  - type: text
    content: Dia tanteraka izay nampilazaina an’i Jeremia mpaminany
  - type: note
    content: 'Na: profeta.'
  - type: text
    content: ' hoe:'
  '18':
  - type: text
    content: «Nisy feo re tao Rama,
  - type: text
    content: dia fidradradradrana sy fitomaniana fatratra;
  - type: text
    content: nitomany ny zanany Rahely,
  - type: text
    content: ary tsy azo nampiononina izy
  - type: text
    content: satria lany ritra ireny.» (Jer 31.15)
  - type: heading
    content: Ny fiverenana avy tany Ejipta
  '19':
  - type: text
    content: 'Rehefa maty i Heroda dia indro, nisy anjelin’ny Tompo niseho tamin’i Josefa tany Ejipta tamin’ny nofy ka niteny hoe: '
  '2':
  - type: text
    content: 'Aiza Ilay teraka ho Mpanjakan’ny '
  - type: text
    content: Jiosy
  - type: text
    content: '? Fa nahita ny kintany teny atsinanana izahay ka tonga mba hiankohoka eo anatrehany.'
  '20':
  - type: text
    content: 'Mifohaza ianao, ento ny Zazakely sy ny reniny, dia mankanesa any amin’ny tanin’ny Israely fa efa maty ireo izay nitady ny ain’ny Zazakely. '
  '21':
  - type: text
    content: Dia nifoha izy ka nitondra ny Zazakely sy ny reniny, dia tonga tany amin’ny tanin’ny Israely.
  - type: heading
    content: Lio 2.39-40
  '22':
  - type: text
    content: 'Rehefa reny fa i Arkelaosy no nanjaka tany Jodia nandimby an’i Heroda rainy, dia natahotra hankany izy; koa rehefa notoroan’Andriamanitra hevitra tamin’ny nofy izy dia lasa nankany amin’ny faritanin’i Galilia. '
  '23':
  - type: text
    content: Nony tonga tany izy ireo, dia nonina tao amin’ny tanàna atao hoe Nazareta mba hahatanteraka izay nampilazaina ny mpaminany
  - type: note
    content: 'Na: profeta.'
  - type: text
    content: ' hoe: Hatao hoe Nazareana Izy.'
  '3':
  - type: text
    content: 'Ary nony nandre izany i Heroda mpanjaka dia nangorohoro izy mbamin’i Jerosalema manontolo. '
  '4':
  - type: text
    content: 'Dia namory ny lehiben’ny mpisorona rehetra sy ny '
  - type: text
    content: mpanoradalàna
  - type: text
    content: ' tamin’ny vahoaka izy ka nanontany azy ireo hoe: Aiza moa no hahaterahan’i '
  - type: text
    content: Kristy
  - type: text
    content: '? '
  '5':
  - type: text
    content: 'Dia hoy ireo taminy: Ao Betlehema any Jodia; fa izao no voasoratry ny mpaminany:'
  '6':
  - type: text
    content: «Ary ianao, ry Betlehema, tanin’i Joda,
  - type: text
    content: tsy dia kely indrindra amin’ireo tanàna ao Joda ianao tsy akory;
  - type: text
    content: fa avy ao aminao no hiavian’Izay iray ho Mpanapaka,
  - type: text
    content: ka Izy no ho Mpiandry ny Israely oloko» (Mik 5.1).
  '7':
  - type: text
    content: 'Dia nampiantso ireo Magy mangingina i Heroda ka namotopototra fatratra azy ireo ny amin’izay fotoana nisehoan’ilay kintana. '
  '8':
  - type: text
    content: 'Dia naniraka azy ireo hankany Betlehema izy ka niteny hoe: Andeha, hadihadio tsara ny amin’Ilay Zazakely; koa rehefa hitanareo Izy dia ambarao amiko mba hankanesako any koa hiankohoka eo anatrehany.'
  '9':
  - type: text
    content: 'Rehefa nandre ny tenin’ny mpanjaka izy ireo dia lasa; ary indro ilay kintana hitany teny atsinanana, nialoha azy mandra-pijanony teo ambonin’izay nitoeran’ny Zazakely. '
