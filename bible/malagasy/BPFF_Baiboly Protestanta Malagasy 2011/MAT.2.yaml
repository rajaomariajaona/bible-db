document_id: MAT.2,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny famangian’ny Magy
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Ampit. Lio 2.8-20
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa teraka tao Betlehema any '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jodia
    - type: text
      text: ' Jesosy, tamin’ny andron’i Heroda mpanjaka, dia indreo, nisy Magy avy tany atsinanana tonga tany Jerosalema ka niteny hoe: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa nony nahita ilay kintana izy ireo dia dibo-kafaliana. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa tafiditra tao an-trano tokoa izy ireo dia nahita ny Zazakely sy i Maria reniny ka niankohoka teo anatrehany; ary nony efa nosokafany ireo fitahirizan-drakiny dia nanolotra fanomezana ho Azy izy ireo, dia volamena sy zavamanitra ary miora. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nefa rehefa notoroan’Andriamanitra hevitra tamin’ny nofy izy ireo tsy hiverina any amin’i Heroda dia lalana hafa no nandehanany nody ho any amin’ny fonenany.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fandosirana nankany Ejipta
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nony efa lasa nandeha ireo dia indro, nisy anjelin’ny Tompo niseho tamin’i Josefa tamin’ny nofy ka niteny hoe: Mifohaza ianao, ento ny Zazakely sy ny reniny, dia mandosira any Ejipta, koa mitoera any ambara-piteniko aminao; satria i Heroda dia mitady ny Zazakely hovonoiny. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nifoha izy ka nitondra ny Zazakely sy ny reniny, raha mbola alina, dia lasa nankany Ejipta; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ary nitoetra tany izy ambara-pahafatin’i Heroda, mba hahatanteraka izay nampilazain’NY TOMPO ny mpaminany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.15 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: profeta.
      marker-yv: yv-n
    - type: text
      text: ' hoe: «Nantsoiko avy tany Ejipta ny zanako» (Hos 11.1).'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fandringanana ny zazakely
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nony fantatr’i Heroda fa voafitaky ny Magy izy dia tezitra mafy izy ka nandefa iraka hamono ny zazalahy rehetra hatramin’ny roa taona no ho midina, izay tao Betlehema sy tamin’ny manodidina rehetra, araka ny fotoana izay nofotorany fatratra tamin’ny Magy.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia tanteraka izay nampilazaina an’i Jeremia mpaminany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.17 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: profeta.
      marker-yv: yv-n
    - type: text
      text: ' hoe:'
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Nisy feo re tao Rama,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia fidradradradrana sy fitomaniana fatratra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nitomany ny zanany Rahely,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy azo nampiononina izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria lany ritra ireny.» (Jer 31.15)
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fiverenana avy tany Ejipta
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa maty i Heroda dia indro, nisy anjelin’ny Tompo niseho tamin’i Josefa tany Ejipta tamin’ny nofy ka niteny hoe: '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aiza Ilay teraka ho Mpanjakan’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jiosy
    - type: text
      text: '? Fa nahita ny kintany teny atsinanana izahay ka tonga mba hiankohoka eo anatrehany.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mifohaza ianao, ento ny Zazakely sy ny reniny, dia mankanesa any amin’ny tanin’ny Israely fa efa maty ireo izay nitady ny ain’ny Zazakely. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nifoha izy ka nitondra ny Zazakely sy ny reniny, dia tonga tany amin’ny tanin’ny Israely.
  - type: usfm
    marker: r
    children:
    - type: text
      text: Lio 2.39-40
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa reny fa i Arkelaosy no nanjaka tany Jodia nandimby an’i Heroda rainy, dia natahotra hankany izy; koa rehefa notoroan’Andriamanitra hevitra tamin’ny nofy izy dia lasa nankany amin’ny faritanin’i Galilia. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nony tonga tany izy ireo, dia nonina tao amin’ny tanàna atao hoe Nazareta mba hahatanteraka izay nampilazaina ny mpaminany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.23 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: profeta.
      marker-yv: yv-n
    - type: text
      text: ' hoe: Hatao hoe Nazareana Izy.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nony nandre izany i Heroda mpanjaka dia nangorohoro izy mbamin’i Jerosalema manontolo. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia namory ny lehiben’ny mpisorona rehetra sy ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpanoradalàna
    - type: text
      text: ' tamin’ny vahoaka izy ka nanontany azy ireo hoe: Aiza moa no hahaterahan’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: '? '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy ireo taminy: Ao Betlehema any Jodia; fa izao no voasoratry ny mpaminany:'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Ary ianao, ry Betlehema, tanin’i Joda,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy dia kely indrindra amin’ireo tanàna ao Joda ianao tsy akory;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa avy ao aminao no hiavian’Izay iray ho Mpanapaka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka Izy no ho Mpiandry ny Israely oloko» (Mik 5.1).
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nampiantso ireo Magy mangingina i Heroda ka namotopototra fatratra azy ireo ny amin’izay fotoana nisehoan’ilay kintana. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia naniraka azy ireo hankany Betlehema izy ka niteny hoe: Andeha, hadihadio tsara ny amin’Ilay Zazakely; koa rehefa hitanareo Izy dia ambarao amiko mba hankanesako any koa hiankohoka eo anatrehany.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa nandre ny tenin’ny mpanjaka izy ireo dia lasa; ary indro ilay kintana hitany teny atsinanana, nialoha azy mandra-pijanony teo ambonin’izay nitoeran’ny Zazakely. '
