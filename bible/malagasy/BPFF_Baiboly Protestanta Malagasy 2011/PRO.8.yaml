document_id: PRO.8,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Miantso indray ny Fahendrena
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Tsy miantso va ny Fahendrena?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tsy manandra-peo va ny fahalalana?
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Ny anatro no raiso fa tsy ny volafotsy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aleo ny fahalalana toy izay ny volamena voafantina.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Fa ny fahendrena dia tsara noho ny voahangy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy azo ampitahaina aminy ny zavatra mampitsiriritra rehetra.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mampahafantatra ny tenany ny Fahendrena
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Izaho Fahendrena dia miara-monina amin’ny fahamalinana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hitako ny fahaizana misaina mazava.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Ny fankahalana ny ratsy no fahatahorana NY TOMPO;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny fiavonavonana, ny fireharehana, ny lalana ratsy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny teny lainga dia samy halako avokoa.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Ahy ny tolo-tsaina sy ny tena fahendrena.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izaho no fahalalana, izaho no manan-kery.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Amin’ny alalako no anjakan’ny mpanjaka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy amoahan’ny mpanapaka ny didy aman-dalàna araka ny rariny;
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: amin’ny alalako no anapahan’ny mpitondra sy ny lehibe
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny mpitsara rehetra amin’ny tany.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Tiako izay tia ahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary izay fatra-pitady ahy dia hahita ahy.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Ato amiko ny harena sy ny voninahitra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, ny harena mateza sy ny fahamarinana.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Ny vokatra avy amiko dia tsara noho ny volamena, eny, noho ny volamena tsy miharo aza,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mihoatra noho ny volafotsy voafantina ny fitomboan’ny harenako.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Eo an-tampon’ny toerana avo amoron-dalana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy eo an-tsampanan-dalana no ijoroany.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Eo amin’izay alehan’ny fahamarinana no izorako,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mihazo eo afovoan’ny lalan’ny fitsarana marina
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: mba hampandovako harena izay tia ahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy hamenoako ny trano fitahirizany.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Efa hatramin’ny voalohany ny fahendrena
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Namboatra ahy ho fiandohan’ny lalany NY TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho voalohany amin’ny asany hatramin’ny taloha.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Notendreny hatramin’ny fahagola aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, hatramin’ny voalohany indrindra, fony tsy mbola ary ny tany.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Fony tsy mbola nisy ny lalina no efa teraka aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fony tsy mbola ary ny loharano miboiboika be,
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: fony tsy mbola naorina ny tendrombohitra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fony tsy mbola nisy ny havoana no efa teraka aho,
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: fony tsy mbola natao ny tany, na ny saha,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na ny vovo-tany voalohany amin’izao rehetra izao.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Tamin’ny nampiorenany ny lanitra dia teo aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tamin’ny namaritany ny habakabaka tambonin’ny lalina,
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: tamin’ny nampitoerany ny rahona eny ambony
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka niboiboika fatratra ny loharanon’ny lalina,
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: tamin’ny nanisiany faritra ho an’ny ranomasina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba tsy hahazoan’ny rano mihoatra ny fetrany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: rehefa nandidy ny amin’ny fanorenan’ny tany Izy,
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Eo anilan’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: vavahady
  - type: usfm
    marker: q1
    children:
    - type: text
      text: amin’ny fidirana ho ao an-tanàna
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'sy eny amin’ny vavahady no iantsoany mafy hoe:'
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: dia mpita-marika teo anilany aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady ravoravo isanandro isanandro
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka nilalao mandrakariva teo anatrehany;
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: eny, nahafaly ahy ny tany nataony honenana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary naharavoravo ahy ny zanak’olombelona.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Sambatra izay mihaino ny Fahendrena
    marker-yv: yv-h
  '32':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Koa mihainoa ahy ianareo anaka;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa sambatra izay manaraka ny diako!
  '33':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Mihainoa anatra ka hendre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa aza manao tsirambina.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: Sambatra izay olona mihaino ahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka miari-tory mandrakariva eo amin’ny varavarako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary miambina eo amin’ny tolanam-baravarako!
  '35':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: Fa izay mahita ahy dia mahita fiainana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady mahazo sitraka amin’NY TOMPO.
  '36':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: Izay diso ahy kosa dia mampidi-doza amin’ny tenany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay rehetra mankahala ahy dia tia fahafatesana.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Ianareo no antsoiko, ry olona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny feoko dia ho amin’ny zanak’olombelona!
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Manàna fahamalinana, ry kely saina!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka hahira-tsaina ianareo, ry adala!
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Henoy, fa hilaza zava-dehibe aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny hilaza ny mahitsy no isokafan’ny molotro.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Fa ny marina ihany no holazain’ny vavako,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary amin’ny molotro dia fahavetavetana ny ratsy;
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: marina ny teny rehetra ataoko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy misy fiolakolahana na fitaka ao aminy.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Miharihary avokoa ireny amin’ny mazava saina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mahitsy amin’ny efa nahazo fahalalana.
