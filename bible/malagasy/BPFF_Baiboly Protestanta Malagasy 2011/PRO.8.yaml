document_id: PRO.8,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Miantso indray ny Fahendrena
  - type: text
    content: Tsy miantso va ny Fahendrena?
  - type: text
    content: Ary tsy manandra-peo va ny fahalalana?
  '10':
  - type: text
    content: Ny anatro no raiso fa tsy ny volafotsy;
  - type: text
    content: aleo ny fahalalana toy izay ny volamena voafantina.
  '11':
  - type: text
    content: Fa ny fahendrena dia tsara noho ny voahangy;
  - type: text
    content: tsy azo ampitahaina aminy ny zavatra mampitsiriritra rehetra.
  - type: heading
    content: Mampahafantatra ny tenany ny Fahendrena
  '12':
  - type: text
    content: Izaho Fahendrena dia miara-monina amin’ny fahamalinana
  - type: text
    content: ary hitako ny fahaizana misaina mazava.
  '13':
  - type: text
    content: Ny fankahalana ny ratsy no fahatahorana NY TOMPO;
  - type: text
    content: ny fiavonavonana, ny fireharehana, ny lalana ratsy
  - type: text
    content: ary ny teny lainga dia samy halako avokoa.
  '14':
  - type: text
    content: Ahy ny tolo-tsaina sy ny tena fahendrena.
  - type: text
    content: Izaho no fahalalana, izaho no manan-kery.
  '15':
  - type: text
    content: Amin’ny alalako no anjakan’ny mpanjaka
  - type: text
    content: sy amoahan’ny mpanapaka ny didy aman-dalàna araka ny rariny;
  '16':
  - type: text
    content: amin’ny alalako no anapahan’ny mpitondra sy ny lehibe
  - type: text
    content: ary ny mpitsara rehetra amin’ny tany.
  '17':
  - type: text
    content: Tiako izay tia ahy
  - type: text
    content: ary izay fatra-pitady ahy dia hahita ahy.
  '18':
  - type: text
    content: Ato amiko ny harena sy ny voninahitra,
  - type: text
    content: eny, ny harena mateza sy ny fahamarinana.
  '19':
  - type: text
    content: Ny vokatra avy amiko dia tsara noho ny volamena, eny, noho ny volamena tsy miharo aza,
  - type: text
    content: ary mihoatra noho ny volafotsy voafantina ny fitomboan’ny harenako.
  '2':
  - type: text
    content: Eo an-tampon’ny toerana avo amoron-dalana
  - type: text
    content: sy eo an-tsampanan-dalana no ijoroany.
  '20':
  - type: text
    content: Eo amin’izay alehan’ny fahamarinana no izorako,
  - type: text
    content: ary mihazo eo afovoan’ny lalan’ny fitsarana marina
  '21':
  - type: text
    content: mba hampandovako harena izay tia ahy
  - type: text
    content: sy hamenoako ny trano fitahirizany.
  - type: heading
    content: Efa hatramin’ny voalohany ny fahendrena
  '22':
  - type: text
    content: Namboatra ahy ho fiandohan’ny lalany NY TOMPO,
  - type: text
    content: ho voalohany amin’ny asany hatramin’ny taloha.
  '23':
  - type: text
    content: Notendreny hatramin’ny fahagola aho,
  - type: text
    content: eny, hatramin’ny voalohany indrindra, fony tsy mbola ary ny tany.
  '24':
  - type: text
    content: Fony tsy mbola nisy ny lalina no efa teraka aho,
  - type: text
    content: fony tsy mbola ary ny loharano miboiboika be,
  '25':
  - type: text
    content: fony tsy mbola naorina ny tendrombohitra,
  - type: text
    content: fony tsy mbola nisy ny havoana no efa teraka aho,
  '26':
  - type: text
    content: fony tsy mbola natao ny tany, na ny saha,
  - type: text
    content: na ny vovo-tany voalohany amin’izao rehetra izao.
  '27':
  - type: text
    content: Tamin’ny nampiorenany ny lanitra dia teo aho,
  - type: text
    content: tamin’ny namaritany ny habakabaka tambonin’ny lalina,
  '28':
  - type: text
    content: tamin’ny nampitoerany ny rahona eny ambony
  - type: text
    content: ka niboiboika fatratra ny loharanon’ny lalina,
  '29':
  - type: text
    content: tamin’ny nanisiany faritra ho an’ny ranomasina
  - type: text
    content: mba tsy hahazoan’ny rano mihoatra ny fetrany,
  - type: text
    content: rehefa nandidy ny amin’ny fanorenan’ny tany Izy,
  '3':
  - type: text
    content: 'Eo anilan’ny '
  - type: text
    content: vavahady
  - type: text
    content: amin’ny fidirana ho ao an-tanàna
  - type: text
    content: 'sy eny amin’ny vavahady no iantsoany mafy hoe:'
  '30':
  - type: text
    content: dia mpita-marika teo anilany aho
  - type: text
    content: sady ravoravo isanandro isanandro
  - type: text
    content: ka nilalao mandrakariva teo anatrehany;
  '31':
  - type: text
    content: eny, nahafaly ahy ny tany nataony honenana
  - type: text
    content: ary naharavoravo ahy ny zanak’olombelona.
  - type: heading
    content: Sambatra izay mihaino ny Fahendrena
  '32':
  - type: text
    content: Koa mihainoa ahy ianareo anaka;
  - type: text
    content: fa sambatra izay manaraka ny diako!
  '33':
  - type: text
    content: Mihainoa anatra ka hendre,
  - type: text
    content: fa aza manao tsirambina.
  '34':
  - type: text
    content: Sambatra izay olona mihaino ahy
  - type: text
    content: ka miari-tory mandrakariva eo amin’ny varavarako
  - type: text
    content: ary miambina eo amin’ny tolanam-baravarako!
  '35':
  - type: text
    content: Fa izay mahita ahy dia mahita fiainana,
  - type: text
    content: sady mahazo sitraka amin’NY TOMPO.
  '36':
  - type: text
    content: Izay diso ahy kosa dia mampidi-doza amin’ny tenany;
  - type: text
    content: izay rehetra mankahala ahy dia tia fahafatesana.
  '4':
  - type: text
    content: Ianareo no antsoiko, ry olona,
  - type: text
    content: ary ny feoko dia ho amin’ny zanak’olombelona!
  '5':
  - type: text
    content: Manàna fahamalinana, ry kely saina!
  - type: text
    content: Aoka hahira-tsaina ianareo, ry adala!
  '6':
  - type: text
    content: Henoy, fa hilaza zava-dehibe aho
  - type: text
    content: ary ny hilaza ny mahitsy no isokafan’ny molotro.
  '7':
  - type: text
    content: Fa ny marina ihany no holazain’ny vavako,
  - type: text
    content: ary amin’ny molotro dia fahavetavetana ny ratsy;
  '8':
  - type: text
    content: marina ny teny rehetra ataoko,
  - type: text
    content: tsy misy fiolakolahana na fitaka ao aminy.
  '9':
  - type: text
    content: Miharihary avokoa ireny amin’ny mazava saina,
  - type: text
    content: ary mahitsy amin’ny efa nahazo fahalalana.
