document_id: 1KI.7,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nananganana ny lapan’ny mpanjaka
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Telo amby folo taona no nanaovan’i Solomona ny lapany dia vitany manontolo izany. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Vato voafantina sady lehibe ny fototra, dia vato folo hakiho sy valo hakiho. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Teo ambony dia nisy vato voafantina voapaika araka ny marika, sy hazo sedera. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Nasiany vato voapaika telo andalana sy hazo sedera iray andalana manodidina ny kianja lehibe, tahaka ny amin’ny kianja anatiny amin’ny tranon’NY TOMPO, ary amin’ny lalantsara fidirana amin’ny Trano.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ireo asa nankinina tamin’i Hirama
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 2Tan 2.10-13
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ary i Solomona mpanjaka dia nandefa iraka haka an’i Hirama avy tany Tiro. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Zanaky ny vehivavy mpitondratena tamin’ny fokon’i Naftaly izy io, fa ny rainy dia lehilahy tiriana, mpiasa varahina. Feno fahendrena sy fahiratan-tsaina ary fahaizana ny asa varahina rehetra izy. Dia tonga tao amin’i Solomona mpanjaka i Hirama ka nanao izay asa rehetra tao aminy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ireo andry varahina
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 2Tan 3.15-17
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Nanao ny andry varahina roa izy; valo amby folo '
    - type: usfm
      marker: w
      children:
      - type: text
        text: hakiho
    - type: text
      text: ' avy ny haavon’ny iray ary roa amby folo hakiho ny manodidina azy. Toy izany koa ny faharoa. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Nanamboatra lohany varahina voarendrika roa izy hatao eo amin’ny tampon’ny andry, dimy hakiho avy ny haavony. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Nisy harato sy rojo miolana amin’ny lohany teo amin’ny tampon’ny andry avy: Fito amin’ny lohany iray ary fito koa amin’ny lohany iray hafa. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Nanao ny andry izy ary nasiany roa andalana manodidina ny asa harato iray, izay hafono ny lohany izay teo an-tampon’ny andry; toy izany koa no nataony tamin’ny lohany iray. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Ny lohany izay teo an-tampon’ny andry dia nataony mitarehim-boninkazo lisy tahaka ny amin’ny lalantsara fidirana, ary efatra hakiho ny haavony. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Nanangana ilay trano Alan’i Libanona izy aloha; zato '
    - type: usfm
      marker: w
      children:
      - type: text
        text: hakiho
    - type: text
      text: ' ny lavany, dimampolo hakiho ny sakany ary telopolo hakiho ny haavony ambonin’ny andry sedera efatra andalana. Nisy rairainy sedera teo ambonin’ny andry. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Ny lohany teo an-tampon’ny andry roa dia nohodidinin’ny sarin’ampongabendanitra roanjato nilahatra teo ambony, teo akaikin’ny kibony sy tany ambadiky ny harato; toy izany koa tamin’ny lohany iray. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Ny andry dia natsangany teo amin’ny lalantsara fidirana amin’ny tempoly ka nisy ny andry teo ankavanana, nomeny anarana hoe Jakina
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Jakina: Hampiorina izy.'
      marker-yv: yv-n
    - type: text
      text: ; ary nisy koa ny andry teo ankavia, izay nataony hoe Boaza
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Boaza: Ao aminy no misy hery.'
      marker-yv: yv-n
    - type: text
      text: '. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Ny tampon’ny andry dia nitarehim-boninkazo lisy. Toy izany no nahavitany ny asa momba ny andry.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny koveta lehibe voarendrika
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 2Tan 4.2-5
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Nanamboatra ny koveta lehibe boribory voarendrika koa izy ka folo '
    - type: usfm
      marker: w
      children:
      - type: text
        text: hakiho
    - type: text
      text: ' no halehiben’ny vavany, dimy hakiho ny haavony ary telopolo hakiho ny manodidina azy. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Nisy sarim-boatango manodidina azy, folo teny amin’ny hakiho iray manodidina ny koveta lehibe, teo ambanin’ny molotry ny koveta lehibe; ny sarim-boatango dia roa andalana ary niara-narendriny tamin’ny koveta lehibe izany. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Io koveta lehibe io dia nipetraka teo ambonin’ny sarin’omby roa amby folo; ny telo dia nanatrika ny avaratra, ny telo dia nanatrika ny andrefana, ny telo dia nanatrika ny atsimo ary ny telo dia nanatrika ny atsinanana; teo ambonin’ireo ny koveta lehibe ary nifampiamboho izy rehetra. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Ny hateviny dia felatanana iray ary tahaka ny molotry ny kapoaka ny molony, tahaka ny vonin’ny lisy; nahalany roa arivo '
    - type: usfm
      marker: w
      children:
      - type: text
        text: bata
    - type: text
      text: ' izany.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ireo fitoeran’ny koveta varahina
    marker-yv: yv-h
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Nanao ny fitoeran’ireo koveta varahina folo indray izy; efatra hakiho ny lavan’ny iray, efatra hakiho koa ny sakany ary telo '
    - type: usfm
      marker: w
      children:
      - type: text
        text: hakiho
    - type: text
      text: ' ny haavony. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Toy izao ny nanaovana ireo fitoeran’ny koveta ireo: Nisy atiny, ary ireo atiny ireo dia nisy sisiny nihazona azy; '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'tamin’ny atiny izay nohodidinin’ny sisiny dia nisy sarin’ny liona sy omby ary kerobima; teo ambonin’ny sisiny koa dia nisy faladiany; ary teo ambanin’ny sary liona sy omby dia nisy rojo mihantona. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Notafoany hazo sedera ireo efitrano teo ambonin’ny andry izay miisa dimy amby folo isan’andalana ka dimy amby efapolo izy rehetra. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Ireo fitoeran’ny koveta ireo dia samy nisy kodiarana varahina efatra sy tanan-kodiarana varahina, ary tamin’ny zorony efatra dia nisy fanamafisana; teo ambanin’ny koveta no nisy ny fanamafisana voarendrika ary nanandrify ny rojo izany. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Ny vavan’ny koveta dia teo anatin’ny sisiny izay nihoatra hakiho iray teo ambonin’io; hakiho iray sy tapany kosa sady boribory ny vavany; tamin’ny vavany koa dia nisy soratra, ary efa-joro ny sisiny fa tsy boribory. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Ny kodiarana efatra dia teo ambanin’ireo atiny ary ny fihazonana ny tanan-kodiarana dia nikambana tamin’ny fitoeran’ny koveta ihany; hakiho iray sy tapany ny haavon’ny kodiarana. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Tahaka ny amin’ny kodiaran-kalesy ny fomban’ny kodiarana: Ny tanany sy ny boriboriny manodidina azy sy ny tana-masoandrony ary ny foitrany dia nataony tamin’ny varahina avokoa. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Nisy fanamafisana efatra teo amin’ny zorony efatra amin’ny fitoeran’ny koveta iray ary mitranga avy eo amin’ny fitoeran’ny koveta ireo. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Teo amin’ny tapany ambony amin’ny fitoeran’ny koveta dia nisy boribory manodidina, antsasaky ny hakiho ny haavony; teo amin’ny tapany ambony amin’ny fitoeran’ny koveta koa dia nisy fihazonana, ary ny atiny dia narendrika hiray aminy. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Fa ny atin’ny fanamafisana sy ny atiny hafa izay mbola nisy toerana malalaka dia nosoratany sarin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: kerobima
    - type: text
      text: ' sy liona ary hazo palma sady nasiany rojo manodidina. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: Tahaka izany no nanaovany ny fitoerana folo ho an’ny koveta, samy natao indray mandrendrika avokoa ary nitovy refy sy nitovy endrika izy rehetra.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 2Tan 4.6
    marker-yv: yv-h
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Nanao koveta varahina folo koa izy; ny koveta dia nahalany efapolo '
    - type: usfm
      marker: w
      children:
      - type: text
        text: bata
    - type: text
      text: ' avy; samy efatra '
    - type: usfm
      marker: w
      children:
      - type: text
        text: hakiho
    - type: text
      text: ' avy ny koveta; ary koveta iray avy no tamin’ny fitoerany folo. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Dia nametraka ny fitoeran’ireo koveta izy, dimy teo ankavanan’ny Trano, ary dimy teo ankavian’ny Trano; ilay koveta lehibe koa dia nataony teo ankavanan’ny Trano, teo atsimo atsinanana. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Telo andalana ny rairainy, ary ny varavarankely dia nifanandrify intelo. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: Ary nanao ireo koveta sy ireo sotron’afo ary ireo lovia famafazana i Hirama.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fitanisana ireo fitaovana vita amin’ny metaly
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 2Tan 4.7–5.1
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vitan’i Hirama ny asa rehetra izay nataony ho an’i Solomona mpanjaka ho amin’ny tranon’NY TOMPO. Ireto izany: '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'Ny andry roa sy ny bolany roa amin’ny lohany teo an-tampon’ny andry roa, ny harato roa izay hafono ny bolany roa amin’ny lohany teo an-tampon’ny andry avy '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'ary ny sarin’ampongabendanitra efajato ho amin’ny harato roa, ampongabendanitra roa andalana ho amin’ny harato iray hafono ny bolany roa amin’ny lohany teny an-tampon’ny andry avy; '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'ny fitoeran’ny koveta folo sy ny koveta folo ho eo ambonin’ny fitoerany, '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: 'ny koveta lehibe iray sy ny sary omby roa amby folo teo ambaniny, '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: 'ireo vilany sy sotron’afo ary ireo lovia famafazana. Ireo fanaka rehetra ireo, izay nataon’i Hirama ho an’i Solomona mpanjaka ho amin’ny tranon’NY TOMPO, dia varahina mamirapiratra avokoa. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: 'Tany amin’ny tany amoron’i Jordana no nandrendrehan’ny mpanjaka azy tamin’ny tanimanga teo anelanelan’i Sokota sy Zaretana. '
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: Dia napetrak’i Solomona amin’ny toerany ny fanaka rehetra; be dia be izany ka tsy nozahana intsony ny lanjan’ny varahina.
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: 'Nanao ny fanaka rehetra izay ao amin’ny tranon’NY TOMPO i Solomona: Ny alitara volamena sy ny latabatra volamena izay fitoeran’ny mofo atao fanatitra; '
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: 'ny fitoeran-jiro, dimy amin’ny ankavanana ary dimy amin’ny ankavia, teo anoloan’ny fitoerana masina indrindra, dia samy volamena voafantina; ireo voninkazo sy ireo jiro ary ireo hetin-jiro dia samy volamena avokoa; '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ny varavarana rehetra sy ny tolàna dia natao efa-joro, ary ny varavarankely dia nifanandrify intelo. '
  '50':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '50'
    - type: text
      text: 'ary ireo lovia, antsy, vilia famafazana, lovia kely ary ny fitoeran-davenon-jiro dia samy volamena voafantina; ny savily ho amin’ny lelam-baravaran’ny efitra anatiny, dia ny fitoerana masina indrindra, sy ho amin’ny lelam-baravaran’ny tempoly, dia samy volamena avokoa. '
  '51':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '51'
    - type: text
      text: Toy izany no nahavitana ny asa nataon’i Solomona mpanjaka ho amin’ny tranon’NY TOMPO. Dia nampidirin’i Solomona ny zavatra izay efa nohamasinin’i Davida rainy, dia ny volafotsy sy ny volamena ary ny fanaka, ka nataony tao amin’ny efitrano fitahirizana.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Nataony koa ny lalantsara maro andry; dimampolo hakiho ny lavany ary telopolo hakiho ny sakany; nisy koa ny lalantsara fidirana teo anoloany ary nisy andry sy tokonana koa teo anoloan’io. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Nataony koa ny lalantsara hitoeran’ny sezafiandrianana izay hitsarany, dia ny lalantsara fitsarana; nataony hazo sedera avokoa hatreo amin’ny gorodona ka hatrany amin’ny rihana.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
