    - type: text
      text: Ny tranony izay nitoerany dia teo amin’ny kianja hafa tao anatinatiny kokoa noho ny lalantsara fidirana ary nitovy rafitra tamin’io koa. Ary nanao trano tahaka izany lalantsara fidirana manodidina ny kianja lehibe izany koa i Solomona ho an’ny zanakavavin’i Farao izay nampakariny ho vady.
