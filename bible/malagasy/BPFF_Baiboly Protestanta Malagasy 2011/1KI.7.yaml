      text: 'Ireo rehetra ireo dia vato voafantina avokoa, voapaika araka ny marika sady voatsofa ny atiny sy ny ivelany, hatreo amin’ny fanambaniny ka hatrany an-tampony, ary teo ivelany koa, hatrany amin’ny kianja lehibe. '
