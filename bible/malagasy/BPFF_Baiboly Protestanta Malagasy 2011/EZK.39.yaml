document_id: EZK.39
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Faminaniana ny amin’i Goga (tohiny)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary ianao, ry '
  - type: usfm
    marker: w
    children:
    - type: text
      text: zanak’olona
  - type: text
    text: ', maminania ny hamelezana an’i Goga ka lazao hoe: Izao no lazain’NY TOMPO Andriamanitra: Indro, hamely anao Aho, ry Goga, mpanjakan’i Rosy sy i Meseka ary i Tobala. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Hitaritarika sy hitondra anao hiakatra avy any amin’ny farany avaratra Aho, dia hoentiko ho any amin’ny tendrombohitry ny Israely ianao. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Hasiako ny tsipìkanao hiala eny an-tananao havia, ary halatsako hiala eny an-tananao havanana ny zana-tsipìkanao. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Any amin’ny tendrombohitry ny Israely no hiampatramparanao sy ny miaramilanao rehetra mbamin’ny firenena izay miaraka aminao; homeko hohanin’ny vorona mpihaza samihafa karazana rehetra sy ny bibidia ianao. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Eny an-tsaha no hiamparanao; fa Izaho no efa niteny, hoy NY TOMPO Andriamanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Handefasako afo i Magoga sy izay mipetraka tsy manana ahiahy any amoron-tsiraka; dia ho fantany fa Izaho no TOMPO. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ary ny anarako masina dia hataoko fantatra ao amin’ny Israely oloko; tsy havelako hamavoina intsony ny anarako masina; dia ho fantatry ny firenena fa Izaho no TOMPO izay masina ao amin’ny Israely.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Indro, tonga izany ary efa tanteraka, hoy NY TOMPO Andriamanitra. Izany no andro izay nolazaiko. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary hivoaka ny mponina ao amin’ny tanànan’ny Israely ka handrehitra sy hitaina ny fiadiana, dia ny ampinga lehibe, ny tsipìka sy ny zana-tsipìka, ny langilangy sy ny lefona, ary hitaina izany mandritra ny fito taona izy; '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'fa tsy haka kitay hazo any an-tsaha na hanapaka hazo any an’ala izy, fa hitaina ny fiadiana ka hamabo izay efa namabo azy sy handroba izay efa nandroba azy, hoy NY TOMPO Andriamanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Amin’izany andro izany dia homeko tany eo amin’ny Israely i Goga hasiana fasana, dia ny lohasahan’ny mpandalo eo atsinanan’ny ranomasina, ka hanampin-dalana ny mpandalo izany; any no handevenana an’i Goga sy ny vahoakany marobe rehetra; ary ny anarany dia hatao hoe Lohasahan’ireo vahoaka maroben’i Goga. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Fito volana mipaka no handevenan’ny taranak’Israely azy, hanadiovany ny tany. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Eny, ny tompon-tany rehetra no handevina azy; ary ho laza ho azy amin’ny andro hampisehoako ny voninahitro izany, hoy NY TOMPO Andriamanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary hisy olona hotendrena hitety tsy mitsahatra ny tany ka handevina izay mbola tavela eny ambonin’ny tany, hanadiovana azy. Hikaroka mandritra ny fito volana izy. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary rehefa mandeha mitety ny tany ireo mpitety tany ka mahita taolan’olona dia hanangana marika eo anilany izy, mandra-pandevin’ny mpandevina izany ao amin’ny Lohasahan’ireo vahoaka maroben’i Goga. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ary hisy tanàna koa hatao hoe Hamona
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '39.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hamona: Vahoaka marobe.'
    marker-yv: yv-n
  - type: text
    text: . Toy izany no hanadiovany ny tany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary ianao, ry zanak’olona, dia izao no lazain’NY TOMPO Andriamanitra: Lazao amin’ny voromanidina rehetra sy ny bibidia rehetra hoe: Mivoria ianareo ka mankanesa atỳ; miangòna ianareo avy amin’ny manodidina ho amin’ny fanatitro izay vonoiko ho anareo, dia fanatitra lehibe eny amin’ny tendrombohitry ny Israely, hihinananareo nofo sy hisotroanareo ra. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ny nofon’ny lehilahy mahery no hohaninareo, ary ny ran’ireo mpanjakan’ny tany no hosotroinareo, dia ondrilahy, zanak’ondry, osilahy ary vantotra ombilahy, samy mifahy avy any Basana izy rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Dia hihinana matavy ianareo mandra-pahavokinareo ary hisotro ra mandra-paha-leonareo avy amin’ny fanatitro izay novonoiko ho anareo. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary ho voky soavaly sy ny mpitaingina azy ary lehilahy mahery mbamin’ny miaramila rehetra eo amin’ny latabatro ianareo, hoy NY TOMPO Andriamanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Dia hasehoko any amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jentilisa
  - type: text
    text: ' ny voninahitro ka hohitan’ny firenena rehetra ny fitsarana hataoko sy ny tanako izay hatsotrako aminy. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ary ho fantatry ny taranak’Israely fa Izaho no TOMPO Andriamaniny hatramin’iny andro iny ka hatramin’ny ho avy rehetra.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Famintinana ny hafatra noentin’i Ezekiela
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ho fantatry ny Jentilisa fa ny heloky ny taranak’Israely no nahababo azy; fa satria nivadika Tamiko izy dia izany no nanafenako ny tavako taminy sy nanolorako azy ho eo an-tanan’ny fahavalony, dia lavon-tsabatra izy rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Araka ny fahalotoany sy ny fahadisoany no navaliko azy sy nanafenako ny tavako taminy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Koa izao no lazain’NY TOMPO Andriamanitra: Ankehitriny dia haveriko ho toy ny teo aloha i Jakoba, ary hamindrako fo ny taranak’Israely rehetra; ary hiseho ho saro-piaro noho ny amin’ny anarako masina Aho. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Dia hivesatra ny fahamenarany sy ny fahadisoany rehetra izay nahadiso azy Tamiko izy rehefa mandry fehizay ao amin’ny taniny ka tsy hisy hampitahotra azy. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Rehefa ampodiko avy any amin’ny firenena izy ary angoniko avy any amin’ny tanin’ny fahavalony dia hiseho ho masina eo imason’ny Jentilisa Aho amin’ny ataoko amin’ireny; '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'dia ho fantany fa Izaho TOMPO no Andriamaniny amin’ny ampandehanako azy ho babo any amin’ny firenena sy amin’ny anangonako azy ho any amin’ny taniny ka tsy hisy hafoiko any izy na dia iray akory aza. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Tsy hafeniko aminy intsony ny tavako; fa haidiko ao amin’ny taranak’Israely ny Fanahiko, hoy NY TOMPO Andriamanitra.
