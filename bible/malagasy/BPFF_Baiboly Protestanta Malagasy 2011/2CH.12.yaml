document_id: 2CH.12
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Manafika an’ny Joda i Sisaka, mpanjakan’i Ejipta
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 1Mpa 14.25-28
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Rehefa nampandry ny fanjakany sady efa nahery i Rehoboama dia nahafoy ny lalànan’NY TOMPO izy sy ny Israely rehetra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary tamin’ny taona fahadimy nanjakan’i Rehoboama mpanjaka dia niakatra hamely an’i Jerosalema i Sisaka, mpanjakan’i Ejipta, fa nivadika tamin’NY TOMPO ny mponina tany. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Nitondra kalesy fitondra miady roanjato sy arivo sy mpitaingin-tsoavaly enina alina izy, ary tsy hita isa ny olona izay nanaraka azy avy tany Ejipta, dia ny Lobita sy ny Sokita ary ny Etiopiana. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dia nahazo ny tanàna mimanda izay any Joda izy ka tonga tany Jerosalema. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary tonga tao amin’i Rehoboama sy ireo mpanapaka ny Joda, izay tafangona tany Jerosalema noho ny amin’i Sisaka, i Semaia mpaminany ka niteny taminy hoe: Izao no lazain’NY TOMPO: Efa nahafoy Ahy ianareo, koa Izaho kosa dia mba hahafoy anareo ho eo an-tanan’i Sisaka. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia nanetry tena ireo mpanapaka ny Israely sy ny mpanjaka ka niteny hoe: Marina NY TOMPO. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Nony hitan’NY TOMPO fa nanetry tena izy ireo dia tonga tao amin’i Semaia indray ny tenin’NY TOMPO hoe: Efa nanetry tena izy ka tsy handringana azy Aho fa hamonjy azy tsy ho ela; ary tsy haidiko amin’i Jerosalema avy amin’ny tanan’i Sisaka ny fahatezerako. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Kanefa ho mpanompony ihany izy, mba hahafantarany ny fanompoana Ahy sy ny fanompoana any amin’ny fanjakana hafa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Dia niakatra hamely an’i Jerosalema i Sisaka, mpanjakan’i Ejipta, ka namabo ny harena tao amin’ny tranon’NY TOMPO sy ny harena tao amin’ny tranon’ny mpanjaka. Samy nobaboiny avokoa izy rehetra; nobaboiny koa ny ampinga volamena izay nataon’i Solomona. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Nanao ampinga varahina ho solon’ireny i Rehoboama mpanjaka ka nanolotra azy ho eo an-tanan’ny lehiben’ny mpiambina, izay niambina ny varavaran’ny tranon’ny mpanjaka. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ary na oviana na oviana no nidiran’ny mpanjaka tao amin’ny tranon’NY TOMPO dia noentin’ny mpiambina ireny, ary naveriny tao amin’ny efitranon’ny mpiambina indray avy eo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Rehefa nanetry tena izy dia niala taminy ny fahatezeran’NY TOMPO ka tsy nahalany ringana azy, sady nisy fahatsaram-panahy koa tao amin’ny Joda.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nifaranan’ny fanjakan’i Rehoboama
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 1Mpa 14.21-24
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary i Rehoboama mpanjaka dia nitombo hery tany Jerosalema ka nitondra ny fanjakany; iraika amby efapolo taona izy raha tonga mpanjaka, ary fito amby folo taona no nanjakany tany Jerosalema, ilay tanàna nofidin’NY TOMPO tamin’ny fokon’ny Israely hampitoerany ny anarany. Ary ny anaran’ny reniny dia Nama amonita. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ary nanao izay ratsy izy, satria tsy niezaka hitady NY TOMPO.
- type: usfm
  marker: r
  children:
  - type: text
    text: 1Mpa 14.29-31
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ny tantaran’i Rehoboama, hatramin’ny voalohany ka hatramin’ny farany, tsy voasoratra ao amin’ny bokin’i Semaia mpaminany sy Ido mpahita ny amin’ny firazanana va izany? Niady mandrakariva i Rehoboama sy i Jeroboama. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ary nodimandry any amin’ny razany i Rehoboama, dia nalevina tao an-Tanànan’i Davida izy; ary i Abia zanany no nanjaka nandimby azy.
