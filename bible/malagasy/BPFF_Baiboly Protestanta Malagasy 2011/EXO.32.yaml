document_id: EXO.32
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fahotan’ny Zanak’Israely tamin’ilay zanak’omby volamena
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Rehefa hitan’ny olona fa naharitra ela i Mosesy ka tsy mbola nidina avy tao an-tendrombohitra ihany dia nitangorona nankeo amin’i Arona izy ireo ka niteny taminy hoe: Mitsangàna ka anaovy andriamanitra izahay hitarika antsika eo aloha; fa ilay Mosesy iny, izay lehilahy nitondra antsika niakatra avy tany amin’ny tany Ejipta, dia tsy fantatray izay nanjo azy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Dia hoy i Arona taminy: Esory ary ny kavim-bolamena izay eny amin’ny sofin’ny vadinareo sy ny zanakareo lahy ary ny zanakareo vavy ka ento etỳ amiko. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dia nanala ny kavim-bolamena izay teny amin’ny sofiny ny olona rehetra ka nitondra azy ho eo amin’i Arona. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary nandray izany tamin’ny tanan’ny olona izy ka nanamboatra izany tamin’ny fandraka sady nandrendrika azy ho ombilahy kely; dia niteny ny olona hoe: Io no andriamanitrao, ry Israely; io no nitondra anao niakatra avy tany amin’ny tany Ejipta.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Raha nahita izany i Arona dia nanorina alitara teo anoloany, sady niteny hoe: Andro firavoravoana ho an’NY TOMPO rahampitso. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Dia nifoha vao maraina ny olona ka nanolotra fanatitra dorana manontolo sady nitondra fanati-pihavanana; avy eo dia nipetraka nihinana sy nisotro ny olona ary nitsangana nilalao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dia hoy NY TOMPO tamin’i Mosesy: Mandehana midina ianao; fa efa tonga manao ratsy ny olonao izay noentinao niakatra avy tany Ejipta. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Nalaky nivily niala tamin’ny lalana izay nasaiko nalehany izy ka efa nandrendrika ombilahy kely ho azy; ary efa niankohoka teo anatrehany sy namono zavatra hatao fanatitra taminy izy ka niteny hoe: Io no andriamanitrao, ry Israely, izay nitondra anao niakatra avy tany amin’ny tany Ejipta.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Hoy koa NY TOMPO tamin’i Mosesy: Efa hitako io firenena io fa indro, firenena mafy hatoka izy. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Koa ankehitriny, avelao hanaovako azy fa hirehitra aminy ny fahatezerako ka haringako izy, fa ianao kosa dia hataoko firenena lehibe.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Nefa nifona tamin’NY TOMPO Andriamaniny i Mosesy ka niteny hoe: TOMPO ô, nahoana ny fahatezeranao no mirehitra amin’ny olonao izay noentinao nivoaka avy tany Ejipta tamin’ny hery lehibe sy ny tanana mahery? '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Nahoana ny Ejiptiana no avela hilaza hoe: Hahita loza no nitondrany azy ireny nivoaka, hamonoany azy eny an-tendrombohitra sy handringanany azy tsy ho ambonin’ny tany. Mialà amin’ny fahatezeranao mirehitra ka manenena ny amin’ny loza izay hanjo ny olonao. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Tsarovy i Abrahama sy Isaka ary Israely mpanomponao, izay nianiananao tamin’ny tenanao sy nilazanao hoe: Hahamaro ny taranakareo Aho ka ho tahaka ny kintana eny amin’ny lanitra; ary ny tany rehetra nolazaiko dia homeko ny taranakareo ary izy no handova izany mandrakizay.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Dia nanenina NY TOMPO ny amin’ny loza izay nokasainy hamelezana ny olony.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Dia nihodina i Mosesy ka nidina avy tao an-tendrombohitra, nitondra ny vato fisaka roa nisy ny Vavolombelona teny an-tanany; ny vato fisaka dia nosoratana teo amin’ny lafiny roa; samy nisy soratra teo anoloany sy teo ambadika. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary ny vato fisaka dia asan’Andriamanitra, ary ny soratra dia soratr’Andriamanitra, voasokitra teo amin’ny vato fisaka. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary rehefa ren’i Josoa ny fitabataban’ny olona izay nihorakoraka dia hoy izy tamin’i Mosesy: Misy tabataban’ady atsy an-toby. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Fa hoy kosa izy:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy feo fihobian’ny mahery
- type: usfm
  marker: q1
  children:
  - type: text
    text: na feo fitomanian’ny resy
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa feon’ny mihira no reko.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary raha nanakaiky ny toby izy dia nahita ny ombilahy kely sy ny dihy; dia nirehitra ny fahatezeran’i Mosesy ka natontany ny vato fisaka teny an-tanany ary nopotehiny teo am-pototry ny tendrombohitra. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Dia nalainy ilay ombilahy kely izay nataon’ny olona ka nodorany tamin’ny afo ary notorotoroiny ho vovoka, dia nafafiny teo ambonin’ny rano ka nampisotroiny ny Zanak’Israely.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Dia hoy i Mosesy tamin’i Arona: Inona no nataon’ity firenena ity taminao no nampidiranao heloka lehibe teo aminy?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Dia hoy i Arona: Aoka tsy hirehitra ny fahatezeran’ny tompoko, fa ianao mahalala ny toetry ny olona fa mpanao ratsy izy; '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'satria hoy ireo tamiko: Manaova andriamanitra ho antsika, hitarika antsika eo alohantsika; fa ilay Mosesy iny, izay lehilahy nitondra antsika niakatra avy tany amin’ny tany Ejipta, dia tsy fantatray izay nanjo azy. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary hoy aho taminy: Izay rehetra manana volamena dia aoka hanala izany; dia nomeny ahy ireo; ary natsipiko tao anaty afo ireo ka io ombilahy kely io no nivoaka tao.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny famaizana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Rehefa hitan’i Mosesy fa navela hanaram-po amin’izay tsy mety ny olona, satria navelan’i Arona ho fanakoran’ny fahavalony izy, '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'dia nijanona teo amin’ny vavahadin’ny toby i Mosesy ka niteny hoe: Izay rehetra an’NY TOMPO, mankanesa etỳ amiko. Ary ny taranak’i Levy rehetra dia niangona teo aminy. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Dia hoy izy tamin’ireo: Izao no lazain’NY TOMPO, Andriamanitr’Israely: Samia manao ny sabany eo an-tehezany avy ianareo dia mandrosoa ary miverimberena hatreny amin’ny vavahadin’ny toby iray ka hatramin’ny iray hafa, ary samia mamono ny rahalahiny avy sy ny sakaizany avy ary ny namany avy ianareo.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Dia nanatanteraka ny tenin’i Mosesy ny taranak’i Levy; nahafatesana tokony ho telo arivo lahy ny olona tamin’izany andro izany. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Dia hoy Mosesy: Efa nanokana ny tenanareo ho an’NY TOMPO ianareo androany, satria samy namono hatramin’ny zanany sy ny rahalahiny avy, mba hahazoanareo fitahiana anio.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mifona ho an’ny Israely i Mosesy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Nony maraina dia hoy i Mosesy tamin’ny olona: Efa nahavita fahotana lehibe ianareo; ary ankehitriny dia hiakatra ho any amin’NY TOMPO aho fa angamba havelany hanao fanavotana ny amin’ny fahotanareo aho.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Dia niverina ho any amin’NY TOMPO i Mosesy ka niteny hoe: Indrisy! Efa nahavita fahotana lehibe ity firenena ity fa nanamboatra andriamanitra volamena ho azy. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Ankehitriny, enga anie ka hamela ny fahotany Ianao! Fa raha tsy izany, mifona aminao aho, vonoy tsy ho eo amin’ny bokinao izay nosoratanao ny anarako.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Nefa hoy NY TOMPO tamin’i Mosesy: Na iza na iza nanota tamiko dia hovonoiko tsy ho eo amin’ny bokiko ny anarany. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Mandehana ankehitriny ka ento ny olona ho any amin’izay efa nolazaiko taminao. Indro ny Anjeliko hitarika anao eo aloha; ary amin’izay andro hamaliako dia hamaly azy noho ny fahotany Aho.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Ary NY TOMPO namely ny olona satria nanao ombilahy kely izy, dia ilay namboarin’i Arona.
