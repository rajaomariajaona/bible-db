type_code: plt
verses:
  '1':
  - type: text
    content: INDRAY MIJERY
  - type: text
    content: I Amosa mpaminany no voalohany ara-potoana amin’ireo antsoina hoe mpaminany mpitoriteny, ary isan’ireo atao hoe Mpaminany madinika roa amby folo. Izy sy i Hosea mpaminany no mpaminany mpitoriteny niasa tany amin’ny fanjakana Avaratra na Israely. Ny fotoana niasany dia teo anelanelan’ny taona 760 sy 750 tal JK, tamin’ny andro nanjakan’i Jeroboama II.
  - type: text
    content: Ny votoatin’ny Boky
  - type: text
    content: Nandroso be ara-politika sy ara-toekarena tokoa ny Israely tamin’izany, kanefa izany harena izany dia teo am-pelatanan’ny olom-bitsy fotsiny ary niharihary ny hantsana nampisaraka ny olona ambony sy ny vahoaka. Ny mpanankarena dia nanao tsindry hazo lena ny mahantra, nanjaka ny kolikoly teo amin’ny fitsarana, ny varotra hosoka, ary indrindra, tsy niraharaha ny tenin’Andriamanitra ny olona. Izany rehetra izany anefa dia fanitsakitsahana ny Fanekena, izay mitaky fitiavana sy fahamarinana eo amin’ny fiarahamonina manontolo; ary izany no fototry ny fanamelohana mafy ambaran’ny Mpaminany. Ambarany aza fa efa nolavin’NY TOMPO ny fanompoam-pivavahana ataon’ny Israely.
  - type: text
    content: I Amosa dia mitantara ny nanirahan’Andriamanitra azy haminany any Avaratra, na dia any Joda aza no fiaviany. Izany fanambaràna izany, izay nilaza ny loza ho avy, dia tsy zakan’ny mpanjaka sy ny mpisorona tao Betela ka noroahin’ireo hiverina any Joda izy.
  - type: text
    content: Ny firafitry ny Boky
  - type: text
    content: 'Filazana ny fahotan’ireo firenena manodidina ny Israely, ary ny an’Israely sy Joda: 1–2'
  - type: text
    content: 'Teny samihafa izay maneho ny adin’Andriamanitra amin’ny olony: 3–6'
  - type: text
    content: 'Ny fahitana dimy, izay nampahitana an’i Amosa, ary manambara ny fitsarana hataon’Andriamanitra: 7–9'
