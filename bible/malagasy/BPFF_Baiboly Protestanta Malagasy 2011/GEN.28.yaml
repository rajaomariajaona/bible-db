document_id: GEN.28
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary niantso an’i Jakoba Isaka ka nitsodrano azy sy namepetra azy hoe: Aza maka vady avy amin’ny zanakavavin’ny Kananita ianao. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Miaingà ka mankanesa any Padana-Arama, any amin’ny tranon’i Betoela rain’ny reninao, dia makà vady any, avy amin’ny zanakavavin’i Labana anadahin-dreninao. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Andriamanitra Tsitoha anie hitahy anao ka hahamaro fara anao sy hampitombo anao mba ho tonga firenena maro ianao! '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Homeny anao anie ny fitahiana an’i Abrahama, dia ho anao sy ny taranakao koa, mba handovanao ny tany fivahiniananao izay efa nomen’Andriamanitra an’i Abrahama! '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ary nampandeha an’i Jakoba Isaka ka lasa izy nankany Padana-Arama ho any amin’i Labana, zanak’i Betoela arameana, anadahin’i Rebeka, renin’i Jakoba sy i Esao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary hitan’i Esao fa efa nitsodrano an’i Jakoba Isaka ka nampandeha azy ho any Padana-Arama haka vady any; hitany koa fa rehefa nitsodrano azy izy dia namepetra azy hoe: Aza maka vady avy amin’ny zanakavavin’ny Kananita; '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'hitany fa nanaraka ny tenin’ny ray aman-dreniny i Jakoba ka lasa nankany Padana-Arama. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary satria hitan’i Esao tokoa fa ratsy teo imason’Isaka rainy ny zanakavavin’ny Kananita, '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: dia lasa izy nankany amin’Ismaela ka naka vady an’i Mahalata, zanakavavin’Ismaela, zanak’i Abrahama, sady anabavin’i Nebaiota, ho fanampin’ny vady izay efa nananany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nofin’i Jakoba
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dia niala tany Bery-Sheba i Jakoba ka nankany Harana. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Tonga teo amin’ny toerana iray izy ka nandry teo nandritra ny alina satria efa maty ny masoandro. Naka vato iray tamin’izany toerana izany izy ka nataony ondana, dia nandry teo izy. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary nanonofy izy hoe: Indro, nisy tohatra nitsangana tamin’ny tany ka ny lohany dia nipaka tamin’ny lanitra; ary indreo, nisy anjelin’Andriamanitra niakatra sy nidina tamin’izany. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary indro NY TOMPO nitsangana teo amboniny ka niteny hoe: Izaho no TOMPO, Andriamanitr’i Abrahama rainao sy Andriamanitr’Isaka. Ny tany izay andrianao dia homeko anao sy ny taranakao. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ny taranakao dia ho tahaka ny vovoka amin’ny tany; hiely any andrefana sy any atsinanana ary any avaratra sy any atsimo ianao. Aminao sy ny taranakao no hitahiana ny firenena rehetra ambonin’ny tany. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ary indro Aho momba anao ka hiaro anao amin’izay lalan-kalehanao rehetra ary hampody anao indray ho amin’ity tany ity. Tsy handao anao Aho mandra-pahatanterako izay voalazako taminao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Rehefa nahatsiaro tamin’ny torimasony i Jakoba dia niteny hoe: Eto amin’ity toerana ity tokoa NY TOMPO fa izaho no tsy nahalala! '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Dia raiki-tahotra izy ka niteny hoe: Endre, mahatahotra ity toerana ity! Tsy hafa ity fa tranon’Andriamanitra sy vavahadin’ny lanitra! '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary nifoha vao maraina i Jakoba dia naka ilay vato izay nataony ondana ka nanorina azy ho tsangambato dia nandraraka diloilo taminy. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ary ny anaran’izany toerana izany dia nataony hoe Betela
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28.19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Betela: Tranon’Andriamanitra.'
    marker-yv: yv-n
  - type: text
    text: ', fa Lozy no anaran’ilay tanàna teo aloha. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Dia nivoady i Jakoba ka niteny hoe: Raha homba ahy Andriamanitra ka hiaro ahy amin’izao lalana alehako izao, sady hanome ahy mofo hohaniko sy akanjo hitafiako, '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'ka ho tafaverina soa amantsara any amin’ny tranon’ny raiko aho, dia NY TOMPO no ho Andriamanitro, '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ary ity vato izay naoriko ho tsangambato ity dia ho tranon’Andriamanitra, koa amin’izay rehetra homenao ahy dia homeko Anao tokoa ny ampahafolony.
