document_id: GEN.28,3103
type_code: plt
verses:
  '1':
  - type: text
    content: 'Ary niantso an’i Jakoba Isaka ka nitsodrano azy sy namepetra azy hoe: Aza maka vady avy amin’ny zanakavavin’ny Kananita ianao. '
  '10':
  - type: text
    content: 'Dia niala tany Bery-Sheba i Jakoba ka nankany Harana. '
  '11':
  - type: text
    content: 'Tonga teo amin’ny toerana iray izy ka nandry teo nandritra ny alina satria efa maty ny masoandro. Naka vato iray tamin’izany toerana izany izy ka nataony ondana, dia nandry teo izy. '
  '12':
  - type: text
    content: 'Ary nanonofy izy hoe: Indro, nisy tohatra nitsangana tamin’ny tany ka ny lohany dia nipaka tamin’ny lanitra; ary indreo, nisy anjelin’Andriamanitra niakatra sy nidina tamin’izany. '
  '13':
  - type: text
    content: 'Ary indro NY TOMPO nitsangana teo amboniny ka niteny hoe: Izaho no TOMPO, Andriamanitr’i Abrahama rainao sy Andriamanitr’Isaka. Ny tany izay andrianao dia homeko anao sy ny taranakao. '
  '14':
  - type: text
    content: 'Ny taranakao dia ho tahaka ny vovoka amin’ny tany; hiely any andrefana sy any atsinanana ary any avaratra sy any atsimo ianao. Aminao sy ny taranakao no hitahiana ny firenena rehetra ambonin’ny tany. '
  '15':
  - type: text
    content: Ary indro Aho momba anao ka hiaro anao amin’izay lalan-kalehanao rehetra ary hampody anao indray ho amin’ity tany ity. Tsy handao anao Aho mandra-pahatanterako izay voalazako taminao.
  '16':
  - type: text
    content: 'Rehefa nahatsiaro tamin’ny torimasony i Jakoba dia niteny hoe: Eto amin’ity toerana ity tokoa NY TOMPO fa izaho no tsy nahalala! '
  '17':
  - type: text
    content: 'Dia raiki-tahotra izy ka niteny hoe: Endre, mahatahotra ity toerana ity! Tsy hafa ity fa tranon’Andriamanitra sy vavahadin’ny lanitra! '
  '18':
  - type: text
    content: 'Ary nifoha vao maraina i Jakoba dia naka ilay vato izay nataony ondana ka nanorina azy ho tsangambato dia nandraraka diloilo taminy. '
  '19':
  - type: text
    content: Ary ny anaran’izany toerana izany dia nataony hoe Betela
  - type: note
    content: 'Betela: Tranon’Andriamanitra.'
  - type: text
    content: ', fa Lozy no anaran’ilay tanàna teo aloha. '
  '2':
  - type: text
    content: 'Miaingà ka mankanesa any Padana-Arama, any amin’ny tranon’i Betoela rain’ny reninao, dia makà vady any, avy amin’ny zanakavavin’i Labana anadahin-dreninao. '
  '20':
  - type: text
    content: 'Dia nivoady i Jakoba ka niteny hoe: Raha homba ahy Andriamanitra ka hiaro ahy amin’izao lalana alehako izao, sady hanome ahy mofo hohaniko sy akanjo hitafiako, '
  '21':
  - type: text
    content: 'ka ho tafaverina soa amantsara any amin’ny tranon’ny raiko aho, dia NY TOMPO no ho Andriamanitro, '
  '22':
  - type: text
    content: ary ity vato izay naoriko ho tsangambato ity dia ho tranon’Andriamanitra, koa amin’izay rehetra homenao ahy dia homeko Anao tokoa ny ampahafolony.
  '3':
  - type: text
    content: 'Andriamanitra Tsitoha anie hitahy anao ka hahamaro fara anao sy hampitombo anao mba ho tonga firenena maro ianao! '
  '4':
  - type: text
    content: 'Homeny anao anie ny fitahiana an’i Abrahama, dia ho anao sy ny taranakao koa, mba handovanao ny tany fivahiniananao izay efa nomen’Andriamanitra an’i Abrahama! '
  '5':
  - type: text
    content: Ary nampandeha an’i Jakoba Isaka ka lasa izy nankany Padana-Arama ho any amin’i Labana, zanak’i Betoela arameana, anadahin’i Rebeka, renin’i Jakoba sy i Esao.
  '6':
  - type: text
    content: 'Ary hitan’i Esao fa efa nitsodrano an’i Jakoba Isaka ka nampandeha azy ho any Padana-Arama haka vady any; hitany koa fa rehefa nitsodrano azy izy dia namepetra azy hoe: Aza maka vady avy amin’ny zanakavavin’ny Kananita; '
  '7':
  - type: text
    content: 'hitany fa nanaraka ny tenin’ny ray aman-dreniny i Jakoba ka lasa nankany Padana-Arama. '
  '8':
  - type: text
    content: 'Ary satria hitan’i Esao tokoa fa ratsy teo imason’Isaka rainy ny zanakavavin’ny Kananita, '
  '9':
  - type: text
    content: dia lasa izy nankany amin’Ismaela ka naka vady an’i Mahalata, zanakavavin’Ismaela, zanak’i Abrahama, sady anabavin’i Nebaiota, ho fanampin’ny vady izay efa nananany.
  - type: heading
    content: Ny nofin’i Jakoba
