document_id: 2KI.6
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ilay famaky very
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Hoy ireo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: zanaky ny mpaminany
  - type: text
    text: ' tamin’i Elisa: Indro, tsy omby anay ny toerana izay itoeranay eto aminao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Miangavy anao izahay, aoka izahay hankany Jordana ka samy haka hazo iray avy any, dia hanao trano ho anay any mba hitoeranay. Ary hoy i Elisa: Mandehana ary! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Fa hoy ny iray: Miangavy anao aho, aoka mba hiaraka amin’ny mpanomponao ho any koa ianao! Dia namaly izy hoe: Eny ary, handeha aho! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dia niaraka taminy izy ka nony tonga tany Jordana ireo dia nikapa hazo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Rehefa nikapa hazo anefa ny iray dia latsaka tany anaty rano ny lelam-pamaky ka nitaraina izy hoe: Indrisy, tompoko, zavatra nindramina ange iny e! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary hoy ny lehilahin’Andriamanitra: Taiza no nahalatsahany? Dia natorony azy izay nahalatsahany. Ary nanapaka hazo i Elisa ka natsipiny teo dia nitsinkafona ilay lelam-pamaky. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary hoy izy: Raiso! Dia narosony ny tanany ka noraisiny.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nisamboran’i Elisa ireo miaramila arameana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary ny mpanjakan’i Arama dia niady tamin’ny Israely ka nidinika niaraka tamin’ny mpanompony izy ary niteny hoe: Any Ananona no hitobiako. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary ny lehilahin’Andriamanitra kosa nandefa iraka tany amin’ny mpanjakan’ny Israely hilaza hoe: Tandremo fandrao mankany Ananona ianao; fa any no hidinan’ny Arameana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ary ny mpanjakan’ny Israely nandefa iraka tany amin’izay nolazain’ny lehilahin’Andriamanitra taminy; nampitandrina azy izy ka nametraka mpiambina tany; tsy indray mandeha ihany na indroa akory aza no nitrangan’izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Dia sosotra indrindra ny mpanjakan’i Arama noho izany zavatra izany. Koa niantso ny mpanompony izy ary niteny taminy hoe: Tsy hambaranareo ahy va izay olona eto amintsika miandany amin’ny mpanjakan’ny Israely? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary hoy ny mpanompony iray: Tsy misy, ry mpanjaka tompoko! Fa i Elisa mpaminany ao amin’ny Israely ihany no milaza amin’ny mpanjakan’ny Israely na dia izay teny lazainao ao amin’ny efitrano fandrianao aza. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary hoy ny mpanjaka: Andeha, zahao izay itoerany mba handefasako iraka hisambotra azy. Dia nolazaina taminy hoe: Indro, any Dotana izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dia nampandeha soavaly sy kalesy fitondra miady ary miaramila maro ho any izy; tonga alina ireo ary nanodidina ny tanàna. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Nony nifoha vao maraina ny zatovon’ny lehilahin’Andriamanitra ka nivoaka ny trano, dia indreo, nisy miaramila sy soavaly ary kalesy fitondra miady manodidina ny tanàna. Dia hoy ilay zatovo taminy: Indrisy, tompoko! Ahoana ny hataontsika? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Hoy i Elisa: Aza matahotra, fa ny momba antsika dia maro noho ny momba azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary i Elisa dia nivavaka hoe: TOMPO ô, mifona aminao aho, ampahirato ny masony mba hahitany! Ary NY TOMPO nampahiratra ny mason’ilay zatovo ka hitany ny tendrombohitra feno soavaly sy kalesy afo fitondra miady manodidina an’i Elisa.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Dia nidina nankeny amin’i Elisa ireo. Ary i Elisa dia nivavaka tamin’NY TOMPO hoe: Mifona aminao aho, ataovy jamba ireto olona ireto! Dia nataony jamba ireo araka ny tenin’i Elisa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary hoy i Elisa tamin’ireo: Tsy ity no lalana, ary tsy ity no tanàna! Fa manaraha ahy ianareo dia hitondra anareo ho any amin’ny lehilahy tadiavinareo aho! Dia noentiny nankany Samaria ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary rehefa tonga tany Samaria izy ireo dia hoy i Elisa: TOMPO ô, ampahirato ny mason’ireto mba hahita izy! Ary NY TOMPO nampahiratra ny masony dia hitany fa indro, tao afovoan’i Samaria izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Nony nahita azy ireo ny mpanjakan’ny Israely dia niteny tamin’i Elisa hoe: Ry Ikaky ô, hovonoiko va izy ireo? Hovonoiko va izy ireo? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Fa hoy izy hoe: Aza vonoinao izy; moa hovonoinao va izay nobaboinao tamin’ny sabatrao sy ny tsipìkanao? Rosoy mofo sy rano eo anoloany mba hohaniny sy hosotroiny, ary aoka izy handeha ho any amin’ny tompony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Dia nanao fanasana lehibe ho azy ny mpanjaka; ary rehefa nihinana sy nisotro ireo dia nampandehaniny ka nankany amin’ny tompony. Koa tsy nankany amin’ny tanin’ny Israely intsony ny mpihantsy adin’i Arama.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ilay mosary tany Samaria
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Nony afaka izany dia namory ny miaramilany rehetra i Beny-Hadada, mpanjakan’i Arama, dia niakatra ary nanao fahirano an’i Samaria. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Dia nisy mosary mafy tany Samaria. Mafy ny fahirano ka loham-boriky iray aza dia lafo sekela valopolo, ary taim-boromailala ampahefatry ny kaba dia nosandaina sekela dimy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ary raha nandalo teny ambonin’ny manda ny mpanjakan’ny Israely dia nisy vehivavy iray nitaraina taminy hoe: Vonjeo aho, ry mpanjaka tompoko ô! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Hoy ny mpanjaka: Raha tsy vonjen’NY TOMPO ianao, avy aiza no hamonjeko anao? Avy amin’ny famoloana va, sa avy amin’ny famiazam-boaloboka? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Hoy koa ny mpanjaka taminy: Inona ary no alahelonao? Namaly Ravehivavy hoe: Hoy ity vehivavy ity tamiko: Aiza ny zanakao hohanintsika anio, ary ny zanako kosa hohanintsika rahampitso! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Koa nahandroinay ny zanako ka nohaninay; ary nony ampitso dia hoy aho taminy: Aiza kosa ny zanakao mba hohanintsika! Kanjo nafeniny ny zanany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Nony nandre ny tenin-dRavehivavy ny mpanjaka dia nandriatra ny fitafiany. Ary nandalo teny ambonin’ny manda izy ka hitan’ny olona fa indro, lamba fisaonana no nataony manolo-koditra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Dia hoy izy: Hataon’Andriamanitra amiko anie izany, eny, mihoatra noho izany aza, raha tsy hotapahina anio ny lohan’i Elisa, zanak’i Safata!'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ambaran’i Elisa ny hitsaharan’ny mosary
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Fa nipetraka tao an-tranony i Elisa, ary nipetraka teo akaikiny ny loholona. Ary ny mpanjaka dia nandefa iraka nialoha lalana azy. Raha tsy mbola tonga tany amin’i Elisa anefa iny iraka iny dia hoy izy tamin’ny loholona: Hitanareo va ny nanirahan’ity zanaky ny mpamono olona ity hanapaka ny lohako? Jereo, fa rehefa avy ny iraka dia arindrino ny varavarana ary atoseho mafy hisakana azy; tsy eo aorianany koa va ny fingadongadon’ny tongotry ny tompony? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Raha mbola niresaka taminy izy dia indro, nidina nankao aminy ny iraka ka niteny hoe: Indro, izao loza izao dia avy amin’NY TOMPO! Koa inona intsony no anantenako NY TOMPO?'
