type_code: plt
verses:
  '1':
  - type: heading
    content: Ilay famaky very
  - type: text
    content: 'Hoy ireo '
  - type: text
    content: zanaky ny mpaminany
  - type: text
    content: ' tamin’i Elisa: Indro, tsy omby anay ny toerana izay itoeranay eto aminao. '
  '10':
  - type: text
    content: Ary ny mpanjakan’ny Israely nandefa iraka tany amin’izay nolazain’ny lehilahin’Andriamanitra taminy; nampitandrina azy izy ka nametraka mpiambina tany; tsy indray mandeha ihany na indroa akory aza no nitrangan’izany.
  '11':
  - type: text
    content: 'Dia sosotra indrindra ny mpanjakan’i Arama noho izany zavatra izany. Koa niantso ny mpanompony izy ary niteny taminy hoe: Tsy hambaranareo ahy va izay olona eto amintsika miandany amin’ny mpanjakan’ny Israely? '
  '12':
  - type: text
    content: 'Ary hoy ny mpanompony iray: Tsy misy, ry mpanjaka tompoko! Fa i Elisa mpaminany ao amin’ny Israely ihany no milaza amin’ny mpanjakan’ny Israely na dia izay teny lazainao ao amin’ny efitrano fandrianao aza. '
  '13':
  - type: text
    content: 'Ary hoy ny mpanjaka: Andeha, zahao izay itoerany mba handefasako iraka hisambotra azy. Dia nolazaina taminy hoe: Indro, any Dotana izy. '
  '14':
  - type: text
    content: 'Dia nampandeha soavaly sy kalesy fitondra miady ary miaramila maro ho any izy; tonga alina ireo ary nanodidina ny tanàna. '
  '15':
  - type: text
    content: 'Nony nifoha vao maraina ny zatovon’ny lehilahin’Andriamanitra ka nivoaka ny trano, dia indreo, nisy miaramila sy soavaly ary kalesy fitondra miady manodidina ny tanàna. Dia hoy ilay zatovo taminy: Indrisy, tompoko! Ahoana ny hataontsika? '
  '16':
  - type: text
    content: 'Hoy i Elisa: Aza matahotra, fa ny momba antsika dia maro noho ny momba azy. '
  '17':
  - type: text
    content: 'Ary i Elisa dia nivavaka hoe: TOMPO ô, mifona aminao aho, ampahirato ny masony mba hahitany! Ary NY TOMPO nampahiratra ny mason’ilay zatovo ka hitany ny tendrombohitra feno soavaly sy kalesy afo fitondra miady manodidina an’i Elisa.'
  '18':
  - type: text
    content: 'Dia nidina nankeny amin’i Elisa ireo. Ary i Elisa dia nivavaka tamin’NY TOMPO hoe: Mifona aminao aho, ataovy jamba ireto olona ireto! Dia nataony jamba ireo araka ny tenin’i Elisa. '
  '19':
  - type: text
    content: 'Ary hoy i Elisa tamin’ireo: Tsy ity no lalana, ary tsy ity no tanàna! Fa manaraha ahy ianareo dia hitondra anareo ho any amin’ny lehilahy tadiavinareo aho! Dia noentiny nankany Samaria ireo. '
  '2':
  - type: text
    content: 'Miangavy anao izahay, aoka izahay hankany Jordana ka samy haka hazo iray avy any, dia hanao trano ho anay any mba hitoeranay. Ary hoy i Elisa: Mandehana ary! '
  '20':
  - type: text
    content: 'Ary rehefa tonga tany Samaria izy ireo dia hoy i Elisa: TOMPO ô, ampahirato ny mason’ireto mba hahita izy! Ary NY TOMPO nampahiratra ny masony dia hitany fa indro, tao afovoan’i Samaria izy. '
  '21':
  - type: text
    content: 'Nony nahita azy ireo ny mpanjakan’ny Israely dia niteny tamin’i Elisa hoe: Ry Ikaky ô, hovonoiko va izy ireo? Hovonoiko va izy ireo? '
  '22':
  - type: text
    content: 'Fa hoy izy hoe: Aza vonoinao izy; moa hovonoinao va izay nobaboinao tamin’ny sabatrao sy ny tsipìkanao? Rosoy mofo sy rano eo anoloany mba hohaniny sy hosotroiny, ary aoka izy handeha ho any amin’ny tompony. '
  '23':
  - type: text
    content: Dia nanao fanasana lehibe ho azy ny mpanjaka; ary rehefa nihinana sy nisotro ireo dia nampandehaniny ka nankany amin’ny tompony. Koa tsy nankany amin’ny tanin’ny Israely intsony ny mpihantsy adin’i Arama.
  - type: heading
    content: Ilay mosary tany Samaria
  '24':
  - type: text
    content: 'Nony afaka izany dia namory ny miaramilany rehetra i Beny-Hadada, mpanjakan’i Arama, dia niakatra ary nanao fahirano an’i Samaria. '
  '25':
  - type: text
    content: Dia nisy mosary mafy tany Samaria. Mafy ny fahirano ka loham-boriky iray aza dia lafo sekela valopolo, ary taim-boromailala ampahefatry ny kaba dia nosandaina sekela dimy.
  '26':
  - type: text
    content: 'Ary raha nandalo teny ambonin’ny manda ny mpanjakan’ny Israely dia nisy vehivavy iray nitaraina taminy hoe: Vonjeo aho, ry mpanjaka tompoko ô! '
  '27':
  - type: text
    content: 'Hoy ny mpanjaka: Raha tsy vonjen’NY TOMPO ianao, avy aiza no hamonjeko anao? Avy amin’ny famoloana va, sa avy amin’ny famiazam-boaloboka? '
  '28':
  - type: text
    content: 'Hoy koa ny mpanjaka taminy: Inona ary no alahelonao? Namaly Ravehivavy hoe: Hoy ity vehivavy ity tamiko: Aiza ny zanakao hohanintsika anio, ary ny zanako kosa hohanintsika rahampitso! '
  '29':
  - type: text
    content: 'Koa nahandroinay ny zanako ka nohaninay; ary nony ampitso dia hoy aho taminy: Aiza kosa ny zanakao mba hohanintsika! Kanjo nafeniny ny zanany. '
  '3':
  - type: text
    content: 'Fa hoy ny iray: Miangavy anao aho, aoka mba hiaraka amin’ny mpanomponao ho any koa ianao! Dia namaly izy hoe: Eny ary, handeha aho! '
  '30':
  - type: text
    content: 'Nony nandre ny tenin-dRavehivavy ny mpanjaka dia nandriatra ny fitafiany. Ary nandalo teny ambonin’ny manda izy ka hitan’ny olona fa indro, lamba fisaonana no nataony manolo-koditra. '
  '31':
  - type: text
    content: 'Dia hoy izy: Hataon’Andriamanitra amiko anie izany, eny, mihoatra noho izany aza, raha tsy hotapahina anio ny lohan’i Elisa, zanak’i Safata!'
  - type: heading
    content: Ambaran’i Elisa ny hitsaharan’ny mosary
  '32':
  - type: text
    content: 'Fa nipetraka tao an-tranony i Elisa, ary nipetraka teo akaikiny ny loholona. Ary ny mpanjaka dia nandefa iraka nialoha lalana azy. Raha tsy mbola tonga tany amin’i Elisa anefa iny iraka iny dia hoy izy tamin’ny loholona: Hitanareo va ny nanirahan’ity zanaky ny mpamono olona ity hanapaka ny lohako? Jereo, fa rehefa avy ny iraka dia arindrino ny varavarana ary atoseho mafy hisakana azy; tsy eo aorianany koa va ny fingadongadon’ny tongotry ny tompony? '
  '33':
  - type: text
    content: 'Raha mbola niresaka taminy izy dia indro, nidina nankao aminy ny iraka ka niteny hoe: Indro, izao loza izao dia avy amin’NY TOMPO! Koa inona intsony no anantenako NY TOMPO?'
  '4':
  - type: text
    content: 'Dia niaraka taminy izy ka nony tonga tany Jordana ireo dia nikapa hazo. '
  '5':
  - type: text
    content: 'Rehefa nikapa hazo anefa ny iray dia latsaka tany anaty rano ny lelam-pamaky ka nitaraina izy hoe: Indrisy, tompoko, zavatra nindramina ange iny e! '
  '6':
  - type: text
    content: 'Ary hoy ny lehilahin’Andriamanitra: Taiza no nahalatsahany? Dia natorony azy izay nahalatsahany. Ary nanapaka hazo i Elisa ka natsipiny teo dia nitsinkafona ilay lelam-pamaky. '
  '7':
  - type: text
    content: 'Ary hoy izy: Raiso! Dia narosony ny tanany ka noraisiny.'
  - type: heading
    content: Ny nisamboran’i Elisa ireo miaramila arameana
  '8':
  - type: text
    content: 'Ary ny mpanjakan’i Arama dia niady tamin’ny Israely ka nidinika niaraka tamin’ny mpanompony izy ary niteny hoe: Any Ananona no hitobiako. '
  '9':
  - type: text
    content: 'Ary ny lehilahin’Andriamanitra kosa nandefa iraka tany amin’ny mpanjakan’ny Israely hilaza hoe: Tandremo fandrao mankany Ananona ianao; fa any no hidinan’ny Arameana. '
