document_id: JER.49,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Faminaniana ny amin’i Amonita
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny amin’ny taranak’i Amona.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Izao no lazain’NY TOMPO:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moa tsy manan-janakalahy va Israely?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tsy manan-kandova va izy?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa nahoana i Gada no lasan’ny mpanjakany?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary nahoana ny vahoakany no monina ao amin’ny tanànany?
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izaho dia nampitanjaka an’i Esao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary naharihariko ny fiereny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy mahazo miery intsony izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ringana ny zanany sy ny rahalahiny ary ny namany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy ao intsony ireny.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ilaozy ny zanakao ho kamboty fa Izaho no hamelona azy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary aoka Izaho no hitokian’ny vadinao mpitondratena.
  '12':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Fa izao no lazain’NY TOMPO: Indro, fa na dia izay tsy tokony hisotro amin’ny kapoaka aza dia hisotro tokoa, moa ho afa-maina va ianao? Tsy ho afa-maina ianao fa tsy maintsy hisotro tokoa. '
  '13':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Fa ny tenako no nianianako, hoy NY TOMPO, fa ho tonga figagana i Bozra, ho tonga fandatsa sy ho rava ary ho fanozonana, ary ho lao mandrakizay ny tanànany rehetra.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa efa nahare filazana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avy tamin’NY TOMPO aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ary nisy iraka nalefa ho any amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jentilisa
    - type: text
      text: ' hilaza hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mivoria ianareo ka mankanesa hamely azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mitsangàna hanafika.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa indro, hataoko tsinontsinona eo amin’ny firenena ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary fanazimbazimba eo amin’ny olona,
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ry ilay monina ao an-tsefatsefaky ny harambato,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay mifikitra amin’ny tampon’ny havoana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny fahatahorana anao sy ny avonavon’ny fonao no namitaka anao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa na dia ataonao eny amin’ny avo tahaka ny an’ny voromahery aza ny akaninao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia havariko avy eny ianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy NY TOMPO.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ho figagana i Edoma: Izay rehetra mandalo azy dia ho gaga ka hisitrisitra noho ny loza rehetra efa namelezana azy.'
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toy ny nandravana an’i Sodoma sy i Gomora mbamin’ny tanàna teny akaikiny, hoy NY TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no tsy hisian’ny olona honina any,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na zanak’olombelona hivahiny any.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro, toy ny fiakatry ny liona avy any amin’ny kirihitrala eny amoron’i Jordana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no hiakarany ho any amin’ny fonenany mafy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria hampandosiriko tampoka hiala tao Edoma,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary izay olona iray voafidy no hotendreko hanapaka azy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa iza no tahaka Ahy?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Iza no hifandahatra Amiko?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary iza moa no mpiandry ondry mahajanona eo anatrehako?
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa indro, avy ny andro,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy NY TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay hampandrenesako akoran’ady amin’ny famelezana an’i Raba an’ny taranak’i Amona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho tanàna haolo tanteraka izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hodorana amin’ny afo ny vohitra miankina aminy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary haka indray ny anjara lovany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: amin’ireo izay nandroba azy ny Israely,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy NY TOMPO.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa henoy ny tolo-tsaina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avy amin’NY TOMPO, izay nosaininy hamelezana an’i Edoma,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'sy ny heviny izay noheveriny hamelezana ny mponina ao Temana:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hoviraviraina tokoa ireny, toy ny kely indrindra amin’ny andian’ondry;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho gaga azy tokoa ny saha fiandrasana azy.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tamin’ny fiezinezin’ny fianjerany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia nihorohoro ny tany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny feon’ny fitarainany dia re hatrany amin’ny Ranomasina Mena.
  '22':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Indro, hanidina hiakatra toy ny voromahery izy ka hamelatra ny elany eny ambonin’i Bozra; ary amin’izany andro izany, ny fon’ny lehilahy maherin’i Edoma dia ho tahaka ny fon’ny vehivavy mihetsi-jaza.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Faminaniana ny amin’i Damaskosy
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny amin’i Damaskosy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Very hevitra i Hamata sy i Arpada
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa nandre filazana loza izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka kivy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: misamboaravoara ny ranomasina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy mety tony.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Efa ketraka i Damaskosy ka mihodina handositra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa tora-kovitra izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary azon’ny faharariana sy ny fanaintainana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toy ny vehivavy eo am-piterahana.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nahoana re no tsy nilaozana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny tanàna malaza,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tanàna nifaliako?
  '26':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Noho izany dia hiampatrampatra eny amin’ny kianja ny zatovony, ary ho ringana avokoa ny miaramila rehetra amin’izany andro izany, hoy Andriamanitra, Tompon’izao rehetra izao. '
  '27':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Ary hisy afo hampirehetiko ao anatin’ny mandan’i Damaskosy, handevona ny lapan’i Beny-Hadada.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Faminaniana ny amin’ny fanjakan’ireo Arabo
    marker-yv: yv-h
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny amin’i Kedara sy ny fanjakan’i Hazora, izay resin’i Nebokadnezara, mpanjakan’i Babilona.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Izao no lazain’NY TOMPO:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mitsangàna ianareo ka miakara hamely an’i Kedara
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary aringano ny zanaky ny Atsinanana.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Halainy ny tranolainy sy ny ondry aman’osiny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoentiny ny ambaindainy mbamin’ny fanaka rehetra sy ny ramevany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'sady hiantsoantso hilaza aminy izy hoe: Misy fampangorohoroana manodidina!'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Midradradradrà, ry Hesbona, fa rava i Ay!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miantsoantsoa mafy, ianareo zanakavavin’i Raba!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Misikìna lamba fisaonana ianareo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: manaova fisaonana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mandehandehana eo anaty fefin’ny manda;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa lasan-ko babo ny mpanjakany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny mpisorony ary ireo mpanapaka azy.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mandosira ka mandehana lavitra! Mamitsaha any amin’ny lalina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ry mponina any Hazora!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hoy NY TOMPO;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa i Nebokadnezara, mpanjakan’i Babilona, dia nanao saina hamelezany anareo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy namoron-kevitra hahavoa anareo.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mitsangàna, iakaro ny firenena miadana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay tsy manana ahiahy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy NY TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia izay tsy misy vavahady mirindrina na mihidy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady mitoka-monina.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho babo ny ramevany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary horobaina ny omby aman’ondriny betsaka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: haeliko ho any amin’ny rivotra rehetra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ireo voahety sisim-bolo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hoentiko avy amin’ny manodidina rehetra ny loza hanjo azy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy NY TOMPO,
  '33':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary i Hazora dia ho fonenan’ny amboadia
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ho tany lao mandrakizay;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy hisy olona honina any,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na zanak’olombelona hivahiny any.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Faminaniana ny amin’i Elama
    marker-yv: yv-h
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny tenin’NY TOMPO izay tonga tamin’i Jeremia mpaminany ny amin’i Elama tamin’ny niandohan’ny nanjakan’i Zedekia, mpanjakan’ny Joda:'
  '35':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Izao no lazain’Andriamanitra, Tompon’izao rehetra izao:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro, hotapatapahiko ny tsipìkan’i Elama,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay fototry ny heriny.
  '36':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hitondra rivotra efatra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avy amin’ny lafiny efatry ny lanitra Aho hamelezana an’i Elama.
  - type: usfm
    marker: m
    children:
    - type: text
      text: Ary haeliko ho amin’izany rivotra rehetra izany izy ka tsy hisy firenena izay tsy halehan’ny voaroaka avy any Elama.
  '37':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa hampivadi-po an’i Elama eo anoloan’ny fahavalony
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy eo anoloan’izay mitady ny ainy Aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hahatonga loza aminy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ny firehetan’ny fahatezerako,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy NY TOMPO;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hampanenjehiko azy ny sabatra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mandra-pandaniko azy;
  '38':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia hapetrako ao Elama ny sezafiandrianako,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hofongorako tsy hisy intsony any na ny mpanjaka na ny mpanapaka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy NY TOMPO.
  '39':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nefa amin’ny ho avy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia mbola hampodiko avy amin’ny fahababoany ihany i Elama,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy NY TOMPO.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nahoana no ny lohasaha no ataonao ho reharehanao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ny lohasahanao mahavokatra be, ry zanakavavy mpikomy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay mitoky amin’ny harenany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ka miteny hoe: Iza moa no ho afa-miakatra atỳ amiko?'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro Aho hahatonga tahotra aminao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avy amin’izay rehetra manodidina anao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy NY TOMPO, Andriamanitra Tompon’izao rehetra izao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary horoahina samy hizotra amin’izay hitsiny avy ianareo rehetra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady tsy hisy hamory izay mandositra.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary rehefa afaka izany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hampodiko avy amin’ny fahababoana ihany ny taranak’i Amona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy NY TOMPO.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Faminaniana ny amin’i Edoma
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny amin’i Edoma.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Izao no lazain’Andriamanitra, Tompon’izao rehetra izao:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy misy fahendrena intsony va ao Temana?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy misy tolo-tsaina intsony va avy amin’ny olon-kendry?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lany va ny fahendreny?
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mandosira, miverena ianareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mamitsaha ao amin’ny lalina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ry mponina any Dedana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ataoko mihatra amin’i Esao ny loza,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ny andro hamaliako azy.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha tonga ao aminao ny mpioty voaloboka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia tsy hamela voaloboka sisa hotsimponina akory izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: raha avy alina ny mpangalatra
  - type: usfm
    marker: q1
