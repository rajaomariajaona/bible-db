document_id: JER.49,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Faminaniana ny amin’i Amonita
  - type: text
    content: Ny amin’ny taranak’i Amona.
  - type: text
    content: 'Izao no lazain’NY TOMPO:'
  - type: text
    content: Moa tsy manan-janakalahy va Israely?
  - type: text
    content: Ary tsy manan-kandova va izy?
  - type: text
    content: Koa nahoana i Gada no lasan’ny mpanjakany?
  - type: text
    content: Ary nahoana ny vahoakany no monina ao amin’ny tanànany?
  '10':
  - type: text
    content: Izaho dia nampitanjaka an’i Esao,
  - type: text
    content: ary naharihariko ny fiereny
  - type: text
    content: ka tsy mahazo miery intsony izy;
  - type: text
    content: ringana ny zanany sy ny rahalahiny ary ny namany
  - type: text
    content: ka tsy ao intsony ireny.
  '11':
  - type: text
    content: Ilaozy ny zanakao ho kamboty fa Izaho no hamelona azy,
  - type: text
    content: ary aoka Izaho no hitokian’ny vadinao mpitondratena.
  '12':
  - type: text
    content: 'Fa izao no lazain’NY TOMPO: Indro, fa na dia izay tsy tokony hisotro amin’ny kapoaka aza dia hisotro tokoa, moa ho afa-maina va ianao? Tsy ho afa-maina ianao fa tsy maintsy hisotro tokoa. '
  '13':
  - type: text
    content: Fa ny tenako no nianianako, hoy NY TOMPO, fa ho tonga figagana i Bozra, ho tonga fandatsa sy ho rava ary ho fanozonana, ary ho lao mandrakizay ny tanànany rehetra.
  '14':
  - type: text
    content: Fa efa nahare filazana
  - type: text
    content: avy tamin’NY TOMPO aho,
  - type: text
    content: 'ary nisy iraka nalefa ho any amin’ny '
  - type: text
    content: Jentilisa
  - type: text
    content: ' hilaza hoe:'
  - type: text
    content: Mivoria ianareo ka mankanesa hamely azy
  - type: text
    content: ary mitsangàna hanafika.
  '15':
  - type: text
    content: Fa indro, hataoko tsinontsinona eo amin’ny firenena ianao
  - type: text
    content: ary fanazimbazimba eo amin’ny olona,
  '16':
  - type: text
    content: ry ilay monina ao an-tsefatsefaky ny harambato,
  - type: text
    content: izay mifikitra amin’ny tampon’ny havoana,
  - type: text
    content: ny fahatahorana anao sy ny avonavon’ny fonao no namitaka anao;
  - type: text
    content: fa na dia ataonao eny amin’ny avo tahaka ny an’ny voromahery aza ny akaninao
  - type: text
    content: dia havariko avy eny ianao,
  - type: text
    content: hoy NY TOMPO.
  '17':
  - type: text
    content: 'Ho figagana i Edoma: Izay rehetra mandalo azy dia ho gaga ka hisitrisitra noho ny loza rehetra efa namelezana azy.'
  '18':
  - type: text
    content: Toy ny nandravana an’i Sodoma sy i Gomora mbamin’ny tanàna teny akaikiny, hoy NY TOMPO,
  - type: text
    content: no tsy hisian’ny olona honina any,
  - type: text
    content: na zanak’olombelona hivahiny any.
  '19':
  - type: text
    content: Indro, toy ny fiakatry ny liona avy any amin’ny kirihitrala eny amoron’i Jordana
  - type: text
    content: no hiakarany ho any amin’ny fonenany mafy,
  - type: text
    content: satria hampandosiriko tampoka hiala tao Edoma,
  - type: text
    content: ary izay olona iray voafidy no hotendreko hanapaka azy.
  - type: text
    content: Fa iza no tahaka Ahy?
  - type: text
    content: Iza no hifandahatra Amiko?
  - type: text
    content: Ary iza moa no mpiandry ondry mahajanona eo anatrehako?
  '2':
  - type: text
    content: Koa indro, avy ny andro,
  - type: text
    content: hoy NY TOMPO,
  - type: text
    content: izay hampandrenesako akoran’ady amin’ny famelezana an’i Raba an’ny taranak’i Amona,
  - type: text
    content: ho tanàna haolo tanteraka izy,
  - type: text
    content: hodorana amin’ny afo ny vohitra miankina aminy;
  - type: text
    content: ary haka indray ny anjara lovany
  - type: text
    content: amin’ireo izay nandroba azy ny Israely,
  - type: text
    content: hoy NY TOMPO.
  '20':
  - type: text
    content: Koa henoy ny tolo-tsaina
  - type: text
    content: avy amin’NY TOMPO, izay nosaininy hamelezana an’i Edoma,
  - type: text
    content: 'sy ny heviny izay noheveriny hamelezana ny mponina ao Temana:'
  - type: text
    content: Hoviraviraina tokoa ireny, toy ny kely indrindra amin’ny andian’ondry;
  - type: text
    content: ho gaga azy tokoa ny saha fiandrasana azy.
  '21':
  - type: text
    content: Tamin’ny fiezinezin’ny fianjerany
  - type: text
    content: dia nihorohoro ny tany;
  - type: text
    content: ny feon’ny fitarainany dia re hatrany amin’ny Ranomasina Mena.
  '22':
  - type: text
    content: Indro, hanidina hiakatra toy ny voromahery izy ka hamelatra ny elany eny ambonin’i Bozra; ary amin’izany andro izany, ny fon’ny lehilahy maherin’i Edoma dia ho tahaka ny fon’ny vehivavy mihetsi-jaza.
  - type: heading
    content: Faminaniana ny amin’i Damaskosy
  '23':
  - type: text
    content: Ny amin’i Damaskosy.
  - type: text
    content: Very hevitra i Hamata sy i Arpada
  - type: text
    content: fa nandre filazana loza izy
  - type: text
    content: ka kivy;
  - type: text
    content: misamboaravoara ny ranomasina
  - type: text
    content: ka tsy mety tony.
  '24':
  - type: text
    content: Efa ketraka i Damaskosy ka mihodina handositra
  - type: text
    content: fa tora-kovitra izy;
  - type: text
    content: ary azon’ny faharariana sy ny fanaintainana
  - type: text
    content: toy ny vehivavy eo am-piterahana.
  '25':
  - type: text
    content: Nahoana re no tsy nilaozana
  - type: text
    content: ny tanàna malaza,
  - type: text
    content: tanàna nifaliako?
  '26':
  - type: text
    content: 'Noho izany dia hiampatrampatra eny amin’ny kianja ny zatovony, ary ho ringana avokoa ny miaramila rehetra amin’izany andro izany, hoy Andriamanitra, Tompon’izao rehetra izao. '
  '27':
  - type: text
    content: Ary hisy afo hampirehetiko ao anatin’ny mandan’i Damaskosy, handevona ny lapan’i Beny-Hadada.
  - type: heading
    content: Faminaniana ny amin’ny fanjakan’ireo Arabo
  '28':
  - type: text
    content: Ny amin’i Kedara sy ny fanjakan’i Hazora, izay resin’i Nebokadnezara, mpanjakan’i Babilona.
  - type: text
    content: 'Izao no lazain’NY TOMPO:'
  - type: text
    content: Mitsangàna ianareo ka miakara hamely an’i Kedara
  - type: text
    content: ary aringano ny zanaky ny Atsinanana.
  '29':
  - type: text
    content: Halainy ny tranolainy sy ny ondry aman’osiny,
  - type: text
    content: hoentiny ny ambaindainy mbamin’ny fanaka rehetra sy ny ramevany,
  - type: text
    content: 'sady hiantsoantso hilaza aminy izy hoe: Misy fampangorohoroana manodidina!'
  '3':
  - type: text
    content: Midradradradrà, ry Hesbona, fa rava i Ay!
  - type: text
    content: Miantsoantsoa mafy, ianareo zanakavavin’i Raba!
  - type: text
    content: Misikìna lamba fisaonana ianareo;
  - type: text
    content: manaova fisaonana
  - type: text
    content: ary mandehandehana eo anaty fefin’ny manda;
  - type: text
    content: fa lasan-ko babo ny mpanjakany
  - type: text
    content: sy ny mpisorony ary ireo mpanapaka azy.
  '30':
  - type: text
    content: Mandosira ka mandehana lavitra! Mamitsaha any amin’ny lalina,
  - type: text
    content: ry mponina any Hazora!
  - type: text
    content: Hoy NY TOMPO;
  - type: text
    content: fa i Nebokadnezara, mpanjakan’i Babilona, dia nanao saina hamelezany anareo
  - type: text
    content: sy namoron-kevitra hahavoa anareo.
  '31':
  - type: text
    content: Mitsangàna, iakaro ny firenena miadana
  - type: text
    content: izay tsy manana ahiahy,
  - type: text
    content: hoy NY TOMPO,
  - type: text
    content: dia izay tsy misy vavahady mirindrina na mihidy
  - type: text
    content: sady mitoka-monina.
  '32':
  - type: text
    content: Ho babo ny ramevany
  - type: text
    content: ary horobaina ny omby aman’ondriny betsaka,
  - type: text
    content: haeliko ho any amin’ny rivotra rehetra
  - type: text
    content: ireo voahety sisim-bolo;
  - type: text
    content: ary hoentiko avy amin’ny manodidina rehetra ny loza hanjo azy,
  - type: text
    content: hoy NY TOMPO,
  '33':
  - type: text
    content: Ary i Hazora dia ho fonenan’ny amboadia
  - type: text
    content: sy ho tany lao mandrakizay;
  - type: text
    content: tsy hisy olona honina any,
  - type: text
    content: na zanak’olombelona hivahiny any.
  - type: heading
    content: Faminaniana ny amin’i Elama
  '34':
  - type: text
    content: 'Ny tenin’NY TOMPO izay tonga tamin’i Jeremia mpaminany ny amin’i Elama tamin’ny niandohan’ny nanjakan’i Zedekia, mpanjakan’ny Joda:'
  '35':
  - type: text
    content: 'Izao no lazain’Andriamanitra, Tompon’izao rehetra izao:'
  - type: text
    content: Indro, hotapatapahiko ny tsipìkan’i Elama,
  - type: text
    content: izay fototry ny heriny.
  '36':
  - type: text
    content: Ary hitondra rivotra efatra
  - type: text
    content: avy amin’ny lafiny efatry ny lanitra Aho hamelezana an’i Elama.
  - type: text
    content: Ary haeliko ho amin’izany rivotra rehetra izany izy ka tsy hisy firenena izay tsy halehan’ny voaroaka avy any Elama.
  '37':
  - type: text
    content: Fa hampivadi-po an’i Elama eo anoloan’ny fahavalony
  - type: text
    content: sy eo anoloan’izay mitady ny ainy Aho
  - type: text
    content: ka hahatonga loza aminy,
  - type: text
    content: dia ny firehetan’ny fahatezerako,
  - type: text
    content: hoy NY TOMPO;
  - type: text
    content: ary hampanenjehiko azy ny sabatra
  - type: text
    content: mandra-pandaniko azy;
  '38':
  - type: text
    content: Dia hapetrako ao Elama ny sezafiandrianako,
  - type: text
    content: ary hofongorako tsy hisy intsony any na ny mpanjaka na ny mpanapaka,
  - type: text
    content: hoy NY TOMPO.
  '39':
  - type: text
    content: Nefa amin’ny ho avy
  - type: text
    content: dia mbola hampodiko avy amin’ny fahababoany ihany i Elama,
  - type: text
    content: hoy NY TOMPO.
  '4':
  - type: text
    content: Nahoana no ny lohasaha no ataonao ho reharehanao,
  - type: text
    content: dia ny lohasahanao mahavokatra be, ry zanakavavy mpikomy,
  - type: text
    content: izay mitoky amin’ny harenany
  - type: text
    content: 'ka miteny hoe: Iza moa no ho afa-miakatra atỳ amiko?'
  '5':
  - type: text
    content: Indro Aho hahatonga tahotra aminao
  - type: text
    content: avy amin’izay rehetra manodidina anao,
  - type: text
    content: hoy NY TOMPO, Andriamanitra Tompon’izao rehetra izao;
  - type: text
    content: ary horoahina samy hizotra amin’izay hitsiny avy ianareo rehetra
  - type: text
    content: sady tsy hisy hamory izay mandositra.
  '6':
  - type: text
    content: Ary rehefa afaka izany
  - type: text
    content: dia hampodiko avy amin’ny fahababoana ihany ny taranak’i Amona,
  - type: text
    content: hoy NY TOMPO.
  - type: heading
    content: Faminaniana ny amin’i Edoma
  '7':
  - type: text
    content: Ny amin’i Edoma.
  - type: text
    content: 'Izao no lazain’Andriamanitra, Tompon’izao rehetra izao:'
  - type: text
    content: Tsy misy fahendrena intsony va ao Temana?
  - type: text
    content: Tsy misy tolo-tsaina intsony va avy amin’ny olon-kendry?
  - type: text
    content: Lany va ny fahendreny?
  '8':
  - type: text
    content: Mandosira, miverena ianareo,
  - type: text
    content: mamitsaha ao amin’ny lalina,
  - type: text
    content: ry mponina any Dedana,
  - type: text
    content: fa ataoko mihatra amin’i Esao ny loza,
  - type: text
    content: dia ny andro hamaliako azy.
  '9':
  - type: text
    content: Raha tonga ao aminao ny mpioty voaloboka
  - type: text
    content: dia tsy hamela voaloboka sisa hotsimponina akory izy;
  - type: text
    content: raha avy alina ny mpangalatra
  - type: text
    content: dia tsy hijanona handrava izy raha tsy afa-po.
