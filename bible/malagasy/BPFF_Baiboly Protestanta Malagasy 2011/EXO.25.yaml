document_id: EXO.25
type_code: plt
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: MANORINA NY FONENANY EO ANIVON’NY ISRAELY ANDRIAMANITRA
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny anjara fanomezana atolotry ny Zanak’Israely
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary NY TOMPO niteny tamin’i Mosesy indray hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Mitenena amin’ny Zanak’Israely mba hitondra anjara fanomezana ho Ahy izy; avy amin’ny olona rehetra izay entanin’ny fony no handraisanareo izay anjara atolony ho Ahy. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary izao no anjara fanomezana izay horaisinareo avy aminy: Volamena, volafotsy, varahina, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'lamba manga, volomparasy, jaky, ary lamba rongony fotsy madinika, volon’osy, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'hoditr’ondrilahy efa voaloko mena, hoditra trozona, hazo akasia, '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'diloilo hatao fanazavana, zavamanitra ho amin’ny diloilo fanosorana sy ho ditin-kazo mani-pofona, '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'vato berila ary vato alatsaka an-tranontranony amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: efoda
  - type: text
    text: ' sy amin’ny saron-tratra. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Asaivo manao fitoerana masina ho Ahy izy dia honina eo aminy Aho. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Araka izay rehetra hasehoko aminao no ho endriky ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tabernakely
  - type: text
    text: ' sy ny fanaka rehetra momba azy, dia araka izany no hanaovanao azy.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny vata misy ny Vavolombelona
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary ampanaovy vata amin’ny hazo akasia izy: Roa '
  - type: usfm
    marker: w
    children:
    - type: text
      text: hakiho
  - type: text
    text: ' sy sasany ny lavany, iray hakiho sy sasany ny sakany ary iray hakiho sy sasany ny haavony. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Petaho takelaka volamena tsy miharo ilay izy. Samy hopetahanao takelaka volamena avokoa ny atiny sy ny ivelany, ary asio sisiny volamena manodidina eo amboniny. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary mandrendreha mason-drojo volamena efatra hatao aminy ka ataovy eo amin’ny zorony efatra, koa mason-drojo volamena roa eo amin’ny lafiny iray ary mason-drojo volamena roa eo amin’ny lafiny iray hafa. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Manaova bao hazo akasia ka petaho takelaka volamena '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'dia ampidiro ho eo amin’ny mason-drojo volamena eo amin’ny lafin’ny vata ny bao hilanjana azy. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ao amin’ny mason-drojon’ny vata no hitoeran’ny bao ary tsy hesorina eo izy. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ataovy ao anatin’ny vata ny Vavolombelona izay homeko anao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Avy eo dia manaova rakotra fanaovam-panavotana amin’ny volamena tsy miharo: Roa hakiho sy sasany ny lavany ary iray hakiho sy sasany ny sakany. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Manaova koa '
  - type: usfm
    marker: w
    children:
    - type: text
      text: kerobima
  - type: text
    text: ' volamena roa; vongana iray amin’ny rakotra fanaovam-panavotana, eo amin’ny sakany roa, no hanaovanao azy roa. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ny kerobima iray dia ataovy amin’ny sakany iray ary ny kerobima iray kosa dia amin’ny sakany iray: Vongana iray amin’ny rakotra fanaovam-panavotana no hanaovanareo ny kerobima roa, eo amin’ny sakany roa. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary aoka ny elatry ny kerobima hivelatra eo ambony mba hanaloka ny rakotra fanaovam-panavotana; ary hifanatrika ny tavany sady hanatrika ny rakotra fanaovam-panavotana koa. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Dia apetraho eo ambonin’ny vata ny rakotra fanaovam-panavotana; ao anatin’ny vata no asio ny Vavolombelona izay homeko anao. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Eo no hihaona aminao Aho ka avy eo ambonin’ny rakotra fanaovam-panavotana no hitenenako aminao, eo anelanelan’ny kerobima roa izay eo ambonin’ny vata misy ny Vavolombelona; eo no hambarako anao izay rehetra hampanaoviko holazainao amin’ny Zanak’Israely.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny latabatra misy ny mofo atao fanatitra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Manaova latabatra hazo akasia: Roa '
  - type: usfm
    marker: w
    children:
    - type: text
      text: hakiho
  - type: text
    text: ' ny lavany, iray hakiho ny sakany ary iray hakiho sy sasany ny haavony. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Petaho takelaka volamena tsy miharo izany sady asio sisiny volamena ny manodidina azy. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Dia asio tranony manodidina azy, felatanana iray, ary asio sisiny volamena manodidina. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ary manaova mason-drojo volamena efatra hatao aminy ka ataovy eo amin’ny zorony efatra izay eo amin’ny tongony efatra ireo: '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Eo akaikin’ny tranony no hasiana ny mason-drojo volamena ho fitoeran’ny bao ilanjana ny latabatra. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Hazo akasia no anaovy ny bao ka petaho takelaka volamena; amin’ireo no hilanjana ny latabatra. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ary ataovy ny loviany sy ny loviany kely ary ny fitoeran-divainy sy ny kapoakany ho fandrarahana fanatitra; volamena tsy miharo no hanaovanao ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Asio mofo atao fanatitra eo ambonin’ny latabatra, ho eo anatrehako mandrakariva.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fitoeran-jiro fito rantsana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Manaova koa fitoeran-jiro volamena tsy miharo; vongana iray no hanefenao ny fitoeran-jiro. Vongana iray ihany no hanefenao ny faladiany, ny tahony, ny foto-boniny, ny bokony ary ny voniny. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Hisy rantsany enina misampana eo an-daniny roa ka rantsany telo amin’ny fitoeran-jiro no eo an-daniny iray ary rantsany telo amin’ny fitoeran-jiro no eo an-daniny iray hafa. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Hisy foto-boniny telo, hatao tahaka ny vonin’ny amanda, mbamin’ny bokony sy ny voniny eo amin’ny rantsany iray; ary foto-boniny telo koa no hatao tahaka ny vonin’ny amanda, mbamin’ny bokony sy ny voniny eo amin’ny rantsany iray hafa; dia toy izany avokoa amin’ny rantsany enina amin’ny fitoeran-jiro. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ary eo amin’ny fitoeran-jiro dia hisy foto-boniny efatra, hatao tahaka ny vonin’ny amanda, miaraka amin’ny bokony sy ny voniny, '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'bokony iray no eo ambanin’ny rantsany roa sady miray aminy, bokony iray koa no eo ambanin’ny rantsany roa sady miray aminy ary bokony iray koa no eo ambanin’ny rantsany roa sady miray aminy; izany hoe amin’ny rantsany enina izay miray amin’ny fitoeran-jiro. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Hiray avokoa ny bokony sy ny rantsany, sady ho voatefy amin’ny vongana volamena tokana tsy miharo izy rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Ary ataovy ny jirony fito ka apetaho eo amin’ny fitoeran-jiro dia ampireheto eo aminy ireo mba hanazava ny anoloany. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Ary ny hetin-jirony sy ny fitoeran-davenon-jirony dia ataovy volamena tsy miharo. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Volamena tsy miharo, '
  - type: usfm
    marker: w
    children:
    - type: text
      text: talenta
  - type: text
    text: ' iray, no hanaovana azy mbamin’ireny fanaka rehetra ireny. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Aoka mba hataonao araka ny endriny izay naseho taminao tao an-tendrombohitra izany.
