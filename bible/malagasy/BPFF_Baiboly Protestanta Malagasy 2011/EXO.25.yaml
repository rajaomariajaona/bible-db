document_id: EXO.25,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: MANORINA NY FONENANY EO ANIVON’NY ISRAELY ANDRIAMANITRA
  - type: heading
    content: Ny anjara fanomezana atolotry ny Zanak’Israely
  - type: text
    content: 'Ary NY TOMPO niteny tamin’i Mosesy indray hoe: '
  '10':
  - type: text
    content: 'Ary ampanaovy vata amin’ny hazo akasia izy: Roa '
  - type: text
    content: hakiho
  - type: text
    content: ' sy sasany ny lavany, iray hakiho sy sasany ny sakany ary iray hakiho sy sasany ny haavony. '
  '11':
  - type: text
    content: 'Petaho takelaka volamena tsy miharo ilay izy. Samy hopetahanao takelaka volamena avokoa ny atiny sy ny ivelany, ary asio sisiny volamena manodidina eo amboniny. '
  '12':
  - type: text
    content: 'Ary mandrendreha mason-drojo volamena efatra hatao aminy ka ataovy eo amin’ny zorony efatra, koa mason-drojo volamena roa eo amin’ny lafiny iray ary mason-drojo volamena roa eo amin’ny lafiny iray hafa. '
  '13':
  - type: text
    content: 'Manaova bao hazo akasia ka petaho takelaka volamena '
  '14':
  - type: text
    content: 'dia ampidiro ho eo amin’ny mason-drojo volamena eo amin’ny lafin’ny vata ny bao hilanjana azy. '
  '15':
  - type: text
    content: 'Ao amin’ny mason-drojon’ny vata no hitoeran’ny bao ary tsy hesorina eo izy. '
  '16':
  - type: text
    content: Ataovy ao anatin’ny vata ny Vavolombelona izay homeko anao.
  '17':
  - type: text
    content: 'Avy eo dia manaova rakotra fanaovam-panavotana amin’ny volamena tsy miharo: Roa hakiho sy sasany ny lavany ary iray hakiho sy sasany ny sakany. '
  '18':
  - type: text
    content: 'Manaova koa '
  - type: text
    content: kerobima
  - type: text
    content: ' volamena roa; vongana iray amin’ny rakotra fanaovam-panavotana, eo amin’ny sakany roa, no hanaovanao azy roa. '
  '19':
  - type: text
    content: 'Ny kerobima iray dia ataovy amin’ny sakany iray ary ny kerobima iray kosa dia amin’ny sakany iray: Vongana iray amin’ny rakotra fanaovam-panavotana no hanaovanareo ny kerobima roa, eo amin’ny sakany roa. '
  '2':
  - type: text
    content: 'Mitenena amin’ny Zanak’Israely mba hitondra anjara fanomezana ho Ahy izy; avy amin’ny olona rehetra izay entanin’ny fony no handraisanareo izay anjara atolony ho Ahy. '
  '20':
  - type: text
    content: 'Ary aoka ny elatry ny kerobima hivelatra eo ambony mba hanaloka ny rakotra fanaovam-panavotana; ary hifanatrika ny tavany sady hanatrika ny rakotra fanaovam-panavotana koa. '
  '21':
  - type: text
    content: 'Dia apetraho eo ambonin’ny vata ny rakotra fanaovam-panavotana; ao anatin’ny vata no asio ny Vavolombelona izay homeko anao. '
  '22':
  - type: text
    content: Eo no hihaona aminao Aho ka avy eo ambonin’ny rakotra fanaovam-panavotana no hitenenako aminao, eo anelanelan’ny kerobima roa izay eo ambonin’ny vata misy ny Vavolombelona; eo no hambarako anao izay rehetra hampanaoviko holazainao amin’ny Zanak’Israely.
  - type: heading
    content: Ny latabatra misy ny mofo atao fanatitra
  '23':
  - type: text
    content: 'Manaova latabatra hazo akasia: Roa '
  - type: text
    content: hakiho
  - type: text
    content: ' ny lavany, iray hakiho ny sakany ary iray hakiho sy sasany ny haavony. '
  '24':
  - type: text
    content: 'Petaho takelaka volamena tsy miharo izany sady asio sisiny volamena ny manodidina azy. '
  '25':
  - type: text
    content: 'Dia asio tranony manodidina azy, felatanana iray, ary asio sisiny volamena manodidina. '
  '26':
  - type: text
    content: 'Ary manaova mason-drojo volamena efatra hatao aminy ka ataovy eo amin’ny zorony efatra izay eo amin’ny tongony efatra ireo: '
  '27':
  - type: text
    content: 'Eo akaikin’ny tranony no hasiana ny mason-drojo volamena ho fitoeran’ny bao ilanjana ny latabatra. '
  '28':
  - type: text
    content: 'Hazo akasia no anaovy ny bao ka petaho takelaka volamena; amin’ireo no hilanjana ny latabatra. '
  '29':
  - type: text
    content: 'Ary ataovy ny loviany sy ny loviany kely ary ny fitoeran-divainy sy ny kapoakany ho fandrarahana fanatitra; volamena tsy miharo no hanaovanao ireo. '
  '3':
  - type: text
    content: 'Ary izao no anjara fanomezana izay horaisinareo avy aminy: Volamena, volafotsy, varahina, '
  '30':
  - type: text
    content: Asio mofo atao fanatitra eo ambonin’ny latabatra, ho eo anatrehako mandrakariva.
  - type: heading
    content: Ny fitoeran-jiro fito rantsana
  '31':
  - type: text
    content: 'Manaova koa fitoeran-jiro volamena tsy miharo; vongana iray no hanefenao ny fitoeran-jiro. Vongana iray ihany no hanefenao ny faladiany, ny tahony, ny foto-boniny, ny bokony ary ny voniny. '
  '32':
  - type: text
    content: 'Hisy rantsany enina misampana eo an-daniny roa ka rantsany telo amin’ny fitoeran-jiro no eo an-daniny iray ary rantsany telo amin’ny fitoeran-jiro no eo an-daniny iray hafa. '
  '33':
  - type: text
    content: 'Hisy foto-boniny telo, hatao tahaka ny vonin’ny amanda, mbamin’ny bokony sy ny voniny eo amin’ny rantsany iray; ary foto-boniny telo koa no hatao tahaka ny vonin’ny amanda, mbamin’ny bokony sy ny voniny eo amin’ny rantsany iray hafa; dia toy izany avokoa amin’ny rantsany enina amin’ny fitoeran-jiro. '
  '34':
  - type: text
    content: 'Ary eo amin’ny fitoeran-jiro dia hisy foto-boniny efatra, hatao tahaka ny vonin’ny amanda, miaraka amin’ny bokony sy ny voniny, '
  '35':
  - type: text
    content: 'bokony iray no eo ambanin’ny rantsany roa sady miray aminy, bokony iray koa no eo ambanin’ny rantsany roa sady miray aminy ary bokony iray koa no eo ambanin’ny rantsany roa sady miray aminy; izany hoe amin’ny rantsany enina izay miray amin’ny fitoeran-jiro. '
  '36':
  - type: text
    content: 'Hiray avokoa ny bokony sy ny rantsany, sady ho voatefy amin’ny vongana volamena tokana tsy miharo izy rehetra. '
  '37':
  - type: text
    content: 'Ary ataovy ny jirony fito ka apetaho eo amin’ny fitoeran-jiro dia ampireheto eo aminy ireo mba hanazava ny anoloany. '
  '38':
  - type: text
    content: 'Ary ny hetin-jirony sy ny fitoeran-davenon-jirony dia ataovy volamena tsy miharo. '
  '39':
  - type: text
    content: 'Volamena tsy miharo, '
  - type: text
    content: talenta
  - type: text
    content: ' iray, no hanaovana azy mbamin’ireny fanaka rehetra ireny. '
  '4':
  - type: text
    content: 'lamba manga, volomparasy, jaky, ary lamba rongony fotsy madinika, volon’osy, '
  '40':
  - type: text
    content: Aoka mba hataonao araka ny endriny izay naseho taminao tao an-tendrombohitra izany.
  '5':
  - type: text
    content: 'hoditr’ondrilahy efa voaloko mena, hoditra trozona, hazo akasia, '
  '6':
  - type: text
    content: 'diloilo hatao fanazavana, zavamanitra ho amin’ny diloilo fanosorana sy ho ditin-kazo mani-pofona, '
  '7':
  - type: text
    content: 'vato berila ary vato alatsaka an-tranontranony amin’ny '
  - type: text
    content: efoda
  - type: text
    content: ' sy amin’ny saron-tratra. '
  '8':
  - type: text
    content: 'Asaivo manao fitoerana masina ho Ahy izy dia honina eo aminy Aho. '
  '9':
  - type: text
    content: 'Araka izay rehetra hasehoko aminao no ho endriky ny '
  - type: text
    content: tabernakely
  - type: text
    content: ' sy ny fanaka rehetra momba azy, dia araka izany no hanaovanao azy.'
  - type: heading
    content: Ny vata misy ny Vavolombelona
