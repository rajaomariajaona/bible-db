document_id: PSA.122
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Firariana fiadanana ho an’i Jerosalema
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: Hira fanao amin’ny fiakarana. Nataon’i Davida
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Faly aho, raha hoy izy ireo tamiko:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Andeha isika ho any amin’ny tranon’NY TOMPO.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ny tongotray dia efa mijoro
- type: usfm
  marker: q1
  children:
  - type: text
    text: eo amin’ny vavahadinao, ry Jerosalema ô,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: dia ianao, ry Jerosalema, izay efa vita
- type: usfm
  marker: q1
  children:
  - type: text
    text: tahaka ny tanàna efa voalamina tsara;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: any no iakaran’ny fokom-pirenena,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ireo fokom-pirenen’NY TOMPO;
- type: usfm
  marker: q1
  children:
  - type: text
    text: lalàna amin’ny Israely izany
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hisaotra ny anaran’NY TOMPO.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Fa any no misy ireo sezan’ny fitsarana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ny sezafiandrianan’ny mpianakavin’i Davida.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Mangataha fiadanana ho an’i Jerosalema;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hambinina anie izay tia anao;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: fiadanana anie ho ao anatin’ireo mandanao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fanambinana anie ho ao amin’ireo lapanao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Noho ny rahalahiko sy ny namako
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'no hilazako hoe: Fiadanana anie ho ao anatinao.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Noho ny tranon’NY TOMPO Andriamanitsika
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hitady izay hahatsara anao aho.
