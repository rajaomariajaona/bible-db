document_id: PSA.122,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Firariana fiadanana ho an’i Jerosalema
  - type: text
    content: Hira fanao amin’ny fiakarana. Nataon’i Davida
  - type: text
    content: 'Faly aho, raha hoy izy ireo tamiko:'
  - type: text
    content: Andeha isika ho any amin’ny tranon’NY TOMPO.
  '2':
  - type: text
    content: Ny tongotray dia efa mijoro
  - type: text
    content: eo amin’ny vavahadinao, ry Jerosalema ô,
  '3':
  - type: text
    content: dia ianao, ry Jerosalema, izay efa vita
  - type: text
    content: tahaka ny tanàna efa voalamina tsara;
  '4':
  - type: text
    content: any no iakaran’ny fokom-pirenena,
  - type: text
    content: dia ireo fokom-pirenen’NY TOMPO;
  - type: text
    content: lalàna amin’ny Israely izany
  - type: text
    content: mba hisaotra ny anaran’NY TOMPO.
  '5':
  - type: text
    content: Fa any no misy ireo sezan’ny fitsarana,
  - type: text
    content: dia ny sezafiandrianan’ny mpianakavin’i Davida.
  '6':
  - type: text
    content: Mangataha fiadanana ho an’i Jerosalema;
  - type: text
    content: hambinina anie izay tia anao;
  '7':
  - type: text
    content: fiadanana anie ho ao anatin’ireo mandanao;
  - type: text
    content: fanambinana anie ho ao amin’ireo lapanao.
  '8':
  - type: text
    content: Noho ny rahalahiko sy ny namako
  - type: text
    content: 'no hilazako hoe: Fiadanana anie ho ao anatinao.'
  '9':
  - type: text
    content: Noho ny tranon’NY TOMPO Andriamanitsika
  - type: text
    content: dia hitady izay hahatsara anao aho.
