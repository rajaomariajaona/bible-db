document_id: JER.17,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Tsy azo vonoina ny fahotan’ny vahoakan’ny Joda
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fahotan’ny Joda dia voasoratra tamin’ny vy fanoratana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy tamin’ny diamondra fanoratana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: voasoratra ao am-pony tahaka ny amin’ny vato fisaka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'sy eo amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: tandroky
    - type: text
      text: ' ny alitarany izany,'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izaho TOMPO no mpandinika ny fo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy mpamantatra ny voa,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hanome ny olona rehetra araka ny alehany avy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia araka ny vokatry ny asany.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toy ny tsipoy mikotrika izay tsy atodiny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'dia toy izany izay mahazo harena tsy amin’ny rariny:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hilaozan’izany eo antenantenan’androny izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho lasa adala no hiafarany.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sezafiandrianana be voninahitra sady avo hatramin’ny voalohany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny fitoera-masintsika.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ry TOMPO, fanantenan’ny Israely ô!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho menatra izay rehetra mahafoy Anao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hosoratana amin’ny vovoka izay miala Aminao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria efa nahafoy NY TOMPO, loharano velona izy.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: TOMPO ô, sitrano aho dia ho sitrana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vonjeo aho dia ho voavonjy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa Ianao no fiderako.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Indro, ireo dia miteny amiko hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aiza ny tenin’NY TOMPO?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka ho tanteraka izany.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa tsy nihifikifika niala
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy ho mpiandry manaraka Anao aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy niriko ny andro hiavian’ny loza, eny, fantatrao izany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay nivoaka avy tamin’ny molotro dia miharihary eo anatrehanao.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka tsy ho fampatahorana ahy Ianao!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fialofako amin’ny andro fahoriana Ianao!
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka ho menatra izay manenjika ahy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa aoka kosa aho tsy mba ho menatra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aoka hivadi-po ireo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa aoka kosa aho tsy mba hivadi-po;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ataovy tonga aminy ny andro fahoriana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary fahatorotoroana roa heny no anorotoroy azy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fiantsoana mba hitandremana ny andro Sabata
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao no nolazain’NY TOMPO tamiko: Mandehana ka mijoroa eo amin’ny vavahadim-bahoaka, dia ilay fandehanan’ny mpanjakan’ny Joda miditra sy mivoaka, ary eo amin’ny vavahady rehetra eto Jerosalema '
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia amin’izay hahatsiarovan’ny zanany ny alitarany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'sy ny tsangakazon-tsampin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Aserahany
    - type: text
      text: ', akaikin’ny hazo maitso,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ambonin’ny vohitra avo.
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ka lazao amin’ny olona hoe: Henoinareo, ny tenin’NY TOMPO, ry mpanjakan’ny Joda sy ry Joda rehetra ary ianareo mponina rehetra eto Jerosalema, izay miditra amin’ireto vavahady ireto.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao no lazain’NY TOMPO: Mitandrema ianareo ka aza mitondra entana amin’ny andro Sabata ary aza mampiditra entana amin’ny vavahadin’i Jerosalema; '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'aza mitondra entana mivoaka avy amin’ny tranonareo amin’ny andro Sabata, na manao raharaha akory; fa hamasino ny andro Sabata araka izay efa nandidiako ny razanareo. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nefa tsy nihevitra izy, na nanongilana ny sofiny, fa nanamafy ny hatony mba tsy hihaino na hino anatra. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa raha mihaino Ahy tokoa ianareo, hoy NY TOMPO, ka tsy mampiditra entana amin’ny vavahadin’ity tanàna ity amin’ny andro Sabata ary tsy manao raharaha amin’izany andro izany, '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'izay mpanjaka na mpanapaka mipetraka eo amin’ny sezafiandrianan’i Davida, dia hiditra amin’ny vavahadin’ity tanàna ity mitaingina kalesy fitondra miady sy soavaly, dia izy sy ny mpanapaka, ny Joda ary ny mponina eto Jerosalema, ka honenana mandrakizay ity tanàna ity. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ho avy ny olona avy amin’ny tanànan’ny Joda, ny manodidina an’i Jerosalema sy ny tanin’ny Benjamina, ny avy any Sefela sy ny tany havoana ary ny avy any Negeva ka hitondra fanatitra dorana manontolo sy fanatitra hafa alatsa-dra ary fanatitra avy amin’ny zavamaniry sy ditin-kazo mani-pofona, ary hitondra fanati-pisaorana ho ao amin’ny tranon’NY TOMPO. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa raha tsy mihaino Ahy kosa ianareo ka tsy manamasina ny andro Sabata, fa mitondra entana miditra amin’ny vavahadin’i Jerosalema ihany amin’ny andro Sabata, dia handrehitra afo tsy mety maty eo am-bavahadiny Aho handevonana ny tranobe eto Jerosalema.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ry tendrombohitro any an-tsaha,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny fanananao sy ny harenanao rehetra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hatolotro ho babo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, na dia ny toerana fanaovanao sorona koa aza
  - type: usfm
    marker: q1
    children:
    - type: text
      text: noho ny fahotana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tao anatin’ny faritaninao rehetra.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avy aminao ihany no mahatonga anao hamoy ny lova izay nomeko anao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hampanompoiko ny fahavalonao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: any amin’ny tany izay tsy fantatrao ianao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, ny afo izay narehitrareo tamin’ny fahatezerako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hirehitra mandrakizay.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fialofana sandoka sy fialofana azo antoka
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Izao no lazain’NY TOMPO:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho voaozona izay olona matoky olona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy manao ny nofo ho sandriny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka miala amin’NY TOMPO ny fony.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ho tahaka ny anjavidy any an-tany ngazana izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy mba hahita ny soa, na dia avy aza izany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa honina any amin’ny tany karankaina any an-tany efitra izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia any amin’ny tanin-tsira izay tsy azo onenana.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hotahina izay olona matoky NY TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia izay manana NY TOMPO ho tokiny.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ho toy ny hazo ambolena eo amoron-drano izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay mamaka eo anilan’ny rano mandeha;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: koa tsy matahotra na dia avy aza ny hainandro,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady ho maitso foana ny raviny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy hanahy izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na dia mihantona aza ny andro
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria tsy hitsahatra ny famoany.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fo dia mamitaka mihoatra noho ny zavatra rehetra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady manana aretina tsy hay sitranina;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: iza moa no mahafantatra ny aminy?
