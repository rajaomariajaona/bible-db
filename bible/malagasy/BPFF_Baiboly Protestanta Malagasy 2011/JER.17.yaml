document_id: JER.17,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Tsy azo vonoina ny fahotan’ny vahoakan’ny Joda
  - type: text
    content: Ny fahotan’ny Joda dia voasoratra tamin’ny vy fanoratana
  - type: text
    content: sy tamin’ny diamondra fanoratana;
  - type: text
    content: voasoratra ao am-pony tahaka ny amin’ny vato fisaka
  - type: text
    content: 'sy eo amin’ny '
  - type: text
    content: tandroky
  - type: text
    content: ' ny alitarany izany,'
  '10':
  - type: text
    content: Izaho TOMPO no mpandinika ny fo
  - type: text
    content: sy mpamantatra ny voa,
  - type: text
    content: mba hanome ny olona rehetra araka ny alehany avy,
  - type: text
    content: dia araka ny vokatry ny asany.
  '11':
  - type: text
    content: Toy ny tsipoy mikotrika izay tsy atodiny,
  - type: text
    content: 'dia toy izany izay mahazo harena tsy amin’ny rariny:'
  - type: text
    content: Hilaozan’izany eo antenantenan’androny izy;
  - type: text
    content: ho lasa adala no hiafarany.
  '12':
  - type: text
    content: Sezafiandrianana be voninahitra sady avo hatramin’ny voalohany
  - type: text
    content: ny fitoera-masintsika.
  '13':
  - type: text
    content: Ry TOMPO, fanantenan’ny Israely ô!
  - type: text
    content: Ho menatra izay rehetra mahafoy Anao
  - type: text
    content: ary hosoratana amin’ny vovoka izay miala Aminao
  - type: text
    content: satria efa nahafoy NY TOMPO, loharano velona izy.
  '14':
  - type: text
    content: TOMPO ô, sitrano aho dia ho sitrana;
  - type: text
    content: vonjeo aho dia ho voavonjy
  - type: text
    content: fa Ianao no fiderako.
  '15':
  - type: text
    content: 'Indro, ireo dia miteny amiko hoe:'
  - type: text
    content: Aiza ny tenin’NY TOMPO?
  - type: text
    content: Aoka ho tanteraka izany.
  '16':
  - type: text
    content: Fa tsy nihifikifika niala
  - type: text
    content: tsy ho mpiandry manaraka Anao aho;
  - type: text
    content: tsy niriko ny andro hiavian’ny loza, eny, fantatrao izany;
  - type: text
    content: izay nivoaka avy tamin’ny molotro dia miharihary eo anatrehanao.
  '17':
  - type: text
    content: Aoka tsy ho fampatahorana ahy Ianao!
  - type: text
    content: Fialofako amin’ny andro fahoriana Ianao!
  '18':
  - type: text
    content: Aoka ho menatra izay manenjika ahy,
  - type: text
    content: fa aoka kosa aho tsy mba ho menatra;
  - type: text
    content: aoka hivadi-po ireo,
  - type: text
    content: fa aoka kosa aho tsy mba hivadi-po;
  - type: text
    content: ataovy tonga aminy ny andro fahoriana,
  - type: text
    content: ary fahatorotoroana roa heny no anorotoroy azy.
  - type: heading
    content: Fiantsoana mba hitandremana ny andro Sabata
  '19':
  - type: text
    content: 'Izao no nolazain’NY TOMPO tamiko: Mandehana ka mijoroa eo amin’ny vavahadim-bahoaka, dia ilay fandehanan’ny mpanjakan’ny Joda miditra sy mivoaka, ary eo amin’ny vavahady rehetra eto Jerosalema '
  '2':
  - type: text
    content: dia amin’izay hahatsiarovan’ny zanany ny alitarany
  - type: text
    content: 'sy ny tsangakazon-tsampin’ny '
  - type: text
    content: Aserahany
  - type: text
    content: ', akaikin’ny hazo maitso,'
  - type: text
    content: ambonin’ny vohitra avo.
  '20':
  - type: text
    content: 'ka lazao amin’ny olona hoe: Henoinareo, ny tenin’NY TOMPO, ry mpanjakan’ny Joda sy ry Joda rehetra ary ianareo mponina rehetra eto Jerosalema, izay miditra amin’ireto vavahady ireto.'
  '21':
  - type: text
    content: 'Izao no lazain’NY TOMPO: Mitandrema ianareo ka aza mitondra entana amin’ny andro Sabata ary aza mampiditra entana amin’ny vavahadin’i Jerosalema; '
  '22':
  - type: text
    content: 'aza mitondra entana mivoaka avy amin’ny tranonareo amin’ny andro Sabata, na manao raharaha akory; fa hamasino ny andro Sabata araka izay efa nandidiako ny razanareo. '
  '23':
  - type: text
    content: 'Nefa tsy nihevitra izy, na nanongilana ny sofiny, fa nanamafy ny hatony mba tsy hihaino na hino anatra. '
  '24':
  - type: text
    content: 'Fa raha mihaino Ahy tokoa ianareo, hoy NY TOMPO, ka tsy mampiditra entana amin’ny vavahadin’ity tanàna ity amin’ny andro Sabata ary tsy manao raharaha amin’izany andro izany, '
  '25':
  - type: text
    content: 'izay mpanjaka na mpanapaka mipetraka eo amin’ny sezafiandrianan’i Davida, dia hiditra amin’ny vavahadin’ity tanàna ity mitaingina kalesy fitondra miady sy soavaly, dia izy sy ny mpanapaka, ny Joda ary ny mponina eto Jerosalema, ka honenana mandrakizay ity tanàna ity. '
  '26':
  - type: text
    content: 'Ary ho avy ny olona avy amin’ny tanànan’ny Joda, ny manodidina an’i Jerosalema sy ny tanin’ny Benjamina, ny avy any Sefela sy ny tany havoana ary ny avy any Negeva ka hitondra fanatitra dorana manontolo sy fanatitra hafa alatsa-dra ary fanatitra avy amin’ny zavamaniry sy ditin-kazo mani-pofona, ary hitondra fanati-pisaorana ho ao amin’ny tranon’NY TOMPO. '
  '27':
  - type: text
    content: Fa raha tsy mihaino Ahy kosa ianareo ka tsy manamasina ny andro Sabata, fa mitondra entana miditra amin’ny vavahadin’i Jerosalema ihany amin’ny andro Sabata, dia handrehitra afo tsy mety maty eo am-bavahadiny Aho handevonana ny tranobe eto Jerosalema.
  '3':
  - type: text
    content: Ry tendrombohitro any an-tsaha,
  - type: text
    content: ny fanananao sy ny harenanao rehetra
  - type: text
    content: dia hatolotro ho babo,
  - type: text
    content: eny, na dia ny toerana fanaovanao sorona koa aza
  - type: text
    content: noho ny fahotana
  - type: text
    content: tao anatin’ny faritaninao rehetra.
  '4':
  - type: text
    content: Avy aminao ihany no mahatonga anao hamoy ny lova izay nomeko anao;
  - type: text
    content: hampanompoiko ny fahavalonao
  - type: text
    content: any amin’ny tany izay tsy fantatrao ianao;
  - type: text
    content: Eny, ny afo izay narehitrareo tamin’ny fahatezerako
  - type: text
    content: dia hirehitra mandrakizay.
  - type: heading
    content: Fialofana sandoka sy fialofana azo antoka
  '5':
  - type: text
    content: 'Izao no lazain’NY TOMPO:'
  - type: text
    content: Ho voaozona izay olona matoky olona
  - type: text
    content: sy manao ny nofo ho sandriny
  - type: text
    content: ka miala amin’NY TOMPO ny fony.
  '6':
  - type: text
    content: Fa ho tahaka ny anjavidy any an-tany ngazana izy
  - type: text
    content: ka tsy mba hahita ny soa, na dia avy aza izany;
  - type: text
    content: fa honina any amin’ny tany karankaina any an-tany efitra izy,
  - type: text
    content: dia any amin’ny tanin-tsira izay tsy azo onenana.
  '7':
  - type: text
    content: Hotahina izay olona matoky NY TOMPO,
  - type: text
    content: dia izay manana NY TOMPO ho tokiny.
  '8':
  - type: text
    content: Fa ho toy ny hazo ambolena eo amoron-drano izy,
  - type: text
    content: izay mamaka eo anilan’ny rano mandeha;
  - type: text
    content: koa tsy matahotra na dia avy aza ny hainandro,
  - type: text
    content: sady ho maitso foana ny raviny;
  - type: text
    content: tsy hanahy izy
  - type: text
    content: na dia mihantona aza ny andro
  - type: text
    content: satria tsy hitsahatra ny famoany.
  '9':
  - type: text
    content: Ny fo dia mamitaka mihoatra noho ny zavatra rehetra
  - type: text
    content: sady manana aretina tsy hay sitranina;
  - type: text
    content: iza moa no mahafantatra ny aminy?
