document_id: PSA.83
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fitarainan’ny Israely izay rahonan’ny firenena manodidina azy
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: Tononkira. Salamo nataon’i Asafa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Andriamanitra ô, aza mangina Ianao!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aza mihombom-bava, aza mamitsaka, Andriamanitra ô!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Fa indro, mitabataba ny fahavalonao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary izay mankahala Anao dia manandratra ny lohany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ny olonao no iokoany amin’ny hafetsena
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary miara-misaina hamely izay arovanao izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Hoy izy: Avia ka andeha hofongorantsika tsy ho firenena izy'
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba tsy hotsarovana intsony ny anaran’ny Israely.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Fa efa niray tetika tokoa ireo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka nanao fanekena hanohitra Anao,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: dia ny tranolain’ny Edomita sy ny Ismaelita,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny Moabita sy ny Hagarita,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ny Gebalita sy ny Amonita ary ny Amalekita,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny Filistina mbamin’ny mponina any Tiro;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ny Asiriana koa dia nikambana taminy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'nanome sandry ny taranak’i Lota ireo. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Fiatoana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ataovy tahaka ny Midianita izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tahaka an’i Sisera sy i Jabina teo amin’ny ony Kisona;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: levona tany Eny-Dora ireo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tonga zeziky ny tany izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ataovy tahaka an’i Oreba sy i Zeba ny olo-manankaja eo aminy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, ny andrianany rehetra dia ataovy tahaka an’i Zebaha sy i Zalmona
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'izay niteny hoe: Aoka halaintsika'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho antsika ny fonenan’Andriamanitra!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Andriamanitro ô, ataovy tahaka ny tadio ireo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia tahaka ny akofa entin’ny rivotra,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: tahaka ny afo mandoro ala
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy tahaka ny lelafo mampirehitra tendrombohitra!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Aoka ho toy izany no anenjehanao azy amin’ny tadionao
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ampihorohoroanao azy amin’ny tafio-drivotrao!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Saròny henatra ny tavany
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hitadiavany ny anaranao, TOMPO ô!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Aoka ho menatra sy ho azon-tahotra mandrakizay izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, aoka hangaihay sy ho ringana izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Aoka ho fantany fa Ianao irery ihany, izay atao hoe NY TOMPO,
- type: usfm
  marker: q1
  children:
  - type: text
    text: no Ilay Avo Indrindra ambonin’ny tany rehetra.
