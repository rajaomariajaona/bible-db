document_id: PSA.83,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Fitarainan’ny Israely izay rahonan’ny firenena manodidina azy
  - type: text
    content: Tononkira. Salamo nataon’i Asafa.
  - type: text
    content: Andriamanitra ô, aza mangina Ianao!
  - type: text
    content: Aza mihombom-bava, aza mamitsaka, Andriamanitra ô!
  '10':
  - type: text
    content: levona tany Eny-Dora ireo;
  - type: text
    content: tonga zeziky ny tany izy.
  '11':
  - type: text
    content: Ataovy tahaka an’i Oreba sy i Zeba ny olo-manankaja eo aminy;
  - type: text
    content: eny, ny andrianany rehetra dia ataovy tahaka an’i Zebaha sy i Zalmona
  '12':
  - type: text
    content: 'izay niteny hoe: Aoka halaintsika'
  - type: text
    content: ho antsika ny fonenan’Andriamanitra!
  '13':
  - type: text
    content: Andriamanitro ô, ataovy tahaka ny tadio ireo,
  - type: text
    content: dia tahaka ny akofa entin’ny rivotra,
  '14':
  - type: text
    content: tahaka ny afo mandoro ala
  - type: text
    content: sy tahaka ny lelafo mampirehitra tendrombohitra!
  '15':
  - type: text
    content: Aoka ho toy izany no anenjehanao azy amin’ny tadionao
  - type: text
    content: sy ampihorohoroanao azy amin’ny tafio-drivotrao!
  '16':
  - type: text
    content: Saròny henatra ny tavany
  - type: text
    content: mba hitadiavany ny anaranao, TOMPO ô!
  '17':
  - type: text
    content: Aoka ho menatra sy ho azon-tahotra mandrakizay izy;
  - type: text
    content: eny, aoka hangaihay sy ho ringana izy.
  '18':
  - type: text
    content: Aoka ho fantany fa Ianao irery ihany, izay atao hoe NY TOMPO,
  - type: text
    content: no Ilay Avo Indrindra ambonin’ny tany rehetra.
  '2':
  - type: text
    content: Fa indro, mitabataba ny fahavalonao
  - type: text
    content: ary izay mankahala Anao dia manandratra ny lohany.
  '3':
  - type: text
    content: Ny olonao no iokoany amin’ny hafetsena
  - type: text
    content: ary miara-misaina hamely izay arovanao izy.
  '4':
  - type: text
    content: 'Hoy izy: Avia ka andeha hofongorantsika tsy ho firenena izy'
  - type: text
    content: mba tsy hotsarovana intsony ny anaran’ny Israely.
  '5':
  - type: text
    content: Fa efa niray tetika tokoa ireo
  - type: text
    content: ka nanao fanekena hanohitra Anao,
  '6':
  - type: text
    content: dia ny tranolain’ny Edomita sy ny Ismaelita,
  - type: text
    content: ny Moabita sy ny Hagarita,
  '7':
  - type: text
    content: ny Gebalita sy ny Amonita ary ny Amalekita,
  - type: text
    content: ny Filistina mbamin’ny mponina any Tiro;
  '8':
  - type: text
    content: ny Asiriana koa dia nikambana taminy;
  - type: text
    content: 'nanome sandry ny taranak’i Lota ireo. '
  - type: text
    content: Fiatoana.
  '9':
  - type: text
    content: Ataovy tahaka ny Midianita izy
  - type: text
    content: ary tahaka an’i Sisera sy i Jabina teo amin’ny ony Kisona;
