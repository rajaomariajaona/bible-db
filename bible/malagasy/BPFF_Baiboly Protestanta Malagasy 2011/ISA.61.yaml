  children:
  - type: text
    text: Ny Iraky NY TOMPO sy ny asa hataony
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ny Fanahin’NY TOMPO Andriamanitra no ato Amiko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria NY TOMPO efa nanosotra Ahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hitory teny soa mahafaly amin’ny mpandefitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: naniraka Ahy hanasitrana ny torotoro fo Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hitory fanafahana amin’ny babo
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy hamoaka ny ao an-tranomaizina ho amin’ny mazava,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: hitory ny taona ankasitrahan’NY TOMPO
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy andro famalian’Andriamanitsika;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hampionona ny malahelo rehetra,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'hanolotra ho an’ny malahelo ao '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Ziona
  - type: text
    text: ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, hanome azy fehiloha tsara tarehy ho solon’ny lavenona
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy diloilo fifaliana ho solon’ny fahalahelovana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary fitafiana fiderana ho solon’ny fanahy reradreraka
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hanaovana azy hoe Hazon’ny fahamarinana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nambolen’NY TOMPO ho fampisehoam-boninahitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Koa hanangana ny efa rava hatry ny fony fahagola izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hamboatra ny efa lao hatramin’ny fahiny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hohavaoziny indray ny tanàna rava,
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay efa lao hatramin’ny taranaka nifandimby.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ho tonga ao ny vahiny
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hiandry ny ondry aman’osinareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny hafa firenena
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ho mpiasa tany sy ho mpikarakara tanim-boaloboka ho anareo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Fa ianareo kosa no hatao hoe mpisoron’NY TOMPO;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mpanao fanompoam-pivavahana ho an’Andriamanitsika no hilazana anareo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hohaninareo ny harenan’ny firenena
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ho reharehanareo ny voninahiny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ny henatrareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hosoloana avo roa heny
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny tondro-maso
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hosoloana hoby amin’ny anjara lovany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: noho izany dia hahazo indroa heny ao amin’ny taniny izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary fifaliana mandrakizay no ho azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Fa Izaho TOMPO dia tia fitsarana marina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: halako ny fandrobana amin’ny faharatsiam-panahy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: homeko ny valin’asany amin’ny fahamarinana izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary fanekena mandrakizay no hataoko aminy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ho fantatra any amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jentilisa
  - type: text
    text: ' ny taranany,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary any amin’ny firenena ny terany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay rehetra mahita azy dia hahafantatra
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa taranaka notahin’NY TOMPO izy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Hira fisaorana
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Hifaly dia hifaly ao amin’NY TOMPO aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho ravoravo ao amin’Andriamanitro ny fanahiko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa notafiany fitafian’ny famonjena aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary nampiakanjoiny akanjon’ny fahamarinana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: toy ny mpampakatra manao fehiloha tsara tarehy tahaka ny mpisorona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary toy ny ampakarina mihaingo amin’ny firavany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Fa tahaka ny tany mampitsimoka izay ao aminy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tahaka ny tanimboly mampaniry izay nafafy teo aminy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia toy izany no hampisehoan’NY TOMPO Andriamanitra fahamarinana sy fiderana
- type: usfm
  marker: q1
  children:
  - type: text
    text: eo anatrehan’ny firenena rehetra.
