document_id: ISA.61,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny Iraky NY TOMPO sy ny asa hataony
  - type: text
    content: Ny Fanahin’NY TOMPO Andriamanitra no ato Amiko,
  - type: text
    content: satria NY TOMPO efa nanosotra Ahy
  - type: text
    content: mba hitory teny soa mahafaly amin’ny mpandefitra,
  - type: text
    content: naniraka Ahy hanasitrana ny torotoro fo Izy
  - type: text
    content: ary hitory fanafahana amin’ny babo
  - type: text
    content: sy hamoaka ny ao an-tranomaizina ho amin’ny mazava,
  '10':
  - type: text
    content: Hifaly dia hifaly ao amin’NY TOMPO aho,
  - type: text
    content: ho ravoravo ao amin’Andriamanitro ny fanahiko;
  - type: text
    content: fa notafiany fitafian’ny famonjena aho
  - type: text
    content: ary nampiakanjoiny akanjon’ny fahamarinana,
  - type: text
    content: toy ny mpampakatra manao fehiloha tsara tarehy tahaka ny mpisorona,
  - type: text
    content: ary toy ny ampakarina mihaingo amin’ny firavany.
  '11':
  - type: text
    content: Fa tahaka ny tany mampitsimoka izay ao aminy,
  - type: text
    content: ary tahaka ny tanimboly mampaniry izay nafafy teo aminy,
  - type: text
    content: dia toy izany no hampisehoan’NY TOMPO Andriamanitra fahamarinana sy fiderana
  - type: text
    content: eo anatrehan’ny firenena rehetra.
  '2':
  - type: text
    content: hitory ny taona ankasitrahan’NY TOMPO
  - type: text
    content: sy andro famalian’Andriamanitsika;
  - type: text
    content: hampionona ny malahelo rehetra,
  '3':
  - type: text
    content: 'hanolotra ho an’ny malahelo ao '
  - type: text
    content: Ziona
  - type: text
    content: ;
  - type: text
    content: eny, hanome azy fehiloha tsara tarehy ho solon’ny lavenona
  - type: text
    content: sy diloilo fifaliana ho solon’ny fahalahelovana,
  - type: text
    content: ary fitafiana fiderana ho solon’ny fanahy reradreraka
  - type: text
    content: mba hanaovana azy hoe Hazon’ny fahamarinana,
  - type: text
    content: nambolen’NY TOMPO ho fampisehoam-boninahitra.
  '4':
  - type: text
    content: Koa hanangana ny efa rava hatry ny fony fahagola izy
  - type: text
    content: ary hamboatra ny efa lao hatramin’ny fahiny,
  - type: text
    content: dia hohavaoziny indray ny tanàna rava,
  - type: text
    content: izay efa lao hatramin’ny taranaka nifandimby.
  '5':
  - type: text
    content: Ho tonga ao ny vahiny
  - type: text
    content: ka hiandry ny ondry aman’osinareo,
  - type: text
    content: ary ny hafa firenena
  - type: text
    content: dia ho mpiasa tany sy ho mpikarakara tanim-boaloboka ho anareo.
  '6':
  - type: text
    content: Fa ianareo kosa no hatao hoe mpisoron’NY TOMPO;
  - type: text
    content: mpanao fanompoam-pivavahana ho an’Andriamanitsika no hilazana anareo;
  - type: text
    content: hohaninareo ny harenan’ny firenena
  - type: text
    content: ary ho reharehanareo ny voninahiny.
  '7':
  - type: text
    content: Ny henatrareo
  - type: text
    content: dia hosoloana avo roa heny
  - type: text
    content: ary ny tondro-maso
  - type: text
    content: dia hosoloana hoby amin’ny anjara lovany;
  - type: text
    content: noho izany dia hahazo indroa heny ao amin’ny taniny izy
  - type: text
    content: ary fifaliana mandrakizay no ho azy.
  '8':
  - type: text
    content: Fa Izaho TOMPO dia tia fitsarana marina;
  - type: text
    content: halako ny fandrobana amin’ny faharatsiam-panahy;
  - type: text
    content: homeko ny valin’asany amin’ny fahamarinana izy,
  - type: text
    content: ary fanekena mandrakizay no hataoko aminy.
  '9':
  - type: text
    content: 'Ho fantatra any amin’ny '
  - type: text
    content: Jentilisa
  - type: text
    content: ' ny taranany,'
  - type: text
    content: ary any amin’ny firenena ny terany;
  - type: text
    content: izay rehetra mahita azy dia hahafantatra
  - type: text
    content: fa taranaka notahin’NY TOMPO izy.
  - type: heading
    content: Hira fisaorana
