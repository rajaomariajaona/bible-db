document_id: LEV.7
type_code: plt
segments:
- type: usfm
  marker: s3
  children:
  - type: usfm
    marker: bd
    children:
    - type: text
      text: Ny fanati-panonerana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary izao no lalàna momba ny fanati-panonerana izay zavatra tena masina: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Eo amin’ny toerana famonoana ny fanatitra dorana manontolo no hamonoana ny fanati-panonerana. Hafafy manodidina ny alitara ny ra. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Haterina avokoa ny hofany sy ny jaborany rehetra, dia ny jabora mandrakotra ny taovany rehetra sy ny jaboran-tsinainy, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'ny voany roa mbamin’ny jabora mandrakotra azy, izay eo amin’ny takibany ary ny ila atiny lehibe; hatao indray manala amin’ny voany no fakàna ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Hodoran’ny mpisorona ho fofona eo ambonin’ny alitara ho fanatitra levonina amin’ny afo ho an’NY TOMPO ireo. Fanati-panonerana izany. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ny lehilahy rehetra amin’ny mpisorona no mahazo mihinana izany; eo amin’izay fitoerana masina no hihinanany azy. Zavatra tena masina izany. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ho tahaka ny fanatitra fanadiovana ny fanati-panonerana ka lalàna iray no ho amin’izy roa: Ho an’ny mpisorona izay manao ny fanavotana izany.'
- type: usfm
  marker: s3
  children:
  - type: usfm
    marker: bd
    children:
    - type: text
      text: Ny anjaran’ny mpisorona
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Hahazo ny hoditry ny fanatitra dorana manontolo izay aterin’ny olona ilay mpisorona izay manao ny fanatitra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ny fanatitra avy amin’ny zavamaniry rehetra izay voaendy amin’ny fanendasa-mofo sy izay rehetra atao amin’ny vilany fahandroana na amin’ny lapoaly dia ho an’ilay mpisorona manolotra azy. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Fa ny fanatitra avy amin’ny zavamaniry rehetra na izay voaharo diloilo, na ny maina, dia ho an’ny zanak’i Arona rehetra tsy an-kanavaka.
- type: usfm
  marker: s3
  children:
  - type: usfm
    marker: bd
    children:
    - type: text
      text: Ny fanati-pihavanana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary izao no lalàna momba ny fanati-pihavanana izay hatolotra ho an’NY TOMPO: '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Raha misy manolotra izany ho fanati-pisaorana dia izao no hatolony ho fanampiny: Mofo tsy misy masirasira sady voaharo diloilo sy mofo manify tsy misy masirasira voahosotra diloilo ary mofo atao amin’ny koba tsara toto voaendy sady voaharo diloilo. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Miaraka amin’ny mofo misy masirasira no hanolorany ny fanatiny, ho fanampin’ny fanati-pihavanana izay ataony ho fanati-pisaorana. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Hakany iray avy ny isam-panatitra ho anjara fanomezana ho an’NY TOMPO; ho an’ilay mpisorona mamafy ny ran’ny fanati-pihavanana izany. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ny henan’ny fanati-pihavanana izay ataony ho fanati-pisaorana dia hohanina amin’ny andro anaterana azy fa tsy hisy havela ho tra-maraina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Raha fanalam-boady na fanatitra an-tsitrapo kosa no atolony dia amin’ny andro itondrany ny fanatiny no hihinanana azy ary hohanina ny ampitson’iny izay ambiny. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Fa ny sisa amin’ny henan’ny fanatitra dia hodorana amin’ny afo amin’ny andro fahatelo. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Raha toa ka ihinanana amin’ny andro fahatelo ny henan’ny fanati-pihavanana, na dia sombiny kely aza, dia tsy horaisina na hisaina ho an’izay manolotra azy izany fa maloto; ary ny olona izay mihinana amin’izany dia ho meloka.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Tsy hohanina ny hena izay mikasika zava-maloto fa hodorana amin’ny afo; ary ny amin’ny hena, dia izay madio rehetra no mahazo mihinana azy; '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'fa ny olona izay misy fahalotoana, nefa mihinana hena avy amin’ny fanati-pihavanana, izay an’NY TOMPO, dia hesorina tsy ho amin’ny fireneny. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ny olona izay mikasika zava-maloto, na fahalotoan’olona na biby maloto na izay zava-betaveta maloto, ka mihinana amin’ny henan’ny fanati-pihavanana izay an’NY TOMPO, dia hesorina tsy ho amin’ny fireneny.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fitsipika ho an’ny vahoaka
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary NY TOMPO niteny tamin’i Mosesy hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Mitenena amin’ny Zanak’Israely hoe: Aza mihinana jabora mihitsy ianareo, na jaboran’omby na jaboran’ondry na jaboran’osy. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Azo ampiasaina amin’ny raharaha rehetra ihany ny jaboran’ny biby izay maty ho azy sy ny jaboran’izay noviraviraim-biby kanefa aza mihinana azy ianareo. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Fa izay rehetra mihinana jaboran’ny biby fiompy, izay fanao fanatitra levonina amin’ny afo ho an’NY TOMPO, dia hesorina tsy ho amin’ny fireneny. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Aza mihinana ra eny amin’izay rehetra itoeranareo, na ny an’ny vorona, na ny an’ny biby fiompy. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Izay rehetra mihinana ra dia hesorina tsy ho amin’ny fireneny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ary NY TOMPO niteny tamin’i Mosesy hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Mitenena amin’ny Zanak’Israely hoe: Izay manolotra ny fanati-pihavanany ho an’NY TOMPO dia hitondra ny fanatiny ho an’NY TOMPO avy amin’ny fanati-pihavanany. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ny tanany ihany no hitondra ny fanatitra levonina amin’ny afo ho an’NY TOMPO; ny jaborany mbamin’ny tratrany no hoentiny ka ny tratrany dia hataony fanatitra asandratra eo anatrehan’NY TOMPO. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Hodoran’ny mpisorona ho fofona eo ambonin’ny alitara ny jaboran’ny fanatiny, fa ny tratrany kosa dia ho an’i Arona sy ireo zanany. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Ary ny feny havanana dia halainareo amin’ny fanati-pihavananareo ka homenareo ny mpisorona. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ny iray amin’ireo zanak’i Arona izay manolotra ny ran’ny fanati-pihavanana sy ny jaborany no hahazo ny feny havanana ho anjarany. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Fa ny tratran’ny fanatitra asandratra sy ny feny nalaina avy tamin’ny fanatitra dia efa nalaiko tamin’ny Zanak’Israely avy amin’ny fanati-pihavanany ary nomeko ho an’i Arona mpisorona sy ireo zanany, ho anjarany maharitra avy amin’ny Zanak’Israely. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Ireo no anjaran’i Arona sy anjaran’ireo zanany avy amin’ny fanatitra levonina amin’ny afo ho an’NY TOMPO, nanomboka tamin’ilay andro nanolorana azy ireo ho mpisorona ho an’NY TOMPO, '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'dia izay nodidian’NY TOMPO mba homena azy avy amin’ny Zanak’Israely amin’ilay andro hanosorana azy, ho lalàna maharitra amin’ny taranany fara aman-dimby. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Izany no lalàna momba ny fanatitra dorana manontolo sy ny fanatitra avy amin’ny zavamaniry, ny fanatitra fanadiovana sy ny fanati-panonerana, ny fanati-panokanana ary ny fanati-pihavanana, '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: izay didy nomen’NY TOMPO an’i Mosesy tao amin’ny tendrombohitra Sinay, tamin’ny andro izay nanomezany didy ny Zanak’Israely hanolotra ny fanatiny ho an’NY TOMPO, tany an-tany efitr’i Sinay.
