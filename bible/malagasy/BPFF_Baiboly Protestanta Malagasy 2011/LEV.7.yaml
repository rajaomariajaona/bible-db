document_id: LEV.7,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fanati-panonerana
  - type: text
    content: 'Ary izao no lalàna momba ny fanati-panonerana izay zavatra tena masina: '
  '10':
  - type: text
    content: Fa ny fanatitra avy amin’ny zavamaniry rehetra na izay voaharo diloilo, na ny maina, dia ho an’ny zanak’i Arona rehetra tsy an-kanavaka.
  - type: heading
    content: Ny fanati-pihavanana
  '11':
  - type: text
    content: 'Ary izao no lalàna momba ny fanati-pihavanana izay hatolotra ho an’NY TOMPO: '
  '12':
  - type: text
    content: 'Raha misy manolotra izany ho fanati-pisaorana dia izao no hatolony ho fanampiny: Mofo tsy misy masirasira sady voaharo diloilo sy mofo manify tsy misy masirasira voahosotra diloilo ary mofo atao amin’ny koba tsara toto voaendy sady voaharo diloilo. '
  '13':
  - type: text
    content: 'Miaraka amin’ny mofo misy masirasira no hanolorany ny fanatiny, ho fanampin’ny fanati-pihavanana izay ataony ho fanati-pisaorana. '
  '14':
  - type: text
    content: 'Hakany iray avy ny isam-panatitra ho anjara fanomezana ho an’NY TOMPO; ho an’ilay mpisorona mamafy ny ran’ny fanati-pihavanana izany. '
  '15':
  - type: text
    content: Ny henan’ny fanati-pihavanana izay ataony ho fanati-pisaorana dia hohanina amin’ny andro anaterana azy fa tsy hisy havela ho tra-maraina.
  '16':
  - type: text
    content: 'Raha fanalam-boady na fanatitra an-tsitrapo kosa no atolony dia amin’ny andro itondrany ny fanatiny no hihinanana azy ary hohanina ny ampitson’iny izay ambiny. '
  '17':
  - type: text
    content: 'Fa ny sisa amin’ny henan’ny fanatitra dia hodorana amin’ny afo amin’ny andro fahatelo. '
  '18':
  - type: text
    content: Raha toa ka ihinanana amin’ny andro fahatelo ny henan’ny fanati-pihavanana, na dia sombiny kely aza, dia tsy horaisina na hisaina ho an’izay manolotra azy izany fa maloto; ary ny olona izay mihinana amin’izany dia ho meloka.
  '19':
  - type: text
    content: 'Tsy hohanina ny hena izay mikasika zava-maloto fa hodorana amin’ny afo; ary ny amin’ny hena, dia izay madio rehetra no mahazo mihinana azy; '
  '2':
  - type: text
    content: 'Eo amin’ny toerana famonoana ny fanatitra dorana manontolo no hamonoana ny fanati-panonerana. Hafafy manodidina ny alitara ny ra. '
  '20':
  - type: text
    content: 'fa ny olona izay misy fahalotoana, nefa mihinana hena avy amin’ny fanati-pihavanana, izay an’NY TOMPO, dia hesorina tsy ho amin’ny fireneny. '
  '21':
  - type: text
    content: Ny olona izay mikasika zava-maloto, na fahalotoan’olona na biby maloto na izay zava-betaveta maloto, ka mihinana amin’ny henan’ny fanati-pihavanana izay an’NY TOMPO, dia hesorina tsy ho amin’ny fireneny.
  - type: heading
    content: Fitsipika ho an’ny vahoaka
  '22':
  - type: text
    content: 'Ary NY TOMPO niteny tamin’i Mosesy hoe: '
  '23':
  - type: text
    content: 'Mitenena amin’ny Zanak’Israely hoe: Aza mihinana jabora mihitsy ianareo, na jaboran’omby na jaboran’ondry na jaboran’osy. '
  '24':
  - type: text
    content: 'Azo ampiasaina amin’ny raharaha rehetra ihany ny jaboran’ny biby izay maty ho azy sy ny jaboran’izay noviraviraim-biby kanefa aza mihinana azy ianareo. '
  '25':
  - type: text
    content: 'Fa izay rehetra mihinana jaboran’ny biby fiompy, izay fanao fanatitra levonina amin’ny afo ho an’NY TOMPO, dia hesorina tsy ho amin’ny fireneny. '
  '26':
  - type: text
    content: 'Aza mihinana ra eny amin’izay rehetra itoeranareo, na ny an’ny vorona, na ny an’ny biby fiompy. '
  '27':
  - type: text
    content: Izay rehetra mihinana ra dia hesorina tsy ho amin’ny fireneny.
  '28':
  - type: text
    content: 'Ary NY TOMPO niteny tamin’i Mosesy hoe: '
  '29':
  - type: text
    content: 'Mitenena amin’ny Zanak’Israely hoe: Izay manolotra ny fanati-pihavanany ho an’NY TOMPO dia hitondra ny fanatiny ho an’NY TOMPO avy amin’ny fanati-pihavanany. '
  '3':
  - type: text
    content: 'Haterina avokoa ny hofany sy ny jaborany rehetra, dia ny jabora mandrakotra ny taovany rehetra sy ny jaboran-tsinainy, '
  '30':
  - type: text
    content: 'Ny tanany ihany no hitondra ny fanatitra levonina amin’ny afo ho an’NY TOMPO; ny jaborany mbamin’ny tratrany no hoentiny ka ny tratrany dia hataony fanatitra asandratra eo anatrehan’NY TOMPO. '
  '31':
  - type: text
    content: 'Hodoran’ny mpisorona ho fofona eo ambonin’ny alitara ny jaboran’ny fanatiny, fa ny tratrany kosa dia ho an’i Arona sy ireo zanany. '
  '32':
  - type: text
    content: 'Ary ny feny havanana dia halainareo amin’ny fanati-pihavananareo ka homenareo ny mpisorona. '
  '33':
  - type: text
    content: 'Ny iray amin’ireo zanak’i Arona izay manolotra ny ran’ny fanati-pihavanana sy ny jaborany no hahazo ny feny havanana ho anjarany. '
  '34':
  - type: text
    content: 'Fa ny tratran’ny fanatitra asandratra sy ny feny nalaina avy tamin’ny fanatitra dia efa nalaiko tamin’ny Zanak’Israely avy amin’ny fanati-pihavanany ary nomeko ho an’i Arona mpisorona sy ireo zanany, ho anjarany maharitra avy amin’ny Zanak’Israely. '
  '35':
  - type: text
    content: 'Ireo no anjaran’i Arona sy anjaran’ireo zanany avy amin’ny fanatitra levonina amin’ny afo ho an’NY TOMPO, nanomboka tamin’ilay andro nanolorana azy ireo ho mpisorona ho an’NY TOMPO, '
  '36':
  - type: text
    content: 'dia izay nodidian’NY TOMPO mba homena azy avy amin’ny Zanak’Israely amin’ilay andro hanosorana azy, ho lalàna maharitra amin’ny taranany fara aman-dimby. '
  '37':
  - type: text
    content: 'Izany no lalàna momba ny fanatitra dorana manontolo sy ny fanatitra avy amin’ny zavamaniry, ny fanatitra fanadiovana sy ny fanati-panonerana, ny fanati-panokanana ary ny fanati-pihavanana, '
  '38':
  - type: text
    content: izay didy nomen’NY TOMPO an’i Mosesy tao amin’ny tendrombohitra Sinay, tamin’ny andro izay nanomezany didy ny Zanak’Israely hanolotra ny fanatiny ho an’NY TOMPO, tany an-tany efitr’i Sinay.
  '4':
  - type: text
    content: 'ny voany roa mbamin’ny jabora mandrakotra azy, izay eo amin’ny takibany ary ny ila atiny lehibe; hatao indray manala amin’ny voany no fakàna ireo. '
  '5':
  - type: text
    content: 'Hodoran’ny mpisorona ho fofona eo ambonin’ny alitara ho fanatitra levonina amin’ny afo ho an’NY TOMPO ireo. Fanati-panonerana izany. '
  '6':
  - type: text
    content: 'Ny lehilahy rehetra amin’ny mpisorona no mahazo mihinana izany; eo amin’izay fitoerana masina no hihinanany azy. Zavatra tena masina izany. '
  '7':
  - type: text
    content: 'Ho tahaka ny fanatitra fanadiovana ny fanati-panonerana ka lalàna iray no ho amin’izy roa: Ho an’ny mpisorona izay manao ny fanavotana izany.'
  - type: heading
    content: Ny anjaran’ny mpisorona
  '8':
  - type: text
    content: Hahazo ny hoditry ny fanatitra dorana manontolo izay aterin’ny olona ilay mpisorona izay manao ny fanatitra.
  '9':
  - type: text
    content: 'Ny fanatitra avy amin’ny zavamaniry rehetra izay voaendy amin’ny fanendasa-mofo sy izay rehetra atao amin’ny vilany fahandroana na amin’ny lapoaly dia ho an’ilay mpisorona manolotra azy. '
