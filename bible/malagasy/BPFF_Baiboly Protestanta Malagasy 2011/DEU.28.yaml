document_id: DEU.28,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny teny fikasana
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha mihaino tsara ny feon’NY TOMPO Andriamanitrao ianao ka mitandrina hanaraka ny didiny rehetra, izay omeko anao anio, dia hasandratry NY TOMPO Andriamanitrao ho ambonin’ny firenena rehetra amin’ny tany ianao; '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia ho hitan’ny firenena rehetra ambonin’ny tany fa ny anaran’NY TOMPO no antsoina ao aminao, dia hatahotra anao izy.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hataon’NY TOMPO manana amby ampy izay hahasoa anao, dia ny ateraky ny kibonao sy ny ateraky ny biby fiompinao ary ny vokatry ny taninao, any amin’ny tany izay nianianan’NY TOMPO tamin’ny razanao homena anao. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hovohan’NY TOMPO ho anao ny lanitra, trano fitahirizan-tsoa, ka handatsahany ranonorana amin’ny taninao amin’ny fotoanany ary hotahiny ny asan’ny tananao rehetra. Ary hampisambotra firenena maro ianao fa ianao kosa dia tsy hisambotra. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hataon’NY TOMPO ho lohany ianao fa tsy ho rambony; ary ho ambony tokoa ianao fa tsy ho ambany, raha mihaino ny didin’NY TOMPO Andriamanitrao, izay omeko anao anio, ka mitandrina sy manaraka azy. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Koa aza miala amin’ny teny rehetra izay omeko anao anio, na ho amin’ny ankavanana, na ho amin’ny ankavia, ka hanaraka andriamanitra hafa hanompo azy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fanambarana loza
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa raha tsy mihaino ny feon’NY TOMPO Andriamanitrao kosa ianao ka tsy mitandrina hanaraka ny didiny rehetra sy ny lalànany, izay omeko anao anio, dia ho tonga aminao sy hahatratra anao izao fanozonana rehetra izao:'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ho voaozona ianao ao an-tanàna ary ho voaozona ianao any an-tsaha. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ho voaozona ny haronao sy ny vilia fanaova-mofonao. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ho voaozona ny ateraky ny kibonao sy ny vokatry ny taninao ary ny ateraky ny ombinao sy ny ateraky ny ondry aman’osinao. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ho voaozona ianao raha miditra ny tranonao ary ho voaozona koa ianao raha mivoaka avy ao.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary ho tonga aminao sy ho azonao izao fitahiana rehetra izao, raha mihaino ny feon’NY TOMPO Andriamanitrao ianao:'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Halefan’NY TOMPO aminao ny ozona, dia horohoro sy fampitahorana amin’izay rehetra ataon’ny tananao, mandra-paharinganao sy mandra-pahalaninao haingana noho ny faharatsian’ny nataonao tamin’ny nahafoizanao Ahy.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hampiraiketin’NY TOMPO aminao ny areti-mandringana, mandra-pandaniny anao tsy ho eo amin’ny tany izay hidiranao holovana. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Areti-mahasaozanina, tazo mahamay, fahamaizana, hafanana mangotraka, andro mihantona ary vary main’ny hafanana na maty fotsy no hamelezan’NY TOMPO anao; dia hanenjika anao ireny ozona ireny mandra-pahalany ritra anao. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ho varahina ny lanitra eo ambonin’ny lohanao ary ho vy ny tany eo ambaninao.
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Hataon’NY TOMPO vovoka sy jofo ny ranonorana ho amin’ny taninao; avy any an-danitra no hidinan’izany aminao mandra-paharinganao.
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hatolotry NY TOMPO ho resy eo anoloan’ny fahavalonao ianao, koa lalana iray no handehananao hiady aminy fa lalana fito kosa no handosiranao hiala eo anoloany; dia ho fampangovitana ny fanjakana rehetra ambonin’ny tany ianao. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary hohanin’ny voromanidina rehetra sy ny bibidia ny fatinao ka tsy hisy hamefifefy azy hanatanteraka izany.
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hamelezan’NY TOMPO anao ny vain’i Ejipta sy ny lagaly ary ny hatina sy ny hazaka, izay tsy hay sitranina; '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'hamelezan’NY TOMPO anao koa ny fahadalana sy ny fahajambana ary ny fahaverezan-kevitra. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia hitsapatsapa ianao na dia amin’ny mitatao vovonana aza tahaka ny fitsapatsapan’ny jamba ao amin’ny haizim-pito ka tsy ho tonga amin’izay halehanao; hampahorin’ny sasany sy hobaboiny mandrakariva ianao ka tsy hisy hamonjy.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hotahìna ianao ao an-tanàna, ary hotahìna ianao any an-tsaha. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hifofo vady ianao nefa olon-kafa no handry aminy; hanorina trano ianao nefa tsy hitoetra ao; hanao tanim-boaloboka ianao nefa tsy hihinana ny vokatra. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hovonoina eo imasonao ny ombinao nefa tsy hihinana ny henany ianao. Halaina an-keriny eo anatrehanao ny borikinao ka tsy haverina aminao. Homena ho an’ny fahavalonao ny ondry aman’osinao nefa tsy hisy hamonjy ianao. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny zanakao lahy sy ny zanakao vavy dia homena ho an’ny firenena hafa, ary hijery ny masonao ka ho pahina manontolo andro noho ny alahelonao azy nefa tsy hahefa na inona na inona ny tananao. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny vokatry ny taninao sy izay rehetra nisasaranao dia hohanin’ny firenena izay tsy fantatrao; ary hanaovan’ny sasany an-keriny sy hotorotoroiny foana ianao. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia ho very saina ianao noho ny zavatra izay ho hitan’ny masonao.
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hamelezan’NY TOMPO anao ny vay ratsy izay tsy hay sitranina, dia amin’ny lohalikao sy ny fenao, hatrany amin’ny faladianao ka hatreny an-tampon-dohanao. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoentin’NY TOMPO ho any amin’ny firenena izay tsy fantatrao na ny razanao ianao sy ny mpanjakanao izay hatsanganao hanjaka aminao; ary any no hanompoanao andriamanitra hafa, dia vato aman-kazo. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia ho figagana sy oha-teny ary ambentin-dresaka ianao any amin’ny firenena rehetra izay hitondran’NY TOMPO anao.
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voan-javatra betsaka no hoentinao hambolena any an-tsaha nefa kely kosa no hangoninao, satria ho lanin’ny valala ireny. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hanao tanim-boaloboka sy hiasa azy ianao nefa tsy hisotro divay na hioty voaloboka eo, fa ho lanin’ny fositra ireny. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hotahìna ny ateraky ny kibonao sy ny vokatry ny taninao ary ny ateraky ny biby fiompinao, dia ny ateraky ny ombinao sy ny ateraky ny ondry aman’osinao. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hanana hazo oliva amin’ny taninao rehetra ianao nefa tsy hihosotra diloilo; satria hihintsana ny olivanao. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hiteraka zazalahy sy vavy ianao nefa tsy ho anao ireny, fa ho lasan-ko babo. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny hazonao sy ny vokatry ny taninao rehetra dia ho lanin’ny valala.
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hisandratra ho ambony dia ambony noho ianao ny vahiny eo aminao fa ianao kosa dia hietry ho ambany dia ambany. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izy hampisambotra anao fa ianao kosa dia tsy hampisambotra azy; izy ho lohany fa ianao dia ho rambony.
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia ho tonga aminao ireo ozona rehetra ireo ka hanenjika anao sy hahatratra anao mandra-paharinganao, satria tsy nihaino ny feon’NY TOMPO Andriamanitrao ianao ny amin’ny hitandremanao ny didiny sy ny lalànany, izay nomeny anao. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ho famantarana sy fahagagana aminao sy ny taranakao mandrakizay izany,
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'satria tsy nanompo NY TOMPO Andriamanitrao tamin’ny hafaliana sy ny haravoam-po ianao noho ny habetsahan’ny zavatra rehetra. '
  '48':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary amin’ny hanoanana sy ny hetaheta ary ny fitanjahana sy ny tsy fananana na inona na inona no hanompoanao ny fahavalonao izay hampandehanin’NY TOMPO hiady aminao; dia hanisy zioga vy amin’ny vozonao ireny mandra-pandringany anao. '
  '49':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoentin’NY TOMPO hiady aminao izay firenena avy lavitra, dia ny avy amin’ny faran’ny tany. Tahaka ny fanidinan’ny voromahery no fiaviny, sady firenena izay tsy ho fantatrao ny fiteniny, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Hotahìna ny haronao sy ny vilia fanaova-mofonao.
  '50':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'firenena masiaka endrika izay tsy hanaja ny antitra na hiantra ny tanora, '
  '51':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia hohaniny ny ateraky ny ombinao sy ny vokatry ny taninao mandra-paharinganao. Tsy hisy havelany ho anao, na vary, na ranom-boaloboka, na diloilo, na ny ateraky ny ombinao, na ny ateraky ny ondry aman’osinao, mandra-pandringany anao. '
  '52':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia hataony fahirano any amin’ny tanànanao rehetra ianao mandra-pandravany ny mandanao avo sy mafy, izay itokianao, manerana ny taninao rehetra; eny, hataony fahirano ianao any amin’ny tanànanao manerana ny taninao rehetra izay omen’NY TOMPO Andriamanitrao anao.
  '53':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Amin’ny fahirano sy ny fahoriam-be, izay haneren’ny fahavalonao anao, dia ny ateraky ny kibonao no hohaninao, izany hoe ny nofon’ny zanakao lahy sy ny zanakao vavy, izay omen’NY TOMPO Andriamanitrao anao. '
  '54':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny lehilahy malemilemy sy mihantahanta indrindra eo aminao dia ho ratsy fijery ny rahalahiny sy ny vady andefimandriny ary ny zanany sisa; '
  '55':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'tsy hisy amin’ireo no homeny amin’ny nofon’ny zanany izay haniny, fandrao tsy hisy ho azy intsony amin’ny fahirano sy ny fahoriam-be, izay haneren’ny fahavalonao anao any amin’ny tanànanao rehetra. '
  '56':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny vehivavy malemilemy sy mihantahanta eo aminao, izay tsy mbola nanandrana nandia tany noho ny fihantahantany sy ny fahalemilemeny, dia ho ratsy fijery ny vady andefimandriny sy ny zanany lahy ary ny zanany vavy '
  '57':
  - type: usfm
    marker: p
    children:
    - type: text
      text: noho ny ahitra izay mivoaka avy aminy sy ny zanany vao teraka; fa hihinana izany mangingina izy noho ny tsy fisian-javatra amin’ny fahirano sy ny fahoriam-be, izay haneren’ny fahavalonao anao any amin’ny tanànanao.
  '58':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha tsy tandremanao ny hanaraka ny teny rehetra amin’ity lalàna ity, izay voasoratra eto amin’ity boky ity, mba hatahoranao izao anarana efa nankalazaina sady mahatahotra izao hoe: NY TOMPO Andriamanitrao, '
  '59':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia hataon’NY TOMPO mahagaga ny kapoka hataony aminao sy ny zanakao, izay kapoka mafy sady maharitra ela ary faharariana mafy sady maharitra ela. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hotahìna ianao raha miditra ary hotahìna ianao raha mivoaka ny tranonao. '
  '60':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary haveriny aminao indray ny aretin’i Ejipta rehetra izay natahoranao ka hiraikitra aminao ireny. '
  '61':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny faharariana rehetra sy ny kapoka rehetra koa, na izay tsy voasoratra amin’ity bokin’ny lalàna ity aza, dia hoentin’NY TOMPO mamely anao mandra-paharinganao. '
  '62':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary olona vitsy no ho sisa aminareo hisolo izao fahamaroanareo toy ny kintana eny amin’ny lanitra izao, satria tsy nihaino ny feon’NY TOMPO Andriamanitrao ianao.
  '63':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Araka izay nifalian’NY TOMPO taminareo mba hahasoa sy hahamaro anareo, dia araka izany koa no hifalian’NY TOMPO handringana sy handrava anareo; fa hofongorana tsy ho eo amin’ny tany izay efa hidiranao holovana ianareo. '
  '64':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia haelin’NY TOMPO any amin’ny firenena rehetra hatrany amin’ny faran’ny tany ianao; any no hanompoanao andriamanitra hafa, vato aman-kazo, izay tsy fantatrao na ny razanao akory. '
  '65':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary any amin’ireo firenena ireo dia tsy hisy hiainanao, na hitsaharan’ny faladianao; fa any no hanomezan’NY TOMPO anao fo miemponempona sy maso pahina ary fahakiviam-panahy. '
  '66':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hihevingevina eo anatrehanao ny ainao; dia hatahotra ianao na andro na alina ka tsy hanampo izay ho velona. '
  '67':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa maraina ny andro dia hiteny ianao hoe: Malakia hariva! Nefa rehefa hariva indray ny andro dia hiteny ianao hoe: Malakia maraina! Noho ny tahotry ny fonao izay hatahoranao sy noho ny zavatra izay ho hitan’ny masonao. '
  '68':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoentin’NY TOMPO an-tsambo ianao hiverina any Ejipta amin’ilay lalana efa nolazaiko taminao hoe: Tsy hahita izany intsony ianao; dia hivaro-tena ho andevo any amin’ny fahavalonareo ianareo na lahy na vavy, nefa tsy hisy mpividy.'
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: LAHATENY FARANY NATAON’I MOSESY
    marker-yv: yv-h
  '69':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izao no tenin’ny fanekena izay nandidian’NY TOMPO an’i Mosesy hatao amin’ny Zanak’Israely tany amin’ny tany Moaba, ankoatra ilay fanekena nataony taminy tao Horeba.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Hatolotry NY TOMPO ho resy eo anoloanao ny fahavalonao izay mitsangana hiady aminao, koa lalana iray no handehanany hanatona anao fa lalana fito kosa no handosirany hiala eo anoloanao.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Handidy ny fitahiany ho aminao NY TOMPO amin’ny fitoeram-barinao sy izay rehetra ataon’ny tananao ka hitahy anao Izy any amin’ny tany izay omen’NY TOMPO Andriamanitrao anao. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hanandratra anao ho firenena masina ho Azy NY TOMPO araka izay nianianany taminao, raha mitandrina ny didin’NY TOMPO Andriamanitrao ianao ka mandeha amin’ny lalany. '
