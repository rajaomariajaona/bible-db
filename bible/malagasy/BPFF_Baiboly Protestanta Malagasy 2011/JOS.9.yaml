document_id: JOS.9
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fanekem-pihavanana natao tamin’ny Gibeonita
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Raha nandre izany ny mpanjaka rehetra izay tetỳ andafin’i Jordana, na ny tany amin’ny havoana na ny tany Sefela na ny tany amoron’ny Ranomasina Lehibe tandrifin’i Libanona, dia ny Hetita, ny Amorita, ny Kananita, ny Perizita, ny Hivita ary ny Jebosita, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: dia niray hina ka niangona hiady amin’i Josoa sy ny Israely.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary ny mponina tao Gibeona dia nahare izay nanaovan’i Josoa an’i Jeriko sy i Ay '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'ka nanao hafetsena kosa izy ary nandeha ho eny niseho ho iraka, nitondra kitapo tonta nasampiny teo amin’ny borikiny; misy koa siny hoditra tonta sady triatra ka nofehipehezina nasiany divay, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'kapa tonta sady nitampintampina no teo amin’ny tongony ary lamba tonta no notafiany; ary efa maina sy potipotika ny mofo rehetra izay vatsiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia nankany amin’i Josoa teo an-toby tany Gilgala izy ireo ka niteny taminy sy tamin’ny Israelita hoe: Avy any an-tany lavitra izahay; koa ankehitriny, mba manaova fanekena aminay ianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary hoy ny Israelita tamin’ireo Hivita ireo: Angamba mponina ato aminay ihany ianareo, koa hataonay ahoana no fanao fanekena aminareo? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Fa hoy izy tamin’i Josoa: Mpanomponao izahay. Ary hoy i Josoa taminy: Iza moa ianareo, ary avy aiza? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Dia hoy izy ireo taminy: Avy tany an-tany lavitra be izahay mpanomponao noho ny anaran’NY TOMPO Andriamanitrao; fa efa renay ny lazany sy izay rehetra nataony tany Ejipta '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'ary izay rehetra nataony tamin’ny mpanjaka roa tamin’ny Amorita izay tany andafin’i Jordana, dia i Sihona, mpanjakan’i Hesbona, sy i Oga, mpanjakan’i Basana, izay tany Astarota. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Dia niteny taminay ny loholonay sy ny mponina rehetra amin’ny taninay hoe: Mitondrà vatsy eny an-tananareo ho any amin’ny haleha, dia mandehana hitsena azy ka lazao aminy hoe: Mpanomponareo izahay, koa ankehitriny manaova fanekena aminay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Itony mofonay itony dia vao mafana no nalainay tany an-tranonay ho vatsy tamin’ny andro nandehananay hankaty aminareo; nefa ankehitriny, indro efa maina sy potipotika izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Vaovao koa ireto siny hoditra misy divay ireto izay nofenoinay; nefa indreo, efa triatra izy ary efa rovitra ireto lambanay sy kapanay ireto noho ny halavitry ny lalana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary nakan’ny olona ny vatsin’ireo nefa tsy nanontany tamin’ny vavan’NY TOMPO izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ary nanao fihavanana taminy i Josoa ka nanao fanekena taminy mba tsy hamono azy; ary ny lohan’ny fiangonana koa dia nianiana taminy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Nony afaka hateloana taorianan’ny nanaovany fanekena taminy dia reny fa mpifanakaiky aminy ihany ireo sady mpiara-mitoetra eo aminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Dia niainga ny Zanak’Israely ka tonga tany an-tanànan’ireo tamin’ny andro fahatelo. Ary ny tanànany dia Gibeona, Kefira, Berota ary Kiriata-Jearima. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Nefa tsy namely azy ny Zanak’Israely satria NY TOMPO, Andriamanitry ny Israely, no efa nianianan’ny lohan’ny fiangonana taminy. Dia nimonomonona tamin’ireo loholona ny fiangonana rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Nefa hoy ny loholona rehetra tamin’ny fiangonana manontolo: NY TOMPO, Andriamanitry ny Israely, no efa nianiananay taminy, koa ankehitriny dia tsy mahazo mamely azy isika. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Fa izao no hataontsika aminy: Havelantsika ho velona ihany izy fandrao hisy fahatezerana mahatratra antsika noho ny fianianana nataontsika taminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Koa hoy ny loholona taminy: Aoka ihany ho velona izy. Dia tonga mpikapa hazo sy mpantsaka rano ho an’ny fiangonana rehetra izy ireo, araka ny teny nataon’ny loholona taminy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Dia niantso azy ireo i Josoa ka niteny taminy hoe: Nahoana no namitaka anay ianareo ka nilaza hoe: Lavitra be anareo izahay, kanjo eto aminay ihany no onenanareo? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Koa ankehitriny voaozona ianareo ary tsy hisy ho afaka, fa ho andevo sy ho mpikapa hazo ary ho mpantsaka rano ho an’ny tranon’Andriamanitro ianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Dia namaly an’i Josoa izy ireo hoe: Satria nambara taminay mpanomponao tokoa fa NY TOMPO Andriamanitrao efa nandidy an’i Mosesy mpanompony hanome anareo ny tany rehetra sy handringana ny mponina rehetra amin’ny tany eo anoloanareo, koa natahotra ny ho faty izahay noho ny aminareo, dia nanao izany zavatra izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary ankehitriny, indreto eto an-tananao izahay, koa araka izay ataonao ho tsara sy marina hatao aminay ary no ataovy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Dia nanao izany taminy izy ka namonjy azy tamin’ny tanan’ny Zanak’Israely mba tsy hahafaty azy ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Tamin’izany andro izany dia natolotr’i Josoa ireo ho mpikapa hazo sy ho mpantsaka rano ho an’ny fiangonana sy ho an’ny alitaran’NY TOMPO mandraka androany, eo amin’ny tany izay hofidiny.
