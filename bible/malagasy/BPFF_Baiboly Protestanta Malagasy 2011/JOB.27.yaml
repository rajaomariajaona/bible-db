document_id: JOB.27,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: 'Ny teny navalin’i Joba (tohiny): Ny olona diso va afaka hiantso vonjy amin’Andriamanitra?'
  - type: text
    content: 'Dia mbola nandroso nanao oha-teny ihany i Joba hoe:'
  '10':
  - type: text
    content: Hahita haravoravoana amin’ny Tsitoha va izy?
  - type: text
    content: Hahazo miantso an’Andriamanitra mandrakariva va izy?
  '11':
  - type: text
    content: Hampianatra anareo ny amin’ny tanan’Andriamanitra aho
  - type: text
    content: ary tsy hanafenako anareo ny hevitry ny Tsitoha.
  '12':
  - type: text
    content: Indreo ianareo rehetra dia samy efa nahita izany;
  - type: text
    content: koa nahoana ianareo no mandany andro amin’ny hevi-poana?
  '13':
  - type: text
    content: Izao no anjaran’ny ratsy fanahy avy amin’Andriamanitra
  - type: text
    content: 'sy lovan’ny mpampihorohoro raisiny avy amin’ny Tsitoha:'
  '14':
  - type: text
    content: Na dia mihamaro aza ny zanany dia ho an’ny sabatra ihany ireny.
  - type: text
    content: Ary ny zaza aterany dia tsy ho voky hanina;
  '15':
  - type: text
    content: ny ankohonany sisa dia hasitrik’i Rafahafatesana
  - type: text
    content: ary tsy hisaona azy ny mpitondratena navelany;
  '16':
  - type: text
    content: na dia mahary volafotsy ohatra ny vovoka aza izy
  - type: text
    content: ary mahangona fitafiana ohatra ny tanimanga;
  '17':
  - type: text
    content: eny, manangona ihany izy, nefa ny marina no hitafy izany,
  - type: text
    content: ary ny tsy manan-tsiny no hizara ny volafotsy.
  '18':
  - type: text
    content: Manao ny tranony tahaka ny an’ny lolofotsy izy
  - type: text
    content: ary tahaka ny trano rantsan-kazo ataon’ny mpiandry voly;
  '19':
  - type: text
    content: Ao ihany ny harenany rehetra raha vao mandry izy,
  - type: text
    content: nefa nony ahirany ny masony dia tsy ao intsony ireny.
  '2':
  - type: text
    content: Raha velona koa Andriamanitra
  - type: text
    content: izay efa nandà tsy hanome ahy ny rariny
  - type: text
    content: sy ny Tsitoha izay efa nampangidy ny aiko,
  '20':
  - type: text
    content: Mahatratra azy tahaka ny riaka ny fampahatahorana;
  - type: text
    content: nony alina dia paohin’ny tafio-drivotra izy;
  '21':
  - type: text
    content: Manainga azy sy mahalasa azy ny rivotra avy any atsinanana
  - type: text
    content: ka mipaoka azy hiala amin’ny fitoerany;
  '22':
  - type: text
    content: asian’ny olona ny tsipìka izy ka tsy iantrany,
  - type: text
    content: dia voatery mandositra ho afaka amin’ny tanany izy.
  '23':
  - type: text
    content: Tehafin’ny olona tanana izy
  - type: text
    content: sady isiafany ka ampialainy amin’ny fonenany.
  '3':
  - type: text
    content: fa mbola ato amiko ihany ny aiko
  - type: text
    content: ary mbola eo am-bavoroko ny fofonaina avy amin’Andriamanitra,
  '4':
  - type: text
    content: dia tsy hanao teny tsy marina ny molotro
  - type: text
    content: ary tsy hanonom-pitaka ny lelako.
  '5':
  - type: text
    content: Sanatria raha hanaiky ny anareo ho marina aho!
  - type: text
    content: Mandra-pialan’ny aiko dia tsy hanaiky ny tenako ho manan-tsiny aho.
  '6':
  - type: text
    content: Ny fahamarinako dia hazoniko mafy ka tsy ho foiko;
  - type: text
    content: ny foko dia tsy manome tsiny ahy akory na dia ny amin’ny androko iray monja aza.
  '7':
  - type: text
    content: Aoka ho hita fa ratsy fanahy ny fahavaloko
  - type: text
    content: ary olon-tsy marina izay mitsangana manohitra ahy!
  '8':
  - type: text
    content: Fa inona no tombony antenain’ny mpihatsaravelatsihy
  - type: text
    content: rehefa tsoahan’Andriamanitra ny ainy?
  '9':
  - type: text
    content: Hihaino ny fitarainany va Andriamanitra
  - type: text
    content: raha ozoim-pahoriana izy?
