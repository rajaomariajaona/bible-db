document_id: JOB.27,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Ny teny navalin’i Joba (tohiny): Ny olona diso va afaka hiantso vonjy amin’Andriamanitra?'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Dia mbola nandroso nanao oha-teny ihany i Joba hoe:'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Hahita haravoravoana amin’ny Tsitoha va izy?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hahazo miantso an’Andriamanitra mandrakariva va izy?
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Hampianatra anareo ny amin’ny tanan’Andriamanitra aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy hanafenako anareo ny hevitry ny Tsitoha.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Indreo ianareo rehetra dia samy efa nahita izany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: koa nahoana ianareo no mandany andro amin’ny hevi-poana?
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Izao no anjaran’ny ratsy fanahy avy amin’Andriamanitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'sy lovan’ny mpampihorohoro raisiny avy amin’ny Tsitoha:'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Na dia mihamaro aza ny zanany dia ho an’ny sabatra ihany ireny.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny zaza aterany dia tsy ho voky hanina;
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ny ankohonany sisa dia hasitrik’i Rafahafatesana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy hisaona azy ny mpitondratena navelany;
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: na dia mahary volafotsy ohatra ny vovoka aza izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mahangona fitafiana ohatra ny tanimanga;
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: eny, manangona ihany izy, nefa ny marina no hitafy izany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny tsy manan-tsiny no hizara ny volafotsy.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Manao ny tranony tahaka ny an’ny lolofotsy izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tahaka ny trano rantsan-kazo ataon’ny mpiandry voly;
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Ao ihany ny harenany rehetra raha vao mandry izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa nony ahirany ny masony dia tsy ao intsony ireny.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Raha velona koa Andriamanitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay efa nandà tsy hanome ahy ny rariny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny Tsitoha izay efa nampangidy ny aiko,
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Mahatratra azy tahaka ny riaka ny fampahatahorana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nony alina dia paohin’ny tafio-drivotra izy;
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Manainga azy sy mahalasa azy ny rivotra avy any atsinanana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka mipaoka azy hiala amin’ny fitoerany;
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: asian’ny olona ny tsipìka izy ka tsy iantrany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia voatery mandositra ho afaka amin’ny tanany izy.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Tehafin’ny olona tanana izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady isiafany ka ampialainy amin’ny fonenany.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: fa mbola ato amiko ihany ny aiko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mbola eo am-bavoroko ny fofonaina avy amin’Andriamanitra,
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: dia tsy hanao teny tsy marina ny molotro
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy hanonom-pitaka ny lelako.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Sanatria raha hanaiky ny anareo ho marina aho!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mandra-pialan’ny aiko dia tsy hanaiky ny tenako ho manan-tsiny aho.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Ny fahamarinako dia hazoniko mafy ka tsy ho foiko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny foko dia tsy manome tsiny ahy akory na dia ny amin’ny androko iray monja aza.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Aoka ho hita fa ratsy fanahy ny fahavaloko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary olon-tsy marina izay mitsangana manohitra ahy!
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Fa inona no tombony antenain’ny mpihatsaravelatsihy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: rehefa tsoahan’Andriamanitra ny ainy?
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Hihaino ny fitarainany va Andriamanitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: raha ozoim-pahoriana izy?
