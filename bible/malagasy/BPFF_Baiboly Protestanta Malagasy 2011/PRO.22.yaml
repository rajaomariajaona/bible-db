document_id: PRO.22,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Aleo tsara laza toy izay be harena;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsara ny fitia noho ny volafotsy sy ny volamena.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Roahy ny mpaniratsira dia ho afaka ny fifandirana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, hitsahatra ny ady sy ny fahafaham-baraka.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Izay tia fahadiovam-po dia milaza soa ny molony
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady sakaizan’ny mpanjaka izy.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Ny mason’NY TOMPO dia miaro ny fahalalana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny tenin’ny mpivadika asafotofotony.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Hoy ny kamo: Misy liona any ivelany any;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho faty ao an-dalambe ao aho!
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Ny tenin’ny vehivavy jejo dia lavaka lalina;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay tezeran’NY TOMPO no ho latsaka ao.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Miraikitra amin’ny fon’ny zaza ny hadalana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny tsorakazo famaizana no hampanalavitra izany aminy.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Izay mampahory ny mahantra dia mampitombo harena azy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa izay manome ho an’ny manana kosa dia mampihena ny hareny.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Tenin’ny hendry
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Atongilano ny sofinao ka henoy ny tenin’ny hendry
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ampitandremo ny fahalalako ny fonao.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Fa mahafinaritra raha voatahirinao ao anatinao izany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: koa aoka samy ho vonona eo amin’ny molotrao izy rehetra.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Ianao dia ianao no nampahafantariko izany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hitokianao amin’NY TOMPO.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Mihaona ny mpanankarena sy ny mahantra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa NY TOMPO no mpanao azy roa tonta.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Tsy efa nanoratra toko telopolo ho anao va aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka misy hevitra tsara sy fahalalana ao
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: mba hampahafantarako anao ny fahamarinan’ny teny mahatoky
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy hahazoanao ny teny holazaina amin’izay naniraka anao?
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Aza mandroba ny mahantra noho ny fahantrany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary aza dia manitsakitsaka ny ory eo amin’ny fitsarana.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Fa NY TOMPO anie ka hisolo vava azy amin’ny adiny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hamongotra ny ain’izay mamongotra azy.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Aza misakaiza amin’ny olona mora tezitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary aza miara-dia amin’ny olona saro-po,
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: fandrao hianatra ny fanaony ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hahazo fandrika ho an’ny ainao.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Aza mety ho isan’ny mifandray tanana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na izay mianto-trosa;
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: raha tsy manan-kaloa ianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nahoana no dia halainy ny lafika fandrianao?
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Aza manakisaka ny fanamarihana ny zaratany efa teo hatry ny ela
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary efa natsangan’ny razanao.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Mahita olona kinga amin’ny raharahany va ianao?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eo anatrehan’ny mpanjaka no hijoroany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa tsy hijoro eo anatrehan’ny olona ambany toerana izy.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Ny mahira-tsaina dia mahatsinjo ny loza ka miery,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny kely saina kosa mandroso ka voa.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Ny valin’ny fanetren-tena sy ny fahatahorana NY TOMPO
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia harena sy voninahitra ary fiainana.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Tsilo sy fandrika no amin’ny lalan’ny maditra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa izay te hiaro ny ainy dia manalavitra izany.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Zaro amin’izay lalana tokony halehany ny zaza
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka na rehefa antitra aza izy dia tsy hiala amin’izany.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Ny mpanankarena dia mifehy ny mahantra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary izay misambotra dia mpanompon’ny mampisambotra.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Izay mamafy heloka dia hijinja fahoriana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ho levona ny tsorakazon’ny fahatezerany.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Hotahìna izay manana maso miantra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria anomezany ho an’ny mahantra ny haniny.
