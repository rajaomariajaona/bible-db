document_id: PRO.22,3103
type_code: plt
verses:
  '1':
  - type: text
    content: Aleo tsara laza toy izay be harena;
  - type: text
    content: tsara ny fitia noho ny volafotsy sy ny volamena.
  '10':
  - type: text
    content: Roahy ny mpaniratsira dia ho afaka ny fifandirana;
  - type: text
    content: eny, hitsahatra ny ady sy ny fahafaham-baraka.
  '11':
  - type: text
    content: Izay tia fahadiovam-po dia milaza soa ny molony
  - type: text
    content: sady sakaizan’ny mpanjaka izy.
  '12':
  - type: text
    content: Ny mason’NY TOMPO dia miaro ny fahalalana,
  - type: text
    content: fa ny tenin’ny mpivadika asafotofotony.
  '13':
  - type: text
    content: 'Hoy ny kamo: Misy liona any ivelany any;'
  - type: text
    content: ho faty ao an-dalambe ao aho!
  '14':
  - type: text
    content: Ny tenin’ny vehivavy jejo dia lavaka lalina;
  - type: text
    content: izay tezeran’NY TOMPO no ho latsaka ao.
  '15':
  - type: text
    content: Miraikitra amin’ny fon’ny zaza ny hadalana,
  - type: text
    content: fa ny tsorakazo famaizana no hampanalavitra izany aminy.
  '16':
  - type: text
    content: Izay mampahory ny mahantra dia mampitombo harena azy,
  - type: text
    content: fa izay manome ho an’ny manana kosa dia mampihena ny hareny.
  - type: heading
    content: Tenin’ny hendry
  '17':
  - type: text
    content: Atongilano ny sofinao ka henoy ny tenin’ny hendry
  - type: text
    content: ary ampitandremo ny fahalalako ny fonao.
  '18':
  - type: text
    content: Fa mahafinaritra raha voatahirinao ao anatinao izany,
  - type: text
    content: koa aoka samy ho vonona eo amin’ny molotrao izy rehetra.
  '19':
  - type: text
    content: Ianao dia ianao no nampahafantariko izany
  - type: text
    content: mba hitokianao amin’NY TOMPO.
  '2':
  - type: text
    content: Mihaona ny mpanankarena sy ny mahantra,
  - type: text
    content: fa NY TOMPO no mpanao azy roa tonta.
  '20':
  - type: text
    content: Tsy efa nanoratra toko telopolo ho anao va aho,
  - type: text
    content: ka misy hevitra tsara sy fahalalana ao
  '21':
  - type: text
    content: mba hampahafantarako anao ny fahamarinan’ny teny mahatoky
  - type: text
    content: sy hahazoanao ny teny holazaina amin’izay naniraka anao?
  '22':
  - type: text
    content: Aza mandroba ny mahantra noho ny fahantrany
  - type: text
    content: ary aza dia manitsakitsaka ny ory eo amin’ny fitsarana.
  '23':
  - type: text
    content: Fa NY TOMPO anie ka hisolo vava azy amin’ny adiny
  - type: text
    content: ary hamongotra ny ain’izay mamongotra azy.
  '24':
  - type: text
    content: Aza misakaiza amin’ny olona mora tezitra
  - type: text
    content: ary aza miara-dia amin’ny olona saro-po,
  '25':
  - type: text
    content: fandrao hianatra ny fanaony ianao
  - type: text
    content: ka hahazo fandrika ho an’ny ainao.
  '26':
  - type: text
    content: Aza mety ho isan’ny mifandray tanana,
  - type: text
    content: na izay mianto-trosa;
  '27':
  - type: text
    content: raha tsy manan-kaloa ianao,
  - type: text
    content: nahoana no dia halainy ny lafika fandrianao?
  '28':
  - type: text
    content: Aza manakisaka ny fanamarihana ny zaratany efa teo hatry ny ela
  - type: text
    content: ary efa natsangan’ny razanao.
  '29':
  - type: text
    content: Mahita olona kinga amin’ny raharahany va ianao?
  - type: text
    content: Eo anatrehan’ny mpanjaka no hijoroany,
  - type: text
    content: fa tsy hijoro eo anatrehan’ny olona ambany toerana izy.
  '3':
  - type: text
    content: Ny mahira-tsaina dia mahatsinjo ny loza ka miery,
  - type: text
    content: fa ny kely saina kosa mandroso ka voa.
  '4':
  - type: text
    content: Ny valin’ny fanetren-tena sy ny fahatahorana NY TOMPO
  - type: text
    content: dia harena sy voninahitra ary fiainana.
  '5':
  - type: text
    content: Tsilo sy fandrika no amin’ny lalan’ny maditra,
  - type: text
    content: fa izay te hiaro ny ainy dia manalavitra izany.
  '6':
  - type: text
    content: Zaro amin’izay lalana tokony halehany ny zaza
  - type: text
    content: ka na rehefa antitra aza izy dia tsy hiala amin’izany.
  '7':
  - type: text
    content: Ny mpanankarena dia mifehy ny mahantra
  - type: text
    content: ary izay misambotra dia mpanompon’ny mampisambotra.
  '8':
  - type: text
    content: Izay mamafy heloka dia hijinja fahoriana
  - type: text
    content: ary ho levona ny tsorakazon’ny fahatezerany.
  '9':
  - type: text
    content: Hotahìna izay manana maso miantra
  - type: text
    content: satria anomezany ho an’ny mahantra ny haniny.
