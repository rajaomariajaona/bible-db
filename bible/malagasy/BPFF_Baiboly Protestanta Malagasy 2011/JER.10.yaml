document_id: JER.10,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ilay Andriamanitra velona manoloana ireo sampy
  - type: text
    content: 'Henoy ny teny izay lazain’NY TOMPO aminareo, ry taranak’Israely! '
  '10':
  - type: text
    content: Fa NY TOMPO no Andriamanitra marina,
  - type: text
    content: eny, Izy no Andriamanitra velona sy Mpanjaka mandrakizay,
  - type: text
    content: izay mampihorohoro ny tany amin’ny fahatezerany
  - type: text
    content: ka tsy tantin’ny firenena ny fahavinirany.
  '11':
  - type: text
    content: 'Izao anefa no holazainareo amin’ireny:'
  - type: text
    content: Ny andriamanitra izay tsy mba nanao ny lanitra sy ny tany
  - type: text
    content: dia ho levona tsy ho amin’ny tany na ho atỳ ambanin’ny lanitra.
  '12':
  - type: text
    content: NY TOMPO no nanao ny tany tamin’ny heriny
  - type: text
    content: sy nampiorina izao tontolo izao tamin’ny fahendreny
  - type: text
    content: ary namelatra ny lanitra tamin’ny fahaizany.
  '13':
  - type: text
    content: Raha mampirohondrohona ny rano any an-danitra Izy
  - type: text
    content: dia mampiakatra rahona avy any amin’ny faran’ny tany;
  - type: text
    content: manao ny tselatra ho amin’ny ranonorana Izy
  - type: text
    content: sady mamoaka ny rivotra avy amin’ny trano fitahirizany.
  '14':
  - type: text
    content: Efa kentrina avokoa ny olona rehetra ka tsy manam-pahalalana;
  - type: text
    content: mitafy henatra noho ny sarin-javatra voasokitra ny mpanefy volamena rehetra;
  - type: text
    content: fa fitaka ny sarin-javatra voarendrika
  - type: text
    content: sady tsy misy fofonaina akory ao aminy.
  '15':
  - type: text
    content: Zava-poana ireny,
  - type: text
    content: dia asan-tanana mahatsikaiky sy tsinontsinona;
  - type: text
    content: amin’ny andro hamaliana azy
  - type: text
    content: dia ho levona izy.
  '16':
  - type: text
    content: Tsy mba tahaka ireo ny Anjaran’i Jakoba;
  - type: text
    content: fa mpamorona ny zavatra rehetra Izy;
  - type: text
    content: ary ny Israely no firenena lovany;
  - type: text
    content: Andriamanitra, Tompon’izao rehetra izao, no anarany.
  - type: heading
    content: Antomotra ny loza
  '17':
  - type: text
    content: Angony ny korontan’entanao hiala amin’ny tany,
  - type: text
    content: ry ilay mipetraka anatin’ny fahirano!
  '18':
  - type: text
    content: 'Fa izao no lazain’NY TOMPO:'
  - type: text
    content: Indro, hatorako ho indray misidina toy ny vaton’antsamotady ny mponina amin’ny tany,
  - type: text
    content: ary hotereko ao anatin’ny fahirano izy
  - type: text
    content: mba tsy hisokatra ny masony.
  '19':
  - type: text
    content: Lozako! Torotoro aho!
  - type: text
    content: Tsy azo sitranina ny feriko;
  - type: text
    content: 'nefa hoy aho hoe:'
  - type: text
    content: Anjara fahoriako izao
  - type: text
    content: ka hozakaiko ihany.
  '2':
  - type: text
    content: 'Izao no lazain’NY TOMPO:'
  - type: text
    content: 'Aza mianatra ny fanaon’ny '
  - type: text
    content: Jentilisa
  - type: text
    content: ;
  - type: text
    content: aza matahotra ireo famantarana eny amin’ny lanitra;
  - type: text
    content: fa ny Jentilisa no matahotra izany.
  '20':
  - type: text
    content: Rava ny tranolaiko,
  - type: text
    content: ary tapaka avokoa ny kofehin-daiko;
  - type: text
    content: lasa ny zanako
  - type: text
    content: ka tsy misy intsony,
  - type: text
    content: eny, tsy misy hamelatra ny tranolaiko intsony
  - type: text
    content: na hanenjana ny ambaindaiko.
  '21':
  - type: text
    content: Fa efa tonga kentrina ny mpiandry ondry
  - type: text
    content: ka tsy mitady NY TOMPO;
  - type: text
    content: izany no tsy mahahendry azy
  - type: text
    content: ka miely ny ondry andrasany rehetra.
  '22':
  - type: text
    content: 'Injany misy resaka mandeha hoe: Indro, tamy'
  - type: text
    content: amin’ny fihorakorahana be avy any amin’ny tany avaratra izy
  - type: text
    content: mba hahatonga ny tanànan’ny Joda ho lao
  - type: text
    content: sy ho fonenan’ny amboadia.
  - type: heading
    content: Vavak’i Jeremia ho an’ny vahoakany
  '23':
  - type: text
    content: TOMPO ô, fantatro
  - type: text
    content: fa tsy miankina amin’ny olombelona ny lalan-kalehany,
  - type: text
    content: ary tsy miankina amin’ny mpandeha
  - type: text
    content: ny hahalavorary ny diany.
  '24':
  - type: text
    content: TOMPO ô, anaro aho,
  - type: text
    content: nefa araka ny fitsaranao ihany
  - type: text
    content: fa tsy amin’ny fahatezeranao,
  - type: text
    content: fandrao hataonao tonga tsinontsinona aho.
  '25':
  - type: text
    content: 'Aidino amin’ny '
  - type: text
    content: Jentilisa
  - type: text
    content: izay tsy mahalala Anao ny fahatezeranao,
  - type: text
    content: dia amin’ny taranaka
  - type: text
    content: izay tsy miantso ny anaranao;
  - type: text
    content: fa mandripaka an’i Jakoba ireo,
  - type: text
    content: eny, mandripaka
  - type: text
    content: sy mandringana azy,
  - type: text
    content: eny mandrava ny fonenany.
  '3':
  - type: text
    content: Fa ny fanaon’ny firenen-kafa dia zava-poana;
  - type: text
    content: hazo nokapaina tany an’ala ireny,
  - type: text
    content: asan-tanan’ny mpahay taozavatra amin’ny famaky;
  '4':
  - type: text
    content: volafotsy sy volamena no andravahany azy
  - type: text
    content: ary fantsika sy maritoa no entiny manamafy azy
  - type: text
    content: mba tsy hihetsiketsehany.
  '5':
  - type: text
    content: Toy ny tsangankazo voaravaka izy
  - type: text
    content: fa tsy mahateny,
  - type: text
    content: entina foana izy
  - type: text
    content: fa tsy mba afa-mandeha;
  - type: text
    content: ary aza matahotra azy
  - type: text
    content: fa tsy mahatonga loza izy
  - type: text
    content: sady tsy mahay manisy soa.
  '6':
  - type: text
    content: Tsy misy tokoa izay tahaka Anao, RY TOMPO ô;
  - type: text
    content: lehibe Ianao, ary lehibe amin’ny hery ny anaranao.
  '7':
  - type: text
    content: Iza no tsy hatahotra Anao, ry Mpanjakan’ny firenena!
  - type: text
    content: Fa mendrika Anao izany,
  - type: text
    content: fa amin’ny hendry rehetra amin’ny firenena
  - type: text
    content: sy amin’ny fanjakany rehetra
  - type: text
    content: dia tsy misy tahaka Anao.
  '8':
  - type: text
    content: Fa kentrina sy adala avokoa izy rehetra.
  - type: text
    content: E! Zava-poana ny fampianarany fa tapa-kazo ihany izany.
  '9':
  - type: text
    content: Volafotsy voafisaka nalaina avy tany Tarsisy
  - type: text
    content: sy volamena avy tany Ofaza izany,
  - type: text
    content: asan-tanan’ny mpahay taozavatra sy ny mpanefy volamena;
  - type: text
    content: lamba manga sy volomparasy ny fitafiany;
  - type: text
    content: asan’ny manan-talenta izy rehetra.
