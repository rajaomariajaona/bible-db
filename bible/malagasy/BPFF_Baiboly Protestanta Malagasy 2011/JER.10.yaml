document_id: JER.10
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ilay Andriamanitra velona manoloana ireo sampy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Henoy ny teny izay lazain’NY TOMPO aminareo, ry taranak’Israely! '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Izao no lazain’NY TOMPO:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Aza mianatra ny fanaon’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jentilisa
  - type: text
    text: ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: aza matahotra ireo famantarana eny amin’ny lanitra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny Jentilisa no matahotra izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Fa ny fanaon’ny firenen-kafa dia zava-poana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hazo nokapaina tany an’ala ireny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: asan-tanan’ny mpahay taozavatra amin’ny famaky;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: volafotsy sy volamena no andravahany azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary fantsika sy maritoa no entiny manamafy azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba tsy hihetsiketsehany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Toy ny tsangankazo voaravaka izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa tsy mahateny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: entina foana izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa tsy mba afa-mandeha;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary aza matahotra azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa tsy mahatonga loza izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady tsy mahay manisy soa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Tsy misy tokoa izay tahaka Anao, RY TOMPO ô;
- type: usfm
  marker: q1
  children:
  - type: text
    text: lehibe Ianao, ary lehibe amin’ny hery ny anaranao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Iza no tsy hatahotra Anao, ry Mpanjakan’ny firenena!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa mendrika Anao izany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa amin’ny hendry rehetra amin’ny firenena
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy amin’ny fanjakany rehetra
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia tsy misy tahaka Anao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Fa kentrina sy adala avokoa izy rehetra.
- type: usfm
  marker: q1
  children:
  - type: text
    text: E! Zava-poana ny fampianarany fa tapa-kazo ihany izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Volafotsy voafisaka nalaina avy tany Tarsisy
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy volamena avy tany Ofaza izany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: asan-tanan’ny mpahay taozavatra sy ny mpanefy volamena;
- type: usfm
  marker: q1
  children:
  - type: text
    text: lamba manga sy volomparasy ny fitafiany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: asan’ny manan-talenta izy rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Fa NY TOMPO no Andriamanitra marina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, Izy no Andriamanitra velona sy Mpanjaka mandrakizay,
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay mampihorohoro ny tany amin’ny fahatezerany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy tantin’ny firenena ny fahavinirany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Izao anefa no holazainareo amin’ireny:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny andriamanitra izay tsy mba nanao ny lanitra sy ny tany
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ho levona tsy ho amin’ny tany na ho atỳ ambanin’ny lanitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: NY TOMPO no nanao ny tany tamin’ny heriny
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy nampiorina izao tontolo izao tamin’ny fahendreny
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary namelatra ny lanitra tamin’ny fahaizany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Raha mampirohondrohona ny rano any an-danitra Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia mampiakatra rahona avy any amin’ny faran’ny tany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: manao ny tselatra ho amin’ny ranonorana Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady mamoaka ny rivotra avy amin’ny trano fitahirizany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Efa kentrina avokoa ny olona rehetra ka tsy manam-pahalalana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mitafy henatra noho ny sarin-javatra voasokitra ny mpanefy volamena rehetra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa fitaka ny sarin-javatra voarendrika
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady tsy misy fofonaina akory ao aminy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Zava-poana ireny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia asan-tanana mahatsikaiky sy tsinontsinona;
- type: usfm
  marker: q1
  children:
  - type: text
    text: amin’ny andro hamaliana azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ho levona izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Tsy mba tahaka ireo ny Anjaran’i Jakoba;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa mpamorona ny zavatra rehetra Izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny Israely no firenena lovany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Andriamanitra, Tompon’izao rehetra izao, no anarany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Antomotra ny loza
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Angony ny korontan’entanao hiala amin’ny tany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ry ilay mipetraka anatin’ny fahirano!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Fa izao no lazain’NY TOMPO:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Indro, hatorako ho indray misidina toy ny vaton’antsamotady ny mponina amin’ny tany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hotereko ao anatin’ny fahirano izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba tsy hisokatra ny masony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Lozako! Torotoro aho!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy azo sitranina ny feriko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'nefa hoy aho hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Anjara fahoriako izao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hozakaiko ihany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Rava ny tranolaiko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tapaka avokoa ny kofehin-daiko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: lasa ny zanako
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy misy intsony,
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, tsy misy hamelatra ny tranolaiko intsony
- type: usfm
  marker: q1
  children:
  - type: text
    text: na hanenjana ny ambaindaiko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Fa efa tonga kentrina ny mpiandry ondry
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy mitady NY TOMPO;
- type: usfm
  marker: q1
  children:
  - type: text
    text: izany no tsy mahahendry azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka miely ny ondry andrasany rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Injany misy resaka mandeha hoe: Indro, tamy'
- type: usfm
  marker: q1
  children:
  - type: text
    text: amin’ny fihorakorahana be avy any amin’ny tany avaratra izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hahatonga ny tanànan’ny Joda ho lao
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ho fonenan’ny amboadia.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Vavak’i Jeremia ho an’ny vahoakany
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: TOMPO ô, fantatro
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa tsy miankina amin’ny olombelona ny lalan-kalehany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy miankina amin’ny mpandeha
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny hahalavorary ny diany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: TOMPO ô, anaro aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa araka ny fitsaranao ihany
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa tsy amin’ny fahatezeranao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fandrao hataonao tonga tsinontsinona aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Aidino amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jentilisa
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay tsy mahalala Anao ny fahatezeranao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia amin’ny taranaka
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay tsy miantso ny anaranao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa mandripaka an’i Jakoba ireo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, mandripaka
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy mandringana azy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny mandrava ny fonenany.
