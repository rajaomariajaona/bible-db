type_code: plt
verses:
  '1':
  - type: text
    content: INDRAY MIJERY
  - type: text
    content: 'Ny Boky Ohabolana dia isan’ireo literatiora maro atao hoe literatiora manolotra fahendrena. Isan’izany ny Mpitoriteny sy ny Joba. Ahitana soritra fahendrena manerana ny Baiboly manontolo: Ohatra ny tantaran’i Josefa, i Daniela, ilay vehivavy hendry tao Tekoa (2Sam 14); misy ao amin’ny Bokin’ny Salamo (Sal 91, 112, 119, 127). Any amin’ny Testamenta Vaovao, ny Toriteny tao an-tendrombohitra dia manana endrika fampianarana fahendrena. Jereo koa Mat 12.42; Lio 14.7-11, ampit. Oha 25.7; Rom 12.20, ampit. Oha 25.21-22.'
  - type: text
    content: Tsy tao amin’ny Israely ihany no nahitana izany fanolorana fahendrena izany fa tany amin’ireo ny firenen-kafa nanodidina ny Israely fahiny koa, ary i Agora sy i Lemoela, ao amin’ny 30 sy 31 dia tsy Israeliana.
  - type: text
    content: Ny votoatin’ny Boky
  - type: text
    content: Ny Boky dia mitondra ny anaran’i Solomona mpanjaka, kanefa tsy i Solomona irery no nanoratra fa ny Boky dia fitambarana boky samihafa avy tamin’ny fotoana samihafa. Ny teny nadika hoe Ohabolana dia mifanandrify kokoa amin’ny hoe Tenim-pahendrena. Ireny tenim-pahendrena ireny dia tsy toy ny tenim-paminaniana izay vokatry ny fanambarana manokana avy amin’Andriamanitra, fa vokatry ny fandinihina amin’ny saina mahiratra sy ny traikefan’ny Hendry. Koa ireny teny ireny dia manome anatra mikasika ny fitondrana tsara ny fiainana. Ary izy rehetra dia fehezin’ny fahatahorana an’Andriamanitra izay fiandohan’ny fahendrena rehetra.
  - type: text
    content: Ao amin’ny 1.20-33 sy 8–9, ny fahendrena dia aseho ho toy ny vehivavy lehibe hendry iray, koa fomba ny milaza azy hoe «Ramatoa Fahendrena», na «Rafahendrena»
  - type: text
    content: Ny firafitry ny Boky
  - type: text
    content: 'Fitarihanteny lehibe, natao amin’ny endrika fananarana ny tanora, ataon’ny raim-pianakaviana na renim-pianakaviana iray eo am-bavahadin’ny tanàna, mba hihaino ny fahendrena izy ka handositra ny hadalana: 1–9'
  - type: text
    content: 'Tenim-pahendrena nataon’i Solomona: 10.1–22.16'
  - type: text
    content: 'Tenin’ny Hendry hafa: 22.17–24.22. Ato amin’ity fizarana ity dia marihina ny 22.17–23.14 izay mitovy be ihany amin’ny fahendrena ejiptiana. Ao koa ny teny mamely ny fimamoana.'
  - type: text
    content: 'Tenin’ny Hendry mamely ny hakamoana: 24.23-34'
  - type: text
    content: 'Tenin’i Solomona: 25–29'
  - type: text
    content: 'Tenin’i Agora, olon-kendry tsy Israeliana: 30.1-14'
  - type: text
    content: 'Tenim-pahendrena samihafa amin’ny endrika isa marika: 30.15-33'
  - type: text
    content: 'Tenin’i Lemoela, olon-kendry tsy Israeliana koa: 31.1-9'
  - type: text
    content: 'Ny vehivavy mahafatra-po: 31.10-31'
