document_id: HOS.6
type_code: plt
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Andeha hiverina amin’NY TOMPO isika!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa Izy no namiravira nefa Izy ihany no hahasitrana antsika.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izy no namely nefa Izy no hamehy ny ferintsika.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Rehefa afaka roa andro dia hovelominy indray isika
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary amin’ny andro fahatelo dia hatsangany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho velona eo anatrehany isika.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Dia aoka hahalala isika; eny, aoka hiezaka hahalala NY TOMPO.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mahatoky toy ny maraina ny fiposahany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ho avy amintsika toy ny ranonorana mivatravatra Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary toy ny faraorana mahavonto ny tany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Inona re no ho azoko atao aminao, ry Efraima?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Inona re no ho azoko atao aminao, ry Joda?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa toy ny rahona amin’ny maraina ny fitiavanareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tahaka ny ando izay levona raha vao maraina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Noho izany no nitondrako ny mpaminany hamely azy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny tenin’ny vavako no nentiko namono azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny fitsarana anao dia hiposaka toy ny mazava
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: satria famindrampo no sitrako fa tsy fanatitra alatsa-dra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary fahalalana an’Andriamanitra noho ny fanatitra dorana manontolo.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mampahafantatra ny fivadihan’Israely taminy Andriamanitra
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Nivadika ny fanekena toy ny tany Adama
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Adama: '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'anaran-tany iray. Zahao '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jos 3.16.
    marker-yv: yv-n
  - type: text
    text: ' ireny.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tao no nivadihany Tamiko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: I Gileada dia tanànan’ny mpanao ratsy lian-dra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Toy ny jiolahy manao vela-pandrika
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny fikambanan’ny mpisorona;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mamono olona eny an-dalambe mankany Sekema izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, fahafaham-baraka izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Tao amin’ny taranak’Israely no nahitako zavatra mahatsiravina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ao no nijangajangan’i Efraima
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy naha voaloto an’Israely.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ny aminao koa, ry Joda, dia efa voatendry ny andro hijinjana anao
- type: usfm
  marker: q1
  children:
  - type: text
    text: rehefa tafaveriko amin’ny toerany ny oloko.
