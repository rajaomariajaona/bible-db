document_id: HOS.6,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Andeha hiverina amin’NY TOMPO isika!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa Izy no namiravira nefa Izy ihany no hahasitrana antsika.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izy no namely nefa Izy no hamehy ny ferintsika.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tao amin’ny taranak’Israely no nahitako zavatra mahatsiravina;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ao no nijangajangan’i Efraima
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy naha voaloto an’Israely.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny aminao koa, ry Joda, dia efa voatendry ny andro hijinjana anao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: rehefa tafaveriko amin’ny toerany ny oloko.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rehefa afaka roa andro dia hovelominy indray isika
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary amin’ny andro fahatelo dia hatsangany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho velona eo anatrehany isika.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia aoka hahalala isika; eny, aoka hiezaka hahalala NY TOMPO.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mahatoky toy ny maraina ny fiposahany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ho avy amintsika toy ny ranonorana mivatravatra Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary toy ny faraorana mahavonto ny tany.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Inona re no ho azoko atao aminao, ry Efraima?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Inona re no ho azoko atao aminao, ry Joda?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa toy ny rahona amin’ny maraina ny fitiavanareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tahaka ny ando izay levona raha vao maraina.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Noho izany no nitondrako ny mpaminany hamely azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny tenin’ny vavako no nentiko namono azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny fitsarana anao dia hiposaka toy ny mazava
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria famindrampo no sitrako fa tsy fanatitra alatsa-dra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary fahalalana an’Andriamanitra noho ny fanatitra dorana manontolo.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mampahafantatra ny fivadihan’Israely taminy Andriamanitra
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nivadika ny fanekena toy ny tany Adama
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Adama: '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'anaran-tany iray. Zahao '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jos 3.16.
      marker-yv: yv-n
    - type: text
      text: ' ireny.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tao no nivadihany Tamiko.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I Gileada dia tanànan’ny mpanao ratsy lian-dra.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toy ny jiolahy manao vela-pandrika
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny fikambanan’ny mpisorona;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mamono olona eny an-dalambe mankany Sekema izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, fahafaham-baraka izany.
