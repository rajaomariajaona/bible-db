document_id: HOS.6,3103
type_code: plt
verses:
  '1':
  - type: text
    content: Andeha hiverina amin’NY TOMPO isika!
  - type: text
    content: Fa Izy no namiravira nefa Izy ihany no hahasitrana antsika.
  - type: text
    content: Izy no namely nefa Izy no hamehy ny ferintsika.
  '10':
  - type: text
    content: Tao amin’ny taranak’Israely no nahitako zavatra mahatsiravina;
  - type: text
    content: ao no nijangajangan’i Efraima
  - type: text
    content: sy naha voaloto an’Israely.
  '11':
  - type: text
    content: Ny aminao koa, ry Joda, dia efa voatendry ny andro hijinjana anao
  - type: text
    content: rehefa tafaveriko amin’ny toerany ny oloko.
  '2':
  - type: text
    content: Rehefa afaka roa andro dia hovelominy indray isika
  - type: text
    content: ary amin’ny andro fahatelo dia hatsangany
  - type: text
    content: ho velona eo anatrehany isika.
  '3':
  - type: text
    content: Dia aoka hahalala isika; eny, aoka hiezaka hahalala NY TOMPO.
  - type: text
    content: Mahatoky toy ny maraina ny fiposahany,
  - type: text
    content: fa ho avy amintsika toy ny ranonorana mivatravatra Izy
  - type: text
    content: ary toy ny faraorana mahavonto ny tany.
  '4':
  - type: text
    content: Inona re no ho azoko atao aminao, ry Efraima?
  - type: text
    content: Inona re no ho azoko atao aminao, ry Joda?
  - type: text
    content: Fa toy ny rahona amin’ny maraina ny fitiavanareo,
  - type: text
    content: tahaka ny ando izay levona raha vao maraina.
  '5':
  - type: text
    content: Noho izany no nitondrako ny mpaminany hamely azy;
  - type: text
    content: ny tenin’ny vavako no nentiko namono azy
  - type: text
    content: ary ny fitsarana anao dia hiposaka toy ny mazava
  '6':
  - type: text
    content: satria famindrampo no sitrako fa tsy fanatitra alatsa-dra
  - type: text
    content: ary fahalalana an’Andriamanitra noho ny fanatitra dorana manontolo.
  - type: heading
    content: Mampahafantatra ny fivadihan’Israely taminy Andriamanitra
  '7':
  - type: text
    content: Nivadika ny fanekena toy ny tany Adama
  - type: note
    content: 'Adama: anaran-tany iray. Zahao Jos 3.16.'
  - type: text
    content: ' ireny.'
  - type: text
    content: Tao no nivadihany Tamiko.
  '8':
  - type: text
    content: I Gileada dia tanànan’ny mpanao ratsy lian-dra.
  '9':
  - type: text
    content: Toy ny jiolahy manao vela-pandrika
  - type: text
    content: ny fikambanan’ny mpisorona;
  - type: text
    content: mamono olona eny an-dalambe mankany Sekema izy;
  - type: text
    content: eny, fahafaham-baraka izany.
