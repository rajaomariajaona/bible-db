document_id: 1SA.23,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ao Keila i Davida
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nisy nanambara tamin’i Davida hoe: Indro ny Filistina dia mamely an’i Keila ka mamabo ny ao am-pamoloana. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy i Davida: Ry TOMPO, Andriamanitry ny Israely ô, efa ren’ny mpanomponao tokoa fa mitady hankaty Keila i Saoly mba handrava ny tanàna noho ny amiko. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa moa ny mpitondra atỳ Keila va hanolotra ahy ho eo an-tanany? Hidina etỳ tokoa toy izay efa ren’ny mpanomponao va i Saoly? Ry TOMPO, Andriamanitry ny Israely ô, mifona aminao aho, ambarao amin’ny mpanomponao. Ary hoy NY TOMPO: Hidina izy. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy i Davida: Ny mpitondra etỳ Keila va hanolotra ahy sy ny oloko ho eo an-tanan’i Saoly? Ary hoy NY TOMPO: Hanolotra anao izy. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia niainga i Davida sy ny olony tokony ho eninjato lahy ka niala tao Keila ary nandeha tamin’izay azony naleha. Ary nisy nilaza tamin’i Saoly fa efa nandositra niala tao Keila i Davida, dia nijanona tsy nandeha izy.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nitoetra tany an-tany efitra tao amin’ny fierena any an-tendrombohitra sy tany amin’ny havoana tany an-tany efitr’i Zifa i Davida. Nitady azy isanandro i Saoly, nefa Andriamanitra tsy nanolotra azy ho eo an-tanany.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hitan’i Davida fa nivoaka hitady ny ainy i Saoly. Tany an-tany efitr’i Zifa tany Horsa no nisy an’i Davida. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary i Jonatana, zanak’i Saoly, niainga, dia nankany amin’i Davida tany Horsa ka nampahery azy tamin’Andriamanitra. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy izy taminy: Aza matahotra, fa tsy hahazo anao ny tanan’i Saoly raiko; fa ianao no ho mpanjaka amin’ny Israely, ary izaho no ho lefitrao, ary fantatr’i Saoly raiko koa izany. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary nanao fifanekena teo anatrehan’NY TOMPO izy roa lahy; koa i Davida dia nitoetra tany Horsa, fa i Jonatana kosa dia nody any an-tranony.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Manenjika an’i Davida i Saoly
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Niakatra nankany amin’i Saoly tany Gibea ny Zifita ka niteny hoe: Miery any aminay ao amin’ny fierena any an-tendrombohitra any Horsa, any amin’ny tany be havoana any Hakila izay atsimon’ny tany efitra, i Davida. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nanontany tamin’NY TOMPO i Davida hoe: Handeha hamely izao Filistina izao va aho? Hoy NY TOMPO tamin’i Davida: Mandehana, asio ny Filistina ka vonjeo i Keila. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa ankehitriny, ry mpanjaka, araka ny fanirianao hidina dia midìna ianao, fa izahay no hanolotra azy ho eo an-tanan’ny mpanjaka. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy i Saoly: Hotahin’NY TOMPO anie ianareo, fa ianareo dia namindra fo tamiko. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Miangavy anareo aho, mandehana, fotory tsara indray ka fantaro tsara ny nalehany, ary hadihadio izay nahita azy tany fa tena fetsy, hono, izy iny. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa zahao sy fantaro tsara ny fierena rehetra izay iereny dia miverena atỳ amiko rehefa azonareo antoka izany, fa handeha hiaraka aminareo aho; raha mbola eto amin’ny tany izy dia hotadiaviko manerana ny fokon’i Joda rehetra. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia niainga nankany Zifa izy ireo hialoha an’i Saoly. I Davida sy ny olony kosa tamin’io dia tany amin’ny tany efitr’i Maona, tao amin’ny tany ngazana atsimon’ny tany efitra.
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nandeha i Saoly sy ny olony mba hitady azy. Nisy nilaza tamin’i Davida izany ka nidina tany amin’ny harambato izy ary nitoetra tany an-tany efitr’i Maona. Nony ren’i Saoly izany dia nanenjika an’i Davida tany an-tany efitr’i Maona izy. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nandeha tamin’ny ilan’ny tendrombohitra iray i Saoly fa i Davida sy ny olony kosa dia tamin’ny ilany. Niezaka mafy handositra an’i Saoly i Davida fa i Saoly sy ny olony dia nihodidina an’i Davida sy ny olony mba hisambotra azy. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Kinanjo nisy iraka tonga tao amin’i Saoly niteny hoe: Avia haingana ianao fa efa manafika ny tany ny Filistina. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia niverina avy tamin’ny nanenjehany an’i Davida i Saoly ka nandeha niady tamin’ny Filistina; ary ny anaran’izany tany izany dia nataony hoe Sela-Hamalekota
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.28 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Sela-Hamalekota: Harambato fandosirana.'
      marker-yv: yv-n
    - type: text
      text: .
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy ny olon’i Davida taminy: E! Atỳ Joda aza isika matahotra, koa mainka rehefa mankany Keila hiady laharana amin’ny miaramilan’ny Filistina? '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia mbola nanontany tamin’NY TOMPO indray i Davida ka novalin’NY TOMPO hoe: Miaingà, midìna hankany Keila, fa Izaho no hanolotra ny Filistina ho eo an-tananao. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia lasa nankany Keila i Davida sy ny olony ka niady tamin’ny Filistina sy namabo ny andiam-bibiny sady nahafaty olona be dia be, ary voavonjin’i Davida ny mponina tao Keila. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary i Abiatara, zanak’i Ahimeleka, rehefa nandositra nankany amin’i Davida tany Keila, dia nitondra '
    - type: usfm
      marker: w
      children:
      - type: text
        text: efoda
    - type: text
      text: ' teny an-tanany.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nisy nanambara tamin’i Saoly fa tonga tao Keila i Davida. Dia hoy i Saoly: Andriamanitra efa hanolotra azy ho eo an-tanako; efa voahidy izy izao satria tafiditra ao amin’ny tanàna misy vavahady mihidy. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary namory ny vahoaka rehetra i Saoly mba hidina any Keila hanao fahirano an’i Davida sy ny olony. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nony fantatr’i Davida fa namorona hevi-dratsy hamelezana azy i Saoly dia hoy izy tamin’i Abiatara mpisorona: Ento etỳ ny efoda. '
