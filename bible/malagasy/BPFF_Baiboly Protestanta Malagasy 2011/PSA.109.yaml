document_id: PSA.109,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Miantso vonjy amin’Andriamanitra ny voampanga
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: Ho an’ny mpiventy hira. Salamo nataon’i Davida.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ry Andriamanitra izay deraiko ô, aza mangina Ianao,
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka hirenireny mangataka ny zanany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary aoka hiremby lavitra ny tranony efa rava izy.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka hamandrika izay rehetra ananany ny mpampindram-bola
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary aoka hifaoka ny vokatry ny asany ny olon-kafa.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka tsy hisy haharitra hamindra fo aminy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na hiantra ny zanany kamboty.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka ho fongotra ny taranany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary aoka hovonoina amin’ny taranaka mandimby ny anarany.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka hotsarovan’NY TOMPO ny heloky ny rainy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary aoka tsy hovonoina ny heloky ny reniny.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka ho eo anatrehan’NY TOMPO mandrakariva izany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hofoanany tsy ho eo ambonin’ny tany anie ny fahatsiarovana azy.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Satria tsy mba nahatsiaro hamindra fo izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa nanenjika ny ory sy ny mahantra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny reraka am-po mba hahafaty azy.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tia ozona izy ka nanody azy izany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy tia fitahiana izy ka nanalavitra azy izany.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nitafy ozona tahaka ny lambany izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka niditra tao an-kibony tahaka ny rano izany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tao amin’ny taolany tahaka ny diloilo;
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia aoka ho tahaka ny lamba itafiany izany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ho fehikibo hanaovany mandrakariva.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa nisoka-bava ny ratsy fanahy sy ny mpamitaka hamely ahy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: niteny ahy tamin’ny lela mandainga izy.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izany no famaliana avy amin’NY TOMPO ho an’ny mpiampanga ahy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia izay manendrikendrika ahy.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa Ianao, RY TOMPO Andriamanitra ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia miasa ho ahy noho ny anaranao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: afaho aho fa tsara ny famindramponao.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ory sy mahantra aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny foko dia voatsindrona ato anatiko.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lasa tahaka ny aloka mihelina aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: roahina tahaka ny valala aho.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Malemy ny lohaliko noho ny fifadian-kanina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary efa lasa mahia kaozatra ny tenako.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary izaho dia tonga fandatsan’ireny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mijery ahy izy ka mihifikifi-doha.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ampio aho RY TOMPO Andriamanitro;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vonjeo araka ny famindramponao aho;
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aoka ho fantany fa tananao izany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary Ianao, TOMPO ô, no nanao izany.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manozona izy ireo fa mitahy kosa Ianao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mitsanga-menatra izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa mifaly kosa ny mpanomponao.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mitafy henatra ny mpiampanga ahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka misaron-kenatra tahaka ny lamba.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Teny feno fankahalana no nanodidinany ahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary niady tamiko tsy amin’antony izy.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hidera NY TOMPO amin’ny feo mafy aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, eo amin’ny olona maro no hiderako Azy.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa mitsangana eo ankavanan’ny mahantra Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hamonjy azy amin’izay manameloka ny fanahiny.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fitiavako dia valiny fandrafiana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa izaho kosa dia mivavaka.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Novaliany ratsy ny soa nataoko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary novaliany fankahalana ny fitiavako.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Anendreo olona ratsy fanahy hifehy azy izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary aoka hisy mpiampanga hitsangana eo ankavanany.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha hotsaraina izy dia aoka ho meloka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary aoka ny fivavahany ho tonga fahotana.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka ho vitsy ny androny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary aoka ho lasan’olon-kafa ny anjara raharahany.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka ho kamboty ny zanany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary aoka ho mpitondratena ny vadiny.
