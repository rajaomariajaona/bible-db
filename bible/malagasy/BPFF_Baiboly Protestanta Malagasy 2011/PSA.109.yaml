document_id: PSA.109
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Miantso vonjy amin’Andriamanitra ny voampanga
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: Ho an’ny mpiventy hira. Salamo nataon’i Davida.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ry Andriamanitra izay deraiko ô, aza mangina Ianao,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: fa nisoka-bava ny ratsy fanahy sy ny mpamitaka hamely ahy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: niteny ahy tamin’ny lela mandainga izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Teny feno fankahalana no nanodidinany ahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary niady tamiko tsy amin’antony izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ny fitiavako dia valiny fandrafiana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa izaho kosa dia mivavaka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Novaliany ratsy ny soa nataoko
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary novaliany fankahalana ny fitiavako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Anendreo olona ratsy fanahy hifehy azy izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary aoka hisy mpiampanga hitsangana eo ankavanany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Raha hotsaraina izy dia aoka ho meloka
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary aoka ny fivavahany ho tonga fahotana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Aoka ho vitsy ny androny
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary aoka ho lasan’olon-kafa ny anjara raharahany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Aoka ho kamboty ny zanany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary aoka ho mpitondratena ny vadiny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Aoka hirenireny mangataka ny zanany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary aoka hiremby lavitra ny tranony efa rava izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Aoka hamandrika izay rehetra ananany ny mpampindram-bola
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary aoka hifaoka ny vokatry ny asany ny olon-kafa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Aoka tsy hisy haharitra hamindra fo aminy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: na hiantra ny zanany kamboty.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Aoka ho fongotra ny taranany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary aoka hovonoina amin’ny taranaka mandimby ny anarany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Aoka hotsarovan’NY TOMPO ny heloky ny rainy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary aoka tsy hovonoina ny heloky ny reniny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Aoka ho eo anatrehan’NY TOMPO mandrakariva izany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hofoanany tsy ho eo ambonin’ny tany anie ny fahatsiarovana azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Satria tsy mba nahatsiaro hamindra fo izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa nanenjika ny ory sy ny mahantra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny reraka am-po mba hahafaty azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Tia ozona izy ka nanody azy izany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy tia fitahiana izy ka nanalavitra azy izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Nitafy ozona tahaka ny lambany izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka niditra tao an-kibony tahaka ny rano izany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tao amin’ny taolany tahaka ny diloilo;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: dia aoka ho tahaka ny lamba itafiany izany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ho fehikibo hanaovany mandrakariva.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Izany no famaliana avy amin’NY TOMPO ho an’ny mpiampanga ahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia izay manendrikendrika ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Fa Ianao, RY TOMPO Andriamanitra ô,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia miasa ho ahy noho ny anaranao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: afaho aho fa tsara ny famindramponao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Fa ory sy mahantra aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny foko dia voatsindrona ato anatiko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Lasa tahaka ny aloka mihelina aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: roahina tahaka ny valala aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Malemy ny lohaliko noho ny fifadian-kanina
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary efa lasa mahia kaozatra ny tenako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Ary izaho dia tonga fandatsan’ireny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mijery ahy izy ka mihifikifi-doha.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Ampio aho RY TOMPO Andriamanitro;
- type: usfm
  marker: q1
  children:
  - type: text
    text: vonjeo araka ny famindramponao aho;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: aoka ho fantany fa tananao izany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary Ianao, TOMPO ô, no nanao izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Manozona izy ireo fa mitahy kosa Ianao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mitsanga-menatra izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa mifaly kosa ny mpanomponao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Mitafy henatra ny mpiampanga ahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka misaron-kenatra tahaka ny lamba.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Hidera NY TOMPO amin’ny feo mafy aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, eo amin’ny olona maro no hiderako Azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Fa mitsangana eo ankavanan’ny mahantra Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hamonjy azy amin’izay manameloka ny fanahiny.
