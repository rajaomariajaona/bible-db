document_id: PSA.109,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Miantso vonjy amin’Andriamanitra ny voampanga
  - type: text
    content: Ho an’ny mpiventy hira. Salamo nataon’i Davida.
  - type: text
    content: Ry Andriamanitra izay deraiko ô, aza mangina Ianao,
  '10':
  - type: text
    content: Aoka hirenireny mangataka ny zanany
  - type: text
    content: ary aoka hiremby lavitra ny tranony efa rava izy.
  '11':
  - type: text
    content: Aoka hamandrika izay rehetra ananany ny mpampindram-bola
  - type: text
    content: ary aoka hifaoka ny vokatry ny asany ny olon-kafa.
  '12':
  - type: text
    content: Aoka tsy hisy haharitra hamindra fo aminy,
  - type: text
    content: na hiantra ny zanany kamboty.
  '13':
  - type: text
    content: Aoka ho fongotra ny taranany
  - type: text
    content: ary aoka hovonoina amin’ny taranaka mandimby ny anarany.
  '14':
  - type: text
    content: Aoka hotsarovan’NY TOMPO ny heloky ny rainy
  - type: text
    content: ary aoka tsy hovonoina ny heloky ny reniny.
  '15':
  - type: text
    content: Aoka ho eo anatrehan’NY TOMPO mandrakariva izany
  - type: text
    content: ary hofoanany tsy ho eo ambonin’ny tany anie ny fahatsiarovana azy.
  '16':
  - type: text
    content: Satria tsy mba nahatsiaro hamindra fo izy
  - type: text
    content: fa nanenjika ny ory sy ny mahantra
  - type: text
    content: ary ny reraka am-po mba hahafaty azy.
  '17':
  - type: text
    content: Tia ozona izy ka nanody azy izany;
  - type: text
    content: tsy tia fitahiana izy ka nanalavitra azy izany.
  '18':
  - type: text
    content: Nitafy ozona tahaka ny lambany izy
  - type: text
    content: ka niditra tao an-kibony tahaka ny rano izany
  - type: text
    content: ary tao amin’ny taolany tahaka ny diloilo;
  '19':
  - type: text
    content: dia aoka ho tahaka ny lamba itafiany izany
  - type: text
    content: ary ho fehikibo hanaovany mandrakariva.
  '2':
  - type: text
    content: fa nisoka-bava ny ratsy fanahy sy ny mpamitaka hamely ahy;
  - type: text
    content: niteny ahy tamin’ny lela mandainga izy.
  '20':
  - type: text
    content: Izany no famaliana avy amin’NY TOMPO ho an’ny mpiampanga ahy,
  - type: text
    content: dia izay manendrikendrika ahy.
  '21':
  - type: text
    content: Fa Ianao, RY TOMPO Andriamanitra ô,
  - type: text
    content: dia miasa ho ahy noho ny anaranao;
  - type: text
    content: afaho aho fa tsara ny famindramponao.
  '22':
  - type: text
    content: Fa ory sy mahantra aho
  - type: text
    content: ary ny foko dia voatsindrona ato anatiko.
  '23':
  - type: text
    content: Lasa tahaka ny aloka mihelina aho;
  - type: text
    content: roahina tahaka ny valala aho.
  '24':
  - type: text
    content: Malemy ny lohaliko noho ny fifadian-kanina
  - type: text
    content: ary efa lasa mahia kaozatra ny tenako.
  '25':
  - type: text
    content: Ary izaho dia tonga fandatsan’ireny;
  - type: text
    content: mijery ahy izy ka mihifikifi-doha.
  '26':
  - type: text
    content: Ampio aho RY TOMPO Andriamanitro;
  - type: text
    content: vonjeo araka ny famindramponao aho;
  '27':
  - type: text
    content: aoka ho fantany fa tananao izany;
  - type: text
    content: ary Ianao, TOMPO ô, no nanao izany.
  '28':
  - type: text
    content: Manozona izy ireo fa mitahy kosa Ianao;
  - type: text
    content: mitsanga-menatra izy
  - type: text
    content: fa mifaly kosa ny mpanomponao.
  '29':
  - type: text
    content: Mitafy henatra ny mpiampanga ahy
  - type: text
    content: ka misaron-kenatra tahaka ny lamba.
  '3':
  - type: text
    content: Teny feno fankahalana no nanodidinany ahy
  - type: text
    content: ary niady tamiko tsy amin’antony izy.
  '30':
  - type: text
    content: Hidera NY TOMPO amin’ny feo mafy aho;
  - type: text
    content: eny, eo amin’ny olona maro no hiderako Azy.
  '31':
  - type: text
    content: Fa mitsangana eo ankavanan’ny mahantra Izy
  - type: text
    content: mba hamonjy azy amin’izay manameloka ny fanahiny.
  '4':
  - type: text
    content: Ny fitiavako dia valiny fandrafiana,
  - type: text
    content: fa izaho kosa dia mivavaka.
  '5':
  - type: text
    content: Novaliany ratsy ny soa nataoko
  - type: text
    content: ary novaliany fankahalana ny fitiavako.
  '6':
  - type: text
    content: Anendreo olona ratsy fanahy hifehy azy izy
  - type: text
    content: ary aoka hisy mpiampanga hitsangana eo ankavanany.
  '7':
  - type: text
    content: Raha hotsaraina izy dia aoka ho meloka
  - type: text
    content: ary aoka ny fivavahany ho tonga fahotana.
  '8':
  - type: text
    content: Aoka ho vitsy ny androny
  - type: text
    content: ary aoka ho lasan’olon-kafa ny anjara raharahany.
  '9':
  - type: text
    content: Aoka ho kamboty ny zanany
  - type: text
    content: ary aoka ho mpitondratena ny vadiny.
