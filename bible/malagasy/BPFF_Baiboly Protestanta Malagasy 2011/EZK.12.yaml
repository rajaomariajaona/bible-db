document_id: EZK.12
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Manome fambara mialoha momba ny fahababoana Andriamanitra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Tonga tamiko ny tenin’NY TOMPO hoe:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ry '
  - type: usfm
    marker: w
    children:
    - type: text
      text: zanak’olona
  - type: text
    text: ', ianao dia monina eto amin’ny taranaka maditra izay mana-maso hahitana nefa tsy mahita, ary manan-tsofina handrenesana nefa tsy mandre, fa taranaka maditra izy. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Koa ianao, ry zanak’olona, mifeheza ny entan’ny babo ka miaingà amin’ny andro antoandro eo imasony! Ary mialà eo imasony eo amin’izay itoeranao ho any amin’ny toerana hafa; angamba mba ho fantany fa taranaka maditra izy. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Havoakanao antoandro eo imasony ny entanao, toy ny entan’ny babo; fa ny tenanao kosa dia hivoaka eo imasony amin’ny hariva, toy ny fivoakan’ny babo. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Gorobahy eo imasony ny manda ka ao no amoahy ny entanao. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ataovy an-tsoroka eo imasony izany ka ento mivoaka, rehefa maizina dia maizina ny andro; saròny ny tavanao mba tsy hahitanao ny tany; fa nataoko ho famantarana ho an’ny taranak’Israely ianao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Dia nanatanteraka izay nandidiana ahy aho ka nentiko nivoaka antoandro ny entako, toy ny entan’ny babo. Nony hariva dia nogorobahiko tamin’ny tanako ny manda, koa nony efa maizina dia maizina ny andro dia nentiko nivoaka ny entana ka teny an-tsoroka no nitondrako azy teo imasony.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Nony maraina dia tonga tamiko ny tenin’NY TOMPO hoe:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ry zanak’olona, moa ny taranak’Israely, izay taranaka maditra, tsy nanontany anao va hoe: Inona izao ataonao izao? '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ambarao aminy hoe: Izao no lazain’NY TOMPO Andriamanitra: Ity faminaniana ny loza ity dia momba ny mpanjakan’i Jerosalema sy ny taranak’Israely rehetra izay ao aminy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Lazao hoe: Izaho dia famantarana ho anareo, koa tahaka izay ataoko no hatao amin’ireo: Ho lasan-ko babo izy. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary ny mpanjaka izay ao aminy dia hitondra ny entany eny an-tsorony nony efa maizina dia maizina ny andro ka hivoaka; hogorobahin’ny olona ny manda hamoahana azy; hanarona ny tavany izy mba tsy ho hitan’ny masony ny tany. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Hovelariko aminy ny fandrika haratoko ka ho azon’ny harato izy; dia hoentiko any Babilona any amin’ny tanin’ny Kaldeana izy nefa tsy hahita izany izy ary ho faty any ihany. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary izay rehetra manodidina azy, dia ny mpanampy azy sy ny miaramilany rehetra, dia haeliko eny amin’ny rivotra rehetra sady hanatsoaka sabatra hoenti-manenjika azy Aho. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Dia ho fantany fa Izaho no TOMPO rehefa ahahako any amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jentilisa
  - type: text
    text: ' sy ampieleziko any amin’ny tany samihafa izy. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Nefa hamelako olom-bitsy ihany izy ho sisa tsy ho ringan’ny sabatra sy ny mosary ary ny areti-mandringana mba hisy hitantara ny fahavetavetany rehetra any amin’ny Jentilisa izay alehany. Dia ho fantany fa Izaho no TOMPO.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Tonga tamiko ny tenin’NY TOMPO hoe:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ry zanak’olona, hano amin-korohoro ny haninao ary sotroy amin-kovitra sy amin’ahiahy ny ranonao. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary lazao amin’ny vahoaka hoe: Izao no lazain’NY TOMPO Andriamanitra ny amin’ny mponina ao Jerosalema, ao amin’ny tanin’ny Israely: Amin’ahiahy no hihinanany ny haniny, ary amin’ny fahaverezan-kevitra no hisotroany ny ranony satria ho foana tanteraka ny taniny ka tsy hisy na inona na inona ao, noho ny hetraketraka nataon’izay rehetra monina ao aminy. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ho rava ny tanàna onenana ary ho lao ny tany. Dia ho fantatrareo fa Izaho no TOMPO.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ho tanteraka ny tenin’NY TOMPO
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary tonga tamiko ny tenin’NY TOMPO hoe:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ry '
  - type: usfm
    marker: w
    children:
    - type: text
      text: zanak’olona
  - type: text
    text: ', ahoana moa izao oha-teny ataonareo ao amin’ny tanin’ny Israely izao hoe: Mandeha ny fotoana, ary tsy misy vanona ny fahitana rehetra? '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Koa lazao aminy hoe: Izao no lazain’NY TOMPO Andriamanitra: Hatsahatro izany oha-teny izany ka tsy hatao fiteny ao amin’ny Israely intsony. Fa lazao aminy kosa hoe: Akaiky ny andro sy ny tenin’ny fahitana rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Fa tsy hisy fahitana foana na faminaniana mandrobo intsony ao amin’ny taranak’Israely. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Fa Izaho no TOMPO. Hiteny Aho, ary ny teny lazaiko dia ho to tokoa; tsy hahemotra intsony izany fa ho amin’ny andronareo, ry taranaka maditra, no hilazako ny teny sy hanatanterahako azy, hoy NY TOMPO Andriamanitra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ary tonga tamiko ny tenin’NY TOMPO hoe:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ry zanak’olona, indro, ny taranak’Israely dia miteny hoe: Mbola ho ela izany fahitana hitany izany, ary ny amin’ny fotoana mbola lavitra no vinanìny. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Koa lazao aminy hoe: Izao no lazain’NY TOMPO Andriamanitra: Tsy hahemotra intsony ny teniko; fa ny teny izay lazaiko dia hotanterahiko, hoy NY TOMPO Andriamanitra.'
