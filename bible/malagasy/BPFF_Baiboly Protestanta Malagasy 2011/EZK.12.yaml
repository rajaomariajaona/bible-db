document_id: EZK.12,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Manome fambara mialoha momba ny fahababoana Andriamanitra
  - type: text
    content: 'Tonga tamiko ny tenin’NY TOMPO hoe:'
  '10':
  - type: text
    content: 'Ambarao aminy hoe: Izao no lazain’NY TOMPO Andriamanitra: Ity faminaniana ny loza ity dia momba ny mpanjakan’i Jerosalema sy ny taranak’Israely rehetra izay ao aminy.'
  '11':
  - type: text
    content: 'Lazao hoe: Izaho dia famantarana ho anareo, koa tahaka izay ataoko no hatao amin’ireo: Ho lasan-ko babo izy. '
  '12':
  - type: text
    content: 'Ary ny mpanjaka izay ao aminy dia hitondra ny entany eny an-tsorony nony efa maizina dia maizina ny andro ka hivoaka; hogorobahin’ny olona ny manda hamoahana azy; hanarona ny tavany izy mba tsy ho hitan’ny masony ny tany. '
  '13':
  - type: text
    content: 'Hovelariko aminy ny fandrika haratoko ka ho azon’ny harato izy; dia hoentiko any Babilona any amin’ny tanin’ny Kaldeana izy nefa tsy hahita izany izy ary ho faty any ihany. '
  '14':
  - type: text
    content: 'Ary izay rehetra manodidina azy, dia ny mpanampy azy sy ny miaramilany rehetra, dia haeliko eny amin’ny rivotra rehetra sady hanatsoaka sabatra hoenti-manenjika azy Aho. '
  '15':
  - type: text
    content: 'Dia ho fantany fa Izaho no TOMPO rehefa ahahako any amin’ny '
  - type: text
    content: Jentilisa
  - type: text
    content: ' sy ampieleziko any amin’ny tany samihafa izy. '
  '16':
  - type: text
    content: Nefa hamelako olom-bitsy ihany izy ho sisa tsy ho ringan’ny sabatra sy ny mosary ary ny areti-mandringana mba hisy hitantara ny fahavetavetany rehetra any amin’ny Jentilisa izay alehany. Dia ho fantany fa Izaho no TOMPO.
  '17':
  - type: text
    content: 'Tonga tamiko ny tenin’NY TOMPO hoe:'
  '18':
  - type: text
    content: 'Ry zanak’olona, hano amin-korohoro ny haninao ary sotroy amin-kovitra sy amin’ahiahy ny ranonao. '
  '19':
  - type: text
    content: 'Ary lazao amin’ny vahoaka hoe: Izao no lazain’NY TOMPO Andriamanitra ny amin’ny mponina ao Jerosalema, ao amin’ny tanin’ny Israely: Amin’ahiahy no hihinanany ny haniny, ary amin’ny fahaverezan-kevitra no hisotroany ny ranony satria ho foana tanteraka ny taniny ka tsy hisy na inona na inona ao, noho ny hetraketraka nataon’izay rehetra monina ao aminy. '
  '2':
  - type: text
    content: 'Ry '
  - type: text
    content: zanak’olona
  - type: text
    content: ', ianao dia monina eto amin’ny taranaka maditra izay mana-maso hahitana nefa tsy mahita, ary manan-tsofina handrenesana nefa tsy mandre, fa taranaka maditra izy. '
  '20':
  - type: text
    content: Ho rava ny tanàna onenana ary ho lao ny tany. Dia ho fantatrareo fa Izaho no TOMPO.
  - type: heading
    content: Ho tanteraka ny tenin’NY TOMPO
  '21':
  - type: text
    content: 'Ary tonga tamiko ny tenin’NY TOMPO hoe:'
  '22':
  - type: text
    content: 'Ry '
  - type: text
    content: zanak’olona
  - type: text
    content: ', ahoana moa izao oha-teny ataonareo ao amin’ny tanin’ny Israely izao hoe: Mandeha ny fotoana, ary tsy misy vanona ny fahitana rehetra? '
  '23':
  - type: text
    content: 'Koa lazao aminy hoe: Izao no lazain’NY TOMPO Andriamanitra: Hatsahatro izany oha-teny izany ka tsy hatao fiteny ao amin’ny Israely intsony. Fa lazao aminy kosa hoe: Akaiky ny andro sy ny tenin’ny fahitana rehetra. '
  '24':
  - type: text
    content: 'Fa tsy hisy fahitana foana na faminaniana mandrobo intsony ao amin’ny taranak’Israely. '
  '25':
  - type: text
    content: Fa Izaho no TOMPO. Hiteny Aho, ary ny teny lazaiko dia ho to tokoa; tsy hahemotra intsony izany fa ho amin’ny andronareo, ry taranaka maditra, no hilazako ny teny sy hanatanterahako azy, hoy NY TOMPO Andriamanitra.
  '26':
  - type: text
    content: 'Ary tonga tamiko ny tenin’NY TOMPO hoe:'
  '27':
  - type: text
    content: 'Ry zanak’olona, indro, ny taranak’Israely dia miteny hoe: Mbola ho ela izany fahitana hitany izany, ary ny amin’ny fotoana mbola lavitra no vinanìny. '
  '28':
  - type: text
    content: 'Koa lazao aminy hoe: Izao no lazain’NY TOMPO Andriamanitra: Tsy hahemotra intsony ny teniko; fa ny teny izay lazaiko dia hotanterahiko, hoy NY TOMPO Andriamanitra.'
  '3':
  - type: text
    content: 'Koa ianao, ry zanak’olona, mifeheza ny entan’ny babo ka miaingà amin’ny andro antoandro eo imasony! Ary mialà eo imasony eo amin’izay itoeranao ho any amin’ny toerana hafa; angamba mba ho fantany fa taranaka maditra izy. '
  '4':
  - type: text
    content: 'Havoakanao antoandro eo imasony ny entanao, toy ny entan’ny babo; fa ny tenanao kosa dia hivoaka eo imasony amin’ny hariva, toy ny fivoakan’ny babo. '
  '5':
  - type: text
    content: 'Gorobahy eo imasony ny manda ka ao no amoahy ny entanao. '
  '6':
  - type: text
    content: Ataovy an-tsoroka eo imasony izany ka ento mivoaka, rehefa maizina dia maizina ny andro; saròny ny tavanao mba tsy hahitanao ny tany; fa nataoko ho famantarana ho an’ny taranak’Israely ianao.
  '7':
  - type: text
    content: Dia nanatanteraka izay nandidiana ahy aho ka nentiko nivoaka antoandro ny entako, toy ny entan’ny babo. Nony hariva dia nogorobahiko tamin’ny tanako ny manda, koa nony efa maizina dia maizina ny andro dia nentiko nivoaka ny entana ka teny an-tsoroka no nitondrako azy teo imasony.
  '8':
  - type: text
    content: 'Nony maraina dia tonga tamiko ny tenin’NY TOMPO hoe:'
  '9':
  - type: text
    content: 'Ry zanak’olona, moa ny taranak’Israely, izay taranaka maditra, tsy nanontany anao va hoe: Inona izao ataonao izao? '
