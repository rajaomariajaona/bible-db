document_id: JOB.INTRO1,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: imt1
    children:
    - type: text
      text: INDRAY MIJERY
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Ny Bokin’i Joba no sangany amin’ireo literatiora manolotra fahendrena ary voasoratra amin’ny lahatsoratra mirindra tena kanto, afa-tsy ny Fitarihanteny sy ny teny famaranana izay lahatsoratra tsotra. Tsy voalaza anarana ny mpanoratra fa azo antoka fa isan’ireo olon-kendry na mpampianatra fahendrena, izay efa nisy hatry ny ela teo amin’ny Israely sy ny tany amin’ny firenena hafa koa. I Joba dia avy any Oza izay heverina ho any Edoma. Araka izany dia tsy Israeliana izy.
  - type: usfm
    marker: is1
    children:
    - type: text
      text: Ny votoatin’ny Boky
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Ny fanontaniana momba ny fijalian’ny marina dia efa nanitikitika ny olona tamin’ny fotoana rehetra. I Joba dia lehilahy marina, tena matahotra an’Andriamanitra ary nambinina, nefa niharan’ny fahoriana rehetra. Asehon’ny mpanoratra ny zava-mitranga any an-danitra: Ao ireo zanak’Andriamanitra, na ny anjely, izay manotrona an’Andriamanitra (jereo koa 2Mpa 22.19); tonga tany koa anefa i Satana izay miampanga an’i Joba ho mivavaka noho ny tombontsoa fotsiny. I Joba sy ireo namany anefa dia tsy mahafantatra an’izany rehetra izany.'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Tsy vahaolana ny fiampangan’izy efa-dahy an’i Joba hoe tsy maintsy ho nanao fahotana miafina izy na koa ny fanamarinan-tenan’i Joba izay milaza fa tsy misy fahadisoana ny tenany. Fa ny vahaolana asehon’ny tantara dia ny fanatrehan’i Joba an’Andriamanitra Tsitoha sady masina sy ny fietreny eo anatrehan’Andriamanitra.
  - type: usfm
    marker: iot
    children:
    - type: text
      text: Ny firafitry ny Boky
  - type: usfm
    marker: io1
    children:
    - type: text
      text: 'Fitarihanteny: Ny nanjo an’i Joba sy ny zava-nitranga tany an-danitra: 1–2'
  - type: usfm
    marker: io1
    children:
    - type: text
      text: 'Teny ifamalian’i Joba sy ireo namany izay manolotra vahaolana tsy izy: 3–31'
  - type: usfm
    marker: io1
    children:
    - type: text
      text: 'Miditra an-tsehatra i Eliho miampanga an’i Joba: 32–37'
  - type: usfm
    marker: io1
    children:
    - type: text
      text: 'Miditra an-tsehatra NY TOMPO maneho ny heriny sy ny voninahiny eo amin’ny voahary, izay mampanetry tena an’i Joba: 38–42.5'
  - type: usfm
    marker: io1
    children:
    - type: text
      text: 'Famaranana: Miverina amin’i Joba ny fanambinana: 42.6-17'
