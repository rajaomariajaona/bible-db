document_id: REV.19,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Haleloia!
  - type: text
    content: 'Rehefa afaka izany dia nahare ohatra ny feon’ny vahoaka betsaka tany an-danitra aho niteny hoe:'
  - type: text
    content: Haleloia
  - type: text
    content: '!'
  - type: text
    content: Ny famonjena sy ny voninahitra ary ny hery dia an’Andriamanitsika
  '10':
  - type: text
    content: 'Dia niankohoka teo amin’ny tongony aho mba hivavaka taminy. Kanefa hoy izy tamiko: Tandremo, aza manao izao! Fa mpanompo namanao ihany aho sady naman’ireo rahalahinao izay mitana ny fanambaràna an’i Jesosy. Andriamanitra ihany no ivavaho! Fa ny fanambaràna an’i Jesosy no fanahin’ny faminaniana.'
  - type: heading
    content: Ilay mpitaingina ny soavaly fotsy
  '11':
  - type: text
    content: 'Ary nahita ny lanitra voasokatra aho, koa indro, nisy soavaly fotsy. Izay nitaingina azy dia atao hoe Mahatoky sy Marina, ary amin’ny fahamarinana no itsarany sy iadiany. '
  '12':
  - type: text
    content: 'Ny masony dia toy ny lelafo ary tamin’ny lohany nisy diadema maro; ary Izy dia manana anarana voasoratra izay tsy misy mahafantatra afa-tsy ny tenany ihany '
  '13':
  - type: text
    content: ary miakanjo akanjo voafafy ra Izy. Ny anarany dia atao hoe ny Tenin’Andriamanitra.
  '14':
  - type: text
    content: 'Ary ny antokon’ny miaramila any an-danitra dia nanaraka Azy, samy nitaingina soavaly fotsy sy niakanjo rongony madinika sady fotsy no madio. '
  '15':
  - type: text
    content: 'Ary misy sabatra maranitra mivoaka avy amin’ny vavany mba hamelezany ny firenena; ary Izy dia hitondra azy amin’ny tehim-by; ary Izy no manitsakakitsaka ny famiazana ny divain’ny firehetan’ny fahatezeran’Andriamanitra Tsitoha. '
  '16':
  - type: text
    content: 'Ary manana anarana voasoratra amin’ny lambany sy ny feny Izy hoe: Mpanjakan’ny mpanjaka sy Tompon’ny tompo.'
  '17':
  - type: text
    content: 'Ary hitako fa indro, nisy anjely iray koa nijoro teo amin’ny masoandro, ary niantso tamin’ny feo mahery izy ka niteny tamin’ny voromanidina rehetra teo afovoan’ny habakabaka hoe: Avia ka miangòna ho amin’ny fanasana lehibe ataon’Andriamanitra '
  '18':
  - type: text
    content: mba hihinananareo ny nofon’ny mpanjaka, ny nofon’ny mpifehy arivo, ny nofon’ny mahery, ny nofon’ny soavaly mbamin’izay mitaingina azy ary ny nofon’ny olona rehetra, na olona afaka, na andevo, na kely na lehibe.
  '19':
  - type: text
    content: 'Ary hitako ilay bibidia sy ny mpanjakan’ny tany mbamin’ny miaramilany tafangona mba hiady amin’Ilay mitaingina ny soavaly sy amin’ny miaramilany. '
  '2':
  - type: text
    content: fa marina sy mahitsy ny fitsarana ataony.
  - type: text
    content: Nitsara ilay vehivavy janga lehibe Izy,
  - type: text
    content: dia ilay nandoto ny tany tamin’ny fijangajangany
  - type: text
    content: ary namaly azy noho ny ran’ny mpanompony
  - type: text
    content: izay nalatsaky ny tanany.
  '20':
  - type: text
    content: 'Ary nosamborina ilay bibidia mbamin’ny mpaminany sandoka, dia ilay nanao ny famantarana teo anatrehany, izay noentiny namitaka ny efa nandray ny mariky ny bibidia sady miankohoka eo anoloan’ny sariny. Natsipy velona ho any amin’ny farihy afo mirehitra solifara izy roa. '
  '21':
  - type: text
    content: Ary ny olona sisa dia matin’ny sabatra mivoaka avy amin’ny vavan’Ilay mitaingina ny soavaly; ary ny vorona rehetra dia voky ny nofony.
  '3':
  - type: text
    content: 'Dia niteny fanindroany ireo hoe: Haleloia!'
  - type: text
    content: Miakatra mandrakizay mandrakizay ny setroky ny tanàna!
  '4':
  - type: text
    content: 'Ary ny loholona efatra amby roapolo sy ny zavamananaina efatra dia niankohoka nivavaka tamin’Andriamanitra izay mipetraka eo ambonin’ny sezafiandrianana ka niteny hoe: '
  - type: text
    content: Amena
  - type: text
    content: '! Haleloia!'
  '5':
  - type: text
    content: 'Ary nisy feo nivoaka avy teo amin’ny sezafiandrianana niteny hoe:'
  - type: text
    content: Miderà an’Andriamanitsika
  - type: text
    content: ianareo mpanompony rehetra,
  - type: text
    content: dia ianareo izay matahotra Azy,
  - type: text
    content: na kely na lehibe!
  '6':
  - type: text
    content: 'Dia nandre feo ohatra ny feon’ny vahoaka betsaka aho, sy tahaka ny firohondrohon’ny ranobe, ary tahaka ny fikotroky ny kotrokorana mafy, niteny hoe:'
  - type: text
    content: Haleloia!
  - type: text
    content: Fa ny Tompo Andriamanitsika, dia ny Tsitoha, no nampiorina ny fanjakany.
  '7':
  - type: text
    content: Aoka isika hifaly sy hiravoravo
  - type: text
    content: ka hanome voninahitra Azy
  - type: text
    content: fa tonga ny fampakaram-badin’ny Zanak’ondry
  - type: text
    content: ka efa niomana ny vadiny.
  '8':
  - type: text
    content: Ary nasaina nitafy rongony fotsy madinika sady madio no mangatsakatsaka izy.
  - type: text
    content: Fa ny rongony fotsy madinika dia ny asa marina ataon’ny olona masina.
  '9':
  - type: text
    content: 'Hoy koa izy tamiko: Soraty: Sambatra izay nantsoina ho amin’ny fanasana fampakaram-badin’ny Zanak’ondry! Ary hoy indray izy tamiko: Ireo dia teny marin’Andriamanitra. '
