document_id: REV.19
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Haleloia!
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Rehefa afaka izany dia nahare ohatra ny feon’ny vahoaka betsaka tany an-danitra aho niteny hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: w
    children:
    - type: text
      text: Haleloia
  - type: text
    text: '!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny famonjena sy ny voninahitra ary ny hery dia an’Andriamanitsika
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: fa marina sy mahitsy ny fitsarana ataony.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nitsara ilay vehivavy janga lehibe Izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ilay nandoto ny tany tamin’ny fijangajangany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary namaly azy noho ny ran’ny mpanompony
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay nalatsaky ny tanany.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dia niteny fanindroany ireo hoe: Haleloia!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Miakatra mandrakizay mandrakizay ny setroky ny tanàna!
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary ny loholona efatra amby roapolo sy ny zavamananaina efatra dia niankohoka nivavaka tamin’Andriamanitra izay mipetraka eo ambonin’ny sezafiandrianana ka niteny hoe: '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Amena
  - type: text
    text: '! Haleloia!'
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary nisy feo nivoaka avy teo amin’ny sezafiandrianana niteny hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Miderà an’Andriamanitsika
- type: usfm
  marker: q1
  children:
  - type: text
    text: ianareo mpanompony rehetra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ianareo izay matahotra Azy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: na kely na lehibe!
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia nandre feo ohatra ny feon’ny vahoaka betsaka aho, sy tahaka ny firohondrohon’ny ranobe, ary tahaka ny fikotroky ny kotrokorana mafy, niteny hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Haleloia!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ny Tompo Andriamanitsika, dia ny Tsitoha, no nampiorina ny fanjakany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Aoka isika hifaly sy hiravoravo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hanome voninahitra Azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa tonga ny fampakaram-badin’ny Zanak’ondry
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka efa niomana ny vadiny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ary nasaina nitafy rongony fotsy madinika sady madio no mangatsakatsaka izy.
- type: usfm
  marker: m
  children:
  - type: text
    text: Fa ny rongony fotsy madinika dia ny asa marina ataon’ny olona masina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Hoy koa izy tamiko: Soraty: Sambatra izay nantsoina ho amin’ny fanasana fampakaram-badin’ny Zanak’ondry! Ary hoy indray izy tamiko: Ireo dia teny marin’Andriamanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dia niankohoka teo amin’ny tongony aho mba hivavaka taminy. Kanefa hoy izy tamiko: Tandremo, aza manao izao! Fa mpanompo namanao ihany aho sady naman’ireo rahalahinao izay mitana ny fanambaràna an’i Jesosy. Andriamanitra ihany no ivavaho! Fa ny fanambaràna an’i Jesosy no fanahin’ny faminaniana.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ilay mpitaingina ny soavaly fotsy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary nahita ny lanitra voasokatra aho, koa indro, nisy soavaly fotsy. Izay nitaingina azy dia atao hoe Mahatoky sy Marina, ary amin’ny fahamarinana no itsarany sy iadiany. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ny masony dia toy ny lelafo ary tamin’ny lohany nisy diadema maro; ary Izy dia manana anarana voasoratra izay tsy misy mahafantatra afa-tsy ny tenany ihany '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ary miakanjo akanjo voafafy ra Izy. Ny anarany dia atao hoe ny Tenin’Andriamanitra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary ny antokon’ny miaramila any an-danitra dia nanaraka Azy, samy nitaingina soavaly fotsy sy niakanjo rongony madinika sady fotsy no madio. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary misy sabatra maranitra mivoaka avy amin’ny vavany mba hamelezany ny firenena; ary Izy dia hitondra azy amin’ny tehim-by; ary Izy no manitsakakitsaka ny famiazana ny divain’ny firehetan’ny fahatezeran’Andriamanitra Tsitoha. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary manana anarana voasoratra amin’ny lambany sy ny feny Izy hoe: Mpanjakan’ny mpanjaka sy Tompon’ny tompo.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary hitako fa indro, nisy anjely iray koa nijoro teo amin’ny masoandro, ary niantso tamin’ny feo mahery izy ka niteny tamin’ny voromanidina rehetra teo afovoan’ny habakabaka hoe: Avia ka miangòna ho amin’ny fanasana lehibe ataon’Andriamanitra '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: mba hihinananareo ny nofon’ny mpanjaka, ny nofon’ny mpifehy arivo, ny nofon’ny mahery, ny nofon’ny soavaly mbamin’izay mitaingina azy ary ny nofon’ny olona rehetra, na olona afaka, na andevo, na kely na lehibe.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary hitako ilay bibidia sy ny mpanjakan’ny tany mbamin’ny miaramilany tafangona mba hiady amin’Ilay mitaingina ny soavaly sy amin’ny miaramilany. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary nosamborina ilay bibidia mbamin’ny mpaminany sandoka, dia ilay nanao ny famantarana teo anatrehany, izay noentiny namitaka ny efa nandray ny mariky ny bibidia sady miankohoka eo anoloan’ny sariny. Natsipy velona ho any amin’ny farihy afo mirehitra solifara izy roa. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ary ny olona sisa dia matin’ny sabatra mivoaka avy amin’ny vavan’Ilay mitaingina ny soavaly; ary ny vorona rehetra dia voky ny nofony.
