document_id: EZK.28,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Faminaniana ny amin’ny mpanjakan’i Tiro
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tonga tamiko ny tenin’NY TOMPO hoe:'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tahaka ny fahafatesan’ny tsy voafora no hahafatesanao amin’ny tanan’ny fahavalo. Fa Izaho no niteny, hoy NY TOMPO Andriamanitra.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary tonga tamiko ny tenin’NY TOMPO hoe:'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ry zanak’olona, manaova hira fisaonana ny amin’ny mpanjakan’i Tiro ka lazao aminy hoe: Izao no lazain’NY TOMPO Andriamanitra: Ry ilay nanao ny rafitra tonga lafatra sy fakan-tahaka, sady feno fahendrena no tena tsara tarehy, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'tany Edena, sahan’Andriamanitra, ianao; ny vatosoa rehetra, ny eloelo teo amboninao, dia ny karneola, ny topaza, ny oniksa, ny krizolita, ny berila, ny jaspy, ny safira, ny robisy, ny emeraoda ary ny volamena izay nandravaka ny ampongatapakao sy ny sodinao, tamin’ny andro namoronana anao dia natao koa ireo. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ianao dia '
    - type: usfm
      marker: w
      children:
      - type: text
        text: kerobima
    - type: text
      text: ' voahosotra izay manaloka, fa voatendriko ianao; tao an-tendrombohitra masin’Andriamanitra ianao; teo amin’ny vato mirehitra no nitsangantsangananao. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsy nanan-tsiny ianao tamin’ny nalehanao, hatramin’ny andro namoronana anao ka mandra-pahita heloka tao aminao. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Noho ny habetsahan’ny varotra nataonao dia nofenoina loza tao aminao ka nanota ianao; dia nolotoiko ianao ka nariako niala tamin’ny tendrombohitr’Andriamanitra. Nosimbako ianao, ry kerobima manaloka, ka tsy eo amin’ny vato mirehitra intsony. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Niavonavona ny fonao noho ny hatsaran-tarehinao; nosimbanao ny fahendrenao mbamin’ny famirapiratanao; nazerako eny amin’ny tany ianao sady natolotro ho fitalanjonan’ireo mpanjaka. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Noho ny haben’ny helokao tamin’ny tsy fahamarinan’ny varotrao dia voalotonao ny fitoeranao masina; koa izany no hamoahako afo avy ao aminao handevona anao, ary hataoko tonga lavenona eny ambonin’ny tany ianao eo imason’izay rehetra mijery anao. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny firenena rehetra izay mahalala anao dia ho gaga anao; ho tonga zava-mahatahotra ianao ary tsy hisy intsony mandrakizay!
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Faminaniana ny amin’i Sidona
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ry '
    - type: usfm
      marker: w
      children:
      - type: text
        text: zanak’olona
    - type: text
      text: ', lazao amin’ny mpanapaka an’i Tiro hoe: Izao no lazain’NY TOMPO Andriamanitra: Satria miavonavona ny fonao ka hoy ianao hoe: Mba andriamanitra koa aho; eto amin’ny fitoeran’ny andriamanitra no ipetrahako, eto ampovoan’ny ranomasina! Nefa olona ihany ianao fa tsy andriamanitra tsinona. Na dia noheverinao ho toy ny fon’ny andriamanitra aza ny fonao, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tonga tamiko ny tenin’NY TOMPO hoe:'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ry '
    - type: usfm
      marker: w
      children:
      - type: text
        text: zanak’olona
    - type: text
      text: ', manandrifia an’i Sidona, dia maminania ny hamelezana azy '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ka lazao hoe: Izao no lazain’NY TOMPO Andriamanitra: Indro, hamely anao Aho, ry Sidona! Ary hankalazaina ao ampovoanao Aho; dia ho fantatra fa Izaho no TOMPO, rehefa manatanteraka ny fitsarana azy Aho ka miseho ho masina amin’ny ataoko aminy. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa hahatonga areti-mandringana hamely azy Aho ary ra eny an-dalambeny; hiampatrampatra eny aminy ny voatrabaky ny sabatra izay mamely avy eny rehetra eny; dia ho fantatra fa Izaho no TOMPO.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Handry fehizay ny Israely
    marker-yv: yv-h
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary tsy hisy roy mampangirifiry na tsilo mampanaintaina intsony ho an’ny taranak’Israely, avy amin’ireo manodidina azy, izay manao tsinontsinona azy; dia ho fantatra fa Izaho no TOMPO Andriamanitra.
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao no lazain’NY TOMPO Andriamanitra:'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa angoniko avy any amin’ny firenena izay nampielezana azy ny taranak’Israely dia hiseho ho masina eo imason’ny firenena Aho amin’ny ataoko aminy ka honina any amin’ny taniny izay nomeko an’i Jakoba mpanompoko izy. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia handry fehizay any izy ka hanorina trano sy hanao tanim-boaloboka; eny, handry fehizay izy amin’ny anatanterahako ny fitsarana ireo rehetra manodidina azy izay manao tsinontsinona azy; dia ho fantatra fa Izaho no TOMPO Andriamaniny.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hay! Hendry noho i Daniela ianao! Tsy misy zavamiafina azo afenina aminao! '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny fahendrenao sy ny fahalalanao no nahazoanao harena. Eny, izany no nahazoanao volamena sy volafotsy ho ao amin’ny trano fitahirizanao. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny haben’ny fahendrenao tamin’ny varotrao no nampitomboanao ny harenanao ka miavonavona ny fonao noho ny harenanao. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa indro, izao no lazain’NY TOMPO Andriamanitra: Satria efa noheverinao ho toy ny fon’andriamanitra ny fonao, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia indro, hitondra olona hafa firenena hamely anao Aho, dia izay masiaka indrindra amin’ny firenena, koa hotsoahany ny sabany hamelezany ny fahendrenao tsara, ary hataony matroka ny famirapiratanao. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Havariny ho any an-davaka ianao ka ho faty toy ny fahafatesan’izay voatrabaka ao amin’ny ranomasina. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moa mbola hitompo teny fantatra va ianao eo imason’izay mamono anao hoe: Mba andriamanitra koa aho? Nefa olona ihany ianao, fa tsy andriamanitra tsinona, rehefa eo an-tanan’izay manatrabaka anao '
