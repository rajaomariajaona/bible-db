document_id: ISA.44,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Aza matahotra, ry Israely
  - type: text
    content: Mihainoa ankehitriny, ry Jakoba mpanompoko
  - type: text
    content: sy ry Israely izay nofidiko.
  '10':
  - type: text
    content: Iza no namorona andriamanitra,
  - type: text
    content: na nanao sarin-javatra voarendrika
  - type: text
    content: izay tsy mahasoa akory?
  '11':
  - type: text
    content: Indro, ho menatra ny namany rehetra;
  - type: text
    content: fa ny mpahay taozavatra nanao ireny dia olona ihany;
  - type: text
    content: aoka hivory izy rehetra
  - type: text
    content: ka handroso;
  - type: text
    content: aoka ho raiki-tahotra sy ho menatra avokoa izy.
  '12':
  - type: text
    content: Ny mpanefy vy dia mandoro ny fiasany
  - type: text
    content: tahaka ny famaky ao anaty vainafo
  - type: text
    content: ary manamboatra azy amin’ny maritoa;
  - type: text
    content: miasa azy amin’ny sandriny matanjaka izy;
  - type: text
    content: nefa noana izy
  - type: text
    content: ka ketraka ny heriny;
  - type: text
    content: tsy misotro rano izy
  - type: text
    content: ka reraka.
  '13':
  - type: text
    content: Ny mpandrafitra dia manenjana ny kofehy
  - type: text
    content: sy manamarika azy amin’ny fanoratana;
  - type: text
    content: manamboatra azy amin’ny vankona izy,
  - type: text
    content: ary manamarika azy amin’ny fanoritam-paribolana;
  - type: text
    content: mahavita azy ho tahaka ny endrik’olona izy,
  - type: text
    content: tahaka ny hatsaran-tarehin’ny olona,
  - type: text
    content: mba hampitoerina ao an-trano.
  '14':
  - type: text
    content: Mikapa hazo sedera izy
  - type: text
    content: ary maka hazo kipreso sy hazo oaka
  - type: text
    content: izay efa nitombo tany an’ala;
  - type: text
    content: mamboly hazo kesika izy
  - type: text
    content: ka ampanirin’ny ranonorana izany;
  '15':
  - type: text
    content: Fanaovan’ny olona kitay izany
  - type: text
    content: ary analany hamindroany.
  - type: text
    content: Ampirehetiny izany mba hanendasany mofo
  - type: text
    content: sady anaovany andriamanitra
  - type: text
    content: ka ivavahany;
  - type: text
    content: eny, anaovany sarin-javatra voasokitra koa izany
  - type: text
    content: ka iankohofany.
  '16':
  - type: text
    content: Ny antsasany amin’ilay hazo dia dorany amin’ny afo
  - type: text
    content: ka amin’io antsasany io no ahandroany ny hena hohaniny;
  - type: text
    content: manatsatsika hena izy ka voky;
  - type: text
    content: 'eny, mamindro izy ka miteny hoe: Aha!'
  - type: text
    content: Mafana aho izany, nahita afo aho!
  '17':
  - type: text
    content: Ny hazo sisa kosa dia amboariny ho andriamanitra, ho sarin-javatra voasokitra,
  - type: text
    content: dia miondrika sy miankohoka eo anatrehany izy
  - type: text
    content: 'ka mivavaka aminy hoe:'
  - type: text
    content: Vonjeo aho, fa andriamanitro ianao!
  '18':
  - type: text
    content: Tsy mahalala na mahafantatra ireny;
  - type: text
    content: fa voatampina ny masony
  - type: text
    content: ka tsy mahita,
  - type: text
    content: toy izany koa ny fony
  - type: text
    content: ka tsy mahalala.
  '19':
  - type: text
    content: Tsy mieritreritra izy
  - type: text
    content: na mba manana fahalalana
  - type: text
    content: 'sy saina akory hitenenana hoe:'
  - type: text
    content: Nodorako tamin’ny afo ny antsasany;
  - type: text
    content: 'eny, nanendy mofo tamin’ny vainafony aho:'
  - type: text
    content: nanatsatsika hena aho dia nihinana;
  - type: text
    content: koa ny sisa dia hataoko fahavetavetana!
  - type: text
    content: Hiankohoka eo anatrehan’ny vatan-kazo aho!
  '2':
  - type: text
    content: Izao no lazain’NY TOMPO izay namorona anao,
  - type: text
    content: sy namolavola anao hatrany am-bohoka
  - type: text
    content: 'sady mamonjy anao:'
  - type: text
    content: Aza matahotra,
  - type: text
    content: ry Jakoba mpanompoko,
  - type: text
    content: ary ianao, ry Jesoròna
  - type: note
    content: Jereo Deo 32.15.
  - type: text
    content: ' izay nofidiko;'
  '20':
  - type: text
    content: Homan-davenona izy;
  - type: text
    content: voafitaka ny fony ka nampivily azy,
  - type: text
    content: tsy mahavonjy azy izy
  - type: text
    content: 'na mahalaza hoe:'
  - type: text
    content: Moa tsy lainga va no eto an-tanako havanana?
  - type: heading
    content: Tompon’ny tantara ny Mpahary izao rehetra izao
  '21':
  - type: text
    content: Tsarovy izany, ry Jakoba,
  - type: text
    content: dia ianao ry Israely, fa mpanompoko ianao;
  - type: text
    content: noforoniko ianao ka mpanompoko;
  - type: text
    content: tsy hohadinoiko ianao, ry Israely ô.
  '22':
  - type: text
    content: Efa nandevona ny fahadisoanao tahaka ny fandevona ny zavona Aho,
  - type: text
    content: ary ny fahotanao tahaka ny rahona;
  - type: text
    content: koa miverena Amiko fa efa nanavotra anao Aho.
  '23':
  - type: text
    content: Mihobia, ry lanitra,
  - type: text
    content: fa NY TOMPO no nanao izany!
  - type: text
    content: Manaova feo fifaliana ianareo, ry toerana lalina any ambanin’ny tany!
  - type: text
    content: Velomy ny hoby, ry tendrombohitra!
  - type: text
    content: Ary ianao ry ala mbamin’izay hazo rehetra ao!
  - type: text
    content: Fa NY TOMPO efa nanavotra an’i Jakoba
  - type: text
    content: sady mampiseho ny voninahiny eo amin’Israely.
  '24':
  - type: text
    content: Izao no lazain’NY TOMPO, izay nanavotra anao
  - type: text
    content: 'sady namolavola anao hatrany am-bohoka:'
  - type: text
    content: Izaho no TOMPO izay manao ny zavatra rehetra,
  - type: text
    content: Izaho irery no manenjana ny lanitra;
  - type: text
    content: ny tenako ihany no mamelatra ny tany;
  '25':
  - type: text
    content: Manafoana ny fambara lazain’ny mpibedibedy Aho
  - type: text
    content: ary mahavery saina ny mpisikidy;
  - type: text
    content: mampihemotra ny olon-kendry Aho
  - type: text
    content: ka mampody ny fahalalany ho fahadalana.
  '26':
  - type: text
    content: Mahatò ny tenin’ny mpanompoko Aho
  - type: text
    content: ary manatanteraka ny saina atolotry ny irako.
  - type: text
    content: 'Miteny amin’i Jerosalema Aho hoe:'
  - type: text
    content: Honenana ianao,
  - type: text
    content: 'ary amin’ireo tanànan’i Joda hoe: Hatsangana ianareo'
  - type: text
    content: ka hamboariko izay rava.
  '27':
  - type: text
    content: 'Milaza amin’ny rano lalina Aho hoe:'
  - type: text
    content: Aoka ho maina ianao;
  - type: text
    content: hataoko tankina ny oninao.
  '28':
  - type: text
    content: 'Ary milaza an’i Kirosy Aho hoe: Izy no mpiandry ondriko!'
  - type: text
    content: Koa izay sitrako rehetra dia hotanterahiny;
  - type: text
    content: 'ary hiteny amin’i Jerosalema izy hoe:'
  - type: text
    content: Hatsangana ianao!
  - type: text
    content: 'Ary amin’ny tempoly hoe:'
  - type: text
    content: Haorina indray ianao.
  '3':
  - type: text
    content: fa handatsaka rano amin’izay mangetaheta Aho
  - type: text
    content: ary handefa riaka ho amin’izay tany karankaina;
  - type: text
    content: eny, handrotsaka ny Fanahiko amin’ny taranakao Aho
  - type: text
    content: ary ny fitahiako ho amin’ny naterakao.
  '4':
  - type: text
    content: Dia haniry eny afovoan’ny ahitra ireny,
  - type: text
    content: tahaka ny hazomalahelo eny anilan’ny rano mandeha.
  '5':
  - type: text
    content: 'Ny iray dia hilaza hoe: An’NY TOMPO aho!'
  - type: text
    content: Ary ny iray dia hiantso ny anaran’i Jakoba.
  - type: text
    content: Ary ny iray koa dia hanoratra eo amin’ny tanany hoe An’NY TOMPO,
  - type: text
    content: ary hotononiny amim-panajana ny anarana hoe Israely.
  - type: heading
    content: Ireo izay manao sarin-javatra voasokitra
  '6':
  - type: text
    content: Izao no lazain’NY TOMPO, Mpanjakan’ny Israely,
  - type: text
    content: Mpanavotra azy,
  - type: text
    content: 'dia Andriamanitra, Tompon’izao rehetra izao:'
  - type: text
    content: Izaho no voalohany ary Izaho no farany,
  - type: text
    content: koa tsy misy Andriamanitra afa-tsy Izaho.
  '7':
  - type: text
    content: Ary iza moa no tahaka Ahy? Aoka izy hiteny mafy!
  - type: text
    content: Aoka izy hanambara sy handahatra Amiko izay niseho
  - type: text
    content: hatrizay nampitoerako ny firenena fony fahagola!
  - type: text
    content: Ary aoka hambarany koa
  - type: text
    content: izay zavatra ho avy sy mbola ho tonga.
  '8':
  - type: text
    content: Aza matahotra na mangovitra ianareo;
  - type: text
    content: tsy efa nampandre anareo hatramin’ny fahiny va Aho ka nanambara taminareo?
  - type: text
    content: Eny, ianareo no vavolombeloko.
  - type: text
    content: Moa misy Andriamanitra afa-tsy Izaho va?
  - type: text
    content: Tsia, tsy misy Vatolampy,
  - type: text
    content: tsy mahafantatra Aho.
  '9':
  - type: text
    content: Izay mamorona sarin-javatra voasokitra dia zava-poana avokoa;
  - type: text
    content: tsy mahasoa akory ny zavatra tiany indrindra;
  - type: text
    content: ireny no vavolombelony,
  - type: text
    content: sady tsy mahita ireny
  - type: text
    content: no tsy mahalala,
  - type: text
    content: koa hitsanga-menatra noho izany izy.
