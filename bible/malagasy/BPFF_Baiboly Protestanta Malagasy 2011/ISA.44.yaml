document_id: ISA.44
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Aza matahotra, ry Israely
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Mihainoa ankehitriny, ry Jakoba mpanompoko
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ry Israely izay nofidiko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Izao no lazain’NY TOMPO izay namorona anao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy namolavola anao hatrany am-bohoka
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'sady mamonjy anao:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aza matahotra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ry Jakoba mpanompoko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ianao, ry Jesoròna
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '44.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Deo 32.15.
    marker-yv: yv-n
  - type: text
    text: ' izay nofidiko;'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: fa handatsaka rano amin’izay mangetaheta Aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary handefa riaka ho amin’izay tany karankaina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, handrotsaka ny Fanahiko amin’ny taranakao Aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny fitahiako ho amin’ny naterakao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Dia haniry eny afovoan’ny ahitra ireny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tahaka ny hazomalahelo eny anilan’ny rano mandeha.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ny iray dia hilaza hoe: An’NY TOMPO aho!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny iray dia hiantso ny anaran’i Jakoba.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny iray koa dia hanoratra eo amin’ny tanany hoe An’NY TOMPO,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hotononiny amim-panajana ny anarana hoe Israely.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ireo izay manao sarin-javatra voasokitra
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Izao no lazain’NY TOMPO, Mpanjakan’ny Israely,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mpanavotra azy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'dia Andriamanitra, Tompon’izao rehetra izao:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izaho no voalohany ary Izaho no farany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: koa tsy misy Andriamanitra afa-tsy Izaho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ary iza moa no tahaka Ahy? Aoka izy hiteny mafy!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aoka izy hanambara sy handahatra Amiko izay niseho
- type: usfm
  marker: q1
  children:
  - type: text
    text: hatrizay nampitoerako ny firenena fony fahagola!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary aoka hambarany koa
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay zavatra ho avy sy mbola ho tonga.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Aza matahotra na mangovitra ianareo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy efa nampandre anareo hatramin’ny fahiny va Aho ka nanambara taminareo?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, ianareo no vavolombeloko.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Moa misy Andriamanitra afa-tsy Izaho va?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsia, tsy misy Vatolampy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy mahafantatra Aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Izay mamorona sarin-javatra voasokitra dia zava-poana avokoa;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy mahasoa akory ny zavatra tiany indrindra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ireny no vavolombelony,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady tsy mahita ireny
- type: usfm
  marker: q1
  children:
  - type: text
    text: no tsy mahalala,
- type: usfm
  marker: q1
  children:
  - type: text
    text: koa hitsanga-menatra noho izany izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Iza no namorona andriamanitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: na nanao sarin-javatra voarendrika
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay tsy mahasoa akory?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Indro, ho menatra ny namany rehetra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny mpahay taozavatra nanao ireny dia olona ihany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: aoka hivory izy rehetra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka handroso;
- type: usfm
  marker: q1
  children:
  - type: text
    text: aoka ho raiki-tahotra sy ho menatra avokoa izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ny mpanefy vy dia mandoro ny fiasany
- type: usfm
  marker: q1
  children:
  - type: text
    text: tahaka ny famaky ao anaty vainafo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary manamboatra azy amin’ny maritoa;
- type: usfm
  marker: q1
  children:
  - type: text
    text: miasa azy amin’ny sandriny matanjaka izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa noana izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka ketraka ny heriny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy misotro rano izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka reraka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ny mpandrafitra dia manenjana ny kofehy
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy manamarika azy amin’ny fanoratana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: manamboatra azy amin’ny vankona izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary manamarika azy amin’ny fanoritam-paribolana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mahavita azy ho tahaka ny endrik’olona izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tahaka ny hatsaran-tarehin’ny olona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hampitoerina ao an-trano.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Mikapa hazo sedera izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary maka hazo kipreso sy hazo oaka
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay efa nitombo tany an’ala;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mamboly hazo kesika izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka ampanirin’ny ranonorana izany;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Fanaovan’ny olona kitay izany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary analany hamindroany.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ampirehetiny izany mba hanendasany mofo
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady anaovany andriamanitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka ivavahany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, anaovany sarin-javatra voasokitra koa izany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka iankohofany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ny antsasany amin’ilay hazo dia dorany amin’ny afo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka amin’io antsasany io no ahandroany ny hena hohaniny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: manatsatsika hena izy ka voky;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'eny, mamindro izy ka miteny hoe: Aha!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mafana aho izany, nahita afo aho!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ny hazo sisa kosa dia amboariny ho andriamanitra, ho sarin-javatra voasokitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia miondrika sy miankohoka eo anatrehany izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ka mivavaka aminy hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vonjeo aho, fa andriamanitro ianao!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Tsy mahalala na mahafantatra ireny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa voatampina ny masony
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy mahita,
- type: usfm
  marker: q1
  children:
  - type: text
    text: toy izany koa ny fony
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy mahalala.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Tsy mieritreritra izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: na mba manana fahalalana
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'sy saina akory hitenenana hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nodorako tamin’ny afo ny antsasany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'eny, nanendy mofo tamin’ny vainafony aho:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: nanatsatsika hena aho dia nihinana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: koa ny sisa dia hataoko fahavetavetana!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hiankohoka eo anatrehan’ny vatan-kazo aho!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Homan-davenona izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: voafitaka ny fony ka nampivily azy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy mahavonjy azy izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'na mahalaza hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Moa tsy lainga va no eto an-tanako havanana?
- type: usfm
  marker: s1
  children:
  - type: text
    text: Tompon’ny tantara ny Mpahary izao rehetra izao
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Tsarovy izany, ry Jakoba,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ianao ry Israely, fa mpanompoko ianao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: noforoniko ianao ka mpanompoko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy hohadinoiko ianao, ry Israely ô.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Efa nandevona ny fahadisoanao tahaka ny fandevona ny zavona Aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny fahotanao tahaka ny rahona;
- type: usfm
  marker: q1
  children:
  - type: text
    text: koa miverena Amiko fa efa nanavotra anao Aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Mihobia, ry lanitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa NY TOMPO no nanao izany!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Manaova feo fifaliana ianareo, ry toerana lalina any ambanin’ny tany!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Velomy ny hoby, ry tendrombohitra!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ianao ry ala mbamin’izay hazo rehetra ao!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa NY TOMPO efa nanavotra an’i Jakoba
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady mampiseho ny voninahiny eo amin’Israely.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Izao no lazain’NY TOMPO, izay nanavotra anao
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'sady namolavola anao hatrany am-bohoka:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izaho no TOMPO izay manao ny zavatra rehetra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izaho irery no manenjana ny lanitra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny tenako ihany no mamelatra ny tany;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Manafoana ny fambara lazain’ny mpibedibedy Aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mahavery saina ny mpisikidy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mampihemotra ny olon-kendry Aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka mampody ny fahalalany ho fahadalana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Mahatò ny tenin’ny mpanompoko Aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary manatanteraka ny saina atolotry ny irako.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Miteny amin’i Jerosalema Aho hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Honenana ianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ary amin’ireo tanànan’i Joda hoe: Hatsangana ianareo'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hamboariko izay rava.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Milaza amin’ny rano lalina Aho hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aoka ho maina ianao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hataoko tankina ny oninao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ary milaza an’i Kirosy Aho hoe: Izy no mpiandry ondriko!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Koa izay sitrako rehetra dia hotanterahiny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ary hiteny amin’i Jerosalema izy hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hatsangana ianao!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ary amin’ny tempoly hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Haorina indray ianao.
