document_id: JHN.3,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny resak’i Jesosy tamin’i Nikodemosy
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Nisy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Fariseo
    - type: text
      text: ' iray antsoina hoe Nikodemosy, mpanapaka teo amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jiosy
    - type: text
      text: '. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Hoy i Jesosy namaly azy: Ianao va no mpampianatra ny Israely ka tsy mahalala izany zavatra izany? '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Lazaiko aminao marina dia marina tokoa: Izay fantatray no lazainay ary izay hitanay no ambaranay; nefa ny fanambarànay tsy raisinareo. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Raha ny zavatra etỳ an-tany aza no nolazaiko taminareo ka tsy inoanareo, ahoana no hinoanareo, raha milaza aminareo ny zavatra any an-danitra Aho? '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Tsy nisy niakatra ho any an-danitra, afa-tsy ilay nidina avy tany an-danitra, dia ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Zanak’Olona
    - type: text
      text: ' izay any an-danitra.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Ary tahaka ny nanandratan’i Mosesy ny menarana tany an-tany efitra no tsy maintsy hanandratana ny Zanak’Olona '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'mba hanana fiainana mandrakizay izay rehetra mino Azy. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Fa toy izao no nitiavan’Andriamanitra izao tontolo izao: Nomeny ny Zanany Lahitokana mba tsy ho very izay rehetra mino Azy fa hanana fiainana mandrakizay. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Fa tsy naniraka ny Zanaka ho amin’izao tontolo izao Andriamanitra mba hitsara izao tontolo izao fa mba hamonjy izao tontolo izao. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Izay mino Azy dia tsy hotsaraina; fa izay tsy mino kosa dia efa voatsara rahateo satria tsy nino ny anaran’ny Zanakalahitokan’Andriamanitra izy. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Ary izao no fitsarana: Tonga eto amin’izao tontolo izao ny mazava, nefa aleon’ny olona ny maizina toy izay ny mazava satria ratsy ny asany. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Nankao amin’i Jesosy izy nony alina ka niteny Taminy hoe: Raby ô, fantatray fa mpampianatra avy amin’Andriamanitra Ianao; fa tsy misy olona mahay manao izao famantarana ataonao izao raha tsy Andriamanitra no momba azy. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Fa izay rehetra manao ny ratsy dia mankahala ny mazava sady tsy manatona ny mazava, fandrao hita miharihary ny asany. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Fa izay manao ny marina kosa dia manatona ny mazava, mba haseho ny asany, satria atao ao amin’Andriamanitra izany.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesosy sy i Jaona Mpanao batisa
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Taorianan’izany dia tonga tany amin’ny tany '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jodia
    - type: text
      text: ' Jesosy sy ny mpianany; ary niara-nitoetra taminy tao Izy sady nanao batisa.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Ary i Jaona koa dia nanao batisa tao Ainona, akaikin’i Saleima, satria be rano tao; dia nankany ny olona ka nataony batisa '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: satria tsy mbola natao tao an-tranomaizina i Jaona.
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Ary nisy nifandiran’ny mpianatr’i Jaona tamin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jiosy
    - type: text
      text: ' iray ny amin’ny fanadiovana. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Ary tonga tany amin’i Jaona ny mpianany ka nilaza taminy hoe: Raby ô, ilay tany aminao, tany andafin’i Jordana, izay nambaranao, indro manao batisa Izy, ary ny olona rehetra dia manatona Azy. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Dia hoy i Jaona hoe: Tsy misy olona mahay mandray na inona na inona, raha tsy nomena azy avy any an-danitra izany. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Ianareo no vavolombeloko, fa hoy aho: Tsy izaho no '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ', fa nirahina hialoha Azy aho. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Izay manana ny ampakarina no mpampakatra; fa ny sakaizan’ny mpampakatra, izay mitsangana sy mihaino azy, dia mifaly indrindra noho ny feon’ny mpampakatra; ary efa tanteraka izany fifaliako izany. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Hoy ny navalin’i Jesosy azy hoe: Lazaiko aminao marina dia marina tokoa: Raha tsy ateraka indray ny olona dia tsy mahazo mahita ny fanjakan’Andriamanitra.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Izy tsy maintsy mitombo fa izaho kosa dia tsy maintsy mihena.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ilay avy any ambony
    marker-yv: yv-h
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Izay avy any ambony dia ambonin’ny rehetra; ary izay avy amin’ny tany dia avy amin’ny tany, koa ny momba ny etỳ an-tany ihany no lazainy; izay avy any an-danitra dia ambonin’izy rehetra; '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'koa izay hitany sy reny no ambarany; ary tsy misy mandray ny fanambaràny. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Izay mandray ny fanambaràny dia manisy tombo-kase fa marina Andriamanitra. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Fa izay nirahin’Andriamanitra dia milaza ny teniny; satria tsy misy fetra ny fanomezan’Andriamanitra ny Fanahy. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Ny Ray tia ny Zanaka ka efa nanolotra ny zavatra rehetra ho eo an-tanany. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: Izay mino ny Zanaka no manana fiainana mandrakizay; fa izay tsy mino ny Zanaka kosa dia tsy hahita fiainana, fa ny fahatezeran’Andriamanitra no mitoetra eo aminy.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Hoy i Nikodemosy Taminy: Hataon’ny olona ahoana no hateraka rehefa lehibe? Moa mahazo miditra any an-kibon’ny reniny indray va izy ka hateraka? '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Hoy Jesosy hoe: Lazaiko aminao marina dia marina tokoa: Raha misy olona tsy ateraky ny rano sy ny Fanahy dia tsy mahazo miditra amin’ny fanjakan’Andriamanitra izy. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Izay ateraky ny nofo dia nofo, ary izay ateraky ny Fanahy dia fanahy. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Aza gaga noho ny nilazako taminao hoe: Tsy maintsy hateraka indray ianareo. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Ny rivotra dia mitsoka any amin’izay tiany, ary renao ny feony, nefa tsy fantatrao izay iaviany na izay alehany, dia tahaka izany koa izay rehetra ateraky ny Fanahy.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ary hoy i Nikodemosy: Hatao ahoana no hahatanteraka izany zavatra izany? '
