document_id: JHN.3,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny resak’i Jesosy tamin’i Nikodemosy
  - type: text
    content: 'Nisy '
  - type: text
    content: Fariseo
  - type: text
    content: ' iray antsoina hoe Nikodemosy, mpanapaka teo amin’ny '
  - type: text
    content: Jiosy
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'Hoy i Jesosy namaly azy: Ianao va no mpampianatra ny Israely ka tsy mahalala izany zavatra izany? '
  '11':
  - type: text
    content: 'Lazaiko aminao marina dia marina tokoa: Izay fantatray no lazainay ary izay hitanay no ambaranay; nefa ny fanambarànay tsy raisinareo. '
  '12':
  - type: text
    content: 'Raha ny zavatra etỳ an-tany aza no nolazaiko taminareo ka tsy inoanareo, ahoana no hinoanareo, raha milaza aminareo ny zavatra any an-danitra Aho? '
  '13':
  - type: text
    content: 'Tsy nisy niakatra ho any an-danitra, afa-tsy ilay nidina avy tany an-danitra, dia ny '
  - type: text
    content: Zanak’Olona
  - type: text
    content: ' izay any an-danitra.'
  '14':
  - type: text
    content: 'Ary tahaka ny nanandratan’i Mosesy ny menarana tany an-tany efitra no tsy maintsy hanandratana ny Zanak’Olona '
  '15':
  - type: text
    content: 'mba hanana fiainana mandrakizay izay rehetra mino Azy. '
  '16':
  - type: text
    content: 'Fa toy izao no nitiavan’Andriamanitra izao tontolo izao: Nomeny ny Zanany Lahitokana mba tsy ho very izay rehetra mino Azy fa hanana fiainana mandrakizay. '
  '17':
  - type: text
    content: 'Fa tsy naniraka ny Zanaka ho amin’izao tontolo izao Andriamanitra mba hitsara izao tontolo izao fa mba hamonjy izao tontolo izao. '
  '18':
  - type: text
    content: 'Izay mino Azy dia tsy hotsaraina; fa izay tsy mino kosa dia efa voatsara rahateo satria tsy nino ny anaran’ny Zanakalahitokan’Andriamanitra izy. '
  '19':
  - type: text
    content: 'Ary izao no fitsarana: Tonga eto amin’izao tontolo izao ny mazava, nefa aleon’ny olona ny maizina toy izay ny mazava satria ratsy ny asany. '
  '2':
  - type: text
    content: 'Nankao amin’i Jesosy izy nony alina ka niteny Taminy hoe: Raby ô, fantatray fa mpampianatra avy amin’Andriamanitra Ianao; fa tsy misy olona mahay manao izao famantarana ataonao izao raha tsy Andriamanitra no momba azy. '
  '20':
  - type: text
    content: 'Fa izay rehetra manao ny ratsy dia mankahala ny mazava sady tsy manatona ny mazava, fandrao hita miharihary ny asany. '
  '21':
  - type: text
    content: Fa izay manao ny marina kosa dia manatona ny mazava, mba haseho ny asany, satria atao ao amin’Andriamanitra izany.
  - type: heading
    content: Jesosy sy i Jaona Mpanao batisa
  '22':
  - type: text
    content: 'Taorianan’izany dia tonga tany amin’ny tany '
  - type: text
    content: Jodia
  - type: text
    content: ' Jesosy sy ny mpianany; ary niara-nitoetra taminy tao Izy sady nanao batisa.'
  '23':
  - type: text
    content: 'Ary i Jaona koa dia nanao batisa tao Ainona, akaikin’i Saleima, satria be rano tao; dia nankany ny olona ka nataony batisa '
  '24':
  - type: text
    content: satria tsy mbola natao tao an-tranomaizina i Jaona.
  '25':
  - type: text
    content: 'Ary nisy nifandiran’ny mpianatr’i Jaona tamin’ny '
  - type: text
    content: Jiosy
  - type: text
    content: ' iray ny amin’ny fanadiovana. '
  '26':
  - type: text
    content: 'Ary tonga tany amin’i Jaona ny mpianany ka nilaza taminy hoe: Raby ô, ilay tany aminao, tany andafin’i Jordana, izay nambaranao, indro manao batisa Izy, ary ny olona rehetra dia manatona Azy. '
  '27':
  - type: text
    content: 'Dia hoy i Jaona hoe: Tsy misy olona mahay mandray na inona na inona, raha tsy nomena azy avy any an-danitra izany. '
  '28':
  - type: text
    content: 'Ianareo no vavolombeloko, fa hoy aho: Tsy izaho no '
  - type: text
    content: Kristy
  - type: text
    content: ', fa nirahina hialoha Azy aho. '
  '29':
  - type: text
    content: 'Izay manana ny ampakarina no mpampakatra; fa ny sakaizan’ny mpampakatra, izay mitsangana sy mihaino azy, dia mifaly indrindra noho ny feon’ny mpampakatra; ary efa tanteraka izany fifaliako izany. '
  '3':
  - type: text
    content: 'Hoy ny navalin’i Jesosy azy hoe: Lazaiko aminao marina dia marina tokoa: Raha tsy ateraka indray ny olona dia tsy mahazo mahita ny fanjakan’Andriamanitra.'
  '30':
  - type: text
    content: Izy tsy maintsy mitombo fa izaho kosa dia tsy maintsy mihena.
  - type: heading
    content: Ilay avy any ambony
  '31':
  - type: text
    content: 'Izay avy any ambony dia ambonin’ny rehetra; ary izay avy amin’ny tany dia avy amin’ny tany, koa ny momba ny etỳ an-tany ihany no lazainy; izay avy any an-danitra dia ambonin’izy rehetra; '
  '32':
  - type: text
    content: 'koa izay hitany sy reny no ambarany; ary tsy misy mandray ny fanambaràny. '
  '33':
  - type: text
    content: 'Izay mandray ny fanambaràny dia manisy tombo-kase fa marina Andriamanitra. '
  '34':
  - type: text
    content: 'Fa izay nirahin’Andriamanitra dia milaza ny teniny; satria tsy misy fetra ny fanomezan’Andriamanitra ny Fanahy. '
  '35':
  - type: text
    content: 'Ny Ray tia ny Zanaka ka efa nanolotra ny zavatra rehetra ho eo an-tanany. '
  '36':
  - type: text
    content: Izay mino ny Zanaka no manana fiainana mandrakizay; fa izay tsy mino ny Zanaka kosa dia tsy hahita fiainana, fa ny fahatezeran’Andriamanitra no mitoetra eo aminy.
  '4':
  - type: text
    content: 'Hoy i Nikodemosy Taminy: Hataon’ny olona ahoana no hateraka rehefa lehibe? Moa mahazo miditra any an-kibon’ny reniny indray va izy ka hateraka? '
  '5':
  - type: text
    content: 'Hoy Jesosy hoe: Lazaiko aminao marina dia marina tokoa: Raha misy olona tsy ateraky ny rano sy ny Fanahy dia tsy mahazo miditra amin’ny fanjakan’Andriamanitra izy. '
  '6':
  - type: text
    content: 'Izay ateraky ny nofo dia nofo, ary izay ateraky ny Fanahy dia fanahy. '
  '7':
  - type: text
    content: 'Aza gaga noho ny nilazako taminao hoe: Tsy maintsy hateraka indray ianareo. '
  '8':
  - type: text
    content: Ny rivotra dia mitsoka any amin’izay tiany, ary renao ny feony, nefa tsy fantatrao izay iaviany na izay alehany, dia tahaka izany koa izay rehetra ateraky ny Fanahy.
  '9':
  - type: text
    content: 'Ary hoy i Nikodemosy: Hatao ahoana no hahatanteraka izany zavatra izany? '
