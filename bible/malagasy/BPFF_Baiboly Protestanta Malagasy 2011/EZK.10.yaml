    - type: text
      text: Fahitana hafa indray momba ny voninahitry NY TOMPO
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hitako fa indro, teo ambonin’ny eloelo izay teo ambonin’ny lohan’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: kerobima
    - type: text
      text: ' dia nisy tahaka ny vato safira; ary nisy zavatra tahaka ny endriky ny sezafiandrianana niseho teo amboniny. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny fijery azy efatra dia toy ny kodiarana anatin’ny kodiarana hafa. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa nandeha izy ireo dia nandeha tamin’ny hitsin’ny lafiny efatra; tsy niherika izy rehefa nandeha, fa tamin’ny hitsin’izay natrehin’ny lohany ihany no nalehany; tsy niherika izy rehefa nandeha. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Feno maso manodidina ny tenan’ny kerobima manontolo, ny lamosiny, ny tanany, ny elany ary koa ny kodiarana; izy efatra dia samy nisy kodiarana avokoa. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny amin’ny kodiarana dia reko nisy niantso azy hoe: Ry tadio!'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.13 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Mikodiadiava!
      marker-yv: yv-n
    - type: text
      text: ' '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Samy nanana tarehy efatra avy izy: Ny tarehin’ny voalohany dia nitarehin’ny kerobima, ary ny tarehin’ny faharoa dia nitarehin’olona, ny fahatelo dia nitarehin’ny liona, ary ny fahefatra nitarehim-boromahery. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary niakatra ny kerobima. Izany dia ilay zavamananaina hitako teo amoron’ny ony Kebara ihany. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa nandeha ny kerobima dia mba nandeha teo anilany koa ny kodiarana; ary rehefa nasandratry ny kerobima ny elany hiainga tsy hipaka amin’ny tany dia tsy nisaraka taminy ny kodiarana fa teo akaikiny koa. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa nijanona izy dia mba nijanona koa ireo; ary rehefa niainga izy dia mba niainga koa ireo: fa ny fanahin’ny zavamananaina no tao aminy.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Miala tao amin’ny tempoly ny voninahitry NY TOMPO
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia niala avy teo ambonin’ny tokonam-baravaran’ny Trano ny voninahitry NY TOMPO ka nijanona teo ambonin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: kerobima
    - type: text
      text: '. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nasandratry ny kerobima ny elany ka niainga tsy nipaka tamin’ny tany teo imasoko izy rehefa nivoaka, ary teo anilany ny kodiarana ary samy nijanona teo anoloan’ny vavahady atsinanana amin’ny tranon’NY TOMPO izy ireo; ary ny voninahitry ny Andriamanitry ny Israely no teo amboniny. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary niteny tamin-dRalehilahy nitafy lamba rongony fotsy Izy hoe: Midira eo anelanelan’ny kodiarana, dia eo ambanin’ny kerobima, ary fenoy vainafo avy eo anelanelan’ny kerobima ny tananao roa ka afafazo amin’ny tanàna izany! Dia niditra teo imasoko izy.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izany dia ilay zavamananaina hitako teo ambanin’ny Andriamanitry ny Israely teo amoron’ny ony Kebara; ary fantatro fa kerobima ireo. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Samy nanana tarehy efatra avy izy sady samy nanana elatra efatra avy koa; ary nisy zavatra toy ny tanan’olona teo ambanin’ny elany. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ny tarehiny dia nitovy tamin’ilay hitako teo amoron’ny ony Kebara ihany, dia ny endriny sy ny tenany. Ary ny hitsin’ny tavany no nalehany.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny kerobima dia nitsangana teo ankavanan’ny Trano rehefa niditra Ralehilahy; ary ilay rahona dia nameno ny kianja anatiny. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia niakatra niala teo amin’ny kerobima ho eo amin’ny tokonam-baravaran’ny Trano ny voninahitry ny TOMPO; ary ilay rahona dia nameno ny Trano, ary ny kianja dia feno ny famirapiratan’ny voninahitry NY TOMPO. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ny fikopakopaky ny elatry ny kerobima dia re hatrany amin’ny kianja ivelany, toy ny feon’Andriamanitra Tsitoha raha miteny Izy.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa nodidiany Ralehilahy nitafy lamba rongony fotsy hoe: Makà afo avy eo analenelan’ny kodiarana, eo anelanelan’ny kerobima, dia niditra izy ka nitsangana teo anilan’ny kodiarana. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny kerobima iray dia nanatsotra ny tanany avy teo anelanelan’ny kerobima ho eo amin’ny afo izay teo anelanelan’ny kerobima, dia nakany ka nofenoiny ny tanan-droan’ilay nitafy lamba rongony fotsy. Ary rehefa nandray izany Ralehilahy dia lasa nandeha. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary nisy zavatra toy ny tanan’olona niseho teo ambanin’ny elatry ny kerobima.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hitako fa indreo, nisy kodiarana efatra teo anilan’ny kerobima, dia kodiarana iray avy teo anilan’ny kerobima tsirairay; ny fijery ny kodiarana dia toy ny volon’ny vato krizolita. '
