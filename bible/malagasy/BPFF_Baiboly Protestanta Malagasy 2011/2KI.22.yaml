document_id: 2KI.22
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: I Josia, mpanjakan’ny Joda
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 2Tan 34.1-2
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Valo taona i Josia raha nanomboka nanjaka, ary iraika amby telopolo taona no nanjakany tany Jerosalema. Ny anaran’ny reniny dia Jedida, zanakavavin’i Adaia, avy any Bozkata. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Nanao izay mahitsy teo imason’NY TOMPO izy ka nandeha tamin’izay rehetra nalehan’i Davida rainy fa tsy mba nivily na ho amin’ny ankavanana na ho amin’ny ankavia.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Hitan’ny Mpisoronabe tao amin’ny tempoly ny bokin’ny lalàna
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 2Tan 34.8-18
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Tamin’ny taona fahavalo amby folo nanjakany dia naniraka an’i Safana mpitantsoratra, zanak’i Azalia, zanak’i Mesolama, ho any amin’ny tranon’NY TOMPO i Josia mpanjaka hilaza hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Miakara any amin’i Hilkia mpisoronabe ka asaivo manisa ny vola izay nampidirina ho ao amin’ny tranon’NY TOMPO izy, dia izay nangonin’ny mpiandry varavarana tamin’ny olona. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Aoka hatolony ho eo an-tanan’ny mpanao raharaha izay voatendry ny amin’ny tranon’NY TOMPO izany ka homen’ireo ho an’ny mpiasa izay ao amin’ny tranon’NY TOMPO hanamboarany ny simba amin’ny Trano, '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'dia ho an’ny mpandrafitra sy ny mpandatsa-bato ary ny tambato ka hividianana hazo sy vato voapaika hanamboarana ny Trano. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Kanefa tsy nampamoahina ny amin’ny vola natolotra teo an-tanany ireo fa olona nahatoky. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dia hoy i Hilkia mpisoronabe tamin’i Safana mpitantsoratra: Ny bokin’ny lalàna dia hitako tao amin’ny tranon’NY TOMPO. Dia natolotr’i Hilkia an’i Safana ilay boky ka novakiny. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary niverina ho any amin’ny mpanjaka i Safana mpitantsoratra, nitondra valiny hoe: Ny mpanomponao dia efa nandrotsaka ny vola izay azo tao amin’ny Trano ka nanolotra azy teo an-tanan’ny mpanao raharaha izay voatendry ho amin’ny tranon’NY TOMPO. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary i Safana mpitantsoratra dia nilaza koa tamin’ny mpanjaka hoe: Misy boky nomen’i Hilkia mpisorona ahy. Dia novakin’i Safana teo anatrehan’ny mpanjaka ny boky.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mandefa iraka hanontany an’i Holda mpaminanivavy i Josia
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 2Tan 34.19-28
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Rehefa ren’ny mpanjaka ny teny tao amin’ilay bokin’ny lalàna dia nandriatra ny fitafiany izy. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Dia nandidy an’i Hilkia mpisorona sy i Ahikama zanak’i Safana, i Akbora zanak’i Mikaia, i Safana mpitantsoratra ary i Asaia, mpanompon’ny mpanjaka izy hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Andeha manontany amin’NY TOMPO ho ahy sy ny vahoaka mbamin’ny Joda rehetra ny amin’ny tenin’ity boky vao hita ity, fa mafy ny fahatezeran’NY TOMPO izay mirehitra amintsika noho ny tsy nihainoan’ny razantsika ny tenin’ity boky ity ka tsy nanatanterahany izay rehetra voasoratra ho antsika.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dia nandeha i Hilkia mpisorona, i Ahikama, i Akbora, i Safana ary i Asaia ka nankany amin’i Holda mpaminanivavy, vadin’i Saloma, zanak’i Tikva, zanak’i Harasa, mpitahiry ny fitafiana, ary niresaka taminy izy ireo; fa nonina tao amin’ny faritra vaovao tany Jerosalema Ravehivavy. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Hoy Ravehivavy taminy: Izao no lazain’NY TOMPO, Andriamanitry ny Israely: Lazao amin’ny lehilahy izay naniraka anareo ho atỳ amiko hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Izao no lazain’NY TOMPO: Indro, Izaho hahatonga loza amin’ity tanàna ity sy amin’ny mponina eto, dia araka izay rehetra lazain’ny boky novakin’ny mpanjakan’ny Joda. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Satria nahafoy Ahy izy ary nandoro ditin-kazo manitra tamin’izay andriamanitra hafa ka nampahatezitra Ahy tamin’izay rehetra nataon’ny tanany, dia mirehitra amin’ity tanàna ity ny fahatezerako ka tsy ho maty vonoina. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Fa ny amin’ny mpanjakan’ny Joda kosa, izay naniraka anareo hanontany amin’NY TOMPO, dia ambarao aminy hoe: Izao no lazain’NY TOMPO, Andriamanitry ny Israely: Ny amin’ny teny izay novakinao, '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'satria nino anatra ianao ka nanetry tena teo anatrehan’NY TOMPO raha nandre izay nolazaiko ny amin’izay hanjo ity tanàna ity sy ny mponina eto, dia ny handravana azy sy ny hahatongavany ho fanozonana ka nandriatra ny fitafianao sady nitomany teo anatrehako ianao, Izaho kosa efa nihaino, hoy NY TOMPO. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Koa indro, hangoniko any amin’ny razanao ianao ary hangonina any amin’ny fasanao amin’ny fiadanana; koa ny masonao dia tsy mba hahita izay loza rehetra hoentiko mamaly ity tanàna ity. Dia nitondra valiny ho any amin’ny mpanjaka izy ireo.
