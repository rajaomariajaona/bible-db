document_id: 2KI.22,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: I Josia, mpanjakan’ny Joda
  - type: heading
    content: 2Tan 34.1-2
  - type: text
    content: 'Valo taona i Josia raha nanomboka nanjaka, ary iraika amby telopolo taona no nanjakany tany Jerosalema. Ny anaran’ny reniny dia Jedida, zanakavavin’i Adaia, avy any Bozkata. '
  '10':
  - type: text
    content: 'Ary i Safana mpitantsoratra dia nilaza koa tamin’ny mpanjaka hoe: Misy boky nomen’i Hilkia mpisorona ahy. Dia novakin’i Safana teo anatrehan’ny mpanjaka ny boky.'
  - type: heading
    content: Mandefa iraka hanontany an’i Holda mpaminanivavy i Josia
  - type: heading
    content: 2Tan 34.19-28
  '11':
  - type: text
    content: 'Rehefa ren’ny mpanjaka ny teny tao amin’ilay bokin’ny lalàna dia nandriatra ny fitafiany izy. '
  '12':
  - type: text
    content: 'Dia nandidy an’i Hilkia mpisorona sy i Ahikama zanak’i Safana, i Akbora zanak’i Mikaia, i Safana mpitantsoratra ary i Asaia, mpanompon’ny mpanjaka izy hoe: '
  '13':
  - type: text
    content: Andeha manontany amin’NY TOMPO ho ahy sy ny vahoaka mbamin’ny Joda rehetra ny amin’ny tenin’ity boky vao hita ity, fa mafy ny fahatezeran’NY TOMPO izay mirehitra amintsika noho ny tsy nihainoan’ny razantsika ny tenin’ity boky ity ka tsy nanatanterahany izay rehetra voasoratra ho antsika.
  '14':
  - type: text
    content: 'Dia nandeha i Hilkia mpisorona, i Ahikama, i Akbora, i Safana ary i Asaia ka nankany amin’i Holda mpaminanivavy, vadin’i Saloma, zanak’i Tikva, zanak’i Harasa, mpitahiry ny fitafiana, ary niresaka taminy izy ireo; fa nonina tao amin’ny faritra vaovao tany Jerosalema Ravehivavy. '
  '15':
  - type: text
    content: 'Hoy Ravehivavy taminy: Izao no lazain’NY TOMPO, Andriamanitry ny Israely: Lazao amin’ny lehilahy izay naniraka anareo ho atỳ amiko hoe: '
  '16':
  - type: text
    content: 'Izao no lazain’NY TOMPO: Indro, Izaho hahatonga loza amin’ity tanàna ity sy amin’ny mponina eto, dia araka izay rehetra lazain’ny boky novakin’ny mpanjakan’ny Joda. '
  '17':
  - type: text
    content: 'Satria nahafoy Ahy izy ary nandoro ditin-kazo manitra tamin’izay andriamanitra hafa ka nampahatezitra Ahy tamin’izay rehetra nataon’ny tanany, dia mirehitra amin’ity tanàna ity ny fahatezerako ka tsy ho maty vonoina. '
  '18':
  - type: text
    content: 'Fa ny amin’ny mpanjakan’ny Joda kosa, izay naniraka anareo hanontany amin’NY TOMPO, dia ambarao aminy hoe: Izao no lazain’NY TOMPO, Andriamanitry ny Israely: Ny amin’ny teny izay novakinao, '
  '19':
  - type: text
    content: 'satria nino anatra ianao ka nanetry tena teo anatrehan’NY TOMPO raha nandre izay nolazaiko ny amin’izay hanjo ity tanàna ity sy ny mponina eto, dia ny handravana azy sy ny hahatongavany ho fanozonana ka nandriatra ny fitafianao sady nitomany teo anatrehako ianao, Izaho kosa efa nihaino, hoy NY TOMPO. '
  '2':
  - type: text
    content: Nanao izay mahitsy teo imason’NY TOMPO izy ka nandeha tamin’izay rehetra nalehan’i Davida rainy fa tsy mba nivily na ho amin’ny ankavanana na ho amin’ny ankavia.
  - type: heading
    content: Hitan’ny Mpisoronabe tao amin’ny tempoly ny bokin’ny lalàna
  - type: heading
    content: 2Tan 34.8-18
  '20':
  - type: text
    content: Koa indro, hangoniko any amin’ny razanao ianao ary hangonina any amin’ny fasanao amin’ny fiadanana; koa ny masonao dia tsy mba hahita izay loza rehetra hoentiko mamaly ity tanàna ity. Dia nitondra valiny ho any amin’ny mpanjaka izy ireo.
  '3':
  - type: text
    content: 'Tamin’ny taona fahavalo amby folo nanjakany dia naniraka an’i Safana mpitantsoratra, zanak’i Azalia, zanak’i Mesolama, ho any amin’ny tranon’NY TOMPO i Josia mpanjaka hilaza hoe: '
  '4':
  - type: text
    content: 'Miakara any amin’i Hilkia mpisoronabe ka asaivo manisa ny vola izay nampidirina ho ao amin’ny tranon’NY TOMPO izy, dia izay nangonin’ny mpiandry varavarana tamin’ny olona. '
  '5':
  - type: text
    content: 'Aoka hatolony ho eo an-tanan’ny mpanao raharaha izay voatendry ny amin’ny tranon’NY TOMPO izany ka homen’ireo ho an’ny mpiasa izay ao amin’ny tranon’NY TOMPO hanamboarany ny simba amin’ny Trano, '
  '6':
  - type: text
    content: 'dia ho an’ny mpandrafitra sy ny mpandatsa-bato ary ny tambato ka hividianana hazo sy vato voapaika hanamboarana ny Trano. '
  '7':
  - type: text
    content: 'Kanefa tsy nampamoahina ny amin’ny vola natolotra teo an-tanany ireo fa olona nahatoky. '
  '8':
  - type: text
    content: 'Dia hoy i Hilkia mpisoronabe tamin’i Safana mpitantsoratra: Ny bokin’ny lalàna dia hitako tao amin’ny tranon’NY TOMPO. Dia natolotr’i Hilkia an’i Safana ilay boky ka novakiny. '
  '9':
  - type: text
    content: 'Ary niverina ho any amin’ny mpanjaka i Safana mpitantsoratra, nitondra valiny hoe: Ny mpanomponao dia efa nandrotsaka ny vola izay azo tao amin’ny Trano ka nanolotra azy teo an-tanan’ny mpanao raharaha izay voatendry ho amin’ny tranon’NY TOMPO. '
