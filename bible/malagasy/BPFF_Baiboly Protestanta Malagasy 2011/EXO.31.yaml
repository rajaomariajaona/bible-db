document_id: EXO.31,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ireo mpiasa hanangana ny fitoerana masina
  - type: text
    content: 'Ary NY TOMPO niteny tamin’i Mosesy indray hoe: '
  '10':
  - type: text
    content: 'ny fitafiana fitondra amin’ny fanompoana sy ny fitafiana masina ho an’i Arona mpisorona sy ny fitafian’ireo zanany hoentiny manao fisoronana, '
  '11':
  - type: text
    content: ary ny diloilo fanosorana sy ny ditin-kazo manitra ho ao amin’ny fitoerana masina. Araka izay rehetra nandidiako anao no aoka hataon’ireo.
  - type: heading
    content: Ny fitandremana ny Sabata
  '12':
  - type: text
    content: 'Ary NY TOMPO niteny tamin’i Mosesy hoe: '
  '13':
  - type: text
    content: 'Milazà amin’ny Zanak’Israely hoe: Ny Sabatako no tandremo; fa famantarana ho Amiko sy ho aminareo hatramin’ny taranakareo fara aman-dimby izany, mba ho fantatrareo fa Izaho no TOMPO izay manamasina anareo. '
  '14':
  - type: text
    content: 'Koa tandremo ny Sabata fa masina aminareo izany; izay tsy manamasina azy dia hovonoina ho faty ary izay rehetra manao raharaha amin’io andro io dia hofongorana tsy ho amin’ny fireneny. '
  '15':
  - type: text
    content: 'Henemana no hanaovana raharaha; fa ny andro fahafito dia tena fitsaharana ka masina ho an’NY TOMPO: Izay rehetra manao raharaha amin’ny andro Sabata dia hovonoina ho faty. '
  '16':
  - type: text
    content: 'Hotandreman’ny Zanak’Israely ny Sabata ka hankatoaviny hatramin’ny taranany fara aman-dimby, fa fanekena mandrakizay izany. '
  '17':
  - type: text
    content: Ho famantarana Amiko sy amin’ny Zanak’Israely mandrakizay izany, satria henemana no nanaovan’NY TOMPO ny lanitra sy ny tany dia nitsahatra Izy ka niala sasatra tamin’ny andro fahafito.
  '18':
  - type: text
    content: Rehefa vita ny teny nolazainy tamin’i Mosesy tao an-tendrombohitra Sinay dia nomeny azy ny vato fisaka roa izay nisy ny Vavolombelona, dia vato fisaka voasoratry ny rantsantanan’Andriamanitra.
  '2':
  - type: text
    content: 'Indro, efa notononiko anarana i Bezalila, zanak’i Ory, zanak’i Hora, avy amin’ny fokon’i Joda; '
  '3':
  - type: text
    content: 'ary efa nofenoiko fanahin’Andriamanitra izy, amin’ny fahendrena sy fahiratan-tsaina ary fahalalana ny amin’ny taozavatra maro samihafa, '
  '4':
  - type: text
    content: 'tahaka ny famolavolana asa kanto, ny fiasana volamena sy volafotsy ary varahina, '
  '5':
  - type: text
    content: ny fanamboarana vato halatsaka an-tranontranony ary ny fandrafetana hazo, mba hanaovany taozavatra maro samihafa.
  '6':
  - type: text
    content: 'Ary indro Aho efa nanome an’i Oholiaba, zanak’i Ahisamaka, avy amin’ny fokon’i Dana, ho namany; ary ny fon’izay manan-talenta rehetra dia efa nasiako fahendrena mba hanaovany izay rehetra efa nandidiako anao, '
  '7':
  - type: text
    content: 'dia ny '
  - type: text
    content: tranolay fihaonana
  - type: text
    content: ' sy ny vata hasiana ny Vavolombelona ary ny rakotra fanaovam-panavotana eo amboniny, ny fanaka rehetra momba ny tranolay, '
  '8':
  - type: text
    content: 'ny latabatra mbamin’ny fanaka momba azy, ny fitoeran-jiro volamena tsy misy fangarony mbamin’ny fanaka rehetra momba azy, ny alitara fandoroana ditin-kazo manitra, '
  '9':
  - type: text
    content: 'ny alitara fandoroana ny fanatitra dorana manontolo mbamin’ny fanaka rehetra momba azy ary ny koveta sy ny faladiany, '
