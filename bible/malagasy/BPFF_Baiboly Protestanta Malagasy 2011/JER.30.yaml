document_id: JER.30,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Tebiteby sy famonjena
  - type: text
    content: 'Izao no teny tonga tamin’i Jeremia avy tamin’NY TOMPO:'
  '10':
  - type: text
    content: Koa aza matahotra ianao,
  - type: text
    content: ry Jakoba mpanompoko,
  - type: text
    content: hoy NY TOMPO;
  - type: text
    content: ary aza mivadi-po, ry Israely;
  - type: text
    content: fa indro, hovonjeko avy any lavitra ianao
  - type: text
    content: ary hovonjeko avy any amin’ny tany izay nahababo azy ny taranakao;
  - type: text
    content: dia hiverina i Jakoba ka hiadana sy handry fehizay,
  - type: text
    content: ary tsy hisy olona hanaitaitra azy intsony.
  '11':
  - type: text
    content: Fa momba anao Aho
  - type: text
    content: mba hamonjy anao,
  - type: text
    content: hoy NY TOMPO;
  - type: text
    content: koa na dia levoniko aza ny firenena rehetra
  - type: text
    content: izay nampielezako anao
  - type: text
    content: dia tsy mba holevoniko kosa ianao;
  - type: text
    content: nefa kosa mba hanariko araka ny onony ihany ianao,
  - type: text
    content: fa tsy dia havelako fotsiny amin’izao.
  - type: heading
    content: Faharatrana sy fanasitranana
  '12':
  - type: text
    content: 'Fa izao no lazain’NY TOMPO:'
  - type: text
    content: Tsy misy fanafodiny ny faharatranao
  - type: text
    content: ary tsy azo sitranina ny ferinao.
  '13':
  - type: text
    content: Tsy misy miaro anao amin’izay mahazo anao; tsy misy famehezana hitsaboana ny ferinao;
  - type: text
    content: ary tsy misy fanafody hanasitranana anao.
  '14':
  - type: text
    content: Ireo tia anao dia efa nanadino anao avokoa,
  - type: text
    content: tsy mba notadiaviny ianao;
  - type: text
    content: fa famelin’ny fahavalo no namelezako anao,
  - type: text
    content: dia ny famaizana tsy mitsitsy,
  - type: text
    content: noho ny habetsahan’ny helokao
  - type: text
    content: sy ny hamaroan’ny fahotanao.
  '15':
  - type: text
    content: Nahoana ianao no mitaraina noho ny faharatranao
  - type: text
    content: sy noho ny fanaintainanao izay tsy azo atsahatra?
  - type: text
    content: Fa noho ny habetsahan’ny helokao
  - type: text
    content: sy ny hamaroan’ny fahotanao
  - type: text
    content: no nanaovako izany taminao.
  '16':
  - type: text
    content: Koa izay rehetra mihinana anao dia mba hohanina,
  - type: text
    content: ary izay rehetra mampahory anao dia ho lasan-ko babo;
  - type: text
    content: izay mamabo anao dia hobaboina
  - type: text
    content: ary izay rehetra mandroba anao dia hatolotro horobaina.
  '17':
  - type: text
    content: Fa hotanterahiko ny fanasitranana anao,
  - type: text
    content: eny, hositraniko ny faharatranao,
  - type: text
    content: hoy NY TOMPO.
  - type: heading
    content: Havaozin’Andriamanitra ny vahoakany
  - type: text
    content: 'Noho ny nitenenany anao hoe: Ilay noroahina, sy hoe: I '
  - type: text
    content: Ziona
  - type: text
    content: tsy misy mpitady ity,
  '18':
  - type: text
    content: 'dia izao no lazain’NY TOMPO:'
  - type: text
    content: Indro, haveriko amin’ny laoniny ny tranolain’i Jakoba,
  - type: text
    content: ary ny fonenany dia hamindrako fo;
  - type: text
    content: koa ny tanàna dia haorina eo amin’ny havoanany,
  - type: text
    content: ary ny lapan’ny mpanjaka dia haorina indray eo amin’izay toerany marina.
  '19':
  - type: text
    content: Ary hisy fisaorana sy feon’ny mifaly avy ao aminy;
  - type: text
    content: dia hahamaro azy Aho
  - type: text
    content: ka tsy hihena ny isany,
  - type: text
    content: sady hanome voninahitra azy Aho
  - type: text
    content: ka tsy hambaniana izy.
  '2':
  - type: text
    content: 'Izao no lazain’NY TOMPO, Andriamanitry ny Israely: Soratinao amin’ny boky ny teny rehetra izay nolazaiko taminao. '
  '20':
  - type: text
    content: Ny zanany koa dia ho tahaka ny tany aloha,
  - type: text
    content: ny fiangonany dia hampitoerina eo anatrehako
  - type: text
    content: ary hovaliko izay rehetra mampahory azy.
  '21':
  - type: text
    content: Ary ny lehibeny dia ho avy ao aminy ihany,
  - type: text
    content: ny mpanapaka azy koa dia ho avy ao aminy ihany;
  - type: text
    content: hampanakaiky azy Aho
  - type: text
    content: ka hanatona Ahy izy,
  - type: text
    content: fa iza moa no sahy hanao ny ainy ho antoka
  - type: text
    content: ka hanatona Ahy?
  - type: text
    content: Hoy NY TOMPO.
  '22':
  - type: text
    content: Ho oloko ianareo
  - type: text
    content: ary Izaho ho Andriamanitrareo.
  - type: heading
    content: Ny tadion’NY TOMPO
  '23':
  - type: text
    content: E! Ny tadion’NY TOMPO!
  - type: text
    content: Mivoaka ny fahatezerana
  - type: text
    content: sy ny tadio mitambolimbolina
  - type: text
    content: ka miantonta amin’ny lohan’ny ratsy fanahy.
  '24':
  - type: text
    content: Ny firehetan’ny fahatezeran’NY TOMPO dia tsy hitsahatra
  - type: text
    content: raha tsy efany sy tanterany
  - type: text
    content: ny hevitry ny fony;
  - type: text
    content: mbola ho fantatrareo any am-parany ny amin’izany.
  '3':
  - type: text
    content: Fa indro, avy ny andro, hoy NY TOMPO, izay hampodiko ny oloko, dia ny Israely sy ny Joda, avy amin’ny fahababoany, hoy NY TOMPO; eny, hampody azy ho amin’ny tany izay nomeko ny razany Aho, dia ho azy izany.
  '4':
  - type: text
    content: Ary izao no teny izay nolazain’NY TOMPO ny amin’ny Israely sy ny Joda,
  '5':
  - type: text
    content: 'eny, izao no lazain’NY TOMPO:'
  - type: text
    content: Feo mampangovitra no renay;
  - type: text
    content: tahotra no misy fa tsy fiadanana.
  '6':
  - type: text
    content: Anontanionareo ka jereo, raha mba misy lehilahy mihetsi-jaza;
  - type: text
    content: koa nahoana no samy hitako manery ny andilany amin’ny tanany avy ny lehilahy rehetra,
  - type: text
    content: ohatra ilay efa mihetsi-jaza iny,
  - type: text
    content: sady ny tarehy rehetra dia efa tonga hatsatra avokoa?
  '7':
  - type: text
    content: Indrisy! Lehibe izany andro izany
  - type: text
    content: ka tsy misy tahaka azy;
  - type: text
    content: andro fahoriana ho an’i Jakoba izany,
  - type: text
    content: nefa ho voavonjy ho afaka amin’izany ihany izy.
  '8':
  - type: text
    content: 'Fa amin’izany andro izany, hoy Andriamanitra, Tompon’izao rehetra izao, dia hotapahiko ny ziogany ho afaka amin’ny vozonao, hotapahiko koa ny kofehy namatorana anao, ary tsy hampanompo anao intsony ny firenena hafa; '
  '9':
  - type: text
    content: fa hanompo NY TOMPO Andriamaniny sy i Davida mpanjakany izay hatsangako ho azy izy.
