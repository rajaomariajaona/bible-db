document_id: JER.30
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Tebiteby sy famonjena
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Izao no teny tonga tamin’i Jeremia avy tamin’NY TOMPO:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Izao no lazain’NY TOMPO, Andriamanitry ny Israely: Soratinao amin’ny boky ny teny rehetra izay nolazaiko taminao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Fa indro, avy ny andro, hoy NY TOMPO, izay hampodiko ny oloko, dia ny Israely sy ny Joda, avy amin’ny fahababoany, hoy NY TOMPO; eny, hampody azy ho amin’ny tany izay nomeko ny razany Aho, dia ho azy izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ary izao no teny izay nolazain’NY TOMPO ny amin’ny Israely sy ny Joda,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'eny, izao no lazain’NY TOMPO:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Feo mampangovitra no renay;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tahotra no misy fa tsy fiadanana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Anontanionareo ka jereo, raha mba misy lehilahy mihetsi-jaza;
- type: usfm
  marker: q1
  children:
  - type: text
    text: koa nahoana no samy hitako manery ny andilany amin’ny tanany avy ny lehilahy rehetra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ohatra ilay efa mihetsi-jaza iny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady ny tarehy rehetra dia efa tonga hatsatra avokoa?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Indrisy! Lehibe izany andro izany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy misy tahaka azy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: andro fahoriana ho an’i Jakoba izany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa ho voavonjy ho afaka amin’izany ihany izy.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Fa amin’izany andro izany, hoy Andriamanitra, Tompon’izao rehetra izao, dia hotapahiko ny ziogany ho afaka amin’ny vozonao, hotapahiko koa ny kofehy namatorana anao, ary tsy hampanompo anao intsony ny firenena hafa; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: fa hanompo NY TOMPO Andriamaniny sy i Davida mpanjakany izay hatsangako ho azy izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Koa aza matahotra ianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ry Jakoba mpanompoko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hoy NY TOMPO;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary aza mivadi-po, ry Israely;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa indro, hovonjeko avy any lavitra ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hovonjeko avy any amin’ny tany izay nahababo azy ny taranakao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hiverina i Jakoba ka hiadana sy handry fehizay,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy hisy olona hanaitaitra azy intsony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Fa momba anao Aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hamonjy anao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hoy NY TOMPO;
- type: usfm
  marker: q1
  children:
  - type: text
    text: koa na dia levoniko aza ny firenena rehetra
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay nampielezako anao
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia tsy mba holevoniko kosa ianao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa kosa mba hanariko araka ny onony ihany ianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa tsy dia havelako fotsiny amin’izao.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Faharatrana sy fanasitranana
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Fa izao no lazain’NY TOMPO:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy misy fanafodiny ny faharatranao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy azo sitranina ny ferinao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Tsy misy miaro anao amin’izay mahazo anao; tsy misy famehezana hitsaboana ny ferinao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy misy fanafody hanasitranana anao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ireo tia anao dia efa nanadino anao avokoa,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy mba notadiaviny ianao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa famelin’ny fahavalo no namelezako anao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ny famaizana tsy mitsitsy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: noho ny habetsahan’ny helokao
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny hamaroan’ny fahotanao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Nahoana ianao no mitaraina noho ny faharatranao
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy noho ny fanaintainanao izay tsy azo atsahatra?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa noho ny habetsahan’ny helokao
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny hamaroan’ny fahotanao
- type: usfm
  marker: q1
  children:
  - type: text
    text: no nanaovako izany taminao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Koa izay rehetra mihinana anao dia mba hohanina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary izay rehetra mampahory anao dia ho lasan-ko babo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay mamabo anao dia hobaboina
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary izay rehetra mandroba anao dia hatolotro horobaina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Fa hotanterahiko ny fanasitranana anao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, hositraniko ny faharatranao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hoy NY TOMPO.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Havaozin’Andriamanitra ny vahoakany
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Noho ny nitenenany anao hoe: Ilay noroahina, sy hoe: I '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Ziona
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy misy mpitady ity,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'dia izao no lazain’NY TOMPO:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Indro, haveriko amin’ny laoniny ny tranolain’i Jakoba,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny fonenany dia hamindrako fo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: koa ny tanàna dia haorina eo amin’ny havoanany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny lapan’ny mpanjaka dia haorina indray eo amin’izay toerany marina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ary hisy fisaorana sy feon’ny mifaly avy ao aminy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hahamaro azy Aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy hihena ny isany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady hanome voninahitra azy Aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy hambaniana izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ny zanany koa dia ho tahaka ny tany aloha,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny fiangonany dia hampitoerina eo anatrehako
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hovaliko izay rehetra mampahory azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ary ny lehibeny dia ho avy ao aminy ihany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny mpanapaka azy koa dia ho avy ao aminy ihany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hampanakaiky azy Aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hanatona Ahy izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa iza moa no sahy hanao ny ainy ho antoka
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hanatona Ahy?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hoy NY TOMPO.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ho oloko ianareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary Izaho ho Andriamanitrareo.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny tadion’NY TOMPO
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: E! Ny tadion’NY TOMPO!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mivoaka ny fahatezerana
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny tadio mitambolimbolina
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka miantonta amin’ny lohan’ny ratsy fanahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Ny firehetan’ny fahatezeran’NY TOMPO dia tsy hitsahatra
- type: usfm
  marker: q1
  children:
  - type: text
    text: raha tsy efany sy tanterany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny hevitry ny fony;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mbola ho fantatrareo any am-parany ny amin’izany.
