document_id: LEV.3
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fanati-pihavanana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Raha fanati-pihavanana no atolony, ka ombilahy na ombivavy no atolony, dia izay tsy misy kilema no hatolony eo anatrehan’NY TOMPO. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Hametraka ny tanany eo amin’ny lohan’ny fanatiny izy dia hamono azy eo anoloan’ny varavaran’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tranolay fihaonana
  - type: text
    text: '; ary ireo mpisorona, zanak’i Arona, dia hamafy ra manodidina ny alitara. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dia hakan’ny mpisorona ny fanati-pihavanana ka hateriny ho fanatitra levonina amin’ny afo ho an’NY TOMPO, dia ny jabora mandrakotra ny taovany rehetra sy ny jaboran-tsinainy, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'ny voany roa, ny jabora mandrakotra azy, izay rehetra eo amin’ny takibany ary ny ila atiny lehibe. Hataony indray manala amin’ny voany no fanalany izany. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ary ireo zanak’i Arona dia handoro an’ireo ho fofona eo ambonin’ny alitara miaraka amin’ny fanatitra dorana manontolo izay eo ambonin’ny kitay eo amin’ny afo. Fanatitra levonina amin’ny afo ho hanitra ankasitrahana ho an’NY TOMPO izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Raha ondry na osy no atolony ho fanati-pihavanana ho an’NY TOMPO dia izay tsy misy kilema, na lahy na vavy, no hatolony. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Raha ondry no atolony ho fanatitra dia hoentiny eo anatrehan’NY TOMPO izany. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Hametraka ny tanany eo amin’ny lohan’ny fanatiny izy dia hamono azy eo anoloan’ny tranolay fihaonana ary hofafazan’ireo zanak’i Arona ra ny manodidina ny alitara. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Hakan’ireo ny fanati-pihavanana ka hatolony ho fanatitra levonina amin’ny afo ho an’NY TOMPO, dia ny hofany manontolo; faranana hatreo amin’ny faran’ny taolan-damosina no fakàny izany. Ny jaborany, dia ny jabora mandrakotra ny taovany rehetra sy ny jaboran-tsinainy, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'ny voany roa mbamin’ny jabora mandrakotra azy, izay rehetra eo amin’ny takibany ary ny ila atiny lehibe. Hataony indray manala amin’ny voany no fanesorany izany. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ny mpisorona dia handoro izany ho fofona eo ambonin’ny alitara; hanina avy amin’ny fanatitra levonina amin’ny afo ho an’NY TOMPO izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary raha osy no fanatiny dia hatolony azy eo anatrehan’NY TOMPO izany. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Hametraka ny tanany eo amin’ny lohany izy dia hamono azy eo anoloan’ny tranolay fihaonana ary hamafy ra manodidina ny alitara ireo zanak’i Arona. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Avy amin’io no hanaterany ny fanatiny atao amin’ny afo ho an’NY TOMPO, dia ny jabora mandrakotra ny taovany rehetra, ny jaboran-tsinainy, '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'ny voany roa mbamin’ny jabora mandrakotra azy, izay eo amin’ny takibany ary ny ila atiny lehibe. Hataony indray manala amin’ny voany no fakany ireny. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ary ny mpisorona dia handoro izany ho fofona eo ambonin’ny alitara; sakafo avy amin’ny fanatitra levonina amin’ny afo ho hanitra ankasitrahana izany fa an’NY TOMPO ny jabora rehetra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ho lalàna maharitra amin’ny taranakareo fara aman-dimby izany; eny amin’izay rehetra itoeranareo dia tsy hihinana jabora na ra akory ianareo.
