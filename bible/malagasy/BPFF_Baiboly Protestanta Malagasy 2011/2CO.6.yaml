document_id: 2CO.6,3103
type_code: plt
verses:
  '1':
  - type: text
    content: 'Koa satria mpiara-miasa Aminy izahay dia mangataka aminareo koa mba tsy hataonareo tsinontsinona ny fahasoavan’Andriamanitra izay noraisinareo taminay. '
  '10':
  - type: text
    content: tahaka ny ampalahelovina nefa faly mandrakariva; tahaka ny mahantra nefa mampanankarena ny maro; tahaka ny tsy manana na dia kely akory aza nefa manana ny zavatra rehetra.
  '11':
  - type: text
    content: 'Ry Korintiana, miteny tsotra aminareo izahay, malalaka ny fonay. '
  '12':
  - type: text
    content: 'Tsy tery fo aminareo izahay fa ianareo no manidy ny fonareo. '
  '13':
  - type: text
    content: Ary ho setriny mifandanja amin’izany, miteny toy ny amin’ny zanako aho, aoka mba halalaka kosa ny fonareo.
  - type: heading
    content: Ny tempolin’Andriamanitra velona
  '14':
  - type: text
    content: 'Aza mety hasiana zioga tsy antonona anareo hikambanana amin’ny tsy mino. Fa inona no iraisan’ny fahamarinana sy ny fahotana? Inona no iombonan’ny mazava sy ny maizina? '
  '15':
  - type: text
    content: 'Inona no ifanarahan’i '
  - type: text
    content: Kristy
  - type: text
    content: ' sy i Beliala? Inona no ifandraisan’ny mino sy ny tsy mino? '
  '16':
  - type: text
    content: 'Ary inona no ikambanan’ny tempolin’Andriamanitra amin’ny sampy? Fa isika no tempolin’Andriamanitra velona, araka ny nataon’Andriamanitra hoe:'
  - type: text
    content: «Honina eo aminy Aho sy handeha eo aminy;
  - type: text
    content: ary ho Andriamaniny Aho, ary ho oloko izy» (Lev 26.11-12).
  '17':
  - type: text
    content: «Koa mialà eo aminy ianareo ka misaraha aminy, hoy NY TOMPO;
  - type: text
    content: aza manendry izay zavatra tsy madio,
  - type: text
    content: ary Izaho handray anareo.
  '18':
  - type: text
    content: Ary ho Rainareo Aho,
  - type: text
    content: ary ho zanako lahy sy ho zanako vavy ianareo,
  - type: text
    content: hoy NY TOMPO Tsitoha» (Isa 52.11-12).
  '2':
  - type: text
    content: 'Fa hoy Izy:'
  - type: text
    content: «Tamin’ny taona fankasitrahana no nihainoako anao
  - type: text
    content: ary tamin’ny andro famonjena no namonjeko anao» (Isa 49.8).
  - type: text
    content: Indro, ankehitriny no andro fankasitrahana; indro, ankehitriny no andro famonjena.
  - type: heading
    content: Ny mpanompon’Andriamanitra
  '3':
  - type: text
    content: 'Tsy manao izay mahatafintohina izahay na amin’inona na amin’inona, mba tsy hanomezana tsiny ny fanompoana; '
  '4':
  - type: text
    content: 'fa amin’ny zavatra rehetra dia mampiseho ny tenanay ho mpanompon’Andriamanitra izahay ka manana faharetana tokoa amin’ny fahoriana, amin’ny fahaterena, amin’ny fahantrana, '
  '5':
  - type: text
    content: 'amin’ny kapoka, amin’ny fatorana, amin’ny tabataba, amin’ny fisasarana, amin’ny tsy fahitan-tory, amin’ny fifadian-kanina, '
  '6':
  - type: text
    content: 'amin’ny fahadiovana, amin’ny fahalalana, amin’ny fahari-po, amin’ny fahamoram-panahy, amin’ny Fanahy Masina, amin’ny fitiavana tsy mihatsaravelatsihy, '
  '7':
  - type: text
    content: 'amin’ny teny fahamarinana, amin’ny herin’Andriamanitra, amin’ny fiadian’ny fahamarinana, na amin’ny ankavanana na amin’ny ankavia, '
  '8':
  - type: text
    content: 'amin’ny voninahitra sy ny fahafaham-boninahitra, amin’ny laza ratsy sy ny laza soa; tahaka ny mpamitaka nefa marina ihany; '
  '9':
  - type: text
    content: 'tahaka ny tsy fantatra nefa fantatra tsara ihany; tahaka ny efa ho faty nefa indro, velona ihany; tahaka ny faizina nefa tsy vonoina; '
