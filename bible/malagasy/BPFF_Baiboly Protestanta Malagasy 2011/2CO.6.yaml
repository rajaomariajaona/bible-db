document_id: 2CO.6,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Koa satria mpiara-miasa Aminy izahay dia mangataka aminareo koa mba tsy hataonareo tsinontsinona ny fahasoavan’Andriamanitra izay noraisinareo taminay. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: tahaka ny ampalahelovina nefa faly mandrakariva; tahaka ny mahantra nefa mampanankarena ny maro; tahaka ny tsy manana na dia kely akory aza nefa manana ny zavatra rehetra.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ry Korintiana, miteny tsotra aminareo izahay, malalaka ny fonay. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Tsy tery fo aminareo izahay fa ianareo no manidy ny fonareo. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Ary ho setriny mifandanja amin’izany, miteny toy ny amin’ny zanako aho, aoka mba halalaka kosa ny fonareo.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny tempolin’Andriamanitra velona
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Aza mety hasiana zioga tsy antonona anareo hikambanana amin’ny tsy mino. Fa inona no iraisan’ny fahamarinana sy ny fahotana? Inona no iombonan’ny mazava sy ny maizina? '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Inona no ifanarahan’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ' sy i Beliala? Inona no ifandraisan’ny mino sy ny tsy mino? '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Ary inona no ikambanan’ny tempolin’Andriamanitra amin’ny sampy? Fa isika no tempolin’Andriamanitra velona, araka ny nataon’Andriamanitra hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Honina eo aminy Aho sy handeha eo aminy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ho Andriamaniny Aho, ary ho oloko izy» (Lev 26.11-12).
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: «Koa mialà eo aminy ianareo ka misaraha aminy, hoy NY TOMPO;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aza manendry izay zavatra tsy madio,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary Izaho handray anareo.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Ary ho Rainareo Aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ho zanako lahy sy ho zanako vavy ianareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy NY TOMPO Tsitoha» (Isa 52.11-12).
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Fa hoy Izy:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Tamin’ny taona fankasitrahana no nihainoako anao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tamin’ny andro famonjena no namonjeko anao» (Isa 49.8).
  - type: usfm
    marker: m
    children:
    - type: text
      text: Indro, ankehitriny no andro fankasitrahana; indro, ankehitriny no andro famonjena.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny mpanompon’Andriamanitra
    marker-yv: yv-h
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Tsy manao izay mahatafintohina izahay na amin’inona na amin’inona, mba tsy hanomezana tsiny ny fanompoana; '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'fa amin’ny zavatra rehetra dia mampiseho ny tenanay ho mpanompon’Andriamanitra izahay ka manana faharetana tokoa amin’ny fahoriana, amin’ny fahaterena, amin’ny fahantrana, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'amin’ny kapoka, amin’ny fatorana, amin’ny tabataba, amin’ny fisasarana, amin’ny tsy fahitan-tory, amin’ny fifadian-kanina, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'amin’ny fahadiovana, amin’ny fahalalana, amin’ny fahari-po, amin’ny fahamoram-panahy, amin’ny Fanahy Masina, amin’ny fitiavana tsy mihatsaravelatsihy, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'amin’ny teny fahamarinana, amin’ny herin’Andriamanitra, amin’ny fiadian’ny fahamarinana, na amin’ny ankavanana na amin’ny ankavia, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'amin’ny voninahitra sy ny fahafaham-boninahitra, amin’ny laza ratsy sy ny laza soa; tahaka ny mpamitaka nefa marina ihany; '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'tahaka ny tsy fantatra nefa fantatra tsara ihany; tahaka ny efa ho faty nefa indro, velona ihany; tahaka ny faizina nefa tsy vonoina; '
