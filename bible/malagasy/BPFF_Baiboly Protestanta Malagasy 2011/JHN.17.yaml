document_id: JHN.17,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mivavaka ho an’ny mpianany Jesosy
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa nolazain’i Jesosy izany teny izany dia nanandratra ny masony ho amin’ny lanitra Izy ka niteny hoe: Ray ô, tonga ny fotoanandro; mankalazà ny Zanakao mba hankalazan’ny Zanaka Anao, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary izay Ahy rehetra dia Anao ary izay Anao dia Ahy; ary efa ankalazaina eo aminy Aho. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary tsy ho eto amin’izao tontolo izao intsony Aho, fa izy ireto no ho eto amin’izao tontolo izao, ary Izaho mankany Aminao. Ray masina ô, tehirizo ireo amin’ny anaranao izay nomenao Ahy mba ho iray ihany izy, tahaka ny maha iray Antsika. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha mbola teo aminy Aho dia nitahiry azy tamin’ny anaranao izay nomenao Ahy; ary notandremako izy ka tsy misy very, afa-tsy ilay zanaky ny fahaverezana ihany mba hahatanteraka ny Soratra Masina. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ankehitriny mankany Aminao Aho; ary izany teny izany no lazaiko eto amin’izao tontolo izao mba hananany ny fifaliako tanteraka ao aminy. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Efa nomeko azy ny teninao; ary halan’izao tontolo izao izy satria tsy avy amin’izao tontolo izao, tahaka Ahy tsy avy amin’izao tontolo izao. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izaho tsy mangataka Aminao mba hampiala azy amin’izao tontolo izao fa ny mba hiaro azy amin’ilay ratsy. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsy avy amin’izao tontolo izao izy, tahaka Ahy tsy avy amin’izao tontolo izao. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Manamasìna azy amin’ny fahamarinana, ny teninao no fahamarinana. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tahaka ny nanirahanao Ahy ho amin’izao tontolo izao no mba nanirahako azy kosa ho amin’izao tontolo izao. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ho an’ireto no anamasinako ny tenako mba hanamasinan’ny fahamarinanao azy.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'araka ny nanomezanao Azy fahefana amin’ny nofo rehetra mba hanome fiainana mandrakizay ho an’izay rehetra nomenao Azy. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nefa tsy ho an’ireto ihany no angatahako fa ho an’izay mino Ahy koa noho ny teniny; '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'mba ho iray ihany izy rehetra, tahaka Anao Ray ato Amiko ary Izaho koa ao Aminao, mba ho ao Amintsika koa izy; mba hinoan’izao tontolo izao fa Ianao no naniraka Ahy. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nomeko azy ny voninahitra izay nomenao Ahy, mba ho iray izy, tahaka ny maha iray Antsika: '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izaho ao aminy ary Ianao ato Amiko, mba ho tanteraka ho iray izy, mba ho fantatr’izao tontolo izao fa efa naniraka Ahy Ianao sady efa tia azy tahaka ny nitiavanao Ahy.
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ray ô, tiako mba ho any Amiko amin’izay misy Ahy ireo izay nomenao Ahy, mba hahita ny voninahitro nomenao Ahy izy; fa efa tia Ahy Ianao, fony tsy mbola ary ny fanorenana izao tontolo izao. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ray marina ô, tsy nahalala Anao izao tontolo izao; fa Izaho nahalala Anao, ary ireto dia mahalala fa Ianao no naniraka Ahy. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary efa nampahafantariko azy ny anaranao ary mbola hampahafantariko ihany, mba ho ao aminy ny fitiavana izay nitiavanao Ahy ary Izaho koa ho ao aminy.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary izao no fiainana mandrakizay dia ny mahafantatra Anao izay Andriamanitra tokana sady marina sy Jesosy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ' izay nirahinao. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izaho efa nankalaza Anao tetỳ ambonin’ny tany; vitako ny asa nomenao Ahy hataoko. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ankehitriny, Ray ô, mankalazà Ahy amin’ny tenanao, dia amin’ny voninahitra niarahako nanana Taminao, fony tsy mbola ary izao tontolo izao.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nasehoko tamin’ny olona izay nomenao Ahy avy tamin’izao tontolo izao ny anaranao; Anao ireny ka nomenao Ahy; ary notandremany ny teninao. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fantany ankehitriny fa avy Taminao izay rehetra efa nomenao Ahy. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa ny teny izay nomenao Ahy dia nomeko azy kosa, ary noraisiny ka fantany marina tokoa fa avy Taminao Aho; ary nino izy fa Ianao no naniraka Ahy.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mangataka ho azy Aho; tsy mangataka ho an’izao tontolo izao Aho, fa ho an’izay nomenao Ahy satria Anao izy. '
