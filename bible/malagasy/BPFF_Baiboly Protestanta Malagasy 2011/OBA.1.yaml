document_id: OBA.1,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ambaran’NY TOMPO ny handravana an’i Edoma
  - type: text
    content: Ny fahitan’i Obadia.
  - type: text
    content: 'Izao no lazain’NY TOMPO Andriamanitra ny amin’i Edoma:'
  - type: text
    content: Nahare filazana
  - type: text
    content: avy tamin’NY TOMPO izahay,
  - type: text
    content: 'ary nisy iraka nalefa ho any amin’ny firenena hilaza hoe:'
  - type: text
    content: Mitsangàna!
  - type: text
    content: Aoka isika hitsangana hanafika azy!
  '10':
  - type: text
    content: Noho ny fampahoriana an’i Jakoba rahalahinao
  - type: text
    content: dia ho voasaron-kenatra ianao
  - type: text
    content: ka ho fongotra mandrakizay.
  '11':
  - type: text
    content: Tamin’ilay andro namitsahanao teny ampita,
  - type: text
    content: tamin’ny andro namaboan’ny vahiny ny fananany
  - type: text
    content: sy nidiran’ny hafa firenena teo amin’ny vavahadiny
  - type: text
    content: ary nanaovany antsapaka an’i Jerosalema,
  - type: text
    content: dia mba toy ny iray tamin’ireny koa ianao.
  '12':
  - type: text
    content: Aza finaritra mijery ny andron’ny rahalahinao
  - type: text
    content: amin’ny andro ahitany loza;
  - type: text
    content: aza mifaly ny amin’ny taranak’i Joda
  - type: text
    content: amin’ny andro andringanana azy;
  - type: text
    content: aza manao teny miavonavona
  - type: text
    content: amin’ny andro fahoriana.
  '13':
  - type: text
    content: Aza miditra amin’ny vavahadin’ny oloko ianao
  - type: text
    content: amin’ny andro ahitany loza;
  - type: text
    content: aza finaritra mijery ny fahantrany ianao
  - type: text
    content: amin’ny andro ahitany loza;
  - type: text
    content: aza manatsotra tanana haka ny fananany ianao
  - type: text
    content: amin’ny andro ahitany loza.
  '14':
  - type: text
    content: Aza mamitsaka eo amin’ny sampanan-dalana
  - type: text
    content: hamono izay afa-nandositra ianao,
  - type: text
    content: ary aza manolotra izay sisa velona aminy ianao
  - type: text
    content: amin’ny andro fahoriana.
  '15':
  - type: text
    content: Fa efa antomotra ny Andron’NY TOMPO
  - type: text
    content: amin’ny firenena rehetra;
  - type: text
    content: toy ny nataonao no mba hatao aminao kosa;
  - type: text
    content: eny, hitsingerina ho eo an-dohanao ny nataonao.
  - type: heading
    content: Hanao valifaty amin’i Edoma Israely
  '16':
  - type: text
    content: Fa toy ny nisotroanareo teo an-tendrombohitra masina,
  - type: text
    content: dia toy izany koa no hisotroan’ny firenena rehetra mandrakariva,
  - type: text
    content: eny, hisotro izy ka hitelina,
  - type: text
    content: ary ho toy ny tsy ary izy.
  '17':
  - type: text
    content: 'Fa ao an-tendrombohitra '
  - type: text
    content: Ziona
  - type: text
    content: ' dia hisy izay sisa afaka,'
  - type: text
    content: ho fitoerana masina indray izany;
  - type: text
    content: ary horaisin’ny taranak’i Jakoba indray ny fananany.
  '18':
  - type: text
    content: Ho afo ny taranak’i Jakoba
  - type: text
    content: ary ho lelafo ny taranak’i Josefa,
  - type: text
    content: fa ny taranak’i Esao kosa dia ho mololo
  - type: text
    content: ary harehitr’ireny izy ka holevoniny;
  - type: text
    content: tsy hisy sisa velona ny taranak’i Esao
  - type: text
    content: satria NY TOMPO no efa niteny.
  - type: heading
    content: Fanafihana ireo faritany manodidina
  '19':
  - type: text
    content: 'Ny any Negeva no hahazo ny tendrombohitr’i Esao; ary ny any Sefela no hahazo ny an’ny Filistina; hahazo ny tanin’i Efraima sy ny tany Samaria izy; ary i Benjamina dia hahazo an’i Gileada. '
  '2':
  - type: text
    content: Indro, hataoko tsinontsinona eo amin’ny firenena ianao,
  - type: text
    content: eny, ho tena fanazimbazimba ianao.
  '20':
  - type: text
    content: Ary ny babo amin’izao Zanak’Israely maro be izao dia hahazo ny Kananita hatrany Zarefata, ary ny babo tany Jerosalema, izay any Sefarada, dia hahazo ny tanàna any Negeva.
  '21':
  - type: text
    content: 'Ary hisy mpanafaka maro hiakatra ao an-tendrombohitra '
  - type: text
    content: Ziona
  - type: text
    content: hitsara ny tendrombohitr’i Esao;
  - type: text
    content: ary ho an’NY TOMPO ny fanjakana.
  '3':
  - type: text
    content: Ny avonavon’ny fonao no namitaka anao,
  - type: text
    content: ry ilay monina eny an-tsefatsefaky ny harambato,
  - type: text
    content: any amin’ny fonenana avo,
  - type: text
    content: 'sady miteny anakampo hoe:'
  - type: text
    content: Iza no hampivarina ahy ho eny an-tany?
  '4':
  - type: text
    content: Na dia miakatra tahaka ny voromahery aza ianao
  - type: text
    content: ka mametraka ny akaninao eny amin’ny kintana
  - type: text
    content: dia havariko avy eny ianao,
  - type: text
    content: hoy NY TOMPO.
  '5':
  - type: text
    content: Raha toa misy mpangalatra, na jiolahy amin’ny alina, tonga ao aminao,
  - type: text
    content: dia tsy hihetsika va ianao?
  - type: text
    content: Moa tsy izay hahafapo azy va no hangalariny?
  - type: text
    content: Ary raha toa misy mpioty voaloboka tonga ao aminao,
  - type: text
    content: moa tsy ambinambina voaloboka ihany va no havelany hotsimponinao?
  '6':
  - type: text
    content: Endre ny fitady an’i Esao!
  - type: text
    content: Endre ny fikatsaka ny harenany miafina.
  '7':
  - type: text
    content: Ny olona rehetra izay vita fanekena taminao
  - type: text
    content: no nandroaka anao hatrany amin’ny sisintany;
  - type: text
    content: izay tsara fihavanana aminao no namitaka ka naharesy anao;
  - type: text
    content: izay mihinana ny haninao no nanao vela-pandrika ao ambaninao.
  - type: text
    content: Tsy misy fisainana intsony ao aminy.
  - type: heading
    content: Nanararaotra ny fahavoazan’ny Israely i Edoma
  '8':
  - type: text
    content: Moa tsy amin’izany andro izany va,
  - type: text
    content: hoy NY TOMPO,
  - type: text
    content: no hamongorako ny olon-kendry any Edoma
  - type: text
    content: sy hamongorako ny manan-tsaina any amin’ny tendrombohitr’i Esao?
  '9':
  - type: text
    content: Ho raiki-tahotra ny lehilahy maherinao, ry Temana,
  - type: text
    content: ary ho ringana sy ho foana ny olona rehetra any amin’ny tendrombohitr’i Esao.
