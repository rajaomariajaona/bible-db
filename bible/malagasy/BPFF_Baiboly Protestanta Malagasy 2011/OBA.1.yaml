document_id: OBA.1,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ambaran’NY TOMPO ny handravana an’i Edoma
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Ny fahitan’i Obadia.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Izao no lazain’NY TOMPO Andriamanitra ny amin’i Edoma:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nahare filazana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avy tamin’NY TOMPO izahay,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ary nisy iraka nalefa ho any amin’ny firenena hilaza hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mitsangàna!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka isika hitsangana hanafika azy!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Noho ny fampahoriana an’i Jakoba rahalahinao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ho voasaron-kenatra ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka ho fongotra mandrakizay.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Tamin’ilay andro namitsahanao teny ampita,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tamin’ny andro namaboan’ny vahiny ny fananany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy nidiran’ny hafa firenena teo amin’ny vavahadiny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary nanaovany antsapaka an’i Jerosalema,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia mba toy ny iray tamin’ireny koa ianao.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Aza finaritra mijery ny andron’ny rahalahinao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: amin’ny andro ahitany loza;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aza mifaly ny amin’ny taranak’i Joda
  - type: usfm
    marker: q1
    children:
    - type: text
      text: amin’ny andro andringanana azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aza manao teny miavonavona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: amin’ny andro fahoriana.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Aza miditra amin’ny vavahadin’ny oloko ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: amin’ny andro ahitany loza;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aza finaritra mijery ny fahantrany ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: amin’ny andro ahitany loza;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aza manatsotra tanana haka ny fananany ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: amin’ny andro ahitany loza.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Aza mamitsaka eo amin’ny sampanan-dalana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hamono izay afa-nandositra ianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary aza manolotra izay sisa velona aminy ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: amin’ny andro fahoriana.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Fa efa antomotra ny Andron’NY TOMPO
  - type: usfm
    marker: q1
    children:
    - type: text
      text: amin’ny firenena rehetra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toy ny nataonao no mba hatao aminao kosa;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, hitsingerina ho eo an-dohanao ny nataonao.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Hanao valifaty amin’i Edoma Israely
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Fa toy ny nisotroanareo teo an-tendrombohitra masina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia toy izany koa no hisotroan’ny firenena rehetra mandrakariva,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, hisotro izy ka hitelina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ho toy ny tsy ary izy.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Fa ao an-tendrombohitra '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Ziona
    - type: text
      text: ' dia hisy izay sisa afaka,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho fitoerana masina indray izany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary horaisin’ny taranak’i Jakoba indray ny fananany.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Ho afo ny taranak’i Jakoba
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ho lelafo ny taranak’i Josefa,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny taranak’i Esao kosa dia ho mololo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary harehitr’ireny izy ka holevoniny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy hisy sisa velona ny taranak’i Esao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria NY TOMPO no efa niteny.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fanafihana ireo faritany manodidina
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Ny any Negeva no hahazo ny tendrombohitr’i Esao; ary ny any Sefela no hahazo ny an’ny Filistina; hahazo ny tanin’i Efraima sy ny tany Samaria izy; ary i Benjamina dia hahazo an’i Gileada. '
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Indro, hataoko tsinontsinona eo amin’ny firenena ianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, ho tena fanazimbazimba ianao.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Ary ny babo amin’izao Zanak’Israely maro be izao dia hahazo ny Kananita hatrany Zarefata, ary ny babo tany Jerosalema, izay any Sefarada, dia hahazo ny tanàna any Negeva.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Ary hisy mpanafaka maro hiakatra ao an-tendrombohitra '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Ziona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hitsara ny tendrombohitr’i Esao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ho an’NY TOMPO ny fanjakana.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Ny avonavon’ny fonao no namitaka anao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ry ilay monina eny an-tsefatsefaky ny harambato,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: any amin’ny fonenana avo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'sady miteny anakampo hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Iza no hampivarina ahy ho eny an-tany?
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Na dia miakatra tahaka ny voromahery aza ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka mametraka ny akaninao eny amin’ny kintana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia havariko avy eny ianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy NY TOMPO.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Raha toa misy mpangalatra, na jiolahy amin’ny alina, tonga ao aminao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia tsy hihetsika va ianao?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moa tsy izay hahafapo azy va no hangalariny?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary raha toa misy mpioty voaloboka tonga ao aminao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: moa tsy ambinambina voaloboka ihany va no havelany hotsimponinao?
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Endre ny fitady an’i Esao!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Endre ny fikatsaka ny harenany miafina.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Ny olona rehetra izay vita fanekena taminao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no nandroaka anao hatrany amin’ny sisintany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay tsara fihavanana aminao no namitaka ka naharesy anao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay mihinana ny haninao no nanao vela-pandrika ao ambaninao.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy misy fisainana intsony ao aminy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Nanararaotra ny fahavoazan’ny Israely i Edoma
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Moa tsy amin’izany andro izany va,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy NY TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no hamongorako ny olon-kendry any Edoma
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy hamongorako ny manan-tsaina any amin’ny tendrombohitr’i Esao?
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Ho raiki-tahotra ny lehilahy maherinao, ry Temana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ho ringana sy ho foana ny olona rehetra any amin’ny tendrombohitr’i Esao.
