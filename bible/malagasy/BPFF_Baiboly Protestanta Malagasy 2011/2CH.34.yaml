document_id: 2CH.34,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nanjakan’i Josia
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 2Mpa 22.1-2
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Valo taona i Josia raha nanomboka nanjaka ary iraika amby telopolo taona no nanjakany tany Jerosalema. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary natolony ho eo an-tanan’ny lehiben’ny mpiasa izay voatendry hitandrina ny amin’ny tranon’NY TOMPO izany, dia natolotr’ireo ho an’ny mpiasa izay niasa tao amin’ny tranon’NY TOMPO kosa izany hanamboarana sy hanamafisana ny Trano; '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia nomeny ho an’ny mpandrafitra sy ny mpandatsa-bato hamidy vato voapaika sy hazo hatao sakamandimby ary lampihazo ho amin’ny trano izay nosimban’ny mpanjakan’ny Joda. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nanao ny asa tamim-pahamarinana ny olona; ary ny voatendry hifehy azy dia i Jahata sy i Obadia levita, avy tamin’ny taranak’i Merary, i Zakaria sy i Mesolama, avy tamin’ny taranaky ny Kehatita ary ny levita rehetra izay nahay ny zavamaneno isan-karazany. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ireo no tonian’ny mpitondra entana sady nifehy izay rehetra nanao raharaha tamin’ny taozavatra samihafa rehetra; ary avy tamin’ny levita koa dia nisy mpitantsoratra sy mpifehy ary mpiandry varavarana.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa navoaka ny vola izay nampidirina tao amin’ny tranon’NY TOMPO, i Hilkia mpisorona dia nahita ny bokin’ny lalànan’NY TOMPO, ilay nampilazaina an’i Mosesy. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia niteny tamin’i Safana mpitantsoratra i Hilkia hoe: Ny bokin’ny lalàna dia hitako tao amin’ny tranon’NY TOMPO. Dia natolotr’i Hilkia an’i Safana ny boky. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nitondra ny boky ho any amin’ny mpanjaka i Safana sady nilaza taminy hoe: Izay rehetra nasaina nataon’ny mpanomponao dia nataony avokoa. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary narotsany ny vola izay azo tao amin’ny tranon’NY TOMPO ka natolony teo an-tanan’ny olona voatendry sy teo an-tanan’ny mpiasa. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nilaza tamin’ny mpanjaka koa i Safana mpanoratra hoe: Misy boky nomen’i Hilkia mpisorona ahy. Dia novakin’i Safana teo anatrehan’ny mpanjaka ny boky.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mampanontany an’i Holda mpaminanivavy i Josia
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 2Mpa 22.11-20
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa ren’ny mpanjaka ny tenin’ny lalàna dia nandriatra ny fitafiany izy '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary nanao izay mahitsy teo imason’NY TOMPO izy ka nandeha tamin’ny lalan’i Davida rainy fa tsy mba nivily na ho amin’ny ankavanana na ho amin’ny ankavia.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fanavaozana noentin’i Josia
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 2Mpa 23.4-20
    marker-yv: yv-h
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'sady nandidy an’i Hilkia sy i Ahikama, zanak’i Safana, i Abdona, zanak’i Mika, i Safana mpitantsoratra ary i Asaia, mpanompon’ny mpanjaka, ka niteny hoe: '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Andeha manontany amin’NY TOMPO ho ahy sy ho an’izay sisa amin’ny Israely sy ny Joda ny amin’izay lazain’ity boky vao hita ity; fa mafy ny hatezeran’NY TOMPO naidiny tamintsika noho ny tsy nitandreman’ny razantsika ny tenin’NY TOMPO, handeha araka izay rehetra voasoratra ao amin’ity boky ity.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary i Hilkia sy izay notendren’ny mpanjaka dia nankany amin’i Holda mpaminanivavy, vadin’i Saloma, zanak’i Tokehata, zanak’i Hasra, mpitahiry ny fitafiana, fa nitoetra tao amin’ny faritra vaovao tany Jerosalema Ravehivavy, ary niresaka izany taminy izy ireo. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy Ravehivavy taminy: Izao no lazain’NY TOMPO, Andriamanitry ny Israely: Lazao amin’izay lehilahy naniraka anareo tatỳ amiko hoe: '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao no lazain’NY TOMPO: Indro, Izaho hahatonga loza amin’ity tanàna ity sy amin’ny mponina eto, dia ny ozona rehetra izay voasoratra ao amin’ilay boky efa novakina teo anatrehan’ny mpanjakan’ny Joda. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Satria nahafoy Ahy izy ary nandoro ditin-kazo manitra ho an’ireo andriamanitra hafa sady nampahatezitra Ahy tamin’izay rehetra nataon’ny tanany, dia haidina amin’ity tanàna ity ny fahatezerako ka tsy ho maty vonoina. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ny amin’ny mpanjakan’ny Joda kosa izay naniraka anareo hanontany amin’NY TOMPO, dia ambarao aminy hoe: Izao no lazain’NY TOMPO, Andriamanitry ny Israely: Ny amin’ny teny izay efa novakinao, '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'satria nino anatra ianao ka nanetry tena teo anatrehan’Andriamanitra raha nandre ny teniny ny amin’ity tanàna ity sy ny mponina eto, eny, satria nanetry tena teo anatrehako ianao ka nandriatra ny fitafianao sady nitomany teo anatrehako, Izaho koa efa nihaino, hoy NY TOMPO. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Koa indro, hangoniko any amin’ny razanao ianao ary hangonina any amin’ny fasanao amin’ny fiadanana ka ny masonao dia tsy mba hahita izay loza rehetra hoentiko mamely ity tanàna ity sy ny mponina eto. Dia nitondra valiny ho any amin’ny mpanjaka izy ireo.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nanavaozan’i Josia ny fanekeny tamin’Andriamanitra
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 2Mpa 23.1-3
    marker-yv: yv-h
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nandefa iraka ny mpanjaka hamory ny loholon’ny Joda sy Jerosalema rehetra. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin’ny taona fahavalo nanjakany, raha mbola zatovolahy izy, dia nanomboka nitady ny Andriamanitr’i Davida rainy; ary tamin’ny taona faharoa amby folo dia nanomboka nanadio an’i Joda sy Jerosalema izy mba tsy hisy toerana fanaovana sorona, na tsangankazon-tsampy ho an’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Aseraha
    - type: text
      text: ', na sarin-javatra voasokitra, na sarin-javatra voarendrika intsony. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia niakatra ho ao amin’ny tranon’NY TOMPO ny mpanjaka, ny lehilahy rehetra tamin’i Joda, ny mponina tany Jerosalema mbamin’ny mpisorona sy ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: levita
    - type: text
      text: ' ary ny vahoaka rehetra, na lehibe na kely. Dia novakiny teo anatrehany ny teny rehetra tao amin’ny bokin’ny fanekena izay hita tao amin’ny tranon’NY TOMPO. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny mpanjaka dia nijoro teo amin’ny toerany, dia nanao fanekena teo anatrehan’NY TOMPO hanaraka Azy ka hitandrina ny lalànany sy ny teny vavolombelony ary ny didiny amin’ny fony manontolo sy ny fanahiny manontolo, hankatò ny tenin’ny fanekena izay voasoratra ao amin’izany boky izany izy, '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'nasainy hifikitra tsara koa ny olona rehetra tany Jerosalema sy ny Benjamina. Ary ny mponina tany Jerosalema dia nandeha araka ny faneken’Andriamanitra, dia Andriamanitry ny razany. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nanaisotra ny fahavetavetana rehetra tamin’ny tany rehetra izay an’ny Zanak’Israely i Josia sady nanome didy izay rehetra teo amin’ny Israely hanompo NY TOMPO Andriamaniny. Tamin’ny andro rehetra niainan’i Josia dia tsy mba niala tamin’ny fanarahana NY TOMPO, Andriamanitry ny razany, ny olona.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary noravan’ny olona teo anatrehan’i Josia ny alitaran’ireo '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Baala
    - type: text
      text: '; ny fandoroana ditin-kazo manitra izay teo amboniny dia nazerany; ny tsangankazon-tsampy ho an’ny Aseraha sy ny sarin-javatra voasokitra mbamin’ny sarin-javatra voarendrika dia novakivakiny sy notorotoroiny ho vovoka ka nafafiny teny amin’ny fasan’ireo izay namono zavatra hatao fanatitra ho azy. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nandoro ny taolan’ny mpisorona teo ambonin’ny alitarany izy, dia nanadio an’i Joda sy Jerosalema. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tany amin’ny tanànan’ny Manase sy ny Efraima ary ny Simeona hatrany amin’ny Naftaly, dia tao amin’ny tanànany izay rava teny amin’ny manodidina, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: dia noravany koa ny alitara sy ny tsangankazon-tsampy ho an’ny Aseraha; ny sarin-javatra voasokitra dia nomongomongoiny ho vovoka; ny fandoroana ditin-kazo manitra manerana ny tanin’ny Israely rehetra dia nazerany; dia niverina ho any Jerosalema izy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nahitan’ny Mpisoronabe ny bokin’ny lalàna
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 2Mpa 22.3-10
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin’ny taona fahavalo amby folo nanjakany izy, rehefa voadiony ny tany sy ny trano, dia naniraka an’i Safana, zanak’i Azalia, sy i Mahaseia, mpifehy ny tanàna, ary i Joa, zanak’i Joahaza, mpitadidy ny raharaham-panjakana, mba hanamboatra ny tranon’NY TOMPO Andriamaniny. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa tonga teo amin’i Hilkia mpisoronabe izy ireo dia natolony ny vola izay nampidirina tao amin’ny tranon’Andriamanitra, izay nangonin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: levita
    - type: text
      text: ', mpiandry varavarana, tamin’ny Manase, ny Efraima, ny sisa rehetra tamin’ny Israely, tamin’ny Joda, ny Benjamina rehetra ary ny mponina tany Jerosalema. '
