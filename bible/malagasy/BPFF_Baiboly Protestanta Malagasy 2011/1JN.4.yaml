document_id: 1JN.4
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny famantarana an’izay avy amin’Andriamanitra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ry malala, aza mino ny fanahy rehetra, fa zahao toetra ny fanahy, na avy amin’Andriamanitra ireny na tsia, satria maro ny mpaminany sandoka efa lasa any amin’izao tontolo izao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Izao no ahafantaranareo ny Fanahin’Andriamanitra: Ny fanahy rehetra izay manaiky fa efa tonga tamin’ny nofo Jesosy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' no avy amin’Andriamanitra; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ary ny fanahy rehetra izay tsy manaiky an’i Jesosy dia tsy mba avy amin’Andriamanitra; ary izany no fanahin’ny antikristy, izay efa renareo fa ho avy sady efa eo amin’izao tontolo izao sahady.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Anaka, ianareo dia avy amin’Andriamanitra ary efa naharesy ireny satria lehibe Izay ao aminareo noho izay ao amin’izao tontolo izao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Isan’izao tontolo izao ireny ka miteny araka ny an’izao tontolo izao izy ary mihaino azy izao tontolo izao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Avy amin’Andriamanitra izahay; izay mahalala an’Andriamanitra no mihaino anay; izay tsy avy amin’Andriamanitra dia tsy mba mihaino anay. Izany no ahafantarantsika ny fanahin’ny fahamarinana sy ny fanahin’ny fiviliana.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Andriamanitra dia fitiavana
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ry malala, aoka hifankatia isika;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa avy amin’Andriamanitra ny fitiavana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary izay rehetra tia no naterak’Andriamanitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady mahalala an’Andriamanitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Izay tsy tia dia tsy mba mahalala an’Andriamanitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria Andriamanitra dia fitiavana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Izao no nanehoana ny fitiavan’Andriamanitra eto amintsika:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Andriamanitra dia naniraka ny Zanany Lahitokana tamin’izao tontolo izao
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hahavelona antsika amin’ny alalany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Izao no fitiavana:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy ny nitiavantsika an’Andriamanitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny nitiavany antsika
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka nirahiny ny Zanany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho avotra noho ny fahotantsika.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ry malala, raha izany no nitiavan’Andriamanitra antsika dia mba tokony hifankatia kosa isika. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Tsy mbola nisy olona nahita an’Andriamanitra na oviana na oviana. Raha mifankatia isika dia mitoetra ato amintsika Andriamanitra ary tanteraka ato amintsika ny fitiavany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Izao no ahafantarantsika fa mitoetra ao Aminy isika, ary Izy ato amintsika, dia ny nanomezany antsika ny Fanahiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ary izahay dia efa nahita ka manambara fa ny Ray no naniraka ny Zanaka ho Mpamonjy izao tontolo izao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Na iza na iza manaiky fa Zanak’Andriamanitra Jesosy dia mitoetra ao aminy Andriamanitra, ary izy kosa ao amin’Andriamanitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ary isika dia mahalala sy mino ny fitiavan’Andriamanitra antsika.
- type: usfm
  marker: p
  children:
  - type: text
    text: Andriamanitra dia fitiavana, ary izay mitoetra amin’ny fitiavana no mitoetra ao amin’Andriamanitra ary Andriamanitra ao aminy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Izany no ahatanterahan’ny fitiavana amintsika, mba hananantsika toky amin’ny andro fitsarana; fa tahaka Azy isika eo amin’izao tontolo izao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Tsy misy tahotra ao amin’ny fitiavana; fa ny fitiavana tanteraka dia mandroaka ny tahotra; fa mampahory ny tahotra. Fa izay matahotra dia tsy mbola tanteraka amin’ny fitiavana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Isika tia satria Izy no tia antsika voalohany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Raha misy milaza hoe: Tia an’Andriamanitra aho, nefa mankahala ny rahalahiny, dia mpandainga izy; fa izay tsy tia ny rahalahiny izay hitany, hataony ahoana no fitia an’Andriamanitra izay tsy hitany? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary izao no didy azontsika Taminy: Izay tia an’Andriamanitra dia tsy maintsy tia ny rahalahiny koa.'
