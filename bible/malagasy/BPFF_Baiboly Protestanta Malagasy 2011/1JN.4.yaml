document_id: 1JN.4,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny famantarana an’izay avy amin’Andriamanitra
  - type: text
    content: 'Ry malala, aza mino ny fanahy rehetra, fa zahao toetra ny fanahy, na avy amin’Andriamanitra ireny na tsia, satria maro ny mpaminany sandoka efa lasa any amin’izao tontolo izao. '
  '10':
  - type: text
    content: 'Izao no fitiavana:'
  - type: text
    content: Tsy ny nitiavantsika an’Andriamanitra
  - type: text
    content: fa ny nitiavany antsika
  - type: text
    content: ka nirahiny ny Zanany
  - type: text
    content: ho avotra noho ny fahotantsika.
  '11':
  - type: text
    content: 'Ry malala, raha izany no nitiavan’Andriamanitra antsika dia mba tokony hifankatia kosa isika. '
  '12':
  - type: text
    content: 'Tsy mbola nisy olona nahita an’Andriamanitra na oviana na oviana. Raha mifankatia isika dia mitoetra ato amintsika Andriamanitra ary tanteraka ato amintsika ny fitiavany. '
  '13':
  - type: text
    content: 'Izao no ahafantarantsika fa mitoetra ao Aminy isika, ary Izy ato amintsika, dia ny nanomezany antsika ny Fanahiny. '
  '14':
  - type: text
    content: Ary izahay dia efa nahita ka manambara fa ny Ray no naniraka ny Zanaka ho Mpamonjy izao tontolo izao.
  '15':
  - type: text
    content: 'Na iza na iza manaiky fa Zanak’Andriamanitra Jesosy dia mitoetra ao aminy Andriamanitra, ary izy kosa ao amin’Andriamanitra. '
  '16':
  - type: text
    content: Ary isika dia mahalala sy mino ny fitiavan’Andriamanitra antsika.
  - type: text
    content: Andriamanitra dia fitiavana, ary izay mitoetra amin’ny fitiavana no mitoetra ao amin’Andriamanitra ary Andriamanitra ao aminy.
  '17':
  - type: text
    content: 'Izany no ahatanterahan’ny fitiavana amintsika, mba hananantsika toky amin’ny andro fitsarana; fa tahaka Azy isika eo amin’izao tontolo izao. '
  '18':
  - type: text
    content: 'Tsy misy tahotra ao amin’ny fitiavana; fa ny fitiavana tanteraka dia mandroaka ny tahotra; fa mampahory ny tahotra. Fa izay matahotra dia tsy mbola tanteraka amin’ny fitiavana. '
  '19':
  - type: text
    content: 'Isika tia satria Izy no tia antsika voalohany. '
  '2':
  - type: text
    content: 'Izao no ahafantaranareo ny Fanahin’Andriamanitra: Ny fanahy rehetra izay manaiky fa efa tonga tamin’ny nofo Jesosy '
  - type: text
    content: Kristy
  - type: text
    content: ' no avy amin’Andriamanitra; '
  '20':
  - type: text
    content: 'Raha misy milaza hoe: Tia an’Andriamanitra aho, nefa mankahala ny rahalahiny, dia mpandainga izy; fa izay tsy tia ny rahalahiny izay hitany, hataony ahoana no fitia an’Andriamanitra izay tsy hitany? '
  '21':
  - type: text
    content: 'Ary izao no didy azontsika Taminy: Izay tia an’Andriamanitra dia tsy maintsy tia ny rahalahiny koa.'
  '3':
  - type: text
    content: ary ny fanahy rehetra izay tsy manaiky an’i Jesosy dia tsy mba avy amin’Andriamanitra; ary izany no fanahin’ny antikristy, izay efa renareo fa ho avy sady efa eo amin’izao tontolo izao sahady.
  '4':
  - type: text
    content: 'Anaka, ianareo dia avy amin’Andriamanitra ary efa naharesy ireny satria lehibe Izay ao aminareo noho izay ao amin’izao tontolo izao. '
  '5':
  - type: text
    content: 'Isan’izao tontolo izao ireny ka miteny araka ny an’izao tontolo izao izy ary mihaino azy izao tontolo izao. '
  '6':
  - type: text
    content: Avy amin’Andriamanitra izahay; izay mahalala an’Andriamanitra no mihaino anay; izay tsy avy amin’Andriamanitra dia tsy mba mihaino anay. Izany no ahafantarantsika ny fanahin’ny fahamarinana sy ny fanahin’ny fiviliana.
  - type: heading
    content: Andriamanitra dia fitiavana
  '7':
  - type: text
    content: Ry malala, aoka hifankatia isika;
  - type: text
    content: fa avy amin’Andriamanitra ny fitiavana,
  - type: text
    content: ary izay rehetra tia no naterak’Andriamanitra
  - type: text
    content: sady mahalala an’Andriamanitra.
  '8':
  - type: text
    content: Izay tsy tia dia tsy mba mahalala an’Andriamanitra
  - type: text
    content: satria Andriamanitra dia fitiavana.
  '9':
  - type: text
    content: 'Izao no nanehoana ny fitiavan’Andriamanitra eto amintsika:'
  - type: text
    content: Andriamanitra dia naniraka ny Zanany Lahitokana tamin’izao tontolo izao
  - type: text
    content: mba hahavelona antsika amin’ny alalany.
