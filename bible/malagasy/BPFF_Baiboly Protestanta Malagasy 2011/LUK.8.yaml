document_id: LUK.8,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ireo vehivavy nanara-dia an’i Jesosy
  - type: text
    content: 'Taoriana kelin’izany dia lasa Jesosy nitety ny tanàna sy ny vohitra nitory ny Filazantsaran’ny fanjakan’Andriamanitra; ary nanaraka Azy ny roa amby folo lahy '
  '10':
  - type: text
    content: 'Dia hoy Izy: Ianareo no navela hahalala ny zavamiafina ny amin’ny fanjakan’Andriamanitra; fa amin’ny olon-kafa dia fanoharana no atao mba'
  - type: text
    content: «Hijery izy fa tsy hahita
  - type: text
    content: ary hahare fa tsy hahafantatra» (Isa 6.9).
  - type: heading
    content: Fanazavana ny fanoharana ny amin’ny mpamafy
  - type: heading
    content: Mat 13.18-23; Mar 4.13-20
  '11':
  - type: text
    content: 'Koa izao no hevitry ny fanoharana: Ny voa dia ny tenin’Andriamanitra. '
  '12':
  - type: text
    content: 'Ireo teny amoron-dalana dia izay mandre, nefa avy ny '
  - type: text
    content: devoly
  - type: text
    content: ' ka manala ny teny ao am-pony, fandrao hino izy ka hovonjena. '
  '13':
  - type: text
    content: 'Ireo teny amin’ny tany be vato dia izay mandre sady mandray ny teny amin’ny hafaliana; nefa tsy niorim-paka ireo, fa mino vetivety ihany, koa amin’izay andro isehoan’ny fakam-panahy dia mihemotra izy. '
  '14':
  - type: text
    content: 'Ireo teny amin’ny tsilo dia izay mandre, fa nony mandeha izy dia voagejan’ny fiahiahiana sy ny harena ary ny fahafinaretan’izao fiainana izao ka tsy mahavanom-boa. '
  '15':
  - type: text
    content: Fa ireo teny amin’ny tany tsara kosa dia izay mandre ny teny amin’ny fo sady marina no tsara ka mitana izany ary mamoa amin’ny faharetana.
  - type: heading
    content: Fanoharana ny amin’ny jiro
  - type: heading
    content: Mar 4.21-25
  '16':
  - type: text
    content: 'Tsy misy olona mampirehitra jiro ka manarona azy amin’ny kapoaka na nametraka azy ao ambanin’ny farafara; fa apetrany eo amin’ny fitoeran-jiro izany mba ho hitan’izay miditra ny mazava. '
  '17':
  - type: text
    content: Fa tsy misy takona izay tsy ho hita na miafina izay tsy ho fantatra sy tsy hiharihary.
  '18':
  - type: text
    content: Koa tandremo ny fomba fihainoanareo; fa izay manana dia homena; ary izay tsy manana kosa, na dia izay heveriny ho ananany aza, dia halaina aminy.
  - type: heading
    content: Ny renin’i Jesosy sy ny rahalahiny
  - type: heading
    content: Mat 12.46-50; Mar 3.31-35
  '19':
  - type: text
    content: 'Ary nanatona Azy ny renin’i Jesosy sy ny rahalahiny, nefa tsy afaka nihaona Taminy noho ny vahoaka. '
  '2':
  - type: text
    content: 'mbamin’ny vehivavy sasany, izay nositraniny tamin’ny fanahy ratsy sy ny aretina, dia i Maria atao hoe Magdalena izay efa nialan’ny '
  - type: text
    content: demonia
  - type: text
    content: ' fito '
  '20':
  - type: text
    content: 'Dia nisy nilaza taminy hoe: Ny reninao sy ny rahalahinao dia mijanona ato alatrano ta hahita Anao. '
  '21':
  - type: text
    content: 'Fa Izy namaly azy ireo hoe: Ny reniko sy ny rahalahiko dia ireto izay mandre ny tenin’Andriamanitra ka mankatò azy.'
  - type: heading
    content: Ny nampitsaharan’i Jesosy ny tafio-drivotra
  - type: heading
    content: Mat 8.18, 23-27; Mar 4.35-41
  '22':
  - type: text
    content: 'Indray andro dia niondrana an-tsambokely Jesosy sy ny mpianany; ary hoy Izy taminy: Andeha isika hankeny ampitan’ny farihy; dia lasa izy ireo. '
  '23':
  - type: text
    content: 'Nony nandeha ny sambokely dia resin-tory Jesosy; ary nisy tafio-drivotra nidina tamin’ny farihy ka nila ho feno rano ny sambo, ary saika nahita loza izy ireo. '
  '24':
  - type: text
    content: 'Ary nanatona izy ireo dia namoha Azy ka niteny hoe: Tompoko, Tompoko, maty izahay! Dia nitsangana Izy ka noteneniny mafy ny rivotra sy ny onjan-drano. Dia nitsahatra izany ka tonga tony tsara ny andro. '
  '25':
  - type: text
    content: 'Ary hoy Izy taminy: Aiza ny finoanareo? Ary natahotra izy ireo sady gaga ka niresaka hoe: Iza moa Ity no miteny mafy ny rivotra sy ny rano ka manaiky Azy izany!'
  - type: heading
    content: Ny nanasitranan’i Jesosy ny demoniaka iray
  - type: heading
    content: Mat 8.28-34; Mar 5.1-20
  '26':
  - type: text
    content: 'Dia nitody tany amin’ny tanin’ny Geraseniana izay tandrifin’i Galilia izy ireo. '
  '27':
  - type: text
    content: 'Ary raha niala nankeny an-tanety Jesosy dia nifanena Taminy ny lehilahy iray avy tao an-tanàna, izay nanana '
  - type: text
    content: demonia
  - type: text
    content: ', ary efa ela izy no tsy niakanjo sady tsy nitoetra an-trano, fa teny amin’ny fasana. '
  '28':
  - type: text
    content: 'Fa nony nahita an’i Jesosy izy dia niantso mafy sady niankohoka teo anatrehany ka niteny tamin’ny feo mahery hoe: Moa mifaninona akory izaho sy Ianao, ry Jesosy, Zanak’Andriamanitra Avo Indrindra ô? Miangavy Anao aho, aza mampijaly ahy. '
  '29':
  - type: text
    content: 'Fa Izy nandidy ny fanahy maloto hiala tamin-dRalehilahy. Fa efa nahazo azy ela izany; ary efa nafatotra tamin’ny rojo sy norohizina ny tongony ka nambenana izy; nefa notapahiny ny fatorana ka noentin’ny demonia niriotra nankany an-tany efitra izy. '
  '3':
  - type: text
    content: sy i Johana, vadin’i Koza, mpitandrina ny fananan’i Heroda, ary i Sosana mbamin’ny maro hafa koa, izay nanompo azy ireo tamin’ny fananany.
  - type: heading
    content: Fanoharana ny amin’ny mpamafy
  - type: heading
    content: Mat 13.1-9; Mar 4.1-9
  '30':
  - type: text
    content: 'Ary nanontany azy Jesosy hoe: Iza moa no anaranao? Dia hoy izy: Legiona; satria demonia maro no efa niditra tao anatiny. '
  '31':
  - type: text
    content: 'Dia nifona Taminy ireo mba tsy handidiany azy hankany amin’ny lavaka tsy hita noanoa. '
  '32':
  - type: text
    content: 'Ary nisy kisoa maro, andiany iray, nihinana teny an-tendrombohitra, ary ireo demonia dia nangataka Taminy mba havelany hiditra ao anatiny. Dia nomeny lalana ireo. '
  '33':
  - type: text
    content: Ary rehefa niala tamin-dRalehilahy ireo demonia dia niditra tao anatin’ny kisoa; ary ilay andian-kisoa dia nitratrevatreva tamin’ny hantsana ho any amin’ny farihy ka maty an-drano tao.
  '34':
  - type: text
    content: 'Nony nahita ny zava-nitranga ireo mpiandry kisoa dia nandositra ka nilaza izany tao an-tanàna sy tany an-tsaha. '
  '35':
  - type: text
    content: 'Dia niainga ny olona mba hizaha izay zava-nitranga; ary tonga tany amin’i Jesosy izy ireo dia nahita an-dRalehilahy izay efa nialan’ny demonia, nipetraka teo anilan’ny tongotr’i Jesosy, niakanjo sady ary saina; dia raiki-tahotra ireo. '
  '36':
  - type: text
    content: 'Ary izay nahita dia nanambara tamin’ny olona ny namonjena ilay demoniaka. '
  '37':
  - type: text
    content: 'Ary nangataka an’i Jesosy mba hiala aminy ny olona rehetra tany amin’ny faritry ny Geraseniana manodidina satria raiki-tahotra indrindra izy ireo; dia niondrana an-tsambokely Jesosy ka niverina. '
  '38':
  - type: text
    content: 'Ary ilay lehilahy izay efa nialan’ny demonia dia nangataka mba hijanona eo Aminy; nefa nasain’i Jesosy nandeha izy sady noteneniny hoe: '
  '39':
  - type: text
    content: Modia ihany any an-tranonao ka ambarao izay rehetra nataon’Andriamanitra taminao. Dia nandeha izy ka nitory eran’ny tanàna izay rehetra nataon’i Jesosy taminy.
  - type: heading
    content: Ny zanakavavin’i Jairo sy ilay vehivavy nikasika ny akanjon’i Jesosy
  - type: heading
    content: Mat 9.18-26; Mar 5.21-43
  '4':
  - type: text
    content: 'Nisy vahoaka betsaka niangona, dia nanatona Azy ny olona avy tamin’ny isan-tanàna ka nilaza fanoharana Izy hoe: '
  '40':
  - type: text
    content: 'Nony tafaverina Jesosy dia nandray Azy tsara ny vahoaka, fa niandry Azy avokoa izy rehetra. '
  '41':
  - type: text
    content: 'Ary indro, tonga ny lehilahy atao hoe Jairo, mpanapaka ny '
  - type: text
    content: sinagoga
  - type: text
    content: '; dia niankohoka teo amin’ny tongotr’i Jesosy izy ka niangavy Azy mba hiditra ao an-tranony. '
  '42':
  - type: text
    content: Fa nanana zanaka vavitokana tokony ho roa amby folo taona izy, ary efa ho faty Razazavavy. Ary raha nandeha Jesosy dia nifanizina Taminy teny an-dalana ny vahoaka.
  '43':
  - type: text
    content: 'Ary nisy vehivavy iray narary nandeha ra nandritra ny roa amby folo taona, izay efa nandany ny fananany rehetra tamin’ny mpitsabo, nefa tsy nisy nahasitrana azy akory ireny. '
  '44':
  - type: text
    content: 'Dia nankao aorianan’i Jesosy Ravehivavy ka nikasika ny morontongotr’akanjony, ary niaraka tamin’izay dia nijanona ny fandehan’ny ra taminy. '
  '45':
  - type: text
    content: 'Ary hoy Jesosy: Iza moa no nikasika Ahy? Rehefa samy nandà izy rehetra dia hoy i Petera sy ny namany: Tompoko, mifanositosika ny vahoaka betsaka ka manery Anao. '
  '46':
  - type: text
    content: 'Fa hoy Jesosy: Nisy olona nikasika Ahy; fantatro fa nisy hery niala avy tamiko. '
  '47':
  - type: text
    content: 'Rehefa hitan-dRavehivavy fa tsy afaka niafina izy dia nangovitra izy ka nankeo Aminy sady niankohoka teo anatrehany ary nanambara teo anatrehan’ny vahoaka rehetra izay anton’ny nikasihany Azy sy izay nahasitranany niaraka tamin’izay. '
  '48':
  - type: text
    content: 'Ary hoy Jesosy taminy: Anaka, ny finoanao no nahavonjy anao; mandehana amin’ny fiadanana.'
  '49':
  - type: text
    content: 'Ary raha mbola niteny Jesosy dia tonga ny iray avy tany amin’ilay mpanapaka ny sinagoga ka niteny hoe: Maty ny zanakao vavy; aza manahirana ny Mpampianatra intsony. '
  '5':
  - type: text
    content: 'Niainga hamafy ny voa ny mpamafy; rehefa namafy izy, ny sasany dia voafafy teny amoron-dalana ka voahitsakitsaka ary lanin’ny voromanidina. '
  '50':
  - type: text
    content: 'Fa Jesosy, raha nahare, dia namaly azy hoe: Aza matahotra; minoa fotsiny ihany, dia ho voavonjy izy. '
  '51':
  - type: text
    content: 'Rehefa tonga tao an-trano Izy dia tsy nisy olona navelany hiara-miditra taminy afa-tsy i Petera sy i Jaona ary i Jakoba mbamin’ny ray aman-drenin-dRazazavavy. '
  '52':
  - type: text
    content: 'Ary nitomany sy niteha-tratra noho ny aminy ny olona rehetra; fa Jesosy niteny hoe: Aza mitomany, tsy maty izy, fa matory. '
  '53':
  - type: text
    content: 'Dia nihomehy Azy fatratra ny olona satria fantany fa efa maty Razazavavy. '
  '54':
  - type: text
    content: 'Ary nandray ny tanany Izy ka niantso hoe: Ry zazavavy, miarena! '
  '55':
  - type: text
    content: 'Dia nody indray ny ainy ka niarina niaraka tamin’izay izy, ary nasainy nomena sakafo. '
  '56':
  - type: text
    content: Dia talanjona ny ray aman-dreniny; fa Jesosy nandrara azy tsy hilazalaza amin’olona ny zava-nitranga.
  '6':
  - type: text
    content: 'Ny sasany dia voafafy teny amin’ny tany be vato; ary raha vao naniry izany dia nalazo satria tsy nisy hamandoana. '
  '7':
  - type: text
    content: 'Ny sasany dia voafafy teny amin’ny tsilo; ary niara-naniry taminy ny tsilo ka nangeja azy. '
  '8':
  - type: text
    content: 'Ary sasany dia voafafy teny amin’ny tany tsara, dia naniry ka namoa avo zato heny. Rehefa nilaza izany Izy dia niantso hoe: Izay manan-tsofina hoenti-mihaino, aoka izy hihaino.'
  - type: heading
    content: Ny antony ampiasan’i Jesosy ny fanoharana
  - type: heading
    content: Mat 13.10-17; Mar 4.10-12
  '9':
  - type: text
    content: 'Ary nanontany Azy ny amin’izay hevitr’izany fanoharana izany ny mpianany. '
