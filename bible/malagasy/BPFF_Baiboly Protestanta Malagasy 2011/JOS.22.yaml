document_id: JOS.22,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ireo foko any andafin’i Jordana
  - type: text
    content: 'Tamin’izay dia nantsoin’i Josoa ny Robenita sy ny Gadita ary ny antsasaky ny fokon’i Manase '
  '10':
  - type: text
    content: 'Nony tonga teo amoron’i Jordana teo amin’ny tany Kanana ny taranak’i Robena sy Gada ary ny antsasaky ny fokon’i Manase dia nanorina alitara teo, ary lehibe ny fijery izany alitara izany. '
  '11':
  - type: text
    content: 'Ary nisy nilaza tamin’ny Zanak’Israely hoe: Indreo, ny taranak’i Robena sy i Gada ary ny antsasaky ny fokon’i Manase dia nanorina alitara amin’ny sisin’ny tany Kanana, eo amoron’i Jordana, anatin’ny tanin’ny Zanak’Israely. '
  '12':
  - type: text
    content: 'Nony ren’ny Zanak’Israely izany dia niangona tao Silo ny fiangonana dia ny Zanak’Israely manontolo, mba hiakatra hiady aminy. '
  '13':
  - type: text
    content: 'Dia naniraka an’i Finehasa, zanak’i Eleazara mpisorona, ny Zanak’Israely ho any amin’ny taranak’i Robena sy i Gada ary ny antsasaky ny fokon’i Manase, any amin’ny tany Gileada; '
  '14':
  - type: text
    content: 'ary nisy loholona folo lahy koa niaraka taminy, dia loholona iray isam-poko tamin’ny Israely rehetra: Samy lohan’ny fianakaviany tamin’ny arivon’ny Israely ireo. '
  '15':
  - type: text
    content: 'Tonga tany amin’ny taranak’i Robena sy i Gada ary ny antsasaky ny fokon’i Manase tany amin’ny tany Gileada ireo ka niteny taminy hoe: '
  '16':
  - type: text
    content: 'Izao no lazain’ny fiangonan’NY TOMPO rehetra: Inona izato fahotana nataonareo amin’Andriamanitry ny Israely, no dia niala tamin’ny fanarahana NY TOMPO ianareo androany tamin’ny nanorenanareo alitara ka mikomy amin’NY TOMPO ankehitriny? '
  '17':
  - type: text
    content: 'Zavatra kely loatra amintsika va ilay heloka ny amin’i Peora izay tsy mbola nahadiovantsika ny tenantsika ho afaka amin’izany mandraka androany, na dia efa nisy aza ilay areti-mandringana tamin’ny fiangonan’NY TOMPO, '
  '18':
  - type: text
    content: 'no dia mikomy miala amin’ny fanarahana NY TOMPO ianareo anio? Raha mikomy amin’NY TOMPO ianareo anio dia ho tezitra amin’ny fiangonan’ny Israely manontolo Izy rahampitso. '
  '19':
  - type: text
    content: 'Kanefa raha maloto ny taninareo dia mità ho any amin’ny tanin’NY TOMPO izay itoeran’ny tabernakelin’NY TOMPO, koa makà fonenana any aminay fa aza mikomy amin’NY TOMPO, na mikomy aminay, amin’ny anorenanareo alitara hafa noho ny alitaran’NY TOMPO Andriamanitsika. '
  '2':
  - type: text
    content: 'ka hoy izy taminy: Ianareo dia efa nitandrina izay rehetra nandidian’i Mosesy, mpanompon’NY TOMPO, anareo sady efa nihaino ny feoko koa tamin’izay rehetra nandidiako anareo; '
  '20':
  - type: text
    content: Tsy nandika ny didy va i Akana, zanak’i Zera, tamin’ny zavatra voaozona, kanefa nisy fahatezerana nahatratra ny fiangonana, dia ny Israely manontolo? Ary tsy io lehilahy io irery ihany no maty tamin’izany helony izany.
  '21':
  - type: text
    content: 'Dia namaly ny taranak’i Robena sy i Gada ary ny antsasaky ny fokon’i Manase ka niteny tamin’ny mpifehy arivo tamin’ny Israely hoe: '
  '22':
  - type: text
    content: 'Andriamanitra Andriananahary, dia NY TOMPO; eny, Andriamanitra Andriananahary, dia NY TOMPO, Izy no mahalala, ary ny Israely koa dia hahalala; raha fikomiana na fahadisoana amin’NY TOMPO izao dia aza mba mamonjy anay akory ianao anio. '
  '23':
  - type: text
    content: 'Raha izany no nanorenanay alitara mba hiala amin’ny fanarahana NY TOMPO, na hanatitra fanatitra dorana manontolo na fanatitra avy amin’ny zavamaniry na fanati-pihavanana, eo amboniny, dia aoka NY TOMPO no hanadina; '
  '24':
  - type: text
    content: 'fa tahotra tokoa no anton’ny nanaovanay izao; fa hoy izahay: Rahatrizay dia hanontany ny taranakay ny taranakareo hoe: Moa mifaninona akory ianareo sy NY TOMPO, Andriamanitry ny Israely? '
  '25':
  - type: text
    content: 'Fa i Jordana no nataon’NY TOMPO sisintany eo anelanelantsika, ry taranak’i Robena sy i Gada, ka tsy manana anjara amin’NY TOMPO ianareo; koa hampitsaharin’ny taranakareo tsy hatahotra NY TOMPO ny taranakay. '
  '26':
  - type: text
    content: 'Dia hoy izahay: Aoka isika hanorina alitara ho antsika, tsy hanolorana fanatitra dorana manontolo anefa, na fanatitra hafa alatsa-dra, '
  '27':
  - type: text
    content: 'fa mba ho vavolombelona ho amintsika sy ny taranatsika mandimby antsika, hanaovanay ny fanompoana NY TOMPO eo anatrehany amin’ny hanolorana fanatitra dorana manontolo sy fanatitra hafa alatsa-dra ary fanati-pihavanana mba tsy holazain’ny taranakareo amin’ny taranakay rahatrizay hoe: Tsy manana anjara amin’NY TOMPO ianareo. '
  '28':
  - type: text
    content: 'Ary hoy koa izahay: Raha toa ka lazainy aminay na ny taranakay izany rahatrizay dia hataonay hoe: Jereo ny endriky ny alitaran’NY TOMPO izay nataon’ny razanay, tsy hanolorana fanatitra dorana manontolo anefa na fanatitra hafa alatsa-dra io fa mba ho vavolombelona ho amintsika roa tonta. '
  '29':
  - type: text
    content: Sanatria aminay raha hikomy amin’NY TOMPO ka hiala indray amin’ny fanarahana NY TOMPO hanorina alitara hanaterana fanatitra dorana manontolo, na fanatitra avy amin’ny zavamaniry na fanatitra hafa alatsa-dra, afa-tsy ny alitaran’NY TOMPO Andriamanitsika izay eo anoloan’ny tabernakeliny.
  '3':
  - type: text
    content: 'tsy nilaozanareo ny rahalahinareo hatramin’izany andro maro izany ka mandraka androany fa notandremanareo ny lalàna nasain’NY TOMPO Andriamanitrareo hotandremanareo. '
  '30':
  - type: text
    content: 'Rehefa ren’i Finehasa mpisorona sy ny lohan’ny fiangonana, dia ny mpifehy arivo tamin’Israely izay niaraka taminy, ny teny izay nolazain’ny taranak’i Robena sy i Gada ary ny taranak’i Manase, dia nankasitrahany izany. '
  '31':
  - type: text
    content: 'Ary hoy i Finehasa, zanak’i Eleazara mpisorona, tamin’ny taranak’i Robena sy i Gada ary ny taranak’i Manase: Fantatray anio fa eto amintsika NY TOMPO satria tsy nanao izany fahadisoana izany tamin’NY TOMPO ianareo; ary amin’izany dia efa namonjy ny Zanak’Israely tamin’ny tanan’NY TOMPO ianareo. '
  '32':
  - type: text
    content: 'Ary i Finehasa, zanak’i Eleazara mpisorona sy ny loholona dia niverina nandao ny taranak’i Robena sy i Gada tany amin’ny tany Gileada ka nankany amin’ny tany Kanana ho any amin’ny Zanak’Israely ary nitondra valinteny ho any aminy. '
  '33':
  - type: text
    content: 'Nankasitrahan’ny Zanak’Israely izany ka nisaotra an’Andriamanitra ny Zanak’Israely ary tsy nihevitra hiakatra hiady aminy intsony handrava ny tany izay nonenan’ny taranak’i Robena sy i Gada. '
  '34':
  - type: text
    content: Dia nasian’ny taranak’i Robena sy i Gada anarana ilay alitara, fa vavolombelona ho amintsika roa tonta io fa NY TOMPO no Andriamanitra.
  '4':
  - type: text
    content: Ary ankehitriny dia efa nomen’NY TOMPO Andriamanitrareo fitsaharana ny rahalahinareo, araka izay nolazainy taminy; koa modia ankehitriny ka mankanesa any amin’ny tranolainareo avy, ho any amin’ny taninareo, izay nandidian’i Mosesy, mpanompon’NY TOMPO, anareo any andafin’i Jordana.
  '5':
  - type: text
    content: 'Kanefa mitandrema tsara mba hanaraka ny didy sy ny lalàna izay nampanaovin’i Mosesy, mpanompon’NY TOMPO, anareo, hitiavanareo NY TOMPO Andriamanitrareo sy handehananareo amin’ny lalany rehetra sy hitandremanareo ny didiny sy hifikiranareo Aminy ary hanompoanareo Azy amin’ny fonareo manontolo sy ny fanahinareo manontolo. '
  '6':
  - type: text
    content: 'Ary nitsodrano azy i Josoa ka nampody azy; dia lasa nankany amin’ny tranolainy avy izy. '
  '7':
  - type: text
    content: Ary ny antsasaky ny fokon’i Manase dia nomen’i Mosesy lova tany Basana; fa ny antsasany kosa dia nomen’i Josoa teo amin’ny rahalahiny etỳ andafy andrefan’i Jordana.
  - type: text
    content: 'Ary raha nampodìn’i Josoa ho any amin’ny tranolainy koa ireo dia notsofiny rano '
  '8':
  - type: text
    content: 'sady nilazany hoe: Modia ho any amin’ny tranolainareo avy ianareo, mitondra harena be, omby aman’ondry be mihitsy, volafotsy, volamena, varahina, vy ary fitafiana be dia be; ary iombony amin’ny rahalahinareo ny babo azo tamin’ny fahavalonareo.'
  - type: heading
    content: Ny nanorenana alitara teo amoron’i Jordana
  '9':
  - type: text
    content: Dia nody ny taranak’i Robena sy i Gada ary ny antsasaky ny fokon’i Manase ka nandao ny Zanak’Israely tao Silo izay ao amin’ny tany Kanana ka nankany amin’ny tany Gileada ho any amin’ny zarataniny izay azony araka ny tenin’NY TOMPO nasainy nolazain’i Mosesy.
