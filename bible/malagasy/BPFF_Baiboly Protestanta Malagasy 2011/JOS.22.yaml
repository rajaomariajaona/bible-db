document_id: JOS.22
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ireo foko any andafin’i Jordana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Tamin’izay dia nantsoin’i Josoa ny Robenita sy ny Gadita ary ny antsasaky ny fokon’i Manase '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'ka hoy izy taminy: Ianareo dia efa nitandrina izay rehetra nandidian’i Mosesy, mpanompon’NY TOMPO, anareo sady efa nihaino ny feoko koa tamin’izay rehetra nandidiako anareo; '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'tsy nilaozanareo ny rahalahinareo hatramin’izany andro maro izany ka mandraka androany fa notandremanareo ny lalàna nasain’NY TOMPO Andriamanitrareo hotandremanareo. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ary ankehitriny dia efa nomen’NY TOMPO Andriamanitrareo fitsaharana ny rahalahinareo, araka izay nolazainy taminy; koa modia ankehitriny ka mankanesa any amin’ny tranolainareo avy, ho any amin’ny taninareo, izay nandidian’i Mosesy, mpanompon’NY TOMPO, anareo any andafin’i Jordana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Kanefa mitandrema tsara mba hanaraka ny didy sy ny lalàna izay nampanaovin’i Mosesy, mpanompon’NY TOMPO, anareo, hitiavanareo NY TOMPO Andriamanitrareo sy handehananareo amin’ny lalany rehetra sy hitandremanareo ny didiny sy hifikiranareo Aminy ary hanompoanareo Azy amin’ny fonareo manontolo sy ny fanahinareo manontolo. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary nitsodrano azy i Josoa ka nampody azy; dia lasa nankany amin’ny tranolainy avy izy. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ary ny antsasaky ny fokon’i Manase dia nomen’i Mosesy lova tany Basana; fa ny antsasany kosa dia nomen’i Josoa teo amin’ny rahalahiny etỳ andafy andrefan’i Jordana.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ary raha nampodìn’i Josoa ho any amin’ny tranolainy koa ireo dia notsofiny rano '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'sady nilazany hoe: Modia ho any amin’ny tranolainareo avy ianareo, mitondra harena be, omby aman’ondry be mihitsy, volafotsy, volamena, varahina, vy ary fitafiana be dia be; ary iombony amin’ny rahalahinareo ny babo azo tamin’ny fahavalonareo.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nanorenana alitara teo amoron’i Jordana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Dia nody ny taranak’i Robena sy i Gada ary ny antsasaky ny fokon’i Manase ka nandao ny Zanak’Israely tao Silo izay ao amin’ny tany Kanana ka nankany amin’ny tany Gileada ho any amin’ny zarataniny izay azony araka ny tenin’NY TOMPO nasainy nolazain’i Mosesy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Nony tonga teo amoron’i Jordana teo amin’ny tany Kanana ny taranak’i Robena sy Gada ary ny antsasaky ny fokon’i Manase dia nanorina alitara teo, ary lehibe ny fijery izany alitara izany. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary nisy nilaza tamin’ny Zanak’Israely hoe: Indreo, ny taranak’i Robena sy i Gada ary ny antsasaky ny fokon’i Manase dia nanorina alitara amin’ny sisin’ny tany Kanana, eo amoron’i Jordana, anatin’ny tanin’ny Zanak’Israely. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Nony ren’ny Zanak’Israely izany dia niangona tao Silo ny fiangonana dia ny Zanak’Israely manontolo, mba hiakatra hiady aminy. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dia naniraka an’i Finehasa, zanak’i Eleazara mpisorona, ny Zanak’Israely ho any amin’ny taranak’i Robena sy i Gada ary ny antsasaky ny fokon’i Manase, any amin’ny tany Gileada; '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'ary nisy loholona folo lahy koa niaraka taminy, dia loholona iray isam-poko tamin’ny Israely rehetra: Samy lohan’ny fianakaviany tamin’ny arivon’ny Israely ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Tonga tany amin’ny taranak’i Robena sy i Gada ary ny antsasaky ny fokon’i Manase tany amin’ny tany Gileada ireo ka niteny taminy hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Izao no lazain’ny fiangonan’NY TOMPO rehetra: Inona izato fahotana nataonareo amin’Andriamanitry ny Israely, no dia niala tamin’ny fanarahana NY TOMPO ianareo androany tamin’ny nanorenanareo alitara ka mikomy amin’NY TOMPO ankehitriny? '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Zavatra kely loatra amintsika va ilay heloka ny amin’i Peora izay tsy mbola nahadiovantsika ny tenantsika ho afaka amin’izany mandraka androany, na dia efa nisy aza ilay areti-mandringana tamin’ny fiangonan’NY TOMPO, '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'no dia mikomy miala amin’ny fanarahana NY TOMPO ianareo anio? Raha mikomy amin’NY TOMPO ianareo anio dia ho tezitra amin’ny fiangonan’ny Israely manontolo Izy rahampitso. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Kanefa raha maloto ny taninareo dia mità ho any amin’ny tanin’NY TOMPO izay itoeran’ny tabernakelin’NY TOMPO, koa makà fonenana any aminay fa aza mikomy amin’NY TOMPO, na mikomy aminay, amin’ny anorenanareo alitara hafa noho ny alitaran’NY TOMPO Andriamanitsika. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Tsy nandika ny didy va i Akana, zanak’i Zera, tamin’ny zavatra voaozona, kanefa nisy fahatezerana nahatratra ny fiangonana, dia ny Israely manontolo? Ary tsy io lehilahy io irery ihany no maty tamin’izany helony izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Dia namaly ny taranak’i Robena sy i Gada ary ny antsasaky ny fokon’i Manase ka niteny tamin’ny mpifehy arivo tamin’ny Israely hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Andriamanitra Andriananahary, dia NY TOMPO; eny, Andriamanitra Andriananahary, dia NY TOMPO, Izy no mahalala, ary ny Israely koa dia hahalala; raha fikomiana na fahadisoana amin’NY TOMPO izao dia aza mba mamonjy anay akory ianao anio. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Raha izany no nanorenanay alitara mba hiala amin’ny fanarahana NY TOMPO, na hanatitra fanatitra dorana manontolo na fanatitra avy amin’ny zavamaniry na fanati-pihavanana, eo amboniny, dia aoka NY TOMPO no hanadina; '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'fa tahotra tokoa no anton’ny nanaovanay izao; fa hoy izahay: Rahatrizay dia hanontany ny taranakay ny taranakareo hoe: Moa mifaninona akory ianareo sy NY TOMPO, Andriamanitry ny Israely? '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Fa i Jordana no nataon’NY TOMPO sisintany eo anelanelantsika, ry taranak’i Robena sy i Gada, ka tsy manana anjara amin’NY TOMPO ianareo; koa hampitsaharin’ny taranakareo tsy hatahotra NY TOMPO ny taranakay. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Dia hoy izahay: Aoka isika hanorina alitara ho antsika, tsy hanolorana fanatitra dorana manontolo anefa, na fanatitra hafa alatsa-dra, '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'fa mba ho vavolombelona ho amintsika sy ny taranatsika mandimby antsika, hanaovanay ny fanompoana NY TOMPO eo anatrehany amin’ny hanolorana fanatitra dorana manontolo sy fanatitra hafa alatsa-dra ary fanati-pihavanana mba tsy holazain’ny taranakareo amin’ny taranakay rahatrizay hoe: Tsy manana anjara amin’NY TOMPO ianareo. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ary hoy koa izahay: Raha toa ka lazainy aminay na ny taranakay izany rahatrizay dia hataonay hoe: Jereo ny endriky ny alitaran’NY TOMPO izay nataon’ny razanay, tsy hanolorana fanatitra dorana manontolo anefa na fanatitra hafa alatsa-dra io fa mba ho vavolombelona ho amintsika roa tonta. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Sanatria aminay raha hikomy amin’NY TOMPO ka hiala indray amin’ny fanarahana NY TOMPO hanorina alitara hanaterana fanatitra dorana manontolo, na fanatitra avy amin’ny zavamaniry na fanatitra hafa alatsa-dra, afa-tsy ny alitaran’NY TOMPO Andriamanitsika izay eo anoloan’ny tabernakeliny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Rehefa ren’i Finehasa mpisorona sy ny lohan’ny fiangonana, dia ny mpifehy arivo tamin’Israely izay niaraka taminy, ny teny izay nolazain’ny taranak’i Robena sy i Gada ary ny taranak’i Manase, dia nankasitrahany izany. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ary hoy i Finehasa, zanak’i Eleazara mpisorona, tamin’ny taranak’i Robena sy i Gada ary ny taranak’i Manase: Fantatray anio fa eto amintsika NY TOMPO satria tsy nanao izany fahadisoana izany tamin’NY TOMPO ianareo; ary amin’izany dia efa namonjy ny Zanak’Israely tamin’ny tanan’NY TOMPO ianareo. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Ary i Finehasa, zanak’i Eleazara mpisorona sy ny loholona dia niverina nandao ny taranak’i Robena sy i Gada tany amin’ny tany Gileada ka nankany amin’ny tany Kanana ho any amin’ny Zanak’Israely ary nitondra valinteny ho any aminy. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Nankasitrahan’ny Zanak’Israely izany ka nisaotra an’Andriamanitra ny Zanak’Israely ary tsy nihevitra hiakatra hiady aminy intsony handrava ny tany izay nonenan’ny taranak’i Robena sy i Gada. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Dia nasian’ny taranak’i Robena sy i Gada anarana ilay alitara, fa vavolombelona ho amintsika roa tonta io fa NY TOMPO no Andriamanitra.
