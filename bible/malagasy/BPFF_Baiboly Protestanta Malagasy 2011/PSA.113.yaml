        text: Haleloia
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miderà, ianareo mpanompon’NY TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: miderà ny anaran’NY TOMPO.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Isaorana anie ny anaran’NY TOMPO
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hatramin’izao ka ho mandrakizay.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hatramin’ny fiposahan’ny masoandro ka hatramin’ny filentehany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hoderaina anie ny anaran’NY TOMPO.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avo ambonin’ny firenena rehetra NY TOMPO;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ambonin’ny lanitra ny voninahiny.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Iza no tahaka NY TOMPO Andriamanitsika
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay mipetraka any amin’ny avo
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa miondrika mijery
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny any an-danitra sy ny etỳ an-tany?
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manangana ny malahelo hiala amin’ny vovoka Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary manandratra ny mahantra ho afaka eo amin’ny zezika
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hametraka azy ho naman’ny mpanapaka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ny mpanapaka eo amin’ny olony.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mampitoetra an-trano ny momba Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa mahatonga azy ho renin-jaza mifaly.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: w
      children:
      - type: text
        text: Haleloia
    - type: text
      text: .
