verses:
  '1':
  - type: heading
    content: Mampifamadika ny toe-javatra NY TOMPO
  - type: text
    content: ' '
  - type: text
    content: Haleloia
  - type: text
    content: .
  - type: text
    content: Miderà, ianareo mpanompon’NY TOMPO,
  - type: text
    content: miderà ny anaran’NY TOMPO.
  '2':
  - type: text
    content: Isaorana anie ny anaran’NY TOMPO
  - type: text
    content: hatramin’izao ka ho mandrakizay.
  '3':
  - type: text
    content: Hatramin’ny fiposahan’ny masoandro ka hatramin’ny filentehany
  - type: text
    content: dia hoderaina anie ny anaran’NY TOMPO.
  '4':
  - type: text
    content: Avo ambonin’ny firenena rehetra NY TOMPO;
  - type: text
    content: ambonin’ny lanitra ny voninahiny.
  '5':
  - type: text
    content: Iza no tahaka NY TOMPO Andriamanitsika
  - type: text
    content: izay mipetraka any amin’ny avo
  '6':
  - type: text
    content: nefa miondrika mijery
  - type: text
    content: ny any an-danitra sy ny etỳ an-tany?
  '7':
  - type: text
    content: Manangana ny malahelo hiala amin’ny vovoka Izy
  - type: text
    content: ary manandratra ny mahantra ho afaka eo amin’ny zezika
  '8':
  - type: text
    content: mba hametraka azy ho naman’ny mpanapaka,
  - type: text
    content: dia ny mpanapaka eo amin’ny olony.
  '9':
  - type: text
    content: Mampitoetra an-trano ny momba Izy
  - type: text
    content: fa mahatonga azy ho renin-jaza mifaly.
  - type: text
    content: Haleloia
  - type: text
    content: .
