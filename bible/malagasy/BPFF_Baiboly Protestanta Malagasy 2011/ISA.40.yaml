document_id: ISA.40
type_code: plt
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: FIZARANA FAHAROA
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ampionony ny oloko
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ampiononinareo, ampiononinareo ny oloko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hoy Andriamanitrareo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Mitenena amin’ny fon’i Jerosalema ka ambarao aminy
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa tapitra ny adiny
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady voaonitra ny helony,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary efa nandray indroa heny
- type: usfm
  marker: q1
  children:
  - type: text
    text: tamin’ny tanan’NY TOMPO izy ho valin’ny fahotany rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Injany misy feo miantso hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Savaonareo ny lalana ho an’NY TOMPO
- type: usfm
  marker: q1
  children:
  - type: text
    text: any an-tany efitra!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Manaova ianareo lalambe ho an’Andriamanitsika
- type: usfm
  marker: q1
  children:
  - type: text
    text: any an-tany foana!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Aoka hasandratra ny lohasaha rehetra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: aoka haetry ny tendrombohitra sy ny havoana rehetra!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aoka ny be havoana ho tonga tany marina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny tany saro-dalana ho tonga lemaka!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Dia hiseho ny voninahitry NY TOMPO
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hiara-mahita izany ny nofo rehetra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny vavan’NY TOMPO no efa niteny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Injany misy miteny hoe: Miantsoa!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ary hoy ny navaliny: Inona anefa no antso hataoko?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ahitra ny nofo rehetra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tahaka ny vonin-javatra any an-tsaha ny hatsaran-tarehiny rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Maina ny ahitra, malazo ny voniny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: rehefa tsofin’ny fofonain’NY TOMPO.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Eny, ahitra tokoa ny olona:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Maina ny ahitra, malazo ny voniny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny tenin’Andriamanitsika
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia haharitra mandrakizay.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny vaovao mahafaly
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ry '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Ziona
  - type: text
    text: ', izay mitondra teny soa mahafaly ô,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: miakara any an-tendrombohitra avo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ry Jerosalema, izay mitondra teny soa mahafaly ô,
- type: usfm
  marker: q1
  children:
  - type: text
    text: asandrato mafy ny feonao, asandrato fa aza matahotra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'lazao amin’ny tanànan’ny Joda hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Indro Andriamanitrareo!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Indro NY TOMPO Andriamanitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho avy amin’ny heriny
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka ny sandriny ihany no hanapaka;
- type: usfm
  marker: q1
  children:
  - type: text
    text: indro, ny valim-pitia hatolony dia eny Aminy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny valin’asa homeny dia eo anoloany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Hitondra ny ondriny tahaka ny mpiandry ondry Izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny sandriny no hanangonany ny zanak’ondry
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hotrotroiny eo an-tratrany ireny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hotarihiny miadana ny ondrivavy mampinono.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Hampitahaina amin’iza moa NY TOMPO?
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Iza no nahafatra ny rano teo am-pelatanany
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy naharefy ny lanitra tamin’ny zehiny
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary nahavory ny vovo-tany ao anatin’ny famarana?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Iza no nahalanja ny tendrombohitra tamin’ny fandanjana
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny havoana tamin’ny mizana?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Iza no nanome hevitra ny Fanahin’NY TOMPO
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary iza no mpanolotsaina nampianatra Azy?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Tamin’iza no nifampidinihany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka nahazoany fahalalana?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Iza no nanoro Azy ny lalan’ny fitsarana
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy nampianatra fahalalana Azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary nampahafantatra Azy ny lalan’ny fahendrena?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Indro ny firenena dia tahaka ny rano indray mitete avy amin’ny siny
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary toy ny vovoka madinika amin’ny mizana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: indro ny nosy dia tahaka ny vovoka madinika entin’ny rivotra manidina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: I Libanona aza, tsy ampy hataina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny biby ao, tsy ampy hatao fanatitra dorana manontolo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Toy ny tsinontsinona eo anatrehany ny firenena rehetra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka ataony ho naman’ny tsinontsinona sy ny zava-poana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Koa ampitovinareo amin’iza moa Andriamanitra?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Endrik’inona no hampanahafinareo Azy?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ny mpahay taozavatra no mandrendrika sary vongana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny mpanefy volamena no mametaka takelaka volamena aminy
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy manao rojo volafotsy voarendrika.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Izay sahirana ka tsy manan-katerina
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia mifidy hazo tsy mety ho lo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mitady mpahay taozavatra
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hamorona sarin-javatra voasokitra izay tsy hihozongozona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Tsy fantatrareo va?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy renareo va?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy efa nambara taminareo taloha va?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy efa azonareo an-tsaina va
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny amin’ny fanorenan’ny tany?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Izy no mipetraka amin’ny habakabaka ambonin’ny tany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny mponina etỳ dia tahaka ny valala;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izy no mamelatra ny lanitra tahaka ny lamba manify
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary manenjana azy tahaka ny tranolay hitoerana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Izy no mahatsinontsinona ny mpanapaka
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy mahatonga ny mpitsara amin’ny tany ho tahaka ny zava-poana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Vao nambolena vetivety ireo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: vao nafafy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: vao namaka tao amin’ny tany ny fotony,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia notsofin’Andriamanitra ireo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka nalazo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary nindaosin’ny tafio-drivotra tahaka ny mololo izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Koa hampitovianareo amin’iza moa Aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hitahako aminy?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hoy ny Iray Masina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Asandrato ny masonareo ka mijere!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Iza no nahary ireny?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia Izy izay mamoaka ny tafik’ireny araka ny isany avy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Antsoiny amin’ny anarany avy izy rehetra
- type: usfm
  marker: q1
  children:
  - type: text
    text: noho ny tanjany lehibe sy ny heriny tsy toha
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy misy latsaka na dia iray akory aza.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Hery ho an’izay reraka
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Nahoana no miteny ianao, ry Jakoba ô,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ary milaza ianao, ry Israely hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Miafina tsy hitan’NY TOMPO ny lalako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mihelina tsy hitan’Andriamanitro ny rariny tokony ho ahy?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Tsy fantatrao va?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy efa renao va
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa Andriamanitra mandrakizay NY TOMPO
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay namorona ny faran’ny tany.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy mba mety ho reraka na sasatra Izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy takatry ny saina ny fahalalany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Mampahatanjaka ny reraka Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary izay kely hery dia ampitomboiny hery.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Na dia ny olona tanora aza dia ho reraka sy ho sasatra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary na dia ny zatovo aza dia mety ho tafintohina mafy;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: fa izay manantena NY TOMPO kosa dia mahazo hery vao.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elatra no hiakarany tahaka ny voromahery;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hihazakazaka izy, nefa tsy ho sasatra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: handeha izy, nefa tsy ho reraka.
