document_id: ISA.40,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: FIZARANA FAHAROA
  - type: heading
    content: Ampionony ny oloko
  - type: text
    content: Ampiononinareo, ampiononinareo ny oloko,
  - type: text
    content: hoy Andriamanitrareo.
  '10':
  - type: text
    content: Indro NY TOMPO Andriamanitra
  - type: text
    content: ho avy amin’ny heriny
  - type: text
    content: ka ny sandriny ihany no hanapaka;
  - type: text
    content: indro, ny valim-pitia hatolony dia eny Aminy
  - type: text
    content: ary ny valin’asa homeny dia eo anoloany.
  '11':
  - type: text
    content: Hitondra ny ondriny tahaka ny mpiandry ondry Izy,
  - type: text
    content: ny sandriny no hanangonany ny zanak’ondry
  - type: text
    content: ka hotrotroiny eo an-tratrany ireny,
  - type: text
    content: ary hotarihiny miadana ny ondrivavy mampinono.
  - type: heading
    content: Hampitahaina amin’iza moa NY TOMPO?
  '12':
  - type: text
    content: Iza no nahafatra ny rano teo am-pelatanany
  - type: text
    content: sy naharefy ny lanitra tamin’ny zehiny
  - type: text
    content: ary nahavory ny vovo-tany ao anatin’ny famarana?
  - type: text
    content: Iza no nahalanja ny tendrombohitra tamin’ny fandanjana
  - type: text
    content: sy ny havoana tamin’ny mizana?
  '13':
  - type: text
    content: Iza no nanome hevitra ny Fanahin’NY TOMPO
  - type: text
    content: ary iza no mpanolotsaina nampianatra Azy?
  '14':
  - type: text
    content: Tamin’iza no nifampidinihany
  - type: text
    content: ka nahazoany fahalalana?
  - type: text
    content: Iza no nanoro Azy ny lalan’ny fitsarana
  - type: text
    content: sy nampianatra fahalalana Azy
  - type: text
    content: ary nampahafantatra Azy ny lalan’ny fahendrena?
  '15':
  - type: text
    content: Indro ny firenena dia tahaka ny rano indray mitete avy amin’ny siny
  - type: text
    content: ary toy ny vovoka madinika amin’ny mizana;
  - type: text
    content: indro ny nosy dia tahaka ny vovoka madinika entin’ny rivotra manidina.
  '16':
  - type: text
    content: I Libanona aza, tsy ampy hataina,
  - type: text
    content: ary ny biby ao, tsy ampy hatao fanatitra dorana manontolo.
  '17':
  - type: text
    content: Toy ny tsinontsinona eo anatrehany ny firenena rehetra
  - type: text
    content: ka ataony ho naman’ny tsinontsinona sy ny zava-poana.
  '18':
  - type: text
    content: Koa ampitovinareo amin’iza moa Andriamanitra?
  - type: text
    content: Endrik’inona no hampanahafinareo Azy?
  '19':
  - type: text
    content: Ny mpahay taozavatra no mandrendrika sary vongana,
  - type: text
    content: ary ny mpanefy volamena no mametaka takelaka volamena aminy
  - type: text
    content: sy manao rojo volafotsy voarendrika.
  '2':
  - type: text
    content: Mitenena amin’ny fon’i Jerosalema ka ambarao aminy
  - type: text
    content: fa tapitra ny adiny
  - type: text
    content: sady voaonitra ny helony,
  - type: text
    content: ary efa nandray indroa heny
  - type: text
    content: tamin’ny tanan’NY TOMPO izy ho valin’ny fahotany rehetra.
  '20':
  - type: text
    content: Izay sahirana ka tsy manan-katerina
  - type: text
    content: dia mifidy hazo tsy mety ho lo
  - type: text
    content: ary mitady mpahay taozavatra
  - type: text
    content: mba hamorona sarin-javatra voasokitra izay tsy hihozongozona.
  '21':
  - type: text
    content: Tsy fantatrareo va?
  - type: text
    content: Tsy renareo va?
  - type: text
    content: Tsy efa nambara taminareo taloha va?
  - type: text
    content: Tsy efa azonareo an-tsaina va
  - type: text
    content: ny amin’ny fanorenan’ny tany?
  '22':
  - type: text
    content: Izy no mipetraka amin’ny habakabaka ambonin’ny tany,
  - type: text
    content: ary ny mponina etỳ dia tahaka ny valala;
  - type: text
    content: Izy no mamelatra ny lanitra tahaka ny lamba manify
  - type: text
    content: ary manenjana azy tahaka ny tranolay hitoerana.
  '23':
  - type: text
    content: Izy no mahatsinontsinona ny mpanapaka
  - type: text
    content: sy mahatonga ny mpitsara amin’ny tany ho tahaka ny zava-poana.
  '24':
  - type: text
    content: Vao nambolena vetivety ireo,
  - type: text
    content: vao nafafy,
  - type: text
    content: vao namaka tao amin’ny tany ny fotony,
  - type: text
    content: dia notsofin’Andriamanitra ireo
  - type: text
    content: ka nalazo,
  - type: text
    content: ary nindaosin’ny tafio-drivotra tahaka ny mololo izy.
  '25':
  - type: text
    content: Koa hampitovianareo amin’iza moa Aho,
  - type: text
    content: mba hitahako aminy?
  - type: text
    content: Hoy ny Iray Masina.
  '26':
  - type: text
    content: Asandrato ny masonareo ka mijere!
  - type: text
    content: Iza no nahary ireny?
  - type: text
    content: Dia Izy izay mamoaka ny tafik’ireny araka ny isany avy.
  - type: text
    content: Antsoiny amin’ny anarany avy izy rehetra
  - type: text
    content: noho ny tanjany lehibe sy ny heriny tsy toha
  - type: text
    content: ka tsy misy latsaka na dia iray akory aza.
  - type: heading
    content: Hery ho an’izay reraka
  '27':
  - type: text
    content: Nahoana no miteny ianao, ry Jakoba ô,
  - type: text
    content: 'ary milaza ianao, ry Israely hoe:'
  - type: text
    content: Miafina tsy hitan’NY TOMPO ny lalako,
  - type: text
    content: ary mihelina tsy hitan’Andriamanitro ny rariny tokony ho ahy?
  '28':
  - type: text
    content: Tsy fantatrao va?
  - type: text
    content: Tsy efa renao va
  - type: text
    content: fa Andriamanitra mandrakizay NY TOMPO
  - type: text
    content: izay namorona ny faran’ny tany.
  - type: text
    content: Tsy mba mety ho reraka na sasatra Izy;
  - type: text
    content: tsy takatry ny saina ny fahalalany.
  '29':
  - type: text
    content: Mampahatanjaka ny reraka Izy
  - type: text
    content: ary izay kely hery dia ampitomboiny hery.
  '3':
  - type: text
    content: 'Injany misy feo miantso hoe:'
  - type: text
    content: Savaonareo ny lalana ho an’NY TOMPO
  - type: text
    content: any an-tany efitra!
  - type: text
    content: Manaova ianareo lalambe ho an’Andriamanitsika
  - type: text
    content: any an-tany foana!
  '30':
  - type: text
    content: Na dia ny olona tanora aza dia ho reraka sy ho sasatra,
  - type: text
    content: ary na dia ny zatovo aza dia mety ho tafintohina mafy;
  '31':
  - type: text
    content: fa izay manantena NY TOMPO kosa dia mahazo hery vao.
  - type: text
    content: Elatra no hiakarany tahaka ny voromahery;
  - type: text
    content: hihazakazaka izy, nefa tsy ho sasatra,
  - type: text
    content: handeha izy, nefa tsy ho reraka.
  '4':
  - type: text
    content: Aoka hasandratra ny lohasaha rehetra,
  - type: text
    content: aoka haetry ny tendrombohitra sy ny havoana rehetra!
  - type: text
    content: Aoka ny be havoana ho tonga tany marina,
  - type: text
    content: ary ny tany saro-dalana ho tonga lemaka!
  '5':
  - type: text
    content: Dia hiseho ny voninahitry NY TOMPO
  - type: text
    content: ary hiara-mahita izany ny nofo rehetra;
  - type: text
    content: fa ny vavan’NY TOMPO no efa niteny.
  '6':
  - type: text
    content: 'Injany misy miteny hoe: Miantsoa!'
  - type: text
    content: 'Ary hoy ny navaliny: Inona anefa no antso hataoko?'
  - type: text
    content: Ahitra ny nofo rehetra,
  - type: text
    content: tahaka ny vonin-javatra any an-tsaha ny hatsaran-tarehiny rehetra.
  '7':
  - type: text
    content: Maina ny ahitra, malazo ny voniny,
  - type: text
    content: rehefa tsofin’ny fofonain’NY TOMPO.
  - type: text
    content: 'Eny, ahitra tokoa ny olona:'
  '8':
  - type: text
    content: Maina ny ahitra, malazo ny voniny,
  - type: text
    content: fa ny tenin’Andriamanitsika
  - type: text
    content: dia haharitra mandrakizay.
  - type: heading
    content: Ny vaovao mahafaly
  '9':
  - type: text
    content: 'Ry '
  - type: text
    content: Ziona
  - type: text
    content: ', izay mitondra teny soa mahafaly ô,'
  - type: text
    content: miakara any an-tendrombohitra avo;
  - type: text
    content: ry Jerosalema, izay mitondra teny soa mahafaly ô,
  - type: text
    content: asandrato mafy ny feonao, asandrato fa aza matahotra;
  - type: text
    content: 'lazao amin’ny tanànan’ny Joda hoe:'
  - type: text
    content: Indro Andriamanitrareo!
