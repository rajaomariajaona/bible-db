document_id: PSA.43,3103
type_code: plt
verses:
  '1':
  - type: text
    content: Omeo rariny aho Andriamanitra ô,
  - type: text
    content: alaharo ny teniko mba handreseko ireo firenena tsy manana famindrampo!
  - type: text
    content: Vonjeo aho ho afaka amin’ny lehilahy mpamitaka sy mpanao heloka!
  '2':
  - type: text
    content: Fa Ianao no Andriamanitra fiarovana mafy ho ahy; nahoana no manary ahy Ianao?
  - type: text
    content: Nahoana no mandeha mijoretra aho
  - type: text
    content: noho ny fampahorian’ny fahavaloko?
  '3':
  - type: text
    content: Iraho ny fahazavanao sy ny fahamarinanao!
  - type: text
    content: Aoka hitarika ahy ireo
  - type: text
    content: ka hitondra ahy ho any amin’ny tendrombohitrao masina, any amin’ny tabernakelinao!
  '4':
  - type: text
    content: Hankany amin’ny alitaran’Andriamanitra aho,
  - type: text
    content: dia any amin’Andriamanitry ny fifaliako sy ny firavoravoako;
  - type: text
    content: hidera Anao amin’ny lokanga aho ry Andriamanitra ô, Andriamanitro Ianao!
  '5':
  - type: text
    content: Nahoana no mitanondrika ianao ry fanahiko?
  - type: text
    content: Nahoana no mitoloko ato anatiko ianao?
  - type: text
    content: Manantenà an’Andriamanitra!
  - type: text
    content: Fa mbola hidera Azy ihany aho;
  - type: text
    content: Izy no famonjena ahy sady Andriamanitro.
