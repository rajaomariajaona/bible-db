document_id: PSA.43
type_code: plt
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Omeo rariny aho Andriamanitra ô,
- type: usfm
  marker: q1
  children:
  - type: text
    text: alaharo ny teniko mba handreseko ireo firenena tsy manana famindrampo!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vonjeo aho ho afaka amin’ny lehilahy mpamitaka sy mpanao heloka!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Fa Ianao no Andriamanitra fiarovana mafy ho ahy; nahoana no manary ahy Ianao?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nahoana no mandeha mijoretra aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: noho ny fampahorian’ny fahavaloko?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Iraho ny fahazavanao sy ny fahamarinanao!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aoka hitarika ahy ireo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hitondra ahy ho any amin’ny tendrombohitrao masina, any amin’ny tabernakelinao!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Hankany amin’ny alitaran’Andriamanitra aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia any amin’Andriamanitry ny fifaliako sy ny firavoravoako;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hidera Anao amin’ny lokanga aho ry Andriamanitra ô, Andriamanitro Ianao!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Nahoana no mitanondrika ianao ry fanahiko?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nahoana no mitoloko ato anatiko ianao?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Manantenà an’Andriamanitra!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa mbola hidera Azy ihany aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izy no famonjena ahy sady Andriamanitro.
