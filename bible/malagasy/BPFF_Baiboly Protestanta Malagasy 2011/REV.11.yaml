document_id: REV.11,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny vavolombelona roa
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nomena volotara tahaka ny tehina aho ka nisy nilaza tamiko hoe: Mitsangàna ka refeso ny tempolin’Andriamanitra sy ny alitara ary isao izay mivavaka ao. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ny mponina ambonin’ny tany dia mifaly azy ka hiravoravo, ary hifanatitra fanomezana izy satria nampangirifiry ny mponina ambonin’ny tany ireo mpaminany roa ireo.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa afaka ny telo andro sy tapany dia nisy fanahin’aina avy tamin’Andriamanitra niditra tao anatin’ireo dia nijoro tamin’ny tongony izy ka raiki-tahotra indrindra izay nahita azy. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nandre feo mahery avy tany an-danitra izy roa lahy niteny taminy hoe: Miakara atỳ! Dia niakatra ho any an-danitra tao anatin’ny rahona ireo, ary nahita azy ny fahavalony. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tamin’izany ora izany dia nisy horohoron-tany mafy ka rava ny ampahafolon’ny tanàna ary maty tamin’izany horohoron-tany izany ny olona fito arivo; ary raiki-tahotra ny olona sisa ka nanome voninahitra an’Andriamanitry ny lanitra.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Lasa ny loza faharoa. Indro, avy haingana ny loza fahatelo.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny trompetra fahafito
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nitsoka ny anjely fahafito dia nisy feo mafy tany an-danitra niteny hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fanjakana amin’izao tontolo izao dia lasan’ny Tompontsika sy ny Kristiny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hanjaka mandrakizay mandrakizay Izy!
  '16':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Ary ny loholona efatra amby roapolo izay mipetraka eo ambonin’ny sezafiandrianany eo anatrehan’Andriamanitra, dia niankohoka tamin’ny tany ka nivavaka tamin’Andriamanitra '
  '17':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Misaotra Anao izahay,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tompo ô, Andriamanitra Tsitoha,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ilay ankehitriny sy taloha
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria nasehonao ny herinao lehibe
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka nampiorina ny fanjakanao Ianao.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tezitra ny firenena maro
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa tonga ny fahatezeranao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny fotoana hitsarana ny maty,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hanomezana valim-pitia ny mpaminany mpanomponao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny olona masina ary izay matahotra ny anaranao, na kely na lehibe,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mba hanimbanao izay manimba ny tany.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary novohana ny tempolin’Andriamanitra any an-danitra ka niseho tao anatin’ny tempoliny ny vata misy ny fanekeny; ary nisy tselatra, feo, kotrokorana, horohoron-tany ary havandra vaventy.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ny kianja eo ivelan’ny tempoly dia avelao fa aza refesina fa nomena ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jentilisa
    - type: text
      text: ' izany; hanitsakitsaka ny tanàna masina roa amby efapolo volana izy. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary homeko hery ny vavolombeloko roa ka haminany enimpolo sy roanjato sy arivo andro izy sady hitafy lamba fisaonana. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ireo ny hazo oliva roa sy ny fitoeran-jiro roa, izay mijoro eo anatrehan’ny Tompon’ny tany. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary raha misy ta handratra ireo dia misy afo mivoaka amin’ny vavany ka mandany ny fahavalony. Eny, raha misy ta handratra ireo dia toy izany no tsy maintsy hamonoana azy. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izy ireo dia manana fahefana handrindrina ny lanitra mba tsy hilatsahan’ny ranonorana amin’ny andro aminaniany; ary manana fahefana amin’ny rano koa izy hampody azy ho ra sy hamely ny tany amin’ny loza araka izay andro tiany na oviana na oviana.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa tanteraka ny fanambaràny dia hiady aminy ilay bibidia miakatra avy amin’ny lavaka tsy hita noanoa ka haharesy sy hahafaty azy. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny fatiny dia hiampatra eny an-dalambe amin’ny tanàna lehibe, izay adika araka ny hevi-panahy hoe Sodoma sy Ejipta, sady tao koa no nanomboana ny Tompony tamin’ny hazofijaliana. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny olom-pirenena, ny fokom-pirenena, ny samihafa fiteny ary ny firenena maro dia misy mijery ny fatiny telo andro sy tapany; ary tsy avelany halevina am-pasana ny fatiny. '
