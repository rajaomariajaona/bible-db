document_id: PSA.89
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Aiza ireo fanekena tamin’i Davida?
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: Maskila nataon’i Etana ezrahita
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ny famindrampon’NY TOMPO no hohiraiko mandrakariva;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hatramin’ny taranaka fara aman-dimby no hampahafantaran’ny vavako ny fahamarinanao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Fa hoy aho: Hotovonana mandrakizay ny famindrampo;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny fahamarinanao no hampitoerinao any an-danitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Efa nanao fanekena tamin’ny Voafidiko Aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'eny, efa nianiana tamin’i Davida mpanompoko Aho hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Hampitoetra ny taranakao ho mandrakizay Aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ka hanangana ny sezafiandriananao hatramin’ny taranaka fara aman-dimby. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Fiatoana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Hidera ny fahagagana ataonao ny lanitra, TOMPO ô,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary eo amin’ny fivorian’ny masina koa ny fahamarinanao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Fa iza any an-danitra no mitovy amin’NY TOMPO?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary iza amin’ny zanak’ireo andriamanitra no afa-mitaha amin’NY TOMPO?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Andriamanitra mahatahotra indrindra eo amin’ny filankevitr’ireo masina
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hatahoran’izay rehetra manodidina Azy fatratra?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: RY TOMPO, Andriamanitra Tompon’izao rehetra izao ô, iza no mahery tahaka Anao, TOMPO ô?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Manodidina Anao ny fahamarinanao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ianao manapaka ny fisavoanan’ny ranomasina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: raha manonja ny alondrano dia mampitsahatra azy Ianao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ianao no nanorotoro an’i Rahaba ho tahaka izay voavono;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny sandrinao mahery no nampielezanao ny fahavalonao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Anao ny lanitra, anao koa ny tany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: izao tontolo izao sy izay rehetra eo aminy, Ianao no nanorina azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ny avaratra sy ny atsimo, Ianao no nahary azy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny anaranao no ihobian’i Tabara sy i Hermona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Manan-tsandry mahery Ianao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mahery ny tananao, misandratra ny tananao ankavanana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Rariny sy fitsarana marina no fanorenan’ny sezafiandriananao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: famindrampo sy fahamarinana no mialoha ny tavanao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Sambatra izay firenena mahalala ny feo fihobiana!
- type: usfm
  marker: q1
  children:
  - type: text
    text: TOMPO ô, amin’ny fahazavan’ny tavanao no andehanany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ny anaranao no ifaliany mandrakariva
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny fahamarinanao no isandratany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Fa voninahitry ny heriny Ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary amin’ny fankasitrahanao no isandratan’ny tandrokay.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Fa an’NY TOMPO ny ampinganay;
- type: usfm
  marker: q1
  children:
  - type: text
    text: an’ny Iray Masin’ny Israely ny mpanjakanay.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Tamin’izany ny olonao masina dia nilazanao tamin’ny fahitana hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nametraka famonjena tamin’ny mpiady mahery iray Aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary nanandratra zatovo iray teo amin’ny olona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Nahita an’i Davida mpanompoko Aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny diloiloko masina no nanosorako azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Izy no homban’ny tanako;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, ny sandriko no hampahery azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Tsy hamitaka azy ny fahavalo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy hampahory azy ny ratsy fanahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Fa handripaka ny fahavalony eo anoloany Aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady hamely izay mankahala azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Ny fahamarinako sy ny famindrampoko no homba azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ary amin’ny anarako no hisandratan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tandrony
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Dia hampitoetra ny tanany amin’ny ranomasina Aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny tanany havanana amin’ny ony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Izy hiantso Ahy hoe: Raiko Ianao,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Andriamanitro sy vatolampin’ny famonjena ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Izaho kosa hanao azy ho lahimatoa
- type: usfm
  marker: q1
  children:
  - type: text
    text: ambony indrindra amin’ny mpanjakan’ny tany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Hitahiry ny famindrampoko ho azy mandrakizay Aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny fanekeko dia hampaharetiko aminy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Hampaharitra ny taranany ho mandrakizay Aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny sezafiandrianany dia ho tahaka ny faharetan’ny lanitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Raha mahafoy ny lalànako ny zanany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy mandeha araka ny fitsipiko,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: raha ny fitsipiko no hamavoiny
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny didiko no tsy tandremany,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: dia hovalìko tsorakazo ny fahadisoany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hovalìko kapoka ny helony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Kanefa ny famindrampoko tsy hofoanako aminy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy havadiko ny fahamarinako;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: tsy hivadihako ny fanekeko
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy hovako ny nolazain’ny molotro.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Izao zavatra iray loha izao no nianianako tamin’ny fahamasinako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'tsy handainga amin’i Davida mihitsy Aho:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Ny taranany dia haharitra mandrakizay
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny sezafiandrianany dia ho tahaka ny masoandro eo anatrehako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Hampitoerina mandrakizay tahaka ny volana izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'tahaka ny vavolombelona marina any an-danitra. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Fiatoana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Kanefa narianao sy nolavinao izy!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Tezitra tamin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Voahosotrao
  - type: text
    text: ' Ianao!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Nofoananao ny fanekena tamin’ny mpanomponao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: nolotoinao ny satroboninahiny ka narianao tamin’ny tany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Noravanao ny fefiny rehetra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: nosimbanao ny fiarovany mafy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: Izay rehetra mandalo eny an-dalana dia mandroba azy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tonga fandatsan’ny mpiaramonina aminy izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: Nampisandratra ny tanana havanan’ny rafilahiny Ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary nampifaly ny fahavalony rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: Nampihemotra ny lelan’ny sabany Ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy nampaharitra azy tamin’ny ady.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: Nampitsahatra ny voninahiny Ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka nanongana ny sezafiandrianany ho amin’ny tany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: Nanafohy ny andron’ny fahatanorany Ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ary nanaron-kenatra azy. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Fiatoana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: Mandra-pahoviana, TOMPO ô? Hiery mandrakizay va Ianao?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hirehitra tahaka ny afo va ny fahatezeranao?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: Tsarovy ny hafohin’ny androko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: toa zava-poana mihitsy ny namoronanao ny zanak’olombelona rehetra!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: Iza no lehilahy ho velona ka tsy hahita fahafatesana
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'fa hahavonjy ny tenany tsy ho azon’ny '
