document_id: PSA.89,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Aiza ireo fanekena tamin’i Davida?
  - type: text
    content: Maskila nataon’i Etana ezrahita
  - type: text
    content: Ny famindrampon’NY TOMPO no hohiraiko mandrakariva;
  - type: text
    content: hatramin’ny taranaka fara aman-dimby no hampahafantaran’ny vavako ny fahamarinanao.
  '10':
  - type: text
    content: Ianao no nanorotoro an’i Rahaba ho tahaka izay voavono;
  - type: text
    content: ny sandrinao mahery no nampielezanao ny fahavalonao.
  '11':
  - type: text
    content: Anao ny lanitra, anao koa ny tany;
  - type: text
    content: izao tontolo izao sy izay rehetra eo aminy, Ianao no nanorina azy.
  '12':
  - type: text
    content: Ny avaratra sy ny atsimo, Ianao no nahary azy;
  - type: text
    content: ny anaranao no ihobian’i Tabara sy i Hermona.
  '13':
  - type: text
    content: Manan-tsandry mahery Ianao;
  - type: text
    content: mahery ny tananao, misandratra ny tananao ankavanana.
  '14':
  - type: text
    content: Rariny sy fitsarana marina no fanorenan’ny sezafiandriananao;
  - type: text
    content: famindrampo sy fahamarinana no mialoha ny tavanao.
  '15':
  - type: text
    content: Sambatra izay firenena mahalala ny feo fihobiana!
  - type: text
    content: TOMPO ô, amin’ny fahazavan’ny tavanao no andehanany.
  '16':
  - type: text
    content: Ny anaranao no ifaliany mandrakariva
  - type: text
    content: ary ny fahamarinanao no isandratany.
  '17':
  - type: text
    content: Fa voninahitry ny heriny Ianao
  - type: text
    content: ary amin’ny fankasitrahanao no isandratan’ny tandrokay.
  '18':
  - type: text
    content: Fa an’NY TOMPO ny ampinganay;
  - type: text
    content: an’ny Iray Masin’ny Israely ny mpanjakanay.
  '19':
  - type: text
    content: 'Tamin’izany ny olonao masina dia nilazanao tamin’ny fahitana hoe:'
  - type: text
    content: Nametraka famonjena tamin’ny mpiady mahery iray Aho
  - type: text
    content: ary nanandratra zatovo iray teo amin’ny olona.
  '2':
  - type: text
    content: 'Fa hoy aho: Hotovonana mandrakizay ny famindrampo;'
  - type: text
    content: ny fahamarinanao no hampitoerinao any an-danitra.
  '20':
  - type: text
    content: Nahita an’i Davida mpanompoko Aho;
  - type: text
    content: ny diloiloko masina no nanosorako azy.
  '21':
  - type: text
    content: Izy no homban’ny tanako;
  - type: text
    content: eny, ny sandriko no hampahery azy.
  '22':
  - type: text
    content: Tsy hamitaka azy ny fahavalo
  - type: text
    content: ary tsy hampahory azy ny ratsy fanahy.
  '23':
  - type: text
    content: Fa handripaka ny fahavalony eo anoloany Aho
  - type: text
    content: sady hamely izay mankahala azy.
  '24':
  - type: text
    content: Ny fahamarinako sy ny famindrampoko no homba azy
  - type: text
    content: 'ary amin’ny anarako no hisandratan’ny '
  - type: text
    content: tandrony
  - type: text
    content: .
  '25':
  - type: text
    content: Dia hampitoetra ny tanany amin’ny ranomasina Aho
  - type: text
    content: ary ny tanany havanana amin’ny ony.
  '26':
  - type: text
    content: 'Izy hiantso Ahy hoe: Raiko Ianao,'
  - type: text
    content: Andriamanitro sy vatolampin’ny famonjena ahy.
  '27':
  - type: text
    content: Izaho kosa hanao azy ho lahimatoa
  - type: text
    content: ambony indrindra amin’ny mpanjakan’ny tany.
  '28':
  - type: text
    content: Hitahiry ny famindrampoko ho azy mandrakizay Aho
  - type: text
    content: ary ny fanekeko dia hampaharetiko aminy.
  '29':
  - type: text
    content: Hampaharitra ny taranany ho mandrakizay Aho
  - type: text
    content: ary ny sezafiandrianany dia ho tahaka ny faharetan’ny lanitra.
  '3':
  - type: text
    content: Efa nanao fanekena tamin’ny Voafidiko Aho;
  - type: text
    content: 'eny, efa nianiana tamin’i Davida mpanompoko Aho hoe:'
  '30':
  - type: text
    content: Raha mahafoy ny lalànako ny zanany
  - type: text
    content: ka tsy mandeha araka ny fitsipiko,
  '31':
  - type: text
    content: raha ny fitsipiko no hamavoiny
  - type: text
    content: ary ny didiko no tsy tandremany,
  '32':
  - type: text
    content: dia hovalìko tsorakazo ny fahadisoany,
  - type: text
    content: ary hovalìko kapoka ny helony.
  '33':
  - type: text
    content: Kanefa ny famindrampoko tsy hofoanako aminy
  - type: text
    content: ary tsy havadiko ny fahamarinako;
  '34':
  - type: text
    content: tsy hivadihako ny fanekeko
  - type: text
    content: ary tsy hovako ny nolazain’ny molotro.
  '35':
  - type: text
    content: Izao zavatra iray loha izao no nianianako tamin’ny fahamasinako,
  - type: text
    content: 'tsy handainga amin’i Davida mihitsy Aho:'
  '36':
  - type: text
    content: Ny taranany dia haharitra mandrakizay
  - type: text
    content: ary ny sezafiandrianany dia ho tahaka ny masoandro eo anatrehako.
  '37':
  - type: text
    content: Hampitoerina mandrakizay tahaka ny volana izy,
  - type: text
    content: 'tahaka ny vavolombelona marina any an-danitra. '
  - type: text
    content: Fiatoana.
  '38':
  - type: text
    content: Kanefa narianao sy nolavinao izy!
  - type: text
    content: 'Tezitra tamin’ny '
  - type: text
    content: Voahosotrao
  - type: text
    content: ' Ianao!'
  '39':
  - type: text
    content: Nofoananao ny fanekena tamin’ny mpanomponao;
  - type: text
    content: nolotoinao ny satroboninahiny ka narianao tamin’ny tany.
  '4':
  - type: text
    content: Hampitoetra ny taranakao ho mandrakizay Aho
  - type: text
    content: 'ka hanangana ny sezafiandriananao hatramin’ny taranaka fara aman-dimby. '
  - type: text
    content: Fiatoana.
  '40':
  - type: text
    content: Noravanao ny fefiny rehetra;
  - type: text
    content: nosimbanao ny fiarovany mafy.
  '41':
  - type: text
    content: Izay rehetra mandalo eny an-dalana dia mandroba azy;
  - type: text
    content: tonga fandatsan’ny mpiaramonina aminy izy.
  '42':
  - type: text
    content: Nampisandratra ny tanana havanan’ny rafilahiny Ianao
  - type: text
    content: ary nampifaly ny fahavalony rehetra.
  '43':
  - type: text
    content: Nampihemotra ny lelan’ny sabany Ianao
  - type: text
    content: ka tsy nampaharitra azy tamin’ny ady.
  '44':
  - type: text
    content: Nampitsahatra ny voninahiny Ianao
  - type: text
    content: ka nanongana ny sezafiandrianany ho amin’ny tany.
  '45':
  - type: text
    content: Nanafohy ny andron’ny fahatanorany Ianao
  - type: text
    content: 'ary nanaron-kenatra azy. '
  - type: text
    content: Fiatoana.
  '46':
  - type: text
    content: Mandra-pahoviana, TOMPO ô? Hiery mandrakizay va Ianao?
  - type: text
    content: Hirehitra tahaka ny afo va ny fahatezeranao?
  '47':
  - type: text
    content: Tsarovy ny hafohin’ny androko;
  - type: text
    content: toa zava-poana mihitsy ny namoronanao ny zanak’olombelona rehetra!
  '48':
  - type: text
    content: Iza no lehilahy ho velona ka tsy hahita fahafatesana
  - type: text
    content: 'fa hahavonjy ny tenany tsy ho azon’ny '
  - type: text
    content: fitoeran’ny maty
  - type: text
    content: '? '
  - type: text
    content: Fiatoana.
  '49':
  - type: text
    content: Tompo ô, aiza ny famindramponao fahiny
  - type: text
    content: izay nianiananao tamin’i Davida tamin’ny fahamarinanao?
  '5':
  - type: text
    content: Hidera ny fahagagana ataonao ny lanitra, TOMPO ô,
  - type: text
    content: ary eo amin’ny fivorian’ny masina koa ny fahamarinanao.
  '50':
  - type: text
    content: Tompo ô, tsarovy ny latsa manjo ny mpanomponao;
  - type: text
    content: ny tratrako dia mivesatra ny firenena marobe,
  '51':
  - type: text
    content: dia ny nandatsan’ny fahavalonao, TOMPO ô,
  - type: text
    content: Eny, ny nandatsany ny dian’ny Voahosotrao!
  '52':
  - type: text
    content: Isaorana mandrakizay anie NY TOMPO! Amena! Eny, Amena!
  '6':
  - type: text
    content: Fa iza any an-danitra no mitovy amin’NY TOMPO?
  - type: text
    content: Ary iza amin’ny zanak’ireo andriamanitra no afa-mitaha amin’NY TOMPO?
  '7':
  - type: text
    content: Andriamanitra mahatahotra indrindra eo amin’ny filankevitr’ireo masina
  - type: text
    content: ary hatahoran’izay rehetra manodidina Azy fatratra?
  '8':
  - type: text
    content: RY TOMPO, Andriamanitra Tompon’izao rehetra izao ô, iza no mahery tahaka Anao, TOMPO ô?
  - type: text
    content: Manodidina Anao ny fahamarinanao.
  '9':
  - type: text
    content: Ianao manapaka ny fisavoanan’ny ranomasina;
  - type: text
    content: raha manonja ny alondrano dia mampitsahatra azy Ianao.
