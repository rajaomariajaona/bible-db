document_id: ISA.2
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Hirohotra ho any Jerosalema ny firenena rehetra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ny tenin’Isaia, zanak’i Amoza, ny amin’izay hitany momba ny Joda sy i Jerosalema.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Izao no ho tonga any am-parany:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny tendrombohitra misy ny tranon’NY TOMPO
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ho tafaorina eo an-tampon’ny tendrombohitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hasandratra ho avo noho ny havoana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny firenena rehetra no hitanjozotra hankany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Eny, olona marobe no hiainga ka hiteny hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Andeha isika hiakatra any amin’ny tendrombohitry NY TOMPO,
- type: usfm
  marker: q1
  children:
  - type: text
    text: any amin’ny tranon’Andriamanitr’i Jakoba!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mba hampianarany antsika ny amin’ny lalany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy handehanantsika amin’izay tokony haleha.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Fa avy any '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Ziona
  - type: text
    text: ' no hivoahan’ny lalàna,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary avy any Jerosalema ny tenin’NY TOMPO.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ho mpitsara ny firenena Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka ho mpanelanelana amin’ny firenena maro.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia hanefy ny sabany ho angady ireny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny lefony ho hetim-boaloboka;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny firenena dia tsy hanainga sabatra hamely firenena hafa
- type: usfm
  marker: q1
  children:
  - type: text
    text: na hianatra ady intsony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ry taranak’i Jakoba,
- type: usfm
  marker: q1
  children:
  - type: text
    text: avia, ary aoka isika handeha amin’ny fahazavan’NY TOMPO!
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny Andron’NY TOMPO, andro fitsarana
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Fa efa nanary ny taranak’i Jakoba olonao Ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria feno ny fanaon’ny avy any atsinanana
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay mpanandro tahaka ny Filistina izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady nanao fanekena tamin’ny zana-bahiny;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: feno volafotsy sy volamena ny taniny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy hita lany ny harenany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: feno soavaly ny taniny
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy hita isa ny kalesy fitondrany miady.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Feno andriamanitra tsy izy ny taniny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eo anatrehan’ny asan’ny tanany no iankohofany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia eo anoloan’izay nataon’ny rantsantanany;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Koa hatao mitanondrika ny zanak’olombelona
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary haetry ny olona;
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa aza mamela ny helony Ianao!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Midira ao amin’ny vatolampy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary miere ao amin’ny vovoka
- type: usfm
  marker: q1
  children:
  - type: text
    text: noho ny tahotra NY TOMPO
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny voninahitry ny fahalehibiazany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ny fiandranandran’ny mason’ny zanak’olombelona dia haetry
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny fiavonavonan’ny olona dia hatao mitanondrika;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa NY TOMPO ihany no hisandratra amin’izany andro izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Satria misy Andron’Andriamanitra, Tompon’izao rehetra izao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hitsarana izay mpiavonavona sy mpirehareha rehetra
- type: usfm
  marker: q1
  children:
  - type: text
    text: mbamin’izay misandratra rehetra ka hanetrena ireny,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: dia ny sedera rehetra any Libanona izay avo sady manerinerina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny hazo oaka rehetra any Basana,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ny tendrombohitra avo rehetra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny havoana manerinerina,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ny tilikambo fiambenana miringiringy rehetra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny manda mafy rehetra,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ny sambon’i Tarsisy rehetra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny taozavatra tsara tarehy rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Hatao mitanondrika ny fireharehan’ny zanak’olombelona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny fiavonavonan’ny olona dia haetry;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa NY TOMPO ihany no hisandratra amin’izany andro izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ny andriamanitra tsy izy dia ho foana avokoa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Hiditra any amin’ny zohy ao amin’ny lavabato
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy any amin’ny lavaka feno vovoka ny olona
- type: usfm
  marker: q1
  children:
  - type: text
    text: noho ny tahotra NY TOMPO
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny voninahitry ny fahalehibiazany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: rehefa mitsangana hampihorohoro ny tany Izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Amin’izany andro izany dia harian’ny olona
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho an’ny voalavo sy ny ramanavy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny andriamanitra volafotsiny
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny andriamanitra volamenany
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay nataony hiankohofany eo anatrehany;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: hiditra amin’ny triatra amin’ny vatolampy
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy any an-tsefatsefaky ny harambato izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: noho ny tahotra NY TOMPO
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny voninahitry ny fahalehibiazany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: rehefa mitsangana hampihorohoro ny tany Izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Mitsahara fa aza mitoky amin’ny olombelona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fofonaina ihany no eo am-bavorony,
- type: usfm
  marker: q1
  children:
  - type: text
    text: koa zinona moa izy?
