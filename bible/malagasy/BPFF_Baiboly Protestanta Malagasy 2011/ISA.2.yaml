document_id: ISA.2,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Hirohotra ho any Jerosalema ny firenena rehetra
  - type: text
    content: Ny tenin’Isaia, zanak’i Amoza, ny amin’izay hitany momba ny Joda sy i Jerosalema.
  '10':
  - type: text
    content: Midira ao amin’ny vatolampy
  - type: text
    content: ary miere ao amin’ny vovoka
  - type: text
    content: noho ny tahotra NY TOMPO
  - type: text
    content: sy ny voninahitry ny fahalehibiazany.
  '11':
  - type: text
    content: Ny fiandranandran’ny mason’ny zanak’olombelona dia haetry
  - type: text
    content: ary ny fiavonavonan’ny olona dia hatao mitanondrika;
  - type: text
    content: fa NY TOMPO ihany no hisandratra amin’izany andro izany.
  '12':
  - type: text
    content: Satria misy Andron’Andriamanitra, Tompon’izao rehetra izao,
  - type: text
    content: hitsarana izay mpiavonavona sy mpirehareha rehetra
  - type: text
    content: mbamin’izay misandratra rehetra ka hanetrena ireny,
  '13':
  - type: text
    content: dia ny sedera rehetra any Libanona izay avo sady manerinerina,
  - type: text
    content: ny hazo oaka rehetra any Basana,
  '14':
  - type: text
    content: ny tendrombohitra avo rehetra,
  - type: text
    content: ny havoana manerinerina,
  '15':
  - type: text
    content: ny tilikambo fiambenana miringiringy rehetra,
  - type: text
    content: ny manda mafy rehetra,
  '16':
  - type: text
    content: ny sambon’i Tarsisy rehetra
  - type: text
    content: ary ny taozavatra tsara tarehy rehetra.
  '17':
  - type: text
    content: Hatao mitanondrika ny fireharehan’ny zanak’olombelona,
  - type: text
    content: ary ny fiavonavonan’ny olona dia haetry;
  - type: text
    content: Fa NY TOMPO ihany no hisandratra amin’izany andro izany.
  '18':
  - type: text
    content: Ny andriamanitra tsy izy dia ho foana avokoa.
  '19':
  - type: text
    content: Hiditra any amin’ny zohy ao amin’ny lavabato
  - type: text
    content: sy any amin’ny lavaka feno vovoka ny olona
  - type: text
    content: noho ny tahotra NY TOMPO
  - type: text
    content: sy ny voninahitry ny fahalehibiazany,
  - type: text
    content: rehefa mitsangana hampihorohoro ny tany Izy.
  '2':
  - type: text
    content: 'Izao no ho tonga any am-parany:'
  - type: text
    content: Ny tendrombohitra misy ny tranon’NY TOMPO
  - type: text
    content: dia ho tafaorina eo an-tampon’ny tendrombohitra,
  - type: text
    content: ary hasandratra ho avo noho ny havoana,
  - type: text
    content: ary ny firenena rehetra no hitanjozotra hankany.
  '20':
  - type: text
    content: Amin’izany andro izany dia harian’ny olona
  - type: text
    content: ho an’ny voalavo sy ny ramanavy
  - type: text
    content: ny andriamanitra volafotsiny
  - type: text
    content: sy ny andriamanitra volamenany
  - type: text
    content: izay nataony hiankohofany eo anatrehany;
  '21':
  - type: text
    content: hiditra amin’ny triatra amin’ny vatolampy
  - type: text
    content: sy any an-tsefatsefaky ny harambato izy,
  - type: text
    content: noho ny tahotra NY TOMPO
  - type: text
    content: sy ny voninahitry ny fahalehibiazany,
  - type: text
    content: rehefa mitsangana hampihorohoro ny tany Izy.
  '22':
  - type: text
    content: Mitsahara fa aza mitoky amin’ny olombelona,
  - type: text
    content: fofonaina ihany no eo am-bavorony,
  - type: text
    content: koa zinona moa izy?
  '3':
  - type: text
    content: 'Eny, olona marobe no hiainga ka hiteny hoe:'
  - type: text
    content: Andeha isika hiakatra any amin’ny tendrombohitry NY TOMPO,
  - type: text
    content: any amin’ny tranon’Andriamanitr’i Jakoba!
  - type: text
    content: Mba hampianarany antsika ny amin’ny lalany,
  - type: text
    content: sy handehanantsika amin’izay tokony haleha.
  - type: text
    content: 'Fa avy any '
  - type: text
    content: Ziona
  - type: text
    content: ' no hivoahan’ny lalàna,'
  - type: text
    content: ary avy any Jerosalema ny tenin’NY TOMPO.
  '4':
  - type: text
    content: Ho mpitsara ny firenena Izy
  - type: text
    content: ka ho mpanelanelana amin’ny firenena maro.
  - type: text
    content: Dia hanefy ny sabany ho angady ireny,
  - type: text
    content: ary ny lefony ho hetim-boaloboka;
  - type: text
    content: ny firenena dia tsy hanainga sabatra hamely firenena hafa
  - type: text
    content: na hianatra ady intsony.
  '5':
  - type: text
    content: Ry taranak’i Jakoba,
  - type: text
    content: avia, ary aoka isika handeha amin’ny fahazavan’NY TOMPO!
  - type: heading
    content: Ny Andron’NY TOMPO, andro fitsarana
  '6':
  - type: text
    content: Fa efa nanary ny taranak’i Jakoba olonao Ianao
  - type: text
    content: satria feno ny fanaon’ny avy any atsinanana
  - type: text
    content: izay mpanandro tahaka ny Filistina izy
  - type: text
    content: sady nanao fanekena tamin’ny zana-bahiny;
  '7':
  - type: text
    content: feno volafotsy sy volamena ny taniny,
  - type: text
    content: tsy hita lany ny harenany,
  - type: text
    content: feno soavaly ny taniny
  - type: text
    content: ary tsy hita isa ny kalesy fitondrany miady.
  '8':
  - type: text
    content: Feno andriamanitra tsy izy ny taniny;
  - type: text
    content: eo anatrehan’ny asan’ny tanany no iankohofany,
  - type: text
    content: dia eo anoloan’izay nataon’ny rantsantanany;
  '9':
  - type: text
    content: Koa hatao mitanondrika ny zanak’olombelona
  - type: text
    content: ary haetry ny olona;
  - type: text
    content: nefa aza mamela ny helony Ianao!
