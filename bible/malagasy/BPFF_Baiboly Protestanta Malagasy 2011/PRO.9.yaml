document_id: PRO.9,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fanasana ataon’ny Fahendrena
  - type: text
    content: Efa nanorina ny tranony ny Fahendrena,
  - type: text
    content: efa nipaika ny andriny fito izy.
  '10':
  - type: text
    content: Ny fahatahorana NY TOMPO no fiandohan’ny fahendrena
  - type: text
    content: ary ny fahalalana ny Iray Masina no fahazavan-tsaina.
  '11':
  - type: text
    content: Fa amin’ny alalako no hampitomboana ny andronao
  - type: text
    content: sy hanamaroana ny taona hiainanao.
  '12':
  - type: text
    content: Raha hendry ianao dia hendry ho an’ny tenanao ihany;
  - type: text
    content: raha maniratsira ianao dia ianao ihany no hizaka ny valin’izany.
  - type: heading
    content: Ny fanasana ataon’ny vehivavy adala
  '13':
  - type: text
    content: Ny vehivavy adala dia vavàna;
  - type: text
    content: kely saina izy ka tsy mahalala na inona na inona.
  '14':
  - type: text
    content: Mipetraka eo am-baravaran’ny tranony izy
  - type: text
    content: ary amin’ny seza eny amin’ny toerana avo eo an-tanàna
  '15':
  - type: text
    content: mba hiantso ny mpandalo
  - type: text
    content: 'izay mizotra amin’ny alehany ka miteny hoe:'
  '16':
  - type: text
    content: Iza no kely saina? Aoka izy hivily hankaty!
  - type: text
    content: 'Ary amin’izay tsy ampy saina dia hoy izy:'
  '17':
  - type: text
    content: Mamy ny rano nangalarina,
  - type: text
    content: ary fy ny mofo hanina miafina!
  '18':
  - type: text
    content: Nefa tsy fantany fa ny maty no ao,
  - type: text
    content: 'ary any amin’ny lalina any amin’ny '
  - type: text
    content: fitoeran’ny maty
  - type: text
    content: ' ny olona nasainy.'
  '2':
  - type: text
    content: Efa namono ny bibiny sy nangaroharo ny divainy izy
  - type: text
    content: ary efa namelatra ny latabany koa.
  '3':
  - type: text
    content: Efa naniraka ny mpanompovaviny izy;
  - type: text
    content: 'miantso eny an-tampon’ny toerana avo eny an-tanàna izy ka miteny hoe:'
  '4':
  - type: text
    content: Iza no kely saina? Aoka izy hivily hankaty!
  - type: text
    content: 'Ary amin’izay tsy ampy saina dia hoy izy:'
  '5':
  - type: text
    content: Avia, hano ny mofoko
  - type: text
    content: ary sotroy ny divay voaharoko.
  '6':
  - type: text
    content: Ilaozy ny hadalana dia ho velona ianao
  - type: text
    content: ary mizora amin’ny lalan’ny fahalalana!
  - type: heading
    content: Ny mpaniratsira sy ny hendry
  '7':
  - type: text
    content: Izay mananatra ny mpaniratsira dia mahazo fahafaham-baraka
  - type: text
    content: ary izay mananatra ny ratsy fanahy dia hahazo tsiny.
  '8':
  - type: text
    content: Aza mananatra ny mpaniratsira ianao, fandrao ho halany;
  - type: text
    content: ny hendry no anaro dia ho tiany ianao.
  '9':
  - type: text
    content: Manomeza ho an’ny hendry dia mbola hihahendry ihany izy;
  - type: text
    content: ampianaro ny marina dia hitombo saina izy.
