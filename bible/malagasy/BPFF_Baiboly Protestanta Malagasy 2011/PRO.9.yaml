document_id: PRO.9,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fanasana ataon’ny Fahendrena
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Efa nanorina ny tranony ny Fahendrena,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: efa nipaika ny andriny fito izy.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Ny fahatahorana NY TOMPO no fiandohan’ny fahendrena
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny fahalalana ny Iray Masina no fahazavan-tsaina.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Fa amin’ny alalako no hampitomboana ny andronao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy hanamaroana ny taona hiainanao.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Raha hendry ianao dia hendry ho an’ny tenanao ihany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: raha maniratsira ianao dia ianao ihany no hizaka ny valin’izany.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fanasana ataon’ny vehivavy adala
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Ny vehivavy adala dia vavàna;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: kely saina izy ka tsy mahalala na inona na inona.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Mipetraka eo am-baravaran’ny tranony izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary amin’ny seza eny amin’ny toerana avo eo an-tanàna
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: mba hiantso ny mpandalo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'izay mizotra amin’ny alehany ka miteny hoe:'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Iza no kely saina? Aoka izy hivily hankaty!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ary amin’izay tsy ampy saina dia hoy izy:'
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Mamy ny rano nangalarina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary fy ny mofo hanina miafina!
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Nefa tsy fantany fa ny maty no ao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ary any amin’ny lalina any amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: fitoeran’ny maty
    - type: text
      text: ' ny olona nasainy.'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Efa namono ny bibiny sy nangaroharo ny divainy izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary efa namelatra ny latabany koa.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Efa naniraka ny mpanompovaviny izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'miantso eny an-tampon’ny toerana avo eny an-tanàna izy ka miteny hoe:'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Iza no kely saina? Aoka izy hivily hankaty!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ary amin’izay tsy ampy saina dia hoy izy:'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Avia, hano ny mofoko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary sotroy ny divay voaharoko.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Ilaozy ny hadalana dia ho velona ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mizora amin’ny lalan’ny fahalalana!
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny mpaniratsira sy ny hendry
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Izay mananatra ny mpaniratsira dia mahazo fahafaham-baraka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary izay mananatra ny ratsy fanahy dia hahazo tsiny.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Aza mananatra ny mpaniratsira ianao, fandrao ho halany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny hendry no anaro dia ho tiany ianao.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Manomeza ho an’ny hendry dia mbola hihahendry ihany izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ampianaro ny marina dia hitombo saina izy.
