document_id: JHN.20,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fitsanganan’i Jesosy tamin’ny maty
  - type: heading
    content: Mat 28.1-8; Mar 16.1-8; Lio 24.1-12
  - type: text
    content: 'Tamin’ny andro voalohany amin’ny herinandro dia nandeha vao maraina mbola maizimaizina hankany amin’ny fasana i Maria Magdalena ka nahita ny vato voaisotra tamin’ny fasana. '
  '10':
  - type: text
    content: Dia lasa indray ny mpianatra nody tany aminy.
  - type: heading
    content: Jesosy niseho tamin’i Maria Magdalena
  - type: heading
    content: Mar 16.9-11
  '11':
  - type: text
    content: 'Fa nijanona nitomany teo ivelan’ny fasana i Maria; ary raha mbola nitomany izy dia niondrika nitsirika ny tao am-pasana '
  '12':
  - type: text
    content: 'ka nahita anjely roa nitafy lamba fotsy nipetraka teo, ny iray dia teo an-doha tamin’ilay nandrian’ny fatin’i Jesosy ary ny iray dia teo an-tongotra. '
  '13':
  - type: text
    content: 'Ary hoy ireo taminy: Ravehivavy, nahoana ianao no mitomany? Dia hoy izy taminy: Satria nalain’olona ny Tompoko ka tsy fantatro izay nametrahany Azy. '
  '14':
  - type: text
    content: 'Rehefa nilaza izany izy dia nitodika ka nahita an’i Jesosy nitsangana teo, nefa tsy fantany ho Jesosy Izy. '
  '15':
  - type: text
    content: 'Hoy Jesosy taminy: Ravehivavy, nahoana ianao no mitomany? Iza no tadiavinao? Nataony fa mpiandry saha Izy ka hoy izy Taminy: Tompoko, raha Ianao no naka Azy teto, lazao amiko izay nametrahanao Azy, fa izaho no haka Azy any. '
  '16':
  - type: text
    content: 'Hoy Jesosy taminy: Ry Maria! Dia nitodika izy ka niteny Taminy tamin’ny teny hebreo hoe Rabonỳ! Izany hoe: Mpampianatra ô. '
  '17':
  - type: text
    content: 'Hoy Jesosy taminy: Aza manendry Ahy; fa tsy mbola niakatra tany amin’ny Ray Aho; fa mandehana mankany amin’ny rahalahiko ka lazao aminy hoe: Miakatra ho any amin’ny Raiko sy ny Rainareo Aho ary ho any amin’Andriamanitro sy Andriamanitrareo.'
  '18':
  - type: text
    content: 'Dia tonga i Maria Magdalena ka nilaza tamin’ny mpianatra hoe: Efa nahita ny Tompo aho sady izany teny izany no nolazainy tamiko.'
  - type: heading
    content: Jesosy niseho tamin’ny mpianany
  - type: heading
    content: Lio 24.36-49
  '19':
  - type: text
    content: 'Nony harivan’ilay andro voalohany amin’ny herinandro, raha voarindrina ny varavaran’ny toerana izay niangonan’ny mpianatra, noho ny fahatahorany ny '
  - type: text
    content: Jiosy
  - type: text
    content: ', dia tonga Jesosy ka nitsangana teo afovoany sady niteny taminy hoe: Fiadanana ho anareo! '
  '2':
  - type: text
    content: 'Dia nihazakazaka nankany amin’i Simona Petera sy ilay mpianatra tian’i Jesosy izy ka niteny tamin’ireo hoe: Nalain’olona tao am-pasana ny Tompo, koa tsy fantatray izay nametrahany Azy.'
  '20':
  - type: text
    content: 'Rehefa nilaza izany Izy dia nasehony azy ny tanany sy ny lanivoany. Dia faly ny mpianatra raha nahita ny Tompo. '
  '21':
  - type: text
    content: 'Ary hoy indray Jesosy taminy: Fiadanana ho anareo; tahaka ny nanirahan’ny Ray Ahy no anirahako anareo kosa. '
  '22':
  - type: text
    content: 'Rehefa nilaza izany Izy dia nanisy fofonaina ka hoy Izy taminy: Raiso ny Fanahy Masina; '
  '23':
  - type: text
    content: na helok’iza na helok’iza no avelanareo dia voavela izany; ary na an’iza na an’iza kosa no tsy avelanareo dia tsy voavela izany.
  - type: heading
    content: I Tomasy sy Ilay nitsangana tamin’ny maty
  '24':
  - type: text
    content: 'Fa i Tomasy, iray tamin’ny roa amby folo lahy, ilay antsoina hoe Kambana, dia tsy mba teo amin’izy ireo raha tonga Jesosy. '
  '25':
  - type: text
    content: 'Dia hoy ny mpianatra sasany taminy: Efa nahita ny Tompo izahay. Fa hoy kosa izy: Raha tsy hitako eo amin’ny tanany ny holatra navelan’ny fantsika ka atehiko eo amin’ny holatra navelan’ny fantsika ny rantsan-tanako, ary ataoko eo amin’ny lanivoany koa ny tanako dia tsy mba hino aho.'
  '26':
  - type: text
    content: 'Nony afaka havaloana dia tafangona teo indray ny mpianany ary teo koa i Tomasy. Dia tonga Jesosy, rehefa voarindrina ny varavarana, ka nitsangana teo afovoany sady niteny hoe: Fiadanana ho anareo! '
  '27':
  - type: text
    content: 'Ary hoy Izy tamin’i Tomasy: Atehefo eto ny rantsantananao ka jereo ny tanako; ary atehefo eto koa ny tananao ka ataovy amin’ny lanivoako; ary aza ho isan’izay tsy mino fa minoa. '
  '28':
  - type: text
    content: 'Dia namaly i Tomasy hoe: Tompoko sy Andriamanitro! '
  '29':
  - type: text
    content: 'Hoy Jesosy taminy: Satria nahita Ahy ianao dia nino; sambatra kosa izay tsy nahita nefa mino.'
  - type: heading
    content: Ny zava-kendren’ity boky ity
  '3':
  - type: text
    content: 'Dia nandeha i Petera sy ilay mpianatra iray ka nankany amin’ny fasana. '
  '30':
  - type: text
    content: 'Ary nisy famantarana maro hafa koa nataon’i Jesosy teo imason’ny mpianatra, izay tsy voasoratra amin’ity boky ity; '
  '31':
  - type: text
    content: 'fa voasoratra izao mba hinoanareo fa Jesosy no '
  - type: text
    content: Kristy
  - type: text
    content: ', Zanak’Andriamanitra, ary mba hanananareo fiainana amin’ny anarany, raha mino ianareo.'
  '4':
  - type: text
    content: 'Ary niara-nihazakazaka izy roa lahy; ary ilay mpianatra iray dia nihazakazaka nihoatra an’i Petera ka tonga taloha tao amin’ny fasana. '
  '5':
  - type: text
    content: 'Nony niondrika nitsirika izy dia nahita ny lambam-paty nipetraka teo, nefa tsy niditra tao izy. '
  '6':
  - type: text
    content: 'Ary avy koa i Simona Petera nanaraka azy dia niditra tao am-pasana ka nijery ny lambam-paty nipetraka teo, '
  '7':
  - type: text
    content: 'ary tsy mba nipetraka teo amin’ny lambam-paty ny lamba izay nafehy ny lohany fa voavalona mitokana. '
  '8':
  - type: text
    content: 'Tamin’izay dia niditra koa ilay mpianatra iray izay tonga taloha teo amin’ny fasana ary nahita ka nino. '
  '9':
  - type: text
    content: 'Tsy mbola fantany ny Soratra Masina fa tsy maintsy hitsangana amin’ny maty Jesosy. '
