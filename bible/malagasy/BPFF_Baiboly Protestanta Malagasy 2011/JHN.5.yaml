document_id: JHN.5
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nanasitrana ilay lehilahy malemy Jesosy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Taorianan’izany dia nisy andro firavoravoan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jiosy
  - type: text
    text: ', ary Jesosy niakatra tany Jerosalema.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Any Jerosalema, eo akaikin’ny vavahadin’ondry, dia misy farihy izay antsoina amin’ny teny hebreo hoe Betesda; misy fialofana dimy izy io. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Tao no nandrian’ny marary maro, ny jamba, ny mandringa, ny maty ila, izay miandry ny fihetsehan’ny rano. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Fa nisy anjely nidina tany amin’ny farihy indraindray ka nampihetsika ny rano; koa izay niroboka voalohany, rehefa nihetsika ny rano, dia sitrana, na inona na inona aretina nanjo azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary nisy lehilahy iray izay efa narary nandritra ny valo amby telopolo taona teo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Raha nahita azy mandry teo Jesosy ka nahalala fa efa nahazo azy hatry ny ela izany dia hoy Izy taminy: Te ho sitrana va ianao? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dia namaly Azy ilay marary hoe: Tompoko, rehefa hetsehina ny rano dia tsy mba misy olona handroboka ahy ao amin’ny farihy; nefa raha mandeha aho dia misy olon-kafa misosoka eo alohako. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Hoy Jesosy taminy: Mitsangàna, batao ny fandriananao ka mandehana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ary niaraka tamin’izay dia sitrana Ralehilahy ka nitondra ny fandrianany, ary lasa nandeha. Sabata izay andro izay.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dia hoy ny Jiosy tamin’ilay efa sitrana: Sabata ny andro ka tsy mety raha mitondra ny fandriananao ianao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Fa hoy Ralehilahy hoe: Ilay nanasitrana ahy no niteny tamiko hoe: Batao ny fandriananao ka mandehana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary ireo dia nanontany azy hoe: Iza moa izany lehilahy izany, izay niteny taminao hoe: Batao ny fandriananao ka mandehana? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Fa ilay sitrana dia tsy nahalala Azy; ary niala teo Jesosy satria nisy vahoaka betsaka teo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Taorianan’izany dia hitan’i Jesosy tao amin’ny tempoly Ralehilahy, ary hoy Izy taminy: Indro, efa sitrana ianao; aza manota intsony, fandrao hanjo anao izay ratsy noho ny teo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Dia lasa Ralehilahy ka nanambara tamin’ny Jiosy fa Jesosy no nanasitrana azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ary noho izany dia nanenjika an’i Jesosy ny Jiosy satria nanao izany zavatra izany tamin’ny Sabata Izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Dia hoy Jesosy hoe: Ny Raiko miasa mandraka ankehitriny, ary Izaho koa miasa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Nefa vao mainka nitady hamono Azy ny Jiosy, tsy noho Izy nandika ny Sabata ihany, fa noho ny nilazany koa fa Andriamanitra no Rainy sady nanao ny tenany ho mitovy amin’Andriamanitra Izy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fahefan’ny Zanak’Andriamanitra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Hoy indray Jesosy tamin’izy ireo: Lazaiko aminareo marina dia marina tokoa: Ny Zanaka tsy mahazo manao na inona na inona avy amin’ny fahefan’ny tenany, afa-tsy izay hitany ataon’ny Ray; fa na inona na inona no ataon’ny Ray dia toy izany koa no ataon’ny Zanaka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Fa ny Ray tia ny Zanaka ka maneho Azy ny zavatra rehetra izay ataon’ny tenany; ary asa lehibe noho ireny no hasehony Azy mba ho gaga ianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Fa toy ny Ray manangana sy mamelona ny maty dia tahaka izany koa no ameloman’ny Zanaka izay tiany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Fa ny Ray aza tsy mitsara olona, fa ny fitsarana rehetra dia nomeny ny Zanaka '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: mba hanajan’ny olona rehetra ny Zanaka, tahaka ny fanajany ny Ray. Izay tsy manaja ny Zanaka dia tsy manaja ny Ray izay naniraka Azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Lazaiko aminareo marina dia marina tokoa: Izay mandre ny teniko ka mino izay naniraka Ahy no manana fiainana mandrakizay ka tsy hotsaraina; fa tafafindra niala tamin’ny fahafatesana ho amin’ny fiainana izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Lazaiko aminareo marina dia marina tokoa: Avy ny fotoana ary tonga ankehitriny, izay handrenesan’ny maty ny feon’ny Zanak’Andriamanitra; ary izay mandre dia ho velona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Fa tahaka ny Ray manana fiainana ao Aminy, dia tahaka izany koa ny Zanaka nomeny hanana fiainana ao Aminy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'ary nomeny fahefana hitsara Izy satria '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Zanak’Olona
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Aza gaga amin’izany; fa avy ny fotoana izay handrenesan’ny olona rehetra any am-pasana ny feony; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'dia hiala avy ao izy: Izay nanao ny tsara dia ho amin’ny fitsanganana mitondra amin’ny fiainana; fa izay nanao ny ratsy kosa dia ho amin’ny fitsanganana mitondra amin’ny fitsarana.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Raha Izaho dia tsy afaka manao na inona na inona avy amin’ny fahefan’ny tenako; araka izay reko no itsarako; ary marina ny fitsarako; fa tsy mitady ny sitrapoko Aho fa ny sitrapon’izay naniraka Ahy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ireo vavolombelona manambara an’i Jesosy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Raha Izaho no manambara ny tenako, dia tsy marina ny fanambaràko. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Misy Iray izay manambara Ahy, ary fantatro fa marina ny fanambaràna izay anambaràny Ahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ianareo dia nandefa iraka tany amin’i Jaona, ary nanambara ny marina momba Ahy izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Fa tsy mandray ny fanambaràna avy amin’olona Aho; fa milaza izany zavatra izany Aho mba ho voavonjy ianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: I Jaona dia jiro nirehitra ka namirapiratra; ary sitrakareo ny nifaly vetivety tamin’ny fahazavany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Fa Izaho kosa manana fanambaràna lehibe noho i Jaona; satria ny asa nomen’ny Ray Ahy hovitaiko, dia izany asa ataoko izany no manambara ny momba Ahy fa nirahin’ny Ray Aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Ary ny Ray izay naniraka Ahy, Izy no nanambara Ahy. Tsy mba renareo ny feony na hitanareo akory aza ny endriny; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'ary tsy mba mitoetra ao anatinareo ny teniny satria tsy mino izay nirahiny ianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Dinihinareo ny Soratra Masina satria ataonareo fa ao aminy no anananareo fiainana mandrakizay, ary ireny no manambara Ahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Kanefa tsy mety manatona Ahy ianareo mba hanananareo fiainana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Tsy mandray laza amam-boninahitra avy amin’olona Aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Fa fantatro ianareo fa tsy misy fitiavana an’Andriamanitra ao am-ponareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Izaho dia avy amin’ny anaran’ny Raiko nefa tsy raisinareo; raha misy hafa avy amin’ny anaran’ny tenany dia horaisinareo ihany izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: Hataonareo izay mifampitady voninahitra ahoana moa no fino, raha ny voninahitra avy amin’ny Andriamanitra tokana aza tsy mba tadiavinareo?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Aza heverinareo fa Izaho no hiampanga anareo amin’ny Ray; misy ny mpiampanga anareo, dia i Mosesy izay itokianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Fa raha mba nino an’i Mosesy ianareo dia ho nino Ahy satria nanoratra nilaza Ahy izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: Fa raha tsy mino izay nosoratany ianareo, hataonareo ahoana no fino ireo teniko?
