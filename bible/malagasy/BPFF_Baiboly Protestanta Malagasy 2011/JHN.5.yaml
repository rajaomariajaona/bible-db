document_id: JHN.5,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Nanasitrana ilay lehilahy malemy Jesosy
  - type: text
    content: 'Taorianan’izany dia nisy andro firavoravoan’ny '
  - type: text
    content: Jiosy
  - type: text
    content: ', ary Jesosy niakatra tany Jerosalema.'
  '10':
  - type: text
    content: 'Dia hoy ny Jiosy tamin’ilay efa sitrana: Sabata ny andro ka tsy mety raha mitondra ny fandriananao ianao. '
  '11':
  - type: text
    content: 'Fa hoy Ralehilahy hoe: Ilay nanasitrana ahy no niteny tamiko hoe: Batao ny fandriananao ka mandehana. '
  '12':
  - type: text
    content: 'Ary ireo dia nanontany azy hoe: Iza moa izany lehilahy izany, izay niteny taminao hoe: Batao ny fandriananao ka mandehana? '
  '13':
  - type: text
    content: 'Fa ilay sitrana dia tsy nahalala Azy; ary niala teo Jesosy satria nisy vahoaka betsaka teo. '
  '14':
  - type: text
    content: 'Taorianan’izany dia hitan’i Jesosy tao amin’ny tempoly Ralehilahy, ary hoy Izy taminy: Indro, efa sitrana ianao; aza manota intsony, fandrao hanjo anao izay ratsy noho ny teo. '
  '15':
  - type: text
    content: 'Dia lasa Ralehilahy ka nanambara tamin’ny Jiosy fa Jesosy no nanasitrana azy. '
  '16':
  - type: text
    content: Ary noho izany dia nanenjika an’i Jesosy ny Jiosy satria nanao izany zavatra izany tamin’ny Sabata Izy.
  '17':
  - type: text
    content: 'Dia hoy Jesosy hoe: Ny Raiko miasa mandraka ankehitriny, ary Izaho koa miasa. '
  '18':
  - type: text
    content: Nefa vao mainka nitady hamono Azy ny Jiosy, tsy noho Izy nandika ny Sabata ihany, fa noho ny nilazany koa fa Andriamanitra no Rainy sady nanao ny tenany ho mitovy amin’Andriamanitra Izy.
  - type: heading
    content: Ny fahefan’ny Zanak’Andriamanitra
  '19':
  - type: text
    content: 'Hoy indray Jesosy tamin’izy ireo: Lazaiko aminareo marina dia marina tokoa: Ny Zanaka tsy mahazo manao na inona na inona avy amin’ny fahefan’ny tenany, afa-tsy izay hitany ataon’ny Ray; fa na inona na inona no ataon’ny Ray dia toy izany koa no ataon’ny Zanaka. '
  '2':
  - type: text
    content: 'Any Jerosalema, eo akaikin’ny vavahadin’ondry, dia misy farihy izay antsoina amin’ny teny hebreo hoe Betesda; misy fialofana dimy izy io. '
  '20':
  - type: text
    content: 'Fa ny Ray tia ny Zanaka ka maneho Azy ny zavatra rehetra izay ataon’ny tenany; ary asa lehibe noho ireny no hasehony Azy mba ho gaga ianareo. '
  '21':
  - type: text
    content: 'Fa toy ny Ray manangana sy mamelona ny maty dia tahaka izany koa no ameloman’ny Zanaka izay tiany. '
  '22':
  - type: text
    content: 'Fa ny Ray aza tsy mitsara olona, fa ny fitsarana rehetra dia nomeny ny Zanaka '
  '23':
  - type: text
    content: mba hanajan’ny olona rehetra ny Zanaka, tahaka ny fanajany ny Ray. Izay tsy manaja ny Zanaka dia tsy manaja ny Ray izay naniraka Azy.
  '24':
  - type: text
    content: 'Lazaiko aminareo marina dia marina tokoa: Izay mandre ny teniko ka mino izay naniraka Ahy no manana fiainana mandrakizay ka tsy hotsaraina; fa tafafindra niala tamin’ny fahafatesana ho amin’ny fiainana izy. '
  '25':
  - type: text
    content: 'Lazaiko aminareo marina dia marina tokoa: Avy ny fotoana ary tonga ankehitriny, izay handrenesan’ny maty ny feon’ny Zanak’Andriamanitra; ary izay mandre dia ho velona. '
  '26':
  - type: text
    content: 'Fa tahaka ny Ray manana fiainana ao Aminy, dia tahaka izany koa ny Zanaka nomeny hanana fiainana ao Aminy; '
  '27':
  - type: text
    content: 'ary nomeny fahefana hitsara Izy satria '
  - type: text
    content: Zanak’Olona
  - type: text
    content: '. '
  '28':
  - type: text
    content: 'Aza gaga amin’izany; fa avy ny fotoana izay handrenesan’ny olona rehetra any am-pasana ny feony; '
  '29':
  - type: text
    content: 'dia hiala avy ao izy: Izay nanao ny tsara dia ho amin’ny fitsanganana mitondra amin’ny fiainana; fa izay nanao ny ratsy kosa dia ho amin’ny fitsanganana mitondra amin’ny fitsarana.'
  '3':
  - type: text
    content: 'Tao no nandrian’ny marary maro, ny jamba, ny mandringa, ny maty ila, izay miandry ny fihetsehan’ny rano. '
  '30':
  - type: text
    content: Raha Izaho dia tsy afaka manao na inona na inona avy amin’ny fahefan’ny tenako; araka izay reko no itsarako; ary marina ny fitsarako; fa tsy mitady ny sitrapoko Aho fa ny sitrapon’izay naniraka Ahy.
  - type: heading
    content: Ireo vavolombelona manambara an’i Jesosy
  '31':
  - type: text
    content: 'Raha Izaho no manambara ny tenako, dia tsy marina ny fanambaràko. '
  '32':
  - type: text
    content: 'Misy Iray izay manambara Ahy, ary fantatro fa marina ny fanambaràna izay anambaràny Ahy. '
  '33':
  - type: text
    content: 'Ianareo dia nandefa iraka tany amin’i Jaona, ary nanambara ny marina momba Ahy izy. '
  '34':
  - type: text
    content: 'Fa tsy mandray ny fanambaràna avy amin’olona Aho; fa milaza izany zavatra izany Aho mba ho voavonjy ianareo. '
  '35':
  - type: text
    content: I Jaona dia jiro nirehitra ka namirapiratra; ary sitrakareo ny nifaly vetivety tamin’ny fahazavany.
  '36':
  - type: text
    content: 'Fa Izaho kosa manana fanambaràna lehibe noho i Jaona; satria ny asa nomen’ny Ray Ahy hovitaiko, dia izany asa ataoko izany no manambara ny momba Ahy fa nirahin’ny Ray Aho. '
  '37':
  - type: text
    content: 'Ary ny Ray izay naniraka Ahy, Izy no nanambara Ahy. Tsy mba renareo ny feony na hitanareo akory aza ny endriny; '
  '38':
  - type: text
    content: 'ary tsy mba mitoetra ao anatinareo ny teniny satria tsy mino izay nirahiny ianareo. '
  '39':
  - type: text
    content: 'Dinihinareo ny Soratra Masina satria ataonareo fa ao aminy no anananareo fiainana mandrakizay, ary ireny no manambara Ahy. '
  '4':
  - type: text
    content: Fa nisy anjely nidina tany amin’ny farihy indraindray ka nampihetsika ny rano; koa izay niroboka voalohany, rehefa nihetsika ny rano, dia sitrana, na inona na inona aretina nanjo azy.
  '40':
  - type: text
    content: Kanefa tsy mety manatona Ahy ianareo mba hanananareo fiainana.
  '41':
  - type: text
    content: 'Tsy mandray laza amam-boninahitra avy amin’olona Aho. '
  '42':
  - type: text
    content: 'Fa fantatro ianareo fa tsy misy fitiavana an’Andriamanitra ao am-ponareo. '
  '43':
  - type: text
    content: 'Izaho dia avy amin’ny anaran’ny Raiko nefa tsy raisinareo; raha misy hafa avy amin’ny anaran’ny tenany dia horaisinareo ihany izy. '
  '44':
  - type: text
    content: Hataonareo izay mifampitady voninahitra ahoana moa no fino, raha ny voninahitra avy amin’ny Andriamanitra tokana aza tsy mba tadiavinareo?
  '45':
  - type: text
    content: 'Aza heverinareo fa Izaho no hiampanga anareo amin’ny Ray; misy ny mpiampanga anareo, dia i Mosesy izay itokianareo. '
  '46':
  - type: text
    content: 'Fa raha mba nino an’i Mosesy ianareo dia ho nino Ahy satria nanoratra nilaza Ahy izy. '
  '47':
  - type: text
    content: Fa raha tsy mino izay nosoratany ianareo, hataonareo ahoana no fino ireo teniko?
  '5':
  - type: text
    content: 'Ary nisy lehilahy iray izay efa narary nandritra ny valo amby telopolo taona teo. '
  '6':
  - type: text
    content: 'Raha nahita azy mandry teo Jesosy ka nahalala fa efa nahazo azy hatry ny ela izany dia hoy Izy taminy: Te ho sitrana va ianao? '
  '7':
  - type: text
    content: 'Dia namaly Azy ilay marary hoe: Tompoko, rehefa hetsehina ny rano dia tsy mba misy olona handroboka ahy ao amin’ny farihy; nefa raha mandeha aho dia misy olon-kafa misosoka eo alohako. '
  '8':
  - type: text
    content: 'Hoy Jesosy taminy: Mitsangàna, batao ny fandriananao ka mandehana. '
  '9':
  - type: text
    content: Ary niaraka tamin’izay dia sitrana Ralehilahy ka nitondra ny fandrianany, ary lasa nandeha. Sabata izay andro izay.
