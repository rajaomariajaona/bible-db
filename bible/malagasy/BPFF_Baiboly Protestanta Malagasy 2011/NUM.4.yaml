document_id: NUM.4
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny raharahan’ny fokon’ny levita
  marker-yv: yv-h
- type: usfm
  marker: s3
  children:
  - type: usfm
    marker: bd
    children:
    - type: text
      text: Ireo taranak’i Kehata
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary NY TOMPO niteny tamin’i Mosesy sy i Arona hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Alao isa ny taranak’i Kehata ao amin’ny taranak’i Levy, araka ny fokony sy ny fianakaviany, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'hatramin’ny telopolo taona ka hatramin’ny dimampolo taona, dia izay rehetra azo alefa hanafika, fa hanao fanompoana ao amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tranolay fihaonana
  - type: text
    text: ' ireo.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Izao no ho fanompoan’ny taranak’i Kehata ao amin’ny tranolay fihaonana, dia ny zavatra masina indrindra: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Rehefa hiainga ny toby dia hiditra i Arona sy ireo zanany ka hampidina ny efitra lamba fanakonana, ary hasarony ny vata misy ny Vavolombelona izany; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'hoditra trozona no hataony sarona eo amboniny, koa lamba volon’ondry manga tokam-bolo no hovelariny ary hasarony eo ambonin’io, dia hataony eo aminy ny baony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Hamelatra lamba volon’ondry manga eo ambonin’ny latabatry ny mofo atao fanatitra izy ireo ka hataony eo ny lovia, ny lovia kely, ny kapoaka ary ny kapoaka lehibe fandrarahana divay; ary ny mofo atao fanatitra dia hataony eo amboniny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Hovelarany lamba jaky eo ambonin’io ka hosaronany amin’ny rakotra hoditra trozona izany, dia hataony eo aminy ny baony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Haka lamba volon’ondry manga indray izy ka hasarony ny fitoeran-jiro fanazavana, ireo jirony, hetin-jirony sy fitoeran-davenon-jirony ary ireo fitaovany fitoeran-diloilo rehetra, izay anaovana ny fanompoam-pivavahana; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'ireo sy ny fanaka rehetra momba azy dia hataony ao anatin’ny sarona hoditra trozona ka hapetrany eo ambonin’ny filanjana azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Hamelatra lamba manga eo ambonin’ny alitara volamena izy, dia hosaronany rakotra hoditra trozona, ary hataony eo aminy ny baony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Avy eo dia halainy ny fanaka rehetra fitondra manompo, dia izay fanaovany fanompoam-pivavahana ao amin’ny fitoerana masina ka hataony ao anaty lamba volon’ondry manga, ary hosaronany rakotra hoditra trozona, dia hapetrany eo ambonin’ny filanjana azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dia hanaisotra ny lavenona amin’ny alitara izy ka hamelatra lamba volomparasy eo amboniny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Hapetrany eo amboniny avokoa ny fanaka rehetra momba azy, izay fampiasa amin’ny fanompoam-pivavahana, dia ny fitondrana afony, ny fitrebiny, ny sotron’afony ary ny loviany famafazana, dia ireo fanaka rehetra momba ny alitara; hovelarany rakotra hoditra trozona eo amboniny dia hataony eo aminy ny baony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Rehefa vitan’i Arona sy ireo zanany ny manarona ny fitoerana masina sy ireo fanaka rehetra momba azy ka efa hifindra ny toby, dia izay vao ho avy ireo zanak’i Kehata hitondra azy; satria tsy hikasika ny fitoerana masina izy ireo sao ho faty. Izany no anjara asan’ireo taranak’i Kehata ao amin’ny tranolay fihaonana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary i Eleazara, zanak’i Arona mpisorona, dia hanara-maso ny diloilo hatao fanazavana, ny ditin-kazo mani-pofona, ny fanatitra avy amin’ny zavamaniry fanao isanandro ary ny diloilo fanosorana; hanara-maso ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tabernakely
  - type: text
    text: ' manontolo sy izay rehetra ao anatiny izy, ao amin’ny fitoerana masina sy ireo fanaka momba azy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary NY TOMPO niteny tamin’i Mosesy sy i Arona hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ataovy izay tsy hahafongotra ny fianakavian’ny Kehatita izay naman’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: levita
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Izao no hataonareo aminy mba ho velona izy fa tsy ho faty, raha manatona ny zavatra masina indrindra: I Arona sy ireo zanany no ho avy ka hanendry ny olona samy ho amin’izay fanompoany sy ny asany avy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Tsy hiditra hijery ny zava-masina izy ireo na dia indray mipy maso akory aza fandrao maty.
- type: usfm
  marker: s3
  children:
  - type: usfm
    marker: bd
    children:
    - type: text
      text: Ireo taranak’i Gersona
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary NY TOMPO niteny tamin’i Mosesy hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Alao isa koa ny taranak’i Gersona, araka ny fianakaviany sy ny fokony avy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'izay hatramin’ny telopolo taona ka hatramin’ny dimampolo taona no hisainao, dia izay rehetra azo alefa hanafika, fa hanao fanompoana ao amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tranolay fihaonana
  - type: text
    text: ' izy ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Izao no anjaran’ny fianakavian’ny Gersonita amin’ny fanompoana sy ny entana tokony hoentiny: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ny ambain’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tabernakely
  - type: text
    text: ' sy ny tranolay fihaonana, ny rakotra sy ny sarona hoditra trozona izay eo amboniny, ny varavarana lamba amin’ny varavaran’ny tranolay fihaonana, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'ny fefy lamban’ny kianja sy ny vavahady lamba amin’ny vavahadin’ny kianja, izay manodidina ny tabernakely sy ny alitara, ny kofehy mbamin’ny fiasana rehetra momba azy. Izay asa rehetra momba ireo no ho fanompoany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Araka ny tenin’i Arona sy ireo zanany no hanaovan’ny Gersonita ny fanompoany amin’ny fitondrana ny entana sy ny fanompoany rehetra; hatolotrao azy ho anjara raharahany ny zavatra rehetra izay entiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Izany no ho fanompoan’ny fianakavian’ny Gersonita momba ny tranolay fihaonana; ny ho mpifehy azy amin’izany anjara raharahany izany dia Itamara, zanak’i Arona mpisorona.
- type: usfm
  marker: s3
  children:
  - type: usfm
    marker: bd
    children:
    - type: text
      text: Ireo taranak’i Merary
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ny amin’ny taranak’i Merary, dia araka ny fokony sy ny fianakaviany no handaminanao azy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'izay hatramin’ny telopolo taona ka hatramin’ny dimampolo taona no hisainao, dia izay rehetra tokony hanafika, fa hanao ny fanompoana momba ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tranolay fihaonana
  - type: text
    text: ' izy ireo.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Izao no ho anjara raharahany ny amin’ny entana araka ny fanompoana rehetra ao amin’ny tranolay fihaonana: Ireo hazo fisaka amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tabernakely
  - type: text
    text: ' sy ny barany, ny andriny sy ny faladiany, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'ireo andrin’ny kianja manodidina sy ny faladiany, ny tsatòkan-day rehetra ary ny kofehy momba ny fiasana rehetra mbamin’ny zavatra rehetra enti-manao fanompoana ao. Araka ny anarany avy no hanisanareo ny fanaka, izay anjara entany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Izany no ho fanompoan’ny fianakavian’ny taranak’i Merary, araka ny fanompoany rehetra ao amin’ny tranolay fihaonana, ary Itamara, zanak’i Arona mpisorona, no ho mpifehy azy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fanisana ireo levita am-perin’asa
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ary i Mosesy sy i Arona mbamin’ireo lohan’ny fiangonana nanisa dia ny taranaky ny Kehatita, araka ny fokony sy ny fianakaviany avy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'hatramin’ny telopolo taona ka hatramin’ny dimampolo taona, dia izay rehetra tokony hanafika, fa hanao fanompoana ao amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tranolay fihaonana
  - type: text
    text: ' izy ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Izay voaisa taminy, araka ny fianakaviany, dia dimampolo sy fitonjato sy roa arivo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Ireo no voaisa tamin’ny fianakavian’ny Kehatita, dia izay rehetra manao fanompoana ao amin’ny tranolay fihaonana, izay nisain’i Mosesy sy i Arona araka ny didin’NY TOMPO nampitondrainy an’i Mosesy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Izay voaisa tamin’ny taranak’i Gersona, araka ny fokony sy ny fianakaviany, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'hatramin’ny telopolo taona ka hatramin’ny dimampolo taona, dia izay rehetra tokony hanafika, fa hanao fanompoana ao amin’ny tranolay fihaonana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Izay voaisa taminy, araka ny fokony sy ny fianakaviany, dia telopolo sy eninjato sy roa arivo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: Ireo no voaisa tamin’ny fokon’ny taranak’i Gersona, dia izay rehetra manao fanompoana ao amin’ny tranolay fihaonana ka nalamin’i Mosesy sy i Arona araka ny didin’NY TOMPO.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Ary izay voaisa tamin’ny fianakavian’ny taranak’i Merary, araka ny fokony sy ny fianakaviany, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'hatramin’ny telopolo taona ka hatramin’ny dimampolo taona, dia izay rehetra afaka hanafika, fa hanao fanompoana ao amin’ny tranolay fihaonana, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'izay voaisa taminy, araka ny fianakaviany, dia roanjato sy telo arivo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: Ireo no voaisa tamin’ny fianakavian’ny taranak’i Merary, izay nisain’i Mosesy sy i Arona araka ny didin’NY TOMPO nampitondrainy an’i Mosesy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Ny tontalin’ny taranak’i Levy izay voaisan’i Mosesy sy i Arona mbamin’ireo lehiben’ny Israely, araka ny fokony sy ny fianakaviany, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'hatramin’ny telopolo taona ka hatramin’ny dimampolo taona, dia izay rehetra niditra hanao raharaha amin’ny fanompoana, dia ny fanompoana ny amin’ny fitondrana entana ao amin’ny tranolay fihaonana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Izay voaisa taminy dia valopolo sy dimanjato sy valo arivo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: Araka ny didin’NY TOMPO nampitondrainy an’i Mosesy no nandaminany azy samy ho amin’ny fanompoany avy sy ny anjara entany avy. Nomena andraikitra araka izay nandidian’NY TOMPO an’i Mosesy ireo.
