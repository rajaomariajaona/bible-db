    marker: p
    children:
    - type: text
      text: 'Hamelatra lamba manga eo ambonin’ny alitara volamena izy, dia hosaronany rakotra hoditra trozona, ary hataony eo aminy ny baony. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Avy eo dia halainy ny fanaka rehetra fitondra manompo, dia izay fanaovany fanompoam-pivavahana ao amin’ny fitoerana masina ka hataony ao anaty lamba volon’ondry manga, ary hosaronany rakotra hoditra trozona, dia hapetrany eo ambonin’ny filanjana azy. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hanaisotra ny lavenona amin’ny alitara izy ka hamelatra lamba volomparasy eo amboniny. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hapetrany eo amboniny avokoa ny fanaka rehetra momba azy, izay fampiasa amin’ny fanompoam-pivavahana, dia ny fitondrana afony, ny fitrebiny, ny sotron’afony ary ny loviany famafazana, dia ireo fanaka rehetra momba ny alitara; hovelarany rakotra hoditra trozona eo amboniny dia hataony eo aminy ny baony. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa vitan’i Arona sy ireo zanany ny manarona ny fitoerana masina sy ireo fanaka rehetra momba azy ka efa hifindra ny toby, dia izay vao ho avy ireo zanak’i Kehata hitondra azy; satria tsy hikasika ny fitoerana masina izy ireo sao ho faty. Izany no anjara asan’ireo taranak’i Kehata ao amin’ny tranolay fihaonana. '
  '16':
