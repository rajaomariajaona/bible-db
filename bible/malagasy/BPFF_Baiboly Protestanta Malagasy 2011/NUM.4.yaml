document_id: NUM.4,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny raharahan’ny fokon’ny levita
  - type: heading
    content: Ireo taranak’i Kehata
  - type: text
    content: 'Ary NY TOMPO niteny tamin’i Mosesy sy i Arona hoe: '
  '10':
  - type: text
    content: 'ireo sy ny fanaka rehetra momba azy dia hataony ao anatin’ny sarona hoditra trozona ka hapetrany eo ambonin’ny filanjana azy. '
  '11':
  - type: text
    content: 'Hamelatra lamba manga eo ambonin’ny alitara volamena izy, dia hosaronany rakotra hoditra trozona, ary hataony eo aminy ny baony. '
  '12':
  - type: text
    content: 'Avy eo dia halainy ny fanaka rehetra fitondra manompo, dia izay fanaovany fanompoam-pivavahana ao amin’ny fitoerana masina ka hataony ao anaty lamba volon’ondry manga, ary hosaronany rakotra hoditra trozona, dia hapetrany eo ambonin’ny filanjana azy. '
  '13':
  - type: text
    content: 'Dia hanaisotra ny lavenona amin’ny alitara izy ka hamelatra lamba volomparasy eo amboniny. '
  '14':
  - type: text
    content: 'Hapetrany eo amboniny avokoa ny fanaka rehetra momba azy, izay fampiasa amin’ny fanompoam-pivavahana, dia ny fitondrana afony, ny fitrebiny, ny sotron’afony ary ny loviany famafazana, dia ireo fanaka rehetra momba ny alitara; hovelarany rakotra hoditra trozona eo amboniny dia hataony eo aminy ny baony. '
  '15':
  - type: text
    content: 'Rehefa vitan’i Arona sy ireo zanany ny manarona ny fitoerana masina sy ireo fanaka rehetra momba azy ka efa hifindra ny toby, dia izay vao ho avy ireo zanak’i Kehata hitondra azy; satria tsy hikasika ny fitoerana masina izy ireo sao ho faty. Izany no anjara asan’ireo taranak’i Kehata ao amin’ny tranolay fihaonana. '
  '16':
  - type: text
    content: 'Ary i Eleazara, zanak’i Arona mpisorona, dia hanara-maso ny diloilo hatao fanazavana, ny ditin-kazo mani-pofona, ny fanatitra avy amin’ny zavamaniry fanao isanandro ary ny diloilo fanosorana; hanara-maso ny '
  - type: text
    content: tabernakely
  - type: text
    content: ' manontolo sy izay rehetra ao anatiny izy, ao amin’ny fitoerana masina sy ireo fanaka momba azy.'
  '17':
  - type: text
    content: 'Ary NY TOMPO niteny tamin’i Mosesy sy i Arona hoe: '
  '18':
  - type: text
    content: 'Ataovy izay tsy hahafongotra ny fianakavian’ny Kehatita izay naman’ny '
  - type: text
    content: levita
  - type: text
    content: '. '
  '19':
  - type: text
    content: 'Izao no hataonareo aminy mba ho velona izy fa tsy ho faty, raha manatona ny zavatra masina indrindra: I Arona sy ireo zanany no ho avy ka hanendry ny olona samy ho amin’izay fanompoany sy ny asany avy. '
  '2':
  - type: text
    content: 'Alao isa ny taranak’i Kehata ao amin’ny taranak’i Levy, araka ny fokony sy ny fianakaviany, '
  '20':
  - type: text
    content: Tsy hiditra hijery ny zava-masina izy ireo na dia indray mipy maso akory aza fandrao maty.
  - type: heading
    content: Ireo taranak’i Gersona
  '21':
  - type: text
    content: 'Ary NY TOMPO niteny tamin’i Mosesy hoe: '
  '22':
  - type: text
    content: 'Alao isa koa ny taranak’i Gersona, araka ny fianakaviany sy ny fokony avy; '
  '23':
  - type: text
    content: 'izay hatramin’ny telopolo taona ka hatramin’ny dimampolo taona no hisainao, dia izay rehetra azo alefa hanafika, fa hanao fanompoana ao amin’ny '
  - type: text
    content: tranolay fihaonana
  - type: text
    content: ' izy ireo. '
  '24':
  - type: text
    content: 'Izao no anjaran’ny fianakavian’ny Gersonita amin’ny fanompoana sy ny entana tokony hoentiny: '
  '25':
  - type: text
    content: 'Ny ambain’ny '
  - type: text
    content: tabernakely
  - type: text
    content: ' sy ny tranolay fihaonana, ny rakotra sy ny sarona hoditra trozona izay eo amboniny, ny varavarana lamba amin’ny varavaran’ny tranolay fihaonana, '
  '26':
  - type: text
    content: 'ny fefy lamban’ny kianja sy ny vavahady lamba amin’ny vavahadin’ny kianja, izay manodidina ny tabernakely sy ny alitara, ny kofehy mbamin’ny fiasana rehetra momba azy. Izay asa rehetra momba ireo no ho fanompoany. '
  '27':
  - type: text
    content: 'Araka ny tenin’i Arona sy ireo zanany no hanaovan’ny Gersonita ny fanompoany amin’ny fitondrana ny entana sy ny fanompoany rehetra; hatolotrao azy ho anjara raharahany ny zavatra rehetra izay entiny. '
  '28':
  - type: text
    content: Izany no ho fanompoan’ny fianakavian’ny Gersonita momba ny tranolay fihaonana; ny ho mpifehy azy amin’izany anjara raharahany izany dia Itamara, zanak’i Arona mpisorona.
  - type: heading
    content: Ireo taranak’i Merary
  '29':
  - type: text
    content: 'Ny amin’ny taranak’i Merary, dia araka ny fokony sy ny fianakaviany no handaminanao azy; '
  '3':
  - type: text
    content: 'hatramin’ny telopolo taona ka hatramin’ny dimampolo taona, dia izay rehetra azo alefa hanafika, fa hanao fanompoana ao amin’ny '
  - type: text
    content: tranolay fihaonana
  - type: text
    content: ' ireo.'
  '30':
  - type: text
    content: 'izay hatramin’ny telopolo taona ka hatramin’ny dimampolo taona no hisainao, dia izay rehetra tokony hanafika, fa hanao ny fanompoana momba ny '
  - type: text
    content: tranolay fihaonana
  - type: text
    content: ' izy ireo.'
  '31':
  - type: text
    content: 'Izao no ho anjara raharahany ny amin’ny entana araka ny fanompoana rehetra ao amin’ny tranolay fihaonana: Ireo hazo fisaka amin’ny '
  - type: text
    content: tabernakely
  - type: text
    content: ' sy ny barany, ny andriny sy ny faladiany, '
  '32':
  - type: text
    content: 'ireo andrin’ny kianja manodidina sy ny faladiany, ny tsatòkan-day rehetra ary ny kofehy momba ny fiasana rehetra mbamin’ny zavatra rehetra enti-manao fanompoana ao. Araka ny anarany avy no hanisanareo ny fanaka, izay anjara entany. '
  '33':
  - type: text
    content: Izany no ho fanompoan’ny fianakavian’ny taranak’i Merary, araka ny fanompoany rehetra ao amin’ny tranolay fihaonana, ary Itamara, zanak’i Arona mpisorona, no ho mpifehy azy.
  - type: heading
    content: Fanisana ireo levita am-perin’asa
  '34':
  - type: text
    content: 'Ary i Mosesy sy i Arona mbamin’ireo lohan’ny fiangonana nanisa dia ny taranaky ny Kehatita, araka ny fokony sy ny fianakaviany avy, '
  '35':
  - type: text
    content: 'hatramin’ny telopolo taona ka hatramin’ny dimampolo taona, dia izay rehetra tokony hanafika, fa hanao fanompoana ao amin’ny '
  - type: text
    content: tranolay fihaonana
  - type: text
    content: ' izy ireo. '
  '36':
  - type: text
    content: 'Izay voaisa taminy, araka ny fianakaviany, dia dimampolo sy fitonjato sy roa arivo. '
  '37':
  - type: text
    content: Ireo no voaisa tamin’ny fianakavian’ny Kehatita, dia izay rehetra manao fanompoana ao amin’ny tranolay fihaonana, izay nisain’i Mosesy sy i Arona araka ny didin’NY TOMPO nampitondrainy an’i Mosesy.
  '38':
  - type: text
    content: 'Izay voaisa tamin’ny taranak’i Gersona, araka ny fokony sy ny fianakaviany, '
  '39':
  - type: text
    content: 'hatramin’ny telopolo taona ka hatramin’ny dimampolo taona, dia izay rehetra tokony hanafika, fa hanao fanompoana ao amin’ny tranolay fihaonana. '
  '4':
  - type: text
    content: 'Izao no ho fanompoan’ny taranak’i Kehata ao amin’ny tranolay fihaonana, dia ny zavatra masina indrindra: '
  '40':
  - type: text
    content: 'Izay voaisa taminy, araka ny fokony sy ny fianakaviany, dia telopolo sy eninjato sy roa arivo. '
  '41':
  - type: text
    content: Ireo no voaisa tamin’ny fokon’ny taranak’i Gersona, dia izay rehetra manao fanompoana ao amin’ny tranolay fihaonana ka nalamin’i Mosesy sy i Arona araka ny didin’NY TOMPO.
  '42':
  - type: text
    content: 'Ary izay voaisa tamin’ny fianakavian’ny taranak’i Merary, araka ny fokony sy ny fianakaviany, '
  '43':
  - type: text
    content: 'hatramin’ny telopolo taona ka hatramin’ny dimampolo taona, dia izay rehetra afaka hanafika, fa hanao fanompoana ao amin’ny tranolay fihaonana, '
  '44':
  - type: text
    content: 'izay voaisa taminy, araka ny fianakaviany, dia roanjato sy telo arivo. '
  '45':
  - type: text
    content: Ireo no voaisa tamin’ny fianakavian’ny taranak’i Merary, izay nisain’i Mosesy sy i Arona araka ny didin’NY TOMPO nampitondrainy an’i Mosesy.
  '46':
  - type: text
    content: 'Ny tontalin’ny taranak’i Levy izay voaisan’i Mosesy sy i Arona mbamin’ireo lehiben’ny Israely, araka ny fokony sy ny fianakaviany, '
  '47':
  - type: text
    content: 'hatramin’ny telopolo taona ka hatramin’ny dimampolo taona, dia izay rehetra niditra hanao raharaha amin’ny fanompoana, dia ny fanompoana ny amin’ny fitondrana entana ao amin’ny tranolay fihaonana. '
  '48':
  - type: text
    content: 'Izay voaisa taminy dia valopolo sy dimanjato sy valo arivo. '
  '49':
  - type: text
    content: Araka ny didin’NY TOMPO nampitondrainy an’i Mosesy no nandaminany azy samy ho amin’ny fanompoany avy sy ny anjara entany avy. Nomena andraikitra araka izay nandidian’NY TOMPO an’i Mosesy ireo.
  '5':
  - type: text
    content: 'Rehefa hiainga ny toby dia hiditra i Arona sy ireo zanany ka hampidina ny efitra lamba fanakonana, ary hasarony ny vata misy ny Vavolombelona izany; '
  '6':
  - type: text
    content: 'hoditra trozona no hataony sarona eo amboniny, koa lamba volon’ondry manga tokam-bolo no hovelariny ary hasarony eo ambonin’io, dia hataony eo aminy ny baony. '
  '7':
  - type: text
    content: 'Hamelatra lamba volon’ondry manga eo ambonin’ny latabatry ny mofo atao fanatitra izy ireo ka hataony eo ny lovia, ny lovia kely, ny kapoaka ary ny kapoaka lehibe fandrarahana divay; ary ny mofo atao fanatitra dia hataony eo amboniny. '
  '8':
  - type: text
    content: 'Hovelarany lamba jaky eo ambonin’io ka hosaronany amin’ny rakotra hoditra trozona izany, dia hataony eo aminy ny baony. '
  '9':
  - type: text
    content: 'Haka lamba volon’ondry manga indray izy ka hasarony ny fitoeran-jiro fanazavana, ireo jirony, hetin-jirony sy fitoeran-davenon-jirony ary ireo fitaovany fitoeran-diloilo rehetra, izay anaovana ny fanompoam-pivavahana; '
