document_id: LUK.20
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fanontaniana ny amin’ny fahefan’i Jesosy
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat 21.23-27; Mar 11.27-33
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Indray andro, raha nampianatra ny olona teo amin’ny tempoly Jesosy ka nitory ny Filazantsara, dia nanatona ireo lehiben’ny mpisorona sy mpanoradalàna ary ny loholona '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'ka niteny Taminy hoe: Lazao aminay: Fahefana avy aiza no anaovanao izao zavatra izao? Ary iza no nanome Anao izany fahefana izany? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dia namaly azy ireo Jesosy hoe: Izaho kosa mba hanontany anareo zavatra iray loha, koa lazao amiko: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ny batisan’i Jaona avy tany an-danitra va sa avy tamin’ny olona? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia nikaon-doha izy ireo ka niteny hoe: Raha holazaintsika mantsy hoe: Avy tany an-danitra, dia hataony hoe: Nahoana no tsy nino azy ianareo? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Fa raha holazaintsika kosa hoe: Avy tamin’ny olona, dia hitora-bato antsika ny vahoaka rehetra satria inoany ho mpaminany i Jaona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dia namaly ireo fa tsy fantany izay niaviany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary hoy Jesosy tamin’izy ireo: Izaho kosa tsy hilaza aminareo izay fahefana anaovako izao zavatra izao.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fanoharana ny amin’ireo mpiasa ratsy fanahy tao amin’ny tanim-boaloboka
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat 21.33-46; Mar 12.1-12
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Dia nilaza izao fanoharana izao tamin’ny olona Izy: Nisy olona iray namboly tamin’ny tanim-boaloboka, dia nahofany tamin’olona mpiasa tany izany ka nandeha nitoetra ela tany an-tany lavitra izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Rehefa tonga ny fotoanan’ny vokatra dia naniraka mpanompo hankany amin’ireo mpiasa tany izy mba handray amin’ny vokatry ny tanim-boaloboka; fa nikapoka azy ireo mpiasa tany ka nampandeha azy tanam-polo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Dia naniraka mpanompo iray koa izy, izay nokapohin’ireo mafy koa sady nalany baraka ka nampandehaniny tanam-polo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Dia naniraka fanintelony izy; ary iny koa dia nataony naratra ka noroahiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dia hoy ny tompon’ny tanim-boaloboka: Inona re no hataoko? Haniraka ny zanako malalako aho; angamba hanaja azy izy ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Fa raha nahita azy ireo mpiasa tany dia nikaon-doha ka niteny hoe: Ity no mpandova; andeha hovonointsika io mba ho antsika ny lova. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Dia namoaka azy tany ivelan’ny tanim-boaloboka izy ireo ka namono azy. Hataon’ny tompon’ny tanim-boaloboka ahoana moa izy ireo amin’izany? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Hankany izy, dia hamono ireo mpiasa tany ireo, ka homeny olon-kafa ny tanim-boaloboka.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ary raha nahare izany ireo mpisorona sy mpanoradalàna ary loholona dia niteny hoe: Sanatria izany! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Fa Jesosy nijery azy ireo ka niteny hoe: Ahoana moa izao voasoratra izao:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Ny vato izay nolavin’ny mpanao trano,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia izany no efa tonga fehizoro» (Sal 118.22)?
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Izay rehetra potraka amin’izany vato izany dia ho torotoro; ary na iza na iza no ianjerany dia ho montsamontsana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ary tamin’izany ora izany dia nitady hisambotra Azy ny mpanoradalàna sy ny lehiben’ny mpisorona; nefa natahotra ny olona izy ireo satria fantany fa ho azy ireo no nilazany izany fanoharana izany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny hetra ho an’i Kaisara
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat 22.15-22; Mar 12.13-17
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Nanara-maso an’i Jesosy izy ireo ka naniraka mpitsikilo, izay mody niseho ho marina, mba hamandrika Azy amin’ny teniny ka hanolorany Azy ho amin’ny hery sy ny fahefan’ny governora. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary nanontany Azy izy ireo hoe: Mpampianatra ô, fantatray fa miteny sy mampianatra marina Ianao ka tsy mizaha tavan’olona, fa mampianatra marina ny lalànan’Andriamanitra: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Mety va raha mandoa vola hetra ho an’i Kaisara izahay sa tsia? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Fa Jesosy nahafantatra ny teti-dratsiny ka niteny taminy hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Mampisehoa '
  - type: usfm
    marker: w
    children:
    - type: text
      text: denaria
  - type: text
    text: ' iray Amiko. An’iza moa io sary sy soratra eo aminy io? Hoy ireo: An’i Kaisara. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Dia hoy Jesosy taminy: Aloavy ho an’i Kaisara ary izay an’i Kaisara ary ho an’Andriamanitra izay an’Andriamanitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Ary tsy sahiny nitanana Azy teo anatrehan’ny olona izany teny izany, sady gaga izy ireo noho ny famaliny ka nangina.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fanontaniana ny amin’ny fitsanganana amin’ny maty
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat 22.23-33; Mar 12.18-27
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ary ny sasany tamin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Sadoseo
  - type: text
    text: ', izay milaza fa tsy misy ny fitsanganan’ny maty, dia nanatona ka nanontany Azy hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Mpampianatra ô, i Mosesy dia nanoratra ho antsika hoe: «Raha misy manana rahalahy maty momba, ka mbola velona ny vadin’ny maty, dia aoka ny rahalahiny hampakatra an-dRavehivavy ka hiteraka hamelo-maso ny rahalahiny» (Deo 25.5). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Koa nisy fito mirahalahy; ary nampaka-bady ny zokiny dia maty momba. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ny faharoa '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'sy ny fahatelo koa dia nampakatra azy; ary tahaka izany avokoa no nataon’izy fito mirahalahy; nefa maty momba avokoa izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Ary farany dia maty koa Ravehivavy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Koa amin’ny fitsanganana amin’ny maty, ho vadin’iza moa Ravehivavy? Fa samy efa nanambady azy avokoa izy fito mirahalahy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ary hoy Jesosy taminy: Ny zanak’izao fiainana izao dia mampaka-bady sady avoaka hampakarina; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'fa izay atao mendrika hahazo izany fiainana izany sy ny fitsanganana amin’ny maty kosa dia tsy mba mampaka-bady na avoaka hampakarina; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'ary tsy mety maty intsony izy, fa mitovy amin’ny anjely sady zanak’Andriamanitra satria zanaky ny fitsanganana amin’ny maty. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Ary i Mosesy aza dia nanambara teo amin’ilay teny milaza ny roimemy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.37 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Ampit. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Eks 3.2.
    marker-yv: yv-n
  - type: text
    text: ' fa hatsangana ny maty, raha niantso NY TOMPO hoe: «Andriamanitr’i Abrahama sy Andriamanitr’Isaka ary Andriamanitr’i Jakoba» (Eks 3.6). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Fa tsy mba Andriamanitry ny maty Izy fa an’ny velona; fa velona ho an’Andriamanitra avokoa izy rehetra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Ary hoy ny mpanoradalàna sasany: Mpampianatra ô, marina izay nolazainao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Fa tsy nisy sahy nanontany Azy na inona na inona intsony ireo.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Kristy sy i Davida
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat 22.41-46; Mar 12.35-37
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Hoy Jesosy tamin’ireo: Nahoana no lazaina fa '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' no Zanak’i Davida? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Nefa i Davida ihany no milaza eo amin’ny bokin’ny Salamo hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: '«NY TOMPO nilaza tamin’ny Tompoko hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mipetraha eo ankavanako
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: ambara-panaoko ny fahavalonao ho fitoeran’ny tongotrao» (Sal 110.1).
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Miantso Azy hoe: Tompo izany i Davida; koa ahoana no maha Zanany Azy?'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fampitandremana ny amin’ny mpanoradalàna
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat 23.1, 5-7, 14; Mar 12.37-40
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Raha mbola nihaino ny olona rehetra dia hoy Izy tamin’ny mpianany: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Mitandrema ianareo amin’ny mpanoradalàna izay mazoto mandehandeha miakanjo akanjo lava, ary te hoarahabain’ny olona eny an-tsena sady tia ny toerana eny aloha ao amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sinagoga
  - type: text
    text: ' sy ny toerana aloha any amin’ny fanasana, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: ary mandany ny tranon’ny mpitondratena sy manao vavaka lavareny mba ho fisehoana ivelany; ireo dia hahazo fanamelohana mafimafy kokoa.
