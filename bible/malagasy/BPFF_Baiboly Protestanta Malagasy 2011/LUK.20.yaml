document_id: LUK.20,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Fanontaniana ny amin’ny fahefan’i Jesosy
  - type: heading
    content: Mat 21.23-27; Mar 11.27-33
  - type: text
    content: 'Indray andro, raha nampianatra ny olona teo amin’ny tempoly Jesosy ka nitory ny Filazantsara, dia nanatona ireo lehiben’ny mpisorona sy mpanoradalàna ary ny loholona '
  '10':
  - type: text
    content: 'Rehefa tonga ny fotoanan’ny vokatra dia naniraka mpanompo hankany amin’ireo mpiasa tany izy mba handray amin’ny vokatry ny tanim-boaloboka; fa nikapoka azy ireo mpiasa tany ka nampandeha azy tanam-polo. '
  '11':
  - type: text
    content: 'Dia naniraka mpanompo iray koa izy, izay nokapohin’ireo mafy koa sady nalany baraka ka nampandehaniny tanam-polo. '
  '12':
  - type: text
    content: 'Dia naniraka fanintelony izy; ary iny koa dia nataony naratra ka noroahiny. '
  '13':
  - type: text
    content: 'Dia hoy ny tompon’ny tanim-boaloboka: Inona re no hataoko? Haniraka ny zanako malalako aho; angamba hanaja azy izy ireo. '
  '14':
  - type: text
    content: 'Fa raha nahita azy ireo mpiasa tany dia nikaon-doha ka niteny hoe: Ity no mpandova; andeha hovonointsika io mba ho antsika ny lova. '
  '15':
  - type: text
    content: 'Dia namoaka azy tany ivelan’ny tanim-boaloboka izy ireo ka namono azy. Hataon’ny tompon’ny tanim-boaloboka ahoana moa izy ireo amin’izany? '
  '16':
  - type: text
    content: Hankany izy, dia hamono ireo mpiasa tany ireo, ka homeny olon-kafa ny tanim-boaloboka.
  - type: text
    content: 'Ary raha nahare izany ireo mpisorona sy mpanoradalàna ary loholona dia niteny hoe: Sanatria izany! '
  '17':
  - type: text
    content: 'Fa Jesosy nijery azy ireo ka niteny hoe: Ahoana moa izao voasoratra izao:'
  - type: text
    content: «Ny vato izay nolavin’ny mpanao trano,
  - type: text
    content: dia izany no efa tonga fehizoro» (Sal 118.22)?
  '18':
  - type: text
    content: Izay rehetra potraka amin’izany vato izany dia ho torotoro; ary na iza na iza no ianjerany dia ho montsamontsana.
  '19':
  - type: text
    content: Ary tamin’izany ora izany dia nitady hisambotra Azy ny mpanoradalàna sy ny lehiben’ny mpisorona; nefa natahotra ny olona izy ireo satria fantany fa ho azy ireo no nilazany izany fanoharana izany.
  - type: heading
    content: Ny hetra ho an’i Kaisara
  - type: heading
    content: Mat 22.15-22; Mar 12.13-17
  '2':
  - type: text
    content: 'ka niteny Taminy hoe: Lazao aminay: Fahefana avy aiza no anaovanao izao zavatra izao? Ary iza no nanome Anao izany fahefana izany? '
  '20':
  - type: text
    content: 'Nanara-maso an’i Jesosy izy ireo ka naniraka mpitsikilo, izay mody niseho ho marina, mba hamandrika Azy amin’ny teniny ka hanolorany Azy ho amin’ny hery sy ny fahefan’ny governora. '
  '21':
  - type: text
    content: 'Ary nanontany Azy izy ireo hoe: Mpampianatra ô, fantatray fa miteny sy mampianatra marina Ianao ka tsy mizaha tavan’olona, fa mampianatra marina ny lalànan’Andriamanitra: '
  '22':
  - type: text
    content: 'Mety va raha mandoa vola hetra ho an’i Kaisara izahay sa tsia? '
  '23':
  - type: text
    content: 'Fa Jesosy nahafantatra ny teti-dratsiny ka niteny taminy hoe: '
  '24':
  - type: text
    content: 'Mampisehoa '
  - type: text
    content: denaria
  - type: text
    content: ' iray Amiko. An’iza moa io sary sy soratra eo aminy io? Hoy ireo: An’i Kaisara. '
  '25':
  - type: text
    content: 'Dia hoy Jesosy taminy: Aloavy ho an’i Kaisara ary izay an’i Kaisara ary ho an’Andriamanitra izay an’Andriamanitra. '
  '26':
  - type: text
    content: Ary tsy sahiny nitanana Azy teo anatrehan’ny olona izany teny izany, sady gaga izy ireo noho ny famaliny ka nangina.
  - type: heading
    content: Fanontaniana ny amin’ny fitsanganana amin’ny maty
  - type: heading
    content: Mat 22.23-33; Mar 12.18-27
  '27':
  - type: text
    content: 'Ary ny sasany tamin’ny '
  - type: text
    content: Sadoseo
  - type: text
    content: ', izay milaza fa tsy misy ny fitsanganan’ny maty, dia nanatona ka nanontany Azy hoe: '
  '28':
  - type: text
    content: 'Mpampianatra ô, i Mosesy dia nanoratra ho antsika hoe: «Raha misy manana rahalahy maty momba, ka mbola velona ny vadin’ny maty, dia aoka ny rahalahiny hampakatra an-dRavehivavy ka hiteraka hamelo-maso ny rahalahiny» (Deo 25.5). '
  '29':
  - type: text
    content: 'Koa nisy fito mirahalahy; ary nampaka-bady ny zokiny dia maty momba. '
  '3':
  - type: text
    content: 'Dia namaly azy ireo Jesosy hoe: Izaho kosa mba hanontany anareo zavatra iray loha, koa lazao amiko: '
  '30':
  - type: text
    content: 'Ny faharoa '
  '31':
  - type: text
    content: 'sy ny fahatelo koa dia nampakatra azy; ary tahaka izany avokoa no nataon’izy fito mirahalahy; nefa maty momba avokoa izy. '
  '32':
  - type: text
    content: 'Ary farany dia maty koa Ravehivavy. '
  '33':
  - type: text
    content: Koa amin’ny fitsanganana amin’ny maty, ho vadin’iza moa Ravehivavy? Fa samy efa nanambady azy avokoa izy fito mirahalahy.
  '34':
  - type: text
    content: 'Ary hoy Jesosy taminy: Ny zanak’izao fiainana izao dia mampaka-bady sady avoaka hampakarina; '
  '35':
  - type: text
    content: 'fa izay atao mendrika hahazo izany fiainana izany sy ny fitsanganana amin’ny maty kosa dia tsy mba mampaka-bady na avoaka hampakarina; '
  '36':
  - type: text
    content: 'ary tsy mety maty intsony izy, fa mitovy amin’ny anjely sady zanak’Andriamanitra satria zanaky ny fitsanganana amin’ny maty. '
  '37':
  - type: text
    content: Ary i Mosesy aza dia nanambara teo amin’ilay teny milaza ny roimemy
  - type: note
    content: Ampit. Eks 3.2.
  - type: text
    content: ' fa hatsangana ny maty, raha niantso NY TOMPO hoe: «Andriamanitr’i Abrahama sy Andriamanitr’Isaka ary Andriamanitr’i Jakoba» (Eks 3.6). '
  '38':
  - type: text
    content: Fa tsy mba Andriamanitry ny maty Izy fa an’ny velona; fa velona ho an’Andriamanitra avokoa izy rehetra.
  '39':
  - type: text
    content: 'Ary hoy ny mpanoradalàna sasany: Mpampianatra ô, marina izay nolazainao. '
  '4':
  - type: text
    content: 'Ny batisan’i Jaona avy tany an-danitra va sa avy tamin’ny olona? '
  '40':
  - type: text
    content: Fa tsy nisy sahy nanontany Azy na inona na inona intsony ireo.
  - type: heading
    content: Kristy sy i Davida
  - type: heading
    content: Mat 22.41-46; Mar 12.35-37
  '41':
  - type: text
    content: 'Hoy Jesosy tamin’ireo: Nahoana no lazaina fa '
  - type: text
    content: Kristy
  - type: text
    content: ' no Zanak’i Davida? '
  '42':
  - type: text
    content: 'Nefa i Davida ihany no milaza eo amin’ny bokin’ny Salamo hoe:'
  - type: text
    content: '«NY TOMPO nilaza tamin’ny Tompoko hoe:'
  - type: text
    content: Mipetraha eo ankavanako
  '43':
  - type: text
    content: ambara-panaoko ny fahavalonao ho fitoeran’ny tongotrao» (Sal 110.1).
  '44':
  - type: text
    content: 'Miantso Azy hoe: Tompo izany i Davida; koa ahoana no maha Zanany Azy?'
  - type: heading
    content: Fampitandremana ny amin’ny mpanoradalàna
  - type: heading
    content: Mat 23.1, 5-7, 14; Mar 12.37-40
  '45':
  - type: text
    content: 'Raha mbola nihaino ny olona rehetra dia hoy Izy tamin’ny mpianany: '
  '46':
  - type: text
    content: 'Mitandrema ianareo amin’ny mpanoradalàna izay mazoto mandehandeha miakanjo akanjo lava, ary te hoarahabain’ny olona eny an-tsena sady tia ny toerana eny aloha ao amin’ny '
  - type: text
    content: sinagoga
  - type: text
    content: ' sy ny toerana aloha any amin’ny fanasana, '
  '47':
  - type: text
    content: ary mandany ny tranon’ny mpitondratena sy manao vavaka lavareny mba ho fisehoana ivelany; ireo dia hahazo fanamelohana mafimafy kokoa.
  '5':
  - type: text
    content: 'Dia nikaon-doha izy ireo ka niteny hoe: Raha holazaintsika mantsy hoe: Avy tany an-danitra, dia hataony hoe: Nahoana no tsy nino azy ianareo? '
  '6':
  - type: text
    content: 'Fa raha holazaintsika kosa hoe: Avy tamin’ny olona, dia hitora-bato antsika ny vahoaka rehetra satria inoany ho mpaminany i Jaona. '
  '7':
  - type: text
    content: 'Dia namaly ireo fa tsy fantany izay niaviany. '
  '8':
  - type: text
    content: 'Ary hoy Jesosy tamin’izy ireo: Izaho kosa tsy hilaza aminareo izay fahefana anaovako izao zavatra izao.'
  - type: heading
    content: Fanoharana ny amin’ireo mpiasa ratsy fanahy tao amin’ny tanim-boaloboka
  - type: heading
    content: Mat 21.33-46; Mar 12.1-12
  '9':
  - type: text
    content: 'Dia nilaza izao fanoharana izao tamin’ny olona Izy: Nisy olona iray namboly tamin’ny tanim-boaloboka, dia nahofany tamin’olona mpiasa tany izany ka nandeha nitoetra ela tany an-tany lavitra izy. '
