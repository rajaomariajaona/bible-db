document_id: JOL.4
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fitsaran’Andriamanitra ny Jentilisa
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Fa indro, amin’ireo andro ireo sy amin’izany fotoana izany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'rehefa hampody an’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Joda
  - type: text
    text: ' sy hanangana an’i Jerosalema indray Aho,'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'dia hangoniko ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jentilisa
  - type: text
    text: ' rehetra'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hoentiko midina ao amin’ny lohasahan’i Josafata,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ao no hifandaharako aminy
- type: usfm
  marker: q1
  children:
  - type: text
    text: noho ny amin’ny Israely, oloko sy lovako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa naeliny tany amin’ny Jentilisa izy ireo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary nozarazarainy ny taniko
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: sady nanaovany antsapaka ny oloko
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka zazalahy no nataony takalon’ny vehivavy janga,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary zazavavy no namidiny divay ka nosotroiny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ary ianareo koa, ry Tiro sy Sidona, sy ry tanin’ny Filistina rehetra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Inona no tadiavinareo Amiko?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hamaly faty Amiko va ianareo, sa ahoana?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Raha hamaly faty Amiko ianareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hatsingeriko haingana ho eo an-dohanareo ny nataonareo,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: noho ny nakanareo ny volafotsiko sy ny volamenako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny nitondranareo ny fananako sarobidy ho ao amin’ny tempolinareo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ny zanak’i Joda sy ny zanak’i Jerosalema
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia namidinareo tamin’ny Grika
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hamindranareo azy hanalavitra ny taniny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Indro, hofohaziko izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: hiala any amin’ny tany
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay nahalafosanareo azy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hatsingeriko ho eo an-dohanareo ny nataonareo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Hamidiko ho lasan’ny zanak’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Joda
  - type: text
    text: ' kosa ny zanakalahinareo sy ny zanakavavinareo,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hamidiny amin’ny Sabeana kosa ireny, dia ho an’izay firenena lavitra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa NY TOMPO no efa niteny.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ady farany sy fitsarana
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ambarao any amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jentilisa
  - type: text
    text: ' izao:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Miantsoa hanao ady masina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fohazy ny lehilahy mahery!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aoka handroso ny mpiady rehetra ka hiakatra!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Tefeo ho sabatra ny angadinareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ho lefona ny antsinareo fanetezam-boaloboka!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Aoka izay kelikely aina hihiaka hoe: Mahery aho!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Avia haingana, ianareo Jentilisa rehetra avy eny manodidina eny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ento midina ao ny maherinao, RY TOMPO ô!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Aoka hifoha ny Jentilisa
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hiakatra ho ao amin’ny lohasahan’i Josafata;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ao no hipetrahako hitsara
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny Jentilisa rehetra avy eny manodidina eny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Arosoy ny antsimbary
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa masaka ny vokatra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: avia ianareo hanosihosy azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa feno ny famiazam-boaloboka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'mihoatra ny vata fanantazana:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Be loatra ny faharatsiany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: E izany vahoaka mireondreona ao amin’ny lohasahan’ny fitsarana!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa efa antomotra ny Andron’NY TOMPO ao amin’ny lohasahan’ny fitsarana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ho tonga maizina ny masoandro sy ny volana
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy hamirapiratra ny kintana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'NY TOMPO mierona avy ao '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Ziona
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mampikotroka ny feony ao Jerosalema
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka mihorohoro ny tany aman-danitra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa NY TOMPO no fialofan’ny olony
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy fiarovana mafy ho an’ny Zanak’Israely.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ary ho fantatrareo fa Izaho no TOMPO Andriamanitrareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay monina ao Ziona, tendrombohitro masina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ho masina i Jerosalema
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny hafa firenena dia tsy mba handeha
- type: usfm
  marker: q1
  children:
  - type: text
    text: hamakivaky eo intsony.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fanambinana vaovao ho an’ny vahoakan’Andriamanitra
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Amin’izany andro izany dia hipoipoitra ranom-boaloboka ny tendrombohitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: handriaka ronono ny havoana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho feno rano ny lohasahan-driakan’i Joda rehetra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hisy loharano hivoaka avy ao amin’ny tranon’NY TOMPO
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka handena ny lohasahan-driakan’i Sitima.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ho tonga tany lao kosa i Ejipta
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ho tany efitra foana i Edoma
- type: usfm
  marker: q1
  children:
  - type: text
    text: noho ny fampahoriana ny taranak’i Joda,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ny nandatsahany ny ran’ny tsy manan-tsiny teo amin’ny taniny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Fa honenana mandrakizay i Joda
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hatramin’ny taranaka fara aman-dimby i Jerosalema.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ary hamaly ny ran’ny tsy manan-tsiny izay mbola tsy novaliko Aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'fa NY TOMPO monina ao '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Ziona
  - type: text
    text: .
