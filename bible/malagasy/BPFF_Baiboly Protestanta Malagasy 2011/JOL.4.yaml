document_id: JOL.4,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fitsaran’Andriamanitra ny Jentilisa
  - type: text
    content: Fa indro, amin’ireo andro ireo sy amin’izany fotoana izany,
  - type: text
    content: 'rehefa hampody an’i '
  - type: text
    content: Joda
  - type: text
    content: ' sy hanangana an’i Jerosalema indray Aho,'
  '10':
  - type: text
    content: Tefeo ho sabatra ny angadinareo,
  - type: text
    content: ary ho lefona ny antsinareo fanetezam-boaloboka!
  - type: text
    content: 'Aoka izay kelikely aina hihiaka hoe: Mahery aho!'
  '11':
  - type: text
    content: Avia haingana, ianareo Jentilisa rehetra avy eny manodidina eny,
  - type: text
    content: dia ento midina ao ny maherinao, RY TOMPO ô!
  '12':
  - type: text
    content: Aoka hifoha ny Jentilisa
  - type: text
    content: ka hiakatra ho ao amin’ny lohasahan’i Josafata;
  - type: text
    content: fa ao no hipetrahako hitsara
  - type: text
    content: ny Jentilisa rehetra avy eny manodidina eny.
  '13':
  - type: text
    content: Arosoy ny antsimbary
  - type: text
    content: fa masaka ny vokatra;
  - type: text
    content: avia ianareo hanosihosy azy
  - type: text
    content: fa feno ny famiazam-boaloboka,
  - type: text
    content: 'mihoatra ny vata fanantazana:'
  - type: text
    content: Be loatra ny faharatsiany.
  '14':
  - type: text
    content: E izany vahoaka mireondreona ao amin’ny lohasahan’ny fitsarana!
  - type: text
    content: Fa efa antomotra ny Andron’NY TOMPO ao amin’ny lohasahan’ny fitsarana.
  '15':
  - type: text
    content: Ho tonga maizina ny masoandro sy ny volana
  - type: text
    content: ary tsy hamirapiratra ny kintana.
  '16':
  - type: text
    content: 'NY TOMPO mierona avy ao '
  - type: text
    content: Ziona
  - type: text
    content: ary mampikotroka ny feony ao Jerosalema
  - type: text
    content: ka mihorohoro ny tany aman-danitra;
  - type: text
    content: fa NY TOMPO no fialofan’ny olony
  - type: text
    content: sy fiarovana mafy ho an’ny Zanak’Israely.
  '17':
  - type: text
    content: Ary ho fantatrareo fa Izaho no TOMPO Andriamanitrareo,
  - type: text
    content: izay monina ao Ziona, tendrombohitro masina;
  - type: text
    content: dia ho masina i Jerosalema
  - type: text
    content: ary ny hafa firenena dia tsy mba handeha
  - type: text
    content: hamakivaky eo intsony.
  - type: heading
    content: Fanambinana vaovao ho an’ny vahoakan’Andriamanitra
  '18':
  - type: text
    content: Amin’izany andro izany dia hipoipoitra ranom-boaloboka ny tendrombohitra,
  - type: text
    content: handriaka ronono ny havoana,
  - type: text
    content: ho feno rano ny lohasahan-driakan’i Joda rehetra,
  - type: text
    content: ary hisy loharano hivoaka avy ao amin’ny tranon’NY TOMPO
  - type: text
    content: ka handena ny lohasahan-driakan’i Sitima.
  '19':
  - type: text
    content: Ho tonga tany lao kosa i Ejipta
  - type: text
    content: ary ho tany efitra foana i Edoma
  - type: text
    content: noho ny fampahoriana ny taranak’i Joda,
  - type: text
    content: dia ny nandatsahany ny ran’ny tsy manan-tsiny teo amin’ny taniny.
  '2':
  - type: text
    content: 'dia hangoniko ny '
  - type: text
    content: Jentilisa
  - type: text
    content: ' rehetra'
  - type: text
    content: ka hoentiko midina ao amin’ny lohasahan’i Josafata,
  - type: text
    content: ary ao no hifandaharako aminy
  - type: text
    content: noho ny amin’ny Israely, oloko sy lovako,
  - type: text
    content: fa naeliny tany amin’ny Jentilisa izy ireo;
  - type: text
    content: ary nozarazarainy ny taniko
  '20':
  - type: text
    content: Fa honenana mandrakizay i Joda
  - type: text
    content: ary hatramin’ny taranaka fara aman-dimby i Jerosalema.
  '21':
  - type: text
    content: Ary hamaly ny ran’ny tsy manan-tsiny izay mbola tsy novaliko Aho;
  - type: text
    content: 'fa NY TOMPO monina ao '
  - type: text
    content: Ziona
  - type: text
    content: .
  '3':
  - type: text
    content: sady nanaovany antsapaka ny oloko
  - type: text
    content: ka zazalahy no nataony takalon’ny vehivavy janga,
  - type: text
    content: ary zazavavy no namidiny divay ka nosotroiny.
  '4':
  - type: text
    content: Ary ianareo koa, ry Tiro sy Sidona, sy ry tanin’ny Filistina rehetra,
  - type: text
    content: Inona no tadiavinareo Amiko?
  - type: text
    content: Hamaly faty Amiko va ianareo, sa ahoana?
  - type: text
    content: Raha hamaly faty Amiko ianareo
  - type: text
    content: dia hatsingeriko haingana ho eo an-dohanareo ny nataonareo,
  '5':
  - type: text
    content: noho ny nakanareo ny volafotsiko sy ny volamenako,
  - type: text
    content: sy ny nitondranareo ny fananako sarobidy ho ao amin’ny tempolinareo.
  '6':
  - type: text
    content: Ny zanak’i Joda sy ny zanak’i Jerosalema
  - type: text
    content: dia namidinareo tamin’ny Grika
  - type: text
    content: mba hamindranareo azy hanalavitra ny taniny.
  '7':
  - type: text
    content: Indro, hofohaziko izy
  - type: text
    content: hiala any amin’ny tany
  - type: text
    content: izay nahalafosanareo azy,
  - type: text
    content: ary hatsingeriko ho eo an-dohanareo ny nataonareo.
  '8':
  - type: text
    content: 'Hamidiko ho lasan’ny zanak’i '
  - type: text
    content: Joda
  - type: text
    content: ' kosa ny zanakalahinareo sy ny zanakavavinareo,'
  - type: text
    content: ary hamidiny amin’ny Sabeana kosa ireny, dia ho an’izay firenena lavitra;
  - type: text
    content: fa NY TOMPO no efa niteny.
  - type: heading
    content: Ady farany sy fitsarana
  '9':
  - type: text
    content: 'Ambarao any amin’ny '
  - type: text
    content: Jentilisa
  - type: text
    content: ' izao:'
  - type: text
    content: Miantsoa hanao ady masina,
  - type: text
    content: fohazy ny lehilahy mahery!
  - type: text
    content: Aoka handroso ny mpiady rehetra ka hiakatra!
