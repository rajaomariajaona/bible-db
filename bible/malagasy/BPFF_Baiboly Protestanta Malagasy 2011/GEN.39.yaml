document_id: GEN.39
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: I Josefa tao amin’i Potifara
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary i Josefa dia noentina nidina ho any Ejipta ka i Potifara, lehilahy ejiptiana, tandapan’i Farao sady lehiben’ny mpiambina, no nividy azy tamin’ireo Ismaelita izay nitondra azy nidina tany. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary NY TOMPO nomba an’i Josefa ka nambinina izy; nitoetra tao an-tranon’ilay Ejiptiana tompony izy. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dia hitan’ny tompony fa nomban’NY TOMPO izy satria izay rehetra nataony dia nampahombiazin’NY TOMPO. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary i Josefa dia nahita fitia teo imason’ny tompony ka nanompo azy. Notendreny ho mpikarakara ny tao an-tranony izy ka izay rehetra nananany dia natolony ho andraikiny. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary hatramin’izay nanendren’ny tompony azy ho mpikarakara ny tao an-tranony, mbamin’izay rehetra nananany, dia notahin’NY TOMPO ny tranon’ilay Ejiptiana noho ny amin’i Josefa; ny fitahian’NY TOMPO dia tamin’izay rehetra nananany, na ny tao an-trano, na ny tany an-tsaha. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Dia navelany ho andraikitr’i Josefa izay rehetra nananany; ary satria nanana azy i Potifara dia tsy nihevitra zavatra hafa intsony afa-tsy ny sakafony ihany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: I Josefa sy ny vadin’i Potifara
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: text
    text: Ary i Josefa dia bikana sady tsara tarehy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Taorianan’izany ny vadin’ny tompony dia nanomboka nijery an’i Josefa ka niteny hoe: Avia handry amiko. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Nandà anefa izy ka niteny tamin’ny vadin’ny tompony hoe: Indro, satria manana ahy ny tompoko, dia tsy mihevitra na inona na inona ato an-trano izy, fa izay rehetra ananany dia natolony ho andraikitro avokoa. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Tsy misy lehibe noho izaho ato amin’ity trano ity, ary tsy misy zavatra narovany amiko afa-tsy ianao ihany satria vadiny ianao. Koa hataoko ahoana no hanao izany heloka lehibe izany ka hanota amin’Andriamanitra? '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary na dia niteny tamin’i Josefa isanandro aza Ravehivavy dia tsy nety nanaiky azy handry aminy izy. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Indray andro, niditra hanatanteraka ny raharahany tao an-trano i Josefa, sendra tsy nisy mpanompo tao an-trano tamin’izay, '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'dia nisambotra azy tamin’ny akanjony Ravehivavy ka niteny hoe: Avia handry amiko! Navelan’i Josefa teny an-tanany anefa ny akanjony dia lasa nandositra tany alatrano izy. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Rehefa hitan-dRavehivavy fa navelany teny an-tanany ny akanjony sady lasa nandositra tany alatrano izy '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'dia niantso ireo olona tao an-tranony izy ka nilaza taminy hoe: Indro, nampiditra lehilahy hebreo tato amintsika izy hisangy antsika. Nanatona ahy mba handry amiko iny dia niantso tamin’ny feo mahery aho. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Nony reny fa nanandratra ny feoko aho ka niantsoantso dia navelany teto anilako ny akanjony ka lasa nandositra any alatrano izy. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Dia napetraky Ravehivavy teo anilany ilay akanjon’i Josefa, mandra-pahatongan’ny tompony tao an-trano. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Dia nilaza taminy araka ireo teny ireo izy hoe: Nanatona ahy ilay mpanompolahy hebreo izay noentinao ho eto amintsika mba hisangy ahy. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Rehefa nanandratra ny feoko aho ka niantsoantso dia navelany eto anilako ny akanjony ka lasa nandositra any alatrano izy. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Rehefa ren’ny tompony ny tenin’ny vadiny izay niteny taminy hoe: Araka izany voalazako izany no nataon’ilay mpanompolahinao tamiko, dia nirehitra ny fahatezerany. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Dia naka an’i Josefa ny tompony ka nampiditra azy tao amin’ny tranomaizina izay fitoeran’ny mpifatotra diso tamin’ny mpanjaka. Koa nitoetra tao an-tranomaizina izy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: I Josefa tao an-tranomaizina
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Nomba an’i Josefa anefa NY TOMPO ka namindra fo taminy ary nampahita fitia azy teo imason’ny mpiambina ny tranomaizina. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Koa natolotry ny mpiambina ny tranomaizina ho andraikitr’i Josefa ny mpifatotra rehetra izay tao an-tranomaizina ary izy no tomponandraikitra tamin’izay rehetra nataon’ireo tao. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Tsy mba nikarakara na inona na inona intsony tamin’izay teo am-pelatanany ny mpiambina ny tranomaizina, satria NY TOMPO nomba an’i Josefa, ary izay nataony dia nambinin’NY TOMPO.
