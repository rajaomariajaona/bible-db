document_id: GEN.39,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: I Josefa tao amin’i Potifara
  - type: text
    content: 'Ary i Josefa dia noentina nidina ho any Ejipta ka i Potifara, lehilahy ejiptiana, tandapan’i Farao sady lehiben’ny mpiambina, no nividy azy tamin’ireo Ismaelita izay nitondra azy nidina tany. '
  '10':
  - type: text
    content: 'Ary na dia niteny tamin’i Josefa isanandro aza Ravehivavy dia tsy nety nanaiky azy handry aminy izy. '
  '11':
  - type: text
    content: 'Indray andro, niditra hanatanteraka ny raharahany tao an-trano i Josefa, sendra tsy nisy mpanompo tao an-trano tamin’izay, '
  '12':
  - type: text
    content: 'dia nisambotra azy tamin’ny akanjony Ravehivavy ka niteny hoe: Avia handry amiko! Navelan’i Josefa teny an-tanany anefa ny akanjony dia lasa nandositra tany alatrano izy. '
  '13':
  - type: text
    content: 'Rehefa hitan-dRavehivavy fa navelany teny an-tanany ny akanjony sady lasa nandositra tany alatrano izy '
  '14':
  - type: text
    content: 'dia niantso ireo olona tao an-tranony izy ka nilaza taminy hoe: Indro, nampiditra lehilahy hebreo tato amintsika izy hisangy antsika. Nanatona ahy mba handry amiko iny dia niantso tamin’ny feo mahery aho. '
  '15':
  - type: text
    content: 'Nony reny fa nanandratra ny feoko aho ka niantsoantso dia navelany teto anilako ny akanjony ka lasa nandositra any alatrano izy. '
  '16':
  - type: text
    content: 'Dia napetraky Ravehivavy teo anilany ilay akanjon’i Josefa, mandra-pahatongan’ny tompony tao an-trano. '
  '17':
  - type: text
    content: 'Dia nilaza taminy araka ireo teny ireo izy hoe: Nanatona ahy ilay mpanompolahy hebreo izay noentinao ho eto amintsika mba hisangy ahy. '
  '18':
  - type: text
    content: 'Rehefa nanandratra ny feoko aho ka niantsoantso dia navelany eto anilako ny akanjony ka lasa nandositra any alatrano izy. '
  '19':
  - type: text
    content: 'Rehefa ren’ny tompony ny tenin’ny vadiny izay niteny taminy hoe: Araka izany voalazako izany no nataon’ilay mpanompolahinao tamiko, dia nirehitra ny fahatezerany. '
  '2':
  - type: text
    content: 'Ary NY TOMPO nomba an’i Josefa ka nambinina izy; nitoetra tao an-tranon’ilay Ejiptiana tompony izy. '
  '20':
  - type: text
    content: Dia naka an’i Josefa ny tompony ka nampiditra azy tao amin’ny tranomaizina izay fitoeran’ny mpifatotra diso tamin’ny mpanjaka. Koa nitoetra tao an-tranomaizina izy.
  - type: heading
    content: I Josefa tao an-tranomaizina
  '21':
  - type: text
    content: 'Nomba an’i Josefa anefa NY TOMPO ka namindra fo taminy ary nampahita fitia azy teo imason’ny mpiambina ny tranomaizina. '
  '22':
  - type: text
    content: 'Koa natolotry ny mpiambina ny tranomaizina ho andraikitr’i Josefa ny mpifatotra rehetra izay tao an-tranomaizina ary izy no tomponandraikitra tamin’izay rehetra nataon’ireo tao. '
  '23':
  - type: text
    content: Tsy mba nikarakara na inona na inona intsony tamin’izay teo am-pelatanany ny mpiambina ny tranomaizina, satria NY TOMPO nomba an’i Josefa, ary izay nataony dia nambinin’NY TOMPO.
  '3':
  - type: text
    content: 'Dia hitan’ny tompony fa nomban’NY TOMPO izy satria izay rehetra nataony dia nampahombiazin’NY TOMPO. '
  '4':
  - type: text
    content: 'Ary i Josefa dia nahita fitia teo imason’ny tompony ka nanompo azy. Notendreny ho mpikarakara ny tao an-tranony izy ka izay rehetra nananany dia natolony ho andraikiny. '
  '5':
  - type: text
    content: 'Ary hatramin’izay nanendren’ny tompony azy ho mpikarakara ny tao an-tranony, mbamin’izay rehetra nananany, dia notahin’NY TOMPO ny tranon’ilay Ejiptiana noho ny amin’i Josefa; ny fitahian’NY TOMPO dia tamin’izay rehetra nananany, na ny tao an-trano, na ny tany an-tsaha. '
  '6':
  - type: text
    content: Dia navelany ho andraikitr’i Josefa izay rehetra nananany; ary satria nanana azy i Potifara dia tsy nihevitra zavatra hafa intsony afa-tsy ny sakafony ihany.
  - type: heading
    content: I Josefa sy ny vadin’i Potifara
  - type: text
    content: Ary i Josefa dia bikana sady tsara tarehy.
  '7':
  - type: text
    content: 'Taorianan’izany ny vadin’ny tompony dia nanomboka nijery an’i Josefa ka niteny hoe: Avia handry amiko. '
  '8':
  - type: text
    content: 'Nandà anefa izy ka niteny tamin’ny vadin’ny tompony hoe: Indro, satria manana ahy ny tompoko, dia tsy mihevitra na inona na inona ato an-trano izy, fa izay rehetra ananany dia natolony ho andraikitro avokoa. '
  '9':
  - type: text
    content: 'Tsy misy lehibe noho izaho ato amin’ity trano ity, ary tsy misy zavatra narovany amiko afa-tsy ianao ihany satria vadiny ianao. Koa hataoko ahoana no hanao izany heloka lehibe izany ka hanota amin’Andriamanitra? '
