document_id: JOS.6,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nahazoan’ny Zanak’Israely an’i Jeriko
  - type: text
    content: 'Ary nihidy mafy i Jeriko tamin’izany noho ny Zanak’Israely: Tsy nisy nivoaka avy tao ary tsy nisy niditra nankao. '
  '10':
  - type: text
    content: 'Ny vahoaka dia efa noraran’i Josoa hoe: Aza manakora na mamoaka feo na miloa-bava akory aza mandra-pahatongan’ny andro hilazako aminareo hoe: Manakorà! Ary amin’izay ianareo vao hanakora. '
  '11':
  - type: text
    content: Ary nanodidina ny tanàna indray mandeha ny vata misy ny faneken’NY TOMPO; dia nankany an-toby ny olona ka nitoetra tany nandritra ny alina.
  '12':
  - type: text
    content: 'Dia nifoha vao maraina i Josoa ary nitondra ny vata misy ny faneken’NY TOMPO ny mpisorona. '
  '13':
  - type: text
    content: 'Ary ny mpisorona fito izay nitondra ny anjomara fito mafy faneno teo alohan’ny vata misy ny faneken’NY TOMPO dia nandeha sady nitsoka ny anjomara; ny olona efa voaomana hiady dia nandeha teo alohany; ary ny vodilalana kosa dia nanaraka ny vata misy NY TOMPO; ary notsofina teny am-pandehanana ny anjomara. '
  '14':
  - type: text
    content: 'Dia nanodidina ny tanàna indray mandeha koa izy tamin’ny andro faharoa vao niverina tany an-toby; henemana no nanaovany toy izany. '
  '15':
  - type: text
    content: 'Tamin’ny andro fahafito dia nifoha vao maraina indray izy, raha mbola nazava ratsy ny andro, ka nanodidina ny tanàna impito toy ny nataony teo, nefa tamin’izany andro izany ihany izy no nanodidina ny tanàna impito. '
  '16':
  - type: text
    content: 'Ary tamin’ny nandehanany fanimpitony, raha nitsoka ny anjomara ny mpisorona, dia hoy i Josoa tamin’ny vahoaka: Manakorà! Fa efa nomen’NY TOMPO anareo ny tanàna. '
  '17':
  - type: text
    content: 'Dia hatolotra ho an’NY TOMPO ho zavatra voaozona ny tanàna sy izay rehetra ao; fa Rahaba janga ihany no hovelomina, dia izy sy izay rehetra miaraka aminy ao an-trano, satria nanafina ny iraka nalefantsika izy. '
  '18':
  - type: text
    content: 'Kanefa mitandrema kosa ianareo ny amin’ny zavatra voaozona, fandrao raha manolotra zavatra ho voaozona ianareo, nefa ianareo no maka amin’ny zavatra voaozona indray, dia hahatonga ny tobin’ny Israely ho voaozona izany ka hampidi-doza aminy ianareo. '
  '19':
  - type: text
    content: Fa ny volafotsy sy ny volamena rehetra ary ny fanaka varahina sy vy dia masina ho an’NY TOMPO. Hatao ao amin’ny trano fitahirizana ao amin’ny tranon’NY TOMPO izany.
  '2':
  - type: text
    content: 'Ary hoy NY TOMPO tamin’i Josoa: Indro, efa natolotro eo an-tananao i Jeriko sy ny mpanjakany mbamin’ny lehilahy mahery. '
  '20':
  - type: text
    content: 'Dia nanakora ny olona ary notsofina ny anjomara; nony ren’ny vahoaka ny feon’ny anjomara dia nanakora mafy izy ka nirodana tamin’izay ny manda, ary niakatra tao an-tanàna ny olona sady samy nizotra tamin’izay hitsiny avy ka azo ny tanàna. '
  '21':
  - type: text
    content: Ary nataony toy ny zavatra voaozona tamin’ny lelan-tsabatra izay rehetra tao an-tanàna, na lehilahy na vehivavy na tanora na antitra na omby na ondry aman’osy na boriky.
  - type: heading
    content: Avelan’i Josoa ho velona Rahaba
  '22':
  - type: text
    content: 'Ary izy roa lahy izay nisafo tany dia efa nilazan’i Josoa hoe: Midira ao amin’ny tranon’ilay vehivavy janga ka ento mivoaka avy tao Ravehivavy sy ny havany rehetra ary izay mety ho azy, araka izay nianiananareo taminy. '
  '23':
  - type: text
    content: 'Dia nandeha ireo zatovo nisafo tany ireo ka nitondra an’i Rahaba nivoaka avy tao niaraka tamin’ny ray aman-dreniny sy ny anadahiny ary ny havany rehetra mbamin’izay mety ho azy; dia nitondra ny ankohonany rehetra nivoaka avy tao izy; ka nametraka azy teo ivelan’ny tobin’ny Israely. '
  '24':
  - type: text
    content: 'Ary ny tanàna sy izay rehetra tao dia nodorany tamin’ny afo nefa ny volafotsy sy ny volamena ary ny fanaka varahina sy vy dia nataony tao amin’ny trano fitahirizana ao amin’ny tranon’NY TOMPO. '
  '25':
  - type: text
    content: Fa Rahaba janga sy ny ankohonan’ny rainy sy ny havany rehetra mbamin’izay mety ho azy dia novelomin’i Josoa, ary mitoetra eo amin’ny Israely mandraka androany Ravehivavy satria nanafina ny iraka izay efa nirahin’i Josoa hisafo tany tao Jeriko izy.
  '26':
  - type: text
    content: 'Dia nianiana i Josoa tamin’izany andro izany hoe: Ho voaozona eo anatrehan’NY TOMPO izay olona mitsangana manorina ity tanàna Jeriko ity indray; ny ain’ny lahimatoany no ho sazin’ny hanorenany ny fanambaniny, ary ny ain’ny faralahiny no ho sazin’ny hananganany ny vavahadiny.'
  '27':
  - type: text
    content: Ary NY TOMPO nomba an’i Josoa ka niely tamin’ny tany rehetra ny lazany.
  '3':
  - type: text
    content: 'Koa mandehana manodidina ny tanàna indray mandeha ianareo mpanafika rehetra; henemana no hanaovanao izany. '
  '4':
  - type: text
    content: 'Asio mpisorona fito mitondra anjomara fito mafy faneno eo alohan’ny '
  - type: text
    content: vata misy ny Fanekena
  - type: text
    content: '; amin’ny andro fahafito dia hodidino impito ny tanàna ary aoka hitsoka ny anjomarany mpisorona. '
  '5':
  - type: text
    content: Rehefa manao feo lavareny ny anjomara mafy faneno ka renareo ny feon’ny anjomara dia hanakora mafy ny vahoaka rehetra ka hirodana amin’izay ny mandan’ny tanàna ary hiakatra sady samy hizotra amin’izay hitsiny avy ny olona.
  '6':
  - type: text
    content: 'Dia niantso ny mpisorona i Josoa, zanak’i Nona, ka niteny taminy hoe: Ento ny vata misy ny Fanekena, ary asio mpisorona fito mitondra anjomara fito mafy faneno eo alohan’ny vata misy NY TOMPO. '
  '7':
  - type: text
    content: 'Ary hoy izy tamin’ny vahoaka: Mandehana ka hodidino ny tanàna, ary aoka ny olona efa voaomana hiady no handeha eo alohan’ny vata misy NY TOMPO. '
  '8':
  - type: text
    content: 'Rehefa avy niteny tamin’ny vahoaka i Josoa dia nandeha ireo mpisorona fito nitondra ny anjomara fito mafy faneno teo alohan’NY TOMPO ka nitsoka ny anjomara; ary ny vata misy ny faneken’NY TOMPO no nanaraka azy. '
  '9':
  - type: text
    content: 'Ny olona efa voaomana hiady dia nandeha teo alohan’ny mpisorona izay nitsoka ny anjomara, ary ny vodilalana no nanaraka ny vata misy ny Fanekena; ary notsofina teny am-pandehanana ny anjomara. '
