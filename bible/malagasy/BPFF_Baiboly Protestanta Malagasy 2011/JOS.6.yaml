document_id: JOS.6
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nahazoan’ny Zanak’Israely an’i Jeriko
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary nihidy mafy i Jeriko tamin’izany noho ny Zanak’Israely: Tsy nisy nivoaka avy tao ary tsy nisy niditra nankao. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary hoy NY TOMPO tamin’i Josoa: Indro, efa natolotro eo an-tananao i Jeriko sy ny mpanjakany mbamin’ny lehilahy mahery. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Koa mandehana manodidina ny tanàna indray mandeha ianareo mpanafika rehetra; henemana no hanaovanao izany. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Asio mpisorona fito mitondra anjomara fito mafy faneno eo alohan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: vata misy ny Fanekena
  - type: text
    text: '; amin’ny andro fahafito dia hodidino impito ny tanàna ary aoka hitsoka ny anjomarany mpisorona. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Rehefa manao feo lavareny ny anjomara mafy faneno ka renareo ny feon’ny anjomara dia hanakora mafy ny vahoaka rehetra ka hirodana amin’izay ny mandan’ny tanàna ary hiakatra sady samy hizotra amin’izay hitsiny avy ny olona.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia niantso ny mpisorona i Josoa, zanak’i Nona, ka niteny taminy hoe: Ento ny vata misy ny Fanekena, ary asio mpisorona fito mitondra anjomara fito mafy faneno eo alohan’ny vata misy NY TOMPO. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary hoy izy tamin’ny vahoaka: Mandehana ka hodidino ny tanàna, ary aoka ny olona efa voaomana hiady no handeha eo alohan’ny vata misy NY TOMPO. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Rehefa avy niteny tamin’ny vahoaka i Josoa dia nandeha ireo mpisorona fito nitondra ny anjomara fito mafy faneno teo alohan’NY TOMPO ka nitsoka ny anjomara; ary ny vata misy ny faneken’NY TOMPO no nanaraka azy. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ny olona efa voaomana hiady dia nandeha teo alohan’ny mpisorona izay nitsoka ny anjomara, ary ny vodilalana no nanaraka ny vata misy ny Fanekena; ary notsofina teny am-pandehanana ny anjomara. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ny vahoaka dia efa noraran’i Josoa hoe: Aza manakora na mamoaka feo na miloa-bava akory aza mandra-pahatongan’ny andro hilazako aminareo hoe: Manakorà! Ary amin’izay ianareo vao hanakora. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ary nanodidina ny tanàna indray mandeha ny vata misy ny faneken’NY TOMPO; dia nankany an-toby ny olona ka nitoetra tany nandritra ny alina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Dia nifoha vao maraina i Josoa ary nitondra ny vata misy ny faneken’NY TOMPO ny mpisorona. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary ny mpisorona fito izay nitondra ny anjomara fito mafy faneno teo alohan’ny vata misy ny faneken’NY TOMPO dia nandeha sady nitsoka ny anjomara; ny olona efa voaomana hiady dia nandeha teo alohany; ary ny vodilalana kosa dia nanaraka ny vata misy NY TOMPO; ary notsofina teny am-pandehanana ny anjomara. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dia nanodidina ny tanàna indray mandeha koa izy tamin’ny andro faharoa vao niverina tany an-toby; henemana no nanaovany toy izany. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Tamin’ny andro fahafito dia nifoha vao maraina indray izy, raha mbola nazava ratsy ny andro, ka nanodidina ny tanàna impito toy ny nataony teo, nefa tamin’izany andro izany ihany izy no nanodidina ny tanàna impito. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary tamin’ny nandehanany fanimpitony, raha nitsoka ny anjomara ny mpisorona, dia hoy i Josoa tamin’ny vahoaka: Manakorà! Fa efa nomen’NY TOMPO anareo ny tanàna. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Dia hatolotra ho an’NY TOMPO ho zavatra voaozona ny tanàna sy izay rehetra ao; fa Rahaba janga ihany no hovelomina, dia izy sy izay rehetra miaraka aminy ao an-trano, satria nanafina ny iraka nalefantsika izy. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Kanefa mitandrema kosa ianareo ny amin’ny zavatra voaozona, fandrao raha manolotra zavatra ho voaozona ianareo, nefa ianareo no maka amin’ny zavatra voaozona indray, dia hahatonga ny tobin’ny Israely ho voaozona izany ka hampidi-doza aminy ianareo. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Fa ny volafotsy sy ny volamena rehetra ary ny fanaka varahina sy vy dia masina ho an’NY TOMPO. Hatao ao amin’ny trano fitahirizana ao amin’ny tranon’NY TOMPO izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Dia nanakora ny olona ary notsofina ny anjomara; nony ren’ny vahoaka ny feon’ny anjomara dia nanakora mafy izy ka nirodana tamin’izay ny manda, ary niakatra tao an-tanàna ny olona sady samy nizotra tamin’izay hitsiny avy ka azo ny tanàna. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ary nataony toy ny zavatra voaozona tamin’ny lelan-tsabatra izay rehetra tao an-tanàna, na lehilahy na vehivavy na tanora na antitra na omby na ondry aman’osy na boriky.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Avelan’i Josoa ho velona Rahaba
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary izy roa lahy izay nisafo tany dia efa nilazan’i Josoa hoe: Midira ao amin’ny tranon’ilay vehivavy janga ka ento mivoaka avy tao Ravehivavy sy ny havany rehetra ary izay mety ho azy, araka izay nianiananareo taminy. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Dia nandeha ireo zatovo nisafo tany ireo ka nitondra an’i Rahaba nivoaka avy tao niaraka tamin’ny ray aman-dreniny sy ny anadahiny ary ny havany rehetra mbamin’izay mety ho azy; dia nitondra ny ankohonany rehetra nivoaka avy tao izy; ka nametraka azy teo ivelan’ny tobin’ny Israely. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary ny tanàna sy izay rehetra tao dia nodorany tamin’ny afo nefa ny volafotsy sy ny volamena ary ny fanaka varahina sy vy dia nataony tao amin’ny trano fitahirizana ao amin’ny tranon’NY TOMPO. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Fa Rahaba janga sy ny ankohonan’ny rainy sy ny havany rehetra mbamin’izay mety ho azy dia novelomin’i Josoa, ary mitoetra eo amin’ny Israely mandraka androany Ravehivavy satria nanafina ny iraka izay efa nirahin’i Josoa hisafo tany tao Jeriko izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Dia nianiana i Josoa tamin’izany andro izany hoe: Ho voaozona eo anatrehan’NY TOMPO izay olona mitsangana manorina ity tanàna Jeriko ity indray; ny ain’ny lahimatoany no ho sazin’ny hanorenany ny fanambaniny, ary ny ain’ny faralahiny no ho sazin’ny hananganany ny vavahadiny.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Ary NY TOMPO nomba an’i Josoa ka niely tamin’ny tany rehetra ny lazany.
