type_code: plt
verses:
  '1':
  - type: heading
    content: Mampanisa ny vahoaka Israely i Davida
  - type: heading
    content: 1Tan 21.1-6
  - type: text
    content: 'Nirehitra tamin’ny Israely indray ny fahatezeran’NY TOMPO; dia nanome saina an’i Davida Izy mba hanao izay hahatonga loza amin’ny vahoakany hoe: Mandehana, isao ny Israely sy ny '
  - type: text
    content: Joda
  - type: text
    content: .
  '10':
  - type: text
    content: 'Namely azy ny eritreritr’i Davida rehefa voaisany ny olona. Koa hoy i Davida tamin’NY TOMPO: Efa nanota be aho tamin’izao nataoko izao; koa ankehitriny, mifona aminao aho, TOMPO ô, esory ny heloky ny mpanomponao, fa efa nanao fahadalana lehibe aho.'
  '11':
  - type: text
    content: 'Nony nifoha maraina i Davida dia tonga tamin’i Gada mpaminany, mpahitan’i Davida, ny tenin’NY TOMPO hoe: '
  '12':
  - type: text
    content: 'Mandehana ka lazao amin’i Davida hoe: Izao no lazain’NY TOMPO: Zavatra telo no apetrako eto anoloanao, koa fidio izay iray hataoko aminao. '
  '13':
  - type: text
    content: 'Dia nankany amin’i Davida i Gada ka nanambara izany taminy ary niteny hoe: Mosary fito taona va no tianao ho tonga aminao eto amin’ny taninao? Sa handositra mandritra ny telo volana eo anoloan’ny fahavalonao ianao, satria henjehiny? Sa areti-mandringana mandritra ny hateloana eto amin’ny taninao? Koa saino sy hevero izay valiny hoentiko miverina any amin’Izay naniraka ahy. '
  '14':
  - type: text
    content: 'Dia hoy i Davida tamin’i Gada: Indrisy! Tery loatra aho! Aleontsika ho azon’ny tanan’NY TOMPO, satria lehibe ny famindrampony, toy izay ho azon’izay tanan’olona.'
  '15':
  - type: text
    content: 'Dia nasian’NY TOMPO areti-mandringana ny Israely nony maraina ka hatramin’ilay fotoana voalaza; ary nahafatesana fito alina ny olona hatrany Dana ka hatrany Bery-Sheba. '
  '16':
  - type: text
    content: 'Ary nanatsotra ny tanany tamin’i Jerosalema Ilay Anjely handringana azy; fa nanenina NY TOMPO ny amin’ny loza ka niteny tamin’Ilay Anjely izay nandringana ny olona hoe: Aoka izay! Atsaharo ny tananao ankehitriny. Ary Ilay Anjelin’NY TOMPO dia teo amin’ny famoloan’i Araona jebosita.'
  '17':
  - type: text
    content: 'Nony hitan’i Davida Ilay Anjely namely ny olona dia niteny tamin’NY TOMPO izy hoe: Indro, izaho no nanota, ary izaho no nanao ratsy; fa ireo ondry ireo kosa, inona moa no mba nataony? Koa mifona aminao re aho, aoka hamely ahy sy ny ankohonan’ny raiko ny tananao!'
  - type: heading
    content: Manorina alitara ho an’NY TOMPO i Davida
  - type: heading
    content: 1Tan 21.18-27
  '18':
  - type: text
    content: 'Nankany amin’i Davida i Gada tamin’iny andro iny ka niteny taminy hoe: Miakara ka manangàna alitara ho an’NY TOMPO ao amin’ny famoloan’i Araona jebosita. '
  '19':
  - type: text
    content: 'Dia niakatra i Davida, araka ny tenin’i Gada, araka izay nandidian’NY TOMPO. '
  '2':
  - type: text
    content: 'Dia hoy ny mpanjaka tamin’i Joaba, komandin’ny miaramila, izay teo aminy: Mandehana mitety ny fokon’Israely rehetra hatrany Dana ka hatrany Bery-Sheba, ary alaminonareo ny vahoaka mba ho fantatro ny isany. '
  '20':
  - type: text
    content: 'Nitazana i Araona ka nahita ny mpanjaka sy ny mpanompony manatona azy; dia nidina izy ka niankohoka tamin’ny tany teo anatrehan’ny mpanjaka. '
  '21':
  - type: text
    content: 'Ary hoy i Araona: Inona no antony ahatongavan’ny mpanjaka tompoko atỳ amin’ny mpanompony? Dia hoy i Davida: Hividy ny famoloana aminao mba hanorenako alitara ho an’NY TOMPO mba hitsaharan’ny areti-mandringana tsy hamely ny olona intsony. '
  '22':
  - type: text
    content: 'Fa hoy i Araona tamin’i Davida: Aoka ny mpanjaka tompoko haka izay sitrany ka hanolotra izany ho fanatitra. Indreo ny omby ho fanatitra dorana manontolo ary ny fivelezam-bary sy ny hazo amin’ny zioga hatao kitay. '
  '23':
  - type: text
    content: 'Izany rehetra izany, ry mpanjaka dia omen’i Araona ny mpanjaka. Hoy ihany i Araona tamin’ny mpanjaka: NY TOMPO Andriamanitrao anie hankasitraka anao. '
  '24':
  - type: text
    content: 'Hoy ny mpanjaka tamin’i Araona: Tsia, fa tsy maintsy hovidiko aminao araka izay tokony ho vidiny ireo, satria tsy hanolotra fanatitra dorana manontolo ho an’NY TOMPO Andriamanitro amin’izay azoko maimaimpoana aho. Dia novidin’i Davida volafotsy sekela dimampolo ny famoloana sy ny omby. '
  '25':
  - type: text
    content: Ary nanorina alitara ho an’NY TOMPO teo i Davida ka nanolotra fanatitra dorana manontolo sy fanati-pihavanana. Dia neken’NY TOMPO ny fifonana natao ho an’ny tany ka nitsahatra tsy namely ny Israely intsony ilay areti-mandringana.
  '3':
  - type: text
    content: 'Fa hoy i Joaba tamin’ny mpanjaka: NY TOMPO Andriamanitrao anie hampitombo ny vahoaka ho injato toy izao, na firy na firy izy, ka ho hitan’ny mason’ny mpanjaka tompoko izany; fa inona no antony itiavan’ny mpanjaka tompoko hanao izany zavatra izany? '
  '4':
  - type: text
    content: 'Nefa tsy azon’i Joaba sy ny komandin’ny miaramila nolavina ny tenin’ny mpanjaka. Dia niala teo anatrehan’ny mpanjaka i Joaba sy ny komandin’ny miaramila mba handamina ny lehilahin’ny Israely. '
  '5':
  - type: text
    content: 'Ary nita an’i Jordana izy ireo ka nitoby tao Aroera eo ankavanan’ilay tanàna afovoan’ny lohasahan-driakan’i Gada ary nankany Jazera. '
  '6':
  - type: text
    content: 'Tonga tany Gileada, tany amin’ny tanin’i Tatima-Hodsy izy, ary tonga tany Dana-Jana ka nanodidina hatrany Sidona, '
  '7':
  - type: text
    content: 'ary tonga tao Tiro, tanàna mimanda, sy tany amin’ny tanànan’ny Hivita sy ny Kananita rehetra; dia nankany Negeva any Joda hatrany Bery-Sheba izy. '
  '8':
  - type: text
    content: 'Nony efa nitety ny tany rehetra izy dia tonga tany Jerosalema, rehefa afaka sivy volana sy roapolo andro. '
  '9':
  - type: text
    content: Dia natolotr’i Joaba ny mpanjaka ny isan’ny vahoaka voalamina ka nisy valo hetsy ny lehilahy mahery, mpanatsoaka sabatra tamin’ny Israely, ary dimy hetsy ny lehilahy tamin’ny Joda.
  - type: heading
    content: Ny namalian’Andriamanitra ny fahadisoan’i Davida
  - type: heading
    content: 1Tan 21.7-17
