document_id: ACT.26,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Nandahatra ny fiarovan-tenany teo anatrehan’i Agripa i Paoly
  - type: text
    content: 'Hoy i Agripa tamin’i Paoly: Mahazo mandahatra ny teninao ianao. Nanangana ny tanany i Paoly ka nandaha-teny hanala tsiny ny tenany hoe: '
  '10':
  - type: text
    content: 'izany no nataoko tany Jerosalema ka maro ny olona masina no nohidiko tao an-tranomaizina, rehefa nahazo fahefana hanao izany tamin’ireo lehiben’ny mpisorona aho; rehefa hovonoina ireny dia mba nandatsa-bato nanaiky izany koa aho. '
  '11':
  - type: text
    content: 'Nampijaly azy ireny matetika teo amin’ny '
  - type: text
    content: sinagoga
  - type: text
    content: ' rehetra aho ka nanery azy hiteny ratsy; ary satria romotry ny fahatezerako taminy aho dia nanenjika azy hatrany amin’ny tanàna any ivelany koa aza.'
  - type: heading
    content: Mitantara ny niovany fo sy ny asa vitany i Paoly
  '12':
  - type: text
    content: 'Tamin’izany, raha nankany Damaskosy aho, nitondra fahefana sy teny izay azoko tamin’ireo lehiben’ny mpisorona, '
  '13':
  - type: text
    content: 'koa nony ilay nitataovovonana iny ny andro, ry mpanjaka ô, dia hitako teny an-dalana fa indro, nisy mazava avy tany an-danitra nanelatselatra manodidina ahy sy ireo izay niaraka tamiko, mihoatra noho ny famirapiratry ny masoandro. '
  '14':
  - type: text
    content: 'Rehefa lavo tamin’ny tany izahay rehetra, dia nandre feo nilaza tamiko tamin’ny teny hebreo aho hoe: Saoly! Saoly! Nahoana ianao no manenjika Ahy? Zavatra sarotra aminao ny hanipaka ny fanindronana. '
  '15':
  - type: text
    content: 'Dia hoy aho: Iza moa Ianao, Tompoko? Ary hoy ny Tompo: Izaho no Jesosy izay enjehinao. '
  '16':
  - type: text
    content: 'Koa mitsangàna ka mijoroa amin’ny tongotrao; fa izao no nisehoako taminao, dia ny hanendry anao ho mpanompo sy ho vavolombelona ny amin’izay efa nahitanao Ahy sy izay hisehoako aminao, '
  '17':
  - type: text
    content: 'hamonjy anao amin’ity firenena ity sy ny '
  - type: text
    content: Jentilisa
  - type: text
    content: ' izay anirahako anao, '
  '18':
  - type: text
    content: hampahiratra ny masony hialany amin’ny maizina ho amin’ny mazava, ary amin’ny fahefan’i Satana ho amin’Andriamanitra, mba hahazoany famelan-keloka sy lova eo amin’izay nohamasinina noho ny finoana Ahy.
  '19':
  - type: text
    content: 'Noho izany, ry Agripa mpanjaka ô, dia tsy nandà ilay fahitana avy tany an-danitra aho. '
  '2':
  - type: text
    content: 'Ny amin’ny zavatra rehetra iampangan’ny '
  - type: text
    content: Jiosy
  - type: text
    content: ' ahy, ry Agripa mpanjaka, dia ataoko fa sambatra aho, satria mahazo mandaha-teny hanala tsiny ny tenako eto anatrehanao anio, '
  '20':
  - type: text
    content: 'Fa tamin’izay tany Damaskosy aloha, tany Jerosalema sy ny tany '
  - type: text
    content: Jodia
  - type: text
    content: ' rehetra ary tany amin’ny Jentilisa koa, dia nitoriteny aho, mba hibebaka sy hiverina amin’Andriamanitra izy ireo ka hanao asa mendrika ny fibebahana. '
  '21':
  - type: text
    content: 'Ary izany no nisamboran’ny '
  - type: text
    content: Jiosy
  - type: text
    content: ' ahy teo amin’ny '
  - type: text
    content: tempoly
  - type: text
    content: ' sy nitadiavany hahafaty ahy. '
  '22':
  - type: text
    content: 'Noho ny fitahian’Andriamanitra ahy no mbola aharetako mandraka androany ka anambaràko na amin’ny kely na amin’ny lehibe, ary tsy milaza na inona na inona aho afa-tsy izay nolazain’ny mpaminany sy i Mosesy fa ho avy, '
  '23':
  - type: text
    content: 'fa i '
  - type: text
    content: Kristy
  - type: text
    content: ' tsy maintsy mijaly ary ho voalohany hitsangana amin’ny maty ka hitory fahazavana amin’ity firenena ity sy amin’ny Jentilisa.'
  - type: heading
    content: Mitaona an’i Agripa hino i Paoly
  '24':
  - type: text
    content: 'Raha nandahatra izany izy dia hoy i Festosy tamin’ny feo mahery: Ry Paoly ô, very saina ianao; ny fianarana be loatra no nahavery saina anao. '
  '25':
  - type: text
    content: 'Fa hoy i Paoly: Tsy very saina aho, ry Festosy tsara indrindra'
  - type: note
    content: Zahao Lio 1.3.
  - type: text
    content: ', fa teny marina sy tenim-pahendrena no lazaiko. '
  '26':
  - type: text
    content: 'Fantatry ny mpanjaka izany zavatra izany ka miteny amin’ny fahasahiana eto anatrehany aho; fa mino aho fa tsy miafina aminy izany zavatra izany satria tsy natao tao amin’ny takona akory. '
  '27':
  - type: text
    content: 'Ry Agripa mpanjaka ô, mino ny mpaminany va ianao? Fantatro fa mino ianao. '
  '28':
  - type: text
    content: 'Fa hoy i Agripa tamin’i Paoly: Hay! Heverinao fa mora toy izany ny hampanekenao ahy ho kristiana! '
  '29':
  - type: text
    content: 'Dia hoy i Paoly: Mangataka amin’Andriamanitra aho, fa na amin’ny mora, na amin’ny sarotra, tsy ianao ihany, fa izay rehetra mandre ahy anio, dia hitovy amiko, afa-tsy amin’ireto gadra ireto ihany.'
  '3':
  - type: text
    content: indrindra noho ny fahafantaranao tsara ny fanao sy ny adihevitra rehetra amin’ny Jiosy; koa miangavy anao aho, mba mahareta hihaino ahy.
  '30':
  - type: text
    content: 'Nitsangana ny mpanjaka sy ny governora ary i Berenika mbamin’izay niara-nipetraka taminy teo; '
  '31':
  - type: text
    content: 'koa rehefa niala teo izy ireo dia niresaka hoe: Tsy manao zavatra tokony hahafaty na hamatorana azy akory ity lehilahy ity. '
  '32':
  - type: text
    content: 'Ary hoy i Agripa tamin’i Festosy: Azo nalefa ihany io lehilahy io, saingy efa nifidy ny handahatra any anatrehan’i Kaisara izy.'
  '4':
  - type: text
    content: 'Fantatry ny Jiosy rehetra hatramin’ny voalohany ny fomba fiainako hatry ny fony aho mbola kely teo amin’ny fireneko tany Jerosalema; '
  '5':
  - type: text
    content: 'eny, fantany hatramin’ny voalohany, raha mety milaza izany izy, satria efa '
  - type: text
    content: Fariseo
  - type: text
    content: ' aho araka ny antoko izay fatra-pitana indrindra ny lalàna amin’ny fivavahanay. '
  '6':
  - type: text
    content: 'Ankehitriny dia ny fanantenana ny teny fikasana izay nataon’Andriamanitra tamin’ny razanay no ijoroako hotsaraina eto, '
  '7':
  - type: text
    content: 'dia ilay fanantenana andrasan’ny firenenay roa amby folo izay mazoto manao fanompoam-pivavahana ho an’Andriamanitra andro aman’alina. Izany fanantenana izany no iampangan’ny Jiosy ahy, ry mpanjaka ô. '
  '8':
  - type: text
    content: Nahoana no ataonareo ho zavatra tsy azo inoana raha manangana ny maty Andriamanitra?
  - type: heading
    content: Asa 9.1-29; 22.3-21
  '9':
  - type: text
    content: 'Nihevitra tato am-poko tokoa aho fa tsy maintsy manohitra ny anaran’i Jesosy avy any Nazareta amin’ny fomba maro; '
