document_id: ACT.26
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nandahatra ny fiarovan-tenany teo anatrehan’i Agripa i Paoly
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Hoy i Agripa tamin’i Paoly: Mahazo mandahatra ny teninao ianao. Nanangana ny tanany i Paoly ka nandaha-teny hanala tsiny ny tenany hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ny amin’ny zavatra rehetra iampangan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jiosy
  - type: text
    text: ' ahy, ry Agripa mpanjaka, dia ataoko fa sambatra aho, satria mahazo mandaha-teny hanala tsiny ny tenako eto anatrehanao anio, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: indrindra noho ny fahafantaranao tsara ny fanao sy ny adihevitra rehetra amin’ny Jiosy; koa miangavy anao aho, mba mahareta hihaino ahy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Fantatry ny Jiosy rehetra hatramin’ny voalohany ny fomba fiainako hatry ny fony aho mbola kely teo amin’ny fireneko tany Jerosalema; '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'eny, fantany hatramin’ny voalohany, raha mety milaza izany izy, satria efa '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Fariseo
  - type: text
    text: ' aho araka ny antoko izay fatra-pitana indrindra ny lalàna amin’ny fivavahanay. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ankehitriny dia ny fanantenana ny teny fikasana izay nataon’Andriamanitra tamin’ny razanay no ijoroako hotsaraina eto, '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'dia ilay fanantenana andrasan’ny firenenay roa amby folo izay mazoto manao fanompoam-pivavahana ho an’Andriamanitra andro aman’alina. Izany fanantenana izany no iampangan’ny Jiosy ahy, ry mpanjaka ô. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Nahoana no ataonareo ho zavatra tsy azo inoana raha manangana ny maty Andriamanitra?
- type: usfm
  marker: r
  children:
  - type: text
    text: Asa 9.1-29; 22.3-21
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Nihevitra tato am-poko tokoa aho fa tsy maintsy manohitra ny anaran’i Jesosy avy any Nazareta amin’ny fomba maro; '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'izany no nataoko tany Jerosalema ka maro ny olona masina no nohidiko tao an-tranomaizina, rehefa nahazo fahefana hanao izany tamin’ireo lehiben’ny mpisorona aho; rehefa hovonoina ireny dia mba nandatsa-bato nanaiky izany koa aho. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Nampijaly azy ireny matetika teo amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sinagoga
  - type: text
    text: ' rehetra aho ka nanery azy hiteny ratsy; ary satria romotry ny fahatezerako taminy aho dia nanenjika azy hatrany amin’ny tanàna any ivelany koa aza.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mitantara ny niovany fo sy ny asa vitany i Paoly
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Tamin’izany, raha nankany Damaskosy aho, nitondra fahefana sy teny izay azoko tamin’ireo lehiben’ny mpisorona, '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'koa nony ilay nitataovovonana iny ny andro, ry mpanjaka ô, dia hitako teny an-dalana fa indro, nisy mazava avy tany an-danitra nanelatselatra manodidina ahy sy ireo izay niaraka tamiko, mihoatra noho ny famirapiratry ny masoandro. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Rehefa lavo tamin’ny tany izahay rehetra, dia nandre feo nilaza tamiko tamin’ny teny hebreo aho hoe: Saoly! Saoly! Nahoana ianao no manenjika Ahy? Zavatra sarotra aminao ny hanipaka ny fanindronana. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Dia hoy aho: Iza moa Ianao, Tompoko? Ary hoy ny Tompo: Izaho no Jesosy izay enjehinao. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Koa mitsangàna ka mijoroa amin’ny tongotrao; fa izao no nisehoako taminao, dia ny hanendry anao ho mpanompo sy ho vavolombelona ny amin’izay efa nahitanao Ahy sy izay hisehoako aminao, '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'hamonjy anao amin’ity firenena ity sy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jentilisa
  - type: text
    text: ' izay anirahako anao, '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: hampahiratra ny masony hialany amin’ny maizina ho amin’ny mazava, ary amin’ny fahefan’i Satana ho amin’Andriamanitra, mba hahazoany famelan-keloka sy lova eo amin’izay nohamasinina noho ny finoana Ahy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Noho izany, ry Agripa mpanjaka ô, dia tsy nandà ilay fahitana avy tany an-danitra aho. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Fa tamin’izay tany Damaskosy aloha, tany Jerosalema sy ny tany '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jodia
  - type: text
    text: ' rehetra ary tany amin’ny Jentilisa koa, dia nitoriteny aho, mba hibebaka sy hiverina amin’Andriamanitra izy ireo ka hanao asa mendrika ny fibebahana. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary izany no nisamboran’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jiosy
  - type: text
    text: ' ahy teo amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tempoly
  - type: text
    text: ' sy nitadiavany hahafaty ahy. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Noho ny fitahian’Andriamanitra ahy no mbola aharetako mandraka androany ka anambaràko na amin’ny kely na amin’ny lehibe, ary tsy milaza na inona na inona aho afa-tsy izay nolazain’ny mpaminany sy i Mosesy fa ho avy, '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'fa i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' tsy maintsy mijaly ary ho voalohany hitsangana amin’ny maty ka hitory fahazavana amin’ity firenena ity sy amin’ny Jentilisa.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mitaona an’i Agripa hino i Paoly
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Raha nandahatra izany izy dia hoy i Festosy tamin’ny feo mahery: Ry Paoly ô, very saina ianao; ny fianarana be loatra no nahavery saina anao. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Fa hoy i Paoly: Tsy very saina aho, ry Festosy tsara indrindra'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.25 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Zahao '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Lio 1.3.
    marker-yv: yv-n
  - type: text
    text: ', fa teny marina sy tenim-pahendrena no lazaiko. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Fantatry ny mpanjaka izany zavatra izany ka miteny amin’ny fahasahiana eto anatrehany aho; fa mino aho fa tsy miafina aminy izany zavatra izany satria tsy natao tao amin’ny takona akory. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ry Agripa mpanjaka ô, mino ny mpaminany va ianao? Fantatro fa mino ianao. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Fa hoy i Agripa tamin’i Paoly: Hay! Heverinao fa mora toy izany ny hampanekenao ahy ho kristiana! '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Dia hoy i Paoly: Mangataka amin’Andriamanitra aho, fa na amin’ny mora, na amin’ny sarotra, tsy ianao ihany, fa izay rehetra mandre ahy anio, dia hitovy amiko, afa-tsy amin’ireto gadra ireto ihany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Nitsangana ny mpanjaka sy ny governora ary i Berenika mbamin’izay niara-nipetraka taminy teo; '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'koa rehefa niala teo izy ireo dia niresaka hoe: Tsy manao zavatra tokony hahafaty na hamatorana azy akory ity lehilahy ity. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Ary hoy i Agripa tamin’i Festosy: Azo nalefa ihany io lehilahy io, saingy efa nifidy ny handahatra any anatrehan’i Kaisara izy.'
