document_id: JHN.21,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Jesosy niseho tamin’ny mpianatra fito
  - type: heading
    content: Ampit. Lio 5.1-11
  - type: text
    content: 'Taorianan’izany, dia niseho tamin’ny mpianatra indray Jesosy teo amoron’ny ranomasin’i Tiberiasy. Toy izao no fomba nisehoany:'
  '10':
  - type: text
    content: 'Hoy Jesosy taminy: Mitondrà hazandrano amin’ireo vao azonareo teo. '
  '11':
  - type: text
    content: Dia niakatra i Simona Petera ka nosarihany ho eo an-tanety ny harato feno hazandrano vaventy, telo amby dimampolo amby zato; ary na dia be tahaka izany aza ny hazandrano dia tsy triatra ny harato.
  '12':
  - type: text
    content: 'Hoy Jesosy taminy: Avia hisakafo. Fa tsy nisy mpianatra sahy nanontany Azy hoe: Iza moa Ianao? Satria fantany ihany fa ny Tompo io. '
  '13':
  - type: text
    content: 'Ary tonga Jesosy dia nandray ny mofo ka natolony azy, avy eo dia ny hazandrano indray. '
  '14':
  - type: text
    content: Izany no fanintelony nisehoan’i Jesosy tamin’ny mpianatra, rehefa nitsangana tamin’ny maty Izy.
  - type: heading
    content: Jesosy sy i Petera
  '15':
  - type: text
    content: 'Rehefa nisakafo izy ireo dia hoy Jesosy tamin’i Simona Petera: Ry Simona, zanak’i Jaona, moa ny fitiavanao Ahy mihoatra noho ny fitiavan’ireto? Hoy izy Taminy: Eny, Tompoko; Ianao mahalala fa tia Anao aho. Dia hoy Izy taminy: Fahano ary ny ondrikeliko. '
  '16':
  - type: text
    content: 'Hoy indray Izy taminy fanindroany: Ry Simona, zanak’i Jaona, moa tia Ahy va ianao? Dia hoy izy Taminy: Eny, Tompoko; Ianao mahalala fa tia Anao aho. Dia hoy Izy taminy: Andraso ary ny ondriko. '
  '17':
  - type: text
    content: 'Hoy Izy fanintelony: Ry Simona, zanak’i Jaona, moa tia Ahy va ianao? Dia nalahelo i Petera satria Izy niteny intelo taminy hoe: Moa tia Ahy va ianao? Ka hoy izy Taminy: Tompoko, Ianao mahalala ny zavatra rehetra; fantatrao fa tia Anao aho. Hoy Jesosy taminy: Fahano ary ny ondriko. '
  '18':
  - type: text
    content: 'Lazaiko aminao marina dia marina tokoa: Raha mbola tanora ianao dia nisikina ka nandeha tamin’izay tianao; fa rehefa antitra kosa ianao dia hanatsotra ny tananao ary olon-kafa no hanikina anao ka hitondra anao amin’izay tsy tianao. '
  '19':
  - type: text
    content: 'Ary izany no nolazainy mba hanambarana ny fomban’ny fahafatesana izay hankalazany an’Andriamanitra. Ary rehefa voalazany izany dia hoy Izy taminy: Manaraha Ahy.'
  - type: heading
    content: Jesosy sy ilay mpianatra tiany
  '2':
  - type: text
    content: 'Niaraka i Simona Petera sy i Tomasy, izay atao hoe Kambana, teo koa i Natanaela, ilay avy tany Kana any Galilia, sy ireo zanak’i Zebedio ary mpianatra roa lahy hafa koa. '
  '20':
  - type: text
    content: 'Dia nitodika i Petera ka hitany manaraka azy ilay mpianatra tian’i Jesosy, dia ilay niankina tamin’ny tratrany tamin’ny fisakafoanana ka niteny hoe: Tompoko, iza no hamadika Anao? '
  '21':
  - type: text
    content: 'Rehefa nahita azy i Petera dia hoy izy: Tompoko, inona no ho amin’ity lehilahy ity? '
  '22':
  - type: text
    content: 'Hoy Jesosy taminy: Raha tiako hitoetra izy mandra-piaviko, ahoanao izany? Fa ianao manaraha Ahy. '
  '23':
  - type: text
    content: 'Ary niely tamin’ny rahalahy ny resaka fa tsy ho faty izany mpianatra izany; nefa Jesosy tsy nilaza taminy fa tsy ho faty izy, fa: Raha tiako haharitra izy mandra-piaviko, ahoanao izany?'
  '24':
  - type: text
    content: Izy no ilay mpianatra izay vavolombelon’izany sy nanoratra izany; ary fantatsika fa marina ny fanambaràny.
  '25':
  - type: text
    content: Misy zavatra maro hafa koa izay nataon’i Jesosy, koa raha voasoratra tsirairay avokoa izany rehetra izany, ataoko fa izao tontolo izao aza tsy omby ny boky voasoratra.
  '3':
  - type: text
    content: 'Hoy i Simona Petera: Handeha hanarato aho. Hoy ireo taminy: Handeha hiaraka aminao koa izahay. Dia nandeha izy ka niditra an-tsambokely, nefa tamin’iny alina iny dia tsy nahazo na inona na inona akory izy ireo.'
  '4':
  - type: text
    content: 'Nony efa nazava ratsy ny andro dia nitsangana teo amoron-drano Jesosy, kanefa tsy fantatry ny mpianatra ho Jesosy. '
  '5':
  - type: text
    content: 'Dia hoy Jesosy tamin’izy ireo: Anaka, manan-kanina va ianareo? Dia namaly Azy izy ireo hoe: Tsia. '
  '6':
  - type: text
    content: 'Ary hoy Izy taminy: Alatsaho eo amin’ny sisiny havanan’ny sambokely ny haratonareo dia hahazo ianareo. Dia nalatsany ny harato ka tsy zakany nakarina noho ny habetsahan’ny hazandrano. '
  '7':
  - type: text
    content: 'Ary hoy ilay mpianatra izay tian’i Jesosy tamin’i Petera: Ny Tompo irỳ. Vao ren’i Simona Petera fa ny Tompo iny dia nisikinany ny akanjo ivelany, fa tsy niakanjo izy, dia nirotsaka tao amin’ny rano izy. '
  '8':
  - type: text
    content: 'Fa ireo mpianatra sasany dia nandeha tamin’ny sambokely ihany ka nisarika ny harato feno hazandrano; satria tsy lavitra ny tany izy fa tokony ho roanjato '
  - type: text
    content: hakiho
  - type: text
    content: ' ihany.'
  '9':
  - type: text
    content: 'Rehefa niakatra teo an-tanety izy ireo dia nahita afon’arina teo sy hazandrano teo amboniny ary mofo. '
