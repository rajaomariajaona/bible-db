document_id: EZK.29,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Faminaniana ny amin’i Ejipta
  - type: text
    content: 'Tamin’ny andro faharoa amby folo tamin’ny volana fahafolo, tamin’ny taona fahafolo dia tonga tamiko ny tenin’NY TOMPO hoe:'
  '10':
  - type: text
    content: 'Dia indro, avy hamely anao sy ny Neilinao Aho, ary ny tany Ejipta dia hataoko lao tokoa, eny, sady ho lao no ho rava, hatrany Migdola ka hatrany Siena, dia hatrany amin’ny sisintanin’i Kosy. '
  '11':
  - type: text
    content: 'Tsy hodiavin-tongotr’olona ny tany, ary ny tongo-biby aza dia tsy handia azy, sady tsy honenana efapolo taona izy. '
  '12':
  - type: text
    content: Ary ny tany Ejipta dia hataoko tany rava ao amin’ny tany rava, ary ny tanànany dia ho lao ao amin’ny tanàna lao, efapolo taona. Eny, haeliko ho any amin’ny firenena any ny Ejiptiana ary hahahako any amin’ny tany samihafa.
  '13':
  - type: text
    content: 'Fa izao no lazain’NY TOMPO Andriamanitra: Rehefa afaka efapolo taona dia hangoniko avy any amin’ny firenena izay nielezany ny Ejiptiana. '
  '14':
  - type: text
    content: 'Haveriko amin’ny toerany eo aloha indray izy ka hampodiko any amin’ny tany Patrosa, tany niaviany, izy, ary any izy dia ho fanjakana ambany laharana; '
  '15':
  - type: text
    content: 'eny, ho ambany noho ny fanjakana hafa izy ka tsy hisandratra ambonin’ny firenena hafa intsony; fa hohakeleziko izy ka tsy hanapaka amin’ny firenena intsony. '
  '16':
  - type: text
    content: Dia tsy ho tokin’ny taranak’Israely intsony izy ka ho fampahatsiarovana ny helony amin’ny andehanan’ireo hanaraka azy; dia ho fantatra fa Izaho no TOMPO Andriamanitra.
  - type: heading
    content: Hamabo an’i Ejipta i Nebokadnezara mpanjaka
  '17':
  - type: text
    content: 'Tamin’ny andro voalohany tamin’ny volana voalohany, tamin’ny taona fahafito amby roapolo dia tonga tamiko ny tenin’NY TOMPO hoe:'
  '18':
  - type: text
    content: 'Ry '
  - type: text
    content: zanak’olona
  - type: text
    content: ', mafy ny fanompoana izay nampanaovin’i Nebokadnezara mpanjakan’i Babilona, ny miaramilany tamin’ny namelezany an’i Tiro, ka efa samy tonga sola avokoa ny lohany sady niendaka ny sorony, nefa tsy nahazo karama avy tany Tiro izy sy ny miaramilany noho ny fanompoana izay nataony tamin’ny namelezany azy. '
  '19':
  - type: text
    content: 'Koa izao no lazain’NY TOMPO Andriamanitra: Indro, homeko an’i Nebokadnezara mpanjakan’i Babilona, ny tany Ejipta, dia halainy ny harenany, ary hobaboiny izay hita ao, ka hataony sambotra izay azo ao, koa izany no ho karaman’ny miaramilany. '
  '2':
  - type: text
    content: 'Ry '
  - type: text
    content: zanak’olona
  - type: text
    content: ', manandrifia an’i Farao mpanjakan’i Ejipta ka maminania ny hamelezana azy mbamin’i Ejipta rehetra. '
  '20':
  - type: text
    content: 'Ho valin’ny fanompoana nataony tany Tiro no nanomezako azy ny tany Ejipta, satria nataony ho Ahy izany, hoy NY TOMPO Andriamanitra. '
  '21':
  - type: text
    content: 'Amin’izany andro izany dia hampitsimoka '
  - type: text
    content: tandroka
  - type: text
    content: ' ho an’ny taranak’Israely Aho, ary hataoko miloa-bava eo aminy ianao; dia ho fantatra fa Izaho no TOMPO.'
  '3':
  - type: text
    content: 'Mitenena ka lazao hoe: Izao no lazain’NY TOMPO Andriamanitra:'
  - type: text
    content: Indro, avy hamely anao Aho, ry Farao, mpanjakan’i Ejipta,
  - type: text
    content: ilay dragona makadiry
  - type: text
    content: mamitsaka ao amin’ny Neiliny,
  - type: text
    content: 'dia ilay niteny hoe: Ahy ny Neiliko,'
  - type: text
    content: Izaho no namorona azy ho an’ny tenako!
  '4':
  - type: text
    content: Hasiako farango ny valanoranonao dia hampiraiketiko amin’ny kiranao ny hazandrano ao amin’ny Neilinao ka hampiakariko avy eo afovoan’ny Neilinao ianao, ary ny hazandrano rehetra amin’ny Neilinao dia hiraikitra amin’ny kiranao.
  '5':
  - type: text
    content: Dia hariako any an-tany efitra ianao,
  - type: text
    content: dia ianao sy ny hazandrano rehetra avy amin’ny Neilinao.
  - type: text
    content: Hitsitsitra eny an-tanety ianao
  - type: text
    content: ka tsy hovorina na hangonina,
  - type: text
    content: fa homeko hohanin’ny bibidia
  - type: text
    content: sy ny voromanidina ianao.
  '6':
  - type: text
    content: Dia ho fantatry ny mponina rehetra any Ejipta
  - type: text
    content: fa Izaho no TOMPO,
  - type: text
    content: satria tehina volotara fandrefesana
  - type: text
    content: ho an’ny taranak’Israely izy.
  '7':
  - type: text
    content: Rehefa mandray anao amin’ny tanany izy
  - type: text
    content: dia folaka ianao ka voatsindronao ny helik’izy rehetra;
  - type: text
    content: ary rehefa mitehina aminao izy
  - type: text
    content: dia tapaka ianao ka mampilefidefitra ny andilan’izy rehetra.
  '8':
  - type: text
    content: 'Koa izao no lazain’NY TOMPO Andriamanitra: Indro, hahatonga sabatra hamely anao Aho ka hofongorako tsy ho aminao ny olona sy ny biby. '
  '9':
  - type: text
    content: 'Ny tany Ejipta ho rava sy lao, dia ho fantatra fa Izaho no TOMPO. Satria hoy izy: Ahy i Neily, ary izaho no nanao azy! '
