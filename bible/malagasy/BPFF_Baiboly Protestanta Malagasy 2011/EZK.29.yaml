document_id: EZK.29
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Faminaniana ny amin’i Ejipta
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Tamin’ny andro faharoa amby folo tamin’ny volana fahafolo, tamin’ny taona fahafolo dia tonga tamiko ny tenin’NY TOMPO hoe:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ry '
  - type: usfm
    marker: w
    children:
    - type: text
      text: zanak’olona
  - type: text
    text: ', manandrifia an’i Farao mpanjakan’i Ejipta ka maminania ny hamelezana azy mbamin’i Ejipta rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Mitenena ka lazao hoe: Izao no lazain’NY TOMPO Andriamanitra:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Indro, avy hamely anao Aho, ry Farao, mpanjakan’i Ejipta,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ilay dragona makadiry
- type: usfm
  marker: q1
  children:
  - type: text
    text: mamitsaka ao amin’ny Neiliny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'dia ilay niteny hoe: Ahy ny Neiliko,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izaho no namorona azy ho an’ny tenako!
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Hasiako farango ny valanoranonao dia hampiraiketiko amin’ny kiranao ny hazandrano ao amin’ny Neilinao ka hampiakariko avy eo afovoan’ny Neilinao ianao, ary ny hazandrano rehetra amin’ny Neilinao dia hiraikitra amin’ny kiranao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Dia hariako any an-tany efitra ianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ianao sy ny hazandrano rehetra avy amin’ny Neilinao.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hitsitsitra eny an-tanety ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy hovorina na hangonina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa homeko hohanin’ny bibidia
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny voromanidina ianao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Dia ho fantatry ny mponina rehetra any Ejipta
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa Izaho no TOMPO,
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria tehina volotara fandrefesana
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho an’ny taranak’Israely izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Rehefa mandray anao amin’ny tanany izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia folaka ianao ka voatsindronao ny helik’izy rehetra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary rehefa mitehina aminao izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia tapaka ianao ka mampilefidefitra ny andilan’izy rehetra.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Koa izao no lazain’NY TOMPO Andriamanitra: Indro, hahatonga sabatra hamely anao Aho ka hofongorako tsy ho aminao ny olona sy ny biby. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ny tany Ejipta ho rava sy lao, dia ho fantatra fa Izaho no TOMPO. Satria hoy izy: Ahy i Neily, ary izaho no nanao azy! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dia indro, avy hamely anao sy ny Neilinao Aho, ary ny tany Ejipta dia hataoko lao tokoa, eny, sady ho lao no ho rava, hatrany Migdola ka hatrany Siena, dia hatrany amin’ny sisintanin’i Kosy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Tsy hodiavin-tongotr’olona ny tany, ary ny tongo-biby aza dia tsy handia azy, sady tsy honenana efapolo taona izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ary ny tany Ejipta dia hataoko tany rava ao amin’ny tany rava, ary ny tanànany dia ho lao ao amin’ny tanàna lao, efapolo taona. Eny, haeliko ho any amin’ny firenena any ny Ejiptiana ary hahahako any amin’ny tany samihafa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Fa izao no lazain’NY TOMPO Andriamanitra: Rehefa afaka efapolo taona dia hangoniko avy any amin’ny firenena izay nielezany ny Ejiptiana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Haveriko amin’ny toerany eo aloha indray izy ka hampodiko any amin’ny tany Patrosa, tany niaviany, izy, ary any izy dia ho fanjakana ambany laharana; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'eny, ho ambany noho ny fanjakana hafa izy ka tsy hisandratra ambonin’ny firenena hafa intsony; fa hohakeleziko izy ka tsy hanapaka amin’ny firenena intsony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Dia tsy ho tokin’ny taranak’Israely intsony izy ka ho fampahatsiarovana ny helony amin’ny andehanan’ireo hanaraka azy; dia ho fantatra fa Izaho no TOMPO Andriamanitra.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Hamabo an’i Ejipta i Nebokadnezara mpanjaka
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Tamin’ny andro voalohany tamin’ny volana voalohany, tamin’ny taona fahafito amby roapolo dia tonga tamiko ny tenin’NY TOMPO hoe:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ry '
  - type: usfm
    marker: w
    children:
    - type: text
      text: zanak’olona
  - type: text
    text: ', mafy ny fanompoana izay nampanaovin’i Nebokadnezara mpanjakan’i Babilona, ny miaramilany tamin’ny namelezany an’i Tiro, ka efa samy tonga sola avokoa ny lohany sady niendaka ny sorony, nefa tsy nahazo karama avy tany Tiro izy sy ny miaramilany noho ny fanompoana izay nataony tamin’ny namelezany azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Koa izao no lazain’NY TOMPO Andriamanitra: Indro, homeko an’i Nebokadnezara mpanjakan’i Babilona, ny tany Ejipta, dia halainy ny harenany, ary hobaboiny izay hita ao, ka hataony sambotra izay azo ao, koa izany no ho karaman’ny miaramilany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ho valin’ny fanompoana nataony tany Tiro no nanomezako azy ny tany Ejipta, satria nataony ho Ahy izany, hoy NY TOMPO Andriamanitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Amin’izany andro izany dia hampitsimoka '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tandroka
  - type: text
    text: ' ho an’ny taranak’Israely Aho, ary hataoko miloa-bava eo aminy ianao; dia ho fantatra fa Izaho no TOMPO.'
