document_id: HEB.9,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Koa na dia ny fanekena voalohany aza dia nanana fitsipika ny amin’ny fanompoam-pivavahana sy ny fitoerany masina etỳ an-tany. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: fa momba ny zavatra hohanina sy ny zavatra hosotroina ary ny fisasana samihafa, dia fitsipika araka ny nofo, voatendry hatao mandra-piavin’ny fotoana fanavaozana izany.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fahambonian’ny fotoam-pivavahana vaovao
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Fa '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ' kosa, tonga ho Mpisoronabe ny amin’ny zavatra tsara ho avy. Namakivaky teo amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: tabernakely
    - type: text
      text: ' lehibe lavitra sady tsara lavitra izay tsy nataon-tanana Izy; izany hoe, tsy isan’izao zavatra ary izao. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Niditra indray mandeha monja tao amin’ny fitoerana masina Izy, nefa tsy mba nitondra ran’osilahy sy ran-janak’omby Izy, fa ny ran’ny tenany dia ampy ahazoana fanavotana mandrakizay ho antsika. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Fa raha ny ran’osilahy sy ny ran’ombilahy ary ny lavenon’ny vantotra ombivavy afafy amin’izay voaloto no manamasina ka manadio ny nofo, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: mainka fa ny ran’i Kristy, izay nanolotra ny tenany tsy manan-tsiny ho an’Andriamanitra, tamin’ny alalan’ny Fanahy mandrakizay, no hahadio ny fieritreretanareo ho afaka amin’ny asa maty mba hanompoanareo an’Andriamanitra velona.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Ary noho izany dia mpanalalana amin’izay fanekena vaovao Izy, rehefa niaritra fahafatesana ho fanavotana amin’ny fahotana natao tamin’ny fanekena voalohany; izany dia mba hahazoan’izay voaantso ny teny fikasana ny amin’ny lova mandrakizay.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Fa raha misy didim-pananana dia ilaina ny hahafantarana ny fahafatesan’ilay nanao ny fanekena. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Fa manan-kery ny didim-pananana rehefa tonga ny fahafatesana; fa tsy manan-kery kosa izany raha mbola velona ilay nanao azy. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Koa na dia ny fanekena voalohany aza dia tsy nohamasinina raha tsy nisy ra. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Fa rehefa voalazan’i Mosesy tamin’ny vahoaka rehetra ny didy rehetra araka ny lalàna dia nalainy ny ran’ny zanak’omby sy ny ran’osilahy mbamin’ny rano sy ny volon’ondry jaky ary ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: hisopa
    - type: text
      text: ' ka nafafiny tamin’ny boky sy ny vahoaka rehetra; '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Fa nisy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: tabernakely
    - type: text
      text: ' voavoatra: Ny efitra voalohany dia ilay atao hoe ny fitoerana masina izay nisy ny fitoeran-jiro sy ny latabatra ary ny mofo atao fanatitra. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'dia hoy izy:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Ity no ran’ny fanekena izay nandidian’Andriamanitra anareo» (Eks 24.8).
  '21':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Ary ny tabernakely sy ny fanaka rehetra enti-manao fanompoam-pivavahana dia nofafazany ra toy izany koa. '
  '22':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Saiky diovina amin’ny ra avokoa ny zavatra rehetra araka ny lalàna; fa raha tsy misy ra alatsaka dia tsy misy famelan-keloka.
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Koa dia tsy maintsy nodiovina tamin’ireny ny tandindon’ny zavatra any an-danitra, fa ny tenan’ny zavatra any an-danitra kosa dia tamin’izay fanatitra tsara noho ireny.
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Fa Kristy tsy mba niditra tao amin’izay fitoerana masina nataon-tanana, izay tandindon’ny tena fitoerana masina, fa mankany an-danitra mihitsy; ary ankehitriny Izy dia miseho eo anatrehan’Andriamanitra ho antsika; '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'ary tsy niditra Izy mba hanolotra ny tenany matetika, tahaka ny Mpisoronabe miditra ao amin’ny fitoerana masina isan-taona mitondra ny ran’ny zavatra hafa; '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'fa raha izany dia tsy maintsy ho nijaly matetika Izy hatrizay nanaovana izao tontolo izao; fa ankehitriny dia efa naseho indray mandeha tamin’izao andro farany izao Izy mba hanafaka ny ota tamin’ny nanolorany ny tenany. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Ary tahaka ny nanendrena ny olona ho faty indray mandeha, koa rehefa afaka izany dia hisy fitsarana, '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: dia tahaka izany koa Kristy, rehefa natolotra indray mandeha hitondra ny otan’ny maro dia hiseho fanindroany, tsy amin’ota, fa ho famonjena kosa amin’izay miandry Azy.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Tao ambadiky ny efitra lamba faharoa no nisy ny tabernakely izay atao hoe ny fitoerana masina indrindra. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Tao no nisy alitara volamena fandoroana ditin-kazo manitra sy ny vata misy ny Fanekena izay voapetaka takelaka volamena manontolo; ary tao anatin’io no nisy ny vilany volamena izay nisy ny mana sy ny tehin’i Arona izay nitsimoka ary ny vato fisaky ny Fanekena; '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'ary teo ambonin’io koa ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: kerobima
    - type: text
      text: ' misy voninahitra, izay nanaloka ny rakotra fanaovam-panavotana; tsy ho voalaza tsirairay ny amin’ireo ankehitriny.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Rehefa voavoatra toy izany ireo zavatra ireo dia miditra eo amin’ny tabernakely voalohany hatrany ny mpisorona hanatanteraka ny fanompoam-pivavahana. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Fa ny faharoa kosa no idiran’ny Mpisoronabe irery ihany indray mandeha isan-taona; ary izy aza dia tsy miditra raha tsy mitondra ra izay atolony noho ny amin’ny tenany sy ny fahadisoana nataon’ny olona amin’ny tsy fahalalana; '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'koa izany no anambaran’ny Fanahy Masina fa mbola tsy voaseho ny lalana mankany amin’ny fitoerana masina indrindra, raha mbola ao ihany ny tabernakely voalohany; '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'fanoharana ho amin’izao andro ankehitriny izao izany, ary araka izay no anolorana fanomezana sy fanatitra, izay tsy mahatanteraka ny mpivavaka ny amin’ny fieritreretany, '
