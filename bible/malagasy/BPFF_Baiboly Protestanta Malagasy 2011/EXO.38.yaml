document_id: EXO.38
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny alitara fanaovana fanatitra sy ny koveta
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary nanao ny alitara fandoroana ny fanatitra dorana manontolo tamin’ny hazo akasia izy: Dimy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: hakiho
  - type: text
    text: ' avy ny lafiny efatra, dia efamira izany; telo hakiho kosa ny haavony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Nanao ny tandrony teo amin’ny zorony efatra izy ka nataony miray aminy, dia nopetahany takelaka varahina ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Nanao ny fanaka rehetra momba ny alitara izy, dia ny vilaniny, ny fandraofan-davenona, ny sotron’afony, ny loviany famafazana, ny fitrebiny ary ny fitondran’afony; nataony varahina avokoa ny fanaka rehetra momba azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Nanao makarakara varahina tahaka ny harato ho eo amin’ny alitara izy, eo ambanin’ny alitara hatreo amin’ny fisasahany izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia nandrendrika mason-drojo volamena efatra hatao eo an-jorony efatra amin’ny makarakara varahina izy ho fitoeran’ny bao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Nanao ny bao tamin’ny hazo akasia izy ka nopetahany takelaka varahina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Dia nampiditra ny bao teo amin’ny mason-drojo izay teo amin’ny lafiny roa amin’ny alitara izy hilanjana azy. Hazofisaka no narafiny ho alitara ka nataony poakaty.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ny koveta varahina sy ny faladiany varahina kosa no nataony tamin’ny fitaratra varahin’ireo vehivavy izay nanompo teo anoloan’ny varavaran’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tranolay fihaonana
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ireo fefy lamba manodidina ny kianja
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Dia nanao ny kianja izy: Tamin’ny lafiny atsimo dia nisy fefy lamba zato '
  - type: usfm
    marker: w
    children:
    - type: text
      text: hakiho
  - type: text
    text: ' natao tamin’ny lamba rongony fotsy madinika voatenona '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'ka roapolo ny andriny ary roapolo ny faladiany varahina; volafotsy ny fihantonany amin’ny andriny sy ny farango hitohizany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Tamin’ny lafiny avaratra koa dia nisy fefy lamba zato hakiho ka roapolo ny andriny ary roapolo ny faladiany varahina; volafotsy ny fihantonany amin’ny andriny sy ny farango hitohizany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Tamin’ny lafiny andrefana dia nisy fefy lamba dimampolo hakiho ka folo ny andriny ary folo ny faladiany; volafotsy ny fihantonana amin’ny andriny sy ny farango hitohizany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ny lafiny atsinanana dia nataony dimampolo hakiho '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'ka nisy fefy lamba dimy amby folo hakiho tamin’ny ilany iray, telo ny andriny ary telo ny faladiany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Nisy fefy lamba dimy amby folo hakiho tamin’ny ilany iray koa, telo ny andriny ary telo ny faladiany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Nataony tamin’ny lamba rongony fotsy madinika voatenona avokoa ny fefy lamban’ny kianja manodidina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary ny faladian’ny andriny dia nataony varahina; ny fihantonana amin’ny andriny sy ny farango hitohizany dia nataony volafotsy; ary ny lohany dia nopetahany takelaka volafotsy; samy nisy farango volafotsy hitohizany avokoa ny andriny rehetra tamin’ny kianja. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary ny vavahady lamba eo am-bavahadin’ny kianja dia asan’ny mahay tenona samihafa soratra tamin’ny lamba manga, volomparasy, jaky ary lamba rongony fotsy madinika voatenona; roapolo hakiho ny halavany; ary ny haavony dia nitovy tamin’ny lambanan-damba, dimy hakiho, araka ny haavon’ny fefy lamban’ny kianja. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Efatra ny andriny, ary efatra ny faladiany varahina; ny fihantonany dia volafotsy; ny takelaka tamin’ny lohany sy ny farango hitohizany koa dia volafotsy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary ny tsatòkan-day amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tabernakely
  - type: text
    text: ' sy amin’ny kianja manodidina dia nataony varahina avokoa.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny lanjan’ireo metaly nampiasaina
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Izao no isan’ny zavatra momba ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tabernakely
  - type: text
    text: ', dia ny tabernakelin’ny Vavolombelona, izay voaisa araka ny nandidian’i Mosesy, satria natao fanompoan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: levita
  - type: text
    text: ', fehin’Itamara, zanak’i Arona mpisorona, ny fanisana azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary i Bezalila, zanak’i Ory, zanak’i Hora, avy amin’ny fokon’i Joda, dia nanatanteraka izay rehetra nandidian’NY TOMPO an’i Mosesy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ary ny namany dia i Oholiaba, zanak’i Ahisamaka, avy amin’ny fokon’i Dana, mpanao sokitra sy asa kanto ary mpanenona kinga sady mahay tenona samihafa soratra tamin’ny lamba manga, ny volomparasy, ny jaky ary ny lamba rongony fotsy madinika.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Talenta
  - type: text
    text: ' sivy amby roapolo ary sekela telopolo amby fitonjato, araka ny sekela masina, ny fitambaran’ny volamena lany tamin’ny asa rehetra tamin’ny fitoerana masina dia ny volamena izay natao fanatitra asandratra.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary ny volafotsy avy tamin’ny olona izay voaisa tamin’ny fiangonana dia talenta zato sy sekela dimy amby fitopolo sy fitonjato sy arivo, araka ny sekela masina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Beka iray isan’olona; izany hoe antsasaky ny sekela iray araka ny sekela masina no naloan’izay rehetra voaisa, hatramin’ny roapolo taona no ho miakatra, dia olona dimampolo sy dimanjato sy telo arivo sy enina hetsy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ary ny volafotsy talenta zato dia narendrika nanaovana ny faladian’ny fitoerana masina sy ny faladian’ny efitra lamba: Faladia zato tamin’ny talenta volafotsy zato ary talenta iray ho an’ny faladiany iray. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Sekela dimy amby fitopolo sy fitonjato sy arivo no nanamboarany ny fihantonana tamin’ny andry sy nametahana takelaka tamin’ny lohany ary nanaovany ny farango hitohizany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ny varahina izay natao fanatitra asandratra dia talenta fitopolo sy sekela efajato sy roa arivo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ary tamin’izany no nanaovany ny faladian’ny varavaran’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tranolay fihaonana
  - type: text
    text: ' sy ny alitara varahina, ary ny makarakara varahina izay teo aminy ary ny fanaka rehetra momba ny alitara, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ny faladian’ny kianja manodidina, ary ny faladian’ny vavahadin’ny kianja, ny tsatòkan-dain’ny tabernakely ary ny tsatòkan-day rehetra momba ny kianja manodidina.
