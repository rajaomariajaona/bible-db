document_id: EXO.38,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny alitara fanaovana fanatitra sy ny koveta
  - type: text
    content: 'Ary nanao ny alitara fandoroana ny fanatitra dorana manontolo tamin’ny hazo akasia izy: Dimy '
  - type: text
    content: hakiho
  - type: text
    content: ' avy ny lafiny efatra, dia efamira izany; telo hakiho kosa ny haavony. '
  '10':
  - type: text
    content: 'ka roapolo ny andriny ary roapolo ny faladiany varahina; volafotsy ny fihantonany amin’ny andriny sy ny farango hitohizany. '
  '11':
  - type: text
    content: 'Tamin’ny lafiny avaratra koa dia nisy fefy lamba zato hakiho ka roapolo ny andriny ary roapolo ny faladiany varahina; volafotsy ny fihantonany amin’ny andriny sy ny farango hitohizany. '
  '12':
  - type: text
    content: 'Tamin’ny lafiny andrefana dia nisy fefy lamba dimampolo hakiho ka folo ny andriny ary folo ny faladiany; volafotsy ny fihantonana amin’ny andriny sy ny farango hitohizany. '
  '13':
  - type: text
    content: 'Ny lafiny atsinanana dia nataony dimampolo hakiho '
  '14':
  - type: text
    content: 'ka nisy fefy lamba dimy amby folo hakiho tamin’ny ilany iray, telo ny andriny ary telo ny faladiany. '
  '15':
  - type: text
    content: 'Nisy fefy lamba dimy amby folo hakiho tamin’ny ilany iray koa, telo ny andriny ary telo ny faladiany. '
  '16':
  - type: text
    content: 'Nataony tamin’ny lamba rongony fotsy madinika voatenona avokoa ny fefy lamban’ny kianja manodidina. '
  '17':
  - type: text
    content: 'Ary ny faladian’ny andriny dia nataony varahina; ny fihantonana amin’ny andriny sy ny farango hitohizany dia nataony volafotsy; ary ny lohany dia nopetahany takelaka volafotsy; samy nisy farango volafotsy hitohizany avokoa ny andriny rehetra tamin’ny kianja. '
  '18':
  - type: text
    content: 'Ary ny vavahady lamba eo am-bavahadin’ny kianja dia asan’ny mahay tenona samihafa soratra tamin’ny lamba manga, volomparasy, jaky ary lamba rongony fotsy madinika voatenona; roapolo hakiho ny halavany; ary ny haavony dia nitovy tamin’ny lambanan-damba, dimy hakiho, araka ny haavon’ny fefy lamban’ny kianja. '
  '19':
  - type: text
    content: 'Efatra ny andriny, ary efatra ny faladiany varahina; ny fihantonany dia volafotsy; ny takelaka tamin’ny lohany sy ny farango hitohizany koa dia volafotsy. '
  '2':
  - type: text
    content: 'Nanao ny tandrony teo amin’ny zorony efatra izy ka nataony miray aminy, dia nopetahany takelaka varahina ireo. '
  '20':
  - type: text
    content: 'Ary ny tsatòkan-day amin’ny '
  - type: text
    content: tabernakely
  - type: text
    content: ' sy amin’ny kianja manodidina dia nataony varahina avokoa.'
  - type: heading
    content: Ny lanjan’ireo metaly nampiasaina
  '21':
  - type: text
    content: 'Izao no isan’ny zavatra momba ny '
  - type: text
    content: tabernakely
  - type: text
    content: ', dia ny tabernakelin’ny Vavolombelona, izay voaisa araka ny nandidian’i Mosesy, satria natao fanompoan’ny '
  - type: text
    content: levita
  - type: text
    content: ', fehin’Itamara, zanak’i Arona mpisorona, ny fanisana azy. '
  '22':
  - type: text
    content: 'Ary i Bezalila, zanak’i Ory, zanak’i Hora, avy amin’ny fokon’i Joda, dia nanatanteraka izay rehetra nandidian’NY TOMPO an’i Mosesy. '
  '23':
  - type: text
    content: Ary ny namany dia i Oholiaba, zanak’i Ahisamaka, avy amin’ny fokon’i Dana, mpanao sokitra sy asa kanto ary mpanenona kinga sady mahay tenona samihafa soratra tamin’ny lamba manga, ny volomparasy, ny jaky ary ny lamba rongony fotsy madinika.
  '24':
  - type: text
    content: ' '
  - type: text
    content: Talenta
  - type: text
    content: ' sivy amby roapolo ary sekela telopolo amby fitonjato, araka ny sekela masina, ny fitambaran’ny volamena lany tamin’ny asa rehetra tamin’ny fitoerana masina dia ny volamena izay natao fanatitra asandratra.'
  '25':
  - type: text
    content: 'Ary ny volafotsy avy tamin’ny olona izay voaisa tamin’ny fiangonana dia talenta zato sy sekela dimy amby fitopolo sy fitonjato sy arivo, araka ny sekela masina. '
  '26':
  - type: text
    content: 'Beka iray isan’olona; izany hoe antsasaky ny sekela iray araka ny sekela masina no naloan’izay rehetra voaisa, hatramin’ny roapolo taona no ho miakatra, dia olona dimampolo sy dimanjato sy telo arivo sy enina hetsy. '
  '27':
  - type: text
    content: 'Ary ny volafotsy talenta zato dia narendrika nanaovana ny faladian’ny fitoerana masina sy ny faladian’ny efitra lamba: Faladia zato tamin’ny talenta volafotsy zato ary talenta iray ho an’ny faladiany iray. '
  '28':
  - type: text
    content: Sekela dimy amby fitopolo sy fitonjato sy arivo no nanamboarany ny fihantonana tamin’ny andry sy nametahana takelaka tamin’ny lohany ary nanaovany ny farango hitohizany.
  '29':
  - type: text
    content: 'Ny varahina izay natao fanatitra asandratra dia talenta fitopolo sy sekela efajato sy roa arivo. '
  '3':
  - type: text
    content: 'Nanao ny fanaka rehetra momba ny alitara izy, dia ny vilaniny, ny fandraofan-davenona, ny sotron’afony, ny loviany famafazana, ny fitrebiny ary ny fitondran’afony; nataony varahina avokoa ny fanaka rehetra momba azy. '
  '30':
  - type: text
    content: 'Ary tamin’izany no nanaovany ny faladian’ny varavaran’ny '
  - type: text
    content: tranolay fihaonana
  - type: text
    content: ' sy ny alitara varahina, ary ny makarakara varahina izay teo aminy ary ny fanaka rehetra momba ny alitara, '
  '31':
  - type: text
    content: ny faladian’ny kianja manodidina, ary ny faladian’ny vavahadin’ny kianja, ny tsatòkan-dain’ny tabernakely ary ny tsatòkan-day rehetra momba ny kianja manodidina.
  '4':
  - type: text
    content: 'Nanao makarakara varahina tahaka ny harato ho eo amin’ny alitara izy, eo ambanin’ny alitara hatreo amin’ny fisasahany izany. '
  '5':
  - type: text
    content: 'Dia nandrendrika mason-drojo volamena efatra hatao eo an-jorony efatra amin’ny makarakara varahina izy ho fitoeran’ny bao. '
  '6':
  - type: text
    content: 'Nanao ny bao tamin’ny hazo akasia izy ka nopetahany takelaka varahina. '
  '7':
  - type: text
    content: Dia nampiditra ny bao teo amin’ny mason-drojo izay teo amin’ny lafiny roa amin’ny alitara izy hilanjana azy. Hazofisaka no narafiny ho alitara ka nataony poakaty.
  '8':
  - type: text
    content: 'Ny koveta varahina sy ny faladiany varahina kosa no nataony tamin’ny fitaratra varahin’ireo vehivavy izay nanompo teo anoloan’ny varavaran’ny '
  - type: text
    content: tranolay fihaonana
  - type: text
    content: .
  - type: heading
    content: Ireo fefy lamba manodidina ny kianja
  '9':
  - type: text
    content: 'Dia nanao ny kianja izy: Tamin’ny lafiny atsimo dia nisy fefy lamba zato '
  - type: text
    content: hakiho
  - type: text
    content: ' natao tamin’ny lamba rongony fotsy madinika voatenona '
