document_id: PSA.88,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny aiko dia manakaiky ny fitoeran’ny maty
  - type: text
    content: Tononkira. Salamo nataon’ny Koraìta. Ho an’ny mpiventy hira. Al-mahalat-leanot. Maskila nataon’i Hemana ezrahita.
  - type: text
    content: TOMPO ô, Andriamanitry ny famonjena ahy!
  - type: text
    content: Andro aman’alina no itarainako eo anatrehanao.
  '10':
  - type: text
    content: Haneho fahagagana amin’ny maty va Ianao?
  - type: text
    content: 'Ny matoatoa va no hitsangana hidera Anao? '
  - type: text
    content: Fiatoana.
  '11':
  - type: text
    content: Hotorina any am-pasana va ny famindramponao
  - type: text
    content: ary ny fahamarinanao any amin’ny fandringanana?
  '12':
  - type: text
    content: Ho fantatra ao amin’ny maizina va ny fahagagana ataonao
  - type: text
    content: ary ny fahamarinanao any amin’ny tanin’ny fandringanana?
  '13':
  - type: text
    content: Fa raha izaho dia Ianao no itarainako, TOMPO ô,
  - type: text
    content: ary ny vavaka ataoko dia tonga eo anatrehanao nony maraina.
  '14':
  - type: text
    content: TOMPO ô, nahoana no manary ahy Ianao
  - type: text
    content: ka manafina ny tavanao amiko?
  '15':
  - type: text
    content: Ory aho ka efa toy ny efa ho faty hatramin’ny fahazazako;
  - type: text
    content: itambesaran’ny fampitahoranao aho ka very hevitra.
  '16':
  - type: text
    content: Manafotra ahy ny fahatezeranao,
  - type: text
    content: matin’ny fampitahoranao aho.
  '17':
  - type: text
    content: Mandifotra ahy mandrakariva tahaka ny rano ireny,
  - type: text
    content: miara-manodidina ahy izy.
  '18':
  - type: text
    content: Nampanalavirinao ahy ny olona tia ahy sy ny sakaizako;
  - type: text
    content: ireo nahazatra ahy dia tsy misy afa-tsy fahamaizinana.
  '2':
  - type: text
    content: Aoka ny vavaka ataoko ho tonga eo anatrehanao!
  - type: text
    content: Henoy tsara ny fitarainako!
  '3':
  - type: text
    content: Fa diboky ny fahoriana aho
  - type: text
    content: 'ary manakaiky ny '
  - type: text
    content: fitoeran’ny maty
  - type: text
    content: ' ny aiko.'
  '4':
  - type: text
    content: Natao ho isan’izay midina any an-davaka aho
  - type: text
    content: ary tahaka ny lehilahy tsy manan-kery intsony.
  '5':
  - type: text
    content: Efa nafoy ho naman’ny maty aho,
  - type: text
    content: toy ny voatrabaka sy mandry any amin’ny fasana,
  - type: text
    content: izay tsy tsarovanao intsony
  - type: text
    content: fa voafongotra tsy ho eo an-tananao.
  '6':
  - type: text
    content: Efa nametraka ahy any an-davaka ambany indrindra Ianao,
  - type: text
    content: ao amin’ny maizina, dia ao amin’ny lalina.
  '7':
  - type: text
    content: Ny fahatezeranao dia manindry ahy mafy
  - type: text
    content: 'ary ny alondranonao rehetra dia azeranao amiko. '
  - type: text
    content: Fiatoana.
  '8':
  - type: text
    content: Nampanalavirinao ahy ny olona nahazatra ahy,
  - type: text
    content: nataonao fahavetavetana eo imasony aho;
  - type: text
    content: voahidy aho ka tsy afa-mivoaka.
  '9':
  - type: text
    content: Efa pahina noho ny fahoriana ny masoko;
  - type: text
    content: TOMPO ô, miantso Anao isanandro aho,
  - type: text
    content: mamelatra ny tanako Aminao aho.
