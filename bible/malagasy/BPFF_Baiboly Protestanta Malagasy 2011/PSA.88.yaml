document_id: PSA.88
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny aiko dia manakaiky ny fitoeran’ny maty
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: Tononkira. Salamo nataon’ny Koraìta. Ho an’ny mpiventy hira. Al-mahalat-leanot. Maskila nataon’i Hemana ezrahita.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: TOMPO ô, Andriamanitry ny famonjena ahy!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Andro aman’alina no itarainako eo anatrehanao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Aoka ny vavaka ataoko ho tonga eo anatrehanao!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Henoy tsara ny fitarainako!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Fa diboky ny fahoriana aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ary manakaiky ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: fitoeran’ny maty
  - type: text
    text: ' ny aiko.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Natao ho isan’izay midina any an-davaka aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tahaka ny lehilahy tsy manan-kery intsony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Efa nafoy ho naman’ny maty aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: toy ny voatrabaka sy mandry any amin’ny fasana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay tsy tsarovanao intsony
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa voafongotra tsy ho eo an-tananao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Efa nametraka ahy any an-davaka ambany indrindra Ianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ao amin’ny maizina, dia ao amin’ny lalina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ny fahatezeranao dia manindry ahy mafy
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ary ny alondranonao rehetra dia azeranao amiko. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Fiatoana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Nampanalavirinao ahy ny olona nahazatra ahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nataonao fahavetavetana eo imasony aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: voahidy aho ka tsy afa-mivoaka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Efa pahina noho ny fahoriana ny masoko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: TOMPO ô, miantso Anao isanandro aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mamelatra ny tanako Aminao aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Haneho fahagagana amin’ny maty va Ianao?
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ny matoatoa va no hitsangana hidera Anao? '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Fiatoana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Hotorina any am-pasana va ny famindramponao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny fahamarinanao any amin’ny fandringanana?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ho fantatra ao amin’ny maizina va ny fahagagana ataonao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny fahamarinanao any amin’ny tanin’ny fandringanana?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Fa raha izaho dia Ianao no itarainako, TOMPO ô,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny vavaka ataoko dia tonga eo anatrehanao nony maraina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: TOMPO ô, nahoana no manary ahy Ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka manafina ny tavanao amiko?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ory aho ka efa toy ny efa ho faty hatramin’ny fahazazako;
- type: usfm
  marker: q1
  children:
  - type: text
    text: itambesaran’ny fampitahoranao aho ka very hevitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Manafotra ahy ny fahatezeranao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: matin’ny fampitahoranao aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Mandifotra ahy mandrakariva tahaka ny rano ireny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: miara-manodidina ahy izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Nampanalavirinao ahy ny olona tia ahy sy ny sakaizako;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ireo nahazatra ahy dia tsy misy afa-tsy fahamaizinana.
