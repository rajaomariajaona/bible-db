document_id: NAM.2,3103
type_code: plt
verses:
  '1':
  - type: text
    content: Indro tonga eny an-tendrombohitra
  - type: text
    content: ilay mitondra teny soa mahafaly
  - type: text
    content: sady manambara fiadanana!
  - type: text
    content: Ankalazao ny andro firavoravoanao, ry Joda,
  - type: text
    content: efao ny voadinao;
  - type: text
    content: fa tsy handeha hamakivaky eo aminao intsony ilay tena ratsy fanahy,
  - type: text
    content: indray ripaka izy rehetra.
  '10':
  - type: text
    content: Mandrobà volafotsy,
  - type: text
    content: Mandrobà volamena!
  - type: text
    content: Fa tsy hita lany ny rakitra soa,
  - type: text
    content: dia ny habetsahan’ny zavatra sarobidy isan-karazany.
  '11':
  - type: text
    content: Voaroba daholo, potipotika, foana sady lao!
  - type: text
    content: Kivy ny fo, mangozohozo ny lohalika,
  - type: text
    content: manaintaina ny andilana rehetra,
  - type: text
    content: mivaloarika ny tarehy rehetra.
  - type: heading
    content: Toy ny liona resy i Ninive
  '12':
  - type: text
    content: Aiza ilay lavaky ny liona
  - type: text
    content: sy firembin’ny liona tanora,
  - type: text
    content: dia ilay nandehanan’ny lion-dahy sy ny liom-bavy mbamin’ny zanany
  - type: text
    content: ka tsy nisy nanaitaitra azy?
  '13':
  - type: text
    content: Ny liona dia mamotipotika izay ilain’ny zanany,
  - type: text
    content: manakenda koa mba hanomezany ho an’ny liom-bavy
  - type: text
    content: sady mameno haza ny lavaka misy azy
  - type: text
    content: sy mameno remby voarotidrotika ny fonenany.
  '14':
  - type: text
    content: Indro, hamely anao Aho,
  - type: text
    content: hoy Andriamanitra, Tompon’izao rehetra izao.
  - type: text
    content: Holevoniko ho setroka ny kalesy fitondranao miady,
  - type: text
    content: hovonoiko amin’ny sabatra ny liona tanoranao;
  - type: text
    content: hofongorako amin’ny tany ny hazanao;
  - type: text
    content: ary tsy ho re intsony ny feon’ny irakao.
  '2':
  - type: text
    content: Misy mpanafika miakatra hamely anao.
  - type: text
    content: Ambeno ny manda,
  - type: text
    content: tazano ny lalana,
  - type: text
    content: mivonòna hiady,
  - type: text
    content: mahereza, aoka hitomban-dahy!
  '3':
  - type: text
    content: Fa NY TOMPO efa mampody ny voninahitr’i Jakoba,
  - type: text
    content: toy ny ampodiany ny voninahitr’Israely;
  - type: text
    content: fa efa nandroba azy ny mpandroba
  - type: text
    content: ary nanimba ny sampam-boalobony.
  - type: heading
    content: Voafitaka sady voaroba i Ninive
  '4':
  - type: text
    content: Miloko mena ny ampingan’ny lehilahy maheriny,
  - type: text
    content: miloko jaky ny fanamian’ny miaramilany,
  - type: text
    content: ny kalesy fitondrany miady dia misy vy mahery, mamirapiratra toy ny afo
  - type: text
    content: amin’ny andro fiomanany,
  - type: text
    content: ary arangaranga ny lefona.
  '5':
  - type: text
    content: Miriotra eny an-dalambe ny kalesy fitondra miady
  - type: text
    content: ka mifamoivoy eny amin’ny toerana malalaka;
  - type: text
    content: tahaka ny harendrina no fijery azy,
  - type: text
    content: mitsoriaka tahaka ny tselatra izy.
  '6':
  - type: text
    content: Tsaroany ny lehilahy malazany,
  - type: text
    content: kanjo tafintohina am-pandehanana ireny;
  - type: text
    content: mihazakazaka ho any amin’ny manda ireny,
  - type: text
    content: kanjo efa voatsangana hatrany an-tampony ny manda.
  '7':
  - type: text
    content: Novohana ireo vavahadin’ny renirano
  - type: text
    content: ary mirodana ny lapa.
  '8':
  - type: text
    content: 'Izao no iafarany: Ampitanjahina izy'
  - type: text
    content: dia noentina ho babo,
  - type: text
    content: ary mitoloko azy manao feom-boromailala ny mpanompovavy
  - type: text
    content: sady miteha-tratra.
  '9':
  - type: text
    content: Hatramin’izay i Ninive dia tahaka ny fitahirizan-drano;
  - type: text
    content: kanefa manary rano izy izao.
  - type: text
    content: Mijanòna! Mijanòna e!
  - type: text
    content: Nefa tsy misy miherika.
