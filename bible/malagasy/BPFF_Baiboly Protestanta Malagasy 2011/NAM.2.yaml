document_id: NAM.2
type_code: plt
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Indro tonga eny an-tendrombohitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ilay mitondra teny soa mahafaly
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady manambara fiadanana!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ankalazao ny andro firavoravoanao, ry Joda,
- type: usfm
  marker: q1
  children:
  - type: text
    text: efao ny voadinao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa tsy handeha hamakivaky eo aminao intsony ilay tena ratsy fanahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: indray ripaka izy rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Misy mpanafika miakatra hamely anao.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ambeno ny manda,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tazano ny lalana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mivonòna hiady,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mahereza, aoka hitomban-dahy!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Fa NY TOMPO efa mampody ny voninahitr’i Jakoba,
- type: usfm
  marker: q1
  children:
  - type: text
    text: toy ny ampodiany ny voninahitr’Israely;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa efa nandroba azy ny mpandroba
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary nanimba ny sampam-boalobony.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Voafitaka sady voaroba i Ninive
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Miloko mena ny ampingan’ny lehilahy maheriny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: miloko jaky ny fanamian’ny miaramilany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny kalesy fitondrany miady dia misy vy mahery, mamirapiratra toy ny afo
- type: usfm
  marker: q1
  children:
  - type: text
    text: amin’ny andro fiomanany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary arangaranga ny lefona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Miriotra eny an-dalambe ny kalesy fitondra miady
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka mifamoivoy eny amin’ny toerana malalaka;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tahaka ny harendrina no fijery azy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mitsoriaka tahaka ny tselatra izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Tsaroany ny lehilahy malazany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: kanjo tafintohina am-pandehanana ireny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mihazakazaka ho any amin’ny manda ireny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: kanjo efa voatsangana hatrany an-tampony ny manda.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Novohana ireo vavahadin’ny renirano
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mirodana ny lapa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Izao no iafarany: Ampitanjahina izy'
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia noentina ho babo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mitoloko azy manao feom-boromailala ny mpanompovavy
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady miteha-tratra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Hatramin’izay i Ninive dia tahaka ny fitahirizan-drano;
- type: usfm
  marker: q1
  children:
  - type: text
    text: kanefa manary rano izy izao.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mijanòna! Mijanòna e!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nefa tsy misy miherika.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Mandrobà volafotsy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mandrobà volamena!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa tsy hita lany ny rakitra soa,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ny habetsahan’ny zavatra sarobidy isan-karazany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Voaroba daholo, potipotika, foana sady lao!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Kivy ny fo, mangozohozo ny lohalika,
- type: usfm
  marker: q1
  children:
  - type: text
    text: manaintaina ny andilana rehetra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mivaloarika ny tarehy rehetra.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Toy ny liona resy i Ninive
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Aiza ilay lavaky ny liona
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy firembin’ny liona tanora,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ilay nandehanan’ny lion-dahy sy ny liom-bavy mbamin’ny zanany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy nisy nanaitaitra azy?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ny liona dia mamotipotika izay ilain’ny zanany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: manakenda koa mba hanomezany ho an’ny liom-bavy
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady mameno haza ny lavaka misy azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy mameno remby voarotidrotika ny fonenany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Indro, hamely anao Aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hoy Andriamanitra, Tompon’izao rehetra izao.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Holevoniko ho setroka ny kalesy fitondranao miady,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hovonoiko amin’ny sabatra ny liona tanoranao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hofongorako amin’ny tany ny hazanao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy ho re intsony ny feon’ny irakao.
