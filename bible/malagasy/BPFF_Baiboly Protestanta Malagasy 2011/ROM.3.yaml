document_id: ROM.3
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny tsy fankatoavan’ny olombelona rehetra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Koa inona ary no tombony ananan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jiosy
  - type: text
    text: ', ary inona no soa avy amin’ny famorana? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Maro ihany ireo amin’ny lafiny rehetra: Voalohany: Izy no notolorana ny tenin’Andriamanitra ho andraikiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Fa ahoana ary? Raha tsy nahatoky ny sasany, moa ny tsy fahatokiany va hahafoana ny fahatokian’Andriamanitra? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Sanatria izany! Aoka Andriamanitra no ekena ho marina fa ny olona rehetra kosa dia ho mpandainga, araka ny voasoratra hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Mba ho hita ho marina amin’ny teninao Ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hahery, raha tsaraina» (Sal 51.4).
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Fa raha ny tsy fahamarinantsika no mampiseho ny fahamarinan’Andriamanitra, inona ary no holazaintsika? Tsy marina va Andriamanitra raha mampihatra ny fahatezerany? Miteny araka ny fanaon’ny olona aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Sanatria izany! Fa raha izany, hataon’Andriamanitra ahoana no fitsara izao tontolo izao? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Raha nitombo noho ny laingako kosa ny fahamarinan’Andriamanitra mba ho voninahiny, nahoana aho no mbola tsaraina ho mpanota indray? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Nahoana ary no tsy hanao ratsy isika mba hiavian’ny soa? Tahaka izany ny tenin’ny sasany izay manendrikendrika anay ho milaza izany. Mendrika ny fanamelohana azy ireny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ahoana ary? Ambony noho ny hafa va isika? Tsy izany velively; satria efa voalazantsika rahateo fa mpanota avokoa na ny Jiosy na ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jentilisa
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'araka ny voasoratra hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Tsy misy marina na dia iray akory aza;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: tsy misy izay mahafantatra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy misy izay mitady an’Andriamanitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Samy nania avokoa izy rehetra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: samy tsy mahasoa avokoa izy rehetra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy misy izay manao ny tsara na dia iray akory aza» (Sal 14.1-3).
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: «Fasana misokatra ny tendany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny lelany no anaovany fitaka» (Sal 5.9).
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Ny poizin’ny menarana no ao ambanin’ny molony» (Sal 140.3);
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: «Feno ozona sy teny mangidy ny vavany» (Sal 10.7);
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: «Mailaka handatsa-dra ny tongony;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: fandravana sy fandringanana no eo amin’ny lalany
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ary tsy fantany ny lalan’ny fiadanana» (Isa 59.7-8).
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: «Tsy misy fahatahorana an’Andriamanitra eo anoloan’ny masony» (Sal 36.1).
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Fantatsika koa fa izay zavatra lazain’ny lalàna dia lazainy amin’izay manana ny lalàna, mba ho voatampina avokoa ny vava rehetra ka hiharan’ny fitsaran’Andriamanitra izao tontolo izao, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: satria tsy misy nofo hohamarinina eo anatrehany amin’ny asan’ny lalàna; fa ny fahalalana ny amin’ny ota ihany no azo avy amin’ny lalàna.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fanamarinana amin’ny finoana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ankehitriny dia naharihary ny fahamarinana avy amin’Andriamanitra, tsy tamin’ny lalàna anefa izany, fa nambaran’ny lalàna sy ny mpaminany; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'fahamarinana avy amin’Andriamanitra amin’ny finoana an’i Jesosy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' ho an’izay rehetra mino, satria tsy misy fanavakavahana, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'fa samy efa nanota izy rehetra ka tsy manana ny voninahitra avy amin’Andriamanitra; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'nefa hamarinina maimaimpoana amin’ny fahasoavany izy noho ny fanavotana izay ao amin’i Kristy Jesosy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Izy no natolotr’Andriamanitra ho fanatitra fampiononam-pahatezerana tamin’ny rany, amin’ny finoana, mba hanehoana ny fahamarinany amin’ny tsy namaliany ny fahotana lasa '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: tamin’ny nandeferany; mba hanehoan’Andriamanitra ny fahamarinany ankehitriny ka ho marina Izy sady hanamarina izay manana finoana an’i Jesosy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Aiza ary ny fireharehana? Foana izany. Amin’ny lalàna manao ahoana? Amin’ny lalànan’ny asa va? Tsia, fa amin’ny lalànan’ny finoana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Koa amin’izany dia heverintsika fa finoana no anamarinana ny olona fa tsy ny asan’ny lalàna. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Moa Andriamanitry ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jiosy
  - type: text
    text: ' ihany va Izy fa tsy an’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jentilisa
  - type: text
    text: ' koa? Eny, an’ny Jentilisa koa Izy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'satria iray ihany Andriamanitra, izay hanamarina ny voafora noho ny finoana, ary ny tsy voafora amin’ny finoana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Koa mahafoana ny lalàna amin’ny finoana va isika? Sanatria izany! Fa mampiorina tsara ny lalàna isika.
