document_id: ROM.3,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny tsy fankatoavan’ny olombelona rehetra
  - type: text
    content: 'Koa inona ary no tombony ananan’ny '
  - type: text
    content: Jiosy
  - type: text
    content: ', ary inona no soa avy amin’ny famorana? '
  '10':
  - type: text
    content: 'araka ny voasoratra hoe:'
  - type: text
    content: «Tsy misy marina na dia iray akory aza;
  '11':
  - type: text
    content: tsy misy izay mahafantatra,
  - type: text
    content: tsy misy izay mitady an’Andriamanitra.
  '12':
  - type: text
    content: Samy nania avokoa izy rehetra,
  - type: text
    content: samy tsy mahasoa avokoa izy rehetra;
  - type: text
    content: tsy misy izay manao ny tsara na dia iray akory aza» (Sal 14.1-3).
  '13':
  - type: text
    content: «Fasana misokatra ny tendany;
  - type: text
    content: ny lelany no anaovany fitaka» (Sal 5.9).
  - type: text
    content: «Ny poizin’ny menarana no ao ambanin’ny molony» (Sal 140.3);
  '14':
  - type: text
    content: «Feno ozona sy teny mangidy ny vavany» (Sal 10.7);
  '15':
  - type: text
    content: «Mailaka handatsa-dra ny tongony;
  '16':
  - type: text
    content: fandravana sy fandringanana no eo amin’ny lalany
  '17':
  - type: text
    content: ary tsy fantany ny lalan’ny fiadanana» (Isa 59.7-8).
  '18':
  - type: text
    content: «Tsy misy fahatahorana an’Andriamanitra eo anoloan’ny masony» (Sal 36.1).
  '19':
  - type: text
    content: 'Fantatsika koa fa izay zavatra lazain’ny lalàna dia lazainy amin’izay manana ny lalàna, mba ho voatampina avokoa ny vava rehetra ka hiharan’ny fitsaran’Andriamanitra izao tontolo izao, '
  '2':
  - type: text
    content: 'Maro ihany ireo amin’ny lafiny rehetra: Voalohany: Izy no notolorana ny tenin’Andriamanitra ho andraikiny. '
  '20':
  - type: text
    content: satria tsy misy nofo hohamarinina eo anatrehany amin’ny asan’ny lalàna; fa ny fahalalana ny amin’ny ota ihany no azo avy amin’ny lalàna.
  - type: heading
    content: Ny fanamarinana amin’ny finoana
  '21':
  - type: text
    content: 'Ankehitriny dia naharihary ny fahamarinana avy amin’Andriamanitra, tsy tamin’ny lalàna anefa izany, fa nambaran’ny lalàna sy ny mpaminany; '
  '22':
  - type: text
    content: 'fahamarinana avy amin’Andriamanitra amin’ny finoana an’i Jesosy '
  - type: text
    content: Kristy
  - type: text
    content: ' ho an’izay rehetra mino, satria tsy misy fanavakavahana, '
  '23':
  - type: text
    content: 'fa samy efa nanota izy rehetra ka tsy manana ny voninahitra avy amin’Andriamanitra; '
  '24':
  - type: text
    content: 'nefa hamarinina maimaimpoana amin’ny fahasoavany izy noho ny fanavotana izay ao amin’i Kristy Jesosy. '
  '25':
  - type: text
    content: 'Izy no natolotr’Andriamanitra ho fanatitra fampiononam-pahatezerana tamin’ny rany, amin’ny finoana, mba hanehoana ny fahamarinany amin’ny tsy namaliany ny fahotana lasa '
  '26':
  - type: text
    content: tamin’ny nandeferany; mba hanehoan’Andriamanitra ny fahamarinany ankehitriny ka ho marina Izy sady hanamarina izay manana finoana an’i Jesosy.
  '27':
  - type: text
    content: 'Aiza ary ny fireharehana? Foana izany. Amin’ny lalàna manao ahoana? Amin’ny lalànan’ny asa va? Tsia, fa amin’ny lalànan’ny finoana. '
  '28':
  - type: text
    content: 'Koa amin’izany dia heverintsika fa finoana no anamarinana ny olona fa tsy ny asan’ny lalàna. '
  '29':
  - type: text
    content: 'Moa Andriamanitry ny '
  - type: text
    content: Jiosy
  - type: text
    content: ' ihany va Izy fa tsy an’ny '
  - type: text
    content: Jentilisa
  - type: text
    content: ' koa? Eny, an’ny Jentilisa koa Izy, '
  '3':
  - type: text
    content: 'Fa ahoana ary? Raha tsy nahatoky ny sasany, moa ny tsy fahatokiany va hahafoana ny fahatokian’Andriamanitra? '
  '30':
  - type: text
    content: 'satria iray ihany Andriamanitra, izay hanamarina ny voafora noho ny finoana, ary ny tsy voafora amin’ny finoana. '
  '31':
  - type: text
    content: Koa mahafoana ny lalàna amin’ny finoana va isika? Sanatria izany! Fa mampiorina tsara ny lalàna isika.
  '4':
  - type: text
    content: 'Sanatria izany! Aoka Andriamanitra no ekena ho marina fa ny olona rehetra kosa dia ho mpandainga, araka ny voasoratra hoe:'
  - type: text
    content: «Mba ho hita ho marina amin’ny teninao Ianao
  - type: text
    content: ary hahery, raha tsaraina» (Sal 51.4).
  '5':
  - type: text
    content: 'Fa raha ny tsy fahamarinantsika no mampiseho ny fahamarinan’Andriamanitra, inona ary no holazaintsika? Tsy marina va Andriamanitra raha mampihatra ny fahatezerany? Miteny araka ny fanaon’ny olona aho. '
  '6':
  - type: text
    content: 'Sanatria izany! Fa raha izany, hataon’Andriamanitra ahoana no fitsara izao tontolo izao? '
  '7':
  - type: text
    content: 'Raha nitombo noho ny laingako kosa ny fahamarinan’Andriamanitra mba ho voninahiny, nahoana aho no mbola tsaraina ho mpanota indray? '
  '8':
  - type: text
    content: Nahoana ary no tsy hanao ratsy isika mba hiavian’ny soa? Tahaka izany ny tenin’ny sasany izay manendrikendrika anay ho milaza izany. Mendrika ny fanamelohana azy ireny.
  '9':
  - type: text
    content: 'Ahoana ary? Ambony noho ny hafa va isika? Tsy izany velively; satria efa voalazantsika rahateo fa mpanota avokoa na ny Jiosy na ny '
  - type: text
    content: Jentilisa
  - type: text
    content: ' '
