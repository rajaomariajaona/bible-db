type_code: plt
verses:
  '1':
  - type: text
    content: INDRAY MIJERY
  - type: text
    content: Ny fotoana niasan’ny Mpaminany dia teo anelanelan’ny nisandratan’ny Babiloniana izay avy nandresy an’i Asiria sy i Ejipta (612–605 tal JK), sy ny fanafihana an’i Jerosalema (597 tal JK). Fotoana mampangitakitaka ho an’ny Israely tokoa izany satria ny Babiloniana dia efa mandroso amim-pireharehana haka ny tany rehetra.
  - type: text
    content: Ny votoatin’ny Boky
  - type: text
    content: Mahatsiaro mijaly ny Mpaminany noho ny fahitany ny fahoriana manjo ny firenena sy ny fahotana ataony. Mitaraina amin’Andriamanitra izy noho izany ary mifaly rehefa mahazo valiny avy Aminy.
  - type: text
    content: Ny valinteny avy amin’Andriamanitra dia manambara fa ny hahavelona dia ny finoana na ny fiankinana Aminy ary ny fiandrasana ny famonjeny amin’ny fanantenana.
  - type: text
    content: Ny firafitry ny Boky
  - type: text
    content: 'Fitarainan’ny Mpaminany noho ny fahitany fa toa ambinina ny ratsy fanahy: 1.1-17'
  - type: text
    content: 'Ny valintenin’NY TOMPO: 2.1-20'
  - type: text
    content: 'Salamo fiderana nataon’i Habakoka: 3.1-19'
