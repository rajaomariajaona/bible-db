document_id: HAB.INTRO1,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: imt1
    children:
    - type: text
      text: INDRAY MIJERY
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Ny fotoana niasan’ny Mpaminany dia teo anelanelan’ny nisandratan’ny Babiloniana izay avy nandresy an’i Asiria sy i Ejipta (612–605 tal JK), sy ny fanafihana an’i Jerosalema (597 tal JK). Fotoana mampangitakitaka ho an’ny Israely tokoa izany satria ny Babiloniana dia efa mandroso amim-pireharehana haka ny tany rehetra.
  - type: usfm
    marker: is1
    children:
    - type: text
      text: Ny votoatin’ny Boky
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Mahatsiaro mijaly ny Mpaminany noho ny fahitany ny fahoriana manjo ny firenena sy ny fahotana ataony. Mitaraina amin’Andriamanitra izy noho izany ary mifaly rehefa mahazo valiny avy Aminy.
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Ny valinteny avy amin’Andriamanitra dia manambara fa ny hahavelona dia ny finoana na ny fiankinana Aminy ary ny fiandrasana ny famonjeny amin’ny fanantenana.
  - type: usfm
    marker: iot
    children:
    - type: text
      text: Ny firafitry ny Boky
  - type: usfm
    marker: io1
    children:
    - type: text
      text: 'Fitarainan’ny Mpaminany noho ny fahitany fa toa ambinina ny ratsy fanahy: 1.1-17'
  - type: usfm
    marker: io1
    children:
    - type: text
      text: 'Ny valintenin’NY TOMPO: 2.1-20'
  - type: usfm
    marker: io1
    children:
    - type: text
      text: 'Salamo fiderana nataon’i Habakoka: 3.1-19'
