document_id: 2CH.8,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Asa samihafa nosahanin’i Solomona
  - type: heading
    content: 1Mpa 9.10-28
  - type: text
    content: 'Nony afaka ny roapolo taona nanaovan’i Solomona ny tranon’NY TOMPO sy ny lapa ho an’ny tenany '
  '10':
  - type: text
    content: 'Izao no isan’ireo mpifehy voatendrin’i Solomona mpanjaka: Dimampolo sy roanjato izay nanapaka ny olona.'
  '11':
  - type: text
    content: 'Nitondra ny zanakavavin’ny Farao niakatra avy tao an-Tanànan’i Davida ho ao amin’ny trano izay nataony ho azy i Solomona, satria hoy izy: Ny vadiko dia tsy mahazo mitoetra ao an-tranon’i Davida, mpanjakan’ny Israely, fa masina izay efa nidiran’ny vata misy ny faneken’NY TOMPO.'
  '12':
  - type: text
    content: 'Tamin’izany i Solomona dia nanolotra fanatitra dorana manontolo ho an’NY TOMPO teo ambonin’ny alitaran’NY TOMPO, izay naoriny teo anoloan’ny lalantsara fidirana; '
  '13':
  - type: text
    content: eny, nanolotra izay fanao isanandro izy araka ny didin’i Mosesy, dia tamin’ny Sabata sy ny voaloham-bolana ary ny fotoam-pivavahana intelo isan-taona, dia tamin’ny andro firavoravoana fihinanana mofo tsy misy masirasira sy ny andro firavoravoana manaraka ireo Herinandro
  - type: note
    content: Zahao Eks 34.22.
  - type: text
    content: ' ary ny andro firavoravoana fitoerana amin’ny trano rantsan-kazo. '
  '14':
  - type: text
    content: 'Notendreny koa ny antokon’ny mpisorona, araka ny nandaharan’i Davida rainy azy ho amin’ny fanompoany avy, ary ny '
  - type: text
    content: levita
  - type: text
    content: ' koa ho amin’ny anjara raharahany, dia ny hidera sy hanao fanompoam-pivavahana eo anoloan’ny mpisorona araka ny raharaha fanao isanandro, ary ny mpiandry varavarana dia araka ny antokony amin’ny isam-bavahady; fa izany no didy nomen’i Davida, lehilahin’Andriamanitra, azy. '
  '15':
  - type: text
    content: 'Ary tsy nialan’ireo ny didin’ny mpanjaka tamin’ny mpisorona sy ny levita na amin’inona na amin’inona, indrindra fa ny amin’ny trano fitahirizana. '
  '16':
  - type: text
    content: Toy izany no nanamboaran’i Solomona ny asa rehetra nataony hatramin’ny andro nanorenany ny tranon’NY TOMPO ka ambara-pahavitany. Dia vita tsara ny tranon’NY TOMPO.
  '17':
  - type: text
    content: 'Ary tamin’izay i Solomona dia nankany Eziona-Gebera sy Elota eo amoron’ny ranomasina any amin’ny tany Edoma, '
  '18':
  - type: text
    content: 'ary ny mpanompon’i Hirama dia nampandehaniny hitondra sambo sy mpanompo izay mahay ranomasina; niara-nandeha tamin’ny mpanompon’i Solomona ho any Ofira ireo ka nahazo volamena milanja dimampolo sy efajato '
  - type: text
    content: talenta
  - type: text
    content: ' tany, dia noentiny tany amin’i Solomona mpanjaka izany.'
  '2':
  - type: text
    content: 'dia namboariny ny tanàna izay nomen’i Hirama azy ka namponenany ny Zanak’Israely. '
  '3':
  - type: text
    content: 'Dia nankany Hamata-Zoba i Solomona ka naharesy azy. '
  '4':
  - type: text
    content: 'Nanorina an’i Tadmora tany an-tany efitra sy ny tanàna fitahirizana rehetra izay naoriny tany Hamata izy. '
  '5':
  - type: text
    content: 'Namboariny koa i Bety-Horona ambony sy i Bety-Horona ambany, tanàna mafy misy manda sy vavahady misy hidiny; '
  '6':
  - type: text
    content: 'tahaka izany koa i Baleta, ny tanàna fitahirizana rehetra izay an’i Solomona, ny tanàna rehetra fitoeran’ny kalesy fitondra miady, ny tanàna fitoeran’ny mpitaingin-tsoavaly ary izay rehetra tian’i Solomona haorina tany Jerosalema sy tany Libanona ary tany amin’ny tany nanjakany rehetra. '
  '7':
  - type: text
    content: 'Ny olona sisa rehetra tamin’ny Hetita, ny Amorita, ny Perizita, ny Hivita ary ny Jebosita, izay tsy isan’ny Israely, '
  '8':
  - type: text
    content: 'dia ny taranany izay sisa nandimby azy teo amin’ny taniny fa tsy naringan’ny Israely, ireny no nampanaovin’i Solomona fanompoana mandraka androany. '
  '9':
  - type: text
    content: 'Fa ny Zanak’Israely dia tsy mba nampanaovin’i Solomona izany, fa ireo kosa no miaramila sy mpitarika ny mpanafika malaza ary lehiben’ny kalesy fitondra miady sy ny mpitaingin-tsoavaliny. '
