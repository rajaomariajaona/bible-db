document_id: 1CH.24
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nizarana ny mpisorona
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ny amin’ny taranak’i Arona dia izao no nizarana azy ho antokony:'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ny zanakalahin’i Arona dia i Nadaba, i Abiho, i Eleazara ary Itamara. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'I Nadaba sy i Abiho dia maty talohan’ny rainy sady samy tsy nanan-janaka, koa dia i Eleazara sy Itamara no nanao raharaha fisoronana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: I Davida sy i Zadoka, isan’ny taranak’i Eleazara, sy i Ahimeleka, isan’ny taranak’Itamara, dia nizara azy araka ny antokony sy ny fanompoany avy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Tamin’ny taranak’i Eleazara dia maromaro kokoa ny lohan’ny fianakaviana noho ny tamin’ny taranak’Itamara ka nozarainy toy izao izy: Tamin’ny taranak’i Eleazara dia enina amby folo no lohan’ny fianakaviana; ary tamin’ny taranak’Itamara dia valo kosa no lohan’ny fianakaviana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Samy nozarazaraina tamin’ny antsapaka avokoa izy rehetra; fa samy mpitandrina ny zava-masina, dia mpitandrina voatendry ho an’Andriamanitra avokoa, na ny avy tamin’ny taranak’i Eleazara, na ny avy tamin’ny taranak’Itamara. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'I Semaia, zanak’i Netanela, mpitantsoratra iray tamin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: levita
  - type: text
    text: ', no nanoratra azy teo anatrehan’ny mpanjaka, ny mpanapaka, i Zadoka mpisorona, i Ahimeleka, zanak’i Abiatara ary teo anatrehan’ny loham-pianakavian’ny mpisorona sy ny levita. Fianakaviana iray no nalaina ho an’i Eleazara, ary iray kosa dia ho an’Itamara.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ny antsapaka voalohany dia azon’i Joariba, ny faharoa dia an’i Jedaia, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'ny fahatelo dia an’i Harima, ny fahefatra dia an’i Seorima, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'ny fahadimy dia an’i Malkia, ny fahenina dia an’i Miamina, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'ny fahafito dia an’i Koza, ny fahavalo dia an’i Abia, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'ny fahasivy dia an’i Jesoa, ny fahafolo dia an’i Sekania, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'ny fahiraika amby folo dia an’i Eliasiba, ny faharoa amby folo dia an’i Jakima, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'ny fahatelo amby folo dia an’i Hopa, ny fahefatra amby folo dia an’i Jesebaba, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'ny fahadimy amby folo dia an’i Bilga, ny fahenina amby folo dia an’Imera, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'ny fahafito amby folo dia an’i Hezira, ny fahavalo amby folo dia an’i Hapizeza, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'ny fahasivy amby folo dia an’i Petahia, ny faharoapolo dia an’i Jehezekela, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'ny fahiraika amby roapolo dia an’i Jakina, ny faharoa amby roapolo dia an’i Gamola, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ny fahatelo amby roapolo dia an’i Delaia, ny fahefatra amby roapolo dia an’i Mazia.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ireo avy no antokony amin’ny fanompoany izay hidirany ao amin’ny tranon’NY TOMPO araka ny fitsipika voatendrin’i Arona rainy, araka ny nandidian’NY TOMPO, Andriamanitry ny Israely, azy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fanampin’ny fitanisana levita
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Tamin’ny taranak’i Levy sisa dia izao: Tamin’ny taranak’i Amrama dia i Sobaela; tamin’ny zanak’i Sobaela dia i Jedaia. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ny amin’i Rehabia: Tamin’ny taranak’i Rehabia dia i Jisia no voalohany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Tamin’ny Jizarita dia i Selomota; tamin’ny taranak’i Selomota dia i Jahata. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ny amin’ny taranak’i Hebrona dia i Jeria no voalohany, i Amaria no faharoa, i Jahaziela no fahatelo, i Jekameama no fahefatra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ny zanakalahin’i Oziela dia i Mika; tamin’ny taranak’i Mika dia i Samira; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'ny rahalahin’i Mika dia i Jisia; tamin’ny taranak’i Jisia dia i Zakaria. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ny zanakalahin’i Merary dia i Maly sy i Mosy; ny zanakalahin’i Jazia dia i Beno. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ny zanakalahin’i Merary tamin’i Jazia dia i Beno, i Sohama, i Zakora ary Ibry. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Avy tamin’i Maly no niavian’i Eleazara izay tsy nanan-janakalahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ny amin’i Kisy, ny zanany lahy dia i Jeramela. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ny zanakalahin’i Mosy dia i Maly sy i Edera ary i Jerimota. Ireo no taranaky ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: levita
  - type: text
    text: ' araka ny fianakaviany avy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ary ireo dia mba nanao antsapaka tahaka ireo rahalahiny, taranak’i Arona, teo anatrehan’i Davida mpanjaka sy i Zadoka ary i Ahimeleka sy ny lohan’ny fianakavian’ny mpisorona ary ny levita: Nanao antsapaka avokoa na ny zokiny na ny zandriny.'
