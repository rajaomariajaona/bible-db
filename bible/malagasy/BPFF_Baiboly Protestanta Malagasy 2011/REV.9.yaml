document_id: REV.9,3103
type_code: plt
verses:
  '1':
  - type: text
    content: 'Ary nitsoka ny trompetra ny anjely fahadimy, dia hitako fa indro nisy kintana iray avy tany an-danitra latsaka tamin’ny tany, ary nomena ilay anjely ny fanalahidin’ny lavaka tsy hita noanoa. '
  '10':
  - type: text
    content: 'Manan-drambo tahaka ny maingoka izy sady misy fanindronana; ary ao amin’ny rambony no misy ny heriny hampahoriany ny olona dimy volana. '
  '11':
  - type: text
    content: Ary manana ny anjelin’ny lavaka tsy hita noanoa ho mpanjakany izy; ny anarany amin’ny teny hebreo dia Abadona, fa amin’ny teny grika kosa dia Apoliona, na Mpandringana.
  '12':
  - type: text
    content: Lasa ny loza iray. Indreo ny loza roa hafa koa ho avy aorianan’izao.
  '13':
  - type: text
    content: 'Nitsoka ny anjely fahenina. Dia nahare feo avy teo amin’ny '
  - type: text
    content: tandroky
  - type: text
    content: ' ny alitara volamena izay eo anatrehan’Andriamanitra, aho; '
  '14':
  - type: text
    content: 'niteny tamin’ny anjely fahenina izay nanana ny trompetra izy hoe: Vahao ny anjely efatra izay mifatotra any Eofrata, ony lehibe. '
  '15':
  - type: text
    content: 'Dia novahana ny anjely efatra izay voaomana ho amin’ny ora, ny andro, ny volana ary ny taona, mba hahafaty ny ampahatelon’ny olona. '
  '16':
  - type: text
    content: Ny isan’ny miaramila an-tsoavaly dia roanjato tapitrisa. Nandre ny isany aho.
  '17':
  - type: text
    content: 'Ary toy izao no nahitako ny soavaly teo amin’ny fahitana sy izay nitaingina azy: Manana fiarovan-tratra mena mivaivay sy manga antitra ary mavo toy ny solifara izy; ny lohan’ny soavaly dia tahaka ny lohan’ny liona; misy afo sy setroka ary solifara mivoaka avy amin’ny vavany. '
  '18':
  - type: text
    content: 'Ireo loza telo loha ireo, dia ny afo sy ny setroka ary ny solifara izay nivoaka avy tamin’ny vavany, no nahafaty ny ampahatelon’ny olona. '
  '19':
  - type: text
    content: Fa ny herin’ny soavaly dia eo amin’ny vavany sy ny rambony; fa ny rambony dia tahaka ny menarana sady misy lohany maro, koa ireny no entiny mampahory.
  '2':
  - type: text
    content: 'Ary nanokatra ny lavaka tsy hita noanoa izy dia nisy setroka niakatra avy tamin’ny lavaka, tahaka ny setroka avy amin’ny lafaoro lehibe ka tonga maizina ny masoandro sy ny rivotra noho ny setroka avy tao amin’ny lavaka. '
  '20':
  - type: text
    content: 'Nefa ny olona sisa izay tsy matin’ireo loza ireo, dia tsy nibebaka niala tamin’ny asan’ny tanany; tsy nitsahatra nivavaka tamin’ny demonia sy ny sampy volamena sy volafotsy sy varahina sy vato ary hazo, izay tsy mahita, na mahare, na afa-mamindra, izy; '
  '21':
  - type: text
    content: tsy nibebaka tamin’ny namonoany olona izy, na tamin’ny nanaovany ody ratsy, na tamin’ny fijangajangany, na tamin’ny halatra nataony.
  '3':
  - type: text
    content: 'Ary nisy valala nivoaka avy tao amin’ny setroka ka nankany amin’ny tany; ary nomena hery ireny, tahaka ny herin’ny maingoka amin’ny tany. '
  '4':
  - type: text
    content: 'Ary nilazana izy mba tsy hanimba ny ahitra amin’ny tany, na ny zava-maitso, na ny hazo akory aza, fa ny olona izay tsy manana ny tombo-kasen’Andriamanitra eo amin’ny handriny ihany. '
  '5':
  - type: text
    content: 'Nefa tsy navela hahafaty azy izy fa ny hampanaintaina azy dimy volana; ary ny fanaintainana avy aminy dia tahaka ny fanaintainana avy amin’ny maingoka mamely olona. '
  '6':
  - type: text
    content: Amin’izany andro izany dia hitady fahafatesana ny olona nefa tsy hahita. Haniry ho faty izy nefa handositra azy ny fahafatesana.
  '7':
  - type: text
    content: 'Ny fijery ny valala dia tahaka ny soavaly voaomana hoenti-miady. Tamin’ny lohany dia nisy satroboninahitra toy ny volamena ary ny tavany dia tahaka ny tavan’olona. '
  '8':
  - type: text
    content: 'Nanana volo tahaka ny volom-behivavy izy ary ny nifiny dia tahaka ny an’ny liona. '
  '9':
  - type: text
    content: 'Nanana fiarovan-tratra tahaka ny fiarovan-tratra vy izy; ary ny fikopakopaky ny elany dia tahaka ny fikotrokotroky ny kalesy fitondra miady entin’ny soavaly betsaka miriotra ho amin’ny ady. '
