document_id: REV.9
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary nitsoka ny trompetra ny anjely fahadimy, dia hitako fa indro nisy kintana iray avy tany an-danitra latsaka tamin’ny tany, ary nomena ilay anjely ny fanalahidin’ny lavaka tsy hita noanoa. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary nanokatra ny lavaka tsy hita noanoa izy dia nisy setroka niakatra avy tamin’ny lavaka, tahaka ny setroka avy amin’ny lafaoro lehibe ka tonga maizina ny masoandro sy ny rivotra noho ny setroka avy tao amin’ny lavaka. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary nisy valala nivoaka avy tao amin’ny setroka ka nankany amin’ny tany; ary nomena hery ireny, tahaka ny herin’ny maingoka amin’ny tany. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary nilazana izy mba tsy hanimba ny ahitra amin’ny tany, na ny zava-maitso, na ny hazo akory aza, fa ny olona izay tsy manana ny tombo-kasen’Andriamanitra eo amin’ny handriny ihany. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Nefa tsy navela hahafaty azy izy fa ny hampanaintaina azy dimy volana; ary ny fanaintainana avy aminy dia tahaka ny fanaintainana avy amin’ny maingoka mamely olona. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Amin’izany andro izany dia hitady fahafatesana ny olona nefa tsy hahita. Haniry ho faty izy nefa handositra azy ny fahafatesana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ny fijery ny valala dia tahaka ny soavaly voaomana hoenti-miady. Tamin’ny lohany dia nisy satroboninahitra toy ny volamena ary ny tavany dia tahaka ny tavan’olona. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Nanana volo tahaka ny volom-behivavy izy ary ny nifiny dia tahaka ny an’ny liona. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Nanana fiarovan-tratra tahaka ny fiarovan-tratra vy izy; ary ny fikopakopaky ny elany dia tahaka ny fikotrokotroky ny kalesy fitondra miady entin’ny soavaly betsaka miriotra ho amin’ny ady. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Manan-drambo tahaka ny maingoka izy sady misy fanindronana; ary ao amin’ny rambony no misy ny heriny hampahoriany ny olona dimy volana. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ary manana ny anjelin’ny lavaka tsy hita noanoa ho mpanjakany izy; ny anarany amin’ny teny hebreo dia Abadona, fa amin’ny teny grika kosa dia Apoliona, na Mpandringana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Lasa ny loza iray. Indreo ny loza roa hafa koa ho avy aorianan’izao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Nitsoka ny anjely fahenina. Dia nahare feo avy teo amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tandroky
  - type: text
    text: ' ny alitara volamena izay eo anatrehan’Andriamanitra, aho; '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'niteny tamin’ny anjely fahenina izay nanana ny trompetra izy hoe: Vahao ny anjely efatra izay mifatotra any Eofrata, ony lehibe. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Dia novahana ny anjely efatra izay voaomana ho amin’ny ora, ny andro, ny volana ary ny taona, mba hahafaty ny ampahatelon’ny olona. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ny isan’ny miaramila an-tsoavaly dia roanjato tapitrisa. Nandre ny isany aho.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary toy izao no nahitako ny soavaly teo amin’ny fahitana sy izay nitaingina azy: Manana fiarovan-tratra mena mivaivay sy manga antitra ary mavo toy ny solifara izy; ny lohan’ny soavaly dia tahaka ny lohan’ny liona; misy afo sy setroka ary solifara mivoaka avy amin’ny vavany. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ireo loza telo loha ireo, dia ny afo sy ny setroka ary ny solifara izay nivoaka avy tamin’ny vavany, no nahafaty ny ampahatelon’ny olona. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Fa ny herin’ny soavaly dia eo amin’ny vavany sy ny rambony; fa ny rambony dia tahaka ny menarana sady misy lohany maro, koa ireny no entiny mampahory.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Nefa ny olona sisa izay tsy matin’ireo loza ireo, dia tsy nibebaka niala tamin’ny asan’ny tanany; tsy nitsahatra nivavaka tamin’ny demonia sy ny sampy volamena sy volafotsy sy varahina sy vato ary hazo, izay tsy mahita, na mahare, na afa-mamindra, izy; '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: tsy nibebaka tamin’ny namonoany olona izy, na tamin’ny nanaovany ody ratsy, na tamin’ny fijangajangany, na tamin’ny halatra nataony.
