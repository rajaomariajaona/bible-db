document_id: LEV.16,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny andro fanavotana
  - type: text
    content: 'Ary NY TOMPO niteny tamin’i Mosesy, rehefa maty izy roa lahy zanak’i Arona, tamin’izy ireo nanatona teo anatrehan’NY TOMPO ka maty. '
  '10':
  - type: text
    content: 'Fa ny osilahy izay niharan’ny antsapaka ho an’i Azazela kosa dia hapetraka velona eo anatrehan’NY TOMPO hanaovana fanavotana eo amboniny mba handefasana azy hankany an-tany efitra ho an’i Azazela. '
  '11':
  - type: text
    content: 'Ary hampanatonin’i Arona ny vantotra ombilahy izay hatao fanatitra fanadiovana ho an’ny tenany ka hanao fanavotana ho azy sy ny ankohonany izy; hovonoiny ny vantotra ombilahy izay hatao fanatitra fanadiovana ho an’ny tenany. '
  '12':
  - type: text
    content: 'Dia haka vainafo eran’ny fitondrana afo avy amin’ny alitara eo anatrehan’NY TOMPO izy ary ditin-kazo manitra voatorotoro madinika eran’ny tanan-droa ka hoentiny miditra ao ambadiky ny efitra lamba izany. '
  '13':
  - type: text
    content: 'Hataony eo amin’ny afo eo anatrehan’NY TOMPO ny ditin-kazo ka hosaronan’ny setroky ny ditin-kazo ny rakotra fanaovam-panavotana izay eo ambonin’ny Vavolombelona mba tsy hahafaty azy. '
  '14':
  - type: text
    content: 'Dia hakany ny ran’ny vantotra ombilahy ka hafafin’ny fanondrony amin’ny rakotra fanaovam-panavotana eo amin’ny lafiny atsinanana ary ny eo anoloan’ny rakotra fanaovam-panavotana dia hofafazany ny ra impito amin’ny fanondrony koa. '
  '15':
  - type: text
    content: Dia hovonoiny ny osilahy izay hatao fanatitra fanadiovana ho an’ny olona ka hoentiny miditra ao ambadiky ny efitra lamba ny rany ary hataony tahaka ny efa nataony tamin’ny ran’ny vantotra ombilahy ihany ka hafafiny eo amin’ny rakotra fanaovam-panavotana sy eo anoloany.
  '16':
  - type: text
    content: 'Ary hanao fanavotana ho an’ny fitoerana masina izy noho ny fahalotoan’ny Zanak’Israely sy ny fahadisoany, dia ny fahotany rehetra; toy izany koa no hataony ho an’ny tranolay fihaonana izay mitoetra eo anivony, eo afovoan’ny fahalotoany. '
  '17':
  - type: text
    content: Aza avela hisy olona ao amin’ny tranolay fihaonana raha miditra hanao fanavotana ao amin’ny fitoerana masina i Arona, mandra-pialany avy nanao fanavotana ho an’ny tenany sy ny ankohonany ary ho an’ny fiangonana, dia ny Israely manontolo.
  '18':
  - type: text
    content: 'Fa handeha ho eo amin’ny alitara eo anatrehan’NY TOMPO izy ka hanao fanavotana ho an’ny alitara. Hakany ny ran’ny vantotra ombilahy sy ny ran’ny osilahy ka hahosony amin’ireo '
  - type: text
    content: tandroky
  - type: text
    content: ' ny alitara eo amin’ny manodidina. '
  '19':
  - type: text
    content: Dia hofafazany ra impito amin’ny fanondrony izany ka hodioviny sy hohamasininy ho afaka amin’ny fahalotoan’ny Zanak’Israely.
  '2':
  - type: text
    content: 'Hoy NY TOMPO tamin’i Mosesy: Lazao amin’i Arona rahalahinao mba tsy hiditra mandrakariva ao amin’ny fitoerana masina izy, dia ao anatin’ny efitra lamba, eo anoloan’ny rakotra fanaovam-panavotana izay eo ambonin’ny '
  - type: text
    content: vata misy ny Fanekena
  - type: text
    content: ' mba tsy hahafaty azy; fa hiseho eo amin’ny rahona eo ambonin’ny rakotra fanaovam-panavotana Aho.'
  '20':
  - type: text
    content: 'Ary rehefa vitany ny fanavotana ho an’ny fitoerana masina sy ny tranolay fihaonana ary ny alitara dia hampanatoniny ilay osilahy velona. '
  '21':
  - type: text
    content: 'Dia hapetrak’i Arona amin’ny lohan’ny osilahy velona ny tanany roa ka hekeny eo amboniny ny heloky ny Zanak’Israely rehetra sy ny fahadisoany rehetra, dia ny fahotany rehetra; ary hametraka izany eo amin’ny lohan’ilay osilahy izy ka hampandeha azy ho any an-tany efitra hoentin’ny lehilahy iray izay voatendry ho amin’izany. '
  '22':
  - type: text
    content: Dia hoentin’ilay osilahy ho any an-tany tsy hay andehanana ny helok’izy rehetra. Halefany any an-tany efitra ilay osilahy.
  '23':
  - type: text
    content: 'Dia hiditra ao amin’ny tranolay fihaonana i Arona, hanala ireo fitafiany vita amin’ny lamba rongony izay niakanjoany raha niditra ao amin’ny fitoerana masina izy ka havelany ao izany. '
  '24':
  - type: text
    content: 'Dia handro amin’ny rano eo amin’ny fitoerana masina iray izy ka hitafy ny fitafiany, dia handeha izy ka hanatitra ny fanatitra dorana manontolo ho an’ny tenany sy ny fanatitra dorana manontolo ho an’ny olona ary hanao fanavotana ho an’ny tenany sy ny olona izy. '
  '25':
  - type: text
    content: Ny jaboran’ny fanatitra fanadiovana dia hodorany ho fofona eo ambonin’ny alitara.
  '26':
  - type: text
    content: 'Ary ilay mandefa ny osilahy ho fanesorana tanteraka ny ota dia hanasa ny fitafiany ka handro amin’ny rano, izay vao mahazo mankeo an-toby indray. '
  '27':
  - type: text
    content: 'Ny vantotra ombilahy natao fanatitra fanadiovana sy ny osilahy natao fanatitra fanadiovana, izay efa nampidirina tao amin’ny fitoerana masina ny rany mba hanaovana fanavotana, dia hoentina mivoaka ho eny ivelan’ny toby ka hodorana amin’ny afo ny hodiny sy ny nofony ary ny tain-drorohany. '
  '28':
  - type: text
    content: Ary izay mandoro ireo dia hanasa ny fitafiany sy handro amin’ny rano, izay vao mahazo mankeo an-toby indray.
  '29':
  - type: text
    content: 'Izao no ho lalàna maharitra ho anareo: Amin’ny andro fahafolo amin’ny volana fahafito dia aoka hifady hanina ianareo ary tsy hanao raharaha akory, na ny tompon-tany na ny vahiny izay monina eo aminareo. '
  '3':
  - type: text
    content: 'Ary izao no hoentin’i Arona raha miditra ao amin’ny fitoerana masina izy: Vantotra ombilahy iray hatao fanatitra fanadiovana sy ondrilahy iray hatao fanatitra dorana manontolo. '
  '30':
  - type: text
    content: 'Fa amin’izany andro izany no hanaovana fanavotana ho anareo hanadiovana anareo dia hadio ho afaka amin’ny fahotanareo rehetra eo anatrehan’NY TOMPO ianareo. '
  '31':
  - type: text
    content: 'Ho tena andro fitsaharana ho anareo izany ka hifady hanina ianareo: Ho lalàna maharitra izany.'
  '32':
  - type: text
    content: 'Ny mpisorona izay hohosorana sy hatokana ho mpisorona hisolo ny rainy dia hanao fanavotana; hitafy ny fitafiana vita amin’ny lamba rongony izy, dia ny fitafiana masina. '
  '33':
  - type: text
    content: 'Hanao fanavotana ho an’ny fitoerana masina izy sy ho an’ny tranolay fihaonana ary ny alitara sy ny mpisorona ary ny olona rehetra amin’ny fiangonana. '
  '34':
  - type: text
    content: Ho lalàna maharitra ho anareo izany, hanaovana fanavotana ho an’ny Zanak’Israely indray mandeha isan-taona hahafahany amin’ny fahotany rehetra. Dia nataon’i Arona araka izay efa nandidian’NY TOMPO an’i Mosesy izany.
  '4':
  - type: text
    content: 'Akanjo masina lava vita amin’ny lamba rongony no hiakanjoany, kalisaonina vita amin’ny lamba rongony no hataony manolo-koditra, fehikibo vita amin’ny lamba rongony no hifehezany, fehiloha lamba rongony no hisatrohany: Fitafiana masina ireo ka handro amin’ny rano izy vao hiakanjo azy. '
  '5':
  - type: text
    content: 'Ary ny fiangonan’ny Zanak’Israely dia handraisany osilahy roa hatao fanatitra fanadiovana sy ondrilahy iray hatao fanatitra dorana manontolo. '
  '6':
  - type: text
    content: 'Dia hampanatonin’i Arona ny vantotra ombilahy izay hatao fanatitra fanadiovana ho an’ny tenany ka hanao fanavotana ho an’ny tenany sy ny ankohonany izy. '
  '7':
  - type: text
    content: 'Ary halainy ny osilahy roa ka hapetrany eo anatrehan’NY TOMPO, eo anoloan’ny varavaran’ny '
  - type: text
    content: tranolay fihaonana
  - type: text
    content: '. '
  '8':
  - type: text
    content: 'Dia hanaovan’i Arona antsapaka ny osilahy roa: Ny voatsapaka iray dia ho an’NY TOMPO ary ny voatsapaka iray kosa dia ho an’i Azazela. '
  '9':
  - type: text
    content: 'Ary hampanatonin’i Arona ny osilahy izay niharan’ny antsapaka ho an’NY TOMPO ka hataony fanatitra fanadiovana. '
