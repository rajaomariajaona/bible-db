document_id: LEV.16,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny andro fanavotana
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary NY TOMPO niteny tamin’i Mosesy, rehefa maty izy roa lahy zanak’i Arona, tamin’izy ireo nanatona teo anatrehan’NY TOMPO ka maty. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ny osilahy izay niharan’ny antsapaka ho an’i Azazela kosa dia hapetraka velona eo anatrehan’NY TOMPO hanaovana fanavotana eo amboniny mba handefasana azy hankany an-tany efitra ho an’i Azazela. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hampanatonin’i Arona ny vantotra ombilahy izay hatao fanatitra fanadiovana ho an’ny tenany ka hanao fanavotana ho azy sy ny ankohonany izy; hovonoiny ny vantotra ombilahy izay hatao fanatitra fanadiovana ho an’ny tenany. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia haka vainafo eran’ny fitondrana afo avy amin’ny alitara eo anatrehan’NY TOMPO izy ary ditin-kazo manitra voatorotoro madinika eran’ny tanan-droa ka hoentiny miditra ao ambadiky ny efitra lamba izany. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hataony eo amin’ny afo eo anatrehan’NY TOMPO ny ditin-kazo ka hosaronan’ny setroky ny ditin-kazo ny rakotra fanaovam-panavotana izay eo ambonin’ny Vavolombelona mba tsy hahafaty azy. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hakany ny ran’ny vantotra ombilahy ka hafafin’ny fanondrony amin’ny rakotra fanaovam-panavotana eo amin’ny lafiny atsinanana ary ny eo anoloan’ny rakotra fanaovam-panavotana dia hofafazany ny ra impito amin’ny fanondrony koa. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia hovonoiny ny osilahy izay hatao fanatitra fanadiovana ho an’ny olona ka hoentiny miditra ao ambadiky ny efitra lamba ny rany ary hataony tahaka ny efa nataony tamin’ny ran’ny vantotra ombilahy ihany ka hafafiny eo amin’ny rakotra fanaovam-panavotana sy eo anoloany.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hanao fanavotana ho an’ny fitoerana masina izy noho ny fahalotoan’ny Zanak’Israely sy ny fahadisoany, dia ny fahotany rehetra; toy izany koa no hataony ho an’ny tranolay fihaonana izay mitoetra eo anivony, eo afovoan’ny fahalotoany. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Aza avela hisy olona ao amin’ny tranolay fihaonana raha miditra hanao fanavotana ao amin’ny fitoerana masina i Arona, mandra-pialany avy nanao fanavotana ho an’ny tenany sy ny ankohonany ary ho an’ny fiangonana, dia ny Israely manontolo.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa handeha ho eo amin’ny alitara eo anatrehan’NY TOMPO izy ka hanao fanavotana ho an’ny alitara. Hakany ny ran’ny vantotra ombilahy sy ny ran’ny osilahy ka hahosony amin’ireo '
    - type: usfm
      marker: w
      children:
      - type: text
        text: tandroky
    - type: text
      text: ' ny alitara eo amin’ny manodidina. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia hofafazany ra impito amin’ny fanondrony izany ka hodioviny sy hohamasininy ho afaka amin’ny fahalotoan’ny Zanak’Israely.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy NY TOMPO tamin’i Mosesy: Lazao amin’i Arona rahalahinao mba tsy hiditra mandrakariva ao amin’ny fitoerana masina izy, dia ao anatin’ny efitra lamba, eo anoloan’ny rakotra fanaovam-panavotana izay eo ambonin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: vata misy ny Fanekena
    - type: text
      text: ' mba tsy hahafaty azy; fa hiseho eo amin’ny rahona eo ambonin’ny rakotra fanaovam-panavotana Aho.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa vitany ny fanavotana ho an’ny fitoerana masina sy ny tranolay fihaonana ary ny alitara dia hampanatoniny ilay osilahy velona. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hapetrak’i Arona amin’ny lohan’ny osilahy velona ny tanany roa ka hekeny eo amboniny ny heloky ny Zanak’Israely rehetra sy ny fahadisoany rehetra, dia ny fahotany rehetra; ary hametraka izany eo amin’ny lohan’ilay osilahy izy ka hampandeha azy ho any an-tany efitra hoentin’ny lehilahy iray izay voatendry ho amin’izany. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia hoentin’ilay osilahy ho any an-tany tsy hay andehanana ny helok’izy rehetra. Halefany any an-tany efitra ilay osilahy.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hiditra ao amin’ny tranolay fihaonana i Arona, hanala ireo fitafiany vita amin’ny lamba rongony izay niakanjoany raha niditra ao amin’ny fitoerana masina izy ka havelany ao izany. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia handro amin’ny rano eo amin’ny fitoerana masina iray izy ka hitafy ny fitafiany, dia handeha izy ka hanatitra ny fanatitra dorana manontolo ho an’ny tenany sy ny fanatitra dorana manontolo ho an’ny olona ary hanao fanavotana ho an’ny tenany sy ny olona izy. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny jaboran’ny fanatitra fanadiovana dia hodorany ho fofona eo ambonin’ny alitara.
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ilay mandefa ny osilahy ho fanesorana tanteraka ny ota dia hanasa ny fitafiany ka handro amin’ny rano, izay vao mahazo mankeo an-toby indray. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny vantotra ombilahy natao fanatitra fanadiovana sy ny osilahy natao fanatitra fanadiovana, izay efa nampidirina tao amin’ny fitoerana masina ny rany mba hanaovana fanavotana, dia hoentina mivoaka ho eny ivelan’ny toby ka hodorana amin’ny afo ny hodiny sy ny nofony ary ny tain-drorohany. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary izay mandoro ireo dia hanasa ny fitafiany sy handro amin’ny rano, izay vao mahazo mankeo an-toby indray.
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao no ho lalàna maharitra ho anareo: Amin’ny andro fahafolo amin’ny volana fahafito dia aoka hifady hanina ianareo ary tsy hanao raharaha akory, na ny tompon-tany na ny vahiny izay monina eo aminareo. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary izao no hoentin’i Arona raha miditra ao amin’ny fitoerana masina izy: Vantotra ombilahy iray hatao fanatitra fanadiovana sy ondrilahy iray hatao fanatitra dorana manontolo. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa amin’izany andro izany no hanaovana fanavotana ho anareo hanadiovana anareo dia hadio ho afaka amin’ny fahotanareo rehetra eo anatrehan’NY TOMPO ianareo. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ho tena andro fitsaharana ho anareo izany ka hifady hanina ianareo: Ho lalàna maharitra izany.'
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny mpisorona izay hohosorana sy hatokana ho mpisorona hisolo ny rainy dia hanao fanavotana; hitafy ny fitafiana vita amin’ny lamba rongony izy, dia ny fitafiana masina. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hanao fanavotana ho an’ny fitoerana masina izy sy ho an’ny tranolay fihaonana ary ny alitara sy ny mpisorona ary ny olona rehetra amin’ny fiangonana. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ho lalàna maharitra ho anareo izany, hanaovana fanavotana ho an’ny Zanak’Israely indray mandeha isan-taona hahafahany amin’ny fahotany rehetra. Dia nataon’i Arona araka izay efa nandidian’NY TOMPO an’i Mosesy izany.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Akanjo masina lava vita amin’ny lamba rongony no hiakanjoany, kalisaonina vita amin’ny lamba rongony no hataony manolo-koditra, fehikibo vita amin’ny lamba rongony no hifehezany, fehiloha lamba rongony no hisatrohany: Fitafiana masina ireo ka handro amin’ny rano izy vao hiakanjo azy. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny fiangonan’ny Zanak’Israely dia handraisany osilahy roa hatao fanatitra fanadiovana sy ondrilahy iray hatao fanatitra dorana manontolo. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hampanatonin’i Arona ny vantotra ombilahy izay hatao fanatitra fanadiovana ho an’ny tenany ka hanao fanavotana ho an’ny tenany sy ny ankohonany izy. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary halainy ny osilahy roa ka hapetrany eo anatrehan’NY TOMPO, eo anoloan’ny varavaran’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: tranolay fihaonana
    - type: text
      text: '. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hanaovan’i Arona antsapaka ny osilahy roa: Ny voatsapaka iray dia ho an’NY TOMPO ary ny voatsapaka iray kosa dia ho an’i Azazela. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hampanatonin’i Arona ny osilahy izay niharan’ny antsapaka ho an’NY TOMPO ka hataony fanatitra fanadiovana. '
