document_id: 2SA.14
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny niverenan’i Absaloma tany Jerosalema
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Nahafantatra i Joaba, zanak’i Zeroia, fa mbola nanana alahelo tamin’i Absaloma ihany ny fon’ny mpanjaka. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Dia nandefa iraka tany Tekoa nampaka vehivavy hendry iray tany i Joaba ka nilaza taminy hoe: Miangavy anao aho, modia misaona ka miakanjoa akanjo fisaonana, ary aza mihoso-menaka ianao fa manaova tahaka ny vehivavy efa nisaona ela ny maty. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dia mankanesa ao amin’ny mpanjaka ka lazao aminy araka izao. Dia nomen’i Joaba teny izy. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Rehefa hiteny tamin’ny mpanjaka ilay vehivavy avy any Tekoa dia niankohoka tamin’ny tany ary nitsaoka sady niteny hoe: Vonjeo, ry mpanjaka ô. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary hoy ny mpanjaka taminy: Inona no nanjo anao? Dia hoy izy: Vehivavy mpitondratena tokoa aho, fa maty vady. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Izaho mpanompovavinao dia nanan-janaka roa lahy, ary nifandìtra tany an-tsaha izy mirahalahy ka tsy nisy nampisaraka azy. Dia namely ny rahalahiny ny iray ka nahafaty azy. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary indreo, ny mpianakavy rehetra nanangana ady tamiko mpanompovavinao ka niteny hoe: Atolory ilay namely ny rahalahiny fa hataonay maty izy noho ny ain’ny rahalahiny izay novonoiny ka hovonoinay koa ny mpandova; hovonoiny koa ny vainafoko sisa ka tsy hamelany anarana na zanaka ho an’ny vadiko etỳ ambonin’ny tany. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary hoy ny mpanjaka tamin-dRavehivavy: Modia ianao fa izaho no handidy ny amin’izany. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Hoy ilay vehivavy avy any Tekoa tamin’ny mpanjaka: Ry mpanjaka tompoko ô, aoka ho amiko sy ho amin’ny ankohonan’ny raiko ny heloka; fa ny mpanjaka sy ny sezafiandrianany dia aoka tsy hanan-tsiny. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dia hoy ny mpanjaka: Na zovy na zovy manisy teny anao, ento etỳ amiko; dia tsy haninona anao intsony izy. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary hoy Ravehivavy: Trara antitra ianao, ry mpanjaka ô, aoka hahatsiaro NY TOMPO Andriamanitrao ianao, ary aoka ny mpamaly ra tsy hamono intsony, fandrao mamono ny zanako izy. Dia hoy ny mpanjaka: Raha velona koa NY TOMPO, tsy hisy ho latsaka amin’ny tany na dia singam-bolo iray akory aza amin’ny zanakao.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary hoy Ravehivavy: Trara antitra ianao, aoka ny mpanompovavinao mba hanao teny indraimbava monja amin’ny mpanjaka tompoko. Ary hoy izy: Lazao ary. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dia hoy Ravehivavy: Nahoana ianao no nihevitra toy izany hamely ny olon’Andriamanitra? Fa amin’ny itenenan’ny mpanjaka izany zavatra izany dia toa mahavoa ny tenany ihany izy noho ny tsy fampodian’ny mpanjaka ilay noroahiny. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Tsy maintsy maty mantsy isika ka ho tahaka ny rano raraka amin’ny tany izay tsy azo raofina intsony; ary Andriamanitra tsy manala ain’olona fa mihevitra izay tsy hanariany ilay noroahiny. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Matoa aho tonga hilaza izany zavatra izany amin’ny mpanjaka tompoko dia satria nampitahotra ahy ny olona. Ary hoy aho mpanompovavinao: Mba holazaiko amin’ny mpanjaka izany; fa angamba ny mpanjaka hanatanteraka izay angatahin’ny mpanompovaviny. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Eny, hihaino ny mpanjaka ka hamonjy ny mpanompovaviny ho afaka amin’ny tanan’ny lehilahy izay ta hamongotra ahy mbamin’ny zanako hiala amin’ny lova nomen’Andriamanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Dia hoy ny mpanompovavinao: Hahazoako fiononana anie ny tenin’ny mpanjaka tompoko; fa tahaka ilay Anjelin’Andriamanitra ny mpanjaka tompoko ka mandinika izay soa sy ratsy; koa ho aminao anie NY TOMPO Andriamanitrao. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary hoy ny mpanjaka tamin-dRavehivavy: Aza afenina ahy izay zavatra hanontaniako anao. Dia hoy Ravehivavy: Aoka hiteny ny mpanjaka tompoko. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary hoy ny mpanjaka: Moa i Joaba va no nanosika anao hilaza izany rehetra izany? Dia hoy ny navalin-dRavehivavy: Raha velona koa ny ainao, ry mpanjaka tompoko, tsy misy mivily izay rehetra nolazain’ny mpanjaka tompoko na ho amin’ny ankavanana na ho amin’ny ankavia; fa i Joaba mpanomponao tokoa no nandidy ahy sy nanome izany teny rehetra izany ny mpanompovavinao. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ny hanova endrika ny raharaha no nanaovan’i Joaba mpanomponao izany zavatra izany; fa hendry tahaka ilay Anjelin’Andriamanitra ny tompoko ka mahalala ny zavatra rehetra etỳ ambonin’ny tany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Hoy ny mpanjaka tamin’i Joaba: Indro fa efa nekeko izany zavatra izany; koa andeha, alao hody i Absaloma zatovo. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Dia niankohoka tamin’ny tany i Joaba ka nitsaoka sy nisaotra ny mpanjaka; ary hoy i Joaba: Fantatry ny mpanomponao androany fa mahita fitia eo imasonao aho, ry mpanjaka tompoko, amin’ny nanaovan’ny mpanjaka araka ny nangatahin’ny mpanompony. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Dia niainga i Joaba nankany Gesora ka noentiny nankany Jerosalema i Absaloma. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Nefa hoy ny mpanjaka: Aoka hody any an-tranony izy fa aza avela hahita ny tavako. Dia nankany an-tranony i Absaloma ka tsy nahita ny tavan’ny mpanjaka.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mamitram-pihavanana amin’i Absaloma i Davida
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Tsy nisy lehilahy tsara tarehy izay noderaina fatratra tahaka an’i Absaloma teo amin’ny Israely rehetra, fa hatrany am-paladiany ka hatrany an-tampon-dohany dia tsy nisy tsiny izy. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Rehefa nanaratra ny lohany izy dia nolanjainy ny volon-dohany ka sekela roanjato no lanjany, araka ny fandanjan’ny mpanjaka; isaky ny fitsingerenan’ny taona mantsy no nanaratany azy satria nanavesatra azy ka noharatany. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: I Absaloma dia niteraka zanaka telo mirahalahy sy vavy iray antsoina hoe Tamara izay vehivavy tsara tarehy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Nitoetra roa taona ngarangidina tany Jerosalema i Absaloma, nefa tsy mbola nahita ny tavan’ny mpanjaka ihany izy. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ary niantso an’i Joaba i Absaloma mba hanirahany azy ho any amin’ny mpanjaka, nefa tsy nety nankany aminy izy; ary mbola naniraka fanindroany indray i Absaloma, nefa mbola tsy nety nankany ihany i Joaba. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Koa hoy izy tamin’ny mpanompony: Indro, ny tanimbarin’i Joaba dia mifanakaiky amin’ny ahy, ary manana varimbazaha ao izy; andeha, doroy amin’ny afo izany. Ary nodoran’ny mpanompon’i Absaloma ny tanimbary. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Dia niainga nankany amin’i Absaloma tao an-tranony i Joaba ka niteny taminy hoe: Nahoana ny mpanomponao no nandoro ny tanimbariko tamin’ny afo? '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Fa hoy i Absaloma tamin’i Joaba: Indro, nandefa iraka tany aminao aho ka niteny hoe: Mankanesa atỳ hirahiko ho any amin’ny mpanjaka hilaza hoe: Nahoana aho no niala tany Gesora? Tsara amiko raha nitoetra tany ihany mandraka ankehitriny. Koa ankehitriny, aoka re mba hahita ny tavan’ny mpanjaka aho, koa raha manan-keloka aho dia aoka hovonoiny. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Dia nankany amin’ny mpanjaka i Joaba ka nanambara izany taminy. Ary nampanalain’ny mpanjaka i Absaloma ka nankao aminy. Niondrika tamin’ny tany teo anatrehan’ny mpanjaka izy. Dia nanoroka an’i Absaloma ny mpanjaka.
