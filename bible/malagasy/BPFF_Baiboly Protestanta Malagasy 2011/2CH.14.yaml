document_id: 2CH.14
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny niandohan’ny fanjakan’i Asa
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 1Mpa 15.11-12
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Nanao izay tsara sy mahitsy teo imason’NY TOMPO Andriamanitra i Asa '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'fa nandrava ny alitaran’ny firenen-kafa sy ny toerana fanaovana sorona izy sady nanorotoro ny tsangambaton-tsampy ary nikapa ny tsangankazon-tsampy ho an’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Aseraha
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary niteny tamin’ny Joda izy hitady NY TOMPO, Andriamanitry ny razany, ary hankatò ny lalàna sy ny didy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Nandrava ny toerana fanaovana sorona sy ny toerana fandoroana ditin-kazo manitra teny amin’ny tanànan’ny Joda rehetra koa izy, dia nandry fehizay ny fanjakana teo anatrehany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Nanorina tanàna mimanda tany Joda izy; dia nandry fehizay ny tany fa tsy nisy ady tamin’izany andro izany, satria NY TOMPO no nanome azy fiadanana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Fa hoy izy tamin’i Joda: Andeha hamboarintsika ireto tanàna ireto ka hasiantsika manda manodidina sy tilikambo ary vavahady misy hidiny raha mbola azontsika zakaina ny tany; fa efa nitady NY TOMPO Andriamanitsika isika; eny, nitady Azy isika ka nanome antsika fiadanana amin’ny manodidina Izy. Dia namboariny avokoa izany ka tontosa tsara.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Nanana miaramila telo hetsy mpitana ampinga lehibe sy lefona avy tamin’i Joda i Asa, valo alina sy roa hetsy koa ny mpitana ampinga sy tsipìka avy amin’ny Benjamina; ireo rehetra ireo dia lehilahy mahery avokoa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Niainga hiady tamin’ireo i Zera kosita dia nitondra miaramila iray tapitrisa sy kalesy fitondra miady telonjato ka tonga tao Maresa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Nivoaka hiady taminy koa i Asa, dia samy nilahatra hiady teo an-dohasaha Zefata akaiky an’i Maresa izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary nitaraina tamin’NY TOMPO Andriamaniny i Asa hoe: TOMPO ô, tsy misy afa-tsy Ianao no mahavonjy ny tsy manan-kery eo anoloan’ny maro ka vonjeo izahay, RY TOMPO Andriamanitray ô, fa Ianao no iankinanay, ary ny anaranao no andehananay hiady amin’ireto olona ireto. TOMPO ô, Ianao no Andriamanitray; aza avela hisy olona haharesy Anao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary NY TOMPO namely ny Kosita teo anoloan’i Asa sy i Joda ka nandositra ireny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Nanenjika azy hatrany Gerara i Asa sy ny vahoaka niaraka taminy ka nahafatesana be ny Kosita ary tsy naharina intsony, fa voaringana teo anoloan’NY TOMPO sy ny miaramilany izy ka nahazoan’ny Joda babo betsaka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Namely ny tanàna rehetra manodidina an’i Gerara izy; voan’ny fahatahorana NY TOMPO ireo ka nobaboin-dry Asa ny tanàna rehetra, fa be ny babo tao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ary namely ny vala izy ka nahazo babo betsaka, dia ondry aman’osy sy rameva, ary niverina ho any Jerosalema izy avy eo.
