document_id: 2CH.14,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny niandohan’ny fanjakan’i Asa
  - type: heading
    content: 1Mpa 15.11-12
  - type: text
    content: 'Nanao izay tsara sy mahitsy teo imason’NY TOMPO Andriamanitra i Asa '
  '10':
  - type: text
    content: 'Ary nitaraina tamin’NY TOMPO Andriamaniny i Asa hoe: TOMPO ô, tsy misy afa-tsy Ianao no mahavonjy ny tsy manan-kery eo anoloan’ny maro ka vonjeo izahay, RY TOMPO Andriamanitray ô, fa Ianao no iankinanay, ary ny anaranao no andehananay hiady amin’ireto olona ireto. TOMPO ô, Ianao no Andriamanitray; aza avela hisy olona haharesy Anao. '
  '11':
  - type: text
    content: 'Ary NY TOMPO namely ny Kosita teo anoloan’i Asa sy i Joda ka nandositra ireny. '
  '12':
  - type: text
    content: 'Nanenjika azy hatrany Gerara i Asa sy ny vahoaka niaraka taminy ka nahafatesana be ny Kosita ary tsy naharina intsony, fa voaringana teo anoloan’NY TOMPO sy ny miaramilany izy ka nahazoan’ny Joda babo betsaka. '
  '13':
  - type: text
    content: 'Namely ny tanàna rehetra manodidina an’i Gerara izy; voan’ny fahatahorana NY TOMPO ireo ka nobaboin-dry Asa ny tanàna rehetra, fa be ny babo tao. '
  '14':
  - type: text
    content: Ary namely ny vala izy ka nahazo babo betsaka, dia ondry aman’osy sy rameva, ary niverina ho any Jerosalema izy avy eo.
  '2':
  - type: text
    content: 'fa nandrava ny alitaran’ny firenen-kafa sy ny toerana fanaovana sorona izy sady nanorotoro ny tsangambaton-tsampy ary nikapa ny tsangankazon-tsampy ho an’ny '
  - type: text
    content: Aseraha
  - type: text
    content: '. '
  '3':
  - type: text
    content: 'Ary niteny tamin’ny Joda izy hitady NY TOMPO, Andriamanitry ny razany, ary hankatò ny lalàna sy ny didy. '
  '4':
  - type: text
    content: Nandrava ny toerana fanaovana sorona sy ny toerana fandoroana ditin-kazo manitra teny amin’ny tanànan’ny Joda rehetra koa izy, dia nandry fehizay ny fanjakana teo anatrehany.
  '5':
  - type: text
    content: 'Nanorina tanàna mimanda tany Joda izy; dia nandry fehizay ny tany fa tsy nisy ady tamin’izany andro izany, satria NY TOMPO no nanome azy fiadanana. '
  '6':
  - type: text
    content: 'Fa hoy izy tamin’i Joda: Andeha hamboarintsika ireto tanàna ireto ka hasiantsika manda manodidina sy tilikambo ary vavahady misy hidiny raha mbola azontsika zakaina ny tany; fa efa nitady NY TOMPO Andriamanitsika isika; eny, nitady Azy isika ka nanome antsika fiadanana amin’ny manodidina Izy. Dia namboariny avokoa izany ka tontosa tsara.'
  '7':
  - type: text
    content: Nanana miaramila telo hetsy mpitana ampinga lehibe sy lefona avy tamin’i Joda i Asa, valo alina sy roa hetsy koa ny mpitana ampinga sy tsipìka avy amin’ny Benjamina; ireo rehetra ireo dia lehilahy mahery avokoa.
  '8':
  - type: text
    content: 'Niainga hiady tamin’ireo i Zera kosita dia nitondra miaramila iray tapitrisa sy kalesy fitondra miady telonjato ka tonga tao Maresa. '
  '9':
  - type: text
    content: 'Nivoaka hiady taminy koa i Asa, dia samy nilahatra hiady teo an-dohasaha Zefata akaiky an’i Maresa izy. '
