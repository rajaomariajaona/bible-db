document_id: ECC.9
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mitovy ny hiafaran’ny olona rehetra
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Fa izany rehetra izany dia nalatsako tato am-poko
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ka ireto rehetra ireto no zavatra hitako:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny marina sy ny hendry mbamin’ny asany
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia samy eo an-tanan’Andriamanitra avokoa;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary koa, na ho fitiavana na ho fankahalana
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia samy tsy fantatry ny olombelona ny zavatra miandry azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Mitovy avokoa ny manjo ny olombelona rehetra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, zavatra iray ihany no manjo ny marina sy ny ratsy fanahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny manjo ny tsara fanahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny madio ary ny maloto,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny mamono zavatra hatao fanatitra sy ny tsy mamono zavatra hatao fanatitra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mitovy ihany ny amin’ny tsara fanahy sy ny amin’ny mpanota,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny amin’ny mianiana sy ny amin’izay tsy sahy hianiana.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Izao no zava-dratsy amin’izay rehetra atao etỳ ambanin’ny masoandro: Zavatra iray ihany no manjo ny olombelona rehetra, sady feno faharatsiana ny fon’ny zanak’olombelona ka hadalana no ao am-pony amin’ny andro iainany; ary rehefa afaka izany dia ho any amin’ny maty izy.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Fa ho an’izay voaisa ho naman’ny velona kosa dia mbola misy antenaina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny amboa velona no tsara noho ny liona maty.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Fantatry ny velona mantsy fa ho faty izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny maty kosa dia tsy mba mahalala na inona na inona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy misy valim-pitia ho azy intsony
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria hadino ny fahatsiarovana azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Na ny fitiavany, na ny fankahalany, na ny fialonany, dia samy efa levona ela
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady tsy manana anjara intsony mandrakizay izy amin’izay atao etỳ ambanin’ny masoandro.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ifaliana ny fiainana satria fanomezana avy amin’Andriamanitra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Mandehana, hano amin’ny fifaliana ny mofonao ary sotroy amin’ny fo falifaly ny divainao, fa efa nankasitrahan’Andriamanitra sahady ny asanao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Aoka ho fotsy mandrakariva ny fitafianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary aoka tsy ho diso menaka ny lohanao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Miravoravoa amin’ny vady malalanao
- type: usfm
  marker: q1
  children:
  - type: text
    text: amin’ny andronao rehetra mandalo foana izay nomeny anao etỳ ambanin’ny masoandro,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ny andronao rehetra mandalo foana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa izany no anjaranao amin’ny andro iainanao sy amin’ny fisasarana izay isasaranao etỳ ambanin’ny masoandro.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Izay rehetra azon’ny tananao atao dia ataovy amin’ny herinao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa tsy misy asa, na hevitra, na fahalalana, na fahendrena
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'any amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: fitoeran’ny maty
  - type: text
    text: ' izay alehanao.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Tonga tampoka ny loza
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ary hitako etỳ ambanin’ny masoandro indray
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa tsy ho an’ny mahery mandeha ny hazakazaka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy ho an’ny mahery ny ady,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy ho an’ny hendry ny hanina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy ho an’ny mazava saina ny harena
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy ho an’ny manam-pahalalana ny fitia;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny fotoana sy ny sampona dia samy mahatratra azy rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Tsy fantatry ny olombelona ny fotoanany
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa toy ny hazandrano azon’ny harato mandoza izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary toy ny voronkely izay voan’ny fandrika,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia voafandrika toy izany ny zanak’olombelona amin’ny andro mahory rehefa mahavoa azy tampoka izany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Matetika tsy misy mpahalala ny fahendrena
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Izao koa no fahendrena efa hitako tetỳ ambanin’ny masoandro ary hitako ho zava-dehibe:'
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Nisy vohitra kely sady vitsy olona, dia avy ny mpanjaka lehibe iray ka namely sy nanao fahirano azy ary nanao manda lehibe hamelezany azy. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Nisy lehilahy iray tao, izay mahantra nefa hendry, ary izy no nahavonjy ny tanàna tamin’ny fahendreny, nefa tsy nisy olona mba nahatsiaro izany lehilahy mahantra izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Koa hoy aho:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aleo fahendrena toy izay hery;
- type: usfm
  marker: q1
  children:
  - type: text
    text: kanjo hamavoina ny fahendren’ny mahantra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny teniny dia tsy mba henoina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ny tenin’ny hendry izay re ao amin’ny filaminana
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia tsara noho ny antsoantso ataon’ny mpanapaka eo amin’ny olona adala.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Aleo fahendrena toy izay fitaovam-piadiana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny mpanota iray dia mahasimba ny soa marobe.
