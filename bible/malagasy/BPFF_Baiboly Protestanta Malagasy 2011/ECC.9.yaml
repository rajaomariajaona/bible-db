document_id: ECC.9,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Mitovy ny hiafaran’ny olona rehetra
  - type: text
    content: Fa izany rehetra izany dia nalatsako tato am-poko
  - type: text
    content: 'ka ireto rehetra ireto no zavatra hitako:'
  - type: text
    content: Ny marina sy ny hendry mbamin’ny asany
  - type: text
    content: dia samy eo an-tanan’Andriamanitra avokoa;
  - type: text
    content: ary koa, na ho fitiavana na ho fankahalana
  - type: text
    content: dia samy tsy fantatry ny olombelona ny zavatra miandry azy.
  '10':
  - type: text
    content: Izay rehetra azon’ny tananao atao dia ataovy amin’ny herinao;
  - type: text
    content: fa tsy misy asa, na hevitra, na fahalalana, na fahendrena
  - type: text
    content: 'any amin’ny '
  - type: text
    content: fitoeran’ny maty
  - type: text
    content: ' izay alehanao.'
  - type: heading
    content: Tonga tampoka ny loza
  '11':
  - type: text
    content: Ary hitako etỳ ambanin’ny masoandro indray
  - type: text
    content: fa tsy ho an’ny mahery mandeha ny hazakazaka,
  - type: text
    content: tsy ho an’ny mahery ny ady,
  - type: text
    content: tsy ho an’ny hendry ny hanina,
  - type: text
    content: tsy ho an’ny mazava saina ny harena
  - type: text
    content: ary tsy ho an’ny manam-pahalalana ny fitia;
  - type: text
    content: fa ny fotoana sy ny sampona dia samy mahatratra azy rehetra.
  '12':
  - type: text
    content: Tsy fantatry ny olombelona ny fotoanany
  - type: text
    content: fa toy ny hazandrano azon’ny harato mandoza izy
  - type: text
    content: ary toy ny voronkely izay voan’ny fandrika,
  - type: text
    content: dia voafandrika toy izany ny zanak’olombelona amin’ny andro mahory rehefa mahavoa azy tampoka izany.
  - type: heading
    content: Matetika tsy misy mpahalala ny fahendrena
  '13':
  - type: text
    content: 'Izao koa no fahendrena efa hitako tetỳ ambanin’ny masoandro ary hitako ho zava-dehibe:'
  '14':
  - type: text
    content: 'Nisy vohitra kely sady vitsy olona, dia avy ny mpanjaka lehibe iray ka namely sy nanao fahirano azy ary nanao manda lehibe hamelezany azy. '
  '15':
  - type: text
    content: Nisy lehilahy iray tao, izay mahantra nefa hendry, ary izy no nahavonjy ny tanàna tamin’ny fahendreny, nefa tsy nisy olona mba nahatsiaro izany lehilahy mahantra izany.
  '16':
  - type: text
    content: 'Koa hoy aho:'
  - type: text
    content: Aleo fahendrena toy izay hery;
  - type: text
    content: kanjo hamavoina ny fahendren’ny mahantra
  - type: text
    content: ary ny teniny dia tsy mba henoina.
  '17':
  - type: text
    content: Ny tenin’ny hendry izay re ao amin’ny filaminana
  - type: text
    content: dia tsara noho ny antsoantso ataon’ny mpanapaka eo amin’ny olona adala.
  '18':
  - type: text
    content: Aleo fahendrena toy izay fitaovam-piadiana;
  - type: text
    content: ary ny mpanota iray dia mahasimba ny soa marobe.
  '2':
  - type: text
    content: Mitovy avokoa ny manjo ny olombelona rehetra;
  - type: text
    content: eny, zavatra iray ihany no manjo ny marina sy ny ratsy fanahy,
  - type: text
    content: ny manjo ny tsara fanahy
  - type: text
    content: sy ny madio ary ny maloto,
  - type: text
    content: ny mamono zavatra hatao fanatitra sy ny tsy mamono zavatra hatao fanatitra;
  - type: text
    content: mitovy ihany ny amin’ny tsara fanahy sy ny amin’ny mpanota,
  - type: text
    content: ary ny amin’ny mianiana sy ny amin’izay tsy sahy hianiana.
  '3':
  - type: text
    content: 'Izao no zava-dratsy amin’izay rehetra atao etỳ ambanin’ny masoandro: Zavatra iray ihany no manjo ny olombelona rehetra, sady feno faharatsiana ny fon’ny zanak’olombelona ka hadalana no ao am-pony amin’ny andro iainany; ary rehefa afaka izany dia ho any amin’ny maty izy.'
  '4':
  - type: text
    content: Fa ho an’izay voaisa ho naman’ny velona kosa dia mbola misy antenaina;
  - type: text
    content: fa ny amboa velona no tsara noho ny liona maty.
  '5':
  - type: text
    content: Fantatry ny velona mantsy fa ho faty izy,
  - type: text
    content: fa ny maty kosa dia tsy mba mahalala na inona na inona,
  - type: text
    content: ary tsy misy valim-pitia ho azy intsony
  - type: text
    content: satria hadino ny fahatsiarovana azy.
  '6':
  - type: text
    content: Na ny fitiavany, na ny fankahalany, na ny fialonany, dia samy efa levona ela
  - type: text
    content: sady tsy manana anjara intsony mandrakizay izy amin’izay atao etỳ ambanin’ny masoandro.
  - type: heading
    content: Ifaliana ny fiainana satria fanomezana avy amin’Andriamanitra
  '7':
  - type: text
    content: Mandehana, hano amin’ny fifaliana ny mofonao ary sotroy amin’ny fo falifaly ny divainao, fa efa nankasitrahan’Andriamanitra sahady ny asanao.
  '8':
  - type: text
    content: Aoka ho fotsy mandrakariva ny fitafianao
  - type: text
    content: ary aoka tsy ho diso menaka ny lohanao.
  '9':
  - type: text
    content: Miravoravoa amin’ny vady malalanao
  - type: text
    content: amin’ny andronao rehetra mandalo foana izay nomeny anao etỳ ambanin’ny masoandro,
  - type: text
    content: dia ny andronao rehetra mandalo foana;
  - type: text
    content: fa izany no anjaranao amin’ny andro iainanao sy amin’ny fisasarana izay isasaranao etỳ ambanin’ny masoandro.
