document_id: 2CH.1
type_code: plt
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: TANTARAN’I SOLOMONA, MPANJAKAN’NY ISRAELY
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mangataka fahendrena amin’Andriamanitra i Solomona mba hahaizany mitondra ny fanjakana
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 1Mpa 3.4-15
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'I Solomona, zanak’i Davida, dia nitombo hery tamin’ny fanjakany, ary NY TOMPO Andriamaniny nomba azy ka nanandratra azy ho ambony indrindra. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary niteny tamin’ny Israely rehetra i Solomona, dia ny mpifehy arivo, ny mpifehy zato, ny mpitsara ary ny lohan’ny foko rehetra tamin’ny Israely, dia ny lohan’ny fianakaviana, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'koa niara-niakatra ho any amin’ny toerana fanaovana sorona tao Gibeona i Solomona sy ny fiangonana manontolo; fa tao ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tranolay fihaonana
  - type: text
    text: ' izay an’Andriamanitra, ilay nataon’i Mosesy, mpanompon’NY TOMPO, tany an-tany efitra. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Fa ny vata misy ny faneken’Andriamanitra dia efa nampiakarin’i Davida avy tany Kiriata-Jearima ho ao amin’izay efa namboariny ho azy; satria efa nanorina tranolay ho azy tany Jerosalema izy. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary ny alitara varahina izay nataon’i Bezalila, zanak’i Ory, zanak’i Hora, dia teo anoloan’ny tabernakelin’NY TOMPO. Nitady Azy i Solomona sy ny fiangonana. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Nanolotra fanatitra teo anatrehan’NY TOMPO teo amin’ny alitara varahina, izay momba ny tranolay fihaonana, i Solomona; fanatitra dorana manontolo arivo no nateriny teo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Tamin’iny alina iny no nisehoan’Andriamanitra tamin’i Solomona ka hoy Izy taminy: Angataho izay tianao homeko anao. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dia hoy i Solomona tamin’Andriamanitra: Efa naneho fahasoavana lehibe tamin’i Davida raiko Ianao ary nampanjaka ahy handimby azy. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Koa ankehitriny, RY TOMPO Andriamanitra ô, aoka ho tanteraka ny teninao tamin’i Davida raiko; fa efa nampanjaka ahy tamin’ny vahoaka marobe tahaka ny vovo-tany Ianao. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Koa omeo fahendrena sy fahalalana aho hitarihako ireto vahoaka ireto ka hahazoako mitondra azy; fa iza no hahay mitsara izao olonao betsaka izao? '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Dia hoy Andriamanitra tamin’i Solomona: Satria izany no tao am-ponao ka tsy nangataka vola aman-karena ianao, na voninahitra, na ny ain’ny fahavalonao, ary tsy nangataka ny ho ela velona aza fa nangataka fahendrena sy fahalalana hitsaranao ny oloko izay nampanjakako anao, '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: dia omena anao ny fahendrena sy ny fahalalana; ary homeko vola aman-karena sy voninahitra koa ianao, mihoatra noho izay nananan’ny mpanjaka rehetra na iza na iza tany alohanao, ary tsy hisy hanana tahaka izany ny any aoriananao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Tonga tany Jerosalema, teo anoloan’ny tranolay fihaonana i Solomona, rehefa avy teo amin’ny toerana fanaovana sorona tao Gibeona; ary nanjaka tamin’ny Israely izy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny hery sy harenan’i Solomona
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 9.25-28; 1Mpa 10.26-29
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Nanangona kalesy fitondra miady sy mpitaingin-tsoavaly i Solomona ka nanana kalesy fitondra miady efajato sy arivo sy mpitaingin-tsoavaly roa arivo sy iray alina, izay nataony tany amin’ireo tanàna fitoeran’ny kalesy fitondra miady ary tao amin’ny mpanjaka tany Jerosalema. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Nataon’ny mpanjaka ho tahaka ny vato ny habetsaky ny volafotsy sy ny volamena tany Jerosalema, ary ny hazo sedera dia nataony maro toy ny aviavy any Sefela. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Avy tany Ejipta no nahazoan’i Solomona soavaly; ary ny iray toko tamin’ny mpivaro-mandehan’ny mpanjaka dia naka andiany iray araka izay vidiny. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ary noentiny niakatra avy tany Ejipta ny vidin’ny kalesy fitondra miady iray, izay sekela volafotsy eninjato, ary ny soavaly dia dimampolo amby zato avy; toy izany koa no nitondrany ho an’ny mpanjakan’ny Hetita sy ny mpanjakan’ny Arameana.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny niomanan’i Solomona hanorina ny tempoly
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Nilaza i Solomona fa hanorina trano ho an’ny anaran’NY TOMPO sy lapa ho an’ny tenany.
