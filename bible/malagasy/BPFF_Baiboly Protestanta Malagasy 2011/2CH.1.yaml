document_id: 2CH.1,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: TANTARAN’I SOLOMONA, MPANJAKAN’NY ISRAELY
  - type: heading
    content: Mangataka fahendrena amin’Andriamanitra i Solomona mba hahaizany mitondra ny fanjakana
  - type: heading
    content: 1Mpa 3.4-15
  - type: text
    content: 'I Solomona, zanak’i Davida, dia nitombo hery tamin’ny fanjakany, ary NY TOMPO Andriamaniny nomba azy ka nanandratra azy ho ambony indrindra. '
  '10':
  - type: text
    content: 'Koa omeo fahendrena sy fahalalana aho hitarihako ireto vahoaka ireto ka hahazoako mitondra azy; fa iza no hahay mitsara izao olonao betsaka izao? '
  '11':
  - type: text
    content: 'Dia hoy Andriamanitra tamin’i Solomona: Satria izany no tao am-ponao ka tsy nangataka vola aman-karena ianao, na voninahitra, na ny ain’ny fahavalonao, ary tsy nangataka ny ho ela velona aza fa nangataka fahendrena sy fahalalana hitsaranao ny oloko izay nampanjakako anao, '
  '12':
  - type: text
    content: dia omena anao ny fahendrena sy ny fahalalana; ary homeko vola aman-karena sy voninahitra koa ianao, mihoatra noho izay nananan’ny mpanjaka rehetra na iza na iza tany alohanao, ary tsy hisy hanana tahaka izany ny any aoriananao.
  '13':
  - type: text
    content: Tonga tany Jerosalema, teo anoloan’ny tranolay fihaonana i Solomona, rehefa avy teo amin’ny toerana fanaovana sorona tao Gibeona; ary nanjaka tamin’ny Israely izy.
  - type: heading
    content: Ny hery sy harenan’i Solomona
  - type: heading
    content: 9.25-28; 1Mpa 10.26-29
  '14':
  - type: text
    content: 'Nanangona kalesy fitondra miady sy mpitaingin-tsoavaly i Solomona ka nanana kalesy fitondra miady efajato sy arivo sy mpitaingin-tsoavaly roa arivo sy iray alina, izay nataony tany amin’ireo tanàna fitoeran’ny kalesy fitondra miady ary tao amin’ny mpanjaka tany Jerosalema. '
  '15':
  - type: text
    content: 'Nataon’ny mpanjaka ho tahaka ny vato ny habetsaky ny volafotsy sy ny volamena tany Jerosalema, ary ny hazo sedera dia nataony maro toy ny aviavy any Sefela. '
  '16':
  - type: text
    content: 'Avy tany Ejipta no nahazoan’i Solomona soavaly; ary ny iray toko tamin’ny mpivaro-mandehan’ny mpanjaka dia naka andiany iray araka izay vidiny. '
  '17':
  - type: text
    content: Ary noentiny niakatra avy tany Ejipta ny vidin’ny kalesy fitondra miady iray, izay sekela volafotsy eninjato, ary ny soavaly dia dimampolo amby zato avy; toy izany koa no nitondrany ho an’ny mpanjakan’ny Hetita sy ny mpanjakan’ny Arameana.
  - type: heading
    content: Ny niomanan’i Solomona hanorina ny tempoly
  '18':
  - type: text
    content: Nilaza i Solomona fa hanorina trano ho an’ny anaran’NY TOMPO sy lapa ho an’ny tenany.
  '2':
  - type: text
    content: 'Ary niteny tamin’ny Israely rehetra i Solomona, dia ny mpifehy arivo, ny mpifehy zato, ny mpitsara ary ny lohan’ny foko rehetra tamin’ny Israely, dia ny lohan’ny fianakaviana, '
  '3':
  - type: text
    content: 'koa niara-niakatra ho any amin’ny toerana fanaovana sorona tao Gibeona i Solomona sy ny fiangonana manontolo; fa tao ny '
  - type: text
    content: tranolay fihaonana
  - type: text
    content: ' izay an’Andriamanitra, ilay nataon’i Mosesy, mpanompon’NY TOMPO, tany an-tany efitra. '
  '4':
  - type: text
    content: 'Fa ny vata misy ny faneken’Andriamanitra dia efa nampiakarin’i Davida avy tany Kiriata-Jearima ho ao amin’izay efa namboariny ho azy; satria efa nanorina tranolay ho azy tany Jerosalema izy. '
  '5':
  - type: text
    content: 'Ary ny alitara varahina izay nataon’i Bezalila, zanak’i Ory, zanak’i Hora, dia teo anoloan’ny tabernakelin’NY TOMPO. Nitady Azy i Solomona sy ny fiangonana. '
  '6':
  - type: text
    content: Nanolotra fanatitra teo anatrehan’NY TOMPO teo amin’ny alitara varahina, izay momba ny tranolay fihaonana, i Solomona; fanatitra dorana manontolo arivo no nateriny teo.
  '7':
  - type: text
    content: 'Tamin’iny alina iny no nisehoan’Andriamanitra tamin’i Solomona ka hoy Izy taminy: Angataho izay tianao homeko anao. '
  '8':
  - type: text
    content: 'Dia hoy i Solomona tamin’Andriamanitra: Efa naneho fahasoavana lehibe tamin’i Davida raiko Ianao ary nampanjaka ahy handimby azy. '
  '9':
  - type: text
    content: 'Koa ankehitriny, RY TOMPO Andriamanitra ô, aoka ho tanteraka ny teninao tamin’i Davida raiko; fa efa nampanjaka ahy tamin’ny vahoaka marobe tahaka ny vovo-tany Ianao. '
