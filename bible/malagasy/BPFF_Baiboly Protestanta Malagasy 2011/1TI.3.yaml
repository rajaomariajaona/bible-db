document_id: 1TI.3,3103
type_code: plt
verses:
  '1':
  - type: text
    content: 'Mahatoky izao teny izao:'
  - type: heading
    content: Ny tomponandraikitra ao am-piangonana
  - type: text
    content: Raha misy olona maniry ny asan’ny mpitondra fiangonana
  - type: note
    content: 'Na: eveka.'
  - type: text
    content: ' dia maniry asa tsara izy. '
  '10':
  - type: text
    content: Aoka hozahan-toetra aloha ireo, izay vao hanao ny asan’ny diakona izy raha tsy manan-tsiny.
  '11':
  - type: text
    content: 'Ny vehivavy koa dia ho toy izany ihany, ho maotina, tsy mpanendrikendrika, mahonon-tena, mahatoky amin’ny zavatra rehetra. '
  '12':
  - type: text
    content: 'Aoka hanambady iray ihany ny diakona ary aoka hitondra tsara ny zanany sy ny ankohonany koa izy. '
  '13':
  - type: text
    content: 'Fa izay efa mahavatra tsara ny asan’ny diakona dia mahazo toerana tsara ho an’ny tenany sy fahatokiana be amin’ny finoana izay ao amin’i '
  - type: text
    content: Kristy
  - type: text
    content: ' Jesosy.'
  - type: heading
    content: Ny zavamiafina ny amin’ny fahatahorana an’Andriamanitra
  '14':
  - type: text
    content: 'Izany zavatra izany dia soratako aminao, na dia manantena hankaty aminao haingana aza aho; '
  '15':
  - type: text
    content: 'fa raha tratra ela aho dia fantaro izay fitondrantena mety hatao ao amin’ny tranon’Andriamanitra, dia ny fiangonan’Andriamanitra velona izay andry sy fiorenan’ny fahamarinana. '
  '16':
  - type: text
    content: Ary iaraha-manaiky mihitsy fa lehibe ny zavamiafina ny amin’ny toe-panahy araka an’Andriamanitra,
  - type: text
    content: dia ilay naseho teo amin’ny nofo,
  - type: text
    content: nohamarinina tao amin’ny Fanahy,
  - type: text
    content: hitan’ny anjely,
  - type: text
    content: 'notorina tany amin’ny '
  - type: text
    content: Jentilisa
  - type: text
    content: ','
  - type: text
    content: ninoana teny amin’izao tontolo izao,
  - type: text
    content: nakarina ho any amin’ny voninahitra.
  '2':
  - type: text
    content: Koa ny mpitondra fiangonana
  - type: note
    content: 'Na: eveka.'
  - type: text
    content: ' dia tsy maintsy ho tsy manan-tsiny, manambady tokana, mahonon-tena, hendry, tia filaminana, mampiantrano vahiny, mahay mampianatra, '
  '3':
  - type: text
    content: 'tsy mpimamo lian’ady, tsy mpikapoka fa mandefitra, tsy mpila ady, tsy fatra-pitia vola, '
  '4':
  - type: text
    content: 'mitondra tsara ny ankohonany, mampanaiky ny zanany amin’ny fahamaotinana tsara. '
  '5':
  - type: text
    content: Fa raha misy olona tsy mahay mitondra ny ankohonany, hataony ahoana moa no fikarakarany ny fiangonan’
  - type: note
    content: 'Na: eklesia.'
  - type: text
    content: 'Andriamanitra? '
  '6':
  - type: text
    content: 'Tsy izay vao avy nanolo-tena ho an’Andriamanitra, fandrao hieboebo foana izy ka ho latsaka amin’ny fanamelohan’ny devoly. '
  '7':
  - type: text
    content: Ary tsy maintsy ho tsara laza koa amin’izay eny ivelany izy, fandrao ho lavo amin’ny fananan-tsiny sy ny fandriky ny devoly.
  - type: heading
    content: Ny fanompoana
  '8':
  - type: text
    content: 'Ny diakona koa dia toy izany ihany, ho maotina, tsy miroa teny, tsy tia divay be, tsy tia harena maloto, '
  '9':
  - type: text
    content: 'mitandrina tsara ny zavamiafina ny amin’ny finoana amin’ny fieritreretana madio. '
