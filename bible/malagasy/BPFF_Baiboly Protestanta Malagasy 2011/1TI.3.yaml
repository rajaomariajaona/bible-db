document_id: 1TI.3
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Mahatoky izao teny izao:'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny tomponandraikitra ao am-piangonana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: text
    text: Raha misy olona maniry ny asan’ny mpitondra fiangonana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: eveka.
    marker-yv: yv-n
  - type: text
    text: ' dia maniry asa tsara izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Koa ny mpitondra fiangonana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.2 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: eveka.
    marker-yv: yv-n
  - type: text
    text: ' dia tsy maintsy ho tsy manan-tsiny, manambady tokana, mahonon-tena, hendry, tia filaminana, mampiantrano vahiny, mahay mampianatra, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'tsy mpimamo lian’ady, tsy mpikapoka fa mandefitra, tsy mpila ady, tsy fatra-pitia vola, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'mitondra tsara ny ankohonany, mampanaiky ny zanany amin’ny fahamaotinana tsara. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Fa raha misy olona tsy mahay mitondra ny ankohonany, hataony ahoana moa no fikarakarany ny fiangonan’
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.5 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: eklesia.
    marker-yv: yv-n
  - type: text
    text: 'Andriamanitra? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Tsy izay vao avy nanolo-tena ho an’Andriamanitra, fandrao hieboebo foana izy ka ho latsaka amin’ny fanamelohan’ny devoly. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ary tsy maintsy ho tsara laza koa amin’izay eny ivelany izy, fandrao ho lavo amin’ny fananan-tsiny sy ny fandriky ny devoly.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fanompoana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ny diakona koa dia toy izany ihany, ho maotina, tsy miroa teny, tsy tia divay be, tsy tia harena maloto, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'mitandrina tsara ny zavamiafina ny amin’ny finoana amin’ny fieritreretana madio. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Aoka hozahan-toetra aloha ireo, izay vao hanao ny asan’ny diakona izy raha tsy manan-tsiny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ny vehivavy koa dia ho toy izany ihany, ho maotina, tsy mpanendrikendrika, mahonon-tena, mahatoky amin’ny zavatra rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Aoka hanambady iray ihany ny diakona ary aoka hitondra tsara ny zanany sy ny ankohonany koa izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Fa izay efa mahavatra tsara ny asan’ny diakona dia mahazo toerana tsara ho an’ny tenany sy fahatokiana be amin’ny finoana izay ao amin’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' Jesosy.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny zavamiafina ny amin’ny fahatahorana an’Andriamanitra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Izany zavatra izany dia soratako aminao, na dia manantena hankaty aminao haingana aza aho; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'fa raha tratra ela aho dia fantaro izay fitondrantena mety hatao ao amin’ny tranon’Andriamanitra, dia ny fiangonan’Andriamanitra velona izay andry sy fiorenan’ny fahamarinana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ary iaraha-manaiky mihitsy fa lehibe ny zavamiafina ny amin’ny toe-panahy araka an’Andriamanitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ilay naseho teo amin’ny nofo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nohamarinina tao amin’ny Fanahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hitan’ny anjely,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'notorina tany amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jentilisa
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: ninoana teny amin’izao tontolo izao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nakarina ho any amin’ny voninahitra.
