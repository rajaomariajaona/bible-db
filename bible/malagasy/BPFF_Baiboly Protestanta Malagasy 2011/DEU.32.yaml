document_id: DEU.32,3103
type_code: plt
verses:
  '1':
  - type: text
    content: Mihainoa, ry lanitra, fa hiteny aho!
  - type: text
    content: Henoy, ry tany, ny tenin’ny vavako!
  '10':
  - type: text
    content: Nahita azy tany an-tany efitra Izy,
  - type: text
    content: dia tany amin’ny tany foana feno feo mierona;
  - type: text
    content: nanodidina azy sy niahy azy Izy,
  - type: text
    content: ary koa notandremany tahaka ny anakandriamasony,
  '11':
  - type: text
    content: toy ny voromahery manaitra ny ao amin’ny akaniny
  - type: text
    content: ka manomba eo ambonin’ny zanany;
  - type: text
    content: dia toy izany no namelarany ny elany sy nandraisany azy
  - type: text
    content: ary nitondrany azy teo ambonin’ny elany,
  '12':
  - type: text
    content: NY TOMPO irery no nitondra azy,
  - type: text
    content: ary tsy nisy andriamanitra hafa teo aminy.
  '13':
  - type: text
    content: Nampandeha azy teny ambonin’ny havoana amin’ny tany Izy
  - type: text
    content: ka nohaniny ny vokatry ny saha;
  - type: text
    content: Izy dia nampitsentsitra azy tantely avy teo amin’ny vatolampy
  - type: text
    content: sy diloilo avy teo amin’ny vatolampy vatoafo
  '14':
  - type: text
    content: ary koa rononomandrin’omby sy rononon’ondry aman’osy,
  - type: text
    content: mbamin’ny tavin’ny zanak’ondry,
  - type: text
    content: ondrilahin’i Basana sy osilahy
  - type: text
    content: ary vary izay vokatra indrindra;
  - type: text
    content: nisotro divay mahery avy tamin’ny ranom-boaloboka mena ianao.
  '15':
  - type: text
    content: Nihanatavy i Jesorona
  - type: note
    content: 'Jesorona dia anaran’Israely izay midika koa hoe: Ilay mahitsy.'
  - type: text
    content: ' ka namely daka;'
  - type: text
    content: efa matavy ianao sady vory nofo no vaventy be!
  - type: text
    content: Dia nahafoy an’Andriamanitra izay namorona azy izy
  - type: text
    content: ary nanamavo ny Vatolampy famonjena azy,
  '16':
  - type: text
    content: nampahasaro-piaro Azy tamin’ny hafa izy
  - type: text
    content: ary tamin’ny zava-betaveta no nampahasosorany Azy;
  '17':
  - type: text
    content: namono zavatra ho fanatitra ho an’ny demonia izay tsy Andriamanitra izy
  - type: text
    content: dia andriamanitra tsy fantany,
  - type: text
    content: fa andriamanitra vao niseho tatỳ aoriana
  - type: text
    content: izay tsy natahoran’ny razanareo.
  '18':
  - type: text
    content: Ny Vatolampy izay niteraka anao dia tsy tsaroanao
  - type: text
    content: ary hadinonao Andriamanitra izay nahary anao.
  '19':
  - type: text
    content: Nahita izany NY TOMPO ka nandà,
  - type: text
    content: noho ny hasosorany tamin’ny zanany lahy sy ny zanany vavy.
  '2':
  - type: text
    content: Hirotsaka tahaka ny ranonorana ny fampianarako,
  - type: text
    content: ary hilatsaka tahaka ny ando ny teniko,
  - type: text
    content: ho tahaka ny erika amin’ny ahi-maitso
  - type: text
    content: sy ho tahaka ny ranonorana amin’ny anana.
  '20':
  - type: text
    content: 'Dia hoy Izy: Hafeniko azy ny tavako;'
  - type: text
    content: ho hitako izay hiafarany;
  - type: text
    content: fa firenena tena mpivadibadika izy,
  - type: text
    content: dia zaza tsy mahatoky.
  '21':
  - type: text
    content: Ireo dia nampahasaro-piaro Ahy tamin’izay tsy Andriamanitra
  - type: text
    content: sy nampahasosotra Ahy tamin’ny zava-poanany;
  - type: text
    content: ary Izaho kosa dia hampahasaro-piaro azy amin’izay tsy olona
  - type: text
    content: sy hampahasosotra azy amin’izay firenena adala.
  '22':
  - type: text
    content: Fa mirehitra ny afon’ny fahatezerako
  - type: text
    content: 'ka mandoro hatrany amin’ny '
  - type: text
    content: fitoeran’ny maty
  - type: text
    content: ' any ambany indrindra,'
  - type: text
    content: sady mandevona ny tany mbamin’ny vokatra ao aminy,
  - type: text
    content: ary mampirehitra ny fanambanin’ny tendrombohitra aza.
  '23':
  - type: text
    content: Havangongoko aminy ny loza marobe
  - type: text
    content: 'ary holanìko aminy ny zana-tsipìkako:'
  '24':
  - type: text
    content: Hofezahin’ny mosary izy sady holanin’ny areti-mandripaka
  - type: text
    content: sy ny fandringanana mangidy
  - type: text
    content: ary hampandehaniko aminy ny nifim-biby
  - type: text
    content: mbamin’ny poizin’ny biby mpikisaka amin’ny vovoka.
  '25':
  - type: text
    content: Eny ivelany dia ny sabatra no hahafaty ny zanany
  - type: text
    content: ary ao amin’ny efitrano dia ny horohoro,
  - type: text
    content: na ny zatovolahy na ny zatovovavy,
  - type: text
    content: na ny zaza minono na ny fotsy volo.
  '26':
  - type: text
    content: 'Fa efa nolazaiko hoe: Hopotehiko izy ka hihahaka;'
  - type: text
    content: hatsahatro tsy ho eo amin’ny zanak’olombelona ny fahatsiarovana azy,
  '27':
  - type: text
    content: raha tsy ny fireharehan’ny fahavalo no natahorako,
  - type: text
    content: andrao diso hevitra ireny mpandrafy azy ireny
  - type: text
    content: 'ka hiteny hoe: Ny tananay no avo;'
  - type: text
    content: fa tsy NY TOMPO tsy akory no nanao izany rehetra izany.
  '28':
  - type: text
    content: Fa firenena tsy manan-tsaina izy
  - type: text
    content: sady tsy manam-pahalalana.
  '29':
  - type: text
    content: Raha mba hendry izy dia hahafantatra izao
  - type: text
    content: ka hahafantatra izay ho farany.
  '3':
  - type: text
    content: Fa ny anaran’NY TOMPO no hotorìko;
  - type: text
    content: maneke ny fahalehibiazan’Andriamanitsika.
  '30':
  - type: text
    content: Hataon’ny olona irery ahoana no fanenjika ny arivo,
  - type: text
    content: ary hataon’ny roa lahy ahoana no fampandositra ny iray alina,
  - type: text
    content: raha tsy ny Vatolampiny no efa nivarotra azy,
  - type: text
    content: ary NY TOMPO no efa nanolotra azy?
  '31':
  - type: text
    content: Fa tsy mba mitovy amin’ny Vatolampintsika ny vatolampin’ireny
  - type: text
    content: ka fahavalontsika no ho mpitsara.
  '32':
  - type: text
    content: Ny tahom-boalobony dia tahom-boalobok’i Sodoma
  - type: text
    content: ary avy ao amin’ny sahan’i Gomora;
  - type: text
    content: ny voalobony dia voaloboka mahafaty
  - type: text
    content: sady mangidy koa ny sampahony.
  '33':
  - type: text
    content: Ny divainy dia zava-mahafaty avy amin’ny dragona
  - type: text
    content: ary poizina mahery avy amin’ny menarana.
  '34':
  - type: text
    content: Moa tsy voatahiry ato Amiko va izany
  - type: text
    content: ka voaisy tombo-kase ato an-trano firaketako?
  '35':
  - type: text
    content: Ahy ny famaliana sy ny fampanodiavana,
  - type: text
    content: raha avy izay hahasolafaka ny tongony;
  - type: text
    content: fa antomotra ny andro hahitany loza
  - type: text
    content: ary ho avy haingana ny zava-boatendry hanjo azy.
  '36':
  - type: text
    content: Fa NY TOMPO hanome rariny ny olony
  - type: text
    content: ary hanenina ny amin’ny mpanompony,
  - type: text
    content: raha hitany fa lany ny heriny
  - type: text
    content: ka tapitra avokoa na ny babo, na ny afaka.
  '37':
  - type: text
    content: 'Ary hiteny Izy hoe: Aiza ireo andriamaniny,'
  - type: text
    content: dia ny vatolampy izay nialofany,
  '38':
  - type: text
    content: izay nihinana ny jaboran’ny fanatiny
  - type: text
    content: ary nisotro ny divain’ny fanatitra aidiny?
  - type: text
    content: Aoka ireny no hitsangana ka hamonjy anareo
  - type: text
    content: ary ho fierena ho anareo.
  '39':
  - type: text
    content: Fantaro ankehitriny fa Izaho dia Izaho no Izy
  - type: text
    content: ka tsy misy andriamanitra eto akaikiko.
  - type: text
    content: Izaho no mahafaty sy mahavelona,
  - type: text
    content: ary Izaho no maharatra sy mahasitrana,
  - type: text
    content: ka tsy misy mahafaka amin’ny tanako.
  '4':
  - type: text
    content: Izy no Vatolampy, tanteraka ny asany;
  - type: text
    content: fa ny lalany rehetra dia amin’ny rariny avokoa.
  - type: text
    content: Andriamanitra mahatoky Izy ka tsy misy ratsy ao Aminy;
  - type: text
    content: marina sy mahitsy Izy.
  '40':
  - type: text
    content: Fa manangana ny tanako amin’ny lanitra Aho
  - type: text
    content: 'ka miteny hoe: Raha velona mandrakizay koa Aho,'
  '41':
  - type: text
    content: raha manasa ny sabatro manelatselatra Aho,
  - type: text
    content: ka voarain’ny tanako ny fitsarana,
  - type: text
    content: dia hampanodiaviko ny mpandrafy Ahy ny ataony
  - type: text
    content: ary hovaliako ny mankahala Ahy.
  '42':
  - type: text
    content: Hataoko mamon-dra ny zana-tsipìkako,
  - type: text
    content: ary ny sabatro dia hihina-nofo,
  - type: text
    content: dia ny ran’ny voavono sy ny babo
  - type: text
    content: mbamin’ny loha mirakorako volon’ny fahavalo.
  '43':
  - type: text
    content: Ry Jentilisa, hobio ny olony!
  - type: text
    content: Fa ny ran’ny mpanompony no hovaliny.
  - type: text
    content: Hamaly ny mpandrafy Azy Izy,
  - type: text
    content: ary hanao fanavotana kosa ho an’ny taniny sy ny olony.
  '44':
  - type: text
    content: Dia nandeha i Mosesy, dia izy sy i Hosea, zanak’i Nona, ka nilaza ny teny rehetra amin’izany hira izany teo anatrehan’ny olona.
  '45':
  - type: text
    content: 'Ary nony efa tapitra voalazan’i Mosesy tamin’ny Israely rehetra izany teny rehetra izany '
  '46':
  - type: text
    content: 'dia hoy izy taminy: Alatsaho ao am-ponareo ny teny rehetra izay ambarako aminareo anio, izay handidianareo ny zanakareo mba hotandremany sy hankatoaviny, dia ny teny rehetra amin’ity lalàna ity. '
  '47':
  - type: text
    content: Fa tsy zava-poana ho anareo izany, fa ity no fiainanareo; ary izao teny izao no hahamaro andro anareo eo amin’ny tany izay efa hidiranareo holovana, rehefa tafita an’i Jordana ianareo.
  - type: heading
    content: Fanambarana ny hahafatesan’i Mosesy
  '48':
  - type: text
    content: 'Ary NY TOMPO niteny tamin’i Mosesy tamin’izay fotoana izay indrindra hoe: '
  '49':
  - type: text
    content: 'Miakara amin’ity tendrombohitra Abarima ity, dia ny tendrombohitra Nebo, izay eo amin’ny tany Moaba tandrifin’i Jeriko; ary tazano ny tany Kanana, izay omeko ny Zanak’Israely ho lovany. '
  '5':
  - type: text
    content: Efa lo eo imasony ireny,
  - type: text
    content: tsy zanany intsony noho ny kilemany;
  - type: text
    content: fa taranaka miolakolaka sady efa nivadika.
  '50':
  - type: text
    content: 'Dia ho faty ao amin’ny tendrombohitra izay iakaranao ianao ka ho voaangona any amin’ny razanao, tahaka ny nahafatesan’i Arona rahalahinao tao an-tendrombohitra Hora sy ny nanangonana azy tany amin’ny razany, '
  '51':
  - type: text
    content: 'satria nivadika Tamiko teo amin’ny Zanak’Israely ianareo tao amin’ny ranon’i Meriba any Kadesy, tany an-tany efitra Zina, ka tsy nanamasina Ahy teo amin’ny Zanak’Israely. '
  '52':
  - type: text
    content: Fa hahatazana ny tany eo anoloanao ihany ianao, kanefa tsy hiditra any amin’ny tany izay omeko ny Zanak’Israely.
  '6':
  - type: text
    content: Moa izany va no havalinareo NY TOMPO,
  - type: text
    content: ry firenena adala, tsy misy fahendrena?
  - type: text
    content: Tsy Izy va no Rainao izay namorona anao?
  - type: text
    content: Tsy Izy va no nanao anao sy nampiorina anao?
  '7':
  - type: text
    content: Tsarovy ny andro fahiny;
  - type: text
    content: saino ny taona, hatrizay hatrizay.
  - type: text
    content: Anontanio amin’ny rainao fa hanambara aminao izy;
  - type: text
    content: ary amin’ny zokiolona eo aminao koa, fa hilaza aminao izy.
  '8':
  - type: text
    content: Fony nomen’ny Avo Indrindra zaratany ireo firenena
  - type: text
    content: ka samy natokantokany ny zanak’olombelona
  - type: text
    content: dia notendreny ny sisintanin’ireo firenena
  - type: text
    content: araka ny isan’ny Zanak’Israely;
  '9':
  - type: text
    content: fa anjaran’NY TOMPO ny olony,
  - type: text
    content: i Jakoba no natokany ho lovany.
