document_id: DEU.32
type_code: plt
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Mihainoa, ry lanitra, fa hiteny aho!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Henoy, ry tany, ny tenin’ny vavako!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Hirotsaka tahaka ny ranonorana ny fampianarako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hilatsaka tahaka ny ando ny teniko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho tahaka ny erika amin’ny ahi-maitso
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ho tahaka ny ranonorana amin’ny anana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Fa ny anaran’NY TOMPO no hotorìko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: maneke ny fahalehibiazan’Andriamanitsika.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Izy no Vatolampy, tanteraka ny asany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny lalany rehetra dia amin’ny rariny avokoa.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Andriamanitra mahatoky Izy ka tsy misy ratsy ao Aminy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: marina sy mahitsy Izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Efa lo eo imasony ireny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy zanany intsony noho ny kilemany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa taranaka miolakolaka sady efa nivadika.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Moa izany va no havalinareo NY TOMPO,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ry firenena adala, tsy misy fahendrena?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy Izy va no Rainao izay namorona anao?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy Izy va no nanao anao sy nampiorina anao?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Tsarovy ny andro fahiny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: saino ny taona, hatrizay hatrizay.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Anontanio amin’ny rainao fa hanambara aminao izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary amin’ny zokiolona eo aminao koa, fa hilaza aminao izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Fony nomen’ny Avo Indrindra zaratany ireo firenena
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka samy natokantokany ny zanak’olombelona
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia notendreny ny sisintanin’ireo firenena
- type: usfm
  marker: q1
  children:
  - type: text
    text: araka ny isan’ny Zanak’Israely;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: fa anjaran’NY TOMPO ny olony,
- type: usfm
  marker: q1
  children:
  - type: text
    text: i Jakoba no natokany ho lovany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Nahita azy tany an-tany efitra Izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia tany amin’ny tany foana feno feo mierona;
- type: usfm
  marker: q1
  children:
  - type: text
    text: nanodidina azy sy niahy azy Izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary koa notandremany tahaka ny anakandriamasony,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: toy ny voromahery manaitra ny ao amin’ny akaniny
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka manomba eo ambonin’ny zanany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia toy izany no namelarany ny elany sy nandraisany azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary nitondrany azy teo ambonin’ny elany,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: NY TOMPO irery no nitondra azy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy nisy andriamanitra hafa teo aminy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Nampandeha azy teny ambonin’ny havoana amin’ny tany Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka nohaniny ny vokatry ny saha;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izy dia nampitsentsitra azy tantely avy teo amin’ny vatolampy
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy diloilo avy teo amin’ny vatolampy vatoafo
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ary koa rononomandrin’omby sy rononon’ondry aman’osy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mbamin’ny tavin’ny zanak’ondry,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ondrilahin’i Basana sy osilahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary vary izay vokatra indrindra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: nisotro divay mahery avy tamin’ny ranom-boaloboka mena ianao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Nihanatavy i Jesorona
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32.15 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Jesorona dia anaran’Israely izay midika koa hoe: Ilay mahitsy.'
    marker-yv: yv-n
  - type: text
    text: ' ka namely daka;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: efa matavy ianao sady vory nofo no vaventy be!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia nahafoy an’Andriamanitra izay namorona azy izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary nanamavo ny Vatolampy famonjena azy,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: nampahasaro-piaro Azy tamin’ny hafa izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tamin’ny zava-betaveta no nampahasosorany Azy;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: namono zavatra ho fanatitra ho an’ny demonia izay tsy Andriamanitra izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia andriamanitra tsy fantany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa andriamanitra vao niseho tatỳ aoriana
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay tsy natahoran’ny razanareo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ny Vatolampy izay niteraka anao dia tsy tsaroanao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hadinonao Andriamanitra izay nahary anao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Nahita izany NY TOMPO ka nandà,
- type: usfm
  marker: q1
  children:
  - type: text
    text: noho ny hasosorany tamin’ny zanany lahy sy ny zanany vavy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Dia hoy Izy: Hafeniko azy ny tavako;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho hitako izay hiafarany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa firenena tena mpivadibadika izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia zaza tsy mahatoky.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ireo dia nampahasaro-piaro Ahy tamin’izay tsy Andriamanitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy nampahasosotra Ahy tamin’ny zava-poanany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary Izaho kosa dia hampahasaro-piaro azy amin’izay tsy olona
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy hampahasosotra azy amin’izay firenena adala.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Fa mirehitra ny afon’ny fahatezerako
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ka mandoro hatrany amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: fitoeran’ny maty
  - type: text
    text: ' any ambany indrindra,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady mandevona ny tany mbamin’ny vokatra ao aminy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mampirehitra ny fanambanin’ny tendrombohitra aza.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Havangongoko aminy ny loza marobe
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ary holanìko aminy ny zana-tsipìkako:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Hofezahin’ny mosary izy sady holanin’ny areti-mandripaka
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny fandringanana mangidy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hampandehaniko aminy ny nifim-biby
- type: usfm
  marker: q1
  children:
  - type: text
    text: mbamin’ny poizin’ny biby mpikisaka amin’ny vovoka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Eny ivelany dia ny sabatra no hahafaty ny zanany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ao amin’ny efitrano dia ny horohoro,
- type: usfm
  marker: q1
  children:
  - type: text
    text: na ny zatovolahy na ny zatovovavy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: na ny zaza minono na ny fotsy volo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Fa efa nolazaiko hoe: Hopotehiko izy ka hihahaka;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: hatsahatro tsy ho eo amin’ny zanak’olombelona ny fahatsiarovana azy,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: raha tsy ny fireharehan’ny fahavalo no natahorako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: andrao diso hevitra ireny mpandrafy azy ireny
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ka hiteny hoe: Ny tananay no avo;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa tsy NY TOMPO tsy akory no nanao izany rehetra izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Fa firenena tsy manan-tsaina izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady tsy manam-pahalalana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Raha mba hendry izy dia hahafantatra izao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hahafantatra izay ho farany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Hataon’ny olona irery ahoana no fanenjika ny arivo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hataon’ny roa lahy ahoana no fampandositra ny iray alina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: raha tsy ny Vatolampiny no efa nivarotra azy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary NY TOMPO no efa nanolotra azy?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Fa tsy mba mitovy amin’ny Vatolampintsika ny vatolampin’ireny
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka fahavalontsika no ho mpitsara.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Ny tahom-boalobony dia tahom-boalobok’i Sodoma
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary avy ao amin’ny sahan’i Gomora;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny voalobony dia voaloboka mahafaty
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady mangidy koa ny sampahony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Ny divainy dia zava-mahafaty avy amin’ny dragona
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary poizina mahery avy amin’ny menarana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Moa tsy voatahiry ato Amiko va izany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka voaisy tombo-kase ato an-trano firaketako?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Ahy ny famaliana sy ny fampanodiavana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: raha avy izay hahasolafaka ny tongony;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa antomotra ny andro hahitany loza
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ho avy haingana ny zava-boatendry hanjo azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Fa NY TOMPO hanome rariny ny olony
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hanenina ny amin’ny mpanompony,
- type: usfm
  marker: q1
  children:
  - type: text
    text: raha hitany fa lany ny heriny
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tapitra avokoa na ny babo, na ny afaka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Ary hiteny Izy hoe: Aiza ireo andriamaniny,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ny vatolampy izay nialofany,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: izay nihinana ny jaboran’ny fanatiny
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary nisotro ny divain’ny fanatitra aidiny?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aoka ireny no hitsangana ka hamonjy anareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ho fierena ho anareo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Fantaro ankehitriny fa Izaho dia Izaho no Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy misy andriamanitra eto akaikiko.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izaho no mahafaty sy mahavelona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary Izaho no maharatra sy mahasitrana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy misy mahafaka amin’ny tanako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Fa manangana ny tanako amin’ny lanitra Aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ka miteny hoe: Raha velona mandrakizay koa Aho,'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: raha manasa ny sabatro manelatselatra Aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka voarain’ny tanako ny fitsarana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hampanodiaviko ny mpandrafy Ahy ny ataony
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hovaliako ny mankahala Ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: Hataoko mamon-dra ny zana-tsipìkako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny sabatro dia hihina-nofo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ny ran’ny voavono sy ny babo
- type: usfm
  marker: q1
  children:
  - type: text
    text: mbamin’ny loha mirakorako volon’ny fahavalo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: Ry Jentilisa, hobio ny olony!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ny ran’ny mpanompony no hovaliny.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hamaly ny mpandrafy Azy Izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hanao fanavotana kosa ho an’ny taniny sy ny olony.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: Dia nandeha i Mosesy, dia izy sy i Hosea, zanak’i Nona, ka nilaza ny teny rehetra amin’izany hira izany teo anatrehan’ny olona.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Ary nony efa tapitra voalazan’i Mosesy tamin’ny Israely rehetra izany teny rehetra izany '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'dia hoy izy taminy: Alatsaho ao am-ponareo ny teny rehetra izay ambarako aminareo anio, izay handidianareo ny zanakareo mba hotandremany sy hankatoaviny, dia ny teny rehetra amin’ity lalàna ity. '
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: Fa tsy zava-poana ho anareo izany, fa ity no fiainanareo; ary izao teny izao no hahamaro andro anareo eo amin’ny tany izay efa hidiranareo holovana, rehefa tafita an’i Jordana ianareo.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fanambarana ny hahafatesan’i Mosesy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Ary NY TOMPO niteny tamin’i Mosesy tamin’izay fotoana izay indrindra hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'Miakara amin’ity tendrombohitra Abarima ity, dia ny tendrombohitra Nebo, izay eo amin’ny tany Moaba tandrifin’i Jeriko; ary tazano ny tany Kanana, izay omeko ny Zanak’Israely ho lovany. '
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Dia ho faty ao amin’ny tendrombohitra izay iakaranao ianao ka ho voaangona any amin’ny razanao, tahaka ny nahafatesan’i Arona rahalahinao tao an-tendrombohitra Hora sy ny nanangonana azy tany amin’ny razany, '
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'satria nivadika Tamiko teo amin’ny Zanak’Israely ianareo tao amin’ny ranon’i Meriba any Kadesy, tany an-tany efitra Zina, ka tsy nanamasina Ahy teo amin’ny Zanak’Israely. '
  - type: usfm
    marker: v
    metadata:
      v: '52'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: Fa hahatazana ny tany eo anoloanao ihany ianao, kanefa tsy hiditra any amin’ny tany izay omeko ny Zanak’Israely.
