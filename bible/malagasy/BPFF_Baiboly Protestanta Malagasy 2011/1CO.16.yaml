document_id: 1CO.16
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny amin’ny famoriam-bola atao ho an’ny fiangonana any Jerosalema
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ny amin’ny famoriam-bola ho an’ny olona masina dia mba manaova koa ianareo, toy izay nasaiko nataon’ny fiangonana any Galatia. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Amin’ny andro voalohany amin’ny herinandro dia samia manokana tahiry any an-tranony avy araka izay azony atao fanomezana mba tsy ho amin’ny fahatongavako vao hatao ny fanangonana izany. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Rehefa tonga aho dia izay olona ankasitrahanareo no hirahiko, mitondra taratasy, hanatitra ny fanomezanareo ho any Jerosalema. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ary raha tokony handeha ho any koa aho dia hiaraka amiko ireo.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny dia kasain’ny Apostoly haleha
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Hankaty aminareo aho rehefa avy mamakivaky an’i Makedonia, fa hamakivaky an’i Makedonia mantsy aho; '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'angamba hitoetra eo aminareo aho, na handany ny ririnina aza, mba hamatsianareo ahy any amin’izay halehako. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Fa tsy mikasa hamangy anareo toy ny mandalo fotsiny aho ankehitriny; fa manantena hijanona elaela any aminareo aho raha sitrapon’ny Tompo. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Nefa hijanona any Efesosy aho mandra-piavin’ny Pentekosta; '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: fa varavarana lehibe no voavoha ho ahy hahazoako miasa tsara, nefa maro ny mpanohitra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Rehefa tonga i Timoty dia tandremo mba tsy hanan-tahotra izy eo anivonareo; fa ny asan’ny Tompo no ataony, tahaka ny ataoko koa. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Koa aza avela hisy olona hanao tsinontsinona azy; fa vatsio tsara izy mba ho tonga atỳ amiko; fa miandry azy mbamin’ny rahalahy sasany aho.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ary ny amin’ny rahalahy Apolosy dia niangavy azy fatratra aho hiaraka amin’ny rahalahy hankaty aminareo, nefa tsy sitrapony mihitsy ny handeha izao; fa ho avy ihany izy rehefa misy andro mahalalaka azy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Hafatra farany sy fanaovam-beloma
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Miambena ianareo, tomoera tsara amin’ny finoana, aoka hitomban-dahy, mahereza. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Izay rehetra ataonareo dia ataovy amin’ny fitiavana!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Fantatrareo ny ankohonan’i Stefanasy fa voaloham-bokatr’i Akaia izy sady efa nanolo-tena ho amin’ny fanompoana ny olona masina; dia mangataka aminareo aho, ry rahalahy, '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'mba hanaiky tsara ny olona tahaka ireny sy izay rehetra miara-miasa sy mikely aina koa ianareo. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Faly aho noho ny fahatongavan’i Stefanasy sy i Fortonato ary i Akaìko; fa ireo no nahefa ny tsy vitanareo; '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: fa namelombelona ny fanahiko sy ny anareo koa izy; koa mahaiza mankasitraka ny olona tahaka ireny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Manao veloma anareo ny fiangonana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.19 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: eklesia.
    marker-yv: yv-n
  - type: text
    text: ' atỳ Azia. Manao veloma anareo indrindra ao amin’ny Tompo i Akoila sy i Prisila mbamin’ny fiangonana izay ao an-tranony. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Manao veloma anareo ny rahalahy rehetra. Mifanaova veloma amin’ny fanorohana masina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ny tanako, izaho Paoly, no anaovako veloma. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Raha misy tsy tia ny Tompo dia aoka ho voaozona izy! Marana ta
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Marana ta: teny arameana midika hoe Avia ry Tomponay!'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ho aminareo anie ny fahasoavan’i Jesosy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' Tompo. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Ny fitiavako dia ao aminareo rehetra ao amin’i Kristy Jesosy.
