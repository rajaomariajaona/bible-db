document_id: 1CO.16,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny amin’ny famoriam-bola atao ho an’ny fiangonana any Jerosalema
  - type: text
    content: 'Ny amin’ny famoriam-bola ho an’ny olona masina dia mba manaova koa ianareo, toy izay nasaiko nataon’ny fiangonana any Galatia. '
  '10':
  - type: text
    content: 'Rehefa tonga i Timoty dia tandremo mba tsy hanan-tahotra izy eo anivonareo; fa ny asan’ny Tompo no ataony, tahaka ny ataoko koa. '
  '11':
  - type: text
    content: Koa aza avela hisy olona hanao tsinontsinona azy; fa vatsio tsara izy mba ho tonga atỳ amiko; fa miandry azy mbamin’ny rahalahy sasany aho.
  '12':
  - type: text
    content: Ary ny amin’ny rahalahy Apolosy dia niangavy azy fatratra aho hiaraka amin’ny rahalahy hankaty aminareo, nefa tsy sitrapony mihitsy ny handeha izao; fa ho avy ihany izy rehefa misy andro mahalalaka azy.
  - type: heading
    content: Hafatra farany sy fanaovam-beloma
  '13':
  - type: text
    content: 'Miambena ianareo, tomoera tsara amin’ny finoana, aoka hitomban-dahy, mahereza. '
  '14':
  - type: text
    content: Izay rehetra ataonareo dia ataovy amin’ny fitiavana!
  '15':
  - type: text
    content: 'Fantatrareo ny ankohonan’i Stefanasy fa voaloham-bokatr’i Akaia izy sady efa nanolo-tena ho amin’ny fanompoana ny olona masina; dia mangataka aminareo aho, ry rahalahy, '
  '16':
  - type: text
    content: 'mba hanaiky tsara ny olona tahaka ireny sy izay rehetra miara-miasa sy mikely aina koa ianareo. '
  '17':
  - type: text
    content: 'Faly aho noho ny fahatongavan’i Stefanasy sy i Fortonato ary i Akaìko; fa ireo no nahefa ny tsy vitanareo; '
  '18':
  - type: text
    content: fa namelombelona ny fanahiko sy ny anareo koa izy; koa mahaiza mankasitraka ny olona tahaka ireny.
  '19':
  - type: text
    content: Manao veloma anareo ny fiangonana
  - type: note
    content: 'Na: eklesia.'
  - type: text
    content: ' atỳ Azia. Manao veloma anareo indrindra ao amin’ny Tompo i Akoila sy i Prisila mbamin’ny fiangonana izay ao an-tranony. '
  '2':
  - type: text
    content: 'Amin’ny andro voalohany amin’ny herinandro dia samia manokana tahiry any an-tranony avy araka izay azony atao fanomezana mba tsy ho amin’ny fahatongavako vao hatao ny fanangonana izany. '
  '20':
  - type: text
    content: Manao veloma anareo ny rahalahy rehetra. Mifanaova veloma amin’ny fanorohana masina.
  '21':
  - type: text
    content: 'Ny tanako, izaho Paoly, no anaovako veloma. '
  '22':
  - type: text
    content: Raha misy tsy tia ny Tompo dia aoka ho voaozona izy! Marana ta
  - type: note
    content: 'Marana ta: teny arameana midika hoe Avia ry Tomponay!'
  - type: text
    content: '. '
  '23':
  - type: text
    content: 'Ho aminareo anie ny fahasoavan’i Jesosy '
  - type: text
    content: Kristy
  - type: text
    content: ' Tompo. '
  '24':
  - type: text
    content: Ny fitiavako dia ao aminareo rehetra ao amin’i Kristy Jesosy.
  '3':
  - type: text
    content: 'Rehefa tonga aho dia izay olona ankasitrahanareo no hirahiko, mitondra taratasy, hanatitra ny fanomezanareo ho any Jerosalema. '
  '4':
  - type: text
    content: Ary raha tokony handeha ho any koa aho dia hiaraka amiko ireo.
  - type: heading
    content: Ny dia kasain’ny Apostoly haleha
  '5':
  - type: text
    content: 'Hankaty aminareo aho rehefa avy mamakivaky an’i Makedonia, fa hamakivaky an’i Makedonia mantsy aho; '
  '6':
  - type: text
    content: 'angamba hitoetra eo aminareo aho, na handany ny ririnina aza, mba hamatsianareo ahy any amin’izay halehako. '
  '7':
  - type: text
    content: 'Fa tsy mikasa hamangy anareo toy ny mandalo fotsiny aho ankehitriny; fa manantena hijanona elaela any aminareo aho raha sitrapon’ny Tompo. '
  '8':
  - type: text
    content: 'Nefa hijanona any Efesosy aho mandra-piavin’ny Pentekosta; '
  '9':
  - type: text
    content: fa varavarana lehibe no voavoha ho ahy hahazoako miasa tsara, nefa maro ny mpanohitra.
