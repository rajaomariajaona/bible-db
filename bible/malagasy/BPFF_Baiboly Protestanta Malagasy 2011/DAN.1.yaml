document_id: DAN.1,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Tany Babilona i Daniela sy ny namany
  - type: text
    content: 'Tamin’ny taona fahatelo nanjakan’i Joiakima, mpanjakan’ny Joda, no nankanesan’i Nebokadnezara mpanjakan’i Babilona tany Jerosalema sy nanaovany fahirano azy. '
  '10':
  - type: text
    content: 'Ary hoy ilay lehiben’ny tandapa tamin’i Daniela: Matahotra ny mpanjaka tompoko izay nampanokana ny hohaninareo sy ny hosotroinareo aho; fa hanao ahoana raha mahita ny tarehinareo mahia noho ny an’ny zatovo namanareo izy, moa tsy hahameloka ahy amin’ny mpanjaka va ianareo ka hotapahiny ny lohako? '
  '11':
  - type: text
    content: 'Dia hoy i Daniela tamin’ny mpiambina izay notendren’ny lehiben’ny tandapa ho mpiambina an’i Daniela sy i Hanania sy i Misaela ary i Azaria: '
  '12':
  - type: text
    content: 'Miangavy anao aho, zahao toetra mandritra ny hafoloana izahay mpanomponao, ary aoka homena legioma hohaninay sy rano hosotroinay. '
  '13':
  - type: text
    content: 'Dia aoka hojerena eo anatrehanao ny tarehinay sy ny tarehin’ny zatovo izay mihinana ny anjara avy amin’ny hanin’ny mpanjaka, koa araka izay hitanao no ataovy amin’ny mpanomponao. '
  '14':
  - type: text
    content: 'Nanaiky izany tolo-kevitra izany izy ka nanara-maso azy ireo nandritra ny hafoloana. '
  '15':
  - type: text
    content: 'Nony tapitra ny hafoloana dia hita fa mandimandina sy matavy aza ny tarehin’izy ireo noho ny an’ny zatovo hafa rehetra izay nihinana anjara avy tamin’ny hanin’ny mpanjaka. '
  '16':
  - type: text
    content: Dia najanon’ilay mpiambina ny anjara haniny sy ny divay tokony hosotroiny ka legioma no nomeny azy.
  '17':
  - type: text
    content: 'Nomen’Andriamanitra fahalalana sy saina ny amin’ny soratra sy ny fahendrena rehetra ireo zatovo efa-dahy ireo, ary i Daniela dia nahay namantatra ny amin’ny fahitana sy ny nofy rehetra. '
  '18':
  - type: text
    content: 'Nony tonga ny andro nasain’ny mpanjaka hitondrana azy ireo dia noentin’ilay lehiben’ny tandapa niditra teo anatrehan’i Nebokadnezara izy. '
  '19':
  - type: text
    content: 'Niresaka tamin’izy ireo ny mpanjaka ka tamin’izy rehetra dia tsy nisy hitany ho tahaka an’i Daniela sy i Hanania sy i Misaela ary i Azaria. Dia nitoetra teo anatrehan’ny mpanjaka izy ireo. '
  '2':
  - type: text
    content: Ary ny Tompo nanolotra an’i Joiakima, mpanjakan’ny Joda, mbamin’ny fanaka sasany tao amin’ny tranon’Andriamanitra ho eo an-tanany. Dia noentiny ho any amin’ny tany Sinara, ho ao amin’ny tranon’ireo andriamaniny ireo; ary ny fanaka dia nampidiriny tao amin’ny trano fitahirizana an’ireo andriamaniny.
  '20':
  - type: text
    content: Ary ny amin’ny fahendrena sy ny fahalalana rehetra izay nanontanian’ny mpanjaka azy dia hitany fa nanan-tombo avo folo heny noho ny ombiasy rehetra sy ny mpisikidy izay tao amin’ny fanjakany rehetra aza izy ireo.
  '21':
  - type: text
    content: Ary nahatratra ny taona voalohany nanjakan’i Kirosy mpanjaka i Daniela.
  '3':
  - type: text
    content: 'Nandidy an’i Aspenaza, lehiben’ny tandapany, ny mpanjaka mba hitondra ny sasany amin’ny Zanak’Israely avy amin’ny taranaky ny mpanjaka na avy amin’ny fianakavian’andriana, '
  '4':
  - type: text
    content: 'dia zatovo izay tsy nanan-kilema fa tsara tarehy sady mendrika amin’ny fahendrena rehetra no manam-pahalalana ary mazava saina ka sahaza hitoetra ao an-dapan’ny mpanjaka; nasainy nampianarina ny soratra sy ny tenin’ny Kaldeana ireo. '
  '5':
  - type: text
    content: 'Nampanokana hanina ho azy ireo isanandro avy tamin’ny haniny sy avy tamin’ny divay izay fisotrony ny mpanjaka mba hamelomana azy ireo mandritra ny telo taona, fa rehefa afaka izany dia hijoro eo anatrehan’ny mpanjaka izy. '
  '6':
  - type: text
    content: 'Tamin’izy ireo dia nisy avy amin’ny taranak’i Joda: I Daniela sy i Hanania ary i Misaela sy i Azaria. '
  '7':
  - type: text
    content: Nomen’ny lehiben’ny tandapa anarana ireo ka i Daniela dia nataony hoe Beltesazara, i Hanania kosa dia Sadraka, i Misaela indray dia Mesaka, ary i Azaria dia nataony hoe Abed-Nego.
  '8':
  - type: text
    content: 'Fa i Daniela dia ninia tao am-pony tsy handoto ny tenany tamin’ny anjara hanina avy tamin’ny hanin’ny mpanjaka, na tamin’ny divay izay fisotrony ka nangataka tamin’ny lehiben’ny tandapa izy mba havelany tsy handoto ny tenany. '
  '9':
  - type: text
    content: 'Dia nataon’Andriamanitra nahita fitia sy famindrampo tamin’ilay lehiben’ny tandapa i Daniela. '
