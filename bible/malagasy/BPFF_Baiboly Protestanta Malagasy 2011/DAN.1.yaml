document_id: DAN.1
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Tany Babilona i Daniela sy ny namany
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Tamin’ny taona fahatelo nanjakan’i Joiakima, mpanjakan’ny Joda, no nankanesan’i Nebokadnezara mpanjakan’i Babilona tany Jerosalema sy nanaovany fahirano azy. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ary ny Tompo nanolotra an’i Joiakima, mpanjakan’ny Joda, mbamin’ny fanaka sasany tao amin’ny tranon’Andriamanitra ho eo an-tanany. Dia noentiny ho any amin’ny tany Sinara, ho ao amin’ny tranon’ireo andriamaniny ireo; ary ny fanaka dia nampidiriny tao amin’ny trano fitahirizana an’ireo andriamaniny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Nandidy an’i Aspenaza, lehiben’ny tandapany, ny mpanjaka mba hitondra ny sasany amin’ny Zanak’Israely avy amin’ny taranaky ny mpanjaka na avy amin’ny fianakavian’andriana, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'dia zatovo izay tsy nanan-kilema fa tsara tarehy sady mendrika amin’ny fahendrena rehetra no manam-pahalalana ary mazava saina ka sahaza hitoetra ao an-dapan’ny mpanjaka; nasainy nampianarina ny soratra sy ny tenin’ny Kaldeana ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Nampanokana hanina ho azy ireo isanandro avy tamin’ny haniny sy avy tamin’ny divay izay fisotrony ny mpanjaka mba hamelomana azy ireo mandritra ny telo taona, fa rehefa afaka izany dia hijoro eo anatrehan’ny mpanjaka izy. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Tamin’izy ireo dia nisy avy amin’ny taranak’i Joda: I Daniela sy i Hanania ary i Misaela sy i Azaria. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Nomen’ny lehiben’ny tandapa anarana ireo ka i Daniela dia nataony hoe Beltesazara, i Hanania kosa dia Sadraka, i Misaela indray dia Mesaka, ary i Azaria dia nataony hoe Abed-Nego.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Fa i Daniela dia ninia tao am-pony tsy handoto ny tenany tamin’ny anjara hanina avy tamin’ny hanin’ny mpanjaka, na tamin’ny divay izay fisotrony ka nangataka tamin’ny lehiben’ny tandapa izy mba havelany tsy handoto ny tenany. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Dia nataon’Andriamanitra nahita fitia sy famindrampo tamin’ilay lehiben’ny tandapa i Daniela. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary hoy ilay lehiben’ny tandapa tamin’i Daniela: Matahotra ny mpanjaka tompoko izay nampanokana ny hohaninareo sy ny hosotroinareo aho; fa hanao ahoana raha mahita ny tarehinareo mahia noho ny an’ny zatovo namanareo izy, moa tsy hahameloka ahy amin’ny mpanjaka va ianareo ka hotapahiny ny lohako? '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Dia hoy i Daniela tamin’ny mpiambina izay notendren’ny lehiben’ny tandapa ho mpiambina an’i Daniela sy i Hanania sy i Misaela ary i Azaria: '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Miangavy anao aho, zahao toetra mandritra ny hafoloana izahay mpanomponao, ary aoka homena legioma hohaninay sy rano hosotroinay. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dia aoka hojerena eo anatrehanao ny tarehinay sy ny tarehin’ny zatovo izay mihinana ny anjara avy amin’ny hanin’ny mpanjaka, koa araka izay hitanao no ataovy amin’ny mpanomponao. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Nanaiky izany tolo-kevitra izany izy ka nanara-maso azy ireo nandritra ny hafoloana. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Nony tapitra ny hafoloana dia hita fa mandimandina sy matavy aza ny tarehin’izy ireo noho ny an’ny zatovo hafa rehetra izay nihinana anjara avy tamin’ny hanin’ny mpanjaka. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Dia najanon’ilay mpiambina ny anjara haniny sy ny divay tokony hosotroiny ka legioma no nomeny azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Nomen’Andriamanitra fahalalana sy saina ny amin’ny soratra sy ny fahendrena rehetra ireo zatovo efa-dahy ireo, ary i Daniela dia nahay namantatra ny amin’ny fahitana sy ny nofy rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Nony tonga ny andro nasain’ny mpanjaka hitondrana azy ireo dia noentin’ilay lehiben’ny tandapa niditra teo anatrehan’i Nebokadnezara izy. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Niresaka tamin’izy ireo ny mpanjaka ka tamin’izy rehetra dia tsy nisy hitany ho tahaka an’i Daniela sy i Hanania sy i Misaela ary i Azaria. Dia nitoetra teo anatrehan’ny mpanjaka izy ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ary ny amin’ny fahendrena sy ny fahalalana rehetra izay nanontanian’ny mpanjaka azy dia hitany fa nanan-tombo avo folo heny noho ny ombiasy rehetra sy ny mpisikidy izay tao amin’ny fanjakany rehetra aza izy ireo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ary nahatratra ny taona voalohany nanjakan’i Kirosy mpanjaka i Daniela.
