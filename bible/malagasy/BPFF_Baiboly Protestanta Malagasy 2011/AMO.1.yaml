  - type: text
    text: Ny Edomita
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Izao no lazain’NY TOMPO:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Noho ny fahotana telon’i Edoma,
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, efatra aza, dia tsy havelako izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria nanenjika ny rahalahiny tamin’ny sabatra izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka nofoanany ny fiantrany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mamiravira mandrakariva ny fahatezerany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary notahiriziny lalandava ny fahavinirany;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: handefasako afo ao Temana
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka handevona ireo lapan’i Bozra izany.
- type: usfm
  marker: s3
  children:
  - type: text
    text: Ny Amonita
  marker-yv: yv-h
- type: usfm
