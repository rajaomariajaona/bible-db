segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ireo tenin’i Amosa, isan’ny mpiandry ondry tany Tekoa, dia izay hitany ny amin’ny Israely tamin’ny andro nanjakan’i Ozia mpanjakan’ny Joda, sy tamin’ny andro nanjakan’i Jeroboama, zanak’i Joasy, mpanjakan’ny Israely, roa taona talohan’ny horohoron-tany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Hoy izy:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Avy ao Ziona NY TOMPO no mierona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary avy ao Jerosalema Izy no mampikotroka ny feony.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Misaona ny saha fiandrasana ondry
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary maina ny tampon’i Karmela.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fanomezan-tsiny ataon’NY TOMPO amin’ny Israely sy ireo firenena manodidina
  marker-yv: yv-h
- type: usfm
  marker: s3
  children:
  - type: text
    text: Ny Arameana
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Izao no lazain’NY TOMPO:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Noho ny fahotana telon’i Damaskosy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, efatra aza, dia tsy hotsoahako ny fitsarana
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria ragiragy vy no nanosihoseny an’i Gileada;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: handefasako afo ny tranon’i Hazaela
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka handevona ireo lapan’i Beny-Hadada izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Hotorotoroiko ny hidin’i Damaskosy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hofoanako tsy hisy mponina ny lohasahan’i Avena
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hesoriko tao Bety-Edena izay mitana tehim-piandrianana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho lasan-ko babo any Kira ny vahoakan’i Arama,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hoy NY TOMPO.
- type: usfm
  marker: s3
  children:
  - type: text
    text: Ny Filistina
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Izao no lazain’NY TOMPO:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Noho ny fahotana telon’i Gaza,
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, efatra aza, dia tsy hotsoahako ny fitsarana
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria nalefany ho babo avokoa ny olona ka natolony an’i Edoma;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: handefasako afo ny mandan’i Gaza
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka handevona ireo lapany izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Hofoanako tsy hisy mponina i Asdoda
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy hisy hitana tehim-piandrianana ao Askelona;
- type: usfm
  marker: q1
  children:
  - type: text
    text: haveriko hamely an’i Ekrona ny tanako
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka ho fongana izay sisa amin’ny Filistina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hoy NY TOMPO Andriamanitra.
- type: usfm
  marker: s3
  children:
  - type: text
    text: Ny Fenisiana
  marker-yv: yv-h
- type: usfm
  marker: q1
