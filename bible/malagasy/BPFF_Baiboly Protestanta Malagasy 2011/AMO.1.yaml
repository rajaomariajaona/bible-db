document_id: AMO.1,3103
type_code: plt
verses:
  '1':
  - type: text
    content: Ireo tenin’i Amosa, isan’ny mpiandry ondry tany Tekoa, dia izay hitany ny amin’ny Israely tamin’ny andro nanjakan’i Ozia mpanjakan’ny Joda, sy tamin’ny andro nanjakan’i Jeroboama, zanak’i Joasy, mpanjakan’ny Israely, roa taona talohan’ny horohoron-tany.
  '10':
  - type: text
    content: handefasako afo ny mandan’i Tiro
  - type: text
    content: ka handevona ireo lapany izany.
  - type: heading
    content: Ny Edomita
  '11':
  - type: text
    content: 'Izao no lazain’NY TOMPO:'
  - type: text
    content: Noho ny fahotana telon’i Edoma,
  - type: text
    content: eny, efatra aza, dia tsy havelako izy
  - type: text
    content: satria nanenjika ny rahalahiny tamin’ny sabatra izy
  - type: text
    content: ka nofoanany ny fiantrany;
  - type: text
    content: mamiravira mandrakariva ny fahatezerany
  - type: text
    content: ary notahiriziny lalandava ny fahavinirany;
  '12':
  - type: text
    content: handefasako afo ao Temana
  - type: text
    content: ka handevona ireo lapan’i Bozra izany.
  - type: heading
    content: Ny Amonita
  '13':
  - type: text
    content: 'Izao no lazain’NY TOMPO:'
  - type: text
    content: Noho ny fahotana telon’ny taranak’i Amona,
  - type: text
    content: eny, efatra aza, dia tsy hotsoahako ny fitsarana
  - type: text
    content: satria notatahany ny kibon’izay bevohoka tao Gileada
  - type: text
    content: mba hanitarany ny taniny;
  '14':
  - type: text
    content: hampirehitra afo ao amin’ny mandan’i Raba Aho
  - type: text
    content: ka handevona ireo lapany izany
  - type: text
    content: ary hisy horakoraka amin’ny andro iadiana
  - type: text
    content: sy rivo-mahery amin’ny andron’ny tadio;
  '15':
  - type: text
    content: dia ho lasan-ko babo ny mpanjakany
  - type: text
    content: mbamin’ireo mpanapaka rehetra ao aminy,
  - type: text
    content: hoy NY TOMPO.
  '2':
  - type: text
    content: 'Hoy izy:'
  - type: text
    content: Avy ao Ziona NY TOMPO no mierona,
  - type: text
    content: ary avy ao Jerosalema Izy no mampikotroka ny feony.
  - type: text
    content: Misaona ny saha fiandrasana ondry
  - type: text
    content: ary maina ny tampon’i Karmela.
  - type: heading
    content: Ny fanomezan-tsiny ataon’NY TOMPO amin’ny Israely sy ireo firenena manodidina
  - type: heading
    content: Ny Arameana
  '3':
  - type: text
    content: 'Izao no lazain’NY TOMPO:'
  - type: text
    content: Noho ny fahotana telon’i Damaskosy,
  - type: text
    content: eny, efatra aza, dia tsy hotsoahako ny fitsarana
  - type: text
    content: satria ragiragy vy no nanosihoseny an’i Gileada;
  '4':
  - type: text
    content: handefasako afo ny tranon’i Hazaela
  - type: text
    content: ka handevona ireo lapan’i Beny-Hadada izany.
  '5':
  - type: text
    content: Hotorotoroiko ny hidin’i Damaskosy,
  - type: text
    content: hofoanako tsy hisy mponina ny lohasahan’i Avena
  - type: text
    content: ary hesoriko tao Bety-Edena izay mitana tehim-piandrianana;
  - type: text
    content: ho lasan-ko babo any Kira ny vahoakan’i Arama,
  - type: text
    content: hoy NY TOMPO.
  - type: heading
    content: Ny Filistina
  '6':
  - type: text
    content: 'Izao no lazain’NY TOMPO:'
  - type: text
    content: Noho ny fahotana telon’i Gaza,
  - type: text
    content: eny, efatra aza, dia tsy hotsoahako ny fitsarana
  - type: text
    content: satria nalefany ho babo avokoa ny olona ka natolony an’i Edoma;
  '7':
  - type: text
    content: handefasako afo ny mandan’i Gaza
  - type: text
    content: ka handevona ireo lapany izany.
  '8':
  - type: text
    content: Hofoanako tsy hisy mponina i Asdoda
  - type: text
    content: ary tsy hisy hitana tehim-piandrianana ao Askelona;
  - type: text
    content: haveriko hamely an’i Ekrona ny tanako
  - type: text
    content: ka ho fongana izay sisa amin’ny Filistina,
  - type: text
    content: hoy NY TOMPO Andriamanitra.
  - type: heading
    content: Ny Fenisiana
  '9':
  - type: text
    content: 'Izao no lazain’NY TOMPO:'
  - type: text
    content: Noho ny fahotana telon’i Tiro,
  - type: text
    content: eny, efatra aza, dia tsy hotsoahako ny fitsarana
  - type: text
    content: satria natolony an’i Edoma ny babo rehetra
  - type: text
    content: ary tsy notsarovany ny fanekem-pirahalahiana;
