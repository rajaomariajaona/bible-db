  - type: text
    text: eny, efatra aza, dia tsy hotsoahako ny fitsarana
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria natolony an’i Edoma ny babo rehetra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy notsarovany ny fanekem-pirahalahiana;
- type: usfm
  marker: q1
