  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Izao no lazain’NY TOMPO:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Noho ny fahotana telon’ny taranak’i Amona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, efatra aza, dia tsy hotsoahako ny fitsarana
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria notatahany ny kibon’izay bevohoka tao Gileada
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hanitarany ny taniny;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: hampirehitra afo ao amin’ny mandan’i Raba Aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka handevona ireo lapany izany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hisy horakoraka amin’ny andro iadiana
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy rivo-mahery amin’ny andron’ny tadio;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: dia ho lasan-ko babo ny mpanjakany
- type: usfm
  marker: q1
  children:
  - type: text
    text: mbamin’ireo mpanapaka rehetra ao aminy,
- type: usfm
  marker: q1
  children:
