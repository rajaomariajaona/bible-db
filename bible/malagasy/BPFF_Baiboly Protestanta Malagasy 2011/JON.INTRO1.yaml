document_id: JON.INTRO1,3103
type_code: plt
verses:
  '1':
  - type: text
    content: INDRAY MIJERY
  - type: text
    content: Ny Bokin’i Jona dia mitantara ny zavatra maro nihatra tamin’ity mpaminany ity izay nitady handositra ny iraka nanirahan’Andriamanitra azy, kanefa tsy afa-nanoatra. Ireo zavatra samihafa nanjo azy dia maneho amin’ny fomba tena manaitra ny fampianarana izay kendren’ny mpanoratra hatolotra ny mpamaky. Amin’izany ny Boky dia naman’ireo Soratra manolotra fahendrena.
  - type: text
    content: Ny votoatin’ny Boky
  - type: text
    content: 'Araka izany dia maromaro ny fotokevitra ampianarin’ny Boky:'
  - type: text
    content: Ny fitiavan’Andriamanitra dia tsy voafetra ho amin’ny Israely ihany fa asehony amin’ny olona rehetra izay manaiky hanetry tena eo anatrehany. Izy dia vonona mandrakariva ny tsy hanatanteraka ny loza izay nokasainy raha mandray anatra ny olona ka mibebaka. Andriamanitra no Tompo tsy refesi-mandidy amin’ny voahariny. Manana fahefana amin’ny fiainana sy ny fahafatesana izy, koa noho izany ny mpaminany dia tsy tokony ho tezitra raha mamela heloka ny mpanota Izy.
  - type: text
    content: Ao amin’ny Testamenta Vaovao, ny tantaran’i Jona dia entin’i Jesosy hanambarany ny fitsanganany amin’ny maty ary koa anehoany ny nibebahan’ny mponina tao Ninive mba handreseny lahatra ny mpihaino Azy (Mat 12.38-42).
