document_id: COL.INTRO1,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: imt1
    children:
    - type: text
      text: INDRAY MIJERY
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Faritany romana tany Azia na Torkia ankehitriny no misy an’i Kolosia ary roanjato kilaometatra atsinanan’i Efesosy no misy azy. Tsy nandalo tao Kolosia i Paoly fa i Epafra mpiara-miasa aminy izay avy any no nampahafantatra azy ny zava-misy tany nandritra ny fotoana nipetrahan’i Paoly tao Efesosy. Ny Fiangonana tao Kolosia sy Hierapolia ary Laodikia, izay tanàna mifanila, dia samy naorin’i Epafra.
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Anisan’izay antsoina hoe Epistilin’ny Fifatorana ny epistily ho an’ny Kolosiana satria tany am-ponja tany Roma i Paoly tamin’ny fotoana nanoratany azy. I Tikiko niaraka tamin’i Onesimosy no nampitondrainy ny epistily ho any Kolosia.
  - type: usfm
    marker: is1
    children:
    - type: text
      text: Ny votoatin’ny Epistily
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Misy hevi-dehibe itovizana betsaka ny epistily ho an’ny Efesiana sy ny epistily ho an’ny Kolosiana. Anisan’izany, ohatra, ny amin’ny maha Lohan’ny Fiangonana an’i Kristy; ny Mino miara atsangana amin’i Kristy.
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Tsy mitovy amin’ny fomba nanoratany ireo epistily teo aloha ny fanoratr’i Paoly ny Kolosiana fa nisy fiovana. Nanjary lava sy saro-takarina ny ankamaroan’ny fehezanteny. Nanjary betsaka ny fanomezana teny mitovy hevitra: Mivavaka sy mangataka, ny fanavotana sy ny famelana ny helotsika. Betsaka ny voambolana tsy mbola hita tamin’ireo epistily teo aloha nefa hita ao amin’ny Kolosiana: Loha, tena, fahendrena, fahafenoana, zavamiafina.'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Araka ny vaovao avy tamin’i Epafra dia nisy nampiely fampianaran-diso tao Kolosia, dia ireo izay ta hampifandray ny Filazantsara amin’ny fahendrena sy filozofia izay heveriny ho ambony kokoa. Tao koa ny fampianaran-diso momba ny fivavahana amin’ny anjely, ny fampianarana ny amin’ny sakafo azo hanina na tsia mbamin’ireo fombafomba miaraka amin’izany. Nisy koa ny fampianaran-diso momba ny fampahorian-tena. Ireo rehetra ireo dia karazam-pamitahana ara-pivavahana mihitsy satria mitaona ny olona hino sy hihevitra fa ny famonjena dia azo amin’izay fombafomba ivelany tandreman’ny olona. Noho izany dia fananarana sy fampianarana ny Fiangonana no ataon’i Paoly manoloana izany.
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Manan-danja ao amin’ity epistily ity koa anefa ny amin’ny fitondrantena amin’ny fiainam-baovao, ny fifandraisana amin’ny hafa, ny fifandraisan’ny mpianakavy, ny fifandraisan’ny tompo sy ny mpanompo ary ny fiaraha-miaina. Asehon’ny mpanoratra ny maha zava-dehibe ny Tenin’Andriamanitra sy ny fifanampiana hiorenan’ny finoana ary ny toeran’ny hira fiderana.
  - type: usfm
    marker: iot
    children:
    - type: text
      text: Ny firafitry ny Epistily
  - type: usfm
    marker: io1
    children:
    - type: text
      text: 'Fiarahabana: 1.1-8'
  - type: usfm
    marker: io1
    children:
    - type: text
      text: 'Fampitandremana sy fananarana ny amin’ireo fampianaran-diso ary fampahatsiahivana ny amin’i Kristy sy ny asany: 1.9–2.19'
  - type: usfm
    marker: io1
    children:
    - type: text
      text: 'Ny fiainam-baovao ao amin’i Kristy: 2.20–4.6'
  - type: usfm
