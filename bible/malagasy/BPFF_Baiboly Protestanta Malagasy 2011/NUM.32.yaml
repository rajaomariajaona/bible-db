document_id: NUM.32,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ireo foko telo nanorim-ponenana tany atsinanan’i Jordana
  - type: text
    content: 'Ary ny taranak’i Robena sy ny taranak’i Gada dia nanana omby aman’ondry marobe. Hitany fa tany tsara ho fiandrasana omby aman’ondriny ny tany Jazera sy ny tany Gileada. '
  '10':
  - type: text
    content: 'Nirehitra ny fahatezeran’NY TOMPO tamin’izay andro izay ka nianiana Izy hoe: '
  '11':
  - type: text
    content: 'Ny olona izay niakatra avy tany Ejipta, hatramin’ny roapolo taona no ho miakatra, dia tsy hisy hahita ny tany izay efa nianianako tamin’i Abrahama sy Isaka ary i Jakoba homena azy satria tsy tanteraka tamin’ny fanarahana Ahy izy ireo, '
  '12':
  - type: text
    content: 'afa-tsy i Kaleba, zanak’i Jefone kenizita, sy i Josoa, zanak’i Nona, izay tanteraka tamin’ny fanarahana NY TOMPO. '
  '13':
  - type: text
    content: 'Dia nirehitra tamin’ny Israely ny fahatezeran’NY TOMPO ka navelany hirenireny tany an-tany efitra efapolo taona izy ireo, mandra-pahalany ritra ny taranaka rehetra izay nanao ratsy teo imason’NY TOMPO. '
  '14':
  - type: text
    content: 'Ary izao indray koa ianareo dia mitsangana hisolo ny rainareo, ho taranaka mpanota, hampitombo ny firehetan’ny fahatezeran’NY TOMPO amin’ny Israely! '
  '15':
  - type: text
    content: Fa raha miala amin’ny fanarahana Azy ianareo dia hampaharitra ny fitoeran’ny Israely any an-tany efitra indray Izy; koa ianareo no handringanana izao olona rehetra izao.
  '16':
  - type: text
    content: 'Dia nanatona azy izy ireo ka niteny hoe: Hanao vala eto izahay ho an’ny omby aman’ondrinay ary tanàna ho an’ny zanakay madinika; '
  '17':
  - type: text
    content: 'fa ny tenanay dia handray fiadiana haingana ka hilahatra hiady eo alohan’ny Zanak’Israely, mandra-pitondranay azy ho any amin’ny taniny; ary ny zanakay madinika kosa dia hitoetra amin’ny tanàna mimanda noho ny amin’ny mponina eo amin’ny tany. '
  '18':
  - type: text
    content: 'Tsy hody any an-tranonay izahay mandra-pahazoan’ny Zanak’Israely ny zarataniny avy. '
  '19':
  - type: text
    content: 'Fa tsy hiara-mandray zaratany aminy izahay raha hatrany andafin’i Jordana no ho miankandrefana satria efa azonay atỳ andafy atsinanan’i Jordana atỳ ny zarataninay. '
  '2':
  - type: text
    content: 'Dia avy ny taranak’i Gada sy ny taranak’i Robena ka niteny tamin’i Mosesy sy i Eleazara mpisorona sy tamin’ireo lohan’ny fiangonana hoe: '
  '20':
  - type: text
    content: 'Dia hoy i Mosesy taminy: Raha hanao izany zavatra izany ianareo ka hiomana hanafika eo anatrehan’NY TOMPO, '
  '21':
  - type: text
    content: 'rehefa samy efa voaomana hiady dia hita ho any andafin’i Jordana eo anatrehan’NY TOMPO, mandra-pandroakany ny fahavalony hiala eo anoloany '
  '22':
  - type: text
    content: 'ka ho resy eo anatrehan’NY TOMPO ny tany, dia izay vao hody ianareo ka tsy hanan-tsiny, na amin’NY TOMPO, na amin’ny Israely; ary ity tany ity no ho zarataninareo eo anatrehan’NY TOMPO. '
  '23':
  - type: text
    content: 'Fa raha tsy hanao izany kosa ianareo dia manota amin’NY TOMPO; ary aoka ho fantatrareo fa hanody anareo ny fahotanareo. '
  '24':
  - type: text
    content: Manorena tanàna ho an’ny zanakareo madinika sy vala ho an’ny ondry aman’osinareo ka ataovy izay naloaky ny vavanareo.
  '25':
  - type: text
    content: 'Dia niteny tamin’i Mosesy ny taranak’i Gada sy ny taranak’i Robena hoe: Hanatanteraka izay andidianao ny mpanomponao, tompoko. '
  '26':
  - type: text
    content: 'Ny zanakay madinika sy ny vadinay ary ny ondry aman’osinay sy ny biby fiompinay rehetra dia hitoetra ato amin’ny tanànan’i Gileada; '
  '27':
  - type: text
    content: fa ny mpanomponao dia handeha hita ny ony; samy efa voaomana hiady eo anatrehan’NY TOMPO izahay ka hanafika, araka izay nolazainao, tompoko.
  '28':
  - type: text
    content: 'Ary i Mosesy dia nandidy an’i Eleazara mpisorona sy i Josoa, zanak’i Nona, ary ireo lohan’ny fianakaviana tamin’ny fokon’ny Zanak’Israely ny momba azy ireo '
  '29':
  - type: text
    content: 'ka niteny taminy hoe: Raha handeha hita an’i Jordana hiaraka aminareo ny taranak’i Gada sy ny taranak’i Robena, samy efa voaomana hiady eo anatrehan’NY TOMPO, ka ho resy eo anoloanareo ny tany, dia homenareo azy ny tany Gileada ho zarataniny; '
  '3':
  - type: text
    content: 'I Atarota, i Dibona, i Jazera, i Nimra, i Hesbona, i Elale, i Sebama, i Nebo ary i Beona, '
  '30':
  - type: text
    content: fa raha tsy mandray fiadiana miaraka aminareo izy dia eo aminareo any amin’ny tany Kanana ihany no hahazoany zaratany.
  '31':
  - type: text
    content: 'Dia hoy ny taranak’i Gada sy ny taranak’i Robena: Araka izay nolazain’NY TOMPO tamin’ny mpanomponao no hataonay: '
  '32':
  - type: text
    content: Handeha hita eo anatrehan’NY TOMPO ho any amin’ny tany Kanana izahay, fa samy efa voaomana hiady, kanefa etỳ andafin’i Jordana etỳ ihany no hahazoanay zaratany.
  '33':
  - type: text
    content: Dia nomen’i Mosesy ho an’ny taranak’i Gada sy ny taranak’i Robena ary ny antsasaky ny fokon’i Manase, zanak’i Josefa, ny fanjakan’i Sihona, mpanjakan’ny Amorita, sy ny fanjakan’i Oga, mpanjakan’i Basana, dia ny tany mbamin’ny tanànany ao amin’ny faritany, dia ny tanàna eny amin’ny tany manodidina.
  '34':
  - type: text
    content: 'Ny taranak’i Gada dia nanorina an’i Dibona, i Atarota, i Aroera, '
  '35':
  - type: text
    content: 'i Atirota-Sofana, i Jazera, i Jogbeha, '
  '36':
  - type: text
    content: i Bety-Nimra, i Bety-Harana, tanàna mimanda sy vala ho an’ny ondry.
  '37':
  - type: text
    content: 'Ny taranak’i Robena dia nanorina an’i Hesbona, i Elale, i Kiriataima, '
  '38':
  - type: text
    content: i Nebo, i Baala-Meona, izay novana ny anarany, ary i Sibma; dia nomeny anarana vaovao ireo tanàna izay naoriny.
  '39':
  - type: text
    content: 'Ny taranak’i Makira, zanak’i Manase, dia nankany Gileada ka naharesy azy, dia nandroaka ny Amorita izay nonina teo. '
  '4':
  - type: text
    content: 'ireo tany noresen’NY TOMPO teo anoloan’ny fiangonan’ny Israely ireo dia tany tsara ho fiandrasana omby aman’ondry ary ny mpanomponao dia manana omby aman’ondry. '
  '40':
  - type: text
    content: 'Ary i Gileada dia nomen’i Mosesy an’i Makira, zanak’i Manase, ka nonina tao izy. '
  '41':
  - type: text
    content: Ary i Jaira, zanak’i Manase, dia nandeha ka nandresy ireo tanànan’ny mpitoetra an-tranolay ary ny anarany nataony hoe Havota
  - type: note
    content: 'Havota: tanànan’ny mpitoetra an-tranolay.'
  - type: text
    content: '-Jaira. '
  '42':
  - type: text
    content: Ary nandeha i Noba ka nandresy an’i Kenata sy ireo vohitra miankina aminy, dia nataony hoe Noba, araka ny anarany.
  '5':
  - type: text
    content: 'Hoy koa izy ireo: Raha mahita fitia eo imasonao izahay, aoka homena anay mpanomponao ho zarataninay io tany io; fa aza ampitaina an’i Jordana izahay.'
  '6':
  - type: text
    content: 'Dia hoy i Mosesy tamin’ny taranak’i Gada sy ny taranak’i Robena: Ny rahalahinareo va handeha hanafika nefa ianareo kosa hijanona eto? '
  '7':
  - type: text
    content: 'Nahoana ianareo no hanakivy ny fon’ny Zanak’Israely mba tsy handehanany ho any amin’ny tany izay nomen’NY TOMPO azy? '
  '8':
  - type: text
    content: 'Izany ihany no nataon’ireo rainareo, fony nirahiko avy tao Kadesy-Barnea hisafo ny tany izy. '
  '9':
  - type: text
    content: 'Rehefa niakatra hatrany an-dohasaha Eskola izy ireo ka nahita ny tany dia nanakivy ny fon’ny Zanak’Israely mba tsy handehanany ho any amin’ny tany izay efa nomen’NY TOMPO azy. '
