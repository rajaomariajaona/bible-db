document_id: JOS.11,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny ady teo amoron’ny Meroma
  - type: text
    content: 'Rehefa nahare izany i Jabina, mpanjakan’i Hazora, dia nandefa iraka tany amin’i Jobaba, mpanjakan’i Madona, ny mpanjakan’i Simrona, ny mpanjakan’i Aksafa '
  '10':
  - type: text
    content: 'Tamin’izany koa dia niverina i Josoa ka naka an’i Hazora ary namely ny mpanjakany tamin’ny sabatra satria i Hazora no renivohitr’ireny fanjakana rehetra ireny fahiny. '
  '11':
  - type: text
    content: 'Nasiany tamin’ny lelan-tsabatra ny olona rehetra tao ka nataony zavatra voaozona avokoa: Tsy nisy olo-miaina tavela na dia iray akory aza ary i Hazora dia nodorany tamin’ny afo. '
  '12':
  - type: text
    content: 'Ary izay tanàna rehetra an’ireny mpanjaka ireny sy ny mpanjakany rehetra dia azon’i Josoa ary nasiany tamin’ny lelan-tsabatra ka nataony zavatra voaozona, araka izay nandidian’i Mosesy, mpanompon’NY TOMPO. '
  '13':
  - type: text
    content: 'Fa ny tanàna rehetra izay teny an-kavoana kosa dia tsy mba nodoran’ny Israely, afa-tsy i Hazora ihany, izay nodoran’i Josoa. '
  '14':
  - type: text
    content: 'Nalain’ny Zanak’Israely ho babony ny fananana rehetra tao amin’ireny tanàna ireny sy ny biby fiompy ary ny olona rehetra dia nasiany tamin’ny lelan-tsabatra mandra-pandringany azy. Tsy nasiany niangana na dia iray akory aza. '
  '15':
  - type: text
    content: 'Araka izay nandidian’NY TOMPO an’i Mosesy mpanompony no nandidian’i Mosesy an’i Josoa dia izany no nataon’i Josoa: Tsy nisy namelany izay rehetra nandidian’NY TOMPO an’i Mosesy.'
  - type: heading
    content: Mamarana ny fakàna ny tany i Josoa
  '16':
  - type: text
    content: 'Dia lasan’i Josoa avokoa izany tany rehetra izany, na ny havoana na i Negeva rehetra na i Gosena rehetra, na i Sefela na ny tany ngazana na ny tany be havoana any Israely sy ny tany lemaka any aminy koa, '
  '17':
  - type: text
    content: 'hatramin’ny tendrombohitra mangadihady izay fiakarana ho any Seìra ka hatrany Baala-Gada eo amin’ny lohasahan’i Libanona am-pototry ny tendrombohitra Hermona. Ary nosamboriny ny mpanjakany rehetra ka novonoiny ho faty. '
  '18':
  - type: text
    content: 'Naharitra no niadian’i Josoa tamin’ireny mpanjaka rehetra ireny. '
  '19':
  - type: text
    content: 'Tsy nisy tanàna nanao fihavanana tamin’ny Zanak’Israely, afa-tsy ny Hivita izay nonina tany Gibeona ihany; fa azony tamin’ny ady avokoa izy rehetra. '
  '2':
  - type: text
    content: 'ary ireo mpanjaka tany amin’ny havoana any avaratra koa, ny tany amin’ny tany ngazana atsimon’i Kinerota, ny tany Sefela ary ny tany be havoana any Dora andrefana, '
  '20':
  - type: text
    content: Fa avy tamin’NY TOMPO no nanamafisan’ireo ny fony hiady amin’ny Israely mba hanaovany azy ho zavatra voaozona ka tsy nisy famindrampo ny amin’ny handringanana azy araka izay nandidian’NY TOMPO an’i Mosesy.
  '21':
  - type: text
    content: 'Mbola nandeha ihany i Josoa tamin’izany andro izany ka namongotra ny Anakita tany amin’ny havoana, dia tany Hebrona, Debira, Anaba, ary tany amin’ny tany be havoana any Joda rehetra, ary tany amin’ny tany be havoana any Israely rehetra. Nataon’i Josoa zavatra voaozona avokoa izy sy ny tanànany. '
  '22':
  - type: text
    content: 'Tsy nisy tavela tany amin’ny tanin’ny Zanak’Israely ny Anakita; fa tany Gaza sy Gata ary Asdoda ihany no mbola nisy sisa. '
  '23':
  - type: text
    content: Dia lasan’i Josoa avokoa ny tany manontolo, araka izay rehetra nolazain’NY TOMPO tamin’i Mosesy; ary nomen’i Josoa ho lovan’ny Israely izany, araka ny fizaran’ny fokony avy. Dia nitsahatra ny ady ka nandry ny tany.
  '3':
  - type: text
    content: 'dia tamin’ny Kananita any atsinanana sy any andrefana ary tamin’ny Amorita, ny Hetita, ny Perizita ary ny Jebosita tany amin’ny havoana ary tamin’ny Hivita tany am-pototr’i Hermona, tany amin’ny tany Mizpa. '
  '4':
  - type: text
    content: 'Ary nandeha izy ireo sy ny miaramilany rehetra teo aminy ka olona maro be toy ny fasika eny amoron-dranomasina ny hamaroany, ary ny soavaliny sy ny kalesy fitondrany miady dia maro indrindra. '
  '5':
  - type: text
    content: 'Rehefa nivory ireo mpanjaka rehetra ireo dia nandeha hiady tamin’ny Israely ka nitoby teo anilan’ny rano Meroma. '
  '6':
  - type: text
    content: 'Dia hoy NY TOMPO tamin’i Josoa: Aza matahotra azy fa rahampitso toy izao Aho dia hanolotra azy rehetra ho faty eo anatrehan’ny Israely; traingoy ny soavaliny ary doroy amin’ny afo ny kalesy fitondrany miady.'
  '7':
  - type: text
    content: 'Dia nandeha i Josoa sy ny vahoaka mpanafika rehetra teo aminy ka tonga tampoka teo amin’ireo teo amoron’ny rano Meroma, dia namely azy. '
  '8':
  - type: text
    content: 'Ary NY TOMPO nanolotra azy ireny teo an-tanan’ny Israely izay namely azy ka nanenjika azy hatrany Sidona lehibe sy hatrany Misrefota-Maima ary hatrany amin’ny lohasaha Mizpa atsinanana dia namely azy izy mandra-paha tsy nisy niangana azy na dia iray akory aza. '
  '9':
  - type: text
    content: 'Ary nanatanteraka taminy araka izay efa nandidian’NY TOMPO azy i Josoa: Notraingoiny ny soavalin’ireny ary nodorany tamin’ny afo ny kalesy fitondrany miady.'
  - type: heading
    content: Fambaboana an’i Hazora
