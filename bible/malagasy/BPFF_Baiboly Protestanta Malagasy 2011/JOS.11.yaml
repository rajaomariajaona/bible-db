document_id: JOS.11
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny ady teo amoron’ny Meroma
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Rehefa nahare izany i Jabina, mpanjakan’i Hazora, dia nandefa iraka tany amin’i Jobaba, mpanjakan’i Madona, ny mpanjakan’i Simrona, ny mpanjakan’i Aksafa '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'ary ireo mpanjaka tany amin’ny havoana any avaratra koa, ny tany amin’ny tany ngazana atsimon’i Kinerota, ny tany Sefela ary ny tany be havoana any Dora andrefana, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'dia tamin’ny Kananita any atsinanana sy any andrefana ary tamin’ny Amorita, ny Hetita, ny Perizita ary ny Jebosita tany amin’ny havoana ary tamin’ny Hivita tany am-pototr’i Hermona, tany amin’ny tany Mizpa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary nandeha izy ireo sy ny miaramilany rehetra teo aminy ka olona maro be toy ny fasika eny amoron-dranomasina ny hamaroany, ary ny soavaliny sy ny kalesy fitondrany miady dia maro indrindra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Rehefa nivory ireo mpanjaka rehetra ireo dia nandeha hiady tamin’ny Israely ka nitoby teo anilan’ny rano Meroma. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia hoy NY TOMPO tamin’i Josoa: Aza matahotra azy fa rahampitso toy izao Aho dia hanolotra azy rehetra ho faty eo anatrehan’ny Israely; traingoy ny soavaliny ary doroy amin’ny afo ny kalesy fitondrany miady.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dia nandeha i Josoa sy ny vahoaka mpanafika rehetra teo aminy ka tonga tampoka teo amin’ireo teo amoron’ny rano Meroma, dia namely azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary NY TOMPO nanolotra azy ireny teo an-tanan’ny Israely izay namely azy ka nanenjika azy hatrany Sidona lehibe sy hatrany Misrefota-Maima ary hatrany amin’ny lohasaha Mizpa atsinanana dia namely azy izy mandra-paha tsy nisy niangana azy na dia iray akory aza. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary nanatanteraka taminy araka izay efa nandidian’NY TOMPO azy i Josoa: Notraingoiny ny soavalin’ireny ary nodorany tamin’ny afo ny kalesy fitondrany miady.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fambaboana an’i Hazora
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Tamin’izany koa dia niverina i Josoa ka naka an’i Hazora ary namely ny mpanjakany tamin’ny sabatra satria i Hazora no renivohitr’ireny fanjakana rehetra ireny fahiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Nasiany tamin’ny lelan-tsabatra ny olona rehetra tao ka nataony zavatra voaozona avokoa: Tsy nisy olo-miaina tavela na dia iray akory aza ary i Hazora dia nodorany tamin’ny afo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary izay tanàna rehetra an’ireny mpanjaka ireny sy ny mpanjakany rehetra dia azon’i Josoa ary nasiany tamin’ny lelan-tsabatra ka nataony zavatra voaozona, araka izay nandidian’i Mosesy, mpanompon’NY TOMPO. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Fa ny tanàna rehetra izay teny an-kavoana kosa dia tsy mba nodoran’ny Israely, afa-tsy i Hazora ihany, izay nodoran’i Josoa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Nalain’ny Zanak’Israely ho babony ny fananana rehetra tao amin’ireny tanàna ireny sy ny biby fiompy ary ny olona rehetra dia nasiany tamin’ny lelan-tsabatra mandra-pandringany azy. Tsy nasiany niangana na dia iray akory aza. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Araka izay nandidian’NY TOMPO an’i Mosesy mpanompony no nandidian’i Mosesy an’i Josoa dia izany no nataon’i Josoa: Tsy nisy namelany izay rehetra nandidian’NY TOMPO an’i Mosesy.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mamarana ny fakàna ny tany i Josoa
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Dia lasan’i Josoa avokoa izany tany rehetra izany, na ny havoana na i Negeva rehetra na i Gosena rehetra, na i Sefela na ny tany ngazana na ny tany be havoana any Israely sy ny tany lemaka any aminy koa, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'hatramin’ny tendrombohitra mangadihady izay fiakarana ho any Seìra ka hatrany Baala-Gada eo amin’ny lohasahan’i Libanona am-pototry ny tendrombohitra Hermona. Ary nosamboriny ny mpanjakany rehetra ka novonoiny ho faty. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Naharitra no niadian’i Josoa tamin’ireny mpanjaka rehetra ireny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Tsy nisy tanàna nanao fihavanana tamin’ny Zanak’Israely, afa-tsy ny Hivita izay nonina tany Gibeona ihany; fa azony tamin’ny ady avokoa izy rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Fa avy tamin’NY TOMPO no nanamafisan’ireo ny fony hiady amin’ny Israely mba hanaovany azy ho zavatra voaozona ka tsy nisy famindrampo ny amin’ny handringanana azy araka izay nandidian’NY TOMPO an’i Mosesy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Mbola nandeha ihany i Josoa tamin’izany andro izany ka namongotra ny Anakita tany amin’ny havoana, dia tany Hebrona, Debira, Anaba, ary tany amin’ny tany be havoana any Joda rehetra, ary tany amin’ny tany be havoana any Israely rehetra. Nataon’i Josoa zavatra voaozona avokoa izy sy ny tanànany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Tsy nisy tavela tany amin’ny tanin’ny Zanak’Israely ny Anakita; fa tany Gaza sy Gata ary Asdoda ihany no mbola nisy sisa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Dia lasan’i Josoa avokoa ny tany manontolo, araka izay rehetra nolazain’NY TOMPO tamin’i Mosesy; ary nomen’i Josoa ho lovan’ny Israely izany, araka ny fizaran’ny fokony avy. Dia nitsahatra ny ady ka nandry ny tany.
