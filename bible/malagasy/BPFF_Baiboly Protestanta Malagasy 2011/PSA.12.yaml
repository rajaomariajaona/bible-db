document_id: PSA.12,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Madio ny tenin’NY TOMPO
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: Ho an’ny mpiventy hira. Al-hasheminit. Salamo nataon’i Davida.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Vonjeo, TOMPO ô, fa efa lany ny matahotra an’Andriamanitra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy misy mahatoky intsony eo amin’ny zanak’olombelona.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Samy milaza lainga amin’ny namany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: amin’ny molotra mandokadoka ny olona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary fo mamorom-pitaka no itenenany.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Holevonin’NY TOMPO anie ny molotra mandokadoka rehetra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny lela miteny avonavona
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'izay miteny hoe: Ny lelanay no mampahery anay;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: miandany aminay ny molotray;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: iza no tomponay?
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Noho ny fampahoriana ny madinika
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny fisentoan’ny mahantra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hitsangana Aho ankehitriny, hoy NY TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hataoko mahita ny famonjena iriny ireny vingavingain’ny sasany ireny.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Ny tenin’NY TOMPO dia teny madio
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toy ny volafotsy voarendrika tao anatin’ny memy amin’ny tany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, voadio impito.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Ianao, TOMPO ô, no hiambina azy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ianao no hitahiry anay tsy ho azon’ity taranaka ity hatramin’izao ka ho mandrakizay.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Mivezivezy eny rehetra eny ny ratsy fanahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: rehefa mitombo ny fahambanian-toetran’ny zanak’olombelona.
