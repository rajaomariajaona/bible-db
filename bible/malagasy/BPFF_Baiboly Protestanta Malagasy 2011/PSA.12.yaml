document_id: PSA.12,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Madio ny tenin’NY TOMPO
  - type: text
    content: Ho an’ny mpiventy hira. Al-hasheminit. Salamo nataon’i Davida.
  - type: text
    content: Vonjeo, TOMPO ô, fa efa lany ny matahotra an’Andriamanitra,
  - type: text
    content: tsy misy mahatoky intsony eo amin’ny zanak’olombelona.
  '2':
  - type: text
    content: Samy milaza lainga amin’ny namany
  - type: text
    content: amin’ny molotra mandokadoka ny olona,
  - type: text
    content: ary fo mamorom-pitaka no itenenany.
  '3':
  - type: text
    content: Holevonin’NY TOMPO anie ny molotra mandokadoka rehetra
  - type: text
    content: sy ny lela miteny avonavona
  '4':
  - type: text
    content: 'izay miteny hoe: Ny lelanay no mampahery anay;'
  - type: text
    content: miandany aminay ny molotray;
  - type: text
    content: iza no tomponay?
  '5':
  - type: text
    content: Noho ny fampahoriana ny madinika
  - type: text
    content: sy ny fisentoan’ny mahantra
  - type: text
    content: dia hitsangana Aho ankehitriny, hoy NY TOMPO,
  - type: text
    content: hataoko mahita ny famonjena iriny ireny vingavingain’ny sasany ireny.
  '6':
  - type: text
    content: Ny tenin’NY TOMPO dia teny madio
  - type: text
    content: toy ny volafotsy voarendrika tao anatin’ny memy amin’ny tany;
  - type: text
    content: eny, voadio impito.
  '7':
  - type: text
    content: Ianao, TOMPO ô, no hiambina azy,
  - type: text
    content: Ianao no hitahiry anay tsy ho azon’ity taranaka ity hatramin’izao ka ho mandrakizay.
  '8':
  - type: text
    content: Mivezivezy eny rehetra eny ny ratsy fanahy
  - type: text
    content: rehefa mitombo ny fahambanian-toetran’ny zanak’olombelona.
