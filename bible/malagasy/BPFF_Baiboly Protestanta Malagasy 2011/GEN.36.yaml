document_id: GEN.36,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Nanorim-ponenana tany Edoma i Esao
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ireto no taranak’i Esao na Edoma. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny anaran’ny zanakalahin’i Esao dia ireto avy: i Elifaza, zanak’i Ada, vadin’i Esao, sy i Regoela, zanak’i Basemata, vadin’i Esao. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny zanakalahin’i Elifaza dia i Temana, i Omara, i Zefo, i Gatama ary i Kenaza. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I Timna no vady tsindranon’i Elifaza, zanakalahin’i Esao; niteraka an’i Amaleka tamin’i Elifaza izy. Ireo no zanakalahin’i Ada, vadin’i Esao. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ireto avy no zanakalahin’i Regoela: I Nahata, i Zera, i Sama ary i Miza. Ireo no zanakalahin’i Basemata, vadin’i Esao. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ireto kosa no zanakalahin’i Oholibama, zanakavavin’i Ana izay zanakavavin’i Zibona, vadin’i Esao: Niteraka an’i Jeosy sy i Jalama ary i Kora tamin’i Esao izy.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao no loham-pirenena tamin’ny taranak’i Esao: Ny zanakalahin’i Elifaza, lahimatoan’i Esao, dia i Temana, loham-pireneny, i Omara, loham-pireneny, i Zefo, loham-pireneny, i Kenaza, loham-pireneny, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'i Kora, loham-pireneny, i Gatama, loham-pireneny ary i Amaleka, loham-pireneny. Ireo avy no loham-pirenena tamin’i Elifaza tany amin’ny tany Edoma. Ireo no zanak’i Ada. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao kosa no zanakalahin’i Regoela, zanak’i Esao: I Nahata, loham-pireneny, i Zera, loham-pireneny, i Sama, loham-pireneny ary i Miza, loham-pireneny. Ireo avy no loham-pirenena tamin’i Regoela tany amin’ny tany Edoma. Ireo no zanak’i Basemata, vadin’i Esao. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao no zanakalahin’i Oholibama, vadin’i Esao: I Jeosy, loham-pireneny, i Jalama, loham-pireneny, ary i Kora, loham-pireneny. Ireo avy no loham-pirenena tamin’i Oholibama, zanakavavin’i Ana, vadin’i Esao. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ireo no zanak’i Esao, izay atao koa hoe Edoma, ary ireo no loham-pireneny.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I Esao dia naka vady tamin’ny zanakavavin’ny Kananita, dia i Ada, zanak’i Elona hetita, sy i Oholibama, zanak’i Ana, zanakavavin’i Zibona hivita, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ireto avy no zanakalahin’i Seìra horita, izay nonina tany: I Lotana, i Sobala, i Zibona, i Ana, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'i Disona, i Ezera ary i Disana. Ireo no loham-pirenena tamin’ny Horita, dia ny taranak’i Seìra, tany amin’ny tany Edoma. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao no zanakalahin’i Lotana: I Hory sy i Hemana. I Timna no anabavin’i Lotana. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ireto no zanakalahin’i Sobala: I Alvana, i Manahata, i Ebala, i Sefò ary i Onama. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao no zanakalahin’i Zibona: I Aia sy i Ana. Izany Ana izany ilay nahita ny ranomafana tany an-tany efitra, raha niandry ny borikin’i Zibona rainy izy. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary izao no zanak’i Ana: I Disona sy i Oholibama, zanakavavin’i Ana. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary izao no zanakalahin’i Disona: I Hemdana, i Esbana, i Jitirana ary i Kerana. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao no zanak’i Ezera: I Bilana sy i Zavana ary i Akana. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao no zanak’i Disana: I Oza sy i Arana. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary izao avy no loham-pirenena tamin’ny Horita: I Lotana, loham-pireneny, i Sobala, loham-pireneny, i Zibona, loham-pireneny, i Ana, loham-pireneny, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary i Basemata, zanakavavin’Ismaela sady anabavin’i Nebaiota. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: i Disona, loham-pireneny, i Ezera, loham-pireneny ary i Disana, loham-pireneny. Ireo no loham-pirenena tamin’ny Horita, dia ny loham-pireneny tany amin’ny tany Seìra.
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ireto no mpanjaka nanjaka tany amin’ny tany Edoma, fony tsy mbola nisy mpanjaka nanjaka tamin’ny Zanak’Israely: '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nanjaka tany Edoma i Bela, zanak’i Beora, ka Dinaba no anaran’ny tanànany. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nony maty i Bela dia nanjaka nandimby azy i Jobaba, zanak’i Zera avy tany Bozra. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa maty i Jobaba dia nanjaka nandimby azy i Hosama avy tamin’ny tanin’ny Temanita. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nony maty i Hosama dia nanjaka nandimby azy i Hadada, zanak’i Bedada, izay namely ny Midianita tany amin’ny tany Moaba; Avita no anaran’ny tanànany. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa maty i Hadada dia nanjaka nandimby azy i Samla avy tany Masreka. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nony maty i Samla, dia nanjaka nandimby azy i Saoly avy tany Rehobota eo amoron’ny ony. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa maty i Saoly dia nanjaka nandimby azy i Baala-Hanana, zanak’i Akbora. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nony maty i Baala-Hanana, zanak’i Akbora, dia nanjaka nandimby azy i Hadara. Pao no anaran’ny tanànany, ary ny anaran’ny vadiny dia Mehetabela, zanakavavin’i Matireda, zanakavavin’i Me-Zahaba.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I Ada dia niteraka an’i Elifaza tamin’i Esao; i Basemata dia niteraka an’i Regoela; '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary izao no anaran’ny loham-pirenena tamin’ny taranak’i Esao, araka ny mpianakaviny, araka ny fonenany sy araka ny anarany: i Timna, loham-pirenena, i Alva, loham-pirenena, i Jeteta, loham-pirenena, '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'i Oholibama, loham-pirenena, i Elaha, loham-pirenena, i Pinona, loham-pirenena, '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'i Kenaza, loham-pirenena, i Temana, loham-pirenena, i Mibzara, loham-pirenena, '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: i Magdiela, loham-pirenena ary Irama, loham-pirenena. Ireo no loham-pirenena tamin’ny Edomita, araka ny fonenany tany amin’ny taniny avy. Izany ary no Esao, razamben’ny Edomita.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'i Oholibama dia niteraka an’i Jeosy sy i Jalama ary i Kora. Ireo no zanak’i Esao izay naterany tany amin’ny tany Kanana. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia noentin’i Esao ny vadiny, ny zanany lahy sy ny zanany vavy, ny olona rehetra tao an-tranony, ny omby aman’ondriny sy ny biby fiompiny rehetra mbamin’ny fananany rehetra izay nohariny tany amin’ny tany Kanana ka lasa nankany amin’ny tany lavitra an’i Jakoba rahalahiny izy. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Samy be loatra mantsy ny haren’izy mirahalahy ka tsy nahazo niara-monina izy; tsy omby azy ny tany fivahinianany, noho ny omby aman’ondriny. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Koa nonina tany an-tendrombohitra Seìra i Esao na Edoma.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ireo taranak’i Esao
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 1Tan 1.35-54
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ireto no taranak’i Esao, razamben’ny Edomita any an-tendrombohitra Seìra. '
