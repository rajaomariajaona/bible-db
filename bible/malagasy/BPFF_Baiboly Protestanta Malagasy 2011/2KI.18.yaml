document_id: 2KI.18,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: I Hezekia, mpanjakan’ny Joda
  - type: heading
    content: 2Tan 29.1-2
  - type: text
    content: 'Tamin’ny taona fahatelo nanjakan’i Hosea, zanak’i Elaha, mpanjakan’ny Israely, no nanomboka nanjaka i Hezekia, zanak’i Ahaza, mpanjakan’ny Joda. '
  '10':
  - type: text
    content: 'Nony tapitra ny telo taona dia azon’ireo ny tanàna. Tamin’ny taona fahenina nanjakan’i Hezekia, izay taona fahasivy nanjakan’i Hosea, mpanjakan’ny Israely, no nahazoany an’i Samaria. '
  '11':
  - type: text
    content: 'Ary nandefa ny Israely ho babo tany Asiria ny mpanjakan’i Asiria ka nametraka azy tao Hala sy teo amoron’i Habora, onin’i Gozana, ary teny amin’ny tanànan’ny Mediana, '
  '12':
  - type: text
    content: satria tsy nihaino ny feon’NY TOMPO Andriamaniny izy fa nivadika ny fanekeny, dia izay rehetra nandidian’i Mosesy, mpanompon’NY TOMPO; eny, tsy nihaino na nankatò izany izy.
  - type: heading
    content: Ny nanafihan’i Sankeriba ny fanjakana Joda
  '13':
  - type: text
    content: 'Tamin’ny taona fahefatra amby folo nanjakan’i Hezekia mpanjaka dia niakatra i Sankeriba, mpanjakan’i Asiria, hamely ny tanàna mimanda rehetra any Joda ka nahazo azy. '
  '14':
  - type: text
    content: 'Nandefa iraka tany amin’ny mpanjakan’i Asiria tany Lakisy i Hezekia, mpanjakan’ny Joda, hilaza hoe: Nanao fahadisoana aho! Mialà amiko, fa izay hampitondrainao ahy dia hoentiko. Ary ny mpanjakan’i Asiria dia nampandoa an’i Hezekia, mpanjakan’ny Joda, '
  - type: text
    content: talenta
  - type: text
    content: ' volafotsy telonjato sy talenta volamena telopolo. '
  '15':
  - type: text
    content: 'Ary i Hezekia dia nanome azy ny volafotsy rehetra izay hita tao amin’ny tranon’NY TOMPO sy tao amin’ny efitrano fitahirizana tao amin’ny tranon’ny mpanjaka. '
  '16':
  - type: text
    content: Tamin’izany andro izany no nanendahan’i Hezekia ny volamena tamin’ny varavaran’ny tempolin’NY TOMPO sy tamin’ny tolàna; izy, Hezekia, mpanjakan’ny Joda, no nametaka azy; ary nomeny ho an’ny mpanjakan’i Asiria izany.
  - type: heading
    content: Mandrahona an’i Jerosalema i Sankeriba
  - type: heading
    content: Isa 36.2-22; 2Tan 32.9-16
  '17':
  - type: text
    content: 'Ary ny mpanjakan’i Asiria dia naniraka an’i Tartana sy i Raba-Sarisa ary i Rabsake mbamin’ny miaramila betsaka avy tao Lakisy hankany Jerosalema ho any amin’i Hezekia mpanjaka. Dia niakatra ireny ka tonga tany Jerosalema. Nony tonga teo izy dia nitsangana teo anilan’ny lakandrano amin’ny kamory ambony, teo an-dalambe mankany amin’ny sahan’ny mpanasa lamba. '
  '18':
  - type: text
    content: 'Nony niantso ny mpanjaka izy ireo dia nivoaka ho eo aminy i Eliakima, zanak’i Hilkia, izay lehiben’ny tao an-dapa, sy i Sebna mpitantsoratra ary i Joa, zanak’i Asafa, mpitadidy ny raharaham-panjakana. '
  '19':
  - type: text
    content: 'Dia hoy i Rabsake tamin’ireo: Andeha lazao amin’i Hezekia hoe: Izao no lazain’ny mpanjaka lehibe, dia ny mpanjakan’i Asiria: Inona izato itokianao? '
  '2':
  - type: text
    content: 'Dimy amby roapolo taona izy raha nanomboka nanjaka, ary nanjaka sivy amby roapolo taona tany Jerosalema. Ny anaran’ny reniny dia Aby, zanakavavin’i Zakaria. '
  '20':
  - type: text
    content: 'Teny foana ihany no nataonao hoe: Manana saina sy hery hiady aho. Koa iza no itokianao no mikomy amiko ianao? '
  '21':
  - type: text
    content: 'Fa indro, matoky io tehina volotara torotoro io ianao, dia i Ejipta, nefa raha itehenan’olona iny dia manindrona managorobaka ny tanany; tahaka izany ny farao, mpanjakan’i Ejipta, amin’izay rehetra matoky azy. '
  '22':
  - type: text
    content: 'Raha hoy ianareo amiko hoe: NY TOMPO Andriamanitray no itokianay, moa tsy Azy va ny toerana fanaovana sorona mbamin’ny alitara izay noravan’i Hezekia, izay nilaza tamin’i Joda sy i Jerosalema hoe: Eto anoloan’ity alitara eto Jerosalema ity no hiankohofanareo? '
  '23':
  - type: text
    content: 'Koa aoka hifaninana ianao sy ny tompoko, mpanjakan’i Asiria, fa homeko soavaly roa arivo ianao, raha toa ka manana olona hitaingina azy. '
  '24':
  - type: text
    content: 'Hataonao ahoana no fampiamboho ny mpitari-tafika iray amin’ny mpanompon’ny tompoko, na dia izay kely indrindra aminy aza? Nefa matoky an’i Ejipta ianao hahazoanao kalesy fitondra miady sy mpitaingin-tsoavaly! '
  '25':
  - type: text
    content: 'Ary moa haitraitrako va izao niakarako izao? Tsia, fa NY TOMPO no naniraka ahy handrava ity tany ity ka nilaza hoe: Miakara hamely ity tany ity ka ravao izy.'
  '26':
  - type: text
    content: 'Dia hoy i Eliakima, zanak’i Hilkia, sy i Sebna ary i Joa tamin’i Rabsake: Miangavy anao izahay, teny arameana no mba ataovy aminay mpanomponao, fa fantatray ihany izany; fa aza manao teny jiosy ho ren’ny olona eny ambonin’ny manda. '
  '27':
  - type: text
    content: 'Nefa hoy i Rabsake taminy: Moa ho amin’ny tomponao sy ianao akory va no nanirahan’ny tompoko ahy hilaza izao teny izao, fa tsy ho amin’ny olona izay mipetraka eny ambonin’ny manda, hihinanany ny malotony sy hisotroany ny fivalanan-dranony miaraka aminareo?'
  '28':
  - type: text
    content: 'Dia nijoro teo i Rabsake ka niantso tamin’ny feo mahery tamin’ny teny jiosy hoe: Henoy ny tenin’ny mpanjaka lehibe, dia ny mpanjakan’i Asiria! '
  '29':
  - type: text
    content: 'Izao no lazain’ny mpanjaka: Aza mety hofitahin’i Hezekia ianareo, fa tsy hahavonjy anareo amin’ny tanako izy tsy akory. '
  '3':
  - type: text
    content: 'Nanao izay mahitsy teo imason’NY TOMPO izy, tahaka izay rehetra nataon’i Davida rainy. '
  '30':
  - type: text
    content: 'Ary aza mety hotarihin’i Hezekia hatoky NY TOMPO ianareo amin’ny filazany hoe: NY TOMPO no tena hamonjy antsika ary tsy hatolotra ho eo an-tanan’ny mpanjakan’i Asiria tsy akory ity tanàna ity. '
  '31':
  - type: text
    content: 'Aza mihaino an’i Hezekia; fa izao no lazain’ny mpanjakan’i Asiria: Manaova fihavanana amiko ka mankanesa atỳ amiko dia samy hihinana ny voalobony sy ny aviaviny avy ianareo sady samy hisotro ny rano avy amin’ny lavaka famorian-dranony avy, '
  '32':
  - type: text
    content: 'mandra-piaviko hitondra anareo ho any amin’izay tany tahaka ny taninareo, dia tany misy vary sy ranom-boaloboka, tany misy mofo sy tanim-boaloboka, tany misy oliva tsara, diloilo sy tantely, mba ho velona ianareo fa tsy ho faty; ary aza mihaino an’i Hezekia, raha manoro vohony anareo izy amin’ny filazany hoe: NY TOMPO no hamonjy antsika! '
  '33':
  - type: text
    content: 'Moa nisy nahavonjy ny taniny tamin’ny mpanjakan’i Asiria va ireo andriamanitry ny firenena? '
  '34':
  - type: text
    content: 'Aiza moa ireo andriamanitr’i Hamata sy Arpada? Ary aiza koa ireo andriamanitr’i Sefarvaima sy Henà ary Iva? Nahavonjy an’i Samaria tamin’ny tanako va ireo andriamaniny? '
  '35':
  - type: text
    content: Iza moa amin’ny andriamanitra rehetra amin’ny tany no efa nahavonjy ny taniny tamin’ny tanako, koa aiza no hahavonjen’NY TOMPO an’i Jerosalema amin’ny tanako?
  '36':
  - type: text
    content: 'Dia gina ny olona ka tsy nisy namaly azy na dia teny indraimbava akory aza, satria ny mpanjaka dia efa nandidy hoe: Aza misy mamaly azy. '
  '37':
  - type: text
    content: Ary i Eliakima, zanak’i Hilkia, izay lehiben’ny tao an-dapa, sy i Sebna mpitantsoratra ary i Joa, zanak’i Asafa, mpitadidy ny raharaham-panjakana, dia niditra nankao amin’i Hezekia, amin’ny fitafiana voatriatra, ary nanambara taminy ny tenin’i Rabsake.
  '4':
  - type: text
    content: 'Izy no nandrava ny toerana fanaovana sorona sy namakivaky ny tsangambaton-tsampy ary nikapa ny tsangankazon-tsampy ho an’ny '
  - type: text
    content: Aseraha
  - type: text
    content: ' sy nanorotoro ny menarana varahina izay nataon’i Mosesy; fa ny Zanak’Israely dia nandoro ditin-kazo manitra tamin’iny hatramin’izany andro izany ka ny anarany nataony hoe Nehostana'
  - type: note
    content: 'Nehostana: Ilay menarana varahina.'
  - type: text
    content: '. '
  '5':
  - type: text
    content: 'NY TOMPO, Andriamanitry ny Israely, no nitokiany, koa tsy nisy tahaka azy tamin’ny mpanjakan’ny Joda rehetra, na ny teo aorianany, na ny teo alohany. '
  '6':
  - type: text
    content: 'Nifikitra tamin’NY TOMPO izy ka tsy mba niala tamin’ny fanarahana Azy ary nitandrina ny didy izay nomen’NY TOMPO izy ka tsy mba niala tamin’ny fanarahana Azy, ary nitandrina ny didy izay nomen’NY TOMPO an’i Mosesy. '
  '7':
  - type: text
    content: 'NY TOMPO nomba azy ka nambinina tamin’izay nalehany rehetra izy; nikomy tamin’ny mpanjakan’i Asiria izy ka tsy nanompo azy. '
  '8':
  - type: text
    content: Izy no namely ny Filistina hatrany Gaza sy ny faritaniny, ary noravany avokoa hatramin’ny tilikambo fitilian’ny mpiambina ka hatramin’ny tanàna mimanda.
  - type: heading
    content: Fampahatsiahivana ny nahazoan’ny Asiriana an’i Samaria
  '9':
  - type: text
    content: 'Tamin’ny taona fahefatra nanjakan’i Hezekia mpanjaka, dia ny taona fahafito nanjakan’i Hosea, zanak’i Elaha, mpanjakan’ny Israely izany, no niakaran’i Salmanesera mpanjakan’i Asiria hamely an’i Samaria sy nanaovany fahirano azy. '
