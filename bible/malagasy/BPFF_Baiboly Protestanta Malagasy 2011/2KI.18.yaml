document_id: 2KI.18
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: I Hezekia, mpanjakan’ny Joda
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 2Tan 29.1-2
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Tamin’ny taona fahatelo nanjakan’i Hosea, zanak’i Elaha, mpanjakan’ny Israely, no nanomboka nanjaka i Hezekia, zanak’i Ahaza, mpanjakan’ny Joda. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Dimy amby roapolo taona izy raha nanomboka nanjaka, ary nanjaka sivy amby roapolo taona tany Jerosalema. Ny anaran’ny reniny dia Aby, zanakavavin’i Zakaria. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Nanao izay mahitsy teo imason’NY TOMPO izy, tahaka izay rehetra nataon’i Davida rainy. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Izy no nandrava ny toerana fanaovana sorona sy namakivaky ny tsangambaton-tsampy ary nikapa ny tsangankazon-tsampy ho an’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Aseraha
  - type: text
    text: ' sy nanorotoro ny menarana varahina izay nataon’i Mosesy; fa ny Zanak’Israely dia nandoro ditin-kazo manitra tamin’iny hatramin’izany andro izany ka ny anarany nataony hoe Nehostana'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Nehostana: Ilay menarana varahina.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'NY TOMPO, Andriamanitry ny Israely, no nitokiany, koa tsy nisy tahaka azy tamin’ny mpanjakan’ny Joda rehetra, na ny teo aorianany, na ny teo alohany. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Nifikitra tamin’NY TOMPO izy ka tsy mba niala tamin’ny fanarahana Azy ary nitandrina ny didy izay nomen’NY TOMPO izy ka tsy mba niala tamin’ny fanarahana Azy, ary nitandrina ny didy izay nomen’NY TOMPO an’i Mosesy. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'NY TOMPO nomba azy ka nambinina tamin’izay nalehany rehetra izy; nikomy tamin’ny mpanjakan’i Asiria izy ka tsy nanompo azy. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Izy no namely ny Filistina hatrany Gaza sy ny faritaniny, ary noravany avokoa hatramin’ny tilikambo fitilian’ny mpiambina ka hatramin’ny tanàna mimanda.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fampahatsiahivana ny nahazoan’ny Asiriana an’i Samaria
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Tamin’ny taona fahefatra nanjakan’i Hezekia mpanjaka, dia ny taona fahafito nanjakan’i Hosea, zanak’i Elaha, mpanjakan’ny Israely izany, no niakaran’i Salmanesera mpanjakan’i Asiria hamely an’i Samaria sy nanaovany fahirano azy. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Nony tapitra ny telo taona dia azon’ireo ny tanàna. Tamin’ny taona fahenina nanjakan’i Hezekia, izay taona fahasivy nanjakan’i Hosea, mpanjakan’ny Israely, no nahazoany an’i Samaria. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary nandefa ny Israely ho babo tany Asiria ny mpanjakan’i Asiria ka nametraka azy tao Hala sy teo amoron’i Habora, onin’i Gozana, ary teny amin’ny tanànan’ny Mediana, '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: satria tsy nihaino ny feon’NY TOMPO Andriamaniny izy fa nivadika ny fanekeny, dia izay rehetra nandidian’i Mosesy, mpanompon’NY TOMPO; eny, tsy nihaino na nankatò izany izy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nanafihan’i Sankeriba ny fanjakana Joda
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Tamin’ny taona fahefatra amby folo nanjakan’i Hezekia mpanjaka dia niakatra i Sankeriba, mpanjakan’i Asiria, hamely ny tanàna mimanda rehetra any Joda ka nahazo azy. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Nandefa iraka tany amin’ny mpanjakan’i Asiria tany Lakisy i Hezekia, mpanjakan’ny Joda, hilaza hoe: Nanao fahadisoana aho! Mialà amiko, fa izay hampitondrainao ahy dia hoentiko. Ary ny mpanjakan’i Asiria dia nampandoa an’i Hezekia, mpanjakan’ny Joda, '
  - type: usfm
    marker: w
    children:
    - type: text
      text: talenta
  - type: text
    text: ' volafotsy telonjato sy talenta volamena telopolo. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary i Hezekia dia nanome azy ny volafotsy rehetra izay hita tao amin’ny tranon’NY TOMPO sy tao amin’ny efitrano fitahirizana tao amin’ny tranon’ny mpanjaka. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Tamin’izany andro izany no nanendahan’i Hezekia ny volamena tamin’ny varavaran’ny tempolin’NY TOMPO sy tamin’ny tolàna; izy, Hezekia, mpanjakan’ny Joda, no nametaka azy; ary nomeny ho an’ny mpanjakan’i Asiria izany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mandrahona an’i Jerosalema i Sankeriba
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Isa 36.2-22; 2Tan 32.9-16
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary ny mpanjakan’i Asiria dia naniraka an’i Tartana sy i Raba-Sarisa ary i Rabsake mbamin’ny miaramila betsaka avy tao Lakisy hankany Jerosalema ho any amin’i Hezekia mpanjaka. Dia niakatra ireny ka tonga tany Jerosalema. Nony tonga teo izy dia nitsangana teo anilan’ny lakandrano amin’ny kamory ambony, teo an-dalambe mankany amin’ny sahan’ny mpanasa lamba. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Nony niantso ny mpanjaka izy ireo dia nivoaka ho eo aminy i Eliakima, zanak’i Hilkia, izay lehiben’ny tao an-dapa, sy i Sebna mpitantsoratra ary i Joa, zanak’i Asafa, mpitadidy ny raharaham-panjakana. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Dia hoy i Rabsake tamin’ireo: Andeha lazao amin’i Hezekia hoe: Izao no lazain’ny mpanjaka lehibe, dia ny mpanjakan’i Asiria: Inona izato itokianao? '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Teny foana ihany no nataonao hoe: Manana saina sy hery hiady aho. Koa iza no itokianao no mikomy amiko ianao? '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Fa indro, matoky io tehina volotara torotoro io ianao, dia i Ejipta, nefa raha itehenan’olona iny dia manindrona managorobaka ny tanany; tahaka izany ny farao, mpanjakan’i Ejipta, amin’izay rehetra matoky azy. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Raha hoy ianareo amiko hoe: NY TOMPO Andriamanitray no itokianay, moa tsy Azy va ny toerana fanaovana sorona mbamin’ny alitara izay noravan’i Hezekia, izay nilaza tamin’i Joda sy i Jerosalema hoe: Eto anoloan’ity alitara eto Jerosalema ity no hiankohofanareo? '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Koa aoka hifaninana ianao sy ny tompoko, mpanjakan’i Asiria, fa homeko soavaly roa arivo ianao, raha toa ka manana olona hitaingina azy. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Hataonao ahoana no fampiamboho ny mpitari-tafika iray amin’ny mpanompon’ny tompoko, na dia izay kely indrindra aminy aza? Nefa matoky an’i Ejipta ianao hahazoanao kalesy fitondra miady sy mpitaingin-tsoavaly! '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary moa haitraitrako va izao niakarako izao? Tsia, fa NY TOMPO no naniraka ahy handrava ity tany ity ka nilaza hoe: Miakara hamely ity tany ity ka ravao izy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Dia hoy i Eliakima, zanak’i Hilkia, sy i Sebna ary i Joa tamin’i Rabsake: Miangavy anao izahay, teny arameana no mba ataovy aminay mpanomponao, fa fantatray ihany izany; fa aza manao teny jiosy ho ren’ny olona eny ambonin’ny manda. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Nefa hoy i Rabsake taminy: Moa ho amin’ny tomponao sy ianao akory va no nanirahan’ny tompoko ahy hilaza izao teny izao, fa tsy ho amin’ny olona izay mipetraka eny ambonin’ny manda, hihinanany ny malotony sy hisotroany ny fivalanan-dranony miaraka aminareo?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Dia nijoro teo i Rabsake ka niantso tamin’ny feo mahery tamin’ny teny jiosy hoe: Henoy ny tenin’ny mpanjaka lehibe, dia ny mpanjakan’i Asiria! '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Izao no lazain’ny mpanjaka: Aza mety hofitahin’i Hezekia ianareo, fa tsy hahavonjy anareo amin’ny tanako izy tsy akory. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ary aza mety hotarihin’i Hezekia hatoky NY TOMPO ianareo amin’ny filazany hoe: NY TOMPO no tena hamonjy antsika ary tsy hatolotra ho eo an-tanan’ny mpanjakan’i Asiria tsy akory ity tanàna ity. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Aza mihaino an’i Hezekia; fa izao no lazain’ny mpanjakan’i Asiria: Manaova fihavanana amiko ka mankanesa atỳ amiko dia samy hihinana ny voalobony sy ny aviaviny avy ianareo sady samy hisotro ny rano avy amin’ny lavaka famorian-dranony avy, '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'mandra-piaviko hitondra anareo ho any amin’izay tany tahaka ny taninareo, dia tany misy vary sy ranom-boaloboka, tany misy mofo sy tanim-boaloboka, tany misy oliva tsara, diloilo sy tantely, mba ho velona ianareo fa tsy ho faty; ary aza mihaino an’i Hezekia, raha manoro vohony anareo izy amin’ny filazany hoe: NY TOMPO no hamonjy antsika! '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Moa nisy nahavonjy ny taniny tamin’ny mpanjakan’i Asiria va ireo andriamanitry ny firenena? '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Aiza moa ireo andriamanitr’i Hamata sy Arpada? Ary aiza koa ireo andriamanitr’i Sefarvaima sy Henà ary Iva? Nahavonjy an’i Samaria tamin’ny tanako va ireo andriamaniny? '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Iza moa amin’ny andriamanitra rehetra amin’ny tany no efa nahavonjy ny taniny tamin’ny tanako, koa aiza no hahavonjen’NY TOMPO an’i Jerosalema amin’ny tanako?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Dia gina ny olona ka tsy nisy namaly azy na dia teny indraimbava akory aza, satria ny mpanjaka dia efa nandidy hoe: Aza misy mamaly azy. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Ary i Eliakima, zanak’i Hilkia, izay lehiben’ny tao an-dapa, sy i Sebna mpitantsoratra ary i Joa, zanak’i Asafa, mpitadidy ny raharaham-panjakana, dia niditra nankao amin’i Hezekia, amin’ny fitafiana voatriatra, ary nanambara taminy ny tenin’i Rabsake.
