  '1':
  - type: usfm
    marker: imt1
    children:
    - type: text
      text: INDRAY MIJERY
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Ny bokin’i Rota dia isan’ireo boky natao hoe Ny Horonam-boky dimy, koa izy no novakina tamin’ny fety fanateram-bokatra izay atao koa hoe Ny Pentekosta.
  - type: usfm
    marker: is1
    children:
    - type: text
      text: Ny votoatin’ny Boky
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Ny tantaran’i Rota dia nitranga tamin’ny andron’ny Mpitsara, mampiseho an’i Rota, vehivavy moabita, nefa tonga isan’ny razan’i Jesosy.
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Maty tany Moaba ny vadiny, nefa izy dia tsy nety nisaraka tamin’i Naomy rafozany izay Israeliana avy any Betlehema, izay maty koa ny vadiny ka niverina nankany Betlehema. Nanaiky hanompo an’Andriamanitry ny Israely koa i Rota. Rehefa tonga tany Betlehema izy mianaka dia namantana fahasahiranana, nefa nisy fianakaviana akaiky natao hoe Boaza, izay nanaiky hanavotra ny taniny sy hanambady an’i Rota mba hamelo-maso ny fianakaviany. Izany dia araka ny andraikitra maha mpanavotra an’i Boaza, araka ny lalàna tao amin’ny Israely (Lev 25.25-31 sy Deo 25.5-10). Niteraka izy mivady ary tonga razamben’i Davida; noho izany koa dia voaisa ho razan’i Jesosy ara-nofo i Rota (Mat 1.5).
