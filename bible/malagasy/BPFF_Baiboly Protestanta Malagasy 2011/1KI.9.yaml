document_id: 1KI.9,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Miseho fanindroany amin’i Solomona NY TOMPO
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 2Tan 7.11-22
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa vitan’i Solomona araka izay rehetra niriny hotanterahina ny fananganana ny tranon’NY TOMPO sy ny lapan’ny mpanjaka '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Roapolo taona no nanaovan’i Solomona ny trano roa, dia ny tranon’NY TOMPO sy ny lapan’ny mpanjaka. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary satria i Hirama, mpanjakan’i Tiro, nanome an’i Solomona hazo sedera sy hazo kipreso ary volamena, araka izay rehetra niriny, dia nomen’i Solomona tanàna roapolo tany amin’ny tany Galilia izy. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Niala tany Tiro hizaha ny tanàna izay nomen’i Solomona azy i Hirama, nefa tsy tiany ireny. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy izy: Inona ireo tanàna nomenao ahy ireo, ry rahalahiko? Ary ireny dia natao hoe tany Kabola'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Kabola: Tsinontsinona.'
      marker-yv: yv-n
    - type: text
      text: ' mandraka androany. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nampanatitra volamena roapolo amby zato '
    - type: usfm
      marker: w
      children:
      - type: text
        text: talenta
    - type: text
      text: ' ho an’ny mpanjaka kosa anefa i Hirama.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nampanao fanompoana ny olona i Solomona mpanjaka tamin’ny nanaovany ny tranon’NY TOMPO, ny lapan’andriana, i Milo, ny mandan’i Jerosalema, i Hazora, i Megido ary i Gezera. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I Farao, mpanjakan’i Ejipta moa dia nanafika an’i Gezera ka nahazo azy ary nandoro azy tamin’ny afo. Ny Kananita izay nitoetra tao an-tanàna dia novonoiny ka ny tanàna dia natolony ho fanomezana ho an’ny zanany vavy, vadin’i Solomona. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Namboarin’i Solomona mpanjaka i Gezera, i Bety-Horona ambany, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'i Baleta ary i Tadmora any an-tany efitra, any amin’ny tany Hamata, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'mbamin’ny tanàna fitahirizana rehetra izay an’i Solomona, ny tanàna fitoeran’ny kalesy fitondra miady, ny tanàna fitoeran’ny mpitaingin-tsoavaly ary izay tian’i Solomona haorina tany Jerosalema sy tany Libanona ary tany amin’ny tany nanjakany rehetra. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia niseho tamin’i Solomona indray NY TOMPO, tahaka ilay nisehoany taminy tao Gibeona. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny olona sisa rehetra tamin’ny Amorita, ny Hetita, ny Perizita, ny Hivita ary ny Jebosita, izay tsy isan’ny Zanak’Israely, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'izany hoe ny taranak’izy ireo izay sisa nandimby azy teo amin’ny tany, ary tsy azon’ny Israely natao ho zavatra voaozona, ireo no nampanaovin’i Solomona fanompoana mandraka androany. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsy nisy nampanaovin’i Solomona fanompoana kosa tamin’ny Zanak’Israely, satria izy ireo no miaramila miady, mpanompony, mpitari-tafika, mpanafika, lehiben’ny kalesy fitondrany miady sy ny mpitaingin-tsoavaliny. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao no isan’ireo mpifehy voatendry izay nitandrina ny asan’i Solomona: Dimampolo sy dimanjato lahy ny mpifehy ny vahoaka manao ny asa.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Rehefa niakatra avy any amin’ny Tanànan’i Davida hankany amin’ny tranony izay nataon’i Solomona ho azy ny zanakavavin’i Farao, izay vao nanangana an’i Milo koa izy.
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Intelo isan-taona no nanoloran’i Solomona fanatitra dorana manontolo sy fanati-pihavanana teo ambonin’ny alitara izay naoriny ho an’NY TOMPO ka sady nandoro ditin-kazo manitra teo ambonin’ny alitara teo anatrehan’NY TOMPO izy amin’io. Dia novitainy ny Trano.
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nanao sambo tao Eziona-Gebera, izay ao anilan’i Elota, ao amoron’ny Ranomasina Mena, any amin’ny tany Edoma, i Solomona mpanjaka. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I Hirama dia nampandeha ny mpanompony tamin’ny sambo mba hiaraka amin’ny mpanompon’i Solomona, fa izy ireo dia tantsambo nahay ranomasina. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nankany Ofira ireo naka volamena roapolo sy efajato '
    - type: usfm
      marker: w
      children:
      - type: text
        text: talenta
    - type: text
      text: ' noentiny tany amin’i Solomona mpanjaka.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy NY TOMPO taminy: Efa reko ny vavaka sy ny fifonana izay nataonao teo anatrehako; koa hamasiniko ity trano nataonao ity mba hampitoerana ny anarako mandrakizay, ary ho amin’ity mandrakariva ny masoko sy ny foko. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary raha mandeha eo anatrehako ianao, tahaka ny nandehanan’i Davida rainao tamin’ny fahitsian’ny fo sy ny fahamarinana ka manatanteraka izay rehetra nandidiako anao sady mitandrina ny didiko sy ny fitsipiko, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia hampitoeriko mandrakizay amin’ny Israely ny sezafiandrianan’ny fanjakanao, araka ilay nolazaiko tamin’i Davida rainao hoe: Tsy ho diso zanakalahy eo amin’ny sezafiandrianan’ny Israely ianao. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa raha miala amin’ny fanarahana Ahy kosa ianareo na ny zanakareo ka tsy mitandrina ny lalànako sy ny didiko izay nataoko teo anoloanareo ka mandeha manompo andriamanitra hafa sy miankohoka eo anatrehany, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia hofongorako tsy ho amin’ny tany izay nomeko azy ny Israely; ary ity trano izay nohamasiniko ho an’ny anarako ity dia hovereziko tsy ho eo anatrehako; ary ho tonga oha-pitenenana sy faneso any amin’ny firenena rehetra ny Israely; '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary na dia avo aza ity trano ity dia mbola hitalanjonan’izay rehetra mandalo izy sady hisioka azy ireo ka hilaza hoe: Naninona re no dia nataon’NY TOMPO toy izao ity tany ity sy ity trano ity? '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hisy hamaly hoe: Satria ny olona nahafoy NY TOMPO Andriamaniny izay nitondra ny razany nivoaka avy tany amin’ny tany Ejipta, fa nifikitra tamin’ny andriamanitra hafa sy niankohoka teo anatrehany izy ireo ka nanompo izany; izany no nampidiran’NY TOMPO izao loza rehetra izao taminy.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ireo asa samihafa nosahanin’i Solomona
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 2Tan 8.1-18
    marker-yv: yv-h
