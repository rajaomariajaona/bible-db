document_id: 1TH.4,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny tena ilain’Andriamanitra dia ny hanamasinana anareo
  - type: text
    content: 'Farany, ry rahalahy, dia mangataka aminareo sy mananatra anareo ao amin’i Jesosy Tompo izahay, mba ho araka izay nampianarinay anareo no fandehananareo, mba hankasitrahan’Andriamanitra; koa arakaraka ny andehananareo ihany no hitomboanareo bebe kokoa. '
  '10':
  - type: text
    content: 'Fa manao izany ihany ianareo amin’ny rahalahy rehetra manerana an’i Makedonia. Nefa mananatra anareo ihany izahay, ry rahalahy, mba hitombo bebe kokoa ianareo, '
  '11':
  - type: text
    content: 'ary mba hokendrenareo ny ho tafatoetra tsara sy hitandrina ny raharahanareo ary hiasa amin’ny tananareo araka izay nandidianay anareo, '
  '12':
  - type: text
    content: mba handehananareo amin’izay fitondrantena mahamendrika amin’ny eo ivelany ka tsy hiankina na amin’iza na amin’iza ianareo.
  - type: heading
    content: Ny amin’izay efa nodimandry
  '13':
  - type: text
    content: 'Fa tsy tianay tsy ho fantatrareo, ry rahalahy, ny amin’izay efa nodimandry mba tsy halahelovanareo tahaka ny sasany izay tsy manana fanantenana. '
  '14':
  - type: text
    content: 'Fa raha inoantsika fa efa maty Jesosy sady efa nitsangana indray dia toy izany koa no hitondran’Andriamanitra izay efa nodimandry tao amin’i Jesosy hiaraka Aminy. '
  '15':
  - type: text
    content: 'Fa izao no lazainay aminareo amin’ny tenin’ny Tompo: Isika, izay velona ka mbola ho eo amin’ny andro hiavian’ny Tompo, dia tsy mba hialoha izay efa nodimandry tsy akory. '
  '16':
  - type: text
    content: 'Fa ny Tompo, Izy tenany, no hidina avy any an-danitra, miaraka amin’ny baiko sy ny feon’ny arikanjely ary ny trompetran’Andriamanitra, koa izay maty ao amin’i '
  - type: text
    content: Kristy
  - type: text
    content: ' no hitsangana aloha; '
  '17':
  - type: text
    content: 'ary rehefa afaka izany dia isika izay velona ka mbola ho eo no hakarina hiaraka amin’ireo ho eny amin’ny rahona hitsena ny Tompo any amin’ny habakabaka; dia ho any amin’ny Tompo mandrakariva isika. '
  '18':
  - type: text
    content: Koa dia mifampionòna ianareo amin’ireo teny ireo.
  '2':
  - type: text
    content: Fa fantatrareo ny didy nomenay anareo avy tamin’i Jesosy Tompo.
  '3':
  - type: text
    content: 'Fa izao no sitrapon’Andriamanitra dia ny hanamasinana anareo ka hifadianareo ny fijangajangana; '
  '4':
  - type: text
    content: 'mba samy hahafantatra izay hahazoanareo vady amin’ny fahamasinana sy ny voninahitra ianareo, '
  '5':
  - type: text
    content: 'tsy amin’ny filana fotsiny, tahaka ny '
  - type: text
    content: Jentilisa
  - type: text
    content: ' izay tsy mahalala an’Andriamanitra; '
  '6':
  - type: text
    content: 'aoka tsy hisy hanao saina hifetsy ny rahalahiny amin’izany raharaha izany; fa ny Tompo no mpamaly ny amin’izany zavatra rehetra izany, toy ny nolazainay sy nambaranay taminareo ihany. '
  '7':
  - type: text
    content: 'Fa tsy niantso antsika ho amin’ny fahalotoana Andriamanitra fa amin’ny fahamasinana. '
  '8':
  - type: text
    content: Koa izay mandà dia tsy olona no laviny fa Andriamanitra izay manome anareo ny Fanahiny Masina.
  '9':
  - type: text
    content: 'Fa ny amin’ny fifankatiavan’ny mpirahalahy dia tsy misy tokony hosoratako aminareo satria ny tenanareo dia ampianarin’Andriamanitra hifankatia. '
