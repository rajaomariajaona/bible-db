document_id: PSA.148,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Fiderana an’Andriamanitra any an-danitra sy etỳ an-tany
  - type: text
    content: ' '
  - type: text
    content: Haleloia
  - type: text
    content: .
  - type: text
    content: Miderà NY TOMPO avy any an-danitra,
  - type: text
    content: miderà Azy, ianareo any ambony.
  '10':
  - type: text
    content: ny bibidia sy ny biby fiompy rehetra,
  - type: text
    content: ny biby mandady na mikisaka ary ny voromanidina,
  '11':
  - type: text
    content: ny mpanjaka amin’ny tany sy ny vahoaka rehetra,
  - type: text
    content: ny mpitondra sy ny mpitsara rehetra amin’ny tany,
  '12':
  - type: text
    content: na ny zatovolahy na ny zatovovavy,
  - type: text
    content: na ny antitra na ny tanora,
  '13':
  - type: text
    content: samia midera ny anaran’NY TOMPO avokoa
  - type: text
    content: fa ny anarany ihany no misandratra;
  - type: text
    content: ambonin’ny tany sy ny lanitra ny voninahiny.
  '14':
  - type: text
    content: 'Ary manandratra '
  - type: text
    content: tandroka
  - type: text
    content: ' ho an’ny olony Izy,'
  - type: text
    content: dia fiderana ho an’ny olony masina rehetra;
  - type: text
    content: eny, ho an’ny Zanak’Israely, firenena akaiky Azy.
  - type: text
    content: Haleloia.
  '2':
  - type: text
    content: Miderà Azy, ry anjeliny rehetra;
  - type: text
    content: miderà Azy, ry miaramilany rehetra.
  '3':
  - type: text
    content: Miderà Azy, ry masoandro amam-bolana;
  - type: text
    content: miderà Azy, ry kintana mazava rehetra.
  '4':
  - type: text
    content: Miderà Azy, ry lanitry ny lanitra,
  - type: text
    content: ary ianareo rano any ambonin’ny lanitra.
  '5':
  - type: text
    content: Aoka hidera ny anaran’NY TOMPO ireo,
  - type: text
    content: fa Izy no nandidy dia ary ireo.
  '6':
  - type: text
    content: Nampitoetra ireo ho mandrakizay doria Izy;
  - type: text
    content: nomeny lalàna ireo ka tsy hihoatra izany.
  '7':
  - type: text
    content: Miderà NY TOMPO avy etỳ an-tany.
  - type: text
    content: 'Ianareo '
  - type: text
    content: dragona
  - type: text
    content: ' sy ianareo rano lalina rehetra,'
  '8':
  - type: text
    content: ny afo sy ny havandra, ny orampanala sy ny zavona,
  - type: text
    content: ny rivotra mahery izay mankatò ny teniny,
  '9':
  - type: text
    content: ny tendrombohitra sy ny havoana rehetra,
  - type: text
    content: ny hazo fihinam-boa sy ny sedera rehetra,
