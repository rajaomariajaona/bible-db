document_id: PSA.148
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fiderana an’Andriamanitra any an-danitra sy etỳ an-tany
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Haleloia
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: Miderà NY TOMPO avy any an-danitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: miderà Azy, ianareo any ambony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Miderà Azy, ry anjeliny rehetra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: miderà Azy, ry miaramilany rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Miderà Azy, ry masoandro amam-bolana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: miderà Azy, ry kintana mazava rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Miderà Azy, ry lanitry ny lanitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ianareo rano any ambonin’ny lanitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Aoka hidera ny anaran’NY TOMPO ireo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa Izy no nandidy dia ary ireo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Nampitoetra ireo ho mandrakizay doria Izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: nomeny lalàna ireo ka tsy hihoatra izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Miderà NY TOMPO avy etỳ an-tany.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ianareo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: dragona
  - type: text
    text: ' sy ianareo rano lalina rehetra,'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ny afo sy ny havandra, ny orampanala sy ny zavona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny rivotra mahery izay mankatò ny teniny,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ny tendrombohitra sy ny havoana rehetra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny hazo fihinam-boa sy ny sedera rehetra,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ny bibidia sy ny biby fiompy rehetra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny biby mandady na mikisaka ary ny voromanidina,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ny mpanjaka amin’ny tany sy ny vahoaka rehetra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny mpitondra sy ny mpitsara rehetra amin’ny tany,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: na ny zatovolahy na ny zatovovavy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: na ny antitra na ny tanora,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: samia midera ny anaran’NY TOMPO avokoa
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny anarany ihany no misandratra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ambonin’ny tany sy ny lanitra ny voninahiny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary manandratra '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tandroka
  - type: text
    text: ' ho an’ny olony Izy,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia fiderana ho an’ny olony masina rehetra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, ho an’ny Zanak’Israely, firenena akaiky Azy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Haleloia.
