type_code: plt
verses:
  '1':
  - type: text
    content: INDRAY MIJERY
  - type: text
    content: Ny votoatin’ny Epistily
  - type: text
    content: Ny Epistily dia manomboka amin’ny fananarana ny mpamaky mba hiorina tsara amin’ny maha voafidy sy voaantso azy. Ny mpanoratra dia mananatra ny mpamaky mba tsy hifandray amin’ny mpaminany sandoka, fa hiharan’ny fitsaran’Andriamanitra ireny. Maniratsira izy ireny, milaza fa mitaredretra ny fiavian’ny Tompo. Ny mpamaky kosa dia hiorina tsara mba tsy ho voaloton’ny ratsy fanahy, fa ho avy tampoka sahala amin’ny mpangalatra ny Tompo. Hitombo amin’ny fahasoavana sy ny fahalalana an’i Jesosy Kristy kosa izy.
  - type: text
    content: Na dia ny fitolomana amin’ny fampianarana sandoka aza no anton’ny Epistily dia misongadina ao, toy ny ao amin’ny 1Petera koa, ny amin’ny fanantenana sy ny fahalalana tsara an’i Jesosy Kristy.
  - type: text
    content: Ny firafitry ny Boky
  - type: text
    content: 'Fitarihanteny: 1.1-2'
  - type: text
    content: 'Fananarana mba handeha amin’ny toe-panahy araka an’Andriamanitra sy hiorina tsara amin’ny maha voafidy sy voaantso: 1.3-21'
  - type: text
    content: 'Fampitandremana ny amin’ny mpaminany sandoka: 2.1-22'
  - type: text
    content: 'Ny amin’ny fiavian’ny Tompo, ary fananarana ho amin’ny fitondrantena masina eo am-piandrasana izany: 3.1-13'
  - type: text
    content: 'Famaranana: 3.14-18'
