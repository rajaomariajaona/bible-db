document_id: 2PE.INTRO1
type_code: plt
segments:
- type: usfm
  marker: imt1
  children:
  - type: text
    text: INDRAY MIJERY
- type: usfm
  marker: is1
  children:
  - type: text
    text: Ny votoatin’ny Epistily
- type: usfm
  marker: ip
  children:
  - type: text
    text: Ny Epistily dia manomboka amin’ny fananarana ny mpamaky mba hiorina tsara amin’ny maha voafidy sy voaantso azy. Ny mpanoratra dia mananatra ny mpamaky mba tsy hifandray amin’ny mpaminany sandoka, fa hiharan’ny fitsaran’Andriamanitra ireny. Maniratsira izy ireny, milaza fa mitaredretra ny fiavian’ny Tompo. Ny mpamaky kosa dia hiorina tsara mba tsy ho voaloton’ny ratsy fanahy, fa ho avy tampoka sahala amin’ny mpangalatra ny Tompo. Hitombo amin’ny fahasoavana sy ny fahalalana an’i Jesosy Kristy kosa izy.
- type: usfm
  marker: ip
  children:
  - type: text
    text: Na dia ny fitolomana amin’ny fampianarana sandoka aza no anton’ny Epistily dia misongadina ao, toy ny ao amin’ny 1Petera koa, ny amin’ny fanantenana sy ny fahalalana tsara an’i Jesosy Kristy.
- type: usfm
  marker: iot
  children:
  - type: text
    text: Ny firafitry ny Boky
- type: usfm
  marker: io1
  children:
  - type: text
    text: 'Fitarihanteny: 1.1-2'
- type: usfm
  marker: io1
  children:
  - type: text
    text: 'Fananarana mba handeha amin’ny toe-panahy araka an’Andriamanitra sy hiorina tsara amin’ny maha voafidy sy voaantso: 1.3-21'
- type: usfm
  marker: io1
  children:
  - type: text
    text: 'Fampitandremana ny amin’ny mpaminany sandoka: 2.1-22'
- type: usfm
  marker: io1
  children:
  - type: text
    text: 'Ny amin’ny fiavian’ny Tompo, ary fananarana ho amin’ny fitondrantena masina eo am-piandrasana izany: 3.1-13'
- type: usfm
  marker: io1
  children:
  - type: text
    text: 'Famaranana: 3.14-18'
