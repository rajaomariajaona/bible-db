document_id: EZK.32
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fitomaniana noho ny nanjo an’i Farao sy i Ejipta
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Tamin’ny andro voalohany tamin’ny volana faharoa amby folo, tamin’ny taona faharoa amby folo dia tonga tamiko ny tenin’NY TOMPO hoe:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ry '
  - type: usfm
    marker: w
    children:
    - type: text
      text: zanak’olona
  - type: text
    text: ', manaova hira fahalahelovana ny amin’i Farao mpanjakan’i Ejipta ka lazao aminy hoe: Nanao ny tenanao ho tahaka ny liona tanora tamin’ny firenena ianao,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: kanjo tahaka ny dragona ao anatin’ny ranomasina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: nitsoriaka teny amin’ny oninao ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia nanakobankobana ny rano tamin’ny tongotrao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka nahaloto ny ony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Izao no lazain’NY TOMPO Andriamanitra:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny firenena betsaka tafatambatra
- type: usfm
  marker: q1
  children:
  - type: text
    text: no hoentiko mamelatra ny haratoko aminao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hakarin’ireny amin’ny haratoko ianao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Hatsipiko eny an-tanety ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hariako any an-tsaha,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hampitangoroniko eo aminao ny voromanidina rehetra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka homeko hivokisan’ny bibidia rehetra ny tenanao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Haeliko eny an-tendrombohitra ny nofonao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hofenoiko ny tenabenao ny lohasaha.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Hataoko safotry ny ranao ny tany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hatramin’ny tendrombohitra aza;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ho feno anao ny ony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Rehefa vonoiko ny fahazavanao
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hosaronako ny lanitra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hotafiako lamba fisaonana ny kintany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny masoandro dia hotakonako rahona
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny volana dia tsy hangarangarana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Eny, noho ny aminao dia hotafiako lamba fisaonana avokoa
- type: usfm
  marker: q1
  children:
  - type: text
    text: ireny fanazavana eny amin’ny lanitra ireny
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hosaronako haizina ny taninao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hoy NY TOMPO Andriamanitra.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Hataoko sosotra ny fon’ny firenena maro rehefa ampandrenesiko ny firenena maro ny naharavanao, dia ny amin’ny tany izay tsy fantatrao. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Eny, hataoko talanjona anao ny firenena maro, ary hipararetra noho ny aminao ny mpanjakany, rehefa asidiko eo imasony ny sabatro, ary samy hangovitra lalandava noho ny ainy izy amin’ny andro haharavanao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Fa izao no lazain’NY TOMPO Andriamanitra: Ny sabatry ny mpanjakan’i Babilona dia ho tonga aminao.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ny sabatry ny mahery izay samy masiaka indrindra amin’ny firenena,
- type: usfm
  marker: q1
  children:
  - type: text
    text: no hoentiko mandavo ny vahoakanao marobe,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia horavany ny reharehan’i Ejipta
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka ho fongotra ny vahoakany marobe rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Haringako koa ny biby fiompiny rehetra
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny amoron’ny ranobe,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy hanakobankobana azy intsony ny tongotry ny olona
- type: usfm
  marker: q1
  children:
  - type: text
    text: na handoto azy ny kitron’ny biby fiompy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Dia hampandriako ny ranony
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hampandehaniko toy ny diloilo ny oniny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hoy NY TOMPO Andriamanitra,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Rehefa ataoko lao ny tany Ejipta
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hofoanako amin’ny tany izay rehetra nahafeno azy teo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: haringako ny monina rehetra ao aminy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ho fantatra fa Izaho no TOMPO.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Izany no hira fahalahelovana hataon’ny olona. Ny zanakavavin’ny firenena no hihira izany; eny, ho fisaonana an’i Ejipta sy ny vahoakany marobe rehetra no hihirany izany, hoy NY TOMPO Andriamanitra.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fitomaniana ny amin’ireo firenena manodidina
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Tamin’ny andro fahadimy amby folo tamin’ny volana, tamin’ny taona faharoa amby folo dia tonga tamiko ny tenin’NY TOMPO hoe:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ry zanak’olona, isaony ny vahoaka maroben’i Ejipta, ary ampidino izy mbamin’ny zanakavavin’ny firenena malaza
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho any ambanin’ny tany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: miaraka amin’izay midina any an-davaka!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Mihoatra noho ny an’iza moa ny hatsaran-tarehinao?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Midìna ka mandria miaraka amin’izay tsy voafora!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Any amin’ny voatrabaky ny sabatra no hiampatramparany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ny sabatra dia efa voatolotra:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tariho i Ejipta mbamin’ny vahoakany marobe rehetra!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Izy sy ny nanampy azy no resahin’ireo malaza amin’ny lehilahy mahery
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'any amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: fitoeran’ny maty
  - type: text
    text: ':'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tafidina ka miampatra ny tsy voafora,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ireo voatrabaky ny sabatra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ao koa i Asiria mbamin’ny vahoakany marobe rehetra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: manodidina azy ny fasany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: voatrabaka izy rehetra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: samy lavon’ny sabatra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Natao any amin’ny lavaka farany ambany ny fasany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny vahoakany marobe dia manodidina ny fasany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: voatrabaka izy rehetra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: samy lavon’ny sabatra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ireo izay nahatonga tahotra tany amin’ny tanin’ny velona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Ao koa i Elama mbamin’ny vahoakany marobe rehetra
- type: usfm
  marker: q1
  children:
  - type: text
    text: manodidina ny fasany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: voatrabaka izy rehetra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: samy lavon’ny sabatra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tafidina tsy voafora
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho any ambanin’ny tany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ireo nahatonga ny fahatahorana azy tany amin’ny tanin’ny velona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: samy mitondra henatra
- type: usfm
  marker: q1
  children:
  - type: text
    text: miaraka amin’izay midina any an-davaka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Teo amin’ny voatrabaka no nanaovana fandriana ho azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: mbamin’ny vahoakany marobe rehetra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: manodidina azy ny fasany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: izy rehetra dia samy tsy voafora sady voatrabaky ny sabatra
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria niely tany amin’ny tanin’ny velona ny fahatahorana azy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary samy mitondra henatra miaraka amin’izay midina any an-davaka izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: teo amin’ny voatrabaka no nametrahany azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Ao koa i Meseka, i Tobala mbamin’ny vahoakany marobe rehetra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: manodidina azy ny fasany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: samy tsy voafora izy rehetra sady voatrabaky ny sabatra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria nahatonga ny fahatahorana azy tany amin’ny tanin’ny velona izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Tsy hiara-mandry amin’ny lehilahy mahery
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay lavo isan’ny tsy voafora izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ireo tafidina any amin’ny fitoeran’ny maty
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka mitondra ny fiadiany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady voapetraka eo ambanin’ny lohany ny sabany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ao amin’ny taolany ny helony
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria nampahatahotra ny mahery tany amin’ny tanin’ny velona izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Eny, ianao dia haripaka eo amin’ny tsy voafora
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hiara-miampatra amin’ny voatrabaky ny sabatra!
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ao koa i Edoma mbamin’ny mpanjakany sy ny mpitarika rehetra tao aminy, izay natao ao amin’ny voatrabaky ny sabatra na dia be aza ny heriny; miara-miampatra amin’ny tsy voafora izy, sy amin’izay midina any an-davaka. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Ao koa ireo mpanapaka ny any avaratra rehetra sy ny Sidoniana rehetra izay niara-nidina tamin’ny voatrabaka; menatra izy, na dia efa natahorana noho ny heriny aza; miampatra ny tsy voafora miaraka amin’izay voatrabaky ny sabatra ka mitondra henatra miaraka amin’izay midina any an-davaka.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Ireny dia ho hitan’i Farao ka hionona ny amin’ny vahoakany marobe izy. Voatrabaky ny sabatra i Farao mbamin’ny miaramilany rehetra, hoy NY TOMPO Andriamanitra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Fa efa nahatonga ny fahatahorana Ahy any amin’ny tanin’ny velona Aho; ary i Farao dia hampandriana any amin’ny tsy voafora, miaraka amin’ireo voatrabaky ny sabatra, dia i Farao mbamin’ny vahoakany marobe rehetra, hoy NY TOMPO Andriamanitra.
