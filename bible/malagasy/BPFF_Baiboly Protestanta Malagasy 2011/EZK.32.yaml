document_id: EZK.32,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Fitomaniana noho ny nanjo an’i Farao sy i Ejipta
  - type: text
    content: 'Tamin’ny andro voalohany tamin’ny volana faharoa amby folo, tamin’ny taona faharoa amby folo dia tonga tamiko ny tenin’NY TOMPO hoe:'
  '10':
  - type: text
    content: Eny, hataoko talanjona anao ny firenena maro, ary hipararetra noho ny aminao ny mpanjakany, rehefa asidiko eo imasony ny sabatro, ary samy hangovitra lalandava noho ny ainy izy amin’ny andro haharavanao.
  '11':
  - type: text
    content: 'Fa izao no lazain’NY TOMPO Andriamanitra: Ny sabatry ny mpanjakan’i Babilona dia ho tonga aminao.'
  '12':
  - type: text
    content: Ny sabatry ny mahery izay samy masiaka indrindra amin’ny firenena,
  - type: text
    content: no hoentiko mandavo ny vahoakanao marobe,
  - type: text
    content: dia horavany ny reharehan’i Ejipta
  - type: text
    content: ka ho fongotra ny vahoakany marobe rehetra.
  '13':
  - type: text
    content: Haringako koa ny biby fiompiny rehetra
  - type: text
    content: eny amoron’ny ranobe,
  - type: text
    content: ary tsy hanakobankobana azy intsony ny tongotry ny olona
  - type: text
    content: na handoto azy ny kitron’ny biby fiompy.
  '14':
  - type: text
    content: Dia hampandriako ny ranony
  - type: text
    content: ka hampandehaniko toy ny diloilo ny oniny,
  - type: text
    content: hoy NY TOMPO Andriamanitra,
  '15':
  - type: text
    content: Rehefa ataoko lao ny tany Ejipta
  - type: text
    content: ka hofoanako amin’ny tany izay rehetra nahafeno azy teo;
  - type: text
    content: haringako ny monina rehetra ao aminy,
  - type: text
    content: dia ho fantatra fa Izaho no TOMPO.
  '16':
  - type: text
    content: Izany no hira fahalahelovana hataon’ny olona. Ny zanakavavin’ny firenena no hihira izany; eny, ho fisaonana an’i Ejipta sy ny vahoakany marobe rehetra no hihirany izany, hoy NY TOMPO Andriamanitra.
  - type: heading
    content: Fitomaniana ny amin’ireo firenena manodidina
  '17':
  - type: text
    content: 'Tamin’ny andro fahadimy amby folo tamin’ny volana, tamin’ny taona faharoa amby folo dia tonga tamiko ny tenin’NY TOMPO hoe:'
  '18':
  - type: text
    content: Ry zanak’olona, isaony ny vahoaka maroben’i Ejipta, ary ampidino izy mbamin’ny zanakavavin’ny firenena malaza
  - type: text
    content: ho any ambanin’ny tany,
  - type: text
    content: miaraka amin’izay midina any an-davaka!
  '19':
  - type: text
    content: Mihoatra noho ny an’iza moa ny hatsaran-tarehinao?
  - type: text
    content: Midìna ka mandria miaraka amin’izay tsy voafora!
  '2':
  - type: text
    content: 'Ry '
  - type: text
    content: zanak’olona
  - type: text
    content: ', manaova hira fahalahelovana ny amin’i Farao mpanjakan’i Ejipta ka lazao aminy hoe: Nanao ny tenanao ho tahaka ny liona tanora tamin’ny firenena ianao,'
  - type: text
    content: kanjo tahaka ny dragona ao anatin’ny ranomasina;
  - type: text
    content: nitsoriaka teny amin’ny oninao ianao
  - type: text
    content: dia nanakobankobana ny rano tamin’ny tongotrao
  - type: text
    content: ka nahaloto ny ony.
  '20':
  - type: text
    content: Any amin’ny voatrabaky ny sabatra no hiampatramparany;
  - type: text
    content: 'ny sabatra dia efa voatolotra:'
  - type: text
    content: Tariho i Ejipta mbamin’ny vahoakany marobe rehetra!
  '21':
  - type: text
    content: Izy sy ny nanampy azy no resahin’ireo malaza amin’ny lehilahy mahery
  - type: text
    content: 'any amin’ny '
  - type: text
    content: fitoeran’ny maty
  - type: text
    content: ':'
  - type: text
    content: Tafidina ka miampatra ny tsy voafora,
  - type: text
    content: dia ireo voatrabaky ny sabatra.
  '22':
  - type: text
    content: Ao koa i Asiria mbamin’ny vahoakany marobe rehetra;
  - type: text
    content: manodidina azy ny fasany;
  - type: text
    content: voatrabaka izy rehetra,
  - type: text
    content: samy lavon’ny sabatra.
  '23':
  - type: text
    content: Natao any amin’ny lavaka farany ambany ny fasany,
  - type: text
    content: ary ny vahoakany marobe dia manodidina ny fasany;
  - type: text
    content: voatrabaka izy rehetra,
  - type: text
    content: samy lavon’ny sabatra,
  - type: text
    content: dia ireo izay nahatonga tahotra tany amin’ny tanin’ny velona.
  '24':
  - type: text
    content: Ao koa i Elama mbamin’ny vahoakany marobe rehetra
  - type: text
    content: manodidina ny fasany;
  - type: text
    content: voatrabaka izy rehetra,
  - type: text
    content: samy lavon’ny sabatra
  - type: text
    content: ka tafidina tsy voafora
  - type: text
    content: ho any ambanin’ny tany,
  - type: text
    content: dia ireo nahatonga ny fahatahorana azy tany amin’ny tanin’ny velona,
  - type: text
    content: samy mitondra henatra
  - type: text
    content: miaraka amin’izay midina any an-davaka.
  '25':
  - type: text
    content: Teo amin’ny voatrabaka no nanaovana fandriana ho azy
  - type: text
    content: mbamin’ny vahoakany marobe rehetra;
  - type: text
    content: manodidina azy ny fasany,
  - type: text
    content: izy rehetra dia samy tsy voafora sady voatrabaky ny sabatra
  - type: text
    content: satria niely tany amin’ny tanin’ny velona ny fahatahorana azy,
  - type: text
    content: ary samy mitondra henatra miaraka amin’izay midina any an-davaka izy;
  - type: text
    content: teo amin’ny voatrabaka no nametrahany azy.
  '26':
  - type: text
    content: Ao koa i Meseka, i Tobala mbamin’ny vahoakany marobe rehetra;
  - type: text
    content: manodidina azy ny fasany;
  - type: text
    content: samy tsy voafora izy rehetra sady voatrabaky ny sabatra,
  - type: text
    content: satria nahatonga ny fahatahorana azy tany amin’ny tanin’ny velona izy.
  '27':
  - type: text
    content: Tsy hiara-mandry amin’ny lehilahy mahery
  - type: text
    content: izay lavo isan’ny tsy voafora izy,
  - type: text
    content: dia ireo tafidina any amin’ny fitoeran’ny maty
  - type: text
    content: ka mitondra ny fiadiany,
  - type: text
    content: sady voapetraka eo ambanin’ny lohany ny sabany,
  - type: text
    content: ary ao amin’ny taolany ny helony
  - type: text
    content: satria nampahatahotra ny mahery tany amin’ny tanin’ny velona izy.
  '28':
  - type: text
    content: Eny, ianao dia haripaka eo amin’ny tsy voafora
  - type: text
    content: ka hiara-miampatra amin’ny voatrabaky ny sabatra!
  '29':
  - type: text
    content: 'Ao koa i Edoma mbamin’ny mpanjakany sy ny mpitarika rehetra tao aminy, izay natao ao amin’ny voatrabaky ny sabatra na dia be aza ny heriny; miara-miampatra amin’ny tsy voafora izy, sy amin’izay midina any an-davaka. '
  '3':
  - type: text
    content: 'Izao no lazain’NY TOMPO Andriamanitra:'
  - type: text
    content: Ny firenena betsaka tafatambatra
  - type: text
    content: no hoentiko mamelatra ny haratoko aminao
  - type: text
    content: ary hakarin’ireny amin’ny haratoko ianao.
  '30':
  - type: text
    content: Ao koa ireo mpanapaka ny any avaratra rehetra sy ny Sidoniana rehetra izay niara-nidina tamin’ny voatrabaka; menatra izy, na dia efa natahorana noho ny heriny aza; miampatra ny tsy voafora miaraka amin’izay voatrabaky ny sabatra ka mitondra henatra miaraka amin’izay midina any an-davaka.
  '31':
  - type: text
    content: Ireny dia ho hitan’i Farao ka hionona ny amin’ny vahoakany marobe izy. Voatrabaky ny sabatra i Farao mbamin’ny miaramilany rehetra, hoy NY TOMPO Andriamanitra.
  '32':
  - type: text
    content: Fa efa nahatonga ny fahatahorana Ahy any amin’ny tanin’ny velona Aho; ary i Farao dia hampandriana any amin’ny tsy voafora, miaraka amin’ireo voatrabaky ny sabatra, dia i Farao mbamin’ny vahoakany marobe rehetra, hoy NY TOMPO Andriamanitra.
  '4':
  - type: text
    content: Hatsipiko eny an-tanety ianao
  - type: text
    content: ary hariako any an-tsaha,
  - type: text
    content: dia hampitangoroniko eo aminao ny voromanidina rehetra
  - type: text
    content: ka homeko hivokisan’ny bibidia rehetra ny tenanao.
  '5':
  - type: text
    content: Haeliko eny an-tendrombohitra ny nofonao
  - type: text
    content: ary hofenoiko ny tenabenao ny lohasaha.
  '6':
  - type: text
    content: Hataoko safotry ny ranao ny tany,
  - type: text
    content: hatramin’ny tendrombohitra aza;
  - type: text
    content: ary ho feno anao ny ony.
  '7':
  - type: text
    content: Rehefa vonoiko ny fahazavanao
  - type: text
    content: dia hosaronako ny lanitra;
  - type: text
    content: hotafiako lamba fisaonana ny kintany;
  - type: text
    content: ny masoandro dia hotakonako rahona
  - type: text
    content: ary ny volana dia tsy hangarangarana.
  '8':
  - type: text
    content: Eny, noho ny aminao dia hotafiako lamba fisaonana avokoa
  - type: text
    content: ireny fanazavana eny amin’ny lanitra ireny
  - type: text
    content: ary hosaronako haizina ny taninao,
  - type: text
    content: hoy NY TOMPO Andriamanitra.
  '9':
  - type: text
    content: 'Hataoko sosotra ny fon’ny firenena maro rehefa ampandrenesiko ny firenena maro ny naharavanao, dia ny amin’ny tany izay tsy fantatrao. '
