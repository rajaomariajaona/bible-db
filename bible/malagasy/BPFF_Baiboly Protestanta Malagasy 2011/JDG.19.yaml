document_id: JDG.19,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny ratsy nataon’ny taranak’i Benjamina tao Gibea
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin’izany andro izany, fony tsy nisy mpanjaka teo amin’ny Israely, dia nisy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: levita
    - type: text
      text: ' iray nivahiny tany an-tsisin’ny tany be havoana any Efraima ka naka vady tsindrano avy any Betleheman’i Joda. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsy nety nijanona handany ny alina intsony anefa Ralehilahy fa niainga izy ka nandeha dia tonga tandrifin’i Jebosa na Jerosalema, niaraka tamin’ny boriky roa samy voaisy lasely ary koa ny vady tsindranony. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa tonga teo akaikin’i Jebosa izy ireo ka efa ho hariva ny andro dia hoy ny zatovo tamin’ny tompony: Andeha hiakatra ato amin’ity tanànan’ny Jebosita ity isika ka handry ao. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy anefa ny tompony taminy: Tsy hiakatra ao amin’ny tanànan’ny hafa firenena izay tsy misy Israelita isika, fa handroso ihany ho any Gibea. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy ihany izy tamin’ny zatovony: Andeha isika hizotra hakamin’ny iray amin’irerỳ tanàna irerỳ, dia i Gibea na i Rama, ka handry any. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nandroso izy ka nandeha. Ary raha mbola teo akaikin’i Gibea izay an’i Benjamina, izy, dia nilentika ny masoandro. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nivily lalana ho any Gibea izy mba handeha handry ao. Niditra izy dia nipetraka teo amin’ny kianjan’ny tanàna nefa tsy nisy olona nampiantrano azy mba handriany amin’ny alina.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary indro, nisy lahiantitra iray avy niasa tany an-tsaha nony hariva, sady olona avy any amin’ny tany be havoana any Efraima koa izy io, saingy vahiny nitoetra tany Gibea; fa ny mponina tao amin’izany tanàna izany dia ny Benjamina. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa nanopy ny masony ilay lahiantitra ka nahita ilay vahiny teo an-kianjan’ny tanàna dia niteny hoe: Hankaiza moa ianao? Ary avy taiza? '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy izy taminy: Avy tany Betleheman’i Joda izahay ka hankany an-tsisin’ny tany be havoana any Efraima, fa any no tany niaviako. Tany Betleheman’i Joda aho. Mpankany amin’ny tranon’NY TOMPO aho nefa tsy misy olona mampiantrano ahy. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Misy mololo sy hanina ihany anefa ho an’ny borikinay sady misy mofo sy divay ho ahy sy ny mpanompovavinao ary ho an’ny zatovo miaraka amin’ny mpanomponao. Tsy misy zavatra ilainay intsony. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny vady tsindranony dia nijangajanga sy nisintaka taminy ka nandao azy ary nankany an-tranon’ny rainy any Betleheman’i Joda, dia nitoetra tao efa-bolana mipaka. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy ilay lahiantitra: Fiadanana anie ho anao! Aoka ho adidiko izay rehetra ilainao fa aza mandry eto an-kianja eto! '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nampiditra azy tao an-tranony izy ka nampihinana ny boriky; dia nanasa tongotra izy ireo ka nihinana sy nisotro.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha mbola nampifaly ny fony izy dia indreo, nisy lehilahy tao an-tanàna, izay lehilahy tena ratsy fanahy, tonga nanodidina ny trano ka nandondòna mafy teo am-baravarana ary niteny tamin’ilay lahiantitra tompon-trano hoe: Avoahy ny lehilahy izay niditra ato an-tranonao mba hahalalanay azy. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nivoaka nankeo aminy Ralehilahy tompon-trano ka niteny taminy hoe: Tsia, ry rahalahiko, miangavy anareo aho, aza manao izay ratsy; fa tonga ato an-tranoko ity lehilahy ity, koa aza manao izany zavatra fady indrindra izany ianareo! '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Indro ny zanako vavy virijiny sy ny vady tsindranon-dRalehilahy, aoka hoentiko mivoaka ireo ka mandria aminy, ary ataovy aminy izay sitrakareo; fa aza ity lehilahy ity no anaovanareo izany zavatra fady indrindra izany! '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tsy nety nihaino azy anefa ireo lehilahy ireo ka nalain-dRalehilahy ilay vady tsindranony ka navoakany ho eo amin’ireo teo alatrano. Dia nandry taminy sy nanao ditra taminy ireo mandritra ny alina mandra-paharain’ny andro. Rehefa hiposaka ny masoandro vao nalefany handeha izy.
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa ho maraina ny andro dia tonga Ravehivavy ka lavo teo am-baravaran’ny tranon-dRalehilahy, izay nitoeran’ny vadiny, ka tavela teo mandra-pahazava ny andro. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nifoha maraina Ralehilahy ka namoha ny varavaran’ny trano, dia nivoaka handeha tamin’ny lalan-kalehany. Kanjo indro, Ravehivavy vady tsindranony miampatra eo am-baravaran’ny trano ary eo amin’ny tokonana ny tanany. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy Ralehilahy taminy: Mitsangàna fa andeha isika. Kanjo tsy nisy valiny. Dia nobatain-dRalehilahy izy ka nasampiny teo amin’ny borikiny; dia niainga izy nandeha ho any amin’ny fonenany. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa tonga tao an-tranony izy dia naka antsy ary noraisiny ny fatin’ilay vady tsindranony dia norasainy araka ny famavanin’ny taolana ho roa amby folo toko ka nampitondrainy manerana ny tanin’ny Israely rehetra. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia niainga Ralehilahy ka nandeha nanaraka azy mba hanambitamby sy hampody azy. Noentiny niaraka taminy ny zatovony sy boriky roa. Nampiantranoin-dRavehivavy ho ao an-tranon’ny rainy izy, koa nony hitan’ny rain-dRazazavavy Ralehilahy dia faly nihaona taminy izy. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy izay rehetra nahita: Tsy mbola nisy zava-nitranga toy izao, na nahitan-javatra toy izao hatramin’ny andro niakaran’ny Zanak’Israely avy tany amin’ny tany Ejipta ka mandraka androany; hevero izany, samia maka saina ka ambarao.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nihazona azy ny rafozany, rain-dRazazavavy, ka nitoetra teo aminy hateloana izy sy ny zatovony, dia nihinana sy nisotro ary nandry tao.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin’ny andro fahefatra dia nifoha vao maraina izy roa lahy, koa rehefa niomana handeha dia hoy ny rain-dRazazavavy tamin’ny vinantony: Aoka aloha mba hanao ody am-bavafo kely ianao, avy eo dia handeha ianareo. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nipetraka izy roa lahy ka niara-nihinana sy nisotro. Dia hoy ny rain-dRazazavavy tamin-dRalehilahy: Mba maneke ny handry eto anio alina ary aoka ho faly ny fonao! '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Rehefa nitsangana handeha Ralehilahy dia nanery azy hijanona ny rafozany ka tafandry tao indray izy.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nifoha vao maraina indray izy tamin’ny andro fahadimy mba handeha nefa hoy ny rain-dRazazavavy: Aoka mba hanao ody am-bavafo kely ianao ka mijanonjanòna aloha mandra-pihilan’ny andro. Dia niara-nihinana izy roa lahy. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa niainga handeha Ralehilahy sy ny vady tsindranony ary ny mpanompolahiny dia hoy ny rafozany, rain-dRazazavavy, taminy: Indro, efa ho hariva ny andro izao, koa miangavy re, mandria ihany anio alina; indro, efa hilentika ny masoandro ka mandria eto, mba hifalian’ny fonao! Rahampitso dia hifoha vao maraina ianareo ka handeha hody ianao. '
