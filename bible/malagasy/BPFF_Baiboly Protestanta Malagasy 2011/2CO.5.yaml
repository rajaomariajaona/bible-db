document_id: 2CO.5,3103
type_code: plt
verses:
  '1':
  - type: text
    content: 'Fa fantatsika fa raha ravana ny tranolay izay itoerantsika etỳ an-tany dia manana izay voarafitr’Andriamanitra isika, dia trano tsy nataon-tanana izay maharitra mandrakizay any an-danitra. '
  '10':
  - type: text
    content: Fa isika rehetra dia samy tsy maintsy ho hita toetra miharihary eo amin’ny fitsaran’i Kristy mba handraisan’ny olona rehetra ny valin’izay zavatra nataon’ny tenany, dia araka izay nataony, na tsara na ratsy.
  - type: heading
    content: Ny raharahan’ny fampihavanana
  '11':
  - type: text
    content: 'Koa amin’izany, satria fantatray ny fahatahorana ny Tompo, dia ny olona no resenay lahatra, fa amin’Andriamanitra kosa dia efa voaseho rahateo izahay, ary manantena aho fa voaseho ao amin’ny fieritreretanareo koa. '
  '12':
  - type: text
    content: 'Tsy midera tena aminareo akory izahay fa manome anareo izay hahazoanareo mirehareha ny aminay, mba hisy havalinareo izay mirehareha ny amin’ny miseho etỳ ivelany ihany fa tsy amin’ny ao am-po. '
  '13':
  - type: text
    content: 'Fa raha very saina izahay dia ho an’Andriamanitra; fa raha tsy very saina izahay, dia ho anareo. '
  '14':
  - type: text
    content: 'Fa ny fitiavan’i '
  - type: text
    content: Kristy
  - type: text
    content: ' no manery anay, satria izao no hevitray: Maty ny olona iray hamonjy ny olona rehetra, dia maty koa izy rehetra; '
  '15':
  - type: text
    content: ary maty hamonjy ny olona rehetra Izy, mba tsy ho velona ho an’ny tenany intsony izay velona fa ho an’izay efa maty sy nitsangana hamonjy azy.
  '16':
  - type: text
    content: 'Koa tsy mahalala olona intsony araka ny nofo isika; eny, na dia nahafantatra an’i Kristy araka ny nofo aza isika, ankehitriny dia tsy fantatsika araka izany intsony Izy. '
  '17':
  - type: text
    content: 'Koa raha misy olona ao amin’i Kristy dia olom-baovao izy. Efa lasa ny zavatra taloha, indro, efa tonga vaovao izany. '
  '18':
  - type: text
    content: 'Izany rehetra izany dia avy amin’Andriamanitra izay nampihavana antsika Taminy amin’ny alalan’i Kristy sady nanome anay ny fanompoana fampihavanana, '
  '19':
  - type: text
    content: 'dia izao: Andriamanitra ao amin’i Kristy no nampihavana izao tontolo izao Taminy ka tsy nanisa ny fahadisoany; ary napetrany aminay ny teny fampihavanana.'
  '2':
  - type: text
    content: 'Ary misento ao anatin’ity isika ka maniry indrindra hitafy ny tranontsika izay avy any an-danitra koa; '
  '20':
  - type: text
    content: 'Koa iraka solon’i Kristy izahay, toa ny hoe Andriamanitra mihitsy no mangataka anareo amin’ny alalanay hoe: Aoka ianareo hanaiky hampihavanina amin’Andriamanitra! '
  '21':
  - type: text
    content: Izay tsy nahalala ota dia efa nataony ota hamonjy antsika mba ho tonga fahamarinan’Andriamanitra ao Aminy kosa isika.
  '3':
  - type: text
    content: 'fa ho hita mitafy isika, fa tsy mba mitanjaka. '
  '4':
  - type: text
    content: 'Fa isika izay amin’izao tranolay izao dia misento noho ny mahavesatra antsika, satria tsy tiantsika ny hendahina fa ny mba hotafina kosa mba hatelin’ny fiainana ny mety maty. '
  '5':
  - type: text
    content: Ary izay efa nanamboatra antsika ho amin’izany indrindra dia Andriamanitra izay efa nanome antsika ny santatry ny Fanahy.
  '6':
  - type: text
    content: 'Koa matoky mandrakariva isika, sady fantatsika fa raha mitoetra ao amin’ny tena isika dia mitoetra ivelany ary lavitra ny Tompo, '
  '7':
  - type: text
    content: 'fa finoana no andehanantsika fa tsy fahitana; '
  '8':
  - type: text
    content: 'eny, matoky isika ka aleontsika ny tsy hitoetra ao amin’ny tena fa ny hitoetra ao amin’ny Tompo. '
  '9':
  - type: text
    content: 'Koa dia ataontsika ho voninahitra ny mba hankasitrahany antsika, na mitoetra ao amin’ny tena isika na ivelan’ny tena. '
