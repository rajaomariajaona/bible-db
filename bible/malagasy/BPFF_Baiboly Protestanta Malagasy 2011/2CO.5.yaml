document_id: 2CO.5
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Fa fantatsika fa raha ravana ny tranolay izay itoerantsika etỳ an-tany dia manana izay voarafitr’Andriamanitra isika, dia trano tsy nataon-tanana izay maharitra mandrakizay any an-danitra. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary misento ao anatin’ity isika ka maniry indrindra hitafy ny tranontsika izay avy any an-danitra koa; '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'fa ho hita mitafy isika, fa tsy mba mitanjaka. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Fa isika izay amin’izao tranolay izao dia misento noho ny mahavesatra antsika, satria tsy tiantsika ny hendahina fa ny mba hotafina kosa mba hatelin’ny fiainana ny mety maty. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ary izay efa nanamboatra antsika ho amin’izany indrindra dia Andriamanitra izay efa nanome antsika ny santatry ny Fanahy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Koa matoky mandrakariva isika, sady fantatsika fa raha mitoetra ao amin’ny tena isika dia mitoetra ivelany ary lavitra ny Tompo, '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'fa finoana no andehanantsika fa tsy fahitana; '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'eny, matoky isika ka aleontsika ny tsy hitoetra ao amin’ny tena fa ny hitoetra ao amin’ny Tompo. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Koa dia ataontsika ho voninahitra ny mba hankasitrahany antsika, na mitoetra ao amin’ny tena isika na ivelan’ny tena. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Fa isika rehetra dia samy tsy maintsy ho hita toetra miharihary eo amin’ny fitsaran’i Kristy mba handraisan’ny olona rehetra ny valin’izay zavatra nataon’ny tenany, dia araka izay nataony, na tsara na ratsy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny raharahan’ny fampihavanana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Koa amin’izany, satria fantatray ny fahatahorana ny Tompo, dia ny olona no resenay lahatra, fa amin’Andriamanitra kosa dia efa voaseho rahateo izahay, ary manantena aho fa voaseho ao amin’ny fieritreretanareo koa. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Tsy midera tena aminareo akory izahay fa manome anareo izay hahazoanareo mirehareha ny aminay, mba hisy havalinareo izay mirehareha ny amin’ny miseho etỳ ivelany ihany fa tsy amin’ny ao am-po. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Fa raha very saina izahay dia ho an’Andriamanitra; fa raha tsy very saina izahay, dia ho anareo. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Fa ny fitiavan’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' no manery anay, satria izao no hevitray: Maty ny olona iray hamonjy ny olona rehetra, dia maty koa izy rehetra; '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ary maty hamonjy ny olona rehetra Izy, mba tsy ho velona ho an’ny tenany intsony izay velona fa ho an’izay efa maty sy nitsangana hamonjy azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Koa tsy mahalala olona intsony araka ny nofo isika; eny, na dia nahafantatra an’i Kristy araka ny nofo aza isika, ankehitriny dia tsy fantatsika araka izany intsony Izy. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Koa raha misy olona ao amin’i Kristy dia olom-baovao izy. Efa lasa ny zavatra taloha, indro, efa tonga vaovao izany. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Izany rehetra izany dia avy amin’Andriamanitra izay nampihavana antsika Taminy amin’ny alalan’i Kristy sady nanome anay ny fanompoana fampihavanana, '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'dia izao: Andriamanitra ao amin’i Kristy no nampihavana izao tontolo izao Taminy ka tsy nanisa ny fahadisoany; ary napetrany aminay ny teny fampihavanana.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Koa iraka solon’i Kristy izahay, toa ny hoe Andriamanitra mihitsy no mangataka anareo amin’ny alalanay hoe: Aoka ianareo hanaiky hampihavanina amin’Andriamanitra! '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Izay tsy nahalala ota dia efa nataony ota hamonjy antsika mba ho tonga fahamarinan’Andriamanitra ao Aminy kosa isika.
