document_id: MAT.1,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Manomboka amin’i Abrahama ka hatramin’i Jesosy Kristy
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Lio 3.23-38
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ny filazana ny razan’i Jesosy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ', zanak’i Davida, zanak’i Abrahama.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'i Hezekia dia niteraka an’i Manase; i Manase dia niteraka an’i Amona; i Amona dia niteraka an’i Josia; '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ary i Josia dia niteraka an’i Jekonia mirahalahy avy, tamin’ny fahababoana tany Babilona.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Ary taorianan’ny fahababoana tany Babilona i Jekonia dia niteraka an’i Sealtiela; i Sealtiela dia niteraka an’i Zerobabela; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'i Zerobabela dia niteraka an’i Abihoda; i Abihoda dia niteraka an’i Eliakima; i Eliakima dia niteraka an’i Azora; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'i Azora dia niteraka an’i Zadoka; i Zadoka dia niteraka an’i Akima; i Akima dia niteraka an’i Elihoda; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'i Elihoda dia niteraka an’i Eleazara; i Eleazara dia niteraka an’i Matana; i Matana dia niteraka an’i Jakoba; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: i Jakoba dia niteraka an’i Josefa, vadin’i Maria; ary i Maria dia niteraka an’i Jesosy, izay atao hoe Kristy.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Ny taranaka rehetra hatreo amin’i Abrahama ka hatramin’i Davida dia taranaka efatra amby folo; ary hatramin’i Davida ka hatramin’ny nifindrana tany Babilona dia taranaka efatra amby folo; ary hatramin’ny nifindrana tany Babilona ka hatramin’i Kristy dia taranaka efatra amby folo.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nahaterahan’i Jesosy
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Lio 2.1-7
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Toy izao no nahaterahan’i Jesosy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: '. Rehefa nanaiky ho fofombadin’i Josefa i Maria renin’i Jesosy dia hita fa nitoe-jaza avy tamin’ny Fanahy Masina izy raha tsy mbola nivady izy roa. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Ary i Josefa vadiny, izay lehilahy marina sady tsy ta hanala baraka azy, dia nikasa hisaraka aminy mangingina. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'I Abrahama dia niteraka an’Isaka; Isaka dia niteraka an’i Jakoba; i Jakoba dia niteraka an’i Joda mirahalahy avy; '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Nefa raha mbola nisaina izany izy dia indro, nisy anjelin’ny Tompo niseho taminy tamin’ny nofy ka niteny hoe: Ry Josefa, zanak’i Davida, aza matahotra hampakatra an’i Maria vadinao; fa ny Zaza ao an-kibony dia avy amin’ny Fanahy Masina, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'koa hiteraka zazalahy izy ary ny anarany dia hataonao hoe: JESOSY'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Jesosy: '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: NY TOMPO no mpamonjy.
      marker-yv: yv-n
    - type: text
      text: ; satria Izy no hamonjy ny olony ho afaka amin’ny fahotany.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Ary izany rehetra izany dia tonga mba hahatanteraka izay nampilazain’ny Tompo ny mpaminany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.22 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: profeta.
      marker-yv: yv-n
    - type: text
      text: ' hoe:'
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: «Indro ny virijiny hitoe-jaza ka hiteraka zazalahy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ary ny anarany dia hataon’ny olona hoe: Imanoela» (Isa 7.14),'
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'izany hoe, raha adika: Amintsika Andriamanitra.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Rehefa nahatsiaro tamin’ny torimasony i Josefa dia nanatanteraka izay nandidian’ilay anjelin’ny Tompo azy ka nampakatra an’i Maria vadiny. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Ary tsy nahalala azy izy mandra-piterany Zazalahy; ary ny anarany dia nataony hoe: JESOSY.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'i Joda dia niteraka an’i Fareza sy i Zara tamin’i Tamara; i Fareza dia niteraka an’i Hezrona; i Hezrona dia niteraka an’i Arama; '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'i Arama dia niteraka an’i Aminadaba; i Aminadaba dia niteraka an’i Nasona; i Nasona dia niteraka an’i Salmona; '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'i Salmona dia niteraka an’i Boaza tamin’i Rahaba; i Boaza dia niteraka an’i Obeda tamin’i Rota; i Obeda dia niteraka an’i Jese; '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ary i Jese dia niteraka an’i Davida mpanjaka.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I Davida dia niteraka an’i Solomona tamin’ny vadin’i Oria; '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'i Solomona dia niteraka an’i Rehoboama; i Rehoboama dia niteraka an’i Abia; i Abia dia niteraka an’i Asafa; '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'i Asafa dia niteraka an’i Josafata; i Josafata dia niteraka an’i Jorama; i Jorama dia niteraka an’i Ozia; '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'i Ozia dia niteraka an’i Jotama; i Jotama dia niteraka an’i Ahaza; i Ahaza dia niteraka an’i Hezekia; '
