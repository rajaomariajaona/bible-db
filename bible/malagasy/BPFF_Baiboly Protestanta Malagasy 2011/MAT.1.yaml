document_id: MAT.1,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Manomboka amin’i Abrahama ka hatramin’i Jesosy Kristy
  - type: heading
    content: Lio 3.23-38
  - type: text
    content: 'Ny filazana ny razan’i Jesosy '
  - type: text
    content: Kristy
  - type: text
    content: ', zanak’i Davida, zanak’i Abrahama.'
  '10':
  - type: text
    content: 'i Hezekia dia niteraka an’i Manase; i Manase dia niteraka an’i Amona; i Amona dia niteraka an’i Josia; '
  '11':
  - type: text
    content: ary i Josia dia niteraka an’i Jekonia mirahalahy avy, tamin’ny fahababoana tany Babilona.
  '12':
  - type: text
    content: 'Ary taorianan’ny fahababoana tany Babilona i Jekonia dia niteraka an’i Sealtiela; i Sealtiela dia niteraka an’i Zerobabela; '
  '13':
  - type: text
    content: 'i Zerobabela dia niteraka an’i Abihoda; i Abihoda dia niteraka an’i Eliakima; i Eliakima dia niteraka an’i Azora; '
  '14':
  - type: text
    content: 'i Azora dia niteraka an’i Zadoka; i Zadoka dia niteraka an’i Akima; i Akima dia niteraka an’i Elihoda; '
  '15':
  - type: text
    content: 'i Elihoda dia niteraka an’i Eleazara; i Eleazara dia niteraka an’i Matana; i Matana dia niteraka an’i Jakoba; '
  '16':
  - type: text
    content: i Jakoba dia niteraka an’i Josefa, vadin’i Maria; ary i Maria dia niteraka an’i Jesosy, izay atao hoe Kristy.
  '17':
  - type: text
    content: Ny taranaka rehetra hatreo amin’i Abrahama ka hatramin’i Davida dia taranaka efatra amby folo; ary hatramin’i Davida ka hatramin’ny nifindrana tany Babilona dia taranaka efatra amby folo; ary hatramin’ny nifindrana tany Babilona ka hatramin’i Kristy dia taranaka efatra amby folo.
  - type: heading
    content: Ny nahaterahan’i Jesosy
  - type: heading
    content: Lio 2.1-7
  '18':
  - type: text
    content: 'Toy izao no nahaterahan’i Jesosy '
  - type: text
    content: Kristy
  - type: text
    content: '. Rehefa nanaiky ho fofombadin’i Josefa i Maria renin’i Jesosy dia hita fa nitoe-jaza avy tamin’ny Fanahy Masina izy raha tsy mbola nivady izy roa. '
  '19':
  - type: text
    content: 'Ary i Josefa vadiny, izay lehilahy marina sady tsy ta hanala baraka azy, dia nikasa hisaraka aminy mangingina. '
  '2':
  - type: text
    content: 'I Abrahama dia niteraka an’Isaka; Isaka dia niteraka an’i Jakoba; i Jakoba dia niteraka an’i Joda mirahalahy avy; '
  '20':
  - type: text
    content: 'Nefa raha mbola nisaina izany izy dia indro, nisy anjelin’ny Tompo niseho taminy tamin’ny nofy ka niteny hoe: Ry Josefa, zanak’i Davida, aza matahotra hampakatra an’i Maria vadinao; fa ny Zaza ao an-kibony dia avy amin’ny Fanahy Masina, '
  '21':
  - type: text
    content: 'koa hiteraka zazalahy izy ary ny anarany dia hataonao hoe: JESOSY'
  - type: note
    content: 'Jesosy: NY TOMPO no mpamonjy.'
  - type: text
    content: ; satria Izy no hamonjy ny olony ho afaka amin’ny fahotany.
  '22':
  - type: text
    content: Ary izany rehetra izany dia tonga mba hahatanteraka izay nampilazain’ny Tompo ny mpaminany
  - type: note
    content: 'Na: profeta.'
  - type: text
    content: ' hoe:'
  '23':
  - type: text
    content: «Indro ny virijiny hitoe-jaza ka hiteraka zazalahy;
  - type: text
    content: 'ary ny anarany dia hataon’ny olona hoe: Imanoela» (Isa 7.14),'
  - type: text
    content: 'izany hoe, raha adika: Amintsika Andriamanitra.'
  '24':
  - type: text
    content: 'Rehefa nahatsiaro tamin’ny torimasony i Josefa dia nanatanteraka izay nandidian’ilay anjelin’ny Tompo azy ka nampakatra an’i Maria vadiny. '
  '25':
  - type: text
    content: 'Ary tsy nahalala azy izy mandra-piterany Zazalahy; ary ny anarany dia nataony hoe: JESOSY.'
  '3':
  - type: text
    content: 'i Joda dia niteraka an’i Fareza sy i Zara tamin’i Tamara; i Fareza dia niteraka an’i Hezrona; i Hezrona dia niteraka an’i Arama; '
  '4':
  - type: text
    content: 'i Arama dia niteraka an’i Aminadaba; i Aminadaba dia niteraka an’i Nasona; i Nasona dia niteraka an’i Salmona; '
  '5':
  - type: text
    content: 'i Salmona dia niteraka an’i Boaza tamin’i Rahaba; i Boaza dia niteraka an’i Obeda tamin’i Rota; i Obeda dia niteraka an’i Jese; '
  '6':
  - type: text
    content: ary i Jese dia niteraka an’i Davida mpanjaka.
  - type: text
    content: 'I Davida dia niteraka an’i Solomona tamin’ny vadin’i Oria; '
  '7':
  - type: text
    content: 'i Solomona dia niteraka an’i Rehoboama; i Rehoboama dia niteraka an’i Abia; i Abia dia niteraka an’i Asafa; '
  '8':
  - type: text
    content: 'i Asafa dia niteraka an’i Josafata; i Josafata dia niteraka an’i Jorama; i Jorama dia niteraka an’i Ozia; '
  '9':
  - type: text
    content: 'i Ozia dia niteraka an’i Jotama; i Jotama dia niteraka an’i Ahaza; i Ahaza dia niteraka an’i Hezekia; '
