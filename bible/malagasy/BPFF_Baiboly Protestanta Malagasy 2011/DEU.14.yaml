document_id: DEU.14,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fombafombam-pisaonana tokony hofadìna
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Zanaky NY TOMPO Andriamanitrareo ianareo, koa aza mitetika ny tenanareo, na manaratra ny eo ambonin’ny handrinareo noho ny amin’ny maty. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: fa izay rehetra tsy misy vombony sy kirany kosa dia tsy azonareo hanina, satria maloto aminareo ireny.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny vorona madio rehetra dia azonareo hanina. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nefa izao kosa no aoka tsy hohaninareo: Ny vaotoro, ny gipa, ny ankoay, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ny papango, ny voromahery, ny papango mainty samy araka ny karazany avy, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ny goaika rehetra samy araka ny karazany avy, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ny aotirisy, ny tararaka, ny vorondriaka, ny hitsikitsika samy araka ny karazany avy, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ny vorondolo, ny vorondolo lehibe, ny ibisy, '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ny sama, ny vaotoro madinika, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ny manarana, ny vano samy araka ny karazany avy, ny takidara, ary ny manavy. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny bibikely mandady rehetra izay manana elatra dia haloto aminareo ka tsy azonareo hanina. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa firenena masina ho an’NY TOMPO Andriamanitrao ianao ka voafidiny ho fananany sarobidy indrindra mihoatra noho ny firenena rehetra ambonin’ny tany.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny hena azo hanina sy ny tsy azo hanina
    marker-yv: yv-h
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny biby manana elatra izay madio no azonareo hanina.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Aza mihinana izay maty ho azy, fa omeo ho an’ny vahiny izay ao an-tanànanao ireny mba hohaniny, na amidio amin’ny olona hafa firenena; fa firenena masina ho an’NY TOMPO Andriamanitrao ianao.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Aza mahandro zanak’osy amin’ny rononon-dreniny.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fahafolonkarena isan-taona sy ny isan-telo taona
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aloavy tsara ny ampahafolon’ny vokatra rehetra avy amin’ny voa nafafinao, dia ny vokatra any an-tsaha isan-taona; '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'aoka ho eo anatrehan’NY TOMPO Andriamanitrao, eo amin’ny tany izay hofidiny hampitoerany ny anarany no hihinananao ny ampahafolon’ny varinao, ny ranom-boalobokao, ny diloilonao ary ny voalohan-teraky ny ombinao sy ny ondry aman’osinao, mba hianaranao hatahotra NY TOMPO Andriamanitrao mandrakariva. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa raha lavitra loatra ny lalana halehanao ka tsy mahatondra izany zavatra izany ianao, satria lavitra anao loatra ny tany izay hofidin’NY TOMPO Andriamanitrao hampitoerany ny anarany, raha notahìn’NY TOMPO Andriamanitrao ianao, '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia hamidinao vola izany, ary hofonosinao ny vola ka hoentinao eo an-tananao hankany amin’ny tany izay hofidin’NY TOMPO Andriamanitrao; '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ividiano izay rehetra tianao, na omby, na ondry, na osy, na divay, na divay mahery, na izay zavatra hafa tianao io vola io; ary aoka ho eo anatrehan’NY TOMPO Andriamanitrao no hihinananao izany sy hifalianao mbamin’ny ankohonanao. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: levita
    - type: text
      text: ' izay ao an-tanànanao dia aza ataonao an-tsirambina; fa tsy manana anjara lova eo aminao izy.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Isan-telo taona dia alao ny ampahafolon’ny vokatrao rehetra amin’izany taona izany ka ataovy ao an-tanànanao; '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: dia aoka ho avy ny levita, satria tsy mba manana anjara na lova eo aminao izy sy ny vahiny ary ny kamboty sy ny mpitondratena izay ao an-tanànanao, dia hihinana ireo ka ho voky, mba hotahìn’NY TOMPO Andriamanitrao amin’ny asan’ny tananao rehetra ianao.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aza mihinana izay rehetra fahavetavetana. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ireto avy ireo biby azonareo hanina: Ny omby, ny ondry, ny osy, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ny diera, ny gazela, ny ombidia, ny osidia, ny antilopa, ny ombimanga ary ny osidia izay any an-tendrombohitra. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izay biby rehetra mivaky kitro ka misaraka tsara ny kitrony sady mandinika no azonareo hanina. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nefa amin’ireo mandinika na mivaky kitro dia izao ihany kosa no tsy azonareo hanina: Ny rameva sy ny bitro ary ny hiràka, satria mandinika ihany izy ireny nefa tsy mivaky kitro; maloto aminareo ireny; '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ny kisoa koa, satria mivaky kitro nefa tsy mandinika, maloto aminareo izy; ny henan’ireny dia tsy ho fihinanareo ary ny fatiny dia tsy hokasihinareo.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary amin’izay rehetra ao anatin’ny rano dia izay rehetra misy vombony sy kirany no azonareo hanina; '
