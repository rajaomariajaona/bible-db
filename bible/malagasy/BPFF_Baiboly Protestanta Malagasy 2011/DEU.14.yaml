document_id: DEU.14,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Fombafombam-pisaonana tokony hofadìna
  - type: text
    content: 'Zanaky NY TOMPO Andriamanitrareo ianareo, koa aza mitetika ny tenanareo, na manaratra ny eo ambonin’ny handrinareo noho ny amin’ny maty. '
  '10':
  - type: text
    content: fa izay rehetra tsy misy vombony sy kirany kosa dia tsy azonareo hanina, satria maloto aminareo ireny.
  '11':
  - type: text
    content: 'Ny vorona madio rehetra dia azonareo hanina. '
  '12':
  - type: text
    content: 'Nefa izao kosa no aoka tsy hohaninareo: Ny vaotoro, ny gipa, ny ankoay, '
  '13':
  - type: text
    content: 'ny papango, ny voromahery, ny papango mainty samy araka ny karazany avy, '
  '14':
  - type: text
    content: 'ny goaika rehetra samy araka ny karazany avy, '
  '15':
  - type: text
    content: 'ny aotirisy, ny tararaka, ny vorondriaka, ny hitsikitsika samy araka ny karazany avy, '
  '16':
  - type: text
    content: 'ny vorondolo, ny vorondolo lehibe, ny ibisy, '
  '17':
  - type: text
    content: 'ny sama, ny vaotoro madinika, '
  '18':
  - type: text
    content: 'ny manarana, ny vano samy araka ny karazany avy, ny takidara, ary ny manavy. '
  '19':
  - type: text
    content: 'Ny bibikely mandady rehetra izay manana elatra dia haloto aminareo ka tsy azonareo hanina. '
  '2':
  - type: text
    content: Fa firenena masina ho an’NY TOMPO Andriamanitrao ianao ka voafidiny ho fananany sarobidy indrindra mihoatra noho ny firenena rehetra ambonin’ny tany.
  - type: heading
    content: Ny hena azo hanina sy ny tsy azo hanina
  '20':
  - type: text
    content: Ny biby manana elatra izay madio no azonareo hanina.
  '21':
  - type: text
    content: Aza mihinana izay maty ho azy, fa omeo ho an’ny vahiny izay ao an-tanànanao ireny mba hohaniny, na amidio amin’ny olona hafa firenena; fa firenena masina ho an’NY TOMPO Andriamanitrao ianao.
  - type: text
    content: Aza mahandro zanak’osy amin’ny rononon-dreniny.
  - type: heading
    content: Ny fahafolonkarena isan-taona sy ny isan-telo taona
  '22':
  - type: text
    content: 'Aloavy tsara ny ampahafolon’ny vokatra rehetra avy amin’ny voa nafafinao, dia ny vokatra any an-tsaha isan-taona; '
  '23':
  - type: text
    content: 'aoka ho eo anatrehan’NY TOMPO Andriamanitrao, eo amin’ny tany izay hofidiny hampitoerany ny anarany no hihinananao ny ampahafolon’ny varinao, ny ranom-boalobokao, ny diloilonao ary ny voalohan-teraky ny ombinao sy ny ondry aman’osinao, mba hianaranao hatahotra NY TOMPO Andriamanitrao mandrakariva. '
  '24':
  - type: text
    content: 'Fa raha lavitra loatra ny lalana halehanao ka tsy mahatondra izany zavatra izany ianao, satria lavitra anao loatra ny tany izay hofidin’NY TOMPO Andriamanitrao hampitoerany ny anarany, raha notahìn’NY TOMPO Andriamanitrao ianao, '
  '25':
  - type: text
    content: 'dia hamidinao vola izany, ary hofonosinao ny vola ka hoentinao eo an-tananao hankany amin’ny tany izay hofidin’NY TOMPO Andriamanitrao; '
  '26':
  - type: text
    content: 'ividiano izay rehetra tianao, na omby, na ondry, na osy, na divay, na divay mahery, na izay zavatra hafa tianao io vola io; ary aoka ho eo anatrehan’NY TOMPO Andriamanitrao no hihinananao izany sy hifalianao mbamin’ny ankohonanao. '
  '27':
  - type: text
    content: 'Ary ny '
  - type: text
    content: levita
  - type: text
    content: ' izay ao an-tanànanao dia aza ataonao an-tsirambina; fa tsy manana anjara lova eo aminao izy.'
  '28':
  - type: text
    content: 'Isan-telo taona dia alao ny ampahafolon’ny vokatrao rehetra amin’izany taona izany ka ataovy ao an-tanànanao; '
  '29':
  - type: text
    content: dia aoka ho avy ny levita, satria tsy mba manana anjara na lova eo aminao izy sy ny vahiny ary ny kamboty sy ny mpitondratena izay ao an-tanànanao, dia hihinana ireo ka ho voky, mba hotahìn’NY TOMPO Andriamanitrao amin’ny asan’ny tananao rehetra ianao.
  '3':
  - type: text
    content: 'Aza mihinana izay rehetra fahavetavetana. '
  '4':
  - type: text
    content: 'Fa ireto avy ireo biby azonareo hanina: Ny omby, ny ondry, ny osy, '
  '5':
  - type: text
    content: 'ny diera, ny gazela, ny ombidia, ny osidia, ny antilopa, ny ombimanga ary ny osidia izay any an-tendrombohitra. '
  '6':
  - type: text
    content: 'Izay biby rehetra mivaky kitro ka misaraka tsara ny kitrony sady mandinika no azonareo hanina. '
  '7':
  - type: text
    content: 'Nefa amin’ireo mandinika na mivaky kitro dia izao ihany kosa no tsy azonareo hanina: Ny rameva sy ny bitro ary ny hiràka, satria mandinika ihany izy ireny nefa tsy mivaky kitro; maloto aminareo ireny; '
  '8':
  - type: text
    content: ny kisoa koa, satria mivaky kitro nefa tsy mandinika, maloto aminareo izy; ny henan’ireny dia tsy ho fihinanareo ary ny fatiny dia tsy hokasihinareo.
  '9':
  - type: text
    content: 'Ary amin’izay rehetra ao anatin’ny rano dia izay rehetra misy vombony sy kirany no azonareo hanina; '
