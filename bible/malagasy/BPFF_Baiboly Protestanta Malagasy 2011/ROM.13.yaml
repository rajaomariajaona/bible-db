document_id: ROM.13,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Manoloana ny fahefana misy
  - type: text
    content: 'Aoka ny olona rehetra samy hanaiky ny fahefana lehibe, satria tsy misy fahefana afa-tsy izay avy amin’Andriamanitra; fa izay misy dia voatendrin’Andriamanitra. '
  '10':
  - type: text
    content: Ny fitiavana dia tsy manisy ratsy ny namana; koa ny fitiavana no fanatanterahana ny lalàna.
  - type: heading
    content: Vonona ho amin’ny fiavian’i Kristy
  '11':
  - type: text
    content: 'Tokony hanao izany indrindra isika satria fantatsika ny fotoana, fa ankehitriny izao dia ora tokony hifohazanareo amin’ny torimaso; satria ankehitriny, ny famonjena antsika dia akaiky noho ny fony vao nino isika. '
  '12':
  - type: text
    content: 'Efa ho lasa ny alina ka efa akaiky kokoa ny andro, koa aoka hariantsika ny asan’ny maizina ary hitafiantsika ny fiadian’ny mazava. '
  '13':
  - type: text
    content: 'Aoka isika hitondra tena tsara toy ny amin’ny antoandro; tsy amin’ny filalaovan-dratsy na amin’ny fahamamoana, tsy amin’ny fijangajangana na amin’ny fitondrantena tsy mendrika, tsy amin’ny fifandirana na amin’ny fialonana. '
  '14':
  - type: text
    content: 'Fa itafio Jesosy '
  - type: text
    content: Kristy
  - type: text
    content: ' Tompo, ary aza miahy ny amin’ny nofo hahatanteraka ny filany.'
  '2':
  - type: text
    content: 'Koa izay manohitra ny fahefana dia manohitra ny voatendrin’Andriamanitra; ary izay manohitra dia hahazo fanamelohana. '
  '3':
  - type: text
    content: 'Fa ny mpitondra dia tsy mba atahoran’izay manao ny tsara fa izay manao ny ratsy ihany. Ary ny tsy hatahotra ny fahefana va no tianao? Ataovy ary izay tsara dia hahazo dera avy aminy ianao, '
  '4':
  - type: text
    content: 'satria mpanompon’Andriamanitra hahatsara anao izy. Fa raha ratsy kosa ny ataonao dia matahora, satria tsy entiny foana tsy akory ny sabatra; fa mpanompon’Andriamanitra izy, mpamaly hampihatra fahatezerana amin’izay manao ny ratsy. '
  '5':
  - type: text
    content: Koa tsy maintsy manaiky ny olona, nefa tsy noho ny fahatezerana ihany fa noho ny fieritreretana koa.
  '6':
  - type: text
    content: 'Noho izany no andoavanareo vola hetra fa ny mpandray ireny dia mpanompon’Andriamanitra mitandrina izany asa izany indrindra. '
  '7':
  - type: text
    content: 'Aloavy amin’izy rehetra izay tokony ho azy avy: Vola hetra ho an’izay tokony handoavan-ketra, haba ho an’izay tokony handoavana haba, tahotra ho an’izay tokony hatahorana, haja ho an’izay tokony hohajaina.'
  - type: heading
    content: Ny fifankatiavana
  '8':
  - type: text
    content: 'Aza avela hisy trosa tsy voaloa na amin’iza na amin’iza, afa-tsy ny fifankatiavanareo ihany; fa izay tia ny namany dia nahatanteraka ny lalàna. '
  '9':
  - type: text
    content: 'Fa ny hoe: «Aza mijangajanga, aza mamono olona, aza mangalatra, aza mitsiriritra zavatr’olona» (Eks 20.13-17), mbamin’izay didy hafa rehetra dia samy efa ao anatin’izao teny izao hoe: «Tiava ny namanao tahaka ny tenanao» (Lev 19.18). '
