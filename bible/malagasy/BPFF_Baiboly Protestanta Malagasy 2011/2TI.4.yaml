document_id: 2TI.4,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mitoria ny Teny
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Eo anatrehan’Andriamanitra sy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ' Jesosy izay hitsara ny velona sy ny maty, ary noho ny amin’ny fisehoany sy ny fanjakany, no ananarako anao mafy: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'fa efa nandao ahy i Demasy, noho ny fitiavany izao fiainana izao dia lasa nankany Tesalonika izy; i Kreska dia nankany Galatia, i Titosy dia nankany Dalmatia. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'I Lioka ihany no ato amiko. Alao i Marka ka ento miaraka aminao fa mahasoa ahy amin’ny fanompoana izy. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'I Tikiko dia nirahiko ho any Efesosy. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ilay akanjobe navelako tany Troasy tao amin’i Karpo dia ento raha mankaty ianao. Ento koa ny boky, indrindra fa ireo boky hoditra. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'I Aleksandra, mpanefy varahina, dia nanisy ratsy ahy be loatra. Ny Tompo hamaly azy araka ny asany. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Tandremonao ihany izy iny fa nanohitra fatratra ny teninay.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Tamin’ny nandaharako voalohany hanala tsiny ny tenako dia tsy nisy nomba ahy fa nandao ahy avokoa izy rehetra. Mba tsy hisaina ho helony anie izany! '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Nitsangana teo anilako anefa ny Tompo ka nampahery ahy mba ho tanteraka tokoa amin’ny ataoko ny fitorian-teny ary mba ho ren’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jentilisa
    - type: text
      text: ' rehetra izany. Ary izaho dia novonjena teo am-bavan’ny liona. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Ny Tompo hanafaka ahy amin’ny asa ratsy rehetra ka hamonjy ahy ho any amin’ny fanjakany any an-danitra. Ho Azy anie ny voninahitra mandrakizay mandrakizay! Amena!
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fanaovam-beloma
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Veloma any amin’i Prisila sy i Akoila mbamin’ny ankohonan’i Onesiforosy.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Mitoria ny teny, mazotoa, na amin’ny fotoana na tsy amin’ny fotoana, mandrese lahatra, mampirisiha, mananara mafy amin’ny fahari-po sy ny fampianarana rehetra.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Nitoetra tany Korinto i Erasto, fa i Trofimo dia nilaozako tany Mileto satria narary izy.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Ataovy izay hahatongavana atỳ alohan’ny ririnina.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Manao veloma anao i Eobolo, i Poda, i Lino ary i Klaodia mbamin’ny rahalahy rehetra.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Homba ny fanahinao anie ny Tompo! Ho aminareo anie ny fahasoavana!
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Fa ho avy ny andro izay tsy hahazakan’ny olona ny fampianarana tsy misy kilema; fa hangidihidy sofina izy dia hamory mpampianatra ho azy araka ny filany; '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ary hampiala ny sofiny amin’ny teny marina tokoa izy ka hivily ho amin’ny anganongano.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Fa mahonòna tena kosa ianao amin’ny zavatra rehetra, miareta fahoriana, ataovy ny asan’ny evanjelista, tanteraho ny fanompoanao.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Nahatanteraka ny fihazakazahako aho, nitahiry ny finoana aho
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Fa izaho dia efa hatolotra ho fanatitra aidina sahady ary efa mba akaiky ny andro fialako. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Efa niady ny ady tsara aho, nahatanteraka ny fihazakazahako aho, nitahiry ny finoana aho. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Hatramin’izao dia tahirizina ho ahy ny satroboninahitry ny fahamarinana, izay homen’ny Tompo, mpitsara marina, ho ahy amin’izay andro izay; ary tsy ho ahy ihany fa ho an’izay rehetra tia ny fisehoany koa.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Vaovao manokana sy hafatrafatra avy atỳ amiko
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ataovy izay hahatongavanao haingana atỳ amiko, '
