document_id: 2TI.4,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Mitoria ny Teny
  - type: text
    content: 'Eo anatrehan’Andriamanitra sy '
  - type: text
    content: Kristy
  - type: text
    content: ' Jesosy izay hitsara ny velona sy ny maty, ary noho ny amin’ny fisehoany sy ny fanjakany, no ananarako anao mafy: '
  '10':
  - type: text
    content: 'fa efa nandao ahy i Demasy, noho ny fitiavany izao fiainana izao dia lasa nankany Tesalonika izy; i Kreska dia nankany Galatia, i Titosy dia nankany Dalmatia. '
  '11':
  - type: text
    content: 'I Lioka ihany no ato amiko. Alao i Marka ka ento miaraka aminao fa mahasoa ahy amin’ny fanompoana izy. '
  '12':
  - type: text
    content: 'I Tikiko dia nirahiko ho any Efesosy. '
  '13':
  - type: text
    content: 'Ilay akanjobe navelako tany Troasy tao amin’i Karpo dia ento raha mankaty ianao. Ento koa ny boky, indrindra fa ireo boky hoditra. '
  '14':
  - type: text
    content: 'I Aleksandra, mpanefy varahina, dia nanisy ratsy ahy be loatra. Ny Tompo hamaly azy araka ny asany. '
  '15':
  - type: text
    content: Tandremonao ihany izy iny fa nanohitra fatratra ny teninay.
  '16':
  - type: text
    content: 'Tamin’ny nandaharako voalohany hanala tsiny ny tenako dia tsy nisy nomba ahy fa nandao ahy avokoa izy rehetra. Mba tsy hisaina ho helony anie izany! '
  '17':
  - type: text
    content: 'Nitsangana teo anilako anefa ny Tompo ka nampahery ahy mba ho tanteraka tokoa amin’ny ataoko ny fitorian-teny ary mba ho ren’ny '
  - type: text
    content: Jentilisa
  - type: text
    content: ' rehetra izany. Ary izaho dia novonjena teo am-bavan’ny liona. '
  '18':
  - type: text
    content: Ny Tompo hanafaka ahy amin’ny asa ratsy rehetra ka hamonjy ahy ho any amin’ny fanjakany any an-danitra. Ho Azy anie ny voninahitra mandrakizay mandrakizay! Amena!
  - type: heading
    content: Fanaovam-beloma
  '19':
  - type: text
    content: Veloma any amin’i Prisila sy i Akoila mbamin’ny ankohonan’i Onesiforosy.
  '2':
  - type: text
    content: Mitoria ny teny, mazotoa, na amin’ny fotoana na tsy amin’ny fotoana, mandrese lahatra, mampirisiha, mananara mafy amin’ny fahari-po sy ny fampianarana rehetra.
  '20':
  - type: text
    content: Nitoetra tany Korinto i Erasto, fa i Trofimo dia nilaozako tany Mileto satria narary izy.
  '21':
  - type: text
    content: Ataovy izay hahatongavana atỳ alohan’ny ririnina.
  - type: text
    content: Manao veloma anao i Eobolo, i Poda, i Lino ary i Klaodia mbamin’ny rahalahy rehetra.
  '22':
  - type: text
    content: Homba ny fanahinao anie ny Tompo! Ho aminareo anie ny fahasoavana!
  '3':
  - type: text
    content: 'Fa ho avy ny andro izay tsy hahazakan’ny olona ny fampianarana tsy misy kilema; fa hangidihidy sofina izy dia hamory mpampianatra ho azy araka ny filany; '
  '4':
  - type: text
    content: ary hampiala ny sofiny amin’ny teny marina tokoa izy ka hivily ho amin’ny anganongano.
  '5':
  - type: text
    content: Fa mahonòna tena kosa ianao amin’ny zavatra rehetra, miareta fahoriana, ataovy ny asan’ny evanjelista, tanteraho ny fanompoanao.
  - type: heading
    content: Nahatanteraka ny fihazakazahako aho, nitahiry ny finoana aho
  '6':
  - type: text
    content: 'Fa izaho dia efa hatolotra ho fanatitra aidina sahady ary efa mba akaiky ny andro fialako. '
  '7':
  - type: text
    content: 'Efa niady ny ady tsara aho, nahatanteraka ny fihazakazahako aho, nitahiry ny finoana aho. '
  '8':
  - type: text
    content: Hatramin’izao dia tahirizina ho ahy ny satroboninahitry ny fahamarinana, izay homen’ny Tompo, mpitsara marina, ho ahy amin’izay andro izay; ary tsy ho ahy ihany fa ho an’izay rehetra tia ny fisehoany koa.
  - type: heading
    content: Vaovao manokana sy hafatrafatra avy atỳ amiko
  '9':
  - type: text
    content: 'Ataovy izay hahatongavanao haingana atỳ amiko, '
