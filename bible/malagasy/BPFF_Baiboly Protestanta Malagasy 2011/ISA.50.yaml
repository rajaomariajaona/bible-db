document_id: ISA.50,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Manana ny fomba hamonjeny ny olony Andriamanitra
  - type: text
    content: 'Izao no lazain’NY TOMPO:'
  - type: text
    content: Aiza izay taratasy fisaoram-bady
  - type: text
    content: nisaorako ny reninareo?
  - type: text
    content: Ary iza amin’izay manan-trosa Amiko no nivarotako anareo?
  - type: text
    content: Tsia, fa noho ny helokareo ihany
  - type: text
    content: no nivarotana anareo
  - type: text
    content: ary noho ny hadisoanareo ihany
  - type: text
    content: no nisaorana an-dreninareo.
  '10':
  - type: text
    content: Iza aminareo no matahotra NY TOMPO
  - type: text
    content: ka mihaino ny feon’ny Mpanompony?
  - type: text
    content: Na iza na iza mandeha amin’ny maizina
  - type: text
    content: ka tsy manana fahazavana
  - type: text
    content: dia aoka izy hatoky ny anaran’NY TOMPO
  - type: text
    content: sy hiankina amin’Andriamaniny!
  '11':
  - type: text
    content: E! Ianareo rehetra izay mampirehitra afo
  - type: text
    content: sy mifehy kilalaon’afo manodidina anareo,
  - type: text
    content: mandehana ao amin’ny fidedadedan’ny lelafonareo
  - type: text
    content: sy amin’ny zana-tsipìka misy afo izay narehitrareo!
  - type: text
    content: Izany no hanjo anareo avy amin’ny tanako;
  - type: text
    content: handry amin’ny fahoriana ianareo!
  '2':
  - type: text
    content: Nahoana no tsy nisy olona fony tonga Aho?
  - type: text
    content: Nahoana no tsy nisy namaly fony niantso Aho?
  - type: text
    content: Moa fohy tokoa va ny tanako ka tsy mahavonjy?
  - type: text
    content: Moa tsy manan-kery hoenti-manafaka va Aho?
  - type: text
    content: Indro, amin’ny teny mafy ataoko no andritako ny ranomasina
  - type: text
    content: sy anovako ny ony ho tany efitra;
  - type: text
    content: maimbo ny hazandranony noho ny tsy fisian’ny rano,
  - type: text
    content: fa matin-ketaheta ireny.
  '3':
  - type: text
    content: Tafiako haizina ny lanitra
  - type: text
    content: ary lamba fisaonana no ataoko fisaronany.
  - type: heading
    content: Ny Mpanompon’NY TOMPO
  '4':
  - type: text
    content: NY TOMPO Andriamanitra no nanome Ahy
  - type: text
    content: ny lelan’ny efa mahay,
  - type: text
    content: mba hahaizako milaza teny
  - type: text
    content: hampatanjaka izay reraka;
  - type: text
    content: fohaziny isa-maraina isa-maraina Aho;
  - type: text
    content: eny, fohaziny ny sofiko
  - type: text
    content: mba hihaino
  - type: text
    content: tahaka ny efa mahay.
  '5':
  - type: text
    content: Nanokatra ny sofiko NY TOMPO Andriamanitra
  - type: text
    content: ary tsy nanohitra na nihemotra Aho.
  '6':
  - type: text
    content: Natolotro ho amin’ny mpikapoka ny lamosiko
  - type: text
    content: ary ny takolako ho amin’izay manongotra ny volombavako.
  - type: text
    content: Tsy nafeniko tamin’ny henatra sy ny rora ny tavako.
  '7':
  - type: text
    content: Nefa NY TOMPO Andriamanitra no namonjy Ahy
  - type: text
    content: ka tsy resin-kenatra Aho;
  - type: text
    content: efa nohamafisiko ho tahaka ny vatoafo ny tavako
  - type: text
    content: ka fantatro fa tsy hitsanga-menatra Aho.
  '8':
  - type: text
    content: 'Efa akaiky izay manamarina Ahy:'
  - type: text
    content: Iza no hiady Amiko?
  - type: text
    content: Andeha hiara-mitsangana isika!
  - type: text
    content: Iza no manana ady Amiko?
  - type: text
    content: Aoka izy ho avy eto Amiko.
  '9':
  - type: text
    content: Indro NY TOMPO Andriamanitra no hamonjy ahy,
  - type: text
    content: koa iza no hanameloka ahy?
  - type: text
    content: Indro izy rehetra dia ho tonga tahaka ny lamba mangarahara,
  - type: text
    content: ho lanin’ny kalalao izy.
