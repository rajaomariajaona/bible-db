document_id: ISA.50
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Manana ny fomba hamonjeny ny olony Andriamanitra
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Izao no lazain’NY TOMPO:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aiza izay taratasy fisaoram-bady
- type: usfm
  marker: q1
  children:
  - type: text
    text: nisaorako ny reninareo?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary iza amin’izay manan-trosa Amiko no nivarotako anareo?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsia, fa noho ny helokareo ihany
- type: usfm
  marker: q1
  children:
  - type: text
    text: no nivarotana anareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary noho ny hadisoanareo ihany
- type: usfm
  marker: q1
  children:
  - type: text
    text: no nisaorana an-dreninareo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Nahoana no tsy nisy olona fony tonga Aho?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nahoana no tsy nisy namaly fony niantso Aho?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Moa fohy tokoa va ny tanako ka tsy mahavonjy?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Moa tsy manan-kery hoenti-manafaka va Aho?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Indro, amin’ny teny mafy ataoko no andritako ny ranomasina
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy anovako ny ony ho tany efitra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: maimbo ny hazandranony noho ny tsy fisian’ny rano,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa matin-ketaheta ireny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Tafiako haizina ny lanitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary lamba fisaonana no ataoko fisaronany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny Mpanompon’NY TOMPO
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: NY TOMPO Andriamanitra no nanome Ahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny lelan’ny efa mahay,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hahaizako milaza teny
- type: usfm
  marker: q1
  children:
  - type: text
    text: hampatanjaka izay reraka;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fohaziny isa-maraina isa-maraina Aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, fohaziny ny sofiko
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hihaino
- type: usfm
  marker: q1
  children:
  - type: text
    text: tahaka ny efa mahay.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Nanokatra ny sofiko NY TOMPO Andriamanitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy nanohitra na nihemotra Aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Natolotro ho amin’ny mpikapoka ny lamosiko
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny takolako ho amin’izay manongotra ny volombavako.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy nafeniko tamin’ny henatra sy ny rora ny tavako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Nefa NY TOMPO Andriamanitra no namonjy Ahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy resin-kenatra Aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: efa nohamafisiko ho tahaka ny vatoafo ny tavako
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka fantatro fa tsy hitsanga-menatra Aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Efa akaiky izay manamarina Ahy:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Iza no hiady Amiko?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Andeha hiara-mitsangana isika!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Iza no manana ady Amiko?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aoka izy ho avy eto Amiko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Indro NY TOMPO Andriamanitra no hamonjy ahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: koa iza no hanameloka ahy?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Indro izy rehetra dia ho tonga tahaka ny lamba mangarahara,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho lanin’ny kalalao izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Iza aminareo no matahotra NY TOMPO
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka mihaino ny feon’ny Mpanompony?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na iza na iza mandeha amin’ny maizina
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy manana fahazavana
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia aoka izy hatoky ny anaran’NY TOMPO
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy hiankina amin’Andriamaniny!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: E! Ianareo rehetra izay mampirehitra afo
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy mifehy kilalaon’afo manodidina anareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mandehana ao amin’ny fidedadedan’ny lelafonareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy amin’ny zana-tsipìka misy afo izay narehitrareo!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izany no hanjo anareo avy amin’ny tanako;
- type: usfm
  marker: q1
  children:
  - type: text
    text: handry amin’ny fahoriana ianareo!
