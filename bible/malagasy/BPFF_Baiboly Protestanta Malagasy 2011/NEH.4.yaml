document_id: NEH.4
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Rehefa ren’i Sanibala sy i Tobia mbamin’ny Arabo sy ny Amonita ary ny Asdodita fa voatsangana ny mandan’i Jerosalema ka efa ho voavoatra izay rava dia nirehitra mafy ny hatezerany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Koa niray tetika izy rehetra handeha hamely an’i Jerosalema ka hanimba ny asa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dia nivavaka tamin’Andriamanitray izahay ka nametraka mpiambina hiandry azy andro aman’alina noho ny fahatahoranay azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary hoy ny Joda:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mihena ny herin’ny mpitondra entana
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary be ny korontam-bato sy ny tany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: koa dia tsy maharafitra ny manda izahay.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Hoy kosa ny fahavalonay: Tsy hahalala izy na hahita raha tsy tonga eo afovoany isika ka mahafaty azy ary mampitsahatra ny asa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary rehefa tonga ny Jiosy izay nonina teo akaikin’ireo ka niteny impolo taminay hoe: Na avy aiza na avy aiza ianareo dia miverena atỳ aminay, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'dia nasiako olona teo amin’ny toerana ambany, teo ivelan’ny manda sy teo ankarihary; eny, nalahatro araka ny fokony avy ny olona ary samy nitana sabatra sy lefona ary tsipìka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dia nijery aho sady nitsangana ka nilaza tamin’ny olo-manankaja sy ny mpanapaka mbamin’ny vahoaka sisa hoe: Aza matahotra azy ianareo; ny Tompo izay lehibe sy mahatahotra no tsarovy, koa miadia mba hiaro ny rahalahinareo, ny zanakareo lahy, ny zanakareo vavy, ny vadinareo ary ny tranonareo.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mampitana fiadiana ny mpiasa i Nehemia
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Nony ren’ny fahavalontsika fa efa fantatray izany sady efa nofoanan’Andriamanitra ny heviny dia niverina ho any amin’ny manda izahay rehetra, samy ho any amin’ny asanay avy indray. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Hatramin’izay andro izay, ny antsasaky ny zatovoko, dia nanao ny asa, ary ny antsasany kosa dia nitana lefona aman’ampinga sy tsipìka ary akanjo fiarovan-tratra; ary ny mpanapaka dia teo ivohon’ny fianakaviana rehetra amin’ny Joda. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Izay nandrafitra ny manda sy ny mpitondra entana izay nanangona ny korontam-bato sy ny tany kosa dia samy nanamboatra tamin’ny tanany iray ary nitan-defona kosa tamin’ny tanany ilany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ny mpandrafitra rehetra dia samy nanana ny sabany voafehy teny an-tsikinany avy no sady nandrafitra. Ary teo anilako ny mpitsoka ny anjomara. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dia hoy aho tamin’ny olo-manankaja sy ny mpanapaka ary ny vahoaka sisa: Be sady malalaka ny asa ka miparitaka eny ambonin’ny manda isika sady mifanalavitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Koa eo amin’izay toerana andrenesanareo ny feon’ny anjomara dia mivoria ho any aminay ianareo; fa Andriamanitsika no hiady ho antsika. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Dia nanao ny asa izahay ary ny antsasany kosa dia nitan-defona hatramin’ny mazava ratsy ka mandra-piposaky ny kintana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Tamin’io andro io koa dia hoy aho tamin’ny olona: Samia mitoetra ato Jerosalema ianareo mbamin’ny zatovonareo; hiambina antsika ireo raha alina ary hiasa raha antoandro. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Fa izaho sy ny rahalahiko mbamin’ny zatovoko sy ny mpiambina izay nanaraka ahy dia samy tsy niala akanjo, fa samy nitana ny fiadiany sy ny rano.
