document_id: NEH.4,3103
type_code: plt
verses:
  '1':
  - type: text
    content: 'Rehefa ren’i Sanibala sy i Tobia mbamin’ny Arabo sy ny Amonita ary ny Asdodita fa voatsangana ny mandan’i Jerosalema ka efa ho voavoatra izay rava dia nirehitra mafy ny hatezerany. '
  '10':
  - type: text
    content: 'Hatramin’izay andro izay, ny antsasaky ny zatovoko, dia nanao ny asa, ary ny antsasany kosa dia nitana lefona aman’ampinga sy tsipìka ary akanjo fiarovan-tratra; ary ny mpanapaka dia teo ivohon’ny fianakaviana rehetra amin’ny Joda. '
  '11':
  - type: text
    content: 'Izay nandrafitra ny manda sy ny mpitondra entana izay nanangona ny korontam-bato sy ny tany kosa dia samy nanamboatra tamin’ny tanany iray ary nitan-defona kosa tamin’ny tanany ilany. '
  '12':
  - type: text
    content: 'Ny mpandrafitra rehetra dia samy nanana ny sabany voafehy teny an-tsikinany avy no sady nandrafitra. Ary teo anilako ny mpitsoka ny anjomara. '
  '13':
  - type: text
    content: 'Dia hoy aho tamin’ny olo-manankaja sy ny mpanapaka ary ny vahoaka sisa: Be sady malalaka ny asa ka miparitaka eny ambonin’ny manda isika sady mifanalavitra. '
  '14':
  - type: text
    content: 'Koa eo amin’izay toerana andrenesanareo ny feon’ny anjomara dia mivoria ho any aminay ianareo; fa Andriamanitsika no hiady ho antsika. '
  '15':
  - type: text
    content: 'Dia nanao ny asa izahay ary ny antsasany kosa dia nitan-defona hatramin’ny mazava ratsy ka mandra-piposaky ny kintana. '
  '16':
  - type: text
    content: 'Tamin’io andro io koa dia hoy aho tamin’ny olona: Samia mitoetra ato Jerosalema ianareo mbamin’ny zatovonareo; hiambina antsika ireo raha alina ary hiasa raha antoandro. '
  '17':
  - type: text
    content: Fa izaho sy ny rahalahiko mbamin’ny zatovoko sy ny mpiambina izay nanaraka ahy dia samy tsy niala akanjo, fa samy nitana ny fiadiany sy ny rano.
  '2':
  - type: text
    content: Koa niray tetika izy rehetra handeha hamely an’i Jerosalema ka hanimba ny asa.
  '3':
  - type: text
    content: 'Dia nivavaka tamin’Andriamanitray izahay ka nametraka mpiambina hiandry azy andro aman’alina noho ny fahatahoranay azy. '
  '4':
  - type: text
    content: 'Ary hoy ny Joda:'
  - type: text
    content: Mihena ny herin’ny mpitondra entana
  - type: text
    content: ary be ny korontam-bato sy ny tany;
  - type: text
    content: koa dia tsy maharafitra ny manda izahay.
  '5':
  - type: text
    content: 'Hoy kosa ny fahavalonay: Tsy hahalala izy na hahita raha tsy tonga eo afovoany isika ka mahafaty azy ary mampitsahatra ny asa. '
  '6':
  - type: text
    content: 'Ary rehefa tonga ny Jiosy izay nonina teo akaikin’ireo ka niteny impolo taminay hoe: Na avy aiza na avy aiza ianareo dia miverena atỳ aminay, '
  '7':
  - type: text
    content: 'dia nasiako olona teo amin’ny toerana ambany, teo ivelan’ny manda sy teo ankarihary; eny, nalahatro araka ny fokony avy ny olona ary samy nitana sabatra sy lefona ary tsipìka. '
  '8':
  - type: text
    content: 'Dia nijery aho sady nitsangana ka nilaza tamin’ny olo-manankaja sy ny mpanapaka mbamin’ny vahoaka sisa hoe: Aza matahotra azy ianareo; ny Tompo izay lehibe sy mahatahotra no tsarovy, koa miadia mba hiaro ny rahalahinareo, ny zanakareo lahy, ny zanakareo vavy, ny vadinareo ary ny tranonareo.'
  - type: heading
    content: Mampitana fiadiana ny mpiasa i Nehemia
  '9':
  - type: text
    content: 'Nony ren’ny fahavalontsika fa efa fantatray izany sady efa nofoanan’Andriamanitra ny heviny dia niverina ho any amin’ny manda izahay rehetra, samy ho any amin’ny asanay avy indray. '
