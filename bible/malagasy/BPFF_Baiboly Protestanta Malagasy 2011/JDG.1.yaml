document_id: JDG.1,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mandray ny tany Kanana ny Israely
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa maty i Josoa dia nanontany NY TOMPO ny Zanak’Israely hoe: Iza aminay no hiakatra voalohany hiady amin’ny Kananita? '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nandeha i Joda hiady amin’ny Kananita izay nonina tany Hebrona, Kiriata-Arba no anarany taloha; dia namono an’i Sesay sy i Ahimana ary i Talmay izy. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia niala tao izy ka nandeha hiady tamin’ny mponina tany Debira izay nantsoina hoe Kiriata-Sefera taloha. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy i Kaleba: Izay manafika an’i Kiriata-Sefera ka mahazo azy dia homeko azy i Aksa zanako vavy ho vadiny. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary i Otniela, zanakalahin’i Kenaza, zandrin’i Kaleba, no nahazo azy ka nomeny azy ho vadiny i Aksa zanany vavy. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa voampakatra Ravehivavy dia nampirisika ny lahy hangataka saha tamin’ny rainy. Dia niala haingana tamin’ny borikiny izy ka hoy i Kaleba taminy: Inona moa no ilainao? '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy izy: Omeo marika tsodrano aho; fa tany tsy misy rano no nomenao ahy ka mba omeo loharano koa aho. Dia nomen’i Kaleba azy ny loharano ambony sy ny loharano ambany.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ny taranak’ilay Kenita, rafozan’i Mosesy, dia niara-niakatra tamin’ny taranak’i Joda niala tao amin’ny Tanàna be palma
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ny Tanàna be palma: Jeriko, na tanàna iray ao atsimon’ny Ranomasina Maty.'
      marker-yv: yv-n
    - type: text
      text: ' hankany an-tany efitr’i Joda, any atsimon’i Arada; nandeha ireo ka nonina teo amin’ny vahoaka.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia niaraka tamin’i Simeona rahalahiny i Joda ka namely ny Kananita izay nonina tany Zefata, ary nataony ringana toy ny zavatra voaozona ireo, ary ny anaran’ny tanàna nataony hoe Horma
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Horma: Voatokana haringana.'
      marker-yv: yv-n
    - type: text
      text: '. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia azon’i Joda i Gaza mbamin’ny faritra manodidina azy sy i Askelona mbamin’ny faritra manodidina azy ary i Ekrona mbamin’ny faritra manodidina azy. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary NY TOMPO nomba an’i Joda ka azony ny havoana; nefa tsy naharoaka ireo mponina teny amin’ny tany lemaka izy satria nanana kalesy vy fitondra miady ireny.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy NY TOMPO: I Joda no hiakatra; indro, efa nanolotra ny tany ho eo an-tanany Aho. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary i Hebrona dia nomena an’i Kaleba, araka izay efa nolazain’i Mosesy, ka noroahin’i Kaleba niala tao ireo Anakita telo lahy.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ny taranak’i Benjamina dia tsy nandroaka ny Jebosita izay nonina tany Jerosalema; fa ny Jebosita dia miara-monina amin’ny taranak’i Benjamina any Jerosalema ihany mandraka androany.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa niakatra koa ny taranak’i Josefa mba hamely an’i Betela; ary NY TOMPO nomba azy. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Naniraka olona hisafo tany an’i Betela ny taranak’i Josefa. Lozy ny anaran’ny tanàna taloha. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin’izay dia nahita lehilahy iray nivoaka avy tao an-tanàna ireo mpisafo tany ka nilaza taminy hoe: Mba atoroy kely anay ny fidirana mankao an-tanàna dia hamindra fo aminao izahay. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia natoron-dRalehilahy azy ny fidirana mankao an-tanàna ka nasian’ireo tamin’ny lelan-tsabatra ny tanàna; fa Ralehilahy sy ny ankohonany rehetra dia navelany handeha. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary nandeha ho any amin’ny tanin’ny Hetita Ralehilahy ka nanorina tanàna ary ny anarany nataony hoe Lozy; mbola izany ihany no anarany mandraka androany.
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I Manase dia tsy nahazo an’i Bety-Sana sy ireo vohitra miankina aminy na i Tanàka sy ireo vohitra miankina aminy, sady tsy naharoaka ny mponina tany Dora sy ireo vohitra miankina aminy, na ny mponina tany Ibleama sy ireo vohitra miankina aminy na ny mponina tany Megido sy ireo vohitra miankina aminy; nikiry hitoetra tamin’ny tany ny Kananita. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa rehefa niha nahery kosa ny Israely dia nampanaoviny fanompoana ny Kananita fa tsy noroahiny tanteraka.
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary i Efraima dia tsy nandroaka ny Kananita izay nonina tany Gezera fa nonina teo anivony tany Gezera ny Kananita.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy i Joda tamin’i Simeona rahalahiny: Andeha ianao hiara-miakatra amiko ho any amin’ny lovako ka aoka isika hiady amin’ny Kananita; izaho kosa handeha hiaraka aminao ho any amin’ny lovanao. Dia nandeha niaraka taminy i Simeona. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I Zebolona dia tsy nandroaka ny mponina tany Kitirona na ny mponina tany Nahalola, fa nonina teo aminy ny Kananita ka nampanaovina fanompoana.
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I Asera dia tsy nandroaka ny mponina tany Ako na ny mponina tany Sidona na ny tany Alaba na ny tany Akziba na ny tany Helba na ny tany Afika na ny tany Rehoba; '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: nonina teo anivon’ny Kananita tompon-tany ny taranak’i Asera fa tsy nandroaka azy izy ireo.
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I Naftaly dia tsy nandroaka ny mponina tany Bety-Semesy na ny mponina tany Bety-Anata, fa nonina teo anivon’ny Kananita tompon-tany izy, ary nampanaoviny fanompoana ny mponina tany Bety-Semesy sy Bety-Anata.
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny Amorita dia nanesika ny taranak’i Dana ho any amin’ny havoana fa tsy namela azy hidina ho any amin’ny tany lemaka. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ny Amorita dia mbola nonina tany amin’ny tendrombohitra Heresa sy tany Aialona ary Salabima ihany; nefa nahery ny tanan’ny taranak’i Josefa ka nampanaovina fanompoana ireo. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ny faritanin’ny Amorita dia hatrany amin’ny fiakaran’i Akrabima ka hatrany amin’ilay harambato no ho mankany amboniny.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia niakatra i Joda, ary natolotry NY TOMPO teo an-tanany ny Kananita sy ny Perizita ka nahafaty iray alin-dahy tany Bezeka izy. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nahita an’i Adonỳ-Bezeka tany Bezeka izy dia niady taminy ka nandresy ny Kananita sy ny Perizita. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nefa nandositra i Adonỳ-Bezeka ka nanenjika azy izy ireo ary nisambotra azy dia nanapaka ny ankihiben-tanany sy ny ankihiben-tongony. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy i Adonỳ-Bezeka: Mpanjaka fitopolo voatapaka ankiben-tanana sy ankiben-tongotra no nitsindroka hanina tao ambanin’ny latabatro; koa mba tahaka ny nataoko ihany lahy ity no navalin’Andriamanitra ahy! Ary noentin’ireo ho any Jerosalema izy ka maty tany.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nanafika an’i Jerosalema ny taranak’i Joda ka nahazo azy dia namely azy tamin’ny lelan-tsabatra sy nandoro ny tanàna. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Avy eo dia nidina ny taranak’i Joda hiady amin’ny Kananita izay nonina tany amin’ny tany be havoana sy tany amin’ny Negeva ary tany amin’ny Sefela.
  - type: usfm
    marker: r
    children:
    - type: text
      text: Jos 15.13-19
    marker-yv: yv-h
