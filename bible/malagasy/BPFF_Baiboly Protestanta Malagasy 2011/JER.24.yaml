document_id: JER.24
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny amin’ny aviavy roa sobika
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Nasehon’NY TOMPO tamiko fa indreo, nisy aviavy roa sobika voapetraka teo anoloan’ny tempolin’NY TOMPO, taorianan’ny nitondran’i Nebokadnezara, mpanjakan’i Babilona, an’i Jekonia, zanak’i Joiakima, mpanjakan’ny Joda, sy ny mpanapaka ny Joda mbamin’ny mpahay taozavatra sy ny mpanefy vy izay tany Jerosalema, ho babo ho any Babilona. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ny sobika iray dia nisy aviavy tena tsara, dia toy ny aviavy voaloham-bokatra; ary ny sobika iray kosa dia nisy aviavy izay tena ratsy, izay tsy azo hanina noho ny haratsiny. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dia hoy NY TOMPO tamiko: Inona no hitanao, ry Jeremia? Ary hoy aho hoe: Aviavy. Ny tsara moa dia tsara tokoa, ary ny ratsy kosa dia ratsy tokoa ka tsy azo hanina noho ny haratsiny.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary tonga tamiko indray ny tenin’NY TOMPO hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Izao no lazain’NY TOMPO, Andriamanitry ny Israely: Tahaka ireto aviavy tsara ireto no fijeriko ny Joda voababo mba hanasoavako azy, dia ireo noroahiko niala tamin’ity tany ity ho any amin’ny tanin’ny Kaldeana. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Fa hotsinjovin’ny masoko izy mba hanasoavako azy ka hampodiko ho amin’ity tany ity; haoriko izy fa tsy horavako; hamboleko izy fa tsy hongotako. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary homeko fo hahalalany Ahy ho NY TOMPO izy; dia ho oloko izy ary Izaho kosa ho Andriamaniny; fa hiverina Amiko amin’ny fony manontolo izy. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary ny amin’ny aviavy ratsy izay tsy azo hanina kosa noho ny haratsiny, dia izao no lazain’NY TOMPO: Toy izany no hanolorako an’i Zedekia, mpanjakan’ny Joda, sy ny mpanapaka ary izay sisa any Jerosalema, dia izay mbola sisa amin’ity tany ity sy izay mitoetra any amin’ny tany Ejipta, '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'eny, hatolotro ho fampangovitana sy ho loza any amin’ny fanjakana rehetra ambonin’ny tany izy, ho fandatsa sy oha-pitenenana ary ambentinteny sy fanozonana any amin’ny tany rehetra izay handroahako azy. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ary hampameleziko azy ny sabatra sy ny mosary ary ny areti-mandringana ambara-pahalany ritra azy tsy ho amin’ny tany izay nomeko azy sy ny razany.
