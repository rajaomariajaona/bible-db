document_id: JER.24,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny amin’ny aviavy roa sobika
  - type: text
    content: 'Nasehon’NY TOMPO tamiko fa indreo, nisy aviavy roa sobika voapetraka teo anoloan’ny tempolin’NY TOMPO, taorianan’ny nitondran’i Nebokadnezara, mpanjakan’i Babilona, an’i Jekonia, zanak’i Joiakima, mpanjakan’ny Joda, sy ny mpanapaka ny Joda mbamin’ny mpahay taozavatra sy ny mpanefy vy izay tany Jerosalema, ho babo ho any Babilona. '
  '10':
  - type: text
    content: Ary hampameleziko azy ny sabatra sy ny mosary ary ny areti-mandringana ambara-pahalany ritra azy tsy ho amin’ny tany izay nomeko azy sy ny razany.
  '2':
  - type: text
    content: 'Ny sobika iray dia nisy aviavy tena tsara, dia toy ny aviavy voaloham-bokatra; ary ny sobika iray kosa dia nisy aviavy izay tena ratsy, izay tsy azo hanina noho ny haratsiny. '
  '3':
  - type: text
    content: 'Dia hoy NY TOMPO tamiko: Inona no hitanao, ry Jeremia? Ary hoy aho hoe: Aviavy. Ny tsara moa dia tsara tokoa, ary ny ratsy kosa dia ratsy tokoa ka tsy azo hanina noho ny haratsiny.'
  '4':
  - type: text
    content: 'Ary tonga tamiko indray ny tenin’NY TOMPO hoe: '
  '5':
  - type: text
    content: 'Izao no lazain’NY TOMPO, Andriamanitry ny Israely: Tahaka ireto aviavy tsara ireto no fijeriko ny Joda voababo mba hanasoavako azy, dia ireo noroahiko niala tamin’ity tany ity ho any amin’ny tanin’ny Kaldeana. '
  '6':
  - type: text
    content: 'Fa hotsinjovin’ny masoko izy mba hanasoavako azy ka hampodiko ho amin’ity tany ity; haoriko izy fa tsy horavako; hamboleko izy fa tsy hongotako. '
  '7':
  - type: text
    content: 'Ary homeko fo hahalalany Ahy ho NY TOMPO izy; dia ho oloko izy ary Izaho kosa ho Andriamaniny; fa hiverina Amiko amin’ny fony manontolo izy. '
  '8':
  - type: text
    content: 'Ary ny amin’ny aviavy ratsy izay tsy azo hanina kosa noho ny haratsiny, dia izao no lazain’NY TOMPO: Toy izany no hanolorako an’i Zedekia, mpanjakan’ny Joda, sy ny mpanapaka ary izay sisa any Jerosalema, dia izay mbola sisa amin’ity tany ity sy izay mitoetra any amin’ny tany Ejipta, '
  '9':
  - type: text
    content: 'eny, hatolotro ho fampangovitana sy ho loza any amin’ny fanjakana rehetra ambonin’ny tany izy, ho fandatsa sy oha-pitenenana ary ambentinteny sy fanozonana any amin’ny tany rehetra izay handroahako azy. '
