document_id: GEN.44
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nampangaina ho mpangalatra i Benjamina
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary i Josefa dia nanome teny ny mpikarakara ny tao an-tranony hoe: Fenoy hanina, araka izay zakany hoentina, ny lasakan’ireo lehilahy ireo ary ataovy eo am-bavan’ny lasakany avy ny volan’ny tsirairay. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ary ny kapoakako, ilay kapoaka volafotsy, dia ataovy eo am-bavan’ny lasakan’ilay faralahy miaraka amin’ny vola hividianany vary. Dia notanterahin’ny mpikarakara araka izany ny tenin’i Josefa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary raha vao nazava ny andro dia nalefa handeha ry zareo sy ny borikiny. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Rehefa tafavoaka ny tanàna izy ireo ka tsy mbola lasa lavitra dia hoy i Josefa tamin’ny mpikarakara ny tao an-tranony: Andeha araho ireny lehilahy ireny! Rehefa tratranao izy dia ataovy aminy hoe: Nahoana ianareo no namaly ratsy ny soa? '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Tsy iny va ilay kapoaka fisotroan’ny tompoko sy famantarany zavatra? Ratsy izao nataonareo izao! '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia nahatratra azy ireo Ralehilahy ka nilaza izany teny izany taminy. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Hoy izy ireo taminy: Nahoana ny tompokolahy no dia miteny toy izany? Sanatria amin’ny mpanomponao ny hahavita zavatra toy izany! '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Indro fa ny vola izay hitanay teo am-bavan’ny lasakanay aza naverinay tatỳ aminao indray, avy tany amin’ny tany Kanana; koa hataonay ahoana no fangalatra volafotsy na volamena avy ao amin’ny tranon’ny tomponao? '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Izay iray amin’ny mpanomponao hahitana izany dia aoka hovonoina ary izahay kosa dia ho mpanompon’Itompokolahy. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dia hoy Ralehilahy: Aoka ary hatao araka ny teninareo: Izay hahitana izany dia ho mpanompoko fa ianareo kosa dia tsy hanan-tsiny. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Dia samy nampidina haingana ny lasakany tamin’ny tany izy rehetra ka samy nanokatra ny lasakany avy. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Dia nisava Ralehilahy ka tamin’ny lahimatoa no nanombohany ary tamin’ny faralahy no niafarany. Tao amin’ny lasakan’i Benjamina no nahitana ilay kapoaka. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ary samy nandriatra ny fitafiany izy dia nampiakatra ny entany tamin’ny borikiny avy ka niverina ho any an-tanàna.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nanao fanelanelanana ho an’i Benjamina i Joda
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dia niditra tao an-tranon’i Josefa i Joda sy ny rahalahiny, fa mbola tao izy ka nidaboka tamin’ny tany teo anatrehany. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Hoy i Josefa taminy: Ahoana izao zavatra nataonareo izao? Tsy fantatrareo va fa izay lehilahy toa ahy dia mahay mamantatra zavatra tokoa? '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary hoy i Joda: Inona no teny hataonay amin’Itompokolahy? Inona intsony no holazainay? Hataonay ahoana no fiala tsiny? Andriamanitra mahita ny heloky ny mpanomponao. Koa indreto samy ho mpanompon’Itompokolahy, na izahay na ilay nahitana ny kapoaka tao aminy. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Nefa hoy i Josefa: Sanatria ahy ny hahavita izany! Izay lehilahy nahitana ny kapoaka tao aminy ihany no ho mpanompoko fa ianareo kosa dia miakara soa amantsara ho any amin’ny rainareo.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Dia nanatona azy i Joda ka niteny hoe: Azafady, tompokolahy, aoka ny mpanomponao handaha-teny kely eto anatrehan’i tompokolahy, ary aoka tsy mba hirehitra amin’ny mpanomponao ny fahatezeranao; fa tahaka an’i Farao ianao! '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Itompokolahy dia nanontany ny mpanompony hoe: Manana ray na rahalahy koa va ianareo? '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary hoy izahay tamin’Itompokolahy: Manana ray lahiantitra sy zandry faralahy, zanaky ny fahanterany, izahay; maty ny rahalahiny, fa izy irery ihany no zanaky ny reniny sisa, ary tian’ny rainy izy. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary niteny tamin’ny mpanomponao ianao hoe: Ento mankaty amiko izy mba ho hitan’ny masoko. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary hoy izahay tamin’Itompokolahy: Tsy mahazo misaraka amin’ny rainy ny zazalahy; fa raha misaraka amin’ny rainy izy dia ho faty ny rainy. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary hoy ianao tamin’ny mpanomponao: Raha tsy miara-midina aminareo ny zandrinareo faralahy dia tsy hahita ny tavako intsony ianareo. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Koa rehefa tafakatra tany amin’ny mpanomponao raiko izahay dia nambaranay azy ny tenin’Itompokolahy. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Dia hoy ny rainay: Mandehana indray, mividiana hanina kely ho antsika. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ary hoy izahay: Tsy sahy hidina izahay; nefa raha miaraka aminay ny zandrinay faralahy dia hidina ihany izahay; fa tsy mahazo mahita ny tavan-dRalehilahy izahay raha tsy miaraka aminay ny zandrinay faralahy. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Dia hoy ny mpanomponao raiko taminay: Fantatrareo fa ny vadiko dia niteraka roa lahy tamiko. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Lasa niala tamiko ny iray ka hoy aho: Tena voaviraviran’ny biby izy ka tsy hitako mandraka ankehitriny. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Raha halainareo hiala amiko koa ity ka hisy loza hanjo azy dia hampidininareo any amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: fitoeran’ny maty
  - type: text
    text: ' amim-pahoriana ny volofotsiko. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Koa ankehitriny, raha tonga any amin’ny mpanomponao raiko aho ka tsy tafaraka aminay ny zaza, nefa ny ainy mifamatotra amin’ny ain’io, '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'koa raha hitany fa tsy eo ny zaza, dia ho faty izy; ary ny mpanomponao dia hampidina ny volofotsin’ny mpanomponao rainay ho any amin’ny fitoeran’ny maty amin’alahelo. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Fa ny mpanomponao dia niantoka ny zaza tamin’ny raiko ka niteny hoe: Raha tsy tongako atỳ aminao izy dia ho meloka amin’ny raiko amin’ny andro rehetra hiainako aho. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Koa ankehitriny, trara antitra ianao, aoka hijanona ho mpanompon’Itompokolahy hisolo ny zaza ny mpanomponao, fa aoka ny zaza hiara-miakatra amin’ny rahalahiny! '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Fa hataoko ahoana no fiakatra any amin’ny raiko raha tsy miaraka amiko ny zaza? Fandrao hahita izay loza hanjo ny raiko aho!
