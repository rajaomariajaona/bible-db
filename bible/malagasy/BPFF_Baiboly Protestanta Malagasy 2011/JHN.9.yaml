document_id: JHN.9
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nampahiratan’i Jesosy ilay lehilahy teraka jamba
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Raha nandalo toerana iray Jesosy dia nahita lehilahy jamba hatramin’ny nahaterahany. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary nanontany Azy ny mpianany hoe: Raby ô, iza moa no nanota, io lehilahy io va sa ny ray aman-dreniny, no dia teraka jamba izy? '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dia novalìn’i Jesosy hoe: Tsy io lehilahy io no nanota na ny ray aman-dreniny, fa ny hanehoana ny asan’Andriamanitra eo aminy no anton’izao. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Isika tsy maintsy manao ny asan’izay naniraka Ahy, raha mbola antoandro; avy ny alina ka tsy mahazo miasa ny olona. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Raha amin’izao tontolo izao Aho dia fahazavan’izao tontolo izao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Rehefa avy nilaza izany Izy dia nandrora tamin’ny tany ka nanao feta tamin’ny rora, dia nahosony ny mason’ilay jamba. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary hoy Izy taminy: Andeha, sasao any amin’ny farihy Siloama, izay atao hoe Nirahina, ny masonao. Dia lasa ilay jamba nanasa ny masony, ary niverina nahiratra.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Koa izay nifanolo-bodirindrina taminy sy izay nahita azy fa mpangataka izy taloha dia niteny hoe: Tsy ity va ilay nipetraka nangataka? '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Hoy ny sasany: Izy ity, fa hoy ny sasany: Tsia, fa tahaka azy ihany ity. Hoy kosa izy: Izaho no izy. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dia hoy ny olona taminy: Ahoana no nahiratan’ny masonao? '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary hoy izy hoe: Ilay lehilahy atao hoe Jesosy no nanao feta, dia nanosotra ny masoko ka niteny tamiko hoe: Mankanesa any Siloama ka sasao ny masonao; dia nandeha aho ka nanasa azy ary nahiratra. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary hoy ny olona taminy: Aiza moa izany lehilahy izany? Hoy Ralehilahy: Tsy fantatro.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nanadihady ilay jamba sitrana ny Fariseo
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dia noentiny tany amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Fariseo
  - type: text
    text: ' ilay jamba taloha. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary tamin’ny andro Sabata no nanaovan’i Jesosy ny feta sy nampahiratany ny mason-dRalehilahy. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary mbola nanontany azy ny amin’izay nahiratan’ny masony koa ny Fariseo. Dia hoy izy taminy: Nasiany feta ny masoko dia nosasako ka nahiratra aho. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary hoy ny Fariseo sasany: Tsy avy amin’Andriamanitra izany lehilahy izany satria tsy mitandrina ny Sabata Izy. Hoy ny sasany: Hataon’ny lehilahy mpanota ahoana no fahay manao fahagagana toy izany? Dia nisara-tsaina izy ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary hoy indray izy tamin’ilay jamba: Inona no ilazanao ilay nampahiratra ny masonao? Dia hoy izy: Mpaminany Izy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Fa ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jiosy
  - type: text
    text: ' dia tsy nino azy ho jamba nahiratra, raha tsy niantso ny ray aman-drenin’ilay nahiratra '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'ka nanontaniany hoe: Zanakareo moa ity, izay lazainareo hoe teraka jamba? Koa nanao ahoana ary no nahiratany izao indray? '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Dia hoy ny navalin’ireto ray aman-dreniny hoe: Fantatray fa zanakay ity sady teraka jamba; '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'fa tsy fantatray izay fomba nahiratany toy izao; ary tsy fantatray izay olona nampahiratra ny masony; izy ihany no anontanio; efa lehibe izy, aoka izy no hilaza ny amin’ny tenany. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Izany teny izany no nolazain’ny ray aman-dreniny satria natahotra ny Jiosy izy ireo; fa efa nifanaiky mantsy ny Jiosy fa raha misy manaiky Azy ho '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' dia horoahina tsy ho isan’ny amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sinagoga
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Izany no nilazan’ny ray aman-dreniny hoe: Efa lehibe izy, koa izy no anontanio.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Dia niantso ilay jamba teo aloha indray izy ireo ka niteny taminy hoe: Omeo voninahitra Andriamanitra; izahay dia mahalala fa mpanota izany lehilahy izany. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Fa hoy izy hoe: Tsy fantatro na mpanota Izy na tsia; zavatra iray loha ihany no fantatro: Jamba aho teo aloha fa mahiratra aho izao. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Dia hoy izy taminy: Inona no nataony taminao? Nanao ahoana hoe no nampahiratany ny masonao? '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Dia hoy izy hoe: Efa voalazako taminareo ihany fa tsy nihaino ianareo; nahoana indray no te hihaino ianareo izao? Moa te ho mpianany koa va ianareo? '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Dia nanevateva azy izy ireo hoe: Ialahy no mpianany; fa izahay dia mpianatr’i Mosesy. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Izahay dia mahalala fa i Mosesy no nitenenan’Andriamanitra; fa ny amin’izany lehilahy izany dia tsy fantatray izay niaviany. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Namaly azy Ralehilahy hoe: Mba mahagaga tokoa lahy izany! Fa tsy fantatrareo izay niaviany, nefa nampahiratra ny masoko Izy. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Fantatsika fa Andriamanitra tsy mihaino ny mpanota; fa izay mivavaka aminy sy manao ny sitrapony no henoiny. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Hatrizay hatrizay dia tsy mbola re fa nisy nampahiratra ny mason’izay teraka jamba. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Raha tsy avy amin’Andriamanitra izany lehilahy izany dia tsy nahefa na inona na inona Izy. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ary hoy ny navalin’izy ireo azy hoe: Tena teraka tamin’ny ota tokoa Ialahy, koa Ialahy indray va no hampianatra anay? Dia noroahiny ho any ivelany izy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Ren’i Jesosy fa efa noroahiny ho any ivelany Ralehilahy; koa rehefa nahita azy Izy dia niteny hoe: Mino ny Zanak’Andriamanitra va ianao? '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Namaly Ralehilahy hoe: Iza moa no Izy, Tompoko, mba hinoako Azy? '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Hoy Jesosy taminy: Efa nahita Azy ianao sady izay miresaka aminao izao no Izy. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Dia hoy izy: Tompoko, mino aho. Sady niankohoka teo anatrehany izy.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Iza moa no tena jamba?
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Ary hoy Jesosy: Ho fitsarana no nahatongavako eto amin’izao tontolo izao, mba hahiratra ny tsy mahiratra ary mba ho tonga jamba kosa ny mahiratra. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Ary ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Fariseo
  - type: text
    text: ' sasany izay teo Aminy, nony nandre izany, dia niteny taminy hoe: Izahay koa va mba jamba? '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Hoy Jesosy taminy: Raha jamba ianareo dia tsy ho nanan-keloka; fa noho ianareo ankehitriny miteny hoe: Mahiratra izahay dia tsy afaka ny helokareo.'
