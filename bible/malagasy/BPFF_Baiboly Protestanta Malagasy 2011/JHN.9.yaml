document_id: JHN.9,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nampahiratan’i Jesosy ilay lehilahy teraka jamba
  - type: text
    content: 'Raha nandalo toerana iray Jesosy dia nahita lehilahy jamba hatramin’ny nahaterahany. '
  '10':
  - type: text
    content: 'Dia hoy ny olona taminy: Ahoana no nahiratan’ny masonao? '
  '11':
  - type: text
    content: 'Ary hoy izy hoe: Ilay lehilahy atao hoe Jesosy no nanao feta, dia nanosotra ny masoko ka niteny tamiko hoe: Mankanesa any Siloama ka sasao ny masonao; dia nandeha aho ka nanasa azy ary nahiratra. '
  '12':
  - type: text
    content: 'Ary hoy ny olona taminy: Aiza moa izany lehilahy izany? Hoy Ralehilahy: Tsy fantatro.'
  - type: heading
    content: Nanadihady ilay jamba sitrana ny Fariseo
  '13':
  - type: text
    content: 'Dia noentiny tany amin’ny '
  - type: text
    content: Fariseo
  - type: text
    content: ' ilay jamba taloha. '
  '14':
  - type: text
    content: 'Ary tamin’ny andro Sabata no nanaovan’i Jesosy ny feta sy nampahiratany ny mason-dRalehilahy. '
  '15':
  - type: text
    content: 'Ary mbola nanontany azy ny amin’izay nahiratan’ny masony koa ny Fariseo. Dia hoy izy taminy: Nasiany feta ny masoko dia nosasako ka nahiratra aho. '
  '16':
  - type: text
    content: 'Ary hoy ny Fariseo sasany: Tsy avy amin’Andriamanitra izany lehilahy izany satria tsy mitandrina ny Sabata Izy. Hoy ny sasany: Hataon’ny lehilahy mpanota ahoana no fahay manao fahagagana toy izany? Dia nisara-tsaina izy ireo. '
  '17':
  - type: text
    content: 'Ary hoy indray izy tamin’ilay jamba: Inona no ilazanao ilay nampahiratra ny masonao? Dia hoy izy: Mpaminany Izy.'
  '18':
  - type: text
    content: 'Fa ny '
  - type: text
    content: Jiosy
  - type: text
    content: ' dia tsy nino azy ho jamba nahiratra, raha tsy niantso ny ray aman-drenin’ilay nahiratra '
  '19':
  - type: text
    content: 'ka nanontaniany hoe: Zanakareo moa ity, izay lazainareo hoe teraka jamba? Koa nanao ahoana ary no nahiratany izao indray? '
  '2':
  - type: text
    content: 'Ary nanontany Azy ny mpianany hoe: Raby ô, iza moa no nanota, io lehilahy io va sa ny ray aman-dreniny, no dia teraka jamba izy? '
  '20':
  - type: text
    content: 'Dia hoy ny navalin’ireto ray aman-dreniny hoe: Fantatray fa zanakay ity sady teraka jamba; '
  '21':
  - type: text
    content: 'fa tsy fantatray izay fomba nahiratany toy izao; ary tsy fantatray izay olona nampahiratra ny masony; izy ihany no anontanio; efa lehibe izy, aoka izy no hilaza ny amin’ny tenany. '
  '22':
  - type: text
    content: 'Izany teny izany no nolazain’ny ray aman-dreniny satria natahotra ny Jiosy izy ireo; fa efa nifanaiky mantsy ny Jiosy fa raha misy manaiky Azy ho '
  - type: text
    content: Kristy
  - type: text
    content: ' dia horoahina tsy ho isan’ny amin’ny '
  - type: text
    content: sinagoga
  - type: text
    content: '. '
  '23':
  - type: text
    content: 'Izany no nilazan’ny ray aman-dreniny hoe: Efa lehibe izy, koa izy no anontanio.'
  '24':
  - type: text
    content: 'Dia niantso ilay jamba teo aloha indray izy ireo ka niteny taminy hoe: Omeo voninahitra Andriamanitra; izahay dia mahalala fa mpanota izany lehilahy izany. '
  '25':
  - type: text
    content: 'Fa hoy izy hoe: Tsy fantatro na mpanota Izy na tsia; zavatra iray loha ihany no fantatro: Jamba aho teo aloha fa mahiratra aho izao. '
  '26':
  - type: text
    content: 'Dia hoy izy taminy: Inona no nataony taminao? Nanao ahoana hoe no nampahiratany ny masonao? '
  '27':
  - type: text
    content: 'Dia hoy izy hoe: Efa voalazako taminareo ihany fa tsy nihaino ianareo; nahoana indray no te hihaino ianareo izao? Moa te ho mpianany koa va ianareo? '
  '28':
  - type: text
    content: 'Dia nanevateva azy izy ireo hoe: Ialahy no mpianany; fa izahay dia mpianatr’i Mosesy. '
  '29':
  - type: text
    content: 'Izahay dia mahalala fa i Mosesy no nitenenan’Andriamanitra; fa ny amin’izany lehilahy izany dia tsy fantatray izay niaviany. '
  '3':
  - type: text
    content: 'Dia novalìn’i Jesosy hoe: Tsy io lehilahy io no nanota na ny ray aman-dreniny, fa ny hanehoana ny asan’Andriamanitra eo aminy no anton’izao. '
  '30':
  - type: text
    content: 'Namaly azy Ralehilahy hoe: Mba mahagaga tokoa lahy izany! Fa tsy fantatrareo izay niaviany, nefa nampahiratra ny masoko Izy. '
  '31':
  - type: text
    content: 'Fantatsika fa Andriamanitra tsy mihaino ny mpanota; fa izay mivavaka aminy sy manao ny sitrapony no henoiny. '
  '32':
  - type: text
    content: 'Hatrizay hatrizay dia tsy mbola re fa nisy nampahiratra ny mason’izay teraka jamba. '
  '33':
  - type: text
    content: 'Raha tsy avy amin’Andriamanitra izany lehilahy izany dia tsy nahefa na inona na inona Izy. '
  '34':
  - type: text
    content: 'Ary hoy ny navalin’izy ireo azy hoe: Tena teraka tamin’ny ota tokoa Ialahy, koa Ialahy indray va no hampianatra anay? Dia noroahiny ho any ivelany izy.'
  '35':
  - type: text
    content: 'Ren’i Jesosy fa efa noroahiny ho any ivelany Ralehilahy; koa rehefa nahita azy Izy dia niteny hoe: Mino ny Zanak’Andriamanitra va ianao? '
  '36':
  - type: text
    content: 'Namaly Ralehilahy hoe: Iza moa no Izy, Tompoko, mba hinoako Azy? '
  '37':
  - type: text
    content: 'Hoy Jesosy taminy: Efa nahita Azy ianao sady izay miresaka aminao izao no Izy. '
  '38':
  - type: text
    content: 'Dia hoy izy: Tompoko, mino aho. Sady niankohoka teo anatrehany izy.'
  - type: heading
    content: Iza moa no tena jamba?
  '39':
  - type: text
    content: 'Ary hoy Jesosy: Ho fitsarana no nahatongavako eto amin’izao tontolo izao, mba hahiratra ny tsy mahiratra ary mba ho tonga jamba kosa ny mahiratra. '
  '4':
  - type: text
    content: 'Isika tsy maintsy manao ny asan’izay naniraka Ahy, raha mbola antoandro; avy ny alina ka tsy mahazo miasa ny olona. '
  '40':
  - type: text
    content: 'Ary ny '
  - type: text
    content: Fariseo
  - type: text
    content: ' sasany izay teo Aminy, nony nandre izany, dia niteny taminy hoe: Izahay koa va mba jamba? '
  '41':
  - type: text
    content: 'Hoy Jesosy taminy: Raha jamba ianareo dia tsy ho nanan-keloka; fa noho ianareo ankehitriny miteny hoe: Mahiratra izahay dia tsy afaka ny helokareo.'
  '5':
  - type: text
    content: Raha amin’izao tontolo izao Aho dia fahazavan’izao tontolo izao.
  '6':
  - type: text
    content: 'Rehefa avy nilaza izany Izy dia nandrora tamin’ny tany ka nanao feta tamin’ny rora, dia nahosony ny mason’ilay jamba. '
  '7':
  - type: text
    content: 'Ary hoy Izy taminy: Andeha, sasao any amin’ny farihy Siloama, izay atao hoe Nirahina, ny masonao. Dia lasa ilay jamba nanasa ny masony, ary niverina nahiratra.'
  '8':
  - type: text
    content: 'Koa izay nifanolo-bodirindrina taminy sy izay nahita azy fa mpangataka izy taloha dia niteny hoe: Tsy ity va ilay nipetraka nangataka? '
  '9':
  - type: text
    content: 'Hoy ny sasany: Izy ity, fa hoy ny sasany: Tsia, fa tahaka azy ihany ity. Hoy kosa izy: Izaho no izy. '
