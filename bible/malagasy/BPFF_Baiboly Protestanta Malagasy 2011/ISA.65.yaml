document_id: ISA.65,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny vahoaka mpikomy sy ny mpanompon’Andriamanitra
  - type: text
    content: Notadiavin’izay tsy naniry Aho
  - type: text
    content: ary hitan’izay tsy nitady;
  - type: text
    content: 'hoy Aho tamin’ny firenena izay tsy niantso ny anarako:'
  - type: text
    content: Inty Aho! Inty Aho!
  '10':
  - type: text
    content: Ho tonga fiandrasana ondry i Saròna,
  - type: text
    content: ary ho fandrian’omby ny lohasahan’i Akora,
  - type: text
    content: ho an’ny oloko izay nitady Ahy.
  '11':
  - type: text
    content: Fa ny aminareo izay mahafoy NY TOMPO
  - type: text
    content: sy manadino ny tendrombohitro masina
  - type: text
    content: sady mamelatra latabatra ho an’i Gada
  - type: note
    content: 'Gada: Zara, anaran’andriamanitra tsy izy.'
  - type: text
    content: sy mampidina divay noharoharoan-javatra ho an’i Menỳ
  - type: note
    content: 'Menỳ: Vintana, anaran’andriamanitra tsy izy.'
  - type: text
    content: ','
  '12':
  - type: text
    content: dia hotendreko ho voan’ny sabatra ianareo
  - type: text
    content: ka hahohoka hovonoina avokoa,
  - type: text
    content: satria niantso Aho
  - type: text
    content: nefa tsy namaly ianareo,
  - type: text
    content: niteny Aho
  - type: text
    content: nefa tsy nihaino ianareo,
  - type: text
    content: fa nanao izay ratsy teo imasoko,
  - type: text
    content: ary izay tsy sitrako no nofidinareo.
  '13':
  - type: text
    content: 'Noho izany dia izao no lazain’NY TOMPO Andriamanitra:'
  - type: text
    content: Indro, hihinana ny mpanompoko,
  - type: text
    content: fa ianareo kosa dia ho mosarena;
  - type: text
    content: indro, hisotro ny mpanompoko,
  - type: text
    content: fa ianareo kosa dia ho main-tenda;
  - type: text
    content: indro, hifaly ny mpanompoko,
  - type: text
    content: fa ianareo kosa dia hitsanga-menatra;
  '14':
  - type: text
    content: indro, hihoby ny mpanompoko
  - type: text
    content: noho ny haravoan’ny fo,
  - type: text
    content: fa ianareo kosa dia hitoloko
  - type: text
    content: noho ny alahelom-po,
  - type: text
    content: ary hidradradradra
  - type: text
    content: noho ny fahoriam-panahy.
  '15':
  - type: text
    content: Hamela ny anaranareo ho fanozonana amin’ireo voafidiko ianareo,
  - type: text
    content: ary hahafaty anao NY TOMPO Andriamanitra.
  - type: text
    content: Fa ny mpanompony kosa dia homeny anaram-baovao;
  '16':
  - type: text
    content: koa izay miarahaba tena etỳ ambonin’ny tany
  - type: text
    content: 'dia hanao izany amin’ny anaran’Andriamanitry ny '
  - type: text
    content: Amena
  - type: text
    content: ary izay mianiana etỳ ambonin’ny tany
  - type: text
    content: dia hianiana amin’Andriamanitry ny Amena,
  - type: text
    content: satria efa hadino ny fahoriana taloha
  - type: text
    content: sady voafina izany ka tsy hitan’ny masoko.
  '17':
  - type: text
    content: Fa indro Aho mahary lanitra vaovao
  - type: text
    content: sy tany vaovao;
  - type: text
    content: tsy hotsarovana intsony ny taloha,
  - type: text
    content: na ho tonga ao an-tsaina akory aza.
  '18':
  - type: text
    content: Fa mifalia kosa,
  - type: text
    content: ary miravoravoa mandrakizay,
  - type: text
    content: satria mahary izany Aho;
  - type: text
    content: fa indro, mahary an’i Jerosalema ho fifaliana Aho
  - type: text
    content: ary ny olony ho firavoravoana.
  '19':
  - type: text
    content: Dia ho faly amin’i Jerosalema Aho
  - type: text
    content: ary ho ravoravo amin’ny oloko;
  - type: text
    content: tsy ho re any intsony
  - type: text
    content: ny feo mitomany
  - type: text
    content: sy ny feo mitaraina.
  '2':
  - type: text
    content: Nanatsotra hatrany ny tanako Aho tamin’ny firenena mpikomy
  - type: text
    content: izay mandeha amin’ny lalana tsy tsara
  - type: text
    content: araka ny fisainany ihany,
  '20':
  - type: text
    content: Ary tsy hisy ao intsony
  - type: text
    content: ny zaza minono fohy andro,
  - type: text
    content: ary tsy hisy lahiantitra izay tsy nahatapitra ny androny;
  - type: text
    content: fa mbola zatovo ihany izay maty na dia efa zato taona aza,
  - type: text
    content: ary ny mpanota izay mahatratra zato taona dia ho toy ny voaozona.
  '21':
  - type: text
    content: Hanao trano ny olona
  - type: text
    content: ka hitoetra ao;
  - type: text
    content: ary hanao tanim-boaloboka ny olona
  - type: text
    content: ka hihinana ny vokatra aminy.
  '22':
  - type: text
    content: Tsy hanao trano
  - type: text
    content: hitoeran’olon-kafa izy,
  - type: text
    content: na hamboly zavatra
  - type: text
    content: hohanin’olon-kafa;
  - type: text
    content: fa ho tahaka ny andron’ny hazo ny andron’ny oloko,
  - type: text
    content: ary ireo voafidiko dia hanaram-po amin’ny asan’ny tanany.
  '23':
  - type: text
    content: Tsy hisasatra foana izy,
  - type: text
    content: na hitera-jaza ho tratry ny loza tampoka.
  - type: text
    content: Fa taranak’izay notahin’NY TOMPO ireo,
  - type: text
    content: ary ho ao aminy koa ny taranany.
  '24':
  - type: text
    content: Raha tsy mbola miantso aza izy
  - type: text
    content: dia hamaly Aho;
  - type: text
    content: ary raha mbola miteny izy
  - type: text
    content: dia hihaino Aho.
  '25':
  - type: text
    content: Hiara-komana ny amboadia sy ny zanak’ondry,
  - type: text
    content: ary hihina-mololo tahaka ny omby ny liona,
  - type: text
    content: ary ny menarana dia vovoka no ho fihinany;
  - type: text
    content: tsy handratra na hanimba
  - type: text
    content: manerana ny tendrombohitro masina izy,
  - type: text
    content: hoy NY TOMPO.
  '3':
  - type: text
    content: firenena izay nahatezitra Ahy mandrakariva na dia eo imasoko aza,
  - type: text
    content: izay mamono zavatra hatao fanatitra eny amin’ny tanimboly,
  - type: text
    content: ary mandoro ditin-kazo manitra eny ambonin’ny biriky;
  '4':
  - type: text
    content: mipetraka any amin’ny fasana izy
  - type: text
    content: ary mitoetra mandritra ny alina any am-pierena
  - type: text
    content: sady mihinana henan-kisoa,
  - type: text
    content: ary ny ron-kena maloto no ao amin’ny loviany.
  '5':
  - type: text
    content: 'Hoy izy: Mihataha'
  - type: text
    content: fa aza manakaiky ahy,
  - type: text
    content: fa izaho no masina fa tsy ianao.
  - type: text
    content: Ireny dia setroka ao am-bavoroko;
  - type: text
    content: eny, afo mirehitra mandritra ny andro.
  '6':
  - type: text
    content: 'Indro, izao no voasoratra eo anatrehako:'
  - type: text
    content: Tsy hangina Aho mandra-pamaliko anareo;
  - type: text
    content: eny, mandra-pamaliko ho ao an-tratranareo
  '7':
  - type: text
    content: ny helokareo
  - type: text
    content: sy ny heloky ny razanareo koa, hoy NY TOMPO,
  - type: text
    content: dia izay olona nandoro ditin-kazo manitra teny an-tendrombohitra,
  - type: text
    content: ary nihantsy Ahy teny amin’ny havoana;
  - type: text
    content: eny, hamatra ny valin’ny asany
  - type: text
    content: ho ao an-tratrany Aho aloha.
  '8':
  - type: text
    content: 'Izao no lazain’NY TOMPO:'
  - type: text
    content: Tahaka ny ranom-boaloboka hita ao an-tsampahony
  - type: text
    content: 'ka ataon’ny olona hoe: Aza simbana'
  - type: text
    content: fa misy fitahiana ao anatiny!
  - type: text
    content: Dia toy izany no hataoko noho ny amin’ireo mpanompoko
  - type: text
    content: ka tsy hanimba azy rehetra Aho.
  '9':
  - type: text
    content: Hahatonga taranaka avy amin’i Jakoba Aho,
  - type: text
    content: ary mpandova ny tendrombohitro avy amin’i Joda;
  - type: text
    content: ireo voafidiko no handova azy;
  - type: text
    content: eny, ireo mpanompoko no honina ao.
