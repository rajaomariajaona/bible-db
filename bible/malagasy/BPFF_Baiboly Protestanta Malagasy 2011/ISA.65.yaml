document_id: ISA.65,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny vahoaka mpikomy sy ny mpanompon’Andriamanitra
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Notadiavin’izay tsy naniry Aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hitan’izay tsy nitady;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'hoy Aho tamin’ny firenena izay tsy niantso ny anarako:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Inty Aho! Inty Aho!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho tonga fiandrasana ondry i Saròna,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ho fandrian’omby ny lohasahan’i Akora,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho an’ny oloko izay nitady Ahy.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny aminareo izay mahafoy NY TOMPO
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy manadino ny tendrombohitro masina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady mamelatra latabatra ho an’i Gada
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '65.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Gada: Zara, anaran’andriamanitra tsy izy.'
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy mampidina divay noharoharoan-javatra ho an’i Menỳ
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '65.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Menỳ: Vintana, anaran’andriamanitra tsy izy.'
      marker-yv: yv-n
    - type: text
      text: ','
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hotendreko ho voan’ny sabatra ianareo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hahohoka hovonoina avokoa,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria niantso Aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa tsy namaly ianareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: niteny Aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa tsy nihaino ianareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa nanao izay ratsy teo imasoko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary izay tsy sitrako no nofidinareo.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Noho izany dia izao no lazain’NY TOMPO Andriamanitra:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro, hihinana ny mpanompoko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ianareo kosa dia ho mosarena;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: indro, hisotro ny mpanompoko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ianareo kosa dia ho main-tenda;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: indro, hifaly ny mpanompoko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ianareo kosa dia hitsanga-menatra;
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: indro, hihoby ny mpanompoko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: noho ny haravoan’ny fo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ianareo kosa dia hitoloko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: noho ny alahelom-po,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hidradradradra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: noho ny fahoriam-panahy.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hamela ny anaranareo ho fanozonana amin’ireo voafidiko ianareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hahafaty anao NY TOMPO Andriamanitra.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny mpanompony kosa dia homeny anaram-baovao;
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: koa izay miarahaba tena etỳ ambonin’ny tany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'dia hanao izany amin’ny anaran’Andriamanitry ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Amena
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary izay mianiana etỳ ambonin’ny tany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hianiana amin’Andriamanitry ny Amena,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria efa hadino ny fahoriana taloha
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady voafina izany ka tsy hitan’ny masoko.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa indro Aho mahary lanitra vaovao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy tany vaovao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy hotsarovana intsony ny taloha,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na ho tonga ao an-tsaina akory aza.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa mifalia kosa,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary miravoravoa mandrakizay,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria mahary izany Aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa indro, mahary an’i Jerosalema ho fifaliana Aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny olony ho firavoravoana.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ho faly amin’i Jerosalema Aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ho ravoravo amin’ny oloko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy ho re any intsony
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny feo mitomany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny feo mitaraina.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nanatsotra hatrany ny tanako Aho tamin’ny firenena mpikomy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay mandeha amin’ny lalana tsy tsara
  - type: usfm
    marker: q1
    children:
    - type: text
      text: araka ny fisainany ihany,
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tsy hisy ao intsony
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny zaza minono fohy andro,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy hisy lahiantitra izay tsy nahatapitra ny androny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa mbola zatovo ihany izay maty na dia efa zato taona aza,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny mpanota izay mahatratra zato taona dia ho toy ny voaozona.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hanao trano ny olona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hitoetra ao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hanao tanim-boaloboka ny olona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hihinana ny vokatra aminy.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy hanao trano
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hitoeran’olon-kafa izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na hamboly zavatra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hohanin’olon-kafa;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ho tahaka ny andron’ny hazo ny andron’ny oloko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ireo voafidiko dia hanaram-po amin’ny asan’ny tanany.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy hisasatra foana izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na hitera-jaza ho tratry ny loza tampoka.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa taranak’izay notahin’NY TOMPO ireo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ho ao aminy koa ny taranany.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha tsy mbola miantso aza izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hamaly Aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary raha mbola miteny izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hihaino Aho.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hiara-komana ny amboadia sy ny zanak’ondry,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hihina-mololo tahaka ny omby ny liona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny menarana dia vovoka no ho fihinany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy handratra na hanimba
  - type: usfm
    marker: q1
    children:
    - type: text
      text: manerana ny tendrombohitro masina izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy NY TOMPO.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: firenena izay nahatezitra Ahy mandrakariva na dia eo imasoko aza,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay mamono zavatra hatao fanatitra eny amin’ny tanimboly,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mandoro ditin-kazo manitra eny ambonin’ny biriky;
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mipetraka any amin’ny fasana izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mitoetra mandritra ny alina any am-pierena
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady mihinana henan-kisoa,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny ron-kena maloto no ao amin’ny loviany.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Hoy izy: Mihataha'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa aza manakaiky ahy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa izaho no masina fa tsy ianao.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ireny dia setroka ao am-bavoroko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, afo mirehitra mandritra ny andro.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Indro, izao no voasoratra eo anatrehako:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy hangina Aho mandra-pamaliko anareo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, mandra-pamaliko ho ao an-tratranareo
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny helokareo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny heloky ny razanareo koa, hoy NY TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia izay olona nandoro ditin-kazo manitra teny an-tendrombohitra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary nihantsy Ahy teny amin’ny havoana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, hamatra ny valin’ny asany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho ao an-tratrany Aho aloha.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Izao no lazain’NY TOMPO:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tahaka ny ranom-boaloboka hita ao an-tsampahony
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ka ataon’ny olona hoe: Aza simbana'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa misy fitahiana ao anatiny!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia toy izany no hataoko noho ny amin’ireo mpanompoko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy hanimba azy rehetra Aho.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hahatonga taranaka avy amin’i Jakoba Aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mpandova ny tendrombohitro avy amin’i Joda;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ireo voafidiko no handova azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, ireo mpanompoko no honina ao.
