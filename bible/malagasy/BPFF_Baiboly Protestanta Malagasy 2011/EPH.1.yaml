      children:
      - type: text
        text: Kristy
    - type: text
      text: ' Tompontsika, izay nitahy antsika tao amin’i Kristy amin’ny fitahiam-panahy rehetra any an-danitra, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'araka ny nifidianany antsika tao Aminy, fony tsy mbola ary ny fanorenan’izao tontolo izao, mba ho masina sady tsy misy tsiny eo anatrehany isika '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'rehefa notendreny rahateo tamin’ny fitiavana mba ho Azy amin’ny fananganana anaka, amin’ny alalan’i Jesosy Kristy, araka izay ankasitrahan’ny fony, '
  '6':
  - type: usfm
