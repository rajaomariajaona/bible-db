  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ao Aminy no ananantsika fanavotana tamin’ny alalan’ny rany, dia ny famelana ny fahadisoantsika, araka ny harenan’ny fahasoavany '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
