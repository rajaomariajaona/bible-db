document_id: EPH.1,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Fiarahabana
  - type: text
    content: 'I Paoly, apostolin’i '
  - type: text
    content: Kristy
  - type: text
    content: ' Jesosy noho ny sitrapon’Andriamanitra no mamangy ny olona masina any Efesosy, izay mahatoky ao amin’i Kristy Jesosy: '
  '10':
  - type: text
    content: mba hanatanterahany izany rehefa tonga ny fotoana voatendry, ka hanangonany indray ny zavatra rehetra, na ny any an-danitra na ny etỳ an-tany ho ambanin’ny mpitondra tokana dia Kristy.
  '11':
  - type: text
    content: 'Tao Aminy koa no nandraisantsika ny anjara lovantsika, dia isika izay notendrena mialoha araka ny fikasan’Izay mahefa ny zavatra rehetra, araka izay sitraky ny fony, '
  '12':
  - type: text
    content: mba ho fiderana ny voninahiny isika izay manana fanantenana ao amin’i Kristy.
  '13':
  - type: text
    content: 'Ao Aminy koa ianareo, rehefa renareo ny tenin’ny fahamarinana, dia ny Filazantsara izay mamonjy anareo. Eny, ao Aminy koa ianareo, rehefa nino ka nasiana tombo-kase tamin’ny Fanahy Masina, araka ny teny fikasana. '
  '14':
  - type: text
    content: Izany Fanahy izany no santatry ny lovantsika ho amin’ny fanavotana ny olona izay nalainy ho an’ny tenany, mba ho fiderana ny voninahiny.
  - type: heading
    content: Vavaka fangatahana
  '15':
  - type: text
    content: 'Noho izany, izaho koa, rehefa nandre ny amin’ny finoanareo an’i Jesosy Tompo sy ny fitiavanareo ny olona masina rehetra, '
  '16':
  - type: text
    content: 'dia tsy mitsahatra misaotra noho ny aminareo ka mahatsiaro anareo amin’ny vavaka ataoko '
  '17':
  - type: text
    content: 'mba homen’Andriamanitr’i Jesosy '
  - type: text
    content: Kristy
  - type: text
    content: ' Tompontsika, Rain’ny voninahitra, ho anareo ny fanahin’ny fahendrena sy ny fanambaràna mba hahalalanareo Azy tsara. '
  '18':
  - type: text
    content: 'Dia mba hampahiratina ny mason’ny sainareo ka ho fantatrareo ny fanantenana izay miaraka amin’ny fiantsoany sy ny harena feno voninahitra ao amin’ny lova omeny anareo miaraka amin’ny olona masina, '
  '19':
  - type: text
    content: ary mba ho fantatrareo fa lehibe tsy hita lany ny heriny izay nasehony ho antsika mpino. Izany dia nataony araka ny heriny tsy hay tohaina.
  '2':
  - type: text
    content: Ho aminareo anie ny fahasoavana sy ny fiadanana avy amin’Andriamanitra Raintsika sy Jesosy Kristy Tompo.
  - type: heading
    content: Fitahiana feno ao amin’i Kristy
  '20':
  - type: text
    content: 'Izany heriny izany no nananganany an’i Kristy tamin’ny maty sy nampitoerany Azy eo ankavanany any an-danitra, '
  '21':
  - type: text
    content: 'ambony lavitra noho ny fanapahana rehetra, ny fahefana, ny hery, ny fanjakana ary ny anarana rehetra azo tononina, tsy amin’izao fiainana izao ihany, fa amin’ny ho avy koa. '
  '22':
  - type: text
    content: Nampanaiky ny zavatra rehetra ho eo ambanin’ny tongony Izy ka nanao Azy ho ambonin’ny zavatra rehetra sady Lohan’ny fiangonana
  - type: note
    content: 'Na: eklesia.'
  - type: text
    content: ' '
  '23':
  - type: text
    content: izay tenany, dia ny fahafenoan’Izay mameno tanteraka ny zavatra rehetra.
  '3':
  - type: text
    content: 'Isaorana anie Andriamanitra, Rain’i Jesosy '
  - type: text
    content: Kristy
  - type: text
    content: ' Tompontsika, izay nitahy antsika tao amin’i Kristy amin’ny fitahiam-panahy rehetra any an-danitra, '
  '4':
  - type: text
    content: 'araka ny nifidianany antsika tao Aminy, fony tsy mbola ary ny fanorenan’izao tontolo izao, mba ho masina sady tsy misy tsiny eo anatrehany isika '
  '5':
  - type: text
    content: 'rehefa notendreny rahateo tamin’ny fitiavana mba ho Azy amin’ny fananganana anaka, amin’ny alalan’i Jesosy Kristy, araka izay ankasitrahan’ny fony, '
  '6':
  - type: text
    content: mba ho fiderana ny voninahitry ny fahasoavany izay nanasoavany antsika maimaimpoana tao amin’ny Malalany.
  '7':
  - type: text
    content: 'Ao Aminy no ananantsika fanavotana tamin’ny alalan’ny rany, dia ny famelana ny fahadisoantsika, araka ny harenan’ny fahasoavany '
  '8':
  - type: text
    content: 'izay nataony be dia be ho antsika tamin’ny fahendrena sy ny fisainana rehetra: '
  '9':
  - type: text
    content: 'Nampahafantariny antsika ny zavamiafina ny amin’ny sitrapony, araka ny safidiny izay nokasain’ny tenany, '
