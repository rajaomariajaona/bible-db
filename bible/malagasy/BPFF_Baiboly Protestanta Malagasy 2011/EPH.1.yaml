      - type: text
        text: '1'
    - type: text
      text: 'I Paoly, apostolin’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ' Jesosy noho ny sitrapon’Andriamanitra no mamangy ny olona masina any Efesosy, izay mahatoky ao amin’i Kristy Jesosy: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: mba hanatanterahany izany rehefa tonga ny fotoana voatendry, ka hanangonany indray ny zavatra rehetra, na ny any an-danitra na ny etỳ an-tany ho ambanin’ny mpitondra tokana dia Kristy.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Tao Aminy koa no nandraisantsika ny anjara lovantsika, dia isika izay notendrena mialoha araka ny fikasan’Izay mahefa ny zavatra rehetra, araka izay sitraky ny fony, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: mba ho fiderana ny voninahiny isika izay manana fanantenana ao amin’i Kristy.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ao Aminy koa ianareo, rehefa renareo ny tenin’ny fahamarinana, dia ny Filazantsara izay mamonjy anareo. Eny, ao Aminy koa ianareo, rehefa nino ka nasiana tombo-kase tamin’ny Fanahy Masina, araka ny teny fikasana. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Izany Fanahy izany no santatry ny lovantsika ho amin’ny fanavotana ny olona izay nalainy ho an’ny tenany, mba ho fiderana ny voninahiny.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Vavaka fangatahana
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Noho izany, izaho koa, rehefa nandre ny amin’ny finoanareo an’i Jesosy Tompo sy ny fitiavanareo ny olona masina rehetra, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'dia tsy mitsahatra misaotra noho ny aminareo ka mahatsiaro anareo amin’ny vavaka ataoko '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'mba homen’Andriamanitr’i Jesosy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ' Tompontsika, Rain’ny voninahitra, ho anareo ny fanahin’ny fahendrena sy ny fanambaràna mba hahalalanareo Azy tsara. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Dia mba hampahiratina ny mason’ny sainareo ka ho fantatrareo ny fanantenana izay miaraka amin’ny fiantsoany sy ny harena feno voninahitra ao amin’ny lova omeny anareo miaraka amin’ny olona masina, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ary mba ho fantatrareo fa lehibe tsy hita lany ny heriny izay nasehony ho antsika mpino. Izany dia nataony araka ny heriny tsy hay tohaina.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Ho aminareo anie ny fahasoavana sy ny fiadanana avy amin’Andriamanitra Raintsika sy Jesosy Kristy Tompo.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fitahiana feno ao amin’i Kristy
    marker-yv: yv-h
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Izany heriny izany no nananganany an’i Kristy tamin’ny maty sy nampitoerany Azy eo ankavanany any an-danitra, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'ambony lavitra noho ny fanapahana rehetra, ny fahefana, ny hery, ny fanjakana ary ny anarana rehetra azo tononina, tsy amin’izao fiainana izao ihany, fa amin’ny ho avy koa. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Nampanaiky ny zavatra rehetra ho eo ambanin’ny tongony Izy ka nanao Azy ho ambonin’ny zavatra rehetra sady Lohan’ny fiangonana
    - type: usfm
      marker: f
