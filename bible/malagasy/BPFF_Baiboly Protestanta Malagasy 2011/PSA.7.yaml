document_id: PSA.7,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Aoreno ny rariny tokony ho ahy
  - type: text
    content: Fitarainana nataon’i Davida. Nohirainy ho an’NY TOMPO noho ny tenin’i Kosy benjaminita.
  - type: text
    content: RY TOMPO Andriamanitro ô, Ianao no ialofako;
  - type: text
    content: vonjeo aho amin’izay rehetra manenjika ahy ka afaho,
  '10':
  - type: text
    content: Ny ampingako dia ao amin’Andriamanitra,
  - type: text
    content: Mpamonjy ny mahitsy fo.
  '11':
  - type: text
    content: Mpitsara marina Andriamanitra,
  - type: text
    content: eny, Andriamanitra izay tezitra isanandro.
  '12':
  - type: text
    content: Raha tsy ibebahana Izy dia handranitra ny sabany;
  - type: text
    content: efa manenjana ny tsipìkany Izy ka manomana azy.
  '13':
  - type: text
    content: Izany no anomanany fiadiana mahafaty;
  - type: text
    content: ataony mirehitra ny zana-tsipìkany.
  '14':
  - type: text
    content: Indro, efa marary hiteraka zava-poana ireo;
  - type: text
    content: eny, mitondra fampahoriana ao an-kibony izy ary miteraka lainga.
  '15':
  - type: text
    content: Mihady lavaka izy ka manalalaka izany
  - type: text
    content: ary latsaka ao anatin’ny lavaka nataony ihany izy.
  '16':
  - type: text
    content: Mitsingerina ho eo an-dohany ihany ny fampahoriana ataony
  - type: text
    content: ary eo an-tampon-dohany ihany no ianjeran’ny loza nataony.
  '17':
  - type: text
    content: Hidera NY TOMPO araka ny fahamarinany aho
  - type: text
    content: ary hankalaza ny anaran’NY TOMPO Avo Indrindra.
  '2':
  - type: text
    content: fandrao viravirainy tahaka ny fanaon’ny liona ny fanahiko
  - type: text
    content: ary kepokepohiny ka tsy misy mamonjy!
  '3':
  - type: text
    content: RY TOMPO Andriamanitro ô, raha nanao izany tokoa aho,
  - type: text
    content: raha nisy heloka teto an-tanako,
  '4':
  - type: text
    content: raha namaly ratsy izay tsara fihavanana tamiko aho,
  - type: text
    content: na nandroba izay nampahory ahy tsy amin’antony,
  '5':
  - type: text
    content: dia aoka hanenjika ahy ny fahavalo ka hahatratra ahy;
  - type: text
    content: eny, aoka izy hanitsaka ny aiko amin’ny tany
  - type: text
    content: 'sady hampandry ny voninahitro amin’ny vovoka. '
  - type: text
    content: Fiatoana
  '6':
  - type: text
    content: TOMPO ô, mitsangàna amin’ny fahatezeranao.
  - type: text
    content: Misandrata hisakana ny fisafoaky ny mpampahory ahy
  - type: text
    content: ary mifohaza hanampy ahy, fa didy marina no navoakanao.
  '7':
  - type: text
    content: Aoka ny firenena maro hivory manodidina Anao
  - type: text
    content: ary miverena ho eo amin’ny avo eo amboniny Ianao.
  '8':
  - type: text
    content: NY TOMPO mitsara ny firenena.
  - type: text
    content: TOMPO ô, tsarao aho
  - type: text
    content: araka ny fahamarinako sy ny tsy fananako tsiny.
  '9':
  - type: text
    content: Mba atsaharo ny ratsy ataon’ny ratsy fanahy
  - type: text
    content: ary ampitoero kosa ny marina,
  - type: text
    content: fa Ianao dia Andriamanitra marina mizaha toetra ny fo sy ny voa.
