document_id: PSA.7,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Aoreno ny rariny tokony ho ahy
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: Fitarainana nataon’i Davida. Nohirainy ho an’NY TOMPO noho ny tenin’i Kosy benjaminita.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: RY TOMPO Andriamanitro ô, Ianao no ialofako;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vonjeo aho amin’izay rehetra manenjika ahy ka afaho,
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Ny ampingako dia ao amin’Andriamanitra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mpamonjy ny mahitsy fo.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Mpitsara marina Andriamanitra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, Andriamanitra izay tezitra isanandro.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Raha tsy ibebahana Izy dia handranitra ny sabany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: efa manenjana ny tsipìkany Izy ka manomana azy.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Izany no anomanany fiadiana mahafaty;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ataony mirehitra ny zana-tsipìkany.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Indro, efa marary hiteraka zava-poana ireo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, mitondra fampahoriana ao an-kibony izy ary miteraka lainga.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Mihady lavaka izy ka manalalaka izany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary latsaka ao anatin’ny lavaka nataony ihany izy.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Mitsingerina ho eo an-dohany ihany ny fampahoriana ataony
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary eo an-tampon-dohany ihany no ianjeran’ny loza nataony.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Hidera NY TOMPO araka ny fahamarinany aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hankalaza ny anaran’NY TOMPO Avo Indrindra.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: fandrao viravirainy tahaka ny fanaon’ny liona ny fanahiko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary kepokepohiny ka tsy misy mamonjy!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: RY TOMPO Andriamanitro ô, raha nanao izany tokoa aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: raha nisy heloka teto an-tanako,
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: raha namaly ratsy izay tsara fihavanana tamiko aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na nandroba izay nampahory ahy tsy amin’antony,
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: dia aoka hanenjika ahy ny fahavalo ka hahatratra ahy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, aoka izy hanitsaka ny aiko amin’ny tany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'sady hampandry ny voninahitro amin’ny vovoka. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Fiatoana
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: TOMPO ô, mitsangàna amin’ny fahatezeranao.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Misandrata hisakana ny fisafoaky ny mpampahory ahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mifohaza hanampy ahy, fa didy marina no navoakanao.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Aoka ny firenena maro hivory manodidina Anao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary miverena ho eo amin’ny avo eo amboniny Ianao.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: NY TOMPO mitsara ny firenena.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: TOMPO ô, tsarao aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: araka ny fahamarinako sy ny tsy fananako tsiny.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Mba atsaharo ny ratsy ataon’ny ratsy fanahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ampitoero kosa ny marina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa Ianao dia Andriamanitra marina mizaha toetra ny fo sy ny voa.
