document_id: JOB.37
type_code: plt
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Eny, izany no mampitepotepo ny foko
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka mampiemponempona azy hiala amin’ny fitoerany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Henoy tsara ny fikotrokotroky ny feony
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny rohona izay mivoaka avy amin’ny vavany!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Mandefa izany ho eny ambanin’ny lanitra rehetra Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny tselatra hatrany amin’ny faran’ny tany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Aorianan’izany dia misy feo mirohondrohona;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mampikotrokotroka ny feony mahatalanjona Izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: koa rehefa re ny feony dia tsy sakanany intsony ny tselatra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Mampikotrokotroka ny fahagagana ataony Andriamanitra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: manao zava-dehibe tsy takatry ny saintsika Izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ny orampanala dia baikoiny hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Milatsaha eny ambonin’ny tany ianao!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary toy izany koa ny ranonorana mivatravatra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, ny ranonorany mivatravatra mafy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Manakombona ny tanan’ny olona rehetra amin’ny tombo-kase Izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hahafantatra ny asany ny olona rehetra izay nataony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Miditra ao amin’ny fiereny koa ny bibidia
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka mamitsaka ao an-davany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Avy any atsimo ny tadio
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary entin’ny rivotra avy any avaratra ny hatsiaka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ny fofonain’Andriamanitra no mampisy ranomandry
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka lasa mivaingana ny rano midadasika.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ny rahona matevina dia tambesarany rano
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny rahona manelatrelatra dia aeliny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Dia mihodinkodina amin’izay itarihany azy ireo
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hanatanteraka izay rehetra andidiany azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny ambonin’ny tany, manerana izao tontolo izao,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: na alatsany ho famaizana izany na hanasoa ny taniny
- type: usfm
  marker: q1
  children:
  - type: text
    text: na ho famindrampo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Atongilano ny sofinao ka mihainoa, ry Joba!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mijanòna, koa mba diniho ny fahagagana ataon’Andriamanitra!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Fantatrao va ny ibaikoany azy ireny
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka ampamirapiratany ny tselatra eny amin’ny rahony?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Fantatrao va ny fihevahevan’ny rahona matevina
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay fahagagana ataon’Ilay tanteraka amin’ny fahalalana?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ianao izay mahatsiaro ny fitafianao ho mafana
- type: usfm
  marker: q1
  children:
  - type: text
    text: raha migaingaina ny andro azon’ny rivotra avy any atsimo,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: moa va ianao niara-nanefy Taminy ny habakabaka
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay mitoetra mafy toy ny fitaratra natao tamin’ny metaly voarendrika?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Mba ampianaro anay ary izay holazainay Aminy
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa tsy hitanay izay halahatray noho ny haizina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Holazaina Aminy va raha miteny aho?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Moa tsy maintsy miteny va ny olona vao ho reny?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Tsy hita ankehitriny ny mazava izay notakotakonan’ny rahona;
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa nisy rivotra nandalo
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia nampisava azy ihany izany
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ka misy mazava mitarehim-bolamena tamy avy any avaratra.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ao amin’Andriamanitra dia misy famirapiratana mahatahotra!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ny Tsitoha, tsy mahita Azy isika.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Lehibe amin’ny hery sy ny fitsarana
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny fahamarinana tanteraka Izy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy mba mampahory olona Izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Koa izany no hatahoran’ny olona Azy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy mijery izay manao azy ho hendry Izy.
