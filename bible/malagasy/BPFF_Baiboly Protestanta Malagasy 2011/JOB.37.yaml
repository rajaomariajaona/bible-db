document_id: JOB.37,3103
type_code: plt
verses:
  '1':
  - type: text
    content: Eny, izany no mampitepotepo ny foko
  - type: text
    content: ka mampiemponempona azy hiala amin’ny fitoerany.
  '10':
  - type: text
    content: Ny fofonain’Andriamanitra no mampisy ranomandry
  - type: text
    content: ka lasa mivaingana ny rano midadasika.
  '11':
  - type: text
    content: Ny rahona matevina dia tambesarany rano
  - type: text
    content: ary ny rahona manelatrelatra dia aeliny.
  '12':
  - type: text
    content: Dia mihodinkodina amin’izay itarihany azy ireo
  - type: text
    content: mba hanatanteraka izay rehetra andidiany azy
  - type: text
    content: eny ambonin’ny tany, manerana izao tontolo izao,
  '13':
  - type: text
    content: na alatsany ho famaizana izany na hanasoa ny taniny
  - type: text
    content: na ho famindrampo.
  '14':
  - type: text
    content: Atongilano ny sofinao ka mihainoa, ry Joba!
  - type: text
    content: Mijanòna, koa mba diniho ny fahagagana ataon’Andriamanitra!
  '15':
  - type: text
    content: Fantatrao va ny ibaikoany azy ireny
  - type: text
    content: ka ampamirapiratany ny tselatra eny amin’ny rahony?
  '16':
  - type: text
    content: Fantatrao va ny fihevahevan’ny rahona matevina
  - type: text
    content: izay fahagagana ataon’Ilay tanteraka amin’ny fahalalana?
  '17':
  - type: text
    content: Ianao izay mahatsiaro ny fitafianao ho mafana
  - type: text
    content: raha migaingaina ny andro azon’ny rivotra avy any atsimo,
  '18':
  - type: text
    content: moa va ianao niara-nanefy Taminy ny habakabaka
  - type: text
    content: izay mitoetra mafy toy ny fitaratra natao tamin’ny metaly voarendrika?
  '19':
  - type: text
    content: Mba ampianaro anay ary izay holazainay Aminy
  - type: text
    content: fa tsy hitanay izay halahatray noho ny haizina.
  '2':
  - type: text
    content: Henoy tsara ny fikotrokotroky ny feony
  - type: text
    content: sy ny rohona izay mivoaka avy amin’ny vavany!
  '20':
  - type: text
    content: Holazaina Aminy va raha miteny aho?
  - type: text
    content: Moa tsy maintsy miteny va ny olona vao ho reny?
  '21':
  - type: text
    content: Tsy hita ankehitriny ny mazava izay notakotakonan’ny rahona;
  - type: text
    content: nefa nisy rivotra nandalo
  - type: text
    content: dia nampisava azy ihany izany
  '22':
  - type: text
    content: ka misy mazava mitarehim-bolamena tamy avy any avaratra.
  - type: text
    content: Ao amin’Andriamanitra dia misy famirapiratana mahatahotra!
  '23':
  - type: text
    content: Ny Tsitoha, tsy mahita Azy isika.
  - type: text
    content: Lehibe amin’ny hery sy ny fitsarana
  - type: text
    content: ary ny fahamarinana tanteraka Izy.
  - type: text
    content: Tsy mba mampahory olona Izy.
  '24':
  - type: text
    content: Koa izany no hatahoran’ny olona Azy;
  - type: text
    content: tsy mijery izay manao azy ho hendry Izy.
  '3':
  - type: text
    content: Mandefa izany ho eny ambanin’ny lanitra rehetra Izy
  - type: text
    content: ary ny tselatra hatrany amin’ny faran’ny tany.
  '4':
  - type: text
    content: Aorianan’izany dia misy feo mirohondrohona;
  - type: text
    content: mampikotrokotroka ny feony mahatalanjona Izy,
  - type: text
    content: koa rehefa re ny feony dia tsy sakanany intsony ny tselatra.
  '5':
  - type: text
    content: Mampikotrokotroka ny fahagagana ataony Andriamanitra;
  - type: text
    content: manao zava-dehibe tsy takatry ny saintsika Izy.
  '6':
  - type: text
    content: 'Ny orampanala dia baikoiny hoe:'
  - type: text
    content: Milatsaha eny ambonin’ny tany ianao!
  - type: text
    content: Ary toy izany koa ny ranonorana mivatravatra;
  - type: text
    content: eny, ny ranonorany mivatravatra mafy.
  '7':
  - type: text
    content: Manakombona ny tanan’ny olona rehetra amin’ny tombo-kase Izy,
  - type: text
    content: mba hahafantatra ny asany ny olona rehetra izay nataony.
  '8':
  - type: text
    content: Miditra ao amin’ny fiereny koa ny bibidia
  - type: text
    content: ka mamitsaka ao an-davany.
  '9':
  - type: text
    content: Avy any atsimo ny tadio
  - type: text
    content: ary entin’ny rivotra avy any avaratra ny hatsiaka.
