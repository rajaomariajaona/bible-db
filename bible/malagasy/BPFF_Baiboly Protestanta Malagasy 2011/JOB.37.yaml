document_id: JOB.37,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, izany no mampitepotepo ny foko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka mampiemponempona azy hiala amin’ny fitoerany.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fofonain’Andriamanitra no mampisy ranomandry
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka lasa mivaingana ny rano midadasika.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny rahona matevina dia tambesarany rano
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny rahona manelatrelatra dia aeliny.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia mihodinkodina amin’izay itarihany azy ireo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hanatanteraka izay rehetra andidiany azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny ambonin’ny tany, manerana izao tontolo izao,
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na alatsany ho famaizana izany na hanasoa ny taniny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na ho famindrampo.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Atongilano ny sofinao ka mihainoa, ry Joba!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mijanòna, koa mba diniho ny fahagagana ataon’Andriamanitra!
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fantatrao va ny ibaikoany azy ireny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka ampamirapiratany ny tselatra eny amin’ny rahony?
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fantatrao va ny fihevahevan’ny rahona matevina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay fahagagana ataon’Ilay tanteraka amin’ny fahalalana?
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ianao izay mahatsiaro ny fitafianao ho mafana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: raha migaingaina ny andro azon’ny rivotra avy any atsimo,
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: moa va ianao niara-nanefy Taminy ny habakabaka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay mitoetra mafy toy ny fitaratra natao tamin’ny metaly voarendrika?
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mba ampianaro anay ary izay holazainay Aminy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa tsy hitanay izay halahatray noho ny haizina.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Henoy tsara ny fikotrokotroky ny feony
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny rohona izay mivoaka avy amin’ny vavany!
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Holazaina Aminy va raha miteny aho?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moa tsy maintsy miteny va ny olona vao ho reny?
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy hita ankehitriny ny mazava izay notakotakonan’ny rahona;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa nisy rivotra nandalo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia nampisava azy ihany izany
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka misy mazava mitarehim-bolamena tamy avy any avaratra.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ao amin’Andriamanitra dia misy famirapiratana mahatahotra!
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny Tsitoha, tsy mahita Azy isika.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lehibe amin’ny hery sy ny fitsarana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny fahamarinana tanteraka Izy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy mba mampahory olona Izy.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa izany no hatahoran’ny olona Azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy mijery izay manao azy ho hendry Izy.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mandefa izany ho eny ambanin’ny lanitra rehetra Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny tselatra hatrany amin’ny faran’ny tany.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aorianan’izany dia misy feo mirohondrohona;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mampikotrokotroka ny feony mahatalanjona Izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: koa rehefa re ny feony dia tsy sakanany intsony ny tselatra.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mampikotrokotroka ny fahagagana ataony Andriamanitra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: manao zava-dehibe tsy takatry ny saintsika Izy.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ny orampanala dia baikoiny hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Milatsaha eny ambonin’ny tany ianao!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary toy izany koa ny ranonorana mivatravatra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, ny ranonorany mivatravatra mafy.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manakombona ny tanan’ny olona rehetra amin’ny tombo-kase Izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hahafantatra ny asany ny olona rehetra izay nataony.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miditra ao amin’ny fiereny koa ny bibidia
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka mamitsaka ao an-davany.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avy any atsimo ny tadio
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary entin’ny rivotra avy any avaratra ny hatsiaka.
