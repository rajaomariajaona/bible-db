document_id: JER.22,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Fampitandremana ny fianakavian’ny mpanjakan’ny Joda
  - type: text
    content: 'Izao no lazain’NY TOMPO: Midìna any amin’ny tranon’ny mpanjakan’ny Joda ka lazao any izao teny izao hoe: '
  '10':
  - type: text
    content: Aza mitomany ny maty ianareo,
  - type: text
    content: na misaona azy;
  - type: text
    content: mitomania sy midradradradrà noho ilay efa lasan-ko babo;
  - type: text
    content: fa tsy hiverina intsony izy
  - type: text
    content: na hahita ny tany nahaterahany.
  '11':
  - type: text
    content: 'Fa izao no lazain’NY TOMPO ny amin’i Saloma, zanak’i Josia, mpanjakan’ny Joda, dia ilay nanjaka nandimby an’i Josia rainy, izay efa niala tamin’ity tany ity: Tsy hiverina atỳ intsony izy '
  '12':
  - type: text
    content: fa ho faty any amin’ny tany izay nitondrana azy ho babo, ary tsy hahita ity tany ity intsony.
  - type: heading
    content: Teny mamely an’i Joiakima, mpandimby faharoa an’i Josia
  '13':
  - type: text
    content: Lozan’izay manorina ny tranony amin’ny tsy rariny
  - type: text
    content: sy ny rihany ambony amin’ny fitaka
  - type: text
    content: ka mampiasa maina ny namany,
  - type: text
    content: nefa tsy mandoa ny karamany,
  '14':
  - type: text
    content: 'sady miteny hoe: Hanao trano lehibe ho ahy aho'
  - type: text
    content: sy efitrano ambony malalaka,
  - type: text
    content: ary holoahany hisy varavarankely
  - type: text
    content: sady hasiany valin-drihana sedera
  - type: text
    content: sy hohosorana loko menamena.
  '15':
  - type: text
    content: Mpanjaka va ianao ka ataonao be sedera noho ny an’ny sasany ny tranonao?
  - type: text
    content: Tsy nihinana sy nisotro va ny rainao?
  - type: text
    content: Nefa nanao fitsarana marina izy!
  - type: text
    content: Nambinina izy tamin’izany.
  '16':
  - type: text
    content: Nitsara ny adin’ny ory sy ny mahantra izy;
  - type: text
    content: nambinina izy tamin’izany.
  - type: text
    content: Tsy izany va no fahalalana Ahy?
  - type: text
    content: Hoy NY TOMPO.
  '17':
  - type: text
    content: Nefa tsy misy alehan’ny masonao sy ny eritreritrao
  - type: text
    content: afa-tsy ny filan-karena ihany
  - type: text
    content: sy ny fandatsahana ny ran’ny tsy manan-tsiny
  - type: text
    content: ary ny fampahoriana sy ny fanaovana an-keriny.
  '18':
  - type: text
    content: 'Ary noho izany dia izao no lazain’NY TOMPO ny amin’i Joiakima, zanak’i Josia, mpanjakan’ny Joda:'
  - type: text
    content: 'Ny olona dia tsy hisaona azy hoe:'
  - type: text
    content: 'Indrisy, tompokolahy! Na: Indrisy, tompokovavy!'
  - type: text
    content: 'Ny olona dia tsy hitomany azy hoe:'
  - type: text
    content: 'Indrisy, tompoko! Na: Indrisy ny voninahiny!'
  '19':
  - type: text
    content: Halevina toy ny fandevina boriky izy
  - type: text
    content: ka hotaritarihina sy hariana any ivelan’ny vavahadin’i Jerosalema.
  - type: heading
    content: Henatra sy fahafaham-baraka ho an’ny Jerosalema
  '2':
  - type: text
    content: 'Henoy ny tenin’NY TOMPO, ry mpanjakan’ny Joda, izay mipetraka amin’ny sezafiandrianan’i Davida, dia ianao sy ny mpanomponao ary ny vahoakanao izay miditra amin’ireto vavahady ireto: '
  '20':
  - type: text
    content: Miakara any Libanona ka miantsoantsoa mafy;
  - type: text
    content: asandrato any Basana ny feonao
  - type: text
    content: ary miantsoantsoa mafy avy eny Abarima,
  - type: text
    content: fa ringana avokoa ireo tia anao.
  '21':
  - type: text
    content: Efa niteny taminao Aho, fony ianao mbola nipetraka tsy nanana ahiahy;
  - type: text
    content: 'nefa hoy ianao: Tsy hihaino aho.'
  - type: text
    content: Fanaonao hatry ny fony ianao mbola tanora
  - type: text
    content: ny tsy mihaino ny teniko.
  '22':
  - type: text
    content: Hopaohin’ny rivotra ny mpitondra anao rehetra,
  - type: text
    content: ary ho lasan-ko babo ireo tia anao,
  - type: text
    content: eny, ho menatra sy hangaihay tokoa ianao
  - type: text
    content: noho ny haratsianao rehetra.
  '23':
  - type: text
    content: Ry ilay mponina any Libanona,
  - type: text
    content: izay manao ny akaninao eny amin’ny sedera,
  - type: text
    content: indrisy ny fisentoanao, rehefa hiharan’ny faharariana ianao,
  - type: text
    content: toy ny fanaintainan’ny vehivavy eo am-piterahana!
  - type: heading
    content: Ny amin’i Jekonia, zanakalahin’i Joiakima
  '24':
  - type: text
    content: 'Raha velona koa Aho, hoy NY TOMPO, na dia ho peratra fitombo-kase amin’ny tanako ankavanana aza ianao, ry Jekonia, zanak’i Joiakima, mpanjakan’ny Joda, dia hotsoahako hiala eo ianao '
  '25':
  - type: text
    content: 'ka hatolotro eo an-tanan’izay mitady ny ainao sy eo an-tanan’izay atahoranao, dia eo an-tanan’i Nebokadnezara, mpanjakan’i Babilona, sy eo amin’ny tanan’ny Kaldeana. '
  '26':
  - type: text
    content: 'Ary ianao sy ny reninao niteraka anao dia hariako any an-tany hafa izay tsy nahaterahanareo ka any no hahafatesanareo. '
  '27':
  - type: text
    content: 'Fa ny tany iriny hiverenana dia tsy hiverenany. '
  '28':
  - type: text
    content: 'Moa va ity lehilahy Jekonia ity dia vilany efa fanary sy efa torotoro, na fanaka tsy misy ilàna azy intsony no dia nariana izy sy ny taranany ka natsipy any amin’ny tany tsy fantany? '
  '29':
  - type: text
    content: 'Ry tany! Ry tany! Ry tany! Henoy ny tenin’NY TOMPO. '
  '3':
  - type: text
    content: 'Izao no lazain’NY TOMPO: Manaova fitsarana marina ianareo ka afaho amin’ny tanan’ny mpampahory ny olona voaroba; aza mampahory na mampidi-doza amin’ny vahiny, ny kamboty sy ny mpitondratena, ary aza mandatsaka ny ran’ny tsy manan-tsiny amin’ity toerana ity. '
  '30':
  - type: text
    content: 'Izao no lazain’NY TOMPO: Soratinareo ho tsy manan-taranaka ity lehilahy ity, dia lehilahy tsy hambinina amin’ny androny; fa tsy hisy amin’ny taranany izay hambinina ka hipetraka eo amin’ny sezafiandrianan’i Davida, na hanapaka ao amin’ny Joda intsony.'
  '4':
  - type: text
    content: 'Fa raha mankatò izany teny izany tokoa ianareo dia hisy mpanjaka hipetraka eo amin’ny sezafiandrianan’i Davida hiditra amin’ity vavahady ity mitaingina kalesy fitondra miady sy soavaly, dia izy sy ny mpanompony ary ny vahoakany. '
  '5':
  - type: text
    content: Fa raha tsy hihaino izany teny izany kosa ianareo dia ny tenako no ianianako, hoy NY TOMPO, fa ho lao tokoa ity trano ity.
  '6':
  - type: text
    content: 'Fa izao no lazain’NY TOMPO ny amin’ny mpanjakan’ny Joda sy ny mpianakaviny:'
  - type: text
    content: Amiko ianao dia tahaka an’i Gileada
  - type: text
    content: sy ny tampon’i Libanona,
  - type: text
    content: nefa hataoko tonga tany efitra
  - type: text
    content: sy tanàna tsy onenana.
  '7':
  - type: text
    content: Ary hanendry mpandrava hamely anao Aho,
  - type: text
    content: ary samy hitondra ny fiadiany avy izy;
  - type: text
    content: dia hokapain’ireo ny sederanao voafantina
  - type: text
    content: ka hariany ao anaty afo.
  '8':
  - type: text
    content: 'Ary firenena maro no handalo ity tanàna ity ka samy hiteny amin’ny namany avy hoe: Nahoana NY TOMPO no dia nanao izao tamin’ity tanàna lehibe ity? '
  '9':
  - type: text
    content: 'Dia izao no ho valiny: Noho ny nahafoizany ny faneken’NY TOMPO Andriamaniny sy ny niankohofany tamin’ny andriamanitra hafa sy ny nanompoany ireny.'
  - type: heading
    content: Ny amin’i Saloma, mpandimby an’i Josia
