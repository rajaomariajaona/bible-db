document_id: JER.22,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fampitandremana ny fianakavian’ny mpanjakan’ny Joda
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao no lazain’NY TOMPO: Midìna any amin’ny tranon’ny mpanjakan’ny Joda ka lazao any izao teny izao hoe: '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aza mitomany ny maty ianareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na misaona azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mitomania sy midradradradrà noho ilay efa lasan-ko babo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa tsy hiverina intsony izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na hahita ny tany nahaterahany.
  '11':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Fa izao no lazain’NY TOMPO ny amin’i Saloma, zanak’i Josia, mpanjakan’ny Joda, dia ilay nanjaka nandimby an’i Josia rainy, izay efa niala tamin’ity tany ity: Tsy hiverina atỳ intsony izy '
  '12':
  - type: usfm
    marker: m
    children:
    - type: text
      text: fa ho faty any amin’ny tany izay nitondrana azy ho babo, ary tsy hahita ity tany ity intsony.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Teny mamely an’i Joiakima, mpandimby faharoa an’i Josia
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lozan’izay manorina ny tranony amin’ny tsy rariny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny rihany ambony amin’ny fitaka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka mampiasa maina ny namany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa tsy mandoa ny karamany,
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'sady miteny hoe: Hanao trano lehibe ho ahy aho'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy efitrano ambony malalaka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary holoahany hisy varavarankely
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady hasiany valin-drihana sedera
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy hohosorana loko menamena.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mpanjaka va ianao ka ataonao be sedera noho ny an’ny sasany ny tranonao?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy nihinana sy nisotro va ny rainao?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nefa nanao fitsarana marina izy!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nambinina izy tamin’izany.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nitsara ny adin’ny ory sy ny mahantra izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nambinina izy tamin’izany.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy izany va no fahalalana Ahy?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hoy NY TOMPO.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nefa tsy misy alehan’ny masonao sy ny eritreritrao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: afa-tsy ny filan-karena ihany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny fandatsahana ny ran’ny tsy manan-tsiny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny fampahoriana sy ny fanaovana an-keriny.
  '18':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Ary noho izany dia izao no lazain’NY TOMPO ny amin’i Joiakima, zanak’i Josia, mpanjakan’ny Joda:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ny olona dia tsy hisaona azy hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Indrisy, tompokolahy! Na: Indrisy, tompokovavy!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ny olona dia tsy hitomany azy hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Indrisy, tompoko! Na: Indrisy ny voninahiny!'
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Halevina toy ny fandevina boriky izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hotaritarihina sy hariana any ivelan’ny vavahadin’i Jerosalema.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Henatra sy fahafaham-baraka ho an’ny Jerosalema
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Henoy ny tenin’NY TOMPO, ry mpanjakan’ny Joda, izay mipetraka amin’ny sezafiandrianan’i Davida, dia ianao sy ny mpanomponao ary ny vahoakanao izay miditra amin’ireto vavahady ireto: '
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miakara any Libanona ka miantsoantsoa mafy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: asandrato any Basana ny feonao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary miantsoantsoa mafy avy eny Abarima,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ringana avokoa ireo tia anao.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Efa niteny taminao Aho, fony ianao mbola nipetraka tsy nanana ahiahy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'nefa hoy ianao: Tsy hihaino aho.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fanaonao hatry ny fony ianao mbola tanora
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny tsy mihaino ny teniko.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hopaohin’ny rivotra ny mpitondra anao rehetra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ho lasan-ko babo ireo tia anao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, ho menatra sy hangaihay tokoa ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: noho ny haratsianao rehetra.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ry ilay mponina any Libanona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay manao ny akaninao eny amin’ny sedera,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: indrisy ny fisentoanao, rehefa hiharan’ny faharariana ianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toy ny fanaintainan’ny vehivavy eo am-piterahana!
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny amin’i Jekonia, zanakalahin’i Joiakima
    marker-yv: yv-h
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha velona koa Aho, hoy NY TOMPO, na dia ho peratra fitombo-kase amin’ny tanako ankavanana aza ianao, ry Jekonia, zanak’i Joiakima, mpanjakan’ny Joda, dia hotsoahako hiala eo ianao '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ka hatolotro eo an-tanan’izay mitady ny ainao sy eo an-tanan’izay atahoranao, dia eo an-tanan’i Nebokadnezara, mpanjakan’i Babilona, sy eo amin’ny tanan’ny Kaldeana. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ianao sy ny reninao niteraka anao dia hariako any an-tany hafa izay tsy nahaterahanareo ka any no hahafatesanareo. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ny tany iriny hiverenana dia tsy hiverenany. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moa va ity lehilahy Jekonia ity dia vilany efa fanary sy efa torotoro, na fanaka tsy misy ilàna azy intsony no dia nariana izy sy ny taranany ka natsipy any amin’ny tany tsy fantany? '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ry tany! Ry tany! Ry tany! Henoy ny tenin’NY TOMPO. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao no lazain’NY TOMPO: Manaova fitsarana marina ianareo ka afaho amin’ny tanan’ny mpampahory ny olona voaroba; aza mampahory na mampidi-doza amin’ny vahiny, ny kamboty sy ny mpitondratena, ary aza mandatsaka ny ran’ny tsy manan-tsiny amin’ity toerana ity. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao no lazain’NY TOMPO: Soratinareo ho tsy manan-taranaka ity lehilahy ity, dia lehilahy tsy hambinina amin’ny androny; fa tsy hisy amin’ny taranany izay hambinina ka hipetraka eo amin’ny sezafiandrianan’i Davida, na hanapaka ao amin’ny Joda intsony.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa raha mankatò izany teny izany tokoa ianareo dia hisy mpanjaka hipetraka eo amin’ny sezafiandrianan’i Davida hiditra amin’ity vavahady ity mitaingina kalesy fitondra miady sy soavaly, dia izy sy ny mpanompony ary ny vahoakany. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa raha tsy hihaino izany teny izany kosa ianareo dia ny tenako no ianianako, hoy NY TOMPO, fa ho lao tokoa ity trano ity.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa izao no lazain’NY TOMPO ny amin’ny mpanjakan’ny Joda sy ny mpianakaviny:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Amiko ianao dia tahaka an’i Gileada
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny tampon’i Libanona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa hataoko tonga tany efitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy tanàna tsy onenana.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hanendry mpandrava hamely anao Aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary samy hitondra ny fiadiany avy izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hokapain’ireo ny sederanao voafantina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hariany ao anaty afo.
  '8':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Ary firenena maro no handalo ity tanàna ity ka samy hiteny amin’ny namany avy hoe: Nahoana NY TOMPO no dia nanao izao tamin’ity tanàna lehibe ity? '
  '9':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Dia izao no ho valiny: Noho ny nahafoizany ny faneken’NY TOMPO Andriamaniny sy ny niankohofany tamin’ny andriamanitra hafa sy ny nanompoany ireny.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny amin’i Saloma, mpandimby an’i Josia
    marker-yv: yv-h
