type_code: plt
verses:
  '1':
  - type: text
    content: INDRAY MIJERY
  - type: text
    content: 'Ny hoe Deoteronomia dia midika hoe Ny Lalàna faharoa, na Famerenan-teny. Io anarana io dia avy amin’ny Septanta, ilay dikanteny grika amin’ny Testamenta Taloha, izay milaza azy hoe '
  - type: text
    content: Deuteronomion
  - type: text
    content: .
  - type: text
    content: Ny votoatin’ny Boky
  - type: text
    content: Ny Boky dia fananarana na toriteny lehibe telo, nataon’i Mosesy talohan’ny nidiran’ny Zanak’Israely tao amin’ny tany Kanana. Ampahatsiarovin’i Mosesy ny nitondran’Andriamanitra ny Israely tany an-tany efitra nandritra ny 40 taona, ny namonjeny azy tamin’ny loza sy ny fahavalo maro, ny nanomezany azy ny fanekena tamin’ny alalan’ny didy sy ny teny fampanantenana. Izany rehetra izany no nataon’Andriamanitra dia tsy noho ny fahamarinan’ny Israely fa noho ny fanekena izay nataon’Andriamanitra tamin’i Abrahama sy Isaka ary i Jakoba.
  - type: text
    content: 'Koa fotokevitra lehibe ato amin’ity Boky ity ny fanekena: Noho izany fitiavana lehibe nasehon’Andriamanitra izany, ny Israely dia tokony ho tia sy hanompo NY TOMPO, Andriamanitra tokana, izay namonjy azy. Ny fananarana rehetra nataon’i Mosesy dia azo fintinina amin’ny Deo 6.4-6.'
  - type: text
    content: Ny fitoerana amin’ny fanekena, amin’ny fitandremana ny didy, no hahazoan’ny Israely fitahiana feno amin’ny fiainany manontolo, ary ao amin’ny tany Kanana izy no ho velona sambatra amin’izany fitahiana izany. Fa raha manitsakitsaka ny fanekena kosa izy, amin’ny fandikana ny didin’Andriamanitra, dia ozona no ho anjarany, ary hoentin’ny fahavalo ho babo any an-tany lavitra izy. Rehefa any anefa izy ka mahatsiaro miverina amin’NY TOMPO dia hampodin’NY TOMPO Andriamanitra izy ka hamindrany fo.
  - type: text
    content: Ao amin’ny Testamenta Vaovao dia ny Deo 6.4-6 no anambaràna ny fotokevitry ny Didin’Andriamanitra (Mat 12.32; Mat 22.37), ary teny avy ao amin’ny Deoteronomia koa no nandresen’i Jesosy ny fakam-panahy tany an-tany efitra (Mat 4.4, 7, 10).
  - type: text
    content: Ny fizaràna ao amin’ny Boky
  - type: text
    content: Ny Boky dia ahitana lahateny lehibe telo nataon’i Mosesy, dia ny 1.1–4.44, ny 4.45–28.68 ary ny 28.69–30.20, ary mifarana amin’ny fitantarana ny fanaovam-beloma nataon’i Mosesy sy ny nahafatesany.
  - type: text
    content: 'Fa toy izao koa no azo izaràna azy:'
  - type: text
    content: 'Tantaran’ny nitondran’Andriamanitra ny Israely hatreo Horeba ka hatrany andafin’i Jordana: 1–4'
  - type: text
    content: 'Fananarana sy fampitandremana: 5–11'
  - type: text
    content: 'Didy sy lalàna samihafa: 12–26'
  - type: text
    content: 'Fitahiana sy ozona: 27–28'
  - type: text
    content: 'Ny fanavaozana ny fanekena tao Moaba: 29–30'
  - type: text
    content: 'Fanaovam-beloma nataon’i Mosesy sy ny nahafatesany: 31–34'
