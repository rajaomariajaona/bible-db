document_id: 1SA.18,3103
type_code: plt
verses:
  '1':
  - type: text
    content: 'Rehefa nitsahatra niteny tamin’i Saoly izy dia niraiki-po tamin’i Davida i Jonatana. Tia azy tahaka ny tenany mihitsy i Jonatana. '
  '10':
  - type: text
    content: 'Nony ampitson’iny dia nisy fanahy ratsy avy tany amin’Andriamanitra tonga tamin’i Saoly ka nihetsiketsika teo ampovoan-trano izy; i Davida moa dia nitendry lokanga tamin’ny tanany tahaka ny fanaony isanandro ihany, ary nisy lefona teny an-tanan’i Saoly. '
  '11':
  - type: text
    content: 'Dia natorak’i Saoly ny lefona; fa hoy izy: Hamely an’i Davida aho ka hataoko miboroaka mihatra amin’ny rindrina. Fa niala izany indroa teo anatrehany i Davida. '
  '12':
  - type: text
    content: 'Ary natahotra an’i Davida i Saoly satria NY TOMPO nomba azy, fa i Saoly kosa dia nialany. '
  '13':
  - type: text
    content: 'Dia nesorin’i Saoly tsy ho eo aminy i Davida ary nataony mpifehy arivo ka nitarika ny olona nandroso sy niverina tamin’ny ady. '
  '14':
  - type: text
    content: 'Ary nahomby tamin’izay rehetra nataony i Davida sady NY TOMPO nomba azy. '
  '15':
  - type: text
    content: 'Nony hitan’i Saoly fa mahomby hatrany i Davida dia natahotra azy izy. '
  '16':
  - type: text
    content: Ny Israely sy ny Joda rehetra kosa dia tia an’i Davida satria nitarika azy nandroso sy niverina tamin’ny ady izy.
  - type: heading
    content: Mampakatra an’i Mikala zanak’i Saoly ho vadiny i Davida
  '17':
  - type: text
    content: 'Hoy i Saoly tamin’i Davida: Indro omeko ho vadinao i Meraba zanako vavimatoa, nefa aoka kosa ianao hahery ho ahy, ary miadia ny adin’NY TOMPO. Fa hoy i Saoly: Aoka tsy ny tanako no hamely azy fa ny tanan’ny Filistina. '
  '18':
  - type: text
    content: 'Fa hoy i Davida tamin’i Saoly: Zinona moa aho, ary zinona moa ny fianakavian’ny raiko ao amin’ny Israely, no ho vinanton’ny mpanjaka aho? '
  '19':
  - type: text
    content: Kanjo nony tamin’ny andro tokony ho namoahana an’i Meraba, zanakavavin’i Saoly, ho vadin’i Davida, dia nomena ho vadin’i Adriela meholatita izy.
  '2':
  - type: text
    content: 'Dia nandray azy i Saoly tamin’io andro io ka tsy namela azy hody tany an-tranon’ny rainy intsony. '
  '20':
  - type: text
    content: 'Tia an’i Davida kosa anefa i Mikala, zanakavavin’i Saoly; ary nisy nanambara izany tamin’i Saoly ka sitrak’i Saoly izany. '
  '21':
  - type: text
    content: 'Dia hoy i Saoly: Homeko azy izy, mba ho fandrika aminy ka hamelezan’ny tanan’ny Filistina azy. Indroa izany no nitenenan’i Saoly tamin’i Davida hoe: Aoka ho vinantoko ianao ankehitriny.'
  '22':
  - type: text
    content: 'Nandidy ny mpanompony i Saoly hoe: Miresaha mangingina amin’i Davida ka lazao hoe: Indro, ankasitrahan’ny mpanjaka ianao ary ny mpanompony rehetra koa dia tia anao; koa maneke ihany ho vinanton’ny mpanjaka ianao. '
  '23':
  - type: text
    content: 'Ary ny mpanompon’i Saoly dia nilaza izany teny izany teo an-tsofin’i Davida. Nefa hoy i Davida: Moa heverinareo ho zavatra kely va izany ho vinanton’ny mpanjaka izany? Tsy hitanareo va fa izaho dia olona mahantra sady fanivaiva? '
  '24':
  - type: text
    content: 'Dia notaterin’ny mpanompon’i Saoly taminy izay nambarany hoe: Toy izany no navalin’i Davida. '
  '25':
  - type: text
    content: 'Ary hoy i Saoly: Izao no holazainareo amin’i Davida: Ny mpanjaka dia tsy mila harena be ho vodiondry, fa saron-tsotsòkan'
  - type: note
    content: 'saron-tsotsòka: Sombin-koditra manarona ny filahiana, alàna amin’ny famorana.'
  - type: text
    content: '’ny Filistina zato lahy ihany, mba ho famaliana ny fahavalony. Kanjo hevitr’i Saoly hahafaty an’i Davida amin’ny tanan’ny Filistina izany. '
  '26':
  - type: text
    content: 'Rehefa nambaran’ny mpanompon’i Saoly tamin’i Davida ireo teny ireo dia sitrak’i Davida ny ho vinanton’ny mpanjaka. Koa na dia tsy mbola tapitra aza ny fetrandro '
  '27':
  - type: text
    content: dia niainga i Davida. Nandeha izy sy ny olony ka nahafaty Filistina roanjato lahy, ary nitondra ny saron-tsotsòka i Davida ka nanisa azy teo anatrehan’ny mpanjaka mba hahavinanton’ny mpanjaka azy. Dia nomen’i Saoly ho vadiny i Mikala zanany vavy.
  '28':
  - type: text
    content: 'Ary nahita sy nahalala i Saoly fa NY TOMPO nomba an’i Davida; i Mikala zanakavavin’i Saoly koa moa dia tia azy. '
  '29':
  - type: text
    content: 'Dia vao mainka natahotra an’i Davida i Saoly ka tonga fahavalon’i Davida hatrany izy. '
  '3':
  - type: text
    content: 'Dia nanao fanekena tamin’i Davida i Jonatana noho ny fitiavany azy toy ny tenany. '
  '30':
  - type: text
    content: Ary ireo andrianan’ny Filistina dia nanafika, koa isaky ny nanafika izy dia i Davida no hita fa mahomby noho ny mpanompon’i Saoly rehetra, koa dia tena nisandratra ny anarany.
  '4':
  - type: text
    content: 'Nesorin’i Jonatana ny akanjony ivelany izay teny aminy ka nomeny an’i Davida mbamin’ny akanjo fiadiany sy ny sabany sy ny tsipìkany ary ny fehikibony. '
  '5':
  - type: text
    content: Ary nandeha niantafika i Davida ka hita fa nahomby tamin’izay rehetra nanirahan’i Saoly azy; dia notendren’i Saoly hifehy ny miaramila izy sady nankasitrahan’ny vahoaka rehetra sy ireo mpanompon’i Saoly koa.
  - type: heading
    content: Mikasa hamono an’i Davida i Saoly
  '6':
  - type: text
    content: 'Nony vory ny olona tamin’ny niverenan’i Davida avy namono ilay Filistina dia nivoaka avy tamin’ny tanànan’ny Israely rehetra ny vehivavy ka nihira sy nandihy nitsena an’i Saoly mpanjaka tamin’ny ampongatapaka sy ny fifaliana ary ny kipantsona. '
  '7':
  - type: text
    content: 'Dia nihira ireo vehivavy mpandihy hoe:'
  - type: text
    content: I Saoly dia nahafaty arivoarivo
  - type: text
    content: fa i Davida dia nahafaty alinalina.
  '8':
  - type: text
    content: 'Dia tezitra mafy i Saoly satria tsy nankasitrahany izany teny izany ka hoy izy: Nomena an’i Davida ny alinalina fa ny ahy kosa dia arivoarivo ihany. Ny fanjakana no sisa tsy mbola azony. '
  '9':
  - type: text
    content: Hatramin’izany andro izany dia ratsy fijery an’i Davida i Saoly.
