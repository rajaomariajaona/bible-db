document_id: 1SA.18
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Rehefa nitsahatra niteny tamin’i Saoly izy dia niraiki-po tamin’i Davida i Jonatana. Tia azy tahaka ny tenany mihitsy i Jonatana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Dia nandray azy i Saoly tamin’io andro io ka tsy namela azy hody tany an-tranon’ny rainy intsony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dia nanao fanekena tamin’i Davida i Jonatana noho ny fitiavany azy toy ny tenany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Nesorin’i Jonatana ny akanjony ivelany izay teny aminy ka nomeny an’i Davida mbamin’ny akanjo fiadiany sy ny sabany sy ny tsipìkany ary ny fehikibony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ary nandeha niantafika i Davida ka hita fa nahomby tamin’izay rehetra nanirahan’i Saoly azy; dia notendren’i Saoly hifehy ny miaramila izy sady nankasitrahan’ny vahoaka rehetra sy ireo mpanompon’i Saoly koa.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mikasa hamono an’i Davida i Saoly
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Nony vory ny olona tamin’ny niverenan’i Davida avy namono ilay Filistina dia nivoaka avy tamin’ny tanànan’ny Israely rehetra ny vehivavy ka nihira sy nandihy nitsena an’i Saoly mpanjaka tamin’ny ampongatapaka sy ny fifaliana ary ny kipantsona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dia nihira ireo vehivavy mpandihy hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: I Saoly dia nahafaty arivoarivo
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa i Davida dia nahafaty alinalina.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dia tezitra mafy i Saoly satria tsy nankasitrahany izany teny izany ka hoy izy: Nomena an’i Davida ny alinalina fa ny ahy kosa dia arivoarivo ihany. Ny fanjakana no sisa tsy mbola azony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Hatramin’izany andro izany dia ratsy fijery an’i Davida i Saoly.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Nony ampitson’iny dia nisy fanahy ratsy avy tany amin’Andriamanitra tonga tamin’i Saoly ka nihetsiketsika teo ampovoan-trano izy; i Davida moa dia nitendry lokanga tamin’ny tanany tahaka ny fanaony isanandro ihany, ary nisy lefona teny an-tanan’i Saoly. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Dia natorak’i Saoly ny lefona; fa hoy izy: Hamely an’i Davida aho ka hataoko miboroaka mihatra amin’ny rindrina. Fa niala izany indroa teo anatrehany i Davida. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary natahotra an’i Davida i Saoly satria NY TOMPO nomba azy, fa i Saoly kosa dia nialany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dia nesorin’i Saoly tsy ho eo aminy i Davida ary nataony mpifehy arivo ka nitarika ny olona nandroso sy niverina tamin’ny ady. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary nahomby tamin’izay rehetra nataony i Davida sady NY TOMPO nomba azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Nony hitan’i Saoly fa mahomby hatrany i Davida dia natahotra azy izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ny Israely sy ny Joda rehetra kosa dia tia an’i Davida satria nitarika azy nandroso sy niverina tamin’ny ady izy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mampakatra an’i Mikala zanak’i Saoly ho vadiny i Davida
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Hoy i Saoly tamin’i Davida: Indro omeko ho vadinao i Meraba zanako vavimatoa, nefa aoka kosa ianao hahery ho ahy, ary miadia ny adin’NY TOMPO. Fa hoy i Saoly: Aoka tsy ny tanako no hamely azy fa ny tanan’ny Filistina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Fa hoy i Davida tamin’i Saoly: Zinona moa aho, ary zinona moa ny fianakavian’ny raiko ao amin’ny Israely, no ho vinanton’ny mpanjaka aho? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Kanjo nony tamin’ny andro tokony ho namoahana an’i Meraba, zanakavavin’i Saoly, ho vadin’i Davida, dia nomena ho vadin’i Adriela meholatita izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Tia an’i Davida kosa anefa i Mikala, zanakavavin’i Saoly; ary nisy nanambara izany tamin’i Saoly ka sitrak’i Saoly izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Dia hoy i Saoly: Homeko azy izy, mba ho fandrika aminy ka hamelezan’ny tanan’ny Filistina azy. Indroa izany no nitenenan’i Saoly tamin’i Davida hoe: Aoka ho vinantoko ianao ankehitriny.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Nandidy ny mpanompony i Saoly hoe: Miresaha mangingina amin’i Davida ka lazao hoe: Indro, ankasitrahan’ny mpanjaka ianao ary ny mpanompony rehetra koa dia tia anao; koa maneke ihany ho vinanton’ny mpanjaka ianao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary ny mpanompon’i Saoly dia nilaza izany teny izany teo an-tsofin’i Davida. Nefa hoy i Davida: Moa heverinareo ho zavatra kely va izany ho vinanton’ny mpanjaka izany? Tsy hitanareo va fa izaho dia olona mahantra sady fanivaiva? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Dia notaterin’ny mpanompon’i Saoly taminy izay nambarany hoe: Toy izany no navalin’i Davida. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary hoy i Saoly: Izao no holazainareo amin’i Davida: Ny mpanjaka dia tsy mila harena be ho vodiondry, fa saron-tsotsòkan'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'saron-tsotsòka: Sombin-koditra manarona ny filahiana, alàna amin’ny famorana.'
    marker-yv: yv-n
  - type: text
    text: '’ny Filistina zato lahy ihany, mba ho famaliana ny fahavalony. Kanjo hevitr’i Saoly hahafaty an’i Davida amin’ny tanan’ny Filistina izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Rehefa nambaran’ny mpanompon’i Saoly tamin’i Davida ireo teny ireo dia sitrak’i Davida ny ho vinanton’ny mpanjaka. Koa na dia tsy mbola tapitra aza ny fetrandro '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: dia niainga i Davida. Nandeha izy sy ny olony ka nahafaty Filistina roanjato lahy, ary nitondra ny saron-tsotsòka i Davida ka nanisa azy teo anatrehan’ny mpanjaka mba hahavinanton’ny mpanjaka azy. Dia nomen’i Saoly ho vadiny i Mikala zanany vavy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ary nahita sy nahalala i Saoly fa NY TOMPO nomba an’i Davida; i Mikala zanakavavin’i Saoly koa moa dia tia azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Dia vao mainka natahotra an’i Davida i Saoly ka tonga fahavalon’i Davida hatrany izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Ary ireo andrianan’ny Filistina dia nanafika, koa isaky ny nanafika izy dia i Davida no hita fa mahomby noho ny mpanompon’i Saoly rehetra, koa dia tena nisandratra ny anarany.
