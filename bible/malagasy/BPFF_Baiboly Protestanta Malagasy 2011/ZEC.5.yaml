document_id: ZEC.5
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Fahitana fahenina: Ny horonan-taratasy manidina'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Dia natopiko indray ny masoko ka hitako fa indro, horonan-taratasy manidina iray. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary hoy izy tamiko: Inona moa no hitanao? Dia hoy aho: Mahita horonan-taratasy manidina aho; roapolo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: hakiho
  - type: text
    text: ' ny lavany, ary folo hakiho ny sakany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dia hoy izy tamiko: Izany no ozona mivoaka ho eny amin’ny tany rehetra; araka izany, izay rehetra mangalatra dia horoahina tsy ho eto; araka izany koa, izay rehetra manao fianianana tsy marina dia horoahina tsy ho eto.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Avelako handeha izany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hoy Andriamanitra, Tompon’izao rehetra izao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hiditra ao an-tranon’ny mpangalatra
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ao an-tranon’izay manao fianianana mandainga amin’ny anarako
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hitoetra ao amin’ny tranony
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka handevona izany mbamin’ny hazo sy ny vato eo aminy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Fahitana fahafito: Ny vata famarana'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia nandroso ilay anjely niresaka tamiko ka niteny tamiko hoe: Atopazy ny masonao ka jereo io zavatra miseho io. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia hoy aho: Inona moa io? Ary hoy izy: Io miseho io dia vata famarana. Hoy koa izy: Izao no hita any amin’ny tany rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary indro, nisy takelaka firaka boribory niainga ho azy ka nisy vehivavy iray nipetraka tao anatin’ilay vata famarana '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary hoy izy: Io ny Faharatsiam-panahy. Dia natontany tao anatin’ny vata famarana ilay vehivavy ary natontany teo am-bavan’ny vata famarana ilay vongam-piraka.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Dia natopiko ny masoko ka hitako fa indreo, nisy vehivavy roa nivoaka, ary nahazo rivotra ny elany, fa nanana elatra toy ny elatry ny vano izy; ary naingainy ho eo anelanelan’ny tany sy ny lanitra ilay vata famarana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dia hoy aho tamin’ilay anjely niresaka tamiko: Ho aiza no itondran’ireto ny vata famarana? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary hoy izy tamiko: Hanaovana trano ho azy any amin’ny tany Sinara, ary rehefa vita izany dia hapetraka eo amin’ny toerana fipetrahany izy.'
