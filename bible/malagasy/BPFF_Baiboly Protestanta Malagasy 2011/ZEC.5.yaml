document_id: ZEC.5,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: 'Fahitana fahenina: Ny horonan-taratasy manidina'
  - type: text
    content: 'Dia natopiko indray ny masoko ka hitako fa indro, horonan-taratasy manidina iray. '
  '10':
  - type: text
    content: 'Dia hoy aho tamin’ilay anjely niresaka tamiko: Ho aiza no itondran’ireto ny vata famarana? '
  '11':
  - type: text
    content: 'Ary hoy izy tamiko: Hanaovana trano ho azy any amin’ny tany Sinara, ary rehefa vita izany dia hapetraka eo amin’ny toerana fipetrahany izy.'
  '2':
  - type: text
    content: 'Ary hoy izy tamiko: Inona moa no hitanao? Dia hoy aho: Mahita horonan-taratasy manidina aho; roapolo '
  - type: text
    content: hakiho
  - type: text
    content: ' ny lavany, ary folo hakiho ny sakany. '
  '3':
  - type: text
    content: 'Dia hoy izy tamiko: Izany no ozona mivoaka ho eny amin’ny tany rehetra; araka izany, izay rehetra mangalatra dia horoahina tsy ho eto; araka izany koa, izay rehetra manao fianianana tsy marina dia horoahina tsy ho eto.'
  '4':
  - type: text
    content: Avelako handeha izany,
  - type: text
    content: hoy Andriamanitra, Tompon’izao rehetra izao,
  - type: text
    content: ka hiditra ao an-tranon’ny mpangalatra
  - type: text
    content: sy ao an-tranon’izay manao fianianana mandainga amin’ny anarako
  - type: text
    content: ary hitoetra ao amin’ny tranony
  - type: text
    content: ka handevona izany mbamin’ny hazo sy ny vato eo aminy.
  - type: heading
    content: 'Fahitana fahafito: Ny vata famarana'
  '5':
  - type: text
    content: 'Dia nandroso ilay anjely niresaka tamiko ka niteny tamiko hoe: Atopazy ny masonao ka jereo io zavatra miseho io. '
  '6':
  - type: text
    content: 'Dia hoy aho: Inona moa io? Ary hoy izy: Io miseho io dia vata famarana. Hoy koa izy: Izao no hita any amin’ny tany rehetra. '
  '7':
  - type: text
    content: 'Ary indro, nisy takelaka firaka boribory niainga ho azy ka nisy vehivavy iray nipetraka tao anatin’ilay vata famarana '
  '8':
  - type: text
    content: 'Ary hoy izy: Io ny Faharatsiam-panahy. Dia natontany tao anatin’ny vata famarana ilay vehivavy ary natontany teo am-bavan’ny vata famarana ilay vongam-piraka.'
  '9':
  - type: text
    content: 'Dia natopiko ny masoko ka hitako fa indreo, nisy vehivavy roa nivoaka, ary nahazo rivotra ny elany, fa nanana elatra toy ny elatry ny vano izy; ary naingainy ho eo anelanelan’ny tany sy ny lanitra ilay vata famarana. '
