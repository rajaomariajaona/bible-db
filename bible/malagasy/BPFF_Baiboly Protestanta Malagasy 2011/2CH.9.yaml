document_id: 2CH.9,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny namangian’ny mpanjakavavin’i Sheba an’i Solomona
  - type: heading
    content: 1Mpa 10.1-13
  - type: text
    content: 'Rehefa nahare ny lazan’i Solomona ny mpanjakavavin’i Sheba dia tonga tany Jerosalema hizaha toetra azy tamin’ny fanontaniana sarotra, ary marobe ny mpanotrona azy, sady be koa ny rameva izay nitondra zavamanitra sy volamena sesehena ary vatosoa. Rehefa tonga tao amin’i Solomona izy dia niresaka taminy izay rehetra tao am-pony. '
  '10':
  - type: text
    content: 'Ny mpanompon’i Hirama koa sy ny mpanompon’i Solomona, izay naka volamena avy tany Ofira, dia nitondra hazo almoga sy vatosoa. '
  '11':
  - type: text
    content: Ary ny hazo almoga dia nataon’ny mpanjaka ambaratonga ho amin’ny tranon’NY TOMPO sy ny lapan’andriana ary nanamboarany lokanga sy valiha ho an’ny mpihira koa; tsy mbola nisy nahitana toy izany teo aloha tamin’ny tanin’ny Joda.
  '12':
  - type: text
    content: Ary i Solomona mpanjaka kosa dia nanome izay rehetra nirin’ny mpanjakavavin’i Sheba na inona na inona nangatahiny, mihoatra noho izay noentiny ho an’ny mpanjaka; dia niverina izy, ary lasa nody tany amin’ny taniny izy mbamin’ny mpanompony.
  - type: heading
    content: Ny haremben’i Solomona
  - type: heading
    content: 1Mpa 10.14-29
  '13':
  - type: text
    content: 'Ny lanjan’ny volamena izay tonga tao amin’i Solomona isan-taona dia '
  - type: text
    content: talenta
  - type: text
    content: ' volamena enina amby enimpolo sy eninjato, '
  '14':
  - type: text
    content: afa-tsy izay noentin’ny mpivarotra sy ny mpivaro-mandeha. Ary ny mpanjakan’i Arabia rehetra sy ny mpanapaka ny tany dia samy nitondra volamena sy volafotsy ho an’i Solomona.
  '15':
  - type: text
    content: 'Nanao ampinga volamena lehibe roanjato tamin’ny volamena voafisaka i Solomona mpanjaka ka takelaka volamena milanja sekela eninjato no napetaka tamin’ny ampinga lehibe iray. '
  '16':
  - type: text
    content: 'Nanao ampinga volamena telonjato tamin’ny volamena voafisaka koa izy ka takelaka volamena milanja sekela telonjato no napetaka tamin’ny ampinga iray. Dia napetraky ny mpanjaka tao amin’ny trano Alan’i Libanona ireo. '
  '17':
  - type: text
    content: 'Ary nanamboatra sezafiandrianana vita amin’ny ivoara lehibe ny mpanjaka ka nopetahany takelaka volamena tsara. '
  '18':
  - type: text
    content: 'Nisy ambaratonga enina tamin’ny sezafiandrianana ary fitoeran-tongotra volamena izay naraikitra tamin’ny sezafiandrianana. Nisy fitehenana teo an-daniny roa tamin’ny fipetrahana, ary nisy sarivongana liona roa teo akaikin’ny fitehenan-tanana; '
  '19':
  - type: text
    content: 'ary nisy sarivongana liona roa amby folo teo an-daniny roa teo amin’ny ambaratonga enina. Tsy nisy nahitana tahaka izany tany amin’ny fanjakana rehetra. '
  '2':
  - type: text
    content: Ary voavalin’i Solomona izy tamin’izay rehetra nanontaniany azy; tsy nisy zavatra niafina tamin’i Solomona fa navaliny azy avokoa.
  '20':
  - type: text
    content: 'Ny kapoaka fisotroan’i Solomona mpanjaka dia volamena avokoa ary ny fanaka rehetra tao amin’ny trano Alan’i Libanona koa dia volamena voafantina avokoa; tsy nisy volafotsy ireo, fa natao toy ny tsinontsinona izany tamin’ny andron’i Solomona. '
  '21':
  - type: text
    content: Fa ny mpanjaka dia nanana sambo mpankany Tarsisy niaraka tamin’ny mpanompon’i Hirama; ary indray mandeha isan-telo taona no tonga ny sambon’i Tarsisy nitondra volamena, volafotsy, ivoara, rajako ary vorombola.
  '22':
  - type: text
    content: 'Ary i Solomona mpanjaka dia nanankarena sady hendry indrindra noho ny mpanjaka rehetra ambonin’ny tany. '
  '23':
  - type: text
    content: 'Nitady hahita ny tavan’i Solomona ny mpanjaka rehetra ambonin’ny tany mba hihaino ny fahendrena izay nataon’Andriamanitra tao am-pony. '
  '24':
  - type: text
    content: 'Ary samy nahatonga ny fanomezany avy isan-taona izy rehetra, dia fanaka volafotsy, fanaka volamena, fitafiana, fiadiana, zavamanitra, soavaly ary ampondra. '
  '25':
  - type: text
    content: 'Ary i Solomona dia nanana tranon-tsoavaly mpitarika kalesy fitondra miady efatra arivo ary soavaly fitaingina roa arivo sy iray alina, izay nataony tao amin’ireo tanàna fitoeran-kalesy fitondra miady sy tao amin’ny mpanjaka tany Jerosalema. '
  '26':
  - type: text
    content: 'Ary nanjaka tamin’ny mpanjaka rehetra hatrany amin’ny ony Eofrata ka hatrany amin’ny tanin’ny Filistina ary hatrany amin’ny sisin’i Ejipta izy. '
  '27':
  - type: text
    content: 'Nataon’ny mpanjaka toy ny vato ny habetsaky ny volafotsy tany Jerosalema, ary nataony toy ny aviavy any Sefela ny hazo sedera. '
  '28':
  - type: text
    content: Nakana soavaly avy tany Ejipta sy tany amin’ny tany rehetra koa i Solomona.
  - type: heading
    content: Ny nahafatesan’i Solomona
  - type: heading
    content: 1Mpa 11.41-43
  '29':
  - type: text
    content: 'Ary ny tantaran’i Solomona sisa, hatramin’ny voalohany ka hatramin’ny farany, tsy efa voasoratra ao amin’ny bokin’i Natana mpaminany sy ao amin’ny faminanian’i Ahia silonita ary ao amin’ny fahitan’Ido mpahita ny amin’i Jeroboama, zanak’i Nebata va izany? '
  '3':
  - type: text
    content: 'Rehefa hitan’ilay mpanjakavavin’i Sheba ny fahendren’i Solomona, ny trano izay naoriny, '
  '30':
  - type: text
    content: 'Nanjaka efapolo taona tamin’ny Israely rehetra tany Jerosalema i Solomona. '
  '31':
  - type: text
    content: Ary nodimandry any amin’ny razany i Solomona ka nalevina tao an-Tanànan’i Davida rainy izy; ary i Rehoboama zanany no nanjaka nandimby azy.
  '4':
  - type: text
    content: 'ny sakafo teo amin’ny latabany, ny fonenan’ny tandapany, ny fahaizan’ny mpanompony mbamin’ny fitafian’ireo sy ny mpitondra kapoakany mbamin’ny fitafian’ireo, ary ny ambaratonga izay niakarany ho ao amin’ny tranon’NY TOMPO, dia talanjona terỳ izy. '
  '5':
  - type: text
    content: 'Dia hoy izy tamin’ny mpanjaka: Marina ny teny efa reko tany amin’ny taniko ny amin’ny teninao sy ny fahendrenao. '
  '6':
  - type: text
    content: 'Kanefa tsy nino ny filazana aho raha tsy tonga atỳ, koa ny masoko no mahita; kanjo hay! Na dia ny antsasaky ny fahendrenao aza dia tsy voalaza tamiko akory; fa indro, mihoatra noho ny laza efa reko ianao. '
  '7':
  - type: text
    content: 'Sambatra lahy ny olonao, ary sambatra ireto tandapanao ireto, izay mijoro eto anatrehanao mandrakariva ka mandre ny fahendrenao! '
  '8':
  - type: text
    content: 'Isaorana anie NY TOMPO Andriamanitrao izay tia anao ka nametraka anao amin’ny sezafiandrianany ho mpanjaka ho an’NY TOMPO Andriamanitrao; fa noho ny fitiavan’Andriamanitrao ny Israely hampitoetra azy mandrakizay no nanaovany anao ho mpanjakany mba hanao fitsarana sy fahamarinana. '
  '9':
  - type: text
    content: 'Ary nanome '
  - type: text
    content: talenta
  - type: text
    content: ' volamena roapolo amby zato sy zavamanitra sesehena ary vatosoa ho an’ny mpanjaka izy; tsy nisy nahatonga zavamanitra be intsony tahaka izay nomen’ny mpanjakavavin’i Sheba an’i Solomona mpanjaka ny tatỳ aoriana rehetra.'
