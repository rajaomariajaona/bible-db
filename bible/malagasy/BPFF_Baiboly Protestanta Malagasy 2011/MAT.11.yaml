document_id: MAT.11,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Ary rehefa vitan’i Jesosy ny hafatrafatra ho an’ny mpianany roa amby folo lahy dia niala teo Izy hampianatra sy hitoriteny any amin’ireo tanànany.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fanontanian’i Jaona Mpanao batisa
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Lio 7.18-35
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Izy no ilay voasoratra hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Indro Aho maniraka ny irako hialoha Anao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay hamboatra ny lalanao eo alohanao» (Mal 3.1).
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Lazaiko aminareo marina tokoa: Amin’izay nateraky ny vehivavy dia tsy mbola nisy nitsangana izay lehibe noho i Jaona Mpanao batisa; nefa ny kely indrindra amin’ny fanjakan’ny lanitra dia lehibe noho izy. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Ary hatramin’ny andron’i Jaona Mpanao batisa ka mandraka ankehitriny ny fanjakan’ny lanitra dia rombahina, ary ny mpandrombaka dia maka azy an-keriny. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Fa ny mpaminany rehetra sy ny lalàna dia naminany hatramin’i Jaona. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Ary raha mety mandray ianareo dia izy no ilay Elia izay ho avy. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Izay manan-tsofina hoenti-mihaino, aoka izy hihaino.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Fa tahaka ny inona no hanoharako ity taranaka ity? Tahaka ny ankizy madinika mipetraka eny an-tsena izy, izay miantso ny namany ka miteny hoe:'
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Efa nitsoka sodina taminareo izahay
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa tsy nandihy ianareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: efa nihira hira fisaonana izahay
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa tsy niteha-tratra ianareo.
  '18':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Fa tonga i Jaona, tsy nihinana na nisotro, ka hoy ny olona: Manana '
    - type: usfm
      marker: w
      children:
      - type: text
        text: demonia
    - type: text
      text: ' izy. '
  '19':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Tonga kosa ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Zanak’Olona
    - type: text
      text: ', mihinana sy misotro, ka hoy ny olona: Indro olona fatra-pitia hanina sy mpisotro divay, sakaizan’ny mpamory hetra sy ny mpanota. Fa ny fahendrena dia hamarinin’ny asany.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ireo tanàna nandà tsy hino
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mat 10.15; Lio 10.12-15
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Rehefa ren’i Jaona, tao an-tranomaizina, ny asa nataon’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ', dia naniraka ny mpianany izy '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Ary tamin’izay Jesosy dia niteny mafy ireo tanàna izay vao avy nanaovany ny ankamaroan’ny asany lehibe, satria tsy nibebaka ireo, ka hoy Izy: '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Lozanao, ry Korazina! Lozanao, ry Betsaida! Fa raha mba tany Tiro sy Sidona no natao ny asa lehibe izay natao teo aminareo dia ho efa nibebaka ela tamin’ny akanjo fisaonana sy ny lavenona ireny. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Fa lazaiko aminareo fa ho moramora kokoa ny ho amin’i Tiro sy Sidona amin’ny andro fitsarana noho ny ho aminareo. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Ary ianao, ry Kapernaomy, hasandratra hatrany an-danitra va ianao? Hietry hatrany amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: fitoeran’ny maty
    - type: text
      text: ' ianao; fa raha mba tany Sodoma no natao ny asa lehibe izay natao teo aminao dia ho naharitra ambaraka androany izy. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Fa lazaiko aminareo fa ho moramora kokoa ny ho amin’ny tany Sodoma amin’ny andro fitsarana noho ny ho aminao.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny Ray, ambaran’ny Zanaka
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Lio 10.21-22
    marker-yv: yv-h
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Tamin’izany andro izany koa Jesosy niteny hoe: Midera Anao Aho, Ray ô! Tompon’ny lanitra sy ny tany, fa nafeninao tamin’ny hendry sy ny manan-tsaina izany zavatra izany nefa nasehonao tamin’ny zaza madinika.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Eny, Ray ô! Satria izany no sitraponao.
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Ny zavatra rehetra dia natolotry ny Raiko Ahy; ary tsy misy mahalala tsara ny Zanaka, afa-tsy ny Ray; ary tsy misy mahalala tsara ny Ray, afa-tsy ny Zanaka sy izay tian’ny Zanaka hanehoana Azy.
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Mankanesa atỳ amiko, ianareo rehetra izay miasa fatratra sy mavesatra entana, fa Izaho no hanome anareo fitsaharana. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Ento ny ziogako ka mianara amiko; fa malemy fanahy sady tsy miavona am-po Aho; dia hahita fitsaharana ho an’ny fanahinareo ianareo. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'hilaza Aminy hoe: Ianao va ilay ho avy sa mbola hafa no andrasantsika? '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Fa mora ny ziogako ary maivana ny entako.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ary Jesosy namaly azy ireo hoe: Mandehana ianareo ka ambarao amin’i Jaona izao renareo sy hitanareo izao: '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Mahiratra ny jamba, afaka mandeha tsara ny mandringa, diovina ny boka, malady ny marenina, atsangana ny maty ary itoriana ny Filazantsara ny mahantra. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Ary sambatra izay tsy ho tafintohina noho ny Amiko.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Nony lasa ireny, vao nilaza ny amin’i Jaona tamin’ny vahoaka Jesosy ka niteny hoe: Hizaha inona no nandehananareo nankany an-tany efitra? Volotara nohozongozonin’ny rivotra va? '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Sa hizaha inona no nandehananareo? Olona mirentirenty fitafy va? Indro, ny mirentirenty fitafy dia any amin’ny tranon’ny mpanjaka. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Sa hizaha inona no nandehananareo? Mpaminany va? Eny, hoy Aho aminareo, sady mihoatra lavitra noho ny mpaminany izy. '
