document_id: MAT.11,3103
type_code: plt
verses:
  '1':
  - type: text
    content: Ary rehefa vitan’i Jesosy ny hafatrafatra ho an’ny mpianany roa amby folo lahy dia niala teo Izy hampianatra sy hitoriteny any amin’ireo tanànany.
  - type: heading
    content: Ny fanontanian’i Jaona Mpanao batisa
  - type: heading
    content: Lio 7.18-35
  '10':
  - type: text
    content: 'Izy no ilay voasoratra hoe:'
  - type: text
    content: «Indro Aho maniraka ny irako hialoha Anao,
  - type: text
    content: izay hamboatra ny lalanao eo alohanao» (Mal 3.1).
  '11':
  - type: text
    content: 'Lazaiko aminareo marina tokoa: Amin’izay nateraky ny vehivavy dia tsy mbola nisy nitsangana izay lehibe noho i Jaona Mpanao batisa; nefa ny kely indrindra amin’ny fanjakan’ny lanitra dia lehibe noho izy. '
  '12':
  - type: text
    content: 'Ary hatramin’ny andron’i Jaona Mpanao batisa ka mandraka ankehitriny ny fanjakan’ny lanitra dia rombahina, ary ny mpandrombaka dia maka azy an-keriny. '
  '13':
  - type: text
    content: 'Fa ny mpaminany rehetra sy ny lalàna dia naminany hatramin’i Jaona. '
  '14':
  - type: text
    content: 'Ary raha mety mandray ianareo dia izy no ilay Elia izay ho avy. '
  '15':
  - type: text
    content: Izay manan-tsofina hoenti-mihaino, aoka izy hihaino.
  '16':
  - type: text
    content: 'Fa tahaka ny inona no hanoharako ity taranaka ity? Tahaka ny ankizy madinika mipetraka eny an-tsena izy, izay miantso ny namany ka miteny hoe:'
  '17':
  - type: text
    content: Efa nitsoka sodina taminareo izahay
  - type: text
    content: nefa tsy nandihy ianareo,
  - type: text
    content: efa nihira hira fisaonana izahay
  - type: text
    content: nefa tsy niteha-tratra ianareo.
  '18':
  - type: text
    content: 'Fa tonga i Jaona, tsy nihinana na nisotro, ka hoy ny olona: Manana '
  - type: text
    content: demonia
  - type: text
    content: ' izy. '
  '19':
  - type: text
    content: 'Tonga kosa ny '
  - type: text
    content: Zanak’Olona
  - type: text
    content: ', mihinana sy misotro, ka hoy ny olona: Indro olona fatra-pitia hanina sy mpisotro divay, sakaizan’ny mpamory hetra sy ny mpanota. Fa ny fahendrena dia hamarinin’ny asany.'
  - type: heading
    content: Ireo tanàna nandà tsy hino
  - type: heading
    content: Mat 10.15; Lio 10.12-15
  '2':
  - type: text
    content: 'Rehefa ren’i Jaona, tao an-tranomaizina, ny asa nataon’i '
  - type: text
    content: Kristy
  - type: text
    content: ', dia naniraka ny mpianany izy '
  '20':
  - type: text
    content: 'Ary tamin’izay Jesosy dia niteny mafy ireo tanàna izay vao avy nanaovany ny ankamaroan’ny asany lehibe, satria tsy nibebaka ireo, ka hoy Izy: '
  '21':
  - type: text
    content: 'Lozanao, ry Korazina! Lozanao, ry Betsaida! Fa raha mba tany Tiro sy Sidona no natao ny asa lehibe izay natao teo aminareo dia ho efa nibebaka ela tamin’ny akanjo fisaonana sy ny lavenona ireny. '
  '22':
  - type: text
    content: 'Fa lazaiko aminareo fa ho moramora kokoa ny ho amin’i Tiro sy Sidona amin’ny andro fitsarana noho ny ho aminareo. '
  '23':
  - type: text
    content: 'Ary ianao, ry Kapernaomy, hasandratra hatrany an-danitra va ianao? Hietry hatrany amin’ny '
  - type: text
    content: fitoeran’ny maty
  - type: text
    content: ' ianao; fa raha mba tany Sodoma no natao ny asa lehibe izay natao teo aminao dia ho naharitra ambaraka androany izy. '
  '24':
  - type: text
    content: Fa lazaiko aminareo fa ho moramora kokoa ny ho amin’ny tany Sodoma amin’ny andro fitsarana noho ny ho aminao.
  - type: heading
    content: Ny Ray, ambaran’ny Zanaka
  - type: heading
    content: Lio 10.21-22
  '25':
  - type: text
    content: 'Tamin’izany andro izany koa Jesosy niteny hoe: Midera Anao Aho, Ray ô! Tompon’ny lanitra sy ny tany, fa nafeninao tamin’ny hendry sy ny manan-tsaina izany zavatra izany nefa nasehonao tamin’ny zaza madinika.'
  '26':
  - type: text
    content: Eny, Ray ô! Satria izany no sitraponao.
  '27':
  - type: text
    content: Ny zavatra rehetra dia natolotry ny Raiko Ahy; ary tsy misy mahalala tsara ny Zanaka, afa-tsy ny Ray; ary tsy misy mahalala tsara ny Ray, afa-tsy ny Zanaka sy izay tian’ny Zanaka hanehoana Azy.
  '28':
  - type: text
    content: 'Mankanesa atỳ amiko, ianareo rehetra izay miasa fatratra sy mavesatra entana, fa Izaho no hanome anareo fitsaharana. '
  '29':
  - type: text
    content: 'Ento ny ziogako ka mianara amiko; fa malemy fanahy sady tsy miavona am-po Aho; dia hahita fitsaharana ho an’ny fanahinareo ianareo. '
  '3':
  - type: text
    content: 'hilaza Aminy hoe: Ianao va ilay ho avy sa mbola hafa no andrasantsika? '
  '30':
  - type: text
    content: Fa mora ny ziogako ary maivana ny entako.
  '4':
  - type: text
    content: 'Ary Jesosy namaly azy ireo hoe: Mandehana ianareo ka ambarao amin’i Jaona izao renareo sy hitanareo izao: '
  '5':
  - type: text
    content: 'Mahiratra ny jamba, afaka mandeha tsara ny mandringa, diovina ny boka, malady ny marenina, atsangana ny maty ary itoriana ny Filazantsara ny mahantra. '
  '6':
  - type: text
    content: Ary sambatra izay tsy ho tafintohina noho ny Amiko.
  '7':
  - type: text
    content: 'Nony lasa ireny, vao nilaza ny amin’i Jaona tamin’ny vahoaka Jesosy ka niteny hoe: Hizaha inona no nandehananareo nankany an-tany efitra? Volotara nohozongozonin’ny rivotra va? '
  '8':
  - type: text
    content: 'Sa hizaha inona no nandehananareo? Olona mirentirenty fitafy va? Indro, ny mirentirenty fitafy dia any amin’ny tranon’ny mpanjaka. '
  '9':
  - type: text
    content: 'Sa hizaha inona no nandehananareo? Mpaminany va? Eny, hoy Aho aminareo, sady mihoatra lavitra noho ny mpaminany izy. '
