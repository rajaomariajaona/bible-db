document_id: PSA.54,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Antso vonjy ataon’ny olona enjehina
  - type: text
    content: 'Ho an’ny mpiventy hira. Hampiarahina amin’ny valiha. Maskila nataon’i Davida, fony tonga ny Zifita ka nilaza tamin’i Saoly hoe: Tsy miery any aminay va i Davida?'
  - type: text
    content: Vonjeo amin’ny anaranao aho, Andriamanitra ô,
  - type: text
    content: ary omeo rariny aho araka ny herinao!
  '2':
  - type: text
    content: Andriamanitra ô, henoy ny vavaka ataoko!
  - type: text
    content: Atongilano hihaino ny tenin’ny vavako ny sofinao!
  '3':
  - type: text
    content: Fa olona hafa firenena no mitsangana hamely ahy
  - type: text
    content: ary mpampihorohoro no mitady ny aiko;
  - type: text
    content: 'tsy mihevitra an’Andriamanitra ho eo anatrehany izy. '
  - type: text
    content: Fiatoana.
  '4':
  - type: text
    content: Indro Andriamanitra no Mpamonjy ahy,
  - type: text
    content: ny Tompo no Mpanohana ahy.
  '5':
  - type: text
    content: Hamaly ny ratsy ataon’ny mpampahory ahy Izy;
  - type: text
    content: aoka ny fahamarinanao no handringananao azy!
  '6':
  - type: text
    content: An-tsitrapo no hanolorako fanatitra ho Anao;
  - type: text
    content: hidera ny anaranao aho, TOMPO ô, fa tsara Ianao.
  '7':
  - type: text
    content: Fa efa namonjy ahy ho afaka tamin’ny fahoriana rehetra Ianao
  - type: text
    content: ary ny masoko dia faly mijery ny amin’ny fahavaloko.
