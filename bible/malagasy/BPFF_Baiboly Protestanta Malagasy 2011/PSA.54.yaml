document_id: PSA.54
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Antso vonjy ataon’ny olona enjehina
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: 'Ho an’ny mpiventy hira. Hampiarahina amin’ny valiha. Maskila nataon’i Davida, fony tonga ny Zifita ka nilaza tamin’i Saoly hoe: Tsy miery any aminay va i Davida?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Vonjeo amin’ny anaranao aho, Andriamanitra ô,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary omeo rariny aho araka ny herinao!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Andriamanitra ô, henoy ny vavaka ataoko!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Atongilano hihaino ny tenin’ny vavako ny sofinao!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Fa olona hafa firenena no mitsangana hamely ahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mpampihorohoro no mitady ny aiko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'tsy mihevitra an’Andriamanitra ho eo anatrehany izy. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Fiatoana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Indro Andriamanitra no Mpamonjy ahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny Tompo no Mpanohana ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Hamaly ny ratsy ataon’ny mpampahory ahy Izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: aoka ny fahamarinanao no handringananao azy!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: An-tsitrapo no hanolorako fanatitra ho Anao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hidera ny anaranao aho, TOMPO ô, fa tsara Ianao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Fa efa namonjy ahy ho afaka tamin’ny fahoriana rehetra Ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny masoko dia faly mijery ny amin’ny fahavaloko.
