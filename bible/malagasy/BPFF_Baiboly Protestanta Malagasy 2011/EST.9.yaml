document_id: EST.9,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny famaliana nataon’ny Jiosy
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Tamin’ny andro fahatelo amby folo tamin’ny volana faharoa amby folo na ny volana '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Adara
    - type: text
      text: ' dia tonga ny andro hanatanterahana ny tenin’ny mpanjaka sy ny didiny, dia ny andro izay nantenain’ny fahavalon’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jiosy
    - type: text
      text: ' hifehezana azy ireo indrindra; kanjo nivadika ny rasa ka ny Jiosy indray no nandresy izay nankahala azy. '
  '10':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'izy folo lahy, zanak’i Hamana, zanak’i Hamedota, fahavalon’ny Jiosy, dia novonoiny koa. Kanefa tsy mba norobainy ny fananany. '
  '11':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Androtr’izay ihany dia nambara tamin’ny mpanjaka ny isan’ny voavono tany Sosana, tanàna mimanda.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Hoy ny mpanjaka tamin’i Estera, vadin’ny mpanjaka: Teto Sosana renivohitra aza ny Jiosy dia efa nahavono sy naharingana dimanjato lahy mbamin’izy folo lahy, zanak’i Hamana. Koa ahoana kosa ny nataony tany amin’ny fari-piadidiana sisa rehetra manerana ny fanjakan’ny mpanjaka? Ary inona koa no angatahinao? Homena izany. Ary inona no mbola tadiavinao? Hotanterahina izany. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Dia hoy i Estera: Raha sitraky ny mpanjaka dia aoka ny Jiosy izay eto Sosana havela hanatanteraka toy izay natao androany ihany koa rahampitso ary aoka hahantona amin’ny hazo koa izy folo lahy zanak’i Hamana. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Dia nasain’ny mpanjaka natao izany. Novakina tany Sosana ny didy ka nahantona izy folo lahy zanak’i Hamana. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Dia nivory indray ny Jiosy izay tany Sosana tamin’ny andro fahefatra amby folo tamin’ny volana '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Adara
    - type: text
      text: ' ka namono olona telonjato lahy tany Sosana. Kanefa ny fananany dia tsy mba norobainy.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Ary nivory hiaro ny ainy ny Jiosy hafa izay tany amin’ny fari-piadidian’ny fanjakan’ny mpanjaka ka afaka tamin’ny fahavalony. Dimy arivo sy fito alina no matiny. Kanefa tsy mba norobainy ny fananany; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'tamin’ny andro fahatelo amby folo tamin’ny volana Adara izany. Nitsahatra izy ireo tamin’ny andro fahefatra amby folo ka nataony ho andro fifanasana sy firavoravoana izany. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Fa ny Jiosy izay tany Sosana kosa dia nivory tamin’ny andro fahatelo amby folo tamin’io volana io ihany sy tamin’ny andro fahefatra amby folo koa. Nitsahatra tamin’ny andro fahadimy amby folo izy ireo koa io no nataony andro fifanasana sy firavoravoana. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Noho izany ny Jiosy tany ambanivohitra, izay nitoetra tamin’ny vohitra madinika, dia nanao ny andro fahefatra amby folo amin’ny volana Adara ho andro firavoravoana sy fifanasana ary andro fifaliana sy fifanolorana fanomezana.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nanendrena ny Porima ho fety fahatsiarovana
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Tamin’io andro io dia nivory tany an-tanànany avy ny Jiosy, tany amin’ny fari-piadidiana rehetra manerana ny fanjakan’i Ahasoerosy mpanjaka mba hamely izay nitady hanisy ratsy azy. Tsy nisy olona nahajanona teo anoloany satria nahazo ny olona rehetra ny fahatahorana azy. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Ary nanoratra ny amin’izany zavatra izany i Mordekay sady nampitondra taratasy ho any amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jiosy
    - type: text
      text: ' rehetra izay tany amin’ny fari-piadidiana rehetra manerana ny fanjakan’i Ahasoerosy mpanjaka, na ny akaiky na ny lavitra, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'mba hampitandrina azy ny andro fahefatra amby folo sy ny fahadimy amby folo amin’ny volana '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Adara
    - type: text
      text: ' isan-taona, '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'araka ny andro nahafahan’ny Jiosy tamin’ny fahavalony sy ny volana izay nampodiana ny alahelony ho fifaliana ary ny fitomaniany ho andro fifaliana, mba hatao ho andro fifanasana sy fifaliana ary fifanolorana fanomezana sy fanolorana fanomezana ho an’ny mahantra izany. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Nanaiky hanao ny zavatra izay efa natombony ho fomba raikitra ny Jiosy, araka izay efa nosoratan’i Mordekay taminy. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Satria i Hamana, zanak’i Hamedota agagita, fahavalon’ny Jiosy rehetra, dia nihevitra ny handringana ny Jiosy ka nanao Pora, na antsapaka, mba hampikorotan-tsaina azy sy handringanana azy. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Rehefa tonga teo anatrehan’ny mpanjaka izany raharaha izany dia nampanoratra didy tamin’ny taratasy izy mba hatsingerina ho eo amin’ny lohan’i Hamana ihany ny hevi-dratsy nokasainy hatao amin’ny Jiosy ary mba hahantona amin’ny hazo izy sy ireo zanany lahy. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Izany no nanaovana ireo andro ireo hoe Porima, dia araka ny anarana hoe Pora
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.26 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Zahao '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 3.7.
      marker-yv: yv-n
    - type: text
      text: '. Araka ny teny rehetra tamin’izany taratasy izany sy izay hitany ny amin’izany zavatra nanjo azy izany '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'dia nanao lalàna tsy azo ovana ny Jiosy ka nanaiky fa izy sy ny taranany ary izay rehetra miray aminy dia hitandrina izany andro roa izany araka ny voasoratra sy araka ny fotoanany avy, isan-taona; '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: ary mba hotsarovana sy hotandremana ireo andro ireo amin’ny taranany mifandimby rehetra sy ny fokony rehetra ary any amin’ny fari-piadidiana tsirairay sy any amin’ny tanàna tsirairay; ary mba tsy ho tapaka amin’ny Jiosy ireo andro Porima ireo ka tsy hitsahatra ny fahatsiarovana izany amin’ny taranany.
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Ary i Estera, vadin’ny mpanjaka sady zanakavavin’i Abihaila sy i Mordekay jiosy, dia nanoratra tamin’ny fahefana rehetra mba hanamafy izany taratasy faharoa milaza ny Porima izany. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Ary ny mpitondra rehetra amin’ny fari-piadidiana sy ny solontenan’ny mpanjaka sy ny governora mbamin’ny mpanao raharahan’ny mpanjaka dia nanampy ny Jiosy satria azon’ny fahatahorana an’i Mordekay izy, '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Ary nampitondra taratasy ho any amin’ny Jiosy rehetra izy, dia ho any amin’ny fari-piadidiana fito amby roapolo amby zato amin’ny fanjakan’i Ahasoerosy, manao teny fiadanana sy fahamarinana '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'mba hampitandrina azy ireo andro Porima ireo amin’ny fotoanany, araka izay nandidian’i Mordekay jiosy sy i Estera, vadin’ny mpanjaka, azy sy araka izay efa nekeny ho an’ny tenany sy ny taranany koa ny amin’ny fifadian-kanina sy ny fitarainana izay hataony. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Ary ny tenin’i Estera dia nanamafy izany teny milaza ny Porima izany; ary voasoratra tao amin’ny boky izany.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: satria i Mordekay dia tonga lehibe tao amin’ny tranon’ny mpanjaka ary niely tany amin’ny fari-piadidiana rehetra ny lazany. Nitombo voninahitra hatrany io lehilahy Mordekay io.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Nasian’ny Jiosy ny fahavalony rehetra ka nokapainy sabatra sy novonoiny ary naringany; nahazo nanatanteraka izay sitraky ny fony tamin’izay nankahala azy izy ireo. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Ary tany Sosana, tanàna mimanda, aza, ny Jiosy dia nahavono sy naharingana dimanjato lahy,
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ary i Parsandata,
  - type: usfm
    marker: p
    children:
    - type: text
      text: i Dalfona,
  - type: usfm
    marker: p
    children:
    - type: text
      text: i Aspata,
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: i Porata,
  - type: usfm
    marker: p
    children:
    - type: text
      text: i Adalia,
  - type: usfm
    marker: p
    children:
    - type: text
      text: i Aridata,
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: i Parmasta,
  - type: usfm
    marker: p
    children:
    - type: text
      text: i Arisay,
  - type: usfm
    marker: p
    children:
    - type: text
      text: i Ariday,
  - type: usfm
    marker: p
    children:
    - type: text
      text: ary i Vaizata;
