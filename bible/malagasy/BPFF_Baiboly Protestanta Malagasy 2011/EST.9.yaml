document_id: EST.9,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny famaliana nataon’ny Jiosy
  - type: text
    content: 'Tamin’ny andro fahatelo amby folo tamin’ny volana faharoa amby folo na ny volana '
  - type: text
    content: Adara
  - type: text
    content: ' dia tonga ny andro hanatanterahana ny tenin’ny mpanjaka sy ny didiny, dia ny andro izay nantenain’ny fahavalon’ny '
  - type: text
    content: Jiosy
  - type: text
    content: ' hifehezana azy ireo indrindra; kanjo nivadika ny rasa ka ny Jiosy indray no nandresy izay nankahala azy. '
  '10':
  - type: text
    content: 'izy folo lahy, zanak’i Hamana, zanak’i Hamedota, fahavalon’ny Jiosy, dia novonoiny koa. Kanefa tsy mba norobainy ny fananany. '
  '11':
  - type: text
    content: Androtr’izay ihany dia nambara tamin’ny mpanjaka ny isan’ny voavono tany Sosana, tanàna mimanda.
  '12':
  - type: text
    content: 'Hoy ny mpanjaka tamin’i Estera, vadin’ny mpanjaka: Teto Sosana renivohitra aza ny Jiosy dia efa nahavono sy naharingana dimanjato lahy mbamin’izy folo lahy, zanak’i Hamana. Koa ahoana kosa ny nataony tany amin’ny fari-piadidiana sisa rehetra manerana ny fanjakan’ny mpanjaka? Ary inona koa no angatahinao? Homena izany. Ary inona no mbola tadiavinao? Hotanterahina izany. '
  '13':
  - type: text
    content: 'Dia hoy i Estera: Raha sitraky ny mpanjaka dia aoka ny Jiosy izay eto Sosana havela hanatanteraka toy izay natao androany ihany koa rahampitso ary aoka hahantona amin’ny hazo koa izy folo lahy zanak’i Hamana. '
  '14':
  - type: text
    content: 'Dia nasain’ny mpanjaka natao izany. Novakina tany Sosana ny didy ka nahantona izy folo lahy zanak’i Hamana. '
  '15':
  - type: text
    content: 'Dia nivory indray ny Jiosy izay tany Sosana tamin’ny andro fahefatra amby folo tamin’ny volana '
  - type: text
    content: Adara
  - type: text
    content: ' ka namono olona telonjato lahy tany Sosana. Kanefa ny fananany dia tsy mba norobainy.'
  '16':
  - type: text
    content: 'Ary nivory hiaro ny ainy ny Jiosy hafa izay tany amin’ny fari-piadidian’ny fanjakan’ny mpanjaka ka afaka tamin’ny fahavalony. Dimy arivo sy fito alina no matiny. Kanefa tsy mba norobainy ny fananany; '
  '17':
  - type: text
    content: 'tamin’ny andro fahatelo amby folo tamin’ny volana Adara izany. Nitsahatra izy ireo tamin’ny andro fahefatra amby folo ka nataony ho andro fifanasana sy firavoravoana izany. '
  '18':
  - type: text
    content: 'Fa ny Jiosy izay tany Sosana kosa dia nivory tamin’ny andro fahatelo amby folo tamin’io volana io ihany sy tamin’ny andro fahefatra amby folo koa. Nitsahatra tamin’ny andro fahadimy amby folo izy ireo koa io no nataony andro fifanasana sy firavoravoana. '
  '19':
  - type: text
    content: Noho izany ny Jiosy tany ambanivohitra, izay nitoetra tamin’ny vohitra madinika, dia nanao ny andro fahefatra amby folo amin’ny volana Adara ho andro firavoravoana sy fifanasana ary andro fifaliana sy fifanolorana fanomezana.
  - type: heading
    content: Ny nanendrena ny Porima ho fety fahatsiarovana
  '2':
  - type: text
    content: 'Tamin’io andro io dia nivory tany an-tanànany avy ny Jiosy, tany amin’ny fari-piadidiana rehetra manerana ny fanjakan’i Ahasoerosy mpanjaka mba hamely izay nitady hanisy ratsy azy. Tsy nisy olona nahajanona teo anoloany satria nahazo ny olona rehetra ny fahatahorana azy. '
  '20':
  - type: text
    content: 'Ary nanoratra ny amin’izany zavatra izany i Mordekay sady nampitondra taratasy ho any amin’ny '
  - type: text
    content: Jiosy
  - type: text
    content: ' rehetra izay tany amin’ny fari-piadidiana rehetra manerana ny fanjakan’i Ahasoerosy mpanjaka, na ny akaiky na ny lavitra, '
  '21':
  - type: text
    content: 'mba hampitandrina azy ny andro fahefatra amby folo sy ny fahadimy amby folo amin’ny volana '
  - type: text
    content: Adara
  - type: text
    content: ' isan-taona, '
  '22':
  - type: text
    content: 'araka ny andro nahafahan’ny Jiosy tamin’ny fahavalony sy ny volana izay nampodiana ny alahelony ho fifaliana ary ny fitomaniany ho andro fifaliana, mba hatao ho andro fifanasana sy fifaliana ary fifanolorana fanomezana sy fanolorana fanomezana ho an’ny mahantra izany. '
  '23':
  - type: text
    content: 'Nanaiky hanao ny zavatra izay efa natombony ho fomba raikitra ny Jiosy, araka izay efa nosoratan’i Mordekay taminy. '
  '24':
  - type: text
    content: 'Satria i Hamana, zanak’i Hamedota agagita, fahavalon’ny Jiosy rehetra, dia nihevitra ny handringana ny Jiosy ka nanao Pora, na antsapaka, mba hampikorotan-tsaina azy sy handringanana azy. '
  '25':
  - type: text
    content: 'Rehefa tonga teo anatrehan’ny mpanjaka izany raharaha izany dia nampanoratra didy tamin’ny taratasy izy mba hatsingerina ho eo amin’ny lohan’i Hamana ihany ny hevi-dratsy nokasainy hatao amin’ny Jiosy ary mba hahantona amin’ny hazo izy sy ireo zanany lahy. '
  '26':
  - type: text
    content: Izany no nanaovana ireo andro ireo hoe Porima, dia araka ny anarana hoe Pora
  - type: note
    content: Zahao 3.7.
  - type: text
    content: '. Araka ny teny rehetra tamin’izany taratasy izany sy izay hitany ny amin’izany zavatra nanjo azy izany '
  '27':
  - type: text
    content: 'dia nanao lalàna tsy azo ovana ny Jiosy ka nanaiky fa izy sy ny taranany ary izay rehetra miray aminy dia hitandrina izany andro roa izany araka ny voasoratra sy araka ny fotoanany avy, isan-taona; '
  '28':
  - type: text
    content: ary mba hotsarovana sy hotandremana ireo andro ireo amin’ny taranany mifandimby rehetra sy ny fokony rehetra ary any amin’ny fari-piadidiana tsirairay sy any amin’ny tanàna tsirairay; ary mba tsy ho tapaka amin’ny Jiosy ireo andro Porima ireo ka tsy hitsahatra ny fahatsiarovana izany amin’ny taranany.
  '29':
  - type: text
    content: 'Ary i Estera, vadin’ny mpanjaka sady zanakavavin’i Abihaila sy i Mordekay jiosy, dia nanoratra tamin’ny fahefana rehetra mba hanamafy izany taratasy faharoa milaza ny Porima izany. '
  '3':
  - type: text
    content: 'Ary ny mpitondra rehetra amin’ny fari-piadidiana sy ny solontenan’ny mpanjaka sy ny governora mbamin’ny mpanao raharahan’ny mpanjaka dia nanampy ny Jiosy satria azon’ny fahatahorana an’i Mordekay izy, '
  '30':
  - type: text
    content: 'Ary nampitondra taratasy ho any amin’ny Jiosy rehetra izy, dia ho any amin’ny fari-piadidiana fito amby roapolo amby zato amin’ny fanjakan’i Ahasoerosy, manao teny fiadanana sy fahamarinana '
  '31':
  - type: text
    content: 'mba hampitandrina azy ireo andro Porima ireo amin’ny fotoanany, araka izay nandidian’i Mordekay jiosy sy i Estera, vadin’ny mpanjaka, azy sy araka izay efa nekeny ho an’ny tenany sy ny taranany koa ny amin’ny fifadian-kanina sy ny fitarainana izay hataony. '
  '32':
  - type: text
    content: Ary ny tenin’i Estera dia nanamafy izany teny milaza ny Porima izany; ary voasoratra tao amin’ny boky izany.
  '4':
  - type: text
    content: satria i Mordekay dia tonga lehibe tao amin’ny tranon’ny mpanjaka ary niely tany amin’ny fari-piadidiana rehetra ny lazany. Nitombo voninahitra hatrany io lehilahy Mordekay io.
  '5':
  - type: text
    content: 'Nasian’ny Jiosy ny fahavalony rehetra ka nokapainy sabatra sy novonoiny ary naringany; nahazo nanatanteraka izay sitraky ny fony tamin’izay nankahala azy izy ireo. '
  '6':
  - type: text
    content: Ary tany Sosana, tanàna mimanda, aza, ny Jiosy dia nahavono sy naharingana dimanjato lahy,
  '7':
  - type: text
    content: ary i Parsandata,
  - type: text
    content: i Dalfona,
  - type: text
    content: i Aspata,
  '8':
  - type: text
    content: i Porata,
  - type: text
    content: i Adalia,
  - type: text
    content: i Aridata,
  '9':
  - type: text
    content: i Parmasta,
  - type: text
    content: i Arisay,
  - type: text
    content: i Ariday,
  - type: text
    content: ary i Vaizata;
