document_id: ACT.13,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Nalefa ho misionera i Barnabasy sy i Saoly
  - type: text
    content: 'Teo amin’ny fiangonana tany Antiokia dia nisy mpaminany sy mpampianatra: I Barnabasy, i Simeona izay antsoina koa hoe Nigera, i Losio kireniana, i Menahema izay niara-notezaina tamin’i Heroda mpanapaka ary i Saoly. '
  '10':
  - type: text
    content: 'sady niteny hoe: Ialahy feno ny fitaka rehetra sy ny hafetsena rehetra, Ialahy zanaky ny '
  - type: text
    content: devoly
  - type: text
    content: ' sady fahavalon’ny fahamarinana rehetra, tsy hitsahatra tsy hamily ny lalan’ny Tompo izay mahitsy va Ialahy? '
  '11':
  - type: text
    content: 'Ary indro, ankehitriny hamely an’Ialahy ny tanan’ny Tompo, dia ho jamba Ialahy ka tsy hahita masoandro aloha. Dia tonga taminy niaraka tamin’izay ny hajambana sy ny haizina ary niraparapa nitady olona hitantana azy izy. '
  '12':
  - type: text
    content: Nony nahita izay zava-nitranga taminy ny governora dia nino sady talanjona tamin’ny fampianaran’ny Tompo.
  - type: heading
    content: Ny fanambaràna nataon’i Paoly tany Antiokia any Pisidia
  '13':
  - type: text
    content: 'Niondrana an-tsambo niala avy tao Pafo i Paoly sy ireo namany dia tonga tany Perga any Pamfilia; i Jaona kosa dia nandao azy ka niverina nankany Jerosalema. '
  '14':
  - type: text
    content: 'Rehefa niala tany Perga izy ireo dia nandroso nankany Antiokia any Pisidia ary niditra tao amin’ny '
  - type: text
    content: sinagoga
  - type: text
    content: ' tamin’ny andro '
  - type: text
    content: Sabata
  - type: text
    content: ' ka nipetraka teo. '
  '15':
  - type: text
    content: 'Rehefa vita ny famakiana ny Lalàna sy ny Mpaminany dia nampilaza taminy ireo lehiben’ny sinagoga hoe: Ry rahalahy, raha misy fananarana hataonareo amin’ny olona dia ataovy.'
  '16':
  - type: text
    content: 'Ary nitsangana i Paoly sady nibaiko tanana azy ka niteny hoe: Ry lehilahy Israelita sy ianareo izay matahotra an’Andriamanitra, mihainoa: '
  '17':
  - type: text
    content: 'Andriamanitr’izao olona Israely izao no nifidy ny razantsika ka nanandratra ny olona, raha nivahiny tany amin’ny tany Ejipta izy, ary sandry avo no nitondrany azy nivoaka avy tany. '
  '18':
  - type: text
    content: 'Niaritra ny toetran’ireo tany an-tany efitra nandritra ny efapolo taona Izy. '
  '19':
  - type: text
    content: 'Ary rehefa nandrava firenena fito tany amin’ny tany Kanana Izy dia nampandovainy ny tanin’ireny izy '
  '2':
  - type: text
    content: 'Nanao fanompoam-pivavahana ho an’ny Tompo sy nifady hanina izy ireo ka tamin’izany no nitenenan’ny Fanahy Masina hoe: Atokàny ho Ahy i Barnabasy sy i Saoly mba hanao ny asa izay efa niantsoako azy. '
  '20':
  - type: text
    content: 'tokony ho dimampolo sy efajato taona. Rehefa afaka izany dia nomeny mpitsara izy hatramin’i Samoela mpaminany. '
  '21':
  - type: text
    content: 'Taorianan’izany indray dia nangataka mpanjaka izy ka nomen’Andriamanitra azy nandritra ny efapolo taona i Saoly, zanak’i Kisy, lehilahy avy tamin’ny fokon’i Benjamina. '
  '22':
  - type: text
    content: 'Rehefa nanaisotra an’i Saoly Izy dia nanandratra an’i Davida ho mpanjakany sady nanambara azy hoe: «Nahita an’i Davida, zanak’i Jese, lehilahy araka ny foko, izay hanao ny sitrapoko rehetra Aho» (1Sam 13.14; Sal 89.20). '
  '23':
  - type: text
    content: 'Avy tamin’ny taranak’izany lehilahy izany no nitondran’Andriamanitra an’i Jesosy araka ny teny fikasana ho Mpamonjy ny Israely. '
  '24':
  - type: text
    content: 'Talohan’ny nahatongavany dia nitory ny batisan’ny fibebahana tamin’ny olon’ny Israely rehetra i Jaona. '
  '25':
  - type: text
    content: 'Ary rehefa nadiva hahatanteraka ny fihazakazahany i Jaona dia niteny hoe: Heverinareo ho iza moa aho? Tsy Izy aho; fa indro, misy Iray avy ao aorianako, koa izaho dia tsy mendrika hamaha ny kapa eo an-tongony akory.'
  '26':
  - type: text
    content: 'Ry rahalahy, taranak’i Abrahama, sy izay rehetra matahotra an’Andriamanitra eo aminareo, ho amintsika no nampitondrana ny tenin’izao famonjena izao. '
  '27':
  - type: text
    content: 'Fa izay monina any Jerosalema sy ny loholona eo aminy dia tsy mba nahafantatra Azy, na ny feon’ny mpaminany izay vakina isan-tSabata ka nahatanteraka izany tamin’ny nanamelohany Azy. '
  '28':
  - type: text
    content: 'Na dia tsy hitany aza izay tokony hanamelohana Azy ho faty dia nangataka tamin’i Pilato ihany izy mba hamonoana Azy. '
  '29':
  - type: text
    content: 'Nahatanteraka izay rehetra voasoratra ny amin’i Jesosy izy dia nanaisotra Azy teo amin’ny hazo ary nandevina Azy tao am-pasana. '
  '3':
  - type: text
    content: Rehefa nifady hanina sy nivavaka ary nametra-tanana taminy izy ireo dia nandefa azy.
  - type: heading
    content: Any Sipra i Barnabasy sy i Saoly
  '30':
  - type: text
    content: 'Fa Andriamanitra kosa nanangana Azy tamin’ny maty. '
  '31':
  - type: text
    content: Ary niseho nandritra ny andro maro tamin’izay niara-niakatra taminy avy tany Galilia ho any Jerosalema Izy ka ireo no vavolombelony eo anatrehan’ny olona ankehitriny.
  '32':
  - type: text
    content: 'Mitory ny Filazantsara aminareo izahay, dia ilay teny fikasana nolazaina tamin’ny razana, '
  '33':
  - type: text
    content: 'dia ny nahatanterahan’Andriamanitra izany tamintsika taranany, raha nanangana an’i Jesosy Izy, araka ny voasoratra eo amin’ny Salamo faharoa hoe:'
  - type: text
    content: «Zanako Ianao,
  - type: text
    content: Izaho no niteraka Anao androany» (Sal 2.7).
  '34':
  - type: text
    content: 'Ary ny amin’ny nananganany Azy tamin’ny maty ka tsy hiverenany ho amin’ny fahalovana intsony, dia izao no voalazany: «Homeko anareo ny famindrampo mahatoky nampanantenaina an’i Davida» (Isa 55.3). '
  '35':
  - type: text
    content: 'Fa hoy Izy ao amin’ny Salamo hafa koa: «Tsy hamela ny Iray Masinao ho tratry ny fahalovana Ianao» (Sal 16.10). '
  '36':
  - type: text
    content: 'Fa i Davida, rehefa nahatanteraka ny sitrapon’Andriamanitra hahasoa ny olona niara-belona taminy, dia nodimandry ka nangonina any amin’ny razany izy ary tratry ny fahalovana; '
  '37':
  - type: text
    content: fa Izay natsangan’Andriamanitra no tsy mba tratry ny fahalovana.
  '38':
  - type: text
    content: 'Koa aoka ho fantatrareo, ry rahalahy, fa izany Lehilahy izany no itoriana famelan-keloka aminareo; '
  '39':
  - type: text
    content: 'ary ao Aminy no anamarinana izay rehetra mino ho afaka amin’ny heloka rehetra izay tsy azo nanamarinana anareo tamin’ny lalànan’i Mosesy. '
  '4':
  - type: text
    content: 'Nirahin’ny Fanahy Masina izy roa lahy, raha nidina nankany Seleokia ka teo no niondrana an-tsambo hankany Sipra. '
  '40':
  - type: text
    content: 'Koa tandremo fandrao hihatra izay voalaza ao amin’ny Mpaminany hoe:'
  '41':
  - type: text
    content: «Jereonareo mpiavonavona,
  - type: text
    content: dia aoka ho gaga ka ho levona ianareo;
  - type: text
    content: fa Izaho manao asa amin’ny andronareo,
  - type: text
    content: dia asa izay tsy hinoanareo akory
  - type: text
    content: na dia hisy hilaza aminareo aza» (Hab 1.5).
  '42':
  - type: text
    content: 'Nony niala teo izy dia nangatahiny holazaina aminy indray izany teny izany ny '
  - type: text
    content: Sabata
  - type: text
    content: ' manaraka. '
  '43':
  - type: text
    content: 'Rehefa nirava ny fivoriana dia maro tamin’ny '
  - type: text
    content: Jiosy
  - type: text
    content: ' sy ny '
  - type: text
    content: prozelita
  - type: text
    content: ' izay nanompo an’Andriamanitra no nanaraka an’i Paoly sy i Barnabasy; ary izy ireo dia niresaka taminy ka nampirisika azy haharitra amin’ny fahasoavan’Andriamanitra.'
  - type: heading
    content: Mitodika amin’ny Jentilisa ry Paoly sy i Barnabasy
  '44':
  - type: text
    content: 'Nony tonga ny '
  - type: text
    content: Sabata
  - type: text
    content: ' manaraka dia saika tafangona avokoa ny tao an-tanàna rehetra mba hihaino ny tenin’Andriamanitra. '
  '45':
  - type: text
    content: 'Fa ny '
  - type: text
    content: Jiosy
  - type: text
    content: ' kosa, raha nahita ny vahoaka betsaka, dia feno fialonana ka nanohitra ny teny nolazain’i Paoly sady niteny ratsy. '
  '46':
  - type: text
    content: 'Dia niteny tamin’ny fahasahiana i Paoly sy i Barnabasy hoe: Ianareo no tsy maintsy nitoriana ny tenin’Andriamanitra mialoha; nefa rehefa mandà izany ianareo ka manao ny tenanareo ho tsy mendrika hahazo fiainana mandrakizay dia indro, mitodika any amin’ny '
  - type: text
    content: Jentilisa
  - type: text
    content: ' izahay; '
  '47':
  - type: text
    content: 'fa izao no nandidian’ny Tompo anay:'
  - type: text
    content: «Efa nanendry Anao ho fahazavan’ny Jentilisa Aho,
  - type: text
    content: mba ho famonjena hatrany amin’ny faran’ny tany ianao» (Isa 49.6).
  '48':
  - type: text
    content: 'Rehefa nandre izany ny Jentilisa dia faly ka nankalaza ny tenin’ny Tompo; ary izay voalahatra ho amin’ny fiainana mandrakizay dia nino. '
  '49':
  - type: text
    content: 'Koa ny tenin’ny Tompo dia niely manerana izany tany rehetra izany. '
  '5':
  - type: text
    content: 'Nony tonga tany Salamisy izy dia nitory ny tenin’Andriamanitra tany amin’ny sinagogan’ny '
  - type: text
    content: Jiosy
  - type: text
    content: ; ary noentiny koa i Jaona ho mpanampy azy.
  '50':
  - type: text
    content: 'Fa nandrisika ny vehivavy manankaja izay nivavaka sy ny lehibe tao an-tanàna ny Jiosy, dia nahatonga fanenjehana an’i Paoly sy i Barnabasy ireny ary nandroaka azy niala tamin’ny taniny. '
  '51':
  - type: text
    content: 'Fa izy roa lahy kosa dia nanintsana ny vovoka tamin’ny tongony hiampanga ireo, dia nankany Ikonioma. '
  '52':
  - type: text
    content: Dia feno fifaliana sy ny Fanahy Masina ny mpianatra.
  '6':
  - type: text
    content: 'Rehefa namakivaky ny nosy hatrany Pafo izy dia nahita Jiosy iray antsoina hoe Barjesosy, mpitahiry ody sady mpaminany sandoka, '
  '7':
  - type: text
    content: 'nipetraka tao amin’i Sergio Paolo; governoran’ny tany sady lehilahy marani-tsaina izy io; nampiantso an’i Barnabasy sy i Saoly hankao aminy izy satria naniry mba hahare ny tenin’Andriamanitra. '
  '8':
  - type: text
    content: 'Nefa i Elima, ilay mpitahiry ody, satria izany koa no anarany raha adika, dia nanohitra azy roa lahy sady nitady hampivily ny governora tsy hanaiky ny finoana. '
  '9':
  - type: text
    content: 'Fa i Saoly kosa, izay antsoina koa hoe Paoly, dia feno ny Fanahy Masina ka nibanjina azy '
