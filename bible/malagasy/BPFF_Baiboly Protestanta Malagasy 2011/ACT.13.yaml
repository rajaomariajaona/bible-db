document_id: ACT.13
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nalefa ho misionera i Barnabasy sy i Saoly
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Teo amin’ny fiangonana tany Antiokia dia nisy mpaminany sy mpampianatra: I Barnabasy, i Simeona izay antsoina koa hoe Nigera, i Losio kireniana, i Menahema izay niara-notezaina tamin’i Heroda mpanapaka ary i Saoly. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Nanao fanompoam-pivavahana ho an’ny Tompo sy nifady hanina izy ireo ka tamin’izany no nitenenan’ny Fanahy Masina hoe: Atokàny ho Ahy i Barnabasy sy i Saoly mba hanao ny asa izay efa niantsoako azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Rehefa nifady hanina sy nivavaka ary nametra-tanana taminy izy ireo dia nandefa azy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Any Sipra i Barnabasy sy i Saoly
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Nirahin’ny Fanahy Masina izy roa lahy, raha nidina nankany Seleokia ka teo no niondrana an-tsambo hankany Sipra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Nony tonga tany Salamisy izy dia nitory ny tenin’Andriamanitra tany amin’ny sinagogan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jiosy
  - type: text
    text: ; ary noentiny koa i Jaona ho mpanampy azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Rehefa namakivaky ny nosy hatrany Pafo izy dia nahita Jiosy iray antsoina hoe Barjesosy, mpitahiry ody sady mpaminany sandoka, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'nipetraka tao amin’i Sergio Paolo; governoran’ny tany sady lehilahy marani-tsaina izy io; nampiantso an’i Barnabasy sy i Saoly hankao aminy izy satria naniry mba hahare ny tenin’Andriamanitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Nefa i Elima, ilay mpitahiry ody, satria izany koa no anarany raha adika, dia nanohitra azy roa lahy sady nitady hampivily ny governora tsy hanaiky ny finoana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Fa i Saoly kosa, izay antsoina koa hoe Paoly, dia feno ny Fanahy Masina ka nibanjina azy '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'sady niteny hoe: Ialahy feno ny fitaka rehetra sy ny hafetsena rehetra, Ialahy zanaky ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: devoly
  - type: text
    text: ' sady fahavalon’ny fahamarinana rehetra, tsy hitsahatra tsy hamily ny lalan’ny Tompo izay mahitsy va Ialahy? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary indro, ankehitriny hamely an’Ialahy ny tanan’ny Tompo, dia ho jamba Ialahy ka tsy hahita masoandro aloha. Dia tonga taminy niaraka tamin’izay ny hajambana sy ny haizina ary niraparapa nitady olona hitantana azy izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Nony nahita izay zava-nitranga taminy ny governora dia nino sady talanjona tamin’ny fampianaran’ny Tompo.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fanambaràna nataon’i Paoly tany Antiokia any Pisidia
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Niondrana an-tsambo niala avy tao Pafo i Paoly sy ireo namany dia tonga tany Perga any Pamfilia; i Jaona kosa dia nandao azy ka niverina nankany Jerosalema. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Rehefa niala tany Perga izy ireo dia nandroso nankany Antiokia any Pisidia ary niditra tao amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sinagoga
  - type: text
    text: ' tamin’ny andro '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Sabata
  - type: text
    text: ' ka nipetraka teo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Rehefa vita ny famakiana ny Lalàna sy ny Mpaminany dia nampilaza taminy ireo lehiben’ny sinagoga hoe: Ry rahalahy, raha misy fananarana hataonareo amin’ny olona dia ataovy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary nitsangana i Paoly sady nibaiko tanana azy ka niteny hoe: Ry lehilahy Israelita sy ianareo izay matahotra an’Andriamanitra, mihainoa: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Andriamanitr’izao olona Israely izao no nifidy ny razantsika ka nanandratra ny olona, raha nivahiny tany amin’ny tany Ejipta izy, ary sandry avo no nitondrany azy nivoaka avy tany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Niaritra ny toetran’ireo tany an-tany efitra nandritra ny efapolo taona Izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary rehefa nandrava firenena fito tany amin’ny tany Kanana Izy dia nampandovainy ny tanin’ireny izy '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'tokony ho dimampolo sy efajato taona. Rehefa afaka izany dia nomeny mpitsara izy hatramin’i Samoela mpaminany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Taorianan’izany indray dia nangataka mpanjaka izy ka nomen’Andriamanitra azy nandritra ny efapolo taona i Saoly, zanak’i Kisy, lehilahy avy tamin’ny fokon’i Benjamina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Rehefa nanaisotra an’i Saoly Izy dia nanandratra an’i Davida ho mpanjakany sady nanambara azy hoe: «Nahita an’i Davida, zanak’i Jese, lehilahy araka ny foko, izay hanao ny sitrapoko rehetra Aho» (1Sam 13.14; Sal 89.20). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Avy tamin’ny taranak’izany lehilahy izany no nitondran’Andriamanitra an’i Jesosy araka ny teny fikasana ho Mpamonjy ny Israely. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Talohan’ny nahatongavany dia nitory ny batisan’ny fibebahana tamin’ny olon’ny Israely rehetra i Jaona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary rehefa nadiva hahatanteraka ny fihazakazahany i Jaona dia niteny hoe: Heverinareo ho iza moa aho? Tsy Izy aho; fa indro, misy Iray avy ao aorianako, koa izaho dia tsy mendrika hamaha ny kapa eo an-tongony akory.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ry rahalahy, taranak’i Abrahama, sy izay rehetra matahotra an’Andriamanitra eo aminareo, ho amintsika no nampitondrana ny tenin’izao famonjena izao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Fa izay monina any Jerosalema sy ny loholona eo aminy dia tsy mba nahafantatra Azy, na ny feon’ny mpaminany izay vakina isan-tSabata ka nahatanteraka izany tamin’ny nanamelohany Azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Na dia tsy hitany aza izay tokony hanamelohana Azy ho faty dia nangataka tamin’i Pilato ihany izy mba hamonoana Azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Nahatanteraka izay rehetra voasoratra ny amin’i Jesosy izy dia nanaisotra Azy teo amin’ny hazo ary nandevina Azy tao am-pasana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Fa Andriamanitra kosa nanangana Azy tamin’ny maty. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Ary niseho nandritra ny andro maro tamin’izay niara-niakatra taminy avy tany Galilia ho any Jerosalema Izy ka ireo no vavolombelony eo anatrehan’ny olona ankehitriny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Mitory ny Filazantsara aminareo izahay, dia ilay teny fikasana nolazaina tamin’ny razana, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'dia ny nahatanterahan’Andriamanitra izany tamintsika taranany, raha nanangana an’i Jesosy Izy, araka ny voasoratra eo amin’ny Salamo faharoa hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Zanako Ianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izaho no niteraka Anao androany» (Sal 2.7).
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ary ny amin’ny nananganany Azy tamin’ny maty ka tsy hiverenany ho amin’ny fahalovana intsony, dia izao no voalazany: «Homeko anareo ny famindrampo mahatoky nampanantenaina an’i Davida» (Isa 55.3). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Fa hoy Izy ao amin’ny Salamo hafa koa: «Tsy hamela ny Iray Masinao ho tratry ny fahalovana Ianao» (Sal 16.10). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Fa i Davida, rehefa nahatanteraka ny sitrapon’Andriamanitra hahasoa ny olona niara-belona taminy, dia nodimandry ka nangonina any amin’ny razany izy ary tratry ny fahalovana; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: fa Izay natsangan’Andriamanitra no tsy mba tratry ny fahalovana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Koa aoka ho fantatrareo, ry rahalahy, fa izany Lehilahy izany no itoriana famelan-keloka aminareo; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'ary ao Aminy no anamarinana izay rehetra mino ho afaka amin’ny heloka rehetra izay tsy azo nanamarinana anareo tamin’ny lalànan’i Mosesy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Koa tandremo fandrao hihatra izay voalaza ao amin’ny Mpaminany hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: «Jereonareo mpiavonavona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia aoka ho gaga ka ho levona ianareo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa Izaho manao asa amin’ny andronareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia asa izay tsy hinoanareo akory
- type: usfm
  marker: q1
  children:
  - type: text
    text: na dia hisy hilaza aminareo aza» (Hab 1.5).
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Nony niala teo izy dia nangatahiny holazaina aminy indray izany teny izany ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Sabata
  - type: text
    text: ' manaraka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Rehefa nirava ny fivoriana dia maro tamin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jiosy
  - type: text
    text: ' sy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prozelita
  - type: text
    text: ' izay nanompo an’Andriamanitra no nanaraka an’i Paoly sy i Barnabasy; ary izy ireo dia niresaka taminy ka nampirisika azy haharitra amin’ny fahasoavan’Andriamanitra.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mitodika amin’ny Jentilisa ry Paoly sy i Barnabasy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Nony tonga ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Sabata
  - type: text
    text: ' manaraka dia saika tafangona avokoa ny tao an-tanàna rehetra mba hihaino ny tenin’Andriamanitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Fa ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jiosy
  - type: text
    text: ' kosa, raha nahita ny vahoaka betsaka, dia feno fialonana ka nanohitra ny teny nolazain’i Paoly sady niteny ratsy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Dia niteny tamin’ny fahasahiana i Paoly sy i Barnabasy hoe: Ianareo no tsy maintsy nitoriana ny tenin’Andriamanitra mialoha; nefa rehefa mandà izany ianareo ka manao ny tenanareo ho tsy mendrika hahazo fiainana mandrakizay dia indro, mitodika any amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jentilisa
  - type: text
    text: ' izahay; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'fa izao no nandidian’ny Tompo anay:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Efa nanendry Anao ho fahazavan’ny Jentilisa Aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba ho famonjena hatrany amin’ny faran’ny tany ianao» (Isa 49.6).
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Rehefa nandre izany ny Jentilisa dia faly ka nankalaza ny tenin’ny Tompo; ary izay voalahatra ho amin’ny fiainana mandrakizay dia nino. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'Koa ny tenin’ny Tompo dia niely manerana izany tany rehetra izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Fa nandrisika ny vehivavy manankaja izay nivavaka sy ny lehibe tao an-tanàna ny Jiosy, dia nahatonga fanenjehana an’i Paoly sy i Barnabasy ireny ary nandroaka azy niala tamin’ny taniny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'Fa izy roa lahy kosa dia nanintsana ny vovoka tamin’ny tongony hiampanga ireo, dia nankany Ikonioma. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: Dia feno fifaliana sy ny Fanahy Masina ny mpianatra.
