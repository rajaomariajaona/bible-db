document_id: GEN.35,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Nandao an’i Sekema i Jakoba ka nankany Betela
  - type: text
    content: 'Ary hoy Andriamanitra tamin’i Jakoba: Miaingà, miakara any Betela ianao ka monena any; manorena alitara any ho an’Andriamanitra izay niseho taminao, fony ianao nandositra an’i Esao rahalahinao. '
  '10':
  - type: text
    content: 'Hoy Andriamanitra taminy: Jakoba no anaranao, nefa tsy hatao hoe Jakoba intsony ny anaranao fa hatao hoe Israely. Dia nataony hoe Israely ny anarany. '
  '11':
  - type: text
    content: 'Hoy ihany Andriamanitra taminy: Izaho no Andriamanitra Tsitoha. Maroa fara sy mihabetsaha. Hisy firenena lehibe sy firenena maro hiseho avy aminao ary hisy mpanjaka maro avy amin’ny haterakao. '
  '12':
  - type: text
    content: Ny tany izay nomeko an’i Abrahama sy Isaka dia homeko anao ary ny taranakao mandimby anao koa no homeko ny tany.
  '13':
  - type: text
    content: 'Ary Andriamanitra niakatra niala taminy, teo amin’ilay toerana niresahany taminy. '
  '14':
  - type: text
    content: 'Ary nanorina tsangambato teo amin’io toerana izay niresahany Taminy io i Jakoba ka nandraraka fanatitra aidina teo aminy sady nandraraka diloilo teo aminy koa. '
  '15':
  - type: text
    content: Ary ny anaran’ny tany izay niresahan’Andriamanitra taminy dia nataon’i Jakoba hoe Betela.
  - type: heading
    content: Ny nahaterahan’i Benjamina sy ny nahafatesan’i Rahely
  '16':
  - type: text
    content: 'Dia nifindra niala tany Betela izy. Nony efa kely foana sisa tsy nahatongavany tao Efrata dia nihetsi-jaza Rahely ary saro-piterahana. '
  '17':
  - type: text
    content: 'Rehefa narary am-piterahana toy izany izy dia hoy ny mpampivelona taminy: Aza matahotra ianao fa zazalahy ho anao koa ity! '
  '18':
  - type: text
    content: Rehefa niala aina Rahely satria ho faty izy dia nataony hoe Beny-Onỳ
  - type: note
    content: 'Beny-Onỳ: Zanaky ny fahoriako.'
  - type: text
    content: ' ny anaran’ny zaza; fa ny rainy kosa dia niantso azy hoe Benjamina'
  - type: note
    content: 'Benjamina: Zanaky ny tanana havanana.'
  - type: text
    content: '. '
  '19':
  - type: text
    content: 'Dia maty Rahely ka nalevina teo amin’ny lalana mankany Efrata na Betlehema. '
  '2':
  - type: text
    content: 'Dia hoy i Jakoba tamin’izay tao an-tranony mbamin’ireo rehetra niaraka taminy: Ario ireo andriamanitra izay ao aminareo dia midiova ary soloy ny fitafianareo. '
  '20':
  - type: text
    content: Ary nanorina tsangambato teo ambonin’ny fasany i Jakoba, dia ilay tsangambato izay mbola ao amin’ny fasan’i Rahely mandraka androany.
  '21':
  - type: text
    content: 'Dia lasa nifindra Israely ka nanorina ny tranolainy tany ankoatra an’i Migdala-Edera. '
  '22':
  - type: text
    content: Rehefa nonina teo amin’izany tany izany Israely dia avy i Robena ka nandry tamin’i Bila, vady tsindranon’ny rainy; ary ren’Israely izany.
  - type: heading
    content: 1Tan 2.1-2
  '23':
  - type: text
    content: 'Roa amby folo mirahalahy ny zanakalahin’i Jakoba. Ny zanak’i Lea dia i Robena, lahimatoan’i Jakoba, i Simeona, i Levy, i Joda, Isakara ary i Zebolona; '
  '24':
  - type: text
    content: 'ny zanak’i Rahely kosa dia i Josefa sy i Benjamina; '
  '25':
  - type: text
    content: 'ny zanak’i Bila, mpanompovavin’i Rahely dia i Dana sy i Naftaly; '
  '26':
  - type: text
    content: ny zanak’i Zilpa, mpanompovavin’i Lea kosa dia i Gada sy i Asera. Ireo no zanakalahin’i Jakoba izay naterany tany Padana-Arama.
  '27':
  - type: text
    content: 'Ary i Jakoba dia nankany amin’Isaka rainy tany Mamre, any Kiriata-Arba na Hebrona, izay nivahinian’i Abrahama sy Isaka. '
  '28':
  - type: text
    content: 'Valopolo amby zato taona ny andro niainan’Isaka. '
  '29':
  - type: text
    content: Dia niala aina Isaka ka maty, ary nangonina any amin’ny razany izy rehefa tratra antitra sady ela niainana; dia nandevina azy i Esao sy i Jakoba zanany lahy.
  '3':
  - type: text
    content: 'Andeha isika hiainga ka hiakatra any Betela; hanao alitara any aho ho an’Andriamanitra izay namaly ny vavaka nataoko tamin’ny andron’ny fahoriako sy nomba ahy tamin’ny lalana izay nalehako. '
  '4':
  - type: text
    content: 'Dia natolony an’i Jakoba ireo andriamanitra hafa rehetra izay notanany sy ny kavina izay teny an-tsofiny ka nalevin’i Jakoba teo am-pototry ny hazo '
  - type: text
    content: terebinta
  - type: text
    content: ' izay tao akaikin’i Sekema. '
  '5':
  - type: text
    content: Dia niainga ireo. Ary nisy tahotra avy amin’Andriamanitra nahazo ny tanàna manodidina azy ka tsy nisy nanenjika ny zanak’i Jakoba.
  '6':
  - type: text
    content: 'Ary tonga tany Lozy na Betela, izay any amin’ny tany Kanana, i Jakoba, dia izy sy ny olona rehetra izay nomba azy. '
  '7':
  - type: text
    content: Nanorina alitara teo izy ka nataony hoe El-Betela
  - type: note
    content: 'El-Betela: Andriamanitr’i Betela.'
  - type: text
    content: ' no anaran’izany toerana izany satria teo no nisehoan’Andriamanitra taminy fony izy nandositra ny rahalahiny. '
  '8':
  - type: text
    content: Ary maty i Debora, mpitaiza an’i Rebeka, dia naleviny tao akaikin’i Betela, teo ambanin’ny hazo oaka iray; nataony hoe Alona-Bakota
  - type: note
    content: 'Alona-Bakota: Hazo oaka fitomaniana.'
  - type: text
    content: ' ny anaran’io.'
  '9':
  - type: text
    content: Ary Andriamanitra niseho indray tamin’i Jakoba rehefa tonga avy tany Padana-Arama izy ka nitahy azy.
