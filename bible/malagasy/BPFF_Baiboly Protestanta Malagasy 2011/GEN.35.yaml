document_id: GEN.35
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nandao an’i Sekema i Jakoba ka nankany Betela
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary hoy Andriamanitra tamin’i Jakoba: Miaingà, miakara any Betela ianao ka monena any; manorena alitara any ho an’Andriamanitra izay niseho taminao, fony ianao nandositra an’i Esao rahalahinao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Dia hoy i Jakoba tamin’izay tao an-tranony mbamin’ireo rehetra niaraka taminy: Ario ireo andriamanitra izay ao aminareo dia midiova ary soloy ny fitafianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Andeha isika hiainga ka hiakatra any Betela; hanao alitara any aho ho an’Andriamanitra izay namaly ny vavaka nataoko tamin’ny andron’ny fahoriako sy nomba ahy tamin’ny lalana izay nalehako. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dia natolony an’i Jakoba ireo andriamanitra hafa rehetra izay notanany sy ny kavina izay teny an-tsofiny ka nalevin’i Jakoba teo am-pototry ny hazo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: terebinta
  - type: text
    text: ' izay tao akaikin’i Sekema. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Dia niainga ireo. Ary nisy tahotra avy amin’Andriamanitra nahazo ny tanàna manodidina azy ka tsy nisy nanenjika ny zanak’i Jakoba.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary tonga tany Lozy na Betela, izay any amin’ny tany Kanana, i Jakoba, dia izy sy ny olona rehetra izay nomba azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Nanorina alitara teo izy ka nataony hoe El-Betela
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '35.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'El-Betela: Andriamanitr’i Betela.'
    marker-yv: yv-n
  - type: text
    text: ' no anaran’izany toerana izany satria teo no nisehoan’Andriamanitra taminy fony izy nandositra ny rahalahiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ary maty i Debora, mpitaiza an’i Rebeka, dia naleviny tao akaikin’i Betela, teo ambanin’ny hazo oaka iray; nataony hoe Alona-Bakota
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '35.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Alona-Bakota: Hazo oaka fitomaniana.'
    marker-yv: yv-n
  - type: text
    text: ' ny anaran’io.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ary Andriamanitra niseho indray tamin’i Jakoba rehefa tonga avy tany Padana-Arama izy ka nitahy azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Hoy Andriamanitra taminy: Jakoba no anaranao, nefa tsy hatao hoe Jakoba intsony ny anaranao fa hatao hoe Israely. Dia nataony hoe Israely ny anarany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Hoy ihany Andriamanitra taminy: Izaho no Andriamanitra Tsitoha. Maroa fara sy mihabetsaha. Hisy firenena lehibe sy firenena maro hiseho avy aminao ary hisy mpanjaka maro avy amin’ny haterakao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ny tany izay nomeko an’i Abrahama sy Isaka dia homeko anao ary ny taranakao mandimby anao koa no homeko ny tany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary Andriamanitra niakatra niala taminy, teo amin’ilay toerana niresahany taminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary nanorina tsangambato teo amin’io toerana izay niresahany Taminy io i Jakoba ka nandraraka fanatitra aidina teo aminy sady nandraraka diloilo teo aminy koa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ary ny anaran’ny tany izay niresahan’Andriamanitra taminy dia nataon’i Jakoba hoe Betela.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nahaterahan’i Benjamina sy ny nahafatesan’i Rahely
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Dia nifindra niala tany Betela izy. Nony efa kely foana sisa tsy nahatongavany tao Efrata dia nihetsi-jaza Rahely ary saro-piterahana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Rehefa narary am-piterahana toy izany izy dia hoy ny mpampivelona taminy: Aza matahotra ianao fa zazalahy ho anao koa ity! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Rehefa niala aina Rahely satria ho faty izy dia nataony hoe Beny-Onỳ
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '35.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Beny-Onỳ: Zanaky ny fahoriako.'
    marker-yv: yv-n
  - type: text
    text: ' ny anaran’ny zaza; fa ny rainy kosa dia niantso azy hoe Benjamina'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '35.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Benjamina: Zanaky ny tanana havanana.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Dia maty Rahely ka nalevina teo amin’ny lalana mankany Efrata na Betlehema. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ary nanorina tsangambato teo ambonin’ny fasany i Jakoba, dia ilay tsangambato izay mbola ao amin’ny fasan’i Rahely mandraka androany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Dia lasa nifindra Israely ka nanorina ny tranolainy tany ankoatra an’i Migdala-Edera. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Rehefa nonina teo amin’izany tany izany Israely dia avy i Robena ka nandry tamin’i Bila, vady tsindranon’ny rainy; ary ren’Israely izany.
- type: usfm
  marker: r
  children:
  - type: text
    text: 1Tan 2.1-2
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Roa amby folo mirahalahy ny zanakalahin’i Jakoba. Ny zanak’i Lea dia i Robena, lahimatoan’i Jakoba, i Simeona, i Levy, i Joda, Isakara ary i Zebolona; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'ny zanak’i Rahely kosa dia i Josefa sy i Benjamina; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'ny zanak’i Bila, mpanompovavin’i Rahely dia i Dana sy i Naftaly; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ny zanak’i Zilpa, mpanompovavin’i Lea kosa dia i Gada sy i Asera. Ireo no zanakalahin’i Jakoba izay naterany tany Padana-Arama.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ary i Jakoba dia nankany amin’Isaka rainy tany Mamre, any Kiriata-Arba na Hebrona, izay nivahinian’i Abrahama sy Isaka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Valopolo amby zato taona ny andro niainan’Isaka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Dia niala aina Isaka ka maty, ary nangonina any amin’ny razany izy rehefa tratra antitra sady ela niainana; dia nandevina azy i Esao sy i Jakoba zanany lahy.
