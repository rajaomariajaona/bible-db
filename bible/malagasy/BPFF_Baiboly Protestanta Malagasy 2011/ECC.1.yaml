document_id: ECC.1,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny maha zava-poana ny zavatra rehetra
  - type: text
    content: Ny tenin’i Mpitoriteny, zanak’i Davida, mpanjaka tany Jerosalema.
  '10':
  - type: text
    content: 'Raha misy zavatra lazaina hoe: E! Ity no vaovao,'
  - type: text
    content: dia ilay efa teo ela tany amin’ny andro talohantsika ihany izany.
  '11':
  - type: text
    content: Tsy tsaroana ny taloha
  - type: text
    content: ary ny ho avy koa dia tsy ho tsaroan’ny taranaka manaraka.
  - type: heading
    content: Ny traikefan’ny hendry
  '12':
  - type: text
    content: 'Izaho Mpitoriteny dia mpanjakan’ny Israely tany Jerosalema. '
  '13':
  - type: text
    content: Tamin’ny foko manontolo no nitadiavako sy nikatsahako tamim-pahendrena ny zavatra rehetra izay atao atỳ ambanin’ny lanitra; asa mavesatra nomen’Andriamanitra hisasaran’ny zanak’olombelona izany.
  '14':
  - type: text
    content: Efa hitako ny zavatra rehetra izay atao etỳ ambanin’ny masoandro, fa indro, zava-poana sy sambo-drivotra avokoa izany rehetra izany.
  '15':
  - type: text
    content: Ny meloka dia tsy mety ho tonga mahitsy
  - type: text
    content: ary ny tsy ao dia tsy mba azo isaina.
  '16':
  - type: text
    content: 'Hoy aho anakampo: Indro, nanangona fahendrena be dia be mihoatra noho izay rehetra talohako teto Jerosalema aho; eny, nahita fahendrena sy fahalalana betsaka aho.'
  '17':
  - type: text
    content: Niasa saina aho mba hahalala ny fahendrena sy hamantatra ny fahadalana; dia fantatro fa sambo-drivotra foana koa izany
  '18':
  - type: text
    content: satria izay be fahendrena dia be fahasahiranan-tsaina
  - type: text
    content: ary izay mitombo fahalalana dia mitombo fanaintainana.
  '2':
  - type: text
    content: Tena zava-poana, hoy i Mpitoriteny, tena zava-poana,
  - type: text
    content: eny, zava-poana ny zavatra rehetra!
  '3':
  - type: text
    content: Inona moa no soa azon’ny olona amin’ny fisasarany rehetra izay isasarany etỳ ambanin’ny masoandro?
  '4':
  - type: text
    content: Lasa ny taranaka iray ary mandimby kosa ny taranaka hafa;
  - type: text
    content: nefa ny tany dia mbola maharitra eo ihany.
  '5':
  - type: text
    content: Miposaka ny masoandro ary milentika ny masoandro
  - type: text
    content: sady miriotra ho any amin’ny toerana izay niposahany.
  '6':
  - type: text
    content: Mianatsimo ny rivotra dia mihodina mianavaratra,
  - type: text
    content: mivezivezy mandrakariva izy
  - type: text
    content: ka miverimberina mihodidina foana.
  '7':
  - type: text
    content: Ny renirano rehetra dia samy mankany amin’ny ranomasina nefa tsy mety feno ny ranomasina;
  - type: text
    content: any amin’izay falehan’ny renirano ihany no iverenany indray.
  '8':
  - type: text
    content: Manasatra ny zavatra rehetra ka tsy misy olona mahalaza izany intsony;
  - type: text
    content: ny maso dia tsy afa-po mijery,
  - type: text
    content: ary ny sofina dia tsy afa-po mihaino.
  '9':
  - type: text
    content: Izay efa teo ihany no ho tonga indray
  - type: text
    content: ary izay efa natao ihany no mbola haverina indray;
  - type: text
    content: tsy misy zava-baovao etỳ ambanin’ny masoandro.
