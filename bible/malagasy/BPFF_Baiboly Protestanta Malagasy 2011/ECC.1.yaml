document_id: ECC.1
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny maha zava-poana ny zavatra rehetra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ny tenin’i Mpitoriteny, zanak’i Davida, mpanjaka tany Jerosalema.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Tena zava-poana, hoy i Mpitoriteny, tena zava-poana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, zava-poana ny zavatra rehetra!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Inona moa no soa azon’ny olona amin’ny fisasarany rehetra izay isasarany etỳ ambanin’ny masoandro?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Lasa ny taranaka iray ary mandimby kosa ny taranaka hafa;
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa ny tany dia mbola maharitra eo ihany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Miposaka ny masoandro ary milentika ny masoandro
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady miriotra ho any amin’ny toerana izay niposahany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Mianatsimo ny rivotra dia mihodina mianavaratra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mivezivezy mandrakariva izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka miverimberina mihodidina foana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ny renirano rehetra dia samy mankany amin’ny ranomasina nefa tsy mety feno ny ranomasina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: any amin’izay falehan’ny renirano ihany no iverenany indray.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Manasatra ny zavatra rehetra ka tsy misy olona mahalaza izany intsony;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny maso dia tsy afa-po mijery,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny sofina dia tsy afa-po mihaino.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Izay efa teo ihany no ho tonga indray
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary izay efa natao ihany no mbola haverina indray;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy misy zava-baovao etỳ ambanin’ny masoandro.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Raha misy zavatra lazaina hoe: E! Ity no vaovao,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ilay efa teo ela tany amin’ny andro talohantsika ihany izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Tsy tsaroana ny taloha
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny ho avy koa dia tsy ho tsaroan’ny taranaka manaraka.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny traikefan’ny hendry
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Izaho Mpitoriteny dia mpanjakan’ny Israely tany Jerosalema. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Tamin’ny foko manontolo no nitadiavako sy nikatsahako tamim-pahendrena ny zavatra rehetra izay atao atỳ ambanin’ny lanitra; asa mavesatra nomen’Andriamanitra hisasaran’ny zanak’olombelona izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Efa hitako ny zavatra rehetra izay atao etỳ ambanin’ny masoandro, fa indro, zava-poana sy sambo-drivotra avokoa izany rehetra izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ny meloka dia tsy mety ho tonga mahitsy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny tsy ao dia tsy mba azo isaina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Hoy aho anakampo: Indro, nanangona fahendrena be dia be mihoatra noho izay rehetra talohako teto Jerosalema aho; eny, nahita fahendrena sy fahalalana betsaka aho.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Niasa saina aho mba hahalala ny fahendrena sy hamantatra ny fahadalana; dia fantatro fa sambo-drivotra foana koa izany
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: satria izay be fahendrena dia be fahasahiranan-tsaina
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary izay mitombo fahalalana dia mitombo fanaintainana.
