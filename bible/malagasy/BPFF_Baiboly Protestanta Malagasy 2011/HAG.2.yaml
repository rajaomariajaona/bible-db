document_id: HAG.2,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny voninahitry ny tempoly vaovao
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin’ny andro fahiraika amby roapolo tamin’ny volana fahafito no nahatongavan’ny tenin’NY TOMPO noentin’i Hagay mpaminany hoe:'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin’ny andro fahefatra amby roapolo tamin’ny volana fahasivy tamin’ny taona faharoa nanjakan’i Dariosy no nahatongavan’ny tenin’NY TOMPO izay noentin’i Hagay mpaminany hoe:'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao no lazain’Andriamanitra, Tompon’izao rehetra izao: Miangavy anao Aho, andeha maka hevitra amin’ny mpisorona hoe: '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha misy mitondra hena masina eny an-tsisin-dambany ka voakasiky ny sisin-dambany ny mofo, na izay nahandroina na ny divay na ny diloilo na izay mety ho fihinana, moa ho tonga masina koa va ireo? Dia namaly ny mpisorona hoe: Tsia! '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy i Hagay: Raha misy maloto amim-paty mikasika ireo, moa ho tonga maloto koa va ireo? Dia namaly ny mpisorona hoe: Ho tonga maloto ireo. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy i Hagay:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tahaka izany ireto olona ireto
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tahaka izany ity firenena ity eo anatrehako,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy NY TOMPO.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tahaka izany koa ny asan’ny tanany rehetra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa izay ateriny ao dia maloto.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Manomboka anio
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Koa miangavy anareo aho, hevero
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny amin’izay hiseho hatramin’izao andro anio izao no ho mankarỳ.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fony tsy mbola nisy vato voarafitra tao amin’ny tempolin’NY TOMPO,
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tamin’izany andro izany, raha nisy nankeo amin’ny antontam-bary tokony ho roapolo famarana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia folo ihany no tao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: raha nisy nankeo amin’ny vata fanantazana ranom-boaloboka hananty indimampolon’ny famarana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia roapolo ihany no tao.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny vary main’ny hafanana sy maty fotsy ary ny havandra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no namelezako anareo tamin’ny asan’ny tananareo rehetra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa tsy niverina Tamiko ihany ianareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy NY TOMPO.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miangavy anareo aho, hevero izay hiseho hatramin’izao andro anio izao no ho mankarỳ,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hatramin’ny andro fahefatra amby roapolo amin’ny volana fahasivy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, hatramin’ny andro nanorenana ny tempolin’NY TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hevero izany!
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mbola misy voan-javatra ihany va ao an-tsompitra?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na dia ny voaloboka, ny aviavy, ny ampongabendanitra ary ny oliva aza dia tsy mbola nisy namoa.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hatramin’izao andro anio izao no hitahiako anareo.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny teny fikasana ho an’i Zerobabela
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lazao amin’i Zerobabela, zanak’i Sealtiela, governora any Joda, sy amin’i Josoa, zanak’i Jozadaka, '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Mpisoronabe
    - type: text
      text: ', ary amin’ny sisa amin’ny vahoaka hoe:'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tonga fanindroany tamin’i Hagay ny tenin’NY TOMPO, tamin’ny andro fahefatra amby roapolo hoe:'
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Lazao amin’i Zerobabela governora any Joda hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hampihorohoroiko ny lanitra sy ny tany;
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: haongako ny sezafiandrianan’ny fanjakana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hofoanako ny herin’ny fanjakan’ny firenena;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: haongako ny kalesy fitondra miady sy izay mitaingina eo aminy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary samy ho lavon’ny sabatry ny namany avy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny soavaly sy ny mpitaingina azy.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Amin’izany andro izany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy Andriamanitra, Tompon’izao rehetra izao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia horaisiko ianao ry Zerobabela mpanompoko, zanak’i Sealtiela,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy NY TOMPO.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hataoko toy ny fitombo-kase ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria ianao no efa nofidiko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy Andriamanitra, Tompon’izao rehetra izao.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Iza aminareo mbola velona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no nahita ity trano ity tamin’ny voninahiny taloha?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa manao ahoana kosa ny fahitanareo azy ankehitriny?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moa tsy toy ny tsinontsinona eo imasonareo va izy ity?
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nefa mahereza ankehitriny, ry Zerobabela!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hoy NY TOMPO.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mahereza, ry Josoa, zanak’i Jozadaka, Mpisoronabe!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mahereza, ianareo vahoaka rehetra!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hoy NY TOMPO.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miasà!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa Izaho no momba anareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy Andriamanitra, Tompon’izao rehetra izao,
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: araka ny tenin’ny fanekena nataoko taminareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fony nivoaka avy tany Ejipta ianareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny Fanahiko dia mitoetra ao aminareo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: koa aza matahotra ianareo!
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Fa izao no lazain’Andriamanitra, Tompon’izao rehetra izao:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indray maka indray, raha afaka kelikely,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hampihorohoroiko ny lanitra sy ny tany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny ranomasina sy ny tany maina;
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hampihorohoroiko koa ny firenena rehetra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka ho avy izay zava-tsoan’ny firenena rehetra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hofenoiko voninahitra ity trano ity,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy Andriamanitra, Tompon’izao rehetra izao.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ahy ny volafotsy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary Ahy ny volamena,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy Andriamanitra, Tompon’izao rehetra izao.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny voninahitr’ity trano ity amin’ny ho avy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ho lehibe noho ny tany aloha,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy Andriamanitra, Tompon’izao rehetra izao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary eto amin’ity toerana ity no hanomezako fiadanana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy Andriamanitra, Tompon’izao rehetra izao.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny vahoaka voan’ny fahalotoana
    marker-yv: yv-h
