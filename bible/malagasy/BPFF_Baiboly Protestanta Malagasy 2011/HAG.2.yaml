document_id: HAG.2,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny voninahitry ny tempoly vaovao
  - type: text
    content: 'Tamin’ny andro fahiraika amby roapolo tamin’ny volana fahafito no nahatongavan’ny tenin’NY TOMPO noentin’i Hagay mpaminany hoe:'
  '10':
  - type: text
    content: 'Tamin’ny andro fahefatra amby roapolo tamin’ny volana fahasivy tamin’ny taona faharoa nanjakan’i Dariosy no nahatongavan’ny tenin’NY TOMPO izay noentin’i Hagay mpaminany hoe:'
  '11':
  - type: text
    content: 'Izao no lazain’Andriamanitra, Tompon’izao rehetra izao: Miangavy anao Aho, andeha maka hevitra amin’ny mpisorona hoe: '
  '12':
  - type: text
    content: 'Raha misy mitondra hena masina eny an-tsisin-dambany ka voakasiky ny sisin-dambany ny mofo, na izay nahandroina na ny divay na ny diloilo na izay mety ho fihinana, moa ho tonga masina koa va ireo? Dia namaly ny mpisorona hoe: Tsia! '
  '13':
  - type: text
    content: 'Ary hoy i Hagay: Raha misy maloto amim-paty mikasika ireo, moa ho tonga maloto koa va ireo? Dia namaly ny mpisorona hoe: Ho tonga maloto ireo. '
  '14':
  - type: text
    content: 'Dia hoy i Hagay:'
  - type: text
    content: Tahaka izany ireto olona ireto
  - type: text
    content: ary tahaka izany ity firenena ity eo anatrehako,
  - type: text
    content: hoy NY TOMPO.
  - type: text
    content: Tahaka izany koa ny asan’ny tanany rehetra,
  - type: text
    content: fa izay ateriny ao dia maloto.
  - type: heading
    content: Manomboka anio
  '15':
  - type: text
    content: Koa miangavy anareo aho, hevero
  - type: text
    content: ny amin’izay hiseho hatramin’izao andro anio izao no ho mankarỳ.
  - type: text
    content: Fony tsy mbola nisy vato voarafitra tao amin’ny tempolin’NY TOMPO,
  '16':
  - type: text
    content: tamin’izany andro izany, raha nisy nankeo amin’ny antontam-bary tokony ho roapolo famarana,
  - type: text
    content: dia folo ihany no tao;
  - type: text
    content: raha nisy nankeo amin’ny vata fanantazana ranom-boaloboka hananty indimampolon’ny famarana
  - type: text
    content: dia roapolo ihany no tao.
  '17':
  - type: text
    content: Ny vary main’ny hafanana sy maty fotsy ary ny havandra
  - type: text
    content: no namelezako anareo tamin’ny asan’ny tananareo rehetra;
  - type: text
    content: nefa tsy niverina Tamiko ihany ianareo,
  - type: text
    content: hoy NY TOMPO.
  '18':
  - type: text
    content: Miangavy anareo aho, hevero izay hiseho hatramin’izao andro anio izao no ho mankarỳ,
  - type: text
    content: hatramin’ny andro fahefatra amby roapolo amin’ny volana fahasivy;
  - type: text
    content: eny, hatramin’ny andro nanorenana ny tempolin’NY TOMPO,
  - type: text
    content: hevero izany!
  '19':
  - type: text
    content: Mbola misy voan-javatra ihany va ao an-tsompitra?
  - type: text
    content: Na dia ny voaloboka, ny aviavy, ny ampongabendanitra ary ny oliva aza dia tsy mbola nisy namoa.
  - type: text
    content: Hatramin’izao andro anio izao no hitahiako anareo.
  - type: heading
    content: Ny teny fikasana ho an’i Zerobabela
  '2':
  - type: text
    content: 'Lazao amin’i Zerobabela, zanak’i Sealtiela, governora any Joda, sy amin’i Josoa, zanak’i Jozadaka, '
  - type: text
    content: Mpisoronabe
  - type: text
    content: ', ary amin’ny sisa amin’ny vahoaka hoe:'
  '20':
  - type: text
    content: 'Tonga fanindroany tamin’i Hagay ny tenin’NY TOMPO, tamin’ny andro fahefatra amby roapolo hoe:'
  '21':
  - type: text
    content: 'Lazao amin’i Zerobabela governora any Joda hoe:'
  - type: text
    content: Hampihorohoroiko ny lanitra sy ny tany;
  '22':
  - type: text
    content: haongako ny sezafiandrianan’ny fanjakana,
  - type: text
    content: hofoanako ny herin’ny fanjakan’ny firenena;
  - type: text
    content: haongako ny kalesy fitondra miady sy izay mitaingina eo aminy;
  - type: text
    content: ary samy ho lavon’ny sabatry ny namany avy
  - type: text
    content: ny soavaly sy ny mpitaingina azy.
  '23':
  - type: text
    content: Amin’izany andro izany
  - type: text
    content: hoy Andriamanitra, Tompon’izao rehetra izao
  - type: text
    content: dia horaisiko ianao ry Zerobabela mpanompoko, zanak’i Sealtiela,
  - type: text
    content: hoy NY TOMPO.
  - type: text
    content: Hataoko toy ny fitombo-kase ianao
  - type: text
    content: satria ianao no efa nofidiko,
  - type: text
    content: hoy Andriamanitra, Tompon’izao rehetra izao.
  '3':
  - type: text
    content: Iza aminareo mbola velona
  - type: text
    content: no nahita ity trano ity tamin’ny voninahiny taloha?
  - type: text
    content: Fa manao ahoana kosa ny fahitanareo azy ankehitriny?
  - type: text
    content: Moa tsy toy ny tsinontsinona eo imasonareo va izy ity?
  '4':
  - type: text
    content: Nefa mahereza ankehitriny, ry Zerobabela!
  - type: text
    content: Hoy NY TOMPO.
  - type: text
    content: Mahereza, ry Josoa, zanak’i Jozadaka, Mpisoronabe!
  - type: text
    content: Mahereza, ianareo vahoaka rehetra!
  - type: text
    content: Hoy NY TOMPO.
  - type: text
    content: Miasà!
  - type: text
    content: Fa Izaho no momba anareo,
  - type: text
    content: hoy Andriamanitra, Tompon’izao rehetra izao,
  '5':
  - type: text
    content: araka ny tenin’ny fanekena nataoko taminareo,
  - type: text
    content: fony nivoaka avy tany Ejipta ianareo,
  - type: text
    content: ary ny Fanahiko dia mitoetra ao aminareo;
  - type: text
    content: koa aza matahotra ianareo!
  '6':
  - type: text
    content: 'Fa izao no lazain’Andriamanitra, Tompon’izao rehetra izao:'
  - type: text
    content: Indray maka indray, raha afaka kelikely,
  - type: text
    content: dia hampihorohoroiko ny lanitra sy ny tany
  - type: text
    content: ary ny ranomasina sy ny tany maina;
  '7':
  - type: text
    content: hampihorohoroiko koa ny firenena rehetra
  - type: text
    content: ka ho avy izay zava-tsoan’ny firenena rehetra;
  - type: text
    content: ary hofenoiko voninahitra ity trano ity,
  - type: text
    content: hoy Andriamanitra, Tompon’izao rehetra izao.
  '8':
  - type: text
    content: Ahy ny volafotsy
  - type: text
    content: ary Ahy ny volamena,
  - type: text
    content: hoy Andriamanitra, Tompon’izao rehetra izao.
  '9':
  - type: text
    content: Ny voninahitr’ity trano ity amin’ny ho avy
  - type: text
    content: dia ho lehibe noho ny tany aloha,
  - type: text
    content: hoy Andriamanitra, Tompon’izao rehetra izao;
  - type: text
    content: ary eto amin’ity toerana ity no hanomezako fiadanana,
  - type: text
    content: hoy Andriamanitra, Tompon’izao rehetra izao.
  - type: heading
    content: Ny vahoaka voan’ny fahalotoana
