document_id: PRO.29,3103
type_code: plt
verses:
  '1':
  - type: text
    content: Izay olona anarina matetika ka mihamafy hatoka
  - type: text
    content: dia ho torotoro tampoka ka tsy hisy fanafana.
  '10':
  - type: text
    content: Ny olona mpandatsa-dra dia mankahala ny tsy misy tsiny,
  - type: text
    content: fa miahy ny ainy kosa ny mahitsy.
  '11':
  - type: text
    content: Ny hatezeran’ny adala dia avoakany avokoa,
  - type: text
    content: fa manindry fo kosa ny hendry.
  '12':
  - type: text
    content: Raha mihaino lainga ny mpanapaka
  - type: text
    content: dia ho ratsy fanahy ny mpanompony rehetra.
  '13':
  - type: text
    content: Mihaona ny mahantra sy ny mpampahory;
  - type: text
    content: NY TOMPO no manazava ny mason’izy roa tonta.
  '14':
  - type: text
    content: Izay mpanjaka mitsara marina ny mahantra
  - type: text
    content: dia haharitra mandrakizay ny sezafiandrianany.
  '15':
  - type: text
    content: Ny tsorakazo sy ny anatra no manome fahendrena,
  - type: text
    content: fa ny zaza avela hanao izay tiany hatao dia mampahamenatra ny reniny.
  '16':
  - type: text
    content: Raha maro ny ratsy fanahy dia mitombo ny ota,
  - type: text
    content: fa ny marina ho faly mahita ny fahalavoany.
  '17':
  - type: text
    content: Anaro ny zanakao dia ho famelombelomana ny fonao izy,
  - type: text
    content: sady ho fifalian’ny fanahinao.
  '18':
  - type: text
    content: Raha tsy misy fahitana dia atondraka hanaram-po amin’izay tsy mety ny olona;
  - type: text
    content: fa raha mitandrina ny lalàna kosa izy dia sambatra!
  '19':
  - type: text
    content: Raha teny fotsiny ihany, tsy ampy hananarana ny mpanompo,
  - type: text
    content: fa na dia azony aza, tsy ankatoaviny.
  '2':
  - type: text
    content: Raha mihamaro ny marina dia faly ny vahoaka;
  - type: text
    content: fa raha ny ratsy fanahy no mitondra dia misento kosa izy.
  '20':
  - type: text
    content: Hitanao va ny olona faingam-bava?
  - type: text
    content: Ny adala aza misy antenaina kokoa noho izy.
  '21':
  - type: text
    content: Ny mpanompo izay nampihantaina hatry ny fahakeliny
  - type: text
    content: dia ho mpamingavinga any aoriana any.
  '22':
  - type: text
    content: Ny olona mora tezitra dia manetsika ady
  - type: text
    content: ary ny olona masiaka dia be fahadisoana.
  '23':
  - type: text
    content: Ny fiavonavonan’ny olona no hampietry azy,
  - type: text
    content: fa hahazo voninahitra kosa ny manetry tena.
  '24':
  - type: text
    content: Izay miray tetika amin’ny mpangalatra dia mankahala ny tenany;
  - type: text
    content: mandre ny fampianianana izy, nefa tsy mety milaza.
  '25':
  - type: text
    content: Mamandrika ny tahotra olona,
  - type: text
    content: fa izay matoky NY TOMPO no tsy hanana ahiahy.
  '26':
  - type: text
    content: Maro no mila sitraka amin’ny mpanapaka,
  - type: text
    content: fa avy amin’NY TOMPO ny rariny ho an’ny tsirairay.
  '27':
  - type: text
    content: Ny meloka dia fahavetavetana eo imason’ny marina;
  - type: text
    content: fa ny mahitsy lalana dia mba fahavetavetana kosa eo imason’ny ratsy fanahy.
  '3':
  - type: text
    content: Izay tia fahendrena no mahafaly ny rainy,
  - type: text
    content: fa izay misakaiza amin’ny vehivavy janga dia mandany harena.
  '4':
  - type: text
    content: Ny rariny no ampandrian’ny mpanjaka ny tany,
  - type: text
    content: fa izay fatra-pampandoa hetra no mandrava azy kosa.
  '5':
  - type: text
    content: Izay olona mandokadoka foana ny namany
  - type: text
    content: dia manao vela-pandrika ho an’ny tongony.
  '6':
  - type: text
    content: Misy fandrika amin’ny heloky ny olon-dratsy,
  - type: text
    content: fa ny marina dia mihoby sy mifaly.
  '7':
  - type: text
    content: Ny marina dia mihevitra ny adin’ny mahantra,
  - type: text
    content: fa ny ratsy fanahy tsy mahalala izany ho fahendrena.
  '8':
  - type: text
    content: Mampihotakotaka ny tanàna ny mpaniratsira,
  - type: text
    content: fa ny hendry dia mampitony kosa ny fahatezerana.
  '9':
  - type: text
    content: Raha ny hendry no miady amin’ny adala eo amin’ny fitsarana,
  - type: text
    content: na ho tezitra izy na hihomehy dia tsy hanam-pitsaharana.
