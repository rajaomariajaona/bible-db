document_id: ROM.12,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fiainana vaovao
  - type: text
    content: 'Koa amin’izany, mangataka aminareo aho, ry rahalahy, noho ny famindrampon’Andriamanitra, mba hatolotrareo ny tenanareo ho fanatitra velona, masina, ankasitrahan’Andriamanitra; fanompoam-pivavahana tsara hataonareo izany. '
  '10':
  - type: text
    content: 'Mifankatiava toy ny fifankatiavan’ny mpirahalahy; mitariha lalana amin’ny fifanomezam-boninahitra. '
  '11':
  - type: text
    content: 'Mazotoa fa aza malaina, ary aoka hafana fo amin’ny fanompoana ny Tompo. '
  '12':
  - type: text
    content: 'Mifalia amin’ny fanantenana. Miareta amin’ny fahoriana. Mahareta amin’ny fivavahana. '
  '13':
  - type: text
    content: Manampia ny olona masina araka izay ilainy. Mazotoa mampiantrano vahiny.
  '14':
  - type: text
    content: Misaora izay manenjika anareo; misaora fa aza manozona.
  '15':
  - type: text
    content: 'Miaraha mifaly amin’izay mifaly ary miaraha mitomany amin’izay mitomany. '
  '16':
  - type: text
    content: Miraisa saina. Aza mihevitra izay hiavonavonana fa aoka mba ho zatra ny fanetren-tena ianareo. Aza mihevitra ny tenanareo ho hendry.
  '17':
  - type: text
    content: 'Aza mamaly ratsy na amin’iza na amin’iza. Miezaha hanao izay mahamendrika eo imason’ny olona rehetra. '
  '18':
  - type: text
    content: 'Raha azo atao ka miankina aminareo dia ataovy izay hihavananareo amin’ny olona rehetra. '
  '19':
  - type: text
    content: 'Ry malala, aza mamaly ratsy fa omeo lalana ny fahatezerana; fa voasoratra hoe: «Ahy ny famaliana; Izaho no hamaly, hoy NY TOMPO» (Deo 32.35). '
  '2':
  - type: text
    content: Aza manaraka ny fanaon’izao tontolo izao; fa miovà amin’ny fanavaozana ny saina, mba hamantaranareo ny sitrapon’Andriamanitra, dia izay tsara sady ankasitrahana no tanteraka.
  '20':
  - type: text
    content: 'Fa raha noana ny fahavalonao dia omeo hanina izy; raha mangetaheta izy dia omeo hosotroiny; fa ny fanaovanao izany dia hanambatra vainafo ho eo an-dohany (Oha 5.21-22). '
  '21':
  - type: text
    content: Aza mety ho resin’ny ratsy ianao fa reseo amin’ny soa ny ratsy.
  '3':
  - type: text
    content: 'Fa noho ny fahasoavana nomena ahy dia milaza amin’ny olona rehetra izay eo aminareo aho mba tsy hiavonavon-kevitra ka hihevitra mihoatra noho izay tokony hoheverina; fa mihevera izay onony araka ny haben’ny finoana izay nozarain’Andriamanitra ho anareo avy. '
  '4':
  - type: text
    content: 'Fa toy ny ananantsika zavatra maro momba ny tenantsika izay tokana nefa tsy mitovy asa izy rehetra momba ny tena ireo, '
  '5':
  - type: text
    content: 'dia toy izany koa isika, na dia maro aza dia tena iray ihany ao amin’i '
  - type: text
    content: Kristy
  - type: text
    content: ', ary samy miara-momba ny tena isika rehetra. '
  '6':
  - type: text
    content: 'Fa samy manana fanomezam-pahasoavana samihafa isika, araka ny fahasoavana izay nomena antsika: Raha faminaniana dia aoka hatao araka ny ohatry ny finoana; '
  '7':
  - type: text
    content: 'raha fanompoana dia aoka ho amin’ny fanompoana; raha mampianatra dia aoka ho amin’ny fampianarana; '
  '8':
  - type: text
    content: raha mananatra dia aoka ho amin’ny fananarana; izay manome dia aoka ho amin’ny fahatsoram-po; izay mitarika dia aoka ho amin’ny fahazotoana; izay mamindra fo dia aoka ho amin’ny fifaliana.
  '9':
  - type: text
    content: 'Aoka ny fitiavana ho amin’ny tsy fihatsarambelatsihy. Mankahalà ny ratsy; mifikira amin’ny tsara. '
