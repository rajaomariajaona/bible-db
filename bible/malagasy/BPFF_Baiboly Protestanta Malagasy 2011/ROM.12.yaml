document_id: ROM.12
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fiainana vaovao
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Koa amin’izany, mangataka aminareo aho, ry rahalahy, noho ny famindrampon’Andriamanitra, mba hatolotrareo ny tenanareo ho fanatitra velona, masina, ankasitrahan’Andriamanitra; fanompoam-pivavahana tsara hataonareo izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Aza manaraka ny fanaon’izao tontolo izao; fa miovà amin’ny fanavaozana ny saina, mba hamantaranareo ny sitrapon’Andriamanitra, dia izay tsara sady ankasitrahana no tanteraka.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Fa noho ny fahasoavana nomena ahy dia milaza amin’ny olona rehetra izay eo aminareo aho mba tsy hiavonavon-kevitra ka hihevitra mihoatra noho izay tokony hoheverina; fa mihevera izay onony araka ny haben’ny finoana izay nozarain’Andriamanitra ho anareo avy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Fa toy ny ananantsika zavatra maro momba ny tenantsika izay tokana nefa tsy mitovy asa izy rehetra momba ny tena ireo, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'dia toy izany koa isika, na dia maro aza dia tena iray ihany ao amin’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ', ary samy miara-momba ny tena isika rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Fa samy manana fanomezam-pahasoavana samihafa isika, araka ny fahasoavana izay nomena antsika: Raha faminaniana dia aoka hatao araka ny ohatry ny finoana; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'raha fanompoana dia aoka ho amin’ny fanompoana; raha mampianatra dia aoka ho amin’ny fampianarana; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: raha mananatra dia aoka ho amin’ny fananarana; izay manome dia aoka ho amin’ny fahatsoram-po; izay mitarika dia aoka ho amin’ny fahazotoana; izay mamindra fo dia aoka ho amin’ny fifaliana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Aoka ny fitiavana ho amin’ny tsy fihatsarambelatsihy. Mankahalà ny ratsy; mifikira amin’ny tsara. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Mifankatiava toy ny fifankatiavan’ny mpirahalahy; mitariha lalana amin’ny fifanomezam-boninahitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Mazotoa fa aza malaina, ary aoka hafana fo amin’ny fanompoana ny Tompo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Mifalia amin’ny fanantenana. Miareta amin’ny fahoriana. Mahareta amin’ny fivavahana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Manampia ny olona masina araka izay ilainy. Mazotoa mampiantrano vahiny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Misaora izay manenjika anareo; misaora fa aza manozona.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Miaraha mifaly amin’izay mifaly ary miaraha mitomany amin’izay mitomany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Miraisa saina. Aza mihevitra izay hiavonavonana fa aoka mba ho zatra ny fanetren-tena ianareo. Aza mihevitra ny tenanareo ho hendry.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Aza mamaly ratsy na amin’iza na amin’iza. Miezaha hanao izay mahamendrika eo imason’ny olona rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Raha azo atao ka miankina aminareo dia ataovy izay hihavananareo amin’ny olona rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ry malala, aza mamaly ratsy fa omeo lalana ny fahatezerana; fa voasoratra hoe: «Ahy ny famaliana; Izaho no hamaly, hoy NY TOMPO» (Deo 32.35). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Fa raha noana ny fahavalonao dia omeo hanina izy; raha mangetaheta izy dia omeo hosotroiny; fa ny fanaovanao izany dia hanambatra vainafo ho eo an-dohany (Oha 5.21-22). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Aza mety ho resin’ny ratsy ianao fa reseo amin’ny soa ny ratsy.
