  - type: heading
    content: samek ס
  '15':
  - type: text
    content: 'Ny olona dia niantsoantso azy hoe: Mialà ianareo fa maloto!'
  - type: text
    content: Mialà! Mialà! Aza mikasika anay!
  - type: text
    content: 'Raha nandositra sy niraparapa izy dia hoy ny olona tany amin’ny hafa firenena:'
