document_id: LUK.19,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Nivahiny tao an-tranon’i Zakaiosy Jesosy
  - type: text
    content: 'Rehefa tafiditra tao Jeriko Jesosy dia nandeha namakivaky ny tanàna. '
  '10':
  - type: text
    content: 'Fa efa tonga ny '
  - type: text
    content: Zanak’Olona
  - type: text
    content: ' hitady sy hamonjy ny very.'
  - type: heading
    content: Fanoharana ny amin’ny mina folo
  - type: heading
    content: Mat 25.14-30
  '11':
  - type: text
    content: 'Raha mbola nihaino izany ny olona dia nandroso niteny ihany Jesosy ka nilaza fanoharana, satria efa akaiky an’i Jerosalema Izy ka noheverin’ny olona fa hiseho haingana ny fanjakan’Andriamanitra. '
  '12':
  - type: text
    content: 'Dia hoy Izy: Nisy olona ambony iray nandeha nankany an-tany lavitra mba handray fahefana hanjaka, dia mbola hiverina. '
  '13':
  - type: text
    content: 'Dia niantso folo lahy tamin’ny mpanompony izy ary nanome azy mina folo ka niteny taminy hoe: Manaova varotra mandra-piaviko. '
  '14':
  - type: text
    content: 'Fa nankahala azy ny vahoakany, dia nampitondra teny nanaraka azy nilaza hoe: Tsy manaiky hanjakan’iny lehilahy iny izahay. '
  '15':
  - type: text
    content: 'Nony tafaverina avy nandray fahefana hanjaka izy dia nasainy nantsoina hankeo aminy ireo mpanompo izay nomeny izany vola izany mba hahafantarany izay tombony azony. '
  '16':
  - type: text
    content: 'Dia tonga ny voalohany ka niteny hoe: Tompoko, ny mina iray taminao dia efa nahazoana tombony mina folo. '
  '17':
  - type: text
    content: 'Dia hoy izy taminy: Tsara izany, ry mpanompo tsara; satria nahatoky tamin’ny kely indrindra ianao dia manàna fahefana amin’ny tanàna folo. '
  '18':
  - type: text
    content: 'Tonga koa ny iray ka nilaza hoe: Tompoko, ny mina iray taminao dia efa tonga mina dimy. '
  '19':
  - type: text
    content: 'Ary hoy koa izy tamin’io: Mifeheza tanàna dimy koa ianao. '
  '2':
  - type: text
    content: 'Ary indro, nisy lehilahy iray antsoina hoe Zakaiosy izay lehiben’ny mpamory hetra sady mpanankarena. '
  '20':
  - type: text
    content: 'Fa tonga kosa ny iray ka niteny hoe: Tompoko, inty ny mina taminao, izay notahiriziko voafono tapa-damba. '
  '21':
  - type: text
    content: 'Fa natahotra anao aho satria olona mila voa tsy ary ianao ka maka izay tsy napetrakao ary mijinja izay tsy nafafinao. '
  '22':
  - type: text
    content: 'Ary hoy ny tompony taminy: Ny vavanao no hitsarako anao, ry mpanompo ratsy fanahy. Fantatrao fa izaho dia olona mila voa tsy ary ka maka izay tsy napetrako ary mijinja izay tsy nafafiko; '
  '23':
  - type: text
    content: 'koa nahoana no tsy napetrakao tamin’ny mpampanjanaka vola ny volako, koa rehefa tonga aho dia ho nandray ny ahy miaraka amin’ny zanany? '
  '24':
  - type: text
    content: 'Ary hoy izy tamin’ireo izay nitsangana teo anilany: Alaivo ny mina eny aminy ka omeo ilay manana mina folo. '
  '25':
  - type: text
    content: 'Fa hoy ireo taminy: Tompoko, efa manana mina folo izy. '
  '26':
  - type: text
    content: 'Lazaiko aminareo: Izay rehetra manana dia homena; fa ny amin’izay tsy manana kosa, na dia izay ananany aza, dia halaina aminy. '
  '27':
  - type: text
    content: Fa ireo fahavaloko tsy nanaiky hanjakako ireo dia ento atỳ ka vonoy eto anatrehako.
  - type: heading
    content: Ny niakaran’i Jesosy tany Jerosalema
  - type: heading
    content: Mat 21.1-9; Mar 11.1-10; Jao 12.12-16
  '28':
  - type: text
    content: Rehefa niteny izany Izy dia nandeha nialoha hiakatra ho any Jerosalema.
  '29':
  - type: text
    content: 'Raha nanakaiky an’i Betifaga sy Betania teo an-tendrombohitra atao hoe Oliva Izy dia naniraka roa lahy tamin’ny mpianatra '
  '3':
  - type: text
    content: 'Nitady hahita izy hoe iza moa Jesosy, kanefa tsy afaka noho ny vahoaka satria fohy izy. '
  '30':
  - type: text
    content: 'ka niteny hoe: Mankanesa amin’iroa vohitra tandrifinareo iroa; ary raha vao miditra ao ianareo dia hisy zana-boriky mifatotra ho hitanareo, izay tsy mbola nitaingenan’olona; vahao izy ka ento atỳ. '
  '31':
  - type: text
    content: 'Raha misy manontany anareo hoe: Nahoana no vahànareo io? Dia izao no holazainareo: Misy raharaha ilàn’ny Tompo azy.'
  '32':
  - type: text
    content: 'Nony nandeha ireo nirahina dia nahita araka izay nolazainy taminy. '
  '33':
  - type: text
    content: 'Rehefa namaha ny zana-boriky izy dia hoy ireo tompony taminy: Nahoana no vahànareo ny zana-boriky? '
  '34':
  - type: text
    content: 'Dia hoy ireo: Misy ilàn’ny Tompo azy. '
  '35':
  - type: text
    content: 'Dia nitondra azy ho any amin’i Jesosy izy ireo ary nametraka ny lambany teo ambonin’ny zana-boriky ka nampitaingeniny azy Jesosy. '
  '36':
  - type: text
    content: Ary raha nandroso Jesosy dia namelatra ny lambany teny an-dalana izy ireo.
  '37':
  - type: text
    content: 'Rehefa nanakaiky Izy ka tonga teo am-pidinana amin’ny tendrombohitra Oliva dia faly avokoa ny mpianatra marobe ka nidera an’Andriamanitra tamin’ny feo mahery noho ny asa lehibe rehetra izay efa hitany '
  '38':
  - type: text
    content: 'ka niteny hoe:'
  - type: text
    content: Isaorana anie ny Mpanjaka,
  - type: text
    content: Ilay avy amin’ny anaran’NY TOMPO.
  - type: text
    content: Fiadanana any an-danitra
  - type: text
    content: ary voninahitra any amin’ny avo indrindra!
  '39':
  - type: text
    content: 'Fa ny '
  - type: text
    content: Fariseo
  - type: text
    content: ' sasany, izay teo amin’ny vahoaka, dia niteny Taminy hoe: Mpampianatra ô, rarao ny mpianatrao! '
  '4':
  - type: text
    content: 'Dia nihazakazaka nialoha izy ka nananika tamin’ny aviavy iray mba hahatazanany an’i Jesosy; fa efa handalo tamin’izany lalana izany Izy. '
  '40':
  - type: text
    content: 'Fa Izy namaly hoe: Lazaiko aminareo fa raha mangina ireo dia ny vato no hiantsoantso.'
  - type: heading
    content: Mitomany an’i Jerosalema Jesosy
  '41':
  - type: text
    content: 'Raha nanakaiky Izy ka nahita ny tanàna dia nitomany azy '
  '42':
  - type: text
    content: 'ka niteny hoe: Raha mba nahafantatra mantsy ianao, na anio ihany aza, ny amin’izay momba ny fiadanana! Nefa ankehitriny, nafenina tamin’ny masonao izany. '
  '43':
  - type: text
    content: 'Fa ho avy aminao ny andro izay hananganan’ny fahavalonao tovon-tany manodidina anao, dia hihodidina aminao izy ka hanery anao avy amin’ny lafiny rehetra '
  '44':
  - type: text
    content: ary hamongotra anao sy ny zanakao ao aminao izy ka tsy havelany hisy vato mifanongoa eo aminao, ho valin’ny tsy nahafantaranao ny fotoana namangiana anao.
  - type: heading
    content: Ny nandroahan’i Jesosy ireo mpivarotra tao amin’ny tempoly
  - type: heading
    content: Mat 21.12-17; Mar 11.15-17; ampit. Jao 2.13-17
  '45':
  - type: text
    content: 'Ary niditra teo amin’ny tempoly Jesosy dia nandroaka izay nivarotra '
  '46':
  - type: text
    content: 'ka niteny taminy hoe: Voasoratra hoe:'
  - type: text
    content: «Ny tranoko dia trano fivavahana (Isa 56.7);
  - type: text
    content: fa ianareo kosa dia nampiasa azy ho zohy fieren’ny jiolahy» (Jer 7.11).
  '47':
  - type: text
    content: 'Ary nampianatra isanandro teo amin’ny tempoly Izy. Fa ireo lehiben’ny mpisorona sy ny mpanoradalàna ary ny loholona dia nitady hahafaty Azy; '
  '48':
  - type: text
    content: nefa tsy hitan’izy ireo izay hatao satria ny vahoaka rehetra dia liana nihaino Azy.
  '5':
  - type: text
    content: 'Rehefa tonga teo Jesosy dia niandrandra ka niteny taminy hoe: Ry Zakaiosy, midìna haingana; fa tsy maintsy mitoetra ao an-tranonao Aho anio. '
  '6':
  - type: text
    content: 'Dia nidina haingana izy ka nampiantrano Azy sady faly. '
  '7':
  - type: text
    content: 'Ary raha nahita izany ny rehetra dia nimonomonona ka niteny hoe: Lasa nandeha hiantrano amin’izay lehilahy mpanota Izy. '
  '8':
  - type: text
    content: 'Fa i Zakaiosy kosa dia nitsangana ka niteny tamin’ny Tompo hoe: Indro Tompoko, ny antsasaky ny fananako, omeko ho an’ny mahantra; ary raha misy zavatr’olona nalaiko tamin’ny fanambakana dia honerako avo efatra heny izany. '
  '9':
  - type: text
    content: 'Ary hoy Jesosy taminy: Anio no tonga eto amin’ity trano ity ny famonjena, fa izy dia zanak’i Abrahama koa. '
