document_id: LUK.19
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nivahiny tao an-tranon’i Zakaiosy Jesosy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Rehefa tafiditra tao Jeriko Jesosy dia nandeha namakivaky ny tanàna. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary indro, nisy lehilahy iray antsoina hoe Zakaiosy izay lehiben’ny mpamory hetra sady mpanankarena. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Nitady hahita izy hoe iza moa Jesosy, kanefa tsy afaka noho ny vahoaka satria fohy izy. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dia nihazakazaka nialoha izy ka nananika tamin’ny aviavy iray mba hahatazanany an’i Jesosy; fa efa handalo tamin’izany lalana izany Izy. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Rehefa tonga teo Jesosy dia niandrandra ka niteny taminy hoe: Ry Zakaiosy, midìna haingana; fa tsy maintsy mitoetra ao an-tranonao Aho anio. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia nidina haingana izy ka nampiantrano Azy sady faly. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary raha nahita izany ny rehetra dia nimonomonona ka niteny hoe: Lasa nandeha hiantrano amin’izay lehilahy mpanota Izy. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Fa i Zakaiosy kosa dia nitsangana ka niteny tamin’ny Tompo hoe: Indro Tompoko, ny antsasaky ny fananako, omeko ho an’ny mahantra; ary raha misy zavatr’olona nalaiko tamin’ny fanambakana dia honerako avo efatra heny izany. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary hoy Jesosy taminy: Anio no tonga eto amin’ity trano ity ny famonjena, fa izy dia zanak’i Abrahama koa. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Fa efa tonga ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Zanak’Olona
  - type: text
    text: ' hitady sy hamonjy ny very.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fanoharana ny amin’ny mina folo
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat 25.14-30
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Raha mbola nihaino izany ny olona dia nandroso niteny ihany Jesosy ka nilaza fanoharana, satria efa akaiky an’i Jerosalema Izy ka noheverin’ny olona fa hiseho haingana ny fanjakan’Andriamanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Dia hoy Izy: Nisy olona ambony iray nandeha nankany an-tany lavitra mba handray fahefana hanjaka, dia mbola hiverina. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dia niantso folo lahy tamin’ny mpanompony izy ary nanome azy mina folo ka niteny taminy hoe: Manaova varotra mandra-piaviko. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Fa nankahala azy ny vahoakany, dia nampitondra teny nanaraka azy nilaza hoe: Tsy manaiky hanjakan’iny lehilahy iny izahay. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Nony tafaverina avy nandray fahefana hanjaka izy dia nasainy nantsoina hankeo aminy ireo mpanompo izay nomeny izany vola izany mba hahafantarany izay tombony azony. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Dia tonga ny voalohany ka niteny hoe: Tompoko, ny mina iray taminao dia efa nahazoana tombony mina folo. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Dia hoy izy taminy: Tsara izany, ry mpanompo tsara; satria nahatoky tamin’ny kely indrindra ianao dia manàna fahefana amin’ny tanàna folo. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Tonga koa ny iray ka nilaza hoe: Tompoko, ny mina iray taminao dia efa tonga mina dimy. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary hoy koa izy tamin’io: Mifeheza tanàna dimy koa ianao. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Fa tonga kosa ny iray ka niteny hoe: Tompoko, inty ny mina taminao, izay notahiriziko voafono tapa-damba. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Fa natahotra anao aho satria olona mila voa tsy ary ianao ka maka izay tsy napetrakao ary mijinja izay tsy nafafinao. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary hoy ny tompony taminy: Ny vavanao no hitsarako anao, ry mpanompo ratsy fanahy. Fantatrao fa izaho dia olona mila voa tsy ary ka maka izay tsy napetrako ary mijinja izay tsy nafafiko; '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'koa nahoana no tsy napetrakao tamin’ny mpampanjanaka vola ny volako, koa rehefa tonga aho dia ho nandray ny ahy miaraka amin’ny zanany? '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary hoy izy tamin’ireo izay nitsangana teo anilany: Alaivo ny mina eny aminy ka omeo ilay manana mina folo. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Fa hoy ireo taminy: Tompoko, efa manana mina folo izy. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Lazaiko aminareo: Izay rehetra manana dia homena; fa ny amin’izay tsy manana kosa, na dia izay ananany aza, dia halaina aminy. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Fa ireo fahavaloko tsy nanaiky hanjakako ireo dia ento atỳ ka vonoy eto anatrehako.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny niakaran’i Jesosy tany Jerosalema
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat 21.1-9; Mar 11.1-10; Jao 12.12-16
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Rehefa niteny izany Izy dia nandeha nialoha hiakatra ho any Jerosalema.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Raha nanakaiky an’i Betifaga sy Betania teo an-tendrombohitra atao hoe Oliva Izy dia naniraka roa lahy tamin’ny mpianatra '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'ka niteny hoe: Mankanesa amin’iroa vohitra tandrifinareo iroa; ary raha vao miditra ao ianareo dia hisy zana-boriky mifatotra ho hitanareo, izay tsy mbola nitaingenan’olona; vahao izy ka ento atỳ. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Raha misy manontany anareo hoe: Nahoana no vahànareo io? Dia izao no holazainareo: Misy raharaha ilàn’ny Tompo azy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Nony nandeha ireo nirahina dia nahita araka izay nolazainy taminy. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Rehefa namaha ny zana-boriky izy dia hoy ireo tompony taminy: Nahoana no vahànareo ny zana-boriky? '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Dia hoy ireo: Misy ilàn’ny Tompo azy. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Dia nitondra azy ho any amin’i Jesosy izy ireo ary nametraka ny lambany teo ambonin’ny zana-boriky ka nampitaingeniny azy Jesosy. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Ary raha nandroso Jesosy dia namelatra ny lambany teny an-dalana izy ireo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Rehefa nanakaiky Izy ka tonga teo am-pidinana amin’ny tendrombohitra Oliva dia faly avokoa ny mpianatra marobe ka nidera an’Andriamanitra tamin’ny feo mahery noho ny asa lehibe rehetra izay efa hitany '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'ka niteny hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Isaorana anie ny Mpanjaka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ilay avy amin’ny anaran’NY TOMPO.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fiadanana any an-danitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary voninahitra any amin’ny avo indrindra!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Fa ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Fariseo
  - type: text
    text: ' sasany, izay teo amin’ny vahoaka, dia niteny Taminy hoe: Mpampianatra ô, rarao ny mpianatrao! '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Fa Izy namaly hoe: Lazaiko aminareo fa raha mangina ireo dia ny vato no hiantsoantso.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mitomany an’i Jerosalema Jesosy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Raha nanakaiky Izy ka nahita ny tanàna dia nitomany azy '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'ka niteny hoe: Raha mba nahafantatra mantsy ianao, na anio ihany aza, ny amin’izay momba ny fiadanana! Nefa ankehitriny, nafenina tamin’ny masonao izany. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Fa ho avy aminao ny andro izay hananganan’ny fahavalonao tovon-tany manodidina anao, dia hihodidina aminao izy ka hanery anao avy amin’ny lafiny rehetra '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: ary hamongotra anao sy ny zanakao ao aminao izy ka tsy havelany hisy vato mifanongoa eo aminao, ho valin’ny tsy nahafantaranao ny fotoana namangiana anao.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nandroahan’i Jesosy ireo mpivarotra tao amin’ny tempoly
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat 21.12-17; Mar 11.15-17; ampit. Jao 2.13-17
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Ary niditra teo amin’ny tempoly Jesosy dia nandroaka izay nivarotra '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'ka niteny taminy hoe: Voasoratra hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Ny tranoko dia trano fivavahana (Isa 56.7);
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ianareo kosa dia nampiasa azy ho zohy fieren’ny jiolahy» (Jer 7.11).
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Ary nampianatra isanandro teo amin’ny tempoly Izy. Fa ireo lehiben’ny mpisorona sy ny mpanoradalàna ary ny loholona dia nitady hahafaty Azy; '
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: nefa tsy hitan’izy ireo izay hatao satria ny vahoaka rehetra dia liana nihaino Azy.
