  - type: text
    text: 'Hoy NY TOMPO tamiko: Mandehana indray, tiava vehivavy izay tian’ny sakaizany nefa mijangajanga, dia tahaka ny fitiavan’NY TOMPO ny Zanak’Israely; nefa ireo kosa dia mitodika ho amin’izay andriamanitra hafa sady tia mofo voaloboka'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'mofo voaloboka: Mofo natolotra ho fanatitra tamin’ny sampy. '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Zahao '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jer 7.17, 18; 16-19.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Dia novidiko sekela volafotsy dimy amby folo sy varimbazaha iray homera sy tapany izy. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary hoy aho taminy: Andro maro no hijanonanao amiko; fa tsy mahazo mijangajanga na manambady olon-kafa ianao; ary izaho koa dia ho toy izany aminao.'
- type: usfm
  marker: p
