document_id: HOS.3,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fizahan-toetra
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy NY TOMPO tamiko: Mandehana indray, tiava vehivavy izay tian’ny sakaizany nefa mijangajanga, dia tahaka ny fitiavan’NY TOMPO ny Zanak’Israely; nefa ireo kosa dia mitodika ho amin’izay andriamanitra hafa sady tia mofo voaloboka'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'mofo voaloboka: Mofo natolotra ho fanatitra tamin’ny sampy. '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Zahao '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jer 7.17, 18; 16-19.
      marker-yv: yv-n
    - type: text
      text: '. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia novidiko sekela volafotsy dimy amby folo sy varimbazaha iray homera sy tapany izy. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy aho taminy: Andro maro no hijanonanao amiko; fa tsy mahazo mijangajanga na manambady olon-kafa ianao; ary izaho koa dia ho toy izany aminao.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa andro maro no hitoeran’ny Zanak’Israely tsy hanana mpanjaka, na mpanapaka na fanatitra na tsangambato na '
    - type: usfm
      marker: w
      children:
      - type: text
        text: efoda
    - type: text
      text: ' na '
    - type: usfm
      marker: w
      children:
      - type: text
        text: terafima
    - type: text
      text: '. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Rehefa afaka izany dia hiverina ny Zanak’Israely ka hitady NY TOMPO Andriamaniny sy i Davida mpanjakany; ary handeha amin-kovitra hanatona NY TOMPO sy ny fahasoavany izy amin’ny ho avy.
