document_id: HOS.3,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Fizahan-toetra
  - type: text
    content: 'Hoy NY TOMPO tamiko: Mandehana indray, tiava vehivavy izay tian’ny sakaizany nefa mijangajanga, dia tahaka ny fitiavan’NY TOMPO ny Zanak’Israely; nefa ireo kosa dia mitodika ho amin’izay andriamanitra hafa sady tia mofo voaloboka'
  - type: note
    content: 'mofo voaloboka: Mofo natolotra ho fanatitra tamin’ny sampy. Zahao Jer 7.17, 18; 16-19.'
  - type: text
    content: '. '
  '2':
  - type: text
    content: 'Dia novidiko sekela volafotsy dimy amby folo sy varimbazaha iray homera sy tapany izy. '
  '3':
  - type: text
    content: 'Ary hoy aho taminy: Andro maro no hijanonanao amiko; fa tsy mahazo mijangajanga na manambady olon-kafa ianao; ary izaho koa dia ho toy izany aminao.'
  '4':
  - type: text
    content: 'Fa andro maro no hitoeran’ny Zanak’Israely tsy hanana mpanjaka, na mpanapaka na fanatitra na tsangambato na '
  - type: text
    content: efoda
  - type: text
    content: ' na '
  - type: text
    content: terafima
  - type: text
    content: '. '
  '5':
  - type: text
    content: Rehefa afaka izany dia hiverina ny Zanak’Israely ka hitady NY TOMPO Andriamaniny sy i Davida mpanjakany; ary handeha amin-kovitra hanatona NY TOMPO sy ny fahasoavany izy amin’ny ho avy.
