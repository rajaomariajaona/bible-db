document_id: PSA.19
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny voninahitr’Andriamanitra eo amin’izao tontolo izao; ny lalànan’NY TOMPO
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: Ho an’ny mpiventy hira. Salamo nataon’i Davida.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ny lanitra dia mitory ny voninahitr’Andriamanitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny habakabaka dia manambara ny asan’ny tanany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ny andro dia samy miteny amin’ny andro mandimby azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny alina dia samy manolo-pahalalana amin’ny alina mandimby azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Tsy misy teny na fiteny miasa anefa
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady tsy re koa izay feony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Efa lasa ho any amin’ny tany rehetra ny kofehy fandrefesany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mihatra amin’ny faran’izao rehetra izao ny teniny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tany no nanaovany tranolay ho an’ny masoandro.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ny masoandro dia tahaka ny mpampaka-bady mivoaka avy ao amin’ny efitrano fatoriany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mifaly tahaka ny lehilahy matanjaka mihazakazaka amin’ny alehany izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Avy any amin’ny faravodilanitra no fiposahany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny alehany dia hatrany amin’ny farany koa;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy misy takona amin’ny hafanany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Tsy misy tsiny ny lalànan’NY TOMPO, mamelombelona ny fanahy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mahatoky ny teny vavolombelon’NY TOMPO, mahahendry ny tso-po.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Mahitsy ny fitsipiky NY TOMPO, mahafaly ny fo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: madio ny didin’NY TOMPO, mampahazava ny maso.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Madio ny fahatahorana NY TOMPO, maharitra mandrakizay;
- type: usfm
  marker: q1
  children:
  - type: text
    text: marina ny fitsipiky NY TOMPO, eny, mahitsy avokoa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Irina noho ny volamena ireny, eny, noho ny volamena tsy miharo betsaka aza;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mamy noho ny tantely, eny, noho ny tantely mitete avy amin’ny tohotra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ny mpanomponao dia hazavain’ireny
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary misy valiny lehibe ho an’izay mitandrina azy ireny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Raha ny fahadisoana tsy nahy, iza re no mahalala izany?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ataovy tsy manan-tsiny aho ny amin’izay ota tsy fantatro.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Arovy ny mpanomponao tsy ho azon’ny mpiavonavona;
- type: usfm
  marker: q1
  children:
  - type: text
    text: aoka tsy hanapaka ahy ireny!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ho marina aho ka tsy hanan-tsiny ny amin’izay fahadisoana lehibe.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Aoka ny tenin’ny vavako
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny fisainan’ny foko samy hankasitrahana eo imasonao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: TOMPO ô, Vatolampiko sy Mpanavotra ahy!
