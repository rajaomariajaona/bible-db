document_id: PSA.19,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny voninahitr’Andriamanitra eo amin’izao tontolo izao; ny lalànan’NY TOMPO
  - type: text
    content: Ho an’ny mpiventy hira. Salamo nataon’i Davida.
  - type: text
    content: Ny lanitra dia mitory ny voninahitr’Andriamanitra
  - type: text
    content: ary ny habakabaka dia manambara ny asan’ny tanany.
  '10':
  - type: text
    content: Irina noho ny volamena ireny, eny, noho ny volamena tsy miharo betsaka aza;
  - type: text
    content: mamy noho ny tantely, eny, noho ny tantely mitete avy amin’ny tohotra.
  '11':
  - type: text
    content: Ny mpanomponao dia hazavain’ireny
  - type: text
    content: ary misy valiny lehibe ho an’izay mitandrina azy ireny.
  '12':
  - type: text
    content: Raha ny fahadisoana tsy nahy, iza re no mahalala izany?
  - type: text
    content: Ataovy tsy manan-tsiny aho ny amin’izay ota tsy fantatro.
  '13':
  - type: text
    content: Arovy ny mpanomponao tsy ho azon’ny mpiavonavona;
  - type: text
    content: aoka tsy hanapaka ahy ireny!
  - type: text
    content: Dia ho marina aho ka tsy hanan-tsiny ny amin’izay fahadisoana lehibe.
  '14':
  - type: text
    content: Aoka ny tenin’ny vavako
  - type: text
    content: sy ny fisainan’ny foko samy hankasitrahana eo imasonao,
  - type: text
    content: TOMPO ô, Vatolampiko sy Mpanavotra ahy!
  '2':
  - type: text
    content: Ny andro dia samy miteny amin’ny andro mandimby azy
  - type: text
    content: ary ny alina dia samy manolo-pahalalana amin’ny alina mandimby azy.
  '3':
  - type: text
    content: Tsy misy teny na fiteny miasa anefa
  - type: text
    content: sady tsy re koa izay feony.
  '4':
  - type: text
    content: Efa lasa ho any amin’ny tany rehetra ny kofehy fandrefesany
  - type: text
    content: ary mihatra amin’ny faran’izao rehetra izao ny teniny;
  - type: text
    content: tany no nanaovany tranolay ho an’ny masoandro.
  '5':
  - type: text
    content: Ny masoandro dia tahaka ny mpampaka-bady mivoaka avy ao amin’ny efitrano fatoriany,
  - type: text
    content: mifaly tahaka ny lehilahy matanjaka mihazakazaka amin’ny alehany izy.
  '6':
  - type: text
    content: Avy any amin’ny faravodilanitra no fiposahany
  - type: text
    content: ary ny alehany dia hatrany amin’ny farany koa;
  - type: text
    content: tsy misy takona amin’ny hafanany.
  '7':
  - type: text
    content: Tsy misy tsiny ny lalànan’NY TOMPO, mamelombelona ny fanahy;
  - type: text
    content: mahatoky ny teny vavolombelon’NY TOMPO, mahahendry ny tso-po.
  '8':
  - type: text
    content: Mahitsy ny fitsipiky NY TOMPO, mahafaly ny fo;
  - type: text
    content: madio ny didin’NY TOMPO, mampahazava ny maso.
  '9':
  - type: text
    content: Madio ny fahatahorana NY TOMPO, maharitra mandrakizay;
  - type: text
    content: marina ny fitsipiky NY TOMPO, eny, mahitsy avokoa.
