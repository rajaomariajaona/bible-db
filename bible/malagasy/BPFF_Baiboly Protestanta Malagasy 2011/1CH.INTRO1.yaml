document_id: 1CH.INTRO1
type_code: plt
segments:
- type: usfm
  marker: imt1
  children:
  - type: text
    text: INDRAY MIJERY
- type: usfm
  marker: ip
  children:
  - type: text
    text: Ny Boky 1, 2Tantara dia soratra iray ihany no nizara ho boky roa, nosoratan’antokon’olona izay heverina ho mpisorona na levita; izy ireo koa no nanoratra ny Boky Ezra sy Nehemia. Ny anarana hoe Tantara dia avy amin’ny Baiboly hebreo, ary noho io anarana io dia nomena anarana hoe ny Kronista, na ny Mpitantara, ireo mpanoratra.
- type: usfm
  marker: is1
  children:
  - type: text
    text: Ny votoatin’ny Boky
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Ny 1, 2Tantara dia nosoratana ho toy ny tantara mitohy manomboka amin’i Adama ka hatramin’ny fahababoana. Tsy ho famerenana ny efa voalaza fotsiny anefa izany tantara izany fa misy hafatra kendrena hampitaina, dia ny amin’ny fanjakan’Andriamanitra: Andriamanitra no tena Mpanjaka, fa ny mpanjakan’ny Israely dia fiasana hampisehoana izany fanjakan’Andriamanitra izany eo amin’ny lafim-piainana rehetra. Amin’izany dia i Davida no aseho ho ny mpanjaka modely indrindra. Aseho fa izy no nahazo an’i Jerosalema teo ampelatanan’ny Jentilisa ka i Jerosalema no ho tanàna masina hanorenana ny tempoly. Koa i Davida no mpandrindra ny fiainam-pivavahana sy ny fiainam-pirenen’ny Israely manontolo.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: Tsy ny tantarany manontolo anefa no hita ao. Navelan’ny mpanoratra ireo zavatra sarotra nitranga tamin’ny fiainan’i Davida, fa izay aseho dia izy mpanjaka voafidin’Andriamanitra ka haharitra mandrakizay ny taranany, ary indrindra koa ny nanomanany ny fananganana ny tempoly sy ny nandaminany mialoha ny fanompoana hatao ao.
- type: usfm
  marker: iot
  children:
  - type: text
    text: Ny firafitry ny Boky
- type: usfm
  marker: io1
  children:
  - type: text
    text: 'Tetiarana, hatramin’i Adama ka hatramin’i Davida: 1–9'
- type: usfm
  marker: io1
  children:
  - type: text
    text: 'Ny nanjakan’i Davida: 10–29'
