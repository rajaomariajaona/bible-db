document_id: 2CH.24
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: I Joasy, mpanjakan’ny Joda
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 2Mpa 12.1-4
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Fito taona i Joasy raha nanomboka nanjaka ary efapolo taona no nanjakany tany Jerosalema. Ary ny anaran’ny reniny dia Zibia, avy any Bery-Sheba. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Nanao izay mahitsy teo imason’NY TOMPO tamin’ny andro rehetra niainan’i Joiada mpisorona i Joasy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ary nakan’i Joiada vady roa i Joasy, dia niteraka lahy sy vavy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nasain’i Joasy amboarina ny simba ao amin’ny tempoly
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 2Mpa 12.5-17
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Nony afaka izany dia tonga tao am-pon’i Joasy ny hanamboatra ny tranon’NY TOMPO. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia namory ny mpisorona sy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: levita
  - type: text
    text: ' izy ka niteny tamin’ireo hoe: Mandehana ho any amin’ny tanànan’i Joda ka mamoria vola isan-taona amin’ny Israely rehetra hanamboarana ny tranon’Andriamanitrareo; ary hafainganonareo ny raharaha. Nefa tsy nanafaingana izany ny levita. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary nampaka an’i Joiada, lohany tamin’ireo, ny mpanjaka ka niteny taminy hoe: Nahoana ny levita no tsy nasainao nitondra ny hetra avy tany Joda sy Jerosalema ho ao amin’ny tabernakelin’ny vavolombelona, araka ny didin’i Mosesy, mpanompon’NY TOMPO, sy ny fiangonan’ny Israely? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Fa ny zanak’i Atalia, ilay vehivavy ratsy fanahy, dia efa nandrava ny tranon’Andriamanitra; ary ny zavatra masina rehetra tao amin’ny tranon’NY TOMPO koa dia efa nateriny ho an’ireo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Baala
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary nasain’ny mpanjaka nanao vata iray ny olona, dia napetrany teo ivelan’ny vavahadin’ny tranon’NY TOMPO izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary nandefa teny nanerana ny Joda sy Jerosalema izy mba haterina ho an’NY TOMPO ny hetra izay nasain’i Mosesy, mpanompon’Andriamanitra, haloan’ny Israely, fony izy tany an-tany efitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dia faly ny mpanapaka rehetra sy ny vahoaka manontolo ka nitondra izany ary nandatsaka azy tao amin’ny vata ambara-pahafenony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Tamin’ny andro nitondran’ny levita ny vata ho any amin’ny toniany izay voatendrin’ny mpanjaka, rehefa hitany fa be ny vola, dia avy ny mpitantsoratry ny mpanjaka sy ny toniany izay voatendrin’ny Mpisoronabe ka nanaisotra izay rehetra tao amin’ny vata, dia nitondra ny vata niverina ho eo amin’ny fitoerany indray. Toy izany hatrany no nataony ka nahavory vola betsaka izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary nomen’ny mpanjaka sy i Joiada ho an’izay nanao ny raharahan’ny tranon’NY TOMPO ny vola ka nanakaramany ireo tambato sy mpandrafitra ary mpanefy vy sy varahina mba hanamboarana ny tranon’NY TOMPO. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dia niasa ny mpiasa ka vita tsara ny asa; ary namboariny ho toy ny teo aloha ny tranon’Andriamanitra ka nataony mafy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Nony vitany izany dia noentiny teo anatrehan’ny mpanjaka sy i Joiada ny vola sisa ka nanaovany fanaka ho an’ny tranon’NY TOMPO, dia fanaka hoenti-manao fanompoam-pivavahana sy manolotra fanatitra ary lovia kely sy fanaka volamena sy volafotsy. Ary nanolotra fanatitra dorana manontolo tao amin’ny tranon’NY TOMPO mandrakariva izy tamin’ny andron’i Joiada rehetra.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Tonga nahafoy ny TOMPO i Joasy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Tratra antitra sy ela niainana i Joiada vao maty: Telopolo amby zato taona izy vao maty. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ary nalevina tao an-Tanànan’i Davida tao amin’ny mpanjaka izy, satria nanao soa teo amin’ny Israely ary koa tamin’Andriamanitra sy ny tranony.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Rehefa maty i Joiada dia avy ireo mpanapaka ny Joda ka niankohoka teo anatrehan’ny mpanjaka. Dia nihaino azy ny mpanjaka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary nandao ny tranon’NY TOMPO, Andriamanitry ny razany, ireo ka nanompo ny tsangakazon-tsampy ho an’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Aseraha
  - type: text
    text: ' sy ny sampy, dia nisy fahatezerana nihatra tamin’ny Joda sy Jerosalema noho ny fahadisoan’ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Naniraka mpaminany tany aminy Izy hampiverina azy amin’NY TOMPO; dia nananatra azy mafy ireo, nefa tsy nety nihaino izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary notsindrian’ny Fanahin’Andriamanitra i Zakaria, zanak’i Joiada mpisorona ka nitsangana teo amin’ny avoavo teo anatrehan’ny vahoaka ary niteny tamin’ireo hoe: Izao no lazain’Andriamanitra: Nahoana ianareo no mandika ny didin’NY TOMPO ka tsy mahita fanambinana? Satria efa nahafoy NY TOMPO ianareo dia nahafoy anareo kosa Izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Dia nanao teti-dratsy ireo ka nitora-bato azy teo amin’ny kianjan’ny tranon’NY TOMPO araka ny tenin’ny mpanjaka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Toy izany no tsy nahatsiarovan’i Joasy mpanjaka ny soa nataon’i Joiada rainy taminy, satria namono ny zanany izy. Ary nony efa ho faty i Zakaria, dia niteny hoe: NY TOMPO anie hijery sy hamaly izao.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nifaranan’ny fanjakan’i Joasy
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 2Mpa 12.18-22
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Nony niherina ny taona dia avy ny miaramilan’i Arama hiady aminy; tonga tany Joda sy Jerosalema izy ka matiny avokoa ny mpanapaka rehetra tao amin’ny olona ary nalefany ho any amin’ny mpanjakan’i Damaskosy ny babony rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Vitsy ny miaramilan’ny Arameana izay tonga teo, nefa NY TOMPO nanolotra miaramila maro ho eo an-tanany noho ny nahafoizan’ny Joda NY TOMPO, Andriamanitry ny rainy. Toy izany no nahatanterahan’ireo ny famaliana an’i Joasy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary nony nilaozany tamin’ny faharariana mafy izy, dia nikomy taminy ny mpanompony noho ny ran’ny zanak’i Joiada mpisorona ka namono azy teo am-pandrianany, dia maty izy; ary naleviny tany an-Tanànan’i Davida ihany izy, nefa tsy tao amin’ny fasan’ny mpanjaka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ireto avy no nikomy taminy: I Zabada, zanak’i Simata amonita, sy i Jozabada, zanak’i Simrita moabita. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Ny amin’ny zanany sy ny hamafin’ny faminaniana izay nilaza ny loza hanjo azy, ary ny nanamboarany ny tranon’Andriamanitra, indro, voasoratra ao amin’ny bokin’ny tantaran’ny mpanjaka izany. Ary i Amazia zanany no nanjaka nandimby azy.
