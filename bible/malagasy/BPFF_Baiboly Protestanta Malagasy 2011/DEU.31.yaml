type_code: plt
verses:
  '1':
  - type: heading
    content: FANAOVAM-BELOMA NATAON’I MOSESY SY NY NAHAFATESANY
  - type: heading
    content: Voatendry ho mpandimby an’i Mosesy i Josoa
  - type: text
    content: 'Ary nilaza izao teny izao tamin’ny Israely rehetra indray i Mosesy hoe: '
  '10':
  - type: text
    content: 'Ary nandidy azy i Mosesy hoe: Isaky ny fito taona, dia amin’ny taom-panafahana, amin’ny andro firavoravoana izay fitoerana amin’ny trano rantsan-kazo, '
  '11':
  - type: text
    content: 'raha avy hiseho eo anatrehan’NY TOMPO Andriamanitrao eo amin’ny tany izay hofidiny ny Israely rehetra dia aoka hovakinao eo anatrehan’ny Israely rehetra ny ventin’ity lalàna ity mba handrenesany azy. '
  '12':
  - type: text
    content: 'Vorio ny vahoaka rehetra, na lehilahy, na vehivavy, na ankizy madinika, na ny vahiny ao an-tanànanao, hihainoany sy hianarany ny teny ka hatahorany NY TOMPO Andriamanitrao sy hitandremany hanaraka ny teny rehetra amin’ity lalàna ity. '
  '13':
  - type: text
    content: Ary ny zanany koa izay tsy nahafantatra, dia handre ka hianatra hatahotra NY TOMPO Andriamanitrareo amin’ny andro rehetra hiainanareo eo amin’ny tany izay hidiranareo holovana, rehefa tafita an’i Jordana ianareo.
  - type: heading
    content: Ny fivadihan’ny Israely
  '14':
  - type: text
    content: 'Dia hoy NY TOMPO tamin’i Mosesy: Indro, antomotra ny andro hahafatesanao; koa miantsoa an’i Josoa ary mijoroa ao amin’ny '
  - type: text
    content: tranolay fihaonana
  - type: text
    content: ' ianareo mba handidiako azy. Dia nandeha i Mosesy sy i Josoa ka nijoro tao amin’ny tranolay fihaonana. '
  '15':
  - type: text
    content: Ary NY TOMPO niseho teo amin’ny tranolay tamin’ny andry rahona; dia nijanona teo anoloan’ny varavaran’ny tranolay ny andry rahona.
  '16':
  - type: text
    content: 'Ary hoy NY TOMPO tamin’i Mosesy: Indro, hodimandry any amin’ny razanao ianao; ary hitsangana ity firenena ity ka hijangajanga hanaraka ny andriamanitra hafa any amin’ny tany izay efa hidirany honenana, dia hahafoy Ahy izy ka hivadika ny fanekena nataoko taminy. '
  '17':
  - type: text
    content: 'Dia hirehitra aminy ny fahatezerako amin’izay andro izay ka hahafoy azy Aho ary hanafina ny tavako aminy ka ho lany ritra izy, ary loza maro sy fahoriana no hanjo azy; dia hiteny izy amin’io andro io ihany hoe: Moa tsy ny tsy itoeran’Andriamanitro eto amiko va no mahatonga izao fahoriana izao amiko? '
  '18':
  - type: text
    content: 'Ary hanafina ny tavako tokoa Aho amin’izay andro izay noho ny ratsy rehetra izay nataony, fa nivily nanaraka ny andriamanitra hafa izy. '
  '19':
  - type: text
    content: 'Ary ankehitriny, soraty ho anareo izao tononkira izao ka ampianaro ny Zanak’Israely ary aoka tsy ho afaka am-bavany izao tononkira izao mba ho vavolombelona amin’ny Zanak’Israely. '
  '2':
  - type: text
    content: 'Efa roapolo amby zato taona androany aho ka tsy afaka manao na inona na inona intsony, ary efa nilaza tamiko NY TOMPO hoe: Tsy hita io Jordana io ianao. '
  '20':
  - type: text
    content: 'Fa rehefa entiko any amin’ny tany tondra-dronono sy tantely, izay nianianako tamin’ny razany homena azy izy, ary hihinana ka ho voky sy hihamatavy, dia hivily hanaraka ny andriamanitra hafa ka hanompo azy, ary handa Ahy ka hivadika amin’ny fanekeko. '
  '21':
  - type: text
    content: 'Ary raha manjo azy ny loza maro sy ny fahoriana dia ho vavolombelona aminy izao hira izao, fa tsy ho afaka am-bavan’ny taranany izao, fa fantatro ny fisainany izay efa hataony, na dia ankehitriny aza, raha tsy mbola nentiko any amin’ny tany izay nianianako homena azy akory izy. '
  '22':
  - type: text
    content: Dia nosoratan’i Mosesy tamin’izay andro izay ihany izao tononkira izao ka nampianariny ny Zanak’Israely.
  '23':
  - type: text
    content: 'Ary NY TOMPO nandidy an’i Josoa, zanak’i Nona, hoe: Mahereza sy matanjaha; fa ianao no hitondra ny Zanak’Israely hiditra ao amin’ny tany izay nianianako taminy homena azy, ary homba anao Aho.'
  '24':
  - type: text
    content: 'Rehefa tapitra voasoratr’i Mosesy teo amin’ny boky avokoa ny tenin’ity lalàna ity '
  '25':
  - type: text
    content: 'dia nandidy ny '
  - type: text
    content: levita
  - type: text
    content: ', izay mpitondra ny vata misy ny faneken’NY TOMPO izy, hoe: '
  '26':
  - type: text
    content: 'Raiso ity bokin’ny lalàna ity ka apetraho eo anilan’ny vata misy ny faneken’NY TOMPO Andriamanitrareo mba ho vavolombelona aminao. '
  '27':
  - type: text
    content: 'Fa fantatro ny ditranao sy ny hamafin’ny hatokao; indro, na dia mbola velona eto aminareo ankehitriny aza aho dia mikomy amin’NY TOMPO ianareo ka mainka rehefa maty aho! '
  '28':
  - type: text
    content: 'Vorio ho eto amiko ny loholona rehetra amin’ny fokonareo sy ny mpifehy anareo, mba holazaiko eo anatrehany izao teny izao; ary hiantso ny lanitra sy ny tany ho vavolombelona aminy aho. '
  '29':
  - type: text
    content: Fa fantatro fa rehefa maty aho dia hanao ratsy tokoa ianareo ka hiala amin’ny lalana izay nasaiko nalehanareo; dia ho tratry ny loza ianareo amin’ny ho avy satria hanao izay ratsy eo imason’NY TOMPO ka hampahatezitra Azy amin’ny asan’ny tananareo.
  - type: heading
    content: Ny hira nataon’i Mosesy
  '3':
  - type: text
    content: 'NY TOMPO Andriamanitrao no hita eo alohanao, ary Izy no handringana ireo firenena ireo tsy ho eo anoloanao ka hahazo ny taniny ianao; ary i Josoa no hita eo alohanao, araka izay efa nolazain’NY TOMPO. '
  '30':
  - type: text
    content: 'Dia nolazain’i Mosesy teo anatrehan’ny fiangonana, dia ny Israely rehetra, ny tonon’izao hira izao manontolo:'
  '4':
  - type: text
    content: 'Ary NY TOMPO hanao amin’ireo monina ao tahaka ny nataony tamin’i Sihona sy i Oga, mpanjakan’ny Amorita, izay naringany, sy tahaka ny nataony tamin’ny taniny. '
  '5':
  - type: text
    content: 'Dia hatolotry NY TOMPO eo anoloanareo ireo mba hanaovanareo azy araka ny lalàna rehetra izay nomeko anareo. '
  '6':
  - type: text
    content: Mahereza sy matanjaha; aza matahotra azy na mangorohoro; fa NY TOMPO Andriamanitrao no miara-mandeha aminao; tsy handao anao na hahafoy anao Izy.
  '7':
  - type: text
    content: 'Ary niantso an’i Josoa i Mosesy ka niteny taminy teo imason’ny Israely rehetra hoe: Mahereza sy matanjaha; fa ianao sy ity firenena ity dia hiara-miditra ao amin’ny tany izay nianianan’NY TOMPO tamin’ny razany homena azy; ianao no hampandova azy izany. '
  '8':
  - type: text
    content: NY TOMPO no mandeha eo alohanao; Izy no hiaraka aminao; tsy handao anao na hahafoy anao Izy; koa aza matahotra na mivadi-po ianao.
  - type: heading
    content: Nanolotra ny lalàna tamin’ny mpisorona i Mosesy
  '9':
  - type: text
    content: 'Dia nosoratan’i Mosesy izany lalàna izany ka natolony ireo mpisorona, taranak’i Levy, izay mpitondra ny vata misy ny faneken’NY TOMPO sy ny loholon’ny Israely rehetra. '
