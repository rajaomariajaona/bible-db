document_id: PSA.16,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fifalian’ny olona voavonjy tamin’ny fahafatesana
  - type: text
    content: Miktama nataon’i Davida.
  - type: text
    content: Arovy aho, Andriamanitra ô, fa mialoka Aminao.
  '10':
  - type: text
    content: 'Fa tsy ho foinao ho any amin’ny '
  - type: text
    content: fitoeran’ny maty
  - type: text
    content: ' ny aiko,'
  - type: text
    content: tsy hamela ny matoky anao ho latsaka ao an-davaka Ianao,
  '11':
  - type: text
    content: hampahafantatra ahy ny lalan’ny fiainana Ianao.
  - type: text
    content: Eny, fahavokisam-pifaliana no eo anatrehanao
  - type: text
    content: ary fahafinaretana no ho eo amin’ny tananao ankavanana mandrakizay.
  '2':
  - type: text
    content: 'Hoy aho amin’NY TOMPO: Tompoko Ianao,'
  - type: text
    content: tsy misy soa ananako azo oharina Aminao!
  '3':
  - type: text
    content: Ho an’ny olona masina ambonin’ny tany
  - type: text
    content: sy ireo olona tsara laza ny fankasitrahako rehetra.
  '4':
  - type: text
    content: Ho be ny fahorian’izay manova an’Andriamanitra hatakalony ny hafa,
  - type: text
    content: tsy mba handraraka ny ra aidiny ho fanatitra aho
  - type: text
    content: ary tsy mba hotononin’ny molotro ny anarany.
  '5':
  - type: text
    content: NY TOMPO no anjara lovako sy kapoakako;
  - type: text
    content: Ianao no mampaharitra ny anjarako.
  '6':
  - type: text
    content: Ny voafaritra ho anjarako dia eo amin’ny tany mahafinaritra;
  - type: text
    content: eny, lova tsara tarehy ho ahy izany.
  '7':
  - type: text
    content: Hisaotra NY TOMPO izay manolotsaina ahy aho;
  - type: text
    content: na amin’ny alina aza dia mananatra ahy ny foko.
  '8':
  - type: text
    content: Ataoko eo anatrehako mandrakariva NY TOMPO;
  - type: text
    content: rehefa eo ankavanako Izy dia tsy mangozohozo aho.
  '9':
  - type: text
    content: Izany no ifalian’ny foko sy iravoravoan’ny fanahiko;
  - type: text
    content: eny, na ny nofoko aza dia mitoetra tsy manana ahiahy.
