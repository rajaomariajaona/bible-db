document_id: PSA.16
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fifalian’ny olona voavonjy tamin’ny fahafatesana
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: Miktama nataon’i Davida.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Arovy aho, Andriamanitra ô, fa mialoka Aminao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Hoy aho amin’NY TOMPO: Tompoko Ianao,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy misy soa ananako azo oharina Aminao!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ho an’ny olona masina ambonin’ny tany
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ireo olona tsara laza ny fankasitrahako rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ho be ny fahorian’izay manova an’Andriamanitra hatakalony ny hafa,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy mba handraraka ny ra aidiny ho fanatitra aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy mba hotononin’ny molotro ny anarany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: NY TOMPO no anjara lovako sy kapoakako;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ianao no mampaharitra ny anjarako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ny voafaritra ho anjarako dia eo amin’ny tany mahafinaritra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, lova tsara tarehy ho ahy izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Hisaotra NY TOMPO izay manolotsaina ahy aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: na amin’ny alina aza dia mananatra ahy ny foko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ataoko eo anatrehako mandrakariva NY TOMPO;
- type: usfm
  marker: q1
  children:
  - type: text
    text: rehefa eo ankavanako Izy dia tsy mangozohozo aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Izany no ifalian’ny foko sy iravoravoan’ny fanahiko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, na ny nofoko aza dia mitoetra tsy manana ahiahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Fa tsy ho foinao ho any amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: fitoeran’ny maty
  - type: text
    text: ' ny aiko,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy hamela ny matoky anao ho latsaka ao an-davaka Ianao,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: hampahafantatra ahy ny lalan’ny fiainana Ianao.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, fahavokisam-pifaliana no eo anatrehanao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary fahafinaretana no ho eo amin’ny tananao ankavanana mandrakizay.
