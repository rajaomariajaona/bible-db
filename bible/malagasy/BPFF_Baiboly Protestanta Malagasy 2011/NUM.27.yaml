document_id: NUM.27
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Lalàna ny amin’ny fandovàn’ny vehivavy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary avy ireo zanakavavin’i Zelofada, zanak’i Hefera, zanak’i Gileada, zanak’i Makira, zanak’i Manase, avy tamin’ny fianakavian’i Manase, zanak’i Josefa, ary izao avy no anarany: i Mahala, i Noa, i Hogla, i Milka ary i Tirza. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Izy ireo dia nitsangana teo anatrehan’i Mosesy sy teo anatrehan’i Eleazara mpisorona ary teo anatrehan’ireo lohan’ny fiangonana sy ny fiangonana manontolo, teo anoloan’ny varavaran’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tranolay fihaonana
  - type: text
    text: ' ka niteny hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ny rainay dia maty tany an-tany efitra, kanefa tsy mba isan’ny antokon’i Kora izay niangona hikomy tamin’NY TOMPO akory; fa ny fahotan’izy tenany no nahafaty azy, ary tsy nanan-janakalahy izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Nahoana ny rainay no ho maty maso eo amin’ny fianakaviany na dia tsy nanan-janakalahy aza izy? Mba omeo zaratany eo amin’ny rahalahin’ny rainay izahay.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ary nalahatr’i Mosesy teo anatrehan’NY TOMPO ny raharahan’ireo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary NY TOMPO niteny tamin’i Mosesy hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Marina ny tenin’ny zanakavavin’i Zelofada: Omeo zaratany eo amin’ny rahalahin-drainy tokoa izy; dia ampandovay ny zaratanin’ny rainy izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary lazao amin’ny Zanak’Israely hoe: Raha misy lehilahy maty ka tsy manan-janakalahy dia ny zanany vavy no hampandovainareo ny zarataniny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary raha tsy manan-janakavavy izy dia ny rahalahiny no homenareo ny zarataniny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary raha tsy manan-drahalahy izy dia ny rahalahin-drainy no homenareo ny zarataniny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ary raha tsy manan-drahalahy ny rainy dia ny havany akaiky azy amin’ny fianakaviany no homenareo ny zarataniny, koa izy no handova azy. Ho lalàna hitondrana ny Zanak’Israely izany araka ny didy nomen’NY TOMPO an’i Mosesy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: I Josoa no voatendry handimby an’i Mosesy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Hoy NY TOMPO tamin’i Mosesy: Miakara amin’irỳ tendrombohitra Abarima irỳ ka tazano ny tany izay omeko ny Zanak’Israely. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary rehefa hitanao izany dia hangonina any amin’ny razanao koa ianao, tahaka izay nanangonana an’i Arona rahalahinao; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: fa nandà ny teniko ianareo tany an-tany efitra Zina, tamin’ilay nilan’ny fiangonana ady ka tsy nanamasina Ahy teo amin’ny rano teo imasony. Izany no ranon’i Meriba, any Kadesy, any an-tany efitra Zina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary niteny tamin’NY TOMPO i Mosesy hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Aoka NY TOMPO, Andriamanitry ny fanahin’ny nofo rehetra, hanendry lehilahy izay hitandrina ny fiangonana '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ka hivoaka mialoha azy sy hiditra mialoha azy, ary hitarika azy hivoaka sy hitarika azy hiditra mba tsy ho tahaka ny ondry tsy misy mpiandry ny fiangonan’NY TOMPO.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary hoy NY TOMPO tamin’i Mosesy: Alao i Josoa, zanak’i Nona, izay lehilahy manam-panahy ka ametraho ny tananao izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Asaivo mijoro eo anatrehan’i Eleazara mpisorona sy ny fiangonana manontolo izy ka manomeza didy azy eo imason’ireo ianao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Dia anomezo azy ny voninahitrao mba hihainoan’ny fiangonan’ny Zanak’Israely manontolo azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary hijoro eo anatrehan’i Eleazara mpisorona, izay hanadina amin’ny fitsaran’ny Orima eo anatrehan’NY TOMPO ho azy, izy; araka ny teniny no hivoahany ary araka ny teniny no hidirany, dia izy sy ny Zanak’Israely rehetra miaraka aminy, dia ny fiangonana manontolo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary nanatanteraka izay nandidian’NY TOMPO azy i Mosesy. Dia naka an’i Josoa izy ka nampijoro azy teo anatrehan’i Eleazara mpisorona sy ny fiangonana manontolo '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ka nametraka ny tanany taminy ary nanome didy azy, araka ny tenin’NY TOMPO izay nampitondrainy an’i Mosesy.
