document_id: NUM.27,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Lalàna ny amin’ny fandovàn’ny vehivavy
  - type: text
    content: 'Ary avy ireo zanakavavin’i Zelofada, zanak’i Hefera, zanak’i Gileada, zanak’i Makira, zanak’i Manase, avy tamin’ny fianakavian’i Manase, zanak’i Josefa, ary izao avy no anarany: i Mahala, i Noa, i Hogla, i Milka ary i Tirza. '
  '10':
  - type: text
    content: 'Ary raha tsy manan-drahalahy izy dia ny rahalahin-drainy no homenareo ny zarataniny. '
  '11':
  - type: text
    content: Ary raha tsy manan-drahalahy ny rainy dia ny havany akaiky azy amin’ny fianakaviany no homenareo ny zarataniny, koa izy no handova azy. Ho lalàna hitondrana ny Zanak’Israely izany araka ny didy nomen’NY TOMPO an’i Mosesy.
  - type: heading
    content: I Josoa no voatendry handimby an’i Mosesy
  '12':
  - type: text
    content: 'Hoy NY TOMPO tamin’i Mosesy: Miakara amin’irỳ tendrombohitra Abarima irỳ ka tazano ny tany izay omeko ny Zanak’Israely. '
  '13':
  - type: text
    content: 'Ary rehefa hitanao izany dia hangonina any amin’ny razanao koa ianao, tahaka izay nanangonana an’i Arona rahalahinao; '
  '14':
  - type: text
    content: fa nandà ny teniko ianareo tany an-tany efitra Zina, tamin’ilay nilan’ny fiangonana ady ka tsy nanamasina Ahy teo amin’ny rano teo imasony. Izany no ranon’i Meriba, any Kadesy, any an-tany efitra Zina.
  '15':
  - type: text
    content: 'Ary niteny tamin’NY TOMPO i Mosesy hoe: '
  '16':
  - type: text
    content: 'Aoka NY TOMPO, Andriamanitry ny fanahin’ny nofo rehetra, hanendry lehilahy izay hitandrina ny fiangonana '
  '17':
  - type: text
    content: ka hivoaka mialoha azy sy hiditra mialoha azy, ary hitarika azy hivoaka sy hitarika azy hiditra mba tsy ho tahaka ny ondry tsy misy mpiandry ny fiangonan’NY TOMPO.
  '18':
  - type: text
    content: 'Ary hoy NY TOMPO tamin’i Mosesy: Alao i Josoa, zanak’i Nona, izay lehilahy manam-panahy ka ametraho ny tananao izy. '
  '19':
  - type: text
    content: 'Asaivo mijoro eo anatrehan’i Eleazara mpisorona sy ny fiangonana manontolo izy ka manomeza didy azy eo imason’ireo ianao. '
  '2':
  - type: text
    content: 'Izy ireo dia nitsangana teo anatrehan’i Mosesy sy teo anatrehan’i Eleazara mpisorona ary teo anatrehan’ireo lohan’ny fiangonana sy ny fiangonana manontolo, teo anoloan’ny varavaran’ny '
  - type: text
    content: tranolay fihaonana
  - type: text
    content: ' ka niteny hoe: '
  '20':
  - type: text
    content: 'Dia anomezo azy ny voninahitrao mba hihainoan’ny fiangonan’ny Zanak’Israely manontolo azy. '
  '21':
  - type: text
    content: 'Ary hijoro eo anatrehan’i Eleazara mpisorona, izay hanadina amin’ny fitsaran’ny Orima eo anatrehan’NY TOMPO ho azy, izy; araka ny teniny no hivoahany ary araka ny teniny no hidirany, dia izy sy ny Zanak’Israely rehetra miaraka aminy, dia ny fiangonana manontolo. '
  '22':
  - type: text
    content: 'Ary nanatanteraka izay nandidian’NY TOMPO azy i Mosesy. Dia naka an’i Josoa izy ka nampijoro azy teo anatrehan’i Eleazara mpisorona sy ny fiangonana manontolo '
  '23':
  - type: text
    content: ka nametraka ny tanany taminy ary nanome didy azy, araka ny tenin’NY TOMPO izay nampitondrainy an’i Mosesy.
  '3':
  - type: text
    content: 'Ny rainay dia maty tany an-tany efitra, kanefa tsy mba isan’ny antokon’i Kora izay niangona hikomy tamin’NY TOMPO akory; fa ny fahotan’izy tenany no nahafaty azy, ary tsy nanan-janakalahy izy. '
  '4':
  - type: text
    content: Nahoana ny rainay no ho maty maso eo amin’ny fianakaviany na dia tsy nanan-janakalahy aza izy? Mba omeo zaratany eo amin’ny rahalahin’ny rainay izahay.
  '5':
  - type: text
    content: Ary nalahatr’i Mosesy teo anatrehan’NY TOMPO ny raharahan’ireo.
  '6':
  - type: text
    content: 'Ary NY TOMPO niteny tamin’i Mosesy hoe: '
  '7':
  - type: text
    content: 'Marina ny tenin’ny zanakavavin’i Zelofada: Omeo zaratany eo amin’ny rahalahin-drainy tokoa izy; dia ampandovay ny zaratanin’ny rainy izy. '
  '8':
  - type: text
    content: 'Ary lazao amin’ny Zanak’Israely hoe: Raha misy lehilahy maty ka tsy manan-janakalahy dia ny zanany vavy no hampandovainareo ny zarataniny. '
  '9':
  - type: text
    content: 'Ary raha tsy manan-janakavavy izy dia ny rahalahiny no homenareo ny zarataniny. '
