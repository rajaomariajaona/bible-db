document_id: GEN.40,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Taorianan’izany dia nahavita fahadisoana tamin’ny mpanjakan’i Ejipta tompony ny mpitondra kapoakan’ny mpanjakan’i Ejipta sy ny mpanao mofony. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ilay tahom-boaloboka dia nisampana telo. Nony nitsimoka izy dia niposaka ny voniny ary ny sampahony dia nahavanona voaloboka masaka. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Teny an-tanako ny kapoakan’i Farao. Nalaiko ny voaloboka ka nofiazako ho ao amin’ny kapoakan’i Farao, dia natolotro teo an-tanan’i Farao ny kapoaka. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Dia hoy i Josefa taminy: Izao no hevitr’izany: Ny sampany telo dia hateloana. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ato anatin’ny hateloana dia hasandratr’i Farao ny lohanao ka hampodiny ho ao amin’ilay nipetrahanao ianao; hanolotra ny kapoakan’i Farao ho eo an-tanany indray ianao, tahaka ilay fanao fahiny fony ianao mpitondra kapoakany. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Fa mba tsarovy aho rehefa mahita soa ianao, koa trara antitra ianao, iantrao aho, dia lazao amin’i Farao aho ka avoahy amin’ity trano ity. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Fa nangalarina avy tany amin’ny tanin’ny Hebreo aho, nefa ange tsy nanao na inona na inona izay tokony ho nametrahana ahy ato amin’ity lavaka ity.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Rehefa hitan’ny lehiben’ny mpanao mofo fa tsara ny fanazavany ny hevitry ny nofy dia hoy izy tamin’i Josefa: Izaho koa dia nanonofy ka indro, hono, niloloha harona telo feno mofo fotsy aho. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Tao anatin’ilay harona ambony indrindra dia nisy ny karazana sakafo rehetra nataon’ny mpanao mofo ho an’i Farao. Nefa lanin’ny vorona tao anatin’ny harona izay nololohaviko izany. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Dia hoy i Josefa: Izao kosa no hevitr’izany: Ny harona telo dia hateloana. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Ato anatin’ny hateloana dia hasandratr’i Farao ho afaka aminao ny lohanao ka hahantony amin’ny hazo ianao dia hohanin’ny vorona ny nofonao.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Dia nisafoaka tamin’ireo tandapany roa lahy ireo i Farao, dia tamin’ny lehiben’ny mpitondra kapoaka sy ny lehiben’ny mpanao mofo. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Ary tamin’ny andro fahatelo, izay nitsingerenan’ny taona nahaterahany, dia nanao fanasana ho an’ny mpanompony rehetra i Farao, ka nasandrany ny lohan’ny lehiben’ny mpitondra kapoaka sy ny lohan’ny lehiben’ny mpanao mofo teo amin’ny mpanompony. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Ny lehiben’ny mpitondra kapoaka dia nampodiny ho amin’ny fitondrany kapoaka indray ka nanolotra ny kapoaka ho eo an-tanan’i Farao. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Fa ny lehiben’ny mpanao mofo kosa dia nahantony, araka izay nolazain’i Josefa tamin’izy roa lahy avy. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Kanjo tsy mba nahatsiaro an’i Josefa ilay lehiben’ny mpitondra kapoaka fa nanadino azy.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Nataony tao an-tranomaizina izy roa lahy, tao an-tranon’ny lehiben’ny mpiambina, tao anatin’ilay tranomaizina izay nifatoran’i Josefa. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Notendren’ny lehiben’ny mpiambina ho eo amin’izy roa lahy i Josefa ka nanompo azy ireo izy. Ary nitoetra andro maromaro tao amin’ny tranomaizina izy roa lahy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Nanazava ny nofin’ireo tandapa i Josefa
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Indray alina, nanonofy izy roa lahy, dia ilay mpitondra kapoaka sy ilay mpanao mofon’ny mpanjakan’i Ejipta, izay nifatotra tao an-tranomaizina. Samy nanana ny nofiny izay samy nanana ny heviny avy izy roa lahy ireo. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Nony maraina ny andro dia nankao amin’izy ireo i Josefa ka nahita azy ireo nalahelo tarehy. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Dia nanontanian’i Josefa ireo tandapan’i Farao izay niara-nifatotra taminy tao an-tranon’ny tompony; hoy izy: Nahoana no malahelo tarehy izato ianareo? '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Hoy izy roa lahy taminy: Nanonofy izahay ary tsy misy mahalaza ny heviny. Dia hoy i Josefa: Tsy avy amin’Andriamanitra va ny filazana ny hevitry ny nofy? Miangavy anareo aho, lazao amiko izany nofinareo izany!'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Dia nambaran’ny lehiben’ny mpitondra kapoaka tamin’i Josefa ny nofiny; hoy izy: Nofiko fa indro, hono, nisy tahom-boaloboka teo anatrehako. '
