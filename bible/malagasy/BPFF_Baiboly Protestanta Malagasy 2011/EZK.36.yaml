document_id: EZK.36
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Handray ny taniny indray ny Israely
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary ianao, ry '
  - type: usfm
    marker: w
    children:
    - type: text
      text: zanak’olona
  - type: text
    text: ', maminania amin’ny tendrombohitry ny Israely ka lazao hoe: Ry tendrombohitry ny Israely, mihainoa ny tenin’NY TOMPO!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Izao no lazain’NY TOMPO Andriamanitra: Noho ny nanaovan’ny fahavalo anareo hoe: Hia! Lasanay ny havoana fahagola, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'dia maminania ka lazao hoe: Izao no lazain’NY TOMPO Andriamanitra: Noho ny nandravany anareo sy ny nisafoahany nanenjika anareo avy amin’ny tany manodidina ka lasan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jentilisa
  - type: text
    text: ' sisa ho fananany ianareo, sady efa nataon’ny molotry ny mpibedibedy fitenenana ka tonga ambentinteny amin’ny firenena, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'dia mihainoa ny tenin’NY TOMPO Andriamanitra, ry tendrombohitry ny Israely: Izao no lazain’NY TOMPO Andriamanitra amin’ny tendrombohitra, ny havoana, ny lohasahan-driaka, ny lohasaha, ny korontam-bato ary ny tanàna aolo izay efa babo sy tonga fandatsa ho an’ny firenena sisa amin’ny manodidina, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'eny, izao no lazain’NY TOMPO Andriamanitra: Tamin’ny afon’ny fahasaro-piaroko tokoa no nitenenako namely ny firenena sisa sy ny Edoma rehetra izay nahalasa ny taniko ho fananany, tamin’ny fo feno fifaliana sy tamin’ny fanahy mamingavinga mba hangoronany azy ho babo. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Koa maminania ny amin’ny tanin’ny Israely ka lazao amin’ny tendrombohitra, ny havoana, ny lohasahan-driaka ary ny lohasaha hoe: Izao no lazain’NY TOMPO Andriamanitra: Indro, amin’ny fahasaro-piaroko sy ny fahatezerako no itenenako: Noho ny nitondranareo latsa avy tamin’ny firenena, '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'dia izao no lazain’NY TOMPO Andriamanitra: Izaho efa nanangan-tanana ka niteny hoe: Marina tokoa fa ny firenena manodidina anareo no hitondra henatra.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Fa ianareo kosa, ry tendrombohitry ny Israely, dia hisandrahaka sy hahavokatra ho an’ny Israely oloko; fa efa antomotra ny hiavian’izany. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Fa indro, tamy manatona anareo Aho ka hanatrika anareo, dia hasaina sy hamafazana ianareo. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Hahamaro ny olona eny aminareo Aho, dia ny taranak’Israely rehetra; honenana ny tanàna ary haorina indray ny efa rava. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Dia hahamaro ny olona sy ny biby fiompy eny aminareo Aho ka hitombo sy hiteraka ireo; hametrahako mponina tahaka ny taloha any aminareo ary hanisy soa anareo mihoatra noho ny tamin’ny niandohanareo Aho; dia ho fantatrareo fa Izaho no TOMPO. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Eny, hampivoivoy olona eny aminareo Aho, dia ny Israely oloko; dia handray anao ho fananany izy ka hahalasa anao ho lovany ary tsy hahalany fara azy intsony ianao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Izao no lazain’NY TOMPO Andriamanitra: Noho ny nitenenany taminareo hoe: Ianao, ry tany, dia mandany olona sady mahalany fara ny firenenao, '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'dia tsy handany olona intsony ianao na hahalavo ny firenenao intsony, hoy NY TOMPO Andriamanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Hataoko tsy mahare ny latsan’ny Jentilisa intsony ianao sady tsy hitondra ny fanaratsiana ataon’olona intsony; ary tsy hahalavo ny firenenao intsony ianao, hoy NY TOMPO Andriamanitra.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Hanangona sy hanadio ny Israely NY TOMPO
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary tonga tamiko ny tenin’NY TOMPO hoe:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ry '
  - type: usfm
    marker: w
    children:
    - type: text
      text: zanak’olona
  - type: text
    text: ', ny taranak’Israely nonina tany amin’ny taniny dia nandoto izany tamin’ny fanaony sy tamin’ny asany; fa tahaka ny fahalotoan’ny vehivavy mararin’ny fadimbolana no fahalotoan’ny fanaony eo anatrehako. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Koa naidiko ho aminy ny fahatezerako mirehitra noho ny ra nalatsany teo amin’ny tany sy noho ny nandotoany izany tamin’ny sampiny. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Naeliko tany amin’ny firenena izy ka nihahaka tany amin’ny tany samihafa; araka ny fanaony sy ny asany no nitsarako azy. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary nony tonga tany amin’ny firenena izay nalehany izy dia tonga fanamavoana ny anarako masina tamin’ny nilazan’ny olona azy hoe: Ireo no olon’NY TOMPO, ary avy tany amin’ny tanin’NY TOMPO no nivoahany! '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Dia notsimbiniko ny anarako masina izay nohamavoin’ny taranak’Israely tany amin’ny firenena izay nalehany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Koa lazao amin’ny taranak’Israely hoe: Izao no lazain’NY TOMPO Andriamanitra: Tsy noho ny aminareo no anaovako izany, ry taranak’Israely, fa noho ny anarako masina izay nohamavoinareo tany amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jentilisa
  - type: text
    text: ' izay nalehanareo. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Hohamasiniko ny anarako lehibe izay nohamavoinareo tany amin’ny Jentilisa, dia ho fantany fa Izaho no TOMPO, hoy NY TOMPO Andriamanitra, rehefa miseho ho masina eo imasony Aho amin’ny ataoko aminareo. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Fa halaiko avy any amin’ny Jentilisa ianareo ary hangoniko avy any amin’ny tany rehetra ka hoentiko any amin’ny taninareo. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Dia hofafazako rano madio ianareo ka hadio; ny mba ho afaka amin’ny fahalotoanareo rehetra sy ny sampinareo rehetra no hanadiovako anareo. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Homeko fo vaovao ianareo ary fanahy vaovao no hataoko ao anatinareo sady hesoriko amin’ny nofonareo ny fo vato ka homeko fo nofo ianareo. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ny Fanahiko no hataoko ao anatinareo ka hahatonga anareo handeha araka ny lalànako sy hitandrina ny fitsipiko ka hanaraka azy. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ary honina any amin’ny tany izay nomeko ny razanareo ianareo; ho oloko ianareo ary Izaho ho Andriamanitrareo. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Hovonjeko ho afaka amin’ny fahalotoanareo rehetra ianareo. Hantsoiko sy hataoko vokatra ny vary ary tsy handefasako mosary intsony ianareo. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Hataoko vokatra koa ny voankazo sy ny vokatry ny saha mba tsy ho voalatsan’ny Jentilisa amin’ny mosary intsony ianareo. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Dia hotsarovanareo ny lalan-dratsinareo sy ny fanaonareo tsy mety, ka haharikoriko anareo ny tenanareo noho ny fahadisoanareo sy ny fahavetavetanareo. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Tsy noho ny aminareo no anaovako izany, hoy NY TOMPO Andriamanitra; aoka ho fantatrareo izany! Koa menara sy mangaihaiza ianareo noho ny lalanareo, ry taranak’Israely!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Izao no lazain’NY TOMPO Andriamanitra: Amin’ny andro hanadiovako anareo ho afaka amin’ny helokareo rehetra dia hametrahako mponina ao amin’ny tanàna, ary haorina indray ny efa rava. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Hasaina ny tany efa lao fa tsy ho lao eo imason’ny mpandalo rehetra intsony izy. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Fa holazainy hoe: Ity tany efa lao ity dia tonga tahaka ny saha Edena; ary ny tanàna efa foana sy lao dia misy mponina sady asiana manda; '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: dia ho fantatry ny Jentilisa sisa manodidina anareo fa Izaho TOMPO no manorina indray ny efa rava sy mamboly izay efa foana. Izaho TOMPO no niteny sady hanatanteraka izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Izao no lazain’NY TOMPO Andriamanitra: Izao indray no mbola hataoko: Mbola hanaiky hotadiavin’ny taranak’Israely Aho mba hanaovako izao ho azy: Hohamaroiko toy ny ondry ny olony. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Toy ny ondry aman’osy masina izay any Jerosalema amin’ny fotoam-pivavahana, dia toy izany no hahafenoan’ny tanànany efa lao, amin’ny olona maro toy ny ondry aman’osy. Dia ho fantatra fa Izaho no TOMPO.
