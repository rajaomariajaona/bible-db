document_id: EZK.36,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Handray ny taniny indray ny Israely
  - type: text
    content: 'Ary ianao, ry '
  - type: text
    content: zanak’olona
  - type: text
    content: ', maminania amin’ny tendrombohitry ny Israely ka lazao hoe: Ry tendrombohitry ny Israely, mihainoa ny tenin’NY TOMPO!'
  '10':
  - type: text
    content: 'Hahamaro ny olona eny aminareo Aho, dia ny taranak’Israely rehetra; honenana ny tanàna ary haorina indray ny efa rava. '
  '11':
  - type: text
    content: 'Dia hahamaro ny olona sy ny biby fiompy eny aminareo Aho ka hitombo sy hiteraka ireo; hametrahako mponina tahaka ny taloha any aminareo ary hanisy soa anareo mihoatra noho ny tamin’ny niandohanareo Aho; dia ho fantatrareo fa Izaho no TOMPO. '
  '12':
  - type: text
    content: Eny, hampivoivoy olona eny aminareo Aho, dia ny Israely oloko; dia handray anao ho fananany izy ka hahalasa anao ho lovany ary tsy hahalany fara azy intsony ianao.
  '13':
  - type: text
    content: 'Izao no lazain’NY TOMPO Andriamanitra: Noho ny nitenenany taminareo hoe: Ianao, ry tany, dia mandany olona sady mahalany fara ny firenenao, '
  '14':
  - type: text
    content: 'dia tsy handany olona intsony ianao na hahalavo ny firenenao intsony, hoy NY TOMPO Andriamanitra. '
  '15':
  - type: text
    content: Hataoko tsy mahare ny latsan’ny Jentilisa intsony ianao sady tsy hitondra ny fanaratsiana ataon’olona intsony; ary tsy hahalavo ny firenenao intsony ianao, hoy NY TOMPO Andriamanitra.
  - type: heading
    content: Hanangona sy hanadio ny Israely NY TOMPO
  '16':
  - type: text
    content: 'Ary tonga tamiko ny tenin’NY TOMPO hoe:'
  '17':
  - type: text
    content: 'Ry '
  - type: text
    content: zanak’olona
  - type: text
    content: ', ny taranak’Israely nonina tany amin’ny taniny dia nandoto izany tamin’ny fanaony sy tamin’ny asany; fa tahaka ny fahalotoan’ny vehivavy mararin’ny fadimbolana no fahalotoan’ny fanaony eo anatrehako. '
  '18':
  - type: text
    content: 'Koa naidiko ho aminy ny fahatezerako mirehitra noho ny ra nalatsany teo amin’ny tany sy noho ny nandotoany izany tamin’ny sampiny. '
  '19':
  - type: text
    content: 'Naeliko tany amin’ny firenena izy ka nihahaka tany amin’ny tany samihafa; araka ny fanaony sy ny asany no nitsarako azy. '
  '2':
  - type: text
    content: 'Izao no lazain’NY TOMPO Andriamanitra: Noho ny nanaovan’ny fahavalo anareo hoe: Hia! Lasanay ny havoana fahagola, '
  '20':
  - type: text
    content: 'Ary nony tonga tany amin’ny firenena izay nalehany izy dia tonga fanamavoana ny anarako masina tamin’ny nilazan’ny olona azy hoe: Ireo no olon’NY TOMPO, ary avy tany amin’ny tanin’NY TOMPO no nivoahany! '
  '21':
  - type: text
    content: Dia notsimbiniko ny anarako masina izay nohamavoin’ny taranak’Israely tany amin’ny firenena izay nalehany.
  '22':
  - type: text
    content: 'Koa lazao amin’ny taranak’Israely hoe: Izao no lazain’NY TOMPO Andriamanitra: Tsy noho ny aminareo no anaovako izany, ry taranak’Israely, fa noho ny anarako masina izay nohamavoinareo tany amin’ny '
  - type: text
    content: Jentilisa
  - type: text
    content: ' izay nalehanareo. '
  '23':
  - type: text
    content: 'Hohamasiniko ny anarako lehibe izay nohamavoinareo tany amin’ny Jentilisa, dia ho fantany fa Izaho no TOMPO, hoy NY TOMPO Andriamanitra, rehefa miseho ho masina eo imasony Aho amin’ny ataoko aminareo. '
  '24':
  - type: text
    content: 'Fa halaiko avy any amin’ny Jentilisa ianareo ary hangoniko avy any amin’ny tany rehetra ka hoentiko any amin’ny taninareo. '
  '25':
  - type: text
    content: 'Dia hofafazako rano madio ianareo ka hadio; ny mba ho afaka amin’ny fahalotoanareo rehetra sy ny sampinareo rehetra no hanadiovako anareo. '
  '26':
  - type: text
    content: 'Homeko fo vaovao ianareo ary fanahy vaovao no hataoko ao anatinareo sady hesoriko amin’ny nofonareo ny fo vato ka homeko fo nofo ianareo. '
  '27':
  - type: text
    content: 'Ny Fanahiko no hataoko ao anatinareo ka hahatonga anareo handeha araka ny lalànako sy hitandrina ny fitsipiko ka hanaraka azy. '
  '28':
  - type: text
    content: 'Ary honina any amin’ny tany izay nomeko ny razanareo ianareo; ho oloko ianareo ary Izaho ho Andriamanitrareo. '
  '29':
  - type: text
    content: 'Hovonjeko ho afaka amin’ny fahalotoanareo rehetra ianareo. Hantsoiko sy hataoko vokatra ny vary ary tsy handefasako mosary intsony ianareo. '
  '3':
  - type: text
    content: 'dia maminania ka lazao hoe: Izao no lazain’NY TOMPO Andriamanitra: Noho ny nandravany anareo sy ny nisafoahany nanenjika anareo avy amin’ny tany manodidina ka lasan’ny '
  - type: text
    content: Jentilisa
  - type: text
    content: ' sisa ho fananany ianareo, sady efa nataon’ny molotry ny mpibedibedy fitenenana ka tonga ambentinteny amin’ny firenena, '
  '30':
  - type: text
    content: 'Hataoko vokatra koa ny voankazo sy ny vokatry ny saha mba tsy ho voalatsan’ny Jentilisa amin’ny mosary intsony ianareo. '
  '31':
  - type: text
    content: 'Dia hotsarovanareo ny lalan-dratsinareo sy ny fanaonareo tsy mety, ka haharikoriko anareo ny tenanareo noho ny fahadisoanareo sy ny fahavetavetanareo. '
  '32':
  - type: text
    content: Tsy noho ny aminareo no anaovako izany, hoy NY TOMPO Andriamanitra; aoka ho fantatrareo izany! Koa menara sy mangaihaiza ianareo noho ny lalanareo, ry taranak’Israely!
  '33':
  - type: text
    content: 'Izao no lazain’NY TOMPO Andriamanitra: Amin’ny andro hanadiovako anareo ho afaka amin’ny helokareo rehetra dia hametrahako mponina ao amin’ny tanàna, ary haorina indray ny efa rava. '
  '34':
  - type: text
    content: 'Hasaina ny tany efa lao fa tsy ho lao eo imason’ny mpandalo rehetra intsony izy. '
  '35':
  - type: text
    content: 'Fa holazainy hoe: Ity tany efa lao ity dia tonga tahaka ny saha Edena; ary ny tanàna efa foana sy lao dia misy mponina sady asiana manda; '
  '36':
  - type: text
    content: dia ho fantatry ny Jentilisa sisa manodidina anareo fa Izaho TOMPO no manorina indray ny efa rava sy mamboly izay efa foana. Izaho TOMPO no niteny sady hanatanteraka izany.
  '37':
  - type: text
    content: 'Izao no lazain’NY TOMPO Andriamanitra: Izao indray no mbola hataoko: Mbola hanaiky hotadiavin’ny taranak’Israely Aho mba hanaovako izao ho azy: Hohamaroiko toy ny ondry ny olony. '
  '38':
  - type: text
    content: Toy ny ondry aman’osy masina izay any Jerosalema amin’ny fotoam-pivavahana, dia toy izany no hahafenoan’ny tanànany efa lao, amin’ny olona maro toy ny ondry aman’osy. Dia ho fantatra fa Izaho no TOMPO.
  '4':
  - type: text
    content: 'dia mihainoa ny tenin’NY TOMPO Andriamanitra, ry tendrombohitry ny Israely: Izao no lazain’NY TOMPO Andriamanitra amin’ny tendrombohitra, ny havoana, ny lohasahan-driaka, ny lohasaha, ny korontam-bato ary ny tanàna aolo izay efa babo sy tonga fandatsa ho an’ny firenena sisa amin’ny manodidina, '
  '5':
  - type: text
    content: 'eny, izao no lazain’NY TOMPO Andriamanitra: Tamin’ny afon’ny fahasaro-piaroko tokoa no nitenenako namely ny firenena sisa sy ny Edoma rehetra izay nahalasa ny taniko ho fananany, tamin’ny fo feno fifaliana sy tamin’ny fanahy mamingavinga mba hangoronany azy ho babo. '
  '6':
  - type: text
    content: 'Koa maminania ny amin’ny tanin’ny Israely ka lazao amin’ny tendrombohitra, ny havoana, ny lohasahan-driaka ary ny lohasaha hoe: Izao no lazain’NY TOMPO Andriamanitra: Indro, amin’ny fahasaro-piaroko sy ny fahatezerako no itenenako: Noho ny nitondranareo latsa avy tamin’ny firenena, '
  '7':
  - type: text
    content: 'dia izao no lazain’NY TOMPO Andriamanitra: Izaho efa nanangan-tanana ka niteny hoe: Marina tokoa fa ny firenena manodidina anareo no hitondra henatra.'
  '8':
  - type: text
    content: 'Fa ianareo kosa, ry tendrombohitry ny Israely, dia hisandrahaka sy hahavokatra ho an’ny Israely oloko; fa efa antomotra ny hiavian’izany. '
  '9':
  - type: text
    content: 'Fa indro, tamy manatona anareo Aho ka hanatrika anareo, dia hasaina sy hamafazana ianareo. '
