document_id: EZR.INTRO1
type_code: plt
segments:
- type: usfm
  marker: imt1
  children:
  - type: text
    text: INDRAY MIJERY
- type: usfm
  marker: ip
  children:
  - type: text
    text: Ny mpanoratra ny Ezra sy Nehemia dia ireo mpanoratra ny 1, 2Tantara ihany, ary ireo boky roa ireo dia boky iray ihany tany aloha, fa tatỳ aoriana vao nizara ho roa ka nitondra ny anarana hoe Ezra sy Nehemia.
- type: usfm
  marker: is1
  children:
  - type: text
    text: Ny votoatin’ny Boky
- type: usfm
  marker: ip
  children:
  - type: text
    text: Ny Boky dia manomboka amin’ny Didin’i Kirosy, mpanjaka persiana, izay manome lalana ny Jiosy hody any Jerosalema ka hanangana indray ny tempoly. Maro tokoa ny Jiosy nanapa-kevitra hody ka ny voalohany nataony tany Jerosalema dia ny nanangana indray ny alitara mba hahazoana manolotra fanatitra sy hanatanterahana indray ireo fanompoam-pivavahana samihafa. Rehefa natomboka anefa ny asa dia nisy olona sasany izay nanohitra ka nitady hisakana izany. Dia nitsahatra taona maro ny asa. Voatery nampanontany tany amin’ny fitondrana persiana ireo mpitondra mba hijery ny rakitsoratra momba fahababoana. Hita tany an-dapan’i Dariosy tokoa ny taratasy mirakitra ny Didin’i Kirosy ka nandidy ny hanohizana ny asa izy.
- type: usfm
  marker: ip
  children:
  - type: text
    text: Ny Boky dia mitantara koa ny dian’i Ezra mpisorona sady mpanoradalàna avy tany Babilona, izay nahazo lalana tamin’ny mpanjaka Artaksersesy hamelona indray ny fiainam-pivavahana tao Jerosalema, sady nanadio ny fiainam-piarahamonina mba ho araka ny fanekena sy ny didin’Andriamanitra.
- type: usfm
  marker: iot
  children:
  - type: text
    text: Ny firafitry ny Boky
- type: usfm
  marker: io1
  children:
  - type: text
    text: 'Ny Didin’i Kirosy, ny anaran’ireo nody voalohany ary ny nananganana ny alitara: 1–3'
- type: usfm
  marker: io1
  children:
  - type: text
    text: 'Ny fiatoan’ny asa sy ny nitohizan’izany indray: 4–6'
- type: usfm
  marker: io1
  children:
  - type: text
    text: 'Ny fanavaozana ara-pivavahana sy ara-piarahamonina notarihin’i Ezra: 7–10'
