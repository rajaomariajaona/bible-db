document_id: DEU.30,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Hiverina amin’NY TOMPO ny Israely
  - type: text
    content: 'Rehefa tonga aminao izany zavatra rehetra izany, dia ny fitahiana sy ny fanozonana izay nataoko teo anoloanao, ary mahatsiaro izany ao am-ponao any amin’ny firenena rehetra izay androahan’NY TOMPO Andriamanitrao anao ianao '
  '10':
  - type: text
    content: raha mihaino ny feon’NY TOMPO Andriamanitrao ianao, amin’ny fitandremanao ny didiny sy ny lalànany, izay voasoratra amin’ity bokin’ny lalàna ity, ka miverina amin’NY TOMPO Andriamanitrao amin’ny fonao manontolo sy ny fanahinao manontolo.
  - type: heading
    content: Akaiky ny tenin’Andriamanitra
  '11':
  - type: text
    content: 'Fa izao lalàna izao, izay omeko anao anio, dia tsy saro-pantarina ho anao sady tsy lavitra. '
  '12':
  - type: text
    content: 'Tsy any an-danitra izany ka hitenenanao hoe: Iza no hiakatra any an-danitra haka azy ho antsika, mba hohenointsika ka harahintsika? '
  '13':
  - type: text
    content: 'Ary tsy any andafin’ny ranomasina ihany koa ka hitenenanao hoe: Iza no hankany andafin’ny ranomasina haka azy ho antsika mba hohenointsika ka harahintsika? '
  '14':
  - type: text
    content: Fa eo akaikinao indrindra ny teny, dia eo am-bavanao sy ao am-ponao, mba harahinao.
  - type: heading
    content: Mifidiana ny fiainana
  '15':
  - type: text
    content: 'Indro efa nataoko teo anoloanao androany ny fiainana sy ny soa ary ny fahafatesana sy ny loza. '
  '16':
  - type: text
    content: 'Tamin’ny nandidiako anao androany dia ny ho tia NY TOMPO Andriamanitrao ka handeha amin’ny lalany ary hitandrina ny didiny sy ny lalànany mbamin’ny fitsipiny. Mba ho velona ianao sady hihamaro, ary mba hotahìn’NY TOMPO Andriamanitrao ianao any amin’ny tany izay efa hidiranao holovana. '
  '17':
  - type: text
    content: 'Fa raha mivily kosa ny fonao ka tsy mihaino ianao, fa voataona hiankohoka eo anatrehan’izay andriamanitra hafa sy hanompo azy, '
  '18':
  - type: text
    content: 'dia lazaiko aminareo anio fa ho ringana tokoa ianareo, ary tsy ho maro andro eo amin’ny tany izay efa hidiranao holovana, rehefa tafita an’i Jordana ianareo. '
  '19':
  - type: text
    content: 'Miantso ny lanitra sy ny tany aho anio ho vavolombelona aminareo fa efa nataoko teo anoloanao ny fiainana sy ny fahafatesana ary ny fitahiana sy ny fanozonana; koa mifidiana ny fiainana, mba ho velona ianao sy ny taranakao, '
  '2':
  - type: text
    content: 'ka miverina amin’NY TOMPO Andriamanitrao sy mihaino ny feony amin’ny fonao manontolo sy ny fanahinao manontolo, araka izay rehetra andidiako anao sy ny zanakao anio, '
  '20':
  - type: text
    content: dia ny ho tia NY TOMPO Andriamanitrao ianao ka hihaino ny feony sy hifikitra Aminy; fa izany no fiainanao sy fahamaroan’ny andronao, mba honenanao eo amin’ny tany izay nianianan’NY TOMPO tamin’i Abrahama sy Isaka ary i Jakoba razanao, homena azy.
  '3':
  - type: text
    content: 'dia hampodin’NY TOMPO Andriamanitrao avy amin’ny fahababoanao ianao; ary hamindra fo aminao izy ka hanangona anao indray avy any amin’ny firenena rehetra izay nampielezan’NY TOMPO Andriamanitrao anao. '
  '4':
  - type: text
    content: 'Raha misy aminao voaroaka any amin’ny faravodilanitra dia avy any no hanangonan’NY TOMPO Andriamanitrao anao, ary avy any indray no hitondrany anao. '
  '5':
  - type: text
    content: 'Dia hampidirin’NY TOMPO Andriamanitrao ao amin’ny tany izay nolovain’ny razanao ianao ka ho lovanao izany; ary hanisy soa anao Izy sy hahamaro anao mihoatra noho ny razanao. '
  '6':
  - type: text
    content: Dia hoforan’NY TOMPO Andriamanitrao ny fonao sy ny fon’ny taranakao hitiavanao NY TOMPO Andriamanitrao amin’ny fonao manontolo sy ny fanahinao manontolo, mba ho velona ianao.
  '7':
  - type: text
    content: 'Hataon’NY TOMPO Andriamanitrao amin’ny fahavalonao sy izay mankahala anao izay nanenjika anao ireny fanozonana rehetra ireny. '
  '8':
  - type: text
    content: 'Dia hihaino ny feon’NY TOMPO indray ianao ka hanaraka ny didiny rehetra izay omeko anao anio. '
  '9':
  - type: text
    content: 'Ary hataon’NY TOMPO Andriamanitrao manana amby ampy ianao amin’izay hahasoa anao, dia amin’ny asan’ny tananao sy ny ateraky ny kibonao ary ny ateraky ny biby fiompinao sy ny vokatry ny taninao. Fa ho faly aminao indray NY TOMPO ka hanasoa anao, araka izay nampifaliany ny razanao, '
