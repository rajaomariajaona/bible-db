document_id: MIC.7,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Tsy misy intsony ny olona marina
  - type: text
    content: Lozako! Fa efa toy ny mpioty voankazo aho
  - type: text
    content: 'ary toy ny mpitsimpom-boaloboka:'
  - type: text
    content: Tsy misy salohy hohanina,
  - type: text
    content: na aviavy mialin-taona izay mampilendalenda ahy.
  '10':
  - type: text
    content: Hahita izany ilay fahavaloko ka hosaronan-kenatra,
  - type: text
    content: 'dia ilay niteny tamiko hoe: Aiza izay TOMPO Andriamanitrao?'
  - type: text
    content: Ho faly mahita azy ny masoko
  - type: text
    content: rehefa tonga fanitsakitsaka toy ny fotaka eny an-dalambe izy.
  '11':
  - type: text
    content: E, ny andro hananganana ny mandanao,
  - type: text
    content: fa amin’izany andro izany dia hitarina ny faritrao.
  '12':
  - type: text
    content: Amin’izany andro izany dia hanatona anao koa ny olona
  - type: text
    content: avy any Asiria sy avy any amin’ny tanànan’i Ejipta;
  - type: text
    content: eny, hatrany Ejipta ka hatrany amin’ny ony Eofrata,
  - type: text
    content: avy amin’ny ranomasina iray ka hatramin’ny ranomasina iray hafa,
  - type: text
    content: avy amin’ny tendrombohitra iray ka hatramin’ny tendrombohitra iray hafa.
  '13':
  - type: text
    content: Nefa ho lao ny tany noho ny amin’ny mponina eo aminy,
  - type: text
    content: noho ny vokatry ny asany.
  '14':
  - type: text
    content: Ny tehinao no aoka hiandrasanao ny olonao,
  - type: text
    content: dia ny ondry lovanao,
  - type: text
    content: izay monina mitokana any anatin’ny kirihitrala, ao an-tampon’i Karmela.
  - type: text
    content: Aoka handrasana any Basana sy Gileada ireny,
  - type: text
    content: toy ny tamin’ny andro taloha ela.
  '15':
  - type: text
    content: Toy ny tamin’ny andro nivoahanao avy tany amin’ny tany Ejipta
  - type: text
    content: no hanehoako zava-mahagaga aminy.
  '16':
  - type: text
    content: 'Hahita izany ny '
  - type: text
    content: Jentilisa
  - type: text
    content: ka ho rakotra henatra na dia mahery toy inona aza izy ireny;
  - type: text
    content: hitampim-bava izy,
  - type: text
    content: ho tonga marenina ny sofiny.
  '17':
  - type: text
    content: Hilelaka ny vovoka toy ny menarana izy;
  - type: text
    content: hiala amin-kovitra avy ao amin’ny fiarovany mafy
  - type: text
    content: tahaka ny biby mikisaka amin’ny tany izy;
  - type: text
    content: NY TOMPO Andriamanitsika dia hohatoniny amin-kovitra;
  - type: text
    content: eny, hatahotra Anao izy.
  '18':
  - type: text
    content: Iza no Andriamanitra tahaka Anao
  - type: text
    content: izay manaisotra heloka
  - type: text
    content: sady mamela ny fahadisoan’ny sisa amin’ny lovany?
  - type: text
    content: Tsy mitana ny fahatezerany ho mandrakizay Izy
  - type: text
    content: fa tia mamindra fo.
  '19':
  - type: text
    content: Hamindra fo amintsika indray Izy
  - type: text
    content: ka hanitsakitsaka ny fahotantsika;
  - type: text
    content: eny, harianao ho any amin’ny ranomasina lalina ny fahotany rehetra.
  '2':
  - type: text
    content: Lany tsy misy amin’ny tany intsony ny tsara fanahy;
  - type: text
    content: eny, tsy misy marina ao amin’ny olombelona;
  - type: text
    content: samy manao vela-pandrika mba handatsa-dra avokoa izy rehetra
  - type: text
    content: ary mihaza ny rahalahiny amin’ny harato.
  '20':
  - type: text
    content: Hanefa fahamarinana ho an’i Jakoba Ianao
  - type: text
    content: ary famindrampo ho an’i Abrahama,
  - type: text
    content: dia ilay nianiananao tamin’ny razanay hatramin’ny andro taloha ela.
  '3':
  - type: text
    content: Vonona hanao ratsy ny tanany;
  - type: text
    content: be fitakiana ny mpitondra,
  - type: text
    content: miaina amin’ny kolikoly ny mpitsara
  - type: text
    content: ary maneho ny fitsiriritany ny lehibeny,
  - type: text
    content: koa izy rehetra dia miray tsikombakomba.
  '4':
  - type: text
    content: Na dia ny tsara indrindra ao aminy aza dia toy ny voaroy madinidinika misy tsilotsilony
  - type: text
    content: ary na dia ny mahitsy indrindra ao aminy aza dia ratsy noho ny fefy tsilo.
  - type: text
    content: Avy ny andro nambaran’ny mpitilinao
  - type: text
    content: fa hamaliana anao.
  - type: text
    content: Amin’izany dia ho very hevitra izy ireo.
  '5':
  - type: text
    content: Aza matoky namana ianareo,
  - type: text
    content: aza manankim-po amin’ny sakaiza mahazatra
  - type: text
    content: fa ambeno ny varavaran’ny vavanao na dia amin’ny andefimandrinao aza.
  '6':
  - type: text
    content: Fa ny zanakalahy dia manamavo ny rainy,
  - type: text
    content: ny zanakavavy dia mitsangan-kanohitra ny reniny,
  - type: text
    content: ary ny vinantovavy dia hanohitra ny rafozambaviny,
  - type: text
    content: ary ny ankohonan’ny olona ihany no fahavalony.
  '7':
  - type: text
    content: Fa izaho kosa dia hiandrandra NY TOMPO,
  - type: text
    content: eny, hiandry an’Andriamanitry ny famonjena ahy aho.
  - type: text
    content: Ny Andriamanitro no hihaino ahy.
  - type: heading
    content: Fanantenana sy vavaka ataon’ny vahoaka
  '8':
  - type: text
    content: Aza mifaly amin’ny manjo ahy, ry fahavaloko!
  - type: text
    content: Fa na dia lavo aza aho dia mbola hiarina ihany;
  - type: text
    content: raha mitoetra ao amin’ny maizina aho
  - type: text
    content: dia NY TOMPO no fahazavana ho ahy.
  '9':
  - type: text
    content: Ny fahatezeran’NY TOMPO dia hiaretako ihany
  - type: text
    content: satria nanota Taminy aho,
  - type: text
    content: ambara-pandahany ny raharahako
  - type: text
    content: ka hanomezany rariny ahy;
  - type: text
    content: hamoaka ahy ho amin’ny mazava izy
  - type: text
    content: ka ho faly aho mahita ny fahamarinany.
