document_id: MIC.7,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Tsy misy intsony ny olona marina
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lozako! Fa efa toy ny mpioty voankazo aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ary toy ny mpitsimpom-boaloboka:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy misy salohy hohanina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na aviavy mialin-taona izay mampilendalenda ahy.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hahita izany ilay fahavaloko ka hosaronan-kenatra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'dia ilay niteny tamiko hoe: Aiza izay TOMPO Andriamanitrao?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho faly mahita azy ny masoko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: rehefa tonga fanitsakitsaka toy ny fotaka eny an-dalambe izy.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: E, ny andro hananganana ny mandanao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa amin’izany andro izany dia hitarina ny faritrao.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Amin’izany andro izany dia hanatona anao koa ny olona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avy any Asiria sy avy any amin’ny tanànan’i Ejipta;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, hatrany Ejipta ka hatrany amin’ny ony Eofrata,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avy amin’ny ranomasina iray ka hatramin’ny ranomasina iray hafa,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avy amin’ny tendrombohitra iray ka hatramin’ny tendrombohitra iray hafa.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nefa ho lao ny tany noho ny amin’ny mponina eo aminy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: noho ny vokatry ny asany.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny tehinao no aoka hiandrasanao ny olonao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ny ondry lovanao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay monina mitokana any anatin’ny kirihitrala, ao an-tampon’i Karmela.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka handrasana any Basana sy Gileada ireny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toy ny tamin’ny andro taloha ela.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toy ny tamin’ny andro nivoahanao avy tany amin’ny tany Ejipta
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no hanehoako zava-mahagaga aminy.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Hahita izany ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jentilisa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka ho rakotra henatra na dia mahery toy inona aza izy ireny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hitampim-bava izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho tonga marenina ny sofiny.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hilelaka ny vovoka toy ny menarana izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hiala amin-kovitra avy ao amin’ny fiarovany mafy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tahaka ny biby mikisaka amin’ny tany izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: NY TOMPO Andriamanitsika dia hohatoniny amin-kovitra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, hatahotra Anao izy.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Iza no Andriamanitra tahaka Anao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay manaisotra heloka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady mamela ny fahadisoan’ny sisa amin’ny lovany?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy mitana ny fahatezerany ho mandrakizay Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa tia mamindra fo.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hamindra fo amintsika indray Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hanitsakitsaka ny fahotantsika;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, harianao ho any amin’ny ranomasina lalina ny fahotany rehetra.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lany tsy misy amin’ny tany intsony ny tsara fanahy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, tsy misy marina ao amin’ny olombelona;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: samy manao vela-pandrika mba handatsa-dra avokoa izy rehetra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mihaza ny rahalahiny amin’ny harato.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hanefa fahamarinana ho an’i Jakoba Ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary famindrampo ho an’i Abrahama,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ilay nianiananao tamin’ny razanay hatramin’ny andro taloha ela.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vonona hanao ratsy ny tanany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: be fitakiana ny mpitondra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: miaina amin’ny kolikoly ny mpitsara
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary maneho ny fitsiriritany ny lehibeny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: koa izy rehetra dia miray tsikombakomba.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na dia ny tsara indrindra ao aminy aza dia toy ny voaroy madinidinika misy tsilotsilony
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary na dia ny mahitsy indrindra ao aminy aza dia ratsy noho ny fefy tsilo.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avy ny andro nambaran’ny mpitilinao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa hamaliana anao.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Amin’izany dia ho very hevitra izy ireo.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aza matoky namana ianareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aza manankim-po amin’ny sakaiza mahazatra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ambeno ny varavaran’ny vavanao na dia amin’ny andefimandrinao aza.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny zanakalahy dia manamavo ny rainy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny zanakavavy dia mitsangan-kanohitra ny reniny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny vinantovavy dia hanohitra ny rafozambaviny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny ankohonan’ny olona ihany no fahavalony.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa izaho kosa dia hiandrandra NY TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, hiandry an’Andriamanitry ny famonjena ahy aho.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny Andriamanitro no hihaino ahy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fanantenana sy vavaka ataon’ny vahoaka
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aza mifaly amin’ny manjo ahy, ry fahavaloko!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa na dia lavo aza aho dia mbola hiarina ihany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: raha mitoetra ao amin’ny maizina aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia NY TOMPO no fahazavana ho ahy.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fahatezeran’NY TOMPO dia hiaretako ihany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria nanota Taminy aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ambara-pandahany ny raharahako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hanomezany rariny ahy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hamoaka ahy ho amin’ny mazava izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka ho faly aho mahita ny fahamarinany.
