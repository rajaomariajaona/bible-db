document_id: PSA.102
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fahoriana sy fanantenana
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: Vavaka ataon’ny ory raha reraka izy ka mandoatra ny alahelony eo anatrehan’NY TOMPO.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: TOMPO ô, henoy ny vavaka ataoko
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary aoka hankeo Aminao ny fitarainako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Aza manafina ny tavanao amiko amin’ny andro fahoriako;
- type: usfm
  marker: q1
  children:
  - type: text
    text: atongilano amiko ny sofinao amin’ny andro itarainako;
- type: usfm
  marker: q1
  children:
  - type: text
    text: faingàna hamaly ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Fa levon-ko setroka ny androko
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mahamay tahaka ny forohana sisa tsy may ny taolako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Voakapa tahaka ny ahitra ny foko ka malazo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa hadinoko na dia ny mihinan-kanina aza.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Noho ny fisentoan’ny foko
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia miraikitra amin’ny hoditro ny taolako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Tahaka ny sama any an-tany efitra aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tahaka ny vorondolo any an-tanàna haolo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Tsy mahita tory aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady tahaka ny voronkely manirery eo amin’ny tafon-trano.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Mandatsa ahy mandritra ny andro ny fahavaloko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay misafoaka amiko dia manao ahy ho fiozonana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Fa lavenona no nohaniko tahaka ny mofo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny zavatra nosotroiko dia noharoharoako ny ranomasoko,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: noho ny fahaviniranao sy ny fahatezeranao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa naingainao aho kanefa natontanao indray.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ny androko dia tahaka ny aloka efa mandroso
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary efa malazo tahaka ny ahitra aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Nefa Ianao, TOMPO ô, dia mipetraka manjaka mandrakizay;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny fahatsiarovana Anao dia mihatra amin’ny taranaka fara aman-dimby.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Hitsangana Ianao ka hamindra fo amin’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Ziona
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa efa andro hamindrana fo aminy izao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, tonga izao ny fotoana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Fa sitraky ny mpanomponao ny vatony
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady malahelo ny vovo-taniny izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Hatahotra ny anaran’NY TOMPO ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jentilisa
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hatahotra ny voninahitrao ny mpanjaka rehetra amin’ny tany;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: fa nanangana an’i Ziona NY TOMPO;
- type: usfm
  marker: q1
  children:
  - type: text
    text: niseho tamin’ny voninahiny Izy;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: nijery ny vavaka nataon’ny mahantra Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy nanevateva ny vavaka nataony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Hosoratana ho an’ny taranaka mandimby izany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary izay firenena mbola hoforonina no hidera NY TOMPO;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: fa mitazana avy any amin’ny fitoerany masina any amin’ny avo Izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: avy any an-danitra no nitsinjovan’NY TOMPO ny tany
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: mba hihaino ny fisentoan’ny mpifatotra
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy hanafaka izay voatendry ho faty,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: mba hotorina any Ziona ny anaran’NY TOMPO
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary any Jerosalema ny fiderana Azy
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: rehefa tafangona ny firenena
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny fanjakana maro hanompo NY TOMPO.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Efa nahaketraka ny heriko tany an-dalana Izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: efa nahafohy ny androko Izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Hoy aho: Andriamanitro ô, aza maka ahy antenantenan’ny androko;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny taonanao dia mihatra amin’ny taranaka fara aman-dimby.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Tany aloha no nanorenanao ny tany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary asan’ny tananao ny lanitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Ireo dia ho levona fa Ianao no maharitra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho rovitra toy ny fitafiana izy rehetra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: toy ny lamba no hanovanao azy ka hosoloana izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Fa Ianao no tsy miova
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny taonanao no tsy ho tapitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Handry fehizay ny zanaky ny mpanomponao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hampitoerina eo anatrehanao ny taranany.
