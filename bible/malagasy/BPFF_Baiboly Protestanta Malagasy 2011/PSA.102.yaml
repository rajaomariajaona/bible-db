verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fahoriana sy fanantenana
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: Vavaka ataon’ny ory raha reraka izy ka mandoatra ny alahelony eo anatrehan’NY TOMPO.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: TOMPO ô, henoy ny vavaka ataoko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary aoka hankeo Aminao ny fitarainako.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: noho ny fahaviniranao sy ny fahatezeranao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa naingainao aho kanefa natontanao indray.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Ny androko dia tahaka ny aloka efa mandroso
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary efa malazo tahaka ny ahitra aho.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Nefa Ianao, TOMPO ô, dia mipetraka manjaka mandrakizay;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny fahatsiarovana Anao dia mihatra amin’ny taranaka fara aman-dimby.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Hitsangana Ianao ka hamindra fo amin’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Ziona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa efa andro hamindrana fo aminy izao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, tonga izao ny fotoana.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Fa sitraky ny mpanomponao ny vatony
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady malahelo ny vovo-taniny izy.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Hatahotra ny anaran’NY TOMPO ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jentilisa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hatahotra ny voninahitrao ny mpanjaka rehetra amin’ny tany;
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: fa nanangana an’i Ziona NY TOMPO;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: niseho tamin’ny voninahiny Izy;
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: nijery ny vavaka nataon’ny mahantra Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy nanevateva ny vavaka nataony.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Hosoratana ho an’ny taranaka mandimby izany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary izay firenena mbola hoforonina no hidera NY TOMPO;
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: fa mitazana avy any amin’ny fitoerany masina any amin’ny avo Izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avy any an-danitra no nitsinjovan’NY TOMPO ny tany
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Aza manafina ny tavanao amiko amin’ny andro fahoriako;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: atongilano amiko ny sofinao amin’ny andro itarainako;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: faingàna hamaly ahy.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: mba hihaino ny fisentoan’ny mpifatotra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy hanafaka izay voatendry ho faty,
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: mba hotorina any Ziona ny anaran’NY TOMPO
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary any Jerosalema ny fiderana Azy
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: rehefa tafangona ny firenena
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny fanjakana maro hanompo NY TOMPO.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Efa nahaketraka ny heriko tany an-dalana Izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: efa nahafohy ny androko Izy.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Hoy aho: Andriamanitro ô, aza maka ahy antenantenan’ny androko;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny taonanao dia mihatra amin’ny taranaka fara aman-dimby.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Tany aloha no nanorenanao ny tany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary asan’ny tananao ny lanitra.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Ireo dia ho levona fa Ianao no maharitra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho rovitra toy ny fitafiana izy rehetra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toy ny lamba no hanovanao azy ka hosoloana izy.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Fa Ianao no tsy miova
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny taonanao no tsy ho tapitra.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Handry fehizay ny zanaky ny mpanomponao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hampitoerina eo anatrehanao ny taranany.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Fa levon-ko setroka ny androko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mahamay tahaka ny forohana sisa tsy may ny taolako.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Voakapa tahaka ny ahitra ny foko ka malazo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa hadinoko na dia ny mihinan-kanina aza.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Noho ny fisentoan’ny foko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia miraikitra amin’ny hoditro ny taolako.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Tahaka ny sama any an-tany efitra aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tahaka ny vorondolo any an-tanàna haolo.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Tsy mahita tory aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady tahaka ny voronkely manirery eo amin’ny tafon-trano.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Mandatsa ahy mandritra ny andro ny fahavaloko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay misafoaka amiko dia manao ahy ho fiozonana.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Fa lavenona no nohaniko tahaka ny mofo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny zavatra nosotroiko dia noharoharoako ny ranomasoko,
