document_id: PSA.102,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Fahoriana sy fanantenana
  - type: text
    content: Vavaka ataon’ny ory raha reraka izy ka mandoatra ny alahelony eo anatrehan’NY TOMPO.
  - type: text
    content: TOMPO ô, henoy ny vavaka ataoko
  - type: text
    content: ary aoka hankeo Aminao ny fitarainako.
  '10':
  - type: text
    content: noho ny fahaviniranao sy ny fahatezeranao;
  - type: text
    content: fa naingainao aho kanefa natontanao indray.
  '11':
  - type: text
    content: Ny androko dia tahaka ny aloka efa mandroso
  - type: text
    content: ary efa malazo tahaka ny ahitra aho.
  '12':
  - type: text
    content: Nefa Ianao, TOMPO ô, dia mipetraka manjaka mandrakizay;
  - type: text
    content: ny fahatsiarovana Anao dia mihatra amin’ny taranaka fara aman-dimby.
  '13':
  - type: text
    content: 'Hitsangana Ianao ka hamindra fo amin’i '
  - type: text
    content: Ziona
  - type: text
    content: fa efa andro hamindrana fo aminy izao;
  - type: text
    content: eny, tonga izao ny fotoana.
  '14':
  - type: text
    content: Fa sitraky ny mpanomponao ny vatony
  - type: text
    content: sady malahelo ny vovo-taniny izy.
  '15':
  - type: text
    content: 'Hatahotra ny anaran’NY TOMPO ny '
  - type: text
    content: Jentilisa
  - type: text
    content: ary hatahotra ny voninahitrao ny mpanjaka rehetra amin’ny tany;
  '16':
  - type: text
    content: fa nanangana an’i Ziona NY TOMPO;
  - type: text
    content: niseho tamin’ny voninahiny Izy;
  '17':
  - type: text
    content: nijery ny vavaka nataon’ny mahantra Izy
  - type: text
    content: ka tsy nanevateva ny vavaka nataony.
  '18':
  - type: text
    content: Hosoratana ho an’ny taranaka mandimby izany
  - type: text
    content: ary izay firenena mbola hoforonina no hidera NY TOMPO;
  '19':
  - type: text
    content: fa mitazana avy any amin’ny fitoerany masina any amin’ny avo Izy;
  - type: text
    content: avy any an-danitra no nitsinjovan’NY TOMPO ny tany
  '2':
  - type: text
    content: Aza manafina ny tavanao amiko amin’ny andro fahoriako;
  - type: text
    content: atongilano amiko ny sofinao amin’ny andro itarainako;
  - type: text
    content: faingàna hamaly ahy.
  '20':
  - type: text
    content: mba hihaino ny fisentoan’ny mpifatotra
  - type: text
    content: sy hanafaka izay voatendry ho faty,
  '21':
  - type: text
    content: mba hotorina any Ziona ny anaran’NY TOMPO
  - type: text
    content: ary any Jerosalema ny fiderana Azy
  '22':
  - type: text
    content: rehefa tafangona ny firenena
  - type: text
    content: sy ny fanjakana maro hanompo NY TOMPO.
  '23':
  - type: text
    content: Efa nahaketraka ny heriko tany an-dalana Izy;
  - type: text
    content: efa nahafohy ny androko Izy.
  '24':
  - type: text
    content: 'Hoy aho: Andriamanitro ô, aza maka ahy antenantenan’ny androko;'
  - type: text
    content: ny taonanao dia mihatra amin’ny taranaka fara aman-dimby.
  '25':
  - type: text
    content: Tany aloha no nanorenanao ny tany
  - type: text
    content: ary asan’ny tananao ny lanitra.
  '26':
  - type: text
    content: Ireo dia ho levona fa Ianao no maharitra;
  - type: text
    content: ho rovitra toy ny fitafiana izy rehetra;
  - type: text
    content: toy ny lamba no hanovanao azy ka hosoloana izy.
  '27':
  - type: text
    content: Fa Ianao no tsy miova
  - type: text
    content: ary ny taonanao no tsy ho tapitra.
  '28':
  - type: text
    content: Handry fehizay ny zanaky ny mpanomponao
  - type: text
    content: ary hampitoerina eo anatrehanao ny taranany.
  '3':
  - type: text
    content: Fa levon-ko setroka ny androko
  - type: text
    content: ary mahamay tahaka ny forohana sisa tsy may ny taolako.
  '4':
  - type: text
    content: Voakapa tahaka ny ahitra ny foko ka malazo,
  - type: text
    content: fa hadinoko na dia ny mihinan-kanina aza.
  '5':
  - type: text
    content: Noho ny fisentoan’ny foko
  - type: text
    content: dia miraikitra amin’ny hoditro ny taolako.
  '6':
  - type: text
    content: Tahaka ny sama any an-tany efitra aho
  - type: text
    content: ary tahaka ny vorondolo any an-tanàna haolo.
  '7':
  - type: text
    content: Tsy mahita tory aho
  - type: text
    content: sady tahaka ny voronkely manirery eo amin’ny tafon-trano.
  '8':
  - type: text
    content: Mandatsa ahy mandritra ny andro ny fahavaloko;
  - type: text
    content: izay misafoaka amiko dia manao ahy ho fiozonana.
  '9':
  - type: text
    content: Fa lavenona no nohaniko tahaka ny mofo;
  - type: text
    content: ny zavatra nosotroiko dia noharoharoako ny ranomasoko,
