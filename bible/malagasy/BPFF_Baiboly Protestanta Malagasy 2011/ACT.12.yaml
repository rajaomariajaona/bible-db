document_id: ACT.12,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny namonoana an’i Jakoba sy ny nampidirana an’i Petera tany an-tranomaizina
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Tamin’izany andro izany dia nanatsotra ny tanany hampahory ny sasany tamin’ny fiangonana i Heroda mpanjaka. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Rehefa nandalo ny fiambenana voalohany sy faharoa izy dia tonga teo amin’ny vavahady vy izay mahazo ny lalana ho any an-tanàna; ary nivoha ho azy io mba handehanany; nony tafavoaka izy ireo dia nandroso tamin’ny lalana iray; ary niaraka tamin’izay dia nandao azy ilay anjely.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Rehefa nahatsiaro tena i Petera dia hoy izy: Fantatro marina tokoa ankehitriny fa ny Tompo no naniraka ny anjeliny ka namonjy ahy tamin’ny tanan’i Heroda sy izay rehetra nandrasan’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jiosy
    - type: text
      text: '. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Rehefa nahazo an-tsaina izany izy dia nankany amin’ny tranon’i Maria, renin’i Jaona, izay antsoina koa hoe Marka, ary nisy olona maro vory tao nivavaka. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ary raha nandondòna ny vavahady i Petera dia nisy mpanompovavy antsoina hoe Roda nankeo mba hihaino. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Rehefa nahalala ny feon’i Petera izy dia tsy namoha ny vavahady noho ny hafaliany fa lasa nihazakazaka ary niditra ka nilaza fa i Petera no mijoro ao am-bavahady. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Dia hoy ny olona taminy: Very saina ianao. Nefa nanizingizina izy fa izany tokoa. Dia hoy indray ny olona: Anjeliny izany. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Fa naharitra nandondòna ihany i Petera, ary rehefa novohan’izy ireo izy dia hitany ka talanjona ireo. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Fa izy nibaiko tanana azy ireo mba hangina, dia nitantara taminy izay namoahan’ny Tompo azy avy tao an-tranomaizina sady hoy izy: Ambarao amin’i Jakoba sy ny rahalahy izany zavatra izany. Dia niala teo izy ka lasa nankany amin’ny toerana hafa.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Rehefa nazava ny andro dia nifanaritaka be ihany ny miaramila ka niteny hoe: Nankaiza i Petera? '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Rehefa nitady azy fatratra i Heroda nefa tsy nahita dia nadininy ny mpiambina ka nasainy novonoina. Ary nidina niala tany '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jodia
    - type: text
      text: ' hankany Kaisaria izy dia nijanona tany.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nahafatesan’i Heroda Agripa mpanjaka
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Novonoiny tamin’ny sabatra i Jakoba, rahalahin’i Jaona. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Tezitra mafy tamin’ny Tiriana sy ny Sidoniana i Heroda; nefa niray saina kosa ireo ka nankany aminy, koa rehefa nahazo an’i Blasto, mpitandrina ny trano fandrian’ny mpanjaka ho sakaizany izy ireo, dia nangataka fihavanana, satria ny taniny dia nivelona tamin’ny tanin’ny mpanjaka. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Koa tamin’ny andro voatendry dia niakanjo fanamian’ny mpanjaka i Heroda ka nipetraka teo ambonin’ny sezafiandrianany, ary nikabary tamin’ny vahoaka. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Dia niantsoantso ny vahoaka hoe: Feon’Andriamanitra izany fa tsy an’olona! '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Niaraka tamin’izay dia nisy anjelin’ny Tompo namely azy satria tsy nanome voninahitra an’Andriamanitra izy; koa nohanin’ny kankana izy dia maty.
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Ary nandroso sy niely ny tenin’Andriamanitra. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Niverina nankany Jerosalema i Barnabasy sy i Saoly rehefa vita ny fanompoany, dia nitondra an’i Jaona izay antsoina koa hoe Marka, hiaraka aminy.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Rehefa hitany fa sitraky ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jiosy
    - type: text
      text: ' izany dia niroso hisambotra an’i Petera koa izy. Efa antomotra ny andro fihinanana ny mofo tsy misy masirasira tamin’izay. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Rehefa nosamboriny izy dia nataony tao an-tranomaizina ka natolony hambenan’antoko-miaramila efatra izay nisy miaramila efatra avy; nikasa hamoaka azy ho eo amin’ny vahoaka mantsy izy rehefa afaka ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Paska
    - type: text
      text: '. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Dia nambenana tao an-tranomaizina i Petera; ary ny fiangonana dia nahery nangataka ho azy tamin’Andriamanitra.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Nafahana i Petera
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Nony efa hamoaka azy i Heroda dia natory teo anelanelan’ny miaramila roa lahy i Petera tamin’iny alina iny, sady voafatotra tamin’ny gadra roa; ary nisy mpiambina teo am-baravarana niambina ny tranomaizina. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ary indro, nisy anjelin’ny Tompo tonga teo sady nisy mazava namirapiratra tao an-trano; ary nanohina ny tehezan’i Petera ilay anjely, dia namoha azy ka niteny hoe: Mitsangàna haingana. Dia niala tamin’ny tanany ny gadra. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Hoy koa ilay anjely taminy: Misikìna ary fehezo ny kapanao. Dia nataony izany. Ary hoy koa izy: Anaovy ny akanjonao ivelany ka manaraha ahy. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Dia nivoaka nanaraka ilay anjely izy; ary tsy fantany ho tena nisy marina ny nataon’ny anjely; noheveriny fa fahitana no hitany. '
