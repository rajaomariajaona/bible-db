document_id: ISA.5,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny tanim-boaloboky NY TOMPO
  - type: text
    content: Avelao aho hihira ho an’ny malalako,
  - type: text
    content: dia ny hiran’ny malalako ny amin’ny tanim-boalobony.
  - type: text
    content: Ny malalako dia nanana tanim-boaloboka
  - type: text
    content: teo amin’ny havoana lonaka.
  '10':
  - type: text
    content: ' '
  - type: text
    content: Bata
  - type: text
    content: ' iray monja no ho vokatry ny tanim-boaloboka folo zemeda'
  - type: note
    content: 'Zemeda: velaran-tany voaasa indray andro amin’ny angadinomby.'
  - type: text
    content: ','
  - type: text
    content: 'ary eran’ny '
  - type: text
    content: efaha
  - type: text
    content: ' monja no ho vokatry ny masomboly eran’ny homera.'
  '11':
  - type: text
    content: Lozan’izay mifoha vao maraina
  - type: text
    content: ka mitady toaka,
  - type: text
    content: izay miboboka mandra-paharivan’ny andro ka ampirehetin’ny divay!
  '12':
  - type: text
    content: Ny lokanga sy ny valiha, ny ampongatapaka sy ny sodina
  - type: text
    content: ary ny divay no foto-panasany;
  - type: text
    content: nefa tsy mba jereny ny asan’NY TOMPO,
  - type: text
    content: ary tsy mba hitany ny asan’ny tanany.
  '13':
  - type: text
    content: Vokatr’izany dia ho lasan-ko babo ny oloko
  - type: text
    content: noho ny tsy fahalalany;
  - type: text
    content: ho mosarena ny olona ambony
  - type: text
    content: ary ho mainan’ny hetaheta ny valalabemandry.
  '14':
  - type: text
    content: 'Koa izany no mampitanatana vava ny '
  - type: text
    content: fitoeran’ny maty
  - type: text
    content: hanao teli-moka an’i Jerosalema;
  - type: text
    content: any no hivarinan’ny olo-manankajany sy ny valalabemandriny
  - type: text
    content: ary ny tabatabany mbamin’ny fifaliany.
  '15':
  - type: text
    content: Hatao mitanondrika ny zanak’olombelona
  - type: text
    content: ary haetry ny olona;
  - type: text
    content: ny mason’ny miandranandram-pijery dia haidina.
  '16':
  - type: text
    content: Fa Andriamanitra, Tompon’izao rehetra izao, no hisandratra amin’ny fitsarany marina,
  - type: text
    content: ary Andriamanitra masina dia hiseho ho masina amin’ny fahamarinana.
  '17':
  - type: text
    content: Hiraoka ahitra toy ny eny amin’ny tany fiandrasana azy ihany ny zanak’ondry,
  - type: text
    content: ary any an-tany foana no hipetrahan’ny ondry matavy
  - type: text
    content: ka mpirenireny no hiandry ondry ao.
  '18':
  - type: text
    content: Lozan’izay mitari-keloka amin’ny kofehin’ny famitahana,
  - type: text
    content: ary mitarika ota toy ny amin’ny mahazakan-tsarety
  '19':
  - type: text
    content: 'sady miteny hoe: Aoka hohafainganiny'
  - type: text
    content: sy hododonany ny asany
  - type: text
    content: mba ho hitantsika!
  - type: text
    content: Ary aoka hanakaiky sy ho tanteraka
  - type: text
    content: izay kasain’ny Iray Masin’ny Israely
  - type: text
    content: ka ho fantatsika!
  '2':
  - type: text
    content: Nasainy io ka nesoriny ny vato
  - type: text
    content: dia novoleny karazam-boaloboka tsara;
  - type: text
    content: nanao trano fiambenana teo afovoany Izy
  - type: text
    content: ary nandavaka famiazam-boaloboka teo.
  - type: text
    content: Dia nanantena azy hamoa voaloboka tsara Izy,
  - type: text
    content: kanjo namoa voalobo-dratsy io.
  '20':
  - type: text
    content: Lozan’izay milaza ny ratsy ho tsara
  - type: text
    content: ary ny tsara ho ratsy,
  - type: text
    content: izay manao ny maizina ho mazava
  - type: text
    content: ary ny mazava ho maizina,
  - type: text
    content: izay manao ny mangidy ho mamy
  - type: text
    content: ary ny mamy ho mangidy!
  '21':
  - type: text
    content: Lozan’izay manao azy ho hendry
  - type: text
    content: sy mihevi-tena ho manan-tsaina!
  '22':
  - type: text
    content: Lozan’izay raindahiny amin’ny fisotroan-divay
  - type: text
    content: sy mahery amin’ny fampiharoharoana karazan-toaka!
  '23':
  - type: text
    content: Manamarina ny meloka noho ny kolikoly izy
  - type: text
    content: sady manala ny rariny amin’ny marina!
  '24':
  - type: text
    content: Koa toy ny fandevon’ny lelafo ny mololo
  - type: text
    content: sy toy ny fihalevonan’ny bozaka midedadeda
  - type: text
    content: no hahalovan’ny fotony
  - type: text
    content: sy hijofoan’ny voniny tahaka ny vovoka,
  - type: text
    content: satria efa nandà ny lalànan’Andriamanitra, Tompon’izao rehetra izao, izy
  - type: text
    content: sy nanamavo ny tenin’ny Iray Masin’ny Israely.
  '25':
  - type: text
    content: Koa izany no irehetan’ny fahatezeran’NY TOMPO amin’ny olony
  - type: text
    content: sy anaingany ny tanany aminy ka amelezany azy;
  - type: text
    content: dia mihorohoro ny tendrombohitra,
  - type: text
    content: ary ny fatin’ny olona dia tonga tahaka ny fako eny an-dalambe.
  - type: text
    content: Kanefa na eo aza izany rehetra izany dia tsy mbola afaka ihany ny fahatezerany
  - type: text
    content: fa mbola miainga ihany ny tanany.
  - type: heading
    content: Ilay mpanafika tsy hay sakanana
  '26':
  - type: text
    content: Hanangana faneva ho amin’ny firenena lavitra Izy
  - type: text
    content: sady hisiaka hiantso firenena iray avy any am-paran’ny tany;
  - type: text
    content: ary indro, avy haingana dia haingana izy.
  '27':
  - type: text
    content: Tsy hisy reraka na tafintohina aminy;
  - type: text
    content: tsy hisy ho rendremana na hatory;
  - type: text
    content: tsy hisy hanana fehikibo miboraka,
  - type: text
    content: na fehin-kapa tapaka;
  '28':
  - type: text
    content: Maranitra ny zana-tsipìkany
  - type: text
    content: ary voahenjana avokoa ny tsipìkany;
  - type: text
    content: ny kitron-tsoavaliny dia atao ho tahaka ny afovato,
  - type: text
    content: ary ny kodiarany dia ho tahaka ny tadio.
  '29':
  - type: text
    content: Ny fierony dia tahaka ny fieron’ny liom-bavy;
  - type: text
    content: mierona tahaka ny liona tanora izy; eny, manerona izy
  - type: text
    content: ka mandrapaka ny remby, lasany izany
  - type: text
    content: ka tsy azo alaina intsony.
  '3':
  - type: text
    content: Noho izany, ry mponina any Jerosalema sy ry lehilahy amin’ny Joda,
  - type: text
    content: miangavy anareo aho, tsarao Aho sy ny tanim-boaloboko!
  '30':
  - type: text
    content: Hisy hirohondrohona aminy amin’izany andro izany,
  - type: text
    content: tahaka ny firohondrohon’ny ranomasina;
  - type: text
    content: ary raha mijery ny tany ny olona dia indro haizina sy fahoriana;
  - type: text
    content: ary ny fahazavana dia hohamaizinin’ny rahona matevina.
  '4':
  - type: text
    content: Inona moa no mbola azo natao tamin’ny tanim-boaloboko
  - type: text
    content: ka tsy efa nataoko taminy?
  - type: text
    content: Koa raha nanantena azy
  - type: text
    content: hamoa voaloboka tsara Aho,
  - type: text
    content: nahoana no namoa voalobo-dratsy izy?
  '5':
  - type: text
    content: Koa ankehitriny, aoka hambarako anareo
  - type: text
    content: izay hataoko amin’ny tanim-boaloboko.
  - type: text
    content: Hesoriko ny fefy tsilony
  - type: text
    content: ka holevonina izy;
  - type: text
    content: harodako ny fefy vatony
  - type: text
    content: ka ho voahitsakitsaka izy;
  '6':
  - type: text
    content: 'Hataoko simba tanteraka izy:'
  - type: text
    content: Tsy hohetezana ny sampam-boalobony ary tsy hohevoina izy
  - type: text
    content: fa ho rakotry ny anjavidy sy ny tsilo.
  - type: text
    content: Ary hodidiako ny rahona tsy hampilatsaka ranonorana aminy.
  '7':
  - type: text
    content: Fa tanim-boalobok’Andriamanitra, Tompon’izao rehetra izao,
  - type: text
    content: ny taranak’Israely,
  - type: text
    content: ary ny lehilahy amin’i Joda
  - type: text
    content: no voly tiany.
  - type: text
    content: Dia nanantena fitsarana marina Izy,
  - type: text
    content: kanjo indro, heloka be vava!
  - type: text
    content: Niandry fahamarinana Izy,
  - type: text
    content: kanjo indro, fitarainana!
  - type: heading
    content: Ireo izay mihantsy ny fahatezeran’NY TOMPO
  '8':
  - type: text
    content: Lozanareo izay manampy trano amin’ny trano
  - type: text
    content: sady manampy saha amin’ny saha
  - type: text
    content: ambara-paha tsy hisy hitoeran’ny sasany intsony!
  - type: text
    content: Fa ianareo irery no monina eo amin’ny tany!
  '9':
  - type: text
    content: 'Izao no ren’ny sofiko tamin’Andriamanitra, Tompon’izao rehetra izao:'
  - type: text
    content: Marina tokoa fa ho foana ny trano maro;
  - type: text
    content: eny, na dia izay lehibe sady tsara aza dia tsy hisy mpitoetra.
