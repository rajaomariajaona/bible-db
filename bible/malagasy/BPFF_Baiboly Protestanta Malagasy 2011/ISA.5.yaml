document_id: ISA.5
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny tanim-boaloboky NY TOMPO
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Avelao aho hihira ho an’ny malalako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ny hiran’ny malalako ny amin’ny tanim-boalobony.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny malalako dia nanana tanim-boaloboka
- type: usfm
  marker: q1
  children:
  - type: text
    text: teo amin’ny havoana lonaka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Nasainy io ka nesoriny ny vato
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia novoleny karazam-boaloboka tsara;
- type: usfm
  marker: q1
  children:
  - type: text
    text: nanao trano fiambenana teo afovoany Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary nandavaka famiazam-boaloboka teo.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia nanantena azy hamoa voaloboka tsara Izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: kanjo namoa voalobo-dratsy io.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Noho izany, ry mponina any Jerosalema sy ry lehilahy amin’ny Joda,
- type: usfm
  marker: q1
  children:
  - type: text
    text: miangavy anareo aho, tsarao Aho sy ny tanim-boaloboko!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Inona moa no mbola azo natao tamin’ny tanim-boaloboko
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy efa nataoko taminy?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Koa raha nanantena azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: hamoa voaloboka tsara Aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nahoana no namoa voalobo-dratsy izy?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Koa ankehitriny, aoka hambarako anareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay hataoko amin’ny tanim-boaloboko.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hesoriko ny fefy tsilony
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka holevonina izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: harodako ny fefy vatony
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka ho voahitsakitsaka izy;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Hataoko simba tanteraka izy:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy hohetezana ny sampam-boalobony ary tsy hohevoina izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ho rakotry ny anjavidy sy ny tsilo.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hodidiako ny rahona tsy hampilatsaka ranonorana aminy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Fa tanim-boalobok’Andriamanitra, Tompon’izao rehetra izao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny taranak’Israely,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny lehilahy amin’i Joda
- type: usfm
  marker: q1
  children:
  - type: text
    text: no voly tiany.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia nanantena fitsarana marina Izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: kanjo indro, heloka be vava!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Niandry fahamarinana Izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: kanjo indro, fitarainana!
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ireo izay mihantsy ny fahatezeran’NY TOMPO
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Lozanareo izay manampy trano amin’ny trano
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady manampy saha amin’ny saha
- type: usfm
  marker: q1
  children:
  - type: text
    text: ambara-paha tsy hisy hitoeran’ny sasany intsony!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ianareo irery no monina eo amin’ny tany!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Izao no ren’ny sofiko tamin’Andriamanitra, Tompon’izao rehetra izao:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Marina tokoa fa ho foana ny trano maro;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, na dia izay lehibe sady tsara aza dia tsy hisy mpitoetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Bata
  - type: text
    text: ' iray monja no ho vokatry ny tanim-boaloboka folo zemeda'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Zemeda: '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: velaran-tany voaasa indray andro amin’ny angadinomby.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ary eran’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: efaha
  - type: text
    text: ' monja no ho vokatry ny masomboly eran’ny homera.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Lozan’izay mifoha vao maraina
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka mitady toaka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay miboboka mandra-paharivan’ny andro ka ampirehetin’ny divay!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ny lokanga sy ny valiha, ny ampongatapaka sy ny sodina
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny divay no foto-panasany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa tsy mba jereny ny asan’NY TOMPO,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy mba hitany ny asan’ny tanany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Vokatr’izany dia ho lasan-ko babo ny oloko
- type: usfm
  marker: q1
  children:
  - type: text
    text: noho ny tsy fahalalany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho mosarena ny olona ambony
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ho mainan’ny hetaheta ny valalabemandry.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Koa izany no mampitanatana vava ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: fitoeran’ny maty
- type: usfm
  marker: q1
  children:
  - type: text
    text: hanao teli-moka an’i Jerosalema;
- type: usfm
  marker: q1
  children:
  - type: text
    text: any no hivarinan’ny olo-manankajany sy ny valalabemandriny
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny tabatabany mbamin’ny fifaliany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Hatao mitanondrika ny zanak’olombelona
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary haetry ny olona;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny mason’ny miandranandram-pijery dia haidina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Fa Andriamanitra, Tompon’izao rehetra izao, no hisandratra amin’ny fitsarany marina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary Andriamanitra masina dia hiseho ho masina amin’ny fahamarinana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Hiraoka ahitra toy ny eny amin’ny tany fiandrasana azy ihany ny zanak’ondry,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary any an-tany foana no hipetrahan’ny ondry matavy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka mpirenireny no hiandry ondry ao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Lozan’izay mitari-keloka amin’ny kofehin’ny famitahana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mitarika ota toy ny amin’ny mahazakan-tsarety
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'sady miteny hoe: Aoka hohafainganiny'
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy hododonany ny asany
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba ho hitantsika!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary aoka hanakaiky sy ho tanteraka
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay kasain’ny Iray Masin’ny Israely
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka ho fantatsika!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Lozan’izay milaza ny ratsy ho tsara
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny tsara ho ratsy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay manao ny maizina ho mazava
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny mazava ho maizina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay manao ny mangidy ho mamy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny mamy ho mangidy!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Lozan’izay manao azy ho hendry
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy mihevi-tena ho manan-tsaina!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Lozan’izay raindahiny amin’ny fisotroan-divay
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy mahery amin’ny fampiharoharoana karazan-toaka!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Manamarina ny meloka noho ny kolikoly izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady manala ny rariny amin’ny marina!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Koa toy ny fandevon’ny lelafo ny mololo
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy toy ny fihalevonan’ny bozaka midedadeda
- type: usfm
  marker: q1
  children:
  - type: text
    text: no hahalovan’ny fotony
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy hijofoan’ny voniny tahaka ny vovoka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria efa nandà ny lalànan’Andriamanitra, Tompon’izao rehetra izao, izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy nanamavo ny tenin’ny Iray Masin’ny Israely.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Koa izany no irehetan’ny fahatezeran’NY TOMPO amin’ny olony
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy anaingany ny tanany aminy ka amelezany azy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia mihorohoro ny tendrombohitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny fatin’ny olona dia tonga tahaka ny fako eny an-dalambe.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Kanefa na eo aza izany rehetra izany dia tsy mbola afaka ihany ny fahatezerany
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa mbola miainga ihany ny tanany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ilay mpanafika tsy hay sakanana
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Hanangana faneva ho amin’ny firenena lavitra Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady hisiaka hiantso firenena iray avy any am-paran’ny tany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary indro, avy haingana dia haingana izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Tsy hisy reraka na tafintohina aminy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy hisy ho rendremana na hatory;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy hisy hanana fehikibo miboraka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: na fehin-kapa tapaka;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Maranitra ny zana-tsipìkany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary voahenjana avokoa ny tsipìkany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny kitron-tsoavaliny dia atao ho tahaka ny afovato,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny kodiarany dia ho tahaka ny tadio.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Ny fierony dia tahaka ny fieron’ny liom-bavy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mierona tahaka ny liona tanora izy; eny, manerona izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka mandrapaka ny remby, lasany izany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy azo alaina intsony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Hisy hirohondrohona aminy amin’izany andro izany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tahaka ny firohondrohon’ny ranomasina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary raha mijery ny tany ny olona dia indro haizina sy fahoriana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny fahazavana dia hohamaizinin’ny rahona matevina.
