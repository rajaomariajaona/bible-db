      text: 'Amin’ny andro fahadimy amby folo amin’ny volana fahafito dia hisy fivoriana masina ho anareo; koa aza manao raharaha mavesatra fa mitandrema ny andro firavoravoana ho an’NY TOMPO mandritra ny hafitoana. '
  '13':
  - type: usfm
    marker: p
    children:
