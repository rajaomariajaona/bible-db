  '1':
  - type: heading
    content: Momba ny andro voalohany amin’ny volana fahafito
  - type: text
    content: 'Amin’ny andro voalohany amin’ny volana fahafito dia hisy fivoriana masina ho anareo; aza manao raharaha mavesatra; ho andro fitsofana ny trompetra fanairana ho anareo izany. '
  '10':
  - type: text
    content: 'ary ampahafolon’ny efaha ampombaina ny zanak’ondry tsirairay amin’ireo zanak’ondry fito, '
  '11':
  - type: text
    content: ary osilahy iray ho fanatitra noho ny ota; ho fanampin’ny fanatitra noho ny ota hanaovana fanavotana, ny fanatitra mandrakariva, dorana manontolo, ny fanatitra avy amin’ny zavamaniry ampombaina azy ary ny fanatitra aidina ampombaina azy.
  - type: heading
    content: Momba ny fetin’ny trano rantsan-kazo
  '12':
  - type: text
    content: 'Amin’ny andro fahadimy amby folo amin’ny volana fahafito dia hisy fivoriana masina ho anareo; koa aza manao raharaha mavesatra fa mitandrema ny andro firavoravoana ho an’NY TOMPO mandritra ny hafitoana. '
  '13':
  - type: text
    content: 'Izao no hatolotrareo ho fanatitra dorana manontolo, dia fanatitra levonina amin’ny afo ho hanitra ankasitrahana ho an’NY TOMPO: Vantotra ombilahy telo amby folo sy ondrilahy roa ary zanak’ondry efatra amby folo, izay iray taona avy, sady tsy misy kilema izy ireo; '
  '14':
  - type: text
    content: 'ny fanatitra avy amin’ny zavamaniry ampombaina azy dia koba tsara toto telo ampahafolon’ny '
  - type: text
    content: efaha
  - type: text
    content: ', voaharo diloilo, ampombaina ny ombilahy tsirairay, dia ireo vantotra ombilahy telo amby folo; roa ampahafolon’ny efaha no ampombaina ny ondrilahy tsirairay, dia ny ondrilahy roa; '
  '15':
  - type: text
    content: 'ampahafolon’ny efaha no ampombaina ny zanak’ondry tsirairay amin’ireo zanak’ondry efatra amby folo, '
  '16':
