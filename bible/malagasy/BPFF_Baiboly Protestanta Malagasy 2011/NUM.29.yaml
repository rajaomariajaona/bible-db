    content: ary osilahy iray ho fanatitra noho ny ota, ho fanampin’ny fanatitra mandrakariva, dorana manontolo, sy ny fanatitra avy amin’ny zavamaniry ampombaina azy ary ny fanatitra aidina ampombaina azy.
  '17':
  - type: text
    content: 'Amin’ny andro faharoa indray, vantotra ombilahy roa amby folo sy ondrilahy roa ary zanak’ondry efatra amby folo, izay iray taona, sady tsy misy kilema; '
  '18':
  - type: text
    content: 'ary ny fanatitra avy amin’ny zavamaniry sy ny fanatitra araraka ampombaina ny vantotra ombilahy sy ireo ondrilahy ary ireo zanak’ondry, araka ny isany avy, araka ny fanao, '
  '19':
