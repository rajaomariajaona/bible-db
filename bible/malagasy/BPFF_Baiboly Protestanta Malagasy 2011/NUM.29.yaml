      text: 'Izao no hatolotrareo ho fanatitra dorana manontolo, dia fanatitra levonina amin’ny afo ho hanitra ankasitrahana ho an’NY TOMPO: Vantotra ombilahy telo amby folo sy ondrilahy roa ary zanak’ondry efatra amby folo, izay iray taona avy, sady tsy misy kilema izy ireo; '
