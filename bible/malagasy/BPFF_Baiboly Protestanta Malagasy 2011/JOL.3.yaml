document_id: JOL.3,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Handrotsaka ny Fanahiny amin’ny olona rehetra NY TOMPO
  - type: text
    content: Rehefa afaka izany dia handrotsaka ny Fanahiko amin’ny nofo rehetra Aho;
  - type: text
    content: dia haminany ny zanakalahinareo sy ny zanakavavinareo,
  - type: text
    content: hanonofy ny zokiolonareo,
  - type: text
    content: ary hahita fahitana ny zatovonareo;
  '2':
  - type: text
    content: ary na dia ny mpanompolahy sy ny mpanompovavy aza amin’izany andro izany
  - type: text
    content: dia handrotsahako ny Fanahiko.
  '3':
  - type: text
    content: Hanisy fahagagana eny amin’ny lanitra sy etỳ amin’ny tany Aho,
  - type: text
    content: dia ra sy afo ary setroka mitankosina.
  '4':
  - type: text
    content: Hampodina ho haizina ny masoandro,
  - type: text
    content: ary ho ra ny volana,
  - type: text
    content: alohan’ny hahatongavan’ny Andron’NY TOMPO,
  - type: text
    content: izay sady lehibe no mahatahotra.
  '5':
  - type: text
    content: Ary na zovy na zovy no hiantso ny anaran’NY TOMPO dia ho afa-mandositra;
  - type: text
    content: 'fa ao an-tendrombohitra '
  - type: text
    content: Ziona
  - type: text
    content: ' sy any Jerosalema'
  - type: text
    content: dia hisy sisa afaka,
  - type: text
    content: araka izay voalazan’NY TOMPO,
  - type: text
    content: ary izay antsoin’NY TOMPO dia ho isan’izay sisa velona.
