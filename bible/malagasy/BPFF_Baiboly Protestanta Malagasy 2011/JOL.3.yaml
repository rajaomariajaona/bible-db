document_id: JOL.3
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Handrotsaka ny Fanahiny amin’ny olona rehetra NY TOMPO
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Rehefa afaka izany dia handrotsaka ny Fanahiko amin’ny nofo rehetra Aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia haminany ny zanakalahinareo sy ny zanakavavinareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hanonofy ny zokiolonareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hahita fahitana ny zatovonareo;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ary na dia ny mpanompolahy sy ny mpanompovavy aza amin’izany andro izany
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia handrotsahako ny Fanahiko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Hanisy fahagagana eny amin’ny lanitra sy etỳ amin’ny tany Aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ra sy afo ary setroka mitankosina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Hampodina ho haizina ny masoandro,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ho ra ny volana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: alohan’ny hahatongavan’ny Andron’NY TOMPO,
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay sady lehibe no mahatahotra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ary na zovy na zovy no hiantso ny anaran’NY TOMPO dia ho afa-mandositra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'fa ao an-tendrombohitra '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Ziona
  - type: text
    text: ' sy any Jerosalema'
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hisy sisa afaka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: araka izay voalazan’NY TOMPO,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary izay antsoin’NY TOMPO dia ho isan’izay sisa velona.
