document_id: LEV.5,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s3
    children:
    - type: usfm
      marker: bd
      children:
      - type: text
        text: Ohatra vitsivitsy
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha misy manota, satria mandre teny fanozonana ka vavolombelona nahita na nahalala, nefa tsy manambara dia meloka noho izany izy. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Hataony fanatitra dorana manontolo kosa ny iray, araka ny fanao, ary hanao fanavotana ho azy ny mpisorona noho ny fahotana izay vitany dia havela ny helony.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa raha mbola tsy takatry ny ananany ihany koa ny domohina roa na ny voromailala roa dia hitondra ny fanatitra noho ny fahotany izy, koba tsara toto ampahafolon’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: efaha
    - type: text
      text: ' ho fanatitra fanadiovana; tsy hasiany diloilo izany sady tsy hasiany ditin-kazo manitra satria fanatitra fanadiovana. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoentiny eo amin’ny mpisorona io ka handraofan’ny mpisorona eran’ny tanana ila ho fanati-pahatsiarovana avy aminy ary hodorany ho fofona eo ambonin’ny alitara miaraka amin’ny fanatitra levonina amin’ny afo ho an’NY TOMPO. Fanatitra fanadiovana izany. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary hanao fanavotana ho azy ny mpisorona noho ny fahotana izay nataony tamin’ny iray amin’ireo dia havela ny helony. Toy ny fanatitra avy amin’ny zavamaniry dia ho an’ny mpisorona ny sisa.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fitsipika momba ny fanati-panonerana
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy NY TOMPO tamin’i Mosesy: '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha misy olona manao izay mahadiso ka manota tsy nahy ny amin’ireo zava-masin’NY TOMPO dia hitondra ny fanati-panonerany ho an’NY TOMPO izy, dia ondrilahy tsy misy kilema, koa sekela volafotsy no anombananao azy, araka ny sekela masina, ho fanati-panonerana. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Honerany izay nanotany ny amin’ny zava-masina, ary hampiany ampahadiminy ka hatolony ny mpisorona. Ary hanao fanavotana ho azy amin’ny ondrilahy atao fanati-panonerana ny mpisorona dia havela ny helony.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Raha misy olona manota, satria manao izay tsy tokony hatao ka mandika ny iray amin’ny didin’NY TOMPO, nefa tsy fantany izany, dia meloka izy, ary mitondra ny helony.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hitondra ondrilahy iray tsy misy kilema ho eo amin’ny mpisorona izy, araka ny anombananao azy, ho fanati-panonerana. Dia hanao fanavotana ho azy ny mpisorona noho ny ota tsy nahy izay nahadiso azy, nefa tsy fantany, dia havela ny helony. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fanati-panonerana izany satria efa meloka tamin’NY TOMPO tokoa izy.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha misy mahakasika zavatra tsy madio, na fatin’ny biby tsy madio, na fatin’ny biby fiompy tsy madio, na fatin’ny biby mandady na mikisaka tsy madio, na tsy hitany aza izany, dia maloto sy meloka noho izany izy. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary NY TOMPO niteny tamin’i Mosesy hoe: '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha misy olona manota, satria manao izay mahadiso amin’NY TOMPO fa mandainga amin’ny namany ny amin’izay zavatra nampitahirizina azy, na amin’ny zavatra notanany ho antoka, na amin’izay nalainy an-keriny, na nampahory ny namany, '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'na nahita izay zavatra very ka mandainga sady manao fianianana mandainga ny amin’izay fahotana mety mahavoa ny olona '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'satria nanota izy ka meloka, dia hanonitra izay nalainy an-keriny izy, na izay tamin’ny fampahoriana, na izay nampitahirizina azy, na izay zavatra very hitany, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'na izay rehetra nanaovany fianianana mandainga. Hanonitra manontolo izany izy sady hanampy koa ny ampahadiminy, ary homeny ilay tompon-javatra amin’ny andro anaterany ny fanati-panonerany izany. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny fanati-panonerana hoentiny ho an’NY TOMPO dia ondrilahy iray tsy misy kilema, araka ny anombananao azy, ho fanati-panonerana ho any amin’ny mpisorona. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ny mpisorona dia hanao fanavotana ho azy eo anatrehan’NY TOMPO dia havela ny helony na inona na inona fahadisoana vitany.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha misy mahakasika ny fahalotoan’olona, dia izay fahalotoany rehetra na inona na inona, na tsy hitany aza izany, rehefa fantany fotsiny, dia meloka izy. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Raha misy mianiana ka miteniteny foana amin’ny molotra, hanao ratsy na hanao soa, na inona na inona tenitenenin’ny olona foana ka asiany fianianana, nefa hadinony izany, dia meloka amin’ny iray amin’ireo izy rehefa tsaroany izany.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa amin’izany, raha meloka amin’ny iray amin’ireo izy, dia hiaiky ny fahotana vitany '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ka hitondra ny fanati-panonerany ho an’NY TOMPO noho ny fahotany, dia ondrivavy na osivavy, ho fanatitra fanadiovana; ary hanao fanavotana ho azy ny mpisorona noho ny fahotany.
  - type: usfm
    marker: s3
    children:
    - type: usfm
      marker: bd
      children:
      - type: text
        text: Ny fanatitra ataon’ny mahantra
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary raha tsy takatry ny ananany izany dia hitondra domohina roa na voromailala roa ho an’NY TOMPO izy ho fanati-panonerany noho ny nanotany, koa ny iray dia hatao fanatitra fanadiovana ary ny iray kosa dia hatao fanatitra dorana manontolo. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hitondra ireo ho eo amin’ny mpisorona izy ary ny mpisorona kosa dia hanatitra ny iray aloha, ho fanatitra fanadiovana, ka hotapahiny ny lohany nefa tsy hosarahiny amin’ny vatany. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hamafazany eo amin’ny rindrin’ny alitara ny ran’ny fanatitra fanadiovana; ny ra sisa dia hofiazany eo an-tongotry ny alitara. Fanatitra fanadiovana izany. '
