document_id: JHN.12,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nanosorana menaka manitra ny tongotr’i Jesosy
  - type: heading
    content: Ampit. Mat 26.6-13; Mar 14.3-9; Lio 7.36-50
  - type: text
    content: 'Rehefa henemana no sisa tsy hahatongavan’ny Paska, Jesosy, dia tonga tao Betania izay nitoeran’i Lazarosy, ilay natsangany tamin’ny maty. '
  '10':
  - type: text
    content: 'Fa nikendry hahafaty an’i Lazarosy koa ireo lehiben’ny mpisorona '
  '11':
  - type: text
    content: satria noho ny aminy no nialan’ny maro tamin’ny Jiosy ka ninoany an’i Jesosy.
  - type: heading
    content: Ny niakaran’i Jesosy tany Jerosalema
  - type: heading
    content: Mat 21.1-9; Mar 11.1-10; Lio 19.28-38
  '12':
  - type: text
    content: 'Ny ampitson’iny ny vahoaka betsaka, izay tonga ho amin’ny andro firavoravoana, rehefa nahare fa hankany Jerosalema Jesosy, '
  '13':
  - type: text
    content: 'dia naka sampan-drofia ka nivoaka hitsena Azy sady niantso hoe:'
  - type: text
    content: Hosana
  - type: text
    content: '!'
  - type: text
    content: Isaorana anie ny Mpanjakan’ny Israely,
  - type: text
    content: Ilay avy amin’ny anaran’NY TOMPO (Sal 118.26).
  '14':
  - type: text
    content: 'Ary Jesosy nahita zana-boriky iray, dia nitaingina azy, araka ny voasoratra hoe:'
  '15':
  - type: text
    content: «Aza matahotra,
  - type: text
    content: 'ry '
  - type: text
    content: Ziona
  - type: text
    content: ' zanakavavy; indro, avy ny Mpanjakanao'
  - type: text
    content: mitaingina zana-boriky» (Zak 9.9).
  '16':
  - type: text
    content: Izany zavatra izany dia tsy fantatry ny mpianany tamin’ny voalohany; fa rehefa niditra tamin’ny voninahiny Jesosy, izay vao nahatsiaro izy ireo fa voasoratra hilaza Azy io zavatra io, sady efa nataony taminy izany.
  '17':
  - type: text
    content: 'Ary nanambara Azy ny vahoaka izay teo Aminy, fony Izy niantso an’i Lazarosy hivoaka avy tao amin’ny fasana ka nanangana azy tamin’ny maty. '
  '18':
  - type: text
    content: 'Izany koa no nitsenan’ny vahoaka Azy satria efa reny fa nanao ilay famantarana iny Izy. '
  '19':
  - type: text
    content: 'Ary tamin’izany ny '
  - type: text
    content: Fariseo
  - type: text
    content: ' dia nifampilaza hoe: Hitanareo fa tsy mahefa na inona na inona akory ianareo; indro, lasa manaraka Azy avokoa izao tontolo izao.'
  - type: heading
    content: Ireo Grika izay ta hahita an’i Jesosy
  '2':
  - type: text
    content: Nanao fanasana ho an’i Jesosy tao izy ireo; i Marta no nanompo; fa i Lazarosy no iray tamin’izay niara-nipetraka nihinana taminy.
  '20':
  - type: text
    content: 'Nisy Grika ny sasany tamin’ireo niakatra hivavaka tamin’ny andro firavoravoana, '
  '21':
  - type: text
    content: 'ary izy ireo dia nankany amin’i Filipo avy any Betsaida any Galilia, dia nangataka taminy hoe: Tompoko, mba ta hahita an’i Jesosy izahay. '
  '22':
  - type: text
    content: Dia lasa nilaza tamin’i Andrea i Filipo; avy eo kosa dia lasa nilaza tamin’i Jesosy i Andrea sy i Filipo.
  '23':
  - type: text
    content: 'Ary hoy Jesosy: Tonga ny fotoanandro hankalazana ny '
  - type: text
    content: Zanak’Olona
  - type: text
    content: '. '
  '24':
  - type: text
    content: 'Lazaiko aminareo marina dia marina tokoa: Raha tsy latsaka ao amin’ny tany ny voam-bary ka maty dia mitoetra foana izy; fa raha maty kosa izy dia hahavokatra be. '
  '25':
  - type: text
    content: 'Izay tia ny ainy no mahavery izany; fa izay mankahala ny ainy amin’izao fiainana izao no hitahiry izany ho amin’ny fiainana mandrakizay. '
  '26':
  - type: text
    content: Raha misy olona manompo Ahy dia aoka izy hanaraka Ahy, ary izay itoerako dia ao koa no hitoeran’ny mpanompoko; raha misy olona manompo Ahy dia hankalaza azy ny Ray.
  - type: heading
    content: Milaza ny hahafatesany Jesosy
  '27':
  - type: text
    content: 'Ankehitriny, mangorohoro ny fanahiko; ary inona no holazaiko: Ray ô, vonjeo Aho ho afaka amin’ity ora ity? Nefa izao no niaviako ho amin’ity ora ity; '
  '28':
  - type: text
    content: 'Ray ô, mankalazà ny anaranao. Dia nisy feo avy tany an-danitra hoe: Efa nankalaza Azy Aho ary mbola hankalaza Azy indray. '
  '29':
  - type: text
    content: 'Ary ny vahoaka izay nijoro teo ka nahare dia niteny hoe: Kotrokorana izany. Hoy ny sasany: Anjely no niteny Taminy. '
  '3':
  - type: text
    content: 'Ary rehefa naka menaka manitra nisy narda sady tsara no sarobidy, lanjana iray livatra, i Maria, dia nanosotra ny tongotr’i Jesosy sy namaoka ny tongony tamin’ny volon-dohany; koa feno ny hanitry ny menaka ny trano. '
  '30':
  - type: text
    content: 'Fa hoy Jesosy hoe: Tsy noho ny Amiko no nahatongavan’izany feo izany fa noho ny aminareo. '
  '31':
  - type: text
    content: 'Tonga ankehitriny ny fitsarana izao tontolo izao; ankehitriny ny andrianan’izao tontolo izao dia horoahina any ivelany. '
  '32':
  - type: text
    content: 'Ary Izaho rehefa hasandratra hiala amin’ny tany dia hitaona ny olona rehetra hanatona Ahy. '
  '33':
  - type: text
    content: Izany no nolazainy mba hanambarana ny fomban’ny fahafatesana izay efa hiaretany.
  '34':
  - type: text
    content: 'Dia hoy ny vahoaka Taminy hoe: Efa renay tamin’ny lalàna fa '
  - type: text
    content: Kristy
  - type: text
    content: ' dia haharitra mandrakizay; koa ahoana no ilazanao hoe: Tsy maintsy hasandratra ny '
  - type: text
    content: Zanak’Olona
  - type: text
    content: '? Iza moa izany Zanak’Olona izany? '
  '35':
  - type: text
    content: 'Dia hoy Jesosy taminy: Mbola kely ihany no itoeran’ny mazava aminareo. Mandehana, raha mbola manana ny mazava ianareo, mba tsy hahatratra anareo ny maizina; fa izay mandeha amin’ny maizina dia tsy mahalala izay alehany. '
  '36':
  - type: text
    content: Raha mbola manana ny mazava ianareo dia minoa ny mazava mba ho tonga zanaky ny mazava.
  - type: text
    content: Rehefa avy nilaza izany Jesosy dia niala Izy ka niery azy ireo.
  - type: heading
    content: Ny tsy finoan’ny olona
  '37':
  - type: text
    content: 'Na dia efa nanao ireo famantarana betsaka ireo teo anatrehany aza Izy dia tsy mba nino Azy izy ireo '
  '38':
  - type: text
    content: mba hahatanteraka ny teny nataon’Isaia mpaminany
  - type: note
    content: 'Na: profeta.'
  - type: text
    content: ' hoe:'
  - type: text
    content: «Tompoko, iza no nino ny teny nampitondraina anay?
  - type: text
    content: Ary iza no nampisehoana ny sandrin’NY TOMPO?» (Isa 53.1)
  '39':
  - type: text
    content: 'Izany no tsy nahaizany nino, satria hoy koa Isaia:'
  '4':
  - type: text
    content: 'Ary hoy i Jodasy iskariota, iray tamin’ny mpianany, dia ilay efa hamadika Azy: '
  '40':
  - type: text
    content: «Efa nanajamba ny masony sy nanamafy ny fony Izy
  - type: text
    content: mba tsy hahita ny masony na hahalala ny fony,
  - type: text
    content: dia tsy hibebaka izy
  - type: text
    content: ka tsy hahasitrana azy Aho» (Isa 6.10).
  '41':
  - type: text
    content: 'Izany teny izany no nolazain’Isaia satria nahita ny voninahiny izy ka nilaza Azy. '
  '42':
  - type: text
    content: 'Kanefa na dia maro aza ny mpitondra no nino Azy dia tsy nanaiky izy ireo noho ny '
  - type: text
    content: Fariseo
  - type: text
    content: ', fandrao horoahina tsy ho isan’ny ao amin’ny '
  - type: text
    content: sinagoga
  - type: text
    content: '. '
  '43':
  - type: text
    content: Fa aleon’izy ireo voninahitra avy amin’ny olona toy izay ny voninahitra avy amin’Andriamanitra.
  - type: heading
    content: Ny tenin’i Jesosy no hitsara
  '44':
  - type: text
    content: 'Ary Jesosy niantso hoe: Izay mino Ahy dia tsy Izaho no inoany fa izay naniraka Ahy. '
  '45':
  - type: text
    content: 'Ary izay mahita Ahy dia mahita izay naniraka Ahy. '
  '46':
  - type: text
    content: 'Izaho tonga amin’izao tontolo izao ho fahazavana mba tsy hitoetra ao amin’ny maizina izay rehetra mino Ahy. '
  '47':
  - type: text
    content: 'Raha misy mandre ny teniko ka tsy mitandrina izany, Izaho tsy mitsara azy; fa tsy tonga hitsara izao tontolo izao Aho fa hamonjy izao tontolo izao. '
  '48':
  - type: text
    content: 'Izay mandà Ahy ka tsy mandray ny teniko dia manana izay mitsara azy: Ny teny izay nolazaiko, izany ihany no hitsara azy amin’ny andro farany, '
  '49':
  - type: text
    content: 'satria Izaho tsy niteny amin’ny fahefan’ny tenako, fa ny Ray izay naniraka Ahy, Izy no nandidy Ahy ny amin’izay holazaiko sy izay hambarako. '
  '5':
  - type: text
    content: 'Nahoana io menaka io no tsy namidy '
  - type: text
    content: denaria
  - type: text
    content: ' telonjato ka nomena ny mahantra? '
  '50':
  - type: text
    content: Ary fantatro fa fiainana mandrakizay ny didiny; koa izay lazaiko dia lazaiko araka izay nolazain’ny Ray Tamiko.
  '6':
  - type: text
    content: 'Ary izy no nilaza izany, tsy noho ny fiahiany ny mahantra, fa noho izy mpangalatra sady izy koa no mpitondra ny kitapom-bola ka naka izay tao anatiny. '
  '7':
  - type: text
    content: 'Dia hoy Jesosy: Avelao izy mba hotehiriziny ho amin’ny andro hanamboarany Ahy halevina. '
  '8':
  - type: text
    content: Fa ny mahantra dia etỳ aminareo mandrakariva; fa Izaho tsy mba ho etỳ aminareo mandrakariva.
  - type: heading
    content: Ny teti-dratsy hamonoana an’i Lazarosy
  '9':
  - type: text
    content: 'Betsaka tamin’ny vahoaka '
  - type: text
    content: Jiosy
  - type: text
    content: ' no nahafantatra fa teo Jesosy, ary tonga teo ireo, nefa tsy noho Jesosy ihany fa mba hahita an’i Lazarosy koa, ilay natsangany tamin’ny maty. '
