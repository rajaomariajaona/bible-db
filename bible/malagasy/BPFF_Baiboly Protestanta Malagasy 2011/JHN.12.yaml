    children:
    - type: text
      text: Ny nanosorana menaka manitra ny tongotr’i Jesosy
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Ampit. Mat 26.6-13; Mar 14.3-9; Lio 7.36-50
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa henemana no sisa tsy hahatongavan’ny Paska, Jesosy, dia tonga tao Betania izay nitoeran’i Lazarosy, ilay natsangany tamin’ny maty. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa nikendry hahafaty an’i Lazarosy koa ireo lehiben’ny mpisorona '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: satria noho ny aminy no nialan’ny maro tamin’ny Jiosy ka ninoany an’i Jesosy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny niakaran’i Jesosy tany Jerosalema
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mat 21.1-9; Mar 11.1-10; Lio 19.28-38
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny ampitson’iny ny vahoaka betsaka, izay tonga ho amin’ny andro firavoravoana, rehefa nahare fa hankany Jerosalema Jesosy, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia naka sampan-drofia ka nivoaka hitsena Azy sady niantso hoe:'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: w
      children:
      - type: text
        text: Hosana
    - type: text
      text: '!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Isaorana anie ny Mpanjakan’ny Israely,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ilay avy amin’ny anaran’NY TOMPO (Sal 118.26).
  '14':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Ary Jesosy nahita zana-boriky iray, dia nitaingina azy, araka ny voasoratra hoe:'
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Aza matahotra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ry '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Ziona
    - type: text
      text: ' zanakavavy; indro, avy ny Mpanjakanao'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mitaingina zana-boriky» (Zak 9.9).
  '16':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Izany zavatra izany dia tsy fantatry ny mpianany tamin’ny voalohany; fa rehefa niditra tamin’ny voninahiny Jesosy, izay vao nahatsiaro izy ireo fa voasoratra hilaza Azy io zavatra io, sady efa nataony taminy izany.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nanambara Azy ny vahoaka izay teo Aminy, fony Izy niantso an’i Lazarosy hivoaka avy tao amin’ny fasana ka nanangana azy tamin’ny maty. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izany koa no nitsenan’ny vahoaka Azy satria efa reny fa nanao ilay famantarana iny Izy. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary tamin’izany ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Fariseo
    - type: text
      text: ' dia nifampilaza hoe: Hitanareo fa tsy mahefa na inona na inona akory ianareo; indro, lasa manaraka Azy avokoa izao tontolo izao.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ireo Grika izay ta hahita an’i Jesosy
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nanao fanasana ho an’i Jesosy tao izy ireo; i Marta no nanompo; fa i Lazarosy no iray tamin’izay niara-nipetraka nihinana taminy.
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nisy Grika ny sasany tamin’ireo niakatra hivavaka tamin’ny andro firavoravoana, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary izy ireo dia nankany amin’i Filipo avy any Betsaida any Galilia, dia nangataka taminy hoe: Tompoko, mba ta hahita an’i Jesosy izahay. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia lasa nilaza tamin’i Andrea i Filipo; avy eo kosa dia lasa nilaza tamin’i Jesosy i Andrea sy i Filipo.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Jesosy: Tonga ny fotoanandro hankalazana ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Zanak’Olona
    - type: text
      text: '. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lazaiko aminareo marina dia marina tokoa: Raha tsy latsaka ao amin’ny tany ny voam-bary ka maty dia mitoetra foana izy; fa raha maty kosa izy dia hahavokatra be. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izay tia ny ainy no mahavery izany; fa izay mankahala ny ainy amin’izao fiainana izao no hitahiry izany ho amin’ny fiainana mandrakizay. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Raha misy olona manompo Ahy dia aoka izy hanaraka Ahy, ary izay itoerako dia ao koa no hitoeran’ny mpanompoko; raha misy olona manompo Ahy dia hankalaza azy ny Ray.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Milaza ny hahafatesany Jesosy
    marker-yv: yv-h
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ankehitriny, mangorohoro ny fanahiko; ary inona no holazaiko: Ray ô, vonjeo Aho ho afaka amin’ity ora ity? Nefa izao no niaviako ho amin’ity ora ity; '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ray ô, mankalazà ny anaranao. Dia nisy feo avy tany an-danitra hoe: Efa nankalaza Azy Aho ary mbola hankalaza Azy indray. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny vahoaka izay nijoro teo ka nahare dia niteny hoe: Kotrokorana izany. Hoy ny sasany: Anjely no niteny Taminy. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa naka menaka manitra nisy narda sady tsara no sarobidy, lanjana iray livatra, i Maria, dia nanosotra ny tongotr’i Jesosy sy namaoka ny tongony tamin’ny volon-dohany; koa feno ny hanitry ny menaka ny trano. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy Jesosy hoe: Tsy noho ny Amiko no nahatongavan’izany feo izany fa noho ny aminareo. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tonga ankehitriny ny fitsarana izao tontolo izao; ankehitriny ny andrianan’izao tontolo izao dia horoahina any ivelany. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Izaho rehefa hasandratra hiala amin’ny tany dia hitaona ny olona rehetra hanatona Ahy. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izany no nolazainy mba hanambarana ny fomban’ny fahafatesana izay efa hiaretany.
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy ny vahoaka Taminy hoe: Efa renay tamin’ny lalàna fa '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ' dia haharitra mandrakizay; koa ahoana no ilazanao hoe: Tsy maintsy hasandratra ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Zanak’Olona
    - type: text
      text: '? Iza moa izany Zanak’Olona izany? '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy Jesosy taminy: Mbola kely ihany no itoeran’ny mazava aminareo. Mandehana, raha mbola manana ny mazava ianareo, mba tsy hahatratra anareo ny maizina; fa izay mandeha amin’ny maizina dia tsy mahalala izay alehany. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Raha mbola manana ny mazava ianareo dia minoa ny mazava mba ho tonga zanaky ny mazava.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Rehefa avy nilaza izany Jesosy dia niala Izy ka niery azy ireo.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny tsy finoan’ny olona
    marker-yv: yv-h
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Na dia efa nanao ireo famantarana betsaka ireo teo anatrehany aza Izy dia tsy mba nino Azy izy ireo '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: mba hahatanteraka ny teny nataon’Isaia mpaminany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.38 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: profeta.
      marker-yv: yv-n
    - type: text
      text: ' hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Tompoko, iza no nino ny teny nampitondraina anay?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary iza no nampisehoana ny sandrin’NY TOMPO?» (Isa 53.1)
  '39':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Izany no tsy nahaizany nino, satria hoy koa Isaia:'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy i Jodasy iskariota, iray tamin’ny mpianany, dia ilay efa hamadika Azy: '
  '40':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Efa nanajamba ny masony sy nanamafy ny fony Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba tsy hahita ny masony na hahalala ny fony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia tsy hibebaka izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy hahasitrana azy Aho» (Isa 6.10).
  '41':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Izany teny izany no nolazain’Isaia satria nahita ny voninahiny izy ka nilaza Azy. '
  '42':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Kanefa na dia maro aza ny mpitondra no nino Azy dia tsy nanaiky izy ireo noho ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Fariseo
    - type: text
      text: ', fandrao horoahina tsy ho isan’ny ao amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sinagoga
    - type: text
      text: '. '
  '43':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Fa aleon’izy ireo voninahitra avy amin’ny olona toy izay ny voninahitra avy amin’Andriamanitra.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny tenin’i Jesosy no hitsara
    marker-yv: yv-h
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Jesosy niantso hoe: Izay mino Ahy dia tsy Izaho no inoany fa izay naniraka Ahy. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary izay mahita Ahy dia mahita izay naniraka Ahy. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izaho tonga amin’izao tontolo izao ho fahazavana mba tsy hitoetra ao amin’ny maizina izay rehetra mino Ahy. '
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha misy mandre ny teniko ka tsy mitandrina izany, Izaho tsy mitsara azy; fa tsy tonga hitsara izao tontolo izao Aho fa hamonjy izao tontolo izao. '
  '48':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izay mandà Ahy ka tsy mandray ny teniko dia manana izay mitsara azy: Ny teny izay nolazaiko, izany ihany no hitsara azy amin’ny andro farany, '
  '49':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'satria Izaho tsy niteny amin’ny fahefan’ny tenako, fa ny Ray izay naniraka Ahy, Izy no nandidy Ahy ny amin’izay holazaiko sy izay hambarako. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nahoana io menaka io no tsy namidy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: denaria
    - type: text
      text: ' telonjato ka nomena ny mahantra? '
  '50':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary fantatro fa fiainana mandrakizay ny didiny; koa izay lazaiko dia lazaiko araka izay nolazain’ny Ray Tamiko.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary izy no nilaza izany, tsy noho ny fiahiany ny mahantra, fa noho izy mpangalatra sady izy koa no mpitondra ny kitapom-bola ka naka izay tao anatiny. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy Jesosy: Avelao izy mba hotehiriziny ho amin’ny andro hanamboarany Ahy halevina. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa ny mahantra dia etỳ aminareo mandrakariva; fa Izaho tsy mba ho etỳ aminareo mandrakariva.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny teti-dratsy hamonoana an’i Lazarosy
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Betsaka tamin’ny vahoaka '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jiosy
    - type: text
      text: ' no nahafantatra fa teo Jesosy, ary tonga teo ireo, nefa tsy noho Jesosy ihany fa mba hahita an’i Lazarosy koa, ilay natsangany tamin’ny maty. '
