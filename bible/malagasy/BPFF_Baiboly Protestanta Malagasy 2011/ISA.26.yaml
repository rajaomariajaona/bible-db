document_id: ISA.26,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: 'Hira: Manana tanàna mafy isika'
  - type: text
    content: 'Amin’izany andro izany dia hohiraina eto amin’ny tanin’i Joda izao hira izao:'
  - type: text
    content: Manana tanàna mafy isika;
  - type: text
    content: famonjena no napetraky NY TOMPO ho manda sy fiarovana.
  '10':
  - type: text
    content: Na dia asiana soa aza ny ratsy fanahy
  - type: text
    content: dia tsy mety mianatra fahamarinana;
  - type: text
    content: eny, mbola manao meloka ihany izy na dia ao amin’ny tanin’ny fahamarinana aza
  - type: text
    content: ka tsy mety mijery ny fahalehibiazan’NY TOMPO.
  '11':
  - type: text
    content: TOMPO ô, avo ny tananao
  - type: text
    content: ka tsy jeren’ireo;
  - type: text
    content: Tsy maintsy ho jereny ihany anefa ny fahasaro-piaronao amin’ny olonao
  - type: text
    content: ka ho menatra izy;
  - type: text
    content: eny, afo no handevona ny fahavalonao.
  '12':
  - type: text
    content: TOMPO ô, manorina fiadanana ho anay Ianao;
  - type: text
    content: fa ny asanay rehetra
  - type: text
    content: dia tanterahinao ho anay.
  '13':
  - type: text
    content: TOMPO Andriamanitray ô,
  - type: text
    content: tsy Ianao ihany no efa nampanompo anay fa nisy tompo hafa koa;
  - type: text
    content: nefa Ianao irery ihany no ahazoanay mankalaza ny anaranao.
  '14':
  - type: text
    content: Ny maty dia tsy ho velona intsony,
  - type: text
    content: ny matoatoa dia tsy mba hitsangana;
  - type: text
    content: koa novalinao izy
  - type: text
    content: ka naringanao,
  - type: text
    content: sady nofoananao avokoa ny fahatsiarovana azy!
  '15':
  - type: text
    content: Nampitombo ny firenena Ianao, TOMPO ô!
  - type: text
    content: Eny, nampitombo ny firenena Ianao ka nahazo voninahitra ho Anao;
  - type: text
    content: nitarinao avokoa ny faritry ny tany.
  '16':
  - type: text
    content: TOMPO ô, nitady Anao izy ireo
  - type: text
    content: nony azom-pahoriana;
  - type: text
    content: nanao vavaka tora-po izy
  - type: text
    content: nony iharan’ny famaizanao.
  '17':
  - type: text
    content: Tahaka ny vehivavy bevohoka efa madiva hiteraka
  - type: text
    content: ka miolanolana sy mitaraina noho ny faharariany,
  - type: text
    content: dia tahaka izany izahay teo imasonao, TOMPO ô!
  '18':
  - type: text
    content: Efa bevohoka izahay, efa nihetsi-jaza izahay,
  - type: text
    content: nefa tahaka ny nitera-drivotra izahay;
  - type: text
    content: tsy nahavita famonjena ho an’ny tany izahay,
  - type: text
    content: ary tsy niteraka mponina ho an’izao tontolo izao.
  '19':
  - type: text
    content: Ho velona indray ny olonao izay efa maty!
  - type: text
    content: Hitsangana ny fatin’ny oloko!
  - type: text
    content: Koa mifohaza sy mihobia
  - type: text
    content: ianareo izay mandry ao amin’ny vovoka!
  - type: text
    content: Fa ny andonao dia tahaka ny andon’ny fahazavana,
  - type: text
    content: ary ny tany dia hiteraka ny maty.
  '2':
  - type: text
    content: Vohay ny vavahady
  - type: text
    content: mba hidiran’ny firenena marina
  - type: text
    content: izay mitana ny fahamarinana.
  '20':
  - type: text
    content: Mandehana, ry oloko, midira ao amin’ny efitranonao,
  - type: text
    content: ary mirindrìna varavarana ianao;
  - type: text
    content: miere kely indray mipy maso monja
  - type: text
    content: mandra-pahalasa ny fahatezerana.
  '21':
  - type: text
    content: Fa indro NY TOMPO mivoaka avy amin’ny fitoerany
  - type: text
    content: hampamoaka ny mponina amin’ny tany ny helony;
  - type: text
    content: hampiseho ny ra izay nofohiny ny tany
  - type: text
    content: ka tsy hanafina intsony ny olona izay novonoina teo aminy.
  '3':
  - type: text
    content: Ny olona tsy miovaova hevitra
  - type: text
    content: dia harovanao ao anatin’ny fiadanana tanteraka,
  - type: text
    content: satria matoky Anao izy.
  '4':
  - type: text
    content: Matokia NY TOMPO mandrakizay,
  - type: text
    content: fa NY TOMPO, NY TOMPO
  - type: text
    content: no Vatolampy mandrakizay.
  '5':
  - type: text
    content: Naetriny ny olona avo toerana;
  - type: text
    content: ny tanàna avo dia arodany;
  - type: text
    content: eny, arodany ho amin’ny tany
  - type: text
    content: ka ataony mihosom-bovoka.
  '6':
  - type: text
    content: Hitsahin’ny tongotra izy,
  - type: text
    content: dia ny tongotry ny ory
  - type: text
    content: sy ny faladian’ny mahantra.
  - type: heading
    content: 'Vavaka: Manantena anao izahay RY TOMPO'
  '7':
  - type: text
    content: Mahitsy ny lalan’ny marina;
  - type: text
    content: eny, Ianao izay mahitsy no manamora ny alehan’ny marina.
  '8':
  - type: text
    content: Koa amin’ny lalan’ny fitsaranao, TOMPO ô, no anantenanay Anao.
  - type: text
    content: Ny hahatsiaro Anao sy ny anaranao,
  - type: text
    content: izany no irinay indrindra.
  '9':
  - type: text
    content: Maniry Anao aho nony alina;
  - type: text
    content: eny, ny fanahiko ato anatiko no itadiavako Anao fatratra;
  - type: text
    content: fa raha mamely ny tany ny fitsaranao
  - type: text
    content: dia mianatra fahamarinana ny mponina amin’izao tontolo izao.
