document_id: ISA.26
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Hira: Manana tanàna mafy isika'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Amin’izany andro izany dia hohiraina eto amin’ny tanin’i Joda izao hira izao:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Manana tanàna mafy isika;
- type: usfm
  marker: q1
  children:
  - type: text
    text: famonjena no napetraky NY TOMPO ho manda sy fiarovana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Vohay ny vavahady
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hidiran’ny firenena marina
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay mitana ny fahamarinana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ny olona tsy miovaova hevitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia harovanao ao anatin’ny fiadanana tanteraka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria matoky Anao izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Matokia NY TOMPO mandrakizay,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa NY TOMPO, NY TOMPO
- type: usfm
  marker: q1
  children:
  - type: text
    text: no Vatolampy mandrakizay.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Naetriny ny olona avo toerana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny tanàna avo dia arodany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, arodany ho amin’ny tany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka ataony mihosom-bovoka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Hitsahin’ny tongotra izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ny tongotry ny ory
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny faladian’ny mahantra.
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Vavaka: Manantena anao izahay RY TOMPO'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Mahitsy ny lalan’ny marina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, Ianao izay mahitsy no manamora ny alehan’ny marina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Koa amin’ny lalan’ny fitsaranao, TOMPO ô, no anantenanay Anao.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny hahatsiaro Anao sy ny anaranao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: izany no irinay indrindra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Maniry Anao aho nony alina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, ny fanahiko ato anatiko no itadiavako Anao fatratra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa raha mamely ny tany ny fitsaranao
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia mianatra fahamarinana ny mponina amin’izao tontolo izao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Na dia asiana soa aza ny ratsy fanahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia tsy mety mianatra fahamarinana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, mbola manao meloka ihany izy na dia ao amin’ny tanin’ny fahamarinana aza
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy mety mijery ny fahalehibiazan’NY TOMPO.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: TOMPO ô, avo ny tananao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy jeren’ireo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy maintsy ho jereny ihany anefa ny fahasaro-piaronao amin’ny olonao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka ho menatra izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, afo no handevona ny fahavalonao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: TOMPO ô, manorina fiadanana ho anay Ianao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny asanay rehetra
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia tanterahinao ho anay.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: TOMPO Andriamanitray ô,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy Ianao ihany no efa nampanompo anay fa nisy tompo hafa koa;
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa Ianao irery ihany no ahazoanay mankalaza ny anaranao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ny maty dia tsy ho velona intsony,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny matoatoa dia tsy mba hitsangana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: koa novalinao izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka naringanao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady nofoananao avokoa ny fahatsiarovana azy!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Nampitombo ny firenena Ianao, TOMPO ô!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, nampitombo ny firenena Ianao ka nahazo voninahitra ho Anao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: nitarinao avokoa ny faritry ny tany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: TOMPO ô, nitady Anao izy ireo
- type: usfm
  marker: q1
  children:
  - type: text
    text: nony azom-pahoriana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: nanao vavaka tora-po izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: nony iharan’ny famaizanao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Tahaka ny vehivavy bevohoka efa madiva hiteraka
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka miolanolana sy mitaraina noho ny faharariany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia tahaka izany izahay teo imasonao, TOMPO ô!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Efa bevohoka izahay, efa nihetsi-jaza izahay,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa tahaka ny nitera-drivotra izahay;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy nahavita famonjena ho an’ny tany izahay,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy niteraka mponina ho an’izao tontolo izao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ho velona indray ny olonao izay efa maty!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hitsangana ny fatin’ny oloko!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Koa mifohaza sy mihobia
- type: usfm
  marker: q1
  children:
  - type: text
    text: ianareo izay mandry ao amin’ny vovoka!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ny andonao dia tahaka ny andon’ny fahazavana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny tany dia hiteraka ny maty.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Mandehana, ry oloko, midira ao amin’ny efitranonao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mirindrìna varavarana ianao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: miere kely indray mipy maso monja
- type: usfm
  marker: q1
  children:
  - type: text
    text: mandra-pahalasa ny fahatezerana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Fa indro NY TOMPO mivoaka avy amin’ny fitoerany
- type: usfm
  marker: q1
  children:
  - type: text
    text: hampamoaka ny mponina amin’ny tany ny helony;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hampiseho ny ra izay nofohiny ny tany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy hanafina intsony ny olona izay novonoina teo aminy.
