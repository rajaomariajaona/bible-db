document_id: EXO.39,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: 'Ny fitafian’ny Mpisoronabe: Ny efoda'
  - type: text
    content: Tamin’ny lamba manga, volomparasy ary jaky no nanaovana ny fitafiana fitondra amin’ny fanompoana ao amin’ny fitoerana masina, ary natao ny fitafiana masina ho an’i Arona araka izay nandidian’NY TOMPO an’i Mosesy.
  '10':
  - type: text
    content: 'Dia nasiany vato alatsaka an-tranontranony izany, vato efatra andalana: Ny andalana voalohany dia karnelia sy topaza ary emeraoda; '
  '11':
  - type: text
    content: 'ny andalana faharoa dia robisy sy safira ary oniksa; '
  '12':
  - type: text
    content: 'ny andalana fahatelo dia opala sy agata ary ametista; '
  '13':
  - type: text
    content: 'ary ny andalana fahefatra dia krizolita sy berila ary jaspy. Nasiany randram-bolamena manodidina ny fitoerany avy. '
  '14':
  - type: text
    content: Ny vato dia nalahatra araka ny anaran’ny fokon’ny Zanak’Israely, roa amby folo araka ny anarany avy. Izy ireo dia nitondra ny anaran’ny foko roa amby folo, voasoratra toy ny amin’ny fitombo-kase.
  '15':
  - type: text
    content: 'Nasiany rojo kely volamena tsy miharo, mifanolana toy ny tady, teo amin’ny saron-tratra. '
  '16':
  - type: text
    content: 'Nataony koa ny randram-bolamena roa sy mason-drojo volamena roa; ny mason-drojo dia natao teo amin’ny zorony roa ambony amin’ny saron-tratra. '
  '17':
  - type: text
    content: 'Ny tady volamena roa dia nataony teo amin’ny mason-drojo roa izay amin’ny zorony roa ambany amin’ny saron-tratra. '
  '18':
  - type: text
    content: 'Ny lanin’ny tady roa dia nataony teo amin’ny randram-bolamena roa, ary nataony teo amin’ny soroky ny efoda, teo anoloana. '
  '19':
  - type: text
    content: 'Nataony indray koa ny mason-drojo volamena roa, natsofony teo amin’ny zorony roa ambany amin’ny saron-tratra, amin’ny sisiny anatiny izay mikasika ny efoda. '
  '2':
  - type: text
    content: 'Dia nanao ny '
  - type: text
    content: efoda
  - type: text
    content: ' tamin’ny volamena, lamba manga, volomparasy, jaky ary ny lamba rongony fotsy madinika voahasina izy'
  - type: note
    content: Zahao 31.1-6.
  - type: text
    content: '. '
  '20':
  - type: text
    content: 'Mbola nanao mason-drojo volamena roa koa izy ka napetany teo ambanin’ny soroka roa amin’ny efoda, eo anoloany, akaikin’ny fikambanany, ary eo ambonin’ny fehikibo momba ny efoda. '
  '21':
  - type: text
    content: Kofehy manga no namehezany ny mason-drojon’ny saron-tratra tamin’ny mason-drojon’ny efoda, mba ho eo ambonin’ny fehikibo momba ny efoda ny saron-tratra ka tsy hikisaka hiala eo, dia araka izay nandidian’NY TOMPO an’i Mosesy.
  - type: heading
    content: Ireo akanjo masina hafa
  '22':
  - type: text
    content: 'Nataony indray ny akanjobe misy ny '
  - type: text
    content: efoda
  - type: text
    content: ', asan’ny mpanenona, ka nataony miloko manga tokam-bolo. '
  '23':
  - type: text
    content: 'Ny vozon’ny akanjo ivelany dia teo afovoany tahaka ny vozon’ny akanjo fiarovan-tratra, ary nisy sisiny manodidina ny vozony mba tsy haharovitra azy. '
  '24':
  - type: text
    content: 'Teo amin’ny morontongotry ny akanjobe dia nasiany sarin’ampongabendanitra miloko manga, volomparasy, jaky voahasina; '
  '25':
  - type: text
    content: 'ary nanaovany lakolosy kely volamena tsy miharo, koa ny lakolosy kely dia natao teo anelanelan’ny ampongabendanitra tamin’ny morontongotry ny akanjobe manodidina, dia teo anelanelan’ny ampongabendanitra: '
  '26':
  - type: text
    content: Lakolosy sy sarin’ampongabendanitra no mifanelanelana manodidina eo amin’ny morontongotry ny akanjobe izay hoentiny manao ny fanompoam-pivavahana, araka izay nandidian’NY TOMPO an’i Mosesy.
  '27':
  - type: text
    content: 'Lamba rongony fotsy madinika no nanaovany ny akanjo lava, asan’ny mpanenona, ho an’i Arona sy ny zanany. '
  '28':
  - type: text
    content: 'Lamba rongony fotsy madinika koa no nanaovany ny fehiloha, ary ny satroka tsara tarehy ihany koa dia nataony tamin’ny lamba rongony fotsy madinika; ny kalisaonina fohy dia nataony tamin’ny lamba rongony fotsy madinika voahasina. '
  '29':
  - type: text
    content: Ny fehikibo koa dia lamba rongony fotsy madinika voahasina, lamba manga, volomparasy ary jaky, asan’ny mpahay tenona samihafa soratra, araka izay nandidian’NY TOMPO an’i Mosesy.
  '3':
  - type: text
    content: 'Ary namisaka ny volamena ho takelaka manify izy dia nandidididy azy ho kofehy volamena ka nataony tady miaraka amin’ny kofehy manga, volomparasy, jaky ary ny lamba rongony fotsy madinika, asan’ny mpanenona mahay. '
  '30':
  - type: text
    content: 'Ary ny takelaka ho eo amin’ny diadema masina dia nataony amin’ny volamena tsy miharo sady nasiany soratra, araka ny fanoratana amin’ny fitombo-kase, hoe: NOHAMASININA HO AN’NY TOMPO. '
  '31':
  - type: text
    content: Dia nasiany kofehy manga hamehezana azy amin’ny fehiloha eo ambony, dia araka izay efa nandidian’NY TOMPO an’i Mosesy.
  - type: heading
    content: Vita ny asa
  '32':
  - type: text
    content: 'Dia vita ny asa rehetra tamin’ny '
  - type: text
    content: tabernakely
  - type: text
    content: ', dia ny '
  - type: text
    content: tranolay fihaonana
  - type: text
    content: ', satria efa nanatanteraka izay rehetra nandidian’NY TOMPO an’i Mosesy ny Zanak’Israely.'
  '33':
  - type: text
    content: 'Dia noentiny teo amin’i Mosesy ny tabernakely, dia ny tranolay sy ny fanaka rehetra momba azy, ny farangony sy ny hazofisaka ary ny barany, ny andriny, ny faladiany, '
  '34':
  - type: text
    content: 'ny rakotra hoditr’ondrilahy efa voaloko mena, ny sarona hoditra trozona, ny efitra lamba fanakonana, '
  '35':
  - type: text
    content: 'ny vatan’ny Vavolombelona sy ny baony ary ny rakotra fanaovam-panavotana, '
  '36':
  - type: text
    content: 'ny latabatra sy ny fanaka rehetra momba azy ary ny mofo atao fanatitra, '
  '37':
  - type: text
    content: 'ny fitoeran-jiro volamena tsy miharo sy ireo jiro, dia ireo jiro izay halahatra eo aminy sy ny fanaka rehetra momba azy, ny diloilo hatao fanazavana, '
  '38':
  - type: text
    content: 'ny alitara volamena, ny diloilo fanosorana, ny ditin-kazo mani-pofona, ny varavarana lamba ho eo amin’ny varavaran’ny tranolay, '
  '39':
  - type: text
    content: 'ny alitara varahina sy ny makarakara varahina ho eo aminy ary ny baony sy ny fanaka rehetra momba azy, ny koveta sy ny faladiany, '
  '4':
  - type: text
    content: 'Nataony nisy soroka izay nihazona ny efoda tamin’ny tendrony roa avy. '
  '40':
  - type: text
    content: 'ny fefy lamba eo amin’ny kianja sy ny andriny ary ny faladiany sy ny vavahady lamba eo amin’ny vavahadin’ny kianja, ny kofehiny, ny tsatòkan-day ary ny fiasana rehetra momba ny tabernakely, dia ny tranolay fihaonana, '
  '41':
  - type: text
    content: ny fitafiana fitondra amin’ny fanompoana, izay hoenti-manao fanompoam-pivavahana ao amin’ny fitoerana masina ho an’i Arona mpisorona ary ny fitafian’ireo zanany izay hoenti-manao fisoronana.
  '42':
  - type: text
    content: 'Araka izay rehetra nandidian’NY TOMPO an’i Mosesy, dia toy izany no nanaovan’ny Zanak’Israely ny asa rehetra. '
  '43':
  - type: text
    content: Ary nijery ny asa rehetra i Mosesy ka indro, efa natao araka izay nandidian’NY TOMPO izany. Dia nitsodrano ny olona i Mosesy.
  '5':
  - type: text
    content: Ary ny fehikibo momba ny efoda, izay teo amboniny, dia niray taminy sady nitovy tarehy taminy, ary nataony volamena, lamba manga, volomparasy, jaky ary kofehy rongony fotsy madinika voahasina, araka izay nandidian’NY TOMPO an’i Mosesy.
  '6':
  - type: text
    content: 'Nasiany randram-bolamena manodidina kosa ny vato berila dia nosoratany taminy, araka ny fanoratana fitombo-kase, ny anaran’ny Zanak’Israely. '
  '7':
  - type: text
    content: Ary nataony teo amin’ny soroky ny efoda ny vato, ho vato fahatsiarovana ho an’ny Zanak’Israely, araka izay nandidian’NY TOMPO an’i Mosesy.
  - type: heading
    content: Ny saron-tratra
  '8':
  - type: text
    content: 'Dia nataony ny saron-tratra, izay asan’ny mpanenona mahay, tahaka ny nanaovana ny '
  - type: text
    content: efoda
  - type: text
    content: ', dia tamin’ny volamena, lamba manga, volomparasy, jaky ary ny rongony fotsy madinika voahasina. '
  '9':
  - type: text
    content: 'Efa-joro miforitra roa no nanaovany ny saron-tratra, irain-jehy avy ny lafiny efatra sady niforitra roa izany. '
