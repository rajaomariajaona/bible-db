document_id: EXO.39
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Ny fitafian’ny Mpisoronabe: Ny efoda'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Tamin’ny lamba manga, volomparasy ary jaky no nanaovana ny fitafiana fitondra amin’ny fanompoana ao amin’ny fitoerana masina, ary natao ny fitafiana masina ho an’i Arona araka izay nandidian’NY TOMPO an’i Mosesy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Dia nanao ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: efoda
  - type: text
    text: ' tamin’ny volamena, lamba manga, volomparasy, jaky ary ny lamba rongony fotsy madinika voahasina izy'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '39.2 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Zahao '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 31.1-6.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary namisaka ny volamena ho takelaka manify izy dia nandidididy azy ho kofehy volamena ka nataony tady miaraka amin’ny kofehy manga, volomparasy, jaky ary ny lamba rongony fotsy madinika, asan’ny mpanenona mahay. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Nataony nisy soroka izay nihazona ny efoda tamin’ny tendrony roa avy. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ary ny fehikibo momba ny efoda, izay teo amboniny, dia niray taminy sady nitovy tarehy taminy, ary nataony volamena, lamba manga, volomparasy, jaky ary kofehy rongony fotsy madinika voahasina, araka izay nandidian’NY TOMPO an’i Mosesy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Nasiany randram-bolamena manodidina kosa ny vato berila dia nosoratany taminy, araka ny fanoratana fitombo-kase, ny anaran’ny Zanak’Israely. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ary nataony teo amin’ny soroky ny efoda ny vato, ho vato fahatsiarovana ho an’ny Zanak’Israely, araka izay nandidian’NY TOMPO an’i Mosesy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny saron-tratra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dia nataony ny saron-tratra, izay asan’ny mpanenona mahay, tahaka ny nanaovana ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: efoda
  - type: text
    text: ', dia tamin’ny volamena, lamba manga, volomparasy, jaky ary ny rongony fotsy madinika voahasina. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Efa-joro miforitra roa no nanaovany ny saron-tratra, irain-jehy avy ny lafiny efatra sady niforitra roa izany. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dia nasiany vato alatsaka an-tranontranony izany, vato efatra andalana: Ny andalana voalohany dia karnelia sy topaza ary emeraoda; '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'ny andalana faharoa dia robisy sy safira ary oniksa; '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'ny andalana fahatelo dia opala sy agata ary ametista; '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'ary ny andalana fahefatra dia krizolita sy berila ary jaspy. Nasiany randram-bolamena manodidina ny fitoerany avy. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ny vato dia nalahatra araka ny anaran’ny fokon’ny Zanak’Israely, roa amby folo araka ny anarany avy. Izy ireo dia nitondra ny anaran’ny foko roa amby folo, voasoratra toy ny amin’ny fitombo-kase.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Nasiany rojo kely volamena tsy miharo, mifanolana toy ny tady, teo amin’ny saron-tratra. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Nataony koa ny randram-bolamena roa sy mason-drojo volamena roa; ny mason-drojo dia natao teo amin’ny zorony roa ambony amin’ny saron-tratra. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ny tady volamena roa dia nataony teo amin’ny mason-drojo roa izay amin’ny zorony roa ambany amin’ny saron-tratra. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ny lanin’ny tady roa dia nataony teo amin’ny randram-bolamena roa, ary nataony teo amin’ny soroky ny efoda, teo anoloana. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Nataony indray koa ny mason-drojo volamena roa, natsofony teo amin’ny zorony roa ambany amin’ny saron-tratra, amin’ny sisiny anatiny izay mikasika ny efoda. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Mbola nanao mason-drojo volamena roa koa izy ka napetany teo ambanin’ny soroka roa amin’ny efoda, eo anoloany, akaikin’ny fikambanany, ary eo ambonin’ny fehikibo momba ny efoda. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Kofehy manga no namehezany ny mason-drojon’ny saron-tratra tamin’ny mason-drojon’ny efoda, mba ho eo ambonin’ny fehikibo momba ny efoda ny saron-tratra ka tsy hikisaka hiala eo, dia araka izay nandidian’NY TOMPO an’i Mosesy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ireo akanjo masina hafa
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Nataony indray ny akanjobe misy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: efoda
  - type: text
    text: ', asan’ny mpanenona, ka nataony miloko manga tokam-bolo. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ny vozon’ny akanjo ivelany dia teo afovoany tahaka ny vozon’ny akanjo fiarovan-tratra, ary nisy sisiny manodidina ny vozony mba tsy haharovitra azy. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Teo amin’ny morontongotry ny akanjobe dia nasiany sarin’ampongabendanitra miloko manga, volomparasy, jaky voahasina; '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'ary nanaovany lakolosy kely volamena tsy miharo, koa ny lakolosy kely dia natao teo anelanelan’ny ampongabendanitra tamin’ny morontongotry ny akanjobe manodidina, dia teo anelanelan’ny ampongabendanitra: '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Lakolosy sy sarin’ampongabendanitra no mifanelanelana manodidina eo amin’ny morontongotry ny akanjobe izay hoentiny manao ny fanompoam-pivavahana, araka izay nandidian’NY TOMPO an’i Mosesy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Lamba rongony fotsy madinika no nanaovany ny akanjo lava, asan’ny mpanenona, ho an’i Arona sy ny zanany. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Lamba rongony fotsy madinika koa no nanaovany ny fehiloha, ary ny satroka tsara tarehy ihany koa dia nataony tamin’ny lamba rongony fotsy madinika; ny kalisaonina fohy dia nataony tamin’ny lamba rongony fotsy madinika voahasina. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Ny fehikibo koa dia lamba rongony fotsy madinika voahasina, lamba manga, volomparasy ary jaky, asan’ny mpahay tenona samihafa soratra, araka izay nandidian’NY TOMPO an’i Mosesy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ary ny takelaka ho eo amin’ny diadema masina dia nataony amin’ny volamena tsy miharo sady nasiany soratra, araka ny fanoratana amin’ny fitombo-kase, hoe: NOHAMASININA HO AN’NY TOMPO. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Dia nasiany kofehy manga hamehezana azy amin’ny fehiloha eo ambony, dia araka izay efa nandidian’NY TOMPO an’i Mosesy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Vita ny asa
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Dia vita ny asa rehetra tamin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tabernakely
  - type: text
    text: ', dia ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tranolay fihaonana
  - type: text
    text: ', satria efa nanatanteraka izay rehetra nandidian’NY TOMPO an’i Mosesy ny Zanak’Israely.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Dia noentiny teo amin’i Mosesy ny tabernakely, dia ny tranolay sy ny fanaka rehetra momba azy, ny farangony sy ny hazofisaka ary ny barany, ny andriny, ny faladiany, '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'ny rakotra hoditr’ondrilahy efa voaloko mena, ny sarona hoditra trozona, ny efitra lamba fanakonana, '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'ny vatan’ny Vavolombelona sy ny baony ary ny rakotra fanaovam-panavotana, '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'ny latabatra sy ny fanaka rehetra momba azy ary ny mofo atao fanatitra, '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'ny fitoeran-jiro volamena tsy miharo sy ireo jiro, dia ireo jiro izay halahatra eo aminy sy ny fanaka rehetra momba azy, ny diloilo hatao fanazavana, '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'ny alitara volamena, ny diloilo fanosorana, ny ditin-kazo mani-pofona, ny varavarana lamba ho eo amin’ny varavaran’ny tranolay, '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'ny alitara varahina sy ny makarakara varahina ho eo aminy ary ny baony sy ny fanaka rehetra momba azy, ny koveta sy ny faladiany, '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'ny fefy lamba eo amin’ny kianja sy ny andriny ary ny faladiany sy ny vavahady lamba eo amin’ny vavahadin’ny kianja, ny kofehiny, ny tsatòkan-day ary ny fiasana rehetra momba ny tabernakely, dia ny tranolay fihaonana, '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: ny fitafiana fitondra amin’ny fanompoana, izay hoenti-manao fanompoam-pivavahana ao amin’ny fitoerana masina ho an’i Arona mpisorona ary ny fitafian’ireo zanany izay hoenti-manao fisoronana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Araka izay rehetra nandidian’NY TOMPO an’i Mosesy, dia toy izany no nanaovan’ny Zanak’Israely ny asa rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: Ary nijery ny asa rehetra i Mosesy ka indro, efa natao araka izay nandidian’NY TOMPO izany. Dia nitsodrano ny olona i Mosesy.
