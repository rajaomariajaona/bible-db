    - type: text
      text: 'Ny fitafian’ny Mpisoronabe: Ny efoda'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tamin’ny lamba manga, volomparasy ary jaky no nanaovana ny fitafiana fitondra amin’ny fanompoana ao amin’ny fitoerana masina, ary natao ny fitafiana masina ho an’i Arona araka izay nandidian’NY TOMPO an’i Mosesy.
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nasiany vato alatsaka an-tranontranony izany, vato efatra andalana: Ny andalana voalohany dia karnelia sy topaza ary emeraoda; '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ny andalana faharoa dia robisy sy safira ary oniksa; '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ny andalana fahatelo dia opala sy agata ary ametista; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary ny andalana fahefatra dia krizolita sy berila ary jaspy. Nasiany randram-bolamena manodidina ny fitoerany avy. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny vato dia nalahatra araka ny anaran’ny fokon’ny Zanak’Israely, roa amby folo araka ny anarany avy. Izy ireo dia nitondra ny anaran’ny foko roa amby folo, voasoratra toy ny amin’ny fitombo-kase.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nasiany rojo kely volamena tsy miharo, mifanolana toy ny tady, teo amin’ny saron-tratra. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nataony koa ny randram-bolamena roa sy mason-drojo volamena roa; ny mason-drojo dia natao teo amin’ny zorony roa ambony amin’ny saron-tratra. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny tady volamena roa dia nataony teo amin’ny mason-drojo roa izay amin’ny zorony roa ambany amin’ny saron-tratra. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny lanin’ny tady roa dia nataony teo amin’ny randram-bolamena roa, ary nataony teo amin’ny soroky ny efoda, teo anoloana. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nataony indray koa ny mason-drojo volamena roa, natsofony teo amin’ny zorony roa ambany amin’ny saron-tratra, amin’ny sisiny anatiny izay mikasika ny efoda. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nanao ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: efoda
    - type: text
      text: ' tamin’ny volamena, lamba manga, volomparasy, jaky ary ny lamba rongony fotsy madinika voahasina izy'
