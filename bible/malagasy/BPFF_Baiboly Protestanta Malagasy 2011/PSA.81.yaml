document_id: PSA.81,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Enga anie ka hihaino Ahy ianao
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: Ho an’ny mpiventy hira. Al-gitit. Nataon’i Asafa.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Mihobia ho an’Andriamanitra herintsika!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manaova feo fifaliana ho an’Andriamanitr’i Jakoba!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Izaho no TOMPO Andriamanitrao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay nitondra anao niakatra avy tany amin’ny tany Ejipta;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: atanatanao ny vavanao dia hofenoiko.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Nefa tsy nihaino ny feoko ny oloko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy nankatò Ahy ny Israely
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ka navelako hanaraka ny ditran’ny fony izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: handehanany manaraka ny fisainan’ny tenany.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Enga anie ka hihaino Ahy ny oloko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka handeha amin’ny lalako ny Israely!
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Vetivety dia hampietry ny fahavalony Aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hamerina ny tanako hamely ny rafiny!
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Izay mankahala NY TOMPO dia hikoy Aminy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa haharitra mandrakizay ny andron’ny oloko.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Hampihinana azy vary tsara indrindra Izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, tantely avy amin’ny vatolampy no hamokisako anao.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Asandrato ny hira ka velezo ny ampongatapaka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tendreo ny lokanga tsara faneno mbamin’ny valiha.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Tsofy ny anjomara amin’ny voaloham-bolana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: amin’ny fenovolana, dia amin’ny andro firavoravoantsika.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Fa lalàna ho an’ny Israely izany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary fitsipika avy amin’Andriamanitr’i Jakoba.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Notendreny ho vavolombelona eo amin’i Josefa izany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: raha nandeha namely ny tany Ejipta Izy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Nandre feo tsy fantatro aho niteny hoe:'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Nampiala ny entana tamin’ny sorony Aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nitsahatra tsy nitondra sobika ny tanany.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Fony azom-pahoriana ianao dia niantso Ahy ka nanafaka anao Aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: namaly anao tao amin’ny fiafenan’ny kotrokorana Aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ary nizaha toetra anao tao amin’ny ranon’i Meriba. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Fiatoana.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Mihainoa, ry oloko, fa hanambara aminao Aho!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Enga anie ka hihaino Ahy ianao, ry Israely ô;
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Aza asiana andriamanitra hafa eo aminao!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aza miankohoka amin’ny andriamanitry ny firenena hafa!
