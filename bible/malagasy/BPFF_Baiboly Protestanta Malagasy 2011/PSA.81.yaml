document_id: PSA.81,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Enga anie ka hihaino Ahy ianao
  - type: text
    content: Ho an’ny mpiventy hira. Al-gitit. Nataon’i Asafa.
  - type: text
    content: Mihobia ho an’Andriamanitra herintsika!
  - type: text
    content: Manaova feo fifaliana ho an’Andriamanitr’i Jakoba!
  '10':
  - type: text
    content: Izaho no TOMPO Andriamanitrao
  - type: text
    content: izay nitondra anao niakatra avy tany amin’ny tany Ejipta;
  - type: text
    content: atanatanao ny vavanao dia hofenoiko.
  '11':
  - type: text
    content: Nefa tsy nihaino ny feoko ny oloko
  - type: text
    content: ary tsy nankatò Ahy ny Israely
  '12':
  - type: text
    content: ka navelako hanaraka ny ditran’ny fony izy,
  - type: text
    content: handehanany manaraka ny fisainan’ny tenany.
  '13':
  - type: text
    content: Enga anie ka hihaino Ahy ny oloko
  - type: text
    content: ka handeha amin’ny lalako ny Israely!
  '14':
  - type: text
    content: Vetivety dia hampietry ny fahavalony Aho
  - type: text
    content: ka hamerina ny tanako hamely ny rafiny!
  '15':
  - type: text
    content: Izay mankahala NY TOMPO dia hikoy Aminy,
  - type: text
    content: fa haharitra mandrakizay ny andron’ny oloko.
  '16':
  - type: text
    content: Hampihinana azy vary tsara indrindra Izy;
  - type: text
    content: eny, tantely avy amin’ny vatolampy no hamokisako anao.
  '2':
  - type: text
    content: Asandrato ny hira ka velezo ny ampongatapaka
  - type: text
    content: ary tendreo ny lokanga tsara faneno mbamin’ny valiha.
  '3':
  - type: text
    content: Tsofy ny anjomara amin’ny voaloham-bolana,
  - type: text
    content: amin’ny fenovolana, dia amin’ny andro firavoravoantsika.
  '4':
  - type: text
    content: Fa lalàna ho an’ny Israely izany
  - type: text
    content: ary fitsipika avy amin’Andriamanitr’i Jakoba.
  '5':
  - type: text
    content: Notendreny ho vavolombelona eo amin’i Josefa izany
  - type: text
    content: raha nandeha namely ny tany Ejipta Izy.
  - type: text
    content: 'Nandre feo tsy fantatro aho niteny hoe:'
  '6':
  - type: text
    content: Nampiala ny entana tamin’ny sorony Aho,
  - type: text
    content: nitsahatra tsy nitondra sobika ny tanany.
  '7':
  - type: text
    content: Fony azom-pahoriana ianao dia niantso Ahy ka nanafaka anao Aho;
  - type: text
    content: namaly anao tao amin’ny fiafenan’ny kotrokorana Aho
  - type: text
    content: 'ary nizaha toetra anao tao amin’ny ranon’i Meriba. '
  - type: text
    content: Fiatoana.
  '8':
  - type: text
    content: Mihainoa, ry oloko, fa hanambara aminao Aho!
  - type: text
    content: Enga anie ka hihaino Ahy ianao, ry Israely ô;
  '9':
  - type: text
    content: Aza asiana andriamanitra hafa eo aminao!
  - type: text
    content: Aza miankohoka amin’ny andriamanitry ny firenena hafa!
