document_id: 2CO.9
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Hafatrafatra hafa momba ny famoriam-bola
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Fa ny amin’ny fahafoizam-pananana ho an’ny olona masina dia tsy misy tokony hanoratako aminareo. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Fa fantatro ny fahazotoanareo ary nataoko rehareha tamin’ny Makedoniana ianareo hoe: Efa vonona hatramin’iny taona lasa iny i Akaia, ary ny zotom-ponareo dia nampirisika ny maro. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Kanefa naniraka ireo rahalahy ireo ihany aho, fandrao ho foana ny reharehanay ny aminareo amin’izany zavatra izany, fa mba ho vonona tanteraka ianareo araka izay voalazako. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Fandrao, raha toa ka hisy hiaraka amiko ny avy atỳ Makedonia ka hahita anareo tsy mbola vonona dia ho lasa henatra ho anay izany, mba tsy hilazana hoe henatra ho anareo. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Noheveriko fa ilaina ny mangataka ny rahalahy hialoha lalana ahy hankany aminareo ka hanomana mialoha ny fanomezana izay efa nanomezanareo toky fa hataonareo, mba ho fanomezana noho ny fahalalahan-tanana izany fa tsy toy ny zavatra noterena hatao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Fa izao no lazaiko: Izay mamafy kely dia kely no hojinjainy; fa izay mamafy be dia be kosa no hojinjainy. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Aoka ny olona rehetra samy hanome araka izay noheveriny tao am-pony avy, tsy amin’ny alahelo, na amin’ny faneriterena; satria «ny mpanome amin’ny fifaliana no tian’Andriamanitra» (Oha 22.8). '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Fa Andriamanitra mahay mampitombo ho anareo ny fahasoavana rehetra mba hanananareo ny ampy mandrakariva amin’ny zavatra rehetra, sady hitomboanareo amin’ny asa tsara rehetra; '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'araka ny voasoratra hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Namafy izy, eny, nanome ho an’ny mahantra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: maharitra mandrakizay ny fahamarinany (Sal 112.9).
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary izay manome voa ho an’ny mpamafy sy mofo hohanina dia hanome sy hahamaro ny voa afafinareo ary hampitombo ny vokatry ny fahamarinanareo, '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'dia hanankarena amin’ny zavatra rehetra ianareo noho ny fahalalahan-tanana samihafa asehonareo, izay mahatonga ny fisaoranay an’Andriamanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Fa ny fanaovana izany fanompoam-pivavahana izany dia tsy mahafa-pahasahiranana ny olona masina ihany fa mahabe ny fisaoran’ny maro an’Andriamanitra koa, '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'satria ny fahitana porofo ny toetranareo manao izany fanompoana izany no ankalazany an’Andriamanitra, noho ny fankatoavanareo tamin’ny fanekena ny Filazantsaran’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' sy noho ny fahalalahan-tanana nasehonareo taminy sy tamin’ny olona rehetra; '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'ary amin’ny vavaka ataony ho anareo dia maneho fitiavana anareo izy noho ny haben’ny fahasoavan’Andriamanitra aminareo. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Isaorana anie Andriamanitra noho ny fanomezany tsy hay tononina.
