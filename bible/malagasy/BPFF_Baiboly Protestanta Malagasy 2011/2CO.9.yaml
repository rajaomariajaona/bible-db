document_id: 2CO.9,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Hafatrafatra hafa momba ny famoriam-bola
  - type: text
    content: 'Fa ny amin’ny fahafoizam-pananana ho an’ny olona masina dia tsy misy tokony hanoratako aminareo. '
  '10':
  - type: text
    content: 'Ary izay manome voa ho an’ny mpamafy sy mofo hohanina dia hanome sy hahamaro ny voa afafinareo ary hampitombo ny vokatry ny fahamarinanareo, '
  '11':
  - type: text
    content: 'dia hanankarena amin’ny zavatra rehetra ianareo noho ny fahalalahan-tanana samihafa asehonareo, izay mahatonga ny fisaoranay an’Andriamanitra. '
  '12':
  - type: text
    content: 'Fa ny fanaovana izany fanompoam-pivavahana izany dia tsy mahafa-pahasahiranana ny olona masina ihany fa mahabe ny fisaoran’ny maro an’Andriamanitra koa, '
  '13':
  - type: text
    content: 'satria ny fahitana porofo ny toetranareo manao izany fanompoana izany no ankalazany an’Andriamanitra, noho ny fankatoavanareo tamin’ny fanekena ny Filazantsaran’i '
  - type: text
    content: Kristy
  - type: text
    content: ' sy noho ny fahalalahan-tanana nasehonareo taminy sy tamin’ny olona rehetra; '
  '14':
  - type: text
    content: 'ary amin’ny vavaka ataony ho anareo dia maneho fitiavana anareo izy noho ny haben’ny fahasoavan’Andriamanitra aminareo. '
  '15':
  - type: text
    content: Isaorana anie Andriamanitra noho ny fanomezany tsy hay tononina.
  '2':
  - type: text
    content: 'Fa fantatro ny fahazotoanareo ary nataoko rehareha tamin’ny Makedoniana ianareo hoe: Efa vonona hatramin’iny taona lasa iny i Akaia, ary ny zotom-ponareo dia nampirisika ny maro. '
  '3':
  - type: text
    content: 'Kanefa naniraka ireo rahalahy ireo ihany aho, fandrao ho foana ny reharehanay ny aminareo amin’izany zavatra izany, fa mba ho vonona tanteraka ianareo araka izay voalazako. '
  '4':
  - type: text
    content: 'Fandrao, raha toa ka hisy hiaraka amiko ny avy atỳ Makedonia ka hahita anareo tsy mbola vonona dia ho lasa henatra ho anay izany, mba tsy hilazana hoe henatra ho anareo. '
  '5':
  - type: text
    content: Noheveriko fa ilaina ny mangataka ny rahalahy hialoha lalana ahy hankany aminareo ka hanomana mialoha ny fanomezana izay efa nanomezanareo toky fa hataonareo, mba ho fanomezana noho ny fahalalahan-tanana izany fa tsy toy ny zavatra noterena hatao.
  '6':
  - type: text
    content: 'Fa izao no lazaiko: Izay mamafy kely dia kely no hojinjainy; fa izay mamafy be dia be kosa no hojinjainy. '
  '7':
  - type: text
    content: 'Aoka ny olona rehetra samy hanome araka izay noheveriny tao am-pony avy, tsy amin’ny alahelo, na amin’ny faneriterena; satria «ny mpanome amin’ny fifaliana no tian’Andriamanitra» (Oha 22.8). '
  '8':
  - type: text
    content: 'Fa Andriamanitra mahay mampitombo ho anareo ny fahasoavana rehetra mba hanananareo ny ampy mandrakariva amin’ny zavatra rehetra, sady hitomboanareo amin’ny asa tsara rehetra; '
  '9':
  - type: text
    content: 'araka ny voasoratra hoe:'
  - type: text
    content: Namafy izy, eny, nanome ho an’ny mahantra;
  - type: text
    content: maharitra mandrakizay ny fahamarinany (Sal 112.9).
