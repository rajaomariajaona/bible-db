document_id: NUM.12,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary i Miriama sy i Arona dia niteny nanome tsiny an’i Mosesy noho ny vehivavy kosita izay nampakariny; fa efa nampakatra vehivavy kosita izy. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny rahona dia niala tamin’ny tranolay; ary indro, tonga boka i Miriama ka fotsy tahaka ny orampanala. Ary nijery an’i Miriama i Arona ka indro fa lasa boka ny anabaviny. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy i Arona tamin’i Mosesy: Indrisy, tompoko, mifona aminao re, aza atao ho helokay ny nanaovanay hadalana sy ny nanotanay. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aza dia avela ho toy ny zaza maty vao teraka izy ka lany sahady ny antsasaky ny nofony. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nitaraina tamin’NY TOMPO i Mosesy hoe: Andriamanitra ô, mifona aminao aho mba sitrano re izy! '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy NY TOMPO tamin’i Mosesy: Raha nandrora tamin’ny tavany ny rainy, moa tsy ho afa-baraka hafitoana va izy? Koa atokana any ivelan’ny toby mandritra ny hafitoana izy, ary rehefa afaka izany, izay vao hiverina indray izy. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia natokana tany ivelan’ny toby hafitoana i Miriama; ary tsy niainga ny olona raha tsy efa tafaverina i Miriama. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Rehefa afaka izany vao niainga niala tany Hazerota ny olona ka nitoby tany an-tany efitra Parana.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy izy mianadahy: Moa i Mosesy ihany va no nitenenan’NY TOMPO fa tsy izahay koa mba nitenenany? Dia ren’NY TOMPO izany. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I Mosesy anefa dia lehilahy malemy fanahy mihoatra noho ny olona rehetra etỳ ambonin’ny tany.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary NY TOMPO niteny tampoka tamin’i Mosesy sy i Arona ary i Miriama hoe: Mivoaha ho any amin’ny tranolay fihaonana ianareo telo mianadahy. Dia nivoaka ny toby izy telo mianadahy. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nidina tamin’ny andry rahona NY TOMPO ka nijoro teo am-baravaran’ny tranolay; dia niantso an’i Arona sy i Miriama Izy ka nivoaka ny toby izy mianadahy. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy Izy:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mba henoy ny teniko!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha misy mpaminanin’NY TOMPO eo aminareo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia amin’ny fahitana no ampahafantarako ny tenako aminy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary amin’ny nofy no itenenako aminy.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa tsy toy izany kosa i Mosesy mpanompoko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay mahatoky amin’ny tranoko manontolo.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mifanatrika no itenenako aminy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: amin’ny teny mazava fa tsy amin’ny ankamantatra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mandinika ny endriky NY TOMPO mihitsy izy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa nahoana ianareo no tsy matahotra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hanome tsiny an’i Mosesy mpanompoko?
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nirehitra tamin’izy mianadahy ny fahatezeran’NY TOMPO ary lasa Izy. '
