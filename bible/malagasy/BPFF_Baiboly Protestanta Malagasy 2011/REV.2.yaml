document_id: REV.2,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Epistily ho an’ny Fiangonana any Efesosy
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Soraty ho an’ny anjelin’ny Fiangonana any Efesosy:'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao no lazain’Ilay mihazona ny kintana fito eny an-tanany havanana sady mandeha eo afovoan’ny fitoeran-jiro volamena fito: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aza matahotra izay hiaretanao. Indro, ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: devoly
    - type: text
      text: ' dia hanipy ny sasany aminareo ho ao an-tranomaizina mba ho voazaha toetra ianareo, ary hanam-pahoriana hafoloana. Aoka ho mahatoky hatramin’ny fahafatesana ianao, dia homeko anao ny satroboninahitry ny fiainana.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izay manan-tsofina, aoka izy hihaino izay lazain’ny Fanahy amin’ny Fiangonana rehetra!
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izay mandresy dia tsy hosimban’ny fahafatesana faharoa.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Epistily ho an’ny Fiangonana any Pergamosy
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary soraty ho an’ny anjelin’ny Fiangonana any Pergamosy:'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao no lazain’Ilay manana ny sabatra roa lela maranitra: '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fantatro izay onenanao, dia ao amin’ny itoeran’ny sezafiandrianan’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Satana
    - type: text
      text: '. Mitana mafy ny anarako ianao ka tsy nandà ny finoana Ahy, na dia tamin’ny andron’i Antipasy vavolombeloko aza, izay lehilahy nahatoky Ahy, dia ilay novonoina teo aminareo, teo amin’izay onenan’i Satana. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Kanefa manan-teny kely aminao Aho, fa misy eo aminao izay mitana ny fampianaran’i Balama, ilay nanome fo an’i Balaka hanisy fahatafintohinana teo anoloan’ny Zanak’Israely, hihinana hena naterina tamin’ny sampy sy hijangajanga. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary toy izany koa, misy eo aminao izay mitana ny fampianaran’ny Nikolaìta tahaka ny an’ireny. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Koa mibebaha; fa raha tsy izany dia ho avy aminao haingana Aho ka hamely ireo amin’ny sabatry ny vavako.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izay manan-tsofina, aoka izy hihaino izay lazain’ny Fanahy amin’ny Fiangonana rehetra!
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izay mandresy dia homeko mana miafina sady homeko vato fotsy, ary eo amin’izany vato izany dia misy anaram-baovao voasoratra izay tsy fantatr’olona afa-tsy izay mandray azy ihany.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Epistily ho an’ny Fiangonana any Tiatira
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary soraty ho an’ny anjelin’ny Fiangonana any Tiatira:'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao no lazain’ny Zanak’Andriamanitra izay manana maso toy ny lelafo, ary ny tongony tahaka ny varahina manganohano: '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fantatro ny asanao, ny fitiavanao, ny finoanao, ny fanompoanao ary ny faharetanao, ary ny asanao farany dia maro noho ny voalohany. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fantatro ny asanao sy ny fikelezanao aina ary ny fiaretanao sy ny tsy fahazakanao izay mpanao ratsy; ary ianao dia efa nizaha toetra izay milaza ny tenany ho Apostoly, kanjo tsy izy, ary hitanao fa mpandainga izy. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Kanefa manan-teny aminao Aho satria ianao dia mandefitra amin’ilay vehivavy Jezebela izay milaza ny tenany ho mpaminanivavy ka mampianatra sady manoloky ny mpanompoko hijangajanga sy hihinana hena naterina tamin’ny sampy. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nomeko andro hibebahany izy nefa tsy mety mibebaka amin’ny fijangajangany izy. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Indro, hampandamahiko eo am-pandriana izy, ary izay mijangajanga aminy dia hataoko ao amin’ny fahoriana lehibe raha tsy mibebaka amin’ny asan-dRavehivavy izy. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hovonoiko amin’ny areti-mandringana ny zanany; ary ny Fiangonana rehetra dia hahalala fa Izaho no mandinika ny voa sy ny fo; ary homeko araka ny asanareo avy ianareo rehetra. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa aminareo izay sisa any Tiatira, dia izay tsy manana izany fampianarana izany sady tsy mba mahalala ny ataon’ireo hoe sain-dalin’i Satana, dia izao no lazaiko: Tsy hovesarako entana hafa ianareo. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Kanefa izay anananareo dia tano mafy mandra-piaviko.
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary izay mandresy ka mitandrina ny asako hatramin’ny farany dia homeko fahefana amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jentilisa
    - type: text
      text: '. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hiandry azy amin’ny tehim-by izy ka hanorotoro azy toy ny fanorotoro vilany tany, araka izay noraisiko tamin’ny Raiko. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary homeko azy ny kintana fitarikandro.
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izay manan-tsofina, aoka izy hihaino izay lazain’ny Fanahy amin’ny Fiangonana rehetra!
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Manana faharetana ianao ka niaritra noho ny anarako sady tsy reraka. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Kanefa manan-teny aminao Aho satria efa niala tamin’ny fitiavanao voalohany ianao. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa tsarovy izay nitoeranao fony tsy mbola lavo dia mibebaha ka manaova ny asa voalohany; fa raha tsy izany dia ho avy aminao Aho ka hamindra ny fitoeran-jironao hiala amin’ny toerany raha tsy mibebaka ianao. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Kanefa izao no toetranao: Halanao ny asan’ny Nikolaìta izay halako koa.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izay manan-tsofina, aoka izy hihaino izay lazain’ny Fanahy amin’ny Fiangonana rehetra!
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izay mandresy dia havelako hihinana ny avy amin’ny hazon’aina izay eo amin’ny Paradisan’Andriamanitra.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Epistily ho an’ny Fiangonana any Smirna
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary soraty ho an’ny anjelin’ny Fiangonana any Smirna:'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao no lazain’ny Voalohany sy ny Farany izay efa maty nefa velona indray: '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fantatro ny fahorianao sy ny fahantranao, nefa manankarena ianao, ary ny fitenenan-dratsy ataon’izay milaza ny tenany ho '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jiosy
    - type: text
      text: ', kanjo tsy izy fa sinagogan’i Satana. '
