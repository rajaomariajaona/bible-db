document_id: EZK.48
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny zaratany ho an’ireo foko any avaratra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Izao no anaran’ireo foko: Hatramin’ny farany avaratra any amoron-dranomasina, amin’ny lalana mankany Hetlona any akaikin’i Hamata sy Hazara-Enana, ny sisintanin’i Damaskosy eo avaratra, any anilan’i Hamata; izany no ho lafiny atsinanana sy andrefana: Anjara iray ho an’i Dana. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Mifanolotra amin’ny sisintanin’i Dana hatrany atsinanana ka hatrany andrefana dia anjara iray ho an’i Asera. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Mifanolotra amin’ny sisintanin’i Asera, hatrany atsinanana ka hatrany andrefana dia anjara iray ho an’i Naftaly. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Mifanolotra amin’ny sisintanin’i Naftaly, hatrany atsinanana ka hatrany andrefana, dia anjara iray ho an’i Manase. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Mifanolotra amin’ny sisintanin’i Manase, hatrany atsinanana ka hatrany andrefana, dia anjara iray ho an’i Efraima. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Mifanolotra amin’ny sisintanin’i Efraima, hatrany atsinanana ka hatrany andrefana, dia anjara iray koa ho an’i Robena. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Mifanolotra amin’ny sisintanin’i Robena, hatrany atsinanana ka hatrany andrefana, dia anjara iray ho an’i Joda.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny zaratany ho an’NY TOMPO
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary mifanolotra amin’ny sisintanin’i Joda, hatrany atsinanana ka hatrany andrefana, no hisy ilay tany hatokanareo, indimy arivo sy roa alin’ny volotara fandrefesana ny sakany, ary ny lavany dia mitovy amin’ny lavan’ny anjaran’ny firenena tsirairay, hatrany atsinanana ka hatrany andrefana; ary ny fitoerana masina no ho eo afovoany. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ny tany izay hatokanareo ho an’NY TOMPO dia dimy arivo sy roa alina ny lavany, ary iray alina ny sakany. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ho an’ny mpisorona izany tany masina voatokana izany, dimy arivo sy roa alina ny lavany avaratra, iray alina ny sakany andrefana, iray alina ny sakany atsinanana ary dimy arivo sy roa alina ny lavany atsimo, ary ny fitoerana masin’NY TOMPO no ho eo afovoany. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ho an’ny mpisorona izay nohamasinina avy amin’ny taranak’i Zadoka izany, dia ireo nitandrina ny nasaiko notandremana ka tsy nivily tamin’ny nivilian’ny Zanak’Israely, tahaka ny nivilian’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: levita
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Eny, ho azy izany, ho tany halaina amin’ilay efa voatokana, dia zavatra masina indrindra, mifanolotra amin’ny sisintanin’ny levita.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ny levita koa dia hahazo ny mifanolotra amin’ny sisintanin’ny mpisorona, dia dimy arivo sy roa alina ny lavany, iray alina ny sakany. Eny, samy dimy arivo sy roa alina ny lavany ary iray alina ny sakany. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Tsy ho azony analana hamidy izany, na atakalo, ary tsy hafindrany ny voaloham-bokatra amin’ny tany, fa masina ho an’NY TOMPO izany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny zaratany ho an’ny tanàna ary ny ho an’ny mpanjaka
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary ny dimy arivo, ilay navela tamin’ny sakany mifanolotra amin’ny dimy arivo sy roa alina, dia tsy masina fa ho an’ny tanàna, ho tany fonenana sy ho tany fiandrasam-biby, ary ny tanàna no ho ao afovoany. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary izao no refiny: Ny avaratra dia ho dimanjato sy efatra arivo, ny atsimo dia ho dimanjato sy efatra arivo, ny atsinanana dia ho dimanjato sy efatra arivo ary ny andrefana dia ho dimanjato sy efatra arivo. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ny amin’ny tany fiandrasam-biby momba ny tanàna: Ny eo amin’ny avaratra dia ho dimampolo sy roanjato, ny eo amin’ny atsinanana dia ho dimampolo sy roanjato ary ny eo amin’ny andrefana dia ho dimampolo sy roanjato. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ny lavany sisa mifanolotra amin’ny anjara masina voatokana dia iray alina amin’ny atsinanana, iray alina amin’ny andrefana ary hifanolotra amin’ny anjara masina voatokana izany; ny vokatra avy aminy dia ho sakafon’ny mpiasa ao an-tanàna. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Izay mpiasa ao an-tanàna avy amin’ny fokon’ny Israely rehetra no hiasa azy. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ny tany voatokana rehetra dia ho efamira, dimy arivo sy roa alina sy dimy arivo sy roa alina; ny ampahefatry ny anjara masina voatokana dia halainareo ho zaratany momba ny tanàna.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ho an’ny mpanjaka ny sisa eo an-daniny roa amin’ny anjara masina voatokana sy ny zaratany momba ny tanàna; mifanolotra amin’ny dimy arivo sy roa alina amin’ny anjara voatokana hatramin’ny sisintany atsinanana ary mifanolotra amin’ny dimy arivo amby roa alina hatramin’ny sisintany andrefana, mifanolotra amin’ny anjaran’ireo foko; ho an’ny mpanjaka izany; ary ny anjara masina voatokana sy ny Trano, fitoerana masina, no ho eo afovoany. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Hatramin’ny zaratanin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: levita
  - type: text
    text: ' sy ny zaratany momba ny tanàna izay ao ampovoan’ny an’ny mpanjaka, anelanelan’ny faritanin’i Joda sy Benjamina, dia ho an’ny mpanjaka izany.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny zaratany ho an’ireo foko any atsimo
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary ny amin’ny firenena sisa, hatramin’ny lafiny atsinanana ka hatramin’ny andrefana, dia hisy anjara iray ho an’i Benjamina. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Mifanolotra amin’ny sisintanin’i Benjamina, hatrany atsinanana ka hatrany andrefana, dia anjara iray ho an’i Simeona. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Mifanolotra amin’ny sisintanin’i Simeona, hatrany atsinanana ka hatrany andrefana, dia anjara iray ho an’Isakara. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Mifanolotra amin’ny sisintanin’Isakara, hatrany atsinanana ka hatrany andrefana, dia anjara iray ho an’i Zebolona. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Mifanolotra amin’ny sisintanin’i Zebolona, hatrany atsinanana ka hatrany andrefana, dia anjara iray ho an’i Gada. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Mifanolotra amin’ny faritanin’i Gada, amin’ny lafiny atsimo, ny sisintany dia hatrany Tamara sy ny ranon’i Meriba any Kadesy sy ny lohasahan-driaka ka hatramin’ny Ranomasina Lehibe. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Izany no tany hozarainareo amin’ny antsapaka ho lova ho an’ny firenen’ny Israely, ary izany no ho anjarany avy, hoy NY TOMPO Andriamanitra.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny varavarana roa amby folo ao Jerosalema
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Izao no refin’ny tanàna amin’ny lafiny avaratra: Dimanjato sy efatra arivo. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ny anaran’ny vavahady dia ho toy ny anaran’ny fokon’ny Israely: Ny vavahady telo avaratra dia vavahadin’i Robena ny iray, vavahadin’i Joda ny iray, vavahadin’i Levy ny iray. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Amin’ny lafiny atsinanana, dimanjato sy efatra arivo; ary ny vavahady telo, dia vavahadin’i Josefa ny iray, vavahadin’i Benjamina ny iray ary vavahadin’i Dana ny iray. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Amin’ny lafiny atsimo, mirefy dimanjato sy efatra arivo, ary ny vavahady telo, dia vavahadin’i Simeona ny iray, vavahadin’Isakara ny iray, vavahadin’i Zebolona ny iray. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Amin’ny andrefana, dimanjato sy efatra arivo; telo ny vavahadiny, dia vavahadin’i Gada ny iray, vavahadin’i Asera ny iray, vavahadin’i Naftaly ny iray. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Valo arivo sy iray alina ny manodidina. Ary ny anaran’ny tanàna hatramin’izay andro izay dia: NY TOMPO NO AO.'
