document_id: EZK.48,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny zaratany ho an’ireo foko any avaratra
  - type: text
    content: 'Izao no anaran’ireo foko: Hatramin’ny farany avaratra any amoron-dranomasina, amin’ny lalana mankany Hetlona any akaikin’i Hamata sy Hazara-Enana, ny sisintanin’i Damaskosy eo avaratra, any anilan’i Hamata; izany no ho lafiny atsinanana sy andrefana: Anjara iray ho an’i Dana. '
  '10':
  - type: text
    content: 'Ho an’ny mpisorona izany tany masina voatokana izany, dimy arivo sy roa alina ny lavany avaratra, iray alina ny sakany andrefana, iray alina ny sakany atsinanana ary dimy arivo sy roa alina ny lavany atsimo, ary ny fitoerana masin’NY TOMPO no ho eo afovoany. '
  '11':
  - type: text
    content: 'Ho an’ny mpisorona izay nohamasinina avy amin’ny taranak’i Zadoka izany, dia ireo nitandrina ny nasaiko notandremana ka tsy nivily tamin’ny nivilian’ny Zanak’Israely, tahaka ny nivilian’ny '
  - type: text
    content: levita
  - type: text
    content: '. '
  '12':
  - type: text
    content: Eny, ho azy izany, ho tany halaina amin’ilay efa voatokana, dia zavatra masina indrindra, mifanolotra amin’ny sisintanin’ny levita.
  '13':
  - type: text
    content: 'Ny levita koa dia hahazo ny mifanolotra amin’ny sisintanin’ny mpisorona, dia dimy arivo sy roa alina ny lavany, iray alina ny sakany. Eny, samy dimy arivo sy roa alina ny lavany ary iray alina ny sakany. '
  '14':
  - type: text
    content: Tsy ho azony analana hamidy izany, na atakalo, ary tsy hafindrany ny voaloham-bokatra amin’ny tany, fa masina ho an’NY TOMPO izany.
  - type: heading
    content: Ny zaratany ho an’ny tanàna ary ny ho an’ny mpanjaka
  '15':
  - type: text
    content: 'Ary ny dimy arivo, ilay navela tamin’ny sakany mifanolotra amin’ny dimy arivo sy roa alina, dia tsy masina fa ho an’ny tanàna, ho tany fonenana sy ho tany fiandrasam-biby, ary ny tanàna no ho ao afovoany. '
  '16':
  - type: text
    content: 'Ary izao no refiny: Ny avaratra dia ho dimanjato sy efatra arivo, ny atsimo dia ho dimanjato sy efatra arivo, ny atsinanana dia ho dimanjato sy efatra arivo ary ny andrefana dia ho dimanjato sy efatra arivo. '
  '17':
  - type: text
    content: 'Ny amin’ny tany fiandrasam-biby momba ny tanàna: Ny eo amin’ny avaratra dia ho dimampolo sy roanjato, ny eo amin’ny atsinanana dia ho dimampolo sy roanjato ary ny eo amin’ny andrefana dia ho dimampolo sy roanjato. '
  '18':
  - type: text
    content: 'Ny lavany sisa mifanolotra amin’ny anjara masina voatokana dia iray alina amin’ny atsinanana, iray alina amin’ny andrefana ary hifanolotra amin’ny anjara masina voatokana izany; ny vokatra avy aminy dia ho sakafon’ny mpiasa ao an-tanàna. '
  '19':
  - type: text
    content: 'Izay mpiasa ao an-tanàna avy amin’ny fokon’ny Israely rehetra no hiasa azy. '
  '2':
  - type: text
    content: 'Mifanolotra amin’ny sisintanin’i Dana hatrany atsinanana ka hatrany andrefana dia anjara iray ho an’i Asera. '
  '20':
  - type: text
    content: Ny tany voatokana rehetra dia ho efamira, dimy arivo sy roa alina sy dimy arivo sy roa alina; ny ampahefatry ny anjara masina voatokana dia halainareo ho zaratany momba ny tanàna.
  '21':
  - type: text
    content: 'Ho an’ny mpanjaka ny sisa eo an-daniny roa amin’ny anjara masina voatokana sy ny zaratany momba ny tanàna; mifanolotra amin’ny dimy arivo sy roa alina amin’ny anjara voatokana hatramin’ny sisintany atsinanana ary mifanolotra amin’ny dimy arivo amby roa alina hatramin’ny sisintany andrefana, mifanolotra amin’ny anjaran’ireo foko; ho an’ny mpanjaka izany; ary ny anjara masina voatokana sy ny Trano, fitoerana masina, no ho eo afovoany. '
  '22':
  - type: text
    content: 'Hatramin’ny zaratanin’ny '
  - type: text
    content: levita
  - type: text
    content: ' sy ny zaratany momba ny tanàna izay ao ampovoan’ny an’ny mpanjaka, anelanelan’ny faritanin’i Joda sy Benjamina, dia ho an’ny mpanjaka izany.'
  - type: heading
    content: Ny zaratany ho an’ireo foko any atsimo
  '23':
  - type: text
    content: 'Ary ny amin’ny firenena sisa, hatramin’ny lafiny atsinanana ka hatramin’ny andrefana, dia hisy anjara iray ho an’i Benjamina. '
  '24':
  - type: text
    content: 'Mifanolotra amin’ny sisintanin’i Benjamina, hatrany atsinanana ka hatrany andrefana, dia anjara iray ho an’i Simeona. '
  '25':
  - type: text
    content: 'Mifanolotra amin’ny sisintanin’i Simeona, hatrany atsinanana ka hatrany andrefana, dia anjara iray ho an’Isakara. '
  '26':
  - type: text
    content: 'Mifanolotra amin’ny sisintanin’Isakara, hatrany atsinanana ka hatrany andrefana, dia anjara iray ho an’i Zebolona. '
  '27':
  - type: text
    content: 'Mifanolotra amin’ny sisintanin’i Zebolona, hatrany atsinanana ka hatrany andrefana, dia anjara iray ho an’i Gada. '
  '28':
  - type: text
    content: 'Mifanolotra amin’ny faritanin’i Gada, amin’ny lafiny atsimo, ny sisintany dia hatrany Tamara sy ny ranon’i Meriba any Kadesy sy ny lohasahan-driaka ka hatramin’ny Ranomasina Lehibe. '
  '29':
  - type: text
    content: Izany no tany hozarainareo amin’ny antsapaka ho lova ho an’ny firenen’ny Israely, ary izany no ho anjarany avy, hoy NY TOMPO Andriamanitra.
  - type: heading
    content: Ny varavarana roa amby folo ao Jerosalema
  '3':
  - type: text
    content: 'Mifanolotra amin’ny sisintanin’i Asera, hatrany atsinanana ka hatrany andrefana dia anjara iray ho an’i Naftaly. '
  '30':
  - type: text
    content: 'Izao no refin’ny tanàna amin’ny lafiny avaratra: Dimanjato sy efatra arivo. '
  '31':
  - type: text
    content: 'Ny anaran’ny vavahady dia ho toy ny anaran’ny fokon’ny Israely: Ny vavahady telo avaratra dia vavahadin’i Robena ny iray, vavahadin’i Joda ny iray, vavahadin’i Levy ny iray. '
  '32':
  - type: text
    content: 'Amin’ny lafiny atsinanana, dimanjato sy efatra arivo; ary ny vavahady telo, dia vavahadin’i Josefa ny iray, vavahadin’i Benjamina ny iray ary vavahadin’i Dana ny iray. '
  '33':
  - type: text
    content: 'Amin’ny lafiny atsimo, mirefy dimanjato sy efatra arivo, ary ny vavahady telo, dia vavahadin’i Simeona ny iray, vavahadin’Isakara ny iray, vavahadin’i Zebolona ny iray. '
  '34':
  - type: text
    content: 'Amin’ny andrefana, dimanjato sy efatra arivo; telo ny vavahadiny, dia vavahadin’i Gada ny iray, vavahadin’i Asera ny iray, vavahadin’i Naftaly ny iray. '
  '35':
  - type: text
    content: 'Valo arivo sy iray alina ny manodidina. Ary ny anaran’ny tanàna hatramin’izay andro izay dia: NY TOMPO NO AO.'
  '4':
  - type: text
    content: 'Mifanolotra amin’ny sisintanin’i Naftaly, hatrany atsinanana ka hatrany andrefana, dia anjara iray ho an’i Manase. '
  '5':
  - type: text
    content: 'Mifanolotra amin’ny sisintanin’i Manase, hatrany atsinanana ka hatrany andrefana, dia anjara iray ho an’i Efraima. '
  '6':
  - type: text
    content: 'Mifanolotra amin’ny sisintanin’i Efraima, hatrany atsinanana ka hatrany andrefana, dia anjara iray koa ho an’i Robena. '
  '7':
  - type: text
    content: Mifanolotra amin’ny sisintanin’i Robena, hatrany atsinanana ka hatrany andrefana, dia anjara iray ho an’i Joda.
  - type: heading
    content: Ny zaratany ho an’NY TOMPO
  '8':
  - type: text
    content: 'Ary mifanolotra amin’ny sisintanin’i Joda, hatrany atsinanana ka hatrany andrefana, no hisy ilay tany hatokanareo, indimy arivo sy roa alin’ny volotara fandrefesana ny sakany, ary ny lavany dia mitovy amin’ny lavan’ny anjaran’ny firenena tsirairay, hatrany atsinanana ka hatrany andrefana; ary ny fitoerana masina no ho eo afovoany. '
  '9':
  - type: text
    content: 'Ny tany izay hatokanareo ho an’NY TOMPO dia dimy arivo sy roa alina ny lavany, ary iray alina ny sakany. '
