document_id: ISA.43,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny Iray Masin’ny Israely, Mpamonjy ny olony
  - type: text
    content: Fa ankehitriny, izao no lazain’NY TOMPO,
  - type: text
    content: izay nahary anao, ry Jakoba ô,
  - type: text
    content: 'sady namolavola anao, ry Israely ô:'
  - type: text
    content: Aza matahotra ianao,
  - type: text
    content: fa efa nanavotra anao Aho.
  - type: text
    content: Efa niantso anao tamin’ny anaranao Aho,
  - type: text
    content: Ahy ianao!
  '10':
  - type: text
    content: Ianareo no vavolombeloko
  - type: text
    content: hoy NY TOMPO,
  - type: text
    content: sady mpanompoko izay nofidiko
  - type: text
    content: mba hahafantaranareo
  - type: text
    content: sy hinoanareo Ahy
  - type: text
    content: ka ho azonareo tsara fa Izaho no Izy;
  - type: text
    content: talohako dia tsy nisy andriamanitra voaforona,
  - type: text
    content: sady tsy hisy handimby Ahy.
  '11':
  - type: text
    content: Izaho dia Izaho ihany no TOMPO,
  - type: text
    content: ary tsy misy Mpamonjy afa-tsy Izaho.
  '12':
  - type: text
    content: Izaho no nilaza sy namonjy ary nanambara,
  - type: text
    content: ary tsy nisy olon-kafa tao aminareo;
  - type: text
    content: koa ianareo no vavolombeloko,
  - type: text
    content: hoy NY TOMPO,
  - type: text
    content: ary Izaho no Andriamanitra.
  '13':
  - type: text
    content: Eny, hatramin’izany andro izany dia Izaho no Izy,
  - type: text
    content: ary tsy misy maharombaka ny eto amin’ny tanako;
  - type: text
    content: miasa Aho ka iza moa no hahasakana izany?
  - type: heading
    content: Lalam-baovao any an-tany efitra
  '14':
  - type: text
    content: Izao no lazain’NY TOMPO
  - type: text
    content: 'Mpanavotra anareo, dia ny Iray Masin’ny Israely:'
  - type: text
    content: Noho ny aminareo no nanirahako olona hiady amin’i Babilona,
  - type: text
    content: ary harendriko ireo mpandositra rehetra ireo,
  - type: text
    content: dia ireo Kaldeana izay mirebika any amin’ny sambony.
  '15':
  - type: text
    content: Izaho no TOMPO, Iray Masinareo,
  - type: text
    content: Mpamorona ny Israely sady Mpanjakanareo.
  '16':
  - type: text
    content: Izao no lazain’NY TOMPO,
  - type: text
    content: izay manao lalana eny amin’ny ranomasina
  - type: text
    content: sy lalan-kaleha eny amin’ny rano manonja,
  '17':
  - type: text
    content: izay mamoaka ny kalesy fitondra miady sy ny soavaly,
  - type: text
    content: ny tafika sy ny lehilahy mahery.
  - type: text
    content: Miara-mandry avokoa izy
  - type: text
    content: ka tsy hiarina intsony.
  - type: text
    content: Mitsilopilopy izy
  - type: text
    content: 'ka maty toy ny lahin-jiro lany:'
  '18':
  - type: text
    content: Aza mahatsiaro ny lasa,
  - type: text
    content: na misaina ny taloha.
  '19':
  - type: text
    content: Indro, efa hanao zava-baovao Aho,
  - type: text
    content: koa efa miposaka izany ankehitriny;
  - type: text
    content: tsy mahalala izany va ianareo?
  - type: text
    content: Eny, any an-tany efitra no hanaovako lalana
  - type: text
    content: ary any amin’ny tany ngazana no hasiako ony.
  '2':
  - type: text
    content: Raha mita ny rano ianao
  - type: text
    content: dia homba anao Aho;
  - type: text
    content: raha mita ny ony ianao
  - type: text
    content: dia tsy hanafotra anao izy;
  - type: text
    content: raha mandeha mamakivaky ny afo ianao
  - type: text
    content: dia tsy ho may,
  - type: text
    content: fa tsy handoro anao ny lelafo.
  '20':
  - type: text
    content: Dia hanome voninahitra Ahy ny bibidia
  - type: text
    content: sy ny amboadia ary ny aotirisy,
  - type: text
    content: satria manisy rano any an-tany efitra
  - type: text
    content: sy ony any amin’ny tany ngazana Aho
  - type: text
    content: mba hampisotroina ny oloko, dia ilay voafidiko.
  '21':
  - type: text
    content: Izao vahoaka noforoniko ho Ahy izao
  - type: text
    content: no hanambara ny fiderana Ahy.
  - type: heading
    content: Mifandahatra amin’ny olony NY TOMPO
  '22':
  - type: text
    content: Nefa tsy mba Izaho no nantsoinao, ry Jakoba!
  - type: text
    content: Fa sasatra Tamiko ianao, ry Israely!
  '23':
  - type: text
    content: Tsy nitondranao ny zanak’ondry ho fanatitra dorana manontolo Aho.
  - type: text
    content: Tsy nataonao ho fanomezam-boninahitra Ahy ny fanatitrao;
  - type: text
    content: tsy nataoko raharaham-panompoanao ny fanatitra,
  - type: text
    content: na nanasatra anao tamin’ny ditin-kazo manitra Aho.
  '24':
  - type: text
    content: Tsy nandoa vola namidy veromanitra ho Ahy ianao,
  - type: text
    content: na nahavoky Ahy tamin’ny jaboran’ny fanatitrao;
  - type: text
    content: fa nampanompo Ahy tamin’ny fahotanao kosa ianao
  - type: text
    content: sady nanasatra Ahy tamin’ny helokao.
  '25':
  - type: text
    content: Izaho dia Izaho ihany no mamono ny fahadisoanao noho ny amin’ny tenako
  - type: text
    content: ary tsy hotsarovako intsony ny fahotanao.
  '26':
  - type: text
    content: Ampahatsiarovy Aho, koa avia isika hifandahatra;
  - type: text
    content: alaharo ary ny teninao, mba hahitana izay mahamarina anao.
  '27':
  - type: text
    content: Ny razambenao voalohany indrindra dia efa nanota
  - type: text
    content: ary efa nikomy Tamiko ireny mpitondra teninao ireny.
  '28':
  - type: text
    content: Koa izany no nandotoako ny mpanapaka ny fitoerana masina
  - type: text
    content: sy nanolorako an’i Jakoba ho zavatra voaozona
  - type: text
    content: ary Israely ho latsa.
  '3':
  - type: text
    content: Fa Izaho no TOMPO Andriamanitrao,
  - type: text
    content: dia ny Iray Masin’ny Israely, Mpamonjy anao;
  - type: text
    content: omeko ho fanavotana anao i Ejipta,
  - type: text
    content: ary ho solonao i Kosy sy i Seba.
  '4':
  - type: text
    content: Satria sarobidy eo imasoko ianao,
  - type: text
    content: ary be voninahitra ianao sady tiako,
  - type: text
    content: dia olona no omeko ho solonao,
  - type: text
    content: ary firenena no ho solon’ny ainao.
  '5':
  - type: text
    content: Aza matahotra
  - type: text
    content: fa momba anao Aho;
  - type: text
    content: hitondra ny taranakao avy any atsinanana Aho,
  - type: text
    content: ary avy any andrefana no hanangonako anao.
  '6':
  - type: text
    content: 'Ny avaratra dia hilazako hoe: Omeo!'
  - type: text
    content: 'Ary ny atsimo hoe: Aza hazonina!'
  - type: text
    content: Alao ny zanako lahy avy lavitra
  - type: text
    content: sy ny zanako vavy avy any amin’ny faran’ny tany,
  '7':
  - type: text
    content: dia izay rehetra antsoina amin’ny anarako
  - type: text
    content: sady nohariko ho voninahitro,
  - type: text
    content: dia izay novolavolaiko sy nataoko.
  - type: heading
    content: Tsy misy mpamonjy ankoatra NY TOMPO
  '8':
  - type: text
    content: Ento mivoaka ny olona jamba
  - type: text
    content: nefa mana-maso,
  - type: text
    content: ary ny marenina
  - type: text
    content: nefa manan-tsofina.
  '9':
  - type: text
    content: Aoka hiangona ny firenena rehetra
  - type: text
    content: ary aoka hivory ny mponina!
  - type: text
    content: Iza tamin’izy ireo no nanambara izany?
  - type: text
    content: Iza tamin’izy ireo no nanambara tamintsika izay niseho taloha?
  - type: text
    content: Aoka hoentiny hanamarina azy ny vavolombelony!
  - type: text
    content: 'Ary aoka hohenoina ireo mba hiaiky hoe: Marina izany!'
