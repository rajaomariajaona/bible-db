document_id: ISA.43,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny Iray Masin’ny Israely, Mpamonjy ny olony
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Fa ankehitriny, izao no lazain’NY TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay nahary anao, ry Jakoba ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'sady namolavola anao, ry Israely ô:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aza matahotra ianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa efa nanavotra anao Aho.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Efa niantso anao tamin’ny anaranao Aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ahy ianao!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Ianareo no vavolombeloko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy NY TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady mpanompoko izay nofidiko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hahafantaranareo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy hinoanareo Ahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka ho azonareo tsara fa Izaho no Izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: talohako dia tsy nisy andriamanitra voaforona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady tsy hisy handimby Ahy.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Izaho dia Izaho ihany no TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy misy Mpamonjy afa-tsy Izaho.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Izaho no nilaza sy namonjy ary nanambara,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy nisy olon-kafa tao aminareo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: koa ianareo no vavolombeloko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy NY TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary Izaho no Andriamanitra.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Eny, hatramin’izany andro izany dia Izaho no Izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy misy maharombaka ny eto amin’ny tanako;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: miasa Aho ka iza moa no hahasakana izany?
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Lalam-baovao any an-tany efitra
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Izao no lazain’NY TOMPO
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Mpanavotra anareo, dia ny Iray Masin’ny Israely:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Noho ny aminareo no nanirahako olona hiady amin’i Babilona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary harendriko ireo mpandositra rehetra ireo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ireo Kaldeana izay mirebika any amin’ny sambony.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Izaho no TOMPO, Iray Masinareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mpamorona ny Israely sady Mpanjakanareo.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Izao no lazain’NY TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay manao lalana eny amin’ny ranomasina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy lalan-kaleha eny amin’ny rano manonja,
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: izay mamoaka ny kalesy fitondra miady sy ny soavaly,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny tafika sy ny lehilahy mahery.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miara-mandry avokoa izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy hiarina intsony.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mitsilopilopy izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ka maty toy ny lahin-jiro lany:'
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Aza mahatsiaro ny lasa,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na misaina ny taloha.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Indro, efa hanao zava-baovao Aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: koa efa miposaka izany ankehitriny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy mahalala izany va ianareo?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, any an-tany efitra no hanaovako lalana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary any amin’ny tany ngazana no hasiako ony.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Raha mita ny rano ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia homba anao Aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: raha mita ny ony ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia tsy hanafotra anao izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: raha mandeha mamakivaky ny afo ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia tsy ho may,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa tsy handoro anao ny lelafo.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Dia hanome voninahitra Ahy ny bibidia
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny amboadia ary ny aotirisy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria manisy rano any an-tany efitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ony any amin’ny tany ngazana Aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hampisotroina ny oloko, dia ilay voafidiko.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Izao vahoaka noforoniko ho Ahy izao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no hanambara ny fiderana Ahy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mifandahatra amin’ny olony NY TOMPO
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Nefa tsy mba Izaho no nantsoinao, ry Jakoba!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa sasatra Tamiko ianao, ry Israely!
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Tsy nitondranao ny zanak’ondry ho fanatitra dorana manontolo Aho.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy nataonao ho fanomezam-boninahitra Ahy ny fanatitrao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy nataoko raharaham-panompoanao ny fanatitra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na nanasatra anao tamin’ny ditin-kazo manitra Aho.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Tsy nandoa vola namidy veromanitra ho Ahy ianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na nahavoky Ahy tamin’ny jaboran’ny fanatitrao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa nampanompo Ahy tamin’ny fahotanao kosa ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady nanasatra Ahy tamin’ny helokao.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Izaho dia Izaho ihany no mamono ny fahadisoanao noho ny amin’ny tenako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy hotsarovako intsony ny fahotanao.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Ampahatsiarovy Aho, koa avia isika hifandahatra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: alaharo ary ny teninao, mba hahitana izay mahamarina anao.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Ny razambenao voalohany indrindra dia efa nanota
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary efa nikomy Tamiko ireny mpitondra teninao ireny.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Koa izany no nandotoako ny mpanapaka ny fitoerana masina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy nanolorako an’i Jakoba ho zavatra voaozona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary Israely ho latsa.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Fa Izaho no TOMPO Andriamanitrao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ny Iray Masin’ny Israely, Mpamonjy anao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: omeko ho fanavotana anao i Ejipta,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ho solonao i Kosy sy i Seba.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Satria sarobidy eo imasoko ianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary be voninahitra ianao sady tiako,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia olona no omeko ho solonao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary firenena no ho solon’ny ainao.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Aza matahotra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa momba anao Aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hitondra ny taranakao avy any atsinanana Aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary avy any andrefana no hanangonako anao.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ny avaratra dia hilazako hoe: Omeo!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ary ny atsimo hoe: Aza hazonina!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Alao ny zanako lahy avy lavitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny zanako vavy avy any amin’ny faran’ny tany,
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: dia izay rehetra antsoina amin’ny anarako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady nohariko ho voninahitro,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia izay novolavolaiko sy nataoko.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Tsy misy mpamonjy ankoatra NY TOMPO
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Ento mivoaka ny olona jamba
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa mana-maso,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny marenina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa manan-tsofina.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Aoka hiangona ny firenena rehetra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary aoka hivory ny mponina!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Iza tamin’izy ireo no nanambara izany?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Iza tamin’izy ireo no nanambara tamintsika izay niseho taloha?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka hoentiny hanamarina azy ny vavolombelony!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ary aoka hohenoina ireo mba hiaiky hoe: Marina izany!'
