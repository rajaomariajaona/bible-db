document_id: JHN.6,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nampihinanan’i Jesosy ny dimy arivo lahy
  - type: heading
    content: Mat 14.13-21; Mar 6.30-44; Lio 9.10-17
  - type: text
    content: 'Taorianan’izany dia lasa Jesosy nita ny ranomasin’i Galilia, dia ny ranomasin’i Tiberiasy izany. '
  '10':
  - type: text
    content: 'Fa hoy Jesosy: Asaivo mipetraka ny olona. Ary nisy ahitra be teo. Dia nipetraka ireo ka tokony ho dimy arivo ny isan’ny lehilahy. '
  '11':
  - type: text
    content: 'Dia nandray ny mofo Jesosy; ary rehefa nisaotra Izy dia nizara izany tamin’izay nipetraka hihinana; ary ny hazandrano koa dia araka izay nilainy. '
  '12':
  - type: text
    content: 'Rehefa voky ny olona dia hoy Jesosy tamin’ny mpianany: Angony ny sisa tsy lany mba tsy hisy ho very. '
  '13':
  - type: text
    content: Dia nangoniny ka nahafeno harona roa amby folo ny sombintsombin’ny mofo varimbazaha dimy, izay ambiny tsy lanin’ny mpihinana.
  '14':
  - type: text
    content: 'Ary hoy ireny olona ireny, rehefa nahita ny famantarana izay nataon’i Jesosy: Ity tokoa no ilay Mpaminany izay tonga eto amin’izao tontolo izao.'
  '15':
  - type: text
    content: Rehefa fantatr’i Jesosy fa efa ho avy ny olona haka Azy an-keriny hataony mpanjaka dia lasa niala indray Izy irery nankany an-tendrombohitra.
  - type: heading
    content: Ny nitsangantsanganan’i Jesosy teo ambonin’ny ranomasina
  - type: heading
    content: Mat 14.22-33; Mar 6.45-52
  '16':
  - type: text
    content: 'Rehefa hariva ny andro dia nidina ho eny amin’ny ranomasina ny mpianany. '
  '17':
  - type: text
    content: 'Niondrana an-tsambokely izy ireo dia nita ny ranomasina nankany Kapernaomy. Efa maizina sahady ny andro tamin’izay nefa Jesosy tsy mbola tonga teny aminy. '
  '18':
  - type: text
    content: 'Ary nanonja be ny ranomasina, fa mafy ny fifofofofon’ny rivotra. '
  '19':
  - type: text
    content: 'Rehefa nivoy tokony ho dimy amby roapolo na telopolo '
  - type: text
    content: stadio
  - type: text
    content: ' izy ireo dia nahita an’i Jesosy nitsangantsangana teny ambonin’ny ranomasina ary nanakaiky ny sambokely; dia natahotra izy ireo. '
  '2':
  - type: text
    content: 'Ary nisy vahoaka betsaka nanaraka Azy noho ny nahitany ny famantarana izay efa nataony tamin’ny marary. '
  '20':
  - type: text
    content: 'Fa hoy Jesosy taminy: Izaho ihany ity; aza matahotra. '
  '21':
  - type: text
    content: Dia ta handray Azy ho eo an-tsambokely izy ireo; ary niaraka tamin’izay ny sambokely dia tonga tamin’ny tany izay nalehany.
  - type: heading
    content: Ny mofo avy any an-danitra
  - type: heading
    content: Ampit. Mat 14.34-36; Mar 6.53-56
  '22':
  - type: text
    content: 'Nony ampitson’iny, ny vahoaka izay nijanona teny ampitan’ny ranomasina dia nahita fa tsy nisy sambokely hafa teo afa-tsy iray ihany, ary Jesosy tsy mba niara-niondrana an-tsambokely tamin’ny mpianany, fa ny mpianany ihany no nandeha, '
  '23':
  - type: text
    content: 'kanefa nisy sambokely hafa avy tany Tiberiasy tonga teo akaikin’ilay tany nihinanany ny mofo, rehefa nisaotra ny Tompo, '
  '24':
  - type: text
    content: 'koa nony hitan’ny vahoaka fa tsy teo Jesosy, na ny mpianany, dia niondrana an-tsambokely izy ireo ka nankany Kapernaomy mba hitady an’i Jesosy. '
  '25':
  - type: text
    content: 'Rehefa nahita Azy teny ampitan’ny ranomasina izy ireo dia niteny Taminy hoe: Raby ô, oviana no tonga teto Ianao?'
  '26':
  - type: text
    content: 'Dia hoy Jesosy hoe: Lazaiko aminareo marina dia marina tokoa: Mitady Ahy ianareo, nefa tsy noho ny nahitanareo famantarana, fa noho ny nihinananareo ny mofo ka voky. '
  '27':
  - type: text
    content: 'Aza miasa hahazo ny hanina mety ho levona, fa ny hanina izay maharitra ho fiainana mandrakizay, izay homen’ny '
  - type: text
    content: Zanak’Olona
  - type: text
    content: ' anareo; fa Izy no nasian’Andriamanitra Ray tombo-kase. '
  '28':
  - type: text
    content: 'Dia hoy ireo taminy: Inona no hataonay mba hiasanay ny asan’Andriamanitra? '
  '29':
  - type: text
    content: 'Dia novalin’i Jesosy hoe: Izao no asan’Andriamanitra, dia ny hinoanareo Izay nirahiny.'
  '3':
  - type: text
    content: 'Ary Jesosy niakatra tao an-tendrombohitra, dia nipetraka tao Izy mbamin’ny mpianany. '
  '30':
  - type: text
    content: 'Dia hoy ireo taminy: Inona ary no famantarana ataonao mba ho hitanay ka hinoanay Anao? Inona moa no asa ataonao? '
  '31':
  - type: text
    content: 'Ny razantsika dia nihinana ny mana tany an-tany efitra, araka ny voasoratra hoe: «Mofo avy tany an-danitra no nomeny azy hohaniny» (Sal 78.24). '
  '32':
  - type: text
    content: 'Dia hoy Jesosy taminy: Lazaiko aminareo marina dia marina tokoa: Tsy i Mosesy no nanome anareo ny mofo avy tany an-danitra fa ny Raiko no manome anareo ny tena mofo avy any an-danitra. '
  '33':
  - type: text
    content: 'Fa ny mofon’Andriamanitra dia ilay midina avy any an-danitra ka manome fiainana ho an’izao tontolo izao. '
  '34':
  - type: text
    content: 'Dia hoy ireo Taminy: Tompo ô, omeo anay mandrakariva izany mofo izany. '
  '35':
  - type: text
    content: 'Hoy Jesosy taminy: Izaho no mofon’aina; izay manatona Ahy tsy mba ho noana ary izay mino Ahy dia tsy mba hangetaheta intsony.'
  '36':
  - type: text
    content: 'Efa nolazaiko taminareo fa nahita Ahy ihany ianareo nefa tsy mino. '
  '37':
  - type: text
    content: 'Izay rehetra omen’ny Raiko Ahy no hanatona Ahy; ary izay manatona Ahy dia tsy mba holaviko mihitsy. '
  '38':
  - type: text
    content: 'Fa tsy nidina avy tany an-danitra Aho mba hanao ny sitrapoko fa ny sitrapon’izay naniraka Ahy. '
  '39':
  - type: text
    content: 'Ary izao no sitrapon’izay naniraka Ahy dia ny tsy hamelako hisy very izay rehetra nomeny Ahy, fa hatsangako indray amin’ny andro farany izy ireny. '
  '4':
  - type: text
    content: 'Fa efa akaiky ny '
  - type: text
    content: Paska
  - type: text
    content: ', ilay andro firavoravoan’ny '
  - type: text
    content: Jiosy
  - type: text
    content: .
  '40':
  - type: text
    content: Fa izao no sitrapon’ny Raiko dia ny hahazoan’izay rehetra mijery ny Zanaka ka mino Azy fiainana mandrakizay; ary Izaho hanangana azy amin’ny andro farany.
  '41':
  - type: text
    content: 'Dia nimonomonona tamin’i Jesosy ny '
  - type: text
    content: Jiosy
  - type: text
    content: ' satria Izy nilaza hoe: Izaho no mofo izay nidina avy tany an-danitra. '
  '42':
  - type: text
    content: 'Dia hoy ireo: Tsy Ilehio va no Jesosy, zanak’i Josefa, izay fantatsika ny ray aman-dreniny? Koa ahoana indray no ilazany ankehitriny hoe: Izaho ilay nidina avy tany an-danitra?'
  '43':
  - type: text
    content: 'Fa hoy Jesosy hoe: Aza mimonomonona ianareo. '
  '44':
  - type: text
    content: 'Tsy misy olona mahay manatona Ahy, raha tsy taomin’ny Ray izay naniraka Ahy; ary Izaho hanangana azy amin’ny andro farany. '
  '45':
  - type: text
    content: 'Voasoratra ao amin’ny mpaminany hoe: «Ary izy rehetra dia hampianarin’Andriamanitra» (Isa 54.13). Izay rehetra mandre ka mianatra amin’ny Ray no manatona Ahy. '
  '46':
  - type: text
    content: 'Nefa tsy nisy nahita ny Ray, afa-tsy izay avy amin’Andriamanitra: Izy no nahita ny Ray.'
  '47':
  - type: text
    content: 'Lazaiko aminareo marina dia marina tokoa, izay mino no manana fiainana mandrakizay. '
  '48':
  - type: text
    content: 'Izaho no mofon’aina. '
  '49':
  - type: text
    content: 'Ny razanareo dia nihinana ny mana tany an-tany efitra nefa maty ihany. '
  '5':
  - type: text
    content: 'Ary Jesosy nanopy ny masony ka nahita fa nisy vahoaka betsaka nanatona Azy dia hoy Izy tamin’i Filipo: Aiza no hividianantsika mofo hohanin’ireo? '
  '50':
  - type: text
    content: 'Inty kosa dia mofo midina avy any an-danitra mba tsy ho faty izay mihinana azy. '
  '51':
  - type: text
    content: Izaho no mofo velona izay nidina avy tany an-danitra; raha misy mihinana ity mofo ity dia ho velona mandrakizay izy; ary ny mofo izay homeko dia ny nofoko mba ho fiainan’izao tontolo izao.
  '52':
  - type: text
    content: 'Dia nifandìtra ny Jiosy ka niteny hoe: Hataon’Ilehio ahoana re no fanome ny nofony hohanintsika?'
  '53':
  - type: text
    content: 'Fa hoy Jesosy taminy: Lazaiko aminareo marina dia marina tokoa: Raha tsy mihinana ny nofon’ny Zanak’Olona sy misotro ny rany ianareo dia tsy manana fiainana ao aminareo. '
  '54':
  - type: text
    content: 'Izay mihinana ny nofoko sy misotro ny rako no manana fiainana mandrakizay; ary Izaho hanangana azy amin’ny andro farany. '
  '55':
  - type: text
    content: 'Fa ny nofoko no tena fihinana ary ny rako no tena fisotro. '
  '56':
  - type: text
    content: 'Izay mihinana ny nofoko sy misotro ny rako no mitoetra ao Amiko ary Izaho kosa ao aminy. '
  '57':
  - type: text
    content: 'Tahaka ny nanirahan’ny Ray velona Ahy, ary Izaho koa velona amin’ny alalan’ny Ray, dia tahaka izany koa izay mihinana Ahy no ho velona amin’ny alalako. '
  '58':
  - type: text
    content: Inty no mofo izay nidina avy tany an-danitra; tsy tahaka ny razana izay nihinana, nefa maty ihany; fa izay mihinana ity mofo ity dia ho velona mandrakizay.
  '59':
  - type: text
    content: 'Izany teny izany no nolazainy tao amin’ny '
  - type: text
    content: sinagoga
  - type: text
    content: ', raha nampianatra tao Kapernaomy Izy.'
  - type: heading
    content: Ny tenin’ny fiainana mandrakizay
  '6':
  - type: text
    content: 'Nataony izany mba hizahany toetra azy; fa Izy nahalala ihany izay efa hataony. '
  '60':
  - type: text
    content: 'Maro tamin’ny mpianany izay nandre Azy no niteny hoe: Sarotra izany teny izany, iza no afaka hihaino izany? '
  '61':
  - type: text
    content: 'Ary fantatr’i Jesosy tao am-pony fa nimonomonona ny amin’izany ny mpianany, koa hoy Izy tamin’izy ireo: Mahatafintohina anareo va izany? '
  '62':
  - type: text
    content: 'Mainka raha mahita ny '
  - type: text
    content: Zanak’Olona
  - type: text
    content: ' miakatra ho any amin’izay nitoerany taloha ianareo. '
  '63':
  - type: text
    content: 'Ny fanahy no mahavelona; ny nofo dia tsy mahasoa na inona na inona; ny teny izay nolazaiko taminareo dia fanahy sy fiainana. '
  '64':
  - type: text
    content: 'Kanefa misy tsy mino ny sasany aminareo. Fantatr’i Jesosy hatramin’ny voalohany izay tsy nino sy izay hamadika Azy. '
  '65':
  - type: text
    content: 'Ary hoy Izy: Izany no nilazako taminareo fa tsy misy olona mahay manatona Ahy, raha tsy nomen’ny Ray azy izany.'
  '66':
  - type: text
    content: Hatramin’io dia maro tamin’ny mpianany no nihemotra ka tsy niara-nandeha Taminy intsony.
  - type: heading
    content: Ampit. Mat 16.13-20; Mar 8.27-30; Lio 9.18-21
  '67':
  - type: text
    content: 'Dia hoy Jesosy tamin’ny roa amby folo lahy: Ianareo koa va mba te hiala? '
  '68':
  - type: text
    content: 'Hoy i Simona Petera Taminy hoe: Tompo ô, hankany amin’iza moa izahay? Ianao no manana ny tenin’ny fiainana mandrakizay. '
  '69':
  - type: text
    content: 'Ary mino izahay ka mahalala fa Ianao no Ilay Masin’Andriamanitra. '
  '7':
  - type: text
    content: 'Dia namaly Azy i Filipo hoe: Na dia mofo vidìna amin’ny '
  - type: text
    content: denaria
  - type: text
    content: ' roanjato aza tsy ho ampy azy rehetra hananany kely avy. '
  '70':
  - type: text
    content: 'Jesosy namaly azy hoe: Tsy Izaho va no nifidy anareo roa amby folo lahy, nefa ny iray aminareo aza dia '
  - type: text
    content: devoly
  - type: text
    content: '? '
  '71':
  - type: text
    content: Fa nilaza an’i Jodasy, zanak’i Simona iskariota, Izy tamin’io; izy io no ilay efa hamadika Azy, nefa isan’ny roa amby folo lahy.
  '8':
  - type: text
    content: 'Ny mpianany iray, i Andrea, rahalahin’i Simona Petera, dia nilaza taminy hoe: '
  '9':
  - type: text
    content: 'Misy zazalahy manana mofo varimbazaha dimy sy hazandrano madinika roa atỳ, fa ho ampy inona moa izany amin’izao olona betsaka izao? '
