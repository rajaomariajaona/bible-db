document_id: EXO.33
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mandidy ny Israely mba hiainga Andriamanitra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary NY TOMPO niteny tamin’i Mosesy hoe: Mandehana miala eto ianao sy ny firenena izay noentinao niakatra avy tany amin’ny tany Ejipta ka miakara ho any amin’ny tany izay nianianako tamin’i Abrahama sy Isaka ary i Jakoba hoe: Ny taranakao no homeko azy. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary haniraka Anjely Aho hitarika anao eo aloha ka horoahiko ny Kananita, ny Amorita, ny Hetita, ny Perizita, ny Hivita ary ny Jebosita, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: dia ho any amin’ny tany izay tondra-dronono sy tantely; nefa tsy hiara-miakatra aminao eo afovoanao Aho, fandrao handringana anao eny an-dalana; satria olona mafy hatoka ianao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Rehefa ren’ny olona izany teny mampahory izany dia nanjoretra izy ka tsy nisy olona niravaka intsony. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary hoy NY TOMPO tamin’i Mosesy: Lazao amin’ny Zanak’Israely hoe: Ianareo dia olona mafy hatoka; koa raha hiara-miakatra aminao eo afovoanao Aho, na dia indray mipy maso monja aza, dia handringana anao; koa ankehitriny, esory ny firavakao hiala aminao mba ho fantatro izay hataoko aminao. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Dia nanala ny firavany ny Zanak’Israely nanomboka hatreo amin’ny tendrombohitra Horeba.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny tranolay fihaonana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Fanaon’i Mosesy ny maka ny tranolay ka manorina azy eo ivelan’ny toby lavidavitra, ary ny anarany dia nataony hoe Ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tranolay fihaonana
  - type: text
    text: . Ary izay rehetra nitady NY TOMPO dia nankeny amin’ny tranolay fihaonana izay teo ivelan’ny toby.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Rehefa nankeo amin’ny tranolay i Mosesy dia nitsangana ny olona rehetra ka samy nijanona teo anoloan’ny varavaran’ny tranolainy avy, ary nitazana an’i Mosesy mandra-pahatongany ao amin’ny tranolay. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary rehefa niditra tao amin’ny tranolay i Mosesy dia nidina ny andry rahona ka nijanona teo anoloan’ny varavaran’ny tranolay, ary NY TOMPO niresaka tamin’i Mosesy. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary hitan’ny olona rehetra ny andry rahona nijanona teo anoloan’ny varavaran’ny tranolay; dia nitsangana ny olona rehetra ka samy niankohoka teo anoloan’ny varavaran’ny tranolainy avy. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ary NY TOMPO niteny nifanatrika tamin’i Mosesy, tahaka ny olona miresaka amin’ny sakaizany. Dia niverina nankeo amin’ny toby izy; fa ny mpanompony, dia i Josoa, zatovo, zanak’i Nona, dia tsy niala teny amin’ny tranolay.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Andriamanitra miresaka amin’i Mosesy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary hoy i Mosesy tamin’NY TOMPO: Indro Ianao milaza amiko hoe: Ento miakatra ity firenena ity; nefa Ianao tsy mbola nampahafantatra ahy izay hirahinao hiaraka amiko; kanefa Ianao efa nilaza hoe: Mahalala anao amin’ny anaranao Aho ary efa nahita fitia eo imasoko koa ianao. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Koa ankehitriny, raha mba nahita fitia eo imasonao aho, dia ampahafantaro ahy ny lalanao mba hahalalako Anao ka hahitako fitia eo imasonao; ary hevero fa olonao ity firenena ity.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dia hoy Izy: Ny tenako mihitsy no handeha ka hanome anao fitsaharana.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Fa hoy i Mosesy taminy: Raha tsy ny tenanao mihitsy no handeha dia aza mitondra anay hiakatra hiala atỳ. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Fa inona moa no hahafantarana fa nahita fitia eo imasonao izaho sy ny olonao? Moa tsy amin’ny handehananao miaraka aminay va ka hiavaka amin’ny firenena rehetra ambonin’ny tany izahay, dia izaho sy ny olonao?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary hoy NY TOMPO tamin’i Mosesy: Hataoko koa izao zavatra nolazainao izao; fa mahita fitia eo imasoko ianao, ary mahalala anao amin’ny anaranao Aho.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Dia hoy i Mosesy: Mba ampahitao ny voninahitrao aho.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Fa hoy kosa NY TOMPO: Izaho hampandalo ny fahatsarako rehetra eo anatrehanao ka hanonona ny anaran’NY TOMPO eo anatrehanao; fa hiantra izay hiantrako Aho ary hamindra fo amin’izay hamindrako fo. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary hoy koa Izy: Tsy mahazo mahita ny tavako ianao, satria tsy misy olona mahita Ahy ka ho velona.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Dia hoy NY TOMPO: Indro, misy toerana eto anilako; dia hijanona eo ambonin’ny harambato ianao; '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'koa rehefa mandalo ny voninahitro dia hataoko eo an-tsefaky ny harambato ianao ka hosaronako ny tanako mandra-pandaloko. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Dia hanaisotra ny tanako Aho ka hahita ny vohoko ianao; fa ny tavako dia tsy azon’olona jerena.
