document_id: EXO.33,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Mandidy ny Israely mba hiainga Andriamanitra
  - type: text
    content: 'Ary NY TOMPO niteny tamin’i Mosesy hoe: Mandehana miala eto ianao sy ny firenena izay noentinao niakatra avy tany amin’ny tany Ejipta ka miakara ho any amin’ny tany izay nianianako tamin’i Abrahama sy Isaka ary i Jakoba hoe: Ny taranakao no homeko azy. '
  '10':
  - type: text
    content: 'Ary hitan’ny olona rehetra ny andry rahona nijanona teo anoloan’ny varavaran’ny tranolay; dia nitsangana ny olona rehetra ka samy niankohoka teo anoloan’ny varavaran’ny tranolainy avy. '
  '11':
  - type: text
    content: Ary NY TOMPO niteny nifanatrika tamin’i Mosesy, tahaka ny olona miresaka amin’ny sakaizany. Dia niverina nankeo amin’ny toby izy; fa ny mpanompony, dia i Josoa, zatovo, zanak’i Nona, dia tsy niala teny amin’ny tranolay.
  - type: heading
    content: Andriamanitra miresaka amin’i Mosesy
  '12':
  - type: text
    content: 'Ary hoy i Mosesy tamin’NY TOMPO: Indro Ianao milaza amiko hoe: Ento miakatra ity firenena ity; nefa Ianao tsy mbola nampahafantatra ahy izay hirahinao hiaraka amiko; kanefa Ianao efa nilaza hoe: Mahalala anao amin’ny anaranao Aho ary efa nahita fitia eo imasoko koa ianao. '
  '13':
  - type: text
    content: Koa ankehitriny, raha mba nahita fitia eo imasonao aho, dia ampahafantaro ahy ny lalanao mba hahalalako Anao ka hahitako fitia eo imasonao; ary hevero fa olonao ity firenena ity.
  '14':
  - type: text
    content: 'Dia hoy Izy: Ny tenako mihitsy no handeha ka hanome anao fitsaharana.'
  '15':
  - type: text
    content: 'Fa hoy i Mosesy taminy: Raha tsy ny tenanao mihitsy no handeha dia aza mitondra anay hiakatra hiala atỳ. '
  '16':
  - type: text
    content: Fa inona moa no hahafantarana fa nahita fitia eo imasonao izaho sy ny olonao? Moa tsy amin’ny handehananao miaraka aminay va ka hiavaka amin’ny firenena rehetra ambonin’ny tany izahay, dia izaho sy ny olonao?
  '17':
  - type: text
    content: 'Ary hoy NY TOMPO tamin’i Mosesy: Hataoko koa izao zavatra nolazainao izao; fa mahita fitia eo imasoko ianao, ary mahalala anao amin’ny anaranao Aho.'
  '18':
  - type: text
    content: 'Dia hoy i Mosesy: Mba ampahitao ny voninahitrao aho.'
  '19':
  - type: text
    content: 'Fa hoy kosa NY TOMPO: Izaho hampandalo ny fahatsarako rehetra eo anatrehanao ka hanonona ny anaran’NY TOMPO eo anatrehanao; fa hiantra izay hiantrako Aho ary hamindra fo amin’izay hamindrako fo. '
  '2':
  - type: text
    content: 'Ary haniraka Anjely Aho hitarika anao eo aloha ka horoahiko ny Kananita, ny Amorita, ny Hetita, ny Perizita, ny Hivita ary ny Jebosita, '
  '20':
  - type: text
    content: 'Ary hoy koa Izy: Tsy mahazo mahita ny tavako ianao, satria tsy misy olona mahita Ahy ka ho velona.'
  '21':
  - type: text
    content: 'Dia hoy NY TOMPO: Indro, misy toerana eto anilako; dia hijanona eo ambonin’ny harambato ianao; '
  '22':
  - type: text
    content: 'koa rehefa mandalo ny voninahitro dia hataoko eo an-tsefaky ny harambato ianao ka hosaronako ny tanako mandra-pandaloko. '
  '23':
  - type: text
    content: Dia hanaisotra ny tanako Aho ka hahita ny vohoko ianao; fa ny tavako dia tsy azon’olona jerena.
  '3':
  - type: text
    content: dia ho any amin’ny tany izay tondra-dronono sy tantely; nefa tsy hiara-miakatra aminao eo afovoanao Aho, fandrao handringana anao eny an-dalana; satria olona mafy hatoka ianao.
  '4':
  - type: text
    content: 'Rehefa ren’ny olona izany teny mampahory izany dia nanjoretra izy ka tsy nisy olona niravaka intsony. '
  '5':
  - type: text
    content: 'Ary hoy NY TOMPO tamin’i Mosesy: Lazao amin’ny Zanak’Israely hoe: Ianareo dia olona mafy hatoka; koa raha hiara-miakatra aminao eo afovoanao Aho, na dia indray mipy maso monja aza, dia handringana anao; koa ankehitriny, esory ny firavakao hiala aminao mba ho fantatro izay hataoko aminao. '
  '6':
  - type: text
    content: Dia nanala ny firavany ny Zanak’Israely nanomboka hatreo amin’ny tendrombohitra Horeba.
  - type: heading
    content: Ny tranolay fihaonana
  '7':
  - type: text
    content: 'Fanaon’i Mosesy ny maka ny tranolay ka manorina azy eo ivelan’ny toby lavidavitra, ary ny anarany dia nataony hoe Ny '
  - type: text
    content: tranolay fihaonana
  - type: text
    content: . Ary izay rehetra nitady NY TOMPO dia nankeny amin’ny tranolay fihaonana izay teo ivelan’ny toby.
  '8':
  - type: text
    content: 'Rehefa nankeo amin’ny tranolay i Mosesy dia nitsangana ny olona rehetra ka samy nijanona teo anoloan’ny varavaran’ny tranolainy avy, ary nitazana an’i Mosesy mandra-pahatongany ao amin’ny tranolay. '
  '9':
  - type: text
    content: 'Ary rehefa niditra tao amin’ny tranolay i Mosesy dia nidina ny andry rahona ka nijanona teo anoloan’ny varavaran’ny tranolay, ary NY TOMPO niresaka tamin’i Mosesy. '
