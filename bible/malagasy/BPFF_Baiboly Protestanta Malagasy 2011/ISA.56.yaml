document_id: ISA.56,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: FIZARANA FAHATELO
  - type: heading
    content: Trano fivavahana ho an’ny firenena rehetra
  - type: text
    content: 'Izao no lazain’NY TOMPO:'
  - type: text
    content: Tandremo ny rariny
  - type: text
    content: ary manaova ny marina,
  - type: text
    content: fa efa madiva ho tonga ny famonjeko
  - type: text
    content: ary efa hiseho ny fahamarinako.
  '10':
  - type: text
    content: Jamba avokoa ny mpitiliny,
  - type: text
    content: samy tsy mahalala izy rehetra,
  - type: text
    content: amboa moana avokoa izy rehetra
  - type: text
    content: ka tsy mahavovò;
  - type: text
    content: manonofy izy,
  - type: text
    content: eny, mandry ka tia torimaso.
  '11':
  - type: text
    content: Lian-kanina ireny amboa ireny
  - type: text
    content: ka tsy mahalala voky.
  - type: text
    content: Ireny dia mpiandry
  - type: text
    content: tsy mahafantatra na inona na inona.
  - type: text
    content: Samy efa nivily ho amin’ny lalany avy izy rehetra,
  - type: text
    content: samy mankany amin’ny tombontsoany avokoa izy rehetra.
  '12':
  - type: text
    content: Avia, ianareo, hoy izy ireny, fa haka divay aho,
  - type: text
    content: aoka hiboboka toaka isika!
  - type: text
    content: Rahampitso dia ho tahaka ny anio ihany no hataontsika,
  - type: text
    content: fa mbola be dia be ny sisa tavela ao!
  '2':
  - type: text
    content: Sambatra ny zanak’olombelona izay manao izany,
  - type: text
    content: ary ny zanak’olona izay mitana izany,
  - type: text
    content: dia izay mitandrina ny Sabata
  - type: text
    content: ka tsy manamavo azy
  - type: text
    content: sady miaro ny tanany tsy hanao izay ratsy akory.
  '3':
  - type: text
    content: 'Aoka ny hafa firenena izay efa manaiky ho an’NY TOMPO tsy hiteny hoe:'
  - type: text
    content: Hesorin’NY TOMPO tsy ho isan’ny olony tokoa aho;
  - type: text
    content: 'ary aoka ny '
  - type: text
    content: ionòka
  - type: text
    content: ' tsy hiteny hoe:'
  - type: text
    content: Indro, hazo maina aho!
  '4':
  - type: text
    content: 'Fa izao no lazain’NY TOMPO:'
  - type: text
    content: Ny amin’ny ionòka izay mitandrina ny Sabatako
  - type: text
    content: sy mifidy izay sitrako
  - type: text
    content: ary mitana ny fanekeko,
  '5':
  - type: text
    content: dia hanaovako fahatsiarovana sy anarana
  - type: text
    content: ao an-tranoko sy ao anatin’ny mandako izy,
  - type: text
    content: izay tsara lavitra noho ny an’ny zanakalahy sy ny zanakavavy;
  - type: text
    content: fa anarana mandrakizay izay tsy hesorina no homeko azy.
  '6':
  - type: text
    content: Ary ny hafa firenena izay manaiky ho an’NY TOMPO
  - type: text
    content: mba hanompo Azy
  - type: text
    content: sy ho tia ny anaran’NY TOMPO
  - type: text
    content: mba ho mpanompony,
  - type: text
    content: dia izay rehetra mitandrina ny Sabata
  - type: text
    content: ka tsy manamavo azy
  - type: text
    content: sady mitana ny fanekeko,
  '7':
  - type: text
    content: dia hoentiko ho any amin’ny tendrombohitro masina
  - type: text
    content: ka hampifaliako ao amin’ny tranoko fivavahana;
  - type: text
    content: ny fanatitra dorana manontolo atolony sy ny fanatiny hafa alatsa-dra
  - type: text
    content: dia hankasitrahana eo ambonin’ny alitarako,
  - type: text
    content: satria ny tranoko hatao hoe
  - type: text
    content: Trano fivavahana ho an’ny firenena rehetra.
  '8':
  - type: text
    content: Izao no lazain’NY TOMPO Andriamanitra
  - type: text
    content: 'izay mamory ny Israely voaroaka:'
  - type: text
    content: Mbola hamory ny sasany ho eo aminy koa Aho,
  - type: text
    content: hanampy izay efa voavory ao.
  - type: heading
    content: Mpitarika tsy mendrika
  '9':
  - type: text
    content: E, ianareo bibidia rehetra, avia hihinana,
  - type: text
    content: dia ianareo biby rehetra any an’ala!
