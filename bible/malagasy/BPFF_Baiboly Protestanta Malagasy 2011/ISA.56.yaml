document_id: ISA.56
type_code: plt
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: FIZARANA FAHATELO
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Trano fivavahana ho an’ny firenena rehetra
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Izao no lazain’NY TOMPO:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tandremo ny rariny
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary manaova ny marina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa efa madiva ho tonga ny famonjeko
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary efa hiseho ny fahamarinako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Sambatra ny zanak’olombelona izay manao izany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny zanak’olona izay mitana izany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia izay mitandrina ny Sabata
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy manamavo azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady miaro ny tanany tsy hanao izay ratsy akory.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Aoka ny hafa firenena izay efa manaiky ho an’NY TOMPO tsy hiteny hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hesorin’NY TOMPO tsy ho isan’ny olony tokoa aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ary aoka ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ionòka
  - type: text
    text: ' tsy hiteny hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Indro, hazo maina aho!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Fa izao no lazain’NY TOMPO:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny amin’ny ionòka izay mitandrina ny Sabatako
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy mifidy izay sitrako
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mitana ny fanekeko,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: dia hanaovako fahatsiarovana sy anarana
- type: usfm
  marker: q1
  children:
  - type: text
    text: ao an-tranoko sy ao anatin’ny mandako izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay tsara lavitra noho ny an’ny zanakalahy sy ny zanakavavy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa anarana mandrakizay izay tsy hesorina no homeko azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ary ny hafa firenena izay manaiky ho an’NY TOMPO
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hanompo Azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ho tia ny anaran’NY TOMPO
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba ho mpanompony,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia izay rehetra mitandrina ny Sabata
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy manamavo azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady mitana ny fanekeko,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: dia hoentiko ho any amin’ny tendrombohitro masina
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hampifaliako ao amin’ny tranoko fivavahana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny fanatitra dorana manontolo atolony sy ny fanatiny hafa alatsa-dra
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hankasitrahana eo ambonin’ny alitarako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria ny tranoko hatao hoe
- type: usfm
  marker: q1
  children:
  - type: text
    text: Trano fivavahana ho an’ny firenena rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Izao no lazain’NY TOMPO Andriamanitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'izay mamory ny Israely voaroaka:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mbola hamory ny sasany ho eo aminy koa Aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hanampy izay efa voavory ao.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mpitarika tsy mendrika
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: E, ianareo bibidia rehetra, avia hihinana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ianareo biby rehetra any an’ala!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Jamba avokoa ny mpitiliny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: samy tsy mahalala izy rehetra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: amboa moana avokoa izy rehetra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy mahavovò;
- type: usfm
  marker: q1
  children:
  - type: text
    text: manonofy izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, mandry ka tia torimaso.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Lian-kanina ireny amboa ireny
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy mahalala voky.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ireny dia mpiandry
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy mahafantatra na inona na inona.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Samy efa nivily ho amin’ny lalany avy izy rehetra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: samy mankany amin’ny tombontsoany avokoa izy rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Avia, ianareo, hoy izy ireny, fa haka divay aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: aoka hiboboka toaka isika!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Rahampitso dia ho tahaka ny anio ihany no hataontsika,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa mbola be dia be ny sisa tavela ao!
