document_id: MAT.24
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nilaza ny amin’ny handravana ny tempoly Jesosy
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mar 13.1-4; Lio 21.5-7
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Rehefa niala tao amin’ny tempoly Jesosy dia lasa nandeha; ary nanatona Azy ny mpianany mba hampijery Azy ny rafitry ny tempoly. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Hoy Izy anefa taminy: Tsy hitanareo va ireo rehetra ireo? Lazaiko aminareo marina tokoa: Tsy havela hisy vato hifanongoa eo ka tsy horavana.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary nipetraka teo an-tendrombohitra Oliva Izy dia nanatona Azy mangingina ny mpianany ka niteny hoe: Lazao aminay izay andro hahatongavan’izany ary izay ho famantarana ny fiavianao sy ny fahataperan’izao tontolo izao.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ireo famantarana ny hiavian’ny farany
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mar 13.5-13; Lio 21.8-19
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary Jesosy namaly azy ireo hoe: Mitandrema, fandrao hisy hamitaka anareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Fa maro no ho avy amin’ny anarako hilaza hoe: Izaho no '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' ka maro no ho voafitany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary handre ady sy filazana ady ianareo; koa mitandrema, aza matahotra; fa tsy maintsy ho tonga izany; nefa tsy mbola izay no farany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Fa hisy firenena hitsangana hamely firenena, hisy fanjakana hitsangana hamely fanjakana; ary hisy mosary sy horohoron-tany any amin’ny tany samihafa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Fa izany rehetra izany no ho fiandohan’ny faharariam-piterahana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary hatolony hampijaliana ianareo ka hovonoiny; ary ho halan’ny firenena rehetra ianareo noho ny anarako. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Amin’izany andro izany dia maro no ho tafintohina ka hifampiampanga sy hifankahala. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Hisy mpaminany sandoka maro hitsangana ka hamitaka olona maro. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary noho ny haben’ny tsy fankatoavan-dalàna dia hihamangatsiaka ny fitiavan’ny maro. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Fa izay maharitra hatramin’ny farany no hovonjena. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ary hotorìna manerana izao tontolo izao ity Filazantsaran’ny fanjakana ity ho vavolombelona amin’ny firenena rehetra dia izay vao ho tonga ny farany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fahoriana tsy hisy toa azy
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mar 13.14-23; Lio 21.20-24
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Koa raha hitanareo mitsangana ao amin’izay fitoerana masina ny fahavetavetan’ny fandravana, izay nampilazaina an’i Daniela mpaminany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.15 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: profeta.
    marker-yv: yv-n
  - type: text
    text: ' (Dan 12.11; 9.27), aoka hisaina izay mamaky izany, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'dia aoka izay olona any '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jodia
  - type: text
    text: ' handositra ho any an-tendrombohitra; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: izay ao an-
  - type: usfm
    marker: w
    children:
    - type: text
      text: tampon-trano
  - type: text
    text: ' dia aoka tsy hidina haka ny entany ao an-tranony; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'ary izay any an-tsaha dia aoka tsy hiverina haka ny akanjony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Loza ny hahazo ny bevohoka sy ny mampinono amin’izany andro izany! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Fa mivavaha ianareo mba tsy ho amin’ny ririnina na ho amin’ny Sabata no handosiranareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Fa amin’izay andro izay dia hisy fahoriana lehibe, izay mbola tsy nisy toy izany hatrizay niandohan’izao tontolo izao ka mandraka ankehitriny sady tsy hisy intsony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ary raha tsy hafohezina izany andro izany dia tsy misy nofo ho voavonjy; fa noho ny olom-boafidy dia hohafohezina izany andro izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Koa raha misy miteny aminareo hoe: Indro, atỳ '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ', na: Indro, arỳ Izy, aza mino izany ianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Fa hisy kristy sandoka sy mpaminany sandoka hitsangana ka haneho famantarana lehibe sy fahagagana, ary raha azony atao, na dia ny olom-boafidy aza dia hofitahiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Indro, efa voalazako taminareo rahateo izany.
- type: usfm
  marker: r
  children:
  - type: text
    text: Lio 17.23-24, 37
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ary amin’izany, raha misy miteny aminareo hoe: Indro, any an-tany efitra Izy, aza mankany ianareo; indro, ao amin’ny efitrano Izy dia aza mino izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Fa tahaka ny tselatra avy any atsinanana ka hita hatrany andrefana dia ho tahaka izany ny fiavian’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Zanak’Olona
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Fa izay itoeran’ny faty, any no hiangonan’ny voromahery.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny famantarana ny amin’ny Zanak’Olona
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mar 13.24-27; Lio 21.25-31
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Raha vao afaka ny fahoriana amin’ireo andro ireo
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hohamaizinina ny masoandro
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy hahazava ny volana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hiraraka avy eny amin’ny lanitra ny kintana
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hohozongozonina ny herin’ny lanitra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Amin’izay no hiseho eny amin’ny lanitra ny famantarana ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Zanak’Olona
  - type: text
    text: ' ka hitomany ny firenena rehetra ambonin’ny tany, ary hahita ny Zanak’Olona avy amin’ny hery sy voninahitra lehibe eny amin’ny rahon’ny lanitra izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Ary haniraka ny anjeliny Izy, miaraka amin’ny feon’ny trompetra mafy, ary izy ireo dia hanangona ny olom-boafidiny avy amin’ny vazan-tany efatra, hatramin’ny faravodilanitra rehetra.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fanoharana ny amin’ny aviavy
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mar 13.28-32; Lio 21.29-33
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Mianara ny fanoharana ny amin’ny aviavy: Raha vao mitsiry ny rantsany ka mandravina dia fantatrareo fa efa akaiky ny lohataona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Dia tahaka izany koa ianareo, raha vao hitanareo izany rehetra izany, dia aoka ho fantatrareo fa efa akaiky, efa eo am-baravarana Izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Lazaiko aminareo marina tokoa: Tsy mba ho tapitra izao taranaka izao mandra-pahatongan’izany rehetra izany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Ny lanitra sy ny tany dia ho levona, fa ny teniko dia tsy mba ho levona.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Tsy misy olona mahafantatra ny andro na ny ora
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Fa ny amin’izany andro sy ora izany dia tsy misy mahalala, na dia ny anjelin’ny lanitra aza, ary na ny Zanaka aza, afa-tsy ny Ray ihany.
- type: usfm
  marker: r
  children:
  - type: text
    text: Lio 17.26-36
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Fa tahaka ny tamin’ny andron’i Noa dia ho tahaka izany koa ny fiavian’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Zanak’Olona
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Tahaka ny tamin’ny andro mialoha ny safodrano koa, raha nihinana sy nisotro ny olona ary nampaka-bady sy namoaka ny ampakarina, mandra-piavin’ny andro izay nidiran’i Noa tao amin’ny sambofiara, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'ary tsy nahafantatra izy ireo raha tsy tonga ny safodrano izay nandringana ny olona rehetra, dia ho tahaka izany ny fiavian’ny Zanak’Olona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Ary amin’izany dia hisy roa lahy any an-tsaha; ny iray dia horaisina ary ny iray dia havela. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: Ary hisy roa vavy manodina ny fikosoham-bary; ny iray dia horaisina ary ny iray dia havela.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: Koa amin’izany miambena ianareo; fa tsy fantatrareo izay andro hiavian’ny Tomponareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Nefa aoka ho fantatrareo izao: Raha fantatry ny tompon-trano ny fotoam-piambenana amin’ny alina izay hahatongavan’ny mpangalatra dia ho niambina izy ka tsy namela ny tranony hovakina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: Noho izany, miomàna koa ianareo; fa amin’izay ora tsy ampoizinareo no hiavian’ny Zanak’Olona.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fanoharana ny amin’ilay mpanompo mahatoky
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Lio 12.42-46
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Iza moa no mpanompo mahatoky sy manan-tsaina, izay notendren’ny tompony hifehy ny mpanompony mba hanome azy ireo sakafo ara-potoana? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Sambatra izany mpanompo izany, raha avy ny tompony ka mahita azy manatanteraka izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Lazaiko aminareo marina tokoa fa hotendreny ho mpanapaka ny fananany rehetra izy avy eo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Fa raha miteny anakampo kosa ny mpanompo ratsy fanahy hoe: Maharitra ela ny tompoko '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'ka mikapoka ny mpanompo namany ary miara-mihinana sy misotro amin’ny mpimamo, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'dia ho avy ny tompon’izany mpanompo izany amin’ny andro izay tsy ampoiziny sy amin’ny ora izay tsy fantany, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: koa hokapohiny mafy izy sady homeny anjara miaraka amin’ny mpihatsaravelatsihy; any no hisy ny fitomaniana sy ny fikitroha-nify.
