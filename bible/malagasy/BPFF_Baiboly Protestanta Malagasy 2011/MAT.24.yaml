document_id: MAT.24,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Nilaza ny amin’ny handravana ny tempoly Jesosy
  - type: heading
    content: Mar 13.1-4; Lio 21.5-7
  - type: text
    content: 'Rehefa niala tao amin’ny tempoly Jesosy dia lasa nandeha; ary nanatona Azy ny mpianany mba hampijery Azy ny rafitry ny tempoly. '
  '10':
  - type: text
    content: 'Amin’izany andro izany dia maro no ho tafintohina ka hifampiampanga sy hifankahala. '
  '11':
  - type: text
    content: 'Hisy mpaminany sandoka maro hitsangana ka hamitaka olona maro. '
  '12':
  - type: text
    content: 'Ary noho ny haben’ny tsy fankatoavan-dalàna dia hihamangatsiaka ny fitiavan’ny maro. '
  '13':
  - type: text
    content: 'Fa izay maharitra hatramin’ny farany no hovonjena. '
  '14':
  - type: text
    content: Ary hotorìna manerana izao tontolo izao ity Filazantsaran’ny fanjakana ity ho vavolombelona amin’ny firenena rehetra dia izay vao ho tonga ny farany.
  - type: heading
    content: Fahoriana tsy hisy toa azy
  - type: heading
    content: Mar 13.14-23; Lio 21.20-24
  '15':
  - type: text
    content: Koa raha hitanareo mitsangana ao amin’izay fitoerana masina ny fahavetavetan’ny fandravana, izay nampilazaina an’i Daniela mpaminany
  - type: note
    content: 'Na: profeta.'
  - type: text
    content: ' (Dan 12.11; 9.27), aoka hisaina izay mamaky izany, '
  '16':
  - type: text
    content: 'dia aoka izay olona any '
  - type: text
    content: Jodia
  - type: text
    content: ' handositra ho any an-tendrombohitra; '
  '17':
  - type: text
    content: izay ao an-
  - type: text
    content: tampon-trano
  - type: text
    content: ' dia aoka tsy hidina haka ny entany ao an-tranony; '
  '18':
  - type: text
    content: 'ary izay any an-tsaha dia aoka tsy hiverina haka ny akanjony. '
  '19':
  - type: text
    content: 'Loza ny hahazo ny bevohoka sy ny mampinono amin’izany andro izany! '
  '2':
  - type: text
    content: 'Hoy Izy anefa taminy: Tsy hitanareo va ireo rehetra ireo? Lazaiko aminareo marina tokoa: Tsy havela hisy vato hifanongoa eo ka tsy horavana.'
  '20':
  - type: text
    content: 'Fa mivavaha ianareo mba tsy ho amin’ny ririnina na ho amin’ny Sabata no handosiranareo. '
  '21':
  - type: text
    content: 'Fa amin’izay andro izay dia hisy fahoriana lehibe, izay mbola tsy nisy toy izany hatrizay niandohan’izao tontolo izao ka mandraka ankehitriny sady tsy hisy intsony. '
  '22':
  - type: text
    content: Ary raha tsy hafohezina izany andro izany dia tsy misy nofo ho voavonjy; fa noho ny olom-boafidy dia hohafohezina izany andro izany.
  '23':
  - type: text
    content: 'Koa raha misy miteny aminareo hoe: Indro, atỳ '
  - type: text
    content: Kristy
  - type: text
    content: ', na: Indro, arỳ Izy, aza mino izany ianareo. '
  '24':
  - type: text
    content: 'Fa hisy kristy sandoka sy mpaminany sandoka hitsangana ka haneho famantarana lehibe sy fahagagana, ary raha azony atao, na dia ny olom-boafidy aza dia hofitahiny. '
  '25':
  - type: text
    content: Indro, efa voalazako taminareo rahateo izany.
  - type: heading
    content: Lio 17.23-24, 37
  '26':
  - type: text
    content: 'Ary amin’izany, raha misy miteny aminareo hoe: Indro, any an-tany efitra Izy, aza mankany ianareo; indro, ao amin’ny efitrano Izy dia aza mino izany. '
  '27':
  - type: text
    content: 'Fa tahaka ny tselatra avy any atsinanana ka hita hatrany andrefana dia ho tahaka izany ny fiavian’ny '
  - type: text
    content: Zanak’Olona
  - type: text
    content: '. '
  '28':
  - type: text
    content: Fa izay itoeran’ny faty, any no hiangonan’ny voromahery.
  - type: heading
    content: Ny famantarana ny amin’ny Zanak’Olona
  - type: heading
    content: Mar 13.24-27; Lio 21.25-31
  '29':
  - type: text
    content: Raha vao afaka ny fahoriana amin’ireo andro ireo
  - type: text
    content: dia hohamaizinina ny masoandro
  - type: text
    content: ary tsy hahazava ny volana;
  - type: text
    content: hiraraka avy eny amin’ny lanitra ny kintana
  - type: text
    content: ary hohozongozonina ny herin’ny lanitra.
  '3':
  - type: text
    content: 'Ary nipetraka teo an-tendrombohitra Oliva Izy dia nanatona Azy mangingina ny mpianany ka niteny hoe: Lazao aminay izay andro hahatongavan’izany ary izay ho famantarana ny fiavianao sy ny fahataperan’izao tontolo izao.'
  - type: heading
    content: Ireo famantarana ny hiavian’ny farany
  - type: heading
    content: Mar 13.5-13; Lio 21.8-19
  '30':
  - type: text
    content: 'Amin’izay no hiseho eny amin’ny lanitra ny famantarana ny '
  - type: text
    content: Zanak’Olona
  - type: text
    content: ' ka hitomany ny firenena rehetra ambonin’ny tany, ary hahita ny Zanak’Olona avy amin’ny hery sy voninahitra lehibe eny amin’ny rahon’ny lanitra izy. '
  '31':
  - type: text
    content: Ary haniraka ny anjeliny Izy, miaraka amin’ny feon’ny trompetra mafy, ary izy ireo dia hanangona ny olom-boafidiny avy amin’ny vazan-tany efatra, hatramin’ny faravodilanitra rehetra.
  - type: heading
    content: Fanoharana ny amin’ny aviavy
  - type: heading
    content: Mar 13.28-32; Lio 21.29-33
  '32':
  - type: text
    content: 'Mianara ny fanoharana ny amin’ny aviavy: Raha vao mitsiry ny rantsany ka mandravina dia fantatrareo fa efa akaiky ny lohataona. '
  '33':
  - type: text
    content: 'Dia tahaka izany koa ianareo, raha vao hitanareo izany rehetra izany, dia aoka ho fantatrareo fa efa akaiky, efa eo am-baravarana Izy. '
  '34':
  - type: text
    content: 'Lazaiko aminareo marina tokoa: Tsy mba ho tapitra izao taranaka izao mandra-pahatongan’izany rehetra izany.'
  '35':
  - type: text
    content: Ny lanitra sy ny tany dia ho levona, fa ny teniko dia tsy mba ho levona.
  - type: heading
    content: Tsy misy olona mahafantatra ny andro na ny ora
  '36':
  - type: text
    content: Fa ny amin’izany andro sy ora izany dia tsy misy mahalala, na dia ny anjelin’ny lanitra aza, ary na ny Zanaka aza, afa-tsy ny Ray ihany.
  - type: heading
    content: Lio 17.26-36
  '37':
  - type: text
    content: 'Fa tahaka ny tamin’ny andron’i Noa dia ho tahaka izany koa ny fiavian’ny '
  - type: text
    content: Zanak’Olona
  - type: text
    content: '. '
  '38':
  - type: text
    content: 'Tahaka ny tamin’ny andro mialoha ny safodrano koa, raha nihinana sy nisotro ny olona ary nampaka-bady sy namoaka ny ampakarina, mandra-piavin’ny andro izay nidiran’i Noa tao amin’ny sambofiara, '
  '39':
  - type: text
    content: 'ary tsy nahafantatra izy ireo raha tsy tonga ny safodrano izay nandringana ny olona rehetra, dia ho tahaka izany ny fiavian’ny Zanak’Olona. '
  '4':
  - type: text
    content: 'Ary Jesosy namaly azy ireo hoe: Mitandrema, fandrao hisy hamitaka anareo. '
  '40':
  - type: text
    content: 'Ary amin’izany dia hisy roa lahy any an-tsaha; ny iray dia horaisina ary ny iray dia havela. '
  '41':
  - type: text
    content: Ary hisy roa vavy manodina ny fikosoham-bary; ny iray dia horaisina ary ny iray dia havela.
  '42':
  - type: text
    content: Koa amin’izany miambena ianareo; fa tsy fantatrareo izay andro hiavian’ny Tomponareo.
  '43':
  - type: text
    content: 'Nefa aoka ho fantatrareo izao: Raha fantatry ny tompon-trano ny fotoam-piambenana amin’ny alina izay hahatongavan’ny mpangalatra dia ho niambina izy ka tsy namela ny tranony hovakina. '
  '44':
  - type: text
    content: Noho izany, miomàna koa ianareo; fa amin’izay ora tsy ampoizinareo no hiavian’ny Zanak’Olona.
  - type: heading
    content: Fanoharana ny amin’ilay mpanompo mahatoky
  - type: heading
    content: Lio 12.42-46
  '45':
  - type: text
    content: 'Iza moa no mpanompo mahatoky sy manan-tsaina, izay notendren’ny tompony hifehy ny mpanompony mba hanome azy ireo sakafo ara-potoana? '
  '46':
  - type: text
    content: 'Sambatra izany mpanompo izany, raha avy ny tompony ka mahita azy manatanteraka izany. '
  '47':
  - type: text
    content: 'Lazaiko aminareo marina tokoa fa hotendreny ho mpanapaka ny fananany rehetra izy avy eo. '
  '48':
  - type: text
    content: 'Fa raha miteny anakampo kosa ny mpanompo ratsy fanahy hoe: Maharitra ela ny tompoko '
  '49':
  - type: text
    content: 'ka mikapoka ny mpanompo namany ary miara-mihinana sy misotro amin’ny mpimamo, '
  '5':
  - type: text
    content: 'Fa maro no ho avy amin’ny anarako hilaza hoe: Izaho no '
  - type: text
    content: Kristy
  - type: text
    content: ' ka maro no ho voafitany. '
  '50':
  - type: text
    content: 'dia ho avy ny tompon’izany mpanompo izany amin’ny andro izay tsy ampoiziny sy amin’ny ora izay tsy fantany, '
  '51':
  - type: text
    content: koa hokapohiny mafy izy sady homeny anjara miaraka amin’ny mpihatsaravelatsihy; any no hisy ny fitomaniana sy ny fikitroha-nify.
  '6':
  - type: text
    content: 'Ary handre ady sy filazana ady ianareo; koa mitandrema, aza matahotra; fa tsy maintsy ho tonga izany; nefa tsy mbola izay no farany. '
  '7':
  - type: text
    content: 'Fa hisy firenena hitsangana hamely firenena, hisy fanjakana hitsangana hamely fanjakana; ary hisy mosary sy horohoron-tany any amin’ny tany samihafa. '
  '8':
  - type: text
    content: Fa izany rehetra izany no ho fiandohan’ny faharariam-piterahana.
  '9':
  - type: text
    content: 'Ary hatolony hampijaliana ianareo ka hovonoiny; ary ho halan’ny firenena rehetra ianareo noho ny anarako. '
