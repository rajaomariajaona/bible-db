document_id: NUM.20
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny rano tao Meriba
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Tamin’ny volana voalohany dia tonga tao an-tany efitra Zina ny Zanak’Israely, dia ny fiangonana manontolo, ary nitoetra tao Kadesy ny olona. Maty tao i Miriama ka nalevina tao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary tsy nisy rano ho an’ny fiangonana ka nitangorona mba hikomy tamin’i Mosesy sy i Arona izy ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Nila ady tamin’i Mosesy ny olona ka niteny hoe: Tahaka izay izahay mba maty tamin’ny nahafatesan’ny rahalahinay teo anatrehan’NY TOMPO! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Fa nahoana no nitondra ny fiangonan’NY TOMPO ho amin’ity tany efitra ity ianareo mba hahafaty anay sy ny ombinay eto? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary nahoana izahay no noentinareo niakatra avy tany Ejipta ka nampidirinareo atỳ amin’ity tany ratsy ity, izay tsy misy voan-javatra, na aviavy na voaloboka na ampongabendanitra akory sady tsy misy rano hosotroina? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia niala teo anatrehan’ny fiangonana i Mosesy sy i Arona ka nankeo anoloan’ny varavaran’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tranolay fihaonana
  - type: text
    text: ' ary niankohoka tamin’ny tany. Dia niseho taminy ny voninahitry NY TOMPO.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary NY TOMPO niteny tamin’i Mosesy hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Alao ny tehina ka vorionao sy i Arona rahalahinao ny fiangonana, ary mitenena amin’ny vatolampy eo imasony dia hanome ny ranony izy; hampivoaka rano ho an’ny olona avy amin’ny vatolampy tokoa ianao ka hampisotroinao ny fiangonana sy ny biby fiompiny izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Dia nalain’i Mosesy ny tehina avy teo anatrehan’NY TOMPO, araka izay nandidiany azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary novorin’i Mosesy sy i Arona teo anoloan’ny vatolampy ny fiangonana ka hoy izy: Mihainoa, ry mpikomy! Moa avy amin’ity vatolampy ity va no hampivoahanay rano ho anareo? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ary nanainga ny tanany i Mosesy ka nikapoka ny vatolampy indroa tamin’ny tehiny. Dia niboiboika be dia be ny rano ka nisotro avokoa ny fiangonana sy ny biby fiompiny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary NY TOMPO niteny tamin’i Mosesy sy i Arona hoe: Satria tsy nino Ahy ianareo ka tsy nanamasina Ahy teo imason’ny Zanak’Israely dia tsy hitondra izao fiangonana izao hiditra ho any amin’ny tany izay nomeko azy ianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ity no ranon’i Meriba
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Meriba: Ady.'
    marker-yv: yv-n
  - type: text
    text: ' izay nilan’ny Zanak’Israely ady tamin’NY TOMPO ka nisehoan’NY TOMPO ho masina taminy.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Tsy manaiky ny hamakivakian’ny Zanak’Israely ny taniny ny mpanjakan’i Edoma
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary nandefa iraka avy tao Kadesy hankany amin’ny mpanjakan’i Edoma i Mosesy hilaza hoe: Izao no lazain’Israely rahalahinao: Ianao dia mahafantatra ny fahasahiranana rehetra izay nanjo anay, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'dia ny nidinan’ny razanay tany Ejipta sy ny nitoeranay ela tany. Nampahory anay sy ny razanay anefa ny Ejiptiana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary raha nitaraina tamin’NY TOMPO izahay dia nihaino ny feonay Izy ka naniraka anjely sy namoaka anay avy tany Ejipta; ary indreto, tonga eto Kadesy, izay tanàna eto amin’ny tendron’ny taninao, izahay; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: koa avelao mba handeha hamakivaky ny taninao izahay; fa tsy handeha hamakivaky ny saha sy ny tanim-boaloboka na hisotro ny rano amin’ny vovo fantsakana akory izahay, fa ny Lalan’andriana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ny Lalan’andriana: lalambe any andafin’i Jordana, izay mampitohy an’i Arabia sy i Damaskosy.'
    marker-yv: yv-n
  - type: text
    text: ' ihany no halehanay ka tsy hivily izahay na ho amin’ny ankavanana na ho amin’ny ankavia mandra-pihoatranay ny sisintaninao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Fa hoy ny Edomita taminy: Tsy mahazo mandeha mamakivaky ny taniko ianao, fandrao hivoaka hamely anao amin’ny sabatra aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Dia hoy ny Zanak’Israely taminy: Ny lalambe ihany no halehanay, fa raha hisotro ny ranonao izaho sy ny omby aman’ondriko dia hefaiko vola izany; fa zavatra tsotra ihany: Tsy hanao na inona na inona aho fa handalo an-tongotra fotsiny ihany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Hoy anefa ny navaliny: Tsy mahazo mandalo eto ianao! Ary niainga hisakana azy ny Edomita ka nitondra vahoaka betsaka sady nampiseho hery be. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Toy izany no nandavan’ny Edomita tsy hamela ny Israelita hamakivaky ny taniny ka nivily niala taminy ny Zanak’Israely.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nahafatesan’i Arona
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Dia niala tao Kadesy ny Zanak’Israely, dia ny fiangonana manontolo, ka tonga tao amin’ny tendrombohitra Hora. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary NY TOMPO niteny tamin’i Mosesy sy tamin’i Arona tao amin’ny tendrombohitra Hora, tao amin’ny faritanin’i Edoma hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Hangonina any amin’ny razany i Arona; fa tsy hiditra any amin’ny tany izay nomeko ny Zanak’Israely izy satria nandà ny teniko teo amin’ny ranon’i Meriba ianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Alao i Arona sy i Eleazara zanany ka ento miakatra ao amin’ny tendrombohitra Hora izy mianaka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Esory ny fitafian’i Arona ka atafio an’i Eleazara zanany. Ary hangonina any amin’ny razany i Arona; any no hahafatesany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ary nanatanteraka izay nandidian’NY TOMPO i Mosesy ka niakatra tao amin’ny tendrombohitra Hora, teo imason’ny fiangonana manontolo, izy telo mianaka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Dia nesorin’i Mosesy ny fitafian’i Arona ka natafiny an’i Eleazara zanany, dia maty tao an-tampon’ny tendrombohitra i Arona. Ary nidina avy tao an-tendrombohitra i Mosesy sy i Eleazara. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Nony hitan’ny fiangonana manontolo fa maty i Arona dia nitomany azy nandritra ny telopolo andro izy, dia ny taranak’Israely rehetra.
