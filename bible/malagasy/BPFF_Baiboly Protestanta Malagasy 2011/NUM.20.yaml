document_id: NUM.20,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny rano tao Meriba
  - type: text
    content: Tamin’ny volana voalohany dia tonga tao an-tany efitra Zina ny Zanak’Israely, dia ny fiangonana manontolo, ary nitoetra tao Kadesy ny olona. Maty tao i Miriama ka nalevina tao.
  '10':
  - type: text
    content: 'Ary novorin’i Mosesy sy i Arona teo anoloan’ny vatolampy ny fiangonana ka hoy izy: Mihainoa, ry mpikomy! Moa avy amin’ity vatolampy ity va no hampivoahanay rano ho anareo? '
  '11':
  - type: text
    content: Ary nanainga ny tanany i Mosesy ka nikapoka ny vatolampy indroa tamin’ny tehiny. Dia niboiboika be dia be ny rano ka nisotro avokoa ny fiangonana sy ny biby fiompiny.
  '12':
  - type: text
    content: 'Ary NY TOMPO niteny tamin’i Mosesy sy i Arona hoe: Satria tsy nino Ahy ianareo ka tsy nanamasina Ahy teo imason’ny Zanak’Israely dia tsy hitondra izao fiangonana izao hiditra ho any amin’ny tany izay nomeko azy ianareo. '
  '13':
  - type: text
    content: Ity no ranon’i Meriba
  - type: note
    content: 'Meriba: Ady.'
  - type: text
    content: ' izay nilan’ny Zanak’Israely ady tamin’NY TOMPO ka nisehoan’NY TOMPO ho masina taminy.'
  - type: heading
    content: Tsy manaiky ny hamakivakian’ny Zanak’Israely ny taniny ny mpanjakan’i Edoma
  '14':
  - type: text
    content: 'Ary nandefa iraka avy tao Kadesy hankany amin’ny mpanjakan’i Edoma i Mosesy hilaza hoe: Izao no lazain’Israely rahalahinao: Ianao dia mahafantatra ny fahasahiranana rehetra izay nanjo anay, '
  '15':
  - type: text
    content: 'dia ny nidinan’ny razanay tany Ejipta sy ny nitoeranay ela tany. Nampahory anay sy ny razanay anefa ny Ejiptiana. '
  '16':
  - type: text
    content: 'Ary raha nitaraina tamin’NY TOMPO izahay dia nihaino ny feonay Izy ka naniraka anjely sy namoaka anay avy tany Ejipta; ary indreto, tonga eto Kadesy, izay tanàna eto amin’ny tendron’ny taninao, izahay; '
  '17':
  - type: text
    content: koa avelao mba handeha hamakivaky ny taninao izahay; fa tsy handeha hamakivaky ny saha sy ny tanim-boaloboka na hisotro ny rano amin’ny vovo fantsakana akory izahay, fa ny Lalan’andriana
  - type: note
    content: 'Ny Lalan’andriana: lalambe any andafin’i Jordana, izay mampitohy an’i Arabia sy i Damaskosy.'
  - type: text
    content: ' ihany no halehanay ka tsy hivily izahay na ho amin’ny ankavanana na ho amin’ny ankavia mandra-pihoatranay ny sisintaninao. '
  '18':
  - type: text
    content: 'Fa hoy ny Edomita taminy: Tsy mahazo mandeha mamakivaky ny taniko ianao, fandrao hivoaka hamely anao amin’ny sabatra aho. '
  '19':
  - type: text
    content: 'Dia hoy ny Zanak’Israely taminy: Ny lalambe ihany no halehanay, fa raha hisotro ny ranonao izaho sy ny omby aman’ondriko dia hefaiko vola izany; fa zavatra tsotra ihany: Tsy hanao na inona na inona aho fa handalo an-tongotra fotsiny ihany. '
  '2':
  - type: text
    content: 'Ary tsy nisy rano ho an’ny fiangonana ka nitangorona mba hikomy tamin’i Mosesy sy i Arona izy ireo. '
  '20':
  - type: text
    content: 'Hoy anefa ny navaliny: Tsy mahazo mandalo eto ianao! Ary niainga hisakana azy ny Edomita ka nitondra vahoaka betsaka sady nampiseho hery be. '
  '21':
  - type: text
    content: Toy izany no nandavan’ny Edomita tsy hamela ny Israelita hamakivaky ny taniny ka nivily niala taminy ny Zanak’Israely.
  - type: heading
    content: Ny nahafatesan’i Arona
  '22':
  - type: text
    content: 'Dia niala tao Kadesy ny Zanak’Israely, dia ny fiangonana manontolo, ka tonga tao amin’ny tendrombohitra Hora. '
  '23':
  - type: text
    content: 'Ary NY TOMPO niteny tamin’i Mosesy sy tamin’i Arona tao amin’ny tendrombohitra Hora, tao amin’ny faritanin’i Edoma hoe: '
  '24':
  - type: text
    content: 'Hangonina any amin’ny razany i Arona; fa tsy hiditra any amin’ny tany izay nomeko ny Zanak’Israely izy satria nandà ny teniko teo amin’ny ranon’i Meriba ianareo. '
  '25':
  - type: text
    content: 'Alao i Arona sy i Eleazara zanany ka ento miakatra ao amin’ny tendrombohitra Hora izy mianaka. '
  '26':
  - type: text
    content: 'Esory ny fitafian’i Arona ka atafio an’i Eleazara zanany. Ary hangonina any amin’ny razany i Arona; any no hahafatesany. '
  '27':
  - type: text
    content: 'Ary nanatanteraka izay nandidian’NY TOMPO i Mosesy ka niakatra tao amin’ny tendrombohitra Hora, teo imason’ny fiangonana manontolo, izy telo mianaka. '
  '28':
  - type: text
    content: 'Dia nesorin’i Mosesy ny fitafian’i Arona ka natafiny an’i Eleazara zanany, dia maty tao an-tampon’ny tendrombohitra i Arona. Ary nidina avy tao an-tendrombohitra i Mosesy sy i Eleazara. '
  '29':
  - type: text
    content: Nony hitan’ny fiangonana manontolo fa maty i Arona dia nitomany azy nandritra ny telopolo andro izy, dia ny taranak’Israely rehetra.
  '3':
  - type: text
    content: 'Nila ady tamin’i Mosesy ny olona ka niteny hoe: Tahaka izay izahay mba maty tamin’ny nahafatesan’ny rahalahinay teo anatrehan’NY TOMPO! '
  '4':
  - type: text
    content: 'Fa nahoana no nitondra ny fiangonan’NY TOMPO ho amin’ity tany efitra ity ianareo mba hahafaty anay sy ny ombinay eto? '
  '5':
  - type: text
    content: 'Ary nahoana izahay no noentinareo niakatra avy tany Ejipta ka nampidirinareo atỳ amin’ity tany ratsy ity, izay tsy misy voan-javatra, na aviavy na voaloboka na ampongabendanitra akory sady tsy misy rano hosotroina? '
  '6':
  - type: text
    content: 'Dia niala teo anatrehan’ny fiangonana i Mosesy sy i Arona ka nankeo anoloan’ny varavaran’ny '
  - type: text
    content: tranolay fihaonana
  - type: text
    content: ' ary niankohoka tamin’ny tany. Dia niseho taminy ny voninahitry NY TOMPO.'
  '7':
  - type: text
    content: 'Ary NY TOMPO niteny tamin’i Mosesy hoe: '
  '8':
  - type: text
    content: 'Alao ny tehina ka vorionao sy i Arona rahalahinao ny fiangonana, ary mitenena amin’ny vatolampy eo imasony dia hanome ny ranony izy; hampivoaka rano ho an’ny olona avy amin’ny vatolampy tokoa ianao ka hampisotroinao ny fiangonana sy ny biby fiompiny izany. '
  '9':
  - type: text
    content: 'Dia nalain’i Mosesy ny tehina avy teo anatrehan’NY TOMPO, araka izay nandidiany azy. '
