document_id: 1TH.2,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Fa ny tenanareo, ry rahalahy, dia mahalala fa tsy foana ny fidiranay tatỳ aminareo. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Samy vavolombelona ianareo sy Andriamanitra fa masina sy marina ary tsy nanan-tsiny tokoa ny fitondrantenanay teo imasonareo izay mino. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Fantatrareo koa fa tahaka ny ray amin’ny zanaka no nampirisihanay sy nampiononanay anareo tsirairay avy sy nananaranay mafy anareo '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: mba handehananareo mendrika an’Andriamanitra izay miantso anareo ho amin’ny fanjakany sy ny voninahiny.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Noho izany, izahay koa, dia tsy mitsahatra misaotra an’Andriamanitra satria rehefa nandray ny tenin’Andriamanitra izay notorinay ianareo dia tsy noraisinareo ho tenin’olona izany fa araka izay marina, dia ny tenin’Andriamanitra izay miasa ao anatinareo izay mino koa.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Fa ianareo, ry rahalahy, dia efa tahaka ny fiangonan’Andriamanitra any '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jodia
    - type: text
      text: ' izay ao amin’i Kristy Jesosy. Fa ny nanjo anareo noho ny nataon’ny iray firenena aminareo dia sahala amin’ny nanjo azy ireo koa noho ny nataon’ny Jiosy taminy; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'ny Jiosy izay sady namono an’i Jesosy Tompo sy ny mpaminany no nandroaka anay sy tsy manao ny sitrapon’Andriamanitra fa manohitra ny olona rehetra. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Mandrara anay tsy hitory amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jentilisa
    - type: text
      text: ' ny Jiosy mba hamonjena ny olona hafa firenena. Ary amin’izany izy dia tsy mitsahatra manampy trotraka ny fahotan’ny tenany. Farany anefa dia nahatratra azy ny fahatezerana.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Maniry ny hihaona amin’ny Tesaloniana indray i Paoly
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Ary izahay, ry rahalahy, rehefa tafasaraka taminareo vetivety foana tamin’ny fanatreha-maso fa tsy tamin’ny fo, dia vao mainka nitady sy naniry fatratra hahita ny tavanareo. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Koa naniry hankany aminareo indray mandeha na indroa izahay, dia izaho Paoly, nefa nosakanan’i Satana izahay. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Fa inona moa no fanantenanay na fifalianay na satroboninahitra reharehanay? Moa va tsy ianareo eo anatrehan’i Jesosy Tompontsika amin’ny fiaviany? '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Fa rehefa nampahorina sy nisetrasetrana tany Filipia izahay teo aloha, araka ny fantatrareo ihany, dia nomen’Andriamanitray fahasahiana izahay hiteny taminareo ny Filazantsaran’Andriamanitra, na dia be aza ny fanoherana. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Eny, ianareo no voninahitray sy fifalianay.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Ary ny fananaranay dia tsy avy amin’ny fitaka na avy amin’ny fahalotoana na avy amin’ny fisolokiana. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Fa tahaka ny nankasitrahan’Andriamanitra anay ka nanolorana anay ny Filazantsara ho adidinay dia araka izany koa no itenenanay, tsy toy ny mila sitraka amin’olona fa amin’Andriamanitra izay mizaha toetra ny fonay.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Fa tsy nilaza teny mandrobo na oviana na oviana akory izahay; araka ny fantatrareo ihany na nihatsaravelatsihy hanafina fitiavan-karena; Andriamanitra no vavolombelona amin’izany; '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'ary tsy nitady voninahitra tamin’olona izahay, na taminareo na tamin’ny hafa, na dia nanana fahefana hahavaky tratra aza izahay, araka izay maha apostolin’i Kristy anay. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Fa nalemy fanahy teo aminareo, tahaka ny reny mitaiza ny zanany naterany, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: dia toy izany no nampahazoto anay, noho ny fitiavanay anareo indrindra, dia ny hanome ho anareo, tsy ny Filazantsaran’Andriamanitra ihany fa ny ainay koa aza, satria efa malalanay ianareo.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Tsaroanareo, ry rahalahy, ny fikelezanay aina sy ny fisasaranay; fa niasa andro aman’alina izahay mba tsy hahavaky tratra na dia olona iray akory aza taminareo, raha nitory ny Filazantsaran’Andriamanitra taminareo. '
