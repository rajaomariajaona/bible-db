document_id: REV.1
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fitarihanteny
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ny fanambaran’i Jesosy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ', izay nomen’Andriamanitra Azy, mba hasehony amin’ny mpanompony rehetra izay zavatra tsy maintsy ho tonga haingana; ary naniraka ny anjeliny Izy hanambara amin’i Jaona mpanompony amin’ny alalan’ny famantarana, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: izay nanambara ny zavatra rehetra izay hitany, dia ny tenin’Andriamanitra sy ny filazana an’i Jesosy Kristy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Sambatra izay mamaky sy mihaino ny tenin’ity faminaniana ity ka mitandrina izay voasoratra ato anatiny! Fa antomotra ny andro.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fiarahabana ny Fiangonana fito
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'I Jaona no mamangy ny Fiangonana fito any Azia: Ho aminareo anie ny fahasoavana sy ny fiadanana avy amin’Ilay ankehitriny sy taloha ary ho avy; ary avy amin’ny Fanahy fito izay eo anoloan’ny sezafiandrianany; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'ary avy amin’i Jesosy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ', Vavolombelona marina sy Lahimatoa amin’ny maty ary Lehiben’ny mpanjaka amin’ny tany!'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ho an’Izay tia antsika ka namaha antsika ho afaka tamin’ny fahotantsika tamin’ny rany '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'sady nanao antsika ho fanjakana, dia mpisorona ho an’Andriamanitra Rainy, ho Azy anie ny voninahitra sy ny fanjakana mandrakizay mandrakizay! '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Amena
  - type: text
    text: '!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Indro avy eny amin’ny rahona Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hahita Azy ny maso rehetra
- type: usfm
  marker: q1
  children:
  - type: text
    text: na dia izay nandefona Azy aza
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hitomany Azy ny firenena rehetra ambonin’ny tany.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, Amena!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Izaho no Alfa sy Omega, hoy ny Tompo Andriamanitra, Ilay ankehitriny sy taloha ary ho avy, dia ny Tsitoha.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Hitan’i Jaona ny voninahitr’i Kristy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Izaho Jaona, rahalahinareo sy mpiombona amin’ny fahoriana ary amin’ny fanjakana sy ny fiaretana ao amin’i Jesosy, dia tao amin’ny nosy atao hoe Patmo noho ny tenin’Andriamanitra sy ny filazana an’i Jesosy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Voatsindrin’ny Fanahy tamin’ny andron’ny Tompo aho ka nandre feo mahery tao ivohoko, toy ny feon’ny trompetra, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'hoe: Izay zavatra hitanao dia soraty ao amin’ny boky ka ampitondray ho any amin’ny Fiangonana fito, dia ho any Efesosy, Smirna, Pergamosy, Tiatira, Sardisy, Filadelfia ary Laodikia.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Dia nitodika aho mba hizaha ilay feo niteny tamiko. Koa rehefa nitodika aho dia nahita fitoeran-jiro volamena fito, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'ary teo afovoan’ny fitoeran-jiro dia nisy Iray tahaka ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Zanak’Olona
  - type: text
    text: ' niakanjo akanjo lava hatrany an-tongony sady nitondra fehikibo volamena teo amin’ny tratrany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ny lohany sy ny volony dia fotsy tahaka ny volon’ondry fotsy, tahaka ny orampanala. Ny masony dia tahaka ny lelafo, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'ny tongony dia tahaka ny varahina manganohano, ohatra ilay mivaivay avy tao amin’ny lafaoro iny, ary ny feony dia toy ny firohondrohon’ny ranobe. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Nitana kintana fito teny an-tanany havanana Izy; nisy sabatra maranitra roa lela nivoaka avy teo am-bavany, ary ny tarehiny dia tahaka ny masoandro mamirapiratra amin’ny heriny iny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary raha nahita Azy aho dia lavo niankohoka teo anoloan’ny tongony tahaka ny maty. Nefa Izy nanendry ahy tamin’ny tanany havanana ka niteny hoe:'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Aza matahotra! Izaho no Voalohany sy Farany, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'dia Ilay velona. Efa maty Aho, nefa indro, velona mandrakizay mandrakizay sady manana ny fanalahidin’ny fahafatesana sy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: fitoeran’ny maty
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Koa soraty izay zavatra hitanao, na izay zavatra ankehitriny, na izay zavatra mbola ho avy aorianan’izao, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: dia ny zavamiafina ny amin’ny kintana fito izay hitanao teny an-tanako havanana sy ny fitoeran-jiro volamena fito. Ny kintana fito dia ny anjelin’ny Fiangonana fito, ary ny fitoeran-jiro fito dia Fiangonana fito.
