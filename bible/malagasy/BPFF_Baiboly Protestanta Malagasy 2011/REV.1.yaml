document_id: REV.1,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Fitarihanteny
  - type: text
    content: 'Ny fanambaran’i Jesosy '
  - type: text
    content: Kristy
  - type: text
    content: ', izay nomen’Andriamanitra Azy, mba hasehony amin’ny mpanompony rehetra izay zavatra tsy maintsy ho tonga haingana; ary naniraka ny anjeliny Izy hanambara amin’i Jaona mpanompony amin’ny alalan’ny famantarana, '
  '10':
  - type: text
    content: 'Voatsindrin’ny Fanahy tamin’ny andron’ny Tompo aho ka nandre feo mahery tao ivohoko, toy ny feon’ny trompetra, '
  '11':
  - type: text
    content: 'hoe: Izay zavatra hitanao dia soraty ao amin’ny boky ka ampitondray ho any amin’ny Fiangonana fito, dia ho any Efesosy, Smirna, Pergamosy, Tiatira, Sardisy, Filadelfia ary Laodikia.'
  '12':
  - type: text
    content: 'Dia nitodika aho mba hizaha ilay feo niteny tamiko. Koa rehefa nitodika aho dia nahita fitoeran-jiro volamena fito, '
  '13':
  - type: text
    content: 'ary teo afovoan’ny fitoeran-jiro dia nisy Iray tahaka ny '
  - type: text
    content: Zanak’Olona
  - type: text
    content: ' niakanjo akanjo lava hatrany an-tongony sady nitondra fehikibo volamena teo amin’ny tratrany. '
  '14':
  - type: text
    content: 'Ny lohany sy ny volony dia fotsy tahaka ny volon’ondry fotsy, tahaka ny orampanala. Ny masony dia tahaka ny lelafo, '
  '15':
  - type: text
    content: 'ny tongony dia tahaka ny varahina manganohano, ohatra ilay mivaivay avy tao amin’ny lafaoro iny, ary ny feony dia toy ny firohondrohon’ny ranobe. '
  '16':
  - type: text
    content: Nitana kintana fito teny an-tanany havanana Izy; nisy sabatra maranitra roa lela nivoaka avy teo am-bavany, ary ny tarehiny dia tahaka ny masoandro mamirapiratra amin’ny heriny iny.
  '17':
  - type: text
    content: 'Ary raha nahita Azy aho dia lavo niankohoka teo anoloan’ny tongony tahaka ny maty. Nefa Izy nanendry ahy tamin’ny tanany havanana ka niteny hoe:'
  - type: text
    content: 'Aza matahotra! Izaho no Voalohany sy Farany, '
  '18':
  - type: text
    content: 'dia Ilay velona. Efa maty Aho, nefa indro, velona mandrakizay mandrakizay sady manana ny fanalahidin’ny fahafatesana sy ny '
  - type: text
    content: fitoeran’ny maty
  - type: text
    content: '. '
  '19':
  - type: text
    content: 'Koa soraty izay zavatra hitanao, na izay zavatra ankehitriny, na izay zavatra mbola ho avy aorianan’izao, '
  '2':
  - type: text
    content: izay nanambara ny zavatra rehetra izay hitany, dia ny tenin’Andriamanitra sy ny filazana an’i Jesosy Kristy.
  '20':
  - type: text
    content: dia ny zavamiafina ny amin’ny kintana fito izay hitanao teny an-tanako havanana sy ny fitoeran-jiro volamena fito. Ny kintana fito dia ny anjelin’ny Fiangonana fito, ary ny fitoeran-jiro fito dia Fiangonana fito.
  '3':
  - type: text
    content: Sambatra izay mamaky sy mihaino ny tenin’ity faminaniana ity ka mitandrina izay voasoratra ato anatiny! Fa antomotra ny andro.
  - type: heading
    content: Fiarahabana ny Fiangonana fito
  '4':
  - type: text
    content: 'I Jaona no mamangy ny Fiangonana fito any Azia: Ho aminareo anie ny fahasoavana sy ny fiadanana avy amin’Ilay ankehitriny sy taloha ary ho avy; ary avy amin’ny Fanahy fito izay eo anoloan’ny sezafiandrianany; '
  '5':
  - type: text
    content: 'ary avy amin’i Jesosy '
  - type: text
    content: Kristy
  - type: text
    content: ', Vavolombelona marina sy Lahimatoa amin’ny maty ary Lehiben’ny mpanjaka amin’ny tany!'
  - type: text
    content: 'Ho an’Izay tia antsika ka namaha antsika ho afaka tamin’ny fahotantsika tamin’ny rany '
  '6':
  - type: text
    content: 'sady nanao antsika ho fanjakana, dia mpisorona ho an’Andriamanitra Rainy, ho Azy anie ny voninahitra sy ny fanjakana mandrakizay mandrakizay! '
  - type: text
    content: Amena
  - type: text
    content: '!'
  '7':
  - type: text
    content: Indro avy eny amin’ny rahona Izy
  - type: text
    content: ary hahita Azy ny maso rehetra
  - type: text
    content: na dia izay nandefona Azy aza
  - type: text
    content: ary hitomany Azy ny firenena rehetra ambonin’ny tany.
  - type: text
    content: Eny, Amena!
  '8':
  - type: text
    content: Izaho no Alfa sy Omega, hoy ny Tompo Andriamanitra, Ilay ankehitriny sy taloha ary ho avy, dia ny Tsitoha.
  - type: heading
    content: Hitan’i Jaona ny voninahitr’i Kristy
  '9':
  - type: text
    content: 'Izaho Jaona, rahalahinareo sy mpiombona amin’ny fahoriana ary amin’ny fanjakana sy ny fiaretana ao amin’i Jesosy, dia tao amin’ny nosy atao hoe Patmo noho ny tenin’Andriamanitra sy ny filazana an’i Jesosy. '
