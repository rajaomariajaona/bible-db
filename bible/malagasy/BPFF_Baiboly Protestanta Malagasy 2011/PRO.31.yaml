document_id: PRO.31,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Torohevitra ho an’ny mpanjaka iray
  - type: text
    content: Ny tenin’i Lemoela mpanjaka. Teny mavesa-danja izay nampianarin’ny reniny azy.
  '10':
  - type: text
    content: Iza no mahita vehivavy mahafatra-po?
  - type: text
    content: Fa ny tombany dia mihoatra lavitra noho ny voahangy.
  - type: heading
    content: bet ב
  '11':
  - type: text
    content: Matoky azy ny fon’ny lahy
  - type: text
    content: ary tsy mitsahatra ny fanambinana azy.
  - type: heading
    content: gimel ג
  '12':
  - type: text
    content: Soa no ataon-dRavehivavy aminy fa tsy ratsy,
  - type: text
    content: amin’ny andro rehetra iainany.
  - type: heading
    content: dalet ד
  '13':
  - type: text
    content: Mizaha volon’ondry sy kofehy rongony izy
  - type: text
    content: ary mazoto miasa amin’ny tanany.
  - type: heading
    content: he ה
  '14':
  - type: text
    content: Toy ny sambon’ny mpivaro-mandeha izy
  - type: text
    content: ka avy lavitra no itondrany ny haniny.
  - type: heading
    content: vav ו
  '15':
  - type: text
    content: Mifoha izy raha mbola alina
  - type: text
    content: ka manome hanina ho an’ny ankohonany
  - type: text
    content: ary manome anjara ho an’ny mpanompovaviny.
  - type: heading
    content: zaìn ז
  '16':
  - type: text
    content: Mihevitra saha izy ka mahazo azy;
  - type: text
    content: ny vokatry ny tanany no anaovany tanim-boaloboka.
  - type: heading
    content: het ח
  '17':
  - type: text
    content: Misikina hery izy
  - type: text
    content: ary hatanjahiny ny sandriny.
  - type: heading
    content: tet ט
  '18':
  - type: text
    content: Hitany fa tsara ny tombom-barony
  - type: text
    content: ary tsy maty jiro mandritra ny alina izy.
  - type: heading
    content: yod י
  '19':
  - type: text
    content: Mandray ny hazo fihazonam-bohavoha izy
  - type: text
    content: ary ny tanany dia mihazona ny ampela.
  - type: heading
    content: kaf כ
  '2':
  - type: text
    content: Ahoana, anaka? Ary ahoana, ry zanako naterako?
  - type: text
    content: Ary ahoana, ry zanaky ny voadiko?
  '20':
  - type: text
    content: Manatsotra ny tanany amin’ny ory izy,
  - type: text
    content: eny, mamelatra ny tanany amin’ny mahantra.
  - type: heading
    content: lamed ל
  '21':
  - type: text
    content: Tsy manahy ny orampanala ho amin’ny ankohonany izy
  - type: text
    content: fa ny ankohonany rehetra dia samy voatafy volon’ondry jaky avokoa.
  - type: heading
    content: mem מ
  '22':
  - type: text
    content: Manao firakotra ho azy izy;
  - type: text
    content: ny fitafiany dia vita amin’ny lamba rongony fotsy madinika sy lamba volomparasy.
  - type: heading
    content: non נ
  '23':
  - type: text
    content: 'Ny lahy dia hajaina eo amin’ny '
  - type: text
    content: vavahady
  - type: text
    content: rehefa miara-mipetraka amin’ny loholona.
  - type: heading
    content: samek ס
  '24':
  - type: text
    content: Manamboatra akanjo hariry madinika Ravehivavy ka mivarotra izany
  - type: text
    content: ary fehikibo no amidiny amin’ny mpivaro-mandeha.
  - type: heading
    content: aìn ע
  '25':
  - type: text
    content: Hery sy voninahitra no fitafiny
  - type: text
    content: ary ny andro ho avy dia ihomehezany.
  - type: heading
    content: pe פ
  '26':
  - type: text
    content: Miteny amin’ny fahendrena izy
  - type: text
    content: ary fampianarana feno hatsaram-panahy no eo am-bavany.
  - type: heading
    content: tsade צ
  '27':
  - type: text
    content: Mitandrina tsara ny ataon’ny ankohonany izy
  - type: text
    content: ary tsy homana ny mofon’ny fahalainana.
  - type: heading
    content: kof ק
  '28':
  - type: text
    content: Ny zanany mitsangana ka midera azy ho sambatra;
  - type: text
    content: 'ny lahy koa mitsangana ka midera azy hoe:'
  - type: heading
    content: resh ר
  '29':
  - type: text
    content: Maro ny zazavavy nanao soa,
  - type: text
    content: fa manoatra noho izy rehetra ianao.
  - type: heading
    content: shin שׁ
  '3':
  - type: text
    content: Aza omena ny vehivavy ny herinao,
  - type: text
    content: ary aza mandeha amin’ny lalana izay mahavery mpanjaka.
  '30':
  - type: text
    content: Fitaka ny hatsaram-bika ary zava-poana ny hatsaran-tarehy,
  - type: text
    content: fa ny vehivavy matahotra NY TOMPO ihany no hoderaina.
  - type: heading
    content: tav ת
  '31':
  - type: text
    content: Omeo azy ny avy amin’ny vokatry ny tanany
  - type: text
    content: ary aoka ny asany hidera azy eo am-bavahady!
  '4':
  - type: text
    content: Tsy mety amin’ny mpanjaka, ry Lemoela,
  - type: text
    content: eny, tsy mety amin’ny mpanjaka ny misotro divay,
  - type: text
    content: na amin’ny mpanapaka ny ho fatra-paniry toaka,
  '5':
  - type: text
    content: fandrao raha misotro izy dia hanadino ny lalàna
  - type: text
    content: ka mamily ny fitsarana ny olona ory.
  '6':
  - type: text
    content: Omeo toaka izay efa ho faty,
  - type: text
    content: eny, divay ho an’izay azon’ny fangidiam-panahy;
  '7':
  - type: text
    content: aoka hisotro izy mba hanadinoany ny fahantrany
  - type: text
    content: ary tsy hahatsiarovany intsony ny fahasahiranany!
  '8':
  - type: text
    content: Sokafy ny vavanao hisolo ny moana
  - type: text
    content: mba hahazoan’izay rehetra resin’ny adim-piainana ny rariny.
  '9':
  - type: text
    content: Sokafy ny vavanao ka mitsarà amin’ny fahamarinana
  - type: text
    content: ary omeo rariny ny ory sy ny mahantra.
  - type: heading
    content: Ny vehivavy mahafatra-po
  - type: heading
    content: alef א
