document_id: 2CH.30,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Niantso ny vahoaka Israely sy Joda mba hitandrina ny Paska i Hezekia
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nandefa iraka tany amin’Israely sy i Joda rehetra i Hezekia ary nanoratra taratasy ho amin’i Efraima sy i Manase koa mba hankanesany any amin’ny tranon’NY TOMPO any Jerosalema hitandrina ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Paska
    - type: text
      text: ' ho an’NY TOMPO, Andriamanitry ny Israely. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nitety ny tanàna hatrany amin’ny tanin’i Efraima sy i Manase ka hatrany amin’i Zebolona ny iraka haingam-pandeha; fa nihomehezan’ny olona sy novazivaziny foana izy. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nisy ihany anefa ny olona avy amin’i Asera sy i Manase ary i Zebolona izay nanetry tena ka tonga tany Jerosalema. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ny tanan’Andriamanitra ihany koa dia niasa tamin’ny Joda mba hanome azy fo iray hankatò ny didin’ny mpanjaka sy ny mpanapaka noho ny tenin’NY TOMPO.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nitandreman’i Hezekia ny Paska
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin’ny volana faharoa dia nisy olona maro nivory tany Jerosalema nitandrina ny andro firavoravoana fihinanana ny mofo tsy misy masirasira, izay tena fivoriana lehibe tokoa. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nitsangana izy ireo dia nandrava ireo alitara tany Jerosalema; ary noravany koa ny alitara fandoroana ditin-kazo manitra rehetra ka nariany tany amin’ny lohasahan-driaka Kidrona. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia namono ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Paska
    - type: text
      text: ' izy tamin’ny andro fahefatra amby folo tamin’ny volana faharoa; ary menatra ny mpisorona sy ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: levita
    - type: text
      text: ' dia nanamasina ny tenany ka nampiditra ny fanatitra dorana manontolo ho ao amin’ny tranon’NY TOMPO. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nitsangana teo amin’ny fitoerany tahaka ny fanao izy, araka ny lalànan’i Mosesy, lehilahin’Andriamanitra; ary ny mpisorona no namafy ny ra izay teny an-tanan’ny levita. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa nisy maro ny tao amin’ny fiangonana no tsy mba nanamasina ny tenany, koa ny levita no nampamonoina ny Paska hisolo izay rehetra tsy madio mba hanamasina azy ho an’NY TOMPO. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa nisy olona betsaka teo ka maro ny avy tamin’i Efraima, i Manase, i Isakara ary i Zebolona, no tsy mba nanadio ny tenany, kanefa nihinana ny Paska ihany izy, fa tsy araka izay voasoratra. Ary nivavaka ho an’ireny i Hezekia hoe: RY TOMPO tsara ô, mamelà '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'izay rehetra efa nampitodika ny fony hitady an’Andriamanitra, dia NY TOMPO, Andriamanitry ny razany, na dia tsy madio araka ny fahadiovan’ny fitoerana masina aza izy. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny mpanjaka sy ny mpanapaka mbamin’ny fiangonana rehetra tany Jerosalema dia niara-nihevitra ny amin’ny hitandremana ny Paska amin’ny volana faharoa. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary NY TOMPO nihaino an’i Hezekia ka nahasitrana ny olona. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nitandrina hafitoana ny andro firavoravoana fihinanana ny mofo tsy misy masirasira tamin’ny fifaliana lehibe ny Zanak’Israely izay tany Jerosalema; ary nidera NY TOMPO isanandro ny levita sy ny mpisorona no sady nampaneno zavatra mafy faneno ho an’NY TOMPO. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary i Hezekia dia nankasitraka ny levita rehetra izay nampiseho fahaizana ho amin’ny raharahan’NY TOMPO; ary nihinana ny Paska nandritra ny hafitoana izy sady nanolotra fanati-pihavanana sy nisaotra NY TOMPO, Andriamanitry ny razany.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary niara-nihevitra ny amin’ny hitandremana hafitoana indray ny fiangonana manontolo avy eo ka mbola nitandrina hafitoana koa tamim-pifaliana, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fa nanome vantotra ombilahy arivo sy ondry aman’osy fito arivo ho an’ny fiangonana i Hezekia, mpanjakan’ny Joda; ny mpanapaka koa dia nanome vantotra ombilahy arivo sy ondry aman’osy iray alina ho an’ny fiangonana; ary maro ny mpisorona no nanamasina ny tenany. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary faly ny fiangonana, dia ny Joda rehetra, ny mpisorona, ny levita sy izay rehetra tafangona avy tamin’ny Israely mbamin’ny vahiny izay avy tany amin’ny tany Israely ary izay nonina tany Joda. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa nisy fifaliana be tany Jerosalema. Hatramin’ny andron’i Solomona, zanak’i Davida, mpanjakan’ny Israely, dia tsy mbola nisy tahaka izany tany Jerosalema. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nitsangana ny levita sy ny mpisorona ka nitsodrano ny olona; ary nohenoin’Andriamanitra ny feony ka niakatra ho any an-danitra, fonenany masina, ny vavaka nataony.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nefa tsy nahatandrina azy izy tamin’izany andro izany, satria vitsy loatra ny mpisorona nanamasina ny tenany, ary ny olona koa dia tsy mbola vory tany Jerosalema. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Sitraky ny mpanjaka sy ny fiangonana manontolo izany, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: dia nanome didy izy handefa teny manerana ny Israely rehetra hatrany Bery-Sheba ka hatrany Dana mba hankanesan’ny olona hitandrina ny Paska ho an’NY TOMPO, Andriamanitry ny Israely, any Jerosalema; fa ny be sy ny maro dia tsy mba nitandrina azy araka ny voasoratra.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia lasa ny iraka haingam-pandeha nitondra ny taratasy avy tamin’ny mpanjaka sy ny mpanapaka hitety ny Israely sy ny Joda rehetra ka nilaza araka ny didin’ny mpanjaka hoe: Ry Zanak’Israely ô! Miverena amin’NY TOMPO, Andriamanitr’i Abrahama sy Isaka ary Israely, mba hiverenany ho amin’izay sisa izay tsy azon’ny tanan’ireo mpanjakan’i Arama aminareo. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aza manahaka ny rainareo sy ny rahalahinareo izay nivadika tamin’NY TOMPO, Andriamanitry ny razany, ka nanolorany azy ho figagana araka izao hitanareo izao. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa aza manamafy ny hatokareo toy ny nataon’ny razanareo fa atolory NY TOMPO ny tananareo ka midira ao amin’ny fitoerany masina izay nohamasininy ho mandrakizay; ary manompoa NY TOMPO Andriamanitrareo mba hiala aminareo ny fahatezerany mirehitra. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa raha miverina amin’NY TOMPO ianareo dia hahazo famindrampo eo anatrehan’izay nitondra ny rahalahinareo sy ny zanakareo ho babo ka ho tafaverina amin’ity tany ity; fa miantra sy mamindra fo NY TOMPO Andriamanitrareo, ary tsy mba hiamboho anareo Izy raha miverina Aminy ianareo.
