document_id: ISA.20,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Tsy mikiraro sady tsy miakanjo
  - type: text
    content: 'Tamin’ny taona nahatongavan’ny lehiben’ny tafika tany Asdoda, raha nirahin’i Sargona mpanjakan’i Asiria izy, dia namely an’i Asdoda izy ka nahazo azy. '
  '2':
  - type: text
    content: 'Tamin’izany andro izany no nampitondran’NY TOMPO teny an’Isaia, zanak’i Amoza hoe: Andeha, borahy ho afaka eny an-tsikinanao ny akanjo fisaonana, ary esory hiala amin’ny tongotrao ny kiraronao. Dia nanatanteraka izany izy ka nandeha tsy nitafy sady tsy nikiraro.'
  '3':
  - type: text
    content: 'Ary hoy NY TOMPO: Tahaka ny nandehanan’Isaia mpanompoko nandritra ny telo taona, sady tsy nitafy no tsy nikiraro mba ho fambara sy ho fahagagana ny amin’i Ejipta sy i Kosy, '
  '4':
  - type: text
    content: 'dia ho toy izany no hitondran’ny mpanjakan’i Asiria ny Ejiptiana ho babo, sy ny Kosita ho sambotra, na tanora na antitra, samy tsy hitafy sady tsy hikiraro no tsy hisarom-pe, ho henatr’i Ejipta. '
  '5':
  - type: text
    content: 'Ary ho raiki-tahotra sy hitsanga-menatra ny Israely noho ny amin’i Kosy fanantenany sy i Ejipta reharehany. '
  '6':
  - type: text
    content: 'Amin’izany andro izany dia hiteny ny mponina etỳ amoron-dranomasina hoe: E, ity manjo ilay nantenaintsika sady nandosirantsika mba hamonjy antsika ho afaka amin’ny mpanjakan’i Asiria! Aiza intsony re no handosirantsika?'
