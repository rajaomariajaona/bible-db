type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Tsy mikiraro sady tsy miakanjo
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Tamin’ny taona nahatongavan’ny lehiben’ny tafika tany Asdoda, raha nirahin’i Sargona mpanjakan’i Asiria izy, dia namely an’i Asdoda izy ka nahazo azy. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Tamin’izany andro izany no nampitondran’NY TOMPO teny an’Isaia, zanak’i Amoza hoe: Andeha, borahy ho afaka eny an-tsikinanao ny akanjo fisaonana, ary esory hiala amin’ny tongotrao ny kiraronao. Dia nanatanteraka izany izy ka nandeha tsy nitafy sady tsy nikiraro.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary hoy NY TOMPO: Tahaka ny nandehanan’Isaia mpanompoko nandritra ny telo taona, sady tsy nitafy no tsy nikiraro mba ho fambara sy ho fahagagana ny amin’i Ejipta sy i Kosy, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'dia ho toy izany no hitondran’ny mpanjakan’i Asiria ny Ejiptiana ho babo, sy ny Kosita ho sambotra, na tanora na antitra, samy tsy hitafy sady tsy hikiraro no tsy hisarom-pe, ho henatr’i Ejipta. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary ho raiki-tahotra sy hitsanga-menatra ny Israely noho ny amin’i Kosy fanantenany sy i Ejipta reharehany. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Amin’izany andro izany dia hiteny ny mponina etỳ amoron-dranomasina hoe: E, ity manjo ilay nantenaintsika sady nandosirantsika mba hamonjy antsika ho afaka amin’ny mpanjakan’i Asiria! Aiza intsony re no handosirantsika?'
