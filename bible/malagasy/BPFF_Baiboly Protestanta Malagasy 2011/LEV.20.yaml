document_id: LEV.20,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ireo fanompoam-pivavahana voaheloka
  - type: text
    content: 'Ary NY TOMPO niteny tamin’i Mosesy hoe: '
  '10':
  - type: text
    content: 'Izay lehilahy mijangajanga amin’ny vadin’olona, dia izay mijangajanga amin’ny vadin’ny namany dia hovonoina ho faty, na izy lehilahy nijangajanga izany na ilay vehivavy nijangajangany. '
  '11':
  - type: text
    content: 'Ny olona izay mandry amin’ny vadin-drainy dia efa nandry tamin’izay nandrian’ny rainy; hovonoina tokoa izy roa ary ny ran’izy ireo dia ho aminy ihany. '
  '12':
  - type: text
    content: 'Raha misy lehilahy mandry amin’ny vinantovaviny dia hovonoina ho faty izy roa; efa nanao zavatra izay fady indrindra izy ireo; koa ny rany dia ho aminy ihany. '
  '13':
  - type: text
    content: 'Raha misy lehilahy mandry amin’ny lehilahy tahaka ny fandry amin’ny vehivavy dia efa nanao fahavetavetana izy roa lahy; hovonoina ho faty izy ireo; ny rany dia ho aminy ihany. '
  '14':
  - type: text
    content: 'Raha misy lehilahy nampirafy vehivavy mianaka dia fahavetavetana izany; hodorana amin’ny afo izy telo mba tsy hisy fahavetavetana eo aminareo. '
  '15':
  - type: text
    content: 'Raha misy lehilahy mandry amin’ny biby dia hovonoina ho faty izy; ary ilay biby koa dia hovonoinareo. '
  '16':
  - type: text
    content: Raha misy vehivavy manatona handry amin’ny biby dia hovonoina izy sy ilay biby; hovonoina ho faty izy roa; ny rany dia ho aminy ihany.
  '17':
  - type: text
    content: 'Raha misy lehilahy manambady ny anabaviny na zanakavavin’ny rainy na zanakavavin’ny reniny ka mahita ny fitanjahany ary Ravehivavy koa dia mahita ny fitanjahany dia zava-dratsy izany ka hesorina eo imason’ny fireneny izy roa; fa nandry tamin’ny anabaviny Ralehilahy ka meloka. '
  '18':
  - type: text
    content: 'Raha misy lehilahy mandry amin’ny vehivavy izay mararin’ny fadimbolany ary Ravehivavy nampiseho ny fitanjahany ka nampisokatra ny fandehanan’ny rany dia hesorina tsy ho amin’ny fireneny izy roa. '
  '19':
  - type: text
    content: 'Aza mandry amin’ny rahavavin-dreninao na amin’ny anabavin-drainao; fa mandry amin’ny havany akaiky izay olona manao izany ka ho meloka. '
  '2':
  - type: text
    content: 'Lazao amin’ny Zanak’Israely hoe: Na iza na iza, na amin’ny Zanak’Israely na amin’ny vahiny eo aminy, no manolotra ny zanany ho sorona ho an’i Moloka dia hovonoina ho faty; ny vahoaka eo an-toerana no hitora-bato azy. '
  '20':
  - type: text
    content: 'Raha misy lehilahy mandry amin’ny vadin’ny rahalahin-drainy dia efa nandry tamin’izay nandrian’ny rahalahin-drainy izy; ho meloka izy roa ary ho faty tsy niteraka. '
  '21':
  - type: text
    content: Raha misy lehilahy maka ny vadin’ny rahalahiny dia fahalotoana izany; nandry tamin’izay nandrian’ny rahalahiny izy ka tsy hiteraka izy roa.
  '22':
  - type: text
    content: 'Tandremo ny didiko rehetra sy ny fitsipiko rehetra ka araho mba tsy haloan’ny tany izay itondrako anareo honenanareo ianareo. '
  '23':
  - type: text
    content: 'Aza manaraka ny fanaon’ny firenena izay efa horoahiko eo anoloanareo; fa nahavita izany rehetra izany izy ka halako. '
  '24':
  - type: text
    content: 'Fa efa nolazaiko taminareo hoe: Handova ny taniny ianareo satria Izaho no hanome azy ho lovanareo, dia tany tondra-dronono sy tantely: Izaho no TOMPO Andriamanitrareo izay nanavaka anareo tamin’ny firenena hafa. '
  '25':
  - type: text
    content: 'Avaho ny biby madio sy ny maloto ary ny vorona maloto sy ny madio; aza mametaveta ny fanahinareo amin’ny biby na amin’ny vorona na amin’izay rehetra mandady na mikisaka amin’ny tany izay navahako ka nolazaiko taminareo fa maloto. '
  '26':
  - type: text
    content: Aoka ho masina ho Ahy ianareo, satria masina Aho TOMPO; ary efa navahako tamin’ny firenena hafa ianareo mba ho Ahy.
  '27':
  - type: text
    content: Ary na lehilahy na vehivavy no miantso ny fanahin’ny maty na ny mpanandro dia hovonoina ho faty; hitora-bato azy ny olona ary ny rany dia ho aminy ihany.
  '3':
  - type: text
    content: 'Hifanandrina amin’izany olona izany ny tavako ka hesorina tsy ho amin’ny fireneny izy satria nisy natolony ho an’i Moloka ny zanany mba handotoany ny fitoerako masina sy hanamavoany ny anarako masina. '
  '4':
  - type: text
    content: 'Fa raha mody tsy mahita io olona manolotra ny zanany ho an’i Moloka io ny vahoaka mba tsy hahafaty azy '
  '5':
  - type: text
    content: dia hifanandrina amin’io olona io sy ny ankohonany ny tavako ka haringako tsy ho eo amin’ny fireneny izy mbamin’izay rehetra mijangajanga manaraka azy hijangajanga amin’i Moloka.
  '6':
  - type: text
    content: 'Ny olona izay mivily hanaraka izay mpiantso ny fanahin’ny maty na izay mpanandro ka hijangajanga hanaraka azy dia hifanandrina aminy ny tavako ka hesoriko tsy ho eo amin’ny fireneny izy. '
  '7':
  - type: text
    content: Koa hamasino ny tenanareo ary aoka ho masina ianareo; fa Izaho no TOMPO Andriamanitrareo.
  - type: heading
    content: Ny firaisana ara-nofo voarara
  '8':
  - type: text
    content: 'Tandremo ny didiko ka araho izany: Izaho no TOMPO izay manamasina anareo.'
  '9':
  - type: text
    content: Fa na iza na iza no manozona ny rainy na ny reniny dia hovonoina ho faty; efa nanozona ny rainy na ny reniny izy, koa ny rany dia ho aminy ihany.
