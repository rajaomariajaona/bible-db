document_id: LEV.20
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ireo fanompoam-pivavahana voaheloka
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary NY TOMPO niteny tamin’i Mosesy hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Lazao amin’ny Zanak’Israely hoe: Na iza na iza, na amin’ny Zanak’Israely na amin’ny vahiny eo aminy, no manolotra ny zanany ho sorona ho an’i Moloka dia hovonoina ho faty; ny vahoaka eo an-toerana no hitora-bato azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Hifanandrina amin’izany olona izany ny tavako ka hesorina tsy ho amin’ny fireneny izy satria nisy natolony ho an’i Moloka ny zanany mba handotoany ny fitoerako masina sy hanamavoany ny anarako masina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Fa raha mody tsy mahita io olona manolotra ny zanany ho an’i Moloka io ny vahoaka mba tsy hahafaty azy '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: dia hifanandrina amin’io olona io sy ny ankohonany ny tavako ka haringako tsy ho eo amin’ny fireneny izy mbamin’izay rehetra mijangajanga manaraka azy hijangajanga amin’i Moloka.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ny olona izay mivily hanaraka izay mpiantso ny fanahin’ny maty na izay mpanandro ka hijangajanga hanaraka azy dia hifanandrina aminy ny tavako ka hesoriko tsy ho eo amin’ny fireneny izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Koa hamasino ny tenanareo ary aoka ho masina ianareo; fa Izaho no TOMPO Andriamanitrareo.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny firaisana ara-nofo voarara
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Tandremo ny didiko ka araho izany: Izaho no TOMPO izay manamasina anareo.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Fa na iza na iza no manozona ny rainy na ny reniny dia hovonoina ho faty; efa nanozona ny rainy na ny reniny izy, koa ny rany dia ho aminy ihany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Izay lehilahy mijangajanga amin’ny vadin’olona, dia izay mijangajanga amin’ny vadin’ny namany dia hovonoina ho faty, na izy lehilahy nijangajanga izany na ilay vehivavy nijangajangany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ny olona izay mandry amin’ny vadin-drainy dia efa nandry tamin’izay nandrian’ny rainy; hovonoina tokoa izy roa ary ny ran’izy ireo dia ho aminy ihany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Raha misy lehilahy mandry amin’ny vinantovaviny dia hovonoina ho faty izy roa; efa nanao zavatra izay fady indrindra izy ireo; koa ny rany dia ho aminy ihany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Raha misy lehilahy mandry amin’ny lehilahy tahaka ny fandry amin’ny vehivavy dia efa nanao fahavetavetana izy roa lahy; hovonoina ho faty izy ireo; ny rany dia ho aminy ihany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Raha misy lehilahy nampirafy vehivavy mianaka dia fahavetavetana izany; hodorana amin’ny afo izy telo mba tsy hisy fahavetavetana eo aminareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Raha misy lehilahy mandry amin’ny biby dia hovonoina ho faty izy; ary ilay biby koa dia hovonoinareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Raha misy vehivavy manatona handry amin’ny biby dia hovonoina izy sy ilay biby; hovonoina ho faty izy roa; ny rany dia ho aminy ihany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Raha misy lehilahy manambady ny anabaviny na zanakavavin’ny rainy na zanakavavin’ny reniny ka mahita ny fitanjahany ary Ravehivavy koa dia mahita ny fitanjahany dia zava-dratsy izany ka hesorina eo imason’ny fireneny izy roa; fa nandry tamin’ny anabaviny Ralehilahy ka meloka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Raha misy lehilahy mandry amin’ny vehivavy izay mararin’ny fadimbolany ary Ravehivavy nampiseho ny fitanjahany ka nampisokatra ny fandehanan’ny rany dia hesorina tsy ho amin’ny fireneny izy roa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Aza mandry amin’ny rahavavin-dreninao na amin’ny anabavin-drainao; fa mandry amin’ny havany akaiky izay olona manao izany ka ho meloka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Raha misy lehilahy mandry amin’ny vadin’ny rahalahin-drainy dia efa nandry tamin’izay nandrian’ny rahalahin-drainy izy; ho meloka izy roa ary ho faty tsy niteraka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Raha misy lehilahy maka ny vadin’ny rahalahiny dia fahalotoana izany; nandry tamin’izay nandrian’ny rahalahiny izy ka tsy hiteraka izy roa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Tandremo ny didiko rehetra sy ny fitsipiko rehetra ka araho mba tsy haloan’ny tany izay itondrako anareo honenanareo ianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Aza manaraka ny fanaon’ny firenena izay efa horoahiko eo anoloanareo; fa nahavita izany rehetra izany izy ka halako. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Fa efa nolazaiko taminareo hoe: Handova ny taniny ianareo satria Izaho no hanome azy ho lovanareo, dia tany tondra-dronono sy tantely: Izaho no TOMPO Andriamanitrareo izay nanavaka anareo tamin’ny firenena hafa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Avaho ny biby madio sy ny maloto ary ny vorona maloto sy ny madio; aza mametaveta ny fanahinareo amin’ny biby na amin’ny vorona na amin’izay rehetra mandady na mikisaka amin’ny tany izay navahako ka nolazaiko taminareo fa maloto. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Aoka ho masina ho Ahy ianareo, satria masina Aho TOMPO; ary efa navahako tamin’ny firenena hafa ianareo mba ho Ahy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Ary na lehilahy na vehivavy no miantso ny fanahin’ny maty na ny mpanandro dia hovonoina ho faty; hitora-bato azy ny olona ary ny rany dia ho aminy ihany.
