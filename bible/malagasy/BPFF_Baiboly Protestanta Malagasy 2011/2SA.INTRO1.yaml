verses:
  '1':
  - type: text
    content: INDRAY MIJERY
  - type: text
    content: Ny votoatin’ny Boky
  - type: text
    content: Ny Boky dia tohin’ny 1Samoela ihany ary mitantara ny fanjakan’i Davida, izay mpanjaka nalaza indrindra tamin’ny Israely manontolo; manomboka amin’ny hira fisaonana nataon’i Davida noho ny nahafatesan’i Saoly sy i Jonatana; avy eo dia milaza ny nanjakan’i Davida tamin’ny fokon’i Joda. Nanjaka roa taona tany amin’ireo foko tany Avaratra Isboseta zanak’i Saoly, fa rehefa maty io dia nanaraka an’i Davida koa ireo foko ireo ka tonga mpanjakan’ny foko roa amby folo tamin’ny Israely izy.
  - type: text
    content: Ny mpanoratra dia maneho tokoa ny hery sy lazan’i Davida, kanefa tsy afeniny koa ny fahalemeny ka ambarany ireo zava-nitranga nampalahelo izay nanamaloka ny fiainam-pianakaviany. Amin’izany i Davida dia hita ho olombelona nofo aman-dra, fa ny tena fahalehibiazan’i Davida dia izy nahalala niaiky ny fahotany ka nangataka famelan-keloka tamin’Andriamanitra.
  - type: text
    content: Atỳ aoriana, rehefa mandroso ny tantaran’ny Zanak’Israely, dia i Davida no aseho ho filamatry ny Mesia na ny mpanjaka mpamonjy. Tsaroan’ny Israely tokoa ny teny fikasana nataon’i Natana mpaminany, izay nanambara fa hisy mpanjaka handimby azy, ary ny sezafiandrianany dia haharitra mandrakizay. Noho izany indrindra no ilazana an’i Jesosy ho «Ny Zanak’i Davida» ao amin’ny Testamenta Vaovao.
  - type: text
    content: Ny firafitry ny Boky
  - type: text
    content: 'Ny nisaonan’i Davida an’i Saoly sy i Jonatana: 1'
  - type: text
    content: 'Ny nanjakan’i Davida tamin’ny fokon’i Joda: 2–4'
  - type: text
    content: 'Ny nanjakan’i Davida tamin’ny foko roa amby folo: 5–20'
  - type: text
    content: 'Tantara samihafa tamin’ny andron’i Davida, salamo mitovy amin’ny Sal 18, ary ny farateny nataon’i Davida: 21–24'
