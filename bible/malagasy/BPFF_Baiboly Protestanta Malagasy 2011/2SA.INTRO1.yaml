verses:
  '1':
  - type: usfm
    marker: imt1
    children:
    - type: text
      text: INDRAY MIJERY
  - type: usfm
    marker: is1
    children:
    - type: text
      text: Ny votoatin’ny Boky
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Ny Boky dia tohin’ny 1Samoela ihany ary mitantara ny fanjakan’i Davida, izay mpanjaka nalaza indrindra tamin’ny Israely manontolo; manomboka amin’ny hira fisaonana nataon’i Davida noho ny nahafatesan’i Saoly sy i Jonatana; avy eo dia milaza ny nanjakan’i Davida tamin’ny fokon’i Joda. Nanjaka roa taona tany amin’ireo foko tany Avaratra Isboseta zanak’i Saoly, fa rehefa maty io dia nanaraka an’i Davida koa ireo foko ireo ka tonga mpanjakan’ny foko roa amby folo tamin’ny Israely izy.
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Ny mpanoratra dia maneho tokoa ny hery sy lazan’i Davida, kanefa tsy afeniny koa ny fahalemeny ka ambarany ireo zava-nitranga nampalahelo izay nanamaloka ny fiainam-pianakaviany. Amin’izany i Davida dia hita ho olombelona nofo aman-dra, fa ny tena fahalehibiazan’i Davida dia izy nahalala niaiky ny fahotany ka nangataka famelan-keloka tamin’Andriamanitra.
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Atỳ aoriana, rehefa mandroso ny tantaran’ny Zanak’Israely, dia i Davida no aseho ho filamatry ny Mesia na ny mpanjaka mpamonjy. Tsaroan’ny Israely tokoa ny teny fikasana nataon’i Natana mpaminany, izay nanambara fa hisy mpanjaka handimby azy, ary ny sezafiandrianany dia haharitra mandrakizay. Noho izany indrindra no ilazana an’i Jesosy ho «Ny Zanak’i Davida» ao amin’ny Testamenta Vaovao.
  - type: usfm
    marker: iot
    children:
    - type: text
      text: Ny firafitry ny Boky
  - type: usfm
    marker: io1
    children:
    - type: text
      text: 'Ny nisaonan’i Davida an’i Saoly sy i Jonatana: 1'
  - type: usfm
    marker: io1
    children:
    - type: text
      text: 'Ny nanjakan’i Davida tamin’ny fokon’i Joda: 2–4'
  - type: usfm
    marker: io1
    children:
    - type: text
      text: 'Ny nanjakan’i Davida tamin’ny foko roa amby folo: 5–20'
  - type: usfm
    marker: io1
    children:
    - type: text
      text: 'Tantara samihafa tamin’ny andron’i Davida, salamo mitovy amin’ny Sal 18, ary ny farateny nataon’i Davida: 21–24'
