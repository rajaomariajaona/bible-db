document_id: DEU.13,3103
type_code: plt
verses:
  '1':
  - type: text
    content: Izay rehetra andidiako anareo dia tandremo ka araho; aza ampianao na anesoranao ireny.
  - type: heading
    content: Fanoherana ireo izay mivavaka amin’ny sampy
  '10':
  - type: text
    content: 'fa vonoy ho faty izy; ny tananao no hamono azy voalohany, izay vao ny tanan’ny vahoaka rehetra. '
  '11':
  - type: text
    content: 'Torahy vato izy ho faty, satria efa nitady hitaona anao hiala amin’NY TOMPO Andriamanitrao izay nitondra anao niala avy tany amin’ny tany Ejipta, tamin’ny trano nanandevozana. '
  '12':
  - type: text
    content: Ary handre izany ny Israely rehetra dia hatahotra ka tsy hanao ratsy eo aminao toy izany intsony.
  '13':
  - type: text
    content: 'Raha mandre teny ny amin’ny tanànanao iray izay nomen’NY TOMPO Andriamanitrao honenanao ianao hoe: '
  '14':
  - type: text
    content: 'Nisy olona tena ratsy fanahy avy teo aminao ka nitaona ny mponina tao an-tanànany hoe: Andeha isika hanompo andriamanitra hafa izay tsy fantatrareo, '
  '15':
  - type: text
    content: 'dia hadihadio sy fotory ary adino tsara. Koa raha fantatra fa nisy marina tokoa izany zavatra izany ka natao teo aminao izany fahavetavetana izany '
  '16':
  - type: text
    content: 'dia asio amin’ny lelan-tsabatra mihitsy ny mponina amin’io tanàna io ka ataovy ho zavatra voaozona ny tanàna sy izay rehetra eo aminy, ary ny biby fiompy dia aringano amin’ny lelan-tsabatra ihany koa. '
  '17':
  - type: text
    content: 'Ary angony eo afovoan’ny kianja ny entana nobaboina rehetra ka doroy amin’ny afo ho an’NY TOMPO Andriamanitrao avokoa ny tanàna sy ny entana rehetra tao, ary aoka ho tanàna haolo mandrakizay izany tanàna izany ka tsy haorina intsony. '
  '18':
  - type: text
    content: 'Dia aoka tsy hisy hiraikitra amin’ny tananao akory ny zavatra efa natolotra ho zavatra voaozona, mba hitsaharan’NY TOMPO amin’ny fahatezerany mirehitra ka hamindrany fo aminao sy hiantrany anao, ary hanamaroany anao araka izay nianianany tamin’ny razanao, '
  '19':
  - type: text
    content: raha henoinao ny feon’NY TOMPO Andriamanitrao ka tandremanao ny didiny rehetra izay omeko anao anio, mba hanaovanao izay mahitsy eo imason’NY TOMPO Andriamanitrao.
  '2':
  - type: text
    content: 'Raha toa ka misy mpaminany na mpanonofy mitsangana eo aminareo izay milaza famantarana na fahagagana aminao '
  '3':
  - type: text
    content: 'sady miteny hoe: Andeha isika hanaraka andriamanitra hafa izay tsy fantatrao ka aoka hanompo azy isika; na dia tanteraka aza ny famantarana na fahagagana izay nolazainy taminao '
  '4':
  - type: text
    content: 'dia aza mihaino ny tenin’izany mpaminany na mpanonofy izany; fa mizaha toetra anareo NY TOMPO Andriamanitrareo, hahalalany na miorina amin’ny fitiavana NY TOMPO Andriamanitrareo amin’ny fonareo manontolo sy ny fanahinareo manontolo ianareo na tsia. '
  '5':
  - type: text
    content: 'Manaraha NY TOMPO Andriamanitrareo ka aoka Izy no hatahoranareo, ny didiny no hotandremanareo, ny feony no hohenoinareo ary aoka Izy no hotompoinareo sy hifikiranareo. '
  '6':
  - type: text
    content: Fa izany mpaminany na mpanonofy izany dia hovonoina ho faty satria efa nanao teny fampikomiana amin’NY TOMPO Andriamanitrareo izay nitondra anareo niala avy tany amin’ny tany Ejipta ka nanavotra anao tamin’ny trano nanandevozana, mba hitaona anao hiala amin’ny lalana izay nasain’NY TOMPO Andriamanitrao halehanao. Dia hofongoranao tsy ho eo aminao ny fanao ratsy.
  '7':
  - type: text
    content: 'Raha mitaona anao mangingina ny rahalahinao, zanaky ny reninao, na ny zanakao lahy, na ny zanakao vavy, na ny vady andefimandrinao, na ny namanao izay toy ny tenanao, ka miteny hoe: Andeha isika hanompo andriamanitra hafa izay tsy fantatrao, na ny razanao, '
  '8':
  - type: text
    content: 'dia ny andriamanitry ny firenena izay manodidina anareo, na ny akaiky anao na ny lavitra anao, hatramin’ny faran’ny tany rehetra, '
  '9':
  - type: text
    content: 'dia aza manaiky na mihaino azy akory ianao; ary aza mba iantran’ny masonao izy, na amindranao fo na afeninao; '
