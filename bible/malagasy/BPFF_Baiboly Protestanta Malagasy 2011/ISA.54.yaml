document_id: ISA.54,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Jerosalema, vadin’NY TOMPO
  - type: text
    content: Mihobia ianao, ry momba,
  - type: text
    content: izay tsy niteraka!
  - type: text
    content: Eny, velomy ny hoby ka manandrata feo,
  - type: text
    content: ianao izay tsy mba nihetsi-jaza!
  - type: text
    content: Fa ny zanaky ny mpitondratena dia maro
  - type: text
    content: noho ny zanaky ny manambady,
  - type: text
    content: hoy NY TOMPO.
  '10':
  - type: text
    content: Fa na dia hifindra aza ny tendrombohitra
  - type: text
    content: ary na dia hihetsika aza ny havoana,
  - type: text
    content: tsy mba hiala aminao ny famindrampoko,
  - type: text
    content: ary tsy hitsoaka ny faneken’ny fihavanako,
  - type: text
    content: hoy NY TOMPO, Mpamindra fo aminao.
  - type: heading
    content: Jerosalema amin’ny ho avy
  '11':
  - type: text
    content: Ianao ry ory izay asafotofoton’ny tafio-drivotra
  - type: text
    content: sady tsy manana fampiononana!
  - type: text
    content: Indro Aho hahatonga ny vatonao hiloko fotsy manopy manga
  - type: text
    content: sy hametraka ny fanorenanao amin’ny safira,
  '12':
  - type: text
    content: hataoko robisy ny tilikambo fiambenanao,
  - type: text
    content: vato berila ny vavahadinao,
  - type: text
    content: ary vatosoa ny faritry ny taninao manodidina.
  '13':
  - type: text
    content: Ny zanakao rehetra dia ho samy efa nampianarin’NY TOMPO
  - type: text
    content: ka ho be ny fiadanan’ny zanakao.
  '14':
  - type: text
    content: Amin’ny fahamarinana no hampiorenana anao;
  - type: text
    content: manalavira ny fampahoriana,
  - type: text
    content: fa tsy hatahotra ianao,
  - type: text
    content: ary ny fampihorohoroana
  - type: text
    content: tsy hanakaiky anao intsony.
  '15':
  - type: text
    content: Na dia misy miara-mioko hamely anao aza
  - type: text
    content: dia tsy avy Amiko izany;
  - type: text
    content: ary na iza na iza miara-mioko hamely anao
  - type: text
    content: dia ho lavo noho ny aminao kosa.
  '16':
  - type: text
    content: Indro Izaho no nahary ny mpanefy
  - type: text
    content: izay mifofotra ny vainafon’arina
  - type: text
    content: ka mahavita fiadiana araka ny asany;
  - type: text
    content: Izaho koa no nahary
  - type: text
    content: ny mpandringana mba handringana azy.
  '17':
  - type: text
    content: Ny fiadiana rehetra izay voaforona hamelezana anao
  - type: text
    content: dia tsy hisy hambinina;
  - type: text
    content: ary ny lela rehetra izay miady aminao
  - type: text
    content: dia horesenao lahatra.
  - type: text
    content: Izany no lovan’ny mpanompon’NY TOMPO
  - type: text
    content: sy fahamarinany avy Amiko,
  - type: text
    content: hoy NY TOMPO.
  '2':
  - type: text
    content: Halalaho ny itoeran’ny tranolainao
  - type: text
    content: ary aoka hohenjanina ny ambaindainao
  - type: text
    content: ka aza avela hisy hikentrona!
  - type: text
    content: Halavao ny kofehinao
  - type: text
    content: ary aoreno mafy ny tsatokan-dainao!
  '3':
  - type: text
    content: Fa hiitatra any amin’ny ankavanana sy any amin’ny ankavia ianao
  - type: text
    content: ary hahazo firenena hafa ny taranakao
  - type: text
    content: ka hasiany mponina ny tanàna lao.
  '4':
  - type: text
    content: Aza matahotra
  - type: text
    content: fa tsy hitsanga-menatra ianao;
  - type: text
    content: ary aza mangaihay
  - type: text
    content: fa tsy havela ho afa-baraka ianao;
  - type: text
    content: fa ho hadinonao ny henatry ny fahatanoranao
  - type: text
    content: ary tsy ho tsaroanao intsony
  - type: text
    content: ny tondro-masonao fony mpitondratena.
  '5':
  - type: text
    content: Fa ny Mpanao anao no Vadinao,
  - type: text
    content: Andriamanitra, Tompon’izao rehetra izao, no anarany.
  - type: text
    content: Ny Iray Masin’ny Israely no Mpanavotra anao.
  - type: text
    content: Andriamanitry ny tany rehetra no anarany.
  '6':
  - type: text
    content: Fa NY TOMPO efa nampody anao,
  - type: text
    content: dia ianao izay tahaka ny vady efa nafoy
  - type: text
    content: ka ory am-panahy.
  - type: text
    content: Vadin’ny fahatanorana va dia azo apetraka?
  - type: text
    content: hoy Andriamanitrao.
  '7':
  - type: text
    content: Indray mipy maso monja
  - type: text
    content: no nahafoizako anao,
  - type: text
    content: fa amin’ny indrafo lehibe kosa
  - type: text
    content: no ampodiako anao;
  '8':
  - type: text
    content: tamin’ny firehetan’ny fahatezerako
  - type: text
    content: no nanafenako ny tavako taminao indray mipy maso monja,
  - type: text
    content: fa amin’ny famindrampo mandrakizay kosa
  - type: text
    content: no amindrako fo aminao,
  - type: text
    content: hoy NY TOMPO, Mpanavotra anao.
  '9':
  - type: text
    content: Fa Amiko izany dia tahaka ilay ranon’i Noa,
  - type: text
    content: koa tahaka ny nianianako
  - type: text
    content: fa tsy hanafotra ny tany intsony ilay ranon’i Noa
  - type: text
    content: dia toy izany no ianianako
  - type: text
    content: fa tsy ho tezitra aminao
  - type: text
    content: na hiteny mafy anao intsony Aho.
