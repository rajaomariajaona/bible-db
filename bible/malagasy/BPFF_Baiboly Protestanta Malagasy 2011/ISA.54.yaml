document_id: ISA.54,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jerosalema, vadin’NY TOMPO
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mihobia ianao, ry momba,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay tsy niteraka!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, velomy ny hoby ka manandrata feo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ianao izay tsy mba nihetsi-jaza!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny zanaky ny mpitondratena dia maro
  - type: usfm
    marker: q1
    children:
    - type: text
      text: noho ny zanaky ny manambady,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy NY TOMPO.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa na dia hifindra aza ny tendrombohitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary na dia hihetsika aza ny havoana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy mba hiala aminao ny famindrampoko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy hitsoaka ny faneken’ny fihavanako,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy NY TOMPO, Mpamindra fo aminao.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jerosalema amin’ny ho avy
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ianao ry ory izay asafotofoton’ny tafio-drivotra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady tsy manana fampiononana!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro Aho hahatonga ny vatonao hiloko fotsy manopy manga
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy hametraka ny fanorenanao amin’ny safira,
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hataoko robisy ny tilikambo fiambenanao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vato berila ny vavahadinao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary vatosoa ny faritry ny taninao manodidina.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny zanakao rehetra dia ho samy efa nampianarin’NY TOMPO
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka ho be ny fiadanan’ny zanakao.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Amin’ny fahamarinana no hampiorenana anao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: manalavira ny fampahoriana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa tsy hatahotra ianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny fampihorohoroana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy hanakaiky anao intsony.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na dia misy miara-mioko hamely anao aza
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia tsy avy Amiko izany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary na iza na iza miara-mioko hamely anao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ho lavo noho ny aminao kosa.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro Izaho no nahary ny mpanefy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay mifofotra ny vainafon’arina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka mahavita fiadiana araka ny asany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izaho koa no nahary
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny mpandringana mba handringana azy.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fiadiana rehetra izay voaforona hamelezana anao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia tsy hisy hambinina;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny lela rehetra izay miady aminao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia horesenao lahatra.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izany no lovan’ny mpanompon’NY TOMPO
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy fahamarinany avy Amiko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy NY TOMPO.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Halalaho ny itoeran’ny tranolainao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary aoka hohenjanina ny ambaindainao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka aza avela hisy hikentrona!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Halavao ny kofehinao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary aoreno mafy ny tsatokan-dainao!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa hiitatra any amin’ny ankavanana sy any amin’ny ankavia ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hahazo firenena hafa ny taranakao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hasiany mponina ny tanàna lao.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aza matahotra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa tsy hitsanga-menatra ianao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary aza mangaihay
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa tsy havela ho afa-baraka ianao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ho hadinonao ny henatry ny fahatanoranao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy ho tsaroanao intsony
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny tondro-masonao fony mpitondratena.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny Mpanao anao no Vadinao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Andriamanitra, Tompon’izao rehetra izao, no anarany.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny Iray Masin’ny Israely no Mpanavotra anao.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Andriamanitry ny tany rehetra no anarany.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa NY TOMPO efa nampody anao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ianao izay tahaka ny vady efa nafoy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka ory am-panahy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vadin’ny fahatanorana va dia azo apetraka?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy Andriamanitrao.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indray mipy maso monja
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no nahafoizako anao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa amin’ny indrafo lehibe kosa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no ampodiako anao;
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tamin’ny firehetan’ny fahatezerako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no nanafenako ny tavako taminao indray mipy maso monja,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa amin’ny famindrampo mandrakizay kosa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no amindrako fo aminao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy NY TOMPO, Mpanavotra anao.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa Amiko izany dia tahaka ilay ranon’i Noa,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: koa tahaka ny nianianako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa tsy hanafotra ny tany intsony ilay ranon’i Noa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia toy izany no ianianako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa tsy ho tezitra aminao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na hiteny mafy anao intsony Aho.
