document_id: JOB.19,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Ny teny navalin’i Joba: Hitsangana ny Mpanavotra ahy amin’ny farany'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Dia namaly i Joba hoe:'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Efa nandrava ahy manodidina Izy ka efa ho faty aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: efa nofongorany tahaka ny hazo ny fanantenako.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Nampirehetiny tamiko ny fahatezerany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka nataony ho fahavalony aho.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Miara-mandroso ny antokon’ny miaramilany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary manandratra tovon-tany hamelezany ahy izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka mitoby manodidina ny tranolaiko.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Ny rahalahiko dia efa nampanalaviriny ahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny olona nahazatra ahy dia mihafahafa amiko avokoa.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Tsy misy eto intsony ny havako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny sakaizako dia efa nanadino ahy.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Ny vahiny izay mitoetra ao an-tranoko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny mpanompovaviko aza dia samy manao ahy ho olon-kafa;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tonga olon-ko azy eo imasony aho.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Antsoiko ny mpanompoko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa tsy namaly ahy izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mifona aminy amin’ny vavako aho.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Ny fofonaiko dia mahaloiloy ny vadiko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary maharikoriko ny zanak’Ineny aho.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Eny, ny ankizilahy madinika aza dia mamingavinga ahy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: raha te hitsangana aho dia miteny mamely ahy ireny.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Na dia izay nifankazatra tamiko indrindra aza dia manao ahy ho zava-betaveta
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary izay olon-tiako dia mivadika ho fahavaloko.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Mandra-pahoviana no hampalahelovanareo ny fanahiko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy hanorotoroanareo ahy amin’ny fiteny?
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Ny taolako dia miraikitra amin’ny hoditro sy ny nofoko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny akanjonifiko ihany no hany sisa azoko enti-mandositra.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Mamindrà fo amiko, mamindrà fo amiko ianareo, ry sakaizako ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa namely ahy ny tanan’Andriamanitra.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Nahoana no manenjika ahy tahaka an’Andriamanitra koa ianareo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy mety afa-po amin’ny nofoko?
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Enga anie ka ho voasoratra ny teniko!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Enga anie ka ho voasokitra ao amin’ny boky ireny!
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Enga anie ka ho voasoratra amin’ny vy fanoratana sady voaisy firaka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eo amin’ny vatolampy ho mandrakizay izy!
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Kanefa raha izaho dia fantatro fa velona ny Mpanavotra ahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hitsangana any am-parany eo ambonin’ny vovoka Izy.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Ary rehefa levona ny hoditro, izao simba izao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady afaka amin’ny nofoko aho, dia hahita an’Andriamanitra;
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: eny, izaho no hahita Azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny masoko no hijery fa tsy olon-kafa.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Efa matim-paniriana ny saiko ato anatiko.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Raha hoy ianareo: Fomba ahoana no hanenjehantsika azy?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia hohitantsika ao anatiny ny fototry ny mahameloka azy.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Dia matahora ny sabatra ianareo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny fahatezerana dia heloka mendrika ny hovalian-tsabatra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba ho fantatrareo fa misy fitsarana.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Efa impolo izay no nanaratsianareo ahy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy menatra ny hampahory ahy ianareo.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Raha diso tokoa aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia izaho ihany no andrian’ny fahadisoako.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Raha mirehareha amiko kosa ianareo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka mampiaiky ahy ho nanao izay mahamenatra
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: dia aoka ho fantatrareo fa Andriamanitra no efa nampitanondrika ahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka efa naningotra ahy tamin’ny fandrika haratony.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Indro, miantso mafy aho hoe: Loza! Nefa tsy misy mamaly ahy;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mitaraina aho, nefa tsy mahita rariny!
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Ny lalako dia nofefeny ka tsy afa-mandroso aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nasiany haizina eo amin’ny lalana alehako.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Ny voninahitro dia nalany tamiko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary nesoriny ny satroboninahitra teo an-dohako.
