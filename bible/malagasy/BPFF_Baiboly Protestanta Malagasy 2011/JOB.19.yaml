document_id: JOB.19,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: 'Ny teny navalin’i Joba: Hitsangana ny Mpanavotra ahy amin’ny farany'
  - type: text
    content: 'Dia namaly i Joba hoe:'
  '10':
  - type: text
    content: Efa nandrava ahy manodidina Izy ka efa ho faty aho;
  - type: text
    content: efa nofongorany tahaka ny hazo ny fanantenako.
  '11':
  - type: text
    content: Nampirehetiny tamiko ny fahatezerany
  - type: text
    content: ka nataony ho fahavalony aho.
  '12':
  - type: text
    content: Miara-mandroso ny antokon’ny miaramilany
  - type: text
    content: ary manandratra tovon-tany hamelezany ahy izy
  - type: text
    content: ka mitoby manodidina ny tranolaiko.
  '13':
  - type: text
    content: Ny rahalahiko dia efa nampanalaviriny ahy
  - type: text
    content: ary ny olona nahazatra ahy dia mihafahafa amiko avokoa.
  '14':
  - type: text
    content: Tsy misy eto intsony ny havako
  - type: text
    content: ary ny sakaizako dia efa nanadino ahy.
  '15':
  - type: text
    content: Ny vahiny izay mitoetra ao an-tranoko
  - type: text
    content: sy ny mpanompovaviko aza dia samy manao ahy ho olon-kafa;
  - type: text
    content: tonga olon-ko azy eo imasony aho.
  '16':
  - type: text
    content: Antsoiko ny mpanompoko
  - type: text
    content: nefa tsy namaly ahy izy;
  - type: text
    content: mifona aminy amin’ny vavako aho.
  '17':
  - type: text
    content: Ny fofonaiko dia mahaloiloy ny vadiko
  - type: text
    content: ary maharikoriko ny zanak’Ineny aho.
  '18':
  - type: text
    content: Eny, ny ankizilahy madinika aza dia mamingavinga ahy;
  - type: text
    content: raha te hitsangana aho dia miteny mamely ahy ireny.
  '19':
  - type: text
    content: Na dia izay nifankazatra tamiko indrindra aza dia manao ahy ho zava-betaveta
  - type: text
    content: ary izay olon-tiako dia mivadika ho fahavaloko.
  '2':
  - type: text
    content: Mandra-pahoviana no hampalahelovanareo ny fanahiko
  - type: text
    content: sy hanorotoroanareo ahy amin’ny fiteny?
  '20':
  - type: text
    content: Ny taolako dia miraikitra amin’ny hoditro sy ny nofoko
  - type: text
    content: ary ny akanjonifiko ihany no hany sisa azoko enti-mandositra.
  '21':
  - type: text
    content: Mamindrà fo amiko, mamindrà fo amiko ianareo, ry sakaizako ô,
  - type: text
    content: fa namely ahy ny tanan’Andriamanitra.
  '22':
  - type: text
    content: Nahoana no manenjika ahy tahaka an’Andriamanitra koa ianareo
  - type: text
    content: ka tsy mety afa-po amin’ny nofoko?
  '23':
  - type: text
    content: Enga anie ka ho voasoratra ny teniko!
  - type: text
    content: Enga anie ka ho voasokitra ao amin’ny boky ireny!
  '24':
  - type: text
    content: Enga anie ka ho voasoratra amin’ny vy fanoratana sady voaisy firaka
  - type: text
    content: eo amin’ny vatolampy ho mandrakizay izy!
  '25':
  - type: text
    content: Kanefa raha izaho dia fantatro fa velona ny Mpanavotra ahy
  - type: text
    content: ka hitsangana any am-parany eo ambonin’ny vovoka Izy.
  '26':
  - type: text
    content: Ary rehefa levona ny hoditro, izao simba izao,
  - type: text
    content: sady afaka amin’ny nofoko aho, dia hahita an’Andriamanitra;
  '27':
  - type: text
    content: eny, izaho no hahita Azy
  - type: text
    content: ary ny masoko no hijery fa tsy olon-kafa.
  - type: text
    content: Efa matim-paniriana ny saiko ato anatiko.
  '28':
  - type: text
    content: 'Raha hoy ianareo: Fomba ahoana no hanenjehantsika azy?'
  - type: text
    content: Dia hohitantsika ao anatiny ny fototry ny mahameloka azy.
  '29':
  - type: text
    content: Dia matahora ny sabatra ianareo;
  - type: text
    content: fa ny fahatezerana dia heloka mendrika ny hovalian-tsabatra
  - type: text
    content: mba ho fantatrareo fa misy fitsarana.
  '3':
  - type: text
    content: Efa impolo izay no nanaratsianareo ahy;
  - type: text
    content: tsy menatra ny hampahory ahy ianareo.
  '4':
  - type: text
    content: Raha diso tokoa aho
  - type: text
    content: dia izaho ihany no andrian’ny fahadisoako.
  '5':
  - type: text
    content: Raha mirehareha amiko kosa ianareo
  - type: text
    content: ka mampiaiky ahy ho nanao izay mahamenatra
  '6':
  - type: text
    content: dia aoka ho fantatrareo fa Andriamanitra no efa nampitanondrika ahy
  - type: text
    content: ka efa naningotra ahy tamin’ny fandrika haratony.
  '7':
  - type: text
    content: 'Indro, miantso mafy aho hoe: Loza! Nefa tsy misy mamaly ahy;'
  - type: text
    content: mitaraina aho, nefa tsy mahita rariny!
  '8':
  - type: text
    content: Ny lalako dia nofefeny ka tsy afa-mandroso aho;
  - type: text
    content: nasiany haizina eo amin’ny lalana alehako.
  '9':
  - type: text
    content: Ny voninahitro dia nalany tamiko
  - type: text
    content: ary nesoriny ny satroboninahitra teo an-dohako.
