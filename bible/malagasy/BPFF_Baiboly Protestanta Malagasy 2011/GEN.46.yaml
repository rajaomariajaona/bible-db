document_id: GEN.46
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mifankahita indray i Jakoba sy i Josefa
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary niainga Israely nitondra izay rehetra nananany ka nankany Bery-Sheba, dia namono zavatra hatao fanatitra ho an’Andriamanitr’Isaka rainy izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary Andriamanitra niteny tamin’Israely tamin’ny fahitana nony alina hoe: Ry Jakoba, ry Jakoba ô! Dia hoy Israely: Inty aho! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dia hoy Izy: Izaho no Andriamanitra, dia Andriamanitry ny rainao. Aza matahotra ny hidina any Ejipta ianao fa hataoko firenena lehibe any ianao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Izaho no hiara-midina aminao ho any Ejipta ary Izaho koa no hitondra anao miakatra indray; ary ny tanan’i Josefa no hanirina ny masonao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia niainga i Jakoba ka niala tao Bery-Sheba. Ary ireo zanak’Israely dia nitondra an’i Jakoba rainy sy ny zanany madinika ary ny vadiny tamin’ny sarety izay nalefan’i Farao hitondrana azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Noentin’izy ireo ny omby aman’ondriny sy ny fananany izay nohariny tany amin’ny tany Kanana. Tonga tany Ejipta i Jakoba sy ny zanany rehetra niaraka taminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ny zanany lahy sy ny zafiny lahy niaraka taminy, ary ny zanany vavy sy ny zafiny vavy; eny, noentiny niaraka taminy ho any Ejipta avokoa ny zanany rehetra.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fianakavian’i Jakoba
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ireto no anaran’ny zanak’Israely izay tonga tany Ejipta, dia Jakoba sy ny zanany lahy:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'I Robena, lahimatoan’i Jakoba. Ny zanakalahin’i Robena dia i Hanoka, i Palo, i Hezrona ary i Karmy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ny zanakalahin’i Simeona dia i Jemoela, i Jamina, i Ohada, i Jakina, i Zohara ary i Saoly, zanakalahin’ny vehivavy Kananita. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ny zanakalahin’i Levy dia i Gersona sy i Kehata ary i Merary. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ny zanakalahin’i Joda dia i Era, i Onana, i Sela, i Fareza ary i Zera. I Era sy i Onana anefa dia maty tany amin’ny tany Kanana. Ny zanakalahin’i Fareza dia i Hezrona sy i Hamola. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ny zanakalahin’Isakara dia i Tola, i Pova, i Joba ary i Simrona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ny zanakalahin’i Zebolona dia i Sereda sy i Elona ary i Jahalela. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ireo no zanakalahin’i Lea izay naterany tamin’i Jakoba tany Padana-Arama, ary i Dina no zanany vavy. Ny isan’ny zanany lahy rehetra mbamin’ny zanany vavy dia telo amby telopolo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ny zanakalahin’i Gada dia i Zifiona, i Hagy, i Sony, i Ezbona, i Ery, i Aroda ary i Arely. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ny zanak’i Asera dia i Jimna, i Jisva, i Jisvy, i Beria ary i Sera, anabavin’ireo. Ny zanakalahin’i Beria dia i Hebera sy i Malkiela. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ireo no zanak’i Zilpa izay nomen’i Labana an’i Lea zanany vavy, ary ireo no naterany tamin’i Jakoba; enina amby folo no isan’izy rehetra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ny zanakalahin’i Rahely, vadin’i Jakoba, dia i Josefa sy i Benjamina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ny zanakalahin’i Asenata, zanakavavin’i Poty-Fera, mpisorona tao Ona, izay naterak’i Josefa tany amin’ny tany Ejipta, dia i Manase sy i Efraima. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ny zanakalahin’i Benjamina dia i Bela, i Bekera, i Asbela, i Gera, i Namàna, i Ehy, i Rosy, i Mopima, i Hopima ary i Arda. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ireo no zanakalahin’i Rahely naterany tamin’i Jakoba. Efatra amby folo no isan’izy rehetra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary ny zanakalahin’i Dana dia i Hosima. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ny zanakalahin’i Naftaly dia i Jaziela, i Gonỳ, i Jezera ary i Silema. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Ireo no zanakalahin’i Bila, izay nomen’i Labana an’i Rahely zanany vavy, ary ireo no naterak’i Jakoba. Fito no isan’izy rehetra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ny isan’izay rehetra nankany Ejipta niaraka tamin’i Jakoba, dia izay naloaky ny kibony, afa-tsy ny vadin’ny zanakalahin’i Jakoba, dia enina amby enimpolo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Ny zanakalahin’i Josefa izay naterany tany Ejipta dia roa lahy. Ny isan’ny terak’i Jakoba rehetra izay tonga tany Ejipta dia fitopolo.
- type: usfm
  marker: s1
  children:
  - type: text
    text: I Jakoba any Ejipta
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ary nirahin’i Jakoba hialoha azy any amin’i Josefa i Joda mba hanoro lalana azy ho any Gosena. Dia tonga tany amin’ny tany Gosena izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ary nampanamboatra ny kalesiny i Josefa dia niakatra hitsena an’Israely rainy tany Gosena. Raha vao hitan’Israely i Josefa dia namihina ny vozony ka nitomany ela teo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ary hoy Israely tamin’i Josefa: Aoka ho faty amin’izay aho, satria efa hitako ny tavanao, fa mbola velona ihany ianao! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ary hoy i Josefa tamin’ny rahalahiny sy ny ankohonan’ny rainy: Hiakatra aho hilaza amin’i Farao ka hiteny aminy hoe: Ny rahalahiko sy ny ankohonan’ny raiko, izay tany amin’ny tany Kanana, dia tonga atỳ amiko. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Mpiandry ondry ireo lehilahy ireo, mpiompy omby aman’ondry izy ireo. Noentiny avokoa ny ondry aman’osiny sy ny ombiny mbamin’izay rehetra ananany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Koa raha miantso anareo i Farao ka miteny hoe: Inona no raharaha fanaonareo, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'dia valio hoe: Miompy omby aman’ondry no raharaha fanaon’ny mpanomponao. Hatry ny fony vao zaza ka mandraka ankehitriny, dia izahay sy ny razanay. Amin’izay dia hahazo honina ao amin’ny tany Gosena ianareo satria zava-maharikoriko amin’ny Ejiptiana ny mpiandry ondry rehetra.'
