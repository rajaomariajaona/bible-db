document_id: NUM.17
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fitondrana afon’ny tarik’i Kora
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Hoy NY TOMPO tamin’i Mosesy: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Mitenena amin’i Eleazara, zanak’i Arona mpisorona, mba hesorina teo amin’ny afo ireo fitondrana afo ary aelezo lavitra ny afo fa masina ireny. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary ny fitondrana afon’ireo mpanota nanimba tena ireo dia anefeo takelaka manify hapetaka amin’ny alitara, fa natolony teo anatrehan’NY TOMPO ireny ka tonga masina sady ho famantarana ho an’ny Zanak’Israely koa ireny. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary nalain’i Eleazara mpisorona ireo fitondrana afo varahina izay nanoloran’ireo olona may ireo ka nofisahiny ho takelaka hapetaka amin’ny alitara '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ho fahatsiarovana ho an’ny Zanak’Israely mba tsy hisy olon-kafa, afa-tsy ny taranak’i Arona ihany, no hahazo manakaiky handoro ditin-kazo manitra eo anatrehan’NY TOMPO, fandrao ho tonga tahaka an’i Kora sy ireo antokony izy, araka ny tenin’NY TOMPO izay nampitondrainy an’i Mosesy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mimonomonona amin’i Mosesy sy i Arona ny vahoaka
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Nony ampitso dia nimonomonona tamin’i Mosesy sy i Arona ny fiangonana, dia ny Zanak’Israely manontolo, ka niteny hoe: Ianareo no nahafaty ny olon’NY TOMPO! '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary raha niangona nanohitra an’i Mosesy sy i Arona ny fiangonana dia nitodika nijery ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tranolay fihaonana
  - type: text
    text: ' izy roa lahy ka indro, nanarona azy ny rahona ary niseho ny voninahitry NY TOMPO. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dia nankeo anoloan’ny tranolay fihaonana i Mosesy sy i Arona. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary NY TOMPO niteny tamin’i Mosesy hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Mialà amin’io fiangonana io handringanako azy amin’ny indray mipy maso monja! Dia niankohoka tamin’ny tany izy roa lahy. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Hoy i Mosesy tamin’i Arona: Alao ny fitondrana afo dia asio afo avy eo amin’ny alitara izany ary asio ditin-kazo manitra ka ento haingana eo amin’ny fiangonana ary manaova fanavotana ho azy; fa efa mivoaka avy amin’NY TOMPO ny fahatezerana ary efa miantomboka ny areti-mandringana. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Dia nalain’i Arona araka izay nandidian’i Mosesy izany ka nihazakazaka ho eo afovoan’ny fiangonana izy; ary indro, efa niantomboka teo amin’ny olona ny areti-mandringana. Dia nandoro ny ditin-kazo manitra teo izy ka nanao fanavotana ho an’ny olona. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dia nijanona teo anelanelan’ny maty sy ny velona izy ka nitsahatra ny areti-mandringana. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary izay efa matin’ny areti-mandringana dia fitonjato sy efatra arivo sy iray alina, afa-tsy izay efa maty noho ny amin’i Kora. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ary niverina ho eo amin’i Mosesy teo anoloan’ny varavaran’ny tranolay fihaonana i Arona, dia nitsahatra ny areti-mandringana.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny tehin’i Arona
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary NY TOMPO niteny tamin’i Mosesy indray hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Mitenena amin’ny Zanak’Israely ka analao tehina iray avy araka ny fokony izy, koa ny lehiben’ny fokony rehetra araka ny fianakaviany avy no hanalana azy, dia tehina roa amby folo. Samy soraty eo amin’ny tehiny avy ny anaran’izy rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Fa ny anaran’i Arona no hosoratanao amin’ny tehin’i Levy; fa tehina iray avy no ho an’ny lohan’ny fianakaviany. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Dia hataonao ao amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tranolay fihaonana
  - type: text
    text: ' ireo, eo anoloan’ny Vavolombelona, izay ihaonako aminareo. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ary ny tehin’ny lehilahy izay hofidiko dia hitsimoka ka hampanginiko ny fimonomononan’ny Zanak’Israely Amiko, izay imonomononany aminareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary niteny tamin’ny Zanak’Israely i Mosesy ka samy nanatitra tehina iray avy teo aminy araka ny fianakaviany ary ny lohan’ny fokony, dia tehina roa amby folo; ary ny tehin’i Arona no teo afovoan’ireo tehiny ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Dia napetrak’i Mosesy teo anatrehan’NY TOMPO, tao amin’ny tranolain’ny Vavolombelona, ireo tehina ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Nony ampitso dia niditra tao amin’ny tranolain’ny Vavolombelona i Mosesy ary indro, nitsimoka tokoa ny tehin’i Arona, izay ho an’ny taranak’i Levy, dia nanaroka sy namony ka namoa amanda masaka. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Dia noentin’i Mosesy niala eo anatrehan’NY TOMPO ny tehina rehetra, ho eo amin’ny Zanak’Israely rehetra ka nijery izy ireo ary samy nandray ny tehiny avy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Dia hoy NY TOMPO tamin’i Mosesy: Avereno ho eo anoloan’ny Vavolombelona ny tehin’i Arona, hotahirizina mba ho famantarana ho an’ireo taranaka mpikomy, dia hatsahatrao hiala Amiko ny fimonomononany mba tsy hahafaty azy ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Dia notanterahin’i Mosesy izany; araka izay nandidian’NY TOMPO azy no nataony.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Dia niteny tamin’i Mosesy ny Zanak’Israely hoe: Indro, maty izahay, ringana izahay; eny, ringana avokoa izahay rehetra! '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Ho faty izay rehetra manakaiky, dia izay manakaiky ny tabernakelin’NY TOMPO! Ho tapitra maty va izahay?
