document_id: NUM.17,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fitondrana afon’ny tarik’i Kora
  - type: text
    content: 'Hoy NY TOMPO tamin’i Mosesy: '
  '10':
  - type: text
    content: 'Mialà amin’io fiangonana io handringanako azy amin’ny indray mipy maso monja! Dia niankohoka tamin’ny tany izy roa lahy. '
  '11':
  - type: text
    content: 'Hoy i Mosesy tamin’i Arona: Alao ny fitondrana afo dia asio afo avy eo amin’ny alitara izany ary asio ditin-kazo manitra ka ento haingana eo amin’ny fiangonana ary manaova fanavotana ho azy; fa efa mivoaka avy amin’NY TOMPO ny fahatezerana ary efa miantomboka ny areti-mandringana. '
  '12':
  - type: text
    content: 'Dia nalain’i Arona araka izay nandidian’i Mosesy izany ka nihazakazaka ho eo afovoan’ny fiangonana izy; ary indro, efa niantomboka teo amin’ny olona ny areti-mandringana. Dia nandoro ny ditin-kazo manitra teo izy ka nanao fanavotana ho an’ny olona. '
  '13':
  - type: text
    content: 'Dia nijanona teo anelanelan’ny maty sy ny velona izy ka nitsahatra ny areti-mandringana. '
  '14':
  - type: text
    content: 'Ary izay efa matin’ny areti-mandringana dia fitonjato sy efatra arivo sy iray alina, afa-tsy izay efa maty noho ny amin’i Kora. '
  '15':
  - type: text
    content: Ary niverina ho eo amin’i Mosesy teo anoloan’ny varavaran’ny tranolay fihaonana i Arona, dia nitsahatra ny areti-mandringana.
  - type: heading
    content: Ny tehin’i Arona
  '16':
  - type: text
    content: 'Ary NY TOMPO niteny tamin’i Mosesy indray hoe: '
  '17':
  - type: text
    content: 'Mitenena amin’ny Zanak’Israely ka analao tehina iray avy araka ny fokony izy, koa ny lehiben’ny fokony rehetra araka ny fianakaviany avy no hanalana azy, dia tehina roa amby folo. Samy soraty eo amin’ny tehiny avy ny anaran’izy rehetra. '
  '18':
  - type: text
    content: 'Fa ny anaran’i Arona no hosoratanao amin’ny tehin’i Levy; fa tehina iray avy no ho an’ny lohan’ny fianakaviany. '
  '19':
  - type: text
    content: 'Dia hataonao ao amin’ny '
  - type: text
    content: tranolay fihaonana
  - type: text
    content: ' ireo, eo anoloan’ny Vavolombelona, izay ihaonako aminareo. '
  '2':
  - type: text
    content: 'Mitenena amin’i Eleazara, zanak’i Arona mpisorona, mba hesorina teo amin’ny afo ireo fitondrana afo ary aelezo lavitra ny afo fa masina ireny. '
  '20':
  - type: text
    content: Ary ny tehin’ny lehilahy izay hofidiko dia hitsimoka ka hampanginiko ny fimonomononan’ny Zanak’Israely Amiko, izay imonomononany aminareo.
  '21':
  - type: text
    content: 'Ary niteny tamin’ny Zanak’Israely i Mosesy ka samy nanatitra tehina iray avy teo aminy araka ny fianakaviany ary ny lohan’ny fokony, dia tehina roa amby folo; ary ny tehin’i Arona no teo afovoan’ireo tehiny ireo. '
  '22':
  - type: text
    content: 'Dia napetrak’i Mosesy teo anatrehan’NY TOMPO, tao amin’ny tranolain’ny Vavolombelona, ireo tehina ireo. '
  '23':
  - type: text
    content: 'Nony ampitso dia niditra tao amin’ny tranolain’ny Vavolombelona i Mosesy ary indro, nitsimoka tokoa ny tehin’i Arona, izay ho an’ny taranak’i Levy, dia nanaroka sy namony ka namoa amanda masaka. '
  '24':
  - type: text
    content: Dia noentin’i Mosesy niala eo anatrehan’NY TOMPO ny tehina rehetra, ho eo amin’ny Zanak’Israely rehetra ka nijery izy ireo ary samy nandray ny tehiny avy.
  '25':
  - type: text
    content: 'Dia hoy NY TOMPO tamin’i Mosesy: Avereno ho eo anoloan’ny Vavolombelona ny tehin’i Arona, hotahirizina mba ho famantarana ho an’ireo taranaka mpikomy, dia hatsahatrao hiala Amiko ny fimonomononany mba tsy hahafaty azy ireo. '
  '26':
  - type: text
    content: Dia notanterahin’i Mosesy izany; araka izay nandidian’NY TOMPO azy no nataony.
  '27':
  - type: text
    content: 'Dia niteny tamin’i Mosesy ny Zanak’Israely hoe: Indro, maty izahay, ringana izahay; eny, ringana avokoa izahay rehetra! '
  '28':
  - type: text
    content: Ho faty izay rehetra manakaiky, dia izay manakaiky ny tabernakelin’NY TOMPO! Ho tapitra maty va izahay?
  '3':
  - type: text
    content: 'Ary ny fitondrana afon’ireo mpanota nanimba tena ireo dia anefeo takelaka manify hapetaka amin’ny alitara, fa natolony teo anatrehan’NY TOMPO ireny ka tonga masina sady ho famantarana ho an’ny Zanak’Israely koa ireny. '
  '4':
  - type: text
    content: 'Ary nalain’i Eleazara mpisorona ireo fitondrana afo varahina izay nanoloran’ireo olona may ireo ka nofisahiny ho takelaka hapetaka amin’ny alitara '
  '5':
  - type: text
    content: ho fahatsiarovana ho an’ny Zanak’Israely mba tsy hisy olon-kafa, afa-tsy ny taranak’i Arona ihany, no hahazo manakaiky handoro ditin-kazo manitra eo anatrehan’NY TOMPO, fandrao ho tonga tahaka an’i Kora sy ireo antokony izy, araka ny tenin’NY TOMPO izay nampitondrainy an’i Mosesy.
  - type: heading
    content: Mimonomonona amin’i Mosesy sy i Arona ny vahoaka
  '6':
  - type: text
    content: 'Nony ampitso dia nimonomonona tamin’i Mosesy sy i Arona ny fiangonana, dia ny Zanak’Israely manontolo, ka niteny hoe: Ianareo no nahafaty ny olon’NY TOMPO! '
  '7':
  - type: text
    content: 'Ary raha niangona nanohitra an’i Mosesy sy i Arona ny fiangonana dia nitodika nijery ny '
  - type: text
    content: tranolay fihaonana
  - type: text
    content: ' izy roa lahy ka indro, nanarona azy ny rahona ary niseho ny voninahitry NY TOMPO. '
  '8':
  - type: text
    content: 'Dia nankeo anoloan’ny tranolay fihaonana i Mosesy sy i Arona. '
  '9':
  - type: text
    content: 'Ary NY TOMPO niteny tamin’i Mosesy hoe: '
