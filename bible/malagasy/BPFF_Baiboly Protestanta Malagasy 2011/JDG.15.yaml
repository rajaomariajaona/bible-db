document_id: JDG.15
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny valifaty nataon’i Samsona
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Andro vitsivitsy tatỳ aoriana, tamin’ny taom-pijinjana ny varimbazaha, dia nitondra zanak’osy i Samsona hoentiny mamangy ny vadiny ka hoy izy: Hiditra ao amin’ny vadiko ao an’efitrano aho. Nefa tsy namela azy hiditra ny rafozany, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'fa hoy izy: Noheveriko ho halanao izy ka nomeko ho an’ny namanao. Moa tsy tsara tarehy noho izy va ny zandriny? Miangavy anao aho, aoka izy no halainao ho solony! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Hoy i Samsona taminy: Tsy hanan-tsiny aho izao na dia hanisy ratsy ny Filistina aza. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dia lasa nandeha i Samsona ka nisambotra amboahaolo telonjato; dia naka zavatra hatao fanilo izy ary nampifanendreny tsiroaroa avy ny rambon’ny amboahaolo ka nofehezany fanilo iray teo anelanelan’ny rambony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ary rehefa narehiny ny fanilo dia nalefany ho any amin’ny varin’ny Filistina ireny ka nandoro ny amboara sy ny vary mbola mitsangana ary hatramin’ny voly oliva.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia hoy ny Filistina: Iza no nanao izao? Ary nisy nilaza hoe: I Samsona, vinanton’ilay Timnita satria nomen’ny rafozany ho an’ny sakaizany ny vadiny. Dia niakatra ny Filistina ka nandoro an-dRavehivavy sy ny rainy tamin’ny afo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Hoy i Samsona taminy: Satria izao no fihetsikareo dia hamaly anareo tokoa aho, ka rehefa vita izany vao hitsahatra aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Dia namely azy izy ka nanapotika azy tanteraka ary nahafaty be dia be; dia nidina izy ka nitoetra teo an-tsefatsefak’ilay harambato mitresaka any Etama.
- type: usfm
  marker: s1
  children:
  - type: text
    text: I Samsona sy ny valanoranom-boriky
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary niakatra ny Filistina dia nitoby tany Joda ka niely hatrany Lehy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dia hoy ny lehilahin’i Joda: Nahoana no miakatra hamely anay ianareo? Hoy izy: Hamatotra an’i Samsona no niakaranay mba hanao aminy tahaka izay nataony taminay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Dia nandeha ny lehilahy telo arivo tamin’i Joda nankany amin’ilay tsefatsefaky ny harambato mitresaka any Etama ka niteny tamin’i Samsona hoe: Tsy fantatrao va fa manapaka amintsika ny Filistina? Inona izao nataonao taminay izao? Dia hoy izy taminy: Araka izay nataony tamiko no mba nataoko taminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Hoy kosa izy ireo taminy: Hamatotra anao no nidinanay, mba hatolotray ho eo an-tanan’ny Filistina ianao. Dia hoy i Samsona taminy: Mianiàna amiko ary fa tsy hamely ahy ianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dia niteny taminy izy ireo hoe: Tsia! Fa hamatotra anao fotsiny ihany izahay ka hanolotra anao eo an-tanany; tsy hamono anao tsy akory izahay. Dia namatotra azy tamin’ny mahazaka roa vaovao ireo ka nitondra azy niala tamin’ilay harambato.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Rehefa tonga tany Lehy izy dia nanakora azy ny Filistina. Dia tonga taminy ny Fanahin’NY TOMPO ka tonga tahaka ny kofehy rongony izay nodorana tamin’ny afo ny mahazaka teny amin’ny sandriny ary afaka tamin’ny tanany ny fatorana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary nahita valanoranom-boriky tsy mbola maina izy dia nanainga ny tanany ka naka azy, ary iny no namonoany arivo lahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Dia hoy i Samsona:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tamin’ny valanoranom-boriky,
- type: usfm
  marker: q1
  children:
  - type: text
    text: boriky iray amin’ny boriky maro;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tamin’ny valanoranom-boriky
- type: usfm
  marker: q1
  children:
  - type: text
    text: no nahafatesako arivo lahy.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Rehefa nitsahatra niteny izy dia nariany ilay valanoranom-boriky teny an-tanany. Ary ny anaran’izany tany izany dia natao hoe Ramata-Lehy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary nangetaheta be izy dia nitaraina tamin’NY TOMPO hoe: Ianao no nanome izao famonjena lehibe izao tamin’ny tanan’ny mpanomponao. Ankehitriny, moa ho fatin-ketaheta va aho ka hianjera ho eo an-tanan’ny tsy mifora? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Dia nampitresahin’Andriamanitra ilay lavaka ao amin’ny vato tany Lehy ka niboiboika avy tao ny rano. Rehefa nisotro izy dia nody ny ainy ka velombelona indray izy. Izany no nanaovana ny anarany hoe Eny-Hakore
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Eny-Hakore: '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Ny loharanon’ilay niantso.
    marker-yv: yv-n
  - type: text
    text: ', izay any Lehy mandraka androany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Dia nitsara ny Israely roapolo taona tamin’ny andron’ny Filistina izy.
