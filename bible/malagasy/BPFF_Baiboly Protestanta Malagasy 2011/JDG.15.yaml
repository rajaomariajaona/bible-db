document_id: JDG.15,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny valifaty nataon’i Samsona
  - type: text
    content: 'Andro vitsivitsy tatỳ aoriana, tamin’ny taom-pijinjana ny varimbazaha, dia nitondra zanak’osy i Samsona hoentiny mamangy ny vadiny ka hoy izy: Hiditra ao amin’ny vadiko ao an’efitrano aho. Nefa tsy namela azy hiditra ny rafozany, '
  '10':
  - type: text
    content: 'Dia hoy ny lehilahin’i Joda: Nahoana no miakatra hamely anay ianareo? Hoy izy: Hamatotra an’i Samsona no niakaranay mba hanao aminy tahaka izay nataony taminay. '
  '11':
  - type: text
    content: 'Dia nandeha ny lehilahy telo arivo tamin’i Joda nankany amin’ilay tsefatsefaky ny harambato mitresaka any Etama ka niteny tamin’i Samsona hoe: Tsy fantatrao va fa manapaka amintsika ny Filistina? Inona izao nataonao taminay izao? Dia hoy izy taminy: Araka izay nataony tamiko no mba nataoko taminy. '
  '12':
  - type: text
    content: 'Hoy kosa izy ireo taminy: Hamatotra anao no nidinanay, mba hatolotray ho eo an-tanan’ny Filistina ianao. Dia hoy i Samsona taminy: Mianiàna amiko ary fa tsy hamely ahy ianareo. '
  '13':
  - type: text
    content: 'Dia niteny taminy izy ireo hoe: Tsia! Fa hamatotra anao fotsiny ihany izahay ka hanolotra anao eo an-tanany; tsy hamono anao tsy akory izahay. Dia namatotra azy tamin’ny mahazaka roa vaovao ireo ka nitondra azy niala tamin’ilay harambato.'
  '14':
  - type: text
    content: 'Rehefa tonga tany Lehy izy dia nanakora azy ny Filistina. Dia tonga taminy ny Fanahin’NY TOMPO ka tonga tahaka ny kofehy rongony izay nodorana tamin’ny afo ny mahazaka teny amin’ny sandriny ary afaka tamin’ny tanany ny fatorana. '
  '15':
  - type: text
    content: 'Ary nahita valanoranom-boriky tsy mbola maina izy dia nanainga ny tanany ka naka azy, ary iny no namonoany arivo lahy. '
  '16':
  - type: text
    content: 'Dia hoy i Samsona:'
  - type: text
    content: Tamin’ny valanoranom-boriky,
  - type: text
    content: boriky iray amin’ny boriky maro;
  - type: text
    content: tamin’ny valanoranom-boriky
  - type: text
    content: no nahafatesako arivo lahy.
  '17':
  - type: text
    content: 'Rehefa nitsahatra niteny izy dia nariany ilay valanoranom-boriky teny an-tanany. Ary ny anaran’izany tany izany dia natao hoe Ramata-Lehy. '
  '18':
  - type: text
    content: 'Ary nangetaheta be izy dia nitaraina tamin’NY TOMPO hoe: Ianao no nanome izao famonjena lehibe izao tamin’ny tanan’ny mpanomponao. Ankehitriny, moa ho fatin-ketaheta va aho ka hianjera ho eo an-tanan’ny tsy mifora? '
  '19':
  - type: text
    content: Dia nampitresahin’Andriamanitra ilay lavaka ao amin’ny vato tany Lehy ka niboiboika avy tao ny rano. Rehefa nisotro izy dia nody ny ainy ka velombelona indray izy. Izany no nanaovana ny anarany hoe Eny-Hakore
  - type: note
    content: 'Eny-Hakore: Ny loharanon’ilay niantso.'
  - type: text
    content: ', izay any Lehy mandraka androany. '
  '2':
  - type: text
    content: 'fa hoy izy: Noheveriko ho halanao izy ka nomeko ho an’ny namanao. Moa tsy tsara tarehy noho izy va ny zandriny? Miangavy anao aho, aoka izy no halainao ho solony! '
  '20':
  - type: text
    content: Dia nitsara ny Israely roapolo taona tamin’ny andron’ny Filistina izy.
  '3':
  - type: text
    content: 'Hoy i Samsona taminy: Tsy hanan-tsiny aho izao na dia hanisy ratsy ny Filistina aza. '
  '4':
  - type: text
    content: 'Dia lasa nandeha i Samsona ka nisambotra amboahaolo telonjato; dia naka zavatra hatao fanilo izy ary nampifanendreny tsiroaroa avy ny rambon’ny amboahaolo ka nofehezany fanilo iray teo anelanelan’ny rambony. '
  '5':
  - type: text
    content: Ary rehefa narehiny ny fanilo dia nalefany ho any amin’ny varin’ny Filistina ireny ka nandoro ny amboara sy ny vary mbola mitsangana ary hatramin’ny voly oliva.
  '6':
  - type: text
    content: 'Dia hoy ny Filistina: Iza no nanao izao? Ary nisy nilaza hoe: I Samsona, vinanton’ilay Timnita satria nomen’ny rafozany ho an’ny sakaizany ny vadiny. Dia niakatra ny Filistina ka nandoro an-dRavehivavy sy ny rainy tamin’ny afo. '
  '7':
  - type: text
    content: 'Hoy i Samsona taminy: Satria izao no fihetsikareo dia hamaly anareo tokoa aho, ka rehefa vita izany vao hitsahatra aho. '
  '8':
  - type: text
    content: Dia namely azy izy ka nanapotika azy tanteraka ary nahafaty be dia be; dia nidina izy ka nitoetra teo an-tsefatsefak’ilay harambato mitresaka any Etama.
  - type: heading
    content: I Samsona sy ny valanoranom-boriky
  '9':
  - type: text
    content: 'Ary niakatra ny Filistina dia nitoby tany Joda ka niely hatrany Lehy. '
