verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fivadihan’ny Israely sy ny famindrampon’Andriamanitra
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Haleloia
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miderà NY TOMPO fa tsara Izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa mandrakizay ny famindrampony.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Namonjy azy tamin’ny tanan’ny mpandrafy Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary nanavotra azy tamin’ny tanan’ny fahavalo.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia nosaronan’ny rano kosa ny rafiny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy nisy niangana na dia iray akory aza.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia nino ny teniny izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka nihira ny fiderana Azy.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nalaky nanadino ny asany anefa izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy niandry ny saina hatolony,
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa fatra-pitsiriritra tany an-tany efitra izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady naka fanahy an’Andriamanitra tany an-tany foana.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia nomeny azy izay nangatahiny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: kanefa nataony mahia izy.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia nialona an’i Mosesy tany an-toby izy ireo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady nialona an’i Arona, olo-masin’NY TOMPO.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nisokatra ny tany dia nitelina an’i Datana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka nanarona ny antokon’i Abirama.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia nisy afo nirehitra tamin’ny antokony;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: lelafo no nandoro ny ratsy fanahy.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nanao ombilahy kely tany Horeba izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka niankohoka teo anoloan’ny sarin-javatra voarendrika.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Iza no mahalaza ny asa lehibe ataon’NY TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na mahatonona ny fiderana Azy rehetra?
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny voninahiny dia natakalony
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sarin’omby homana ahitra.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nohadinoiny Andriamanitra, mpamonjy azy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay efa nanao zava-dehibe tany Ejipta,
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia fahagagana tany amin’ny tanin’i Hama
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy zava-mahatahotra teo amin’ny Ranomasina Mena.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary nilaza handringana azy Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: raha tsy i Mosesy voafidiny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no nandroso hijoro tamin’ny banga teo anatrehany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hampiala ny fahatezerany mba tsy handringanany azy.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nanamavo ny tany mahafinaritra ireo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady tsy mba nino ny teniny
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa nimonomonona tany an-dainy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy nihaino ny feon’NY TOMPO.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia nananga-tanana taminy Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa hampiampatrampatra azy any an-tany efitra
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ary ny taranany kosa dia any amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jentilisa
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hampihahakahaka azy any amin’ny tany maro Izy.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nikambana tamin’i Baala-Peora ireo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka nihinana ny fanatitra ho an’ny maty.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nampahatezitra NY TOMPO tamin’ny nataony ireo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka namely azy tampoka ny areti-mandringana.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sambatra izay mitandrina ny rariny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka mitandro mandrakariva ny marina.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa nitsangana nandroso i Finehasa ka nandamina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia nitsahatra ny areti-mandringana.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary nisaina ho fahamarinany izany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hatramin’ny taranaka fara aman-dimby mandrakizay.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nampahatezitra NY TOMPO teo anilan’ny ranon’i Meriba ireo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka nisy nanjo an’i Mosesy noho ny nataon’ireo;
  '33':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria nikomy tamin’ny Fanahin’NY TOMPO ireo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia nanao teny tsy voahevitra i Mosesy.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy naringan-dry zareo ny firenena
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay nasain’NY TOMPO naringany;
  '35':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa nifangaro tamin’ny Jentilisa izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka nianatra ny fanaony.
  '36':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nanompo ny sampiny izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tonga fandrika ho azy izany.
  '37':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Namono ny zanany lahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'sy ny zanany vavy ho fanatitra ho an’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: demonia
    - type: text
      text: ' ireo;'
  '38':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, nandatsaka ny ran’ny tsy manan-tsiny izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ny ran’ny zanany lahy sy ny zanany vavy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay novonoiny ho fanatitra ho an’ny sampin’i Kanana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: koa nandoto ny tany tamin’ny ra izy.
  '39':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Naloto tamin’ny asany izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary nahatonga azy ho nijangajanga ny nataony.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: TOMPO ô, tsarovy aho araka ny fankasitrahanao ny olonao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vangio amin’ny famonjenao aho,
  '40':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nirehitra tamin’ny olony ny fahatezeran’NY TOMPO
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka nataony ho zava-betaveta ny lovany.
  '41':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nanolotra azy teo an-tanan’ny Jentilisa Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka izay nankahala azy no nanapaka taminy.
  '42':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nampahory azy ny fahavalony
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka naetry teo ambanin’ny tanany izy.
  '43':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Matetika Izy no nanafaka azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ireo kosa dia tsy nisaina afa-tsy ny hikomy Taminy ihany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka nihalevona noho ny helony.
  '44':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Kanefa nijery ny fahoriany ihany Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: raha nandre ny fitarainany.
  '45':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nahatsiaro ny fanekeny Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka nanenina araka ny haben’ny famindrampony.
  '46':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nataony nahita famindrampo ireny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tamin’izay rehetra namabo azy.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 1Tan 16.35-36
    marker-yv: yv-h
  '47':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vonjeo izahay, RY TOMPO Andriamanitray ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka angony avy amin’ny Jentilisa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hisaoranay ny anaranao masina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka ho reharehanay ny fiderana Anao.
  '48':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Isaorana anie NY TOMPO, Andriamanitry ny Israely,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hatramin’ny taloha indrindra ka ho mandrakizay;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ary aoka ny olona rehetra hiteny hoe: Amena!'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: w
      children:
      - type: text
        text: Haleloia
    - type: text
      text: .
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hahitako ny soa azon’ny voafidinao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hifaliako amin’ny fifalian’ny firenenao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hiravoravoako miaraka amin’ny lovanao.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Efa nanota izahay mbamin’ny razanay,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: efa nanao izay meloka sy ratsy izahay.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy mba nandinika ny fahagagana nataonao ny razanay tany Ejipta;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy mba nahatsiaro
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny habetsahan’ny famindramponao ireny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa nikomy teo amoron-dranomasina, dia teo amoron’ny Ranomasina Mena.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Kanefa namonjy azy ihany Izy noho ny anarany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hampahafantarany ny asany lehibe.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia noteneniny mafy ny Ranomasina Mena ka tonga maina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary nitondra azy nita ny rano lalina tahaka ny tany efitra Izy.
