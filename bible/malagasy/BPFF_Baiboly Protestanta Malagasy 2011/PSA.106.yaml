document_id: PSA.106
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fivadihan’ny Israely sy ny famindrampon’Andriamanitra
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Haleloia
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: Miderà NY TOMPO fa tsara Izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa mandrakizay ny famindrampony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Iza no mahalaza ny asa lehibe ataon’NY TOMPO,
- type: usfm
  marker: q1
  children:
  - type: text
    text: na mahatonona ny fiderana Azy rehetra?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Sambatra izay mitandrina ny rariny
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka mitandro mandrakariva ny marina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: TOMPO ô, tsarovy aho araka ny fankasitrahanao ny olonao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: vangio amin’ny famonjenao aho,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: hahitako ny soa azon’ny voafidinao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hifaliako amin’ny fifalian’ny firenenao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hiravoravoako miaraka amin’ny lovanao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Efa nanota izahay mbamin’ny razanay,
- type: usfm
  marker: q1
  children:
  - type: text
    text: efa nanao izay meloka sy ratsy izahay.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Tsy mba nandinika ny fahagagana nataonao ny razanay tany Ejipta;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy mba nahatsiaro
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny habetsahan’ny famindramponao ireny
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa nikomy teo amoron-dranomasina, dia teo amoron’ny Ranomasina Mena.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Kanefa namonjy azy ihany Izy noho ny anarany
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hampahafantarany ny asany lehibe.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Dia noteneniny mafy ny Ranomasina Mena ka tonga maina
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary nitondra azy nita ny rano lalina tahaka ny tany efitra Izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Namonjy azy tamin’ny tanan’ny mpandrafy Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary nanavotra azy tamin’ny tanan’ny fahavalo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Dia nosaronan’ny rano kosa ny rafiny
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy nisy niangana na dia iray akory aza.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Dia nino ny teniny izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka nihira ny fiderana Azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Nalaky nanadino ny asany anefa izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy niandry ny saina hatolony,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: fa fatra-pitsiriritra tany an-tany efitra izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady naka fanahy an’Andriamanitra tany an-tany foana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Dia nomeny azy izay nangatahiny
- type: usfm
  marker: q1
  children:
  - type: text
    text: kanefa nataony mahia izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Dia nialona an’i Mosesy tany an-toby izy ireo
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady nialona an’i Arona, olo-masin’NY TOMPO.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Nisokatra ny tany dia nitelina an’i Datana
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka nanarona ny antokon’i Abirama.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Dia nisy afo nirehitra tamin’ny antokony;
- type: usfm
  marker: q1
  children:
  - type: text
    text: lelafo no nandoro ny ratsy fanahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Nanao ombilahy kely tany Horeba izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka niankohoka teo anoloan’ny sarin-javatra voarendrika.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ary ny voninahiny dia natakalony
- type: usfm
  marker: q1
  children:
  - type: text
    text: sarin’omby homana ahitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Nohadinoiny Andriamanitra, mpamonjy azy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay efa nanao zava-dehibe tany Ejipta,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: dia fahagagana tany amin’ny tanin’i Hama
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy zava-mahatahotra teo amin’ny Ranomasina Mena.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ary nilaza handringana azy Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: raha tsy i Mosesy voafidiny
- type: usfm
  marker: q1
  children:
  - type: text
    text: no nandroso hijoro tamin’ny banga teo anatrehany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hampiala ny fahatezerany mba tsy handringanany azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Nanamavo ny tany mahafinaritra ireo
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady tsy mba nino ny teniny
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: fa nimonomonona tany an-dainy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy nihaino ny feon’NY TOMPO.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Dia nananga-tanana taminy Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa hampiampatrampatra azy any an-tany efitra
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'ary ny taranany kosa dia any amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jentilisa
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hampihahakahaka azy any amin’ny tany maro Izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Nikambana tamin’i Baala-Peora ireo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka nihinana ny fanatitra ho an’ny maty.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Nampahatezitra NY TOMPO tamin’ny nataony ireo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka namely azy tampoka ny areti-mandringana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Fa nitsangana nandroso i Finehasa ka nandamina
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia nitsahatra ny areti-mandringana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Ary nisaina ho fahamarinany izany
- type: usfm
  marker: q1
  children:
  - type: text
    text: hatramin’ny taranaka fara aman-dimby mandrakizay.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Nampahatezitra NY TOMPO teo anilan’ny ranon’i Meriba ireo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka nisy nanjo an’i Mosesy noho ny nataon’ireo;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: satria nikomy tamin’ny Fanahin’NY TOMPO ireo
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia nanao teny tsy voahevitra i Mosesy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Tsy naringan-dry zareo ny firenena
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay nasain’NY TOMPO naringany;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: fa nifangaro tamin’ny Jentilisa izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka nianatra ny fanaony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Nanompo ny sampiny izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tonga fandrika ho azy izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Namono ny zanany lahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'sy ny zanany vavy ho fanatitra ho an’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: demonia
  - type: text
    text: ' ireo;'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: eny, nandatsaka ny ran’ny tsy manan-tsiny izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ny ran’ny zanany lahy sy ny zanany vavy
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay novonoiny ho fanatitra ho an’ny sampin’i Kanana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: koa nandoto ny tany tamin’ny ra izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Naloto tamin’ny asany izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary nahatonga azy ho nijangajanga ny nataony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Nirehitra tamin’ny olony ny fahatezeran’NY TOMPO
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka nataony ho zava-betaveta ny lovany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: Nanolotra azy teo an-tanan’ny Jentilisa Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka izay nankahala azy no nanapaka taminy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: Nampahory azy ny fahavalony
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka naetry teo ambanin’ny tanany izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: Matetika Izy no nanafaka azy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ireo kosa dia tsy nisaina afa-tsy ny hikomy Taminy ihany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka nihalevona noho ny helony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: Kanefa nijery ny fahoriany ihany Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: raha nandre ny fitarainany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: Nahatsiaro ny fanekeny Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka nanenina araka ny haben’ny famindrampony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: Nataony nahita famindrampo ireny
- type: usfm
  marker: q1
  children:
  - type: text
    text: tamin’izay rehetra namabo azy.
- type: usfm
  marker: r
  children:
  - type: text
    text: 1Tan 16.35-36
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: Vonjeo izahay, RY TOMPO Andriamanitray ô,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka angony avy amin’ny Jentilisa
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hisaoranay ny anaranao masina
- type: usfm
  marker: q1
  children:
