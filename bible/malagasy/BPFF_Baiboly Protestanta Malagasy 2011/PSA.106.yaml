document_id: PSA.106,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fivadihan’ny Israely sy ny famindrampon’Andriamanitra
  - type: text
    content: ' '
  - type: text
    content: Haleloia
  - type: text
    content: .
  - type: text
    content: Miderà NY TOMPO fa tsara Izy;
  - type: text
    content: fa mandrakizay ny famindrampony.
  '10':
  - type: text
    content: Namonjy azy tamin’ny tanan’ny mpandrafy Izy
  - type: text
    content: ary nanavotra azy tamin’ny tanan’ny fahavalo.
  '11':
  - type: text
    content: Dia nosaronan’ny rano kosa ny rafiny
  - type: text
    content: ka tsy nisy niangana na dia iray akory aza.
  '12':
  - type: text
    content: Dia nino ny teniny izy
  - type: text
    content: ka nihira ny fiderana Azy.
  '13':
  - type: text
    content: Nalaky nanadino ny asany anefa izy
  - type: text
    content: ka tsy niandry ny saina hatolony,
  '14':
  - type: text
    content: fa fatra-pitsiriritra tany an-tany efitra izy
  - type: text
    content: sady naka fanahy an’Andriamanitra tany an-tany foana.
  '15':
  - type: text
    content: Dia nomeny azy izay nangatahiny
  - type: text
    content: kanefa nataony mahia izy.
  '16':
  - type: text
    content: Dia nialona an’i Mosesy tany an-toby izy ireo
  - type: text
    content: sady nialona an’i Arona, olo-masin’NY TOMPO.
  '17':
  - type: text
    content: Nisokatra ny tany dia nitelina an’i Datana
  - type: text
    content: ka nanarona ny antokon’i Abirama.
  '18':
  - type: text
    content: Dia nisy afo nirehitra tamin’ny antokony;
  - type: text
    content: lelafo no nandoro ny ratsy fanahy.
  '19':
  - type: text
    content: Nanao ombilahy kely tany Horeba izy
  - type: text
    content: ka niankohoka teo anoloan’ny sarin-javatra voarendrika.
  '2':
  - type: text
    content: Iza no mahalaza ny asa lehibe ataon’NY TOMPO,
  - type: text
    content: na mahatonona ny fiderana Azy rehetra?
  '20':
  - type: text
    content: Ary ny voninahiny dia natakalony
  - type: text
    content: sarin’omby homana ahitra.
  '21':
  - type: text
    content: Nohadinoiny Andriamanitra, mpamonjy azy,
  - type: text
    content: izay efa nanao zava-dehibe tany Ejipta,
  '22':
  - type: text
    content: dia fahagagana tany amin’ny tanin’i Hama
  - type: text
    content: sy zava-mahatahotra teo amin’ny Ranomasina Mena.
  '23':
  - type: text
    content: Ary nilaza handringana azy Izy
  - type: text
    content: raha tsy i Mosesy voafidiny
  - type: text
    content: no nandroso hijoro tamin’ny banga teo anatrehany,
  - type: text
    content: hampiala ny fahatezerany mba tsy handringanany azy.
  '24':
  - type: text
    content: Nanamavo ny tany mahafinaritra ireo
  - type: text
    content: sady tsy mba nino ny teniny
  '25':
  - type: text
    content: fa nimonomonona tany an-dainy
  - type: text
    content: ka tsy nihaino ny feon’NY TOMPO.
  '26':
  - type: text
    content: Dia nananga-tanana taminy Izy
  - type: text
    content: fa hampiampatrampatra azy any an-tany efitra
  '27':
  - type: text
    content: 'ary ny taranany kosa dia any amin’ny '
  - type: text
    content: Jentilisa
  - type: text
    content: ','
  - type: text
    content: ary hampihahakahaka azy any amin’ny tany maro Izy.
  '28':
  - type: text
    content: Nikambana tamin’i Baala-Peora ireo
  - type: text
    content: ka nihinana ny fanatitra ho an’ny maty.
  '29':
  - type: text
    content: Nampahatezitra NY TOMPO tamin’ny nataony ireo
  - type: text
    content: ka namely azy tampoka ny areti-mandringana.
  '3':
  - type: text
    content: Sambatra izay mitandrina ny rariny
  - type: text
    content: ka mitandro mandrakariva ny marina.
  '30':
  - type: text
    content: Fa nitsangana nandroso i Finehasa ka nandamina
  - type: text
    content: dia nitsahatra ny areti-mandringana.
  '31':
  - type: text
    content: Ary nisaina ho fahamarinany izany
  - type: text
    content: hatramin’ny taranaka fara aman-dimby mandrakizay.
  '32':
  - type: text
    content: Nampahatezitra NY TOMPO teo anilan’ny ranon’i Meriba ireo
  - type: text
    content: ka nisy nanjo an’i Mosesy noho ny nataon’ireo;
  '33':
  - type: text
    content: satria nikomy tamin’ny Fanahin’NY TOMPO ireo
  - type: text
    content: dia nanao teny tsy voahevitra i Mosesy.
  '34':
  - type: text
    content: Tsy naringan-dry zareo ny firenena
  - type: text
    content: izay nasain’NY TOMPO naringany;
  '35':
  - type: text
    content: fa nifangaro tamin’ny Jentilisa izy
  - type: text
    content: ka nianatra ny fanaony.
  '36':
  - type: text
    content: Nanompo ny sampiny izy
  - type: text
    content: ka tonga fandrika ho azy izany.
  '37':
  - type: text
    content: Namono ny zanany lahy
  - type: text
    content: 'sy ny zanany vavy ho fanatitra ho an’ny '
  - type: text
    content: demonia
  - type: text
    content: ' ireo;'
  '38':
  - type: text
    content: eny, nandatsaka ny ran’ny tsy manan-tsiny izy,
  - type: text
    content: dia ny ran’ny zanany lahy sy ny zanany vavy
  - type: text
    content: izay novonoiny ho fanatitra ho an’ny sampin’i Kanana;
  - type: text
    content: koa nandoto ny tany tamin’ny ra izy.
  '39':
  - type: text
    content: Naloto tamin’ny asany izy
  - type: text
    content: ary nahatonga azy ho nijangajanga ny nataony.
  '4':
  - type: text
    content: TOMPO ô, tsarovy aho araka ny fankasitrahanao ny olonao;
  - type: text
    content: vangio amin’ny famonjenao aho,
  '40':
  - type: text
    content: Nirehitra tamin’ny olony ny fahatezeran’NY TOMPO
  - type: text
    content: ka nataony ho zava-betaveta ny lovany.
  '41':
  - type: text
    content: Nanolotra azy teo an-tanan’ny Jentilisa Izy
  - type: text
    content: ka izay nankahala azy no nanapaka taminy.
  '42':
  - type: text
    content: Nampahory azy ny fahavalony
  - type: text
    content: ka naetry teo ambanin’ny tanany izy.
  '43':
  - type: text
    content: Matetika Izy no nanafaka azy;
  - type: text
    content: fa ireo kosa dia tsy nisaina afa-tsy ny hikomy Taminy ihany
  - type: text
    content: ka nihalevona noho ny helony.
  '44':
  - type: text
    content: Kanefa nijery ny fahoriany ihany Izy
  - type: text
    content: raha nandre ny fitarainany.
  '45':
  - type: text
    content: Nahatsiaro ny fanekeny Izy
  - type: text
    content: ka nanenina araka ny haben’ny famindrampony.
  '46':
  - type: text
    content: Nataony nahita famindrampo ireny
  - type: text
    content: tamin’izay rehetra namabo azy.
  - type: heading
    content: 1Tan 16.35-36
  '47':
  - type: text
    content: Vonjeo izahay, RY TOMPO Andriamanitray ô,
  - type: text
    content: ka angony avy amin’ny Jentilisa
  - type: text
    content: mba hisaoranay ny anaranao masina
  - type: text
    content: ka ho reharehanay ny fiderana Anao.
  '48':
  - type: text
    content: Isaorana anie NY TOMPO, Andriamanitry ny Israely,
  - type: text
    content: hatramin’ny taloha indrindra ka ho mandrakizay;
  - type: text
    content: 'ary aoka ny olona rehetra hiteny hoe: Amena!'
  - type: text
    content: Haleloia
  - type: text
    content: .
  '5':
  - type: text
    content: hahitako ny soa azon’ny voafidinao,
  - type: text
    content: hifaliako amin’ny fifalian’ny firenenao,
  - type: text
    content: hiravoravoako miaraka amin’ny lovanao.
  '6':
  - type: text
    content: Efa nanota izahay mbamin’ny razanay,
  - type: text
    content: efa nanao izay meloka sy ratsy izahay.
  '7':
  - type: text
    content: Tsy mba nandinika ny fahagagana nataonao ny razanay tany Ejipta;
  - type: text
    content: tsy mba nahatsiaro
  - type: text
    content: ny habetsahan’ny famindramponao ireny
  - type: text
    content: fa nikomy teo amoron-dranomasina, dia teo amoron’ny Ranomasina Mena.
  '8':
  - type: text
    content: Kanefa namonjy azy ihany Izy noho ny anarany
  - type: text
    content: mba hampahafantarany ny asany lehibe.
  '9':
  - type: text
    content: Dia noteneniny mafy ny Ranomasina Mena ka tonga maina
  - type: text
    content: ary nitondra azy nita ny rano lalina tahaka ny tany efitra Izy.
