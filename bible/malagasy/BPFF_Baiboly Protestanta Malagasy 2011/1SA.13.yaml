document_id: 1SA.13,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ady nifanaovana tamin’ny Filistina; ny fahadisoan’i Saoly
  - type: text
    content: Telopolo taona i Saoly raha nanomboka nanjaka; ary roa taona no nanjakany tamin’ny Israely.
  '10':
  - type: text
    content: 'Rehefa vita ny fanolorany ny fanatitra dorana manontolo dia indro, tamy i Samoela, ary nivoaka hitsena azy i Saoly mba hiarahaba azy. '
  '11':
  - type: text
    content: 'Dia hoy i Samoela: Inona no nataonao? Hoy i Saoly: Raha hitako fa niely nandao ahy ny olona sady tsy tonga tamin’ny fotoana ianao ary efa tafangona tany Mikmasy ny Filistina, '
  '12':
  - type: text
    content: 'dia hoy aho: Hidina amin’izao ny Filistina hamely ahy atỳ Gilgala nefa tsy mbola nanao fifonana tamin’NY TOMPO aho, dia nahatsiaro voatery nanolotra ny fanatitra dorana manontolo aho. '
  '13':
  - type: text
    content: 'Hoy i Samoela tamin’i Saoly: Nanao hadalana ianao; tsy nitandrina ny didin’NY TOMPO Andriamanitrao izay nandidiany anao ianao; fa raha tsy nanao izany ianao dia ho nampitoetra ny fanjakanao ho mandrakizay eo amin’ny Israely NY TOMPO. '
  '14':
  - type: text
    content: 'Koa izao dia tsy haharitra ny fanjakanao; NY TOMPO efa nitady lehilahy ho Azy araka ny fony, ary izy no voatendrin’NY TOMPO ho mpanapaka ny olony, satria tsy nitandrina izay nandidian’NY TOMPO anao ianao. '
  '15':
  - type: text
    content: 'Dia nitsangana i Samoela ka niakatra avy tany Gilgala hankany Gibean’i Benjamina. Ary nandamina ny olona izay teo aminy i Saoly, tokony ho eninjato lahy izy ireo. '
  '16':
  - type: text
    content: 'Raha mbola nitoetra tany Gibean’i Benjamina i Saoly sy i Jonatana zanany ary ny vahoaka teo amin’izy roa lahy dia nitoby tany Mikmasy kosa ny Filistina. '
  '17':
  - type: text
    content: 'Dia nivoaka avy teo amin’ny tobin’ny Filistina ny mpandrava ka nizara ho antoko telo: Ny antoko iray dia nizotra tamin’ny lalana mankany Ofra ho any amin’ny tany Sohala; '
  '18':
  - type: text
    content: ny iray dia nizotra ho any amin’ny lalana mankany Bety-Horona; ary ny iray kosa dia nizotra ho any amin’ny lalana mankany amin’ny sisintany manatrika ny lohasaha Zeboima tandrifin’ny tany efitra.
  '19':
  - type: text
    content: 'Ary teny amin’ny tanin’ny Israely rehetra dia tsy nisy mpanefy; satria hoy ny Filistina: Mba tsy hanefy sabatra na lefona anie ny Hebreo! '
  '2':
  - type: text
    content: 'Nifantina telo arivo lahy tamin’ny Israely i Saoly, koa ny roa arivo lahy dia niaraka taminy tany Mikmasy sy tany amin’ny tendrombohitr’i Betela, ary ny arivo lahy niaraka tamin’i Jonatana tany Gibean’i Benjamina; ny olona sisa kosa samy nalefany hody any an-dainy avy. '
  '20':
  - type: text
    content: 'Dia samy nidina ho any amin’ny Filistina ny Israely rehetra mba handranitra ny angadiny, ny fiasàny vy, ny famakiny ary ny lelan’angadinombiny. '
  '21':
  - type: text
    content: 'Ny saran’ny fandranitany ny angady, ny fiasana vy, ny telorantsana, ny famaky ary ny fanitsiana ny fanindronan’omby dia roa ampahatelon’ny sekela. '
  '22':
  - type: text
    content: 'Koa tamin’ny fotoana niadiana dia tsy nisy sabatra na lefona hita teny an-tanan’ny vahoaka rehetra izay niaraka tamin’i Saoly sy i Jonatana; fa i Saoly sy i Jonatana zanany ihany no nanana. '
  '23':
  - type: text
    content: Ary nisy andia-miaramilan’ny Filistina nivoaka ho ao amin’ny hadilanana mankany Mikmasy.
  '3':
  - type: text
    content: 'Dia namely ny miaramilan’ny Filistina izay tany Geba i Jonatana ka ren’ny Filistina izany. Ary nampitsoka anjomara teny amin’ny tany rehetra i Saoly ka niteny hoe: Aoka handre ny Hebreo! '
  '4':
  - type: text
    content: 'Dia ren’ny Israely rehetra fa namely ny miaramilan’ny Filistina i Saoly, hany ka halan’ny Filistina ny Israely. Dia nivory hanaraka an’i Saoly ho any Gilgala ny olona. '
  '5':
  - type: text
    content: 'Filistina telo alina an-kalesy fitondra miady sy enina arivo an-tsoavaly ary vahoaka betsaka tahaka ny fasika eny amoron-dranomasina no nivory hiady tamin’ny Israely; ary nandeha izy ireo ka nitoby tany Mikmasy, any atsinanan’i Bety-Avena. '
  '6':
  - type: text
    content: 'Nony hitan’ny lehilahin’ny Israely fa latsaka an-katerena izy, satria nijaly mafy ny olona, dia niery tany amin’ny zohy sy tany amin’ny kirihitrala, tany amin’ny harambato sy tany amin’ny fierena ary tany amin’ny lavaka famorian-drano izy ireo. '
  '7':
  - type: text
    content: 'Ny Hebreo sasany kosa dia lasa nita an’i Jordana nankany amin’ny tanin’i Gada sy i Gileada. Fa mbola tany Gilgala ihany i Saoly ary ny vahoaka rehetra dia nanaraka azy sady toran-kovitra be ihany. '
  '8':
  - type: text
    content: Dia niandry hafitoana izy araka ny fotoana nomen’i Samoela; nefa tsy mbola tonga tany Gilgala ihany i Samoela ka niely ny olona.
  '9':
  - type: text
    content: 'Ary hoy i Saoly: Ento etỳ amiko ny fanatitra dorana manontolo sy ny fanati-pihavanana; dia nanolotra ny fanatitra dorana manontolo izy. '
