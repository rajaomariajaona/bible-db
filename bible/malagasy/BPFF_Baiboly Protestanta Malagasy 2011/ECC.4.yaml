document_id: ECC.4,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Aleo maty toy izay velona
  - type: text
    content: Hitako koa ny fampahoriana rehetra atao etỳ ambanin’ny masoandro ka indro
  - type: text
    content: ny ranomason’ny ampahorina nefa tsy misy izay mampionona azy;
  - type: text
    content: hery no eo anilan’ny mpampahory azy nefa tsy misy izay mampionona azy.
  '10':
  - type: text
    content: Raha misy lavo dia arenin’ny namany;
  - type: text
    content: fa mahantra ny tokana izay lavo nefa tsy manana namana hanarina azy.
  '11':
  - type: text
    content: Ary koa,
  - type: text
    content: raha miara-mandry ny roa dia mafana izy;
  - type: text
    content: fa hatao ahoana no hampahafana ny irery?
  '12':
  - type: text
    content: Raha misy maharesy ny irery aza, ny roa kosa dia tsy ho leony;
  - type: text
    content: ny mahazaka telo olana dia tsy mora tapahina.
  - type: heading
    content: Ny amin’ny fahefana politika
  '13':
  - type: text
    content: Aleo zatovo mahantra nefa hendry
  - type: text
    content: toy izay mpanjaka antitra adala ka tsy laitra anarina intsony,
  '14':
  - type: text
    content: na dia avy tao an-tranomaizina aza no nivoahany hanjaka
  - type: text
    content: ary na dia tao anatin’ny fahantrana aza no nahaterahany hitondra ny fanjakany.
  '15':
  - type: text
    content: Hitako ny miaina rehetra izay mandeha etỳ ambanin’ny masoandro,
  - type: text
    content: manotrona ilay zazalahy izay mitsangana handimby ny efa teo.
  '16':
  - type: text
    content: Tsy hita isa ny fitambaran’ny vahoaka,
  - type: text
    content: dia izay rehetra anjakany;
  - type: text
    content: nefa izay ho avy any aoriana dia tsy mba hahita fifaliana aminy.
  - type: text
    content: Izany koa dia zava-poana sy sambo-drivotra.
  - type: heading
    content: Tsy mahery miteny loatra eo anatrehan’Andriamanitra
  '17':
  - type: text
    content: Tandremo ny tongotrao raha mankao amin’ny tranon’Andriamanitra ianao;
  - type: text
    content: fa ny manatona hihaino no tsara
  - type: text
    content: noho ny fanateran’ny adala fanatitra
  - type: text
    content: satria tsy fantatr’ireny akory fa ratsy ny ataony.
  '2':
  - type: text
    content: 'Ny maty izay efa maty ela dia heveriko fa sambatra noho ny velona izay mbola velona, '
  '3':
  - type: text
    content: nefa sambatra indray noho ny maty sy ny velona aza izay tsy mbola ary akory ka tsy mahita ny ratsy atao etỳ ambanin’ny masoandro.
  - type: heading
    content: Aleo miala sasatra toy izay miasa
  '4':
  - type: text
    content: Ary hitako ny fisasarana rehetra sy ny fahombiazana rehetra fa avy amin’ny fifampialonan’ny olona ireny. Zava-poana sy sambo-drivotra koa izany.
  '5':
  - type: text
    content: Ny adala dia mamihin-tanana ka homana ny tenany.
  '6':
  - type: text
    content: Tsara ny fialan-tsasatra eran’ny tanana an’ila
  - type: text
    content: noho ny fisasarana eran’ny tanana roa nefa sambo-drivotra foana.
  - type: heading
    content: Aleo roa toy izay tokana
  '7':
  - type: text
    content: 'Ary izao koa no zava-poana hitako etỳ ambanin’ny masoandro:'
  '8':
  - type: text
    content: Misy olona mitoetra irery ka tsy mana-namana,
  - type: text
    content: tsy manan-janaka, tsy manana rahalahy aza,
  - type: text
    content: nefa tsy misy farany ny fisasarany samihafa
  - type: text
    content: ary ny masony dia tsy afa-po amin’ny harena
  - type: text
    content: 'ka ilazany hoe: Ho an’iza no isasarako sy tsy ananako fahasambarana?'
  - type: text
    content: Zava-poana sy asa mahareraka koa izany.
  '9':
  - type: text
    content: Tsara ny roa noho ny iray fa misy valiny tsara ny fisasarany.
