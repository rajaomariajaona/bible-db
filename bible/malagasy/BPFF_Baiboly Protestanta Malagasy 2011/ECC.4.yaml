document_id: ECC.4,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Aleo maty toy izay velona
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Hitako koa ny fampahoriana rehetra atao etỳ ambanin’ny masoandro ka indro
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny ranomason’ny ampahorina nefa tsy misy izay mampionona azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hery no eo anilan’ny mpampahory azy nefa tsy misy izay mampionona azy.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Raha misy lavo dia arenin’ny namany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa mahantra ny tokana izay lavo nefa tsy manana namana hanarina azy.
  '11':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Ary koa,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: raha miara-mandry ny roa dia mafana izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa hatao ahoana no hampahafana ny irery?
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Raha misy maharesy ny irery aza, ny roa kosa dia tsy ho leony;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny mahazaka telo olana dia tsy mora tapahina.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny amin’ny fahefana politika
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Aleo zatovo mahantra nefa hendry
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toy izay mpanjaka antitra adala ka tsy laitra anarina intsony,
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: na dia avy tao an-tranomaizina aza no nivoahany hanjaka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary na dia tao anatin’ny fahantrana aza no nahaterahany hitondra ny fanjakany.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Hitako ny miaina rehetra izay mandeha etỳ ambanin’ny masoandro,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: manotrona ilay zazalahy izay mitsangana handimby ny efa teo.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Tsy hita isa ny fitambaran’ny vahoaka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia izay rehetra anjakany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa izay ho avy any aoriana dia tsy mba hahita fifaliana aminy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izany koa dia zava-poana sy sambo-drivotra.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Tsy mahery miteny loatra eo anatrehan’Andriamanitra
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Tandremo ny tongotrao raha mankao amin’ny tranon’Andriamanitra ianao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny manatona hihaino no tsara
  - type: usfm
    marker: q1
    children:
    - type: text
      text: noho ny fanateran’ny adala fanatitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria tsy fantatr’ireny akory fa ratsy ny ataony.
  '2':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Ny maty izay efa maty ela dia heveriko fa sambatra noho ny velona izay mbola velona, '
  '3':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: nefa sambatra indray noho ny maty sy ny velona aza izay tsy mbola ary akory ka tsy mahita ny ratsy atao etỳ ambanin’ny masoandro.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Aleo miala sasatra toy izay miasa
    marker-yv: yv-h
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Ary hitako ny fisasarana rehetra sy ny fahombiazana rehetra fa avy amin’ny fifampialonan’ny olona ireny. Zava-poana sy sambo-drivotra koa izany.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Ny adala dia mamihin-tanana ka homana ny tenany.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Tsara ny fialan-tsasatra eran’ny tanana an’ila
  - type: usfm
    marker: q1
    children:
    - type: text
      text: noho ny fisasarana eran’ny tanana roa nefa sambo-drivotra foana.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Aleo roa toy izay tokana
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ary izao koa no zava-poana hitako etỳ ambanin’ny masoandro:'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Misy olona mitoetra irery ka tsy mana-namana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy manan-janaka, tsy manana rahalahy aza,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa tsy misy farany ny fisasarany samihafa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny masony dia tsy afa-po amin’ny harena
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ka ilazany hoe: Ho an’iza no isasarako sy tsy ananako fahasambarana?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Zava-poana sy asa mahareraka koa izany.
  '9':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Tsara ny roa noho ny iray fa misy valiny tsara ny fisasarany.
