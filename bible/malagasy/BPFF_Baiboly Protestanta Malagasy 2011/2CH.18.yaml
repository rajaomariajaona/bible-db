document_id: 2CH.18
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nikambanan’i Josafata sy i Ahaba mpanjakan’ny Israely
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 1Mpa 22.1-4
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Nanana harena sy voninahitra be i Josafata; ary ny zanany lahy dia nampanambadiny ny zanakavavin’i Ahaba. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Koa nony ela dia nidina nankany amin’i Ahaba tany Samaria izy. Namono ondry aman’osy sy omby betsaka ho azy sy ho an’ny olona nanaraka azy i Ahaba dia nitaona azy hiakatra ho any Ramota-Gileada. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary hoy i Ahaba, mpanjakan’ny Israely, tamin’i Josafata, mpanjakan’ny Joda: Mba hiaraka amiko ho any Ramota-Gileada va ianao? Dia hoy izy taminy: Eny, fa tahaka ny tenanao ihany aho ka ny oloko dia olonao; koa hiaraka aminao ho any an-tafika izahay.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Manambara fandresena ireo mpaminanin’i Ahaba
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 1Mpa 22.5-12
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Hoy anefa i Josafata tamin’ny mpanjakan’ny Israely: Miangavy anao aho, anontanio aloha ny tenin’NY TOMPO. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary ny mpanjakan’ny Israely dia nanangona ny mpaminany efajato lahy ka niteny taminy hoe: Handeha hanafika an’i Ramota-Gileada va isika, sa hijanona ihany aho? Dia hoy ireo: Mandehana fa hatolotr’Andriamanitra eo an-tananao izy, ry mpanjaka. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary hoy kosa anefa i Josafata: Moa tsy misy mpaminanin’NY TOMPO koa va eto mba hanontaniantsika? '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dia hoy ny mpanjakan’ny Israely tamin’i Josafata: Mbola misy lehilahy iray ihany ahazoantsika manontany amin’NY TOMPO, saingy halako izy, satria tsy mbola naminany soa ho ahy, fa loza ihany mandrakariva; I Mikaia, zanak’i Jimla, no anarany. Dia hoy i Josafata: Aza manao izany, ry mpanjaka. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary niantso tandapa iray ny mpanjakan’ny Israely ka niteny taminy hoe: Antsoy haingana i Mikaia, zanak’i Jimla.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary ny mpanjakan’ny Israely sy i Josafata, mpanjakan’ny Joda, dia samy nipetraka teo amin’ny sezafiandrianany avy teo amin’ny famoloana eo anoloan’ny vavahadin’i Samaria sady samy efa niakanjo ny fanamiany avy; ary ny mpaminany rehetra dia naminany teo anatrehany. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary i Zedekia, zanak’i Kenana, dia nanao tandroka vy ka niteny hoe: Izao no lazain’NY TOMPO: Ireto no hanotoanao ny Arameana mandra-paharingany. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary ny mpaminany rehetra koa dia naminany hoe: Mandehana ho any Ramota-Gileada dia hambinina ianao; fa hatolotry NY TOMPO eo an-tananao izy, ry mpanjaka.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Manambara faharesena i Mikaia mpaminany
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 1Mpa 22.13-28
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary ilay iraka izay nandeha naka an’i Mikaia dia niteny taminy hoe: Indro, iray teny avokoa izao ny mpaminany ka samy milaza soa ho an’ny mpanjaka; koa miangavy anao aho, aoka re ny teninao mba ho tahaka ny an’ny iray amin’ireo ka mba mitenena soa koa. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dia hoy i Mikaia: Raha velona koa NY TOMPO dia izay lazain’Andriamanitro ihany no hambarako.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dia nankany amin’ny mpanjaka izy. Ary hoy ny mpanjaka taminy: Ry Mikaia, handeha hanafika an’i Ramota-Gileada va isika, sa hijanona ihany aho? Ary hoy izy: Mandehana, dia hambinina ianareo, fa hatolotra eo an-tanànareo izy. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Hoy koa ny mpanjaka taminy: Impiry no hampianianako anao mba tsy hilaza na inona na inona amiko amin’ny anaran’NY TOMPO afa-tsy izay marina ihany? '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Dia hoy i Mikaia: Hitako fa indreny, ny Israely rehetra niely teny an-tendrombohitra toy ny ondry tsy misy mpiandry, ary hoy NY TOMPO: Tsy manan-tompo ireto ka aoka izy samy hody soa amantsara any an-tranony avy. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Dia hoy ny mpanjakan’ny Israely tamin’i Josafata: Tsy efa voalazako taminao va fa tsy mba mety maminany soa ho ahy izy fa loza ihany?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary hoy i Mikaia: Henoy ary ny tenin’NY TOMPO: Nahita NY TOMPO nipetraka teo amin’ny sezafiandrianany aho, ary ny tafiky ny lanitra manontolo dia nijoro teo amin’ny ankavanany sy teo amin’ny ankaviany. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary hoy NY TOMPO: Iza no hamitaka an’i Ahaba, mpanjakan’ny Israely, handeha ho any Ramota-Gileada ka ho lavo any? Ary ny iray dia niteny toy izao ary ny iray hafa kosa dia niteny toy izao. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Dia nandroso ny fanahy iray ka nitsangana teo anatrehan’NY TOMPO sady niteny hoe: Izaho no hamitaka azy. Ary hoy NY TOMPO taminy: Amin’inona anefa? '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Dia hoy izy: Handeha aho ka ho tonga fanahy mandainga ao am-bavan’ny mpaminaniny rehetra. Dia hoy indray NY TOMPO: Ho voafitakao izy ka hahomby ianao; mandehana ka ataovy araka izany. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Koa indro, ankehitriny NY TOMPO efa nanisy fanahy mandainga ao am-bavan’ireto mpaminaninao ireto ary Izy no efa nilaza ny loza hanjo anao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Fa nanatona i Zedekia, zanak’i Kenana, dia namely ny takolak’i Mikaia sady niteny hoe: Taiza no lalana nialan’ny Fanahin’NY TOMPO tamiko mba hiteny aminao? '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Dia hoy i Mikaia: Indro, ho hitanao izany amin’ny andro hitetezanao efitrano mba hierenao. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Dia hoy ny mpanjakan’ny Israely: Sambory i Mikaia ka ento miverina ho any amin’i Amona, mpifehy ny tanàna, sy ho any amin’i Joasy, zanaky ny mpanjaka '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'ary lazao hoe: Izao no lazain’ny mpanjaka: Ataovy ao an-tranomaizina Ilehio ka fahano mofom-pijaliana sy ranom-pijaliana izy mandra-piveriko soa amantsara. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Fa hoy i Mikaia: Raha toa ka ho tafaverina soa amantsara ianao dia tsy nampitenenin’NY TOMPO aho. Ary hoy koa izy: Samia mihaino izany ianareo, ry firenena rehetra.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Maty an’ady i Ahaba mpanjaka
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 1Mpa 22.29-35
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Dia niakatra nankany Ramota-Gileada ny mpanjakan’ny Israely sy i Josafata, mpanjakan’ny Joda. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ary hoy ny mpanjakan’ny Israely tamin’i Josafata: Mody hanao olon-kafa aho ka hitsarapaka any anatin’ny ady, fa ianao kosa dia manaova ny fanamianao ihany. Dia nody olon-kafa ny mpanjakan’ny Israely ka nitsarapaka tany anatin’ny ady. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Fa ny mpanjakan’i Arama dia efa nandidy ireo lehiben’ny kalesy fitondrany miady hoe: Aza miady na amin’ny kely na amin’ny lehibe, afa-tsy amin’ny mpanjakan’ny Israely ihany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Nony nahita an’i Josafata ireo lehiben’ny kalesy fitondra miady dia hoy izy: Iny mihitsy no mpanjakan’ny Israely. Dia nohodidininy izy mba hasiany, kanjo niantsoantso i Josafata ary namonjy azy NY TOMPO; eny, Andriamanitra nampiala ireo teo aminy. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Rehefa hitan’ireo lehiben’ny kalesy fitondra miady fa tsy izy no mpanjakan’ny Israely dia niverina niala taminy ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ary nisy lehilahy iray nandefa anjoanjo zana-tsipìka ka nahavoa ny mpanjakan’ny Israely teo amin’ny fitohizan’ny fiarovan-tratrany; ary hoy izy tamin’ny lehiben’ny kalesiny: Ahodino ny kalesy fitondra miady ka ento miala eto amin’ny mpiady aho fa voa. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Nihamafy ny ady tamin’izany andro izany; ary notohanana ny mpanjaka mba hijoro teo amin’ny kalesiny nanatrika ny Arameana mandra-paharivan’ny andro ny mpanjakan’ny Israely; nefa nony efa hilentika ny masoandro dia maty izy.
