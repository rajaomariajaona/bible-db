document_id: 2CH.18,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nikambanan’i Josafata sy i Ahaba mpanjakan’ny Israely
  - type: heading
    content: 1Mpa 22.1-4
  - type: text
    content: 'Nanana harena sy voninahitra be i Josafata; ary ny zanany lahy dia nampanambadiny ny zanakavavin’i Ahaba. '
  '10':
  - type: text
    content: 'Ary i Zedekia, zanak’i Kenana, dia nanao tandroka vy ka niteny hoe: Izao no lazain’NY TOMPO: Ireto no hanotoanao ny Arameana mandra-paharingany. '
  '11':
  - type: text
    content: 'Ary ny mpaminany rehetra koa dia naminany hoe: Mandehana ho any Ramota-Gileada dia hambinina ianao; fa hatolotry NY TOMPO eo an-tananao izy, ry mpanjaka.'
  - type: heading
    content: Manambara faharesena i Mikaia mpaminany
  - type: heading
    content: 1Mpa 22.13-28
  '12':
  - type: text
    content: 'Ary ilay iraka izay nandeha naka an’i Mikaia dia niteny taminy hoe: Indro, iray teny avokoa izao ny mpaminany ka samy milaza soa ho an’ny mpanjaka; koa miangavy anao aho, aoka re ny teninao mba ho tahaka ny an’ny iray amin’ireo ka mba mitenena soa koa. '
  '13':
  - type: text
    content: 'Dia hoy i Mikaia: Raha velona koa NY TOMPO dia izay lazain’Andriamanitro ihany no hambarako.'
  '14':
  - type: text
    content: 'Dia nankany amin’ny mpanjaka izy. Ary hoy ny mpanjaka taminy: Ry Mikaia, handeha hanafika an’i Ramota-Gileada va isika, sa hijanona ihany aho? Ary hoy izy: Mandehana, dia hambinina ianareo, fa hatolotra eo an-tanànareo izy. '
  '15':
  - type: text
    content: 'Hoy koa ny mpanjaka taminy: Impiry no hampianianako anao mba tsy hilaza na inona na inona amiko amin’ny anaran’NY TOMPO afa-tsy izay marina ihany? '
  '16':
  - type: text
    content: 'Dia hoy i Mikaia: Hitako fa indreny, ny Israely rehetra niely teny an-tendrombohitra toy ny ondry tsy misy mpiandry, ary hoy NY TOMPO: Tsy manan-tompo ireto ka aoka izy samy hody soa amantsara any an-tranony avy. '
  '17':
  - type: text
    content: 'Dia hoy ny mpanjakan’ny Israely tamin’i Josafata: Tsy efa voalazako taminao va fa tsy mba mety maminany soa ho ahy izy fa loza ihany?'
  '18':
  - type: text
    content: 'Ary hoy i Mikaia: Henoy ary ny tenin’NY TOMPO: Nahita NY TOMPO nipetraka teo amin’ny sezafiandrianany aho, ary ny tafiky ny lanitra manontolo dia nijoro teo amin’ny ankavanany sy teo amin’ny ankaviany. '
  '19':
  - type: text
    content: 'Ary hoy NY TOMPO: Iza no hamitaka an’i Ahaba, mpanjakan’ny Israely, handeha ho any Ramota-Gileada ka ho lavo any? Ary ny iray dia niteny toy izao ary ny iray hafa kosa dia niteny toy izao. '
  '2':
  - type: text
    content: 'Koa nony ela dia nidina nankany amin’i Ahaba tany Samaria izy. Namono ondry aman’osy sy omby betsaka ho azy sy ho an’ny olona nanaraka azy i Ahaba dia nitaona azy hiakatra ho any Ramota-Gileada. '
  '20':
  - type: text
    content: 'Dia nandroso ny fanahy iray ka nitsangana teo anatrehan’NY TOMPO sady niteny hoe: Izaho no hamitaka azy. Ary hoy NY TOMPO taminy: Amin’inona anefa? '
  '21':
  - type: text
    content: 'Dia hoy izy: Handeha aho ka ho tonga fanahy mandainga ao am-bavan’ny mpaminaniny rehetra. Dia hoy indray NY TOMPO: Ho voafitakao izy ka hahomby ianao; mandehana ka ataovy araka izany. '
  '22':
  - type: text
    content: Koa indro, ankehitriny NY TOMPO efa nanisy fanahy mandainga ao am-bavan’ireto mpaminaninao ireto ary Izy no efa nilaza ny loza hanjo anao.
  '23':
  - type: text
    content: 'Fa nanatona i Zedekia, zanak’i Kenana, dia namely ny takolak’i Mikaia sady niteny hoe: Taiza no lalana nialan’ny Fanahin’NY TOMPO tamiko mba hiteny aminao? '
  '24':
  - type: text
    content: 'Dia hoy i Mikaia: Indro, ho hitanao izany amin’ny andro hitetezanao efitrano mba hierenao. '
  '25':
  - type: text
    content: 'Dia hoy ny mpanjakan’ny Israely: Sambory i Mikaia ka ento miverina ho any amin’i Amona, mpifehy ny tanàna, sy ho any amin’i Joasy, zanaky ny mpanjaka '
  '26':
  - type: text
    content: 'ary lazao hoe: Izao no lazain’ny mpanjaka: Ataovy ao an-tranomaizina Ilehio ka fahano mofom-pijaliana sy ranom-pijaliana izy mandra-piveriko soa amantsara. '
  '27':
  - type: text
    content: 'Fa hoy i Mikaia: Raha toa ka ho tafaverina soa amantsara ianao dia tsy nampitenenin’NY TOMPO aho. Ary hoy koa izy: Samia mihaino izany ianareo, ry firenena rehetra.'
  - type: heading
    content: Maty an’ady i Ahaba mpanjaka
  - type: heading
    content: 1Mpa 22.29-35
  '28':
  - type: text
    content: 'Dia niakatra nankany Ramota-Gileada ny mpanjakan’ny Israely sy i Josafata, mpanjakan’ny Joda. '
  '29':
  - type: text
    content: 'Ary hoy ny mpanjakan’ny Israely tamin’i Josafata: Mody hanao olon-kafa aho ka hitsarapaka any anatin’ny ady, fa ianao kosa dia manaova ny fanamianao ihany. Dia nody olon-kafa ny mpanjakan’ny Israely ka nitsarapaka tany anatin’ny ady. '
  '3':
  - type: text
    content: 'Ary hoy i Ahaba, mpanjakan’ny Israely, tamin’i Josafata, mpanjakan’ny Joda: Mba hiaraka amiko ho any Ramota-Gileada va ianao? Dia hoy izy taminy: Eny, fa tahaka ny tenanao ihany aho ka ny oloko dia olonao; koa hiaraka aminao ho any an-tafika izahay.'
  - type: heading
    content: Manambara fandresena ireo mpaminanin’i Ahaba
  - type: heading
    content: 1Mpa 22.5-12
  '30':
  - type: text
    content: 'Fa ny mpanjakan’i Arama dia efa nandidy ireo lehiben’ny kalesy fitondrany miady hoe: Aza miady na amin’ny kely na amin’ny lehibe, afa-tsy amin’ny mpanjakan’ny Israely ihany.'
  '31':
  - type: text
    content: 'Nony nahita an’i Josafata ireo lehiben’ny kalesy fitondra miady dia hoy izy: Iny mihitsy no mpanjakan’ny Israely. Dia nohodidininy izy mba hasiany, kanjo niantsoantso i Josafata ary namonjy azy NY TOMPO; eny, Andriamanitra nampiala ireo teo aminy. '
  '32':
  - type: text
    content: 'Rehefa hitan’ireo lehiben’ny kalesy fitondra miady fa tsy izy no mpanjakan’ny Israely dia niverina niala taminy ireo. '
  '33':
  - type: text
    content: 'Ary nisy lehilahy iray nandefa anjoanjo zana-tsipìka ka nahavoa ny mpanjakan’ny Israely teo amin’ny fitohizan’ny fiarovan-tratrany; ary hoy izy tamin’ny lehiben’ny kalesiny: Ahodino ny kalesy fitondra miady ka ento miala eto amin’ny mpiady aho fa voa. '
  '34':
  - type: text
    content: Nihamafy ny ady tamin’izany andro izany; ary notohanana ny mpanjaka mba hijoro teo amin’ny kalesiny nanatrika ny Arameana mandra-paharivan’ny andro ny mpanjakan’ny Israely; nefa nony efa hilentika ny masoandro dia maty izy.
  '4':
  - type: text
    content: 'Hoy anefa i Josafata tamin’ny mpanjakan’ny Israely: Miangavy anao aho, anontanio aloha ny tenin’NY TOMPO. '
  '5':
  - type: text
    content: 'Ary ny mpanjakan’ny Israely dia nanangona ny mpaminany efajato lahy ka niteny taminy hoe: Handeha hanafika an’i Ramota-Gileada va isika, sa hijanona ihany aho? Dia hoy ireo: Mandehana fa hatolotr’Andriamanitra eo an-tananao izy, ry mpanjaka. '
  '6':
  - type: text
    content: 'Ary hoy kosa anefa i Josafata: Moa tsy misy mpaminanin’NY TOMPO koa va eto mba hanontaniantsika? '
  '7':
  - type: text
    content: 'Dia hoy ny mpanjakan’ny Israely tamin’i Josafata: Mbola misy lehilahy iray ihany ahazoantsika manontany amin’NY TOMPO, saingy halako izy, satria tsy mbola naminany soa ho ahy, fa loza ihany mandrakariva; I Mikaia, zanak’i Jimla, no anarany. Dia hoy i Josafata: Aza manao izany, ry mpanjaka. '
  '8':
  - type: text
    content: 'Ary niantso tandapa iray ny mpanjakan’ny Israely ka niteny taminy hoe: Antsoy haingana i Mikaia, zanak’i Jimla.'
  '9':
  - type: text
    content: 'Ary ny mpanjakan’ny Israely sy i Josafata, mpanjakan’ny Joda, dia samy nipetraka teo amin’ny sezafiandrianany avy teo amin’ny famoloana eo anoloan’ny vavahadin’i Samaria sady samy efa niakanjo ny fanamiany avy; ary ny mpaminany rehetra dia naminany teo anatrehany. '
