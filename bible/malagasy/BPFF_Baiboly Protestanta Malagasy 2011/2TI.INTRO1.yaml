document_id: 2TI.INTRO1
type_code: plt
segments:
- type: usfm
  marker: imt1
  children:
  - type: text
    text: INDRAY MIJERY
- type: usfm
  marker: ip
  children:
  - type: text
    text: Any am-ponja i Paoly no manoratra ity epistily faharoa ity. Araka ny lovantsofina dia notapahin-doha tamin’ny taona 67 izy, tamin’ilay fanenjehana nataon’i Neron.
- type: usfm
  marker: is1
  children:
  - type: text
    text: Ny votoatin’ny Epistily
- type: usfm
  marker: ip
  children:
  - type: text
    text: Efa manakaiky ny hahafatesan’i Paoly, koa ity epistily ity dia saika manana endrika didim-pananana ara-panahy, manafatrafatra mba hitahirizan’i Timoty ny zavatra tsara izay natolotr’i Paoly azy, hitomban-dahy amin’ny finoana ary tsy hitsahatra ny hitory ny teny sy hananatra.
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Ankoatra izay dia mbola hamafisin’i Paoly ny hafatra izay voalaza tao amin’ny epistily voalohany, ny amin’ny hanoherana ireo fampianaran-diso tafiditra ao amin’ny Fiangonana: Ny amin’ireo fampianarana sandoka, ireo mibedibedy foana, ny fitondrantena tsy mendrika, dia izay rehetra manohitra ny fahatahorana an’Andriamanitra.'
- type: usfm
  marker: iot
  children:
  - type: text
    text: Ny firafitry ny Epistily
- type: usfm
  marker: io1
  children:
  - type: text
    text: 'Fitarihanteny. Fiarahabana apostolika: 1.1-2'
- type: usfm
  marker: io1
  children:
  - type: text
    text: 'Fampahatsiarovana an’i Timoty mba hafana fo sy hitomban-dahy amin’ny fanompoana: 1.3–2.13'
- type: usfm
  marker: io1
  children:
  - type: text
    text: Fampahatsiarovana ny hijoroan’i Timoty eo anatrehan’ireo mpampianatra sandoka amin’ny andro farany. 2.14–4.5
- type: usfm
  marker: io1
  children:
  - type: text
    text: 'Famaranana, misy fanekem-pinoana lehibe sy hafatrafatra samihafa: 4.6-22'
