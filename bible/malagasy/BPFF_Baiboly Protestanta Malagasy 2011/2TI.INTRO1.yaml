document_id: 2TI.INTRO1,3103
type_code: plt
verses:
  '1':
  - type: text
    content: INDRAY MIJERY
  - type: text
    content: Any am-ponja i Paoly no manoratra ity epistily faharoa ity. Araka ny lovantsofina dia notapahin-doha tamin’ny taona 67 izy, tamin’ilay fanenjehana nataon’i Neron.
  - type: text
    content: Ny votoatin’ny Epistily
  - type: text
    content: Efa manakaiky ny hahafatesan’i Paoly, koa ity epistily ity dia saika manana endrika didim-pananana ara-panahy, manafatrafatra mba hitahirizan’i Timoty ny zavatra tsara izay natolotr’i Paoly azy, hitomban-dahy amin’ny finoana ary tsy hitsahatra ny hitory ny teny sy hananatra.
  - type: text
    content: 'Ankoatra izay dia mbola hamafisin’i Paoly ny hafatra izay voalaza tao amin’ny epistily voalohany, ny amin’ny hanoherana ireo fampianaran-diso tafiditra ao amin’ny Fiangonana: Ny amin’ireo fampianarana sandoka, ireo mibedibedy foana, ny fitondrantena tsy mendrika, dia izay rehetra manohitra ny fahatahorana an’Andriamanitra.'
  - type: text
    content: Ny firafitry ny Epistily
  - type: text
    content: 'Fitarihanteny. Fiarahabana apostolika: 1.1-2'
  - type: text
    content: 'Fampahatsiarovana an’i Timoty mba hafana fo sy hitomban-dahy amin’ny fanompoana: 1.3–2.13'
  - type: text
    content: Fampahatsiarovana ny hijoroan’i Timoty eo anatrehan’ireo mpampianatra sandoka amin’ny andro farany. 2.14–4.5
  - type: text
    content: 'Famaranana, misy fanekem-pinoana lehibe sy hafatrafatra samihafa: 4.6-22'
