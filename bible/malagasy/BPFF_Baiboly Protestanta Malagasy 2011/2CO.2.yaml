document_id: 2CO.2,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ny sitrapoko dia ny tsy hiverenako any aminareo indray amin’alahelo. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Fa izay avelanareo heloka dia mba avelako heloka koa; ary izaho anefa, raha nisy heloka navelako dia noho ny aminareo no namelako azy teo imason’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ', '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: fandrao ho resin’ny fitak’i Satana isika, fa fantatsika ny teti-dratsiny.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny ahiahin’i Paoly tany Troasy
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Ary rehefa tonga tany Troasy hitory ny Filazantsaran’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ' aho ka novohana varavarana ao amin’ny Tompo '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: dia tsy tafandry mandry aho satria tsy nahita an’i Titosy rahalahiko; ary nanao veloma ny olona aho, dia niala teo nankany Makedonia.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fandresena ao amin’ny Kristy
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Fa isaorana anie Andriamanitra izay mitondra anay mandrakariva ao amin’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ' toy ny fanaon’izay avy nandresy ka ampisehoany ny hanitry ny fahalalana Azy eny tontolo eny izahay. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Fa hanitr’i Kristy ho an’Andriamanitra izahay amin’izay hovonjena sy izay ho very: '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Amin’ny sasany dia hanitra avy amin’ny fahafatesana ho amin’ny fahafatesana; fa amin’ny sasany kosa dia hanitra avy amin’ny fiainana ho amin’ny fiainana. Koa iza moa no antonona ho amin’izany zavatra izany? '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Fa tsy mba toy ny maro izay manatsatso ny tenin’Andriamanitra hahazoam-bola izahay; fa toy ny amin’ny fahadiovam-po kosa, dia avy amin’Andriamanitra, sady eo anatrehan’Andriamanitra no itenenanay ao amin’i Kristy.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Fa raha mampalahelo anareo aho, iza moa no mampifaly ahy, afa-tsy ilay nampalaheloviko ihany? '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Ary nanoratra izany indrindra aho, fandrao rehefa tonga aho dia hahazo alahelo amin’izay tokony hifaliako, satria matoky anareo rehetra aho, fa ny fifaliako dia anareo rehetra koa. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Fa tamin’ny haben’ny fahoriana sy ny alahelon’ny foko no nanoratako taminareo tamin’ny ranomaso be, tsy ny hampalahelovana anareo fa ny mba hahafantaranareo ny fitiavana izay itiavako anareo manokana.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mamela heloka ny diso
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Fa raha nisy nahatonga alahelo dia tsy izaho no nampalaheloviny fa ianareo rehetra, nefa mba tsy ho tafahoatra loatra ny teniko, dia ny sasany aminareo. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ampy ho an’izany olona izany ny fampijaliana nataon’ny maro, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'koa aleo kosa ianareo mamela heloka sy mampifaly azy, fandrao dia kivin’ny alahelo tafahoatra izany olona izany. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Koa mananatra anareo aho mba hekenareo ny handray azy tsara amin’ny fitiavana. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Fa izany koa no nanoratako mba ho fantatro izay toetranareo, na mankatò amin’ny zavatra rehetra ianareo, na tsia. '
