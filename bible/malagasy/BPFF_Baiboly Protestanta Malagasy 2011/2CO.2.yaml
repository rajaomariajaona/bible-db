document_id: 2CO.2,3103
type_code: plt
verses:
  '1':
  - type: text
    content: 'Ny sitrapoko dia ny tsy hiverenako any aminareo indray amin’alahelo. '
  '10':
  - type: text
    content: 'Fa izay avelanareo heloka dia mba avelako heloka koa; ary izaho anefa, raha nisy heloka navelako dia noho ny aminareo no namelako azy teo imason’i '
  - type: text
    content: Kristy
  - type: text
    content: ', '
  '11':
  - type: text
    content: fandrao ho resin’ny fitak’i Satana isika, fa fantatsika ny teti-dratsiny.
  - type: heading
    content: Ny ahiahin’i Paoly tany Troasy
  '12':
  - type: text
    content: 'Ary rehefa tonga tany Troasy hitory ny Filazantsaran’i '
  - type: text
    content: Kristy
  - type: text
    content: ' aho ka novohana varavarana ao amin’ny Tompo '
  '13':
  - type: text
    content: dia tsy tafandry mandry aho satria tsy nahita an’i Titosy rahalahiko; ary nanao veloma ny olona aho, dia niala teo nankany Makedonia.
  - type: heading
    content: Ny fandresena ao amin’ny Kristy
  '14':
  - type: text
    content: 'Fa isaorana anie Andriamanitra izay mitondra anay mandrakariva ao amin’i '
  - type: text
    content: Kristy
  - type: text
    content: ' toy ny fanaon’izay avy nandresy ka ampisehoany ny hanitry ny fahalalana Azy eny tontolo eny izahay. '
  '15':
  - type: text
    content: 'Fa hanitr’i Kristy ho an’Andriamanitra izahay amin’izay hovonjena sy izay ho very: '
  '16':
  - type: text
    content: 'Amin’ny sasany dia hanitra avy amin’ny fahafatesana ho amin’ny fahafatesana; fa amin’ny sasany kosa dia hanitra avy amin’ny fiainana ho amin’ny fiainana. Koa iza moa no antonona ho amin’izany zavatra izany? '
  '17':
  - type: text
    content: Fa tsy mba toy ny maro izay manatsatso ny tenin’Andriamanitra hahazoam-bola izahay; fa toy ny amin’ny fahadiovam-po kosa, dia avy amin’Andriamanitra, sady eo anatrehan’Andriamanitra no itenenanay ao amin’i Kristy.
  '2':
  - type: text
    content: 'Fa raha mampalahelo anareo aho, iza moa no mampifaly ahy, afa-tsy ilay nampalaheloviko ihany? '
  '3':
  - type: text
    content: 'Ary nanoratra izany indrindra aho, fandrao rehefa tonga aho dia hahazo alahelo amin’izay tokony hifaliako, satria matoky anareo rehetra aho, fa ny fifaliako dia anareo rehetra koa. '
  '4':
  - type: text
    content: Fa tamin’ny haben’ny fahoriana sy ny alahelon’ny foko no nanoratako taminareo tamin’ny ranomaso be, tsy ny hampalahelovana anareo fa ny mba hahafantaranareo ny fitiavana izay itiavako anareo manokana.
  - type: heading
    content: Mamela heloka ny diso
  '5':
  - type: text
    content: 'Fa raha nisy nahatonga alahelo dia tsy izaho no nampalaheloviny fa ianareo rehetra, nefa mba tsy ho tafahoatra loatra ny teniko, dia ny sasany aminareo. '
  '6':
  - type: text
    content: 'Ampy ho an’izany olona izany ny fampijaliana nataon’ny maro, '
  '7':
  - type: text
    content: 'koa aleo kosa ianareo mamela heloka sy mampifaly azy, fandrao dia kivin’ny alahelo tafahoatra izany olona izany. '
  '8':
  - type: text
    content: 'Koa mananatra anareo aho mba hekenareo ny handray azy tsara amin’ny fitiavana. '
  '9':
  - type: text
    content: 'Fa izany koa no nanoratako mba ho fantatro izay toetranareo, na mankatò amin’ny zavatra rehetra ianareo, na tsia. '
