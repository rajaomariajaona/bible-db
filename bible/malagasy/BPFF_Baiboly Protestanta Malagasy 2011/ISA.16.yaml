document_id: ISA.16,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ireo voaroaka tao Moaba
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Anatero zanak’ondry ny mpanapaka amin’ny tany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hatreo Sela ka manerana ny tany efitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'hatrany amin’ny tendrombohitr’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Ziona
    - type: text
      text: ' zanakavavy.'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy ahitana ny hafaliana sy ny haravoravoana any amin’ny sahan-kazo fihinam-boa;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy misy hoby na horakoraka ao amin’ny tanim-boaloboka!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy hanosihosy divay ao amin’ny famiazana intsony ny mpanosihosy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: efa natsahatro ny horakoraka fanao raha mioty voaloboka.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Noho izany dia mitaraina manao feon-dokanga ny ato anatiko noho ny amin’i Moaba
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary malahelo ny foko noho ny amin’i Kira-Haresa.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miseho i Moaba, sasatra ao amin’ny toerana fanaovana sorona izy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mankao amin’ny fitoerany masina izy mba hivavaka nefa tsy mahazo na inona na inona.
  '13':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Izany no tenin’NY TOMPO nataony fahiny ny amin’i Moaba. '
  '14':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Ankehitriny kosa dia hoy NY TOMPO hoe: Raha afaka telo taona, tahaka ny taonan’ny mpikarama, dia ho tsinontsinona ny voninahitr’i Moaba. Na dia betsaka aza ny vahoakany dia ho vitsy sisa; eny, ho vitsy foana ka tsy misy lanjany.'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tahaka ny vorona notairina niala tamin’ny akaniny ka mirenireny foana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho toy izany ny zanakavavin’i Moaba ao amin’ny fitàna any Arnona.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manolora saina, mandraisa fanapahan-kevitra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ataovy tahaka ny alina ny alokao, na dia amin’ny andro mitataovovonana aza;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: afeno izay voaroaka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary aza aseho izay mandositra!
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka hitoetra ao aminao izay oloko voaroaka, ry Moaba!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka ho fiereny ianao mba tsy ho azon’ny mpandringana azy izy!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa tsy misy intsony ny mpampahory;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tapitra ny loza,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy misy amin’ny tany intsony ny mpanosihosy.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hisy sezafiandrianana hampitoerina amin’ny famindrampo.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hisy hipetraka amin’ny fahamarinana eo aminy ao an-dain’i Davida,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hitsara sy handinika izay marina izy sady ho haingam-pamoaka fitsarana marina.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fitomaniana an’i Moaba
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Efa renay ny fiavonavonan’i Moaba;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fatra-piavonavona loatra izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mirehareha sy miavonavona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: manao vava tafahoatra ary miteniteny foana.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Noho izany dia hidradradradra amin’i Moaba i Moaba; eny, samy hidradradradra avokoa izy rehetra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hitomany ny faharavan’i Kira-Hareseta ianareo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka ho ory indrindra.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa malazo ny sahan’i Hesbona;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: norantsanan’ny andrianan’ny firenena ny voalobok’i Sibma
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay tonga hatrany Jazera
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy nisandrahaka tany an-tany efitra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nandadilady ny sampany ka tafita ny ranomasina.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa izany no hitomaniako ny voalobok’i Sibma,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toy ny fitomanian’i Jazera,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: handena anao amin’ny ranomasoko aho, ry Hesbona sy Elale,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria eo amin’ny vokatrao lohataona sy ny fararanonao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia tsy misy ny horakoraka fanao raha mioty voaloboka.
