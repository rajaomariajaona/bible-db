document_id: ISA.16,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ireo voaroaka tao Moaba
  - type: text
    content: Anatero zanak’ondry ny mpanapaka amin’ny tany,
  - type: text
    content: hatreo Sela ka manerana ny tany efitra
  - type: text
    content: 'hatrany amin’ny tendrombohitr’i '
  - type: text
    content: Ziona
  - type: text
    content: ' zanakavavy.'
  '10':
  - type: text
    content: Tsy ahitana ny hafaliana sy ny haravoravoana any amin’ny sahan-kazo fihinam-boa;
  - type: text
    content: tsy misy hoby na horakoraka ao amin’ny tanim-boaloboka!
  - type: text
    content: Tsy hanosihosy divay ao amin’ny famiazana intsony ny mpanosihosy;
  - type: text
    content: efa natsahatro ny horakoraka fanao raha mioty voaloboka.
  '11':
  - type: text
    content: Noho izany dia mitaraina manao feon-dokanga ny ato anatiko noho ny amin’i Moaba
  - type: text
    content: ary malahelo ny foko noho ny amin’i Kira-Haresa.
  '12':
  - type: text
    content: Miseho i Moaba, sasatra ao amin’ny toerana fanaovana sorona izy.
  - type: text
    content: Mankao amin’ny fitoerany masina izy mba hivavaka nefa tsy mahazo na inona na inona.
  '13':
  - type: text
    content: 'Izany no tenin’NY TOMPO nataony fahiny ny amin’i Moaba. '
  '14':
  - type: text
    content: 'Ankehitriny kosa dia hoy NY TOMPO hoe: Raha afaka telo taona, tahaka ny taonan’ny mpikarama, dia ho tsinontsinona ny voninahitr’i Moaba. Na dia betsaka aza ny vahoakany dia ho vitsy sisa; eny, ho vitsy foana ka tsy misy lanjany.'
  '2':
  - type: text
    content: Tahaka ny vorona notairina niala tamin’ny akaniny ka mirenireny foana,
  - type: text
    content: ho toy izany ny zanakavavin’i Moaba ao amin’ny fitàna any Arnona.
  '3':
  - type: text
    content: Manolora saina, mandraisa fanapahan-kevitra,
  - type: text
    content: ataovy tahaka ny alina ny alokao, na dia amin’ny andro mitataovovonana aza;
  - type: text
    content: afeno izay voaroaka
  - type: text
    content: ary aza aseho izay mandositra!
  '4':
  - type: text
    content: Aoka hitoetra ao aminao izay oloko voaroaka, ry Moaba!
  - type: text
    content: Aoka ho fiereny ianao mba tsy ho azon’ny mpandringana azy izy!
  - type: text
    content: Fa tsy misy intsony ny mpampahory;
  - type: text
    content: tapitra ny loza,
  - type: text
    content: tsy misy amin’ny tany intsony ny mpanosihosy.
  '5':
  - type: text
    content: Ary hisy sezafiandrianana hampitoerina amin’ny famindrampo.
  - type: text
    content: Hisy hipetraka amin’ny fahamarinana eo aminy ao an-dain’i Davida,
  - type: text
    content: ary hitsara sy handinika izay marina izy sady ho haingam-pamoaka fitsarana marina.
  - type: heading
    content: Fitomaniana an’i Moaba
  '6':
  - type: text
    content: Efa renay ny fiavonavonan’i Moaba;
  - type: text
    content: fatra-piavonavona loatra izy,
  - type: text
    content: mirehareha sy miavonavona,
  - type: text
    content: manao vava tafahoatra ary miteniteny foana.
  '7':
  - type: text
    content: Noho izany dia hidradradradra amin’i Moaba i Moaba; eny, samy hidradradradra avokoa izy rehetra;
  - type: text
    content: hitomany ny faharavan’i Kira-Hareseta ianareo
  - type: text
    content: ka ho ory indrindra.
  '8':
  - type: text
    content: Fa malazo ny sahan’i Hesbona;
  - type: text
    content: norantsanan’ny andrianan’ny firenena ny voalobok’i Sibma
  - type: text
    content: izay tonga hatrany Jazera
  - type: text
    content: sy nisandrahaka tany an-tany efitra;
  - type: text
    content: nandadilady ny sampany ka tafita ny ranomasina.
  '9':
  - type: text
    content: Koa izany no hitomaniako ny voalobok’i Sibma,
  - type: text
    content: toy ny fitomanian’i Jazera,
  - type: text
    content: handena anao amin’ny ranomasoko aho, ry Hesbona sy Elale,
  - type: text
    content: satria eo amin’ny vokatrao lohataona sy ny fararanonao
  - type: text
    content: dia tsy misy ny horakoraka fanao raha mioty voaloboka.
