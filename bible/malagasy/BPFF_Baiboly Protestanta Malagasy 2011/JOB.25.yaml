document_id: JOB.25,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Ny teny fanintelony nataon’i Bildada: Tsy azo atao ny mifandahatra amin’ny Tsitoha'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Dia nandray fitenenana i Bildada sohita hoe:'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Fahefana sy fampahatahorana no ao Aminy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: manao fihavanana any amin’ny avo Izy.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Azo isaina va ny miaramilany?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary iza no tsy iantefan’ny fahazavany?
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Ahoana no hahamarina ny zanak’olombelona eo anatrehan’Andriamanitra?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ahoana no hampadio izay tera-behivavy?
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Indro, ny volana aza dia tsy mangarangarana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny kintana aza dia tsy madio eo imasony;
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: koa mainka fa ny olombelona izay kankana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny zanak’olombelona izay olitra fotsiny!
