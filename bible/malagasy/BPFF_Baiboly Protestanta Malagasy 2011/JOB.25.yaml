document_id: JOB.25,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: 'Ny teny fanintelony nataon’i Bildada: Tsy azo atao ny mifandahatra amin’ny Tsitoha'
  - type: text
    content: 'Dia nandray fitenenana i Bildada sohita hoe:'
  '2':
  - type: text
    content: Fahefana sy fampahatahorana no ao Aminy;
  - type: text
    content: manao fihavanana any amin’ny avo Izy.
  '3':
  - type: text
    content: Azo isaina va ny miaramilany?
  - type: text
    content: Ary iza no tsy iantefan’ny fahazavany?
  '4':
  - type: text
    content: Ahoana no hahamarina ny zanak’olombelona eo anatrehan’Andriamanitra?
  - type: text
    content: Ary ahoana no hampadio izay tera-behivavy?
  '5':
  - type: text
    content: Indro, ny volana aza dia tsy mangarangarana
  - type: text
    content: ary ny kintana aza dia tsy madio eo imasony;
  '6':
  - type: text
    content: koa mainka fa ny olombelona izay kankana
  - type: text
    content: ary ny zanak’olombelona izay olitra fotsiny!
