document_id: ACT.22,3103
type_code: plt
verses:
  '1':
  - type: text
    content: Ry rahalahy sy ianareo ray, henoy ny teny halahatro aminareo ankehitriny hanala tsiny ny tenako.
  '10':
  - type: text
    content: 'Hoy indray aho: Tompoko, inona no hataoko? Ary hoy ny Tompo tamiko: Mitsangàna ka mandehana ho any Damaskosy; fa any no holazaina aminao izay rehetra voatendry hataonao. '
  '11':
  - type: text
    content: Raha tsy nahajery noho ny famirapiratan’ilay hazavana aho dia notantanan’ireo niaraka tamiko ary tonga tany Damaskosy.
  '12':
  - type: text
    content: 'Ary ny lehilahy iray antsoina hoe Ananiasy, mpivavaka manaraka ny lalàna sady tsara laza teo amin’ny '
  - type: text
    content: Jiosy
  - type: text
    content: ' rehetra izay nonina teo, '
  '13':
  - type: text
    content: 'dia nanatona ahy ary nitsangana ka niteny tamiko hoe: Ry Saoly rahalahy, mahirata. Ary tamin’izany ora izany dia nahiratra aho ka nahita azy. '
  '14':
  - type: text
    content: 'Dia hoy izy: Andriamanitry ny razantsika efa nanendry anao hahafantatra ny sitrapony sy hahita Ilay Marina ary hihaino ny teny aloaky ny vavany; '
  '15':
  - type: text
    content: 'fa ho vavolombelony amin’ny olona rehetra ianao ny amin’izay efa hitanao sy renao. '
  '16':
  - type: text
    content: Ary ankehitriny, inona no andrasanao? Mitsangàna, aoka ianao hatao batisa ka hosasana ho afaka amin’ny fahotanao amin’ny fiantsoanao ny anarany.
  - type: heading
    content: Mitantara ny fanirahana azy any amin’ny Jentilisa i Paoly
  '17':
  - type: text
    content: 'Ary rehefa tonga tany Jerosalema indray aho ka nivavaka teo amin’ny '
  - type: text
    content: tempoly
  - type: text
    content: ' dia azon-tsindrimandry '
  '18':
  - type: text
    content: 'ka nahita Azy nilaza tamiko hoe: Malakisa ianao, mialà haingana eto Jerosalema; fa tsy handray ny fanambarànao Ahy izy. '
  '19':
  - type: text
    content: 'Dia hoy aho: Tompoko, izy ireo dia mahalala fa ny mino Anao dia nataoko tao an-tranomaizina sady nokapohiko tao amin’ny '
  - type: text
    content: sinagoga
  - type: text
    content: ' rehetra; '
  '2':
  - type: text
    content: 'Nony ren’ny olona fa teny hebreo no nitenenany taminy dia vao mainka nangina izy ireo ka hoy i Paoly:'
  - type: heading
    content: Asa 9.1-29; 26.9-20
  '20':
  - type: text
    content: 'ary raha nalatsaka ny ran’i Stefana maritioranao dia mba nitsangana teo koa aho ka nankasitraka sady niambina ny fitafian’ireo izay namono azy. '
  '21':
  - type: text
    content: 'Hoy Izy tamiko: Mandehana, fa Izaho haniraka anao handeha lavitra any amin’ny '
  - type: text
    content: Jentilisa
  - type: text
    content: .
  - type: heading
    content: I Paoly sy ilay mpifehy arivo
  '22':
  - type: text
    content: 'Nihaino azy hatramin’izany teny izany ny olona dia nanandratra ny feony ka niteny hoe: Esory amin’ny tany Ilehio fa tsy tokony hovelomina! '
  '23':
  - type: text
    content: 'Dia niantsoantso izy ireo sady nanala ny fitafiany ary nanipy vovoka ho amin’ny rivotra '
  '24':
  - type: text
    content: 'ka nanome baiko ny mpifehy arivo mba hoentina any an-dapa i Paoly, ary mba hadinina amin’ny kapoka izy, hahafantarany izay fototry ny nanakoran’ny olona azy toy izany. '
  '25':
  - type: text
    content: 'Raha namatotra azy tamin’ny kofehy hoditra izy dia hoy i Paoly tamin’ny kapiteny izay nitsangana teo: Azonareo atao va ny mikapoka lehilahy romana izay tsy mbola nohelohina? '
  '26':
  - type: text
    content: 'Nony nahare izany ilay kapiteny dia lasa nilaza tamin’ny mpifehy arivo hoe: Inona izao no hataonao fa Romana io lehilahy io? '
  '27':
  - type: text
    content: 'Dia nankeo aminy ny mpifehy arivo ka niteny taminy hoe: Lazao amiko: Romana va ianao? Dia hoy izy: Eny. '
  '28':
  - type: text
    content: 'Hoy ilay mpifehy arivo: Vola be no nahazoako izany zo izany. Fa hoy i Paoly: Izaho kosa efa nanana izany hatry ny fony vao teraka. '
  '29':
  - type: text
    content: Dia nandao azy haingana ireo olona efa handeha hanadina azy; natahotra koa ny mpifehy arivo, rehefa nahalala fa Romana izy, satria efa nampamatotra azy.
  - type: heading
    content: I Paoly teo anatrehan’ny Sinedriona
  '3':
  - type: text
    content: 'Lehilahy jiosy aho, teraka tany Tarsosy any Kilikia, nefa teto amin’ity tanàna ity no nahabe ahy teo anilan’ny tongotr’i Gamaliela ka nampianarina tsara ny lalàna avy tamin’ny razana aho ary saro-piaro tokoa tamin’Andriamanitra tahaka anareo rehetra ireo ankehitriny. '
  '30':
  - type: text
    content: 'Nony ampitso, satria ta hahafantatra marina izay niampangan’ny '
  - type: text
    content: Jiosy
  - type: text
    content: ' azy ny mpifehy arivo, dia namaha azy, ary nasainy nivory ny lehiben’ny mpisorona sy ny '
  - type: text
    content: Sinedriona
  - type: text
    content: ' rehetra, dia noentiny nidina i Paoly ka napetrany teo anatrehany.'
  '4':
  - type: text
    content: 'Nanenjika izay nanaiky izany fampianarana izany aho na hahafaty azy aza izany, ary namatotra azy, na lahy na vavy ka nanolotra azy hatao an-tranomaizina; '
  '5':
  - type: text
    content: 'ny '
  - type: text
    content: Mpisoronabe
  - type: text
    content: ' sy ny loholona rehetra no vavolombeloko, sady izy no nandraisako taratasy ho any amin’ny rahalahy, dia nankany Damaskosy aho mba hoentiko mifatotra hankany Jerosalema koa ireo izay hita tany mba hofaizina.'
  - type: heading
    content: Mitantara ny fiovam-pony i Paoly
  '6':
  - type: text
    content: 'Ary raha nandeha aho ka efa nanakaiky an’i Damaskosy, tamin’ilay mitataovovonana iny, dia nisy mazava lehibe nanelatselatra tampoka avy tany an-danitra manodidina ahy '
  '7':
  - type: text
    content: 'ka lavo tamin’ny tany aho ary nandre feo niteny tamiko hoe: Saoly! Saoly! Nahoana no manenjika Ahy ianao? '
  '8':
  - type: text
    content: 'Dia hoy aho: Iza moa Ianao, Tompoko? Ary hoy Izy tamiko: Izaho no Jesosy avy any Nazareta, izay enjehinao. '
  '9':
  - type: text
    content: 'Ireo izay niaraka tamiko dia nahita ny mazava, fa tsy mba nahare ny feon’Ilay niteny tamiko. '
