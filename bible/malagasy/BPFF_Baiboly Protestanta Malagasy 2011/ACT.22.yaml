document_id: ACT.22
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ry rahalahy sy ianareo ray, henoy ny teny halahatro aminareo ankehitriny hanala tsiny ny tenako.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Nony ren’ny olona fa teny hebreo no nitenenany taminy dia vao mainka nangina izy ireo ka hoy i Paoly:'
- type: usfm
  marker: r
  children:
  - type: text
    text: Asa 9.1-29; 26.9-20
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Lehilahy jiosy aho, teraka tany Tarsosy any Kilikia, nefa teto amin’ity tanàna ity no nahabe ahy teo anilan’ny tongotr’i Gamaliela ka nampianarina tsara ny lalàna avy tamin’ny razana aho ary saro-piaro tokoa tamin’Andriamanitra tahaka anareo rehetra ireo ankehitriny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Nanenjika izay nanaiky izany fampianarana izany aho na hahafaty azy aza izany, ary namatotra azy, na lahy na vavy ka nanolotra azy hatao an-tranomaizina; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Mpisoronabe
  - type: text
    text: ' sy ny loholona rehetra no vavolombeloko, sady izy no nandraisako taratasy ho any amin’ny rahalahy, dia nankany Damaskosy aho mba hoentiko mifatotra hankany Jerosalema koa ireo izay hita tany mba hofaizina.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mitantara ny fiovam-pony i Paoly
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary raha nandeha aho ka efa nanakaiky an’i Damaskosy, tamin’ilay mitataovovonana iny, dia nisy mazava lehibe nanelatselatra tampoka avy tany an-danitra manodidina ahy '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'ka lavo tamin’ny tany aho ary nandre feo niteny tamiko hoe: Saoly! Saoly! Nahoana no manenjika Ahy ianao? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dia hoy aho: Iza moa Ianao, Tompoko? Ary hoy Izy tamiko: Izaho no Jesosy avy any Nazareta, izay enjehinao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ireo izay niaraka tamiko dia nahita ny mazava, fa tsy mba nahare ny feon’Ilay niteny tamiko. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Hoy indray aho: Tompoko, inona no hataoko? Ary hoy ny Tompo tamiko: Mitsangàna ka mandehana ho any Damaskosy; fa any no holazaina aminao izay rehetra voatendry hataonao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Raha tsy nahajery noho ny famirapiratan’ilay hazavana aho dia notantanan’ireo niaraka tamiko ary tonga tany Damaskosy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary ny lehilahy iray antsoina hoe Ananiasy, mpivavaka manaraka ny lalàna sady tsara laza teo amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jiosy
  - type: text
    text: ' rehetra izay nonina teo, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'dia nanatona ahy ary nitsangana ka niteny tamiko hoe: Ry Saoly rahalahy, mahirata. Ary tamin’izany ora izany dia nahiratra aho ka nahita azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dia hoy izy: Andriamanitry ny razantsika efa nanendry anao hahafantatra ny sitrapony sy hahita Ilay Marina ary hihaino ny teny aloaky ny vavany; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'fa ho vavolombelony amin’ny olona rehetra ianao ny amin’izay efa hitanao sy renao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ary ankehitriny, inona no andrasanao? Mitsangàna, aoka ianao hatao batisa ka hosasana ho afaka amin’ny fahotanao amin’ny fiantsoanao ny anarany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mitantara ny fanirahana azy any amin’ny Jentilisa i Paoly
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary rehefa tonga tany Jerosalema indray aho ka nivavaka teo amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tempoly
  - type: text
    text: ' dia azon-tsindrimandry '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'ka nahita Azy nilaza tamiko hoe: Malakisa ianao, mialà haingana eto Jerosalema; fa tsy handray ny fanambarànao Ahy izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Dia hoy aho: Tompoko, izy ireo dia mahalala fa ny mino Anao dia nataoko tao an-tranomaizina sady nokapohiko tao amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sinagoga
  - type: text
    text: ' rehetra; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'ary raha nalatsaka ny ran’i Stefana maritioranao dia mba nitsangana teo koa aho ka nankasitraka sady niambina ny fitafian’ireo izay namono azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Hoy Izy tamiko: Mandehana, fa Izaho haniraka anao handeha lavitra any amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jentilisa
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: I Paoly sy ilay mpifehy arivo
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Nihaino azy hatramin’izany teny izany ny olona dia nanandratra ny feony ka niteny hoe: Esory amin’ny tany Ilehio fa tsy tokony hovelomina! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Dia niantsoantso izy ireo sady nanala ny fitafiany ary nanipy vovoka ho amin’ny rivotra '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'ka nanome baiko ny mpifehy arivo mba hoentina any an-dapa i Paoly, ary mba hadinina amin’ny kapoka izy, hahafantarany izay fototry ny nanakoran’ny olona azy toy izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Raha namatotra azy tamin’ny kofehy hoditra izy dia hoy i Paoly tamin’ny kapiteny izay nitsangana teo: Azonareo atao va ny mikapoka lehilahy romana izay tsy mbola nohelohina? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Nony nahare izany ilay kapiteny dia lasa nilaza tamin’ny mpifehy arivo hoe: Inona izao no hataonao fa Romana io lehilahy io? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Dia nankeo aminy ny mpifehy arivo ka niteny taminy hoe: Lazao amiko: Romana va ianao? Dia hoy izy: Eny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Hoy ilay mpifehy arivo: Vola be no nahazoako izany zo izany. Fa hoy i Paoly: Izaho kosa efa nanana izany hatry ny fony vao teraka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Dia nandao azy haingana ireo olona efa handeha hanadina azy; natahotra koa ny mpifehy arivo, rehefa nahalala fa Romana izy, satria efa nampamatotra azy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: I Paoly teo anatrehan’ny Sinedriona
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Nony ampitso, satria ta hahafantatra marina izay niampangan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jiosy
  - type: text
    text: ' azy ny mpifehy arivo, dia namaha azy, ary nasainy nivory ny lehiben’ny mpisorona sy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Sinedriona
  - type: text
    text: ' rehetra, dia noentiny nidina i Paoly ka napetrany teo anatrehany.'
