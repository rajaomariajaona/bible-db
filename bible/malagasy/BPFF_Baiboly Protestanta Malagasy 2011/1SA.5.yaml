document_id: 1SA.5,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Tany amin’ny Filistina ny vata misy ny faneken’Andriamanitra
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nalain’ny Filistina ny vata misy ny faneken’Andriamanitra ka noentiny niala tany Ebenezera ho any Asdoda. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia naterin’ny olona nankany Ekrona ny vata misy ny faneken’Andriamanitra. Ary raha vao tonga tany Ekrona ny vata misy ny faneken’Andriamanitra dia nitaraina ny Ekronita hoe: Nafindran’ny olona ho atỳ amintsika ny vata misy ny faneken’ny Andriamanitry ny Israely mba hahafaty antsika sy ny firenentsika. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nandefa iraka izy hanangona ireo mpitondra rehetra tamin’ny Filistina ka hiteny hoe: Alefaso hiala eto ny vata misy ny faneken’ny Andriamanitry ny Israely, ary aoka haverina any amin’ny toerany izy mba tsy hahafaty antsika sy ny firenentsika. Nanerana ny tanàna mantsy ny horohoron’ny fahafatesana, satria navesatra tao tokoa ny tanan’Andriamanitra. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny olona izay tsy maty dia voan’ny vay, ary niakatra ho any an-danitra ny fitarainan’ny tao an-tanàna.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nony azon’ny Filistina ny vata misy ny faneken’Andriamanitra dia noentiny tao an-tranon’i Dagona
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Dagona: '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: Anaran-tsampy siriana izay nivavahan’ny Filistina.
      marker-yv: yv-n
    - type: text
      text: ' ka napetrany teo anilany. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nony ampitson’iny dia nifoha vao maraina ny Asdodita ka indro i Dagona potraka niankohoka tamin’ny tany, teo anoloan’ny vata misy ny faneken’NY TOMPO; dia narenin’ny olona izy ka naveriny teo amin’ny fitoerany indray. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny ampitson’iny indray dia nifoha vao maraina ny olona ka indro i Dagona potraka niankohoka tamin’ny tany indray, teo anoloan’ny vata misy ny faneken’NY TOMPO, ary tapaka teo amin’ny tokonam-baravarana ny lohan’i Dagona sy ny felatanany roa, fa ny tenabeny ihany no sisa. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izany no tsy anitsahan’ny mpisoron’i Dagona, na izay miditra ao an-tranony, ny tokonam-baravaran’i Dagona ao Asdoda, mandraka androany.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nitambesatra tamin’ny Asdodita ny tanan’NY TOMPO, fa nandringana azy Izy; nasiany vay ny tao Asdoda sy ny tany amin’ny taniny rehetra. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa hitan’ny mponina tao Asdoda fa izany no zava-nitranga dia hoy izy: Aoka tsy hitoetra eto amintsika intsony ny vata misy ny faneken’ny Andriamanitry ny Israely, fa mitambesatra amintsika sy amin’i Dagona andriamanitsika ny tanany. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nandefa iraka izy hanangona ireo andrianan’ny Filistina rehetra hankeo aminy hiteny hoe: Hataontsika ahoana ny vata misy ny faneken’ny Andriamanitry ny Israely? Dia hoy ireo: Aoka hafindra hankany Gata ny vata misy ny faneken’ny Andriamanitry ny Israely. Dia nafindrany ny vata misy ny faneken’ny Andriamanitry ny Israely. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa voafindra anefa ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: vata misy ny Fanekena
    - type: text
      text: ' dia namely ny tanàna ny tanan’NY TOMPO ka nampangorohoro azy indrindra, fa Izy namely ny mponina tao an-tanàna, na kely na lehibe, ka nisy vay nipoipoitra tamin’izy ireo. '
