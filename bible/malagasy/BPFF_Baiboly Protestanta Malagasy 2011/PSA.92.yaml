document_id: PSA.92,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Tsara ny midera NY TOMPO
  - type: text
    content: Salamo. Tononkira fanao amin’ny andro Sabata.
  - type: text
    content: Tsara ny midera NY TOMPO
  - type: text
    content: sy ny hankalaza ny anaranao, ry Avo Indrindra ô,
  '10':
  - type: text
    content: 'Fa ny '
  - type: text
    content: tandroko
  - type: text
    content: ' kosa dia asandratrao ho tahaka ny an’ny ombimanga;'
  - type: text
    content: mihosotra diloilo vaovao aho.
  '11':
  - type: text
    content: Faly ny masoko mahita ny amin’ny fahavaloko
  - type: text
    content: ary finaritra ny sofiko
  - type: text
    content: mandre ny amin’ny ratsy fanahy izay mitsangana hamely ahy.
  '12':
  - type: text
    content: Ny marina dia hamololona tahaka ny palma,
  - type: text
    content: hisandrahaka tahaka ny sedera any Libanona izy.
  '13':
  - type: text
    content: Nambolena tao amin’ny tranon’NY TOMPO izy
  - type: text
    content: ka maniry eo an-kianjan’Andriamanitsika;
  '14':
  - type: text
    content: mbola manorobona ihany izy na dia efa antitra aza;
  - type: text
    content: dofodofotra sy maitso izy
  '15':
  - type: text
    content: mba hanambara fa mahitsy NY TOMPO,
  - type: text
    content: Vatolampiko izay tsy misy tsiny.
  '2':
  - type: text
    content: ary hanambara ny famindramponao nony maraina
  - type: text
    content: sy ny fahamarinanao nony alina,
  '3':
  - type: text
    content: amin’ny valiha tory folo
  - type: text
    content: sy amin’ny feon-dokanga.
  '4':
  - type: text
    content: Ampifalinao amin’ny nataonao aho, TOMPO ô;
  - type: text
    content: ny asan’ny tananao no hihobiako.
  '5':
  - type: text
    content: TOMPO ô, akory ny halehiben’ny asanao!
  - type: text
    content: Manao ahoana ny halalin’ny fisainanao!
  '6':
  - type: text
    content: Ny ketrina dia tsy mahafantatra izany
  - type: text
    content: ary ny adala koa dia tsy mba mahalala.
  '7':
  - type: text
    content: Raha mitsiry tahaka ny ahitra ny ratsy fanahy
  - type: text
    content: ary mamony ny mpanao ratsy rehetra
  - type: text
    content: dia izany ihany no ho fandringanana azy mandrakizay.
  '8':
  - type: text
    content: Nefa Ianao, TOMPO ô, any amin’ny avo,
  - type: text
    content: dia maharitra mandrakizay!
  '9':
  - type: text
    content: Fa indreo ny fahavalonao, TOMPO ô,
  - type: text
    content: indreo, ringana ny fahavalonao;
  - type: text
    content: mihahaka ny mpanao ratsy rehetra.
