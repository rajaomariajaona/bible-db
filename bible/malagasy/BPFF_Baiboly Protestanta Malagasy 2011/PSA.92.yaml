    - type: text
      text: Tsara ny midera NY TOMPO
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: Salamo. Tononkira fanao amin’ny andro Sabata.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Tsara ny midera NY TOMPO
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny hankalaza ny anaranao, ry Avo Indrindra ô,
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Fa ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: tandroko
    - type: text
      text: ' kosa dia asandratrao ho tahaka ny an’ny ombimanga;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mihosotra diloilo vaovao aho.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Faly ny masoko mahita ny amin’ny fahavaloko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary finaritra ny sofiko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mandre ny amin’ny ratsy fanahy izay mitsangana hamely ahy.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Ny marina dia hamololona tahaka ny palma,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hisandrahaka tahaka ny sedera any Libanona izy.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Nambolena tao amin’ny tranon’NY TOMPO izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka maniry eo an-kianjan’Andriamanitsika;
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: mbola manorobona ihany izy na dia efa antitra aza;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dofodofotra sy maitso izy
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: mba hanambara fa mahitsy NY TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vatolampiko izay tsy misy tsiny.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ary hanambara ny famindramponao nony maraina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny fahamarinanao nony alina,
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: amin’ny valiha tory folo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy amin’ny feon-dokanga.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Ampifalinao amin’ny nataonao aho, TOMPO ô;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny asan’ny tananao no hihobiako.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: TOMPO ô, akory ny halehiben’ny asanao!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manao ahoana ny halalin’ny fisainanao!
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Ny ketrina dia tsy mahafantatra izany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny adala koa dia tsy mba mahalala.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Raha mitsiry tahaka ny ahitra ny ratsy fanahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mamony ny mpanao ratsy rehetra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia izany ihany no ho fandringanana azy mandrakizay.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Nefa Ianao, TOMPO ô, any amin’ny avo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia maharitra mandrakizay!
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Fa indreo ny fahavalonao, TOMPO ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: indreo, ringana ny fahavalonao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mihahaka ny mpanao ratsy rehetra.
