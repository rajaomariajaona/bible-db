document_id: JER.15,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fanamelohana ny vahoakan’Andriamanitra
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy NY TOMPO tamiko: Na dia i Mosesy sy i Samoela aza no mijoro eto anatrehako dia tsy hankasitraka ity firenena ity Aho; roahy tsy ho eo anatrehako izy, eny, aoka hiala izy. '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lozako, ry neny, ny niterahanao ahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay lehilahy ilàna ady sy fifandirana eny amin’ny tany rehetra!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy nisambo-bola aho, ary tsy nisy nisambo-bola tamiko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa dia ozonin’ny olona rehetra ihany aho.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Dia hoy NY TOMPO:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny hahasoa anao ihany no nanafahako anao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hataoko tonga mifona aminao tokoa ny fahavalo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: amin’ny andro hahitan-doza sy amin’izay andro mahory.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mety tapaka va ny vy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ny vy avy any avaratra, na ny varahina?
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fanananao sy ny harenanao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ao anatin’ny faritaninao rehetra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hatolotro ho babo maimaimpoana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: noho ny fahotana rehetra izay nataonao;
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hampitondraiko ny fahavalonao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho any amin’ny tany tsy fantatrao izany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa mirehitra ny afon’ny fahatezerako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka handoro anareo no irehetany.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ianao no mahalala,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: TOMPO ô, tsarovy aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka vangio,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary valio izay manenjika ahy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aza dia mandefitra aminy Ianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fandrao ho afaka ny aiko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aoka ho fantatrao fa noho ny Aminao no nitondrako latsa.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hitako ireo teninao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka nohaniko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny teninao no fifaliako sy firavoravoan’ny foko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa nantsoina tamin’ny anaranao aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: RY TOMPO, Andriamanitra Tompon’izao rehetra izao ô.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izaho dia tsy nipetraka na nifaly teo amin’ny fivorian’ny mpikorana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nitoetra irery aho noho ny fihazonan’ny tananao ahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria nofenoinao fahatezerana aho.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nahoana re no dia tsy mety mitsahatra ny faharariako?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nahoana no marary ny feriko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy mety sitrana?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho tonga amiko tahaka ny ranotrambo va Ianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia rano tsy azo itokiana?
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Koa izao no lazain’NY TOMPO:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha miverina ianao dia horaisiko indray
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hitsangana eo anatrehako;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary raha manavaka ny zava-tsoa amin’ny zava-poana ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ho solom-bavako;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hanatona anao indray ireny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa tsy ianao no hanatona azy.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary raha toa izy ka miteny aminao hoe: Hiala hankaiza ary izahay? Dia lazao aminy hoe: Izao no lazain’NY TOMPO:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay ho amin’ny fahafatesana dia ho amin’ny fahafatesana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay ho amin’ny sabatra dia ho amin’ny sabatra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay ho amin’ny mosary dia ho amin’ny mosary,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary izay ho amin’ny fahababoana dia ho amin’ny fahababoana.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hataoko fefy varahina matevina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ho fiarovana ity firenena ity ianao:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hiady aminao izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa tsy hahaleo anao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa momba anao Aho mba hamonjy sy hanafaka anao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy NY TOMPO.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hanafaka anao amin’ny tanan’ny ratsy fanahy Aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hanavotra anao amin’ny tanan’ny mpampahory.
  '3':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Ary manendry zavatra efatra karazana Aho hamelezana azy, hoy NY TOMPO: Dia ny sabatra hamono, ny amboa hamiravira, ny voromanidina ary ny bibidia hihinana sy handany; '
  '4':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Ary ataoko ho fampangovitana ny fanjakana rehetra amin’ny tany izy noho ny amin’i Manase, zanak’i Hezekia, mpanjakan’ny Joda, dia noho izay nataony tany Jerosalema.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Sasatra ny manenina Aho
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Iza no hangoraka anao, ry Jerosalema?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Iza no hitsapa alahelo anao?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Iza no hivily hanantsafa anao?
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ianao efa nahafoy Ahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady efa nihemotra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy NY TOMPO;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: koa atsotrako kosa ny tanako hamely anao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary efa mandringana anao Aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria efa sasatra ny manenina.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary kororohiko amin’ny fikororohana any amin’ny vavahadin’ny tany izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary vonoiko ny zanany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, aringako ny oloko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa tsy mety miala amin’ny fanaony ihany izy mba hiverenany.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny mpitondratenany dia mihamaro eo imasoko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mihoatra noho ny fasika any an-dranomasina;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mitondra mpandringana ho ao aminy Aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: handripaka ny renin’ny zatovo, na dia mitataovovonana aza ny andro;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ataoko tonga tampoka aminy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny fanaintainana sy ny tahotra.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay niteraka fito dia mihaosa,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: miala aina izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: milentika mbola antoandro ny masoandrony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: menatra sy mangaihay izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary izay sisa eo aminy dia hatolotro ho voan’ny sabatra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eo anoloan’ny fahavalony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy NY TOMPO.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fitarainan’i Jeremia sy fampiononan’Andriamanitra
    marker-yv: yv-h
