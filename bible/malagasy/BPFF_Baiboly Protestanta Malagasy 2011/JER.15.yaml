document_id: JER.15,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Fanamelohana ny vahoakan’Andriamanitra
  - type: text
    content: 'Hoy NY TOMPO tamiko: Na dia i Mosesy sy i Samoela aza no mijoro eto anatrehako dia tsy hankasitraka ity firenena ity Aho; roahy tsy ho eo anatrehako izy, eny, aoka hiala izy. '
  '10':
  - type: text
    content: Lozako, ry neny, ny niterahanao ahy
  - type: text
    content: izay lehilahy ilàna ady sy fifandirana eny amin’ny tany rehetra!
  - type: text
    content: Tsy nisambo-bola aho, ary tsy nisy nisambo-bola tamiko,
  - type: text
    content: nefa dia ozonin’ny olona rehetra ihany aho.
  '11':
  - type: text
    content: 'Dia hoy NY TOMPO:'
  - type: text
    content: Ny hahasoa anao ihany no nanafahako anao;
  - type: text
    content: hataoko tonga mifona aminao tokoa ny fahavalo
  - type: text
    content: amin’ny andro hahitan-doza sy amin’izay andro mahory.
  '12':
  - type: text
    content: Mety tapaka va ny vy,
  - type: text
    content: dia ny vy avy any avaratra, na ny varahina?
  '13':
  - type: text
    content: Ny fanananao sy ny harenanao
  - type: text
    content: ao anatin’ny faritaninao rehetra
  - type: text
    content: dia hatolotro ho babo maimaimpoana
  - type: text
    content: noho ny fahotana rehetra izay nataonao;
  '14':
  - type: text
    content: ary hampitondraiko ny fahavalonao
  - type: text
    content: ho any amin’ny tany tsy fantatrao izany;
  - type: text
    content: fa mirehitra ny afon’ny fahatezerako
  - type: text
    content: ka handoro anareo no irehetany.
  '15':
  - type: text
    content: Ianao no mahalala,
  - type: text
    content: TOMPO ô, tsarovy aho
  - type: text
    content: ka vangio,
  - type: text
    content: ary valio izay manenjika ahy;
  - type: text
    content: aza dia mandefitra aminy Ianao,
  - type: text
    content: fandrao ho afaka ny aiko;
  - type: text
    content: aoka ho fantatrao fa noho ny Aminao no nitondrako latsa.
  '16':
  - type: text
    content: Hitako ireo teninao
  - type: text
    content: ka nohaniko,
  - type: text
    content: ary ny teninao no fifaliako sy firavoravoan’ny foko;
  - type: text
    content: fa nantsoina tamin’ny anaranao aho,
  - type: text
    content: RY TOMPO, Andriamanitra Tompon’izao rehetra izao ô.
  '17':
  - type: text
    content: Izaho dia tsy nipetraka na nifaly teo amin’ny fivorian’ny mpikorana,
  - type: text
    content: nitoetra irery aho noho ny fihazonan’ny tananao ahy
  - type: text
    content: satria nofenoinao fahatezerana aho.
  '18':
  - type: text
    content: Nahoana re no dia tsy mety mitsahatra ny faharariako?
  - type: text
    content: Nahoana no marary ny feriko
  - type: text
    content: ka tsy mety sitrana?
  - type: text
    content: Ho tonga amiko tahaka ny ranotrambo va Ianao,
  - type: text
    content: dia rano tsy azo itokiana?
  '19':
  - type: text
    content: 'Koa izao no lazain’NY TOMPO:'
  - type: text
    content: Raha miverina ianao dia horaisiko indray
  - type: text
    content: ka hitsangana eo anatrehako;
  - type: text
    content: ary raha manavaka ny zava-tsoa amin’ny zava-poana ianao
  - type: text
    content: dia ho solom-bavako;
  - type: text
    content: hanatona anao indray ireny;
  - type: text
    content: fa tsy ianao no hanatona azy.
  '2':
  - type: text
    content: 'Ary raha toa izy ka miteny aminao hoe: Hiala hankaiza ary izahay? Dia lazao aminy hoe: Izao no lazain’NY TOMPO:'
  - type: text
    content: Izay ho amin’ny fahafatesana dia ho amin’ny fahafatesana,
  - type: text
    content: izay ho amin’ny sabatra dia ho amin’ny sabatra,
  - type: text
    content: izay ho amin’ny mosary dia ho amin’ny mosary,
  - type: text
    content: ary izay ho amin’ny fahababoana dia ho amin’ny fahababoana.
  '20':
  - type: text
    content: Ary hataoko fefy varahina matevina
  - type: text
    content: 'ho fiarovana ity firenena ity ianao:'
  - type: text
    content: Hiady aminao izy
  - type: text
    content: nefa tsy hahaleo anao;
  - type: text
    content: fa momba anao Aho mba hamonjy sy hanafaka anao,
  - type: text
    content: hoy NY TOMPO.
  '21':
  - type: text
    content: Hanafaka anao amin’ny tanan’ny ratsy fanahy Aho
  - type: text
    content: ary hanavotra anao amin’ny tanan’ny mpampahory.
  '3':
  - type: text
    content: 'Ary manendry zavatra efatra karazana Aho hamelezana azy, hoy NY TOMPO: Dia ny sabatra hamono, ny amboa hamiravira, ny voromanidina ary ny bibidia hihinana sy handany; '
  '4':
  - type: text
    content: Ary ataoko ho fampangovitana ny fanjakana rehetra amin’ny tany izy noho ny amin’i Manase, zanak’i Hezekia, mpanjakan’ny Joda, dia noho izay nataony tany Jerosalema.
  - type: heading
    content: Sasatra ny manenina Aho
  '5':
  - type: text
    content: Iza no hangoraka anao, ry Jerosalema?
  - type: text
    content: Iza no hitsapa alahelo anao?
  - type: text
    content: Iza no hivily hanantsafa anao?
  '6':
  - type: text
    content: Ianao efa nahafoy Ahy
  - type: text
    content: sady efa nihemotra,
  - type: text
    content: hoy NY TOMPO;
  - type: text
    content: koa atsotrako kosa ny tanako hamely anao,
  - type: text
    content: ary efa mandringana anao Aho
  - type: text
    content: satria efa sasatra ny manenina.
  '7':
  - type: text
    content: Ary kororohiko amin’ny fikororohana any amin’ny vavahadin’ny tany izy;
  - type: text
    content: ary vonoiko ny zanany,
  - type: text
    content: eny, aringako ny oloko,
  - type: text
    content: nefa tsy mety miala amin’ny fanaony ihany izy mba hiverenany.
  '8':
  - type: text
    content: Ny mpitondratenany dia mihamaro eo imasoko
  - type: text
    content: mihoatra noho ny fasika any an-dranomasina;
  - type: text
    content: mitondra mpandringana ho ao aminy Aho
  - type: text
    content: handripaka ny renin’ny zatovo, na dia mitataovovonana aza ny andro;
  - type: text
    content: ataoko tonga tampoka aminy
  - type: text
    content: ny fanaintainana sy ny tahotra.
  '9':
  - type: text
    content: Izay niteraka fito dia mihaosa,
  - type: text
    content: miala aina izy,
  - type: text
    content: milentika mbola antoandro ny masoandrony,
  - type: text
    content: menatra sy mangaihay izy;
  - type: text
    content: ary izay sisa eo aminy dia hatolotro ho voan’ny sabatra
  - type: text
    content: eo anoloan’ny fahavalony,
  - type: text
    content: hoy NY TOMPO.
  - type: heading
    content: Fitarainan’i Jeremia sy fampiononan’Andriamanitra
