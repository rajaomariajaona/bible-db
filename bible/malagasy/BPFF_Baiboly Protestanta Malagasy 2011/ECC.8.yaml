document_id: ECC.8
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny hendry eo anoloan’ny fahefan’ny mpanjaka
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Iza no tahaka ny hendry? Ary iza no mahalala izay anton-javatra ao ambadiky ny zava-miseho?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny fahendren’ny olona dia mahamiramirana ny tarehiny
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary manova ny endriny masiaka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Hoy aho: Tandremo ny didin’ny mpanjaka,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary izany dia noho ny fianianana nataon’Andriamanitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Aza malaky manalavitra azy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: aza mikikitra amin’ny raharaha ratsy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa na inona na inona sitrany dia azony atao avokoa;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: fa ny tenin’ny mpanjaka dia tenim-pahefana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'koa iza no mahazo miteny aminy hoe: Inona no ataonao?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Izay mitandrina ny didy tsy mba hahita loza;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny saina hendry dia mahalala ny fotoana sy ny fitsarana;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: fa samy manana ny fotoanany sy ny fitsarana azy ny zava-mitranga rehetra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria ny ratsy nataon’ny olona dia mitambesatra aminy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Fa tsy mahafantatra izay ho avy izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady iza no hampahafantatra azy izay hiavian’izany?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Tsy misy olona manan-kery hahatana ny fofonainy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: na manana fahefana ny amin’ny andro hahafatesany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy misy afa-miala rehefa misy ady
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny ratsy fanahy dia tsy ho voavonjin’ny haratsiam-panahiny.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny zavamiafin’ny asan’Andriamanitra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Izany rehetra izany dia efa hitako avokoa tamin’ny nampiasako ny saiko nandinika ny asa rehetra atao etỳ ambanin’ny masoandro. Misy andro anamparan’ny olona fahefana amin’ny namany ka ampidirany loza aminy. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Tamin’izany dia hitako ny ratsy fanahy nalevina; nandeha ny olona, ary niala avy teo amin’ny fitoerana masina ka hadino tao an-tanàna ny asa ratsy nataon’ireo. Izany koa dia zava-poana. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Saingy tsy tanterahina haingana ny didy ho famaliana ny ratsy natao dia feno faniriana hanao asa ratsy ny fon’ny zanak’olombelona ao anatiny. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Eny, fa na manao asa ratsy injato aza ny mpanota ka ela velona ihany, dia fantatro kosa fa hisy soa ho an’izay matahotra an’Andriamanitra, dia izay matahotra eo anatrehany. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Tsy hisy soa ho an’ny ratsy fanahy; fa ho toy ny aloka izy ka tsy haharitra ela satria tsy matahotra eo anatrehan’Andriamanitra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Izao koa no zava-poana izay atao etỳ ambonin’ny tany: Misy olo-marina iharan-javatra izay tokony ho anjaran’ny ratsy fanahy; ary misy ratsy fanahy mahazo izay tokony ho anjaran’ny marina. Hoy aho: Izany koa dia zava-poana. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Dia noderaiko ny fifaliana satria tsy misy mahasoa ny olona etỳ ambanin’ny masoandro afa-tsy ny mihinana sy ny misotro ary ny miravoravo ka izany no hanara-dia azy amin’ny fisasarany mandritra ny andro hiainany izay nomen’Andriamanitra azy etỳ ambanin’ny masoandro. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Raha nampiasaiko ny saiko hahalala fahendrena sy hahita ny asa atao etỳ ambonin’ny tany, satria misy tsy mahita torimaso na andro na alina, '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: dia hitako avokoa ny asan’Andriamanitra, fa tsy takatry ny sain’ny olona ny asa atao etỳ ambanin’ny masoandro; koa na dia mikely aina hitady izany aza ny olona tsy ho hitany; eny, raha milaza hahafantatra izany aza ny hendry dia tsy hisy hahazoany mamantatra izany akory.
