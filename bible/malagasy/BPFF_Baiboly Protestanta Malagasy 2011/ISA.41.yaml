document_id: ISA.41,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny tena Andriamanitra sy ny sampy
  - type: text
    content: Mangìna ianareo hihaino Ahy, ry nosy!
  - type: text
    content: Ary aoka hanavao ny heriny ny firenena;
  - type: text
    content: aoka hanatona izy ka hiteny!
  - type: text
    content: Andeha isika hifanatona eo amin’ny fitsarana.
  '10':
  - type: text
    content: Aza matahotra ianao
  - type: text
    content: fa momba anao Aho;
  - type: text
    content: ary aza miherikerika foana
  - type: text
    content: fa Izaho no Andriamanitrao;
  - type: text
    content: mampahery anao Aho
  - type: text
    content: sady mamonjy anao;
  - type: text
    content: eny, mitantana anao amin’ny tanana ankavanan’ny fahamarinako Aho.
  '11':
  - type: text
    content: Indro, ho menatra sy hangaihay
  - type: text
    content: izay rehetra tezitra aminao;
  - type: text
    content: ho tonga tsinontsinona izy; eny, ho levona
  - type: text
    content: izay miady aminao.
  '12':
  - type: text
    content: Hotadiavinao izay mifanditra aminao
  - type: text
    content: fa tsy ho hitanao;
  - type: text
    content: ho tahaka ny tsinontsinona sy ny zava-poana
  - type: text
    content: izay miady aminao.
  '13':
  - type: text
    content: Fa Izaho TOMPO Andriamanitrao
  - type: text
    content: no mitantana ny tananao havanana,
  - type: text
    content: 'dia Ilay miteny aminao hoe: Aza matahotra,'
  - type: text
    content: Izaho no hamonjy anao.
  '14':
  - type: text
    content: Aza matahotra ianao, ry Jakoba kankana,
  - type: text
    content: dia ianareo, ry Israely olom-bitsy;
  - type: text
    content: Izaho no hamonjy anao,
  - type: text
    content: hoy NY TOMPO,
  - type: text
    content: Izaho Iray Masin’ny Israely no Mpanavotra anao.
  '15':
  - type: text
    content: Indro, ataoko ragiragy vaovao
  - type: text
    content: misy nify maranitra ianao;
  - type: text
    content: hanosihosy ny tendrombohitra ianao ka hanorotoro azy
  - type: text
    content: ary hanao ny havoana ho tahaka ny akofa.
  '16':
  - type: text
    content: Hikororoka azy ianao
  - type: text
    content: ka hopaohin’ny rivotra izy,
  - type: text
    content: ary hanely azy ny tafio-drivotra.
  - type: text
    content: Fa ianao kosa dia hiravoravo amin’NY TOMPO,
  - type: text
    content: ary ny Iray Masin’ny Israely no ho reharehanao.
  '17':
  - type: text
    content: Mitady rano ny ory sy ny mahantra
  - type: text
    content: nefa tsy mahita,
  - type: text
    content: mainan’ny hetaheta ny lelany.
  - type: text
    content: Izaho TOMPO no hamaly azy,
  - type: text
    content: Izaho, Andriamanitry ny Israely, tsy hahafoy azy;
  '18':
  - type: text
    content: Hampiboiboika renirano eny an-tampon-tanety mangadihady Aho,
  - type: text
    content: ary loharano eny afovoan’ny lohasaha;
  - type: text
    content: hataoko tonga farihy ny tany efitra
  - type: text
    content: ary ny tany karankaina ho loharano miboiboika;
  '19':
  - type: text
    content: Hampaniry hazo sedera sy akasia,
  - type: text
    content: sy rotra ary oliva any an-tany efitra Aho,
  - type: text
    content: ary ny kipreso sy hazo kesika ary kirihitra dia hampiarahina
  - type: text
    content: eny amin’ny tany ngazana,
  '2':
  - type: text
    content: Iza no nanaitra avy any atsinanana
  - type: text
    content: ilay nomban’ny fahamarinana tamin’ny diany rehetra?
  - type: text
    content: Iza no nanolotra ny firenena ho eo anatrehany,
  - type: text
    content: ary nampietry mpanjaka?
  - type: text
    content: Iza no nanao ny sabany ho tahaka ny vovoka,
  - type: text
    content: sy ny tsipìkany ho tahaka ny mololo paohin’ny rivotra?
  '20':
  - type: text
    content: mba ho hitan’izy ireo sy ho fantany,
  - type: text
    content: ary hoheveriny sy ho azony an-tsaina
  - type: text
    content: fa ny tanan’NY TOMPO no nanao izany,
  - type: text
    content: ary ny Iray Masin’ny Israely no nahary azy.
  - type: heading
    content: Ny maha tsinontsinona ireo andriamanitra tsy izy
  '21':
  - type: text
    content: Alaharo eto ny teninareo,
  - type: text
    content: hoy NY TOMPO;
  - type: text
    content: asehoy izay fiarovan-tenanareo,
  - type: text
    content: hoy ny Mpanjakan’i Jakoba.
  '22':
  - type: text
    content: Aoka hanatona izy.
  - type: text
    content: Aoka hasehony amintsika izay zavatra mbola ho avy,
  - type: text
    content: nanao ahoana ny zavatra taloha,
  - type: text
    content: mba hosaininay
  - type: text
    content: ka ho fantatray izay hiafarany;
  - type: text
    content: na mba ilazao koa izay zavatra ho avy izahay.
  '23':
  - type: text
    content: Ambarao anay izay zavatra mbola ho avy rahatrizay,
  - type: text
    content: mba ho fantatray fa andriamanitra ianareo;
  - type: text
    content: eny, manaova soa na manaova ratsy,
  - type: text
    content: mba hitaha isika ka hiaraha-mahita.
  '24':
  - type: text
    content: Indro, tena tsinontsinona ianareo,
  - type: text
    content: ary ny asanareo dia tena naman’ny zava-poana;
  - type: text
    content: fahavetavetana ny nifidianana anareo.
  '25':
  - type: text
    content: Nanaitra olona iray avy tany avaratra Aho
  - type: text
    content: ka tonga izy. Avy any amin’ny fiposahan’ny masoandro
  - type: text
    content: no hiantsoany ny anarako;
  - type: text
    content: hanosihosy ny mpanapaka tahaka ny fanosihosy fotaka izy,
  - type: text
    content: tahaka ny mpanefy vilany mihosy tanimanga.
  '26':
  - type: text
    content: Iza no nanambara izany hatramin’ny voalohany,
  - type: text
    content: mba ho fantatray
  - type: text
    content: dieny mialoha
  - type: text
    content: 'ka hataonay hoe: Marina izany!'
  - type: text
    content: Tsy nisy nanambara;
  - type: text
    content: eny, tsy nisy nilaza
  - type: text
    content: ary tsy nisy nandre ny teninareo.
  '27':
  - type: text
    content: 'Izaho no voalohany izay milaza amin’i '
  - type: text
    content: Ziona
  - type: text
    content: ' hoe:'
  - type: text
    content: Indreo izy!
  - type: text
    content: Manome mpitondra teny soa mahafaly ho an’i Jerosalema Aho.
  '28':
  - type: text
    content: Dia nijery Aho, kanjo tsy nisy na iza na iza;
  - type: text
    content: eny, tsy nisy mpanolotsaina tamin’izy ireo
  - type: text
    content: ka tsy misy afaka hamaly Ahy raha manontany azy Aho!
  '29':
  - type: text
    content: Indro, zava-poana avokoa izy rehetra;
  - type: text
    content: tsinontsinona ny asany;
  - type: text
    content: rivotra sy zava-poana ny sampiny voarendrika.
  '3':
  - type: text
    content: Manenjika ireo izy ka mihoatra azy soa amantsara
  - type: text
    content: any amin’izay lalana tsy mbola nodiavin’ny tongony.
  '4':
  - type: text
    content: Iza moa no nanao sy nahavita izany?
  - type: text
    content: Ilay miantso ny taranaka maro hatramin’ny taloha.
  - type: text
    content: Izaho TOMPO no voalohany,
  - type: text
    content: ary hatramin’ny farany dia mbola Izaho ihany no Izy.
  '5':
  - type: text
    content: Nahita ny nosy ka raiki-tahotra.
  - type: text
    content: Toran-kovitra ny vazan-tany.
  - type: text
    content: Dia nanatona izy ireo ka tonga.
  '6':
  - type: text
    content: Samy manampy ny namany avy izy rehetra,
  - type: text
    content: 'ary samy milaza amin’ny rahalahiny avy hoe: Mahereza!'
  '7':
  - type: text
    content: Koa ny mpahay taozavatra dia mampahery ny mpanefy volamena,
  - type: text
    content: ary izay mandama tamin’ny maritoa
  - type: text
    content: mampahery izay mively eo amin’ny riandriana,
  - type: text
    content: 'Ka hoy izy, miantso ny faninginana: Tsara ity!'
  - type: text
    content: Dia homboany mafy tamin’ny fantsika ilay sampy
  - type: text
    content: mba tsy hihozongozona.
  - type: heading
    content: Aza matahotra fa tonga hamonjy anao Aho
  '8':
  - type: text
    content: Fa ianao kosa, ry Israely mpanompoko,
  - type: text
    content: ry Jakoba izay nofidiko,
  - type: text
    content: taranak’i Abrahama sakaizako!
  '9':
  - type: text
    content: Ianao izay efa notantanako avy tany amin’ny faran’ny tany
  - type: text
    content: ary nantsoiko avy tany an-tsisiny
  - type: text
    content: 'ka nilazako hoe:'
  - type: text
    content: Mpanompoko ianao,
  - type: text
    content: efa nofidiko
  - type: text
    content: ka tsy mba hariako!
