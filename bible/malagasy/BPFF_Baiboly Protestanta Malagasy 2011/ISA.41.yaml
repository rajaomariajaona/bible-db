document_id: ISA.41,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny tena Andriamanitra sy ny sampy
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mangìna ianareo hihaino Ahy, ry nosy!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary aoka hanavao ny heriny ny firenena;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aoka hanatona izy ka hiteny!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Andeha isika hifanatona eo amin’ny fitsarana.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aza matahotra ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa momba anao Aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary aza miherikerika foana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa Izaho no Andriamanitrao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mampahery anao Aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady mamonjy anao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, mitantana anao amin’ny tanana ankavanan’ny fahamarinako Aho.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro, ho menatra sy hangaihay
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay rehetra tezitra aminao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho tonga tsinontsinona izy; eny, ho levona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay miady aminao.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hotadiavinao izay mifanditra aminao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa tsy ho hitanao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho tahaka ny tsinontsinona sy ny zava-poana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay miady aminao.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa Izaho TOMPO Andriamanitrao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no mitantana ny tananao havanana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'dia Ilay miteny aminao hoe: Aza matahotra,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izaho no hamonjy anao.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aza matahotra ianao, ry Jakoba kankana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ianareo, ry Israely olom-bitsy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izaho no hamonjy anao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy NY TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izaho Iray Masin’ny Israely no Mpanavotra anao.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro, ataoko ragiragy vaovao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: misy nify maranitra ianao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hanosihosy ny tendrombohitra ianao ka hanorotoro azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hanao ny havoana ho tahaka ny akofa.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hikororoka azy ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hopaohin’ny rivotra izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hanely azy ny tafio-drivotra.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ianao kosa dia hiravoravo amin’NY TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny Iray Masin’ny Israely no ho reharehanao.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mitady rano ny ory sy ny mahantra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa tsy mahita,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mainan’ny hetaheta ny lelany.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izaho TOMPO no hamaly azy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izaho, Andriamanitry ny Israely, tsy hahafoy azy;
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hampiboiboika renirano eny an-tampon-tanety mangadihady Aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary loharano eny afovoan’ny lohasaha;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hataoko tonga farihy ny tany efitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny tany karankaina ho loharano miboiboika;
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hampaniry hazo sedera sy akasia,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy rotra ary oliva any an-tany efitra Aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny kipreso sy hazo kesika ary kirihitra dia hampiarahina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny amin’ny tany ngazana,
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Iza no nanaitra avy any atsinanana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ilay nomban’ny fahamarinana tamin’ny diany rehetra?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Iza no nanolotra ny firenena ho eo anatrehany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary nampietry mpanjaka?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Iza no nanao ny sabany ho tahaka ny vovoka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny tsipìkany ho tahaka ny mololo paohin’ny rivotra?
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba ho hitan’izy ireo sy ho fantany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hoheveriny sy ho azony an-tsaina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny tanan’NY TOMPO no nanao izany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny Iray Masin’ny Israely no nahary azy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny maha tsinontsinona ireo andriamanitra tsy izy
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Alaharo eto ny teninareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy NY TOMPO;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: asehoy izay fiarovan-tenanareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy ny Mpanjakan’i Jakoba.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka hanatona izy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka hasehony amintsika izay zavatra mbola ho avy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nanao ahoana ny zavatra taloha,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hosaininay
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka ho fantatray izay hiafarany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na mba ilazao koa izay zavatra ho avy izahay.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ambarao anay izay zavatra mbola ho avy rahatrizay,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba ho fantatray fa andriamanitra ianareo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, manaova soa na manaova ratsy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hitaha isika ka hiaraha-mahita.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro, tena tsinontsinona ianareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny asanareo dia tena naman’ny zava-poana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fahavetavetana ny nifidianana anareo.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nanaitra olona iray avy tany avaratra Aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tonga izy. Avy any amin’ny fiposahan’ny masoandro
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no hiantsoany ny anarako;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hanosihosy ny mpanapaka tahaka ny fanosihosy fotaka izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tahaka ny mpanefy vilany mihosy tanimanga.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Iza no nanambara izany hatramin’ny voalohany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba ho fantatray
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dieny mialoha
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ka hataonay hoe: Marina izany!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy nisy nanambara;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, tsy nisy nilaza
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy nisy nandre ny teninareo.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Izaho no voalohany izay milaza amin’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Ziona
    - type: text
      text: ' hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indreo izy!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manome mpitondra teny soa mahafaly ho an’i Jerosalema Aho.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia nijery Aho, kanjo tsy nisy na iza na iza;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, tsy nisy mpanolotsaina tamin’izy ireo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy misy afaka hamaly Ahy raha manontany azy Aho!
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro, zava-poana avokoa izy rehetra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsinontsinona ny asany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: rivotra sy zava-poana ny sampiny voarendrika.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manenjika ireo izy ka mihoatra azy soa amantsara
  - type: usfm
    marker: q1
    children:
    - type: text
      text: any amin’izay lalana tsy mbola nodiavin’ny tongony.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Iza moa no nanao sy nahavita izany?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ilay miantso ny taranaka maro hatramin’ny taloha.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izaho TOMPO no voalohany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hatramin’ny farany dia mbola Izaho ihany no Izy.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nahita ny nosy ka raiki-tahotra.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toran-kovitra ny vazan-tany.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia nanatona izy ireo ka tonga.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Samy manampy ny namany avy izy rehetra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ary samy milaza amin’ny rahalahiny avy hoe: Mahereza!'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa ny mpahay taozavatra dia mampahery ny mpanefy volamena,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary izay mandama tamin’ny maritoa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mampahery izay mively eo amin’ny riandriana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ka hoy izy, miantso ny faninginana: Tsara ity!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia homboany mafy tamin’ny fantsika ilay sampy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba tsy hihozongozona.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Aza matahotra fa tonga hamonjy anao Aho
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ianao kosa, ry Israely mpanompoko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ry Jakoba izay nofidiko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: taranak’i Abrahama sakaizako!
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ianao izay efa notantanako avy tany amin’ny faran’ny tany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary nantsoiko avy tany an-tsisiny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ka nilazako hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mpanompoko ianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: efa nofidiko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy mba hariako!
