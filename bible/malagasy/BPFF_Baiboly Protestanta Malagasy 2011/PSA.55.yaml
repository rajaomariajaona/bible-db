document_id: PSA.55,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fitarainana nataon’izay navadiky ny sakaizany nahatoky azy
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: Ho an’ny mpiventy hira. Hampiarahina amin’ny valiha. Maskila nataon’i Davida.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mihainoa ny vavaka ataoko, Andriamanitra ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary aza miery amin’ny fitarainako!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hodidininy andro aman’alina eny ambonin’ny mandany io;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: heloka sy fampahoriana no ao aminy;
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: faharavana no ao anatiny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny fitaka sy ny fanangolena dia tsy mba miala amin’ny lalambeny.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa tsy fahavalo no nanaratsy ahy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa raha izany dia ho niaritra ihany aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy olona nankahala ahy no nanandra-tena namely ahy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa raha izany dia ho niery azy aho.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ianao izay lehilahy mitovy saranga amiko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: namako sy tena sakaizako,
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia isika izay nifankamamy resaka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka niara-nandeha tamin’ny maro ho ao amin’ny tranon’Andriamanitra!
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka hanampoka azy ny fahafatesana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ary aoka hidina velona any amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: fitoeran’ny maty
    - type: text
      text: ' izy!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ratsy no ao amin’ny fonenany, ao afovoany ao.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha izaho dia Andriamanitra no antsoiko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary NY TOMPO no hamonjy ahy.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hariva sy maraina ary mitataovovonana no itarainako sy itolokoako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hihaino ny feoko Izy
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hanavotra ahy ho amin’ny fiadanana hahafahako amin’ny adin’ireny amiko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa maro no miady amiko.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Hihaino Andriamanitra izay mipetraka amin’ny sezafiandrianany hatrizay hatrizay. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Fiatoana.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hamaly ireo olona tsy miova toetra Izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia izay tsy matahotra an’Andriamanitra.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Henoy aho ka valio!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miriorio ny eritreritro ka mitoloko aho
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nanatsotra ny tanany hamely izay nihavana taminy izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: namadika ny fanekeny izy;
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: malambo noho ny rononomandry ny vavany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: kanjo ady no ao am-pony;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: malefaka noho ny diloilo ny teniny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: kanjo sabatra voatsoaka ireny.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Apetraho amin’NY TOMPO ny entanao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary Izy no hiantoka anao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy havelany hangozohozo mandrakizay ny marina.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa Ianao, Andriamanitra ô, no hampidina ireo any an-davaka lalina;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny mpandatsa-dra sy mpamitaka dia tsy hahatratra ny antsasaky ny androny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa izaho kosa dia hatoky Anao.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: noho ny feon’ny fahavalo sy ny fampahorian’ny ratsy fanahy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa manjera loza amiko ireny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary amin’ny fahatezerana no ankahalany ahy.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mangorohoro ato anatiko ny foko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mamely ahy ny tahotra ny fahafatesana.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tahotra sy hovitra no mahazo ahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary manafotra ahy ny horohoro
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ka hoy aho: Enga anie ka hanana elatra tahaka ny voromailala aho!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia hanidina aho ka hahita izay hitoerako.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, handositra lavitra aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ka hitoetra any an-tany efitra. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Fiatoana.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Handeha haingana aho hamonjy fialofana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba tsy ho azon’ny tafio-drivotra sy ny ranonoram-baratra.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aringano izy ary saratsaraho ny fiteniny, Tompo ô!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa mahita loza sy adilahy ao an-tanàna aho.
