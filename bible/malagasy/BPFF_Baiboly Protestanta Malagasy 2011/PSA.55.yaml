document_id: PSA.55,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Fitarainana nataon’izay navadiky ny sakaizany nahatoky azy
  - type: text
    content: Ho an’ny mpiventy hira. Hampiarahina amin’ny valiha. Maskila nataon’i Davida.
  - type: text
    content: Mihainoa ny vavaka ataoko, Andriamanitra ô,
  - type: text
    content: ary aza miery amin’ny fitarainako!
  '10':
  - type: text
    content: Hodidininy andro aman’alina eny ambonin’ny mandany io;
  - type: text
    content: heloka sy fampahoriana no ao aminy;
  '11':
  - type: text
    content: faharavana no ao anatiny
  - type: text
    content: ary ny fitaka sy ny fanangolena dia tsy mba miala amin’ny lalambeny.
  '12':
  - type: text
    content: Fa tsy fahavalo no nanaratsy ahy,
  - type: text
    content: fa raha izany dia ho niaritra ihany aho;
  - type: text
    content: tsy olona nankahala ahy no nanandra-tena namely ahy,
  - type: text
    content: fa raha izany dia ho niery azy aho.
  '13':
  - type: text
    content: Fa ianao izay lehilahy mitovy saranga amiko,
  - type: text
    content: namako sy tena sakaizako,
  '14':
  - type: text
    content: dia isika izay nifankamamy resaka
  - type: text
    content: ka niara-nandeha tamin’ny maro ho ao amin’ny tranon’Andriamanitra!
  '15':
  - type: text
    content: Aoka hanampoka azy ny fahafatesana
  - type: text
    content: 'ary aoka hidina velona any amin’ny '
  - type: text
    content: fitoeran’ny maty
  - type: text
    content: ' izy!'
  - type: text
    content: Fa ratsy no ao amin’ny fonenany, ao afovoany ao.
  '16':
  - type: text
    content: Raha izaho dia Andriamanitra no antsoiko
  - type: text
    content: ary NY TOMPO no hamonjy ahy.
  '17':
  - type: text
    content: Hariva sy maraina ary mitataovovonana no itarainako sy itolokoako
  - type: text
    content: dia hihaino ny feoko Izy
  '18':
  - type: text
    content: ka hanavotra ahy ho amin’ny fiadanana hahafahako amin’ny adin’ireny amiko,
  - type: text
    content: fa maro no miady amiko.
  '19':
  - type: text
    content: 'Hihaino Andriamanitra izay mipetraka amin’ny sezafiandrianany hatrizay hatrizay. '
  - type: text
    content: Fiatoana.
  - type: text
    content: Hamaly ireo olona tsy miova toetra Izy,
  - type: text
    content: dia izay tsy matahotra an’Andriamanitra.
  '2':
  - type: text
    content: Henoy aho ka valio!
  - type: text
    content: Miriorio ny eritreritro ka mitoloko aho
  '20':
  - type: text
    content: Nanatsotra ny tanany hamely izay nihavana taminy izy;
  - type: text
    content: namadika ny fanekeny izy;
  '21':
  - type: text
    content: malambo noho ny rononomandry ny vavany,
  - type: text
    content: kanjo ady no ao am-pony;
  - type: text
    content: malefaka noho ny diloilo ny teniny,
  - type: text
    content: kanjo sabatra voatsoaka ireny.
  '22':
  - type: text
    content: Apetraho amin’NY TOMPO ny entanao
  - type: text
    content: ary Izy no hiantoka anao;
  - type: text
    content: tsy havelany hangozohozo mandrakizay ny marina.
  '23':
  - type: text
    content: Fa Ianao, Andriamanitra ô, no hampidina ireo any an-davaka lalina;
  - type: text
    content: ny mpandatsa-dra sy mpamitaka dia tsy hahatratra ny antsasaky ny androny;
  - type: text
    content: fa izaho kosa dia hatoky Anao.
  '3':
  - type: text
    content: noho ny feon’ny fahavalo sy ny fampahorian’ny ratsy fanahy,
  - type: text
    content: fa manjera loza amiko ireny
  - type: text
    content: ary amin’ny fahatezerana no ankahalany ahy.
  '4':
  - type: text
    content: Mangorohoro ato anatiko ny foko
  - type: text
    content: ary mamely ahy ny tahotra ny fahafatesana.
  '5':
  - type: text
    content: Tahotra sy hovitra no mahazo ahy
  - type: text
    content: ary manafotra ahy ny horohoro
  '6':
  - type: text
    content: 'ka hoy aho: Enga anie ka hanana elatra tahaka ny voromailala aho!'
  - type: text
    content: Dia hanidina aho ka hahita izay hitoerako.
  '7':
  - type: text
    content: Eny, handositra lavitra aho
  - type: text
    content: 'ka hitoetra any an-tany efitra. '
  - type: text
    content: Fiatoana.
  '8':
  - type: text
    content: Handeha haingana aho hamonjy fialofana
  - type: text
    content: mba tsy ho azon’ny tafio-drivotra sy ny ranonoram-baratra.
  '9':
  - type: text
    content: Aringano izy ary saratsaraho ny fiteniny, Tompo ô!
  - type: text
    content: Fa mahita loza sy adilahy ao an-tanàna aho.
