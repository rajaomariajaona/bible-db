document_id: GEN.22,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Vonona hanao fanatitra an’Isaka i Abrahama
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Taorianan’izany dia nizaha toetra an’i Abrahama Andriamanitra. Hoy Izy taminy: Ry Abrahama ô! Dia hoy i Abrahama: Inty aho. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nanatsotra ny tanany i Abrahama ka nandray ny antsy mba hamonoany ny zanany. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa niantso azy avy any an-danitra ilay '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Anjelin’NY TOMPO
    - type: text
      text: ' ka niteny hoe: Ry Abrahama ô, ry Abrahama ô! Dia namaly kosa izy hoe: Inty aho! '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy ilay Anjely: Aza manatsotra ny tananao amin’ny zaza ary aza maninona azy akory ianao; hitako izao fa matahotra an’Andriamanitra ianao ka tsy narovanao tamiko ny zanakao, dia ny lahitokanao. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary niherika nijery i Abrahama ka indro, nisy ondrilahy teo aorianany, voasarangotry ny kirihitra ny tandrony; dia lasa naka ilay ondrilahy i Abrahama ary nanolotra azy ho fanatitra dorana manontolo ho solon’ny zanany. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ny anaran’izany tany izany dia nataon’i Abrahama hoe NY TOMPO no hahita
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'NY TOMPO no hahita: Jehovah-Jire.'
      marker-yv: yv-n
    - type: text
      text: '; izany no ilazana mandraka ankehitriny hoe: Any an-tendrombohitra no hisehoan’NY TOMPO.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Niantso an’i Abrahama fanindroany avy any an-danitra ilay Anjelin’NY TOMPO '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ka niteny hoe: Ny tenako no nianianako, hoy NY TOMPO: Satria izany zavatra izany no nataonao ka tsy niaro ny zanakao, ilay lahitokanao, ianao, '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia hitahy anao tokoa Aho ary hahamaro dia hahamaro ny taranakao ho tahaka ny kintana eny amin’ny lanitra sy ho tahaka ny fasika eny amoron-dranomasina, ary hahazo ny vavahadin’ny fahavalony ny taranakao. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Amin’ny taranakao no hitahiana ny firenena rehetra ambonin’ny tany, satria nanaiky ny teniko ianao.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Niverina nankeny amin’ireo mpanompony i Abrahama, dia niainga izy ireo ka niaraka nankany Bery-Sheba. Ary i Abrahama dia nonina tany Bery-Sheba.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ireo taranak’i Nahora
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Andriamanitra: Ento ny zanakao, ny lahitokanao, izay tianao, dia Isaka, ka mankanesa any amin’ny tany Moria'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Moria: Asehon’NY TOMPO.'
      marker-yv: yv-n
    - type: text
      text: ', ary any no hanoloranao azy ho fanatitra dorana manontolo, ao amin’ny tendrombohitra iray izay holazaiko aminao.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Taorianan’izany dia nisy nanambara tamin’i Abrahama hoe: Indro, niteraka zazalahy tamin’i Nahora rahalahinao koa i Milka, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia i Oza lahimatoany, i Boza lahiaivo, i Kemoela, rain’i Arama, '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'i Kaseda, i Hazò, i Pildasy, i Jidlafa ary i Betoela. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary i Betoela dia niteraka an’i Rebeka. Ireo valo ireo no naterak’i Milka tamin’i Nahora, rahalahin’i Abrahama. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ny vady tsindranony koa, izay atao hoe Reoma, dia niteraka an’i Teba, i Gahama, i Tahasy ary i Maaka.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nifoha vao maraina i Abrahama, nanisy lasely ny borikiny ka nitondra ny mpanompony roa lahy sy Isaka zanany niaraka taminy. Namaky ny hazo harehitra amin’ny fanatitra dorana manontolo izy, dia niainga ka nankany amin’ny tany izay nolazain’Andriamanitra taminy. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nony tamin’ny andro fahatelo, raha nanopy ny masony i Abrahama, dia nahatazana ilay tany terỳ lavitra erỳ. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy i Abrahama tamin’ny zatovony: Mijanòna eto amin’ny boriky ianareo, fa izaho sy ny zazalahy dia handeha hankerỳ mba hivavaka, avy eo hiverina eto aminareo indray. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nalain’i Abrahama ny hazo harehitra amin’ny fanatitra dorana manontolo ka natataony an’Isaka zanany, fa izy kosa no nitondra ny afo sy ny antsy teny an-tanany. Dia niara-nandeha izy mianaka. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Isaka tamin’i Abrahama rainy hoe: Dada ô! Dia hoy izy: Inty aho, anaka! Ary hoy ny zanany: Indreto ny afo sy ny kitay, fa aiza kosa izay ondry hatao fanatitra dorana manontolo? '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy i Abrahama: Anaka, Andriamanitra no hahita izay ondry hatao fanatitra dorana manontolo!'
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia niara-nanohy ny diany ihany izy mianaka.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa tonga teo amin’ny tany izay nolazain’Andriamanitra taminy izy mianaka dia nanorina ny alitara teo i Abrahama ka nandahatra ny kitay. Dia namatotra an’Isaka zanany izy ka nametraka azy teo amin’ny alitara teo ambonin’ny kitay. '
