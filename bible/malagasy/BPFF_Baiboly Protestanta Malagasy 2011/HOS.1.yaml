document_id: HOS.1,3103
type_code: plt
verses:
  '1':
  - type: text
    content: Ny tenin’NY TOMPO, izay tonga tamin’i Hosea, zanak’i Bery, tamin’ny andro nanjakan’i Ozia, i Jotama, i Ahaza ary i Hezekia, mpanjakan’ny Joda, sy tamin’ny andron’i Jeroboama, zanak’i Joasy, mpanjakan’ny Israely.
  - type: heading
    content: Ny zanak’i Hosea sy i Gomera
  '2':
  - type: text
    content: 'Ny fiandohan’ny tenin’NY TOMPO tamin’ny alalan’i Hosea:'
  - type: text
    content: 'Hoy NY TOMPO tamin’i Hosea:'
  - type: text
    content: Andeha ianao manambady vehivavy janga,
  - type: text
    content: zanaky ny fijangajangana,
  - type: text
    content: fa fatra-mpijangajanga
  - type: text
    content: miala amin’NY TOMPO ny tany.
  '3':
  - type: text
    content: 'Dia lasa izy naka an’i Gomera, zanakavavin’i Diblaima. Ary nanana anaka Ravehivavy ka nitera-dahy taminy. '
  '4':
  - type: text
    content: 'Hoy NY TOMPO taminy:'
  - type: text
    content: Ataovy hoe Jezirela ny anarany;
  - type: text
    content: fa vetivety foana
  - type: text
    content: dia hovaliako ny taranak’i Jeho
  - type: text
    content: noho ny ra nalatsaka tao Jezirela,
  - type: text
    content: ary hatsahatro ny fanjakan’ny taranak’Israely.
  '5':
  - type: text
    content: Amin’izany andro izany dia hotapahiko ny tsipìkan’ny Israely
  - type: text
    content: ao amin’ny tany lemaka Jezirela.
  '6':
  - type: text
    content: 'Ary nanana anaka indray Ravehivavy ka nitera-bavy. Dia hoy NY TOMPO taminy:'
  - type: text
    content: Ataovy hoe Lo-Rohama
  - type: note
    content: 'Lo-Rohama: Tsy namindrana fo.'
  - type: text
    content: ' ny anarany;'
  - type: text
    content: fa tsy hamindra fo
  - type: text
    content: amin’ny taranak’Israely intsony Aho;
  - type: text
    content: eny, tsy havelako mihitsy ny helony.
  '7':
  - type: text
    content: Fa ny taranak’i Joda no hamindrako fo, ary Izaho TOMPO Andriamaniny no hamonjy azy, nefa tsy amin’ny tsipìka, na amin’ny sabatra na amin’ny ady na amin’ny soavaly na amin’ny mpitaingin-tsoavaly.
  '8':
  - type: text
    content: 'Rehefa nisara-nono i Lo-Rohama dia nanana anaka indray ny reniny ka nitera-dahy. '
  '9':
  - type: text
    content: 'Dia hoy NY TOMPO:'
  - type: text
    content: Ataovy hoe Lo-Amỳ
  - type: note
    content: 'Lo-Amỳ: Tsy oloko.'
  - type: text
    content: ' ny anarany'
  - type: text
    content: fa tsy oloko ianareo,
  - type: text
    content: ary Izaho tsy anareo.
