document_id: HOS.1,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny tenin’NY TOMPO, izay tonga tamin’i Hosea, zanak’i Bery, tamin’ny andro nanjakan’i Ozia, i Jotama, i Ahaza ary i Hezekia, mpanjakan’ny Joda, sy tamin’ny andron’i Jeroboama, zanak’i Joasy, mpanjakan’ny Israely.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny zanak’i Hosea sy i Gomera
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny fiandohan’ny tenin’NY TOMPO tamin’ny alalan’i Hosea:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Hoy NY TOMPO tamin’i Hosea:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Andeha ianao manambady vehivavy janga,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: zanaky ny fijangajangana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa fatra-mpijangajanga
  - type: usfm
    marker: q1
    children:
    - type: text
      text: miala amin’NY TOMPO ny tany.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia lasa izy naka an’i Gomera, zanakavavin’i Diblaima. Ary nanana anaka Ravehivavy ka nitera-dahy taminy. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy NY TOMPO taminy:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ataovy hoe Jezirela ny anarany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa vetivety foana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hovaliako ny taranak’i Jeho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: noho ny ra nalatsaka tao Jezirela,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hatsahatro ny fanjakan’ny taranak’Israely.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Amin’izany andro izany dia hotapahiko ny tsipìkan’ny Israely
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ao amin’ny tany lemaka Jezirela.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nanana anaka indray Ravehivavy ka nitera-bavy. Dia hoy NY TOMPO taminy:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ataovy hoe Lo-Rohama
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lo-Rohama: Tsy namindrana fo.'
      marker-yv: yv-n
    - type: text
      text: ' ny anarany;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa tsy hamindra fo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: amin’ny taranak’Israely intsony Aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, tsy havelako mihitsy ny helony.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa ny taranak’i Joda no hamindrako fo, ary Izaho TOMPO Andriamaniny no hamonjy azy, nefa tsy amin’ny tsipìka, na amin’ny sabatra na amin’ny ady na amin’ny soavaly na amin’ny mpitaingin-tsoavaly.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa nisara-nono i Lo-Rohama dia nanana anaka indray ny reniny ka nitera-dahy. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy NY TOMPO:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ataovy hoe Lo-Amỳ
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lo-Amỳ: Tsy oloko.'
      marker-yv: yv-n
    - type: text
      text: ' ny anarany'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa tsy oloko ianareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary Izaho tsy anareo.
