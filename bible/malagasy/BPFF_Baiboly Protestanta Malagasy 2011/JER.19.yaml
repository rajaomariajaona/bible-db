document_id: JER.19,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fanoharana ny amin’ny tavoara vaky
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao no lazain’NY TOMPO: Andeha mividy tavoara tanimanga, ary makà zokiolona amin’ny vahoaka sy zokiolona amin’ny mpisorona, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia torotoroy eo imason’ny olona izay miaraka aminao ilay tavoara '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ka lazao aminy hoe: Izao no lazain’NY TOMPO, Andriamanitra Tompon’izao rehetra izao: Toy izao no hanorotoroako ity firenena sy ity tanàna ity, dia toy ny famakin’ny mpanefy tanimanga ny vilany tany ka tsy azo atambatra intsony. Ary any Tofeta aza no handevenana noho ny tsy fisian’ny toeran-kafa handevenana intsony. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia toy izany no hataoko amin’ity tanàna ity sy amin’izay mponina ato; hatao tahaka an’i Tofeta ity tanàna ity, hoy NY TOMPO. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ny tranon’i Jerosalema sy ny tranon’ny mpanjakan’ny Joda dia ho tonga maloto tahaka an’i Tofeta, dia ny trano rehetra izay nandoroany ditin-kazo manitra teo an-tampony, ho an’izay rehetra eny amin’ny lanitra, sady nanidinany fanatitra aidina ho an’izay andriamanitra hafa.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary i Jeremia dia tonga avy tany Tofeta, izay nanirahan’NY TOMPO azy haminany; nitsangana teo amin’ny kianjan’ny tranon’NY TOMPO izy ka niteny tamin’ny vahoaka rehetra hoe: '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao no lazain’Andriamanitra, Tompon’izao rehetra izao, Andriamanitry ny Israely: Indro, hataoko mihatra amin’ity tanàna ity sy amin’ny vohitra miankina aminy rehetra ny loza rehetra izay nolazaiko hatao aminy noho ny nanamafisany ny hatony tsy nihainoany ny teniko.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: dia mankanesa any amin’ny Lohasahan’ny taranak’i Hinoma, izay eo anoloan’ny vavahady Harsota
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Harsota: Tavim-bilany.'
      marker-yv: yv-n
    - type: text
      text: ', ary torio eo ny teny izay holazaiko aminao '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ka lazao hoe: Mihainoa ny tenin’NY TOMPO, ry mpanjakan’ny Joda sy ry mponina ato Jerosalema! Izao no lazain’Andriamanitra, Tompon’izao rehetra izao, Andriamanitry ny Israely: Indro, hahatonga loza amin’ity tanàna ity Aho ka izay mandre izany dia hangintsina ny sofiny, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'satria efa nahafoy Ahy izy ka nahatonga ity tanàna ity ho hafahafa, fa nandoro ditin-kazo manitra tato ho an’ny andriamanitra hafa izay tsy fantany akory, ary tsy fantatry ny razany, na ny mpanjakan’ny Joda izy. Efa nameno ity tanàna ity tamin’ny ran’ny tsy manan-tsiny izy '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary nanorina toerana fanaovana sorona ho an’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Baala
    - type: text
      text: ' mba handoroany ny zanany ho fanatitra dorana manontolo ho an’i Baala, izay tsy nandidiako, na nolazaiko, na tao an-tsaiko akory aza. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa indro, avy ny andro, hoy NY TOMPO, izay tsy hanaovana ity toerana ity intsony hoe Tofeta, na Lohasahan’ny taranak’i Hinoma, fa Lohasaha Famonoana kosa. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hofoanako amin’ity tanàna ity ny fisainan’ny Joda sy Jerosalema ka hataoko lavon-tsabatra eo anoloan’ny fahavalony sy amin’ny tanan’izay mitady ny ainy izy; ary ny fatiny dia homeko ho fihinan’ny voromanidina sy ny bibidia. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ity tanàna ity dia hataoko ho figagana sy ho zavatra mampisitrisitra ka izay rehetra mandalo azy dia ho figagana sady hisitrisitra noho ny loza rehetra namelezana azy. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hampihinaniko ny nofon’ny zanany lahy sy ny nofon’ny zanany vavy izy, ary samy hihinana ny nofon’ny namany avy izy ao anatin’ny fahirano sy amin’ny fahaverezan-kevitra, izay haneren’ny fahavalony sy izay mitady ny ainy azy. '
