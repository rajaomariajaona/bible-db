document_id: MAT.10
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny Apostoly roa amby folo
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mar 3.16-19; Lio 6.14-16; Asa 1.13
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ary Jesosy niantso ny mpianany roa amby folo lahy hankeo Aminy ka nanome azy ireo fahefana handroaka fanahy maloto sy hanasitrana ny aretina rehetra mbamin’ny rofy rehetra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Izao no anaran’ny Apostoly roa amby folo lahy: Ny voalohany, i Simona, izay atao hoe Petera, sy i Andrea rahalahiny; i Jakoba, zanak’i Zebedio, sy i Jaona rahalahiny; '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'i Filipo sy i Bartolomeo; i Tomasy sy i Matio mpamory hetra; i Jakoba, zanak’i Alfeo; '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: i Tadeo; i Simona kananeana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.4 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: zelota.
    marker-yv: yv-n
  - type: text
    text: ' ary i Jodasy iskariota, ilay namadika Azy.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nanirahan’i Jesosy ny roa amby folo lahy
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mar 6.7-11; Lio 9.2-5; 10.3-12
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Nirahin’i Jesosy ireo roa amby folo lahy ireo ka nohafatrafarany hoe:'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Aza mandeha any amin’ny lalan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jentilisa
  - type: text
    text: ' ary aza miditra amin’izay tanànan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Samaritana
  - type: text
    text: ', '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: fa aleo mankany amin’ny ondry very amin’ny taranak’Israely.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary raha mandeha ianareo dia mitoria hoe: Efa manakaiky ny fanjakan’ny lanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Sitrano ny marary, atsangano ny maty, diovy ny boka, roahy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: demonia
  - type: text
    text: ; efa nahazo maimaimpoana ianareo, koa manomeza maimaimpoana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Aza mitady volamena na volafotsy na varahina, ho ao anatin’ny fehikibonareo, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: na kitapom-batsy ho amin’izay haleha, na akanjo roa na kapa na tehina; fa ny mpiasa dia mendrika hahazo ny haniny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Amin’izay tanàna na vohitra hidiranareo dia fantaro tsara izay mendrika ao ka mitoera ao mandra-pialanareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary raha vao miditra ao an-trano ianareo dia miarahabà ny olona ao. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Koa raha mendrika ny olona ao an-trano dia aoka ho ao aminy ny fiadanana tononinareo; fa raha tsy mendrika izy dia aoka hiverina aminareo ny fiadanana voatononareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary izay tsy mampandroso anareo, na tsy mihaino ny teninareo, mialà amin’izany trano na tanàna izany, dia ahintsano ny vovoka amin’ny tongotrareo. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Lazaiko aminareo marina tokoa fa ho moramora kokoa ny ho amin’ny tany Sodoma sy Gomora amin’ny andro fitsarana noho ny ho amin’izany tanàna izany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fanenjehana ho avy
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mar 13.9-13; Lio 12.11-12; 21.12-19
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Indro Aho maniraka anareo ho tahaka ny ondry eo ampovoan’ny amboadia; koa hendre tahaka ny bibilava ary aoka ho tsotra tahaka ny voromailala.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary mitandrema ianareo ny amin’ny olona; fa hatolony ho amin’ny Sinedriona sy hokapohiny ao amin’ny sinagogany ianareo; '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'ary hoentiny eo anatrehan’ny mpanapaka sy ny mpanjaka ianareo noho ny Amiko, ho vavolombelona aminy sy amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jentilisa
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Fa rehefa manolotra anareo izy dia aza manahy ny amin’izay fomba hitenenanareo, na ny amin’izay zavatra holazainareo; fa homena anareo amin’izany ora izany izay holazainareo. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Fa tsy ianareo no miteny fa ny Fanahin’ny Rainareo no miteny ao anatinareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary ny rahalahy dia hanolotra ny rahalahiny ho faty, ary ny ray dia hanolotra ny zanany; ary ny zanaka dia hitsangana hanohitra ny ray aman-dreniny ka hahafaty azy. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ary ho halan’ny olona rehetra ianareo noho ny anarako; fa izay maharitra hatramin’ny farany no hovonjena.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary raha enjehina ao amin’ny tanàna iray ianareo dia mandosira ho any amin’ny tanàna hafa; fa lazaiko aminareo marina tokoa: Tsy hahatapitra ny tanànan’ny Israely akory ianareo mandra-pahatongan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Zanak’Olona
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ireo izay milaza tena ho mpomba an’i Jesosy
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Lio 9.26; 12.2-9
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ny mpianatra dia tsy mihoatra noho ny mpampianatra, na ny mpanompo noho ny tompony. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Fa ampy amin’ny mpianatra raha tonga tahaka ny mpampianatra azy izy, ary ny mpanompo raha tonga tahaka ny tompony. Raha ny tompon-trano no nolazainy hoe Belzeboba, tsy mainka va ny ankohonany?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Koa amin’izany aza matahotra azy ianareo; fa tsy misy afenina izay tsy haseho, na takona izay tsy ho fantatra. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Izay lazaiko aminareo ao amin’ny maizina dia ambarao eo amin’ny mazava ary izay ren’ny sofinareo dia torio eny an-
  - type: usfm
    marker: w
    children:
    - type: text
      text: tampon-trano
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ary aza matahotra izay mamono ny vatana, nefa tsy mahay mamono ny fanahy; fa aleo matahotra izay mahay mahavery ny fanahy sy ny vatana any amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: afobe
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Tsy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: asariona
  - type: text
    text: ' iray ihany va no vidin’ny tsintsina roa? Nefa tsy misy na dia iray akory aza amin’ireny ho latsaka amin’ny tany, raha tsy avelan’ny Rainareo. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Fa na dia ny volon-dohanareo aza dia voaisa avokoa. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Koa aza matahotra; fa mihoatra noho ny tsintsina maro ianareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Ary amin’izany na zovy na zovy no hanaiky Ahy eo anatrehan’ny olona dia hekeko kosa izy eo anatrehan’ny Raiko izay any an-danitra. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Fa na zovy na zovy no handa Ahy eo anatrehan’ny olona dia holaviko kosa izy eo anatrehan’ny Raiko izay any an-danitra.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Tsy fiadanana fa sabatra
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Lio 12.51-53
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ary aza ataonareo fa tonga hitondra fiadanana etỳ ambonin’ny tany Aho; tsy tonga hitondra fiadanana Aho fa sabatra. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Fa tonga Aho hampifandrafy olona amin’ny rainy, ny zanakavavy amin’ny reniny ary ny vinantovavy amin’ny rafozambaviny; '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: ary ny ankohonan’ny olona ihany no ho fahavalony (Mik 7.6).
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fifikirana amin’i Jesosy
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mar 8.34-35; Lio 9.23-24; 14.26-27
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Izay tia ray na reny mihoatra noho ny fitiavany Ahy dia tsy mendrika Ahy ary izay tia ny zanany lahy na ny zanany vavy mihoatra noho ny fitiavany Ahy dia tsy mendrika Ahy. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Izay tsy mitondra ny hazofijaliany ka tsy manaraka Ahy dia tsy mendrika Ahy. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Izay mamonjy ny ainy no hahavery azy ary izay mahafoy ny ainy noho ny Amiko dia hahavonjy azy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Izay mandray anareo dia mandray Ahy
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mar 9.37, 41; Lio 9.48; 10.16; Jao 13.20
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Izay mandray anareo dia mandray Ahy; ary izay mandray Ahy dia mandray izay naniraka Ahy. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Izay mandray mpaminany, satria mpaminany izy, dia handray ny valim-pitian’ny mpaminany; ary izay mandray olona marina, satria olona marina izy, dia handray ny valim-pitian’ny olona marina. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: Ary na zovy na zovy no manome rano mangatsiaka na dia eran’ny kaopy ihany aza hosotroin’ny iray amin’ireo madinika ireo, satria mpianatra izy, dia lazaiko aminareo marina tokoa fa tsy ho very ny valim-pitiany.
