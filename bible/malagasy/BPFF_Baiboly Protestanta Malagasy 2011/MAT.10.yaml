document_id: MAT.10,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny Apostoly roa amby folo
  - type: heading
    content: Mar 3.16-19; Lio 6.14-16; Asa 1.13
  - type: text
    content: Ary Jesosy niantso ny mpianany roa amby folo lahy hankeo Aminy ka nanome azy ireo fahefana handroaka fanahy maloto sy hanasitrana ny aretina rehetra mbamin’ny rofy rehetra.
  '10':
  - type: text
    content: na kitapom-batsy ho amin’izay haleha, na akanjo roa na kapa na tehina; fa ny mpiasa dia mendrika hahazo ny haniny.
  '11':
  - type: text
    content: Amin’izay tanàna na vohitra hidiranareo dia fantaro tsara izay mendrika ao ka mitoera ao mandra-pialanareo.
  '12':
  - type: text
    content: 'Ary raha vao miditra ao an-trano ianareo dia miarahabà ny olona ao. '
  '13':
  - type: text
    content: Koa raha mendrika ny olona ao an-trano dia aoka ho ao aminy ny fiadanana tononinareo; fa raha tsy mendrika izy dia aoka hiverina aminareo ny fiadanana voatononareo.
  '14':
  - type: text
    content: 'Ary izay tsy mampandroso anareo, na tsy mihaino ny teninareo, mialà amin’izany trano na tanàna izany, dia ahintsano ny vovoka amin’ny tongotrareo. '
  '15':
  - type: text
    content: Lazaiko aminareo marina tokoa fa ho moramora kokoa ny ho amin’ny tany Sodoma sy Gomora amin’ny andro fitsarana noho ny ho amin’izany tanàna izany.
  - type: heading
    content: Ny fanenjehana ho avy
  - type: heading
    content: Mar 13.9-13; Lio 12.11-12; 21.12-19
  '16':
  - type: text
    content: Indro Aho maniraka anareo ho tahaka ny ondry eo ampovoan’ny amboadia; koa hendre tahaka ny bibilava ary aoka ho tsotra tahaka ny voromailala.
  '17':
  - type: text
    content: 'Ary mitandrema ianareo ny amin’ny olona; fa hatolony ho amin’ny Sinedriona sy hokapohiny ao amin’ny sinagogany ianareo; '
  '18':
  - type: text
    content: 'ary hoentiny eo anatrehan’ny mpanapaka sy ny mpanjaka ianareo noho ny Amiko, ho vavolombelona aminy sy amin’ny '
  - type: text
    content: Jentilisa
  - type: text
    content: .
  '19':
  - type: text
    content: 'Fa rehefa manolotra anareo izy dia aza manahy ny amin’izay fomba hitenenanareo, na ny amin’izay zavatra holazainareo; fa homena anareo amin’izany ora izany izay holazainareo. '
  '2':
  - type: text
    content: 'Izao no anaran’ny Apostoly roa amby folo lahy: Ny voalohany, i Simona, izay atao hoe Petera, sy i Andrea rahalahiny; i Jakoba, zanak’i Zebedio, sy i Jaona rahalahiny; '
  '20':
  - type: text
    content: Fa tsy ianareo no miteny fa ny Fanahin’ny Rainareo no miteny ao anatinareo.
  '21':
  - type: text
    content: 'Ary ny rahalahy dia hanolotra ny rahalahiny ho faty, ary ny ray dia hanolotra ny zanany; ary ny zanaka dia hitsangana hanohitra ny ray aman-dreniny ka hahafaty azy. '
  '22':
  - type: text
    content: Ary ho halan’ny olona rehetra ianareo noho ny anarako; fa izay maharitra hatramin’ny farany no hovonjena.
  '23':
  - type: text
    content: 'Ary raha enjehina ao amin’ny tanàna iray ianareo dia mandosira ho any amin’ny tanàna hafa; fa lazaiko aminareo marina tokoa: Tsy hahatapitra ny tanànan’ny Israely akory ianareo mandra-pahatongan’ny '
  - type: text
    content: Zanak’Olona
  - type: text
    content: .
  - type: heading
    content: Ireo izay milaza tena ho mpomba an’i Jesosy
  - type: heading
    content: Lio 9.26; 12.2-9
  '24':
  - type: text
    content: 'Ny mpianatra dia tsy mihoatra noho ny mpampianatra, na ny mpanompo noho ny tompony. '
  '25':
  - type: text
    content: Fa ampy amin’ny mpianatra raha tonga tahaka ny mpampianatra azy izy, ary ny mpanompo raha tonga tahaka ny tompony. Raha ny tompon-trano no nolazainy hoe Belzeboba, tsy mainka va ny ankohonany?
  '26':
  - type: text
    content: 'Koa amin’izany aza matahotra azy ianareo; fa tsy misy afenina izay tsy haseho, na takona izay tsy ho fantatra. '
  '27':
  - type: text
    content: Izay lazaiko aminareo ao amin’ny maizina dia ambarao eo amin’ny mazava ary izay ren’ny sofinareo dia torio eny an-
  - type: text
    content: tampon-trano
  - type: text
    content: .
  '28':
  - type: text
    content: 'Ary aza matahotra izay mamono ny vatana, nefa tsy mahay mamono ny fanahy; fa aleo matahotra izay mahay mahavery ny fanahy sy ny vatana any amin’ny '
  - type: text
    content: afobe
  - type: text
    content: '. '
  '29':
  - type: text
    content: 'Tsy '
  - type: text
    content: asariona
  - type: text
    content: ' iray ihany va no vidin’ny tsintsina roa? Nefa tsy misy na dia iray akory aza amin’ireny ho latsaka amin’ny tany, raha tsy avelan’ny Rainareo. '
  '3':
  - type: text
    content: 'i Filipo sy i Bartolomeo; i Tomasy sy i Matio mpamory hetra; i Jakoba, zanak’i Alfeo; '
  '30':
  - type: text
    content: 'Fa na dia ny volon-dohanareo aza dia voaisa avokoa. '
  '31':
  - type: text
    content: Koa aza matahotra; fa mihoatra noho ny tsintsina maro ianareo.
  '32':
  - type: text
    content: 'Ary amin’izany na zovy na zovy no hanaiky Ahy eo anatrehan’ny olona dia hekeko kosa izy eo anatrehan’ny Raiko izay any an-danitra. '
  '33':
  - type: text
    content: Fa na zovy na zovy no handa Ahy eo anatrehan’ny olona dia holaviko kosa izy eo anatrehan’ny Raiko izay any an-danitra.
  - type: heading
    content: Tsy fiadanana fa sabatra
  - type: heading
    content: Lio 12.51-53
  '34':
  - type: text
    content: 'Ary aza ataonareo fa tonga hitondra fiadanana etỳ ambonin’ny tany Aho; tsy tonga hitondra fiadanana Aho fa sabatra. '
  '35':
  - type: text
    content: 'Fa tonga Aho hampifandrafy olona amin’ny rainy, ny zanakavavy amin’ny reniny ary ny vinantovavy amin’ny rafozambaviny; '
  '36':
  - type: text
    content: ary ny ankohonan’ny olona ihany no ho fahavalony (Mik 7.6).
  - type: heading
    content: Ny fifikirana amin’i Jesosy
  - type: heading
    content: Mar 8.34-35; Lio 9.23-24; 14.26-27
  '37':
  - type: text
    content: 'Izay tia ray na reny mihoatra noho ny fitiavany Ahy dia tsy mendrika Ahy ary izay tia ny zanany lahy na ny zanany vavy mihoatra noho ny fitiavany Ahy dia tsy mendrika Ahy. '
  '38':
  - type: text
    content: 'Izay tsy mitondra ny hazofijaliany ka tsy manaraka Ahy dia tsy mendrika Ahy. '
  '39':
  - type: text
    content: Izay mamonjy ny ainy no hahavery azy ary izay mahafoy ny ainy noho ny Amiko dia hahavonjy azy.
  - type: heading
    content: Izay mandray anareo dia mandray Ahy
  - type: heading
    content: Mar 9.37, 41; Lio 9.48; 10.16; Jao 13.20
  '4':
  - type: text
    content: i Tadeo; i Simona kananeana
  - type: note
    content: 'Na: zelota.'
  - type: text
    content: ' ary i Jodasy iskariota, ilay namadika Azy.'
  - type: heading
    content: Ny nanirahan’i Jesosy ny roa amby folo lahy
  - type: heading
    content: Mar 6.7-11; Lio 9.2-5; 10.3-12
  '40':
  - type: text
    content: 'Izay mandray anareo dia mandray Ahy; ary izay mandray Ahy dia mandray izay naniraka Ahy. '
  '41':
  - type: text
    content: 'Izay mandray mpaminany, satria mpaminany izy, dia handray ny valim-pitian’ny mpaminany; ary izay mandray olona marina, satria olona marina izy, dia handray ny valim-pitian’ny olona marina. '
  '42':
  - type: text
    content: Ary na zovy na zovy no manome rano mangatsiaka na dia eran’ny kaopy ihany aza hosotroin’ny iray amin’ireo madinika ireo, satria mpianatra izy, dia lazaiko aminareo marina tokoa fa tsy ho very ny valim-pitiany.
  '5':
  - type: text
    content: 'Nirahin’i Jesosy ireo roa amby folo lahy ireo ka nohafatrafarany hoe:'
  - type: text
    content: 'Aza mandeha any amin’ny lalan’ny '
  - type: text
    content: Jentilisa
  - type: text
    content: ' ary aza miditra amin’izay tanànan’ny '
  - type: text
    content: Samaritana
  - type: text
    content: ', '
  '6':
  - type: text
    content: fa aleo mankany amin’ny ondry very amin’ny taranak’Israely.
  '7':
  - type: text
    content: 'Ary raha mandeha ianareo dia mitoria hoe: Efa manakaiky ny fanjakan’ny lanitra. '
  '8':
  - type: text
    content: 'Sitrano ny marary, atsangano ny maty, diovy ny boka, roahy ny '
  - type: text
    content: demonia
  - type: text
    content: ; efa nahazo maimaimpoana ianareo, koa manomeza maimaimpoana.
  '9':
  - type: text
    content: 'Aza mitady volamena na volafotsy na varahina, ho ao anatin’ny fehikibonareo, '
