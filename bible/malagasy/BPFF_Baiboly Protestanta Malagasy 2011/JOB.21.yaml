document_id: JOB.21
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Ny teny navalin’i Joba: Mitombina ny fahasambaran’ny ratsy fanahy'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Dia namaly i Joba hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Mihainoa tsara ny teniko
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary aoka izany no ho fampiononanareo ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Mandefera amiko ianareo fa mba hiteny kosa aho izao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary rehefa tapitra ny teniko dia mahazo mandatsalatsa ihany indray ianareo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Raha ny amiko, moa ny ataon’ny olona va no itarainako?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary raha izany, nahoana no hahalefitra ny fanahiko?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Jereo aho dia aoka ho talanjona ianareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mitampena vava.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Eny, raha mahatsiaro izany aho dia raiki-tahotra
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady toran-kovitra ny tenako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Nahoana no velona ny ratsy fanahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka sady tratra antitra no vao mainka mitombo hery?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ny zanany koa dia mitomoetra tsara eo anatrehany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny zafiny dia hitan’ny masony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ny ankohonany dia miadana, tsy misy mampitahotra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny tsorakazon’Andriamanitra dia tsy mamely azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Mampiteraka ny ombilahiny ka mahavanona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: miteraka ny ombivaviny ka tsy mamotsotra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Mamela ny zanany madinika sy ny ankizilahiny
- type: usfm
  marker: q1
  children:
  - type: text
    text: hikorana toy ny ondry aman’osy izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Mihoby mitondra ampongatapaka sy lokanga izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mifaly amin’ny feon-tsodina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Mandany ny androny amin’ny fahafinaretana izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'amin’ny indray mipy maso no idinany any amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: fitoeran’ny maty
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Kanefa anie dia ireo no manao amin’Andriamanitra hoe: Mialà aminay!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa tsy mba irinay ny hahafantatra ny lalanao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Zinona izay Tsitoha no hotompoinay?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary inona no soa ho azonay raha mivavaka Aminy?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Indro, tsy eo am-pelatanany ny fahafinaretany!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Lavitra ahy ny fisainan’ny ratsy fanahy!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Impiry moa no mba maty ny jiron’ny ratsy fanahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy misy ny loza manjo azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary anomezan’Andriamanitra ny anjarany noho ny fahatezerany?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Moa va izy tonga tahaka ny mololo voatetika indaosin’ny rivotra
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy tahaka ny akofa entin’ny tafio-drivotra?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Andriamanitra, hoy ianareo, mbola hampijaly ny zanany noho ny heloky ny rainy!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsia! Fa ny tenan’ireny ihany no tokony handray ny valiny ary aoka ho fantany izany!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Aoka ny masony ihany no hahita ny fahalevonany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary aoka ny tenany ihany no hisotro ny fahatezeran’ny Tsitoha.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Fa mampaninona azy moa ny amin’ny taranany mandimby azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: raha efa voafetra ny isan’ny androny?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Moa Andriamanitra va no hampianarina fahalalana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa Izy aza no mitsara ny any an-danitra?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Maty ny iray raha mbola tao anatin’ny tanjany
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady niadana tanteraka tsy nanana ahiahy;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: feno tavy ny andilany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary vonton-tsoka ny taolany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Ny iray kosa dia maty ao anatin’ny fangidiam-panahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy mba nanandrana soa akory.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Samy mandry ao amin’ny vovoka izy roa tonta
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka rakotry ny olitra ny tenany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Indro, fantatro ny hevitrareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny saim-petsy amelezanareo ahy;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'fa hoy ianareo: Aiza ny tranon’ny andriana?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary aiza ny tranolay fitoeran’ny ratsy fanahy?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Kanefa tsy mba nanontany ny mpandalo va ianareo?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tsy mba noheverinareo va ny zavatra ambarany?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Amin’ny andro hahitan-doza dia voaaro ihany ny ratsy fanahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary amin’ny andron’ny fahatezerana dia mahita fialofana izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Iza no hanambara mifanatrika aminy ny lalany?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary raha misy zavatra nataony, iza no hamaly azy amin’izany?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Entina ho eny an-tany fandevenana izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka misy miambina eo amin’ny fasana;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: mamy aminy ny bainga any an-dohasaha;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny olona rehetra dia manotrona nanaraka azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary maro tsy hita isa no efa nialoha lalana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Endre! Ity ianareo mba mampionona ahy foana!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary izay sisa amin’ny teny avalinareo dia lainga ihany!
