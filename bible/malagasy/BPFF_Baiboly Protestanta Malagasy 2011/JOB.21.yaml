document_id: JOB.21,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: 'Ny teny navalin’i Joba: Mitombina ny fahasambaran’ny ratsy fanahy'
  - type: text
    content: 'Dia namaly i Joba hoe:'
  '10':
  - type: text
    content: Mampiteraka ny ombilahiny ka mahavanona,
  - type: text
    content: miteraka ny ombivaviny ka tsy mamotsotra.
  '11':
  - type: text
    content: Mamela ny zanany madinika sy ny ankizilahiny
  - type: text
    content: hikorana toy ny ondry aman’osy izy.
  '12':
  - type: text
    content: Mihoby mitondra ampongatapaka sy lokanga izy
  - type: text
    content: ary mifaly amin’ny feon-tsodina.
  '13':
  - type: text
    content: Mandany ny androny amin’ny fahafinaretana izy;
  - type: text
    content: 'amin’ny indray mipy maso no idinany any amin’ny '
  - type: text
    content: fitoeran’ny maty
  - type: text
    content: .
  '14':
  - type: text
    content: 'Kanefa anie dia ireo no manao amin’Andriamanitra hoe: Mialà aminay!'
  - type: text
    content: Fa tsy mba irinay ny hahafantatra ny lalanao.
  '15':
  - type: text
    content: Zinona izay Tsitoha no hotompoinay?
  - type: text
    content: Ary inona no soa ho azonay raha mivavaka Aminy?
  '16':
  - type: text
    content: Indro, tsy eo am-pelatanany ny fahafinaretany!
  - type: text
    content: Lavitra ahy ny fisainan’ny ratsy fanahy!
  '17':
  - type: text
    content: Impiry moa no mba maty ny jiron’ny ratsy fanahy
  - type: text
    content: sy misy ny loza manjo azy
  - type: text
    content: ary anomezan’Andriamanitra ny anjarany noho ny fahatezerany?
  '18':
  - type: text
    content: Moa va izy tonga tahaka ny mololo voatetika indaosin’ny rivotra
  - type: text
    content: sy tahaka ny akofa entin’ny tafio-drivotra?
  '19':
  - type: text
    content: Andriamanitra, hoy ianareo, mbola hampijaly ny zanany noho ny heloky ny rainy!
  - type: text
    content: Tsia! Fa ny tenan’ireny ihany no tokony handray ny valiny ary aoka ho fantany izany!
  '2':
  - type: text
    content: Mihainoa tsara ny teniko
  - type: text
    content: ary aoka izany no ho fampiononanareo ahy.
  '20':
  - type: text
    content: Aoka ny masony ihany no hahita ny fahalevonany
  - type: text
    content: ary aoka ny tenany ihany no hisotro ny fahatezeran’ny Tsitoha.
  '21':
  - type: text
    content: Fa mampaninona azy moa ny amin’ny taranany mandimby azy
  - type: text
    content: raha efa voafetra ny isan’ny androny?
  '22':
  - type: text
    content: Moa Andriamanitra va no hampianarina fahalalana,
  - type: text
    content: nefa Izy aza no mitsara ny any an-danitra?
  '23':
  - type: text
    content: Maty ny iray raha mbola tao anatin’ny tanjany
  - type: text
    content: sady niadana tanteraka tsy nanana ahiahy;
  '24':
  - type: text
    content: feno tavy ny andilany
  - type: text
    content: ary vonton-tsoka ny taolany.
  '25':
  - type: text
    content: Ny iray kosa dia maty ao anatin’ny fangidiam-panahy
  - type: text
    content: ka tsy mba nanandrana soa akory.
  '26':
  - type: text
    content: Samy mandry ao amin’ny vovoka izy roa tonta
  - type: text
    content: ka rakotry ny olitra ny tenany.
  '27':
  - type: text
    content: Indro, fantatro ny hevitrareo
  - type: text
    content: sy ny saim-petsy amelezanareo ahy;
  '28':
  - type: text
    content: 'fa hoy ianareo: Aiza ny tranon’ny andriana?'
  - type: text
    content: Ary aiza ny tranolay fitoeran’ny ratsy fanahy?
  '29':
  - type: text
    content: Kanefa tsy mba nanontany ny mpandalo va ianareo?
  - type: text
    content: Ary tsy mba noheverinareo va ny zavatra ambarany?
  '3':
  - type: text
    content: Mandefera amiko ianareo fa mba hiteny kosa aho izao;
  - type: text
    content: ary rehefa tapitra ny teniko dia mahazo mandatsalatsa ihany indray ianareo.
  '30':
  - type: text
    content: Amin’ny andro hahitan-doza dia voaaro ihany ny ratsy fanahy
  - type: text
    content: ary amin’ny andron’ny fahatezerana dia mahita fialofana izy.
  '31':
  - type: text
    content: Iza no hanambara mifanatrika aminy ny lalany?
  - type: text
    content: Ary raha misy zavatra nataony, iza no hamaly azy amin’izany?
  '32':
  - type: text
    content: Entina ho eny an-tany fandevenana izy
  - type: text
    content: ka misy miambina eo amin’ny fasana;
  '33':
  - type: text
    content: mamy aminy ny bainga any an-dohasaha;
  - type: text
    content: ny olona rehetra dia manotrona nanaraka azy
  - type: text
    content: ary maro tsy hita isa no efa nialoha lalana.
  '34':
  - type: text
    content: Endre! Ity ianareo mba mampionona ahy foana!
  - type: text
    content: Ary izay sisa amin’ny teny avalinareo dia lainga ihany!
  '4':
  - type: text
    content: Raha ny amiko, moa ny ataon’ny olona va no itarainako?
  - type: text
    content: Ary raha izany, nahoana no hahalefitra ny fanahiko?
  '5':
  - type: text
    content: Jereo aho dia aoka ho talanjona ianareo
  - type: text
    content: ary mitampena vava.
  '6':
  - type: text
    content: Eny, raha mahatsiaro izany aho dia raiki-tahotra
  - type: text
    content: sady toran-kovitra ny tenako.
  '7':
  - type: text
    content: Nahoana no velona ny ratsy fanahy
  - type: text
    content: ka sady tratra antitra no vao mainka mitombo hery?
  '8':
  - type: text
    content: Ny zanany koa dia mitomoetra tsara eo anatrehany
  - type: text
    content: ary ny zafiny dia hitan’ny masony.
  '9':
  - type: text
    content: Ny ankohonany dia miadana, tsy misy mampitahotra,
  - type: text
    content: ary ny tsorakazon’Andriamanitra dia tsy mamely azy.
