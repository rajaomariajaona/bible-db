document_id: ROM.2,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fitsarana marina ataon’Andriamanitra
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa amin’izany dia tsy manan-kalahatra ianao, ry olona, na iza na iza ianao no mitsara; fa izay itsaranao ny sasany no anamelohanao ny tenanao koa, fa ianao izay mitsara aza dia mba manao izany ihany koa. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voninahitra sy laza ary fiadanana kosa ho an’ny olona rehetra izay manao ny tsara, amin’ny Jiosy aloha, dia amin’ny Jentilisa koa! '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa tsy misy fizahan-tavan’olona amin’Andriamanitra.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa izay nanota tsy nanana ny lalàna dia ho very tsy manana ny lalàna; ary izay nanota nanana ny lalàna kosa dia hotsaraina araka ny lalàna. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Satria tsy ny mpandre ny lalàna no marina eo anatrehan’Andriamanitra, fa ny mpankatò ny lalàna no hohamarinina; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fa na oviana na oviana ireo Jentilisa tsy manana ny lalàna ireo no misy manao izay nandidian’ny lalàna, araka ny nahim-pony, na dia tsy manana ny lalàna aza ireo dia manana ny lalànan’ny tenany ihany; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fa ireo dia maneho ny asan’ny lalàna ho voasoratra ao am-pony sady ny fieritreretany rahateo no vavolombelony, ary ny fisainany dia mifampiampanga na mifanafaka ihany koa. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izany no hiseho amin’ny andro izay hitsaran’Andriamanitra ny zavatra takona ataon’ny olona, araka ny Filazantsara toriko amin’ny alalan’i Jesosy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny tsy fankatoavan’Israely
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa raha milaza tena ho '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jiosy
    - type: text
      text: ' ianao ka mitoky amin’ny lalàna sy manao an’Andriamanitra ho reharehanao, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'raha mahalala ny sitrapony ianao sady mahay mamantatra izay zava-dehibe satria efa nampianarina ny lalàna, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary matoky ny tenanao ho mpitarika ny jamba, fanazavana ny ao amin’ny maizina, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nefa fantatsika fa ny fitsaran’Andriamanitra dia araka ny marina amin’izay manao toy izany. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'mpananatra ny adala, mpampianatra ny bodo, satria ianao dia manana ny lalàna ho mariky ny fahalalana sy ny fahamarinana: '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moa ianao izay mampianatra ny sasany, tsy mba mampianatra ny tenanao koa va ianao? Ianao izay mitory hoe: Aza mangalatra, mba mangalatra ihany va ianao? '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ianao izay miteny hoe: Aza mijangajanga, mba mijangajanga ihany va ianao? Ianao izay manao ny sampy ho fahavetavetana, mba mandroba tempoly ihany va ianao? '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ianao izay manao ny lalàna ho reharehanao, mba manala voninahitra an’Andriamanitra ihany va ianao amin’ny andikanao ny lalàna? '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa araka ny voasoratra dia ianareo no itenenana ratsy ny anaran’Andriamanitra any amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jentilisa
    - type: text
      text: .
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mahasoa ny famorana raha mankatò ny lalàna ianao; fa raha mpandika ny lalàna kosa ianao dia tonga toy ny tsy voafora na dia efa voafora aza. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary raha mankatò ny fitsipiky ny lalàna ny tsy voafora, tsy hatao ho isan’ny voafora va izy na dia tsy voafora aza? '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moa tsy hotsarain’ny tsy voafora izay mankatò ny lalàna va ianao izay mpandika ny lalàna na dia manana ny soratra sy ny famorana aza? '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa tsy ao amin’izay miseho ivelany no maha Jiosy, ary tsy izay miseho eo amin’ny nofo no famorana; '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: fa izay ao amin’ny miafina no maha Jiosy, ary ny famorana dia amin’ny fo, amin’ny fanahy fa tsy amin’ny soratra; koa ireny dia tsy mandray dera avy amin’ny olombelona fa avy amin’Andriamanitra.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ianao, ry olona, izay mitsara ny manao izany, kanefa manao izany koa ny tenanao, moa heverinao va fa ho afa-mandositra ny fitsaran’Andriamanitra ianao? '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Sa hamavoinao ny harenan’ny fahamoram-panahiny sy ny fandeferany ary ny fahari-pony, satria tsy fantatrao fa ny fahamoram-panahin’Andriamanitra dia mitaona anao hibebaka? '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ny ditranao sy ny fonao tsy mibebaka no iraketanao fahatezerana ho anao amin’ny andro fahatezerana sy fampisehoana ny fitsarana marina ataon’Andriamanitra, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'izay hamaly ny olona rehetra araka ny asany avy: '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fiainana mandrakizay no ho an’izay maharitra manao soa mandrakariva ka mitady voninahitra sy laza ary tsy fahafatesana; '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fahavinirana sy fahatezerana kosa no ho an’izay mitady ny ho an’ny tenany ihany sady manohitra ny marina ka manaraka ny tsy marina; '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fahoriana sy tebiteby ho an’ny olona rehetra izay manao ratsy, amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jiosy
    - type: text
      text: ' aloha, nefa amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jentilisa
    - type: text
      text: ' koa! '
