document_id: ISA.25,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Fialofan’ny reraka NY TOMPO
  - type: text
    content: TOMPO ô, Andriamanitro Ianao;
  - type: text
    content: hanandratra Anao sy hidera ny anaranao aho,
  - type: text
    content: fa nahavita zava-mahagaga Ianao,
  - type: text
    content: zavatra efa voakasa hatramin’ny ela sady azo antoka no mafy orina.
  '10':
  - type: text
    content: Fa mipetraka amin’ity tendrombohitra ity ny tanan’NY TOMPO;
  - type: text
    content: ary hohosihosena ao amin’izay misy azy i Moaba,
  - type: text
    content: tahaka ny fanosihosy ny mololo miavosa amin’ny rano ao am-pahitra;
  '11':
  - type: text
    content: hamelatra ny tanany ao anatin’izany izy,
  - type: text
    content: tahaka ny famelatry ny mpilomano ny tanany raha milomano;
  - type: text
    content: fa NY TOMPO kosa mampietry ny fiavonavonany
  - type: text
    content: sy ny fahamailamailaky ny tanany.
  '12':
  - type: text
    content: Harodany sy haetriny ny mandanao mafy sy avo
  - type: text
    content: ka hataony mikasika amin’ny tany sy mihosom-bovoka.
  '2':
  - type: text
    content: Fa nataonao tonga korontam-bato ny tanàna;
  - type: text
    content: ilay tanàna mimanda dia tena rava tanteraka;
  - type: text
    content: ny lapan’ny hafa firenena dia tsy hita tao an-tanàna intsony;
  - type: text
    content: tsy hatsangana mandrakizay intsony ireo.
  '3':
  - type: text
    content: Noho izany dia hankalaza Anao ny firenena matanjaka,
  - type: text
    content: hatahotra Anao ny tanànan’ny firenena mpampihorohoro.
  '4':
  - type: text
    content: Fa fiarovana mafy ho an’ny reraka Ianao;
  - type: text
    content: eny, fiarovana mafy ho an’ny mahantra ao amin’ny fahoriany,
  - type: text
    content: fialofana amin’ny oram-batravatra,
  - type: text
    content: alokaloka amin’ny hainandro;
  - type: text
    content: fa ny fahatezeran’ny mpampihorohoro
  - type: text
    content: dia tahaka ny orana mivatravatra mamely ny rindrina.
  '5':
  - type: text
    content: Tahaka ny fandresenao ny hainandro izay mamely ny tany karankaina
  - type: text
    content: no andresenao ny fitabataban’ny firenena hafa;
  - type: text
    content: eny, tahaka ny hainandro resin’ny aloky ny rahona matevina
  - type: text
    content: no andresena ny fanakoran’ny mpampihorohoro.
  - type: heading
    content: Fanasana lehibe ho an’ny firenena rehetra
  '6':
  - type: text
    content: Andriamanitra, Tompon’izao rehetra izao,
  - type: text
    content: dia hanao fanasana ho an’ny firenena rehetra eto amin’ity tendrombohitra ity;
  - type: text
    content: fanasana amin’ny hena matavy,
  - type: text
    content: fanasana amin’ny divay efa niotrika ela,
  - type: text
    content: hena matavy, be tsoka,
  - type: text
    content: divay efa niotrika ela, voadio tsara.
  '7':
  - type: text
    content: Eto amin’ity tendrombohitra ity
  - type: text
    content: no hanafoanany ny sarona izay manakona ny olona rehetra
  - type: text
    content: sy ny rakotra izay mandrakotra ny firenena rehetra;
  '8':
  - type: text
    content: hofoanany tsy hisy mandrakizay ny fahafatesana;
  - type: text
    content: NY TOMPO Andriamanitra no hamafa
  - type: text
    content: ny ranomaso amin’ny tava rehetra
  - type: text
    content: sady hanafoana eny amin’ny tany rehetra
  - type: text
    content: ny fahafaham-baraka amin’ny olony.
  - type: text
    content: NY TOMPO no niteny.
  - type: heading
    content: Fanalam-baraka an’i Moaba
  '9':
  - type: text
    content: 'Holazaina amin’izany andro izany hoe:'
  - type: text
    content: Indro Andriamanitsika
  - type: text
    content: izay nantenaintsika hamonjy antsika.
  - type: text
    content: Indro NY TOMPO izay nandrasantsika,
  - type: text
    content: koa aoka isika hifaly
  - type: text
    content: sady hiravoravo amin’ny famonjeny!
