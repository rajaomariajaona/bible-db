document_id: ISA.25
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fialofan’ny reraka NY TOMPO
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: TOMPO ô, Andriamanitro Ianao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hanandratra Anao sy hidera ny anaranao aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa nahavita zava-mahagaga Ianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: zavatra efa voakasa hatramin’ny ela sady azo antoka no mafy orina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Fa nataonao tonga korontam-bato ny tanàna;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ilay tanàna mimanda dia tena rava tanteraka;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny lapan’ny hafa firenena dia tsy hita tao an-tanàna intsony;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy hatsangana mandrakizay intsony ireo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Noho izany dia hankalaza Anao ny firenena matanjaka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hatahotra Anao ny tanànan’ny firenena mpampihorohoro.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Fa fiarovana mafy ho an’ny reraka Ianao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, fiarovana mafy ho an’ny mahantra ao amin’ny fahoriany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fialofana amin’ny oram-batravatra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: alokaloka amin’ny hainandro;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny fahatezeran’ny mpampihorohoro
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia tahaka ny orana mivatravatra mamely ny rindrina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Tahaka ny fandresenao ny hainandro izay mamely ny tany karankaina
- type: usfm
  marker: q1
  children:
  - type: text
    text: no andresenao ny fitabataban’ny firenena hafa;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, tahaka ny hainandro resin’ny aloky ny rahona matevina
- type: usfm
  marker: q1
  children:
  - type: text
    text: no andresena ny fanakoran’ny mpampihorohoro.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fanasana lehibe ho an’ny firenena rehetra
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Andriamanitra, Tompon’izao rehetra izao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hanao fanasana ho an’ny firenena rehetra eto amin’ity tendrombohitra ity;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fanasana amin’ny hena matavy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fanasana amin’ny divay efa niotrika ela,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hena matavy, be tsoka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: divay efa niotrika ela, voadio tsara.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Eto amin’ity tendrombohitra ity
- type: usfm
  marker: q1
  children:
  - type: text
    text: no hanafoanany ny sarona izay manakona ny olona rehetra
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny rakotra izay mandrakotra ny firenena rehetra;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: hofoanany tsy hisy mandrakizay ny fahafatesana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: NY TOMPO Andriamanitra no hamafa
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny ranomaso amin’ny tava rehetra
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady hanafoana eny amin’ny tany rehetra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny fahafaham-baraka amin’ny olony.
- type: usfm
  marker: q1
  children:
  - type: text
    text: NY TOMPO no niteny.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fanalam-baraka an’i Moaba
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Holazaina amin’izany andro izany hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Indro Andriamanitsika
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay nantenaintsika hamonjy antsika.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Indro NY TOMPO izay nandrasantsika,
- type: usfm
  marker: q1
  children:
  - type: text
    text: koa aoka isika hifaly
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady hiravoravo amin’ny famonjeny!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Fa mipetraka amin’ity tendrombohitra ity ny tanan’NY TOMPO;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hohosihosena ao amin’izay misy azy i Moaba,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tahaka ny fanosihosy ny mololo miavosa amin’ny rano ao am-pahitra;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: hamelatra ny tanany ao anatin’izany izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tahaka ny famelatry ny mpilomano ny tanany raha milomano;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa NY TOMPO kosa mampietry ny fiavonavonany
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny fahamailamailaky ny tanany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Harodany sy haetriny ny mandanao mafy sy avo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hataony mikasika amin’ny tany sy mihosom-bovoka.
