document_id: ACT.24,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fiampangan’ny Jiosy an’i Paoly
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Nony afaka hadimiana dia nidina i Ananiasy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpisoronabe
    - type: text
      text: ' mbamin’ny loholona sasany sy i Tertilo mpandaha-teny ary nanambara tamin’ny governora ny niampangany an’i Paoly. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Rehefa notondroin’ny governora hiteny i Paoly dia nilaza hoe:'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fantatro fa mpitsara amin’ity firenena ity hatry ny ela ianao ka faly aho handaha-teny hanala tsiny ny tenako; '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'azonao fantarina fa mbola tsy mihoatra noho ny roa amby folo andro izay no niakarako hivavaka tany Jerosalema. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Tsy nisy nahita ahy niady hevitra tamin’olona teo amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: tempoly
    - type: text
      text: ', na nampitabataba ny vahoaka tao amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sinagoga
    - type: text
      text: ', na tao an-tanàna; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'ary tsy hain’ireo olona ireo hamarinina eto anatrehanao izay zavatra iampangany ahy ankehitriny. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Izao kosa no ekeko eto anatrehanao, fa araka ilay fampianarana izay ataony hoe antoko no anompoako ny Andriamanitry ny razako, sady inoako izay rehetra voasoratra ao amin’ny Lalàna sy ny Mpaminany, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'ary manana fanantenana amin’Andriamanitra aho, izay antenain’izy ireo koa, dia ny hisian’ny fitsanganan’ny marina sy ny tsy marina. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Amin’izany dia mikely aina koa aho mba hanana mandrakariva fieritreretana tsy manameloka ahy na amin’Andriamanitra na amin’olombelona. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Nony afaka taona maro dia tonga aho hitondra fiantrana sy fanatitra ho an’ny fireneko. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Koa tamin’izay no hitany voadio teo amin’ny tempoly aho, tsy niaraka tamin’olona maro anefa aho tamin’izany, na tamin’ny fitabatabana, fa '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jiosy
    - type: text
      text: ' sasany avy any Azia no teo; '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'izy ireo no tokony hiseho eto anatrehanao mba hiampanga ahy, raha toa misy izay hiampangany ahy. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Rehefa nantsoina izy dia niampanga azy i Tertilo ka niteny hoe: Ianao no anananay fandriampahalemana lehibe ary ny fitondranao no nahatonga fanatsarana ity firenena ity; '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Na aoka ireto olona ireto ihany no hilaza izay ratsy hitany, raha nitsangana teo anatrehan’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Sinedriona
    - type: text
      text: ' aho, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'afa-tsy izao teny iray loha izao ihany angaha, dia ilay nolazaiko mafy raha nijoro teo afovoany aho hoe: Ny amin’ny fitsanganan’ny maty no itsarana ahy eto anatrehanareo anio.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Efa fantatr’i Feliksa tsara ihany ny amin’izany fampianarana izany, koa nasainy nandeha aloha izy rehetra ary hoy izy: Rehefa tafidina atỳ i Lisia, mpifehy arivo, dia hofotorako tsara ny raharahanareo. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Dia nandidy ny kapiteny izy mba hiambina an’i Paoly nefa hanome fahafahana azy ihany ka tsy handrara na iza na iza amin’ireo akaiky azy tsy hanompo azy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: I Paoly teo anatrehan’i Feliksa sy i Drosila
    marker-yv: yv-h
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Nony afaka andro vitsivitsy dia tonga i Feliksa niaraka tamin’i Drosila vadiny izay '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jiosy
    - type: text
      text: '; nampaka an’i Paoly izy ka nihaino azy nitory ny finoana an’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ' Jesosy. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Rehefa nitory ny amin’ny fahamarinana sy ny fifehezan-tena ary ny fitsarana ho avy izy dia raiki-tahotra i Feliksa ka niteny hoe: Mandehana aloha; fa raha misy fotoana malalaka dia hampaka anao indray aho. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Nanantena koa mantsy izy fa hanome vola azy i Paoly dia nampaka azy matetika izy ka niresaka taminy.
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Rehefa afaka roa taona dia i Porsio Festosy no nandimby an’i Feliksa; ary ta hahazo sitraka tamin’ny Jiosy i Feliksa ka mbola notanany tao an-tranomaizina ihany i Paoly.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'koa raisinay amin’ny fankasitrahana mandrakariva eny tontolo eny izany, ry Feliksa tsara indrindra ô. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Mba tsy hitazonako anao ela loatra dia miangavy anao aho, mba henoy kely amin’ny faharetana izahay. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Io lehilahy io mantsy dia hitanay fa tena ratsy fanahy sady mpampikomy ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jiosy
    - type: text
      text: ' rehetra maneran-tany; izy no mpitarika ilay antoko atao hoe Nazareana. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Nitady handoto ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: tempoly
    - type: text
      text: ' koa izy io; koa izany no nisamboranay azy; tianay hotsaraina araka ny lalànanay izy. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Nefa tonga i Lisia, mpifehy arivo, dia nanao an-keriny ka naka azy teo an-tananay. Ary nasainy nankaty aminao ny mpiampanga azy. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Koa rehefa manadina azy ianao dia ho fantatrao marina izay rehetra iampanganay azy.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Niara-nanaiky ny Jiosy sady nilaza fa izany tokoa no izy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mandahatra ny fiarovan-tenany eo anatrehan’i Feliksa governora i Paoly
    marker-yv: yv-h
