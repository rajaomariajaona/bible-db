document_id: ACT.24,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fiampangan’ny Jiosy an’i Paoly
  - type: text
    content: 'Nony afaka hadimiana dia nidina i Ananiasy '
  - type: text
    content: mpisoronabe
  - type: text
    content: ' mbamin’ny loholona sasany sy i Tertilo mpandaha-teny ary nanambara tamin’ny governora ny niampangany an’i Paoly. '
  '10':
  - type: text
    content: 'Rehefa notondroin’ny governora hiteny i Paoly dia nilaza hoe:'
  - type: text
    content: 'Fantatro fa mpitsara amin’ity firenena ity hatry ny ela ianao ka faly aho handaha-teny hanala tsiny ny tenako; '
  '11':
  - type: text
    content: 'azonao fantarina fa mbola tsy mihoatra noho ny roa amby folo andro izay no niakarako hivavaka tany Jerosalema. '
  '12':
  - type: text
    content: 'Tsy nisy nahita ahy niady hevitra tamin’olona teo amin’ny '
  - type: text
    content: tempoly
  - type: text
    content: ', na nampitabataba ny vahoaka tao amin’ny '
  - type: text
    content: sinagoga
  - type: text
    content: ', na tao an-tanàna; '
  '13':
  - type: text
    content: 'ary tsy hain’ireo olona ireo hamarinina eto anatrehanao izay zavatra iampangany ahy ankehitriny. '
  '14':
  - type: text
    content: 'Izao kosa no ekeko eto anatrehanao, fa araka ilay fampianarana izay ataony hoe antoko no anompoako ny Andriamanitry ny razako, sady inoako izay rehetra voasoratra ao amin’ny Lalàna sy ny Mpaminany, '
  '15':
  - type: text
    content: 'ary manana fanantenana amin’Andriamanitra aho, izay antenain’izy ireo koa, dia ny hisian’ny fitsanganan’ny marina sy ny tsy marina. '
  '16':
  - type: text
    content: 'Amin’izany dia mikely aina koa aho mba hanana mandrakariva fieritreretana tsy manameloka ahy na amin’Andriamanitra na amin’olombelona. '
  '17':
  - type: text
    content: 'Nony afaka taona maro dia tonga aho hitondra fiantrana sy fanatitra ho an’ny fireneko. '
  '18':
  - type: text
    content: 'Koa tamin’izay no hitany voadio teo amin’ny tempoly aho, tsy niaraka tamin’olona maro anefa aho tamin’izany, na tamin’ny fitabatabana, fa '
  - type: text
    content: Jiosy
  - type: text
    content: ' sasany avy any Azia no teo; '
  '19':
  - type: text
    content: 'izy ireo no tokony hiseho eto anatrehanao mba hiampanga ahy, raha toa misy izay hiampangany ahy. '
  '2':
  - type: text
    content: 'Rehefa nantsoina izy dia niampanga azy i Tertilo ka niteny hoe: Ianao no anananay fandriampahalemana lehibe ary ny fitondranao no nahatonga fanatsarana ity firenena ity; '
  '20':
  - type: text
    content: 'Na aoka ireto olona ireto ihany no hilaza izay ratsy hitany, raha nitsangana teo anatrehan’ny '
  - type: text
    content: Sinedriona
  - type: text
    content: ' aho, '
  '21':
  - type: text
    content: 'afa-tsy izao teny iray loha izao ihany angaha, dia ilay nolazaiko mafy raha nijoro teo afovoany aho hoe: Ny amin’ny fitsanganan’ny maty no itsarana ahy eto anatrehanareo anio.'
  '22':
  - type: text
    content: 'Efa fantatr’i Feliksa tsara ihany ny amin’izany fampianarana izany, koa nasainy nandeha aloha izy rehetra ary hoy izy: Rehefa tafidina atỳ i Lisia, mpifehy arivo, dia hofotorako tsara ny raharahanareo. '
  '23':
  - type: text
    content: Dia nandidy ny kapiteny izy mba hiambina an’i Paoly nefa hanome fahafahana azy ihany ka tsy handrara na iza na iza amin’ireo akaiky azy tsy hanompo azy.
  - type: heading
    content: I Paoly teo anatrehan’i Feliksa sy i Drosila
  '24':
  - type: text
    content: 'Nony afaka andro vitsivitsy dia tonga i Feliksa niaraka tamin’i Drosila vadiny izay '
  - type: text
    content: Jiosy
  - type: text
    content: '; nampaka an’i Paoly izy ka nihaino azy nitory ny finoana an’i '
  - type: text
    content: Kristy
  - type: text
    content: ' Jesosy. '
  '25':
  - type: text
    content: 'Rehefa nitory ny amin’ny fahamarinana sy ny fifehezan-tena ary ny fitsarana ho avy izy dia raiki-tahotra i Feliksa ka niteny hoe: Mandehana aloha; fa raha misy fotoana malalaka dia hampaka anao indray aho. '
  '26':
  - type: text
    content: Nanantena koa mantsy izy fa hanome vola azy i Paoly dia nampaka azy matetika izy ka niresaka taminy.
  '27':
  - type: text
    content: Rehefa afaka roa taona dia i Porsio Festosy no nandimby an’i Feliksa; ary ta hahazo sitraka tamin’ny Jiosy i Feliksa ka mbola notanany tao an-tranomaizina ihany i Paoly.
  '3':
  - type: text
    content: 'koa raisinay amin’ny fankasitrahana mandrakariva eny tontolo eny izany, ry Feliksa tsara indrindra ô. '
  '4':
  - type: text
    content: 'Mba tsy hitazonako anao ela loatra dia miangavy anao aho, mba henoy kely amin’ny faharetana izahay. '
  '5':
  - type: text
    content: 'Io lehilahy io mantsy dia hitanay fa tena ratsy fanahy sady mpampikomy ny '
  - type: text
    content: Jiosy
  - type: text
    content: ' rehetra maneran-tany; izy no mpitarika ilay antoko atao hoe Nazareana. '
  '6':
  - type: text
    content: 'Nitady handoto ny '
  - type: text
    content: tempoly
  - type: text
    content: ' koa izy io; koa izany no nisamboranay azy; tianay hotsaraina araka ny lalànanay izy. '
  '7':
  - type: text
    content: 'Nefa tonga i Lisia, mpifehy arivo, dia nanao an-keriny ka naka azy teo an-tananay. Ary nasainy nankaty aminao ny mpiampanga azy. '
  '8':
  - type: text
    content: Koa rehefa manadina azy ianao dia ho fantatrao marina izay rehetra iampanganay azy.
  '9':
  - type: text
    content: Niara-nanaiky ny Jiosy sady nilaza fa izany tokoa no izy.
  - type: heading
    content: Mandahatra ny fiarovan-tenany eo anatrehan’i Feliksa governora i Paoly
