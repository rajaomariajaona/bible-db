document_id: HOS.2,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Handray ny olony indray Andriamanitra
  - type: text
    content: Kanefa, na izany aza, ny isan’ny Zanak’Israely
  - type: text
    content: dia ho betsaka toy ny fasika amin’ny ranomasina
  - type: text
    content: izay tsy azo afàtra sady tsy tambo isaina;
  - type: text
    content: 'ary any amin’ny tany izay nilazana taminy hoe:'
  - type: text
    content: Tsy oloko ianareo,
  - type: text
    content: 'dia any no hilazana aminy hoe:'
  - type: text
    content: Zanak’Andriamanitra velona ianareo!
  '10':
  - type: text
    content: Tsy fantany
  - type: text
    content: fa Izaho no nanome azy
  - type: text
    content: ny vary sy ny ranom-boaloboka ary ny diloilo.
  - type: text
    content: Nataoko betsaka ny volafotsiny sy ny volamenany,
  - type: text
    content: 'kanjo nataon’ireo fanatitra ho an’ny '
  - type: text
    content: Baala
  - type: text
    content: ' izany!'
  '11':
  - type: text
    content: Noho izany dia hiverina Aho
  - type: text
    content: haka indray ny variko amin’ny androny
  - type: text
    content: sy ny ranom-boaloboko amin’ny fotoanany,
  - type: text
    content: hesoriko koa ny volon’ondriko sy ny lamba rongoniko
  - type: text
    content: izay nomena hasarony ny fitanjahany.
  '12':
  - type: text
    content: Ankehitriny dia hasehoko
  - type: text
    content: eo imason’ireo lehilahiny ny fahamenarany
  - type: text
    content: ka tsy hisy hahafaka azy amin’ny tanako.
  '13':
  - type: text
    content: Hatsahatro ny fifaliany rehetra,
  - type: text
    content: dia ny andro firavoravoany sy ny voaloham-bolany ary ny Sabatany;
  - type: text
    content: eny, ny fotoam-piravoravoany rehetra.
  '14':
  - type: text
    content: Hofongorako ny voalobony sy ny aviaviny
  - type: text
    content: 'izay nolazainy hoe:'
  - type: text
    content: Karama maloto avy tamin’ireo lehilahiko ireto!
  - type: text
    content: Hataoko ho tonga kirihitra ireny
  - type: text
    content: ka hohanin’ny bibidia.
  '15':
  - type: text
    content: Hovaliako izy noho ny andron’ireo Baala
  - type: text
    content: izay efa nandoroany ditin-kazo manitra
  - type: text
    content: sady niravahany ny perany sy ny firavany.
  - type: text
    content: Nanaraka ireo lehilahiny izy
  - type: text
    content: fa Izaho kosa dia nohadinoiny,
  - type: text
    content: hoy NY TOMPO.
  - type: heading
    content: Ta hahazo ny fon’ny olony indray Andriamanitra
  '16':
  - type: text
    content: Koa indro, hitaona azy Aho
  - type: text
    content: ka hitondra azy ho any an-tany efitra
  - type: text
    content: ary hanao teny malefaka aminy.
  '17':
  - type: text
    content: Avy any dia homeko azy ny tanim-boalobony
  - type: text
    content: sy ny lohasaha Akora
  - type: note
    content: Zahao Jos 7.24-26.
  - type: text
    content: mba ho varavaran’ny fanantenana.
  - type: text
    content: Any no hamaliany Ahy toy ny tamin’ny andron’ny fahatanorany,
  - type: text
    content: toy ny tamin’ny andro niakarany avy tany amin’ny tany Ejipta.
  '18':
  - type: text
    content: Amin’izany andro izany Aho,
  - type: text
    content: hoy NY TOMPO,
  - type: text
    content: dia hantsoinao hoe Vadiko,
  - type: text
    content: fa tsy hantsoinao intsony hoe Baalako.
  '19':
  - type: text
    content: 'Hesoriko amin’ny vavany ny anaran’ireo '
  - type: text
    content: Baala
  - type: text
    content: ka tsy hotsarovana amin’ny anarany intsony ireo.
  '2':
  - type: text
    content: Dia hiara-mivory ny taranak’i Joda sy ny taranak’Israely
  - type: text
    content: ka hifidy iray ho lohany izy ireo,
  - type: text
    content: ary hisondrotra ambony eo amin’ny tany;
  - type: text
    content: fa ho lehibe ny andron’i Jezirela.
  '20':
  - type: text
    content: Amin’izany andro izany dia hanao fanekena ho azy Aho,
  - type: text
    content: miaraka amin’ny bibidia
  - type: text
    content: sy ny voromanidina eny amin’ny lanitra
  - type: text
    content: ary ny biby mandeha amin’ny tany.
  - type: text
    content: Hotapatapahiko tsy hisy amin’ny tany intsony ny tsipìka sy ny sabatra ary ny ady
  - type: text
    content: ka hataoko mandry fehizay ny olona.
  '21':
  - type: text
    content: Hofofoiko ho vadiko mandrakizay ianao;
  - type: text
    content: eny, hofofoiko ho vadiko marina tokoa
  - type: text
    content: ary amin’ny fitiavana sy ny indrafo.
  '22':
  - type: text
    content: Hofofoiko ho vadiko amin’ny fahamarinana ianao
  - type: text
    content: ka hahalala NY TOMPO.
  '23':
  - type: text
    content: Amin’izany andro izany dia hamaly Aho,
  - type: text
    content: hoy NY TOMPO;
  - type: text
    content: eny, hamaly ny lanitra Aho
  - type: text
    content: ary izy kosa dia hamaly ny tany;
  '24':
  - type: text
    content: ny tany dia hamaly ny vary sy ny ranom-boaloboka ary ny diloilo,
  - type: text
    content: ary ireo kosa dia hamaly an’i Jezirela.
  '25':
  - type: text
    content: Hamafy amin’ny tany ho Ahy Aho
  - type: text
    content: sady hamindra fo amin’i Lo-Rohama
  - type: note
    content: Zahao 1.6.
  - type: text
    content: ary hiteny amin’i Lo-Amỳ
  - type: note
    content: Zahao 1.9.
  - type: text
    content: ' hoe: Oloko ianao!'
  - type: text
    content: 'Ary hiteny kosa izy hoe: Andriamanitro Ianao!'
  '3':
  - type: text
    content: Milazà amin’ny rahalahinareo hoe Amỳ
  - type: note
    content: 'Amỳ: Oloko.'
  - type: text
    content: '!'
  - type: text
    content: ary amin’ny anabavinareo hoe Rohama
  - type: note
    content: 'Rohama: Namindrana fo.'
  - type: text
    content: '!'
  - type: heading
    content: Israely mpijangajanga
  '4':
  - type: text
    content: Mifandahara amin’ny reninareo; eny, mifandahara
  - type: text
    content: fa tsy vadiko izy,
  - type: text
    content: ary tsy vadiny Aho!
  - type: text
    content: Aoka hesoriny hiala eo amin’ny tavany ny fijejojejoany
  - type: text
    content: ary tsy ho eo an-tratrany ny fijangajangany!
  '5':
  - type: text
    content: Fandrao hampihanjahanjaiko izy
  - type: text
    content: ka hataoko toy ny tamin’ny andro nahaterahany,
  - type: text
    content: hataoko toy ny tany efitra izy
  - type: text
    content: sy toy ny tany karankaina.
  - type: text
    content: Eny, hataoko matin-ketaheta izy;
  '6':
  - type: text
    content: tsy hamindra fo amin’ny zanany Aho
  - type: text
    content: satria zanaky ny fijangajangana ireny.
  '7':
  - type: text
    content: Nijangajanga ny reniny;
  - type: text
    content: eny, ilay torontoronina azy dia nanao izay mahamenatra;
  - type: text
    content: 'fa hoy izy hoe: Hanaraka ireo lehilahiko ihany'
  - type: text
    content: izay manome ahy ny hanin-kohaniko sy ny rano hosotroiko,
  - type: text
    content: ny volon’ondriko sy ny lamba rongoniko
  - type: text
    content: ary ny diloiloko sy izay hosotroiko, aho.
  '8':
  - type: text
    content: Koa indro, hotampenako ny lalanao,
  - type: text
    content: hasiako tsilo
  - type: text
    content: sady hasiako fefy.
  - type: text
    content: Dia tsy hahita izay lalan-kalehany intsony izy.
  '9':
  - type: text
    content: Hiezaka hanenjika ireo lehilahiny izy
  - type: text
    content: nefa tsy hahatratra azy;
  - type: text
    content: eny, hitady ireo lehilahiny ireo izy nefa tsy hahita;
  - type: text
    content: 'dia hiteny izy hoe:'
  - type: text
    content: Handeha hody amin’ny vadiko taloha aho;
  - type: text
    content: fa sambatra kokoa aho tamin’izany noho ny ankehitriny.
