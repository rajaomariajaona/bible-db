document_id: HOS.2,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Handray ny olony indray Andriamanitra
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Kanefa, na izany aza, ny isan’ny Zanak’Israely
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ho betsaka toy ny fasika amin’ny ranomasina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay tsy azo afàtra sady tsy tambo isaina;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ary any amin’ny tany izay nilazana taminy hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy oloko ianareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'dia any no hilazana aminy hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Zanak’Andriamanitra velona ianareo!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy fantany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa Izaho no nanome azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny vary sy ny ranom-boaloboka ary ny diloilo.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nataoko betsaka ny volafotsiny sy ny volamenany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'kanjo nataon’ireo fanatitra ho an’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Baala
    - type: text
      text: ' izany!'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Noho izany dia hiverina Aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: haka indray ny variko amin’ny androny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny ranom-boaloboko amin’ny fotoanany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hesoriko koa ny volon’ondriko sy ny lamba rongoniko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay nomena hasarony ny fitanjahany.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ankehitriny dia hasehoko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eo imason’ireo lehilahiny ny fahamenarany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy hisy hahafaka azy amin’ny tanako.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hatsahatro ny fifaliany rehetra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ny andro firavoravoany sy ny voaloham-bolany ary ny Sabatany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, ny fotoam-piravoravoany rehetra.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hofongorako ny voalobony sy ny aviaviny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'izay nolazainy hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Karama maloto avy tamin’ireo lehilahiko ireto!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hataoko ho tonga kirihitra ireny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hohanin’ny bibidia.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hovaliako izy noho ny andron’ireo Baala
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay efa nandoroany ditin-kazo manitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady niravahany ny perany sy ny firavany.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nanaraka ireo lehilahiny izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa Izaho kosa dia nohadinoiny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy NY TOMPO.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ta hahazo ny fon’ny olony indray Andriamanitra
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa indro, hitaona azy Aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hitondra azy ho any an-tany efitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hanao teny malefaka aminy.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avy any dia homeko azy ny tanim-boalobony
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny lohasaha Akora
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.17 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Zahao '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jos 7.24-26.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba ho varavaran’ny fanantenana.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Any no hamaliany Ahy toy ny tamin’ny andron’ny fahatanorany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toy ny tamin’ny andro niakarany avy tany amin’ny tany Ejipta.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Amin’izany andro izany Aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy NY TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hantsoinao hoe Vadiko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa tsy hantsoinao intsony hoe Baalako.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Hesoriko amin’ny vavany ny anaran’ireo '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Baala
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy hotsarovana amin’ny anarany intsony ireo.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia hiara-mivory ny taranak’i Joda sy ny taranak’Israely
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hifidy iray ho lohany izy ireo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hisondrotra ambony eo amin’ny tany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ho lehibe ny andron’i Jezirela.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Amin’izany andro izany dia hanao fanekena ho azy Aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: miaraka amin’ny bibidia
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny voromanidina eny amin’ny lanitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny biby mandeha amin’ny tany.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hotapatapahiko tsy hisy amin’ny tany intsony ny tsipìka sy ny sabatra ary ny ady
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hataoko mandry fehizay ny olona.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hofofoiko ho vadiko mandrakizay ianao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, hofofoiko ho vadiko marina tokoa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary amin’ny fitiavana sy ny indrafo.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hofofoiko ho vadiko amin’ny fahamarinana ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hahalala NY TOMPO.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Amin’izany andro izany dia hamaly Aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy NY TOMPO;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, hamaly ny lanitra Aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary izy kosa dia hamaly ny tany;
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny tany dia hamaly ny vary sy ny ranom-boaloboka ary ny diloilo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ireo kosa dia hamaly an’i Jezirela.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hamafy amin’ny tany ho Ahy Aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady hamindra fo amin’i Lo-Rohama
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.25 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Zahao '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 1.6.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hiteny amin’i Lo-Amỳ
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.25 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Zahao '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 1.9.
      marker-yv: yv-n
    - type: text
      text: ' hoe: Oloko ianao!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ary hiteny kosa izy hoe: Andriamanitro Ianao!'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Milazà amin’ny rahalahinareo hoe Amỳ
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Amỳ: Oloko.'
      marker-yv: yv-n
    - type: text
      text: '!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary amin’ny anabavinareo hoe Rohama
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Rohama: Namindrana fo.'
      marker-yv: yv-n
    - type: text
      text: '!'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Israely mpijangajanga
    marker-yv: yv-h
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mifandahara amin’ny reninareo; eny, mifandahara
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa tsy vadiko izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy vadiny Aho!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka hesoriny hiala eo amin’ny tavany ny fijejojejoany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy ho eo an-tratrany ny fijangajangany!
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fandrao hampihanjahanjaiko izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hataoko toy ny tamin’ny andro nahaterahany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hataoko toy ny tany efitra izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy toy ny tany karankaina.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, hataoko matin-ketaheta izy;
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy hamindra fo amin’ny zanany Aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria zanaky ny fijangajangana ireny.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nijangajanga ny reniny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, ilay torontoronina azy dia nanao izay mahamenatra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'fa hoy izy hoe: Hanaraka ireo lehilahiko ihany'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay manome ahy ny hanin-kohaniko sy ny rano hosotroiko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny volon’ondriko sy ny lamba rongoniko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny diloiloko sy izay hosotroiko, aho.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa indro, hotampenako ny lalanao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hasiako tsilo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady hasiako fefy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia tsy hahita izay lalan-kalehany intsony izy.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hiezaka hanenjika ireo lehilahiny izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa tsy hahatratra azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, hitady ireo lehilahiny ireo izy nefa tsy hahita;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'dia hiteny izy hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Handeha hody amin’ny vadiko taloha aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa sambatra kokoa aho tamin’izany noho ny ankehitriny.
