document_id: MAT.14,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nahafatesan’i Jaona Mpanao batisa
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mar 6.14-16; Lio 9.7-9
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Tamin’izany andro izany i Heroda mpanapaka dia nandre ny lazan’i Jesosy '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Koa nandefa iraka hanapaka ny lohan’i Jaona tao an-tranomaizina izy. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Dia noentina teo ambony lovia ny lohan’i Jaona ka nomena ilay zazavavy; ary izy kosa dia nitondra izany ho ao amin’ny reniny. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Ary tonga ny mpianatr’i Jaona ka naka ny fatiny dia nandevina azy; avy eo dia lasa izy ireo nilaza izany tamin’i Jesosy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nampihinanan’i Jesosy ny dimy arivo lahy
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mar 6.30-44; Lio 9.10-17; Jao 6.1-15; ampit. Mat 15.32-39
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ary nony nandre izany Jesosy dia niondrana an-tsambokely niala teo, handeha hitokana any an-tany efitra; nefa raha nandre izany ny vahoaka dia niainga avy teny amin’ny tanànany avy ka nandeha an-tongotra nanaraka Azy. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Nony nidina avy tao an-tsambokely Jesosy dia nahita vahoaka betsaka, ary onena azy ireo Izy ka nanasitrana ireo marariny.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Nony hariva ny andro dia nanatona Azy ny mpianatra ka niteny Taminy hoe: Atỳ an-tany efitra isika izao ary efa hariva ity ny andro; ampodio ny vahoaka mba hankanesany eny amin’ny vohitra hividy hanina. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Fa hoy Jesosy taminy: Tsy tokony handeha ireo; fa omeonareo hanina. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Fa hoy ny mpianany Taminy: Tsy misy afa-tsy mofo dimy sy hazandrano roa atỳ aminay. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Ary hoy Izy: Ento etỳ amiko izany. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Dia nasainy nipetraka teny ambonin’ny ahitra ny vahoaka, ary noraisiny ny mofo dimy sy ny hazandrano roa dia niandrandra ny lanitra Izy ka nisaotra; ary nony efa novakiny ny mofo dia natolony ny mpianatra ary ny mpianatra kosa dia nanolotra ho an’ny vahoaka. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'ka hoy izy tamin’ny mpanompony: I Jaona Mpanao batisa efa nitsangana tamin’ny maty izany, koa izay no ananany hery hanaovany izao asa lehibe izao.'
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mar 6.17-29; Lio 3.19-20
    marker-yv: yv-h
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Dia nihinana avokoa izy rehetra ka voky; ary nangoniny ny sombintsombiny sisa tsy lany dia nahafeno harona roa amby folo. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Ary izay nihinana dia tokony ho dimy arivo lahy, afa-tsy ny zaza amam-behivavy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nitsangantsanganan’i Jesosy teny ambonin’ny ranomasina
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mar 6.45-52; Jao 6.16-21
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Teo no eo ihany Jesosy dia nanery ny mpianatra hiondrana an-tsambokely mba hialoha Azy eny ampita mandra-pandravany ny vahoaka. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Rehefa avy nandrava ny vahoaka Izy dia niakatra tao an-tendrombohitra mba hitokana hivavaka; nony hariva ny andro dia nitoetra irery teo Izy.
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Efa lasa '
    - type: usfm
      marker: w
      children:
      - type: text
        text: stadio
    - type: text
      text: ' maromaro lavitry ny morona ny sambokely tamin’izay ka natopatopan’ny alondrano satria notoherin’ny rivotra izy. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Ary tamin’ny fotoam-piambenana fahefatra amin’ny alina dia nandeha teny ambonin’ny ranomasina hankeny amin’ny mpianany Jesosy. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Nony nahita Azy nandeha teo ambonin’ny ranomasina ny mpianatra dia raiki-tahotra ka niteny hoe: Matoatoa io; dia niantsoantso izy ireo noho ny tahotra. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Nefa Jesosy niteny tamin’izy ireo niaraka tamin’izay hoe: Matokia fa Izaho ihany, aza matahotra. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Ary hoy i Petera Taminy: Tompoko, raha Ianao ary io dia asaivo manatona Anao eny ambonin’ny rano aho. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Ary hoy Izy: Manatòna. Dia nidina niala tamin’ny sambokely i Petera ka nandeha teo ambonin’ny rano hanatona an’i Jesosy. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Satria tokoa i Heroda dia efa nisambotra an’i Jaona, dia namatotra azy tao an-tranomaizina, noho ny amin’i Herodiasy, vadin’i Filipo rahalahiny. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Rehefa hitany fa nahery ny rivotra dia natahotra izy, ary raha nanomboka nilentika izy dia niantsoantso hoe: Tompo ô, vonjeo aho! '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Dia nanatsotra ny tanany niaraka tamin’izay Jesosy ka nandray azy sady niteny taminy hoe: Ry kely finoana, nahoana no nisalasala ianao? '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Ary rehefa niakatra tao an-tsambokely izy ireo dia nitsahatra ny rivotra. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Ary izay tao an-tsambokely dia niankohoka teo anatrehany ka niteny hoe: Marina fa Zanak’Andriamanitra tokoa Ianao.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fanasitranana tany Genesareta
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mar 6.53-56; ampit. Jao 6.22-25
    marker-yv: yv-h
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Rehefa niampita izy ireo dia tonga teo an-tanety, any Genesareta. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Nony nahafantatra Azy ny tompon-tany teo dia nandefa iraka tany amin’ny tany rehetra manodidina mba hitondra ny marary rehetra ho eo Aminy. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: Ary nangataka Taminy ireo mba hahazo hikasika na dia ny morontongotr’akanjony ihany aza; koa na iza na iza no nikasika izany dia sitrana avokoa.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'I Jaona dia efa nilaza taminy hoe: Tsy azonao atao ny maka azy ho vadinao. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Koa naniry hamono azy i Heroda, saingy natahotra ny vahoaka izy satria nataon’ireo ho mpaminany i Jaona.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Fa nony tonga ny fitsingerenan’ny taona nahaterahan’i Heroda dia nandihy teo anatrehany ny zanakavavin’i Herodiasy ka nahafaly an’i Heroda izany. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Noho izany, nianiana izy fa hanome azy izay hangatahiny na inona na inona. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Ary rehefa nomen’ny reniny hevitra Razazavavy dia nilaza hoe: Omeo ahy eto ambony lovia ny lohan’i Jaona Mpanao batisa. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Dia nalahelo ny mpanjaka, nefa noho ny fianianany sy ireo olona izay niara-nipetraka nihinana teo aminy dia nandidy ihany izy mba hanomezana azy izany. '
