document_id: MAT.14,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nahafatesan’i Jaona Mpanao batisa
  - type: heading
    content: Mar 6.14-16; Lio 9.7-9
  - type: text
    content: 'Tamin’izany andro izany i Heroda mpanapaka dia nandre ny lazan’i Jesosy '
  '10':
  - type: text
    content: 'Koa nandefa iraka hanapaka ny lohan’i Jaona tao an-tranomaizina izy. '
  '11':
  - type: text
    content: 'Dia noentina teo ambony lovia ny lohan’i Jaona ka nomena ilay zazavavy; ary izy kosa dia nitondra izany ho ao amin’ny reniny. '
  '12':
  - type: text
    content: Ary tonga ny mpianatr’i Jaona ka naka ny fatiny dia nandevina azy; avy eo dia lasa izy ireo nilaza izany tamin’i Jesosy.
  - type: heading
    content: Ny nampihinanan’i Jesosy ny dimy arivo lahy
  - type: heading
    content: Mar 6.30-44; Lio 9.10-17; Jao 6.1-15; ampit. Mat 15.32-39
  '13':
  - type: text
    content: 'Ary nony nandre izany Jesosy dia niondrana an-tsambokely niala teo, handeha hitokana any an-tany efitra; nefa raha nandre izany ny vahoaka dia niainga avy teny amin’ny tanànany avy ka nandeha an-tongotra nanaraka Azy. '
  '14':
  - type: text
    content: Nony nidina avy tao an-tsambokely Jesosy dia nahita vahoaka betsaka, ary onena azy ireo Izy ka nanasitrana ireo marariny.
  '15':
  - type: text
    content: 'Nony hariva ny andro dia nanatona Azy ny mpianatra ka niteny Taminy hoe: Atỳ an-tany efitra isika izao ary efa hariva ity ny andro; ampodio ny vahoaka mba hankanesany eny amin’ny vohitra hividy hanina. '
  '16':
  - type: text
    content: 'Fa hoy Jesosy taminy: Tsy tokony handeha ireo; fa omeonareo hanina. '
  '17':
  - type: text
    content: 'Fa hoy ny mpianany Taminy: Tsy misy afa-tsy mofo dimy sy hazandrano roa atỳ aminay. '
  '18':
  - type: text
    content: 'Ary hoy Izy: Ento etỳ amiko izany. '
  '19':
  - type: text
    content: 'Dia nasainy nipetraka teny ambonin’ny ahitra ny vahoaka, ary noraisiny ny mofo dimy sy ny hazandrano roa dia niandrandra ny lanitra Izy ka nisaotra; ary nony efa novakiny ny mofo dia natolony ny mpianatra ary ny mpianatra kosa dia nanolotra ho an’ny vahoaka. '
  '2':
  - type: text
    content: 'ka hoy izy tamin’ny mpanompony: I Jaona Mpanao batisa efa nitsangana tamin’ny maty izany, koa izay no ananany hery hanaovany izao asa lehibe izao.'
  - type: heading
    content: Mar 6.17-29; Lio 3.19-20
  '20':
  - type: text
    content: 'Dia nihinana avokoa izy rehetra ka voky; ary nangoniny ny sombintsombiny sisa tsy lany dia nahafeno harona roa amby folo. '
  '21':
  - type: text
    content: Ary izay nihinana dia tokony ho dimy arivo lahy, afa-tsy ny zaza amam-behivavy.
  - type: heading
    content: Ny nitsangantsanganan’i Jesosy teny ambonin’ny ranomasina
  - type: heading
    content: Mar 6.45-52; Jao 6.16-21
  '22':
  - type: text
    content: 'Teo no eo ihany Jesosy dia nanery ny mpianatra hiondrana an-tsambokely mba hialoha Azy eny ampita mandra-pandravany ny vahoaka. '
  '23':
  - type: text
    content: Rehefa avy nandrava ny vahoaka Izy dia niakatra tao an-tendrombohitra mba hitokana hivavaka; nony hariva ny andro dia nitoetra irery teo Izy.
  '24':
  - type: text
    content: 'Efa lasa '
  - type: text
    content: stadio
  - type: text
    content: ' maromaro lavitry ny morona ny sambokely tamin’izay ka natopatopan’ny alondrano satria notoherin’ny rivotra izy. '
  '25':
  - type: text
    content: 'Ary tamin’ny fotoam-piambenana fahefatra amin’ny alina dia nandeha teny ambonin’ny ranomasina hankeny amin’ny mpianany Jesosy. '
  '26':
  - type: text
    content: 'Nony nahita Azy nandeha teo ambonin’ny ranomasina ny mpianatra dia raiki-tahotra ka niteny hoe: Matoatoa io; dia niantsoantso izy ireo noho ny tahotra. '
  '27':
  - type: text
    content: 'Nefa Jesosy niteny tamin’izy ireo niaraka tamin’izay hoe: Matokia fa Izaho ihany, aza matahotra. '
  '28':
  - type: text
    content: 'Ary hoy i Petera Taminy: Tompoko, raha Ianao ary io dia asaivo manatona Anao eny ambonin’ny rano aho. '
  '29':
  - type: text
    content: 'Ary hoy Izy: Manatòna. Dia nidina niala tamin’ny sambokely i Petera ka nandeha teo ambonin’ny rano hanatona an’i Jesosy. '
  '3':
  - type: text
    content: 'Satria tokoa i Heroda dia efa nisambotra an’i Jaona, dia namatotra azy tao an-tranomaizina, noho ny amin’i Herodiasy, vadin’i Filipo rahalahiny. '
  '30':
  - type: text
    content: 'Rehefa hitany fa nahery ny rivotra dia natahotra izy, ary raha nanomboka nilentika izy dia niantsoantso hoe: Tompo ô, vonjeo aho! '
  '31':
  - type: text
    content: 'Dia nanatsotra ny tanany niaraka tamin’izay Jesosy ka nandray azy sady niteny taminy hoe: Ry kely finoana, nahoana no nisalasala ianao? '
  '32':
  - type: text
    content: 'Ary rehefa niakatra tao an-tsambokely izy ireo dia nitsahatra ny rivotra. '
  '33':
  - type: text
    content: 'Ary izay tao an-tsambokely dia niankohoka teo anatrehany ka niteny hoe: Marina fa Zanak’Andriamanitra tokoa Ianao.'
  - type: heading
    content: Fanasitranana tany Genesareta
  - type: heading
    content: Mar 6.53-56; ampit. Jao 6.22-25
  '34':
  - type: text
    content: 'Rehefa niampita izy ireo dia tonga teo an-tanety, any Genesareta. '
  '35':
  - type: text
    content: 'Nony nahafantatra Azy ny tompon-tany teo dia nandefa iraka tany amin’ny tany rehetra manodidina mba hitondra ny marary rehetra ho eo Aminy. '
  '36':
  - type: text
    content: Ary nangataka Taminy ireo mba hahazo hikasika na dia ny morontongotr’akanjony ihany aza; koa na iza na iza no nikasika izany dia sitrana avokoa.
  '4':
  - type: text
    content: 'I Jaona dia efa nilaza taminy hoe: Tsy azonao atao ny maka azy ho vadinao. '
  '5':
  - type: text
    content: Koa naniry hamono azy i Heroda, saingy natahotra ny vahoaka izy satria nataon’ireo ho mpaminany i Jaona.
  '6':
  - type: text
    content: 'Fa nony tonga ny fitsingerenan’ny taona nahaterahan’i Heroda dia nandihy teo anatrehany ny zanakavavin’i Herodiasy ka nahafaly an’i Heroda izany. '
  '7':
  - type: text
    content: 'Noho izany, nianiana izy fa hanome azy izay hangatahiny na inona na inona. '
  '8':
  - type: text
    content: 'Ary rehefa nomen’ny reniny hevitra Razazavavy dia nilaza hoe: Omeo ahy eto ambony lovia ny lohan’i Jaona Mpanao batisa. '
  '9':
  - type: text
    content: 'Dia nalahelo ny mpanjaka, nefa noho ny fianianany sy ireo olona izay niara-nipetraka nihinana teo aminy dia nandidy ihany izy mba hanomezana azy izany. '
