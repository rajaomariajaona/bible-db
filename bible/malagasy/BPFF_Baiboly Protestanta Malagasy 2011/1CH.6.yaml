  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '62'
  - type: text
    text: 'Ny an’ny sisa amin’ny taranak’i Merary, avy tamin’ny fokon’i Zebolona, dia i Rimono sy ny tany manodidina azy; i Tabara sy ny tany manodidina azy; '
  - type: usfm
    marker: v
    metadata:
      v: '63'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '63'
  - type: text
    text: 'any andafin’i Jordana, tandrifin’i Jeriko, atsinanan’i Jordana, avy tamin’ny fokon’i Robena dia i Bazera any an-tany efitra sy ny tany manodidina azy; i Jaza sy ny tany manodidina azy; '
  - type: usfm
    marker: v
    metadata:
