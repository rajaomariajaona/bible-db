document_id: 1CH.6,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Taranaka hafa avy amin’i Levy
  - type: heading
    content: Nom 3.17-20
  - type: text
    content: 'Ny zanakalahin’i Levy dia i Gersoma sy i Kehata ary i Merary. '
  '10':
  - type: text
    content: 'Ny zanakalahin’i Elkana dia i Amasay sy i Ahimota. '
  '11':
  - type: text
    content: 'Ny an’i Elkana, ny zanany lahy dia i Zofay; i Nahata no zanakalahin’i Zofay; '
  '12':
  - type: text
    content: 'i Eliaba no zanakalahin’i Nahata; i Jerohama no zanakalahin’i Eliaba; i Elkana no zanakalahin’i Jerohama. '
  '13':
  - type: text
    content: 'Ny zanakalahin’i Samoela dia i Vasny, lahimatoa, sy i Abia. '
  '14':
  - type: text
    content: 'Ny zanakalahin’i Merary dia i Maly; i Libny no zanakalahin’i Maly; i Semey no zanakalahin’i Libny; i Oza no zanakalahin’i Semey; '
  '15':
  - type: text
    content: i Simea no zanakalahin’i Oza; i Hagia no zanakalahin’i Simea; i Asaia no zanakalahin’i Hagia.
  '16':
  - type: text
    content: 'Izao no notendren’i Davida ho mpiventy hira tao amin’ny tranon’NY TOMPO, rehefa voapetraka tao ny '
  - type: text
    content: vata misy ny Fanekena
  - type: text
    content: '. '
  '17':
  - type: text
    content: 'Izy ireo no nanao fanompoana tamin’ny alalan’ny hira, tao amin’ny '
  - type: text
    content: tabernakely
  - type: text
    content: ', dia ny '
  - type: text
    content: tranolay fihaonana
  - type: text
    content: ', ambara-panangan’i Solomona ny tranon’NY TOMPO tany Jerosalema; nanatanteraka ny fanompoany araka ny filaharany avy izy ireo.'
  '18':
  - type: text
    content: 'Izao no nanao ny fanompoana, niaraka tamin’ny zanany: Tamin’ny zanakalahin’ny Kehatita dia i Hemana mpihira, zanakalahin’i Joela, zanakalahin’i Samoela, '
  '19':
  - type: text
    content: 'zanakalahin’i Elkana, zanakalahin’i Jerohama, zanakalahin’i Eliela, zanakalahin’i Toa, '
  '2':
  - type: text
    content: 'Izao no anaran’ny zanakalahin’i Gersoma: I Libny sy i Semey. '
  '20':
  - type: text
    content: 'zanakalahin’i Zofa, zanakalahin’i Elkana, zanakalahin’i Mahata, zanakalahin’i Amasay, '
  '21':
  - type: text
    content: 'zanakalahin’i Elkana, zanakalahin’i Joela, zanakalahin’i Azaria, zanakalahin’i Zefania, '
  '22':
  - type: text
    content: 'zanakalahin’i Tahata, zanakalahin’i Asira, zanakalahin’i Ebiasafa, zanakalahin’i Kora, '
  '23':
  - type: text
    content: zanakalahin’i Jizara, zanakalahin’i Kehata, zanakalahin’i Levy, zanak’Israely.
  '24':
  - type: text
    content: 'I Asafa rahalahiny, izay nijoro teo ankavanany: I Asafa, zanakalahin’i Berekia, zanakalahin’i Simea, '
  '25':
  - type: text
    content: 'zanakalahin’i Mikaela, zanakalahin’i Baseia, zanakalahin’i Malkia, '
  '26':
  - type: text
    content: 'zanakalahin’i Etny, zanakalahin’i Zera, zanakalahin’i Adaia, '
  '27':
  - type: text
    content: 'zanakalahin’i Etana, zanakalahin’i Zima, zanakalahin’i Simey, '
  '28':
  - type: text
    content: zanakalahin’i Jahata, zanakalahin’i Gersona, zanakalahin’i Levy.
  '29':
  - type: text
    content: 'Ny rahalahin’ireo kosa dia ny zanakalahin’i Merary, izay nijoro teo amin’ny ankaviany: I Etana, zanakalahin’i Kisy, zanakalahin’i Abdia, zanakalahin’i Maloka, '
  '3':
  - type: text
    content: 'Ny zanakalahin’i Kehata dia i Amrama, i Jizara, i Hebrona ary i Oziela. '
  '30':
  - type: text
    content: 'zanakalahin’i Hasabia, zanakalahin’i Amazia, zanakalahin’i Hilkia, '
  '31':
  - type: text
    content: 'zanakalahin’i Amzy, zanakalahin’i Bany, zanakalahin’i Semera, '
  '32':
  - type: text
    content: zanakalahin’i Maly, zanakalahin’i Mosy, zanakalahin’i Merary, zanakalahin’i Levy.
  '33':
  - type: text
    content: 'Ny levita rahalahin’ireo koa dia notendrena hanao ny fanompoana rehetra ao amin’ny tabernakely, ao amin’ny tranon’Andriamanitra. '
  '34':
  - type: text
    content: 'Fa i Arona sy ny zanany lahy no nandoro ho fofona ny fanatitra teo ambonin’ny alitara fanolorana ny fanatitra dorana manontolo sy teo ambonin’ny alitara fandoroana ditin-kazo manitra; izy ireo no nisahana ny raharaha rehetra ao amin’ny fitoerana masina indrindra sy hanao fanavotana ho an’ny Israely, araka izay rehetra nandidian’i Mosesy, mpanompon’Andriamanitra. '
  '35':
  - type: text
    content: 'Ny zanakalahin’i Arona dia i Eleazara; i Finehasa no zanakalahin’i Eleazara; i Abisoa no zanakalahin’i Finehasa; '
  '36':
  - type: text
    content: 'i Bokỳ no zanakalahin’i Abisoa; i Ozy no zanakalahin’i Bokỳ; i Zerahia no zanakalahin’i Ozy; '
  '37':
  - type: text
    content: 'i Meraiota no zanakalahin’i Zerahia; i Amaria no zanakalahin’i Meraiota; i Ahitoba no zanakalahin’i Amaria; '
  '38':
  - type: text
    content: i Zadoka no zanakalahin’i Ahitoba; i Ahimaza no zanakalahin’i Zadoka.
  - type: heading
    content: Ireo tanàna nomena ny taranak’i Levy
  '39':
  - type: text
    content: Ireto no toeram-ponenany araka ny vohiny tao amin’ny zarataniny avy.
  - type: heading
    content: Jos 21.4, 10-29
  - type: text
    content: 'Ny an’ny taranak’i Arona, avy amin’ny fianakavian’ny Kehatita izay nahazo ny antsapaka voalohany, '
  '4':
  - type: text
    content: Ny zanakalahin’i Merary dia i Maly sy i Mosy.
  - type: text
    content: 'Izao no fianakavian’ny '
  - type: text
    content: levita
  - type: text
    content: ' araka ny rainy. '
  '40':
  - type: text
    content: 'dia nomeny an’i Hebrona tao amin’ny tanin’i Joda sy ny tany manodidina azy. '
  '41':
  - type: text
    content: 'Fa nomeny an’i Kaleba, zanak’i Jefone kosa ny saha momba ny tanàna sy ny vohitra manodidina azy. '
  '42':
  - type: text
    content: 'Ny taranak’i Arona dia nomeny an’i Hebrona, tanàna fialofana, i Libna sy ny tany manodidina azy, i Jatira sy i Estemoa sy ny tany manodidina azy, '
  '43':
  - type: text
    content: 'i Hileza sy ny tany manodidina azy, i Debira sy ny tany manodidina azy, '
  '44':
  - type: text
    content: 'i Asana sy ny tany manodidina azy, i Bety-Semesy sy ny tany manodidina azy; '
  '45':
  - type: text
    content: ary avy tamin’ny fokon’i Benjamina dia i Geba sy ny tany manodidina azy, i Alemeta sy ny tany manodidina azy, i Anatota sy ny tany manodidina azy. Telo amby folo no isan’ny tanànan’izy mianakavy rehetra.
  - type: heading
    content: Ampit. Jos 21.5-8
  '46':
  - type: text
    content: 'Ny an’ny taranak’i Kehata sisa tamin’ny fokon’izany firenena izany dia tanàna folo araka ny antsapaka tamin’ny antsasaky ny fokon’i Manase. '
  '47':
  - type: text
    content: 'Ny an’ny taranak’i Gersoma araka ny fianakaviany dia tanàna telo amby folo tamin’ny fokon’Isakara, ny fokon’i Asera, ny fokon’i Naftaly ary ny fokon’i Manase any Basana. '
  '48':
  - type: text
    content: Ny antsapaka azon’ny taranak’i Merary araka ny fianakaviany dia tanàna roa amby folo avy tamin’ny fokon’i Robena sy ny fokon’i Gada ary ny fokon’i Zebolona.
  '49':
  - type: text
    content: 'Dia nomen’ny Zanak’Israely ho an’ny levita ireo tanàna ireo sy ny tany manodidina azy. '
  '5':
  - type: text
    content: 'Avy amin’i Gersoma: I Libny no zanakalahin’i Gersoma; i Jahata no zanakalahin’i Libny; i Zima no zanakalahin’i Jahata; '
  '50':
  - type: text
    content: 'Nomeny tamin’ny antsapaka ireto tanàna tononina ireto, avy tamin’ny fokon’ny taranak’i Joda sy ny fokon’ny taranak’i Simeona ary ny fokon’ny taranak’i Benjamina. '
  '51':
  - type: text
    content: 'Fa ny sasany amin’ny fianakavian’ny taranak’i Kehata dia nahazo tanàna avy tamin’ny fokon’i Efraima. '
  '52':
  - type: text
    content: 'Nomeny azy ho tanàna fialofana i Sekema, ny tao amin’ny tany be havoana any Efraima sy ny tany manodidina azy; i Gezera sy ny tany manodidina azy; '
  '53':
  - type: text
    content: 'i Jokmeama sy ny tany manodidina azy; i Bety-Horona sy ny tany manodidina azy; '
  '54':
  - type: text
    content: 'i Aialona sy ny tany manodidina azy; i Gata-Rimona sy ny tany manodidina azy; '
  '55':
  - type: text
    content: ary ny avy tamin’ny antsasaky ny fokon’i Manase dia i Amera sy ny tany manodidina azy; i Bileama sy ny tany manodidina azy. Izany dia ho an’ny fianakavian’ny taranak’i Kehata sisa.
  '56':
  - type: text
    content: 'Ny an’ny taranak’i Gersoma dia i Golana any Basana sy ny tany manodidina azy; i Astarota sy ny tany manodidina azy avy tamin’ny antsasaky ny fokon’i Manase; '
  '57':
  - type: text
    content: 'ny avy tamin’ny fokon’Isakara dia i Kadesy sy ny tany manodidina azy; i Daberata sy ny tany manodidina azy; '
  '58':
  - type: text
    content: 'i Ramota sy ny tany manodidina azy; i Anema sy ny tany manodidina azy; '
  '59':
  - type: text
    content: 'ny avy tamin’ny fokon’i Asera dia i Masala sy ny tany manodidina azy; i Abdona sy ny tany manodidina azy; '
  '6':
  - type: text
    content: i Joa no zanakalahin’i Zima; Ido no zanakalahin’i Joa; i Zera no zanakalahin’Ido; i Jeateray no zanakalahin’i Zera.
  '60':
  - type: text
    content: 'i Hokoka sy ny tany manodidina azy; i Rehoba sy ny tany manodidina azy; '
  '61':
  - type: text
    content: ny avy tamin’ny fokon’i Naftaly dia i Kadesy any Galilia sy ny tany manodidina azy; i Hamona sy ny tany manodidina azy; i Kiriataima sy ny tany manodidina azy.
  '62':
  - type: text
    content: 'Ny an’ny sisa amin’ny taranak’i Merary, avy tamin’ny fokon’i Zebolona, dia i Rimono sy ny tany manodidina azy; i Tabara sy ny tany manodidina azy; '
  '63':
  - type: text
    content: 'any andafin’i Jordana, tandrifin’i Jeriko, atsinanan’i Jordana, avy tamin’ny fokon’i Robena dia i Bazera any an-tany efitra sy ny tany manodidina azy; i Jaza sy ny tany manodidina azy; '
  '64':
  - type: text
    content: 'i Kedemota sy ny tany manodidina azy; i Mefata sy ny tany manodidina azy; '
  '65':
  - type: text
    content: 'ary avy tamin’ny fokon’i Gada dia i Ramota-Gileada sy ny tany manodidina azy; i Mahanaima sy ny tany manodidina azy; '
  '66':
  - type: text
    content: i Hesbona sy ny tany manodidina azy; i Jazera sy ny tany manodidina azy.
  '7':
  - type: text
    content: 'Ny zanakalahin’i Kehata dia i Aminadaba; i Kora no zanakalahin’i Aminadaba; i Asira no zanakalahin’i Kora; '
  '8':
  - type: text
    content: 'i Elkana no zanakalahin’i Asira; i Ebiasafa no zanakalahin’i Elkana; i Asira no zanakalahin’i Ebiasafa; '
  '9':
  - type: text
    content: 'i Tahata no zanakalahin’i Asira; i Oriela no zanakalahin’i Tahata; i Ozia no zanakalahin’i Oriela ary i Saoly no zanakalahin’i Ozia. '
