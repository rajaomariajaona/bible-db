document_id: 1CH.6
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Taranaka hafa avy amin’i Levy
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Nom 3.17-20
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ny zanakalahin’i Levy dia i Gersoma sy i Kehata ary i Merary. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Izao no anaran’ny zanakalahin’i Gersoma: I Libny sy i Semey. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ny zanakalahin’i Kehata dia i Amrama, i Jizara, i Hebrona ary i Oziela. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ny zanakalahin’i Merary dia i Maly sy i Mosy.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Izao no fianakavian’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: levita
  - type: text
    text: ' araka ny rainy. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Avy amin’i Gersoma: I Libny no zanakalahin’i Gersoma; i Jahata no zanakalahin’i Libny; i Zima no zanakalahin’i Jahata; '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: i Joa no zanakalahin’i Zima; Ido no zanakalahin’i Joa; i Zera no zanakalahin’Ido; i Jeateray no zanakalahin’i Zera.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ny zanakalahin’i Kehata dia i Aminadaba; i Kora no zanakalahin’i Aminadaba; i Asira no zanakalahin’i Kora; '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'i Elkana no zanakalahin’i Asira; i Ebiasafa no zanakalahin’i Elkana; i Asira no zanakalahin’i Ebiasafa; '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'i Tahata no zanakalahin’i Asira; i Oriela no zanakalahin’i Tahata; i Ozia no zanakalahin’i Oriela ary i Saoly no zanakalahin’i Ozia. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ny zanakalahin’i Elkana dia i Amasay sy i Ahimota. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ny an’i Elkana, ny zanany lahy dia i Zofay; i Nahata no zanakalahin’i Zofay; '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'i Eliaba no zanakalahin’i Nahata; i Jerohama no zanakalahin’i Eliaba; i Elkana no zanakalahin’i Jerohama. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ny zanakalahin’i Samoela dia i Vasny, lahimatoa, sy i Abia. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ny zanakalahin’i Merary dia i Maly; i Libny no zanakalahin’i Maly; i Semey no zanakalahin’i Libny; i Oza no zanakalahin’i Semey; '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: i Simea no zanakalahin’i Oza; i Hagia no zanakalahin’i Simea; i Asaia no zanakalahin’i Hagia.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Izao no notendren’i Davida ho mpiventy hira tao amin’ny tranon’NY TOMPO, rehefa voapetraka tao ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: vata misy ny Fanekena
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Izy ireo no nanao fanompoana tamin’ny alalan’ny hira, tao amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tabernakely
  - type: text
    text: ', dia ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tranolay fihaonana
  - type: text
    text: ', ambara-panangan’i Solomona ny tranon’NY TOMPO tany Jerosalema; nanatanteraka ny fanompoany araka ny filaharany avy izy ireo.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Izao no nanao ny fanompoana, niaraka tamin’ny zanany: Tamin’ny zanakalahin’ny Kehatita dia i Hemana mpihira, zanakalahin’i Joela, zanakalahin’i Samoela, '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'zanakalahin’i Elkana, zanakalahin’i Jerohama, zanakalahin’i Eliela, zanakalahin’i Toa, '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'zanakalahin’i Zofa, zanakalahin’i Elkana, zanakalahin’i Mahata, zanakalahin’i Amasay, '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'zanakalahin’i Elkana, zanakalahin’i Joela, zanakalahin’i Azaria, zanakalahin’i Zefania, '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'zanakalahin’i Tahata, zanakalahin’i Asira, zanakalahin’i Ebiasafa, zanakalahin’i Kora, '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: zanakalahin’i Jizara, zanakalahin’i Kehata, zanakalahin’i Levy, zanak’Israely.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'I Asafa rahalahiny, izay nijoro teo ankavanany: I Asafa, zanakalahin’i Berekia, zanakalahin’i Simea, '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'zanakalahin’i Mikaela, zanakalahin’i Baseia, zanakalahin’i Malkia, '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'zanakalahin’i Etny, zanakalahin’i Zera, zanakalahin’i Adaia, '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'zanakalahin’i Etana, zanakalahin’i Zima, zanakalahin’i Simey, '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: zanakalahin’i Jahata, zanakalahin’i Gersona, zanakalahin’i Levy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ny rahalahin’ireo kosa dia ny zanakalahin’i Merary, izay nijoro teo amin’ny ankaviany: I Etana, zanakalahin’i Kisy, zanakalahin’i Abdia, zanakalahin’i Maloka, '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'zanakalahin’i Hasabia, zanakalahin’i Amazia, zanakalahin’i Hilkia, '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'zanakalahin’i Amzy, zanakalahin’i Bany, zanakalahin’i Semera, '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: zanakalahin’i Maly, zanakalahin’i Mosy, zanakalahin’i Merary, zanakalahin’i Levy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ny levita rahalahin’ireo koa dia notendrena hanao ny fanompoana rehetra ao amin’ny tabernakely, ao amin’ny tranon’Andriamanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Fa i Arona sy ny zanany lahy no nandoro ho fofona ny fanatitra teo ambonin’ny alitara fanolorana ny fanatitra dorana manontolo sy teo ambonin’ny alitara fandoroana ditin-kazo manitra; izy ireo no nisahana ny raharaha rehetra ao amin’ny fitoerana masina indrindra sy hanao fanavotana ho an’ny Israely, araka izay rehetra nandidian’i Mosesy, mpanompon’Andriamanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Ny zanakalahin’i Arona dia i Eleazara; i Finehasa no zanakalahin’i Eleazara; i Abisoa no zanakalahin’i Finehasa; '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'i Bokỳ no zanakalahin’i Abisoa; i Ozy no zanakalahin’i Bokỳ; i Zerahia no zanakalahin’i Ozy; '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'i Meraiota no zanakalahin’i Zerahia; i Amaria no zanakalahin’i Meraiota; i Ahitoba no zanakalahin’i Amaria; '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: i Zadoka no zanakalahin’i Ahitoba; i Ahimaza no zanakalahin’i Zadoka.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ireo tanàna nomena ny taranak’i Levy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Ireto no toeram-ponenany araka ny vohiny tao amin’ny zarataniny avy.
- type: usfm
  marker: r
  children:
  - type: text
    text: Jos 21.4, 10-29
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ny an’ny taranak’i Arona, avy amin’ny fianakavian’ny Kehatita izay nahazo ny antsapaka voalohany, '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'dia nomeny an’i Hebrona tao amin’ny tanin’i Joda sy ny tany manodidina azy. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Fa nomeny an’i Kaleba, zanak’i Jefone kosa ny saha momba ny tanàna sy ny vohitra manodidina azy. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Ny taranak’i Arona dia nomeny an’i Hebrona, tanàna fialofana, i Libna sy ny tany manodidina azy, i Jatira sy i Estemoa sy ny tany manodidina azy, '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'i Hileza sy ny tany manodidina azy, i Debira sy ny tany manodidina azy, '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'i Asana sy ny tany manodidina azy, i Bety-Semesy sy ny tany manodidina azy; '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: ary avy tamin’ny fokon’i Benjamina dia i Geba sy ny tany manodidina azy, i Alemeta sy ny tany manodidina azy, i Anatota sy ny tany manodidina azy. Telo amby folo no isan’ny tanànan’izy mianakavy rehetra.
- type: usfm
  marker: r
  children:
  - type: text
    text: Ampit. Jos 21.5-8
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Ny an’ny taranak’i Kehata sisa tamin’ny fokon’izany firenena izany dia tanàna folo araka ny antsapaka tamin’ny antsasaky ny fokon’i Manase. '
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Ny an’ny taranak’i Gersoma araka ny fianakaviany dia tanàna telo amby folo tamin’ny fokon’Isakara, ny fokon’i Asera, ny fokon’i Naftaly ary ny fokon’i Manase any Basana. '
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: Ny antsapaka azon’ny taranak’i Merary araka ny fianakaviany dia tanàna roa amby folo avy tamin’ny fokon’i Robena sy ny fokon’i Gada ary ny fokon’i Zebolona.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'Dia nomen’ny Zanak’Israely ho an’ny levita ireo tanàna ireo sy ny tany manodidina azy. '
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Nomeny tamin’ny antsapaka ireto tanàna tononina ireto, avy tamin’ny fokon’ny taranak’i Joda sy ny fokon’ny taranak’i Simeona ary ny fokon’ny taranak’i Benjamina. '
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'Fa ny sasany amin’ny fianakavian’ny taranak’i Kehata dia nahazo tanàna avy tamin’ny fokon’i Efraima. '
  - type: usfm
    marker: v
    metadata:
      v: '52'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'Nomeny azy ho tanàna fialofana i Sekema, ny tao amin’ny tany be havoana any Efraima sy ny tany manodidina azy; i Gezera sy ny tany manodidina azy; '
  - type: usfm
    marker: v
    metadata:
      v: '53'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'i Jokmeama sy ny tany manodidina azy; i Bety-Horona sy ny tany manodidina azy; '
  - type: usfm
    marker: v
    metadata:
      v: '54'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: 'i Aialona sy ny tany manodidina azy; i Gata-Rimona sy ny tany manodidina azy; '
  - type: usfm
    marker: v
    metadata:
      v: '55'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: ary ny avy tamin’ny antsasaky ny fokon’i Manase dia i Amera sy ny tany manodidina azy; i Bileama sy ny tany manodidina azy. Izany dia ho an’ny fianakavian’ny taranak’i Kehata sisa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '56'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: 'Ny an’ny taranak’i Gersoma dia i Golana any Basana sy ny tany manodidina azy; i Astarota sy ny tany manodidina azy avy tamin’ny antsasaky ny fokon’i Manase; '
  - type: usfm
    marker: v
    metadata:
      v: '57'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: 'ny avy tamin’ny fokon’Isakara dia i Kadesy sy ny tany manodidina azy; i Daberata sy ny tany manodidina azy; '
  - type: usfm
    marker: v
    metadata:
      v: '58'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: 'i Ramota sy ny tany manodidina azy; i Anema sy ny tany manodidina azy; '
  - type: usfm
    marker: v
    metadata:
      v: '59'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '59'
  - type: text
    text: 'ny avy tamin’ny fokon’i Asera dia i Masala sy ny tany manodidina azy; i Abdona sy ny tany manodidina azy; '
  - type: usfm
    marker: v
