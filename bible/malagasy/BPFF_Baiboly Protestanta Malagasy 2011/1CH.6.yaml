    children:
    - type: text
      text: '60'
  - type: text
    text: 'i Hokoka sy ny tany manodidina azy; i Rehoba sy ny tany manodidina azy; '
  - type: usfm
    marker: v
    metadata:
      v: '61'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '61'
  - type: text
    text: ny avy tamin’ny fokon’i Naftaly dia i Kadesy any Galilia sy ny tany manodidina azy; i Hamona sy ny tany manodidina azy; i Kiriataima sy ny tany manodidina azy.
- type: usfm
  marker: p
