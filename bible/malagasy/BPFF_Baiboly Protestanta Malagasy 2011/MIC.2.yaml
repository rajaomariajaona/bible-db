document_id: MIC.2,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ireo manararao-pahefana
  - type: text
    content: Lozan’izay mamoron-keloka
  - type: text
    content: sy misaintsain-dratsy ao am-pandrianany!
  - type: text
    content: Ary nony maraina ny andro
  - type: text
    content: dia manatanteraka izany izy
  - type: text
    content: satria manan-kery ny tanany.
  '10':
  - type: text
    content: Mitsangàna ka mialà!
  - type: text
    content: Fa tsy eto no fitsaharana,
  - type: text
    content: satria misy fahalotoana mahatonga fandringanana eto;
  - type: text
    content: eny, fandringanana mafy.
  '11':
  - type: text
    content: 'Raha misy manaraka ny rivotra sy ny lainga ka mandainga hoe:'
  - type: text
    content: Hitoriteny aminao ny amin’ny divay sy ny zava-mahamamo aho
  - type: text
    content: dia izy no ho mpitoriteny ho an’ity firenena ity.
  - type: heading
    content: Hamory ny sisa amin’ny Israely Andriamanitra
  '12':
  - type: text
    content: Hamory anareo rehetra tokoa Aho, ry Jakoba,
  - type: text
    content: ary hanangona ny sisa amin’ny Israely.
  - type: text
    content: Hakambako toy ny ondry any amin’ny vala izy,
  - type: text
    content: toy ny andian’ondry ao amin’ny tany fiandrasana.
  - type: text
    content: Hisy tabataban’olona marobe.
  '13':
  - type: text
    content: Ny mpamaky lalana no miakatra eo alohany,
  - type: text
    content: mamaky lalana izy ka mandalo eo amin’ny vavahady
  - type: text
    content: dia mivoaka avy eo aminy;
  - type: text
    content: mandroso eo alohany ny mpanjakany,
  - type: text
    content: ary NY TOMPO no mitarika azy.
  '2':
  - type: text
    content: Mitsiriritra saha izy ka maka izany an-keriny,
  - type: text
    content: ary mitsiriritra trano koa ka mahazo azy;
  - type: text
    content: mampahory ny raim-pianakaviana mbamin’ny ankohonany izy,
  - type: text
    content: dia ny olona mbamin’ny lovany.
  '3':
  - type: text
    content: 'Koa izao no lazain’NY TOMPO:'
  - type: text
    content: Indro, manomana loza hamelezana ity firenena ity Aho,
  - type: text
    content: dia loza tsy hahazoanareo hanafaka ny vozonareo
  - type: text
    content: ka tsy handeha miandranandrana ianareo,
  - type: text
    content: satria andro mampahory izany.
  '4':
  - type: text
    content: Amin’izany andro izany no hanaovana oha-teny mandatsa anareo
  - type: text
    content: 'ka hitomaniana sy hidradradradrana hoe: Izay no izy!'
  - type: text
    content: 'Eny, hiteny izy hoe: Fongana tokoa isika.'
  - type: text
    content: Ataony fanakalo zavatra ny anjaran’ny oloko.
  - type: text
    content: Indrisy! Esoriny hiala amiko izany.
  - type: text
    content: Zarainy ho an’ny mpikomy ny tanintsika!
  '5':
  - type: text
    content: Koa tsy hisy aminao hanenjana kofehy fandrefesana hanaovana antsapaka
  - type: text
    content: ao amin’ny fiangonan’NY TOMPO.
  - type: heading
    content: Ireo izay mandà ny hafatry ny mpaminany
  '6':
  - type: text
    content: Aza miteniteny ianareo, hoy ny fiteniteniny;
  - type: text
    content: aoka tsy hiteniteny toy izany izy.
  - type: text
    content: Tsy hita lany ny fanalam-baraka ataony!
  '7':
  - type: text
    content: E! Izany va no teninao, ry taranak’i Jakoba?
  - type: text
    content: Malaky tezitra va NY TOMPO?
  - type: text
    content: Izany va no fanaony?
  - type: text
    content: Tsy mahasoa izay mandeha mahitsy va ny teniko?
  '8':
  - type: text
    content: Vao omaly no omaly no nitsanganan’ny oloko ho fahavalo;
  - type: text
    content: endahinareo amin’izay mandeha tsy manana ahiahy
  - type: text
    content: avy any an’ady
  - type: text
    content: ny akanjobe ivelany manarona ny fitafiany.
  '9':
  - type: text
    content: Ny vehivavy amin’ny oloko
  - type: text
    content: dia roahinareo hiala amin’ny tranony mahafinaritra;
  - type: text
    content: esorinareo hiala mandrakizay amin’ny zanany madinika
  - type: text
    content: ny voninahitra avy Amiko.
