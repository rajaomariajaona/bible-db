document_id: MIC.2,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ireo manararao-pahefana
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lozan’izay mamoron-keloka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy misaintsain-dratsy ao am-pandrianany!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary nony maraina ny andro
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia manatanteraka izany izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria manan-kery ny tanany.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mitsangàna ka mialà!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa tsy eto no fitsaharana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria misy fahalotoana mahatonga fandringanana eto;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, fandringanana mafy.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Raha misy manaraka ny rivotra sy ny lainga ka mandainga hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hitoriteny aminao ny amin’ny divay sy ny zava-mahamamo aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia izy no ho mpitoriteny ho an’ity firenena ity.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Hamory ny sisa amin’ny Israely Andriamanitra
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hamory anareo rehetra tokoa Aho, ry Jakoba,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hanangona ny sisa amin’ny Israely.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hakambako toy ny ondry any amin’ny vala izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toy ny andian’ondry ao amin’ny tany fiandrasana.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hisy tabataban’olona marobe.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny mpamaky lalana no miakatra eo alohany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mamaky lalana izy ka mandalo eo amin’ny vavahady
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia mivoaka avy eo aminy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mandroso eo alohany ny mpanjakany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary NY TOMPO no mitarika azy.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mitsiriritra saha izy ka maka izany an-keriny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mitsiriritra trano koa ka mahazo azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mampahory ny raim-pianakaviana mbamin’ny ankohonany izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ny olona mbamin’ny lovany.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Koa izao no lazain’NY TOMPO:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro, manomana loza hamelezana ity firenena ity Aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia loza tsy hahazoanareo hanafaka ny vozonareo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy handeha miandranandrana ianareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria andro mampahory izany.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Amin’izany andro izany no hanaovana oha-teny mandatsa anareo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ka hitomaniana sy hidradradradrana hoe: Izay no izy!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Eny, hiteny izy hoe: Fongana tokoa isika.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ataony fanakalo zavatra ny anjaran’ny oloko.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indrisy! Esoriny hiala amiko izany.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Zarainy ho an’ny mpikomy ny tanintsika!
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa tsy hisy aminao hanenjana kofehy fandrefesana hanaovana antsapaka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ao amin’ny fiangonan’NY TOMPO.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ireo izay mandà ny hafatry ny mpaminany
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aza miteniteny ianareo, hoy ny fiteniteniny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aoka tsy hiteniteny toy izany izy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy hita lany ny fanalam-baraka ataony!
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: E! Izany va no teninao, ry taranak’i Jakoba?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Malaky tezitra va NY TOMPO?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izany va no fanaony?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy mahasoa izay mandeha mahitsy va ny teniko?
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vao omaly no omaly no nitsanganan’ny oloko ho fahavalo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: endahinareo amin’izay mandeha tsy manana ahiahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avy any an’ady
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny akanjobe ivelany manarona ny fitafiany.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny vehivavy amin’ny oloko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia roahinareo hiala amin’ny tranony mahafinaritra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: esorinareo hiala mandrakizay amin’ny zanany madinika
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny voninahitra avy Amiko.
