document_id: 2TH.3
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mahatoky ny Tompo
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Farany, ry rahalahy, mivavaha ho anay mba handehanan’ny tenin’ny Tompo haingana ka hankalazaina toy izao eo aminareo izao, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ary mba hovonjena ho afaka amin’ny olona hafahafa sy ratsy fanahy izahay; fa tsy ary manana finoana avokoa ny olona rehetra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Fa mahatoky ny Tompo izay hampahery sy hiaro anareo tsy ho azon’ilay ratsy. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Fa izahay dia matoky anareo ao amin’ny Tompo, fa izay zavatra ampanaovinay dia efa ataonareo sady mbola hataonareo ihany koa. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ny Tompo anie hampitodika ny fonareo ho amin’ny fitiavana an’Andriamanitra sy ho amin’ny faharetan’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Miasa tahaka ny Apostoly
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary mangataka anareo izahay, ry rahalahy, amin’ny anaran’i Jesosy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' Tompontsika mba hialanareo amin’ny rahalahy rehetra izay tsy mitoetra tsara ka tsy manaraka ny fampianarana natolotra izay noraisiny taminay.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Fa ianareo no mahalala izay tokony hianaranareo aminay; fa nitoetra tsara teo aminareo izahay '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'ary tsy nihinana foana izay hanin’olona fa niasa andro aman’alina tamin’ny fikelezan’aina sy ny fisasarana mba tsy hahavaky tratra na dia ny iray aminareo akory aza; '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'tsy hoe tsy manana zo anefa izahay fa ny mba hanoloranay ny tenanay ho fianarana ho anareo. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Fa fony mbola teo aminareo ihany aza izahay dia niteny hentitra taminareo hoe: Raha misy tsy mety miasa dia aoka izy tsy hihinana.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Renay mantsy fa misy ny sasany eo aminareo tsy mitoetra tsara ka tsy miasa akory fa mivezivezy foana miraharaha ny an’olona. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Izay manao toy izany no didianay sy anarinay ao amin’i Jesosy Kristy Tompo mba hiasa tsara am-pilaminana ka hihinana izay azy ihany. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Fa ianareo, ry rahalahy, dia aza ketraka amin’ny fanaovan-tsoa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Raha misy olona tsy manaiky ny teninay amin’ity epistily ity dia mariho izany olona izany ka aza mikambana aminy mba hahamenatra azy. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Kanefa aza dia atao fahavalo izy fa anaro toy ny rahalahy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Tsodrano sy fanaovam-beloma
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ary ny Tompon’ny fiadanana anie hanome anareo fiadanana mandrakariva amin’ny zavatra rehetra. Ho aminareo rehetra anie ny Tompo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ity no veloma ataon’ny tanako, izaho Paoly. Izao no famantarana eo amin’ny epistily rehetra; izao no soratro.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ho aminareo rehetra anie ny fahasoavan’i Jesosy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' Tompontsika.'
