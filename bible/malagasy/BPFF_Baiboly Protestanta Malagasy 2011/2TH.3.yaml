document_id: 2TH.3,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Mahatoky ny Tompo
  - type: text
    content: 'Farany, ry rahalahy, mivavaha ho anay mba handehanan’ny tenin’ny Tompo haingana ka hankalazaina toy izao eo aminareo izao, '
  '10':
  - type: text
    content: 'Fa fony mbola teo aminareo ihany aza izahay dia niteny hentitra taminareo hoe: Raha misy tsy mety miasa dia aoka izy tsy hihinana.'
  '11':
  - type: text
    content: 'Renay mantsy fa misy ny sasany eo aminareo tsy mitoetra tsara ka tsy miasa akory fa mivezivezy foana miraharaha ny an’olona. '
  '12':
  - type: text
    content: 'Izay manao toy izany no didianay sy anarinay ao amin’i Jesosy Kristy Tompo mba hiasa tsara am-pilaminana ka hihinana izay azy ihany. '
  '13':
  - type: text
    content: Fa ianareo, ry rahalahy, dia aza ketraka amin’ny fanaovan-tsoa.
  '14':
  - type: text
    content: 'Raha misy olona tsy manaiky ny teninay amin’ity epistily ity dia mariho izany olona izany ka aza mikambana aminy mba hahamenatra azy. '
  '15':
  - type: text
    content: Kanefa aza dia atao fahavalo izy fa anaro toy ny rahalahy.
  - type: heading
    content: Tsodrano sy fanaovam-beloma
  '16':
  - type: text
    content: Ary ny Tompon’ny fiadanana anie hanome anareo fiadanana mandrakariva amin’ny zavatra rehetra. Ho aminareo rehetra anie ny Tompo.
  '17':
  - type: text
    content: Ity no veloma ataon’ny tanako, izaho Paoly. Izao no famantarana eo amin’ny epistily rehetra; izao no soratro.
  '18':
  - type: text
    content: 'Ho aminareo rehetra anie ny fahasoavan’i Jesosy '
  - type: text
    content: Kristy
  - type: text
    content: ' Tompontsika.'
  '2':
  - type: text
    content: ary mba hovonjena ho afaka amin’ny olona hafahafa sy ratsy fanahy izahay; fa tsy ary manana finoana avokoa ny olona rehetra.
  '3':
  - type: text
    content: 'Fa mahatoky ny Tompo izay hampahery sy hiaro anareo tsy ho azon’ilay ratsy. '
  '4':
  - type: text
    content: 'Fa izahay dia matoky anareo ao amin’ny Tompo, fa izay zavatra ampanaovinay dia efa ataonareo sady mbola hataonareo ihany koa. '
  '5':
  - type: text
    content: 'Ny Tompo anie hampitodika ny fonareo ho amin’ny fitiavana an’Andriamanitra sy ho amin’ny faharetan’i '
  - type: text
    content: Kristy
  - type: text
    content: .
  - type: heading
    content: Miasa tahaka ny Apostoly
  '6':
  - type: text
    content: 'Ary mangataka anareo izahay, ry rahalahy, amin’ny anaran’i Jesosy '
  - type: text
    content: Kristy
  - type: text
    content: ' Tompontsika mba hialanareo amin’ny rahalahy rehetra izay tsy mitoetra tsara ka tsy manaraka ny fampianarana natolotra izay noraisiny taminay.'
  '7':
  - type: text
    content: 'Fa ianareo no mahalala izay tokony hianaranareo aminay; fa nitoetra tsara teo aminareo izahay '
  '8':
  - type: text
    content: 'ary tsy nihinana foana izay hanin’olona fa niasa andro aman’alina tamin’ny fikelezan’aina sy ny fisasarana mba tsy hahavaky tratra na dia ny iray aminareo akory aza; '
  '9':
  - type: text
    content: 'tsy hoe tsy manana zo anefa izahay fa ny mba hanoloranay ny tenanay ho fianarana ho anareo. '
