document_id: EZR.7,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: I Ezra mpanoradalàna
  - type: text
    content: 'Rehefa afaka izany, tamin’ny nanjakan’i Artaksersesy, mpanjakan’i Persia, dia niakatra i Ezra, zanak’i Seraia, zanak’i Azaria, zanak’i Hilkia, '
  '10':
  - type: text
    content: Fa nampiomana ny fony i Ezra mba hitady ny lalànan’NY TOMPO ka hankatò izany ary hampianatra ny Israely ireo didy sy fitsipika.
  - type: heading
    content: Ny asa nankinin’i Artaksersesy tamin’i Ezra
  '11':
  - type: text
    content: 'Izao no dikan’ny taratasy izay nomen’i Artaksersesy mpanjaka an’i Ezra mpisorona, ilay mpanoradalàna mahay ny tenin’ny lalànan’NY TOMPO sy ny didiny tamin’ny Israely:'
  '12':
  - type: text
    content: 'I Artaksersesy, mpanjakan’ny mpanjaka, ho an’i Ezra mpisorona, mpanoradalàna mahay tsara ny lalànan’Andriamanitry ny lanitra. '
  '13':
  - type: text
    content: 'Mamoaka didy aho fa na iza na iza eto amin’ny fanjakako no te hiaraka aminao hankany Jerosalema dia mahazo mandeha izy! '
  '14':
  - type: text
    content: 'Fa efa nirahin’ny mpanjaka ianao sy izy fito lahy mpanolotsainany handinika an’i Joda sy i Jerosalema, araka ny lalànan’Andriamanitrao izay eny an-tananao; '
  '15':
  - type: text
    content: 'ary ianao dia hitondra ny volafotsy sy ny volamena izay efa natolotry ny mpanjaka sy ireo mpanolotsaina an-tsitrapo ho an’Andriamanitry ny Israely, izay monina any Jerosalema; '
  '16':
  - type: text
    content: 'ny volafotsy sy ny volamena rehetra izay ho azonao avy amin’ny tany Babilona manontolo sy ny fanatitra an-tsitrapo atolotry ny olona sy ny mpisorona, dia izay atolony an-tsitrapo hanaovany ny tranon’Andriamaniny, izay any Jerosalema. '
  '17':
  - type: text
    content: 'Koa amin’izany dia ividiano omby sy ondrilahy ary zanak’ondry mbamin’ny fanatitra avy amin’ny zavamaniry sy ny fanatitra aidina momba azy araka izay ilaina ny ampahany amin’io vola io, ary atero eo ambonin’ny alitara ao amin’ny tranon’Andriamanitrareo izay any Jerosalema ireny. '
  '18':
  - type: text
    content: 'Ary izay rehetra sitrakao sy ny rahalahinao hatao amin’ny volafotsy sy ny volamena sisa dia ataovy izany araka ny sitrapon’Andriamanitrareo. '
  '19':
  - type: text
    content: 'Ny fanaka izay nomena anao hanaovana ny fanompoana ao amin’ny tranon’Andriamanitrao dia atolory eo anatrehan’Andriamanitra any Jerosalema. '
  '2':
  - type: text
    content: 'zanak’i Saloma, zanak’i Zadoka, zanak’i Ahitoba, '
  '20':
  - type: text
    content: 'Ary izay rehetra mbola hilainao koa ka tsy maintsy haloanao ho an’ny tranon’Andriamanitrao dia alao ao amin’ny trano fitahirizan-drakitry ny mpanjaka. '
  '21':
  - type: text
    content: 'Izaho Artaksersesy mpanjaka dia mamoaka didy koa ho amin’ny mpitahiry ny harenan’ny fanjakana rehetra izay any andafin’ny ony Eofrata, fa na inona na inona no ilain’i Ezra mpisorona, mpanoradalàna mahay ny lalànan’Andriamanitry ny lanitra, aminareo, dia tanteraho marina izany, '
  '22':
  - type: text
    content: 'na hatramin’ny volafotsy zato '
  - type: text
    content: talenta
  - type: text
    content: ', ny varimbazaha zato '
  - type: text
    content: kora
  - type: text
    content: ', ny divay zato '
  - type: text
    content: bata
  - type: text
    content: ', ny diloilo zato bata ary ny sira tsy misy fatrany aza. '
  '23':
  - type: text
    content: 'Na inona na inona andidian’Andriamanitry ny lanitra dia aoka hataonao tanteraka avokoa ho an’ny tranon’Andriamanitry ny lanitra; fa nahoana no havela hisy fahatezerana hihatra amin’ny fanjakan’ny mpanjaka sy ny zanany? '
  '24':
  - type: text
    content: 'Mampahafantatra anareo koa izahay fa ny mpisorona rehetra, ny '
  - type: text
    content: levita
  - type: text
    content: ', ny mpihira, ny mpiandry varavarana, ny '
  - type: text
    content: Netinima
  - type: text
    content: ' ary ny mpanompo amin’io tranon’Andriamanitra io dia tsy mba hampandoavina hetra, na haba, na sara. '
  '25':
  - type: text
    content: 'Ary ianao, ry Ezra, araka ny fahendren’Andriamanitrao izay eo an-tananao, dia manendre mpanapaka sy mpitsara izay hitondra ny olona rehetra any andafin’ny ony Eofrata, dia izay rehetra mahalala ny lalànan’Andriamanitrao; fa izay tsy mbola mahalala izany dia aoka hampianarinareo. '
  '26':
  - type: text
    content: Ary na iza na iza tsy mety mankatò ny lalànan’Andriamanitrao sy ny lalànan’ny mpanjaka dia aoka hotsaraina marina izy na hovonoina, na horoahina, na hosazina, na hafatotra.
  '27':
  - type: text
    content: 'Isaorana anie NY TOMPO Andriamanitry ny razantsika izay nametraka izany tao am-pon’ny mpanjaka mba hahatsara endrika ny tranon’NY TOMPO any Jerosalema '
  '28':
  - type: text
    content: sady efa nampahazo ahy famindrampo teo anatrehan’ny mpanjaka sy ireo mpanolotsainany ary ny mpanapaka lehibe rehetra ao amin’ny mpanjaka. Dia nampaherezina aho araka ny nomban’ny tanan’NY TOMPO Andriamanitro ahy ka nahangona loholona tamin’ny Israely mba hiara-miakatra amiko.
  '3':
  - type: text
    content: 'zanak’i Amaria, zanak’i Azaria, zanak’i Meraiota, '
  '4':
  - type: text
    content: 'zanak’i Zerahia, zanak’i Ozy, zanak’i Bokỳ, '
  '5':
  - type: text
    content: 'zanak’i Abisoa, zanak’i Finehasa, zanak’i Eleazara, zanak’i Arona '
  - type: text
    content: Mpisoronabe
  - type: text
    content: '. '
  '6':
  - type: text
    content: 'Io Ezra io dia niakatra avy tany Babilona; mpanoradalàna izy sady nahay ny lalànan’i Mosesy izay nomen’NY TOMPO, Andriamanitry ny Israely; nomen’ny mpanjaka azy izay rehetra nangatahiny, araka ny nomban’ny tanan’NY TOMPO Andriamaniny azy. '
  '7':
  - type: text
    content: 'Tamin’ny taona fahafito nanjakan’i Artaksersesy mpanjaka dia niakatra hankany Jerosalema koa ny sasany amin’ny Zanak’Israely sy ny sasany amin’ny mpisorona mbamin’ny '
  - type: text
    content: levita
  - type: text
    content: ', ny mpihira, ny mpiandry varavarana ary ny '
  - type: text
    content: Netinima
  - type: text
    content: '. '
  '8':
  - type: text
    content: 'Ary tonga tany Jerosalema i Ezra tamin’ny volana fahadimy tamin’ny taona fahafito nanjakan’ny mpanjaka. '
  '9':
  - type: text
    content: 'Fa tamin’ny andro voalohany tamin’ny volana voalohany no niaingany niakatra avy tany Babilona; ary tamin’ny andro voalohany tamin’ny volana fahadimy no nahatongavany tany Jerosalema araka ny soa nataon’ny tanan’Andriamaniny taminy. '
