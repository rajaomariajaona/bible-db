document_id: PSA.98
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mihobia ho an’NY TOMPO fa avy Izy
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: Salamo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Mihirà fihiram-baovao ho an’NY TOMPO;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa nanao fahagagana Izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny tanany ankavanana sy ny sandriny masina no nahavitany famonjena.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: NY TOMPO nampahafantatra ny famonjeny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'teo imason’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jentilisa
  - type: text
    text: ' no nanehoany ny fahamarinany.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Nahatsiaro ny famindrampony sy ny fahamarinany
- type: usfm
  marker: q1
  children:
  - type: text
    text: tamin’ny taranak’Israely Izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: nahita ny famonjen’Andriamanitsika ny vazan-tany rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Mihobia ho an’NY TOMPO, ry tany rehetra!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Velomy ny hoby ka mihirà!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Mankalazà NY TOMPO amin’ny lokanga,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia amin’ny lokanga sy ny feon-kira,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: amin’ny trompetra sy ny fitsofana ny anjomara
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka mihobia eo anatrehan’NY TOMPO Mpanjaka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Aoka hirohondrohona ny ranomasina sy izay rehetra ao aminy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: izao rehetra izao sy ny mponina eo aminy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Aoka hiteha-tanana ny riaka;
- type: usfm
  marker: q1
  children:
  - type: text
    text: aoka hiara-mihoby aminy koa ny tendrombohitra,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: eo anatrehan’NY TOMPO, fa avy hitsara ny tany Izy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hitsara izao rehetra izao amin’ny fahamarinana Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny firenena amin’ny fahitsiana.
