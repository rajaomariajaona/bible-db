document_id: PSA.98,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Mihobia ho an’NY TOMPO fa avy Izy
  - type: text
    content: Salamo.
  - type: text
    content: Mihirà fihiram-baovao ho an’NY TOMPO;
  - type: text
    content: fa nanao fahagagana Izy;
  - type: text
    content: ny tanany ankavanana sy ny sandriny masina no nahavitany famonjena.
  '2':
  - type: text
    content: NY TOMPO nampahafantatra ny famonjeny;
  - type: text
    content: 'teo imason’ny '
  - type: text
    content: Jentilisa
  - type: text
    content: ' no nanehoany ny fahamarinany.'
  '3':
  - type: text
    content: Nahatsiaro ny famindrampony sy ny fahamarinany
  - type: text
    content: tamin’ny taranak’Israely Izy;
  - type: text
    content: nahita ny famonjen’Andriamanitsika ny vazan-tany rehetra.
  '4':
  - type: text
    content: Mihobia ho an’NY TOMPO, ry tany rehetra!
  - type: text
    content: Velomy ny hoby ka mihirà!
  '5':
  - type: text
    content: Mankalazà NY TOMPO amin’ny lokanga,
  - type: text
    content: dia amin’ny lokanga sy ny feon-kira,
  '6':
  - type: text
    content: amin’ny trompetra sy ny fitsofana ny anjomara
  - type: text
    content: ka mihobia eo anatrehan’NY TOMPO Mpanjaka.
  '7':
  - type: text
    content: Aoka hirohondrohona ny ranomasina sy izay rehetra ao aminy,
  - type: text
    content: izao rehetra izao sy ny mponina eo aminy.
  '8':
  - type: text
    content: Aoka hiteha-tanana ny riaka;
  - type: text
    content: aoka hiara-mihoby aminy koa ny tendrombohitra,
  '9':
  - type: text
    content: eo anatrehan’NY TOMPO, fa avy hitsara ny tany Izy.
  - type: text
    content: Hitsara izao rehetra izao amin’ny fahamarinana Izy
  - type: text
    content: ary ny firenena amin’ny fahitsiana.
