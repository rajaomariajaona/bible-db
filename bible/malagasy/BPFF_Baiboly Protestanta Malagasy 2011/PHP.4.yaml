document_id: PHP.4,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary amin’izany, ry rahalahy sady malalako no mahamanina ahy, fifaliako sy satroboninahitro, tomoera tsara ao amin’ny Tompo ianareo, ry malalako!
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mifalia ao amin’ny Tompo
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary faly indrindra ao amin’ny Tompo aho satria nampitsimohanareo indray ankehitriny ny fiheverana ahy, izay efa noheverinareo rahateo, saingy tsy mbola nahita andro hanaovana izany ianareo. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsy filan-javatra anefa no ilazako izany satria efa nianatra tsy hierina aho na manao ahoana na manao ahoana. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mahay mivelona amin’ny fahantrana aho ary mahay mivelona amin’ny fananam-be; na aiza na aiza, ary na amin’ny inona na amin’ny inona, dia efa nampianarina ny ho voky sy ho noana ary hanam-be sy hahantra aho. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mahay ny zavatra rehetra aho ao amin’Ilay mampahery ahy.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Kanefa nanao soa ianareo tamin’ny niarahanareo ory tamiko. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary fantatrareo koa, ry Filipiana, fa tamin’ny niandohan’ny Filazantsara, rehefa niala tany Makedonia aho dia tsy nisy fiangonana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.15 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: eklesia.
      marker-yv: yv-n
    - type: text
      text: ' nifampiraharaha tamiko ny amin’ny fanomezana ho ahy sy izay avy amiko, afa-tsy ianareo ihany. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa fony tany Tesalonika aza aho dia nampanatitra zavatra hahasoa ahy indray mandeha amana indroa ianareo. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nefa tsy toy ny mitady ny fanomezana no ilazako izany; fa mitady ny vokatra izay hitombo ho voninahitrareo aho. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Manana ny zavatra rehetra aho sady manana amby ampy aza; feno aho, rehefa nandray tamin’i Epafrodito ilay zavatra nampitondrainareo, dia hanitra mani-pofona, fanatitra tian’Andriamanitra sady ankasitrahany. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa Andriamanitro anie hanatanteraka izay rehetra tokony ho anareo araka ny harenany amin’ny voninahitra ao amin’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ' Jesosy. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mananatra an’i Eodia aho ary mananatra an’i Sintike mba hiray saina ao amin’ny Tompo izy ireo. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ho an’Andriamanitra Raintsika anie ny voninahitra mandrakizay mandrakizay! '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Amena
    - type: text
      text: '!'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fanaovam-beloma
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Manaova veloma ny olona masina rehetra ao amin’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ' Jesosy. Manao veloma anareo ny rahalahy izay ato amiko. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Manao veloma anareo ny olona masina rehetra, indrindra fa ny ankohonan’i Kaisara.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ho amin’ny fanahinareo anie ny fahasoavan’i Jesosy Kristy Tompo!
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Eny, mangataka aminao koa aho, ry ilay tena mpiara-miasa amiko, manampia azy roa vavy fa niara-niasa fatratra tamiko teo amin’ny Filazantsara izy ireo, mbamin’i Klementa sy ireo mpiara-miasa amiko sisa, izay voasoratra ao amin’ny bokin’ny fiainana ny anarany.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mifalia mandrakariva ao amin’ny Tompo; hoy indray aho: Mifalia! '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aoka ho fantatry ny olona rehetra ny fandeferanareo. Efa akaiky ny Tompo. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aza manahy na amin’ny inona na amin’ny inona fa aoka ny fivavahana sy ny fifonana mbamin’ny fisaorana no hoentinareo manambara ny fangatahanareo amin’Andriamanitra amin’ny zavatra rehetra. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny fiadanan’Andriamanitra izay mihoatra noho ny fahalalana rehetra, hiaro ny fonareo sy ny hevitrareo ao amin’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ' Jesosy.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Farany, ry rahalahy, na inona na inona marina, na inona na inona manan-kaja, na inona na inona mahitsy, na inona na inona madio, na inona na inona maha te ho tia, na inona na inona tsara laza, raha misy hatsaram-panahy ary raha misy dera, dia hevero izany. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ataovy izay efa nianaranareo sy efa noraisinareo ary efa renareo sy efa hitanareo tamiko. Ary ho aminareo ny Andriamanitry ny fiadanana.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fanatitra ankasitrahan’Andriamanitra ny fanomezana natolotrareo
    marker-yv: yv-h
