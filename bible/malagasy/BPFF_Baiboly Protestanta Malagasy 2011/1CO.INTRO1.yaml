type_code: plt
verses:
  '1':
  - type: text
    content: INDRAY MIJERY
  - type: text
    content: I Korinto dia tanàna grika, renivohitry ny faritany Akaia any Gresy, nefa zanatany romana. Tanàna sy seranana malaza izy noho ny hamaroan’ny sambo sy ny habetsahan’ny varotra tao. Nifangaro tao, noho izany, ny olona avy amin’ny firenena maro samihafa, ny fari-piainana sy fari-pahalalana samihafa. Nanan-toerana teo amin’ny fisainan’ny olona tao ny filozofia grika sy ny fanompoan-tsampy nahazatra azy. Nanjaka tao ny fahafinaretana sy ny fitondrantena maloto.
  - type: text
    content: Nisy akony teo amin’ny fiainan’ny Fiangonana izany zavatra rehetra hita teo amin’ny fiarahamonina izany ka voakasik’i Paoly avokoa ao amin’ny taratasiny.
  - type: text
    content: Nisy fizarazarana koa teo amin’ny Fiangonana tao Korinto noho ireo mpitory ny Filazantsara samihafa efa nandalo tao ka niteraka fitsitokotokoana izany.
  - type: text
    content: Tany Efesosy i Paoly raha nanoratra ity epistily ity.
  - type: text
    content: Ny votoatin’ny Epistily
  - type: text
    content: 'Efa nipetraka herintaona sy tapany tany Korinto i Paoly ary tamin’izany no nanorenany ny Fiangonana tao (Asa 18). Nandre vaovao maro avy tany Korinto izy ary nila hevitra taminy ireo mpivavaka mikasika ny fiainam-piangonana; koa dinika sy fampianarana samihafa vokatr’izany no hita ato anatin’ny Epistily: Fiangonana niorina sady niaina tao amin’ny tontolo jentilisa hiringiriny ny tao Korinto, ary ny mpivavaka tao dia Jentilisa no niova ho Kristiana. Noho izany dia nila fanitsiana sy fananarana maro, ary nisy koa zavatra tsy nazava loatra tamin’ny mpivavaka izay tsy maintsy nohazavaina.'
  - type: text
    content: Fotokevitra lehibe iray ambaran’i Paoly ny maha tenan’i Jesosy Kristy ny Fiangonana, ary ny Kristiana no momba ny tenany, noho izany dia tsy voazarazara Kristy; Izy no fahendrena sy herin’Andriamanitra; mamindra ny sainy amin’ny mpianany Izy; tsy azo ampiraisina amin’ny fijangajangana sy ny fanompoan-tsampy Izy. Noho izany koa ny fanasan’ny Tompo dia hatao am-pandinihana tsara fa tsy ho toy ny sakafo tsotra. Ary satria tokana ny tenan’i Kristy dia tokana ihany koa ny batisa, tokana ny Fanahy, koa izany no maha-iray ny Mpino. Mampianatra manokana momba ny fitsanganan’ny maty koa i Paoly ka ambarany fa Kristy no santatr’izay efa nodimandry.
  - type: text
    content: Ny fanamafisana orina ny Fiangonana na ny fampandrosoana azy no tanjona nokendren’i Paoly indrindra raha nanoratra izao epistily ho an’ny Korintiana izao izy.
  - type: text
    content: Ny firafitry ny Epistily
  - type: text
    content: 'Fiarahabana sy fisaorana: 1.1-9'
  - type: text
    content: 'Ny fifampiandaniana tao amin’ny Fiangonana tao Korinto: 1.10–4.23'
  - type: text
    content: 'Ny maha an’i Kristy sy ny takian’izany amin’ny fitondrantena: 5.1–7.40'
  - type: text
    content: 'Ny fiainana kristiana ao anatin’ny fiarahamonina jentilisa: 8.1–11.1'
  - type: text
    content: 'Ny filaminana tokony ho hita ao amin’ny fivoriana kristiana: 11.2–14.40'
  - type: text
    content: 'Ny fitsanganan’i Jesosy Kristy tamin’ny maty, nandresy ny fahafatesana: 15.1-58'
  - type: text
    content: 'Hafatra farany sy fanaovam-beloma: 16.1-24'
