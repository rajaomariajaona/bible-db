document_id: 2CH.2,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Dia nanisa olona fito alina ho mpitondra entana i Solomona, valo alina ho mpikapa hazo any an-tendrombohitra ary eninjato sy telo arivo ho mpifehy azy.
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ary hoy i Hirama, mpanjakan’i Tiro, tamin’ny taratasy izay nampanateriny ho any amin’i Solomona: Noho ny fitiavan’NY TOMPO ny olony no nanendreny anao ho mpanjakany. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Hoy koa i Hirama: Isaorana anie NY TOMPO, Andriamanitry ny Israely, izay nanao ny lanitra sy ny tany, noho ny nanomezany an’i Davida zanaka hendry, izay manana fahendrena sy fahalalana ka hanorina trano ho an’NY TOMPO sy lapa ho an’ny tenany izy. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Koa ankehitriny indro, maniraka olona mahay zavatra sady manana fahalalana aho, dia i Hirama-Aby, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'zanaky ny vehivavy danita sy ny lehilahy tiriana. Izy dia mahay miasa volamena, volafotsy, varahina, vy, vato, hazo, kofehy volomparasy sy manga ary rongony fotsy madinika sy jaky; ary mahay misokitra sary samihafa sy mahay mamolavola asa kanto koa izy ka hiara-miasa amin’ny olon-kendrinao sy ny olon-kendrin’i Davida tompoko, rainao. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Ary ireo varimbazaha isan-karazany sy ny diloilo ary ny divay, izay nolazainao, tompokolahy, dia aoka hampanaterina ho atỳ aminay mpanomponao; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ary izahay dia hikapa hazo any Libanona araka izay rehetra tadiavinao; hofehezinay ka hampandehaninay mitsinkafona amin’ny ranomasina ho any Jopa ireny; fa ianao kosa no hampiakatra azy any Jerosalema.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 1Mpa 5.27-32
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Nanisa ny lehilahy hafa firenena rehetra izay nonina tamin’ny tanin’ny Israely araka ny nanisan’i Davida rainy azy i Solomona, ary ny isany dia eninjato sy telo arivo sy dimy alina sy iray hetsy. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Ny fito alina tamin’ireo dia nataony mpitondra entana, ny valo alina dia nataony mpikapa hazo any an-tendrombohitra, ary ny eninjato sy telo arivo dia nataony mpifehy hampiasa ny olona.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Nandefa iraka hankany amin’i Hirama, mpanjakan’i Tiro, i Solomona, hilaza hoe: Tahaka ny nataonao tamin’i Davida raiko raha nampanatitra hazo sedera ho azy hanorenany trano hitoerany ianao, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'indro, hanorina trano ho an’ny anaran’NY TOMPO Andriamanitro izay hohamasinina ho Azy aho, handoroana ditin-kazo manitra eo anatrehany sy hasiana ny mofo atao fanatitra ary handoroana ny fanatitra isa-maraina sy isan-kariva ary amin’ny Sabata sy ny voaloham-bolana ary amin’ny fotoam-pivavahana voatendrin’NY TOMPO Andriamanitray; ho adidy maharitra ho an’ny Israely izany. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ary ny trano izay haoriko dia ho lehibe, satria lehibe noho ny andriamanitra rehetra ny Andriamanitray. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Nefa iza no mahay manorina trano ho Azy? Fa ny lanitra ary ny lanitry ny lanitra aza tsy omby Azy. Iza moa aho no hanorina trano ho Azy, afa-tsy ny handoroana ditin-kazo manitra eo anatrehany ihany? '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Koa aniraho olon-kendry aho hiasa volamena, volafotsy, varahina, vy, kofehy volomparasy sy jaky ary manga, mbamin’izay mahay misokitra sary, mba hiara-miasa amin’ny olona manam-pahaizana manokana izay atỳ amiko atỳ Joda sy Jerosalema, izay efa nomanin’i Davida raiko. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Anatero hazo sedera sy kipreso ary almoga avy any Libanona koa aho; fa fantatro fa mahay mikapa hazo any Libanona ny vahoakanao; ary indro, hiaraka amin’ny vahoakanao ny vahoakako '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'mba hanamboatra hazo betsaka ho ahy; fa ny trano izay haoriko dia ho lehibe higagana. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ary indro, homeko varimbazaha voafotsy sy varimbazaha roa alina '
    - type: usfm
      marker: w
      children:
      - type: text
        text: kora
    - type: text
      text: ' avy ary divay sy diloilo roa alina '
    - type: usfm
      marker: w
      children:
      - type: text
        text: bata
    - type: text
      text: ' avy ny vahoakanao mpikapa hazo.'
  - type: usfm
    marker: r
    children:
    - type: text
      text: 1Mpa 5.15-26; 7.13-14
    marker-yv: yv-h
