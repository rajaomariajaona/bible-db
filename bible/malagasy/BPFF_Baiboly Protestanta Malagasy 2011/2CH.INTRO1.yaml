    - type: text
      text: INDRAY MIJERY
  - type: usfm
    marker: is1
    children:
    - type: text
      text: Ny votoatin’ny Boky
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Misy fizarana roa ao amin’ny Boky. Ny tapany voalohany dia milaza an’i Solomona, zanak’i Davida, izay nanatanteraka ny fananganana ny tempoly. Ny tapany faharoa dia milaza ireo mpanjaka nandimby an’i Davida tao Joda. Tsy mitantara ny amin’ireo mpanjaka tany Israely ny mpanoratra. Asehony fa Andriamanitra dia mamaly ny toetran’ireo mpanjaka nifandimby, na nanaraka ny didiny izy ireny na tsia, satria ny mpanjaka no solontenan’Andriamanitra ao amin’ny fanjakany.
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Ny andininy roa farany ao amin’ny Boky dia milaza ilay Didin’i Kirosy, izay nanome lalana ny Jiosy hiverina any Jerosalema ka hanangana indray ny tempoly. Izany didy izany dia voalaza feno ao am-piandohan’ny Bokin’i Ezra, koa noho izany dia mifampitohy ny Bokin’ny Tantara sy ny Boky Ezra sy Nehemia.
