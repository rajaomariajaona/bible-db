document_id: EZK.20,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Nitari-dalana ny Israely ihany Andriamanitra na dia nikomy aza izy
  - type: text
    content: 'Tamin’ny andro fahafolo tamin’ny volana fahadimy, tamin’ny taona fahafito dia nisy tonga ny loholon’ny Israely mba hanontany amin’NY TOMPO ka nipetraka teo anatrehako izy. '
  '10':
  - type: text
    content: 'Koa nentiko nivoaka avy tany amin’ny tany Ejipta izy ka nentiko ho any an-tany efitra. '
  '11':
  - type: text
    content: 'Nomeko azy ny didiko ary nampahafantariko azy ny fitsipiko izay mahavelona ny olona manaraka izany. '
  '12':
  - type: text
    content: Nomeko azy koa ny Sabatako ho famantarana ho Amiko sy ho aminy mba ho fantany fa Izaho TOMPO no manamasina azy.
  '13':
  - type: text
    content: 'Kanjo nikomy tamiko tany an-tany efitra ihany ny taranak’Israely. Tsy nandeha araka ny didiko izy fa nanamavo ny fitsipiko izay mahavelona ny olona manaraka izany, ary nandoto izay tsy izy ny Sabatako izy ka hoy Aho: Haidiko aminy any an-tany efitra ny fahatezerako hahalany ringana azy. '
  '14':
  - type: text
    content: 'Kanefa noho ny amin’ny anarako no nihetsehako mba tsy handotoana izany eo anatrehan’ny Jentilisa izay nahita ny nitondrako azy nivoaka. '
  '15':
  - type: text
    content: 'Ary Izaho dia nanangan-tanana taminy tany an-tany efitra koa fa tsy hitondra azy ho any amin’ny tany efa nomeko azy, izay tondra-dronono sy tantely sady tsara indrindra amin’ny tany rehetra, '
  '16':
  - type: text
    content: 'satria nanamavo ny fitsipiko izy ary tsy nandeha araka ny didiko fa nandoto ny Sabatako; fa ny fony dia nanaraka ny sampiny. '
  '17':
  - type: text
    content: 'Nefa niantra azy ihany ny masoko ka tsy naringako na nolevoniko tany an-tany efitra izy. '
  '18':
  - type: text
    content: 'Fa hoy Aho tamin’ny zanany tany an-tany efitra: Aza mandeha araka ny fanaon-drazanareo ianareo, na mitandrina ny fitsipiny, na mandoto tena amin’ny sampiny! '
  '19':
  - type: text
    content: 'Izaho no TOMPO Andriamanitrareo. Mandehana araka ny didiko, ary mitandrema ny fitsipiko ka araho izany. '
  '2':
  - type: text
    content: 'Dia tonga tamiko ny tenin’NY TOMPO hoe:'
  '20':
  - type: text
    content: Ary manamasìna ny Sabatako mba ho famantarana ho Amiko sy ho aminareo, dia ho fantatrareo fa Izaho no TOMPO Andriamanitrareo.
  '21':
  - type: text
    content: 'Kanjo nikomy tamiko koa ny zanany. Tsy nandeha araka ny didiko izy, na nitandrina hanaraka ny fitsipiko izay mahavelona ny olona manaraka izany, fa nandoto ny Sabatako izy ka hoy Aho: Haidiko aminy ny fahavinirako ary hanamparako ny fahatezerako any an-tany efitra izy. '
  '22':
  - type: text
    content: 'Nefa nampihemotra ny tanako Aho; koa noho ny amin’ny anarako no nihetsehako mba tsy ho voaloto izany eo anatrehan’ny Jentilisa izay nahita ny nitondrako azy nivoaka. '
  '23':
  - type: text
    content: 'Ary Izaho koa no nanangan-tanana taminy tany an-tany efitra hampiely azy any amin’ny Jentilisa sy hampihahaka azy any amin’ny tany samihafa, '
  '24':
  - type: text
    content: 'satria tsy nanaraka ny fitsipiko izy fa nanamavo ny didiko sy nandoto ny Sabatako, ary ny masony dia nanaraka ny sampin’ny razany. '
  '25':
  - type: text
    content: 'Ary Izaho koa no nanome azy didy tsy tsara sy fitsipika izay tsy mahavelona azy. '
  '26':
  - type: text
    content: Dia nandoto azy tamin’ny fanatiny Aho, tamin’ny nampandehanany ny voalohan-teraka rehetra hamakivaky ny afo, ka nataoko very hevitra izy, mba ho fantany fa Izaho no TOMPO.
  - type: heading
    content: Hatsahatr’Andriamanitra ny fanompoan-tsampin’ny Israely
  '27':
  - type: text
    content: 'Koa mitenena amin’ny taranak’Israely, ry '
  - type: text
    content: zanak’olona
  - type: text
    content: ', ka lazao aminy hoe: Izao no lazain’NY TOMPO Andriamanitra: Tamin’izao no mbola nanamavoan’ny razanareo Ahy tamin’ny nivadihany tamiko: '
  '28':
  - type: text
    content: 'Nony nitondra azy ho any amin’ny tany izay nananganako tanana homena azy Aho dia nahita ny vohitra avo rehetra sy ny hazo misandrahaka rehetra izy ka tao no namonoany zavatra hatao fanatitra, ary tao koa no nametrahany ny fanatiny mahatezitra; tao koa no nanolorany hanitra ankasitrahana, ary tao no nanidinany ny fanatitra aidiny. '
  '29':
  - type: text
    content: 'Dia hoy Aho taminy: Ahoana moa ny amin’ny toerana fanaovana sorona alehanareo? Koa toerana fanaovana sorona no natao anarany mandraka androany.'
  '3':
  - type: text
    content: 'Ry '
  - type: text
    content: zanak’olona
  - type: text
    content: ', mitenena amin’ireo loholon’ny Israely ka lazao aminy hoe: Izao no lazain’NY TOMPO Andriamanitra: Moa hanontany Amiko va no iavianareo? Raha velona koa Aho, hoy NY TOMPO Andriamanitra, dia tsy hety hanontanianareo mihitsy Aho. '
  '30':
  - type: text
    content: 'Koa lazao amin’ny taranak’Israely hoe: Izao no lazain’NY TOMPO Andriamanitra: Moa tsy mandoto tena araka ny lalan’ny razanareo va ianareo, sy mijangajanga manaraka ny fahavetavetany, '
  '31':
  - type: text
    content: 'ary mandoto tena amin’ny sampinareo rehetra mandraka androany amin’ny anateranareo ny fanomezanareo sy ny ampandehananareo ny zanakareo hamakivaky ny afo? Ary Izaho va hety hanontanianareo, ry taranak’Israely? Raha velona koa Aho, hoy NY TOMPO Andriamanitra, tsy hety hanontanianareo mihitsy Aho. '
  '32':
  - type: text
    content: 'Tsy ho tanteraka mihitsy ny eritreritra ao an-tsainareo hoe: Ho tahaka ny '
  - type: text
    content: Jentilisa
  - type: text
    content: ' izahay, dia tahaka ny foko any amin’ny tany samihafa ka hanao fanompoam-pivavahana ho an’ny vato aman-kazo. '
  '33':
  - type: text
    content: 'Raha velona koa Aho, hoy NY TOMPO Andriamanitra, dia tanana mahery sy sandry atsotra ary fahatezerana miraraka no hanjakako aminareo. '
  '34':
  - type: text
    content: 'Ary amin’ny tanana mahery sy ny sandry atsotra ary amin’ny fahatezerana miraraka no hitondrako anareo mivoaka avy any amin’ny firenena sy hamoriako anareo avy any amin’ny tany izay nampielezana anareo. '
  '35':
  - type: text
    content: 'Dia hoentiko ho any an-tany efitry ny firenena ianareo ka any no hifandaharako mifanatrika aminareo. '
  '36':
  - type: text
    content: 'Tahaka ny nifandaharako tamin’ny razanareo tany an-tany efitry ny tany Ejipta, dia toy izany koa no hifandaharako aminareo, hoy NY TOMPO Andriamanitra. '
  '37':
  - type: text
    content: 'Hampandaloviko eo ambanin’ny tehina ianareo ka hoentiko amin’ny fatoran’ny fanekena. '
  '38':
  - type: text
    content: Havahako hiala aminareo ny mpikomy sy izay manota Amiko; eny, hoentiko hiala amin’ny tany ivahiniany ireo, nefa tsy hisy ho tafiditra ao amin’ny tanin’ny Israely izy. Dia ho fantatrareo fa Izaho no TOMPO.
  '39':
  - type: text
    content: 'Ary ny aminareo, ry taranak’Israely, izao no lazain’NY TOMPO Andriamanitra: Samia mandeha ianareo ka manompoa ny sampinareo! Nefa any aoriana any, moa tsy mba hihaino Ahy mihitsy va ianareo? Tsy hanamavo ny anarako masina intsony amin’ny fanatitrareo sy amin’ny sampinareo ianareo. '
  '4':
  - type: text
    content: Tsy hotsarainao va izy, ry zanak’olona, tsy hotsarainao va izy? Ampahafantaro azy ny fahavetavetan’ny razany!
  '40':
  - type: text
    content: 'Fa ao amin’ny tendrombohitro masina, dia ao amin’ny tendrombohitra avon’ny Israely, hoy NY TOMPO Andriamanitra, no hanompoan’ny taranak’Israely rehetra Ahy, dia izay rehetra ao amin’ny tany; ao no hankasitrahako azy, ary ao no hilako ny fanomezanareo sy ny voaloham-bokatra aterinareo amin’ny zava-masinareo rehetra. '
  '41':
  - type: text
    content: 'Hankasitrahako toy ny hanitra ankasitrahana ianareo amin’ny hitondrako anareo mivoaka avy any amin’ny firenena sy ny hamoriako anareo avy any amin’ny tany samihafa nampielezana anareo; dia hiseho ho masina eo anatrehan’ny Jentilisa Aho amin’ny hataoko aminareo. '
  '42':
  - type: text
    content: 'Ho fantatrareo fa Izaho no TOMPO rehefa mitondra anareo ho any amin’ny tanin’ny Israely Aho, dia ny tany izay nananganako tanana homena ny razanareo. '
  '43':
  - type: text
    content: 'Ary hotsaroanareo any ny lalanareo sy ny nataonareo rehetra izay nahaloto anareo; ary haharikoriko anareo ny tenanareo noho ny ratsy rehetra nataonareo. '
  '44':
  - type: text
    content: Dia ho fantatrareo fa Izaho no TOMPO rehefa miasa aminareo Aho noho ny amin’ny anarako, fa tsy araka ny lalan-dratsinareo, na araka ny ratsy fanaonareo, ry taranak’Israely, hoy NY TOMPO Andriamanitra.
  '5':
  - type: text
    content: 'Lazao aminy hoe: Izao no lazain’NY TOMPO Andriamanitra: Tamin’ny andro nifidianako ny Israely sy nananganako tanana tamin’ny taranak’i Jakoba sy nanaovako izay hahafantarany Ahy tany amin’ny tany Ejipta, raha nanangan-tanana taminy Aho ka niteny hoe: Izaho no TOMPO Andriamanitrareo, '
  '6':
  - type: text
    content: 'tamin’izany andro izany no nananganako tanana taminy hitondra azy hivoaka avy tany amin’ny tany Ejipta ho any amin’ny tany nozahako ho azy, izay tondra-dronono sy tantely sady tsara indrindra amin’ny tany rehetra, '
  '7':
  - type: text
    content: 'dia hoy Aho taminy: Samia manary ny fahavetavetan’ny masonareo avy ianareo! Aza mandoto tena amin’ny sampin’i Ejipta! Izaho no TOMPO Andriamanitrareo.'
  '8':
  - type: text
    content: 'Nefa nikomy Tamiko izy ka tsy nety nihaino Ahy; samy tsy nanary ny fahavetavetan’ny masony na nahafoy ny sampin’i Ejipta izy ka hoy Aho: Haidiko aminy ny fahavinirako, ary hanamparako ny fahatezerako eo amin’ny tany Ejipta izy. '
  '9':
  - type: text
    content: 'Kanefa noho ny amin’ny anarako no nihetsehako mba tsy handotoana izany eo imason’ny '
  - type: text
    content: Jentilisa
  - type: text
    content: ' izay nitoerany, sady teo imasony no nanaovako izay hahafantarany Ahy tamin’ny nitondrako azy nivoaka avy tany amin’ny tany Ejipta. '
