document_id: 1CH.25
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nizarana ny mpihira
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ny taranak’i Asafa sy i Hemana ary i Jedotona dia natokan’i Davida sy ireo lehiben’ny miaramila ho amin’ny fanompoana mba haminany amin’ny lokanga sy ny valiha ary ny kipantsona. Izao no isan’ny mpanao raharaha araka ny fanompoany avy:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Tamin’ny zanakalahin’i Asafa dia i Zakora, i Josefa, i Netania ary i Asarela, zanak’i Asafa, notarihin’i Asafa, izay naminany araka izay nitarihan’ny mpanjaka azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Tamin’i Jedotona, ny zanany dia i Gedalia, i Zery, i Jesaia, i Hasabia ary i Matitia; enin-dahy ireo ka notarihin’i Jedotona rainy, izay naminany tamin’ny lokanga hidera sy hisaotra NY TOMPO.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Tamin’i Hemana, ny zanany dia i Bokia, i Matania, i Oziela, i Seboela, i Jerimota, i Hanania, i Hanany, i Eliata, i Gidalty, i Romamty-Ezera, i Josbekasa, i Maloty, i Hotira ary i Mahaziota. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ireo rehetra ireo no zanak’i Hemana, mpahitan’ny mpanjaka ny amin’ny tenin’Andriamanitra, natao hanandratra ny tandroka. Ary i Hemana dia efa nomen’Andriamanitra zazalahy efatra amby folo sy zazavavy telo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ireo rehetra ireo no teo ambany fitarihan’ny rainy tamin’ny hira natao tao amin’ny tranon’NY TOMPO, tamin’ny kipantsona sy ny valiha ary ny lokanga hanaovana ny fanompoana ao amin’ny tranon’Andriamanitra.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'I Asafa sy i Jedotona ary i Hemana dia teo ambany fitarihan’ny mpanjaka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ny isan’izy ireo, miaraka amin’ny rahalahiny, izay efa nianatra ny hira ho an’NY TOMPO ka tonga lafatra ny fahaizany azy, dia valo amby valopolo sy roanjato. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Nanao antsapaka ny amin’ny anjara raharahany avy izy, na ny kely na ny lehibe, na ny mpampianatra na ny mpianatra.
- type: usfm
  marker: pi1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ny antsapaka voalohany dia azon’i Josefa avy amin’ny taranak’i Asafa;
- type: usfm
  marker: pi1
  children:
  - type: text
    text: 'ny faharoa dia an’i Gedalia, izy mbamin’ny rahalahiny sy ny zanany: Roa amby folo;'
- type: usfm
  marker: pi1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'ny fahatelo dia an’i Zakora, izy mbamin’ny zanany sy ny rahalahiny: Roa amby folo;'
- type: usfm
  marker: pi1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'ny fahefatra dia an’i Jizry, izy mbamin’ny zanany sy ny rahalahiny: Roa amby folo;'
- type: usfm
