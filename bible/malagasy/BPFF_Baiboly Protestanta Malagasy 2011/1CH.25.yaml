document_id: 1CH.25,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nizarana ny mpihira
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny taranak’i Asafa sy i Hemana ary i Jedotona dia natokan’i Davida sy ireo lehiben’ny miaramila ho amin’ny fanompoana mba haminany amin’ny lokanga sy ny valiha ary ny kipantsona. Izao no isan’ny mpanao raharaha araka ny fanompoany avy:'
  '10':
  - type: usfm
    marker: pi1
    children:
    - type: text
      text: 'ny fahatelo dia an’i Zakora, izy mbamin’ny zanany sy ny rahalahiny: Roa amby folo;'
  '11':
  - type: usfm
    marker: pi1
    children:
    - type: text
      text: 'ny fahefatra dia an’i Jizry, izy mbamin’ny zanany sy ny rahalahiny: Roa amby folo;'
  '12':
  - type: usfm
    marker: pi1
    children:
    - type: text
      text: 'ny fahadimy dia an’i Netania, izy mbamin’ny zanany sy ny rahalahiny: Roa amby folo;'
  '13':
  - type: usfm
    marker: pi1
    children:
    - type: text
      text: 'ny fahenina dia an’i Bokia, izy mbamin’ny zanany sy ny rahalahiny: Roa amby folo;'
  '14':
  - type: usfm
    marker: pi1
    children:
    - type: text
      text: 'ny fahafito dia an’i Jesarela, izy mbamin’ny zanany sy ny rahalahiny: Roa amby folo;'
  '15':
  - type: usfm
    marker: pi1
    children:
    - type: text
      text: 'ny fahavalo dia an’i Jesaia, izy mbamin’ny zanany sy ny rahalahiny: Roa amby folo;'
  '16':
  - type: usfm
    marker: pi1
    children:
    - type: text
      text: 'ny fahasivy dia an’i Matania, izy mbamin’ny zanany sy ny rahalahiny: Roa amby folo;'
  '17':
  - type: usfm
    marker: pi1
    children:
    - type: text
      text: 'ny fahafolo dia an’i Simey, izy mbamin’ny zanany sy ny rahalahiny: Roa amby folo;'
  '18':
  - type: usfm
    marker: pi1
    children:
    - type: text
      text: 'ny fahiraika amby folo dia an’i Azarela, izy mbamin’ny zanany sy ny rahalahiny: Roa amby folo;'
  '19':
  - type: usfm
    marker: pi1
    children:
    - type: text
      text: 'ny faharoa amby folo dia an’i Hasabia, izy mbamin’ny zanany sy ny rahalahiny: Roa amby folo;'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin’ny zanakalahin’i Asafa dia i Zakora, i Josefa, i Netania ary i Asarela, zanak’i Asafa, notarihin’i Asafa, izay naminany araka izay nitarihan’ny mpanjaka azy. '
  '20':
  - type: usfm
    marker: pi1
    children:
    - type: text
      text: 'ny fahatelo amby folo dia an’i Sobaela, izy mbamin’ny zanany sy ny rahalahiny: Roa amby folo;'
  '21':
  - type: usfm
    marker: pi1
    children:
    - type: text
      text: 'ny fahefatra amby folo dia an’i Matitia, izy mbamin’ny zanany sy ny rahalahiny: Roa amby folo;'
  '22':
  - type: usfm
    marker: pi1
    children:
    - type: text
      text: 'ny fahadimy amby folo dia an’i Jeremota, izy mbamin’ny zanany sy ny rahalahiny: Roa amby folo;'
  '23':
  - type: usfm
    marker: pi1
    children:
    - type: text
      text: 'ny fahenina amby folo dia an’i Hanania, izy mbamin’ny zanany sy ny rahalahiny: Roa amby folo;'
  '24':
  - type: usfm
    marker: pi1
    children:
    - type: text
      text: 'ny fahafito amby folo dia an’i Josbekasa, izy mbamin’ny zanany sy ny rahalahiny: Roa amby folo;'
  '25':
  - type: usfm
    marker: pi1
    children:
    - type: text
      text: 'ny fahavalo amby folo dia an’i Hanany, izy mbamin’ny zanany sy ny rahalahiny: Roa amby folo;'
  '26':
  - type: usfm
    marker: pi1
    children:
    - type: text
      text: 'ny fahasivy amby folo dia an’i Maloty, izy mbamin’ny zanany sy ny rahalahiny: Roa amby folo;'
  '27':
  - type: usfm
    marker: pi1
    children:
    - type: text
      text: 'ny faharoapolo dia an’i Eliata, izy mbamin’ny zanany sy ny rahalahiny: Roa amby folo;'
  '28':
  - type: usfm
    marker: pi1
    children:
    - type: text
      text: 'ny fahiraika amby roapolo dia an’i Hotira, izy mbamin’ny zanany sy ny rahalahiny: Roa amby folo;'
  '29':
  - type: usfm
    marker: pi1
    children:
    - type: text
      text: 'ny faharoa amby roapolo dia an’i Gidalty, izy mbamin’ny zanany sy ny rahalahiny: Roa amby folo;'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tamin’i Jedotona, ny zanany dia i Gedalia, i Zery, i Jesaia, i Hasabia ary i Matitia; enin-dahy ireo ka notarihin’i Jedotona rainy, izay naminany tamin’ny lokanga hidera sy hisaotra NY TOMPO.
  '30':
  - type: usfm
    marker: pi1
    children:
    - type: text
      text: 'ny fahatelo amby roapolo dia an’i Mahaziota, izy mbamin’ny zanany sy ny rahalahiny: Roa amby folo;'
  '31':
  - type: usfm
    marker: pi1
    children:
    - type: text
      text: 'ny fahefatra amby roapolo dia an’i Romamty-Ezera, izy mbamin’ny zanany sy ny rahalahiny: Roa amby folo.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin’i Hemana, ny zanany dia i Bokia, i Matania, i Oziela, i Seboela, i Jerimota, i Hanania, i Hanany, i Eliata, i Gidalty, i Romamty-Ezera, i Josbekasa, i Maloty, i Hotira ary i Mahaziota. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ireo rehetra ireo no zanak’i Hemana, mpahitan’ny mpanjaka ny amin’ny tenin’Andriamanitra, natao hanandratra ny tandroka. Ary i Hemana dia efa nomen’Andriamanitra zazalahy efatra amby folo sy zazavavy telo. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ireo rehetra ireo no teo ambany fitarihan’ny rainy tamin’ny hira natao tao amin’ny tranon’NY TOMPO, tamin’ny kipantsona sy ny valiha ary ny lokanga hanaovana ny fanompoana ao amin’ny tranon’Andriamanitra.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I Asafa sy i Jedotona ary i Hemana dia teo ambany fitarihan’ny mpanjaka. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny isan’izy ireo, miaraka amin’ny rahalahiny, izay efa nianatra ny hira ho an’NY TOMPO ka tonga lafatra ny fahaizany azy, dia valo amby valopolo sy roanjato. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nanao antsapaka ny amin’ny anjara raharahany avy izy, na ny kely na ny lehibe, na ny mpampianatra na ny mpianatra.
  '9':
  - type: usfm
    marker: pi1
    children:
    - type: text
      text: Ny antsapaka voalohany dia azon’i Josefa avy amin’ny taranak’i Asafa;
  - type: usfm
    marker: pi1
    children:
    - type: text
      text: 'ny faharoa dia an’i Gedalia, izy mbamin’ny rahalahiny sy ny zanany: Roa amby folo;'
