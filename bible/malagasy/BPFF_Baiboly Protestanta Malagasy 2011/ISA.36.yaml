document_id: ISA.36,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mandrahona an’i Jerosalema i Sankeriba
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 2Mpa 18.13-37
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin’ny taona fahefatra amby folo nanjakan’i Hezekia mpanjaka dia niakatra hamely ny tanàna mimanda rehetra any Joda i Sankeriba mpanjakan’i Asiria ka nahazo azy. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa moa haitraitrako va izao niakarako izao? Tsia, fa NY TOMPO no naniraka ahy handrava ity tany ity ka niteny hoe: Miakara ho amin’izany tany izany ka ravao izy.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy i Eliakima sy i Sebna ary i Joa tamin’i Rabsake: Miangavy anao aho, teny arameana no ataovy amin’ny mpanomponao, fa fantatray ihany izany, fa aza manao teny jiosy ho ren’ny olona eny ambonin’ny manda. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy anefa i Rabsake: Moa ho amin’ny tomponao sy ianao va no nanirahan’ny tompoko ahy hilaza izany teny izany, fa tsy ho amin’ny olona mipetraka eny ambonin’ny manda, izay voatery hihinana ny fivalanany sy hisotro ny fivalanan-dranony miaraka aminareo?'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nijoro i Rabsake ka niantso tamin’ny feo mahery tamin’ny teny jiosy hoe: Henoy ny tenin’ny mpanjaka lehibe, dia ny mpanjakan’i Asiria! '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao no lazain’ny mpanjaka: Aza mety hofitahin’i Hezekia ianareo, fa tsy hahavonjy anareo izy tsy akory. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aza mety hasain’i Hezekia hatoky NY TOMPO ianareo amin’ny filazany hoe: Hamonjy antsika tokoa NY TOMPO! Tsy hatolotra eo an-tanan’ny mpanjakan’i Asiria tsy akory ity tanàna ity! '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aza mihaino an’i Hezekia ianareo, fa izao no lazain’ny mpanjakan’i Asiria: Mihavàna amiko ianareo ka mankanesa atỳ amiko! Ary samia homana ny voalobony sy ny aviaviny avy ianareo, ary samia misotro ny rano avy amin’ny lavaka famorian-dranony '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'mandra-piaviko hitondra anareo ho any amin’izay tany tahaka ny taninareo, dia tany misy vary sy ranom-boaloboka, tany misy mofo sy tanim-boaloboka. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aza mety hofitahin’i Hezekia ianareo amin’ny ilazany hoe: NY TOMPO no hamonjy antsika! Moa nisy nahavonjy ny taniny tamin’ny tanan’ny mpanjakan’i Asiria va ireo andriamanitry ny firenena ireo? '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aiza moa ny andriamanitr’i Hamata sy i Arpada? Ary aiza koa ny andriamanitr’i Sefarvaima? Nahavonjy an’i Samaria tamin’ny tanako va ireo andriamaniny? '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary naniraka an’i Rabsake mbamin’ny miaramila betsaka avy teo Lakisy hankany Jerosalema ho any amin’i Hezekia mpanjaka ny mpanjakan’i Asiria. Dia nitsangana teo anilan’ny lakandrano amin’ny kamory ambony izy, teo amin’ny lalambe mankany amin’ny sahan’ny mpanasa lamba.
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Iza moa amin’ny andriamanitra rehetra amin’ireo tany ireo no efa nahavonjy ny taniny tamin’ny tanako, koa aiza no hahafahan’NY TOMPO mamonjy an’i Jerosalema amin’ny tanako?
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nangina anefa ny olona ka tsy nisy namaly azy na dia teny indraimbava akory aza, satria ny mpanjaka dia efa nandidy hoe: Aza misy mamaly azy. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary i Eliakima, zanak’i Hilkia, izay lehiben’ny tao an-dapa, sy i Sebna mpitantsoratra ary i Joa, zanak’i Asafa, mpitantsoratry ny raharaham-panjakana dia niditra nankao amin’i Hezekia rehefa avy nandriatra ny fitafiany, ary nitatitra taminy ny tenin’i Rabsake izy ireo.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nivoaka hitsena azy i Eliakima, zanak’i Hilkia, izay lehiben’ny tao an-dapa, sy i Sebna mpitantsoratra ary i Joa, zanak’i Asafa, mpitantsoratry ny raharaham-panjakana. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy i Rabsake tamin’ireo: Andeha, lazao amin’i Hezekia hoe: Izao no lazain’ny mpanjaka lehibe, dia ny mpanjakan’i Asiria: Inona moa izato itokianao? '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Teny foana, hoy aho, ny hoe: Manana saina sy hery hiady aho! Fa iza moa no itokianao ankehitriny no mikomy amiko ianao? '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Indro, matoky io tehina volotara torotoro io ianao, dia i Ejipta; nefa raha itehenan’olona io dia manindrona managorobaka ny tanany; eny, tahaka izany ny farao, mpanjakan’i Ejipta, amin’izay rehetra matoky azy. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa raha hoy ianao amiko: NY TOMPO Andriamanitray no itokianay, moa tsy Azy va ny toerana fanaovana sorona mbamin’ny alitara izay noravan’i Hezekia, izay nilaza tamin’ny Joda sy i Jerosalema hoe: Eto anoloan’ity alitara ity no hiankohofanareo? '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa aoka ary hifaninana ianao sy ny tompoko, dia ny mpanjakan’i Asiria, fa homeko soavaly roa arivo ianao raha mahita olona hitaingina azy. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hataonao ahoana no fampiamboho ny mpitari-tafika iray amin’ny mpanompon’ny tompoko, na dia izay kely indrindra aza? Nefa i Ejipta no itokisanao hahazoanao kalesy fitondra miady sy mpitaingin-tsoavaly! '
