    - type: text
      text: Israely
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Izao no lazain’NY TOMPO:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Noho ny fahotana telon’ny Israely,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, efatra aza, dia tsy hotsoahako ny fitsarana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria namidiny volafotsy ny olona marina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary namidiny kapan’olona iray ny sahirana;
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mahafaly azy ny mahita ny vovo-tany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eo an-dohan’ny mahantra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady mamily ny lalan’ny madinika izy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Olona mianaka no samy mandry amin’ny tovovavy iray ihany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka manamavo ny anarako masina.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Amin’ny lamba azony tamin’ny antoka izy no mitsilailay
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny anilan’ny alitara rehetra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady misotro ny divay azony tamin’ny sazy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ao amin’ny tranon’ny andriamaniny.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nefa Izaho no nandringana ny Amorita teo anoloany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia olona izay lava tsanganana toy ny hazo sedera
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy natanjaka toy ny hazo oaka;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, nosimbako ny voany teny amboniny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny fotony tao ambaniny.
