document_id: AMO.2,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny Moabita
  - type: text
    content: 'Izao no lazain’NY TOMPO:'
  - type: text
    content: Noho ny fahotana telon’i Moaba,
  - type: text
    content: eny, efatra aza, dia tsy hotsoahako ny fitsarana
  - type: text
    content: satria nodorany ho sokay ny taolan’ny mpanjakan’i Edoma;
  '10':
  - type: text
    content: Nefa Izaho no nitondra anareo niakatra avy tany amin’ny tany Ejipta
  - type: text
    content: sady nitari-dalana anareo efapolo taona tany an-tany efitra
  - type: text
    content: mba handovanareo ny tanin’ny Amorita.
  '11':
  - type: text
    content: Nanangana mpaminany tamin’ny zanakalahinareo Aho,
  - type: text
    content: ary Nazirita tamin’ny zatovonareo.
  - type: text
    content: Tsy izany va no izy, ry Zanak’Israely?
  - type: text
    content: hoy NY TOMPO.
  '12':
  - type: text
    content: Kanjo nampisotroinareo divay ny Nazirita
  - type: text
    content: 'ary ny mpaminany noraranareo hoe: Aza maminany!'
  '13':
  - type: text
    content: Indro, Izaho no hitambesatra aminareo
  - type: text
    content: toy ny fitambesatry ny sarety feno amboara.
  '14':
  - type: text
    content: Koa tsy ho afa-mandositra ny haingam-pandeha
  - type: text
    content: ary tsy ho afaka hampiseho ny heriny ny mahery;
  - type: text
    content: tsy hahavonjy ny ainy ny mpiady mahery;
  '15':
  - type: text
    content: tsy hahajoro izay mitana tsipìka
  - type: text
    content: ary tsy hahavonjy tena ny haingam-pandeha;
  - type: text
    content: tsy hahavonjy ny ainy izay mitaingin-tsoavaly
  '16':
  - type: text
    content: ary na dia izay mahery fo indrindra eo amin’ireo mpiady mahery aza
  - type: text
    content: dia handositra tsy mitam-piadiana intsony amin’izany andro izany,
  - type: text
    content: hoy NY TOMPO.
  '2':
  - type: text
    content: handefasako afo ao Moaba
  - type: text
    content: ka handevona ireo lapan’i Kiriota izany;
  - type: text
    content: ho faty ao anatin’ny tabataba i Moaba,
  - type: text
    content: amin’ny horakoraka sy ny fanenon’ny anjomara;
  '3':
  - type: text
    content: hofoanako tsy hisy mpitsara ao aminy
  - type: text
    content: ary hataoko indray mamono izy sy ireo mpanapaka rehetra ao,
  - type: text
    content: hoy NY TOMPO.
  - type: heading
    content: Joda
  '4':
  - type: text
    content: 'Izao no lazain’NY TOMPO:'
  - type: text
    content: Noho ny fahotana telon’i Joda,
  - type: text
    content: eny, efatra aza, dia tsy hotsoahako ny fitsarana
  - type: text
    content: satria nataony tsinontsinona ny lalànan’NY TOMPO,
  - type: text
    content: ary tsy notandremany ny didiny
  - type: text
    content: ka nampivily lalana azy ny laingany
  - type: note
    content: 'ny laingany: ny sampiny.'
  - type: text
    content: ' izay fanaon’ny razany;'
  '5':
  - type: text
    content: handefasako afo ao Joda
  - type: text
    content: ka handevona ireo lapan’i Jerosalema izany.
  - type: heading
    content: Israely
  '6':
  - type: text
    content: 'Izao no lazain’NY TOMPO:'
  - type: text
    content: Noho ny fahotana telon’ny Israely,
  - type: text
    content: eny, efatra aza, dia tsy hotsoahako ny fitsarana,
  - type: text
    content: satria namidiny volafotsy ny olona marina,
  - type: text
    content: ary namidiny kapan’olona iray ny sahirana;
  '7':
  - type: text
    content: mahafaly azy ny mahita ny vovo-tany
  - type: text
    content: eo an-dohan’ny mahantra
  - type: text
    content: sady mamily ny lalan’ny madinika izy.
  - type: text
    content: Olona mianaka no samy mandry amin’ny tovovavy iray ihany
  - type: text
    content: ka manamavo ny anarako masina.
  '8':
  - type: text
    content: Amin’ny lamba azony tamin’ny antoka izy no mitsilailay
  - type: text
    content: eny anilan’ny alitara rehetra,
  - type: text
    content: sady misotro ny divay azony tamin’ny sazy
  - type: text
    content: ao amin’ny tranon’ny andriamaniny.
  '9':
  - type: text
    content: Nefa Izaho no nandringana ny Amorita teo anoloany,
  - type: text
    content: dia olona izay lava tsanganana toy ny hazo sedera
  - type: text
    content: sy natanjaka toy ny hazo oaka;
  - type: text
    content: eny, nosimbako ny voany teny amboniny
  - type: text
    content: sy ny fotony tao ambaniny.
