    - type: text
      text: ' izay fanaon’ny razany;'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: handefasako afo ao Joda
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka handevona ireo lapan’i Jerosalema izany.
  - type: usfm
