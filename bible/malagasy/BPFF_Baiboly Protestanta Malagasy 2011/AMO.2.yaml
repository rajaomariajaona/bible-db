  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria nataony tsinontsinona ny lalànan’NY TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy notandremany ny didiny
  - type: usfm
    marker: q1
    children:
