document_id: AMO.2,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s3
    children:
    - type: text
      text: Ny Moabita
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Izao no lazain’NY TOMPO:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Noho ny fahotana telon’i Moaba,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, efatra aza, dia tsy hotsoahako ny fitsarana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria nodorany ho sokay ny taolan’ny mpanjakan’i Edoma;
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nefa Izaho no nitondra anareo niakatra avy tany amin’ny tany Ejipta
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady nitari-dalana anareo efapolo taona tany an-tany efitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba handovanareo ny tanin’ny Amorita.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nanangana mpaminany tamin’ny zanakalahinareo Aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary Nazirita tamin’ny zatovonareo.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy izany va no izy, ry Zanak’Israely?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy NY TOMPO.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Kanjo nampisotroinareo divay ny Nazirita
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ary ny mpaminany noraranareo hoe: Aza maminany!'
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro, Izaho no hitambesatra aminareo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toy ny fitambesatry ny sarety feno amboara.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa tsy ho afa-mandositra ny haingam-pandeha
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy ho afaka hampiseho ny heriny ny mahery;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy hahavonjy ny ainy ny mpiady mahery;
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy hahajoro izay mitana tsipìka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy hahavonjy tena ny haingam-pandeha;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy hahavonjy ny ainy izay mitaingin-tsoavaly
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary na dia izay mahery fo indrindra eo amin’ireo mpiady mahery aza
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia handositra tsy mitam-piadiana intsony amin’izany andro izany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy NY TOMPO.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: handefasako afo ao Moaba
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka handevona ireo lapan’i Kiriota izany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho faty ao anatin’ny tabataba i Moaba,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: amin’ny horakoraka sy ny fanenon’ny anjomara;
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hofoanako tsy hisy mpitsara ao aminy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hataoko indray mamono izy sy ireo mpanapaka rehetra ao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy NY TOMPO.
  - type: usfm
    marker: s3
    children:
