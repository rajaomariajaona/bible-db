document_id: EZK.11,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Hotsaraina i Jerosalema noho ny fahotany
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nisy fanahy nanainga ahy koa, dia nitondra ahy ho eo amin’ny vavahady atsinanana amin’ny tranon’NY TOMPO, dia ilay manatrika ny atsinanana; ary indreo, nisy olona dimy amby roapolo lahy teo anoloan’ny vavahady; dia hitako teo amin’ireo i Jazania zanak’i Azora sy i Pelatia zanak’i Benaia, lehiben’ny vahoaka. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ho lavon’ny sabatra ianareo; any amin’ny sisintanin’ny Israely no hitsarako anareo ka ho fantatrareo fa Izaho no TOMPO. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ity tanàna ity dia tsy ho vilaninareo, ary ianareo dia tsy ho hena ato anatiny; fa any amin’ny sisintanin’ny Israely no hitsarako anareo. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia ho fantatrareo fa Izaho no TOMPO satria tsy nandeha araka ny lalànako ianareo na nanaraka ny fitsipiko, fa araka ny fitsipiky ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jentilisa
    - type: text
      text: ' izay manodidina anareo ihany no nataonareo.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary raha mbola naminany aho dia maty i Pelatia zanak’i Benaia. Dia niankohoka aho ka nitaraina tamin’ny feo mahery hoe: Indrisy! Ry TOMPO Andriamanitra ô! Holevoninao va ny hany sisa amin’ny Israely?'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Hangonin’Andriamanitra indray ny olony niely patrana
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary tonga tamiko ny tenin’NY TOMPO hoe:'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ry '
    - type: usfm
      marker: w
      children:
      - type: text
        text: zanak’olona
    - type: text
      text: ', ny rahalahinao, eny, ny rahalahinao iray firazanana aminao, dia ny taranak’Israely rehetra, no nitenenan’ny mponina any Jerosalema hoe: Manalavira NY TOMPO; izahay no nomena ity tany ity ho lova. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa lazao hoe: Izao no lazain’NY TOMPO Andriamanitra: Na dia nampandehaniko lavitra any amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jentilisa
    - type: text
      text: ' aza izy ka naeliko tany amin’ny tany maro dia ho fitoerana masina ho azy vetivety ho azy Aho any amin’ny tany izay alehany. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa lazao hoe: Izao no lazain’NY TOMPO Andriamanitra: Hovoriko avy any amin’ny firenena ianareo ary hangoniko avy any amin’ny tany izay nampielezana anareo ka homeko ny tanin’ny Israely. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ho tonga ao izy ka hanaisotra ny zava-maharikorikony rehetra sy ny fahavetavetany rehetra. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia homeko fo iray izy ary hasiako fanahy vaovao ao anatinareo; ary hesoriko amin’ny nofony ny fo vato ka homeko fo nofo izy '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy Izy tamiko: Ry '
    - type: usfm
      marker: w
      children:
      - type: text
        text: zanak’olona
    - type: text
      text: ', ireo no lehilahy izay misaina hanao ratsy sady manome torohevitra ratsy ato amin’ity tanàna ity, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'mba handehanany araka ny didiko sy hitandremany ny fitsipiko ka hanarahany izany; ary ho oloko izy, ary Izaho ho Andriamaniny. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa ny amin’izay manana fo manina ny zava-maharikorikony sy ny fahavetavetany, dia hatsingeriko ho eo an-dohany ihany ny lalany, hoy NY TOMPO Andriamanitra.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Miala tao Jerosalema ny voninahitr’Andriamanitra
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nasandratry ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: kerobima
    - type: text
      text: ' ny elany sy ny kodiarana teo anilany; ary ny voninahitry ny Andriamanitry ny Israely dia teo aminy, teo amboniny. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny voninahitry NY TOMPO dia niakatra niala tao amin’ny tanàna ka nijanona teo an-tampon’ny tendrombohitra atsinanan’ny tanàna. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nisy fanahy nanainga ahy ka nitondra ahy ho any Kaldea, tamin’ny fahitana, ho any amin’ny babo, dia tamin’ny Fanahin’Andriamanitra. Dia niakatra niala tamiko ny fahitana izay efa hitako. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary nolazaiko tamin’ny babo ny teny rehetra izay nasehon’NY TOMPO ahy.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia izay milaza hoe: Mbola tsy izao no fotoana hanorenana trano; ity tanàna ity no vilany, ary isika no hena! '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Koa maminania hamely azy, eny, maminania, ry zanak’olona!
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia tonga tamiko ny Fanahin’NY TOMPO ka hoy Izy tamiko:'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lazao hoe: Izao no lazain’NY TOMPO: Izany no fiteninareo, ry taranak’Israely! Fantatro izay rehetra ao an-tsainareo. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ianareo dia nahamaro ny voavononareo tato amin’ity tanàna ity ary ny arabeny dia nofenoinareo faty. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa izao no lazain’NY TOMPO Andriamanitra: Ny voavononareo, izay nataonareo tao aminy, no hena, ary ity tanàna ity no vilany; fa ianareo kosa dia havoaka tao. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Matahotra ny sabatra ianareo nefa hataoko mahatratra anareo ihany ny sabatra, hoy NY TOMPO Andriamanitra. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Havoakako avy ato aminy ianareo ka hatolotro ho eny an-tanan’ny hafa firenena, ary hanao fitsarana aminareo Aho. '
