document_id: PSA.36,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Eo aminao no misy ny loharanon’aina
  - type: text
    content: Ho an’ny mpiventy hira. Nataon’i Davida, mpanompon’NY TOMPO.
  - type: text
    content: Misy fitenin’ny ratsy fanahy tonga ato an-tsaiko;
  - type: text
    content: araka ny heviny dia tsy misy tokony hatahorana an’Andriamanitra.
  '10':
  - type: text
    content: Ampahareto amin’izay mahalala Anao ny famindramponao
  - type: text
    content: ary amin’ny mahitsy fo ny fahamarinanao.
  '11':
  - type: text
    content: Aoka tsy hanitsaka ahy ny tongotry ny mpiavonavona,
  - type: text
    content: na hampandositra ahy ny tanan’ny ratsy fanahy.
  '12':
  - type: text
    content: Amin’izany no mahalavo ny mpanao ratsy;
  - type: text
    content: mianjera izy ka tsy tafarina.
  '2':
  - type: text
    content: Fa miarahaba tena kosa izy
  - type: text
    content: ka tsy mahafantatra ny helony sady tsy mankahala izany.
  '3':
  - type: text
    content: Ny tenin’ny vavany dia faharatsiam-panahy sy fitaka;
  - type: text
    content: tsy ao an-tsainy intsony ny hanao ny tsara.
  '4':
  - type: text
    content: Asa ratsy no saintsaininy eo am-pandrianany;
  - type: text
    content: mitsangana eo amin’ny lalana tsy mety izy;
  - type: text
    content: tsy mba laviny akory ny ratsy.
  '5':
  - type: text
    content: TOMPO ô, mipaka amin’ny lanitra ny famindramponao,
  - type: text
    content: miantefa amin’ny rahona ny fahamarinanao.
  '6':
  - type: text
    content: Ny fahamarinanao dia tahaka ny tendrombohitra avo dia avo,
  - type: text
    content: 'ny fitsaranao dia toy ny '
  - type: text
    content: lalina lehibe
  - type: text
    content: .
  - type: text
    content: Ny olona sy ny biby dia samy vonjenao, TOMPO ô!
  '7':
  - type: text
    content: Endre ny hatsaran’ny famindramponao, Andriamanitra ô!
  - type: text
    content: Mialoka eo ambany elatrao ny zanak’olombelona.
  '8':
  - type: text
    content: Voky ny matavy ao amin’ny tranonao izy;
  - type: text
    content: ny zava-tsoanao mikoriana no ampisotroinao azy.
  '9':
  - type: text
    content: Fa ao Aminao no misy loharanon’aina;
  - type: text
    content: ny fahazavanao no hahitanay fahazavana.
