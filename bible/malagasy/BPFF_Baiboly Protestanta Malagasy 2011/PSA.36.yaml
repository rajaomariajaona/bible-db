document_id: PSA.36
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Eo aminao no misy ny loharanon’aina
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: Ho an’ny mpiventy hira. Nataon’i Davida, mpanompon’NY TOMPO.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Misy fitenin’ny ratsy fanahy tonga ato an-tsaiko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: araka ny heviny dia tsy misy tokony hatahorana an’Andriamanitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Fa miarahaba tena kosa izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy mahafantatra ny helony sady tsy mankahala izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ny tenin’ny vavany dia faharatsiam-panahy sy fitaka;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy ao an-tsainy intsony ny hanao ny tsara.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Asa ratsy no saintsaininy eo am-pandrianany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mitsangana eo amin’ny lalana tsy mety izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy mba laviny akory ny ratsy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: TOMPO ô, mipaka amin’ny lanitra ny famindramponao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: miantefa amin’ny rahona ny fahamarinanao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ny fahamarinanao dia tahaka ny tendrombohitra avo dia avo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ny fitsaranao dia toy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: lalina lehibe
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny olona sy ny biby dia samy vonjenao, TOMPO ô!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Endre ny hatsaran’ny famindramponao, Andriamanitra ô!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mialoka eo ambany elatrao ny zanak’olombelona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Voky ny matavy ao amin’ny tranonao izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny zava-tsoanao mikoriana no ampisotroinao azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Fa ao Aminao no misy loharanon’aina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny fahazavanao no hahitanay fahazavana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ampahareto amin’izay mahalala Anao ny famindramponao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary amin’ny mahitsy fo ny fahamarinanao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Aoka tsy hanitsaka ahy ny tongotry ny mpiavonavona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: na hampandositra ahy ny tanan’ny ratsy fanahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Amin’izany no mahalavo ny mpanao ratsy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mianjera izy ka tsy tafarina.
