document_id: 1SA.17,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mihantsy ady amin’ny tafiky ny Israely i Goliata filistina
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary namory ny miaramilany hiady ny Filistina ka tafavory tao Soko any Joda izy ireo ary nitoby teo anelanelan’i Soko sy i Azeka, dia tao Efesa-Damima. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy koa ilay Filistina: Mihantsy ny miaramilan’ny Israely aho izao anio izao! Omeo lehilahy iray aho hiady amiko. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nony ren’i Saoly sy ny Israely rehetra izany tenin’ilay Filistina izany dia kivy izy ireo sady raiki-tahotra tokoa.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Irahin’ny rainy ho any amin’ny tobin’ny Israely i Davida
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I Davida dia zanak’ilay Efratita avy any Betlehema-Joda antsoina hoe Jese, izay nanana zanaka valo mirahalahy; ary efa antitra i Jese tamin’ny andron’i Saoly. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lasa nanaraka an’i Saoly nankany an-tafika ny zokiny telo lahy tamin’ny zanak’i Jese. Ny anaran’izy telo lahy zanany izay lasa nankany an-tafika dia Eliaba, lahimatoa, sy Abinadaba, lahiaivo, ary Sama izay fahatelony; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'i Davida kosa no faralahy. Lasa nanaraka an’i Saoly izy telo lahy zokiny '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: fa i Davida kosa dia nivezivezy tany amin’i Saoly sady niverina mba hiandry ny ondrin’ny rainy tany Betlehema.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nanatona marain-tsy hariva ilay Filistina ka niseho nandritra ny efapolo andro. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy i Jese tamin’i Davida zanany: Ento ity lango eran’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: efaha
    - type: text
      text: ' ity sy ireto mofo folo ireto ho an’ny rahalahinao; atero haingana ho any an-toby, any amin’ny rahalahinao. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ento ho an’ny mpifehy arivony ireto fromazy didiny folo ireto, dia jereo na finaritra ny rahalahinao, na manao ahoana, ary itondray antoka amin’izany aho. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I Saoly sy izy telo lahy mbamin’ny lehilahy rehetra amin’ny Israely moa dia teo amin’ny lohasaha Elaha, niady tamin’ny Filistina.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia tafavory koa i Saoly sy ny lehilahin’ny Israely ka nitoby teo amin’ny lohasaha Elaha ary nilahatra hiady amin’ny Filistina. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nifoha vao maraina i Davida ka namela ny ondriny hotandreman’olona, ary naka ny entany izy ka lasa nandeha araka ny nandidian’i Jese azy; dia tonga teo amin’ny toerana fitobian-tsarety izy; tamin’izay ny antokon’ny miaramila izay efa hivoaka hilahatra dia nanakora hiady. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa efa nilahatra hiady ny Israely sy ny Filistina ka nifanatrika ny miaramila. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary namela ny entany teo an-tanan’izay niambina entana i Davida dia nihazakazaka nankeny amin’ny laharan’ny miaramila ary tonga ka nanontany ny amin’izay momba ny rahalahiny. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha mbola niresaka taminy izy dia indro, tamy niakatra avy teo amin’ny laharan’ny miaramilan’ny Filistina ilay mpihantsy ady, Goliata no anarany; lehilahy filistina avy any Gata izy. Niteny tahaka ny teo aloha ihany izy ka ren’i Davida. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nandositra io lehilahy io ny lehilahy rehetra teo amin’ny Israely rehefa nahita azy, satria natahotra loatra. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy ny lehilahin’ny Israely: Efa hitanareo va io lehilahy miakatra io? Hihantsy ny Israely no iakarany; koa izay lehilahy mahafaty io dia hataon’ny mpanjaka ho manankarena be tokoa, ary homeny azy ho vadiny koa ny zanany vavy sady tsy hampandoavin-ketra amin’ny Israely ny taranaky ny rainy.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Manolo-tena hiady amin’i Goliata i Davida
    marker-yv: yv-h
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy i Davida tamin’ny olona teo anilany: Ahoana sy ahoana ange no hatao amin’izay lehilahy mahafaty io Filistina io ka mahafa-tondro-maso ny Israely? Fa zinona moa io Filistina tsy mifora io no mba hihantsy ny miaramilan’Andriamanitra velona? '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nolazain’ny olona taminy fa araka izay voalaza no hatao amin’izay lehilahy mahafaty azy. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nandre azy niresaka tamin’ny olona i Eliaba zokiny dia nirehitra tamin’i Davida ny fahatezerany ka hoy izy: Nahoana ianao no midina etỳ? Ary amin’iza moa no namelanao ireny ondry vitsy ireny any an-tany efitra? Fantatro ny avonavonao sy ny faharatsian’ny fonao, fa hizaha ny ady no idinanao etỳ. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy i Davida: Fa inona moa izao no nataoko afa-tsy ny niresaka? '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Teo ampita teo amin’ny tendrombohitra iray ny Filistina, ary ny Israely kosa dia teo ampita teo amin’ny tendrombohitra iray, koa ny lohasaha no nanelanelana azy.
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia niala teo aminy hankany amin’ny sasany koa izy ka niteny tahaka ny teo; ary namaly azy tahaka ny teo aloha ihany ny olona.
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nony ren’ny olona ny teny izay nataon’i Davida dia nambarany tamin’i Saoly ka nampiantso azy izy. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy i Davida tamin’i Saoly: Aoka tsy ho ketraka amin’Ilehio ny fon’ny olona; fa ny mpanomponao dia handeha hiady amin’io Filistina io. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy i Saoly tamin’i Davida: Tsy tohanao ny handeha hiady amin’io Filistina io, satria mbola tanora loatra ianao, nefa izy dia mpiady hatramin’ny fahazazany. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy i Davida tamin’i Saoly: Ny mpanomponao dia niandry ny ondrin’ny rainy ary nisy liona sy bera tonga tao ka naka zanak’ondry teo amin’ny andian’ondry; '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia nanenjika azy aho ka namely azy ary azoko teny am-bavany ilay zanak’ondry; nony handramatra ahy izy dia nohazoniko tamin’ny somony ary nasiako ka matiko. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny liona sy ny bera dia samy novonoin’ny mpanomponao; ary io Filistina tsy mifora io dia ho tahaka ny iray amin’ireny, satria nihantsy ny miaramilan’Andriamanitra velona izy. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy koa i Davida: NY TOMPO izay namonjy ahy tamin’ny tanan’ny liona sy ny bera, Izy no hamonjy ahy amin’ny tanan’io Filistina io. Dia hoy i Saoly tamin’i Davida: Mandehana ary, homba anao anie NY TOMPO.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Matin’i Davida i Goliata
    marker-yv: yv-h
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nampiakanjo an’i Davida ny akanjo fiadiany i Saoly ka nanisy fiarovan-doha varahina tamin’ny lohany sy nampiakanjo azy akanjo fiarovan-tratra. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Namehy ny sabany tamin’ny akanjo fiadiany i Davida dia nanandrana nandeha; nefa tsy mbola nahazatra azy izany ka hoy izy tamin’i Saoly: Tsy afa-mandeha amin’ireto aho fa tsy mbola nahazatra ahy; dia nesorin’i Davida ireo. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nisy lehilahy iray mpihantsy ady nivoaka avy teny amin’ny tobin’ny Filistina, Goliata no anarany; avy any Gata izy. Enina '
    - type: usfm
      marker: w
      children:
      - type: text
        text: hakiho
    - type: text
      text: ' sy irain-jehy ny halavany. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nandray an-tanana ny tehiny izy sady nifidy vatokilonjy dimy tao amin’ny lohasahan-driaka ka nataony tao anatin’ny kitapo fitondran’ny mpiandry ondry izay teny aminy, ary teny an-tanany koa ny antsamotadiny; dia nanatona ilay Filistina izy.
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nandroso nanatona an’i Davida ilay Filistina sady teo alohany ilay lehilahy mitondra ny ampinga lehibe. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nony nijerijery an’i Davida ilay Filistina ka nahita azy dia nianjonanjona taminy, satria tanora izy, sady mena volo no tsara tarehy. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy ilay Filistina tamin’i Davida: Alika angaha aho no hatonin’Ialahy amin’ny tehina? Ary nanozona an’i Davida tamin’ireo andriamaniny ilay Filistina. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy koa ilay Filistina tamin’i Davida: Manatòna ahy fa homeko ny voromanidina sy ny bibidia ny nofon’Ialahy. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy kosa i Davida tamin’ilay Filistina: Ianao dia manatona ahy amin’ny sabatra sy ny lefona ary ny lefom-pohy; fa izaho kosa dia manatona anao amin’ny anaran’Andriamanitra, Tompon’izao rehetra izao, Andriamanitry ny miaramilan’ny Israely, izay efa nohantsianao. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Anio no hanoloran’NY TOMPO anao ho eo an-tanako, ary hamely anao aho ka hanapaka ny lohanao, dia homeko ny voromanidina sy ny bibidia ny fatin’ny miaramilan’ny Filistina anio, mba ho fantatry ny tany rehetra ny fisian’ny Andriamanitry ny Israely. '
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ho fantatr’izao fiangonana rehetra izao fa tsy amin’ny sabatra na amin’ny lefona no amonjen’NY TOMPO; fa an’NY TOMPO ny ady ka hanolotra anareo ho eo an-tananay Izy.
  '48':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nony niainga ilay Filistina ka nanatona hitsena an’i Davida dia nandroso haingana i Davida ka nihazakazaka ho eo amin’ny laharan’ny miaramila mba hitsena ilay Filistina. '
  '49':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia natsofok’i Davida tao anaty kitapo ny tanany ka naka vato tao izy; nalefany tamin’ny antsamotady izany ka nahavoa ilay Filistina teo amin’ny handriny; nilentika tamin’ny handriny ny vato, ary potraka niankohoka tamin’ny tany izy. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nisatroka fiarovan-doha varahina izy ary niakanjo varahina tahaka ny kiran-trondro ka ny lanjan’ny akanjony varahina dia dimy arivo sekela. '
  '50':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Toy izany no nandresen’i Davida ilay Filistina tamin’ny vaton’antsamotady; namely ilay Filistina izy ka nahafaty azy, nefa tsy nisy sabatra teny an-tanan’i Davida. '
  '51':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nihazakazaka i Davida ka nitsangana teo anilan’ilay Filistina, ary nalainy ny sabatr’Ilehio ka notsoahany tamin’ny tranony dia namonoany azy sy nanapahany ny lohany.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nony hitan’ny Filistina fa maty ilay lehilahy maheriny dia vaky nandositra izy ireo. '
  '52':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nitsangana ny lehilahin’ny Israely sy ny Joda ka nanakora sy nanenjika ny Filistina hatrany akaikin’i Gata sy ny vavahadin’i Ekrona; ary ireo izay lavo tamin’ny Filistina dia niampatrampatra teny amin’ny lalana mankany Saraima, hatrany Gata ka hatrany Ekrona. '
  '53':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa niverina avy nanenjika ny Filistina ny Zanak’Israely dia nambabo ny tobiny koa. '
  '54':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia noraisin’i Davida ny lohan’ilay Filistina ka noentiny tany Jerosalema; fa ny fiadiany kosa dia napetrany tao an-dainy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Nanao fifanekem-pihavanana i Davida sy i Jonatana
    marker-yv: yv-h
  '55':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nony nahita an’i Davida nandeha hiady tamin’ny Filistina i Saoly dia hoy izy tamin’i Abnera, komandin’ny miaramila: Ry Abnera, zanak’iza moa iny zatovo iny? Ary hoy i Abnera: Raha velona koa ny ainao, ry mpanjaka, tsy fantatro velively. '
  '56':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy ny mpanjaka: Anontanionao hoe zanak’iza marina iny zatovo iny. '
  '57':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nony niverina avy namono ilay Filistina i Davida dia nalain’i Abnera izy ka noentiny teo anatrehan’i Saoly, ary mbola teny an-tanany ihany ny lohan’ilay Filistina. '
  '58':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy i Saoly taminy: Zanak’iza moa ianao, ry zatovo? Hoy i Davida: Zanak’i Jese, betlehemita mpanomponao aho.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nanao fiarovan-dranjo varahina tamin’ny tongony koa izy ary nilanja lefom-pohy varahina. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tahaka ny voditenon’ny mpanenona ny haben’ny zaran-defony; ary ny lela lefony dia vy milanja eninjato sekela; nisy nitondra ny ampinga lehibe nandeha teo alohany. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nijanona izy ka niantso ny miaramilan’ny Israely ary niteny taminy hoe: Nahoana ianareo no mivoaka hilahatra hiady? Tsy Filistina va aho ary ianareo kosa dia mpanompon’i Saoly? Mifidiana lehilahy iray ianareo hidina etỳ hiady amiko. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha maharesy ahy izy ka mahavoa ahy dia ho mpanomponareo izahay; fa raha resiko kosa izy ka voako dia ho mpanomponay ianareo ka hanompo anay. '
