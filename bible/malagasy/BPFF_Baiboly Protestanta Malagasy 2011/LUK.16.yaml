document_id: LUK.16,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Fanoharana ny amin’ilay mpitantana fetsy
  - type: text
    content: 'Hoy koa Jesosy tamin’ny mpianatra: Nisy olona mpanankarena iray nanana mpitantana ny fananany; izy io dia nampangain’olona taminy ho mandany ny fananany. '
  '10':
  - type: text
    content: 'Izay mahatoky amin’ny kely indrindra dia mahatoky koa amin’ny be; ary izay tsy marina amin’ny kely indrindra dia tsy marina koa amin’ny be. '
  '11':
  - type: text
    content: 'Koa raha tsy mahatoky amin’ny mamôna tsy marina ianareo, iza no hatoky anareo ny amin’ny tena harena? '
  '12':
  - type: text
    content: Ary raha tsy mahatoky amin’izay an’olona ianareo, iza no hanome anareo izay anareo?
  '13':
  - type: text
    content: Tsy misy mpanompo mahay manompo tompo roa; fa ny iray dia ho halany ary ny iray dia ho tiany; na ny iray dia hombany ary ny iray dia hohamavoiny. Tsy mahay manompo an’Andriamanitra sy mamôna ianareo.
  '14':
  - type: text
    content: 'Ary ireo '
  - type: text
    content: Fariseo
  - type: text
    content: ' izay fatra-pitia vola, raha nandre izany rehetra izany, dia naneso an’i Jesosy. '
  '15':
  - type: text
    content: 'Dia hoy Jesosy taminy: Mpanamarin-tena eo anatrehan’ny olona ianareo, nefa Andriamanitra mahafantatra ny fonareo; fa izay zavatra heverin’ny olona ho ambony dia fahavetavetana eo anatrehan’Andriamanitra.'
  '16':
  - type: text
    content: 'Ny Lalàna sy ny Mpaminany dia hatramin’i Jaona; hatramin’izany no efa nitoriana ny Filazantsaran’ny fanjakan’Andriamanitra, ary miditra an-keriny izay rehetra miditra ao. '
  '17':
  - type: text
    content: Fa ho moramora kokoa ny hahafoanan’ny lanitra sy ny tany noho ny hahafoanan’ny tendron-tsoratra iray monja aza amin’ny Lalàna.
  '18':
  - type: text
    content: Izay rehetra misao-bady ka mampakatra hafa dia mijangajanga; ary izay mampakatra vehivavy voasaotra dia mijangajanga koa.
  - type: heading
    content: Fanoharana ny amin’i Lazarosy sy ilay mpanankarena
  '19':
  - type: text
    content: 'Nisy lehilahy mpanankarena iray niakanjo volomparasy sy lamba rongony fotsy manify sady nanaram-po fatratra isanandro tamin’ny fahafinaretana. '
  '2':
  - type: text
    content: 'Dia nampiantso azy izy ka niteny taminy hoe: Inona izao reko momba anao izao? Manaova tatitra ny amin’ny fitantananao ny fananako; fa tsy mahazo mitantana ny fananako intsony ianao. '
  '20':
  - type: text
    content: 'Ary nisy mahantra ferena iray antsoina hoe Lazarosy napetraka teo anilan’ny vavahadiny; '
  '21':
  - type: text
    content: 'izy dia naniry mba hihinana izay latsaka avy tamin’ny latabatr’ilay mpanankarena, nefa ny amboa kosa no avy ka nilelaka ny feriny. '
  '22':
  - type: text
    content: 'Ary maty ilay mahantra, dia noentin’ny anjely ho any an-tratran’i Abrahama; ary maty koa ilay mpanankarena, dia nalevina; '
  '23':
  - type: text
    content: 'ary raha nijaly tao amin’ny '
  - type: text
    content: fitoeran’ny maty
  - type: text
    content: ' izy ka niandrandra dia nahita an’i Abrahama teny lavitra eny sy i Lazarosy teo an-tratrany. '
  '24':
  - type: text
    content: 'Dia niantso izy hoe: Ry Abrahama raiko ô, mamindrà fo amiko! Mba iraho i Lazarosy hanatsoboka ny tendron’ny rantsantanany amin’ny rano mba hampangatsiatsiaka ny lelako; fa fadiranovana aho eto anatin’ity lelafo ity. '
  '25':
  - type: text
    content: 'Fa hoy i Abrahama: Anaka, tsarovy fa efa nahazo ny zava-tsoanao ianao tamin’ny andro niainanao, ary i Lazarosy kosa dia ny zava-dratsy; fa ankehitriny dia izy no ampiononina atỳ ary ianao kosa no fadiranovana. '
  '26':
  - type: text
    content: 'Ary amin’izany rehetra izany, misy tevana lehibe manelanelana antsika mba tsy ho afa-mita hankeny aminareo izay te hiala etỳ ary tsy ho afa-mita hankety aminay izay eny. '
  '27':
  - type: text
    content: 'Dia hoy izy: Mangataka aminao ary aho, ry raiko: Mba iraho i Lazarosy hankany amin’ny tranon’ny raiko, '
  '28':
  - type: text
    content: 'fa manana rahalahy dimy aho, ka hilaza tsara amin’izy ireo mba tsy ho tonga atỳ amin’ity fijaliana ity koa izy. '
  '29':
  - type: text
    content: 'Fa hoy i Abrahama taminy: Manana an’i Mosesy sy ny mpaminany izy; aoka hihaino azy ireo izy! '
  '3':
  - type: text
    content: 'Niteny anakampo ilay mpitantana ny fananana hoe: Inona re no hataoko, fa esorin’ny tompoko amin’ny fitantanana ny fananany aho? Ny miasa tany dia tsy tratry ny aiko, ny mangataka dia mahamenatra ahy. '
  '30':
  - type: text
    content: 'Fa hoy kosa izy: Tsia, ry Abrahama, raiko; fa raha misy avy amin’ny maty hankany aminy dia hibebaka izy. '
  '31':
  - type: text
    content: 'Fa hoy i Abrahama taminy: Raha tsy mihaino an’i Mosesy sy ny mpaminany izy dia tsy hety hino izy na dia misy mitsangana amin’ny maty aza.'
  '4':
  - type: text
    content: 'Fantatro izay hataoko, mba hisy handray ahy ho ao an-tranony, rehefa esorina amin’ny fitantanana fananana aho. '
  '5':
  - type: text
    content: 'Dia niantso izay rehetra nitrosa tamin’ny tompony izy hankao aminy ka nilaza tamin’ny voalohany hoe: Ohatrinona no trosan’ny tompoko aminao? '
  '6':
  - type: text
    content: 'Ary hoy izy: Diloilo injaton’ny '
  - type: text
    content: bata
  - type: text
    content: '. Dia hoy izy taminy koa: Inty, raiso ny taratasinao, ary mipetraha haingana, ka dimampolo no soraty. '
  '7':
  - type: text
    content: 'Dia hoy izy tamin’ny iray koa: Ohatrinona kosa no trosa aminao? Vary injaton’ny '
  - type: text
    content: kora
  - type: text
    content: ', hoy izy. Dia hoy izy taminy koa: Inty, raiso ny taratasinao, ka valopolo no soraty. '
  '8':
  - type: text
    content: Ary ny tompony dia nidera ilay mpitantana fananana tsy marina satria nampiseho hakingan-tsaina izy; fa ny zanak’izao tontolo izao dia kinga saina kokoa ny amin’ny karazany noho ny zanaky ny mazava.
  - type: heading
    content: Ny vola tsy marina sy ny tena harena
  '9':
  - type: text
    content: 'Ary hoy Aho aminareo: Aoka ny mamôna'
  - type: note
    content: Zahao Mat 6.24.
  - type: text
    content: ' tsy marina no hoentinareo mahazo namana, mba horaisin’ireo ho any amin’ny fonenana mandrakizay ianareo, rehefa lany izany.'
