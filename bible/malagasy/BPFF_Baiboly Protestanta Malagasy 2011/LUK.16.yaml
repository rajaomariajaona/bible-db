document_id: LUK.16
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fanoharana ny amin’ilay mpitantana fetsy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Hoy koa Jesosy tamin’ny mpianatra: Nisy olona mpanankarena iray nanana mpitantana ny fananany; izy io dia nampangain’olona taminy ho mandany ny fananany. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Dia nampiantso azy izy ka niteny taminy hoe: Inona izao reko momba anao izao? Manaova tatitra ny amin’ny fitantananao ny fananako; fa tsy mahazo mitantana ny fananako intsony ianao. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Niteny anakampo ilay mpitantana ny fananana hoe: Inona re no hataoko, fa esorin’ny tompoko amin’ny fitantanana ny fananany aho? Ny miasa tany dia tsy tratry ny aiko, ny mangataka dia mahamenatra ahy. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Fantatro izay hataoko, mba hisy handray ahy ho ao an-tranony, rehefa esorina amin’ny fitantanana fananana aho. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia niantso izay rehetra nitrosa tamin’ny tompony izy hankao aminy ka nilaza tamin’ny voalohany hoe: Ohatrinona no trosan’ny tompoko aminao? '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary hoy izy: Diloilo injaton’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: bata
  - type: text
    text: '. Dia hoy izy taminy koa: Inty, raiso ny taratasinao, ary mipetraha haingana, ka dimampolo no soraty. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dia hoy izy tamin’ny iray koa: Ohatrinona kosa no trosa aminao? Vary injaton’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: kora
  - type: text
    text: ', hoy izy. Dia hoy izy taminy koa: Inty, raiso ny taratasinao, ka valopolo no soraty. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ary ny tompony dia nidera ilay mpitantana fananana tsy marina satria nampiseho hakingan-tsaina izy; fa ny zanak’izao tontolo izao dia kinga saina kokoa ny amin’ny karazany noho ny zanaky ny mazava.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny vola tsy marina sy ny tena harena
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary hoy Aho aminareo: Aoka ny mamôna'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.9 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Zahao '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Mat 6.24.
    marker-yv: yv-n
  - type: text
    text: ' tsy marina no hoentinareo mahazo namana, mba horaisin’ireo ho any amin’ny fonenana mandrakizay ianareo, rehefa lany izany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Izay mahatoky amin’ny kely indrindra dia mahatoky koa amin’ny be; ary izay tsy marina amin’ny kely indrindra dia tsy marina koa amin’ny be. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Koa raha tsy mahatoky amin’ny mamôna tsy marina ianareo, iza no hatoky anareo ny amin’ny tena harena? '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ary raha tsy mahatoky amin’izay an’olona ianareo, iza no hanome anareo izay anareo?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Tsy misy mpanompo mahay manompo tompo roa; fa ny iray dia ho halany ary ny iray dia ho tiany; na ny iray dia hombany ary ny iray dia hohamavoiny. Tsy mahay manompo an’Andriamanitra sy mamôna ianareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary ireo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Fariseo
  - type: text
    text: ' izay fatra-pitia vola, raha nandre izany rehetra izany, dia naneso an’i Jesosy. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Dia hoy Jesosy taminy: Mpanamarin-tena eo anatrehan’ny olona ianareo, nefa Andriamanitra mahafantatra ny fonareo; fa izay zavatra heverin’ny olona ho ambony dia fahavetavetana eo anatrehan’Andriamanitra.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ny Lalàna sy ny Mpaminany dia hatramin’i Jaona; hatramin’izany no efa nitoriana ny Filazantsaran’ny fanjakan’Andriamanitra, ary miditra an-keriny izay rehetra miditra ao. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Fa ho moramora kokoa ny hahafoanan’ny lanitra sy ny tany noho ny hahafoanan’ny tendron-tsoratra iray monja aza amin’ny Lalàna.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Izay rehetra misao-bady ka mampakatra hafa dia mijangajanga; ary izay mampakatra vehivavy voasaotra dia mijangajanga koa.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fanoharana ny amin’i Lazarosy sy ilay mpanankarena
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Nisy lehilahy mpanankarena iray niakanjo volomparasy sy lamba rongony fotsy manify sady nanaram-po fatratra isanandro tamin’ny fahafinaretana. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary nisy mahantra ferena iray antsoina hoe Lazarosy napetraka teo anilan’ny vavahadiny; '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'izy dia naniry mba hihinana izay latsaka avy tamin’ny latabatr’ilay mpanankarena, nefa ny amboa kosa no avy ka nilelaka ny feriny. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary maty ilay mahantra, dia noentin’ny anjely ho any an-tratran’i Abrahama; ary maty koa ilay mpanankarena, dia nalevina; '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'ary raha nijaly tao amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: fitoeran’ny maty
  - type: text
    text: ' izy ka niandrandra dia nahita an’i Abrahama teny lavitra eny sy i Lazarosy teo an-tratrany. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Dia niantso izy hoe: Ry Abrahama raiko ô, mamindrà fo amiko! Mba iraho i Lazarosy hanatsoboka ny tendron’ny rantsantanany amin’ny rano mba hampangatsiatsiaka ny lelako; fa fadiranovana aho eto anatin’ity lelafo ity. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Fa hoy i Abrahama: Anaka, tsarovy fa efa nahazo ny zava-tsoanao ianao tamin’ny andro niainanao, ary i Lazarosy kosa dia ny zava-dratsy; fa ankehitriny dia izy no ampiononina atỳ ary ianao kosa no fadiranovana. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ary amin’izany rehetra izany, misy tevana lehibe manelanelana antsika mba tsy ho afa-mita hankeny aminareo izay te hiala etỳ ary tsy ho afa-mita hankety aminay izay eny. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Dia hoy izy: Mangataka aminao ary aho, ry raiko: Mba iraho i Lazarosy hankany amin’ny tranon’ny raiko, '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'fa manana rahalahy dimy aho, ka hilaza tsara amin’izy ireo mba tsy ho tonga atỳ amin’ity fijaliana ity koa izy. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Fa hoy i Abrahama taminy: Manana an’i Mosesy sy ny mpaminany izy; aoka hihaino azy ireo izy! '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Fa hoy kosa izy: Tsia, ry Abrahama, raiko; fa raha misy avy amin’ny maty hankany aminy dia hibebaka izy. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Fa hoy i Abrahama taminy: Raha tsy mihaino an’i Mosesy sy ny mpaminany izy dia tsy hety hino izy na dia misy mitsangana amin’ny maty aza.'
