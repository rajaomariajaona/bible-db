document_id: DAN.7,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Ny fahitana voalohany hitan’i Daniela: Ireo biby efatra'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Tamin’ny taona voalohany nanjakan’i Belsazara, mpanjakan’i Babilona dia nanonofy i Daniela sady nahita fahitana tao am-pandrianany. Nosoratany ny nofy ka nambarany ny fotopototr’izany.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Ony afo no nivoaka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy nandeha avy teo anatrehany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: arivoarivo no nanompo Azy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary alinalina no nijoro teo anatrehany.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nanomboka ny fitsarana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary novelarina ny boky.
  '11':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Mbola nijery ihany aho noho ny feon’ny teny feno avonavona notenenin’ilay tandroka; raha mbola nijery aho dia novonoina ilay biby ka nolevonina ny tenany ary natao tao amin’ny afo mirehitra. '
  '12':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Ny amin’ireo biby hafa dia nesorina taminy ny fahefany, nefa nohalavaina ihany ny andro hiainany mandra-pahalanin’ny andro sy ny fotoana. '
  '13':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Ary mbola nahita tamin’ny fahitana tamin’ny alina ihany aho fa indro,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nisy toy ny zanak’Olona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avy tamin’ny rahon’ny lanitra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary nankeo amin’Ilay Lahiantitra Izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia nampanatonina Azy.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Nomena fahefana sy voninahitra ary fanjakana Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hanompoan’ny fokom-pirenena sy ny firenena ary ny samihafa fiteny rehetra Azy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fahefany dia fahefana mandrakizay
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy ho tapaka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny fanjakany dia tsy ho rava.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny hevitr’ilay fahitana voalohany
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Izaho Daniela dia nangitakitaka tato anatiko, ary naharaiki-tahotra ahy ny fahitana hitako. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Dia nanakaiky ny iray tamin’izay nitsangana teo aho ka nanontany azy ny fototr’izany rehetra izany. Nambarany tamiko ary ka nampahafantariny ahy ny hevitr’izany. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Ireo biby lehibe efatra ireo dia mpanjaka efatra izay hitsangana avy amin’ny tany. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Nefa ny olo-masin’ny Avo Indrindra no hahazo ny fanjakana ary hanana ny fanjakana mandrakizay doria.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Dia naniry hahalala izay fototra marina ny amin’ny fahefatra aho, dia ilay biby hafa noho izy rehetra sady mahatsiravina indrindra izay nanana nify vy sy hoho varahina sady nihinana sy nihotahota, ary ny sisa tsy laniny dia nohosihosen’ny tongony; '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Hoy i Daniela: Nahita tamin’ny fahitako tamin’ny alina aho, fa indreo ny rivotra efatry ny lanitra nampihetsika ny Ranomasina Lehibe. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'ary ny amin’ny tandroka folo teo an-dohany sy ny iray koa izay nipoitra ka nisy telo potraka teo anoloany, dia ilay tandroka nanana maso sy vava izay niteny zavatra feno avonavona, ary ny fijery azy dia lehibe noho ny namany. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Mbola nijery ihany aho, ary izany tandroka izany dia niady tamin’ny olo-masina ka naharesy azy '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ambara-piavin’Ilay Lahiantitra izay nanome rariny ny olo-masin’ny Avo Indrindra ka tonga koa ny fotoana nandraisan’ny olo-masina ny fanjakana.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Izao no nolazainy: Ilay biby fahefatra'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia fanjakana fahefatra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: etỳ ambonin’ny tany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay ho hafa noho ny fanjakana rehetra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady handrava ny tany rehetra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no hanosihosy sy hanorotoro azy.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Ny tandroka folo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia mpanjaka folo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay hitsangana avy amin’izany fanjakana izany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hisy iray koa hitsangana manaraka azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hafa noho ny voalohany izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary handresy mpanjaka telo.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Hiteny hanohitra ny Avo Indrindra izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady hampahory ny olo-masin’ny Avo Indrindra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hitady hanova ny fotoana sy ny lalàna.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hatolotra eny an-tanany ireo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ambara-pahatapitry ny fetrandro iray sy ny fetrandro roa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny antsasaky ny fetrandro.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Dia hanomboka ny fitsarana ary hesorina ny fahefany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka horavana sy hosimbana hatramin’ny farany izy.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Ary ny fanjakana sy ny fahefana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny fahalehibiazan’ny fanjakana eny ambanin’ny lanitra rehetra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia homena ny olo-masin’ny Avo Indrindra.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fanjakany dia fanjakana mandrakizay,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny manamboninahitra rehetra dia hanompo sy hanoa Azy.
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Mifarana eo ny fitantarana izany zavatra izany. Fa izaho Daniela kosa dia naharaiki-tahotra ahy indrindra ny eritreritro ka nihahatsatra ny tarehiko ary notahiriziko tao am-poko ireo zavatra ireo.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Ary nisy biby efatra lehibe samihafa niakatra avy tamin’ny ranomasina. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ny voalohany dia toy ny liona ary nanana elatry ny voromahery. Raha mbola nijery azy aho dia voahongotra ny elany ary natsangana avy tamin’ny tany izy ka najoro tamin’ny tongony roa toy ny fijoron’ny olona sady natao manana fon’olombelona. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Indro ny faharoa koa dia biby hafa, tahaka ny bera nefa nisandratra tamin’ny ila tenany sady nisy taolan-tehezana telo teo am-bavany anelanelan’ny nifiny; ary toy izao no voalaza taminy: Mitsangàna, mihinàna nofo betsaka. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Nony afaka izany dia nahita aho fa indro, nisy hafa koa, toy ny leoparda nefa nanana ela-borona efatra teo an-damosiny; nanana loha efatra io biby io ary nomena fanjakana izy. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Nony afaka izany dia nahita tamin’ny fahitana tamin’ny alina aho, dia biby fahefatra mahatsiravina sady matanjaka sy tena mahery; nanana nify vy lehibe izy; nihinana sy nihotahota izy ary ny sisa tsy laniny dia nohosihosen’ny tongony; ary hafa noho ny biby rehetra teo alohany izy sady nanana tandroka folo. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Nodinihiko ny tandroka ka indro, nisy tandroka iray kely koa nipoitra teo aminy, ary nongotana teo anoloan’io ny tandroka telo tamin’ireo taloha; ary indro, nanana maso toy ny mason’olona sy vava miteny zavatra feno avonavona izy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ilay lahiantitra sy ilay «tahaka ny zanak’Olona»
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Raha mbola nijery aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia nisy sezafiandrianana maro napetraka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary nisy Lahiantitra iray nipetraka teo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny fitafiany dia fotsy toy ny orampanala
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny volon-dohany dia toy ny volon’ondry madio.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny sezafiandrianany dia lelafo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny kodiarany dia afo mirehitra.
