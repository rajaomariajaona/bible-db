document_id: DAN.7,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: 'Ny fahitana voalohany hitan’i Daniela: Ireo biby efatra'
  - type: text
    content: Tamin’ny taona voalohany nanjakan’i Belsazara, mpanjakan’i Babilona dia nanonofy i Daniela sady nahita fahitana tao am-pandrianany. Nosoratany ny nofy ka nambarany ny fotopototr’izany.
  '10':
  - type: text
    content: Ony afo no nivoaka
  - type: text
    content: sy nandeha avy teo anatrehany;
  - type: text
    content: arivoarivo no nanompo Azy,
  - type: text
    content: ary alinalina no nijoro teo anatrehany.
  - type: text
    content: Nanomboka ny fitsarana
  - type: text
    content: ary novelarina ny boky.
  '11':
  - type: text
    content: 'Mbola nijery ihany aho noho ny feon’ny teny feno avonavona notenenin’ilay tandroka; raha mbola nijery aho dia novonoina ilay biby ka nolevonina ny tenany ary natao tao amin’ny afo mirehitra. '
  '12':
  - type: text
    content: 'Ny amin’ireo biby hafa dia nesorina taminy ny fahefany, nefa nohalavaina ihany ny andro hiainany mandra-pahalanin’ny andro sy ny fotoana. '
  '13':
  - type: text
    content: Ary mbola nahita tamin’ny fahitana tamin’ny alina ihany aho fa indro,
  - type: text
    content: nisy toy ny zanak’Olona
  - type: text
    content: avy tamin’ny rahon’ny lanitra,
  - type: text
    content: ary nankeo amin’Ilay Lahiantitra Izy,
  - type: text
    content: dia nampanatonina Azy.
  '14':
  - type: text
    content: Nomena fahefana sy voninahitra ary fanjakana Izy
  - type: text
    content: mba hanompoan’ny fokom-pirenena sy ny firenena ary ny samihafa fiteny rehetra Azy.
  - type: text
    content: Ny fahefany dia fahefana mandrakizay
  - type: text
    content: ka tsy ho tapaka,
  - type: text
    content: ary ny fanjakany dia tsy ho rava.
  - type: heading
    content: Ny hevitr’ilay fahitana voalohany
  '15':
  - type: text
    content: 'Izaho Daniela dia nangitakitaka tato anatiko, ary naharaiki-tahotra ahy ny fahitana hitako. '
  '16':
  - type: text
    content: 'Dia nanakaiky ny iray tamin’izay nitsangana teo aho ka nanontany azy ny fototr’izany rehetra izany. Nambarany tamiko ary ka nampahafantariny ahy ny hevitr’izany. '
  '17':
  - type: text
    content: 'Ireo biby lehibe efatra ireo dia mpanjaka efatra izay hitsangana avy amin’ny tany. '
  '18':
  - type: text
    content: Nefa ny olo-masin’ny Avo Indrindra no hahazo ny fanjakana ary hanana ny fanjakana mandrakizay doria.
  '19':
  - type: text
    content: 'Dia naniry hahalala izay fototra marina ny amin’ny fahefatra aho, dia ilay biby hafa noho izy rehetra sady mahatsiravina indrindra izay nanana nify vy sy hoho varahina sady nihinana sy nihotahota, ary ny sisa tsy laniny dia nohosihosen’ny tongony; '
  '2':
  - type: text
    content: 'Hoy i Daniela: Nahita tamin’ny fahitako tamin’ny alina aho, fa indreo ny rivotra efatry ny lanitra nampihetsika ny Ranomasina Lehibe. '
  '20':
  - type: text
    content: 'ary ny amin’ny tandroka folo teo an-dohany sy ny iray koa izay nipoitra ka nisy telo potraka teo anoloany, dia ilay tandroka nanana maso sy vava izay niteny zavatra feno avonavona, ary ny fijery azy dia lehibe noho ny namany. '
  '21':
  - type: text
    content: 'Mbola nijery ihany aho, ary izany tandroka izany dia niady tamin’ny olo-masina ka naharesy azy '
  '22':
  - type: text
    content: ambara-piavin’Ilay Lahiantitra izay nanome rariny ny olo-masin’ny Avo Indrindra ka tonga koa ny fotoana nandraisan’ny olo-masina ny fanjakana.
  '23':
  - type: text
    content: 'Izao no nolazainy: Ilay biby fahefatra'
  - type: text
    content: dia fanjakana fahefatra
  - type: text
    content: etỳ ambonin’ny tany
  - type: text
    content: izay ho hafa noho ny fanjakana rehetra,
  - type: text
    content: sady handrava ny tany rehetra
  - type: text
    content: no hanosihosy sy hanorotoro azy.
  '24':
  - type: text
    content: Ny tandroka folo
  - type: text
    content: dia mpanjaka folo
  - type: text
    content: izay hitsangana avy amin’izany fanjakana izany;
  - type: text
    content: ary hisy iray koa hitsangana manaraka azy;
  - type: text
    content: hafa noho ny voalohany izy
  - type: text
    content: ary handresy mpanjaka telo.
  '25':
  - type: text
    content: Hiteny hanohitra ny Avo Indrindra izy
  - type: text
    content: sady hampahory ny olo-masin’ny Avo Indrindra
  - type: text
    content: ary hitady hanova ny fotoana sy ny lalàna.
  - type: text
    content: Hatolotra eny an-tanany ireo,
  - type: text
    content: ambara-pahatapitry ny fetrandro iray sy ny fetrandro roa
  - type: text
    content: ary ny antsasaky ny fetrandro.
  '26':
  - type: text
    content: Dia hanomboka ny fitsarana ary hesorina ny fahefany
  - type: text
    content: ka horavana sy hosimbana hatramin’ny farany izy.
  '27':
  - type: text
    content: Ary ny fanjakana sy ny fahefana
  - type: text
    content: ary ny fahalehibiazan’ny fanjakana eny ambanin’ny lanitra rehetra
  - type: text
    content: dia homena ny olo-masin’ny Avo Indrindra.
  - type: text
    content: Ny fanjakany dia fanjakana mandrakizay,
  - type: text
    content: ary ny manamboninahitra rehetra dia hanompo sy hanoa Azy.
  '28':
  - type: text
    content: Mifarana eo ny fitantarana izany zavatra izany. Fa izaho Daniela kosa dia naharaiki-tahotra ahy indrindra ny eritreritro ka nihahatsatra ny tarehiko ary notahiriziko tao am-poko ireo zavatra ireo.
  '3':
  - type: text
    content: 'Ary nisy biby efatra lehibe samihafa niakatra avy tamin’ny ranomasina. '
  '4':
  - type: text
    content: 'Ny voalohany dia toy ny liona ary nanana elatry ny voromahery. Raha mbola nijery azy aho dia voahongotra ny elany ary natsangana avy tamin’ny tany izy ka najoro tamin’ny tongony roa toy ny fijoron’ny olona sady natao manana fon’olombelona. '
  '5':
  - type: text
    content: 'Indro ny faharoa koa dia biby hafa, tahaka ny bera nefa nisandratra tamin’ny ila tenany sady nisy taolan-tehezana telo teo am-bavany anelanelan’ny nifiny; ary toy izao no voalaza taminy: Mitsangàna, mihinàna nofo betsaka. '
  '6':
  - type: text
    content: 'Nony afaka izany dia nahita aho fa indro, nisy hafa koa, toy ny leoparda nefa nanana ela-borona efatra teo an-damosiny; nanana loha efatra io biby io ary nomena fanjakana izy. '
  '7':
  - type: text
    content: 'Nony afaka izany dia nahita tamin’ny fahitana tamin’ny alina aho, dia biby fahefatra mahatsiravina sady matanjaka sy tena mahery; nanana nify vy lehibe izy; nihinana sy nihotahota izy ary ny sisa tsy laniny dia nohosihosen’ny tongony; ary hafa noho ny biby rehetra teo alohany izy sady nanana tandroka folo. '
  '8':
  - type: text
    content: Nodinihiko ny tandroka ka indro, nisy tandroka iray kely koa nipoitra teo aminy, ary nongotana teo anoloan’io ny tandroka telo tamin’ireo taloha; ary indro, nanana maso toy ny mason’olona sy vava miteny zavatra feno avonavona izy.
  - type: heading
    content: Ilay lahiantitra sy ilay «tahaka ny zanak’Olona»
  '9':
  - type: text
    content: Raha mbola nijery aho
  - type: text
    content: dia nisy sezafiandrianana maro napetraka,
  - type: text
    content: ary nisy Lahiantitra iray nipetraka teo,
  - type: text
    content: ny fitafiany dia fotsy toy ny orampanala
  - type: text
    content: ary ny volon-dohany dia toy ny volon’ondry madio.
  - type: text
    content: Ny sezafiandrianany dia lelafo
  - type: text
    content: ary ny kodiarany dia afo mirehitra.
