document_id: LEV.13,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny aretin-koditra mety mahazo ny olona
  - type: text
    content: 'Ary NY TOMPO niteny tamin’i Mosesy sy i Arona hoe: '
  '10':
  - type: text
    content: 'Hozahan’ny mpisorona izany, koa raha hitany fa misy mamontsina fotsy eo amin’ny hoditra sady efa niova ho fotsy ny volo ary misy nofo hita miseho eo amin’ny mamontsina '
  '11':
  - type: text
    content: 'dia habokana efa ela teo amin’ny hoditry ny nofony izany ka hambaran’ny mpisorona fa maloto izy. Tsy hatokany toerana akory izy fa efa maloto. '
  '12':
  - type: text
    content: 'Raha mipoipoitra eo amin’ny hoditra ny habokana ary manenika ny hoditr’ilay marary hatramin’ny lohany ka hatramin’ny tongony, na aiza na aiza zahan’ny mpisorona, '
  '13':
  - type: text
    content: 'dia hozahan’ny mpisorona, koa raha hitany fa manenika ny tenany manontolo ny habokana dia hambarany fa madio ilay marary; satria efa niova ho fotsy manontolo izy ka madio. '
  '14':
  - type: text
    content: 'Fa raha misy nofo miseho eo aminy dia haloto izy. '
  '15':
  - type: text
    content: 'Hozahan’ny mpisorona ny nofo miseho ary hambarany fa maloto izy satria maloto ny nofo miseho ka habokana izany. '
  '16':
  - type: text
    content: 'Raha miova ilay nofo miseho ka tonga fotsy dia hankeo amin’ny mpisorona izy; '
  '17':
  - type: text
    content: 'hozahan’ny mpisorona ilay marary, koa raha hitany fa tonga fotsy ny aretina dia hambaran’ny mpisorona fa madio izy satria efa madio. '
  '18':
  - type: text
    content: 'Raha misy fery sitrana eo amin’ny hoditra '
  '19':
  - type: text
    content: 'ary misy fotsy mamontsina eo amin’ny holatry ny fery na misy hola-mena dia hiseho amin’ny mpisorona izy. '
  '2':
  - type: text
    content: Raha misy mamontsina eo amin’ny hoditry ny nofon’ny olona, na misy manakompery na misy mifaritra mangirana ka eo amin’ny hoditry ny nofony tahaka ny habokana
  - type: note
    content: Ny teny hebreo adika hoe habokana dia manondro koa ny aretin-koditra samihafa, na ny bobongolo amin’ny rindrina na amin’ny fitafiana. Zahao 13.47-59; 14.33-53.
  - type: text
    content: ' izany, dia hoentina ho eo amin’i Arona mpisorona ilay olona na ho eo amin’iray amin’ireo mpisorona, zanak’i Arona; '
  '20':
  - type: text
    content: 'Hozahan’ny mpisorona io, koa raha lalina noho ny hoditra no fijeriny azy ary efa niova ho fotsy ny volony dia hambaran’ny mpisorona fa maloto izy; habokana efa mipoitra eo amin’ny fery izany. '
  '21':
  - type: text
    content: 'Hozahan’ny mpisorona izany, koa raha hitany fa tsy misy volo fotsy eo ary tsy lalina noho ny hoditra izany sady matromatroka ihany dia hatokan’ny mpisorona toerana hafitoana izy. '
  '22':
  - type: text
    content: 'Raha niitatra teo amin’ny hoditra izany dia hambaran’ny mpisorona fa maloto izy satria habokana izany. '
  '23':
  - type: text
    content: Fa raha tsy mitombo ny mifaritra mangirana, ka tsy miitatra, dia holatry ny fery ihany ka hataon’ny mpisorona hoe madio.
  '24':
  - type: text
    content: 'Raha misy main’ny afo eo amin’ny hoditra ka hita eo amin’ny may ny mifaritra fotsy mangirana sady mitera-mena, '
  '25':
  - type: text
    content: 'dia hozahan’ny mpisorona, koa raha hitany fa efa niova ho fotsy ny volo eo amin’ny toeran’ny mifaritra mangirana ary lalina noho ny hoditra no fijeriny azy dia habokana efa mipoitra eo amin’ny may izany ka hambaran’ny mpisorona fa maloto. Habokana izany. '
  '26':
  - type: text
    content: 'Fa hozahan’ny mpisorona izany, koa raha hitany fa tsy misy volo fotsy eo amin’ny mifaritra mangirana ary tsy lalina noho ny hoditra izy sady matromatroka ihany dia hatokan’ny mpisorona toerana hafitoana izy. '
  '27':
  - type: text
    content: 'Hozahan’ny mpisorona indray izany amin’ny andro fahafito, koa raha niitatra teo amin’ny hoditra io dia hambarany fa maloto. Habokana izany. '
  '28':
  - type: text
    content: Raha tsy mitombo ny mifaritra fotsy mangirana ary tsy niitatra teo amin’ny hoditra fa matromatroka ihany nefa mamontsina eo amin’ny may dia hambaran’ny mpisorona fa madio izy satria holatry ny may ihany io.
  '29':
  - type: text
    content: 'Raha misy lehilahy na vehivavy manana aretina eo amin’ny lohany na eo amin’ny saokany '
  '3':
  - type: text
    content: 'dia hozahan’ny mpisorona ny aretina eo amin’ny hoditry ny nofo. Raha niova ho fotsy ny volo eo amin’ny aretina ary efa lalina noho ny hoditry ny nofo no fijeriny ny aretina dia habokana izany; hozahan’ny mpisorona izy dia hambarany fa maloto. '
  '30':
  - type: text
    content: 'dia hozahan’ny mpisorona ny aretina, koa raha lalina noho ny hoditra ny fijeriny azy ary misy volo madinika somary vonivony eo dia hambaran’ny mpisorona fa maloto izy. Be hatina izany: Habokana eo amin’ny loha na eo amin’ny saoka. '
  '31':
  - type: text
    content: 'Fa raha zahan’ny mpisorona ny aretina ka tsy lalina noho ny hoditra no fijeriny azy, nefa tsy misy volo mainty eo, dia hatokany toerana mandritra ny hafitoana ilay olona be hatina. '
  '32':
  - type: text
    content: 'Hozahan’ny mpisorona ny aretina amin’ny andro fahafito, koa raha hitany fa tsy niitatra ny aretina ary tsy misy volo somary vonivony eo, ary tsy lalina noho ny hoditra no fijeriny azy, '
  '33':
  - type: text
    content: 'dia hiharatra izy fa tsy hoharatany ny misy ny aretina. Hatokan’ny mpisorona toerana mandritra ny hafitoana indray ilay olona be hatina. '
  '34':
  - type: text
    content: 'Hozahan’ny mpisorona ilay be hatina amin’ny andro fahafito, koa raha hitany fa tsy niitatra teo amin’ny hoditra ny aretiny, ary tsy lalina noho ny hoditra no fijeriny azy, dia hambaran’ny mpisorona fa madio izy. Hanasa ny fitafiany izy dia hadio. '
  '35':
  - type: text
    content: 'Fa raha niitatra teo amin’ny hoditra ny aretiny, rehefa nambarany fa madio izy, '
  '36':
  - type: text
    content: 'dia hozahan’ny mpisorona indray izy, koa raha hitany fa niitatra teo amin’ny hoditra ny aretina dia tsy mila mitady volo somary vonivony intsony ny mpisorona. Efa maloto izy. '
  '37':
  - type: text
    content: Nefa raha hitany fa tsy mitombo ny aretina ka misy volo mainty maniry eo dia sitrana ilay be hatina ka madio izy ary hambaran’ny mpisorona fa madio.
  '38':
  - type: text
    content: 'Raha misy lehilahy na vehivavy misy mifaritra mangirana eo amin’ny hodiny, misy mifaritra fotsy, '
  '39':
  - type: text
    content: 'dia hozahan’ny mpisorona, koa raha hitany fa misy mifaritra fotsy eo amin’ny hodiny mangirana, nefa matromatroka, dia aretina mipentimpentina fotsy mipoitra eo amin’ny hoditra izany: Madio izy.'
  '4':
  - type: text
    content: 'Fa raha misy mifaritra fotsy mangirana kosa eo amin’ny hoditry ny nofony nefa tsy lalina noho ny hoditra no fijeriny azy ary tsy niova ho fotsy ny volony dia hatokan’ny mpisorona toerana mandritra ny hafitoana ilay marary. '
  '40':
  - type: text
    content: 'Ny lehilahy raha mihintsam-bolon-doha dia sola ihany izy ka madio. '
  '41':
  - type: text
    content: 'Raha mihintsana ny volo eo ambonin’ny handriny dia mazava ray ihany izy ka madio. '
  '42':
  - type: text
    content: 'Fa raha misy aretina teramena somary fotsy, na eo amin’ny loha sola na eo amin’ny handrina, dia habokana mipoitra amin’ny loha sola, na amin’ny mazava ray izany. '
  '43':
  - type: text
    content: 'Hozahan’ny mpisorona izy, koa raha hitany fa teramena somary fotsy no famontsin’ny aretina eo amin’ny loha sola na eo amin’ny handrina, tahaka ny fisehon’ny habokana eo amin’ny hoditra, '
  '44':
  - type: text
    content: dia lehilahy boka izy ka maloto; hambaran’ny mpisorona fa maloto tokoa izy; eo amin’ny lohany ny aretiny.
  '45':
  - type: text
    content: 'Lamba rovitra no ho fitafian’ny olona izay efa tena boka ary hisaritaka ny volony dia hisarom-bava izy sady hiantsoantso hoe: Maloto e! Maloto e! '
  '46':
  - type: text
    content: 'Amin’ny andro rehetra izay aharariany amin’izany aretina izany dia haloto izy: Eny, maloto izy ka hitoetra mitokana ary eny ivelan’ny toby no toerana hipetrahany.'
  - type: heading
    content: Ny bobongolo amin’ny fitafiana
  '47':
  - type: text
    content: 'Amin’ny fitafiana izay misy bobongolo, na fitafiana volon’ondry na fitafiana vita amin’ny lamba rongony, '
  '48':
  - type: text
    content: 'na amin’ny tenony izany na amin’ny fahany, na lamba rongony izany na volon’ondry na amin’ny hoditra na izay zavatra vita tamin’ny hoditra; '
  '49':
  - type: text
    content: 'raha maitsomaitso na menamena eo amin’ny fitafiana ny aretina, na eo amin’ny hoditra na eo amin’ny tenony na eo amin’ny fahany, na eo amin’izay zavatra vita tamin’ny hoditra, dia toy ny habokana izany ka haseho amin’ny mpisorona. '
  '5':
  - type: text
    content: 'Hozahan’ny mpisorona izany amin’ny andro fahafito; koa raha hitany fa tsy mitombo ny aretina sady tsy miitatra eo amin’ny hoditra dia hatokany toerana hafitoana indray izy. '
  '50':
  - type: text
    content: 'Hozahan’ny mpisorona ny aretina ka hatokany toerana hafitoana ilay zavatra misy azy. '
  '51':
  - type: text
    content: 'Hozahany indray ny aretina amin’ny andro fahafito, koa raha niitatra teo amin’ny fitafiana ny aretina, na teo amin’ny tenony na ny fahany na teo amin’izay zavatra vita tamin’ny hoditra, dia toy ny habokana izany ka maloto. '
  '52':
  - type: text
    content: 'Dia hodorana ny fitafiana, na ny tenony na ny fahany na volon’ondry na lamba rongony na izay zavatra vita tamin’ny hoditra izay misy ny aretina; fa toy ny habokana mafy izany ka hodorana amin’ny afo. '
  '53':
  - type: text
    content: 'Rehefa mizaha azy ny mpisorona ka hitany fa tsy niitatra teo amin’ny fitafiana ny aretina, na teo amin’ny tenony na teo amin’ny fahany na teo amin’izay zavatra vita tamin’ny hoditra, '
  '54':
  - type: text
    content: 'dia hasain’ny mpisorona hosasana izay misy izany ary hatokany toerana mandritra ny hafitoana indray. '
  '55':
  - type: text
    content: 'Rehefa voasasa izany dia hozahan’ny mpisorona indray ny aretina; koa raha hitany fa tsy niova endrika ny aretina, na dia tsy niitatra aza, dia maloto izy ka hodorana amin’ny afo. Tena aretina izany, na amin’ny atiny, na amin’ny ivelany. '
  '56':
  - type: text
    content: 'Fa raha mizaha azy ny mpisorona ka hitany fa matromatroka ny aretina rehefa voasasa izy dia hesoriny ho afaka amin’ny fitafiana ny misy izany, na ho afaka amin’ny hoditra na ho afaka amin’ny tenony na ny fahany. '
  '57':
  - type: text
    content: 'Raha mbola misy miseho eo amin’ny fitafiana indray izany, na eo amin’ny tenony na eo amin’ny fahany na eo amin’izay zavatra vita tamin’ny hoditra, dia bobongolo mipoitra izany ka hodorana amin’ny afo izay misy azy. '
  '58':
  - type: text
    content: Ary ny fitafiana, na ny tenony na ny fahany na izay zavatra vita tamin’ny hoditra, izay hosasana, raha afaka taminy ny aretina dia hosasana fanindroany ireo ka hadio.
  '59':
  - type: text
    content: Izany no lalàna ny amin’ny bobongolo eo amin’ny fitafiana volon’ondry na lamba rongony, na eo amin’ny tenony na ny fahany na eo amin’izay zavatra vita tamin’ny hoditra, hanaovana azy hoe madio na hanaovana azy hoe maloto.
  '6':
  - type: text
    content: 'Hozahan’ny mpisorona indray izany amin’ny andro fahafito, koa raha hitany fa matromatroka ny aretina sady tsy miitatra eo amin’ny hoditra dia hambarany fa madio izy. Manakompery ihany izany ka hanasa ny fitafiany izy dia hadio. '
  '7':
  - type: text
    content: 'Fa raha niitatra teo amin’ny hodiny kosa ny takompery taorianan’ny nisehoany tamin’ny mpisorona momba ny fanadiovana azy dia hiseho amin’ny mpisorona indray izy. '
  '8':
  - type: text
    content: 'Hozahan’ny mpisorona izany, koa raha hitany fa miitatra eo amin’ny hoditra ny takompery dia hambarany fa maloto izy. Habokana izany. '
  '9':
  - type: text
    content: 'Raha misy habokana amin’ny olona dia hoentina eo amin’ny mpisorona izy. '
