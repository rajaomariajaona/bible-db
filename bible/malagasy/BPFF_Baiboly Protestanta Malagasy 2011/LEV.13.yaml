document_id: LEV.13
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny aretin-koditra mety mahazo ny olona
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary NY TOMPO niteny tamin’i Mosesy sy i Arona hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Raha misy mamontsina eo amin’ny hoditry ny nofon’ny olona, na misy manakompery na misy mifaritra mangirana ka eo amin’ny hoditry ny nofony tahaka ny habokana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.2 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Ny teny hebreo adika hoe habokana dia manondro koa ny aretin-koditra samihafa, na ny bobongolo amin’ny rindrina na amin’ny fitafiana. Zahao '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 13.47-59; 14.33-53.
    marker-yv: yv-n
  - type: text
    text: ' izany, dia hoentina ho eo amin’i Arona mpisorona ilay olona na ho eo amin’iray amin’ireo mpisorona, zanak’i Arona; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'dia hozahan’ny mpisorona ny aretina eo amin’ny hoditry ny nofo. Raha niova ho fotsy ny volo eo amin’ny aretina ary efa lalina noho ny hoditry ny nofo no fijeriny ny aretina dia habokana izany; hozahan’ny mpisorona izy dia hambarany fa maloto. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Fa raha misy mifaritra fotsy mangirana kosa eo amin’ny hoditry ny nofony nefa tsy lalina noho ny hoditra no fijeriny azy ary tsy niova ho fotsy ny volony dia hatokan’ny mpisorona toerana mandritra ny hafitoana ilay marary. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Hozahan’ny mpisorona izany amin’ny andro fahafito; koa raha hitany fa tsy mitombo ny aretina sady tsy miitatra eo amin’ny hoditra dia hatokany toerana hafitoana indray izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Hozahan’ny mpisorona indray izany amin’ny andro fahafito, koa raha hitany fa matromatroka ny aretina sady tsy miitatra eo amin’ny hoditra dia hambarany fa madio izy. Manakompery ihany izany ka hanasa ny fitafiany izy dia hadio. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Fa raha niitatra teo amin’ny hodiny kosa ny takompery taorianan’ny nisehoany tamin’ny mpisorona momba ny fanadiovana azy dia hiseho amin’ny mpisorona indray izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Hozahan’ny mpisorona izany, koa raha hitany fa miitatra eo amin’ny hoditra ny takompery dia hambarany fa maloto izy. Habokana izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Raha misy habokana amin’ny olona dia hoentina eo amin’ny mpisorona izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Hozahan’ny mpisorona izany, koa raha hitany fa misy mamontsina fotsy eo amin’ny hoditra sady efa niova ho fotsy ny volo ary misy nofo hita miseho eo amin’ny mamontsina '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'dia habokana efa ela teo amin’ny hoditry ny nofony izany ka hambaran’ny mpisorona fa maloto izy. Tsy hatokany toerana akory izy fa efa maloto. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Raha mipoipoitra eo amin’ny hoditra ny habokana ary manenika ny hoditr’ilay marary hatramin’ny lohany ka hatramin’ny tongony, na aiza na aiza zahan’ny mpisorona, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'dia hozahan’ny mpisorona, koa raha hitany fa manenika ny tenany manontolo ny habokana dia hambarany fa madio ilay marary; satria efa niova ho fotsy manontolo izy ka madio. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Fa raha misy nofo miseho eo aminy dia haloto izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Hozahan’ny mpisorona ny nofo miseho ary hambarany fa maloto izy satria maloto ny nofo miseho ka habokana izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Raha miova ilay nofo miseho ka tonga fotsy dia hankeo amin’ny mpisorona izy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'hozahan’ny mpisorona ilay marary, koa raha hitany fa tonga fotsy ny aretina dia hambaran’ny mpisorona fa madio izy satria efa madio. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Raha misy fery sitrana eo amin’ny hoditra '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'ary misy fotsy mamontsina eo amin’ny holatry ny fery na misy hola-mena dia hiseho amin’ny mpisorona izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Hozahan’ny mpisorona io, koa raha lalina noho ny hoditra no fijeriny azy ary efa niova ho fotsy ny volony dia hambaran’ny mpisorona fa maloto izy; habokana efa mipoitra eo amin’ny fery izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Hozahan’ny mpisorona izany, koa raha hitany fa tsy misy volo fotsy eo ary tsy lalina noho ny hoditra izany sady matromatroka ihany dia hatokan’ny mpisorona toerana hafitoana izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Raha niitatra teo amin’ny hoditra izany dia hambaran’ny mpisorona fa maloto izy satria habokana izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Fa raha tsy mitombo ny mifaritra mangirana, ka tsy miitatra, dia holatry ny fery ihany ka hataon’ny mpisorona hoe madio.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Raha misy main’ny afo eo amin’ny hoditra ka hita eo amin’ny may ny mifaritra fotsy mangirana sady mitera-mena, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'dia hozahan’ny mpisorona, koa raha hitany fa efa niova ho fotsy ny volo eo amin’ny toeran’ny mifaritra mangirana ary lalina noho ny hoditra no fijeriny azy dia habokana efa mipoitra eo amin’ny may izany ka hambaran’ny mpisorona fa maloto. Habokana izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Fa hozahan’ny mpisorona izany, koa raha hitany fa tsy misy volo fotsy eo amin’ny mifaritra mangirana ary tsy lalina noho ny hoditra izy sady matromatroka ihany dia hatokan’ny mpisorona toerana hafitoana izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Hozahan’ny mpisorona indray izany amin’ny andro fahafito, koa raha niitatra teo amin’ny hoditra io dia hambarany fa maloto. Habokana izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Raha tsy mitombo ny mifaritra fotsy mangirana ary tsy niitatra teo amin’ny hoditra fa matromatroka ihany nefa mamontsina eo amin’ny may dia hambaran’ny mpisorona fa madio izy satria holatry ny may ihany io.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Raha misy lehilahy na vehivavy manana aretina eo amin’ny lohany na eo amin’ny saokany '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'dia hozahan’ny mpisorona ny aretina, koa raha lalina noho ny hoditra ny fijeriny azy ary misy volo madinika somary vonivony eo dia hambaran’ny mpisorona fa maloto izy. Be hatina izany: Habokana eo amin’ny loha na eo amin’ny saoka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Fa raha zahan’ny mpisorona ny aretina ka tsy lalina noho ny hoditra no fijeriny azy, nefa tsy misy volo mainty eo, dia hatokany toerana mandritra ny hafitoana ilay olona be hatina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Hozahan’ny mpisorona ny aretina amin’ny andro fahafito, koa raha hitany fa tsy niitatra ny aretina ary tsy misy volo somary vonivony eo, ary tsy lalina noho ny hoditra no fijeriny azy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'dia hiharatra izy fa tsy hoharatany ny misy ny aretina. Hatokan’ny mpisorona toerana mandritra ny hafitoana indray ilay olona be hatina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Hozahan’ny mpisorona ilay be hatina amin’ny andro fahafito, koa raha hitany fa tsy niitatra teo amin’ny hoditra ny aretiny, ary tsy lalina noho ny hoditra no fijeriny azy, dia hambaran’ny mpisorona fa madio izy. Hanasa ny fitafiany izy dia hadio. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Fa raha niitatra teo amin’ny hoditra ny aretiny, rehefa nambarany fa madio izy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'dia hozahan’ny mpisorona indray izy, koa raha hitany fa niitatra teo amin’ny hoditra ny aretina dia tsy mila mitady volo somary vonivony intsony ny mpisorona. Efa maloto izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Nefa raha hitany fa tsy mitombo ny aretina ka misy volo mainty maniry eo dia sitrana ilay be hatina ka madio izy ary hambaran’ny mpisorona fa madio.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Raha misy lehilahy na vehivavy misy mifaritra mangirana eo amin’ny hodiny, misy mifaritra fotsy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'dia hozahan’ny mpisorona, koa raha hitany fa misy mifaritra fotsy eo amin’ny hodiny mangirana, nefa matromatroka, dia aretina mipentimpentina fotsy mipoitra eo amin’ny hoditra izany: Madio izy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Ny lehilahy raha mihintsam-bolon-doha dia sola ihany izy ka madio. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Raha mihintsana ny volo eo ambonin’ny handriny dia mazava ray ihany izy ka madio. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Fa raha misy aretina teramena somary fotsy, na eo amin’ny loha sola na eo amin’ny handrina, dia habokana mipoitra amin’ny loha sola, na amin’ny mazava ray izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Hozahan’ny mpisorona izy, koa raha hitany fa teramena somary fotsy no famontsin’ny aretina eo amin’ny loha sola na eo amin’ny handrina, tahaka ny fisehon’ny habokana eo amin’ny hoditra, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: dia lehilahy boka izy ka maloto; hambaran’ny mpisorona fa maloto tokoa izy; eo amin’ny lohany ny aretiny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Lamba rovitra no ho fitafian’ny olona izay efa tena boka ary hisaritaka ny volony dia hisarom-bava izy sady hiantsoantso hoe: Maloto e! Maloto e! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Amin’ny andro rehetra izay aharariany amin’izany aretina izany dia haloto izy: Eny, maloto izy ka hitoetra mitokana ary eny ivelan’ny toby no toerana hipetrahany.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny bobongolo amin’ny fitafiana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Amin’ny fitafiana izay misy bobongolo, na fitafiana volon’ondry na fitafiana vita amin’ny lamba rongony, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'na amin’ny tenony izany na amin’ny fahany, na lamba rongony izany na volon’ondry na amin’ny hoditra na izay zavatra vita tamin’ny hoditra; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'raha maitsomaitso na menamena eo amin’ny fitafiana ny aretina, na eo amin’ny hoditra na eo amin’ny tenony na eo amin’ny fahany, na eo amin’izay zavatra vita tamin’ny hoditra, dia toy ny habokana izany ka haseho amin’ny mpisorona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Hozahan’ny mpisorona ny aretina ka hatokany toerana hafitoana ilay zavatra misy azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'Hozahany indray ny aretina amin’ny andro fahafito, koa raha niitatra teo amin’ny fitafiana ny aretina, na teo amin’ny tenony na ny fahany na teo amin’izay zavatra vita tamin’ny hoditra, dia toy ny habokana izany ka maloto. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'Dia hodorana ny fitafiana, na ny tenony na ny fahany na volon’ondry na lamba rongony na izay zavatra vita tamin’ny hoditra izay misy ny aretina; fa toy ny habokana mafy izany ka hodorana amin’ny afo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'Rehefa mizaha azy ny mpisorona ka hitany fa tsy niitatra teo amin’ny fitafiana ny aretina, na teo amin’ny tenony na teo amin’ny fahany na teo amin’izay zavatra vita tamin’ny hoditra, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: 'dia hasain’ny mpisorona hosasana izay misy izany ary hatokany toerana mandritra ny hafitoana indray. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: 'Rehefa voasasa izany dia hozahan’ny mpisorona indray ny aretina; koa raha hitany fa tsy niova endrika ny aretina, na dia tsy niitatra aza, dia maloto izy ka hodorana amin’ny afo. Tena aretina izany, na amin’ny atiny, na amin’ny ivelany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: 'Fa raha mizaha azy ny mpisorona ka hitany fa matromatroka ny aretina rehefa voasasa izy dia hesoriny ho afaka amin’ny fitafiana ny misy izany, na ho afaka amin’ny hoditra na ho afaka amin’ny tenony na ny fahany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: 'Raha mbola misy miseho eo amin’ny fitafiana indray izany, na eo amin’ny tenony na eo amin’ny fahany na eo amin’izay zavatra vita tamin’ny hoditra, dia bobongolo mipoitra izany ka hodorana amin’ny afo izay misy azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: Ary ny fitafiana, na ny tenony na ny fahany na izay zavatra vita tamin’ny hoditra, izay hosasana, raha afaka taminy ny aretina dia hosasana fanindroany ireo ka hadio.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '59'
  - type: text
    text: Izany no lalàna ny amin’ny bobongolo eo amin’ny fitafiana volon’ondry na lamba rongony, na eo amin’ny tenony na ny fahany na eo amin’izay zavatra vita tamin’ny hoditra, hanaovana azy hoe madio na hanaovana azy hoe maloto.
