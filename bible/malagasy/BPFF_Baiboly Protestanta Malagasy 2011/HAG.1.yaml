document_id: HAG.1
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Tonga ny fotoana hananganana indray ny tempoly
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Tamin’ny andro voalohany tamin’ny volana fahenina tamin’ny taona faharoa nanjakan’i Dariosy mpanjaka no nahatongavan’ny tenin’NY TOMPO izay noentin’i Hagay mpaminany tamin’i Zerobabela, zanak’i Sealtiela, governora tany Joda, sy tamin’i Josoa, zanak’i Jozadaka, '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Mpisoronabe
  - type: text
    text: ', nilaza hoe:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Izao no lazain’Andriamanitra, Tompon’izao rehetra izao: Ity firenena ity dia niteny hoe: Tsy mbola tonga ny fotoana tokony hananganana indray ny tranon’NY TOMPO.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dia tonga ny tenin’NY TOMPO izay noentin’i Hagay mpaminany hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Moa fotoana tokony
- type: usfm
  marker: q1
  children:
  - type: text
    text: hitoeranareo ao amin’ny tranonareo misy valin-drihana va izao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: kanefa ity trano ity dia rava?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Koa ankehitriny dia izao no lazain’Andriamanitra, Tompon’izao rehetra izao:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hevero ny lalanareo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Namafy be ianareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa kely no azo avy amin’izany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mihinana ianareo nefa tsy voky;
- type: usfm
  marker: q1
  children:
  - type: text
    text: misotro ianareo nefa tsy afa-po;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mitafy ianareo nefa tsy misy mafana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary izay mahazo karama dia mahazo karama hatao an-kitapo loaka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Izao no lazain’Andriamanitra, Tompon’izao rehetra izao:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hevero ny lalanareo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Miakara any an-tendrombohitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka makà hazo, ary ataovy ny Trano
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hankasitrahako izany sady hankalazaina Aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hoy NY TOMPO.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Nanampo be ianareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: kanjo indro, kely monja;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary nony notaominareo ho any an-trano
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia notsofiko indray.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nahoana?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hoy Andriamanitra, Tompon’izao rehetra izao.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Satria efa rava ny tranoko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa ianareo dia samy mihazakazaka hanao ny tranonareo avy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Noho izany dia nitsahatra tsy hampilatsaka ando ny lanitra eo amboninareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary nitsahatra tsy hahavokatra ny tany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Niantso ny hain-tany Aho hamely ny tany, ny tendrombohitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny vary, ny ranom-boaloboka, ny diloilo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary izay vokatry ny tany
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny olona ary ny biby fiompy
- type: usfm
  marker: q1
  children:
  - type: text
    text: mbamin’izay rehetra efa nisasaran’ny tanana.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'I Zerobabela, zanak’i Seltiela, sy i Josoa, zanak’i Jozadaka, Mpisoronabe, mbamin’ny sisa rehetra amin’ny vahoaka, dia nihaino ny feon’NY TOMPO Andriamaniny sy ny tenin’i Hagay mpaminany, araka ny efa nanirahan’NY TOMPO Andriamaniny azy; ary natahotra teo anatrehan’NY TOMPO ny olona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary nambaran’i Hagay, iraky NY TOMPO, ny teny nampitondrain’NY TOMPO ho amin’ny olona hoe: Izaho no momba anareo, hoy NY TOMPO. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dia notairin’NY TOMPO ny fanahin’i Zerobabela, zanak’i Sealtiela, governora any Joda, sy ny fanahin’i Josoa, zanak’i Jozadaka, Mpisoronabe, ary ny fanahin’ny sisa rehetra amin’ny vahoaka. Dia avy izy ka nandrafitra ny tranon’Andriamaniny, Andriamanitra, Tompon’izao rehetra izao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Tamin’ny andro fahefatra amby roapolo tamin’ny volana fahenina tamin’ny taona faharoa nanjakan’i Dariosy izany.
