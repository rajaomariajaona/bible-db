document_id: HAG.1,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Tonga ny fotoana hananganana indray ny tempoly
  - type: text
    content: 'Tamin’ny andro voalohany tamin’ny volana fahenina tamin’ny taona faharoa nanjakan’i Dariosy mpanjaka no nahatongavan’ny tenin’NY TOMPO izay noentin’i Hagay mpaminany tamin’i Zerobabela, zanak’i Sealtiela, governora tany Joda, sy tamin’i Josoa, zanak’i Jozadaka, '
  - type: text
    content: Mpisoronabe
  - type: text
    content: ', nilaza hoe:'
  '10':
  - type: text
    content: Noho izany dia nitsahatra tsy hampilatsaka ando ny lanitra eo amboninareo
  - type: text
    content: ary nitsahatra tsy hahavokatra ny tany.
  '11':
  - type: text
    content: Niantso ny hain-tany Aho hamely ny tany, ny tendrombohitra,
  - type: text
    content: ny vary, ny ranom-boaloboka, ny diloilo
  - type: text
    content: ary izay vokatry ny tany
  - type: text
    content: sy ny olona ary ny biby fiompy
  - type: text
    content: mbamin’izay rehetra efa nisasaran’ny tanana.
  '12':
  - type: text
    content: 'I Zerobabela, zanak’i Seltiela, sy i Josoa, zanak’i Jozadaka, Mpisoronabe, mbamin’ny sisa rehetra amin’ny vahoaka, dia nihaino ny feon’NY TOMPO Andriamaniny sy ny tenin’i Hagay mpaminany, araka ny efa nanirahan’NY TOMPO Andriamaniny azy; ary natahotra teo anatrehan’NY TOMPO ny olona. '
  '13':
  - type: text
    content: 'Ary nambaran’i Hagay, iraky NY TOMPO, ny teny nampitondrain’NY TOMPO ho amin’ny olona hoe: Izaho no momba anareo, hoy NY TOMPO. '
  '14':
  - type: text
    content: 'Dia notairin’NY TOMPO ny fanahin’i Zerobabela, zanak’i Sealtiela, governora any Joda, sy ny fanahin’i Josoa, zanak’i Jozadaka, Mpisoronabe, ary ny fanahin’ny sisa rehetra amin’ny vahoaka. Dia avy izy ka nandrafitra ny tranon’Andriamaniny, Andriamanitra, Tompon’izao rehetra izao. '
  '15':
  - type: text
    content: Tamin’ny andro fahefatra amby roapolo tamin’ny volana fahenina tamin’ny taona faharoa nanjakan’i Dariosy izany.
  '2':
  - type: text
    content: 'Izao no lazain’Andriamanitra, Tompon’izao rehetra izao: Ity firenena ity dia niteny hoe: Tsy mbola tonga ny fotoana tokony hananganana indray ny tranon’NY TOMPO.'
  '3':
  - type: text
    content: 'Dia tonga ny tenin’NY TOMPO izay noentin’i Hagay mpaminany hoe:'
  '4':
  - type: text
    content: Moa fotoana tokony
  - type: text
    content: hitoeranareo ao amin’ny tranonareo misy valin-drihana va izao,
  - type: text
    content: kanefa ity trano ity dia rava?
  '5':
  - type: text
    content: 'Koa ankehitriny dia izao no lazain’Andriamanitra, Tompon’izao rehetra izao:'
  - type: text
    content: Hevero ny lalanareo.
  '6':
  - type: text
    content: Namafy be ianareo
  - type: text
    content: nefa kely no azo avy amin’izany;
  - type: text
    content: mihinana ianareo nefa tsy voky;
  - type: text
    content: misotro ianareo nefa tsy afa-po;
  - type: text
    content: mitafy ianareo nefa tsy misy mafana;
  - type: text
    content: ary izay mahazo karama dia mahazo karama hatao an-kitapo loaka.
  '7':
  - type: text
    content: 'Izao no lazain’Andriamanitra, Tompon’izao rehetra izao:'
  - type: text
    content: Hevero ny lalanareo.
  '8':
  - type: text
    content: Miakara any an-tendrombohitra
  - type: text
    content: ka makà hazo, ary ataovy ny Trano
  - type: text
    content: dia hankasitrahako izany sady hankalazaina Aho,
  - type: text
    content: hoy NY TOMPO.
  '9':
  - type: text
    content: Nanampo be ianareo
  - type: text
    content: kanjo indro, kely monja;
  - type: text
    content: ary nony notaominareo ho any an-trano
  - type: text
    content: dia notsofiko indray.
  - type: text
    content: Nahoana?
  - type: text
    content: Hoy Andriamanitra, Tompon’izao rehetra izao.
  - type: text
    content: Satria efa rava ny tranoko,
  - type: text
    content: nefa ianareo dia samy mihazakazaka hanao ny tranonareo avy.
