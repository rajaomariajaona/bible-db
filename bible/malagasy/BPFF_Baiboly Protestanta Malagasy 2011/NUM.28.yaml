      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ary ny fanatitra aidina dia ampahefatry ny hina isan-janak’ondry; ao amin’ny fitoerana masina no handrarahanao ny divay ho an’NY TOMPO ho fanatitra aidina. '
  '8':
  - type: usfm
