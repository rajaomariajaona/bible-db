    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'koba tsara toto ampahafolon’ny efaha, voaharo diloilo, ho fanatitra avy amin’ny zavamaniry, ampombaina ny zanak’ondry tsirairay; ho fanatitra dorana manontolo izany, dia hanitra ankasitrahana, fanatitra levonina amin’ny afo ho an’NY TOMPO. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Ny fanatitra aidina ampombaina izany dia divay antsasaky ny '
