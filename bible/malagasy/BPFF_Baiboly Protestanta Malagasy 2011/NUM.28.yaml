document_id: NUM.28,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Lalàna samihafa momba ny fanatitra
  - type: heading
    content: Momba ny fanatitra isanandro
  - type: text
    content: 'Ary NY TOMPO niteny tamin’i Mosesy '
  '10':
  - type: text
    content: Fanatitra dorana manontolo ho amin’ny Sabata izany, ary ho isan-tSabata, ho fanampin’ny fanatitra mandrakariva dorana manontolo sy ny fanatitra aidina ampombaina azy.
  - type: heading
    content: Momba ny voaloham-bolana
  '11':
  - type: text
    content: 'Izao no hatolotrareo ho fanatitra dorana manontolo ho an’NY TOMPO amin’ny voaloham-bolanareo: Vantotra ombilahy roa sy ondrilahy iray ary zanak’ondry fito, izay iray taona avy sady tsy misy kilema, '
  '12':
  - type: text
    content: 'miampy koba tsara toto telo ampahafolon’ny '
  - type: text
    content: efaha
  - type: text
    content: ', voaharo diloilo, ho fanatitra avy amin’ny zavamaniry, ampombaina ny vantotra ombilahy; koba tsara toto roa ampahafolon’ny efaha, voaharo diloilo, ho fanatitra avy amin’ny zavamaniry, ampombaina ny ondrilahy; '
  '13':
  - type: text
    content: 'koba tsara toto ampahafolon’ny efaha, voaharo diloilo, ho fanatitra avy amin’ny zavamaniry, ampombaina ny zanak’ondry tsirairay; ho fanatitra dorana manontolo izany, dia hanitra ankasitrahana, fanatitra levonina amin’ny afo ho an’NY TOMPO. '
  '14':
  - type: text
    content: 'Ny fanatitra aidina ampombaina izany dia divay antsasaky ny '
  - type: text
    content: hina
  - type: text
    content: ', ho amin’ny vantotra ombilahy iray, ampahatelon’ny hina, ho amin’ny ondrilahy iray ary ampahefatry ny hina, ho amin’ny zanak’ondry iray. Izany no fanatitra dorana manontolo isam-bolana, araka ireo volana amin’ny taona, '
  '15':
  - type: text
    content: ary osilahy iray koa dia hatao fanatitra noho ny ota ho an’NY TOMPO; ho fanampin’ny fanatitra mandrakariva, dorana manontolo, no hanolorana azy sy ny fanatitra aidina ampombaina azy.
  - type: heading
    content: Momba ny fetin’ny Paska
  '16':
  - type: text
    content: 'Ny andro fahefatra amby folo amin’ny volana voalohany dia '
  - type: text
    content: Paska
  - type: text
    content: ' an’NY TOMPO.'
  '17':
  - type: text
    content: 'Andro firavoravoana ny andro fahadimy amby folo amin’izany volana izany. Hafitoana no hihinanana mofo tsy misy masirasira. '
  '18':
  - type: text
    content: 'Amin’ny andro voalohany dia hisy fivoriana masina; aza manao raharaha mavesatra. '
  '19':
  - type: text
    content: 'Izao no hatolotrareo ho fanatitra levonina amin’ny afo, dia fanatitra dorana manontolo ho an’NY TOMPO: Vantotra ombilahy roa sy ondrilahy iray ary zanak’ondry fito, izay iray taona avy, izay tsy misy kilema, no hatolotrareo; '
  '2':
  - type: text
    content: 'mba hanome didy ny Zanak’Israely hoe: Ny fanatitra ho Ahy, dia ny haniko, izay fanatitra levonina amin’ny afo ho hanitra ankasitrahana ho Ahy, dia aoka hotandremanareo ny hanolorana izany ho Ahy amin’ny fotoanany avy. '
  '20':
  - type: text
    content: 'ary ny fanatitra avy amin’ny zavamaniry ampombaina azy dia koba tsara toto voaharo diloilo; telo hampahafolon’ny '
  - type: text
    content: efaha
  - type: text
    content: ' no hatolotrareo miaraka amin’ny vantotra ombilahy tsirairay; roa ampahafolon’ny efaha no ampombaina ny ondrilahy, '
  '21':
  - type: text
    content: 'ampahafolon’ny efaha no ampombaina ny zanak’ondry tsirairay amin’ireo zanak’ondry fito, '
  '22':
  - type: text
    content: 'ary osilahy iray no ho fanatitra noho ny ota, hanaovana fanavotana ho anareo. '
  '23':
  - type: text
    content: 'Atolory ireo ho fanampin’ny fanatitra dorana manontolo isa-maraina, izay atao fanatitra mandrakariva, dorana manontolo. '
  '24':
  - type: text
    content: 'Araka ireo no hanoloranareo isanandro, mandritra ny fito andro, ho hanina levonina amin’ny afo, ho hanitra ankasitrahana ho an’NY TOMPO; ho fanampin’ny fanatitra dorana mandrakariva manontolo no hanolorana izany sy ny fanatitra aidina ampombaina azy. '
  '25':
  - type: text
    content: Amin’ny andro fahafito dia hisy fivoriana masina ho anareo; aza manao raharaha mavesatra.
  - type: heading
    content: Momba ny fetin’ireo Herinandro
  '26':
  - type: text
    content: Amin’ny andro fanaterana ny voaloham-bokatra, raha manolotra fanatitra vaovao avy amin’ny zavamaniry ho an’NY TOMPO ianareo amin’ny fetin’ireo Herinandronareo
  - type: note
    content: Zahao Eks 34.22.
  - type: text
    content: ', dia hisy fivoriana masina ho anareo; aza manao raharaha mavesatra. '
  '27':
  - type: text
    content: 'Ireto no atolory ho fanatitra dorana manontolo, ho hanitra ankasitrahana ho an’NY TOMPO: Vantotra ombilahy roa, ondrilahy iray ary zanak’ondry fito, izay iray taona avy; '
  '28':
  - type: text
    content: 'ny fanatitra avy amin’ny zavamaniry ampombaina azy dia koba tsara toto voaharo diloilo, telo ampahafolon’ny '
  - type: text
    content: efaha
  - type: text
    content: ', ampombaina ny ombilahy tsirairay, roa ampahafolon’ny efaha, ampombaina ny ondrilahy, '
  '29':
  - type: text
    content: 'ary ampahafolon’ny efaha, ampombaina ny zanak’ondry tsirairay amin’ireo zanak’ondry fito, '
  '3':
  - type: text
    content: 'Lazao aminy hoe: Izao no fanatitra levonina amin’ny afo, izay hatolotrao ho an’NY TOMPO: Zanak’ondry izay iray taona sady tsy misy kilema, roa isanandro, ho fanatitra mandrakariva, dorana manontolo izany, '
  '30':
  - type: text
    content: 'ary osilahy iray, hanaovana fanavotana ho anareo. '
  '31':
  - type: text
    content: Dia hatolotrareo ireo ho fanampin’ny fanatitra mandrakariva, dorana manontolo, sy ny fanatitra avy amin’ny zavamaniry ampombaina azy; izay tsy misy kilema hatrany no haterinareo.
  '4':
  - type: text
    content: 'koa ny zanak’ondry iray dia hatolotrao vao maraina ary ny zanak’ondry iray dia hatolotrao amin’ny hariva; '
  '5':
  - type: text
    content: 'koba tsara toto ampahafolon’ny '
  - type: text
    content: efaha
  - type: text
    content: ', voaharo diloilo nofiazana ampahefatry ny '
  - type: text
    content: hina
  - type: text
    content: ' kosa no ho fanatitra avy amin’ny zavamaniry. '
  '6':
  - type: text
    content: 'Ho fanatitra mandrakariva, dorana manontolo izany, izay voatendry tao an-tendrombohitra Sinay ho hanitra ankasitrahana, fanatitra levonina amin’ny afo ho an’NY TOMPO. '
  '7':
  - type: text
    content: 'Ary ny fanatitra aidina dia ampahefatry ny hina isan-janak’ondry; ao amin’ny fitoerana masina no handrarahanao ny divay ho an’NY TOMPO ho fanatitra aidina. '
  '8':
  - type: text
    content: Ny zanak’ondry faharoa kosa dia hatolotrao amin’ny hariva milenti-masoandro; fanatitra avy amin’ny zavamaniry sy fanatitra aidina, tahaka ny atao amin’ny fanatitra maraina no hampombainao azy, ho fanatitra levonina amin’ny afo, ho hanitra ankasitrahana ho an’NY TOMPO.
  - type: heading
    content: Momba ny andro Sabata
  '9':
  - type: text
    content: 'Amin’ny andro Sabata kosa dia izao no hatolotrao: Zanak’ondry roa, izay iray taona avy sady tsy misy kilema, miampy koba tsara toto roa ampahafolon’ny '
  - type: text
    content: efaha
  - type: text
    content: ', voaharo diloilo, ho fanatitra avy amin’ny zavamaniry; ampombaina azy ireo ny fanatitra aidina. '
