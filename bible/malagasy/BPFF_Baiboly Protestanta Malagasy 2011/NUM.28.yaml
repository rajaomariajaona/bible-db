    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Andro firavoravoana ny andro fahadimy amby folo amin’izany volana izany. Hafitoana no hihinanana mofo tsy misy masirasira. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Amin’ny andro voalohany dia hisy fivoriana masina; aza manao raharaha mavesatra. '
  '19':
