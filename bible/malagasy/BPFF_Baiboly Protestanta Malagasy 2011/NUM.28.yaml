    - type: text
      text: 'Lazao aminy hoe: Izao no fanatitra levonina amin’ny afo, izay hatolotrao ho an’NY TOMPO: Zanak’ondry izay iray taona sady tsy misy kilema, roa isanandro, ho fanatitra mandrakariva, dorana manontolo izany, '
