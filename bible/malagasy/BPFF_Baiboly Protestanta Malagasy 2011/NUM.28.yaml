    - type: text
      text: 'Ho fanatitra mandrakariva, dorana manontolo izany, izay voatendry tao an-tendrombohitra Sinay ho hanitra ankasitrahana, fanatitra levonina amin’ny afo ho an’NY TOMPO. '
