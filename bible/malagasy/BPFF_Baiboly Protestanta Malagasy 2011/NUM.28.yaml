    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Ny zanak’ondry faharoa kosa dia hatolotrao amin’ny hariva milenti-masoandro; fanatitra avy amin’ny zavamaniry sy fanatitra aidina, tahaka ny atao amin’ny fanatitra maraina no hampombainao azy, ho fanatitra levonina amin’ny afo, ho hanitra ankasitrahana ho an’NY TOMPO.
  - type: usfm
