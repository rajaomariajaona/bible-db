      marker: w
      children:
      - type: text
        text: hina
    - type: text
      text: ', ho amin’ny vantotra ombilahy iray, ampahatelon’ny hina, ho amin’ny ondrilahy iray ary ampahefatry ny hina, ho amin’ny zanak’ondry iray. Izany no fanatitra dorana manontolo isam-bolana, araka ireo volana amin’ny taona, '
  '15':
