      - type: text
        text: '9'
    - type: text
      text: 'Amin’ny andro Sabata kosa dia izao no hatolotrao: Zanak’ondry roa, izay iray taona avy sady tsy misy kilema, miampy koba tsara toto roa ampahafolon’ny '
    - type: usfm
