      children:
      - type: text
        text: efaha
    - type: text
      text: ', voaharo diloilo, ho fanatitra avy amin’ny zavamaniry, ampombaina ny vantotra ombilahy; koba tsara toto roa ampahafolon’ny efaha, voaharo diloilo, ho fanatitra avy amin’ny zavamaniry, ampombaina ny ondrilahy; '
  '13':
