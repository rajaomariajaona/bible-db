        text: '10'
    - type: text
      text: Fanatitra dorana manontolo ho amin’ny Sabata izany, ary ho isan-tSabata, ho fanampin’ny fanatitra mandrakariva dorana manontolo sy ny fanatitra aidina ampombaina azy.
