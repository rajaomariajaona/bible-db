      children:
      - type: text
        text: '11'
    - type: text
      text: 'Izao no hatolotrareo ho fanatitra dorana manontolo ho an’NY TOMPO amin’ny voaloham-bolanareo: Vantotra ombilahy roa sy ondrilahy iray ary zanak’ondry fito, izay iray taona avy sady tsy misy kilema, '
  '12':
