      children:
      - type: text
        text: '19'
    - type: text
      text: 'Izao no hatolotrareo ho fanatitra levonina amin’ny afo, dia fanatitra dorana manontolo ho an’NY TOMPO: Vantotra ombilahy roa sy ondrilahy iray ary zanak’ondry fito, izay iray taona avy, izay tsy misy kilema, no hatolotrareo; '
