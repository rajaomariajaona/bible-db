      children:
      - type: text
        text: '2'
    - type: text
      text: 'mba hanome didy ny Zanak’Israely hoe: Ny fanatitra ho Ahy, dia ny haniko, izay fanatitra levonina amin’ny afo ho hanitra ankasitrahana ho Ahy, dia aoka hotandremanareo ny hanolorana izany ho Ahy amin’ny fotoanany avy. '
