document_id: GEN.25,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nahafatesan’i Abrahama; ireo taranany hafa
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 1Tan 1.32-33
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nampaka-bady indray i Abrahama ka Ketora no anaran’izy io. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Io ilay saha izay novidin’i Abrahama tamin’ireo taranak’i Heta. Tao no nandevenana an’i Abrahama sy i Saraha vadiny. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Taorianan’ny nahafatesan’i Abrahama dia notahin’Andriamanitra Isaka zanany. Ary nonina teo akaikin’i Bera-Lahay-Roỳ Isaka.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 1Tan 1.29-31
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ireto no taranak’Ismaela, zanakalahin’i Abrahama izay naterak’i Hagara, ilay Ejiptiana, mpanompovavin’i Saraha, tamin’i Abrahama. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ireto avy no anaran’ny zanakalahin’Ismaela, araka ny anarany sy araka ny taranany: I Nebaiota, lahimatoan’i Ismaela, i Kedara, i Adbela, i Mibsama, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'i Misma, i Doma, i Masa, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'i Hadada, i Tema, i Jetora, i Nafisy ary i Kedema. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ireo no zanakalahin’Ismaela, ary ireo no anarany, araka ny vohiny sy ny tobiny, dia andriana roa amby folo araka ny fireneny avy. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fito amby telopolo amby zato taona ny andro niainan’Ismaela; dia niala aina izy ka maty ary nangonina any amin’ny razany. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ny taranany dia nonina hatrany Havila ka hatrany Sora izay tandrifin’i Ejipta amin’ny lalana mankany Asiria; nifanandrify tamin’ny rahalahiny rehetra no nitoerany.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: I Esao sy i Jakoba
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ireto no taranak’Isaka, zanakalahin’i Abrahama: '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izy dia niteraka an’i Zimrana, i Joksana, i Medana, i Midiana, i Jisbaka ary i Soaha tamin’i Abrahama. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I Abrahama dia niteraka an’Isaka. Efapolo taona Isaka raha nampakatra an’i Rebeka, zanakavavin’i Betoela arameana, avy tany Padana-Arama, sady anabavin’i Labana arameana. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Isaka dia nangataka tamin’NY TOMPO ho an’ny vadiny, satria momba izy, dia nohenoin’NY TOMPO ny fangatahany ka nanana anaka i Rebeka vadiny. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nifanosika ny zaza kambana tao an-kibony, dia hoy i Rebeka: Raha izany, nahoana re no dia toy izao aho? Sady lasa nanontany NY TOMPO izy. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy NY TOMPO taminy:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Firenena roa no ao an-kibonao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary vahoaka roa toko no hisaraka hatrany an-kibonao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny vahoaka iray toko dia hahery noho ny iray,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: koa ny zokiny dia hanompo ny zandriny.
  '24':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Nony tonga ny andro hahaterahany, indreo nisy zaza kambana tao an-kibony. '
  '25':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Dia teraka ny voalohany ka mena; tahaka ny akanjo volom-biby ny tenany manontolo ka nataony hoe Esao
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Esao: Voloina.'
      marker-yv: yv-n
    - type: text
      text: ' ny anarany. '
  '26':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Taorianan’izay dia teraka koa ny rahalahiny, ary ny tanany nihazona ny voditongotr’i Esao, dia nataony hoe Jakoba
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Jakoba: Mpamingana.'
      marker-yv: yv-n
    - type: text
      text: ' ny anarany. Enimpolo taona Isaka raha niteraka azy mirahalahy ireo.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nitombo ireo zaza ireo. I Esao dia lehilahy nahay nihaza, mpandehandeha any an-tsaha, fa i Jakoba kosa dia lehilahy tso-piaina sady mpitoetra an-tranolay. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary Isaka dia tia an’i Esao satria nankafy ny hazany izy; fa i Rebeka kosa dia tia an’i Jakoba.
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Indray andro, raha nahandro sakafo i Jakoba, dia tonga avy tany an-tsaha i Esao ka reraka. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary i Joksana dia niteraka an’i Sheba sy i Dedana. Ary ny zanakalahin’i Dedana dia i Asorima sy i Letosima ary i Leomima. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy i Esao tamin’i Jakoba: Mba omeo amin’io mena io aho hohaniko, dia io mena io, fa reraka aho. Izany no nanaovana ny anarany hoe Edoma'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.30 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Edoma: Mena.'
      marker-yv: yv-n
    - type: text
      text: '. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy anefa ny navalin’i Jakoba azy: Amidio amiko ary aloha ny fizokianao. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy kosa i Esao: Indro, ho faty ihany aho; koa misy antony inona amiko izay fizokiana? '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy i Jakoba: Mianiàna amiko ary aloha. Dia nianiana taminy izy ka namidiny tamin’i Jakoba ny fizokiany. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary nanome mofo sy voanemba masaka an’i Esao i Jakoba. Dia nihinana sy nisotro izy ary niainga ka lasa nandeha. Izany no nanamavoan’i Esao ny fizokiany.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ny zanakalahin’i Midiana dia i Efaha, i Efera, i Hanoka, i Abida ary i Eldaha. Ireo rehetra ireo no taranak’i Ketora.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia natolotr’i Abrahama an’Isaka izay rehetra nananany. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nefa samy notolorany fanomezana avy ireo zanak’i Abrahama tamin’ireo vady tsindranony hafa ka nampandehaniny hiala amin’Isaka zanany hiantsinanana ho any amin’ny tany atsinanana dieny mbola velona izy.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dimy amby fitopolo amby zato taona ny andro niainan’i Abrahama. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia niala aina i Abrahama ka maty, rehefa fotsy volo tsara sady lahiantitra ela niainana; dia nangonina any amin’ny razany izy. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nalevin’Isaka sy Ismaela zanany tao amin’ilay zohy ao Makpela izy; tao amin’ny sahan’i Efrona, zanak’i Zohara hetita, izay tandrifin’i Mamre izany. '
