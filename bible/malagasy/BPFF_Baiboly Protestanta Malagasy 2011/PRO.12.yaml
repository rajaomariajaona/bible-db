document_id: PRO.12
type_code: plt
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Izay tia fananarana no tia fahalalana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa izay mankahala anatra dia biby.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Mahazo sitraka amin’NY TOMPO ny tsara fanahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny mpamoron-tsain-dratsy dia hohelohiny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Tsy mahatafatoetra ny olona ny haratsiam-panahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa tsy mba hihetsika ny fototry ny marina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ny vehivavy vanona dia satroboninahitry ny lahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny vehivavy manao izay mahamenatra kosa dia tahaka ny fahalovana ao anatin’ny taolana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Avy amin’ny fisainan’ny marina ny rariny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa fitaka no sainin’ny ratsy fanahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ny tenin’ny ratsy fanahy dia vela-pandrika handatsahan-dra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny tenin’ny marina hamonjy azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Adaraboka ny ratsy fanahy ka tsy misy intsony,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa haharitra ny tranon’ny marina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Araka ny fahendren’ny olona no hiderana azy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa izay meloka am-po dia hatao tsinontsinona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Aleo olona tsy ambony toerana loatra, nefa manana mpanompo iray,
- type: usfm
  marker: q1
  children:
  - type: text
    text: toy izay mihambo ho be voninahitra, nefa tsy manan-kohanina akory.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ny marina dia mitsimbina ny ain’ny bibiny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa fahasiahana kosa no famindrampon’ny ratsy fanahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Izay miasa ny taniny dia ho voky hanina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa izay manenjika zava-poana dia tsy ampy saina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Maniry ny hazan’ny ratsy fanahy ny mpanota,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny marina kosa mamokatra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Amin’ny fahotan’ny molotra dia misy fandrika mampidi-doza,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ho afa-miala amin’ny fahoriana ny marina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ny vokatry ny tenin’ny olona no mahavoky soa azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hitsingerina aminy ny asan’ny tanany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ny lalan’ny adala dia heveriny ho mahitsy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa izay mino anatra no hendry.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ny fahasosoran’ny adala dia fantatra miaraka amin’izay,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa izay mahatsindry fo amin’ny fanalam-baraka no hendry.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Izay olona maneho ny marina dia manambara ny rariny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny vavolombelona mandainga kosa dia miteny fitaka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Misy mandefalefa teny tsy tsaroana ka tonga toy ny fanindron’ny sabatra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny lelan’ny marina kosa dia manasitrana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ny molotra marina dia tafaorina ho mandrakizay,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny lela mandainga dia indray mipy maso monja.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Fitaka no ao am-pon’izay mamorona sain-dratsy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa hafaliana no amin’izay misaina fiadanana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Tsy misy ratsy manjo ny marina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa heni-doza ny ratsy fanahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Fahavetavetana eo imason’NY TOMPO ny molotra mandainga,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa izay manao ny marina no ankasitrahany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Tsy mba mampideradera fahalalana foana ny olon-kendry,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny fon’ny adala mamoaka hadalana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Ny tanan’ny mazoto no hanapaka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa izay miraviravy tanana dia hampanompoina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Ny ahiahy ao am-pon’ny olona dia mampitanondrika azy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny teny soa no mampifaly azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Ny marina dia mitari-dalana ny namany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny alehan’ny ratsy fanahy kosa no mampivily lalana azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Tsy mahatono izay nohazainy ny kamo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa fananana soa ho an’ny olona kosa ny zoto.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Amin’ny lalan’ny fahamarinana no misy fiainana
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mankany amin’ny tsy fahafatesana ny lalan-kalehany.
