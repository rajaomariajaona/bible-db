document_id: PRO.12,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Izay tia fananarana no tia fahalalana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa izay mankahala anatra dia biby.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Ny marina dia mitsimbina ny ain’ny bibiny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa fahasiahana kosa no famindrampon’ny ratsy fanahy.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Izay miasa ny taniny dia ho voky hanina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa izay manenjika zava-poana dia tsy ampy saina.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Maniry ny hazan’ny ratsy fanahy ny mpanota,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny marina kosa mamokatra.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Amin’ny fahotan’ny molotra dia misy fandrika mampidi-doza,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ho afa-miala amin’ny fahoriana ny marina.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Ny vokatry ny tenin’ny olona no mahavoky soa azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hitsingerina aminy ny asan’ny tanany.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Ny lalan’ny adala dia heveriny ho mahitsy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa izay mino anatra no hendry.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Ny fahasosoran’ny adala dia fantatra miaraka amin’izay,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa izay mahatsindry fo amin’ny fanalam-baraka no hendry.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Izay olona maneho ny marina dia manambara ny rariny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny vavolombelona mandainga kosa dia miteny fitaka.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Misy mandefalefa teny tsy tsaroana ka tonga toy ny fanindron’ny sabatra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny lelan’ny marina kosa dia manasitrana.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Ny molotra marina dia tafaorina ho mandrakizay,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny lela mandainga dia indray mipy maso monja.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Mahazo sitraka amin’NY TOMPO ny tsara fanahy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny mpamoron-tsain-dratsy dia hohelohiny.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Fitaka no ao am-pon’izay mamorona sain-dratsy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa hafaliana no amin’izay misaina fiadanana.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Tsy misy ratsy manjo ny marina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa heni-doza ny ratsy fanahy.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Fahavetavetana eo imason’NY TOMPO ny molotra mandainga,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa izay manao ny marina no ankasitrahany.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Tsy mba mampideradera fahalalana foana ny olon-kendry,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny fon’ny adala mamoaka hadalana.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Ny tanan’ny mazoto no hanapaka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa izay miraviravy tanana dia hampanompoina.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Ny ahiahy ao am-pon’ny olona dia mampitanondrika azy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny teny soa no mampifaly azy.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Ny marina dia mitari-dalana ny namany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny alehan’ny ratsy fanahy kosa no mampivily lalana azy.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Tsy mahatono izay nohazainy ny kamo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa fananana soa ho an’ny olona kosa ny zoto.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Amin’ny lalan’ny fahamarinana no misy fiainana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mankany amin’ny tsy fahafatesana ny lalan-kalehany.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Tsy mahatafatoetra ny olona ny haratsiam-panahy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa tsy mba hihetsika ny fototry ny marina.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Ny vehivavy vanona dia satroboninahitry ny lahy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny vehivavy manao izay mahamenatra kosa dia tahaka ny fahalovana ao anatin’ny taolana.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Avy amin’ny fisainan’ny marina ny rariny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa fitaka no sainin’ny ratsy fanahy.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Ny tenin’ny ratsy fanahy dia vela-pandrika handatsahan-dra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny tenin’ny marina hamonjy azy.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Adaraboka ny ratsy fanahy ka tsy misy intsony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa haharitra ny tranon’ny marina.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Araka ny fahendren’ny olona no hiderana azy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa izay meloka am-po dia hatao tsinontsinona.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Aleo olona tsy ambony toerana loatra, nefa manana mpanompo iray,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toy izay mihambo ho be voninahitra, nefa tsy manan-kohanina akory.
