document_id: PRO.12,3103
type_code: plt
verses:
  '1':
  - type: text
    content: Izay tia fananarana no tia fahalalana,
  - type: text
    content: fa izay mankahala anatra dia biby.
  '10':
  - type: text
    content: Ny marina dia mitsimbina ny ain’ny bibiny,
  - type: text
    content: fa fahasiahana kosa no famindrampon’ny ratsy fanahy.
  '11':
  - type: text
    content: Izay miasa ny taniny dia ho voky hanina,
  - type: text
    content: fa izay manenjika zava-poana dia tsy ampy saina.
  '12':
  - type: text
    content: Maniry ny hazan’ny ratsy fanahy ny mpanota,
  - type: text
    content: fa ny marina kosa mamokatra.
  '13':
  - type: text
    content: Amin’ny fahotan’ny molotra dia misy fandrika mampidi-doza,
  - type: text
    content: fa ho afa-miala amin’ny fahoriana ny marina.
  '14':
  - type: text
    content: Ny vokatry ny tenin’ny olona no mahavoky soa azy
  - type: text
    content: ary hitsingerina aminy ny asan’ny tanany.
  '15':
  - type: text
    content: Ny lalan’ny adala dia heveriny ho mahitsy,
  - type: text
    content: fa izay mino anatra no hendry.
  '16':
  - type: text
    content: Ny fahasosoran’ny adala dia fantatra miaraka amin’izay,
  - type: text
    content: fa izay mahatsindry fo amin’ny fanalam-baraka no hendry.
  '17':
  - type: text
    content: Izay olona maneho ny marina dia manambara ny rariny,
  - type: text
    content: fa ny vavolombelona mandainga kosa dia miteny fitaka.
  '18':
  - type: text
    content: Misy mandefalefa teny tsy tsaroana ka tonga toy ny fanindron’ny sabatra,
  - type: text
    content: fa ny lelan’ny marina kosa dia manasitrana.
  '19':
  - type: text
    content: Ny molotra marina dia tafaorina ho mandrakizay,
  - type: text
    content: fa ny lela mandainga dia indray mipy maso monja.
  '2':
  - type: text
    content: Mahazo sitraka amin’NY TOMPO ny tsara fanahy,
  - type: text
    content: fa ny mpamoron-tsain-dratsy dia hohelohiny.
  '20':
  - type: text
    content: Fitaka no ao am-pon’izay mamorona sain-dratsy,
  - type: text
    content: fa hafaliana no amin’izay misaina fiadanana.
  '21':
  - type: text
    content: Tsy misy ratsy manjo ny marina,
  - type: text
    content: fa heni-doza ny ratsy fanahy.
  '22':
  - type: text
    content: Fahavetavetana eo imason’NY TOMPO ny molotra mandainga,
  - type: text
    content: fa izay manao ny marina no ankasitrahany.
  '23':
  - type: text
    content: Tsy mba mampideradera fahalalana foana ny olon-kendry,
  - type: text
    content: fa ny fon’ny adala mamoaka hadalana.
  '24':
  - type: text
    content: Ny tanan’ny mazoto no hanapaka,
  - type: text
    content: fa izay miraviravy tanana dia hampanompoina.
  '25':
  - type: text
    content: Ny ahiahy ao am-pon’ny olona dia mampitanondrika azy,
  - type: text
    content: fa ny teny soa no mampifaly azy.
  '26':
  - type: text
    content: Ny marina dia mitari-dalana ny namany,
  - type: text
    content: fa ny alehan’ny ratsy fanahy kosa no mampivily lalana azy.
  '27':
  - type: text
    content: Tsy mahatono izay nohazainy ny kamo,
  - type: text
    content: fa fananana soa ho an’ny olona kosa ny zoto.
  '28':
  - type: text
    content: Amin’ny lalan’ny fahamarinana no misy fiainana
  - type: text
    content: ary mankany amin’ny tsy fahafatesana ny lalan-kalehany.
  '3':
  - type: text
    content: Tsy mahatafatoetra ny olona ny haratsiam-panahy,
  - type: text
    content: fa tsy mba hihetsika ny fototry ny marina.
  '4':
  - type: text
    content: Ny vehivavy vanona dia satroboninahitry ny lahy,
  - type: text
    content: fa ny vehivavy manao izay mahamenatra kosa dia tahaka ny fahalovana ao anatin’ny taolana.
  '5':
  - type: text
    content: Avy amin’ny fisainan’ny marina ny rariny,
  - type: text
    content: fa fitaka no sainin’ny ratsy fanahy.
  '6':
  - type: text
    content: Ny tenin’ny ratsy fanahy dia vela-pandrika handatsahan-dra,
  - type: text
    content: fa ny tenin’ny marina hamonjy azy.
  '7':
  - type: text
    content: Adaraboka ny ratsy fanahy ka tsy misy intsony,
  - type: text
    content: fa haharitra ny tranon’ny marina.
  '8':
  - type: text
    content: Araka ny fahendren’ny olona no hiderana azy,
  - type: text
    content: fa izay meloka am-po dia hatao tsinontsinona.
  '9':
  - type: text
    content: Aleo olona tsy ambony toerana loatra, nefa manana mpanompo iray,
  - type: text
    content: toy izay mihambo ho be voninahitra, nefa tsy manan-kohanina akory.
