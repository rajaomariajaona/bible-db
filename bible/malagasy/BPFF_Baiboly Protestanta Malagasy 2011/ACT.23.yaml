document_id: ACT.23,3103
type_code: plt
verses:
  '1':
  - type: text
    content: 'Nibanjina ny '
  - type: text
    content: Sinedriona
  - type: text
    content: ' i Paoly ka niteny hoe: Ry rahalahy, izaho dia nanompo an’Andriamanitra tamin’ny fieritreretana tsara mandraka androany. '
  '10':
  - type: text
    content: 'Rehefa nihamafy ny fifandirana dia natahotra ny mpifehy arivo, fandrao hopotipotehin’izy ireo i Paoly ka nasainy nidina haka azy an-keriny hiala teo afovoany ny miaramila ary hitondra azy ho any an-dapa. '
  '11':
  - type: text
    content: 'Nitsangana teo anilany ny Tompo tamin’iny alina iny ka niteny hoe: Matokia! Tahaka ny nanambarànao Ahy tany Jerosalema no tsy maintsy mbola hanambarànao Ahy any Roma koa.'
  - type: heading
    content: Teti-dratsy hamonoana an’i Paoly
  '12':
  - type: text
    content: 'Nony maraina dia niray tetika ny '
  - type: text
    content: Jiosy
  - type: text
    content: ' ka niozona sy nianiana fa tsy hihinana na hisotro raha tsy mahafaty an’i Paoly. '
  '13':
  - type: text
    content: 'Efapolo mahery izy no niray tetika tamin’izany. '
  '14':
  - type: text
    content: 'Nankany amin’ny lehiben’ny mpisorona sy ny loholona izy ireo ka niteny hoe: Efa niozona sy nianiana izahay fa tsy hanandran-javatra na inona na inona raha tsy mahafaty an’i Paoly. '
  '15':
  - type: text
    content: 'Koa ankehitriny dia ilazaonareo ny mpifehy arivo sy ny '
  - type: text
    content: Sinedriona
  - type: text
    content: ' mba hampidina azy hankaty aminareo ka mody milaza ianareo fa ta hamototra azy marimarina kokoa ny amin’izay nataony; ary izahay kosa moa dia efa vonona hamono azy, mialoha ny hahatongavany atỳ.'
  '16':
  - type: text
    content: 'Nony ren’ny zanak’anabavin’i Paoly ny vela-pandrika dia lasa nankany anaty rova izy ka nilaza tamin’i Paoly. '
  '17':
  - type: text
    content: 'Ary niantso ny kapiteny iray hankeo aminy i Paoly ka niteny hoe: Ento mankany amin’ny mpifehy arivo ity zatovo ity fa manan-teny holazaina aminy. '
  '18':
  - type: text
    content: 'Dia nandray azy ilay kapiteny ka nitondra azy ho any amin’ny mpifehy arivo, niteny hoe: I Paoly mpifatotra no niantso ahy hankeo aminy ka nangataka ahy hitondra ity zatovo ity hanketo aminao, fa manan-teny holazaina aminao, hono, izy. '
  '19':
  - type: text
    content: 'Dia noraisin’ilay mpifehy arivo tamin’ny tanany izy ka nony efa nitokana tao amin’ny mangingina izy ireo dia nanontaniany hoe: Inona moa no teny holazainao amiko? '
  '2':
  - type: text
    content: 'Dia nandidy ireo izay nitsangana teo anilany hikapoka ny vavany i Ananiasy '
  - type: text
    content: mpisoronabe
  - type: text
    content: '. '
  '20':
  - type: text
    content: 'Hoy ilay zatovo: Ny Jiosy dia efa nifanaiky hangataka aminao hampidina an’i Paoly ho any amin’ny Sinedriona rahampitso, mody milaza izy fa ta hanadina azy marimarina kokoa. '
  '21':
  - type: text
    content: 'Koa aza manaiky azy ianao, fa mihoatra ny efapolo lahy izy ireo no miray tetika hisambotra an’i Paoly ka efa niozona sy nianiana fa tsy hihinana na hisotro raha tsy maty izy; ary efa vonona izy ankehitriny ka miandry ny teny avy atỳ aminao fotsiny. '
  '22':
  - type: text
    content: 'Ary ny mpifehy arivo dia nampandeha ilay zatovo ka nanafatrafatra hoe: Aza lazaina na amin’iza na amin’iza izany zavatra nampahafantarinao ahy izany.'
  - type: heading
    content: Nafindra tany Kaisaria i Paoly
  '23':
  - type: text
    content: 'Niantso kapiteny roa lahy hankeo aminy izy avy eo ka niteny hoe: Manomàna miaramila roanjato lahy sy mpitaingin-tsoavaly fitopolo ary mpitondra lefona roanjato hankany Kaisaria anio alina amin’ny ora fahatelo; '
  '24':
  - type: text
    content: 'itondray biby koa hitaingenan’i Paoly hitondra azy soa amantsara ho any amin’i Feliksa governora. '
  '25':
  - type: text
    content: 'Dia nanoratra taratasy nisy izao teny izao izy:'
  '26':
  - type: text
    content: 'Miarahaba an’i Feliksa, governora tsara indrindra, i Klaodio Lisia. '
  '27':
  - type: text
    content: 'Ity lehilahy ity dia nosamborin’ny '
  - type: text
    content: Jiosy
  - type: text
    content: ' ka efa saika novonoiny; fa nony fantatro fa Romana izy dia nitondra miaramila aho ka namonjy azy. '
  '28':
  - type: text
    content: 'Ary satria ta hahalala tsara izay niampangany azy aho dia nentiko nidina teo amin’ny '
  - type: text
    content: Sinedriona
  - type: text
    content: ' izy; '
  '29':
  - type: text
    content: 'koa hitako fa adihevitra ny amin’ny lalànany no niampangany azy fa tsy nisy fiampangana azy izay tokony hahafaty na hamatorana azy. '
  '3':
  - type: text
    content: 'Hoy i Paoly taminy: Andriamanitra no hikapoka anao, ry manda voalalotra fotsy; ianao va no mipetraka hitsara ahy araka ny lalàna, nefa asainao kapohina tsy araka ny lalàna aho? '
  '30':
  - type: text
    content: Koa rehefa voalaza tamiko fa nisy nikasa hanao teti-dratsy hisamborana an-dRalehilahy dia nandefa iraka haingana hitondra azy atỳ aminao aho, ary ny mpiampanga koa nasaiko milaza atỳ anatrehanao izay iampangany azy.
  '31':
  - type: text
    content: 'Dia nalain’ny miaramila i Paoly araka ny nandidiana azy ka noentiny iny alina iny ihany ho any Antipatria. '
  '32':
  - type: text
    content: 'Nony ampitso dia navelany handeha hiaraka aminy ny mpitaingin-tsoavaly, fa izy ireo kosa dia niverina ho any an-dapa. '
  '33':
  - type: text
    content: 'Rehefa tonga tany Kaisaria ireo dia nanolotra ny taratasy tamin’ny governora sady nanolotra an’i Paoly ho eo anatrehany koa. '
  '34':
  - type: text
    content: 'Ary rehefa novakiny ilay taratasy dia nanontany izay faritany niavian’i Paoly izy; koa rehefa fantany fa avy tany Kilikia izy '
  '35':
  - type: text
    content: 'dia hoy izy: Hihaino tsara ny teninao aho rehefa tonga atỳ ny mpiampanga anao. Dia nasainy nambenana tao an-dapan’i Heroda izy.'
  '4':
  - type: text
    content: 'Ary izay nitsangana teo dia niteny hoe: Tevatevainao va ny mpisoronaben’Andriamanitra? '
  '5':
  - type: text
    content: 'Hoy i Paoly: Tsy fantatro fa Mpisoronabe izy, ry rahalahy; fa voasoratra hoe:'
  - type: text
    content: «Aza miteny ratsy ny mpitondra ny firenenao» (Eks 22.27).
  '6':
  - type: text
    content: 'Rehefa fantatr’i Paoly fa '
  - type: text
    content: Sadoseo
  - type: text
    content: ' ny sasany, ary ny sasany kosa '
  - type: text
    content: Fariseo
  - type: text
    content: ', dia niantso teo amin’ny Sinedriona izy hoe: Ry rahalahy, izaho dia Fariseo, zanaky ny Fariseo; ny amin’ny fanantenana sy ny fitsanganan’ny maty no itsarana ahy. '
  '7':
  - type: text
    content: 'Ary rehefa nilaza izany izy dia nifanditra ny Fariseo sy ny Sadoseo ka nizara roa toko ny olona. '
  '8':
  - type: text
    content: 'Ny Sadoseo mantsy dia milaza hoe: Tsy misy ny fitsanganan’ny maty, sady tsy misy ny anjely na ny fanahy, nefa neken’ny Fariseo avokoa ireo. '
  '9':
  - type: text
    content: 'Dia nisy antsoantso nankarenina teo, ary nitsangana ny mpanoradalàna sasany, izay isan’ny antoko atao hoe Fariseo, ka niady hevitra ary niteny hoe: Tsy hitanay izay helok’io lehilahy io; fa sao dia fanahy na anjely no niteny taminy.'
