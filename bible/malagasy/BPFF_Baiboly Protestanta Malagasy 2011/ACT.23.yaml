document_id: ACT.23
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Nibanjina ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Sinedriona
  - type: text
    text: ' i Paoly ka niteny hoe: Ry rahalahy, izaho dia nanompo an’Andriamanitra tamin’ny fieritreretana tsara mandraka androany. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Dia nandidy ireo izay nitsangana teo anilany hikapoka ny vavany i Ananiasy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpisoronabe
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Hoy i Paoly taminy: Andriamanitra no hikapoka anao, ry manda voalalotra fotsy; ianao va no mipetraka hitsara ahy araka ny lalàna, nefa asainao kapohina tsy araka ny lalàna aho? '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary izay nitsangana teo dia niteny hoe: Tevatevainao va ny mpisoronaben’Andriamanitra? '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Hoy i Paoly: Tsy fantatro fa Mpisoronabe izy, ry rahalahy; fa voasoratra hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Aza miteny ratsy ny mpitondra ny firenenao» (Eks 22.27).
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Rehefa fantatr’i Paoly fa '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Sadoseo
  - type: text
    text: ' ny sasany, ary ny sasany kosa '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Fariseo
  - type: text
    text: ', dia niantso teo amin’ny Sinedriona izy hoe: Ry rahalahy, izaho dia Fariseo, zanaky ny Fariseo; ny amin’ny fanantenana sy ny fitsanganan’ny maty no itsarana ahy. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary rehefa nilaza izany izy dia nifanditra ny Fariseo sy ny Sadoseo ka nizara roa toko ny olona. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ny Sadoseo mantsy dia milaza hoe: Tsy misy ny fitsanganan’ny maty, sady tsy misy ny anjely na ny fanahy, nefa neken’ny Fariseo avokoa ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Dia nisy antsoantso nankarenina teo, ary nitsangana ny mpanoradalàna sasany, izay isan’ny antoko atao hoe Fariseo, ka niady hevitra ary niteny hoe: Tsy hitanay izay helok’io lehilahy io; fa sao dia fanahy na anjely no niteny taminy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Rehefa nihamafy ny fifandirana dia natahotra ny mpifehy arivo, fandrao hopotipotehin’izy ireo i Paoly ka nasainy nidina haka azy an-keriny hiala teo afovoany ny miaramila ary hitondra azy ho any an-dapa. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Nitsangana teo anilany ny Tompo tamin’iny alina iny ka niteny hoe: Matokia! Tahaka ny nanambarànao Ahy tany Jerosalema no tsy maintsy mbola hanambarànao Ahy any Roma koa.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Teti-dratsy hamonoana an’i Paoly
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Nony maraina dia niray tetika ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jiosy
  - type: text
    text: ' ka niozona sy nianiana fa tsy hihinana na hisotro raha tsy mahafaty an’i Paoly. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Efapolo mahery izy no niray tetika tamin’izany. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Nankany amin’ny lehiben’ny mpisorona sy ny loholona izy ireo ka niteny hoe: Efa niozona sy nianiana izahay fa tsy hanandran-javatra na inona na inona raha tsy mahafaty an’i Paoly. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Koa ankehitriny dia ilazaonareo ny mpifehy arivo sy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Sinedriona
  - type: text
    text: ' mba hampidina azy hankaty aminareo ka mody milaza ianareo fa ta hamototra azy marimarina kokoa ny amin’izay nataony; ary izahay kosa moa dia efa vonona hamono azy, mialoha ny hahatongavany atỳ.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Nony ren’ny zanak’anabavin’i Paoly ny vela-pandrika dia lasa nankany anaty rova izy ka nilaza tamin’i Paoly. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary niantso ny kapiteny iray hankeo aminy i Paoly ka niteny hoe: Ento mankany amin’ny mpifehy arivo ity zatovo ity fa manan-teny holazaina aminy. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Dia nandray azy ilay kapiteny ka nitondra azy ho any amin’ny mpifehy arivo, niteny hoe: I Paoly mpifatotra no niantso ahy hankeo aminy ka nangataka ahy hitondra ity zatovo ity hanketo aminao, fa manan-teny holazaina aminao, hono, izy. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Dia noraisin’ilay mpifehy arivo tamin’ny tanany izy ka nony efa nitokana tao amin’ny mangingina izy ireo dia nanontaniany hoe: Inona moa no teny holazainao amiko? '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Hoy ilay zatovo: Ny Jiosy dia efa nifanaiky hangataka aminao hampidina an’i Paoly ho any amin’ny Sinedriona rahampitso, mody milaza izy fa ta hanadina azy marimarina kokoa. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Koa aza manaiky azy ianao, fa mihoatra ny efapolo lahy izy ireo no miray tetika hisambotra an’i Paoly ka efa niozona sy nianiana fa tsy hihinana na hisotro raha tsy maty izy; ary efa vonona izy ankehitriny ka miandry ny teny avy atỳ aminao fotsiny. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary ny mpifehy arivo dia nampandeha ilay zatovo ka nanafatrafatra hoe: Aza lazaina na amin’iza na amin’iza izany zavatra nampahafantarinao ahy izany.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nafindra tany Kaisaria i Paoly
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Niantso kapiteny roa lahy hankeo aminy izy avy eo ka niteny hoe: Manomàna miaramila roanjato lahy sy mpitaingin-tsoavaly fitopolo ary mpitondra lefona roanjato hankany Kaisaria anio alina amin’ny ora fahatelo; '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'itondray biby koa hitaingenan’i Paoly hitondra azy soa amantsara ho any amin’i Feliksa governora. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Dia nanoratra taratasy nisy izao teny izao izy:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Miarahaba an’i Feliksa, governora tsara indrindra, i Klaodio Lisia. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ity lehilahy ity dia nosamborin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jiosy
  - type: text
    text: ' ka efa saika novonoiny; fa nony fantatro fa Romana izy dia nitondra miaramila aho ka namonjy azy. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ary satria ta hahalala tsara izay niampangany azy aho dia nentiko nidina teo amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Sinedriona
  - type: text
    text: ' izy; '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'koa hitako fa adihevitra ny amin’ny lalànany no niampangany azy fa tsy nisy fiampangana azy izay tokony hahafaty na hamatorana azy. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Koa rehefa voalaza tamiko fa nisy nikasa hanao teti-dratsy hisamborana an-dRalehilahy dia nandefa iraka haingana hitondra azy atỳ aminao aho, ary ny mpiampanga koa nasaiko milaza atỳ anatrehanao izay iampangany azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Dia nalain’ny miaramila i Paoly araka ny nandidiana azy ka noentiny iny alina iny ihany ho any Antipatria. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Nony ampitso dia navelany handeha hiaraka aminy ny mpitaingin-tsoavaly, fa izy ireo kosa dia niverina ho any an-dapa. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Rehefa tonga tany Kaisaria ireo dia nanolotra ny taratasy tamin’ny governora sady nanolotra an’i Paoly ho eo anatrehany koa. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ary rehefa novakiny ilay taratasy dia nanontany izay faritany niavian’i Paoly izy; koa rehefa fantany fa avy tany Kilikia izy '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'dia hoy izy: Hihaino tsara ny teninao aho rehefa tonga atỳ ny mpiampanga anao. Dia nasainy nambenana tao an-dapan’i Heroda izy.'
