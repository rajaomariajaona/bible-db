document_id: PRO.10,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Anatra samihafa
  - type: text
    content: Anatra samihafa nataon’i Solomona.
  - type: text
    content: Ny zanaka hendry dia mahafaly ny rainy,
  - type: text
    content: fa ny zanaka adala mampalahelo ny reniny.
  '10':
  - type: text
    content: Izay mipy maso dia manome alahelo
  - type: text
    content: ary ny molotry ny adala dia mandavo ny tenany.
  '11':
  - type: text
    content: Loharanon’aina ny tenin’ny marina,
  - type: text
    content: fa loza no afenin’ny tenin’ny ratsy fanahy.
  '12':
  - type: text
    content: Ny fankahalana dia manetsika adilahy,
  - type: text
    content: fa ny fitiavana no manarona ny ota rehetra.
  '13':
  - type: text
    content: Amin’ny molotry ny manan-tsaina no ahitana fahendrena,
  - type: text
    content: fa hazo fikapohana kosa no ho amin’ny lamosin’ny tsy ampy saina.
  '14':
  - type: text
    content: Ny hendry mirakitra fahalalana,
  - type: text
    content: fa ny tenin’ny adala dia fandringanana mitatao.
  '15':
  - type: text
    content: Ny harenan’ny manankarena dia vohitra mafy ho azy,
  - type: text
    content: fa ny tsy fananan’ny ory no fandringanana azy.
  '16':
  - type: text
    content: Ho fiainana ny asan’ny marina,
  - type: text
    content: fa ho ota ny fitomboan’ny harenan’ny ratsy fanahy.
  '17':
  - type: text
    content: Izay mino anatra dia ho tonga eo amin’ny lalan’ny fiainana,
  - type: text
    content: fa mivily lalana izay manadino anatra.
  '18':
  - type: text
    content: Izay mitahiry lolompo dia manana molotra mandainga
  - type: text
    content: ary izay mampiely endrikendrika dia adala.
  '19':
  - type: text
    content: Ny teny maro dia tsy ilaozan’izay ota,
  - type: text
    content: fa izay mahatana ny molony no hendry.
  '2':
  - type: text
    content: Ny harena azo tamin’ny tsy marina dia tsy mahasoa akory,
  - type: text
    content: fa ny fahamarinana no mamonjy amin’ny fahafatesana.
  '20':
  - type: text
    content: Volafotsy voafantina ny lelan’ny marina,
  - type: text
    content: fa ny fon’ny ratsy fanahy dia tsy misy vidiny.
  '21':
  - type: text
    content: Ny molotry ny marina dia mamelona ny maro,
  - type: text
    content: fa maty ny adala noho ny tsy fananany fahalalana.
  '22':
  - type: text
    content: Ny fitahian’NY TOMPO no mampanankarena
  - type: text
    content: ary tsy ampiany fisasarana izany.
  '23':
  - type: text
    content: Toa kilalaon’ny adala ny fanaovan-dratsy,
  - type: text
    content: fa ny an’ny manan-tsaina kosa dia ny fahendrena.
  '24':
  - type: text
    content: Izay atahoran’ny ratsy fanahy dia hihatra aminy,
  - type: text
    content: fa izay irin’ny marina kosa no homena azy.
  '25':
  - type: text
    content: Rehefa mipaoka ny tafio-drivotra dia tsy ao intsony ny ratsy fanahy,
  - type: text
    content: fa ny marina dia ho tafaorina mandrakizay.
  '26':
  - type: text
    content: Toy ny vinaingitra amin’ny nify sy ny setroka amin’ny maso,
  - type: text
    content: dia toy izany ny malaina amin’izay maniraka azy.
  '27':
  - type: text
    content: Ny fahatahorana NY TOMPO no mahela velona,
  - type: text
    content: fa ny taonan’ny ratsy fanahy dia hohafohezina.
  '28':
  - type: text
    content: Ny fanantenan’ny marina dia fifaliana,
  - type: text
    content: fa levona kosa ny fanantenan’ny ratsy fanahy.
  '29':
  - type: text
    content: Ny lalan’NY TOMPO dia fiarovana mafy ho an’izay tsy misy tsiny,
  - type: text
    content: fa faharinganana kosa ho an’ny mpanao ratsy.
  '3':
  - type: text
    content: Tsy avelan’NY TOMPO ho mosarena ny marina,
  - type: text
    content: fa foanany ny fitsiriritan’ny ratsy fanahy.
  '30':
  - type: text
    content: Tsy hangozohozo mandrakizay ny marina,
  - type: text
    content: fa ny ratsy fanahy dia tsy honina amin’ny tany.
  '31':
  - type: text
    content: Mamokatra fahendrena ny tenin’ny marina,
  - type: text
    content: fa hofongorana ny lela fandainga.
  '32':
  - type: text
    content: Ny molotry ny marina dia mahalala izay ankasitrahana,
  - type: text
    content: fa ny tenin’ny ratsy fanahy dia feno fitaka.
  '4':
  - type: text
    content: Ho tonga mahantra ny miraviravy tanana amin’ny asany,
  - type: text
    content: fa mampanankarena ny tanan’ny mazoto.
  '5':
  - type: text
    content: Izay manangona amin’ny fararano no olona hendry;
  - type: text
    content: fa izay sondrian-tory amin’ny taom-pijinjana no olona mampahamenatra.
  '6':
  - type: text
    content: Fitahiana no ho eo amin’ny lohan’ny marina,
  - type: text
    content: fa loza no afenin’ny tenin’ny ratsy fanahy.
  '7':
  - type: text
    content: Ny fahatsiarovana ny marina dia fitahiana,
  - type: text
    content: fa ho lo ny anaran’ny ratsy fanahy.
  '8':
  - type: text
    content: Izay hendry am-po no mandray ny didy,
  - type: text
    content: fa ho lavo ny adala tsy mahay mangina.
  '9':
  - type: text
    content: Izay mandeha tsy misy tsiny no mandeha tsy manana ahiahy,
  - type: text
    content: fa izay maniasia amin’ny alehany dia fantatra ihany.
