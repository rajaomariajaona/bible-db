document_id: PRO.10
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Anatra samihafa
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Anatra samihafa nataon’i Solomona.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny zanaka hendry dia mahafaly ny rainy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny zanaka adala mampalahelo ny reniny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ny harena azo tamin’ny tsy marina dia tsy mahasoa akory,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny fahamarinana no mamonjy amin’ny fahafatesana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Tsy avelan’NY TOMPO ho mosarena ny marina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa foanany ny fitsiriritan’ny ratsy fanahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ho tonga mahantra ny miraviravy tanana amin’ny asany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa mampanankarena ny tanan’ny mazoto.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Izay manangona amin’ny fararano no olona hendry;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa izay sondrian-tory amin’ny taom-pijinjana no olona mampahamenatra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Fitahiana no ho eo amin’ny lohan’ny marina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa loza no afenin’ny tenin’ny ratsy fanahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ny fahatsiarovana ny marina dia fitahiana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ho lo ny anaran’ny ratsy fanahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Izay hendry am-po no mandray ny didy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ho lavo ny adala tsy mahay mangina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Izay mandeha tsy misy tsiny no mandeha tsy manana ahiahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa izay maniasia amin’ny alehany dia fantatra ihany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Izay mipy maso dia manome alahelo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny molotry ny adala dia mandavo ny tenany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Loharanon’aina ny tenin’ny marina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa loza no afenin’ny tenin’ny ratsy fanahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ny fankahalana dia manetsika adilahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny fitiavana no manarona ny ota rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Amin’ny molotry ny manan-tsaina no ahitana fahendrena,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa hazo fikapohana kosa no ho amin’ny lamosin’ny tsy ampy saina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ny hendry mirakitra fahalalana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny tenin’ny adala dia fandringanana mitatao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ny harenan’ny manankarena dia vohitra mafy ho azy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny tsy fananan’ny ory no fandringanana azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ho fiainana ny asan’ny marina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ho ota ny fitomboan’ny harenan’ny ratsy fanahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Izay mino anatra dia ho tonga eo amin’ny lalan’ny fiainana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa mivily lalana izay manadino anatra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Izay mitahiry lolompo dia manana molotra mandainga
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary izay mampiely endrikendrika dia adala.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ny teny maro dia tsy ilaozan’izay ota,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa izay mahatana ny molony no hendry.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Volafotsy voafantina ny lelan’ny marina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny fon’ny ratsy fanahy dia tsy misy vidiny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ny molotry ny marina dia mamelona ny maro,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa maty ny adala noho ny tsy fananany fahalalana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ny fitahian’NY TOMPO no mampanankarena
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy ampiany fisasarana izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Toa kilalaon’ny adala ny fanaovan-dratsy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny an’ny manan-tsaina kosa dia ny fahendrena.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Izay atahoran’ny ratsy fanahy dia hihatra aminy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa izay irin’ny marina kosa no homena azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Rehefa mipaoka ny tafio-drivotra dia tsy ao intsony ny ratsy fanahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny marina dia ho tafaorina mandrakizay.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Toy ny vinaingitra amin’ny nify sy ny setroka amin’ny maso,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia toy izany ny malaina amin’izay maniraka azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Ny fahatahorana NY TOMPO no mahela velona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny taonan’ny ratsy fanahy dia hohafohezina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Ny fanantenan’ny marina dia fifaliana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa levona kosa ny fanantenan’ny ratsy fanahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Ny lalan’NY TOMPO dia fiarovana mafy ho an’izay tsy misy tsiny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa faharinganana kosa ho an’ny mpanao ratsy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Tsy hangozohozo mandrakizay ny marina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny ratsy fanahy dia tsy honina amin’ny tany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Mamokatra fahendrena ny tenin’ny marina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa hofongorana ny lela fandainga.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Ny molotry ny marina dia mahalala izay ankasitrahana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny tenin’ny ratsy fanahy dia feno fitaka.
