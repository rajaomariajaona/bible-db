document_id: PSA.61,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Te hitoetra mandrakizay ao an-dainao aho
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: Ho an’ny mpiventy hira. Hampiarahina amin’ny valiha. Nataon’i Davida.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Henoy ny fitarainako, Andriamanitra ô;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: atongilano ny sofinao amin’ny vavaka ataoko!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Avy atỳ am-paran’ny tany no iantsoako Anao fa reraka ny foko.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ento aho ho any amin’ny vatolampy izay avo loatra ka tsy tratrako.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Fa fialofako Ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tilikambo fiambenana mafy handosirako ny fahavalo.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Te hitoetra ao an-dainao mandrakizay aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ka hialoka ao ambanin’ny elatrao. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Fiatoana.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Fa Ianao, Andriamanitra ô, efa nandre ny voadiko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: efa nomenao ahy ny lovan’izay matahotra ny anaranao.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Halavao ny andron’ny mpanjaka;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aoka ny taonany hahatratra ny taranaka maro!
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Aoka hitoetra eo anatrehan’Andriamanitra mandrakizay izy!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Famindrampo sy fahamarinana no tendreo hiaro azy;
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: dia izany no hankalazako ny anaranao mandrakizay
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hanefako isanandro ny voadiko!
