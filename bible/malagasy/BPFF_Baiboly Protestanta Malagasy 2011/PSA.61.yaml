document_id: PSA.61,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Te hitoetra mandrakizay ao an-dainao aho
  - type: text
    content: Ho an’ny mpiventy hira. Hampiarahina amin’ny valiha. Nataon’i Davida.
  - type: text
    content: Henoy ny fitarainako, Andriamanitra ô;
  - type: text
    content: atongilano ny sofinao amin’ny vavaka ataoko!
  '2':
  - type: text
    content: Avy atỳ am-paran’ny tany no iantsoako Anao fa reraka ny foko.
  - type: text
    content: Ento aho ho any amin’ny vatolampy izay avo loatra ka tsy tratrako.
  '3':
  - type: text
    content: Fa fialofako Ianao
  - type: text
    content: ary tilikambo fiambenana mafy handosirako ny fahavalo.
  '4':
  - type: text
    content: Te hitoetra ao an-dainao mandrakizay aho
  - type: text
    content: 'ka hialoka ao ambanin’ny elatrao. '
  - type: text
    content: Fiatoana.
  '5':
  - type: text
    content: Fa Ianao, Andriamanitra ô, efa nandre ny voadiko;
  - type: text
    content: efa nomenao ahy ny lovan’izay matahotra ny anaranao.
  '6':
  - type: text
    content: Halavao ny andron’ny mpanjaka;
  - type: text
    content: aoka ny taonany hahatratra ny taranaka maro!
  '7':
  - type: text
    content: Aoka hitoetra eo anatrehan’Andriamanitra mandrakizay izy!
  - type: text
    content: Famindrampo sy fahamarinana no tendreo hiaro azy;
  '8':
  - type: text
    content: dia izany no hankalazako ny anaranao mandrakizay
  - type: text
    content: mba hanefako isanandro ny voadiko!
