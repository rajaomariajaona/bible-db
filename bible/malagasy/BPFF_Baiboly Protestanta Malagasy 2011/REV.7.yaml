document_id: REV.7
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny olona voaisy tombo-kase
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Rehefa afaka izany dia hitako fa indreo, nisy anjely efatra nitsangana teo amin’ny vazan-tany efatra, nihazona ny rivotra efatra amin’ny tany, mba tsy hisy rivotra hitsoka amin’ny tany, na amin’ny ranomasina, na amin’ny hazo akory aza.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary hitako fa indro, nisy anjely hafa koa niakatra avy tany amin’ny fiposahan’ny masoandro, nanana ny fitombo-kasen’Andriamanitra velona. Ary niantso ny anjely efatra izay nasaina hanimba ny tany sy ny ranomasina, tamin’ny feo mahery izy hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Aza manimba ny tany, na ny ranomasina, na ny hazo, mandra-panisinay tombo-kase amin’ny handrin’ny mpanompon’Andriamanitsika.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary nandre ny isan’izay voaisy tombo-kase aho: Efatra arivo sy efatra alina sy iray hetsy no voaisy tombo-kase tamin’ny fokon’ny Zanak’Israely rehetra:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Tamin’ny fokon’i Joda, roa arivo sy iray alina no voaisy tombo-kase;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tamin’ny fokon’i Robena, roa arivo sy iray alina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tamin’ny fokon’i Gada, roa arivo sy iray alina;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: tamin’ny fokon’i Asera, roa arivo sy iray alina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tamin’ny fokon’i Naftaly, roa arivo sy iray alina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tamin’ny fokon’i Manase, roa arivo sy iray alina;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: tamin’ny fokon’i Simeona, roa arivo sy iray alina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tamin’ny fokon’i Levy, roa arivo sy iray alina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tamin’ny fokon’i Isakara, roa arivo sy iray alina;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: tamin’ny fokon’i Zebolona, roa arivo sy iray alina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tamin’ny fokon’i Josefa, roa arivo sy iray alina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tamin’ny fokon’i Benjamina, roa arivo sy iray alina no voaisy tombo-kase.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny vahoaka tsy tambo isaina manoloana ny sezafiandrianana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Rehefa afaka izany dia hitako fa indreo, nisy olona betsaka tsy tambo isaina avy tamin’ny firenena rehetra, ny fokom-pirenena rehetra ary ny samihafa fiteny rehetra. Nitsangana teo anoloan’ny sezafiandrianana sy teo anatrehan’ny Zanak’ondry izy ireo, niakanjo akanjo fotsy lava sady nitana sampan-drofia teny an-tanany, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'ary niantso tamin’ny feo mahery hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny famonjena dia an’Andriamanitsika
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay mipetraka eo ambonin’ny sezafiandrianana, sy an’ny Zanak’ondry!
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary ny anjely rehetra dia nitsangana manodidina ny sezafiandrianana sy ny loholona ary ny zavamananaina efatra; niankohoka teo anoloan’ny sezafiandrianana izy ka nivavaka tamin’Andriamanitra '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: w
    children:
    - type: text
      text: Amena
  - type: text
    text: '! Ny saotra, ny voninahitra, ny fahendrena,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny fisaorana, ny haja, ny hery ary ny faherezana
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia an’Andriamanitsika mandrakizay mandrakizay! Amena!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary ny iray tamin’ny loholona dia niteny tamiko hoe: Iza moa ireo miakanjo akanjo fotsy lava? Ary avy taiza izy? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Fa hoy aho taminy: Tompoko, ianao no mahalala! Dia hoy izy tamiko:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ireo no avy tamin’ny fahoriana lehibe,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny akanjony dia nosasany sy nofotsiany tamin’ny ran’ny Zanak’ondry.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Noho izany izy dia eo anoloan’ny sezafiandrianan’Andriamanitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka manompo Azy andro aman’alina ao amin’ny tempoliny.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary Ilay mipetraka eo ambonin’ny sezafiandrianana dia hamelatra ny tranolainy handrakotra azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Tsy ho noana na hangetaheta intsony ireo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy haninona azy ny masoandro na izay hafanana akory.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Fa ny Zanak’ondry izay eo afovoan’ny sezafiandrianana no ho Mpiandry azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hitondra azy ho amin’ny loharanon’ny ranon’aina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hofafan’Andriamanitra ny ranomaso rehetra amin’ny masony (Isa 25.8).
