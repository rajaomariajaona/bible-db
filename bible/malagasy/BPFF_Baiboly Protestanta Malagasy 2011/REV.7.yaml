document_id: REV.7,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny olona voaisy tombo-kase
  - type: text
    content: Rehefa afaka izany dia hitako fa indreo, nisy anjely efatra nitsangana teo amin’ny vazan-tany efatra, nihazona ny rivotra efatra amin’ny tany, mba tsy hisy rivotra hitsoka amin’ny tany, na amin’ny ranomasina, na amin’ny hazo akory aza.
  '10':
  - type: text
    content: 'ary niantso tamin’ny feo mahery hoe:'
  - type: text
    content: Ny famonjena dia an’Andriamanitsika
  - type: text
    content: izay mipetraka eo ambonin’ny sezafiandrianana, sy an’ny Zanak’ondry!
  '11':
  - type: text
    content: 'Ary ny anjely rehetra dia nitsangana manodidina ny sezafiandrianana sy ny loholona ary ny zavamananaina efatra; niankohoka teo anoloan’ny sezafiandrianana izy ka nivavaka tamin’Andriamanitra '
  '12':
  - type: text
    content: 'hoe:'
  - type: text
    content: Amena
  - type: text
    content: '! Ny saotra, ny voninahitra, ny fahendrena,'
  - type: text
    content: ny fisaorana, ny haja, ny hery ary ny faherezana
  - type: text
    content: dia an’Andriamanitsika mandrakizay mandrakizay! Amena!
  '13':
  - type: text
    content: 'Ary ny iray tamin’ny loholona dia niteny tamiko hoe: Iza moa ireo miakanjo akanjo fotsy lava? Ary avy taiza izy? '
  '14':
  - type: text
    content: 'Fa hoy aho taminy: Tompoko, ianao no mahalala! Dia hoy izy tamiko:'
  - type: text
    content: Ireo no avy tamin’ny fahoriana lehibe,
  - type: text
    content: ary ny akanjony dia nosasany sy nofotsiany tamin’ny ran’ny Zanak’ondry.
  '15':
  - type: text
    content: Noho izany izy dia eo anoloan’ny sezafiandrianan’Andriamanitra
  - type: text
    content: ka manompo Azy andro aman’alina ao amin’ny tempoliny.
  - type: text
    content: Ary Ilay mipetraka eo ambonin’ny sezafiandrianana dia hamelatra ny tranolainy handrakotra azy.
  '16':
  - type: text
    content: Tsy ho noana na hangetaheta intsony ireo;
  - type: text
    content: ary tsy haninona azy ny masoandro na izay hafanana akory.
  '17':
  - type: text
    content: Fa ny Zanak’ondry izay eo afovoan’ny sezafiandrianana no ho Mpiandry azy
  - type: text
    content: ka hitondra azy ho amin’ny loharanon’ny ranon’aina;
  - type: text
    content: ary hofafan’Andriamanitra ny ranomaso rehetra amin’ny masony (Isa 25.8).
  '2':
  - type: text
    content: 'Ary hitako fa indro, nisy anjely hafa koa niakatra avy tany amin’ny fiposahan’ny masoandro, nanana ny fitombo-kasen’Andriamanitra velona. Ary niantso ny anjely efatra izay nasaina hanimba ny tany sy ny ranomasina, tamin’ny feo mahery izy hoe: '
  '3':
  - type: text
    content: Aza manimba ny tany, na ny ranomasina, na ny hazo, mandra-panisinay tombo-kase amin’ny handrin’ny mpanompon’Andriamanitsika.
  '4':
  - type: text
    content: 'Ary nandre ny isan’izay voaisy tombo-kase aho: Efatra arivo sy efatra alina sy iray hetsy no voaisy tombo-kase tamin’ny fokon’ny Zanak’Israely rehetra:'
  '5':
  - type: text
    content: Tamin’ny fokon’i Joda, roa arivo sy iray alina no voaisy tombo-kase;
  - type: text
    content: tamin’ny fokon’i Robena, roa arivo sy iray alina;
  - type: text
    content: tamin’ny fokon’i Gada, roa arivo sy iray alina;
  '6':
  - type: text
    content: tamin’ny fokon’i Asera, roa arivo sy iray alina;
  - type: text
    content: tamin’ny fokon’i Naftaly, roa arivo sy iray alina;
  - type: text
    content: tamin’ny fokon’i Manase, roa arivo sy iray alina;
  '7':
  - type: text
    content: tamin’ny fokon’i Simeona, roa arivo sy iray alina;
  - type: text
    content: tamin’ny fokon’i Levy, roa arivo sy iray alina;
  - type: text
    content: tamin’ny fokon’i Isakara, roa arivo sy iray alina;
  '8':
  - type: text
    content: tamin’ny fokon’i Zebolona, roa arivo sy iray alina;
  - type: text
    content: tamin’ny fokon’i Josefa, roa arivo sy iray alina;
  - type: text
    content: tamin’ny fokon’i Benjamina, roa arivo sy iray alina no voaisy tombo-kase.
  - type: heading
    content: Ny vahoaka tsy tambo isaina manoloana ny sezafiandrianana
  '9':
  - type: text
    content: 'Rehefa afaka izany dia hitako fa indreo, nisy olona betsaka tsy tambo isaina avy tamin’ny firenena rehetra, ny fokom-pirenena rehetra ary ny samihafa fiteny rehetra. Nitsangana teo anoloan’ny sezafiandrianana sy teo anatrehan’ny Zanak’ondry izy ireo, niakanjo akanjo fotsy lava sady nitana sampan-drofia teny an-tanany, '
