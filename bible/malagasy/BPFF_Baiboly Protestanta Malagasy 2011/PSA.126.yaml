document_id: PSA.126,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fitomaniana misolo fifaliana
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: Hira fanao amin’ny fiakarana.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Fony NY TOMPO nampody an’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Ziona
    - type: text
      text: ' avy tamin’ny fahababoany'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia tahaka izay nanonofy isika.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fahiny dia feno hehy ny vavantsika
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary feno fihobiana ny lelantsika;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'tamin’izay dia izao no notenenin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jentilisa
    - type: text
      text: ':'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Zava-dehibe no nataon’NY TOMPO ho an’ireny.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, zava-dehibe no nataon’NY TOMPO ho antsika
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka faly isika.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tanteraho, TOMPO ô, ny fampodiana anay avy amin’ny fahababoana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tahaka ny fiverenan’ny riaka any Negeva.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay mamafy am-pitomaniana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hijinja amim-pifaliana.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mandeha mitomany mitondra ny voa hafafiny izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa hiverina mitondra ny amboarany amin’ny fihobiana kosa.
