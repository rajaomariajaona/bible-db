  - type: text
    text: Fitomaniana misolo fifaliana
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: Hira fanao amin’ny fiakarana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Fony NY TOMPO nampody an’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Ziona
  - type: text
    text: ' avy tamin’ny fahababoany'
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia tahaka izay nanonofy isika.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Fahiny dia feno hehy ny vavantsika
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary feno fihobiana ny lelantsika;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'tamin’izay dia izao no notenenin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jentilisa
  - type: text
    text: ':'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Zava-dehibe no nataon’NY TOMPO ho an’ireny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Eny, zava-dehibe no nataon’NY TOMPO ho antsika
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka faly isika.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Tanteraho, TOMPO ô, ny fampodiana anay avy amin’ny fahababoana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tahaka ny fiverenan’ny riaka any Negeva.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Izay mamafy am-pitomaniana
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hijinja amim-pifaliana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Mandeha mitomany mitondra ny voa hafafiny izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa hiverina mitondra ny amboarany amin’ny fihobiana kosa.
