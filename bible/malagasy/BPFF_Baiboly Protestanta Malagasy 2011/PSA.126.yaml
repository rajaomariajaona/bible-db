document_id: PSA.126,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Fitomaniana misolo fifaliana
  - type: text
    content: Hira fanao amin’ny fiakarana.
  - type: text
    content: 'Fony NY TOMPO nampody an’i '
  - type: text
    content: Ziona
  - type: text
    content: ' avy tamin’ny fahababoany'
  - type: text
    content: dia tahaka izay nanonofy isika.
  '2':
  - type: text
    content: Fahiny dia feno hehy ny vavantsika
  - type: text
    content: ary feno fihobiana ny lelantsika;
  - type: text
    content: 'tamin’izay dia izao no notenenin’ny '
  - type: text
    content: Jentilisa
  - type: text
    content: ':'
  - type: text
    content: Zava-dehibe no nataon’NY TOMPO ho an’ireny.
  '3':
  - type: text
    content: Eny, zava-dehibe no nataon’NY TOMPO ho antsika
  - type: text
    content: ka faly isika.
  '4':
  - type: text
    content: Tanteraho, TOMPO ô, ny fampodiana anay avy amin’ny fahababoana,
  - type: text
    content: tahaka ny fiverenan’ny riaka any Negeva.
  '5':
  - type: text
    content: Izay mamafy am-pitomaniana
  - type: text
    content: dia hijinja amim-pifaliana.
  '6':
  - type: text
    content: Mandeha mitomany mitondra ny voa hafafiny izy
  - type: text
    content: fa hiverina mitondra ny amboarany amin’ny fihobiana kosa.
