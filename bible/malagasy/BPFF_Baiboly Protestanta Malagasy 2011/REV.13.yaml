document_id: REV.13,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny bibidia roa
  - type: text
    content: 'Ary hitako fa indro, nisy bibidia niakatra avy tao amin’ny ranomasina, nanana '
  - type: text
    content: tandroka
  - type: text
    content: ' folo sy loha fito, ary tamin’ny tandrony dia nisy diadema folo; ary tamin’ny lohany dia nisy anarana miteny ratsy. '
  '10':
  - type: text
    content: Raha misy mamabo dia mba hobaboina izy;
  - type: text
    content: ary raha misy mamono amin’ny sabatra dia tsy maintsy hovonoina amin’ny sabatra kosa izy.
  - type: text
    content: Indro ny faharetana sy ny finoan’ny olona masina.
  '11':
  - type: text
    content: 'Ary hitako fa indro, nisy bibidia iray koa niakatra avy tamin’ny tany. Nanana tandroka roa tahaka ny an’ny zanak’ondry izy nefa niteny tahaka ny dragona. '
  '12':
  - type: text
    content: 'Ary ny fahefana rehetra nananan’ilay bibidia voalohany dia asehony eo anatrehany, ary ny tany mbamin’izay monina ao dia asainy miankohoka eo anoloan’ilay bibidia voalohany izay sitrana tamin’ilay feriny saika nahafaty azy. '
  '13':
  - type: text
    content: 'Manao famantarana lehibe izy ka mampidina afo avy any an-danitra ho amin’ny tany eo imason’ny olona aza. '
  '14':
  - type: text
    content: Mamitaka izay monina ambonin’ny tany izy amin’ny famantarana izay nomena azy hatao eo imason’ny bibidia sady milaza amin’izay monina ambonin’ny tany koa mba hanao sarin’ny bibidia izay voan’ny sabatra, nefa velona ihany.
  '15':
  - type: text
    content: 'Ary navela hanisy aina ny sarin’ny bibidia izy mba hahay miteny ny sarin’ny bibidia, ary hampamono izay rehetra tsy mety miankohoka eo anoloan’ny sarin’ny bibidia. '
  '16':
  - type: text
    content: 'Ary ny olona rehetra, na ny kely na ny lehibe, na ny manankarena na ny malahelo, na ny olona afaka, na ny andevo, dia ampandraisiny marika avokoa eo amin’ny tanany havanana na eo amin’ny handriny '
  '17':
  - type: text
    content: mba tsy hisy hahazo hividy na hivarotra afa-tsy izay manana ny marika, dia ny anaran’ny bibidia, na ny isa milaza ny anarany.
  '18':
  - type: text
    content: 'Indro ny fahendrena. Aoka izay manan-tsaina hanisa ny isa mariky ny bibidia, fa isa mariky ny olona izany: Enina amby enimpolo sy eninjato izany isa marika izany.'
  '2':
  - type: text
    content: 'Ny bibidia izay hitako dia tahaka ny leoparda, ny tongony dia tahaka ny an’ny bera, ary ny vavany dia tahaka ny vavan’ny liona. Nomen’ilay dragona azy ny heriny sy ny sezafiandrianany ary fahefana lehibe. '
  '3':
  - type: text
    content: Ary ny lohany iray dia toa voa ka efa ho faty, nefa sitrana ihany ilay fery saika nahafaty azy.
  - type: text
    content: 'Dia gaga ny tany rehetra ka nanaraka ilay bibidia. '
  '4':
  - type: text
    content: 'Ary niankohoka teo anoloan’ilay dragona ny olona satria izy no nanome ny fahefana ho an’ny bibidia; niankohoka teo anoloan’ny bibidia ny olona ka niteny hoe: Iza no tahaka ny bibidia? Ary iza no mahay miady aminy?'
  '5':
  - type: text
    content: 'Dia nomena lela miteny zavatra mihoa-pampana sy fitenenan-dratsy izy ary nomena fahefana mba hiasa roa amby efapolo volana. '
  '6':
  - type: text
    content: 'Dia nanokatra ny vavany hiteny ratsy an’Andriamanitra izy, dia ny hiteny ratsy ny anarany sy ny '
  - type: text
    content: tabernakeli
  - type: text
    content: 'ny, dia ireo monina any an-danitra. '
  '7':
  - type: text
    content: 'Ary navela hiady tamin’ny olona masina izy ka haharesy azy. Nomena fahefana tamin’ny fokom-pirenena, ny vahoaka, ny samihafa fiteny ary ny firenena rehetra izy. '
  '8':
  - type: text
    content: Ary hiankohoka eo anoloany ny olona rehetra monina ambonin’ny tany, dia izay tsy manana ny anarany voasoratra ao amin’ny bokin’ny fiainan’ny Zanak’ondry izay voavono hatramin’ny nanorenana izao tontolo izao.
  '9':
  - type: text
    content: Raha misy manan-tsofina, aoka izy hihaino!
