document_id: REV.13
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny bibidia roa
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary hitako fa indro, nisy bibidia niakatra avy tao amin’ny ranomasina, nanana '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tandroka
  - type: text
    text: ' folo sy loha fito, ary tamin’ny tandrony dia nisy diadema folo; ary tamin’ny lohany dia nisy anarana miteny ratsy. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ny bibidia izay hitako dia tahaka ny leoparda, ny tongony dia tahaka ny an’ny bera, ary ny vavany dia tahaka ny vavan’ny liona. Nomen’ilay dragona azy ny heriny sy ny sezafiandrianany ary fahefana lehibe. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ary ny lohany iray dia toa voa ka efa ho faty, nefa sitrana ihany ilay fery saika nahafaty azy.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia gaga ny tany rehetra ka nanaraka ilay bibidia. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary niankohoka teo anoloan’ilay dragona ny olona satria izy no nanome ny fahefana ho an’ny bibidia; niankohoka teo anoloan’ny bibidia ny olona ka niteny hoe: Iza no tahaka ny bibidia? Ary iza no mahay miady aminy?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia nomena lela miteny zavatra mihoa-pampana sy fitenenan-dratsy izy ary nomena fahefana mba hiasa roa amby efapolo volana. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia nanokatra ny vavany hiteny ratsy an’Andriamanitra izy, dia ny hiteny ratsy ny anarany sy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tabernakeli
  - type: text
    text: 'ny, dia ireo monina any an-danitra. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary navela hiady tamin’ny olona masina izy ka haharesy azy. Nomena fahefana tamin’ny fokom-pirenena, ny vahoaka, ny samihafa fiteny ary ny firenena rehetra izy. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ary hiankohoka eo anoloany ny olona rehetra monina ambonin’ny tany, dia izay tsy manana ny anarany voasoratra ao amin’ny bokin’ny fiainan’ny Zanak’ondry izay voavono hatramin’ny nanorenana izao tontolo izao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Raha misy manan-tsofina, aoka izy hihaino!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Raha misy mamabo dia mba hobaboina izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary raha misy mamono amin’ny sabatra dia tsy maintsy hovonoina amin’ny sabatra kosa izy.
- type: usfm
  marker: m
  children:
  - type: text
    text: Indro ny faharetana sy ny finoan’ny olona masina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary hitako fa indro, nisy bibidia iray koa niakatra avy tamin’ny tany. Nanana tandroka roa tahaka ny an’ny zanak’ondry izy nefa niteny tahaka ny dragona. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary ny fahefana rehetra nananan’ilay bibidia voalohany dia asehony eo anatrehany, ary ny tany mbamin’izay monina ao dia asainy miankohoka eo anoloan’ilay bibidia voalohany izay sitrana tamin’ilay feriny saika nahafaty azy. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Manao famantarana lehibe izy ka mampidina afo avy any an-danitra ho amin’ny tany eo imason’ny olona aza. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Mamitaka izay monina ambonin’ny tany izy amin’ny famantarana izay nomena azy hatao eo imason’ny bibidia sady milaza amin’izay monina ambonin’ny tany koa mba hanao sarin’ny bibidia izay voan’ny sabatra, nefa velona ihany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary navela hanisy aina ny sarin’ny bibidia izy mba hahay miteny ny sarin’ny bibidia, ary hampamono izay rehetra tsy mety miankohoka eo anoloan’ny sarin’ny bibidia. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary ny olona rehetra, na ny kely na ny lehibe, na ny manankarena na ny malahelo, na ny olona afaka, na ny andevo, dia ampandraisiny marika avokoa eo amin’ny tanany havanana na eo amin’ny handriny '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: mba tsy hisy hahazo hividy na hivarotra afa-tsy izay manana ny marika, dia ny anaran’ny bibidia, na ny isa milaza ny anarany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Indro ny fahendrena. Aoka izay manan-tsaina hanisa ny isa mariky ny bibidia, fa isa mariky ny olona izany: Enina amby enimpolo sy eninjato izany isa marika izany.'
