document_id: JOS.5
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny namorana ny Zanak’Israely tao Gilgala
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Rehefa nandre ny nanamainan’NY TOMPO ny ranon’i Jordana teo anoloan’ny Zanak’Israely nandritra ny fiampitàny ny mpanjaka rehetra tamin’ny Amorita any andafy andrefan’i Jordana sy ireo mpanjaka rehetra tamin’ny Kananita any amoron’ny ranomasina dia ketraka ny fony ka very hevitra izy noho ny tahony ny Zanak’Israely.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Tamin’izany andro izany no nilazan’NY TOMPO tamin’i Josoa hoe: Manaova hareza vato ho anao, koa atombohy indray ny famorana ny Zanak’Israely. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dia nanao hareza vato ho azy i Josoa ka namora ny Zanak’Israely teo amin’ny havoana Haralota. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Izao no anton’ny namoran’i Josoa azy: Ny lehilahy rehetra izay nivoaka avy tany Ejipta, izany hoe ny mpanafika rehetra, dia samy maty tany an-tany efitra teny an-dalana, tamin’izy nivoaka avy tany Ejipta. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Voafora ny lehilahy rehetra izay nivoaka avy tany; fa ny lehilahy rehetra nateraka teny an-dalana tany an-tany efitra, tamin’izy nivoaka avy tany Ejipta, dia tsy mbola voafora kosa. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Fa efapolo taona no nandehanan’ny Zanak’Israely tany an-tany efitra, mandra-pahalany ritra ny olona rehetra, dia ny mpanafika izay nivoaka avy tany Ejipta, satria tsy nihaino ny feon’NY TOMPO izy ireny; dia ireo no nianianan’NY TOMPO fa tsy havelany hahita ny tany izay nianianan’NY TOMPO tamin’ny razana homeny antsika, dia tany tondra-dronono sy tantely. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary ny zanany no natsangany handimby azy ka ireo no noforan’i Josoa satria tsy mbola voafora ireo, fa tsy noforana teny an-dalana. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Rehefa noforana ny lehilahy rehetra dia nitoetra tao amin’ny fitoerany tany an-toby izy mandra-pahasitrany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Dia hoy NY TOMPO tamin’i Josoa: Androany no nanakodiavako ny fandatsan’i Ejipta ho afaka aminareo. Ary ny anaran’izany tany izany dia nataony hoe Gilgala'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Gilgala: Fanakodiavana.'
    marker-yv: yv-n
  - type: text
    text: ' mandraka androany.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny Paska voalohany tao Kanana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary nitoby tany Gilgala ny Zanak’Israely ka nitandrina ny Paska teo amin’ny tany ngazana any Jeriko, tamin’ny harivan’ny andro fahefatra amby folo tamin’ny volana. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary ny ampitson’ny Paska dia nihinana ny vokatry ny tany izy, dia mofo tsy misy masirasira sy lango, tamin’izany andro izany indrindra. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ary nitsahatra ny mana ny ampitson’iny, dia tamin’ny nihinanany ny vokatry ny tany ka tsy nisy mana ho an’ny Zanak’Israely intsony; fa nihinana ny vokatry ny tany Kanana izy tamin’izany taona izany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny mpitarika ny miaramilan’NY TOMPO
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Nony teo akaikin’i Jeriko i Josoa, dia nanopy ny masony ka nijery ary indro, nisy lehilahy nitsangana tandrifiny ka ny sabany voatsoaka dia teny an-tanany. Nanatona Azy i Josoa ka niteny taminy hoe: Namanay va ianao sa naman’ny fahavalonay? '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dia hoy Izy: Tsia, fa Izaho dia mpitarika ny miaramilan’NY TOMPO ka tonga atỳ ankehitriny. Dia niankohoka tamin’ny tany i Josoa ka niteny taminy hoe: Inona no holazainao amin’ny mpanomponao, Tompokolahy? '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Dia hoy Ilay mpitarika ny miaramilan’NY TOMPO tamin’i Josoa: Esory amin’ny tongotrao ny kapanao fa masina io tany ijanonanao io. Dia nataon’i Josoa izany.'
