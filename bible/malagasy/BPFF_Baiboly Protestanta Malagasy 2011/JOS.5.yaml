document_id: JOS.5,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny namorana ny Zanak’Israely tao Gilgala
  - type: text
    content: Rehefa nandre ny nanamainan’NY TOMPO ny ranon’i Jordana teo anoloan’ny Zanak’Israely nandritra ny fiampitàny ny mpanjaka rehetra tamin’ny Amorita any andafy andrefan’i Jordana sy ireo mpanjaka rehetra tamin’ny Kananita any amoron’ny ranomasina dia ketraka ny fony ka very hevitra izy noho ny tahony ny Zanak’Israely.
  '10':
  - type: text
    content: 'Ary nitoby tany Gilgala ny Zanak’Israely ka nitandrina ny Paska teo amin’ny tany ngazana any Jeriko, tamin’ny harivan’ny andro fahefatra amby folo tamin’ny volana. '
  '11':
  - type: text
    content: 'Ary ny ampitson’ny Paska dia nihinana ny vokatry ny tany izy, dia mofo tsy misy masirasira sy lango, tamin’izany andro izany indrindra. '
  '12':
  - type: text
    content: Ary nitsahatra ny mana ny ampitson’iny, dia tamin’ny nihinanany ny vokatry ny tany ka tsy nisy mana ho an’ny Zanak’Israely intsony; fa nihinana ny vokatry ny tany Kanana izy tamin’izany taona izany.
  - type: heading
    content: Ny mpitarika ny miaramilan’NY TOMPO
  '13':
  - type: text
    content: 'Nony teo akaikin’i Jeriko i Josoa, dia nanopy ny masony ka nijery ary indro, nisy lehilahy nitsangana tandrifiny ka ny sabany voatsoaka dia teny an-tanany. Nanatona Azy i Josoa ka niteny taminy hoe: Namanay va ianao sa naman’ny fahavalonay? '
  '14':
  - type: text
    content: 'Dia hoy Izy: Tsia, fa Izaho dia mpitarika ny miaramilan’NY TOMPO ka tonga atỳ ankehitriny. Dia niankohoka tamin’ny tany i Josoa ka niteny taminy hoe: Inona no holazainao amin’ny mpanomponao, Tompokolahy? '
  '15':
  - type: text
    content: 'Dia hoy Ilay mpitarika ny miaramilan’NY TOMPO tamin’i Josoa: Esory amin’ny tongotrao ny kapanao fa masina io tany ijanonanao io. Dia nataon’i Josoa izany.'
  '2':
  - type: text
    content: 'Tamin’izany andro izany no nilazan’NY TOMPO tamin’i Josoa hoe: Manaova hareza vato ho anao, koa atombohy indray ny famorana ny Zanak’Israely. '
  '3':
  - type: text
    content: 'Dia nanao hareza vato ho azy i Josoa ka namora ny Zanak’Israely teo amin’ny havoana Haralota. '
  '4':
  - type: text
    content: 'Izao no anton’ny namoran’i Josoa azy: Ny lehilahy rehetra izay nivoaka avy tany Ejipta, izany hoe ny mpanafika rehetra, dia samy maty tany an-tany efitra teny an-dalana, tamin’izy nivoaka avy tany Ejipta. '
  '5':
  - type: text
    content: 'Voafora ny lehilahy rehetra izay nivoaka avy tany; fa ny lehilahy rehetra nateraka teny an-dalana tany an-tany efitra, tamin’izy nivoaka avy tany Ejipta, dia tsy mbola voafora kosa. '
  '6':
  - type: text
    content: 'Fa efapolo taona no nandehanan’ny Zanak’Israely tany an-tany efitra, mandra-pahalany ritra ny olona rehetra, dia ny mpanafika izay nivoaka avy tany Ejipta, satria tsy nihaino ny feon’NY TOMPO izy ireny; dia ireo no nianianan’NY TOMPO fa tsy havelany hahita ny tany izay nianianan’NY TOMPO tamin’ny razana homeny antsika, dia tany tondra-dronono sy tantely. '
  '7':
  - type: text
    content: 'Ary ny zanany no natsangany handimby azy ka ireo no noforan’i Josoa satria tsy mbola voafora ireo, fa tsy noforana teny an-dalana. '
  '8':
  - type: text
    content: Rehefa noforana ny lehilahy rehetra dia nitoetra tao amin’ny fitoerany tany an-toby izy mandra-pahasitrany.
  '9':
  - type: text
    content: 'Dia hoy NY TOMPO tamin’i Josoa: Androany no nanakodiavako ny fandatsan’i Ejipta ho afaka aminareo. Ary ny anaran’izany tany izany dia nataony hoe Gilgala'
  - type: note
    content: 'Gilgala: Fanakodiavana.'
  - type: text
    content: ' mandraka androany.'
  - type: heading
    content: Ny Paska voalohany tao Kanana
