document_id: JER.51
type_code: plt
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Izao no lazain’NY TOMPO:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Indro, hampirisihiko ny fanahin’ny mpandringana
- type: usfm
  marker: q1
  children:
  - type: text
    text: hamely an’i Babilona
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy izay monina ao Leba-Kamay
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '51.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Leba-Kamay: Kaldea.'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ary handefa iraka hafa firenena ho any Babilona Aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay hikororoka azy ka hahafoana ny taniny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa hamely azy manodidina
- type: usfm
  marker: q1
  children:
  - type: text
    text: amin’ny andro fahoriana ireo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Izay manenjana tsipìka mbamin’izay miandranandrana amin’ny akanjo fiarovan-tratrany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia aoka samy hasian’izay manenjana tsipìka;
- type: usfm
  marker: q1
  children:
  - type: text
    text: aza tsitsìnareo ny zatovony,
- type: usfm
  marker: q1
  children:
  - type: text
    text: aringano toy ny zavatra voaozona avokoa ny miaramilany rehetra
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: mba hiampatrampatra any amin’ny tanin’ny Kaldeana ny faty,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary izay voatrobaka dia hiampatrampatra eny an-dalamben’i Babilona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Fa Andriamanitra, Tompon’izao rehetra izao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Andriamanitry ny Israely sy ny Joda, dia tsy hahafoy azy ireo ho mpitondratena,
- type: usfm
  marker: q1
  children:
  - type: text
    text: na dia henika ny fahotany amin’ny Iray Masin’ny Israely
- type: usfm
  marker: q1
  children:
  - type: text
    text: aza ny taniny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Mandosira hiala an’i Babilona ianareo, ary samia mamonjy ny ainareo avy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: aoka tsy ho voaringana noho ny fahotany ianareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa izao no andro famalian’NY TOMPO;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izy no hamaly azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Babilona dia kapoaka volamena teny an-tanan’NY TOMPO,
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay nahamamo ny tany rehetra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: efa nisotroan’ny firenena ny divainy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: koa izany no nahavery saina ireny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Tampoka no naharavan’i Babilona sy nahatorotoro azy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: idradradradrao izy; makà balisama hatao amin’ny feriny maharary azy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa angamba ho sitrana ihany izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Nitady hanasitrana an’i Babilona izahay,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa tsy nety sitrana izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: afoizo izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka andeha isika samy handeha ho any amin’ny tanintsika avy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa mahatakatra ny lanitra ny helony
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mitehika amin’ny rahona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Nasehon’NY TOMPO ny fahamarinantsika;
- type: usfm
  marker: q1
  children:
  - type: text
    text: andeha ka aoka hambarantsika ao Ziona
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny asan’NY TOMPO Andriamanitsika.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Lambolamboy ny zana-tsipìka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tano ny ampinga;
- type: usfm
  marker: q1
  children:
  - type: text
    text: NY TOMPO efa nanaitra ny fanahin’ny mpanjakan’ny Mediana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny hamely an’i Babilona no nosaininy mba handringanana azy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: famalian’NY TOMPO izany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, famaliana noho ny tempoliny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Manangàna faneva hamelezana ny eo akaikin’ny mandan’i Babilona;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ataovy mafy ny fiambenana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: alatsaho ny mpiambina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: alamino ny vela-pandrika;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa NY TOMPO sady efa nisaina no nanatanteraka
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay nolazainy ny amin’ny mponina any Babilona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ianao izay monina eny amoron’ny ranobe
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady manana harena be dia be,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tonga ny fiafaranao ka tsy hisy intsony ny filanao harena.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Andriamanitra, Tompon’izao rehetra izao nianiana tamin’ny tenany hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hofenoiko olona maro toy ny valala tokoa ianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ireny dia hanakora hamely anao.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny Mpamorona izao tontolo izao sy ny sampy
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Tamin’ny heriny no nanaovany ny tany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tamin’ny fahendreny no nanorenany izao tontolo izao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tamin’ny fisainany no namelarany ny lanitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Raha mampirohondrohona ny rano any an-danitra Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia mampiakatra rahona avy tany amin’ny faran’ny tany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: manao ny tselatra ho an’ny ranonorana Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady mamoaka ny rivotra avy amin’ny trano fitahirizany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Efa kentrina avokoa ny olona rehetra ka tsy manam-pahalalana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: menatra ny mpanefy volamena rehetra noho ny amin’ny sarin-javatra voasokitra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa fitaka ny sarin-javatra voarendrika
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria tsy misy fofonaina ao aminy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Zava-poana ireny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia asa mahatsikaiky foana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: amin’ny andro hamaliana azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ho levona izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Tsy mba tahaka ireo ny Anjaran’i Jakoba,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa mpamorona ny zavatra rehetra Izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny Israely no firenena lovany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Andriamanitra, Tompon’izao rehetra izao, no anarany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny niafaran’i Babilona
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Langilangiko sy fiadiako ianao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ianao no nentiko nanorotoro firenena;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ianao no nentiko nandringana fanjakana;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ianao no nentiko nanorotoro soavaly sy ny mpitaingina azy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ianao no nentiko nanorotoro ny kalesy fitondra miady sy ny mpitaingina azy;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ianao koa no nentiko nanorotoro ny lehilahy sy ny vehivavy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ianao no nentiko nanorotoro ny antitra sy ny tanora;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ianao no nentiko nanorotoro ny zatovolahy sy ny zatovovavy;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ianao koa no nentiko nanorotoro ny mpiandry ondry sy ny andian’ondry;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ianao no nentiko nanorotoro ny mpiasa tany sy ny ombiny miray zioga;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ianao no nentiko nanorotoro ny governora sy ny lefiny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Ary hampanodiaviko an’i Babilona
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny mponina rehetra any Kaldea
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ny ratsy rehetra izay efa nataony tao '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Ziona
  - type: text
    text: ' teo imasonareo,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: hoy NY TOMPO.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Indro mamely anao Aho, ry tendrombohitra ahitan-doza,
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay mandringana ny tany rehetra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hoy NY TOMPO;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hatsotrako ny tanako hamelezana anao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hakodiako hianjera amin’ny harambato ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hataoko tendrombohitra mirehitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Ary tsy mba hakana vato hatao fehizoro ianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: na hatao vato fanorenana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ho lao mandrakizay ianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hoy NY TOMPO.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Manangàna faneva eny amin’ny tany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mitsofa anjomara any amin’ny firenena;
- type: usfm
  marker: q1
  children:
  - type: text
    text: manendre firenena hamely azy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: antsoy ny fanjakan’i Ararata
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy i Miny ary i Askenaza hamely azy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: asio mpitari-tafika hamely azy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mampiakara soavaly toy ny valala volovoloina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Manendre firenena
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ireo mpanjakan’ny Mediana hamely azy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ao koa ny governora sy ny lefiny rehetra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny tany rehetra anjakany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Mihorohoro sy mangovitra ny tany
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa tanterahina amin’i Babilona ny fikasan’NY TOMPO rehetra
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hahatonga ny tany Babilona ho lao tsy misy mponina intsony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Nitsahatra tamin’ny ady ny lehilahy maherin’i Babilona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nitoetra tao amin’ny manda fiarovana izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: lany ny heriny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tonga toy ny vehivavy izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: nodorana ny fonenany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tapaka ny hidiny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Mifamoivoy be ihany ny iraka mpihazakazaka
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mifamoivoy be ihany ny mpitondra teny
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hanambara amin’ny mpanjakan’i Babilona
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa azo ny tanànany manontolo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Ary efa azo ny lalana fiampitàna
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary nodorany tamin’ny afo ny heniheny
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady toran-kovitra ny miaramila.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Noraisin’Andriamanitra an-tanana ny famaliana ny vahoakany
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Fa izao no lazain’Andriamanitra, Tompon’izao rehetra izao, Andriamanitry ny Israely:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Babilona zanakavavy dia tahaka ny famoloana amin’ny andro anosena azy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary vetivety foana
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ho avy ny andro hijinjana azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Efa lanin’i Nebokadnezara, mpanjakan’i Babilona, izahay;
- type: usfm
  marker: q1
  children:
  - type: text
    text: naringany izahay;
- type: usfm
  marker: q1
  children:
  - type: text
    text: napetrany toy ny vata tsy misy entana izahay;
- type: usfm
  marker: q1
  children:
  - type: text
    text: nateliny toy ny fitelin’ny mamba izahay;
- type: usfm
  marker: q1
  children:
  - type: text
    text: nivokisan’ny kibony ny zavatra tena tianay
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka nandroaka anay izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Aoka ny mponina ao '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Ziona
  - type: text
    text: ' hiteny hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hanody an’i Babilona anie ny loza nanjo ahy sy nihatra tamin’ny nofoko!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ary aoka i Jerosalema hiteny hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hanody ny mponina any Kaldea anie ny rako!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Koa izao no lazain’NY TOMPO:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Indro, hisolo vava anao amin’ny adinao Aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady hanao famaliana ho anao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary horitiko ny ranomasiny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hataoko tankina ny loharanony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Ho tonga korontam-bato i Babilona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho fonenan’ny amboadia,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho figagana sy ho zavatra mampisitrisitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy hisy mponina intsony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Hiara-mierona toy ny liona tanora izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hikaonkaona toy ny zanaky ny liona izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Raha mbola liana izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hanaovako fanasana ho azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hataoko mamo izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hiravoravo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hatory amin’ny torimaso mandrakizay izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy hifoha intsony,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hoy NY TOMPO.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Hampidiniko toy ny zanak’ondry ho any amin’ny famonoana izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary toy ny ondrilahy mbamin’ny osilahy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fitomaniana ny amin’ny Babilona
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: Endre! Azo i Sesaka
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '51.41 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Sesaka: Babela.'
    marker-yv: yv-n
  - type: text
    text: '!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary azo ilay fideran’ny tany rehetra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: endre! Tonga figagana any amin’ny firenena i Babilona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: Nanafotra an’i Babilona ny ranomasina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: voasaron’ny habetsahan’ny onjany izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: Ny tanànany dia lao
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy karankaina ary ngazana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia tany tsy onenan’ny olona
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady tsy misy zanak’olombelona mamakivaky eo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: Ary i Bela dia hampijaliako any Babilona
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hasaiko haloany izay nateliny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy hitanjozotra hankany aminy intsony ny firenena;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny mandan’i Babilona dia hirodana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: Mivoaha avy ao afovoany ianareo, ry oloko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary samia mamonjy ny ainareo avy ianareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba tsy ho azon’ny firehetan’ny fahatezeran’NY TOMPO.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: Ary andrao ho ketraka ny fonareo ka hatahotra ianareo noho ny tsaho miely amin’ny tany; fa amin’ny taona iray dia misy tsaho, ary amin’ny taona manaraka indray dia mbola hisy tsaho ihany koa; zava-doza fa mpanjakazaka no mamely mpanjakazaka hafa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: Koa indro, avy ny andro
- type: usfm
  marker: q1
  children:
  - type: text
    text: hamaliako ny sarin-javatra voasokitr’i Babilona;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho menatra ny taniny rehetra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny fatiny rehetra dia hiampatrampatra eo aminy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: Ny lanitra sy ny tany sy izay rehetra ao aminy dia hihoby
- type: usfm
  marker: q1
  children:
  - type: text
    text: noho ny amin’i Babilona
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria tonga ao aminy avy any avaratra ireo mpandringana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hoy NY TOMPO.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: Toy ny nampiampatramparan’i Babilona ny faty tamin’ny Israely,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ho toy izany no hiampatramparan’ny faty amin’ny tany rehetra, noho ny amin’i Babilona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: Ianareo izay tsy voan’ny sabatra dia mialà fa aza mijanona;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsarovy NY TOMPO raha mbola lavitra ianareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary aoka ho an-tsainareo i Jerosalema.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: Nahatsiaro menatra izahay
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa nandre latsa;
- type: usfm
  marker: q1
  children:
  - type: text
    text: nanarona ny tavanay ny henatra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny hafa firenena no niditra
- type: usfm
  marker: q1
  children:
  - type: text
    text: teo amin’ny fitoerana masina amin’ny tranon’NY TOMPO.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '52'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: Koa indro, avy ny andro,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hoy NY TOMPO,
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay hamaliako ny sarin-javatra voasokitra ao koa;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hitoloko manerana ny taniny rehetra ny voatrobaka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '53'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: Na dia miakatra any an-danitra aza i Babilona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary na dia ataony mafy aza ny manda mafy sady avo izay heriny
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia avy Amiko no hiavian’ny mpandringana azy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hoy NY TOMPO.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '54'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: Injany misy feo mitaraina avy any Babilona
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary fandringanana be avy any amin’ny tanin’ny Kaldeana!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '55'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: Fa NY TOMPO mandrava an’i Babilona
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy mampitsahatra ny fihorakorahana eo aminy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hirohondrohona toy ny ranobe ny onjany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, re tokoa ny feon’ny firohondrohony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '56'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: Fa tonga ao aminy, dia ao Babilona, ny mpandringana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary voasambotra ny lehilahy maheriny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tapatapaka avokoa ny tsipìkany
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria NY TOMPO dia Andriamanitry ny famaliana
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hamaly tokoa.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '57'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: 'Ary hataoko mamo ny mpanapaka azy sy ny olon-kendriny, ny governorany sy ny lefiny ary ny mpiady maheriny; ary hatory amin’ny torimaso mandrakizay izy ka tsy hifoha intsony, hoy ny Mpanjaka, izay antsoina hoe: Andriamanitra, Tompon’izao rehetra izao. '
  - type: usfm
    marker: v
    metadata:
      v: '58'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: 'Izao no lazain’Andriamanitra, Tompon’izao rehetra izao:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny manda matevina any Babilona dia horavana tanteraka hatramin’ny fanorenany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hodorana amin’ny afo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny vavahadiny avo.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Koa ho foana ny nisasaran’ny firenena
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ho nisasatra ho an’ny afo ny olona ka ho reraka.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ilay boky natsipy tao Eofrata
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '59'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '59'
  - type: text
    text: 'Ny teny izay nandidian’i Jeremia mpaminany an’i Seraia, zanak’i Neria, zanak’i Mahaseia, fony izy nandeha niaraka tamin’i Zedekia, mpanjakan’ny Joda, ho any Babilona tamin’ny taona fahefatra nanjakany. Fa i Seraia no lehiben’ny fandraharahana. '
  - type: usfm
    marker: v
    metadata:
      v: '60'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '60'
  - type: text
    text: 'Ary nosoratan’i Jeremia tao amin’ny boky iray ny loza rehetra izay hanjo an’i Babilona, dia ireo teny rehetra ireo, izay voasoratra ny amin’i Babilona. '
  - type: usfm
    marker: v
    metadata:
      v: '61'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '61'
  - type: text
    text: 'Ary hoy i Jeremia tamin’i Seraia: Rehefa tonga any Babilona ianao dia tandremo tsara mba hovakinao ireo teny rehetra ireo '
  - type: usfm
    marker: v
    metadata:
      v: '62'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '62'
  - type: text
    text: 'ka lazao hoe: TOMPO ô, Ianao no niteny hamely ity tany ity ka handringana azy ary tsy hisy hitoetra eto, na olona, na biby, fa ho tany lao mandrakizay izy. '
  - type: usfm
    marker: v
    metadata:
      v: '63'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '63'
  - type: text
    text: 'Ary rehefa tapitra ny famakianao ity boky ity dia asio vato afehy aminy, ary atsipazo ao Eofrata izy, '
  - type: usfm
    marker: v
    metadata:
      v: '64'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '64'
  - type: text
    text: 'koa teneno hoe: Toy izao no hilentehan’i Babilona ka tsy hifongarany intsony noho ny loza hataoko mihatra aminy, ary ho reraka izy. Hatreto no tenin’i Jeremia.'
