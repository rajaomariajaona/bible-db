document_id: JER.51,3103
type_code: plt
verses:
  '1':
  - type: text
    content: 'Izao no lazain’NY TOMPO:'
  - type: text
    content: Indro, hampirisihiko ny fanahin’ny mpandringana
  - type: text
    content: hamely an’i Babilona
  - type: text
    content: sy izay monina ao Leba-Kamay
  - type: note
    content: 'Leba-Kamay: Kaldea.'
  - type: text
    content: .
  '10':
  - type: text
    content: Nasehon’NY TOMPO ny fahamarinantsika;
  - type: text
    content: andeha ka aoka hambarantsika ao Ziona
  - type: text
    content: ny asan’NY TOMPO Andriamanitsika.
  '11':
  - type: text
    content: Lambolamboy ny zana-tsipìka,
  - type: text
    content: tano ny ampinga;
  - type: text
    content: NY TOMPO efa nanaitra ny fanahin’ny mpanjakan’ny Mediana;
  - type: text
    content: fa ny hamely an’i Babilona no nosaininy mba handringanana azy;
  - type: text
    content: famalian’NY TOMPO izany,
  - type: text
    content: eny, famaliana noho ny tempoliny.
  '12':
  - type: text
    content: Manangàna faneva hamelezana ny eo akaikin’ny mandan’i Babilona;
  - type: text
    content: ataovy mafy ny fiambenana;
  - type: text
    content: alatsaho ny mpiambina,
  - type: text
    content: alamino ny vela-pandrika;
  - type: text
    content: fa NY TOMPO sady efa nisaina no nanatanteraka
  - type: text
    content: izay nolazainy ny amin’ny mponina any Babilona.
  '13':
  - type: text
    content: Ianao izay monina eny amoron’ny ranobe
  - type: text
    content: sady manana harena be dia be,
  - type: text
    content: tonga ny fiafaranao ka tsy hisy intsony ny filanao harena.
  '14':
  - type: text
    content: 'Andriamanitra, Tompon’izao rehetra izao nianiana tamin’ny tenany hoe:'
  - type: text
    content: Hofenoiko olona maro toy ny valala tokoa ianao,
  - type: text
    content: ary ireny dia hanakora hamely anao.
  - type: heading
    content: Ny Mpamorona izao tontolo izao sy ny sampy
  '15':
  - type: text
    content: Tamin’ny heriny no nanaovany ny tany,
  - type: text
    content: tamin’ny fahendreny no nanorenany izao tontolo izao
  - type: text
    content: ary tamin’ny fisainany no namelarany ny lanitra.
  '16':
  - type: text
    content: Raha mampirohondrohona ny rano any an-danitra Izy
  - type: text
    content: dia mampiakatra rahona avy tany amin’ny faran’ny tany;
  - type: text
    content: manao ny tselatra ho an’ny ranonorana Izy
  - type: text
    content: sady mamoaka ny rivotra avy amin’ny trano fitahirizany.
  '17':
  - type: text
    content: Efa kentrina avokoa ny olona rehetra ka tsy manam-pahalalana;
  - type: text
    content: menatra ny mpanefy volamena rehetra noho ny amin’ny sarin-javatra voasokitra;
  - type: text
    content: fa fitaka ny sarin-javatra voarendrika
  - type: text
    content: satria tsy misy fofonaina ao aminy.
  '18':
  - type: text
    content: Zava-poana ireny,
  - type: text
    content: dia asa mahatsikaiky foana;
  - type: text
    content: amin’ny andro hamaliana azy
  - type: text
    content: dia ho levona izy.
  '19':
  - type: text
    content: Tsy mba tahaka ireo ny Anjaran’i Jakoba,
  - type: text
    content: fa mpamorona ny zavatra rehetra Izy;
  - type: text
    content: ary ny Israely no firenena lovany;
  - type: text
    content: Andriamanitra, Tompon’izao rehetra izao, no anarany.
  - type: heading
    content: Ny niafaran’i Babilona
  '2':
  - type: text
    content: Ary handefa iraka hafa firenena ho any Babilona Aho,
  - type: text
    content: izay hikororoka azy ka hahafoana ny taniny;
  - type: text
    content: fa hamely azy manodidina
  - type: text
    content: amin’ny andro fahoriana ireo.
  '20':
  - type: text
    content: Langilangiko sy fiadiako ianao;
  - type: text
    content: fa ianao no nentiko nanorotoro firenena;
  - type: text
    content: ianao no nentiko nandringana fanjakana;
  '21':
  - type: text
    content: ianao no nentiko nanorotoro soavaly sy ny mpitaingina azy;
  - type: text
    content: ianao no nentiko nanorotoro ny kalesy fitondra miady sy ny mpitaingina azy;
  '22':
  - type: text
    content: ianao koa no nentiko nanorotoro ny lehilahy sy ny vehivavy;
  - type: text
    content: ianao no nentiko nanorotoro ny antitra sy ny tanora;
  - type: text
    content: ianao no nentiko nanorotoro ny zatovolahy sy ny zatovovavy;
  '23':
  - type: text
    content: ianao koa no nentiko nanorotoro ny mpiandry ondry sy ny andian’ondry;
  - type: text
    content: ianao no nentiko nanorotoro ny mpiasa tany sy ny ombiny miray zioga;
  - type: text
    content: ianao no nentiko nanorotoro ny governora sy ny lefiny.
  '24':
  - type: text
    content: Ary hampanodiaviko an’i Babilona
  - type: text
    content: sy ny mponina rehetra any Kaldea
  - type: text
    content: 'ny ratsy rehetra izay efa nataony tao '
  - type: text
    content: Ziona
  - type: text
    content: ' teo imasonareo,'
  - type: text
    content: hoy NY TOMPO.
  '25':
  - type: text
    content: Indro mamely anao Aho, ry tendrombohitra ahitan-doza,
  - type: text
    content: izay mandringana ny tany rehetra,
  - type: text
    content: hoy NY TOMPO;
  - type: text
    content: ary hatsotrako ny tanako hamelezana anao,
  - type: text
    content: dia hakodiako hianjera amin’ny harambato ianao
  - type: text
    content: ka hataoko tendrombohitra mirehitra.
  '26':
  - type: text
    content: Ary tsy mba hakana vato hatao fehizoro ianao,
  - type: text
    content: na hatao vato fanorenana;
  - type: text
    content: fa ho lao mandrakizay ianao,
  - type: text
    content: hoy NY TOMPO.
  '27':
  - type: text
    content: Manangàna faneva eny amin’ny tany;
  - type: text
    content: mitsofa anjomara any amin’ny firenena;
  - type: text
    content: manendre firenena hamely azy;
  - type: text
    content: antsoy ny fanjakan’i Ararata
  - type: text
    content: sy i Miny ary i Askenaza hamely azy;
  - type: text
    content: asio mpitari-tafika hamely azy;
  - type: text
    content: mampiakara soavaly toy ny valala volovoloina.
  '28':
  - type: text
    content: Manendre firenena
  - type: text
    content: sy ireo mpanjakan’ny Mediana hamely azy;
  - type: text
    content: ao koa ny governora sy ny lefiny rehetra
  - type: text
    content: ary ny tany rehetra anjakany.
  '29':
  - type: text
    content: Mihorohoro sy mangovitra ny tany
  - type: text
    content: fa tanterahina amin’i Babilona ny fikasan’NY TOMPO rehetra
  - type: text
    content: mba hahatonga ny tany Babilona ho lao tsy misy mponina intsony.
  '3':
  - type: text
    content: Izay manenjana tsipìka mbamin’izay miandranandrana amin’ny akanjo fiarovan-tratrany,
  - type: text
    content: dia aoka samy hasian’izay manenjana tsipìka;
  - type: text
    content: aza tsitsìnareo ny zatovony,
  - type: text
    content: aringano toy ny zavatra voaozona avokoa ny miaramilany rehetra
  '30':
  - type: text
    content: Nitsahatra tamin’ny ady ny lehilahy maherin’i Babilona,
  - type: text
    content: nitoetra tao amin’ny manda fiarovana izy,
  - type: text
    content: lany ny heriny;
  - type: text
    content: tonga toy ny vehivavy izy;
  - type: text
    content: nodorana ny fonenany,
  - type: text
    content: tapaka ny hidiny.
  '31':
  - type: text
    content: Mifamoivoy be ihany ny iraka mpihazakazaka
  - type: text
    content: ary mifamoivoy be ihany ny mpitondra teny
  - type: text
    content: mba hanambara amin’ny mpanjakan’i Babilona
  - type: text
    content: fa azo ny tanànany manontolo.
  '32':
  - type: text
    content: Ary efa azo ny lalana fiampitàna
  - type: text
    content: ary nodorany tamin’ny afo ny heniheny
  - type: text
    content: sady toran-kovitra ny miaramila.
  - type: heading
    content: Noraisin’Andriamanitra an-tanana ny famaliana ny vahoakany
  '33':
  - type: text
    content: 'Fa izao no lazain’Andriamanitra, Tompon’izao rehetra izao, Andriamanitry ny Israely:'
  - type: text
    content: Babilona zanakavavy dia tahaka ny famoloana amin’ny andro anosena azy;
  - type: text
    content: ary vetivety foana
  - type: text
    content: dia ho avy ny andro hijinjana azy.
  '34':
  - type: text
    content: Efa lanin’i Nebokadnezara, mpanjakan’i Babilona, izahay;
  - type: text
    content: naringany izahay;
  - type: text
    content: napetrany toy ny vata tsy misy entana izahay;
  - type: text
    content: nateliny toy ny fitelin’ny mamba izahay;
  - type: text
    content: nivokisan’ny kibony ny zavatra tena tianay
  - type: text
    content: ka nandroaka anay izy.
  '35':
  - type: text
    content: 'Aoka ny mponina ao '
  - type: text
    content: Ziona
  - type: text
    content: ' hiteny hoe:'
  - type: text
    content: Hanody an’i Babilona anie ny loza nanjo ahy sy nihatra tamin’ny nofoko!
  - type: text
    content: 'Ary aoka i Jerosalema hiteny hoe:'
  - type: text
    content: Hanody ny mponina any Kaldea anie ny rako!
  '36':
  - type: text
    content: 'Koa izao no lazain’NY TOMPO:'
  - type: text
    content: Indro, hisolo vava anao amin’ny adinao Aho
  - type: text
    content: sady hanao famaliana ho anao
  - type: text
    content: ary horitiko ny ranomasiny,
  - type: text
    content: ary hataoko tankina ny loharanony.
  '37':
  - type: text
    content: Ho tonga korontam-bato i Babilona,
  - type: text
    content: ho fonenan’ny amboadia,
  - type: text
    content: ho figagana sy ho zavatra mampisitrisitra
  - type: text
    content: ka tsy hisy mponina intsony.
  '38':
  - type: text
    content: Hiara-mierona toy ny liona tanora izy;
  - type: text
    content: hikaonkaona toy ny zanaky ny liona izy.
  '39':
  - type: text
    content: Raha mbola liana izy
  - type: text
    content: dia hanaovako fanasana ho azy
  - type: text
    content: ka hataoko mamo izy
  - type: text
    content: mba hiravoravo,
  - type: text
    content: dia hatory amin’ny torimaso mandrakizay izy
  - type: text
    content: ka tsy hifoha intsony,
  - type: text
    content: hoy NY TOMPO.
  '4':
  - type: text
    content: mba hiampatrampatra any amin’ny tanin’ny Kaldeana ny faty,
  - type: text
    content: ary izay voatrobaka dia hiampatrampatra eny an-dalamben’i Babilona.
  '40':
  - type: text
    content: Hampidiniko toy ny zanak’ondry ho any amin’ny famonoana izy,
  - type: text
    content: ary toy ny ondrilahy mbamin’ny osilahy.
  - type: heading
    content: Fitomaniana ny amin’ny Babilona
  '41':
  - type: text
    content: Endre! Azo i Sesaka
  - type: note
    content: 'Sesaka: Babela.'
  - type: text
    content: '!'
  - type: text
    content: Ary azo ilay fideran’ny tany rehetra,
  - type: text
    content: endre! Tonga figagana any amin’ny firenena i Babilona.
  '42':
  - type: text
    content: Nanafotra an’i Babilona ny ranomasina;
  - type: text
    content: voasaron’ny habetsahan’ny onjany izy.
  '43':
  - type: text
    content: Ny tanànany dia lao
  - type: text
    content: sy karankaina ary ngazana,
  - type: text
    content: dia tany tsy onenan’ny olona
  - type: text
    content: sady tsy misy zanak’olombelona mamakivaky eo.
  '44':
  - type: text
    content: Ary i Bela dia hampijaliako any Babilona
  - type: text
    content: ka hasaiko haloany izay nateliny;
  - type: text
    content: ary tsy hitanjozotra hankany aminy intsony ny firenena;
  - type: text
    content: ny mandan’i Babilona dia hirodana.
  '45':
  - type: text
    content: Mivoaha avy ao afovoany ianareo, ry oloko,
  - type: text
    content: ary samia mamonjy ny ainareo avy ianareo
  - type: text
    content: mba tsy ho azon’ny firehetan’ny fahatezeran’NY TOMPO.
  '46':
  - type: text
    content: Ary andrao ho ketraka ny fonareo ka hatahotra ianareo noho ny tsaho miely amin’ny tany; fa amin’ny taona iray dia misy tsaho, ary amin’ny taona manaraka indray dia mbola hisy tsaho ihany koa; zava-doza fa mpanjakazaka no mamely mpanjakazaka hafa.
  '47':
  - type: text
    content: Koa indro, avy ny andro
  - type: text
    content: hamaliako ny sarin-javatra voasokitr’i Babilona;
  - type: text
    content: ho menatra ny taniny rehetra;
  - type: text
    content: ary ny fatiny rehetra dia hiampatrampatra eo aminy.
  '48':
  - type: text
    content: Ny lanitra sy ny tany sy izay rehetra ao aminy dia hihoby
  - type: text
    content: noho ny amin’i Babilona
  - type: text
    content: satria tonga ao aminy avy any avaratra ireo mpandringana,
  - type: text
    content: hoy NY TOMPO.
  '49':
  - type: text
    content: Toy ny nampiampatramparan’i Babilona ny faty tamin’ny Israely,
  - type: text
    content: dia ho toy izany no hiampatramparan’ny faty amin’ny tany rehetra, noho ny amin’i Babilona.
  '5':
  - type: text
    content: Fa Andriamanitra, Tompon’izao rehetra izao,
  - type: text
    content: Andriamanitry ny Israely sy ny Joda, dia tsy hahafoy azy ireo ho mpitondratena,
  - type: text
    content: na dia henika ny fahotany amin’ny Iray Masin’ny Israely
  - type: text
    content: aza ny taniny.
  '50':
  - type: text
    content: Ianareo izay tsy voan’ny sabatra dia mialà fa aza mijanona;
  - type: text
    content: tsarovy NY TOMPO raha mbola lavitra ianareo,
  - type: text
    content: ary aoka ho an-tsainareo i Jerosalema.
  '51':
  - type: text
    content: Nahatsiaro menatra izahay
  - type: text
    content: fa nandre latsa;
  - type: text
    content: nanarona ny tavanay ny henatra;
  - type: text
    content: fa ny hafa firenena no niditra
  - type: text
    content: teo amin’ny fitoerana masina amin’ny tranon’NY TOMPO.
  '52':
  - type: text
    content: Koa indro, avy ny andro,
  - type: text
    content: hoy NY TOMPO,
  - type: text
    content: izay hamaliako ny sarin-javatra voasokitra ao koa;
  - type: text
    content: ary hitoloko manerana ny taniny rehetra ny voatrobaka.
  '53':
  - type: text
    content: Na dia miakatra any an-danitra aza i Babilona,
  - type: text
    content: ary na dia ataony mafy aza ny manda mafy sady avo izay heriny
  - type: text
    content: dia avy Amiko no hiavian’ny mpandringana azy,
  - type: text
    content: hoy NY TOMPO.
  '54':
  - type: text
    content: Injany misy feo mitaraina avy any Babilona
  - type: text
    content: ary fandringanana be avy any amin’ny tanin’ny Kaldeana!
  '55':
  - type: text
    content: Fa NY TOMPO mandrava an’i Babilona
  - type: text
    content: sy mampitsahatra ny fihorakorahana eo aminy,
  - type: text
    content: ary hirohondrohona toy ny ranobe ny onjany,
  - type: text
    content: eny, re tokoa ny feon’ny firohondrohony.
  '56':
  - type: text
    content: Fa tonga ao aminy, dia ao Babilona, ny mpandringana,
  - type: text
    content: ary voasambotra ny lehilahy maheriny;
  - type: text
    content: tapatapaka avokoa ny tsipìkany
  - type: text
    content: satria NY TOMPO dia Andriamanitry ny famaliana
  - type: text
    content: ka hamaly tokoa.
  '57':
  - type: text
    content: 'Ary hataoko mamo ny mpanapaka azy sy ny olon-kendriny, ny governorany sy ny lefiny ary ny mpiady maheriny; ary hatory amin’ny torimaso mandrakizay izy ka tsy hifoha intsony, hoy ny Mpanjaka, izay antsoina hoe: Andriamanitra, Tompon’izao rehetra izao. '
  '58':
  - type: text
    content: 'Izao no lazain’Andriamanitra, Tompon’izao rehetra izao:'
  - type: text
    content: Ny manda matevina any Babilona dia horavana tanteraka hatramin’ny fanorenany
  - type: text
    content: ary hodorana amin’ny afo
  - type: text
    content: ny vavahadiny avo.
  - type: text
    content: Koa ho foana ny nisasaran’ny firenena
  - type: text
    content: ary ho nisasatra ho an’ny afo ny olona ka ho reraka.
  - type: heading
    content: Ilay boky natsipy tao Eofrata
  '59':
  - type: text
    content: 'Ny teny izay nandidian’i Jeremia mpaminany an’i Seraia, zanak’i Neria, zanak’i Mahaseia, fony izy nandeha niaraka tamin’i Zedekia, mpanjakan’ny Joda, ho any Babilona tamin’ny taona fahefatra nanjakany. Fa i Seraia no lehiben’ny fandraharahana. '
  '6':
  - type: text
    content: Mandosira hiala an’i Babilona ianareo, ary samia mamonjy ny ainareo avy;
  - type: text
    content: aoka tsy ho voaringana noho ny fahotany ianareo,
  - type: text
    content: fa izao no andro famalian’NY TOMPO;
  - type: text
    content: Izy no hamaly azy.
  '60':
  - type: text
    content: 'Ary nosoratan’i Jeremia tao amin’ny boky iray ny loza rehetra izay hanjo an’i Babilona, dia ireo teny rehetra ireo, izay voasoratra ny amin’i Babilona. '
  '61':
  - type: text
    content: 'Ary hoy i Jeremia tamin’i Seraia: Rehefa tonga any Babilona ianao dia tandremo tsara mba hovakinao ireo teny rehetra ireo '
  '62':
  - type: text
    content: 'ka lazao hoe: TOMPO ô, Ianao no niteny hamely ity tany ity ka handringana azy ary tsy hisy hitoetra eto, na olona, na biby, fa ho tany lao mandrakizay izy. '
  '63':
  - type: text
    content: 'Ary rehefa tapitra ny famakianao ity boky ity dia asio vato afehy aminy, ary atsipazo ao Eofrata izy, '
  '64':
  - type: text
    content: 'koa teneno hoe: Toy izao no hilentehan’i Babilona ka tsy hifongarany intsony noho ny loza hataoko mihatra aminy, ary ho reraka izy. Hatreto no tenin’i Jeremia.'
  '7':
  - type: text
    content: Babilona dia kapoaka volamena teny an-tanan’NY TOMPO,
  - type: text
    content: izay nahamamo ny tany rehetra;
  - type: text
    content: efa nisotroan’ny firenena ny divainy,
  - type: text
    content: koa izany no nahavery saina ireny.
  '8':
  - type: text
    content: Tampoka no naharavan’i Babilona sy nahatorotoro azy;
  - type: text
    content: idradradradrao izy; makà balisama hatao amin’ny feriny maharary azy,
  - type: text
    content: fa angamba ho sitrana ihany izy.
  '9':
  - type: text
    content: Nitady hanasitrana an’i Babilona izahay,
  - type: text
    content: nefa tsy nety sitrana izy;
  - type: text
    content: afoizo izy
  - type: text
    content: ka andeha isika samy handeha ho any amin’ny tanintsika avy;
  - type: text
    content: fa mahatakatra ny lanitra ny helony
  - type: text
    content: ary mitehika amin’ny rahona.
