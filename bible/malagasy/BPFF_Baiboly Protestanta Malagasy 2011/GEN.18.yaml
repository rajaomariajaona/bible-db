document_id: GEN.18,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ambaran’Andriamanitra fa hiteraka zazalahy i Saraha
  - type: text
    content: 'Ary NY TOMPO niseho tamin’i Abrahama teo amin’ireo hazo '
  - type: text
    content: terebinta
  - type: text
    content: 'n’i Mamre, raha izy nipetraka teo am-baravaran’ny tranolainy, tamin’ny fotoana nampafana ny andro. '
  '10':
  - type: text
    content: 'Ary hoy Izy: Hiverina atỳ aminao tokoa Aho amin’ny herintaona toy izao; ary indro, hiteraka zazalahy i Saraha vadinao.'
  - type: text
    content: Ary i Saraha dia nihaino teo am-baravaran’ny tranolay izay tao ambadik’Ilay niteny.
  '11':
  - type: text
    content: 'I Abrahama sy i Saraha dia samy efa zokiolona ary nandroso fahanterana, sady efa nitsahatra tamin’ny fombam-behivavy i Saraha. '
  '12':
  - type: text
    content: 'Koa nihomehy anakampo i Saraha hoe: Moa mbola hanana fahafinaretana ihany va aho na dia efa tratra antitra toy izao aza sady efa antitra koa ity ny tompoko? '
  '13':
  - type: text
    content: 'Dia hoy NY TOMPO tamin’i Abrahama: Nahoana no nihomehy i Saraha ka niteny hoe: Hiteraka tokoa va aho, kanefa izao efa antitra izao? '
  '14':
  - type: text
    content: 'Fa moa misy zava-mahagaga izay tsy hain’NY TOMPO va? Amin’ny fotoana voatendry, amin’ny herintaona toy izao, dia hiverina atỳ aminao Aho, ary hiteraka zazalahy i Saraha. '
  '15':
  - type: text
    content: 'Dia nandà i Saraha satria natahotra ka hoy izy hoe: Tsy nihomehy izany aho! Fa hoy Ilay niteny teo hoe: Tsia; nihomehy ianao!'
  - type: heading
    content: Nifona ho an’i Sodoma i Abrahama
  '16':
  - type: text
    content: 'Dia nitsangana ireo lehilahy ireo ka niala teo dia nitodi-doha ho any Sodoma; ary niaraka tamin’izy ireo i Abrahama mba hanatitra azy. '
  '17':
  - type: text
    content: 'Ary hoy NY TOMPO hoe: Hafeniko amin’i Abrahama va izay hataoko? '
  '18':
  - type: text
    content: 'Fa ho tonga firenena lehibe sy mahery tokoa i Abrahama, ary aminy no hitahiana ny firenena rehetra ambonin’ny tany. '
  '19':
  - type: text
    content: 'Fa nifidy azy Aho mba handidy ny zanany sy ny taranany mandimby azy hitandrina ny lalan’NY TOMPO ka hanao izay marina sy mahitsy izy ireo, dia hotanterahin’NY TOMPO amin’i Abrahama izay nolazainy momba azy. '
  '2':
  - type: text
    content: 'Dia nanopy ny masony izy ka nijery ary indreo, nisy telo lahy nijoro tandrifiny. Nony nahita ireo izy dia niala teo am-baravaran’ny tranolainy ka nihazakazaka hitsena azy ireo, dia niankohoka tamin’ny tany '
  '20':
  - type: text
    content: 'Hoy ihany NY TOMPO: Ny fitarainana momba an’i Sodoma sy i Gomora dia be tokoa, ary ny fahotany dia tena mavesatra. '
  '21':
  - type: text
    content: 'Hidina Aho ka hizaha na tena nahavita izany tokoa, araka ny fitarainan’ny tany, izay tonga atỳ Amiko, izy ireo na tsia; raha tsy izany dia ho fantatro ihany. '
  '22':
  - type: text
    content: 'Dia nihodina niala teo ireo lehilahy ireo ka nandroso ho any Sodoma. I Abrahama kosa dia mbola nijanona teo anatrehan’NY TOMPO. '
  '23':
  - type: text
    content: 'Dia nanatona i Abrahama ka niteny hoe: Haringanao miaraka amin’ny meloka va ny marina? '
  '24':
  - type: text
    content: 'Angamba misy olona marina dimampolo ao an-tanàna; haringanao koa va ireo fa tsy mba hamindranao fo ny tanàna noho ny dimampolo marina izay ao? '
  '25':
  - type: text
    content: 'Sanatria Anao ny hahavita izany ka hamono ny marina miaraka amin’ny meloka, koa ny marina dia hatao tahaka ny meloka; sanatria Anao izany! Tsy hitsara marina va ny Mpitsara ny tany rehetra? '
  '26':
  - type: text
    content: 'Hoy NY TOMPO: Raha mahita olona marina dimampolo ao an-tanànan’i Sodoma Aho dia hamindra fo amin’io toerana io manontolo noho ireny. '
  '27':
  - type: text
    content: 'Dia hoy i Abrahama: Indro, sahy miteny amin’ny Tompo aho nefa vovoka sy lavenona: '
  '28':
  - type: text
    content: 'Angamba ho latsaka dimy ny olona marina dimampolo. Moa haringanao va ny tanàna manontolo noho ny dimy? Hoy Izy: Tsy handringana Aho raha mahita olona marina dimy amby efapolo ao. '
  '29':
  - type: text
    content: 'Dia mbola niteny Taminy indray izy hoe: Angamba olona marina efapolo no ho hita ao. Ary hoy Izy: Tsy mba hahavita izany Aho noho ny olona marina efapolo. '
  '3':
  - type: text
    content: 'ary niteny hoe: Tompo ô, raha mahita fitia eto imasonao aho, miangavy anao aho, aza dia andalovana fotsiny ny mpanomponao. '
  '30':
  - type: text
    content: 'Hoy indray i Abrahama: Aoka anie mba tsy ho tezitra ny Tompo fa mbola hiteny aho: Angamba olona marina telopolo no ho hita ao. Ary hoy NY TOMPO: Tsy mba hahavita izany Aho raha mahita olona marina telopolo ao. '
  '31':
  - type: text
    content: 'Dia hoy ihany i Abrahama: Indro, sahy miteny amin’ny Tompo aho: Angamba olona marina roapolo no ho hita ao. Ary hoy Izy: Tsy mba handringana azy Aho noho ny olona marina roapolo. '
  '32':
  - type: text
    content: 'Dia nanohy indray i Abrahama: Aoka anie mba tsy ho tezitra Ianao, Tompo ô, fa hiteny izao indray mandeha izao ihany aho: Angamba folo no ho hita ao. Ary hoy NY TOMPO: Tsy mba handringana Aho noho ny folo. '
  '33':
  - type: text
    content: Dia lasa nandeha NY TOMPO rehefa vita ny teny nataony tamin’i Abrahama, ary niverina ho any amin’ny fonenany i Abrahama.
  '4':
  - type: text
    content: 'Aoka hakana rano kely ianareo hanasana ny tongotrareo, ary aoka mba hiala sasatra kely eo am-pototry ny hazo ianareo! '
  '5':
  - type: text
    content: 'Dia haka mofo kely aho hataonareo ody am-bavafo; rehefa afaka izany dia handeha ihany ianareo; fa tonga atỳ amin’ny mpanomponareo ianareo. Hoy izy telo lahy: Eny ary, ataovy araka izay lazainao.'
  '6':
  - type: text
    content: 'Dia nandeha haingana i Abrahama nankany an-day tany amin’i Saraha ka niteny hoe: Faingàna ianao ka makà koba tsara toto intelon’ny famarana, dia fetafetao ka anamboary mofo. '
  '7':
  - type: text
    content: 'Nihazakazaka kosa i Abrahama nankany amin’ny omby, dia naka zanak’omby tanora sady tsara ka nanolotra azy tamin’ny zatovo, izay lasa haingana hanamboatra izany. '
  '8':
  - type: text
    content: Ary naka rononomandry sy ronono ary ilay zanak’omby namboariny izy, dia narosony teo anoloan’izy telo lahy; nijoro teo anilan’izy telo lahy teo ambanin’ny hazo izy raha mbola nisakafo ireo.
  '9':
  - type: text
    content: 'Ary hoy izy telo lahy tamin’i Abrahama: Aiza i Saraha vadinao? Dia hoy izy: Indro, ao an-day izy. '
