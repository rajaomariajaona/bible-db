document_id: GEN.18,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ambaran’Andriamanitra fa hiteraka zazalahy i Saraha
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ary NY TOMPO niseho tamin’i Abrahama teo amin’ireo hazo '
    - type: usfm
      marker: w
      children:
      - type: text
        text: terebinta
    - type: text
      text: 'n’i Mamre, raha izy nipetraka teo am-baravaran’ny tranolainy, tamin’ny fotoana nampafana ny andro. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ary hoy Izy: Hiverina atỳ aminao tokoa Aho amin’ny herintaona toy izao; ary indro, hiteraka zazalahy i Saraha vadinao.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary i Saraha dia nihaino teo am-baravaran’ny tranolay izay tao ambadik’Ilay niteny.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'I Abrahama sy i Saraha dia samy efa zokiolona ary nandroso fahanterana, sady efa nitsahatra tamin’ny fombam-behivavy i Saraha. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Koa nihomehy anakampo i Saraha hoe: Moa mbola hanana fahafinaretana ihany va aho na dia efa tratra antitra toy izao aza sady efa antitra koa ity ny tompoko? '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Dia hoy NY TOMPO tamin’i Abrahama: Nahoana no nihomehy i Saraha ka niteny hoe: Hiteraka tokoa va aho, kanefa izao efa antitra izao? '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Fa moa misy zava-mahagaga izay tsy hain’NY TOMPO va? Amin’ny fotoana voatendry, amin’ny herintaona toy izao, dia hiverina atỳ aminao Aho, ary hiteraka zazalahy i Saraha. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Dia nandà i Saraha satria natahotra ka hoy izy hoe: Tsy nihomehy izany aho! Fa hoy Ilay niteny teo hoe: Tsia; nihomehy ianao!'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Nifona ho an’i Sodoma i Abrahama
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Dia nitsangana ireo lehilahy ireo ka niala teo dia nitodi-doha ho any Sodoma; ary niaraka tamin’izy ireo i Abrahama mba hanatitra azy. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Ary hoy NY TOMPO hoe: Hafeniko amin’i Abrahama va izay hataoko? '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Fa ho tonga firenena lehibe sy mahery tokoa i Abrahama, ary aminy no hitahiana ny firenena rehetra ambonin’ny tany. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Fa nifidy azy Aho mba handidy ny zanany sy ny taranany mandimby azy hitandrina ny lalan’NY TOMPO ka hanao izay marina sy mahitsy izy ireo, dia hotanterahin’NY TOMPO amin’i Abrahama izay nolazainy momba azy. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Dia nanopy ny masony izy ka nijery ary indreo, nisy telo lahy nijoro tandrifiny. Nony nahita ireo izy dia niala teo am-baravaran’ny tranolainy ka nihazakazaka hitsena azy ireo, dia niankohoka tamin’ny tany '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Hoy ihany NY TOMPO: Ny fitarainana momba an’i Sodoma sy i Gomora dia be tokoa, ary ny fahotany dia tena mavesatra. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Hidina Aho ka hizaha na tena nahavita izany tokoa, araka ny fitarainan’ny tany, izay tonga atỳ Amiko, izy ireo na tsia; raha tsy izany dia ho fantatro ihany. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Dia nihodina niala teo ireo lehilahy ireo ka nandroso ho any Sodoma. I Abrahama kosa dia mbola nijanona teo anatrehan’NY TOMPO. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Dia nanatona i Abrahama ka niteny hoe: Haringanao miaraka amin’ny meloka va ny marina? '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Angamba misy olona marina dimampolo ao an-tanàna; haringanao koa va ireo fa tsy mba hamindranao fo ny tanàna noho ny dimampolo marina izay ao? '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Sanatria Anao ny hahavita izany ka hamono ny marina miaraka amin’ny meloka, koa ny marina dia hatao tahaka ny meloka; sanatria Anao izany! Tsy hitsara marina va ny Mpitsara ny tany rehetra? '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Hoy NY TOMPO: Raha mahita olona marina dimampolo ao an-tanànan’i Sodoma Aho dia hamindra fo amin’io toerana io manontolo noho ireny. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Dia hoy i Abrahama: Indro, sahy miteny amin’ny Tompo aho nefa vovoka sy lavenona: '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Angamba ho latsaka dimy ny olona marina dimampolo. Moa haringanao va ny tanàna manontolo noho ny dimy? Hoy Izy: Tsy handringana Aho raha mahita olona marina dimy amby efapolo ao. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Dia mbola niteny Taminy indray izy hoe: Angamba olona marina efapolo no ho hita ao. Ary hoy Izy: Tsy mba hahavita izany Aho noho ny olona marina efapolo. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'ary niteny hoe: Tompo ô, raha mahita fitia eto imasonao aho, miangavy anao aho, aza dia andalovana fotsiny ny mpanomponao. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Hoy indray i Abrahama: Aoka anie mba tsy ho tezitra ny Tompo fa mbola hiteny aho: Angamba olona marina telopolo no ho hita ao. Ary hoy NY TOMPO: Tsy mba hahavita izany Aho raha mahita olona marina telopolo ao. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Dia hoy ihany i Abrahama: Indro, sahy miteny amin’ny Tompo aho: Angamba olona marina roapolo no ho hita ao. Ary hoy Izy: Tsy mba handringana azy Aho noho ny olona marina roapolo. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Dia nanohy indray i Abrahama: Aoka anie mba tsy ho tezitra Ianao, Tompo ô, fa hiteny izao indray mandeha izao ihany aho: Angamba folo no ho hita ao. Ary hoy NY TOMPO: Tsy mba handringana Aho noho ny folo. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Dia lasa nandeha NY TOMPO rehefa vita ny teny nataony tamin’i Abrahama, ary niverina ho any amin’ny fonenany i Abrahama.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Aoka hakana rano kely ianareo hanasana ny tongotrareo, ary aoka mba hiala sasatra kely eo am-pototry ny hazo ianareo! '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Dia haka mofo kely aho hataonareo ody am-bavafo; rehefa afaka izany dia handeha ihany ianareo; fa tonga atỳ amin’ny mpanomponareo ianareo. Hoy izy telo lahy: Eny ary, ataovy araka izay lazainao.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Dia nandeha haingana i Abrahama nankany an-day tany amin’i Saraha ka niteny hoe: Faingàna ianao ka makà koba tsara toto intelon’ny famarana, dia fetafetao ka anamboary mofo. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Nihazakazaka kosa i Abrahama nankany amin’ny omby, dia naka zanak’omby tanora sady tsara ka nanolotra azy tamin’ny zatovo, izay lasa haingana hanamboatra izany. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Ary naka rononomandry sy ronono ary ilay zanak’omby namboariny izy, dia narosony teo anoloan’izy telo lahy; nijoro teo anilan’izy telo lahy teo ambanin’ny hazo izy raha mbola nisakafo ireo.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ary hoy izy telo lahy tamin’i Abrahama: Aiza i Saraha vadinao? Dia hoy izy: Indro, ao an-day izy. '
