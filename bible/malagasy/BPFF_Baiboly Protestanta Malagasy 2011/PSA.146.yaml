- type: usfm
  marker: q1
  children:
  - type: text
    text: Miderà NY TOMPO, ry fanahiko!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Hidera NY TOMPO aho raha mbola miaina koa;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, hankalaza an’Andriamanitro aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: raha mbola velona koa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Aza matoky ny mpanapaka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: na ny zanak’olombelona izay tsy mahavonjy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Miala ny fofonainy ka miverina ho amin’ny tany izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary amin’izay indrindra no hahafoanan’ny fikasany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Sambatra izay manana an’Andriamanitr’i Jakoba ho Mpamonjy azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady manantena NY TOMPO Andriamaniny
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: izay nanao ny lanitra sy ny tany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny ranomasina sy izay rehetra ao anatiny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay mitandrina fahamarinana mandrakizay;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: izay manome rariny ho an’ny ampahorina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay manome hanina ho an’ny noana.
- type: usfm
  marker: q1
  children:
  - type: text
    text: NY TOMPO no mamaha ny mpifatotra;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: NY TOMPO no mampahiratra ny jamba;
- type: usfm
  marker: q1
  children:
  - type: text
    text: NY TOMPO no mampitraka ny mitanondrika;
- type: usfm
  marker: q1
  children:
  - type: text
    text: NY TOMPO no tia ny marina;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: NY TOMPO no miaro ny vahiny
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary manohana ny kamboty sy ny mpitondratena
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa mamadika ny lalan’ny ratsy fanahy kosa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: NY TOMPO no manjaka mandrakizay,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ho an’ny taranaka fara aman-dimby ny Andriamanitrao ry '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Ziona
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: Haleloia.
