document_id: PSA.146,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Mpiaro ny reraka NY TOMPO
  - type: text
    content: ' '
  - type: text
    content: Haleloia
  - type: text
    content: .
  - type: text
    content: Miderà NY TOMPO, ry fanahiko!
  '10':
  - type: text
    content: NY TOMPO no manjaka mandrakizay,
  - type: text
    content: 'ho an’ny taranaka fara aman-dimby ny Andriamanitrao ry '
  - type: text
    content: Ziona
  - type: text
    content: .
  - type: text
    content: Haleloia.
  '2':
  - type: text
    content: Hidera NY TOMPO aho raha mbola miaina koa;
  - type: text
    content: eny, hankalaza an’Andriamanitro aho
  - type: text
    content: raha mbola velona koa.
  '3':
  - type: text
    content: Aza matoky ny mpanapaka,
  - type: text
    content: na ny zanak’olombelona izay tsy mahavonjy.
  '4':
  - type: text
    content: Miala ny fofonainy ka miverina ho amin’ny tany izy
  - type: text
    content: ary amin’izay indrindra no hahafoanan’ny fikasany.
  '5':
  - type: text
    content: Sambatra izay manana an’Andriamanitr’i Jakoba ho Mpamonjy azy
  - type: text
    content: sady manantena NY TOMPO Andriamaniny
  '6':
  - type: text
    content: izay nanao ny lanitra sy ny tany,
  - type: text
    content: ny ranomasina sy izay rehetra ao anatiny;
  - type: text
    content: izay mitandrina fahamarinana mandrakizay;
  '7':
  - type: text
    content: izay manome rariny ho an’ny ampahorina;
  - type: text
    content: izay manome hanina ho an’ny noana.
  - type: text
    content: NY TOMPO no mamaha ny mpifatotra;
  '8':
  - type: text
    content: NY TOMPO no mampahiratra ny jamba;
  - type: text
    content: NY TOMPO no mampitraka ny mitanondrika;
  - type: text
    content: NY TOMPO no tia ny marina;
  '9':
  - type: text
    content: NY TOMPO no miaro ny vahiny
  - type: text
    content: ary manohana ny kamboty sy ny mpitondratena
  - type: text
    content: fa mamadika ny lalan’ny ratsy fanahy kosa.
