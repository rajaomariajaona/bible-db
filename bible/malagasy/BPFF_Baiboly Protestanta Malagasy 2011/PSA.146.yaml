    - type: text
      text: Mpiaro ny reraka NY TOMPO
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Haleloia
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miderà NY TOMPO, ry fanahiko!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: NY TOMPO no manjaka mandrakizay,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ho an’ny taranaka fara aman-dimby ny Andriamanitrao ry '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Ziona
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Haleloia.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hidera NY TOMPO aho raha mbola miaina koa;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, hankalaza an’Andriamanitro aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: raha mbola velona koa.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aza matoky ny mpanapaka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na ny zanak’olombelona izay tsy mahavonjy.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miala ny fofonainy ka miverina ho amin’ny tany izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary amin’izay indrindra no hahafoanan’ny fikasany.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sambatra izay manana an’Andriamanitr’i Jakoba ho Mpamonjy azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady manantena NY TOMPO Andriamaniny
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay nanao ny lanitra sy ny tany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny ranomasina sy izay rehetra ao anatiny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay mitandrina fahamarinana mandrakizay;
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay manome rariny ho an’ny ampahorina;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay manome hanina ho an’ny noana.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: NY TOMPO no mamaha ny mpifatotra;
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: NY TOMPO no mampahiratra ny jamba;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: NY TOMPO no mampitraka ny mitanondrika;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: NY TOMPO no tia ny marina;
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: NY TOMPO no miaro ny vahiny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary manohana ny kamboty sy ny mpitondratena
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa mamadika ny lalan’ny ratsy fanahy kosa.
