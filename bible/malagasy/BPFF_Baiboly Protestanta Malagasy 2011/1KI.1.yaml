document_id: 1KI.1,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fahanteran’i Davida
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Efa zokiolona sady nandroso fahanterana i Davida mpanjaka; nototofana lamba maromaro izy nefa tsy nety nafana. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Fa i Natana mpaminany, i Benaia, ny lehilahy mahery ary i Solomona rahalahiny kosa tsy mba nasainy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Miandany amin’i Solomona i Natana sy i Batseba
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Hoy i Natana tamin’i Batseba, renin’i Solomona: Moa tsy renao va fa efa tonga mpanjaka i Adonia, zanak’i Hagita, nefa tsy fantatr’i Davida tompontsika akory izany? '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Koa etsy homeko saina ianao mba hamonjenao ny ainao sy ny ain’i Solomona zanakao. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Mandehana mankao amin’i Davida mpanjaka ka lazao aminy hoe: Tsy nianiana tamiko mpanompovavinao va ianao, ry mpanjaka tompoko hoe: I Solomona zanakao lahy no hanjaka handimby ahy, ary izy no hipetraka eo amin’ny sezafiandrianako? Koa nahoana no i Adonia indray no tonga mpanjaka? '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Ary raha mbola miteny amin’ny mpanjaka ianao dia hiditra manaraka anao koa aho ka hanamarina ny teninao.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Dia nankao amin’ny mpanjaka tao amin’ny efitrano fatoriany i Batseba. Efa antitra tokoa moa ny mpanjaka, ary i Abisaga sonemita no nanompo azy. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Dia niondrika i Batseba ka niankohoka teo anatrehan’ny mpanjaka. Hoy ny mpanjaka: Inona no ilainao? '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Hoy izy taminy: Tompokolahy ô, tamin’NY TOMPO Andriamanitrao no nianiananao ka nanomezanao toky ahy mpanompovavinao hoe: I Solomona zanakao lahy no hanjaka handimby ahy, ary izy no hipetraka eo amin’ny sezafiandrianako. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Kanjo izao indro, i Adonia no tonga mpanjaka, kanefa tsy fantatrao izany, ry mpanjaka tompoko! '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Efa namono omby sy zanak’omby mifahy ary ondry aman’osy betsaka izy ary efa nanasa ny zanakalahin’ny mpanjaka rehetra sy i Abiatara mpisorona ary i Joaba, lehiben’ny miaramila, fa i Solomona mpanomponao ihany no tsy mba nasainy. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Dia hoy ny mpanompony taminy: Aoka hitadiavana zazavavy virijiny ny mpanjaka tompoko; aoka hanompo ny mpanjaka izy ka ho mpitaiza azy, ary aoka handry eo amin’ny tratranao izy dia hampafana ny mpanjaka tompoko! '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Ary ianao, ry mpanjaka tompoko ô, ny mason’ny Israely rehetra no manandrandra anao mba hilazanao izay hipetraka eo amin’ny sezafiandriananao handimby anao, ry mpanjaka tompoko ô! '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Fa rehefa lasa modimandry any amin’ny razany ny mpanjaka tompoko, dia izaho sy i Solomona zanako no homena heloka.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Raha mbola niteny tamin’ny mpanjaka Ravehivavy, dia indro, niditra koa i Natana mpaminany. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Nisy nanambara tamin’ny mpanjaka hoe: Indro i Natana mpaminany! Dia niditra teo anatrehan’ny mpanjaka izy ka niankohoka tamin’ny tany teo anatrehany. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Ary hoy i Natana: Ry mpanjaka tompoko ô, fa angaha efa niteny ianao hoe: I Adonia no hanjaka handimby ahy, ary izy no hipetraka eo amin’ny sezafiandrianako? '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Fa nidina izy androany ka namono omby, zanak’omby mifahy, ondry aman’osy betsaka ary nanasa ny zanakalahin’ny mpanjaka rehetra sy ireo lehiben’ny miaramila sy i Abiatara mpisorona; ary indreo izy mihinana sy misotro eo anatrehany sady miteny hoe: Ho ela velona anie i Adonia mpanjaka! '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Fa izaho mpanomponao, i Zadoka mpisorona, i Benaia, zanak’i Joiada ary i Solomona mpanomponao ihany no tsy mba nasainy. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Moa avy tamin’ny mpanjaka tompoko va no nahatonga izany zavatra izany ka tsy mba nampahafantarinao ny mpanomponao izay hipetraka eo amin’ny sezafiandriananao handimby anao, ry mpanjaka tompoko?
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Ary hoy i Davida mpanjaka: Antsoy hankaty amiko i Batseba! Dia niditra nankeo anatrehan’ny mpanjaka izy ka nitsangana teo anatrehany. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Ary nianiana ny mpanjaka hoe: Raha velona koa NY TOMPO, izay namonjy ny aiko tamin’ny fahoriana rehetra, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Dia nitady zazavavy tsara tarehy manerana ny tanin’ny Israely rehetra izy ireo ka nahita an’i Abisaga sonemita izay noentiny tany amin’ny mpanjaka. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'dia tahaka ilay nianianako tamin’NY TOMPO, Andriamanitry ny Israely, ka nilazako hoe: I Solomona zanakao lahy no hanjaka handimby ahy ary izy no hipetraka eo amin’ny sezafiandrianako hisolo ahy, dia izany ihany no hataoko anio. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Ary niondrika i Batseba dia niankohoka tamin’ny tany teo anatrehan’ny mpanjaka ka niteny hoe: Ho velona mandrakizay anie i Davida mpanjaka tompoko!'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Nohosorana ho mpanjakan’ny Israely i Solomona
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 1Tan 29.21-25
    marker-yv: yv-h
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Ary hoy i Davida mpanjaka: Antsoy hankaty amiko i Zadoka mpisorona sy i Natana mpaminany ary i Benaia, zanak’i Joiada. Dia niditra nankeo anatrehan’ny mpanjaka izy telo lahy. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Hoy ny mpanjaka tamin’izy ireo: Ento miaraka aminareo ny mpanompon’ny tomponareo ary ampitaingeno ny ampondravaviko i Solomona zanako lahy ka ento midina any Gihona izy. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Ary aoka hanosotra azy any ho mpanjakan’ny Israely i Zadoka mpisorona sy i Natana mpaminany. Tsofinareo avy eo ny anjomara ka lazao hoe: Ho ela velona anie i Solomona mpanjaka! '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Dia miakara manaraka azy ianareo ary aoka hiditra izy ka hipetraka eo amin’ny sezafiandrianako; fa izy no ho mpanjaka hisolo ahy, satria izy no voatendriko ho mpitondra ny Israely sy ny Joda. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Ary namaly ny mpanjaka i Benaia, zanak’i Joiada hoe: Amena! Hiteny tahaka izany koa anie NY TOMPO, Andriamanitry ny mpanjaka tompoko! '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: Toy ny nomban’NY TOMPO ny mpanjaka tompoko anie no mba hombany an’i Solomona koa, ary hataony be voninahitra mihoatra noho ny sezafiandrianan’i Davida mpanjaka tompoko anie ny sezafiandrianan’i Solomona!
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: Dia nidina i Zadoka mpisorona, i Natana mpaminany, i Benaia, zanak’i Joiada, ary ny Keretita sy ny Peletita
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.38 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Zahao '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 2Sam 8.18.
      marker-yv: yv-n
    - type: text
      text: ' ka nampitaingenin’izy ireo ny ampondravavin’i Davida mpanjaka i Solomona ary noentiny nankany Gihona. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Ary naka ny tandroka misy diloilo tao amin’ny tranolay i Zadoka mpisorona ka nanosotra an’i Solomona. Notsofina avy eo ny anjomara sady hoy ny vahoaka rehetra: Ho ela velona anie i Solomona mpanjaka! '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Tena tsara tarehy Razazavavy. Tonga mpitaiza ny mpanjaka sady nanompo azy izy. Ny mpanjaka anefa dia tsy nanam-piraisana taminy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Te hitsangana ho mpanjaka i Adonia
    marker-yv: yv-h
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: Dia niakatra nanaraka azy ny vahoaka rehetra sady nitsoka sodina no nifaly indrindra ka nila hitresaka ny tany noho ny feony.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Tsy nikasika an’i Adonia i Solomona
    marker-yv: yv-h
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'Ren’i Adonia sy ireo olona rehetra izay nasaina teo aminy izany rehefa nitsahatra nihinana izy ireo. Dia hoy i Joaba nony nahare ny feon’ny anjomara: Inona re izao hotakotaka mampitabataba ny tanàna izao? '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'Fa raha mbola niteny izy dia indro tonga i Jonatana, zanak’i Abiatara mpisorona. Dia hoy i Adonia taminy: Mandrosoa, fa lehilahy azo antoka ianao ka vaovao tsara no hoentinao. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'Nefa hoy i Jonatana tamin’i Adonia: Tsia! Tsy izany velively fa i Davida mpanjaka tompontsika dia nanangana an’i Solomona ho mpanjaka. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: 'Ary ny mpanjaka no naniraka an’i Zadoka mpisorona, i Natana mpaminany, i Benaia, zanak’i Joiada ary ny Keretita sy ny Peletita hiaraka aminy ka nampitaingenin’ireo ny ampondravavin’ny mpanjaka izy. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: 'Dia nohosoran’i Zadoka mpisorona sy i Natana mpaminany ho mpanjaka tao Gihona izy. Niakatra avy teo izy ireo sady nifaly ka naresaka be terỳ ny tanàna. Izany no tabataba renareo. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: 'Ary i Solomona aza izao dia efa mipetraka eo amin’ny sezafiandrianan’ny fanjakana. '
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: 'Dia tonga koa ny mpanompon’ny mpanjaka hisaotra an’i Davida mpanjaka tompontsika hoe: Hataon’Andriamanitrao ho tsara noho ny anaranao anie ny anaran’i Solomona, ary hataony ho be voninahitra mihoatra noho ny sezafiandriananao anie ny sezafiandrianany! Dia niankohoka teo am-parafara ny mpanjaka '
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: 'ka niteny hoe: Isaorana anie NY TOMPO, Andriamanitry ny Israely, izay nanolotra ny mpandimby ahy eo amin’ny sezafiandrianako androany, sady hitan’ny masoko koa izany. '
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: 'Dia raiki-tahotra izay rehetra nasain’i Adonia ka niainga ary samy lasa nandeha tamin’izay nalehany avy izy rehetra. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ary nanandratra ny tenany i Adonia, zanakalahin’i Hagita, ka nilaza hoe: Izaho no hanjaka. Dia nanomana kalesy fitondra miady sy mpitaingin-tsoavaly ary dimampolo lahy ho mpihazakazaka eo alohany izy. '
  '50':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '50'
    - type: text
      text: Natahotra an’i Solomona koa i Adonia dia niainga ka lasa nihazona mafy ny tandroky ny alitara.
  '51':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '51'
    - type: text
      text: 'Ary nisy nanambara tamin’i Solomona hoe: Indro, i Adonia matahotra an’i Solomona mpanjaka; koa ao izy mihazona ny tandroky ny alitara sady miteny hoe: Aoka hianiana amiko aloha i Solomona mpanjaka fa tsy hamono ahy mpanompony amin’ny sabatra! '
  '52':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '52'
    - type: text
      text: 'Fa hoy i Solomona: Raha hita fa lehilahy azo antoka izy dia tsy hisy na dia singam-bolony iray akory aza ho latsaka amin’ny tany; fa raha ahitana heloka kosa aminy dia ho faty ihany izy! '
  '53':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '53'
    - type: text
      text: 'Dia nandefa iraka hampidina azy hiala tamin’ny alitara i Solomona mpanjaka. Tonga niankohoka teo anatrehan’i Solomona mpanjaka izy ary hoy i Solomona taminy: Modia any an-tranonao.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Hatrizay niainany dia tsy mbola niteny mafy azy akory ny rainy hoe: Nahoana ianao no manao toy izao? Izy moa dia lehilahy tsara tarehy tokoa, ary izy no nateraky ny reniny nanarakaraka an’i Absaloma. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Niresaka tamin’i Joaba, zanak’i Zeroia sy i Abiatara mpisorona izy; niandany tamin’i Adonia izy roa lahy ireo sady nanampy azy. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Fa i Zadoka mpisorona, i Benaia, zanak’i Joiada, i Natana mpaminany, i Simey, i Rey ary ireo lehilahy mahery fo izay an’i Davida kosa dia tsy mba niandany tamin’i Adonia.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ary namono ondry aman’osy sy omby ary zanak’omby mifahy teo akaikin’ny vato Zoheleta teo anilan’i Eny-Rogela i Adonia ka nanasa ny rahalahiny, izay zanakalahin’ny mpanjaka rehetra sy ny lehilahin’ny Joda rehetra izay mpanompon’ny mpanjaka. '
