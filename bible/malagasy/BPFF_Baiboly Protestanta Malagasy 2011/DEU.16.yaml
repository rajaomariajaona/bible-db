document_id: DEU.16,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fankalazana ny Paska
  - type: text
    content: 'Tandremo ny volana '
  - type: text
    content: Abiba
  - type: text
    content: ' ka ataovy ny Paska an’NY TOMPO Andriamanitrao; fa tamin’ny volana Abiba no nitondran’NY TOMPO Andriamanitrao anao nivoaka avy tany Ejipta tamin’ny alina. '
  '10':
  - type: text
    content: Dia ankalazao ho andro firavoravoana ho an’NY TOMPO Andriamanitrao ny andro manaraka ireo Herinandro
  - type: note
    content: Zahao Eks 34.22.
  - type: text
    content: ' ireo ka manolora fanatitra an-tsitrapo, izay homenao araka izay itahin’NY TOMPO Andriamanitrao anao; '
  '11':
  - type: text
    content: 'ary mifalia eo anatrehan’NY TOMPO Andriamanitrao ianao miaraka amin’ny ny zanakao lahy, ny zanakao vavy, ny mpanompolahinao, ny mpanompovavinao ary ny '
  - type: text
    content: levita
  - type: text
    content: ' izay ao an-tanànanao mbamin’ny vahiny sy ny kamboty ary ny mpitondratena izay eo aminao, dia eo amin’ny tany izay hofidin’NY TOMPO Andriamanitrao hampitoerany ny anarany. '
  '12':
  - type: text
    content: Tsarovy fa andevo tany Ejipta ianao; koa tandremo sy araho ireo didy ireo.
  - type: heading
    content: Ny fetin’ny trano rantsan-kazo
  '13':
  - type: text
    content: 'Tandremo mandritra ny hafitoana ny andro firavoravoana fitoerana amin’ny trano rantsan-kazo, rehefa nangoninao ny avy amin’ny famoloananao sy ny famiazanao. '
  '14':
  - type: text
    content: 'Ary mifalia ianao miaraka amin’ny zanakao lahy, ny zanakao vavy, ny mpanompolahinao, ny mpanompovavinao ary ny '
  - type: text
    content: levita
  - type: text
    content: ' mbamin’ny vahiny sy ny kamboty ary ny mpitondratena izay ao an-tanànanao amin’ny andro firavoravoanao. '
  '15':
  - type: text
    content: Hafitoana no hitandremanao andro firavoravoana ho an’NY TOMPO Andriamanitrao eo amin’ny tany izay hofidin’NY TOMPO, satria hitahy anao NY TOMPO Andriamanitrao amin’ny vokatrao rehetra sy ny asan’ny tananao rehetra ka hifaly tokoa ianao.
  '16':
  - type: text
    content: Intelo isan-kerintaona no hiseho eo anatrehan’NY TOMPO Andriamanitrao ny lehilahy rehetra ao aminao, eo amin’ny tany izay hofidiny, dia amin’ny andro firavoravoana fihinanana ny mofo tsy misy masirasira sy ny andro firavoravoana manaraka ireo Herinandro
  - type: note
    content: Zahao Eks 34.22.
  - type: text
    content: ' ary ny andro firavoravoana fitoerana amin’ny trano rantsan-kazo. Ary aoka tsy ho tanam-polo no hisehoany eo anatrehan’NY TOMPO; '
  '17':
  - type: text
    content: fa samy hanolotra izay zakany avy, araka ny fitahiana izay omen’NY TOMPO Andriamanitrao anao.
  - type: heading
    content: Fitsipika ho an’ny mpitsara
  '18':
  - type: text
    content: 'Mifidiana mpitsara sy mpifehy ho anao ao an-tanànanao rehetra, izay omen’NY TOMPO Andriamanitrao anao, araka ny fokonao; dia hitsara ny olona amin’ny fitsarana marina ireo. '
  '19':
  - type: text
    content: 'Aza manao fitsarana miangatra, aza mizaha tavan’olona ary aza mandray kolikoly; fa mahajamba ny mason’ny hendry ny kolikoly ary mamadika ny tenin’ny marina. '
  '2':
  - type: text
    content: 'Vonoy ny Paska an’NY TOMPO Andriamanitrao, dia ondry aman’osy sy omby, eo amin’ny tany izay hofidin’NY TOMPO hampitoerany ny anarany. '
  '20':
  - type: text
    content: Ny tena marina no harahinao, mba ho velona ianao ka handova ny tany izay omen’NY TOMPO Andriamanitrao anao.
  - type: heading
    content: Fomba voarara amin’ny fivavahana
  '21':
  - type: text
    content: 'Aza manangana hazo ho tsangankazon-tsampy eo anilan’ny alitaran’NY TOMPO Andriamanitrao, izay ataonao ho anao. '
  '22':
  - type: text
    content: Ary aza manao tsangambaton-tsampy ho anao; fa halan’NY TOMPO Andriamanitrao izany.
  '3':
  - type: text
    content: 'Aza mihinana ny misy masirasira miaraka aminy; hafitoana no hihinananao mofo tsy misy masirasira, dia mofom-pahoriana, fa tampoka no nivoahanao avy tany amin’ny tany Ejipta ka hotsarovanao amin’ny andro rehetra hiainanao io andro izay nivoahanao avy tany amin’ny tany Ejipta io. '
  '4':
  - type: text
    content: 'Ary aoka tsy hisy masirasira eo aminao sy ao amin’ny faritaninao mandritra ny hafitoana; aoka koa tsy hisy ho tavela miloaka alina ny henan’ny fanatitra izay novonoinao tamin’ny harivan’ny andro voalohany. '
  '5':
  - type: text
    content: 'Tsy hisy azonao amonoana ny Paska anefa ny tanànanao rehetra izay omen’NY TOMPO Andriamanitrao anao; '
  '6':
  - type: text
    content: 'fa eo amin’ny fitoerana izay hofidin’NY TOMPO Andriamanitrao hampitoerany ny anarany no hamonoanao azy rehefa hariva tokony ho maty masoandro, dia tahaka ilay nivoahanao avy tany Ejipta. '
  '7':
  - type: text
    content: 'Hahandroinareo izy, dia hano eo amin’ny tany izay hofidin’NY TOMPO Andriamanitrao; ary amin’ny maraina dia modia any amin’ny tranolainao. '
  '8':
  - type: text
    content: Henemana no hihinananao mofo tsy misy masirasira; fa ny andro fahafito dia fara fivoriana ho an’NY TOMPO Andriamanitrao ka tsy hanaovana raharaha amin’io.
  - type: heading
    content: Ny fetin’ny Pentekosta
  '9':
  - type: text
    content: 'Manisà herinandro fito; manomboka amin’ny andro iandohan’ny fijinjam-bary no hanisanao azy. '
