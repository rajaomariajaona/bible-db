document_id: DEU.16,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fankalazana ny Paska
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tandremo ny volana '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Abiba
    - type: text
      text: ' ka ataovy ny Paska an’NY TOMPO Andriamanitrao; fa tamin’ny volana Abiba no nitondran’NY TOMPO Andriamanitrao anao nivoaka avy tany Ejipta tamin’ny alina. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia ankalazao ho andro firavoravoana ho an’NY TOMPO Andriamanitrao ny andro manaraka ireo Herinandro
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.10 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Zahao '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Eks 34.22.
      marker-yv: yv-n
    - type: text
      text: ' ireo ka manolora fanatitra an-tsitrapo, izay homenao araka izay itahin’NY TOMPO Andriamanitrao anao; '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary mifalia eo anatrehan’NY TOMPO Andriamanitrao ianao miaraka amin’ny ny zanakao lahy, ny zanakao vavy, ny mpanompolahinao, ny mpanompovavinao ary ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: levita
    - type: text
      text: ' izay ao an-tanànanao mbamin’ny vahiny sy ny kamboty ary ny mpitondratena izay eo aminao, dia eo amin’ny tany izay hofidin’NY TOMPO Andriamanitrao hampitoerany ny anarany. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tsarovy fa andevo tany Ejipta ianao; koa tandremo sy araho ireo didy ireo.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fetin’ny trano rantsan-kazo
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tandremo mandritra ny hafitoana ny andro firavoravoana fitoerana amin’ny trano rantsan-kazo, rehefa nangoninao ny avy amin’ny famoloananao sy ny famiazanao. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary mifalia ianao miaraka amin’ny zanakao lahy, ny zanakao vavy, ny mpanompolahinao, ny mpanompovavinao ary ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: levita
    - type: text
      text: ' mbamin’ny vahiny sy ny kamboty ary ny mpitondratena izay ao an-tanànanao amin’ny andro firavoravoanao. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Hafitoana no hitandremanao andro firavoravoana ho an’NY TOMPO Andriamanitrao eo amin’ny tany izay hofidin’NY TOMPO, satria hitahy anao NY TOMPO Andriamanitrao amin’ny vokatrao rehetra sy ny asan’ny tananao rehetra ka hifaly tokoa ianao.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Intelo isan-kerintaona no hiseho eo anatrehan’NY TOMPO Andriamanitrao ny lehilahy rehetra ao aminao, eo amin’ny tany izay hofidiny, dia amin’ny andro firavoravoana fihinanana ny mofo tsy misy masirasira sy ny andro firavoravoana manaraka ireo Herinandro
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.16 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Zahao '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Eks 34.22.
      marker-yv: yv-n
    - type: text
      text: ' ary ny andro firavoravoana fitoerana amin’ny trano rantsan-kazo. Ary aoka tsy ho tanam-polo no hisehoany eo anatrehan’NY TOMPO; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: fa samy hanolotra izay zakany avy, araka ny fitahiana izay omen’NY TOMPO Andriamanitrao anao.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fitsipika ho an’ny mpitsara
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mifidiana mpitsara sy mpifehy ho anao ao an-tanànanao rehetra, izay omen’NY TOMPO Andriamanitrao anao, araka ny fokonao; dia hitsara ny olona amin’ny fitsarana marina ireo. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aza manao fitsarana miangatra, aza mizaha tavan’olona ary aza mandray kolikoly; fa mahajamba ny mason’ny hendry ny kolikoly ary mamadika ny tenin’ny marina. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vonoy ny Paska an’NY TOMPO Andriamanitrao, dia ondry aman’osy sy omby, eo amin’ny tany izay hofidin’NY TOMPO hampitoerany ny anarany. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny tena marina no harahinao, mba ho velona ianao ka handova ny tany izay omen’NY TOMPO Andriamanitrao anao.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fomba voarara amin’ny fivavahana
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aza manangana hazo ho tsangankazon-tsampy eo anilan’ny alitaran’NY TOMPO Andriamanitrao, izay ataonao ho anao. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary aza manao tsangambaton-tsampy ho anao; fa halan’NY TOMPO Andriamanitrao izany.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aza mihinana ny misy masirasira miaraka aminy; hafitoana no hihinananao mofo tsy misy masirasira, dia mofom-pahoriana, fa tampoka no nivoahanao avy tany amin’ny tany Ejipta ka hotsarovanao amin’ny andro rehetra hiainanao io andro izay nivoahanao avy tany amin’ny tany Ejipta io. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary aoka tsy hisy masirasira eo aminao sy ao amin’ny faritaninao mandritra ny hafitoana; aoka koa tsy hisy ho tavela miloaka alina ny henan’ny fanatitra izay novonoinao tamin’ny harivan’ny andro voalohany. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsy hisy azonao amonoana ny Paska anefa ny tanànanao rehetra izay omen’NY TOMPO Andriamanitrao anao; '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fa eo amin’ny fitoerana izay hofidin’NY TOMPO Andriamanitrao hampitoerany ny anarany no hamonoanao azy rehefa hariva tokony ho maty masoandro, dia tahaka ilay nivoahanao avy tany Ejipta. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hahandroinareo izy, dia hano eo amin’ny tany izay hofidin’NY TOMPO Andriamanitrao; ary amin’ny maraina dia modia any amin’ny tranolainao. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Henemana no hihinananao mofo tsy misy masirasira; fa ny andro fahafito dia fara fivoriana ho an’NY TOMPO Andriamanitrao ka tsy hanaovana raharaha amin’io.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fetin’ny Pentekosta
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Manisà herinandro fito; manomboka amin’ny andro iandohan’ny fijinjam-bary no hanisanao azy. '
