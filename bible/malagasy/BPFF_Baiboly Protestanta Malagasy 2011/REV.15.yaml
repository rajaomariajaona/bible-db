document_id: REV.15,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny anjely fito sy ny loza fito
  - type: text
    content: Ary hitako fa indro, nisy famantarana iray koa tany an-danitra, sady lehibe no mahagaga, dia anjely fito izay nitana ny loza fito farany satria ireny no hoenti-manatanteraka ny fahatezeran’Andriamanitra.
  '2':
  - type: text
    content: 'Ary nahita aho fa indro, toa ranomasina fitaratra miharo afo, ary izay naharesy ka afaka tamin’ny bibidia sy ny sariny ary ny isa mariky ny anarany dia nitsangana teo amoron’ny ranomasina fitaratra, nitana lokangan’Andriamanitra. '
  '3':
  - type: text
    content: 'Ary mihira ny tononkiran’i Mosesy, mpanompon’Andriamanitra, sy ny tononkiran’ny Zanak’ondry izy hoe:'
  - type: text
    content: Lehibe sy mahatalanjona ny asanao,
  - type: text
    content: Tompo ô, Andriamanitra Tsitoha;
  - type: text
    content: mahitsy sy marina ny lalanao,
  - type: text
    content: ry Mpanjakan’ny firenena!
  '4':
  - type: text
    content: Iza no tsy hatahotra?
  - type: text
    content: Ary iza no tsy hankalaza ny anaranao, Tompo ô?
  - type: text
    content: Fa Ianao ihany no masina
  - type: text
    content: ary ny firenena rehetra dia ho avy hiankohoka eo anatrehanao;
  - type: text
    content: fa naharihary ny fitsarana marina nataonao.
  '5':
  - type: text
    content: 'Rehefa afaka izany dia nahita aho fa indro, novohana ny tempoly, dia ny tabernakelin’ny Vavolombelona any an-danitra. '
  '6':
  - type: text
    content: 'Ary ny anjely fito izay nitana ny loza fito dia nivoaka avy tao amin’ny tempoly ary nanao akanjo rongony fotsy sady madio no mangatsakatsaka izy sady nitondra fehikibo volamena teo amin’ny tratrany. '
  '7':
  - type: text
    content: 'Ary ny iray tamin’ny zavamananaina efatra dia nanome ny anjely fito, lovia volamena fito, feno ny fahatezeran’Andriamanitra, izay velona mandrakizay mandrakizay. '
  '8':
  - type: text
    content: Ary ny tempoly dia feno setroka noho ny voninahitr’Andriamanitra sy ny heriny, koa tsy nisy nahazo niditra tao amin’ny tempoly mandra-pahatanteraka ny loza fito noentin’ny anjely fito.
