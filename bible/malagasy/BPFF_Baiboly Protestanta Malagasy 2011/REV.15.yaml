document_id: REV.15
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny anjely fito sy ny loza fito
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ary hitako fa indro, nisy famantarana iray koa tany an-danitra, sady lehibe no mahagaga, dia anjely fito izay nitana ny loza fito farany satria ireny no hoenti-manatanteraka ny fahatezeran’Andriamanitra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary nahita aho fa indro, toa ranomasina fitaratra miharo afo, ary izay naharesy ka afaka tamin’ny bibidia sy ny sariny ary ny isa mariky ny anarany dia nitsangana teo amoron’ny ranomasina fitaratra, nitana lokangan’Andriamanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary mihira ny tononkiran’i Mosesy, mpanompon’Andriamanitra, sy ny tononkiran’ny Zanak’ondry izy hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Lehibe sy mahatalanjona ny asanao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tompo ô, Andriamanitra Tsitoha;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mahitsy sy marina ny lalanao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ry Mpanjakan’ny firenena!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Iza no tsy hatahotra?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary iza no tsy hankalaza ny anaranao, Tompo ô?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa Ianao ihany no masina
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny firenena rehetra dia ho avy hiankohoka eo anatrehanao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa naharihary ny fitsarana marina nataonao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Rehefa afaka izany dia nahita aho fa indro, novohana ny tempoly, dia ny tabernakelin’ny Vavolombelona any an-danitra. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary ny anjely fito izay nitana ny loza fito dia nivoaka avy tao amin’ny tempoly ary nanao akanjo rongony fotsy sady madio no mangatsakatsaka izy sady nitondra fehikibo volamena teo amin’ny tratrany. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary ny iray tamin’ny zavamananaina efatra dia nanome ny anjely fito, lovia volamena fito, feno ny fahatezeran’Andriamanitra, izay velona mandrakizay mandrakizay. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ary ny tempoly dia feno setroka noho ny voninahitr’Andriamanitra sy ny heriny, koa tsy nisy nahazo niditra tao amin’ny tempoly mandra-pahatanteraka ny loza fito noentin’ny anjely fito.
