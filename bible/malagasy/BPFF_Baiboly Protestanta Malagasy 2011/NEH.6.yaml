document_id: NEH.6
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Misakana ny asa indray ny fahavalo
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Rehefa ren’i Sanibala sy i Tobia ary i Gasema arabo mbamin’ny namany fahavalonay fa efa nanarina ny manda aho ka tsy nisy banga intsony teo, kanefa kosa tsy mbola voalatsako ny lelam-bavahady tamin’izany andro izany, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'dia nandefa iraka ho any amiko i Sanibala sy i Gasema ka niteny hoe: Avia isika hihaona ao amin’izay vohitra iray amin’ny tany lemak’i Ono. Kanjo nikasa hanisy ratsy ahy izy roa lahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dia nandefa iraka hankany aminy kosa aho hilaza hoe: Asa lehibe no ataoko ka tsy afa-midina aho; nahoana no hilaozako midina any aminareo ny asa ka hatsahatra? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Kanefa mbola nandefa iraka tamiko inefatra araka izany ihany izy; ary mbola namaly azy toy izany hatrany ihany koa aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia nirahin’i Sanibala fanindiminy hankeo amiko ny zatovony, araka izany ihany, nitondra taratasy nivelatra teny an-tanany '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'izay nisy soratra hoe: Efa mahoraka any amin’ny firenena maro izao teny izao sady lazain’i Gasema hoe: Ianao sy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jiosy
  - type: text
    text: ' dia mikasa hikomy ka izany no anaovanao ny manda, ary araka izany teny izany dia mikasa ho mpanjakany, hono, ianao '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'sady efa nanendry ny mpaminany maro hilaza anao any Jerosalema hoe Mpanjaka any Joda! Ankehitriny dia ho ren’ny mpanjaka izany teny izany. Koa avia isika hiara-mihevitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dia nandefa iraka ho any aminy aho hilaza hoe: Tsy marina izany zavatra lazainao izany fa tao am-ponao ihany no namoronanao azy! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Fa ta hampatahotra anay izy rehetra ka hoy izy: Ho kivy amin’ny asa izy ka tsy hahatontosa. Koa ankehitriny ampaherezo re aho!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dia tonga tao an-tranon’i Semaia zanak’i Delaia zanak’i Mehetabela aho. Nihidy aman-trano tao izy dia niteny hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Andeha isika hiditra ao amin’ny tranon’Andriamanitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ao anatin’ny tempoly,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary aoka harindrintsika ny varavarana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ho avy hamono anao izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, ho avy alina hamono anao izy.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Fa hoy aho: Moa tokony handositra va ny lehilahy toa ahy? Ary iza ny olona tahaka ahy no mahazo miditra ao amin’ny tempoly ka ho velona? Tsy hiditra ao aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary hitako fa indro tsy Andriamanitra no naniraka azy fa nilaza izany faminaniana izany hamitahany ahy izy satria notambazan’i Tobia sy i Sanibala. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Izany no nanambazany azy mba hampitahotra ahy hanaovako izay lazainy ka hanotako mba hahazoany miteny ratsy hanomezany tsiny ahy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ry Andriamanitro ô, tsarovy i Tobia sy i Sanibala araka izany asany izany mbamin’i Noadia mpaminanivavy sy ny mpaminany sasany koa izay nampitahotra ahy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Vita tao anatin’ny roa amby dimampolo andro ny manda, tamin’ny andro fahadimy amby roapolo tamin’ny volana '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Elola
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Rehefa ren’ny fahavalonay rehetra izany dia raiki-tahotra ny firenena rehetra manodidina anay sady hitany fa tsinontsinona izy; ary fantany fa Andriamanitray no nahavitana izany asa izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Tamin’izany andro izany ny olo-manankaja amin’ny Joda dia nampitondra taratasy maro ho any amin’i Tobia ary ny avy tamin’i Tobia kosa dia tonga tany aminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Fa nisy maro tany Joda izay efa nianiana niray tetika taminy satria vinanton’i Sekania, zanak’i Ara, izy; ary efa nanambady ny zanakavavin’i Mesolama zanak’i Berekia i Johanana zanany lahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Nisy koa nilaza ny soa nataony teo anatrehako ary nilaza ny teniko tany aminy kosa. Nampitondra taratasy hampitahotra ahy kosa i Tobia.
