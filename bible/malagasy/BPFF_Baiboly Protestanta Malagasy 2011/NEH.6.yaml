document_id: NEH.6,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Misakana ny asa indray ny fahavalo
  - type: text
    content: 'Rehefa ren’i Sanibala sy i Tobia ary i Gasema arabo mbamin’ny namany fahavalonay fa efa nanarina ny manda aho ka tsy nisy banga intsony teo, kanefa kosa tsy mbola voalatsako ny lelam-bavahady tamin’izany andro izany, '
  '10':
  - type: text
    content: 'Dia tonga tao an-tranon’i Semaia zanak’i Delaia zanak’i Mehetabela aho. Nihidy aman-trano tao izy dia niteny hoe:'
  - type: text
    content: Andeha isika hiditra ao amin’ny tranon’Andriamanitra
  - type: text
    content: ao anatin’ny tempoly,
  - type: text
    content: ary aoka harindrintsika ny varavarana,
  - type: text
    content: fa ho avy hamono anao izy;
  - type: text
    content: eny, ho avy alina hamono anao izy.
  '11':
  - type: text
    content: 'Fa hoy aho: Moa tokony handositra va ny lehilahy toa ahy? Ary iza ny olona tahaka ahy no mahazo miditra ao amin’ny tempoly ka ho velona? Tsy hiditra ao aho. '
  '12':
  - type: text
    content: 'Ary hitako fa indro tsy Andriamanitra no naniraka azy fa nilaza izany faminaniana izany hamitahany ahy izy satria notambazan’i Tobia sy i Sanibala. '
  '13':
  - type: text
    content: Izany no nanambazany azy mba hampitahotra ahy hanaovako izay lazainy ka hanotako mba hahazoany miteny ratsy hanomezany tsiny ahy.
  '14':
  - type: text
    content: Ry Andriamanitro ô, tsarovy i Tobia sy i Sanibala araka izany asany izany mbamin’i Noadia mpaminanivavy sy ny mpaminany sasany koa izay nampitahotra ahy.
  '15':
  - type: text
    content: 'Vita tao anatin’ny roa amby dimampolo andro ny manda, tamin’ny andro fahadimy amby roapolo tamin’ny volana '
  - type: text
    content: Elola
  - type: text
    content: '. '
  '16':
  - type: text
    content: Rehefa ren’ny fahavalonay rehetra izany dia raiki-tahotra ny firenena rehetra manodidina anay sady hitany fa tsinontsinona izy; ary fantany fa Andriamanitray no nahavitana izany asa izany.
  '17':
  - type: text
    content: 'Tamin’izany andro izany ny olo-manankaja amin’ny Joda dia nampitondra taratasy maro ho any amin’i Tobia ary ny avy tamin’i Tobia kosa dia tonga tany aminy. '
  '18':
  - type: text
    content: 'Fa nisy maro tany Joda izay efa nianiana niray tetika taminy satria vinanton’i Sekania, zanak’i Ara, izy; ary efa nanambady ny zanakavavin’i Mesolama zanak’i Berekia i Johanana zanany lahy. '
  '19':
  - type: text
    content: Nisy koa nilaza ny soa nataony teo anatrehako ary nilaza ny teniko tany aminy kosa. Nampitondra taratasy hampitahotra ahy kosa i Tobia.
  '2':
  - type: text
    content: 'dia nandefa iraka ho any amiko i Sanibala sy i Gasema ka niteny hoe: Avia isika hihaona ao amin’izay vohitra iray amin’ny tany lemak’i Ono. Kanjo nikasa hanisy ratsy ahy izy roa lahy. '
  '3':
  - type: text
    content: 'Dia nandefa iraka hankany aminy kosa aho hilaza hoe: Asa lehibe no ataoko ka tsy afa-midina aho; nahoana no hilaozako midina any aminareo ny asa ka hatsahatra? '
  '4':
  - type: text
    content: 'Kanefa mbola nandefa iraka tamiko inefatra araka izany ihany izy; ary mbola namaly azy toy izany hatrany ihany koa aho. '
  '5':
  - type: text
    content: 'Dia nirahin’i Sanibala fanindiminy hankeo amiko ny zatovony, araka izany ihany, nitondra taratasy nivelatra teny an-tanany '
  '6':
  - type: text
    content: 'izay nisy soratra hoe: Efa mahoraka any amin’ny firenena maro izao teny izao sady lazain’i Gasema hoe: Ianao sy ny '
  - type: text
    content: Jiosy
  - type: text
    content: ' dia mikasa hikomy ka izany no anaovanao ny manda, ary araka izany teny izany dia mikasa ho mpanjakany, hono, ianao '
  '7':
  - type: text
    content: 'sady efa nanendry ny mpaminany maro hilaza anao any Jerosalema hoe Mpanjaka any Joda! Ankehitriny dia ho ren’ny mpanjaka izany teny izany. Koa avia isika hiara-mihevitra. '
  '8':
  - type: text
    content: 'Dia nandefa iraka ho any aminy aho hilaza hoe: Tsy marina izany zavatra lazainao izany fa tao am-ponao ihany no namoronanao azy! '
  '9':
  - type: text
    content: 'Fa ta hampatahotra anay izy rehetra ka hoy izy: Ho kivy amin’ny asa izy ka tsy hahatontosa. Koa ankehitriny ampaherezo re aho!'
