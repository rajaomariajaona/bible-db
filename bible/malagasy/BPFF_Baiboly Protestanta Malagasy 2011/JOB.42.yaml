document_id: JOB.42,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny teny faharoa navalin’i Joba
  - type: text
    content: 'Ary namaly NY TOMPO i Joba hoe:'
  '10':
  - type: text
    content: 'Ary NY TOMPO nampody ny fiadanan’i Joba ho toy ny teo aloha rehefa nivavaka ho an’ny sakaizany izy, koa nanome azy indroa toraka izay nananany fahiny Izy. '
  '11':
  - type: text
    content: 'Dia avy ny rahalahiny rehetra sy ny anabaviny rehetra ary ny olona rehetra izay fantany fahiny ka nankao aminy ary niara-nihinana taminy tao an-tranony ary nitsapa alahelo sady nampionona azy noho ny fahoriana rehetra izay nahatran’NY TOMPO taminy; ary samy nanome azy '
  - type: text
    content: kesita
  - type: text
    content: ' iray avy sy kavim-bolamena iray avy izy rehetra. '
  '12':
  - type: text
    content: 'Ary NY TOMPO nitahy ireo taona farany niainan’i Joba mihoatra noho ireo taona voalohany ka nanana ondry aman’osy efatra arivo sy iray alina, rameva enina arivo, omby roa arivo ary borikivavy arivo izy. '
  '13':
  - type: text
    content: 'Ary nanan-janakalahy fito sy vavy telo koa izy, '
  '14':
  - type: text
    content: 'koa ny anaran’ny zokiny dia nataony hoe Jemima, ny anaran’ny faharoa dia Kezia ary ny anaran’ny faravavy dia Kerena-Hapoka. '
  '15':
  - type: text
    content: Ary tsy nisy vehivavy tsara tarehy tahaka ny zanakavavin’i Joba hita tany amin’ny tany rehetra; niara-nomen’ny rainy lova tamin’ny anadahiny izy.
  '16':
  - type: text
    content: Ary mbola velona efapolo amby zato taona i Joba taorianan’izany ka nahita ny zanany lahy sy ny zafiny ka hatramin’ny zafindohaliny aza.
  '17':
  - type: text
    content: Dia maty i Joba rehefa tratra antitra sady ela niainana.
  '2':
  - type: text
    content: Fantatro fa hainao avokoa ny zavatra rehetra
  - type: text
    content: ary tsy azo ferana ny fisainanao.
  '3':
  - type: text
    content: Iza no mahatakona ny fisainanao amin’ny tsy fahalalana?
  - type: text
    content: Koa nilaza izay tsy fantatro aho,
  - type: text
    content: dia zava-mahagaga loatra amiko, izay tsy takatry ny saiko.
  '4':
  - type: text
    content: Mifona aminao aho, mihainoa, fa hiteny aho;
  - type: text
    content: hanontany Anao aho ka ampianaro.
  '5':
  - type: text
    content: Fandrenesan’ny sofina ihany no nandrenesako Anao;
  - type: text
    content: fa ankehitriny izao kosa dia ny masoko no mahita Anao;
  '6':
  - type: text
    content: koa miaiky sy mibebaka
  - type: text
    content: eto amin’ny vovoka sy ny lavenona aho.
  - type: heading
    content: TENY FAMARANANA
  '7':
  - type: text
    content: 'Rehefa voalazan’NY TOMPO tamin’i Joba izany teny izany dia hoy koa Izy tamin’i Elifaza temanita: Mirehitra aminao sy ny sakaizanao roa lahy ny fahatezerako satria tsy mba marina tahaka ny filazan’i Joba mpanompoko ny filazanareo Ahy. '
  '8':
  - type: text
    content: 'Koa ankehitriny, makà vantotra ombilahy fito sy ondrilahy fito ary mankanesa any amin’i Joba mpanompoko ka manolora fanatitra dorana manontolo ho anareo. Ary i Joba mpanompoko no hifona ho anareo fa izy no hankasitrahako, fandrao hamaly anareo araka ny fahadalanareo Aho, satria tsy marina tahaka ny filazan’i Joba mpanompoko ny filazanareo Ahy. '
  '9':
  - type: text
    content: Dia nandeha i Elifaza temanita sy i Bildada sohita ary i Zofara namatita ka nanatanteraka izay nandidian’NY TOMPO azy; ary NY TOMPO nankasitraka an’i Joba.
