document_id: JOB.42,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny teny faharoa navalin’i Joba
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ary namaly NY TOMPO i Joba hoe:'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ary NY TOMPO nampody ny fiadanan’i Joba ho toy ny teo aloha rehefa nivavaka ho an’ny sakaizany izy, koa nanome azy indroa toraka izay nananany fahiny Izy. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Dia avy ny rahalahiny rehetra sy ny anabaviny rehetra ary ny olona rehetra izay fantany fahiny ka nankao aminy ary niara-nihinana taminy tao an-tranony ary nitsapa alahelo sady nampionona azy noho ny fahoriana rehetra izay nahatran’NY TOMPO taminy; ary samy nanome azy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: kesita
    - type: text
      text: ' iray avy sy kavim-bolamena iray avy izy rehetra. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Ary NY TOMPO nitahy ireo taona farany niainan’i Joba mihoatra noho ireo taona voalohany ka nanana ondry aman’osy efatra arivo sy iray alina, rameva enina arivo, omby roa arivo ary borikivavy arivo izy. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ary nanan-janakalahy fito sy vavy telo koa izy, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'koa ny anaran’ny zokiny dia nataony hoe Jemima, ny anaran’ny faharoa dia Kezia ary ny anaran’ny faravavy dia Kerena-Hapoka. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Ary tsy nisy vehivavy tsara tarehy tahaka ny zanakavavin’i Joba hita tany amin’ny tany rehetra; niara-nomen’ny rainy lova tamin’ny anadahiny izy.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Ary mbola velona efapolo amby zato taona i Joba taorianan’izany ka nahita ny zanany lahy sy ny zafiny ka hatramin’ny zafindohaliny aza.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Dia maty i Joba rehefa tratra antitra sady ela niainana.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Fantatro fa hainao avokoa ny zavatra rehetra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy azo ferana ny fisainanao.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Iza no mahatakona ny fisainanao amin’ny tsy fahalalana?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa nilaza izay tsy fantatro aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia zava-mahagaga loatra amiko, izay tsy takatry ny saiko.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Mifona aminao aho, mihainoa, fa hiteny aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hanontany Anao aho ka ampianaro.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Fandrenesan’ny sofina ihany no nandrenesako Anao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ankehitriny izao kosa dia ny masoko no mahita Anao;
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: koa miaiky sy mibebaka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eto amin’ny vovoka sy ny lavenona aho.
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: TENY FAMARANANA
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Rehefa voalazan’NY TOMPO tamin’i Joba izany teny izany dia hoy koa Izy tamin’i Elifaza temanita: Mirehitra aminao sy ny sakaizanao roa lahy ny fahatezerako satria tsy mba marina tahaka ny filazan’i Joba mpanompoko ny filazanareo Ahy. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Koa ankehitriny, makà vantotra ombilahy fito sy ondrilahy fito ary mankanesa any amin’i Joba mpanompoko ka manolora fanatitra dorana manontolo ho anareo. Ary i Joba mpanompoko no hifona ho anareo fa izy no hankasitrahako, fandrao hamaly anareo araka ny fahadalanareo Aho, satria tsy marina tahaka ny filazan’i Joba mpanompoko ny filazanareo Ahy. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Dia nandeha i Elifaza temanita sy i Bildada sohita ary i Zofara namatita ka nanatanteraka izay nandidian’NY TOMPO azy; ary NY TOMPO nankasitraka an’i Joba.
