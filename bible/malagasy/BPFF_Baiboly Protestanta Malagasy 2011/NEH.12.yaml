document_id: NEH.12,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny anaran’ireo mpisorona sy levita
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny mpisorona sy ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: levita
    - type: text
      text: ' izay niara-niakatra tamin’i Zerobabela, zanak’i Sealtiela, sy i Josoa dia i Seraia, i Jeremia, i Ezra, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I Josoa dia niteraka an’i Joiakima; ary i Joiakima dia niteraka an’i Eliasiba; i Eliasiba dia niteraka an’i Joiada; '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: i Joiada dia niteraka an’i Jonatana; ary i Jonatana dia niteraka an’i Jadoa.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin’ny andron’i Joiakima dia nisy mpisorona, lohan’ny fianakaviana, koa ireto avy izy ireo: Ny avy tamin’i Seraia dia i Meraia; ny avy tamin’i Jeremia dia i Hanania; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ny avy tamin’i Ezra dia i Mesolama; ny avy tamin’i Amaria dia i Johanana; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ny avy tamin’i Meliko dia i Jonatana; ny avy tamin’i Sebania dia i Josefa; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ny avy tamin’i Harima dia i Adna; ny avy tamin’i Meraiota dia i Helkay; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ny avy tamin’Ido dia i Zakaria; ny avy tamin’i Ginetona dia i Mesolama; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ny avy tamin’i Abia dia i Zikry; ny avy tamin’i Miniamina; ny avy tamin’i Moadia, dia i Piltahy; '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ny avy tamin’i Bilga dia i Samoa; ny avy tamin’i Semaia dia i Jonatana; '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ny avy tamin’i Joariba dia i Matenay; ny avy tamin’i Jedaia dia i Ozy; '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'i Amaria, i Maloka, i Hatosy, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ny avy tamin’i Salay dia i Kalay; ny avy tamin’i Amoka dia i Ebera; '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ny avy tamin’i Hilkia dia i Hasabia; ary ny avy tamin’i Jedaia dia i Netanela.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tamin’ny andron’i Eliasiba, i Joiada, i Johanana ary i Jadoa dia voasoratra ho lohan’ny fianakaviany ny levita; ary toy izany koa ny mpisorona, hatramin’ny nanjakan’i Dariosy persiana.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny taranak’i Levy, lohan’ny fianakaviana, dia voasoratra ao amin’ny bokin’ny tantara hatramin’ny andron’i Johanana, zanak’i Eliasiba. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny lehiben’ny levita dia i Hasabia sy i Serebia ary i Josoa zanak’i Kadmiela, mbamin’ny rahalahin’ireo izay nifanandrify taminy, mba hidera sy hisaotra isan-tokony; araka ny didin’i Davida, lehilahin’Andriamanitra. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I Matania, i Bakbokia, i Obadia, i Mesolama, i Talmona sy i Akoba no mpiandry varavarana ka nitandrina ny fiambenana teo amin’ny trano fitahirizan-drakitra. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ireo no tamin’ny andron’i Joiakima, zanak’i Josoa, zanak’i Jozadaka, sy tamin’ny andron’i Nehemia governora sy i Ezra mpisorona sady mpanoradalàna.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nitokanana ny manda voaorina indray
    marker-yv: yv-h
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa hotokanana ny mandan’i Jerosalema dia notadiavina avy tamin’ny fonenany rehetra ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: levita
    - type: text
      text: ' mba hoentina any Jerosalema hanao ny fitokanana amin’ny fifaliana sy ny fiderana ary ny hira mbamin’ny kipantsona sy ny valiha ary ny lokanga. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia niangona ny mpihira avy tamin’ny tany lemaka manodidina an’i Jerosalema sy ny avy tamin’ny vohitry ny Netofatita '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary i Bety-Gilgala sy ny sahan’i Geba ary Azmaveta; fa efa nanao vohitra ho azy manodidina an’i Jerosalema ny mpihira. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'i Sekania, i Rehoma, i Meremota, '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary samy nanadio ny tenany ny mpisorona sy ny levita, nodioviny koa ny olona sy ny vavahady ary ny manda.
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nasaiko niakatra eo ambonin’ny manda ny mpanapaka ny Joda ary nanendry antoko mpihira roa tonta aho handeha milahatra tsara. Ny iray dia nandeha tamin’ny ankavanana teo ambonin’ny manda ho amin’ny vavahadin-jezika; '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'nandeha taorianan’izy ireo i Hosaia sy ny antsasaky ny olo-manankaja amin’i Joda, '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia i Azaria, i Ezra, i Mesolama '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'i Joda, i Benjamina, i Semaia ary i Jeremia, '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'nitondra trompetra ny sasany tamin’ny taranaky ny mpisorona, dia i Zakaria, zanak’i Jonatana, zanak’i Semaia, zanak’i Matania, zanak’i Mikaia, zanak’i Zakora, zanak’i Asafa, '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'mbamin’ny rahalahiny, dia i Semaia, i Azarela, i Milalay, i Gilalay, i May, i Netanela, i Joda ary i Hanany, nitondra ny zavamanenon’i Davida, lehilahin’Andriamanitra; ary nandeha teo alohan’ireo i Ezra mpanoradalàna. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nizotra hatreo amin’ny vavahadin-doharano izy ka niakatra tamin’ny tohatra nihazo ny Tanànan’i Davida, teo amin’ny fiakarana amin’ny manda eo ambonin’ny tranon’i Davida ka hatreo amin’ny vavahadin-drano eo atsinanana. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny antoko mpihira andiany faharoa kosa dia nandeha nifanandrify taminy sady narahiko niaraka tamin’ny antsasaky ny olona teo ambonin’ny manda hatreo ambonin’ny tilikambo fiambenana misy ny fatana fandoroana ka hatreo amin’ny manda lehibe, '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary hatreo ambonin’ny vavahadin’i Efraima sy teo ambonin’ny vavahady taloha ary teo ambonin’ny vavahadin-kazandrano sy ny tilikambo fiambenana Hananela sy ny tilikambo fiambenana Hamea, dia hatramin’ny vavahadin’ondry; ary nijanona teo amin’ny vavahadin’ny trano fiambenana izy. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ido, i Ginetoy, i Abia, '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nijanona tao amin’ny tranon’Andriamanitra izy roa tonta; tao koa aho sy ny antsasaky ny mpanapaka izay niaraka tamiko; '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary nitondra trompetra ny mpisorona, dia i Eliakima, i Mahaseia, i Miniamina, i Mikaia, i Elioenay, i Zakaria ary i Hanania, '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: mbamin’i Mahaseia, i Semaia, i Eleazara, i Ozy, i Johanana, i Malkia, i Elama ary i Ezera. Nihira mafy ny mpihira sy i Jizrahia, mpitarika azy.
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia namono zavatra betsaka hatao fanatitra izy tamin’izany andro izany sady nifaly, fa Andriamanitra nampifaly azy indrindra; ary ny vadiny aman-janany dia nifaly koa ka re hatrany lavitra ny fifaliana tany Jerosalema.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny anjara voatokana ho an’ny mpisorona sy ny levita
    marker-yv: yv-h
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin’izany koa dia nisy olona notendrena hitandrina ny efitrano fitahirizana ny fanatitra sy ny voaloham-bokatra ary ny fahafolonkarena, fa ao no angonina izay anjara voadidy ho an’ny mpisorona sy ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: levita
    - type: text
      text: ' avy amin’ny saha manodidina ny isan-tanàna; koa nifalian’ny Joda ireo mpisorona sy levita izay nanompo ireo. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nitandrina izay nasaina hotandremany ny amin’Andriamaniny sy ny amin’ny fanadiovana izy; ary toy izany koa ny mpihira sy ny mpiandry varavarana, araka ny didin’i Davida sy i Solomona zanany. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa fahiny tamin’ny andron’i Davida sy i Asafa aza dia efa nisy lehiben’ny mpihira sy mpanao hira fiderana sy fisaorana an’Andriamanitra. '
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny Israely rehetra, tamin’ny andron’i Zerobabela sy i Nehemia, dia nanome koa ny anjaran’ny mpihira sy ny mpiandry varavarana, izany hoe ny anjarany isanandro; ary nanokana izay ho an’ny levita koa izy; ny levita kosa indray dia nanokana izay ho an’ny taranak’i Arona.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'i Miamina, i Madia, i Bilga, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'i Semaia, i Joiariba, i Jedaia, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: i Salo, i Amoka, i Hilkia ary i Jedaia. Ireo no lehiben’ny mpisorona sy ny rahalahiny tamin’ny andron’i Josoa.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny levita kosa dia izao: I Josoa, i Binoy, i Kadmiela, i Serebia, i Joda ary i Matania; izy ireo sy ny rahalahiny no tonian’ny fiderana. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I Bakibokia sy i Ono rahalahin’ireo dia nanandrify azy ireo araka ny anjara raharahany.
