  '35':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: Mampianatra ny tanako hiady Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka mahahenjana tsipìka varahina ny sandriko.
  '36':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
