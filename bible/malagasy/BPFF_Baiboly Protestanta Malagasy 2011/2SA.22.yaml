    - type: text
      text: Satria nihodidina tamiko ny onjan’ny fahafatesana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny riaky ny faharatsiam-panahy dia naha raiki-tahotra ahy.
  '50':
