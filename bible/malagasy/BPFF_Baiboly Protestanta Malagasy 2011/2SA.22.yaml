    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '50'
    - type: text
      text: Koa izany no hiderako Anao eny amin’ny firenen-tsamihafa, TOMPO ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy hihirako ho an’ny anaranao.
  '51':
