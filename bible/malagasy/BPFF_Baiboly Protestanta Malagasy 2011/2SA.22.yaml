      - type: text
        text: kerobima
    - type: text
      text: ' Izy ka nanidina;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, niseho teo amin’ny ela-drivotra Izy.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Nanao ny haizina ho tranony manodidina Azy Izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ranobe mihandrona sy rahona matevina.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Avy teo amin’ny famirapiratana teo anoloany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia nisy vainafo nidedadeda.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Nampikotroka tany an-danitra NY TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: niloa-peo ny Avo Indrindra.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Dia nandefa zana-tsipìka Izy ka nampiely ny fahavaloko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary nampandeha tselatra ka nampifanaritaka azy.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Dia niseho ny fanambanin’ny ranomasina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary nihanjahanja ny fanorenan’ny tany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: noho ny teny mafy nataon’NY TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: noho ny fifofofofon’ny fofonain’ny vavorony.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Nanatsotra ny tanany avy tany ambony Izy ka nandray ahy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nisintona ahy niala tamin’ny ranobe Izy.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Nanafaka ahy tamin’ny fahavaloko mahery Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy tamin’izay nankahala ahy, satria tsy leoko ireny.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Nisakana ahy ireny tamin’ny andro nahitako loza,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa NY TOMPO no nanohana ahy.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Hoy izy:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: NY TOMPO no harambatoko sy manda fiarovana ho ahy ary mpanafaka ahy,
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Namoaka ahy ho any amin’ny malalaka Izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nanafaka ahy Izy satria tiany aho.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Nanisy soa ahy araka ny fahamarinako NY TOMPO;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: araka ny fahadiovan’ny tanako no namaliany ahy.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Fa nitandrina ny lalan’NY TOMPO aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy mba nanao ratsy hialana tamin’Andriamanitro;
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ny fitsipiny rehetra dia teo anatrehako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny didiny dia tsy mba nialako;
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: tsy nanan-tsiny Taminy aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady niaro tena tsy ho azon’ny fahotako.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Koa namaly ahy araka ny fahamarinako NY TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: araka ny fahadiovako teo imasony.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Ny olona tsara no isehoanao fa tsara;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny tena olona marina no isehoanao fa marina;
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: ny madio no isehoanao ho madio;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny mpiolakolaka kosa no isehoanao ho miolikolika.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Vonjenao ny olona ory;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny masonao dia manohitra ny mpiavonavona ka aetrinao ireny.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Fa Ianao no jiroko, TOMPO ô;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mampahazava ny fahamaizinako NY TOMPO.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Andriamanitro vatolampiko, Izy no ialofako,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ampingako sy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: tandroka
    - type: text
      text: ' famonjena ahy Izy'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary fiarovana avo ho ahy sy toeram-pandosirako;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ry Mpamonjy ahy, manafaka ahy amin’ny fampahoriana Ianao.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Ianao no ahazoako mihazakazaka hamely miaramila andiany iray;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Andriamanitro no ahazoako mitsambikina mihoatra ny manda.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Raha ny amin’Andriamanitra dia marina ny lalany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny tenin’NY TOMPO dia voazaha toetra amin’ny memy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: NY TOMPO no ampingan’izay rehetra mialoka Aminy.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Fa iza no Andriamanitra afa-tsy NY TOMPO?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Iza no vatolampy afa-tsy Andriamanitsika?
  '33':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Izany Andriamanitra izany no fiarovana mafy ho ahy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mitondra ahy amin’ny lalana tanteraka Izy.
  '34':
  - type: usfm
