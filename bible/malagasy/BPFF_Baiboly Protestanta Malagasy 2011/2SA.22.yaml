      children:
      - type: text
        text: '1'
    - type: text
      text: Nanao izao hira izao ho an’NY TOMPO i Davida tamin’ny andro namonjen’NY TOMPO azy tamin’ny tanan’ny fahavalony rehetra, indrindra fa tamin’ny tanan’i Saoly.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Naondriny ny lanitra ka nidina Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary haizim-pito no teo ambanin’ny tongony.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Nitaingina '
    - type: usfm
      marker: w
