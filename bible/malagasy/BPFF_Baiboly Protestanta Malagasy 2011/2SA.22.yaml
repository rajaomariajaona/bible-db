document_id: 2SA.22,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Salamo nataon’i Davida
  - type: heading
    content: Sal 18.1-50
  - type: text
    content: Nanao izao hira izao ho an’NY TOMPO i Davida tamin’ny andro namonjen’NY TOMPO azy tamin’ny tanan’ny fahavalony rehetra, indrindra fa tamin’ny tanan’i Saoly.
  '10':
  - type: text
    content: Naondriny ny lanitra ka nidina Izy
  - type: text
    content: ary haizim-pito no teo ambanin’ny tongony.
  '11':
  - type: text
    content: 'Nitaingina '
  - type: text
    content: kerobima
  - type: text
    content: ' Izy ka nanidina;'
  - type: text
    content: eny, niseho teo amin’ny ela-drivotra Izy.
  '12':
  - type: text
    content: Nanao ny haizina ho tranony manodidina Azy Izy,
  - type: text
    content: dia ranobe mihandrona sy rahona matevina.
  '13':
  - type: text
    content: Avy teo amin’ny famirapiratana teo anoloany
  - type: text
    content: dia nisy vainafo nidedadeda.
  '14':
  - type: text
    content: Nampikotroka tany an-danitra NY TOMPO,
  - type: text
    content: niloa-peo ny Avo Indrindra.
  '15':
  - type: text
    content: Dia nandefa zana-tsipìka Izy ka nampiely ny fahavaloko
  - type: text
    content: ary nampandeha tselatra ka nampifanaritaka azy.
  '16':
  - type: text
    content: Dia niseho ny fanambanin’ny ranomasina
  - type: text
    content: ary nihanjahanja ny fanorenan’ny tany,
  - type: text
    content: noho ny teny mafy nataon’NY TOMPO,
  - type: text
    content: noho ny fifofofofon’ny fofonain’ny vavorony.
  '17':
  - type: text
    content: Nanatsotra ny tanany avy tany ambony Izy ka nandray ahy;
  - type: text
    content: nisintona ahy niala tamin’ny ranobe Izy.
  '18':
  - type: text
    content: Nanafaka ahy tamin’ny fahavaloko mahery Izy
  - type: text
    content: sy tamin’izay nankahala ahy, satria tsy leoko ireny.
  '19':
  - type: text
    content: Nisakana ahy ireny tamin’ny andro nahitako loza,
  - type: text
    content: nefa NY TOMPO no nanohana ahy.
  '2':
  - type: text
    content: 'Hoy izy:'
  - type: text
    content: NY TOMPO no harambatoko sy manda fiarovana ho ahy ary mpanafaka ahy,
  '20':
  - type: text
    content: Namoaka ahy ho any amin’ny malalaka Izy;
  - type: text
    content: nanafaka ahy Izy satria tiany aho.
  '21':
  - type: text
    content: Nanisy soa ahy araka ny fahamarinako NY TOMPO;
  - type: text
    content: araka ny fahadiovan’ny tanako no namaliany ahy.
  '22':
  - type: text
    content: Fa nitandrina ny lalan’NY TOMPO aho
  - type: text
    content: ka tsy mba nanao ratsy hialana tamin’Andriamanitro;
  '23':
  - type: text
    content: ny fitsipiny rehetra dia teo anatrehako
  - type: text
    content: ary ny didiny dia tsy mba nialako;
  '24':
  - type: text
    content: tsy nanan-tsiny Taminy aho
  - type: text
    content: sady niaro tena tsy ho azon’ny fahotako.
  '25':
  - type: text
    content: Koa namaly ahy araka ny fahamarinako NY TOMPO,
  - type: text
    content: araka ny fahadiovako teo imasony.
  '26':
  - type: text
    content: Ny olona tsara no isehoanao fa tsara;
  - type: text
    content: ny tena olona marina no isehoanao fa marina;
  '27':
  - type: text
    content: ny madio no isehoanao ho madio;
  - type: text
    content: ary ny mpiolakolaka kosa no isehoanao ho miolikolika.
  '28':
  - type: text
    content: Vonjenao ny olona ory;
  - type: text
    content: ary ny masonao dia manohitra ny mpiavonavona ka aetrinao ireny.
  '29':
  - type: text
    content: Fa Ianao no jiroko, TOMPO ô;
  - type: text
    content: mampahazava ny fahamaizinako NY TOMPO.
  '3':
  - type: text
    content: Andriamanitro vatolampiko, Izy no ialofako,
  - type: text
    content: 'ampingako sy '
  - type: text
    content: tandroka
  - type: text
    content: ' famonjena ahy Izy'
  - type: text
    content: ary fiarovana avo ho ahy sy toeram-pandosirako;
  - type: text
    content: ry Mpamonjy ahy, manafaka ahy amin’ny fampahoriana Ianao.
  '30':
  - type: text
    content: Ianao no ahazoako mihazakazaka hamely miaramila andiany iray;
  - type: text
    content: Andriamanitro no ahazoako mitsambikina mihoatra ny manda.
  '31':
  - type: text
    content: Raha ny amin’Andriamanitra dia marina ny lalany;
  - type: text
    content: ny tenin’NY TOMPO dia voazaha toetra amin’ny memy;
  - type: text
    content: NY TOMPO no ampingan’izay rehetra mialoka Aminy.
  '32':
  - type: text
    content: Fa iza no Andriamanitra afa-tsy NY TOMPO?
  - type: text
    content: Iza no vatolampy afa-tsy Andriamanitsika?
  '33':
  - type: text
    content: Izany Andriamanitra izany no fiarovana mafy ho ahy;
  - type: text
    content: mitondra ahy amin’ny lalana tanteraka Izy.
  '34':
  - type: text
    content: Manao ny tongotro ho tahaka ny an’ny dieravavy Izy;
  - type: text
    content: mampitoetra ahy eo amin’ny havoana Izy.
  '35':
  - type: text
    content: Mampianatra ny tanako hiady Izy
  - type: text
    content: ka mahahenjana tsipìka varahina ny sandriko.
  '36':
  - type: text
    content: Omenao ahy ny ampingan’ny famonjenao
  - type: text
    content: ary mahalehibe ahy ny fahamoram-panahinao.
  '37':
  - type: text
    content: Halalahinao ny lalana diaviko
  - type: text
    content: ka tsy mangovitra ny hato-tongotro.
  '38':
  - type: text
    content: Manenjika ny fahavaloko aho ka mandripaka azy
  - type: text
    content: ary tsy miverina aho mandra-pahalany ritra azy.
  '39':
  - type: text
    content: Mandringana sy mandripaka azy aho
  - type: text
    content: ka tsy maharina izy;
  - type: text
    content: lavo eo ambanin’ny tongotro izy.
  '4':
  - type: text
    content: Miantso NY TOMPO izay mendrika hoderaina aho
  - type: text
    content: ka vonjena ho afaka amin’ny fahavaloko.
  '40':
  - type: text
    content: Ianao no mampisikina hery ahy mba hiady;
  - type: text
    content: aripakao ho eo ambaniko izay mitsangana hamely ahy.
  '41':
  - type: text
    content: Ataonao miamboho ahy ny fahavaloko;
  - type: text
    content: ampanginiko izay mankahala ahy.
  '42':
  - type: text
    content: Miherikerika izy nefa tsy misy mpamonjy;
  - type: text
    content: eny, maniry NY TOMPO izy nefa tsy mamaly azy Izy.
  '43':
  - type: text
    content: Torotoroiko madinika tahaka ny vovoka izy;
  - type: text
    content: hoseko tahaka ny fotaka eny an-dalana izy ka aeliko.
  '44':
  - type: text
    content: Manafaka ahy amin’ny fifanoheran’ny oloko Ianao
  - type: text
    content: sady mitahiry ahy ho lohan’ny firenen-tsamihafa;
  - type: text
    content: ny firenena tsy fantatro aza dia manompo ahy.
  '45':
  - type: text
    content: Ny hafa firenena dia mikoy ahy;
  - type: text
    content: raha vao mahare ny lazako fotsiny ihany aza izy dia manoa ahy.
  '46':
  - type: text
    content: Ny hafa firenena dia mihaketraka
  - type: text
    content: ka miala amin-kovitra avy ao amin’ny manda fiarovany mafy.
  '47':
  - type: text
    content: Velona NY TOMPO; isaorana anie ny Vatolampiko!
  - type: text
    content: Hasandratra anie Andriamanitry ny vatolampy famonjena ahy,
  '48':
  - type: text
    content: dia Andriamanitra izay manao famaliana ho ahy
  - type: text
    content: ka mampietry firenena ho ambaniko,
  '49':
  - type: text
    content: dia Ilay mitondra ahy ho afaka amin’ny fahavaloko;
  - type: text
    content: eny, manandratra ahy ho ambonin’izay mitsangana hanohitra ahy Ianao
  - type: text
    content: ary manafaka ahy amin’ny mpampihorohoro.
  '5':
  - type: text
    content: Satria nihodidina tamiko ny onjan’ny fahafatesana
  - type: text
    content: ary ny riaky ny faharatsiam-panahy dia naha raiki-tahotra ahy.
  '50':
  - type: text
    content: Koa izany no hiderako Anao eny amin’ny firenen-tsamihafa, TOMPO ô,
  - type: text
    content: sy hihirako ho an’ny anaranao.
  '51':
  - type: text
    content: Manao famonjena lehibe ho an’ny mpanjaka voatendriny Izy
  - type: text
    content: ary mamindra fo amin’ny voahosony,
  - type: text
    content: dia amin’i Davida sy ny taranany mandrakizay.
  '6':
  - type: text
    content: 'Nihodidina tamiko ny famatoran’ny '
  - type: text
    content: fitoeran’ny maty
  - type: text
    content: ','
  - type: text
    content: nanoloana ahy ny fandriky ny fahafatesana.
  '7':
  - type: text
    content: Fony azom-pahoriana aho dia niantso NY TOMPO,
  - type: text
    content: eny, Andriamanitro no nitarainako;
  - type: text
    content: nihaino ny feoko tao an-tempoliny Izy
  - type: text
    content: ary ny fitarainako dia tonga eo an-tsofiny.
  '8':
  - type: text
    content: Nihozongozona sy nihorohoro ny tany
  - type: text
    content: ary ny fiorenan’ny lanitra dia nihorohoro;
  - type: text
    content: eny, nihozongozona ireo, satria tezitra NY TOMPO.
  '9':
  - type: text
    content: Nisy setroka nisavoana teo am-bavorony
  - type: text
    content: ary afo avy teo am-bavany no nandevona
  - type: text
    content: sady nisy vainafo nidedadeda teo.
