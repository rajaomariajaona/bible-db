type_code: plt
verses:
  '1':
  - type: text
    content: INDRAY MIJERY
  - type: text
    content: Ny votoatin’ny Epistily
  - type: text
    content: Toa tsy nazava loatra tamin’ny Tesaloniana izay voalazan’i Paoly momba ny fiavian’ny Tompo. Nisy koa ireo olona ta hanakorontana ka nanao fampianaran-diso fa «efa miandoha ny andron’ny Tompo». Koa efa niandry fotsiny ny sasany noho izany ka tsy niasa intsony.
  - type: text
    content: Manampy fanazavana momba ny fiavian’ny Tompo ary i Paoly fa mialoha izany dia tsy maintsy hisy ny fihemorana ary hiseho ny fanoherana amin’ny alalan’ilay «lehilahin’ota, dia ilay zanaky ny fahaverezana». Tsy tokony hanova ny fitondrantena mahamendrika ny Kristiana akory ny fiandrasana izany fiavian’ny Tompo izany.
  - type: text
    content: Ny firafitry ny Epistily
  - type: text
    content: 'Fiarahabana: 1.1-2'
  - type: text
    content: 'Ny fitsaran’Andriamanitra amin’ny hiavian’ny Tompo: 1.3–2.12'
  - type: text
    content: 'Ny faharetana amin’ny fitondrantena kristiana eo am-piandrasana ny Tompo: 2.13–3.15'
  - type: text
    content: 'Tsodrano sy fanaovam-beloma: 3.16-18'
