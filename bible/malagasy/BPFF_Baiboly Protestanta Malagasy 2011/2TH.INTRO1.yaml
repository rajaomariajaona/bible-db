document_id: 2TH.INTRO1
type_code: plt
segments:
- type: usfm
  marker: imt1
  children:
  - type: text
    text: INDRAY MIJERY
- type: usfm
  marker: is1
  children:
  - type: text
    text: Ny votoatin’ny Epistily
- type: usfm
  marker: ip
  children:
  - type: text
    text: Toa tsy nazava loatra tamin’ny Tesaloniana izay voalazan’i Paoly momba ny fiavian’ny Tompo. Nisy koa ireo olona ta hanakorontana ka nanao fampianaran-diso fa «efa miandoha ny andron’ny Tompo». Koa efa niandry fotsiny ny sasany noho izany ka tsy niasa intsony.
- type: usfm
  marker: ip
  children:
  - type: text
    text: Manampy fanazavana momba ny fiavian’ny Tompo ary i Paoly fa mialoha izany dia tsy maintsy hisy ny fihemorana ary hiseho ny fanoherana amin’ny alalan’ilay «lehilahin’ota, dia ilay zanaky ny fahaverezana». Tsy tokony hanova ny fitondrantena mahamendrika ny Kristiana akory ny fiandrasana izany fiavian’ny Tompo izany.
- type: usfm
  marker: iot
  children:
  - type: text
    text: Ny firafitry ny Epistily
- type: usfm
  marker: io1
  children:
  - type: text
    text: 'Fiarahabana: 1.1-2'
- type: usfm
  marker: io1
  children:
  - type: text
    text: 'Ny fitsaran’Andriamanitra amin’ny hiavian’ny Tompo: 1.3–2.12'
- type: usfm
  marker: io1
  children:
  - type: text
    text: 'Ny faharetana amin’ny fitondrantena kristiana eo am-piandrasana ny Tompo: 2.13–3.15'
- type: usfm
  marker: io1
  children:
  - type: text
    text: 'Tsodrano sy fanaovam-beloma: 3.16-18'
