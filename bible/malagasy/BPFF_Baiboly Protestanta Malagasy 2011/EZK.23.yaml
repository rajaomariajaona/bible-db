document_id: EZK.23,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Nijangajanga i Samaria
  - type: text
    content: 'Tonga tamiko ny tenin’NY TOMPO Andriamanitra hoe:'
  '10':
  - type: text
    content: Ireny no mampiseho ny fitanjahany; ny zanany lahy sy ny zanany vavy dia lasan’ireny, ary ny tenany dia novonoiny tamin’ny sabatra ka tonga ambentinteny tamin’ny vehivavy izy ary niharan’ny fitsarana.
  - type: heading
    content: Nijangajanga i Jerosalema
  '11':
  - type: text
    content: 'Nony hitan’i Oholiba rahavaviny izany dia vao mainka nataony manoatra noho ny azy indray ny fahamaimaizany, ary ny fijangajangany dia manoatra noho ny an’ny rahavaviny. '
  '12':
  - type: text
    content: 'Maimay tamin’ny Asiriana mifanakaiky aminy izy, dia ny governora sy ny lefiny, olona mareva-pitafiana sady mpitaingin-tsoavaly, samy tanora bikana izy rehetra. '
  '13':
  - type: text
    content: 'Dia hitako fa efa nandoto ny tenany izy, fa lalana iray ihany no nalehan’izy mirahavavy; '
  '14':
  - type: text
    content: 'Ary mbola nampitomboiny ihany ny fijangajangany, fa nahita sary olona voasoratra teo amin’ny rindrina izy sy ny sarin’ny Kaldeana voasoratra tamin’ny loko mena. '
  '15':
  - type: text
    content: 'Samy nanao fehikibo izy ary fehiloha nisy rambony teo an-dohany; ny fijery azy rehetra dia toy ny zanak’andriana, dia tahaka ny zanakalahin’i Babilona izay teraka tany amin’ny tany Kaldea. '
  '16':
  - type: text
    content: 'Ary raha vao hitan’ny masony ireny dia maimay taminy izy ka nandefa iraka ho any aminy tany Kaldea. '
  '17':
  - type: text
    content: 'Dia tonga tany aminy ho ao amin’ny fandrianam-pitiavana ireny zanakalahin’i Babilona ireny ka nandoto azy tamin’ny fijangajangany; ary nony efa voaloton’ireny izy dia tonga leony azy. '
  '18':
  - type: text
    content: 'Ary rehefa naneho ny fijangajangany sy nampiseho ny fitanjahany izy dia tonga leony azy Aho, toy ny nankaleo Ahy tamin’ny rahavaviny. '
  '19':
  - type: text
    content: 'Dia nampitombo ny fijangajangany ihany izy ka nahatsiaro ny andron’ny fahatanorany izay nijangajangany tany amin’ny tany Ejipta. '
  '2':
  - type: text
    content: 'Ry '
  - type: text
    content: zanak’olona
  - type: text
    content: ', nisy vehivavy mirahavavy, iray reny. '
  '20':
  - type: text
    content: 'Fa izy dia maimay tamin’ireo lehilahiny maloto fiaina ireo, izay manana nofo tahaka ny nofom-boriky, ary ny avy aminy dia toy ny avy amin’ny soavaly. '
  '21':
  - type: text
    content: Nitady ny fijangajangan’ny fahatanoranao ianao, dia ilay nitsapatsapan’ny Ejiptiana ny nononao, satria nonon’ny faha-virijininao ireo.
  - type: heading
    content: Hofaizina i Jerosalema
  '22':
  - type: text
    content: 'Koa izao, ry Oholiba, no lazain’NY TOMPO Andriamanitra: Indro, hotairiko hamely anao ireny mpitia anao izay efa nankaleo anao ireny ka ho entiko avy amin’ny tany manodidina izy mba hamely anao, '
  '23':
  - type: text
    content: 'dia ireny zanakalahin’i Babilona mbamin’ny Kaldeana rehetra, dia i Pekoda sy i Soa ary i Koa, ary ny Asiriana rehetra koa dia miaraka aminy; tanora bikana izy rehetra, dia ny governora sy ny lefiny, zanak’andriana sy olom-boafidy, sady mpitaingin-tsoavaly avokoa izy rehetra. '
  '24':
  - type: text
    content: 'Ho avy izy mitondra fiadiana sy kalesy fitondra miady ary fiara mbamin’ny firenena betsaka hamely anao, izay hanisy ampinga lehibe sy ampinga kely sy fiarovan-doha manodidina hamelezana anao; hatolotro azy ny fitsarana ka hitsara anao araka ny fitsarany izy. '
  '25':
  - type: text
    content: 'Hoentiko hamely anao ny fahasaro-piaroko ka hamely anao amin’ny fahatezerana ireny. Hesoriny ny oronao sy ny sofinao, ary izay sisa aminao dia ho lavon’ny sabatra ka ho lasan-ko babony ny zanakalahinao sy ny zanakavavinao, ary izay sisa aminao dia holevonin’ny afo. '
  '26':
  - type: text
    content: 'Hendahany ny lambanao sady hesoriny aminao ny firavakao soa. '
  '27':
  - type: text
    content: Ary hatsahatro ny fahavetavetanao, dia ny fijangajanganao izay fanaonao hatrany amin’ny tany Ejipta ka tsy handrandrainao aminy intsony ny masonao sady tsy hotsarovanao intsony i Ejipta.
  '28':
  - type: text
    content: 'Fa izao no lazain’NY TOMPO Andriamanitra: Indro, hatolotro eo an-tanan’izay halanao ianao, dia eo an-tanan’izay efa nankaleo anao. '
  '29':
  - type: text
    content: 'Hamely anao amin’ny fankahalana izy dia hesoriny ny vokatry ny asanao ka hilaozany mitanjaka sy mihanjahanja ianao, ary hiseho ny fitanjahan’ny fijangajanganao, dia ny fahavetavetanao sy ny fijangajanganao. '
  '3':
  - type: text
    content: 'Nijangajanga tany Ejipta izy; tany no nisafosafoana ny tratrany, ary tany no nitsapatsapana ny nonon’ny faha-virijininy. '
  '30':
  - type: text
    content: 'Hatao aminao izany zavatra izany noho ny nijangajanganao nanaraka ny '
  - type: text
    content: Jentilisa
  - type: text
    content: ' sy noho ny nandotoanao tena tamin’ny sampiny. '
  '31':
  - type: text
    content: 'Tamin’ny lalan’ny rahavavinao koa no nalehanao, koa hataoko eo an-tananao ny kapoakany. '
  '32':
  - type: text
    content: 'Izao no lazain’NY TOMPO Andriamanitra:'
  - type: text
    content: Amin’ny kapoakan’ny rahavavinao no hisotroanao,
  - type: text
    content: dia ilay lalina aty sady lehibe;
  - type: text
    content: ho fihomehezana
  - type: text
    content: sy ho fanakorana tsy tanty ianao.
  '33':
  - type: text
    content: Ho feno fahamamoana sy alahelo ianao;
  - type: text
    content: kapoaka fahaverezan-kevitra sy fandringanana,
  - type: text
    content: dia ny kapoakan’i Samaria rahavavinao.
  '34':
  - type: text
    content: Hosotroinao sy hotrohinao izany
  - type: text
    content: ary hokikisanao ny vakivakiny
  - type: text
    content: sady handriatanao ny nononao;
  - type: text
    content: fa Izaho no niteny izany,
  - type: text
    content: hoy NY TOMPO Andriamanitra.
  '35':
  - type: text
    content: 'Koa izao no lazain’NY TOMPO Andriamanitra: Noho ny nanadinoanao Ahy sy ny nanarianao Ahy teo ivohonao dia mba zakaonao kosa ny fahavetavetanao sy ny fijangajanganao.'
  '36':
  - type: text
    content: 'NY TOMPO niteny tamiko hoe: Ry '
  - type: text
    content: zanak’olona
  - type: text
    content: ', tsy hotsarainao va i Ohola sy i Oholiba? Asehoy azy ny fahavetavetany '
  '37':
  - type: text
    content: 'fa efa nijangajanga izy sady misy ra ny tanany, eny, ny sampiny no nijangajangany, ary ny zanany lahy naterany ho Ahy dia nampamakivakiny ny afo ho an’ireny mba ho levona. '
  '38':
  - type: text
    content: 'Izao koa no nataony Tamiko: Nandoto ny fitoerako masina izy tamin’izany andro izany sady nandoto ny Sabatako koa. '
  '39':
  - type: text
    content: 'Ary nony efa novonoiny ho an’ny sampiny ny zanany dia nidirany tamin’iny andro iny ihany ny fitoerako masina ka nolotoiny. Koa, e! Izany no nataony tao anatin’ny tranoko. '
  '4':
  - type: text
    content: Ny anaran’ny zokiny dia Ohola
  - type: note
    content: 'Ohola: Ny tranolainy.'
  - type: text
    content: ' ary ny rahavaviny dia Oholiba'
  - type: note
    content: 'Oholiba: Ao aminy ny tranolaiko.'
  - type: text
    content: ', ary novadiko izy ka niteraka zazalahy sy zazavavy. Ny amin’ny anarany: i Samaria no Ohola ary i Jerosalema no Oholiba.'
  '40':
  - type: text
    content: 'Ary koa, nandefa iraka haka lehilahy avy lavitra ireo; eny, nandefa iraka izy ka indreo, tonga izay efa nandroany sy nanosorany loko mainty ny masony sy niravahany '
  '41':
  - type: text
    content: 'ary nipetrahany tamin’ny farafara marevaka, sady nisy latabatra voavelatra teo anoloany, izay nametrahany ny ditin-kazo manitro sy ny diloiloko. '
  '42':
  - type: text
    content: Ary teo aminy dia nisy ny feon’ny maro izay nipetraka tsy nanana ahiahy, ary afa-tsy ny vahoaka maro dia nisy mpiboboka noentina avy tany an-tany efitra; ary nasian’ireo haba teny an-tanan’izy mirahavavy ary satroboninahitra tsara tarehy teny an-dohany.
  '43':
  - type: text
    content: 'Dia hoy Aho ny amin’ilay efa tontan’ny fijangajangana ela: Amin’izao dia mbola hisy hijangajanga amin’io ihany va? '
  '44':
  - type: text
    content: 'Eny, mbola nankao aminy ihany ny olona, toy ny ankanesany ao amin’ny vehivavy janga, toy ny efa nankanesany tao amin’i Ohola sy i Oholiba, vehivavy janga. '
  '45':
  - type: text
    content: 'Ary olona marina no hitsara azy araka izay fitsara vehivavy mijangajanga sy mandatsa-dra, satria mijangajanga izy sady misy ra ny tanany. '
  '46':
  - type: text
    content: 'Fa izao no lazain’NY TOMPO Andriamanitra: Hoentiko hamely azy ny olona maro ka hatolotro ho fampangovitana sy ho babo izy. '
  '47':
  - type: text
    content: 'Ary ireo olona maro ireo dia hitora-bato azy sy hitetitetika azy amin’ny sabatra; hovonoiny ny zanany lahy sy ny zanany vavy, ary hodorany amin’ny afo koa ny tranony. '
  '48':
  - type: text
    content: 'Toy izany no hampitsaharako ny fahavetavetana amin’ny tany, mba hahazo anatra tsy hanao araka ny fahavetavetanareo ny vehivavy rehetra. '
  '49':
  - type: text
    content: Ary hatsingeriny aminareo ny fahavetavetanareo ary hoentinareo ny heloka noho ny sampinareo; dia ho fantatrareo fa Izaho no TOMPO Andriamanitra.
  '5':
  - type: text
    content: 'Ary raha mbola vadiko i Ohola dia nijangajanga izy; maimay izy tamin’ireo mpitia azy, dia ny Asiriana mifanakaiky aminy, '
  '6':
  - type: text
    content: 'izay mitafy mangamanga, dia ny governora sy ny lefiny, tanora bikana izy rehetra sady mpitaingin-tsoavaly. '
  '7':
  - type: text
    content: 'Nijangajanga tamin’ireny izy, dia tamin’izay tsara indrindra tamin’ny zanakalahin’i Asiria sy tamin’izay rehetra nahamaimay azy; tamin’ny sampiny rehetra no nandotoany tena. '
  '8':
  - type: text
    content: 'Ny fijangajangana izay fanaony hatrany Ejipta dia tsy foiny; fa fony izy mbola tanora dia nandrian’ireny, ary ireny no nitsapatsapa ny tratran’ny faha-virijininy sady nanaram-po nijangajanga taminy. '
  '9':
  - type: text
    content: 'Noho izany dia natolotro ho eo an-tanan’ireo mpitia azy izy, dia eo an-tanan’ny Asiriana izay nahamaimay azy. '
