document_id: EZK.23
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nijangajanga i Samaria
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Tonga tamiko ny tenin’NY TOMPO Andriamanitra hoe:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ry '
  - type: usfm
    marker: w
    children:
    - type: text
      text: zanak’olona
  - type: text
    text: ', nisy vehivavy mirahavavy, iray reny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Nijangajanga tany Ejipta izy; tany no nisafosafoana ny tratrany, ary tany no nitsapatsapana ny nonon’ny faha-virijininy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ny anaran’ny zokiny dia Ohola
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ohola: Ny tranolainy.'
    marker-yv: yv-n
  - type: text
    text: ' ary ny rahavaviny dia Oholiba'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Oholiba: Ao aminy ny tranolaiko.'
    marker-yv: yv-n
  - type: text
    text: ', ary novadiko izy ka niteraka zazalahy sy zazavavy. Ny amin’ny anarany: i Samaria no Ohola ary i Jerosalema no Oholiba.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary raha mbola vadiko i Ohola dia nijangajanga izy; maimay izy tamin’ireo mpitia azy, dia ny Asiriana mifanakaiky aminy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'izay mitafy mangamanga, dia ny governora sy ny lefiny, tanora bikana izy rehetra sady mpitaingin-tsoavaly. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Nijangajanga tamin’ireny izy, dia tamin’izay tsara indrindra tamin’ny zanakalahin’i Asiria sy tamin’izay rehetra nahamaimay azy; tamin’ny sampiny rehetra no nandotoany tena. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ny fijangajangana izay fanaony hatrany Ejipta dia tsy foiny; fa fony izy mbola tanora dia nandrian’ireny, ary ireny no nitsapatsapa ny tratran’ny faha-virijininy sady nanaram-po nijangajanga taminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Noho izany dia natolotro ho eo an-tanan’ireo mpitia azy izy, dia eo an-tanan’ny Asiriana izay nahamaimay azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ireny no mampiseho ny fitanjahany; ny zanany lahy sy ny zanany vavy dia lasan’ireny, ary ny tenany dia novonoiny tamin’ny sabatra ka tonga ambentinteny tamin’ny vehivavy izy ary niharan’ny fitsarana.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nijangajanga i Jerosalema
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Nony hitan’i Oholiba rahavaviny izany dia vao mainka nataony manoatra noho ny azy indray ny fahamaimaizany, ary ny fijangajangany dia manoatra noho ny an’ny rahavaviny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Maimay tamin’ny Asiriana mifanakaiky aminy izy, dia ny governora sy ny lefiny, olona mareva-pitafiana sady mpitaingin-tsoavaly, samy tanora bikana izy rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dia hitako fa efa nandoto ny tenany izy, fa lalana iray ihany no nalehan’izy mirahavavy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary mbola nampitomboiny ihany ny fijangajangany, fa nahita sary olona voasoratra teo amin’ny rindrina izy sy ny sarin’ny Kaldeana voasoratra tamin’ny loko mena. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Samy nanao fehikibo izy ary fehiloha nisy rambony teo an-dohany; ny fijery azy rehetra dia toy ny zanak’andriana, dia tahaka ny zanakalahin’i Babilona izay teraka tany amin’ny tany Kaldea. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary raha vao hitan’ny masony ireny dia maimay taminy izy ka nandefa iraka ho any aminy tany Kaldea. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Dia tonga tany aminy ho ao amin’ny fandrianam-pitiavana ireny zanakalahin’i Babilona ireny ka nandoto azy tamin’ny fijangajangany; ary nony efa voaloton’ireny izy dia tonga leony azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary rehefa naneho ny fijangajangany sy nampiseho ny fitanjahany izy dia tonga leony azy Aho, toy ny nankaleo Ahy tamin’ny rahavaviny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Dia nampitombo ny fijangajangany ihany izy ka nahatsiaro ny andron’ny fahatanorany izay nijangajangany tany amin’ny tany Ejipta. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Fa izy dia maimay tamin’ireo lehilahiny maloto fiaina ireo, izay manana nofo tahaka ny nofom-boriky, ary ny avy aminy dia toy ny avy amin’ny soavaly. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Nitady ny fijangajangan’ny fahatanoranao ianao, dia ilay nitsapatsapan’ny Ejiptiana ny nononao, satria nonon’ny faha-virijininao ireo.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Hofaizina i Jerosalema
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Koa izao, ry Oholiba, no lazain’NY TOMPO Andriamanitra: Indro, hotairiko hamely anao ireny mpitia anao izay efa nankaleo anao ireny ka ho entiko avy amin’ny tany manodidina izy mba hamely anao, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'dia ireny zanakalahin’i Babilona mbamin’ny Kaldeana rehetra, dia i Pekoda sy i Soa ary i Koa, ary ny Asiriana rehetra koa dia miaraka aminy; tanora bikana izy rehetra, dia ny governora sy ny lefiny, zanak’andriana sy olom-boafidy, sady mpitaingin-tsoavaly avokoa izy rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ho avy izy mitondra fiadiana sy kalesy fitondra miady ary fiara mbamin’ny firenena betsaka hamely anao, izay hanisy ampinga lehibe sy ampinga kely sy fiarovan-doha manodidina hamelezana anao; hatolotro azy ny fitsarana ka hitsara anao araka ny fitsarany izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Hoentiko hamely anao ny fahasaro-piaroko ka hamely anao amin’ny fahatezerana ireny. Hesoriny ny oronao sy ny sofinao, ary izay sisa aminao dia ho lavon’ny sabatra ka ho lasan-ko babony ny zanakalahinao sy ny zanakavavinao, ary izay sisa aminao dia holevonin’ny afo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Hendahany ny lambanao sady hesoriny aminao ny firavakao soa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Ary hatsahatro ny fahavetavetanao, dia ny fijangajanganao izay fanaonao hatrany amin’ny tany Ejipta ka tsy handrandrainao aminy intsony ny masonao sady tsy hotsarovanao intsony i Ejipta.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Fa izao no lazain’NY TOMPO Andriamanitra: Indro, hatolotro eo an-tanan’izay halanao ianao, dia eo an-tanan’izay efa nankaleo anao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Hamely anao amin’ny fankahalana izy dia hesoriny ny vokatry ny asanao ka hilaozany mitanjaka sy mihanjahanja ianao, ary hiseho ny fitanjahan’ny fijangajanganao, dia ny fahavetavetanao sy ny fijangajanganao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Hatao aminao izany zavatra izany noho ny nijangajanganao nanaraka ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jentilisa
  - type: text
    text: ' sy noho ny nandotoanao tena tamin’ny sampiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Tamin’ny lalan’ny rahavavinao koa no nalehanao, koa hataoko eo an-tananao ny kapoakany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Izao no lazain’NY TOMPO Andriamanitra:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Amin’ny kapoakan’ny rahavavinao no hisotroanao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ilay lalina aty sady lehibe;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho fihomehezana
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ho fanakorana tsy tanty ianao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Ho feno fahamamoana sy alahelo ianao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: kapoaka fahaverezan-kevitra sy fandringanana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ny kapoakan’i Samaria rahavavinao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Hosotroinao sy hotrohinao izany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hokikisanao ny vakivakiny
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady handriatanao ny nononao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa Izaho no niteny izany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hoy NY TOMPO Andriamanitra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Koa izao no lazain’NY TOMPO Andriamanitra: Noho ny nanadinoanao Ahy sy ny nanarianao Ahy teo ivohonao dia mba zakaonao kosa ny fahavetavetanao sy ny fijangajanganao.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'NY TOMPO niteny tamiko hoe: Ry '
  - type: usfm
    marker: w
    children:
    - type: text
      text: zanak’olona
  - type: text
    text: ', tsy hotsarainao va i Ohola sy i Oholiba? Asehoy azy ny fahavetavetany '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'fa efa nijangajanga izy sady misy ra ny tanany, eny, ny sampiny no nijangajangany, ary ny zanany lahy naterany ho Ahy dia nampamakivakiny ny afo ho an’ireny mba ho levona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Izao koa no nataony Tamiko: Nandoto ny fitoerako masina izy tamin’izany andro izany sady nandoto ny Sabatako koa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Ary nony efa novonoiny ho an’ny sampiny ny zanany dia nidirany tamin’iny andro iny ihany ny fitoerako masina ka nolotoiny. Koa, e! Izany no nataony tao anatin’ny tranoko. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Ary koa, nandefa iraka haka lehilahy avy lavitra ireo; eny, nandefa iraka izy ka indreo, tonga izay efa nandroany sy nanosorany loko mainty ny masony sy niravahany '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'ary nipetrahany tamin’ny farafara marevaka, sady nisy latabatra voavelatra teo anoloany, izay nametrahany ny ditin-kazo manitro sy ny diloiloko. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: Ary teo aminy dia nisy ny feon’ny maro izay nipetraka tsy nanana ahiahy, ary afa-tsy ny vahoaka maro dia nisy mpiboboka noentina avy tany an-tany efitra; ary nasian’ireo haba teny an-tanan’izy mirahavavy ary satroboninahitra tsara tarehy teny an-dohany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Dia hoy Aho ny amin’ilay efa tontan’ny fijangajangana ela: Amin’izao dia mbola hisy hijangajanga amin’io ihany va? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Eny, mbola nankao aminy ihany ny olona, toy ny ankanesany ao amin’ny vehivavy janga, toy ny efa nankanesany tao amin’i Ohola sy i Oholiba, vehivavy janga. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Ary olona marina no hitsara azy araka izay fitsara vehivavy mijangajanga sy mandatsa-dra, satria mijangajanga izy sady misy ra ny tanany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Fa izao no lazain’NY TOMPO Andriamanitra: Hoentiko hamely azy ny olona maro ka hatolotro ho fampangovitana sy ho babo izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Ary ireo olona maro ireo dia hitora-bato azy sy hitetitetika azy amin’ny sabatra; hovonoiny ny zanany lahy sy ny zanany vavy, ary hodorany amin’ny afo koa ny tranony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Toy izany no hampitsaharako ny fahavetavetana amin’ny tany, mba hahazo anatra tsy hanao araka ny fahavetavetanareo ny vehivavy rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: Ary hatsingeriny aminareo ny fahavetavetanareo ary hoentinareo ny heloka noho ny sampinareo; dia ho fantatrareo fa Izaho no TOMPO Andriamanitra.
