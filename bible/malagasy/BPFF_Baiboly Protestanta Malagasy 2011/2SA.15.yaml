document_id: 2SA.15,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Mitetika ho tonga mpanjaka i Absaloma
  - type: text
    content: 'Taorianan’izany dia nanomana kalesy fitondra miady iray sy soavaly ary lehilahy dimampolo ho mpihazakazaka eo alohany i Absaloma. '
  '10':
  - type: text
    content: 'Naniraka olona hitety ny fokon’ny Israely rehetra i Absaloma hilaza hoe: Raha vao mandre ny feon’ny anjomara ianareo dia miantsoa hoe: I Absaloma no mpanjaka ao Hebrona! '
  '11':
  - type: text
    content: 'Nisy roanjato lahy avy tany Jerosalema nasain’i Absaloma, dia nanaraka azy ireo, nefa nandeha tamin’ny fahatsoran’ny fony fa tsy nahafantatra na inona na inona. '
  '12':
  - type: text
    content: Ary raha mbola nanolotra ny fanatitra i Absaloma dia nandefa iraka naka an’i Ahitofela gilonita, mpanolotsainan’i Davida, avy tao an-tanànany, tao Gilo. Dia nihamasaka ny tetika fikomiana ka nihamaro hatrany ny olona nomba an’i Absaloma.
  - type: heading
    content: Nandositra niala tany Jerosalema i Davida
  '13':
  - type: text
    content: 'Nisy olona tonga tao amin’i Davida ka nilaza hoe: Lasa nanaraka an’i Absaloma ny fon’ny lehilahin’ny Israely. '
  '14':
  - type: text
    content: 'Dia hoy i Davida tamin’ny mpanompony rehetra izay tao aminy tany Jerosalema: Mitsangàna, andeha isika handositra, fa tsy hisy hahafahantsika amin’i Absaloma; andeha hiala haingana, fandrao malaky tonga izy ka ho tratrany eto isika dia hataony idiran-doza tampoka, ary hasiany amin’ny lelan-tsabatra ny tanàna. '
  '15':
  - type: text
    content: 'Ary hoy ny mpanompon’ny mpanjaka taminy: Indreto ny mpanomponao hanatanteraka izay rehetra sitraky ny mpanjaka tompoko! '
  '16':
  - type: text
    content: 'Dia niainga ny mpanjaka ka narahin’ny ankohonany rehetra. Namela folo vavy tamin’ny vady tsindranony ny mpanjaka mba hiandry trano. '
  '17':
  - type: text
    content: 'Niainga ny mpanjaka ka nanaraka azy ny vahoaka rehetra ary nijanona teo amin’ny trano farany amin’ny tanàna izy. '
  '18':
  - type: text
    content: Ary nandeha teny anilany ny mpanompony rehetra; teo koa ny Keretita sy ny Peletita
  - type: note
    content: Zahao 8.18.
  - type: text
    content: ' rehetra mbamin’ny Gatita rehetra; dia eninjato lahy izay nanaraka azy avy tany Gata, nandeha teo alohan’ny mpanjaka.'
  '19':
  - type: text
    content: 'Hoy ny mpanjaka tamin’Itahy gatita: Nahoana no ianao avy no mba miaraka aminay? Miverena ka mitoera any amin’ny mpanjaka; fa hafa firenena sady mpivahiny ianao; modia ho any amin’ny fonenanao. '
  '2':
  - type: text
    content: 'Ary nifoha vao maraina i Absaloma dia nijanona teo anilan’ny lalana mankeo am-bavahady, koa raha nisy olona nanana ady hoentiny any amin’ny mpanjaka hotsaraina dia nantsoin’i Absaloma ka nanontaniany hoe: Avy any amin’ny tanàna Aninona ianao? Ary hoy izy: Avy any Ananona amin’ny fokon’ny Israely ny mpanomponao. '
  '20':
  - type: text
    content: 'Vao omaly no nahatongavanao, koa anio va dia hoentiko manjenjena hiaraka aminay ianao? Fa mandeha any amin’izay azoko aleha aho, koa mandehana ianao miverina ary ento hiara-miverina aminao ny rahalahinao. Ho aminao anie ny famindrampo sy ny fahamarinana! '
  '21':
  - type: text
    content: 'Hoy anefa Itahy tamin’ny mpanjaka: Raha velona koa NY TOMPO, ary raha velona koa ny mpanjaka tompoko, dia izay hitoeran’ny mpanjaka tompoko, na ho faty na ho velona, dia any koa no hitoeran’ny mpanomponao. '
  '22':
  - type: text
    content: 'Ary hoy i Davida tamin’Itahy: Andeha ary, mandrosoa! Dia nandroso Itahy gatita sy ny olony rehetra mbamin’ny zaza amam-behivavy rehetra izay teo.'
  '23':
  - type: text
    content: 'Nitomany nikaikaika ny olona rehetra, ary nita ny vahoaka rehetra; ny mpanjaka koa dia nita ny lohasahan-driaka Kidrona, ary ny vahoaka rehetra nandroso tamin’ny lalana mankany an-tany efitra. '
  '24':
  - type: text
    content: 'Dia indro koa i Zadoka sy ny '
  - type: text
    content: levita
  - type: text
    content: ' rehetra nanaraka azy nitondra ny vata misy ny faneken’Andriamanitra. Napetrany ny vata misy ny faneken’Andriamanitra, ary niakatra i Abiatara, mandra-pahatapitra ny olona rehetra avy tao an-tanàna. '
  '25':
  - type: text
    content: 'Ary hoy ny mpanjaka tamin’i Zadoka: Ento miverina ho any an-tanàna ihany ny vata misy ny faneken’Andriamanitra. Fa raha mahita fitia eo imason’NY TOMPO aho dia mbola hoentiny miverina ihany ka hasehony ahy iny sy ny fitoerany. '
  '26':
  - type: text
    content: 'Fa raha izao kosa no lazainy: Tsy sitrako ianao, dia inty aho, aoka Izy hanatanteraka amiko izay heveriny ho tsara. '
  '27':
  - type: text
    content: 'Hoy koa ny mpanjaka tamin’i Zadoka mpisorona: Tsy mpahita va ianao? Miverena soa amantsara any an-tanàna ianao mbamin’ny zanakareo roa lahy miaraka aminareo dia i Ahimaza zanakao sy i Jonatana, zanak’i Abiatara. '
  '28':
  - type: text
    content: 'Indro, izaho dia hijanonjanona eny amin’ny tanetin’ny tany efitra mandra-pahatongan’izay teny hambaranareo amiko. '
  '29':
  - type: text
    content: Ary nitondra ny vata misy ny faneken’Andriamanitra niverina nankany Jerosalema ihany i Zadoka sy Abiatara ka nitoetra tany.
  - type: heading
    content: Maniraka an’i Hosay hanara-maso an’i Absaloma i Davida
  '3':
  - type: text
    content: 'Dia hoy i Absaloma taminy: Eny, tsara sy marina ny raharahanao, saingy tsy misy olona voatendrin’ny mpanjaka hihaino anao. '
  '30':
  - type: text
    content: 'Niakatra teny an-tendrombohitra Oliva i Davida. Nitomany teny am-piakarana izy sady nisaron-doha ary nandeha tsy nikiraro; ny vahoaka rehetra izay nanaraka azy koa dia samy nisaron-doha sy niakatra am-pitomaniana avokoa. '
  '31':
  - type: text
    content: 'Dia nisy nanambara tamin’i Davida hoe: I Ahitofela koa dia mba isan’ny mpiray tetika amin’i Absaloma. Dia hoy i Davida: Mitaraina aminao aho, TOMPO ô, ampodio ho fahadalana ny hevitra ataon’i Ahitofela! '
  '32':
  - type: text
    content: 'Nony tonga teo an-tampon’ny tendrombohitra, teo amin’ny toerana fivavahan’ny olona tamin’Andriamanitra i Davida dia indro, avy hitsena azy i Hosay arkita, rovitra ny akanjony sady nihosin-tany ny lohany. '
  '33':
  - type: text
    content: 'Dia hoy i Davida taminy: Ho tonga enta-mavesatra amiko ianao raha miara-mandroso amiko; '
  '34':
  - type: text
    content: 'fa raha miverina any an-tanàna kosa ianao ka hiteny amin’i Absaloma hoe: Ho mpanomponao aho, ry mpanjaka; efa mpanompon’ny rainao ihany aho taloha, fa ankehitriny kosa dia mpanomponao aho, dia hofoananao hahasoa ahy ny hevitra ataon’i Ahitofela. '
  '35':
  - type: text
    content: 'Moa tsy ao aminao va i Zadoka sy Abiatara mpisorona? Koa izay zavatra rehetra renao avy ao an-tranon’ny mpanjaka dia ambarao amin’i Zadoka sy Abiatara mpisorona. '
  '36':
  - type: text
    content: 'Indreo, any aminy ny zanany roa lahy, dia i Ahimaza, zanak’i Zadoka sy i Jonatana, zanak’i Abiatara; izy ireo no asainareo mitatitra atỳ amiko izay rehetra renareo. '
  '37':
  - type: text
    content: Dia tonga tany an-tanàna i Hosay, sakaizan’i Davida, tamin’ny nahatongavan’i Absaloma tany Jerosalema.
  '4':
  - type: text
    content: 'Hoy koa i Absaloma: Enga anie ka izaho no ho voatendry ho mpitsara amin’ny tany, ary ho avy atỳ amiko ny olona rehetra izay manana ady sy teny hotsaraina, dia homeko rariny izy! '
  '5':
  - type: text
    content: 'Ary isaky ny nisy olona nanatona hiankohoka teo anoloany dia narosony ny tanany ka noraisiny sy norohany izany olona izany. '
  '6':
  - type: text
    content: Toy izany no nataon’i Absaloma tamin’ny Israely rehetra izay nankao amin’ny mpanjaka hotsaraina, hany ka lasan’i Absaloma ny fon’ny lehilahin’ny Israely.
  '7':
  - type: text
    content: 'Nony afaka efatra taona dia hoy Absaloma tamin’ny mpanjaka: Trara antitra ianao, aoka aho hankany Hebrona hanefa ny voady izay nataoko tamin’NY TOMPO. '
  '8':
  - type: text
    content: 'Fa nivoady aho mpanomponao, fony mbola nitoetra tany Gesora any Arama hoe: Raha mbola hampodin’NY TOMPO any Jerosalema ihany aho dia hanompo NY TOMPO. '
  '9':
  - type: text
    content: 'Hoy ny mpanjaka taminy: Mandehana soa amantsara ary. Dia niainga izy ka nankany Hebrona.'
