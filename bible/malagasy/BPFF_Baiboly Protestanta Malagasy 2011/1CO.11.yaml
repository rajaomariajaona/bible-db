document_id: 1CO.11,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Aoka hanahaka ahy ianareo, dia tahaka ny anahafako an’i Kristy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny lehilahy sy ny vehivavy eo anatrehan’Andriamanitra
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Izany no tokony hitondran’ny vehivavy mari-pahefana eo amin’ny lohany, noho ny amin’ny anjely. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Kanefa ao amin’ny Tompo dia tsy misy vehivavy raha tsy misy lehilahy, ary tsy misy lehilahy raha tsy misy vehivavy. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Fa toy ny niavian’ny vehivavy avy tamin’ny lehilahy dia toy izany koa no niavian’ny lehilahy avy tamin’ny vehivavy; fa Andriamanitra kosa no niavian’ny zavatra rehetra.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Aoka ianareo ihany no hitsara izao: Mety va raha mivavaka amin’Andriamanitra ny vehivavy ka tsy misaron-doha? '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Tsy mampianatra va ianareo fa, araka ny fomba naharina azy, raha lava volo ny lehilahy dia mahafa-boninahitra azy izany? '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Fa raha lava volo kosa ny vehivavy dia voninahitra ho azy izany, fa ny volo no nomena azy ho fisaromana. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Fa raha misy olona toa tia manohitra dia tsy fanaontsika izany sady tsy fanaon’ny fiangonan’Andriamanitra.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny amin’ny fanasan’ny Tompo
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Amin’izao didy ataoko aminareo izao dia tsy mankasitraka anareo aho tsy akory, satria tsy miangona hihatsara ianareo fa hiharatsy. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Fa voalohany indrindra, rehefa miangona ao am-piangonana ianareo, dia reko fa misy fisarahana eo aminareo; ary mba misy inoako ihany izany. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Fa tsy maintsy misy fisarahan-tsaina eo aminareo mba ho hita eo aminareo izay olona voazaha toetra. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Mankasitraka anareo aho satria mahatsiaro ahy amin’ny zavatra rehetra ianareo sady mitana tsara ny fampianarana voatolotra, araka ny nanolorako azy taminareo.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Koa rehefa miangona ianareo dia tsy fihinanana ny Fanasan’ny Tompo akory no ataonareo. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Fa rehefa mihinana ianareo dia samy homana ny sakafony avy aloha; koa ny iray dia noana fa ny iray kosa dia mamo. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Moa tsy manan-trano hihinanana sy hisotroana va ianareo? Sa manao tsinontsinona ny fiangonan’Andriamanitra ka manome henatra ny tsy manana? Inona no holazaiko aminareo? Hankasitraka anareo va aho? Tsia, tsy hankasitraka anareo amin’izany aho.
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mat 26.26-28; Mar 14.22-24; Lio 22.19-20
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Fa efa nandray tamin’ny Tompo izay natolotro anareo kosa aho, fa Jesosy Tompo tamin’iny alina izay namadihana Azy iny dia nandray mofo, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'ary rehefa nisaotra Izy dia novakiny ilay mofo ka hoy Izy: Ity no tenako izay vakina ho anareo; izao no ataovy ho fahatsiarovana Ahy. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Dia araka izany koa ny kapoaka, rehefa nihinana, ary hoy Izy: Ity kapoaka ity no ilay fanekena vaovao amin’ny rako; izao no ataovy ho fahatsiarovana Ahy, na oviana na oviana no misotro ianareo. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Fa na oviana na oviana ianareo no mihinana itony mofo itony sy misotro amin’ny kapoaka dia manambara ny fahafatesan’ny Tompo mandra-piaviny.
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Koa na zovy na zovy no mihinana ny mofo sy misotro amin’ny kapoaky ny Tompo amin’ny fomba tsy mendrika dia ho meloka ny amin’ny tena sy ny ran’ny Tompo izy. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Fa aoka ny olona handini-tena, vao hihinana ny mofo sy hisotro amin’ny kapoaka. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Fa izay rehetra mihinana sy misotro dia mihinana sy misotro fanamelohana ho an’ny tenany raha tsy mamantatra ny tenan’ny Tompo izy. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Ary tiako ho fantatrareo fa '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ' no lohan’ny lehilahy rehetra; ary ny lehilahy kosa no lohan’ny vehivavy; ary Andriamanitra no lohan’i Kristy. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Noho izany dia betsaka no marary sy marofy eo aminareo ary efa maro aza no nodimandry. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Fa raha mba mamantatra ny tenantsika isika dia tsy mba hotsaraina. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Fa raha tsaraina isika dia ahitsin’ny Tompo mba tsy hohelohina miaraka amin’izao tontolo izao.
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Koa raha miangona hihinana ianareo, ry rahalahy, dia mifampiandrasa. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: Ary raha misy olona noana dia aoka izy hihinana any an-tranony mba tsy ho meloka ianareo raha miangona.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ny amin’ny zavatra sisa dia halamiko rehefa tonga aho.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ny lehilahy rehetra, raha mivavaka na maminany ka misaron-doha, dia mahafa-boninahitra ny lohany. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Fa ny vehivavy rehetra kosa, raha mivavaka na maminany ka tsy misaron-doha, dia mahafa-boninahitra ny lohany, satria toy ny voaharatra izy amin’izany. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Fa raha tsy misaron-doha ny vehivavy dia aoka hohetezana izy; fa raha mahamenatra ny vehivavy ny hohetezana na ny hoharatana, dia aoka hisaron-doha izy. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ny lehilahy dia tokony tsy hisaron-doha, satria endrika sy voninahitr’Andriamanitra izy; fa ny vehivavy kosa no voninahitry ny lehilahy. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Fa tsy ny vehivavy no niavian’ny lehilahy; fa ny lehilahy no niavian’ny vehivavy. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Fa tsy ny lehilahy no natao ho an’ny vehivavy, fa ny vehivavy no ho an’ny lehilahy. '
