document_id: ISA.15
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny loza hanjo an’i Moaba
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ny loza hanjo an’i Moaba.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Indray alina no nandravana azy!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fongotra i Ara-Moaba.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, indray alina no nandravana azy!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fongotra i Kira-Moaba.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Miakatra ho ao Baita sy ho ao Dibona ny olona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ao amin’ny toerana fanaovana sorona, mba hitomany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: i Moaba dia midradradradra any amin’i Nebo sy i Medeba;
- type: usfm
  marker: q1
  children:
  - type: text
    text: nokakasana ny loha rehetra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: voaharatra ny somotra rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Eny an-dalambe dia misikina lamba fisaonana ny olona;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny an-
  - type: usfm
    marker: w
    children:
    - type: text
      text: tampon-tranony
  - type: text
    text: ' sy eny an-kalalahana'
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia midradradradra avokoa izy ireo sady mijoy ny ranomasony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Mitoreo i Hesbona sy i Elale
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka re hatrany Jahaza ny feony;
- type: usfm
  marker: q1
  children:
  - type: text
    text: noho izany dia miantso mafy ny miaramilan’i Moaba,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mihorohoro izy ireo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Mitoloko ny foko noho ny amin’i Moaba;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tonga hatrany Zoara sy Eglata-Selisia ny olona mandositra avy ao.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa miakatra am-pitomaniana ao amin’ny fiakarana Lohita izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady midradradradra amim-pamoizam-po eny an-dalana mankany Horonaima;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: fa ny ranon’i Nimrima dia tonga karankaina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: maina ny ahitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: malazo ny zavamaniry
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy misy zava-maitso intsony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Noho izany dia entiny ho any ampitan’ny lohasahan-driakan’ny hazomalahelo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny harena be izay nohariny sy ny entany izay mbola voatahiriny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Fa manerana ny faritanin’i Moaba ny tolokony;
- type: usfm
  marker: q1
  children:
  - type: text
    text: re hatrany Eglaima ny fidradradradrany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, re hatrany Bera-Elima ny toreony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Feno ra ny ranon’i Dimona;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'eny, mbola hampiako ny loza manjo an’i Dimona:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hisy liona handrapaka izay afa-mandositra avy any Moaba,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy handany izay sisa amin’ny tany.
