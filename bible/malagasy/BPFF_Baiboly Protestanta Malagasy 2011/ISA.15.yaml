document_id: ISA.15,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny loza hanjo an’i Moaba
  - type: text
    content: Ny loza hanjo an’i Moaba.
  - type: text
    content: Indray alina no nandravana azy!
  - type: text
    content: Fongotra i Ara-Moaba.
  - type: text
    content: Eny, indray alina no nandravana azy!
  - type: text
    content: Fongotra i Kira-Moaba.
  '2':
  - type: text
    content: Miakatra ho ao Baita sy ho ao Dibona ny olona,
  - type: text
    content: ao amin’ny toerana fanaovana sorona, mba hitomany;
  - type: text
    content: i Moaba dia midradradradra any amin’i Nebo sy i Medeba;
  - type: text
    content: nokakasana ny loha rehetra;
  - type: text
    content: voaharatra ny somotra rehetra.
  '3':
  - type: text
    content: Eny an-dalambe dia misikina lamba fisaonana ny olona;
  - type: text
    content: eny an-
  - type: text
    content: tampon-tranony
  - type: text
    content: ' sy eny an-kalalahana'
  - type: text
    content: dia midradradradra avokoa izy ireo sady mijoy ny ranomasony.
  '4':
  - type: text
    content: Mitoreo i Hesbona sy i Elale
  - type: text
    content: ka re hatrany Jahaza ny feony;
  - type: text
    content: noho izany dia miantso mafy ny miaramilan’i Moaba,
  - type: text
    content: mihorohoro izy ireo.
  '5':
  - type: text
    content: Mitoloko ny foko noho ny amin’i Moaba;
  - type: text
    content: tonga hatrany Zoara sy Eglata-Selisia ny olona mandositra avy ao.
  - type: text
    content: Fa miakatra am-pitomaniana ao amin’ny fiakarana Lohita izy,
  - type: text
    content: sady midradradradra amim-pamoizam-po eny an-dalana mankany Horonaima;
  '6':
  - type: text
    content: fa ny ranon’i Nimrima dia tonga karankaina;
  - type: text
    content: maina ny ahitra,
  - type: text
    content: malazo ny zavamaniry
  - type: text
    content: ka tsy misy zava-maitso intsony.
  '7':
  - type: text
    content: Noho izany dia entiny ho any ampitan’ny lohasahan-driakan’ny hazomalahelo
  - type: text
    content: ny harena be izay nohariny sy ny entany izay mbola voatahiriny.
  '8':
  - type: text
    content: Fa manerana ny faritanin’i Moaba ny tolokony;
  - type: text
    content: re hatrany Eglaima ny fidradradradrany;
  - type: text
    content: eny, re hatrany Bera-Elima ny toreony.
  '9':
  - type: text
    content: Feno ra ny ranon’i Dimona;
  - type: text
    content: 'eny, mbola hampiako ny loza manjo an’i Dimona:'
  - type: text
    content: Hisy liona handrapaka izay afa-mandositra avy any Moaba,
  - type: text
    content: sy handany izay sisa amin’ny tany.
