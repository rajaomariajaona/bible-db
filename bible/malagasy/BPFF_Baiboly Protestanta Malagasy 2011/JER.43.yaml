document_id: JER.43,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Noentina an-keriny ho any Ejipta i Jeremia
  - type: text
    content: 'Rehefa tapitra voalazan’i Jeremia tamin’ny vahoaka rehetra izany teny rehetra avy tamin’NY TOMPO Andriamaniny izany, izay nanirahan’NY TOMPO Andriamanitra azy holazaina aminy, '
  '10':
  - type: text
    content: 'ka lazao aminy hoe: Izao no lazain’Andriamanitra, Tompon’izao rehetra izao, Andriamanitry ny Israely: Indro Aho handefa iraka haka an’i Nebokadnezara, mpanjakan’i Babilona, mpanompoko, ka haoriko ambonin’ireto vato nafeniko ireto ny sezafiandrianany; ary hamelatra ny lambany tsara tarehy hatao alokaloka eo amboniny izy. '
  '11':
  - type: text
    content: 'Eny, ho avy izy hamely ny tany Ejipta ka izay ho amin’ny areti-mandringana dia ho amin’ny areti-mandringana, ary izay ho amin’ny fahababoana dia ho amin’ny fahababoana, ary izay ho amin’ny sabatra dia ho amin’ny sabatra. '
  '12':
  - type: text
    content: 'Ary handrehitra afo ao amin’ny tranon’ny andriamanitr’i Ejipta Aho ka hodorany sy hobaboiny ireo, ary hitafy ny tany Ejipta toy ny fitafin’ny mpiandry ondry ny lambany izy; eny, hiala any amin’ny fiadanana izy. '
  '13':
  - type: text
    content: Ary hotorotoroiny ny tsangambaton-tsampy ao Bety-Semesy, izay any amin’ny tany Ejipta; ary hodorany amin’ny afo ny tranon’ny andriamanitr’i Ejipta.
  '2':
  - type: text
    content: 'dia niteny i Azaria, zanak’i Hosaia, sy i Johanana, zanak’i Karea, mbamin’ny olona mpirehareha rehetra ka niteny tamin’i Jeremia hoe: Mandainga ianao; fa tsy naniraka anao NY TOMPO Andriamanitsika hilaza hoe: Aza mandeha hivahiny any Ejipta; '
  '3':
  - type: text
    content: 'fa i Baroka, zanak’i Neria, no nanome fo anao hamely anay mba hanolotra anay ho eo an-tanan’ny Kaldeana hahafaty anay sy hahalasa anay ho babo any Babilona. '
  '4':
  - type: text
    content: 'Ary i Johanana, zanak’i Karea, sy ny mpifehy ny miaramila rehetra ary ny vahoaka rehetra dia tsy nihaino ny feon’NY TOMPO ny amin’ny tokony honenany ao amin’ny tanin’ny Joda. '
  '5':
  - type: text
    content: 'Fa i Johanana, zanak’i Karea, sy ny mpifehy ny miaramila rehetra, dia nitondra ny sisa rehetra tamin’ny Joda, izay niverina avy tany amin’ny firenena rehetra nandroahana azy honina ao amin’ny tanin’ny Joda, '
  '6':
  - type: text
    content: 'dia ny lehilahy sy ny zaza amam-behivavy ary ny vehivavy zanaky ny mpanjaka sy ny olona rehetra izay navelan’i Nebozaradana, lehiben’ny mpiambina, tao amin’i Gedalia, zanak’i Ahikama, zanak’i Safana. Noentiny koa i Jeremia mpaminany sy i Baroka, zanak’i Neria, '
  '7':
  - type: text
    content: ka nankany amin’ny tany Ejipta izy ireny, fa tsy nihaino ny feon’NY TOMPO, ary tonga hatrany Tapanesa.
  - type: heading
    content: Nambaran’i Jeremia ny hanafihana an’i Ejipta
  '8':
  - type: text
    content: 'Dia tonga tamin’i Jeremia tao Tapanesa ny tenin’NY TOMPO hoe:'
  '9':
  - type: text
    content: 'Mitondrà vato lehibe maromaro amin’ny tananao ka afeno ao amin’ny rihitra ao amin’ny gorodona tanimanga, izay eo akaikin’ny vavahady amin’ny tranon’i Farao ao Tapanesa, ary ataovy eo imason’ny lehilahy amin’ny Joda izany '
