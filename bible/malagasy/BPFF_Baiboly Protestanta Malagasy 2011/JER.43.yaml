document_id: JER.43
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Noentina an-keriny ho any Ejipta i Jeremia
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Rehefa tapitra voalazan’i Jeremia tamin’ny vahoaka rehetra izany teny rehetra avy tamin’NY TOMPO Andriamaniny izany, izay nanirahan’NY TOMPO Andriamanitra azy holazaina aminy, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'dia niteny i Azaria, zanak’i Hosaia, sy i Johanana, zanak’i Karea, mbamin’ny olona mpirehareha rehetra ka niteny tamin’i Jeremia hoe: Mandainga ianao; fa tsy naniraka anao NY TOMPO Andriamanitsika hilaza hoe: Aza mandeha hivahiny any Ejipta; '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'fa i Baroka, zanak’i Neria, no nanome fo anao hamely anay mba hanolotra anay ho eo an-tanan’ny Kaldeana hahafaty anay sy hahalasa anay ho babo any Babilona. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary i Johanana, zanak’i Karea, sy ny mpifehy ny miaramila rehetra ary ny vahoaka rehetra dia tsy nihaino ny feon’NY TOMPO ny amin’ny tokony honenany ao amin’ny tanin’ny Joda. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Fa i Johanana, zanak’i Karea, sy ny mpifehy ny miaramila rehetra, dia nitondra ny sisa rehetra tamin’ny Joda, izay niverina avy tany amin’ny firenena rehetra nandroahana azy honina ao amin’ny tanin’ny Joda, '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'dia ny lehilahy sy ny zaza amam-behivavy ary ny vehivavy zanaky ny mpanjaka sy ny olona rehetra izay navelan’i Nebozaradana, lehiben’ny mpiambina, tao amin’i Gedalia, zanak’i Ahikama, zanak’i Safana. Noentiny koa i Jeremia mpaminany sy i Baroka, zanak’i Neria, '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ka nankany amin’ny tany Ejipta izy ireny, fa tsy nihaino ny feon’NY TOMPO, ary tonga hatrany Tapanesa.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nambaran’i Jeremia ny hanafihana an’i Ejipta
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dia tonga tamin’i Jeremia tao Tapanesa ny tenin’NY TOMPO hoe:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Mitondrà vato lehibe maromaro amin’ny tananao ka afeno ao amin’ny rihitra ao amin’ny gorodona tanimanga, izay eo akaikin’ny vavahady amin’ny tranon’i Farao ao Tapanesa, ary ataovy eo imason’ny lehilahy amin’ny Joda izany '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'ka lazao aminy hoe: Izao no lazain’Andriamanitra, Tompon’izao rehetra izao, Andriamanitry ny Israely: Indro Aho handefa iraka haka an’i Nebokadnezara, mpanjakan’i Babilona, mpanompoko, ka haoriko ambonin’ireto vato nafeniko ireto ny sezafiandrianany; ary hamelatra ny lambany tsara tarehy hatao alokaloka eo amboniny izy. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Eny, ho avy izy hamely ny tany Ejipta ka izay ho amin’ny areti-mandringana dia ho amin’ny areti-mandringana, ary izay ho amin’ny fahababoana dia ho amin’ny fahababoana, ary izay ho amin’ny sabatra dia ho amin’ny sabatra. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary handrehitra afo ao amin’ny tranon’ny andriamanitr’i Ejipta Aho ka hodorany sy hobaboiny ireo, ary hitafy ny tany Ejipta toy ny fitafin’ny mpiandry ondry ny lambany izy; eny, hiala any amin’ny fiadanana izy. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ary hotorotoroiny ny tsangambaton-tsampy ao Bety-Semesy, izay any amin’ny tany Ejipta; ary hodorany amin’ny afo ny tranon’ny andriamanitr’i Ejipta.
