document_id: JHN.15
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny tena voaloboka
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Izaho no tena voaloboka ary ny Raiko no mpamboly. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ny sampany rehetra eo Amiko izay tsy mamoa dia esoriny; fa ny sampany rehetra izay mamoa kosa dia dioviny mba hamoa bebe kokoa. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Efa madio rahateo ianareo noho ny teniko izay nolazaiko taminareo. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Tomoera ao Amiko ary Izaho ao aminareo. Tahaka ny sampany tsy mahay mamoa ho azy, raha tsy mitoetra amin’ny voaloboka izy, dia toy izany koa ianareo, raha tsy mitoetra ao Amiko. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Izaho no voaloboka, ianareo no sampany. Izay mitoetra ao Amiko ary Izaho ao aminy dia mamoa be izy; fa raha misaraka Amiko kosa ianareo dia tsy mahay manao na inona na inona. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Raha misy tsy mitoetra ao Amiko dia ariana eny ivelany tahaka ny sampany izy ka malazo; ary angonina izy ka atsipy ao amin’ny afo dia ho may. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Raha mitoetra ao Amiko ianareo ka mitoetra ao anatinareo ny teniko dia angataho izay tianareo na inona na inona fa ho tonga aminareo izany. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Izany no ankalazana ny Raiko mba hamoazanareo be ka ho tonga mpianatro ianareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Tahaka ny nitiavan’ny Ray Ahy no nitiavako anareo; tomoera amin’ny fitiavako ianareo. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Raha mitandrina ny didiko ianareo dia hitoetra amin’ny fitiavako, tahaka ny nitandremako ny didin’ny Raiko sy ny itoerako amin’ny fitiavany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Izany zavatra izany dia efa nolazaiko taminareo mba ho ao aminareo ny fifaliako ka ho feno ny fifalianareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Izao no didiko, dia ny mba hifankatiavanareo tahaka ny nitiavako anareo. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Tsy misy manana fitiavana lehibe noho izao, dia ny manolotra ny ainy hamonjy ny sakaizany. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ianareo no sakaizako, raha manao araka izay andidiako anareo. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Tsy hataoko hoe mpanompo intsony ianareo, fa ny mpanompo dia tsy mahalala izay ataon’ny tompony; fa nataoko hoe sakaiza ianareo satria izay rehetra reko tamin’ny Raiko no nambarako taminareo. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Tsy ianareo no nifidy Ahy fa Izaho no nifidy anareo ka nanendry anareo mba handeha sy hamoa, ary mba haharetan’ny vokatrareo, mba homen’ny Ray anareo izay rehetra hangatahinareo amin’ny anarako na inona na inona.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Izany zavatra izany no andidiako anareo mba hifankatiavanareo.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Halan’izao tontolo izao Jesosy sy ny mpianany
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Raha halan’izao tontolo izao ianareo dia aoka ho fantatrareo fa Izaho efa halany talohanareo. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Raha avy amin’izao tontolo izao ianareo dia ho tia ny azy izao tontolo izao; fa satria tsy avy amin’izao tontolo izao ianareo, fa Izaho efa nifidy anareo avy tamin’izao tontolo izao, dia halan’izao tontolo izao ianareo. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Tsarovy ny teny izay nolazaiko taminareo hoe: Ny mpanompo dia tsy lehibe noho ny tompony. Raha nanenjika Ahy izy dia hanenjika anareo koa; ary raha nitandrina ny teniko izy dia hitandrina ny anareo koa. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Fa izany rehetra izany no hataony aminareo noho ny anarako satria tsy mahalala izay naniraka Ahy izy. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Raha tsy tonga Aho ka niteny taminy dia tsy nanan-keloka izy; fa ankehitriny dia tsy misy fialana azony atao ny amin’ny helony. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Izay mankahala Ahy dia mankahala ny Raiko koa. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Raha tsy nataoko teo aminy izay asa tsy nataon’olon-kafa dia tsy nanan-keloka izy; fa ankehitriny dia efa hitany sady efa halany Aho sy ny Raiko koa; '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'fa tonga izany mba hahatanteraka ny teny izay voasoratra ao amin’ny lalànany hoe: «Halany tsy amin’antony Aho» (Sal 69.4; 109.3).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Fa raha tonga ny Mpananatra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.26 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Zahao '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 14.16.
    marker-yv: yv-n
  - type: text
    text: ', izay hirahiko ho aminareo avy amin’ny Ray, dia ny Fanahin’ny fahamarinana izay mivoaka avy amin’ny Ray, dia Izy no ho vavolombelona hanambara Ahy. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Ary ianareo koa dia ho vavolombelona hanambara satria ianareo dia efa teto Amiko hatramin’ny voalohany.
