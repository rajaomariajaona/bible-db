document_id: JHN.15,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny tena voaloboka
  - type: text
    content: 'Izaho no tena voaloboka ary ny Raiko no mpamboly. '
  '10':
  - type: text
    content: Raha mitandrina ny didiko ianareo dia hitoetra amin’ny fitiavako, tahaka ny nitandremako ny didin’ny Raiko sy ny itoerako amin’ny fitiavany.
  '11':
  - type: text
    content: Izany zavatra izany dia efa nolazaiko taminareo mba ho ao aminareo ny fifaliako ka ho feno ny fifalianareo.
  '12':
  - type: text
    content: 'Izao no didiko, dia ny mba hifankatiavanareo tahaka ny nitiavako anareo. '
  '13':
  - type: text
    content: 'Tsy misy manana fitiavana lehibe noho izao, dia ny manolotra ny ainy hamonjy ny sakaizany. '
  '14':
  - type: text
    content: 'Ianareo no sakaizako, raha manao araka izay andidiako anareo. '
  '15':
  - type: text
    content: 'Tsy hataoko hoe mpanompo intsony ianareo, fa ny mpanompo dia tsy mahalala izay ataon’ny tompony; fa nataoko hoe sakaiza ianareo satria izay rehetra reko tamin’ny Raiko no nambarako taminareo. '
  '16':
  - type: text
    content: Tsy ianareo no nifidy Ahy fa Izaho no nifidy anareo ka nanendry anareo mba handeha sy hamoa, ary mba haharetan’ny vokatrareo, mba homen’ny Ray anareo izay rehetra hangatahinareo amin’ny anarako na inona na inona.
  '17':
  - type: text
    content: Izany zavatra izany no andidiako anareo mba hifankatiavanareo.
  - type: heading
    content: Halan’izao tontolo izao Jesosy sy ny mpianany
  '18':
  - type: text
    content: 'Raha halan’izao tontolo izao ianareo dia aoka ho fantatrareo fa Izaho efa halany talohanareo. '
  '19':
  - type: text
    content: 'Raha avy amin’izao tontolo izao ianareo dia ho tia ny azy izao tontolo izao; fa satria tsy avy amin’izao tontolo izao ianareo, fa Izaho efa nifidy anareo avy tamin’izao tontolo izao, dia halan’izao tontolo izao ianareo. '
  '2':
  - type: text
    content: 'Ny sampany rehetra eo Amiko izay tsy mamoa dia esoriny; fa ny sampany rehetra izay mamoa kosa dia dioviny mba hamoa bebe kokoa. '
  '20':
  - type: text
    content: 'Tsarovy ny teny izay nolazaiko taminareo hoe: Ny mpanompo dia tsy lehibe noho ny tompony. Raha nanenjika Ahy izy dia hanenjika anareo koa; ary raha nitandrina ny teniko izy dia hitandrina ny anareo koa. '
  '21':
  - type: text
    content: 'Fa izany rehetra izany no hataony aminareo noho ny anarako satria tsy mahalala izay naniraka Ahy izy. '
  '22':
  - type: text
    content: 'Raha tsy tonga Aho ka niteny taminy dia tsy nanan-keloka izy; fa ankehitriny dia tsy misy fialana azony atao ny amin’ny helony. '
  '23':
  - type: text
    content: 'Izay mankahala Ahy dia mankahala ny Raiko koa. '
  '24':
  - type: text
    content: 'Raha tsy nataoko teo aminy izay asa tsy nataon’olon-kafa dia tsy nanan-keloka izy; fa ankehitriny dia efa hitany sady efa halany Aho sy ny Raiko koa; '
  '25':
  - type: text
    content: 'fa tonga izany mba hahatanteraka ny teny izay voasoratra ao amin’ny lalànany hoe: «Halany tsy amin’antony Aho» (Sal 69.4; 109.3).'
  '26':
  - type: text
    content: Fa raha tonga ny Mpananatra
  - type: note
    content: Zahao 14.16.
  - type: text
    content: ', izay hirahiko ho aminareo avy amin’ny Ray, dia ny Fanahin’ny fahamarinana izay mivoaka avy amin’ny Ray, dia Izy no ho vavolombelona hanambara Ahy. '
  '27':
  - type: text
    content: Ary ianareo koa dia ho vavolombelona hanambara satria ianareo dia efa teto Amiko hatramin’ny voalohany.
  '3':
  - type: text
    content: 'Efa madio rahateo ianareo noho ny teniko izay nolazaiko taminareo. '
  '4':
  - type: text
    content: 'Tomoera ao Amiko ary Izaho ao aminareo. Tahaka ny sampany tsy mahay mamoa ho azy, raha tsy mitoetra amin’ny voaloboka izy, dia toy izany koa ianareo, raha tsy mitoetra ao Amiko. '
  '5':
  - type: text
    content: 'Izaho no voaloboka, ianareo no sampany. Izay mitoetra ao Amiko ary Izaho ao aminy dia mamoa be izy; fa raha misaraka Amiko kosa ianareo dia tsy mahay manao na inona na inona. '
  '6':
  - type: text
    content: 'Raha misy tsy mitoetra ao Amiko dia ariana eny ivelany tahaka ny sampany izy ka malazo; ary angonina izy ka atsipy ao amin’ny afo dia ho may. '
  '7':
  - type: text
    content: 'Raha mitoetra ao Amiko ianareo ka mitoetra ao anatinareo ny teniko dia angataho izay tianareo na inona na inona fa ho tonga aminareo izany. '
  '8':
  - type: text
    content: Izany no ankalazana ny Raiko mba hamoazanareo be ka ho tonga mpianatro ianareo.
  '9':
  - type: text
    content: 'Tahaka ny nitiavan’ny Ray Ahy no nitiavako anareo; tomoera amin’ny fitiavako ianareo. '
