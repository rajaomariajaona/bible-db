document_id: GEN.13,3103
type_code: plt
verses:
  '1':
  - type: text
    content: Ary niakatra niala tany Ejipta ho any Negeva i Abrama, dia izy sy ny vadiny mbamin’ny fananany rehetra. Ary niaraka taminy koa i Lota.
  - type: heading
    content: Misara-dalana i Abrama sy i Lota
  '10':
  - type: text
    content: 'Dia nanopy ny masony i Lota ka nitazana ny tany rehetra teny amoron’i Jordana hatrany akaikin’i Zoara fa azon-drano avokoa izy ireo, tahaka ny sahan’NY TOMPO sy tahaka ny tany Ejipta. Talohan’ny nandravan’NY TOMPO an’i Sodoma sy i Gomora izany. '
  '11':
  - type: text
    content: 'Dia nifidy ny tany rehetra teo amoron’i Jordana i Lota ary niainga niantsinanana; toy izany no nisarahan’izy roa lahy. '
  '12':
  - type: text
    content: 'I Abrama dia nonina tao amin’ny tany Kanana, fa i Lota kosa dia nonina tany amin’ireo tanàna amin’ny faritra manamorona an’i Jordana ka namindrafindra ny tobiny hatrany Sodoma. '
  '13':
  - type: text
    content: Ary ny mponina tao Sodoma dia tena ratsy fanahy sady tena mpanota teo imason’NY TOMPO.
  '14':
  - type: text
    content: 'Taorianan’ny nisarahan’i Lota tamin’i Abrama dia niteny taminy NY TOMPO hoe: Atopazy avy eto amin’ity toerana misy anao ity ny masonao ka mitazàna mianavaratra sy mianatsimo, ary miantsinanana sy miankandrefana, '
  '15':
  - type: text
    content: 'fa ny tany rehetra izay tazanao dia homeko anao sy ny taranakao mandrakizay. '
  '16':
  - type: text
    content: 'Hataoko maro tahaka ny vovo-tany ny taranakao; koa raha misy olona mahaisa ny vovo-tany dia ho azo isaina koa ny taranakao. '
  '17':
  - type: text
    content: 'Mitsangàna ianao ka mandehana mitety ny tany amin’ny lavany sy ny sakany fa homeko anao izany. '
  '18':
  - type: text
    content: 'Ary namindrafindra ny tobiny i Abrama dia nandeha ka nonina teo amin’ireo hazo '
  - type: text
    content: terebintan’i
  - type: text
    content: ' Mamre izay any Hebrona. Teo izy no nanorina alitara ho an’NY TOMPO.'
  '2':
  - type: text
    content: 'Ary nanana harena be i Abrama, dia omby aman’ondry sy volafotsy ary volamena. '
  '3':
  - type: text
    content: 'Ary mbola nandeha ihany izy ka nifindrafindra, hatrany Negeva ka hatrany Betela izay niorenan’ny tranolainy tamin’ny voalohany, teo anelanelan’i Betela sy i Ay, '
  '4':
  - type: text
    content: teo amin’ny tany izay nisy ilay alitara nataony tamin’ny voalohany; ary niantso ny anaran’NY TOMPO teo i Abrama.
  '5':
  - type: text
    content: 'Ary i Lota koa, izay niara-nandeha tamin’i Abrama, dia mba nanana ondry sy omby ary tranolay. '
  '6':
  - type: text
    content: 'Ary tsy omby azy roa lahy hiarahany monina ny tany satria be loatra ny fananany avy ka tsy afaka niara-monina intsony izy ireo. '
  '7':
  - type: text
    content: 'Dia niady ny mpiandry ombin’i Abrama sy ny mpiandry ombin’i Lota. Ny Kananita sy ny Perizita no nonina tao Kanana tamin’izany fotoana izany. '
  '8':
  - type: text
    content: 'Ary hoy i Abrama tamin’i Lota: Aoka re mba tsy hisy ady amiko sy aminao, na amin’ny mpiandry ombiko sy ny mpiandry ombinao, fa mpihavana isika. '
  '9':
  - type: text
    content: 'Moa tsy eo anoloanao va ny tany rehetra? Miangavy anao aho, aoka hisara-dalana isika: Raha mianavaratra ianao dia hianatsimo aho, fa raha mianatsimo kosa ianao dia hianavaratra aho.'
