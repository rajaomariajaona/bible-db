document_id: GEN.13
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ary niakatra niala tany Ejipta ho any Negeva i Abrama, dia izy sy ny vadiny mbamin’ny fananany rehetra. Ary niaraka taminy koa i Lota.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Misara-dalana i Abrama sy i Lota
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary nanana harena be i Abrama, dia omby aman’ondry sy volafotsy ary volamena. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary mbola nandeha ihany izy ka nifindrafindra, hatrany Negeva ka hatrany Betela izay niorenan’ny tranolainy tamin’ny voalohany, teo anelanelan’i Betela sy i Ay, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: teo amin’ny tany izay nisy ilay alitara nataony tamin’ny voalohany; ary niantso ny anaran’NY TOMPO teo i Abrama.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary i Lota koa, izay niara-nandeha tamin’i Abrama, dia mba nanana ondry sy omby ary tranolay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary tsy omby azy roa lahy hiarahany monina ny tany satria be loatra ny fananany avy ka tsy afaka niara-monina intsony izy ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dia niady ny mpiandry ombin’i Abrama sy ny mpiandry ombin’i Lota. Ny Kananita sy ny Perizita no nonina tao Kanana tamin’izany fotoana izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary hoy i Abrama tamin’i Lota: Aoka re mba tsy hisy ady amiko sy aminao, na amin’ny mpiandry ombiko sy ny mpiandry ombinao, fa mpihavana isika. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Moa tsy eo anoloanao va ny tany rehetra? Miangavy anao aho, aoka hisara-dalana isika: Raha mianavaratra ianao dia hianatsimo aho, fa raha mianatsimo kosa ianao dia hianavaratra aho.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dia nanopy ny masony i Lota ka nitazana ny tany rehetra teny amoron’i Jordana hatrany akaikin’i Zoara fa azon-drano avokoa izy ireo, tahaka ny sahan’NY TOMPO sy tahaka ny tany Ejipta. Talohan’ny nandravan’NY TOMPO an’i Sodoma sy i Gomora izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Dia nifidy ny tany rehetra teo amoron’i Jordana i Lota ary niainga niantsinanana; toy izany no nisarahan’izy roa lahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'I Abrama dia nonina tao amin’ny tany Kanana, fa i Lota kosa dia nonina tany amin’ireo tanàna amin’ny faritra manamorona an’i Jordana ka namindrafindra ny tobiny hatrany Sodoma. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ary ny mponina tao Sodoma dia tena ratsy fanahy sady tena mpanota teo imason’NY TOMPO.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Taorianan’ny nisarahan’i Lota tamin’i Abrama dia niteny taminy NY TOMPO hoe: Atopazy avy eto amin’ity toerana misy anao ity ny masonao ka mitazàna mianavaratra sy mianatsimo, ary miantsinanana sy miankandrefana, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'fa ny tany rehetra izay tazanao dia homeko anao sy ny taranakao mandrakizay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Hataoko maro tahaka ny vovo-tany ny taranakao; koa raha misy olona mahaisa ny vovo-tany dia ho azo isaina koa ny taranakao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Mitsangàna ianao ka mandehana mitety ny tany amin’ny lavany sy ny sakany fa homeko anao izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary namindrafindra ny tobiny i Abrama dia nandeha ka nonina teo amin’ireo hazo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: terebintan’i
  - type: text
    text: ' Mamre izay any Hebrona. Teo izy no nanorina alitara ho an’NY TOMPO.'
