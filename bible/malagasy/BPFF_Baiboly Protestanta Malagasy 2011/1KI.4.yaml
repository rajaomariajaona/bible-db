document_id: 1KI.4
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mandamina ny fanjakany i Solomona
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Nanjaka tamin’ny Israely rehetra i Solomona mpanjaka.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ireto no mpitondra tao aminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: I Azaria, zanak’i Zadoka, no mpisorona;
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: i Elihorefa sy i Ahia, zanak’i Sisà, no mpitantsoratra;
- type: usfm
  marker: m
  children:
  - type: text
    text: i Josafata, zanak’i Ahiloda, no mpitadidy ny raharaham-panjakana;
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: i Benaia, zanak’i Joiada, no komandin’ny miaramila;
- type: usfm
  marker: m
  children:
  - type: text
    text: i Zadoka sy i Abiatara no mpisorona;
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: i Azaria, zanak’i Natana, no lehiben’ny olona voatendry;
- type: usfm
  marker: m
  children:
  - type: text
    text: i Zaboda, zanak’i Natana, namana akaikin’ny mpanjaka;
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: i Ahisara no lehiben’ny tao an-dapa;
- type: usfm
  marker: m
  children:
  - type: text
    text: i Adonirama, zanak’i Abda, no lehiben’ny mpanao fanompoana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ary nanendry mpifehy roa amby folo lahy ho amin’ny Israely rehetra i Solomona hiadidy ny zavatra rehetra nilain’ny mpanjaka sy ny ankohonany; samy niadidy ny iray volana avy amin’ny taona iray izy ireo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ireto avy ny anarany:'
- type: usfm
  marker: m
  children:
  - type: text
    text: I Beny-Hora no tany amin’ny tany be havoana any Efraima;
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: i Beny-Dekera no tao Makaza sy tao Salbima sy Bety-Semesy ary Elona-Bety-Hanana;
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: i Beny-Heseda no tao Arobota; i Soko sy ny tany Hefera manontolo no azy;
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: i Beny-Abinadaba no tao amin’ny havoanan’i Dora rehetra. I Tafata, zanakavavin’i Solomona, no vadiny;
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: i Bana, zanak’i Ahiloda; azy kosa i Tanàka sy Megido ary Bety-Sana rehetra, izay anilan’i Zaretana, ambanin’i Jezirela, hatrany Bety-Sana ka hatrany Abela-Mehola, dia hatrany ankoatra an’i Jokneama;
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: i Beny-Gebera no tao Ramota-Gileada; ireo tanànan’ny mpitoetra an-tranolay izay an’i Jaira, zanak’i Manase, izay any Gileada, no azy; azy koa ny tanin’i Argoba, izay any Basana, dia tanàna enimpolo lehibe nisy manda sy hidy varahina;
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: i Ahinadaba, zanak’i Ido, no tany Mahanaima;
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: i Ahimaza no tany Naftaly. Izy kosa dia nanambady an’i Basemata, zanakavavin’i Solomona;
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: i Bana, zanak’i Hosay, no tany Asera sy Alota;
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: i Josafata, zanak’i Paroa, no tany Isakara;
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: i Simey, zanak’i Ela, no tany Benjamina;
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: i Gebera, zanak’i Orỳ, no tany amin’ny tany Gileada, tanin’i Sihona, mpanjakan’ny Amorita, sy i Oga, mpanjakan’i Basana; ary izy ihany no mpifehy voatendry ho amin’izany tany izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ny Joda sy ny Israely moa dia tena maro ka tahaka ny fasika amoron-dranomasina ny hamarony. Nihinana sy nisotro ny olona sady nifaly.
