document_id: 1KI.4,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Mandamina ny fanjakany i Solomona
  - type: text
    content: Nanjaka tamin’ny Israely rehetra i Solomona mpanjaka.
  '10':
  - type: text
    content: i Beny-Heseda no tao Arobota; i Soko sy ny tany Hefera manontolo no azy;
  '11':
  - type: text
    content: i Beny-Abinadaba no tao amin’ny havoanan’i Dora rehetra. I Tafata, zanakavavin’i Solomona, no vadiny;
  '12':
  - type: text
    content: i Bana, zanak’i Ahiloda; azy kosa i Tanàka sy Megido ary Bety-Sana rehetra, izay anilan’i Zaretana, ambanin’i Jezirela, hatrany Bety-Sana ka hatrany Abela-Mehola, dia hatrany ankoatra an’i Jokneama;
  '13':
  - type: text
    content: i Beny-Gebera no tao Ramota-Gileada; ireo tanànan’ny mpitoetra an-tranolay izay an’i Jaira, zanak’i Manase, izay any Gileada, no azy; azy koa ny tanin’i Argoba, izay any Basana, dia tanàna enimpolo lehibe nisy manda sy hidy varahina;
  '14':
  - type: text
    content: i Ahinadaba, zanak’i Ido, no tany Mahanaima;
  '15':
  - type: text
    content: i Ahimaza no tany Naftaly. Izy kosa dia nanambady an’i Basemata, zanakavavin’i Solomona;
  '16':
  - type: text
    content: i Bana, zanak’i Hosay, no tany Asera sy Alota;
  '17':
  - type: text
    content: i Josafata, zanak’i Paroa, no tany Isakara;
  '18':
  - type: text
    content: i Simey, zanak’i Ela, no tany Benjamina;
  '19':
  - type: text
    content: i Gebera, zanak’i Orỳ, no tany amin’ny tany Gileada, tanin’i Sihona, mpanjakan’ny Amorita, sy i Oga, mpanjakan’i Basana; ary izy ihany no mpifehy voatendry ho amin’izany tany izany.
  '2':
  - type: text
    content: 'Ireto no mpitondra tao aminy:'
  - type: text
    content: I Azaria, zanak’i Zadoka, no mpisorona;
  '20':
  - type: text
    content: Ny Joda sy ny Israely moa dia tena maro ka tahaka ny fasika amoron-dranomasina ny hamarony. Nihinana sy nisotro ny olona sady nifaly.
  '3':
  - type: text
    content: i Elihorefa sy i Ahia, zanak’i Sisà, no mpitantsoratra;
  - type: text
    content: i Josafata, zanak’i Ahiloda, no mpitadidy ny raharaham-panjakana;
  '4':
  - type: text
    content: i Benaia, zanak’i Joiada, no komandin’ny miaramila;
  - type: text
    content: i Zadoka sy i Abiatara no mpisorona;
  '5':
  - type: text
    content: i Azaria, zanak’i Natana, no lehiben’ny olona voatendry;
  - type: text
    content: i Zaboda, zanak’i Natana, namana akaikin’ny mpanjaka;
  '6':
  - type: text
    content: i Ahisara no lehiben’ny tao an-dapa;
  - type: text
    content: i Adonirama, zanak’i Abda, no lehiben’ny mpanao fanompoana.
  '7':
  - type: text
    content: Ary nanendry mpifehy roa amby folo lahy ho amin’ny Israely rehetra i Solomona hiadidy ny zavatra rehetra nilain’ny mpanjaka sy ny ankohonany; samy niadidy ny iray volana avy amin’ny taona iray izy ireo.
  '8':
  - type: text
    content: 'Ireto avy ny anarany:'
  - type: text
    content: I Beny-Hora no tany amin’ny tany be havoana any Efraima;
  '9':
  - type: text
    content: i Beny-Dekera no tao Makaza sy tao Salbima sy Bety-Semesy ary Elona-Bety-Hanana;
