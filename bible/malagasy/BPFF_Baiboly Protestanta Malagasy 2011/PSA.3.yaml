document_id: PSA.3,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Voahodidin’ny fahavalo
  - type: text
    content: Salamo nataon’i Davida, fony izy nandositra an’i Absaloma zanany.
  - type: text
    content: TOMPO ô, akory izato hamaroan’ny mampahory ahy,
  - type: text
    content: maro no mitsangana hanohitra ahy,
  '2':
  - type: text
    content: 'maro no milaza momba ahy hoe:'
  - type: text
    content: 'Tsy misy famonjena ho azy ao amin’Andriamanitra! '
  - type: text
    content: Fiatoana
  '3':
  - type: text
    content: Kanjo Ianao, TOMPO ô, no ampinga ho ahy;
  - type: text
    content: voninahitro Ianao ary mampitraka ny lohako.
  '4':
  - type: text
    content: Miantso NY TOMPO aho
  - type: text
    content: 'ary mamaly ahy avy ao amin’ny an-tendrombohiny masina Izy. '
  - type: text
    content: Fiatoana
  '5':
  - type: text
    content: Nandry aho ka natory
  - type: text
    content: ary nifoha aho satria NY TOMPO no manohana ahy.
  '6':
  - type: text
    content: Tsy hatahotra olona alinalina
  - type: text
    content: izay milahatra manodidina hamely ahy aho.
  '7':
  - type: text
    content: Mitsangàna, TOMPO ô! Vonjeo aho, Andriamanitro ô!
  - type: text
    content: Mamely ny takolaky ny fahavaloko rehetra Ianao,
  - type: text
    content: manapotika ny nifin’ny ratsy fanahy Ianao.
  '8':
  - type: text
    content: An’NY TOMPO ny famonjena.
  - type: text
    content: 'Ho amin’ny olonao anie ny fitahianao. '
  - type: text
    content: Fiatoana
