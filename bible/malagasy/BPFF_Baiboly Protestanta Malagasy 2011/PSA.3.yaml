segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Voahodidin’ny fahavalo
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: Salamo nataon’i Davida, fony izy nandositra an’i Absaloma zanany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: TOMPO ô, akory izato hamaroan’ny mampahory ahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: maro no mitsangana hanohitra ahy,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'maro no milaza momba ahy hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Tsy misy famonjena ho azy ao amin’Andriamanitra! '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Fiatoana
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Kanjo Ianao, TOMPO ô, no ampinga ho ahy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: voninahitro Ianao ary mampitraka ny lohako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Miantso NY TOMPO aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ary mamaly ahy avy ao amin’ny an-tendrombohiny masina Izy. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Fiatoana
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Nandry aho ka natory
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary nifoha aho satria NY TOMPO no manohana ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Tsy hatahotra olona alinalina
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay milahatra manodidina hamely ahy aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Mitsangàna, TOMPO ô! Vonjeo aho, Andriamanitro ô!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mamely ny takolaky ny fahavaloko rehetra Ianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: manapotika ny nifin’ny ratsy fanahy Ianao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: An’NY TOMPO ny famonjena.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ho amin’ny olonao anie ny fitahianao. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Fiatoana
