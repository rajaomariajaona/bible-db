document_id: DAN.6,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I Dariosy mediana no nandray ny fanjakana ka efa roa amby enimpolo taona izy tamin’izay.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Anaovan’ny fahavalony vela-pandrika i Daniela
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Noho izany dia nasian’i Dariosy mpanjaka sonia izany lalàna sy didy izany.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Natsipy tao an-davaky ny liona i Daniela
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nony fantatr’i Daniela fa voaisy sonia ny didy dia nankao an-tranony izy; ary nivoha ny varavarankelin’ny tranony ambony rihana nanandrify an’i Jerosalema. Intelo isanandro no nandohalehany ka nivavaka sy nisaotra teo anatrehan’Andriamaniny, satria efa fanaony hatramin’ny taloha izany. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia somaritaka nivory ireo lehilahy ireo rehefa nahita an’i Daniela mangataka sy mifona eo anatrehan’Andriamaniny. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nanatona izy ka noho ny amin’ilay lalànan’ny mpanjaka dia niteny teo anatrehan’ny mpanjaka hoe: Moa tsy misy lalàna nasianao sonia va, fa na zovy na zovy no hanao fivavahana, na amin’Andriamanitra na amin’olona, ato anatin’ny telopolo andro afa-tsy aminao ihany, ry mpanjaka ô, dia hatsipy ao an-davaky ny liona? Namaly ny mpanjaka hoe: Marina izany, araka ny lalànan’ny Mediana sy ny Persiana izay tsy azo ovana. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia niteny teo anatrehan’ny mpanjaka izy ireo hoe: I Daniela, ilay isan’ny babo avy amin’ny taranak’i Joda dia tsy mba manaiky anao na ny lalàna izay nasianao sonia, ry mpanjaka ô, fa manao fivavahana intelo isanandro izy.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nalahelo mafy ny mpanjaka raha nahare izany teny izany; nefa satriny ihany ny hanafaka an’i Daniela ka nanao izay tratry ny sainy hamonjena azy izy mandra-pilentiky ny masoandro. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia somaritaka nivory ho any amin’ny mpanjaka indray ireo lehilahy ireo ka niteny tamin’ny mpanjaka hoe: Aoka ho fantatrao, ry mpanjaka, fa izao no lalànan’ny Mediana sy ny Persiana: Ny lalàna sy ny didy izay navoakan’ny mpanjaka dia tsy azo ovana. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia namoaka didy ny mpanjaka ary noentina i Daniela ka natsipy tao an-davaky ny liona. Ary niteny tamin’i Daniela ny mpanjaka hoe: Andriamanitrao izay tompoinao mandrakariva anie hamonjy anao. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nisy vato natampina ny vava lavaka; ary ny mpanjaka no nanidy izany tamin’ny fitombo-kaseny sy tamin’ny fitombo-kasen’ny olo-manankaja teo aminy, mba tsy hanovana ny teny ny amin’i Daniela.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nody tany an-dapany ny mpanjaka; tsy nihinan-kanina izy nandritra ny alina sady tsy nisy zazavavy mpandihy nampidirina teo anatrehany; eny, tsy nahita tory izy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Tsy naninon-tsy naninona i Daniela tao an-davaky ny liona
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Sitrak’i Dariosy ny hanendry solo-mpanjaka roapolo amby zato hitondra ny fanjakana rehetra. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nifoha vao maraina ny mpanjaka ka nandeha haingana ho any amin’ny lavaky ny liona. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nony tonga teo amin’ny lavaka izy dia niantso an’i Daniela tamin’ny feo malahelo; eny, niteny tamin’i Daniela ny mpanjaka hoe: Ry Daniela, mpanompon’Andriamanitra velona ô, moa Andriamanitrao izay tompoinao mandrakariva nahavonjy anao tamin’ny liona va? '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia namaly ny mpanjaka i Daniela hoe: Ry mpanjaka, ho velona mandrakizay anie ianao! '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Andriamanitro efa naniraka ny anjeliny ka nanakombona ny vavan’ny liona tsy handratra ahy, satria fahamarinana no hitany tamiko; ary teo anatrehanao koa, ry mpanjaka ô, dia tsy nanao ratsy aho. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia faly indrindra ny mpanjaka ka nasainy nakarina avy tao an-davaka i Daniela. Dia nakarina avy tao an-davaka i Daniela, ary hita fa tsy naninon-tsy naninona izy, satria nino an’Andriamaniny. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary namoaka didy ny mpanjaka ka noentina ireo lehilahy niampanga an’i Daniela ireo dia natsipy tao an-davaky ny liona izy mbamin’ny vady aman-janany; nandrombaka azy ireo ny liona ka nanapatapaka ny taolany raha tsy mbola nipaka tamin’ny fanambanin’ny lavaka akory aza izy ireo.
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Taorianan’izany dia nanoratra ho amin’ny fokom-pirenena sy ny firenena sy ny samihafa fiteny rehetra izay monina ambonin’ny tany rehetra i Dariosy mpanjaka hoe: Hitombo anie ny fiadananareo! '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Manao lalàna aho mba hangovitan’ny olona manerana ny fanjakako rehetra sy hatahorany eo anatrehan’ny Andriamanitr’i Daniela.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa Izy no Andriamanitra velona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady maharitra mandrakizay;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny fanjakany dia tsy ho rava na oviana na oviana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny fahefany dia haharitra hatramin’ny farany.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izy no mamonjy sy manafaka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary manao famantarana sy fahagagana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: any an-danitra sy etỳ an-tany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary Izy no namonjy an’i Daniela ho afaka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tamin’ny herin’ny liona.
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary izany Daniela izany dia nambinina tamin’ny nanjakan’i Dariosy sy tamin’ny nanjakan’i Kirosy persiana.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa tamin’ireo dia nisy komandy lehibe telo lahy; i Daniela ny iray tamin’ireo, mba hitateran’ny solo-mpanjaka ny raharaha tsy hisy fahabangana ho an’ny mpanjaka. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izany Daniela izany dia nihoatra noho ny komandy lehibe sy ny solo-mpanjaka namany, satria nanana fanahy hafakely izy; ary nikasa hanandratra azy ho lehiben’ny fanjakana manontolo ny mpanjaka.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa ny komandy lehibe sy ny solo-mpanjaka dia nitady izay hiampangany an’i Daniela ny amin’ny raharaham-panjakana, nefa tsy nahita izay hiampangany azy na izay tsininy akory izy ireo, satria marina izy ka tsy nisy kilema na tsiny hita taminy. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy ireo lehilahy ireo: Tsy ho hitantsika izay hiampangantsika io Daniela io raha tsy ny amin’ny lalànan’ny Andriamaniny no misy hitantsika hiampangana azy. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia somaritaka nivory ho any amin’ny mpanjaka ireo komandy lehibe sy solo-mpanjaka ireo; ary izao no nolazainy taminy: Ry Dariosy mpanjaka ô, ho velona mandrakizay anie ianao! '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny komandy lehibe rehetra amin’ny fanjakana, ny manampahefana, ny solo-mpanjaka, ny mpanolotsaina ary ny governora, dia mifanara-kevitra fa tokony hanao lalàna sy didy mafy ianao, ry mpanjaka, koa na zovy na zovy no hanao fivavahana na amin’Andriamanitra na amin’olona ato anatin’ny telopolo andro, afa-tsy aminao ihany, ry mpanjaka ô, dia hatsipy ao an-davaky ny liona. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ankehitriny, ry mpanjaka ô, ataovy mafy ny lalàna ka asio sonia mba tsy hiova, araka ny lalànan’ny Mediana sy ny Persiana izay tsy azo ovana.
