document_id: JUD.1,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Fiarahabana
  - type: text
    content: 'I Joda, mpanompon’i Jesosy '
  - type: text
    content: Kristy
  - type: text
    content: ' sady rahalahin’i Jakoba, no mamangy izay olona voaantso, malala ao amin’Andriamanitra Ray sy voatahiry ho an’i Jesosy Kristy: '
  '10':
  - type: text
    content: 'Fa ireo kosa dia miteny ratsy izay zavatra tsy fantany akory; ary izay zavatra fantany fotsiny, tahaka ny fahalalan’ny biby tsy manan-tsaina, dia izany no andotoany ny tenany. '
  '11':
  - type: text
    content: Hahita loza izy! Fa ny lalan’i Kaina no nandehanany; tamin’ny lalan-dison’i Balama no nihazakazahany mba hahazoany tamby, ary ny fikomian’i Kora no naharingana azy!
  '12':
  - type: text
    content: 'Ireny olona ireny no mandoto ny fanasam-pifankatiavanareo raha mba miara-misakafo tsy amin-tahotra aminareo izy akory, dia mpiandry mamahan-tena, rahona tsy misy rano entin’ny rivotra, hazo fararano tsy misy voany, indroa maty, voafongotra; '
  '13':
  - type: text
    content: onjan-dranomasina mitopatopa mamorivory ny asa mahamenatra ataony, kintana mifindrafindra ka voatahiry ho azy mandrakizay ny haizina mikitroka!
  '14':
  - type: text
    content: 'Ary i Enoka koa, ilay fahafito nandimby an’i Adama, dia efa naminany ny amin’ireny olona ireny ka nilaza hoe: «Indro, tonga NY TOMPO mbamin’ny masiny tsy omby alinalina '
  '15':
  - type: text
    content: hanao fitsarana amin’ny rehetra sy hampiaiky ny olona rehetra ny asan’ny haratsiam-panahy rehetra, izay nataony tamin’ny haratsiam-panahiny sy ny teny henjana rehetra izay nanoheran’ny mpanota ratsy fanahy Azy.»
  '16':
  - type: text
    content: Ireo dia mpimonomonona sy mpimenomenona, olona mandeha araka ny filany; ny vavany dia manao teny miavonavona tafahoatra, ary mandoka olona mba hahazoany zavatra.
  - type: heading
    content: Hafatrafatra ho an’ny Mpino
  '17':
  - type: text
    content: 'Fa ianareo kosa, ry malala, dia tsarovinareo ny teny voalazan’ny Apostolin’i Jesosy '
  - type: text
    content: Kristy
  - type: text
    content: ' Tompontsika fahiny. '
  '18':
  - type: text
    content: 'Fa efa nilaza taminareo izy hoe: Amin’ny andro farany dia hisy mpaniratsira, mandeha araka ny filany sy ny haratsiam-panahiny. '
  '19':
  - type: text
    content: Ireo no mahatonga fisarahana, dia olona araka ny nofo ihany, tsy manana ny Fanahy.
  '2':
  - type: text
    content: Hampitomboina ho anareo anie ny famindrampo sy ny fiadanana ary ny fitiavana!
  - type: heading
    content: Ireo mpampiely fampianarana sandoka
  '20':
  - type: text
    content: 'Fa ianareo kosa, ry malala, dia ataovy izay handrosoanareo amin’ny finoanareo masina indrindra ka mivavaha ao amin’ny Fanahy Masina; '
  '21':
  - type: text
    content: tahirizo ao amin’ny fitiavan’Andriamanitra ny tenanareo, eo am-piandrasana ny famindrampon’i Jesosy Kristy Tompontsika ho amin’ny fiainana mandrakizay.
  '22':
  - type: text
    content: 'Amindrao fo ny sasany izay miahanahana; '
  '23':
  - type: text
    content: ny sasany kosa dia sarihana avy amin’ny afo no famonjenareo azy; ary ny sasany indray dia amindrao fo amin-tahotra ka mankahalà na dia ny akanjo voapentimpentin’ny nofo aza.
  - type: heading
    content: Fiderana farany
  '24':
  - type: text
    content: 'Ary ho an’Izay mahay miaro anareo mba tsy ho tafintohina, ary mahay mampijoro anareo, tsy misy tsiny, eo anoloan’ny voninahiny amin’ny firavoravoana, '
  '25':
  - type: text
    content: 'ho an’Andriamanitra tokana, Mpamonjy antsika, amin’ny alalan’i Jesosy '
  - type: text
    content: Kristy
  - type: text
    content: ' Tompontsika anie, ny voninahitra sy ny fahalehibiazana, ny fanjakana sy ny fahefana hatramin’ny taloha indrindra sy ankehitriny ary mandrakizay! Amena!'
  '3':
  - type: text
    content: 'Ry malala, raha manao izay zotom-po rehetra hanoratra aminareo aho hilaza ny amin’ny famonjena iombonantsika dia nisy nahatery ahy hanoratra aminareo, hampirisika anareo mba hiadianareo mafy hiaro ny finoana izay voatolotra indray mandeha monja ho an’ny olona masina. '
  '4':
  - type: text
    content: 'Fa misy olona sasany niditra an-tsokosoko, izay efa voasoratra hatry ny ela ho amin’izany fanamelohana izany, dia olona ratsy fanahy, izay mamadika ny fahasoavan’Andriamanitsika ho fanaranam-po amin’ny ratsy sady mandà ny Andriana tokana, dia Jesosy '
  - type: text
    content: Kristy
  - type: text
    content: ' Tompontsika.'
  '5':
  - type: text
    content: 'Ta hampahatsiaro anareo aho, na dia efa fantatrareo rahateo aza ny zavatra rehetra, fa rehefa novonjen’ny Tompo ho afaka tany Ejipta ny olona dia naringany ihany taorianan’izany izay tsy nino. '
  '6':
  - type: text
    content: 'Ary ny anjely izay tsy nitana ny anjara fanapahany fa nandao ny fonenany dia nohazoniny amin’ny fatorana mandrakizay ao amin’ny maizina ho amin’ny andro fitsarana lehibe. '
  '7':
  - type: text
    content: Toy izany koa, i Sodoma sy i Gomora mbamin’ny tanàna nanodidina azy, izay nijangajanga tahaka azy koa ka lasa nanaraka nofo hafa, dia aseho ho fananarana ny fiaretany fijaliana amin’ny afo maharitra mandrakizay.
  '8':
  - type: text
    content: 'Kanefa toy izany koa, ireo dia manaraka ny nofinofiny ka mandoto ny nofo ary mandà ny manana fahalehibiazana sady miteny ratsy ny manana voninahitra. '
  '9':
  - type: text
    content: 'Fa Mikaela arikanjely aza, raha niady tamin’ny devoly ka nifandìtra ny amin’ny fatin’i Mosesy dia tsy sahy niteny ratsy hanameloka azy, fa hoy izy: «Hananatra anao anie NY TOMPO!»'
