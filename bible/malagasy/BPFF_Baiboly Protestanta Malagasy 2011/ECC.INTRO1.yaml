- type: usfm
  marker: imt1
  children:
  - type: text
    text: INDRAY MIJERY
- type: usfm
  marker: ip
  children:
  - type: text
    text: Ny nadika hoe «Ny Mpitoriteny» na «I Mpitoriteny» dia teny iray fiaviana amin’ny hoe «Fivoriam-piangonana», ary heverin’ny maro ho midika hoe «Mpitarika», na «Mpitarika fivoriam-piangonana». Azo antoka fa ny mpanoratra dia isan’ny olon-kendry izay nanangona tenim-pahendrena ka nampianatra na nitory izany. Ny 1.1 dia milaza azy ho zanak’i Davida, mpanjakan’i Jerosalema. Milaza an’i Solomona izany, koa ny toko roa voalohany dia tandrify tokoa ny fiainan’i Solomona. Ny hoe zanak’i Davida koa anefa dia mety hilaza mpanjaka iray taranak’i Davida, na koa Mesia.
- type: usfm
  marker: ip
  children:
  - type: text
    text: Ny Mpitoriteny dia isan’ireo Horonam-boky Dimy izay novakina tamin’ireo fetim-piangonana lehibe, koa ny Mpitoriteny dia novakina tamin’ny Fetin’ny trano rantsankazo.
- type: usfm
  marker: is1
  children:
  - type: text
    text: Ny votoatin’ny Boky
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Toy ny Bokin’i Joba sy ny Ohabolana, ny Bokin’ny Mpitoriteny dia isan’ireo soratra manolotra fahendrena. Raha ny Bokin’ny Ohabolana dia tena manolotra fananarana ho amin’ny fahendrena tokoa, fa ity Boky ity kosa dia toy ny mametra-panontaniana amin’ny hevitra rehetra izay noheverina ho tsara indrindra: Ny asa sy izay rehetra nisasarana, ny fahendrena, ny fitsarana, ny harena, ny fivavahana atao amim-pahazarana; eny, hatramin’ny fisian’ny olombelona aza. Ambarany hatrany fa zava-poana avokoa ny zavatra rehetra. Ny teny nadika hoe zava-poana dia ilazana fofonaina, entona, izany hoe zavatra maivana, mandalo, ary tsy misy hafa amin’io ny anaran’i Abela fahiny. Toy ny olona tratry ny fahakiviam-piainana ny mpanoratra. Tsy ekeny ilay foto-pisainana niely teo amin’ny Jiosy, izay nilaza fa ny marina dia tsy maintsy mahazo fitahiana, ary ny ratsy fanahy dia tsy maintsy ho voaozona. Tsy famoizampo anefa no fanahy mitondra ny Boky, fa ny fikendreny dia ny hanaitra ny Mpino mba tsy hametraka fitokisana na amin’inona na amin’inona, fa izay mitoetra dia ny fahatahorana an’Andriamanitra. Any amin’ny faran’ny Boky no tena hamafisina io fototra azo antoka io, sady ampahatsiarovan’ny mpanoratra amin’ny mpamaky fa tsy maintsy hanatrika ny fahafatesana ny olona rehetra, ary Andriamanitra no hitsara ny zavatra rehetra ataon’ny olona.'
- type: usfm
  marker: iot
  children:
  - type: text
    text: Ny firafitry ny Boky
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Tsy dia ahitana fizarana miavaka loatra ato amin’ny Boky, fa ny hevitra rehetra dia manodidina ny fotokevitra hoe: Zava-poana ny zavatra rehetra. Fa ny Boky kosa dia mifarana amin’ny hafatra hitandrina ny didin’Andriamanitra sy hatahotra Azy, satria Izy no hitsara ny olona rehetra.'
