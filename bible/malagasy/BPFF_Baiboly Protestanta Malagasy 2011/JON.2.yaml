document_id: JON.2,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny vavaka nataon’i Jona
  - type: text
    content: 'Ary NY TOMPO nanomana hazandrano lehibe hitelina an’i Jona. Ary i Jona dia tao an-kibon’ilay hazandrano nandritra ny telo andro sy telo alina. '
  '10':
  - type: text
    content: fa izaho kosa dia feo midera no entiko mamono zavatra hatao fanatitra ho Anao,
  - type: text
    content: ary izay nivoadiako dia hefaiko.
  - type: text
    content: An’NY TOMPO ny famonjena.
  '11':
  - type: text
    content: Ary NY TOMPO nandidy ilay hazandrano ka naloany ho eny amin’ny tany maina i Jona.
  '2':
  - type: text
    content: 'Dia nivavaka tamin’NY TOMPO Andriamaniny tao an-kibon’ny hazandrano i Jona. '
  '3':
  - type: text
    content: 'Hoy izy:'
  - type: text
    content: Niantso NY TOMPO tamin’ny fahoriako aho
  - type: text
    content: dia namaly ahy Izy;
  - type: text
    content: 'avy tao anatin’ny '
  - type: text
    content: fitoeran’ny maty
  - type: text
    content: ' no nitarainako'
  - type: text
    content: dia nihaino ny feoko Ianao.
  '4':
  - type: text
    content: Fa efa natsipinao tao amin’ny lalina aho, dia tao amin’ny ranomasina,
  - type: text
    content: ka voasafotry ny riaka aho;
  - type: text
    content: nanarona ahy ny alondranonao sy ny onjanao rehetra.
  '5':
  - type: text
    content: 'Dia hoy aho:'
  - type: text
    content: Voaroaka tsy ho eo anatrehanao aho!
  - type: text
    content: Nefa mbola nanatrika ny tempolinao masina ihany.
  '6':
  - type: text
    content: Nanarona ahy hatramin’ny aiko ny rano,
  - type: text
    content: nanemitra ahy manodidina ny lalina;
  - type: text
    content: nisaringotra manodidina ny lohako ny zavamaniry any an-dranomasina.
  '7':
  - type: text
    content: Tafalatsaka tany amin’ny fanambanin’ny tendrombohitra aho;
  - type: text
    content: nanidy ahy mandrakizay ny hidin’ny tany;
  - type: text
    content: nefa nampiakatra ny aiko avy tao an-davaka Ianao,
  - type: text
    content: RY TOMPO Andriamanitro!
  '8':
  - type: text
    content: Raha reraka ny fanahiko tato anatiko
  - type: text
    content: dia nahatsiaro NY TOMPO aho.
  - type: text
    content: Tonga tao Aminao ny vavaka ataoko,
  - type: text
    content: dia tao amin’ny tempolinao masina.
  '9':
  - type: text
    content: Izay mivavaka amin’ny sampy
  - type: text
    content: dia mahafoy Izay Mpamindra fo aminy;
