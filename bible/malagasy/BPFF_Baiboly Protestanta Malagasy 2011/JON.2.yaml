document_id: JON.2
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny vavaka nataon’i Jona
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary NY TOMPO nanomana hazandrano lehibe hitelina an’i Jona. Ary i Jona dia tao an-kibon’ilay hazandrano nandritra ny telo andro sy telo alina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Dia nivavaka tamin’NY TOMPO Andriamaniny tao an-kibon’ny hazandrano i Jona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Hoy izy:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Niantso NY TOMPO tamin’ny fahoriako aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia namaly ahy Izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'avy tao anatin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: fitoeran’ny maty
  - type: text
    text: ' no nitarainako'
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia nihaino ny feoko Ianao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Fa efa natsipinao tao amin’ny lalina aho, dia tao amin’ny ranomasina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka voasafotry ny riaka aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: nanarona ahy ny alondranonao sy ny onjanao rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia hoy aho:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Voaroaka tsy ho eo anatrehanao aho!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nefa mbola nanatrika ny tempolinao masina ihany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Nanarona ahy hatramin’ny aiko ny rano,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nanemitra ahy manodidina ny lalina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: nisaringotra manodidina ny lohako ny zavamaniry any an-dranomasina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Tafalatsaka tany amin’ny fanambanin’ny tendrombohitra aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: nanidy ahy mandrakizay ny hidin’ny tany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa nampiakatra ny aiko avy tao an-davaka Ianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: RY TOMPO Andriamanitro!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Raha reraka ny fanahiko tato anatiko
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia nahatsiaro NY TOMPO aho.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tonga tao Aminao ny vavaka ataoko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia tao amin’ny tempolinao masina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Izay mivavaka amin’ny sampy
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia mahafoy Izay Mpamindra fo aminy;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: fa izaho kosa dia feo midera no entiko mamono zavatra hatao fanatitra ho Anao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary izay nivoadiako dia hefaiko.
- type: usfm
  marker: q1
  children:
  - type: text
    text: An’NY TOMPO ny famonjena.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ary NY TOMPO nandidy ilay hazandrano ka naloany ho eny amin’ny tany maina i Jona.
