document_id: LUK.7
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesosy sy ilay kapiteny tao Kapernaomy
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat 8.5-13; ampit. Jao 4.46-54
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Rehefa vitan’i Jesosy teo anatrehan’ny olona izany toriteniny rehetra izany dia nankany Kapernaomy Izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Narary efa ho faty ny mpanompon’ny kapiteny iray, izay tiany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Koa raha nahare ny amin’i Jesosy ilay kapiteny dia naniraka loholon’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jiosy
  - type: text
    text: ' hankeo Aminy mba hangataka Azy ho avy ka hanasitrana ny mpanompony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Rehefa tonga teo amin’i Jesosy ireo dia nangataka mafy Taminy ka niteny hoe: Mendrika ny hanaovanao izany izy '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'satria tia ny firenentsika izy sady izy no efa nanorina ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sinagoga
  - type: text
    text: ' ho antsika. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary nandeha niaraka taminy Jesosy. Rehefa teo akaikin’ny trano Izy dia naniraka namana hitsena Azy ilay kapiteny ka niteny Taminy hoe: Tompoko, aza misahirana Ianao; fa tsy mendrika hidiranao ao ambanin’ny tafon-tranoko aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Koa na dia ny tenako aza dia nataoko fa tsy mendrika hankeo Aminao; fa mitenena ihany dia ho sitrana ny mpanompolahiko. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Fa izaho koa mba lehilahy manana lehibe ihany ary manana miaramila izay feheziko; koa hoy aho amin’ny iray: Mandehana! Dia mandeha izy, ary amin’ny iray koa: Avia! Dia avy izy, ary amin’ny mpanompoko: Ataovy izao! Dia manatanteraka izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Nony nahare izany Jesosy dia gaga taminy; ary nitodika Izy ka niteny tamin’ny vahoaka izay nanaraka Azy hoe: Lazaiko aminareo fa tsy mbola nahita finoana lehibe toy izany Aho na dia teo amin’ny Israely aza. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ary nony tafaverina tao an-trano ireo iraka ireo dia hitany fa sitrana ilay mpanompo.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nananganan’i Jesosy ny zanakalahin’ilay mpitondratena
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Taoriana kelin’izany Jesosy dia nankany amin’ny tanàna iray atao hoe Naina; ary nanaraka Azy ny mpianany sy vahoaka betsaka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary rehefa nanakaiky ny vavahadin’ny tanàna Izy dia indro, nisy fatin’ny lehilahy iray noentina halevina, izay zanaka lahitokan’ny reniny sady mpitondratena Ravehivavy; ary nisy vahoaka betsaka avy tao an-tanàna nanaraka azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Nony nahita an-dRavehivavy ny Tompo dia onena azy ka hoy Izy taminy: Aza mitomany! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary nanatona Izy ka nikasika ny tranovorona dia nijanona ireo izay nilanja. Ary hoy Jesosy: Ry zatovo, hoy Aho aminao: Miarena! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Dia niarina ny maty sady niteny ka natolony ny reniny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary raiki-tahotra ny olona rehetra ka nankalaza an’Andriamanitra hoe: Mpaminany lehibe no efa mitsangana eto amintsika; ary Andriamanitra efa nitsinjo ny olony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Dia niely nanerana an’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jodia
  - type: text
    text: ' sy ny tany manodidina rehetra ny lazan’i Jesosy ny amin’izany zavatra izany.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ireo irak’i Jaona Mpanao batisa
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat 11.2-19
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ny mpianatr’i Jaona dia nanambara izany rehetra izany taminy. Ary niantso ny mpianany roa lahy hankao aminy i Jaona, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'dia naniraka azy hankany amin’ny Tompo hilaza hoe: Ianao va Ilay ho avy sa mbola hafa no andrasantsika? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Nony tonga tany aminy ireo lehilahy ireo dia niteny hoe: Naniraka anay hankaty aminao i Jaona Mpanao batisa hanontany hoe: Ianao va Ilay ho avy sa mbola hafa no andrasantsika? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Tamin’izany ora izany dia nahasitrana olona maro tamin’ny rofy sy ny aretina ary ny fanahy ratsy Jesosy sady nampahiratra ny jamba maro. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Dia namaly azy ireo Izy hoe: Mandehana ianareo, ambarao amin’i Jaona izao hitanareo sy renareo izao:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: mahiratra ny jamba, mandeha ny mandringa,
- type: usfm
  marker: q1
  children:
  - type: text
    text: diovina ny boka, mahare ny marenina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: atsangana ny maty ary ny mahantra dia itoriana ny Filazantsara.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ary sambatra izay tsy ho tafintohina noho ny Amiko!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Nony lasa ny irak’i Jaona dia nilaza ny amin’i Jaona tamin’ny vahoaka Jesosy hoe: Hizaha inona no nalehanareo tany an-tany efitra? Volotara nohozongozonin’ny rivotra va? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Sa hizaha inona no nalehanareo? Olona mitafy lamba mirentirenty va? Indro, ny mitafy lamba mirentirenty sy miaina amin’ny fahafinaretana dia ao an-dapan’ny mpanjaka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Sa hizaha inona no nalehanareo? Mpaminany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.26 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: profeta.
    marker-yv: yv-n
  - type: text
    text: ' va? Eny, hoy Aho aminareo sady mihoatra lavitra noho ny mpaminany izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Fa izy ilay voasoratra hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Indro Aho maniraka ny irako hialoha Anao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay hamboatra ny lalanao eo alohanao» (Mal 3.1).
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Lazaiko aminareo: Tsy misy lehibe noho i Jaona amin’izay nateraky ny vehivavy; nefa ny kely indrindra amin’ny fanjakan’Andriamanitra dia lehibe noho izy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ary ny vahoaka rehetra sy ny mpamory hetra raha nandre dia nanamarina an’Andriamanitra satria natao batisa tamin’ny batisan’i Jaona izy ireny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Fa ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Fariseo
  - type: text
    text: ' sy ny mpahay lalàna kosa dia nandà ny fikasan’Andriamanitra satria tsy mba nanatona hataon’i Jaona batisa.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Tahaka ny inona ary no hanoharako ny olona amin’ity taranaka ity? Tahaka ny inona moa izy? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Tahaka ny ankizy madinika mipetraka eny an-tsena izy, izay mifampiantso hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Efa nitsoka sodina taminareo izahay nefa tsy nandihy ianareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: efa nanao hira fisaonana izahay nefa tsy nitomany ianareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Fa tonga i Jaona Mpanao batisa, tsy nihinan-kanina na nisotro divay, dia hoy ianareo: Manana '
  - type: usfm
    marker: w
    children:
    - type: text
      text: demonia
  - type: text
    text: ' izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Tonga ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Zanak’Olona
  - type: text
    text: ' mihinana sy misotro kosa, dia hoy ianareo: Indro, olona fatra-pitia hanina sy mpisotro divay, sakaizan’ny mpamory hetra sy ny mpanota. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Fa ny fahendrena dia hamarinin’ny zanany rehetra.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesosy sy ilay vehivavy mpanota
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Ampit. Mat 26.6-13; Mar 14.3-9; Jao 12.1-8
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Nisy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Fariseo
  - type: text
    text: ' iray nanasa an’i Jesosy hiara-misakafo aminy; dia niditra tao an-tranon’ilay Fariseo Izy ka nipetraka nisakafo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Ary indro, nisy vehivavy mpanota tao an-tanàna, koa rehefa fantany fa nipetraka nisakafo tao an-tranon’ilay Fariseo Jesosy dia nitondra tavoara alabasitara feno menaka manitra izy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'ary nijanona tao aorianany teo anilan’ny tongony izy ka nitomany, dia nahakotsa ny tongony tamin’ny ranomasony sy namaoka azy tamin’ny volon-dohany, dia nanoroka fatratra ny tongony ka nanosotra azy tamin’ny menaka manitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Nony nahita izany ilay Fariseo nanasa Azy dia niteny anakampo hoe: Raha mpaminany Ity dia ho nahafantatra io vehivavy mikasika Azy io sy ny momba azy; fa mpanota io.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Fa hoy Jesosy taminy: Ry Simona, manan-kolazaina aminao Aho. Dia hoy izy: Mpampianatra ô, lazao ary. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Nisy roa lahy nananan’ny mpampindram-bola iray trosa: Ny iray dia nananany '
  - type: usfm
    marker: w
    children:
    - type: text
      text: denaria
  - type: text
    text: ' dimanjato, ary ny iray kosa dia dimampolo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Ary raha tsy nanan-kaloa izy roa lahy dia samy navelany. Koa iza moa amin’ireo no ho tia azy kokoa? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Dia namaly i Simona hoe: Heveriko fa ilay namoizany be. Dia hoy Izy taminy: Marina ny hevitrao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Ary nitodika nijery an-dRavehivavy Jesosy ka niteny tamin’i Simona hoe: Hitanao va io vehivavy io? Niditra teto an-tranonao Aho; nefa tsy mba nanome Ahy rano hanasana ny tongotro ianao; fa izy kosa dia nahakotsa ny tongotro tamin’ny ranomasony ary namaoka azy tamin’ny volon-dohany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Tsy mba nanoroka Ahy akory ianao; nefa izy, hatrizay nidirako, dia tsy mbola nitsahatra nanoroka fatratra ny tongotro. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Ny lohako dia tsy mba nohosoranao diloilo akory; fa izy kosa dia nanosotra menaka manitra ny tongotro. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Koa amin’izany dia lazaiko aminao: Voavela ny helony marobe, fa be fitiavana izy; fa izay voavela tamin’ny kely dia kely fitiavana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Dia hoy Izy tamin-dRavehivavy: Voavela ny helokao.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'Ary izay niara-nihinana taminy dia niresaka hoe: Iza moa Ity no mba mamela heloka? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Ary hoy Izy tamin-dRavehivavy: Ny finoanao efa namonjy anao; mandehana amin’ny fiadanana.'
