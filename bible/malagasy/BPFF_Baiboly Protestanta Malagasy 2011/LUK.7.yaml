document_id: LUK.7,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Jesosy sy ilay kapiteny tao Kapernaomy
  - type: heading
    content: Mat 8.5-13; ampit. Jao 4.46-54
  - type: text
    content: Rehefa vitan’i Jesosy teo anatrehan’ny olona izany toriteniny rehetra izany dia nankany Kapernaomy Izy.
  '10':
  - type: text
    content: Ary nony tafaverina tao an-trano ireo iraka ireo dia hitany fa sitrana ilay mpanompo.
  - type: heading
    content: Ny nananganan’i Jesosy ny zanakalahin’ilay mpitondratena
  '11':
  - type: text
    content: 'Taoriana kelin’izany Jesosy dia nankany amin’ny tanàna iray atao hoe Naina; ary nanaraka Azy ny mpianany sy vahoaka betsaka. '
  '12':
  - type: text
    content: 'Ary rehefa nanakaiky ny vavahadin’ny tanàna Izy dia indro, nisy fatin’ny lehilahy iray noentina halevina, izay zanaka lahitokan’ny reniny sady mpitondratena Ravehivavy; ary nisy vahoaka betsaka avy tao an-tanàna nanaraka azy. '
  '13':
  - type: text
    content: 'Nony nahita an-dRavehivavy ny Tompo dia onena azy ka hoy Izy taminy: Aza mitomany! '
  '14':
  - type: text
    content: 'Ary nanatona Izy ka nikasika ny tranovorona dia nijanona ireo izay nilanja. Ary hoy Jesosy: Ry zatovo, hoy Aho aminao: Miarena! '
  '15':
  - type: text
    content: 'Dia niarina ny maty sady niteny ka natolony ny reniny. '
  '16':
  - type: text
    content: 'Ary raiki-tahotra ny olona rehetra ka nankalaza an’Andriamanitra hoe: Mpaminany lehibe no efa mitsangana eto amintsika; ary Andriamanitra efa nitsinjo ny olony. '
  '17':
  - type: text
    content: 'Dia niely nanerana an’i '
  - type: text
    content: Jodia
  - type: text
    content: ' sy ny tany manodidina rehetra ny lazan’i Jesosy ny amin’izany zavatra izany.'
  - type: heading
    content: Ireo irak’i Jaona Mpanao batisa
  - type: heading
    content: Mat 11.2-19
  '18':
  - type: text
    content: 'Ny mpianatr’i Jaona dia nanambara izany rehetra izany taminy. Ary niantso ny mpianany roa lahy hankao aminy i Jaona, '
  '19':
  - type: text
    content: 'dia naniraka azy hankany amin’ny Tompo hilaza hoe: Ianao va Ilay ho avy sa mbola hafa no andrasantsika? '
  '2':
  - type: text
    content: 'Narary efa ho faty ny mpanompon’ny kapiteny iray, izay tiany. '
  '20':
  - type: text
    content: 'Nony tonga tany aminy ireo lehilahy ireo dia niteny hoe: Naniraka anay hankaty aminao i Jaona Mpanao batisa hanontany hoe: Ianao va Ilay ho avy sa mbola hafa no andrasantsika? '
  '21':
  - type: text
    content: 'Tamin’izany ora izany dia nahasitrana olona maro tamin’ny rofy sy ny aretina ary ny fanahy ratsy Jesosy sady nampahiratra ny jamba maro. '
  '22':
  - type: text
    content: 'Dia namaly azy ireo Izy hoe: Mandehana ianareo, ambarao amin’i Jaona izao hitanareo sy renareo izao:'
  - type: text
    content: mahiratra ny jamba, mandeha ny mandringa,
  - type: text
    content: diovina ny boka, mahare ny marenina,
  - type: text
    content: atsangana ny maty ary ny mahantra dia itoriana ny Filazantsara.
  '23':
  - type: text
    content: Ary sambatra izay tsy ho tafintohina noho ny Amiko!
  '24':
  - type: text
    content: 'Nony lasa ny irak’i Jaona dia nilaza ny amin’i Jaona tamin’ny vahoaka Jesosy hoe: Hizaha inona no nalehanareo tany an-tany efitra? Volotara nohozongozonin’ny rivotra va? '
  '25':
  - type: text
    content: 'Sa hizaha inona no nalehanareo? Olona mitafy lamba mirentirenty va? Indro, ny mitafy lamba mirentirenty sy miaina amin’ny fahafinaretana dia ao an-dapan’ny mpanjaka. '
  '26':
  - type: text
    content: Sa hizaha inona no nalehanareo? Mpaminany
  - type: note
    content: 'Na: profeta.'
  - type: text
    content: ' va? Eny, hoy Aho aminareo sady mihoatra lavitra noho ny mpaminany izy. '
  '27':
  - type: text
    content: 'Fa izy ilay voasoratra hoe:'
  - type: text
    content: «Indro Aho maniraka ny irako hialoha Anao,
  - type: text
    content: izay hamboatra ny lalanao eo alohanao» (Mal 3.1).
  '28':
  - type: text
    content: 'Lazaiko aminareo: Tsy misy lehibe noho i Jaona amin’izay nateraky ny vehivavy; nefa ny kely indrindra amin’ny fanjakan’Andriamanitra dia lehibe noho izy.'
  '29':
  - type: text
    content: 'Ary ny vahoaka rehetra sy ny mpamory hetra raha nandre dia nanamarina an’Andriamanitra satria natao batisa tamin’ny batisan’i Jaona izy ireny. '
  '3':
  - type: text
    content: 'Koa raha nahare ny amin’i Jesosy ilay kapiteny dia naniraka loholon’ny '
  - type: text
    content: Jiosy
  - type: text
    content: ' hankeo Aminy mba hangataka Azy ho avy ka hanasitrana ny mpanompony. '
  '30':
  - type: text
    content: 'Fa ny '
  - type: text
    content: Fariseo
  - type: text
    content: ' sy ny mpahay lalàna kosa dia nandà ny fikasan’Andriamanitra satria tsy mba nanatona hataon’i Jaona batisa.'
  '31':
  - type: text
    content: 'Tahaka ny inona ary no hanoharako ny olona amin’ity taranaka ity? Tahaka ny inona moa izy? '
  '32':
  - type: text
    content: 'Tahaka ny ankizy madinika mipetraka eny an-tsena izy, izay mifampiantso hoe:'
  - type: text
    content: Efa nitsoka sodina taminareo izahay nefa tsy nandihy ianareo,
  - type: text
    content: efa nanao hira fisaonana izahay nefa tsy nitomany ianareo.
  '33':
  - type: text
    content: 'Fa tonga i Jaona Mpanao batisa, tsy nihinan-kanina na nisotro divay, dia hoy ianareo: Manana '
  - type: text
    content: demonia
  - type: text
    content: ' izy. '
  '34':
  - type: text
    content: 'Tonga ny '
  - type: text
    content: Zanak’Olona
  - type: text
    content: ' mihinana sy misotro kosa, dia hoy ianareo: Indro, olona fatra-pitia hanina sy mpisotro divay, sakaizan’ny mpamory hetra sy ny mpanota. '
  '35':
  - type: text
    content: Fa ny fahendrena dia hamarinin’ny zanany rehetra.
  - type: heading
    content: Jesosy sy ilay vehivavy mpanota
  - type: heading
    content: Ampit. Mat 26.6-13; Mar 14.3-9; Jao 12.1-8
  '36':
  - type: text
    content: 'Nisy '
  - type: text
    content: Fariseo
  - type: text
    content: ' iray nanasa an’i Jesosy hiara-misakafo aminy; dia niditra tao an-tranon’ilay Fariseo Izy ka nipetraka nisakafo. '
  '37':
  - type: text
    content: 'Ary indro, nisy vehivavy mpanota tao an-tanàna, koa rehefa fantany fa nipetraka nisakafo tao an-tranon’ilay Fariseo Jesosy dia nitondra tavoara alabasitara feno menaka manitra izy; '
  '38':
  - type: text
    content: 'ary nijanona tao aorianany teo anilan’ny tongony izy ka nitomany, dia nahakotsa ny tongony tamin’ny ranomasony sy namaoka azy tamin’ny volon-dohany, dia nanoroka fatratra ny tongony ka nanosotra azy tamin’ny menaka manitra. '
  '39':
  - type: text
    content: 'Nony nahita izany ilay Fariseo nanasa Azy dia niteny anakampo hoe: Raha mpaminany Ity dia ho nahafantatra io vehivavy mikasika Azy io sy ny momba azy; fa mpanota io.'
  '4':
  - type: text
    content: 'Rehefa tonga teo amin’i Jesosy ireo dia nangataka mafy Taminy ka niteny hoe: Mendrika ny hanaovanao izany izy '
  '40':
  - type: text
    content: 'Fa hoy Jesosy taminy: Ry Simona, manan-kolazaina aminao Aho. Dia hoy izy: Mpampianatra ô, lazao ary. '
  '41':
  - type: text
    content: 'Nisy roa lahy nananan’ny mpampindram-bola iray trosa: Ny iray dia nananany '
  - type: text
    content: denaria
  - type: text
    content: ' dimanjato, ary ny iray kosa dia dimampolo. '
  '42':
  - type: text
    content: 'Ary raha tsy nanan-kaloa izy roa lahy dia samy navelany. Koa iza moa amin’ireo no ho tia azy kokoa? '
  '43':
  - type: text
    content: 'Dia namaly i Simona hoe: Heveriko fa ilay namoizany be. Dia hoy Izy taminy: Marina ny hevitrao. '
  '44':
  - type: text
    content: 'Ary nitodika nijery an-dRavehivavy Jesosy ka niteny tamin’i Simona hoe: Hitanao va io vehivavy io? Niditra teto an-tranonao Aho; nefa tsy mba nanome Ahy rano hanasana ny tongotro ianao; fa izy kosa dia nahakotsa ny tongotro tamin’ny ranomasony ary namaoka azy tamin’ny volon-dohany. '
  '45':
  - type: text
    content: 'Tsy mba nanoroka Ahy akory ianao; nefa izy, hatrizay nidirako, dia tsy mbola nitsahatra nanoroka fatratra ny tongotro. '
  '46':
  - type: text
    content: 'Ny lohako dia tsy mba nohosoranao diloilo akory; fa izy kosa dia nanosotra menaka manitra ny tongotro. '
  '47':
  - type: text
    content: 'Koa amin’izany dia lazaiko aminao: Voavela ny helony marobe, fa be fitiavana izy; fa izay voavela tamin’ny kely dia kely fitiavana. '
  '48':
  - type: text
    content: 'Dia hoy Izy tamin-dRavehivavy: Voavela ny helokao.'
  '49':
  - type: text
    content: 'Ary izay niara-nihinana taminy dia niresaka hoe: Iza moa Ity no mba mamela heloka? '
  '5':
  - type: text
    content: 'satria tia ny firenentsika izy sady izy no efa nanorina ny '
  - type: text
    content: sinagoga
  - type: text
    content: ' ho antsika. '
  '50':
  - type: text
    content: 'Ary hoy Izy tamin-dRavehivavy: Ny finoanao efa namonjy anao; mandehana amin’ny fiadanana.'
  '6':
  - type: text
    content: 'Ary nandeha niaraka taminy Jesosy. Rehefa teo akaikin’ny trano Izy dia naniraka namana hitsena Azy ilay kapiteny ka niteny Taminy hoe: Tompoko, aza misahirana Ianao; fa tsy mendrika hidiranao ao ambanin’ny tafon-tranoko aho. '
  '7':
  - type: text
    content: 'Koa na dia ny tenako aza dia nataoko fa tsy mendrika hankeo Aminao; fa mitenena ihany dia ho sitrana ny mpanompolahiko. '
  '8':
  - type: text
    content: 'Fa izaho koa mba lehilahy manana lehibe ihany ary manana miaramila izay feheziko; koa hoy aho amin’ny iray: Mandehana! Dia mandeha izy, ary amin’ny iray koa: Avia! Dia avy izy, ary amin’ny mpanompoko: Ataovy izao! Dia manatanteraka izy. '
  '9':
  - type: text
    content: 'Nony nahare izany Jesosy dia gaga taminy; ary nitodika Izy ka niteny tamin’ny vahoaka izay nanaraka Azy hoe: Lazaiko aminareo fa tsy mbola nahita finoana lehibe toy izany Aho na dia teo amin’ny Israely aza. '
