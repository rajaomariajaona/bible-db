document_id: MRK.12,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fanoharana ny amin’ireo mpiasa tao amin’ny tanim-boaloboka
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mat 21.33-46; Lio 20.9-19
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ary nanomboka niteny tamin’ireo tamin’ny alalan’ny fanoharana Izy hoe: Nisy lehilahy iray nanao tanim-boaloboka ka namefy azy manodidina sy nihady lavaka famiazana ary nanorina trano fiambenana, dia nahofany tamin’olona mpiasa tany izany ka lasa nankany an-tany hafa izy. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ary mbola tsy novakinareo va izao Soratra Masina izao:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Ny vato izay nolavin’ny mpanao trano,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia izany no efa natao fehizoro;
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: avy tamin’ny TOMPO izao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka mahagaga eo imasontsika?» (Sal 118.22-23)
  '12':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Ary nitady hisambotra Azy izy ireo, nefa natahotra ny vahoaka satria fantany fa mahakasika azy ireo ny nilazan’i Jesosy ilay fanoharana. Dia nandao an’i Jesosy ny olona ka lasa nandeha.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny hetra ho an’i Kaisara
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mat 22.15-22; Lio 20.20-26
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ary nisy nandefa iraka hankeo amin’i Jesosy ny sasany tamin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Fariseo
    - type: text
      text: ' sy ny Herodiana mba hamandrika Azy amin’ny teniny. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Rehefa tonga ireo dia niteny Taminy hoe: Mpampianatra ô, fantatray fa marina Ianao ka tsy mampiova Anao ny hevitry ny olona ary tsy mba mizaha tavan’olona Ianao fa mampianatra marina ny lalànan’Andriamanitra. Mety va ny mandoa vola hetra ho an’i Kaisara sa tsia? Hanome va izahay sa tsy hanome?'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Fa Izy nahalala ny fihatsarambelatsihin’ireo ka hoy Izy taminy: Nahoana no maka fanahy Ahy ianareo? Itondray '
    - type: usfm
      marker: w
      children:
      - type: text
        text: denaria
    - type: text
      text: ' iray Aho mba hojereko. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Dia nitondran’izy ireo Izy. Ary hoy Izy taminy: An’iza io sary sy soratra io? Dia hoy ireo Taminy: An’i Kaisara. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Dia hoy Jesosy taminy: Aloavy ho an’i Kaisara izay an’i Kaisara ary ho an’Andriamanitra izay an’Andriamanitra. Dia gaga Taminy izy ireo.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fanontaniana ny amin’ny fitsanganana amin’ny maty
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mat 22.23-33; Lio 20.27-38
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Ary nisy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Sadoseo
    - type: text
      text: ' tonga teo Aminy izay milaza fa tsy misy ny fitsanganana amin’ny maty ka nanontany Azy hoe: '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Mpampianatra ô, i Mosesy dia nanoratra ho antsika hoe: «Raha misy manan-drahalahy maty momba, kanefa mbola velona ny vadiny, dia aoka ny rahalahiny hampakatra an-dRavehivavy ka hiteraka aminy mba hamelo-maso ny rahalahiny» (Deo 25.5). '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Rehefa tonga ny fotoanan’ny vokatra dia naniraka mpanompo iray izy hankany amin’ireo mpiasa tany mba handray ampahany amin’ny vokatry ny tanim-boaloboka. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Nisy fito mirahalahy. Nampaka-bady ny zokiny dia maty momba. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Nampakatra an-dRavehivavy ny faharoa dia maty momba koa. Ny fahatelo dia toy izany ihany koa. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Ary izy fito mirahalahy dia samy maty momba avokoa. Ary faran’izy rehetra dia maty koa Ravehivavy. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Koa amin’ny fitsanganan’ny maty, iza amin’izy ireo moa no ho vadin-dRavehivavy? Satria efa samy nanambady azy avokoa izy fito mirahalahy.
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Fa hoy Jesosy taminy: Tsy izao tsy fahafantaranareo ny Soratra Masina sy ny herin’Andriamanitra izao va no mahadiso lalana anareo? '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Fa amin’ny fitsanganana amin’ny maty dia tsy hisy hampaka-bady na havoaka hampakarina fa ho tahaka ny anjely any an-danitra izy. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Koa momba ny fitsanganan’ny maty, mbola tsy novakinareo va ny ao amin’ny Bokin’i Mosesy, eo amin’ilay teny milaza ny roimemy, dia ny nanaovan’Andriamanitra taminy hoe: «Izaho no Andriamanitr’i Abrahama sy Andriamanitr’Isaka ary Andriamanitr’i Jakoba» (Eks 3.6)? '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Tsy Andriamanitry ny maty Izy fa an’ny velona. Koa tena diso lalana ianareo.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny didy lehibe indrindra
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mat 22.34-40; ampit. Lio 10.25-28
    marker-yv: yv-h
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Dia nanatona an’i Jesosy ny iray tamin’ireo '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpanoradalàna
    - type: text
      text: ' izay nahare azy ireo niady hevitra ka nahita fa namaly azy tsara Izy, dia nanontany Azy hoe: Ny didy manao ahoana moa no voalohany amin’izy rehetra? '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Hoy ny navalin’i Jesosy: Ny voalohany dia izao: «Mihainoa, ry Israely: Ny TOMPO Andriamanitsika no TOMPO tokana; '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Fa nosamborin’ireo ilay mpanompo sady nokapohiny ary nampialainy maina. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'koa tiava ny TOMPO Andriamanitrao amin’ny fonao manontolo, amin’ny fanahinao manontolo, amin’ny sainao manontolo ary amin’ny herinao rehetra» (Deo 6.4, 5). '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Ary ny faharoa dia izao: «Tiava ny namanao tahaka ny tenanao» (Lev 19.18). Tsy misy didy hafa lehibe noho ireo.'
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Ary hoy ilay mpanoradalàna taminy: Marina izany, Tompoko; tsara ny nilazanao fa iray ihany Andriamanitra ary tsy misy afa-tsy Izy, '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'ary ny ho tia Azy amin’ny fo manontolo, amin’ny saina manontolo, amin’ny hery rehetra, ary ny ho tia ny namana tahaka ny tena, dia mihoatra lavitra noho ny fanatitra dorana manontolo sy ny fanatitra hafa rehetra. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Rehefa hitan’i Jesosy fa namaly tamim-pahendrena izy dia hoy Izy taminy: Tsy lavitra ny fanjakan’Andriamanitra ianao.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia tsy nisy sahy nanontany Azy intsony.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Kristy sy i Davida
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mat 22.41-46; Lio 20.41-44
    marker-yv: yv-h
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Ary Jesosy, raha nampianatra tao amin’ny tempoly, dia niteny hoe: Ahoana no ilazan’ny mpanoradalàna fa '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ' dia Zanak’i Davida? '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Kanefa ny tenan’i Davida no nampitenenin’ny Fanahy Masina hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '«NY TOMPO nilaza tamin’ny Tompoko hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mipetraha Ianao eo ankavanako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ambara-panaoko ny fahavalonao ho fitoeran-tongotrao» (Sal 110.1).
  '37':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: Ny tenan’i Davida no miantso Azy hoe Tompo; koa ahoana ary no maha Zanany Azy? Ary vahoaka betsaka no nihaino Azy tamin-kafaliana.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny faharatsian’ny mpanoradalàna
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mat 23.1-36; Lio 20.45-47
    marker-yv: yv-h
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Ary hoy Izy tamin’ny fampianarany: Mitandrema ianareo ny amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpanoradalàna
    - type: text
      text: ' izay mazoto mandehandeha manao akanjo lava sy te hoarahabain’ny olona eny an-tsena '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'ary tia ny fipetrahana eny anoloana ao amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sinagoga
    - type: text
      text: ' sy ny fitoerana eny anoloana any amin’ny fanasana '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ary naniraka mpanompo hafa indray izy ho any amin’ireo, fa io koa dia noratrain’ireo ny lohany sady nalany baraka. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: ary mandany ny tranon’ny mpitondratena ka manao vavaka lavareny mba ho fisehoana ivelany. Ireo dia hahazo fanamelohana mafimafy kokoa.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ilay mpitondratena nandatsa-drakitra
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Lio 21.1-4
    marker-yv: yv-h
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'Ary raha nipetraka tandrifin’ny fandatsahan-drakitra Jesosy dia nandinika ny fandatsaky ny vahoaka vola tao Izy. Maro ny mpanankarena nandatsaka be tao. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'Fa nisy mpitondratena mahantra iray kosa tonga teo ka nandatsaka lepta roa na '
    - type: usfm
      marker: w
      children:
      - type: text
        text: kaodiranta
    - type: text
      text: ' iray izany. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'Ary Jesosy niantso ny mpianany hanatona Azy ka niteny taminy hoe: Lazaiko aminareo marina tokoa fa io mpitondratena mahantra io dia nandatsaka be noho izay rehetra nandatsaka tao amin’ny fandatsahan-drakitra; '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: fa ireo rehetra ireo dia tamin’ny haben’ny fananany no nandatsahany tao; fa izy kosa dia tamin’ny tsy fananany no nandatsahany izay rehetra teo am-pelatanany, dia ny fivelomany rehetra.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ary nandefa iraka iray hafa indray koa izy, fa io indray kosa dia novonoiny ho faty; ary mbola maro koa no nirahiny, fa ny sasany nokapohiny ary ny sasany novonoiny ho faty. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ary mbola nanana iray izy, dia ny zanany lahy malalany, koa nony farany dia naniraka azy hankany amin’ireo izy sady niteny hoe: Hanaja ny zanako ireo. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ireo mpiasa tany ireo anefa dia nifampiresaka hoe: Ity no mpandova! Andeha hovonointsika izy dia ho antsika ny lova. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Dia nosamborin’ireo izy ka novonoiny ho faty ary natsipiny teny ivelan’ny tanim-boaloboka. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Koa ahoana ary no hataon’ilay tompon’ny tanim-boaloboka amin’izany? Ho avy izy dia handringana ireo mpiasa tany ka homeny olon-kafa ny tanim-boaloboka. '
