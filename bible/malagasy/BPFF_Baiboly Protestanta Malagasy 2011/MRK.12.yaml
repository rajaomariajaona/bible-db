document_id: MRK.12,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Fanoharana ny amin’ireo mpiasa tao amin’ny tanim-boaloboka
  - type: heading
    content: Mat 21.33-46; Lio 20.9-19
  - type: text
    content: 'Ary nanomboka niteny tamin’ireo tamin’ny alalan’ny fanoharana Izy hoe: Nisy lehilahy iray nanao tanim-boaloboka ka namefy azy manodidina sy nihady lavaka famiazana ary nanorina trano fiambenana, dia nahofany tamin’olona mpiasa tany izany ka lasa nankany an-tany hafa izy. '
  '10':
  - type: text
    content: 'Ary mbola tsy novakinareo va izao Soratra Masina izao:'
  - type: text
    content: «Ny vato izay nolavin’ny mpanao trano,
  - type: text
    content: dia izany no efa natao fehizoro;
  '11':
  - type: text
    content: avy tamin’ny TOMPO izao
  - type: text
    content: ka mahagaga eo imasontsika?» (Sal 118.22-23)
  '12':
  - type: text
    content: Ary nitady hisambotra Azy izy ireo, nefa natahotra ny vahoaka satria fantany fa mahakasika azy ireo ny nilazan’i Jesosy ilay fanoharana. Dia nandao an’i Jesosy ny olona ka lasa nandeha.
  - type: heading
    content: Ny hetra ho an’i Kaisara
  - type: heading
    content: Mat 22.15-22; Lio 20.20-26
  '13':
  - type: text
    content: 'Ary nisy nandefa iraka hankeo amin’i Jesosy ny sasany tamin’ny '
  - type: text
    content: Fariseo
  - type: text
    content: ' sy ny Herodiana mba hamandrika Azy amin’ny teniny. '
  '14':
  - type: text
    content: 'Rehefa tonga ireo dia niteny Taminy hoe: Mpampianatra ô, fantatray fa marina Ianao ka tsy mampiova Anao ny hevitry ny olona ary tsy mba mizaha tavan’olona Ianao fa mampianatra marina ny lalànan’Andriamanitra. Mety va ny mandoa vola hetra ho an’i Kaisara sa tsia? Hanome va izahay sa tsy hanome?'
  '15':
  - type: text
    content: 'Fa Izy nahalala ny fihatsarambelatsihin’ireo ka hoy Izy taminy: Nahoana no maka fanahy Ahy ianareo? Itondray '
  - type: text
    content: denaria
  - type: text
    content: ' iray Aho mba hojereko. '
  '16':
  - type: text
    content: 'Dia nitondran’izy ireo Izy. Ary hoy Izy taminy: An’iza io sary sy soratra io? Dia hoy ireo Taminy: An’i Kaisara. '
  '17':
  - type: text
    content: 'Dia hoy Jesosy taminy: Aloavy ho an’i Kaisara izay an’i Kaisara ary ho an’Andriamanitra izay an’Andriamanitra. Dia gaga Taminy izy ireo.'
  - type: heading
    content: Fanontaniana ny amin’ny fitsanganana amin’ny maty
  - type: heading
    content: Mat 22.23-33; Lio 20.27-38
  '18':
  - type: text
    content: 'Ary nisy '
  - type: text
    content: Sadoseo
  - type: text
    content: ' tonga teo Aminy izay milaza fa tsy misy ny fitsanganana amin’ny maty ka nanontany Azy hoe: '
  '19':
  - type: text
    content: 'Mpampianatra ô, i Mosesy dia nanoratra ho antsika hoe: «Raha misy manan-drahalahy maty momba, kanefa mbola velona ny vadiny, dia aoka ny rahalahiny hampakatra an-dRavehivavy ka hiteraka aminy mba hamelo-maso ny rahalahiny» (Deo 25.5). '
  '2':
  - type: text
    content: 'Rehefa tonga ny fotoanan’ny vokatra dia naniraka mpanompo iray izy hankany amin’ireo mpiasa tany mba handray ampahany amin’ny vokatry ny tanim-boaloboka. '
  '20':
  - type: text
    content: 'Nisy fito mirahalahy. Nampaka-bady ny zokiny dia maty momba. '
  '21':
  - type: text
    content: 'Nampakatra an-dRavehivavy ny faharoa dia maty momba koa. Ny fahatelo dia toy izany ihany koa. '
  '22':
  - type: text
    content: 'Ary izy fito mirahalahy dia samy maty momba avokoa. Ary faran’izy rehetra dia maty koa Ravehivavy. '
  '23':
  - type: text
    content: Koa amin’ny fitsanganan’ny maty, iza amin’izy ireo moa no ho vadin-dRavehivavy? Satria efa samy nanambady azy avokoa izy fito mirahalahy.
  '24':
  - type: text
    content: 'Fa hoy Jesosy taminy: Tsy izao tsy fahafantaranareo ny Soratra Masina sy ny herin’Andriamanitra izao va no mahadiso lalana anareo? '
  '25':
  - type: text
    content: 'Fa amin’ny fitsanganana amin’ny maty dia tsy hisy hampaka-bady na havoaka hampakarina fa ho tahaka ny anjely any an-danitra izy. '
  '26':
  - type: text
    content: 'Koa momba ny fitsanganan’ny maty, mbola tsy novakinareo va ny ao amin’ny Bokin’i Mosesy, eo amin’ilay teny milaza ny roimemy, dia ny nanaovan’Andriamanitra taminy hoe: «Izaho no Andriamanitr’i Abrahama sy Andriamanitr’Isaka ary Andriamanitr’i Jakoba» (Eks 3.6)? '
  '27':
  - type: text
    content: Tsy Andriamanitry ny maty Izy fa an’ny velona. Koa tena diso lalana ianareo.
  - type: heading
    content: Ny didy lehibe indrindra
  - type: heading
    content: Mat 22.34-40; ampit. Lio 10.25-28
  '28':
  - type: text
    content: 'Dia nanatona an’i Jesosy ny iray tamin’ireo '
  - type: text
    content: mpanoradalàna
  - type: text
    content: ' izay nahare azy ireo niady hevitra ka nahita fa namaly azy tsara Izy, dia nanontany Azy hoe: Ny didy manao ahoana moa no voalohany amin’izy rehetra? '
  '29':
  - type: text
    content: 'Hoy ny navalin’i Jesosy: Ny voalohany dia izao: «Mihainoa, ry Israely: Ny TOMPO Andriamanitsika no TOMPO tokana; '
  '3':
  - type: text
    content: 'Fa nosamborin’ireo ilay mpanompo sady nokapohiny ary nampialainy maina. '
  '30':
  - type: text
    content: 'koa tiava ny TOMPO Andriamanitrao amin’ny fonao manontolo, amin’ny fanahinao manontolo, amin’ny sainao manontolo ary amin’ny herinao rehetra» (Deo 6.4, 5). '
  '31':
  - type: text
    content: 'Ary ny faharoa dia izao: «Tiava ny namanao tahaka ny tenanao» (Lev 19.18). Tsy misy didy hafa lehibe noho ireo.'
  '32':
  - type: text
    content: 'Ary hoy ilay mpanoradalàna taminy: Marina izany, Tompoko; tsara ny nilazanao fa iray ihany Andriamanitra ary tsy misy afa-tsy Izy, '
  '33':
  - type: text
    content: 'ary ny ho tia Azy amin’ny fo manontolo, amin’ny saina manontolo, amin’ny hery rehetra, ary ny ho tia ny namana tahaka ny tena, dia mihoatra lavitra noho ny fanatitra dorana manontolo sy ny fanatitra hafa rehetra. '
  '34':
  - type: text
    content: 'Rehefa hitan’i Jesosy fa namaly tamim-pahendrena izy dia hoy Izy taminy: Tsy lavitra ny fanjakan’Andriamanitra ianao.'
  - type: text
    content: Dia tsy nisy sahy nanontany Azy intsony.
  - type: heading
    content: Kristy sy i Davida
  - type: heading
    content: Mat 22.41-46; Lio 20.41-44
  '35':
  - type: text
    content: 'Ary Jesosy, raha nampianatra tao amin’ny tempoly, dia niteny hoe: Ahoana no ilazan’ny mpanoradalàna fa '
  - type: text
    content: Kristy
  - type: text
    content: ' dia Zanak’i Davida? '
  '36':
  - type: text
    content: 'Kanefa ny tenan’i Davida no nampitenenin’ny Fanahy Masina hoe:'
  - type: text
    content: '«NY TOMPO nilaza tamin’ny Tompoko hoe:'
  - type: text
    content: Mipetraha Ianao eo ankavanako
  - type: text
    content: ambara-panaoko ny fahavalonao ho fitoeran-tongotrao» (Sal 110.1).
  '37':
  - type: text
    content: Ny tenan’i Davida no miantso Azy hoe Tompo; koa ahoana ary no maha Zanany Azy? Ary vahoaka betsaka no nihaino Azy tamin-kafaliana.
  - type: heading
    content: Ny faharatsian’ny mpanoradalàna
  - type: heading
    content: Mat 23.1-36; Lio 20.45-47
  '38':
  - type: text
    content: 'Ary hoy Izy tamin’ny fampianarany: Mitandrema ianareo ny amin’ny '
  - type: text
    content: mpanoradalàna
  - type: text
    content: ' izay mazoto mandehandeha manao akanjo lava sy te hoarahabain’ny olona eny an-tsena '
  '39':
  - type: text
    content: 'ary tia ny fipetrahana eny anoloana ao amin’ny '
  - type: text
    content: sinagoga
  - type: text
    content: ' sy ny fitoerana eny anoloana any amin’ny fanasana '
  '4':
  - type: text
    content: 'Ary naniraka mpanompo hafa indray izy ho any amin’ireo, fa io koa dia noratrain’ireo ny lohany sady nalany baraka. '
  '40':
  - type: text
    content: ary mandany ny tranon’ny mpitondratena ka manao vavaka lavareny mba ho fisehoana ivelany. Ireo dia hahazo fanamelohana mafimafy kokoa.
  - type: heading
    content: Ilay mpitondratena nandatsa-drakitra
  - type: heading
    content: Lio 21.1-4
  '41':
  - type: text
    content: 'Ary raha nipetraka tandrifin’ny fandatsahan-drakitra Jesosy dia nandinika ny fandatsaky ny vahoaka vola tao Izy. Maro ny mpanankarena nandatsaka be tao. '
  '42':
  - type: text
    content: 'Fa nisy mpitondratena mahantra iray kosa tonga teo ka nandatsaka lepta roa na '
  - type: text
    content: kaodiranta
  - type: text
    content: ' iray izany. '
  '43':
  - type: text
    content: 'Ary Jesosy niantso ny mpianany hanatona Azy ka niteny taminy hoe: Lazaiko aminareo marina tokoa fa io mpitondratena mahantra io dia nandatsaka be noho izay rehetra nandatsaka tao amin’ny fandatsahan-drakitra; '
  '44':
  - type: text
    content: fa ireo rehetra ireo dia tamin’ny haben’ny fananany no nandatsahany tao; fa izy kosa dia tamin’ny tsy fananany no nandatsahany izay rehetra teo am-pelatanany, dia ny fivelomany rehetra.
  '5':
  - type: text
    content: 'Ary nandefa iraka iray hafa indray koa izy, fa io indray kosa dia novonoiny ho faty; ary mbola maro koa no nirahiny, fa ny sasany nokapohiny ary ny sasany novonoiny ho faty. '
  '6':
  - type: text
    content: 'Ary mbola nanana iray izy, dia ny zanany lahy malalany, koa nony farany dia naniraka azy hankany amin’ireo izy sady niteny hoe: Hanaja ny zanako ireo. '
  '7':
  - type: text
    content: 'Ireo mpiasa tany ireo anefa dia nifampiresaka hoe: Ity no mpandova! Andeha hovonointsika izy dia ho antsika ny lova. '
  '8':
  - type: text
    content: 'Dia nosamborin’ireo izy ka novonoiny ho faty ary natsipiny teny ivelan’ny tanim-boaloboka. '
  '9':
  - type: text
    content: 'Koa ahoana ary no hataon’ilay tompon’ny tanim-boaloboka amin’izany? Ho avy izy dia handringana ireo mpiasa tany ka homeny olon-kafa ny tanim-boaloboka. '
