document_id: PSA.42,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: BOKY FAHAROA
  - type: heading
    content: Tahaka ny diera main’ny hetaheta
  - type: text
    content: Ho an’ny mpiventy hira. Maskila. Nataon’ny Koraìta.
  - type: text
    content: Tahaka ny diera main’ny hetaheta maniry ny rano an’ony
  - type: text
    content: no anirian’ny fanahiko Anao, Andriamanitra ô!
  '10':
  - type: text
    content: Toy ny zavatra mahatorotoro ny taolako no fandatsan’ny fahavaloko ahy
  - type: text
    content: 'amin’ny ilazany amiko isanandro hoe: Aiza izay Andriamanitrao?'
  '11':
  - type: text
    content: Nahoana no mitanondrika ianao, ry fanahiko?
  - type: text
    content: Nahoana no mitoloko ato anatiko ianao?
  - type: text
    content: Manantenà an’Andriamanitra!
  - type: text
    content: Fa mbola hidera Azy ihany aho;
  - type: text
    content: Izy no famonjena ahy sady Andriamanitro.
  '2':
  - type: text
    content: Mangetaheta an’Andriamanitra ny fanahiko, dia Andriamanitra velona;
  - type: text
    content: rahoviana no ho tonga aho ka hiseho eo anatrehan’Andriamanitra?
  '3':
  - type: text
    content: Ny ranomasoko no sakafoko andro aman’alina,
  - type: text
    content: 'amin’ny filazana amiko mandrakariva hoe: Aiza izay Andriamanitrao?'
  '4':
  - type: text
    content: Izao zavatra izao anefa no hotsarovako rehefa mamboraka ny fanahiko ato anatiko aho,
  - type: text
    content: dia ny nandrosoako niaraka tamin’ny olona maro
  - type: text
    content: sy ny nitarihako azy ho any amin’ny tranon’Andriamanitra,
  - type: text
    content: tamin’ny feo mihoby sy midera,
  - type: text
    content: dia olona maro izay nitandrina ny andro firavoravoana.
  '5':
  - type: text
    content: Nahoana ianao ry fanahiko no mitanondrika
  - type: text
    content: ka mitoloko ato anatiko?
  - type: text
    content: Manantenà an’Andriamanitra ianao!
  - type: text
    content: Fa mbola hidera Azy ihany aho
  - type: text
    content: noho ny famonjen’ny tavany.
  '6':
  - type: text
    content: Andriamanitro ô, mitanondrika ato anatiko ny fanahiko.
  - type: text
    content: Izany no ahatsiarovako Anao atỳ amin’ny tanin’i Jordana
  - type: text
    content: sy ireo Hermona ary ny tendrombohitra Mizara.
  '7':
  - type: text
    content: Ny lalina dia miantso ny lalina noho ny firohondrohon’ny rian-dranonao;
  - type: text
    content: nanafotra ahy ny onjanao rehetra sy ny alondranonao.
  '8':
  - type: text
    content: Handidy ny famindrampony NY TOMPO nony andro
  - type: text
    content: ary hihira ho Azy aho rehefa alina.
  - type: text
    content: Vavaka amin’Andriamanitra izay mamelona ahy izany.
  '9':
  - type: text
    content: 'Hoy aho amin’Andriamanitra Vatolampiko:'
  - type: text
    content: Nahoana no nanadino ahy Ianao?
  - type: text
    content: Nahoana no mandeha mijoretra aho
  - type: text
    content: noho ny fampahorian’ny fahavaloko?
