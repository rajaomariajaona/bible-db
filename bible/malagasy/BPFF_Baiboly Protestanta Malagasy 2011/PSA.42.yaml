document_id: PSA.42
type_code: plt
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: BOKY FAHAROA
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Tahaka ny diera main’ny hetaheta
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: Ho an’ny mpiventy hira. Maskila. Nataon’ny Koraìta.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Tahaka ny diera main’ny hetaheta maniry ny rano an’ony
- type: usfm
  marker: q1
  children:
  - type: text
    text: no anirian’ny fanahiko Anao, Andriamanitra ô!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Mangetaheta an’Andriamanitra ny fanahiko, dia Andriamanitra velona;
- type: usfm
  marker: q1
  children:
  - type: text
    text: rahoviana no ho tonga aho ka hiseho eo anatrehan’Andriamanitra?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ny ranomasoko no sakafoko andro aman’alina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'amin’ny filazana amiko mandrakariva hoe: Aiza izay Andriamanitrao?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Izao zavatra izao anefa no hotsarovako rehefa mamboraka ny fanahiko ato anatiko aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ny nandrosoako niaraka tamin’ny olona maro
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny nitarihako azy ho any amin’ny tranon’Andriamanitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tamin’ny feo mihoby sy midera,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia olona maro izay nitandrina ny andro firavoravoana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Nahoana ianao ry fanahiko no mitanondrika
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka mitoloko ato anatiko?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Manantenà an’Andriamanitra ianao!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa mbola hidera Azy ihany aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: noho ny famonjen’ny tavany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Andriamanitro ô, mitanondrika ato anatiko ny fanahiko.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izany no ahatsiarovako Anao atỳ amin’ny tanin’i Jordana
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ireo Hermona ary ny tendrombohitra Mizara.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ny lalina dia miantso ny lalina noho ny firohondrohon’ny rian-dranonao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: nanafotra ahy ny onjanao rehetra sy ny alondranonao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Handidy ny famindrampony NY TOMPO nony andro
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hihira ho Azy aho rehefa alina.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vavaka amin’Andriamanitra izay mamelona ahy izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Hoy aho amin’Andriamanitra Vatolampiko:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nahoana no nanadino ahy Ianao?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nahoana no mandeha mijoretra aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: noho ny fampahorian’ny fahavaloko?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Toy ny zavatra mahatorotoro ny taolako no fandatsan’ny fahavaloko ahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'amin’ny ilazany amiko isanandro hoe: Aiza izay Andriamanitrao?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Nahoana no mitanondrika ianao, ry fanahiko?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nahoana no mitoloko ato anatiko ianao?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Manantenà an’Andriamanitra!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa mbola hidera Azy ihany aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izy no famonjena ahy sady Andriamanitro.
