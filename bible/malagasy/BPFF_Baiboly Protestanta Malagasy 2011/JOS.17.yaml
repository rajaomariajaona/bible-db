document_id: JOS.17
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Nahazo zaratany tamin’ny antsapaka koa ny fokon’i Manase, fa izy no lahimatoan’i Josefa, dia i Makira, lahimatoan’i Manase, rain’i Gileada, fa izy no mpanafika ka nahazo an’i Gileada sy i Basana. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Nisy koa ho an’ny taranak’i Manase sisa araka ny fokony, dia ho an’ny taranak’i Abiezera, ny taranak’i Heleka, ny taranak’i Asriela, ny taranak’i Sekema, ny taranak’i Hefera ary ny taranak’i Semida: Ireo no zanakalahin’i Manase, zanak’i Josefa, araka ny fianakaviany avy. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Fa i Zelofada, zanak’i Hefera, zanak’i Gileada, zanak’i Makira, zanak’i Manase, kosa dia tsy mba nanan-janakalahy, fa zanakavavy ihany; ary izao no anaran’ny zanany vavy: I Mahala, i Noa, i Hogla, i Milka ary i Tirza. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dia nanatona teo anatrehan’i Eleazara mpisorona sy i Josoa, zanak’i Nona, ary ny loholona izy ireo ka niteny hoe: NY TOMPO efa nandidy an’i Mosesy hanome anay zaratany eo amin’ny anadahinay. Ary nomeny lova teo amin’ny rahalahin-drainy izy araka ny didin’NY TOMPO. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia nahazo anjara folo i Manase afa-tsy ny tany Gileada sy Basana, izay any andafin’i Jordana, '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: satria ny zanakavavin’i Manase dia niara-nahazo lova tamin’ny zanany lahy; ary ny tany Gileada dia an’ny zanakalahin’i Manase sisa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ny sisintanin’i Manase dia hatrany Asera ka hatrany Mikmeta, tandrifin’i Sekema, dia mandroso mianatsimo, hatrany Jamina, hatrany amin’ny mponina any Eny-Tapoa. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary an’i Manase ny faritr’i Tapoa; fa i Tapoa izay eo amin’ny sisintanin’i Manase kosa dia an’ny taranak’i Efraima. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ny sisintaniny dia nidina hatreo atsimon’ny lohasahan-driakan’i Kana; ireo tanàna teo amin’ny tanànan’i Manase ireo dia an’i Efraima; ary ny sisintanin’i Manase dia teo avaratry ny lohasahan-driaka ka nihatra tamin’ny ranomasina. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ny atsimo dia an’i Efraima, ary ny Avaratra dia an’i Manase, koa ny ranomasina no sisintaniny; ary nipaka tamin’i Asera teo avaratra sy tamin’Isakara teo atsinanana izy. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Nahazo anjara koa i Manase teo amin’Isakara sy teo amin’i Asera, dia Bety-Sana sy ny vohitra miankina aminy, Ibleama mbamin’ny vohitra miankina aminy, ny mponina any Dora mbamin’ny vohitra miankina aminy, ny mponina any Eny-Dora koa mbamin’ny vohitra miankina aminy, ao koa ny mponina any Tanàka mbamin’ny vohitra miankina aminy ary ny mponina any Megido mbamin’ny vohitra miankina aminy, dia amin’ny faritany telo ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Kanefa tsy nahazo ireo tanàna ireo ny taranak’i Manase, fa tian’ny Kananita hitoerana indrindra izany tany izany. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Rehefa nihanahery anefa ny Zanak’Israely dia nampanao fanompoana ny Kananita izy fa tsy nandroaka azy rehetra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Niteny tamin’i Josoa indray ny taranak’i Josefa hoe: Nahoana no lova iray sy anjara iray ihany no nomenao ahy, kanefa efa tonga firenena lehibe aho, fa notahìn’NY TOMPO toy izao mandraka ankehitriny? '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Dia hoy i Josoa taminy: Raha firenena lehibe ary ianao dia miakara any amin’ny ala ka miteveza honenanao any amin’ny tanin’ny Perizita sy ny Refaìta, fa tery loatra aminao ny tany havoanan’i Efraima. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary hoy ny taranak’i Josefa: Tsy ampy ho anay ny havoana; sady manana kalesy vy fitondra miady ny Kananita rehetra izay monina any amin’ny tany lemaka, dia izay any Bety-Sana mbamin’ny vohitra miankina aminy ary izay any amin’ny tany lemaka Jezirela. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Dia hoy i Josoa tamin’ny taranak’i Josefa, dia i Efraima sy i Manase: Firenena lehibe ianao ka mahery indrindra; tsy anjara iray ihany no ho azonao '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: fa ny havoana koa; fa ala izany ka tevezo, dia ho anao manontolo izany. Fa handroaka ny Kananita ianao, na dia manana kalesy vy fitondra miady aza izy ireo sady mahery.
