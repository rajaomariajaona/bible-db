document_id: COL.3,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Koa raha niara-natsangana tamin’i Kristy ianareo dia katsaho ny zavatra any ambony, any amin’ny itoeran’i Kristy, izay mipetraka eo ankavanan’Andriamanitra. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'ary efa notafinareo ny maha olom-baovao izay havaozina ho amin’ny fahalalana tsara araka ny endrik’Izay nahary azy. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Fa amin’izany dia tsy misy Grika sy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jiosy
    - type: text
      text: ', na voafora sy tsy voafora, na Barbariana sy Skitiana, na andevo sy olona afaka, fa '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ' no zavatra rehetra sady amin’ny rehetra.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Koa mitafia famindrampo sy fiantrana, fahamoram-panahy, fanetren-tena, fahalemem-panahy, fahari-po, araka ny maha olom-boafidin’Andriamanitra izay sady masina no malala. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Mifandefera ka mifamelà heloka ianareo raha misy manana alahelo amin’ny sasany; tahaka ny namelan’ny Tompo ny helokareo no aoka mba hamelanareo heloka kosa. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Ary aoka ho ambonin’izany rehetra izany ny fitiavana izay fehin’ny fahatanterahana. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Ary aoka hanapaka ao am-ponareo ny fiadanan’i Kristy, fa ho amin’izany no niantsoana anareo ho tena iray; ary aoka ho feno fisaorana ianareo.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Aoka ny tenin’i Kristy hitoetra betsaka ao aminareo; dia mifampianara ka mifananara amin’ny fahendrena rehetra amin’ny salamo sy ny hira ary ny tononkiram-panahy, mihira amin’ny fahasoavana ao am-ponareo ho an’Andriamanitra. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Ary na inona na inona ataonareo, na amin’ny teny, na amin’ny asa, dia ataovy amin’ny anaran’i Jesosy Tompo izany rehetra izany, koa misaora an’Andriamanitra Ray amin’ny alalany.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fifampitondrana eo amin’ny fianakaviana
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Ianareo vehivavy, maneke ny vadinareo, araka izay mety hatao ao amin’ny Tompo. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Ianareo lehilahy, tiava ny vadinareo ary aza sosotra aminy. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Saino ny zavatra any ambony fa tsy ny zavatra etỳ an-tany. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Ianareo zanaka, maneke ny ray aman-dreninareo amin’ny zavatra rehetra; fa ankasitrahana ao amin’ny Tompo izany. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Ianareo ray, aza mampahasosotra ny zanakareo, fandrao mamoy fo izy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fifampitondrana eo amin’ny mpanompo sy ny tompo
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Ianareo mpanompo, maneke ny tomponareo araka ny nofo amin’ny zavatra rehetra, tsy amin’ny fanompoana eo imaso, tahaka ny mila sitraka amin’olona, fa amin’ny fahatsoram-po sy ny fahatahorana ny Tompo. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Ary na inona na inona ataonareo dia ataovy amin’ny fo, tahaka ny ho an’ny Tompo fa tsy ho an’olona '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'satria fantatrareo fa ny Tompo no handraisanareo ny lova ho valiny; fa manompo an’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ' Tompo ianareo. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Satria izay manao ny tsy marina dia handray araka ny tsy marina nataony fa tsy misy fizahan-tavan’olona.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Fa efa maty ianareo, ary miara-miafina amin’i Kristy ao amin’Andriamanitra ny fiainanareo. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Rehefa hiseho Kristy fiainantsika dia hiara-miseho Aminy amin’ny voninahitra koa ianareo.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny olona taloha sy ny olom-baovao
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Koa vonoy izay momba ny tenanareo etỳ an-tany: Fijangajangana, fahalotoana, firehetam-po, fanirian-dratsy ary fitiavan-karena, izay fanompoan-tsampy. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Izany zavatra izany no mahatonga ny fahatezeran’Andriamanitra amin’ny taranaka tsy mankatò. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Izany koa no nalehanareo fahiny, fony mbola velona taminy ianareo. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Fa ankehitriny kosa dia esory koa ireto rehetra ireto: Fahatezerana, firehetana, lolompo, fitenenan-dratsy, teny mahamenatra aloaky ny vavanareo. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Aza mifandainga ianareo, fa efa narianareo ny maha olona taloha mbamin’ny asany; '
