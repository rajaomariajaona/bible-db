document_id: DEU.3,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Fakàna ny fanjakan’i Oga
  - type: text
    content: 'Dia niverina isika avy eo ka niakatra tamin’ny lalana mankany Basana; ary tonga hiady amintsika tao Edrehy i Oga, mpanjakan’i Basana, mbamin’ny vahoakany rehetra. '
  '10':
  - type: text
    content: 'dia ny tanàna rehetra amin’ny tany lemaka sy i Gileada rehetra ary i Basana rehetra hatrany Saleka sy Edrehy, dia ny tanàna amin’ny fanjakan’i Oga tany Basana. '
  '11':
  - type: text
    content: 'Fa i Oga, mpanjakan’i Basana, irery no sisa velona tamin’ny Refaìta. Indro, farafara vy ny farafarany; tsy ao Raba an’ny taranak’i Amona va izany? Sivy '
  - type: text
    content: hakiho
  - type: text
    content: ' ny halavany ary efatra hakiho ny sakany, refy hakihon’ny lehilahy io noraisina io.'
  '12':
  - type: text
    content: 'Io tany io dia azontsika tamin’izany andro izany; hatrany Aroera izay eo amoron’ny lohasahan-driaka Arnona sy ny antsasaky ny tany havoana any Gileada ary ny tanàna eo, dia nomeko ny Robenita sy ny Gadita. '
  '13':
  - type: text
    content: 'Ary ny sisa tamin’i Gileada sy ny tanin’i Basana rehetra, izay fanjakan’i Oga, dia nomeko ny antsasaky ny fokon’i Manase, dia ny tany Argoba rehetra, dia i Basana rehetra izay atao hoe Tanin’ny Refaìta. '
  '14':
  - type: text
    content: 'I Jaira, zanak’i Manase, no nahazo ny tany Argoba rehetra, hatramin’ny faritanin’ny Gesorita sy ny Makatita; ary ny anaran’izany Basana izany dia nataony hoe Havota-Jaìra, araka ny anarany ihany, mandraka androany. '
  '15':
  - type: text
    content: 'Ary nomeko an’i Makira i Gileada. '
  '16':
  - type: text
    content: 'Ny Robenita sy ny Gadita dia nomeko ny hatrany Gileada ka hatrany amin’ny lohasahan-driaka Arnona, dia ny antsasaky ny lohasaha sy ny sisintany, hatrany amin’ny moron’ny lohasahan-driaka Jaboka izay sisintanin’ny taranak’i Amona, '
  '17':
  - type: text
    content: ary ny tany ngazana koa sy i Jordana ary ny faritany hatrany Kinereta ka hatrany amin’ny ranomasin’ny tany ngazana, dia ny Ranomasintsira, eo an-tsisin’i Pisga, ao atsinanany.
  '18':
  - type: text
    content: 'Nandidy anareo aho tamin’izany andro izany hoe: NY TOMPO Andriamanitrareo efa nanome anareo ity tany ity ho lovanareo. Andeha mita eo alohan’ny Zanak’Israely rahalahinareo ianareo lehilahy mahery rehetra izay samy efa voaomana hiady. '
  '19':
  - type: text
    content: 'Fa ny vadinareo sy ny zanakareo madinika ary ny ombinareo, izay fantatro fa anananareo betsaka, dia hitoetra ao an-tanànanareo izay nomeko anareo, '
  '2':
  - type: text
    content: 'Ary hoy NY TOMPO tamiko: Aza matahotra azy ianao fa efa natolotro eo an-tananao izy mbamin’ny vahoakany rehetra sy ny taniny, ary araka izay nataonao tamin’i Sihona, mpanjakan’ny Amorita, izay nonina tao Hesbona, no hataonao aminy. '
  '20':
  - type: text
    content: mandra-panomen’NY TOMPO fitsaharana ny rahalahinareo tahaka ny anareo ka holovany koa ny tany izay nomen’NY TOMPO Andriamanitrareo azy any andafin’i Jordana; vita izay vao hiverina ianareo, samy ho any amin’ny taniny avy, izay nomeko anareo.
  '21':
  - type: text
    content: 'Dia nandidy an’i Josoa aho tamin’izany andro izany hoe: Ny masonao dia efa nahita izay rehetra nataon’NY TOMPO Andriamanitrareo tamin’ireo mpanjaka roa lahy ireo; dia toy izany no hataon’NY TOMPO amin’ny fanjakana rehetra izay halehanao. '
  '22':
  - type: text
    content: Aza matahotra azy ianareo; fa NY TOMPO Andriamanitrareo no hiady ho anareo.
  - type: heading
    content: Tsy hiditra ao Kanana i Mosesy
  '23':
  - type: text
    content: 'Dia nitaraina tamin’NY TOMPO aho tamin’izany andro izany hoe: '
  '24':
  - type: text
    content: 'Andriamanitra TOMPO ô, Ianao vao naneho tamin’ny mpanomponao ny fahalehibiazanao sy ny tananao mahery; fa aiza no misy andriamanitra, na any an-danitra na atỳ an-tany, izay mahavita tahaka ny asanao sy ny herinao? '
  '25':
  - type: text
    content: 'Mba avelao aho hita ka hahita ny tany soa izay any andafin’i Jordana, dia ilay be tendrombohitra tsara sy i Libanona. '
  '26':
  - type: text
    content: 'Fa tezitra tamiko noho ny aminareo NY TOMPO ka tsy nihaino ahy. Hoy Izy tamiko: Aoka izay fa aza miteny Amiko intsony ny amin’izany zavatra izany ianao. '
  '27':
  - type: text
    content: 'Miakara eo an-tampon’i Pisga ianao, ary atopazy miankandrefana sy mianavaratra ary mianatsimo sy miantsinanana ny masonao, ary aoka hijery ny masonao; fa tsy hita izany Jordana izany ianao; '
  '28':
  - type: text
    content: 'fa mandidia an’i Josoa, dia mampahereza sy mampahatanjaha azy; fa izy no handeha hita eo alohan’ity firenena ity, ary izy no hampandova azy ny tany izay ho hitanao. '
  '29':
  - type: text
    content: Dia nitoetra tany an-dohasaha tandrifin’i Bety-Peora isika.
  '3':
  - type: text
    content: 'Natolotry NY TOMPO Andriamanitsika teo an-tanantsika koa i Oga, mpanjakan’i Basana, sy ny vahoakany rehetra; dia nandresy azy isika mandra-paha tsy nisy niangana azy na dia iray akory aza. '
  '4':
  - type: text
    content: 'Dia azontsika ny tanànany rehetra tamin’izany andro izany ary tsy nisy tanàna izay tsy nalaintsika taminy, dia tanàna enimpolo, ny tany Argoba rehetra, izay fanjakan’i Oga tany Basana. '
  '5':
  - type: text
    content: 'Samy nisy manda avo sy vavahady ary hidiny hahamafy azy avy ireo tanàna rehetra ireo, afa-tsy ny vohitra madinika maromaro. '
  '6':
  - type: text
    content: 'Dia nataontsika ho zavatra voaozona ireny, tahaka izay efa nataontsika tamin’i Sihona, mpanjakan’i Hesbona; naringana ny mponina rehetra isan-tanàna mbamin’ny zaza amam-behivavy. '
  '7':
  - type: text
    content: Ny biby fiompy rehetra sy ny fananana tamin’ireo tanàna ireo dia nataontsika babo ho antsika.
  - type: heading
    content: Fizaràna an’i Gileada
  '8':
  - type: text
    content: 'Tamin’izany andro izany dia nalaintsika tamin’ny mpanjaka roa izay an’ny Amorita ny tany any andafin’i Jordana, hatreo amin’ny lohasahan-driaka Arnona ka hatrany amin’ny tendrombohitra Hermona, '
  '9':
  - type: text
    content: 'izay nantsoin’ny Sidoniana hoe Siriona; nefa ny Amorita kosa dia nilaza azy hoe Senira, '
