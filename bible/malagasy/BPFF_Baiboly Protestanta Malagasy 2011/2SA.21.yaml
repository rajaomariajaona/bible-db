document_id: 2SA.21,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny Gibeonita sy ny taranak’i Saoly
  - type: text
    content: 'Nisy mosary nandritra ny telo taona misesy tamin’ny andron’i Davida, ary nanontany tamin’NY TOMPO i Davida ka hoy NY TOMPO: Avy amin’ny taranak’i Saoly, izay meloka noho ny fandatsahan-dra izao, satria namono ny Gibeonita izy. '
  '10':
  - type: text
    content: 'Ary naka lamba fisaonana i Rizpa, zanakavavin’i Aia; novelariny teo amin’ny vatolampy mba hitoerany hatramin’ny fiandohan’ny taom-pijinjana izany ka ambara-pilatsaky ny orana avy any an-danitra tamin’ny faty. Tsy navelany hipetrahan’ny voromanidina ireo raha antoandro, na ny bibidia raha alina. '
  '11':
  - type: text
    content: 'Ary nambara tamin’i Davida izay nataon’i Rizpa, zanakavavin’i Aia, vady tsindranon’i Saoly. '
  '12':
  - type: text
    content: 'Dia lasa i Davida naka ny taolan’i Saoly sy ny taolan’i Jonatana zanany tany amin’ny mponina tao Jabesy-Gileada, izay nangalatra azy tao an-kalalahana tany Bety-Sana, ilay nanantonan’ny Filistina azy tamin’ny andro namonoan’ny Filistina an’i Saoly tao Gilboa. '
  '13':
  - type: text
    content: 'Dia noentiny niakatra avy tany ny taolan’i Saoly sy ny taolan’i Jonatana zanany ary nangoniny koa ny taolan’ireo voahantona ireo. '
  '14':
  - type: text
    content: Ny taolan’i Saoly sy i Jonatana zanany dia nalevin’ny olona tao amin’ny tanin’ny Benjamina tao Zela, tao amin’ny fasan’i Kisy rainy; notanterahiny avokoa izay rehetra nandidian’ny mpanjaka. Koa rehefa vita izany dia neken’Andriamanitra ny fifonana natao ho an’ny tany.
  - type: heading
    content: Ny ady tamin’ny Filistina
  - type: heading
    content: 1Tan 20.4-8
  '15':
  - type: text
    content: 'Niady indray ny Filistina sy ny Israely; ary nidina i Davida sy ny mpanompony izay nanaraka azy ka niady tamin’ny Filistina. Nahatsiaro reraka i Davida. '
  '16':
  - type: text
    content: 'I Jisby-Benoba izay isan’ny taranaky ny Refaìta, dia nanana lefona varahina milanja telonjato sekela; nitondra fiadiana vaovao izy ka nikasa hahafaty an’i Davida. '
  '17':
  - type: text
    content: 'Namonjy an’i Davida kosa i Abisay, zanak’i Zeroia, ka namely ilay Filistina ary nahafaty azy. Tamin’izay ny olon’i Davida dia nianiana taminy ka niteny hoe: Tsy hiara-mandeha aminay ho amin’ny ady intsony ianao, fandrao hovonoinao ny fahazavan’ny Israely.'
  '18':
  - type: text
    content: Taorianan’izany dia nisy ady tamin’ny Filistina indray tao Goba. Matin’i Sibeka hosatita tao i Safa, izay isan’ny taranaky ny Refaìta.
  '19':
  - type: text
    content: Nisy ady tamin’ny Filistina indray koa tao Goba, ary namono an’i Goliata gatita, izay nanana zaran-defona tahaka ny voditenon’ny mpanenona, i Elanana, zanak’i Jare-Oregima betlehemita.
  '2':
  - type: text
    content: 'Nampiantso ny Gibeonita ny mpanjaka ka niteny taminy. Ny Gibeonita dia tsy mba isan’ny Zanak’Israely, fa sisa tamin’ny Amorita, ary ny Zanak’Israely dia efa nianiana taminy, nefa nitady izay hamelezany azy i Saoly tamin’ny firehetan’ny fitiavany ny Zanak’Israely sy ny '
  - type: text
    content: Joda
  - type: text
    content: .
  '20':
  - type: text
    content: 'Ary nisy ady koa tao Gata. Nisy lehilahy vaventy izay enin-drantsana ka efatra amby roapolo no isan’ny rantsantanany sy ny rantsantongony, ary izy io koa dia teraky ny Refaìta. '
  '21':
  - type: text
    content: 'Nihantsy ny Israely izy ka matin’i Jonatana, zanak’i Simea, rahalahin’i Davida. '
  '22':
  - type: text
    content: Ireo efatra ireo no teraky ny Refaìta tao Gata, samy matin’ny tanan’i Davida sy ny tanan’ny mpanompony avokoa ireo.
  '3':
  - type: text
    content: 'Hoy koa i Davida tamin’ny Gibeonita: Inona no hataoko ho anareo; ary amin’inona no hanaovako fanavotana mba hitsofanareo rano ny lovan’NY TOMPO? '
  '4':
  - type: text
    content: 'Dia hoy ny Gibeonita taminy: Izahay dia tsy mahazo mandray volafotsy na volamena amin’i Saoly na amin’ny taranany, sady tsy mahazo mamono olona amin’ny Israely. Ary hoy izy: Koa inona ary no tianareo hataoko ho anareo? '
  '5':
  - type: text
    content: 'Dia hoy izy ireo tamin’ny mpanjaka: Nisy lehilahy izay nandringana anay sy nikasa hamely anay ho ringana tsy hitoetra amin’ny tanin’ny Israely rehetra, '
  '6':
  - type: text
    content: 'koa avelao hisy fito lahy amin’ny zanany no hatolotra anay hosamatsamahinay ho an’NY TOMPO ao Gibean’i Saoly, ilay voafidin’NY TOMPO. Dia hoy ny mpanjaka: Hatolotro izy ireo. '
  '7':
  - type: text
    content: 'Fa ny mpanjaka dia niaro an’i Mefiboseta, zanak’i Jonatana, zanak’i Saoly, noho ny fianianana tamin’NY TOMPO nataon’i Davida sy i Jonatana, zanak’i Saoly. '
  '8':
  - type: text
    content: 'Ary ny mpanjaka dia naka azy roa lahy zanak’i Rizpa, zanakavavin’i Aia, izay naterany tamin’i Saoly, dia i Armony sy i Mefiboseta, ary ny dimy lahy zanak’i Mikala, zanakavavin’i Saoly, izay naterany tamin’i Adriela, zanak’i Barizilay, ilay meholatita, '
  '9':
  - type: text
    content: dia natolony teo an-tanan’ny Gibeonita ireo ka nosamatsamahin’ireo teo amin’ny havoana teo anatrehan’NY TOMPO; ary niara-maty izy fito lahy, samy novonoiny tamin’ny niandohan’ny fararano, tamin’ny fiandohan’ny taom-pijinjana ny varimbazaha.
