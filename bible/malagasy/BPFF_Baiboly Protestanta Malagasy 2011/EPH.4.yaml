document_id: EPH.4
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Manorina ny tenan’i Kristy ao amin’ny firaisan-tsaina sy ny fifankatiavana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary noho izany izaho, mpifatotra noho ny amin’ny Tompo, dia mangataka anareo mba handeha mendrika ny fiantsoana izay niantsoana anareo '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'amin’ny fanetren-tena rehetra sy ny fahalemem-panahy, amin’ny fahari-po, mifandefitra amin’ny fitiavana, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: mazotoa mitana ny firaisana avy amin’ny Fanahy amin’ny fehim-pihavanana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Iray ny tena ary iray ny Fanahy, dia araka ny niantsoana anareo ho amin’ny fanantenana iray;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: iray ny Tompo, iray ny finoana, iray ny batisa,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: iray Andriamanitra sady Rain’izy rehetra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay ambonin’izy rehetra sy manerana azy rehetra ary ao amin’izy rehetra.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Fa samy nomena ny fahasoavana araka ny refin’ny fanomezan’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' avy isika rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Koa izany no ilazany hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Raha niakatra ho any amin’ny avo Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia nitondra olona maro ho babo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka nanome fanomezana ho an’ny olona» (Sal 68.18).
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary ny amin’ny hoe: Niakatra Izy, inona moa izany, afa-tsy ny nidinany ho any ambanin’ny tany koa? '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Izay nidina, dia Izy koa no Ilay niakatra any ambonin’ny lanitra rehetra mba hamenoany ny zavatra rehetra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Izy no nanome ny sasany ho Apostoly, ny sasany ho mpaminany, ny sasany ho evanjelista, ary ny sasany ho mpiandry sy mpampianatra, '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'mba ho fanomanana ny olona masina, ho amin’ny asan’ny fanompoana, ho amin’ny fampandrosoana ny tenan’i Kristy, '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'mandra-pahatongantsika rehetra ho amin’ny firaisan’ny finoana sy ny fahalalana tsara ny Zanak’Andriamanitra ka ho lehilahy lehibe, araka ny refin’ny halehiben’ny fahafenoan’i Kristy; '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'mba tsy ho zaza intsony isika ka ahilangilana sy ampitambolimbolenin’ny rivotry ny fampianarana samihafa rehetra amin’ny saim-petsy ataon’ny olona sy ny fitaka itondrany ho amin’ny fahadisoana; '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'fa mba hanaraka ny marina amin’ny fitiavana ka hitombo amin’ny zavatra rehetra ho amin’Izay Loha, dia Kristy; '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Izy no irindran’ny tena manontolo sy iraisany tsara, noho ny fifanohanan’ny isan-tonony, araka ny asan’izay rehetra momba azy amin’izay anjara asany avy ka hampandrosoany ny tenany amin’ny fitiavana.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny olona taloha sy ny olom-baovao
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Koa izao no lazaiko sady ambarako marina ao amin’ny Tompo: Ny mba tsy handehananareo intsony tahaka ny fandehan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jentilisa
  - type: text
    text: ' amin’ny fahafoanan’ny sainy; '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'fa efa tonga maizin-tsaina sy olon-ko azy amin’ny fiainan’Andriamanitra ireny noho ny tsy fahalalana izay ao anatiny, noho ny hamafin’ny fony, '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: dia olona tsy mahalala henatra intsony ka nanolo-tena ho amin’ny fijangajangana, hanao izay fahalotoana rehetra amin’ny fitiavam-bola.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Fa ianareo kosa dia tsy mba toy izany no nianaranareo an’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ', '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'raha Izy tokoa no renareo ka tao Aminy no nampianarana anareo, araka ny fahamarinana izay ao amin’i Jesosy, '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'mba hialanareo ny toetra maha olona taloha anareo araka ny fitondrantenanareo fahiny izay mihasimba araka ny filan’ny fitaka; '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'fa mba hohavaozina kosa ianareo amin’ny fanahin’ny sainareo, '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ary mba hotafinareo ny toetra maha olom-baovao izay noforonina araka an’Andriamanitra amin’ny fahitsiana sy ny fahamasinana momba ny fahamarinana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Noho izany dia esory ny lainga ka samia milaza ny marina amin’ny namany avy ianareo rehetra satria samy momba ny tenan’ny namantsika avokoa isika. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Tezera fa aza manota; ary aoka tsy ho tratry ny masoandro milentika ny fahatezeranareo. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Aza manome toerana ho an’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: devoly
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Aoka izay nangalatra tsy hangalatra intsony, fa aleo hikely aina ka hiasa izay tsara amin’ny tanany, mba hisy homeny izay tsy manana. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Aoka tsy haloaky ny vavanareo izay teny maloto, fa izay tsara ho fampandrosoana, araka izay ilaina, mba hahazoan’izay mihaino, fahasoavana. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ary aza mampalahelo ny Fanahy Masin’Andriamanitra izay nanisiana tombo-kase anareo ho amin’ny andro fanavotana. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Esory aminareo ny lolompo rehetra, ny fahavinirana, ny fahatezerana, ny fitabatabana, ny fitenenan-dratsy ary ny faharatsiana rehetra; '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ary aoka samy halemy fanahy amin’ny namany avy ianareo ka hifampiantra sy hifamela heloka, tahaka ny namelan’Andriamanitra ny helokareo ao amin’i Kristy.
