document_id: EZK.16,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Toy ny zaza nariana i Jerosalema
  - type: text
    content: 'Tonga tamiko indray ny tenin’NY TOMPO hoe:'
  '10':
  - type: text
    content: 'Notafiako lamba misoratsoratra koa ianao sy nokiraroako hoditra trozona ary nampisikiniko rongony fotsy madinika sy notafiako lamba landy. '
  '11':
  - type: text
    content: 'Noravahako firavaka koa ianao ka nasiako haba ny tananao ary rojo ny vozonao. '
  '12':
  - type: text
    content: 'Nasiako kavina ny oronao sy ny sofinao ary nasiako satroboninahitra tsara tarehy ny lohanao, '
  '13':
  - type: text
    content: 'dia niravaka volamena sy volafotsy ianao, ary akanjo rongony fotsy madinika sy lamba landy ary lamba misoratsoratra no fitafianao. Koba tsara toto sy tantely ary diloilo no fihinanao. Nitombo hatsaran-tarehy ianao sady nambinina ka tonga miendrika andriana. '
  '14':
  - type: text
    content: 'Dia niely tany amin’ny '
  - type: text
    content: Jentilisa
  - type: text
    content: ' aza ny lazanao noho ny hatsaran-tarehinao, satria tonga tamin’ny fanaperany izany noho ny famirapiratana izay nataoko teo aminao, hoy NY TOMPO Andriamanitra.'
  - type: heading
    content: Toy ny vehivavy janga i Jerosalema
  '15':
  - type: text
    content: 'Kanjo natoky ny hatsaran-tarehinao ianao ka nijangajanga noho ny lazanao ary nanaram-po nijangajanga tamin’ny mpandalo rehetra sady nafoy ho azy izany. '
  '16':
  - type: text
    content: 'Dia nanalanao ny fitafianao ka nanaovanao toerana fanaovana sorona ho anao ary noravahanao lamba misoratsoratra izany sady nijangajanga teo aminy ianao: Ny zavatra toy izany dia tsy tokony hiseho na hisy akory! '
  '17':
  - type: text
    content: 'Nalainao koa ny firavakao tamin’ny volamenako sy ny volafotsiko izay nomeko anao dia nataonao sarin-dehilahy ho anao ka nijangajanganao. '
  '18':
  - type: text
    content: 'Nalainao koa ny fitafianao misoratsoratra ka natafinao ireo; ary ny menako sy ny ditin-kazo manitro dia napetrakao teo anoloany. '
  '19':
  - type: text
    content: Ny haniko izay nomeko anao koa, dia ny koba tsara toto sy ny diloilo ary ny tantely, izay nafahako anao, dia napetrakao teo anoloan’ireo ho hanitra ankasitrahana. Izany tokoa no nitranga, hoy NY TOMPO Andriamanitra.
  '2':
  - type: text
    content: 'Ry '
  - type: text
    content: zanak’olona
  - type: text
    content: ', ampahafantaro an’i Jerosalema ny fahavetavetany '
  '20':
  - type: text
    content: 'Ary noentinao ny zanakao lahy sy ny zanakao vavy izay naterakao ho Ahy, dia novonoinao ho fanatitra ho an’ireo mba hohaniny. Moa zavatra kely va izany fijangajanganao izany? '
  '21':
  - type: text
    content: 'Novonoinao ny zanako fa natolotrao ka nampandehaninao namakivaky ny afo ho an’ireo. '
  '22':
  - type: text
    content: Tamin’ny fahavetavetanao sy ny fijangajanganao rehetra dia tsy nahatsiaro ny andron’ny fahatanoranao ianao, fony ianao nitanjaka sy nihanjahanja sady nihosinkosina teo amin’ny ranao.
  '23':
  - type: text
    content: 'Ary rehefa vitanao izany ratsy rehetra izany, lozanao! lozanao! hoy NY TOMPO Andriamanitra, '
  '24':
  - type: text
    content: 'dia nanao trano fijangajangana ho anao ianao sady nanao toerana fanaovana sorona ho anao teny an-kalalahana rehetra teny. '
  '25':
  - type: text
    content: 'Teny an-tsampanan-dalana rehetra no nanaovanao ny toerana fanaovanao sorona, dia novetavetainao ny hatsaran-tarehinao ka natolotrao ho amin’ny mpandalo rehetra ny tenanao ary nampitomboinao ny fijangajanganao. '
  '26':
  - type: text
    content: 'Nijangajanga tamin’ny zanak’i Ejipta be nofo izay mifanila fonenana ianao; nampitomboinao ny fijangajanganao ka nampahatezitra Ahy. '
  '27':
  - type: text
    content: 'Ary indro, natsotrako taminao ny tanako ka nahenako ny anjara haninao, ary natolotro ho amin’ny sitrapon’izay mankahala anao ianao, dia ny zanakavavin’ny Filistina izay menatra noho ny fahavetavetana fanaonao. '
  '28':
  - type: text
    content: 'Nijangajanga tamin’ny zanak’i Asiria koa ianao noho ny tsy fahafaham-ponao; eny, nijangajanga taminy ianao nefa mbola tsy afa-po ihany. '
  '29':
  - type: text
    content: Ary mbola nampitomboinao ihany ny fijangajanganao hatrany amin’ny tanin’ny mpivaro-mandeha; fa na dia tamin’izany aza dia mbola tsy afa-po ihany ianao.
  '3':
  - type: text
    content: 'ka lazao hoe: Izao no lazain’NY TOMPO Andriamanitra amin’i Jerosalema: Ny tany Kanana no niavianao sy nahaterahanao; Amorita ny rainao ary Hetita ny reninao. '
  '30':
  - type: text
    content: 'Akory ny fahamaimain’ny fonao! hoy NY TOMPO Andriamanitra, tamin’ny nanaovanao ireo rehetra ireo izay fanaon’ny janga lany henatra! '
  '31':
  - type: text
    content: 'Tamin’ny nanaovanao ny trano fijangajanganao teny an-tsampanan-dalana rehetra sy ny nanaovanao ny toerana fanaovanao sorona teny an-kalalahana rehetra dia tsy mba tahaka ny vehivavy janga ianao satria tsy nahoanao akory izay karama maloto. '
  '32':
  - type: text
    content: 'Ny vehivavy mijangajanga dia maka olon-kafa ho solon’ny vadiny! '
  '33':
  - type: text
    content: 'Ny vehivavy janga rehetra dia omena karama maloto; fa ianao kosa dia manome karama ireo mpitia anao rehetra sady manome azy kolikoly hanatonany anao avy any rehetra any mba hijangajangany aminao. '
  '34':
  - type: text
    content: Hafa noho ny an’ny vehivavy sasany mihitsy ny fanaonao tamin’ny fijangajanganao, fa tsy nisy nanaraka anao hijangajanga taminao; eny, satria nanome karama maloto ianao, fa tsy mba nomena, dia izany indrindra no maha hafa anao.
  '35':
  - type: text
    content: 'Koa mihainoa ny tenin’NY TOMPO, ry Ikala janga! '
  '36':
  - type: text
    content: 'Izao no lazain’NY TOMPO Andriamanitra: Noho ny nandanianao vola be sy ny nampisehoana ny fitanjahanao tamin’ny nijangajanganao tamin’ireny mpitia anao ireny sy ny sampinao rehetra, izay fahavetavetanao, ary noho ny ran’ny zanakao izay naterinao ho an’ireo, '
  '37':
  - type: text
    content: 'dia indro, hovoriko ireny mpitia anao rehetra ireny, izay mankamamy anao sy izay tianao rehetra mbamin’ireny rehetra izay halanao koa, eny, hovoriko avy eny rehetra eny ireny mba hamely anao ka hampisehoiko aminy ny fitanjahanao, dia hahita ny fitanjahanao rehetra izy. '
  '38':
  - type: text
    content: 'Dia hotsaraiko ianao araka ny fitsara vehivavy mijangajanga sy izay mandatsa-dra ka halatsako ny ranao noho ny fahatezerana sy ny fahasaro-piaro. '
  '39':
  - type: text
    content: 'Dia hatolotro ho eny an-tanan’ireny ianao ka harodany ny trano fijangajanganao, ary horavany ny toerana fanaovanao sorona; dia hendahany koa ny fitafianao, ary hesoriny ny firavakao soa ka havelany hitanjaka sy hiboridana ianao. '
  '4':
  - type: text
    content: 'Ary ny amin’ny nahaterahanao, dia tsy voatapaka akory ny tadim-poitranao tamin’ny andro nahaterahanao, ary tsy voampandro tamin’ny rano ianao, na voahosotra sira na voahodidina lamban-jaza akory. '
  '40':
  - type: text
    content: 'Dia hitondra vahoaka marobe hiakatra hamely anao koa izy ka hotorahany vato sady hotetitetehiny amin’ny sabany ianao. '
  '41':
  - type: text
    content: 'Hodorany amin’ny afo ny tranonao ka hotanterahiny eo imason’ny vehivavy maro ny famaliana anao. Hatsahatro tsy hijangajanga ianao ka tsy hisy karama maloto intsony. '
  '42':
  - type: text
    content: 'Toy izany no hialako fo aminao ary ho afaka ny fahasaro-piaroko aminao, dia hionona Aho ka tsy ho tezitra intsony. '
  '43':
  - type: text
    content: Noho ny tsy nahatsiarovanao ny andron’ny fahatanoranao fa nirongatra nanohitra Ahy tamin’ireo rehetra ireo ianao, dia indro, ny lalanao ihany no hatsingeriko ho eo an-dohanao, hoy NY TOMPO Andriamanitra. Tsy nanao izany ratsy izany ho fanampin’ny fahavetavetanao rehetra va ianao?
  - type: heading
    content: Ratsy noho ireo tanàna hafa i Jerosalema
  '44':
  - type: text
    content: 'Indro, ny mpanao oha-teny rehetra dia hamely anao amin’izao oha-teny izao hoe: Manahaka ny reniny ihany ny zanany vavy! '
  '45':
  - type: text
    content: 'Ianao dia zanakavavin-dreninao izay mahafoy ny vady aman-janany; ary ianao dia rahavavin’ireo rahavavinao izay nahafoy ny vady aman-janany. Hetita ny reninareo ary Amorita ny rainareo. '
  '46':
  - type: text
    content: 'I Samaria no zokinao vavy, dia izy sy ny zanany vavy izay monina eo ankavianao; ary ny zandrinao vavy izay monina amin’ny ankavananao, dia i Sodoma sy ny zanany vavy. '
  '47':
  - type: text
    content: 'Nefa tsy araka ny lalan’ireo ihany no nalehanao, ary tsy araka ny fahavetavetan’ireo ihany no nataonao; fa ohatra ny zavatra kely loatra izany ka nanao izay ratsy mihoatra noho ireo indray ianao tamin’ny lalanao rehetra. '
  '48':
  - type: text
    content: 'Raha velona koa Aho, hoy NY TOMPO Andriamanitra, na dia i Sodoma rahavavinao sy ny zanany vavy aza dia tsy mba nanao tahaka ny nataonao sy ny zanakao vavy. '
  '49':
  - type: text
    content: 'Indro, izao no helok’i Sodoma rahavavinao: Avonavona sy fahabetsahan-kanina ary fiainana tsy nisy ahiahy no tao aminy sy tao amin’ny zanany vavy fa tsy mba nampahery ny malahelo sy ny mahantra izy. '
  '5':
  - type: text
    content: Tsy nisy maso niantra anao ka nanao izany taminao, na dia iray akory amin’ireo zavatra ireo aza, mba hamindrana fo aminao; fa nariana tany an-tsaha ianao satria natao ho zava-maharikoriko ianao tamin’ny andro nahaterahanao.
  '50':
  - type: text
    content: 'Niavonavona izy ka nanao fahavetavetana teo anatrehako. Nony nahita izany Aho dia nanaisotra azy. '
  '51':
  - type: text
    content: 'Fa i Samaria dia tsy ampy antsasaky ny fahotanao ny nataony; fa ianao dia nampitombo ny fahavetavetanao mihoatra noho izy, ary nampiseho ny rahavavinao ho toa marina indray tamin’ny fahavetavetanao rehetra izay nataonao. '
  '52':
  - type: text
    content: Ianao koa dia aoka hitondra ny henatrao araka ny nitsaranao ny rahavavinao. Noho ny fahotanao izay nahatonga anao ho vetaveta mihoatra noho ireo ka miseho ho toa marina noho ianao izy, eny, menara koa ianao ka mitondrà ny henatrao noho ny nampisehoanao ny rahavavinao ho toa marina.
  '53':
  - type: text
    content: 'Haveriko ho amin’ny toerany teo aloha ireny, dia i Sodoma sy ny zanany vavy, ary i Samaria sy ny zanany vavy, dia haveriko ho amin’ny toeranao teo aloha eo afovoany koa ianao, '
  '54':
  - type: text
    content: 'mba hitondranao ny henatrao sy hangaihaizanao noho izay rehetra nataonao ka ho fampiononana ho azy izany. '
  '55':
  - type: text
    content: 'Ary ny rahavavinao, dia i Sodoma sy ny zanany vavy, dia hiverina amin’ny toerany taloha, ary i Samaria sy ny zanany vavy dia hiverina amin’ny toerany taloha, ary ianao sy ny zanakao vavy dia hiverina amin’ny toeranareo taloha koa. '
  '56':
  - type: text
    content: 'Nefa tsy mbola mba notononin’ny vavanao akory ny nanjo an’i Sodoma rahavavinao tamin’ny andro niavonavonanao, '
  '57':
  - type: text
    content: 'fony tsy mbola niseho ny faharatsianao, toy ny tamin’ilay nandatsa anao ny zanakavavin’i Arama sy izay rehetra manodidina azy, ary ny zanakavavin’ny Filistina, izay namingavinga anao tamin’ny manodidina anao rehetra. '
  '58':
  - type: text
    content: Ianao no hitondra ny faharatsianao sy ny fahavetavetanao, hoy NY TOMPO.
  '59':
  - type: text
    content: 'Fa izao no lazain’NY TOMPO Andriamanitra: Araka ny nataonao ihany no hataoko aminao izay namingavinga ny fianianana ka nivadika ny fanekena. '
  '6':
  - type: text
    content: 'Raha nandalo Aho ka nahita anao nihosinkosina teo amin’ny ranao dia hoy Aho taminao, raha mbola tamin’ny ranao ianao: Ho velona anie ianao! Eny, hoy Aho taminao, raha mbola tamin’ny ranao ianao: Ho velona anie ianao! '
  '60':
  - type: text
    content: 'Nefa hotsarovako ny fanekena nataoko taminao tamin’ny andron’ny fahatanoranao ka hanorina fanekena mandrakizay aminao Aho. '
  '61':
  - type: text
    content: 'Dia hotsarovanao ny lalanao ka ho menatra ianao rehefa mandray ireo rahavavinao, dia ny zokinao sy ny zandrinao ka homeko ho zanakao vavy ireo, na dia tsy mba isan’izay nanaovako fanekena taminao aza. '
  '62':
  - type: text
    content: 'Izaho hanorina ny fanekeko aminao, dia ho fantatrao fa Izaho no TOMPO, '
  '63':
  - type: text
    content: mba hahatsiarovanao sy hangaihaizanao ary tsy hiloa-bava intsony ianao noho ny henatrao, raha mamela ny helokao ny amin’ny nataonao rehetra Aho, hoy NY TOMPO Andriamanitra.
  '7':
  - type: text
    content: 'Efa nataoko alinalina toy ny zavamaniry any an-tsaha ny isanao ka nitombo sy nihalehibe ary tonga tsara tarehy tokoa ianao; naniry nono ianao sady naniry volo nefa mbola nitanjaka sy nihanjahanja ihany. '
  '8':
  - type: text
    content: Ary raha nandalo Aho ka nijery anao dia hitako fa izay no fotoananao, dia ny fotoanan’ny fitiavana. Dia narakotro anao ny ilan’ny lambako ka nosaronako ny fitanjahanao; eny, nianina taminao Aho ka nanao fanekena taminao, hoy NY TOMPO Andriamanitra, dia tonga Ahy ianao.
  '9':
  - type: text
    content: 'Dia nampandroiko rano ianao, eny, nosasako tsara ho afaka tamin’ny ranao, dia nohosorako diloilo. '
