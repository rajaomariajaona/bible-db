document_id: EZK.9
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny amin’ireo lehilahy nirahina hamely an’i Jerosalema
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary niantso tamin’ny feo mahery teo anatrehako NY TOMPO hoe: Manakeke ianareo, ry mpiambina ny tanàna, ka samia mitondra ny fiadiany eny an-tanany avy ho enti-mandringana!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary indreo, nisy lehilahy enina avy teo amin’ny vavahady ambony izay manatrika ny avaratra, samy nitondra ny fiasany fanorotoroana teny an-tanany avy izy; ary ny iray tamin’ireo dia nitafy lamba rongony fotsy sady nisy fitoeran-dranomaintin’ny mpitantsoratra teo amin’ny andilany. Dia niditra izy ireo ka nijoro teo anilan’ny alitara varahina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary ny voninahitry ny Andriamanitry ny Israely dia niakatra ka niala teo amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: kerobima
  - type: text
    text: ' izay nitoerany, ho eo amin’ny tokonam-baravaran’ny Trano, ary Izy dia niantso ilay lehilahy nitafy lamba rongony fotsy izay nisy fitoeran-dranomaintin’ny mpitantsoratra teo amin’ny andilany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary hoy NY TOMPO taminy: Mandehana mamakivaky ny tanàna, dia Jerosalema, ka asio marika'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Heb. marika tav, '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: na ny litera farany amin’ny alfabeta hebreo, izay nanana endrika mitanambokovoko.
    marker-yv: yv-n
  - type: text
    text: ' ny handrin’ny olona izay misento sy mitaraina noho ny fahavetavetana rehetra atao ao aminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary reko Izy niteny tamin’ny sasany hoe: Mandehana manaraka azy ianareo hamakivaky ny tanàna ka mameleza; aoka tsy hamindra fo ny masonareo ary aza ananana antra! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Na lahiantitra na zatovo na virijiny na zaza madinika na vehivavy, dia aringano avokoa; fa izay olona misy ilay marika ihany no aza kasihina; ary atombohy hatreo amin’ny fitoerako masina izany. Dia nanomboka tamin’ny lahiantitra izay teo anoloan’ny Trano ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary hoy Izy tamin’ireo: Lotoy ny Trano ary fenoy faty ny kianja! Mivoaha ianareo! Dia nivoaka izy ireo ka namely ny tao an-tanàna.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary raha mbola namely izy, ary izaho ihany no sisa teo, dia niankohoka aho ka nitaraina hoe: Indrisy! Ry TOMPO Andriamanitra ô! Haringanao va ny sisa rehetra amin’ny Israely amin’izao ampidinanao ny fahatezeranao amin’i Jerosalema izao? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Dia hoy Izy tamiko: Lehibe dia lehibe ny heloky ny taranak’Israely sy ny Joda; feno ran’olona nalatsaka ny tany sady feno fitsarana miangatra ny tanàna satria hoy izy: NY TOMPO efa nahafoy ny tany ary NY TOMPO tsy mahita. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary Izaho kosa dia tsy hiantra ny masoko sady tsy hamindra fo Aho fa hatsingeriko ho eo an-dohany ny lalany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary indro, Ralehilahy, ilay nitafy lamba rongony fotsy sady nisy fitoeran-dranomainty teo amin’ny andilany, dia nitondra teny niverina hoe: Efa vitako izay nandidianao ahy.'
