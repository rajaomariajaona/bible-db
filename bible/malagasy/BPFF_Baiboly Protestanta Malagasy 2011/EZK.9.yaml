document_id: EZK.9,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny amin’ireo lehilahy nirahina hamely an’i Jerosalema
  - type: text
    content: 'Ary niantso tamin’ny feo mahery teo anatrehako NY TOMPO hoe: Manakeke ianareo, ry mpiambina ny tanàna, ka samia mitondra ny fiadiany eny an-tanany avy ho enti-mandringana!'
  '10':
  - type: text
    content: 'Ary Izaho kosa dia tsy hiantra ny masoko sady tsy hamindra fo Aho fa hatsingeriko ho eo an-dohany ny lalany. '
  '11':
  - type: text
    content: 'Ary indro, Ralehilahy, ilay nitafy lamba rongony fotsy sady nisy fitoeran-dranomainty teo amin’ny andilany, dia nitondra teny niverina hoe: Efa vitako izay nandidianao ahy.'
  '2':
  - type: text
    content: 'Ary indreo, nisy lehilahy enina avy teo amin’ny vavahady ambony izay manatrika ny avaratra, samy nitondra ny fiasany fanorotoroana teny an-tanany avy izy; ary ny iray tamin’ireo dia nitafy lamba rongony fotsy sady nisy fitoeran-dranomaintin’ny mpitantsoratra teo amin’ny andilany. Dia niditra izy ireo ka nijoro teo anilan’ny alitara varahina. '
  '3':
  - type: text
    content: 'Ary ny voninahitry ny Andriamanitry ny Israely dia niakatra ka niala teo amin’ny '
  - type: text
    content: kerobima
  - type: text
    content: ' izay nitoerany, ho eo amin’ny tokonam-baravaran’ny Trano, ary Izy dia niantso ilay lehilahy nitafy lamba rongony fotsy izay nisy fitoeran-dranomaintin’ny mpitantsoratra teo amin’ny andilany. '
  '4':
  - type: text
    content: 'Ary hoy NY TOMPO taminy: Mandehana mamakivaky ny tanàna, dia Jerosalema, ka asio marika'
  - type: note
    content: Heb. marika tav, na ny litera farany amin’ny alfabeta hebreo, izay nanana endrika mitanambokovoko.
  - type: text
    content: ' ny handrin’ny olona izay misento sy mitaraina noho ny fahavetavetana rehetra atao ao aminy. '
  '5':
  - type: text
    content: 'Ary reko Izy niteny tamin’ny sasany hoe: Mandehana manaraka azy ianareo hamakivaky ny tanàna ka mameleza; aoka tsy hamindra fo ny masonareo ary aza ananana antra! '
  '6':
  - type: text
    content: 'Na lahiantitra na zatovo na virijiny na zaza madinika na vehivavy, dia aringano avokoa; fa izay olona misy ilay marika ihany no aza kasihina; ary atombohy hatreo amin’ny fitoerako masina izany. Dia nanomboka tamin’ny lahiantitra izay teo anoloan’ny Trano ireo. '
  '7':
  - type: text
    content: 'Ary hoy Izy tamin’ireo: Lotoy ny Trano ary fenoy faty ny kianja! Mivoaha ianareo! Dia nivoaka izy ireo ka namely ny tao an-tanàna.'
  '8':
  - type: text
    content: 'Ary raha mbola namely izy, ary izaho ihany no sisa teo, dia niankohoka aho ka nitaraina hoe: Indrisy! Ry TOMPO Andriamanitra ô! Haringanao va ny sisa rehetra amin’ny Israely amin’izao ampidinanao ny fahatezeranao amin’i Jerosalema izao? '
  '9':
  - type: text
    content: 'Dia hoy Izy tamiko: Lehibe dia lehibe ny heloky ny taranak’Israely sy ny Joda; feno ran’olona nalatsaka ny tany sady feno fitsarana miangatra ny tanàna satria hoy izy: NY TOMPO efa nahafoy ny tany ary NY TOMPO tsy mahita. '
