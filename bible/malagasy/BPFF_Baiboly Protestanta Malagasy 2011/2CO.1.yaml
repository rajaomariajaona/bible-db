document_id: 2CO.1
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fiarahabana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'I Paoly, apostolin’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' Jesosy noho ny sitrapon’Andriamanitra, ary i Timoty rahalahy, no mamangy ny fiangonan’Andriamanitra izay any Korinto mbamin’ny olona masina rehetra manerana an’i Akaia: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ho aminareo anie ny fahasoavana sy ny fiadanana avy amin’Andriamanitra Raintsika sy Jesosy Kristy Tompo.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ampiononina mba hahaizana mampionona
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Isaorana anie Andriamanitra, Rain’i Jesosy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' Tompontsika, Rain’ny famindrampo sady Andriamanitry ny fampiononana rehetra, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'izay mampionona anay amin’ny fahorianay rehetra mba hahaizanay mampionona izay rehetra mitondra fahoriana kosa, amin’ny fampiononana izay ampiononan’Andriamanitra anay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Fa araka ny haben’ny fijalian’i Kristy mihatra aminay no haben’ny fampiononana anay kosa amin’ny alalan’i Kristy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary raha ampahorina izahay dia ho fampiononana sy famonjena anareo izany; ary raha ampiononina izahay dia ho fampiononana anareo izany ka miasa amin’ny fiaretanareo fahoriana mitovy indrindra amin’izay entinay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ary mafy orina tsara ny fanantenanay ny aminareo, satria fantatray fa tahaka ny iombonanareo ny fahoriana no iombonanareo ny fampiononana koa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Fa tsy tianay tsy ho fantatrareo, ry rahalahy, ny amin’ny fahoriana izay nanjo anay tany Azia, fa novesarana indrindra mihoatra noho ny zakanay izahay ka efa saika nafoinay hatramin’ny ainay aza; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'eny, tsy nanampo izay ho velona intsony izahay, mba tsy hitokianay amin’ny tenanay fa amin’Andriamanitra izay manangana ny maty. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary Izy no nahafaka anay tamin’izao fahafatesana lehibe izao, ary mbola hanafaka koa; eny, Izy no antenainay fa mbola hanafaka anay hatrany, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: satria ianareo koa dia miara-miasa ho anay amin’ny fivavahanareo, mba hisaoran’ny maro ny aminay noho ny fahasoavana azonay tamin’ny nataon’ny maro.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nahemotr’i Paoly ny famangiany
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Fa izao no ataonay ho rehareha: Ny fieritreretanay no vavolombelona fa tamin’ny fahatsorana sy ny fahadiovam-po avy amin’Andriamanitra, ary tsy tamin’ny fahendrena ara-nofo, fa tamin’ny fahasoavan’Andriamanitra, no nitondranay tena teo amin’izao tontolo izao, indrindra fa teo aminareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Fa tsy manoratra teny hafa aminareo izahay, afa-tsy izay vakinareo na izay fantatrareo; ary manantena aho fa mbola ho fantatrareo ny farany, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: araka ny efa fantapantatrareo ihany fa reharehanareo izahay, dia tahaka anareo kosa izay reharehanay amin’ny andron’i Jesosy Tompontsika.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary tamin’izany fahatokiana izany dia nikasa hankaty aminareo aloha aho mba hahazoanareo soa fanindroany, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'ary nikasa hankany Makedonia raha avy atỳ aminareo, ary hiverina ho atỳ aminareo indray raha avy any Makedonia, dia mba hovatsinareo ny diako ho any '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jodia
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Koa raha nikasa izany aho, moa nanao kitoatoa va aho? Ary izay zavatra kasaiko, moa kasaiko araka ny nofo va, mba hanaovako eny, eny foana, sy tsia, tsia foana? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Fa raha mahatoky koa Andriamanitra, ny teninay taminareo dia tsy hoe sady eny no tsia; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'fa ny Zanak’Andriamanitra, dia Jesosy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ', izay notorinay teo aminareo, dia izaho sy i Silasy ary i Timoty, dia tsy hoe sady eny no tsia, satria ao Aminy dia eny ihany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Fa na firy na firy ny teny fikasan’Andriamanitra dia ao Aminy ny eny ary amin’ny alalany koa ny Amena, ho voninahitr’Andriamanitra amin’ny ataonay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Fa izay mampitoetra anay sy ianareo ao amin’i Kristy sady nanosotra antsika dia Andriamanitra '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: izay nanisy tombo-kase antsika koa ka nanome ny Fanahy ho santatra ato am-pontsika.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary miantso an’Andriamanitra ho vavolombelona ny amin’ny fanahiko aho, fa ny fialako nenina aminareo ihany no tsy mbola nankanesako tatỳ Korinto. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Kanefa tsy mihambo ho tompon’ny finoanareo izahay fa mpiara-miasa hampandroso ny fifalianareo, satria finoana no mahatafajoro anareo.
