document_id: 2CO.1,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Fiarahabana
  - type: text
    content: 'I Paoly, apostolin’i '
  - type: text
    content: Kristy
  - type: text
    content: ' Jesosy noho ny sitrapon’Andriamanitra, ary i Timoty rahalahy, no mamangy ny fiangonan’Andriamanitra izay any Korinto mbamin’ny olona masina rehetra manerana an’i Akaia: '
  '10':
  - type: text
    content: 'Ary Izy no nahafaka anay tamin’izao fahafatesana lehibe izao, ary mbola hanafaka koa; eny, Izy no antenainay fa mbola hanafaka anay hatrany, '
  '11':
  - type: text
    content: satria ianareo koa dia miara-miasa ho anay amin’ny fivavahanareo, mba hisaoran’ny maro ny aminay noho ny fahasoavana azonay tamin’ny nataon’ny maro.
  - type: heading
    content: Nahemotr’i Paoly ny famangiany
  '12':
  - type: text
    content: 'Fa izao no ataonay ho rehareha: Ny fieritreretanay no vavolombelona fa tamin’ny fahatsorana sy ny fahadiovam-po avy amin’Andriamanitra, ary tsy tamin’ny fahendrena ara-nofo, fa tamin’ny fahasoavan’Andriamanitra, no nitondranay tena teo amin’izao tontolo izao, indrindra fa teo aminareo. '
  '13':
  - type: text
    content: 'Fa tsy manoratra teny hafa aminareo izahay, afa-tsy izay vakinareo na izay fantatrareo; ary manantena aho fa mbola ho fantatrareo ny farany, '
  '14':
  - type: text
    content: araka ny efa fantapantatrareo ihany fa reharehanareo izahay, dia tahaka anareo kosa izay reharehanay amin’ny andron’i Jesosy Tompontsika.
  '15':
  - type: text
    content: 'Ary tamin’izany fahatokiana izany dia nikasa hankaty aminareo aloha aho mba hahazoanareo soa fanindroany, '
  '16':
  - type: text
    content: 'ary nikasa hankany Makedonia raha avy atỳ aminareo, ary hiverina ho atỳ aminareo indray raha avy any Makedonia, dia mba hovatsinareo ny diako ho any '
  - type: text
    content: Jodia
  - type: text
    content: '. '
  '17':
  - type: text
    content: 'Koa raha nikasa izany aho, moa nanao kitoatoa va aho? Ary izay zavatra kasaiko, moa kasaiko araka ny nofo va, mba hanaovako eny, eny foana, sy tsia, tsia foana? '
  '18':
  - type: text
    content: 'Fa raha mahatoky koa Andriamanitra, ny teninay taminareo dia tsy hoe sady eny no tsia; '
  '19':
  - type: text
    content: 'fa ny Zanak’Andriamanitra, dia Jesosy '
  - type: text
    content: Kristy
  - type: text
    content: ', izay notorinay teo aminareo, dia izaho sy i Silasy ary i Timoty, dia tsy hoe sady eny no tsia, satria ao Aminy dia eny ihany. '
  '2':
  - type: text
    content: Ho aminareo anie ny fahasoavana sy ny fiadanana avy amin’Andriamanitra Raintsika sy Jesosy Kristy Tompo.
  - type: heading
    content: Ampiononina mba hahaizana mampionona
  '20':
  - type: text
    content: 'Fa na firy na firy ny teny fikasan’Andriamanitra dia ao Aminy ny eny ary amin’ny alalany koa ny Amena, ho voninahitr’Andriamanitra amin’ny ataonay. '
  '21':
  - type: text
    content: 'Fa izay mampitoetra anay sy ianareo ao amin’i Kristy sady nanosotra antsika dia Andriamanitra '
  '22':
  - type: text
    content: izay nanisy tombo-kase antsika koa ka nanome ny Fanahy ho santatra ato am-pontsika.
  '23':
  - type: text
    content: 'Ary miantso an’Andriamanitra ho vavolombelona ny amin’ny fanahiko aho, fa ny fialako nenina aminareo ihany no tsy mbola nankanesako tatỳ Korinto. '
  '24':
  - type: text
    content: Kanefa tsy mihambo ho tompon’ny finoanareo izahay fa mpiara-miasa hampandroso ny fifalianareo, satria finoana no mahatafajoro anareo.
  '3':
  - type: text
    content: 'Isaorana anie Andriamanitra, Rain’i Jesosy '
  - type: text
    content: Kristy
  - type: text
    content: ' Tompontsika, Rain’ny famindrampo sady Andriamanitry ny fampiononana rehetra, '
  '4':
  - type: text
    content: 'izay mampionona anay amin’ny fahorianay rehetra mba hahaizanay mampionona izay rehetra mitondra fahoriana kosa, amin’ny fampiononana izay ampiononan’Andriamanitra anay. '
  '5':
  - type: text
    content: 'Fa araka ny haben’ny fijalian’i Kristy mihatra aminay no haben’ny fampiononana anay kosa amin’ny alalan’i Kristy. '
  '6':
  - type: text
    content: 'Ary raha ampahorina izahay dia ho fampiononana sy famonjena anareo izany; ary raha ampiononina izahay dia ho fampiononana anareo izany ka miasa amin’ny fiaretanareo fahoriana mitovy indrindra amin’izay entinay. '
  '7':
  - type: text
    content: Ary mafy orina tsara ny fanantenanay ny aminareo, satria fantatray fa tahaka ny iombonanareo ny fahoriana no iombonanareo ny fampiononana koa.
  '8':
  - type: text
    content: 'Fa tsy tianay tsy ho fantatrareo, ry rahalahy, ny amin’ny fahoriana izay nanjo anay tany Azia, fa novesarana indrindra mihoatra noho ny zakanay izahay ka efa saika nafoinay hatramin’ny ainay aza; '
  '9':
  - type: text
    content: 'eny, tsy nanampo izay ho velona intsony izahay, mba tsy hitokianay amin’ny tenanay fa amin’Andriamanitra izay manangana ny maty. '
