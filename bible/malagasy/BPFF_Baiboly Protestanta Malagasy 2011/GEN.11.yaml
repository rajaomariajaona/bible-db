document_id: GEN.11,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ilay tilikambo tao Babela
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ny tany manontolo dia nampiasa fiteny tokana sy voambolana mitovy. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ireto no taranak’i Sema: Zato taona i Sema raha niteraka an’i Arpaksada, roa taona taorianan’ny safodrano. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Ny andro niainan’i Sema taorianan’ny niterahany an’i Arpaksada dia dimanjato taona; niteraka zazalahy sy zazavavy izy.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Dimy amby telopolo taona i Arpaksada raha niteraka an’i Sela. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Ny andro niainan’i Arpaksada taorianan’ny niterahany an’i Sela dia telo sy efajato taona; niteraka zazalahy sy zazavavy izy.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Telopolo taona i Sela raha niteraka an’i Ebera. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Ny andro niainan’i Sela taorianan’ny niterahany an’i Ebera dia telo sy efajato taona; niteraka zazalahy sy zazavavy izy.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Efatra amby telopolo taona i Ebera raha niteraka an’i Pelega. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Ny andro niainan’i Ebera taorianan’ny niterahany an’i Pelega dia telopolo sy efajato taona; niteraka zazalahy sy zazavavy izy.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Telopolo taona i Pelega raha niteraka an’i Reo. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Ny andro niainan’i Pelega taorianan’ny niterahany an’i Reo dia sivy sy roanjato taona; niteraka zazalahy sy zazavavy izy.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Ary raha niainga avy any atsinanana ny olona dia nahita lohasaha tany amin’ny tany Sinara ka nonina tao. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Roa amby telopolo taona i Reo raha niteraka an’i Seroga. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Ny andro niainan’i Reo taorianan’ny niterahany an’i Seroga dia fito sy roanjato taona; niteraka zazalahy sy zazavavy izy.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Telopolo taona i Seroga raha niteraka an’i Nahora. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Ny andro niainan’i Seroga taorianan’ny niterahany an’i Nahora dia roanjato taona; niteraka zazalahy sy zazavavy izy.
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Sivy amby roapolo taona i Nahora raha niteraka an’i Tera. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Ny andro niainan’i Nahora taorianan’ny niterahany an’i Tera dia sivy amby folo amby zato taona; niteraka zazalahy sy zazavavy izy.
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Fitopolo taona i Tera raha niteraka an’i Abrama sy i Nahora ary i Harana.
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Ary izao no taranak’i Tera: I Tera dia niteraka an’i Abrama sy i Nahora ary i Harana. I Harana dia niteraka an’i Lota. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Mbola velona i Tera rainy tamin’ny nahafatesan’i Harana tao amin’ny tany nahaterahany, tao Oran’ny Kaldeana. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Samy naka vady i Abrama sy i Nahora; ny anaran’ny vadin’i Abrama dia Saray, ary ny anaran’ny vadin’i Nahora dia Milka, zanakavavin’i Harana, rain’i Milka sy rain’Iska. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Dia nifampiresaka izy ireo hoe: Andeha isika hanao biriky dia hodorana tsara. Ary nataony solom-bato ny biriky, ary nataony solon-drihitra ny godorao. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Ary momba i Saray; tsy nanan-janaka izy. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Ary i Tera dia nitondra an’i Abrama zanany sy i Lota zafiny, zanak’i Harana, ary i Saray vinantovaviny, vadin’i Abrama zanany. Niara-niala taminy tao Oran’ny Kaldeana hankany amin’ny tany Kanana ireo. Tonga tao Harana izy ireo ka nonina tao. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Dimy sy roanjato taona ny andro niainan’i Tera raha maty tao Harana izy.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Sady hoy izy: Andeha isika hanorina tanàna sy tilikambo ka hahatakatra ny lanitra ny tampony, dia hanao izay hahazoantsika laza mba tsy hielezantsika eny ambonin’ny tany rehetra! '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Dia nidina NY TOMPO hijery ny tanàna sy ny tilikambo izay nataon’ny zanak’olombelona. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ary hoy NY TOMPO: Indro, firenena tokana ny olona, sady iray fiteny izy rehetra, ary ity vao fiandohan’ny hataony. Koa ankehitriny dia tsy misy azo sakanana izay kasainy hatao na inona na inona. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Aoka Isika hidina ka eny no hampisavorovoroantsika ny fiteniny mba tsy hifankahalala teny izy ireo. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Avy tao no nampielezan’NY TOMPO azy ireo manerana ny tany manontolo; dia nitsahatra tsy nanorina ilay tanàna intsony izy. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Koa izany no nanaovana ny anarany hoe Babela
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Babela: Fisavorovoroana.'
      marker-yv: yv-n
    - type: text
      text: ' satria tao NY TOMPO no nampisavorovoro ny fitenin’ny tany rehetra, ary avy tao no nampielezan’NY TOMPO ny olona ho eny ambonin’ny tany rehetra.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Tetiarana manomboka amin’i Sema ka hatramin’i Abrama
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 1Tan 1.24-27; Lio 3.34-36
    marker-yv: yv-h
