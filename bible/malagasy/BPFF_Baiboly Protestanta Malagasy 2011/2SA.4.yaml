document_id: 2SA.4
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny namonoan’i Bana sy Rekaba an’Isboseta
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Nony ren’ny zanakalahin’i Saoly fa maty tany Hebrona i Abnera dia niraviravy tanana izy ary raiki-tahotra ny Israely rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary nisy roa lahy, lehiben’ny mpiadin’ny zanakalahin’i Saoly; i Bana no anaran’ny iray ary Rekaba no anaran’ny iray, samy zanak’i Rimona berotita tamin’ny taranak’i Benjamina ireo satria i Berota koa natao ho isan’ny an’i Benjamina; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ary nandositra nankany Gitaima ny Berotita dia nivahiny tany mandraka androany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Nanan-janakalahy malemy tongotra i Jonatana, zanak’i Saoly. Dimy taona izy fony tonga avy tany Jezirela ny filazana ny nahafatesan’i Saoly sy i Jonatana; ary noentin’ny mpitaiza azy nandositra izy; ary raha noentiny nandositra tamin’ny fahatairana izy dia nianjera ka tonga malemy tongotra; i Mefiboseta no anarany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary nandeha i Rekaba sy i Bana, zanak’i Rimona berotita; koa rehefa nafana ny andro dia tonga tao an-tranon’Isboseta izy ireo, tamin’ilay izy nandrinandry tamin’ny antoandro iny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia niditra tao an-trano i Rekaba sy i Bana rahalahiny haka vary ka namely azy tamin’ny kibony dia lasa nandositra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Fa niditra tao an-trano izy roa lahy raha iny nandry teo am-pandrianany tao amin’ny efitrano fandriany iny Isboseta. Dia namely azy izy roa lahy ka nahafaty azy. Notapahiny ny lohany ka noentiny ary nandeha nandritra ny alina namakivaky ny tany ngazana izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Nitondra ny lohan’Isboseta tany amin’i Davida tao Hebrona izy ka niteny tamin’ny mpanjaka hoe: Indro ny lohan’Isboseta, zanak’i Saoly fahavalonao izay nitady ny ainao; fa NY TOMPO efa namaly an’i Saoly sy ny taranany androany noho ny amin’ny mpanjaka tompoko. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary hoy i Davida tamin’i Rekaba sy i Bana rahalahiny, zanak’i Rimona berotita: Raha velona koa NY TOMPO, izay namonjy ahy tamin’ny fahoriana rehetra, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'ilay nanambara tamiko hoe: Indro, maty i Saoly, ka nihevitra ny tenany ho mpitondra teny mahafaly dia nohazoniko ka novonoiko tao Ziklaga mba hanomezako azy ny valin’ny teny mahafaly noentiny! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Koa mainka raha misy olon-dratsy mamono lehilahy marina ao an-tranony, eo am-pandrianany; moa tsy hadiniko eo an-tananareo va ny rany, ary tsy hofongorako tsy ho amin’ny tany intsony va ianareo? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Dia nandidy ny zatovony i Davida hamono azy ireo ka notapahiny ny tanany sy ny tongony dia nahantony teo anilan’ny kamory tao Hebrona. Fa ny lohan’Isboseta kosa dia noentina ka nalevina tao am-pasan’i Abnera tao Hebrona.
