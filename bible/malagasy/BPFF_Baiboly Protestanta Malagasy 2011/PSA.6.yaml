document_id: PSA.6,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Aza ny fahatezeranao no ananaranao ahy
  - type: text
    content: Ho an’ny mpiventy hira. Hampiarahina amin’ny valiha. Al-hasheminit. Salamo nataon’i Davida.
  - type: text
    content: TOMPO ô, aza ny fahatezeranao no ananaranao ahy
  - type: text
    content: ary aza ny fahaviniranao no amaizanao ahy!
  '10':
  - type: text
    content: Ho menatra sy hangovitra be ny fahavaloko rehetra;
  - type: text
    content: hihemotra izy ka ho menatra tampoka.
  '2':
  - type: text
    content: Mamindrà fo amiko, TOMPO ô, fa reraka aho;
  - type: text
    content: sitrano aho, TOMPO ô, fa mangozohozo ny taolako.
  '3':
  - type: text
    content: Mangorohoro loatra ny fanahiko;
  - type: text
    content: ary Ianao TOMPO ô, mandra-pahoviana?
  '4':
  - type: text
    content: Miverena, TOMPO ô, afaho ny fanahiko,
  - type: text
    content: vonjeo aho noho ny famindramponao.
  '5':
  - type: text
    content: Fa tsy misy fahatsiarovana Anao any amin’ny fahafatesana;
  - type: text
    content: 'iza no hidera Anao any amin’ny '
  - type: text
    content: fitoeran’ny maty
  - type: text
    content: '?'
  '6':
  - type: text
    content: Efa sasatry ny misento aho;
  - type: text
    content: isaky ny alina dia vonton’ny tomany ny kidoroko
  - type: text
    content: sady kotsan-dranomaso ny fandrianako.
  '7':
  - type: text
    content: Lanin’alahelo ny masoko;
  - type: text
    content: efa pahina izy noho ny ataon’ny mpampahory ahy rehetra.
  '8':
  - type: text
    content: Mialà amiko, ianareo mpanao ratsy rehetra!
  - type: text
    content: Fa NY TOMPO efa nandre ny feon’ny fitomaniako,
  '9':
  - type: text
    content: NY TOMPO efa nandre ny fangatahako;
  - type: text
    content: NY TOMPO mandray ny vavaka ataoko.
