verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Aza ny fahatezeranao no ananaranao ahy
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: Ho an’ny mpiventy hira. Hampiarahina amin’ny valiha. Al-hasheminit. Salamo nataon’i Davida.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: TOMPO ô, aza ny fahatezeranao no ananaranao ahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary aza ny fahaviniranao no amaizanao ahy!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Ho menatra sy hangovitra be ny fahavaloko rehetra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hihemotra izy ka ho menatra tampoka.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Mamindrà fo amiko, TOMPO ô, fa reraka aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sitrano aho, TOMPO ô, fa mangozohozo ny taolako.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Mangorohoro loatra ny fanahiko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary Ianao TOMPO ô, mandra-pahoviana?
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Miverena, TOMPO ô, afaho ny fanahiko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vonjeo aho noho ny famindramponao.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Fa tsy misy fahatsiarovana Anao any amin’ny fahafatesana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'iza no hidera Anao any amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: fitoeran’ny maty
    - type: text
      text: '?'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Efa sasatry ny misento aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: isaky ny alina dia vonton’ny tomany ny kidoroko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady kotsan-dranomaso ny fandrianako.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Lanin’alahelo ny masoko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: efa pahina izy noho ny ataon’ny mpampahory ahy rehetra.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Mialà amiko, ianareo mpanao ratsy rehetra!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa NY TOMPO efa nandre ny feon’ny fitomaniako,
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: NY TOMPO efa nandre ny fangatahako;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: NY TOMPO mandray ny vavaka ataoko.
