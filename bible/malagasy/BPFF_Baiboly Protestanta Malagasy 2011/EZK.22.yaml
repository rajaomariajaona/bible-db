document_id: EZK.22,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fahavetavetana ataon’i Jerosalema
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tonga tamiko ny tenin’NY TOMPO hoe:'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ao aminao no misy mandry amin’ny rainy; ao aminao no misy misavika izay mararin’ny fadimbolana. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Misy manao fahavetavetana amin’ny vadin’ny namany; misy manao fahavetavetana mandoto ny vinantovaviny; ary misy misavika ny anabaviny, zanakavavin’ny rainy. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ao aminao no misy mandray kolikoly handatsa-dra. Maka zana-bola sy tombony ianao sady manao an-keriny mandroba ny an’ny namanao ka manadino Ahy, hoy NY TOMPO Andriamanitra.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa indro, manjera tanana Aho noho ny harena azonao tamin’ny tsy marina sy ny fandatsahan-dra tao aminao. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hahatoha va ny fonao, na hatanjaka va ny tananao amin’ny andro izay hifanatrehako aminao? Izaho TOMPO no nilaza sady hanatanteraka izany. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Haeliko any amin’ny Jentilisa sy hahahako any amin’ny tany samihafa ianao, ary holevoniko ho afaka aminao mihitsy ny fahalotoanao. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia ho hitan’ny Jentilisa fa ny nataonao ihany no nahaloto anao ka ho fantatrao fa Izaho no TOMPO.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tonga tamiko ny tenin’NY TOMPO hoe:'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ry zanak’olona, ny taranak’Israely dia efa tonga tain-drendrika Amiko; izy rehetra dia varahina, firapotsy, vy ary firaka ao anatin’ny memy; eny, efa tonga taim-bolafotsy izy. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa izao no lazain’NY TOMPO Andriamanitra: Satria ianareo rehetra dia tonga tain-drendrika dia indro, hangoniko ao afovoan’i Jerosalema ianareo. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ry '
    - type: usfm
      marker: w
      children:
      - type: text
        text: zanak’olona
    - type: text
      text: ', moa tsy hitsara va ianao? Tsy hitsara ny tanana mpandatsa-dra va ianao? Ampahafantaro azy ary ny fahavetavetany rehetra!'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Toy ny fanangonana volafotsy, varahina, vy, firaka ary firapotsy ho ao anatin’ny memy ka misy mifofotra azy amin’ny afo ho rendrika, dia toy izany no hanangonako anareo amin’ny fahatezerako sy ny fahavinirako, ary hataoko ao ianareo ka ho voarendrika. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Eny, hangoniko ianareo, dia hifofotra anareo amin’ny afon’ny fahatezerako Aho ka ho voarendrika ao anatiny ianareo. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Toy ny fandrendrika volafotsy ao anatin’ny memy no handrendrehana anareo ao anatiny. Dia ho fantatrareo fa Izaho TOMPO no nampidina ny fahatezerako aminareo.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tonga tamiko ny tenin’NY TOMPO Andriamanitra hoe:'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ry zanak’olona, lazao aminy hoe: Ianao no tany tsy voadio sady tsy nilatsahan’ny ranonorana tamin’ny andron’ny fahatezerana. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Manao tetika fikomiana ny mpaminany ao aminy; tahaka ny liona mierona mamiravira haza izy; mihinana olona izy sady mahalasa ny harena sy ny zava-tsoa ary mahamaro ny mpitondratena ao aminy. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny mpisorona ao aminy dia mandika ny lalànako sy mandoto ny zavatra masina; tsy manavaka ny masina sy ny tsy masina izy, na mampiseho ny tsy fitovian’ny maloto sy ny madio, ary mitampi-maso tsy hijery ny Sabatako izy, ary tsiratsiraina ao aminy Aho. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Toy ny amboadia mamiravira haza ny lehibeny ao aminy ka mandatsa-dra sy mahafaty aina ary mahazo harena amin’ny tsy marina. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny mpaminaniny dia mandalotra azy amin’ny rihitra tsy madity ka mahita zava-poana sy maminany lainga aminy hoe: Izao no lazain’NY TOMPO Andriamanitra! Nefa NY TOMPO tsy niteny tsinona. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny vahoaka dia manao an-keriny sy mandroba ka mampahory ny malahelo sy ny mahantra, ary ny vahiny dia ampahoriny tsy ara-drariny. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lazao hoe: Izao no lazain’NY TOMPO Andriamanitra: Ity dia tanàna mpandatsa-dra ao ampovoany, koa noho izany dia tonga ny fotoanany sady manao sampy mampahaloto azy ao aminy izy! '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nitady olona teo aminy Aho hanao manda sy hijanona eo amin’ny banga eo anatrehako hifona ho an’ny tany mba tsy handravako azy, kanjo tsy nahita. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Koa dia haidiko eo aminy ny fahatezerako; ny afon’ny fahatezerako no handaniako azy. Hatsingeriko ho eo an-dohany ihany ny lalany, hoy NY TOMPO Andriamanitra.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny ra izay nalatsakao no nahameloka anao, ary ny sampy izay nataonao no nampahaloto anao. Nampahafohy ny andronao ianao ka tonga ny fetran’ny taonanao. Koa izany no nanaovako anao ho fandatsan’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jentilisa
    - type: text
      text: ' sy ho fanakoran’ny tany rehetra. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Na ny akaiky anao na ny lavitra anao dia samy hanakora anao voaloto anarana sy be tabataba.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Indreo, ny lehiben’ny Israely ao aminao dia samy mampiasa ny sandriny avy mba handatsa-dra. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ao aminao no anozonana ray aman-dreny; ao aminao no anaovana izay sarotra amin’ny vahiny; ary ao aminao no ampahoriana ny kamboty sy ny mpitondratena. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hamavoinao ny zavatra masina ary lotoinao ny Sabatako. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ao aminao no misy olona mandehandeha manaratsy mba handatsa-dra; ary ao aminao no misy mihinana eny an-tendrombohitra; ao aminao no misy manao fahavetavetana. '
