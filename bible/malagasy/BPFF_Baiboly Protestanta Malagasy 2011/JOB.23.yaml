document_id: JOB.23,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: 'Ny teny navalin’i Joba: Tsy manaiky ny fifandaharana Andriamanitra'
  - type: text
    content: 'Dia namaly i Joba hoe:'
  '10':
  - type: text
    content: Mahalala ny lalana falehako anefa Izy;
  - type: text
    content: raha hozahany toetra aho
  - type: text
    content: dia hivoaka tahaka ny volamena.
  '11':
  - type: text
    content: Ny tongotro dia nifikitra tamin’ny lalany;
  - type: text
    content: eny, ny lalany no nizorako tsara ka tsy nivily aho.
  '12':
  - type: text
    content: Ny didin’ny molony dia tsy mba nialako;
  - type: text
    content: ny tenin’ny vavany dia notandremako mihoatra noho ny faniriako.
  '13':
  - type: text
    content: Nefa tsy miova saina Izy, koa iza no mahasakana Azy?
  - type: text
    content: Fa na inona na inona zavatra iriny dia ataony.
  '14':
  - type: text
    content: Eny, manatanteraka izay voatendry ho ahy Izy
  - type: text
    content: ary zavatra maro toy izany no ao Aminy.
  '15':
  - type: text
    content: Koa izany no mampangovitra ahy eo anatrehany;
  - type: text
    content: raha misaintsaina izany aho dia matahotra Azy.
  '16':
  - type: text
    content: Fa Andriamanitra no mandemy ny foko
  - type: text
    content: ary ny Tsitoha no mampangovitra ahy.
  '17':
  - type: text
    content: Tsy ny fahamaizinana anefa no hampangina ahy
  - type: text
    content: na ny haizim-pito izay manarona ny tavako.
  '2':
  - type: text
    content: Izao dia mbola fikomiana ihany ny fitarainako;
  - type: text
    content: ny tanako dia manampina ny fisentoako.
  '3':
  - type: text
    content: Enga anie ka ho fantatro izay hahitako Azy
  - type: text
    content: ka ho tonga any amin’ny fitoerany aza!
  '4':
  - type: text
    content: Dia ho nandahatra ny teniko eo anatrehany aho
  - type: text
    content: ka nofenoiko ny teny alahatro ny vavako;
  '5':
  - type: text
    content: ary nahalala izay teny havaliny ahy aho
  - type: text
    content: sy namantatra izay holazainy amiko.
  '6':
  - type: text
    content: Amin-kery lehibe va no handaharany teny amiko?
  - type: text
    content: Tsia, fa Izy indrindra no hihaino ahy.
  '7':
  - type: text
    content: Fa amin’izany dia olona marina no hifandahatra Aminy
  - type: text
    content: ka hanan-drariny mandrakizay amin’ny Mpitsara ahy aho.
  '8':
  - type: text
    content: Nefa raha miantsinanana aho, tsy any Izy;
  - type: text
    content: ary raha miankandrefana aho, tsy hitako Izy;
  '9':
  - type: text
    content: mianavaratra any amin’izay iasany aho nefa tsy tazako Izy;
  - type: text
    content: mivily any atsimo Izy nefa tsy hitako.
