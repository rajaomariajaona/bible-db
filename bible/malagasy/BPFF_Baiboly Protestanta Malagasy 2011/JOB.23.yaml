document_id: JOB.23,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Ny teny navalin’i Joba: Tsy manaiky ny fifandaharana Andriamanitra'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia namaly i Joba hoe:'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mahalala ny lalana falehako anefa Izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: raha hozahany toetra aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hivoaka tahaka ny volamena.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny tongotro dia nifikitra tamin’ny lalany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, ny lalany no nizorako tsara ka tsy nivily aho.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny didin’ny molony dia tsy mba nialako;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny tenin’ny vavany dia notandremako mihoatra noho ny faniriako.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nefa tsy miova saina Izy, koa iza no mahasakana Azy?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa na inona na inona zavatra iriny dia ataony.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, manatanteraka izay voatendry ho ahy Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary zavatra maro toy izany no ao Aminy.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa izany no mampangovitra ahy eo anatrehany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: raha misaintsaina izany aho dia matahotra Azy.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa Andriamanitra no mandemy ny foko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny Tsitoha no mampangovitra ahy.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy ny fahamaizinana anefa no hampangina ahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na ny haizim-pito izay manarona ny tavako.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izao dia mbola fikomiana ihany ny fitarainako;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny tanako dia manampina ny fisentoako.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Enga anie ka ho fantatro izay hahitako Azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka ho tonga any amin’ny fitoerany aza!
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ho nandahatra ny teniko eo anatrehany aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka nofenoiko ny teny alahatro ny vavako;
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary nahalala izay teny havaliny ahy aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy namantatra izay holazainy amiko.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Amin-kery lehibe va no handaharany teny amiko?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsia, fa Izy indrindra no hihaino ahy.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa amin’izany dia olona marina no hifandahatra Aminy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hanan-drariny mandrakizay amin’ny Mpitsara ahy aho.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nefa raha miantsinanana aho, tsy any Izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary raha miankandrefana aho, tsy hitako Izy;
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mianavaratra any amin’izay iasany aho nefa tsy tazako Izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mivily any atsimo Izy nefa tsy hitako.
