document_id: JOB.23
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Ny teny navalin’i Joba: Tsy manaiky ny fifandaharana Andriamanitra'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Dia namaly i Joba hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Izao dia mbola fikomiana ihany ny fitarainako;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny tanako dia manampina ny fisentoako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Enga anie ka ho fantatro izay hahitako Azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka ho tonga any amin’ny fitoerany aza!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Dia ho nandahatra ny teniko eo anatrehany aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka nofenoiko ny teny alahatro ny vavako;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ary nahalala izay teny havaliny ahy aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy namantatra izay holazainy amiko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Amin-kery lehibe va no handaharany teny amiko?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsia, fa Izy indrindra no hihaino ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Fa amin’izany dia olona marina no hifandahatra Aminy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hanan-drariny mandrakizay amin’ny Mpitsara ahy aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Nefa raha miantsinanana aho, tsy any Izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary raha miankandrefana aho, tsy hitako Izy;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: mianavaratra any amin’izay iasany aho nefa tsy tazako Izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mivily any atsimo Izy nefa tsy hitako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Mahalala ny lalana falehako anefa Izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: raha hozahany toetra aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hivoaka tahaka ny volamena.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ny tongotro dia nifikitra tamin’ny lalany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, ny lalany no nizorako tsara ka tsy nivily aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ny didin’ny molony dia tsy mba nialako;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny tenin’ny vavany dia notandremako mihoatra noho ny faniriako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Nefa tsy miova saina Izy, koa iza no mahasakana Azy?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa na inona na inona zavatra iriny dia ataony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Eny, manatanteraka izay voatendry ho ahy Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary zavatra maro toy izany no ao Aminy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Koa izany no mampangovitra ahy eo anatrehany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: raha misaintsaina izany aho dia matahotra Azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Fa Andriamanitra no mandemy ny foko
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny Tsitoha no mampangovitra ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Tsy ny fahamaizinana anefa no hampangina ahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: na ny haizim-pito izay manarona ny tavako.
