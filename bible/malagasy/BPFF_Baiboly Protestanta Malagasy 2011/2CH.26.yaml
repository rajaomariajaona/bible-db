document_id: 2CH.26,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nanjakan’i Ozia
  - type: heading
    content: 2Mpa 14.21-22
  - type: text
    content: 'Ary ny vahoakan’ny Joda rehetra dia naka an’i Ozia, izay enina amby folo taona, ka nampanjaka azy handimby an’i Amazia rainy. '
  '10':
  - type: text
    content: 'Nanorina tilikambo tany an-tany efitra koa izy sady nihady lavaka maro ho famorian-drano, fa nanana omby aman’ondry betsaka tany Sefela sy teny an-tanety izy sady nanana mpiasa sy mpamboatra tanim-boaloboka teny an-tendrombohitra ary tany Karmela, fa tia asa tany izy. '
  '11':
  - type: text
    content: 'Nanana miaramila maro, izay nanao antokony vonona hanafika i Ozia, dia araka ny isany izay nandaminan’i Jeiela mpitantsoratra sy i Mahaseia mpifehy azy ka nofehezin’i Hanania, iray tamin’ny mpitarika voatendrin’ny mpanjaka. '
  '12':
  - type: text
    content: 'Eninjato sy roa arivo ny isan’ny lohan’ny fianakaviana rehetra, dia lehilahy mahery avokoa. '
  '13':
  - type: text
    content: 'Ary ny miaramila fehezin’ireo dia dimanjato sy fito arivo sy telo hetsy, izay nahery niady indrindra, ary nanampy ny mpanjaka niady tamin’ny fahavalony ireo. '
  '14':
  - type: text
    content: 'Ary i Ozia dia nanamboatra ampinga, lefona, fiarovan-doha, akanjo fiarovan-tratra, tsipìka ary vaton’antsamotady ho an’ireo miaramila rehetra ireo. '
  '15':
  - type: text
    content: Namorona milina fiadiana lehibe tany Jerosalema koa izy, natao araka ny marika vitan’ny manam-pahaizana manokana izany, ary natao hapetraka eo amin’ny tilikambo sy eo an-tampon’ny manda mba handefasana zana-tsipìka sy vato lehibe. Ary niely lavitra ny lazan’i Ozia; fa nahagaga tokoa ny nanampian’Andriamanitra azy ka tonga mahery izy.
  '16':
  - type: text
    content: 'Nony nahery anefa izy dia niavonavona ny fony ka nanao izay ratsy izy, ary nivadika tamin’NY TOMPO Andriamaniny ka niditra tao amin’ny tempolin’NY TOMPO handoro ditin-kazo manitra teo amin’ny alitara fandoroana ditin-kazo manitra. '
  '17':
  - type: text
    content: 'Fa niditra nanaraka azy kosa i Azaria mpisorona mbamin’ny valopolo lahy amin’ny mpisoron’NY TOMPO, dia lehilahy samy mahery avokoa. '
  '18':
  - type: text
    content: 'Ary nanohitra an’i Ozia mpanjaka ireo ka niteny taminy hoe: Tsy raharahanao, ry Ozia, ny handoro ditin-kazo manitra ho an’NY TOMPO, fa an’ny mpisorona ihany, dia ny taranak’i Arona, izay nohamasinina handoro ditin-kazo manitra. Mialà amin’ny fitoerana masina fa nanao izay mahadiso ianao; ary tsy ho voninahitra ho anao eo anatrehan’NY TOMPO Andriamanitra izany. '
  '19':
  - type: text
    content: 'Dia nisafoaka i Ozia, ary nisy lovia handoroany ditin-kazo manitra teny an-tanany; koa raha mbola nisafoaka tamin’ny mpisorona izy dia nisy habokana nipoitra tamin’ny handriny teo anatrehan’ny mpisorona tao amin’ny tranon’NY TOMPO, teo anilan’ny alitara fandoroana ditin-kazo manitra. '
  '2':
  - type: text
    content: Izy no nanamboatra indray an’i Elota ka nampody azy ho an’ny Joda, rehefa nodimandry any amin’ny razany ny mpanjaka.
  - type: heading
    content: 2Mpa 15.2-3
  '20':
  - type: text
    content: Nitodika nijery azy i Azaria mpisoronabe sy ny mpisorona rehetra, koa indro, boka ny handriny; dia noroahiny hiala teo haingana izy; nefa ny tenany koa dia mba niala teo haingana ihany, satria NY TOMPO no namely azy.
  - type: heading
    content: Ny nifaranan’ny fanjakan’i Ozia
  - type: heading
    content: 2Mpa 15.5-7
  '21':
  - type: text
    content: 'Ary i Ozia mpanjaka dia boka mandra-pahafatiny ka nitoetra teo amin’ny trano mitokana, satria tsy nahazo niditra tao amin’ny tranon’NY TOMPO intsony izy. Dia i Jotama zanany no nanapaka ny tao an-dapa sady nitondra ny vahoaka. '
  '22':
  - type: text
    content: 'Ny tantaran’i Ozia sisa, hatramin’ny voalohany ka hatramin’ny farany, dia efa nosoratan’Isaia mpaminany, zanak’i Amoza. '
  '23':
  - type: text
    content: 'Ary nodimandry any amin’ny razany i Ozia, dia nalevina tao amin’ny razany tao amin’ny saha misy ny toeram-pandevenana ny mpanjaka, satria hoy ny olona: Boka izy. Ary i Jotama zanany no nanjaka nandimby azy.'
  '3':
  - type: text
    content: 'Enina amby folo taona i Ozia raha nanomboka nanjaka, ary roa amby dimampolo taona no nanjakany tany Jerosalema. Ny anaran’ny reniny dia Jekolia, avy any Jerosalema. '
  '4':
  - type: text
    content: Nanao izay mahitsy teo imason’NY TOMPO izy, tahaka izay rehetra nataon’i Amazia rainy.
  - type: heading
    content: Natoky an’Andriamanitra i Ozia, ary avy eo tsy natoky indray
  '5':
  - type: text
    content: 'Nitady an’Andriamanitra izy tamin’ny andron’i Zakaria, izay nahafantatra ny fahatahorana an’Andriamanitra; ary tamin’ny andro nitadiavany NY TOMPO dia nambinin’Andriamanitra izy. '
  '6':
  - type: text
    content: 'Nandeha niady tamin’ny Filistina izy dia nandrava ny mandan’i Gata sy ny mandan’i Jabne ary ny mandan’i Asdoda ary avy eo dia nanangana tanàna tany Asdoda sy tany amin’ny Filistina. '
  '7':
  - type: text
    content: 'Ary Andriamanitra nanampy azy tamin’ny namelezany ny Filistina sy ny Arabo izay nonina tao Gora-Baala ary ny Meonita. '
  '8':
  - type: text
    content: 'Nandoa hetra ho an’i Ozia ny Amonita; dia niely hatrany akaiky an’i Ejipta ny lazany satria tonga mahery indrindra izy. '
  '9':
  - type: text
    content: 'Nanorina tilikambo tany Jerosalema, teo amin’ny vavahady eo an-jorony sy teo amin’ny vavahady mankao amin’ny lohasaha sy teo an-jorony i Ozia ka nanamafy azy. '
