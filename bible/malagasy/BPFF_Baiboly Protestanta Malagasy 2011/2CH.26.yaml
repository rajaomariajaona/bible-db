document_id: 2CH.26
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nanjakan’i Ozia
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 2Mpa 14.21-22
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary ny vahoakan’ny Joda rehetra dia naka an’i Ozia, izay enina amby folo taona, ka nampanjaka azy handimby an’i Amazia rainy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Izy no nanamboatra indray an’i Elota ka nampody azy ho an’ny Joda, rehefa nodimandry any amin’ny razany ny mpanjaka.
- type: usfm
  marker: r
  children:
  - type: text
    text: 2Mpa 15.2-3
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Enina amby folo taona i Ozia raha nanomboka nanjaka, ary roa amby dimampolo taona no nanjakany tany Jerosalema. Ny anaran’ny reniny dia Jekolia, avy any Jerosalema. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Nanao izay mahitsy teo imason’NY TOMPO izy, tahaka izay rehetra nataon’i Amazia rainy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Natoky an’Andriamanitra i Ozia, ary avy eo tsy natoky indray
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Nitady an’Andriamanitra izy tamin’ny andron’i Zakaria, izay nahafantatra ny fahatahorana an’Andriamanitra; ary tamin’ny andro nitadiavany NY TOMPO dia nambinin’Andriamanitra izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Nandeha niady tamin’ny Filistina izy dia nandrava ny mandan’i Gata sy ny mandan’i Jabne ary ny mandan’i Asdoda ary avy eo dia nanangana tanàna tany Asdoda sy tany amin’ny Filistina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary Andriamanitra nanampy azy tamin’ny namelezany ny Filistina sy ny Arabo izay nonina tao Gora-Baala ary ny Meonita. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Nandoa hetra ho an’i Ozia ny Amonita; dia niely hatrany akaiky an’i Ejipta ny lazany satria tonga mahery indrindra izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Nanorina tilikambo tany Jerosalema, teo amin’ny vavahady eo an-jorony sy teo amin’ny vavahady mankao amin’ny lohasaha sy teo an-jorony i Ozia ka nanamafy azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Nanorina tilikambo tany an-tany efitra koa izy sady nihady lavaka maro ho famorian-drano, fa nanana omby aman’ondry betsaka tany Sefela sy teny an-tanety izy sady nanana mpiasa sy mpamboatra tanim-boaloboka teny an-tendrombohitra ary tany Karmela, fa tia asa tany izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Nanana miaramila maro, izay nanao antokony vonona hanafika i Ozia, dia araka ny isany izay nandaminan’i Jeiela mpitantsoratra sy i Mahaseia mpifehy azy ka nofehezin’i Hanania, iray tamin’ny mpitarika voatendrin’ny mpanjaka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Eninjato sy roa arivo ny isan’ny lohan’ny fianakaviana rehetra, dia lehilahy mahery avokoa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary ny miaramila fehezin’ireo dia dimanjato sy fito arivo sy telo hetsy, izay nahery niady indrindra, ary nanampy ny mpanjaka niady tamin’ny fahavalony ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary i Ozia dia nanamboatra ampinga, lefona, fiarovan-doha, akanjo fiarovan-tratra, tsipìka ary vaton’antsamotady ho an’ireo miaramila rehetra ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Namorona milina fiadiana lehibe tany Jerosalema koa izy, natao araka ny marika vitan’ny manam-pahaizana manokana izany, ary natao hapetraka eo amin’ny tilikambo sy eo an-tampon’ny manda mba handefasana zana-tsipìka sy vato lehibe. Ary niely lavitra ny lazan’i Ozia; fa nahagaga tokoa ny nanampian’Andriamanitra azy ka tonga mahery izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Nony nahery anefa izy dia niavonavona ny fony ka nanao izay ratsy izy, ary nivadika tamin’NY TOMPO Andriamaniny ka niditra tao amin’ny tempolin’NY TOMPO handoro ditin-kazo manitra teo amin’ny alitara fandoroana ditin-kazo manitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Fa niditra nanaraka azy kosa i Azaria mpisorona mbamin’ny valopolo lahy amin’ny mpisoron’NY TOMPO, dia lehilahy samy mahery avokoa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary nanohitra an’i Ozia mpanjaka ireo ka niteny taminy hoe: Tsy raharahanao, ry Ozia, ny handoro ditin-kazo manitra ho an’NY TOMPO, fa an’ny mpisorona ihany, dia ny taranak’i Arona, izay nohamasinina handoro ditin-kazo manitra. Mialà amin’ny fitoerana masina fa nanao izay mahadiso ianao; ary tsy ho voninahitra ho anao eo anatrehan’NY TOMPO Andriamanitra izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Dia nisafoaka i Ozia, ary nisy lovia handoroany ditin-kazo manitra teny an-tanany; koa raha mbola nisafoaka tamin’ny mpisorona izy dia nisy habokana nipoitra tamin’ny handriny teo anatrehan’ny mpisorona tao amin’ny tranon’NY TOMPO, teo anilan’ny alitara fandoroana ditin-kazo manitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Nitodika nijery azy i Azaria mpisoronabe sy ny mpisorona rehetra, koa indro, boka ny handriny; dia noroahiny hiala teo haingana izy; nefa ny tenany koa dia mba niala teo haingana ihany, satria NY TOMPO no namely azy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nifaranan’ny fanjakan’i Ozia
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 2Mpa 15.5-7
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary i Ozia mpanjaka dia boka mandra-pahafatiny ka nitoetra teo amin’ny trano mitokana, satria tsy nahazo niditra tao amin’ny tranon’NY TOMPO intsony izy. Dia i Jotama zanany no nanapaka ny tao an-dapa sady nitondra ny vahoaka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ny tantaran’i Ozia sisa, hatramin’ny voalohany ka hatramin’ny farany, dia efa nosoratan’Isaia mpaminany, zanak’i Amoza. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary nodimandry any amin’ny razany i Ozia, dia nalevina tao amin’ny razany tao amin’ny saha misy ny toeram-pandevenana ny mpanjaka, satria hoy ny olona: Boka izy. Ary i Jotama zanany no nanjaka nandimby azy.'
