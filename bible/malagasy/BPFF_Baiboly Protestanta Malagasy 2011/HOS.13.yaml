document_id: HOS.13,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny ho faharavan’ny Israely
  - type: text
    content: Raha niteny i Efraima
  - type: text
    content: dia nampihorohoro
  - type: text
    content: ka nisandratra tao amin’ny Israely izy.
  - type: text
    content: 'Nefa nanota ny amin’ny '
  - type: text
    content: Baala
  - type: text
    content: ' izy'
  - type: text
    content: ka maty.
  '10':
  - type: text
    content: Aiza ary izay mpanjakanao?
  - type: text
    content: Aoka izy hamonjy anao any an-tanànanao rehetra!
  - type: text
    content: 'Ary aiza ireo mpitsaranao izay nilazanao hoe:'
  - type: text
    content: Omeo mpanjaka sy mpanapaka aho?
  '11':
  - type: text
    content: Nomeko mpanjaka tamin’ny fahatezerako ianao,
  - type: text
    content: nefa nesoriko tamin’ny fahavinirako izy.
  '12':
  - type: text
    content: Voafehy ny helok’i Efraima,
  - type: text
    content: voatahiry ny fahotany.
  '13':
  - type: text
    content: Fanaintainana tahaka ny vehivavy raha miteraka no mahazo azy;
  - type: text
    content: zanakalahy tsy hendry izy;
  - type: text
    content: kanefa amin’ny fotoana hahaterahany dia tsy ho tafavoaka avy tao amin’ny kibon’ny reniny izy.
  '14':
  - type: text
    content: 'Hafahako avy tamin’ny '
  - type: text
    content: fitoeran’ny maty
  - type: text
    content: ' izy;'
  - type: text
    content: havotako amin’ny fahafatesana izy;
  - type: text
    content: Ry fahafatesana ô, aiza ny areti-mandringanao?
  - type: text
    content: Ry fitoeran’ny maty ô, aiza ny valanaretinao?
  - type: text
    content: Afenina tsy ho hitan’ny masoko ny indrafo!
  '15':
  - type: text
    content: Na dia hahavokatra eo afovoan’ny rahalahiny aza i Efraima
  - type: text
    content: dia ho avy ny rivotra avy any atsinanana,
  - type: text
    content: dia ny rivotry NY TOMPO miakatra avy any an-tany efitra,
  - type: text
    content: ka ho ritra ny loharanony
  - type: text
    content: ary ho tankina ny fantsakany.
  - type: text
    content: Hobaboina ny harena, dia ny fanaka tsara rehetra.
  '2':
  - type: text
    content: Ankehitriny dia mbola manota ihany izy,
  - type: text
    content: ny volafotsiny no anaovany sarin-javatra voarendrika,
  - type: text
    content: dia sampy araka ny fahaizany,
  - type: text
    content: izay asan’ny mpahay taozavatra avokoa.
  - type: text
    content: Ireny dia lazaina fa
  - type: text
    content: olona no vonoiny hatao fanatitra
  - type: text
    content: ary manoroka ombilahy kely izy.
  '3':
  - type: text
    content: Koa ho toy ny rahona maraina izy,
  - type: text
    content: sy ho toy ny ando izay levona raha vao maraina ny andro
  - type: text
    content: ary ho toy ny akofa izay paohin’ny rivotra hiala amin’ny famoloana
  - type: text
    content: sy ho toy ny setroka avy amin’ny varavarankely.
  '4':
  - type: text
    content: Izaho no TOMPO Andriamanitrao hatrany amin’ny tany Ejipta.
  - type: text
    content: Tsy mahalala Andriamanitra afa-tsy Izaho ianao
  - type: text
    content: sady tsy misy mpamonjy afa-tsy Izaho.
  '5':
  - type: text
    content: Izaho dia nahalala anao tany an-tany efitra,
  - type: text
    content: dia tany amin’ny tany karankaina.
  '6':
  - type: text
    content: Rehefa nahazo ahitra tsara izy dia voky;
  - type: text
    content: eny, voky izy
  - type: text
    content: ka niavonavona ny fony;
  - type: text
    content: koa izany no nanadinoany Ahy.
  '7':
  - type: text
    content: Ho tonga toy ny liona aminy Aho;
  - type: text
    content: eny, toy ny leoparda amoron-dalana
  - type: text
    content: no hijokoako azy;
  '8':
  - type: text
    content: hamely azy toy ny famelin’ny bera very anaka Aho
  - type: text
    content: ka handriatra ny saron’ny fony;
  - type: text
    content: eny, any no handrapahako azy toy ny fandrapaky ny liom-bavy;
  - type: text
    content: ny bibidia no hamiravira azy.
  '9':
  - type: text
    content: Ringana ianao, ry Israely ô,
  - type: text
    content: satria nanohitra Ahy
  - type: text
    content: izay famonjena anao.
