document_id: HOS.13,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny ho faharavan’ny Israely
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Raha niteny i Efraima
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia nampihorohoro
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka nisandratra tao amin’ny Israely izy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Nefa nanota ny amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Baala
    - type: text
      text: ' izy'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka maty.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Aiza ary izay mpanjakanao?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka izy hamonjy anao any an-tanànanao rehetra!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ary aiza ireo mpitsaranao izay nilazanao hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Omeo mpanjaka sy mpanapaka aho?
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Nomeko mpanjaka tamin’ny fahatezerako ianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa nesoriko tamin’ny fahavinirako izy.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Voafehy ny helok’i Efraima,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: voatahiry ny fahotany.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Fanaintainana tahaka ny vehivavy raha miteraka no mahazo azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: zanakalahy tsy hendry izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: kanefa amin’ny fotoana hahaterahany dia tsy ho tafavoaka avy tao amin’ny kibon’ny reniny izy.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Hafahako avy tamin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: fitoeran’ny maty
    - type: text
      text: ' izy;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: havotako amin’ny fahafatesana izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ry fahafatesana ô, aiza ny areti-mandringanao?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ry fitoeran’ny maty ô, aiza ny valanaretinao?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Afenina tsy ho hitan’ny masoko ny indrafo!
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Na dia hahavokatra eo afovoan’ny rahalahiny aza i Efraima
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ho avy ny rivotra avy any atsinanana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ny rivotry NY TOMPO miakatra avy any an-tany efitra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka ho ritra ny loharanony
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ho tankina ny fantsakany.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hobaboina ny harena, dia ny fanaka tsara rehetra.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Ankehitriny dia mbola manota ihany izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny volafotsiny no anaovany sarin-javatra voarendrika,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia sampy araka ny fahaizany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay asan’ny mpahay taozavatra avokoa.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ireny dia lazaina fa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: olona no vonoiny hatao fanatitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary manoroka ombilahy kely izy.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Koa ho toy ny rahona maraina izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ho toy ny ando izay levona raha vao maraina ny andro
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ho toy ny akofa izay paohin’ny rivotra hiala amin’ny famoloana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ho toy ny setroka avy amin’ny varavarankely.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Izaho no TOMPO Andriamanitrao hatrany amin’ny tany Ejipta.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy mahalala Andriamanitra afa-tsy Izaho ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady tsy misy mpamonjy afa-tsy Izaho.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Izaho dia nahalala anao tany an-tany efitra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia tany amin’ny tany karankaina.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Rehefa nahazo ahitra tsara izy dia voky;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, voky izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka niavonavona ny fony;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: koa izany no nanadinoany Ahy.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Ho tonga toy ny liona aminy Aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, toy ny leoparda amoron-dalana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no hijokoako azy;
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: hamely azy toy ny famelin’ny bera very anaka Aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka handriatra ny saron’ny fony;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, any no handrapahako azy toy ny fandrapaky ny liom-bavy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny bibidia no hamiravira azy.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Ringana ianao, ry Israely ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria nanohitra Ahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay famonjena anao.
