document_id: SNG.8,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Enga anie ka ho tahaka ny anadahiko izay ninono tamin’Ineny ianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ho nahita anao teny alatrano aho ka ho nanoroka anao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, tsy ho azon’olona noesoesoina aho.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Rindrimbe aho, ary ny nonoko dia toy ny tilikambo.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha eo imasony dia toy ny efa mahita fiadanana aho.
  - type: usfm
    marker: sp
    children:
    - type: text
      text: (Ralehilahy)
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Nanana tanim-boaloboka tao Baala-Hamona i Solomona;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nahofany tamin’ny olona mpiandry voly io tanim-boaloboka io
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka samy tsy maintsy mitondra sekela volafotsy arivo ho solon’ny vokatra ao ny tsirairay.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Ny tanim-boaloboko, eny, ilay an’ny tenako, dia eto anatrehako,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny arivo kosa dia anao ry Solomona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny roanjato dia ho an’izay mpiandry voly.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Ry mitoetra eny an-tsaha!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Te hihaino ny feonao ireo namako;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba ampandreneso izany koa aho.
  - type: usfm
    marker: sp
    children:
    - type: text
      text: (Ravehivavy)
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Mandosira, ry malalako,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary aoka ianao mba ho toy ny gazela na ny diera tanora
  - type: usfm
    marker: q1
    children:
    - type: text
      text: any an-tendrombohitry ny balisama.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Dia hoentiko ka hampidiriko ho ao an-tranon’Ineny ianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ampianaro aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hampisotroiko divay noharoharoan-javamanitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mbamin’ny ranon’ampongabendanitro ianao.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Aoka hanondana ahy ny tanany havia,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary aoka hamihina ahy ny tanany havanana.
  - type: usfm
    marker: sp
    children:
    - type: text
      text: (Olon-kafa?)
    marker-yv: yv-h
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Mampianiana anareo aho, ry zanakavavin’i Jerosalema:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aza manaitra na mamoha ny fitiavana raha tsy efa sitrapony.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mahery toy ny fahafatesana ny fitiavana
    marker-yv: yv-h
  - type: usfm
    marker: sp
    children:
    - type: text
      text: (Olon-kafa)
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Iza moa irỳ vehivavy miakatra avy any an-tany efitra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mitehina amin’ny malalany?
  - type: usfm
    marker: sp
    children:
    - type: text
      text: (Ravehivavy)
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Teo ambanin’ny hazo paoma no namohazako anao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: teo no niterahan’ny reninao anao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, teo no nahararian’ilay niteraka anao.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Ataovy toy ny tombo-kase ao am-ponao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy toy ny tombo-kase eo an-tsandrinao aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa mahery toy ny fahafatesana ny fitiavana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'masiaka tahaka ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: fitoeran’ny maty
    - type: text
      text: ' ny fahasaro-piaro;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny lelafony dia lelafo midedadeda,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, lelafon’NY TOMPO.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Na dia ny ony maro aza dia tsy afaka hamono ny afon’ny fitiavana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary na ny renirano aza dia tsy mahapaoka azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na dia misy olona manome ny fananany rehetra ao an-tranony aza hividianana fitiavana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hatao tsinontsinona izy.
  - type: usfm
    marker: sp
    children:
    - type: text
      text: (Olon-kafa)
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Manana zandry vavy tsy mbola misy nono izahay;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ahoana no hataonay amin’ny zandrinay vavy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: raha tonga izay andro hangatahan’olona azy ho vady?
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Raha rindrimbe izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hanangananay tilikambo volafotsy eo an-tampony;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa raha varavarana kosa izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hotampenanay hazo fisaka sedera.
  - type: usfm
    marker: sp
    children:
    - type: text
      text: (Ravehivavy)
    marker-yv: yv-h
