document_id: SNG.8,3103
type_code: plt
verses:
  '1':
  - type: text
    content: Enga anie ka ho tahaka ny anadahiko izay ninono tamin’Ineny ianao,
  - type: text
    content: dia ho nahita anao teny alatrano aho ka ho nanoroka anao,
  - type: text
    content: eny, tsy ho azon’olona noesoesoina aho.
  '10':
  - type: text
    content: Rindrimbe aho, ary ny nonoko dia toy ny tilikambo.
  - type: text
    content: Raha eo imasony dia toy ny efa mahita fiadanana aho.
  - type: heading
    content: (Ralehilahy)
  '11':
  - type: text
    content: Nanana tanim-boaloboka tao Baala-Hamona i Solomona;
  - type: text
    content: nahofany tamin’ny olona mpiandry voly io tanim-boaloboka io
  - type: text
    content: ka samy tsy maintsy mitondra sekela volafotsy arivo ho solon’ny vokatra ao ny tsirairay.
  '12':
  - type: text
    content: Ny tanim-boaloboko, eny, ilay an’ny tenako, dia eto anatrehako,
  - type: text
    content: ny arivo kosa dia anao ry Solomona,
  - type: text
    content: ary ny roanjato dia ho an’izay mpiandry voly.
  '13':
  - type: text
    content: Ry mitoetra eny an-tsaha!
  - type: text
    content: Te hihaino ny feonao ireo namako;
  - type: text
    content: mba ampandreneso izany koa aho.
  - type: heading
    content: (Ravehivavy)
  '14':
  - type: text
    content: Mandosira, ry malalako,
  - type: text
    content: ary aoka ianao mba ho toy ny gazela na ny diera tanora
  - type: text
    content: any an-tendrombohitry ny balisama.
  '2':
  - type: text
    content: Dia hoentiko ka hampidiriko ho ao an-tranon’Ineny ianao,
  - type: text
    content: ary ampianaro aho;
  - type: text
    content: hampisotroiko divay noharoharoan-javamanitra
  - type: text
    content: mbamin’ny ranon’ampongabendanitro ianao.
  '3':
  - type: text
    content: Aoka hanondana ahy ny tanany havia,
  - type: text
    content: ary aoka hamihina ahy ny tanany havanana.
  - type: heading
    content: (Olon-kafa?)
  '4':
  - type: text
    content: 'Mampianiana anareo aho, ry zanakavavin’i Jerosalema:'
  - type: text
    content: Aza manaitra na mamoha ny fitiavana raha tsy efa sitrapony.
  - type: heading
    content: Mahery toy ny fahafatesana ny fitiavana
  - type: heading
    content: (Olon-kafa)
  '5':
  - type: text
    content: Iza moa irỳ vehivavy miakatra avy any an-tany efitra,
  - type: text
    content: mitehina amin’ny malalany?
  - type: heading
    content: (Ravehivavy)
  - type: text
    content: Teo ambanin’ny hazo paoma no namohazako anao;
  - type: text
    content: teo no niterahan’ny reninao anao,
  - type: text
    content: eny, teo no nahararian’ilay niteraka anao.
  '6':
  - type: text
    content: Ataovy toy ny tombo-kase ao am-ponao
  - type: text
    content: sy toy ny tombo-kase eo an-tsandrinao aho;
  - type: text
    content: fa mahery toy ny fahafatesana ny fitiavana,
  - type: text
    content: 'masiaka tahaka ny '
  - type: text
    content: fitoeran’ny maty
  - type: text
    content: ' ny fahasaro-piaro;'
  - type: text
    content: ny lelafony dia lelafo midedadeda,
  - type: text
    content: eny, lelafon’NY TOMPO.
  '7':
  - type: text
    content: Na dia ny ony maro aza dia tsy afaka hamono ny afon’ny fitiavana,
  - type: text
    content: ary na ny renirano aza dia tsy mahapaoka azy;
  - type: text
    content: na dia misy olona manome ny fananany rehetra ao an-tranony aza hividianana fitiavana
  - type: text
    content: dia hatao tsinontsinona izy.
  - type: heading
    content: (Olon-kafa)
  '8':
  - type: text
    content: Manana zandry vavy tsy mbola misy nono izahay;
  - type: text
    content: ahoana no hataonay amin’ny zandrinay vavy
  - type: text
    content: raha tonga izay andro hangatahan’olona azy ho vady?
  '9':
  - type: text
    content: Raha rindrimbe izy
  - type: text
    content: dia hanangananay tilikambo volafotsy eo an-tampony;
  - type: text
    content: fa raha varavarana kosa izy
  - type: text
    content: dia hotampenanay hazo fisaka sedera.
  - type: heading
    content: (Ravehivavy)
