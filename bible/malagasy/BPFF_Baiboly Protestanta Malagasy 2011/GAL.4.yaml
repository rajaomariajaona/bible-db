document_id: GAL.4,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Tsy andevo intsony ianao fa zanaka
  - type: text
    content: 'Fa hoy aho: Raha mbola zaza ny mpandova dia tsy hafa noho ny andevo izy na dia tompon’ny zavatra rehetra aza, '
  '10':
  - type: text
    content: 'Andro, volana sy fotoana ary taona no tandremanareo fatratra. '
  '11':
  - type: text
    content: Matahotra ny aminareo aho, fandrao dia nisasatra foana taminareo.
  '12':
  - type: text
    content: 'Ry rahalahy! Mangataka aminareo aho: Aoka ho tonga tahaka ahy ianareo, fa izaho koa dia efa tonga tahaka anareo. Tsy hoe nanao izay tsy marina tamiko akory ianareo; '
  '13':
  - type: text
    content: 'fantatrareo aza fa noho ny aretina no nitoriako ny Filazantsara taminareo tamin’ilay voalohany. '
  '14':
  - type: text
    content: 'Tsy nalaim-panahy hanao tsinontsinona na handa ahy noho ny aretiko ianareo; fa nandray ahy tahaka ny mandray '
  - type: text
    content: anjelin’Andriamanitra
  - type: text
    content: '; eny, tahaka an’i '
  - type: text
    content: Kristy
  - type: text
    content: ' Jesosy aza. '
  '15':
  - type: text
    content: 'Aiza izao ilay fahasambaranareo? Satria vavolombelonareo aho fa raha azonareo natao, na dia ny masonareo aza dia ho nesorinareo ka nomenareo ahy. '
  '16':
  - type: text
    content: 'Efa tonga fahavalonareo va aho satria milaza ny marina aminareo? '
  '17':
  - type: text
    content: 'Ny hafanam-po nasehon’ireo taminareo dia tsy tsara; fa hampisaraka anareo aminay izy mba hiraiketan’ny fonareo aminy. '
  '18':
  - type: text
    content: 'Fa tsara raha mazoto amin’ny tsara mandrakariva, fa tsy rehefa eo aminareo ihany aho, '
  '19':
  - type: text
    content: 'ry zanako, dia ianareo izay ananako faharariam-piterahana indray amin’ny fiterahana mandra-pahazoan’i Kristy endrika ao anatinareo. '
  '2':
  - type: text
    content: 'satria fehezin’ny mpitaiza azy sy mpitantana ao an-trano izy mandra-pahatongan’ny fotoana voatendrin’ny rainy. '
  '20':
  - type: text
    content: Te ho tonga eo aminareo aho ankehitriny ka hanova ny feoko, fa sahiran-tsaina ny aminareo aho.
  - type: heading
    content: I Hagara sy i Saraha, endriky ny fanekena roa
  '21':
  - type: text
    content: 'Milazà amiko ianareo izay te ho ambanin’ny lalàna: Tsy renareo va ny lalàna? '
  '22':
  - type: text
    content: 'Fa voasoratra hoe: I Abrahama dia nanana zanaka roa lahy, ny iray dia tamin’ny andevovavy, ary ny iray dia tamin’ny vehivavy afaka. '
  '23':
  - type: text
    content: 'Kanefa ilay tamin’ny andevovavy dia nateraka araka ny nofo; fa ilay tamin’ny vehivavy afaka kosa dia nateraka tamin’ny teny fikasana. '
  '24':
  - type: text
    content: 'Fanoharana izany. Izy roa vavy ireo dia fanekena roa: Ny iray dia avy tamin’ny tendrombohitra Sinay ka miteraka fanandevozana. I Hagara izany. '
  '25':
  - type: text
    content: 'Ny hoe Hagara mantsy dia tendrombohitra Sinay any Arabia ka mifanandrify amin’i Jerosalema ankehitriny satria andevo izy mbamin’ny zanany. '
  '26':
  - type: text
    content: 'Fa Jerosalema any ambony kosa, izay renintsika, dia olona afaka. '
  '27':
  - type: text
    content: 'Voasoratra mantsy hoe:'
  - type: text
    content: «Mifalia, Ramomba, izay tsy mba miteraka;
  - type: text
    content: miantsoantsoa sy manaova hiakam-pifaliana ianao izay tsy mbola nihetsi-jaza;
  - type: text
    content: fa ny zanaky ny mpitondratena dia maro
  - type: text
    content: noho ny an’ny manambady» (Isa 54.1).
  '28':
  - type: text
    content: 'Fa isika, ry rahalahy, dia zanaky ny teny fikasana tahaka an’Isaka. '
  '29':
  - type: text
    content: 'Kanefa tahaka ny tamin’izany andro izany, ilay teraka araka ny nofo dia nanenjika ilay araka ny Fanahy. Tahaka izany koa ankehitriny. '
  '3':
  - type: text
    content: 'Tahaka izany koa isika, fony mbola zaza, dia nandevozin’ny abidim-pianaran’izao tontolo izao; '
  '30':
  - type: text
    content: 'Nefa ahoana no lazain’ny Soratra Masina? «Roahy io andevovavy io sy ny zanany lahy; fa ny zanaky ny andevo dia tsy hiray lova amin’ny zanaky ny vehivavy afaka» (Gen 21.10). '
  '31':
  - type: text
    content: Noho izany, ry rahalahy, tsy zanak’andevovavy isika fa zanaky ny vehivavy afaka.
  '4':
  - type: text
    content: 'fa rehefa tonga kosa ny fotoanandro dia nirahin’Andriamanitra ny Zanany, nateraky ny vehivavy, nateraka tao ambanin’ny lalàna, '
  '5':
  - type: text
    content: 'hanavotany izay ambanin’ny lalàna, mba handraisantsika ny maha zanaka. '
  '6':
  - type: text
    content: 'Koa satria zanaka ianareo dia nirahin’Andriamanitra ho ato am-pontsika ny Fanahin’ny Zanany izay miantso hoe: Aba! Ray ô! '
  '7':
  - type: text
    content: Koa tsy andevo intsony ianao fa zanaka; ary raha zanaka dia mpandova koa, noho ny ataon’Andriamanitra.
  - type: heading
    content: Ny ahiahin’i Paoly ny amin’ny finoan’ny Galatiana
  '8':
  - type: text
    content: 'Taloha, fony mbola tsy nahalala an’Andriamanitra ianareo dia nanompo izay andriamanitra tsy izy. '
  '9':
  - type: text
    content: 'Ankehitriny kosa, mahalala an’Andriamanitra ianareo, kanefa tsy izany, fa Izy no mahalala anareo. Koa nahoana ianareo no miverina indray amin’ny fanompoana ny abidim-pianarana malemy sady tsy misy dikany? '
