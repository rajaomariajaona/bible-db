document_id: NUM.5,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Izay maloto dia avoaka any ivelan’ny toby
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy NY TOMPO tamin’i Mosesy: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ho azy koa ny zava-masina aterin’ny olona rehetra; na inona na inona omen’ny olona ho an’ny mpisorona, dia ho azy izany.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny amin’ny vehivavy nahìna ho nijangajanga
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary NY TOMPO niteny tamin’i Mosesy hoe: '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mitenena amin’ny Zanak’Israely hoe: Na iza na iza vadin’olona mivaona ka mamitaka ny lahy, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'satria nisy lehilahy nandry taminy, saingy tsy hitan’ny lahy fa miafina Ravehivavy ka voaloto, nefa tsy misy vavolombelona hiampanga azy ary tsy nisy izay nahatratra azy, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'na koa misy fiahiahiana ao amin’ny lahy ka miahiahy ny vadiny izy, sady efa voaloto Ravehivavy, na raha misy fiahiahiana ao amin’ny lahy ka miahiahy ny vadiny izy, kanefa tsy voaloto Ravehivavy, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia hoentin’ny lahy ho eo amin’ny mpisorona ny vadiny ary hitondra ny fanatiny noho ny vavy izy, dia kobam-barimbazaha ampahafolon’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: efaha
    - type: text
      text: '. Tsy handrarahany diloilo izany sady tsy hasiany ditin-kazo mani-pofona, satria fanatitra noho ny ahiahy, dia fanati-pahatsiarovana, hampahatsiaro heloka. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hampanakaiky azy ny mpisorona ka hampijoro azy eo anatrehan’NY TOMPO. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia haka rano nohamasinina amin’ny lovia tany ny mpisorona; ary ny vovoka eo amin’izay itoeran’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: tabernakely
    - type: text
      text: ' dia hakan’ny mpisorona ka hataony amin’ny rano. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hatsangan’ny mpisorona eo anatrehan’NY TOMPO Ravehivavy ka harakarakany ny volon-dohan-dRavehivavy, ary hataony eo an-tanany ny fanati-pahatsiarovana, dia ny fanatitra noho ny ahiahy; ho eo an-tanan’ny mpisorona ny rano mangidy izay mitondra ozona. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hampianiana an-dRavehivavy ny mpisorona ka hiteny aminy hoe: Raha tsy nisy lehilahy nandry taminao ka tsy nivaona tamin’ny vadinao ho amin’ny fahalotoana ianao dia aoka ho afaka amin’ity rano mangidy mitondra ozona ity ianao; '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mandidia ny Zanak’Israely hamoaka ny boka rehetra sy ny marary mitsika rehetra ary ny maloto tamim-paty rehetra hiala amin’ny toby. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fa raha nivaona tamin’ny vadinao kosa ianao ka voaloto, fa nisy lehilahy nandry taminao, afa-tsy ny vadinao, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia hampianiana an-dRavehivavy ny mpisorona mba hiozona ka hiteny aminy hoe: NY TOMPO anie hanao anao ho fiozonana sy ho fianianana eo amin’ny firenenao, amin’ny fampifezahan’NY TOMPO ny fenao sy ny fampivontosany ny kibonao; '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary ity rano mitondra ozona ity dia hiditra any amin’ny tsinainao ka hampivonto ny kibonao sy hampifezaka ny fenao! Ary Ravehivavy hiteny hoe: '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Amena
    - type: text
      text: '! Amena! '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hosoratan’ny mpisorona amin’ny taratasy izany fiozonana izany ka hosasany eo amin’ny rano mangidy ny soratra; '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary hampisotroiny an-dRavehivavy ny rano mangidy mitondra ozona; ary ny rano izay mitondra ozona dia hiditra ao anatiny ho zava-mangidy. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia halain’ny mpisorona eo an-tanan-dRavehivavy ny fanatitra noho ny ahiahy; ary hasandrany eo anatrehan’NY TOMPO izany ka hatolony eo amin’ny alitara. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia horaofin’ny mpisorona ny fanati-pahatsiarovana avy amin’ny fanatitra ka hodorany ho fofona eo ambonin’ny alitara; rehefa afaka izany, vao hampisotroiny io rano io Ravehivavy. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa rehefa nampisotroina ny rano izy, raha voaloto, satria nanao izay nahadiso azy tamin’ny vadiny, dia hiditra ao anatiny ho zava-mangidy ny rano mitondra ozona, ary hivonto ny kibony sady hifezaka ny feny ka ho fiozonana eo amin’ny fireneny Ravehivavy. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha tsy voaloto kosa Ravehivavy fa madio dia ho afaka izy ka hanana anaka. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izany no lalàna ny amin’ny ahiahy, raha misy vehivavy mivaona amin’ny vadiny ka voaloto; '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Na lehilahy na vehivavy dia samy havoakanareo any ivelan’ny toby, mba tsy handoto ny tobiny izay itoerako eo anivony. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'na, raha misy lehilahy azon’ny fiahiahiana ka miahiahy ny vadiny dia hampitoetra ny vadiny eo anatrehan’NY TOMPO izy, ary hanefa izany lalàna rehetra izany aminy ny mpisorona. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia tsy hanan-tsiny Ralehilahy, fa Ravehivavy kosa dia ho meloka.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nanatanteraka izany ny Zanak’Israely ka namoaka ireny ho any ivelan’ny toby; araka izay nolazain’NY TOMPO tamin’i Mosesy no nataon’ny Zanak’Israely.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fanonerana ny hadisoana vita
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary NY TOMPO niteny tamin’i Mosesy hoe: '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lazao amin’ny Zanak’Israely hoe: Raha misy lehilahy na vehivavy manao izay mety ho fahotan’ny olona ka manao izay mahadiso eo anatrehan’NY TOMPO ary meloka '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia tsy maintsy hiaiky ny fahotana izay nataony izy ary hanonitra feno ka hanampy ny ampahadiminy, ary homeny an’ilay nanaovany fahadisoana izany. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa raha toa ka tsy manana havana mpanavotra hanaterany ny fanonerana ny amin’ny fahadisoany ilay olona dia ho an’NY TOMPO ny zavatra naterina ho fanonerana ka ho an’ny mpisorona, ho fanampin’ny ondrilahy fanavotana izay hanaovan’ny mpisorona fanavotana ho azy. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny anjara rehetra alaina avy amin’ny zava-masina rehetra atolotry ny Zanak’Israely, izay atolony ho an’ny mpisorona, dia ho azy. '
