document_id: NUM.5,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Izay maloto dia avoaka any ivelan’ny toby
  - type: text
    content: 'Ary hoy NY TOMPO tamin’i Mosesy: '
  '10':
  - type: text
    content: Ho azy koa ny zava-masina aterin’ny olona rehetra; na inona na inona omen’ny olona ho an’ny mpisorona, dia ho azy izany.
  - type: heading
    content: Ny amin’ny vehivavy nahìna ho nijangajanga
  '11':
  - type: text
    content: 'Ary NY TOMPO niteny tamin’i Mosesy hoe: '
  '12':
  - type: text
    content: 'Mitenena amin’ny Zanak’Israely hoe: Na iza na iza vadin’olona mivaona ka mamitaka ny lahy, '
  '13':
  - type: text
    content: 'satria nisy lehilahy nandry taminy, saingy tsy hitan’ny lahy fa miafina Ravehivavy ka voaloto, nefa tsy misy vavolombelona hiampanga azy ary tsy nisy izay nahatratra azy, '
  '14':
  - type: text
    content: 'na koa misy fiahiahiana ao amin’ny lahy ka miahiahy ny vadiny izy, sady efa voaloto Ravehivavy, na raha misy fiahiahiana ao amin’ny lahy ka miahiahy ny vadiny izy, kanefa tsy voaloto Ravehivavy, '
  '15':
  - type: text
    content: 'dia hoentin’ny lahy ho eo amin’ny mpisorona ny vadiny ary hitondra ny fanatiny noho ny vavy izy, dia kobam-barimbazaha ampahafolon’ny '
  - type: text
    content: efaha
  - type: text
    content: '. Tsy handrarahany diloilo izany sady tsy hasiany ditin-kazo mani-pofona, satria fanatitra noho ny ahiahy, dia fanati-pahatsiarovana, hampahatsiaro heloka. '
  '16':
  - type: text
    content: 'Hampanakaiky azy ny mpisorona ka hampijoro azy eo anatrehan’NY TOMPO. '
  '17':
  - type: text
    content: 'Dia haka rano nohamasinina amin’ny lovia tany ny mpisorona; ary ny vovoka eo amin’izay itoeran’ny '
  - type: text
    content: tabernakely
  - type: text
    content: ' dia hakan’ny mpisorona ka hataony amin’ny rano. '
  '18':
  - type: text
    content: 'Ary hatsangan’ny mpisorona eo anatrehan’NY TOMPO Ravehivavy ka harakarakany ny volon-dohan-dRavehivavy, ary hataony eo an-tanany ny fanati-pahatsiarovana, dia ny fanatitra noho ny ahiahy; ho eo an-tanan’ny mpisorona ny rano mangidy izay mitondra ozona. '
  '19':
  - type: text
    content: 'Dia hampianiana an-dRavehivavy ny mpisorona ka hiteny aminy hoe: Raha tsy nisy lehilahy nandry taminao ka tsy nivaona tamin’ny vadinao ho amin’ny fahalotoana ianao dia aoka ho afaka amin’ity rano mangidy mitondra ozona ity ianao; '
  '2':
  - type: text
    content: 'Mandidia ny Zanak’Israely hamoaka ny boka rehetra sy ny marary mitsika rehetra ary ny maloto tamim-paty rehetra hiala amin’ny toby. '
  '20':
  - type: text
    content: 'fa raha nivaona tamin’ny vadinao kosa ianao ka voaloto, fa nisy lehilahy nandry taminao, afa-tsy ny vadinao, '
  '21':
  - type: text
    content: 'dia hampianiana an-dRavehivavy ny mpisorona mba hiozona ka hiteny aminy hoe: NY TOMPO anie hanao anao ho fiozonana sy ho fianianana eo amin’ny firenenao, amin’ny fampifezahan’NY TOMPO ny fenao sy ny fampivontosany ny kibonao; '
  '22':
  - type: text
    content: 'ary ity rano mitondra ozona ity dia hiditra any amin’ny tsinainao ka hampivonto ny kibonao sy hampifezaka ny fenao! Ary Ravehivavy hiteny hoe: '
  - type: text
    content: Amena
  - type: text
    content: '! Amena! '
  '23':
  - type: text
    content: 'Dia hosoratan’ny mpisorona amin’ny taratasy izany fiozonana izany ka hosasany eo amin’ny rano mangidy ny soratra; '
  '24':
  - type: text
    content: 'ary hampisotroiny an-dRavehivavy ny rano mangidy mitondra ozona; ary ny rano izay mitondra ozona dia hiditra ao anatiny ho zava-mangidy. '
  '25':
  - type: text
    content: 'Dia halain’ny mpisorona eo an-tanan-dRavehivavy ny fanatitra noho ny ahiahy; ary hasandrany eo anatrehan’NY TOMPO izany ka hatolony eo amin’ny alitara. '
  '26':
  - type: text
    content: 'Dia horaofin’ny mpisorona ny fanati-pahatsiarovana avy amin’ny fanatitra ka hodorany ho fofona eo ambonin’ny alitara; rehefa afaka izany, vao hampisotroiny io rano io Ravehivavy. '
  '27':
  - type: text
    content: 'Koa rehefa nampisotroina ny rano izy, raha voaloto, satria nanao izay nahadiso azy tamin’ny vadiny, dia hiditra ao anatiny ho zava-mangidy ny rano mitondra ozona, ary hivonto ny kibony sady hifezaka ny feny ka ho fiozonana eo amin’ny fireneny Ravehivavy. '
  '28':
  - type: text
    content: 'Raha tsy voaloto kosa Ravehivavy fa madio dia ho afaka izy ka hanana anaka. '
  '29':
  - type: text
    content: 'Izany no lalàna ny amin’ny ahiahy, raha misy vehivavy mivaona amin’ny vadiny ka voaloto; '
  '3':
  - type: text
    content: 'Na lehilahy na vehivavy dia samy havoakanareo any ivelan’ny toby, mba tsy handoto ny tobiny izay itoerako eo anivony. '
  '30':
  - type: text
    content: 'na, raha misy lehilahy azon’ny fiahiahiana ka miahiahy ny vadiny dia hampitoetra ny vadiny eo anatrehan’NY TOMPO izy, ary hanefa izany lalàna rehetra izany aminy ny mpisorona. '
  '31':
  - type: text
    content: Dia tsy hanan-tsiny Ralehilahy, fa Ravehivavy kosa dia ho meloka.
  '4':
  - type: text
    content: Dia nanatanteraka izany ny Zanak’Israely ka namoaka ireny ho any ivelan’ny toby; araka izay nolazain’NY TOMPO tamin’i Mosesy no nataon’ny Zanak’Israely.
  - type: heading
    content: Ny fanonerana ny hadisoana vita
  '5':
  - type: text
    content: 'Ary NY TOMPO niteny tamin’i Mosesy hoe: '
  '6':
  - type: text
    content: 'Lazao amin’ny Zanak’Israely hoe: Raha misy lehilahy na vehivavy manao izay mety ho fahotan’ny olona ka manao izay mahadiso eo anatrehan’NY TOMPO ary meloka '
  '7':
  - type: text
    content: 'dia tsy maintsy hiaiky ny fahotana izay nataony izy ary hanonitra feno ka hanampy ny ampahadiminy, ary homeny an’ilay nanaovany fahadisoana izany. '
  '8':
  - type: text
    content: 'Fa raha toa ka tsy manana havana mpanavotra hanaterany ny fanonerana ny amin’ny fahadisoany ilay olona dia ho an’NY TOMPO ny zavatra naterina ho fanonerana ka ho an’ny mpisorona, ho fanampin’ny ondrilahy fanavotana izay hanaovan’ny mpisorona fanavotana ho azy. '
  '9':
  - type: text
    content: 'Ary ny anjara rehetra alaina avy amin’ny zava-masina rehetra atolotry ny Zanak’Israely, izay atolony ho an’ny mpisorona, dia ho azy. '
