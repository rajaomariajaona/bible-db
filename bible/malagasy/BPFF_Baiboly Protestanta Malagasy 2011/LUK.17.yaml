document_id: LUK.17,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Izay mahatonga ny fahatafintohinana
  - type: heading
    content: Mat 18.6-7; Mar 9.42
  - type: text
    content: 'Hoy Jesosy tamin’ny mpianany: Tsy maintsy ho avy ny fahatafintohinana; nefa lozan’izay olona mahatonga izany! '
  '10':
  - type: text
    content: 'Dia tahaka izany koa ianareo, rehefa vitanareo izay rehetra nampanaovina anareo, dia mitenena hoe: Mpanompo tsy mahasoa izahay; izay tokony ho nataonay ihany no efa nataonay.'
  - type: heading
    content: Ny nanasitranan’i Jesosy ireo boka folo lahy
  '11':
  - type: text
    content: Rehefa nandeha ho any Jerosalema Jesosy dia nandalo tao anelanelan’i Samaria sy i Galilia.
  '12':
  - type: text
    content: 'Ary raha niditra tao amin’ny vohitra iray Izy dia nisy boka folo lahy nifanena Taminy, izay nijanona lavitra Azy. '
  '13':
  - type: text
    content: 'Ary niantso mafy izy ireo hoe: Ry Jesosy Mpampianatra ô, mamindrà fo aminay! '
  '14':
  - type: text
    content: 'Raha nahita ireo Izy dia niteny hoe: Mandehana, misehoa amin’ny mpisorona. Rehefa lasa izy ireo dia nadio teny am-pandehanana.'
  '15':
  - type: text
    content: 'Ary ny iray tamin’ireo, raha nahita fa sitrana ny tenany, dia niverina ka nankalaza an’Andriamanitra tamin’ny feo mahery '
  '16':
  - type: text
    content: 'sady niankohoka teo amin’ny tongotr’i Jesosy ka nisaotra Azy; izy io dia '
  - type: text
    content: Samaritana
  - type: text
    content: '. '
  '17':
  - type: text
    content: 'Dia hoy Jesosy: Tsy efa voadio avokoa va izy folo lahy? Fa aiza ny sivy? '
  '18':
  - type: text
    content: 'Moa tsy nisy hita niverina hanome voninahitra an’Andriamanitra afa-tsy ity olona hafa firenena ity ihany va? '
  '19':
  - type: text
    content: 'Ary hoy Izy taminy: Mitsangàna, mandehana; ny finoanao no efa nahavonjy anao.'
  - type: heading
    content: Ny fahatongavan’ny fanjakan’Andriamanitra
  '2':
  - type: text
    content: 'Aleo anantonana vato fikosoham-bary ny vozony ka atsipy any an-dranomasina izy, toy izay hanafintohina na dia ny iray aza amin’ireo madinika ireo. '
  '20':
  - type: text
    content: 'Nony nanontanian’ireo '
  - type: text
    content: Fariseo
  - type: text
    content: ' izay andro hiavian’ny fanjakan’Andriamanitra Jesosy dia namaly azy Izy hoe: Tsy misehoseho no fiavin’ny fanjakan’Andriamanitra. '
  '21':
  - type: text
    content: 'Ary ny olona dia tsy hiteny hoe: Indro, etỳ! Na, erỳ! Fa indro ny fanjakan’Andriamanitra dia ao aminareo.'
  - type: heading
    content: Ny Andron’ny Zanak’Olona
  '22':
  - type: text
    content: 'Hoy Izy tamin’ny mpianatra: Ho avy ny andro hanirianareo hahita ny iray amin’ireo Andron’ny '
  - type: text
    content: Zanak’Olona
  - type: text
    content: ' nefa tsy hahita ianareo.'
  - type: heading
    content: Mat 24.26-27; Mar 13.21-22
  '23':
  - type: text
    content: 'Ary hilaza aminareo ny olona hoe: Indro, erỳ! Na: Indro, etỳ! Nefa aza mandeha ianareo na manaraka azy. '
  '24':
  - type: text
    content: 'Fa tahaka ny tselatra manelatra hatramin’ny faravodilanitra ka mahazava hatramin’ny farany koa dia ho toy izany ny Zanak’Olona amin’ny androny. '
  '25':
  - type: text
    content: Fa tsy maintsy mijaly mafy Izy aloha sady holavin’ity taranaka ity.
  - type: heading
    content: Mat 24.37-39
  '26':
  - type: text
    content: 'Tahaka ny tamin’ny andron’i Noa dia hisy toy izany koa amin’ny andron’ny Zanak’Olona: '
  '27':
  - type: text
    content: Nihinana ny olona, nisotro, nampaka-bady, navoaka hampakarina, mandra-piavin’ny andro izay nidiran’i Noa tao amin’ny sambofiara, dia tonga ny safodrano ka nandringana azy rehetra.
  '28':
  - type: text
    content: 'Tahaka ny tamin’ny andron’i Lota koa: Nihinana ny olona, nisotro, nividy, nivarotra, namboly, nanangana trano; '
  '29':
  - type: text
    content: 'fa tamin’ny andro izay nialan’i Lota avy tao Sodoma dia nisy afo sy solifara nilatsaka avy tany an-danitra ka nandringana azy rehetra. '
  '3':
  - type: text
    content: Mitandrema ianareo;
  - type: heading
    content: Ny famelan-keloka
  - type: heading
    content: Mat 18.15, 21-22
  - type: text
    content: 'fa raha manota ny rahalahinao dia teneno mafy izy, koa raha mibebaka izy dia mamelà ny helony. '
  '30':
  - type: text
    content: Dia ho tahaka izany koa amin’ny andro hampisehoana ny Zanak’Olona.
  - type: heading
    content: Mat 24.17-18; Mar 13.15-16
  '31':
  - type: text
    content: 'Amin’izany andro izany, izay eo an-tampon-trano ka ao an-trano ny entany, dia aoka tsy hidina haka izany; ary toy izany koa izay any an-tsaha, aoka tsy hiverina amin’izay efa nilaozany. '
  '32':
  - type: text
    content: 'Tsarovy ny vadin’i Lota. '
  '33':
  - type: text
    content: Na zovy na zovy mitady hiaro ny ainy dia hahavery azy ary na zovy na zovy no hahavery ny ainy dia hahatana izany.
  - type: heading
    content: Mat 24.40-41
  '34':
  - type: text
    content: 'Lazaiko aminareo fa amin’izany alina izany dia hisy roa lahy miray fandriana; ny iray dia horaisina ary ny iray dia havela. '
  '35':
  - type: text
    content: 'Hisy roa vavy miara-mitoto vary; ny iray dia horaisina ary ny iray dia havela, '
  '36':
  - type: text
    content: Hisy roa lahy any an-tsaha; ny iray dia horaisina ary ny iray dia havela.
  '37':
  - type: text
    content: 'Dia nanontany Azy izy ireo hoe: Aiza, Tompoko? Ary hoy Izy taminy: Izay itoeran’ny faty dia any koa no hiangonan’ny voromahery.'
  '4':
  - type: text
    content: 'Ary raha manota aminao impito ao anatin’ny indray andro izy, ary mifona aminao impito kosa hoe: Mibebaka aho, dia mamelà ny helony.'
  - type: heading
    content: Ny finoana
  - type: heading
    content: Mat 17.19-20
  '5':
  - type: text
    content: 'Hoy ny Apostoly tamin’ny Tompo: Ampitomboy ny finoanay. '
  '6':
  - type: text
    content: 'Fa hoy ny Tompo: Raha manana finoana na dia ohatry ny voantsinapy iray aza ianareo dia azonareo lazaina amin’io voaroihazo io hoe: Miongota, ary maniria any anatin’ny ranomasina, dia hanaiky anareo izy.'
  - type: heading
    content: Ilay mpanompo tsy nanatanteraka afa-tsy izay tokony nataony
  '7':
  - type: text
    content: 'Iza moa aminareo no manana mpanompo miasa tany na miandry ondry, koa raha tonga avy tany an-tsaha ilay mpanompo dia hiteny aminy hoe: Avia haingana ka mipetraha hisakafo? '
  '8':
  - type: text
    content: 'Fa tsy hilaza aminy kosa va izy hoe: Karakarao ny sakafoko ary misikìna ka rosoy sakafo aho, ambara-pitsahatro mihinana sy misotro; fa rehefa vita izany dia izay vao mahazo mihinana sy misotro ianao? '
  '9':
  - type: text
    content: 'Moa misaotra izany mpanompo izany va izy satria nataony izay nampanaoviny? '
