document_id: LUK.17
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Izay mahatonga ny fahatafintohinana
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat 18.6-7; Mar 9.42
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Hoy Jesosy tamin’ny mpianany: Tsy maintsy ho avy ny fahatafintohinana; nefa lozan’izay olona mahatonga izany! '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Aleo anantonana vato fikosoham-bary ny vozony ka atsipy any an-dranomasina izy, toy izay hanafintohina na dia ny iray aza amin’ireo madinika ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Mitandrema ianareo;
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny famelan-keloka
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat 18.15, 21-22
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: text
    text: 'fa raha manota ny rahalahinao dia teneno mafy izy, koa raha mibebaka izy dia mamelà ny helony. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary raha manota aminao impito ao anatin’ny indray andro izy, ary mifona aminao impito kosa hoe: Mibebaka aho, dia mamelà ny helony.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny finoana
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat 17.19-20
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Hoy ny Apostoly tamin’ny Tompo: Ampitomboy ny finoanay. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Fa hoy ny Tompo: Raha manana finoana na dia ohatry ny voantsinapy iray aza ianareo dia azonareo lazaina amin’io voaroihazo io hoe: Miongota, ary maniria any anatin’ny ranomasina, dia hanaiky anareo izy.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ilay mpanompo tsy nanatanteraka afa-tsy izay tokony nataony
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Iza moa aminareo no manana mpanompo miasa tany na miandry ondry, koa raha tonga avy tany an-tsaha ilay mpanompo dia hiteny aminy hoe: Avia haingana ka mipetraha hisakafo? '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Fa tsy hilaza aminy kosa va izy hoe: Karakarao ny sakafoko ary misikìna ka rosoy sakafo aho, ambara-pitsahatro mihinana sy misotro; fa rehefa vita izany dia izay vao mahazo mihinana sy misotro ianao? '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Moa misaotra izany mpanompo izany va izy satria nataony izay nampanaoviny? '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dia tahaka izany koa ianareo, rehefa vitanareo izay rehetra nampanaovina anareo, dia mitenena hoe: Mpanompo tsy mahasoa izahay; izay tokony ho nataonay ihany no efa nataonay.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nanasitranan’i Jesosy ireo boka folo lahy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Rehefa nandeha ho any Jerosalema Jesosy dia nandalo tao anelanelan’i Samaria sy i Galilia.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary raha niditra tao amin’ny vohitra iray Izy dia nisy boka folo lahy nifanena Taminy, izay nijanona lavitra Azy. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary niantso mafy izy ireo hoe: Ry Jesosy Mpampianatra ô, mamindrà fo aminay! '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Raha nahita ireo Izy dia niteny hoe: Mandehana, misehoa amin’ny mpisorona. Rehefa lasa izy ireo dia nadio teny am-pandehanana.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary ny iray tamin’ireo, raha nahita fa sitrana ny tenany, dia niverina ka nankalaza an’Andriamanitra tamin’ny feo mahery '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'sady niankohoka teo amin’ny tongotr’i Jesosy ka nisaotra Azy; izy io dia '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Samaritana
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Dia hoy Jesosy: Tsy efa voadio avokoa va izy folo lahy? Fa aiza ny sivy? '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Moa tsy nisy hita niverina hanome voninahitra an’Andriamanitra afa-tsy ity olona hafa firenena ity ihany va? '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary hoy Izy taminy: Mitsangàna, mandehana; ny finoanao no efa nahavonjy anao.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fahatongavan’ny fanjakan’Andriamanitra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Nony nanontanian’ireo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Fariseo
  - type: text
    text: ' izay andro hiavian’ny fanjakan’Andriamanitra Jesosy dia namaly azy Izy hoe: Tsy misehoseho no fiavin’ny fanjakan’Andriamanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary ny olona dia tsy hiteny hoe: Indro, etỳ! Na, erỳ! Fa indro ny fanjakan’Andriamanitra dia ao aminareo.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny Andron’ny Zanak’Olona
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Hoy Izy tamin’ny mpianatra: Ho avy ny andro hanirianareo hahita ny iray amin’ireo Andron’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Zanak’Olona
  - type: text
    text: ' nefa tsy hahita ianareo.'
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat 24.26-27; Mar 13.21-22
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary hilaza aminareo ny olona hoe: Indro, erỳ! Na: Indro, etỳ! Nefa aza mandeha ianareo na manaraka azy. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Fa tahaka ny tselatra manelatra hatramin’ny faravodilanitra ka mahazava hatramin’ny farany koa dia ho toy izany ny Zanak’Olona amin’ny androny. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Fa tsy maintsy mijaly mafy Izy aloha sady holavin’ity taranaka ity.
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat 24.37-39
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Tahaka ny tamin’ny andron’i Noa dia hisy toy izany koa amin’ny andron’ny Zanak’Olona: '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Nihinana ny olona, nisotro, nampaka-bady, navoaka hampakarina, mandra-piavin’ny andro izay nidiran’i Noa tao amin’ny sambofiara, dia tonga ny safodrano ka nandringana azy rehetra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Tahaka ny tamin’ny andron’i Lota koa: Nihinana ny olona, nisotro, nividy, nivarotra, namboly, nanangana trano; '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'fa tamin’ny andro izay nialan’i Lota avy tao Sodoma dia nisy afo sy solifara nilatsaka avy tany an-danitra ka nandringana azy rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Dia ho tahaka izany koa amin’ny andro hampisehoana ny Zanak’Olona.
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat 24.17-18; Mar 13.15-16
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Amin’izany andro izany, izay eo an-tampon-trano ka ao an-trano ny entany, dia aoka tsy hidina haka izany; ary toy izany koa izay any an-tsaha, aoka tsy hiverina amin’izay efa nilaozany. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Tsarovy ny vadin’i Lota. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Na zovy na zovy mitady hiaro ny ainy dia hahavery azy ary na zovy na zovy no hahavery ny ainy dia hahatana izany.
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat 24.40-41
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Lazaiko aminareo fa amin’izany alina izany dia hisy roa lahy miray fandriana; ny iray dia horaisina ary ny iray dia havela. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Hisy roa vavy miara-mitoto vary; ny iray dia horaisina ary ny iray dia havela, '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Hisy roa lahy any an-tsaha; ny iray dia horaisina ary ny iray dia havela.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Dia nanontany Azy izy ireo hoe: Aiza, Tompoko? Ary hoy Izy taminy: Izay itoeran’ny faty dia any koa no hiangonan’ny voromahery.'
