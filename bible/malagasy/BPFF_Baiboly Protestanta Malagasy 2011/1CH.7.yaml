document_id: 1CH.7
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny taranak’Isakara
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Gen 46.13; Nom 26.23-24; Mpits 10.1
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ny zanakalahin’Isakara dia i Tola, i Poa, i Jasoba ary i Simrona; efatra izy ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ny zanakalahin’i Tola dia i Ozy, i Refaia, i Jeriela, i Jamay, i Jibsama ary i Samoela, samy loham-pianakavian’i Tola ary samy lehilahy mahery tamin’ny fianakaviany avy ireo; eninjato sy roa arivo sy roa alina no isany tamin’ny andron’i Davida. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ny zanakalahin’i Ozy dia i Jizrahia. Ny zanakalahin’i Jizrahia dia i Mikaela, i Obadia, i Joela ary i Jisia; dimy izy ireo; loholona avokoa izy rehetra ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Nanana miaramila antokotokony izy araka ny taranany sy ny fianakaviany avy, enina arivo sy telo alina izany; fa maro ny vady aman-janak’ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ary ny rahalahiny ao amin’ny fokon’ny Isakara rehetra, izay samy lehilahy mahery, ny isan’izy rehetra araka ny firazanany avy dia fito arivo sy valo alina.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny taranak’i Benjamina
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Gen 46.21; Nom 26.38-39
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ny zanakalahin’i Benjamina dia i Bela sy i Bekera ary i Jediaela; telo izy ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ny zanakalahin’i Bela dia i Ezbona, i Ozy, i Oziela, i Jerimota ary Iry; dimy izy ireo, ary samy loham-pianakaviany avy sady lehilahy mahery avokoa; ny isany araka ny firazanany dia efatra amby telopolo sy roa arivo sy roa alina. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ny zanakalahin’i Bekera dia i Zemira, i Joasy, i Eliezera, i Elioenay, i Omry, i Jerimota, i Abia, i Anatota ary i Alemeta. Ireo rehetra ireo no zanakalahin’i Bekera. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ny isany araka ny tetiarana, dia ireo loham-pianakaviany avy sady lehilahy mahery, dia roanjato sy roa alina. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ny zanakalahin’i Jediaela dia i Bilana; ny zanakalahin’i Bilana dia i Jeosy, i Benjamina, i Ehoda, i Kenana, i Zetana, i Tarsisy ary i Ahisahara. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ireo zanakalahin’i Jediaela rehetra ireo, araka ny loham-pianakaviany, dia roanjato sy fito arivo sy iray alina; ireo no isan’ny lehilahy mahery azo nalefa hanafika. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: I Sopima koa sy i Hopima, zanakalahin’Iry, ary i Hosima, zanakalahin’i Ahera.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny taranak’i Naftaly
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Gen 46.24; Nom 26.48-50
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ny zanakalahin’i Naftaly dia i Jaziela, i Gonỳ, i Jezera, i Saloma, izay samy zanakalahin’i Bila.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny taranak’i Manase
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ny zanakalahin’i Manase dia i Asriela, izay naterany tamin’ilay vady tsindranony arameana, izay niteraka an’i Makira, rain’i Gileada. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'I Makira dia naka vady ho an’i Hopima sy i Sopima; ny anaran’ny rahavaviny dia i Maka; ny anaran’ny manarakaraka dia i Zelofada; ary nanan-janakavavy i Zelofada. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Niteraka zazalahy i Maka, vadin’i Makira, ka Peresy no nataony anarany; ary Seresy no anaran’ny rahalahiny; ny anaran’ny zanany lahy dia Olama sy Rekema. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ny zanakalahin’i Olama dia i Bedana. Ireo no zanakalahin’i Gileada, zanakalahin’i Makira, zanakalahin’i Manase. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'I Hamoleketa anabaviny no niteraka an’i Isehoda sy i Abiezera ary i Mahala. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ny zanakalahin’i Semida dia i Ahiana, i Sekema, i Liky ary i Aniama.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny taranak’i Efraima
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ny zanakalahin’i Efraima dia i Sotela; i Bereda no zanakalahin’i Sotela; i Tahata no zanakalahin’i Bereda; i Elada no zanakalahin’i Tahata; i Tahata no zanakalahin’i Elada; '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'i Zabada no zanakalahin’i Tahata; i Sotela no zanakalahin’i Zabada. Novonoin’ny tompon-tany tao Gata i Ezera sy i Elada, satria nidina hangalatra ny omby aman’ondriny. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Nisaona azy ela i Efraima rainy ary tonga nampionona azy ny rahalahiny. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Nony niray tamin’ny vadiny izy dia nanana anaka Ravehivavy ka niteraka zazalahy, ary ny anarany dia nataony hoe Beria, satria nisy fahoriana tao an-tranony tamin’izany. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ny zanany vavy dia i Sera, izay nanorina an’i Bety-Horona ambany sy ambony sy Ozena-Sera. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'I Refa sy i Resefa no zanakalahin’i Beria; i Tela no zanakalahin’i Resefa; i Tahana no zanakalahin’i Tela; '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'i Ladana no zanakalahin’i Tahana; i Amihoda no zanakalahin’i Ladana; i Elisama no zanakalahin’i Amihoda; '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'i Nona no zanakalahin’i Elisama; i Josoa no zanakalahin’i Nona. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ny taniny sy ny fonenany dia i Betela sy ny vohitra miankina aminy; ny any atsinanana dia i Narana, ny any andrefana dia i Gezera sy ny vohitra miankina aminy ary i Sekema sy ny vohitra miankina aminy hatrany Gaza sy ny vohitra miankina aminy; '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: teo amin’ny sisintanin’ny taranak’i Manase dia i Bety-Sana sy ny vohitra miankina aminy, i Tanàka sy ny vohitra miankina aminy, i Megido sy ny vohitra miankina aminy, i Dora sy ny vohitra miankina aminy. Tamin’ireo no nonenan’ny taranak’i Josefa, zanak’Israely.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny taranak’i Asera
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Gen 46.17; Nom 26.44-45
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ny zanakalahin’i Asera dia i Jimna, i Jisva, i Jisvy ary i Beria; ny anabavin’ireo dia i Sera. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ny zanakalahin’i Beria dia i Ebera sy i Malkiela, rain’i Birzaita. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'I Ebera no niteraka an’i Jafleta sy i Somera ary i Hotama; ny anabavin’ireo dia i Soha. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ny zanakalahin’i Jafleta dia i Pasaka, i Bimala ary i Asvata. Ireo no zanakalahin’i Jafleta. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ny zanakalahin’i Semera dia i Ahaia, i Rohaga, i Hoba ary i Arama. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Ny zanakalahin’i Helema rahalahiny dia i Zofa, i Jimna, i Selesy ary i Amala. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Ny zanakalahin’i Zofa dia i Soha, i Harnefera, i Soala, i Bery, i Jimra, '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'i Bazera, i Hoda, i Sama, i Silsa, i Jitirana ary i Bera. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Ny zanakalahin’i Jetera dia i Jefone sy i Pispa ary i Ara. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Ny zanakalahin’i Ola dia i Ara sy i Haniela ary i Rizia. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Ireo zanakalahin’i Asera rehetra ireo dia samy loham-pianakaviany ary olom-boafidy sady mahery ary lehiben’ny loham-pireneny avy. Ny nanisana azy, araka ny firazanany, dia enina arivo sy roa alina; izay no azo nalefa hanafika.
