document_id: 1CH.7,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny taranak’Isakara
  - type: heading
    content: Gen 46.13; Nom 26.23-24; Mpits 10.1
  - type: text
    content: 'Ny zanakalahin’Isakara dia i Tola, i Poa, i Jasoba ary i Simrona; efatra izy ireo. '
  '10':
  - type: text
    content: 'Ny zanakalahin’i Jediaela dia i Bilana; ny zanakalahin’i Bilana dia i Jeosy, i Benjamina, i Ehoda, i Kenana, i Zetana, i Tarsisy ary i Ahisahara. '
  '11':
  - type: text
    content: 'Ireo zanakalahin’i Jediaela rehetra ireo, araka ny loham-pianakaviany, dia roanjato sy fito arivo sy iray alina; ireo no isan’ny lehilahy mahery azo nalefa hanafika. '
  '12':
  - type: text
    content: I Sopima koa sy i Hopima, zanakalahin’Iry, ary i Hosima, zanakalahin’i Ahera.
  - type: heading
    content: Ny taranak’i Naftaly
  - type: heading
    content: Gen 46.24; Nom 26.48-50
  '13':
  - type: text
    content: Ny zanakalahin’i Naftaly dia i Jaziela, i Gonỳ, i Jezera, i Saloma, izay samy zanakalahin’i Bila.
  - type: heading
    content: Ny taranak’i Manase
  '14':
  - type: text
    content: 'Ny zanakalahin’i Manase dia i Asriela, izay naterany tamin’ilay vady tsindranony arameana, izay niteraka an’i Makira, rain’i Gileada. '
  '15':
  - type: text
    content: 'I Makira dia naka vady ho an’i Hopima sy i Sopima; ny anaran’ny rahavaviny dia i Maka; ny anaran’ny manarakaraka dia i Zelofada; ary nanan-janakavavy i Zelofada. '
  '16':
  - type: text
    content: 'Niteraka zazalahy i Maka, vadin’i Makira, ka Peresy no nataony anarany; ary Seresy no anaran’ny rahalahiny; ny anaran’ny zanany lahy dia Olama sy Rekema. '
  '17':
  - type: text
    content: 'Ny zanakalahin’i Olama dia i Bedana. Ireo no zanakalahin’i Gileada, zanakalahin’i Makira, zanakalahin’i Manase. '
  '18':
  - type: text
    content: 'I Hamoleketa anabaviny no niteraka an’i Isehoda sy i Abiezera ary i Mahala. '
  '19':
  - type: text
    content: Ny zanakalahin’i Semida dia i Ahiana, i Sekema, i Liky ary i Aniama.
  - type: heading
    content: Ny taranak’i Efraima
  '2':
  - type: text
    content: 'Ny zanakalahin’i Tola dia i Ozy, i Refaia, i Jeriela, i Jamay, i Jibsama ary i Samoela, samy loham-pianakavian’i Tola ary samy lehilahy mahery tamin’ny fianakaviany avy ireo; eninjato sy roa arivo sy roa alina no isany tamin’ny andron’i Davida. '
  '20':
  - type: text
    content: 'Ny zanakalahin’i Efraima dia i Sotela; i Bereda no zanakalahin’i Sotela; i Tahata no zanakalahin’i Bereda; i Elada no zanakalahin’i Tahata; i Tahata no zanakalahin’i Elada; '
  '21':
  - type: text
    content: 'i Zabada no zanakalahin’i Tahata; i Sotela no zanakalahin’i Zabada. Novonoin’ny tompon-tany tao Gata i Ezera sy i Elada, satria nidina hangalatra ny omby aman’ondriny. '
  '22':
  - type: text
    content: 'Nisaona azy ela i Efraima rainy ary tonga nampionona azy ny rahalahiny. '
  '23':
  - type: text
    content: 'Nony niray tamin’ny vadiny izy dia nanana anaka Ravehivavy ka niteraka zazalahy, ary ny anarany dia nataony hoe Beria, satria nisy fahoriana tao an-tranony tamin’izany. '
  '24':
  - type: text
    content: 'Ny zanany vavy dia i Sera, izay nanorina an’i Bety-Horona ambany sy ambony sy Ozena-Sera. '
  '25':
  - type: text
    content: 'I Refa sy i Resefa no zanakalahin’i Beria; i Tela no zanakalahin’i Resefa; i Tahana no zanakalahin’i Tela; '
  '26':
  - type: text
    content: 'i Ladana no zanakalahin’i Tahana; i Amihoda no zanakalahin’i Ladana; i Elisama no zanakalahin’i Amihoda; '
  '27':
  - type: text
    content: 'i Nona no zanakalahin’i Elisama; i Josoa no zanakalahin’i Nona. '
  '28':
  - type: text
    content: 'Ny taniny sy ny fonenany dia i Betela sy ny vohitra miankina aminy; ny any atsinanana dia i Narana, ny any andrefana dia i Gezera sy ny vohitra miankina aminy ary i Sekema sy ny vohitra miankina aminy hatrany Gaza sy ny vohitra miankina aminy; '
  '29':
  - type: text
    content: teo amin’ny sisintanin’ny taranak’i Manase dia i Bety-Sana sy ny vohitra miankina aminy, i Tanàka sy ny vohitra miankina aminy, i Megido sy ny vohitra miankina aminy, i Dora sy ny vohitra miankina aminy. Tamin’ireo no nonenan’ny taranak’i Josefa, zanak’Israely.
  - type: heading
    content: Ny taranak’i Asera
  - type: heading
    content: Gen 46.17; Nom 26.44-45
  '3':
  - type: text
    content: 'Ny zanakalahin’i Ozy dia i Jizrahia. Ny zanakalahin’i Jizrahia dia i Mikaela, i Obadia, i Joela ary i Jisia; dimy izy ireo; loholona avokoa izy rehetra ireo. '
  '30':
  - type: text
    content: 'Ny zanakalahin’i Asera dia i Jimna, i Jisva, i Jisvy ary i Beria; ny anabavin’ireo dia i Sera. '
  '31':
  - type: text
    content: 'Ny zanakalahin’i Beria dia i Ebera sy i Malkiela, rain’i Birzaita. '
  '32':
  - type: text
    content: 'I Ebera no niteraka an’i Jafleta sy i Somera ary i Hotama; ny anabavin’ireo dia i Soha. '
  '33':
  - type: text
    content: 'Ny zanakalahin’i Jafleta dia i Pasaka, i Bimala ary i Asvata. Ireo no zanakalahin’i Jafleta. '
  '34':
  - type: text
    content: 'Ny zanakalahin’i Semera dia i Ahaia, i Rohaga, i Hoba ary i Arama. '
  '35':
  - type: text
    content: 'Ny zanakalahin’i Helema rahalahiny dia i Zofa, i Jimna, i Selesy ary i Amala. '
  '36':
  - type: text
    content: 'Ny zanakalahin’i Zofa dia i Soha, i Harnefera, i Soala, i Bery, i Jimra, '
  '37':
  - type: text
    content: 'i Bazera, i Hoda, i Sama, i Silsa, i Jitirana ary i Bera. '
  '38':
  - type: text
    content: 'Ny zanakalahin’i Jetera dia i Jefone sy i Pispa ary i Ara. '
  '39':
  - type: text
    content: 'Ny zanakalahin’i Ola dia i Ara sy i Haniela ary i Rizia. '
  '4':
  - type: text
    content: 'Nanana miaramila antokotokony izy araka ny taranany sy ny fianakaviany avy, enina arivo sy telo alina izany; fa maro ny vady aman-janak’ireo. '
  '40':
  - type: text
    content: Ireo zanakalahin’i Asera rehetra ireo dia samy loham-pianakaviany ary olom-boafidy sady mahery ary lehiben’ny loham-pireneny avy. Ny nanisana azy, araka ny firazanany, dia enina arivo sy roa alina; izay no azo nalefa hanafika.
  '5':
  - type: text
    content: Ary ny rahalahiny ao amin’ny fokon’ny Isakara rehetra, izay samy lehilahy mahery, ny isan’izy rehetra araka ny firazanany avy dia fito arivo sy valo alina.
  - type: heading
    content: Ny taranak’i Benjamina
  - type: heading
    content: Gen 46.21; Nom 26.38-39
  '6':
  - type: text
    content: 'Ny zanakalahin’i Benjamina dia i Bela sy i Bekera ary i Jediaela; telo izy ireo. '
  '7':
  - type: text
    content: 'Ny zanakalahin’i Bela dia i Ezbona, i Ozy, i Oziela, i Jerimota ary Iry; dimy izy ireo, ary samy loham-pianakaviany avy sady lehilahy mahery avokoa; ny isany araka ny firazanany dia efatra amby telopolo sy roa arivo sy roa alina. '
  '8':
  - type: text
    content: 'Ny zanakalahin’i Bekera dia i Zemira, i Joasy, i Eliezera, i Elioenay, i Omry, i Jerimota, i Abia, i Anatota ary i Alemeta. Ireo rehetra ireo no zanakalahin’i Bekera. '
  '9':
  - type: text
    content: 'Ny isany araka ny tetiarana, dia ireo loham-pianakaviany avy sady lehilahy mahery, dia roanjato sy roa alina. '
