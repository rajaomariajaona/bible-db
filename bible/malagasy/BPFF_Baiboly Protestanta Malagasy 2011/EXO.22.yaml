document_id: EXO.22,3103
type_code: plt
verses:
  '1':
  - type: text
    content: 'Raha tratra mamaky trano ny mpangalatra ka vonoina ho faty dia tsy hisy valin-dra amin’izany; '
  '10':
  - type: text
    content: 'dia fianianana amin’NY TOMPO no hitsarana azy roa tonta, mba hahafantarana na efa nanatsotra ny tanany ka naka ny fananan’ny namany ilay iray na tsia; ary heken’ny tompony izany fa tsy hisy onitra. '
  '11':
  - type: text
    content: 'Nefa raha nangalarina tany aminy tokoa ilay biby dia hanonitra ho an’ny tompon-javatra izy. '
  '12':
  - type: text
    content: Raha voaviraviram-biby kosa dia hitondra azy ho vavolombelona izy fa tsy hanonitra izay voaviravira akory.
  '13':
  - type: text
    content: 'Ary raha misy olona mindrana biby amin’ny namany ka tapaka na maty io, nefa tsy teo ny tompony, dia hanonitra tokoa izy. '
  '14':
  - type: text
    content: Fa raha teo ihany ny tompony dia tsy hanonitra izy; ary raha biby nofaina kosa dia vitan’ny hofany ihany.
  '15':
  - type: text
    content: 'Raha misy olona mitaona tovovavy izay tsy voafofo ka mandry aminy dia hanome harena azy izy mba ho vadiny. '
  '16':
  - type: text
    content: Fa raha tena mandà ny rainy ka tsy manome azy ho vadiny dia handoa vola Ralehilahy araka ny harena fanome ny zazavavy hampakarina.
  - type: heading
    content: Lalàna samihafa momba ny fitondrantena sy ny fivavahana
  '17':
  - type: text
    content: Aza avela ho velona ny vehivavy mamosavy.
  '18':
  - type: text
    content: Izay rehetra mandry amin’ny biby dia hovonoina ho faty.
  '19':
  - type: text
    content: Izay mamono zavatra hatao fanatitra amin’ny andriamanitra hafa, afa-tsy amin’NY TOMPO ihany, dia ho voaozona.
  '2':
  - type: text
    content: 'fa raha tratra amin’ny masoandro miposaka kosa izy dia hisy valin-dra ihany amin’izany. Hanonitra tokoa izy; ary raha tsy manana na inona na inona izy dia hamidy noho ny halatra nataony. '
  '20':
  - type: text
    content: Aza mampijaly ny vahiny na mampahory azy, fa efa mba vahiny tany amin’ny tany Ejipta ihany ianareo.
  '21':
  - type: text
    content: 'Aza mampahory ny mpitondratena sy ny kamboty. '
  '22':
  - type: text
    content: 'Fa raha mampijaly azy na amin’inona na amin’inona ianareo ka mitaraina Amiko izy dia hihaino ny fitarainany tokoa Aho, '
  '23':
  - type: text
    content: ary hirehitra ny fahatezerako ka hamono anareo amin’ny sabatra Aho, mba ho mpitondratena ny vadinareo ary ho kamboty ny zanakareo.
  '24':
  - type: text
    content: Raha mampisambo-bola amin’ny oloko izay mahantra eo aminao ianao dia tsy ho toy ny mpampanjana-bola aminy, fa tsy hampandoavinao zana-bola izy.
  '25':
  - type: text
    content: 'Raha maka ny lamban’ny namanao ho antoka ianao dia haverinao aminy izany raha mbola tsy milentika ny masoandro. '
  '26':
  - type: text
    content: Fa izany ihany no mba firakofany sady fitafiany eny an-kodiny, koa inona no hoentiny mandry? Ary raha mitaraina Amiko izy dia hohenoiko, fa mamindra fo Aho.
  '27':
  - type: text
    content: Aza miteny ratsy an’Andriamanitra ianao, na manozona izay olona ambony eo amin’ny firenenao.
  '28':
  - type: text
    content: Aza miandry ela vao manatitra ny santatry ny vokatrao sy ny fisotronao. Omeo Ahy ny matoa amin’ny zanakao lahy.
  '29':
  - type: text
    content: 'Izao no hataonao amin’ny ombinao sy ny ondry aman’osinao: Hafitoana no hitoerany ao amin’ny reniny, ary amin’ny andro fahavalo no hanateranao azy ho Ahy.'
  '3':
  - type: text
    content: Raha hita marina ao aminy ny halatra, ary mbola velona, na omby, na boriky, na ondry, na osy izany, dia hanonitra avo roa heny izy.
  - type: heading
    content: Heloka momba ny fananana
  '30':
  - type: text
    content: Ho olona masina ho Ahy ianareo, koa izay hena voaviraviram-biby any an-tsaha dia tsy hohaninareo fa harianareo ho an’ny amboa.
  '4':
  - type: text
    content: Raha misy olona mampitondraka amin’ny voly na amin’ny tanim-boaloboka, satria nalefany nandeha ny bibiny dia nihinana ny volin’olona, dia amin’izay tsara indrindra ao amin’ny sahany, ary amin’izay tsara indrindra ao amin’ny tanim-boalobony no hanonerany.
  '5':
  - type: text
    content: Raha misy afo mirehitra ka mahazo ny tsilo ary may ny antontam-bary, na ny vary maniry, na ny saha, dia hanonitra tokoa izay nampirehitra ny afo.
  '6':
  - type: text
    content: 'Raha misy olona mampitahiry vola na fanaka ny namany ka angalarin’ny sasany ao amin’ny tranon’ilay olona ilay izy, raha hita ilay mpangalatra dia hanonitra avo roa heny izy. '
  '7':
  - type: text
    content: Fa raha tsy hita kosa ilay mpangalatra dia hoentina eo anatrehan’Andriamanitra ny tompon’ny trano mba hahafantarana na nanatsotra ny tanany naka ny fananan’ny namany izy na tsia.
  '8':
  - type: text
    content: 'Ny amin’ny zavatra ifandirana rehetra, na omby, na boriky, na ondry, na osy, na fitafiana, na zavatra very lazain’olona hoe: Ity no izy, dia hoentina eo anatrehan’Andriamanitra ny tenin’izy roa tonta, koa izay hohelohin’Andriamanitra dia hanonitra roa heny ho an’ny namany.'
  '9':
  - type: text
    content: 'Raha misy olona mampitahiry ny namany boriky, na omby, na ondry, na osy, na biby fiompy hafa ka maty io, na maratra, na nisy nandroaka nefa tsy nisy nahita, '
