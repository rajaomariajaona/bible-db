document_id: EXO.22
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Raha tratra mamaky trano ny mpangalatra ka vonoina ho faty dia tsy hisy valin-dra amin’izany; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'fa raha tratra amin’ny masoandro miposaka kosa izy dia hisy valin-dra ihany amin’izany. Hanonitra tokoa izy; ary raha tsy manana na inona na inona izy dia hamidy noho ny halatra nataony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Raha hita marina ao aminy ny halatra, ary mbola velona, na omby, na boriky, na ondry, na osy izany, dia hanonitra avo roa heny izy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Heloka momba ny fananana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Raha misy olona mampitondraka amin’ny voly na amin’ny tanim-boaloboka, satria nalefany nandeha ny bibiny dia nihinana ny volin’olona, dia amin’izay tsara indrindra ao amin’ny sahany, ary amin’izay tsara indrindra ao amin’ny tanim-boalobony no hanonerany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Raha misy afo mirehitra ka mahazo ny tsilo ary may ny antontam-bary, na ny vary maniry, na ny saha, dia hanonitra tokoa izay nampirehitra ny afo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Raha misy olona mampitahiry vola na fanaka ny namany ka angalarin’ny sasany ao amin’ny tranon’ilay olona ilay izy, raha hita ilay mpangalatra dia hanonitra avo roa heny izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Fa raha tsy hita kosa ilay mpangalatra dia hoentina eo anatrehan’Andriamanitra ny tompon’ny trano mba hahafantarana na nanatsotra ny tanany naka ny fananan’ny namany izy na tsia.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ny amin’ny zavatra ifandirana rehetra, na omby, na boriky, na ondry, na osy, na fitafiana, na zavatra very lazain’olona hoe: Ity no izy, dia hoentina eo anatrehan’Andriamanitra ny tenin’izy roa tonta, koa izay hohelohin’Andriamanitra dia hanonitra roa heny ho an’ny namany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Raha misy olona mampitahiry ny namany boriky, na omby, na ondry, na osy, na biby fiompy hafa ka maty io, na maratra, na nisy nandroaka nefa tsy nisy nahita, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'dia fianianana amin’NY TOMPO no hitsarana azy roa tonta, mba hahafantarana na efa nanatsotra ny tanany ka naka ny fananan’ny namany ilay iray na tsia; ary heken’ny tompony izany fa tsy hisy onitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Nefa raha nangalarina tany aminy tokoa ilay biby dia hanonitra ho an’ny tompon-javatra izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Raha voaviraviram-biby kosa dia hitondra azy ho vavolombelona izy fa tsy hanonitra izay voaviravira akory.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary raha misy olona mindrana biby amin’ny namany ka tapaka na maty io, nefa tsy teo ny tompony, dia hanonitra tokoa izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Fa raha teo ihany ny tompony dia tsy hanonitra izy; ary raha biby nofaina kosa dia vitan’ny hofany ihany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Raha misy olona mitaona tovovavy izay tsy voafofo ka mandry aminy dia hanome harena azy izy mba ho vadiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Fa raha tena mandà ny rainy ka tsy manome azy ho vadiny dia handoa vola Ralehilahy araka ny harena fanome ny zazavavy hampakarina.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Lalàna samihafa momba ny fitondrantena sy ny fivavahana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Aza avela ho velona ny vehivavy mamosavy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Izay rehetra mandry amin’ny biby dia hovonoina ho faty.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Izay mamono zavatra hatao fanatitra amin’ny andriamanitra hafa, afa-tsy amin’NY TOMPO ihany, dia ho voaozona.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Aza mampijaly ny vahiny na mampahory azy, fa efa mba vahiny tany amin’ny tany Ejipta ihany ianareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Aza mampahory ny mpitondratena sy ny kamboty. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Fa raha mampijaly azy na amin’inona na amin’inona ianareo ka mitaraina Amiko izy dia hihaino ny fitarainany tokoa Aho, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ary hirehitra ny fahatezerako ka hamono anareo amin’ny sabatra Aho, mba ho mpitondratena ny vadinareo ary ho kamboty ny zanakareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Raha mampisambo-bola amin’ny oloko izay mahantra eo aminao ianao dia tsy ho toy ny mpampanjana-bola aminy, fa tsy hampandoavinao zana-bola izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Raha maka ny lamban’ny namanao ho antoka ianao dia haverinao aminy izany raha mbola tsy milentika ny masoandro. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Fa izany ihany no mba firakofany sady fitafiany eny an-kodiny, koa inona no hoentiny mandry? Ary raha mitaraina Amiko izy dia hohenoiko, fa mamindra fo Aho.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Aza miteny ratsy an’Andriamanitra ianao, na manozona izay olona ambony eo amin’ny firenenao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Aza miandry ela vao manatitra ny santatry ny vokatrao sy ny fisotronao. Omeo Ahy ny matoa amin’ny zanakao lahy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Izao no hataonao amin’ny ombinao sy ny ondry aman’osinao: Hafitoana no hitoerany ao amin’ny reniny, ary amin’ny andro fahavalo no hanateranao azy ho Ahy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Ho olona masina ho Ahy ianareo, koa izay hena voaviraviram-biby any an-tsaha dia tsy hohaninareo fa harianareo ho an’ny amboa.
