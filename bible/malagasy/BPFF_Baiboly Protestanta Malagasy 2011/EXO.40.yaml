document_id: EXO.40
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Torolalana momba ny fanokanana ny tabernakely
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary NY TOMPO niteny tamin’i Mosesy hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Amin’ny andro voalohany amin’ny volana voalohany dia atsangano ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tabernakely
  - type: text
    text: ' na ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tranolay fihaonana
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ataovy ao ny vata misy ny Vavolombelona; dia ahantòny ny efitra lamba hanakona ny vata. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ento ny latabatra ka alaharo izay eo amboniny; ento koa ny fitoeran-jiro ka ampireheto ny jiro. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ny alitara volamena fandoroana ditin-kazo manitra dia ataovy eo anoloan’ny vata misy ny Vavolombelona, ary ny varavarana lamba dia apetaho eo amin’ny varavaran’ny tabernakely. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ny alitara fandoroana ny fanatitra dorana manontolo dia apetraho eo anoloan’ny tabernakely na ny tranolay fihaonana. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Apetraho eo anelanelan’ny tranolay fihaonana sy ny alitara ny koveta dia asio rano ao anatiny. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Dia amboary ny kianja manodidina ka ahantòny ny vavahady lamba eo amin’ny vavahadin’ny kianja.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Avy eo dia alao ny diloilo fanosorana ka hosory ny tabernakely sy izay rehetra ao, ary hamasino miaraka amin’ny fanaka rehetra momba azy ka ho masina izany. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Hosory ny alitara fandoroana ny fanatitra dorana manontolo sy ny fanaka rehetra momba azy; hamasino ny alitara dia ho masina indrindra. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Hosory ny koveta sy ny faladiany ka hamasino izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Dia ampanatony i Arona sy ireo zanany hankeo anoloan’ny varavaran’ny tranolay fihaonana ka ampandroy amin’ny rano. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Avy eo dia ampiakanjoy an’i Arona ny fitafiana masina ary hosory sy hamasino izy mba hanao ny fanompoam-pisoronana ho Ahy. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ampanatony ireo zanany ka ampiakanjoy azy ny akanjo lava. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Dia hosory izy ireo, tahaka ny nanosoranao ny rainy, mba hanao fanompoam-pisoronana ho Ahy. Izany fanosorana azy ireo izany dia ho fisoronana maharitra hatramin’ny taranany fara aman-dimby. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Dia nataon’i Mosesy izany, araka izay rehetra nandidian’NY TOMPO azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Tamin’ny andro voalohany tamin’ny volana voalohany tamin’ny taona faharoa no nananganana ny tabernakely.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Manangana ny tabernakely i Mosesy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Nanangana ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tabernakely
  - type: text
    text: ' i Mosesy; napetrany ny faladiany ary natsangany ny hazofisaka momba azy dia nampidiriny ny barany ary natsangany ny andriny. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Novelariny teo ambonin’ny tabernakely koa ny lay ary nataony teo amboniny ny rakotry ny tranolay, araka izay nandidian’NY TOMPO azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Dia nalainy ny Vavolombelona ka napetrany tao anatin’ny vata, ary ny bao dia nataony teo amin’ny vata, ny rakotra fanaovam-panavotana indray dia napetrany teo ambonin’ny vata. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ary ny vata dia nampidiriny tao amin’ny tabernakely ka nahantony ny efitra lamba fanakonana mba hanakona ny vata misy ny Vavolombelona, araka izay nandidian’NY TOMPO an’i Mosesy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Napetrany tao amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tranolay fihaonana
  - type: text
    text: ' ny latabatra, teo amin’ny lafiny avaratra amin’ny tabernakely, teo ivelan’ny efitra lamba. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ary nandahatra mofo teo amboniny teo anatrehan’NY TOMPO izy, araka izay nandidian’NY TOMPO an’i Mosesy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ny fitoeran-jiro dia napetrany tao amin’ny tranolay fihaonana, tandrifin’ny latabatra, teo amin’ny lafiny atsimo amin’ny tabernakely. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Dia nampirehitra ireo jiro teo anatrehan’NY TOMPO izy, araka izay nandidian’NY TOMPO azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ny alitara volamena dia nataony tao amin’ny tranolay fihaonana, teo anoloan’ny efitra lamba, '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ary nandoro ditin-kazo mani-pofona teo izy, araka izay nandidian’NY TOMPO an’i Mosesy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Nataony teo amin’ny varavaran’ny tabernakely ny varavarana lamba. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Ny alitara fandoroana ny fanatitra dorana manontolo kosa dia napetrany teo anoloan’ny varavaran’ny tabernakely na ny tranolay fihaonana, ary nateriny teo ambonin’io ny fanatitra dorana manontolo sy ny fanatitra avy amin’ny zavamaniry, araka izay nandidian’NY TOMPO an’i Mosesy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ny koveta dia nataony teo anelanelan’ny tranolay fihaonana sy ny alitara ka nasiany rano ho fidiovana tao anatiny. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Teo no nanadiovan’i Mosesy sy i Arona ary ireo zanany ny tongony aman-tanany. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Rehefa niditra ao amin’ny tranolay fihaonana mantsy izy ireo ka nanakaiky ny alitara dia nisasa, araka izay nandidian’NY TOMPO an’i Mosesy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Natsangany koa ny kianja manodidina ny tabernakely sy ny alitara ka ny vavahady lamba dia nataony teo amin’ny vavahadin’ny kianja. Dia vitan’i Mosesy ny asa rehetra.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nameno ny tabernakely ny voninahitry NY TOMPO
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ary nanarona ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tranolay fihaonana
  - type: text
    text: ' ny rahona, ary ny voninahitry NY TOMPO dia nameno ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tabernakely
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Tsy afaka niditra tao amin’ny tranolay fihaonana i Mosesy satria ny rahona dia nitoetra teo amboniny, ary ny voninahitry NY TOMPO dia nameno ny tabernakely.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Rehefa niakatra niala tamin’ny tabernakely ny rahona dia niainga ho amin’izay lalana halehany ny Zanak’Israely. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Fa raha tsy niakatra kosa ny rahona dia tsy niainga izy, mandra-piavin’izay andro hiakarany indray. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Fa ny rahon’NY TOMPO dia teo ambonin’ny tabernakely nony andro ary nisy afo teo aminy nony alina, teo imason’ny taranak’Israely rehetra, tamin’ny toerana rehetra nalehany.
