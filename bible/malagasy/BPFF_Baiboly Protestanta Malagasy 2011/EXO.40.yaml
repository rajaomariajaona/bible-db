document_id: EXO.40,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Torolalana momba ny fanokanana ny tabernakely
  - type: text
    content: 'Ary NY TOMPO niteny tamin’i Mosesy hoe: '
  '10':
  - type: text
    content: 'Hosory ny alitara fandoroana ny fanatitra dorana manontolo sy ny fanaka rehetra momba azy; hamasino ny alitara dia ho masina indrindra. '
  '11':
  - type: text
    content: Hosory ny koveta sy ny faladiany ka hamasino izany.
  '12':
  - type: text
    content: 'Dia ampanatony i Arona sy ireo zanany hankeo anoloan’ny varavaran’ny tranolay fihaonana ka ampandroy amin’ny rano. '
  '13':
  - type: text
    content: 'Avy eo dia ampiakanjoy an’i Arona ny fitafiana masina ary hosory sy hamasino izy mba hanao ny fanompoam-pisoronana ho Ahy. '
  '14':
  - type: text
    content: 'Ampanatony ireo zanany ka ampiakanjoy azy ny akanjo lava. '
  '15':
  - type: text
    content: 'Dia hosory izy ireo, tahaka ny nanosoranao ny rainy, mba hanao fanompoam-pisoronana ho Ahy. Izany fanosorana azy ireo izany dia ho fisoronana maharitra hatramin’ny taranany fara aman-dimby. '
  '16':
  - type: text
    content: Dia nataon’i Mosesy izany, araka izay rehetra nandidian’NY TOMPO azy.
  '17':
  - type: text
    content: Tamin’ny andro voalohany tamin’ny volana voalohany tamin’ny taona faharoa no nananganana ny tabernakely.
  - type: heading
    content: Manangana ny tabernakely i Mosesy
  '18':
  - type: text
    content: 'Nanangana ny '
  - type: text
    content: tabernakely
  - type: text
    content: ' i Mosesy; napetrany ny faladiany ary natsangany ny hazofisaka momba azy dia nampidiriny ny barany ary natsangany ny andriny. '
  '19':
  - type: text
    content: Novelariny teo ambonin’ny tabernakely koa ny lay ary nataony teo amboniny ny rakotry ny tranolay, araka izay nandidian’NY TOMPO azy.
  '2':
  - type: text
    content: 'Amin’ny andro voalohany amin’ny volana voalohany dia atsangano ny '
  - type: text
    content: tabernakely
  - type: text
    content: ' na ny '
  - type: text
    content: tranolay fihaonana
  - type: text
    content: '. '
  '20':
  - type: text
    content: 'Dia nalainy ny Vavolombelona ka napetrany tao anatin’ny vata, ary ny bao dia nataony teo amin’ny vata, ny rakotra fanaovam-panavotana indray dia napetrany teo ambonin’ny vata. '
  '21':
  - type: text
    content: Ary ny vata dia nampidiriny tao amin’ny tabernakely ka nahantony ny efitra lamba fanakonana mba hanakona ny vata misy ny Vavolombelona, araka izay nandidian’NY TOMPO an’i Mosesy.
  '22':
  - type: text
    content: 'Napetrany tao amin’ny '
  - type: text
    content: tranolay fihaonana
  - type: text
    content: ' ny latabatra, teo amin’ny lafiny avaratra amin’ny tabernakely, teo ivelan’ny efitra lamba. '
  '23':
  - type: text
    content: Ary nandahatra mofo teo amboniny teo anatrehan’NY TOMPO izy, araka izay nandidian’NY TOMPO an’i Mosesy.
  '24':
  - type: text
    content: 'Ny fitoeran-jiro dia napetrany tao amin’ny tranolay fihaonana, tandrifin’ny latabatra, teo amin’ny lafiny atsimo amin’ny tabernakely. '
  '25':
  - type: text
    content: Dia nampirehitra ireo jiro teo anatrehan’NY TOMPO izy, araka izay nandidian’NY TOMPO azy.
  '26':
  - type: text
    content: 'Ny alitara volamena dia nataony tao amin’ny tranolay fihaonana, teo anoloan’ny efitra lamba, '
  '27':
  - type: text
    content: ary nandoro ditin-kazo mani-pofona teo izy, araka izay nandidian’NY TOMPO an’i Mosesy.
  '28':
  - type: text
    content: 'Nataony teo amin’ny varavaran’ny tabernakely ny varavarana lamba. '
  '29':
  - type: text
    content: Ny alitara fandoroana ny fanatitra dorana manontolo kosa dia napetrany teo anoloan’ny varavaran’ny tabernakely na ny tranolay fihaonana, ary nateriny teo ambonin’io ny fanatitra dorana manontolo sy ny fanatitra avy amin’ny zavamaniry, araka izay nandidian’NY TOMPO an’i Mosesy.
  '3':
  - type: text
    content: 'Ataovy ao ny vata misy ny Vavolombelona; dia ahantòny ny efitra lamba hanakona ny vata. '
  '30':
  - type: text
    content: 'Ny koveta dia nataony teo anelanelan’ny tranolay fihaonana sy ny alitara ka nasiany rano ho fidiovana tao anatiny. '
  '31':
  - type: text
    content: 'Teo no nanadiovan’i Mosesy sy i Arona ary ireo zanany ny tongony aman-tanany. '
  '32':
  - type: text
    content: Rehefa niditra ao amin’ny tranolay fihaonana mantsy izy ireo ka nanakaiky ny alitara dia nisasa, araka izay nandidian’NY TOMPO an’i Mosesy.
  '33':
  - type: text
    content: Natsangany koa ny kianja manodidina ny tabernakely sy ny alitara ka ny vavahady lamba dia nataony teo amin’ny vavahadin’ny kianja. Dia vitan’i Mosesy ny asa rehetra.
  - type: heading
    content: Nameno ny tabernakely ny voninahitry NY TOMPO
  '34':
  - type: text
    content: 'Ary nanarona ny '
  - type: text
    content: tranolay fihaonana
  - type: text
    content: ' ny rahona, ary ny voninahitry NY TOMPO dia nameno ny '
  - type: text
    content: tabernakely
  - type: text
    content: '. '
  '35':
  - type: text
    content: Tsy afaka niditra tao amin’ny tranolay fihaonana i Mosesy satria ny rahona dia nitoetra teo amboniny, ary ny voninahitry NY TOMPO dia nameno ny tabernakely.
  '36':
  - type: text
    content: 'Rehefa niakatra niala tamin’ny tabernakely ny rahona dia niainga ho amin’izay lalana halehany ny Zanak’Israely. '
  '37':
  - type: text
    content: 'Fa raha tsy niakatra kosa ny rahona dia tsy niainga izy, mandra-piavin’izay andro hiakarany indray. '
  '38':
  - type: text
    content: Fa ny rahon’NY TOMPO dia teo ambonin’ny tabernakely nony andro ary nisy afo teo aminy nony alina, teo imason’ny taranak’Israely rehetra, tamin’ny toerana rehetra nalehany.
  '4':
  - type: text
    content: 'Ento ny latabatra ka alaharo izay eo amboniny; ento koa ny fitoeran-jiro ka ampireheto ny jiro. '
  '5':
  - type: text
    content: 'Ny alitara volamena fandoroana ditin-kazo manitra dia ataovy eo anoloan’ny vata misy ny Vavolombelona, ary ny varavarana lamba dia apetaho eo amin’ny varavaran’ny tabernakely. '
  '6':
  - type: text
    content: 'Ny alitara fandoroana ny fanatitra dorana manontolo dia apetraho eo anoloan’ny tabernakely na ny tranolay fihaonana. '
  '7':
  - type: text
    content: 'Apetraho eo anelanelan’ny tranolay fihaonana sy ny alitara ny koveta dia asio rano ao anatiny. '
  '8':
  - type: text
    content: Dia amboary ny kianja manodidina ka ahantòny ny vavahady lamba eo amin’ny vavahadin’ny kianja.
  '9':
  - type: text
    content: 'Avy eo dia alao ny diloilo fanosorana ka hosory ny tabernakely sy izay rehetra ao, ary hamasino miaraka amin’ny fanaka rehetra momba azy ka ho masina izany. '
