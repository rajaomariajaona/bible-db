document_id: PSA.143,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Aza mifandahatra amiko eo am-pitsarana
  - type: text
    content: Salamo nataon’i Davida.
  - type: text
    content: TOMPO ô, henoy ny vavaka ataoko
  - type: text
    content: ary atongilano amin’ny fifonako ny sofinao;
  - type: text
    content: valio araka ny teninao marina sy ny fahamarinanao aho.
  '10':
  - type: text
    content: Ampianaro hanao ny sitraponao aho
  - type: text
    content: fa Ianao no Andriamanitro;
  - type: text
    content: aoka ny Fanahinao tsara no hitarihanao ahy amin’izay tany marina.
  '11':
  - type: text
    content: Noho ny anaranao, TOMPO ô, dia velomy aho;
  - type: text
    content: araka ny fahamarinanao dia avoahy ho afaka amin’ny fahoriana ny fanahiko.
  '12':
  - type: text
    content: Ary araka ny famindramponao dia fongory ny fahavaloko
  - type: text
    content: ka aringano izay rehetra mampahory ny fanahiko
  - type: text
    content: fa mpanomponao aho.
  '2':
  - type: text
    content: Aza dia mifandahatra amin’ny mpanomponao eo am-pitsarana
  - type: text
    content: fa tsy misy olombelona ho marina eo anatrehanao.
  '3':
  - type: text
    content: Fa nanenjika ny fanahiko ny fahavalo;
  - type: text
    content: namely ny aiko ho lavo tamin’ny tany izy;
  - type: text
    content: nampitoeriny tao amin’ny maizina aho,
  - type: text
    content: toy izay efa maty ela.
  '4':
  - type: text
    content: Dia reraka ny fanahiko ato anatiko;
  - type: text
    content: fadiranovana ny foko ato anatiko.
  '5':
  - type: text
    content: Mahatsiaro ny andro fahiny aho
  - type: text
    content: ary misaina ny asanao rehetra;
  - type: text
    content: ny asan’ny tananao no eritreretiko.
  '6':
  - type: text
    content: Manandra-tanana Aminao aho;
  - type: text
    content: 'ny fanahiko dia tahaka ny tany mangentana eo anatrehanao. '
  - type: text
    content: Fiatoana.
  '7':
  - type: text
    content: Faingàna hamaly ahy, TOMPO ô,
  - type: text
    content: fa reraka ny fanahiko.
  - type: text
    content: Aza manafina ny tavanao amiko,
  - type: text
    content: fandrao ho tahaka izay midina any am-pasana aho.
  '8':
  - type: text
    content: Ampandreneso ny famindramponao aho
  - type: text
    content: nony maraina
  - type: text
    content: fa Ianao no itokiako.
  - type: text
    content: Ampahalalao ahy izay lalana tokony halehako
  - type: text
    content: fa Aminao no anandratako ny fanahiko.
  '9':
  - type: text
    content: TOMPO ô, afaho amin’ny fahavaloko aho;
  - type: text
    content: ao Aminao no iereko.
