document_id: PSA.143
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Aza mifandahatra amiko eo am-pitsarana
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: Salamo nataon’i Davida.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: TOMPO ô, henoy ny vavaka ataoko
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary atongilano amin’ny fifonako ny sofinao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: valio araka ny teninao marina sy ny fahamarinanao aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Aza dia mifandahatra amin’ny mpanomponao eo am-pitsarana
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa tsy misy olombelona ho marina eo anatrehanao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Fa nanenjika ny fanahiko ny fahavalo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: namely ny aiko ho lavo tamin’ny tany izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: nampitoeriny tao amin’ny maizina aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: toy izay efa maty ela.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Dia reraka ny fanahiko ato anatiko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fadiranovana ny foko ato anatiko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Mahatsiaro ny andro fahiny aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary misaina ny asanao rehetra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny asan’ny tananao no eritreretiko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Manandra-tanana Aminao aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ny fanahiko dia tahaka ny tany mangentana eo anatrehanao. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Fiatoana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Faingàna hamaly ahy, TOMPO ô,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa reraka ny fanahiko.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aza manafina ny tavanao amiko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fandrao ho tahaka izay midina any am-pasana aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ampandreneso ny famindramponao aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: nony maraina
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa Ianao no itokiako.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ampahalalao ahy izay lalana tokony halehako
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa Aminao no anandratako ny fanahiko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: TOMPO ô, afaho amin’ny fahavaloko aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ao Aminao no iereko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ampianaro hanao ny sitraponao aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa Ianao no Andriamanitro;
- type: usfm
  marker: q1
  children:
  - type: text
    text: aoka ny Fanahinao tsara no hitarihanao ahy amin’izay tany marina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Noho ny anaranao, TOMPO ô, dia velomy aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: araka ny fahamarinanao dia avoahy ho afaka amin’ny fahoriana ny fanahiko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ary araka ny famindramponao dia fongory ny fahavaloko
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka aringano izay rehetra mampahory ny fanahiko
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa mpanomponao aho.
