document_id: PSA.52,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny loza hanjo izay mitoky amin’ny harena
  - type: text
    content: 'Ho an’ny mpiventy hira. Maskila nataon’i Davida, fony tonga i Doega edomita ka nilaza tamin’i Saoly hoe: Tonga ao an-tranon’i Ahimeleka i Davida.'
  - type: text
    content: Nahoana no mandoka tena amin’ny fanaovan-dratsy ianao, ry ilay mahery?
  - type: text
    content: Ny famindrampon’Andriamanitra dia maharitra amin’ny andro rehetra.
  '2':
  - type: text
    content: Loza no foronin’ny lelanao
  - type: text
    content: tahaka ny hareza maranitra, ry mpanao fitaka!
  '3':
  - type: text
    content: Tia ny ratsy noho ny tsara ianao
  - type: text
    content: 'ary ny lainga noho ny miteny ny marina. '
  - type: text
    content: Fiatoana.
  '4':
  - type: text
    content: Ny teny mandripaka rehetra no tianao, ry lela mamitaka.
  '5':
  - type: text
    content: Andriamanitra kosa hanongana anao mandrakizay;
  - type: text
    content: hisambotra anao sy hanongotra anao hiala ao an-day Izy
  - type: text
    content: 'ary hamongotra anao tsy ho eo amin’ny tanin’ny velona. '
  - type: text
    content: Fiatoana.
  '6':
  - type: text
    content: Hijery ny marina dia hatahotra
  - type: text
    content: 'ka hihomehy azy hoe:'
  '7':
  - type: text
    content: Indro ny lehilahy izay tsy nanao an’Andriamanitra ho heriny
  - type: text
    content: fa natoky ny haben’ny harenany ka nikikitra tamin’ny faharatsiany.
  '8':
  - type: text
    content: Fa izaho dia tahaka ny hazo oliva maitso ao amin’ny tranon’Andriamanitra.
  - type: text
    content: Matoky ny famindrampon’Andriamanitra mandrakizay doria aho.
  '9':
  - type: text
    content: Hidera Anao mandrakizay aho satria Ianao no nanao izany,
  - type: text
    content: ary hanantena ny anaranao aho, eo anatrehan’ny olonao masina, satria tsara Ianao.
