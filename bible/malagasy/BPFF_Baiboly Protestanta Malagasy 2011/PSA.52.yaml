document_id: PSA.52
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny loza hanjo izay mitoky amin’ny harena
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: 'Ho an’ny mpiventy hira. Maskila nataon’i Davida, fony tonga i Doega edomita ka nilaza tamin’i Saoly hoe: Tonga ao an-tranon’i Ahimeleka i Davida.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Nahoana no mandoka tena amin’ny fanaovan-dratsy ianao, ry ilay mahery?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny famindrampon’Andriamanitra dia maharitra amin’ny andro rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Loza no foronin’ny lelanao
- type: usfm
  marker: q1
  children:
  - type: text
    text: tahaka ny hareza maranitra, ry mpanao fitaka!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Tia ny ratsy noho ny tsara ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ary ny lainga noho ny miteny ny marina. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Fiatoana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ny teny mandripaka rehetra no tianao, ry lela mamitaka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Andriamanitra kosa hanongana anao mandrakizay;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hisambotra anao sy hanongotra anao hiala ao an-day Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ary hamongotra anao tsy ho eo amin’ny tanin’ny velona. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Fiatoana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Hijery ny marina dia hatahotra
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ka hihomehy azy hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Indro ny lehilahy izay tsy nanao an’Andriamanitra ho heriny
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa natoky ny haben’ny harenany ka nikikitra tamin’ny faharatsiany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Fa izaho dia tahaka ny hazo oliva maitso ao amin’ny tranon’Andriamanitra.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Matoky ny famindrampon’Andriamanitra mandrakizay doria aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Hidera Anao mandrakizay aho satria Ianao no nanao izany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hanantena ny anaranao aho, eo anatrehan’ny olonao masina, satria tsara Ianao.
