      text: Tsy mirehareha ny foko
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: Hira fanao amin’ny fiakarana. Nataon’i Davida.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: TOMPO ô, tsy mirehareha ny foko ary tsy miandranandrana ny masoko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy misaintsaina izay zavatra ambony loatra aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na izay saro-pantarina tsy takatro.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa tony sady mangina tsara ny fanahiko ato anatiko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tahaka ny zaza eo amin’ny reniny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, tahaka ny zazakely eo amin’ny reniny ny fanahiko.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ry Israely ô, manantenà NY TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hatramin’izao ka ho mandrakizay.
