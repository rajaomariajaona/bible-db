document_id: PSA.131,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Tsy mirehareha ny foko
  - type: text
    content: Hira fanao amin’ny fiakarana. Nataon’i Davida.
  - type: text
    content: TOMPO ô, tsy mirehareha ny foko ary tsy miandranandrana ny masoko;
  - type: text
    content: tsy misaintsaina izay zavatra ambony loatra aho,
  - type: text
    content: na izay saro-pantarina tsy takatro.
  '2':
  - type: text
    content: Fa tony sady mangina tsara ny fanahiko ato anatiko;
  - type: text
    content: tahaka ny zaza eo amin’ny reniny
  - type: text
    content: eny, tahaka ny zazakely eo amin’ny reniny ny fanahiko.
  '3':
  - type: text
    content: Ry Israely ô, manantenà NY TOMPO,
  - type: text
    content: hatramin’izao ka ho mandrakizay.
