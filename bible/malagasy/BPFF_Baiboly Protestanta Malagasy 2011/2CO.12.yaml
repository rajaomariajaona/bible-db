document_id: 2CO.12,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Fahitana sy fanambaràna nomena an’i Paoly
  - type: text
    content: 'Tsy maintsy mirehareha aho, na dia tsy mahasoa aza izany; fa handroso hilaza fahitana sy fanambaran’ny Tompo aho. '
  '10':
  - type: text
    content: Koa dia finaritra aho amin’ny fahalemena, amin’ny fampahoriana, amin’ny fahaterena, amin’ny fanenjehana, amin’ny tebiteby, noho ny amin’i Kristy; fa ny fahalemeko no fahatanjahako.
  - type: heading
    content: Ny ahiahin’i Paoly ny amin’ny Korintiana
  '11':
  - type: text
    content: 'Efa tonga adala aho! Ianareo no nanery ahy; fa tokony hoderainareo aho satria tsy latsaka noho ireo apostoly malaza ireo aho na dia tsinontsinona aza. '
  '12':
  - type: text
    content: 'Ny famantarana maha apostoly ahy dia natao teo aminareo tokoa tamin’ny faharetana isan-karazany, tamin’ny famantarana, tamin’ny asa lehibe ary tamin’ny fahagagana. '
  '13':
  - type: text
    content: Fa inona moa no nahalatsaka anareo noho ny fiangonana
  - type: note
    content: 'Na: eklesia.'
  - type: text
    content: ' hafa afa-tsy ny tsy namakiako tratra anareo? Mamelà ahy amin’izany fahadisoana izany.'
  '14':
  - type: text
    content: 'Indro, efa fanintelony izao no nivonona hankaty aminareo aho nefa tsy hahavaky tratra anareo; ary tsy ny fanananareo no tadiaviko fa ianareo. Tsy ny zanaka no tokony hihary ho an’ny ray aman-dreniny fa ny ray aman-dreniny no tokony hihary ho an’ny zanany. '
  '15':
  - type: text
    content: Ary izaho dia faly indrindra handany sy holanina mba hahasoa ny fanahinareo. Koa raha mitombo ny fitiavako anareo, moa va hihena ny fitiavanareo ahy?
  '16':
  - type: text
    content: 'Kanefa, na izany aza, dia tsy nahavaky tratra anareo aho; fa fetsy hono aho ka tamin’ny hafetsena no nahazoako anareo! '
  '17':
  - type: text
    content: 'Moa nisy tamin’ireo nirahiko tany aminareo va nampiasaiko hahazoako tombontsoa? '
  '18':
  - type: text
    content: Nangataka an’i Titosy aho sady nirahiko niaraka taminy ilay rahalahy. Moa naka vola aman-karena taminareo va i Titosy? Tsy fanahy iray ihany va no nandehananay? Tsy iray ihany va ny dianay?
  '19':
  - type: text
    content: 'Efa ela izay no niheveranareo fa miaro tena eo aminareo izahay. Eo anatrehan’Andriamanitra no itenenanay ao amin’i '
  - type: text
    content: Kristy
  - type: text
    content: '; fa ny zavatra rehetra, ry malala, dia ho fampandrosoana anareo. '
  '2':
  - type: text
    content: 'Mahafantatra olona iray ao amin’i '
  - type: text
    content: Kristy
  - type: text
    content: ' aho, tokony ho efatra amby folo taona lasa izay, na tao amin’ny tena, na tsy tao amin’ny tena, tsy fantatro, Andriamanitra no mahalala, fa ilay olona iray dia nakarina ho any amin’ny lanitra fahatelo. '
  '20':
  - type: text
    content: 'Fa matahotra aho, fandrao rehefa tonga aho dia tsy araka izay tiako no hahitako anareo, ary tsy araka izay tianareo no hahitanareo ahy; fandrao hisy fifandirana, fialonana, fahatezerana, fifampiandaniana, fanaratsiana, fifosana, fieboeboana, fikitranana; '
  '21':
  - type: text
    content: eny, fandrao rehefa tonga indray aho dia hampietry ahy eo anatrehanareo Andriamanitro, ary halahelo ny maro izay nanota teo aloha aho, dia ireo izay tsy mbola nibebaka tamin’ny fahalotoana sy ny fijangajangana ary ny fanaranam-po nataony.
  '3':
  - type: text
    content: 'Ary mahafantatra ilay olona iray aho, na tao amin’ny tena, na tsy tao amin’ny tena, tsy fantatro, Andriamanitra no mahalala, '
  '4':
  - type: text
    content: 'fa nakarina ho any amin’ny Paradisa izy ka nandre teny tsy hay tenenina sady tsy azon’olombelona tononina. '
  '5':
  - type: text
    content: Ilay iray no hataoko rehareha; fa ny amin’ny tenako dia tsy hirehareha aho, afa-tsy amin’ny fahalemena ihany.
  '6':
  - type: text
    content: 'Fa na dia te hirehareha aza aho dia tsy ho adala fa hilaza ny marina; nefa tsy hanao izany aho, fandrao hisy olona hihevitra ahy ho mihoatra noho izay ahitany ahy na izay andrenesany ny teniko. '
  '7':
  - type: text
    content: 'Ary fandrao hirehareha noho ny habetsaky ny fanambaràna aho dia nasiana tsilo ny nofoko; irak’i Satana hamely ahy izany, fandrao hirehareha aho. '
  '8':
  - type: text
    content: 'Izany no nangatahako intelo tamin’ny Tompo mba hialan’izany amiko. '
  '9':
  - type: text
    content: 'Nefa hoy Izy tamiko: Ampy ho anao ny fahasoavako; fa ny heriko dia tanterahina amin’ny fahalemena.'
  - type: text
    content: 'Koa mainka sitrako ny hirehareha amin’ny fahalemeko, mba hitoeran’ny herin’i Kristy amiko. '
