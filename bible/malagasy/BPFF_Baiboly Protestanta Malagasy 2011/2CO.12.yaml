document_id: 2CO.12,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fahitana sy fanambaràna nomena an’i Paoly
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Tsy maintsy mirehareha aho, na dia tsy mahasoa aza izany; fa handroso hilaza fahitana sy fanambaran’ny Tompo aho. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Koa dia finaritra aho amin’ny fahalemena, amin’ny fampahoriana, amin’ny fahaterena, amin’ny fanenjehana, amin’ny tebiteby, noho ny amin’i Kristy; fa ny fahalemeko no fahatanjahako.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny ahiahin’i Paoly ny amin’ny Korintiana
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Efa tonga adala aho! Ianareo no nanery ahy; fa tokony hoderainareo aho satria tsy latsaka noho ireo apostoly malaza ireo aho na dia tsinontsinona aza. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Ny famantarana maha apostoly ahy dia natao teo aminareo tokoa tamin’ny faharetana isan-karazany, tamin’ny famantarana, tamin’ny asa lehibe ary tamin’ny fahagagana. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Fa inona moa no nahalatsaka anareo noho ny fiangonana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.13 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: eklesia.
      marker-yv: yv-n
    - type: text
      text: ' hafa afa-tsy ny tsy namakiako tratra anareo? Mamelà ahy amin’izany fahadisoana izany.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Indro, efa fanintelony izao no nivonona hankaty aminareo aho nefa tsy hahavaky tratra anareo; ary tsy ny fanananareo no tadiaviko fa ianareo. Tsy ny zanaka no tokony hihary ho an’ny ray aman-dreniny fa ny ray aman-dreniny no tokony hihary ho an’ny zanany. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Ary izaho dia faly indrindra handany sy holanina mba hahasoa ny fanahinareo. Koa raha mitombo ny fitiavako anareo, moa va hihena ny fitiavanareo ahy?
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Kanefa, na izany aza, dia tsy nahavaky tratra anareo aho; fa fetsy hono aho ka tamin’ny hafetsena no nahazoako anareo! '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Moa nisy tamin’ireo nirahiko tany aminareo va nampiasaiko hahazoako tombontsoa? '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Nangataka an’i Titosy aho sady nirahiko niaraka taminy ilay rahalahy. Moa naka vola aman-karena taminareo va i Titosy? Tsy fanahy iray ihany va no nandehananay? Tsy iray ihany va ny dianay?
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Efa ela izay no niheveranareo fa miaro tena eo aminareo izahay. Eo anatrehan’Andriamanitra no itenenanay ao amin’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: '; fa ny zavatra rehetra, ry malala, dia ho fampandrosoana anareo. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Mahafantatra olona iray ao amin’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ' aho, tokony ho efatra amby folo taona lasa izay, na tao amin’ny tena, na tsy tao amin’ny tena, tsy fantatro, Andriamanitra no mahalala, fa ilay olona iray dia nakarina ho any amin’ny lanitra fahatelo. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Fa matahotra aho, fandrao rehefa tonga aho dia tsy araka izay tiako no hahitako anareo, ary tsy araka izay tianareo no hahitanareo ahy; fandrao hisy fifandirana, fialonana, fahatezerana, fifampiandaniana, fanaratsiana, fifosana, fieboeboana, fikitranana; '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: eny, fandrao rehefa tonga indray aho dia hampietry ahy eo anatrehanareo Andriamanitro, ary halahelo ny maro izay nanota teo aloha aho, dia ireo izay tsy mbola nibebaka tamin’ny fahalotoana sy ny fijangajangana ary ny fanaranam-po nataony.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Ary mahafantatra ilay olona iray aho, na tao amin’ny tena, na tsy tao amin’ny tena, tsy fantatro, Andriamanitra no mahalala, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'fa nakarina ho any amin’ny Paradisa izy ka nandre teny tsy hay tenenina sady tsy azon’olombelona tononina. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Ilay iray no hataoko rehareha; fa ny amin’ny tenako dia tsy hirehareha aho, afa-tsy amin’ny fahalemena ihany.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Fa na dia te hirehareha aza aho dia tsy ho adala fa hilaza ny marina; nefa tsy hanao izany aho, fandrao hisy olona hihevitra ahy ho mihoatra noho izay ahitany ahy na izay andrenesany ny teniko. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ary fandrao hirehareha noho ny habetsaky ny fanambaràna aho dia nasiana tsilo ny nofoko; irak’i Satana hamely ahy izany, fandrao hirehareha aho. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Izany no nangatahako intelo tamin’ny Tompo mba hialan’izany amiko. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Nefa hoy Izy tamiko: Ampy ho anao ny fahasoavako; fa ny heriko dia tanterahina amin’ny fahalemena.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa mainka sitrako ny hirehareha amin’ny fahalemeko, mba hitoeran’ny herin’i Kristy amiko. '
