document_id: EXO.3,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Mifidy an’i Mosesy mba hanafaka ny Zanak’Israely Andriamanitra
  - type: text
    content: 'Ary i Mosesy dia niandry ny ondry aman’osin’i Jetro rafozany, mpisorona tany Midiana, dia nitondra ny ondry aman’osy tany ankoatra ny tany efitra ka tonga tany Horeba, tendrombohitr’Andriamanitra. '
  '10':
  - type: text
    content: Koa avia ianao ankehitriny hirahiko ho any amin’i Farao hitondra ny Zanak’Israely oloko hivoaka avy any Ejipta.
  '11':
  - type: text
    content: 'Fa hoy i Mosesy tamin’Andriamanitra: Iza moa aho no hankany amin’i Farao ka hitondra ny Zanak’Israely hivoaka avy any Ejipta?'
  '12':
  - type: text
    content: 'Ary hoy Izy: Homba anao tokoa Aho! Ary izao no famantarana ho anao fa Izaho no naniraka anao: Rehefa entinao mivoaka avy any Ejipta ny olona dia hanompo an’Andriamanitra eto amin’ity tendrombohitra ity ianareo.'
  - type: heading
    content: Andriamanitra manambara ny anarany amin’i Mosesy
  '13':
  - type: text
    content: 'Hoy i Mosesy tamin’Andriamanitra: Indro, rehefa tonga any amin’ny Zanak’Israely aho ka hiteny aminy hoe: Andriamanitry ny razanareo no efa naniraka ahy ho atỳ aminareo, dia hiteny amiko izy hoe: Iza moa no anarany? Dia ahoana no havaliko azy?'
  '14':
  - type: text
    content: 'Hoy Andriamanitra tamin’i Mosesy: Izaho izay Izy. Ary hoy koa Izy: Izao no holazainao amin’ny Zanak’Israely: Izaho izay Izy no naniraka ahy ho atỳ aminareo.'
  '15':
  - type: text
    content: 'Ary hoy koa Andriamanitra tamin’i Mosesy: Izao no holazainao amin’ny Zanak’Israely: NY TOMPO, Andriamanitry ny razanareo, dia Andriamanitr’i Abrahama sy Andriamanitr’Isaka ary Andriamanitr’i Jakoba, no naniraka ahy ho atỳ aminareo. Izany no ho anarako mandrakizay ary izany no hiantsoana Ahy hatramin’ny taranaka fara aman-dimby. '
  '16':
  - type: text
    content: 'Mandehana, vorio ny loholon’ny Israely ka lazao aminy hoe: NY TOMPO, Andriamanitry ny razanareo, dia Andriamanitr’i Abrahama sy Isaka ary i Jakoba, no niseho tamiko ka niteny hoe: Efa namangy anareo tokoa Aho ka nahita ny manjo anareo atỳ Ejipta, '
  '17':
  - type: text
    content: 'koa hoy Aho hoe: Hitondra anareo hiakatra Aho mba ho afaka amin’ny fahoriana atỳ Ejipta, ho any amin’ny tanin’ny Kananita, ny Hetita, ny Amorita, ny Perizita, ny Hivita ary ny Jebosita, dia ho any amin’izay tany tondra-dronono sy tantely.'
  '18':
  - type: text
    content: 'Dia hihaino ny feonao izy. Hankao amin’ny mpanjakan’i Ejipta ianao sy ireo loholon’ny Israely ka hilaza aminy hoe: NY TOMPO, Andriamanitry ny Hebreo, no nihaona taminay. Koa ankehitriny, trara antitra ianao, aoka handeha lalan-kateloana any an-tany efitra izahay mba hamono zavatra hatao fanatitra ho an’NY TOMPO Andriamanitray. '
  '19':
  - type: text
    content: 'Kanefa Izaho mahalala fa tsy havelan’ny mpanjakan’i Ejipta handeha ianareo, tsia, na dia amin’ny tanana mahery aza. '
  '2':
  - type: text
    content: 'Ary ilay '
  - type: text
    content: Anjelin’NY TOMPO
  - type: text
    content: ' niseho taminy tao anaty lelafo teo amin’ny roimemy iray ka hitany fa indro, nirehitra afo ilay roimemy kanefa tsy levona.'
  '20':
  - type: text
    content: 'Dia hanatsotra ny tanako Aho ka hamely an’i Ejipta amin’ny fahagagana rehetra izay hataoko eo aminy. Aorianan’izay vao handefa anareo izy. '
  '21':
  - type: text
    content: 'Ary hataoko mahita fitia eo imason’ny Ejiptiana ity firenena ity, koa rehefa mandeha ianareo dia tsy mba handeha tanam-polo. '
  '22':
  - type: text
    content: Fa ny vehivavy dia samy hangataka firavaka volafotsy sy volamena ary fitafiana amin’ny mpiray monina aminy sy amin’izay mivahiny ao an-tranony; dia hampanaovinareo ny zanakareo lahy sy ny zanakareo vavy izany ka hofoananareo ny harenan’i Ejipta.
  '3':
  - type: text
    content: 'Dia hoy i Mosesy: Hivily kely hijery io fisehoan-javatra hafakely io aho. Nahoana no tsy levona io roimemy io? '
  '4':
  - type: text
    content: 'Rehefa hitan’NY TOMPO fa nivily mba hizaha izy dia niantso azy avy tao afovoan’ny roimemy Andriamanitra ka niteny hoe: Ry Mosesy! Ry Mosesy! Dia hoy izy: Inty aho! '
  '5':
  - type: text
    content: 'Ary hoy Izy: Aza manakaiky etỳ; esory amin’ny tongotrao ny kapanao fa tany masina io ijoroanao io. '
  '6':
  - type: text
    content: 'Hoy koa Izy: Izaho no Andriamanitry ny razanao, dia Andriamanitr’i Abrahama sy Andriamanitr’Isaka ary Andriamanitr’i Jakoba. Dia nisaron-tava i Mosesy fa natahotra hijery an’Andriamanitra izy.'
  '7':
  - type: text
    content: 'Ary hoy NY TOMPO: Hitako tokoa ny fahorian’ny oloko izay any Ejipta, ary reko ny fitarainany noho ny ataon’ny mpampahory azy; eny, fantatro ny fijaliany. '
  '8':
  - type: text
    content: 'Koa midina Aho izao hanafaka azy amin’ny tanan’ny Ejiptiana ka hitondra azy hiakatra hiala amin’izany tany izany ho any amin’izay tany soa sy malalaka, dia any amin’izay tany tondra-dronono sy tantely, any amin’ny tanin’ny Kananita, ny Hetita, ny Amorita, ny Perizita, ny Hivita ary ny Jebosita. '
  '9':
  - type: text
    content: 'Ary ankehitriny, indro, ny fitarainan’ny Zanak’Israely dia tonga atỳ Amiko, sady hitako koa ny fampahoriana izay ampahorian’ny Ejiptiana azy. '
