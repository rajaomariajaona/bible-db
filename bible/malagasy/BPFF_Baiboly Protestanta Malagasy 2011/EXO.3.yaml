document_id: EXO.3
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mifidy an’i Mosesy mba hanafaka ny Zanak’Israely Andriamanitra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary i Mosesy dia niandry ny ondry aman’osin’i Jetro rafozany, mpisorona tany Midiana, dia nitondra ny ondry aman’osy tany ankoatra ny tany efitra ka tonga tany Horeba, tendrombohitr’Andriamanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary ilay '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Anjelin’NY TOMPO
  - type: text
    text: ' niseho taminy tao anaty lelafo teo amin’ny roimemy iray ka hitany fa indro, nirehitra afo ilay roimemy kanefa tsy levona.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dia hoy i Mosesy: Hivily kely hijery io fisehoan-javatra hafakely io aho. Nahoana no tsy levona io roimemy io? '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Rehefa hitan’NY TOMPO fa nivily mba hizaha izy dia niantso azy avy tao afovoan’ny roimemy Andriamanitra ka niteny hoe: Ry Mosesy! Ry Mosesy! Dia hoy izy: Inty aho! '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary hoy Izy: Aza manakaiky etỳ; esory amin’ny tongotrao ny kapanao fa tany masina io ijoroanao io. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Hoy koa Izy: Izaho no Andriamanitry ny razanao, dia Andriamanitr’i Abrahama sy Andriamanitr’Isaka ary Andriamanitr’i Jakoba. Dia nisaron-tava i Mosesy fa natahotra hijery an’Andriamanitra izy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary hoy NY TOMPO: Hitako tokoa ny fahorian’ny oloko izay any Ejipta, ary reko ny fitarainany noho ny ataon’ny mpampahory azy; eny, fantatro ny fijaliany. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Koa midina Aho izao hanafaka azy amin’ny tanan’ny Ejiptiana ka hitondra azy hiakatra hiala amin’izany tany izany ho any amin’izay tany soa sy malalaka, dia any amin’izay tany tondra-dronono sy tantely, any amin’ny tanin’ny Kananita, ny Hetita, ny Amorita, ny Perizita, ny Hivita ary ny Jebosita. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary ankehitriny, indro, ny fitarainan’ny Zanak’Israely dia tonga atỳ Amiko, sady hitako koa ny fampahoriana izay ampahorian’ny Ejiptiana azy. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Koa avia ianao ankehitriny hirahiko ho any amin’i Farao hitondra ny Zanak’Israely oloko hivoaka avy any Ejipta.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Fa hoy i Mosesy tamin’Andriamanitra: Iza moa aho no hankany amin’i Farao ka hitondra ny Zanak’Israely hivoaka avy any Ejipta?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary hoy Izy: Homba anao tokoa Aho! Ary izao no famantarana ho anao fa Izaho no naniraka anao: Rehefa entinao mivoaka avy any Ejipta ny olona dia hanompo an’Andriamanitra eto amin’ity tendrombohitra ity ianareo.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Andriamanitra manambara ny anarany amin’i Mosesy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Hoy i Mosesy tamin’Andriamanitra: Indro, rehefa tonga any amin’ny Zanak’Israely aho ka hiteny aminy hoe: Andriamanitry ny razanareo no efa naniraka ahy ho atỳ aminareo, dia hiteny amiko izy hoe: Iza moa no anarany? Dia ahoana no havaliko azy?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Hoy Andriamanitra tamin’i Mosesy: Izaho izay Izy. Ary hoy koa Izy: Izao no holazainao amin’ny Zanak’Israely: Izaho izay Izy no naniraka ahy ho atỳ aminareo.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary hoy koa Andriamanitra tamin’i Mosesy: Izao no holazainao amin’ny Zanak’Israely: NY TOMPO, Andriamanitry ny razanareo, dia Andriamanitr’i Abrahama sy Andriamanitr’Isaka ary Andriamanitr’i Jakoba, no naniraka ahy ho atỳ aminareo. Izany no ho anarako mandrakizay ary izany no hiantsoana Ahy hatramin’ny taranaka fara aman-dimby. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Mandehana, vorio ny loholon’ny Israely ka lazao aminy hoe: NY TOMPO, Andriamanitry ny razanareo, dia Andriamanitr’i Abrahama sy Isaka ary i Jakoba, no niseho tamiko ka niteny hoe: Efa namangy anareo tokoa Aho ka nahita ny manjo anareo atỳ Ejipta, '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'koa hoy Aho hoe: Hitondra anareo hiakatra Aho mba ho afaka amin’ny fahoriana atỳ Ejipta, ho any amin’ny tanin’ny Kananita, ny Hetita, ny Amorita, ny Perizita, ny Hivita ary ny Jebosita, dia ho any amin’izay tany tondra-dronono sy tantely.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Dia hihaino ny feonao izy. Hankao amin’ny mpanjakan’i Ejipta ianao sy ireo loholon’ny Israely ka hilaza aminy hoe: NY TOMPO, Andriamanitry ny Hebreo, no nihaona taminay. Koa ankehitriny, trara antitra ianao, aoka handeha lalan-kateloana any an-tany efitra izahay mba hamono zavatra hatao fanatitra ho an’NY TOMPO Andriamanitray. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Kanefa Izaho mahalala fa tsy havelan’ny mpanjakan’i Ejipta handeha ianareo, tsia, na dia amin’ny tanana mahery aza. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Dia hanatsotra ny tanako Aho ka hamely an’i Ejipta amin’ny fahagagana rehetra izay hataoko eo aminy. Aorianan’izay vao handefa anareo izy. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary hataoko mahita fitia eo imason’ny Ejiptiana ity firenena ity, koa rehefa mandeha ianareo dia tsy mba handeha tanam-polo. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Fa ny vehivavy dia samy hangataka firavaka volafotsy sy volamena ary fitafiana amin’ny mpiray monina aminy sy amin’izay mivahiny ao an-tranony; dia hampanaovinareo ny zanakareo lahy sy ny zanakareo vavy izany ka hofoananareo ny harenan’i Ejipta.
