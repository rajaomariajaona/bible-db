document_id: PSA.58,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Misy Andriamanitra izay mitsara
  - type: text
    content: Ho an’ny mpiventy hira. Al-tashet. Miktama nataon’i Davida.
  - type: text
    content: Moa ny tsy fitenenana va no ataonareo ho filazana ny marina?
  - type: text
    content: Mitsara amin’ny fahitsiana va ianareo, ry zanak’olombelona?
  '10':
  - type: text
    content: Hifaly ny marina raha mahita ny famaliana;
  - type: text
    content: hanasa ny tongony amin’ny ran’ny ratsy fanahy izy.
  '11':
  - type: text
    content: 'Dia hiteny ny olona hoe: Misy valisoa tokoa ho an’ny marina;'
  - type: text
    content: Misy tokoa Andriamanitra izay mitsara etỳ ambonin’ny tany.
  '2':
  - type: text
    content: Tsy izany, fa minia mamorona tsy fahamarinana ianareo.
  - type: text
    content: Ny herisetra hataonareo eo amin’ny tany no lanjainareo amin’ny mizana.
  '3':
  - type: text
    content: Mivily lalana hatrany am-bohoka ny ratsy fanahy;
  - type: text
    content: mania hatrany an-kibo izy ka miteny lainga.
  '4':
  - type: text
    content: Misy poizina tahaka ny an’ny menarana aminy;
  - type: text
    content: eny, tahaka ny vipera marenina izay manentsin-tadìny izy,
  '5':
  - type: text
    content: izay tsy mihaino ny feon’ny mpandrenoka bibilava,
  - type: text
    content: na dia izay mpandrenoka mahay indrindra aza.
  '6':
  - type: text
    content: Andriamanitra ô, torotoroy ny nifiny ao am-bavany!
  - type: text
    content: Omboty ny vazan’ny liona tanora, TOMPO ô!
  '7':
  - type: text
    content: Aoka ho ritra tahaka ny ranotrambo izy!
  - type: text
    content: Raha aatrany ny zana-tsipìkany dia aoka ho tapa-doha ireny!
  '8':
  - type: text
    content: Aoka ho tahaka ny lelosy izay miha levona eny am-pandehanana izy;
  - type: text
    content: aoka ho tahaka ny zaza vakimanta izay tsy mahita masoandro izy.
  '9':
  - type: text
    content: Dieny tsy mbola mafanan’ny afon-tsilo ny vilaninareo,
  - type: text
    content: aoka ho entin’ny tafio-drivotra ireny, na ny lena na ny maina.
