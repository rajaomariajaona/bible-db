document_id: PSA.58
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Misy Andriamanitra izay mitsara
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: Ho an’ny mpiventy hira. Al-tashet. Miktama nataon’i Davida.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Moa ny tsy fitenenana va no ataonareo ho filazana ny marina?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mitsara amin’ny fahitsiana va ianareo, ry zanak’olombelona?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Tsy izany, fa minia mamorona tsy fahamarinana ianareo.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny herisetra hataonareo eo amin’ny tany no lanjainareo amin’ny mizana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Mivily lalana hatrany am-bohoka ny ratsy fanahy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mania hatrany an-kibo izy ka miteny lainga.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Misy poizina tahaka ny an’ny menarana aminy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, tahaka ny vipera marenina izay manentsin-tadìny izy,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: izay tsy mihaino ny feon’ny mpandrenoka bibilava,
- type: usfm
  marker: q1
  children:
  - type: text
    text: na dia izay mpandrenoka mahay indrindra aza.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Andriamanitra ô, torotoroy ny nifiny ao am-bavany!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Omboty ny vazan’ny liona tanora, TOMPO ô!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Aoka ho ritra tahaka ny ranotrambo izy!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Raha aatrany ny zana-tsipìkany dia aoka ho tapa-doha ireny!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Aoka ho tahaka ny lelosy izay miha levona eny am-pandehanana izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: aoka ho tahaka ny zaza vakimanta izay tsy mahita masoandro izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Dieny tsy mbola mafanan’ny afon-tsilo ny vilaninareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: aoka ho entin’ny tafio-drivotra ireny, na ny lena na ny maina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Hifaly ny marina raha mahita ny famaliana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hanasa ny tongony amin’ny ran’ny ratsy fanahy izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Dia hiteny ny olona hoe: Misy valisoa tokoa ho an’ny marina;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Misy tokoa Andriamanitra izay mitsara etỳ ambonin’ny tany.
