document_id: NUM.11,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny Zanak’Israely tany Tabera
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Nimonomonona tamin’NY TOMPO ny olona ka nony ren’NY TOMPO izany dia nirehitra taminy ny fahatezerany ary nandoro ny teo an-tsisin’ny toby ny afon’NY TOMPO. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ary i Mosesy dia nandre ny olona tamin’ny isam-pianakaviany nitomany, samy teo amin’ny varavaran’ny tranolainy avy. Dia nirehitra fatratra ny fahatezeran’NY TOMPO, ary tsy sitrak’i Mosesy izany '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'ka hoy i Mosesy tamin’NY TOMPO: Nahoana no dia nasianao ratsy ny mpanomponao? Ary nahoana no tsy nahita fitia teo imasonao aho fa nampitondrainao enta-mavesatra, dia ity vahoaka ity? '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Izaho va no torontoronina an’ity firenena iray manontolo ity? Ary izaho va no niteraka azy no ilazanao hoe: Trotroinao izy, tahaka ny lehilahy mpitaiza mitondra zaza minono, ho any amin’ny tany izay nianiananao tamin’ny razany homena azy! '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Avy aiza no hahazoako hena homena ity firenena iray manontolo ity no dia mitomany amiko izy hoe: Omeo hena izahay hohaninay! '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Tsy zakako izaho irery ny mitondra ity firenena iray manontolo ity, fa mavesatra amiko loatra. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Koa raha izao no ataonao amiko, vonoy mihitsy aho, raha mba nahita fitia teo imasonao, mba tsy hahitako ny fahoriana manjo ahy!
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Dia hoy NY TOMPO tamin’i Mosesy: Manangòna fitopolo lahy amin’ny loholon’ny Israely ho etỳ Amiko, dia izay fantatrao ho loholona amin’ny vahoaka sy mpifehy eo aminy; ento miaraka aminao ho ao amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: tranolay fihaonana
    - type: text
      text: ' izy ireo. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Dia hidina Aho ka hiteny aminao eo; ary haka avy amin’ny Fanahy izay ao aminao Aho ka hametraka izany eo amin’ireo, dia hiara-mivesatra ity firenena ity aminao ireo, fa tsy ianao irery intsony no hitondra azy. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Ary lazao amin’ny olona hoe: Hamasino ny tenanareo ho amin’ny ampitso dia hihinan-kena ianareo; fa nitomany teo an-tsofin’NY TOMPO ianareo hoe: Iza no hanome anay hena hohaninay? Nefa soa no hitanay tany Ejipta! Dia homen’NY TOMPO hena ianareo ka hihinana. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Tsy indray andro no hihinananareo na indroa andro, na hadimiana, na hafoloana, na roapolo andro aza, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Dia nitaraina tamin’i Mosesy ny olona. Ary nifona tamin’NY TOMPO i Mosesy dia maty ny afo. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'fa hatramin’ny iray volana mipaka, dia mandra-pivoakany amin’ny vavoronareo ka hamparikoriko anareo; satria nolavinareo NY TOMPO izay eo afovoanareo ka nitomany teo anatrehany ianareo hoe: Nahoana re no nivoaka tany Ejipta izahay?'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Dia hoy i Mosesy: Miaramila enina hetsy ny firenena manodidina ahy, nefa hoy Ianao: Homeko hena izy mba hohaniny mandritra ny iray volana! '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Hamonoana ondry aman’osy sy omby hahavoky azy va, sa ny hazandrano rehetra ao amin’ny ranomasina no hangonina hahavoky azy? '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Dia hoy NY TOMPO tamin’i Mosesy: Nihafohy va ny tanan’NY TOMPO? Ankehitriny dia ho hitanao na ho tanteraka ny teniko na tsia.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Amindran’Andriamanitra ny Fanahy avy Aminy ireo loholona fitopolo lahy
    marker-yv: yv-h
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Dia nivoaka mba hilaza ny tenin’NY TOMPO tamin’ny olona i Mosesy; nanangona fitopolo lahy tamin’ireo loholon’ny firenena izy ka nasainy nijoro manodidina ny tranolay. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Dia nidina teo amin’ny rahona NY TOMPO ka niteny taminy ary nanalany ny Fanahy izay tao amin’i Mosesy ka napetrany tao amin’ny loholona fitopolo lahy. Raha vao nipetraka tao amin’izy ireo ny Fanahy dia naminany izy ireo nefa tsy nitohy izany.
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Ary nisy roa lahy nijanona teo an-toby, Eldada no anaran’ny iray, ary Medada no anaran’ny iray; nipetraka teo amin’izy ireo ny Fanahy; ary isan’izay voasoratra izy roa lahy nefa tsy mba nandeha nankeo amin’ny tranolay; dia naminany teo an-toby izy roa lahy. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Ary nisy zatovo nihazakazaka dia nilaza tamin’i Mosesy hoe: Maminany i Eldada sy i Medada etsy an-toby. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Dia hoy i Josoa, zanak’i Nona, izay nanompo an’i Mosesy hatramin’ny fahatanorany: Ry Mosesy, tompoko, rarao izy roa lahy. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Fa hoy i Mosesy taminy: Izaho va no ialonanao? Enga anie ka ho mpaminany avokoa ny olon’NY TOMPO rehetra ka hapetraky NY TOMPO aminy ny Fanahiny! '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Ary ny anaran’izany toerana izany dia nataony hoe Tabera
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Tabera: Fandoroana.'
      marker-yv: yv-n
    - type: text
      text: ' satria nandoro azy ny afon’NY TOMPO.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mitaky hihinan-kena ny vahoaka
    marker-yv: yv-h
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Dia nisintona nankeo an-toby i Mosesy sy ireo loholon’ny Israely.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Kibrota-Hatava: Ny papelika'
    marker-yv: yv-h
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Dia nisy rivotra nitsoka, nampandehanin’NY TOMPO, ka nandroaka papelika avy tany amin’ny ranomasina ary nampihahakahaka azy teo amin’ny toby, koa tokony ho hatrany amin’ny lalana indray andro manodidina ny toby no nisy azy ary tokony ho roa '
    - type: usfm
      marker: w
      children:
      - type: text
        text: hakiho
    - type: text
      text: ' ambonin’ny tany ny hatevenany. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Dia nitsangana ny olona nandritra izany andro izany sy nandritra ny alina sy ny ampitson’iny koa ary nanangona ny papelika; izay kely fanangona no nahazo folo homera; ary nahahiny nanodidina ny toby ireny. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Fa raha mbola teo am-bavany ny hena ka tsy mbola lany dia nirehitra tamin’ny olona ny fahatezeran’NY TOMPO ary namely ny olona tamin’ny kapoka mafy indrindra Izy. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: Ary ny anaran’izany toerana izany dia nataony hoe Kibrota-Hatava na Ireo fasam-pitsiriritana satria teo no nandevenana ny olona izay matim-pitsiriritana.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Voan’ny habokana i Miriama
    marker-yv: yv-h
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: Ary niala tao Kibrota-Hatava ny olona ka nifindra nankany Hazerota; dia niato tao Hazerota izy ireo.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ary ny olona hafa firenena izay nifangaroharo taminy dia azon’ny fitsiriritana, ary nitomany indray ny Zanak’Israely ka niteny hoe: Iza re no mba hanome hena hohaninay! '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Tsaroanay ny hazandrano izay nohaninay maimaimpoana tany Ejipta mbamin’ny voatango, ny tongolo ravina, ny tongolo ejipta sy ny tongolo lay. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Izao anefa dia maina ny tendanay: Tsy misy na inona na inona hitanay afa-tsy ny mana ihany.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ary ny mana dia toy ny voan’ny koriandira ny fijery azy. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Dia samy nandehandeha ny olona ka nanangona ary nanodina izany tamin’ny fikosoham-bary na nitoto izany tamin’ny laona dia nahandroiny tamin’ny vilany ka nanaovany mofo; ny tsirony indray dia sahala amin’ny tsiron’ny mofo misy diloilo. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Rehefa nilatsaka tamin’ny toby ny ando tamin’ny alina dia nilatsaka taminy koa ny mana.
