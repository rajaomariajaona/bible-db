document_id: NUM.11,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny Zanak’Israely tany Tabera
  - type: text
    content: 'Nimonomonona tamin’NY TOMPO ny olona ka nony ren’NY TOMPO izany dia nirehitra taminy ny fahatezerany ary nandoro ny teo an-tsisin’ny toby ny afon’NY TOMPO. '
  '10':
  - type: text
    content: 'Ary i Mosesy dia nandre ny olona tamin’ny isam-pianakaviany nitomany, samy teo amin’ny varavaran’ny tranolainy avy. Dia nirehitra fatratra ny fahatezeran’NY TOMPO, ary tsy sitrak’i Mosesy izany '
  '11':
  - type: text
    content: 'ka hoy i Mosesy tamin’NY TOMPO: Nahoana no dia nasianao ratsy ny mpanomponao? Ary nahoana no tsy nahita fitia teo imasonao aho fa nampitondrainao enta-mavesatra, dia ity vahoaka ity? '
  '12':
  - type: text
    content: 'Izaho va no torontoronina an’ity firenena iray manontolo ity? Ary izaho va no niteraka azy no ilazanao hoe: Trotroinao izy, tahaka ny lehilahy mpitaiza mitondra zaza minono, ho any amin’ny tany izay nianiananao tamin’ny razany homena azy! '
  '13':
  - type: text
    content: 'Avy aiza no hahazoako hena homena ity firenena iray manontolo ity no dia mitomany amiko izy hoe: Omeo hena izahay hohaninay! '
  '14':
  - type: text
    content: 'Tsy zakako izaho irery ny mitondra ity firenena iray manontolo ity, fa mavesatra amiko loatra. '
  '15':
  - type: text
    content: Koa raha izao no ataonao amiko, vonoy mihitsy aho, raha mba nahita fitia teo imasonao, mba tsy hahitako ny fahoriana manjo ahy!
  '16':
  - type: text
    content: 'Dia hoy NY TOMPO tamin’i Mosesy: Manangòna fitopolo lahy amin’ny loholon’ny Israely ho etỳ Amiko, dia izay fantatrao ho loholona amin’ny vahoaka sy mpifehy eo aminy; ento miaraka aminao ho ao amin’ny '
  - type: text
    content: tranolay fihaonana
  - type: text
    content: ' izy ireo. '
  '17':
  - type: text
    content: 'Dia hidina Aho ka hiteny aminao eo; ary haka avy amin’ny Fanahy izay ao aminao Aho ka hametraka izany eo amin’ireo, dia hiara-mivesatra ity firenena ity aminao ireo, fa tsy ianao irery intsony no hitondra azy. '
  '18':
  - type: text
    content: 'Ary lazao amin’ny olona hoe: Hamasino ny tenanareo ho amin’ny ampitso dia hihinan-kena ianareo; fa nitomany teo an-tsofin’NY TOMPO ianareo hoe: Iza no hanome anay hena hohaninay? Nefa soa no hitanay tany Ejipta! Dia homen’NY TOMPO hena ianareo ka hihinana. '
  '19':
  - type: text
    content: 'Tsy indray andro no hihinananareo na indroa andro, na hadimiana, na hafoloana, na roapolo andro aza, '
  '2':
  - type: text
    content: 'Dia nitaraina tamin’i Mosesy ny olona. Ary nifona tamin’NY TOMPO i Mosesy dia maty ny afo. '
  '20':
  - type: text
    content: 'fa hatramin’ny iray volana mipaka, dia mandra-pivoakany amin’ny vavoronareo ka hamparikoriko anareo; satria nolavinareo NY TOMPO izay eo afovoanareo ka nitomany teo anatrehany ianareo hoe: Nahoana re no nivoaka tany Ejipta izahay?'
  '21':
  - type: text
    content: 'Dia hoy i Mosesy: Miaramila enina hetsy ny firenena manodidina ahy, nefa hoy Ianao: Homeko hena izy mba hohaniny mandritra ny iray volana! '
  '22':
  - type: text
    content: 'Hamonoana ondry aman’osy sy omby hahavoky azy va, sa ny hazandrano rehetra ao amin’ny ranomasina no hangonina hahavoky azy? '
  '23':
  - type: text
    content: 'Dia hoy NY TOMPO tamin’i Mosesy: Nihafohy va ny tanan’NY TOMPO? Ankehitriny dia ho hitanao na ho tanteraka ny teniko na tsia.'
  - type: heading
    content: Amindran’Andriamanitra ny Fanahy avy Aminy ireo loholona fitopolo lahy
  '24':
  - type: text
    content: 'Dia nivoaka mba hilaza ny tenin’NY TOMPO tamin’ny olona i Mosesy; nanangona fitopolo lahy tamin’ireo loholon’ny firenena izy ka nasainy nijoro manodidina ny tranolay. '
  '25':
  - type: text
    content: Dia nidina teo amin’ny rahona NY TOMPO ka niteny taminy ary nanalany ny Fanahy izay tao amin’i Mosesy ka napetrany tao amin’ny loholona fitopolo lahy. Raha vao nipetraka tao amin’izy ireo ny Fanahy dia naminany izy ireo nefa tsy nitohy izany.
  '26':
  - type: text
    content: 'Ary nisy roa lahy nijanona teo an-toby, Eldada no anaran’ny iray, ary Medada no anaran’ny iray; nipetraka teo amin’izy ireo ny Fanahy; ary isan’izay voasoratra izy roa lahy nefa tsy mba nandeha nankeo amin’ny tranolay; dia naminany teo an-toby izy roa lahy. '
  '27':
  - type: text
    content: 'Ary nisy zatovo nihazakazaka dia nilaza tamin’i Mosesy hoe: Maminany i Eldada sy i Medada etsy an-toby. '
  '28':
  - type: text
    content: 'Dia hoy i Josoa, zanak’i Nona, izay nanompo an’i Mosesy hatramin’ny fahatanorany: Ry Mosesy, tompoko, rarao izy roa lahy. '
  '29':
  - type: text
    content: 'Fa hoy i Mosesy taminy: Izaho va no ialonanao? Enga anie ka ho mpaminany avokoa ny olon’NY TOMPO rehetra ka hapetraky NY TOMPO aminy ny Fanahiny! '
  '3':
  - type: text
    content: Ary ny anaran’izany toerana izany dia nataony hoe Tabera
  - type: note
    content: 'Tabera: Fandoroana.'
  - type: text
    content: ' satria nandoro azy ny afon’NY TOMPO.'
  - type: heading
    content: Mitaky hihinan-kena ny vahoaka
  '30':
  - type: text
    content: Dia nisintona nankeo an-toby i Mosesy sy ireo loholon’ny Israely.
  - type: heading
    content: 'Kibrota-Hatava: Ny papelika'
  '31':
  - type: text
    content: 'Dia nisy rivotra nitsoka, nampandehanin’NY TOMPO, ka nandroaka papelika avy tany amin’ny ranomasina ary nampihahakahaka azy teo amin’ny toby, koa tokony ho hatrany amin’ny lalana indray andro manodidina ny toby no nisy azy ary tokony ho roa '
  - type: text
    content: hakiho
  - type: text
    content: ' ambonin’ny tany ny hatevenany. '
  '32':
  - type: text
    content: 'Dia nitsangana ny olona nandritra izany andro izany sy nandritra ny alina sy ny ampitson’iny koa ary nanangona ny papelika; izay kely fanangona no nahazo folo homera; ary nahahiny nanodidina ny toby ireny. '
  '33':
  - type: text
    content: 'Fa raha mbola teo am-bavany ny hena ka tsy mbola lany dia nirehitra tamin’ny olona ny fahatezeran’NY TOMPO ary namely ny olona tamin’ny kapoka mafy indrindra Izy. '
  '34':
  - type: text
    content: Ary ny anaran’izany toerana izany dia nataony hoe Kibrota-Hatava na Ireo fasam-pitsiriritana satria teo no nandevenana ny olona izay matim-pitsiriritana.
  - type: heading
    content: Voan’ny habokana i Miriama
  '35':
  - type: text
    content: Ary niala tao Kibrota-Hatava ny olona ka nifindra nankany Hazerota; dia niato tao Hazerota izy ireo.
  '4':
  - type: text
    content: 'Ary ny olona hafa firenena izay nifangaroharo taminy dia azon’ny fitsiriritana, ary nitomany indray ny Zanak’Israely ka niteny hoe: Iza re no mba hanome hena hohaninay! '
  '5':
  - type: text
    content: 'Tsaroanay ny hazandrano izay nohaninay maimaimpoana tany Ejipta mbamin’ny voatango, ny tongolo ravina, ny tongolo ejipta sy ny tongolo lay. '
  '6':
  - type: text
    content: 'Izao anefa dia maina ny tendanay: Tsy misy na inona na inona hitanay afa-tsy ny mana ihany.'
  '7':
  - type: text
    content: 'Ary ny mana dia toy ny voan’ny koriandira ny fijery azy. '
  '8':
  - type: text
    content: 'Dia samy nandehandeha ny olona ka nanangona ary nanodina izany tamin’ny fikosoham-bary na nitoto izany tamin’ny laona dia nahandroiny tamin’ny vilany ka nanaovany mofo; ny tsirony indray dia sahala amin’ny tsiron’ny mofo misy diloilo. '
  '9':
  - type: text
    content: Rehefa nilatsaka tamin’ny toby ny ando tamin’ny alina dia nilatsaka taminy koa ny mana.
