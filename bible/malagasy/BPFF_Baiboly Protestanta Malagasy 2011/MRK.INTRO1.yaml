document_id: MRK.INTRO1,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: imt1
    children:
    - type: text
      text: INDRAY MIJERY
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Tsy voalaza ato amin’ny Filazantsara ny mombamomba an’i Marka, kanefa heverin’ny mpandinika maro fa i Jaona Marka, ilay zanak’i Petera ara-panahy, no nanoratra ny Boky: Asa 12.12; 1Pet 5.13. Ilay naman’i Paoly ihany koa io: Asa 12.25; 15.37; Kol 4.10; 2Tim 4.11.'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Satria milaza fotoana misy fahoriana sy fanenjehana ny Filazantsaran’i Marka dia heverina fa ny nanoratana ny Boky dia tsy lavitra ny nanenjehan’i Néron ny fivavahana kristiana tamin’ny taona 64, ary talohan’ny taona 70 nandravan’ny Romana an’i Jerosalema.
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Olona tsy Jiosy no nanoratana ity boky ity matoa manome fanazavana ny fomba jiosy sasany izy; ohatra ny fidiovana, ny Paska, ny Sabata.
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Ho an’ny firenena rehetra koa anefa izany satria izany no nikendren’Andriamanitra ny Vaovao Mahafaly.
  - type: usfm
    marker: is1
    children:
    - type: text
      text: Ny votoatin’ny Boky
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Ny Filazantsaran’i Jesosy Kristy Zanak’Andriamanitra, na Ny Filazantsaran’Andriamanitra, no voarakitra ato. Jesosy sy ny asany no voatantara amin’izany. Tsy navelany hampahafantarina ny olona anefa ny maha Zanak’Andriamanitra na maha Mesia Azy mandra-pahatongan’ny fotoana mialoha ny fahafatesany. Ny ilazan’i Jesosy hatrany ny tenany kosa dia ny hoe Ny Zanak’Olona. Hanolotra ny ainy ho avotra hisolo ny maro no nahatongavany.
  - type: usfm
    marker: iot
    children:
    - type: text
      text: Ny firafitry ny Boky
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Azo zaraina ho roa ny Boky:'
  - type: usfm
    marker: io1
    children:
    - type: text
      text: 'Ny asan’i Jesosy teo amin’ny Jiosy sy teo ivelan’ny Jiosy: 1–8'
  - type: usfm
    marker: io1
    children:
    - type: text
      text: 'Ny nataon’i Jesosy tany Jerosalema nandritra ireo andro farany nahavelomany: 9–16.8'
  - type: usfm
    marker: io1
    children:
    - type: text
      text: Ny famaranana ny Boky (16.9-19) izay tatỳ aorianan’ny nanoratana ny Boky vao voasoratra
