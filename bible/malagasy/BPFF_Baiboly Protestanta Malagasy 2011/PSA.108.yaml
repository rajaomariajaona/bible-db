document_id: PSA.108
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Hofohaziko ny fahazavan’ny maraina
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: Tononkira. Salamo nataon’i Davida.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Andriamanitra ô, tafatoetra ny foko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hihira sy hankalaza Anao aho. Izany no voninahitro!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Mifohaza, ry valiha sy lokanga;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hofohaziko ny fahazavan’ny maraina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Hidera Anao eny amin’ny firenena maro aho, TOMPO ô,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ary hankalaza Anao eny amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jentilisa
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Fa lehibe mihoatra ny lanitra ny famindramponao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mipaka any amin’ny habakabaka ny fahamarinanao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Misandrata any ambonin’ny lanitra Ianao, Andriamanitra ô;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary aoka ho etỳ ambonin’ny tany rehetra ny voninahitrao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Mba hahafaka ny malalanao
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia vonjeo amin’ny tananao ankavanana aho ka valio.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Niteny tamin’ny fahamasinany Andriamanitra hoe: Handresy Aho'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hizara an’i Sekema ary horefesiko ny lohasahan’i Sokota;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ahy i Gileada, ahy i Manase;
- type: usfm
  marker: q1
  children:
  - type: text
    text: aron’ny lohako i Efraima;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tehim-panjakako i Joda;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: fitoeran-drano fisasana ho Ahy i Moaba;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eo amin’i Edoma no hanipazako ny kapako;
- type: usfm
  marker: q1
  children:
  - type: text
    text: noho ny amin’i Filistia no hihobiako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Iza no hitondra ahy ho any an-tanàna mafy?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Iza no hitarika ahy ho any Edoma?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Tsy Ianao va no efa nanary anay, Andriamanitra ô,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady tsy niaraka tamin’ny miaramilanay Ianao, Andriamanitra ô?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Vonjeo amin’ny fahavalo izahay,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa zava-poana ny famonjena ataon’ny olona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Andriamanitra no hahavitantsika asa mahery vaika,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa Izy no hanitsakitsaka ny fahavalontsika.
