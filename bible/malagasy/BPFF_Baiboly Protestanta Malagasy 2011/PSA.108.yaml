document_id: PSA.108,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Hofohaziko ny fahazavan’ny maraina
  - type: text
    content: Tononkira. Salamo nataon’i Davida.
  - type: text
    content: Andriamanitra ô, tafatoetra ny foko;
  - type: text
    content: hihira sy hankalaza Anao aho. Izany no voninahitro!
  '10':
  - type: text
    content: Iza no hitondra ahy ho any an-tanàna mafy?
  - type: text
    content: Iza no hitarika ahy ho any Edoma?
  '11':
  - type: text
    content: Tsy Ianao va no efa nanary anay, Andriamanitra ô,
  - type: text
    content: sady tsy niaraka tamin’ny miaramilanay Ianao, Andriamanitra ô?
  '12':
  - type: text
    content: Vonjeo amin’ny fahavalo izahay,
  - type: text
    content: fa zava-poana ny famonjena ataon’ny olona.
  '13':
  - type: text
    content: Andriamanitra no hahavitantsika asa mahery vaika,
  - type: text
    content: fa Izy no hanitsakitsaka ny fahavalontsika.
  '2':
  - type: text
    content: Mifohaza, ry valiha sy lokanga;
  - type: text
    content: hofohaziko ny fahazavan’ny maraina.
  '3':
  - type: text
    content: Hidera Anao eny amin’ny firenena maro aho, TOMPO ô,
  - type: text
    content: 'ary hankalaza Anao eny amin’ny '
  - type: text
    content: Jentilisa
  - type: text
    content: .
  '4':
  - type: text
    content: Fa lehibe mihoatra ny lanitra ny famindramponao
  - type: text
    content: ary mipaka any amin’ny habakabaka ny fahamarinanao.
  '5':
  - type: text
    content: Misandrata any ambonin’ny lanitra Ianao, Andriamanitra ô;
  - type: text
    content: ary aoka ho etỳ ambonin’ny tany rehetra ny voninahitrao.
  '6':
  - type: text
    content: Mba hahafaka ny malalanao
  - type: text
    content: dia vonjeo amin’ny tananao ankavanana aho ka valio.
  '7':
  - type: text
    content: 'Niteny tamin’ny fahamasinany Andriamanitra hoe: Handresy Aho'
  - type: text
    content: ka hizara an’i Sekema ary horefesiko ny lohasahan’i Sokota;
  '8':
  - type: text
    content: Ahy i Gileada, ahy i Manase;
  - type: text
    content: aron’ny lohako i Efraima;
  - type: text
    content: tehim-panjakako i Joda;
  '9':
  - type: text
    content: fitoeran-drano fisasana ho Ahy i Moaba;
  - type: text
    content: eo amin’i Edoma no hanipazako ny kapako;
  - type: text
    content: noho ny amin’i Filistia no hihobiako.
