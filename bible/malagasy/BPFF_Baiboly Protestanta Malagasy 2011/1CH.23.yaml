document_id: 1CH.23,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nandaminan’i Davida ny raharahan’ny levita
  - type: text
    content: Nony efa ela niainana sy tratra antitra tsara i Davida dia i Solomona zanany no nataony mpanjaka tamin’ny Israely.
  '10':
  - type: text
    content: 'Ny zanakalahin’i Simey dia i Jahata, i Zina, i Jeosy ary i Beria; izy efa-dahy ireo no zanakalahin’i Simey. '
  '11':
  - type: text
    content: I Jahata no voalohany, ary i Ziza no faharoa; fa i Jeosy sy i Beria dia tsy nanana zanakalahy maro, koa nisaina ho fianakaviana iray sy antokony iray izy.
  '12':
  - type: text
    content: Ny zanakalahin’i Kehata dia i Amrama, i Jizara, i Hebrona ary i Oziela; efatra izy ireo.
  '13':
  - type: text
    content: 'Ny zanakalahin’i Amrama dia i Arona sy i Mosesy. Ary natokana i Arona ka nohamasinina ho masina indrindra, dia izy sy ny taranany fara aman-dimby, handoro ditin-kazo manitra eo anatrehan’NY TOMPO sy hanao fanompoam-pivavahana ho Azy ary hitsodrano amin’ny anarany mandrakizay. '
  '14':
  - type: text
    content: Nefa ny amin’i Mosesy, lehilahin’Andriamanitra, dia nisaina tamin’ny fokon’i Levy ihany ny zanany.
  '15':
  - type: text
    content: Ny zanakalahin’i Mosesy dia i Gersona sy i Eliezera.
  '16':
  - type: text
    content: 'Tamin’ny zanakalahin’i Gersoma dia i Seboela no lohany. '
  '17':
  - type: text
    content: Tamin’ny zanakalahin’i Eliezera dia i Rehabia no lohany, i Eliezera anefa dia tsy nanan-janaka hafa; fa ny zanak’i Rehabia dia maro indrindra.
  '18':
  - type: text
    content: Tamin’ny zanakalahin’i Jizara dia i Selomota no lohany.
  '19':
  - type: text
    content: Ny zanakalahin’i Hebrona, dia i Jeria no lahimatoa, i Amaria no lahiaivo, i Jahaziela no fahatelo, ary i Jekameama no faralahy.
  '2':
  - type: text
    content: 'Novoriny ny lehiben’ny Israely rehetra mbamin’ny mpisorona sy ny '
  - type: text
    content: levita
  - type: text
    content: '. '
  '20':
  - type: text
    content: Ny zanakalahin’i Oziela dia i Mika no lahimatoa ary i Jisia no faralahy.
  '21':
  - type: text
    content: 'Ny zanakalahin’i Merary dia i Maly sy i Mosy. Ny zanakalahin’i Maly dia i Eleazara sy i Kisy. '
  '22':
  - type: text
    content: 'Ary maty i Eleazara nefa tsy nanan-janakalahy fa vavy avokoa; ny zanakalahin’i Kisy havany no nanambady azy ireo. '
  '23':
  - type: text
    content: Ny zanakalahin’i Mosy dia i Maly sy i Edera ary i Jeremota; telo izy ireo.
  '24':
  - type: text
    content: 'Ireo no zanakalahin’i Levy araka ny fianakaviany, dia ny lohan’ny fianakaviana tamin’ny antokony avy araka ny nanisana ny anarany tsirairay, dia izay nanao ny fanompoana tao amin’ny tranon’NY TOMPO, hatramin’ny roapolo taona no ho miakatra. '
  '25':
  - type: text
    content: 'Fa hoy i Davida: NY TOMPO, Andriamanitry ny Israely, efa nanome fitsaharana ho an’ny olony sady mitoetra eto Jerosalema mandrakizay. '
  '26':
  - type: text
    content: 'Ary ny levita kosa dia tsy hitondra ny '
  - type: text
    content: tabernakely
  - type: text
    content: ' na ny fanaka enti-manompo ao aminy intsony. '
  '27':
  - type: text
    content: 'Fa araka ny faratenin’i Davida dia nisaina hatramin’ny roapolo taona no ho miakatra ny levita. '
  '28':
  - type: text
    content: 'Ary ny raharahany dia ny hanampy ny taranak’i Arona amin’ny fanompoana ao amin’ny tranon’NY TOMPO, amin’ireo kianja sy efitrano ary amin’ny fanadiovana ny zavatra masina rehetra sy ny fanompoana ao amin’ny tranon’Andriamanitra, '
  '29':
  - type: text
    content: 'amin’ny mofo atao fanatitra sy ny koba tsara toto ho fanatitra avy amin’ny zavamaniry, amin’ny mofo manify tsy misy masirasira, amin’izay endasina amin’ny lapoaly, amin’izay mofo hafa karazana, ny amin’ny famarana sy ny fandrefesana rehetra, '
  '3':
  - type: text
    content: 'Dia nisaina ny levita hatramin’ny telopolo taona no ho miakatra ka valo arivo sy telo alina no isan’ny lehilahy. '
  '30':
  - type: text
    content: 'ny hitsangana isa-maraina hisaotra sy hidera NY TOMPO, ary toy izany koa amin’ny hariva, '
  '31':
  - type: text
    content: 'ary ny hanolotra ny fanatitra dorana manontolo rehetra ho an’NY TOMPO, na amin’ny Sabata, na amin’ny voaloham-bolana, na amin’ny fotoam-pivavahana hafa, dia araka ny isany avy, sy araka ny fanao voatendry hanaovana azy mandrakariva eo anatrehan’NY TOMPO. '
  '32':
  - type: text
    content: 'Aoka ho toy izany no hitandremany ny anjara raharahany ny amin’ny '
  - type: text
    content: tranolay fihaonana
  - type: text
    content: ' sy ny anjara raharahany ny amin’ny fitoerana masina ary ny anjara raharahany ny amin’ny taranak’i Arona rahalahiny ho fanompoana ao amin’ny tranon’NY TOMPO.'
  '4':
  - type: text
    content: 'Ary hoy Davida: Ataoko ho tonian’ny asa ao amin’ny tranon’NY TOMPO ny efatra arivo sy roa alina amin’ireo, ataoko mpifehy sy mpitsara ny enina arivo, '
  '5':
  - type: text
    content: ho mpiandry varavarana ny efatra arivo, ary ho mpidera NY TOMPO amin’ny zavatra namboariko hiderana Azy ny efatra arivo.
  '6':
  - type: text
    content: Nozarazarain’i Davida ho antokony ireo araka ny zanakalahin’i Levy,
  - type: text
    content: 'dia i Gersona sy i Kehata ary i Merary:'
  '7':
  - type: text
    content: Tamin’ny Gersonita dia i Ladana sy i Simey.
  '8':
  - type: text
    content: Ny zanakalahin’i Ladana dia i Jehiela no lohany, ny manarakaraka azy dia i Zetama sy i Joela; telo izy ireo.
  '9':
  - type: text
    content: Ny zanakalahin’i Simey dia i Selomota sy i Haziela ary i Harana; telo izy ireo. Ireo no lohany tamin’ny fianakavian’i Ladana.
