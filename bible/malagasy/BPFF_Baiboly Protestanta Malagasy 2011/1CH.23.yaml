document_id: 1CH.23
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nandaminan’i Davida ny raharahan’ny levita
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Nony efa ela niainana sy tratra antitra tsara i Davida dia i Solomona zanany no nataony mpanjaka tamin’ny Israely.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Novoriny ny lehiben’ny Israely rehetra mbamin’ny mpisorona sy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: levita
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dia nisaina ny levita hatramin’ny telopolo taona no ho miakatra ka valo arivo sy telo alina no isan’ny lehilahy. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary hoy Davida: Ataoko ho tonian’ny asa ao amin’ny tranon’NY TOMPO ny efatra arivo sy roa alina amin’ireo, ataoko mpifehy sy mpitsara ny enina arivo, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ho mpiandry varavarana ny efatra arivo, ary ho mpidera NY TOMPO amin’ny zavatra namboariko hiderana Azy ny efatra arivo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Nozarazarain’i Davida ho antokony ireo araka ny zanakalahin’i Levy,
- type: usfm
  marker: p
  children:
  - type: text
    text: 'dia i Gersona sy i Kehata ary i Merary:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Tamin’ny Gersonita dia i Ladana sy i Simey.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ny zanakalahin’i Ladana dia i Jehiela no lohany, ny manarakaraka azy dia i Zetama sy i Joela; telo izy ireo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ny zanakalahin’i Simey dia i Selomota sy i Haziela ary i Harana; telo izy ireo. Ireo no lohany tamin’ny fianakavian’i Ladana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ny zanakalahin’i Simey dia i Jahata, i Zina, i Jeosy ary i Beria; izy efa-dahy ireo no zanakalahin’i Simey. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: I Jahata no voalohany, ary i Ziza no faharoa; fa i Jeosy sy i Beria dia tsy nanana zanakalahy maro, koa nisaina ho fianakaviana iray sy antokony iray izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ny zanakalahin’i Kehata dia i Amrama, i Jizara, i Hebrona ary i Oziela; efatra izy ireo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ny zanakalahin’i Amrama dia i Arona sy i Mosesy. Ary natokana i Arona ka nohamasinina ho masina indrindra, dia izy sy ny taranany fara aman-dimby, handoro ditin-kazo manitra eo anatrehan’NY TOMPO sy hanao fanompoam-pivavahana ho Azy ary hitsodrano amin’ny anarany mandrakizay. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Nefa ny amin’i Mosesy, lehilahin’Andriamanitra, dia nisaina tamin’ny fokon’i Levy ihany ny zanany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ny zanakalahin’i Mosesy dia i Gersona sy i Eliezera.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Tamin’ny zanakalahin’i Gersoma dia i Seboela no lohany. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Tamin’ny zanakalahin’i Eliezera dia i Rehabia no lohany, i Eliezera anefa dia tsy nanan-janaka hafa; fa ny zanak’i Rehabia dia maro indrindra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Tamin’ny zanakalahin’i Jizara dia i Selomota no lohany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ny zanakalahin’i Hebrona, dia i Jeria no lahimatoa, i Amaria no lahiaivo, i Jahaziela no fahatelo, ary i Jekameama no faralahy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ny zanakalahin’i Oziela dia i Mika no lahimatoa ary i Jisia no faralahy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ny zanakalahin’i Merary dia i Maly sy i Mosy. Ny zanakalahin’i Maly dia i Eleazara sy i Kisy. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary maty i Eleazara nefa tsy nanan-janakalahy fa vavy avokoa; ny zanakalahin’i Kisy havany no nanambady azy ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ny zanakalahin’i Mosy dia i Maly sy i Edera ary i Jeremota; telo izy ireo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ireo no zanakalahin’i Levy araka ny fianakaviany, dia ny lohan’ny fianakaviana tamin’ny antokony avy araka ny nanisana ny anarany tsirairay, dia izay nanao ny fanompoana tao amin’ny tranon’NY TOMPO, hatramin’ny roapolo taona no ho miakatra. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Fa hoy i Davida: NY TOMPO, Andriamanitry ny Israely, efa nanome fitsaharana ho an’ny olony sady mitoetra eto Jerosalema mandrakizay. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ary ny levita kosa dia tsy hitondra ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tabernakely
  - type: text
    text: ' na ny fanaka enti-manompo ao aminy intsony. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Fa araka ny faratenin’i Davida dia nisaina hatramin’ny roapolo taona no ho miakatra ny levita. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ary ny raharahany dia ny hanampy ny taranak’i Arona amin’ny fanompoana ao amin’ny tranon’NY TOMPO, amin’ireo kianja sy efitrano ary amin’ny fanadiovana ny zavatra masina rehetra sy ny fanompoana ao amin’ny tranon’Andriamanitra, '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'amin’ny mofo atao fanatitra sy ny koba tsara toto ho fanatitra avy amin’ny zavamaniry, amin’ny mofo manify tsy misy masirasira, amin’izay endasina amin’ny lapoaly, amin’izay mofo hafa karazana, ny amin’ny famarana sy ny fandrefesana rehetra, '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'ny hitsangana isa-maraina hisaotra sy hidera NY TOMPO, ary toy izany koa amin’ny hariva, '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'ary ny hanolotra ny fanatitra dorana manontolo rehetra ho an’NY TOMPO, na amin’ny Sabata, na amin’ny voaloham-bolana, na amin’ny fotoam-pivavahana hafa, dia araka ny isany avy, sy araka ny fanao voatendry hanaovana azy mandrakariva eo anatrehan’NY TOMPO. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Aoka ho toy izany no hitandremany ny anjara raharahany ny amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tranolay fihaonana
  - type: text
    text: ' sy ny anjara raharahany ny amin’ny fitoerana masina ary ny anjara raharahany ny amin’ny taranak’i Arona rahalahiny ho fanompoana ao amin’ny tranon’NY TOMPO.'
