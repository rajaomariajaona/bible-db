document_id: MAT.12
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nanotazan’ny mpianatra salohim-bary tamin’ny Sabata
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mar 2.23-28; Lio 6.1-5
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Tamin’izany andro izany Jesosy nandeha namakivaky tanimbary iray tamin’ny Sabata; ary noana ny mpianany ka nanoty salohim-bary dia nihinana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Fa nony nahita izany ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Fariseo
  - type: text
    text: ' dia niteny Taminy hoe: Indro ny mpianatrao manao izay tsy azo atao amin’ny Sabata. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Fa hoy Izy taminy: Tsy mbola novakinareo va ny teny milaza ilay nataon’i Davida, raha noana izy mbamin’ireo izay nanaraka azy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'fa niditra tao amin’ny tranon’Andriamanitra izy ka nihinana ny mofo atao fanatitra, izay tsy azony na ireo izay nanaraka azy hanina, afa-tsy ny mpisorona ihany? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary mbola tsy novakinareo ao amin’ny lalàna va fa amin’ny Sabata ny mpisorona ao amin’ny tempoly dia mandika ny Sabata, kanefa tsy manan-tsiny? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia lazaiko aminareo fa misy eto lehibe noho ny tempoly. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Fa raha fantatrareo izay hevitry ny teny hoe: «Famindrampo no sitrako fa tsy fanatitra alatsa-dra» (Hos 6.6), dia tsy mba nanameloka ny tsy manan-tsiny ianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Fa Tompon’ny Sabata ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Zanak’Olona
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ilay lehilahy iray maty tanana
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mar 3.1-6; Lio 6.6-11
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Nony niala teo Jesosy dia niditra tao amin’ny sinagoga; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'ary indro, nisy lehilahy maty tanana teo. Ary nanontanian’ny olona Izy hoe: Mety va ny manasitrana amin’ny Sabata? Mba hiampangany Azy izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary hoy Izy taminy: Iza aminareo moa, raha manana ondry iray ka latsaka any an-kady amin’ny Sabata, no tsy handray sy hampiakatra azy? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary tsy mihoatra lavitra noho ny ondry va ny olona? Koa amin’izany dia mety ny manao soa amin’ny Sabata. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dia hoy Izy tamin’ilay lehilahy: Atsory ny tananao. Dia natsotrany ny tanany ka sitrana tahaka an’ilay ilany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dia niala teo ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Fariseo
  - type: text
    text: ' ka nikaon-doha ny amin’izay hamonoany Azy.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesosy, ilay Mpanompon’Andriamanitra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Fa Jesosy nahalala izany ka niala teo.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ary nisy olona betsaka nanaraka Azy ka nositraniny avokoa izy rehetra; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'ary nandrara azy Izy tsy hanao izay hahafantarana Azy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: mba hahatanteraka izay nampilazaina an’Isaia mpaminany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.17 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: profeta.
    marker-yv: yv-n
  - type: text
    text: ' hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: «Indro ny Mpanompoko izay nofidiko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny Malalako izay sitraky ny foko indrindra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hapetrako ao Aminy ny Fanahiko
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ary hitory ny rariny amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jentilisa
  - type: text
    text: ' Izy.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Tsy hifanditra na hiantso mafy Izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy hisy handre ny feony any an-dalana;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Tsy hotapahiny ny volotara torotoro
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy hovonoiny ny lahin-jiro manetona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ambara-pamoakany ny rariny ho mpandresy;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'ary ny anarany no hitokian’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jentilisa
  - type: text
    text: » (Isa 42.1-4).
- type: usfm
  marker: s1
  children:
  - type: text
    text: Manana izay ifandraisany amin’ny demonia va Jesosy?
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mar 3.22-27; Lio 11.14-23; ampit. Mat 9.32-34
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Noentina tany amin’i Jesosy koa ny lehilahy iray izay demoniaka sady jamba no moana; dia nositraniny ka niteny ilay moana sady nahita.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Dia talanjona ny vahoaka rehetra ka niteny hoe: Moa Ity va ilay Zanak’i Davida? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Fa nony ren’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Fariseo
  - type: text
    text: ' izany dia hoy izy ireo: Ilehity tsy mandroaka ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: demonia
  - type: text
    text: ' afa-tsy amin’ny alalan’i Belzeboba, lohan’ny demonia.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary Jesosy nahafantatra ny eritreriny dia niteny tamin’ireo hoe: Ho foana ny fanjakana rehetra izay miady an-trano; ary tsy haharitra ny tanàna rehetra, na ny trano, izay miady an-trano. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Raha i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Satana
  - type: text
    text: ' no mandroaka an’i Satana dia miady an-trano izy; koa ahoana no haharetan’ny fanjakany? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ary raha amin’ny alalan’i Belzeboba no amoahako ny demonia, amin’ny alalan’iza kosa no mba androahan’ny zanakareo azy? Noho izany dia izy ireo ihany no ho mpitsara anareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Fa raha ny Fanahin’Andriamanitra kosa no amoahako ny demonia dia efa tonga aminareo sahady ny fanjakan’Andriamanitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Fa hataon’ny olona ahoana no fiditra ao an-tranon’ny mahery handroba ny entany raha tsy afatony aloha ny mahery? Dia izay vao handroba ny ao an-tranony izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Izay tsy momba Ahy dia manohitra Ahy; ary izay tsy miara-mamory amiko dia mampihahaka.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny zanak’olombelona dia hotsaraina amin’ny teniny
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mar 3.28-29; Lio 12.10
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Noho izany, lazaiko aminareo hoe: Hahazo famelan-keloka ny olona amin’ny ota sy fitenenan-dratsy samihafa rehetra; fa tsy hahazo famelan-keloka ny olona amin’ny fitenenan-dratsy ny Fanahy Masina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Ary na iza na iza no milaza teny hanohitra ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Zanak’Olona
  - type: text
    text: ' dia hahazo famelan-keloka ihany; fa na iza na iza no miteny hanohitra ny Fanahy Masina dia tsy mba hahazo famelan-keloka, na amin’izao fiainana izao, na amin’ny ho avy.'
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat 7.16-20; Lio 6.43-45
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Koa ataovy tsara ny hazo mbamin’ny voany, na ataovy ratsy ny hazo mbamin’ny voany; fa ny voany no ahafantarana ny hazo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ry taranaky ny menarana! Hataonareo, izay ratsy fanahy, ahoana no fahay miteny zavatra tsara? Fa avy amin’ny haben’ny ao am-po no itenenan’ny vava. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Avy amin’ny rakitra tsara no amoahan’ny olona tsara fanahy zavatra tsara; ary avy amin’ny rakitra ratsy kosa no amoahan’ny olona ratsy fanahy zavatra ratsy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Ary lazaiko aminareo fa hampamoahina ny olona amin’ny andro fitsarana noho ny amin’ny teny rehetra tsy misy antony izay nataony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Fa ny teninao no hanamarinana anao ary ny teninao no hanamelohana anao.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny famantarana ny amin’i Jona; ny mpanjakavavy avy any atsimo
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat 16.1-4; Mar 8.11-12; Lio 11.16, 29-32
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Ary tamin’izany, ny sasany tamin’ireo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpanoradalàna
  - type: text
    text: ' sy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Fariseo
  - type: text
    text: ', dia niteny Taminy hoe: Mpampianatra ô, ta hahita famantarana avy Aminao izahay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Fa Jesosy namaly azy ireo hoe: Izay taranaka ratsy fanahy sy mijangajanga dia fatra-pitady famantarana; nefa tsy hisy famantarana homena azy, afa-tsy famantarana ny amin’i Jona mpaminany; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'fa tahaka ny nitoeran’i Jona telo andro sy telo alina tao an-kibon’ny hazandrano lehibe dia toy izany no hitoeran’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Zanak’Olona
  - type: text
    text: ' telo andro sy telo alina ao anatin’ny tany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Ny olona tany Ninive dia hiara-mitsangana amin’ity taranaka ity amin’ny andro fitsarana ka hanameloka azy; fa nibebaka izy ireo tamin’ny toritenin’i Jona; nefa indro, misy lehibe noho i Jona eto. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: Ny mpanjakavavy avy tany atsimo dia hiara-mitsangana amin’ity taranaka ity amin’ny andro fitsarana ka hanameloka azy; fa avy tany amin’ny faran’ny tany izy hihaino ny fahendren’i Solomona; nefa indro, misy lehibe noho i Solomona eto.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fiverenan’ny fanahy maloto
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Lio 11.24-26
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Raha miala amin’ny olona ny fanahy maloto dia mandeha mitety ny tany tsy misy rano izy, mitady fitsaharana, nefa tsy mahita. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Dia hoy izy: Hody any amin’ny tranoko izay nialako aho; ary nony tonga izy dia hitany fa foana ny trano sady efa voafafa no voalamina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: Ary mandeha izy ka mitondra fanahy fito hafa koa izay ratsy noho izy miaraka aminy; dia miditra ireo ka mitoetra ao; ary ny fiafaran’izany olona izany dia tonga ratsy noho ny voalohany. Dia tahaka izany koa no ho amin’ity taranaka ratsy fanahy ity.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny tena fianakavian’i Jesosy
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mar 3.31-35; Lio 8.19-21
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Ary raha mbola niteny tamin’ny vahoaka Jesosy, indreo ny reniny mbamin’ireo rahalahiny, nijanona teo alatrano nitady hiresaka Taminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Ary nisy iray niteny Taminy hoe: Indreo ny reninao mbamin’ny rahalahinao, mijanona ato alatrano mitady hiresaka Aminao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Fa namaly an’ilay nilaza Taminy izy hoe: Iza moa no reniko ary iza no rahalahiko? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'Sady nanondro ny mpianany tamin’ny tanany Izy no niteny hoe: Indreo no reniko sy rahalahiko; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: fa na iza na iza no manao ny sitrapon’ny Raiko izay any an-danitra dia izy no rahalahiko sy anabaviko ary reniko.
