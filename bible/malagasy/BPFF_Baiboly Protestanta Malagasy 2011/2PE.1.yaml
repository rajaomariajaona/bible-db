document_id: 2PE.1,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Fiarahabana
  - type: text
    content: 'I Simona Petera, mpanompo sy apostolin’i Jesosy '
  - type: text
    content: Kristy
  - type: text
    content: ', no mamangy izay efa nahazo finoana sarobidy tahaka ny anay, amin’ny fahamarinan’i Jesosy Kristy, Andriamanitra sy Mpamonjy antsika: '
  '10':
  - type: text
    content: 'Noho izany indrindra, ry rahalahy, mazotoa kosa hampitoetra ny fiantsoana sy ny fifidianana anareo. Fa raha manao izany zavatra izany ianareo dia tsy ho tafintohina akory mandrakizay. '
  '11':
  - type: text
    content: Fa toy izany no hanomezana malalaka ho anareo ny fidirana ho any amin’ny fanjakana mandrakizay izay an’i Jesosy Kristy Tompontsika sy Mpamonjy antsika.
  '12':
  - type: text
    content: 'Koa hampahatsiaro anareo mandrakariva ny amin’izany zavatra izany aho, na dia efa fantatrareo aza ka efa tafaorina tsara amin’ny fahamarinana izay efa eo aminareo ianareo. '
  '13':
  - type: text
    content: 'Fa raha mbola eto amin’ity tranolay ity aho dia ataoko fa mety ny hanaitaitra ny fahatsiarovanareo '
  '14':
  - type: text
    content: 'satria fantatro fa ho avy tampoka ny hanesorana ny tranolaiko, araka izay nasehon’i Jesosy Kristy Tompontsika tamiko koa. '
  '15':
  - type: text
    content: Koa hataoko izay azoko atao mba hisy hotsarovanareo mandrakariva izany zavatra izany rehefa maty aho.
  - type: heading
    content: Efa hitan’ny masonay ny voninahiny
  '16':
  - type: text
    content: 'Fa tsy mba niankina tamin’izay anganongano noforonin’ny hafetsen’ny saina izahay raha nampahafantatra anareo ny hery sy ny fiavian’i Jesosy '
  - type: text
    content: Kristy
  - type: text
    content: ' Tompontsika, fa efa hitan’ny masonay ny fiandrianany. '
  '17':
  - type: text
    content: 'Fa nahazo laza amam-boninahitra tamin’Andriamanitra Ray Izy raha tonga taminy avy tamin’ny voninahitra lehibe indrindra ilay feo hoe: «Ity no Zanako malalako izay sitrako» (Mat 17.5). '
  '18':
  - type: text
    content: 'Renay io feo avy tany an-danitra io raha niaraka taminy tany amin’ny tendrombohitra masina izahay. '
  '19':
  - type: text
    content: 'Ary manana ny teny faminaniana natao mafy orina kokoa isika ka tsara ny ataonareo raha mitandrina izany ianareo, fa toy ny jiro mamirapiratra ao amin’ny toerana maizina izany, mandra-pahazava ny andro ka miposaka ao am-ponareo ny kintana fitarikandro. '
  '2':
  - type: text
    content: Hampitomboina ho anareo anie ny fahasoavana sy ny fiadanana amin’ny fahalalana tsara an’Andriamanitra sy Jesosy Tompontsika.
  - type: heading
    content: Mazotoa hampitoetra ny fiantsoana anareo
  '20':
  - type: text
    content: 'Fa fantatrareo voalohany indrindra fa ny famoahan-kevitry ny faminaniana ao amin’ny Soratra Masina dia tsy efan’ny fisainan’ny olona fotsiny ihany; '
  '21':
  - type: text
    content: fa tsy nisy faminaniana avy tamin’ny sitrapon’ny olona tany aloha rehetra; fa avy tamin’Andriamanitra no nitenenan’ny olona araka izay nitondran’ny Fanahy Masina azy.
  '3':
  - type: text
    content: 'Efa nomen’ny herin’Andriamanitra ho antsika ny zavatra rehetra momba ny fiainana sy ny toe-panahy araka an’Andriamanitra, amin’ny fahalalana Ilay niantso antsika tamin’ny voninahiny sy ny fahatsarany. '
  '4':
  - type: text
    content: Izany no nanomezana antsika ireo teny fikasana sady sarobidy no lehibe indrindra, mba ho tonga mpiombona amin’ny fomban’Andriamanitra amin’izany ianareo, rehefa afa-nandositra ny fahalovana izay eo amin’izao tontolo izao noho ny filana.
  '5':
  - type: text
    content: 'Noho izany indrindra dia manaova izay zotom-po rehetra kosa ianareo, koa amin’ny finoanareo dia manehoa fahatanjahan-tsaina, ary amin’ny fahatanjahan-tsainareo dia fahalalana, '
  '6':
  - type: text
    content: 'ary amin’ny fahalalanareo dia fahononam-po, ary amin’ny fahononam-ponareo dia faharetana, ary amin’ny faharetanareo dia toe-panahy araka an’Andriamanitra, '
  '7':
  - type: text
    content: 'ary amin’ny toe-panahinareo araka an’Andriamanitra dia fitiavana ny rahalahy, ary amin’ny fitiavanareo ny rahalahy dia fitiavana ny olona rehetra. '
  '8':
  - type: text
    content: 'Fa raha anananareo izany zavatra izany sady anananareo betsaka dia tsy avelan’izany ho malaina na tsy hahavokatra ianareo amin’ny fahalalana tsara an’i Jesosy '
  - type: text
    content: Kristy
  - type: text
    content: ' Tompontsika. '
  '9':
  - type: text
    content: 'Fa izay tsy manana izany zavatra izany kosa dia jamba; tsy mahajery lavitra izy sady nanadino ny nanadiovana azy tamin’ny fahotany fahiny. '
