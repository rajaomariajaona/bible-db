document_id: 2PE.1
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fiarahabana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'I Simona Petera, mpanompo sy apostolin’i Jesosy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ', no mamangy izay efa nahazo finoana sarobidy tahaka ny anay, amin’ny fahamarinan’i Jesosy Kristy, Andriamanitra sy Mpamonjy antsika: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Hampitomboina ho anareo anie ny fahasoavana sy ny fiadanana amin’ny fahalalana tsara an’Andriamanitra sy Jesosy Tompontsika.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mazotoa hampitoetra ny fiantsoana anareo
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Efa nomen’ny herin’Andriamanitra ho antsika ny zavatra rehetra momba ny fiainana sy ny toe-panahy araka an’Andriamanitra, amin’ny fahalalana Ilay niantso antsika tamin’ny voninahiny sy ny fahatsarany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Izany no nanomezana antsika ireo teny fikasana sady sarobidy no lehibe indrindra, mba ho tonga mpiombona amin’ny fomban’Andriamanitra amin’izany ianareo, rehefa afa-nandositra ny fahalovana izay eo amin’izao tontolo izao noho ny filana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Noho izany indrindra dia manaova izay zotom-po rehetra kosa ianareo, koa amin’ny finoanareo dia manehoa fahatanjahan-tsaina, ary amin’ny fahatanjahan-tsainareo dia fahalalana, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'ary amin’ny fahalalanareo dia fahononam-po, ary amin’ny fahononam-ponareo dia faharetana, ary amin’ny faharetanareo dia toe-panahy araka an’Andriamanitra, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'ary amin’ny toe-panahinareo araka an’Andriamanitra dia fitiavana ny rahalahy, ary amin’ny fitiavanareo ny rahalahy dia fitiavana ny olona rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Fa raha anananareo izany zavatra izany sady anananareo betsaka dia tsy avelan’izany ho malaina na tsy hahavokatra ianareo amin’ny fahalalana tsara an’i Jesosy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' Tompontsika. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Fa izay tsy manana izany zavatra izany kosa dia jamba; tsy mahajery lavitra izy sady nanadino ny nanadiovana azy tamin’ny fahotany fahiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Noho izany indrindra, ry rahalahy, mazotoa kosa hampitoetra ny fiantsoana sy ny fifidianana anareo. Fa raha manao izany zavatra izany ianareo dia tsy ho tafintohina akory mandrakizay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Fa toy izany no hanomezana malalaka ho anareo ny fidirana ho any amin’ny fanjakana mandrakizay izay an’i Jesosy Kristy Tompontsika sy Mpamonjy antsika.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Koa hampahatsiaro anareo mandrakariva ny amin’izany zavatra izany aho, na dia efa fantatrareo aza ka efa tafaorina tsara amin’ny fahamarinana izay efa eo aminareo ianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Fa raha mbola eto amin’ity tranolay ity aho dia ataoko fa mety ny hanaitaitra ny fahatsiarovanareo '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'satria fantatro fa ho avy tampoka ny hanesorana ny tranolaiko, araka izay nasehon’i Jesosy Kristy Tompontsika tamiko koa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Koa hataoko izay azoko atao mba hisy hotsarovanareo mandrakariva izany zavatra izany rehefa maty aho.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Efa hitan’ny masonay ny voninahiny
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Fa tsy mba niankina tamin’izay anganongano noforonin’ny hafetsen’ny saina izahay raha nampahafantatra anareo ny hery sy ny fiavian’i Jesosy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' Tompontsika, fa efa hitan’ny masonay ny fiandrianany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Fa nahazo laza amam-boninahitra tamin’Andriamanitra Ray Izy raha tonga taminy avy tamin’ny voninahitra lehibe indrindra ilay feo hoe: «Ity no Zanako malalako izay sitrako» (Mat 17.5). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Renay io feo avy tany an-danitra io raha niaraka taminy tany amin’ny tendrombohitra masina izahay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary manana ny teny faminaniana natao mafy orina kokoa isika ka tsara ny ataonareo raha mitandrina izany ianareo, fa toy ny jiro mamirapiratra ao amin’ny toerana maizina izany, mandra-pahazava ny andro ka miposaka ao am-ponareo ny kintana fitarikandro. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Fa fantatrareo voalohany indrindra fa ny famoahan-kevitry ny faminaniana ao amin’ny Soratra Masina dia tsy efan’ny fisainan’ny olona fotsiny ihany; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: fa tsy nisy faminaniana avy tamin’ny sitrapon’ny olona tany aloha rehetra; fa avy tamin’Andriamanitra no nitenenan’ny olona araka izay nitondran’ny Fanahy Masina azy.
