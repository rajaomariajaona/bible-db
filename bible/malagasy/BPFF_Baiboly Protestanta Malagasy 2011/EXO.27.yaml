document_id: EXO.27,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny alitara fanaovana fanatitra
  - type: text
    content: 'Ataovy amin’ny hazo akasia ny alitara: Dimy '
  - type: text
    content: hakiho
  - type: text
    content: ' avy ny lafiny efatra, izany hoe: Ho efamira, ary telo hakiho ny haavony. '
  '10':
  - type: text
    content: 'ho roapolo ny andriny ary ho roapolo ny faladiany varahina; ho volafotsy ny fihantonana amin’ny andriny sy ny farango hitohizany. '
  '11':
  - type: text
    content: 'Ho tahaka izany koa eo amin’ny lafiny avaratra, amin’ny lavany dia hisy fefy lamba, zato hakiho ny halavany, ho roapolo ny andriny, ho roapolo ny faladiany varahina; ho volafotsy ny fihantonana amin’ireo andriny sy ny farango hitohizany. '
  '12':
  - type: text
    content: 'Hisy fefy lamba dimampolo hakiho amin’ny sakan’ny kianja amin’ny lafiny andrefana; ho folo ny andriny ary ho folo ny faladiany. '
  '13':
  - type: text
    content: 'Ho dimampolo hakiho ny sakan’ny kianja eo amin’ny lafiny atsinanana. '
  '14':
  - type: text
    content: 'Ary hisy fefy lamba dimy amby folo hakiho amin’ny sakany iray; ho telo ny andriny ary ho telo ny faladiany. '
  '15':
  - type: text
    content: 'Ary hisy fefy lamba dimy amby folo hakiho amin’ny sakany iray koa, ho telo ny andriny ary ho telo ny faladiany. '
  '16':
  - type: text
    content: 'Eo amin’ny vavahadin’ny kianja dia hasiana vavahady sy lamba roapolo hakiho, manga, volomparasy, jaky ary lamba rongony fotsy madinika voatenona, asan’ny mahay tenona samihafa soratra; ho efatra ny andriny ary ho efatra ny faladiany. '
  '17':
  - type: text
    content: 'Samy hisy farango volafotsy hitohizany ny andry rehetra amin’ny kianja manodidina; ho volafotsy ny fihantonany ary ho varahina ny faladiany. '
  '18':
  - type: text
    content: 'Ny lavan’ny kianja dia ho zato hakiho, ny sakany dia ho dimampolo hakiho ary ny haavony dia ho dimy hakiho ka hatao amin’ny lamba rongony fotsy madinika voatenona izany, ary ho varahina ny faladiany. '
  '19':
  - type: text
    content: Ho varahina avokoa ny fiasana rehetra momba ny tabernakely; ary ny tsatòkan-day rehetra momba azy sy ny tsatòkan-dain’ny kianja dia ho varahina koa.
  - type: heading
    content: Ny diloilo hampirehetana ny jiro
  '2':
  - type: text
    content: 'Amboary ataovy miray aminy ny '
  - type: text
    content: tandroka
  - type: text
    content: ' eo amin’ny zorony efatra ary petaho takelaka varahina ireo. '
  '20':
  - type: text
    content: 'Asaivo mitondra diloilon’oliva tsy miharo ho eo aminao ny Zanak’Israely, diloilo nofiazana, hatao fanazavana, mba hisy jiro mirehitra tsy miato. '
  '21':
  - type: text
    content: 'Ao anatin’ny '
  - type: text
    content: tranolay fihaonana
  - type: text
    content: ', dia eo ivelan’ny efitra lamba izay manakona ny Vavolombelona, no handaharan’i Arona sy ny zanany azy ho eo anatrehan’NY TOMPO hatramin’ny hariva ka hatramin’ny maraina; ho lalàna maharitra amin’ny Zanak’Israely izany hatramin’ny taranany fara aman-dimby.'
  '3':
  - type: text
    content: 'Manaova koveta fandraofan-davenona handraofana ny lavenony ary amboary ny sotron’afony sy ny lovia fandraofany ary ny fitrebiny sy ny fitondrana afony; varahina no hanaovanao ny fanaka rehetra momba azy. '
  '4':
  - type: text
    content: 'Dia manaova makarakara varahina tahaka ny harato ho eo aminy; ary manamboara mason-drojo varahina efatra hatao eo ambonin’ny harato eo amin’ny zorony efatra. '
  '5':
  - type: text
    content: 'Ataovy eo ambanin’ny sisin’ny alitara hatreny ambaniny izany ka ny makarakara dia hampisasaka ny haavon’ny alitara. '
  '6':
  - type: text
    content: 'Manaova bao ho amin’ny alitara, bao amin’ny hazo akasia, ka petaho takelaka varahina. '
  '7':
  - type: text
    content: 'Ampidiro eo amin’ny mason-drojo ny bao; ny bao dia ho eo amin’ny lafiny roa amin’ny alitara rehefa lanjaina izy. '
  '8':
  - type: text
    content: Hazofisaka no arafeto ho alitara ka ataovy poakaty izany; araka izay naseho taminao tao an-tendrombohitra no hanaovana azy.
  - type: heading
    content: Ny fefy manodidina ny kianja
  '9':
  - type: text
    content: 'Ataovy koa ny kianjan’ny '
  - type: text
    content: tabernakely
  - type: text
    content: ': Eo amin’ny lafiny atsimo dia hisy fefy lamba rongony fotsy madinika voatenona ho amin’ny kianja. Zato '
  - type: text
    content: hakiho
  - type: text
    content: ' ny halavany amin’ny lafiny iray; '
