document_id: EXO.27
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny alitara fanaovana fanatitra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ataovy amin’ny hazo akasia ny alitara: Dimy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: hakiho
  - type: text
    text: ' avy ny lafiny efatra, izany hoe: Ho efamira, ary telo hakiho ny haavony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Amboary ataovy miray aminy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tandroka
  - type: text
    text: ' eo amin’ny zorony efatra ary petaho takelaka varahina ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Manaova koveta fandraofan-davenona handraofana ny lavenony ary amboary ny sotron’afony sy ny lovia fandraofany ary ny fitrebiny sy ny fitondrana afony; varahina no hanaovanao ny fanaka rehetra momba azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dia manaova makarakara varahina tahaka ny harato ho eo aminy; ary manamboara mason-drojo varahina efatra hatao eo ambonin’ny harato eo amin’ny zorony efatra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ataovy eo ambanin’ny sisin’ny alitara hatreny ambaniny izany ka ny makarakara dia hampisasaka ny haavon’ny alitara. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Manaova bao ho amin’ny alitara, bao amin’ny hazo akasia, ka petaho takelaka varahina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ampidiro eo amin’ny mason-drojo ny bao; ny bao dia ho eo amin’ny lafiny roa amin’ny alitara rehefa lanjaina izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Hazofisaka no arafeto ho alitara ka ataovy poakaty izany; araka izay naseho taminao tao an-tendrombohitra no hanaovana azy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fefy manodidina ny kianja
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ataovy koa ny kianjan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tabernakely
  - type: text
    text: ': Eo amin’ny lafiny atsimo dia hisy fefy lamba rongony fotsy madinika voatenona ho amin’ny kianja. Zato '
  - type: usfm
    marker: w
    children:
    - type: text
      text: hakiho
  - type: text
    text: ' ny halavany amin’ny lafiny iray; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'ho roapolo ny andriny ary ho roapolo ny faladiany varahina; ho volafotsy ny fihantonana amin’ny andriny sy ny farango hitohizany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ho tahaka izany koa eo amin’ny lafiny avaratra, amin’ny lavany dia hisy fefy lamba, zato hakiho ny halavany, ho roapolo ny andriny, ho roapolo ny faladiany varahina; ho volafotsy ny fihantonana amin’ireo andriny sy ny farango hitohizany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Hisy fefy lamba dimampolo hakiho amin’ny sakan’ny kianja amin’ny lafiny andrefana; ho folo ny andriny ary ho folo ny faladiany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ho dimampolo hakiho ny sakan’ny kianja eo amin’ny lafiny atsinanana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary hisy fefy lamba dimy amby folo hakiho amin’ny sakany iray; ho telo ny andriny ary ho telo ny faladiany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary hisy fefy lamba dimy amby folo hakiho amin’ny sakany iray koa, ho telo ny andriny ary ho telo ny faladiany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Eo amin’ny vavahadin’ny kianja dia hasiana vavahady sy lamba roapolo hakiho, manga, volomparasy, jaky ary lamba rongony fotsy madinika voatenona, asan’ny mahay tenona samihafa soratra; ho efatra ny andriny ary ho efatra ny faladiany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Samy hisy farango volafotsy hitohizany ny andry rehetra amin’ny kianja manodidina; ho volafotsy ny fihantonany ary ho varahina ny faladiany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ny lavan’ny kianja dia ho zato hakiho, ny sakany dia ho dimampolo hakiho ary ny haavony dia ho dimy hakiho ka hatao amin’ny lamba rongony fotsy madinika voatenona izany, ary ho varahina ny faladiany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ho varahina avokoa ny fiasana rehetra momba ny tabernakely; ary ny tsatòkan-day rehetra momba azy sy ny tsatòkan-dain’ny kianja dia ho varahina koa.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny diloilo hampirehetana ny jiro
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Asaivo mitondra diloilon’oliva tsy miharo ho eo aminao ny Zanak’Israely, diloilo nofiazana, hatao fanazavana, mba hisy jiro mirehitra tsy miato. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ao anatin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tranolay fihaonana
  - type: text
    text: ', dia eo ivelan’ny efitra lamba izay manakona ny Vavolombelona, no handaharan’i Arona sy ny zanany azy ho eo anatrehan’NY TOMPO hatramin’ny hariva ka hatramin’ny maraina; ho lalàna maharitra amin’ny Zanak’Israely izany hatramin’ny taranany fara aman-dimby.'
