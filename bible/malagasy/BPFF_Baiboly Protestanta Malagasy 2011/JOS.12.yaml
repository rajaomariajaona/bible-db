document_id: JOS.12,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Lisitry ny tany azon’ny Israely
  - type: text
    content: 'Izao no mpanjakan’ny tany resin’ny Zanak’Israely ka nobaboiny ny tany, teny andafy atsinanan’i Jordana hatreo amin’ny lohasahan-driaka Arnona ka hatrany amin’ny tendrombohitra Hermona sy ny ilany atsinanan’ny tany ngazana:'
  '10':
  - type: text
    content: ny mpanjakan’i Jerosalema, iray;
  - type: text
    content: ny mpanjakan’i Hebrona, iray;
  '11':
  - type: text
    content: ny mpanjakan’i Jarmota, iray;
  - type: text
    content: ny mpanjakan’i Lakisy, iray;
  '12':
  - type: text
    content: ny mpanjakan’i Eglona, iray;
  - type: text
    content: ny mpanjakan’i Gezera, iray;
  '13':
  - type: text
    content: ny mpanjakan’i Debira, iray;
  - type: text
    content: ny mpanjakan’i Gedera, iray;
  '14':
  - type: text
    content: ny mpanjakan’i Horma, iray;
  - type: text
    content: ny mpanjakan’i Arada, iray;
  '15':
  - type: text
    content: ny mpanjakan’i Libna, iray;
  - type: text
    content: ny mpanjakan’i Adolama, iray;
  '16':
  - type: text
    content: ny mpanjakan’i Makeda, iray;
  - type: text
    content: ny mpanjakan’i Betela, iray;
  '17':
  - type: text
    content: ny mpanjakan’i Tapoa, iray;
  - type: text
    content: ny mpanjakan’i Hefera, iray;
  '18':
  - type: text
    content: ny mpanjakan’i Afeka, iray;
  - type: text
    content: ny mpanjakan’i Lasarona, iray;
  '19':
  - type: text
    content: ny mpanjakan’i Madona, iray;
  - type: text
    content: ny mpanjakan’i Hazora, iray;
  '2':
  - type: text
    content: 'I Sihona, mpanjakan’ny Amorita izay nonina tany Hesbona ka nanjaka hatrany Aroera, teo amoron’ny lohasahan-driaka Arnona, hatreo afovoan’ny lohasaha sy ny antsasak’i Gileada ka hatramin’ny lohasahan-driaka Jaboka izay sisintanin’ny taranak’i Amona, '
  '20':
  - type: text
    content: ny mpanjakan’i Simrona-Merona, iray;
  - type: text
    content: ny mpanjakan’i Aksafa, iray;
  '21':
  - type: text
    content: ny mpanjakan’i Tanàka, iray;
  - type: text
    content: ny mpanjakan’i Megido, iray;
  '22':
  - type: text
    content: ny mpanjakan’i Kadesy, iray;
  - type: text
    content: ny mpanjakan’i Jokneama any Karmela, iray;
  '23':
  - type: text
    content: ny mpanjakan’i Dora eo amin’ny havoanan’i Dora, iray;
  - type: text
    content: ny mpanjakan’i Goima any Gilgala, iray;
  '24':
  - type: text
    content: ny mpanjakan’i Tirza, iray.
  - type: text
    content: Iraika amby telopolo no isan’ny mpanjaka rehetra.
  '3':
  - type: text
    content: ary ny ilany atsinanan’ny tany ngazana hatreo amin’ny ranomasina Kinerota ka hatramin’ny ranomasina Arabà, ny Ranomasintsira, amin’ny lalana mankany Bety-Jesimota, ary hatrany amin’ny tany atsimo eo amin’ny sisin’i Pisga.
  '4':
  - type: text
    content: 'Azony koa ny tanin’i Oga, mpanjakan’i Basana, isan’ny Refaìta sisa, izay nitoetra tany Astarota sy Edrehy, '
  '5':
  - type: text
    content: 'nanjaka tany an-tendrombohitra Hermona, tany Saleka ary tany Basana rehetra hatrany amin’ny sisintanin’ny Gesorita sy ny Makatita ary ny antsasak’i Gileada, faritanin’i Sihona, mpanjakan’i Hesbona. '
  '6':
  - type: text
    content: I Mosesy, mpanompon’NY TOMPO, sy ny Zanak’Israely no nandresy ireo; ary nomen’i Mosesy, mpanompon’NY TOMPO, ho lovan’ny Robenita sy ny Gadita ary ny antsasaky ny fokon’i Manase ny tanin’ireo.
  '7':
  - type: text
    content: 'Ary izao no mpanjakan’ny tany izay resin’i Josoa sy ny Zanak’Israely tany andafy andrefan’i Jordana, hatrany Baala-Gada, eo an-dohasahan’i Libanona ka hatramin’ny tendrombohitra mangadihady izay fiakarana ho any Seìra; koa ny taniny dia nomen’i Josoa ny fokon’ny Israely araka ny fizarany, '
  '8':
  - type: text
    content: 'dia ny any amin’ny havoana, any Sefela, any amin’ny tany ngazana, any amin’ny tany an-tsisin’ny tendrombohitra, any an-tany efitra ary any Negeva, dia ny an’ny Hetita, ny Amorita, ny Kananita, ny Perizita, ny Hivita ary ny Jebosita:'
  '9':
  - type: text
    content: Ny mpanjakan’i Jeriko, iray;
  - type: text
    content: ny mpanjakan’i Ay izay eo anilan’i Betela, iray;
