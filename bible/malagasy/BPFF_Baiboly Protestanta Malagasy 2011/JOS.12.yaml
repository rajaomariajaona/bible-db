document_id: JOS.12
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Lisitry ny tany azon’ny Israely
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Izao no mpanjakan’ny tany resin’ny Zanak’Israely ka nobaboiny ny tany, teny andafy atsinanan’i Jordana hatreo amin’ny lohasahan-driaka Arnona ka hatrany amin’ny tendrombohitra Hermona sy ny ilany atsinanan’ny tany ngazana:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'I Sihona, mpanjakan’ny Amorita izay nonina tany Hesbona ka nanjaka hatrany Aroera, teo amoron’ny lohasahan-driaka Arnona, hatreo afovoan’ny lohasaha sy ny antsasak’i Gileada ka hatramin’ny lohasahan-driaka Jaboka izay sisintanin’ny taranak’i Amona, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ary ny ilany atsinanan’ny tany ngazana hatreo amin’ny ranomasina Kinerota ka hatramin’ny ranomasina Arabà, ny Ranomasintsira, amin’ny lalana mankany Bety-Jesimota, ary hatrany amin’ny tany atsimo eo amin’ny sisin’i Pisga.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Azony koa ny tanin’i Oga, mpanjakan’i Basana, isan’ny Refaìta sisa, izay nitoetra tany Astarota sy Edrehy, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'nanjaka tany an-tendrombohitra Hermona, tany Saleka ary tany Basana rehetra hatrany amin’ny sisintanin’ny Gesorita sy ny Makatita ary ny antsasak’i Gileada, faritanin’i Sihona, mpanjakan’i Hesbona. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: I Mosesy, mpanompon’NY TOMPO, sy ny Zanak’Israely no nandresy ireo; ary nomen’i Mosesy, mpanompon’NY TOMPO, ho lovan’ny Robenita sy ny Gadita ary ny antsasaky ny fokon’i Manase ny tanin’ireo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary izao no mpanjakan’ny tany izay resin’i Josoa sy ny Zanak’Israely tany andafy andrefan’i Jordana, hatrany Baala-Gada, eo an-dohasahan’i Libanona ka hatramin’ny tendrombohitra mangadihady izay fiakarana ho any Seìra; koa ny taniny dia nomen’i Josoa ny fokon’ny Israely araka ny fizarany, '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'dia ny any amin’ny havoana, any Sefela, any amin’ny tany ngazana, any amin’ny tany an-tsisin’ny tendrombohitra, any an-tany efitra ary any Negeva, dia ny an’ny Hetita, ny Amorita, ny Kananita, ny Perizita, ny Hivita ary ny Jebosita:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
