document_id: PSA.24,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Miditra ao amin’ny tempoly NY TOMPO
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: Salamo nataon’i Davida.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: An’NY TOMPO ny tany sy izay rehetra eo aminy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izao tontolo izao sy ny mponina eo aminy.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Iza ary izao Mpanjakan’ny voninahitra izao?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Andriamanitra, Tompon’izao rehetra izao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Izy no Mpanjakan’ny voninahitra! '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Fiatoana
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa Izy no manorina azy eo ambonin’ny ranomasina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eo ambonin’ny renirano no ampitoerany azy.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Iza no hiakatra any amin’ny tendrombohitry NY TOMPO?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary iza no hijoro ao amin’ny fitoerany masina?
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay madio tanana sy mahitsy fo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay tsy manandratra ny fanahiny ho amin’ny lainga
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na mianiana hamitaka.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Handray fitahiana avy amin’NY TOMPO izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hahazo fahamarinana avy amin’Andriamanitry ny famonjena azy.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izany no taranaka mitady Azy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'izay mitady ny tavanao, dia i Jakoba! '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Fiatoana
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Asandrato ny lohanareo, ry vavahady!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Misandrata ianareo, ry varavarana fahagola,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hidiran’ny Mpanjakan’ny voninahitra!
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Iza izao Mpanjakan’ny voninahitra izao?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: NY TOMPO mahery Tsitoha,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: NY TOMPO mpiady mahery.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Asandrato ny lohanareo, ry vavahady!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Misandrata ianareo ry varavarana fahagola,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hidiran’ny Mpanjakan’ny voninahitra!
