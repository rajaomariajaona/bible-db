document_id: PSA.24
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Miditra ao amin’ny tempoly NY TOMPO
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: Salamo nataon’i Davida.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: An’NY TOMPO ny tany sy izay rehetra eo aminy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: izao tontolo izao sy ny mponina eo aminy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Fa Izy no manorina azy eo ambonin’ny ranomasina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: eo ambonin’ny renirano no ampitoerany azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Iza no hiakatra any amin’ny tendrombohitry NY TOMPO?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary iza no hijoro ao amin’ny fitoerany masina?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Izay madio tanana sy mahitsy fo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay tsy manandratra ny fanahiny ho amin’ny lainga
- type: usfm
  marker: q1
  children:
  - type: text
    text: na mianiana hamitaka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Handray fitahiana avy amin’NY TOMPO izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hahazo fahamarinana avy amin’Andriamanitry ny famonjena azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Izany no taranaka mitady Azy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'izay mitady ny tavanao, dia i Jakoba! '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Fiatoana
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Asandrato ny lohanareo, ry vavahady!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Misandrata ianareo, ry varavarana fahagola,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hidiran’ny Mpanjakan’ny voninahitra!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Iza izao Mpanjakan’ny voninahitra izao?
- type: usfm
  marker: q1
  children:
  - type: text
    text: NY TOMPO mahery Tsitoha,
- type: usfm
  marker: q1
  children:
  - type: text
    text: NY TOMPO mpiady mahery.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Asandrato ny lohanareo, ry vavahady!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Misandrata ianareo ry varavarana fahagola,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hidiran’ny Mpanjakan’ny voninahitra!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Iza ary izao Mpanjakan’ny voninahitra izao?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Andriamanitra, Tompon’izao rehetra izao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Izy no Mpanjakan’ny voninahitra! '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Fiatoana
