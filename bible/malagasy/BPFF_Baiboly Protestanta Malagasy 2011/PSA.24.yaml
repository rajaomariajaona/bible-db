document_id: PSA.24,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Miditra ao amin’ny tempoly NY TOMPO
  - type: text
    content: Salamo nataon’i Davida.
  - type: text
    content: An’NY TOMPO ny tany sy izay rehetra eo aminy,
  - type: text
    content: izao tontolo izao sy ny mponina eo aminy.
  '10':
  - type: text
    content: Iza ary izao Mpanjakan’ny voninahitra izao?
  - type: text
    content: Andriamanitra, Tompon’izao rehetra izao,
  - type: text
    content: 'Izy no Mpanjakan’ny voninahitra! '
  - type: text
    content: Fiatoana
  '2':
  - type: text
    content: Fa Izy no manorina azy eo ambonin’ny ranomasina,
  - type: text
    content: eo ambonin’ny renirano no ampitoerany azy.
  '3':
  - type: text
    content: Iza no hiakatra any amin’ny tendrombohitry NY TOMPO?
  - type: text
    content: Ary iza no hijoro ao amin’ny fitoerany masina?
  '4':
  - type: text
    content: Izay madio tanana sy mahitsy fo,
  - type: text
    content: izay tsy manandratra ny fanahiny ho amin’ny lainga
  - type: text
    content: na mianiana hamitaka.
  '5':
  - type: text
    content: Handray fitahiana avy amin’NY TOMPO izy
  - type: text
    content: ary hahazo fahamarinana avy amin’Andriamanitry ny famonjena azy.
  '6':
  - type: text
    content: Izany no taranaka mitady Azy,
  - type: text
    content: 'izay mitady ny tavanao, dia i Jakoba! '
  - type: text
    content: Fiatoana
  '7':
  - type: text
    content: Asandrato ny lohanareo, ry vavahady!
  - type: text
    content: Misandrata ianareo, ry varavarana fahagola,
  - type: text
    content: mba hidiran’ny Mpanjakan’ny voninahitra!
  '8':
  - type: text
    content: Iza izao Mpanjakan’ny voninahitra izao?
  - type: text
    content: NY TOMPO mahery Tsitoha,
  - type: text
    content: NY TOMPO mpiady mahery.
  '9':
  - type: text
    content: Asandrato ny lohanareo, ry vavahady!
  - type: text
    content: Misandrata ianareo ry varavarana fahagola,
  - type: text
    content: mba hidiran’ny Mpanjakan’ny voninahitra!
