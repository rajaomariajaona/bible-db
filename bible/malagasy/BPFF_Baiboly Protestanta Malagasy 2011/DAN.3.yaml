document_id: DAN.3,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny baiko hivavahana amin’ilay sariolona volamena
  - type: text
    content: 'Nanao sariolona volamena i Nebokadnezara mpanjaka, enimpolo '
  - type: text
    content: hakiho
  - type: text
    content: ' ny haavony, ary enina hakiho ny sakany. Natsangany teo amin’ny tany lemaka Dora tamin’ny faritanin’i Babilona ilay izy. '
  '10':
  - type: text
    content: 'Ry mpanjaka ô, ianao dia efa nanao lalàna fa ny olona rehetra izay mandre ny fanenon’ny anjomara, ny sodina, ny lokanga, ny harpa, ny valiha, ny anjombona ary ny zavamaneno isan-karazany dia hiankohoka hivavaka amin’ny sariolona volamena; '
  '11':
  - type: text
    content: 'fa izay tsy miankohoka sy tsy mivavaka kosa dia hatsipy ao anatin’ny lafaoro mirehitra afo. '
  '12':
  - type: text
    content: Koa misy Jiosy izay nataonao ho tonian’ny raharaha momba an’i Babilona sy ny faritaniny, dia i Sadraka sy i Mesaka ary i Abed-Nego. Ireo lehilahy ireo dia tsy mba manaiky ny teninao akory, ry mpanjaka ô! Tsy mba manompo ny andriamanitrao izy na mivavaka amin’ny sariolona volamena izay natsanganao.
  '13':
  - type: text
    content: 'Dia niteny tamin’ny havinirana sy ny hatezerana i Nebokadnezara, koa nasainy nalaina i Sadraka sy i Mesaka ary i Abed-Nego. Noentiny teo anatrehan’ny mpanjaka ary ireo lehilahy ireo '
  '14':
  - type: text
    content: 'ka niteny tamin’izy ireo i Nebokadnezara hoe: Moa fanahy ninianareo ve, ry Sadraka sy Mesaka ary Abed-Nego ny tsy mba anompoanareo ny andriamanitro, sy tsy ivavahanareo amin’ny sariolona volamena izay natsangako? '
  '15':
  - type: text
    content: Ankehitriny, vonona va ianareo hiankohoka sy hivavaka amin’ny sariolona izay nataoko rehefa mandre ny fanenon’ny anjomara, ny harpa, ny valiha, ny anjombona, ny sodina, ny lokanga ary ny zavamaneno isan-karazany? Fa raha tsy mety mivavaka mantsy ianareo dia hatsipy avy hatrany ho ao anatin’ny lafaoro mirehitra afo; ary iza moa izany Andriamanitra hahavonjy anareo amin’ny tanako izany?
  '16':
  - type: text
    content: 'Dia namaly ny mpanjaka i Sadraka sy i Mesaka ary i Abed-Nego hoe: Ry Nebokadnezara, tsy misy antony tokony hamalianay anao akory ny amin’izany zavatra izany. '
  '17':
  - type: text
    content: 'Indro Andriamanitra izay tompoinay dia mahavonjy anay amin’ny lafaoro mirehitra afo sady hamonjy anay amin’ny tananao, ry mpanjaka ô. '
  '18':
  - type: text
    content: Ary na tsy izany aza, aoka ho fantatrao, ry mpanjaka ô, fa ny andriamanitrao dia tsy hotompoinay, ary ny sariolona volamena natsanganao dia tsy hivavahanay.
  '19':
  - type: text
    content: 'Dia feno hatezerana i Nebokadnezara ka niova tamin’i Sadraka sy i Mesaka ary i Abed-Nego ny endriny, ary nasainy nohafanaina ho impito mihoatra noho ny famana azy ny lafaoro. '
  '2':
  - type: text
    content: 'Ary i Nebokadnezara mpanjaka nandefa iraka hamory ny solo-mpanjaka, ny mpanapaka, ny governora, ny mpanolotsaina, ny mpitahiry ny volam-panjakana, ny mpahay lalàna, ny mpitsara ary ny lehiben’ny fari-piadidiana rehetra mba hitokana ilay sariolona natsangan’i Nebokadnezara mpanjaka. '
  '20':
  - type: text
    content: 'Izay lehilahy matanjaka indrindra tamin’ny miaramilany koa no nasainy namatotra an’i Sadraka sy i Mesaka ary i Abed-Nego ka nanipy azy ireo tao anatin’ny lafaoro mirehitra afo. '
  '21':
  - type: text
    content: 'Dia nafatotra ireo lehilahy ireo, nefa mbola teny aminy ihany ny lobany sy ny akanjony ary ny akanjobeny ivelany mbamin’ny fitafiany hafa koa, ary natsipy tao anatin’ny lafaoro mirehitra afo izy ireo. '
  '22':
  - type: text
    content: 'Noho ny teny hentitra nataon’ny mpanjaka dia natao faran’izay mahamay ny lafaoro ka matin’ny lelafo ireo lehilahy izay nanipy an’i Sadraka sy i Mesaka sy i Abed-Nego. '
  '23':
  - type: text
    content: Ary izy telo lahy ireo dia i Sadraka, i Mesaka ary i Abed-Nego kosa dia voatsipy am-patorana tao anatin’ny lafaoro mirehitra afo.
  - type: heading
    content: Voavonjy tamin’ilay lafaoro mahamay izy telo lahy
  '24':
  - type: text
    content: 'Dia talanjona i Nebokadnezara mpanjaka ka nitsangana haingana ary niteny tamin’ny mpanolotsainany hoe: Moa tsy telo lahy mifatotra va no natsipintsika tao anatin’ny afo? Dia namaly ny mpanjaka izy ireo hoe: Marina izany, ry mpanjaka ô! '
  '25':
  - type: text
    content: 'Ary hoy izy: Koa nahoana aho no mahita efa-dahy tsy mifatotra, mandehandeha eo anaty afo, nefa tsy maninon-tsy maninona akory izy ireo! Ary ny fijery ilay fahefatra aza dia toy ny zanak’ireo andriamanitra. '
  '26':
  - type: text
    content: 'Dia nanatona ny varavaran’ny lafaoro nisy afo mirehitra i Nebokadnezara ka niantso hoe: Ry Sadraka sy Mesaka ary Abed-Nego, mpanompon’Andriamanitra Avo Indrindra! Mivoaha tao ianareo ka avia atỳ! Dia nivoaka avy tao anaty afo i Sadraka sy i Mesaka ary i Abed-Nego.'
  '27':
  - type: text
    content: 'Dia nifanatona ny solo-mpanjaka, ny mpanapaka, ny governora ary ny mpanolotsainan’ny mpanjaka ka nahita ireo lehilahy ireo; hitany fa tsy nanan-kery hampaninona ny tenany akory ny afo, tsy nisy singam-bolo nikainkona tamin’ny lohany, tsy nihetsika ny lobany, ary tsy nisy fofon’afo akory taminy. '
  '28':
  - type: text
    content: 'Hoy i Nebokadnezara: Isaorana anie ny Andriamanitr’i Sadraka sy i Mesaka ary i Abed-Nego, izay naniraka ny anjeliny hamonjy ny mpanompony izay natoky Azy ka nandika ny tenin’ny mpanjaka ary nanolotra ny tenany tsy hanompo na hivavaka amin’izay andriamanitra hafa, afa-tsy ny Andriamaniny ihany. '
  '29':
  - type: text
    content: 'Koa mamoaka izao lalàna izao aho: Ny fokom-pirenena sy ny firenena ary ny samihafa fiteny rehetra izay manao teny tsy mety momba ny Andriamanitr’i Sadraka sy i Mesaka ary i Abed-Nego dia hotetitetehina, ary hatao trano fivoahana ny tranony; fa tsy misy andriamanitra hafa mahavonjy tahaka izao. '
  '3':
  - type: text
    content: 'Dia nivory hitokana ny sariolona izay natsangan’i Nebokadnezara mpanjaka ny solo-mpanjaka, ny mpanapaka, ny governora, ny mpanolotsaina, ny mpitahiry ny volam-panjakana, ny mpahay lalàna, ny mpitsara ary ny lehiben’ny fari-piadidiana rehetra ka nitsangana tandrifin’ny sariolona izay natsangan’i Nebokadnezara ireo. '
  '30':
  - type: text
    content: I Sadraka sy i Mesaka ary i Abed-Nego kosa dia nomen’ny mpanjaka toerana ambony tao amin’ny faritanin’i Babilona.
  - type: heading
    content: Ny nofin’i Nebokadnezara fanindroany, momba ilay hazo lehibe
  '31':
  - type: text
    content: 'Nampitondra teny ho any amin’ny fokom-pirenena sy ny firenena ary ny samihafa fiteny rehetra izay monina amin’ny tany manontolo i Nebokadnezara mpanjaka hoe: Hitombo anie ny fiadananareo!'
  '32':
  - type: text
    content: Sitrako ny hanambara ny famantarana sy ny fahagagana izay nataon’Andriamanitra Avo Indrindra tamiko.
  '33':
  - type: text
    content: Akory ny halehiben’ny famantarana
  - type: text
    content: sy ny herin’ny fahagagana ataony!
  - type: text
    content: Ny fanjakany dia fanjakana mandrakizay,
  - type: text
    content: ary ny fanapahany dia hahatratra ny taranaka fara aman-dimby.
  '4':
  - type: text
    content: 'Dia nisy mpikabary niantso mafy hoe: Izao no lazaina aminareo, ry fokom-pirenena, ry firenena sy ny samihafa fiteny: '
  '5':
  - type: text
    content: 'Rehefa mandre ny fanenon’ny anjomara, ny sodina, ny lokanga, ny harpa, ny valiha, ny anjombona ary ny zavamaneno isan-karazany ianareo, dia miankohofa ka mivavaha amin’ny sariolona volamena izay natsangan’i Nebokadnezara mpanjaka. '
  '6':
  - type: text
    content: Ary na iza na iza no tsy miankohoka sy tsy mivavaka dia hatsipy avy hatrany ao anatin’ny lafaoro mirehitra afo.
  '7':
  - type: text
    content: Koa tamin’ny fotoana nandrenesan’ny fokom-pirenena rehetra ny fanenon’ny anjomara, ny sodina, ny lokanga, ny harpa, ny valiha ary ny zavamaneno isan-karazany dia niankohoka sy nivavaka tamin’ilay sariolona volamena izay natsangan’i Nebokadnezara mpanjaka ny fokom-pirenena sy ny firenena ary ny samihafa fiteny rehetra.
  - type: heading
    content: Nitoetra ho mahatoky teo anatrehan’Andriamanitra ireo naman’i Daniela
  '8':
  - type: text
    content: 'Tamin’izay dia nisy Kaldeana sasany nanatona ka niampanga ny '
  - type: text
    content: Jiosy
  - type: text
    content: '. '
  '9':
  - type: text
    content: 'Niteny tamin’i Nebokadnezara mpanjaka izy ireo hoe: Ry mpanjaka ô, ho velona mandrakizay anie ianao! '
