document_id: DAN.3
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny baiko hivavahana amin’ilay sariolona volamena
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Nanao sariolona volamena i Nebokadnezara mpanjaka, enimpolo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: hakiho
  - type: text
    text: ' ny haavony, ary enina hakiho ny sakany. Natsangany teo amin’ny tany lemaka Dora tamin’ny faritanin’i Babilona ilay izy. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary i Nebokadnezara mpanjaka nandefa iraka hamory ny solo-mpanjaka, ny mpanapaka, ny governora, ny mpanolotsaina, ny mpitahiry ny volam-panjakana, ny mpahay lalàna, ny mpitsara ary ny lehiben’ny fari-piadidiana rehetra mba hitokana ilay sariolona natsangan’i Nebokadnezara mpanjaka. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dia nivory hitokana ny sariolona izay natsangan’i Nebokadnezara mpanjaka ny solo-mpanjaka, ny mpanapaka, ny governora, ny mpanolotsaina, ny mpitahiry ny volam-panjakana, ny mpahay lalàna, ny mpitsara ary ny lehiben’ny fari-piadidiana rehetra ka nitsangana tandrifin’ny sariolona izay natsangan’i Nebokadnezara ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dia nisy mpikabary niantso mafy hoe: Izao no lazaina aminareo, ry fokom-pirenena, ry firenena sy ny samihafa fiteny: '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Rehefa mandre ny fanenon’ny anjomara, ny sodina, ny lokanga, ny harpa, ny valiha, ny anjombona ary ny zavamaneno isan-karazany ianareo, dia miankohofa ka mivavaha amin’ny sariolona volamena izay natsangan’i Nebokadnezara mpanjaka. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ary na iza na iza no tsy miankohoka sy tsy mivavaka dia hatsipy avy hatrany ao anatin’ny lafaoro mirehitra afo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Koa tamin’ny fotoana nandrenesan’ny fokom-pirenena rehetra ny fanenon’ny anjomara, ny sodina, ny lokanga, ny harpa, ny valiha ary ny zavamaneno isan-karazany dia niankohoka sy nivavaka tamin’ilay sariolona volamena izay natsangan’i Nebokadnezara mpanjaka ny fokom-pirenena sy ny firenena ary ny samihafa fiteny rehetra.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nitoetra ho mahatoky teo anatrehan’Andriamanitra ireo naman’i Daniela
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Tamin’izay dia nisy Kaldeana sasany nanatona ka niampanga ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jiosy
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Niteny tamin’i Nebokadnezara mpanjaka izy ireo hoe: Ry mpanjaka ô, ho velona mandrakizay anie ianao! '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ry mpanjaka ô, ianao dia efa nanao lalàna fa ny olona rehetra izay mandre ny fanenon’ny anjomara, ny sodina, ny lokanga, ny harpa, ny valiha, ny anjombona ary ny zavamaneno isan-karazany dia hiankohoka hivavaka amin’ny sariolona volamena; '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'fa izay tsy miankohoka sy tsy mivavaka kosa dia hatsipy ao anatin’ny lafaoro mirehitra afo. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Koa misy Jiosy izay nataonao ho tonian’ny raharaha momba an’i Babilona sy ny faritaniny, dia i Sadraka sy i Mesaka ary i Abed-Nego. Ireo lehilahy ireo dia tsy mba manaiky ny teninao akory, ry mpanjaka ô! Tsy mba manompo ny andriamanitrao izy na mivavaka amin’ny sariolona volamena izay natsanganao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dia niteny tamin’ny havinirana sy ny hatezerana i Nebokadnezara, koa nasainy nalaina i Sadraka sy i Mesaka ary i Abed-Nego. Noentiny teo anatrehan’ny mpanjaka ary ireo lehilahy ireo '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'ka niteny tamin’izy ireo i Nebokadnezara hoe: Moa fanahy ninianareo ve, ry Sadraka sy Mesaka ary Abed-Nego ny tsy mba anompoanareo ny andriamanitro, sy tsy ivavahanareo amin’ny sariolona volamena izay natsangako? '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ankehitriny, vonona va ianareo hiankohoka sy hivavaka amin’ny sariolona izay nataoko rehefa mandre ny fanenon’ny anjomara, ny harpa, ny valiha, ny anjombona, ny sodina, ny lokanga ary ny zavamaneno isan-karazany? Fa raha tsy mety mivavaka mantsy ianareo dia hatsipy avy hatrany ho ao anatin’ny lafaoro mirehitra afo; ary iza moa izany Andriamanitra hahavonjy anareo amin’ny tanako izany?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Dia namaly ny mpanjaka i Sadraka sy i Mesaka ary i Abed-Nego hoe: Ry Nebokadnezara, tsy misy antony tokony hamalianay anao akory ny amin’izany zavatra izany. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Indro Andriamanitra izay tompoinay dia mahavonjy anay amin’ny lafaoro mirehitra afo sady hamonjy anay amin’ny tananao, ry mpanjaka ô. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ary na tsy izany aza, aoka ho fantatrao, ry mpanjaka ô, fa ny andriamanitrao dia tsy hotompoinay, ary ny sariolona volamena natsanganao dia tsy hivavahanay.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Dia feno hatezerana i Nebokadnezara ka niova tamin’i Sadraka sy i Mesaka ary i Abed-Nego ny endriny, ary nasainy nohafanaina ho impito mihoatra noho ny famana azy ny lafaoro. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Izay lehilahy matanjaka indrindra tamin’ny miaramilany koa no nasainy namatotra an’i Sadraka sy i Mesaka ary i Abed-Nego ka nanipy azy ireo tao anatin’ny lafaoro mirehitra afo. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Dia nafatotra ireo lehilahy ireo, nefa mbola teny aminy ihany ny lobany sy ny akanjony ary ny akanjobeny ivelany mbamin’ny fitafiany hafa koa, ary natsipy tao anatin’ny lafaoro mirehitra afo izy ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Noho ny teny hentitra nataon’ny mpanjaka dia natao faran’izay mahamay ny lafaoro ka matin’ny lelafo ireo lehilahy izay nanipy an’i Sadraka sy i Mesaka sy i Abed-Nego. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ary izy telo lahy ireo dia i Sadraka, i Mesaka ary i Abed-Nego kosa dia voatsipy am-patorana tao anatin’ny lafaoro mirehitra afo.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Voavonjy tamin’ilay lafaoro mahamay izy telo lahy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Dia talanjona i Nebokadnezara mpanjaka ka nitsangana haingana ary niteny tamin’ny mpanolotsainany hoe: Moa tsy telo lahy mifatotra va no natsipintsika tao anatin’ny afo? Dia namaly ny mpanjaka izy ireo hoe: Marina izany, ry mpanjaka ô! '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary hoy izy: Koa nahoana aho no mahita efa-dahy tsy mifatotra, mandehandeha eo anaty afo, nefa tsy maninon-tsy maninona akory izy ireo! Ary ny fijery ilay fahefatra aza dia toy ny zanak’ireo andriamanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Dia nanatona ny varavaran’ny lafaoro nisy afo mirehitra i Nebokadnezara ka niantso hoe: Ry Sadraka sy Mesaka ary Abed-Nego, mpanompon’Andriamanitra Avo Indrindra! Mivoaha tao ianareo ka avia atỳ! Dia nivoaka avy tao anaty afo i Sadraka sy i Mesaka ary i Abed-Nego.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Dia nifanatona ny solo-mpanjaka, ny mpanapaka, ny governora ary ny mpanolotsainan’ny mpanjaka ka nahita ireo lehilahy ireo; hitany fa tsy nanan-kery hampaninona ny tenany akory ny afo, tsy nisy singam-bolo nikainkona tamin’ny lohany, tsy nihetsika ny lobany, ary tsy nisy fofon’afo akory taminy. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Hoy i Nebokadnezara: Isaorana anie ny Andriamanitr’i Sadraka sy i Mesaka ary i Abed-Nego, izay naniraka ny anjeliny hamonjy ny mpanompony izay natoky Azy ka nandika ny tenin’ny mpanjaka ary nanolotra ny tenany tsy hanompo na hivavaka amin’izay andriamanitra hafa, afa-tsy ny Andriamaniny ihany. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Koa mamoaka izao lalàna izao aho: Ny fokom-pirenena sy ny firenena ary ny samihafa fiteny rehetra izay manao teny tsy mety momba ny Andriamanitr’i Sadraka sy i Mesaka ary i Abed-Nego dia hotetitetehina, ary hatao trano fivoahana ny tranony; fa tsy misy andriamanitra hafa mahavonjy tahaka izao. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: I Sadraka sy i Mesaka ary i Abed-Nego kosa dia nomen’ny mpanjaka toerana ambony tao amin’ny faritanin’i Babilona.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nofin’i Nebokadnezara fanindroany, momba ilay hazo lehibe
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Nampitondra teny ho any amin’ny fokom-pirenena sy ny firenena ary ny samihafa fiteny rehetra izay monina amin’ny tany manontolo i Nebokadnezara mpanjaka hoe: Hitombo anie ny fiadananareo!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Sitrako ny hanambara ny famantarana sy ny fahagagana izay nataon’Andriamanitra Avo Indrindra tamiko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Akory ny halehiben’ny famantarana
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny herin’ny fahagagana ataony!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny fanjakany dia fanjakana mandrakizay,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny fanapahany dia hahatratra ny taranaka fara aman-dimby.
