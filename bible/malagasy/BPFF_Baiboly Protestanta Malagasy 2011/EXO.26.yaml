document_id: EXO.26
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fonenana masina
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tabernakely
  - type: text
    text: ' dia hataonao ambainy folo amin’ny lamba rongony fotsy madinika voahasina, lamba manga, volomparasy, jaky; '
  - type: usfm
    marker: w
    children:
    - type: text
      text: kerobima
  - type: text
    text: ', asan’ny mpanenona mahay, no hataonao sorany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ny halavan’ny ambainy iray dia valo amby roapolo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: hakiho
  - type: text
    text: '; ny lambanan’ny ambainy iray koa dia efatra hakiho; hitovy refy ny ambainy rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ambainy dimy no havitrana ho iray; ary ambainy dimy hafa koa dia havitrana ho iray. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Manaova tadivavarana manga ho eo an-tsisin’ny ambainy iray, eo an-tsisin’ny iray efa voavitrana; manaova toy izany koa amin’ny ambainy farany, eo an-tsisin’ny iray efa voavitrana koa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Tadivavarana dimampolo no hataonao eo amin’ny ambainy iray ary tadivavarana dimampolo koa no hataonao eo amin’ny sisin’ny ambainy amin’ny iray efa voavitrana; koa aoka hifanandrify ny tadivavarana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Manaova farango volamena dimampolo ka akambano amin’ny farango ny ambainy, dia voakambana ho iray ny tabernakely.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary manaova koa ambainy amin’ny volon’osy ho lay handrakofana ny tabernakely; iraika amby folo ny ambainy hataonao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ny halavan’ny ambainy iray dia telopolo hakiho ary ny lambanan’ny ambainy iray hafa dia efatra hakiho; hitovy refy ny ambainy iraika amby folo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Avitrano hikambana ny ambainy dimy ary avitranao hikambana koa ny ambainy enina. Aforeto ny ambainy fahenina amin’ny sakan’ny lay eo anoloana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Manaova tadivavarana dimampolo eo an-tsisin’ny ambainy iray izay farany amin’ny efa voavitrana, ary tadivavarana dimampolo koa ho eo an-tsisin’ny ambainy iray amin’ny iray hafa izay efa voavitrana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Manaova farango varahina dimampolo ka ampidiro ho eo amin’ny tadivavarana ireo farango ireo ary akambano ny lay, dia ho iray ihany izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary izay mihoatra amin’ny ambain’ny lay dia avelao hiraviravy eo ivohon’ny tabernakely ny antsasaky ny ambainy izay mihoatra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ary ny iray hakiho avy eo amin’ny lohany roa amin’ny lamba, izay mihoatra amin’ny halavan’ny ambain’ny lay, dia avelao hiraviravy eo amin’ny lafibeny roa amin’ny tabernakely mba handrakotra azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Manaova koa rakotra ho an’ny lay, ataovy amin’ny hoditr’ondrilahy efa voaloko mena, ary manaova sarony amin’ny hoditra trozona ho eo amboniny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Manaova hazofisaka akasia hatsangana amin’ny tabernakely. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Folo hakiho ny haavon’ny hazofisaka iray ary iray hakiho sy sasany ny sakan’ny hazofisaka hafa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Lahiny roa no ho amin’ny hazofisaka iray, misy hasiana izay hikambanany; toy izany no hanaovanao ny hazofisaka rehetra amin’ny tabernakely. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ataovy ny hazofisaka ho amin’ny tabernakely, hazofisaka roapolo ho eo amin’ny lafiny atsimo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Manaova koa faladia volafotsy efapolo ho eo ambanin’ny hazofisaka roapolo, faladia roa avy ho ambanin’ny hazofisaka tsirairay hiorenan’ny lahiny roa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Manaova hazofisaka roapolo ho eo amin’ny lafiny faharoa amin’ny tabernakely, dia ny lafiny avaratra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Manaova faladia volafotsy efapolo, faladia roa avy ho ambanin’ny hazofisaka tsirairay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary ny lafiny andrefana amin’ny tabernakely, izay ao aorianany, dia hanaovanao hazofisaka enina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Hazofisaka roa no hataonao eo amin’ny zoron’ny tabernakely amin’ny lafiny aoriana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Hakambana ho iray hatrany ambany izy ka hiray tsara hatrany an-tampony, eo amin’ny mason-drojo tokana; ho toy izany avokoa izy roa izay ho eo amin’ny zorony roa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Aoka hisy hazofisaka valo sy ny faladiany volafotsy, dia faladia enina amby folo: Faladia roa avy ho ambanin’ny hazofisaka tsirairay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Manaova koa barany amin’ny hazo akasia; dimy ho amin’ireo hazofisaka amin’ny lafiny iray amin’ny tabernakely, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'barany dimy ho amin’ireo hazofisaka amin’ny lafiny iray koa amin’ny tabernakely ary barany dimy ho amin’ireo hazofisaka amin’ny lafiny andrefana izay ao aorianany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ary ny barany afovoany, izay eo afovoan’ny hazofisaka, dia hahatratra ny farany roa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Ny hazofisaka dia hopetahanao takelaka volamena, ary hataonao volamena koa ireo mason-drojo eo aminy, izay hitoeran’ny barany; petaho takelaka volamena koa ny barany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Atsangano ny tabernakely, araka ilay endriny naseho taminao tao an-tendrombohitra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Manaova efitra lamba manga, volomparasy, jaky ary lamba rongony fotsy madinika voatenona; kerobima, asan’ny mpanenona mahay, no hataonao sorany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Ary ahantòny amin’ny andry hazo akasia efatra izay voapetaka takelaka volamena izany; ho volamena koa ny fihantonany, ary eo amin’ny faladia volafotsy efatra no hiorenany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Ary ny efitra lamba dia ataovy eo ambanin’ireo farango. Dia ampidiro ao anatin’ny efitra lamba ny vata misy ny Vavolombelona; ary ho anareo dia ny efitra lamba no hampisaraka ny fitoerana masina sy ny fitoerana masina indrindra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ataovy eo ambonin’ny vata misy ny Vavolombelona, ao amin’ny fitoerana masina indrindra, ny rakotra fanaovam-panavotana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Apetraho eo ivelan’ny efitra ny latabatra ka ny fitoeran-jiro ho tandrifin’ny latabatra amin’ny lafiny atsimo amin’ny tabernakely; ary ny latabatra dia ataovy eo amin’ny lafiny avaratra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Manaova koa varavarana lamba eo amin’ny lay, manga, volomparasy, jaky, ary rongony fotsy madinika voatenona, asan’ny mahay tenona samihafa soratra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Ary manaova andry hazo akasia dimy ho amin’ny varavarana lamba ka petaho takelaka volamena ireny; ho volamena koa ny fihantonany, ary mandrendreha faladia varahina dimy hiorenany.
