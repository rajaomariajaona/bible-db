document_id: EXO.26,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fonenana masina
  - type: text
    content: 'Ary ny '
  - type: text
    content: tabernakely
  - type: text
    content: ' dia hataonao ambainy folo amin’ny lamba rongony fotsy madinika voahasina, lamba manga, volomparasy, jaky; '
  - type: text
    content: kerobima
  - type: text
    content: ', asan’ny mpanenona mahay, no hataonao sorany. '
  '10':
  - type: text
    content: 'Manaova tadivavarana dimampolo eo an-tsisin’ny ambainy iray izay farany amin’ny efa voavitrana, ary tadivavarana dimampolo koa ho eo an-tsisin’ny ambainy iray amin’ny iray hafa izay efa voavitrana. '
  '11':
  - type: text
    content: 'Manaova farango varahina dimampolo ka ampidiro ho eo amin’ny tadivavarana ireo farango ireo ary akambano ny lay, dia ho iray ihany izany. '
  '12':
  - type: text
    content: 'Ary izay mihoatra amin’ny ambain’ny lay dia avelao hiraviravy eo ivohon’ny tabernakely ny antsasaky ny ambainy izay mihoatra. '
  '13':
  - type: text
    content: Ary ny iray hakiho avy eo amin’ny lohany roa amin’ny lamba, izay mihoatra amin’ny halavan’ny ambain’ny lay, dia avelao hiraviravy eo amin’ny lafibeny roa amin’ny tabernakely mba handrakotra azy.
  '14':
  - type: text
    content: Manaova koa rakotra ho an’ny lay, ataovy amin’ny hoditr’ondrilahy efa voaloko mena, ary manaova sarony amin’ny hoditra trozona ho eo amboniny.
  '15':
  - type: text
    content: 'Manaova hazofisaka akasia hatsangana amin’ny tabernakely. '
  '16':
  - type: text
    content: 'Folo hakiho ny haavon’ny hazofisaka iray ary iray hakiho sy sasany ny sakan’ny hazofisaka hafa. '
  '17':
  - type: text
    content: 'Lahiny roa no ho amin’ny hazofisaka iray, misy hasiana izay hikambanany; toy izany no hanaovanao ny hazofisaka rehetra amin’ny tabernakely. '
  '18':
  - type: text
    content: 'Ataovy ny hazofisaka ho amin’ny tabernakely, hazofisaka roapolo ho eo amin’ny lafiny atsimo. '
  '19':
  - type: text
    content: 'Manaova koa faladia volafotsy efapolo ho eo ambanin’ny hazofisaka roapolo, faladia roa avy ho ambanin’ny hazofisaka tsirairay hiorenan’ny lahiny roa. '
  '2':
  - type: text
    content: 'Ny halavan’ny ambainy iray dia valo amby roapolo '
  - type: text
    content: hakiho
  - type: text
    content: '; ny lambanan’ny ambainy iray koa dia efatra hakiho; hitovy refy ny ambainy rehetra. '
  '20':
  - type: text
    content: 'Manaova hazofisaka roapolo ho eo amin’ny lafiny faharoa amin’ny tabernakely, dia ny lafiny avaratra. '
  '21':
  - type: text
    content: 'Manaova faladia volafotsy efapolo, faladia roa avy ho ambanin’ny hazofisaka tsirairay. '
  '22':
  - type: text
    content: 'Ary ny lafiny andrefana amin’ny tabernakely, izay ao aorianany, dia hanaovanao hazofisaka enina. '
  '23':
  - type: text
    content: 'Hazofisaka roa no hataonao eo amin’ny zoron’ny tabernakely amin’ny lafiny aoriana. '
  '24':
  - type: text
    content: 'Hakambana ho iray hatrany ambany izy ka hiray tsara hatrany an-tampony, eo amin’ny mason-drojo tokana; ho toy izany avokoa izy roa izay ho eo amin’ny zorony roa. '
  '25':
  - type: text
    content: 'Aoka hisy hazofisaka valo sy ny faladiany volafotsy, dia faladia enina amby folo: Faladia roa avy ho ambanin’ny hazofisaka tsirairay. '
  '26':
  - type: text
    content: 'Manaova koa barany amin’ny hazo akasia; dimy ho amin’ireo hazofisaka amin’ny lafiny iray amin’ny tabernakely, '
  '27':
  - type: text
    content: 'barany dimy ho amin’ireo hazofisaka amin’ny lafiny iray koa amin’ny tabernakely ary barany dimy ho amin’ireo hazofisaka amin’ny lafiny andrefana izay ao aorianany. '
  '28':
  - type: text
    content: 'Ary ny barany afovoany, izay eo afovoan’ny hazofisaka, dia hahatratra ny farany roa. '
  '29':
  - type: text
    content: Ny hazofisaka dia hopetahanao takelaka volamena, ary hataonao volamena koa ireo mason-drojo eo aminy, izay hitoeran’ny barany; petaho takelaka volamena koa ny barany.
  '3':
  - type: text
    content: 'Ambainy dimy no havitrana ho iray; ary ambainy dimy hafa koa dia havitrana ho iray. '
  '30':
  - type: text
    content: Atsangano ny tabernakely, araka ilay endriny naseho taminao tao an-tendrombohitra.
  '31':
  - type: text
    content: 'Manaova efitra lamba manga, volomparasy, jaky ary lamba rongony fotsy madinika voatenona; kerobima, asan’ny mpanenona mahay, no hataonao sorany. '
  '32':
  - type: text
    content: 'Ary ahantòny amin’ny andry hazo akasia efatra izay voapetaka takelaka volamena izany; ho volamena koa ny fihantonany, ary eo amin’ny faladia volafotsy efatra no hiorenany. '
  '33':
  - type: text
    content: Ary ny efitra lamba dia ataovy eo ambanin’ireo farango. Dia ampidiro ao anatin’ny efitra lamba ny vata misy ny Vavolombelona; ary ho anareo dia ny efitra lamba no hampisaraka ny fitoerana masina sy ny fitoerana masina indrindra.
  '34':
  - type: text
    content: 'Ataovy eo ambonin’ny vata misy ny Vavolombelona, ao amin’ny fitoerana masina indrindra, ny rakotra fanaovam-panavotana. '
  '35':
  - type: text
    content: Apetraho eo ivelan’ny efitra ny latabatra ka ny fitoeran-jiro ho tandrifin’ny latabatra amin’ny lafiny atsimo amin’ny tabernakely; ary ny latabatra dia ataovy eo amin’ny lafiny avaratra.
  '36':
  - type: text
    content: 'Manaova koa varavarana lamba eo amin’ny lay, manga, volomparasy, jaky, ary rongony fotsy madinika voatenona, asan’ny mahay tenona samihafa soratra. '
  '37':
  - type: text
    content: Ary manaova andry hazo akasia dimy ho amin’ny varavarana lamba ka petaho takelaka volamena ireny; ho volamena koa ny fihantonany, ary mandrendreha faladia varahina dimy hiorenany.
  '4':
  - type: text
    content: 'Manaova tadivavarana manga ho eo an-tsisin’ny ambainy iray, eo an-tsisin’ny iray efa voavitrana; manaova toy izany koa amin’ny ambainy farany, eo an-tsisin’ny iray efa voavitrana koa. '
  '5':
  - type: text
    content: 'Tadivavarana dimampolo no hataonao eo amin’ny ambainy iray ary tadivavarana dimampolo koa no hataonao eo amin’ny sisin’ny ambainy amin’ny iray efa voavitrana; koa aoka hifanandrify ny tadivavarana. '
  '6':
  - type: text
    content: Manaova farango volamena dimampolo ka akambano amin’ny farango ny ambainy, dia voakambana ho iray ny tabernakely.
  '7':
  - type: text
    content: 'Ary manaova koa ambainy amin’ny volon’osy ho lay handrakofana ny tabernakely; iraika amby folo ny ambainy hataonao. '
  '8':
  - type: text
    content: 'Ny halavan’ny ambainy iray dia telopolo hakiho ary ny lambanan’ny ambainy iray hafa dia efatra hakiho; hitovy refy ny ambainy iraika amby folo. '
  '9':
  - type: text
    content: 'Avitrano hikambana ny ambainy dimy ary avitranao hikambana koa ny ambainy enina. Aforeto ny ambainy fahenina amin’ny sakan’ny lay eo anoloana. '
