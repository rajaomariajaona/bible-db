document_id: DEU.26,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny voaloham-bokatra sy ny fanekem-pinoana
  - type: text
    content: 'Rehefa tonga ao amin’ny tany izay omen’NY TOMPO Andriamanitrao ho lovanao ianao ka mandova azy ary monina ao '
  '10':
  - type: text
    content: Ankehitriny, TOMPO ô, indro, efa nentiko ny voaloham-bokatra amin’ny tany izay nomenao ahy.
  - type: text
    content: 'Avelao eo anatrehan’NY TOMPO Andriamanitrao ny voaloham-bokatra noentinao ary miankohofa eo anatrehan’NY TOMPO Andriamanitrao. '
  '11':
  - type: text
    content: 'Mifalia ianao sy ny '
  - type: text
    content: levita
  - type: text
    content: ' mbamin’ny vahiny eo aminao amin’ny soa rehetra izay nomen’NY TOMPO Andriamanitrao anao sy ny ankohonanao.'
  - type: heading
    content: Ny fahafolonkarena amin’ny taona fahatelo
  '12':
  - type: text
    content: 'Rehefa voaangonao ny fahafolonkarena rehetra avy amin’ny vokatrao amin’ny taona fahatelo, izay taona fanangonana ny fahafolonkarena, dia mba omeo ny '
  - type: text
    content: levita
  - type: text
    content: ', ny vahiny, ny kamboty ary ny mpitondratena, mba hisy hohaniny ao an-tanànanao ka ho voky izy. '
  '13':
  - type: text
    content: 'Ary lazao eo anatrehan’NY TOMPO Andriamanitrao hoe: Efa navoakako avokoa ny zava-masina tao an-tranoko ka nomeko ny levita, ny vahiny, ny kamboty ary ny mpitondratena, araka ny lalànanao rehetra izay nomenao ahy; tsy nandika ny didinao aho na nanadino azy. '
  '14':
  - type: text
    content: 'Tsy nisy nohaniko teo amin’ny fisaonako, na nentiko nivoaka teo amin’ny fahalotoako, na nataoko fahan-kanina noho ny maty; fa efa nihaino ny feon’NY TOMPO Andriamanitro aho ka nanatanteraka izay rehetra nandidiany ahy. '
  '15':
  - type: text
    content: Tsinjovy ao amin’ny fonenanao masina any an-danitra ka tahio ny Israely olonao sy ny tany izay nomenao anay araka izay nianiananao tamin’ny razanay, dia tany tondra-dronono sy tantely.
  - type: heading
    content: Israely, vahoakan’NY TOMPO
  '16':
  - type: text
    content: 'Anio no andidian’NY TOMPO Andriamanitrao anao hanaraka ireo didy sy fitsipika ireo; koa tandremo sy araho amin’ny fonao manontolo sy ny fanahinao manontolo ireo. '
  '17':
  - type: text
    content: 'Efa nampianiana NY TOMPO ianao androany fa ho Andriamanitrao Izy, koa handeha amin’ny lalany sy hitandrina ny lalànany sy ny didiny ary ny fitsipiny ianao ka hihaino ny feony. '
  '18':
  - type: text
    content: 'Ary efa nampianiana anao NY TOMPO androany fa firenena fananany sarobidy indrindra ianao, araka izay nolazainy taminao, mba hitandremanao ny didiny rehetra, '
  '19':
  - type: text
    content: sy hanandratany anao ho ambonin’ny firenena rehetra izay nataony, ho fiderana sy ho laza ary ho voninahitra; ary mba ho firenena masina ho an’NY TOMPO Andriamanitrao ianao, araka izay nolazainy.
  '2':
  - type: text
    content: 'dia akao ny voaloham-bokatra rehetra amin’ny tany, izay alainao avy amin’ny taninao, izay omen’NY TOMPO Andriamanitrao anao ka ataovy an-karona; ary mankanesa ho any amin’ny tany izay hofidin’NY TOMPO Andriamanitrao hampitoerany ny anarany. '
  '3':
  - type: text
    content: 'Dia mankanesa ao amin’ny mpisorona amin’io andro io ka lazao aminy hoe: Manambara amin’NY TOMPO Andriamanitrao aho anio fa tonga eto amin’ny tany izay nianianan’NY TOMPO tamin’ny razantsika homeny antsika. '
  '4':
  - type: text
    content: 'Horaisin’ny mpisorona eny an-tananao ny harona ka hapetrany eo anoloan’ny alitaran’NY TOMPO Andriamanitrao. '
  '5':
  - type: text
    content: 'Dia hiteny eo anatrehan’NY TOMPO Andriamanitrao ianao hoe: Arameana mpanjenjena no raiko ka nidina tany Ejipta izy, dia nivahiny tany mbamin’ny olom-bitsy; ary tonga firenena lehibe sy mahery sady maro an’isa tany izy. '
  '6':
  - type: text
    content: 'Ary nanao izay ratsy tamintsika ny Ejiptiana ka nampahory sy nampanao fanompoana mafy antsika. '
  '7':
  - type: text
    content: 'Dia nitaraina tamin’NY TOMPO, Andriamanitry ny razantsika, isika ka nihaino ny feontsika Izy ary nijery ny alahelontsika sy ny asa mafy nataontsika ary ny fahoriantsika; '
  '8':
  - type: text
    content: 'tanana mahery sy sandry natsotra, asa lehibe sady mahatahotra, famantarana sy fahagagana no nitondran’NY TOMPO antsika nivoaka avy tany Ejipta, '
  '9':
  - type: text
    content: 'dia nitondra antsika niditra teto amin’ity tany ity Izy ka nanome antsika ity tany ity, dia tany tondra-dronono sy tantely. '
