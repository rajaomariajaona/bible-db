document_id: DEU.26
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny voaloham-bokatra sy ny fanekem-pinoana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Rehefa tonga ao amin’ny tany izay omen’NY TOMPO Andriamanitrao ho lovanao ianao ka mandova azy ary monina ao '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'dia akao ny voaloham-bokatra rehetra amin’ny tany, izay alainao avy amin’ny taninao, izay omen’NY TOMPO Andriamanitrao anao ka ataovy an-karona; ary mankanesa ho any amin’ny tany izay hofidin’NY TOMPO Andriamanitrao hampitoerany ny anarany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dia mankanesa ao amin’ny mpisorona amin’io andro io ka lazao aminy hoe: Manambara amin’NY TOMPO Andriamanitrao aho anio fa tonga eto amin’ny tany izay nianianan’NY TOMPO tamin’ny razantsika homeny antsika. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Horaisin’ny mpisorona eny an-tananao ny harona ka hapetrany eo anoloan’ny alitaran’NY TOMPO Andriamanitrao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia hiteny eo anatrehan’NY TOMPO Andriamanitrao ianao hoe: Arameana mpanjenjena no raiko ka nidina tany Ejipta izy, dia nivahiny tany mbamin’ny olom-bitsy; ary tonga firenena lehibe sy mahery sady maro an’isa tany izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary nanao izay ratsy tamintsika ny Ejiptiana ka nampahory sy nampanao fanompoana mafy antsika. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dia nitaraina tamin’NY TOMPO, Andriamanitry ny razantsika, isika ka nihaino ny feontsika Izy ary nijery ny alahelontsika sy ny asa mafy nataontsika ary ny fahoriantsika; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'tanana mahery sy sandry natsotra, asa lehibe sady mahatahotra, famantarana sy fahagagana no nitondran’NY TOMPO antsika nivoaka avy tany Ejipta, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'dia nitondra antsika niditra teto amin’ity tany ity Izy ka nanome antsika ity tany ity, dia tany tondra-dronono sy tantely. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ankehitriny, TOMPO ô, indro, efa nentiko ny voaloham-bokatra amin’ny tany izay nomenao ahy.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Avelao eo anatrehan’NY TOMPO Andriamanitrao ny voaloham-bokatra noentinao ary miankohofa eo anatrehan’NY TOMPO Andriamanitrao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Mifalia ianao sy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: levita
  - type: text
    text: ' mbamin’ny vahiny eo aminao amin’ny soa rehetra izay nomen’NY TOMPO Andriamanitrao anao sy ny ankohonanao.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fahafolonkarena amin’ny taona fahatelo
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Rehefa voaangonao ny fahafolonkarena rehetra avy amin’ny vokatrao amin’ny taona fahatelo, izay taona fanangonana ny fahafolonkarena, dia mba omeo ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: levita
  - type: text
    text: ', ny vahiny, ny kamboty ary ny mpitondratena, mba hisy hohaniny ao an-tanànanao ka ho voky izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary lazao eo anatrehan’NY TOMPO Andriamanitrao hoe: Efa navoakako avokoa ny zava-masina tao an-tranoko ka nomeko ny levita, ny vahiny, ny kamboty ary ny mpitondratena, araka ny lalànanao rehetra izay nomenao ahy; tsy nandika ny didinao aho na nanadino azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Tsy nisy nohaniko teo amin’ny fisaonako, na nentiko nivoaka teo amin’ny fahalotoako, na nataoko fahan-kanina noho ny maty; fa efa nihaino ny feon’NY TOMPO Andriamanitro aho ka nanatanteraka izay rehetra nandidiany ahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Tsinjovy ao amin’ny fonenanao masina any an-danitra ka tahio ny Israely olonao sy ny tany izay nomenao anay araka izay nianiananao tamin’ny razanay, dia tany tondra-dronono sy tantely.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Israely, vahoakan’NY TOMPO
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Anio no andidian’NY TOMPO Andriamanitrao anao hanaraka ireo didy sy fitsipika ireo; koa tandremo sy araho amin’ny fonao manontolo sy ny fanahinao manontolo ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Efa nampianiana NY TOMPO ianao androany fa ho Andriamanitrao Izy, koa handeha amin’ny lalany sy hitandrina ny lalànany sy ny didiny ary ny fitsipiny ianao ka hihaino ny feony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary efa nampianiana anao NY TOMPO androany fa firenena fananany sarobidy indrindra ianao, araka izay nolazainy taminao, mba hitandremanao ny didiny rehetra, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: sy hanandratany anao ho ambonin’ny firenena rehetra izay nataony, ho fiderana sy ho laza ary ho voninahitra; ary mba ho firenena masina ho an’NY TOMPO Andriamanitrao ianao, araka izay nolazainy.
