document_id: 1SA.26,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: 'Any an-tany efitr’i Zifa: Mamindra fo amin’i Saoly indray i Davida'
  - type: text
    content: 'Tonga tao amin’i Saoly tany Gibea ny Zifita ka niteny hoe: Tsy miery any amin’ny tany be havoana any Hakila manandrify ny tany efitra va i Davida? '
  '10':
  - type: text
    content: 'Hoy koa i Davida: Raha velona koa NY TOMPO dia aoka NY TOMPO no hamely azy, na ho tonga ny androny ka ho faty izy, na hirotsaka ho amin’ny ady izy ka any no hahalavo azy. '
  '11':
  - type: text
    content: 'Sanatria amiko eo anatrehan’NY TOMPO raha hanatsotra ny tanako hamely ny voahosotry NY TOMPO aho; fa miangavy anao aho, ny lefona eo anilan’ny lohany sy ny tavoara fitondran-drano no alaivo, dia andeha isika handeha. '
  '12':
  - type: text
    content: Dia nalain’i Davida ny lefona sy ny tavoara fitondran-drano izay teo anilan’ny lohan’i Saoly ka lasa izy; ary tsy nisy olona nahita, na nahalala, na nifoha; natory mantsy izy rehetra satria nataon’NY TOMPO renoky ny torimaso.
  '13':
  - type: text
    content: 'Dia nita nankeny andafin’ny lohasaha i Davida ka nijanona teo an-tampon’ny tendrombohitra lavidavitra; misimisy ihany ny elanelan’ireo toerana roa ireo; '
  '14':
  - type: text
    content: 'ary niantso ny olona sy i Abnera, zanak’i Nera i Davida hoe: Tsy mamaly va ianao, ry Abnera? Dia namaly i Abnera hoe: Iza moa ianao no miantsoantso ho ren’ny mpanjaka? '
  '15':
  - type: text
    content: 'Hoy i Davida tamin’i Abnera: Tsy lehilahy mahery va ianao, ary iza no tahaka anao amin’ny Israely? Koa nahoana ianao no tsy miambina ny mpanjaka tomponao? Fa nisy iray tamin’ny olona tonga teo hamono ny mpanjaka tomponao. '
  '16':
  - type: text
    content: Tsy tsara izany nataonao izany. Raha velona koa NY TOMPO dia tokony ho faty ianareo, satria tsy miambina ny tomponareo, ilay voahosotry NY TOMPO. Jereo ange, aiza ny lefon’ny mpanjaka sy ny tavoara fitondran-drano teo anilan’ny lohany?
  '17':
  - type: text
    content: 'Dia fantatr’i Saoly ny feon’i Davida ka hoy izy: Feonao va izany, ry Davida zanako? Hoy i Davida: Feoko tokoa, ry mpanjaka tompoko. '
  '18':
  - type: text
    content: 'Ary hoy koa izy: Nahoana ny tompoko no manenjika ny mpanompony? Inona no nataoko, ary inona no ratsy amin’ny tanako? '
  '19':
  - type: text
    content: 'Koa ankehitriny, miangavy anao aho, ry mpanjaka tompoko, mihainoa ny tenin’ny mpanomponao: Raha NY TOMPO no nanesika anao hamely ahy dia aoka handray ny hanitry ny fanatitra Izy; fa raha zanak’olombelona kosa dia aoka ho voaozona eo anatrehan’NY TOMPO izy, satria efa nandroaka ahy tsy hanana anjara amin’ny lova nomen’NY TOMPO izy androany ka niteny hoe: Mandehana, manompoa andriamanitra hafa. '
  '2':
  - type: text
    content: 'Dia niainga i Saoly ka nidina nankany an-tany efitr’i Zifa, nitondra telo arivo lahy voafantina tamin’ny Israely hanaraka azy hitady an’i Davida any an-tany efitr’i Zifa. '
  '20':
  - type: text
    content: 'Koa aza avela ho latsaka amin’ny tany lavitra NY TOMPO ny rako; fa ny mpanjakan’ny Israely dia nivoaka nitady parasy iray, tahaka ny manenjika tsipoy eny an-tendrombohitra. '
  '21':
  - type: text
    content: 'Ary hoy i Saoly: Efa nanota aho! Miverena, ry Davida zanako, fa tsy hanisy ratsy anao intsony aho, fa sarobidy teo imasonao ny aiko androany; indro, efa nanao zavatra tsy tamim-piheverana aho ka tena diso. '
  '22':
  - type: text
    content: 'Dia namaly i Davida hoe: Indro ny lefon’ny mpanjaka! Koa asaivo misy zatovo iray manketỳ haka azy. '
  '23':
  - type: text
    content: 'NY TOMPO hamaly ny olona araka ny fahitsiany sy ny fahamarinany, satria NY TOMPO no nanolotra anao teo an-tanako androany, nefa tsy nety nanatsotra ny tanako hamely ny voahosotry NY TOMPO aho. '
  '24':
  - type: text
    content: 'Indro, fa tahaka ny nanaovako ny ainao ho lehibe teo imasoko androany no mba hanaovan’NY TOMPO ny aiko ho lehibe eo imasony koa ka hanafahany ahy amin’ny fahoriana rehetra. '
  '25':
  - type: text
    content: 'Ary hoy i Saoly tamin’i Davida: Hotahina anie ianao, ry Davida zanako; na inona na inona ataonao dia ho tontosanao tokoa. Dia nanohy ny lalany i Davida fa i Saoly kosa dia nitodi-doha niverina nody.'
  '3':
  - type: text
    content: 'Ary nitoby tao amin’ny tany be havoana any Hakila izay manandrify ny tany efitra teo amoron-dalana izy. Fa i Davida kosa dia nitoetra tany an-tany efitra, ary hitany fa tonga nanaraka azy tany i Saoly. '
  '4':
  - type: text
    content: 'Koa naniraka mpitsikilo i Davida ka fantany fa tonga tokoa i Saoly. '
  '5':
  - type: text
    content: Dia niainga i Davida ka tonga teo amin’ny toerana izay nitobian’i Saoly; ary hitan’i Davida ny toerana izay nandrian’i Saoly sy Abnera, zanak’i Nera, komandin’ny miaramilany. Ary natory teo anatin’ny kianja fitobian-tsarety i Saoly ka nitoby manodidina azy ny vahoaka.
  '6':
  - type: text
    content: 'Ary hoy i Davida tamin’i Ahimeleka hetita sy i Abisay, zanak’i Zeroia, rahalahin’i Joaba: Iza no hidina hiaraka amiko ho any amin’i Saoly any an-toby? Dia hoy i Abisay: Izaho no hidina hiaraka aminao. '
  '7':
  - type: text
    content: 'Dia tonga tao amin’ny vahoaka i Davida sy i Abisay nony alina; ary indro, nandry i Saoly ka natory teo amin’ny kianja fitobian-tsarety, ary ny lefony dia nitsatoka tamin’ny tany teo anilan’ny lohany; i Abnera sy ny vahoaka kosa dia natory manodidina azy. '
  '8':
  - type: text
    content: 'Ary hoy i Abisay tamin’i Davida: Efa voatolotr’Andriamanitra eo an-tananao ny fahavalonao izao; koa, miangavy anao aho, aoka holefoniko indray mandeha monja izy ka hataoko miboroaka amin’ny tany, fa tsy hamely azy indroa akory aho. '
  '9':
  - type: text
    content: 'Fa hoy i Davida tamin’i Abisay: Aza mamono azy; fa iza no manatsotra ny tanany amin’ny voahosotry NY TOMPO ka tsy hanan-tsiny? '
