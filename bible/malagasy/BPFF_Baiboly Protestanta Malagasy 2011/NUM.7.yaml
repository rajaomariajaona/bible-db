    content: Ary izy ireo dia nitondra ny fanatiny teo anatrehan’NY TOMPO, dia sarety enina mirakotra sy omby roa amby folo, koa sarety iray sy omby iray avy ny avy tamin’ny lehiben’ny firenena roa, ary omby iray avy; dia noentin’izy ireo teo anoloan’ny tabernakely izany.
  '30':
