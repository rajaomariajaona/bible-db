      text: '85'
  - type: text
    text: 'sekela telopolo amby zato avy no lanjan’ny lovia volafotsy, sekela fitopolo avy ny lovia famafazana; ny lanjan’ny volafotsy rehetra tamin’ireo fanaka ireo dia sekela efajato sy roa arivo, araka ny sekela masina; '
  - type: usfm
