      text: '87'
  - type: text
    text: 'Ny biby rehetra izay hatao fanatitra dorana manontolo dia vantotra ombilahy roa amby folo, ondrilahy roa amby folo, zanak’ondry roa amby folo izay iray taona, mbamin’ny fanatitra avy amin’ny zavamaniry miaraka aminy, ary osilahy roa amby folo ho fanatitra noho ny ota. '
  - type: usfm
    marker: v
