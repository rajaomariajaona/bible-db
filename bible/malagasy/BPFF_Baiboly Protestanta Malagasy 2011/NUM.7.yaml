verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ireo sarety natolotra ho an’ny tabernakely
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Tamin’ny andro nahavitan’i Mosesy ny fananganana ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: tabernakely
    - type: text
      text: ' dia nanosotra sy nanamasina azy sy ny fanaka rehetra momba azy ary ny alitara sy ny fanaka rehetra momba azy izy, nanosotra sy nanamasina ireo izy. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ireo lohan’ny foko kosa no nanolotra fanatitra ho amin’ny fitokanana ny alitara amin’ny andro izay hanosorana azy; samy nanolotra ny fanatiny teo anoloan’ny alitara ireo lohan’ny foko. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Hoy NY TOMPO tamin’i Mosesy: Aoka ireo lohan’ny foko hanolotra ny fanatiny, samy araka ny androny avy, ho amin’ny fitokanana ny alitara.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'I Nasona, zanak’i Aminadaba, avy tamin’ny fokon’i Joda no nanolotra ny fanatiny tamin’ny andro voalohany. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Lovia volafotsy iray, milanja sekela telopolo amby zato no fanatiny; miaraka amin’io koa, lovia volafotsy iray famafazana, sekela fitopolo, araka ny sekela masina; izy roa dia samy feno koba tsara toto voaharo diloilo, ho fanatitra avy amin’ny zavamaniry; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'lovia kely volamena iray, sekela folo, feno ditin-kazo manitra; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'ny ho fanatitra dorana manontolo dia vantotra ombilahy iray sy ondrilahy iray ary zanak’ondry iray izay iray taona; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'osilahy iray no ho fanatitra noho ny ota; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ary ho fanati-pihavanana dia omby roa, ondrilahy dimy, osilahy dimy, zanak’ondry dimy izay iray taona; ireo no fanatitr’i Nasona, zanak’i Aminadaba.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Tamin’ny andro faharoa dia i Netanela, zanak’i Zoara, lohan’ny taranak’i Isakara, no nanolotra ny fanatiny. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
