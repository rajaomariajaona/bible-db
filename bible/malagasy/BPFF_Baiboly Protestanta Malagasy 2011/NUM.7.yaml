verses:
  '1':
  - type: heading
    content: Ireo sarety natolotra ho an’ny tabernakely
  - type: text
    content: 'Tamin’ny andro nahavitan’i Mosesy ny fananganana ny '
  - type: text
    content: tabernakely
  - type: text
    content: ' dia nanosotra sy nanamasina azy sy ny fanaka rehetra momba azy ary ny alitara sy ny fanaka rehetra momba azy izy, nanosotra sy nanamasina ireo izy. '
  '10':
  - type: text
    content: 'Ireo lohan’ny foko kosa no nanolotra fanatitra ho amin’ny fitokanana ny alitara amin’ny andro izay hanosorana azy; samy nanolotra ny fanatiny teo anoloan’ny alitara ireo lohan’ny foko. '
  '11':
  - type: text
    content: 'Hoy NY TOMPO tamin’i Mosesy: Aoka ireo lohan’ny foko hanolotra ny fanatiny, samy araka ny androny avy, ho amin’ny fitokanana ny alitara.'
  '12':
  - type: text
    content: 'I Nasona, zanak’i Aminadaba, avy tamin’ny fokon’i Joda no nanolotra ny fanatiny tamin’ny andro voalohany. '
  '13':
  - type: text
    content: 'Lovia volafotsy iray, milanja sekela telopolo amby zato no fanatiny; miaraka amin’io koa, lovia volafotsy iray famafazana, sekela fitopolo, araka ny sekela masina; izy roa dia samy feno koba tsara toto voaharo diloilo, ho fanatitra avy amin’ny zavamaniry; '
  '14':
  - type: text
    content: 'lovia kely volamena iray, sekela folo, feno ditin-kazo manitra; '
  '15':
  - type: text
    content: 'ny ho fanatitra dorana manontolo dia vantotra ombilahy iray sy ondrilahy iray ary zanak’ondry iray izay iray taona; '
  '16':
  - type: text
    content: 'osilahy iray no ho fanatitra noho ny ota; '
  '17':
  - type: text
    content: ary ho fanati-pihavanana dia omby roa, ondrilahy dimy, osilahy dimy, zanak’ondry dimy izay iray taona; ireo no fanatitr’i Nasona, zanak’i Aminadaba.
  '18':
  - type: text
    content: 'Tamin’ny andro faharoa dia i Netanela, zanak’i Zoara, lohan’ny taranak’i Isakara, no nanolotra ny fanatiny. '
  '19':
  - type: text
    content: 'Nanolotra ny fanatiny izy, dia lovia volafotsy iray, sekela telopolo amby zato no lanjany, lovia volafotsy iray famafazana, sekela fitopolo, araka ny sekela masina; izy roa dia samy feno koba tsara toto voaharo diloilo, ho fanatitra avy amin’ny zavamaniry; '
  '2':
  - type: text
    content: 'Dia nitondra fanatitra ireo lohan’ny firenen’ny Israely, dia ny lohan’ny fianakaviana isanisany; ireo no lohan’ny fokony avy, izay nifehy ny voaisa. '
  '20':
  - type: text
    content: 'lovia kely volamena iray, sekela folo, feno ditin-kazo manitra; '
  '21':
  - type: text
    content: 'ary vantotra ombilahy iray sy ondrilahy iray ary zanak’ondry iray izay iray taona kosa no ho fanatitra dorana manontolo; '
  '22':
  - type: text
    content: 'osilahy iray, ho fanatitra noho ny ota; '
  '23':
  - type: text
    content: ary ho fanati-pihavanana dia omby roa, ondrilahy dimy, osilahy dimy, zanak’ondry dimy izay iray taona; ireo no fanatitr’i Netanela, zanak’i Zoara.
  '24':
  - type: text
    content: 'Tamin’ny andro fahatelo dia ny lohan’ny taranak’i Zebolona, i Eliaba, zanak’i Helona, no nanolotra ny fanatiny. '
