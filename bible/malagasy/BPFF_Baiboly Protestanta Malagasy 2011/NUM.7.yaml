  '86':
  - type: text
    content: 'lovia kely volamena roa amby folo, feno ditin-kazo manitra, milanja sekela folo avy, araka ny sekela masina; ny lanjan’ny lovia kely volamena rehetra dia sekela roapolo amby zato. '
  '87':
  - type: text
    content: 'Ny biby rehetra izay hatao fanatitra dorana manontolo dia vantotra ombilahy roa amby folo, ondrilahy roa amby folo, zanak’ondry roa amby folo izay iray taona, mbamin’ny fanatitra avy amin’ny zavamaniry miaraka aminy, ary osilahy roa amby folo ho fanatitra noho ny ota. '
  '88':
  - type: text
    content: Ary ny biby rehetra izay hatao fanati-pihavanana dia vantotra ombilahy efatra amby roapolo, ondrilahy enimpolo, osilahy enimpolo, zanak’ondry enimpolo, izay samy iray taona. Izany no nateriny ho amin’ny fitokanana ny alitara rehefa voahosotra izy.
