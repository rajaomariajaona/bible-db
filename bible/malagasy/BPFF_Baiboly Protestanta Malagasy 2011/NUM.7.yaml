      text: '84'
  - type: text
    text: 'Ireo no zavatra naterin’ireo lohan’ny Israely ho amin’ny fitokanana ny alitara tamin’ny andro izay hanosorana azy: Lovia volafotsy roa amby folo, lovia volafotsy famafazana roa amby folo, lovia kely volamena roa amby folo; '
