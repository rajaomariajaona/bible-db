document_id: NUM.7
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ireo sarety natolotra ho an’ny tabernakely
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Tamin’ny andro nahavitan’i Mosesy ny fananganana ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tabernakely
  - type: text
    text: ' dia nanosotra sy nanamasina azy sy ny fanaka rehetra momba azy ary ny alitara sy ny fanaka rehetra momba azy izy, nanosotra sy nanamasina ireo izy. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Dia nitondra fanatitra ireo lohan’ny firenen’ny Israely, dia ny lohan’ny fianakaviana isanisany; ireo no lohan’ny fokony avy, izay nifehy ny voaisa. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ary izy ireo dia nitondra ny fanatiny teo anatrehan’NY TOMPO, dia sarety enina mirakotra sy omby roa amby folo, koa sarety iray sy omby iray avy ny avy tamin’ny lehiben’ny firenena roa, ary omby iray avy; dia noentin’izy ireo teo anoloan’ny tabernakely izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary NY TOMPO niteny tamin’i Mosesy hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Raiso avy aminy ireo hanaovana ny fanompoana momba ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tranolay fihaonana
  - type: text
    text: ' ka omeo ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: levita
  - type: text
    text: ', dia samy araka ny fanompoany avy. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia noraisin’i Mosesy ny sarety sy ny omby ka nomeny ny levita. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Sarety roa sy omby efatra no nomeny ho an’ny taranak’i Gersona, araka ny fanompoany; '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'ary sarety efatra sy omby valo no nomeny ho an’ny taranak’i Merary, araka ny fanompoany teo ambany fitarihan’Itamara, zanak’i Arona mpisorona. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Fa ny taranak’i Kehata kosa tsy mba nomeny na dia iray akory aza, satria ny fanompoana momba ny fitoerana masina no anjarany, ary eo an-tsorony ihany no hilanjany azy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ireo fanomezana ho amin’ny fitokanana ny alitara
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ireo lohan’ny foko kosa no nanolotra fanatitra ho amin’ny fitokanana ny alitara amin’ny andro izay hanosorana azy; samy nanolotra ny fanatiny teo anoloan’ny alitara ireo lohan’ny foko. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Hoy NY TOMPO tamin’i Mosesy: Aoka ireo lohan’ny foko hanolotra ny fanatiny, samy araka ny androny avy, ho amin’ny fitokanana ny alitara.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'I Nasona, zanak’i Aminadaba, avy tamin’ny fokon’i Joda no nanolotra ny fanatiny tamin’ny andro voalohany. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Lovia volafotsy iray, milanja sekela telopolo amby zato no fanatiny; miaraka amin’io koa, lovia volafotsy iray famafazana, sekela fitopolo, araka ny sekela masina; izy roa dia samy feno koba tsara toto voaharo diloilo, ho fanatitra avy amin’ny zavamaniry; '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'lovia kely volamena iray, sekela folo, feno ditin-kazo manitra; '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'ny ho fanatitra dorana manontolo dia vantotra ombilahy iray sy ondrilahy iray ary zanak’ondry iray izay iray taona; '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'osilahy iray no ho fanatitra noho ny ota; '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ary ho fanati-pihavanana dia omby roa, ondrilahy dimy, osilahy dimy, zanak’ondry dimy izay iray taona; ireo no fanatitr’i Nasona, zanak’i Aminadaba.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Tamin’ny andro faharoa dia i Netanela, zanak’i Zoara, lohan’ny taranak’i Isakara, no nanolotra ny fanatiny. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Nanolotra ny fanatiny izy, dia lovia volafotsy iray, sekela telopolo amby zato no lanjany, lovia volafotsy iray famafazana, sekela fitopolo, araka ny sekela masina; izy roa dia samy feno koba tsara toto voaharo diloilo, ho fanatitra avy amin’ny zavamaniry; '
  - type: usfm
    marker: v
