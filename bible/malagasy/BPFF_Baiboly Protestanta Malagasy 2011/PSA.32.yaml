document_id: PSA.32,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fahasambaran’ny voavela heloka
  - type: text
    content: Nataon’i Davida. Tononkalo.
  - type: text
    content: Sambatra ny olona izay voavela ny helony
  - type: text
    content: ary voasarona ny fahotany!
  '10':
  - type: text
    content: Be ny fanaintainan’ny ratsy fanahy,
  - type: text
    content: fa izay matoky NY TOMPO kosa dia hodidinin’ny famindrampo.
  '11':
  - type: text
    content: Mifalia amin’NY TOMPO ary miravoravoa ianareo olona marina!
  - type: text
    content: Mihobia, ianareo mahitsy fo rehetra.
  '2':
  - type: text
    content: Sambatra ny olona izay tsy isain’NY TOMPO heloka
  - type: text
    content: ary tsy misy fitaka ny fanahiny!
  '3':
  - type: text
    content: Raha nangina aho dia nihalany ny taolako rehetra
  - type: text
    content: noho ny fitarainako mandritra ny andro,
  '4':
  - type: text
    content: fa navesatra tamiko andro aman’alina ny tananao;
  - type: text
    content: 'niova ny fahatanjahako, toy ny azon’ny fahamainana amin’ny lohataona. '
  - type: text
    content: Fiatoana
  '5':
  - type: text
    content: Ny fahotako dia nambarako Taminao
  - type: text
    content: ary ny heloko tsy mba nafeniko;
  - type: text
    content: 'hoy aho: Hiaiky ny fahadisoako amin’NY TOMPO aho;'
  - type: text
    content: 'ary Ianao dia namela ny heloko, ny fahotako. '
  - type: text
    content: Fiatoana
  '6':
  - type: text
    content: Izany no aoka hivavahan’ny matahotra an’Andriamanitra rehetra Aminao amin’izay fotoana hahitana Anao!
  - type: text
    content: Eny tokoa, na dia tondraka aza ny ranobe
  - type: text
    content: dia tsy hahatratra azy izany.
  '7':
  - type: text
    content: Ianao no fiereko, miaro ahy tsy ho azon’ny fahoriana Ianao;
  - type: text
    content: 'fihobiam-pamonjena no ahodidinao ahy. '
  - type: text
    content: Fiatoana
  '8':
  - type: text
    content: Hanome saina anao sy hampianatra anao izay lalana tokony halehanao Aho;
  - type: text
    content: hanolo-tsaina anao Aho ary hitsinjo anao ny masoko.
  '9':
  - type: text
    content: Aza manahaka ny soavaly na ny ampondra tsy manan-tsaina;
  - type: text
    content: vy sy lamboridy no haingo hihazonana azy
  - type: text
    content: fa tsy mety manakaiky anao izy.
