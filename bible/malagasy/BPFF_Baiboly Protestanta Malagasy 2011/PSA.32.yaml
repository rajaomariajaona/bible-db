document_id: PSA.32
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fahasambaran’ny voavela heloka
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: Nataon’i Davida. Tononkalo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Sambatra ny olona izay voavela ny helony
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary voasarona ny fahotany!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Sambatra ny olona izay tsy isain’NY TOMPO heloka
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy misy fitaka ny fanahiny!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Raha nangina aho dia nihalany ny taolako rehetra
- type: usfm
  marker: q1
  children:
  - type: text
    text: noho ny fitarainako mandritra ny andro,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: fa navesatra tamiko andro aman’alina ny tananao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'niova ny fahatanjahako, toy ny azon’ny fahamainana amin’ny lohataona. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Fiatoana
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ny fahotako dia nambarako Taminao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny heloko tsy mba nafeniko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'hoy aho: Hiaiky ny fahadisoako amin’NY TOMPO aho;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ary Ianao dia namela ny heloko, ny fahotako. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Fiatoana
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Izany no aoka hivavahan’ny matahotra an’Andriamanitra rehetra Aminao amin’izay fotoana hahitana Anao!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny tokoa, na dia tondraka aza ny ranobe
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia tsy hahatratra azy izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ianao no fiereko, miaro ahy tsy ho azon’ny fahoriana Ianao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'fihobiam-pamonjena no ahodidinao ahy. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Fiatoana
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Hanome saina anao sy hampianatra anao izay lalana tokony halehanao Aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hanolo-tsaina anao Aho ary hitsinjo anao ny masoko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Aza manahaka ny soavaly na ny ampondra tsy manan-tsaina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: vy sy lamboridy no haingo hihazonana azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa tsy mety manakaiky anao izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Be ny fanaintainan’ny ratsy fanahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa izay matoky NY TOMPO kosa dia hodidinin’ny famindrampo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Mifalia amin’NY TOMPO ary miravoravoa ianareo olona marina!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mihobia, ianareo mahitsy fo rehetra.
