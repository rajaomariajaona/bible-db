document_id: 2KI.25
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Manao fahirano an’i Jerosalema i Nebokadnezara
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Jer 39.1-7; 52.4-11
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Tamin’ny andro fahafolo tamin’ny volana fahafolo tamin’ny taona fahasivy nanjakan’i Zedekia dia tonga i Nebokadnezara, mpanjakan’i Babilona, sy ny miaramilany rehetra, hamely an’i Jerosalema ka nitoby tandrifiny; ary nanangana tovon-tany manodidina azy izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Nataony fahirano hatramin’ny taona fahiraika amby folo nanjakan’i Zedekia mpanjaka ny tanàna. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Tamin’ny andro fahasivy tamin’ny volana dia mafy ny mosary tao an-tanàna, fa tsy nisy hanina intsony ho an’ny vahoaka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary nisy voabanga ny tanàna ka nandositra alina ny miaramila rehetra tamin’ny lalana nankany amin’ny vavahady anelanelan’ny manda roa, izay eo anilan’ny sahan’ny mpanjaka, fa ny Kaldeana dia nanodidina ny tanàna. Ary nandeha tamin’ny lalana mankeny amin’ny tany ngazana ny mpanjaka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Nanenjika ny mpanjaka anefa ny miaramilan’ny Kaldeana ka nahatratra azy teny amin’ny tany ngazana any Jeriko; dia niparitaka nandao azy ny miaramilany rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Voasambotra ny mpanjaka ka noentina niakatra ho any amin’ny mpanjakan’i Babilona tao Ribla ary notsaraina tao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ary ny zanakalahin’i Zedekia dia novonoiny teo imason’ny rainy, ny mason’i Zedekia kosa nopotsiriny ary nafatony tamin’ny gadra varahina izy ka noentiny nankany Babilona.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nahazoan’ny Babiloniana an’i Jerosalema; ny fandefasana babo fanindroany
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Jer 39.8-10; 52.12-27; 2Tan 36.17-21
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Tamin’ny andro fahafito tamin’ny volana fahadimy tamin’ny taona fahasivy amby folo nanjakan’i Nebokadnezara, mpanjakan’i Babilona, dia tonga tany Jerosalema i Nebozaradana, lehiben’ny mpiambina, mpanompon’ny mpanjakan’i Babilona, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'ka nandoro ny tranon’NY TOMPO sy ny tranon’ny mpanjaka mbamin’ny trano rehetra tany Jerosalema. Ny trano lehibe rehetra dia nodorany tamin’ny afo avokoa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ary ny manda manodidina an’i Jerosalema dia noravan’ny miaramilan’ny Kaldeana rehetra izay nanaraka ny lehiben’ny mpiambina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Izay olona sisa tao an-tanàna sy izay efa nandositra nanatona ny mpanjakan’i Babilona ary ny vahoaka betsaka sisa dia noentin’i Nebozaradana, lehiben’ny mpiambina, ho babo avokoa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Fa ny olona madinika kosa dia nisy navelany ihany ho mpamboatra tanim-boaloboka sy ho mpiasa tany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ireo andry varahina tao amin’ny tranon’NY TOMPO sy ny fitoeran’ny koveta ary ny koveta varahina lehibe izay tao amin’ny tranon’NY TOMPO dia notorotoroin’ny Kaldeana ka noentiny ho any Babilona ny varahina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Noentiny koa ny vilany fandraofan-davenona, ny sotron’afo, ny antsy, ny lovia kely ary ny fanaka varahina rehetra izay noentina nanaovana ny fanompoam-pivavahana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Noentiny koa ny fitoeran-davenon-jiro sy ny lovia famafazana; na ny volamena na ny volafotsy dia samy noentin’ny lehiben’ny mpiambina avokoa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ny andry roa sy ny koveta lehibe iray ary ireo fitoeran’ny koveta izay nataon’i Solomona ho amin’ny tranon’NY TOMPO, ny varahina tamin’izany fanaka rehetra izany dia tsy hita pesipesenina ny lanjany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Valo amby folo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: hakiho
  - type: text
    text: ' ny haavon’ny andry iray, ary varahina ny lohany sady telo hakiho ny haavony; varahina avokoa ny harato sy ny ampongabendanitra amin’ny lohany manodidina; tahaka izany koa ny andry faharoa mbamin’ny harato.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary ny lehiben’ny mpiambina dia nisambotra an’i Seraia mpisoronabe sy i Zefania, mpisorona manarakaraka azy, ny mpiandry varavarana telo lahy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'tao an-tanàna no nisamborany ny tandapa iray, mpifehy ny miaramila dimy lahy tamin’izay mpitoetra teo anatrehan’ny mpanjaka, izay hita tao an-tanàna, ary ny mpitantsoratry ny mpitarika ny miaramila, izay mpandamina ny ho miaramila, sy enimpolo lahy avy amin’ny vahoaka, izay hitany tao an-tanàna; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'nosamborin’i Nebozaradana, lehiben’ny mpiambina, ireo ka noentiny ho any amin’ny mpanjakan’i Babilona tao Ribla. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Dia novonoin’ny mpanjakan’i Babilona tao Ribla any amin’ny tany Hamata ireo. Toy izany no nitondrana ny Joda ho babo niala tamin’ny taniny.
- type: usfm
  marker: s1
  children:
  - type: text
    text: I Gedalia, governoran’ny Joda
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Ampit. Jer 40.7–41.18
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Fa ny amin’ny olona izay sisa tany amin’ny tanin’ny Joda, izay navelan’i Nebokadnezara, mpanjakan’i Babilona, dia i Gedalia, zanak’i Ahikama, zanak’i Safana, no notendreny ho mpanapaka azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Nony ren’ny mpitari-tafika rehetra mbamin’ny olom-peheziny avy fa i Gedalia no notendren’i Nebokadnezara, mpanjakan’i Babilona, ho mpanapaka, dia nandeha nankany amin’i Gedalia tany Mizpa izy ireo, dia: Ismaela, zanak’i Netania, i Johanana, zanak’i Karea, i Seraia, zanak’i Tanometa netofatita, ary i Jazania, zanak’ilay Makatita, dia ireo mbamin’ny olom-peheziny avy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary nianiana taminy sy tamin’ny olom-peheziny i Gedalia hoe: Aza matahotra ny amin’ny mpanompon’ny Kaldeana, fa mitomoera amin’ny tany, ary manompoa ny mpanjakan’i Babilona, fa izany no hahasoa anareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Tamin’ny volana fahafito anefa dia avy Ismaela, zanak’i Netania, zanak’i Elisama, isan’ny fianakavian’ny mpanjaka, mbamin’ny olona folo lahy ka namely an’i Gedalia ary nahafaty azy sy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jiosy
  - type: text
    text: ' ary ny Kaldeana izay tao aminy tany Mizpa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Ary niainga ny olona rehetra, na kely na lehibe, mbamin’ny mpitarika ny miaramila, nankany Ejipta, satria natahotra ny Kaldeana.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mampiseho famindrampo amin’i Joiakina i Evila-Merodaka
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Jer 52.31-34
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Tamin’ny andro fahafito amby roapolo tamin’ny volana faharoa amby folo tamin’ny taona fahafito amby telopolo taorianan’ny namaboana an’i Joiakina, mpanjakan’ny Joda, dia nasandratr’i Evila-Merodaka hiala tao an-tranomaizina i Joiakina, mpanjakan’ny Joda, tamin’ny taona voalohany nanjakany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Dia nitenenany soa izy ka ny sezafiandrianany dia nataony ambony noho ny sezafiandrianan’ireo mpanjaka namany tao Babilona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Nasainy novana ny fitafiana naha mpifatotra azy dia nisakafo teo anatrehany mandrakariva izy tamin’ny andro rehetra niainany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Ny anjara sakafony dia niantohan’ny mpanjaka, tsy tapaka, isanandro isanandro tamin’ny andro rehetra niainany.
