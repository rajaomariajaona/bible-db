document_id: 1CO.8,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny amin’ny hena izay efa natao fanatitra tamin’ny sampy
  - type: text
    content: 'Ny amin’ny hena naterina tamin’ny sampy dia fantatsika fa manana fahalalana isika rehetra. Ny fahalalana dia mampieboebo, fa ny fitiavana no mampandroso. '
  '10':
  - type: text
    content: 'Fa raha misy mahita anao izay manam-pahalalana mipetraka mihinana ao amin’ny tempolin’ny sampy, tsy hampahasahy ny fieritreretan’ny malemy finoana hihinana izay hena naterina tamin’ny sampy koa va izany? '
  '11':
  - type: text
    content: 'Fa very noho ny fahalalanao ny malemy finoana, dia ny rahalahy izay navotan’i Kristy tamin’ny fahafatesany! '
  '12':
  - type: text
    content: 'Fa raha manota toy izany amin’ny rahalahy ianareo ka mandratra ny fieritreretan’ny malemy finoana dia manota amin’i Kristy ianareo. '
  '13':
  - type: text
    content: Koa raha ny hanina no mahatafintohina ny rahalahiko dia tsy hihinana izay hena akory aho mandrakizay, fandrao mahatafintohina ny rahalahiko.
  '2':
  - type: text
    content: 'Fa raha misy mihevitra ny tenany ho mahalala zavatra dia tsy mbola mahalala araka izay tokony ho fantany akory izy. '
  '3':
  - type: text
    content: 'Fa raha misy tia an’Andriamanitra dia izy no fantany. '
  '4':
  - type: text
    content: 'Ary ny amin’ny mihinana ny hena naterina tamin’ny sampy dia fantatsika fa tsinontsinona ny sampy amin’izao tontolo izao, ary tsy misy Andriamanitra afa-tsy iray ihany. '
  '5':
  - type: text
    content: Fa na dia misy aza lazaina hoe andriamanitra, na any an-danitra, na etỳ an-tany, toy ny hoe misy andriamanitra maro sy tompo maro,
  '6':
  - type: text
    content: amintsika kosa dia iray ihany Andriamanitra, dia ny Ray
  - type: text
    content: izay niavian’ny zavatra rehetra, ary ho Azy isika;
  - type: text
    content: 'ary iray ihany ny Tompo, dia Jesosy '
  - type: text
    content: Kristy
  - type: text
    content: izay nahariana ny zavatra rehetra sady nahariana antsika koa.
  '7':
  - type: text
    content: 'Kanefa tsy ary manana izany fahalalana izany avokoa ny olona rehetra; fa ny sasany, satria zatra amin’ny sampy mandraka ankehitriny izao, dia homana ny hena ka mahatsiaro azy ho zavatra naterina tamin’ny sampy; koa voaloto ny fieritreretany satria malemy. '
  '8':
  - type: text
    content: 'Fa tsy ny hanina akory no hampifanakaiky antsika amin’Andriamanitra; fa na dia tsy homana aza isika dia tsy matiantoka, ary na dia homana kosa aza isika dia tsy mahazo tombony. '
  '9':
  - type: text
    content: 'Tandremo anefa, fandrao ho tonga fahatafintohinana ho an’ny malemy finoana izany fahafahanareo izany. '
