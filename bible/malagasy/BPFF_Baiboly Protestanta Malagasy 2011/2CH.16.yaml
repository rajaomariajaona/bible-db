document_id: 2CH.16
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny ady nifanaovan’i Asa sy i Basa, mpanjakan’ny Israely
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 1Mpa 15.16-22
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Tamin’ny taona fahenina amby telopolo nanjakan’i Asa dia niakatra hamely ny Joda i Basa, mpanjakan’ny Israely, ka nanamboatra an’i Rama mba tsy hisy hahazoan’i Asa, mpanjakan’i Joda, hivoaka na hiditra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Namoaka volafotsy sy volamena avy tao amin’ny efitrano fitahirizana tao amin’ny ny tranon’NY TOMPO sy avy tao amin’ny efitrano fitahirizana ao amin’ny tranon’ny mpanjaka i Asa dia nampanatitra azy tany amin’i Beny-Hadada, mpanjakan’i Arama, izay nitoetra tany Damaskosy ka nampilazainy hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Aoka hisy fanekena amiko sy aminao, dia toy ilay tamin’ny raiko sy ny rainao; koa indro, mampanatitra volafotsy sy volamena ho anao aho ka andeha, tsoahy ny fanekenao amin’i Basa, mpanjakan’ny Israely, mba hialany amiko. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Nanaiky ny tenin’i Asa mpanjaka i Beny-Hadada ka naniraka ireo lehiben’ny miaramilany hamely ny tanànan’ny Israely; dia nandrava an’Iona sy i Dana sy i Abela-Maima ary ny trano fitahirizana rehetra izay teny amin’ny tanànan’ny Naftaly izy ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Nony ren’i Basa izany dia nitsahatra tsy nanamboatra an’i Rama intsony izy fa natsahany ny asany. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Namory ny Joda rehetra i Asa mpanjaka avy eo; dia nesorin’ny olona ny vato sy ny hazo tao Rama, izay naorin’i Basa, ka noentiny nanamboarana an’i Geba sy Mizpa.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nampidirin’i Asa am-ponja i Hanany mpahita
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Tamin’izany andro izany dia nankeo amin’i Asa, mpanjakan’ny Joda, i Hanany mpahita ka niteny taminy hoe: Noho ny niankinanao tamin’ny mpanjakan’i Arama fa tsy niankina tamin’NY TOMPO Andriamanitrao, dia afa-nandositra ny tananao ny miaramilan’ny mpanjakan’i Arama. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Tsy marobe va ny Kosita sy ny Lobita, ary tsy marobe koa va ny kalesy fitondrany miady sy ny mpitaingin-tsoavaliny? Nefa noho ny niankinanao tamin’NY TOMPO dia natolony teo an-tananao ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Fa ny mason’NY TOMPO dia mijery eny tontolo eny manerana ny tany rehetra, mba hisehoany amin-kery hamonjy izay manana fo mahitsy Aminy. Adala ianao tamin’izany ka hisy ady hahazo anao manomboka izao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Dia tezitra tamin’ilay mpahita i Asa ka nanao azy tao an-tranomaizina; fa nisafoaka taminy indrindra izy noho izany. Ary ny olona sasany koa dia nampahorin’i Asa noho izay.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny niafaran’ny fanjakan’i Asa
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 1Mpa 15.23-24
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary indro, ny tantaran’i Asa, hatramin’ny voalohany ka hatramin’ny farany, dia voasoratra ao amin’ny bokin’ny mpanjakan’ny Joda sy Israely. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Tamin’ny taona fahasivy amby telopolo nanjakan’i Asa dia narary tamin’ny tongony izy ka nihamafy indrindra ny aretiny; nefa na dia narary aza izy dia tsy nitady NY TOMPO fa ny mpitsabo ihany. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary nodimandry any amin’ny razany i Asa; maty izy tamin’ny taona fahiraika amby efapolo nanjakany. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Dia nalevina tao amin’ny fasany ihany izy, izay nolavahany tao an-Tanànan’i Davida ka nampandriana teo amin’ny fandriana efa nofenoina zavamanitra samihafa voaharoharo araka ny fanaon’ny mpanao haro manitra, sady nandoroany zavatra betsaka ho fisaonana azy.
