document_id: ISA.38
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny aretina sy ny fahasitranan’i Hezekia
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 2Mpa 20.1-11
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Tamin’izany andro izany dia narary saika maty i Hezekia; ary nankao aminy Isaia mpaminany, zanak’i Amoza, ka nilaza taminy hoe: Izao no lazain’NY TOMPO: Hafaro ny ankohonanao fa ho faty ianao fa tsy ho velona. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Dia nitodika nankany amin’ny rindrina i Hezekia ka nivavaka tamin’NY TOMPO. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Hoy izy: TOMPO ô, enga anie ka hotsarovanao ny nandehanako teo anatrehanao tamin’ny fahamarinana sy tamin’ny foko manontolo ary ny nanaovako izay tsara teo imasonao! Dia nitomany mafy indrindra izy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dia tonga tamin’Isaia ny tenin’NY TOMPO hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Mandehana lazao amin’i Hezekia hoe: Izao no lazain’NY TOMPO, Andriamanitr’i Davida rainao: Efa reko ny fitarainanao ary efa hitako ny ranomasonao. Indro, hampiako dimy amby folo taona ny andronao. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Hamonjy anao sy ity tanàna ity amin’ny tanan’ny mpanjakan’i Asiria Aho; hiaro ity tanàna ity Aho. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary izao no ho famantarana ho anao avy amin’NY TOMPO, hahalalanao fa NY TOMPO hanatanteraka izay zavatra nolazainy: '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Indro, hampivereniko ambaratonga folo miaraka amin’ny masoandro ny aloka eo amin’ny famantaranandro aloka an’i Ahaza, eo amin’ilay efa nidinany iny. Dia niverina tokoa ny masoandro teo amin’ny ambaratonga folo izay efa nidinan’ny aloka.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny vavaka nataon’i Hezekia rehefa sitrana izy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ny teny nosoratan’i Hezekia, mpanjakan’ny Joda, raha narary izy ka sitrana tamin’ny aretiny:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Hoy aho:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Amin’izao andro mbola iadanako izao
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'no tsy maintsy idirako amin’ny vavahadin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: fitoeran’ny maty
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nesorina tamiko ny androko sisa!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Hoy aho: Tsy mba hahita NY TOMPO intsony aho;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, tsy mba hahita NY TOMPO ao amin’ny tanin’ny velona intsony aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy mba hahita olona intsony aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ho isan’ny mponina any amin’ny fitoeran’ny maty.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Nesorina ny fonenako
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka nafindra tsy ho amiko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tahaka ny tranolain’ny mpiandry ondry;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ahoroko tahaka ny tenona ny androko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa efa hotapahiny ho afaka amin’ny kofehy mihazona azy izy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Indray andro monja no anaperanao ny aiko!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Nampangina ny foko aho mandra-paharain’ny andro;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tahaka ny fanapatapaky ny liona taolana no anapatapahany ny taolako rehetra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: indray andro monja no anaperanao ny aiko!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Mikoraraika tahaka ny sidintsidina sy ny vano aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mitolokoloko tahaka ny voromailala.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Reraka miandrandra ny avo ny masoko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: TOMPO ô, ory loatra aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: aoka hiantoka ahy Ianao!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Inona no holazaiko? Sady namaly ahy Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: no Izy ihany no nahatanteraka.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Handeha am-panetren-tena aho amin’ny taonako sisa rehetra
- type: usfm
  marker: q1
  children:
  - type: text
    text: noho ny fahoriana mangidy mahazo ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Tompo ô, ny fahatsaranao no mahavelona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary amin’izany tokoa no iainan’ny fanahiko
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka manasitrana sy mamelona ahy Ianao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Indro, tonga fiadanana ilay fahoriana mangidy dia mangidy nanjo ahy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny fitiavanao no namonjenao ny fanahiko tsy hankany amin’ny lavaka mangitsokitsoka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa narianao tao ivohonao ny fahotako rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Fa tsy mba mahasaotra Anao ny fitoeran’ny maty,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy mba mahadera Anao ny fahafatesana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary izay midina any an-davaka dia tsy mahazo manantena
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny fahamarinanao intsony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ny velona, ny velona ihany no hidera Anao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tahaka ahy izao anio izao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hampahalala ny zanany ny fahamarinanao ny ray.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: NY TOMPO efa namonjy ahy!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hitendry ny lokangako
- type: usfm
  marker: q1
  children:
  - type: text
    text: ao amin’ny tranon’NY TOMPO izahay
- type: usfm
  marker: q1
  children:
  - type: text
    text: amin’ny andro rehetra iainanay.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Dia hoy Isaia: Makà mofo aviavy ary apetaho amin’ny vay izany mba ho sitrana i Hezekia. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary hoy i Hezekia: Inona no famantarana fa hiakatra ao amin’ny tranon’NY TOMPO aho?'
