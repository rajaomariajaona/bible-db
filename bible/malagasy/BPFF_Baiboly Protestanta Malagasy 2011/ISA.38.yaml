document_id: ISA.38,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny aretina sy ny fahasitranan’i Hezekia
  - type: heading
    content: 2Mpa 20.1-11
  - type: text
    content: 'Tamin’izany andro izany dia narary saika maty i Hezekia; ary nankao aminy Isaia mpaminany, zanak’i Amoza, ka nilaza taminy hoe: Izao no lazain’NY TOMPO: Hafaro ny ankohonanao fa ho faty ianao fa tsy ho velona. '
  '10':
  - type: text
    content: 'Hoy aho:'
  - type: text
    content: Amin’izao andro mbola iadanako izao
  - type: text
    content: 'no tsy maintsy idirako amin’ny vavahadin’ny '
  - type: text
    content: fitoeran’ny maty
  - type: text
    content: .
  - type: text
    content: Nesorina tamiko ny androko sisa!
  '11':
  - type: text
    content: 'Hoy aho: Tsy mba hahita NY TOMPO intsony aho;'
  - type: text
    content: eny, tsy mba hahita NY TOMPO ao amin’ny tanin’ny velona intsony aho;
  - type: text
    content: tsy mba hahita olona intsony aho,
  - type: text
    content: fa ho isan’ny mponina any amin’ny fitoeran’ny maty.
  '12':
  - type: text
    content: Nesorina ny fonenako
  - type: text
    content: ka nafindra tsy ho amiko,
  - type: text
    content: tahaka ny tranolain’ny mpiandry ondry;
  - type: text
    content: ahoroko tahaka ny tenona ny androko,
  - type: text
    content: fa efa hotapahiny ho afaka amin’ny kofehy mihazona azy izy.
  - type: text
    content: Indray andro monja no anaperanao ny aiko!
  '13':
  - type: text
    content: Nampangina ny foko aho mandra-paharain’ny andro;
  - type: text
    content: tahaka ny fanapatapaky ny liona taolana no anapatapahany ny taolako rehetra;
  - type: text
    content: indray andro monja no anaperanao ny aiko!
  '14':
  - type: text
    content: Mikoraraika tahaka ny sidintsidina sy ny vano aho
  - type: text
    content: ary mitolokoloko tahaka ny voromailala.
  - type: text
    content: Reraka miandrandra ny avo ny masoko,
  - type: text
    content: TOMPO ô, ory loatra aho,
  - type: text
    content: aoka hiantoka ahy Ianao!
  '15':
  - type: text
    content: Inona no holazaiko? Sady namaly ahy Izy
  - type: text
    content: no Izy ihany no nahatanteraka.
  - type: text
    content: Handeha am-panetren-tena aho amin’ny taonako sisa rehetra
  - type: text
    content: noho ny fahoriana mangidy mahazo ahy.
  '16':
  - type: text
    content: Tompo ô, ny fahatsaranao no mahavelona,
  - type: text
    content: ary amin’izany tokoa no iainan’ny fanahiko
  - type: text
    content: ka manasitrana sy mamelona ahy Ianao.
  '17':
  - type: text
    content: Indro, tonga fiadanana ilay fahoriana mangidy dia mangidy nanjo ahy.
  - type: text
    content: Ny fitiavanao no namonjenao ny fanahiko tsy hankany amin’ny lavaka mangitsokitsoka,
  - type: text
    content: fa narianao tao ivohonao ny fahotako rehetra.
  '18':
  - type: text
    content: Fa tsy mba mahasaotra Anao ny fitoeran’ny maty,
  - type: text
    content: tsy mba mahadera Anao ny fahafatesana;
  - type: text
    content: ary izay midina any an-davaka dia tsy mahazo manantena
  - type: text
    content: ny fahamarinanao intsony.
  '19':
  - type: text
    content: Ny velona, ny velona ihany no hidera Anao,
  - type: text
    content: tahaka ahy izao anio izao;
  - type: text
    content: hampahalala ny zanany ny fahamarinanao ny ray.
  '2':
  - type: text
    content: 'Dia nitodika nankany amin’ny rindrina i Hezekia ka nivavaka tamin’NY TOMPO. '
  '20':
  - type: text
    content: NY TOMPO efa namonjy ahy!
  - type: text
    content: Hitendry ny lokangako
  - type: text
    content: ao amin’ny tranon’NY TOMPO izahay
  - type: text
    content: amin’ny andro rehetra iainanay.
  '21':
  - type: text
    content: 'Dia hoy Isaia: Makà mofo aviavy ary apetaho amin’ny vay izany mba ho sitrana i Hezekia. '
  '22':
  - type: text
    content: 'Ary hoy i Hezekia: Inona no famantarana fa hiakatra ao amin’ny tranon’NY TOMPO aho?'
  '3':
  - type: text
    content: 'Hoy izy: TOMPO ô, enga anie ka hotsarovanao ny nandehanako teo anatrehanao tamin’ny fahamarinana sy tamin’ny foko manontolo ary ny nanaovako izay tsara teo imasonao! Dia nitomany mafy indrindra izy.'
  '4':
  - type: text
    content: 'Dia tonga tamin’Isaia ny tenin’NY TOMPO hoe: '
  '5':
  - type: text
    content: 'Mandehana lazao amin’i Hezekia hoe: Izao no lazain’NY TOMPO, Andriamanitr’i Davida rainao: Efa reko ny fitarainanao ary efa hitako ny ranomasonao. Indro, hampiako dimy amby folo taona ny andronao. '
  '6':
  - type: text
    content: 'Hamonjy anao sy ity tanàna ity amin’ny tanan’ny mpanjakan’i Asiria Aho; hiaro ity tanàna ity Aho. '
  '7':
  - type: text
    content: 'Ary izao no ho famantarana ho anao avy amin’NY TOMPO, hahalalanao fa NY TOMPO hanatanteraka izay zavatra nolazainy: '
  '8':
  - type: text
    content: Indro, hampivereniko ambaratonga folo miaraka amin’ny masoandro ny aloka eo amin’ny famantaranandro aloka an’i Ahaza, eo amin’ilay efa nidinany iny. Dia niverina tokoa ny masoandro teo amin’ny ambaratonga folo izay efa nidinan’ny aloka.
  - type: heading
    content: Ny vavaka nataon’i Hezekia rehefa sitrana izy
  '9':
  - type: text
    content: 'Ny teny nosoratan’i Hezekia, mpanjakan’ny Joda, raha narary izy ka sitrana tamin’ny aretiny:'
