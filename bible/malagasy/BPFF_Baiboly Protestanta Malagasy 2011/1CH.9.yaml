document_id: 1CH.9
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fitanisana ny mponina tao Jerosalema
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Neh 11.3-19
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Nalaina isa araka ny firazanany avy ny Israely rehetra; ary indro, efa voasoratra ao amin’ny bokin’ny mpanjakan’ny Israely izany. Ny Joda dia noentina ho babo tany Babilona noho ny fahotany. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ny mponina voalohany tamin’ny taniny sy ny tanànany avy dia ny Israelita sy ny mpisorona ary ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: levita
  - type: text
    text: ' sy ny Netinima.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Tany Jerosalema no nonenan’ny sasany avy amin’ny taranak’i Joda, ny sasany avy amin’ny taranak’i Benjamina, ny sasany avy amin’ny taranak’i Efraima ary ny sasany avy amin’ny taranak’i Manase, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'dia i Otahy, zanak’i Amihoda, zanak’i Omry, zanak’Imry, zanak’i Bany, avy amin’ny taranak’i Fareza, zanak’i Joda. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Tamin’ny Silonita dia i Asaia, lahimatoa, sy ny zanany. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Tamin’ny taranak’i Zera dia i Jeoela sy ny rahalahiny, sivifolo sy eninjato. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Tamin’ny taranak’i Benjamina dia i Salo, zanak’i Mesolama, zanak’i Hodavia, zanak’i Hasenoa; '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'i Jibnia, zanak’i Jerohama; i Elaha, zanak’i Ozy, zanak’i Mikry; i Mesolama, zanak’i Sefatia, zanak’i Regoela, zanak’i Jibnia; '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ary ny isan’ny rahalahiny araka ny firazanany dia enina amby dimampolo sy sivinjato. Ireo lehilahy rehetra ireo dia samy loham-pianakaviany avy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Tamin’ny mpisorona dia i Jedaia, i Jehoiariba, i Jakina, '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'i Azaria, zanak’i Hilkia, zanak’i Mesolama, zanak’i Zadoka, zanak’i Meraiota, zanak’i Ahitoba, mpanapaka ny tranon’Andriamanitra; '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'i Adaia, zanak’i Jerohama, zanak’i Pasora, zanak’i Malkia ary i Masay, zanak’i Adiela, zanak’i Jazera, zanak’i Mesolama, zanak’i Mesilemita, zanak’Imera. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ny rahalahin’ireo, izay samy loham-pianakaviany avy, dia enimpolo sy fitonjato sy arivo; lehilahy mahery amin’ny fanaovana ny fanompoana ao amin’ny tranon’Andriamanitra ireo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Tamin’ny levita dia i Semaia, zanak’i Hasoba, zanak’i Azrikama, zanak’i Hasabia, tamin’ny taranak’i Merary; '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'i Bakbakara, i Haresy, i Galala ary Matania, zanak’i Mika, zanak’i Zikry, zanak’i Asafa; '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: i Obadia, zanak’i Semaia, zanak’i Galala, zanak’i Jedotona ary i Berekia, zanak’i Asa, zanak’i Elkana, izay nonina tamin’ny vohitry ny Netofatita.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ny mpiandry varavarana dia i Saloma, i Akoba, i Talmona, i Ahimana ary ny rahalahiny, fa i Saloma no lohany; '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'ambaraka ankehitriny dia ao amin’ny vavahadin’ny mpanjaka ao atsinanana izy. Ireo no mpiandry varavarana tamin’ny tobin’ny taranak’i Levy. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'I Saloma, zanak’i Kore, zanak’i Abiasafa, zanak’i Kora, sy ny Koraìta rahalahiny araka ny fianakaviany avy no mpanao ny fanompoana amin’ny fiandrasana ny varavaran’ny tranolay; ny razany koa dia mpiambina ny vavahady tao amin’ny tobin’NY TOMPO. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'I Finehasa, zanak’i Eleazara, no mpanapaka ireo taloha, ary NY TOMPO nomba azy. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'I Zakaria, zanak’i Meselemia, no mpiandry ny varavaran’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tranolay fihaonana
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ny isan’ireo voafidy ho mpiandry varavarana ireo dia roa amby folo sy roanjato. Ireo dia voasoratra araka ny firazanany tany amin’ny vohiny avy; notendren’i Davida sy i Samoela mpahita izy noho ny fahatokiany. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ireo sy ny taranany no niandry varavarana tao amin’ny tranon’NY TOMPO, dia ny tranolay. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Teo amin’ny lafiny efatra no nitoeran’ny mpiandry varavarana, dia teo atsinanana sy andrefana sy avaratra ary atsimo. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ny rahalahiny izay nonina teo amin’ny vohiny dia nasaina ho avy isan-kafitoana ho eo aminy. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Fa niasa tamin’ny fahatokiany ireo levita efa-dahy, lehiben’ny mpiandry varavarana, ireo; ary tonian’ireo efitrano sy ny efitrano fitahirizana ao amin’ny tranon’Andriamanitra koa izy ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Ary eo amin’ny manodidina ny tranon’Andriamanitra no nandriany; fa izy ireo no mpiambina azy sady adidiny ny famohana ny trano isa-maraina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Nitandrina ny fanaka momba ny fanompoana ny sasany aminy ka nanisa azy ireny isaky ny mitondra azy miditra sy mivoaka. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ny sasany aminy indray dia notendrena hitandrina ny fanaka, dia ny fanaka masina rehetra, ny koba tsara toto, ny divay, ny diloilo, ny ditin-kazo manitra ary ny zavamanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ny sasany tamin’ny zanaky ny mpisorona no nanao haro manitra ho fanosorana. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ary i Matatia, iray tamin’ny levita, lahimatoan’i Saloma koraìta, no tonia maharitra amin’ny fanendasana ny mofo atao fanatitra. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Ny sasany tamin’ny rahalahiny, tamin’ny taranaky ny Kehatita, no tonian’ny mofo atao fanatitra ka mamboatra azy isan-tSabata.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ireo ihany koa no mpihira, ireo lohan’ny fianakaviana amin’ny levita ireo. Mitoetra any amin’ny efitrano ao amin’ny tempoly izy ireo ary tsy misahana raharaha hafa; fa tsy maintsy ho amin’izany raharaha izany andro aman’alina. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Ireo dia lohan’ny fianakaviana tamin’ny levita araka ny firazanany avy, dia samy loholona. Ireo no nonina tany Jerosalema.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny amin’ny fianakavian’i Saoly
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Tao Gibeona no nonenan’i Jeiela, rain’i Gibeona, ary ny anaran’ny vadiny dia Maka. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Ny zanany lahimatoa dia i Abdona, nanaraka azy i Zora, i Kisy, i Baala, i Nera, i Nadaba, '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'i Gedora, i Ahio, i Zakaria ary i Miklota. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'I Miklota no niteraka an’i Simeama. Ireo koa dia niara-nonina tamin’ny rahalahiny tany Jerosalema nifanandrify fonenana taminy. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'I Nera no niteraka an’i Kisy; i Kisy no niteraka an’i Saoly; i Saoly no niteraka an’i Jonatana, i Malky-Soa, i Abinadaba ary i Esbala. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Ny zanakalahin’i Jonatana dia i Meribaala; i Meribaala no niteraka an’i Mika. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Ny zanakalahin’i Mika dia i Pitona, i Meleka, i Tarea ary i Ahaza. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'I Ahaza no niteraka an’i Jara; i Jara no niteraka an’i Alemeta sy i Azmaveta ary i Zimry; i Zimry no niteraka an’i Moza; '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'i Moza no niteraka an’i Binea. I Refaia no zanakalahin’i Binea; i Elasa no zanakalahin’i Refaia, i Azela no zanakalahin’i Elasa. '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Nanana zanaka enina mirahalahy i Azela ka izao avy no anarany: I Azrikama, i Bokero, Ismaela, i Searia, i Obadia ary i Hanana; ireo no zanakalahin’i Azela.'
