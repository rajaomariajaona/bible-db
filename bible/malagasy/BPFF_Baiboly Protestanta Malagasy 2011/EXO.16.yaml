document_id: EXO.16,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny mana sy ny papelika
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Ary tamin’ny andro fahadimy amby folo tamin’ny volana faharoa taorianan’ny nialany tany amin’ny tany Ejipta dia nifindra niala tao Elima ny fiangonan’ny Zanak’Israely manontolo ka nankany amin’ny tany efitra Sina izay eo anelanelan’i Elima sy i Sinay.
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Ary raha mbola niteny tamin’ny fiangonan’ny Israely manontolo i Arona dia nitodika nanatrika ny tany efitra izy ireo ka indro, ny voninahitry NY TOMPO niseho teo amin’ny rahona.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ary NY TOMPO niteny tamin’i Mosesy hoe: '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Efa reko ny fimonomononan’ny Zanak’Israely, koa mitenena aminy hoe: Hihinan-kena ianareo anio hariva milenti-masoandro ary rahampitso maraina kosa dia ho voky mofo, dia ho fantatrareo fa Izaho no TOMPO Andriamanitrareo.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Nony hariva, niakatra ny papelika ka rakotra azy ny toby; nony maraina, nisy ando matevina nanodidina ny toby. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Nony niala ny ando matevina dia indro, nisy zava-madinika boribory teny amin’ny tany efitra, madinika toy ny fanala amin’ny tany. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Rehefa hitan’ny Zanak’Israely izany dia nifanontany izy hoe: Inona itony?'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Inona itony? '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: Heb. Mana. Izany no niavian’ny teny hoe Mana izay ilazana ilay sakafo nomen’ny TOMPO tany an-tany efitra.
      marker-yv: yv-n
    - type: text
      text: ' Satria tsy fantany hoe inona ireny.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy i Mosesy taminy: Itony no mofo izay nomen’NY TOMPO ho fihinanareo. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Ary izao no teny izay nampilazain’NY TOMPO: Samia manangona amin’ireo ianareo araka izay tokony ho laninareo avy, dia eran’ny vata omera avy isan’olona, araka ny isanareo; samia ianareo mitondra ho an’izay ao an-dainy avy. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Dia nanatanteraka izany ny Zanak’Israely ka samy nanangona; ny sasany dia nanangona be, ny sasany kosa dia kely. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Rehefa nafatrany tamin’ny vata omera ireo dia tsy nanana amby ny nanangona be ary ny nanangona kely dia tsy nanana ny tsy ampy. Samy nanangona araka izay sahaza azy avy izy ireo.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fitsipika samihafa momba ny mana
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Hoy koa i Mosesy tamin’izy ireo: Aza misy mamela sisa ho tra-maraina. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Dia nimonomonona tamin’i Mosesy sy i Arona tany an-tany efitra ny fiangonan’ny Zanak’Israely manontolo '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Kanefa tsy mba nanaraka ny tenin’i Mosesy izy fa namela sisa ho tra-maraina ihany ny olona sasany, dia niteraka olitra izany ka maimbo. Dia tezitra tamin’ny olona i Mosesy.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Nanangona ny mana isa-maraina ny olona, samy araka izay sahaza azy avy; ary nony nafana ny andro dia levona ireny. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Nony tamin’ny andro fahenina dia nanangona avo sasaka noho ny isanandro ny olona, dia indroan’ny vata omera isan’olona avy; dia avy ireo lohan’ny fiangonana rehetra ka nanambara izany tamin’i Mosesy. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Hoy i Mosesy tamin’ireo: Izao no lazain’NY TOMPO: Tena andro fitsaharana masina ho an’NY TOMPO rahampitso; koa manendasa izay hendasinareo ary mahandroa izay hahandroinareo, nefa izay sisa rehetra dia avelao hotahirizina ho tra-maraina.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Dia namela izany ho tra-maraina izy araka izay nandidian’i Mosesy nefa tsy mba maimbo na niteraka olitra. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Hoy indray i Mosesy: Hano ireny anio fa Sabata ho an’NY TOMPO anio; tsy hahita ireny any an-tsaha ianareo anio. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Henemana no hanangonanareo azy; fa Sabata ny andro fahafito ka tsy hisy amin’io andro io.
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Nony tamin’ny andro fahafito, nisy ihany olona nandeha hanangona nefa tsy nahita na dia kely aza. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Dia hoy NY TOMPO tamin’i Mosesy: Mandra-pahoviana no handavanareo tsy hitandrina ny didiko sy ny lalànako? '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Hevero fa NY TOMPO no nanome anareo ny Sabata, koa izany no anomezany anareo mofo ampy ny indroa andro amin’ny andro fahenina. Samia mitoetra eo amin’ny fitoerany avy ianareo ka aoka tsy hisy hiala amin’ny fitoerany amin’ny andro fahafito. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'ka hoy izy ireo: Inay anie izahay mba matin’ny tanan’NY TOMPO tany amin’ny tany Ejipta, raha nipetraka teo anilan’ny vilany fahandroan-kena mba nihinan-kanina ka voky! Fa nitondra anay nivoaka ho atỳ amin’ity tany efitra ity ianareo hahafaty mosary izao fiangonana manontolo izao.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Dia nitsahatra ny olona tamin’ny andro fahafito.
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Nantsoin’ny taranak’Israely hoe Mana io zavatra io; ary tahaka ny voan’ny koriandira izy nefa fotsy; ary ny tsirony dia tahaka ny mofo misy tantely.
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Ary hoy i Mosesy: Izao zavatra izao no nandidian’NY TOMPO: Mamenoa vata omera iray mba hotahirizina hatramin’ny taranakareo fara aman-dimby, mba ho hitany ny mofo izay nampihinaniko anareo tany an-tany efitra, raha nitondra anareo nivoaka avy tany amin’ny tany Ejipta Aho. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Hoy koa i Mosesy tamin’i Arona: Makà siny iray ka asio mana eran’ny vata omera ao anatiny dia apetraho eo anatrehan’NY TOMPO izany mba hotahirizina hatramin’ny taranakareo fara aman-dimby. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: Araka izay nandidian’NY TOMPO an’i Mosesy no nametrahan’i Arona izany teo anatrehan’ny Vavolombelona mba hotahirizina.
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Ary nihinana mana nandritra ny efapolo taona ny Zanak’Israely mandra-pahatongany tany amin’izay tany misy mponina. Eny, mana no nohaniny mandra-pahatongany tany amin’ny sisin’ny tany Kanana. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Ny omera dia ampahafolon’ny vata '
    - type: usfm
      marker: w
      children:
      - type: text
        text: efaha
    - type: text
      text: .
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Dia hoy NY TOMPO tamin’i Mosesy: Indro Aho handatsaka mofo avy any an-danitra ho anareo. Dia ho avy ny olona ka hanangona izay sahaza hohaniny isanandro mba hizahako toetra azy, na handeha hanaraka ny lalànako izy na tsia. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Ary amin’ny andro fahenina, raha manamboatra izay azony izy, dia hisy indroa toraka izay angoniny isanandro amin’io.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Dia hoy i Mosesy sy i Arona tamin’ny Zanak’Israely rehetra: Anio hariva dia ho fantatrareo fa NY TOMPO no nitondra anareo nivoaka avy tany amin’ny tany Ejipta; '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'ho hitanareo koa ny voninahitry NY TOMPO rahampitso maraina, fa efa reny ny fimonomononanareo tamin’NY TOMPO; fa izahay moa no inona no imonomononanareo? '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Hoy koa i Mosesy: Ho hitanareo, rehefa homen’NY TOMPO hena hohanina ianareo anio hariva, ary mofo hahavoky rahampitso maraina, fa efa ren’NY TOMPO ny fimonomononanareo, izay nimonomononanareo taminy; fa izahay moa no inona? Tsy izahay no imonomononanareo fa NY TOMPO.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ary hoy i Mosesy tamin’i Arona: Lazao amin’ny fiangonan’ny Israely manontolo hoe: Manatòna eo anatrehan’NY TOMPO; fa efa reny ny fimonomononanareo. '
