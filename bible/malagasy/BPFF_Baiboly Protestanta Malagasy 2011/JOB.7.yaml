document_id: JOB.7,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: 'Tohin’ny teny navalin’i Joba: Mitaraina ny amin’ny ataon’Andriamanitra izy'
  - type: text
    content: Tsy mpiantafika va ny zanak’olombelona etỳ ambonin’ny tany?
  - type: text
    content: Ary tsy tahaka ny andron’ny mpikarama va ny androny?
  '10':
  - type: text
    content: tsy hiverina any an-tranony intsony izy
  - type: text
    content: ary tsy hahalala azy intsony ny fonenany.
  '11':
  - type: text
    content: Ary izaho dia tsy hamehy vava
  - type: text
    content: fa hiteny noho ny fahorian’ny fanahiko
  - type: text
    content: sy hitaraina noho ny fangidian’ny foko.
  '12':
  - type: text
    content: Ranomasina va aho sa trozona
  - type: text
    content: no dia asianao fiambenana?
  '13':
  - type: text
    content: 'Raha hoy aho: Hampionona ahy ny farafarako,'
  - type: text
    content: hampitony ny fitarainako ny fandrianako,
  '14':
  - type: text
    content: dia mampitahotra ahy amin’ny nofy Ianao
  - type: text
    content: ary mampihorohoro ahy amin’ny fahitana.
  '15':
  - type: text
    content: Koa aleoko hokendaina;
  - type: text
    content: eny, aleoko ny fahafatesana aza toy izay izao taolako mitrakitraky izao!
  '16':
  - type: text
    content: Maharikoriko ahy izao! Tsy ho ela velona aho!
  - type: text
    content: Avelao amin’izao aho fa fofona foana ny androko.
  '17':
  - type: text
    content: Inona moa ny zanak’olombelona
  - type: text
    content: no isahirananao
  - type: text
    content: ka ikarakaranao azy fatratra?
  '18':
  - type: text
    content: Sady vangianao isa-maraina izy
  - type: text
    content: no zahanao toetra isaky ny indray mipy maso?
  '19':
  - type: text
    content: Oviana re no hihodina tsy hijery ahy Ianao
  - type: text
    content: ka hiala amiko mba hahazoako mitelin-drora?
  '2':
  - type: text
    content: Toy ny mpanompo maniry alokaloka
  - type: text
    content: ary toy ny mpikarama miandry ny karaman’ny asany,
  '20':
  - type: text
    content: Na dia ho nanota aza aho, nampaninona Anao moa izany, ry Mpandinika ny olombelona?
  - type: text
    content: Nahoana no dia nataonao fikendry aho
  - type: text
    content: ka tonga enta-mavesatra amiko ny tenako?
  '21':
  - type: text
    content: Nahoana no tsy mamela ny fahadisoako sy manaisotra ny heloko Ianao?
  - type: text
    content: Fa izao dia efa handry any amin’ny vovoka aho;
  - type: text
    content: hitady ahy fatratra Ianao nefa tsy hisy intsony aho.
  '3':
  - type: text
    content: dia toy izany no nanaovana ny volana mampahory ho lovako
  - type: text
    content: ary ny alina mahadisadisa ho anjarako.
  '4':
  - type: text
    content: 'Raha vao mandry aho dia mieritreritra hoe:'
  - type: text
    content: Rahoviana re aho no hifoha?
  - type: text
    content: Fa mihalava ny alina
  - type: text
    content: ary tsy mitsahatra mivadibadika aho mandra-pahazava ny andro.
  '5':
  - type: text
    content: Ny nofoko dia mitafy olitra sy takompery toy ny baingan-tany;
  - type: text
    content: tonga vakivaky ny hoditro sady mitsiranorano.
  '6':
  - type: text
    content: Faingana noho ny famahanan-tenona ny androko
  - type: text
    content: ka lany tsy misy fanantenana!
  '7':
  - type: text
    content: Tsarovy fa tso-drivotra ny aiko!
  - type: text
    content: Tsy hahita soa intsony ny masoko.
  '8':
  - type: text
    content: Tsy hahita ahy intsony ny mason’izay mijery ahy.
  - type: text
    content: Hizaha ahy ny masonao nefa tsy ho eo aho.
  '9':
  - type: text
    content: Tahaka ny rahona misava ka levona,
  - type: text
    content: 'dia tahaka izany koa, izay midina any amin’ny '
  - type: text
    content: fitoeran’ny maty
  - type: text
    content: ', dia tsy mba hiakatra intsony;'
