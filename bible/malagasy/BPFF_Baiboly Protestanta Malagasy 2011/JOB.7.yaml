document_id: JOB.7,3103
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Tohin’ny teny navalin’i Joba: Mitaraina ny amin’ny ataon’Andriamanitra izy'
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy mpiantafika va ny zanak’olombelona etỳ ambonin’ny tany?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tsy tahaka ny andron’ny mpikarama va ny androny?
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy hiverina any an-tranony intsony izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy hahalala azy intsony ny fonenany.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary izaho dia tsy hamehy vava
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa hiteny noho ny fahorian’ny fanahiko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy hitaraina noho ny fangidian’ny foko.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ranomasina va aho sa trozona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no dia asianao fiambenana?
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Raha hoy aho: Hampionona ahy ny farafarako,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hampitony ny fitarainako ny fandrianako,
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia mampitahotra ahy amin’ny nofy Ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mampihorohoro ahy amin’ny fahitana.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa aleoko hokendaina;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, aleoko ny fahafatesana aza toy izay izao taolako mitrakitraky izao!
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Maharikoriko ahy izao! Tsy ho ela velona aho!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avelao amin’izao aho fa fofona foana ny androko.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Inona moa ny zanak’olombelona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no isahirananao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka ikarakaranao azy fatratra?
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady vangianao isa-maraina izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no zahanao toetra isaky ny indray mipy maso?
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oviana re no hihodina tsy hijery ahy Ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hiala amiko mba hahazoako mitelin-drora?
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toy ny mpanompo maniry alokaloka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary toy ny mpikarama miandry ny karaman’ny asany,
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na dia ho nanota aza aho, nampaninona Anao moa izany, ry Mpandinika ny olombelona?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nahoana no dia nataonao fikendry aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tonga enta-mavesatra amiko ny tenako?
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nahoana no tsy mamela ny fahadisoako sy manaisotra ny heloko Ianao?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa izao dia efa handry any amin’ny vovoka aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hitady ahy fatratra Ianao nefa tsy hisy intsony aho.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia toy izany no nanaovana ny volana mampahory ho lovako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny alina mahadisadisa ho anjarako.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Raha vao mandry aho dia mieritreritra hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rahoviana re aho no hifoha?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa mihalava ny alina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy mitsahatra mivadibadika aho mandra-pahazava ny andro.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny nofoko dia mitafy olitra sy takompery toy ny baingan-tany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tonga vakivaky ny hoditro sady mitsiranorano.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Faingana noho ny famahanan-tenona ny androko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka lany tsy misy fanantenana!
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsarovy fa tso-drivotra ny aiko!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy hahita soa intsony ny masoko.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy hahita ahy intsony ny mason’izay mijery ahy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hizaha ahy ny masonao nefa tsy ho eo aho.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tahaka ny rahona misava ka levona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'dia tahaka izany koa, izay midina any amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: fitoeran’ny maty
    - type: text
      text: ', dia tsy mba hiakatra intsony;'
