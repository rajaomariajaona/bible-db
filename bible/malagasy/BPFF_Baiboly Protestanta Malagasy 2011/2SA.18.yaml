document_id: 2SA.18
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny faharesen’ny tafik’i Absaloma
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Nandamina ny olona izay nomba azy i Davida ka nanendry mpifehy arivo sy mpifehy zato hitarika azy. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary nampandeha ny olona i Davida, koa ny ampahatelony dia nofehezin’i Joaba, ny ampahatelony dia nofehezin’i Abisay, zanak’i Zeroia, rahalahin’i Joaba, ary ny ampahatelony sisa kosa dia nofehezin’Itahy gatita. Ary hoy ny mpanjaka tamin’ny vahoaka: Izaho koa dia tsy maintsy handeha hiaraka aminareo. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Fa hoy ny vahoaka: Tsy avelanay handeha ianao! Fa raha mandositra izahay dia tsy hahoany; ary na matiny sasaka aza izahay dia tsy hahoany akory; fa ianao no tahaka ny iray alina aminay; koa tsara raha avy ao an-tanàna ianao no mamonjy anay. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Hoy ny mpanjaka taminy: Izay sitrakareo ary no hataoko. Dia nitsangana teo anilan’ny vavahady ny mpanjaka, ary ny vahoaka rehetra dia niainga hiady, isan-jato sy isan’arivo. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary nandidy an’i Joaba sy Abisay ary Itahy ny mpanjaka hoe: Noho ny amiko dia mamindrà fo amin’i Absaloma zatovo! Ny olona rehetra koa dia nahare ny nandidian’ny mpanjaka ny mpifehy rehetra ny amin’i Absaloma.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia nandeha teny an-tsaha ny vahoaka hiady amin’ny Israely ka rafitra tao amin’ny alan’i Efraima ny ady. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Resy teo anoloan’ny mpanompon’i Davida tao ny lehilahin’ny Israely ka be dia be no ringana androtr’izay: Olona roa alina. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Fa nihahakahaka teny rehetra teny ny ady; koa ny maty tao anaty ala tamin’io andro io dia be noho ny matin’ny sabatra.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny namonoan’i Joaba an’i Absaloma
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Nifanehatra tamin’ny mpanompon’i Davida i Absaloma. Nitaingina ampondra izy ary nandeha teo ambanin’ny rantsan-kazo mikirindro tamin’ny hazo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: terebinta
  - type: text
    text: ' ny ampondra. Voahazon’ny hazo terebinta ny lohan’i Absaloma ka nikiraviravy teo anelanelan’ny lanitra sy ny tany izy, satria lasa ny ampondra nitaingenany. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Nisy lehilahy iray nahita izany ka nanambara tamin’i Joaba hoe: Indro, hitako mihantona amin’ny hazo terebinta i Absaloma. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary hoy i Joaba tamin’ilay lehilahy nilaza taminy: Koa nahoana, raha nahita azy ianao, no tsy nasianao izy hianjera amin’ny tany? Tsy maintsy ho nomeko sekela volafotsy folo sy fehikibo ianao raha nanao izany. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Fa hoy Ralehilahy tamin’i Joaba: Na dia efa tonga eo an-tanako aza ny sekela volafotsy arivo dia tsy hanainga ny tanako hamely ny zanaky ny mpanjaka aho; fa teo anatrehanay no nandidian’ny mpanjaka anao sy i Abisay ary Itahy hoe: Samia mitandrina an’i Absaloma zatovo. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Koa raha nanao zavatra am-pitaka taminy hahavery ny aiko aza aho dia tsy misy zavatra azo afenina amin’ny mpanjaka; ary na ianao io aza dia ho nihatakataka tamiko. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dia hoy i Joaba: Tsy handany andro foana eto aminao aho. Ary nitondra lefona telo teny an-tanany izy ka natsatony tamin’ny fon’i Absaloma, tamin’izy mbola velona teo amin’ny hazo terebinta iny. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Nisy koa zatovo folo, mpitondra ny fiadian’i Joaba, nanodidina an’i Absaloma ka namely azy ho faty.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Dia nitsoka ny anjomara i Joaba ka nitsahatra tsy nanenjika ny Israely intsony ny vahoaka, satria nandrara azy ireo i Joaba. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Dia nalain’ny olona i Absaloma ka natsipiny tao an-davaka lehibe iray tao anaty ala; dia nasiany antontam-bato lehibe teo amboniny; ary samy nandositra ho any amin’ny tranolainy avy ny Israely rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Fony mbola velona i Absaloma dia efa naka vato izy ka nanao ilay tsangambato ho an’ny tenany tao an-dohasahan’ny mpanjaka, satria hoy izy: Tsy manan-janakalahy hamelo-maso ahy aho; dia nataony araka ny anaran’ny tenany ihany ilay tsangambato, koa ny anarany dia mbola antsoina hoe Fahatsiarovana an’i Absaloma mandraka androany.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nandrenesan’i Davida ny nahafatesan’i Absaloma
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Dia hoy i Ahimaza, zanak’i Zadoka: Aleo aho hihazakazaka hitondra teny mahafaly ho any amin’ny mpanjaka ny amin’ny nanomezan’NY TOMPO azy ny rariny ka nahafahany tamin’ny fahavalony. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Fa hoy i Joaba taminy: Tsy ho mpitondra teny mahafaly ianao raha mandeha anio satria maty ny zanakalahin’ny mpanjaka, fa amin’ny andro hafa dia mbola hitondra teny mahafaly ihany ianao. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary hoy i Joaba tamin’ity Kosita iray: Andeha, ambarao amin’ny mpanjaka izay efa hitanao. Ary niankohoka teo anatrehan’i Joaba ilay Kosita dia lasa nihazakazaka. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Fa mbola niteny tamin’i Joaba ihany i Ahimaza, zanak’i Zadoka hoe: Na inona na inona hitranga, aoka ihany aho mba hiezaka koa hanaraka ilay Kosita. Fa hoy i Joaba: Ahoana no hiezahanao, anaka; fa na dia mandeha aza ianao dia tsy hisy teny mahafaly hahazoanao fitia tsinona? '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Na inona na inona hitranga, hoy izy, aoka ihany aho hiezaka. Dia hoy i Joaba taminy: Miezaha ary. Ary niezaka tamin’ny lalana eny amin’ny lemaka i Ahimaza ka nihoatra an’ilay Kosita.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Nipetraka teo anelanelan’ny vavahady roa i Davida; ary niakatra teo ambony vavahady teo amin’ny manda ny mpitily ka nanopy ny masony dia nahita fa indrỳ misy lehilahy iray mihazakazaka. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Dia niantso ny mpitily ka nilaza tamin’ny mpanjaka. Hoy ny mpanjaka: Raha irery izy dia ho teny mahafaly no entiny. Mbola nihananatona ihany Ralehilahy. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Nahita lehilahy iray nihazakazaka koa ny mpitily ka niantso ny mpiandry vavahady hoe: Indrỳ koa misy lehilahy iray tamy mihazakazaka. Dia hoy ny mpanjaka: Mitondra teny mahafaly ihany koa izy. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ary hoy ny mpitily: Raha ny fahitako azy dia tahaka ny fihazakazak’i Ahimaza, zanak’i Zadoka, no fihazakazak’ilay aloha. Hoy ny mpanjaka: Lehilahy tsara fanahy iny, ka hitondra teny soa mahafaly no iaviany. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ary niantso i Ahimaza ka niteny tamin’ny mpanjaka hoe: Fiadanana! Sady niankohoka tamin’ny tany teo anatrehan’ny mpanjaka izy no niteny hoe: Isaorana anie NY TOMPO Andriamanitrao, izay efa nanolotra ilay olona nanainga tanana hikomy amin’ny mpanjaka tompoko. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Dia hoy ny mpanjaka: Tsara ihany va i Absaloma zatovo? Fa hoy i Ahimaza: Tamin’ny nanirahan’i Joaba ny mpanompon’ny mpanjaka sy izaho mpanomponao koa dia nandre tabataba be aho, nefa tsy fantatro izay antony. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ary hoy ny mpanjaka taminy: Mihataha kely ary ka mijoroa etsy. Dia nihataka izy ka nijoro teo. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Dia indro, avy ilay Kosita ka niteny hoe: Aoka ny mpanjaka tompoko hihaino teny mahafaly! Fa efa nanome anao ny rariny NY TOMPO ka nahafaka anao ankehitriny tamin’izay rehetra nitsangana hikomy aminao. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Ary hoy ny mpanjaka tamin’ilay Kosita: Tsara ihany va i Absaloma zatovo? Fa hoy ilay Kosita: Aoka ny fahavalon’ny mpanjaka tompoko sy izay rehetra mitsangana hanisy ratsy anao ho tahaka iny zatovo iny.'
