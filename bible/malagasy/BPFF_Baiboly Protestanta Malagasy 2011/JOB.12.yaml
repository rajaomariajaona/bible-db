document_id: JOB.12
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Ny teny navalin’i Joba: Olon-dozabe ianao'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Dia namaly i Joba hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Marina ary fa ianareo ihany tokoa no olombelona
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hiara-maty aminareo ny fahendrena!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Kanefa izaho dia mba manan-tsaina tahaka anareo ihany koa;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy latsaka noho ianareo aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa iza moa no tsy nahalala izay zavatra toy izany?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Tonga fihomehezan’ny sakaizako aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia izaho izay niantso an’Andriamanitra ka novaliny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, tonga fihomehezana ny olona marina tsy manan-tsiny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Latsa no anjaran’ny ozoim-pahoriana! Izany no hevitry ny olo-miadana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, efa vonona ho an’izay mangozohozo izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Mandry fehizay ny tranolain’ny mpitohatoha
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mitoetra tsy manahy izay sahy mampahatezitra an’Andriamanitra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, izay mihazona an’Andriamaniny eo an-tanany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Kanefa anontanio ange ny biby fa hampianatra anao izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny voromanidina fa hanambara aminao izy;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: makà saina amin’ny tany dia hampianatra anao izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny hazandrano any an-dranomasina no hampahafantatra anao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Iza no tsy mahalala raha mandinika ireny rehetra ireny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny nanao izany dia ny tanan’NY TOMPO
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: izay mitana ny ain’ny zavamananaina rehetra
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny fofonain’ny olombelona rehetra?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Moa tsy ny sofina va no mamantatra ny teny?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tsy ny vava va no manandrana ny hanina?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ao amin’ny fotsy volo ny fahendrena
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny fahelavelona no ahazoam-pahalalana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ao amin’Andriamanitra kosa no misy fahendrena sy hery.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izy no manana fanoloran-tsaina sy fahalalana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Indro, izay ravany dia tsy hatsangana intsony;
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay olona hidìny dia tsy hovohana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Indro, mihazona ny rano Izy dia ritra iny
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary alefany indray ka manimba ny tany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Izy no manana hery sy tena fahendrena;
- type: usfm
  marker: q1
  children:
  - type: text
    text: samy eo an-tanany avokoa ny voafitaka sy ny mpamitaka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Alàny voninahitra ny mpanolotsaina
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ataony very saina ny mpitsara.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Vahàny ny fanapahan’ny mpanjaka
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka sikina no ampanaoviny azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Alàny voninahitra ny mpisorona
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary azerany ny mafy orina hatry ny ela.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Koroiny ny lahatenin’ny mahay
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary esoriny ny hazavan-tsain’ny zokiolona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Mandrotsaka fandatsana amin’ny andriandahy Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mampiketraka ny fehikibon’ny matanjaka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Manala rakotra izay lalina Izy mba tsy ho maizina
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mitondra ny aloky ny fahafatesana ho eo amin’ny mazava.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Mahalehibe ny firenena Izy nefa mandringana azy koa;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mampihahaka ny firenena Izy nefa mitondra azy hody indray.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Mahavery saina ny loholona amin’ny tany Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mampirenireny azy any amin’ny tany efitra tsy misy lalana;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: mitsapatsapa amin’ny maizina tsy misy mavaza ireo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mampivembena azy tahaka ny olona mamo Izy.
