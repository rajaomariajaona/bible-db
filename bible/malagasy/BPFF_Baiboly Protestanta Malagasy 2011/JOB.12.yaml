document_id: JOB.12,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: 'Ny teny navalin’i Joba: Olon-dozabe ianao'
  - type: text
    content: 'Dia namaly i Joba hoe:'
  '10':
  - type: text
    content: izay mitana ny ain’ny zavamananaina rehetra
  - type: text
    content: sy ny fofonain’ny olombelona rehetra?
  '11':
  - type: text
    content: Moa tsy ny sofina va no mamantatra ny teny?
  - type: text
    content: Ary tsy ny vava va no manandrana ny hanina?
  '12':
  - type: text
    content: Ao amin’ny fotsy volo ny fahendrena
  - type: text
    content: ary ny fahelavelona no ahazoam-pahalalana.
  '13':
  - type: text
    content: Ao amin’Andriamanitra kosa no misy fahendrena sy hery.
  - type: text
    content: Izy no manana fanoloran-tsaina sy fahalalana.
  '14':
  - type: text
    content: Indro, izay ravany dia tsy hatsangana intsony;
  - type: text
    content: izay olona hidìny dia tsy hovohana.
  '15':
  - type: text
    content: Indro, mihazona ny rano Izy dia ritra iny
  - type: text
    content: ary alefany indray ka manimba ny tany.
  '16':
  - type: text
    content: Izy no manana hery sy tena fahendrena;
  - type: text
    content: samy eo an-tanany avokoa ny voafitaka sy ny mpamitaka.
  '17':
  - type: text
    content: Alàny voninahitra ny mpanolotsaina
  - type: text
    content: ary ataony very saina ny mpitsara.
  '18':
  - type: text
    content: Vahàny ny fanapahan’ny mpanjaka
  - type: text
    content: ka sikina no ampanaoviny azy.
  '19':
  - type: text
    content: Alàny voninahitra ny mpisorona
  - type: text
    content: ary azerany ny mafy orina hatry ny ela.
  '2':
  - type: text
    content: Marina ary fa ianareo ihany tokoa no olombelona
  - type: text
    content: ary hiara-maty aminareo ny fahendrena!
  '20':
  - type: text
    content: Koroiny ny lahatenin’ny mahay
  - type: text
    content: ary esoriny ny hazavan-tsain’ny zokiolona.
  '21':
  - type: text
    content: Mandrotsaka fandatsana amin’ny andriandahy Izy
  - type: text
    content: ary mampiketraka ny fehikibon’ny matanjaka.
  '22':
  - type: text
    content: Manala rakotra izay lalina Izy mba tsy ho maizina
  - type: text
    content: ary mitondra ny aloky ny fahafatesana ho eo amin’ny mazava.
  '23':
  - type: text
    content: Mahalehibe ny firenena Izy nefa mandringana azy koa;
  - type: text
    content: mampihahaka ny firenena Izy nefa mitondra azy hody indray.
  '24':
  - type: text
    content: Mahavery saina ny loholona amin’ny tany Izy
  - type: text
    content: ary mampirenireny azy any amin’ny tany efitra tsy misy lalana;
  '25':
  - type: text
    content: mitsapatsapa amin’ny maizina tsy misy mavaza ireo
  - type: text
    content: ary mampivembena azy tahaka ny olona mamo Izy.
  '3':
  - type: text
    content: Kanefa izaho dia mba manan-tsaina tahaka anareo ihany koa;
  - type: text
    content: tsy latsaka noho ianareo aho;
  - type: text
    content: fa iza moa no tsy nahalala izay zavatra toy izany?
  '4':
  - type: text
    content: Tonga fihomehezan’ny sakaizako aho,
  - type: text
    content: dia izaho izay niantso an’Andriamanitra ka novaliny;
  - type: text
    content: eny, tonga fihomehezana ny olona marina tsy manan-tsiny.
  '5':
  - type: text
    content: Latsa no anjaran’ny ozoim-pahoriana! Izany no hevitry ny olo-miadana;
  - type: text
    content: eny, efa vonona ho an’izay mangozohozo izany.
  '6':
  - type: text
    content: Mandry fehizay ny tranolain’ny mpitohatoha
  - type: text
    content: ary mitoetra tsy manahy izay sahy mampahatezitra an’Andriamanitra;
  - type: text
    content: eny, izay mihazona an’Andriamaniny eo an-tanany.
  '7':
  - type: text
    content: Kanefa anontanio ange ny biby fa hampianatra anao izy
  - type: text
    content: ary ny voromanidina fa hanambara aminao izy;
  '8':
  - type: text
    content: makà saina amin’ny tany dia hampianatra anao izy;
  - type: text
    content: ary ny hazandrano any an-dranomasina no hampahafantatra anao.
  '9':
  - type: text
    content: Iza no tsy mahalala raha mandinika ireny rehetra ireny,
  - type: text
    content: fa ny nanao izany dia ny tanan’NY TOMPO
