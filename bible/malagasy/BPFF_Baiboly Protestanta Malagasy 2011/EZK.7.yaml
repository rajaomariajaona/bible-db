document_id: EZK.7
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ambaran’NY TOMPO ny fiafaran’ny Israely
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Tonga tamiko ny tenin’NY TOMPO hoe:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary ianao, ry '
  - type: usfm
    marker: w
    children:
    - type: text
      text: zanak’olona
  - type: text
    text: ', izao no lazain’NY TOMPO Andriamanitra amin’ny tanin’ny Israely:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Injao ny farany!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, efa mby akaiky ny farany ho amin’ny vazan-tany efatra!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ankehitriny dia efa mby akaikinao ny farany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary halefako aminao ny fahatezerako
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hotsaraiko araka ny lalanao ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hatambesatro aminao ny fahavetavetanao rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Tsy hiantra anao ny masoko sady tsy hamindra fo Aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa hatambesatro aminao ny lalanao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny fahavetavetanao dia ho eo aminao.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ho fantatrareo fa Izaho no TOMPO.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Izao no lazain’NY TOMPO Andriamanitra:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Injao! Avy ny loza, dia loza izay tsy misy toa azy!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Njao ny farany! Eny, efa akaiky ny farany!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mifoha hamely anao izany! Indro, efa mby akaiky iny!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Efa akaiky ny anjaranao, ry mponina amin’ny tany!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Efa akaiky ny fotoana, efa antomotra ny andro!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Akoran’ady fa tsy fihobiana, eny an-tendrombohitra!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Vetivety foana dia hampidiniko aminao ny fahatezerako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hotanterahiko aminao ny fahavinirako
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hotsaraiko araka ny lalanao ianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hatambesatro aminao ny fahavetavetanao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Tsy hiantra anao ny masoko sady tsy hamindra fo Aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hatambesatro aminao ny lalanao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny fahavetavetanao dia ho eo aminao
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ho fantatrareo fa Izaho TOMPO no mamely.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Indro ny andro, indro efa akaiky izany!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Miseho ny anjaranao!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mamony ny tsorakazo!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Manorobona ny avonavona!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ny fanaovana an-keriny dia mitsangana ho tsorakazo hamelezan’ny faharatsiana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy hisy tavela intsony aminy, na ny hamaroany na ny harenany
- type: usfm
  marker: q1
  children:
  - type: text
    text: na ny zava-mendrika eo aminy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Efa mby akaiky ny fotoana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: antomotra ny andro!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aoka tsy hifaly ny mpividy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary aoka halahelo ny mpivarotra!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa iharan’ny fahatezerana mirehitra ny harembeny rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Fa ny mpivarotra dia tsy hifodian’izay efa lafony
- type: usfm
  marker: q1
  children:
  - type: text
    text: na dia mbola isan’ny velona aza izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny fahitana ny amin’ny hanjo ny harembe dia tsy hitsoaka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy hisy hamonjy ny ainy amin’ny helony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Efa notsofina ny trompetra ka vonona ny zavatra rehetra
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa tsy misy mankany amin’ny ady
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria iharan’ny fahatezerako mirehitra ny harembe rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ny sabatra no eny ivelany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny areti-mandringana sy ny mosary no ao an-trano!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay any an-tsaha dia ho fatin-tsabatra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary izay any an-tanàna kosa dia ho levon’ny mosary sy ny areti-mandringana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ary na dia misy afa-mandositra aza
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'dia ho eny an-tendrombohitra izy ka ho toy ny voromailala an-dohasaha:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izy rehetra dia samy hitoloko avokoa noho ny helony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Hiraviravy ny tanana rehetra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ho toy ny rano ny lohalika rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Hisikina lamba fisaonana izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hanafotra azy ny horohoro;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho menatra ny tava rehetra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ho voasola ny lohan’izy rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ny volafotsiny dia hariany eny an-dalambe
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny volamenany dia hataony ho zava-maloto;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny volafotsiny sy ny volamenany dia tsy hahavonjy azy amin’ny andron’ny fahatezeran’NY TOMPO;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy hahavoky ny tendany na hahafeno ny kibony izany
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria izany no nahatonga heloka ho azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Nataony firavaka tsara tarehy hoentiny mirehareha ireny
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady noentiny nanao ireo sary fahavetavetany, dia ireo zava-maharikoriko nataony.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Koa izany no hanaovako azy ireny ho zava-maloto.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Hatolotro ho babo eny an-tanan’ny hafa firenena izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, ho babo ho an’ny ratsy fanahy amin’ny tany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka holotoin’ireny izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Dia hiamboho azy koa Aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka holotoina ny rakitro,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa hiditra ao aminy ny mpandroba ka handoto azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Manefe gadra!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa feno fitsarana mandatsa-dra ny tany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary feno fampahoriana ny tanàna.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Koa hitondra izay firenena ratsy indrindra Aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka ho lasan’ireny ny tranony;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hatsahatro ny avonavon’ny mahery
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady holotoina ny fitoerany masina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Ho avy ny fampangovitana!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hitady fiadanana izy nefa tsy hisy izany!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Mifanontona ny fandravana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mifandimby ny filazan-doza;
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia manontany fahitana amin’ny mpaminany izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa tsy misy lalàna intsony amin’ny mpisorona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: na fahendrena amin’ny zokiolona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Hitomany ny mpanjaka, eny, hitafy fahaverezan-kevitra ny andriana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hangovitra ny tanan’ny vahoaka.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Araka ny lalany ihany no hataoko aminy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hotsaraiko araka ny fitsarana nataony izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ho fantany fa Izaho no TOMPO.
