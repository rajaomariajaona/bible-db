document_id: EZK.7,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Ambaran’NY TOMPO ny fiafaran’ny Israely
  - type: text
    content: 'Tonga tamiko ny tenin’NY TOMPO hoe:'
  '10':
  - type: text
    content: Indro ny andro, indro efa akaiky izany!
  - type: text
    content: Miseho ny anjaranao!
  - type: text
    content: Mamony ny tsorakazo!
  - type: text
    content: Manorobona ny avonavona!
  '11':
  - type: text
    content: Ny fanaovana an-keriny dia mitsangana ho tsorakazo hamelezan’ny faharatsiana;
  - type: text
    content: tsy hisy tavela intsony aminy, na ny hamaroany na ny harenany
  - type: text
    content: na ny zava-mendrika eo aminy.
  '12':
  - type: text
    content: Efa mby akaiky ny fotoana,
  - type: text
    content: antomotra ny andro!
  - type: text
    content: Aoka tsy hifaly ny mpividy
  - type: text
    content: ary aoka halahelo ny mpivarotra!
  - type: text
    content: Fa iharan’ny fahatezerana mirehitra ny harembeny rehetra.
  '13':
  - type: text
    content: Fa ny mpivarotra dia tsy hifodian’izay efa lafony
  - type: text
    content: na dia mbola isan’ny velona aza izy;
  - type: text
    content: fa ny fahitana ny amin’ny hanjo ny harembe dia tsy hitsoaka,
  - type: text
    content: ary tsy hisy hamonjy ny ainy amin’ny helony.
  '14':
  - type: text
    content: Efa notsofina ny trompetra ka vonona ny zavatra rehetra
  - type: text
    content: nefa tsy misy mankany amin’ny ady
  - type: text
    content: satria iharan’ny fahatezerako mirehitra ny harembe rehetra.
  '15':
  - type: text
    content: Ny sabatra no eny ivelany
  - type: text
    content: ary ny areti-mandringana sy ny mosary no ao an-trano!
  - type: text
    content: Izay any an-tsaha dia ho fatin-tsabatra
  - type: text
    content: ary izay any an-tanàna kosa dia ho levon’ny mosary sy ny areti-mandringana.
  '16':
  - type: text
    content: Ary na dia misy afa-mandositra aza
  - type: text
    content: 'dia ho eny an-tendrombohitra izy ka ho toy ny voromailala an-dohasaha:'
  - type: text
    content: Izy rehetra dia samy hitoloko avokoa noho ny helony.
  '17':
  - type: text
    content: Hiraviravy ny tanana rehetra
  - type: text
    content: ary ho toy ny rano ny lohalika rehetra.
  '18':
  - type: text
    content: Hisikina lamba fisaonana izy
  - type: text
    content: ka hanafotra azy ny horohoro;
  - type: text
    content: ho menatra ny tava rehetra
  - type: text
    content: ary ho voasola ny lohan’izy rehetra.
  '19':
  - type: text
    content: Ny volafotsiny dia hariany eny an-dalambe
  - type: text
    content: ary ny volamenany dia hataony ho zava-maloto;
  - type: text
    content: ny volafotsiny sy ny volamenany dia tsy hahavonjy azy amin’ny andron’ny fahatezeran’NY TOMPO;
  - type: text
    content: tsy hahavoky ny tendany na hahafeno ny kibony izany
  - type: text
    content: satria izany no nahatonga heloka ho azy.
  '2':
  - type: text
    content: 'Ary ianao, ry '
  - type: text
    content: zanak’olona
  - type: text
    content: ', izao no lazain’NY TOMPO Andriamanitra amin’ny tanin’ny Israely:'
  - type: text
    content: Injao ny farany!
  - type: text
    content: Eny, efa mby akaiky ny farany ho amin’ny vazan-tany efatra!
  '20':
  - type: text
    content: Nataony firavaka tsara tarehy hoentiny mirehareha ireny
  - type: text
    content: sady noentiny nanao ireo sary fahavetavetany, dia ireo zava-maharikoriko nataony.
  - type: text
    content: Koa izany no hanaovako azy ireny ho zava-maloto.
  '21':
  - type: text
    content: Hatolotro ho babo eny an-tanan’ny hafa firenena izy,
  - type: text
    content: eny, ho babo ho an’ny ratsy fanahy amin’ny tany
  - type: text
    content: ka holotoin’ireny izy.
  '22':
  - type: text
    content: Dia hiamboho azy koa Aho
  - type: text
    content: ka holotoina ny rakitro,
  - type: text
    content: fa hiditra ao aminy ny mpandroba ka handoto azy.
  '23':
  - type: text
    content: Manefe gadra!
  - type: text
    content: Fa feno fitsarana mandatsa-dra ny tany
  - type: text
    content: ary feno fampahoriana ny tanàna.
  '24':
  - type: text
    content: Koa hitondra izay firenena ratsy indrindra Aho
  - type: text
    content: ka ho lasan’ireny ny tranony;
  - type: text
    content: ary hatsahatro ny avonavon’ny mahery
  - type: text
    content: sady holotoina ny fitoerany masina.
  '25':
  - type: text
    content: Ho avy ny fampangovitana!
  - type: text
    content: Hitady fiadanana izy nefa tsy hisy izany!
  '26':
  - type: text
    content: Mifanontona ny fandravana,
  - type: text
    content: mifandimby ny filazan-doza;
  - type: text
    content: dia manontany fahitana amin’ny mpaminany izy
  - type: text
    content: nefa tsy misy lalàna intsony amin’ny mpisorona,
  - type: text
    content: na fahendrena amin’ny zokiolona.
  '27':
  - type: text
    content: Hitomany ny mpanjaka, eny, hitafy fahaverezan-kevitra ny andriana,
  - type: text
    content: hangovitra ny tanan’ny vahoaka.
  - type: text
    content: Araka ny lalany ihany no hataoko aminy,
  - type: text
    content: ary hotsaraiko araka ny fitsarana nataony izy
  - type: text
    content: dia ho fantany fa Izaho no TOMPO.
  '3':
  - type: text
    content: Ankehitriny dia efa mby akaikinao ny farany,
  - type: text
    content: ary halefako aminao ny fahatezerako
  - type: text
    content: dia hotsaraiko araka ny lalanao ianao
  - type: text
    content: ka hatambesatro aminao ny fahavetavetanao rehetra.
  '4':
  - type: text
    content: Tsy hiantra anao ny masoko sady tsy hamindra fo Aho;
  - type: text
    content: fa hatambesatro aminao ny lalanao
  - type: text
    content: ary ny fahavetavetanao dia ho eo aminao.
  - type: text
    content: Dia ho fantatrareo fa Izaho no TOMPO.
  '5':
  - type: text
    content: 'Izao no lazain’NY TOMPO Andriamanitra:'
  - type: text
    content: Injao! Avy ny loza, dia loza izay tsy misy toa azy!
  '6':
  - type: text
    content: Njao ny farany! Eny, efa akaiky ny farany!
  - type: text
    content: Mifoha hamely anao izany! Indro, efa mby akaiky iny!
  '7':
  - type: text
    content: Efa akaiky ny anjaranao, ry mponina amin’ny tany!
  - type: text
    content: Efa akaiky ny fotoana, efa antomotra ny andro!
  - type: text
    content: Akoran’ady fa tsy fihobiana, eny an-tendrombohitra!
  '8':
  - type: text
    content: Vetivety foana dia hampidiniko aminao ny fahatezerako,
  - type: text
    content: ary hotanterahiko aminao ny fahavinirako
  - type: text
    content: ka hotsaraiko araka ny lalanao ianao,
  - type: text
    content: ary hatambesatro aminao ny fahavetavetanao.
  '9':
  - type: text
    content: Tsy hiantra anao ny masoko sady tsy hamindra fo Aho;
  - type: text
    content: hatambesatro aminao ny lalanao,
  - type: text
    content: ary ny fahavetavetanao dia ho eo aminao
  - type: text
    content: dia ho fantatrareo fa Izaho TOMPO no mamely.
