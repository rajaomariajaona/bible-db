document_id: HEB.1
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Sasin-teny
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Rehefa nampitenenin’Andriamanitra tamin’ny razana fahiny ny mpaminany tamin’ny andro samihafa sy ny fanao samihafa '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: dia amin’izao andro farany izao kosa no nampitenenany tamintsika ny Zanany izay voatendriny ho mpandova ny zavatra rehetra; Izy no nahariany izao tontolo izao,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Izy koa no famirapiratan’ny voninahiny sy endriky ny tenany indrindra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mihazona ny zavatra rehetra amin’ny herin’ny teniny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: rehefa nanao fanadiovana hahafaka ny fahotana Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia nipetraka eo ankavanan’ny Lehibe any amin’ny avo
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ka natao tsara noho ny anjely,
- type: usfm
  marker: q1
  children:
  - type: text
    text: araka ny nandovany anarana tsara noho ireny.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Lehibe noho ireo anjely ny Zanaka
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Fa anjely iza no mba nilazany hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Zanako Ianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izaho no niteraka Anao androany» (Sal 2.7)?
- type: usfm
  marker: m
  children:
  - type: text
    text: 'Ary koa:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Izaho ho Rainy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary Izy ho Zanako» (2Sam 7.14)?
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary raha mitondra ny Lahimatoa ho amin’izao fiainana izao Izy dia niteny hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Ary aoka ny anjelin’Andriamanitra rehetra hiankohoka eo anoloany» (Sal 97.7).
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary ny anjely dia ilazany hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Manao ny anjeliny ho rivotra Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny mpanompony ho lelafo» (Sal 104.4).
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Fa ny Zanaka kosa dia nilazany hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Ny sezafiandriananao, Andriamanitra ô, dia mandrakizay doria;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny tehin’ny fahitsiana no tehim-panjakanao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Tianao ny fahamarinana fa halanao ny heloka;
- type: usfm
  marker: q1
  children:
  - type: text
    text: koa Andriamanitra, dia Andriamanitrao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: efa nanosotra diloilom-pifaliana Anao mihoatra noho ny namanao» (Sal 45.6-7).
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary izao koa:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Ianao, TOMPO ô, tany aloha no nanorenanao ny tany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary asan’ny tananao ny lanitra;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ireo dia ho levona, fa Ianao no maharitra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho rovitra toy ny fitafiana izy rehetra,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ary toy ny lamba no hamalonanao azy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia toy ny fitafiana izay hovana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa Ianao no tsy miova, ary ny taonanao no tsy ho tapitra» (Sal 102.25-27).
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Fa anjely iza no mba nilazany hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Mipetraha eo ankavanako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ambara-panaoko ny fahavalonao ho fitoeran-tongotrao»? (Sal 110.1)
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Tsy fanahy manompo va izy rehetra, irahina hanao fanompoana ho an’izay handova famonjena?
