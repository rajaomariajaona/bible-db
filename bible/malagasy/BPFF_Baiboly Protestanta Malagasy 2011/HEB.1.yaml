document_id: HEB.1,3103
type_code: plt
verses:
  '1':
  - type: heading
    content: Sasin-teny
  - type: text
    content: 'Rehefa nampitenenin’Andriamanitra tamin’ny razana fahiny ny mpaminany tamin’ny andro samihafa sy ny fanao samihafa '
  '10':
  - type: text
    content: 'Ary izao koa:'
  - type: text
    content: «Ianao, TOMPO ô, tany aloha no nanorenanao ny tany,
  - type: text
    content: ary asan’ny tananao ny lanitra;
  '11':
  - type: text
    content: ireo dia ho levona, fa Ianao no maharitra;
  - type: text
    content: ho rovitra toy ny fitafiana izy rehetra,
  '12':
  - type: text
    content: ary toy ny lamba no hamalonanao azy,
  - type: text
    content: dia toy ny fitafiana izay hovana;
  - type: text
    content: fa Ianao no tsy miova, ary ny taonanao no tsy ho tapitra» (Sal 102.25-27).
  '13':
  - type: text
    content: 'Fa anjely iza no mba nilazany hoe:'
  - type: text
    content: «Mipetraha eo ankavanako,
  - type: text
    content: ambara-panaoko ny fahavalonao ho fitoeran-tongotrao»? (Sal 110.1)
  '14':
  - type: text
    content: Tsy fanahy manompo va izy rehetra, irahina hanao fanompoana ho an’izay handova famonjena?
  '2':
  - type: text
    content: dia amin’izao andro farany izao kosa no nampitenenany tamintsika ny Zanany izay voatendriny ho mpandova ny zavatra rehetra; Izy no nahariany izao tontolo izao,
  '3':
  - type: text
    content: Izy koa no famirapiratan’ny voninahiny sy endriky ny tenany indrindra
  - type: text
    content: ary mihazona ny zavatra rehetra amin’ny herin’ny teniny;
  - type: text
    content: rehefa nanao fanadiovana hahafaka ny fahotana Izy
  - type: text
    content: dia nipetraka eo ankavanan’ny Lehibe any amin’ny avo
  '4':
  - type: text
    content: ka natao tsara noho ny anjely,
  - type: text
    content: araka ny nandovany anarana tsara noho ireny.
  - type: heading
    content: Lehibe noho ireo anjely ny Zanaka
  '5':
  - type: text
    content: 'Fa anjely iza no mba nilazany hoe:'
  - type: text
    content: «Zanako Ianao,
  - type: text
    content: Izaho no niteraka Anao androany» (Sal 2.7)?
  - type: text
    content: 'Ary koa:'
  - type: text
    content: «Izaho ho Rainy
  - type: text
    content: ary Izy ho Zanako» (2Sam 7.14)?
  '6':
  - type: text
    content: 'Ary raha mitondra ny Lahimatoa ho amin’izao fiainana izao Izy dia niteny hoe:'
  - type: text
    content: «Ary aoka ny anjelin’Andriamanitra rehetra hiankohoka eo anoloany» (Sal 97.7).
  '7':
  - type: text
    content: 'Ary ny anjely dia ilazany hoe:'
  - type: text
    content: «Manao ny anjeliny ho rivotra Izy
  - type: text
    content: ary ny mpanompony ho lelafo» (Sal 104.4).
  '8':
  - type: text
    content: 'Fa ny Zanaka kosa dia nilazany hoe:'
  - type: text
    content: «Ny sezafiandriananao, Andriamanitra ô, dia mandrakizay doria;
  - type: text
    content: ary ny tehin’ny fahitsiana no tehim-panjakanao.
  '9':
  - type: text
    content: Tianao ny fahamarinana fa halanao ny heloka;
  - type: text
    content: koa Andriamanitra, dia Andriamanitrao,
  - type: text
    content: efa nanosotra diloilom-pifaliana Anao mihoatra noho ny namanao» (Sal 45.6-7).
